<svg xmlns="http://www.w3.org/2000/svg" width="900" height="440" viewBox="0 0 900 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="900" height="440" fill="#fbfbfd"/>
  <text x="30" y="32" font-size="14" font-weight="600" fill="#1d1d1f">级联 reconcile · Deployment → ReplicaSet → Pod（每层只管自己那层期望）</text>

  <!-- Deployment -->
  <rect x="40" y="70" width="250" height="120" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="56" y="94" font-size="13" font-weight="600" fill="#1b2a4a">Deployment 控制器</text>
  <text x="56" y="116" font-size="11" fill="#5b7db1">据 spec.replicas + 滚动策略</text>
  <text x="56" y="136" font-size="11" fill="#5b7db1">维护若干 ReplicaSet</text>
  <text x="56" y="156" font-size="11" fill="#5b7db1">rolloutRolling / rolloutRecreate</text>
  <text x="56" y="176" font-size="11" fill="#5b7db1">新版本建新 RS、逐步调副本</text>

  <!-- ReplicaSet -->
  <rect x="325" y="70" width="250" height="120" rx="12" fill="#faf4fb" stroke="#e4cdea" filter="url(#soft)"/>
  <text x="341" y="94" font-size="13" font-weight="600" fill="#8944ab">ReplicaSet 控制器</text>
  <text x="341" y="116" font-size="11" fill="#8944ab">只让 Pod 数 = spec.replicas</text>
  <text x="341" y="136" font-size="11" fill="#8944ab">diff = len(pods) - replicas</text>
  <text x="341" y="156" font-size="11" fill="#8944ab">diff&lt;0 建 Pod · diff&gt;0 删多余</text>
  <text x="341" y="176" font-size="11" fill="#8944ab">manageReplicas :569</text>

  <!-- Pods -->
  <rect x="610" y="70" width="250" height="120" rx="12" fill="#f5faf6" stroke="#cfe6d2" filter="url(#soft)"/>
  <text x="626" y="94" font-size="13" font-weight="600" fill="#1d8f3f">Pod</text>
  <text x="626" y="116" font-size="11" fill="#4a8a5c">被调度器选节点</text>
  <text x="626" y="136" font-size="11" fill="#4a8a5c">被 kubelet 拉起容器</text>
  <text x="626" y="156" font-size="11" fill="#4a8a5c">owner = ReplicaSet</text>
  <text x="626" y="176" font-size="11" fill="#4a8a5c">（ownerReferences）</text>

  <path d="M290 118 L325 118" fill="none" stroke="#b8b8bf" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="292" y="110" font-size="10" fill="#a1a1a6">管 RS</text>
  <path d="M575 118 L610 118" fill="none" stroke="#b8b8bf" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="577" y="110" font-size="10" fill="#a1a1a6">管 Pod</text>

  <!-- upward wake -->
  <path d="M610 168 Q450 240 290 168" fill="none" stroke="#c7c7cc" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="410" y="228" font-size="10.5" fill="#a1a1a6">底层实际变 → informer 事件把 owner 重新入队 → 上层重算</text>

  <!-- ownership box -->
  <rect x="40" y="268" width="820" height="70" rx="12" fill="#f7f7f9" stroke="#ececef"/>
  <text x="56" y="292" font-size="12.5" font-weight="600" fill="#1d1d1f">归属靠 ownerReferences + ControllerRef（领养 / 弃养）</text>
  <text x="56" y="316" font-size="11.5" fill="#6e6e73">RS 的 owner 是 Deployment、Pod 的 owner 是 RS；GetControllerOf + ClaimReplicaSets 保证一个对象只被一个控制器拥有</text>

  <text x="40" y="372" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">分层收敛：</tspan>高层意图经多级控制器逐层翻译，每级只管自己那层的 spec 与实际 —— 抽象分层、各司其职的范本</text>
  <text x="40" y="396" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">GC 基础：</tspan>这条 ownerReferences 对象图正是垃圾回收级联删除的依据（删 Deployment → 删 RS → 删 Pod）</text>
  <text x="40" y="420" font-size="11.5" fill="#a1a1a6">跨层唤醒形成闭环：改对象 → 对方 watch 到 → 对方 reconcile，控制器间零直接调用</text>
</svg>
