<svg xmlns="http://www.w3.org/2000/svg" width="900" height="440" viewBox="0 0 900 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="900" height="440" fill="#fbfbfd"/>
  <text x="30" y="32" font-size="14" font-weight="600" fill="#1d1d1f">存储 · PVC 申领 → PV 绑定/动态供给 → CSI 三段挂载</text>

  <!-- PVC -->
  <rect x="30" y="70" width="180" height="90" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="120" y="96" font-size="12.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">PVC（用户申领）</text>
  <text x="120" y="118" font-size="10.5" fill="#5b7db1" text-anchor="middle">要 10Gi · RWO</text>
  <text x="120" y="138" font-size="10.5" fill="#5b7db1" text-anchor="middle">StorageClass: fast</text>

  <!-- PV controller -->
  <rect x="260" y="60" width="360" height="180" rx="12" fill="#faf4fb" stroke="#e4cdea" filter="url(#soft)"/>
  <text x="440" y="84" font-size="12.5" font-weight="600" fill="#8944ab" text-anchor="middle">PV 控制器 reconcile（syncClaim :237）</text>
  <rect x="276" y="98" width="328" height="58" rx="8" fill="#ffffff" stroke="#ececef"/>
  <text x="290" y="120" font-size="11" font-weight="600" fill="#1d1d1f">分支 A · findBestMatchForClaim :343</text>
  <text x="290" y="140" font-size="10.5" fill="#6e6e73">现有 PV 里找容量/模式匹配 → bind :395</text>
  <rect x="276" y="164" width="328" height="60" rx="8" fill="#ffffff" stroke="#ececef"/>
  <text x="290" y="186" font-size="11" font-weight="600" fill="#1d1d1f">分支 B · provisionClaim :376</text>
  <text x="290" y="206" font-size="10.5" fill="#6e6e73">找不到 → 按 StorageClass 调 provisioner</text>
  <text x="290" y="222" font-size="10.5" fill="#6e6e73">动态创建 PV 再绑定</text>

  <!-- PV -->
  <rect x="670" y="70" width="200" height="90" rx="11" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#soft)"/>
  <text x="770" y="96" font-size="12.5" font-weight="600" fill="#8a6d3b" text-anchor="middle">PV（实际存储）</text>
  <text x="770" y="118" font-size="10.5" fill="#6e6e73" text-anchor="middle">静态创建或动态生成</text>
  <text x="770" y="138" font-size="10.5" fill="#6e6e73" text-anchor="middle">claimRef ↔ PVC 双向绑定</text>

  <path d="M210 115 L260 115" fill="none" stroke="#b8b8bf" stroke-width="1.5" marker-end="url(#ar)"/>
  <path d="M620 115 L670 115" fill="none" stroke="#b8b8bf" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- CSI three stages -->
  <rect x="30" y="264" width="840" height="90" rx="12" fill="#f5faf6" stroke="#cfe6d2"/>
  <text x="46" y="288" font-size="12.5" font-weight="600" fill="#1d8f3f">CSI 挂载三段（Pod 调度到节点后）</text>
  <g font-size="10.5">
    <rect x="46" y="300" width="256" height="44" rx="8" fill="#ffffff" stroke="#cfe6d2"/>
    <text x="60" y="320" font-weight="600" fill="#1d1d1f">① Provision</text>
    <text x="60" y="337" fill="#6e6e73">外部 CSI provisioner 建卷 → PV</text>
    <rect x="316" y="300" width="256" height="44" rx="8" fill="#ffffff" stroke="#cfe6d2"/>
    <text x="330" y="320" font-weight="600" fill="#1d1d1f">② Attach</text>
    <text x="330" y="337" fill="#6e6e73">AttachDetach 控制器挂到节点</text>
    <rect x="586" y="300" width="284" height="44" rx="8" fill="#ffffff" stroke="#cfe6d2"/>
    <text x="600" y="320" font-weight="600" fill="#1d1d1f">③ Mount</text>
    <text x="600" y="337" fill="#6e6e73">kubelet + 节点 CSI driver → 进容器目录</text>
  </g>
  <path d="M302 322 L316 322" fill="none" stroke="#b8b8bf" stroke-width="1.4" marker-end="url(#ar)"/>
  <path d="M572 322 L586 322" fill="none" stroke="#b8b8bf" stroke-width="1.4" marker-end="url(#ar)"/>

  <text x="30" y="388" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">声明与供给分离：</tspan>用户只写 PVC 期望，PV 控制器 reconcile 地匹配/供给并双向绑定 —— 存储也纳入声明式框架</text>
  <text x="30" y="412" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">回收：</tspan>PVC 删除后按 PV.reclaimPolicy 处理 —— Delete（连底层删）/ Retain（保留数据）；CSI 解耦驱动与后端</text>
</svg>
