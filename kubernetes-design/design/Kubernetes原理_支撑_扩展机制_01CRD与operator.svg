<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="900" height="420" fill="#fbfbfd"/>
  <text x="30" y="32" font-size="14" font-weight="600" fill="#1d1d1f">扩展机制 · CRD 注册新类型 + 自定义控制器（Operator = CRD + reconcile）</text>

  <!-- CRD register -->
  <rect x="30" y="70" width="250" height="140" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="94" font-size="12.5" font-weight="600" fill="#1b2a4a">① 提交 CRD</text>
  <text x="46" y="116" font-size="11" fill="#5b7db1">声明 group/version/kind</text>
  <text x="46" y="136" font-size="11" fill="#5b7db1">+ OpenAPI schema</text>
  <text x="46" y="158" font-size="11" fill="#5b7db1">apiextensions-apiserver</text>
  <text x="46" y="178" font-size="11" fill="#5b7db1">动态装配 REST 存储 + 校验</text>
  <text x="46" y="198" font-size="11" fill="#5b7db1">/apis/&lt;group&gt;/&lt;version&gt;/…</text>

  <!-- CR object -->
  <rect x="325" y="70" width="230" height="140" rx="12" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#soft)"/>
  <text x="341" y="94" font-size="12.5" font-weight="600" fill="#8a6d3b">② 用户提交 CR</text>
  <text x="341" y="116" font-size="11" fill="#6e6e73">像内建对象一样 CRUD+watch</text>
  <text x="341" y="136" font-size="11" fill="#6e6e73">存进同一 etcd</text>
  <text x="341" y="156" font-size="11" fill="#6e6e73">走同一套认证/授权/准入</text>
  <text x="341" y="178" font-size="11" fill="#6e6e73">spec：期望（如"3 节点数据库"）</text>
  <text x="341" y="198" font-size="11" fill="#6e6e73">status：实际</text>

  <!-- custom controller -->
  <rect x="600" y="70" width="270" height="140" rx="12" fill="#faf4fb" stroke="#e4cdea" filter="url(#soft)"/>
  <text x="616" y="94" font-size="12.5" font-weight="600" fill="#8944ab">③ 自定义控制器（Operator）</text>
  <text x="616" y="116" font-size="11" fill="#8944ab">watch 自己的 CR</text>
  <text x="616" y="136" font-size="11" fill="#8944ab">Informer 缓存 + workqueue</text>
  <text x="616" y="156" font-size="11" fill="#8944ab">reconcile：读 CR spec</text>
  <text x="616" y="176" font-size="11" fill="#8944ab">建/调 Deployment/Service/Secret</text>
  <text x="616" y="196" font-size="11" fill="#8944ab">复用内建控制器同一骨架 ★</text>

  <path d="M280 140 L325 140" fill="none" stroke="#b8b8bf" stroke-width="1.5" marker-end="url(#ar)"/>
  <path d="M555 140 L600 140" fill="none" stroke="#b8b8bf" stroke-width="1.5" marker-end="url(#ar)"/>
  <path d="M735 210 Q600 260 490 210" fill="none" stroke="#c7c7cc" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="520" y="252" font-size="10.5" fill="#a1a1a6">把实际驱动到期望，写回 CR status</text>

  <!-- bottom: extension spectrum -->
  <rect x="30" y="280" width="840" height="54" rx="10" fill="#f7f7f9" stroke="#ececef"/>
  <text x="46" y="303" font-size="12" font-weight="600" fill="#1d1d1f">扩展缝：CRD（轻量）· Aggregated API Server（重量，自定义存储）· 准入 webhook · 调度插件 · CNI/CSI/CRI/Device Plugin</text>
  <text x="46" y="323" font-size="11" fill="#6e6e73">几乎每层都留了扩展点 —— K8s 因此是可无限生长的平台，而非封闭产品</text>

  <text x="30" y="366" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">要害：</tspan>CRD 只让 API 能存新类型对象；要产生行为必须配一个控制器（Operator）—— 无新机制，就是 reconcile 骨架被复用</text>
  <text x="30" y="392" font-size="11.5" fill="#a1a1a6">CRD vs Aggregated API：前者声明即用、复用主 etcd；后者自建 server、可自定义存储，用于需特殊存储/协议的场景</text>
</svg>
