<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="900" height="420" fill="#fbfbfd"/>
  <text x="30" y="32" font-size="14" font-weight="600" fill="#1d1d1f">安全三关 · 认证（你是谁）→ 授权（能不能）→ 准入（内容合规吗）</text>

  <!-- request -->
  <rect x="30" y="120" width="110" height="70" rx="11" fill="#f7f7f9" stroke="#ececef"/>
  <text x="85" y="150" font-size="12" font-weight="600" fill="#1d1d1f" text-anchor="middle">写请求</text>
  <text x="85" y="170" font-size="10.5" fill="#6e6e73" text-anchor="middle">POST/PUT</text>

  <!-- authn -->
  <rect x="160" y="80" width="200" height="150" rx="12" fill="#fdeeeb" stroke="#e6c9c2" filter="url(#soft)"/>
  <text x="260" y="104" font-size="12.5" font-weight="600" fill="#8a3527" text-anchor="middle">① 认证 authn</text>
  <text x="260" y="128" font-size="11" fill="#b06a5c" text-anchor="middle">你是谁？</text>
  <text x="260" y="150" font-size="10.5" fill="#6e6e73" text-anchor="middle">证书 / Token / SA JWT / OIDC</text>
  <text x="260" y="170" font-size="10.5" fill="#6e6e73" text-anchor="middle">联合认证器，任一成功</text>
  <text x="260" y="190" font-size="10.5" fill="#6e6e73" text-anchor="middle">得 user + groups</text>
  <text x="260" y="212" font-size="10.5" fill="#8a3527" text-anchor="middle">失败 → 401（authentication.go:46）</text>

  <!-- authz -->
  <rect x="380" y="80" width="200" height="150" rx="12" fill="#fdeeeb" stroke="#e6c9c2" filter="url(#soft)"/>
  <text x="480" y="104" font-size="12.5" font-weight="600" fill="#8a3527" text-anchor="middle">② 授权 authz</text>
  <text x="480" y="128" font-size="11" fill="#b06a5c" text-anchor="middle">你能不能？</text>
  <text x="480" y="150" font-size="10.5" fill="#6e6e73" text-anchor="middle">RBAC：遍历绑定规则</text>
  <text x="480" y="170" font-size="10.5" fill="#6e6e73" text-anchor="middle">RuleAllows(gr,res,verb,name)</text>
  <text x="480" y="190" font-size="10.5" fill="#6e6e73" text-anchor="middle">默认拒绝，命中才允许</text>
  <text x="480" y="212" font-size="10.5" fill="#8a3527" text-anchor="middle">失败 → 403（rbac.go:75）</text>

  <!-- admission -->
  <rect x="600" y="80" width="270" height="150" rx="12" fill="#faf4fb" stroke="#e4cdea" filter="url(#soft)"/>
  <text x="735" y="104" font-size="12.5" font-weight="600" fill="#8944ab" text-anchor="middle">③ 准入 admission（REST 层）</text>
  <text x="735" y="126" font-size="11" fill="#8944ab" text-anchor="middle">内容合规吗？可改可拒</text>
  <rect x="616" y="138" width="238" height="38" rx="7" fill="#ffffff" stroke="#ececef"/>
  <text x="735" y="162" font-size="10.5" fill="#8944ab" text-anchor="middle">Mutating：改写（注入 sidecar/默认值）</text>
  <rect x="616" y="182" width="238" height="38" rx="7" fill="#ffffff" stroke="#ececef"/>
  <text x="735" y="206" font-size="10.5" fill="#8944ab" text-anchor="middle">Validating：校验/拒（配额/OPA）</text>

  <path d="M140 155 L160 155" fill="none" stroke="#b8b8bf" stroke-width="1.5" marker-end="url(#ar)"/>
  <path d="M360 155 L380 155" fill="none" stroke="#b8b8bf" stroke-width="1.5" marker-end="url(#ar)"/>
  <path d="M580 155 L600 155" fill="none" stroke="#b8b8bf" stroke-width="1.5" marker-end="url(#ar)"/>

  <text x="30" y="272" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">位置：</tspan>认证、授权是 HTTP handler chain 过滤器；准入在 REST 的 Store.Create/Update 内、落库前触发</text>
  <text x="30" y="298" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">顺序铁律：</tspan>认证在前（不知你是谁无法鉴权）→ 鉴权居中 → 准入最后；Mutating 必先于 Validating（改完要复检）</text>
  <text x="30" y="324" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">身份：</tspan>K8s 不存用户表 —— 普通用户来自外部（证书/OIDC），ServiceAccount 才是集群内建身份</text>
  <text x="30" y="350" font-size="11.5" fill="#a1a1a6">RBAC 四对象：Role / ClusterRole（权限规则）+ RoleBinding / ClusterRoleBinding（授予主体）；遵循最小权限</text>
  <text x="30" y="376" font-size="11.5" fill="#a1a1a6">准入是把组织策略织进声明式流程的核心扩展点（配额、Pod 安全、镜像策略都在此实现）</text>
</svg>
