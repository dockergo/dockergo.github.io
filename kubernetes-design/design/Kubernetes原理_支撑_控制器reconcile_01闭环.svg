<svg xmlns="http://www.w3.org/2000/svg" width="900" height="440" viewBox="0 0 900 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#8944ab"/>
    </marker>
  </defs>
  <rect width="900" height="440" fill="#fbfbfd"/>
  <text x="30" y="32" font-size="14" font-weight="600" fill="#1d1d1f">reconcile 闭环 · 通用控制器骨架七步（Deployment 控制器为标准）</text>

  <g font-size="11">
    <rect x="30" y="60" width="255" height="66" rx="10" fill="#faf4fb" stroke="#e4cdea" filter="url(#soft)"/>
    <text x="46" y="82" font-weight="600" fill="#8944ab">① worker 取 key</text>
    <text x="46" y="102" fill="#6e6e73">queue.Get() · defer Done(key)</text>
    <text x="46" y="119" fill="#a1a1a6">deployment_controller.go:488</text>

    <rect x="322" y="60" width="255" height="66" rx="10" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
    <text x="338" y="82" font-weight="600" fill="#1d1d1f">② 拆 namespace/name</text>
    <text x="338" y="102" fill="#6e6e73">SplitMetaNamespaceKey</text>
    <text x="338" y="119" fill="#a1a1a6">syncDeployment :590</text>

    <rect x="614" y="60" width="256" height="66" rx="10" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
    <text x="630" y="82" font-weight="600" fill="#1d1d1f">③ 从本地缓存 lister 读对象</text>
    <text x="630" y="102" fill="#6e6e73">dLister...Get(name) 不打 API</text>
    <text x="630" y="119" fill="#a1a1a6">Informer 缓存</text>

    <rect x="614" y="160" width="256" height="66" rx="10" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
    <text x="630" y="182" font-weight="600" fill="#1d1d1f">④ DeepCopy（绝不改缓存）</text>
    <text x="630" y="202" fill="#6e6e73">d := deployment.DeepCopy()</text>
    <text x="630" y="219" fill="#a1a1a6">:615</text>

    <rect x="322" y="160" width="255" height="66" rx="10" fill="#faf4fb" stroke="#e4cdea" filter="url(#soft)"/>
    <text x="338" y="182" font-weight="600" fill="#8944ab">⑤ 对比 spec 与实际、算差异</text>
    <text x="338" y="202" fill="#8944ab">getReplicaSetsForDeployment</text>
    <text x="338" y="219" fill="#8944ab">rolloutRolling :677</text>

    <rect x="30" y="160" width="255" height="66" rx="10" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
    <text x="46" y="182" font-weight="600" fill="#1d1d1f">⑥ 写回 API Server</text>
    <text x="46" y="202" fill="#6e6e73">spec 动作 + UpdateStatus</text>
    <text x="46" y="219" fill="#a1a1a6">client...Update</text>

    <rect x="30" y="260" width="840" height="66" rx="10" fill="#fdeeeb" stroke="#e6c9c2"/>
    <text x="46" y="282" font-weight="600" fill="#8a3527">⑦ 出错 handleErr：退避重入队，达上限才 Forget</text>
    <text x="46" y="302" fill="#b06a5c">if NumRequeues(key) &lt; maxRetries(=15) { queue.AddRateLimited(key) } else { Forget }　deployment_controller.go:500 / :511</text>
    <text x="46" y="319" fill="#b06a5c">退避 5ms·2ⁿ（上限 1000s）+ 全局令牌桶 10qps/突发100</text>
  </g>

  <!-- arrows -->
  <path d="M285 93 L322 93" fill="none" stroke="#8944ab" stroke-width="1.4" marker-end="url(#ar)"/>
  <path d="M577 93 L614 93" fill="none" stroke="#8944ab" stroke-width="1.4" marker-end="url(#ar)"/>
  <path d="M742 126 L742 160" fill="none" stroke="#8944ab" stroke-width="1.4" marker-end="url(#ar)"/>
  <path d="M614 193 L577 193" fill="none" stroke="#8944ab" stroke-width="1.4" marker-end="url(#ar)"/>
  <path d="M322 193 L285 193" fill="none" stroke="#8944ab" stroke-width="1.4" marker-end="url(#ar)"/>
  <path d="M157 226 L157 260" fill="none" stroke="#8944ab" stroke-width="1.4" marker-end="url(#ar)"/>
  <path d="M30 293 Q10 160 30 100" fill="none" stroke="#c7c7cc" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="8" y="200" font-size="10" fill="#a1a1a6" transform="rotate(-90 8 200)">重试回队</text>

  <text x="30" y="360" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">level-triggered：</tspan>informer 的 Add/Update/Delete 都只做 enqueue(key)，事件只是唤醒；syncHandler 永远重算当前全量差异</text>
  <text x="30" y="384" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">幂等前提：</tspan>同 key 多次 reconcile 结果一致，才敢让 workqueue 去重/重试；同一 key 永不并发（workqueue 保证）</text>
  <text x="30" y="408" font-size="11.5" fill="#a1a1a6">丢事件靠 resync 兜底、重复入队去重无害、崩溃重启重列即恢复 —— 这就是 K8s 自愈的机制根源</text>
</svg>
