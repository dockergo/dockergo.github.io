<svg xmlns="http://www.w3.org/2000/svg" width="920" height="480" viewBox="0 0 920 480" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="920" height="480" fill="#fbfbfd"/>
  <text x="30" y="32" font-size="14" font-weight="600" fill="#1d1d1f">双维模型 · 接触面 × 能力域 —— 把主线归位</text>

  <!-- 接触面 band -->
  <rect x="30" y="50" width="860" height="52" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="72" font-size="12.5" font-weight="600" fill="#1b2a4a">接触面（唯一）</text>
  <text x="46" y="90" font-size="12" fill="#5b7db1">声明式 API 资源 + kubectl —— 用户只写 spec 期望态，系统驱动 status 向 spec 收敛</text>

  <!-- soul band -->
  <rect x="30" y="116" width="860" height="52" rx="10" fill="#faf4fb" stroke="#e4cdea"/>
  <text x="46" y="138" font-size="12.5" font-weight="600" fill="#8944ab">灵魂主线（贯穿一切）</text>
  <text x="46" y="156" font-size="12" fill="#8944ab">控制器 reconcile 循环 —— Informer 缓存 → workqueue → syncHandler 对比差异并收敛（level-triggered）</text>

  <!-- 能力域 grid label -->
  <text x="30" y="196" font-size="12.5" font-weight="600" fill="#6e6e73">支撑能力域（内部公共机制）</text>

  <!-- 能力域 cards 5x2 -->
  <g font-size="11.5">
    <rect x="30" y="206" width="200" height="58" rx="9" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
    <text x="44" y="230" font-weight="600" fill="#1d1d1f">API Server + etcd</text>
    <text x="44" y="250" fill="#6e6e73">声明态存储 · watch cache</text>

    <rect x="250" y="206" width="200" height="58" rx="9" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
    <text x="264" y="230" font-weight="600" fill="#1d1d1f">Informer / Watch</text>
    <text x="264" y="250" fill="#6e6e73">客户端缓存 + 增量事件</text>

    <rect x="470" y="206" width="200" height="58" rx="9" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
    <text x="484" y="230" font-weight="600" fill="#1d1d1f">调度器</text>
    <text x="484" y="250" fill="#6e6e73">filter / score / bind 选址</text>

    <rect x="690" y="206" width="200" height="58" rx="9" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
    <text x="704" y="230" font-weight="600" fill="#1d1d1f">kubelet + CRI</text>
    <text x="704" y="250" fill="#6e6e73">节点侧把 Pod 变容器</text>

    <rect x="30" y="278" width="200" height="58" rx="9" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
    <text x="44" y="302" font-weight="600" fill="#1d1d1f">网络</text>
    <text x="44" y="322" fill="#6e6e73">Service / kube-proxy / CNI</text>

    <rect x="250" y="278" width="200" height="58" rx="9" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
    <text x="264" y="302" font-weight="600" fill="#1d1d1f">存储</text>
    <text x="264" y="322" fill="#6e6e73">CSI / PV / PVC</text>

    <rect x="470" y="278" width="200" height="58" rx="9" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
    <text x="484" y="302" font-weight="600" fill="#1d1d1f">认证授权与准入</text>
    <text x="484" y="322" fill="#6e6e73">authn / RBAC / admission</text>

    <rect x="690" y="278" width="200" height="58" rx="9" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
    <text x="704" y="302" font-weight="600" fill="#1d1d1f">扩展机制</text>
    <text x="704" y="322" fill="#6e6e73">CRD / Operator</text>

    <rect x="30" y="350" width="200" height="58" rx="9" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
    <text x="44" y="374" font-weight="600" fill="#1d1d1f">控制器管理器 + GC</text>
    <text x="44" y="394" fill="#6e6e73">编排 · leader · 级联删除</text>

    <rect x="250" y="350" width="640" height="58" rx="9" fill="#f5faf6" stroke="#cfe6d2"/>
    <text x="264" y="374" font-weight="600" fill="#1d8f3f">执行时机（第三维）</text>
    <text x="264" y="394" fill="#6e6e73">前台：API 请求同步路径（authn→authz→admission→存储）　vs　后台：各控制器循环 / GC / 节点心跳 / kube-proxy 同步</text>
  </g>

  <text x="30" y="440" font-size="11.5" fill="#a1a1a6">正交性：任一核心概念都唯一归位 —— ownerReference→GC、resourceVersion→存储/Informer、filter/score→调度器、SyncPod→kubelet</text>
  <path d="M460 102 L460 116" fill="none" stroke="#8944ab" stroke-width="1.4" marker-end="url(#ar)"/>
  <path d="M460 168 L460 182" fill="none" stroke="#8944ab" stroke-width="1.4" marker-end="url(#ar)"/>
</svg>
