<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="720" viewBox="0 0 1040 720" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1040" height="720" fill="#fbfbfd"/>
  <text x="40" y="34" font-size="15" font-weight="600" fill="#1d1d1f">Kubernetes 总架构 · 控制面 + 节点面 · 一切经 API Server 松耦合协作</text>

  <!-- 接口：客户端 -->
  <rect x="40" y="46" width="960" height="42" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="60" y="72" font-size="13" fill="#1b2a4a"><tspan font-weight="600">kubectl / client-go</tspan>　声明式 API 提交（只写 spec 期望态 · resourceVersion 乐观并发 · apply 幂等）</text>

  <!-- 控制面 -->
  <rect x="40" y="102" width="960" height="366" rx="14" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="58" y="126" font-size="13" font-weight="600" fill="#5b7db1">控制面　Control Plane（不接触真实容器 · 只读写对象）</text>

  <!-- API Server hub -->
  <rect x="64" y="140" width="560" height="98" rx="11" fill="#e9f0fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="80" y="162" font-size="13" font-weight="600" fill="#1b2a4a">kube-apiserver（唯一枢纽 · 唯一读写 etcd）</text>
  <rect x="80" y="172" width="168" height="54" rx="8" fill="#ffffff" stroke="#e6c9c2"/>
  <text x="164" y="195" font-size="11.5" fill="#8a3527" text-anchor="middle"><tspan font-weight="600">认证→授权→准入</tspan></text>
  <text x="164" y="213" font-size="10.5" fill="#6e6e73" text-anchor="middle">安全三关</text>
  <rect x="256" y="172" width="168" height="54" rx="8" fill="#ffffff" stroke="#ececef"/>
  <text x="340" y="195" font-size="11.5" fill="#1d1d1f" text-anchor="middle">REST 存储</text>
  <text x="340" y="213" font-size="10.5" fill="#6e6e73" text-anchor="middle">多版本转换</text>
  <rect x="432" y="172" width="176" height="54" rx="8" fill="#ffffff" stroke="#ececef"/>
  <text x="520" y="195" font-size="11.5" fill="#1d1d1f" text-anchor="middle">watch cache</text>
  <text x="520" y="213" font-size="10.5" fill="#6e6e73" text-anchor="middle">扇出变更给客户端</text>

  <!-- etcd -->
  <rect x="640" y="140" width="336" height="98" rx="11" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#soft)"/>
  <text x="656" y="164" font-size="13" font-weight="600" fill="#8a6d3b">etcd</text>
  <text x="656" y="187" font-size="11.5" fill="#6e6e73">全量声明态存储 · 唯一有状态后端</text>
  <text x="656" y="208" font-size="11.5" fill="#6e6e73">revision = resourceVersion</text>
  <text x="656" y="228" font-size="11.5" fill="#6e6e73">事务写 · 读-改-写乐观并发</text>

  <!-- controller-manager frame -->
  <rect x="64" y="256" width="560" height="198" rx="12" fill="#faf4fb" stroke="#e4cdea"/>
  <text x="80" y="278" font-size="12.5" font-weight="600" fill="#8944ab">kube-controller-manager（几十个控制器 · 共享 Informer · leader 选举单实例）</text>
  <rect x="80" y="288" width="256" height="72" rx="9" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
  <text x="96" y="310" font-size="12.5" font-weight="600" fill="#1d1d1f">Informer / Watch</text>
  <text x="96" y="331" font-size="11" fill="#6e6e73">Reflector→DeltaFIFO→Indexer</text>
  <text x="96" y="349" font-size="11" fill="#6e6e73">本地缓存 + 增量事件</text>
  <rect x="352" y="288" width="256" height="72" rx="9" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
  <text x="368" y="310" font-size="12.5" font-weight="600" fill="#8944ab">syncHandler（reconcile ★）</text>
  <text x="368" y="331" font-size="11" fill="#6e6e73">读缓存对比 spec 与实际</text>
  <text x="368" y="349" font-size="11" fill="#6e6e73">执行差异 · 写回 API Server</text>
  <rect x="80" y="368" width="256" height="76" rx="9" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
  <text x="96" y="390" font-size="12.5" font-weight="600" fill="#1d1d1f">workqueue</text>
  <text x="96" y="410" font-size="11" fill="#6e6e73">去重 + 限速 + 退避重试</text>
  <text x="96" y="428" font-size="11" fill="#6e6e73">event 只是唤醒（level-triggered）</text>
  <rect x="352" y="368" width="256" height="76" rx="9" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
  <text x="368" y="390" font-size="12.5" font-weight="600" fill="#1d1d1f">控制器管理器 + GC</text>
  <text x="368" y="410" font-size="11" fill="#6e6e73">ownerReferences 级联删除</text>
  <text x="368" y="428" font-size="11" fill="#6e6e73">finalizers 删除前钩子</text>
  <path d="M336 324 L352 324" fill="none" stroke="#8944ab" stroke-width="1.4" marker-end="url(#ar)"/>
  <path d="M208 360 L208 368" fill="none" stroke="#8944ab" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- scheduler -->
  <rect x="640" y="256" width="336" height="92" rx="11" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
  <text x="656" y="279" font-size="13" font-weight="600" fill="#1d1d1f">kube-scheduler</text>
  <text x="656" y="301" font-size="11.5" fill="#6e6e73">给未绑定 Pod 选节点</text>
  <text x="656" y="321" font-size="11.5" fill="#6e6e73">filter → score → bind</text>
  <text x="656" y="340" font-size="11.5" fill="#6e6e73">写 pod.spec.nodeName</text>

  <!-- CRD -->
  <rect x="640" y="362" width="336" height="92" rx="11" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
  <text x="656" y="385" font-size="13" font-weight="600" fill="#1d1d1f">扩展机制 CRD / Operator</text>
  <text x="656" y="407" font-size="11.5" fill="#6e6e73">注册新资源类型 + 自定义控制器</text>
  <text x="656" y="427" font-size="11.5" fill="#6e6e73">复用同一 reconcile 骨架</text>
  <text x="656" y="446" font-size="11.5" fill="#6e6e73">webhook / 调度插件 / 驱动可插拔</text>

  <!-- 节点面 -->
  <rect x="40" y="484" width="960" height="204" rx="14" fill="#f5faf6" stroke="#cfe6d2"/>
  <text x="58" y="508" font-size="13" font-weight="600" fill="#1d8f3f">节点面　Node（把期望 Pod 变成真实容器）</text>

  <rect x="64" y="520" width="296" height="150" rx="11" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
  <text x="80" y="544" font-size="13" font-weight="600" fill="#1d1d1f">kubelet + CRI</text>
  <text x="80" y="566" font-size="11.5" fill="#6e6e73">syncLoop 节点级 reconcile</text>
  <text x="80" y="586" font-size="11.5" fill="#6e6e73">SyncPod 重算容器差异</text>
  <text x="80" y="606" font-size="11.5" fill="#6e6e73">CRI → containerd</text>
  <text x="80" y="626" font-size="11.5" fill="#6e6e73">PLEG 感知容器状态</text>
  <text x="80" y="650" font-size="11.5" fill="#6e6e73">写回 Pod / Node status</text>

  <rect x="376" y="520" width="296" height="150" rx="11" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
  <text x="392" y="544" font-size="13" font-weight="600" fill="#1d1d1f">网络 kube-proxy + CNI</text>
  <text x="392" y="566" font-size="11.5" fill="#6e6e73">Service ClusterIP 虚 IP</text>
  <text x="392" y="586" font-size="11.5" fill="#6e6e73">EndpointSlice 当前后端</text>
  <text x="392" y="606" font-size="11.5" fill="#6e6e73">iptables/IPVS 整表重刷</text>
  <text x="392" y="626" font-size="11.5" fill="#6e6e73">CNI 分配可路由 Pod IP</text>
  <text x="392" y="650" font-size="11.5" fill="#6e6e73">Ingress L7 路由</text>

  <rect x="688" y="520" width="288" height="150" rx="11" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
  <text x="704" y="544" font-size="13" font-weight="600" fill="#1d1d1f">存储 CSI / PV / PVC</text>
  <text x="704" y="566" font-size="11.5" fill="#6e6e73">PVC 声明申领</text>
  <text x="704" y="586" font-size="11.5" fill="#6e6e73">PV 控制器绑定/动态供给</text>
  <text x="704" y="606" font-size="11.5" fill="#6e6e73">CSI: Provision→Attach→Mount</text>
  <text x="704" y="626" font-size="11.5" fill="#6e6e73">reclaimPolicy 回收</text>
  <text x="704" y="650" font-size="11.5" fill="#6e6e73">StorageClass 模板</text>

  <!-- connections -->
  <path d="M520 88 L520 140" fill="none" stroke="#b8b8bf" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <path d="M624 189 L640 189" fill="none" stroke="#b8b8bf" stroke-width="1.4" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <path d="M344 238 L344 256" fill="none" stroke="#b8b8bf" stroke-width="1.2" stroke-dasharray="4 3" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <text x="150" y="478" font-size="10.5" fill="#a1a1a6">节点经 API Server watch 拿到分给自己的 Pod / Service / 卷</text>
  <path d="M212 468 L212 520" fill="none" stroke="#b8b8bf" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <path d="M524 468 L524 520" fill="none" stroke="#b8b8bf" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <path d="M832 468 L832 520" fill="none" stroke="#b8b8bf" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ar)"/>
</svg>
