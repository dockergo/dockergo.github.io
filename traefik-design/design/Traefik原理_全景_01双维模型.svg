<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">双维模型 · 用「配置态(横)」×「运行平面(纵)」给 11 条主线归位</text>

  <!-- axes -->
  <line x1="120" y1="80" x2="120" y2="500" stroke="#d2d2d7"/>
  <line x1="120" y1="290" x2="920" y2="290" stroke="#d2d2d7"/>
  <text x="128" y="96" font-size="11" font-weight="600" fill="#5b7db1">控制面（后台 · 发现与装配）</text>
  <text x="128" y="514" font-size="11" font-weight="600" fill="#7a4d00">数据面（前台 · 每请求执行）</text>
  <text x="150" y="308" font-size="10.5" font-weight="600" fill="#6e6e73">静态（启动固化 · 改需重启）</text>
  <text x="770" y="308" font-size="10.5" font-weight="600" fill="#6e6e73">动态（运行时热更新）</text>

  <!-- 控制面·静态 -->
  <rect x="150" y="130" width="150" height="52" rx="11" fill="#f5f5f7" stroke="#d2d2d7" filter="url(#soft)"/>
  <text x="225" y="152" font-size="10.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">接触面 · 静态配置</text>
  <text x="225" y="170" font-size="8.5" fill="#6e6e73" text-anchor="middle">EntryPoints/Providers 声明</text>

  <!-- 控制面·动态 -->
  <rect x="470" y="118" width="160" height="52" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="550" y="140" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Provider 动态发现 ★灵魂</text>
  <text x="550" y="158" font-size="8.5" fill="#5b7db1" text-anchor="middle">从编排/文件/KV 自动聚合</text>

  <rect x="660" y="118" width="160" height="52" rx="11" fill="#e7eefb" stroke="#a9c2e8" filter="url(#soft)"/>
  <text x="740" y="140" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">热加载与配置 watch</text>
  <text x="740" y="158" font-size="8.5" fill="#5b7db1" text-anchor="middle">去重→合并→Switch 热替换</text>

  <rect x="565" y="196" width="160" height="48" rx="11" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="645" y="216" font-size="10.5" font-weight="600" fill="#0f5132" text-anchor="middle">TLS / ACME（证书装配）</text>
  <text x="645" y="233" font-size="8.5" fill="#3f8f66" text-anchor="middle">按发现域名自动签发续期</text>

  <!-- 跨面 · 动态配置模型（骑线） -->
  <rect x="330" y="264" width="200" height="52" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="430" y="286" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">接触面 · 动态配置模型</text>
  <text x="430" y="304" font-size="8.5" fill="#5b7db1" text-anchor="middle">EntryPoint→Router→MW→Service</text>

  <!-- 数据面·前台 pipeline -->
  <rect x="150" y="360" width="150" height="50" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="225" y="381" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">EntryPoint 监听</text>
  <text x="225" y="398" font-size="8.5" fill="#5b7db1" text-anchor="middle">TCP/UDP/HTTP3 收连接</text>

  <rect x="315" y="360" width="140" height="50" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="385" y="381" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Router 路由匹配</text>
  <text x="385" y="398" font-size="8.5" fill="#5b7db1" text-anchor="middle">rule + priority</text>

  <rect x="470" y="360" width="140" height="50" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="540" y="381" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Middleware 链</text>
  <text x="540" y="398" font-size="8.5" fill="#5b7db1" text-anchor="middle">alice 洋葱式加工</text>

  <rect x="625" y="360" width="150" height="50" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="700" y="381" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Service 负载均衡</text>
  <text x="700" y="398" font-size="8.5" fill="#5b7db1" text-anchor="middle">选后端 + 健康检查</text>

  <rect x="150" y="430" width="200" height="46" rx="11" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="250" y="450" font-size="10.5" font-weight="600" fill="#0f5132" text-anchor="middle">TLS（数据面 · 终止加密）</text>
  <text x="250" y="467" font-size="8.5" fill="#3f8f66" text-anchor="middle">SNI 握手选证书</text>

  <rect x="470" y="430" width="305" height="46" rx="11" fill="#f6eefb" stroke="#e0c9f0" filter="url(#soft)"/>
  <text x="622" y="450" font-size="10.5" font-weight="600" fill="#5b2a7a" text-anchor="middle">可观测性（前台埋点 + 后台上报）</text>
  <text x="622" y="467" font-size="8.5" fill="#8b5fb0" text-anchor="middle">Metrics / Tracing / AccessLog 横切全链路</text>

  <!-- flow arrows in data plane -->
  <line x1="300" y1="385" x2="313" y2="385" stroke="#b8b8bf" marker-end="url(#ar)"/>
  <line x1="455" y1="385" x2="468" y2="385" stroke="#b8b8bf" marker-end="url(#ar)"/>
  <line x1="610" y1="385" x2="623" y2="385" stroke="#b8b8bf" marker-end="url(#ar)"/>

  <text x="820" y="500" font-size="9" fill="#a1a1a6" text-anchor="middle">全景框架统领 · 灵魂=Provider 动态发现</text>
</svg>
