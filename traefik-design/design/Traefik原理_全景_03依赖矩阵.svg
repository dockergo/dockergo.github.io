<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
  </defs>
  <rect width="980" height="360" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">依赖矩阵 · 2 条接触面 × 8 支撑能力域（■强 ▨中 □弱）</text>

  <!-- column headers -->
  <text x="250" y="78" font-size="9.5" font-weight="600" fill="#5b7db1" text-anchor="middle">Provider</text>
  <text x="345" y="78" font-size="9.5" font-weight="600" fill="#5b7db1" text-anchor="middle">EntryPoint</text>
  <text x="440" y="78" font-size="9.5" font-weight="600" fill="#5b7db1" text-anchor="middle">Router</text>
  <text x="535" y="78" font-size="9.5" font-weight="600" fill="#5b7db1" text-anchor="middle">Middleware</text>
  <text x="630" y="78" font-size="9.5" font-weight="600" fill="#5b7db1" text-anchor="middle">Service</text>
  <text x="725" y="78" font-size="9.5" font-weight="600" fill="#5b7db1" text-anchor="middle">TLS/ACME</text>
  <text x="820" y="78" font-size="9.5" font-weight="600" fill="#5b7db1" text-anchor="middle">可观测</text>
  <text x="915" y="78" font-size="9.5" font-weight="600" fill="#5b7db1" text-anchor="middle">热加载</text>

  <!-- row 1: 静态配置 -->
  <text x="40" y="128" font-size="11" font-weight="600" fill="#1d1d1f">静态配置</text>
  <rect x="205" y="96" width="90" height="52" rx="8" fill="#5b7db1"/><text x="250" y="126" font-size="9" fill="#fff" text-anchor="middle">启用/选型 ■</text>
  <rect x="300" y="96" width="90" height="52" rx="8" fill="#5b7db1"/><text x="345" y="126" font-size="9" fill="#fff" text-anchor="middle">定义端口 ■</text>
  <rect x="395" y="96" width="90" height="52" rx="8" fill="#dbe6f5"/><text x="440" y="126" font-size="9" fill="#1b2a4a" text-anchor="middle">默认 ep □</text>
  <rect x="490" y="96" width="90" height="52" rx="8" fill="#aecbe8"/><text x="535" y="126" font-size="9" fill="#1b2a4a" text-anchor="middle">ep 默认链 ▨</text>
  <rect x="585" y="96" width="90" height="52" rx="8" fill="#eef3fb"/><text x="630" y="126" font-size="9" fill="#8fa9cf" text-anchor="middle">— □</text>
  <rect x="680" y="96" width="90" height="52" rx="8" fill="#aecbe8"/><text x="725" y="126" font-size="9" fill="#1b2a4a" text-anchor="middle">默认TLS ▨</text>
  <rect x="775" y="96" width="90" height="52" rx="8" fill="#5b7db1"/><text x="820" y="126" font-size="9" fill="#fff" text-anchor="middle">全局开关 ■</text>
  <rect x="870" y="96" width="90" height="52" rx="8" fill="#eef3fb"/><text x="915" y="126" font-size="9" fill="#8fa9cf" text-anchor="middle">不参与 □</text>

  <!-- row 2: 动态配置 -->
  <text x="40" y="188" font-size="11" font-weight="600" fill="#1d1d1f">动态配置</text>
  <rect x="205" y="156" width="90" height="52" rx="8" fill="#5b7db1"/><text x="250" y="186" font-size="9" fill="#fff" text-anchor="middle">产出源 ■</text>
  <rect x="300" y="156" width="90" height="52" rx="8" fill="#aecbe8"/><text x="345" y="186" font-size="9" fill="#1b2a4a" text-anchor="middle">router 引用 ▨</text>
  <rect x="395" y="156" width="90" height="52" rx="8" fill="#5b7db1"/><text x="440" y="186" font-size="9" fill="#fff" text-anchor="middle">rule/优先级 ■</text>
  <rect x="490" y="156" width="90" height="52" rx="8" fill="#5b7db1"/><text x="535" y="186" font-size="9" fill="#fff" text-anchor="middle">router 挂链 ■</text>
  <rect x="585" y="156" width="90" height="52" rx="8" fill="#5b7db1"/><text x="630" y="186" font-size="9" fill="#fff" text-anchor="middle">LB/健康 ■</text>
  <rect x="680" y="156" width="90" height="52" rx="8" fill="#5b7db1"/><text x="725" y="186" font-size="9" fill="#fff" text-anchor="middle">router.tls ■</text>
  <rect x="775" y="156" width="90" height="52" rx="8" fill="#aecbe8"/><text x="820" y="186" font-size="9" fill="#1b2a4a" text-anchor="middle">router 级 ▨</text>
  <rect x="870" y="156" width="90" height="52" rx="8" fill="#5b7db1"/><text x="915" y="186" font-size="9" fill="#fff" text-anchor="middle">被热更新 ■</text>

  <text x="40" y="250" font-size="10.5" fill="#6e6e73">读法：动态配置这一行几乎列列强依赖——因为 Provider 产出的动态配置</text>
  <text x="40" y="270" font-size="10.5" fill="#6e6e73">正是「Router/Middleware/Service/TLS」的真源，且每次变更都经「热加载」通道生效。</text>
  <text x="40" y="296" font-size="10.5" fill="#6e6e73">静态配置只在启动期立骨架（端口、启用哪些 Provider、全局观测开关），运行期不再改动。</text>
  <text x="40" y="322" font-size="10" fill="#a1a1a6">灵魂列 = Provider（两行皆强）；灵魂通道 = 热加载（动态配置的唯一生效路径）。</text>
</svg>
