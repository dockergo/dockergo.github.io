<svg xmlns="http://www.w3.org/2000/svg" width="960" height="470" viewBox="0 0 960 470"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">EntryPoint 监听与协议 · 一个端口的 TCP/UDP 监听 + TLS 终止 + HTTP/1·2·3 分流</text>

  <!-- entrypoint config -->
  <rect x="30" y="58" width="200" height="120" rx="12" fill="#f5f5f7" stroke="#d2d2d7" filter="url(#soft)"/>
  <text x="130" y="82" font-size="10.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">EntryPoint（静态定义）</text>
  <text x="130" y="104" font-size="9" fill="#6e6e73" text-anchor="middle">address = :443/tcp</text>
  <text x="130" y="122" font-size="9" fill="#6e6e73" text-anchor="middle">http/http2/http3/udp</text>
  <text x="130" y="140" font-size="9" fill="#6e6e73" text-anchor="middle">asDefault / reusePort</text>
  <text x="130" y="158" font-size="9" fill="#6e6e73" text-anchor="middle">forwardedHeaders / proxyProtocol</text>
  <text x="130" y="172" font-size="7.5" fill="#a1a1a6" text-anchor="middle">entrypoints.go:25</text>

  <line x1="230" y1="118" x2="266" y2="118" stroke="#b8b8bf" marker-end="url(#ar)"/>

  <!-- TCPEntryPoint -->
  <rect x="268" y="58" width="300" height="240" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="418" y="82" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">TCPEntryPoint（tcp.go:170）</text>
  <rect x="286" y="96" width="264" height="40" rx="9" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="418" y="114" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">net.Listener（绑端口）</text>
  <text x="418" y="129" font-size="8" fill="#5b7db1" text-anchor="middle">Accept 连接循环</text>

  <rect x="286" y="144" width="264" height="46" rx="9" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="418" y="163" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">tcprouter（SNI/HostSNI 分流）</text>
  <text x="418" y="179" font-size="8" fill="#5b7db1" text-anchor="middle">先 TCP 路由：TLS 终止？直通？</text>

  <rect x="286" y="198" width="128" height="46" rx="9" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="350" y="217" font-size="9" font-weight="600" fill="#0f5132" text-anchor="middle">TLS 终止</text>
  <text x="350" y="233" font-size="7.5" fill="#3f8f66" text-anchor="middle">SNI 选证书</text>
  <rect x="422" y="198" width="128" height="46" rx="9" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="486" y="217" font-size="9" font-weight="600" fill="#1b2a4a" text-anchor="middle">httpForwarder</text>
  <text x="486" y="233" font-size="7.5" fill="#5b7db1" text-anchor="middle">桥接到 http.Server</text>

  <rect x="286" y="252" width="264" height="36" rx="9" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="418" y="274" font-size="9" fill="#1b2a4a" text-anchor="middle">httpServer / httpsServer（Go net/http）</text>

  <line x1="568" y1="230" x2="604" y2="230" stroke="#b8b8bf" marker-end="url(#ar)"/>
  <text x="586" y="222" font-size="8" fill="#8a8a8e" text-anchor="middle">HTTP</text>

  <!-- to router -->
  <rect x="606" y="200" width="150" height="60" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="681" y="224" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">HTTP Router</text>
  <text x="681" y="242" font-size="8" fill="#5b7db1" text-anchor="middle">rule 匹配（下一域）</text>

  <!-- HTTP3 -->
  <rect x="606" y="58" width="324" height="60" rx="11" fill="#f6eefb" stroke="#e0c9f0" filter="url(#soft)"/>
  <text x="768" y="82" font-size="10.5" font-weight="600" fill="#5b2a7a" text-anchor="middle">HTTP/3 = UDP + QUIC（quic-go）</text>
  <text x="768" y="102" font-size="8.5" fill="#8b5fb0" text-anchor="middle">http3server 单独 UDP PacketConn，与 :443 TCP 并行 · http3.go:21/65</text>

  <!-- UDP entrypoint -->
  <rect x="606" y="130" width="324" height="56" rx="11" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="768" y="152" font-size="10.5" font-weight="600" fill="#7a4d00" text-anchor="middle">UDPEntryPoint（address = :53/udp）</text>
  <text x="768" y="171" font-size="8.5" fill="#9a7328" text-anchor="middle">udprouter 按会话分流 → UDP Service · server_entrypoint_udp.go</text>

  <!-- hot swap -->
  <rect x="30" y="320" width="900" height="130" rx="12" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="50" y="344" font-size="11" font-weight="600" fill="#0f5132">热替换路由表：Switch() 不重开监听</text>
  <text x="50" y="368" font-size="9.5" fill="#3f8f66">· 配置变更时，TCPEntryPoints.Switch(routersTCP) 只替换 tcprouter 内部的路由表指针（tcp.go:163）；</text>
  <text x="50" y="388" font-size="9.5" fill="#3f8f66">· 底层 net.Listener 与已建立连接不动——端口不重开、连接不中断、无 reload 停顿；</text>
  <text x="50" y="408" font-size="9.5" fill="#3f8f66">· 对比 nginx：reload 要 fork 新 worker 接管新连接、旧 worker 优雅退出；Traefik 只换内存里的路由表。</text>
  <text x="50" y="430" font-size="9" fill="#5aa06f">· 启动顺序：Server.Start 先起 tcp/udp EntryPoints，再起 ConfigurationWatcher（server.go:56-58）。</text>
</svg>
