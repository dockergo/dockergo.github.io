<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="460" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Service 负载均衡 · 4 种 server 级策略 + 3 种 service 级组合</text>

  <!-- ServersLoadBalancer -->
  <rect x="30" y="56" width="900" height="176" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="50" y="80" font-size="11" font-weight="600" fill="#1b2a4a">ServersLoadBalancer（server 级 · http_config.go:383）· strategy = wrr(默认)/p2c/hrw/leasttime</text>

  <rect x="46" y="94" width="210" height="126" rx="10" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="151" y="116" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">wrr（默认 · EDF）</text>
  <text x="151" y="136" font-size="8.5" fill="#5b7db1" text-anchor="middle">最早截止时间优先</text>
  <text x="151" y="152" font-size="8.5" fill="#5b7db1" text-anchor="middle">deadline += 1/weight</text>
  <text x="151" y="168" font-size="8.5" fill="#5b7db1" text-anchor="middle">堆取最小 deadline</text>
  <text x="151" y="186" font-size="8.5" fill="#5b7db1" text-anchor="middle">平滑加权轮询</text>
  <text x="151" y="208" font-size="7.5" fill="#8fa9cf" text-anchor="middle">wrr.go:212/240</text>

  <rect x="266" y="94" width="210" height="126" rx="10" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="371" y="116" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">p2c（二选一）</text>
  <text x="371" y="136" font-size="8.5" fill="#5b7db1" text-anchor="middle">随机取 2 个后端</text>
  <text x="371" y="152" font-size="8.5" fill="#5b7db1" text-anchor="middle">选当前连接更少者</text>
  <text x="371" y="168" font-size="8.5" fill="#5b7db1" text-anchor="middle">近似最少连接</text>
  <text x="371" y="186" font-size="8.5" fill="#5b7db1" text-anchor="middle">大规模后端友好</text>
  <text x="371" y="208" font-size="7.5" fill="#8fa9cf" text-anchor="middle">p2c/p2c.go</text>

  <rect x="486" y="94" width="210" height="126" rx="10" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="591" y="116" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">hrw（最高随机权重）</text>
  <text x="591" y="136" font-size="8.5" fill="#5b7db1" text-anchor="middle">按 key 哈希打分</text>
  <text x="591" y="152" font-size="8.5" fill="#5b7db1" text-anchor="middle">同 key 稳定落同后端</text>
  <text x="591" y="168" font-size="8.5" fill="#5b7db1" text-anchor="middle">会话保持</text>
  <text x="591" y="186" font-size="8.5" fill="#5b7db1" text-anchor="middle">后端增减重分布少</text>
  <text x="591" y="208" font-size="7.5" fill="#8fa9cf" text-anchor="middle">loadbalancer/hrw</text>

  <rect x="706" y="94" width="208" height="126" rx="10" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="810" y="116" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">leasttime</text>
  <text x="810" y="136" font-size="8.5" fill="#5b7db1" text-anchor="middle">选响应最快后端</text>
  <text x="810" y="152" font-size="8.5" fill="#5b7db1" text-anchor="middle">适合耗时不均</text>
  <text x="810" y="176" font-size="8.5" fill="#5b7db1" text-anchor="middle">另有 sticky cookie</text>
  <text x="810" y="192" font-size="8.5" fill="#5b7db1" text-anchor="middle">会话保持（正交于策略）</text>
  <text x="810" y="210" font-size="7.5" fill="#8fa9cf" text-anchor="middle">loadbalancer/leasttime</text>

  <!-- service-level composition -->
  <text x="30" y="262" font-size="11" font-weight="600" fill="#5b7db1">Service 级组合（对多个 Service 而非 server 操作）</text>

  <rect x="30" y="276" width="290" height="150" rx="11" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="175" y="298" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">weighted（WRR）</text>
  <text x="175" y="320" font-size="8.5" fill="#3f8f66" text-anchor="middle">对多个 Service 按权重轮询</text>
  <text x="175" y="338" font-size="8.5" fill="#3f8f66" text-anchor="middle">灰度/金丝雀：svcA:9 svcB:1</text>
  <text x="175" y="360" font-size="8.5" fill="#3f8f66" text-anchor="middle">可嵌套（子 Service 再是 LB）</text>
  <text x="175" y="392" font-size="8" fill="#5aa06f" text-anchor="middle">http_config.go:252</text>

  <rect x="335" y="276" width="290" height="150" rx="11" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="480" y="298" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">mirroring（流量镜像）</text>
  <text x="480" y="320" font-size="8.5" fill="#9a7328" text-anchor="middle">主 Service 正常返回</text>
  <text x="480" y="338" font-size="8.5" fill="#9a7328" text-anchor="middle">按百分比复制流量到镜像</text>
  <text x="480" y="360" font-size="8.5" fill="#9a7328" text-anchor="middle">镜像响应丢弃（影子验证）</text>
  <text x="480" y="392" font-size="8" fill="#b08a3c" text-anchor="middle">http_config.go:202</text>

  <rect x="640" y="276" width="290" height="150" rx="11" fill="#fdecea" stroke="#f3c0b8" filter="url(#soft)"/>
  <text x="785" y="298" font-size="10" font-weight="600" fill="#8a2a1a" text-anchor="middle">failover（故障转移）</text>
  <text x="785" y="320" font-size="8.5" fill="#a24232" text-anchor="middle">主 Service 健康则用主</text>
  <text x="785" y="338" font-size="8.5" fill="#a24232" text-anchor="middle">主挂了自动切 fallback</text>
  <text x="785" y="360" font-size="8.5" fill="#a24232" text-anchor="middle">依赖健康检查判定</text>
  <text x="785" y="392" font-size="8" fill="#c06a58" text-anchor="middle">http_config.go:221</text>
</svg>
