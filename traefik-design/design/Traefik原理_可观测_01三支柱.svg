<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">可观测性 · Metrics / Tracing / AccessLog 以中间件形态包裹 EntryPoint→Router→Service 全链路</text>

  <!-- pipeline with observability wrap -->
  <rect x="30" y="60" width="900" height="90" rx="12" fill="#f6eefb" stroke="#e0c9f0" filter="url(#soft)"/>
  <text x="50" y="84" font-size="10.5" font-weight="600" fill="#5b2a7a">observability 中间件在每层埋点（pkg/middlewares/observability）</text>

  <rect x="60" y="98" width="150" height="38" rx="9" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="135" y="122" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">EntryPoint 级</text>
  <line x1="210" y1="117" x2="240" y2="117" stroke="#b8b8bf" marker-end="url(#ar)"/>
  <rect x="242" y="98" width="150" height="38" rx="9" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="317" y="122" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Router 级</text>
  <line x1="392" y1="117" x2="422" y2="117" stroke="#b8b8bf" marker-end="url(#ar)"/>
  <rect x="424" y="98" width="150" height="38" rx="9" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="499" y="122" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Middleware 级</text>
  <line x1="574" y1="117" x2="604" y2="117" stroke="#b8b8bf" marker-end="url(#ar)"/>
  <rect x="606" y="98" width="150" height="38" rx="9" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="681" y="122" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Service 级</text>
  <text x="820" y="122" font-size="8.5" fill="#8b5fb0" text-anchor="middle">semconv（OTel 语义约定）</text>

  <!-- three pillars -->
  <rect x="30" y="176" width="290" height="180" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="175" y="200" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">Metrics（指标）</text>
  <text x="175" y="224" font-size="9" fill="#5b7db1" text-anchor="middle">请求数/时延/状态码分布</text>
  <text x="175" y="244" font-size="9" fill="#5b7db1" text-anchor="middle">按 entrypoint/router/service 维度</text>
  <text x="175" y="264" font-size="9" fill="#5b7db1" text-anchor="middle">后端：Prometheus / OTLP</text>
  <text x="175" y="284" font-size="9" fill="#5b7db1" text-anchor="middle">Datadog / StatsD / InfluxDB2</text>
  <text x="175" y="308" font-size="9" fill="#5b7db1" text-anchor="middle">健康检查失败也计数</text>
  <text x="175" y="336" font-size="8" fill="#8fa9cf" text-anchor="middle">pkg/metrics</text>

  <rect x="335" y="176" width="290" height="180" rx="12" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="480" y="200" font-size="11" font-weight="600" fill="#0f5132" text-anchor="middle">Tracing（链路追踪）</text>
  <text x="480" y="224" font-size="9" fill="#3f8f66" text-anchor="middle">OpenTelemetry（OTel）</text>
  <text x="480" y="244" font-size="9" fill="#3f8f66" text-anchor="middle">每请求生成 span</text>
  <text x="480" y="264" font-size="9" fill="#3f8f66" text-anchor="middle">注入/透传 trace context</text>
  <text x="480" y="284" font-size="9" fill="#3f8f66" text-anchor="middle">与后端链路串联</text>
  <text x="480" y="308" font-size="9" fill="#3f8f66" text-anchor="middle">verbosity：minimal/detailed</text>
  <text x="480" y="336" font-size="8" fill="#5aa06f" text-anchor="middle">pkg/tracing · RouterObservabilityConfig</text>

  <rect x="640" y="176" width="290" height="180" rx="12" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="785" y="200" font-size="11" font-weight="600" fill="#7a4d00" text-anchor="middle">AccessLog（访问日志）</text>
  <text x="785" y="224" font-size="9" fill="#9a7328" text-anchor="middle">CommonFormat（CLF）</text>
  <text x="785" y="244" font-size="9" fill="#9a7328" text-anchor="middle">JSONFormat</text>
  <text x="785" y="264" font-size="9" fill="#9a7328" text-anchor="middle">记录时延/状态/后端/重试</text>
  <text x="785" y="284" font-size="9" fill="#9a7328" text-anchor="middle">字段可过滤/脱敏（redactor）</text>
  <text x="785" y="308" font-size="9" fill="#9a7328" text-anchor="middle">Rotate 支持日志切割</text>
  <text x="785" y="336" font-size="8" fill="#b08a3c" text-anchor="middle">accesslog/logger.go:38/45/311</text>

  <!-- note -->
  <rect x="30" y="372" width="900" height="52" rx="12" fill="#f5f5f7" stroke="#d2d2d7"/>
  <text x="50" y="394" font-size="9.5" fill="#6e6e73">· 全局开关在静态配置（metrics/tracing/accessLog）；可在 Router.observability 精细控制某路由是否记日志/指标/追踪（http_config.go）。</text>
  <text x="50" y="414" font-size="9.5" fill="#6e6e73">· 三者都以 alice 中间件形态挂在数据面各层，因此"包裹全链路"而不侵入业务逻辑；semconv 统一 OTel 语义标签。</text>
</svg>
