<svg xmlns="http://www.w3.org/2000/svg" width="960" height="450" viewBox="0 0 960 450"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="450" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">ACME 证书自动化 · 发现域名 → 三种挑战二选一 → 签发 → 落盘 → 到期自动续期</text>

  <!-- flow steps -->
  <rect x="30" y="64" width="150" height="80" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="105" y="90" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">① 发现域名</text>
  <text x="105" y="110" font-size="8.5" fill="#5b7db1" text-anchor="middle">监听动态配置</text>
  <text x="105" y="126" font-size="8.5" fill="#5b7db1" text-anchor="middle">Router.tls.certResolver</text>
  <text x="105" y="140" font-size="7.5" fill="#8fa9cf" text-anchor="middle">watchNewDomains:515</text>

  <line x1="180" y1="104" x2="216" y2="104" stroke="#b8b8bf" marker-end="url(#ar)"/>

  <rect x="218" y="64" width="150" height="80" rx="11" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="293" y="90" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">② 向 CA 申请</text>
  <text x="293" y="110" font-size="8.5" fill="#3f8f66" text-anchor="middle">lego 客户端</text>
  <text x="293" y="126" font-size="8.5" fill="#3f8f66" text-anchor="middle">Let's Encrypt 等</text>
  <text x="293" y="140" font-size="7.5" fill="#5aa06f" text-anchor="middle">getClient:276</text>

  <line x1="368" y1="104" x2="404" y2="104" stroke="#b8b8bf" marker-end="url(#ar)"/>

  <rect x="406" y="64" width="150" height="80" rx="11" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="481" y="90" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">③ 完成挑战</text>
  <text x="481" y="110" font-size="8.5" fill="#9a7328" text-anchor="middle">证明域名归属</text>
  <text x="481" y="126" font-size="8.5" fill="#9a7328" text-anchor="middle">三选一（见下）</text>
  <text x="481" y="140" font-size="7.5" fill="#b08a3c" text-anchor="middle">resolveCertificate:715</text>

  <line x1="556" y1="104" x2="592" y2="104" stroke="#b8b8bf" marker-end="url(#ar)"/>

  <rect x="594" y="64" width="150" height="80" rx="11" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="669" y="90" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">④ 签发 + 落盘</text>
  <text x="669" y="110" font-size="8.5" fill="#3f8f66" text-anchor="middle">存 acme.json</text>
  <text x="669" y="126" font-size="8.5" fill="#3f8f66" text-anchor="middle">存入证书库</text>
  <text x="669" y="140" font-size="7.5" fill="#5aa06f" text-anchor="middle">local_store.go</text>

  <line x1="744" y1="104" x2="780" y2="104" stroke="#b8b8bf" marker-end="url(#ar)"/>

  <rect x="782" y="64" width="148" height="80" rx="11" fill="#f6eefb" stroke="#e0c9f0" filter="url(#soft)"/>
  <text x="856" y="90" font-size="10" font-weight="600" fill="#5b2a7a" text-anchor="middle">⑤ 自动续期</text>
  <text x="856" y="110" font-size="8.5" fill="#8b5fb0" text-anchor="middle">到期前自动重签</text>
  <text x="856" y="126" font-size="8.5" fill="#8b5fb0" text-anchor="middle">ThrottleDuration 节流</text>
  <text x="856" y="140" font-size="7.5" fill="#a98bc5" text-anchor="middle">provider.go:231</text>

  <!-- challenge types -->
  <text x="30" y="184" font-size="11" font-weight="600" fill="#5b7db1">三种挑战（证明你控制该域名）</text>

  <rect x="30" y="198" width="290" height="130" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="175" y="220" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">HTTP-01</text>
  <text x="175" y="242" font-size="8.5" fill="#5b7db1" text-anchor="middle">CA 访问 /.well-known/acme-challenge/</text>
  <text x="175" y="260" font-size="8.5" fill="#5b7db1" text-anchor="middle">Traefik 在 :80 应答 token</text>
  <text x="175" y="280" font-size="8.5" fill="#5b7db1" text-anchor="middle">最简单，需 :80 可达</text>
  <text x="175" y="308" font-size="8" fill="#8fa9cf" text-anchor="middle">SetHTTP01Provider · :377</text>

  <rect x="335" y="198" width="290" height="130" rx="11" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="480" y="220" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">TLS-ALPN-01</text>
  <text x="480" y="242" font-size="8.5" fill="#3f8f66" text-anchor="middle">CA 用特殊 ALPN 在 :443 握手</text>
  <text x="480" y="260" font-size="8.5" fill="#3f8f66" text-anchor="middle">Traefik 返回验证证书</text>
  <text x="480" y="280" font-size="8.5" fill="#3f8f66" text-anchor="middle">只需 :443，无需 :80</text>
  <text x="480" y="308" font-size="8" fill="#5aa06f" text-anchor="middle">SetTLSALPN01Provider · :386</text>

  <rect x="640" y="198" width="290" height="130" rx="11" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="785" y="220" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">DNS-01</text>
  <text x="785" y="242" font-size="8.5" fill="#9a7328" text-anchor="middle">在 DNS 加 TXT 记录验证</text>
  <text x="785" y="260" font-size="8.5" fill="#9a7328" text-anchor="middle">经 DNS provider API 自动写入</text>
  <text x="785" y="280" font-size="8.5" fill="#9a7328" text-anchor="middle">唯一支持通配符 *.x.com</text>
  <text x="785" y="308" font-size="8" fill="#b08a3c" text-anchor="middle">SetDNS01Provider · :359</text>

  <!-- note -->
  <rect x="30" y="348" width="900" height="86" rx="12" fill="#f5f5f7" stroke="#d2d2d7"/>
  <text x="50" y="372" font-size="10.5" font-weight="600" fill="#1d1d1f">ACME 作为一个特殊 Provider</text>
  <text x="50" y="394" font-size="9.5" fill="#6e6e73">· 它既 Provide 配置（把签好的证书推回，acme/provider.go:237），又 ListenConfiguration 消费配置（从 Router 发现要签的域名）。</text>
  <text x="50" y="414" font-size="9.5" fill="#6e6e73">· certResolver 在静态配置定义（CA 地址、账户、挑战方式），Router 用 tls.certResolver 引用触发签发——发现驱动、全自动。</text>
</svg>
