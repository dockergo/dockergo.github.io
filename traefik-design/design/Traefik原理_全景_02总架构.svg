<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="720" viewBox="0 0 1000 720"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1000" height="720" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="600" fill="#1d1d1f">Traefik 项目总架构 · 控制面(动态发现→热加载) 与 数据面(EntryPoint→Router→Middleware→Service)</text>

  <!-- ⓪ 静态配置带 -->
  <rect x="20" y="46" width="960" height="46" rx="10" fill="#f5f5f7" stroke="#d2d2d7" filter="url(#soft)"/>
  <text x="36" y="69" font-size="12" font-weight="600" fill="#1d1d1f">⓪ 静态配置 · traefik.yml / CLI / env</text>
  <text x="36" y="85" font-size="10" fill="#6e6e73">EntryPoints 定义 · Providers 启用 · 全局参数（日志/API/证书解析器）— 变更需重启进程　static_config.go:86</text>

  <!-- ① 控制面 -->
  <rect x="20" y="104" width="960" height="248" rx="14" fill="none" stroke="#cfd6e0" stroke-dasharray="5 4"/>
  <text x="34" y="124" font-size="12" font-weight="600" fill="#5b7db1">① 配置控制面 · 动态发现 → 热加载（无需 reload）</text>

  <!-- Providers -->
  <rect x="38" y="138" width="196" height="196" rx="12" fill="#f5f5f7" stroke="#d2d2d7" filter="url(#soft)"/>
  <text x="136" y="160" font-size="11.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">Providers · 20+ 配置源</text>
  <text x="136" y="182" font-size="9" fill="#6e6e73" text-anchor="middle">Docker / Swarm</text>
  <text x="136" y="200" font-size="9" fill="#6e6e73" text-anchor="middle">Kubernetes CRD·Ingress·Gateway</text>
  <text x="136" y="218" font-size="9" fill="#6e6e73" text-anchor="middle">File（fsnotify 监听）</text>
  <text x="136" y="236" font-size="9" fill="#6e6e73" text-anchor="middle">Consul·Etcd·ZooKeeper·Redis</text>
  <text x="136" y="254" font-size="9" fill="#6e6e73" text-anchor="middle">Nomad · ECS · HTTP · Rest</text>
  <text x="136" y="272" font-size="9" fill="#6e6e73" text-anchor="middle">ACME（证书 provider）</text>
  <text x="136" y="294" font-size="9" fill="#8a8a8e" text-anchor="middle">各自 Provide() 推 Message</text>
  <text x="136" y="312" font-size="8" fill="#a1a1a6" text-anchor="middle">provider.go:9 · aggregator.go:63</text>

  <!-- Aggregator -->
  <rect x="262" y="170" width="168" height="128" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="346" y="194" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">Provider Aggregator</text>
  <text x="346" y="216" font-size="9" fill="#5b7db1" text-anchor="middle">每 provider 独立 goroutine</text>
  <text x="346" y="234" font-size="9" fill="#5b7db1" text-anchor="middle">Throttle 去抖（ringChannel）</text>
  <text x="346" y="252" font-size="9" fill="#5b7db1" text-anchor="middle">汇入 dynamic.Message 通道</text>
  <text x="346" y="282" font-size="8" fill="#8fa9cf" text-anchor="middle">aggregator.go:178 · :32</text>

  <!-- Watcher -->
  <rect x="458" y="150" width="232" height="170" rx="12" fill="#e7eefb" stroke="#a9c2e8" filter="url(#soft)"/>
  <text x="574" y="173" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">ConfigurationWatcher</text>
  <text x="574" y="195" font-size="9.5" font-weight="600" fill="#3a5a86" text-anchor="middle">receiveConfigurations</text>
  <text x="574" y="212" font-size="9" fill="#5b7db1" text-anchor="middle">按 provider 存最新 + DeepEqual 去重</text>
  <text x="574" y="234" font-size="9.5" font-weight="600" fill="#3a5a86" text-anchor="middle">applyConfigurations</text>
  <text x="574" y="251" font-size="9" fill="#5b7db1" text-anchor="middle">merge + applyModel + resolveTLS</text>
  <text x="574" y="269" font-size="9" fill="#5b7db1" text-anchor="middle">达 requiredProvider 才应用</text>
  <text x="574" y="291" font-size="9" fill="#5b7db1" text-anchor="middle">listener(conf) 通知重建</text>
  <text x="574" y="311" font-size="8" fill="#8fa9cf" text-anchor="middle">configurationwatcher.go:94 / 157</text>

  <!-- Hot swap -->
  <rect x="716" y="170" width="250" height="128" rx="12" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="841" y="194" font-size="11" font-weight="600" fill="#7a4d00" text-anchor="middle">热替换 · 进程不重启</text>
  <text x="841" y="216" font-size="9" fill="#9a7328" text-anchor="middle">重建 Router / Middleware / Service</text>
  <text x="841" y="234" font-size="9" fill="#9a7328" text-anchor="middle">RouterFactory.CreateRouters</text>
  <text x="841" y="252" font-size="9" fill="#9a7328" text-anchor="middle">EntryPoint.Switch() 换路由表</text>
  <text x="841" y="282" font-size="8" fill="#b08a3c" text-anchor="middle">routerfactory.go:101 · tcp.go:163</text>

  <!-- control arrows -->
  <line x1="234" y1="234" x2="260" y2="234" stroke="#b8b8bf" marker-end="url(#ar)"/>
  <line x1="430" y1="234" x2="456" y2="235" stroke="#b8b8bf" marker-end="url(#ar)"/>
  <line x1="690" y1="235" x2="714" y2="234" stroke="#b8b8bf" marker-end="url(#ar)"/>

  <!-- ② 数据面 -->
  <rect x="20" y="366" width="960" height="344" rx="14" fill="none" stroke="#cfd6e0" stroke-dasharray="5 4"/>
  <rect x="20" y="366" width="960" height="30" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="34" y="386" font-size="12" font-weight="600" fill="#1b2a4a">② 请求数据面 · 动态配置模型：EntryPoint → Router → Middleware → Service</text>

  <!-- Client -->
  <rect x="30" y="470" width="80" height="80" rx="12" fill="#f5f5f7" stroke="#d2d2d7"/>
  <text x="70" y="504" font-size="10.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">客户端</text>
  <text x="70" y="522" font-size="8.5" fill="#6e6e73" text-anchor="middle">HTTP/1·2·3</text>
  <text x="70" y="538" font-size="8.5" fill="#6e6e73" text-anchor="middle">TCP / UDP</text>

  <!-- EntryPoint -->
  <rect x="138" y="440" width="150" height="150" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="213" y="464" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">EntryPoint</text>
  <text x="213" y="486" font-size="9" fill="#5b7db1" text-anchor="middle">监听 :80/:443/:8443</text>
  <text x="213" y="504" font-size="9" fill="#5b7db1" text-anchor="middle">TCP / UDP</text>
  <text x="213" y="522" font-size="9" fill="#5b7db1" text-anchor="middle">HTTP/3 = quic-go</text>
  <text x="213" y="540" font-size="9" fill="#5b7db1" text-anchor="middle">httpForwarder 桥接</text>
  <text x="213" y="566" font-size="8" fill="#8fa9cf" text-anchor="middle">tcp.go:170 / http3:21</text>

  <!-- Router -->
  <rect x="316" y="440" width="150" height="150" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="391" y="464" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">Router</text>
  <text x="391" y="486" font-size="9" fill="#5b7db1" text-anchor="middle">rule 匹配</text>
  <text x="391" y="504" font-size="9" fill="#5b7db1" text-anchor="middle">Host()/Path()/…</text>
  <text x="391" y="522" font-size="9" fill="#5b7db1" text-anchor="middle">&amp;&amp; || ! (predicate)</text>
  <text x="391" y="540" font-size="9" fill="#5b7db1" text-anchor="middle">priority = len(rule)</text>
  <text x="391" y="566" font-size="8" fill="#8fa9cf" text-anchor="middle">muxer.go:75 / :216</text>

  <!-- Middleware -->
  <rect x="494" y="440" width="150" height="150" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="569" y="464" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">Middleware 链</text>
  <text x="569" y="486" font-size="9" fill="#5b7db1" text-anchor="middle">alice.Chain 洋葱式</text>
  <text x="569" y="504" font-size="9" fill="#5b7db1" text-anchor="middle">auth/headers/ratelimit</text>
  <text x="569" y="522" font-size="9" fill="#5b7db1" text-anchor="middle">retry/circuitbreaker</text>
  <text x="569" y="540" font-size="9" fill="#5b7db1" text-anchor="middle">39 类可组合</text>
  <text x="569" y="566" font-size="8" fill="#8fa9cf" text-anchor="middle">middlewares.go:65</text>

  <!-- Service -->
  <rect x="672" y="440" width="150" height="150" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="747" y="464" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">Service</text>
  <text x="747" y="486" font-size="9" fill="#5b7db1" text-anchor="middle">负载均衡</text>
  <text x="747" y="504" font-size="9" fill="#5b7db1" text-anchor="middle">wrr(EDF)/p2c/hrw</text>
  <text x="747" y="522" font-size="9" fill="#5b7db1" text-anchor="middle">健康检查 主动+被动</text>
  <text x="747" y="540" font-size="9" fill="#5b7db1" text-anchor="middle">重试/镜像/故障转移</text>
  <text x="747" y="566" font-size="8" fill="#8fa9cf" text-anchor="middle">wrr.go / healthcheck.go</text>

  <!-- Backends -->
  <rect x="850" y="470" width="120" height="80" rx="12" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="910" y="504" font-size="10.5" font-weight="600" fill="#7a4d00" text-anchor="middle">后端 Servers</text>
  <text x="910" y="522" font-size="8.5" fill="#9a7328" text-anchor="middle">URL 池</text>
  <text x="910" y="538" font-size="8.5" fill="#9a7328" text-anchor="middle">passHostHeader</text>

  <!-- data arrows -->
  <line x1="110" y1="510" x2="136" y2="510" stroke="#b8b8bf" marker-end="url(#ar)"/>
  <line x1="288" y1="510" x2="314" y2="510" stroke="#b8b8bf" marker-end="url(#ar)"/>
  <line x1="466" y1="510" x2="492" y2="510" stroke="#b8b8bf" marker-end="url(#ar)"/>
  <line x1="644" y1="510" x2="670" y2="510" stroke="#b8b8bf" marker-end="url(#ar)"/>
  <line x1="822" y1="510" x2="848" y2="510" stroke="#b8b8bf" marker-end="url(#ar)"/>

  <!-- hot-swap → routing table (dashed) -->
  <path d="M841,298 C841,352 391,352 391,438" fill="none" stroke="#e9b949" stroke-dasharray="4 4" marker-end="url(#ar)"/>
  <text x="600" y="348" font-size="8.5" fill="#b08a3c" text-anchor="middle">热替换路由表（Switch）</text>

  <!-- TLS/ACME strip -->
  <rect x="138" y="608" width="328" height="46" rx="10" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="150" y="628" font-size="10.5" font-weight="600" fill="#0f5132">TLS / ACME 证书自动化</text>
  <text x="150" y="644" font-size="8.5" fill="#3f8f66">SNI 选证书(GetBestCertificate) · ACME HTTP-01/TLS-ALPN-01/DNS-01 自动签发续期</text>

  <!-- Observability strip -->
  <rect x="494" y="608" width="476" height="46" rx="10" fill="#f6eefb" stroke="#e0c9f0"/>
  <text x="506" y="628" font-size="10.5" font-weight="600" fill="#5b2a7a">可观测性 · 包裹全链路</text>
  <text x="506" y="644" font-size="8.5" fill="#8b5fb0">Metrics(Prometheus/OTLP) · Tracing(OpenTelemetry) · AccessLog(CLF/JSON)</text>

  <text x="500" y="694" font-size="9" fill="#a1a1a6" text-anchor="middle">Traefik v3（module .../v3，codename cheddar）· 所有 file:line 回本地源码核实</text>
</svg>
