<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="830" viewBox="0 0 1120 830"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#1d1d1f" flood-opacity="0.06"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="ar-hot" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#0a84ff"/></marker>
    <marker id="ar-ctrl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#a78bfa"/></marker>
    <marker id="ar-state" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#1aa89a"/></marker>
    <marker id="ar-fail" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#e0742a"/></marker>
  </defs>

  <rect width="1120" height="830" fill="#fbfbfd"/>

  <!-- 标题条 = 全景主线框架下钻（点标题→总览） -->
  <rect x="0" y="0" width="1120" height="74" fill="none" stroke="none" data-tid="Traefik原理_全景主线框架" data-lab="全景主线框架"/>
  <text x="40" y="38" font-size="16" font-weight="700" fill="#1d1d1f">Traefik · 反向代理机器剖面 <tspan font-size="11" font-weight="500" fill="#86868b">v3 · module .../v3</tspan></text>
  <text x="40" y="60" font-size="11" fill="#6e6e73">设计张力：动态发现的<tspan font-weight="600" fill="#1d1d1f">灵活</tspan> vs 配置切换的<tspan font-weight="600" fill="#1d1d1f">一致</tspan> —— 控制面异步聚合去抖，数据面原子热替换，进程不重启</text>

  <!-- ⓪ 静态配置带 -->
  <rect x="40" y="86" width="1040" height="42" rx="10" fill="#f5f5f7" stroke="#d8d8dc" filter="url(#soft)" data-tid="Traefik原理_接触面_静态配置" data-lab="静态配置"/>
  <text x="58" y="107" font-size="12" font-weight="600" fill="#1d1d1f">⓪ Static Config · traefik.yml / CLI / env</text>
  <text x="58" y="121" font-size="9.5" fill="#6e6e73">EntryPoints 定义 · Providers 启用 · 全局项（日志/API/证书解析器）— 启动固化，改需重启进程　static_config.go:86</text>

  <!-- ① 控制面 · 紫虚线域 -->
  <rect x="40" y="146" width="1040" height="212" rx="14" fill="none" stroke="#a78bfa" stroke-opacity="0.5" stroke-dasharray="6 4"/>
  <circle cx="58" cy="168" r="3.5" fill="#a78bfa"/>
  <text x="70" y="172" font-size="12" font-weight="600" fill="#7c5cd6">① 控制面 · Dynamic Config Aggregation</text>
  <text x="70" y="187" font-size="9" fill="#9a86c9">watch → normalize → merge → atomic switch（无需 reload）</text>

  <!-- Providers -->
  <rect x="58" y="198" width="252" height="146" rx="9" fill="#f5f5f7" stroke="#d8d8dc" filter="url(#soft)" data-tid="Traefik原理_支撑_Provider动态发现" data-lab="Provider 动态发现"/>
  <text x="184" y="222" font-size="12" font-weight="600" fill="#1d1d1f" text-anchor="middle">Provider Watch</text>
  <text x="184" y="244" font-size="9.5" fill="#6e6e73" text-anchor="middle">file · docker · k8s · consul · etcd</text>
  <text x="184" y="262" font-size="9.5" fill="#6e6e73" text-anchor="middle">nomad · ecs · http · rest · redis</text>
  <text x="184" y="286" font-size="9.5" fill="#6e6e73" text-anchor="middle">20+ 源 · 各自 Provide() 推 Message</text>
  <text x="184" y="308" font-size="9" fill="#86868b" text-anchor="middle">Aggregator：throttle 去抖 · 汇入通道</text>
  <text x="184" y="330" font-size="8.5" fill="#a1a1a6" text-anchor="middle">provider.go:9 · aggregator.go:178</text>

  <!-- Config Watcher -->
  <rect x="342" y="198" width="316" height="146" rx="9" fill="#f5f5f7" stroke="#d8d8dc" filter="url(#soft)" data-tid="Traefik原理_支撑_热加载与配置watch" data-lab="配置 Watcher"/>
  <text x="500" y="222" font-size="12" font-weight="600" fill="#1d1d1f" text-anchor="middle">Config Watcher</text>
  <text x="500" y="246" font-size="9.5" fill="#6e6e73" text-anchor="middle">receive：按 provider 存最新 + DeepEqual 去重</text>
  <text x="500" y="266" font-size="9.5" fill="#6e6e73" text-anchor="middle">apply：merge → applyModel → resolveTLS</text>
  <text x="500" y="286" font-size="9.5" fill="#6e6e73" text-anchor="middle">达 requiredProvider 才应用 · listener(conf) 通知</text>
  <text x="500" y="330" font-size="8.5" fill="#a1a1a6" text-anchor="middle">configurationwatcher.go:94 / :157</text>

  <!-- Atomic Switch -->
  <rect x="690" y="198" width="370" height="146" rx="9" fill="#f5f5f7" stroke="#d8d8dc" filter="url(#soft)" data-tid="Traefik原理_支撑_热加载与配置watch" data-lab="原子热替换"/>
  <text x="875" y="222" font-size="12" font-weight="600" fill="#1d1d1f" text-anchor="middle">Atomic Config Switch</text>
  <text x="875" y="246" font-size="9.5" fill="#6e6e73" text-anchor="middle">RouterFactory 重建 Router / Middleware / Service</text>
  <text x="875" y="266" font-size="9.5" fill="#6e6e73" text-anchor="middle">EntryPoint.Switch() 原子换路由表</text>
  <text x="875" y="286" font-size="9.5" fill="#6e6e73" text-anchor="middle">进程 / 端口 / 已建连接不动</text>
  <text x="875" y="330" font-size="8.5" fill="#a1a1a6" text-anchor="middle">routerfactory.go:101 · tcp.go:163</text>

  <!-- 控制流箭头（紫虚线 6 4） -->
  <line x1="310" y1="271" x2="340" y2="271" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#ar-ctrl)"/>
  <line x1="658" y1="271" x2="688" y2="271" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#ar-ctrl)"/>
  <!-- 优化：去抖点线（银灰） -->
  <path d="M184,344 L184,360" fill="none" stroke="#8a8a90" stroke-width="1.2" stroke-dasharray="1 3"/>
  <text x="196" y="357" font-size="8" fill="#8a8a90">ringChannel 去抖（Opt）</text>

  <!-- ② 数据面 · 蓝虚线域 -->
  <rect x="40" y="372" width="1040" height="324" rx="14" fill="none" stroke="#0a84ff" stroke-opacity="0.45" stroke-dasharray="6 4"/>
  <rect x="40" y="372" width="1040" height="30" rx="14" fill="#eef3fb" stroke="none" data-tid="Traefik原理_接触面_动态配置" data-lab="动态配置"/>
  <circle cx="58" cy="387" r="3.5" fill="#0a84ff"/>
  <text x="70" y="391" font-size="12" font-weight="600" fill="#1b5fb0">② 数据面 · dynamic.Configuration 引用模型：EntryPoint → Router → Middleware → Service</text>

  <!-- Client 端点 -->
  <rect x="58" y="470" width="92" height="92" rx="9" fill="#fbfbfd" stroke="#d8d8dc"/>
  <text x="104" y="507" font-size="10.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">客户端</text>
  <text x="104" y="526" font-size="8.5" fill="#6e6e73" text-anchor="middle">HTTP/1·2·3</text>
  <text x="104" y="542" font-size="8.5" fill="#6e6e73" text-anchor="middle">TCP / UDP</text>

  <!-- EntryPoint -->
  <rect x="178" y="440" width="176" height="152" rx="9" fill="#f5f5f7" stroke="#d8d8dc" filter="url(#soft)" data-tid="Traefik原理_支撑_EntryPoint监听" data-lab="EntryPoint 监听"/>
  <text x="266" y="466" font-size="12" font-weight="600" fill="#1d1d1f" text-anchor="middle">EntryPoint</text>
  <text x="266" y="490" font-size="9.5" fill="#6e6e73" text-anchor="middle">listen :80 / :443 / :8443</text>
  <text x="266" y="508" font-size="9.5" fill="#6e6e73" text-anchor="middle">TCP / UDP · HTTP/3 = quic-go</text>
  <text x="266" y="526" font-size="9.5" fill="#6e6e73" text-anchor="middle">TLS 终止 · httpForwarder 桥接</text>
  <text x="266" y="566" font-size="8.5" fill="#a1a1a6" text-anchor="middle">tcp.go:170 · http3.go:21</text>

  <!-- Router -->
  <rect x="378" y="440" width="176" height="152" rx="9" fill="#f5f5f7" stroke="#d8d8dc" filter="url(#soft)" data-tid="Traefik原理_支撑_Router路由匹配" data-lab="Router 路由匹配"/>
  <text x="466" y="466" font-size="12" font-weight="600" fill="#1d1d1f" text-anchor="middle">Router</text>
  <text x="466" y="490" font-size="9.5" fill="#6e6e73" text-anchor="middle">rule 布尔式 Host()/Path()</text>
  <text x="466" y="508" font-size="9.5" fill="#6e6e73" text-anchor="middle">&amp;&amp; || ! 短路求值</text>
  <text x="466" y="526" font-size="9.5" fill="#6e6e73" text-anchor="middle">priority = len(rule)</text>
  <text x="466" y="566" font-size="8.5" fill="#a1a1a6" text-anchor="middle">muxer.go:75 · :216</text>

  <!-- Middleware -->
  <rect x="578" y="440" width="176" height="152" rx="9" fill="#f5f5f7" stroke="#d8d8dc" filter="url(#soft)" data-tid="Traefik原理_支撑_Middleware中间件链" data-lab="Middleware 链"/>
  <text x="666" y="466" font-size="12" font-weight="600" fill="#1d1d1f" text-anchor="middle">Middleware 链</text>
  <text x="666" y="490" font-size="9.5" fill="#6e6e73" text-anchor="middle">alice.Chain 洋葱式</text>
  <text x="666" y="508" font-size="9.5" fill="#6e6e73" text-anchor="middle">auth / headers / ratelimit</text>
  <text x="666" y="526" font-size="9.5" fill="#e0742a" text-anchor="middle">retry · circuitbreaker（Fail）</text>
  <text x="666" y="566" font-size="8.5" fill="#a1a1a6" text-anchor="middle">middlewares.go:65 · 39 类</text>

  <!-- Service -->
  <rect x="778" y="440" width="176" height="152" rx="9" fill="#f5f5f7" stroke="#d8d8dc" filter="url(#soft)" data-tid="Traefik原理_支撑_Service负载均衡" data-lab="Service 负载均衡"/>
  <text x="866" y="466" font-size="12" font-weight="600" fill="#1d1d1f" text-anchor="middle">Service LB</text>
  <text x="866" y="490" font-size="9.5" fill="#6e6e73" text-anchor="middle">wrr(EDF) / p2c / hrw</text>
  <text x="866" y="508" font-size="9.5" fill="#6e6e73" text-anchor="middle">weighted / mirror / failover</text>
  <text x="866" y="526" font-size="9.5" fill="#e0742a" text-anchor="middle">健康检查 主动+被动 · 摘除（Fail）</text>
  <text x="866" y="566" font-size="8.5" fill="#a1a1a6" text-anchor="middle">wrr.go · healthcheck.go</text>

  <!-- Backends 端点 -->
  <rect x="978" y="470" width="102" height="92" rx="9" fill="#fbfbfd" stroke="#d8d8dc"/>
  <text x="1029" y="507" font-size="10.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">后端 Servers</text>
  <text x="1029" y="526" font-size="8.5" fill="#6e6e73" text-anchor="middle">URL 池</text>
  <text x="1029" y="542" font-size="8.5" fill="#6e6e73" text-anchor="middle">passHostHeader</text>

  <!-- Hot Path（蓝实线 2px 发光） -->
  <g filter="url(#glow)">
    <line x1="150" y1="516" x2="176" y2="516" stroke="#0a84ff" stroke-width="2" marker-end="url(#ar-hot)"/>
    <line x1="354" y1="516" x2="376" y2="516" stroke="#0a84ff" stroke-width="2" marker-end="url(#ar-hot)"/>
    <line x1="554" y1="516" x2="576" y2="516" stroke="#0a84ff" stroke-width="2" marker-end="url(#ar-hot)"/>
    <line x1="754" y1="516" x2="776" y2="516" stroke="#0a84ff" stroke-width="2" marker-end="url(#ar-hot)"/>
    <line x1="954" y1="516" x2="976" y2="516" stroke="#0a84ff" stroke-width="2" marker-end="url(#ar-hot)"/>
  </g>

  <!-- 控制流 → 数据面（热替换路由表，紫虚线） -->
  <path d="M875,344 C875,392 466,398 466,438" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#ar-ctrl)"/>
  <text x="640" y="418" font-size="8.5" fill="#7c5cd6" text-anchor="middle">Switch() 热替换路由表</text>

  <!-- State Path：EntryPoint ← TLS 证书（青实线） -->
  <path d="M266,592 L266,626 L336,626" fill="none" stroke="#1aa89a" stroke-width="1.5" marker-end="url(#ar-state)"/>

  <!-- TLS / ACME 带（状态/证书） -->
  <rect x="178" y="614" width="340" height="56" rx="9" fill="#f5f5f7" stroke="#d8d8dc" filter="url(#soft)" data-tid="Traefik原理_支撑_TLS与ACME" data-lab="TLS 与 ACME"/>
  <text x="194" y="636" font-size="11" font-weight="600" fill="#1d1d1f">TLS / ACME 证书自动化 <tspan font-size="8.5" fill="#1aa89a">State</tspan></text>
  <text x="194" y="653" font-size="8.5" fill="#6e6e73">SNI 选证书 GetBestCertificate · 存 Store</text>
  <text x="194" y="666" font-size="8.5" fill="#6e6e73">ACME HTTP-01 / TLS-ALPN-01 / DNS-01 <tspan fill="#e0742a">签发/续期失败降级（Fail）</tspan></text>

  <!-- 可观测性 带（包裹全链路） -->
  <rect x="538" y="614" width="416" height="56" rx="9" fill="#f5f5f7" stroke="#d8d8dc" filter="url(#soft)" data-tid="Traefik原理_支撑_可观测性" data-lab="可观测性"/>
  <text x="554" y="636" font-size="11" font-weight="600" fill="#1d1d1f">可观测性 · 包裹全链路</text>
  <text x="554" y="653" font-size="8.5" fill="#6e6e73">Metrics(Prometheus/OTLP) · Tracing(OpenTelemetry)</text>
  <text x="554" y="666" font-size="8.5" fill="#6e6e73">AccessLog(CLF/JSON) — 以中间件形态包裹 EntryPoint→Service</text>

  <!-- 图例铭牌（右下 · 五路径） -->
  <rect x="726" y="700" width="354" height="106" rx="10" fill="#f5f5f7" stroke="#d8d8dc"/>
  <text x="744" y="720" font-size="9.5" font-weight="700" fill="#1d1d1f">信号图例 · SIGNAL LEGEND</text>
  <line x1="744" y1="736" x2="774" y2="736" stroke="#0a84ff" stroke-width="2"/>
  <text x="782" y="739" font-size="8.5" fill="#6e6e73">Hot · 主请求/数据流</text>
  <line x1="900" y1="736" x2="930" y2="736" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="938" y="739" font-size="8.5" fill="#6e6e73">Control · 配置/热替换</text>
  <line x1="744" y1="756" x2="774" y2="756" stroke="#1aa89a" stroke-width="1.5"/>
  <text x="782" y="759" font-size="8.5" fill="#6e6e73">State · 状态/证书</text>
  <line x1="900" y1="756" x2="930" y2="756" stroke="#e0742a" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="938" y="759" font-size="8.5" fill="#6e6e73">Failure · 重试/降级</text>
  <line x1="744" y1="776" x2="774" y2="776" stroke="#8a8a90" stroke-width="1.2" stroke-dasharray="1 3"/>
  <text x="782" y="779" font-size="8.5" fill="#6e6e73">Opt · 去抖/缓存/零拷贝</text>
  <text x="744" y="797" font-size="8" fill="#a1a1a6">不变量：配置原子切换（DeepEqual 去重）· 连接不中断 · 证书 SNI 边界</text>

  <text x="40" y="792" font-size="9" fill="#a1a1a6">Traefik v3（codename cheddar）· 所有 file:line 回本地源码核实</text>
</svg>
