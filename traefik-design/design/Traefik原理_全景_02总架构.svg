<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="720" viewBox="0 0 1120 720" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="aHot" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#0a84ff"/></marker>
    <marker id="aCtl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#7c5fe6"/></marker>
    <marker id="aTls" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#0f9e8e"/></marker>
  </defs>

  <rect width="1120" height="720" fill="#fbfbfd"/>

  <!-- 标题条 -->
  <rect x="0" y="0" width="1120" height="46" fill="#f4f5f7" stroke="#e6e6eb"/>
  <text x="24" y="29" font-size="15" font-weight="700" fill="#1d1d1f">Traefik 全景 · 动态配置驱动的边缘路由</text>
  <text x="330" y="29" font-size="11" fill="#8a8a90">控制面：Provider 发现 → 防抖热更新 → 路由原子切换(不重启)　·　数据面：EntryPoint → Router → Middleware → Service</text>

  <!-- ===== 控制面带 ===== -->
  <text x="24" y="62" font-size="10.5" font-weight="700" fill="#7c5fe6">控制面 · 配置发现与热更新</text>

  <!-- 静态配置 -->
  <rect x="24" y="70" width="196" height="86" rx="11" fill="#f2eefb" stroke="#d9c9ec" filter="url(#soft)" data-tid="Traefik原理_接触面_静态配置" data-lab="静态配置"/>
  <rect x="24" y="70" width="4" height="86" rx="2" fill="#7c5fe6"/>
  <text x="42" y="94" font-size="12" font-weight="700" fill="#1d1d1f">静态配置</text>
  <text x="42" y="114" font-size="9.5" fill="#6a6a70">EntryPoints · TLS resolvers</text>
  <text x="42" y="132" font-size="9.5" fill="#6a6a70">启动时一次性加载</text>

  <!-- ① Provider 动态发现 -->
  <rect x="236" y="70" width="540" height="86" rx="11" fill="#f2eefb" stroke="#d9c9ec" filter="url(#soft)" data-tid="Traefik原理_支撑_Provider动态发现" data-lab="Provider 动态发现"/>
  <rect x="236" y="70" width="4" height="86" rx="2" fill="#7c5fe6"/>
  <text x="254" y="90" font-size="12" font-weight="700" fill="#1d1d1f">① Provider 动态发现</text>
  <rect x="254" y="102" width="118" height="42" rx="8" fill="#ffffff" stroke="#d8cdea"/><text x="313" y="122" font-size="9.5" fill="#1d1d1f" text-anchor="middle">Docker</text><text x="313" y="136" font-size="8" fill="#9a9aa0" text-anchor="middle">events</text>
  <rect x="380" y="102" width="118" height="42" rx="8" fill="#ffffff" stroke="#d8cdea"/><text x="439" y="122" font-size="9.5" fill="#1d1d1f" text-anchor="middle">K8s</text><text x="439" y="136" font-size="8" fill="#9a9aa0" text-anchor="middle">informer</text>
  <rect x="506" y="102" width="118" height="42" rx="8" fill="#ffffff" stroke="#d8cdea"/><text x="565" y="122" font-size="9.5" fill="#1d1d1f" text-anchor="middle">File</text><text x="565" y="136" font-size="8" fill="#9a9aa0" text-anchor="middle">watch</text>
  <rect x="632" y="102" width="126" height="42" rx="8" fill="#ffffff" stroke="#d8cdea"/><text x="695" y="122" font-size="9.5" fill="#1d1d1f" text-anchor="middle">Consul / KV</text><text x="695" y="136" font-size="8" fill="#9a9aa0" text-anchor="middle">Nomad</text>

  <!-- 动态配置(接触面) -->
  <rect x="792" y="70" width="120" height="86" rx="11" fill="#eef0f3" stroke="#d2d6dd" filter="url(#soft)" data-tid="Traefik原理_接触面_动态配置" data-lab="动态配置"/>
  <text x="852" y="100" font-size="11.5" font-weight="700" fill="#1d1d1f" text-anchor="middle">动态配置</text>
  <text x="852" y="120" font-size="9" fill="#6a6a70" text-anchor="middle">dynamic.Config</text>
  <text x="852" y="136" font-size="8.5" fill="#9a9aa0" text-anchor="middle">经 channel 推送</text>

  <!-- ② ConfigurationWatcher -->
  <rect x="24" y="184" width="748" height="104" rx="12" fill="#f2eefb" stroke="#d9c9ec" filter="url(#soft)" data-tid="Traefik原理_支撑_热加载与配置watch" data-lab="ConfigurationWatcher"/>
  <rect x="24" y="184" width="4" height="104" rx="2" fill="#7c5fe6"/>
  <text x="42" y="208" font-size="12" font-weight="700" fill="#1d1d1f">② ConfigurationWatcher · 防抖热更新(不重启)</text>
  <rect x="44" y="222" width="168" height="52" rx="9" fill="#ffffff" stroke="#d8cdea"/><text x="128" y="244" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">防抖 throttle</text><text x="128" y="261" font-size="8.5" fill="#9a9aa0" text-anchor="middle">合并抖动</text>
  <rect x="224" y="222" width="168" height="52" rx="9" fill="#ffffff" stroke="#d8cdea"/><text x="308" y="244" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">receive 去重</text><text x="308" y="261" font-size="8.5" fill="#9a9aa0" text-anchor="middle">DeepEqual</text>
  <rect x="404" y="222" width="168" height="52" rx="9" fill="#ffffff" stroke="#d8cdea"/><text x="488" y="244" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">apply 构建</text><text x="488" y="261" font-size="8.5" fill="#9a9aa0" text-anchor="middle">聚合配置</text>
  <rect x="584" y="222" width="168" height="52" rx="9" fill="#ffffff" stroke="#d8cdea"/><text x="668" y="244" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">listeners 通知</text><text x="668" y="261" font-size="8.5" fill="#9a9aa0" text-anchor="middle">router / metrics</text>

  <!-- 路由工厂 · 原子热切换 -->
  <rect x="792" y="184" width="304" height="104" rx="12" fill="#f2eefb" stroke="#d9c9ec" filter="url(#soft)" data-tid="Traefik原理_支撑_Router路由匹配" data-lab="路由工厂 · 热切换"/>
  <rect x="792" y="184" width="4" height="104" rx="2" fill="#7c5fe6"/>
  <text x="810" y="208" font-size="12" font-weight="700" fill="#1d1d1f">路由工厂 · 原子热切换</text>
  <text x="810" y="230" font-size="9.5" fill="#6a6a70">CreateRouters 建新路由树</text>
  <text x="810" y="248" font-size="9.5" fill="#6a6a70">UpdateHandler 原子替换</text>
  <text x="810" y="266" font-size="9.5" fill="#6a6a70">safe.Safe · 不中断在途请求</text>

  <!-- ===== 数据面带 ===== -->
  <text x="24" y="318" font-size="10.5" font-weight="700" fill="#0a84ff">数据面 · 请求处理管线(Hot Path)</text>

  <!-- EntryPoint -->
  <rect x="24" y="330" width="176" height="300" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)" data-tid="Traefik原理_支撑_EntryPoint监听" data-lab="EntryPoint 接入"/>
  <rect x="24" y="330" width="4" height="300" rx="2" fill="#0a84ff"/>
  <text x="44" y="356" font-size="12.5" font-weight="700" fill="#1d1d1f">EntryPoint 接入</text>
  <text x="44" y="380" font-size="9.5" fill="#5a5a60">监听 :80 / :443</text>
  <text x="44" y="400" font-size="9.5" fill="#5a5a60">TCP / HTTP 分流</text>
  <text x="44" y="420" font-size="9.5" fill="#5a5a60">TLS 握手 · SNI</text>
  <text x="44" y="440" font-size="9.5" fill="#5a5a60">每连接 goroutine</text>
  <text x="44" y="460" font-size="9.5" fill="#5a5a60">优雅关闭 GraceTimeout</text>

  <!-- Router · Muxer -->
  <rect x="216" y="330" width="216" height="300" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)" data-tid="Traefik原理_支撑_Router路由匹配" data-lab="Router · Muxer"/>
  <rect x="216" y="330" width="4" height="300" rx="2" fill="#0a84ff"/>
  <text x="236" y="356" font-size="12.5" font-weight="700" fill="#1d1d1f">Router · Muxer</text>
  <text x="236" y="380" font-size="9.5" fill="#5a5a60">matcherTree 规则树</text>
  <text x="236" y="400" font-size="9.5" fill="#5a5a60">Host / Path / Header</text>
  <text x="236" y="420" font-size="9.5" fill="#5a5a60">and·or 组合匹配</text>
  <text x="236" y="440" font-size="9.5" fill="#5a5a60">priority 长度定序</text>
  <text x="236" y="460" font-size="9.5" fill="#5a5a60">未命中 → 404</text>

  <!-- Middleware 链 -->
  <rect x="448" y="330" width="216" height="300" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)" data-tid="Traefik原理_支撑_Middleware中间件链" data-lab="Middleware 链"/>
  <rect x="448" y="330" width="4" height="300" rx="2" fill="#0a84ff"/>
  <text x="468" y="356" font-size="12.5" font-weight="700" fill="#1d1d1f">Middleware 链</text>
  <text x="468" y="380" font-size="9.5" fill="#5a5a60">洋葱式责任链 func(next)</text>
  <rect x="468" y="394" width="86" height="30" rx="7" fill="#ffffff" stroke="#c7d4e8"/><text x="511" y="413" font-size="9" fill="#1d1d1f" text-anchor="middle">BasicAuth</text>
  <rect x="562" y="394" width="86" height="30" rx="7" fill="#ffffff" stroke="#c7d4e8"/><text x="605" y="413" font-size="9" fill="#1d1d1f" text-anchor="middle">RateLimit</text>
  <rect x="468" y="430" width="86" height="30" rx="7" fill="#ffffff" stroke="#c7d4e8"/><text x="511" y="449" font-size="9" fill="#1d1d1f" text-anchor="middle">Retry</text>
  <rect x="562" y="430" width="86" height="30" rx="7" fill="#ffffff" stroke="#c7d4e8"/><text x="605" y="449" font-size="8.5" fill="#1d1d1f" text-anchor="middle">CircuitBreaker</text>
  <rect x="468" y="466" width="86" height="30" rx="7" fill="#ffffff" stroke="#c7d4e8"/><text x="511" y="485" font-size="9" fill="#1d1d1f" text-anchor="middle">StripPrefix</text>
  <rect x="562" y="466" width="86" height="30" rx="7" fill="#ffffff" stroke="#c7d4e8"/><text x="605" y="485" font-size="9" fill="#1d1d1f" text-anchor="middle">Headers</text>

  <!-- Service 负载均衡 -->
  <rect x="680" y="330" width="184" height="300" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)" data-tid="Traefik原理_支撑_Service负载均衡" data-lab="Service 负载均衡"/>
  <rect x="680" y="330" width="4" height="300" rx="2" fill="#0a84ff"/>
  <text x="700" y="356" font-size="12.5" font-weight="700" fill="#1d1d1f">Service 负载均衡</text>
  <text x="700" y="380" font-size="9.5" fill="#5a5a60">WRR / P2C / LeastTime</text>
  <text x="700" y="400" font-size="9.5" fill="#5a5a60">Mirroring / Failover</text>
  <text x="700" y="420" font-size="9.5" fill="#5a5a60">sticky cookie 会话保持</text>
  <text x="700" y="440" font-size="9.5" fill="#5a5a60">健康检查剔除</text>
  <text x="700" y="460" font-size="9.5" fill="#5a5a60">→ 反代到 pods/容器</text>

  <!-- TLS / ACME -->
  <rect x="880" y="330" width="216" height="144" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)" data-tid="Traefik原理_支撑_TLS与ACME" data-lab="TLS / ACME"/>
  <rect x="880" y="330" width="4" height="144" rx="2" fill="#0f9e8e"/>
  <text x="900" y="356" font-size="12" font-weight="700" fill="#0f6b5e">TLS / ACME</text>
  <text x="900" y="378" font-size="9.5" fill="#3d7a6c">SNI 选证书 GetCertificate</text>
  <text x="900" y="398" font-size="9.5" fill="#3d7a6c">ACME 自动签发 / 续期</text>
  <text x="900" y="418" font-size="9.5" fill="#3d7a6c">HTTP-01 / TLS-ALPN / DNS-01</text>
  <text x="900" y="438" font-size="9" fill="#7fae9f">为 EntryPoint 握手供证书</text>

  <!-- 可观测 -->
  <rect x="880" y="486" width="216" height="144" rx="12" fill="#f2f4f7" stroke="#d3dae4" filter="url(#soft)" data-tid="Traefik原理_支撑_可观测性" data-lab="可观测三件套"/>
  <rect x="880" y="486" width="4" height="144" rx="2" fill="#5b6470"/>
  <text x="900" y="512" font-size="12" font-weight="700" fill="#33415c">可观测三件套</text>
  <text x="900" y="534" font-size="9.5" fill="#4a5a78">Metrics · Prometheus/OTel</text>
  <text x="900" y="554" font-size="9.5" fill="#4a5a78">Tracing · span 贯穿链</text>
  <text x="900" y="574" font-size="9.5" fill="#4a5a78">accesslog 访问日志</text>
  <text x="900" y="594" font-size="9" fill="#8894ac">横切 entrypoint/router/service</text>

  <!-- ===== 连线 ===== -->
  <!-- 控制面(紫虚线) -->
  <g stroke="#a48fd8" stroke-width="1.4" fill="none" stroke-dasharray="5 3">
    <path d="M776,113 L792,113" marker-end="url(#aCtl)"/>
    <path d="M912,113 L940,113 L940,170 L398,170 L398,184" marker-end="url(#aCtl)"/>
    <path d="M792,236 L776,236" marker-end="url(#aCtl)"/>
    <path d="M944,288 L944,308 L316,308 L316,330" marker-end="url(#aCtl)"/>
  </g>
  <text x="410" y="166" font-size="8" fill="#8a7bc0">dynamic config → watcher</text>
  <text x="322" y="304" font-size="8" fill="#8a7bc0">新路由原子切换到管线</text>

  <!-- 数据面(蓝实线) -->
  <g stroke="#0a84ff" stroke-width="1.6" fill="none">
    <path d="M200,480 L216,480" marker-end="url(#aHot)"/>
    <path d="M432,480 L448,480" marker-end="url(#aHot)"/>
    <path d="M664,480 L680,480" marker-end="url(#aHot)"/>
  </g>
  <!-- TLS 供证书(绿虚线) -->
  <g stroke="#5bb5a4" stroke-width="1.3" fill="none" stroke-dasharray="4 3">
    <path d="M880,402 L112,402 L112,420" marker-end="url(#aTls)"/>
  </g>

  <!-- ===== 图例 ===== -->
  <rect x="0" y="672" width="1120" height="48" fill="#f7f7f9" stroke="#e6e6eb"/>
  <text x="24" y="700" font-size="10" fill="#86868b">读法：外部请求经 EntryPoint 进入，逐级过 Router 匹配 → Middleware 链 → Service 负载到后端；配置变更由 Provider 经防抖热更新原子切换，不重启进程。</text>
  <line x1="720" y1="696" x2="748" y2="696" stroke="#0a84ff" stroke-width="2"/><text x="754" y="700" font-size="9.5" fill="#5a5a60">数据流 Hot</text>
  <line x1="840" y1="696" x2="868" y2="696" stroke="#7c5fe6" stroke-width="2" stroke-dasharray="5 3"/><text x="874" y="700" font-size="9.5" fill="#5a5a60">控制面 配置推送</text>
  <line x1="1000" y1="696" x2="1028" y2="696" stroke="#5bb5a4" stroke-width="2" stroke-dasharray="4 3"/><text x="1034" y="700" font-size="9.5" fill="#5a5a60">TLS 证书</text>
</svg>
