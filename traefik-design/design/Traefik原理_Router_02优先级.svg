<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="420" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">优先级排序 · 默认 priority = len(rule)，越"具体"越优先（多规则匹配时的裁决）</text>

  <!-- request -->
  <rect x="30" y="64" width="140" height="50" rx="11" fill="#f5f5f7" stroke="#d2d2d7"/>
  <text x="100" y="86" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">请求</text>
  <text x="100" y="104" font-size="8.5" fill="#6e6e73" text-anchor="middle">GET api.x.com/v1/users</text>

  <line x1="170" y1="89" x2="206" y2="89" stroke="#b8b8bf" marker-end="url(#ar)"/>

  <!-- sorted routes -->
  <text x="500" y="82" font-size="10.5" font-weight="600" fill="#5b7db1">路由表按 priority 降序（routes.Less · muxer.go:216）</text>

  <rect x="208" y="96" width="600" height="46" rx="9" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="228" y="116" font-size="9.5" font-weight="600" fill="#0f5132">① Host(`api.x.com`) &amp;&amp; PathPrefix(`/v1/users`)</text>
  <text x="770" y="124" font-size="10" font-weight="600" fill="#0f5132" text-anchor="end">prio 44 ✓ 命中</text>

  <rect x="208" y="150" width="600" height="42" rx="9" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="228" y="176" font-size="9.5" fill="#1b2a4a">② Host(`api.x.com`) &amp;&amp; PathPrefix(`/v1`)</text>
  <text x="770" y="176" font-size="10" fill="#5b7db1" text-anchor="end">prio 38</text>

  <rect x="208" y="200" width="600" height="42" rx="9" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="228" y="226" font-size="9.5" fill="#1b2a4a">③ Host(`api.x.com`)</text>
  <text x="770" y="226" font-size="10" fill="#5b7db1" text-anchor="end">prio 20</text>

  <rect x="208" y="250" width="600" height="42" rx="9" fill="#f5f5f7" stroke="#d2d2d7"/>
  <text x="228" y="276" font-size="9.5" fill="#6e6e73">④ PathPrefix(`/`)（兜底）</text>
  <text x="770" y="276" font-size="10" fill="#8a8a8e" text-anchor="end">prio 15</text>

  <text x="500" y="308" font-size="9" fill="#8a8a8e" text-anchor="middle">自顶向下取第一个匹配者 → ①（最长规则 = 最具体）</text>

  <!-- rules -->
  <rect x="30" y="326" width="900" height="80" rx="12" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="50" y="350" font-size="10.5" font-weight="600" fill="#7a4d00">优先级规则（muxer.go:75 GetRulePriority / :216 routes.Less）</text>
  <text x="50" y="372" font-size="9" fill="#9a7328">· 默认 priority = 规则字符串长度 len(rule)：写得越"长/具体"的规则天然优先，无需手动排序；</text>
  <text x="50" y="392" font-size="9" fill="#9a7328">· 同 priority 再看 providerPriority（provider 声明顺序）打破平局；· 需要时可显式设 Router.priority 覆盖默认。</text>
</svg>
