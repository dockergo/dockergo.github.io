<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">rule 语法 · 匹配器 predicate 布尔表达式（Host/Path/Header… 用 &amp;&amp; || ! 组合）</text>

  <!-- rule string -->
  <rect x="30" y="56" width="900" height="42" rx="10" fill="#f5f5f7" stroke="#d2d2d7"/>
  <text x="480" y="82" font-size="11" font-weight="600" fill="#1d1d1f" text-anchor="middle">rule = Host(`api.example.com`) &amp;&amp; (PathPrefix(`/v1`) || PathPrefix(`/v2`)) &amp;&amp; !Header(`X-Debug`,`1`)</text>

  <line x1="480" y1="98" x2="480" y2="120" stroke="#b8b8bf" marker-end="url(#ar)"/>
  <text x="560" y="114" font-size="8.5" fill="#8a8a8e">NewParser(matchers) · vulcand/predicate · parser.go:31</text>

  <!-- AST tree -->
  <rect x="410" y="124" width="140" height="40" rx="9" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="480" y="149" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">&amp;&amp; (AND)</text>

  <line x1="450" y1="164" x2="250" y2="196" stroke="#b8b8bf"/>
  <line x1="480" y1="164" x2="480" y2="196" stroke="#b8b8bf"/>
  <line x1="520" y1="164" x2="720" y2="196" stroke="#b8b8bf"/>

  <rect x="180" y="196" width="140" height="44" rx="9" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="250" y="216" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">Host(…)</text>
  <text x="250" y="232" font-size="8" fill="#3f8f66" text-anchor="middle">matcher.go:19</text>

  <rect x="410" y="196" width="140" height="44" rx="9" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="480" y="221" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">|| (OR)</text>

  <rect x="650" y="196" width="140" height="44" rx="9" fill="#fdecea" stroke="#f3c0b8"/>
  <text x="720" y="216" font-size="9.5" font-weight="600" fill="#8a2a1a" text-anchor="middle">! (NOT)</text>
  <text x="720" y="232" font-size="8" fill="#a24232" text-anchor="middle">Header(X-Debug,1)</text>

  <line x1="440" y1="240" x2="360" y2="276" stroke="#b8b8bf"/>
  <line x1="520" y1="240" x2="600" y2="276" stroke="#b8b8bf"/>

  <rect x="290" y="276" width="140" height="40" rx="9" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="360" y="300" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">PathPrefix(/v1)</text>
  <rect x="530" y="276" width="140" height="40" rx="9" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="600" y="300" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">PathPrefix(/v2)</text>

  <!-- matcher catalog -->
  <rect x="30" y="336" width="900" height="90" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="50" y="360" font-size="10.5" font-weight="600" fill="#1b2a4a">v3 匹配器目录（matcher.go:17-26）</text>
  <text x="50" y="382" font-size="9" fill="#5b7db1">Host · HostRegexp · Path · PathRegexp · PathPrefix · Header · HeaderRegexp · Query · QueryRegexp · Method · ClientIP</text>
  <text x="50" y="404" font-size="9" fill="#5b7db1">组合子：&amp;&amp;（与）· ||（或）· !（非）· 括号分组 —— 编译成 matchersTree，请求到来时自顶向下短路求值（muxer.go:248）</text>
  <text x="50" y="420" font-size="8.5" fill="#8fa9cf">v2 旧语法（matcher_v2.go）仍兼容，但已弃用；Router.RuleSyntax 显式选版本（http_config.go:84）</text>
</svg>
