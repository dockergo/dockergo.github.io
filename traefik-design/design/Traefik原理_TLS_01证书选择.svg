<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="420" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">TLS 终止 · 握手时按 SNI 选证书（GetBestCertificate），证书来自证书库</text>

  <!-- client hello -->
  <rect x="30" y="70" width="160" height="80" rx="12" fill="#f5f5f7" stroke="#d2d2d7"/>
  <text x="110" y="98" font-size="10.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">ClientHello</text>
  <text x="110" y="120" font-size="9" fill="#6e6e73" text-anchor="middle">SNI = api.x.com</text>
  <text x="110" y="138" font-size="9" fill="#6e6e73" text-anchor="middle">支持的 ALPN/密码套件</text>

  <line x1="190" y1="110" x2="226" y2="110" stroke="#b8b8bf" marker-end="url(#ar)"/>

  <!-- cert store select -->
  <rect x="228" y="60" width="300" height="200" rx="12" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="378" y="84" font-size="11" font-weight="600" fill="#0f5132" text-anchor="middle">CertificateStore（certificate_store.go:25）</text>
  <rect x="246" y="98" width="264" height="46" rx="9" fill="#ffffff" stroke="#bce6cd"/>
  <text x="378" y="118" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">GetBestCertificate(clientHello)</text>
  <text x="378" y="134" font-size="8" fill="#3f8f66" text-anchor="middle">按 SNI 匹配 + 缓存结果 · :77</text>
  <rect x="246" y="152" width="264" height="40" rx="9" fill="#ffffff" stroke="#bce6cd"/>
  <text x="378" y="177" font-size="9" fill="#0f5132" text-anchor="middle">matchDomain 精确/通配匹配（:269）</text>
  <rect x="246" y="200" width="264" height="44" rx="9" fill="#ffffff" stroke="#bce6cd"/>
  <text x="378" y="220" font-size="9" fill="#0f5132" text-anchor="middle">无匹配 → GetDefaultCertificate</text>
  <text x="378" y="236" font-size="8" fill="#3f8f66" text-anchor="middle">默认证书兜底（:60）</text>

  <line x1="528" y1="160" x2="564" y2="160" stroke="#b8b8bf" marker-end="url(#ar)"/>

  <!-- sources -->
  <rect x="566" y="60" width="364" height="200" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="748" y="84" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">证书来源（动态配置 TLS 面）</text>
  <rect x="584" y="98" width="328" height="42" rx="9" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="748" y="118" font-size="9.5" fill="#1b2a4a" text-anchor="middle">① 用户提供证书（tls.certificates）</text>
  <text x="748" y="133" font-size="8" fill="#5b7db1" text-anchor="middle">文件/内容，Provider 下发</text>
  <rect x="584" y="148" width="328" height="42" rx="9" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="748" y="168" font-size="9.5" fill="#0f5132" text-anchor="middle">② ACME 自动签发（certResolver）</text>
  <text x="748" y="183" font-size="8" fill="#3f8f66" text-anchor="middle">Router.tls.certResolver 触发（见下图）</text>
  <rect x="584" y="198" width="328" height="46" rx="9" fill="#f6eefb" stroke="#e0c9f0"/>
  <text x="748" y="218" font-size="9.5" fill="#5b2a7a" text-anchor="middle">③ TLS Options / 默认证书</text>
  <text x="748" y="234" font-size="8" fill="#8b5fb0" text-anchor="middle">minVersion/密码套件/mTLS（tlsmanager.go）</text>

  <!-- note -->
  <rect x="30" y="284" width="900" height="120" rx="12" fill="#f5f5f7" stroke="#d2d2d7" filter="url(#soft)"/>
  <text x="50" y="308" font-size="10.5" font-weight="600" fill="#1d1d1f">要点</text>
  <text x="50" y="330" font-size="9.5" fill="#6e6e73">· TLS 终止发生在 EntryPoint 层（收连接后、进 HTTP Router 前），选证书完全由 ClientHello 的 SNI 驱动。</text>
  <text x="50" y="350" font-size="9.5" fill="#6e6e73">· GetBestCertificate 结果带缓存，热点 SNI 不必每次重新匹配；证书库随动态配置 TLS 面热更新后 ResetCache。</text>
  <text x="50" y="370" font-size="9.5" fill="#6e6e73">· 未匹配到任何证书时用默认证书兜底（可能是自签），因此浏览器可能提示不受信——应确保目标域名有对应证书。</text>
  <text x="50" y="392" font-size="9" fill="#a1a1a6">· TCP EntryPoint 可选 TLS 直通（passthrough）不终止，交后端自己握手（见 EntryPoint 域）。</text>
</svg>
