<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">静态配置 · 启动期一次读入并固化（static.Configuration，改需重启）</text>

  <!-- sources -->
  <rect x="40" y="70" width="180" height="150" rx="12" fill="#f5f5f7" stroke="#d2d2d7" filter="url(#soft)"/>
  <text x="130" y="94" font-size="11" font-weight="600" fill="#1d1d1f" text-anchor="middle">三类来源（同源合并）</text>
  <text x="130" y="120" font-size="9.5" fill="#6e6e73" text-anchor="middle">① 文件 traefik.yml/.toml</text>
  <text x="130" y="142" font-size="9.5" fill="#6e6e73" text-anchor="middle">② 命令行 flags</text>
  <text x="130" y="164" font-size="9.5" fill="#6e6e73" text-anchor="middle">③ 环境变量 TRAEFIK_*</text>
  <text x="130" y="190" font-size="8.5" fill="#8a8a8e" text-anchor="middle">paerser 解码为 struct</text>
  <text x="130" y="208" font-size="8" fill="#a1a1a6" text-anchor="middle">SetDefaults + 校验</text>

  <line x1="220" y1="145" x2="256" y2="145" stroke="#b8b8bf" marker-end="url(#ar)"/>

  <!-- static.Configuration -->
  <rect x="258" y="60" width="260" height="330" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="388" y="84" font-size="11.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">static.Configuration</text>
  <text x="388" y="100" font-size="8" fill="#8fa9cf" text-anchor="middle">static_config.go:86</text>

  <rect x="276" y="112" width="224" height="52" rx="9" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="388" y="132" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">EntryPoints</text>
  <text x="388" y="150" font-size="8.5" fill="#5b7db1" text-anchor="middle">监听地址/端口/协议 · entrypoints.go:25</text>

  <rect x="276" y="172" width="224" height="52" rx="9" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="388" y="192" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">Providers（启用哪些）</text>
  <text x="388" y="210" font-size="8.5" fill="#5b7db1" text-anchor="middle">Docker/K8s/File/KV… · static_config.go:261</text>

  <rect x="276" y="232" width="224" height="46" rx="9" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="388" y="251" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">CertificatesResolvers（ACME）</text>
  <text x="388" y="268" font-size="8.5" fill="#5b7db1" text-anchor="middle">证书解析器定义 · initACMEProvider</text>

  <rect x="276" y="286" width="224" height="44" rx="9" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="388" y="304" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">API / Metrics / Log / Tracing</text>
  <text x="388" y="321" font-size="8.5" fill="#5b7db1" text-anchor="middle">全局可观测与管理开关</text>

  <rect x="276" y="338" width="224" height="42" rx="9" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="388" y="355" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">Global / ServersTransport</text>
  <text x="388" y="372" font-size="8.5" fill="#5b7db1" text-anchor="middle">超时/回连后端 TLS 等</text>

  <line x1="518" y1="200" x2="554" y2="200" stroke="#b8b8bf" marker-end="url(#ar)"/>

  <!-- effect -->
  <rect x="556" y="80" width="370" height="140" rx="12" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="741" y="104" font-size="11" font-weight="600" fill="#0f5132" text-anchor="middle">启动装配（一次性）</text>
  <text x="576" y="130" font-size="9.5" fill="#3f8f66">SetEffectiveConfiguration：补默认、派生 ACME provider</text>
  <text x="576" y="150" font-size="9.5" fill="#3f8f66">ValidateConfiguration：合法性校验（static_config.go:435）</text>
  <text x="576" y="170" font-size="9.5" fill="#3f8f66">按 EntryPoints 建 TCP/UDP 监听器（绑端口）</text>
  <text x="576" y="190" font-size="9.5" fill="#3f8f66">按启用的 Providers 组装 ProviderAggregator</text>
  <text x="576" y="210" font-size="8.5" fill="#5aa06f">此后进入运行期，静态项不再变</text>

  <!-- restart warning -->
  <rect x="556" y="240" width="370" height="150" rx="12" fill="#fdecea" stroke="#f3c0b8" filter="url(#soft)"/>
  <text x="741" y="264" font-size="11" font-weight="600" fill="#8a2a1a" text-anchor="middle">⚠ 分水岭：静态项改动需重启</text>
  <text x="576" y="290" font-size="9.5" fill="#a24232">加/删一个 EntryPoint（端口）→ 重启</text>
  <text x="576" y="310" font-size="9.5" fill="#a24232">启用/停用一个 Provider → 重启</text>
  <text x="576" y="330" font-size="9.5" fill="#a24232">改日志级别 / API 开关 → 重启</text>
  <text x="576" y="354" font-size="9" fill="#a24232">对比：Router/Middleware/Service 属动态配置</text>
  <text x="576" y="372" font-size="9" fill="#a24232">→ 由 Provider 热加载，无需重启（见「动态配置」）</text>
</svg>
