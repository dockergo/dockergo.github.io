<svg xmlns="http://www.w3.org/2000/svg" width="960" height="470" viewBox="0 0 960 470"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">动态配置 · dynamic.Configuration 与「EntryPoint→Router→Middleware→Service」引用模型</text>

  <!-- dynamic.Configuration tree -->
  <rect x="30" y="60" width="200" height="210" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="130" y="84" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">dynamic.Configuration</text>
  <text x="130" y="100" font-size="8" fill="#8fa9cf" text-anchor="middle">config.go:23</text>
  <rect x="46" y="112" width="168" height="34" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="130" y="133" font-size="9.5" fill="#1b2a4a" text-anchor="middle">HTTP：Routers/Services/MW</text>
  <rect x="46" y="152" width="168" height="30" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="130" y="171" font-size="9.5" fill="#1b2a4a" text-anchor="middle">TCP（SNI 路由/服务）</text>
  <rect x="46" y="188" width="168" height="30" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="130" y="207" font-size="9.5" fill="#1b2a4a" text-anchor="middle">UDP（会话服务）</text>
  <rect x="46" y="224" width="168" height="30" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="130" y="243" font-size="9.5" fill="#1b2a4a" text-anchor="middle">TLS（证书/选项/store）</text>

  <text x="130" y="290" font-size="8.5" fill="#8a8a8e" text-anchor="middle">由 Provider 产出，热加载</text>

  <!-- reference chain -->
  <text x="500" y="80" font-size="11" font-weight="600" fill="#5b7db1" text-anchor="middle">HTTP 引用模型（名称引用，运行期解析成对象图）</text>

  <rect x="300" y="110" width="150" height="86" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="375" y="132" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Router</text>
  <text x="375" y="150" font-size="8.5" fill="#5b7db1" text-anchor="middle">entryPoints[]</text>
  <text x="375" y="166" font-size="8.5" fill="#5b7db1" text-anchor="middle">rule + priority</text>
  <text x="375" y="182" font-size="8.5" fill="#5b7db1" text-anchor="middle">middlewares[] · service · tls</text>
  <text x="375" y="200" font-size="7.5" fill="#8fa9cf" text-anchor="middle">http_config.go:84</text>

  <rect x="510" y="110" width="150" height="86" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="585" y="132" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Middleware[]</text>
  <text x="585" y="150" font-size="8.5" fill="#5b7db1" text-anchor="middle">按序组成 alice 链</text>
  <text x="585" y="166" font-size="8.5" fill="#5b7db1" text-anchor="middle">auth/headers/ratelimit…</text>
  <text x="585" y="182" font-size="8.5" fill="#5b7db1" text-anchor="middle">可跨 Router 复用</text>
  <text x="585" y="200" font-size="7.5" fill="#8fa9cf" text-anchor="middle">middlewares.go:23</text>

  <rect x="720" y="110" width="180" height="86" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="810" y="132" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Service</text>
  <text x="810" y="150" font-size="8.5" fill="#5b7db1" text-anchor="middle">loadBalancer / weighted</text>
  <text x="810" y="166" font-size="8.5" fill="#5b7db1" text-anchor="middle">mirroring / failover</text>
  <text x="810" y="182" font-size="8.5" fill="#5b7db1" text-anchor="middle">servers[] + healthCheck</text>
  <text x="810" y="200" font-size="7.5" fill="#8fa9cf" text-anchor="middle">http_config.go:62</text>

  <line x1="450" y1="153" x2="508" y2="153" stroke="#b8b8bf" marker-end="url(#ar)"/>
  <text x="479" y="145" font-size="8" fill="#8a8a8e" text-anchor="middle">挂链</text>
  <line x1="660" y1="153" x2="718" y2="153" stroke="#b8b8bf" marker-end="url(#ar)"/>
  <text x="689" y="145" font-size="8" fill="#8a8a8e" text-anchor="middle">转发</text>

  <line x1="230" y1="150" x2="298" y2="150" stroke="#b8b8bf" marker-end="url(#ar)"/>

  <!-- servers -->
  <rect x="720" y="220" width="180" height="60" rx="10" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="810" y="242" font-size="9.5" font-weight="600" fill="#7a4d00" text-anchor="middle">Servers（后端 URL 池）</text>
  <text x="810" y="260" font-size="8.5" fill="#9a7328" text-anchor="middle">url + weight + passHostHeader</text>
  <text x="810" y="275" font-size="7.5" fill="#b08a3c" text-anchor="middle">http_config.go:470</text>
  <line x1="810" y1="196" x2="810" y2="218" stroke="#b8b8bf" marker-end="url(#ar)"/>

  <!-- provider origin -->
  <rect x="300" y="240" width="360" height="70" rx="11" fill="#f5f5f7" stroke="#d2d2d7"/>
  <text x="480" y="264" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">来源：Docker labels / K8s CRD/Ingress / File / KV …</text>
  <text x="480" y="284" font-size="8.5" fill="#6e6e73" text-anchor="middle">Provider 把外部真实状态翻译成 dynamic.Configuration</text>
  <text x="480" y="300" font-size="8" fill="#a1a1a6" text-anchor="middle">名称引用（service="svc@docker"）在同一份配置里解析</text>

  <!-- naming note -->
  <rect x="30" y="330" width="890" height="112" rx="12" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="50" y="356" font-size="11" font-weight="600" fill="#0f5132">关键：名称引用 + Provider 命名空间</text>
  <text x="50" y="380" font-size="9.5" fill="#3f8f66">· Router 用名字引用 Middleware 与 Service（如 service: api@docker），运行期在同一份合并配置里解析成对象图。</text>
  <text x="50" y="400" font-size="9.5" fill="#3f8f66">· 每个对象带 @&lt;provider&gt; 后缀（api@docker、web@file），跨 Provider 引用需带后缀，天然隔离命名冲突。</text>
  <text x="50" y="420" font-size="9.5" fill="#3f8f66">· 同一条 dynamic.Configuration 覆盖 HTTP/TCP/UDP/TLS 四面；每次 Provider 变更整包重推，watcher 去重后热替换。</text>
</svg>
