<svg xmlns="http://www.w3.org/2000/svg" width="960" height="450" viewBox="0 0 960 450"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="450" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Middleware 链 · alice.Chain 洋葱式：请求进层层加工，响应出层层回卷</text>

  <!-- onion -->
  <rect x="60" y="70" width="620" height="200" rx="14" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="120" y="90" font-size="9.5" font-weight="600" fill="#1b2a4a">mw1 auth</text>
  <rect x="120" y="98" width="500" height="148" rx="12" fill="#e3edfa" stroke="#bcd0ec"/>
  <text x="180" y="118" font-size="9.5" font-weight="600" fill="#1b2a4a">mw2 headers</text>
  <rect x="180" y="126" width="380" height="96" rx="10" fill="#d6e4f6" stroke="#bcd0ec"/>
  <text x="240" y="146" font-size="9.5" font-weight="600" fill="#1b2a4a">mw3 ratelimit</text>
  <rect x="240" y="154" width="260" height="52" rx="9" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="370" y="184" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">Service（最内层 handler）</text>

  <!-- flow arrows -->
  <line x1="30" y1="170" x2="58" y2="170" stroke="#5b7db1" marker-end="url(#ar)"/>
  <text x="44" y="160" font-size="8" fill="#5b7db1">请求→</text>
  <line x1="682" y1="200" x2="710" y2="200" stroke="#3f8f66" marker-end="url(#ar)"/>
  <text x="700" y="224" font-size="8" fill="#3f8f66">→后端</text>
  <path d="M700,150 C760,150 760,120 720,120" fill="none" stroke="#3f8f66" stroke-dasharray="3 3" marker-end="url(#ar)"/>
  <text x="800" y="132" font-size="8" fill="#3f8f66">←响应层层回卷</text>

  <text x="370" y="262" font-size="8.5" fill="#8fa9cf" text-anchor="middle">Builder.BuildMiddlewareChain 按 Router.middlewares[] 顺序包裹（middlewares.go:65）</text>

  <!-- catalog -->
  <text x="30" y="300" font-size="10.5" font-weight="600" fill="#5b7db1">中间件目录（pkg/middlewares，共 39 类）· 按职责分组</text>

  <rect x="30" y="312" width="215" height="120" rx="11" fill="#f5f5f7" stroke="#d2d2d7"/>
  <text x="137" y="332" font-size="9.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">认证 / 安全</text>
  <text x="137" y="352" font-size="8.5" fill="#6e6e73" text-anchor="middle">auth(Basic/Digest/Forward)</text>
  <text x="137" y="368" font-size="8.5" fill="#6e6e73" text-anchor="middle">ipallowlist · headers</text>
  <text x="137" y="384" font-size="8.5" fill="#6e6e73" text-anchor="middle">passtlsclientcert</text>
  <text x="137" y="404" font-size="8.5" fill="#6e6e73" text-anchor="middle">redirect · https-redirect</text>

  <rect x="255" y="312" width="215" height="120" rx="11" fill="#f5f5f7" stroke="#d2d2d7"/>
  <text x="362" y="332" font-size="9.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">流量 / 韧性</text>
  <text x="362" y="352" font-size="8.5" fill="#6e6e73" text-anchor="middle">ratelimiter · inflightreq</text>
  <text x="362" y="368" font-size="8.5" fill="#6e6e73" text-anchor="middle">circuitbreaker · retry</text>
  <text x="362" y="384" font-size="8.5" fill="#6e6e73" text-anchor="middle">buffering · compress</text>
  <text x="362" y="404" font-size="8.5" fill="#6e6e73" text-anchor="middle">customerrors</text>

  <rect x="480" y="312" width="215" height="120" rx="11" fill="#f5f5f7" stroke="#d2d2d7"/>
  <text x="587" y="332" font-size="9.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">路径 / 改写</text>
  <text x="587" y="352" font-size="8.5" fill="#6e6e73" text-anchor="middle">stripprefix(regex)</text>
  <text x="587" y="368" font-size="8.5" fill="#6e6e73" text-anchor="middle">addprefix · replacepath</text>
  <text x="587" y="384" font-size="8.5" fill="#6e6e73" text-anchor="middle">replacepathregex</text>
  <text x="587" y="404" font-size="8.5" fill="#6e6e73" text-anchor="middle">contenttype · chain</text>

  <rect x="705" y="312" width="225" height="120" rx="11" fill="#f6eefb" stroke="#e0c9f0"/>
  <text x="817" y="332" font-size="9.5" font-weight="600" fill="#5b2a7a" text-anchor="middle">扩展</text>
  <text x="817" y="352" font-size="8.5" fill="#8b5fb0" text-anchor="middle">plugins（Yaegi/wasm）</text>
  <text x="817" y="368" font-size="8.5" fill="#8b5fb0" text-anchor="middle">grpcweb · forwardedheaders</text>
  <text x="817" y="388" font-size="8.5" fill="#8b5fb0" text-anchor="middle">chain 可把多个中间件</text>
  <text x="817" y="404" font-size="8.5" fill="#8b5fb0" text-anchor="middle">打包成一个复用</text>
</svg>
