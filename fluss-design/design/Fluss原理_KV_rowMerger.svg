<svg xmlns="http://www.w3.org/2000/svg" width="980" height="470" viewBox="0 0 980 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="980" height="470" fill="#fbfbfd"/>
  <text x="30" y="32" font-size="14" font-weight="600" fill="#1d1d1f">rowMerger · 合并引擎与部分列更新</text>

  <!-- 顶部分派卡 -->
  <rect x="30" y="50" width="920" height="42" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="70" font-size="12" font-weight="600" fill="#1b2a4a">RowMerger.create() 按 <tspan font-weight="600">MergeEngineType</tspan> 分派合并器</text>
  <text x="46" y="85" font-size="9.5" fill="#5b7db1">同一主键多次写入时决定"如何合并"</text>
  <text x="934" y="76" font-size="9" fill="#a1a1a6" text-anchor="end">RowMerger.java:82</text>

  <!-- 分派总线 -->
  <path d="M490 92 L490 104" fill="none" stroke="#c7c7cc" stroke-width="1.5"/>
  <path d="M139 104 L841 104" fill="none" stroke="#c7c7cc" stroke-width="1.5"/>
  <path d="M139 104 L139 116" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <path d="M373 104 L373 116" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <path d="M607 104 L607 116" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <path d="M841 104 L841 116" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- 卡1 Default -->
  <rect x="30" y="118" width="218" height="172" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="46" y="144" font-size="12" font-weight="600" fill="#274a78">DefaultRowMerger</text>
  <text x="46" y="162" font-size="9.5" fill="#5b7db1">默认 · 无 merge-engine</text>
  <line x1="46" y1="172" x2="232" y2="172" stroke="#cfe0f2" stroke-width="1"/>
  <text x="46" y="194" font-size="10.5" fill="#274a78">merge() 恒取新值</text>
  <text x="46" y="214" font-size="10.5" fill="#274a78">始终保留最新一行</text>
  <text x="46" y="234" font-size="10.5" fill="#274a78">支持删除与部分更新</text>

  <!-- 卡2 First -->
  <rect x="264" y="118" width="218" height="172" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="280" y="144" font-size="12" font-weight="600" fill="#5a3410">FirstRowRowMerger</text>
  <text x="280" y="162" font-size="9.5" fill="#93762e">first_row</text>
  <line x1="280" y1="172" x2="466" y2="172" stroke="#e8cf9a" stroke-width="1"/>
  <text x="280" y="194" font-size="10.5" fill="#5a3410">保留最旧一行</text>
  <text x="280" y="214" font-size="10.5" fill="#5a3410">忽略后续更新</text>
  <text x="280" y="234" font-size="10.5" fill="#5a3410">禁删除、禁部分更新</text>

  <!-- 卡3 Versioned -->
  <rect x="498" y="118" width="218" height="172" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="514" y="144" font-size="12" font-weight="600" fill="#12402a">VersionedRowMerger</text>
  <text x="514" y="162" font-size="9.5" fill="#2f6f4f">versioned</text>
  <line x1="514" y1="172" x2="700" y2="172" stroke="#bfe0cd" stroke-width="1"/>
  <text x="514" y="194" font-size="10.5" fill="#12402a">按版本列比较大小</text>
  <text x="514" y="214" font-size="10.5" fill="#12402a">新版本才覆盖</text>
  <text x="514" y="234" font-size="10.5" fill="#12402a">旧版本直接丢弃</text>

  <!-- 卡4 Aggregate -->
  <rect x="732" y="118" width="218" height="172" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="748" y="144" font-size="12" font-weight="600" fill="#3d2a5a">AggregateRowMerger</text>
  <text x="748" y="162" font-size="9.5" fill="#6e6e73">aggregate</text>
  <line x1="748" y1="172" x2="934" y2="172" stroke="#d9c7ec" stroke-width="1"/>
  <text x="748" y="194" font-size="10.5" fill="#3d2a5a">sum/min/max/first_value…</text>
  <text x="748" y="214" font-size="10.5" fill="#3d2a5a">共 14 种聚合函数</text>
  <text x="748" y="234" font-size="10.5" fill="#3d2a5a">按列聚合更新</text>

  <!-- 到部分列更新 -->
  <path d="M490 290 L490 312" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="500" y="306" font-size="9" fill="#a1a1a6">目标列不全时叠加包装</text>

  <!-- 底部 PartialUpdater -->
  <rect x="30" y="314" width="920" height="126" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="46" y="340" font-size="12" font-weight="600" fill="#1d1d1f">部分列更新 · PartialUpdater</text>
  <text x="934" y="340" font-size="9" fill="#a1a1a6" text-anchor="end">partialupdate/PartialUpdater.java:104</text>
  <line x1="46" y1="352" x2="934" y2="352" stroke="#ececf1" stroke-width="1"/>
  <text x="46" y="378" font-size="10.5" fill="#1d1d1f">目标列不覆盖全部字段时 → 将上述任一合并器包装为 <tspan font-weight="600">PartialUpdateRowMerger</tspan></text>
  <text x="46" y="402" font-size="10.5" fill="#1d1d1f">仅更新 targetColumns 指定列，其余列沿用旧行取值（非空约束逐列校验）</text>
  <rect x="46" y="414" width="888" height="16" rx="6" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="490" y="426" font-size="9" fill="#274a78" text-anchor="middle">效果：一次 upsert 只改动指定列，实现列级增量更新</text>
</svg>
