<svg xmlns="http://www.w3.org/2000/svg" width="970" height="470" viewBox="0 0 970 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="970" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">ApiKeys 分派与安全鉴权</text>
  <text x="30" y="52" font-size="10.5" fill="#a1a1a6">forApiKey 据 ID 分派到对应 Gateway；请求先过认证、再过授权，两关都通过才进入业务</text>

  <!-- 上半：分派 -->
  <rect x="30" y="84" width="230" height="98" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="44" y="109" font-size="11.5" font-weight="600" fill="#1b2a4a">ApiManager</text>
  <text x="44" y="131" font-size="10" fill="#1b2a4a">维护 ID_TO_API 映射 · :42</text>
  <text x="44" y="151" font-size="10" fill="#5b7db1">forApiKey(short) 查表分派</text>
  <text x="44" y="171" font-size="9" fill="#8aa5cf">ApiManager.java:62</text>

  <rect x="470" y="82" width="250" height="46" rx="10" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="484" y="100" font-size="11" font-weight="600" fill="#274a78">CoordinatorGateway</text>
  <text x="484" y="118" font-size="9.5" fill="#5b7db1">集群 / 元数据类请求</text>

  <rect x="470" y="138" width="250" height="46" rx="10" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="484" y="156" font-size="11" font-weight="600" fill="#5a3410">TabletServerGateway</text>
  <text x="484" y="174" font-size="9.5" fill="#93762e">业务读写 · TabletService.java:154</text>

  <path d="M260,120 L360,120 L360,105 L468,105" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M260,146 L360,146 L360,161 L468,161" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="360" y="98" font-size="9" fill="#a1a1a6" text-anchor="middle">forApiKey 分派</text>

  <!-- ApiKeys 图例 -->
  <rect x="30" y="198" width="910" height="58" rx="11" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="46" y="220" font-size="10.5" font-weight="600" fill="#1d1d1f">ApiKeys 图例（short id → 请求类型）</text>
  <text x="46" y="242" font-size="10" fill="#6e6e73">PRODUCE_LOG <tspan font-weight="600" fill="#1b2a4a">1014</tspan></text>
  <text x="226" y="242" font-size="10" fill="#6e6e73">FETCH_LOG <tspan font-weight="600" fill="#1b2a4a">1015</tspan></text>
  <text x="392" y="242" font-size="10" fill="#6e6e73">LOOKUP <tspan font-weight="600" fill="#1b2a4a">1017</tspan></text>
  <text x="540" y="242" font-size="10" fill="#6e6e73">INIT_WRITER <tspan font-weight="600" fill="#1b2a4a">1026</tspan></text>
  <text x="720" y="242" font-size="10" fill="#6e6e73">PREFIX_LOOKUP <tspan font-weight="600" fill="#1b2a4a">1034</tspan></text>

  <!-- 下半：鉴权关卡 -->
  <text x="30" y="290" font-size="12" font-weight="600" fill="#1d1d1f">安全鉴权关卡 · 认证 → 授权，通过才到 Gateway</text>

  <rect x="30" y="308" width="92" height="94" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="76" y="352" font-size="11" font-weight="600" fill="#1d1d1f" text-anchor="middle">请求</text>
  <text x="76" y="371" font-size="9.5" fill="#6e6e73" text-anchor="middle">入站</text>

  <rect x="156" y="300" width="238" height="110" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="170" y="325" font-size="11.5" font-weight="600" fill="#274a78">① 认证</text>
  <text x="170" y="348" font-size="10.5" fill="#274a78">PLAINTEXT / SASL</text>
  <text x="170" y="369" font-size="10" fill="#5b7db1">校验身份，建立 Session</text>
  <text x="170" y="392" font-size="9" fill="#8aa5cf">security/auth/</text>

  <rect x="428" y="300" width="368" height="110" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="442" y="325" font-size="11.5" font-weight="600" fill="#5a3410">② 授权</text>
  <text x="442" y="347" font-size="10" fill="#5a3410">Authorizer.isAuthorized(Session, OperationType, Resource) · :60</text>
  <text x="442" y="368" font-size="10" fill="#93762e">ACL = AccessControlEntry(principal + permission + host + operation) · :43</text>
  <text x="442" y="389" font-size="10" fill="#93762e">ACL 存 ZK 路径 /fluss-acls</text>

  <rect x="830" y="308" width="110" height="94" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="885" y="352" font-size="11" font-weight="600" fill="#12402a" text-anchor="middle">Gateway</text>
  <text x="885" y="371" font-size="9.5" fill="#2f6f4f" text-anchor="middle">通过 → 处理</text>

  <path d="M122,355 L154,355" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M394,355 L426,355" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="410" y="347" font-size="9" fill="#a1a1a6" text-anchor="middle">认证通过</text>
  <path d="M796,355 L828,355" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="812" y="347" font-size="9" fill="#a1a1a6" text-anchor="middle">授权通过</text>
</svg>
