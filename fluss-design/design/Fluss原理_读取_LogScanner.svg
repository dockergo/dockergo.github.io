<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="960" height="420" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">LogScanner · 流式顺序读日志</text>
  <text x="30" y="52" font-size="10.5" fill="#a1a1a6">订阅桶与起始位点，poll 拉批，按桶从 Leader 顺序扫描日志；满足条件时走 Arrow 快路径</text>

  <!-- main flow arrows -->
  <path d="M200,180 L225,180" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M355,180 L380,180" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M550,180 L575,180" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M755,180 L780,180" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- c1 subscribe -->
  <rect x="30" y="140" width="170" height="80" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="166" font-size="11" font-weight="600" fill="#1b2a4a">LogScanner.subscribe</text>
  <text x="46" y="186" font-size="10.5" fill="#1b2a4a">(bucket, offset)</text>
  <text x="46" y="206" font-size="9" fill="#8aa5cf">LogScanner.java:69</text>

  <!-- c2 poll -->
  <rect x="225" y="140" width="130" height="80" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="241" y="166" font-size="11" font-weight="600" fill="#1b2a4a">poll(Duration)</text>
  <text x="241" y="186" font-size="10.5" fill="#1b2a4a">拉取一批</text>
  <text x="241" y="206" font-size="9" fill="#8aa5cf">LogScanner.java:57</text>

  <!-- c3 LogFetcher -->
  <rect x="380" y="140" width="170" height="80" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="396" y="166" font-size="11" font-weight="600" fill="#274a78">LogFetcher</text>
  <text x="396" y="186" font-size="10.5" fill="#274a78">发 FETCH_LOG(1015)</text>
  <text x="396" y="206" font-size="9" fill="#7a9dc9">按桶批量拉取</text>

  <!-- c4 LogTablet -->
  <rect x="575" y="140" width="180" height="80" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="591" y="166" font-size="11" font-weight="600" fill="#5a3410">各桶 Leader</text>
  <text x="591" y="186" font-size="10.5" fill="#5a3410">LogTablet 顺序读</text>
  <text x="591" y="206" font-size="9" fill="#b39456">从 offset 连续扫描</text>

  <!-- c5 ScanRecords -->
  <rect x="780" y="140" width="150" height="80" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="796" y="166" font-size="11" font-weight="600" fill="#12402a">ScanRecords</text>
  <text x="796" y="186" font-size="10.5" fill="#12402a">解码后的记录</text>
  <text x="796" y="206" font-size="9" fill="#4b8b63">交给应用迭代</text>

  <!-- branch down from poll -->
  <path d="M290,220 L290,272" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="298" y="250" font-size="9" fill="#a1a1a6">条件满足时</text>

  <rect x="225" y="272" width="380" height="82" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="241" y="296" font-size="11" font-weight="600" fill="#12402a">快路径 · pollRecordBatch</text>
  <text x="241" y="318" font-size="10" fill="#2f6f4f">条件：ARROW 格式 且 无 CDC 且 无投影</text>
  <text x="241" y="338" font-size="9.5" fill="#4b8b63">跳过逐行解码，直接返回列存批 · LogScannerImpl.java:157</text>

  <path d="M605,313 L648,313" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <rect x="648" y="291" width="180" height="44" rx="10" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="662" y="311" font-size="11" font-weight="600" fill="#12402a">Arrow batch</text>
  <text x="662" y="328" font-size="9" fill="#4b8b63">应用直接消费列存批</text>

  <!-- bottom note -->
  <rect x="30" y="372" width="900" height="38" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="46" y="396" font-size="10.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">变更流语义</tspan>　主键表的 LogScanner 读到的是 changelog (+I / -U / +U / -D)——是变更流而非最新快照</text>
</svg>
