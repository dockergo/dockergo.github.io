<svg xmlns="http://www.w3.org/2000/svg" width="940" height="440" viewBox="0 0 940 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="940" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">快照批读与联合读入口</text>

  <!-- 顶部卡 BatchScanner -->
  <rect x="300" y="52" width="340" height="56" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="470" y="76" font-size="12" font-weight="600" fill="#274a78" text-anchor="middle">BatchScanner · 有界读</text>
  <text x="470" y="95" font-size="9.5" fill="#5b7db1" text-anchor="middle">读完 bucket 自动停止 · BatchScanner.java:39</text>

  <!-- 分叉连线 -->
  <path d="M470,108 L470,128 L230,128 L230,150" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M470,108 L470,128 L710,128 L710,150" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="360" y="123" font-size="9" fill="#a1a1a6">分支 1</text>
  <text x="580" y="123" font-size="9" fill="#a1a1a6">分支 2 · datalake 启用</text>

  <!-- 分支1 蓝 -->
  <rect x="80" y="150" width="300" height="52" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="230" y="172" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">KvSnapshotBatchScanner · :69</text>
  <text x="230" y="190" font-size="9.5" fill="#5b7db1" text-anchor="middle">主键表读一致快照全量</text>
  <path d="M230,202 L230,224" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="80" y="226" width="300" height="46" rx="11" fill="#ffffff" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="230" y="254" font-size="11" fill="#1b2a4a" text-anchor="middle">下载远端 KV 快照文件</text>
  <path d="M230,272 L230,294" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="80" y="296" width="300" height="52" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="230" y="318" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">有界扫描 · 快照全量</text>
  <text x="230" y="336" font-size="9.5" fill="#5b7db1" text-anchor="middle">扫完即返回 · 无实时增量</text>

  <!-- 分支2 琥珀 -->
  <rect x="560" y="150" width="300" height="52" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="710" y="172" font-size="12" font-weight="600" fill="#5a3410" text-anchor="middle">LakeSnapshotAndLogSplitScanner</text>
  <text x="710" y="190" font-size="9.5" fill="#93762e" text-anchor="middle">:52 · 历史与实时联合</text>
  <path d="M710,202 L710,224" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="560" y="226" width="300" height="46" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="710" y="248" font-size="11" fill="#5a3410" text-anchor="middle">湖快照（历史） + Fluss log（实时）</text>
  <text x="710" y="264" font-size="9.5" fill="#93762e" text-anchor="middle">两段数据源同时进入</text>
  <path d="M710,272 L710,294" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="560" y="296" width="300" height="52" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="710" y="318" font-size="12" font-weight="600" fill="#5a3410" text-anchor="middle">按 offset 拼接</text>
  <text x="710" y="336" font-size="9.5" fill="#93762e" text-anchor="middle">湖快照结束点续接 log 增量</text>

  <!-- 底部小注 -->
  <text x="470" y="400" font-size="9.5" fill="#a1a1a6" text-anchor="middle">联合读客户端底座 · 详见 Flink 集成主线</text>
</svg>
