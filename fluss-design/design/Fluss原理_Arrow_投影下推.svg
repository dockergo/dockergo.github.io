<svg xmlns="http://www.w3.org/2000/svg" width="960" height="450" viewBox="0 0 960 450" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="960" height="450" fill="#fbfbfd"/>
  <text x="30" y="32" font-size="14" font-weight="600" fill="#1d1d1f">投影下推 · 服务端在 Arrow 上裁列</text>

  <!-- 顶部横向流程 4 卡 -->
  <rect x="30" y="52" width="216" height="130" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="76" font-size="11" font-weight="600" fill="#1b2a4a">客户端 · LogScan</text>
  <text x="46" y="94" font-size="9" fill="#a1a1a6">LogScan.java:48</text>
  <line x1="46" y1="104" x2="230" y2="104" stroke="#bcd0ec" stroke-width="1"/>
  <text x="46" y="126" font-size="10" fill="#1b2a4a">withProjectedFields(int[])</text>
  <text x="46" y="146" font-size="10" fill="#1b2a4a">声明只读第 1、3 列</text>
  <text x="46" y="166" font-size="10" fill="#1b2a4a">下推给服务端</text>

  <path d="M246 117 L268 117" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="258" y="52" width="216" height="130" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="274" y="76" font-size="11" font-weight="600" fill="#274a78">服务端 · FetchParams</text>
  <text x="274" y="94" font-size="9" fill="#a1a1a6">FetchParams.java:65</text>
  <line x1="274" y1="104" x2="458" y2="104" stroke="#cfe0f2" stroke-width="1"/>
  <text x="274" y="126" font-size="10" fill="#274a78">projectionEnabled 为真</text>
  <text x="274" y="146" font-size="10" fill="#274a78">携带投影字段集</text>
  <text x="274" y="166" font-size="10" fill="#274a78">进入读取路径</text>

  <path d="M474 117 L496 117" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="486" y="52" width="216" height="130" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="502" y="76" font-size="11" font-weight="600" fill="#12402a">FileLogProjection</text>
  <text x="502" y="94" font-size="9" fill="#a1a1a6">FileLogProjection.java:79</text>
  <line x1="502" y1="104" x2="686" y2="104" stroke="#bfe0cd" stroke-width="1"/>
  <text x="502" y="126" font-size="10" fill="#12402a">在 Arrow 二进制</text>
  <text x="502" y="146" font-size="10" fill="#12402a">FileLogRecords 上按</text>
  <text x="502" y="166" font-size="10" fill="#12402a">selectedFields(BitSet) project · :171</text>

  <path d="M702 117 L724 117" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="714" y="52" width="216" height="130" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="730" y="76" font-size="11" font-weight="600" fill="#5a3410">零拷贝发送</text>
  <text x="730" y="94" font-size="9" fill="#a1a1a6">FlussFileRegion</text>
  <line x1="730" y1="104" x2="914" y2="104" stroke="#e8cf9a" stroke-width="1"/>
  <text x="730" y="126" font-size="10" fill="#5a3410">裁列后的 Arrow 段</text>
  <text x="730" y="146" font-size="10" fill="#5a3410">经 FileRegion 零拷贝</text>
  <text x="730" y="166" font-size="10" fill="#5a3410">直接下发客户端</text>

  <!-- 流程到可视化 -->
  <path d="M330 182 L330 236" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="340" y="212" font-size="9" fill="#a1a1a6">按选中列裁剪</text>

  <!-- 可视化：全列表 -->
  <text x="150" y="228" font-size="10" font-weight="600" fill="#1d1d1f">服务端 Arrow FileLogRecords（全 5 列）</text>
  <rect x="150" y="238" width="360" height="150" rx="10" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <!-- c0 grey -->
  <rect x="162" y="250" width="64" height="126" rx="6" fill="#f2f2f4" stroke="#e2e2e6"/>
  <text x="194" y="268" font-size="9" fill="#a1a1a6" text-anchor="middle">c0</text>
  <text x="194" y="300" font-size="8.5" fill="#c7c7cc" text-anchor="middle">···</text>
  <!-- c1 highlight -->
  <rect x="230" y="250" width="64" height="126" rx="6" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="262" y="268" font-size="9" font-weight="600" fill="#1b2a4a" text-anchor="middle">c1 ✓</text>
  <text x="262" y="300" font-size="8.5" fill="#5b7db1" text-anchor="middle">选中</text>
  <!-- c2 grey -->
  <rect x="298" y="250" width="64" height="126" rx="6" fill="#f2f2f4" stroke="#e2e2e6"/>
  <text x="330" y="268" font-size="9" fill="#a1a1a6" text-anchor="middle">c2</text>
  <text x="330" y="300" font-size="8.5" fill="#c7c7cc" text-anchor="middle">···</text>
  <!-- c3 highlight -->
  <rect x="366" y="250" width="64" height="126" rx="6" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="398" y="268" font-size="9" font-weight="600" fill="#1b2a4a" text-anchor="middle">c3 ✓</text>
  <text x="398" y="300" font-size="8.5" fill="#5b7db1" text-anchor="middle">选中</text>
  <!-- c4 grey -->
  <rect x="434" y="250" width="64" height="126" rx="6" fill="#f2f2f4" stroke="#e2e2e6"/>
  <text x="466" y="268" font-size="9" fill="#a1a1a6" text-anchor="middle">c4</text>
  <text x="466" y="300" font-size="8.5" fill="#c7c7cc" text-anchor="middle">···</text>

  <!-- 网络箭头 -->
  <path d="M510 313 L588 313" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="549" y="305" font-size="9" fill="#a1a1a6" text-anchor="middle">网络只传选中列</text>

  <!-- 客户端收到 -->
  <text x="620" y="228" font-size="10" font-weight="600" fill="#12402a">客户端收到（仅 2 列）</text>
  <rect x="596" y="238" width="168" height="150" rx="10" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <rect x="612" y="250" width="64" height="126" rx="6" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="644" y="268" font-size="9" font-weight="600" fill="#12402a" text-anchor="middle">c1</text>
  <text x="644" y="300" font-size="8.5" fill="#2c5a3a" text-anchor="middle">值</text>
  <rect x="684" y="250" width="64" height="126" rx="6" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="716" y="268" font-size="9" font-weight="600" fill="#12402a" text-anchor="middle">c3</text>
  <text x="716" y="300" font-size="8.5" fill="#2c5a3a" text-anchor="middle">值</text>
  <text x="680" y="368" font-size="8.5" fill="#2c5a3a" text-anchor="middle">未选列不读、不传</text>

  <!-- 底部小注 -->
  <rect x="150" y="402" width="614" height="30" rx="9" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="164" y="421" font-size="9.5" fill="#6e6e73">Projection 支持<tspan font-weight="600" fill="#1d1d1f">选列 + 重排</tspan>（输出列顺序可与表定义不同）· Projection.java:42</text>
</svg>
