<svg xmlns="http://www.w3.org/2000/svg" width="980" height="470" viewBox="0 0 980 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="980" height="470" fill="#fbfbfd"/>
  <text x="30" y="32" font-size="14" font-weight="600" fill="#1d1d1f">LogTablet / LogSegment 文件结构</text>

  <!-- 外层 LogTablet 淡绿容器 -->
  <rect x="30" y="52" width="920" height="118" rx="13" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="46" y="74" font-size="12" font-weight="600" fill="#2c5a3a">LogTablet（一桶一条，按 baseOffset 顺序追加）</text>

  <!-- 横排 LogSegment 琥珀变体卡 -->
  <rect x="46" y="88" width="196" height="66" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="60" y="110" font-size="11" font-weight="600" fill="#5a3410">LogSegment #0</text>
  <text x="60" y="128" font-size="9.5" fill="#93762e">baseOffset = 0</text>
  <text x="60" y="144" font-size="9.5" fill="#93762e">已封存 · 只读</text>

  <rect x="258" y="88" width="196" height="66" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="272" y="110" font-size="11" font-weight="600" fill="#5a3410">LogSegment #1</text>
  <text x="272" y="128" font-size="9.5" fill="#93762e">baseOffset = 4096</text>
  <text x="272" y="144" font-size="9.5" fill="#93762e">已封存 · 只读</text>

  <rect x="470" y="88" width="196" height="66" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="484" y="110" font-size="11" font-weight="600" fill="#5a3410">LogSegment #2</text>
  <text x="484" y="128" font-size="9.5" fill="#93762e">baseOffset = 8210</text>
  <text x="484" y="144" font-size="9.5" fill="#93762e">已封存 · 只读</text>

  <rect x="682" y="88" width="252" height="66" rx="11" fill="#fff7e6" stroke="#e8cf9a" stroke-width="2" filter="url(#soft)"/>
  <text x="696" y="110" font-size="11" font-weight="600" fill="#5a3410">LogSegment #3 · <tspan font-weight="600">active</tspan></text>
  <text x="696" y="128" font-size="9.5" fill="#93762e">baseOffset = 12300 · 当前可写</text>
  <text x="696" y="144" font-size="9.5" fill="#93762e">新记录批追加于此</text>

  <!-- 展开箭头 -->
  <path d="M808 154 L808 190" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="818" y="178" font-size="9" fill="#a1a1a6">展开 active 段的四个文件</text>

  <!-- 四个文件卡 -->
  <rect x="30" y="200" width="222" height="118" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="46" y="222" font-size="12" font-weight="600" fill="#5a3410">.log</text>
  <text x="46" y="242" font-size="10.5" fill="#5a3410">FileLogRecords</text>
  <text x="46" y="260" font-size="9.5" fill="#93762e">记录批顺序落盘，零拷贝读</text>
  <text x="46" y="276" font-size="9.5" fill="#93762e">段主体，按 baseOffset 命名</text>
  <text x="46" y="304" font-size="9" fill="#a1a1a6">LogSegment.java:85</text>

  <rect x="266" y="200" width="222" height="118" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="282" y="222" font-size="12" font-weight="600" fill="#1b2a4a">.index</text>
  <text x="282" y="242" font-size="10.5" fill="#1b2a4a">OffsetIndex 稀疏</text>
  <text x="282" y="260" font-size="9.5" fill="#5b7db1">每项 8B = 4B 相对 offset</text>
  <text x="282" y="276" font-size="9.5" fill="#5b7db1">+ 4B 物理位置</text>
  <text x="282" y="304" font-size="9" fill="#a1a1a6">OffsetIndex.java:71</text>

  <rect x="502" y="200" width="222" height="118" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="518" y="222" font-size="12" font-weight="600" fill="#3d2a5a">.timeindex</text>
  <text x="518" y="242" font-size="10.5" fill="#3d2a5a">TimeIndex</text>
  <text x="518" y="260" font-size="9.5" fill="#3d2a5a">每项 12B = 8B 时间戳</text>
  <text x="518" y="276" font-size="9.5" fill="#3d2a5a">+ 4B 相对 offset</text>
  <text x="518" y="304" font-size="9" fill="#a1a1a6">按时间戳定位 offset</text>

  <rect x="738" y="200" width="212" height="118" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="754" y="222" font-size="12" font-weight="600" fill="#12402a">.writer_snapshot</text>
  <text x="754" y="242" font-size="10.5" fill="#12402a">幂等 WriterState 快照</text>
  <text x="754" y="260" font-size="9.5" fill="#2f6f4f">writerId → batchSequence</text>
  <text x="754" y="276" font-size="9.5" fill="#2f6f4f">滚段时落盘，恢复用</text>
  <text x="754" y="304" font-size="9" fill="#a1a1a6">重启重建幂等去重表</text>

  <!-- 底部小注 -->
  <rect x="30" y="340" width="920" height="106" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="46" y="364" font-size="11" font-weight="600" fill="#1d1d1f">关键约束</text>
  <text x="46" y="386" font-size="10" fill="#6e6e73">· 稀疏索引：每写满 <tspan font-weight="600" fill="#1d1d1f">indexIntervalBytes</tspan>（log.index.interval-size 默认 4k）追加一条索引项 · LogSegment.java:292</text>
  <text x="46" y="408" font-size="10" fill="#6e6e73">· 索引文件用 <tspan font-weight="600" fill="#1d1d1f">mmap</tspan> 映射，二分查找相对 offset / 时间戳 · AbstractIndex.java:81</text>
  <text x="46" y="430" font-size="10" fill="#6e6e73">· 文件后缀常量（.log / .index / .timeindex / .writer_snapshot）· FlussPaths.java:59-68</text>
</svg>
