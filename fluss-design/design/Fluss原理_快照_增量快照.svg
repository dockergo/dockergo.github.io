<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="480" viewBox="0 0 1000 480" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="480" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">KV 增量快照 · RocksDB Checkpoint 上传 DFS</text>
  <text x="30" y="52" font-size="10.5" fill="#a1a1a6">周期调度 → 硬链 live 文件 → 仅上传新 SST、旧文件复用占位 → 分流 SHARED/EXCLUSIVE 落 DFS</text>

  <!-- 顶部流水 -->
  <rect x="30" y="78" width="240" height="98" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="44" y="103" font-size="11.5" font-weight="600" fill="#1b2a4a">PeriodicSnapshotManager</text>
  <text x="44" y="124" font-size="10" fill="#1b2a4a">周期调度 kv.snapshot.interval</text>
  <text x="44" y="142" font-size="10" fill="#5b7db1">默认 10min</text>
  <text x="44" y="160" font-size="10" fill="#5b7db1">murmurHash(bucket)%interval 打散</text>

  <rect x="300" y="78" width="220" height="98" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="314" y="103" font-size="11.5" font-weight="600" fill="#1b2a4a">triggerSnapshot</text>
  <text x="314" y="124" font-size="10" fill="#1b2a4a">写锁内 initSnapshot</text>
  <text x="314" y="142" font-size="10" fill="#5b7db1">无更新则跳过</text>
  <text x="314" y="160" font-size="9" fill="#8aa5cf">PeriodicSnapshotManager:196</text>

  <rect x="550" y="78" width="250" height="98" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="564" y="103" font-size="11.5" font-weight="600" fill="#3d2a5a">RocksIncrementalSnapshot</text>
  <text x="564" y="124" font-size="10" fill="#3d2a5a">Checkpoint.createCheckpoint</text>
  <text x="564" y="142" font-size="10" fill="#7a5aa6">硬链 live 文件 · 零拷贝 · :159</text>
  <text x="564" y="160" font-size="9" fill="#9a86bd">RocksIncrementalSnapshot.java:125</text>

  <path d="M270,127 L298,127" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M520,127 L548,127" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- C 向下到 SST 集合 -->
  <path d="M675,176 L675,196 L300,196 L300,222" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- RocksDB SST 集合 -->
  <text x="30" y="215" font-size="11" font-weight="600" fill="#1d1d1f">RocksDB SST 集合</text>
  <rect x="30" y="224" width="96" height="62" rx="9" fill="#f2f2f5" stroke="#d9d9df"/>
  <text x="78" y="250" font-size="9.5" fill="#6e6e73" text-anchor="middle">已传·复用</text>
  <text x="78" y="268" font-size="9.5" fill="#6e6e73" text-anchor="middle">Placeholder</text>

  <rect x="136" y="224" width="96" height="62" rx="9" fill="#f2f2f5" stroke="#d9d9df"/>
  <text x="184" y="250" font-size="9.5" fill="#6e6e73" text-anchor="middle">已传·复用</text>
  <text x="184" y="268" font-size="9.5" fill="#6e6e73" text-anchor="middle">Placeholder</text>

  <rect x="242" y="224" width="96" height="62" rx="9" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="290" y="258" font-size="10" font-weight="600" fill="#12402a" text-anchor="middle">新 SST</text>

  <rect x="348" y="224" width="96" height="62" rx="9" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="396" y="258" font-size="10" font-weight="600" fill="#12402a" text-anchor="middle">新 SST</text>

  <rect x="454" y="224" width="96" height="62" rx="9" fill="#f2f2f5" stroke="#d9d9df"/>
  <text x="502" y="250" font-size="9.5" fill="#6e6e73" text-anchor="middle">已传·复用</text>
  <text x="502" y="268" font-size="9.5" fill="#6e6e73" text-anchor="middle">Placeholder</text>

  <!-- 分流箭头 -->
  <path d="M550,240 L598,240" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="574" y="232" font-size="9" fill="#a1a1a6" text-anchor="middle">新</text>
  <path d="M550,270 L598,320" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="566" y="308" font-size="9" fill="#a1a1a6" text-anchor="middle">其余</text>

  <!-- SHARED / EXCLUSIVE -->
  <rect x="600" y="212" width="180" height="56" rx="10" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="614" y="235" font-size="11" font-weight="600" fill="#12402a">SHARED 目录</text>
  <text x="614" y="255" font-size="9.5" fill="#2f6f4f">仅上传新增 SST</text>

  <rect x="600" y="292" width="180" height="56" rx="10" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="614" y="315" font-size="11" font-weight="600" fill="#1d1d1f">EXCLUSIVE 私有目录</text>
  <text x="614" y="335" font-size="9.5" fill="#6e6e73">其余文件 / 元数据 · :219</text>

  <!-- DFS -->
  <rect x="820" y="212" width="150" height="136" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="895" y="272" font-size="12" font-weight="600" fill="#274a78" text-anchor="middle">DFS</text>
  <text x="895" y="294" font-size="9.5" fill="#5b7db1" text-anchor="middle">远端持久化存储</text>
  <path d="M780,240 L818,240" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M780,320 L818,320" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 底部框 -->
  <rect x="30" y="384" width="940" height="72" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="46" y="410" font-size="11" font-weight="600" fill="#5a3410">initSnapshot 读 flushedLogOffset · KvTabletSnapshotTarget.initSnapshot:169</text>
  <text x="46" y="431" font-size="10.5" fill="#93762e">读当前 flushedLogOffset，若 &lt;= 上次快照则跳过（无更新不生成快照）</text>
  <text x="46" y="449" font-size="10.5" fill="#93762e">结果：每个快照严格对应一个 flushedLogOffset —— 快照即“日志某点的物化视图”</text>
</svg>
