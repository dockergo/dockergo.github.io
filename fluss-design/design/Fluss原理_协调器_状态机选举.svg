<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="480" viewBox="0 0 1000 480" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="480" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">状态机与 Leader 选举</text>
  <text x="30" y="52" font-size="10.5" fill="#a1a1a6">副本与桶两级状态机驱动生命周期，桶由 New 转 Online 时触发 Leader 选举并写回 ZK</text>

  <!-- Row A: ReplicaState -->
  <text x="30" y="82" font-size="11" font-weight="600" fill="#1b2a4a">ReplicaState　<tspan font-size="8.5" font-weight="400" fill="#8aa5cf">ReplicaStateMachine.java:51</tspan></text>
  <rect x="150" y="92" width="120" height="44" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="210" y="119" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">NonExistent</text>
  <rect x="320" y="92" width="120" height="44" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="380" y="119" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">New</text>
  <rect x="490" y="92" width="120" height="44" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="550" y="119" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Online</text>
  <rect x="660" y="92" width="120" height="44" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="720" y="119" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Offline</text>
  <rect x="830" y="92" width="120" height="44" rx="11" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="890" y="119" font-size="10.5" font-weight="600" fill="#4a1414" text-anchor="middle">Deletion 态</text>
  <path d="M272,114 L318,114" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="295" y="104" font-size="8.5" fill="#a1a1a6" text-anchor="middle">新建</text>
  <path d="M442,114 L488,114" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="465" y="104" font-size="8.5" fill="#a1a1a6" text-anchor="middle">上线</text>
  <path d="M612,114 L658,114" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="635" y="104" font-size="8.5" fill="#a1a1a6" text-anchor="middle">下线</text>
  <path d="M782,114 L828,114" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="805" y="104" font-size="8.5" fill="#a1a1a6" text-anchor="middle">删除</text>

  <!-- Row B: BucketState -->
  <text x="30" y="166" font-size="11" font-weight="600" fill="#274a78">BucketState　<tspan font-size="8.5" font-weight="400" fill="#8aa5cf">TableBucketStateMachine.java:53</tspan></text>
  <rect x="150" y="176" width="120" height="44" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="210" y="203" font-size="10.5" font-weight="600" fill="#274a78" text-anchor="middle">NonExistent</text>
