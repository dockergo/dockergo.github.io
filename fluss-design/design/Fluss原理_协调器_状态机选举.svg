  <rect x="490" y="176" width="120" height="44" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="550" y="203" font-size="10.5" font-weight="600" fill="#274a78" text-anchor="middle">Online</text>
  <rect x="660" y="176" width="120" height="44" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="720" y="203" font-size="10.5" font-weight="600" fill="#274a78" text-anchor="middle">Offline</text>
  <path d="M272,198 L318,198" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="295" y="188" font-size="8.5" fill="#a1a1a6" text-anchor="middle">新建</text>
  <path d="M442,198 L488,198" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="465" y="188" font-size="8.5" fill="#a1a1a6" text-anchor="middle">上线选主</text>
  <path d="M612,198 L658,198" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="635" y="188" font-size="8.5" fill="#a1a1a6" text-anchor="middle">失联下线</text>

  <!-- divider subtitle -->
  <text x="30" y="258" font-size="12" font-weight="600" fill="#1d1d1f">桶 New→Online 时的 Leader 选举流程</text>

  <!-- lower flow arrows -->
  <path d="M200,316 L222,316" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M392,316 L414,316" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M584,316 L606,316" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M776,316 L798,316" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="30" y="272" width="170" height="88" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="44" y="296" font-size="11" font-weight="600" fill="#274a78">① New→Online 触发</text>
  <text x="44" y="317" font-size="10" fill="#274a78">initLeaderForTableBuckets</text>
  <text x="44" y="338" font-size="9" fill="#8aa5cf">TableBucketStateMachine:306</text>

  <rect x="222" y="272" width="170" height="88" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="236" y="296" font-size="11" font-weight="600" fill="#1b2a4a">② 过滤 live 副本</text>
  <text x="236" y="317" font-size="10" fill="#1b2a4a">仅存活副本参与竞选</text>
  <text x="236" y="338" font-size="9" fill="#8aa5cf">剔除失联 / 下线节点</text>

  <rect x="414" y="272" width="170" height="88" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="428" y="296" font-size="11" font-weight="600" fill="#1b2a4a">③ electLeader 选主</text>
  <text x="428" y="317" font-size="10" fill="#1b2a4a">按策略选出 leader</text>
  <text x="428" y="338" font-size="9" fill="#8aa5cf">ReplicaLeaderElection.java:161</text>

  <rect x="606" y="272" width="170" height="88" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="620" y="296" font-size="11" font-weight="600" fill="#5a3410">④ 写回 ZooKeeper</text>
  <text x="620" y="317" font-size="10" fill="#5a3410">registerLeaderAndIsr</text>
  <text x="620" y="338" font-size="9" fill="#b39456">写 leader_isr · ZkClient:315</text>

  <rect x="798" y="272" width="170" height="88" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="812" y="296" font-size="11" font-weight="600" fill="#5a3410">⑤ 下发通知</text>
  <text x="812" y="317" font-size="10" fill="#5a3410">NotifyLeaderAndIsr</text>
  <text x="812" y="338" font-size="9" fill="#b39456">推送给 TabletServer</text>

  <!-- bottom note -->
  <rect x="30" y="398" width="938" height="56" rx="12" fill="#ffffff" stroke="#ececf1"/>
  <text x="46" y="422" font-size="11" font-weight="600" fill="#1d1d1f">选举策略</text>
  <text x="46" y="444" font-size="10.5" fill="#6e6e73"><tspan font-weight="600" fill="#1b2a4a">日志表</tspan> 取存活副本列表中的首个 · :189　　<tspan font-weight="600" fill="#5a3410">主键表</tspan> 优先提升仍存活的 standby 以减少状态重建 · :203</text>
</svg>
