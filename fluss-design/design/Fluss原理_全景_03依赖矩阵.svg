<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="960" height="420" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">依赖矩阵 · 接触面（行）× 支撑能力域（列）</text>
  <text x="30" y="50" font-size="11" fill="#6e6e73">● 强依赖　◐ 中依赖　○ 弱/间接　—— 每条主线的依赖须在正文有落点</text>

  <!-- column headers -->
  <g font-size="10.5" fill="#1b2a4a" font-weight="600">
    <text x="300" y="92" text-anchor="middle">Log 存储</text>
    <text x="378" y="92" text-anchor="middle">KV·changelog</text>
    <text x="462" y="92" text-anchor="middle">Arrow 列存</text>
    <text x="540" y="92" text-anchor="middle">副本 ISR</text>
    <text x="618" y="92" text-anchor="middle">协调器</text>
    <text x="700" y="92" text-anchor="middle">Lakehouse</text>
    <text x="782" y="92" text-anchor="middle">快照恢复</text>
    <text x="860" y="92" text-anchor="middle">网络 RPC</text>
  </g>

  <!-- grid -->
  <g stroke="#e6e6ea" stroke-width="1">
    <line x1="260" y1="104" x2="900" y2="104"/>
    <line x1="260" y1="160" x2="900" y2="160"/>
    <line x1="260" y1="216" x2="900" y2="216"/>
    <line x1="260" y1="272" x2="900" y2="272"/>
  </g>

  <!-- row labels -->
  <g font-size="12" font-weight="600" fill="#1d1d1f">
    <text x="40" y="136">表模型与写入</text>
    <text x="40" y="192">读取（点查/流/批）</text>
    <text x="40" y="248">Flink / Lakehouse 集成</text>
  </g>

  <!-- cells: rows y = 132,188,244 ; cols x = 300,378,462,540,618,700,782,860 -->
  <g font-size="15" text-anchor="middle">
    <!-- 写入 -->
    <text x="300" y="137" fill="#30a46c">●</text>
    <text x="378" y="137" fill="#30a46c">●</text>
    <text x="462" y="137" fill="#d98a00">◐</text>
    <text x="540" y="137" fill="#30a46c">●</text>
    <text x="618" y="137" fill="#d98a00">◐</text>
    <text x="700" y="137" fill="#c7c7cc">○</text>
    <text x="782" y="137" fill="#c7c7cc">○</text>
    <text x="860" y="137" fill="#30a46c">●</text>
    <!-- 读取 -->
    <text x="300" y="193" fill="#30a46c">●</text>
    <text x="378" y="193" fill="#d98a00">◐</text>
    <text x="462" y="193" fill="#30a46c">●</text>
    <text x="540" y="193" fill="#d98a00">◐</text>
    <text x="618" y="193" fill="#d98a00">◐</text>
    <text x="700" y="193" fill="#d98a00">◐</text>
    <text x="782" y="193" fill="#d98a00">◐</text>
    <text x="860" y="193" fill="#30a46c">●</text>
    <!-- Flink -->
    <text x="300" y="249" fill="#d98a00">◐</text>
    <text x="378" y="249" fill="#d98a00">◐</text>
    <text x="462" y="249" fill="#d98a00">◐</text>
    <text x="540" y="249" fill="#c7c7cc">○</text>
    <text x="618" y="249" fill="#d98a00">◐</text>
    <text x="700" y="249" fill="#30a46c">●</text>
    <text x="782" y="249" fill="#d98a00">◐</text>
    <text x="860" y="249" fill="#30a46c">●</text>
  </g>

  <text x="30" y="316" font-size="11.5" font-weight="600" fill="#1d1d1f">读法（三条贯穿声明）</text>
  <text x="30" y="338" font-size="11" fill="#6e6e73">① 网络 RPC 与协调器是全列高亮的横切底座——任何接触面都先过它们。</text>
  <text x="30" y="358" font-size="11" fill="#6e6e73">② KV·changelog 把「主键表写入」翻译成「日志表追加」——两种表模型在 LogTablet 汇合。</text>
  <text x="30" y="378" font-size="11" fill="#6e6e73">③ Lakehouse 是 Flink 集成的最强依赖，也是 Fluss 区别于纯消息队列的价值落点。</text>
</svg>
