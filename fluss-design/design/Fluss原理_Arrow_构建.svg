<svg xmlns="http://www.w3.org/2000/svg" width="940" height="450" viewBox="0 0 940 450" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="940" height="450" fill="#fbfbfd"/>
  <text x="30" y="32" font-size="14" font-weight="600" fill="#1d1d1f">Arrow batch 构建 · 行攒成列</text>

  <!-- 左：行存输入表 -->
  <text x="30" y="70" font-size="10.5" font-weight="600" fill="#5a3410">行存输入（逐行写入）</text>
  <rect x="30" y="82" width="180" height="240" rx="10" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <rect x="42" y="94" width="156" height="26" rx="5" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="120" y="111" font-size="9.5" fill="#5a3410" text-anchor="middle">c0 | c1 | c2</text>
  <rect x="42" y="126" width="156" height="26" rx="5" fill="#ffffff" stroke="#efdcb4"/>
  <text x="120" y="143" font-size="9.5" fill="#5a3410" text-anchor="middle">行1: a1 | b1 | c1</text>
  <rect x="42" y="158" width="156" height="26" rx="5" fill="#ffffff" stroke="#efdcb4"/>
  <text x="120" y="175" font-size="9.5" fill="#5a3410" text-anchor="middle">行2: a2 | b2 | c2</text>
  <rect x="42" y="190" width="156" height="26" rx="5" fill="#ffffff" stroke="#efdcb4"/>
  <text x="120" y="207" font-size="9.5" fill="#5a3410" text-anchor="middle">行3: a3 | b3 | c3</text>
  <rect x="42" y="222" width="156" height="26" rx="5" fill="#ffffff" stroke="#efdcb4"/>
  <text x="120" y="239" font-size="9.5" fill="#5a3410" text-anchor="middle">行4: a4 | b4 | c4</text>
  <text x="120" y="270" font-size="9" fill="#93762e" text-anchor="middle">同一行字段相邻</text>

  <!-- 左→中 箭头 -->
  <path d="M210 200 L248 200" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- 中：构建流程 5 步 -->
  <rect x="252" y="70" width="440" height="52" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="268" y="91" font-size="11" font-weight="600" fill="#1b2a4a">① 写入行 record 逐条加入</text>
  <text x="268" y="109" font-size="9.5" fill="#5b7db1">客户端 ArrowLogWriteBatch 使用此 builder</text>

  <path d="M472 122 L472 132" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="252" y="132" width="440" height="52" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="268" y="153" font-size="11" font-weight="600" fill="#274a78">② MemoryLogRecordsArrowBuilder</text>
  <text x="268" y="171" font-size="9.5" fill="#5b7db1">:52 · 持有 ArrowWriter · :59</text>

  <path d="M472 184 L472 194" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="252" y="194" width="440" height="52" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="268" y="215" font-size="11" font-weight="600" fill="#274a78">③ 每列一个 ArrowFieldWriter</text>
  <text x="268" y="233" font-size="9.5" fill="#5b7db1">写进 VectorSchemaRoot · ArrowWriter.java:78 / :86</text>

  <path d="M472 246 L472 256" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="252" y="256" width="440" height="52" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="268" y="277" font-size="11" font-weight="600" fill="#5a3410">④ 到 estimatedMaxRecordsCount 触发写满</text>
  <text x="268" y="295" font-size="9.5" fill="#93762e">ArrowWriter.java:155</text>

  <path d="M472 308 L472 318" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="252" y="318" width="440" height="52" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="268" y="339" font-size="11" font-weight="600" fill="#12402a">⑤ build → serializeToOutputView</text>
  <text x="268" y="357" font-size="9.5" fill="#2f6f4f">序列化为 Arrow record batch · :224</text>

  <!-- 中→右 箭头 -->
  <path d="M692 200 L730 200" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="711" y="192" font-size="8.5" fill="#a1a1a6" text-anchor="middle">转置</text>

  <!-- 右：列存输出 -->
  <text x="734" y="70" font-size="10.5" font-weight="600" fill="#12402a">列存 · VectorSchemaRoot</text>
  <rect x="734" y="82" width="176" height="240" rx="10" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <rect x="746" y="94" width="48" height="216" rx="6" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="770" y="110" font-size="9" fill="#12402a" text-anchor="middle">c0</text>
  <text x="770" y="140" font-size="9" fill="#2c5a3a" text-anchor="middle">a1</text>
  <text x="770" y="160" font-size="9" fill="#2c5a3a" text-anchor="middle">a2</text>
  <text x="770" y="180" font-size="9" fill="#2c5a3a" text-anchor="middle">a3</text>
  <text x="770" y="200" font-size="9" fill="#2c5a3a" text-anchor="middle">a4</text>
  <rect x="800" y="94" width="48" height="216" rx="6" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="824" y="110" font-size="9" fill="#12402a" text-anchor="middle">c1</text>
  <text x="824" y="140" font-size="9" fill="#2c5a3a" text-anchor="middle">b1</text>
  <text x="824" y="160" font-size="9" fill="#2c5a3a" text-anchor="middle">b2</text>
  <text x="824" y="180" font-size="9" fill="#2c5a3a" text-anchor="middle">b3</text>
  <text x="824" y="200" font-size="9" fill="#2c5a3a" text-anchor="middle">b4</text>
  <rect x="854" y="94" width="48" height="216" rx="6" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="878" y="110" font-size="9" fill="#12402a" text-anchor="middle">c2</text>
  <text x="878" y="140" font-size="9" fill="#2c5a3a" text-anchor="middle">c1</text>
  <text x="878" y="160" font-size="9" fill="#2c5a3a" text-anchor="middle">c2</text>
  <text x="878" y="180" font-size="9" fill="#2c5a3a" text-anchor="middle">c3</text>
  <text x="878" y="200" font-size="9" fill="#2c5a3a" text-anchor="middle">c4</text>
  <text x="822" y="290" font-size="9" fill="#2c5a3a" text-anchor="middle">同一列连续存放</text>

  <!-- 底部小注 -->
  <rect x="30" y="392" width="880" height="42" rx="10" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="46" y="412" font-size="9.5" fill="#6e6e73">ArrowWriter 由 <tspan font-weight="600" fill="#1d1d1f">ArrowWriterPool</tspan> 池化复用，避免 off-heap 内存抖动；build 后 writer 归还池中重用。</text>
  <text x="46" y="428" font-size="9.5" fill="#6e6e73">该 builder 供客户端 ArrowLogWriteBatch 攒批：行式写入 → 列式序列化，网络与存储皆走 Arrow 列格式。</text>
</svg>
