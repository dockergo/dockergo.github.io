<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="490" viewBox="0 0 1000 490" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="490" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">KV 恢复 · 下载快照 + 回放 changelog</text>
  <text x="30" y="52" font-size="10.5" fill="#a1a1a6">先确定回放起点 restoreStartOffset，再分两段回放：已 ack 直落 RocksDB，未 ack 走 preWriteBuffer</text>

  <!-- 上半：确定起点 -->
  <rect x="30" y="90" width="190" height="78" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="44" y="115" font-size="11.5" font-weight="600" fill="#5a3410">Replica.initKvTablet</text>
  <text x="44" y="136" font-size="10" fill="#5a3410">初始化 KV 分区副本</text>
  <text x="44" y="158" font-size="9" fill="#b39456">Replica.java:746</text>

  <rect x="250" y="90" width="190" height="78" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="264" y="115" font-size="11.5" font-weight="600" fill="#5a3410">getLatestSnapshot</text>
  <text x="264" y="136" font-size="10" fill="#5a3410">查询最近一次快照</text>
  <text x="264" y="158" font-size="9" fill="#b39456">Replica.java:874</text>

  <path d="M220,129 L248,129" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="470" y="74" width="290" height="64" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="484" y="98" font-size="10.5" font-weight="600" fill="#12402a">有快照：downloadKvSnapshots 下载 SST · :845</text>
  <text x="484" y="120" font-size="10" fill="#2f6f4f">loadKv 打开 RocksDB · restoreStart = 快照 logOffset</text>

  <rect x="470" y="154" width="290" height="60" rx="11" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="484" y="178" font-size="10.5" font-weight="600" fill="#1d1d1f">无快照：新建空 KV</text>
  <text x="484" y="199" font-size="10" fill="#6e6e73">restoreStart = 0，从头回放全部日志</text>

  <path d="M440,120 L456,120 L456,102 L468,102" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="452" y="94" font-size="9" fill="#a1a1a6" text-anchor="middle">有</text>
  <path d="M440,138 L456,138 L456,182 L468,182" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="452" y="164" font-size="9" fill="#a1a1a6" text-anchor="middle">无</text>

  <rect x="790" y="90" width="180" height="78" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="880" y="122" font-size="11" font-weight="600" fill="#274a78" text-anchor="middle">restoreStartOffset</text>
  <text x="880" y="144" font-size="9.5" fill="#5b7db1" text-anchor="middle">回放起点确定</text>
  <path d="M760,102 L788,110" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M760,184 L774,184 L774,150 L788,150" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 下半：两阶段回放 -->
  <text x="180" y="256" font-size="12" font-weight="600" fill="#1d1d1f">KvRecoverHelper.recover · 两阶段回放 · KvRecoverHelper.java:103</text>

  <!-- 连接线：起点下达到轴 -->
  <path d="M880,168 L880,232 L140,232 L140,352" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- offset 轴 -->
  <line x1="140" y1="360" x2="905" y2="360" stroke="#c7c7cc" stroke-width="1.5"/>
  <!-- 段 ① 绿 -->
  <rect x="140" y="344" width="380" height="14" rx="4" fill="#eafaf1" stroke="#bfe0cd"/>
  <!-- 段 ② 琥珀 -->
  <rect x="520" y="344" width="360" height="14" rx="4" fill="#fff7e6" stroke="#e8cf9a"/>

  <!-- 刻度 -->
  <line x1="140" y1="352" x2="140" y2="374" stroke="#8e8e93" stroke-width="1.5"/>
  <line x1="520" y1="352" x2="520" y2="374" stroke="#8e8e93" stroke-width="1.5"/>
  <line x1="880" y1="352" x2="880" y2="374" stroke="#8e8e93" stroke-width="1.5"/>
  <text x="140" y="390" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">restoreStart</text>
  <text x="520" y="390" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">HW（高水位）</text>
  <text x="880" y="390" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">LOG_END</text>

  <!-- 段说明 -->
  <text x="150" y="326" font-size="10.5" fill="#12402a"><tspan font-weight="600">①</tspan> 已 ack：KvBatchWriter 直接落 RocksDB</text>
  <text x="530" y="326" font-size="10.5" fill="#5a3410"><tspan font-weight="600">②</tspan> 未 ack：放回 preWriteBuffer，等 HW 推进再 flush</text>

  <!-- 底部小注 -->
  <rect x="30" y="410" width="940" height="50" rx="12" fill="#ffffff" stroke="#ececf1"/>
  <text x="46" y="431" font-size="10.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">applyLogRecordBatch · KvRecoverHelper.java:242</tspan>　回放时跳过 UPDATE_BEFORE 记录</text>
  <text x="46" y="450" font-size="10.5" fill="#6e6e73">按 changelog 反算 key / value，将日志重放为 RocksDB 中的最新状态</text>
</svg>
