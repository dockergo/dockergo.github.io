<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="750" viewBox="0 0 1040 750"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1040" height="750" fill="#fbfbfd"/>
  <text x="30" y="32" font-size="15" font-weight="600" fill="#1d1d1f">Apache Fluss 总架构 · 流式湖仓存储（点击任意模块下钻主线）</text>
  <rect x="30" y="16" width="980" height="30" fill="none" stroke="none" data-tid="Fluss原理_全景主线框架" data-lab="全景总览"/>

  <!-- Band A 客户端接触面 -->
  <rect x="30" y="52" width="980" height="30" rx="7" fill="#f0f0f3" stroke="#d2d2d7"/>
  <text x="44" y="72" font-size="12.5" font-weight="600" fill="#1d1d1f">① 客户端 / 引擎接触面 · Connection → Table API</text>
  <rect x="48" y="90" width="300" height="52" rx="9" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)" data-tid="Fluss原理_接触面_表模型与写入" data-lab="写入 Append/Upsert"/>
  <text x="64" y="112" font-size="12.5" font-weight="600" fill="#1b2a4a">写入 · Append / Upsert</text>
  <text x="64" y="130" font-size="10.5" fill="#5b7db1">RecordAccumulator·Sender·幂等·分桶</text>
  <rect x="364" y="90" width="300" height="52" rx="9" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)" data-tid="Fluss原理_接触面_读取Lookup与Scan" data-lab="读取 Lookup/Scan"/>
  <text x="380" y="112" font-size="12.5" font-weight="600" fill="#1b2a4a">读取 · Lookup / Scan</text>
  <text x="380" y="130" font-size="10.5" fill="#5b7db1">点查·前缀查·日志流·快照批读</text>
  <rect x="680" y="90" width="312" height="52" rx="9" fill="#e6f5f4" stroke="#b3e0dc" filter="url(#soft)" data-tid="Fluss原理_接触面_Flink与Lakehouse集成" data-lab="Flink/Spark 集成"/>
  <text x="696" y="112" font-size="12.5" font-weight="600" fill="#0f5f59">Flink / Spark Connector</text>
  <text x="696" y="130" font-size="10.5" fill="#3c8a83">source/sink·lookup join·联合读</text>

  <!-- Band B RPC -->
  <rect x="30" y="160" width="980" height="34" rx="8" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)" data-tid="Fluss原理_支撑_网络RPC与安全" data-lab="RPC 网络层"/>
  <text x="44" y="182" font-size="12.5" font-weight="600" fill="#1b2a4a">② RPC 网络层 · Netty Reactor（RequestChannel → RequestProcessorPool）+ ACL 鉴权</text>

  <!-- Band C Coordinator -->
  <rect x="30" y="212" width="980" height="70" rx="9" fill="#eaf0fa" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="44" y="230" font-size="12.5" font-weight="600" fill="#1b2a4a">③ CoordinatorServer · 单线程事件循环 + ZooKeeper 元数据</text>
  <rect x="48" y="240" width="300" height="34" rx="7" fill="#ffffff" stroke="#bcd0ec" data-tid="Fluss原理_支撑_协调器元数据与调度" data-lab="协调器元数据与调度"/>
  <text x="62" y="261" font-size="11" fill="#1b2a4a">元数据·状态机·建表调度</text>
  <rect x="364" y="240" width="300" height="34" rx="7" fill="#ffffff" stroke="#f5c2bd" data-tid="Fluss原理_支撑_副本复制与ISR" data-lab="ISR/Leader 选举"/>
  <text x="378" y="261" font-size="11" fill="#8a2a1c">ISR/Leader 选举与调度</text>
  <rect x="680" y="240" width="312" height="34" rx="7" fill="#ffffff" stroke="#b3e0dc" data-tid="Fluss原理_支撑_分层存储与Lakehouse" data-lab="Lakehouse 分层调度"/>
  <text x="694" y="261" font-size="11" fill="#0f5f59">Lakehouse 分层调度</text>

  <!-- Band D TabletServer -->
  <rect x="30" y="298" width="980" height="304" rx="10" fill="#f7f7fa" stroke="#d2d2d7"/>
  <rect x="30" y="298" width="980" height="26" rx="10" fill="#e9e9ee" stroke="#d2d2d7" data-tid="Fluss原理_支撑_副本复制与ISR" data-lab="TabletServer 集群"/>
  <text x="44" y="316" font-size="12.5" font-weight="600" fill="#1d1d1f">④ TabletServer 集群 · 每个 TableBucket 一个 Replica（Leader / Follower）</text>

  <rect x="48" y="332" width="944" height="256" rx="9" fill="#ffffff" stroke="#d2d2d7"/>
  <text x="64" y="352" font-size="11.5" font-weight="600" fill="#1d1d1f">Replica（桶副本）：PK 表 = LogTablet + KvTablet；日志表 = 仅 LogTablet</text>

  <!-- Left: log column -->
  <text x="72" y="378" font-size="11" font-weight="600" fill="#7a4d00">日志表 / changelog 落地</text>
  <rect x="72" y="386" width="424" height="62" rx="8" fill="#fdf0d5" stroke="#f0c674" filter="url(#soft)" data-tid="Fluss原理_支撑_Log追加存储引擎" data-lab="LogTablet 追加日志"/>
  <text x="88" y="408" font-size="12" font-weight="600" fill="#7a4d00">LogTablet · 追加日志</text>
  <text x="88" y="426" font-size="10.5" fill="#9c6a1a">LogSegment + 稀疏索引 + WriterState 幂等</text>
  <text x="88" y="441" font-size="10.5" fill="#9c6a1a">FileLogRecords 零拷贝读</text>
  <rect x="72" y="456" width="424" height="44" rx="8" fill="#f5eefb" stroke="#ddc6ef" filter="url(#soft)" data-tid="Fluss原理_支撑_Arrow列存与投影下推" data-lab="Arrow 列存投影下推"/>
  <text x="88" y="475" font-size="12" font-weight="600" fill="#5b2a82">Arrow 列存 batch · 投影下推</text>
  <text x="88" y="491" font-size="10.5" fill="#7a4ca0">MemoryLogRecordsArrowBuilder · Projection</text>

  <!-- Right: KV column -->
  <text x="524" y="378" font-size="11" font-weight="600" fill="#12633a">主键表（PK）</text>
  <rect x="524" y="386" width="452" height="62" rx="8" fill="#e8f7ee" stroke="#b6e2c6" filter="url(#soft)" data-tid="Fluss原理_支撑_KV主键表与changelog" data-lab="KvTablet 主键表"/>
  <text x="540" y="408" font-size="12" font-weight="600" fill="#12633a">KvTablet · RocksDB + preWriteBuffer</text>
  <text x="540" y="426" font-size="10.5" fill="#2e8b57">rowMerger 合并（部分列/聚合/版本）</text>
  <text x="540" y="441" font-size="10.5" fill="#2e8b57">upsert/delete → 生成 changelog</text>
  <!-- changelog arrow KV -> Log -->
  <path d="M524,417 L500,417" fill="none" stroke="#30a46c" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="474" y="462" font-size="9.5" fill="#30a46c">changelog</text>

  <!-- ISR strip -->
  <rect x="72" y="512" width="904" height="60" rx="8" fill="#fdecea" stroke="#f5c2bd" filter="url(#soft)" data-tid="Fluss原理_支撑_副本复制与ISR" data-lab="副本复制与 ISR"/>
  <text x="88" y="533" font-size="12" font-weight="600" fill="#8a2a1c">副本复制与 ISR</text>
  <text x="88" y="551" font-size="10.5" fill="#b25a4a">ReplicaFetcherThread 拉取复制 · AdjustIsr 收缩/扩张 · HW 高水位 · leaderEpoch</text>
  <text x="88" y="566" font-size="10.5" fill="#b25a4a">ReplicaManager.appendRecordsToLog / putRecordsToKv / fetchLogRecords</text>

  <!-- Band E storage tiers -->
  <rect x="30" y="616" width="980" height="112" rx="10" fill="#f7f7fa" stroke="#d2d2d7"/>
  <text x="44" y="636" font-size="12.5" font-weight="600" fill="#1d1d1f">⑤ 分层存储 · 本地热 → 远程冷 → 湖仓</text>
  <rect x="48" y="648" width="300" height="66" rx="9" fill="#fdf0d5" stroke="#f0c674" filter="url(#soft)" data-tid="Fluss原理_支撑_分层存储与Lakehouse" data-lab="远程日志分层"/>
  <text x="64" y="672" font-size="12" font-weight="600" fill="#7a4d00">远程日志分层</text>
  <text x="64" y="690" font-size="10.5" fill="#9c6a1a">RemoteLogManager · LogTieringTask</text>
  <text x="64" y="705" font-size="10.5" fill="#9c6a1a">本地段 → DFS/对象存储</text>
  <rect x="364" y="648" width="300" height="66" rx="9" fill="#e8f7ee" stroke="#b6e2c6" filter="url(#soft)" data-tid="Fluss原理_支撑_KV快照与恢复" data-lab="KV 快照与恢复"/>
  <text x="380" y="672" font-size="12" font-weight="600" fill="#12633a">KV 快照</text>
  <text x="380" y="690" font-size="10.5" fill="#2e8b57">RocksIncrementalSnapshot 增量</text>
  <text x="380" y="705" font-size="10.5" fill="#2e8b57">PeriodicSnapshot → DFS · 恢复</text>
  <rect x="680" y="648" width="312" height="66" rx="9" fill="#e6f5f4" stroke="#b3e0dc" filter="url(#soft)" data-tid="Fluss原理_支撑_分层存储与Lakehouse" data-lab="Lakehouse 联合读"/>
  <text x="696" y="672" font-size="12" font-weight="600" fill="#0f5f59">Lakehouse 分层与联合读</text>
  <text x="696" y="690" font-size="10.5" fill="#3c8a83">Flink tiering 作业 → Paimon/Iceberg</text>
  <text x="696" y="705" font-size="10.5" fill="#3c8a83">union read：湖快照 + Fluss 增量</text>

  <!-- ===== 数据流 / 调用连线（本轮加强，复用 marker #ar）===== -->
  <!-- ① 接触面 → RPC：写/读/引擎三类操作统一走 RPC 入口 -->
  <path d="M198,142 L198,160" fill="none" stroke="#8aa0c8" stroke-width="1.4" marker-end="url(#ar)"/>
  <path d="M520,142 L520,160" fill="none" stroke="#8aa0c8" stroke-width="1.4" marker-end="url(#ar)"/>
  <path d="M836,142 L836,160" fill="none" stroke="#6bbdb6" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="118" y="156" font-size="9" fill="#5b7db1">produce·攒批</text>
  <text x="528" y="156" font-size="9" fill="#5b7db1">lookup·scan</text>
  <text x="768" y="156" font-size="9" fill="#3c8a83">source·sink</text>
  <!-- ② RPC → Coordinator：元数据/建表控制面 -->
  <path d="M520,194 L520,212" fill="none" stroke="#b8b8bf" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="526" y="207" font-size="9" fill="#5b7db1">元数据·建表请求</text>
  <!-- ③ Coordinator → TabletServer：leader/ISR 下发 + 数据路由 -->
  <path d="M520,282 L520,298" fill="none" stroke="#b8b8bf" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="526" y="293" font-size="9" fill="#8a5a1c">leader·ISR 下发</text>
  <!-- ④ TabletServer → 分层存储：tiering / 快照均为后台异步（虚线） -->
  <path d="M284,602 L284,616" fill="none" stroke="#b8b8bf" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#ar)"/>
  <path d="M514,602 L514,616" fill="none" stroke="#b8b8bf" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#ar)"/>
  <path d="M760,602 L760,616" fill="none" stroke="#b8b8bf" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#ar)"/>
  <text x="196" y="612" font-size="9" fill="#9c6a1a">日志冷段→DFS</text>
  <text x="420" y="612" font-size="9" fill="#2e8b57">增量快照→DFS</text>
  <text x="672" y="612" font-size="9" fill="#3c8a83">tier→湖仓</text>
  <!-- ⑤ KV 写路径机制标注（源自「KV主键表与changelog」主线，非杜撰）-->
  <text x="558" y="470" font-size="9.5" fill="#7a7a80">写路径：putAsLeader 先 appendAsLeader 追加 WAL 到 LogTablet</text>
  <text x="558" y="485" font-size="9.5" fill="#7a7a80">→ 进 preWriteBuffer → HW 推进（ISR 已复制）后 flush 落 RocksDB</text>
</svg>
