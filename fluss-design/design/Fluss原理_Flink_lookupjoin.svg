<svg xmlns="http://www.w3.org/2000/svg" width="940" height="460" viewBox="0 0 940 460" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="940" height="460" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Lookup Join · Fluss 作维表</text>

  <!-- Row A -->
  <rect x="60" y="76" width="260" height="62" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="190" y="102" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">Flink 主流</text>
  <text x="190" y="121" font-size="9.5" fill="#5b7db1" text-anchor="middle">携带探针 keyRow</text>

  <rect x="360" y="76" width="260" height="62" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="490" y="102" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">getLookupRuntimeProvider</text>
  <text x="490" y="121" font-size="9.5" fill="#5b7db1" text-anchor="middle">FlinkTableSource.java:468</text>

  <rect x="660" y="76" width="260" height="62" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="790" y="102" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">LookupNormalizer</text>
  <text x="790" y="121" font-size="9.5" fill="#5b7db1" text-anchor="middle">校验 key 命中主键 / 前缀</text>

  <path d="M320,107 L360,107" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M620,107 L660,107" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M790,138 L790,196" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- Row B (右→左) -->
  <rect x="660" y="196" width="260" height="62" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="790" y="222" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">FlinkAsyncLookupFunction · :55</text>
  <text x="790" y="241" font-size="9.5" fill="#5b7db1" text-anchor="middle">或同步 LookupFunction</text>

  <rect x="360" y="196" width="260" height="62" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="490" y="222" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">open() 建 Lookuper</text>
  <text x="490" y="241" font-size="9.5" fill="#5b7db1" text-anchor="middle">table.newLookup · :110</text>

  <rect x="60" y="196" width="260" height="62" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="190" y="222" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">asyncLookup(keyRow) · :129</text>
  <text x="190" y="241" font-size="9.5" fill="#5b7db1" text-anchor="middle">发起异步点查</text>

  <path d="M660,227 L620,227" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M360,227 L320,227" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M190,258 L190,316" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- Row C (左→右) -->
  <rect x="60" y="316" width="260" height="62" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="190" y="342" font-size="12" font-weight="600" fill="#5a3410" text-anchor="middle">lookuper.lookup</text>
  <text x="190" y="361" font-size="9.5" fill="#93762e" text-anchor="middle">走 KvTablet 点查</text>

  <rect x="360" y="316" width="260" height="62" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="490" y="342" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">whenComplete · :163</text>
  <text x="490" y="361" font-size="9.5" fill="#5b7db1" text-anchor="middle">过滤 + 投影</text>

  <rect x="660" y="316" width="260" height="62" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="790" y="342" font-size="12" font-weight="600" fill="#12402a" text-anchor="middle">关联结果</text>
  <text x="790" y="361" font-size="9.5" fill="#2f6f4f" text-anchor="middle">emit 到下游</text>

  <path d="M320,347 L360,347" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M620,347 L660,347" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 旁路缓存 -->
  <rect x="360" y="404" width="440" height="42" rx="11" fill="#f4eefb" stroke="#d9c7ec" stroke-dasharray="5 4" filter="url(#soft)"/>
  <text x="580" y="424" font-size="10.5" font-weight="600" fill="#3d2a5a" text-anchor="middle">可选 · PartialCachingLookupProvider</text>
  <text x="580" y="439" font-size="9" fill="#3d2a5a" text-anchor="middle">本地缓存维表结果 · 命中则跳过 KvTablet 点查</text>
  <path d="M320,347 L340,347 L340,425 L360,425" stroke="#d9c7ec" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#ar)"/>
</svg>
