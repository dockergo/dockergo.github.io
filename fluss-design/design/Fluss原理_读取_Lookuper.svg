<svg xmlns="http://www.w3.org/2000/svg" width="920" height="430" viewBox="0 0 920 430" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="920" height="430" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Lookuper · 主键点查与前缀查</text>
  <text x="30" y="52" font-size="10.5" fill="#a1a1a6">统一入口返回 Future，分全主键点查与前缀查两支，最终都攒批送到 KV 副本读 RocksDB</text>

  <!-- entry -->
  <rect x="260" y="70" width="400" height="60" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="460" y="96" font-size="11" font-weight="600" fill="#3d2a5a" text-anchor="middle">lookup(InternalRow key)</text>
  <text x="460" y="117" font-size="10" fill="#7a5aa6" text-anchor="middle">→ CompletableFuture&lt;LookupResult&gt; · Lookuper.java:55</text>

  <!-- split arrows -->
  <path d="M460,130 L460,155 L255,155 L255,180" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M460,130 L460,155 L665,155 L665,180" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="230" y="150" font-size="9" fill="#a1a1a6">点查</text>
  <text x="672" y="150" font-size="9" fill="#a1a1a6">前缀查</text>

  <!-- left PrimaryKeyLookuper -->
  <rect x="90" y="180" width="330" height="92" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="108" y="206" font-size="11.5" font-weight="600" fill="#3d2a5a">PrimaryKeyLookuper</text>
  <text x="108" y="228" font-size="10.5" fill="#3d2a5a">全主键点查 · 精确定位一行</text>
  <text x="108" y="248" font-size="10.5" fill="#7a5aa6">→ RPC LOOKUP(1017)</text>
  <text x="108" y="266" font-size="9" fill="#9a86bd">PrimaryKeyLookuper.java:43</text>

  <!-- right PrefixKeyLookuper -->
  <rect x="500" y="180" width="330" height="92" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="518" y="206" font-size="11.5" font-weight="600" fill="#274a78">PrefixKeyLookuper</text>
  <text x="518" y="228" font-size="10.5" fill="#274a78">前缀查 · 须命中 bucket key</text>
  <text x="518" y="248" font-size="10.5" fill="#5b7db1">→ RPC PREFIX_LOOKUP(1034)</text>
  <text x="518" y="266" font-size="9" fill="#7a9dc9">PrefixKeyLookuper.java:49</text>

  <!-- converge arrows -->
  <path d="M255,272 L255,322 L195,322 L195,340" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M665,272 L665,322 L195,322 L195,340" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- bottom container -->
  <rect x="60" y="305" width="800" height="100" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="80" y="326" font-size="12" font-weight="600" fill="#6e6e73">汇合 · 客户端攒批 → 服务端 KV 点查</text>

  <rect x="80" y="340" width="230" height="52" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="94" y="362" font-size="10.5" font-weight="600" fill="#1b2a4a">LookupClient / LookupSender</text>
  <text x="94" y="380" font-size="9" fill="#5b7db1">攒批合并请求，异步发送</text>
  <path d="M310,366 L340,366" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="340" y="340" width="230" height="52" rx="10" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="354" y="362" font-size="10.5" font-weight="600" fill="#274a78">服务端 Replica</text>
  <text x="354" y="380" font-size="9" fill="#5b7db1">isKvTable &amp;&amp; isLeader 才受理</text>
  <path d="M570,366 L600,366" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="600" y="340" width="240" height="52" rx="10" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="614" y="362" font-size="10.5" font-weight="600" fill="#5a3410">KvTablet.multiGet / prefixLookup</text>
  <text x="614" y="380" font-size="9" fill="#b39456">读 RocksDB · KvTablet.java:694/704</text>
</svg>
