<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="500" fill="#fbfbfd"/>
  <text x="30" y="32" font-size="14" font-weight="600" fill="#1d1d1f">记录批格式（V2）与幂等 WriterState</text>

  <!-- 上半：字节布局条 标题 -->
  <text x="30" y="60" font-size="11" font-weight="600" fill="#5a3410">DefaultLogRecordBatch 头部字节布局（前段为定长头，records 为变长负载）</text>

  <!-- 第一行字段（琥珀/中性交替） -->
  <!-- 用等高小格，x 递增 -->
  <!-- row1 y=72 h=54 -->
  <g font-size="9.5">
    <rect x="30" y="72" width="120" height="54" rx="8" fill="#fff7e6" stroke="#e8cf9a"/>
    <text x="90" y="96" font-size="10" font-weight="600" fill="#5a3410" text-anchor="middle">baseOffset</text>
    <text x="90" y="114" fill="#93762e" text-anchor="middle">8B</text>

    <rect x="154" y="72" width="90" height="54" rx="8" fill="#ffffff" stroke="#ececf1"/>
    <text x="199" y="96" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">length</text>
    <text x="199" y="114" fill="#6e6e73" text-anchor="middle">4B</text>

    <rect x="248" y="72" width="70" height="54" rx="8" fill="#fff7e6" stroke="#e8cf9a"/>
    <text x="283" y="96" font-size="10" font-weight="600" fill="#5a3410" text-anchor="middle">magic</text>
    <text x="283" y="114" fill="#93762e" text-anchor="middle">1B</text>

    <rect x="322" y="72" width="150" height="54" rx="8" fill="#ffffff" stroke="#ececf1"/>
    <text x="397" y="96" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">commitTimestamp</text>
    <text x="397" y="114" fill="#6e6e73" text-anchor="middle">8B</text>

    <rect x="476" y="72" width="110" height="54" rx="8" fill="#fff7e6" stroke="#e8cf9a"/>
    <text x="531" y="96" font-size="10" font-weight="600" fill="#5a3410" text-anchor="middle">leaderEpoch</text>
    <text x="531" y="114" fill="#93762e" text-anchor="middle">4B</text>

    <rect x="590" y="72" width="110" height="54" rx="8" fill="#fbeaea" stroke="#e7c3c3"/>
    <text x="645" y="96" font-size="10" font-weight="600" fill="#4a1414" text-anchor="middle">CRC-32C</text>
    <text x="645" y="114" fill="#4a1414" text-anchor="middle">4B</text>

    <rect x="704" y="72" width="100" height="54" rx="8" fill="#eef3fb" stroke="#bcd0ec"/>
    <text x="754" y="96" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">schemaId</text>
    <text x="754" y="114" fill="#5b7db1" text-anchor="middle">2B</text>

    <rect x="808" y="72" width="90" height="54" rx="8" fill="#ffffff" stroke="#ececf1"/>
    <text x="853" y="96" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">attributes</text>
    <text x="853" y="114" fill="#6e6e73" text-anchor="middle">1B</text>

    <rect x="902" y="72" width="88" height="54" rx="8" fill="#fff7e6" stroke="#e8cf9a"/>
    <text x="946" y="93" font-size="9.5" font-weight="600" fill="#5a3410" text-anchor="middle">lastOffset</text>
    <text x="946" y="106" font-size="9.5" font-weight="600" fill="#5a3410" text-anchor="middle">Delta</text>
    <text x="946" y="120" fill="#93762e" text-anchor="middle">4B</text>
  </g>

  <!-- row2 y=138 -->
  <g font-size="9.5">
    <rect x="30" y="138" width="130" height="54" rx="8" fill="#eef3fb" stroke="#bcd0ec"/>
    <text x="95" y="162" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">writerId</text>
    <text x="95" y="180" fill="#5b7db1" text-anchor="middle">8B · 幂等</text>

    <rect x="164" y="138" width="140" height="54" rx="8" fill="#eef3fb" stroke="#bcd0ec"/>
    <text x="234" y="162" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">batchSequence</text>
    <text x="234" y="180" fill="#5b7db1" text-anchor="middle">4B · 幂等</text>

    <rect x="308" y="138" width="130" height="54" rx="8" fill="#ffffff" stroke="#ececf1"/>
    <text x="373" y="162" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">recordsCount</text>
    <text x="373" y="180" fill="#6e6e73" text-anchor="middle">4B</text>

    <rect x="442" y="138" width="548" height="54" rx="8" fill="#fdf6ea" stroke="#efdcb4"/>
    <text x="716" y="162" font-size="10" font-weight="600" fill="#5a3410" text-anchor="middle">records（变长负载 · Arrow / IndexedLog 编码的记录序列）</text>
    <text x="716" y="180" fill="#93762e" text-anchor="middle">按 schemaId 解码，逐条带 ChangeType</text>
  </g>

  <!-- CRC 覆盖范围括注 -->
  <path d="M704 130 L704 200 L990 200 L990 130" fill="none" stroke="#e7c3c3" stroke-width="1.2" stroke-dasharray="4 3"/>
  <path d="M442 200 L442 210 L442 200" fill="none" stroke="#e7c3c3" stroke-width="1.2"/>
  <path d="M704 206 L442 206" fill="none" stroke="#e7c3c3" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="450" y="222" font-size="9" fill="#4a1414">CRC-32C 覆盖 schemaId 起 → 批尾（含 records），用 Crc32C · DefaultLogRecordBatch.java:182</text>

  <!-- 分割线 -->
  <line x1="30" y1="240" x2="970" y2="240" stroke="#ececf1" stroke-width="1"/>

  <!-- 下半：幂等 WriterState 流程 -->
  <text x="30" y="266" font-size="11" font-weight="600" fill="#1b2a4a">幂等去重 · WriterState 判序流程</text>

  <rect x="30" y="282" width="220" height="72" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="306" font-size="11" font-weight="600" fill="#1b2a4a">writerId + batchSequence</text>
  <text x="46" y="326" font-size="9.5" fill="#5b7db1">每批携带写端标识与递增序号</text>
  <text x="46" y="344" font-size="9" fill="#a1a1a6">批头字段来源</text>

  <path d="M250 318 L286 318" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="286" y="282" width="230" height="72" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="302" y="306" font-size="11" font-weight="600" fill="#1d1d1f">inSequence · 判序</text>
  <text x="302" y="326" font-size="9.5" fill="#6e6e73">seq == lastSeq+1 才接受</text>
  <text x="302" y="344" font-size="9" fill="#a1a1a6">WriterAppendInfo.java:143</text>

  <path d="M516 318 L552 318" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="552" y="282" width="230" height="72" rx="12" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="568" y="306" font-size="11" font-weight="600" fill="#4a1414">findDuplicateBatch · 去重</text>
  <text x="568" y="326" font-size="9.5" fill="#4a1414">命中缓存的重复批则跳过</text>
  <text x="568" y="344" font-size="9" fill="#a1a1a6">WriterStateEntry.java:113</text>

  <path d="M782 318 L818 318" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="818" y="282" width="172" height="72" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="834" y="306" font-size="11" font-weight="600" fill="#12402a">接受写入</text>
  <text x="834" y="326" font-size="9.5" fill="#2f6f4f">更新 lastSeq</text>
  <text x="834" y="344" font-size="9.5" fill="#2f6f4f">进 Log / KV</text>

  <!-- takeSnapshot 说明卡 -->
  <rect x="30" y="376" width="960" height="100" rx="12" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="46" y="400" font-size="11" font-weight="600" fill="#2c5a3a">快照落盘 · takeSnapshot</text>
  <text x="46" y="422" font-size="10" fill="#2c5a3a">· 滚段时把当前 writerId → (lastSeq, lastOffset, timestamp) 的 WriterState 表落 .writer_snapshot · WriterStateManager.java:195</text>
  <text x="46" y="444" font-size="10" fill="#2c5a3a">· 重启恢复时从最近快照重建去重表，保证跨重启的 exactly-once 幂等语义</text>
  <text x="46" y="466" font-size="10" fill="#6e6e73">· 判序 + 去重双重防线：判序拦乱序，去重拦重发；两者都基于同一 (writerId, batchSequence) 主线</text>
</svg>
