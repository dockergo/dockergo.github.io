<svg xmlns="http://www.w3.org/2000/svg" width="980" height="470" viewBox="0 0 980 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="980" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">DelayedWrite 与 purgatory 时间轮</text>
  <text x="30" y="52" font-size="10.5" fill="#a1a1a6">acks=all 写请求挂入炼狱，按桶校验副本进度；时间轮驱动到期与清理，HW 推进则主动唤醒</text>

  <!-- vertical arrows between steps -->
  <path d="M225,160 L225,168" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M225,238 L225,246" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M225,316 L225,324" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- Box1 紫 -->
  <rect x="30" y="90" width="390" height="66" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="46" y="114" font-size="12" font-weight="600" fill="#3d2a5a">① acks=all 写入</text>
  <text x="46" y="134" font-size="10.5" fill="#3d2a5a">requiredAcks == -1，需等待 ISR 副本确认后才响应</text>
  <text x="46" y="150" font-size="9" fill="#9a86bd">client 生产请求进入服务端 leader 副本</text>

  <!-- Box2 蓝 -->
  <rect x="30" y="168" width="390" height="66" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="192" font-size="12" font-weight="600" fill="#1b2a4a">② ReplicaManager.maybeAddDelayedWrite</text>
  <text x="46" y="212" font-size="10.5" fill="#1b2a4a">requiredAcks==-1 时不立即返回，构造延迟写操作</text>
  <text x="46" y="228" font-size="9" fill="#8aa5cf">ReplicaManager.java:1671</text>

  <!-- Box3 淡蓝 -->
  <rect x="30" y="246" width="390" height="66" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="46" y="270" font-size="12" font-weight="600" fill="#274a78">③ 建 DelayedWrite 挂 purgatory</text>
  <text x="46" y="290" font-size="10.5" fill="#274a78">按涉及的 bucket 注册到炼狱，等待完成或超时</text>
  <text x="46" y="306" font-size="9" fill="#8aa5cf">delay/DelayedWrite.java:47</text>

  <!-- Box4 琥珀 -->
  <rect x="30" y="324" width="390" height="96" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="46" y="348" font-size="12" font-weight="600" fill="#5a3410">④ tryComplete 每桶校验</text>
  <text x="46" y="368" font-size="10.5" fill="#5a3410">checkEnoughReplicasReachOffset 检查每个桶的进度</text>
  <text x="46" y="386" font-size="10.5" fill="#93762e">HW &gt;= requiredOffset 且 ISR 足够即判定完成</text>
  <text x="46" y="406" font-size="9" fill="#b39456">DelayedWrite.java:108 · Replica.java:1493</text>

  <!-- right: time wheel heading -->
  <text x="450" y="92" font-size="12" font-weight="600" fill="#274a78">DefaultTimer 分层时间轮</text>
  <text x="450" y="110" font-size="9" fill="#8aa5cf">utils/timer/DefaultTimer.java:46 · TimingWheel</text>
  <circle cx="810" cy="96" r="4.5" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="822" y="100" font-size="9" fill="#93762e">挂起的写请求</text>

  <!-- time wheel concentric -->
  <circle cx="700" cy="240" r="118" fill="#f3f7fc" stroke="#cfe0f2"/>
  <circle cx="700" cy="240" r="80" fill="#eef3fb" stroke="#bcd0ec"/>
  <circle cx="700" cy="240" r="44" fill="#ffffff" stroke="#ececf1"/>
  <!-- spokes = buckets -->
  <path d="M744,240 L818,240" stroke="#cfe0f2" stroke-width="1"/>
  <path d="M731,271 L783,323" stroke="#cfe0f2" stroke-width="1"/>
  <path d="M700,284 L700,358" stroke="#cfe0f2" stroke-width="1"/>
  <path d="M669,271 L617,323" stroke="#cfe0f2" stroke-width="1"/>
  <path d="M656,240 L582,240" stroke="#cfe0f2" stroke-width="1"/>
  <path d="M669,209 L617,157" stroke="#cfe0f2" stroke-width="1"/>
  <path d="M700,196 L700,122" stroke="#cfe0f2" stroke-width="1"/>
  <path d="M731,209 L783,157" stroke="#cfe0f2" stroke-width="1"/>
  <!-- hung write requests as amber dots -->
  <circle cx="785" cy="289" r="5" fill="#fff7e6" stroke="#e8cf9a"/>
  <circle cx="666" cy="332" r="5" fill="#fff7e6" stroke="#e8cf9a"/>
  <circle cx="608" cy="206" r="5" fill="#fff7e6" stroke="#e8cf9a"/>
  <circle cx="749" cy="155" r="5" fill="#fff7e6" stroke="#e8cf9a"/>
  <!-- center label -->
  <text x="700" y="237" font-size="10.5" font-weight="600" fill="#274a78" text-anchor="middle">TimingWheel</text>
  <text x="700" y="253" font-size="9" fill="#5b7db1" text-anchor="middle">桶格 + 溢出层</text>

  <!-- ExpiredOperationReaper -->
  <rect x="445" y="372" width="150" height="48" rx="10" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="460" y="394" font-size="10.5" font-weight="600" fill="#1d1d1f">ExpiredOperationReaper</text>
  <text x="460" y="411" font-size="9" fill="#6e6e73">推进指针，清理到期操作</text>
  <path d="M595,392 L640,340" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="600" y="356" font-size="9" fill="#a1a1a6">扫描到期</text>

  <!-- bottom note -->
  <rect x="30" y="432" width="920" height="30" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="46" y="452" font-size="10.5" fill="#6e6e73"><tspan font-weight="600" fill="#5a3410">主动唤醒</tspan>　HW 推进后由 checkAndComplete 直接触发对应桶的 tryComplete，无需等时间轮到期即可完成写请求</text>
</svg>
