<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="470" viewBox="0 0 1000 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="470" fill="#fbfbfd"/>
  <text x="30" y="28" font-size="14" font-weight="600" fill="#1d1d1f">Union Read · 历史（湖）+ 实时（log）联合读</text>

  <!-- Row 1 -->
  <rect x="20" y="52" width="224" height="56" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="132" y="76" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">FlinkSourceEnumerator · :248</text>
  <text x="132" y="94" font-size="9" fill="#5b7db1" text-anchor="middle">持有 LakeSource</text>

  <rect x="255" y="52" width="224" height="56" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="367" y="76" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">generateHybridLakeFlussSplits</text>
  <text x="367" y="94" font-size="9" fill="#5b7db1" text-anchor="middle">:1057</text>

  <rect x="490" y="52" width="224" height="56" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="602" y="76" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">LakeSplitGenerator · :88</text>
  <text x="602" y="94" font-size="9" fill="#5b7db1" text-anchor="middle">生成湖 + 日志混合分片</text>

  <rect x="725" y="52" width="224" height="56" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="837" y="76" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">getReadableLakeSnapshot</text>
  <text x="837" y="94" font-size="9" fill="#5b7db1" text-anchor="middle">取可读湖快照</text>

  <path d="M244,80 L255,80" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M479,80 L490,80" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M714,80 L725,80" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M837,108 L837,134" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- Row 2 (右→左) -->
  <rect x="725" y="134" width="224" height="56" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="837" y="158" font-size="10.5" font-weight="600" fill="#5a3410" text-anchor="middle">createPlanner(snapshotId)</text>
  <text x="837" y="176" font-size="9" fill="#93762e" text-anchor="middle">.plan() 得湖 split</text>

  <rect x="490" y="134" width="224" height="56" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="602" y="158" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">getTableBucketsOffset · :108</text>
  <text x="602" y="176" font-size="9" fill="#5b7db1" text-anchor="middle">每桶 log offset 分界点</text>

  <rect x="255" y="134" width="224" height="56" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="367" y="156" font-size="10" font-weight="600" fill="#3d2a5a" text-anchor="middle">构造 LakeSnapshotAndFlussLogSplit</text>
  <text x="367" y="174" font-size="9" fill="#3d2a5a" text-anchor="middle">:306 · bucket + lakeSplits + offsets</text>

  <path d="M725,162 L714,162" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M490,162 L479,162" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M367,190 L367,216" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 下半 可视化 -->
  <rect x="30" y="216" width="940" height="212" rx="12" fill="#f7f7fa" stroke="#d2d2d7"/>
  <text x="52" y="240" font-size="11" font-weight="600" fill="#1d1d1f">每桶按 log offset 切分 · 历史段读湖快照 · 实时段从 snapshotLogOffset 续读 Fluss log</text>

  <text x="290" y="264" font-size="10" font-weight="600" fill="#5a3410" text-anchor="middle">湖快照（历史段）</text>
  <text x="720" y="264" font-size="10" font-weight="600" fill="#12402a" text-anchor="middle">Fluss log（实时段）</text>
  <text x="905" y="264" font-size="9" fill="#5b7db1" text-anchor="middle">stoppingOffset</text>

  <!-- bucket 0 -->
  <text x="70" y="298" font-size="9.5" fill="#6e6e73" text-anchor="middle">bucket 0</text>
  <rect x="115" y="282" width="325" height="30" rx="6" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="277" y="301" font-size="9.5" fill="#5a3410" text-anchor="middle">湖快照 split</text>
  <rect x="440" y="282" width="450" height="30" rx="6" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="665" y="301" font-size="9.5" fill="#12402a" text-anchor="middle">Fluss log 增量</text>
  <path d="M440,278 L440,316" stroke="#5b7db1" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>

  <!-- bucket 1 -->
  <text x="70" y="342" font-size="9.5" fill="#6e6e73" text-anchor="middle">bucket 1</text>
  <rect x="115" y="326" width="385" height="30" rx="6" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="307" y="345" font-size="9.5" fill="#5a3410" text-anchor="middle">湖快照 split</text>
  <rect x="500" y="326" width="390" height="30" rx="6" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="695" y="345" font-size="9.5" fill="#12402a" text-anchor="middle">Fluss log 增量</text>
  <path d="M500,322 L500,360" stroke="#5b7db1" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>

  <!-- bucket 2 -->
  <text x="70" y="386" font-size="9.5" fill="#6e6e73" text-anchor="middle">bucket 2</text>
  <rect x="115" y="370" width="350" height="30" rx="6" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="290" y="389" font-size="9.5" fill="#5a3410" text-anchor="middle">湖快照 split</text>
  <rect x="465" y="370" width="425" height="30" rx="6" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="677" y="389" font-size="9.5" fill="#12402a" text-anchor="middle">Fluss log 增量</text>
  <path d="M465,366 L465,404" stroke="#5b7db1" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>

  <text x="500" y="420" font-size="9" fill="#5b7db1" text-anchor="middle">竖虚线 = snapshotLogOffset（每桶各异）· 按 log offset 分界而非 timestamp</text>
</svg>
