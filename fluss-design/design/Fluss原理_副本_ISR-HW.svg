<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="480" viewBox="0 0 1000 480" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="480" fill="#fbfbfd"/>
  <text x="30" y="32" font-size="14" font-weight="600" fill="#1d1d1f">ISR 与高水位 · 收缩 / 扩张 / 可见边界</text>

  <!-- ISR 绿框（含 leader + follower1） -->
  <rect x="24" y="58" width="852" height="118" rx="12" fill="#f5faf6" stroke="#bfe0cd" stroke-width="1.5"/>
  <text x="36" y="74" font-size="9.5" font-weight="600" fill="#12402a">ISR = { leader, follower1 }</text>

  <!-- LEO 坐标轴 -->
  <line x1="120" y1="210" x2="900" y2="210" stroke="#c7c7cc" stroke-width="1.2"/>
  <line x1="120" y1="206" x2="120" y2="214" stroke="#c7c7cc" stroke-width="1.2"/>
  <text x="120" y="228" font-size="8.5" fill="#a1a1a6" text-anchor="middle">0</text>
  <line x1="510" y1="206" x2="510" y2="214" stroke="#c7c7cc" stroke-width="1.2"/>
  <text x="510" y="228" font-size="8.5" fill="#a1a1a6" text-anchor="middle">50</text>
  <line x1="900" y1="206" x2="900" y2="214" stroke="#c7c7cc" stroke-width="1.2"/>
  <text x="900" y="228" font-size="8.5" fill="#a1a1a6" text-anchor="middle">100 (offset)</text>

  <!-- leader 条 LEO=100 -->
  <text x="112" y="102" font-size="10" fill="#12402a" text-anchor="end">leader LEO=100</text>
  <rect x="120" y="90" width="780" height="18" rx="5" fill="#eafaf1" stroke="#bfe0cd"/>
  <!-- follower1 条 LEO=95 -->
  <text x="112" y="137" font-size="10" fill="#12402a" text-anchor="end">follower1 LEO=95</text>
  <rect x="120" y="125" width="741" height="18" rx="5" fill="#eafaf1" stroke="#bfe0cd"/>
  <!-- follower2 条 LEO=80（慢，ISR 外） -->
  <text x="112" y="192" font-size="10" fill="#4a1414" text-anchor="end">follower2 LEO=80</text>
  <rect x="120" y="180" width="624" height="18" rx="5" fill="#fbeaea" stroke="#e7c3c3"/>
  <text x="752" y="193" font-size="9" fill="#4a1414">落后 · 在 ISR 外</text>

  <!-- HW 竖线 -->
  <line x1="861" y1="80" x2="861" y2="235" stroke="#2f6f4f" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="861" y="252" font-size="10" font-weight="600" fill="#12402a" text-anchor="middle">HW = ISR 最小 LEO = 95</text>
  <text x="120" y="250" font-size="9" fill="#a1a1a6">maybeIncrementLeaderHW · Replica.java:1160 —— HW 取 ISR 内最小 LEO</text>
  <text x="120" y="265" font-size="9" fill="#a1a1a6">isUnderMinIsr（同步副本数不足）时 HW 不推进，可见边界停滞</text>

  <!-- 收缩卡 -->
  <rect x="40" y="278" width="440" height="150" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="56" y="304" font-size="11.5" font-weight="600" fill="#5a3410">收缩 ISR · 踢出慢副本</text>
  <text x="464" y="304" font-size="9" fill="#a1a1a6" text-anchor="end">maybeShrinkIsr · Replica.java:1764</text>
  <line x1="56" y1="314" x2="464" y2="314" stroke="#e8cf9a" stroke-width="1"/>
  <text x="56" y="336" font-size="10" fill="#5a3410">周期任务 isr-expiration（周期 = max-lag-time / 2）</text>
  <text x="56" y="358" font-size="10" fill="#5a3410">扫描落后超过 log.replica.max-lag-time 的 follower</text>
  <text x="56" y="380" font-size="10" fill="#5a3410">由 getOutOfSyncFollowerReplicas · :2080 选出</text>
  <text x="56" y="402" font-size="10" fill="#5a3410">踢出 ISR → HW 可回落到剩余副本最小 LEO</text>

  <!-- 扩张卡 -->
  <rect x="520" y="278" width="440" height="150" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="536" y="304" font-size="11.5" font-weight="600" fill="#12402a">扩张 ISR · 追上的副本回归</text>
  <text x="944" y="304" font-size="9" fill="#a1a1a6" text-anchor="end">maybeExpandISr · Replica.java:1732</text>
  <line x1="536" y1="314" x2="944" y2="314" stroke="#bfe0cd" stroke-width="1"/>
  <text x="536" y="336" font-size="10" fill="#12402a">follower 持续拉取，LEO 追上 leader HW</text>
  <text x="536" y="358" font-size="10" fill="#12402a">isFollowerInSync · :2101 判定为已同步</text>
  <text x="536" y="380" font-size="10" fill="#12402a">重新纳入 ISR 集合</text>
  <text x="536" y="402" font-size="10" fill="#12402a">ISR 变大 → HW 可继续向前推进</text>

  <!-- 底部小注 -->
  <rect x="40" y="440" width="920" height="30" rx="9" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="56" y="459" font-size="9.5" fill="#6e6e73">ISR 变更经 <tspan font-weight="600" fill="#1d1d1f">AdjustIsrManager.submit · :76</tspan> 发 AdjustIsrRequest 给协调器，最终落到 ZK 持久化。</text>
</svg>
