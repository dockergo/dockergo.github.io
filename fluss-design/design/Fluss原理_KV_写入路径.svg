<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
    <marker id="arR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#e7c3c3"/></marker>
  </defs>
  <rect width="980" height="500" fill="#fbfbfd"/>
  <text x="30" y="32" font-size="14" font-weight="600" fill="#1d1d1f">KV 写入路径 · WAL 先行 + preWriteBuffer</text>

  <!-- 纵向主流程卡 左列 x=60 w=440 -->
  <rect x="60" y="52" width="440" height="46" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="76" y="74" font-size="11" font-weight="600" fill="#1b2a4a">putAsLeader · 持写锁</text>
  <text x="76" y="90" font-size="9" fill="#a1a1a6">KvTablet.java:337</text>
  <path d="M280 98 L280 112" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="60" y="112" width="440" height="46" rx="11" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="76" y="134" font-size="11" font-weight="600" fill="#1d1d1f">processKvRecords · 逐条处理主键记录</text>
  <text x="76" y="150" font-size="9" fill="#a1a1a6">KvTablet.java:423</text>
  <path d="M280 158 L280 172" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="60" y="172" width="440" height="52" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="76" y="194" font-size="11" font-weight="600" fill="#5a3410">getFromBufferOrKv · 读旧值</text>
  <text x="76" y="212" font-size="9.5" fill="#93762e">先查 preWriteBuffer，未命中再查 RocksDB · KvTablet.java:686</text>
  <path d="M280 224 L280 238" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="60" y="238" width="440" height="52" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="76" y="260" font-size="11" font-weight="600" fill="#3d2a5a">rowMerger.merge / delete · 合并新旧值</text>
  <text x="76" y="278" font-size="9.5" fill="#3d2a5a">按 merge engine 产出新行，并生成 changelog 记录</text>
  <path d="M280 290 L280 304" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="60" y="304" width="440" height="58" rx="11" fill="#fff7e6" stroke="#e8cf9a" stroke-width="2" filter="url(#soft)"/>
  <text x="76" y="326" font-size="11" font-weight="600" fill="#5a3410">logTablet.appendAsLeader(walBuilder.build())</text>
  <text x="76" y="344" font-size="9.5" fill="#93762e">先追加 WAL（changelog 就是 WAL）· KvTablet.java:395</text>
  <text x="76" y="358" font-size="9" fill="#a1a1a6">WAL 成功后才认为写入生效</text>
  <path d="M280 362 L280 376" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="60" y="376" width="440" height="52" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="76" y="398" font-size="11" font-weight="600" fill="#1b2a4a">值进 KvPreWriteBuffer</text>
  <text x="76" y="416" font-size="9.5" fill="#5b7db1">带上 WAL 返回的 LSN，暂驻内存，尚未落 RocksDB</text>

  <!-- 红色旁路：回滚 -->
  <rect x="560" y="304" width="380" height="76" rx="11" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="576" y="326" font-size="11" font-weight="600" fill="#4a1414">WAL 返回 duplicated / 异常</text>
  <text x="576" y="346" font-size="9.5" fill="#4a1414">truncateTo 回滚已写入 buffer 的脏值</text>
  <text x="576" y="364" font-size="9.5" fill="#4a1414">保证 buffer 与 WAL 一致</text>
  <text x="576" y="380" font-size="9" fill="#a1a1a6">KvTablet.java:397</text>
  <path d="M500 333 L558 333" fill="none" stroke="#e7c3c3" stroke-width="1.5" marker-end="url(#arR)"/>

  <!-- 底部绿色强调框 -->
  <rect x="60" y="444" width="880" height="44" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="76" y="464" font-size="10.5" fill="#12402a">落盘时机：RocksDB 落盘发生在 <tspan font-weight="600">flush()</tspan> · KvTablet.java:611 —— HW 推进后，把 LSN &lt; HW 的 buffer 项批量落 RocksDB</text>
  <text x="76" y="480" font-size="10.5" fill="#12402a">RocksDB 自身 WAL 被关闭（<tspan font-weight="600">setDisableWAL</tspan>），恢复只依赖 Fluss WAL · RocksDBResourceContainer.java:182</text>

  <path d="M280 428 L280 442" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
</svg>
