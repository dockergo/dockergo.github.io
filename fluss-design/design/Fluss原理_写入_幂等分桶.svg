<svg xmlns="http://www.w3.org/2000/svg" width="960" height="450" viewBox="0 0 960 450" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="960" height="450" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">幂等与分桶 · writerId + batchSequence + 哈希分桶</text>

  <!-- section 1 header -->
  <text x="30" y="76" font-size="12" font-weight="600" fill="#6e6e73">① 哈希分桶 · 决定记录落到哪个 bucket</text>

  <!-- card1 record -->
  <rect x="30" y="95" width="120" height="56" rx="11" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="90" y="120" font-size="11" font-weight="600" fill="#1d1d1f" text-anchor="middle">记录 Record</text>
  <text x="90" y="138" font-size="9" fill="#a1a1a6" text-anchor="middle">一行待写数据</text>
  <path d="M150,123 L180,123" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- card2 bucketKey -->
  <rect x="180" y="95" width="150" height="56" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="255" y="120" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">提取 主键 / bucketKey</text>
  <text x="255" y="138" font-size="9" fill="#5b7db1" text-anchor="middle">未指定则按主键</text>
  <path d="M330,123 L360,123" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- card3 hash -->
  <rect x="350" y="95" width="238" height="56" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="469" y="118" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">MurmurHash(keyHash) % numBuckets</text>
  <text x="469" y="138" font-size="9" fill="#5b7db1" text-anchor="middle">FlussBucketingFunction.java:41</text>

  <!-- fan to buckets -->
  <path d="M588,123 L610,123 L610,101 L650,101" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M588,123 L610,123 L610,153 L650,153" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M588,123 L610,123 L610,205 L650,205" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="650" y="80" width="130" height="42" rx="10" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="715" y="106" font-size="11" font-weight="600" fill="#5a3410" text-anchor="middle">bucket 0</text>
  <rect x="650" y="132" width="130" height="42" rx="10" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="715" y="158" font-size="11" font-weight="600" fill="#5a3410" text-anchor="middle">bucket 1</text>
  <rect x="650" y="184" width="130" height="42" rx="10" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="715" y="210" font-size="11" font-weight="600" fill="#5a3410" text-anchor="middle">bucket 2</text>
  <text x="800" y="152" font-size="9" fill="#b39456">HashBucketAssigner.java:40</text>
  <text x="800" y="170" font-size="9" fill="#b39456">同 bucketKey 稳定落同桶</text>

  <!-- divider -->
  <line x1="30" y1="252" x2="930" y2="252" stroke="#e5e5ea" stroke-width="1.5"/>

  <!-- section 2 header -->
  <text x="30" y="282" font-size="12" font-weight="600" fill="#6e6e73">② 幂等判序 · 每批携带 writerId + batchSequence，服务端逐批校验</text>

  <!-- entry -->
  <rect x="30" y="300" width="200" height="64" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="326" font-size="11" font-weight="600" fill="#1b2a4a">每批携带</text>
  <text x="46" y="346" font-size="10.5" fill="#1b2a4a">writerId + batchSequence</text>
  <path d="M230,332 L280,332" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- judge -->
  <rect x="280" y="300" width="230" height="64" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="296" y="324" font-size="11" font-weight="600" fill="#1b2a4a">WriterAppendInfo.inSequence</text>
  <text x="296" y="343" font-size="10" fill="#5b7db1">服务端逐批判序</text>
  <text x="296" y="358" font-size="9" fill="#8aa5cf">WriterAppendInfo.java:143</text>
  <path d="M510,332 L540,332" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- diamond -->
  <path d="M580,302 L620,332 L580,362 L540,332 Z" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="580" y="337" font-size="10.5" font-weight="600" fill="#274a78" text-anchor="middle">判序</text>

  <!-- branches -->
  <path d="M620,332 L650,332 L650,312 L680,312" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M620,332 L650,332 L650,368 L680,368" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M620,332 L650,332 L650,424 L680,424" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- outcome ordered green -->
  <rect x="680" y="290" width="250" height="44" rx="10" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="694" y="310" font-size="10.5" font-weight="600" fill="#12402a">有序：nextSeq == lastSeq + 1</text>
  <text x="694" y="327" font-size="9" fill="#2f6f4f">→ 正常写入，推进序号</text>

  <!-- outcome duplicate neutral -->
  <rect x="680" y="346" width="250" height="44" rx="10" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="694" y="366" font-size="10.5" font-weight="600" fill="#1d1d1f">重复：findDuplicateBatch 命中</text>
  <text x="694" y="383" font-size="9" fill="#a1a1a6">→ 幂等跳过 · WriterStateEntry.java:113</text>

  <!-- outcome out-of-order red -->
  <rect x="680" y="402" width="250" height="44" rx="10" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="694" y="422" font-size="10.5" font-weight="600" fill="#4a1414">乱序：nextSeq 跳变</text>
  <text x="694" y="439" font-size="9" fill="#8a4a4a">→ OutOfOrderSequenceException</text>
</svg>
