  <rect x="30" y="294" width="216" height="106" rx="12" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="46" y="316" font-size="10.5" font-weight="600" fill="#5a3410">① doWork 循环</text>
  <text x="46" y="333" font-size="9" fill="#a1a1a6">ReplicaFetcherThread.java:136</text>
  <line x1="46" y1="342" x2="230" y2="342" stroke="#efdcb4" stroke-width="1"/>
  <text x="46" y="362" font-size="10" fill="#5a3410">从 fetchOffset 起</text>
  <text x="46" y="382" font-size="10" fill="#5a3410">向 Leader 发拉取</text>

  <path d="M246 347 L268 347" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="258" y="294" width="216" height="106" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="274" y="316" font-size="10.5" font-weight="600" fill="#1b2a4a">② 发 FETCH_LOG</text>
  <text x="274" y="333" font-size="9" fill="#a1a1a6">给 Leader</text>
  <line x1="274" y1="342" x2="458" y2="342" stroke="#bcd0ec" stroke-width="1"/>
  <text x="274" y="362" font-size="10" fill="#1b2a4a">Leader 按 offset</text>
  <text x="274" y="382" font-size="10" fill="#1b2a4a">返回增量日志</text>

  <path d="M474 347 L496 347" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="486" y="294" width="216" height="106" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="502" y="316" font-size="10.5" font-weight="600" fill="#274a78">③ 校验并落盘</text>
  <text x="502" y="333" font-size="9" fill="#a1a1a6">processFetchResult…LocalStorage:554</text>
  <line x1="502" y1="342" x2="686" y2="342" stroke="#cfe0f2" stroke-width="1"/>
  <text x="502" y="362" font-size="10" fill="#274a78">校验 fetchOffset ==</text>
  <text x="502" y="382" font-size="10" fill="#274a78">localLogEndOffset</text>

  <path d="M702 347 L724 347" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="714" y="294" width="216" height="106" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="730" y="316" font-size="10.5" font-weight="600" fill="#12402a">④ 追加 + 更 HW</text>
  <text x="730" y="333" font-size="9" fill="#a1a1a6">updateHighWatermark:591</text>
  <line x1="730" y1="342" x2="914" y2="342" stroke="#bfe0cd" stroke-width="1"/>
  <text x="730" y="362" font-size="10" fill="#12402a">appendRecordsToFollower</text>
  <text x="730" y="382" font-size="10" fill="#12402a">follower 先更 HW</text>

  <!-- 底部小注 -->
  <rect x="30" y="414" width="900" height="30" rx="9" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="46" y="433" font-size="9.5" fill="#6e6e73">fetcher 线程按 <tspan font-weight="600" fill="#1d1d1f">bucket.hashCode % numFetchers</tspan> 分配到固定线程，同一 bucket 串行拉取 · ReplicaFetcherManager.java:170</text>
</svg>
