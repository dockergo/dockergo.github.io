<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="960" height="460" fill="#fbfbfd"/>
  <text x="30" y="32" font-size="14" font-weight="600" fill="#1d1d1f">副本复制 · Leader / Follower pull</text>

  <!-- 顶部小注 -->
  <rect x="30" y="46" width="900" height="40" rx="10" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="46" y="64" font-size="9.5" fill="#3d2a5a">角色切换：makeLeader · Replica.java:419 / makeFollower · :478，按 <tspan font-weight="600">leaderEpoch</tspan> 做 fencing。</text>
  <text x="46" y="80" font-size="9.5" fill="#3d2a5a">旧 epoch 的请求抛 FencedLeaderEpochException，防止过期 Leader 误写。</text>

  <!-- Follower1 左 -->
  <rect x="40" y="120" width="200" height="130" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="56" y="144" font-size="11.5" font-weight="600" fill="#5a3410">Follower 1</text>
  <text x="56" y="162" font-size="9" fill="#93762e">副本 · 只拉取</text>
  <rect x="56" y="176" width="168" height="30" rx="7" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="140" y="195" font-size="9.5" fill="#5a3410" text-anchor="middle">ReplicaFetcherThread</text>
  <rect x="56" y="212" width="168" height="26" rx="7" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="140" y="229" font-size="9" fill="#5a3410" text-anchor="middle">本地 LogTablet 追加</text>

  <!-- Leader 中 -->
  <rect x="380" y="120" width="200" height="130" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="396" y="144" font-size="11.5" font-weight="600" fill="#1b2a4a">Leader</text>
  <text x="396" y="162" font-size="9" fill="#5b7db1">唯一写入点</text>
  <rect x="396" y="176" width="168" height="30" rx="7" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="480" y="195" font-size="9.5" fill="#1b2a4a" text-anchor="middle">LogTablet（权威日志）</text>
  <rect x="396" y="212" width="168" height="26" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="480" y="229" font-size="9" fill="#274a78" text-anchor="middle">响应 FETCH_LOG 拉取</text>

  <!-- Follower2 右 -->
  <rect x="720" y="120" width="200" height="130" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="736" y="144" font-size="11.5" font-weight="600" fill="#5a3410">Follower 2</text>
  <text x="736" y="162" font-size="9" fill="#93762e">副本 · 只拉取</text>
  <rect x="736" y="176" width="168" height="30" rx="7" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="820" y="195" font-size="9.5" fill="#5a3410" text-anchor="middle">ReplicaFetcherThread</text>
  <rect x="736" y="212" width="168" height="26" rx="7" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="820" y="229" font-size="9" fill="#5a3410" text-anchor="middle">本地 LogTablet 追加</text>

  <!-- pull 箭头：follower → leader -->
  <path d="M240 175 L378 175" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="309" y="167" font-size="9" fill="#a1a1a6" text-anchor="middle">FETCH_LOG pull</text>
  <path d="M720 175 L582 175" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="651" y="167" font-size="9" fill="#a1a1a6" text-anchor="middle">FETCH_LOG pull</text>

  <!-- 下探到流程 -->
  <path d="M140 250 L140 292" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="150" y="276" font-size="9" fill="#a1a1a6">线程循环</text>

