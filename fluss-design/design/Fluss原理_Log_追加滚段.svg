<svg xmlns="http://www.w3.org/2000/svg" width="980" height="480" viewBox="0 0 980 480" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="980" height="480" fill="#fbfbfd"/>
  <text x="30" y="32" font-size="14" font-weight="600" fill="#1d1d1f">追加与滚段 · append → maybeRoll → shouldRoll</text>

  <!-- 两入口卡 -->
  <rect x="120" y="52" width="330" height="52" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="136" y="74" font-size="11.5" font-weight="600" fill="#1b2a4a">appendAsLeader · 分配 offset</text>
  <text x="136" y="92" font-size="9" fill="#a1a1a6">LogTablet.java:435</text>

  <rect x="530" y="52" width="330" height="52" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="546" y="74" font-size="11.5" font-weight="600" fill="#1b2a4a">appendAsFollower · 校验 offset 单调</text>
  <text x="546" y="92" font-size="9" fill="#a1a1a6">LogTablet.java:440</text>

  <path d="M285 104 L285 124 L490 124 L490 140" fill="none" stroke="#c7c7cc" stroke-width="1.5"/>
  <path d="M695 104 L695 124 L490 124" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- 主链纵向 -->
  <rect x="330" y="140" width="320" height="46" rx="11" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="346" y="162" font-size="11" font-weight="600" fill="#1d1d1f">append · 校验记录 + 加锁</text>
  <text x="346" y="178" font-size="9" fill="#a1a1a6">LogTablet.java:789</text>
  <path d="M490 186 L490 200" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="330" y="200" width="320" height="46" rx="11" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="346" y="222" font-size="11" font-weight="600" fill="#1d1d1f">assignOffsetAndTimestamp · 定 offset</text>
  <text x="346" y="238" font-size="9" fill="#a1a1a6">LogTablet.java:891</text>
  <path d="M490 246 L490 260" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="330" y="260" width="320" height="46" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="346" y="282" font-size="11" font-weight="600" fill="#5a3410">maybeRoll · 判断是否需滚段</text>
  <text x="346" y="298" font-size="9" fill="#93762e">LogTablet.java:963</text>

  <!-- 菱形决策 -->
  <path d="M490 320 L560 355 L490 390 L420 355 Z" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="490" y="350" font-size="10.5" font-weight="600" fill="#5a3410" text-anchor="middle">shouldRoll?</text>
  <text x="490" y="366" font-size="8.5" fill="#93762e" text-anchor="middle">LogSegment.java:231</text>
  <path d="M490 306 L490 320" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- 决策条件说明卡（左侧） -->
  <rect x="30" y="308" width="360" height="94" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="46" y="330" font-size="10.5" font-weight="600" fill="#274a78">滚段触发条件（任一满足）</text>
  <text x="46" y="350" font-size="9.5" fill="#274a78">· 当前段放不下这批记录（超 segment 大小）</text>
  <text x="46" y="368" font-size="9.5" fill="#274a78">· 偏移 / 时间索引文件已写满</text>
  <text x="46" y="386" font-size="9.5" fill="#274a78">· 相对 offset 溢出 Int（超 Integer.MAX）</text>
  <path d="M390 355 L418 355" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- 是分支：roll 新段 + takeSnapshot (绿) -->
  <path d="M560 355 L640 355" fill="none" stroke="#bfe0cd" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="590" y="348" font-size="9" fill="#2f6f4f">是</text>
  <rect x="640" y="320" width="310" height="70" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="656" y="342" font-size="11" font-weight="600" fill="#12402a">roll · 封存旧段 + 开新 active 段</text>
  <text x="656" y="360" font-size="9.5" fill="#2f6f4f">同时 takeSnapshot 落 .writer_snapshot</text>
  <text x="656" y="380" font-size="9" fill="#a1a1a6">LogTablet.java:994</text>

  <!-- 否分支：续写 (红中性) -->
  <path d="M490 390 L490 410 L330 410 L330 428" fill="none" stroke="#e7c3c3" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="500" y="404" font-size="9" fill="#4a1414">否</text>

  <!-- 末尾：localLog.append + 更新 HW -->
  <rect x="120" y="428" width="420" height="42" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="136" y="450" font-size="11" font-weight="600" fill="#12402a">localLog.append → 写 active segment → 更新 HW 高水位</text>
  <text x="136" y="464" font-size="9" fill="#2f6f4f">否分支续写同一 active 段</text>

  <path d="M795 390 L795 449 L542 449" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- 底部小注 -->
  <text x="580" y="462" font-size="9" fill="#a1a1a6">段大小上限 log.segment.file-size 默认 1024m</text>
</svg>
