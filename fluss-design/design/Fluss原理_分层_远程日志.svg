<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="490" viewBox="0 0 1000 490" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="490" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">远程日志分层 · 冷段上传 DFS</text>
  <text x="30" y="52" font-size="10.5" fill="#a1a1a6">周期性挑选冷日志段封装上传远程存储，提交 manifest 由协调器落 ZK；本地仅保留热段</text>

  <!-- left: LogTablet segment panel -->
  <rect x="30" y="84" width="300" height="168" rx="13" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="46" y="108" font-size="12" font-weight="600" fill="#1d1d1f">TabletServer 本地 · LogTablet</text>
  <rect x="48" y="150" width="36" height="64" rx="5" fill="#eef3fb" stroke="#bcd0ec"/>
  <rect x="88" y="150" width="36" height="64" rx="5" fill="#eef3fb" stroke="#bcd0ec"/>
  <rect x="128" y="150" width="36" height="64" rx="5" fill="#eef3fb" stroke="#bcd0ec"/>
  <rect x="168" y="150" width="36" height="64" rx="5" fill="#eef3fb" stroke="#bcd0ec"/>
  <rect x="214" y="150" width="36" height="64" rx="5" fill="#fff7e6" stroke="#e8cf9a"/>
  <rect x="254" y="150" width="36" height="64" rx="5" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="126" y="234" font-size="9.5" fill="#5b7db1" text-anchor="middle">冷段 → 上传 DFS</text>
  <text x="252" y="234" font-size="9.5" fill="#93762e" text-anchor="middle">热段 · 本地保留</text>

  <!-- center: task steps -->
  <path d="M330,150 L350,208" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="332" y="176" font-size="9" fill="#a1a1a6">读取待传段</text>
  <path d="M502,162 L502,172" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M502,250 L502,260" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M502,338 L502,348" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="352" y="84" width="300" height="78" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="366" y="106" font-size="11" font-weight="600" fill="#1b2a4a">① RemoteLogManager · :72</text>
  <text x="366" y="124" font-size="10" fill="#1b2a4a">为每个 leader 桶建 LogTieringTask · :313</text>
  <text x="366" y="140" font-size="10" fill="#5b7db1">scheduleWithFixedDelay 周期默认 1min · :326</text>

  <rect x="352" y="172" width="300" height="78" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="366" y="194" font-size="11" font-weight="600" fill="#274a78">② runOnce 选段 · :120</text>
  <text x="366" y="212" font-size="10" fill="#274a78">candidateToCopyLogSegments 挑候选段</text>
  <text x="366" y="228" font-size="10" fill="#5b7db1">依据 HW 与 copiedOffset 判定 · :133</text>

  <rect x="352" y="260" width="300" height="78" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="366" y="282" font-size="11" font-weight="600" fill="#5a3410">③ 封装并上传</text>
  <text x="366" y="300" font-size="10" fill="#5a3410">LogSegmentFiles = log + 两索引 + writer 快照</text>
  <text x="366" y="316" font-size="10" fill="#93762e">copyLogSegmentFiles 传 DFS · :287</text>

  <rect x="352" y="348" width="300" height="78" rx="12" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="366" y="370" font-size="11" font-weight="600" fill="#5a3410">④ 提交 manifest</text>
  <text x="366" y="388" font-size="10" fill="#5a3410">tryToCommitRemoteLogManifest · :151</text>
  <text x="366" y="404" font-size="10" fill="#93762e">传 manifest + RPC 提交协调器</text>

  <!-- right: DFS + coordinator + ZK -->
  <path d="M652,300 L716,175" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="656" y="238" font-size="9" fill="#a1a1a6">传 DFS</text>
  <path d="M652,388 L684,270" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="656" y="336" font-size="9" fill="#a1a1a6">RPC 提交</text>

  <!-- DFS cylinder -->
  <path d="M720,112 A92,20 0 0 0 904,112 L904,200 A92,20 0 0 1 720,200 Z" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <ellipse cx="812" cy="112" rx="92" ry="20" fill="#eef3fb" stroke="#cfe0f2"/>
  <text x="812" y="156" font-size="11.5" font-weight="600" fill="#274a78" text-anchor="middle">DFS 远程存储</text>
  <text x="812" y="176" font-size="9.5" fill="#5b7db1" text-anchor="middle">接收冷段文件</text>

  <!-- coordinator -->
  <rect x="690" y="232" width="274" height="72" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="706" y="256" font-size="11" font-weight="600" fill="#12402a">协调器落 ZK</text>
  <text x="706" y="276" font-size="10" fill="#12402a">upsertRemoteLogManifestHandle</text>
  <text x="706" y="294" font-size="9" fill="#2f6f4f">CoordinatorEventProcessor.java:2121</text>
  <path d="M827,304 L827,326" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- ZK -->
  <rect x="690" y="326" width="274" height="72" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="706" y="350" font-size="11" font-weight="600" fill="#3d2a5a">ZooKeeper · remote_logs</text>
  <text x="706" y="370" font-size="10" fill="#3d2a5a">保存 manifest 句柄</text>
  <text x="706" y="388" font-size="9" fill="#7a5aa6">指向 DFS 上的冷段集合</text>

  <!-- bottom note -->
  <rect x="30" y="438" width="934" height="34" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="46" y="459" font-size="10.5" fill="#6e6e73"><tspan font-weight="600" fill="#274a78">读取路径</tspan>　查询命中冷段时，RemoteLogFetcher 依 manifest 从 DFS 预取远程日志段，与本地热段拼接对上层透明</text>
</svg>
