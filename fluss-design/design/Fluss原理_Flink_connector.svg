<svg xmlns="http://www.w3.org/2000/svg" width="960" height="450" viewBox="0 0 960 450" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="960" height="450" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Flink Connector · source 与 sink</text>

  <text x="175" y="50" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">source（读 · 表 → Flink）</text>
  <text x="785" y="50" font-size="11" font-weight="600" fill="#2f6f4f" text-anchor="middle">sink（写 · Flink → 表）</text>

  <!-- 中心 Fluss 表 -->
  <rect x="390" y="150" width="180" height="150" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="480" y="178" font-size="12.5" font-weight="600" fill="#5a3410" text-anchor="middle">Fluss 表</text>
  <rect x="410" y="196" width="140" height="42" rx="9" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="480" y="222" font-size="11" fill="#5a3410" text-anchor="middle">LogTablet · 追加日志</text>
  <rect x="410" y="246" width="140" height="42" rx="9" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="480" y="272" font-size="11" fill="#5a3410" text-anchor="middle">KvTablet · 主键点查</text>

  <!-- 左 source 蓝 -->
  <rect x="40" y="56" width="270" height="36" rx="10" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="175" y="79" font-size="10.5" fill="#274a78" text-anchor="middle">Flink · 消费扫描记录</text>
  <path d="M175,92 L175,104" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="40" y="104" width="270" height="54" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="175" y="126" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">FlinkTableSource · :112</text>
  <text x="175" y="144" font-size="9.5" fill="#5b7db1" text-anchor="middle">ScanTableSource + 投影/过滤下推</text>
  <path d="M175,158 L175,176" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="40" y="176" width="270" height="42" rx="11" fill="#ffffff" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="175" y="202" font-size="11" fill="#1b2a4a" text-anchor="middle">getScanRuntimeProvider · :336</text>
  <path d="M175,218 L175,236" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="40" y="236" width="270" height="58" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="175" y="259" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">流式 FlinkSource（FLIP-27）</text>
  <text x="175" y="277" font-size="9.5" fill="#5b7db1" text-anchor="middle">:401 / :445 · 分片枚举与读取</text>

  <!-- source 读表箭头 表→S3 -->
  <path d="M390,265 L310,265" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="350" y="258" font-size="9" fill="#a1a1a6" text-anchor="middle">读</text>

  <!-- 右 sink 绿 -->
  <rect x="650" y="56" width="270" height="36" rx="10" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="785" y="79" font-size="10.5" fill="#2c5a3a" text-anchor="middle">Flink · 上游写入记录</text>
  <path d="M785,92 L785,104" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="650" y="104" width="270" height="54" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="785" y="126" font-size="12" font-weight="600" fill="#12402a" text-anchor="middle">FlinkTableSink · :68</text>
  <text x="785" y="144" font-size="9.5" fill="#2f6f4f" text-anchor="middle">getChangelogMode :125 决定是否收 DELETE</text>
  <path d="M785,158 L785,176" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="650" y="176" width="270" height="42" rx="11" fill="#ffffff" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="785" y="202" font-size="11" fill="#12402a" text-anchor="middle">getFlinkSink · :209</text>
  <path d="M785,218 L785,236" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="650" y="236" width="270" height="58" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="785" y="259" font-size="11" font-weight="600" fill="#12402a" text-anchor="middle">有主键 = UpsertSinkWriter :215</text>
  <text x="785" y="277" font-size="11" font-weight="600" fill="#12402a" text-anchor="middle">无主键 = AppendSinkWriter :228</text>

  <!-- sink 写表箭头 K3→表 -->
  <path d="M650,265 L570,265" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="610" y="258" font-size="9" fill="#a1a1a6" text-anchor="middle">写</text>

  <text x="480" y="410" font-size="9.5" fill="#a1a1a6" text-anchor="middle">source 与 sink 均以 Fluss 表为中心 · changelog 模式决定主键表能否下发删除</text>
</svg>
