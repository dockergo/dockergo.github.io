<svg xmlns="http://www.w3.org/2000/svg" width="920" height="480" viewBox="0 0 920 480" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="920" height="480" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">两种表模型 · Append vs Upsert</text>
  <text x="30" y="52" font-size="10.5" fill="#a1a1a6">日志表只追加，主键表要读旧值合并并产出 changelog——两条路径最终都汇合到 LogTablet</text>

  <!-- Left container: Log Table -->
  <rect x="30" y="70" width="400" height="300" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="48" y="96" font-size="12.5" font-weight="600" fill="#5a3410">日志表 · Log Table</text>
  <text x="48" y="116" font-size="10" fill="#93762e">仅追加 · 无主键 · 无更新</text>

  <rect x="48" y="132" width="364" height="56" rx="10" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="64" y="158" font-size="11" font-weight="600" fill="#5a3410">append(InternalRow)</text>
  <text x="64" y="178" font-size="10" fill="#93762e">构造一行 → 交给写入器攒批</text>
  <path d="M230,188 L230,206" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="48" y="206" width="364" height="56" rx="10" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="64" y="232" font-size="11" font-weight="600" fill="#5a3410">直接追加 LogTablet</text>
  <text x="64" y="252" font-size="10" fill="#93762e">顺序写日志，offset 单调递增</text>

  <text x="48" y="292" font-size="10.5" fill="#5a3410">一切是分区追加日志——写入路径最短</text>
  <text x="48" y="314" font-size="10.5" fill="#93762e">无需读旧值、无需合并、无需物化</text>
  <text x="48" y="344" font-size="10" fill="#b39456">典型场景：埋点、日志流、CDC 下游存档</text>

  <!-- Right container: PrimaryKey Table -->
  <rect x="490" y="70" width="400" height="300" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="508" y="96" font-size="12.5" font-weight="600" fill="#12402a">主键表 · PrimaryKey Table</text>
  <text x="508" y="116" font-size="10" fill="#2f6f4f">可 upsert / delete · KV 物化最新值</text>

  <rect x="508" y="130" width="364" height="44" rx="9" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="522" y="150" font-size="10.5" font-weight="600" fill="#12402a">upsert / delete → KvTablet.putAsLeader</text>
  <text x="522" y="167" font-size="9" fill="#4b8b63">KvTablet.java:337</text>
  <path d="M690,174 L690,186" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="508" y="186" width="364" height="44" rx="9" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="522" y="206" font-size="10.5" font-weight="600" fill="#12402a">读旧值 → rowMerger.merge</text>
  <text x="522" y="223" font-size="9" fill="#4b8b63">合并新旧行，决定变更类型</text>
  <path d="M690,230 L690,242" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="508" y="242" width="364" height="44" rx="9" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="522" y="262" font-size="10.5" font-weight="600" fill="#12402a">产 changelog (+I / -U / +U / -D)</text>
  <text x="522" y="279" font-size="9" fill="#4b8b63">生成 CDC 变更流</text>
  <path d="M690,286 L690,298" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="508" y="298" width="364" height="52" rx="9" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="522" y="318" font-size="10.5" font-weight="600" fill="#12402a">追加 WAL → preWriteBuffer</text>
  <text x="522" y="337" font-size="9" fill="#4b8b63">RocksDB 物化最新值，保证读到最新</text>

  <!-- bottom converge box -->
  <rect x="30" y="400" width="860" height="56" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="48" y="424" font-size="10.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">共同底座</tspan>　两者都经哈希分桶 + writerId 幂等；主键表的 changelog 也追加到 LogTablet</text>
  <text x="48" y="444" font-size="10.5" fill="#a1a1a6">→ 两种模型最终都在 LogTablet 汇合，下游可用同一套流式读取</text>
</svg>
