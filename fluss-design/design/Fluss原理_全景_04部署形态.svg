<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="580" viewBox="0 0 1000 580" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="580" fill="#fbfbfd"/>
  <text x="30" y="28" font-size="14" font-weight="600" fill="#1d1d1f">Fluss 部署与运行形态</text>

  <!-- ① 外部计算引擎 -->
  <rect x="40" y="44" width="920" height="82" rx="12" fill="#f7f7fa" stroke="#d2d2d7" stroke-dasharray="6 4"/>
  <text x="56" y="65" font-size="11.5" font-weight="600" fill="#1d1d1f">① 外部计算引擎 · 经 connector 接入，非集群本体</text>
  <rect x="360" y="74" width="180" height="44" rx="10" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="450" y="94" font-size="12" font-weight="600" fill="#1d1d1f" text-anchor="middle">Flink</text>
  <text x="450" y="110" font-size="9" fill="#6e6e73" text-anchor="middle">流读 / 流写 / lookup</text>
  <rect x="580" y="74" width="180" height="44" rx="10" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="670" y="94" font-size="12" font-weight="600" fill="#1d1d1f" text-anchor="middle">Spark</text>
  <text x="670" y="110" font-size="9" fill="#6e6e73" text-anchor="middle">批读湖仓快照</text>

  <!-- ② CoordinatorServer -->
  <rect x="70" y="152" width="300" height="70" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="220" y="178" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">② CoordinatorServer</text>
  <text x="220" y="197" font-size="9.5" fill="#5b7db1" text-anchor="middle">1+ 实例 · HA 靠 ZK LeaderLatch</text>
  <text x="220" y="212" font-size="9.5" fill="#5b7db1" text-anchor="middle">元数据 / 调度</text>

  <!-- ③ TabletServer 集群 -->
  <rect x="40" y="248" width="920" height="124" rx="12" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="56" y="269" font-size="11.5" font-weight="600" fill="#5a3410">③ TabletServer 集群 · N 个 · 承载桶副本 Leader/Follower · 读写 + 复制</text>
  <rect x="70" y="284" width="270" height="74" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="205" y="316" font-size="12" font-weight="600" fill="#5a3410" text-anchor="middle">TabletServer 0</text>
  <text x="205" y="335" font-size="9.5" fill="#93762e" text-anchor="middle">桶副本 Leader / Follower</text>
  <rect x="365" y="284" width="270" height="74" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="500" y="316" font-size="12" font-weight="600" fill="#5a3410" text-anchor="middle">TabletServer 1</text>
  <text x="500" y="335" font-size="9.5" fill="#93762e" text-anchor="middle">桶副本 Leader / Follower</text>
  <rect x="660" y="284" width="270" height="74" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="795" y="316" font-size="12" font-weight="600" fill="#5a3410" text-anchor="middle">TabletServer 2</text>
  <text x="795" y="335" font-size="9.5" fill="#93762e" text-anchor="middle">桶副本 Leader / Follower</text>

  <!-- ④ ZooKeeper -->
  <rect x="70" y="398" width="420" height="72" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="280" y="428" font-size="12" font-weight="600" fill="#12402a" text-anchor="middle">④ ZooKeeper</text>
  <text x="280" y="447" font-size="9.5" fill="#2f6f4f" text-anchor="middle">元数据真源 · 集群成员 / Leader 选举</text>

  <!-- ⑤ 远程 DFS -->
  <rect x="540" y="398" width="360" height="72" rx="12" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="720" y="428" font-size="12" font-weight="600" fill="#5a3410" text-anchor="middle">⑤ 远程 DFS</text>
  <text x="720" y="447" font-size="9.5" fill="#93762e" text-anchor="middle">KV 快照 + 远程日志</text>

  <!-- ⑥ 外部湖仓 -->
  <rect x="40" y="492" width="920" height="76" rx="12" fill="#f7f7fa" stroke="#d2d2d7" stroke-dasharray="6 4"/>
  <text x="56" y="513" font-size="11.5" font-weight="600" fill="#1d1d1f">⑥ 外部湖仓 · 独立 tiering 作业写入（读 TabletServer）</text>
  <rect x="360" y="522" width="180" height="38" rx="10" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="450" y="546" font-size="12" font-weight="600" fill="#1d1d1f" text-anchor="middle">Paimon</text>
  <rect x="580" y="522" width="180" height="38" rx="10" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="670" y="546" font-size="12" font-weight="600" fill="#1d1d1f" text-anchor="middle">Iceberg</text>

  <!-- 连线 -->
  <!-- engines → coordinator -->
  <path d="M300,126 L300,152" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="308" y="144" font-size="9" fill="#a1a1a6">取元数据</text>
  <!-- engines → tabletserver -->
  <path d="M620,126 L620,248" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="628" y="200" font-size="9" fill="#a1a1a6">读写</text>
  <!-- coordinator ↔ zk (HA) -->
  <path d="M70,188 L24,188 L24,432 L70,432" stroke="#c7c7cc" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#ar)"/>
  <!-- tabletserver ↔ zk -->
  <path d="M280,372 L280,398" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)" marker-start="url(#ar)"/>
  <text x="290" y="390" font-size="9" fill="#a1a1a6">元数据 / 心跳</text>
  <!-- tabletserver → dfs -->
  <path d="M720,372 L720,398" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="730" y="390" font-size="9" fill="#a1a1a6">KV 快照 / 日志</text>
  <!-- tiering: 读 TS 写湖仓 -->
  <path d="M912,372 L912,492" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="905" y="484" font-size="9" fill="#a1a1a6" text-anchor="end">tiering 作业 · 读 TS 写湖仓</text>
</svg>
