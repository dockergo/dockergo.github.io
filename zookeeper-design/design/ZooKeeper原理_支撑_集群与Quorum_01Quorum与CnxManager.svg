<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">集群与 Quorum：QuorumPeer 状态机 + QuorumCnxManager 选举连接 + 过半判定</text>

  <!-- QuorumPeer 状态机 -->
  <rect x="30" y="52" width="470" height="200" rx="14" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="48" y="76" font-size="12" font-weight="600" fill="#1b2a4a">QuorumPeer 状态机（每节点一个主循环）</text>
  <rect x="180" y="92" width="160" height="40" rx="11" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/><text x="260" y="116" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">LOOKING（选举中）</text>
  <rect x="56" y="176" width="130" height="40" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="121" y="200" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">LEADING</text>
  <rect x="200" y="176" width="130" height="40" rx="11" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/><text x="265" y="200" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">FOLLOWING</text>
  <rect x="344" y="176" width="140" height="40" rx="11" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/><text x="414" y="200" font-size="10" font-weight="600" fill="#3c1361" text-anchor="middle">OBSERVING</text>
  <line x1="230" y1="132" x2="130" y2="176" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="260" y1="132" x2="265" y2="176" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="130" y1="216" x2="230" y2="132" stroke="#e6e6ea" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="300" y="238" font-size="8" fill="#86868b">失联过半 → 回 LOOKING 重选</text>
  <text x="48" y="238" font-size="8" fill="#5b7db1">ServerState 枚举 QuorumPeer.java:578</text>

  <!-- QuorumCnxManager -->
  <rect x="520" y="52" width="410" height="200" rx="14" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="538" y="76" font-size="12" font-weight="600" fill="#2c5a3a">QuorumCnxManager（选举专用通信 :99）</text>
  <rect x="540" y="92" width="170" height="60" rx="10" fill="#ffffff" stroke="#bce6cd"/><text x="625" y="114" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">SendWorker / RecvWorker</text><text x="625" y="132" font-size="8" fill="#3f8f66" text-anchor="middle">每对节点一条 TCP</text><text x="625" y="146" font-size="8" fill="#3f8f66" text-anchor="middle">收发投票消息</text>
  <rect x="730" y="92" width="180" height="60" rx="10" fill="#ffffff" stroke="#bce6cd"/><text x="820" y="114" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">去重连接（防双向）</text><text x="820" y="132" font-size="8" fill="#3f8f66" text-anchor="middle">仅高 id 主动连低 id</text><text x="820" y="146" font-size="8" fill="#3f8f66" text-anchor="middle">sid&gt;myId 则关入站(:510)</text>
  <text x="538" y="176" font-size="9" fill="#2f6f4f">· 选举端口（electionAddr）独立于客户端端口与数据端口。</text>
  <text x="538" y="194" font-size="9" fill="#2f6f4f">· recvQueue（:167）：收到的投票入队 → FastLeaderElection 消费。</text>
  <text x="538" y="212" font-size="9" fill="#2f6f4f">· initiateConnection(:371) / connectOne(:653)。</text>
  <text x="538" y="234" font-size="8" fill="#86868b">与数据通道（Leader↔Learner）分离，互不干扰。</text>

  <!-- QuorumVerifier -->
  <rect x="30" y="272" width="440" height="128" rx="14" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="48" y="296" font-size="12" font-weight="600" fill="#0f5132">QuorumVerifier：什么叫"过半"</text>
  <text x="48" y="318" font-size="9.5" fill="#2f6f4f">· 默认 majority：投票成员的严格多数</text>
  <text x="48" y="336" font-size="9.5" fill="#2f6f4f">· 选举/提交都问它 hasAllQuorums 是否达标</text>
  <text x="48" y="354" font-size="9.5" fill="#2f6f4f">· weight/hierarchical：可给不同节点/机房加权</text>
  <text x="48" y="374" font-size="9" fill="#86868b">N 节点容 ⌊(N-1)/2⌋：3→1、5→2、7→3</text>
  <text x="48" y="392" font-size="8.5" fill="#86868b">过半不可用 → 停写（CP：宁停不错）</text>

  <!-- reconfig -->
  <rect x="490" y="272" width="440" height="128" rx="14" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="508" y="296" font-size="12" font-weight="600" fill="#7a4d00">动态重配置 reconfig</text>
  <text x="508" y="318" font-size="9.5" fill="#9a7328">· 增删成员作为特殊事务经 ZAB 提交</text>
  <text x="508" y="336" font-size="9.5" fill="#9a7328">· QuorumVerifier 带版本：新旧配置都要过半</text>
  <text x="508" y="354" font-size="9.5" fill="#9a7328">· 变更期间旧+新 quorum 双确认，避免脑裂</text>
  <text x="508" y="374" font-size="9" fill="#86868b">Leader.tryToCommit 对 reconfig 特判(:970 内)</text>
  <text x="508" y="392" font-size="8.5" fill="#86868b">Observer 可动态提升为 participant</text>

  <!-- 底部 -->
  <rect x="30" y="416" width="900" height="102" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="440" font-size="11.5" font-weight="600" fill="#1d1d1f">三类通信通道（勿混）</text>
  <text x="48" y="462" font-size="9.5" fill="#494950">· 客户端端口（默认 2181）：client ↔ server 的请求/响应。</text>
  <text x="48" y="482" font-size="9.5" fill="#494950">· 选举端口（默认 3888）：QuorumCnxManager 交换投票（本图）。</text>
  <text x="48" y="502" font-size="9.5" fill="#494950">· 数据/quorum 端口（默认 2888）：Leader ↔ Learner 的 PROPOSAL/ACK/COMMIT 与同步。</text>
</svg>
