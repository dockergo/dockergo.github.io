<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">znode 层级命名空间 · 路径即树（每个节点既存数据又可有子节点）</text>

  <!-- 树 -->
  <rect x="410" y="56" width="140" height="40" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="480" y="81" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">/  (root)</text>

  <rect x="180" y="140" width="160" height="46" rx="10" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="260" y="160" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">/app/config</text>
  <text x="260" y="177" font-size="8" fill="#9a7328" text-anchor="middle">持久 persistent</text>

  <rect x="400" y="140" width="160" height="46" rx="10" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="480" y="160" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">/app/locks</text>
  <text x="480" y="177" font-size="8" fill="#3f8f66" text-anchor="middle">持久（容器父节点）</text>

  <rect x="620" y="140" width="160" height="46" rx="10" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="700" y="160" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">/app/workers</text>
  <text x="700" y="177" font-size="8" fill="#9a7328" text-anchor="middle">持久</text>

  <rect x="360" y="228" width="240" height="46" rx="10" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="480" y="248" font-size="10" font-weight="600" fill="#3c1361" text-anchor="middle">/app/locks/lock-0000000012</text>
  <text x="480" y="265" font-size="8" fill="#7a3fb0" text-anchor="middle">临时 + 顺序 ephemeral_sequential</text>

  <rect x="620" y="228" width="200" height="46" rx="10" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="720" y="248" font-size="10" font-weight="600" fill="#3c1361" text-anchor="middle">/app/workers/w-01</text>
  <text x="720" y="265" font-size="8" fill="#7a3fb0" text-anchor="middle">临时 ephemeral（绑 session）</text>

  <line x1="440" y1="96" x2="270" y2="140" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="480" y1="96" x2="480" y2="140" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="520" y1="96" x2="690" y2="140" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="480" y1="186" x2="480" y2="228" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="700" y1="186" x2="710" y2="228" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- DataNode 剖面 -->
  <rect x="30" y="304" width="410" height="196" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="328" font-size="12" font-weight="600" fill="#1d1d1f">一个 znode（DataNode）里有什么</text>
  <text x="48" y="352" font-size="9.5" fill="#494950">· data：字节数组（默认上限 1MB，jute.maxbuffer）</text>
  <text x="48" y="372" font-size="9.5" fill="#494950">· acl：ACL 列表的引用（多节点共享去重）</text>
  <text x="48" y="392" font-size="9.5" fill="#494950">· stat：czxid/mzxid/pzxid、ctime/mtime</text>
  <text x="48" y="412" font-size="9.5" fill="#494950">　　version（数据）/cversion（子）/aversion（ACL）</text>
  <text x="48" y="432" font-size="9.5" fill="#494950">　　ephemeralOwner（临时节点=sessionId，否则 0）</text>
  <text x="48" y="452" font-size="9.5" fill="#494950">· children：子节点名集合</text>
  <text x="48" y="480" font-size="8.5" fill="#86868b">核实：DataNode.java（data:50 / acl:55 / stat:60 / children:67）</text>

  <!-- 节点类型 -->
  <rect x="460" y="304" width="470" height="196" rx="14" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="478" y="328" font-size="12" font-weight="600" fill="#2c5a3a">五种节点类型</text>
  <text x="478" y="352" font-size="9.5" fill="#2f6f4f">· persistent：持久，显式 delete 才消失</text>
  <text x="478" y="372" font-size="9.5" fill="#2f6f4f">· ephemeral：临时，创建它的 session 结束即删（不能有子）</text>
  <text x="478" y="392" font-size="9.5" fill="#2f6f4f">· sequential：顺序，父节点分配单调递增 10 位后缀</text>
  <text x="478" y="412" font-size="9.5" fill="#2f6f4f">· container：容器，最后一个子被删后由后台回收（Curator 锁父节点）</text>
  <text x="478" y="432" font-size="9.5" fill="#2f6f4f">· TTL：带存活时间，超时无子且无更新则回收</text>
  <text x="478" y="464" font-size="9" fill="#86868b">临时+顺序组合 = 分布式锁/选主的经典配方：</text>
  <text x="478" y="482" font-size="9" fill="#86868b">各竞争者建 ephemeral_sequential，最小号者得锁，watch 前一个。</text>
</svg>
