<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
  </defs>
  <rect width="960" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">双维模型 · 能力域 × 执行时机（把 10 条主线归位）</text>

  <!-- 轴 -->
  <text x="30" y="72" font-size="11" font-weight="600" fill="#6e6e73">执行时机 ↓ ＼ 能力域 →</text>
  <line x1="30" y1="82" x2="930" y2="82" stroke="#d2d2d7" stroke-width="1"/>

  <!-- 能力域列标题 -->
  <text x="235" y="104" font-size="10.5" font-weight="600" fill="#3c1361" text-anchor="middle">接触面</text>
  <text x="430" y="104" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">共识底座</text>
  <text x="620" y="104" font-size="10.5" font-weight="600" fill="#7a4d00" text-anchor="middle">存储 / 数据</text>
  <text x="825" y="104" font-size="10.5" font-weight="600" fill="#0f5132" text-anchor="middle">协调 / 保障</text>

  <!-- 行标题 -->
  <text x="45" y="180" font-size="10.5" font-weight="600" fill="#494950">前台请求</text>
  <text x="45" y="196" font-size="9" fill="#86868b">（同步路径）</text>
  <text x="45" y="400" font-size="10.5" font-weight="600" fill="#494950">后台守护</text>
  <text x="45" y="416" font-size="9" fill="#86868b">（周期/异步）</text>
  <line x1="140" y1="118" x2="140" y2="540" stroke="#d2d2d7" stroke-width="1"/>
  <line x1="140" y1="330" x2="930" y2="330" stroke="#e6e6ea" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- 前台 · 接触面 -->
  <rect x="150" y="130" width="170" height="52" rx="10" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="235" y="152" font-size="10" font-weight="600" fill="#3c1361" text-anchor="middle">客户端 API 与 znode</text>
  <text x="235" y="169" font-size="8" fill="#7a3fb0" text-anchor="middle">create/get/set/exists/watch</text>

  <!-- 前台 · 请求处理链 -->
  <rect x="150" y="196" width="170" height="52" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="235" y="218" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">请求处理链</text>
  <text x="235" y="235" font-size="8" fill="#5b7db1" text-anchor="middle">Prep→Proposal→Commit→Final</text>

  <!-- 前台 · ZAB -->
  <rect x="345" y="130" width="170" height="52" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="430" y="152" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">ZAB 原子广播（灵魂）</text>
  <text x="430" y="169" font-size="8" fill="#5b7db1" text-anchor="middle">Proposal→Ack→Commit</text>

  <!-- 前台 · DataTree -->
  <rect x="535" y="130" width="170" height="52" rx="10" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="620" y="152" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">数据树 DataTree</text>
  <text x="620" y="169" font-size="8" fill="#9a7328" text-anchor="middle">内存 znode 树 · 读直查</text>

  <!-- 前台 · session -->
  <rect x="740" y="130" width="180" height="52" rx="10" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="830" y="152" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">会话与临时节点</text>
  <text x="830" y="169" font-size="8" fill="#3f8f66" text-anchor="middle">心跳 touchSession</text>

  <!-- 前台 · watch -->
  <rect x="740" y="196" width="180" height="52" rx="10" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="830" y="218" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">Watch 机制</text>
  <text x="830" y="235" font-size="8" fill="#3f8f66" text-anchor="middle">一次性触发通知</text>

  <!-- 前台 · ACL -->
  <rect x="345" y="196" width="170" height="52" rx="10" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="430" y="218" font-size="10" font-weight="600" fill="#3c1361" text-anchor="middle">ACL 权限</text>
  <text x="430" y="235" font-size="8" fill="#7a3fb0" text-anchor="middle">checkACL 前台校验</text>

  <!-- 后台 · ZAB 选举 -->
  <rect x="345" y="350" width="170" height="52" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="430" y="372" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">Leader 选举 / 恢复</text>
  <text x="430" y="389" font-size="8" fill="#5b7db1" text-anchor="middle">FLE + 同步 DIFF/SNAP</text>

  <!-- 后台 · 集群 -->
  <rect x="345" y="416" width="170" height="52" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="430" y="438" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">集群与 Quorum</text>
  <text x="430" y="455" font-size="8" fill="#5b7db1" text-anchor="middle">CnxManager 心跳 PING</text>

  <!-- 后台 · 快照 -->
  <rect x="535" y="350" width="170" height="52" rx="10" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="620" y="372" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">事务日志与快照</text>
  <text x="620" y="389" font-size="8" fill="#9a7328" text-anchor="middle">Sync 落盘 · 周期快照</text>

  <!-- 后台 · session 过期 -->
  <rect x="740" y="350" width="180" height="52" rx="10" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="830" y="372" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">会话过期扫描</text>
  <text x="830" y="389" font-size="8" fill="#3f8f66" text-anchor="middle">ExpiryQueue 分桶</text>

  <text x="150" y="512" font-size="9.5" fill="#86868b">横轴＝能力域（这个操作背后靠什么公共能力）；纵轴＝执行时机（同步在请求路径上，还是后台周期跑）。</text>
  <text x="150" y="530" font-size="9.5" fill="#86868b">同一条主线可跨两行：ZAB 前台广播 + 后台选举恢复；会话前台心跳 + 后台过期。</text>
</svg>
