<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">会话分桶过期（ExpiryQueue）+ 临时节点回收</text>

  <!-- 分桶 -->
  <rect x="30" y="52" width="600" height="240" rx="14" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="48" y="76" font-size="12" font-weight="600" fill="#2c5a3a">分桶：把过期时间对齐到 expirationInterval 的整数倍</text>
  <text x="48" y="96" font-size="9" fill="#2f6f4f">roundToNextInterval(t) = (t / interval + 1) * interval　（ExpiryQueue.java:53）</text>

  <!-- 桶 -->
  <rect x="52" y="112" width="120" height="150" rx="10" fill="#ffffff" stroke="#bce6cd"/>
  <text x="112" y="132" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">桶 T0</text>
  <rect x="64" y="142" width="96" height="20" rx="5" fill="#eafaf1" stroke="#bce6cd"/><text x="112" y="156" font-size="8" fill="#0f5132" text-anchor="middle">session 0x1a</text>
  <rect x="64" y="166" width="96" height="20" rx="5" fill="#eafaf1" stroke="#bce6cd"/><text x="112" y="180" font-size="8" fill="#0f5132" text-anchor="middle">session 0x2b</text>
  <text x="112" y="212" font-size="8" fill="#86868b" text-anchor="middle">到点整桶</text>
  <text x="112" y="226" font-size="8" fill="#86868b" text-anchor="middle">一起检查</text>

  <rect x="192" y="112" width="120" height="150" rx="10" fill="#ffffff" stroke="#bce6cd"/>
  <text x="252" y="132" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">桶 T1</text>
  <rect x="204" y="142" width="96" height="20" rx="5" fill="#eafaf1" stroke="#bce6cd"/><text x="252" y="156" font-size="8" fill="#0f5132" text-anchor="middle">session 0x3c</text>

  <rect x="332" y="112" width="120" height="150" rx="10" fill="#ffffff" stroke="#bce6cd"/>
  <text x="392" y="132" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">桶 T2</text>
  <rect x="344" y="142" width="96" height="20" rx="5" fill="#eafaf1" stroke="#bce6cd"/><text x="392" y="156" font-size="8" fill="#0f5132" text-anchor="middle">session 0x4d</text>
  <rect x="344" y="166" width="96" height="20" rx="5" fill="#eafaf1" stroke="#bce6cd"/><text x="392" y="180" font-size="8" fill="#0f5132" text-anchor="middle">session 0x5e</text>

  <rect x="472" y="112" width="140" height="150" rx="10" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="542" y="132" font-size="9.5" font-weight="600" fill="#7a4d00" text-anchor="middle">touchSession</text>
  <text x="542" y="154" font-size="8" fill="#9a7328" text-anchor="middle">心跳/请求到达 →</text>
  <text x="542" y="170" font-size="8" fill="#9a7328" text-anchor="middle">按新超时算新桶</text>
  <text x="542" y="186" font-size="8" fill="#9a7328" text-anchor="middle">移到后面的桶</text>
  <text x="542" y="208" font-size="8" fill="#9a7328" text-anchor="middle">（:179 update）</text>

  <line x1="160" y1="200" x2="480" y2="150" stroke="#f0dcae" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- 过期动作 -->
  <rect x="650" y="52" width="280" height="240" rx="14" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="668" y="76" font-size="12" font-weight="600" fill="#1b2a4a">过期线程</text>
  <text x="668" y="98" font-size="9" fill="#5b7db1">SessionTrackerImpl 是一个线程</text>
  <text x="668" y="114" font-size="9" fill="#5b7db1">（:45），循环：</text>
  <rect x="668" y="126" width="244" height="26" rx="6" fill="#ffffff" stroke="#bcd0ec"/><text x="790" y="143" font-size="8.5" fill="#1b2a4a" text-anchor="middle">① 等到下一个桶到点</text>
  <rect x="668" y="158" width="244" height="26" rx="6" fill="#ffffff" stroke="#bcd0ec"/><text x="790" y="175" font-size="8.5" fill="#1b2a4a" text-anchor="middle">② 取出该桶所有未 touch 的 session</text>
  <rect x="668" y="190" width="244" height="26" rx="6" fill="#ffffff" stroke="#bcd0ec"/><text x="790" y="207" font-size="8.5" fill="#1b2a4a" text-anchor="middle">③ 发起 closeSession 事务（经 ZAB）</text>
  <text x="668" y="240" font-size="8.5" fill="#5b7db1">批量处理整桶 → O(桶数) 而非</text>
  <text x="668" y="256" font-size="8.5" fill="#5b7db1">O(会话数)，海量会话也高效。</text>
  <text x="668" y="278" font-size="8" fill="#86868b">Leader 统一管过期（LeaderSessionTracker）</text>

  <!-- 底部：临时节点回收 -->
  <rect x="30" y="306" width="900" height="180" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="330" font-size="11.5" font-weight="600" fill="#1d1d1f">会话过期 → 临时节点回收（一条因果链）</text>
  <rect x="60" y="344" width="180" height="40" rx="8" fill="#fbeaea" stroke="#e7c3c3"/><text x="150" y="362" font-size="9" font-weight="600" fill="#7a2a2a" text-anchor="middle">session 过期</text><text x="150" y="376" font-size="7.5" fill="#7a2a2a" text-anchor="middle">超 timeout 无心跳</text>
  <rect x="290" y="344" width="200" height="40" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="390" y="362" font-size="9" font-weight="600" fill="#1b2a4a" text-anchor="middle">closeSession 走 ZAB</text><text x="390" y="376" font-size="7.5" fill="#5b7db1" text-anchor="middle">全序广播（各节点一致回收）</text>
  <rect x="540" y="344" width="200" height="40" rx="8" fill="#fff7e6" stroke="#f0dcae"/><text x="640" y="362" font-size="9" font-weight="600" fill="#7a4d00" text-anchor="middle">按 ephemerals[sid] 删节点</text><text x="640" y="376" font-size="7.5" fill="#9a7328" text-anchor="middle">DataTree 索引批量删</text>
  <rect x="790" y="344" width="120" height="40" rx="8" fill="#eafaf1" stroke="#bce6cd"/><text x="850" y="362" font-size="9" font-weight="600" fill="#0f5132" text-anchor="middle">触发 watch</text><text x="850" y="376" font-size="7.5" fill="#3f8f66" text-anchor="middle">NodeDeleted</text>
  <line x1="240" y1="364" x2="290" y2="364" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="490" y1="364" x2="540" y2="364" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="740" y1="364" x2="790" y2="364" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="48" y="416" font-size="9.5" fill="#494950">· ephemeralOwner = sessionId：临时节点"属于"某个会话；会话在，节点在；会话亡，节点删。这是"故障检测/成员感知"的机制根。</text>
  <text x="48" y="436" font-size="9.5" fill="#494950">· 过期由 Leader 统一裁决（经 ZAB），避免不同节点各自判过期导致临时节点在副本间不一致。</text>
  <text x="48" y="456" font-size="9" fill="#86868b">核实：SessionTrackerImpl.java（class:45 / touchSession:179 / createSession:261 / sessionsWithTimeout:53）、ExpiryQueue.java（interval:46 / roundToNextInterval:53 / update:84）。</text>
  <text x="48" y="474" font-size="9" fill="#86868b">对比 etcd：etcd 用显式 lease TTL + keepalive、key 绑 lease；ZK 用连接生命周期，临时节点绑 session，无显式 lease 对象。</text>
</svg>
