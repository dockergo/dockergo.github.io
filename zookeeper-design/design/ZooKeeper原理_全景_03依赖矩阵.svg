<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
  </defs>
  <rect width="960" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">接触面 × 能力域 依赖矩阵（● 强依赖　◐ 部分依赖　○ 弱/无）</text>

  <!-- 列头（能力域）-->
  <text x="300" y="70" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">ZAB</text>
  <text x="300" y="82" font-size="8" fill="#5b7db1" text-anchor="middle">共识</text>
  <text x="390" y="70" font-size="9.5" font-weight="600" fill="#7a4d00" text-anchor="middle">DataTree</text>
  <text x="390" y="82" font-size="8" fill="#9a7328" text-anchor="middle">存储</text>
  <text x="480" y="70" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">会话</text>
  <text x="570" y="70" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">Watch</text>
  <text x="660" y="70" font-size="9.5" font-weight="600" fill="#7a4d00" text-anchor="middle">日志/快照</text>
  <text x="750" y="70" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">处理链</text>
  <text x="840" y="70" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">集群</text>
  <text x="900" y="70" font-size="9.5" font-weight="600" fill="#3c1361" text-anchor="middle">ACL</text>

  <line x1="255" y1="90" x2="930" y2="90" stroke="#d2d2d7"/>
  <line x1="255" y1="90" x2="255" y2="470" stroke="#d2d2d7"/>

  <!-- 行：接触面/写操作 -->
  <g font-size="12" text-anchor="middle">
    <!-- 行1 create/setData/delete（写）-->
    <rect x="30" y="104" width="220" height="42" rx="9" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
    <text x="140" y="122" font-size="10" font-weight="600" fill="#3c1361">create/setData/delete（写）</text>
    <text x="140" y="138" font-size="8" fill="#7a3fb0">改数据 → 必经 ZAB</text>
    <text x="300" y="130" fill="#1d8f3f">●</text><text x="390" y="130" fill="#1d8f3f">●</text><text x="480" y="130" fill="#b25e00">◐</text>
    <text x="570" y="130" fill="#b25e00">◐</text><text x="660" y="130" fill="#1d8f3f">●</text><text x="750" y="130" fill="#1d8f3f">●</text><text x="840" y="130" fill="#b25e00">◐</text><text x="900" y="130" fill="#1d8f3f">●</text>

    <!-- 行2 getData/getChildren/exists（读）-->
    <rect x="30" y="156" width="220" height="42" rx="9" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
    <text x="140" y="174" font-size="10" font-weight="600" fill="#3c1361">get/getChildren/exists（读）</text>
    <text x="140" y="190" font-size="8" fill="#7a3fb0">读本地内存树</text>
    <text x="300" y="182" fill="#a1a1a6">○</text><text x="390" y="182" fill="#1d8f3f">●</text><text x="480" y="182" fill="#a1a1a6">○</text>
    <text x="570" y="182" fill="#b25e00">◐</text><text x="660" y="182" fill="#a1a1a6">○</text><text x="750" y="182" fill="#b25e00">◐</text><text x="840" y="182" fill="#a1a1a6">○</text><text x="900" y="182" fill="#1d8f3f">●</text>

    <!-- 行3 watch -->
    <rect x="30" y="208" width="220" height="42" rx="9" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
    <text x="140" y="226" font-size="10" font-weight="600" fill="#3c1361">watch 注册/通知</text>
    <text x="140" y="242" font-size="8" fill="#7a3fb0">读时挂 watcher</text>
    <text x="300" y="234" fill="#a1a1a6">○</text><text x="390" y="234" fill="#1d8f3f">●</text><text x="480" y="234" fill="#a1a1a6">○</text>
    <text x="570" y="234" fill="#1d8f3f">●</text><text x="660" y="234" fill="#a1a1a6">○</text><text x="750" y="234" fill="#b25e00">◐</text><text x="840" y="234" fill="#a1a1a6">○</text><text x="900" y="234" fill="#a1a1a6">○</text>

    <!-- 行4 session/create ephemeral -->
    <rect x="30" y="260" width="220" height="42" rx="9" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
    <text x="140" y="278" font-size="10" font-weight="600" fill="#3c1361">session / 临时节点</text>
    <text x="140" y="294" font-size="8" fill="#7a3fb0">连接生命周期</text>
    <text x="300" y="286" fill="#b25e00">◐</text><text x="390" y="286" fill="#1d8f3f">●</text><text x="480" y="286" fill="#1d8f3f">●</text>
    <text x="570" y="286" fill="#b25e00">◐</text><text x="660" y="286" fill="#b25e00">◐</text><text x="750" y="286" fill="#a1a1a6">○</text><text x="840" y="286" fill="#b25e00">◐</text><text x="900" y="286" fill="#a1a1a6">○</text>

    <!-- 行5 reconfig -->
    <rect x="30" y="312" width="220" height="42" rx="9" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
    <text x="140" y="330" font-size="10" font-weight="600" fill="#3c1361">reconfig 成员变更</text>
    <text x="140" y="346" font-size="8" fill="#7a3fb0">增删节点</text>
    <text x="300" y="338" fill="#1d8f3f">●</text><text x="390" y="338" fill="#b25e00">◐</text><text x="480" y="338" fill="#a1a1a6">○</text>
    <text x="570" y="338" fill="#a1a1a6">○</text><text x="660" y="338" fill="#1d8f3f">●</text><text x="750" y="338" fill="#b25e00">◐</text><text x="840" y="338" fill="#1d8f3f">●</text><text x="900" y="338" fill="#b25e00">◐</text>

    <!-- 行6 崩溃恢复 -->
    <rect x="30" y="364" width="220" height="42" rx="9" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
    <text x="140" y="382" font-size="10" font-weight="600" fill="#3c1361">重启 / 崩溃恢复</text>
    <text x="140" y="398" font-size="8" fill="#7a3fb0">加载快照+回放日志</text>
    <text x="300" y="390" fill="#1d8f3f">●</text><text x="390" y="390" fill="#1d8f3f">●</text><text x="480" y="390" fill="#b25e00">◐</text>
    <text x="570" y="390" fill="#a1a1a6">○</text><text x="660" y="390" fill="#1d8f3f">●</text><text x="750" y="390" fill="#a1a1a6">○</text><text x="840" y="390" fill="#b25e00">◐</text><text x="900" y="390" fill="#a1a1a6">○</text>
  </g>

  <text x="30" y="440" font-size="10" fill="#494950">读列可见：ZK 读不经 ZAB（○），直查 DataTree（●）——这是"读多写少、读吞吐随节点扩展"的根源。</text>
  <text x="30" y="458" font-size="10" fill="#494950">写行处处 ●：改数据必过 ZAB → 落 TxnLog → apply DataTree，任何写都是全序、强一致。</text>
  <text x="30" y="490" font-size="9.5" fill="#86868b">三角一致性：本矩阵与各主线"定位"里声称的依赖必须相互印证；改一处需回查另两处。</text>
</svg>
