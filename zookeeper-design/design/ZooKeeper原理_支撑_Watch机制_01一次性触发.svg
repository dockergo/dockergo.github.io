<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">WatchManager：path → watchers 双向映射 · 一次性触发即移除</text>

  <!-- 双向映射 -->
  <rect x="30" y="52" width="440" height="230" rx="14" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="48" y="76" font-size="12" font-weight="600" fill="#2c5a3a">服务端保存的映射（WatchManager.java:46）</text>
  <rect x="52" y="92" width="196" height="170" rx="10" fill="#ffffff" stroke="#bce6cd"/>
  <text x="150" y="112" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">watchTable</text>
  <text x="150" y="128" font-size="8" fill="#3f8f66" text-anchor="middle">path → 该路径的 watcher 集</text>
  <rect x="64" y="138" width="172" height="22" rx="5" fill="#eafaf1" stroke="#bce6cd"/><text x="150" y="153" font-size="8" fill="#0f5132" text-anchor="middle">/a → {cnxnA, cnxnB}</text>
  <rect x="64" y="164" width="172" height="22" rx="5" fill="#eafaf1" stroke="#bce6cd"/><text x="150" y="179" font-size="8" fill="#0f5132" text-anchor="middle">/b → {cnxnC}</text>
  <text x="150" y="212" font-size="8" fill="#86868b" text-anchor="middle">触发时按 path 找 watchers</text>

  <rect x="264" y="92" width="196" height="170" rx="10" fill="#ffffff" stroke="#bce6cd"/>
  <text x="362" y="112" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">watch2Paths</text>
  <text x="362" y="128" font-size="8" fill="#3f8f66" text-anchor="middle">watcher → 它监听的 path 集</text>
  <rect x="276" y="138" width="172" height="22" rx="5" fill="#eafaf1" stroke="#bce6cd"/><text x="362" y="153" font-size="8" fill="#0f5132" text-anchor="middle">cnxnA → {/a}</text>
  <rect x="276" y="164" width="172" height="22" rx="5" fill="#eafaf1" stroke="#bce6cd"/><text x="362" y="179" font-size="8" fill="#0f5132" text-anchor="middle">cnxnC → {/b}</text>
  <text x="362" y="212" font-size="8" fill="#86868b" text-anchor="middle">连接断开时按此清理</text>

  <!-- 触发流程 -->
  <rect x="490" y="52" width="440" height="230" rx="14" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="508" y="76" font-size="12" font-weight="600" fill="#1b2a4a">triggerWatch（:135/:140）</text>
  <rect x="510" y="90" width="400" height="30" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="710" y="109" font-size="8.5" fill="#1b2a4a" text-anchor="middle">① 写 apply 到 DataTree 后调 triggerWatch(path, type)</text>
  <rect x="510" y="126" width="400" height="30" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="710" y="145" font-size="8.5" fill="#1b2a4a" text-anchor="middle">② watchTable.remove(path) 取出并移除 watchers</text>
  <rect x="510" y="162" width="400" height="30" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="710" y="181" font-size="8.5" fill="#1b2a4a" text-anchor="middle">③ 给每个 watcher 的连接推 1 个 WatchedEvent</text>
  <rect x="510" y="198" width="400" height="30" rx="7" fill="#fbeaea" stroke="#e7c3c3"/><text x="710" y="217" font-size="8.5" fill="#7a2a2a" text-anchor="middle">④ 标准 watch 用完即弃：想继续 → 客户端重新注册</text>
  <text x="508" y="252" font-size="8.5" fill="#5b7db1">事件类型：NodeCreated / NodeDeleted / NodeDataChanged / NodeChildrenChanged</text>
  <text x="508" y="270" font-size="8.5" fill="#5b7db1">事件只带 path + type，不带新数据 → 客户端收到后自行重读</text>

  <!-- 三种模式 -->
  <rect x="30" y="300" width="900" height="90" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="324" font-size="11.5" font-weight="600" fill="#1d1d1f">三种 watch 模式（WatcherMode）</text>
  <rect x="48" y="336" width="280" height="44" rx="9" fill="#fbeaea" stroke="#e7c3c3"/><text x="188" y="356" font-size="9.5" font-weight="600" fill="#7a2a2a" text-anchor="middle">STANDARD（默认）</text><text x="188" y="372" font-size="8" fill="#7a2a2a" text-anchor="middle">一次性，触发即移除</text>
  <rect x="340" y="336" width="280" height="44" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="480" y="356" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">PERSISTENT</text><text x="480" y="372" font-size="8" fill="#3f8f66" text-anchor="middle">持久，触发后仍有效（3.6+）</text>
  <rect x="632" y="336" width="278" height="44" rx="9" fill="#f4eefb" stroke="#d9c9ef"/><text x="771" y="356" font-size="9.5" font-weight="600" fill="#3c1361" text-anchor="middle">PERSISTENT_RECURSIVE</text><text x="771" y="372" font-size="8" fill="#7a3fb0" text-anchor="middle">持久 + 递归监整棵子树</text>

  <text x="30" y="422" font-size="9.5" fill="#494950">· WatchManagerOptimized（:57）：用 bitset 表示 watcher 集，海量 watch 时省内存；WatcherCleaner 后台清理死连接。</text>
  <text x="30" y="442" font-size="9.5" fill="#494950">· 有序性：watch 事件与数据变更同源于同一 zxid 序 → 客户端先收 watch 再看到后续读结果，视图一致。</text>
  <text x="30" y="464" font-size="9" fill="#86868b">核实：watch/{WatchManager:46, WatchManagerOptimized:57, WatcherMode}.java；IWatchManager.triggerWatch:123；DataTree.getData 挂 watch:700。</text>
  <text x="30" y="482" font-size="9" fill="#86868b">对比 etcd：etcd watch 按 revision 持续流、可从历史补发、服务端维护订阅；ZK 标准 watch 一次性、事件不带数据、重连需重挂。</text>
</svg>
