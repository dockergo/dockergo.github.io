<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">ACL：每 znode 独立权限 · scheme:id:perm · 不继承</text>

  <!-- ACL 结构 -->
  <rect x="30" y="52" width="440" height="180" rx="14" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="48" y="76" font-size="12" font-weight="600" fill="#3c1361">一条 ACL = scheme : id : perms</text>
  <rect x="48" y="90" width="130" height="50" rx="9" fill="#ffffff" stroke="#d9c9ef"/><text x="113" y="110" font-size="9.5" font-weight="600" fill="#3c1361" text-anchor="middle">scheme</text><text x="113" y="126" font-size="8" fill="#7a3fb0" text-anchor="middle">认证方式</text>
  <rect x="190" y="90" width="130" height="50" rx="9" fill="#ffffff" stroke="#d9c9ef"/><text x="255" y="110" font-size="9.5" font-weight="600" fill="#3c1361" text-anchor="middle">id</text><text x="255" y="126" font-size="8" fill="#7a3fb0" text-anchor="middle">主体标识</text>
  <rect x="332" y="90" width="120" height="50" rx="9" fill="#ffffff" stroke="#d9c9ef"/><text x="392" y="110" font-size="9.5" font-weight="600" fill="#3c1361" text-anchor="middle">perms</text><text x="392" y="126" font-size="8" fill="#7a3fb0" text-anchor="middle">权限位</text>
  <text x="48" y="164" font-size="9" fill="#7a3fb0">例：digest:user:base64(sha1) : cdrwa</text>
  <text x="48" y="182" font-size="9" fill="#7a3fb0">例：ip:10.0.0.0/16 : r</text>
  <text x="48" y="200" font-size="9" fill="#7a3fb0">例：world:anyone : r（人人可读）</text>
  <text x="48" y="220" font-size="8" fill="#86868b">存于 DataNode.acl（去重引用），非继承</text>

  <!-- 权限位 -->
  <rect x="490" y="52" width="440" height="180" rx="14" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="508" y="76" font-size="12" font-weight="600" fill="#1b2a4a">5 个权限位（ZooDefs.Perms）</text>
  <text x="508" y="100" font-size="9.5" fill="#5b7db1">· CREATE (c) = 1&lt;&lt;2　创建子节点（:113）</text>
  <text x="508" y="120" font-size="9.5" fill="#5b7db1">· READ   (r) = 1&lt;&lt;0　读数据/子列表（:109）</text>
  <text x="508" y="140" font-size="9.5" fill="#5b7db1">· WRITE  (w) = 1&lt;&lt;1　setData（:111）</text>
  <text x="508" y="160" font-size="9.5" fill="#5b7db1">· DELETE (d) = 1&lt;&lt;3　删子节点（:115）</text>
  <text x="508" y="180" font-size="9.5" fill="#5b7db1">· ADMIN  (a) = 1&lt;&lt;4　改该节点 ACL（:117）</text>
  <text x="508" y="204" font-size="9" fill="#86868b">ALL = r|w|c|d|a（:119）· 权限按位组合</text>
  <text x="508" y="222" font-size="8" fill="#86868b">DELETE 检查的是"父节点"权限（删子）</text>

  <!-- checkACL 流程 -->
  <rect x="30" y="252" width="900" height="130" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="276" font-size="12" font-weight="600" fill="#1d1d1f">checkACL：每次操作前校验（ZooKeeperServer.java:2065）</text>
  <rect x="60" y="290" width="180" height="44" rx="9" fill="#f4eefb" stroke="#d9c9ef"/><text x="150" y="310" font-size="9" font-weight="600" fill="#3c1361" text-anchor="middle">① 取节点 ACL 列表</text><text x="150" y="326" font-size="7.5" fill="#7a3fb0" text-anchor="middle">DataNode.acl</text>
  <rect x="290" y="290" width="180" height="44" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="380" y="310" font-size="9" font-weight="600" fill="#1b2a4a" text-anchor="middle">② 匹配操作所需 perm</text><text x="380" y="326" font-size="7.5" fill="#5b7db1" text-anchor="middle">create→CREATE(:664)</text>
  <rect x="520" y="290" width="180" height="44" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="610" y="310" font-size="9" font-weight="600" fill="#0f5132" text-anchor="middle">③ 用 authInfo 逐条比对</text><text x="610" y="326" font-size="7.5" fill="#3f8f66" text-anchor="middle">Provider.matches</text>
  <rect x="750" y="290" width="160" height="44" rx="9" fill="#fbeaea" stroke="#e7c3c3"/><text x="830" y="310" font-size="9" font-weight="600" fill="#7a2a2a" text-anchor="middle">④ 无匹配 → NoAuth</text><text x="830" y="326" font-size="7.5" fill="#7a2a2a" text-anchor="middle">拒绝该操作</text>
  <line x1="240" y1="312" x2="290" y2="312" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="470" y1="312" x2="520" y2="312" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="700" y1="312" x2="750" y2="312" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="48" y="368" font-size="9" fill="#86868b">authInfo 来自 addAuthInfo 提交的凭据（如 digest 的用户名密码、sasl 的 kerberos 主体）。</text>

  <!-- schemes -->
  <rect x="30" y="398" width="900" height="86" rx="14" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="48" y="422" font-size="11.5" font-weight="600" fill="#2c5a3a">内置 scheme（AuthenticationProvider 插件 · ProviderRegistry）</text>
  <text x="48" y="444" font-size="9.5" fill="#2f6f4f">· world：唯一 id anyone，人人适用　· auth：当前已认证的任意用户　· digest：用户名:密码(SHA1) 认证</text>
  <text x="48" y="464" font-size="9.5" fill="#2f6f4f">· ip：按来源 IP/网段　· x509：TLS 客户端证书 DN　· sasl：Kerberos/SASL 主体（企业集成）</text>
  <text x="48" y="480" font-size="8.5" fill="#86868b">DigestAuthenticationProvider / IPAuthenticationProvider / X509AuthenticationProvider / SASLAuthenticationProvider（auth/*.java）</text>
</svg>
