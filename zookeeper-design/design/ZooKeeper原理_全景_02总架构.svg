<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="680" viewBox="0 0 1020 680"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="680" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Apache ZooKeeper 总架构 · 客户端 → 请求处理链 → ZAB 原子广播 ↔ 内存数据树 → 事务日志/快照</text>

  <rect x="30" y="46" width="960" height="40" rx="11" fill="#f6f6f8" stroke="#e2e2e7" data-tid="ZooKeeper原理_全景主线框架" data-lab="全景主线框架"/>
  <text x="46" y="63" font-size="10.5" font-weight="600" fill="#1d1d1f">powers</text>
  <text x="104" y="63" font-size="10" fill="#494950">Kafka(旧) · HBase · Hadoop · Flink · Solr · Curator —— 分布式系统的元数据协调 / 选主 / 配置 / 服务发现 / 分布式锁底座</text>
  <text x="46" y="80" font-size="9" fill="#86868b">ZK 存"关于系统的关键真相"：小数据、层级 znode 树、强一致（读多写少），要正确而非吞吐</text>

  <!-- ① 客户端接触面 -->
  <rect x="30" y="98" width="960" height="62" rx="14" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)" data-tid="ZooKeeper原理_接口_客户端API与znode" data-lab="客户端 API 与 znode"/>
  <text x="48" y="120" font-size="12" font-weight="600" fill="#3c1361">① 客户端接触面（ZooKeeper API + znode 路径 + session）</text>
  <rect x="48" y="130" width="300" height="24" rx="7" fill="#ffffff" stroke="#d9c9ef"/><text x="198" y="146" font-size="8.5" fill="#3c1361" text-anchor="middle">create / setData / delete（写，走 ZAB）</text>
  <rect x="360" y="130" width="300" height="24" rx="7" fill="#ffffff" stroke="#d9c9ef"/><text x="510" y="146" font-size="8.5" fill="#3c1361" text-anchor="middle">getData / getChildren / exists（读，走本地）</text>
  <rect x="672" y="130" width="300" height="24" rx="7" fill="#ffffff" stroke="#d9c9ef"/><text x="822" y="146" font-size="8.5" fill="#3c1361" text-anchor="middle">watch 一次性通知 · session 心跳</text>

  <!-- ② 请求处理链 -->
  <rect x="30" y="172" width="960" height="74" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)" data-tid="ZooKeeper原理_支撑_请求处理链" data-lab="请求处理链"/>
  <text x="48" y="192" font-size="11.5" font-weight="600" fill="#1b2a4a">② 请求处理链（RequestProcessor pipeline · 流水线式责任链）</text>
  <rect x="48" y="202" width="168" height="36" rx="8" fill="#ffffff" stroke="#bcd0ec"/><text x="132" y="218" font-size="8.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Prep</text><text x="132" y="231" font-size="7.5" fill="#5b7db1" text-anchor="middle">校验 + ACL + 生成 Txn</text>
  <rect x="228" y="202" width="168" height="36" rx="8" fill="#ffffff" stroke="#bcd0ec"/><text x="312" y="218" font-size="8.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Proposal</text><text x="312" y="231" font-size="7.5" fill="#5b7db1" text-anchor="middle">写才 propose 给 ZAB</text>
  <rect x="408" y="202" width="168" height="36" rx="8" fill="#ffffff" stroke="#bcd0ec"/><text x="492" y="218" font-size="8.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Sync</text><text x="492" y="231" font-size="7.5" fill="#5b7db1" text-anchor="middle">落 TxnLog + 触发快照</text>
  <rect x="588" y="202" width="168" height="36" rx="8" fill="#ffffff" stroke="#bcd0ec"/><text x="672" y="218" font-size="8.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Commit</text><text x="672" y="231" font-size="7.5" fill="#5b7db1" text-anchor="middle">保证提交顺序</text>
  <rect x="768" y="202" width="204" height="36" rx="8" fill="#ffffff" stroke="#bcd0ec"/><text x="870" y="218" font-size="8.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Final</text><text x="870" y="231" font-size="7.5" fill="#5b7db1" text-anchor="middle">apply 到 DataTree + 触发 watch</text>

  <!-- ③ ZAB (左) -->
  <rect x="30" y="258" width="478" height="108" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)" data-tid="ZooKeeper原理_支撑_ZAB原子广播" data-lab="ZAB 原子广播"/>
  <text x="48" y="280" font-size="12" font-weight="600" fill="#1b2a4a">③ ZAB 原子广播（灵魂 · Leader/Follower）</text>
  <rect x="48" y="290" width="220" height="30" rx="8" fill="#ffffff" stroke="#bcd0ec"/><text x="158" y="304" font-size="8.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">FastLeaderElection</text><text x="158" y="316" font-size="7.5" fill="#5b7db1" text-anchor="middle">选举：比 (epoch,zxid,id)</text>
  <rect x="278" y="290" width="212" height="30" rx="8" fill="#ffffff" stroke="#bcd0ec"/><text x="384" y="304" font-size="8.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Proposal → Ack → Commit</text><text x="384" y="316" font-size="7.5" fill="#5b7db1" text-anchor="middle">广播：过半即提交</text>
  <text x="48" y="340" font-size="8.5" fill="#5b7db1">Leader.propose / tryToCommit · Follower.processPacket · LearnerHandler 每 follower 一线程</text>
  <text x="48" y="356" font-size="8.5" fill="#5b7db1">zxid = epoch(高32) | counter(低32)：全局单调有序，是一切顺序的锚</text>

  <!-- ④ DataTree (右) -->
  <rect x="512" y="258" width="478" height="108" rx="14" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)" data-tid="ZooKeeper原理_支撑_数据树DataTree" data-lab="数据树 DataTree"/>
  <text x="530" y="280" font-size="12" font-weight="600" fill="#7a4d00">④ 内存数据树（DataTree / ZKDatabase）</text>
  <rect x="530" y="290" width="212" height="30" rx="8" fill="#ffffff" stroke="#f0dcae"/><text x="636" y="304" font-size="8.5" font-weight="600" fill="#7a4d00" text-anchor="middle">nodes：path → DataNode</text><text x="636" y="316" font-size="7.5" fill="#9a7328" text-anchor="middle">层级 znode 树（全量在内存）</text>
  <rect x="752" y="290" width="220" height="30" rx="8" fill="#ffffff" stroke="#f0dcae"/><text x="862" y="304" font-size="8.5" font-weight="600" fill="#7a4d00" text-anchor="middle">ephemerals / containers / ttls</text><text x="862" y="316" font-size="7.5" fill="#9a7328" text-anchor="middle">按 sessionId 索引临时节点</text>
  <text x="530" y="340" font-size="8.5" fill="#9a7328">DataNode = data + acl(引用) + stat(czxid/mzxid/version…) + children</text>
  <text x="530" y="356" font-size="8.5" fill="#9a7328">读直接查内存树；写经 processTxn 幂等应用（zxid 定序）</text>

  <!-- ⑤ session / watch / acl -->
  <rect x="30" y="380" width="300" height="74" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)" data-tid="ZooKeeper原理_支撑_会话与临时节点" data-lab="会话与临时节点"/>
  <text x="48" y="402" font-size="11.5" font-weight="600" fill="#0f5132">⑤ 会话与临时节点</text>
  <text x="48" y="422" font-size="8.5" fill="#3f8f66">SessionTracker + ExpiryQueue</text>
  <text x="48" y="438" font-size="8.5" fill="#3f8f66">分桶过期；ephemeralOwner=sessionId</text>

  <rect x="346" y="380" width="300" height="74" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)" data-tid="ZooKeeper原理_支撑_Watch机制" data-lab="Watch 机制"/>
  <text x="364" y="402" font-size="11.5" font-weight="600" fill="#0f5132">⑥ Watch 机制</text>
  <text x="364" y="422" font-size="8.5" fill="#3f8f66">WatchManager：path → watchers</text>
  <text x="364" y="438" font-size="8.5" fill="#3f8f66">一次性触发 + 持久/递归 watch</text>

  <rect x="662" y="380" width="328" height="74" rx="14" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)" data-tid="ZooKeeper原理_支撑_ACL权限" data-lab="ACL 权限"/>
  <text x="680" y="402" font-size="11.5" font-weight="600" fill="#3c1361">⑦ ACL 权限</text>
  <text x="680" y="422" font-size="8.5" fill="#7a3fb0">scheme:id:perm（world/auth/digest/ip/x509/sasl）</text>
  <text x="680" y="438" font-size="8.5" fill="#7a3fb0">每 znode 独立 ACL；不继承；checkACL</text>

  <!-- ⑥ persistence / quorum -->
  <rect x="30" y="468" width="620" height="82" rx="14" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)" data-tid="ZooKeeper原理_支撑_事务日志与快照" data-lab="事务日志与快照"/>
  <text x="48" y="490" font-size="11.5" font-weight="600" fill="#7a4d00">⑧ 事务日志与快照（持久化 · 崩溃恢复）</text>
  <rect x="48" y="500" width="180" height="38" rx="8" fill="#ffffff" stroke="#efdcb4"/><text x="138" y="516" font-size="8.5" font-weight="600" fill="#7a4d00" text-anchor="middle">FileTxnLog</text><text x="138" y="530" font-size="7.5" fill="#9a7328" text-anchor="middle">WAL + fsync + 预分配</text>
  <rect x="238" y="500" width="180" height="38" rx="8" fill="#ffffff" stroke="#efdcb4"/><text x="328" y="516" font-size="8.5" font-weight="600" fill="#7a4d00" text-anchor="middle">FileSnap</text><text x="328" y="530" font-size="7.5" fill="#9a7328" text-anchor="middle">模糊快照 fuzzy</text>
  <rect x="428" y="500" width="204" height="38" rx="8" fill="#ffffff" stroke="#efdcb4"/><text x="530" y="516" font-size="8.5" font-weight="600" fill="#7a4d00" text-anchor="middle">FileTxnSnapLog</text><text x="530" y="530" font-size="7.5" fill="#9a7328" text-anchor="middle">恢复=快照+回放日志</text>

  <rect x="666" y="468" width="324" height="82" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)" data-tid="ZooKeeper原理_支撑_集群与Quorum" data-lab="集群与 Quorum"/>
  <text x="684" y="490" font-size="11.5" font-weight="600" fill="#1b2a4a">⑨ 集群与 Quorum</text>
  <text x="684" y="510" font-size="8.5" fill="#5b7db1">QuorumCnxManager：选举专用 TCP 连接</text>
  <text x="684" y="526" font-size="8.5" fill="#5b7db1">QuorumVerifier 定义过半；Observer 不投票</text>
  <text x="684" y="542" font-size="8.5" fill="#5b7db1">奇数节点：3 容 1、5 容 2</text>

  <!-- 底部说明 -->
  <rect x="30" y="562" width="960" height="98" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="586" font-size="12" font-weight="600" fill="#1d1d1f">一次写的完整生命：client → Prep（校验+ACL+建 Txn）→ Proposal 提给 ZAB → 广播到过半 follower 落 TxnLog 回 Ack → Leader Commit → Final apply 到 DataTree → 触发 watch → 返回</text>
  <text x="48" y="608" font-size="10" fill="#494950">读路径：直接读本地内存 DataTree（默认不经 ZAB），故读吞吐可随 follower 扩展；sync + read 可拿到最新。</text>
  <text x="48" y="628" font-size="10" fill="#494950">与 etcd 对比：ZK 用 ZAB（非 Raft）、层级 znode 树（非扁平 revision KV+MVCC）、watch 一次性触发（非按 revision 持续流）、临时节点绑 session（非 lease TTL）、Java 实现。</text>
  <text x="48" y="648" font-size="9" fill="#86868b">ZAB 与 Raft 同为主-从复制共识：都靠日志+过半+选主，差异在选举细节、恢复阶段（同步 DIFF/TRUNC/SNAP）与主先确定 epoch 再广播。</text>

  <!-- ===== 模块间数据流连线（实线=写主链 / 虚线=读旁路·watch 异步通知） ===== -->
  <!-- E1 ①client → ②pipeline：写请求入链 -->
  <line x1="510" y1="160" x2="510" y2="172" stroke="#9aa3b3" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="480" y="169" font-size="8" fill="#8c8c92" text-anchor="end">写请求 create/setData/delete</text>
  <!-- E2 ②Proposal → ③ZAB：propose 写事务 -->
  <line x1="312" y1="246" x2="312" y2="258" stroke="#9aa3b3" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="320" y="254" font-size="8" fill="#8c8c92" text-anchor="start">写→propose 提给 ZAB</text>
  <!-- E3 ②Final → ④DataTree：过半 commit 后 apply -->
  <line x1="870" y1="246" x2="870" y2="258" stroke="#9aa3b3" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="862" y="254" font-size="8" fill="#8c8c92" text-anchor="end">过半 Commit 后 Final apply</text>
  <!-- E4 ③ZAB → ⑧事务日志：先落 TxnLog 再 Ack（走 ⑤⑥ 之间空隙下探） -->
  <line x1="338" y1="366" x2="338" y2="468" stroke="#9aa3b3" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="330" y="463" font-size="8" fill="#8c8c92" text-anchor="end">先落 TxnLog(fsync) 再 Ack</text>
  <!-- E6 ④DataTree → ⑥Watch：数据变更触发 watch（异步一次性通知） -->
  <path d="M580,366 L580,380" stroke="#b7bbc4" stroke-width="1.3" stroke-dasharray="5 4" fill="none" marker-end="url(#ar)"/>
  <text x="600" y="376" font-size="8" fill="#9a9aa0" text-anchor="start">变更触发 watch 通知</text>
  <!-- E5 ①client → ④DataTree：读旁路 ZAB，Final 直查内存树（右侧通道） -->
  <path d="M990,132 L1006,132 L1006,300 L990,300" stroke="#b7bbc4" stroke-width="1.3" stroke-dasharray="5 4" fill="none" marker-end="url(#ar)"/>
  <text x="1013" y="200" font-size="7.5" fill="#9a9aa0" text-anchor="middle" transform="rotate(90 1013 200)">读旁路 ZAB · 直查内存树</text>
</svg>
