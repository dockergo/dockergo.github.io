<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="430" viewBox="0 0 1020 430"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="430" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">可靠性与抗攻击 · Dispatcher 入口防护，抗放大 / 抗 DoS / Retry 地址验证</text>

  <!-- 威胁 -->
  <rect x="30" y="56" width="470" height="230" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="80" font-size="12.5" font-weight="600" fill="#1d1d1f">三类威胁与防护</text>
  <rect x="48" y="96" width="434" height="58" rx="10" fill="#fbeaea" stroke="#f0cccc"/><text x="64" y="116" font-size="9.5" font-weight="600" fill="#7d1f1f">放大攻击：伪造源 IP 让服务端猛回包</text><text x="64" y="135" font-size="8" fill="#b06a6a">防护：未验证地址前，回包 ≤ 收到的 3 倍</text><text x="64" y="149" font-size="8" fill="#b06a6a">（anti-amplification limit）</text>
  <rect x="48" y="162" width="434" height="58" rx="10" fill="#fff7e6" stroke="#f0dcae"/><text x="64" y="182" font-size="9.5" font-weight="600" fill="#7a4d00">洪泛 DoS：海量新连接 Initial 打爆</text><text x="64" y="201" font-size="8" fill="#9a7328">防护：Retry 强制地址验证 + 缓冲/限流</text><text x="64" y="215" font-size="8" fill="#9a7328">QuicBufferedPacketStore 暂存乱序 Initial</text>
  <rect x="48" y="228" width="434" height="48" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="64" y="248" font-size="9.5" font-weight="600" fill="#1b2a4a">指纹/审查：Initial 可被中间盒识别</text><text x="64" y="266" font-size="8" fill="#5b7db1">QuicChaosProtector 打乱首包结构抗指纹</text>

  <!-- Dispatcher 防护 -->
  <rect x="520" y="56" width="470" height="230" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="538" y="80" font-size="12.5" font-weight="600" fill="#1b2a4a">Dispatcher 作入口关卡（quic_dispatcher.h:62）</text>
  <rect x="538" y="96" width="434" height="52" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="554" y="116" font-size="9.5" font-weight="600" fill="#1b2a4a">ProcessPacket(:85)：所有入站包先过它</text><text x="554" y="134" font-size="8" fill="#5b7db1">按 CID 分流 / 判新连接 / 丢无效包</text>
  <rect x="538" y="154" width="434" height="52" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="554" y="174" font-size="9.5" font-weight="600" fill="#1b2a4a">Retry：回一个令牌，要求客户端带回</text><text x="554" y="192" font-size="8" fill="#5b7db1">证明其源地址真实可达，才建 Session</text>
  <rect x="538" y="212" width="434" height="30" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="554" y="231" font-size="9" fill="#1b2a4a">缓冲乱序 Initial（等 CRYPTO 齐）</text>
  <rect x="538" y="248" width="434" height="30" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="554" y="267" font-size="9" fill="#1b2a4a">无状态重置：对不认识的包回 Stateless Reset</text>

  <!-- Retry 时序 -->
  <rect x="30" y="302" width="960" height="108" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="326" font-size="12" font-weight="600" fill="#1d1d1f">Retry 地址验证时序</text>
  <rect x="70" y="342" width="190" height="48" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="165" y="363" font-size="8.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Client → Initial(ClientHello)</text><text x="165" y="379" font-size="8" fill="#5b7db1" text-anchor="middle">源地址未验证</text>
  <rect x="310" y="342" width="190" height="48" rx="9" fill="#fff7e6" stroke="#f0dcae"/><text x="405" y="363" font-size="8.5" font-weight="600" fill="#7a4d00" text-anchor="middle">Server → Retry(令牌)</text><text x="405" y="379" font-size="8" fill="#9a7328" text-anchor="middle">不建状态</text>
  <rect x="550" y="342" width="190" height="48" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="645" y="363" font-size="8.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Client → Initial(带令牌)</text><text x="645" y="379" font-size="8" fill="#5b7db1" text-anchor="middle">证明可达</text>
  <rect x="790" y="342" width="170" height="48" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="875" y="363" font-size="8.5" font-weight="600" fill="#0f5132" text-anchor="middle">Server 校验 → 建 Session</text><text x="875" y="379" font-size="8" fill="#3f8f66" text-anchor="middle">正式握手</text>
  <line x1="260" y1="366" x2="310" y2="366" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="500" y1="366" x2="550" y2="366" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="740" y1="366" x2="790" y2="366" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
</svg>
