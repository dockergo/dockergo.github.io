<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="430" viewBox="0 0 1020 430"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="430" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">包与帧编解码 · QuicFramer 解析、QuicPacketCreator 组装（线格式的门面）</text>

  <!-- 分层 -->
  <rect x="30" y="56" width="470" height="230" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="80" font-size="12.5" font-weight="600" fill="#1d1d1f">一个 QUIC 包的层次</text>
  <rect x="48" y="96" width="434" height="40" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="64" y="115" font-size="9.5" font-weight="600" fill="#1b2a4a">UDP 载荷 = 一个或多个 QUIC 包（可 coalesce）</text><text x="64" y="129" font-size="8" fill="#5b7db1">QuicCoalescedPacket 合并 Initial/Handshake/1-RTT</text>
  <rect x="48" y="142" width="434" height="40" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="64" y="161" font-size="9.5" font-weight="600" fill="#0f5132">包头 + 包号 + 受保护载荷</text><text x="64" y="175" font-size="8" fill="#3f8f66">长头（握手）/ 短头（1-RTT）；包号加密</text>
  <rect x="48" y="188" width="434" height="40" rx="9" fill="#fff7e6" stroke="#f0dcae"/><text x="64" y="207" font-size="9.5" font-weight="600" fill="#7a4d00">载荷 = 帧序列（frames/）</text><text x="64" y="221" font-size="8" fill="#9a7328">STREAM / ACK / CRYPTO / MAX_DATA / PING / RESET…</text>
  <rect x="48" y="234" width="434" height="40" rx="9" fill="#f4eefb" stroke="#d9c9ef"/><text x="64" y="253" font-size="9.5" font-weight="600" fill="#3c1361">变长整数编码（varint）省字节</text><text x="64" y="267" font-size="8" fill="#7a5aa8">帧类型/长度/偏移都用 varint</text>

  <!-- 双向 -->
  <rect x="520" y="56" width="470" height="230" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="538" y="80" font-size="12.5" font-weight="600" fill="#1d1d1f">两个门面类</text>
  <rect x="538" y="96" width="434" height="82" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="554" y="118" font-size="10.5" font-weight="600" fill="#1b2a4a">QuicFramer（入向解析 · quic_framer.h:283）</text><text x="554" y="138" font-size="8.5" fill="#5b7db1">解密 → 拆帧 → 逐帧回调 QuicFramerVisitorInterface(:76)</text><text x="554" y="156" font-size="8.5" fill="#5b7db1">OnStreamFrame / OnAckFrame / OnCryptoFrame…</text><text x="554" y="172" font-size="8" fill="#8fa9cf">版本协商、包号恢复、认证失败即丢</text>
  <rect x="538" y="188" width="434" height="86" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="554" y="210" font-size="10.5" font-weight="600" fill="#0f5132">QuicPacketCreator（出向组装 · quic_packet_creator.h:52）</text><text x="554" y="230" font-size="8.5" fill="#3f8f66">把帧塞进包、控制 MTU、决定何时封包</text><text x="554" y="248" font-size="8.5" fill="#3f8f66">加密 + 包号分配 → 交 Writer 发出</text><text x="554" y="266" font-size="8" fill="#5aa06f">QuicChaosProtector 打乱 Initial 抗指纹</text>

  <!-- 流水 -->
  <rect x="30" y="302" width="960" height="108" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="48" y="326" font-size="12" font-weight="600" fill="#1b2a4a">编解码在收发链路中的位置</text>
  <rect x="60" y="342" width="150" height="48" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="135" y="363" font-size="8.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">UDP 报入</text><text x="135" y="379" font-size="8" fill="#5b7db1" text-anchor="middle">ProcessUdpPacket</text>
  <rect x="250" y="342" width="150" height="48" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="325" y="363" font-size="8.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">QuicFramer 解密拆帧</text><text x="325" y="379" font-size="8" fill="#5b7db1" text-anchor="middle">逐帧回调</text>
  <rect x="440" y="342" width="150" height="48" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="515" y="363" font-size="8.5" font-weight="600" fill="#0f5132" text-anchor="middle">Connection 处理帧</text><text x="515" y="379" font-size="8" fill="#3f8f66" text-anchor="middle">更新状态/回调 Session</text>
  <rect x="630" y="342" width="150" height="48" rx="9" fill="#fff7e6" stroke="#f0dcae"/><text x="705" y="363" font-size="8.5" font-weight="600" fill="#7a4d00" text-anchor="middle">Creator 组包</text><text x="705" y="379" font-size="8" fill="#9a7328" text-anchor="middle">帧→包→加密</text>
  <rect x="820" y="342" width="150" height="48" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="895" y="363" font-size="8.5" font-weight="600" fill="#0f5132" text-anchor="middle">Writer 发出</text><text x="895" y="379" font-size="8" fill="#3f8f66" text-anchor="middle">sendto</text>
  <line x1="210" y1="366" x2="250" y2="366" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="400" y1="366" x2="440" y2="366" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="590" y1="366" x2="630" y2="366" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="780" y1="366" x2="820" y2="366" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
</svg>
