<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="430" viewBox="0 0 1020 430"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="430" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">连接管理与迁移 · 连接由 Connection ID 标识（非四元组），换网不断连</text>

  <!-- CID -->
  <rect x="30" y="56" width="470" height="230" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="80" font-size="12.5" font-weight="600" fill="#1d1d1f">连接标识：Connection ID 而非四元组</text>
  <rect x="48" y="96" width="434" height="58" rx="10" fill="#fbeaea" stroke="#f0cccc"/><text x="64" y="116" font-size="9.5" font-weight="600" fill="#7d1f1f">TCP：连接 = 四元组（src IP/port + dst IP/port）</text><text x="64" y="135" font-size="8" fill="#b06a6a">换 WiFi→蜂窝，IP 变 → 连接断，需重建</text><text x="64" y="149" font-size="8" fill="#b06a6a">NAT 重绑也可能断连</text>
  <rect x="48" y="162" width="434" height="58" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="64" y="182" font-size="9.5" font-weight="600" fill="#0f5132">QUIC：连接 = Connection ID</text><text x="64" y="201" font-size="8" fill="#3f8f66">IP/端口变了，CID 不变 → 连接存活</text><text x="64" y="215" font-size="8" fill="#3f8f66">QuicConnectionIdManager 管多个可用 CID</text>
  <rect x="48" y="228" width="434" height="48" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="64" y="248" font-size="9.5" font-weight="600" fill="#1b2a4a">CID 轮换防关联跟踪</text><text x="64" y="266" font-size="8" fill="#5b7db1">NEW_CONNECTION_ID / RETIRE_CONNECTION_ID 帧</text>

  <!-- 迁移 -->
  <rect x="520" y="56" width="470" height="230" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="538" y="80" font-size="12.5" font-weight="600" fill="#1b2a4a">路径迁移与验证</text>
  <rect x="538" y="96" width="434" height="52" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="554" y="116" font-size="9.5" font-weight="600" fill="#1b2a4a">检测到新对端地址 → 触发路径验证</text><text x="554" y="134" font-size="8" fill="#5b7db1">不盲信新地址（防地址伪造放大攻击）</text>
  <rect x="538" y="154" width="434" height="52" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="554" y="174" font-size="9.5" font-weight="600" fill="#1b2a4a">PATH_CHALLENGE / PATH_RESPONSE 帧</text><text x="554" y="192" font-size="8" fill="#5b7db1">发随机数挑战、对端原样回 → 证明可达</text>
  <rect x="538" y="212" width="434" height="30" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="554" y="231" font-size="9" fill="#1b2a4a">验证前限速新路径，防放大</text>
  <rect x="538" y="248" width="434" height="30" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="554" y="267" font-size="9" fill="#1b2a4a">连接关闭：CONNECTION_CLOSE 帧 + 排空期</text>

  <!-- 迁移时序 -->
  <rect x="30" y="302" width="960" height="108" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="326" font-size="12" font-weight="600" fill="#1d1d1f">换网迁移时序（WiFi → 蜂窝）</text>
  <rect x="70" y="342" width="190" height="48" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="165" y="363" font-size="8.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">手机切蜂窝，源 IP 变</text><text x="165" y="379" font-size="8" fill="#5b7db1" text-anchor="middle">CID 不变</text>
  <rect x="310" y="342" width="190" height="48" rx="9" fill="#fff7e6" stroke="#f0dcae"/><text x="405" y="363" font-size="8.5" font-weight="600" fill="#7a4d00" text-anchor="middle">服务端见新地址</text><text x="405" y="379" font-size="8" fill="#9a7328" text-anchor="middle">发 PATH_CHALLENGE</text>
  <rect x="550" y="342" width="190" height="48" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="645" y="363" font-size="8.5" font-weight="600" fill="#0f5132" text-anchor="middle">客户端回 PATH_RESPONSE</text><text x="645" y="379" font-size="8" fill="#3f8f66" text-anchor="middle">证明新路径可达</text>
  <rect x="790" y="342" width="170" height="48" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="875" y="363" font-size="8.5" font-weight="600" fill="#0f5132" text-anchor="middle">连接继续，不重建</text><text x="875" y="379" font-size="8" fill="#3f8f66" text-anchor="middle">重置拥塞状态</text>
  <line x1="260" y1="366" x2="310" y2="366" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="500" y1="366" x2="550" y2="366" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="740" y1="366" x2="790" y2="366" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
</svg>
