<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="650" viewBox="0 0 1020 650"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="650" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Google QUICHE 双维模型 · 能力域（线上表示 / 可靠传输 / 连接与应用）× 执行时机（收发 / 定时器）</text>

  <rect x="30" y="52" width="960" height="46" rx="12" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="50" y="72" font-size="12.5" font-weight="600" fill="#3c1361">接口主线（应用如何用 QUICHE · C++ 库）</text>
  <text x="50" y="90" font-size="11.5" fill="#7a5aa8">会话与连接（QuicConnection/QuicSession/QuicStream + Visitor）　·　IO 与事件（ProcessUdpPacket/QuicPacketWriter/QuicAlarm）　·　HTTP 与流（HTTP2/HTTP3 + Dispatcher）</text>

  <text x="30" y="128" font-size="12" font-weight="600" fill="#86868b">前台 · 收发调用内同步处理（ProcessUdpPacket 入站 · 经 QuicPacketWriter 出站，均由应用驱动）</text>
  <line x1="30" y1="136" x2="990" y2="136" stroke="#e2e2e7" stroke-width="1"/>

  <!-- 线上表示 -->
  <rect x="30" y="150" width="300" height="300" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="50" y="176" font-size="13" font-weight="600" fill="#1d1d1f">线上表示 · 字节怎么成包</text>
  <rect x="50" y="192" width="260" height="110" rx="11" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="66" y="214" font-size="12" font-weight="600" fill="#7a4d00">① 包与帧</text>
  <text x="66" y="234" font-size="10.5" fill="#9a7328">QuicFramer 解析 / QuicPacketCreator 组包</text>
  <text x="66" y="250" font-size="10.5" fill="#9a7328">长/短头 · 包号空间 · 头保护</text>
  <text x="66" y="266" font-size="10.5" fill="#9a7328">STREAM/ACK/CRYPTO/WINDOW_UPDATE</text>
  <text x="66" y="286" font-size="10.5" fill="#9a7328">一 UDP 报可含多包多帧</text>
  <rect x="50" y="314" width="260" height="122" rx="11" fill="#fbeaea" stroke="#f0cccc"/>
  <text x="66" y="336" font-size="12" font-weight="600" fill="#7d1f1f">② TLS 握手与加密</text>
  <text x="66" y="356" font-size="10.5" fill="#b06a6a">QuicCryptoStream + BoringSSL TLS 1.3</text>
  <text x="66" y="372" font-size="10.5" fill="#b06a6a">加密级别各自密钥</text>
  <text x="66" y="388" font-size="10.5" fill="#b06a6a">AEAD encrypter/decrypter 每包加密</text>
  <text x="66" y="408" font-size="10.5" fill="#b06a6a">握手即建连（1-RTT/0-RTT）</text>
  <text x="66" y="426" font-size="9.5" fill="#c99">加密是 QUIC 强制底座</text>

  <!-- 可靠传输 -->
  <rect x="360" y="150" width="300" height="300" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="380" y="176" font-size="13" font-weight="600" fill="#1d1d1f">可靠传输 · 不丢不堵</text>
  <rect x="380" y="192" width="260" height="76" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="396" y="214" font-size="12" font-weight="600" fill="#1b2a4a">③ 流与流量控制</text>
  <text x="396" y="234" font-size="10.5" fill="#5b7db1">QuicStream 多流并行无队头阻塞</text>
  <text x="396" y="250" font-size="10.5" fill="#5b7db1">QuicFlowController 流级+连接级窗口</text>
  <rect x="380" y="278" width="260" height="76" rx="11" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="396" y="300" font-size="12" font-weight="600" fill="#0f5132">④ 丢包检测与恢复</text>
  <text x="396" y="320" font-size="10.5" fill="#3f8f66">QuicSentPacketManager · ACK/RTT</text>
  <text x="396" y="336" font-size="10.5" fill="#3f8f66">PTO 超时 · 重传（RFC 9002）</text>
  <rect x="380" y="364" width="260" height="72" rx="11" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="396" y="386" font-size="12" font-weight="600" fill="#3c1361">⑤ 拥塞控制</text>
  <text x="396" y="406" font-size="10.5" fill="#7a5aa8">congestion_control：BBR/BBR2/CUBIC/PCC</text>
  <text x="396" y="422" font-size="10.5" fill="#7a5aa8">bandwidth sampler · pacing</text>

  <!-- 连接与应用 -->
  <rect x="690" y="150" width="300" height="300" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="710" y="176" font-size="13" font-weight="600" fill="#1d1d1f">连接与应用</text>
  <rect x="710" y="192" width="260" height="76" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="726" y="214" font-size="12" font-weight="600" fill="#1b2a4a">⑥ 连接管理与迁移</text>
  <text x="726" y="234" font-size="10.5" fill="#5b7db1">QuicDispatcher 服务端 demux</text>
  <text x="726" y="250" font-size="10.5" fill="#5b7db1">connection ID · 路径验证 · 迁移</text>
  <rect x="710" y="278" width="260" height="76" rx="11" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="726" y="300" font-size="12" font-weight="600" fill="#3c1361">⑦ HTTP/3 与 QPACK</text>
  <text x="726" y="320" font-size="10.5" fill="#7a5aa8">QuicSpdySession · HTTP2(HPACK)/HTTP3</text>
  <text x="726" y="336" font-size="10.5" fill="#7a5aa8">QPACK 头压缩 · 控制流</text>
  <rect x="710" y="364" width="260" height="72" rx="11" fill="#fbeaea" stroke="#f0cccc"/>
  <text x="726" y="386" font-size="12" font-weight="600" fill="#7d1f1f">⑧ 可靠性与抗攻击</text>
  <text x="726" y="406" font-size="10.5" fill="#b06a6a">放大限制 · Retry · 0-RTT 抗重放</text>
  <text x="726" y="422" font-size="10.5" fill="#b06a6a">stateless reset · Dispatcher 限流</text>

  <text x="30" y="482" font-size="12" font-weight="600" fill="#86868b">定时器时机 · QuicAlarm 驱动（应用提供 QuicAlarmFactory，到点触发 OnAlarm）</text>
  <line x1="30" y1="490" x2="990" y2="490" stroke="#e2e2e7" stroke-width="1"/>
  <rect x="30" y="504" width="960" height="116" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="50" y="528" font-size="13" font-weight="600" fill="#1d1d1f">QuicAlarm 定时器驱动的横切工作（quic_alarm.h:20 · 无自跑线程）</text>
  <rect x="50" y="540" width="300" height="66" rx="11" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="66" y="562" font-size="11.5" font-weight="600" fill="#0f5132">重传 / PTO alarm</text>
  <text x="66" y="582" font-size="10.5" fill="#3f8f66">超时未 ACK → 重传探测</text>
  <text x="66" y="598" font-size="10.5" fill="#3f8f66">QuicSentPacketManager 设定</text>
  <rect x="366" y="540" width="300" height="66" rx="11" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="382" y="562" font-size="11.5" font-weight="600" fill="#3c1361">send / pacing alarm</text>
  <text x="382" y="582" font-size="10.5" fill="#7a5aa8">拥塞控制算出可发时刻</text>
  <text x="382" y="598" font-size="10.5" fill="#7a5aa8">到点经 Writer 发出</text>
  <rect x="682" y="540" width="288" height="66" rx="11" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="698" y="562" font-size="11.5" font-weight="600" fill="#7a4d00">idle / ack / ping alarm</text>
  <text x="698" y="582" font-size="10.5" fill="#9a7328">空闲超时关连接</text>
  <text x="698" y="598" font-size="10.5" fill="#9a7328">延迟 ACK · keepalive</text>

  <line x1="510" y1="98" x2="510" y2="136" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
</svg>
