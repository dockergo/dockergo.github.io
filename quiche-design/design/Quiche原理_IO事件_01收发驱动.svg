<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="450" viewBox="0 0 1020 450"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="450" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">IO 与事件驱动 · 应用提供 socket/时钟原语，库经抽象收发（灵魂接口）</text>

  <!-- 三件事 -->
  <rect x="30" y="56" width="960" height="180" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="80" font-size="12.5" font-weight="600" fill="#1d1d1f">应用与库的三个契约点</text>
  <rect x="48" y="96" width="300" height="124" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="198" y="118" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">① 入站：ProcessUdpPacket</text><text x="198" y="140" font-size="8.5" fill="#5b7db1" text-anchor="middle">socket 收到 UDP 报</text><text x="198" y="158" font-size="8.5" fill="#5b7db1" text-anchor="middle">→ QuicConnection::ProcessUdpPacket</text><text x="198" y="176" font-size="8.5" fill="#5b7db1" text-anchor="middle">（quic_connection.h:692）</text><text x="198" y="196" font-size="8" fill="#8fa9cf" text-anchor="middle">带 self/peer 地址</text><text x="198" y="212" font-size="8" fill="#8fa9cf" text-anchor="middle">解密解帧、更新状态、触发 Visitor</text>
  <rect x="360" y="96" width="300" height="124" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="510" y="118" font-size="10.5" font-weight="600" fill="#0f5132" text-anchor="middle">② 出站：QuicPacketWriter</text><text x="510" y="140" font-size="8.5" fill="#3f8f66" text-anchor="middle">库要发包时调应用的 Writer</text><text x="510" y="158" font-size="8.5" fill="#3f8f66" text-anchor="middle">WritePacket(...) → sendto</text><text x="510" y="176" font-size="8.5" fill="#3f8f66" text-anchor="middle">（quic_connection.h:723）</text><text x="510" y="196" font-size="8" fill="#5aa06f" text-anchor="middle">可返回 WRITE_STATUS_BLOCKED</text><text x="510" y="212" font-size="8" fill="#5aa06f" text-anchor="middle">→ 库暂停、可写时 OnCanWrite</text>
  <rect x="672" y="96" width="298" height="124" rx="10" fill="#fff7e6" stroke="#f0dcae"/><text x="821" y="118" font-size="10.5" font-weight="600" fill="#7a4d00" text-anchor="middle">③ 时钟：QuicAlarm</text><text x="821" y="140" font-size="8.5" fill="#9a7328" text-anchor="middle">库要计时 → QuicAlarmFactory 建 Alarm</text><text x="821" y="158" font-size="8.5" fill="#9a7328" text-anchor="middle">到点触发 OnAlarm（quic_alarm.h:20）</text><text x="821" y="176" font-size="8.5" fill="#9a7328" text-anchor="middle">应用把 Alarm 挂到自己的事件循环</text><text x="821" y="196" font-size="8" fill="#b8912e" text-anchor="middle">重传/PTO/idle/ack/pacing</text><text x="821" y="212" font-size="8" fill="#b8912e" text-anchor="middle">无库自跑线程</text>

  <!-- 循环 -->
  <rect x="30" y="252" width="600" height="180" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="48" y="276" font-size="12" font-weight="600" fill="#1b2a4a">应用事件循环（典型）</text>
  <rect x="200" y="292" width="270" height="30" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="335" y="311" font-size="8.5" fill="#1b2a4a" text-anchor="middle">epoll 等 socket 可读 / alarm 到期</text>
  <rect x="200" y="328" width="270" height="30" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="335" y="347" font-size="8.5" fill="#1b2a4a" text-anchor="middle">socket 可读 → ProcessUdpPacket</text>
  <rect x="200" y="364" width="270" height="30" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="335" y="383" font-size="8.5" fill="#1b2a4a" text-anchor="middle">库内部按需调 Writer 发包 / 设 Alarm</text>
  <rect x="200" y="400" width="270" height="24" rx="7" fill="#eafaf1" stroke="#bce6cd"/><text x="335" y="416" font-size="8" fill="#0f5132" text-anchor="middle">alarm 到期 → OnAlarm → 库处理超时</text>
  <line x1="335" y1="322" x2="335" y2="328" stroke="#c7c7cc" stroke-width="1.1" marker-end="url(#ar)"/>
  <line x1="335" y1="358" x2="335" y2="364" stroke="#c7c7cc" stroke-width="1.1" marker-end="url(#ar)"/>

  <!-- helper -->
  <rect x="650" y="252" width="340" height="180" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="668" y="276" font-size="12" font-weight="600" fill="#1d1d1f">要点</text>
  <text x="668" y="300" font-size="9.5" fill="#494950">· 库不碰 socket/时钟——全经 Writer/Alarm 抽象</text>
  <text x="668" y="322" font-size="9.5" fill="#494950">· QuicConnectionHelper 提供时钟/随机数/分配器</text>
  <text x="668" y="344" font-size="9.5" fill="#494950">· 写阻塞用 OnCanWrite 回调恢复，不丢包</text>
  <text x="668" y="366" font-size="9.5" fill="#494950">· 可注入模拟 writer/alarm/时钟做确定性测试</text>
  <text x="668" y="388" font-size="9.5" fill="#494950">· 并发模型（单线程/多线程）由应用定</text>
  <text x="668" y="414" font-size="8.5" fill="#86868b">这是 QUICHE 可嵌 Chromium/Envoy/测试的根源</text>
</svg>
