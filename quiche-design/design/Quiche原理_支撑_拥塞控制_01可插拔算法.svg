<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="430" viewBox="0 0 1020 430"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="430" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">拥塞控制 · 可插拔 SendAlgorithmInterface，BBRv1/v2 + CUBIC，用户态可热切换</text>

  <!-- 插件 -->
  <rect x="30" y="56" width="470" height="230" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="80" font-size="12.5" font-weight="600" fill="#1d1d1f">可插拔算法（congestion_control/）</text>
  <rect x="48" y="96" width="434" height="46" rx="9" fill="#f4eefb" stroke="#d9c9ef"/><text x="64" y="115" font-size="9.5" font-weight="600" fill="#3c1361">SendAlgorithmInterface（send_algorithm_interface.h:32）</text><text x="64" y="132" font-size="8" fill="#7a5aa8">统一接口：OnPacketSent / OnCongestionEvent / CanSend</text>
  <rect x="48" y="150" width="210" height="60" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="153" y="171" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">BBRv1 / BBRv2</text><text x="153" y="188" font-size="8" fill="#3f8f66" text-anchor="middle">bbr2_sender.h:27</text><text x="153" y="202" font-size="8" fill="#3f8f66" text-anchor="middle">测带宽×RTT 建模，不靠丢包</text>
  <rect x="272" y="150" width="210" height="60" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="377" y="171" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">CUBIC（TCP 兼容）</text><text x="377" y="188" font-size="8" fill="#5b7db1" text-anchor="middle">tcp_cubic_sender_bytes.h</text><text x="377" y="202" font-size="8" fill="#5b7db1" text-anchor="middle">丢包驱动、三次函数增窗</text>
  <rect x="48" y="220" width="434" height="56" rx="9" fill="#fff7e6" stroke="#f0dcae"/><text x="64" y="240" font-size="9.5" font-weight="600" fill="#7a4d00">用户态实现 → 无需内核，可热切换/实验</text><text x="64" y="258" font-size="8" fill="#9a7328">同一 socket 不同连接可用不同算法；快速迭代</text>

  <!-- BBR 状态 -->
  <rect x="520" y="56" width="470" height="230" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="538" y="80" font-size="12.5" font-weight="600" fill="#0f5132">BBR 四阶段（bbr2_*）</text>
  <rect x="538" y="96" width="434" height="42" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="554" y="115" font-size="9.5" font-weight="600" fill="#0f5132">Startup：指数探带宽（似慢启动）</text><text x="554" y="130" font-size="8" fill="#3f8f66">带宽不再增即退出</text>
  <rect x="538" y="144" width="434" height="42" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="554" y="163" font-size="9.5" font-weight="600" fill="#0f5132">Drain：排空 Startup 造的队列</text><text x="554" y="178" font-size="8" fill="#3f8f66">bbr2_drain.h</text>
  <rect x="538" y="192" width="434" height="42" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="554" y="211" font-size="9.5" font-weight="600" fill="#0f5132">ProbeBW：周期探带宽，稳态巡航</text><text x="554" y="226" font-size="8" fill="#3f8f66">bbr2_probe_bw.h</text>
  <rect x="538" y="240" width="434" height="38" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="554" y="259" font-size="9.5" font-weight="600" fill="#0f5132">ProbeRTT：周期降窗测最小 RTT</text><text x="554" y="273" font-size="8" fill="#3f8f66">bbr2_probe_rtt.h</text>

  <!-- pacing -->
  <rect x="30" y="302" width="960" height="108" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="48" y="326" font-size="12" font-weight="600" fill="#1b2a4a">拥塞窗口 + Pacing 协作发包</text>
  <rect x="70" y="342" width="200" height="48" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="170" y="363" font-size="8.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">算法给出 cwnd + pacing rate</text><text x="170" y="379" font-size="8" fill="#5b7db1" text-anchor="middle">基于 ACK 反馈</text>
  <rect x="320" y="342" width="200" height="48" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="420" y="363" font-size="8.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">在途字节 &lt; cwnd 才可发</text><text x="420" y="379" font-size="8" fill="#5b7db1" text-anchor="middle">CanSend 门禁</text>
  <rect x="570" y="342" width="200" height="48" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="670" y="363" font-size="8.5" font-weight="600" fill="#0f5132" text-anchor="middle">Pacing 按速率均匀发</text><text x="670" y="379" font-size="8" fill="#3f8f66" text-anchor="middle">经 Alarm 定时</text>
  <rect x="820" y="342" width="140" height="48" rx="9" fill="#fff7e6" stroke="#f0dcae"/><text x="890" y="363" font-size="8.5" font-weight="600" fill="#7a4d00" text-anchor="middle">避免突发丢包</text><text x="890" y="379" font-size="8" fill="#9a7328" text-anchor="middle">平滑注入</text>
  <line x1="270" y1="366" x2="320" y2="366" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="520" y1="366" x2="570" y2="366" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="770" y1="366" x2="820" y2="366" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
</svg>
