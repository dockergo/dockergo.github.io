<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="430" viewBox="0 0 1020 430"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="430" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">TLS 握手与加密 · TLS 1.3 内嵌于 QUIC，QuicCryptoStream 跑握手、按加密级分层保护</text>

  <!-- 加密级 -->
  <rect x="30" y="56" width="470" height="230" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="80" font-size="12.5" font-weight="600" fill="#1d1d1f">三个加密级（逐步升级）</text>
  <rect x="48" y="96" width="434" height="56" rx="10" fill="#fbeaea" stroke="#f0cccc"/><text x="64" y="117" font-size="10" font-weight="600" fill="#7d1f1f">Initial（初始密钥，公开算法派生）</text><text x="64" y="136" font-size="8.5" fill="#b06a6a">用连接 ID 派生，人人可算 → 仅防篡改不防窃听</text>
  <rect x="48" y="158" width="434" height="56" rx="10" fill="#fff7e6" stroke="#f0dcae"/><text x="64" y="179" font-size="10" font-weight="600" fill="#7a4d00">Handshake（握手密钥）</text><text x="64" y="198" font-size="8.5" fill="#9a7328">ClientHello/ServerHello 交换后派生，保护握手消息</text>
  <rect x="48" y="220" width="434" height="56" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="64" y="241" font-size="10" font-weight="600" fill="#0f5132">1-RTT（应用密钥）</text><text x="64" y="260" font-size="8.5" fill="#3f8f66">握手完成后保护应用数据；密钥可轮换（Key Update）</text>

  <!-- 机制 -->
  <rect x="520" y="56" width="470" height="230" rx="14" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="538" y="80" font-size="12.5" font-weight="600" fill="#3c1361">握手承载与要点</text>
  <rect x="538" y="96" width="434" height="52" rx="9" fill="#ffffff" stroke="#d9c9ef"/><text x="554" y="116" font-size="9.5" font-weight="600" fill="#3c1361">QuicCryptoStream（quic_crypto_stream.h:54）</text><text x="554" y="134" font-size="8" fill="#7a5aa8">是特殊 QuicStream，走 CRYPTO 帧传 TLS 消息（不占流号）</text>
  <rect x="538" y="154" width="434" height="52" rx="9" fill="#ffffff" stroke="#d9c9ef"/><text x="554" y="174" font-size="9.5" font-weight="600" fill="#3c1361">crypto/ 目录：TLS 适配 + AEAD + 包号保护</text><text x="554" y="192" font-size="8" fill="#7a5aa8">载荷用 AEAD 加密认证，包号头单独用 header protection</text>
  <rect x="538" y="212" width="434" height="30" rx="9" fill="#ffffff" stroke="#d9c9ef"/><text x="554" y="231" font-size="9" fill="#3c1361">0-RTT：复用票据首包带数据（有重放风险）</text>
  <rect x="538" y="248" width="434" height="30" rx="9" fill="#ffffff" stroke="#d9c9ef"/><text x="554" y="267" font-size="9" fill="#3c1361">1-RTT 建连：ClientHello 即可带应用密钥就绪</text>

  <!-- 时序 -->
  <rect x="30" y="302" width="960" height="108" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="48" y="326" font-size="12" font-weight="600" fill="#1b2a4a">1-RTT 握手时序</text>
  <rect x="70" y="342" width="180" height="48" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="160" y="363" font-size="8.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Client → ClientHello</text><text x="160" y="379" font-size="8" fill="#5b7db1" text-anchor="middle">Initial 级 + 密钥参数</text>
  <rect x="300" y="342" width="180" height="48" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="390" y="363" font-size="8.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Server → ServerHello + 证书</text><text x="390" y="379" font-size="8" fill="#5b7db1" text-anchor="middle">派生 Handshake/1-RTT</text>
  <rect x="530" y="342" width="180" height="48" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="620" y="363" font-size="8.5" font-weight="600" fill="#0f5132" text-anchor="middle">Client → Finished</text><text x="620" y="379" font-size="8" fill="#3f8f66" text-anchor="middle">握手完成</text>
  <rect x="760" y="342" width="200" height="48" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="860" y="363" font-size="8.5" font-weight="600" fill="#0f5132" text-anchor="middle">双向 1-RTT 应用数据</text><text x="860" y="379" font-size="8" fill="#3f8f66" text-anchor="middle">加密传输</text>
  <line x1="250" y1="366" x2="300" y2="366" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="480" y1="366" x2="530" y2="366" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="710" y1="366" x2="760" y2="366" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
</svg>
