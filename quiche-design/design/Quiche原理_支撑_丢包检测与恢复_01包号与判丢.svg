<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="430" viewBox="0 0 1020 430"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="430" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">丢包检测与恢复 · 单调包号 + 显式 ACK，QuicSentPacketManager 追踪、按需重传（新包号）</text>

  <!-- 核心机制 -->
  <rect x="30" y="56" width="470" height="230" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="80" font-size="12.5" font-weight="600" fill="#1d1d1f">与 TCP 的关键区别</text>
  <rect x="48" y="96" width="434" height="56" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="64" y="116" font-size="9.5" font-weight="600" fill="#0f5132">包号单调递增，永不复用</text><text x="64" y="135" font-size="8" fill="#3f8f66">重传用新包号 → 无"重传歧义"，RTT 采样精确</text>
  <rect x="48" y="158" width="434" height="56" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="64" y="178" font-size="9.5" font-weight="600" fill="#1b2a4a">ACK 帧带范围 + ACK 延迟</text><text x="64" y="196" font-size="8" fill="#5b7db1">显式确认已收包号区间，比 TCP SACK 更表达力</text>
  <rect x="48" y="220" width="434" height="56" rx="10" fill="#fff7e6" stroke="#f0dcae"/><text x="64" y="240" font-size="9.5" font-weight="600" fill="#7a4d00">数据与包号解耦</text><text x="64" y="258" font-size="8" fill="#9a7328">丢的帧内容重新封进新包重发，不重发原包</text>

  <!-- 判丢 -->
  <rect x="520" y="56" width="470" height="230" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="538" y="80" font-size="12.5" font-weight="600" fill="#1b2a4a">判丢与重传机制</text>
  <rect x="538" y="96" width="434" height="52" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="554" y="116" font-size="9.5" font-weight="600" fill="#1b2a4a">QuicSentPacketManager（:55）追踪在途包</text><text x="554" y="134" font-size="8" fill="#5b7db1">记录每包发送时间/内容，收 ACK 后判交付/丢失</text>
  <rect x="538" y="154" width="434" height="52" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="554" y="174" font-size="9.5" font-weight="600" fill="#1b2a4a">UberLossAlgorithm（uber_loss_algorithm.h:45）</text><text x="554" y="192" font-size="8" fill="#5b7db1">乱序阈值 + 时间阈值判丢（general_loss_algorithm）</text>
  <rect x="538" y="212" width="434" height="30" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="554" y="231" font-size="9" fill="#1b2a4a">PTO（Probe Timeout）：无 ACK 超时探测重传</text>
  <rect x="538" y="248" width="434" height="30" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="554" y="267" font-size="9" fill="#1b2a4a">RTT 估计：平滑 RTT + 方差，喂 PTO/拥塞</text>

  <!-- 时序 -->
  <rect x="30" y="302" width="960" height="108" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="326" font-size="12" font-weight="600" fill="#1d1d1f">丢包恢复闭环</text>
  <rect x="70" y="342" width="180" height="48" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="160" y="363" font-size="8.5" font-weight="600" fill="#0f5132" text-anchor="middle">发包 #10..#20</text><text x="160" y="379" font-size="8" fill="#3f8f66" text-anchor="middle">SentPacketManager 记录</text>
  <rect x="300" y="342" width="180" height="48" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="390" y="363" font-size="8.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">收 ACK：确认 #10-18,#20</text><text x="390" y="379" font-size="8" fill="#5b7db1" text-anchor="middle">#19 疑似丢</text>
  <rect x="530" y="342" width="180" height="48" rx="9" fill="#fff7e6" stroke="#f0dcae"/><text x="620" y="363" font-size="8.5" font-weight="600" fill="#7a4d00" text-anchor="middle">阈值判 #19 丢失</text><text x="620" y="379" font-size="8" fill="#9a7328" text-anchor="middle">乱序/时间阈值</text>
  <rect x="760" y="342" width="200" height="48" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="860" y="363" font-size="8.5" font-weight="600" fill="#0f5132" text-anchor="middle">#19 内容 → 新包 #21 重发</text><text x="860" y="379" font-size="8" fill="#3f8f66" text-anchor="middle">通知拥塞控制</text>
  <line x1="250" y1="366" x2="300" y2="366" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="480" y1="366" x2="530" y2="366" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="710" y1="366" x2="760" y2="366" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
</svg>
