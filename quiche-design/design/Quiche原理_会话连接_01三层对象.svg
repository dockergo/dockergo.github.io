<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="450" viewBox="0 0 1020 450"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="450" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">会话与连接 · 三层对象 + Visitor 回调（QuicConnection / QuicSession / QuicStream）</text>

  <!-- 三层 -->
  <rect x="30" y="56" width="470" height="270" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="80" font-size="12.5" font-weight="600" fill="#1d1d1f">三层对象（自上而下）</text>
  <rect x="48" y="96" width="434" height="64" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="64" y="118" font-size="10.5" font-weight="600" fill="#0f5132">QuicSession（quic_session.h:62）</text><text x="64" y="138" font-size="8.5" fill="#3f8f66">管连接内所有流：GetOrCreateStream(:714)、WritevData(:530)</text><text x="64" y="154" font-size="8.5" fill="#3f8f66">收帧事件分发到对应 QuicStream</text>
  <rect x="80" y="168" width="402" height="64" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="96" y="190" font-size="10.5" font-weight="600" fill="#1b2a4a">QuicStream（quic_stream.h）</text><text x="96" y="210" font-size="8.5" fill="#5b7db1">单条流：收发缓冲 + 流控 + fin/reset</text><text x="96" y="226" font-size="8.5" fill="#5b7db1">应用重写 OnDataAvailable 收数据</text>
  <rect x="48" y="240" width="434" height="72" rx="10" fill="#ffffff" stroke="#e2e2e7"/><text x="64" y="262" font-size="10.5" font-weight="600" fill="#1d1d1f">QuicConnection（quic_connection.h）</text><text x="64" y="282" font-size="8.5" fill="#494950">连接状态机：收发包、握手、丢包/拥塞、CID/迁移</text><text x="64" y="300" font-size="8.5" fill="#494950">Session 建在 Connection 之上（拥有它）</text>
  <line x1="265" y1="160" x2="265" y2="168" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="265" y1="232" x2="265" y2="240" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- Visitor -->
  <rect x="520" y="56" width="470" height="270" rx="14" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="538" y="80" font-size="12.5" font-weight="600" fill="#3c1361">Visitor 回调（控制反转）</text>
  <text x="538" y="102" font-size="9.5" fill="#7a5aa8">连接把"发生了什么"经 Visitor 接口回调上层</text>
  <rect x="538" y="114" width="434" height="46" rx="9" fill="#ffffff" stroke="#d9c9ef"/><text x="554" y="134" font-size="9" font-weight="600" fill="#3c1361">QuicConnectionVisitorInterface</text><text x="554" y="150" font-size="8" fill="#7a5aa8">OnStreamFrame / OnWriteBlocked / OnConnectionClosed…</text>
  <rect x="538" y="168" width="434" height="46" rx="9" fill="#ffffff" stroke="#d9c9ef"/><text x="554" y="188" font-size="9" font-weight="600" fill="#3c1361">QuicSession 就是 Connection 的 Visitor</text><text x="554" y="204" font-size="8" fill="#7a5aa8">Connection 收到帧 → 回调 Session → 找 Stream</text>
  <rect x="538" y="222" width="434" height="46" rx="9" fill="#ffffff" stroke="#d9c9ef"/><text x="554" y="242" font-size="9" font-weight="600" fill="#3c1361">QuicStream 也有 Visitor（通知流事件）</text><text x="554" y="258" font-size="8" fill="#7a5aa8">应用继承 Stream/实现回调消费数据</text>
  <text x="538" y="292" font-size="9" fill="#a58fc9">对比 Cloudflare quiche 的 readable 轮询：QUICHE 用回调推</text>
  <text x="538" y="310" font-size="8.5" fill="#a58fc9">这是 C++ OO + 观察者模式的典型风格</text>

  <!-- 建连 -->
  <rect x="30" y="342" width="960" height="90" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="366" font-size="12" font-weight="600" fill="#1d1d1f">怎么造出来</text>
  <text x="48" y="390" font-size="10" fill="#494950">· 客户端：建 QuicConnection（传 CID/helper/alarm_factory/writer）+ 一个 QuicSpdyClientSession，发起握手</text>
  <text x="48" y="412" font-size="10" fill="#494950">· 服务端：QuicDispatcher 收到新连接的包 → 建 QuicConnection + QuicSession（见 HTTP 与流 / 连接管理）</text>
</svg>
