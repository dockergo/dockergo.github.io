<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="430" viewBox="0 0 1020 430"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="430" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">HTTP/3 与 QPACK · 请求映射到 QUIC 流，QPACK 压缩头且抗队头阻塞</text>

  <!-- HTTP3 -->
  <rect x="30" y="56" width="470" height="230" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="80" font-size="12.5" font-weight="600" fill="#1d1d1f">HTTP/3 = HTTP 语义映射到 QUIC 流</text>
  <rect x="48" y="96" width="434" height="52" rx="10" fill="#f4eefb" stroke="#d9c9ef"/><text x="64" y="116" font-size="9.5" font-weight="600" fill="#3c1361">一请求 = 一双向 QuicSpdyStream</text><text x="64" y="134" font-size="8" fill="#7a5aa8">header 帧 + data 帧，流间独立无队头阻塞</text>
  <rect x="48" y="154" width="434" height="52" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="64" y="174" font-size="9.5" font-weight="600" fill="#1b2a4a">控制流（单向）传 SETTINGS 等</text><text x="64" y="192" font-size="8" fill="#5b7db1">SendControlStream / ReceiveControlStream</text>
  <rect x="48" y="212" width="434" height="64" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="64" y="232" font-size="9.5" font-weight="600" fill="#0f5132">QPACK 编/解码流（单向，各一对）</text><text x="64" y="250" font-size="8" fill="#3f8f66">encoder stream / decoder stream</text><text x="64" y="266" font-size="8" fill="#3f8f66">动态表指令与确认走这两条流</text>

  <!-- QPACK -->
  <rect x="520" y="56" width="470" height="230" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="538" y="80" font-size="12.5" font-weight="600" fill="#1b2a4a">QPACK：HPACK 的抗阻塞改造（qpack/）</text>
  <rect x="538" y="96" width="434" height="52" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="554" y="116" font-size="9.5" font-weight="600" fill="#1b2a4a">静态表 + 动态表 + Huffman</text><text x="554" y="134" font-size="8" fill="#5b7db1">qpack_encoder / qpack_decoder；常见头查表省字节</text>
  <rect x="538" y="154" width="434" height="52" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="554" y="174" font-size="9.5" font-weight="600" fill="#1b2a4a">问题：HPACK 动态表要求严格有序</text><text x="554" y="192" font-size="8" fill="#5b7db1">QUIC 流乱序到达 → 会引入队头阻塞</text>
  <rect x="538" y="212" width="434" height="64" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="554" y="232" font-size="9.5" font-weight="600" fill="#0f5132">解法：blocking manager 追踪依赖</text><text x="554" y="250" font-size="8" fill="#3f8f66">new_qpack_blocking_manager.h</text><text x="554" y="266" font-size="8" fill="#3f8f66">头依赖的动态表项未到 → 该流暂"阻塞"，不拖累别流</text>

  <!-- 编码旅程 -->
  <rect x="30" y="302" width="960" height="108" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="326" font-size="12" font-weight="600" fill="#1d1d1f">一个响应头的编码旅程</text>
  <rect x="70" y="342" width="190" height="48" rx="9" fill="#f4eefb" stroke="#d9c9ef"/><text x="165" y="363" font-size="8.5" font-weight="600" fill="#3c1361" text-anchor="middle">HTTP 头字段集</text><text x="165" y="379" font-size="8" fill="#7a5aa8" text-anchor="middle">status/content-type…</text>
  <rect x="310" y="342" width="190" height="48" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="405" y="363" font-size="8.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">查静/动态表 + Huffman</text><text x="405" y="379" font-size="8" fill="#5b7db1" text-anchor="middle">encoder 编成索引/字面</text>
  <rect x="550" y="342" width="190" height="48" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="645" y="363" font-size="8.5" font-weight="600" fill="#0f5132" text-anchor="middle">经请求流发出</text><text x="645" y="379" font-size="8" fill="#3f8f66" text-anchor="middle">动态表指令走 encoder 流</text>
  <rect x="790" y="342" width="170" height="48" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="875" y="363" font-size="8.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">对端 decoder 还原</text><text x="875" y="379" font-size="8" fill="#5b7db1" text-anchor="middle">依赖到齐才解</text>
  <line x1="260" y1="366" x2="310" y2="366" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="500" y1="366" x2="550" y2="366" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="740" y1="366" x2="790" y2="366" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
</svg>
