<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="450" viewBox="0 0 1020 450"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="450" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">IO 抽象形态 · 应用提供 socket/时钟原语，库经抽象接口驱动它们</text>

  <!-- 三方 -->
  <rect x="30" y="56" width="300" height="180" rx="14" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="48" y="80" font-size="12" font-weight="600" fill="#3c1361">应用（拥有 IO + 事件循环）</text>
  <rect x="48" y="96" width="264" height="40" rx="9" fill="#ffffff" stroke="#d9c9ef"/><text x="180" y="121" font-size="9" fill="#3c1361" text-anchor="middle">UDP socket · epoll/事件循环 · 时钟</text>
  <rect x="48" y="144" width="264" height="40" rx="9" fill="#ffffff" stroke="#d9c9ef"/><text x="180" y="169" font-size="9" fill="#3c1361" text-anchor="middle">实现 QuicPacketWriter / QuicAlarmFactory</text>
  <text x="48" y="208" font-size="9" fill="#7a5aa8">收到 UDP 报 → 喂 ProcessUdpPacket</text>
  <text x="48" y="226" font-size="9" fill="#7a5aa8">实现 Visitor 接收流数据事件</text>

  <rect x="360" y="56" width="300" height="180" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="378" y="80" font-size="12" font-weight="600" fill="#1b2a4a">抽象接口（契约）</text>
  <rect x="378" y="96" width="264" height="40" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="510" y="121" font-size="9" fill="#1b2a4a" text-anchor="middle">QuicPacketWriter：库要发包时调它</text>
  <rect x="378" y="144" width="264" height="40" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="510" y="169" font-size="9" fill="#1b2a4a" text-anchor="middle">QuicAlarm(Factory)：库要计时时建它</text>
  <text x="378" y="208" font-size="9" fill="#5b7db1">库只依赖接口，不依赖具体 IO 实现</text>
  <text x="378" y="226" font-size="9" fill="#5b7db1">测试可注入模拟 writer/alarm/时钟</text>

  <rect x="690" y="56" width="300" height="180" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="708" y="80" font-size="12" font-weight="600" fill="#0f5132">QUICHE 库（拥有协议状态机）</text>
  <rect x="708" y="96" width="264" height="40" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="840" y="121" font-size="9" fill="#0f5132" text-anchor="middle">QuicConnection/Session/Stream 状态机</text>
  <rect x="708" y="144" width="264" height="40" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="840" y="169" font-size="9" fill="#0f5132" text-anchor="middle">解密/解帧/丢包/拥塞/加密/组包</text>
  <text x="708" y="208" font-size="9" fill="#3f8f66">要发包 → 调 Writer；要计时 → 建 Alarm</text>
  <text x="708" y="226" font-size="9" fill="#3f8f66">收到包 → 应用喂 ProcessUdpPacket</text>

  <line x1="330" y1="146" x2="360" y2="146" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="660" y1="146" x2="690" y2="146" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="336" y="138" font-size="8" fill="#86868b">实现</text>
  <text x="666" y="138" font-size="8" fill="#86868b">调用</text>

  <!-- 与 Cloudflare 对照 -->
  <rect x="30" y="252" width="960" height="180" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="276" font-size="12.5" font-weight="600" fill="#1d1d1f">谱系：三种 IO 归属方式</text>
  <rect x="48" y="292" width="290" height="120" rx="10" fill="#fbeaea" stroke="#f0cccc"/><text x="193" y="314" font-size="10" font-weight="600" fill="#7d1f1f" text-anchor="middle">传统库：库拥有 IO</text><text x="193" y="336" font-size="8.5" fill="#b06a6a" text-anchor="middle">内部持 socket、起线程、跑定时器</text><text x="193" y="354" font-size="8.5" fill="#b06a6a" text-anchor="middle">难测、难嵌、绑定 IO 模型</text><text x="193" y="374" font-size="8.5" fill="#b06a6a" text-anchor="middle">如很多阻塞式协议库</text>
  <rect x="364" y="292" width="290" height="120" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="509" y="314" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">Google QUICHE：IO 抽象</text><text x="509" y="336" font-size="8.5" fill="#5b7db1" text-anchor="middle">应用提供 Writer/Alarm 原语</text><text x="509" y="354" font-size="8.5" fill="#5b7db1" text-anchor="middle">库经接口驱动、OO + Visitor 回调</text><text x="509" y="374" font-size="8.5" fill="#5b7db1" text-anchor="middle">可跑 Chromium/Envoy/测试各环境</text>
  <rect x="680" y="292" width="290" height="120" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="825" y="314" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">Cloudflare quiche：纯 sans-IO</text><text x="825" y="336" font-size="8.5" fill="#3f8f66" text-anchor="middle">recv(字节)/send(字节) 纯函数</text><text x="825" y="354" font-size="8.5" fill="#3f8f66" text-anchor="middle">连 Writer/Alarm 抽象都没有</text><text x="825" y="374" font-size="8.5" fill="#5aa06f" text-anchor="middle">（同名不同项目，Rust）</text>
  <text x="48" y="426" font-size="8.5" fill="#86868b">共性：应用掌控真实 IO 与并发模型；库专注协议逻辑，可测可嵌——只是抽象粒度不同</text>
</svg>
