<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="360" viewBox="0 0 1020 360"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
  </defs>
  <rect width="1020" height="360" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">接口 × 能力域 依赖矩阵（■ 强　▨ 中　· 弱/无）</text>

  <text x="212" y="70" font-size="8.5" font-weight="600" fill="#7a4d00" text-anchor="middle">包与帧</text>
  <text x="290" y="70" font-size="8.5" font-weight="600" fill="#7d1f1f" text-anchor="middle">TLS加密</text>
  <text x="368" y="70" font-size="8.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">流+流控</text>
  <text x="446" y="70" font-size="8.5" font-weight="600" fill="#0f5132" text-anchor="middle">丢包恢复</text>
  <text x="524" y="70" font-size="8.5" font-weight="600" fill="#3c1361" text-anchor="middle">拥塞控制</text>
  <text x="602" y="70" font-size="8.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">连接迁移</text>
  <text x="680" y="70" font-size="8.5" font-weight="600" fill="#3c1361" text-anchor="middle">HTTP3/QPACK</text>
  <text x="758" y="70" font-size="8.5" font-weight="600" fill="#7d1f1f" text-anchor="middle">抗攻击</text>

  <text x="55" y="122" font-size="11" font-weight="600" fill="#3c1361">会话连接</text>
  <text x="55" y="192" font-size="11" font-weight="600" fill="#3c1361">IO与事件</text>
  <text x="55" y="262" font-size="11" font-weight="600" fill="#3c1361">HTTP与流</text>

  <!-- 会话连接 -->
  <g>
    <rect x="179" y="100" width="66" height="54" rx="9" fill="#e8d49a" stroke="#f0dcae"/><text x="212" y="132" font-size="12" fill="#7a4d00" text-anchor="middle">■</text>
    <rect x="257" y="100" width="66" height="54" rx="9" fill="#f3d4d4" stroke="#f0cccc"/><text x="290" y="132" font-size="12" fill="#7d1f1f" text-anchor="middle">■</text>
    <rect x="335" y="100" width="66" height="54" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="368" y="132" font-size="12" fill="#1b2a4a" text-anchor="middle">▨</text>
    <rect x="413" y="100" width="66" height="54" rx="9" fill="#f6f6f8" stroke="#e2e2e7"/><text x="446" y="132" font-size="12" fill="#c0c0c5" text-anchor="middle">·</text>
    <rect x="491" y="100" width="66" height="54" rx="9" fill="#f6f6f8" stroke="#e2e2e7"/><text x="524" y="132" font-size="12" fill="#c0c0c5" text-anchor="middle">·</text>
    <rect x="569" y="100" width="66" height="54" rx="9" fill="#dfe8f5" stroke="#bcd0ec"/><text x="602" y="132" font-size="12" fill="#1b2a4a" text-anchor="middle">■</text>
    <rect x="647" y="100" width="66" height="54" rx="9" fill="#f6f6f8" stroke="#e2e2e7"/><text x="680" y="132" font-size="12" fill="#c0c0c5" text-anchor="middle">·</text>
    <rect x="725" y="100" width="66" height="54" rx="9" fill="#f3d4d4" stroke="#f0cccc"/><text x="758" y="132" font-size="12" fill="#7d1f1f" text-anchor="middle">■</text>
  </g>
  <!-- IO与事件 -->
  <g>
    <rect x="179" y="170" width="66" height="54" rx="9" fill="#e8d49a" stroke="#f0dcae"/><text x="212" y="202" font-size="12" fill="#7a4d00" text-anchor="middle">■</text>
    <rect x="257" y="170" width="66" height="54" rx="9" fill="#f3d4d4" stroke="#f0cccc"/><text x="290" y="202" font-size="12" fill="#7d1f1f" text-anchor="middle">■</text>
    <rect x="335" y="170" width="66" height="54" rx="9" fill="#dfe8f5" stroke="#bcd0ec"/><text x="368" y="202" font-size="12" fill="#1b2a4a" text-anchor="middle">■</text>
    <rect x="413" y="170" width="66" height="54" rx="9" fill="#cfe8da" stroke="#bce6cd"/><text x="446" y="202" font-size="12" fill="#0f5132" text-anchor="middle">■</text>
    <rect x="491" y="170" width="66" height="54" rx="9" fill="#e3d5f3" stroke="#d9c9ef"/><text x="524" y="202" font-size="12" fill="#3c1361" text-anchor="middle">■</text>
    <rect x="569" y="170" width="66" height="54" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="602" y="202" font-size="12" fill="#1b2a4a" text-anchor="middle">▨</text>
    <rect x="647" y="170" width="66" height="54" rx="9" fill="#f6f6f8" stroke="#e2e2e7"/><text x="680" y="202" font-size="12" fill="#c0c0c5" text-anchor="middle">·</text>
    <rect x="725" y="170" width="66" height="54" rx="9" fill="#fbeaea" stroke="#f0cccc"/><text x="758" y="202" font-size="12" fill="#7d1f1f" text-anchor="middle">▨</text>
  </g>
  <!-- HTTP与流 -->
  <g>
    <rect x="179" y="240" width="66" height="54" rx="9" fill="#f2e7c6" stroke="#f0dcae"/><text x="212" y="272" font-size="12" fill="#7a4d00" text-anchor="middle">▨</text>
    <rect x="257" y="240" width="66" height="54" rx="9" fill="#f6f6f8" stroke="#e2e2e7"/><text x="290" y="272" font-size="12" fill="#c0c0c5" text-anchor="middle">·</text>
    <rect x="335" y="240" width="66" height="54" rx="9" fill="#dfe8f5" stroke="#bcd0ec"/><text x="368" y="272" font-size="12" fill="#1b2a4a" text-anchor="middle">■</text>
    <rect x="413" y="240" width="66" height="54" rx="9" fill="#f6f6f8" stroke="#e2e2e7"/><text x="446" y="272" font-size="12" fill="#c0c0c5" text-anchor="middle">·</text>
    <rect x="491" y="240" width="66" height="54" rx="9" fill="#f6f6f8" stroke="#e2e2e7"/><text x="524" y="272" font-size="12" fill="#c0c0c5" text-anchor="middle">·</text>
    <rect x="569" y="240" width="66" height="54" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="602" y="272" font-size="12" fill="#1b2a4a" text-anchor="middle">▨</text>
    <rect x="647" y="240" width="66" height="54" rx="9" fill="#e3d5f3" stroke="#d9c9ef"/><text x="680" y="272" font-size="12" fill="#3c1361" text-anchor="middle">■</text>
    <rect x="725" y="240" width="66" height="54" rx="9" fill="#f6f6f8" stroke="#e2e2e7"/><text x="758" y="272" font-size="12" fill="#c0c0c5" text-anchor="middle">·</text>
  </g>

  <text x="30" y="326" font-size="10.5" fill="#86868b">IO 与事件（ProcessUdpPacket/Writer/Alarm）几乎踩满全部传输能力域；会话连接以包/帧+TLS+连接迁移+抗攻击为轴；HTTP 与流主用流+流控与 QPACK。</text>
  <text x="30" y="346" font-size="10.5" fill="#494950">灵魂：<tspan font-weight="600" fill="#1b2a4a">IO 与事件驱动</tspan>（QuicConnection 收发引擎）与 <tspan font-weight="600" fill="#7d1f1f">TLS 加密 + 连接状态机</tspan>（QUIC 强制加密 + 有状态传输）。</text>
</svg>
