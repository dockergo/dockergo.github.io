<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="450" viewBox="0 0 1020 450"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="450" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">HTTP 与流 · QuicSpdySession 承载 HTTP/2·HTTP/3，服务端 QuicDispatcher 接客</text>

  <!-- HTTP layer -->
  <rect x="30" y="56" width="470" height="200" rx="14" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="48" y="80" font-size="12.5" font-weight="600" fill="#3c1361">QuicSpdySession（HTTP over QUIC）</text>
  <text x="48" y="102" font-size="9.5" fill="#7a5aa8">QuicSession 的子类，加 HTTP 语义（quic/core/http/）</text>
  <rect x="48" y="114" width="434" height="44" rx="9" fill="#ffffff" stroke="#d9c9ef"/><text x="64" y="134" font-size="9" font-weight="600" fill="#3c1361">QuicSpdyStream：一请求一双向流</text><text x="64" y="150" font-size="8" fill="#7a5aa8">承载 header + body（quic_spdy_stream.h）</text>
  <rect x="48" y="164" width="434" height="44" rx="9" fill="#ffffff" stroke="#d9c9ef"/><text x="64" y="184" font-size="9" font-weight="600" fill="#3c1361">控制流：QuicSendControlStream / ReceiveControlStream</text><text x="64" y="200" font-size="8" fill="#7a5aa8">HTTP/3 设置、QPACK 编解码流</text>
  <text x="48" y="230" font-size="9" fill="#a58fc9">HTTP/2 走 quiche/http2/（HPACK）；HTTP/3 走这里（QPACK）</text>
  <text x="48" y="248" font-size="8.5" fill="#a58fc9">应用继承 stream 处理请求/响应</text>

  <!-- Dispatcher -->
  <rect x="520" y="56" width="470" height="200" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="538" y="80" font-size="12.5" font-weight="600" fill="#1b2a4a">QuicDispatcher（服务端接客 · quic_dispatcher.h:62）</text>
  <rect x="538" y="96" width="434" height="44" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="554" y="116" font-size="9" font-weight="600" fill="#1b2a4a">ProcessPacket(:85)：所有入站包先到它</text><text x="554" y="132" font-size="8" fill="#5b7db1">按 connection ID 查已有会话 / 判是否新连接</text>
  <rect x="538" y="146" width="434" height="44" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="554" y="166" font-size="9" font-weight="600" fill="#1b2a4a">已有 CID → 路由到对应 QuicSession</text><text x="554" y="182" font-size="8" fill="#5b7db1">新 CID + 合法 Initial → 建新 Session（CreateQuicSession）</text>
  <rect x="538" y="196" width="434" height="44" rx="9" fill="#fbeaea" stroke="#f0cccc"/><text x="554" y="216" font-size="9" font-weight="600" fill="#7d1f1f">兼做入口防护</text><text x="554" y="232" font-size="8" fill="#b06a6a">Retry 地址验证、缓冲 Initial、限流抗 DoS（见抗攻击）</text>

  <!-- 一个请求 -->
  <rect x="30" y="272" width="960" height="160" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="296" font-size="12.5" font-weight="600" fill="#1d1d1f">一个 HTTP/3 请求在服务端的旅程</text>
  <rect x="48" y="312" width="175" height="100" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="135" y="336" font-size="9" font-weight="600" fill="#1b2a4a" text-anchor="middle">Dispatcher</text><text x="135" y="356" font-size="8" fill="#5b7db1" text-anchor="middle">收包按 CID 路由</text><text x="135" y="374" font-size="8" fill="#5b7db1" text-anchor="middle">新连接建 Session</text>
  <rect x="239" y="312" width="175" height="100" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="326" y="336" font-size="9" font-weight="600" fill="#0f5132" text-anchor="middle">Connection</text><text x="326" y="356" font-size="8" fill="#3f8f66" text-anchor="middle">解密解帧</text><text x="326" y="374" font-size="8" fill="#3f8f66" text-anchor="middle">STREAM 帧 → Session</text>
  <rect x="430" y="312" width="175" height="100" rx="10" fill="#f4eefb" stroke="#d9c9ef"/><text x="517" y="336" font-size="9" font-weight="600" fill="#3c1361" text-anchor="middle">SpdySession/Stream</text><text x="517" y="356" font-size="8" fill="#7a5aa8" text-anchor="middle">QPACK 解头</text><text x="517" y="374" font-size="8" fill="#7a5aa8" text-anchor="middle">组装 HTTP 请求</text>
  <rect x="621" y="312" width="175" height="100" rx="10" fill="#fff7e6" stroke="#f0dcae"/><text x="708" y="336" font-size="9" font-weight="600" fill="#7a4d00" text-anchor="middle">应用处理</text><text x="708" y="356" font-size="8" fill="#9a7328" text-anchor="middle">生成响应</text><text x="708" y="374" font-size="8" fill="#9a7328" text-anchor="middle">写回 stream</text>
  <rect x="812" y="312" width="158" height="100" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="891" y="336" font-size="9" font-weight="600" fill="#0f5132" text-anchor="middle">回程</text><text x="891" y="356" font-size="8" fill="#3f8f66" text-anchor="middle">QPACK 编头</text><text x="891" y="374" font-size="8" fill="#3f8f66" text-anchor="middle">经 Writer 发出</text>
  <line x1="223" y1="362" x2="239" y2="362" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="414" y1="362" x2="430" y2="362" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="605" y1="362" x2="621" y2="362" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="796" y1="362" x2="812" y2="362" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
</svg>
