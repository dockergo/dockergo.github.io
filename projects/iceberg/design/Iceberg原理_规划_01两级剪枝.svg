<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1080" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Iceberg 扫描规划 · 两级剪枝(先粗后细,不 list 目录)</text>
  <text x="30" y="50" font-size="11" fill="#a1a1a6">DataTableScan 读 snapshot 的 manifests 建 ManifestGroup → 分区摘要剪 manifest → 列统计剪 data file</text>

  <!-- entry (interface / purple) -->
  <rect x="40" y="78" width="1000" height="74" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="60" y="106" font-size="12.5" font-weight="600" fill="#3d2a5a">DataTableScan.doPlanFiles · 建 ManifestGroup</text>
  <text x="60" y="128" font-size="9.5" fill="#5b7db1">拿 snapshot 的 dataManifests + deleteManifests</text>

  <!-- level 1 (metadata / blue) -->
  <rect x="40" y="180" width="1000" height="118" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="60" y="208" font-size="12.5" font-weight="600" fill="#1b2a4a">第一级 · manifest 剪枝(粗粒度)</text>
  <text x="60" y="227" font-size="9.5" fill="#5b7db1">ManifestEvaluator.forPartitionFilter(按 spec id 缓存)</text>
  <rect x="60" y="240" width="300" height="44" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="76" y="260" font-size="10" fill="#1b2a4a">用 manifest list 的分区摘要</text>
  <text x="76" y="278" font-size="9.5" fill="#5b7db1">分区值不可能匹配 → 整个 manifest 跳过</text>
  <rect x="376" y="240" width="300" height="44" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="392" y="260" font-size="10" fill="#12402a">存活 manifest 进入第二级</text>
  <text x="392" y="278" font-size="9.5" fill="#2f6f4f">一次跳过一整批文件</text>
  <rect x="692" y="240" width="328" height="44" rx="8" fill="#fbeaea" stroke="#e9c4c4"/>
  <text x="708" y="260" font-size="10" fill="#7a2626">不匹配 manifest · 整批剪掉</text>
  <text x="708" y="278" font-size="9.5" fill="#a15252">不 list 目录,只读元数据摘要</text>

  <path d="M540,152 L540,180" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- level 2 (metadata / blue) -->
  <rect x="40" y="326" width="1000" height="118" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="60" y="354" font-size="12.5" font-weight="600" fill="#1b2a4a">第二级 · data file 剪枝(细粒度)</text>
  <text x="60" y="373" font-size="9.5" fill="#5b7db1">ManifestReader: 分区 Evaluator + InclusiveMetricsEvaluator</text>
  <rect x="60" y="386" width="300" height="44" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="76" y="406" font-size="10" fill="#1b2a4a">读列统计 lower/upper bounds</text>
  <text x="76" y="424" font-size="9.5" fill="#5b7db1">+ null counts,逐 data file 过滤</text>
  <rect x="376" y="386" width="300" height="44" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="392" y="406" font-size="10" fill="#12402a">存活 data file → 组扫描任务</text>
  <text x="392" y="424" font-size="9.5" fill="#2f6f4f">交计算引擎读</text>
  <rect x="692" y="386" width="328" height="44" rx="8" fill="#fbeaea" stroke="#e9c4c4"/>
  <text x="708" y="406" font-size="10" fill="#7a2626">min/max 不匹配谓词 · 跳过文件</text>
  <text x="708" y="424" font-size="9.5" fill="#a15252">乱序数据 min/max 覆盖全域则剪不掉</text>

  <path d="M405,298 L405,326" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="416" y="316" font-size="9" fill="#a1a1a6">仅存活 manifest</text>

  <!-- conclusion (green) -->
  <rect x="40" y="472" width="1000" height="64" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="60" y="500" font-size="12" font-weight="600" fill="#12402a">先粗(分区摘要)后细(列统计) —— 只读极少量元数据即定位相关文件,是查询快的关键</text>
  <text x="60" y="521" font-size="9.5" fill="#2f6f4f">分区摘要在 manifest list(先剪) · 列统计在 manifest 条目(后剪)</text>
  <path d="M405,444 L405,472" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
</svg>
