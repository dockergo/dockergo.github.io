<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="700" fill="#1d1d1f">Manifest 文件 · 条目状态与列统计</text>
  <text x="30" y="49" font-size="9.5" fill="#a1a1a6">Manifest 是"data file 清单 + 每文件统计";ManifestEntry 记状态,ManifestReader 读时剪枝</text>

  <!-- entry status -->
  <text x="30" y="82" font-size="11" font-weight="700" fill="#5a3410">ManifestEntry.Status</text>
  <g text-anchor="middle" font-size="9.5">
    <rect x="60" y="94" width="220" height="56" rx="11" fill="#f5faf6" stroke="#cfe6d5"/><text x="170" y="118" font-weight="700" fill="#12402a">ADDED(1)</text><text x="170" y="138" font-size="8.4" fill="#2f6f4f">本次提交新增 · live</text>
    <rect x="300" y="94" width="220" height="56" rx="11" fill="#f6f8fc" stroke="#dbe6f3"/><text x="410" y="118" font-weight="700" fill="#1b2a4a">EXISTING(0)</text><text x="410" y="138" font-size="8.4" fill="#5b7db1">沿用旧文件 · live</text>
    <rect x="540" y="94" width="220" height="56" rx="11" fill="#f9ecec" stroke="#e8c9c9"/><text x="650" y="118" font-weight="700" fill="#7a2230">DELETED(2)</text><text x="650" y="138" font-size="8.4" fill="#a85560">已移除 · 非 live</text>
  </g>
  <text x="790" y="115" font-size="9" fill="#6e6e73">isLive = ADDED || EXISTING</text>
  <text x="790" y="133" font-size="8.5" fill="#a1a1a6">live 条目才参与扫描</text>

  <!-- write path -->
  <rect x="30" y="172" width="500" height="150" rx="12" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="196" font-size="11" font-weight="700" fill="#12402a">写 · ManifestWriter</text>
  <g font-size="9.5" fill="#2f6f4f">
  <text x="46" y="222">add(file) —— 写 ADDED 条目</text>
  <text x="46" y="246">existing(file) —— 写 EXISTING(沿用)</text>
  <text x="46" y="270">delete(file) —— 写 DELETED 条目</text>
  </g>
  <text x="46" y="300" font-size="8.5" fill="#5b8f6f">条目含 status · snapshot_id · data/file sequence number · data_file 结构</text>

  <!-- read prune -->
  <rect x="550" y="172" width="500" height="150" rx="12" fill="#e7f0fb" stroke="#b9d2ef"/>
  <text x="566" y="196" font-size="11" font-weight="700" fill="#1b2a4a">读时剪枝 · ManifestReader</text>
  <g font-size="9.5" fill="#5b7db1">
  <text x="566" y="222">分区 Evaluator —— 按分区值过滤</text>
  <text x="566" y="246">InclusiveMetricsEvaluator —— 按列统计</text>
  <text x="566" y="270">　(lower/upper bounds · null counts)</text>
  </g>
  <text x="566" y="300" font-size="8.5" fill="#4a6fa0">manifest 内逐 data file:min/max 不匹配谓词则整个文件跳过</text>

  <!-- stats fuel -->
  <rect x="30" y="342" width="1020" height="76" rx="12" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="46" y="366" font-size="11" font-weight="700" fill="#5a3410">per-file 列统计 = 剪枝的燃料</text>
  <text x="46" y="388" font-size="9.5" fill="#93762e">每个 DataFile 存各列的 min / max / null 数(lower_bounds/upper_bounds/null_value_counts)</text>
  <text x="46" y="407" font-size="9.5" fill="#93762e">查询谓词(如 WHERE age &gt; 30)靠它判断"整个文件是否可能命中",不命中直接跳过 —— 无需打开文件</text>

  <rect x="30" y="434" width="1020" height="66" rx="12" fill="#f7f9fc" stroke="#e5ecf5"/>
  <text x="46" y="458" font-size="10.5" font-weight="700" fill="#1b2a4a">Manifest ≠ 数据文件</text>
  <text x="46" y="479" font-size="9.5" fill="#5b7db1">Manifest 是"data file 的清单 + 每文件统计"(元数据);data file 才是真数据(parquet/orc)。剪枝靠读少量 manifest 元数据完成,</text>
  <text x="46" y="497" font-size="9.5" fill="#5b7db1">而非打开大量数据文件 —— 规划成本与相关文件数成正比,与全表文件数无关。</text>
</svg>
