<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1080" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Iceberg 行级删除 · 序列号决定作用范围</text>
  <text x="30" y="50" font-size="11" fill="#a1a1a6">DeleteFileIndex 四路索引;seq 比较精确表达"删除只作用于其时刻已有的数据"的时序语义</text>

  <!-- DeleteFileIndex 4-way (metadata / blue) -->
  <rect x="40" y="80" width="1000" height="120" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="60" y="108" font-size="12.5" font-weight="600" fill="#1b2a4a">DeleteFileIndex · 四路索引</text>
  <rect x="60" y="122" width="184" height="60" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="152" y="148" font-size="10" fill="#1b2a4a" text-anchor="middle">globalDeletes</text>
  <text x="152" y="168" font-size="9" fill="#5b7db1" text-anchor="middle">等值 · 全局</text>
  <rect x="256" y="122" width="184" height="60" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="348" y="148" font-size="10" fill="#1b2a4a" text-anchor="middle">eqDeletesByPartition</text>
  <text x="348" y="168" font-size="9" fill="#5b7db1" text-anchor="middle">等值 · 按分区</text>
  <rect x="452" y="122" width="184" height="60" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="544" y="148" font-size="10" fill="#1b2a4a" text-anchor="middle">posDeletesByPartition</text>
  <text x="544" y="168" font-size="9" fill="#5b7db1" text-anchor="middle">位置 · 按分区</text>
  <rect x="648" y="122" width="184" height="60" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="740" y="148" font-size="10" fill="#1b2a4a" text-anchor="middle">posDeletesByPath</text>
  <text x="740" y="168" font-size="9" fill="#5b7db1" text-anchor="middle">位置 · 按路径</text>
  <rect x="844" y="122" width="176" height="60" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="932" y="148" font-size="10" fill="#12402a" text-anchor="middle">dvByPath</text>
  <text x="932" y="168" font-size="9" fill="#2f6f4f" text-anchor="middle">删除向量 DV</text>

  <!-- position rule (logic / blue tint) -->
  <rect x="40" y="230" width="490" height="150" rx="13" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="60" y="260" font-size="12.5" font-weight="600" fill="#274a78">位置删除规则</text>
  <rect x="60" y="276" width="450" height="40" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="285" y="301" font-size="11" font-weight="600" fill="#274a78" text-anchor="middle">delete.seq &#8805; dataFile.seq 才生效</text>
  <text x="60" y="340" font-size="10" fill="#274a78">删除作用于它写入时刻已存在的数据文件</text>
  <text x="60" y="362" font-size="9.5" fill="#5b7db1">含同 seq(&#8805;) —— 覆盖写入当刻的数据</text>

  <!-- equality rule (logic / blue tint) -->
  <rect x="550" y="230" width="490" height="150" rx="13" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="570" y="260" font-size="12.5" font-weight="600" fill="#274a78">等值删除规则</text>
  <rect x="570" y="276" width="450" height="40" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="795" y="301" font-size="11" font-weight="600" fill="#274a78" text-anchor="middle">作用于严格更老 seq · applySeq = seq-1</text>
  <text x="570" y="340" font-size="10" fill="#274a78">file.seq &gt; minSequenceNumber 才应用</text>
  <text x="570" y="362" font-size="9.5" fill="#5b7db1">不能删它之后写入的同值行(那是新数据)</text>

  <path d="M400,200 L400,230" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M640,200 L640,230" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- conclusion (green) -->
  <rect x="40" y="410" width="1000" height="120" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="60" y="440" font-size="12.5" font-weight="600" fill="#12402a">为什么按 seq · 删除是"某时刻的操作"</text>
  <text x="60" y="464" font-size="10" fill="#2f6f4f">删除只应作用于该时刻已有的数据;之后写入的数据是新的、不该被旧删除影响</text>
  <rect x="60" y="478" width="470" height="40" rx="8" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="76" y="503" font-size="10" fill="#12402a">位置删: seq &#8805; 覆盖写入当刻及更老</text>
  <rect x="550" y="478" width="470" height="40" rx="8" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="566" y="503" font-size="10" fill="#12402a">等值删: 严格更老,不碰后写的新数据</text>

  <path d="M400,380 L400,410" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M640,380 L640,410" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
</svg>
