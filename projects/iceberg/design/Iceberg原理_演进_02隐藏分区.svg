<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="530" viewBox="0 0 1080 530"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1080" height="530" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Iceberg 隐藏分区 · 分区值从源列经 Transform 派生</text>
  <text x="30" y="50" font-size="11" fill="#a1a1a6">用户查源列,引擎自动用分区剪枝 —— 不会因忘写分区谓词而全扫</text>

  <!-- PartitionField definition (metadata / blue) -->
  <rect x="40" y="78" width="1000" height="96" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="60" y="106" font-size="12.5" font-weight="600" fill="#1b2a4a">PartitionField = (源列字段 ID, 分区字段 ID, 目标名, Transform)</text>
  <text x="60" y="125" font-size="9.5" fill="#5b7db1">分区值从源列派生,不是单独一列</text>
  <rect x="60" y="138" width="228" height="26" rx="7" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="174" y="155" font-size="10" fill="#1b2a4a" text-anchor="middle">源列字段 ID</text>
  <rect x="300" y="138" width="228" height="26" rx="7" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="414" y="155" font-size="10" fill="#1b2a4a" text-anchor="middle">分区字段 ID</text>
  <rect x="540" y="138" width="228" height="26" rx="7" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="654" y="155" font-size="10" fill="#1b2a4a" text-anchor="middle">目标名</text>
  <rect x="780" y="138" width="240" height="26" rx="7" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="900" y="155" font-size="10" fill="#1b2a4a" text-anchor="middle">Transform</text>

  <!-- Transform full set (logic / blue tint) -->
  <rect x="40" y="204" width="1000" height="92" rx="13" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="60" y="230" font-size="12" font-weight="600" fill="#274a78">Transform 全集</text>
  <text x="60" y="248" font-size="9.5" fill="#5b7db1">例:day(ts) 把时间戳映射到天分区</text>
  <rect x="60" y="260" width="126" height="26" rx="7" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="123" y="277" font-size="10" fill="#274a78" text-anchor="middle">identity</text>
  <rect x="196" y="260" width="126" height="26" rx="7" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="259" y="277" font-size="10" fill="#274a78" text-anchor="middle">year</text>
  <rect x="332" y="260" width="126" height="26" rx="7" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="395" y="277" font-size="10" fill="#274a78" text-anchor="middle">month</text>
  <rect x="468" y="260" width="126" height="26" rx="7" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="531" y="277" font-size="10" fill="#274a78" text-anchor="middle">day</text>
  <rect x="604" y="260" width="126" height="26" rx="7" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="667" y="277" font-size="10" fill="#274a78" text-anchor="middle">hour</text>
  <rect x="740" y="260" width="136" height="26" rx="7" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="808" y="277" font-size="10" fill="#274a78" text-anchor="middle">bucket(n)</text>
  <rect x="886" y="260" width="134" height="26" rx="7" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="953" y="277" font-size="10" fill="#274a78" text-anchor="middle">truncate(w)</text>

  <path d="M540,174 L540,204" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- Iceberg hidden partition flow (interface / purple) -->
  <rect x="40" y="326" width="490" height="176" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="60" y="356" font-size="12.5" font-weight="600" fill="#3d2a5a">Iceberg · 隐藏分区</text>
  <rect x="60" y="372" width="450" height="34" rx="8" fill="#ffffff" stroke="#e0d0ef"/>
  <text x="76" y="393" font-size="10.5" fill="#3d2a5a">用户查源列: WHERE ts &gt; '2024-01-01'</text>
  <path d="M285,406 L285,424" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <rect x="60" y="426" width="450" height="34" rx="8" fill="#ffffff" stroke="#e0d0ef"/>
  <text x="76" y="447" font-size="10.5" fill="#3d2a5a">引擎从 Transform day(ts) 自动剪枝</text>
  <text x="60" y="486" font-size="10.5" font-weight="600" fill="#12402a">→ 无需写分区谓词,也不会全扫</text>

  <!-- Hive comparison (warning / red) -->
  <rect x="550" y="326" width="490" height="176" rx="13" fill="#fbeaea" stroke="#e9c4c4" filter="url(#soft)"/>
  <text x="570" y="356" font-size="12.5" font-weight="600" fill="#7a2626">对比 Hive · 显式分区列</text>
  <rect x="570" y="372" width="450" height="34" rx="8" fill="#ffffff" stroke="#eccccc"/>
  <text x="586" y="393" font-size="10.5" fill="#7a2626">用户显式建分区列 dt 并手动写值</text>
  <path d="M795,406 L795,424" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <rect x="570" y="426" width="450" height="34" rx="8" fill="#ffffff" stroke="#eccccc"/>
  <text x="586" y="447" font-size="10.5" fill="#7a2626">查询须写 WHERE dt='...' 才剪枝</text>
  <text x="570" y="486" font-size="10.5" font-weight="600" fill="#7a2626">→ 忘写分区谓词 = 全表扫描</text>
</svg>
