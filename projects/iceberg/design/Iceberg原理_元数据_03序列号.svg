<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="700" fill="#1d1d1f">sequence number · 贯穿快照 / manifest / 行级删除的时序线</text>
  <text x="30" y="49" font-size="9.5" fill="#a1a1a6">每次提交分配递增 seq;seq 让"删除只作用于其时刻已有数据"这一时序语义可精确判定</text>

  <!-- assign -->
  <rect x="30" y="70" width="1020" height="60" rx="12" fill="#e7f0fb" stroke="#b9d2ef"/>
  <text x="46" y="94" font-size="10.5" font-weight="700" fill="#1b2a4a">分配:每次提交 sequenceNumber = base.nextSequenceNumber</text>
  <text x="46" y="116" font-size="9" fill="#5b7db1">seq 单调递增,与快照一一对应;贯穿三处 —— 快照、manifest 条目、delete file</text>

  <!-- two seq on entry -->
  <rect x="30" y="146" width="500" height="120" rx="12" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="46" y="170" font-size="10.5" font-weight="700" fill="#5a3410">ManifestEntry 带两个 seq</text>
  <text x="46" y="194" font-size="9.5" fill="#93762e">data_sequence_number —— 数据的序列号</text>
  <text x="46" y="212" font-size="8.6" fill="#b3934a">　可比"添加它的快照"更老(如 compaction 保留原 seq)</text>
  <text x="46" y="234" font-size="9.5" fill="#93762e">file_sequence_number —— 文件写入的序列号</text>
  <text x="46" y="255" font-size="8.6" fill="#b3934a">　compaction 重写数据但保留 data_seq,删除仍正确作用</text>

  <rect x="550" y="146" width="500" height="120" rx="12" fill="#f9ecec" stroke="#e8c9c9"/>
  <text x="566" y="170" font-size="10.5" font-weight="700" fill="#7a2230">行级删除靠 seq 比较</text>
  <text x="566" y="194" font-size="9.5" fill="#a85560">位置删除:delete.seq ≥ dataFile.seq 才生效</text>
  <text x="566" y="213" font-size="8.6" fill="#c07882">　作用于删除写入时刻已存在的数据文件(含同 seq)</text>
  <text x="566" y="235" font-size="9.5" fill="#a85560">等值删除:作用于【严格更老】seq 的文件</text>
  <text x="566" y="255" font-size="8.6" fill="#c07882">　不能删它之后写入的同值行(那是新数据)</text>

  <!-- timeline -->
  <text x="30" y="298" font-size="11" font-weight="700" fill="#1d1d1f">时序示例</text>
  <line x1="60" y1="360" x2="1020" y2="360" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <g text-anchor="middle" font-size="8.6">
    <rect x="90" y="322" width="150" height="34" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="165" y="343" fill="#5a3410">data A(seq=1)</text>
    <rect x="300" y="322" width="150" height="34" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="375" y="343" fill="#5a3410">data B(seq=2)</text>
    <rect x="510" y="322" width="180" height="34" rx="8" fill="#f9ecec" stroke="#e8c9c9"/><text x="600" y="343" fill="#7a2230">eq-delete(seq=3)</text>
    <rect x="750" y="322" width="150" height="34" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="825" y="343" fill="#5a3410">data C(seq=4)</text>
  </g>
  <g font-size="8" fill="#86868b" text-anchor="middle">
    <text x="165" y="376">t1</text><text x="375" y="376">t2</text><text x="600" y="376">t3</text><text x="825" y="376">t4</text>
  </g>

  <rect x="30" y="392" width="1020" height="54" rx="12" fill="#f7f9fc" stroke="#e5ecf5"/>
  <text x="46" y="415" font-size="9.5" fill="#7a2230"><tspan font-weight="700">等值删除(seq=3)作用范围:</tspan> 只删 seq&lt;3 的 A、B 中匹配的行;不影响 seq=4 的 C(它是删除之后写入的新数据)</text>
  <text x="46" y="435" font-size="9" fill="#5b7db1">→ 若之后又写入同值行(C),它是"新事实",不该被旧删除抹掉。seq 比较精确表达了这个时序。</text>

  <rect x="30" y="458" width="1020" height="46" rx="12" fill="#f0f0f4" stroke="#d2d2d7"/>
  <text x="46" y="486" font-size="9.5" fill="#48484a"><tspan font-weight="700">一句话:</tspan> seq 是"逻辑时钟",让 Iceberg 在不重写数据的前提下正确判断"哪些删除应用到哪些数据文件" —— v2 merge-on-read 的正确性基础。</text>
</svg>
