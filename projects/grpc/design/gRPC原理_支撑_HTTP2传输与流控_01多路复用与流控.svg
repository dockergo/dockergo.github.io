<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="500" viewBox="0 0 1040 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="3.5" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="hh" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="sh2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c99a3a"/></marker></defs>
  <rect width="1040" height="500" fill="#fbfbfd"/>
  <text x="24" y="30" font-size="14" font-weight="700" fill="#1d1d1f">HTTP/2 传输与流控：单连接多路复用 · 帧化 · flow control/BDP · HPACK</text>
  <text x="24" y="49" font-size="10" fill="#8a8a8e">客户端与服务端共用同一 transport 实现；一条 TCP/TLS 连接承载 N 个 stream，帧交织、窗口对账</text>

  <!-- one connection multiple streams -->
  <rect x="24" y="66" width="620" height="180" rx="12" fill="#fbf7ef" stroke="#ecdcbf"/>
  <text x="40" y="87" font-size="11" font-weight="700" fill="#8a6d3b">① 单连接多路复用（chttp2_transport.cc）</text>
  <text x="40" y="105" font-size="8.5" fill="#a98d54">next_stream_id 低位定奇偶：client 用奇数、server 用偶数（:424-429）</text>

  <g font-size="8.5" text-anchor="middle">
    <rect x="40" y="118" width="180" height="50" rx="8" fill="#eef8f2" stroke="#cbe6d5"/><text x="130" y="138" font-weight="600" fill="#1c7a4d">stream 1（奇）</text><text x="130" y="154" font-size="7.5" fill="#3a8a63">HEADERS→DATA→DATA</text>
    <rect x="230" y="118" width="180" height="50" rx="8" fill="#eef8f2" stroke="#cbe6d5"/><text x="320" y="138" font-weight="600" fill="#1c7a4d">stream 3（奇）</text><text x="320" y="154" font-size="7.5" fill="#3a8a63">HEADERS→DATA</text>
    <rect x="420" y="118" width="200" height="50" rx="8" fill="#f5f0fb" stroke="#ddccef"/><text x="520" y="138" font-weight="600" fill="#6f3ea8">stream 2（偶·server 推）</text><text x="520" y="154" font-size="7.5" fill="#9a76c0">HEADERS→DATA</text>
  </g>
  <rect x="40" y="180" width="580" height="24" rx="6" fill="#f2f4f7" stroke="#dfe3ea"/>
  <text x="330" y="196" font-size="8" fill="#5a6473" text-anchor="middle">帧交织复用同一连接：H1|D1|H3|D2|D1|… 各 stream 独立推进，无队头阻塞</text>
  <text x="40" y="222" font-size="8" fill="#a98d54">写驱动：grpc_chttp2_initiate_write(reason)（:1132）——按 SEND_MESSAGE/START_NEW_STREAM 等原因合并触发写</text>
  <text x="40" y="238" font-size="8" fill="#a98d54">读写状态机：write_action* / read_action*（:163-176）· maybe_start_some_streams（:1454）受 MAX_CONCURRENT_STREAMS 限</text>

  <!-- flow control -->
  <rect x="660" y="66" width="356" height="180" rx="12" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="676" y="87" font-size="11" font-weight="700" fill="#4f6f9f">② 流控 + BDP（flow_control.h/.cc）</text>
  <text x="676" y="107" font-size="8.5" fill="#6e6e73">两级窗口：</text>
  <rect x="676" y="114" width="150" height="44" rx="8" fill="#fff" stroke="#cfe0f2" filter="url(#sh)"/>
  <text x="751" y="132" font-size="9" font-weight="600" fill="#1d1d1f" text-anchor="middle">TransportFlowControl</text>
  <text x="751" y="148" font-size="7.5" fill="#93a7c6" text-anchor="middle">连接级总窗口 :202</text>
  <rect x="840" y="114" width="160" height="44" rx="8" fill="#fff" stroke="#cfe0f2" filter="url(#sh)"/>
  <text x="920" y="132" font-size="9" font-weight="600" fill="#1d1d1f" text-anchor="middle">StreamFlowControl</text>
  <text x="920" y="148" font-size="7.5" fill="#93a7c6" text-anchor="middle">每 stream 窗口</text>
  <text x="676" y="178" font-size="8" fill="#6e6e73">发数据扣 announced_window，收 WINDOW_UPDATE 回补；</text>
  <text x="676" y="194" font-size="8" fill="#6e6e73">DesiredAnnounceSize（:129）+ SentUpdate（:140）对账。</text>
  <text x="676" y="214" font-size="8" fill="#93a7c6">BDP 估计动态调窗（bdp_estimator :331），高时延链路自动放大窗口，</text>
  <text x="676" y="230" font-size="8" fill="#93a7c6">吞吐随带宽×时延自适应，避免小窗限速。</text>

  <!-- HPACK -->
  <rect x="24" y="262" width="620" height="150" rx="12" fill="#f5f0fb" stroke="#ddccef"/>
  <text x="40" y="283" font-size="11" font-weight="700" fill="#6f3ea8">③ HPACK 头部压缩（hpack_parser / hpack_encoder）</text>
  <g font-size="8.5" text-anchor="middle">
    <rect x="40" y="296" width="130" height="46" rx="8" fill="#fff" stroke="#ddccef" filter="url(#sh)"/><text x="105" y="316" font-weight="600" fill="#6f3ea8">静态表</text><text x="105" y="331" font-size="7.5" fill="#9a76c0">常见头预置索引</text>
    <rect x="180" y="296" width="130" height="46" rx="8" fill="#fff" stroke="#ddccef" filter="url(#sh)"/><text x="245" y="316" font-weight="600" fill="#6f3ea8">动态表</text><text x="245" y="331" font-size="7.5" fill="#9a76c0">连接内增量索引</text>
    <rect x="320" y="296" width="130" height="46" rx="8" fill="#fff" stroke="#ddccef" filter="url(#sh)"/><text x="385" y="316" font-weight="600" fill="#6f3ea8">Huffman</text><text x="385" y="331" font-size="7.5" fill="#9a76c0">字面量再压缩</text>
    <rect x="460" y="296" width="160" height="46" rx="8" fill="#eef8f2" stroke="#cbe6d5" filter="url(#sh)"/><text x="540" y="316" font-weight="600" fill="#1c7a4d">HPackParser</text><text x="540" y="331" font-size="7.5" fill="#3a8a63">逐 slice 解出 metadata</text>
  </g>
  <text x="40" y="366" font-size="8" fill="#9a76c0">HPackParser（hpack_parser.h:53）「Parse one slice worth of data」（:108）· 动态表 hpack_parser_table.cc</text>
  <text x="40" y="384" font-size="8" fill="#9a76c0">重复头（如 :method、content-type）只发一次索引，后续引用；大幅压缩重复的元数据。</text>
  <text x="40" y="402" font-size="8" fill="#c3b0dc">DATA 帧承载序列化的 message（含 5 字节 gRPC 长度前缀）；HEADERS 承载 metadata。</text>

  <!-- metadata/slice -->
  <rect x="660" y="262" width="356" height="150" rx="12" fill="#fff" stroke="#e2e2e7"/>
  <text x="676" y="283" font-size="11" font-weight="700" fill="#1d1d1f">④ metadata / Slice 缓冲</text>
  <text x="676" y="303" font-size="8.5" fill="#4a4a4f">metadata batch：一次调用的头部集合（call/metadata_batch.h）</text>
  <text x="676" y="321" font-size="8.5" fill="#4a4a4f">Slice / SliceBuffer：引用计数的零拷贝字节段（lib/slice/）</text>
  <text x="676" y="339" font-size="8.5" fill="#4a4a4f">timeout 编码：Timeout::Encode() 把 deadline 变 grpc-timeout 头</text>
  <text x="676" y="357" font-size="8" fill="#93a7c6">timeout_encoding.h:34 FromDuration · :38 Slice Encode()</text>
  <text x="676" y="380" font-size="8" fill="#a1a1a6">零拷贝：payload 在 slice 间传递不复制，减少内存拷贝与分配。</text>
  <text x="676" y="398" font-size="8" fill="#a1a1a6">Slice 是 gRPC 缓冲的基本单元，贯穿帧收发全程。</text>

  <line x1="644" y1="140" x2="660" y2="140" stroke="#c99a3a" stroke-width="1.8" marker-start="url(#sh2)" marker-end="url(#sh2)"/>

  <text x="24" y="440" font-size="9.5" fill="#4a4a4f">读法：一条连接上多个 stream 的帧交织复用（无队头阻塞），发送量受两级 flow control 窗口约束、BDP 动态调窗，头部经 HPACK 压缩、载荷以 Slice 零拷贝流转。</text>
  <text x="24" y="462" font-size="9" fill="#6e6e73">关键约束：MAX_CONCURRENT_STREAMS 限并发流数，超出的新流排队（maybe_start_some_streams）；WINDOW_UPDATE 决定对端能发多少。</text>
  <text x="24" y="482" font-size="9" fill="#a1a1a6">帧类型：HEADERS / DATA / WINDOW_UPDATE / PING / SETTINGS / GOAWAY / RST_STREAM（frame_*.cc）——GOAWAY 优雅关连接、RST_STREAM 取消单流。</text>
</svg>
