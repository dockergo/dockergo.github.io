<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="470" viewBox="0 0 1040 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="s3" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="3.5" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="h3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="r3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
  </defs>
  <rect width="1040" height="470" fill="#fbfbfd"/>
  <text x="24" y="30" font-size="14" font-weight="700" fill="#1d1d1f">一次一元 RPC 的贯穿路径：客户端发起 → Channel 装配线 → HTTP/2 → 服务端 handler → 响应回流</text>
  <text x="24" y="49" font-size="10" fill="#8a8a8e">绿=请求/响应数据流（Hot）　蓝=控制决策（解析/选路/分发）　行号基准 v1.84.0-dev</text>

  <!-- lanes -->
  <g font-size="10.5" font-weight="600" fill="#3a3a3c">
    <rect x="24" y="66" width="150" height="388" rx="10" fill="#eef8f2" stroke="#cbe6d5"/><text x="99" y="86" text-anchor="middle" fill="#1c7a4d">客户端应用</text>
    <rect x="184" y="66" width="330" height="388" rx="10" fill="#f6f8fc" stroke="#cfe0f2"/><text x="349" y="86" text-anchor="middle" fill="#4f6f9f">客户端 Channel（装配线）</text>
    <rect x="524" y="66" width="180" height="388" rx="10" fill="#fbf7ef" stroke="#ecdcbf"/><text x="614" y="86" text-anchor="middle" fill="#8a6d3b">HTTP/2 transport</text>
    <rect x="714" y="66" width="302" height="388" rx="10" fill="#f5f0fb" stroke="#ddccef"/><text x="865" y="86" text-anchor="middle" fill="#6f3ea8">服务端</text>
  </g>

  <!-- client steps -->
  <rect x="34" y="104" width="130" height="52" rx="8" fill="#fff" stroke="#cbe6d5" filter="url(#s3)"/>
  <text x="99" y="124" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">Stub 方法调用</text>
  <text x="99" y="139" font-size="8" fill="#6e6e73" text-anchor="middle">BlockingUnaryCall</text>
  <text x="99" y="151" font-size="7.5" fill="#a1a1a6" text-anchor="middle">client_unary_call.h:42</text>

  <!-- channel steps -->
  <rect x="196" y="104" width="306" height="40" rx="8" fill="#fff" stroke="#cfe0f2" filter="url(#s3)"/>
  <text x="206" y="120" font-size="9.5" font-weight="600" fill="#1d1d1f">① 组装 CallOpSet（send md + msg + recv）</text>
  <text x="206" y="136" font-size="7.5" fill="#93a7c6">Channel::CreateCall / PerformOpsOnCall · channel.h:96/99</text>

  <rect x="196" y="150" width="306" height="40" rx="8" fill="#fff" stroke="#cfe0f2" filter="url(#s3)"/>
  <text x="206" y="166" font-size="9.5" font-weight="600" fill="#5b7db1">② name resolver 解析地址 + 配置</text>
  <text x="206" y="182" font-size="7.5" fill="#93a7c6">Resolver::StartLocked → OnResolverResultChangedLocked · client_channel.cc:1152</text>

  <rect x="196" y="196" width="306" height="40" rx="8" fill="#fff" stroke="#cfe0f2" filter="url(#s3)"/>
  <text x="206" y="212" font-size="9.5" font-weight="600" fill="#5b7db1">③ load balancer picker 选 subchannel</text>
  <text x="206" y="228" font-size="7.5" fill="#93a7c6">PickSubchannel → picker.Pick · load_balanced_call_destination.cc:94/108</text>

  <rect x="196" y="242" width="306" height="40" rx="8" fill="#fff" stroke="#cfe0f2" filter="url(#s3)"/>
  <text x="206" y="258" font-size="9.5" font-weight="600" fill="#1d1d1f">④ filter 栈 / 拦截链逐层处理</text>
  <text x="206" y="274" font-size="7.5" fill="#93a7c6">start_transport_stream_op_batch · connected_channel.cc:143</text>

  <rect x="196" y="288" width="306" height="40" rx="8" fill="#fff" stroke="#cfe0f2" filter="url(#s3)"/>
  <text x="206" y="304" font-size="9.5" font-weight="600" fill="#1d1d1f">⑤ deadline 编码进 metadata</text>
  <text x="206" y="320" font-size="7.5" fill="#93a7c6">Set(GrpcTimeoutMetadata, deadline) · client_call.cc:124</text>

  <!-- transport -->
  <rect x="534" y="150" width="160" height="88" rx="8" fill="#fff" stroke="#ecdcbf" filter="url(#s3)"/>
  <text x="614" y="170" font-size="9.5" font-weight="600" fill="#8a6d3b" text-anchor="middle">帧化 + 发送</text>
  <text x="614" y="188" font-size="8" fill="#a98d54" text-anchor="middle">HEADERS + DATA</text>
  <text x="614" y="203" font-size="8" fill="#a98d54" text-anchor="middle">HPACK 压缩头</text>
  <text x="614" y="218" font-size="8" fill="#a98d54" text-anchor="middle">分配 stream-id（奇）</text>
  <text x="614" y="233" font-size="7.5" fill="#c3ab7e" text-anchor="middle">chttp2_transport.cc:1489</text>

  <!-- server steps -->
  <rect x="724" y="150" width="282" height="40" rx="8" fill="#fff" stroke="#ddccef" filter="url(#s3)"/>
  <text x="734" y="166" font-size="9.5" font-weight="600" fill="#8a6d3b">⑥ 服务端 transport 解帧、恢复 metadata</text>
  <text x="734" y="182" font-size="7.5" fill="#b39ad0">HPackParser · hpack_parser.h:53</text>

  <rect x="724" y="196" width="282" height="40" rx="8" fill="#fff" stroke="#ddccef" filter="url(#s3)"/>
  <text x="734" y="212" font-size="9.5" font-weight="600" fill="#5b7db1">⑦ RequestMatcher 配对等待的 handler</text>
  <text x="734" y="228" font-size="7.5" fill="#b39ad0">MatchOrQueue · server.cc:435</text>

  <rect x="724" y="242" width="282" height="40" rx="8" fill="#fff" stroke="#ddccef" filter="url(#s3)"/>
  <text x="734" y="258" font-size="9.5" font-weight="600" fill="#6f3ea8">⑧ 方法 handler 执行业务逻辑</text>
  <text x="734" y="274" font-size="7.5" fill="#b39ad0">RegisteredMethod · server.cc:446</text>

  <rect x="724" y="288" width="282" height="40" rx="8" fill="#fff" stroke="#ddccef" filter="url(#s3)"/>
  <text x="734" y="304" font-size="9.5" font-weight="600" fill="#1c7a4d">⑨ 响应 message + trailing status 回帧</text>
  <text x="734" y="320" font-size="7.5" fill="#b39ad0">grpc-status trailer</text>

  <!-- return to client -->
  <rect x="34" y="360" width="130" height="52" rx="8" fill="#eafaf1" stroke="#b8e6cd" filter="url(#s3)"/>
  <text x="99" y="380" font-size="9.5" font-weight="600" fill="#1c6b45" text-anchor="middle">⑩ CQ 交付结果</text>
  <text x="99" y="395" font-size="8" fill="#3a8a63" text-anchor="middle">cq.Pluck(&ops)</text>
  <text x="99" y="407" font-size="7.5" fill="#7bb89a" text-anchor="middle">completion_queue.h:177</text>

  <!-- flow arrows -->
  <line x1="164" y1="130" x2="196" y2="124" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#h3)"/>
  <line x1="349" y1="328" x2="349" y2="342" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#h3)"/>
  <line x1="502" y1="200" x2="534" y2="194" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#h3)"/>
  <text x="512" y="186" font-size="7.5" fill="#2f9e6e">上 wire</text>
  <line x1="694" y1="180" x2="724" y2="172" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#h3)"/>
  <!-- server internal down -->
  <line x1="865" y1="190" x2="865" y2="196" stroke="#5b7db1" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#r3)"/>
  <line x1="865" y1="236" x2="865" y2="242" stroke="#5b7db1" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#r3)"/>
  <line x1="865" y1="282" x2="865" y2="288" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#h3)"/>
  <!-- response back path -->
  <path d="M724,308 L614,308 L614,258" fill="none" stroke="#2f9e6e" stroke-width="1.6" marker-end="url(#h3)"/>
  <path d="M534,300 L349,352" fill="none" stroke="#2f9e6e" stroke-width="1.6" marker-end="url(#h3)"/>
  <path d="M264,342 L99,360" fill="none" stroke="#2f9e6e" stroke-width="1.6" marker-end="url(#h3)"/>
  <text x="360" y="352" font-size="7.5" fill="#2f9e6e">响应回流</text>

  <text x="24" y="467" font-size="9" fill="#6e6e73">同一条 subchannel 上的 HTTP/2 连接可并发承载多个这样的调用（各占一个 stream），互不阻塞 —— 这是 gRPC 高吞吐的根。</text>
</svg>
