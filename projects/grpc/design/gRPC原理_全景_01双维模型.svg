<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="400" viewBox="0 0 1000 400" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="s1" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="3.5" flood-color="#1d1d1f" flood-opacity="0.08"/></filter></defs>
  <rect width="1000" height="400" fill="#fbfbfd"/>
  <text x="24" y="30" font-size="14" font-weight="700" fill="#1d1d1f">双维模型：接触面（用户可见）× 能力域（框架内部）—— 一次远程调用像本地函数</text>
  <text x="24" y="49" font-size="10" fill="#8a8a8e">把 gRPC 拆成可导航的主线：唯一接触面 + 7 条内部能力域，灵魂 = 可插拔装配线 + HTTP/2 多路复用</text>

  <!-- 接触面 -->
  <rect x="24" y="66" width="952" height="66" rx="12" fill="#eef8f2" stroke="#cbe6d5" filter="url(#s1)"/>
  <text x="40" y="88" font-size="12" font-weight="700" fill="#1c7a4d">接触面（唯一）· Protobuf 生成的 Stub / Server 契约</text>
  <text x="40" y="108" font-size="9.5" fill="#3a8a63">用户写 .proto 定义服务与消息 → 生成强类型 Stub（客户端）与 Skeleton（服务端）→ 调用像本地方法：channel 承载 CallOpSet，收发 metadata + message。</text>
  <text x="40" y="124" font-size="9" fill="#7bb89a">四型 RPC：一元 · 客户端流 · 服务端流 · 双向流。与 REST 不同：强契约、二进制帧、单连接多路复用。</text>

  <!-- 能力域标题 -->
  <text x="40" y="158" font-size="11" font-weight="700" fill="#5b7db1">能力域（7 · 框架内部公共机制）</text>

  <!-- 7 domains grid: 4 + 3 -->
  <g font-size="10" font-weight="600">
    <rect x="24" y="168" width="232" height="70" rx="10" fill="#fff" stroke="#cfe0f2" filter="url(#s1)"/>
    <text x="38" y="188" fill="#1d1d1f">◉ 调用生命周期 / CallSpine ★</text>
    <text x="38" y="206" font-size="8.5" font-weight="400" fill="#6e6e73">promise 化调用骨架 · picker 选连接</text>
    <text x="38" y="222" font-size="8.5" font-weight="400" fill="#6e6e73">连接态机 + 退避重连</text>

    <rect x="264" y="168" width="232" height="70" rx="10" fill="#fff" stroke="#cfe0f2" filter="url(#s1)"/>
    <text x="278" y="188" fill="#1d1d1f">⇄ 名字解析 + 负载均衡</text>
    <text x="278" y="206" font-size="8.5" font-weight="400" fill="#6e6e73">resolver 出地址 · LB 产 picker</text>
    <text x="278" y="222" font-size="8.5" font-weight="400" fill="#6e6e73">pick_first / round_robin</text>

    <rect x="504" y="168" width="232" height="70" rx="10" fill="#fff" stroke="#cfe0f2" filter="url(#s1)"/>
    <text x="518" y="188" fill="#1d1d1f">▤ Filter 栈 / 拦截链</text>
    <text x="518" y="206" font-size="8.5" font-weight="400" fill="#6e6e73">channel stack 逐 filter 串调用</text>
    <text x="518" y="222" font-size="8.5" font-weight="400" fill="#6e6e73">v3 拦截链 · 栈底交 transport</text>

    <rect x="744" y="168" width="232" height="70" rx="10" fill="#fff" stroke="#ecdcbf" filter="url(#s1)"/>
    <text x="758" y="188" fill="#8a6d3b">◫ HTTP/2 传输 + 流控 ★</text>
    <text x="758" y="206" font-size="8.5" font-weight="400" fill="#a98d54">单连接 N stream · 帧化</text>
    <text x="758" y="222" font-size="8.5" font-weight="400" fill="#a98d54">flow control/BDP · HPACK</text>

    <rect x="104" y="250" width="272" height="70" rx="10" fill="#fff" stroke="#e2e2e7" filter="url(#s1)"/>
    <text x="118" y="270" fill="#4a4a4f">▦ CompletionQueue / EventEngine ★</text>
    <text x="118" y="288" font-size="8.5" font-weight="400" fill="#6e6e73">tag 驱动事件 · Next/Pluck/Callback</text>
    <text x="118" y="304" font-size="8.5" font-weight="400" fill="#6e6e73">Run/RunAfter · poller/iomgr</text>

    <rect x="384" y="250" width="232" height="70" rx="10" fill="#fff" stroke="#f0d9c4" filter="url(#s1)"/>
    <text x="398" y="270" fill="#c0651f">⚡ Deadline / 重试 / Keepalive</text>
    <text x="398" y="288" font-size="8.5" font-weight="400" fill="#b0783f">deadline 编码 · retryPolicy 退避</text>
    <text x="398" y="304" font-size="8.5" font-weight="400" fill="#b0783f">keepalive ping 探活</text>

    <rect x="624" y="250" width="272" height="70" rx="10" fill="#fff" stroke="#ddccef" filter="url(#s1)"/>
    <text x="638" y="270" fill="#6f3ea8">⛨ 凭证与安全（横切）</text>
    <text x="638" y="288" font-size="8.5" font-weight="400" fill="#9a76c0">传输凭证 TLS/ALTS 握手</text>
    <text x="638" y="304" font-size="8.5" font-weight="400" fill="#9a76c0">调用凭证 OAuth2/JWT 注入 metadata</text>
  </g>

  <text x="24" y="352" font-size="9.5" fill="#4a4a4f">★ = 灵魂三支柱：<tspan font-weight="700" fill="#5b7db1">CallSpine 装配</tspan>（怎么组织一次调用）+ <tspan font-weight="700" fill="#8a6d3b">HTTP/2 多路复用</tspan>（怎么高效传）+ <tspan font-weight="700" fill="#8a8a8e">CQ/EventEngine 异步</tspan>（怎么不阻塞）。</text>
  <text x="24" y="374" font-size="9.5" fill="#4a4a4f">正交性：任取核心概念都能唯一归位 —— picker→LB、stream-id→transport、tag→CQ、retryPolicy→重试、TLS→凭证、filter→拦截链。</text>
  <text x="24" y="393" font-size="9" fill="#a1a1a6">每个能力域一篇文档；接触面一篇；本篇统摄全局。控制面（解析/LB）与数据面（transport）解耦是可插拔的根基。</text>
</svg>
