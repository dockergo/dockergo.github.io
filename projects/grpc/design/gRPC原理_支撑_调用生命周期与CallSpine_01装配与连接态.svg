<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="470" viewBox="0 0 1020 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="sc" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="3.5" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="hc" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="cc" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
    <marker id="sc2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c99a3a"/></marker>
    <marker id="fc" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#d38236"/></marker></defs>
  <rect width="1020" height="470" fill="#fbfbfd"/>
  <text x="24" y="30" font-size="14" font-weight="700" fill="#1d1d1f">调用生命周期：ClientChannel 装配 → picker 选 Subchannel → 连接态机</text>
  <text x="24" y="49" font-size="10" fill="#8a8a8e">灵魂：一次调用如何在 Channel 内被组织、如何挑到一条可用连接、连接如何建立与退避重连</text>

  <!-- ClientChannel -->
  <rect x="24" y="66" width="972" height="150" rx="12" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="40" y="87" font-size="11" font-weight="700" fill="#4f6f9f">ClientChannel · 装配线（client_channel.h:40）</text>

  <rect x="40" y="98" width="300" height="46" rx="8" fill="#fff" stroke="#cfe0f2" filter="url(#sc)"/>
  <text x="52" y="116" font-size="9.5" font-weight="600" fill="#5b7db1">resolver_ 结果 → 更新配置</text>
  <text x="52" y="133" font-size="8" fill="#93a7c6">OnResolverResultChangedLocked · client_channel.cc:1152</text>

  <rect x="356" y="98" width="300" height="46" rx="8" fill="#fff" stroke="#cfe0f2" filter="url(#sc)"/>
  <text x="368" y="116" font-size="9.5" font-weight="600" fill="#5b7db1">LB 更新 → picker_（可观察）</text>
  <text x="368" y="133" font-size="8" fill="#93a7c6">UpdateStateAndPickerLocked · client_channel.cc:1443</text>

  <rect x="672" y="98" width="308" height="46" rx="8" fill="#fff" stroke="#cfe0f2" filter="url(#sc)"/>
  <text x="684" y="116" font-size="9.5" font-weight="600" fill="#1d1d1f">SubchannelWrapper + subchannel_map_</text>
  <text x="684" y="133" font-size="8" fill="#93a7c6">client_channel.h:203/228 · SubchannelWrapper :141</text>

  <rect x="40" y="152" width="616" height="52" rx="8" fill="#eef8f2" stroke="#cbe6d5" filter="url(#sc)"/>
  <text x="52" y="171" font-size="9.5" font-weight="600" fill="#1c7a4d">CallSpine：ClientCall::StartCall → 用 picker 选 subchannel（promise 化）</text>
  <text x="52" y="188" font-size="8" fill="#3a8a63">client_call.cc:260 StartCall · PickSubchannel→picker.Pick · load_balanced_call_destination.cc:94/108</text>
  <text x="52" y="200" font-size="7.5" fill="#7bb89a">无就绪连接 → PickResult::Queue，得到新 picker 后重试</text>

  <rect x="672" y="152" width="308" height="52" rx="8" fill="#fff" stroke="#cfe0f2" filter="url(#sc)"/>
  <text x="684" y="171" font-size="9.5" font-weight="600" fill="#1d1d1f">下发到 filter 栈 → transport</text>
  <text x="684" y="188" font-size="8" fill="#93a7c6">connected_channel.cc:143</text>

  <!-- Subchannel state machine -->
  <text x="24" y="244" font-size="11" font-weight="700" fill="#8a6d3b">Subchannel 连接态机（subchannel.cc）</text>
  <g font-size="9" font-weight="600" text-anchor="middle">
    <rect x="40" y="256" width="150" height="54" rx="10" fill="#fff" stroke="#ecdcbf" filter="url(#sc)"/>
    <text x="115" y="279" fill="#8a6d3b">IDLE</text><text x="115" y="296" font-size="7.5" font-weight="400" fill="#a98d54">无请求时空闲</text>
    <rect x="250" y="256" width="150" height="54" rx="10" fill="#fff" stroke="#ecdcbf" filter="url(#sc)"/>
    <text x="325" y="279" fill="#8a6d3b">CONNECTING</text><text x="325" y="296" font-size="7.5" font-weight="400" fill="#a98d54">StartConnectingLocked :782</text>
    <rect x="460" y="256" width="150" height="54" rx="10" fill="#eafaf1" stroke="#b8e6cd" filter="url(#sc)"/>
    <text x="535" y="279" fill="#1c6b45">READY</text><text x="535" y="296" font-size="7.5" font-weight="400" fill="#3a8a63">持有一条 transport</text>
    <rect x="670" y="256" width="150" height="54" rx="10" fill="#fdf0e6" stroke="#f0d0b0" filter="url(#sc)"/>
    <text x="745" y="279" fill="#c0651f">TRANSIENT_FAILURE</text><text x="745" y="296" font-size="7.5" font-weight="400" fill="#b0783f">连接失败</text>
    <rect x="856" y="256" width="140" height="54" rx="10" fill="#fff" stroke="#ecdcbf" filter="url(#sc)"/>
    <text x="926" y="279" fill="#8a6d3b">SHUTDOWN</text><text x="926" y="296" font-size="7.5" font-weight="400" fill="#a98d54">销毁</text>
  </g>
  <line x1="190" y1="283" x2="250" y2="283" stroke="#5b7db1" stroke-width="1.5" marker-end="url(#cc)"/>
  <line x1="400" y1="283" x2="460" y2="283" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#hc)"/>
  <text x="430" y="276" font-size="7" fill="#2f9e6e" text-anchor="middle">连上</text>
  <line x1="610" y1="283" x2="670" y2="283" stroke="#d38236" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#fc)"/>
  <text x="640" y="276" font-size="7" fill="#d38236" text-anchor="middle">断开</text>
  <path d="M745,310 q-210,60 -420,0" fill="none" stroke="#d38236" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#fc)"/>
  <text x="535" y="360" font-size="8" fill="#d38236" text-anchor="middle">指数退避后重连：OnRetryTimerLocked :795 · backoff_ :653（连上则 backoff_.Reset() :792）</text>

  <!-- report up -->
  <rect x="40" y="384" width="956" height="34" rx="9" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="52" y="405" font-size="9" fill="#5b7db1">连接态变化经 ConnectedSubchannelStateWatcher（subchannel.cc:497）→ SetConnectivityStateLocked（:832）上报 → 触发 LB 重算 picker</text>

  <text x="24" y="440" font-size="9" fill="#6e6e73">读法：resolver/LB 是「控制大脑」持续更新 picker；每次调用经 CallSpine 用当前 picker 挑一个 READY 的 subchannel；连接态机把「能不能连上」独立管理，失败退避重连并反馈给 LB。</text>
  <text x="24" y="457" font-size="8.5" fill="#a1a1a6">注：subchannel.cc 中 v3 实现类名前缀为 OldSubchannel（过渡期命名），态机语义如上。</text>
</svg>
