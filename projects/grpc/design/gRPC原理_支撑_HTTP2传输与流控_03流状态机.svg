<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="446" viewBox="0 0 1020 446" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="sp" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="3.5" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2b5fa0"/></marker>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b23a3a"/></marker></defs>
  <rect width="1020" height="446" fill="#fbfbfd"/>
  <text x="24" y="30" font-size="14" font-weight="700" fill="#1d1d1f">HTTP/2 stream 生命周期状态机：一条连接内每个 stream 独立推进</text>
  <text x="24" y="49" font-size="10" fill="#8a8a8e">gRPC 把 HEADERS / END_STREAM / trailer 映射到流状态；每个 open 流各占一份两级流控窗口</text>

  <g font-size="9">
    <rect x="612" y="20" width="12" height="10" rx="2" fill="#eaf1fb" stroke="#cadcf2"/><text x="628" y="29" fill="#6e6e73">建流/控制</text>
    <rect x="712" y="20" width="12" height="10" rx="2" fill="#eafaf1" stroke="#b8e6cd"/><text x="728" y="29" fill="#6e6e73">数据流转</text>
    <rect x="808" y="20" width="12" height="10" rx="2" fill="#f3f3f5" stroke="#dcdce0"/><text x="824" y="29" fill="#6e6e73">半关/终态</text>
    <rect x="900" y="20" width="12" height="10" rx="2" fill="#fdeeee" stroke="#f0cccc"/><text x="916" y="29" fill="#6e6e73">异常撕流</text>
  </g>

  <!-- state machine row -->
  <g text-anchor="middle" font-size="9">
    <!-- idle -->
    <rect x="24" y="86" width="140" height="52" rx="10" fill="#f3f3f5" stroke="#dcdce0" filter="url(#sp)"/><text x="94" y="108" font-weight="700" fill="#3a3a3f">idle</text><text x="94" y="124" font-size="7" fill="#8a8a8e">未分配流号</text>
    <line x1="164" y1="112" x2="204" y2="112" stroke="#2b5fa0" stroke-width="1.5" marker-end="url(#ab)"/>
    <text x="184" y="103" font-size="7" fill="#2b5fa0">发/收</text><text x="184" y="129" font-size="6.5" fill="#4b7bbf">HEADERS</text>
    <!-- open -->
    <rect x="206" y="86" width="150" height="52" rx="10" fill="#eafaf1" stroke="#b8e6cd" filter="url(#sp)"/><text x="281" y="106" font-weight="700" fill="#1c6b45">open</text><text x="281" y="121" font-size="7" fill="#5aa07d">双向可发 DATA</text><text x="281" y="132" font-size="6.5" fill="#7bb597">initial metadata 已交换</text>
    <line x1="356" y1="112" x2="396" y2="112" stroke="#2f9e6e" stroke-width="1.5" marker-end="url(#ag)"/>
    <text x="376" y="103" font-size="7" fill="#1c6b45">END_STREAM</text>
    <!-- half-closed -->
    <rect x="398" y="86" width="170" height="52" rx="10" fill="#f3f3f5" stroke="#dcdce0" filter="url(#sp)"/><text x="483" y="104" font-weight="700" fill="#3a3a3f">half-closed</text><text x="483" y="119" font-size="7" fill="#8a8a8e">local：客户端 WritesDone</text><text x="483" y="130" font-size="7" fill="#8a8a8e">remote：收到对端 END_STREAM</text>
    <line x1="568" y1="112" x2="608" y2="112" stroke="#2f9e6e" stroke-width="1.5" marker-end="url(#ag)"/>
    <text x="588" y="103" font-size="7" fill="#1c6b45">trailer</text>
    <!-- closed -->
    <rect x="610" y="86" width="170" height="52" rx="10" fill="#f3f3f5" stroke="#c8c8ce" filter="url(#sp)"/><text x="695" y="104" font-weight="700" fill="#3a3a3f">closed</text><text x="695" y="119" font-size="7" fill="#8a8a8e">收到 trailing HEADERS</text><text x="695" y="130" font-size="6.5" fill="#8a8a8e">grpc-status（+ grpc-message）</text>
  </g>

  <!-- abrupt teardown -->
  <rect x="812" y="86" width="184" height="52" rx="10" fill="#fdeeee" stroke="#f0cccc" filter="url(#sp)"/>
  <text x="904" y="104" font-size="9" font-weight="700" text-anchor="middle" fill="#b23a3a">异常撕流 → closed</text>
  <text x="904" y="119" font-size="7" text-anchor="middle" fill="#c56b6b">RST_STREAM：取消/重置单流</text>
  <text x="904" y="131" font-size="7" text-anchor="middle" fill="#c56b6b">GOAWAY：连接排空、不再收新流</text>
  <path d="M281 138 V158 H904 V138" fill="none" stroke="#b23a3a" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="560" y="153" font-size="7.5" text-anchor="middle" fill="#b23a3a">任意状态可被 RST_STREAM / GOAWAY 直接撕到 closed</text>

  <!-- lower left: multiplex + stream id + concurrency gate -->
  <rect x="24" y="176" width="472" height="232" rx="12" fill="#eaf1fb" stroke="#cadcf2" filter="url(#sp)"/>
  <text x="40" y="197" font-size="11.5" font-weight="700" fill="#2b5fa0">多路复用 · 流号 · 并发闸门</text>
  <g font-size="8.5">
    <rect x="40" y="208" width="200" height="46" rx="8" fill="#fff" stroke="#cadcf2"/><text x="52" y="226" fill="#2b5fa0" font-weight="600">流号奇偶定死</text><text x="52" y="240" font-size="7.5" fill="#6f93c4">client 用奇数、server 用偶数</text><text x="52" y="250" font-size="7" fill="#8fb0d6">next_stream_id 校验低位</text>
    <rect x="256" y="208" width="200" height="46" rx="8" fill="#fff" stroke="#cadcf2"/><text x="268" y="226" fill="#2b5fa0" font-weight="600">帧交织传输</text><text x="268" y="240" font-size="7.5" fill="#6f93c4">HEADERS/DATA 交织、独立推进</text><text x="268" y="250" font-size="7" fill="#8fb0d6">任一阻塞不牵连其他流</text>
    <rect x="40" y="262" width="416" height="50" rx="8" fill="#fff" stroke="#cadcf2"/><text x="52" y="281" fill="#2b5fa0" font-weight="600">并发闸门 MAX_CONCURRENT_STREAMS</text><text x="52" y="296" font-size="7.5" fill="#6f93c4">新流受对端上限约束，超额者排队待旧流关闭腾配额</text><text x="52" y="307" font-size="7" fill="#8fb0d6">maybe_start_some_streams 逐个放行</text>
  </g>
  <rect x="40" y="320" width="416" height="72" rx="8" fill="#fbfbfd" stroke="#cbdcf0"/>
  <text x="52" y="339" font-size="8.5" font-weight="600" fill="#2b5fa0">读写状态机跑在 combiner（单写者域）</text>
  <text x="52" y="355" font-size="8" fill="#4b7bbf">write_action* / read_action* 串行执行以代替加锁</text>
  <text x="52" y="371" font-size="8" fill="#4b7bbf">写意图收敛到 initiate_write 做写合并、降 syscall</text>
  <text x="52" y="386" font-size="7.5" fill="#6f93c4">按 reason（SEND_MESSAGE / INITIAL_WRITE / START_NEW_STREAM）合并 flush</text>

  <!-- lower right: per-stream flow control + invariants -->
  <rect x="524" y="176" width="472" height="232" rx="12" fill="#eafaf1" stroke="#b8e6cd" filter="url(#sp)"/>
  <text x="540" y="197" font-size="11.5" font-weight="700" fill="#1c6b45">每个 open 流各占一份两级窗口</text>
  <g font-size="8.5" text-anchor="middle">
    <rect x="540" y="208" width="210" height="40" rx="8" fill="#fff" stroke="#b8e6cd"/><text x="645" y="225" fill="#1c6b45" font-weight="600">流级窗口 StreamFC</text><text x="645" y="238" font-size="7" fill="#5aa07d">约束单个 stream 发送量</text>
    <rect x="766" y="208" width="214" height="40" rx="8" fill="#fff" stroke="#b8e6cd"/><text x="873" y="225" fill="#1c6b45" font-weight="600">连接级窗口 TransportFC</text><text x="873" y="238" font-size="7" fill="#5aa07d">约束整条连接总发送量</text>
    <rect x="540" y="256" width="440" height="40" rx="8" fill="#fdf6ec" stroke="#f0dcb8"/><text x="760" y="273" fill="#9a6a1c" font-weight="600">任一窗口耗尽即停发</text><text x="760" y="286" font-size="7" fill="#c1955a">announced_window 掉到目标一半就发 WINDOW_UPDATE 补窗</text>
  </g>
  <rect x="540" y="304" width="440" height="88" rx="8" fill="#fbfbfd" stroke="#cbe6d5"/>
  <text x="552" y="323" font-size="8.5" font-weight="600" fill="#1c6b45">正常调用至少两次 HEADERS</text>
  <text x="552" y="339" font-size="8" fill="#3a8a63">开流的 initial metadata（首 HEADERS）+ 结果的 trailing metadata（末 HEADERS）</text>
  <text x="552" y="355" font-size="8" fill="#5aa07d">grpc-status 必有、grpc-message 可选；即使无 body 也有这两次 HEADERS</text>
  <text x="552" y="373" font-size="8" fill="#5aa07d">载荷才走 DATA 帧，控制与数据在帧层分离</text>
  <text x="552" y="388" font-size="7.5" fill="#7bb597">目标窗口非常数：PeriodicUpdate 依 BDP×2 + 内存压力周期重算</text>

  <text x="24" y="430" font-size="9" fill="#4a4a4f">读法：一次调用 = 开流(HEADERS) → open 双向传 DATA → 一侧 END_STREAM 转 half-closed → 收 trailer(grpc-status) 转 closed；RST_STREAM/GOAWAY 可提前撕流。</text>
</svg>
