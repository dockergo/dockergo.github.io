<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="430" viewBox="0 0 1000 430" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="1000" height="430" fill="#fbfbfd"/>
  <text x="24" y="30" font-size="14" font-weight="700" fill="#1d1d1f">依赖矩阵：唯一接触面「Stub/Channel 发起调用」强依赖哪些能力域</text>
  <text x="24" y="49" font-size="10" fill="#8a8a8e">● 强依赖（每次调用必经）　◐ 条件依赖（按配置/策略）　○ 弱/间接　—— 被依赖度越高的能力域越是框架命脉</text>

  <!-- column headers -->
  <g font-size="9.5" fill="#3a3a3c" text-anchor="middle">
    <text x="300" y="82">名字解析<tspan x="300" dy="12">+ LB</tspan></text>
    <text x="400" y="82">CallSpine<tspan x="400" dy="12">调用装配</tspan></text>
    <text x="500" y="82">Filter 栈<tspan x="500" dy="12">拦截链</tspan></text>
    <text x="600" y="82">HTTP/2<tspan x="600" dy="12">传输流控</tspan></text>
    <text x="700" y="82">CQ /<tspan x="700" dy="12">EventEngine</tspan></text>
    <text x="800" y="82">Deadline<tspan x="800" dy="12">重试保活</tspan></text>
    <text x="900" y="82">凭证<tspan x="900" dy="12">安全</tspan></text>
  </g>

  <!-- grid -->
  <g stroke="#e2e2e7" stroke-width="1">
    <line x1="60" y1="100" x2="950" y2="100"/>
    <line x1="60" y1="150" x2="950" y2="150"/>
    <line x1="60" y1="200" x2="950" y2="200"/>
    <line x1="60" y1="250" x2="950" y2="250"/>
    <line x1="60" y1="300" x2="950" y2="300"/>
    <line x1="60" y1="350" x2="950" y2="350"/>
  </g>

  <!-- row labels -->
  <g font-size="9.5" font-weight="600" fill="#1d1d1f">
    <text x="24" y="128">建立 Channel</text>
    <text x="24" y="178">发起一元 RPC</text>
    <text x="24" y="228">流式 RPC</text>
    <text x="24" y="278">安全连接</text>
    <text x="24" y="328">大流量 / 拥塞</text>
  </g>

  <!-- cells: cx per column 300..900 step100, cy per row 125..325 step50 -->
  <g font-size="13" text-anchor="middle">
    <!-- 建立 Channel -->
    <text x="300" y="129" fill="#2f9e6e">●</text><text x="400" y="129" fill="#5b7db1">◐</text><text x="500" y="129" fill="#5b7db1">●</text><text x="600" y="129" fill="#c99a3a">◐</text><text x="700" y="129" fill="#8a8a8e">●</text><text x="800" y="129" fill="#d9d9de">○</text><text x="900" y="129" fill="#8a5cae">●</text>
    <!-- 发起一元 RPC -->
    <text x="300" y="179" fill="#2f9e6e">●</text><text x="400" y="179" fill="#5b7db1">●</text><text x="500" y="179" fill="#5b7db1">●</text><text x="600" y="179" fill="#c99a3a">●</text><text x="700" y="179" fill="#8a8a8e">●</text><text x="800" y="179" fill="#d38236">●</text><text x="900" y="179" fill="#8a5cae">◐</text>
    <!-- 流式 RPC -->
    <text x="300" y="229" fill="#2f9e6e">●</text><text x="400" y="229" fill="#5b7db1">●</text><text x="500" y="229" fill="#5b7db1">●</text><text x="600" y="229" fill="#c99a3a">●</text><text x="700" y="229" fill="#8a8a8e">●</text><text x="800" y="229" fill="#d38236">◐</text><text x="900" y="229" fill="#8a5cae">◐</text>
    <!-- 安全连接 -->
    <text x="300" y="279" fill="#2f9e6e">◐</text><text x="400" y="279" fill="#d9d9de">○</text><text x="500" y="279" fill="#5b7db1">◐</text><text x="600" y="279" fill="#c99a3a">●</text><text x="700" y="279" fill="#8a8a8e">●</text><text x="800" y="279" fill="#d9d9de">○</text><text x="900" y="279" fill="#8a5cae">●</text>
    <!-- 大流量/拥塞 -->
    <text x="300" y="329" fill="#2f9e6e">◐</text><text x="400" y="329" fill="#5b7db1">◐</text><text x="500" y="329" fill="#d9d9de">○</text><text x="600" y="329" fill="#c99a3a">●</text><text x="700" y="329" fill="#8a8a8e">●</text><text x="800" y="329" fill="#d38236">●</text><text x="900" y="329" fill="#d9d9de">○</text>
  </g>

  <!-- column vertical separators light -->
  <g stroke="#efeff2" stroke-width="1">
    <line x1="350" y1="100" x2="350" y2="350"/><line x1="450" y1="100" x2="450" y2="350"/><line x1="550" y1="100" x2="550" y2="350"/><line x1="650" y1="100" x2="650" y2="350"/><line x1="750" y1="100" x2="750" y2="350"/><line x1="850" y1="100" x2="850" y2="350"/>
  </g>

  <text x="24" y="384" font-size="9.5" fill="#4a4a4f">读法：<tspan font-weight="700" fill="#c99a3a">HTTP/2 transport</tspan> 与 <tspan font-weight="700" fill="#8a8a8e">CQ/EventEngine</tspan> 几乎每行都是 ● —— 它们是被依赖度最高的两格，塌了则全盘皆停，故被列为「灵魂」的物理承载。</text>
  <text x="24" y="404" font-size="9.5" fill="#4a4a4f">而 <tspan font-weight="700" fill="#2f9e6e">名字解析+LB</tspan>、<tspan font-weight="700" fill="#5b7db1">CallSpine</tspan> 是「选谁连、怎么装配」的控制大脑；<tspan font-weight="700" fill="#8a5cae">凭证</tspan> 在建连/安全场景转为强依赖。</text>
  <text x="24" y="424" font-size="9" fill="#a1a1a6">正交性检验：resolver 归「解析」、picker 归「LB」、flow control 归「transport」、tag 归「CQ」、retryPolicy 归「重试」、TLS 握手归「凭证」—— 每个核心概念唯一归位。</text>
</svg>
