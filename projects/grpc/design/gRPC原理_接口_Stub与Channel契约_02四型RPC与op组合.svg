<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="432" viewBox="0 0 1020 432" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="sp" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="3.5" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker></defs>
  <rect width="1020" height="432" fill="#fbfbfd"/>
  <text x="24" y="30" font-size="14" font-weight="700" fill="#1d1d1f">四型 RPC × CallOpSet：骨架 op 四型共有，只有消息 op 的次数与节奏在变</text>
  <text x="24" y="49" font-size="10" fill="#8a8a8e">RpcType 只决定 SendMessage / RecvMessage 出现几次、如何交织；发/收首部、宣告写完、收状态四型共用同一副骨架</text>

  <!-- legend -->
  <g font-size="9">
    <rect x="668" y="20" width="12" height="10" rx="2" fill="#eaf1fb" stroke="#cadcf2"/><text x="684" y="29" fill="#6e6e73">控制 op</text>
    <rect x="748" y="20" width="12" height="10" rx="2" fill="#eafaf1" stroke="#b8e6cd"/><text x="764" y="29" fill="#6e6e73">消息 op</text>
    <rect x="828" y="20" width="12" height="10" rx="2" fill="#f4eefb" stroke="#ddccef"/><text x="844" y="29" fill="#6e6e73">RPC 契约</text>
    <rect x="912" y="20" width="12" height="10" rx="2" fill="#fdeeee" stroke="#f0cccc"/><text x="928" y="29" fill="#6e6e73">误用</text>
  </g>

  <!-- skeleton rail -->
  <rect x="24" y="64" width="972" height="76" rx="12" fill="#eaf1fb" stroke="#cadcf2" filter="url(#sp)"/>
  <text x="40" y="84" font-size="11.5" font-weight="700" fill="#2b5fa0">四型共有骨架（op 顺序固定）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="40" y="96" width="120" height="32" rx="7" fill="#fff" stroke="#cadcf2"/><text x="100" y="112" fill="#2b5fa0">发首部</text><text x="100" y="123" font-size="6.5" fill="#6f93c4">SendInitialMD</text>
    <rect x="176" y="96" width="150" height="32" rx="7" fill="#eafaf1" stroke="#b8e6cd" stroke-dasharray="4 3"/><text x="251" y="112" fill="#1c6b45">消息 op 区</text><text x="251" y="123" font-size="6.5" fill="#5aa07d">随类型变（见下）</text>
    <rect x="342" y="96" width="130" height="32" rx="7" fill="#fff" stroke="#cadcf2"/><text x="407" y="112" fill="#2b5fa0">宣告写完</text><text x="407" y="123" font-size="6.5" fill="#6f93c4">ClientSendClose</text>
    <rect x="488" y="96" width="120" height="32" rx="7" fill="#fff" stroke="#cadcf2"/><text x="548" y="112" fill="#2b5fa0">收首部</text><text x="548" y="123" font-size="6.5" fill="#6f93c4">RecvInitialMD</text>
    <rect x="624" y="96" width="120" height="32" rx="7" fill="#fff" stroke="#cadcf2"/><text x="684" y="112" fill="#2b5fa0">收状态</text><text x="684" y="123" font-size="6.5" fill="#6f93c4">RecvStatus</text>
  </g>
  <text x="770" y="108" font-size="8.5" fill="#6e6e73">这四个 op</text>
  <text x="770" y="121" font-size="8.5" fill="#6e6e73">一元/流式皆有</text>

  <!-- rows -->
  <g font-size="8.5" text-anchor="middle">
    <!-- unary -->
    <rect x="24" y="156" width="972" height="54" rx="10" fill="#fbfbfd" stroke="#e6e6ea"/>
    <rect x="36" y="166" width="200" height="34" rx="7" fill="#f4eefb" stroke="#ddccef"/><text x="136" y="182" fill="#6f3ea8" font-weight="600">一元</text><text x="136" y="194" font-size="6.5" fill="#9a76c0">NORMAL_RPC (=0)</text>
    <rect x="300" y="166" width="120" height="34" rx="7" fill="#eafaf1" stroke="#b8e6cd"/><text x="360" y="187" fill="#1c6b45">发消息 ×1</text>
    <line x1="424" y1="183" x2="470" y2="183" stroke="#2f9e6e" stroke-width="1.4" marker-end="url(#ag)"/>
    <rect x="474" y="166" width="120" height="34" rx="7" fill="#eafaf1" stroke="#b8e6cd"/><text x="534" y="187" fill="#1c6b45">收消息 ×1</text>
    <text x="820" y="187" font-size="9" fill="#6e6e73">请求 / 响应</text>
    <!-- client stream -->
    <rect x="24" y="216" width="972" height="54" rx="10" fill="#fbfbfd" stroke="#e6e6ea"/>
    <rect x="36" y="226" width="200" height="34" rx="7" fill="#f4eefb" stroke="#ddccef"/><text x="136" y="242" fill="#6f3ea8" font-weight="600">客户端流</text><text x="136" y="254" font-size="6.5" fill="#9a76c0">CLIENT_STREAMING</text>
    <rect x="300" y="226" width="120" height="34" rx="7" fill="#eafaf1" stroke="#b8e6cd"/><text x="360" y="247" fill="#1c6b45">发消息 ×N</text>
    <line x1="424" y1="243" x2="470" y2="243" stroke="#2f9e6e" stroke-width="1.4" marker-end="url(#ag)"/>
    <rect x="474" y="226" width="120" height="34" rx="7" fill="#eafaf1" stroke="#b8e6cd"/><text x="534" y="247" fill="#1c6b45">收消息 ×1</text>
    <text x="820" y="247" font-size="9" fill="#6e6e73">上传 / 聚合</text>
    <!-- server stream -->
    <rect x="24" y="276" width="972" height="54" rx="10" fill="#fbfbfd" stroke="#e6e6ea"/>
    <rect x="36" y="286" width="200" height="34" rx="7" fill="#f4eefb" stroke="#ddccef"/><text x="136" y="302" fill="#6f3ea8" font-weight="600">服务端流</text><text x="136" y="314" font-size="6.5" fill="#9a76c0">SERVER_STREAMING</text>
    <rect x="300" y="286" width="120" height="34" rx="7" fill="#eafaf1" stroke="#b8e6cd"/><text x="360" y="307" fill="#1c6b45">发消息 ×1</text>
    <line x1="424" y1="303" x2="470" y2="303" stroke="#2f9e6e" stroke-width="1.4" marker-end="url(#ag)"/>
    <rect x="474" y="286" width="120" height="34" rx="7" fill="#eafaf1" stroke="#b8e6cd"/><text x="534" y="307" fill="#1c6b45">收消息 ×N</text>
    <text x="820" y="307" font-size="9" fill="#6e6e73">订阅 / 推送</text>
    <!-- bidi -->
    <rect x="24" y="336" width="972" height="54" rx="10" fill="#fbfbfd" stroke="#e6e6ea"/>
    <rect x="36" y="346" width="200" height="34" rx="7" fill="#f4eefb" stroke="#ddccef"/><text x="136" y="362" fill="#6f3ea8" font-weight="600">双向流</text><text x="136" y="374" font-size="6.5" fill="#9a76c0">BIDI_STREAMING</text>
    <rect x="300" y="346" width="120" height="34" rx="7" fill="#eafaf1" stroke="#b8e6cd"/><text x="360" y="367" fill="#1c6b45">发消息 ×N</text>
    <text x="447" y="363" font-size="14" fill="#2f9e6e">⇄</text>
    <rect x="474" y="346" width="120" height="34" rx="7" fill="#eafaf1" stroke="#b8e6cd"/><text x="534" y="367" fill="#1c6b45">收消息 ×N</text>
    <text x="820" y="367" font-size="9" fill="#6e6e73">实时会话（交织）</text>
  </g>

  <!-- footer -->
  <text x="24" y="412" font-size="9" fill="#4a4a4f">读法：一元用一次性 BlockingUnaryCallImpl 组一批 ≤6 op；流式把 op 拆成逐次 FillOps 的独立批次——每 Write 一批、每 Read 一批、WritesDone 单独下发。</text>
  <text x="24" y="426" font-size="9" fill="#b23a3a">不变量：同一方向不可并发挂起两个同型 op（如两个 Write 同时 pending），否则 core 返回 API misuse；骨架 op 的存在与顺序四型一致。</text>
</svg>
