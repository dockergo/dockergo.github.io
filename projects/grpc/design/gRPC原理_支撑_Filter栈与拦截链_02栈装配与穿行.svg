<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 860" width="860" height="860" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="ds" x="-6%" y="-6%" width="112%" height="112%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.6" flood-color="#0b1220" flood-opacity="0.14"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#5b6472"/>
    </marker>
  </defs>
  <rect width="860" height="860" fill="#fbfbfd"/>
  <text x="40" y="46" font-size="21" font-weight="700" fill="#141922">栈装配 · 穿行 · 短路</text>
  <text x="40" y="72" font-size="13.5" fill="#5b6472">约束(非序号)→拓扑排序→一次分配 · 穿行是数组步进不是虚调用</text>

  <!-- Assembly pipeline -->
  <text x="40" y="112" font-size="15" font-weight="700" fill="#3355aa">① 装配（通道创建期，一次性定型）</text>
  <g filter="url(#ds)">
    <rect x="40" y="128" width="230" height="86" rx="12" fill="#eef4ff" stroke="#c7dbff"/>
    <rect x="315" y="128" width="230" height="86" rx="12" fill="#eef4ff" stroke="#c7dbff"/>
    <rect x="590" y="128" width="230" height="86" rx="12" fill="#e9f0ff" stroke="#b8ccf5"/>
  </g>
  <text x="60" y="156" font-size="14.5" font-weight="600" fill="#1e2530">RegisterFilter</text>
  <text x="60" y="178" font-size="11.5" fill="#6b7480">各 filter 声明属哪叠栈</text>
  <text x="60" y="196" font-size="11.5" fill="#6b7480">(client/server/subchannel)</text>
  <text x="335" y="156" font-size="14.5" font-weight="600" fill="#1e2530">After/Before/Terminal</text>
  <text x="335" y="178" font-size="11.5" fill="#6b7480">约束 → 拓扑排序得</text>
  <text x="335" y="196" font-size="11.5" fill="#6b7480">确定序列，connected 压底</text>
  <text x="610" y="156" font-size="14.5" font-weight="600" fill="#1e2530">Build 一整块内存</text>
  <text x="610" y="178" font-size="11.5" fill="#6b7480">算总大小 zalloc，逐层</text>
  <text x="610" y="196" font-size="11.5" fill="#6b7480">init_channel_elem 定偏移</text>
  <g stroke="#5b6472" stroke-width="1.6" fill="none" marker-end="url(#ar)">
    <path d="M270 171 H315"/>
    <path d="M545 171 H590"/>
  </g>

  <!-- Traverse -->
  <text x="40" y="268" font-size="15" font-weight="700" fill="#3355aa">② 穿行 · 下行 op 批 / 回程</text>
  <g filter="url(#ds)">
    <rect x="120" y="288" width="620" height="54" rx="11" fill="#f4f0ff" stroke="#d8ccf2"/>
    <rect x="120" y="360" width="620" height="54" rx="11" fill="#f4f0ff" stroke="#d8ccf2"/>
    <rect x="120" y="432" width="620" height="54" rx="11" fill="#f4f0ff" stroke="#d8ccf2"/>
    <rect x="120" y="504" width="620" height="60" rx="11" fill="#e9f9ef" stroke="#b6e6c8"/>
  </g>
  <g font-size="14" font-weight="600" fill="#2a2140">
    <text x="140" y="321">client filter：鉴权 / 统计 / 压缩</text>
    <text x="140" y="393">retry · deadline · message_size · fault_injection</text>
    <text x="140" y="465">load-balanced call：选 subchannel</text>
    <text x="140" y="533" fill="#116b3a">connected_channel（栈底 Terminal）→ transport 发帧</text>
  </g>
  <g stroke="#7a5bd0" stroke-width="1.8" fill="none" marker-end="url(#ar)">
    <path d="M96 315 V537 H120" transform="translate(0,0)"/>
    <path d="M430 342 V360"/>
    <path d="M430 414 V432"/>
    <path d="M430 486 V504"/>
  </g>
  <text x="60" y="300" font-size="11.5" fill="#7a5bd0">grpc_call_next_op</text>
  <text x="60" y="316" font-size="11.5" fill="#7a5bd0">= elem+1</text>
  <text x="60" y="332" font-size="11.5" fill="#7a5bd0">数组步进</text>

  <!-- short-circuit -->
  <g filter="url(#ds)">
    <rect x="590" y="600" width="230" height="100" rx="12" fill="#fdeded" stroke="#f0c4c4"/>
  </g>
  <text x="610" y="628" font-size="14" font-weight="700" fill="#a23a3a">短路（不调 next_op）</text>
  <g font-size="11.8" fill="#a23a3a">
    <text x="610" y="652">deadline 已超 / fault 命中</text>
    <text x="610" y="672">本层直接回填错误</text>
    <text x="610" y="692">trailing metadata，不到 transport</text>
  </g>
  <path d="M430 564 C 430 590, 600 600, 640 600" stroke="#e08a8a" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>

  <!-- v3 note -->
  <g filter="url(#ds)">
    <rect x="40" y="600" width="520" height="100" rx="12" fill="#fff8ec" stroke="#f0dcae"/>
  </g>
  <text x="60" y="628" font-size="14" font-weight="700" fill="#8a6a12">③ v3 拦截链：把洋葱 promise 化</text>
  <g font-size="11.8" fill="#8a6a12">
    <text x="60" y="652">filter 不再实现 vtable，提供 Call 类 + 六个拦截点</text>
    <text x="60" y="672">StackBuilder 按事件预聚成 Layout，顺序遍历免指针追逐</text>
    <text x="60" y="692">任一步产出错误即短路推回 · 与 v2 栈并存等价，逐步迁移</text>
  </g>

  <g filter="url(#ds)">
    <rect x="40" y="726" width="780" height="96" rx="12" fill="#f3f5f8" stroke="#dfe4ea"/>
  </g>
  <text x="60" y="754" font-size="13.5" font-weight="700" fill="#334">不变量</text>
  <g font-size="12" fill="#4a5560">
    <text x="60" y="778">· "哪些 filter、什么顺序、各占多大" 通道创建时定型，每次调用复用同一布局</text>
    <text x="60" y="800">· 穿行 = 连续内存里 elem+1 步进，非虚调用；栈底永远 connected_channel（Terminal）</text>
  </g>
</svg>
