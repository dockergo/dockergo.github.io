<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="480" viewBox="0 0 1020 480" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="sc" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="3.5" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="ca" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#4f6f9f"/></marker>
    <marker id="cg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker></defs>
  <rect width="1020" height="480" fill="#fbfbfd"/>
  <text x="24" y="30" font-size="14" font-weight="700" fill="#1d1d1f">tag 生命周期：op 完成 → grpc_cq_end_op 无锁入队 → 「仅首元素 kick」→ 消费线程 Next 取走 → 三态返回</text>
  <text x="24" y="49" font-size="10" fill="#8a8a8e">tag 是应用注册的不透明指针，gRPC 只原样回传；生产者是任意 I/O 线程（MPSC 多生产者），消费者是调 Next 的应用线程（单消费者）</text>

  <!-- producer side -->
  <text x="24" y="80" font-size="10.5" font-weight="700" fill="#6f3ea8">生产侧 · I/O 线程（op 完成即投递）</text>
  <rect x="24" y="90" width="210" height="66" rx="10" fill="#f4eefb" stroke="#ddccef" filter="url(#sc)"/>
  <text x="129" y="116" font-size="10" font-weight="600" text-anchor="middle" fill="#6f3ea8">grpc_cq_end_op</text>
  <text x="129" y="132" font-size="7.5" text-anchor="middle" fill="#9a76c0">按 CQ 类型转发（:925）</text>
  <text x="129" y="146" font-size="7.5" text-anchor="middle" fill="#9a76c0">next :755 / pluck :825</text>

  <rect x="258" y="90" width="230" height="66" rx="10" fill="#fff" stroke="#ddccef" filter="url(#sc)"/>
  <text x="373" y="114" font-size="9" font-weight="600" text-anchor="middle" fill="#6f3ea8">写结果进 grpc_cq_completion</text>
  <text x="373" y="129" font-size="7.5" text-anchor="middle" fill="#9a76c0">调用方预留 storage：tag+next+done</text>
  <text x="373" y="143" font-size="7.5" text-anchor="middle" fill="#9a76c0">completion_queue.h:33</text>

  <line x1="234" y1="123" x2="256" y2="123" stroke="#8a5cae" stroke-width="1.5" marker-end="url(#ca)"/>

  <!-- lock-free queue -->
  <rect x="512" y="82" width="220" height="150" rx="12" fill="#eafaf1" stroke="#b8e6cd" filter="url(#sc)"/>
  <text x="622" y="104" font-size="10" font-weight="700" text-anchor="middle" fill="#1c6b45">CqEventQueue（MPSC 无锁）</text>
  <text x="622" y="119" font-size="7.5" text-anchor="middle" fill="#5aa07d">completion_queue.cc:286</text>
  <g text-anchor="middle">
    <rect x="532" y="130" width="180" height="22" rx="5" fill="#fff" stroke="#b8e6cd"/><text x="622" y="145" font-size="8" fill="#256b48">Push（无锁压栈） :547</text>
    <rect x="532" y="158" width="180" height="22" rx="5" fill="#fff" stroke="#b8e6cd"/><text x="622" y="173" font-size="8" fill="#256b48">Pop（单消费者弹出） :553</text>
    <rect x="532" y="186" width="180" height="22" rx="5" fill="#fff" stroke="#b8e6cd"/><text x="622" y="201" font-size="8" fill="#256b48">num_items 免锁探空</text>
  </g>
  <line x1="488" y1="123" x2="510" y2="140" stroke="#2f9e6e" stroke-width="1.5" marker-end="url(#cg)"/>

  <!-- kick optimization -->
  <rect x="512" y="244" width="220" height="70" rx="10" fill="#fdf6ec" stroke="#f0dcb8" filter="url(#sc)"/>
  <text x="622" y="266" font-size="9.5" font-weight="700" text-anchor="middle" fill="#9a6a1c">仅首元素才 kick</text>
  <text x="622" y="283" font-size="7.5" text-anchor="middle" fill="#b58a3c">is_first 时才 poller_vtable->kick</text>
  <text x="622" y="297" font-size="7.5" text-anchor="middle" fill="#b58a3c">completion_queue.cc:794 · 避免惊群</text>
  <line x1="622" y1="232" x2="622" y2="242" stroke="#c99a3c" stroke-width="1.4" marker-end="url(#ca)"/>

  <!-- consumer side -->
  <text x="756" y="80" font-size="10.5" font-weight="700" fill="#4f6f9f">消费侧 · 应用线程（反复 Next/Pluck 驱动）</text>
  <rect x="756" y="90" width="240" height="120" rx="12" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#sc)"/>
  <text x="876" y="112" font-size="9.5" font-weight="600" text-anchor="middle" fill="#3f5f8f">cq_next 主循环 :994</text>
  <text x="876" y="128" font-size="7.5" text-anchor="middle" fill="#7d94b5">探队列 → Pop 取到即返回</text>
  <text x="876" y="142" font-size="7.5" text-anchor="middle" fill="#7d94b5">否则挂 poller Work 等 kick</text>
  <line x1="732" y1="150" x2="754" y2="150" stroke="#4f6f9f" stroke-width="1.5" marker-end="url(#ca)"/>
  <text x="876" y="164" font-size="7.5" text-anchor="middle" fill="#7d94b5">TLS 快取：g_cached_cq 省一次入队/kick（:515）</text>
  <text x="876" y="180" font-size="7.5" text-anchor="middle" fill="#93a3bd">C 入口 next :1161 · pluck :1345/:1234</text>
  <text x="876" y="197" font-size="7.5" text-anchor="middle" fill="#93a3bd">tag 关联回各自的 RPC 状态机</text>

  <!-- three states -->
  <text x="756" y="234" font-size="10" font-weight="700" fill="#4a4a4f">三态返回（grpc_types.h:226 · C++ NextStatus :122）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="756" y="244" width="76" height="52" rx="8" fill="#eafaf1" stroke="#b8e6cd"/><text x="794" y="266" font-weight="600" fill="#1c6b45">OP_</text><text x="794" y="279" font-weight="600" fill="#1c6b45">COMPLETE</text><text x="794" y="292" font-size="7" fill="#5aa07d">取到事件</text>
    <rect x="840" y="244" width="76" height="52" rx="8" fill="#fdeeee" stroke="#f0cccc"/><text x="878" y="266" font-weight="600" fill="#b23a3a">QUEUE_</text><text x="878" y="279" font-weight="600" fill="#b23a3a">SHUTDOWN</text><text x="878" y="292" font-size="7" fill="#c56b6b">已关且 pending=0</text>
    <rect x="924" y="244" width="72" height="52" rx="8" fill="#fdf6ec" stroke="#f0dcb8"/><text x="960" y="266" font-weight="600" fill="#9a6a1c">QUEUE_</text><text x="960" y="279" font-weight="600" fill="#9a6a1c">TIMEOUT</text><text x="960" y="292" font-size="7" fill="#b58a3c">超时未到</text>
  </g>

  <text x="24" y="356" font-size="9.5" fill="#4a4a4f">读法：op 完成走 grpc_cq_end_op 把结果写进调用方预留的 completion storage，无锁 Push 进 CqEventQueue；只有当它是队首元素时才 kick 唤醒阻塞在 poller 上的消费线程，消费线程 Next 弹出后按 tag 关联回对应 RPC。</text>
  <text x="24" y="382" font-size="9" fill="#6e6e73">核心不变量：CQ 自身不起线程——必须由应用线程反复 Next/Pluck 驱动；「仅首元素 kick」+ MPSC 无锁队列，让海量 op 完成不为交付抢一把大锁、也不惊群。</text>
  <text x="24" y="408" font-size="9" fill="#a1a1a6">三型分派：NEXT 走此无锁队列，PLUCK 遍历 tag 链表只取指定结果（同步一元），CALLBACK 完成即回调、无需主动取。</text>
  <text x="24" y="434" font-size="9" fill="#a1a1a6">闭环：EventEngine 的 I/O 就绪 / 定时到期回调，最终也经 grpc_cq_end_op 把完成事件送回 CQ——异步 I/O → tag 交付。</text>
</svg>
