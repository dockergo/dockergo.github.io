<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="500" viewBox="0 0 1020 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="ss" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="3.5" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="sa" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#4f6f9f"/></marker>
    <marker id="sb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker></defs>
  <rect width="1020" height="500" fill="#fbfbfd"/>
  <text x="24" y="30" font-size="14" font-weight="700" fill="#1d1d1f">CallSpine：一个 spine，两侧句柄——client 与 server 共享同一 Party，各自只见符合方向的 Push/Pull</text>
  <text x="24" y="49" font-size="10" fill="#8a8a8e">MakeCallPair 造一个 spine，切成 CallInitiator（发起侧）+ UnstartedCallHandler（处理侧）两个视图；编译期杜绝「客户端去写响应头」这类误用</text>

  <!-- central spine -->
  <rect x="330" y="150" width="360" height="200" rx="14" fill="#f4f6fb" stroke="#cdd8ea" filter="url(#ss)"/>
  <text x="510" y="176" font-size="12" font-weight="700" text-anchor="middle" fill="#4f6f9f">CallSpine（调用的公共中段）</text>
  <text x="510" y="192" font-size="7.5" text-anchor="middle" fill="#93a3bd">class CallSpine : public Party, DataSource（call_spine.h:48）</text>
  <rect x="352" y="204" width="316" height="40" rx="8" fill="#fff" stroke="#cdd8ea"/>
  <text x="510" y="221" font-size="9" font-weight="600" text-anchor="middle" fill="#3f5f8f">CallFilters call_filters_（filter 栈运行态）</text>
  <text x="510" y="236" font-size="7.5" text-anchor="middle" fill="#7d94b5">两条独立 Layout：client→server / server→client 消息互不阻塞</text>
  <rect x="352" y="250" width="316" height="34" rx="8" fill="#fff" stroke="#cdd8ea"/>
  <text x="510" y="271" font-size="9" text-anchor="middle" fill="#3f5f8f">Arena（本次调用全部对象分配区，与调用同生共死）</text>
  <rect x="352" y="290" width="316" height="48" rx="8" fill="#eef2fb" stroke="#cdd8ea"/>
  <text x="510" y="308" font-size="9" font-weight="600" text-anchor="middle" fill="#4f6f9f">Party：≤16 participant，并发但不并行 → 无需加锁</text>
  <text x="510" y="323" font-size="7.5" text-anchor="middle" fill="#7d94b5">Spawn / SpawnGuarded（失败即 Cancel）/ SpawnSerializer（保序）</text>
  <text x="510" y="334" font-size="7" text-anchor="middle" fill="#93a3bd">party.h:159 · call_spine.h:198 · party.h:267/343</text>

  <!-- initiator side -->
  <rect x="24" y="120" width="286" height="150" rx="12" fill="#f4eefb" stroke="#ddccef" filter="url(#ss)"/>
  <text x="40" y="142" font-size="11" font-weight="700" fill="#6f3ea8">CallInitiator · 客户端持有侧</text>
  <text x="40" y="158" font-size="7.5" fill="#9a76c0">call_spine.h:375 · spine 的薄包装，方法皆 spine_-&gt;…</text>
  <text x="40" y="180" font-size="8.5" fill="#6f3ea8">PushMessage → PushClientToServerMessage</text>
  <text x="40" y="196" font-size="8.5" fill="#6f3ea8">PullMessage ← server→client 消息</text>
  <text x="40" y="212" font-size="8.5" fill="#6f3ea8">PullServerInitialMetadata ← 响应头</text>
  <text x="40" y="228" font-size="8.5" fill="#6f3ea8">PullServerTrailingMetadata ← 状态码</text>
  <text x="40" y="252" font-size="7.5" fill="#a98cc7">ClientCall::StartCall 存为 started_call_initiator_（client_call.cc:260/278）</text>

  <!-- handler side -->
  <rect x="710" y="120" width="286" height="150" rx="12" fill="#eafaf1" stroke="#b8e6cd" filter="url(#ss)"/>
  <text x="726" y="142" font-size="11" font-weight="700" fill="#1c6b45">CallHandler · 服务端/下游持有侧</text>
  <text x="726" y="158" font-size="7.5" fill="#5aa07d">call_spine.h:514 · 方向恰好相反</text>
  <text x="726" y="180" font-size="8.5" fill="#1c6b45">PushServerInitialMetadata → 写响应头</text>
  <text x="726" y="196" font-size="8.5" fill="#1c6b45">PushMessage → PushServerToClientMessage</text>
  <text x="726" y="212" font-size="8.5" fill="#1c6b45">PullMessage ← client→server 请求</text>
  <text x="726" y="228" font-size="8.5" fill="#1c6b45">PushServerTrailingMetadata → 收尾 CallOnDone</text>
  <text x="726" y="252" font-size="7.5" fill="#5aa07d">MakeServerCall 包成 grpc_call（server_call.cc:273/246/260）</text>

  <!-- arrows initiator<->spine -->
  <line x1="310" y1="180" x2="328" y2="200" stroke="#8a5cae" stroke-width="1.6" marker-end="url(#sa)"/>
  <line x1="328" y1="230" x2="310" y2="240" stroke="#8a5cae" stroke-width="1.6" marker-end="url(#sa)"/>
  <text x="318" y="270" font-size="7" fill="#9a76c0">发起侧视图</text>
  <!-- arrows handler<->spine -->
  <line x1="710" y1="180" x2="692" y2="200" stroke="#2f9e6e" stroke-width="1.6" marker-end="url(#sb)"/>
  <line x1="692" y1="230" x2="710" y2="240" stroke="#2f9e6e" stroke-width="1.6" marker-end="url(#sb)"/>
  <text x="700" y="270" font-size="7" fill="#5aa07d">处理侧视图</text>

  <!-- push/pull backpressure note -->
  <rect x="330" y="360" width="360" height="46" rx="10" fill="#fdf6ec" stroke="#f0dcb8" filter="url(#ss)"/>
  <text x="510" y="380" font-size="9" font-weight="600" text-anchor="middle" fill="#9a6a1c">Push/Pull 都是 promise → 天然背压</text>
  <text x="510" y="396" font-size="7.5" text-anchor="middle" fill="#b58a3c">Push 的 promise 在下游 filter 消费前不 ready；FinishSends 表半关闭</text>

  <!-- child call / forward -->
  <rect x="24" y="360" width="286" height="46" rx="10" fill="#fbfbfd" stroke="#e6e6ea" filter="url(#ss)"/>
  <text x="167" y="380" font-size="9" font-weight="600" text-anchor="middle" fill="#6e6e73">AddChildCall → 重试/hedging 底座</text>
  <text x="167" y="396" font-size="7.5" text-anchor="middle" fill="#a1a1a6">父 trailing 落地即 SpawnCancel 所有子调用（call_spine.h:307）</text>

  <rect x="710" y="360" width="286" height="46" rx="10" fill="#fbfbfd" stroke="#e6e6ea" filter="url(#ss)"/>
  <text x="853" y="380" font-size="9" font-weight="600" text-anchor="middle" fill="#6e6e73">ForwardCall → 代理/拦截</text>
  <text x="853" y="396" font-size="7.5" text-anchor="middle" fill="#a1a1a6">两条 spine 用 promise 搭起：read_messages / read_the_things（:707）</text>

  <text x="24" y="440" font-size="9.5" fill="#4a4a4f">读法：MakeCallPair 造一个 spine 切成方向相反的两个句柄——CallInitiator（客户端立场命名）与 CallHandler（服务端立场），两侧的 party() 是同一个 spine 指针、跑在同一个 Party 上，从不直接对话，全经 spine 的 filter 栈中转。</text>
  <text x="24" y="464" font-size="9" fill="#6e6e73">核心不变量：Party 让同一 spine 上的多个 promise 并发但不并行交替推进，故 spine 内部状态无需加锁；metadata/message/status 沿成对 Push/Pull 双向流动，Push 是 promise 故形成背压。</text>
  <text x="24" y="486" font-size="9" fill="#a1a1a6">组合性：重试、hedging、代理都是「一条或两条 spine + promise」的组合——AddChildCall 派生子调用、ForwardCall 把消息在两条 spine 间搬运。</text>
</svg>
