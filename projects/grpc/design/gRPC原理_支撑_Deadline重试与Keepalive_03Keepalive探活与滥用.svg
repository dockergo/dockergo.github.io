<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="460" viewBox="0 0 1020 460" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="sp" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="3.5" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="ao" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#9a6a1c"/></marker>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b23a3a"/></marker>
    <marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2b5fa0"/></marker></defs>
  <rect width="1020" height="460" fill="#fbfbfd"/>
  <text x="24" y="30" font-size="14" font-weight="700" fill="#1d1d1f">Keepalive 探活 × 滥用检测：一对"惩罚—退让"协议</text>
  <text x="24" y="49" font-size="10" fill="#8a8a8e">客户端周期 PING 判连接死活；服务端用 strike 计数防 ping 过勤，超限即 GOAWAY 踢连，客户端随后自动退让</text>

  <g font-size="9">
    <rect x="628" y="20" width="12" height="10" rx="2" fill="#eafaf1" stroke="#b8e6cd"/><text x="644" y="29" fill="#6e6e73">探活正常</text>
    <rect x="716" y="20" width="12" height="10" rx="2" fill="#fdf6ec" stroke="#f0dcb8"/><text x="732" y="29" fill="#6e6e73">计数/退让</text>
    <rect x="808" y="20" width="12" height="10" rx="2" fill="#fdeeee" stroke="#f0cccc"/><text x="824" y="29" fill="#6e6e73">判死/踢连</text>
    <rect x="896" y="20" width="12" height="10" rx="2" fill="#eaf1fb" stroke="#cadcf2"/><text x="912" y="29" fill="#6e6e73">默认值</text>
  </g>

  <!-- LEFT: client keepalive state machine -->
  <rect x="24" y="64" width="472" height="308" rx="12" fill="#eafaf1" stroke="#b8e6cd" filter="url(#sp)"/>
  <text x="40" y="85" font-size="11.5" font-weight="700" fill="#1c6b45">客户端 · keepalive 探活状态机</text>
  <text x="40" y="101" font-size="8" fill="#5aa07d">time != Infinity 才启用；与 BDP ping 复用底层 ping，目的不同</text>

  <g text-anchor="middle" font-size="8.5">
    <rect x="180" y="112" width="160" height="36" rx="8" fill="#fff" stroke="#b8e6cd"/><text x="260" y="129" font-weight="600" fill="#1c6b45">WAITING</text><text x="260" y="141" font-size="6.5" fill="#5aa07d">等 keepalive_time 到期</text>
    <line x1="260" y1="148" x2="260" y2="164" stroke="#2f9e6e" stroke-width="1.5" marker-end="url(#ag)"/>
    <rect x="180" y="166" width="160" height="36" rx="8" fill="#fff" stroke="#b8e6cd"/><text x="260" y="183" font-weight="600" fill="#1c6b45">发 PING</text><text x="260" y="195" font-size="6.5" fill="#5aa07d">init_keepalive_ping</text>
    <line x1="260" y1="202" x2="260" y2="218" stroke="#2f9e6e" stroke-width="1.5" marker-end="url(#ag)"/>
    <rect x="180" y="220" width="160" height="36" rx="8" fill="#fff" stroke="#b8e6cd"/><text x="260" y="237" font-weight="600" fill="#1c6b45">PINGING</text><text x="260" y="249" font-size="6.5" fill="#5aa07d">等 ACK（keepalive_timeout 内）</text>

    <!-- ack path -->
    <path d="M340 238 H400 V130 H340" fill="none" stroke="#2f9e6e" stroke-width="1.4" marker-end="url(#ag)"/>
    <text x="410" y="180" font-size="8" text-anchor="start" fill="#1c6b45">收到 ACK</text>
    <text x="410" y="192" font-size="7" text-anchor="start" fill="#5aa07d">→ 回 WAITING</text>

    <!-- timeout -> dead -->
    <line x1="180" y1="238" x2="128" y2="238" stroke="#b23a3a" stroke-width="1.5" marker-end="url(#ar)"/>
    <rect x="40" y="270" width="180" height="44" rx="8" fill="#fdeeee" stroke="#f0cccc"/><text x="130" y="288" font-weight="600" fill="#b23a3a">超时无 ACK → 判连接死</text><text x="130" y="301" font-size="6.5" fill="#c56b6b">关闭 transport</text>
  </g>
  <rect x="40" y="322" width="416" height="40" rx="8" fill="#eaf1fb" stroke="#cadcf2"/>
  <text x="52" y="339" font-size="8" fill="#2b5fa0">默认：client keepalive_time = Infinity（默认关闭）· timeout 20s · server time 2h</text>
  <text x="52" y="353" font-size="8" fill="#4b7bbf">permit_without_calls 两侧默认 false —— 无活跃 RPC 时是否仍 ping</text>

  <!-- RIGHT: server abuse detection -->
  <rect x="524" y="64" width="472" height="308" rx="12" fill="#fdf6ec" stroke="#f0dcb8" filter="url(#sp)"/>
  <text x="540" y="85" font-size="11.5" font-weight="700" fill="#9a6a1c">服务端 · 滥用检测（惩罚）</text>
  <text x="540" y="101" font-size="8" fill="#c1955a">反向用 strike 计数防客户端 ping 过勤</text>

  <g text-anchor="middle" font-size="8.5">
    <rect x="640" y="112" width="240" height="34" rx="8" fill="#fff" stroke="#f0dcb8"/><text x="760" y="128" font-weight="600" fill="#9a6a1c">收到一个 PING</text><text x="760" y="140" font-size="6.5" fill="#c1955a">检查距上次 ping 的间隔</text>
    <line x1="760" y1="146" x2="760" y2="160" stroke="#9a6a1c" stroke-width="1.5" marker-end="url(#ao)"/>
    <rect x="600" y="162" width="320" height="42" rx="8" fill="#fff" stroke="#f0dcb8"/><text x="760" y="180" font-weight="600" fill="#9a6a1c">间隔 &lt; 最小间隔？</text><text x="760" y="194" font-size="6.5" fill="#c1955a">默认 5min，无活跃 RPC 时放宽到 2h</text>
    <line x1="760" y1="204" x2="760" y2="218" stroke="#9a6a1c" stroke-width="1.5" marker-end="url(#ao)"/>
    <text x="778" y="216" font-size="7.5" text-anchor="start" fill="#9a6a1c">是</text>
    <rect x="640" y="220" width="240" height="34" rx="8" fill="#fff" stroke="#f0dcb8"/><text x="760" y="236" font-weight="600" fill="#9a6a1c">++ping_strikes</text><text x="760" y="248" font-size="6.5" fill="#c1955a">strike 上限默认 2</text>
    <line x1="760" y1="254" x2="760" y2="268" stroke="#b23a3a" stroke-width="1.5" marker-end="url(#ar)"/>
    <text x="778" y="266" font-size="7.5" text-anchor="start" fill="#b23a3a">超上限</text>
    <rect x="600" y="270" width="320" height="44" rx="8" fill="#fdeeee" stroke="#f0cccc"/><text x="760" y="288" font-weight="600" fill="#b23a3a">GOAWAY(ENHANCE_YOUR_CALM)</text><text x="760" y="301" font-size="6.5" fill="#c56b6b">too_many_pings，关闭 transport</text>
  </g>

  <!-- client backoff (blue) -->
  <rect x="540" y="322" width="440" height="40" rx="8" fill="#eaf1fb" stroke="#cadcf2"/>
  <text x="552" y="339" font-size="8.5" font-weight="600" fill="#2b5fa0">客户端退让：收到 too_many_pings 后</text>
  <text x="552" y="353" font-size="8" fill="#4b7bbf">新连接 keepalive_time 翻倍（BACKOFF_MULTIPLIER）—— 自动退让，避免反复被踢</text>

  <!-- cross arrow goaway -> client backoff -->
  <line x1="600" y1="292" x2="510" y2="292" stroke="#b23a3a" stroke-width="1.2" stroke-dasharray="4 3"/>
  <path d="M510 292 V342 H538" fill="none" stroke="#2b5fa0" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#ab)"/>

  <text x="24" y="392" font-size="9" fill="#4a4a4f">读法：客户端在 WAITING↔PINGING 间循环，ACK 及时则连接判活、超时则判死关连；服务端对过勤 ping 累计 strike，超限即用 GOAWAY 踢连。</text>
  <text x="24" y="410" font-size="9" fill="#6e6e73">不变量：keepalive 越勤未必越好 —— 过激 ping 触发 too_many_pings，客户端还会自罚把 keepalive_time 翻倍。</text>
  <text x="24" y="428" font-size="9" fill="#8a8a8e">边界：keepalive 作用在"连接"粒度、独立于 deadline（调用粒度）；参数需与中间设备（LB/NAT）空闲超时协调。</text>
</svg>
