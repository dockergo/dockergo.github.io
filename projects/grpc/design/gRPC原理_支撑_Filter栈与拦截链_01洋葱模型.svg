<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="450" viewBox="0 0 1020 450" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="sk" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="3.5" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="hk" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="hk2" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M9,0 L0,5 L9,10 z" fill="#2f9e6e"/></marker></defs>
  <rect width="1020" height="450" fill="#fbfbfd"/>
  <text x="24" y="30" font-size="14" font-weight="700" fill="#1d1d1f">Filter 栈与拦截链：每次调用穿过一叠可插拔 filter，栈底把 op 交给 transport</text>
  <text x="24" y="49" font-size="10" fill="#8a8a8e">channel stack = 一列 grpc_channel_filter；请求向下穿过、响应向上穿回；v3 用 UnstartedCallDestination 拦截链</text>

  <!-- stack column -->
  <rect x="120" y="66" width="360" height="330" rx="12" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="300" y="86" font-size="10.5" font-weight="700" fill="#4f6f9f" text-anchor="middle">grpc_channel_stack（一列 filter）</text>

  <g text-anchor="middle" font-size="9.5" font-weight="600">
    <rect x="140" y="98" width="320" height="40" rx="8" fill="#eef8f2" stroke="#cbe6d5" filter="url(#sk)"/><text x="300" y="115" fill="#1c7a4d">CallSpine 入口（发起）</text><text x="300" y="130" font-size="7.5" font-weight="400" fill="#3a8a63">收到 CallOpSet</text>
    <rect x="140" y="146" width="320" height="36" rx="8" fill="#fff" stroke="#cfe0f2" filter="url(#sk)"/><text x="300" y="169" fill="#1d1d1f">client-side filter（鉴权 / 统计 / 压缩）</text>
    <rect x="140" y="190" width="320" height="36" rx="8" fill="#fff" stroke="#cfe0f2" filter="url(#sk)"/><text x="300" y="213" fill="#1d1d1f">message_size / fault_injection filter</text>
    <rect x="140" y="234" width="320" height="36" rx="8" fill="#fff" stroke="#f0d0b0" filter="url(#sk)"/><text x="300" y="257" fill="#c0651f">retry / deadline filter</text>
    <rect x="140" y="278" width="320" height="36" rx="8" fill="#fff" stroke="#cfe0f2" filter="url(#sk)"/><text x="300" y="301" fill="#1d1d1f">load-balanced call（选 subchannel）</text>
    <rect x="140" y="322" width="320" height="52" rx="8" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#sk)"/><text x="300" y="343" fill="#8a6d3b">connected_channel（栈底 filter）</text><text x="300" y="360" font-size="7.5" font-weight="400" fill="#a98d54">start_transport_stream_op_batch → transport · connected_channel.cc:143</text>
  </g>

  <!-- down / up arrows -->
  <line x1="105" y1="118" x2="105" y2="340" stroke="#2f9e6e" stroke-width="2" marker-end="url(#hk)"/>
  <text x="96" y="230" font-size="8.5" fill="#2f9e6e" text-anchor="middle" transform="rotate(-90 96 230)">请求向下穿过</text>
  <line x1="495" y1="340" x2="495" y2="118" stroke="#2f9e6e" stroke-width="2" marker-end="url(#hk)"/>
  <text x="505" y="230" font-size="8.5" fill="#2f9e6e" transform="rotate(90 505 230)">响应向上穿回</text>

  <!-- filter struct -->
  <rect x="540" y="66" width="456" height="150" rx="12" fill="#fff" stroke="#e2e2e7" filter="url(#sk)"/>
  <text x="558" y="88" font-size="10.5" font-weight="700" fill="#1d1d1f">grpc_channel_filter 结构（channel_stack.h:97）</text>
  <text x="558" y="110" font-size="8.5" fill="#4a4a4f">• start_transport_stream_op_batch —— 处理一次调用的 op 批（:100）</text>
  <text x="558" y="128" font-size="8.5" fill="#4a4a4f">• start_transport_op —— 处理通道级操作（:105）</text>
  <text x="558" y="146" font-size="8.5" fill="#4a4a4f">• init/destroy_call_elem —— 每调用的 per-call 状态</text>
  <text x="558" y="164" font-size="8.5" fill="#4a4a4f">• init/destroy_channel_elem —— 每通道的 per-channel 状态（:141）</text>
  <text x="558" y="186" font-size="8" fill="#93a7c6">每个 grpc_channel_element 持 filter 指针 + 状态（:160）</text>
  <text x="558" y="204" font-size="8" fill="#a1a1a6">栈由 ChannelInit 按类型注册的 filter 构建（channel_init.h:310 RegisterFilter）</text>

  <!-- v3 chain -->
  <rect x="540" y="228" width="456" height="120" rx="12" fill="#f5f0fb" stroke="#ddccef" filter="url(#sk)"/>
  <text x="558" y="250" font-size="10.5" font-weight="700" fill="#6f3ea8">v3 拦截链（interception_chain.h）</text>
  <text x="558" y="270" font-size="8.5" fill="#7a4fa0">InterceptionChainBuilder 组装一串 Interceptor（:97），</text>
  <text x="558" y="286" font-size="8.5" fill="#7a4fa0">每个是 UnstartedCallDestination，可拦截 / 改写 / hijack 调用（:68）。</text>
  <text x="558" y="304" font-size="8.5" fill="#7a4fa0">promise 化：调用像穿过一串 destination，末端是 transport。</text>
  <text x="558" y="326" font-size="8" fill="#b39ad0">C++ 层：ClientInterceptor / ServerInterceptor 面向用户（support/*_interceptor.h）</text>
  <text x="558" y="342" font-size="8" fill="#c3b0dc">经典 v2 栈与 v3 链并存，逐步迁移。</text>

  <text x="24" y="376" font-size="9.5" fill="#4a4a4f">读法：filter 栈是"洋葱模型"——一次调用从最外层穿到栈底 transport、响应原路穿回；每层可读写 metadata、拦截、短路、注入错误。</text>
  <text x="24" y="398" font-size="9" fill="#6e6e73">与 K8s 的 handler chain、Netty 的 pipeline 同构；gRPC 的 filter 按 channel_stack_type 注册，客户端/服务端/subchannel 各有自己的一叠。</text>
  <text x="24" y="420" font-size="9" fill="#a1a1a6">内置 filter：http · message_size · fault_injection · rbac · census · channel_idle · stateful_session · logging（src/core/ext/filters/*）。</text>
  <text x="24" y="440" font-size="9" fill="#a1a1a6">retry / deadline / load-balanced call 也是特殊 filter，装配在栈的固定位置。</text>
</svg>
