<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="460" viewBox="0 0 1020 460" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="sq" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="3.5" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="hq" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="sq2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c99a3a"/></marker></defs>
  <rect width="1020" height="460" fill="#fbfbfd"/>
  <text x="24" y="30" font-size="14" font-weight="700" fill="#1d1d1f">CompletionQueue / EventEngine：tag 驱动的异步交付基座</text>
  <text x="24" y="49" font-size="10" fill="#8a8a8e">op 完成 → 投递 tag 到 CQ → 应用线程 Next/Pluck 取走；底层 I/O 由 EventEngine + poller 非阻塞驱动</text>

  <!-- CQ three types -->
  <rect x="24" y="66" width="640" height="176" rx="12" fill="#f6f6f8" stroke="#e2e2e7"/>
  <text x="40" y="87" font-size="11" font-weight="700" fill="#4a4a4f">① CompletionQueue 三型（completion_queue.cc）</text>
  <g font-size="9" font-weight="600" text-anchor="middle">
    <rect x="40" y="98" width="196" height="80" rx="10" fill="#fff" stroke="#e2e2e7" filter="url(#sq)"/>
    <text x="138" y="118" fill="#1d1d1f">GRPC_CQ_NEXT</text>
    <text x="138" y="136" font-size="7.5" font-weight="400" fill="#6e6e73">Next() 任取完成事件</text>
    <text x="138" y="150" font-size="7.5" font-weight="400" fill="#6e6e73">CqEventQueue Push/Pop</text>
    <text x="138" y="166" font-size="7" font-weight="400" fill="#a1a1a6">cq_next :994 · :285</text>

    <rect x="246" y="98" width="196" height="80" rx="10" fill="#fff" stroke="#e2e2e7" filter="url(#sq)"/>
    <text x="344" y="118" fill="#1d1d1f">GRPC_CQ_PLUCK</text>
    <text x="344" y="136" font-size="7.5" font-weight="400" fill="#6e6e73">Pluck(tag) 取指定 tag</text>
    <text x="344" y="150" font-size="7.5" font-weight="400" fill="#6e6e73">一元阻塞调用用</text>
    <text x="344" y="166" font-size="7" font-weight="400" fill="#a1a1a6">cq_pluck :469</text>

    <rect x="452" y="98" width="196" height="80" rx="10" fill="#fff" stroke="#e2e2e7" filter="url(#sq)"/>
    <text x="550" y="118" fill="#1d1d1f">GRPC_CQ_CALLBACK</text>
    <text x="550" y="136" font-size="7.5" font-weight="400" fill="#6e6e73">完成即回调（无需取）</text>
    <text x="550" y="150" font-size="7.5" font-weight="400" fill="#6e6e73">callback API 用</text>
    <text x="550" y="166" font-size="7" font-weight="400" fill="#a1a1a6">cq_callback_data :378</text>
  </g>
  <text x="40" y="198" font-size="8" fill="#6e6e73">op 完成 → cq_end_op_for_next(:451) / for_pluck(:456) 把 grpc_cq_completion 塞入队列并唤醒等待者</text>
  <text x="40" y="216" font-size="8" fill="#6e6e73">Next 返回三态：GOT_EVENT / TIMEOUT / SHUTDOWN（completion_queue.h:122）</text>
  <text x="40" y="234" font-size="8" fill="#93a7c6">CQ 不起线程——必须由应用线程调 Next/Pluck 驱动取事件</text>

  <!-- app threads -->
  <rect x="684" y="66" width="312" height="176" rx="12" fill="#eef8f2" stroke="#cbe6d5"/>
  <text x="700" y="87" font-size="11" font-weight="700" fill="#1c7a4d">② 应用线程池</text>
  <g font-size="8.5" text-anchor="middle" fill="#1c6b45">
    <rect x="700" y="98" width="128" height="40" rx="8" fill="#fff" stroke="#cbe6d5"/><text x="764" y="122">worker: cq.Next()</text>
    <rect x="700" y="146" width="128" height="40" rx="8" fill="#fff" stroke="#cbe6d5"/><text x="764" y="170">worker: cq.Next()</text>
    <rect x="838" y="98" width="140" height="88" rx="8" fill="#fff" stroke="#cbe6d5"/><text x="908" y="130">拿到 tag</text><text x="908" y="148" font-size="7.5" fill="#3a8a63">→ 分发到 handler</text><text x="908" y="164" font-size="7.5" fill="#3a8a63">→ 处理业务</text>
  </g>
  <text x="700" y="208" font-size="8" fill="#3a8a63">tag = 应用注册的不透明指针，关联"哪个 op 完成了"</text>
  <text x="700" y="226" font-size="8" fill="#7bb89a">async server：一个 CQ + 多线程 Next，事件驱动高并发</text>

  <line x1="664" y1="150" x2="684" y2="150" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#hq)"/>
  <text x="674" y="143" font-size="7" fill="#2f9e6e" text-anchor="middle">tag</text>

  <!-- EventEngine -->
  <rect x="24" y="258" width="972" height="150" rx="12" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="40" y="279" font-size="11" font-weight="700" fill="#4f6f9f">③ EventEngine · 统一异步 I/O 与定时（include/grpc/event_engine/event_engine.h:112）</text>
  <g font-size="9" font-weight="600" text-anchor="middle">
    <rect x="40" y="290" width="220" height="64" rx="10" fill="#fff" stroke="#cfe0f2" filter="url(#sq)"/>
    <text x="150" y="310" fill="#1d1d1f">Run / RunAfter</text>
    <text x="150" y="326" font-size="7.5" font-weight="400" fill="#6e6e73">立即 / 定时执行闭包</text>
    <text x="150" y="342" font-size="7" font-weight="400" fill="#a1a1a6">Run :597/:610 · RunAfter :622</text>

    <rect x="270" y="290" width="220" height="64" rx="10" fill="#fff" stroke="#cfe0f2" filter="url(#sq)"/>
    <text x="380" y="310" fill="#1d1d1f">Connect / Listener</text>
    <text x="380" y="326" font-size="7.5" font-weight="400" fill="#6e6e73">建立/监听连接</text>
    <text x="380" y="342" font-size="7" font-weight="400" fill="#a1a1a6">CreateListener :474 · Connect :490</text>

    <rect x="500" y="290" width="220" height="64" rx="10" fill="#fff" stroke="#cfe0f2" filter="url(#sq)"/>
    <text x="610" y="310" fill="#1d1d1f">Endpoint</text>
    <text x="610" y="326" font-size="7.5" font-weight="400" fill="#6e6e73">抽象读写通道（收发字节）</text>
    <text x="610" y="342" font-size="7" font-weight="400" fill="#a1a1a6">class Endpoint :183</text>

    <rect x="730" y="290" width="246" height="64" rx="10" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#sq)"/>
    <text x="853" y="310" fill="#8a6d3b">poller / iomgr</text>
    <text x="853" y="326" font-size="7.5" font-weight="400" fill="#a98d54">pollset 轮询 fd · exec_ctx 批闭包</text>
    <text x="853" y="342" font-size="7" font-weight="400" fill="#c3ab7e">epoll / kqueue / Apple CF</text>
  </g>
  <text x="40" y="378" font-size="8" fill="#6e6e73">实现可插拔：default_event_engine · posix_engine · cf_engine（Apple）· ares_resolver（异步 DNS）</text>
  <text x="40" y="396" font-size="8" fill="#93a7c6">RunAfter 承载 deadline 定时与 keepalive ping 调度；I/O 就绪回调最终把 op 完成事件送回 CQ</text>

  <text x="24" y="432" font-size="9.5" fill="#4a4a4f">读法：EventEngine/poller 在底层非阻塞地等 fd 就绪 → 触发闭包推进 transport → op 完成经 cq_end_op 投递 tag → 应用线程 Next/Pluck 取走处理。</text>
  <text x="24" y="452" font-size="9" fill="#a1a1a6">这套 tag 驱动 + 统一异步接口让 gRPC 跨平台（Linux/Mac/Windows）与跨语言绑定共享同一并发模型。</text>
</svg>
