<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="440" viewBox="0 0 1000 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="sf" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="3.5" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="hf" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker></defs>
  <rect width="1000" height="440" fill="#fbfbfd"/>
  <text x="24" y="30" font-size="14" font-weight="700" fill="#1d1d1f">Stub / Channel 契约：从 .proto 到一次 CallOpSet</text>
  <text x="24" y="49" font-size="10" fill="#8a8a8e">Protobuf 生成强类型代理，Channel 把「发送 metadata + 消息 / 接收 消息 + 状态」组装成一组 op 下发 core</text>

  <!-- proto -->
  <rect x="24" y="70" width="952" height="52" rx="12" fill="#eef8f2" stroke="#cbe6d5" filter="url(#sf)"/>
  <text x="40" y="91" font-size="11" font-weight="700" fill="#1c7a4d">① .proto 契约 · protoc + grpc 插件生成代码</text>
  <text x="40" y="110" font-size="9" fill="#3a8a63">service Greeter { rpc SayHello(HelloReq) returns (HelloResp); } → 生成 Greeter::Stub（客户端）与 Greeter::Service（服务端骨架）</text>

  <!-- client side -->
  <rect x="24" y="138" width="468" height="270" rx="12" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="40" y="159" font-size="11" font-weight="700" fill="#4f6f9f">客户端</text>

  <rect x="40" y="170" width="436" height="46" rx="8" fill="#fff" stroke="#cfe0f2" filter="url(#sf)"/>
  <text x="52" y="188" font-size="10" font-weight="600" fill="#1d1d1f">② Stub 方法（强类型）</text>
  <text x="52" y="205" font-size="8" fill="#6e6e73">RpcMethod{name, RpcType} · NORMAL_RPC / CLIENT_STREAMING / SERVER_STREAMING / BIDI · rpc_method.h:31</text>

  <rect x="40" y="222" width="436" height="46" rx="8" fill="#fff" stroke="#cfe0f2" filter="url(#sf)"/>
  <text x="52" y="240" font-size="10" font-weight="600" fill="#1d1d1f">③ 组装 CallOpSet</text>
  <text x="52" y="257" font-size="8" fill="#6e6e73">CallOpSendInitialMetadata + SendMessage + RecvMessage + RecvStatus · client_unary_call.h:64</text>

  <rect x="40" y="274" width="436" height="46" rx="8" fill="#fff" stroke="#cfe0f2" filter="url(#sf)"/>
  <text x="52" y="292" font-size="10" font-weight="600" fill="#1d1d1f">④ Channel 承载 + 下发</text>
  <text x="52" y="309" font-size="8" fill="#6e6e73">Channel::CreateCall / PerformOpsOnCall · channel.h:96 / :99</text>

  <rect x="40" y="326" width="436" height="46" rx="8" fill="#eafaf1" stroke="#b8e6cd" filter="url(#sf)"/>
  <text x="52" y="344" font-size="10" font-weight="600" fill="#1c6b45">⑤ 阻塞等结果（一元）</text>
  <text x="52" y="361" font-size="8" fill="#3a8a63">CompletionQueue cq; cq.Pluck(&ops) · Next/AsyncNext 三态 · completion_queue.h:122/177</text>

  <!-- server side -->
  <rect x="508" y="138" width="468" height="270" rx="12" fill="#f5f0fb" stroke="#ddccef"/>
  <text x="524" y="159" font-size="11" font-weight="700" fill="#6f3ea8">服务端</text>

  <rect x="524" y="170" width="436" height="46" rx="8" fill="#fff" stroke="#ddccef" filter="url(#sf)"/>
  <text x="536" y="188" font-size="10" font-weight="600" fill="#1d1d1f">② ServerBuilder 注册 Service</text>
  <text x="536" y="205" font-size="8" fill="#9a76c0">RegisterService → 每方法登记为 RegisteredMethod · server.cc:446</text>

  <rect x="524" y="222" width="436" height="46" rx="8" fill="#fff" stroke="#ddccef" filter="url(#sf)"/>
  <text x="536" y="240" font-size="10" font-weight="600" fill="#1d1d1f">③ RequestMatcher 收调用</text>
  <text x="536" y="257" font-size="8" fill="#9a76c0">MatchOrQueue：入站 call 与等待的 RequestedCall 配对 · server.cc:435/473</text>

  <rect x="524" y="274" width="436" height="46" rx="8" fill="#fff" stroke="#ddccef" filter="url(#sf)"/>
  <text x="536" y="292" font-size="10" font-weight="600" fill="#6f3ea8">④ 方法 handler 执行</text>
  <text x="536" y="309" font-size="8" fill="#9a76c0">反序列化请求 → 业务逻辑 → 序列化响应</text>

  <rect x="524" y="326" width="436" height="46" rx="8" fill="#eafaf1" stroke="#b8e6cd" filter="url(#sf)"/>
  <text x="536" y="344" font-size="10" font-weight="600" fill="#1c6b45">⑤ 回 message + grpc-status</text>
  <text x="536" y="361" font-size="8" fill="#3a8a63">trailing metadata 带 status code/message</text>

  <line x1="492" y1="250" x2="508" y2="250" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#hf)"/>
  <text x="500" y="242" font-size="7.5" fill="#2f9e6e" text-anchor="middle">wire</text>

  <text x="24" y="428" font-size="9" fill="#6e6e73">要点：Stub 只是「组装 op + 交 Channel + 等 tag」的薄封装；真正的解析/选路/传输都在 Channel 内部的装配线里完成（见「调用生命周期」主线）。</text>
</svg>
