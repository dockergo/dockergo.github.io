<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="440" viewBox="0 0 1020 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="sl" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="3.5" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="cl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
    <marker id="hl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker></defs>
  <rect width="1020" height="440" fill="#fbfbfd"/>
  <text x="24" y="30" font-size="14" font-weight="700" fill="#1d1d1f">名字解析 + 负载均衡：target → 地址列表 → picker → 选一个 subchannel</text>
  <text x="24" y="49" font-size="10" fill="#8a8a8e">控制大脑：resolver 把逻辑名解析成端点集合与配置，LB 据此产出 picker 供每次调用挑连接</text>

  <!-- pipeline -->
  <rect x="24" y="70" width="220" height="70" rx="10" fill="#fff" stroke="#cfe0f2" filter="url(#sl)"/>
  <text x="38" y="92" font-size="10.5" font-weight="600" fill="#1d1d1f">① Resolver</text>
  <text x="38" y="110" font-size="8" fill="#6e6e73">StartLocked 触发解析</text>
  <text x="38" y="124" font-size="8" fill="#6e6e73">DNS / xds / fake / c2p</text>
  <text x="38" y="136" font-size="7.5" fill="#a1a1a6">resolver.h:49/96</text>

  <rect x="284" y="70" width="220" height="70" rx="10" fill="#fff" stroke="#cfe0f2" filter="url(#sl)"/>
  <text x="298" y="92" font-size="10.5" font-weight="600" fill="#5b7db1">② Result</text>
  <text x="298" y="110" font-size="8" fill="#6e6e73">EndpointAddresses 列表</text>
  <text x="298" y="124" font-size="8" fill="#6e6e73">+ service config（LB 策略等）</text>
  <text x="298" y="136" font-size="7.5" fill="#a1a1a6">resolver.h:52 struct Result</text>

  <rect x="544" y="70" width="220" height="70" rx="10" fill="#fff" stroke="#cfe0f2" filter="url(#sl)"/>
  <text x="558" y="92" font-size="10.5" font-weight="600" fill="#1d1d1f">③ LoadBalancingPolicy</text>
  <text x="558" y="110" font-size="8" fill="#6e6e73">UpdateLocked 消费地址</text>
  <text x="558" y="124" font-size="8" fill="#6e6e73">为每端点建/管 subchannel</text>
  <text x="558" y="136" font-size="7.5" fill="#a1a1a6">lb_policy.h:96</text>

  <rect x="804" y="70" width="192" height="70" rx="10" fill="#eef8f2" stroke="#cbe6d5" filter="url(#sl)"/>
  <text x="818" y="92" font-size="10.5" font-weight="600" fill="#1c7a4d">④ SubchannelPicker</text>
  <text x="818" y="110" font-size="8" fill="#3a8a63">Pick(pick_args) → 一个连接</text>
  <text x="818" y="124" font-size="8" fill="#3a8a63">每调用一次、无锁 O(1)</text>
  <text x="818" y="136" font-size="7.5" fill="#7bb89a">lb_policy.h:201 PickResult</text>

  <line x1="244" y1="105" x2="284" y2="105" stroke="#5b7db1" stroke-width="1.5" marker-end="url(#cl)"/>
  <line x1="504" y1="105" x2="544" y2="105" stroke="#5b7db1" stroke-width="1.5" marker-end="url(#cl)"/>
  <line x1="764" y1="105" x2="804" y2="105" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#hl)"/>

  <!-- two LB policies -->
  <rect x="24" y="160" width="486" height="180" rx="12" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="40" y="182" font-size="11" font-weight="700" fill="#4f6f9f">pick_first（默认）· pick_first.cc:124</text>
  <text x="40" y="202" font-size="8.5" fill="#6e6e73">按地址顺序尝试，Happy Eyeballs 并发试连多个候选（pick_first.cc:226 注释），</text>
  <text x="40" y="216" font-size="8.5" fill="#6e6e73">第一个连上的即选中；picker 恒返回这一个 subchannel。</text>
  <g font-size="8" text-anchor="middle" fill="#4f6f9f">
    <rect x="40" y="232" width="90" height="34" rx="7" fill="#fff" stroke="#cfe0f2"/><text x="85" y="253">addr A</text>
    <rect x="140" y="232" width="90" height="34" rx="7" fill="#eafaf1" stroke="#b8e6cd"/><text x="185" y="248" fill="#1c6b45">addr B ✓</text><text x="185" y="260" font-size="6.5" fill="#3a8a63">先连上</text>
    <rect x="240" y="232" width="90" height="34" rx="7" fill="#fff" stroke="#cfe0f2"/><text x="285" y="253">addr C</text>
  </g>
  <text x="40" y="290" font-size="8.5" fill="#6e6e73">SubchannelList 管理候选（pick_first.cc:138），连接态汇总决定整体 state。</text>
  <text x="40" y="312" font-size="8.5" fill="#93a7c6">适合：单后端 / 连接亲和；所有调用走同一连接、最大化复用。</text>
  <text x="40" y="330" font-size="8" fill="#a1a1a6">Happy Eyeballs：并发试连避免单地址慢启动拖累整体。</text>

  <rect x="534" y="160" width="462" height="180" rx="12" fill="#fbf7ef" stroke="#ecdcbf"/>
  <text x="550" y="182" font-size="11" font-weight="700" fill="#8a6d3b">round_robin · round_robin.cc:59</text>
  <text x="550" y="202" font-size="8.5" fill="#a98d54">为每个端点各建一个子 policy/subchannel，只挑 READY 的，</text>
  <text x="550" y="216" font-size="8.5" fill="#a98d54">Picker 轮转返回（round_robin.cc:141）。</text>
  <g font-size="8" text-anchor="middle" fill="#8a6d3b">
    <rect x="550" y="232" width="80" height="34" rx="7" fill="#eafaf1" stroke="#b8e6cd"/><text x="590" y="253" fill="#1c6b45">A ✓</text>
    <rect x="640" y="232" width="80" height="34" rx="7" fill="#eafaf1" stroke="#b8e6cd"/><text x="680" y="253" fill="#1c6b45">B ✓</text>
    <rect x="730" y="232" width="80" height="34" rx="7" fill="#eafaf1" stroke="#b8e6cd"/><text x="770" y="253" fill="#1c6b45">C ✓</text>
    <rect x="820" y="232" width="80" height="34" rx="7" fill="#fdf0e6" stroke="#f0d0b0"/><text x="860" y="248" fill="#c0651f">D</text><text x="860" y="260" font-size="6.5" fill="#b0783f">未就绪跳过</text>
  </g>
  <text x="550" y="290" font-size="8.5" fill="#a98d54">调用 1→A，调用 2→B，调用 3→C，调用 4→A …… 均摊到所有健康端点。</text>
  <text x="550" y="312" font-size="8.5" fill="#c3ab7e">适合：多副本无状态服务；配合 health check 剔除坏端点。</text>
  <text x="550" y="330" font-size="8" fill="#a1a1a6">EndpointList/健康检查：health_check_client 只把 READY 端点纳入轮转。</text>

  <text x="24" y="368" font-size="9.5" fill="#4a4a4f">要点：resolver 变更（如 DNS 刷新、xds 下发）触发 RequestReresolutionLocked（resolver.h:111）→ 重新解析 → LB 重建 picker，全程不打断在途调用。</text>
  <text x="24" y="390" font-size="9" fill="#6e6e73">扩展点：resolver 与 LB 都经注册表插件化（lb_policy_registry.cc），可自定义策略（如加权、地域感知、outlier_detection 熔断）。</text>
  <text x="24" y="410" font-size="9" fill="#a1a1a6">grpclb / xds：更复杂的外部 LB 协议也在此框架内实现，向 gRPC 下发端点与权重。</text>
</svg>
