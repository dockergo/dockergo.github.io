<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="470" viewBox="0 0 1020 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="sp" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="3.5" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="pa" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#6f3ea8"/></marker>
    <marker id="pb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker></defs>
  <rect width="1020" height="470" fill="#fbfbfd"/>
  <text x="24" y="30" font-size="14" font-weight="700" fill="#1d1d1f">两条 Pick 路径：pick_first 用 Happy Eyeballs 锁定一条连接 · round_robin 原子轮转 + 三规则聚合状态</text>
  <text x="24" y="49" font-size="10" fill="#8a8a8e">picker 是只含数据面的不可变快照，连通性一变 policy 就生成全新 picker 经 UpdateState 换上——在途调用用旧 picker、新调用用新 picker，天然无锁</text>

  <!-- pick_first -->
  <rect x="24" y="66" width="472" height="304" rx="12" fill="#f4eefb" stroke="#ddccef" filter="url(#sp)"/>
  <text x="40" y="88" font-size="11.5" font-weight="700" fill="#6f3ea8">pick_first（默认）· pick_first.cc:124</text>
  <text x="40" y="104" font-size="8" fill="#9a76c0">把端点列表拉平成一串地址，Happy Eyeballs 并发试连</text>

  <g text-anchor="middle" font-size="8">
    <rect x="40" y="116" width="88" height="34" rx="7" fill="#fff" stroke="#ddccef" filter="url(#sp)"/><text x="84" y="132" fill="#6f3ea8">addr 1</text><text x="84" y="144" font-size="6.5" fill="#9a76c0">t=0 起连</text>
    <rect x="140" y="116" width="88" height="34" rx="7" fill="#fff" stroke="#ddccef" filter="url(#sp)"/><text x="184" y="132" fill="#6f3ea8">addr 2</text><text x="184" y="144" font-size="6.5" fill="#9a76c0">t=250ms</text>
    <rect x="240" y="116" width="88" height="34" rx="7" fill="#fff" stroke="#ddccef" filter="url(#sp)"/><text x="284" y="132" fill="#6f3ea8">addr 3</text><text x="284" y="144" font-size="6.5" fill="#9a76c0">t=500ms</text>
    <rect x="340" y="116" width="80" height="34" rx="7" fill="#fff" stroke="#ddccef" filter="url(#sp)"/><text x="380" y="132" fill="#6f3ea8">addr …</text>
  </g>
  <text x="432" y="137" font-size="7" fill="#9a76c0">交错</text>
  <text x="40" y="170" font-size="8" fill="#7a4fa0">connection_attempt_delay_ 默认 250ms（pick_first.cc:429）逐个并发下一个</text>

  <line x1="228" y1="176" x2="228" y2="190" stroke="#8a5cae" stroke-width="1.5" marker-end="url(#pa)"/>
  <rect x="70" y="192" width="316" height="40" rx="8" fill="#eafaf1" stroke="#b8e6cd" filter="url(#sp)"/>
  <text x="228" y="209" font-size="9" font-weight="600" text-anchor="middle" fill="#1c6b45">第一个进入 READY 的 → 锁定为 selected</text>
  <text x="228" y="224" font-size="7.5" text-anchor="middle" fill="#5aa07d">此后 Pick 恒返回它：PickResult::Complete(subchannel_)（:358）</text>

  <rect x="40" y="244" width="416" height="34" rx="8" fill="#fbfbfd" stroke="#e6d6f2"/>
  <text x="52" y="265" font-size="8" fill="#7a4fa0">所有调用复用同一条连接，适合单后端与连接亲和</text>

  <rect x="40" y="286" width="416" height="70" rx="8" fill="#fdeeee" stroke="#f0cccc"/>
  <text x="52" y="305" font-size="8.5" font-weight="600" fill="#b23a3a">失败/断开处置</text>
  <text x="52" y="321" font-size="7.5" fill="#c56b6b">地址空或全失败 → RequestReresolution + 转 TRANSIENT_FAILURE（:477）</text>
  <text x="52" y="336" font-size="7.5" fill="#c56b6b">选中连接后续断开 → 重跑 Happy Eyeballs 并请求重解析（:811）</text>
  <text x="52" y="350" font-size="7" fill="#d69a9a">整体连通性跟随 selected 单连接</text>

  <!-- round_robin -->
  <rect x="524" y="66" width="472" height="304" rx="12" fill="#eafaf1" stroke="#b8e6cd" filter="url(#sp)"/>
  <text x="540" y="88" font-size="11.5" font-weight="700" fill="#1c6b45">round_robin · round_robin.cc:59</text>
  <text x="540" y="104" font-size="8" fill="#5aa07d">每端点各建子 policy（内部仍 pick_first）+ subchannel，只收 READY 的进 picker</text>

  <g text-anchor="middle" font-size="8">
    <rect x="540" y="116" width="100" height="30" rx="6" fill="#d6f2e2" stroke="#b8e6cd"/><text x="590" y="135" fill="#1c6b45">ep1 READY</text>
    <rect x="648" y="116" width="100" height="30" rx="6" fill="#d6f2e2" stroke="#b8e6cd"/><text x="698" y="135" fill="#1c6b45">ep2 READY</text>
    <rect x="756" y="116" width="100" height="30" rx="6" fill="#f3f3f5" stroke="#dcdce0"/><text x="806" y="135" fill="#8a8a8e">ep3 CONNECTING</text>
    <rect x="864" y="116" width="116" height="30" rx="6" fill="#d6f2e2" stroke="#b8e6cd"/><text x="922" y="135" fill="#1c6b45">ep4 READY</text>
  </g>
  <line x1="760" y1="152" x2="760" y2="166" stroke="#2f9e6e" stroke-width="1.5" marker-end="url(#pb)"/>
  <rect x="560" y="168" width="400" height="40" rx="8" fill="#fff" stroke="#b8e6cd" filter="url(#sp)"/>
  <text x="760" y="185" font-size="9" font-weight="600" text-anchor="middle" fill="#1c6b45">Picker::Pick：atomic fetch_add(1) % n 无锁轮转（:192）</text>
  <text x="760" y="200" font-size="7.5" text-anchor="middle" fill="#5aa07d">relaxed 内存序 · 随机起始下标（:183）避免多 channel 同步打热点</text>

  <text x="540" y="228" font-size="8.5" font-weight="600" fill="#1c6b45">状态聚合：任一好即整体好、全坏才整体坏（首条匹配即生效）</text>
  <rect x="540" y="236" width="136" height="52" rx="7" fill="#eafaf1" stroke="#b8e6cd"/>
  <text x="608" y="256" font-size="8" font-weight="600" text-anchor="middle" fill="#1c6b45">有 READY</text>
  <text x="608" y="270" font-size="7" text-anchor="middle" fill="#5aa07d">→ 整体 READY</text>
  <text x="608" y="282" font-size="6.5" text-anchor="middle" fill="#7bb597">:372 重建全 READY picker</text>
  <rect x="684" y="236" width="136" height="52" rx="7" fill="#fdf6ec" stroke="#f0dcb8"/>
  <text x="752" y="256" font-size="8" font-weight="600" text-anchor="middle" fill="#9a6a1c">否则有 CONNECTING</text>
  <text x="752" y="270" font-size="7" text-anchor="middle" fill="#b58a3c">→ 整体 CONNECTING</text>
  <text x="752" y="282" font-size="6.5" text-anchor="middle" fill="#c99a3c">:387 装 QueuePicker 排队</text>
  <rect x="828" y="236" width="152" height="52" rx="7" fill="#fdeeee" stroke="#f0cccc"/>
  <text x="904" y="256" font-size="8" font-weight="600" text-anchor="middle" fill="#b23a3a">全 TRANSIENT_FAILURE</text>
  <text x="904" y="270" font-size="7" text-anchor="middle" fill="#c56b6b">→ 才整体失败</text>
  <text x="904" y="282" font-size="6.5" text-anchor="middle" fill="#d69a9a">:394</text>

  <rect x="540" y="296" width="440" height="60" rx="8" fill="#fbfbfd" stroke="#cbe6d5"/>
  <text x="552" y="315" font-size="8" fill="#3a8a63">只要还有一个后端可用，channel 就不对上层报错——弹性的根源。</text>
  <text x="552" y="331" font-size="7.5" fill="#5aa07d">适合多副本无状态服务；端点数大时连接与内存线性增长，配合 subsetting 限扇出。</text>
  <text x="552" y="347" font-size="7.5" fill="#7bb597">MaybeUpdateRoundRobinConnectivityStateLocked 三规则</text>

  <text x="24" y="396" font-size="9.5" fill="#4a4a4f">读法：pick_first 并发试连（250ms 交错）锁定第一条 READY 连接、恒返回它；round_robin 为每个健康端点建连、用原子计数在 READY 端点间轮转，并用三规则把子端点状态聚合成 channel 整体连通性。</text>
  <text x="24" y="420" font-size="9" fill="#6e6e73">核心不变量：picker 只含数据面、是不可变快照；控制面（地址变更、连通性回调）全留在 policy，状态一变就整体换新 picker，故数据面无锁——这是每调用一次 Pick 仍能 O(1) 的关键。</text>
  <text x="24" y="442" font-size="9" fill="#a1a1a6">选择：单后端/连接亲和用 pick_first；多副本负载分摊用 round_robin。二者都经注册表插件化，可换 grpclb/xds/加权等自定义策略。</text>
</svg>
