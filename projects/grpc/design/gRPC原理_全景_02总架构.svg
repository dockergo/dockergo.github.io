<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="800" viewBox="0 0 1120 800" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="aHot" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="aState" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c99a3a"/></marker>
    <marker id="aCtl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
    <marker id="aFail" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#d38236"/></marker>
    <marker id="aX" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8a5cae"/></marker>
  </defs>
  <rect width="1120" height="800" fill="#fbfbfd"/>

  <!-- ===== 标题带 · 判型（无源码注释） ===== -->
  <text x="30" y="28" font-size="13" font-weight="600" fill="#1d1d1f">gRPC 总架构 · 基于 HTTP/2 的高性能跨语言 RPC：Protobuf 强类型契约 + Channel/Stub 抽象 + 可插拔 resolver/LB/filter 栈 + 异步 CompletionQueue</text>
  <text x="30" y="46" font-size="10.5" fill="#6e6e73">分层脊：RPC 接触面（Stub/Channel/Server）→ 客户端 Channel 装配线（解析→选路→过滤→建连）→ HTTP/2 transport（多路复用·流控·HPACK）→ CQ/EventEngine 异步基座　源码基准 v1.84.0-dev（core 56.0.0 · gimbal）</text>

  <!-- ===== 设计张力铭牌带（显式）===== -->
  <rect x="24" y="54" width="1072" height="48" rx="10" fill="#fbf2ea" stroke="#e6cdae"/>
  <text x="40" y="74" font-size="11" font-weight="700" fill="#b0651f">设计张力</text>
  <text x="110" y="74" font-size="10" fill="#5a4a3a">跨语言统一 RPC 抽象 + 三处可插拔策略<tspan fill="#8a6d3b">（name-resolver / load-balancer / filter 栈，皆可替换）</tspan><tspan font-weight="700" fill="#c0392b"> ⟷ vs ⟷ </tspan>HTTP/2 多路复用与流控的实现复杂度<tspan fill="#8a6d3b">（单连接 N stream、帧交织、窗口对账）</tspan></text>
  <text x="110" y="91" font-size="9.5" fill="#5a4a3a">异步高吞吐<tspan fill="#8a6d3b">（CompletionQueue/EventEngine 非阻塞、单连接多路复用免队头阻塞）</tspan><tspan font-weight="700" fill="#c0392b"> ⟷ vs ⟷ </tspan>编程模型复杂度<tspan fill="#8a6d3b">（tag 驱动事件、promise 化 CallSpine、控制面/数据面解耦）</tspan></text>

  <!-- ===== 图例：五型语义路径 ===== -->
  <line x1="40" y1="115" x2="62" y2="115" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aHot)"/>
  <text x="68" y="119" font-size="10" fill="#3a3a3c">Hot · 请求/响应流</text>
  <line x1="232" y1="115" x2="254" y2="115" stroke="#5b7db1" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aCtl)"/>
  <text x="260" y="119" font-size="10" fill="#3a3a3c">Control · 解析 + 负载均衡 + 分发</text>
  <line x1="470" y1="115" x2="492" y2="115" stroke="#c99a3a" stroke-width="1.8" marker-end="url(#aState)"/>
  <text x="498" y="119" font-size="10" fill="#3a3a3c">State · HTTP/2 流 + 流控</text>
  <line x1="682" y1="115" x2="704" y2="115" stroke="#d38236" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aFail)"/>
  <text x="710" y="119" font-size="10" fill="#3a3a3c">失败 · 重试 + 超时</text>
  <line x1="852" y1="115" x2="874" y2="115" stroke="#8a5cae" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aX)"/>
  <text x="880" y="119" font-size="10" fill="#3a3a3c">横切 · 凭证 + 拦截器</text>
  <text x="1090" y="119" font-size="10" fill="#a1a1a6" text-anchor="end">框 = 主线可下钻</text>

  <!-- ===== powers 立身带 ===== -->
  <rect x="24" y="128" width="1072" height="26" rx="8" fill="#f6f6f8" stroke="#e2e2e7" data-tid="gRPC原理_全景主线框架" data-lab="全景主线框架"/>
  <text x="40" y="145" font-size="10" fill="#4a4a4f">powers：一次远程调用像本地函数 —— 契约由 Protobuf 强约束，选谁连、走哪条链全可插拔，多路复用 + 异步让单连接扛住海量并发调用</text>

  <!-- ===== ① RPC 接触面 ===== -->
  <rect x="24" y="160" width="1072" height="72" rx="14" fill="#eef8f2" stroke="#cbe6d5" filter="url(#soft)"/>
  <text x="40" y="179" font-size="12" font-weight="600" fill="#1c7a4d">① RPC 接触面 · Protobuf 生成强类型 Stub / Server 骨架 —— 一次调用 = Channel 上的 CallOpSet（收发 metadata + message）</text>
  <rect x="40" y="186" width="516" height="40" rx="9" fill="#fff" stroke="#cbe6d5" data-tid="gRPC原理_接口_Stub与Channel契约" data-lab="Stub / Channel"/>
  <text x="56" y="203" font-size="11" font-weight="600" fill="#1d1d1f">Stub / Channel 契约</text>
  <text x="56" y="218" font-size="8.5" fill="#6e6e73">客户端代理 + Channel 承载调用 · 四型 RPC（一元 / 客户端流 / 服务端流 / 双向流）</text>
  <rect x="572" y="186" width="504" height="40" rx="9" fill="#fff" stroke="#cbe6d5" data-tid="gRPC原理_接口_Stub与Channel契约" data-lab="Server / 方法分发"/>
  <text x="588" y="203" font-size="11" font-weight="600" fill="#1d1d1f">Server / 方法分发</text>
  <text x="588" y="218" font-size="8.5" fill="#6e6e73">ServerBuilder 注册服务 · RequestMatcher 把入站调用配对给等待的 handler</text>

  <!-- ===== ② 客户端 Channel 装配线 ===== -->
  <rect x="24" y="238" width="1072" height="232" rx="14" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="40" y="257" font-size="12" font-weight="600" fill="#5b7db1">② 客户端 Channel · 一条可插拔装配线（上排控制面：解析 + 选路　下排数据面：逐调用过滤 + 建连）</text>

  <!-- row1 -->
  <rect x="40" y="266" width="336" height="88" rx="10" fill="#fff" stroke="#cfe0f2" filter="url(#soft)" data-tid="gRPC原理_支撑_名字解析与负载均衡" data-lab="name resolver"/>
  <text x="56" y="288" font-size="10.5" font-weight="600" fill="#1d1d1f">name resolver（名字解析）</text>
  <text x="56" y="308" font-size="8.8" fill="#6e6e73">把 target 解析成地址列表 + service config</text>
  <text x="56" y="326" font-size="8.8" fill="#6e6e73">DNS / xds / 自定义 · 变更触发重解析</text>
  <text x="56" y="344" font-size="8.8" fill="#93a7c6">产出：EndpointAddresses + 配置</text>

  <rect x="390" y="266" width="336" height="88" rx="10" fill="#fff" stroke="#cfe0f2" filter="url(#soft)" data-tid="gRPC原理_支撑_名字解析与负载均衡" data-lab="load balancer"/>
  <text x="406" y="288" font-size="10.5" font-weight="600" fill="#1d1d1f">load balancer（负载均衡）</text>
  <text x="406" y="308" font-size="8.8" fill="#6e6e73">消费地址产出 picker · pick_first / round_robin</text>
  <text x="406" y="326" font-size="8.8" fill="#6e6e73">跟踪连接健康 · 每次调用挑一个 subchannel</text>
  <text x="406" y="344" font-size="8.8" fill="#93a7c6">产出：SubchannelPicker</text>

  <rect x="740" y="266" width="336" height="88" rx="10" fill="#fff" stroke="#cfe0f2" filter="url(#soft)" data-tid="gRPC原理_支撑_调用生命周期与CallSpine" data-lab="CallSpine 调用装配"/>
  <text x="756" y="288" font-size="10.5" font-weight="600" fill="#1d1d1f">CallSpine · 调用装配 ★</text>
  <text x="756" y="308" font-size="8.8" fill="#6e6e73">promise 化调用骨架 · 组织收发管线</text>
  <text x="756" y="326" font-size="8.8" fill="#6e6e73">用 picker 选中连接后把 op 下发到栈</text>
  <text x="756" y="344" font-size="8.8" fill="#93a7c6">无就绪连接则 queue，得新 picker 重试</text>

  <!-- row2 -->
  <rect x="40" y="366" width="336" height="90" rx="10" fill="#fff" stroke="#cfe0f2" filter="url(#soft)" data-tid="gRPC原理_支撑_Filter栈与拦截链" data-lab="filter 栈 / interceptor"/>
  <text x="56" y="388" font-size="10.5" font-weight="600" fill="#1d1d1f">filter 栈 / interceptor 链</text>
  <text x="56" y="408" font-size="8.8" fill="#6e6e73">channel stack 逐 filter 串起每次调用</text>
  <text x="56" y="426" font-size="8.8" fill="#6e6e73">拦截链横切：鉴权 / 限流 / 统计 / 故障注入</text>
  <text x="56" y="444" font-size="8.8" fill="#93a7c6">栈底 filter 把 batch 交给 transport</text>

  <rect x="390" y="366" width="336" height="90" rx="10" fill="#fff" stroke="#cfe0f2" filter="url(#soft)" data-tid="gRPC原理_支撑_Deadline重试与Keepalive" data-lab="重试 · 超时 · 保活"/>
  <text x="406" y="388" font-size="10.5" font-weight="600" fill="#1d1d1f">重试 · 超时 · 保活</text>
  <text x="406" y="408" font-size="8.8" fill="#6e6e73">retryPolicy 退避重试 + throttle 限流</text>
  <text x="406" y="426" font-size="8.8" fill="#6e6e73">deadline 编码进 metadata · keepalive ping</text>
  <text x="406" y="444" font-size="8.8" fill="#93a7c6">超时到点取消调用</text>

  <rect x="740" y="366" width="336" height="90" rx="10" fill="#fff" stroke="#cfe0f2" filter="url(#soft)" data-tid="gRPC原理_支撑_调用生命周期与CallSpine" data-lab="Subchannel + 连接池"/>
  <text x="756" y="388" font-size="10.5" font-weight="600" fill="#1d1d1f">Subchannel + 连接池</text>
  <text x="756" y="408" font-size="8.8" fill="#6e6e73">每地址一个 subchannel · 连接态机 + 退避重连</text>
  <text x="756" y="426" font-size="8.8" fill="#6e6e73">复用连接池 · 连上即持有一条 transport</text>
  <text x="756" y="444" font-size="8.8" fill="#93a7c6">连接态汇报给 load balancer</text>

  <!-- ===== ④ 凭证与安全（横切） ===== -->
  <rect x="24" y="476" width="1072" height="36" rx="10" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)" data-tid="gRPC原理_支撑_凭证与安全" data-lab="凭证与安全"/>
  <text x="40" y="491" font-size="11" font-weight="600" fill="#6f3ea8">④ 凭证与安全 · 横切每条连接与每次调用</text>
  <text x="40" y="506" font-size="8.8" fill="#9a76c0">传输凭证 TLS / ALTS / local / insecure 握手鉴定对端 —— 调用凭证（OAuth2 / JWT / IAM）把令牌注入 metadata 随请求上送</text>

  <!-- ===== ③ HTTP/2 transport ===== -->
  <rect x="24" y="518" width="1072" height="118" rx="14" fill="#fbf7ef" stroke="#ecdcbf"/>
  <text x="40" y="537" font-size="12" font-weight="600" fill="#8a6d3b">③ HTTP/2 transport · 客户端与服务端共用（单条连接多路复用 N 个 stream）</text>
  <rect x="40" y="546" width="336" height="82" rx="10" fill="#fff" stroke="#ecdcbf" filter="url(#soft)" data-tid="gRPC原理_支撑_HTTP2传输与流控" data-lab="streams / framing"/>
  <text x="56" y="568" font-size="10.5" font-weight="600" fill="#1d1d1f">streams / framing</text>
  <text x="56" y="588" font-size="8.8" fill="#6e6e73">一连接 N stream（client 奇 / server 偶 stream-id）</text>
  <text x="56" y="606" font-size="8.8" fill="#6e6e73">读/写状态机 · HEADERS / DATA / RST / GOAWAY 帧</text>
  <rect x="390" y="546" width="336" height="82" rx="10" fill="#fff" stroke="#ecdcbf" filter="url(#soft)" data-tid="gRPC原理_支撑_HTTP2传输与流控" data-lab="flow control + BDP"/>
  <text x="406" y="568" font-size="10.5" font-weight="600" fill="#1d1d1f">flow control + BDP</text>
  <text x="406" y="588" font-size="8.8" fill="#6e6e73">transport 级 + stream 级窗口对账</text>
  <text x="406" y="606" font-size="8.8" fill="#6e6e73">BDP 估计动态调窗 · WINDOW_UPDATE 回补</text>
  <rect x="740" y="546" width="336" height="82" rx="10" fill="#fff" stroke="#ecdcbf" filter="url(#soft)" data-tid="gRPC原理_支撑_HTTP2传输与流控" data-lab="HPACK + metadata + Slice"/>
  <text x="756" y="568" font-size="10.5" font-weight="600" fill="#1d1d1f">HPACK + metadata + Slice</text>
  <text x="756" y="588" font-size="8.8" fill="#6e6e73">头部 HPACK 压缩（动态表 + Huffman）</text>
  <text x="756" y="606" font-size="8.8" fill="#6e6e73">metadata batch · Slice/SliceBuffer 零拷贝缓冲</text>

  <!-- ===== wire ===== -->
  <rect x="24" y="642" width="1072" height="28" rx="8" fill="#f2f4f7" stroke="#dfe3ea"/>
  <text x="40" y="660" font-size="10" fill="#5a6473">wire · 单条 TCP/TLS 连接承载多路复用的 HTTP/2 帧流 —— 请求 / 响应交织传输、互不阻塞（无队头阻塞）</text>

  <!-- ===== ⑤ 异步基座 ===== -->
  <rect x="24" y="676" width="1072" height="104" rx="14" fill="#f6f6f8" stroke="#e2e2e7"/>
  <text x="40" y="695" font-size="12" font-weight="600" fill="#4a4a4f">⑤ 异步基座 · CompletionQueue / EventEngine —— 所有 I/O 与回调经此非阻塞交付</text>
  <rect x="40" y="703" width="336" height="70" rx="10" fill="#fff" stroke="#e2e2e7" filter="url(#soft)" data-tid="gRPC原理_支撑_CompletionQueue与EventEngine" data-lab="CompletionQueue"/>
  <text x="56" y="724" font-size="10.5" font-weight="600" fill="#1d1d1f">CompletionQueue</text>
  <text x="56" y="743" font-size="8.8" fill="#6e6e73">tag 驱动事件队列 · Next / Pluck / Callback 三型</text>
  <text x="56" y="760" font-size="8.8" fill="#6e6e73">op 完成 → 投递 tag，应用线程取走</text>
  <rect x="390" y="703" width="336" height="70" rx="10" fill="#fff" stroke="#e2e2e7" filter="url(#soft)" data-tid="gRPC原理_支撑_CompletionQueue与EventEngine" data-lab="EventEngine"/>
  <text x="406" y="724" font-size="10.5" font-weight="600" fill="#1d1d1f">EventEngine</text>
  <text x="406" y="743" font-size="8.8" fill="#6e6e73">统一异步接口：Run / RunAfter 定时</text>
  <text x="406" y="760" font-size="8.8" fill="#6e6e73">Connect / Listener / Endpoint 抽象网络 I/O</text>
  <rect x="740" y="703" width="336" height="70" rx="10" fill="#fff" stroke="#e2e2e7" filter="url(#soft)" data-tid="gRPC原理_支撑_CompletionQueue与EventEngine" data-lab="poller / iomgr"/>
  <text x="756" y="724" font-size="10.5" font-weight="600" fill="#1d1d1f">poller / iomgr</text>
  <text x="756" y="743" font-size="8.8" fill="#6e6e73">pollset 轮询 fd · exec_ctx 批处理闭包</text>
  <text x="756" y="760" font-size="8.8" fill="#6e6e73">epoll / kqueue / Apple CF 平台适配</text>

  <!-- ===== 语义分型连线 ===== -->
  <!-- Hot：接触面 → Channel（发起调用，落在 CallSpine 上、避开区头文字） -->
  <line x1="908" y1="232" x2="908" y2="266" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aHot)"/>
  <text x="902" y="253" font-size="8" fill="#2f9e6e" text-anchor="end">发起调用</text>
  <!-- Control：resolver → load balancer -->
  <line x1="376" y1="300" x2="390" y2="300" stroke="#5b7db1" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aCtl)"/>
  <text x="360" y="316" font-size="7.5" fill="#5b7db1" text-anchor="end">地址</text>
  <!-- Control：load balancer → CallSpine（picker） -->
  <line x1="726" y1="300" x2="740" y2="300" stroke="#5b7db1" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aCtl)"/>
  <text x="724" y="316" font-size="7.5" fill="#5b7db1" text-anchor="end">picker</text>
  <!-- Control：CallSpine → filter 栈（下发 op） -->
  <line x1="908" y1="354" x2="908" y2="366" stroke="#5b7db1" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#aCtl)"/>
  <!-- 失败：retry 自环（退避重试 / 超时取消） -->
  <path d="M470,366 q18,-14 36,0" fill="none" stroke="#d38236" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#aFail)"/>
  <text x="512" y="360" font-size="7.5" fill="#d38236">退避重试 / 超时取消</text>
  <!-- Hot：Subchannel → transport（持有连接） -->
  <line x1="908" y1="456" x2="908" y2="518" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aHot)"/>
  <text x="914" y="500" font-size="8" fill="#2f9e6e">持有连接 · 发送帧</text>
  <!-- 横切：凭证向上入 Channel、向下入 transport -->
  <line x1="1050" y1="476" x2="1050" y2="460" stroke="#8a5cae" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#aX)"/>
  <line x1="1050" y1="512" x2="1050" y2="528" stroke="#8a5cae" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#aX)"/>
  <text x="1044" y="497" font-size="7.5" fill="#8a5cae" text-anchor="end">凭证横切</text>
  <!-- State：flow control 窗口对账（streams ↔ flow control） -->
  <line x1="376" y1="587" x2="390" y2="587" stroke="#c99a3a" stroke-width="1.8" marker-start="url(#aState)" marker-end="url(#aState)"/>
  <text x="383" y="622" font-size="7.5" fill="#b08535" text-anchor="middle">窗口对账</text>
  <!-- Hot：transport → wire -->
  <line x1="300" y1="636" x2="300" y2="642" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aHot)"/>
  <!-- State：transport ↔ 异步基座（I/O 经 EventEngine/poller） -->
  <line x1="820" y1="670" x2="820" y2="703" stroke="#c99a3a" stroke-width="1.6" stroke-dasharray="5 3" marker-start="url(#aState)" marker-end="url(#aState)"/>
  <text x="826" y="692" font-size="7.5" fill="#b08535">读写就绪事件</text>

  <!-- ===== 读法 ===== -->
  <text x="560" y="795" font-size="10" fill="#4a4a4f" text-anchor="middle">读法：Stub 发起 → Channel 经 resolver 解析、LB 选出 subchannel → filter 栈/拦截链处理 → HTTP/2 transport 帧化上 wire → 服务端解帧、配对 handler 执行 → 响应原路回流，全程经 CQ/EventEngine 异步交付</text>
</svg>
