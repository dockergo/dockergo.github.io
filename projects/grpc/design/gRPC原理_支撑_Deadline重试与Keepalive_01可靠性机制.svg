<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="450" viewBox="0 0 1020 450" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="sd" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="3.5" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="fd2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#d38236"/></marker>
    <marker id="hd" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker></defs>
  <rect width="1020" height="450" fill="#fbfbfd"/>
  <text x="24" y="30" font-size="14" font-weight="700" fill="#1d1d1f">Deadline · 重试 · Keepalive：调用的时限、可恢复失败重试、连接探活</text>
  <text x="24" y="49" font-size="10" fill="#8a8a8e">三条可靠性机制：端到端超时 / 按 retryPolicy 退避重试 + throttle 限流 / 周期 ping 判连接死活</text>

  <!-- deadline -->
  <rect x="24" y="66" width="316" height="180" rx="12" fill="#fdf6ef" stroke="#f0dcc4"/>
  <text x="40" y="87" font-size="11" font-weight="700" fill="#c0651f">① Deadline（端到端超时）</text>
  <text x="40" y="108" font-size="8.5" fill="#b0783f">客户端设 deadline → 编码进 metadata：</text>
  <rect x="40" y="116" width="284" height="40" rx="8" fill="#fff" stroke="#f0dcc4" filter="url(#sd)"/>
  <text x="52" y="133" font-size="8.5" font-weight="600" fill="#c0651f">Set(GrpcTimeoutMetadata(), deadline)</text>
  <text x="52" y="148" font-size="7.5" fill="#b0783f">client_call.cc:124（deadline≠InfFuture 时）</text>
  <rect x="40" y="164" width="284" height="40" rx="8" fill="#fff" stroke="#f0dcc4" filter="url(#sd)"/>
  <text x="52" y="181" font-size="8.5" font-weight="600" fill="#c0651f">Timeout::Encode() → grpc-timeout 头</text>
  <text x="52" y="196" font-size="7.5" fill="#b0783f">timeout_encoding.h:34/38</text>
  <text x="40" y="222" font-size="8" fill="#b0783f">服务端收到 grpc-timeout 也据此取消——</text>
  <text x="40" y="238" font-size="8" fill="#c3a06e">超时是端到端的，不是客户端本地计时。</text>

  <!-- retry -->
  <rect x="356" y="66" width="340" height="180" rx="12" fill="#fdf0e6" stroke="#f0d0b0"/>
  <text x="372" y="87" font-size="11" font-weight="700" fill="#c0651f">② 重试（retryPolicy + throttle）</text>
  <text x="372" y="106" font-size="8.5" fill="#b0783f">service config 下发 retryPolicy：</text>
  <text x="372" y="123" font-size="8" fill="#b0783f">• maxAttempts（≤MAX，>1 才生效）retry_service_config.cc:122/139</text>
  <text x="372" y="139" font-size="8" fill="#b0783f">• initialBackoff × multiplier 指数退避 + jitter</text>
  <text x="372" y="155" font-size="8" fill="#b0783f">• retryableStatusCodes 命中才重试</text>
  <g font-size="8" text-anchor="middle">
    <rect x="372" y="166" width="76" height="34" rx="7" fill="#fff" stroke="#f0d0b0"/><text x="410" y="187" fill="#c0651f">尝试 1</text>
    <rect x="464" y="166" width="76" height="34" rx="7" fill="#fff" stroke="#f0d0b0"/><text x="502" y="187" fill="#c0651f">尝试 2</text>
    <rect x="556" y="166" width="76" height="34" rx="7" fill="#eafaf1" stroke="#b8e6cd"/><text x="594" y="183" fill="#1c6b45">尝试 3 ✓</text><text x="594" y="196" font-size="6.5" fill="#3a8a63">成功</text>
  </g>
  <line x1="448" y1="183" x2="464" y2="183" stroke="#d38236" stroke-width="1.4" stroke-dasharray="3 2" marker-end="url(#fd2)"/>
  <line x1="540" y1="183" x2="556" y2="183" stroke="#d38236" stroke-width="1.4" stroke-dasharray="3 2" marker-end="url(#fd2)"/>
  <text x="372" y="222" font-size="8" fill="#b0783f">RetryThrottle 令牌桶：失败扣 token、成功补，</text>
  <text x="372" y="238" font-size="8" fill="#c3a06e">token 见底则停止重试——防重试风暴（retry_filter.cc:97）。</text>

  <!-- keepalive -->
  <rect x="712" y="66" width="284" height="180" rx="12" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="728" y="87" font-size="11" font-weight="700" fill="#4f6f9f">③ Keepalive（连接探活）</text>
  <text x="728" y="108" font-size="8.5" fill="#6e6e73">空闲连接周期发 PING：</text>
  <rect x="728" y="116" width="252" height="38" rx="8" fill="#fff" stroke="#cfe0f2" filter="url(#sd)"/>
  <text x="740" y="132" font-size="8.5" font-weight="600" fill="#1d1d1f">keepalive_time → 发 PING</text>
  <text x="740" y="147" font-size="7.5" fill="#93a7c6">init_keepalive_ping · chttp2_transport.cc:225</text>
  <rect x="728" y="162" width="252" height="38" rx="8" fill="#fff" stroke="#cfe0f2" filter="url(#sd)"/>
  <text x="740" y="178" font-size="8.5" font-weight="600" fill="#1d1d1f">keepalive_timeout 内无 ACK → 判死</text>
  <text x="740" y="193" font-size="7.5" fill="#93a7c6">g_default_client_keepalive_* :147-155</text>
  <text x="728" y="222" font-size="8" fill="#6e6e73">permit_without_calls：无活跃 RPC 时是否仍 ping</text>
  <text x="728" y="238" font-size="8" fill="#93a7c6">过激 ping 会被对端判滥用 → GOAWAY</text>

  <!-- subchannel backoff -->
  <rect x="24" y="262" width="972" height="96" rx="12" fill="#fbf7ef" stroke="#ecdcbf"/>
  <text x="40" y="283" font-size="11" font-weight="700" fill="#8a6d3b">④ 连接级退避重连（与重试正交 · subchannel.cc）</text>
  <text x="40" y="303" font-size="8.5" fill="#a98d54">连接失败后 subchannel 按指数退避重连（backoff_ :653），连上即 backoff_.Reset()（:792），到点 OnRetryTimerLocked（:795）。</text>
  <g font-size="8" text-anchor="middle" fill="#8a6d3b">
    <rect x="40" y="314" width="120" height="30" rx="7" fill="#fff" stroke="#ecdcbf"/><text x="100" y="333">失败</text>
    <rect x="180" y="314" width="120" height="30" rx="7" fill="#fff" stroke="#ecdcbf"/><text x="240" y="333">等 1s</text>
    <rect x="320" y="314" width="120" height="30" rx="7" fill="#fff" stroke="#ecdcbf"/><text x="380" y="333">等 2s</text>
    <rect x="460" y="314" width="120" height="30" rx="7" fill="#fff" stroke="#ecdcbf"/><text x="520" y="333">等 4s…</text>
    <rect x="600" y="314" width="150" height="30" rx="7" fill="#eafaf1" stroke="#b8e6cd"/><text x="675" y="333" fill="#1c6b45">连上 → Reset</text>
  </g>
  <text x="770" y="333" font-size="8" fill="#c3ab7e">区别：重试针对「一次调用」，退避重连针对「一条连接」。</text>

  <text x="24" y="384" font-size="9.5" fill="#4a4a4f">读法：deadline 定「等多久」、重试定「失败后再试几次（可恢复错误 + 未超 throttle）」、keepalive 定「连接还活着吗」、退避重连定「断了怎么重连」——四条正交的可靠性机制。</text>
  <text x="24" y="406" font-size="9" fill="#6e6e73">重试与 deadline 协同：总耗时受 deadline 约束，重试不会突破整体截止时间。</text>
  <text x="24" y="428" font-size="9" fill="#a1a1a6">hedging（对冲）是重试的变体：不等失败就并发发多份、取最快——同样受 throttle 约束。</text>
</svg>
