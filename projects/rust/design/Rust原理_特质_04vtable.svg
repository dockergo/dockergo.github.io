<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
    <marker id="arp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b48ac6"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Rust trait 对象 · 胖指针 + vtable 布局 —— 动态分发怎么找到方法</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">&amp;dyn Trait / Box&lt;dyn Trait&gt; = 胖指针(2 个机器字:数据指针 + vtable 指针);vtable 是每(具体类型 × trait)一份的静态表</text>

  <!-- legend -->
  <g font-size="9" fill="#86868b">
    <rect x="760" y="20" width="12" height="12" rx="3" fill="#eafaf1" stroke="#bfe0cd"/><text x="776" y="30">数据</text>
    <rect x="828" y="20" width="12" height="12" rx="3" fill="#f5eefb" stroke="#d9c3e8"/><text x="844" y="30">trait/vtable</text>
    <rect x="924" y="20" width="12" height="12" rx="3" fill="#eef3fb" stroke="#bcd0ec"/><text x="940" y="30">编译期</text>
  </g>

  <!-- 胖指针 (fat pointer) -->
  <rect x="40" y="80" width="300" height="150" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="60" y="106" font-size="12" font-weight="600" fill="#1d1d1f">胖指针 &amp;dyn Trait(2 字)</text>
  <rect x="60" y="120" width="260" height="44" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="190" y="140" font-size="10" font-weight="600" text-anchor="middle" fill="#12402a">data ptr · 数据指针</text>
  <text x="190" y="156" font-size="8.5" text-anchor="middle" fill="#2f6f4f">指向具体值本体</text>
  <rect x="60" y="170" width="260" height="44" rx="8" fill="#f5eefb" stroke="#d9c3e8"/>
  <text x="190" y="190" font-size="10" font-weight="600" text-anchor="middle" fill="#4a2359">vtable ptr · 虚表指针</text>
  <text x="190" y="206" font-size="8.5" text-anchor="middle" fill="#7d5299">指向该类型的 vtable</text>

  <!-- 具体值 (green) -->
  <rect x="40" y="264" width="300" height="120" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="60" y="290" font-size="12" font-weight="600" fill="#12402a">具体值本体(栈/堆)</text>
  <rect x="60" y="304" width="260" height="60" rx="8" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="190" y="326" font-size="10" text-anchor="middle" fill="#12402a">struct Circle { r: f64 }</text>
  <text x="190" y="345" font-size="9" text-anchor="middle" fill="#2f6f4f">只存字段,无类型标签、无 vtable 指针</text>
  <text x="190" y="359" font-size="8.5" text-anchor="middle" fill="#a1a1a6">类型信息不在值里,在 vtable</text>

  <!-- vtable (purple) -->
  <rect x="470" y="80" width="330" height="304" rx="14" fill="#f5eefb" stroke="#d9c3e8" filter="url(#soft)"/>
  <text x="490" y="106" font-size="12" font-weight="600" fill="#4a2359">vtable(Circle as Shape)· 固定布局</text>
  <text x="490" y="124" font-size="8.5" fill="#7d5299">编译期生成 · 一份共享 · 静态数据段</text>
  <g text-anchor="start" font-size="9.5">
    <rect x="490" y="134" width="290" height="34" rx="7" fill="#ffffff" stroke="#e2cdec"/>
    <text x="504" y="155" fill="#4a2359">[0] drop_in_place · 析构函数指针</text>
    <rect x="490" y="172" width="290" height="30" rx="7" fill="#ffffff" stroke="#e2cdec"/>
    <text x="504" y="192" fill="#4a2359">[1] size · 值大小(字节)</text>
    <rect x="490" y="206" width="290" height="30" rx="7" fill="#ffffff" stroke="#e2cdec"/>
    <text x="504" y="226" fill="#4a2359">[2] align · 对齐</text>
    <rect x="490" y="240" width="290" height="30" rx="7" fill="#faf4fb" stroke="#e2cdec"/>
    <text x="504" y="260" fill="#4a2359">[3] area()  → Circle::area 指针</text>
    <rect x="490" y="274" width="290" height="30" rx="7" fill="#faf4fb" stroke="#e2cdec"/>
    <text x="504" y="294" fill="#4a2359">[4] name() → Circle::name 指针</text>
  </g>
  <text x="490" y="326" font-size="9" fill="#7d5299">前 3 槽固定(drop/size/align),之后按 trait</text>
  <text x="490" y="340" font-size="9" fill="#7d5299">方法声明序排方法指针 —— 换个类型换一份表</text>
  <text x="490" y="362" font-size="8.5" fill="#a1a1a6">vtable 解析:expect_resolve_for_vtable(见台账)</text>

  <!-- 调用流程 (blue) -->
  <rect x="820" y="80" width="220" height="304" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="840" y="106" font-size="12" font-weight="600" fill="#1b2a4a">调用 x.area()</text>
  <g text-anchor="middle" font-size="9.5">
    <rect x="840" y="122" width="180" height="46" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
    <text x="930" y="142" font-weight="600" fill="#1b2a4a">① 取 vtable ptr</text>
    <text x="930" y="158" font-size="8.5" fill="#5b7db1">从胖指针第 2 字</text>
    <rect x="840" y="182" width="180" height="46" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
    <text x="930" y="202" font-weight="600" fill="#1b2a4a">② 查槽位 [3]</text>
    <text x="930" y="218" font-size="8.5" fill="#5b7db1">拿 area 函数指针</text>
    <rect x="840" y="242" width="180" height="46" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
    <text x="930" y="262" font-weight="600" fill="#12402a">③ 调 fn(data ptr)</text>
    <text x="930" y="278" font-size="8.5" fill="#2f6f4f">data ptr 作 &amp;self</text>
  </g>
  <path d="M930,168 L930,182" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <path d="M930,228 L930,242" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="840" y="302" width="180" height="66" rx="8" fill="#fdf3f3" stroke="#e7c3c3"/>
  <text x="930" y="322" font-size="9.5" font-weight="600" text-anchor="middle" fill="#4a1414">一次间接跳转</text>
  <text x="930" y="338" font-size="8.5" text-anchor="middle" fill="#8a4b4b">不可内联 · 有开销</text>
  <text x="930" y="354" font-size="8.5" text-anchor="middle" fill="#8a4b4b">对比静态分发直调</text>

  <!-- connecting arrows -->
  <path d="M320,192 C400,192 400,120 470,132" stroke="#b48ac6" stroke-width="1.6" fill="none" marker-end="url(#arp)"/>
  <path d="M190,214 L190,264" stroke="#7fbf9a" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>

  <text x="30" y="410" font-size="9.5" fill="#a1a1a6">对比:静态分发(泛型单态化)编译期就知具体类型,直接调 Circle::area、可内联、零表零间接 —— dyn 才有胖指针 + vtable</text>
  <text x="30" y="434" font-size="9.5" fill="#a1a1a6">为什么固定布局:调用方只知 trait,不知具体类型;固定槽位偏移让「查表→跳转」不依赖具体类型,一份代码处理所有实现</text>
  <text x="30" y="458" font-size="9" fill="#a1a1a6">代价:一次间接调用、代码不膨胀;dyn Trait 要求对象安全(方法不含泛型/不返回 Self)· 源码基准 Rust 1.99.0</text>
</svg>
