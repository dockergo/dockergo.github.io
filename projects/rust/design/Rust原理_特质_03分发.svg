<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Rust 静态分发 vs 动态分发 —— 默认静态零开销,显式 dyn 才走虚表</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">静态分发(泛型单态化无虚表可内联零开销)vs 动态分发(显式 dyn 经虚表一次间接、代码不膨胀)</text>

  <!-- static dispatch (green, default, zero-cost) -->
  <rect x="40" y="82" width="500" height="200" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="62" y="108" font-size="12.5" font-weight="600" fill="#12402a">静态分发(默认 · 泛型 / impl Trait)</text>
  <rect x="62" y="122" width="456" height="34" rx="8" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="80" y="144" font-size="9.5" fill="#12402a">fn f&lt;T: Trait&gt;(x: T)  或  impl Trait</text>
  <text x="62" y="178" font-size="10" fill="#2f6f4f">· 单态化:编译期知具体类型</text>
  <text x="62" y="198" font-size="10" fill="#2f6f4f">· 直接调具体方法(Instance::expect_resolve, instance.rs:603)</text>
  <text x="62" y="218" font-size="10" fill="#2f6f4f">· 无虚表、可内联</text>
  <rect x="62" y="230" width="456" height="34" rx="8" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="290" y="252" font-size="9.5" font-weight="600" text-anchor="middle" fill="#2c5a3a">零开销(像手写具体类型调用)· 代价:代码膨胀</text>

  <!-- dynamic dispatch (amber, explicit dyn) -->
  <rect x="560" y="82" width="480" height="200" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="582" y="108" font-size="12.5" font-weight="600" fill="#5a3410">动态分发(显式 dyn Trait)</text>
  <rect x="582" y="122" width="436" height="34" rx="8" fill="#ffffff" stroke="#efdcb4"/>
  <text x="600" y="144" font-size="9.5" fill="#5a3410">fn f(x: &amp;dyn Trait)</text>
  <text x="582" y="178" font-size="10" fill="#93762e">· 运行时经虚表(vtable)查方法</text>
  <text x="582" y="198" font-size="10" fill="#93762e">· expect_resolve_for_vtable(instance.rs:694)</text>
  <text x="582" y="218" font-size="10" fill="#93762e">· 一次间接调用开销,但代码不膨胀</text>
  <rect x="582" y="230" width="436" height="34" rx="8" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="800" y="252" font-size="9.5" font-weight="600" text-anchor="middle" fill="#5a3410">一份代码处理所有类型 · 异构集合 Vec&lt;Box&lt;dyn Trait&gt;&gt;</text>

  <!-- 迭代器零成本 (blue) -->
  <rect x="40" y="306" width="1000" height="108" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="62" y="332" font-size="12" font-weight="600" fill="#1b2a4a">迭代器链零成本 · 单态化 + 内联 = 手写循环</text>
  <g text-anchor="middle">
    <rect x="62" y="346" width="200" height="42" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
    <text x="162" y="366" font-size="9.5" font-weight="600" fill="#1b2a4a">.map.filter.sum</text>
    <text x="162" y="381" font-size="9" fill="#5b7db1">泛型 trait 方法链</text>
    <rect x="430" y="346" width="200" height="42" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
    <text x="530" y="366" font-size="9.5" font-weight="600" fill="#1b2a4a">单态化 + MIR/LLVM 内联</text>
    <text x="530" y="381" font-size="9" fill="#5b7db1">展开、消中间抽象</text>
    <rect x="798" y="346" width="200" height="42" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
    <text x="898" y="366" font-size="9.5" font-weight="600" fill="#12402a">= 手写循环</text>
    <text x="898" y="381" font-size="9" fill="#2f6f4f">无中间分配</text>
  </g>
  <path d="M262,367 L430,367" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M630,367 L798,367" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <text x="30" y="444" font-size="9.5" fill="#a1a1a6">取舍:静态(泛型)快但代码膨胀;动态(dyn)省代码但虚表开销 —— 默认静态(零成本),需运行时多态/异构集合用 dyn</text>
  <text x="30" y="468" font-size="9.5" fill="#a1a1a6">误区:trait 都是动态分发(像 Java 接口)—— Rust 默认静态(泛型单态化),动态分发要显式 dyn</text>
  <text x="30" y="492" font-size="9" fill="#a1a1a6">dyn Trait 要求 trait 对象安全(方法不含泛型/Self 返回等);热路径用泛型,异构集合/减膨胀用 dyn · 源码基准 Rust 1.99.0</text>
</svg>
