<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="510" viewBox="0 0 1080 510" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="510" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Rust panic 触发与 handler · core 抛出 → std 处理</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">panic 从 core 抛出、std 处理:core(no_std)只定义 panic 的"发生",不定策略;std 提供 handler 实现具体行为</text>

  <!-- 触发 (red = panic) -->
  <rect x="40" y="80" width="290" height="176" rx="14" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="62" y="106" font-size="12" font-weight="600" fill="#4a1414">① 触发点</text>
  <text x="62" y="130" font-size="10" fill="#7a2a2a">· panic! 宏</text>
  <text x="62" y="152" font-size="10" fill="#7a2a2a">· 数组越界</text>
  <text x="62" y="174" font-size="10" fill="#7a2a2a">· unwrap on None / Err</text>
  <rect x="62" y="188" width="246" height="30" rx="8" fill="#ffffff" stroke="#e7c3c3"/>
  <text x="185" y="207" font-size="9.5" font-weight="600" text-anchor="middle" fill="#4a1414">→ core 的 panic</text>
  <text x="62" y="240" font-size="9" fill="#7a2a2a">不可恢复错误（程序逻辑错）</text>

  <!-- panic_handler (blue = 逻辑入口) -->
  <rect x="350" y="80" width="330" height="176" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="372" y="106" font-size="12" font-weight="600" fill="#1b2a4a">② std #[panic_handler]</text>
  <text x="372" y="126" font-size="9" fill="#5b7db1">library/std/src/panicking.rs:612</text>
  <text x="372" y="142" font-size="9" fill="#5b7db1">"core crate panic 入口"</text>
  <rect x="372" y="154" width="286" height="46" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="515" y="174" font-size="9.5" font-weight="600" text-anchor="middle" fill="#1b2a4a">rust_panic_with_hook</text>
  <text x="515" y="190" font-size="9" text-anchor="middle" fill="#5b7db1">跑 panic hook（默认打印消息 + backtrace）</text>
  <text x="372" y="222" font-size="10" fill="#1b2a4a">std 实现具体行为</text>
  <text x="372" y="242" font-size="9" fill="#a1a1a6">嵌入式(no_std)可自定义 handler</text>

  <!-- rust_panic (amber = 分派) -->
  <rect x="700" y="80" width="340" height="176" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="722" y="106" font-size="12" font-weight="600" fill="#5a3410">③ rust_panic(payload)</text>
  <text x="722" y="126" font-size="9" fill="#93762e">panicking.rs:840</text>
  <rect x="722" y="140" width="296" height="46" rx="8" fill="#ffffff" stroke="#efdcb4"/>
  <text x="870" y="160" font-size="9.5" font-weight="600" text-anchor="middle" fill="#5a3410">按 cfg 分展开 / abort</text>
  <text x="870" y="176" font-size="9" text-anchor="middle" fill="#93762e">-C panic= 编译期选择</text>
  <text x="722" y="208" font-size="10" fill="#5a3410">· 展开(unwind)：逐层析构可 catch</text>
  <text x="722" y="230" font-size="10" fill="#5a3410">· abort：直接终止不析构</text>
  <text x="722" y="250" font-size="9" fill="#a1a1a6">详见 panic 展开/abort 篇</text>

  <!-- flow connectors -->
  <path d="M330,168 L350,168" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M680,168 L700,168" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- panic hook 自定义 (purple = 接口) -->
  <rect x="40" y="278" width="1000" height="120" rx="14" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="62" y="304" font-size="12" font-weight="600" fill="#3d2a5a">panic hook 可自定义 · std::panic::set_hook</text>
  <text x="62" y="328" font-size="10" fill="#3d2a5a">· 改 panic 时的输出（如日志 / 上报 / 自定义 backtrace 格式）</text>
  <text x="62" y="350" font-size="10" fill="#3d2a5a">· 默认 hook：打印 panic 消息 + backtrace</text>
  <rect x="62" y="362" width="956" height="28" rx="8" fill="#ffffff" stroke="#d9c7ec"/>
  <text x="540" y="381" font-size="9.5" font-weight="600" text-anchor="middle" fill="#3d2a5a">rust_panic_with_hook 跑 hook → rust_panic 按 cfg 分展开 / abort</text>

  <text x="30" y="428" font-size="9.5" fill="#a1a1a6">为什么 handler 分层:core(no_std)只定义 panic 的"发生",不定策略;std 提供 handler 实现具体行为 —— 嵌入式可自定义 handler</text>
  <text x="30" y="452" font-size="9" fill="#a1a1a6">可恢复错误用 Result;不该发生的 bug(越界/断言)用 panic · 源码基准 Rust 1.99.0</text>
</svg>
