<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Rust 类型推断 vs 区域推断 · 两套但都靠约束求解</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">类型推断管"变量是什么类型"（HIR/typeck）· 区域推断管"借用活多久"（MIR/borrowck）—— 两阶段、两套推断</text>

  <!-- left: type inference -->
  <rect x="50" y="82" width="470" height="290" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="72" y="110" font-size="13" font-weight="700" fill="#1b2a4a">类型推断</text>
  <text x="72" y="130" font-size="10" fill="#5b7db1">阶段:typeck 阶段 · 在 HIR 上</text>
  <g text-anchor="middle" font-size="9.5">
    <rect x="72" y="146" width="426" height="42" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="285" y="164" fill="#274a78">推具体类型</text><text x="285" y="178" fill="#5b7db1">?T → i32</text>
    <rect x="72" y="200" width="426" height="42" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="285" y="218" fill="#274a78">求解手法:合一（union-find）</text><text x="285" y="232" fill="#5b7db1">UnificationTable / TypeVariableTable</text>
  </g>
  <rect x="72" y="254" width="426" height="46" rx="8" fill="#e7f0fb" stroke="#b9d2ef"/>
  <text x="285" y="273" font-size="9.5" text-anchor="middle" fill="#1b2a4a">回答:这个变量是什么类型</text>
  <text x="285" y="289" font-size="9" text-anchor="middle" fill="#5b7db1">引擎 rustc_infer / rustc_hir_typeck</text>
  <text x="72" y="326" font-size="9.5" fill="#5b7db1">词法区域解析（非借用检查）:</text>
  <text x="72" y="344" font-size="9.5" fill="#5b7db1">rustc_infer/src/infer/lexical_region_resolve/</text>
  <text x="72" y="362" font-size="9" fill="#a1a1a6">本篇归属:类型能力域</text>

  <!-- right: region inference -->
  <rect x="560" y="82" width="470" height="290" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="582" y="110" font-size="13" font-weight="700" fill="#12402a">区域（生命周期）推断</text>
  <text x="582" y="130" font-size="10" fill="#2f6f4f">阶段:借用检查阶段 · 在 MIR 上</text>
  <g text-anchor="middle" font-size="9.5">
    <rect x="582" y="146" width="426" height="42" rx="8" fill="#f5faf6" stroke="#cfe6d5"/><text x="795" y="164" fill="#12402a">推生命周期 / 借用区域</text><text x="795" y="178" fill="#2f6f4f">借用活多久</text>
    <rect x="582" y="200" width="426" height="42" rx="8" fill="#f5faf6" stroke="#cfe6d5"/><text x="795" y="218" fill="#12402a">求解手法:区域约束求解</text><text x="795" y="232" fill="#2f6f4f">RegionInferenceContext</text>
  </g>
  <rect x="582" y="254" width="426" height="46" rx="8" fill="#e7f6ec" stroke="#bfe0cd"/>
  <text x="795" y="273" font-size="9.5" text-anchor="middle" fill="#12402a">回答:这个借用能活多久</text>
  <text x="795" y="289" font-size="9" text-anchor="middle" fill="#2f6f4f">详见借用检查篇</text>
  <text x="582" y="326" font-size="9.5" fill="#2f6f4f">与类型推断相关但独立:</text>
  <text x="582" y="344" font-size="9.5" fill="#2f6f4f">两阶段先后 —— 先定类型,再验借用</text>
  <text x="582" y="362" font-size="9" fill="#a1a1a6">归属:借用检查篇</text>

  <!-- shared bottom bar -->
  <rect x="50" y="392" width="980" height="42" rx="10" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="540" y="412" font-size="11" font-weight="600" text-anchor="middle" fill="#3d2a5a">共同点:两者都靠约束求解 —— 收集约束、求解出唯一解</text>
  <text x="540" y="427" font-size="9" text-anchor="middle" fill="#8a6db3">分工不同:类型推断在 HIR/typeck、区域推断在 MIR/borrowck,但求解范式一致</text>

  <text x="30" y="470" font-size="9" fill="#a1a1a6">误区:类型推断和生命周期推断是一回事 —— 实为两套（HIR 推类型 vs MIR 推生命周期）· 源码基准 Rust 1.99.0</text>
</svg>
