<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Rust move 语义 · 所有权转移,每值恰好一个析构点</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">非 Copy 类型赋值/传参 = move:所有权转移、原变量失效(编译期禁再用)—— 防两处都析构(double-free)</text>

  <!-- left: move 非Copy (amber = 内存) -->
  <rect x="40" y="78" width="500" height="200" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="62" y="104" font-size="12.5" font-weight="600" fill="#5a3410">move · 非 Copy 赋值/传参 → 所有权转移</text>
  <text x="62" y="124" font-size="9.5" fill="#93762e">let b = a;（a: String,非 Copy 类型）</text>
  <rect x="62" y="140" width="170" height="44" rx="8" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="147" y="160" font-size="10" font-weight="600" text-anchor="middle" fill="#5a3410">a — 失效</text>
  <text x="147" y="176" font-size="8.5" text-anchor="middle" fill="#93762e">编译期禁再用</text>
  <rect x="348" y="140" width="170" height="44" rx="8" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="433" y="160" font-size="10" font-weight="600" text-anchor="middle" fill="#5a3410">b — 新 owner</text>
  <text x="433" y="176" font-size="8.5" text-anchor="middle" fill="#93762e">所有权跟着走</text>
  <path d="M232,162 L348,162" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="290" y="156" font-size="9" text-anchor="middle" fill="#a1a1a6">move</text>
  <text x="62" y="212" font-size="10" fill="#5a3410">· 原变量失效 —— 防两处都析构(double-free)</text>
  <text x="62" y="234" font-size="10" fill="#5a3410">· 所有权转移,唯一 owner 跟着走</text>
  <text x="62" y="256" font-size="9" fill="#93762e">move 走后原处不再析构它(所有权跟着走)</text>

  <!-- right: Copy 例外 (green = 成功/例外) -->
  <rect x="560" y="78" width="480" height="200" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="582" y="104" font-size="12.5" font-weight="600" fill="#12402a">Copy 类型例外 · 位拷贝,原变量仍有效</text>
  <text x="582" y="124" font-size="9.5" fill="#2f6f4f">整数 / bool / char 等（Copy marker trait）</text>
  <rect x="582" y="140" width="160" height="44" rx="8" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="662" y="160" font-size="10" font-weight="600" text-anchor="middle" fill="#12402a">x = 5 — 有效</text>
  <text x="662" y="176" font-size="8.5" text-anchor="middle" fill="#2f6f4f">位拷贝后仍可用</text>
  <rect x="850" y="140" width="160" height="44" rx="8" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="930" y="160" font-size="10" font-weight="600" text-anchor="middle" fill="#12402a">y = x — 有效</text>
  <text x="930" y="176" font-size="8.5" text-anchor="middle" fill="#2f6f4f">独立一份拷贝</text>
  <path d="M742,162 L850,162" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="796" y="156" font-size="9" text-anchor="middle" fill="#a1a1a6">位拷贝</text>
  <text x="582" y="212" font-size="10" fill="#12402a">· 位拷贝(栈上小值,拷贝廉价)</text>
  <text x="582" y="234" font-size="10" fill="#12402a">· 原变量仍有效(不失效,不是 move)</text>
  <text x="582" y="256" font-size="9" fill="#2f6f4f">小值 Copy 廉价;大值/含资源用 Clone(显式成本)</text>

  <!-- bottom: 编译期概念 (blue = 逻辑) -->
  <rect x="40" y="298" width="1000" height="128" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="62" y="324" font-size="12" font-weight="600" fill="#1b2a4a">move 是编译期概念 · 每值恰好一个析构点</text>
  <text x="62" y="350" font-size="10" fill="#1b2a4a">· 运行时可能只是 memcpy 或啥都不做(优化掉);语义上是所有权转移,不是运行时拷贝</text>
  <text x="62" y="374" font-size="10" fill="#1b2a4a">· 唯一 owner + move = “谁负责析构”编译期明确单一 —— 值 move 走后原处不再析构它</text>
  <text x="62" y="398" font-size="10" fill="#5b7db1">· 让无 GC 的自动析构安全:每值恰好一个析构点(无 double-free、无泄漏)</text>

  <text x="30" y="452" font-size="9.5" fill="#a1a1a6">为什么 move:唯一 owner + move 让“谁负责析构”编译期明确单一 —— 每值恰好一个析构点,支撑无 GC 的确定性析构</text>
  <text x="30" y="476" font-size="9" fill="#a1a1a6">所有权/move 的编译期强制在借用检查器 · Copy vs Clone 见调优要点 · 源码基准 Rust 1.99.0</text>
</svg>
