<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="aB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#0a84ff"/></marker>
    <marker id="aR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#d1544a"/></marker>
    <marker id="aK" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8a8a90"/></marker>
  </defs>
  <rect width="1040" height="560" fill="#fbfbfd"/>

  <text x="30" y="32" font-size="15" font-weight="700" fill="#1d1d1f">Step 单入口两段式 · 先过 term 裁决闸门，再按当前状态分派</text>
  <text x="30" y="52" font-size="10.5" fill="#6e6e73">一切消息（入站 RPC · 提案 · tick 产物）都归一到 Step；单调任期是安全性闸门，任一消息可能当场让本节点退位</text>

  <!-- 图例 -->
  <line x1="30" y1="74" x2="54" y2="74" stroke="#0a84ff" stroke-width="2" marker-end="url(#aB)"/><text x="60" y="78" font-size="10" fill="#5b6470">正常分派</text>
  <line x1="150" y1="74" x2="174" y2="74" stroke="#d1544a" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#aR)"/><text x="180" y="78" font-size="10" fill="#5b6470">退位 / 忽略</text>
  <line x1="290" y1="74" x2="314" y2="74" stroke="#8a8a90" stroke-width="2" marker-end="url(#aK)"/><text x="320" y="78" font-size="10" fill="#5b6470">本地消息直通</text>

  <!-- 入口 -->
  <rect x="40" y="102" width="150" height="70" rx="12" fill="#e9f0fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="115" y="130" font-size="12.5" font-weight="700" fill="#274a78" text-anchor="middle">消息 m</text>
  <text x="115" y="150" font-size="10" fill="#3d5a86" text-anchor="middle">Step(r, m) 单入口</text>
  <text x="115" y="166" font-size="9.5" fill="#8a8a90" text-anchor="middle">RPC · 提案 · tick 产物</text>
  <line x1="190" y1="137" x2="228" y2="137" stroke="#0a84ff" stroke-width="2" marker-end="url(#aB)"/>

  <!-- 阶段① term 裁决 -->
  <rect x="230" y="92" width="770" height="180" rx="14" fill="#eef2fb" stroke="#c8d6ee" filter="url(#soft)"/>
  <text x="250" y="114" font-size="12.5" font-weight="700" fill="#1b2a4a">阶段 ① term 裁决闸门</text>
  <text x="984" y="114" font-size="9.5" fill="#a1a1a6" text-anchor="end">比较 m.Term 与 r.Term</text>

  <!-- 三分支盒 -->
  <rect x="250" y="128" width="235" height="128" rx="10" fill="#f7f7f9" stroke="#e4e7ec"/>
  <text x="262" y="149" font-size="11" font-weight="700" fill="#5b6470">m.Term = 0 · 本地消息</text>
  <text x="262" y="169" font-size="10" fill="#4a4a4f">tick / self-ack 等内部消息</text>
  <text x="262" y="187" font-size="10" fill="#4a4a4f">不比较任期，直通到阶段 ②</text>
  <line x1="367" y1="200" x2="367" y2="248" stroke="#8a8a90" stroke-width="2" marker-end="url(#aK)"/>
  <text x="367" y="243" font-size="9" fill="#5b6470" text-anchor="middle">直通</text>

  <rect x="497" y="128" width="248" height="128" rx="10" fill="#eaf1fb" stroke="#c6d9f2"/>
  <text x="509" y="149" font-size="11" font-weight="700" fill="#274a78">m.Term &gt; r.Term · 对方更新</text>
  <text x="509" y="169" font-size="10" fill="#3d5a86">MsgApp/Heartbeat/Snap → 退位并</text>
  <text x="509" y="185" font-size="10" fill="#3d5a86">记 lead=from；其余 → lead=None</text>
  <text x="509" y="205" font-size="10" fill="#8a4038">特例：PreVote 绝不因它改 term</text>
  <text x="509" y="221" font-size="9.5" fill="#8a8a90">CheckQuorum+租约内可忽略拉票</text>
  <line x1="621" y1="230" x2="621" y2="248" stroke="#d1544a" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#aR)"/>

  <rect x="757" y="128" width="228" height="128" rx="10" fill="#fbe9e7" stroke="#e8c4bd"/>
  <text x="769" y="149" font-size="11" font-weight="700" fill="#8a4038">m.Term &lt; r.Term · 对方陈旧</text>
  <text x="769" y="169" font-size="10" fill="#8a4038">checkQuorum/preVote 下对老</text>
  <text x="769" y="185" font-size="10" fill="#8a4038">leader 的 App/Heartbeat：回消息</text>
  <text x="769" y="201" font-size="10" fill="#8a4038">提示其 term 落后；其余多半忽略</text>
  <text x="769" y="221" font-size="9.5" fill="#8a8a90">压制被隔离节点的扰动</text>
  <line x1="871" y1="230" x2="871" y2="360" stroke="#d1544a" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#aR)"/>
  <text x="895" y="330" font-size="9.5" fill="#8a4038">多数直接丢弃</text>

  <!-- 阶段② 状态分派 -->
  <rect x="230" y="288" width="500" height="150" rx="14" fill="#e9f0fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="250" y="310" font-size="12.5" font-weight="700" fill="#1b2a4a">阶段 ② 状态分派 · r.step(r, m)</text>
  <text x="250" y="330" font-size="10" fill="#3d5a86">通过 term 裁决后，按 r.state 经函数指针分到当前状态的处理器</text>
  <g text-anchor="middle" font-size="11">
    <rect x="250" y="344" width="148" height="76" rx="10" fill="#fff" stroke="#c6d2ea"/><text x="324" y="372" font-weight="700" fill="#274a78">stepLeader</text><text x="324" y="392" font-size="9.5" fill="#3d5a86">提案 / 复制 / 心跳</text><text x="324" y="408" font-size="9" fill="#8a8a90">Leader</text>
    <rect x="408" y="344" width="148" height="76" rx="10" fill="#fff" stroke="#c6d2ea"/><text x="482" y="372" font-weight="700" fill="#274a78">stepFollower</text><text x="482" y="392" font-size="9.5" fill="#3d5a86">收 App / 投票</text><text x="482" y="408" font-size="9" fill="#8a8a90">Follower</text>
    <rect x="566" y="344" width="150" height="76" rx="10" fill="#fff" stroke="#c6d2ea"/><text x="641" y="368" font-weight="700" fill="#274a78">stepCandidate</text><text x="641" y="388" font-size="9.5" fill="#3d5a86">收票 → 计数</text><text x="641" y="405" font-size="9" fill="#8a8a90">Candidate 与 PreCandidate 共用</text>
  </g>
  <line x1="367" y1="256" x2="367" y2="342" stroke="#8a8a90" stroke-width="2" marker-end="url(#aK)"/>
  <line x1="621" y1="256" x2="500" y2="342" stroke="#0a84ff" stroke-width="1.8" marker-end="url(#aB)"/>
  <text x="560" y="300" font-size="9" fill="#274a78">退位为 Follower 后继续分派</text>

  <!-- 确定性说明框 -->
  <rect x="746" y="288" width="254" height="150" rx="14" fill="#f6f7f9" stroke="#e4e7ec" filter="url(#soft)"/>
  <text x="766" y="310" font-size="12" font-weight="700" fill="#1f6b47">为什么是确定性内核</text>
  <text x="766" y="332" font-size="10" fill="#4a4a4f">同一 (状态, 输入 m)</text>
  <text x="766" y="350" font-size="10" fill="#4a4a4f">→ 确定的 (新状态, 输出 msgs)</text>
  <text x="766" y="372" font-size="10" fill="#4a4a4f">step/tick 是函数指针，becomeX</text>
  <text x="766" y="388" font-size="10" fill="#4a4a4f">切换时同时重置它俩</text>
  <text x="766" y="410" font-size="10" fill="#4a4a4f">无隐藏线程：可同步逐步驱动、</text>
  <text x="766" y="426" font-size="10" fill="#4a4a4f">逐步断言 → 可单测 / 可嵌入</text>

  <!-- 底部性质 -->
  <rect x="40" y="456" width="960" height="82" rx="12" fill="#fdf6e9" stroke="#f0dfb8"/>
  <text x="58" y="480" font-size="10.5" font-weight="700" fill="#8a6d1f">不变式</text>
  <text x="118" y="480" font-size="10" fill="#4a4a4f">任期 r.Term 单调不减；任何更高 term 的 App/Heartbeat/Snap 都让本节点退位为 follower，这是「至多一个 Leader」与日志安全性的根基。</text>
  <text x="58" y="500" font-size="10.5" font-weight="700" fill="#8a6d1f">直接改态</text>
  <text x="118" y="500" font-size="10" fill="#4a4a4f">禁止绕过 becomeX 改 r.state —— becomeX 会一并重置 votes / progress / 随机超时 / step / tick，漏一个就状态错乱。</text>
  <text x="58" y="522" font-size="9.5" fill="#8a8a90">Step 只把待发消息塞进 r.msgs，真正发送是宿主消费 Ready.Messages —— Step 本身不碰网络。</text>
</svg>
