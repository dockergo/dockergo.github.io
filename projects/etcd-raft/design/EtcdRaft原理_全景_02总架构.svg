<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="710" viewBox="0 0 1040 710" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/>
    </filter>
    <marker id="aHot" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#1f9e5f"/></marker>
    <marker id="aCtl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#0a84ff"/></marker>
    <marker id="aState" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c98a12"/></marker>
    <marker id="aFail" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#e8730f"/></marker>
    <marker id="aCross" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#a35bd6"/></marker>
  </defs>

  <rect x="0" y="0" width="1040" height="710" fill="#fbfbfd"/>

  <!-- ===== 标题条（判型）===== -->
  <rect x="0" y="0" width="1040" height="50" fill="#f4f5f7" stroke="#e6e6eb" data-tid="EtcdRaft原理_全景主线框架" data-lab="全景总览"/>
  <text x="24" y="22" font-size="15" font-weight="700" fill="#1d1d1f">etcd Raft · 共识状态机核（go.etcd.io/raft/v3）</text>
  <text x="24" y="40" font-size="11" fill="#8a8a90">宿主用 Node 循环驱动：Tick 走时钟 · Step(msg) 喂消息 · Ready 取待办（持久+发送+应用）· Advance 推进 —— 库本身不碰磁盘与网络</text>

  <!-- ===== 张力铭牌 ===== -->
  <rect x="40" y="58" width="960" height="34" rx="9" fill="#fdf6e9" stroke="#f0dfb8"/>
  <text x="60" y="79" font-size="11.5" fill="#8a6d1f"><tspan font-weight="700">核心张力：</tspan>最小内核可嵌入 / 可测（纯状态机，确定性 Step→Ready） vs I/O 全外包 → 宿主须自己做 WAL 持久化 / 网络传输 / 并发线程与重试</text>

  <!-- ===== ① 宿主驱动循环（host owns I/O）===== -->
  <rect x="40" y="100" width="960" height="78" rx="12" fill="#e9f0fb" stroke="#bcd0ec" filter="url(#soft)" data-tid="EtcdRaft原理_接口_Node驱动循环与Ready" data-lab="宿主 Node 驱动循环"/>
  
  <text x="58" y="122" font-size="12.5" font-weight="700" fill="#274a78">宿主进程 · Node / RawNode 驱动循环（host 独占真实 I/O）</text>
  <g font-size="11" text-anchor="middle" fill="#274a78">
    <rect x="60" y="132" width="200" height="34" rx="8" fill="#fff" stroke="#c6d2ea"/><text x="160" y="154"><tspan font-weight="700">Tick</tspan> 逻辑时钟（选举/心跳）</text>
    <rect x="278" y="132" width="220" height="34" rx="8" fill="#fff" stroke="#c6d2ea"/><text x="388" y="154"><tspan font-weight="700">Step(msg)</tspan> 喂入 RPC / 提案</text>
    <rect x="516" y="132" width="220" height="34" rx="8" fill="#fff" stroke="#c6d2ea"/><text x="626" y="154"><tspan font-weight="700">Ready</tspan> 取一批待办 → 做 I/O</text>
    <rect x="754" y="132" width="226" height="34" rx="8" fill="#fff" stroke="#c6d2ea"/><text x="867" y="154"><tspan font-weight="700">Advance</tspan> 确认后推进下一轮</text>
  </g>
  <text x="980" y="118" font-size="9.5" fill="#a1a1a6" text-anchor="end">run</text>

  <!-- ===== ② Ready 结构：I/O 待办清单（库→宿主，只读）===== -->
  <rect x="40" y="186" width="960" height="76" rx="12" fill="#eef6f0" stroke="#c3e2ce" filter="url(#soft)" data-tid="EtcdRaft原理_接口_Node驱动循环与Ready" data-lab="Ready 待办清单"/>
  
  <text x="58" y="207" font-size="12.5" font-weight="700" fill="#1f6b47">Ready 结构 · 一次 I/O 待办清单（全字段只读 · 库→宿主）</text>
  <g font-size="10.5" text-anchor="middle" fill="#33373e">
    <rect x="60" y="216" width="222" height="38" rx="8" fill="#fff" stroke="#c9e0d2"/><text x="171" y="233"><tspan font-weight="700">Entries</tspan> 待持久化</text><text x="171" y="248" font-size="9.5" fill="#8a8a90">先落盘，再发消息</text>
    <rect x="300" y="216" width="222" height="38" rx="8" fill="#fff" stroke="#c9e0d2"/><text x="411" y="233"><tspan font-weight="700">Messages</tspan> 待发送</text><text x="411" y="248" font-size="9.5" fill="#8a8a90">宿主走网络投递</text>
    <rect x="540" y="216" width="230" height="38" rx="8" fill="#fff" stroke="#c9e0d2"/><text x="655" y="233"><tspan font-weight="700">CommittedEntries</tspan> 待应用</text><text x="655" y="248" font-size="9.5" fill="#8a8a90">喂给业务状态机</text>
    <rect x="788" y="216" width="192" height="38" rx="8" fill="#fff" stroke="#c9e0d2"/><text x="884" y="233"><tspan font-weight="700">Snapshot</tspan> 待持久化</text><text x="884" y="248" font-size="9.5" fill="#8a8a90">HardState 同批</text>
  </g>

  <!-- ===== 边界分隔 ===== -->
  <line x1="40" y1="276" x2="1000" y2="276" stroke="#d2d6dd" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="40" y="291" font-size="10" fill="#8a8a90">▲ 以上：宿主负责 WAL / 网络 / 线程 / 重试等全部真实 I/O　　▼ 以下：库 = 纯内存共识状态机（零磁盘 · 零 socket · 零 goroutine 驱动复制）</text>

  <!-- ===== ③ Raft 内核 · 6 盒 ===== -->
  <text x="40" y="308" font-size="11" font-weight="600" fill="#8a8a90">Raft 内核 · 确定性状态机（Step 单入口分派）</text>

  <!-- raftcore -->
  <rect x="40" y="316" width="296" height="118" rx="12" fill="#e9f0fb" stroke="#bcd0ec" filter="url(#soft)" data-tid="EtcdRaft原理_支撑_Raft状态机核心" data-lab="Raft 状态机核心"/>
  
  <text x="60" y="340" font-size="13" font-weight="700" fill="#1b2a4a">Raft 状态机核心</text>
  <text x="60" y="358" font-size="10.5" fill="#3d5a86">四态：Follower · Candidate</text>
  <text x="60" y="374" font-size="10.5" fill="#3d5a86">Leader · PreCandidate</text>
  <text x="60" y="392" font-size="10.5" fill="#3d5a86">becomeX 切换 · Step 单入口分派</text>
  <text x="60" y="428" font-size="9.5" fill="#a1a1a6">struct Step becomeLeader</text>

  <!-- election -->
  <rect x="372" y="316" width="296" height="118" rx="12" fill="#e9f0fb" stroke="#bcd0ec" filter="url(#soft)" data-tid="EtcdRaft原理_支撑_Leader选举" data-lab="Leader 选举"/>
  
  <text x="392" y="340" font-size="13" font-weight="700" fill="#1b2a4a">Leader 选举</text>
  <text x="392" y="359" font-size="10.5" fill="#3d5a86">tickElection → hup → campaign</text>
  <text x="392" y="377" font-size="10.5" fill="#3d5a86">PreVote 探路（不 +term）→ 真正 Vote</text>
  <text x="392" y="395" font-size="10.5" fill="#3d5a86">poll → TallyVotes 多数派授权</text>
  <text x="392" y="428" font-size="9.5" fill="#a1a1a6">tickElection campaign</text>

  <!-- replication (Hot) -->
  <rect x="704" y="316" width="296" height="118" rx="12" fill="#eaf6ef" stroke="#b9e0c8" filter="url(#soft)" data-tid="EtcdRaft原理_支撑_日志复制" data-lab="日志复制"/>
  
  <text x="724" y="340" font-size="13" font-weight="700" fill="#1f6b47">日志复制</text>
  <text x="724" y="359" font-size="10.5" fill="#2f7a54">Propose → appendEntry → bcastAppend(MsgApp)</text>
  <text x="724" y="377" font-size="10.5" fill="#2f7a54">多数派 match → maybeCommit → 提交</text>
  <text x="724" y="395" font-size="10.5" fill="#2f7a54">reject → MaybeDecrTo 回退 next 再探</text>
  <text x="724" y="428" font-size="9.5" fill="#a1a1a6">appendEntry stepLeader</text>
  <text x="988" y="340" font-size="9.5" fill="#1f9e5f" text-anchor="end" font-weight="600">Hot Path</text>

  <!-- raftlog (State) -->
  <rect x="40" y="446" width="296" height="118" rx="12" fill="#fbf3e3" stroke="#ecd9b0" filter="url(#soft)" data-tid="EtcdRaft原理_支撑_raftLog与unstable" data-lab="raftLog 与 unstable"/>
  
  <text x="60" y="470" font-size="13" font-weight="700" fill="#8a6013">raftLog + unstable</text>
  <text x="60" y="489" font-size="10.5" fill="#a1791f">unstable 暂存新条目 → Ready.Entries</text>
  <text x="60" y="507" font-size="10.5" fill="#a1791f">落盘回执 → stableTo 清出 unstable</text>
  <text x="60" y="525" font-size="10.5" fill="#a1791f">committed / applying / applied 三水位</text>
  <text x="60" y="558" font-size="9.5" fill="#a1a1a6">raftLog</text>

  <!-- readindex (Cross) -->
  <rect x="372" y="446" width="296" height="118" rx="12" fill="#f3ecfb" stroke="#d8c6ee" filter="url(#soft)" data-tid="EtcdRaft原理_支撑_ReadIndex线性化读" data-lab="ReadIndex 线性化读"/>
  
  <text x="392" y="470" font-size="13" font-weight="700" fill="#6b3ba0">ReadIndex 线性化读</text>
  <text x="392" y="489" font-size="10.5" fill="#814bbd">MsgReadIndex 记录当下 commit</text>
  <text x="392" y="507" font-size="10.5" fill="#814bbd">心跳向多数派确认仍是 Leader</text>
  <text x="392" y="525" font-size="10.5" fill="#814bbd">applied ≥ readIndex 后放行读</text>
  <text x="392" y="558" font-size="9.5" fill="#a1a1a6">maybeAdvance</text>

  <!-- confchange (Cross) -->
  <rect x="704" y="446" width="296" height="118" rx="12" fill="#f3ecfb" stroke="#d8c6ee" filter="url(#soft)" data-tid="EtcdRaft原理_支撑_成员变更与联合共识" data-lab="成员变更 · 联合共识"/>
  
  <text x="724" y="470" font-size="13" font-weight="700" fill="#6b3ba0">成员变更 · 联合共识</text>
  <text x="724" y="489" font-size="10.5" fill="#814bbd">EnterJoint → C(new,old) 两多数派并存</text>
  <text x="724" y="507" font-size="10.5" fill="#814bbd">LeaveJoint → C(new) 收敛</text>
  <text x="724" y="525" font-size="10.5" fill="#814bbd">Simple 单步 ≤1 · 一次一个待决</text>
  <text x="724" y="558" font-size="9.5" fill="#a1a1a6">EnterJoint Simple</text>

  <!-- ===== ④ Storage 接口（宿主实现，externalized I/O）===== -->
  <rect x="40" y="578" width="960" height="60" rx="12" fill="#fbf3e3" stroke="#ecd9b0" filter="url(#soft)" data-tid="EtcdRaft原理_支撑_Storage与快照" data-lab="Storage 与快照"/>
  
  <text x="60" y="601" font-size="12.5" font-weight="700" fill="#8a6013">Storage 接口（宿主实现 · 库只读）· InitialState / Entries / Term / LastIndex / Snapshot　+　快照压缩追平落后 follower</text>
  <text x="60" y="624" font-size="10.5" fill="#a1791f">MemoryStorage 为参考实现；生产由宿主接 WAL / boltdb —— 库自身不打开文件</text>
  <text x="980" y="601" font-size="9.5" fill="#a1a1a6" text-anchor="end"></text>

  <!-- ===== 连线 ===== -->
  <!-- Control: 选举 → 状态核心 -->
  <line x1="372" y1="375" x2="338" y2="375" stroke="#0a84ff" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#aCtl)"/>
  <!-- Hot: 复制 → raftLog append（走行间空隙，不穿盒）-->
  <path d="M730,434 L730,440 L302,440 L302,444" stroke="#1f9e5f" stroke-width="2.2" fill="none" marker-end="url(#aHot)"/>
  <text x="352" y="437" font-size="8.5" fill="#1f9e5f" font-weight="600">append 新条目 → unstable → Ready.Entries</text>
  <!-- State: raftLog ↔ Storage -->
  <line x1="120" y1="564" x2="120" y2="576" stroke="#c98a12" stroke-width="1.6" marker-end="url(#aState)"/>
  <text x="126" y="574" font-size="9" fill="#c98a12">stableTo / 读取</text>
  <!-- 失败: 复制 reject 自环 -->
  <path d="M980,395 C1006,395 1006,420 980,420" stroke="#e8730f" stroke-width="1.5" fill="none" stroke-dasharray="3 3" marker-end="url(#aFail)"/>
  <text x="905" y="414" font-size="9" fill="#e8730f">MsgApp reject</text>

  <!-- ===== 图例 ===== -->
  <g font-size="10" fill="#5b6470">
    <line x1="60" y1="672" x2="86" y2="672" stroke="#1f9e5f" stroke-width="2.2"/><text x="92" y="675">Hot 提案→复制→提交</text>
    <line x1="248" y1="672" x2="274" y2="672" stroke="#0a84ff" stroke-width="1.6" stroke-dasharray="6 4"/><text x="280" y="675">Control 选举/tick/Step</text>
    <line x1="452" y1="672" x2="478" y2="672" stroke="#c98a12" stroke-width="1.6"/><text x="484" y="675">State raftLog/Storage</text>
    <line x1="648" y1="672" x2="674" y2="672" stroke="#e8730f" stroke-width="1.5" stroke-dasharray="3 3"/><text x="680" y="675">失败 reject→回退</text>
    <line x1="828" y1="672" x2="854" y2="672" stroke="#a35bd6" stroke-width="1.6"/><text x="860" y="675">横切 ReadIndex/成员变更</text>
  </g>
</svg>
