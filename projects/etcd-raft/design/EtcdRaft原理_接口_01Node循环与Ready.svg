<svg xmlns="http://www.w3.org/2000/svg" width="920" height="580" viewBox="0 0 920 580" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#0a84ff"/></marker>
    <marker id="arG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#1f9e5f"/></marker>
  </defs>
  <rect width="920" height="580" fill="#fbfbfd"/>
  <text x="30" y="32" font-size="15" font-weight="600" fill="#1d1d1f">Node 驱动循环与 Ready：库产出待办，宿主做 I/O</text>
  <text x="30" y="52" font-size="10.5" fill="#8a8a90">node.go:343 run() · Ready 结构 node.go:52 · 规范循环 doc.go:123</text>

  <!-- 宿主循环框 -->
  <rect x="30" y="70" width="380" height="470" rx="13" fill="#e9f0fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="48" y="94" font-size="12.5" font-weight="700" fill="#274a78">宿主 for{ select } 驱动循环（host 独占 I/O）</text>

  <g font-size="10.5" fill="#274a78">
    <rect x="48" y="106" width="344" height="42" rx="8" fill="#fff" stroke="#c6d2ea"/>
    <text x="60" y="123" font-weight="700">case &lt;-Ticker:  n.Tick()</text>
    <text x="60" y="139" fill="#5b7db1">推进逻辑时钟（选举 / 心跳超时以 tick 计）</text>

    <rect x="48" y="156" width="344" height="58" rx="8" fill="#fff" stroke="#c6d2ea"/>
    <text x="60" y="173" font-weight="700">rd := &lt;-n.Ready()</text>
    <text x="60" y="189" fill="#5b7db1">① saveToStorage(rd.HardState, rd.Entries, rd.Snapshot)</text>
    <text x="60" y="205" fill="#5b7db1">② send(rd.Messages)  ③ apply(rd.CommittedEntries)</text>

    <rect x="48" y="222" width="344" height="42" rx="8" fill="#fff" stroke="#c6d2ea"/>
    <text x="60" y="239" font-weight="700">n.Advance()</text>
    <text x="60" y="255" fill="#5b7db1">确认已处理，换取下一个 Ready</text>

    <rect x="48" y="272" width="344" height="42" rx="8" fill="#f3f7fc" stroke="#c6d2ea"/>
    <text x="60" y="289" font-weight="700">n.Propose(data) / n.Step(msg)</text>
    <text x="60" y="305" fill="#5b7db1">写请求、入站 RPC → 投递给状态机</text>
  </g>

  <!-- 宿主承接的 I/O -->
  <text x="48" y="340" font-size="11" font-weight="700" fill="#8a6013">宿主承接的真实 I/O（库不碰）</text>
  <g font-size="10" fill="#8a6013">
    <rect x="48" y="350" width="110" height="34" rx="7" fill="#fbf3e3" stroke="#ecd9b0"/><text x="103" y="371" text-anchor="middle">WAL 落盘</text>
    <rect x="166" y="350" width="110" height="34" rx="7" fill="#fbf3e3" stroke="#ecd9b0"/><text x="221" y="371" text-anchor="middle">网络发消息</text>
    <rect x="284" y="350" width="108" height="34" rx="7" fill="#fbf3e3" stroke="#ecd9b0"/><text x="338" y="371" text-anchor="middle">线程 / 重试</text>
  </g>
  <rect x="48" y="396" width="344" height="128" rx="9" fill="#fdf6e9" stroke="#f0dfb8"/>
  <text x="60" y="416" font-size="10.5" font-weight="700" fill="#8a6013">为什么这样设计（张力）</text>
  <text x="60" y="436" font-size="10" fill="#a1791f">· 库 = 确定性状态机 → 可单测、可嵌入任意宿主</text>
  <text x="60" y="454" font-size="10" fill="#a1791f">· RawNode thread-unsafe（rawnode.go:31）→ 并发交宿主</text>
  <text x="60" y="472" font-size="10" fill="#a1791f">· 代价：宿主自己做 WAL / 传输 / 并发 / 重试</text>
  <text x="60" y="490" font-size="10" fill="#a1791f">· Propose/ReadIndex 可无声丢失,重试是宿主的活</text>
  <text x="60" y="508" font-size="10" fill="#a1791f">  (node.go:138-139 · :222-223)</text>

  <!-- 库核心 -->
  <rect x="470" y="70" width="200" height="120" rx="13" fill="#eef6f0" stroke="#c3e2ce" filter="url(#soft)"/>
  <text x="570" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#1f6b47">raft 状态机</text>
  <text x="570" y="133" text-anchor="middle" font-size="10" fill="#2f7a54">纯内存 · 确定性</text>
  <text x="570" y="151" text-anchor="middle" font-size="10" fill="#2f7a54">Step 单入口</text>
  <text x="570" y="169" text-anchor="middle" font-size="9.5" fill="#8a8a90">raft.go:343 / :1089</text>

  <!-- Ready 结构 -->
  <rect x="700" y="70" width="190" height="300" rx="13" fill="#eef6f0" stroke="#b9e0c8" filter="url(#soft)"/>
  <text x="795" y="94" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1f6b47">Ready 待办（只读）</text>
  <g font-size="10" fill="#2f7a54">
    <rect x="716" y="106" width="158" height="52" rx="7" fill="#fff" stroke="#c9e0d2"/>
    <text x="726" y="124" font-weight="700">Entries</text><text x="726" y="140" font-size="9">待落盘 · 先于 Messages</text><text x="726" y="152" font-size="8.5" fill="#8a8a90">node.go:74</text>
    <rect x="716" y="166" width="158" height="46" rx="7" fill="#fff" stroke="#c9e0d2"/>
    <text x="726" y="184" font-weight="700">Messages</text><text x="726" y="200" font-size="9">待发送（走宿主网络）</text>
    <rect x="716" y="220" width="158" height="52" rx="7" fill="#fff" stroke="#c9e0d2"/>
    <text x="726" y="238" font-weight="700">CommittedEntries</text><text x="726" y="254" font-size="9">待应用到业务状态机</text><text x="726" y="266" font-size="8.5" fill="#8a8a90">node.go:89</text>
    <rect x="716" y="280" width="158" height="34" rx="7" fill="#fff" stroke="#c9e0d2"/>
    <text x="726" y="301" font-weight="700">Snapshot / HardState</text>
    <rect x="716" y="322" width="158" height="34" rx="7" fill="#fff" stroke="#c9e0d2"/>
    <text x="726" y="343" font-weight="700">ReadStates</text>
  </g>

  <!-- 连线 -->
  <path d="M410,180 L468,130" stroke="#0a84ff" stroke-width="1.8" fill="none" marker-end="url(#ar)"/>
  <text x="416" y="150" font-size="9" fill="#0a84ff">Step / Tick</text>
  <path d="M670,130 L698,130" stroke="#1f9e5f" stroke-width="1.8" fill="none" marker-end="url(#arG)"/>
  <path d="M700,220 C620,240 500,220 410,185" stroke="#1f9e5f" stroke-width="1.8" fill="none" marker-end="url(#arG)"/>
  <text x="500" y="250" font-size="9" fill="#1f9e5f">Ready() 交出待办</text>
  <path d="M470,150 C440,110 430,300 410,244" stroke="#0a84ff" stroke-width="1.4" fill="none" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="430" y="270" font-size="9" fill="#0a84ff">Advance()</text>
</svg>
