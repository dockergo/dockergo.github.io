<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#0a84ff"/></marker>
  </defs>
  <rect width="900" height="520" fill="#fbfbfd"/>
  <text x="30" y="32" font-size="15" font-weight="600" fill="#1d1d1f">Raft 状态机核心：四态 + Step 单入口分派</text>
  <text x="30" y="52" font-size="10.5" fill="#8a8a90">raft.go:51 四态 · :1089 Step · :891/902/917/933 becomeX · step/tick 函数指针 :425-426</text>

  <!-- 四态 -->
  <rect x="40" y="78" width="180" height="66" rx="33" fill="#f5faf6" stroke="#c9e6cf" filter="url(#soft)"/>
  <text x="130" y="106" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1f5130">Follower</text>
  <text x="130" y="126" text-anchor="middle" font-size="9.5" fill="#4f9d69">初始态 · stepFollower</text>

  <rect x="290" y="78" width="180" height="66" rx="33" fill="#f3ecfb" stroke="#d8c6ee" filter="url(#soft)"/>
  <text x="380" y="106" text-anchor="middle" font-size="12.5" font-weight="700" fill="#6b3ba0">PreCandidate</text>
  <text x="380" y="126" text-anchor="middle" font-size="9.5" fill="#814bbd">PreVote 探路 · 不+term</text>

  <rect x="540" y="78" width="150" height="66" rx="33" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="615" y="106" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1b2a4a">Candidate</text>
  <text x="615" y="126" text-anchor="middle" font-size="9.5" fill="#5b7db1">term++ · stepCandidate</text>

  <rect x="720" y="78" width="150" height="66" rx="33" fill="#fbf7ef" stroke="#efe2c8" filter="url(#soft)"/>
  <text x="795" y="106" text-anchor="middle" font-size="12.5" font-weight="700" fill="#8a6d1f">Leader</text>
  <text x="795" y="126" text-anchor="middle" font-size="9.5" fill="#a1885a">stepLeader</text>

  <path d="M220,111 L288,111" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="254" y="102" text-anchor="middle" font-size="8.5" fill="#86868b">超时</text>
  <path d="M470,111 L538,111" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="504" y="102" text-anchor="middle" font-size="8.5" fill="#86868b">PreVote 过</text>
  <path d="M690,111 L718,111" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="704" y="102" text-anchor="middle" font-size="8.5" fill="#86868b">多数票</text>
  <path d="M795,144 C795,168 130,168 130,146" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <text x="460" y="163" text-anchor="middle" font-size="9" fill="#86868b">见更高 term / 失联 → becomeFollower(term, lead)</text>

  <!-- Step 分派 -->
  <rect x="40" y="196" width="400" height="290" rx="13" fill="#f7f7f9" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="56" y="220" font-size="12.5" font-weight="700" fill="#1d1d1f">Step(m) 单入口（raft.go:1089）</text>
  <g font-size="10.5" fill="#33373e">
    <rect x="56" y="232" width="368" height="34" rx="7" fill="#fff" stroke="#e2e2e7"/>
    <text x="66" y="253">① 先处理 m.Term：更高 term → becomeFollower</text>
    <rect x="56" y="274" width="368" height="34" rx="7" fill="#fbeceb" stroke="#eccdc9"/>
    <text x="66" y="295">　MsgPreVote 特例：绝不因 PreVote 改自己 term（:1115）</text>
    <rect x="56" y="316" width="368" height="34" rx="7" fill="#fff" stroke="#e2e2e7"/>
    <text x="66" y="337">② 更低 term → 多数情况丢弃 / checkQuorum 特例</text>
    <rect x="56" y="358" width="368" height="34" rx="7" fill="#eef3fb" stroke="#cfe0f2"/>
    <text x="66" y="379">③ r.step(r, m)：按当前状态分派</text>
    <rect x="70" y="398" width="112" height="30" rx="7" fill="#fff" stroke="#cfe0f2"/><text x="126" y="418" text-anchor="middle">stepLeader</text>
    <rect x="190" y="398" width="112" height="30" rx="7" fill="#fff" stroke="#cfe0f2"/><text x="246" y="418" text-anchor="middle">stepFollower</text>
    <rect x="310" y="398" width="106" height="30" rx="7" fill="#fff" stroke="#cfe0f2"/><text x="363" y="418" text-anchor="middle">stepCandidate</text>
  </g>
  <text x="56" y="452" font-size="9.5" fill="#8a8a90">stepCandidate 同时服务 Candidate 与 PreCandidate（:1671）</text>
  <text x="56" y="470" font-size="9.5" fill="#8a8a90">step/tick 是函数指针，becomeX 时被换（:425-426）</text>

  <!-- 无 goroutine 说明 -->
  <rect x="470" y="196" width="400" height="290" rx="13" fill="#eef6f0" stroke="#c3e2ce" filter="url(#soft)"/>
  <text x="486" y="220" font-size="12.5" font-weight="700" fill="#1f6b47">确定性内核（无驱动线程）</text>
  <g font-size="10.5" fill="#2f7a54">
    <text x="486" y="246">· raft 结构纯内存态（raft.go:343）</text>
    <text x="486" y="270">· 无 goroutine 驱动复制 / 计时</text>
    <text x="486" y="294">· tick 由宿主 Tick() 推进（rawnode.go:64）</text>
    <text x="486" y="318">· 消息由宿主 Step() 喂入</text>
    <text x="486" y="342">· 输出攒进 r.msgs → Ready.Messages</text>
    <text x="486" y="366">· RawNode 明言 thread-unsafe（:31）</text>
  </g>
  <rect x="486" y="384" width="368" height="86" rx="9" fill="#fff" stroke="#c9e0d2"/>
  <text x="498" y="404" font-size="10.5" font-weight="700" fill="#1f6b47">→ 可测/可嵌的根基</text>
  <text x="498" y="424" font-size="10" fill="#2f7a54">同一份 (状态, 消息) 输入 → 确定的 (新状态, 输出)；</text>
  <text x="498" y="442" font-size="10" fill="#2f7a54">测试可同步逐步驱动并断言，不依赖时钟与网络。</text>
  <text x="498" y="460" font-size="10" fill="#2f7a54">并发/IO 全由宿主在 Node 层承担。</text>
</svg>
