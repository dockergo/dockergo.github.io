<svg xmlns="http://www.w3.org/2000/svg" width="900" height="540" viewBox="0 0 900 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="arG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#1f9e5f"/></marker>
    <marker id="arF" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#e8730f"/></marker>
  </defs>
  <rect width="900" height="540" fill="#fbfbfd"/>
  <text x="30" y="32" font-size="15" font-weight="600" fill="#1d1d1f">日志复制：Propose → append → MsgApp → 多数派 → maybeCommit</text>
  <text x="30" y="52" font-size="10.5" fill="#8a8a90">raft.go:1294 MsgProp · :812 appendEntry · :714 bcastAppend · :1550 maybeCommit · :1390 reject 回退</text>

  <!-- Hot 主链 -->
  <rect x="40" y="76" width="820" height="150" rx="13" fill="#eaf6ef" stroke="#b9e0c8" filter="url(#soft)"/>
  <text x="56" y="100" font-size="12.5" font-weight="700" fill="#1f6b47">Hot Path（Leader，全部经 Ready 外包 I/O）</text>
  <g font-size="10" text-anchor="middle" fill="#1f6b47">
    <rect x="56" y="116" width="140" height="86" rx="8" fill="#fff" stroke="#c9e0d2"/>
    <text x="126" y="146" font-weight="700">① Propose</text><text x="126" y="164">stepLeader</text><text x="126" y="180">MsgProp</text><text x="126" y="194" font-size="8.5" fill="#8a8a90">raft.go:1294</text>
    <rect x="212" y="116" width="140" height="86" rx="8" fill="#fff" stroke="#c9e0d2"/>
    <text x="282" y="146" font-weight="700">② appendEntry</text><text x="282" y="164">盖 Term/Index</text><text x="282" y="180">→ unstable</text><text x="282" y="194" font-size="8.5" fill="#8a8a90">raft.go:812</text>
    <rect x="368" y="116" width="140" height="86" rx="8" fill="#fff" stroke="#c9e0d2"/>
    <text x="438" y="146" font-weight="700">③ bcastAppend</text><text x="438" y="164">MsgApp 到各</text><text x="438" y="180">follower</text><text x="438" y="194" font-size="8.5" fill="#8a8a90">raft.go:714</text>
    <rect x="524" y="116" width="150" height="86" rx="8" fill="#fff" stroke="#c9e0d2"/>
    <text x="599" y="146" font-weight="700">④ MsgAppResp</text><text x="599" y="164">pr.MaybeUpdate</text><text x="599" y="180">match 前进</text><text x="599" y="194" font-size="8.5" fill="#8a8a90">raft.go:1527</text>
    <rect x="690" y="116" width="150" height="86" rx="8" fill="#eef6f0" stroke="#b9e0c8"/>
    <text x="765" y="146" font-weight="700">⑤ maybeCommit</text><text x="765" y="164">多数派 match</text><text x="765" y="180">→ commit</text><text x="765" y="194" font-size="8.5" fill="#8a8a90">raft.go:1550</text>
  </g>
  <path d="M196,159 L210,159" stroke="#1f9e5f" stroke-width="1.6" marker-end="url(#arG)"/>
  <path d="M352,159 L366,159" stroke="#1f9e5f" stroke-width="1.6" marker-end="url(#arG)"/>
  <path d="M508,159 L522,159" stroke="#1f9e5f" stroke-width="1.6" marker-end="url(#arG)"/>
  <path d="M674,159 L688,159" stroke="#1f9e5f" stroke-width="1.6" marker-end="url(#arG)"/>

  <!-- 提交后 -->
  <rect x="40" y="244" width="400" height="120" rx="13" fill="#eef6f0" stroke="#c3e2ce" filter="url(#soft)"/>
  <text x="56" y="268" font-size="12" font-weight="700" fill="#1f6b47">提交后（maybeCommit 成功）</text>
  <g font-size="10.5" fill="#2f7a54">
    <text x="56" y="292">· raftLog.maybeCommit：term 匹配 + index&gt;committed（log.go:455）</text>
    <text x="56" y="314">· 成功 → bcastAppend 把新 commit 播给 follower（:1554）</text>
    <text x="56" y="336">· 已提交条目 → Ready.CommittedEntries → 宿主 apply</text>
    <text x="56" y="356">· leader 给自己那条 append 经 msgsAfterAppend 落盘后自ACK</text>
  </g>

  <!-- 失败回退 -->
  <rect x="460" y="244" width="400" height="120" rx="13" fill="#fdf2ea" stroke="#f0cdaa" filter="url(#soft)"/>
  <text x="476" y="268" font-size="12" font-weight="700" fill="#8a4a12">失败：MsgApp reject → 回退 next</text>
  <g font-size="10.5" fill="#a8641e">
    <text x="476" y="292">· follower handleAppendEntries 一致性检查失败（raft.go:1791）</text>
    <text x="476" y="314">· 回 Reject:true + RejectHint + LogTerm（:1825-1832）</text>
    <text x="476" y="336">· leader findConflictByTerm 猜跳点（:1509）</text>
    <text x="476" y="356">· pr.MaybeDecrTo 下调 Next → BecomeProbe → 重发（:1511-1516）</text>
  </g>
  <path d="M660,364 C660,392 560,392 560,366" stroke="#e8730f" stroke-width="1.5" fill="none" stroke-dasharray="3 3" marker-end="url(#arF)"/>
  <text x="610" y="388" text-anchor="middle" font-size="9" fill="#e8730f">按 term 跳跃回退，快速对齐</text>

  <!-- follower 侧 -->
  <rect x="40" y="384" width="820" height="132" rx="13" fill="#f7f7f9" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="56" y="408" font-size="12" font-weight="700" fill="#1d1d1f">Follower 侧 handleAppendEntries（raft.go:1791）</text>
  <g font-size="10.5" fill="#6e6e73">
    <text x="56" y="432">· prev.index &lt; committed：已提交部分，回 committed 作 hint（:1796-1798）</text>
    <text x="56" y="454">· maybeAppend 成功：写入并回 MsgAppResp{Index: mlastIndex}（:1800-1801）</text>
    <text x="56" y="476">· 冲突：findConflictByTerm 找 term≤LogTerm 的最大 index 作 RejectHint（:1824）</text>
    <text x="56" y="498">· 心跳仅推进 commit：handleHeartbeat → commitTo（:1835-1836），不带日志</text>
  </g>
</svg>
