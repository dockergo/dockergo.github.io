<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="aA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c98a12"/></marker>
    <marker id="aG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#1f9e5f"/></marker>
  </defs>
  <rect width="1080" height="560" fill="#fbfbfd"/>

  <text x="30" y="32" font-size="15" font-weight="700" fill="#1d1d1f">一条日志的生命周期 · 与 Ready I/O 环逐段咬合，三条水位单调推进</text>
  <text x="30" y="52" font-size="10.5" fill="#6e6e73">append 进 unstable → 交 Ready.Entries 落盘 → stableTo 清出 → 多数派 commit → 交 Ready.CommittedEntries 应用 → Advance 抬 applied</text>

  <!-- 图例 -->
  <line x1="30" y1="74" x2="54" y2="74" stroke="#c98a12" stroke-width="2.4" marker-end="url(#aA)"/><text x="60" y="78" font-size="10" fill="#5b6470">存储 / 落盘</text>
  <line x1="160" y1="74" x2="184" y2="74" stroke="#1f9e5f" stroke-width="2.2" marker-end="url(#aG)"/><text x="190" y="78" font-size="10" fill="#5b6470">提交 / 应用</text>
  <rect x="300" y="68" width="14" height="12" rx="3" fill="#fbf3e3" stroke="#ecd9b0"/><text x="320" y="78" font-size="10" fill="#5b6470">库内存态</text>
  <rect x="410" y="68" width="14" height="12" rx="3" fill="#f7f7f9" stroke="#c7c7cc"/><text x="430" y="78" font-size="10" fill="#5b6470">宿主 I/O</text>

  <!-- 六段流水线 -->
  <g font-size="10">
    <!-- 1 append -->
    <rect x="30" y="100" width="150" height="86" rx="11" fill="#fbf3e3" stroke="#ecd9b0" filter="url(#soft)"/>
    <text x="44" y="122" font-size="11" font-weight="700" fill="#8a6013">① append</text>
    <text x="44" y="141" fill="#a1791f">新条目进 unstable</text>
    <text x="44" y="157" fill="#a1791f">.entries（内存）</text>
    <text x="44" y="176" font-size="9" fill="#8a8a90">可先截断冲突尾</text>

    <rect x="212" y="100" width="164" height="86" rx="11" fill="#f7f7f9" stroke="#c7c7cc" filter="url(#soft)"/>
    <text x="226" y="122" font-size="11" font-weight="700" fill="#5b6470">② 交待办 → 落盘</text>
    <text x="226" y="141" fill="#4a4a4f">nextUnstableEnts</text>
    <text x="226" y="157" fill="#4a4a4f">→ Ready.Entries</text>
    <text x="226" y="176" font-size="9" fill="#8a8a90">宿主写入 WAL</text>

    <rect x="408" y="100" width="164" height="86" rx="11" fill="#fbf3e3" stroke="#ecd9b0" filter="url(#soft)"/>
    <text x="422" y="122" font-size="11" font-weight="700" fill="#8a6013">③ stableTo 清出</text>
    <text x="422" y="141" fill="#a1791f">回执后从 unstable</text>
    <text x="422" y="157" fill="#a1791f">清出 → 转 Storage 可读</text>
    <text x="422" y="176" font-size="9" fill="#8a8a90">此后从稳定段读</text>

    <rect x="604" y="100" width="150" height="86" rx="11" fill="#eef6f0" stroke="#b9e0c8" filter="url(#soft)"/>
    <text x="618" y="122" font-size="11" font-weight="700" fill="#1f6b47">④ commitTo</text>
    <text x="618" y="141" fill="#2f7a54">多数派复制 →</text>
    <text x="618" y="157" fill="#2f7a54">抬 committed</text>
    <text x="618" y="176" font-size="9" fill="#8a8a90">只增不减，越界 panic</text>

    <rect x="786" y="100" width="164" height="86" rx="11" fill="#f7f7f9" stroke="#c7c7cc" filter="url(#soft)"/>
    <text x="800" y="122" font-size="11" font-weight="700" fill="#5b6470">⑤ 交应用 → apply</text>
    <text x="800" y="141" fill="#4a4a4f">nextCommittedEnts →</text>
    <text x="800" y="157" fill="#4a4a4f">Ready.CommittedEntries</text>
    <text x="800" y="176" font-size="9" fill="#8a8a90">applying 抬起</text>

    <rect x="982" y="100" width="70" height="86" rx="11" fill="#eef6f0" stroke="#b9e0c8" filter="url(#soft)"/>
    <text x="1017" y="122" font-size="11" font-weight="700" fill="#1f6b47" text-anchor="middle">⑥</text>
    <text x="1017" y="141" fill="#2f7a54" text-anchor="middle">Advance</text>
    <text x="1017" y="157" fill="#2f7a54" text-anchor="middle">→ 抬</text>
    <text x="1017" y="173" fill="#2f7a54" text-anchor="middle">applied</text>
  </g>
  <!-- 连线 -->
  <line x1="180" y1="143" x2="210" y2="143" stroke="#c98a12" stroke-width="2.2" marker-end="url(#aA)"/>
  <line x1="376" y1="143" x2="406" y2="143" stroke="#c98a12" stroke-width="2.2" marker-end="url(#aA)"/>
  <line x1="572" y1="143" x2="602" y2="143" stroke="#1f9e5f" stroke-width="2.2" marker-end="url(#aG)"/>
  <line x1="754" y1="143" x2="784" y2="143" stroke="#1f9e5f" stroke-width="2.2" marker-end="url(#aG)"/>
  <line x1="950" y1="143" x2="980" y2="143" stroke="#1f9e5f" stroke-width="2.2" marker-end="url(#aG)"/>

  <!-- 三水位轴 -->
  <text x="30" y="228" font-size="12" font-weight="700" fill="#1d1d1f">三条单调水位 · 不变式 applied ≤ applying ≤ committed</text>
  <rect x="30" y="240" width="1020" height="120" rx="12" fill="#f6f7f9" stroke="#e4e7ec"/>
  <!-- 日志格 -->
  <g font-size="9.5" text-anchor="middle">
    <rect x="60" y="292" width="70" height="34" rx="5" fill="#dbe8fa" stroke="#9dbdea"/><text x="95" y="313" fill="#20375e">idx1 已应用</text>
    <rect x="132" y="292" width="70" height="34" rx="5" fill="#dbe8fa" stroke="#9dbdea"/><text x="167" y="313" fill="#20375e">idx2 已应用</text>
    <rect x="204" y="292" width="70" height="34" rx="5" fill="#d6efe0" stroke="#9ed3b6"/><text x="239" y="313" fill="#1f6b47">idx3 应用中</text>
    <rect x="276" y="292" width="70" height="34" rx="5" fill="#d6efe0" stroke="#9ed3b6"/><text x="311" y="313" fill="#1f6b47">idx4 已提交</text>
    <rect x="348" y="292" width="70" height="34" rx="5" fill="#d6efe0" stroke="#9ed3b6"/><text x="383" y="313" fill="#1f6b47">idx5 已提交</text>
    <rect x="420" y="292" width="70" height="34" rx="5" fill="#fbf0da" stroke="#ecd9b0"/><text x="455" y="313" fill="#8a6013">idx6 未提交</text>
    <rect x="492" y="292" width="70" height="34" rx="5" fill="#fbf0da" stroke="#ecd9b0"/><text x="527" y="313" fill="#8a6013">idx7 未提交</text>
  </g>
  <!-- 水位指针 -->
  <line x1="204" y1="286" x2="204" y2="332" stroke="#1f9e5f" stroke-width="2"/><text x="204" y="350" font-size="9.5" fill="#1f6b47" text-anchor="middle">applied ↑</text>
  <line x1="276" y1="286" x2="276" y2="332" stroke="#2f9e6e" stroke-width="2"/><text x="276" y="350" font-size="9.5" fill="#2f9e6e" text-anchor="middle">applying ↑</text>
  <line x1="420" y1="286" x2="420" y2="332" stroke="#c98a12" stroke-width="2"/><text x="420" y="350" font-size="9.5" fill="#8a6013" text-anchor="middle">committed ↑</text>
  <text x="620" y="278" font-size="10" fill="#4a4a4f">applied：宿主确认应用完（Advance 后抬）</text>
  <text x="620" y="298" font-size="10" fill="#4a4a4f">applying：已交出待应用、尚未回执的窗口</text>
  <text x="620" y="318" font-size="10" fill="#4a4a4f">committed：多数派已复制、可提交的最高位</text>
  <text x="620" y="340" font-size="9.5" fill="#8a8a90">idx6/7 尚未过半，仍是未提交尾，可能被新 leader 覆盖</text>

  <!-- 正交轴要点 -->
  <rect x="30" y="376" width="1020" height="90" rx="12" fill="#fdf6e9" stroke="#f0dfb8"/>
  <text x="48" y="400" font-size="12" font-weight="700" fill="#8a6d1f">关键：「未落盘」与「已提交」是正交的两件事</text>
  <text x="48" y="422" font-size="10.5" fill="#4a4a4f">unstable 指「尚未落盘」，committed 指「多数派已复制」——一条条目完全可以<tspan font-weight="700">已提交却仍在 unstable</tspan>（本机还没写完盘，但别人已复制够数）。</text>
  <text x="48" y="440" font-size="10.5" fill="#4a4a4f">同步模式：stableTo 靠宿主落盘回执驱动，在 acceptReady 里做；异步模式：靠 MsgStorageAppendResp 驱动。</text>
  <text x="48" y="458" font-size="9.5" fill="#8a8a90">库只在内存里推进水位；真正的落盘、apply、日志压缩（Compact 旧段）全由宿主的 Storage 承担。</text>

  <!-- 底部 -->
  <rect x="30" y="482" width="1020" height="56" rx="12" fill="#f6f7f9" stroke="#e4e7ec"/>
  <text x="48" y="506" font-size="10.5" font-weight="700" fill="#1f6b47">安全</text>
  <text x="104" y="506" font-size="10" fill="#4a4a4f">committed 只增不减且越界即 panic（日志损坏保护）；必须走 commitTo / maybeCommit，禁止直接改 committed。</text>
  <text x="48" y="526" font-size="10" fill="#8a8a90">生命周期由宿主的 Ready 循环节拍驱动：库交待办 → 宿主做 I/O → 回执/Advance → 库抬水位，周而复始。</text>
</svg>
