<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="540" viewBox="0 0 1020 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="aG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#1f9e5f"/></marker>
    <marker id="aR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#d1544a"/></marker>
    <marker id="aK" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8a8a90"/></marker>
  </defs>
  <rect width="1020" height="540" fill="#fbfbfd"/>

  <text x="30" y="32" font-size="15" font-weight="700" fill="#1d1d1f">Follower 一致性检查 · handleAppendEntries 的三分支裁决</text>
  <text x="30" y="52" font-size="10.5" fill="#6e6e73">收到 MsgApp 后按 prevLog 匹配情况分三路：已提交幂等回执 / 追加成功 / 冲突回 term 跳跃提示，让 leader 快速对齐</text>

  <!-- 图例 -->
  <line x1="30" y1="74" x2="54" y2="74" stroke="#1f9e5f" stroke-width="2.2" marker-end="url(#aG)"/><text x="60" y="78" font-size="10" fill="#5b6470">接受 / 推进</text>
  <line x1="160" y1="74" x2="184" y2="74" stroke="#d1544a" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#aR)"/><text x="190" y="78" font-size="10" fill="#5b6470">拒绝 → 回退提示</text>
  <line x1="320" y1="74" x2="344" y2="74" stroke="#8a8a90" stroke-width="2" marker-end="url(#aK)"/><text x="350" y="78" font-size="10" fill="#5b6470">否 → 下一判定</text>

  <!-- 入口 -->
  <rect x="30" y="100" width="200" height="66" rx="12" fill="#eef6f0" stroke="#b9e0c8" filter="url(#soft)"/>
  <text x="130" y="126" font-size="12.5" font-weight="700" fill="#1f6b47" text-anchor="middle">收到 MsgApp</text>
  <text x="130" y="145" font-size="9.5" fill="#2f7a54" text-anchor="middle">携 prev⟨idx,term⟩ · entries</text>
  <text x="130" y="160" font-size="9.5" fill="#8a8a90" text-anchor="middle">· leaderCommit</text>

  <!-- 判定1 -->
  <rect x="30" y="196" width="330" height="72" rx="12" fill="#f7f7f9" stroke="#e4e7ec" filter="url(#soft)"/>
  <text x="48" y="220" font-size="11.5" font-weight="700" fill="#5b6470">判定 ① prev.index &lt; committed ?</text>
  <text x="48" y="240" font-size="10" fill="#4a4a4f">请求落在本机已提交区（陈旧/重复的追加）</text>
  <text x="48" y="257" font-size="10" fill="#8a8a90">已提交条目永不覆盖</text>
  <line x1="130" y1="166" x2="130" y2="194" stroke="#1f9e5f" stroke-width="2.2" marker-end="url(#aG)"/>

  <!-- 出口1 -->
  <rect x="410" y="196" width="580" height="72" rx="12" fill="#eef6f0" stroke="#b9e0c8" filter="url(#soft)"/>
  <text x="428" y="220" font-size="11.5" font-weight="700" fill="#1f6b47">是 → 回 MsgAppResp{Index = committed}</text>
  <text x="428" y="240" font-size="10" fill="#2f7a54">用本机 committed 作 hint，让 leader 直接把 Next 抬到已提交处，免无谓回退</text>
  <text x="428" y="257" font-size="9.5" fill="#8a8a90">幂等：不改日志，只给对齐提示</text>
  <line x1="360" y1="232" x2="408" y2="232" stroke="#1f9e5f" stroke-width="2.2" marker-end="url(#aG)"/>

  <!-- 判定2 -->
  <rect x="30" y="298" width="330" height="72" rx="12" fill="#f7f7f9" stroke="#e4e7ec" filter="url(#soft)"/>
  <text x="48" y="322" font-size="11.5" font-weight="700" fill="#5b6470">判定 ② maybeAppend 成功 ?</text>
  <text x="48" y="342" font-size="10" fill="#4a4a4f">prevLog⟨idx,term⟩ 与本机匹配 → 截冲突尾 + 追加</text>
  <text x="48" y="359" font-size="10" fill="#8a8a90">日志匹配性质：前缀一致</text>
  <line x1="130" y1="268" x2="130" y2="296" stroke="#8a8a90" stroke-width="2" marker-end="url(#aK)"/>
  <text x="150" y="286" font-size="9" fill="#5b6470">否</text>

  <!-- 出口2 -->
  <rect x="410" y="298" width="580" height="72" rx="12" fill="#eef6f0" stroke="#b9e0c8" filter="url(#soft)"/>
  <text x="428" y="322" font-size="11.5" font-weight="700" fill="#1f6b47">是 → 写入 + 回 MsgAppResp{Index = mlastIndex}</text>
  <text x="428" y="342" font-size="10" fill="#2f7a54">推进 leader 侧该 peer 的 match；并按 leaderCommit 抬本机 commit</text>
  <text x="428" y="359" font-size="9.5" fill="#8a8a90">这是复制的正常成功路径</text>
  <line x1="360" y1="334" x2="408" y2="334" stroke="#1f9e5f" stroke-width="2.2" marker-end="url(#aG)"/>

  <!-- 冲突分支 -->
  <rect x="30" y="400" width="330" height="82" rx="12" fill="#fbe9e7" stroke="#e8c4bd" filter="url(#soft)"/>
  <text x="48" y="424" font-size="11.5" font-weight="700" fill="#8a4038">否 → 冲突：findConflictByTerm</text>
  <text x="48" y="444" font-size="10" fill="#8a4038">在本机日志找 term ≤ m.LogTerm 的</text>
  <text x="48" y="461" font-size="10" fill="#8a4038">最大 (index, term)，作为跳跃提示</text>
  <text x="48" y="477" font-size="9.5" fill="#a97b74">一步跳过整段高 term 的未提交尾</text>
  <line x1="130" y1="370" x2="130" y2="398" stroke="#d1544a" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#aR)"/>
  <text x="150" y="388" font-size="9" fill="#8a4038">否</text>

  <!-- 出口冲突 -->
  <rect x="410" y="400" width="580" height="82" rx="12" fill="#fbe9e7" stroke="#e8c4bd" filter="url(#soft)"/>
  <text x="428" y="424" font-size="11.5" font-weight="700" fill="#8a4038">回 MsgAppResp{Reject, RejectHint, LogTerm}</text>
  <text x="428" y="444" font-size="10" fill="#8a4038">leader 据此 MaybeDecrTo 下调 Next、转 Probe 态重探 —— 按 term 跳跃</text>
  <text x="428" y="461" font-size="10" fill="#8a4038">而非逐条回退，快速收敛到最后一致点</text>
  <text x="428" y="477" font-size="9.5" fill="#a97b74">对应「日志回退—重试」循环的 follower 侧</text>
  <line x1="360" y1="441" x2="408" y2="441" stroke="#d1544a" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#aR)"/>

  <!-- 心跳旁注 -->
  <rect x="30" y="500" width="960" height="34" rx="9" fill="#f6f7f9" stroke="#e4e7ec"/>
  <text x="48" y="522" font-size="10" fill="#4a4a4f"><tspan font-weight="700" fill="#1f6b47">心跳独立于此：</tspan>handleHeartbeat 只做 commitTo(leaderCommit) 抬 commit，回 MsgHeartbeatResp —— 不携带任何日志条目，是最轻量的保活与 commit 推进。</text>
</svg>
