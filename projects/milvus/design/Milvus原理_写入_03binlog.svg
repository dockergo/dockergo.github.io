<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="530" viewBox="0 0 1080 530" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="530" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Milvus WriteBuffer 与 binlog 生成 · 三类 buffer → 列式落盘</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">消费端把消息攒进 buffer 再落盘;SyncManager pack writer 序列化成列式 binlog,存对象存储;delta log 单独记删除,查询叠加应用</text>

  <!-- Three buffers (left) -->
  <rect x="30" y="92" width="300" height="330" rx="16" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="46" y="114" font-size="11.5" font-weight="700" fill="#12402a">三类 buffer（内存）</text>
  <text x="46" y="132" font-size="8" fill="#2f6f4f">internal/flushcommon/writebuffer</text>
  <g font-size="8.5">
    <rect x="46" y="144" width="268" height="80" rx="9" fill="#eafaf1" stroke="#bfe0cd"/>
    <text x="62" y="165" font-weight="700" fill="#12402a">insert_buffer</text>
    <text x="62" y="184" fill="#2f6f4f">新数据(实际写入的行)</text>
    <text x="62" y="202" fill="#2f6f4f">按字段列式攒批</text>
    <text x="62" y="218" fill="#2f6f4f" font-size="7.5">→ 序列化成 insert binlog</text>
    <rect x="46" y="234" width="268" height="80" rx="9" fill="#fbeaea" stroke="#e7c3c3"/>
    <text x="62" y="255" font-weight="700" fill="#4a1414">delta_buffer</text>
    <text x="62" y="274" fill="#7a2a2a">删除标记(不真删数据)</text>
    <text x="62" y="292" fill="#7a2a2a">记 pk + 删除 ts</text>
    <text x="62" y="308" fill="#7a2a2a" font-size="7.5">→ 序列化成 delta log</text>
    <rect x="46" y="324" width="268" height="82" rx="9" fill="#f4eefb" stroke="#d9c7ec"/>
    <text x="62" y="345" font-weight="700" fill="#3d2a5a">stats_buffer</text>
    <text x="62" y="364" fill="#5a3d78">统计信息(加速查询)</text>
    <text x="62" y="382" fill="#5a3d78">主键 min/max + bloom filter</text>
    <text x="62" y="398" fill="#5a3d78" font-size="7.5">→ 序列化成 stats log</text>
  </g>

  <!-- SyncManager (middle) -->
  <rect x="390" y="152" width="230" height="210" rx="16" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="505" y="176" font-size="11" font-weight="700" text-anchor="middle" fill="#5a3410">SyncManager</text>
  <text x="505" y="194" font-size="8" text-anchor="middle" fill="#93762e">internal/flushcommon/syncmgr</text>
  <g font-size="8.5" text-anchor="middle">
    <rect x="406" y="208" width="198" height="46" rx="8" fill="#fff7e6" stroke="#e8cf9a"/><text x="505" y="228" font-weight="600" fill="#5a3410">pack writer</text><text x="505" y="244" fill="#93762e">攒 buffer 打包序列化</text>
    <rect x="406" y="262" width="198" height="42" rx="8" fill="#fff7e6" stroke="#e8cf9a"/><text x="505" y="281" font-weight="600" fill="#5a3410">列式编码</text><text x="505" y="296" fill="#93762e" font-size="7.5">每字段/列组一个文件</text>
    <rect x="406" y="312" width="198" height="40" rx="8" fill="#fff" stroke="#e8cf9a"/><text x="505" y="336" fill="#93762e" font-size="7.5">返回 []*datapb.Binlog</text>
  </g>

  <!-- object storage output (right) -->
  <rect x="680" y="92" width="370" height="270" rx="16" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="696" y="114" font-size="11.5" font-weight="700" fill="#5a3410">对象存储（列式,每字段一文件）</text>
  <text x="696" y="132" font-size="8" fill="#93762e">S3 / MinIO · binlog 是异步落盘的产物</text>
  <g font-size="8.5">
    <rect x="696" y="144" width="338" height="66" rx="9" fill="#fef2e0" stroke="#e8cf9a"/>
    <text x="712" y="164" font-weight="700" fill="#5a3410">insert binlog</text>
    <text x="712" y="182" fill="#93762e">列式:field-A.log · field-B.log · vec.log</text>
    <text x="712" y="200" fill="#93762e" font-size="7.5">来自 insert_buffer</text>
    <rect x="696" y="218" width="338" height="62" rx="9" fill="#fdf6ea" stroke="#efdcb4"/>
    <text x="712" y="238" font-weight="700" fill="#5a3410">delta log</text>
    <text x="712" y="256" fill="#93762e">单独记删除;查询时叠加应用</text>
    <text x="712" y="272" fill="#93762e" font-size="7.5">来自 delta_buffer · 惰性清除靠 compaction</text>
    <rect x="696" y="288" width="338" height="62" rx="9" fill="#fdf6ea" stroke="#efdcb4"/>
    <text x="712" y="308" font-weight="700" fill="#5a3410">stats log</text>
    <text x="712" y="326" fill="#93762e">主键 min/max + bloom filter</text>
    <text x="712" y="342" fill="#93762e" font-size="7.5">来自 stats_buffer · 加速过滤</text>
  </g>

  <!-- arrows buffers -> syncmanager -->
  <line x1="330" y1="184" x2="390" y2="222" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="330" y1="274" x2="390" y2="258" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="330" y1="364" x2="390" y2="300" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <!-- arrow syncmanager -> object storage -->
  <line x1="620" y1="240" x2="680" y2="230" stroke="#86868b" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- sync policy trigger band -->
  <rect x="30" y="438" width="1020" height="74" rx="12" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="460" font-size="10.5" font-weight="700" fill="#1b2a4a">触发同步 · sync policy（sync_policy.go）—— 按条件选段落盘</text>
  <g font-size="8.8">
    <text x="46" y="482" fill="#5b7db1">buffer 满　·　buffer 过期　·　段封(sealed)　·　flush-ts　·　dropped / oldest-buffer</text>
    <text x="46" y="500" fill="#5b7db1">调优:攒批大省 binlog 数(减碎片)、攒批小降内存/延迟;避免大量小写产生碎片段 —— 批量写远快于逐条</text>
  </g>
</svg>
