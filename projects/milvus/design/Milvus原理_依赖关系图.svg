<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Milvus 能力域依赖关系图</text>
  <text x="30" y="50" font-size="11" fill="#a1a1a6">实线=数据流/调用,虚线=状态约束;贯穿层 timestamp(HLC 全局 TSO)横切写入/一致性/段</text>

  <!-- legend -->
  <line x1="720" y1="42" x2="760" y2="42" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="766" y="46" font-size="9.5" fill="#a1a1a6">数据流/调用</text>
  <line x1="870" y1="42" x2="910" y2="42" stroke="#b0b0b8" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="916" y="46" font-size="9.5" fill="#a1a1a6">状态约束</text>

  <!-- 接触面 row -->
  <rect x="120" y="78" width="180" height="52" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="210" y="102" font-size="12" font-weight="600" fill="#3d2a5a" text-anchor="middle">insert(写接触面)</text>
  <text x="210" y="119" font-size="9" fill="#3d2a5a" text-anchor="middle">向量 + 标量追加</text>

  <rect x="780" y="78" width="180" height="52" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="870" y="102" font-size="12" font-weight="600" fill="#3d2a5a" text-anchor="middle">search(检索接触面)</text>
  <text x="870" y="119" font-size="9" fill="#3d2a5a" text-anchor="middle">topK 最近邻</text>

  <!-- 支撑 nodes -->
  <!-- 写入路径 -->
  <rect x="80" y="188" width="180" height="56" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="170" y="212" font-size="11.5" font-weight="600" fill="#5a3410" text-anchor="middle">写入路径</text>
  <text x="170" y="230" font-size="9" fill="#93762e" text-anchor="middle">streaming WAL → binlog</text>
  <!-- 段与生命周期 -->
  <rect x="320" y="188" width="180" height="56" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="410" y="212" font-size="11.5" font-weight="600" fill="#5a3410" text-anchor="middle">段与生命周期</text>
  <text x="410" y="230" font-size="9" fill="#93762e" text-anchor="middle">growing → sealed → indexed</text>
  <!-- 向量索引与检索 -->
  <rect x="580" y="188" width="180" height="56" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="670" y="212" font-size="11.5" font-weight="600" fill="#12402a" text-anchor="middle">向量索引与检索</text>
  <text x="670" y="230" font-size="9" fill="#2f6f4f" text-anchor="middle">knowhere ANN + 预过滤</text>
  <!-- 分布式架构 -->
  <rect x="820" y="188" width="180" height="56" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="910" y="212" font-size="11.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">分布式架构</text>
  <text x="910" y="230" font-size="9" fill="#5b7db1" text-anchor="middle">QueryNode 执行检索</text>

  <!-- 元数据 -->
  <rect x="320" y="300" width="180" height="52" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="410" y="323" font-size="11.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">元数据(etcd)</text>
  <text x="410" y="340" font-size="9" fill="#6e6e73" text-anchor="middle">schema · 段信息 · 索引元</text>

  <!-- insert -> 写入路径 (data) -->
  <path d="M170,130 L170,188" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <!-- 写入路径 -> 段 (data) -->
  <path d="M260,216 L320,216" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <!-- 段 -> 向量索引 (data: 异步建索引) -->
  <path d="M500,216 L580,216" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="540" y="208" font-size="8.5" fill="#a1a1a6" text-anchor="middle">建索引</text>
  <!-- search -> 分布式架构 (data) -->
  <path d="M870,130 L870,170 L910,170 L910,188" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <!-- 分布式架构 -> 向量索引 (data: QueryNode drives ANN) -->
  <path d="M820,216 L760,216" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <!-- 向量索引 -> 段 (data: 读 sealed 段) -->
  <path d="M620,244 L620,270 L470,270 L470,244" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="545" y="264" font-size="8.5" fill="#a1a1a6" text-anchor="middle">读 sealed 段 + 索引</text>
  <!-- 元数据 <- 段 (dashed state) -->
  <path d="M410,244 L410,300" stroke="#b0b0b8" stroke-width="1.5" fill="none" stroke-dasharray="5 4"/>
  <text x="418" y="276" font-size="8.5" fill="#a1a1a6">段状态登记</text>
  <!-- insert -> 元数据 (dashed: schema 校验) -->
  <path d="M120,104 L60,104 L60,326 L320,326" stroke="#b0b0b8" stroke-width="1.5" fill="none" stroke-dasharray="5 4" marker-end="url(#ar)"/>
  <text x="70" y="220" font-size="8.5" fill="#a1a1a6">校验 schema</text>

  <!-- timestamp 贯穿层 -->
  <rect x="80" y="392" width="920" height="58" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="100" y="418" font-size="12" font-weight="600" fill="#1b2a4a">贯穿层 · timestamp(HLC 全局 TSO,RootCoord 单点发)</text>
  <text x="100" y="438" font-size="9.5" fill="#5b7db1">每个操作领一个全局单调 TSO;写按 ts 定序、段/binlog 按 ts 版本化;读带 guaranteeTs 等 tSafe 追上看一致快照</text>

  <!-- dashed vertical ties from timestamp to 写入/一致/段 -->
  <path d="M170,244 L170,392" stroke="#b0b0b8" stroke-width="1.3" fill="none" stroke-dasharray="4 4"/>
  <path d="M410,352 L410,392" stroke="#b0b0b8" stroke-width="1.3" fill="none" stroke-dasharray="4 4"/>
  <path d="M910,244 L910,392" stroke="#b0b0b8" stroke-width="1.3" fill="none" stroke-dasharray="4 4"/>
  <text x="500" y="382" font-size="8.5" fill="#a1a1a6" text-anchor="middle">横切:写入定序 · 段版本 · 读快照</text>

  <!-- footnote -->
  <text x="30" y="480" font-size="9.5" fill="#a1a1a6">读路径:search → 分布式架构(QueryNode)→ 向量索引(knowhere ANN)→ 读段;写路径:insert → 写入路径 → 段 → 异步建索引</text>
  <text x="30" y="498" font-size="9.5" fill="#a1a1a6">timestamp 是唯一横切所有能力域的贯穿层:定序写入、版本化段、约束读快照,把写与读缝在同一时间轴上</text>
</svg>
