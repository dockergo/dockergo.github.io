<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="420" viewBox="0 0 1020 420"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="420" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">执行器结构与并行查询 · plan tree → exec tree（executor/、execMain.c）</text>

  <!-- 三段 -->
  <rect x="30" y="56" width="600" height="150" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="80" font-size="12.5" font-weight="600" fill="#1d1d1f">执行器三段（ExecutorStart/Run/End）</text>
  <rect x="48" y="96" width="180" height="90" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="138" y="120" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">Start</text><text x="138" y="140" font-size="8.5" fill="#5b7db1" text-anchor="middle">plan tree → exec tree</text><text x="138" y="156" font-size="8.5" fill="#5b7db1" text-anchor="middle">建 EState、tuple slot</text><text x="138" y="172" font-size="8.5" fill="#5b7db1" text-anchor="middle">开表/索引</text>
  <rect x="238" y="96" width="180" height="90" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="328" y="120" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">Run</text><text x="328" y="140" font-size="8.5" fill="#3f8f66" text-anchor="middle">ExecProcNode 逐行拉</text><text x="328" y="156" font-size="8.5" fill="#3f8f66" text-anchor="middle">volcano 驱动</text><text x="328" y="172" font-size="8.5" fill="#3f8f66" text-anchor="middle">直到取尽/够 LIMIT</text>
  <rect x="428" y="96" width="184" height="90" rx="10" fill="#f4eefb" stroke="#d9c9ef"/><text x="520" y="120" font-size="10" font-weight="600" fill="#3c1361" text-anchor="middle">End</text><text x="520" y="140" font-size="8.5" fill="#7a5aa8" text-anchor="middle">关表/索引</text><text x="520" y="156" font-size="8.5" fill="#7a5aa8" text-anchor="middle">释放 EState</text>
  <line x1="228" y1="141" x2="238" y2="141" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="418" y1="141" x2="428" y2="141" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- 关键结构 -->
  <rect x="650" y="56" width="340" height="150" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="668" y="80" font-size="12" font-weight="600" fill="#1b2a4a">关键运行时结构</text>
  <text x="668" y="104" font-size="9.5" fill="#5b7db1">· EState：本次执行的全局状态</text>
  <text x="668" y="126" font-size="9.5" fill="#5b7db1">· PlanState 树：每 plan node 一个运行态</text>
  <text x="668" y="148" font-size="9.5" fill="#5b7db1">· TupleTableSlot：行在算子间传递的载体</text>
  <text x="668" y="170" font-size="9.5" fill="#5b7db1">· ExprState：表达式求值（可 JIT 编译）</text>
  <text x="668" y="192" font-size="8.5" fill="#8fa9cf">plan（不可变）与 PlanState（可变运行态）分离</text>

  <!-- 并行 -->
  <rect x="30" y="222" width="960" height="180" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="48" y="246" font-size="12.5" font-weight="600" fill="#0f5132">并行查询：Gather + 并行 worker（nodeGather.c）</text>
  <rect x="380" y="262" width="260" height="40" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="510" y="286" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">Gather / GatherMerge（leader）</text>
  <rect x="90" y="330" width="200" height="46" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="190" y="352" font-size="9" fill="#0f5132" text-anchor="middle">parallel worker #1</text><text x="190" y="368" font-size="8" fill="#3f8f66" text-anchor="middle">扫一部分块</text>
  <rect x="410" y="330" width="200" height="46" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="510" y="352" font-size="9" fill="#0f5132" text-anchor="middle">parallel worker #2</text>
  <rect x="730" y="330" width="200" height="46" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="830" y="352" font-size="9" fill="#0f5132" text-anchor="middle">leader 也参与</text>
  <line x1="440" y1="302" x2="190" y2="330" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="510" y1="302" x2="510" y2="330" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="580" y1="302" x2="830" y2="330" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="48" y="286" font-size="9" fill="#3f8f66">worker 是 postmaster fork 的进程，经共享内存 tuple queue 把结果传回 leader 汇聚</text>
  <text x="48" y="396" font-size="9" fill="#5aa06f">受 max_parallel_workers_per_gather 控制；并行扫描/Join/聚合分摊 CPU，缓解 volcano 逐行开销</text>
</svg>
