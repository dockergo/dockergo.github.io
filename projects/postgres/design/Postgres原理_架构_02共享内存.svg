<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="420" viewBox="0 0 1020 420"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="420" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">共享内存 vs 私有内存 · 进程协作区（storage/ipc/、storage/buffer/）</text>

  <!-- 共享内存 -->
  <rect x="30" y="56" width="600" height="300" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="48" y="80" font-size="12.5" font-weight="600" fill="#0f5132">共享内存（所有进程 attach，启动时分配）</text>
  <rect x="48" y="96" width="564" height="60" rx="10" fill="#ffffff" stroke="#bce6cd"/><text x="330" y="118" font-size="10.5" font-weight="600" fill="#0f5132" text-anchor="middle">shared_buffers · 缓冲池（最大块）</text><text x="330" y="138" font-size="9" fill="#3f8f66" text-anchor="middle">缓存 8KB 数据页；所有 backend 共享，命中免读盘</text>
  <rect x="48" y="164" width="270" height="56" rx="10" fill="#ffffff" stroke="#bce6cd"/><text x="183" y="186" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">WAL buffers</text><text x="183" y="204" font-size="8.5" fill="#3f8f66" text-anchor="middle">WAL 落盘前的内存缓冲</text>
  <rect x="342" y="164" width="270" height="56" rx="10" fill="#ffffff" stroke="#bce6cd"/><text x="477" y="186" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">锁表 lock table</text><text x="477" y="204" font-size="8.5" fill="#3f8f66" text-anchor="middle">heavyweight 锁的全局状态</text>
  <rect x="48" y="228" width="270" height="56" rx="10" fill="#ffffff" stroke="#bce6cd"/><text x="183" y="250" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">ProcArray</text><text x="183" y="268" font-size="8.5" fill="#3f8f66" text-anchor="middle">所有活跃事务 → 算快照</text>
  <rect x="342" y="228" width="270" height="56" rx="10" fill="#ffffff" stroke="#bce6cd"/><text x="477" y="250" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">CLOG / 共享缓存失效队列</text><text x="477" y="268" font-size="8.5" fill="#3f8f66" text-anchor="middle">事务状态 / catalog 失效广播</text>
  <text x="48" y="308" font-size="9.5" fill="#3f8f66">访问用 LWLock 保护（轻量读写锁），高频短临界区</text>
  <text x="48" y="328" font-size="9" fill="#5aa06f">大小由 shared_buffers 等参数在启动时定；改需重启</text>

  <!-- 私有内存 -->
  <rect x="650" y="56" width="340" height="300" rx="14" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="668" y="80" font-size="12.5" font-weight="600" fill="#3c1361">每 backend 私有内存</text>
  <rect x="668" y="96" width="304" height="56" rx="10" fill="#ffffff" stroke="#d9c9ef"/><text x="820" y="118" font-size="10" font-weight="600" fill="#3c1361" text-anchor="middle">work_mem</text><text x="820" y="136" font-size="8.5" fill="#7a5aa8" text-anchor="middle">排序/Hash 每节点各一份</text>
  <rect x="668" y="160" width="304" height="56" rx="10" fill="#ffffff" stroke="#d9c9ef"/><text x="820" y="182" font-size="10" font-weight="600" fill="#3c1361" text-anchor="middle">maintenance_work_mem</text><text x="820" y="200" font-size="8.5" fill="#7a5aa8" text-anchor="middle">VACUUM/建索引用</text>
  <rect x="668" y="224" width="304" height="56" rx="10" fill="#ffffff" stroke="#d9c9ef"/><text x="820" y="246" font-size="10" font-weight="600" fill="#3c1361" text-anchor="middle">relcache / syscache</text><text x="820" y="264" font-size="8.5" fill="#7a5aa8" text-anchor="middle">该连接的目录缓存</text>
  <rect x="668" y="288" width="304" height="56" rx="10" fill="#fdfdf5" stroke="#d9c9ef"/><text x="820" y="310" font-size="9" fill="#7a5aa8" text-anchor="middle">危险：work_mem × 并发 × 节点数</text><text x="820" y="328" font-size="8.5" fill="#a58fc9" text-anchor="middle">可能远超物理内存 → OOM</text>

  <line x1="630" y1="130" x2="650" y2="130" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="632" y="122" font-size="8" fill="#86868b">对比</text>
</svg>
