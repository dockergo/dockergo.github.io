<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="880" viewBox="0 0 1020 880" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="aHot" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#0a84ff"/></marker>
    <marker id="aCtl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#7c5fe6"/></marker>
    <marker id="aState" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#0f9e8e"/></marker>
    <marker id="aFail" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#e8730f"/></marker>
  </defs>

  <rect width="1020" height="880" fill="#fbfbfd"/>

  <!-- ===== 标题条 ===== -->
  <rect x="0" y="0" width="1020" height="48" fill="#f4f5f7" stroke="#e6e6eb"/>
  <text x="24" y="30" font-size="15" font-weight="700" fill="#1d1d1f">PostgreSQL 总架构 · 进程级关系数据库内核</text>
  <text x="360" y="30" font-size="11.5" fill="#8a8a90">postmaster 每连接 fork 一 backend · 共享内存协调 · MVCC 多版本 · WAL 先写日志 · 代价优化 + 火山执行</text>

  <!-- ===== ① 顶部 SQL 接触面 ===== -->
  <rect x="24" y="62" width="120" height="48" rx="10" fill="#eef0f3" stroke="#d2d6dd" filter="url(#soft)"/>
  
  <text x="42" y="83" font-size="11" font-weight="700" fill="#1d1d1f">client</text>
  <text x="42" y="100" font-size="8.5" fill="#8a8a90">libpq 连接</text>

  <rect x="156" y="62" width="205" height="48" rx="10" fill="#e9f2ff" stroke="#a9ccf5" filter="url(#soft)" data-tid="Postgres原理_DQL数据查询"/>
  
  <text x="174" y="82" font-size="11" font-weight="700" fill="#0a3d78">DQL · 查询</text>
  <text x="174" y="100" font-size="8.5" fill="#4a7ab0">SELECT · 火山拉取读路径</text>

  <rect x="369" y="62" width="205" height="48" rx="10" fill="#e9f2ff" stroke="#a9ccf5" filter="url(#soft)" data-tid="Postgres原理_DML数据写入"/>
  
  <text x="387" y="82" font-size="11" font-weight="700" fill="#0a3d78">DML · 写入</text>
  <text x="387" y="100" font-size="8.5" fill="#4a7ab0">INSERT/UPDATE/DELETE 走 WAL</text>

  <rect x="582" y="62" width="200" height="48" rx="10" fill="#eef0f3" stroke="#d2d6dd" filter="url(#soft)" data-tid="Postgres原理_DDL数据定义"/>
  
  <text x="600" y="82" font-size="11" font-weight="700" fill="#1d1d1f">DDL · 定义</text>
  <text x="600" y="100" font-size="8.5" fill="#8a8a90">CREATE · 系统目录 pg_catalog</text>

  <rect x="790" y="62" width="206" height="48" rx="10" fill="#eef0f3" stroke="#d2d6dd" filter="url(#soft)" data-tid="Postgres原理_DCL数据控制"/>
  
  <text x="808" y="82" font-size="11" font-weight="700" fill="#1d1d1f">DCL · 控制</text>
  <text x="808" y="100" font-size="8.5" fill="#8a8a90">GRANT · 认证 / RBAC / RLS</text>

  <!-- ===== ② 左 Control 栏：进程模型 + 优化器 ===== -->
  <rect x="24" y="128" width="175" height="330" rx="12" fill="#eef0f3" stroke="#d2d6dd" filter="url(#soft)" data-tid="Postgres原理_支撑_进程与内存架构"/>
  
  <text x="42" y="150" font-size="11" font-weight="700" fill="#1d1d1f">进程模型 · postmaster</text>
  <text x="40" y="170" font-size="9" fill="#5b6470">PostmasterMain</text>
  <text x="40" y="185" font-size="9" fill="#5b6470">ServerLoop 等连接</text>
  <text x="40" y="200" font-size="9" fill="#5b6470">每连接 fork backend</text>
  <text x="40" y="222" font-size="9" font-weight="600" fill="#33373e">后台辅助进程群：</text>
  <text x="40" y="240" font-size="8.5" fill="#5b6470">checkpointer 周期刷脏</text>
  <text x="40" y="256" font-size="8.5" fill="#5b6470">bgwriter 平滑预刷</text>
  <text x="40" y="272" font-size="8.5" fill="#5b6470">walwriter 异步刷 WAL</text>
  <text x="40" y="288" font-size="8.5" fill="#5b6470">startup 崩溃恢复回放</text>
  <text x="40" y="304" font-size="8.5" fill="#5b6470">autovacuum 回收膨胀</text>
  <text x="40" y="320" font-size="8.5" fill="#5b6470">walsender 主库发流</text>
  <text x="40" y="344" font-size="8.5" fill="#8a8a90">后端崩溃被进程边界隔离</text>
  <text x="40" y="360" font-size="8.5" fill="#8a8a90">→ 稳健 vs fork 连接开销</text>
  <text x="40" y="382" font-size="8" fill="#a1a1a6">fork-per-connection</text>
  <text x="40" y="438" font-size="9.5" fill="#7c5fe6" font-weight="600">Control</text>

  <rect x="24" y="470" width="175" height="140" rx="12" fill="#eef0f3" stroke="#d2d6dd" filter="url(#soft)" data-tid="Postgres原理_支撑_查询优化器"/>
  
  <text x="42" y="492" font-size="11" font-weight="700" fill="#1d1d1f">代价优化器</text>
  <text x="40" y="512" font-size="9" fill="#5b6470">standard_planner</text>
  <text x="40" y="528" font-size="9" fill="#5b6470">make_one_rel 生成路径</text>
  <text x="40" y="544" font-size="9" fill="#5b6470">DP standard_join_search</text>
  <text x="40" y="560" font-size="9" fill="#5b6470">表多 → GEQO 遗传搜索</text>
  <text x="40" y="576" font-size="9" fill="#5b6470">costsize 估 startup+total</text>
  <text x="40" y="596" font-size="8" fill="#8a8a90">枚举等价 path 取最便宜</text>

  <!-- ===== ③ 中央 backend 进程框 ===== -->
  <rect x="214" y="128" width="560" height="484" rx="16" fill="#ffffff" stroke="#d0d0d6" filter="url(#soft)"/>
  <text x="234" y="150" font-size="12" font-weight="700" fill="#1d1d1f">backend 进程 · 每连接 fork · PostgresMain 主循环</text>

  <!-- 解析 parse -->
  <rect x="234" y="162" width="520" height="52" rx="9" fill="#eef0f3" stroke="#d2d6dd"/>
  
  <text x="254" y="182" font-size="10.5" font-weight="700" fill="#1d1d1f">① 解析 · 语义分析 · 规则重写</text>
  <text x="254" y="200" font-size="8.5" fill="#8a8a90">exec_simple_query · raw_parser → transformStmt → QueryRewrite</text>

  <!-- 执行器 火山（Hot 中心） -->
  <rect x="234" y="228" width="520" height="64" rx="10" fill="#e9f2ff" stroke="#a9ccf5" filter="url(#soft)" data-tid="Postgres原理_支撑_执行引擎"/>
  
  <text x="254" y="249" font-size="11" font-weight="700" fill="#0a3d78">② 执行器 · Volcano 火山拉取模型</text>
  <text x="254" y="267" font-size="9" fill="#2a5a92">ExecutorRun → ExecProcNode 逐节点一次一元组自顶向下拉</text>
  <text x="254" y="283" font-size="8.5" fill="#4a7ab0">SeqScan/IndexScan/NestLoop/HashJoin/Sort/Agg 统一接口任意拼装</text>
  <text x="736" y="249" font-size="9.5" fill="#0a84ff" text-anchor="end" font-weight="600">Hot Path</text>

  <!-- 存储引擎（State） -->
  <rect x="234" y="304" width="253" height="138" rx="10" fill="#e6f4f1" stroke="#b9dfd8" filter="url(#soft)" data-tid="Postgres原理_支撑_存储引擎"/>
  
  <text x="254" y="325" font-size="10.5" font-weight="700" fill="#0f6b5e">③ 存储引擎 · 缓冲池 + 堆页</text>
  <text x="252" y="345" font-size="9" fill="#2f6f5f">ReadBuffer 命中共享缓冲</text>
  <text x="252" y="361" font-size="9" fill="#2f6f5f">未命中读盘 · clock-sweep 淘汰</text>
  <text x="252" y="377" font-size="9" fill="#2f6f5f">PageInit 行指针↓ + 元组↑ 生长</text>
  <text x="252" y="393" font-size="9" fill="#2f6f5f">heap_insert / heap_update</text>
  <text x="252" y="414" font-size="8.5" fill="#4c8567">所有数据页必过缓冲池(共享内存)</text>
  <text x="252" y="430" font-size="8" fill="#7fae9f">脏页由 checkpointer/bgwriter 回刷</text>

  <!-- 索引方法（State） -->
  <rect x="501" y="304" width="253" height="138" rx="10" fill="#e6f4f1" stroke="#b9dfd8" filter="url(#soft)" data-tid="Postgres原理_支撑_索引方法"/>
  
  <text x="521" y="325" font-size="10.5" font-weight="700" fill="#0f6b5e">④ 索引访问方法 (AM)</text>
  <text x="519" y="345" font-size="9" fill="#2f6f5f">index_open/insert/beginscan</text>
  <text x="519" y="361" font-size="9" fill="#2f6f5f">index_getnext_tid 返回 TID</text>
  <text x="519" y="377" font-size="9" fill="#2f6f5f">B-tree bthandler / btgettuple</text>
  <text x="519" y="393" font-size="9" fill="#2f6f5f">hash/gist/gin/brin 同组回调</text>
  <text x="519" y="414" font-size="8.5" fill="#4c8567">索引给 TID → 回堆取元组</text>
  <text x="519" y="430" font-size="8" fill="#7fae9f">再走 MVCC 可见性判断</text>

  <!-- 事务与 MVCC（State · 核心张力） -->
  <rect x="234" y="454" width="253" height="146" rx="10" fill="#e6f4f1" stroke="#b9dfd8" filter="url(#soft)" data-tid="Postgres原理_支撑_事务与MVCC"/>
  
  <text x="254" y="475" font-size="10.5" font-weight="700" fill="#0f6b5e">⑤ 事务与 MVCC 多版本</text>
  <text x="252" y="495" font-size="9" fill="#2f6f5f">HeapTupleSatisfiesMVCC</text>
  <text x="252" y="511" font-size="9" fill="#2f6f5f">按快照比对 xmin/xmax 判可见</text>
  <text x="252" y="527" font-size="9" fill="#2f6f5f">GetSnapshotData 扫 ProcArray</text>
  <text x="252" y="543" font-size="9" fill="#2f6f5f">删除只置 xmax · 不物理删</text>
  <text x="252" y="559" font-size="9" fill="#2f6f5f">HOT 更新同页减索引膨胀</text>
  <text x="252" y="580" font-size="8.5" fill="#c0392b" font-weight="600">读走快照不加锁 → 读不阻塞写</text>
  <text x="252" y="594" font-size="8" fill="#d0755a">代价：死元组累积成 bloat</text>

  <!-- 并发控制与锁（Control/Failure） -->
  <rect x="501" y="454" width="253" height="146" rx="10" fill="#eef0f3" stroke="#d2d6dd" filter="url(#soft)" data-tid="Postgres原理_支撑_并发控制与锁"/>
  
  <text x="521" y="475" font-size="10.5" font-weight="700" fill="#1d1d1f">⑥ 并发控制与锁</text>
  <text x="519" y="495" font-size="9" fill="#5b6470">LockAcquire 表/行/咨询锁</text>
  <text x="519" y="511" font-size="9" fill="#5b6470">冲突矩阵 ACCESS SHARE..EXCL</text>
  <text x="519" y="527" font-size="9" fill="#5b6470">WaitOnLock → ProcSleep</text>
  <text x="519" y="543" font-size="9" fill="#5b6470">LWLock 保护共享内存结构</text>
  <text x="519" y="564" font-size="8.5" fill="#a8641e">死锁不预防：超时 1s 后检测</text>
  <text x="519" y="580" font-size="9" fill="#b5793a">DeadLockCheck 等待图找环破环</text>

  <!-- ===== ④ 右 State 栏：共享内存 + CLOG + 流复制 ===== -->
  <rect x="784" y="128" width="212" height="210" rx="12" fill="#e6f4f1" stroke="#b9dfd8" filter="url(#soft)" data-tid="Postgres原理_支撑_进程与内存架构"/>
  
  <text x="804" y="150" font-size="11" font-weight="700" fill="#0f6b5e">共享内存核心</text>
  <text x="802" y="171" font-size="9" fill="#2f6f5f">CreateSharedMemoryAnd-</text>
  <text x="802" y="185" font-size="9" fill="#2f6f5f">Semaphores</text>
  <text x="802" y="207" font-size="9" fill="#2f6f5f">· 共享缓冲池 shared_buffers</text>
  <text x="802" y="223" font-size="9" fill="#2f6f5f">· WAL buffer</text>
  <text x="802" y="239" font-size="9" fill="#2f6f5f">· 锁表 LockTable</text>
  <text x="802" y="255" font-size="9" fill="#2f6f5f">· ProcArray 活跃事务</text>
  <text x="802" y="278" font-size="8.5" fill="#4c8567">fork 前建好 · fork 后继承</text>
  <text x="802" y="294" font-size="8.5" fill="#4c8567">跨后端可见性/锁/缓冲一致靠它</text>
  <text x="802" y="316" font-size="8" fill="#7fae9f">进程模型(非线程)的协调基座</text>
  <text x="976" y="332" font-size="9.5" fill="#0f9e8e" text-anchor="end" font-weight="600">State</text>

  <rect x="784" y="352" width="212" height="104" rx="12" fill="#fdf2ea" stroke="#f0cdaa" filter="url(#soft)"/>
  
  <text x="804" y="374" font-size="10.5" font-weight="700" fill="#8a4a12">事务提交 · CLOG</text>
  <text x="802" y="394" font-size="9" fill="#a8641e">CommitTransaction</text>
  <text x="802" y="410" font-size="9" fill="#a8641e">RecordTransactionCommit 写 WAL</text>
  <text x="802" y="426" font-size="9" fill="#a8641e">CLOG 标 xid committed/aborted</text>
  <text x="802" y="446" font-size="8" fill="#b5793a">原子锚点 = WAL 落盘 + CLOG 置位</text>

  <rect x="784" y="470" width="212" height="126" rx="12" fill="#fdf2ea" stroke="#f0cdaa" filter="url(#soft)" data-tid="Postgres原理_支撑_WAL与恢复复制"/>
  
  <text x="804" y="492" font-size="10.5" font-weight="700" fill="#8a4a12">流复制 · 主备</text>
  <text x="802" y="512" font-size="9" fill="#a8641e">walsender 主库发流</text>
  <text x="802" y="528" font-size="9" fill="#a8641e">walreceiver 备库收 WAL</text>
  <text x="802" y="544" font-size="9" fill="#a8641e">物理 / 逻辑复制</text>
  <text x="802" y="564" font-size="8.5" fill="#b5793a">备库回放 WAL 追主库</text>

  <!-- ===== ⑤ 底部 WAL 持久化带（Failure）+ PGDATA ===== -->
  <rect x="24" y="624" width="175" height="84" rx="11" fill="#eef0f3" stroke="#d2d6dd"/>
  <text x="42" y="646" font-size="10.5" font-weight="700" fill="#33373e">PGDATA · 磁盘</text>
  <text x="40" y="666" font-size="9" fill="#8a8a90">堆文件 + 索引 + WAL 段</text>
  <text x="40" y="684" font-size="9" fill="#8a8a90">自管单机存储</text>
  <text x="40" y="700" font-size="8" fill="#a1a1a6">数据落地的最终介质</text>

  <rect x="214" y="624" width="560" height="84" rx="11" fill="#fdf2ea" stroke="#f0cdaa" filter="url(#soft)" data-tid="Postgres原理_支撑_WAL与恢复复制"/>
  
  <text x="234" y="646" font-size="11" font-weight="700" fill="#8a4a12">⑦ WAL 预写日志 · 崩溃恢复（durability）</text>
  <text x="234" y="666" font-size="9" fill="#a8641e">铁律「先写日志后写数据」 · XLogInsertRecord 返回 LSN</text>
  <text x="234" y="682" font-size="9" fill="#a8641e">刷脏页前 XLogFlush 强制 WAL 先落盘 · commit fsync 才算持久</text>
  <text x="234" y="698" font-size="8.5" fill="#b5793a">CreateCheckPoint 建一致点截断 WAL · 崩溃 StartupXLOG 回放</text>
  <text x="756" y="646" font-size="9.5" fill="#e8730f" text-anchor="end" font-weight="600">Failure Path</text>

  <!-- ===================== 连线 五路径 ===================== -->
  <!-- Hot 主脊：SQL 接触面 → 解析 → 执行器 → 存储/索引 → MVCC -->
  <g stroke="#0a84ff" stroke-width="2.2" fill="none">
    <line x1="258" y1="110" x2="300" y2="160" marker-end="url(#aHot)"/>
    <line x1="471" y1="110" x2="440" y2="160" marker-end="url(#aHot)"/>
    <line x1="360" y1="214" x2="360" y2="226" marker-end="url(#aHot)"/>
    <line x1="360" y1="292" x2="360" y2="302" marker-end="url(#aHot)"/>
    <line x1="600" y1="292" x2="600" y2="302" marker-end="url(#aHot)"/>
    <line x1="360" y1="442" x2="360" y2="452" marker-end="url(#aHot)"/>
  </g>
  <text x="368" y="450" font-size="8" font-weight="600" fill="#0a84ff">取元组</text>

  <!-- 索引 → 堆（回表，Hot 细） -->
  <line x1="499" y1="373" x2="489" y2="373" stroke="#0a84ff" stroke-width="1.6" fill="none" marker-end="url(#aHot)"/>

  <!-- Control 紫虚：postmaster fork → backend框；优化器 → 执行器 -->
  <g stroke="#7c5fe6" stroke-width="1.6" stroke-dasharray="6 4" fill="none">
    <path d="M199,180 L214,180" marker-end="url(#aCtl)"/>
    <path d="M199,520 L234,265" marker-end="url(#aCtl)"/>
  </g>
  <text x="150" y="120" font-size="8" fill="#7c5fe6">fork backend</text>
  <text x="150" y="462" font-size="8" fill="#7c5fe6">plan 喂执行器</text>

  <!-- State 青：存储引擎 ↔ 共享内存；共享内存 → MVCC 快照 -->
  <g stroke="#0f9e8e" stroke-width="1.6" fill="none">
    <line x1="487" y1="360" x2="782" y2="230" marker-end="url(#aState)"/>
    <path d="M784,300 L487,530" marker-end="url(#aState)"/>
  </g>
  <text x="640" y="285" font-size="8" fill="#0f9e8e">缓冲池在共享内存</text>
  <text x="600" y="470" font-size="8" fill="#0f9e8e">ProcArray 供快照</text>

  <!-- Failure 橙虚：存储/事务 → WAL 带；WAL 带 → CLOG/流复制；WAL → PGDATA -->
  <g stroke="#e8730f" stroke-width="1.6" stroke-dasharray="3 3" fill="none">
    <path d="M300,600 L300,622" marker-end="url(#aFail)"/>
    <path d="M600,600 L560,622" marker-end="url(#aFail)"/>
    <path d="M774,660 L830,600 L860,458" marker-end="url(#aFail)"/>
    <path d="M860,456 L860,352" stroke-dasharray="3 3" marker-end="url(#aFail)"/>
  </g>
  <text x="305" y="618" font-size="8" fill="#e8730f">先写日志</text>
  <text x="666" y="618" font-size="8" fill="#e8730f">commit 落盘</text>

  <!-- WAL → PGDATA fsync -->
  <line x1="214" y1="672" x2="201" y2="672" stroke="#e8730f" stroke-width="1.6" stroke-dasharray="3 3" fill="none" marker-end="url(#aFail)"/>

  <!-- Opt 灰点：MVCC 死元组 → autovacuum 回收（张力闭环） -->
  <path d="M240,590 L212,590 L212,300 L120,300" stroke="#c7c7cc" stroke-width="1.5" stroke-dasharray="1.5 3" fill="none" marker-end="url(#aState)"/>
  <text x="120" y="620" font-size="8" fill="#9a9aa0" text-anchor="start">死元组 → autovacuum 回收(左栏后台进程)</text>

  <!-- ===== 底部 铭牌：设计张力 + 五路径图例 ===== -->
  <rect x="214" y="724" width="782" height="60" rx="11" fill="#f4f5f7" stroke="#e6e6eb"/>
  <text x="234" y="746" font-size="10.5" font-weight="700" fill="#1d1d1f">核心设计张力 · MVCC 无锁读（读不阻塞写）vs 死元组膨胀（须 autovacuum 回收）</text>
  <text x="234" y="766" font-size="9" fill="#5b6470">旧版本原地保留保证快照读 → 读写不互斥；代价是 bloat + 后台清理。并存：WAL commit fsync 持久 vs 写吞吐；fork 进程隔离稳健 vs 连接开销(接连接池)。</text>

  <g font-size="9.5" fill="#5b6470">
    <line x1="24" y1="736" x2="50" y2="736" stroke="#0a84ff" stroke-width="2.2"/><text x="56" y="739">Hot 查询/写主脊</text>
    <line x1="24" y1="754" x2="50" y2="754" stroke="#0f9e8e" stroke-width="1.6"/><text x="56" y="757">State 缓冲/多版本</text>
    <line x1="24" y1="772" x2="50" y2="772" stroke="#7c5fe6" stroke-width="1.6" stroke-dasharray="6 4"/><text x="56" y="775">Control 进程/优化</text>
    <line x1="24" y1="790" x2="50" y2="790" stroke="#e8730f" stroke-width="1.6" stroke-dasharray="3 3"/><text x="56" y="793">Failure WAL/锁/恢复</text>
  </g>
</svg>
