<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="430" viewBox="0 0 1020 430"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="430" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">崩溃恢复与流复制 · 同一份 WAL 两种用途（access/transam、replication/）</text>

  <!-- 崩溃恢复 -->
  <rect x="30" y="56" width="470" height="200" rx="14" fill="#fbeaea" stroke="#f0cccc" filter="url(#soft)"/>
  <text x="48" y="80" font-size="12.5" font-weight="600" fill="#7d1f1f">崩溃恢复（startup 进程回放）</text>
  <rect x="48" y="96" width="434" height="44" rx="9" fill="#ffffff" stroke="#f0cccc"/><text x="64" y="116" font-size="9.5" font-weight="600" fill="#7d1f1f">① 从最近 checkpoint 的 redo 点开始</text><text x="64" y="132" font-size="8.5" fill="#b06a6a">该点前的改动已在数据文件里</text>
  <rect x="48" y="148" width="434" height="44" rx="9" fill="#ffffff" stroke="#f0cccc"/><text x="64" y="168" font-size="9.5" font-weight="600" fill="#7d1f1f">② 顺序重放 WAL 记录（REDO）</text><text x="64" y="184" font-size="8.5" fill="#b06a6a">把每条改动重新应用到页上</text>
  <rect x="48" y="200" width="434" height="44" rx="9" fill="#fdf2f2" stroke="#f0cccc"/><text x="64" y="220" font-size="9.5" font-weight="600" fill="#7d1f1f">③ 恢复到崩溃前最后已提交状态</text><text x="64" y="236" font-size="8.5" fill="#b06a6a">未提交事务的改动被忽略/回滚</text>

  <!-- 流复制 -->
  <rect x="520" y="56" width="470" height="200" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="538" y="80" font-size="12.5" font-weight="600" fill="#0f5132">流复制（把 WAL 发给备库）</text>
  <rect x="538" y="96" width="200" height="60" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="638" y="120" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">主库 walsender</text><text x="638" y="140" font-size="8.5" fill="#3f8f66" text-anchor="middle">持续发 WAL 流</text>
  <rect x="770" y="96" width="200" height="60" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="870" y="120" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">备库 walreceiver</text><text x="870" y="140" font-size="8.5" fill="#3f8f66" text-anchor="middle">收 WAL 交 startup 回放</text>
  <line x1="738" y1="126" x2="770" y2="126" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <rect x="538" y="166" width="432" height="34" rx="8" fill="#ffffff" stroke="#bce6cd"/><text x="754" y="187" font-size="9" fill="#0f5132" text-anchor="middle">备库持续回放 WAL → 与主库准实时一致</text>
  <rect x="538" y="208" width="432" height="36" rx="8" fill="#fdfdf5" stroke="#bce6cd"/><text x="754" y="230" font-size="8.5" fill="#3f8f66" text-anchor="middle">同步/异步可选；备库可只读查询（读扩展）；主故障时提升备库</text>

  <!-- 关键洞见 -->
  <rect x="30" y="272" width="960" height="150" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="296" font-size="12.5" font-weight="600" fill="#1d1d1f">关键洞见：WAL 是"改动的权威流水"，一份多用</text>
  <rect x="48" y="312" width="220" height="90" rx="10" fill="#fbeaea" stroke="#f0cccc"/><text x="158" y="336" font-size="10" font-weight="600" fill="#7d1f1f" text-anchor="middle">崩溃恢复</text><text x="158" y="356" font-size="8.5" fill="#b06a6a" text-anchor="middle">本机重放到一致</text><text x="158" y="374" font-size="8.5" fill="#b06a6a" text-anchor="middle">持久性保证</text>
  <rect x="284" y="312" width="220" height="90" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="394" y="336" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">物理复制</text><text x="394" y="356" font-size="8.5" fill="#3f8f66" text-anchor="middle">发字节级 WAL 给备库</text><text x="394" y="374" font-size="8.5" fill="#3f8f66" text-anchor="middle">高可用 + 读扩展</text>
  <rect x="520" y="312" width="220" height="90" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="630" y="336" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">逻辑复制</text><text x="630" y="356" font-size="8.5" fill="#5b7db1" text-anchor="middle">解码 WAL 成行变更</text><text x="630" y="374" font-size="8.5" fill="#5b7db1" text-anchor="middle">选择性/跨版本同步</text>
  <rect x="756" y="312" width="214" height="90" rx="10" fill="#fff7e6" stroke="#f0dcae"/><text x="863" y="336" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">时间点恢复 PITR</text><text x="863" y="356" font-size="8.5" fill="#9a7328" text-anchor="middle">基础备份 + 归档 WAL</text><text x="863" y="374" font-size="8.5" fill="#9a7328" text-anchor="middle">恢复到任意时刻</text>
</svg>
