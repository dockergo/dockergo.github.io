<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="440" viewBox="0 0 1020 440"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">索引访问方法 · 统一 AM 抽象下的六种索引（access/{nbtree,hash,gist,gin,brin,spgist}）</text>

  <!-- AM 抽象 -->
  <rect x="30" y="56" width="960" height="70" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="48" y="80" font-size="12" font-weight="600" fill="#1b2a4a">Index Access Method 抽象（pg_am）：所有索引实现同一组回调</text>
  <text x="48" y="102" font-size="9.5" fill="#5b7db1">aminsert / ambeginscan / amgettuple / amvacuumcleanup … —— 执行器与优化器只对接口编程，索引类型可插拔（含扩展索引）</text>
  <text x="48" y="118" font-size="8.5" fill="#8fa9cf">这与"存储表访问方法(table AM)"对称，是 PostgreSQL 可扩展性的体现</text>

  <!-- 六种 -->
  <rect x="30" y="142" width="300" height="130" rx="12" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="180" y="166" font-size="11" font-weight="600" fill="#0f5132" text-anchor="middle">B-tree（默认）</text>
  <text x="180" y="188" font-size="9" fill="#3f8f66" text-anchor="middle">有序键：等值 + 范围 + 排序</text>
  <text x="180" y="208" font-size="9" fill="#3f8f66" text-anchor="middle">最通用，支撑 ORDER BY / 唯一约束</text>
  <text x="180" y="230" font-size="9" fill="#3f8f66" text-anchor="middle">平衡多路树、页分裂</text>
  <text x="180" y="252" font-size="8.5" fill="#5aa06f" text-anchor="middle">nbtree</text>

  <rect x="360" y="142" width="300" height="130" rx="12" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="510" y="166" font-size="11" font-weight="600" fill="#3c1361" text-anchor="middle">GIN</text>
  <text x="510" y="188" font-size="9" fill="#7a5aa8" text-anchor="middle">倒排：一个值→多个 key</text>
  <text x="510" y="208" font-size="9" fill="#7a5aa8" text-anchor="middle">jsonb / 数组 / 全文检索</text>
  <text x="510" y="230" font-size="9" fill="#7a5aa8" text-anchor="middle">"包含"查询利器</text>
  <text x="510" y="252" font-size="8.5" fill="#a58fc9" text-anchor="middle">gin</text>

  <rect x="690" y="142" width="300" height="130" rx="12" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="840" y="166" font-size="11" font-weight="600" fill="#7a4d00" text-anchor="middle">GiST / SP-GiST</text>
  <text x="840" y="188" font-size="9" fill="#9a7328" text-anchor="middle">通用平衡/空间划分树</text>
  <text x="840" y="208" font-size="9" fill="#9a7328" text-anchor="middle">几何/范围/最近邻(KNN)</text>
  <text x="840" y="230" font-size="9" fill="#9a7328" text-anchor="middle">PostGIS 等靠它</text>
  <text x="840" y="252" font-size="8.5" fill="#b8912e" text-anchor="middle">gist / spgist</text>

  <rect x="30" y="286" width="300" height="120" rx="12" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="180" y="310" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">BRIN</text>
  <text x="180" y="332" font-size="9" fill="#5b7db1" text-anchor="middle">块范围索引：每段存 min/max</text>
  <text x="180" y="352" font-size="9" fill="#5b7db1" text-anchor="middle">超大且物理有序的表（时序）</text>
  <text x="180" y="372" font-size="9" fill="#5b7db1" text-anchor="middle">极小体积、粗粒度裁剪</text>
  <text x="180" y="392" font-size="8.5" fill="#8fa9cf" text-anchor="middle">brin</text>

  <rect x="360" y="286" width="300" height="120" rx="12" fill="#fbeaea" stroke="#f0cccc"/>
  <text x="510" y="310" font-size="11" font-weight="600" fill="#7d1f1f" text-anchor="middle">Hash</text>
  <text x="510" y="332" font-size="9" fill="#b06a6a" text-anchor="middle">仅等值查找</text>
  <text x="510" y="352" font-size="9" fill="#b06a6a" text-anchor="middle">不支持范围/排序</text>
  <text x="510" y="372" font-size="9" fill="#b06a6a" text-anchor="middle">场景窄（多数用 btree）</text>
  <text x="510" y="392" font-size="8.5" fill="#c99" text-anchor="middle">hash</text>

  <rect x="690" y="286" width="300" height="120" rx="12" fill="#f6f6f8" stroke="#e2e2e7"/>
  <text x="840" y="310" font-size="11" font-weight="600" fill="#494950" text-anchor="middle">共性</text>
  <text x="840" y="332" font-size="9" fill="#6a6a70" text-anchor="middle">索引项 → 堆表 TID</text>
  <text x="840" y="352" font-size="9" fill="#6a6a70" text-anchor="middle">需维护（DML 写放大）</text>
  <text x="840" y="372" font-size="9" fill="#6a6a70" text-anchor="middle">VACUUM 清死索引项</text>
  <text x="840" y="392" font-size="8.5" fill="#86868b" text-anchor="middle">可 partial / expression 索引</text>
</svg>
