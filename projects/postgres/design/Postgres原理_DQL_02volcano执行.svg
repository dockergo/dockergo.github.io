<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="440" viewBox="0 0 1020 440"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
    <marker id="arg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#5aa06f"/>
    </marker>
  </defs>
  <rect width="1020" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">volcano / pull 执行模型 · 顶层向下要一行，数据自底向上流（executor/）</text>

  <!-- pull 模型 -->
  <rect x="30" y="56" width="470" height="330" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="80" font-size="12.5" font-weight="600" fill="#1d1d1f">每个 plan node 是一个迭代器（ExecProcNode）</text>

  <rect x="150" y="96" width="220" height="40" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="260" y="121" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">Limit</text>
  <rect x="150" y="164" width="220" height="40" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="260" y="189" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">Aggregate</text>
  <rect x="150" y="232" width="220" height="40" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="260" y="257" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">Join</text>
  <rect x="90" y="300" width="150" height="40" rx="9" fill="#fff7e6" stroke="#f0dcae"/><text x="165" y="325" font-size="9.5" font-weight="600" fill="#7a4d00" text-anchor="middle">Scan users</text>
  <rect x="280" y="300" width="150" height="40" rx="9" fill="#fff7e6" stroke="#f0dcae"/><text x="355" y="325" font-size="9.5" font-weight="600" fill="#7a4d00" text-anchor="middle">Scan orders</text>

  <!-- pull down 箭头 (dashed grey) -->
  <line x1="245" y1="136" x2="245" y2="164" stroke="#c7c7cc" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#ar)"/>
  <line x1="245" y1="204" x2="245" y2="232" stroke="#c7c7cc" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#ar)"/>
  <line x1="230" y1="272" x2="180" y2="300" stroke="#c7c7cc" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#ar)"/>
  <line x1="290" y1="272" x2="340" y2="300" stroke="#c7c7cc" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#ar)"/>
  <text x="255" y="152" font-size="8" fill="#86868b">要一行↓</text>

  <!-- push up 箭头 (green solid) -->
  <line x1="180" y1="300" x2="228" y2="272" stroke="#5aa06f" stroke-width="1.4" marker-end="url(#arg)"/>
  <line x1="340" y1="300" x2="292" y2="272" stroke="#5aa06f" stroke-width="1.4" marker-end="url(#arg)"/>
  <line x1="275" y1="232" x2="275" y2="204" stroke="#5aa06f" stroke-width="1.4" marker-end="url(#arg)"/>
  <line x1="275" y1="164" x2="275" y2="136" stroke="#5aa06f" stroke-width="1.4" marker-end="url(#arg)"/>
  <text x="285" y="222" font-size="8" fill="#0f5132">返回一行↑</text>
  <text x="48" y="366" font-size="9" fill="#86868b">虚线=向下 pull 请求；绿线=返回一个 tuple。一次一行（tuple-at-a-time）。</text>

  <!-- 对照 push -->
  <rect x="520" y="56" width="470" height="330" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="538" y="80" font-size="12.5" font-weight="600" fill="#1b2a4a">volcano 模型的性质</text>
  <rect x="538" y="96" width="434" height="60" rx="10" fill="#ffffff" stroke="#bcd0ec"/><text x="554" y="118" font-size="10" font-weight="600" fill="#1b2a4a">统一迭代器接口</text><text x="554" y="138" font-size="9" fill="#5b7db1">每 node 实现 Init/Proc/End；组合任意算子树，实现简洁通用</text>
  <rect x="538" y="164" width="434" height="60" rx="10" fill="#ffffff" stroke="#bcd0ec"/><text x="554" y="186" font-size="10" font-weight="600" fill="#1b2a4a">按需拉取、天然流水线</text><text x="554" y="206" font-size="9" fill="#5b7db1">LIMIT 拿够就停，上游不必算完全部——省功</text>
  <rect x="538" y="232" width="434" height="60" rx="10" fill="#fff7e6" stroke="#f0dcae"/><text x="554" y="254" font-size="10" font-weight="600" fill="#7a4d00">代价：每行每 node 一次函数调用</text><text x="554" y="274" font-size="9" fill="#9a7328">逐行开销大——OLAP 大扫描不如列存向量化（对照 DuckDB push）</text>
  <rect x="538" y="300" width="434" height="72" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="554" y="322" font-size="10" font-weight="600" fill="#0f5132">缓解手段</text><text x="554" y="342" font-size="9" fill="#3f8f66">· JIT 编译表达式（jit/）降解释开销</text><text x="554" y="360" font-size="9" fill="#3f8f66">· 并行查询（Gather + worker）分摊；· Memoize 缓存重复子查询</text>
</svg>
