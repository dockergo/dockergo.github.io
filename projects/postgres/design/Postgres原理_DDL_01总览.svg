<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="430" viewBox="0 0 1020 430"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="430" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">DDL 总览 · 定义对象 = 往系统目录表里增删改行（事务性）</text>

  <rect x="30" y="52" width="230" height="330" rx="14" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="48" y="76" font-size="12" font-weight="600" fill="#3c1361">DDL 语句族</text>
  <rect x="48" y="90" width="194" height="30" rx="7" fill="#ffffff" stroke="#d9c9ef"/><text x="145" y="110" font-size="10" fill="#3c1361" text-anchor="middle">CREATE TABLE / INDEX</text>
  <rect x="48" y="126" width="194" height="30" rx="7" fill="#ffffff" stroke="#d9c9ef"/><text x="145" y="146" font-size="10" fill="#3c1361" text-anchor="middle">CREATE VIEW / SEQUENCE</text>
  <rect x="48" y="162" width="194" height="30" rx="7" fill="#ffffff" stroke="#d9c9ef"/><text x="145" y="182" font-size="10" fill="#3c1361" text-anchor="middle">CREATE SCHEMA / TYPE</text>
  <rect x="48" y="198" width="194" height="30" rx="7" fill="#ffffff" stroke="#d9c9ef"/><text x="145" y="218" font-size="10" fill="#3c1361" text-anchor="middle">CREATE EXTENSION / FUNCTION</text>
  <rect x="48" y="234" width="194" height="30" rx="7" fill="#ffffff" stroke="#d9c9ef"/><text x="145" y="254" font-size="10" fill="#3c1361" text-anchor="middle">ALTER TABLE …</text>
  <rect x="48" y="270" width="194" height="30" rx="7" fill="#ffffff" stroke="#d9c9ef"/><text x="145" y="290" font-size="10" fill="#3c1361" text-anchor="middle">DROP … [CASCADE]</text>
  <text x="48" y="326" font-size="9" fill="#7a5aa8">由 commands/ 各命令处理器实现</text>
  <text x="48" y="344" font-size="9" fill="#7a5aa8">（DefineRelation / AlterTable…）</text>

  <rect x="290" y="52" width="380" height="330" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="308" y="76" font-size="12.5" font-weight="600" fill="#1d1d1f">处理链</text>
  <rect x="308" y="92" width="344" height="48" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="480" y="112" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">解析 + utility 命令分派</text><text x="480" y="130" font-size="9" fill="#5b7db1" text-anchor="middle">ProcessUtility → 各 DDL 处理器</text>
  <rect x="308" y="152" width="344" height="48" rx="10" fill="#fbeaea" stroke="#f0cccc"/><text x="480" y="172" font-size="10.5" font-weight="600" fill="#7d1f1f" text-anchor="middle">取锁（防并发 DDL/DML 冲突）</text><text x="480" y="190" font-size="9" fill="#b06a6a" text-anchor="middle">如 ALTER 取 AccessExclusiveLock</text>
  <rect x="308" y="212" width="344" height="48" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="480" y="232" font-size="10.5" font-weight="600" fill="#0f5132" text-anchor="middle">改系统目录表的行</text><text x="480" y="250" font-size="9" fill="#3f8f66" text-anchor="middle">CatalogTupleInsert/Update（就是普通表写）</text>
  <rect x="308" y="272" width="344" height="48" rx="10" fill="#fff7e6" stroke="#f0dcae"/><text x="480" y="292" font-size="10.5" font-weight="600" fill="#7a4d00" text-anchor="middle">建物理文件 + 记依赖 + 写 WAL</text><text x="480" y="310" font-size="9" fill="#9a7328" text-anchor="middle">pg_depend 记对象依赖</text>
  <rect x="308" y="332" width="344" height="38" rx="10" fill="#f6f6f8" stroke="#e2e2e7"/><text x="480" y="356" font-size="10" fill="#494950" text-anchor="middle">COMMIT：目录变更随事务原子生效/回滚</text>
  <line x1="480" y1="140" x2="480" y2="152" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="480" y1="200" x2="480" y2="212" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="480" y1="260" x2="480" y2="272" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>

  <rect x="700" y="52" width="290" height="330" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="718" y="76" font-size="12" font-weight="600" fill="#1b2a4a">三个特点</text>
  <rect x="718" y="92" width="254" height="80" rx="10" fill="#ffffff" stroke="#bcd0ec"/><text x="728" y="114" font-size="10.5" font-weight="600" fill="#1b2a4a">① 事务性 DDL</text><text x="728" y="134" font-size="9" fill="#5b7db1">CREATE/ALTER/DROP 在事务里，</text><text x="728" y="150" font-size="9" fill="#5b7db1">可与 DML 一起原子提交/回滚</text><text x="728" y="166" font-size="8.5" fill="#8fa9cf">（少数如 CREATE INDEX CONCURRENTLY 例外）</text>
  <rect x="718" y="180" width="254" height="76" rx="10" fill="#ffffff" stroke="#bcd0ec"/><text x="728" y="202" font-size="10.5" font-weight="600" fill="#1b2a4a">② 目录即普通表</text><text x="728" y="222" font-size="9" fill="#5b7db1">改元数据就是往 pg_class 等</text><text x="728" y="238" font-size="9" fill="#5b7db1">系统表写行，复用 MVCC/WAL</text>
  <rect x="718" y="264" width="254" height="76" rx="10" fill="#ffffff" stroke="#bcd0ec"/><text x="728" y="286" font-size="10.5" font-weight="600" fill="#1b2a4a">③ 锁保护</text><text x="728" y="306" font-size="9" fill="#5b7db1">DDL 取重锁，可能阻塞读写</text><text x="728" y="322" font-size="9" fill="#5b7db1">生产变更需评估锁影响</text>

  <line x1="260" y1="200" x2="290" y2="200" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
</svg>
