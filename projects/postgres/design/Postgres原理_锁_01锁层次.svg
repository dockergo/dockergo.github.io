<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="440" viewBox="0 0 1020 440"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">锁的层次 · 从重到轻三级（storage/lmgr/）</text>

  <rect x="30" y="56" width="960" height="120" rx="14" fill="#fbeaea" stroke="#f0cccc" filter="url(#soft)"/>
  <text x="48" y="80" font-size="12.5" font-weight="600" fill="#7d1f1f">① Heavyweight Lock（表/行/对象级，LockAcquire）</text>
  <text x="48" y="102" font-size="9.5" fill="#b06a6a">保护逻辑对象、事务期持有、进锁表、支持多种模式与死锁检测</text>
  <rect x="48" y="114" width="290" height="50" rx="9" fill="#ffffff" stroke="#f0cccc"/><text x="193" y="134" font-size="9" fill="#7d1f1f" text-anchor="middle">表锁模式（8 种）</text><text x="193" y="152" font-size="8" fill="#b06a6a" text-anchor="middle">AccessShare … AccessExclusive</text>
  <rect x="348" y="114" width="290" height="50" rx="9" fill="#ffffff" stroke="#f0cccc"/><text x="493" y="134" font-size="9" fill="#7d1f1f" text-anchor="middle">行锁（FOR UPDATE / 写冲突）</text><text x="493" y="152" font-size="8" fill="#b06a6a" text-anchor="middle">存 tuple 头，冲突才升级为等待</text>
  <rect x="648" y="114" width="322" height="50" rx="9" fill="#ffffff" stroke="#f0cccc"/><text x="809" y="134" font-size="9" fill="#7d1f1f" text-anchor="middle">相容矩阵决定能否并发</text><text x="809" y="152" font-size="8" fill="#b06a6a" text-anchor="middle">读读兼容、DDL 与写互斥</text>

  <rect x="30" y="192" width="960" height="110" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="48" y="216" font-size="12.5" font-weight="600" fill="#1b2a4a">② LWLock（轻量读写锁）</text>
  <text x="48" y="238" font-size="9.5" fill="#5b7db1">保护共享内存结构（缓冲池槽、WAL、ProcArray 等）——短临界区、不进死锁检测</text>
  <rect x="48" y="252" width="440" height="40" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="268" y="277" font-size="9" fill="#1b2a4a" text-anchor="middle">共享(读) / 独占(写) 两种模式</text>
  <rect x="498" y="252" width="472" height="40" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="734" y="277" font-size="9" fill="#1b2a4a" text-anchor="middle">高频、低开销；争用会成扩展性瓶颈（可用等待事件观测）</text>

  <rect x="30" y="318" width="960" height="106" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="48" y="342" font-size="12.5" font-weight="600" fill="#0f5132">③ Spinlock（自旋锁）</text>
  <text x="48" y="364" font-size="9.5" fill="#3f8f66">保护极短的原子操作（几条指令），忙等不睡眠——LWLock 内部也用它</text>
  <rect x="48" y="378" width="922" height="34" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="509" y="399" font-size="9" fill="#0f5132" text-anchor="middle">层次总览：Heavyweight（对象/事务级，可等待可死锁）→ LWLock（共享内存结构）→ Spinlock（指令级原子）</text>
</svg>
