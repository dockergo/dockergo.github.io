<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="410" viewBox="0 0 1020 410"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="410" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">死锁检测 · 等待图找环，选一个牺牲者回滚（storage/lmgr/deadlock.c）</text>

  <!-- 等待环 -->
  <rect x="30" y="56" width="470" height="280" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="80" font-size="12.5" font-weight="600" fill="#1d1d1f">经典循环等待</text>
  <rect x="90" y="110" width="150" height="60" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="165" y="134" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">事务 T1</text><text x="165" y="154" font-size="8.5" fill="#5b7db1" text-anchor="middle">持有 A，想要 B</text>
  <rect x="290" y="110" width="150" height="60" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="365" y="134" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">事务 T2</text><text x="365" y="154" font-size="8.5" fill="#3f8f66" text-anchor="middle">持有 B，想要 A</text>
  <path d="M240,128 L290,128" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <path d="M290,152 L240,152" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="248" y="122" font-size="8" fill="#86868b">等 B</text>
  <text x="248" y="168" font-size="8" fill="#86868b">等 A</text>
  <text x="90" y="204" font-size="9.5" fill="#494950">T1 等 T2、T2 等 T1 → 谁都不放手 → 死锁</text>
  <rect x="90" y="222" width="350" height="94" rx="10" fill="#fbeaea" stroke="#f0cccc"/><text x="265" y="246" font-size="9.5" font-weight="600" fill="#7d1f1f" text-anchor="middle">检测：构建 wait-for 图找环</text><text x="265" y="268" font-size="8.5" fill="#b06a6a" text-anchor="middle">锁等待超 deadlock_timeout（默认 1s）</text><text x="265" y="286" font-size="8.5" fill="#b06a6a" text-anchor="middle">才触发检测（避免频繁开销）</text><text x="265" y="304" font-size="8.5" fill="#b06a6a" text-anchor="middle">找到环 → 选牺牲者 ERROR 回滚</text>

  <!-- 处理与预防 -->
  <rect x="520" y="56" width="470" height="280" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="538" y="80" font-size="12.5" font-weight="600" fill="#1b2a4a">处理与预防</text>
  <rect x="538" y="96" width="434" height="60" rx="10" fill="#ffffff" stroke="#bcd0ec"/><text x="554" y="118" font-size="10" font-weight="600" fill="#1b2a4a">牺牲者选择</text><text x="554" y="138" font-size="8.5" fill="#5b7db1">回滚其中一个事务打破环，其余继续</text><text x="554" y="152" font-size="8.5" fill="#5b7db1">应用需捕获死锁错误并重试</text>
  <rect x="538" y="166" width="434" height="60" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="554" y="188" font-size="10" font-weight="600" fill="#0f5132">预防：统一加锁顺序</text><text x="554" y="208" font-size="8.5" fill="#3f8f66">所有事务按同一顺序访问对象（如按主键序）</text><text x="554" y="222" font-size="8.5" fill="#3f8f66">→ 不可能成环</text>
  <rect x="538" y="236" width="434" height="60" rx="10" fill="#fff7e6" stroke="#f0dcae"/><text x="554" y="258" font-size="10" font-weight="600" fill="#7a4d00">缩短事务</text><text x="554" y="278" font-size="8.5" fill="#9a7328">事务越短持锁越少、冲突窗口越小</text><text x="554" y="292" font-size="8.5" fill="#9a7328">避免事务里穿插长耗时/交互等待</text>
  <text x="538" y="322" font-size="9" fill="#8fa9cf">MVCC 让读不加锁，死锁通常出在写写/显式锁之间</text>
</svg>
