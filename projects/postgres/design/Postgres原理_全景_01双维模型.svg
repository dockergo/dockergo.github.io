<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="660" viewBox="0 0 1020 660"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="660" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">PostgreSQL 双维模型 · 能力域（底座 / 计算 / 保障）× 执行时机（前台请求 / 后台进程）</text>

  <!-- 接触面 -->
  <rect x="30" y="52" width="960" height="46" rx="12" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="50" y="72" font-size="12.5" font-weight="600" fill="#3c1361">接触面主线（用户下发的 SQL 语句族）</text>
  <text x="50" y="90" font-size="11.5" fill="#7a5aa8">DDL 数据定义　·　DML 数据写入　·　DQL 数据查询　·　DCL 数据控制（roles / GRANT / 认证 / RLS）</text>
  <text x="740" y="80" font-size="11" fill="#7a5aa8">经 per-connection backend 处理</text>

  <!-- 前台 -->
  <text x="30" y="128" font-size="12" font-weight="600" fill="#86868b">前台 · 请求路径（每连接一个 backend 进程内同步处理）</text>
  <line x1="30" y1="136" x2="990" y2="136" stroke="#e2e2e7" stroke-width="1"/>

  <!-- 底座 -->
  <rect x="30" y="150" width="300" height="300" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="50" y="176" font-size="13" font-weight="600" fill="#1d1d1f">底座 · 进程/存储/内存</text>
  <rect x="50" y="192" width="260" height="66" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="66" y="214" font-size="12" font-weight="600" fill="#1b2a4a">① 进程与内存架构</text>
  <text x="66" y="234" font-size="10.5" fill="#5b7db1">postmaster fork 每连接一 backend</text>
  <text x="66" y="250" font-size="10.5" fill="#5b7db1">shared_buffers 共享内存</text>
  <rect x="50" y="268" width="260" height="66" rx="11" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="66" y="290" font-size="12" font-weight="600" fill="#7a4d00">② 存储引擎</text>
  <text x="66" y="310" font-size="10.5" fill="#9a7328">行存 heap · 8KB page · tuple</text>
  <text x="66" y="326" font-size="10.5" fill="#9a7328">TOAST 大值 · FSM/VM</text>
  <rect x="50" y="344" width="260" height="66" rx="11" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="66" y="366" font-size="12" font-weight="600" fill="#0f5132">③ 索引方法</text>
  <text x="66" y="386" font-size="10.5" fill="#3f8f66">btree/hash/gist/gin/brin/spgist</text>
  <text x="66" y="402" font-size="10.5" fill="#3f8f66">统一 access method 抽象</text>

  <!-- 计算 -->
  <rect x="360" y="150" width="300" height="300" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="380" y="176" font-size="13" font-weight="600" fill="#1d1d1f">计算 · 把查询算出来</text>
  <rect x="380" y="192" width="260" height="96" rx="11" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="396" y="214" font-size="12" font-weight="600" fill="#3c1361">④ 查询优化器</text>
  <text x="396" y="234" font-size="10.5" fill="#7a5aa8">代价模型 CBO</text>
  <text x="396" y="250" font-size="10.5" fill="#7a5aa8">Join 定序：DP + GEQO(大查询)</text>
  <text x="396" y="266" font-size="10.5" fill="#7a5aa8">统计(pg_statistic) 驱动</text>
  <rect x="380" y="298" width="260" height="96" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="396" y="320" font-size="12" font-weight="600" fill="#1b2a4a">⑤ 执行引擎</text>
  <text x="396" y="340" font-size="10.5" fill="#5b7db1">volcano / pull 火山模型</text>
  <text x="396" y="356" font-size="10.5" fill="#5b7db1">plan node 逐行拉取</text>
  <text x="396" y="372" font-size="10.5" fill="#5b7db1">seqscan/indexscan/join/agg/sort</text>

  <!-- 保障 -->
  <rect x="690" y="150" width="300" height="300" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="710" y="176" font-size="13" font-weight="600" fill="#1d1d1f">保障 · 正确与持久</text>
  <rect x="710" y="192" width="260" height="66" rx="11" fill="#fbeaea" stroke="#f0cccc"/>
  <text x="726" y="214" font-size="12" font-weight="600" fill="#7d1f1f">⑥ 事务与 MVCC</text>
  <text x="726" y="234" font-size="10.5" fill="#b06a6a">tuple 多版本 xmin/xmax</text>
  <text x="726" y="250" font-size="10.5" fill="#b06a6a">快照隔离 · VACUUM 回收</text>
  <rect x="710" y="268" width="260" height="66" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="726" y="290" font-size="12" font-weight="600" fill="#1b2a4a">⑦ 并发控制与锁</text>
  <text x="726" y="310" font-size="10.5" fill="#5b7db1">heavyweight lock · LWLock</text>
  <text x="726" y="326" font-size="10.5" fill="#5b7db1">死锁检测</text>
  <rect x="710" y="344" width="260" height="66" rx="11" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="726" y="366" font-size="12" font-weight="600" fill="#0f5132">⑧ WAL 与恢复复制</text>
  <text x="726" y="386" font-size="10.5" fill="#3f8f66">WAL 先写 · checkpoint</text>
  <text x="726" y="402" font-size="10.5" fill="#3f8f66">崩溃恢复 · 流复制</text>

  <!-- 后台 -->
  <text x="30" y="482" font-size="12" font-weight="600" fill="#86868b">后台 · 辅助进程（不随单条 SQL 返回，postmaster 派生的独立进程）</text>
  <line x1="30" y1="490" x2="990" y2="490" stroke="#e2e2e7" stroke-width="1"/>
  <rect x="30" y="504" width="960" height="126" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="50" y="528" font-size="13" font-weight="600" fill="#1d1d1f">后台辅助进程（横切各能力域的异步部分）</text>
  <rect x="50" y="540" width="222" height="40" rx="10" fill="#fbeaea" stroke="#f0cccc"/><text x="161" y="565" font-size="10.5" fill="#7d1f1f" text-anchor="middle">autovacuum 回收死元组</text>
  <rect x="284" y="540" width="222" height="40" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="395" y="565" font-size="10.5" fill="#0f5132" text-anchor="middle">checkpointer 刷脏页定检查点</text>
  <rect x="518" y="540" width="222" height="40" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="629" y="565" font-size="10.5" fill="#1b2a4a" text-anchor="middle">bgwriter 后台刷脏页</text>
  <rect x="752" y="540" width="218" height="40" rx="10" fill="#fff7e6" stroke="#f0dcae"/><text x="861" y="565" font-size="10.5" fill="#7a4d00" text-anchor="middle">walwriter 刷 WAL</text>
  <rect x="50" y="586" width="300" height="36" rx="10" fill="#f6f6f8" stroke="#e2e2e7"/><text x="200" y="609" font-size="10" fill="#494950" text-anchor="middle">startup 进程：崩溃/复制时回放 WAL</text>
  <rect x="362" y="586" width="300" height="36" rx="10" fill="#f6f6f8" stroke="#e2e2e7"/><text x="512" y="609" font-size="10" fill="#494950" text-anchor="middle">walsender/walreceiver：流复制</text>
  <rect x="674" y="586" width="296" height="36" rx="10" fill="#f6f6f8" stroke="#e2e2e7"/><text x="822" y="609" font-size="10" fill="#494950" text-anchor="middle">archiver / stats / logger 等</text>

  <line x1="510" y1="98" x2="510" y2="136" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
</svg>
