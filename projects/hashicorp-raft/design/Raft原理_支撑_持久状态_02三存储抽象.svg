<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="580" viewBox="0 0 1060 580" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/>
    </filter>
    <marker id="aB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#4a7fd0"/></marker>
    <marker id="aA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#cf972b"/></marker>
    <marker id="aG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
  </defs>
  <rect width="1060" height="580" fill="#fbfbfd"/>

  <rect x="0" y="0" width="1060" height="46" fill="#f4f5f7" stroke="#e6e6eb"/>
  <text x="30" y="27" font-size="15" font-weight="700" fill="#1d1d1f">三存储抽象 · StableStore / LogStore / SnapshotStore 职责边界与实现</text>
  <text x="30" y="40" font-size="10.5" fill="#8a8a90">库只定义接口、零磁盘;宿主注入具体实现——测试用内存版,生产用 boltdb / 文件版</text>

  <g font-size="10">
    <rect x="700" y="12" width="12" height="12" rx="3" fill="#eef3fb" stroke="#4a7fd0"/><text x="716" y="22" fill="#3a3a3c">核心模块(写者)</text>
    <rect x="838" y="12" width="12" height="12" rx="3" fill="#fbf7ef" stroke="#cf972b"/><text x="854" y="22" fill="#3a3a3c">存储接口</text>
    <rect x="930" y="12" width="12" height="12" rx="3" fill="#f5faf6" stroke="#2f9e6e"/><text x="946" y="22" fill="#3a3a3c">FSM/恢复</text>
  </g>

  <!-- 顶部核心模块行 -->
  <rect x="30" y="58" width="1000" height="44" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="76" font-size="11.5" font-weight="700" fill="#1b2a4a">共识核心(run 主线 / replication / runSnapshots)——只调接口方法,不认具体实现</text>
  <text x="46" y="93" font-size="10" fill="#5b7db1">setCurrentTerm / persistVote · dispatchLogs / appendEntries / compactLogs · takeSnapshot / installSnapshot</text>

  <!-- StableStore 列 -->
  <rect x="30" y="128" width="322" height="330" rx="13" fill="#fbf7ef" stroke="#ead9b3" filter="url(#soft)"/>
  <text x="48" y="152" font-size="12.5" font-weight="700" fill="#8a5a12">StableStore · stable.go:8</text>
  <text x="48" y="168" font-size="10" fill="#a07a1e">论文「持久状态」——安全性之根</text>
  <rect x="48" y="178" width="286" height="52" rx="8" fill="#fff" stroke="#ead9b3"/>
  <text x="60" y="197" font-size="10.5" fill="#8a5a12"><tspan font-weight="600">接口</tspan> Set/Get([]byte)</text>
  <text x="60" y="213" font-size="10.5" fill="#8a5a12">SetUint64 / GetUint64</text>
  <rect x="48" y="238" width="286" height="76" rx="8" fill="#fff" stroke="#ead9b3"/>
  <text x="60" y="257" font-size="10.5" font-weight="600" fill="#8a5a12">存三项元数据(raft.go:28-30)</text>
  <text x="60" y="275" font-size="10" fill="#a07a1e">• CurrentTerm — 任期单调不回退</text>
  <text x="60" y="291" font-size="10" fill="#a07a1e">• LastVoteTerm / LastVoteCand</text>
  <text x="60" y="307" font-size="10" fill="#a07a1e">→ 一任期只投一票</text>
  <rect x="48" y="322" width="286" height="46" rx="8" fill="#f0f4fb" stroke="#cfe0f2"/>
  <text x="60" y="341" font-size="10.5" font-weight="600" fill="#1b2a4a">铁律:先落盘再改内存</text>
  <text x="60" y="357" font-size="10" fill="#5b7db1">setCurrentTerm 落盘失败直接 panic</text>
  <rect x="48" y="378" width="286" height="66" rx="8" fill="#f7f7f9" stroke="#e2e2e7"/>
  <text x="60" y="397" font-size="10.5" font-weight="600" fill="#1d1d1f">实现</text>
  <text x="60" y="414" font-size="10" fill="#6e6e73">测试:InmemStore(内存 map)</text>
  <text x="60" y="431" font-size="10" fill="#6e6e73">生产:raft-boltdb(BoltDB)</text>

  <!-- LogStore 列 -->
  <rect x="368" y="128" width="322" height="330" rx="13" fill="#fbf7ef" stroke="#ead9b3" filter="url(#soft)"/>
  <text x="386" y="152" font-size="12.5" font-weight="700" fill="#8a5a12">LogStore · log.go:112</text>
  <text x="386" y="168" font-size="10" fill="#a07a1e">复制日志的物理落点</text>
  <rect x="386" y="178" width="286" height="52" rx="8" fill="#fff" stroke="#ead9b3"/>
  <text x="398" y="197" font-size="10.5" fill="#8a5a12"><tspan font-weight="600">接口</tspan> First/LastIndex · GetLog</text>
  <text x="398" y="213" font-size="10.5" fill="#8a5a12">StoreLog(s) · DeleteRange</text>
  <rect x="386" y="238" width="286" height="76" rx="8" fill="#fff" stroke="#ead9b3"/>
  <text x="398" y="257" font-size="10.5" font-weight="600" fill="#8a5a12">存日志条目 Log(log.go:68)</text>
  <text x="398" y="275" font-size="10" fill="#a07a1e">Index / Term / Type / Data / Ext</text>
  <text x="398" y="291" font-size="10" fill="#a07a1e">Type:Command / Noop / Barrier</text>
  <text x="398" y="307" font-size="10" fill="#a07a1e">/ Configuration(log.go:14)</text>
  <rect x="386" y="322" width="286" height="46" rx="8" fill="#f0f4fb" stroke="#cfe0f2"/>
  <text x="398" y="341" font-size="10.5" font-weight="600" fill="#1b2a4a">写者:dispatchLogs / appendEntries</text>
  <text x="398" y="357" font-size="10" fill="#5b7db1">compactLogs 用 DeleteRange 截断</text>
  <rect x="386" y="378" width="286" height="66" rx="8" fill="#f7f7f9" stroke="#e2e2e7"/>
  <text x="398" y="397" font-size="10.5" font-weight="600" fill="#1d1d1f">实现</text>
  <text x="398" y="414" font-size="10" fill="#6e6e73">测试:InmemStore</text>
  <text x="398" y="431" font-size="10" fill="#6e6e73">生产:raft-boltdb + LogCache 包装</text>

  <!-- SnapshotStore 列 -->
  <rect x="706" y="128" width="324" height="330" rx="13" fill="#fbf7ef" stroke="#ead9b3" filter="url(#soft)"/>
  <text x="724" y="152" font-size="12.5" font-weight="700" fill="#8a5a12">SnapshotStore · snapshot.go:46</text>
  <text x="724" y="168" font-size="10" fill="#a07a1e">全量状态快照,截断日志的前提</text>
  <rect x="724" y="178" width="288" height="52" rx="8" fill="#fff" stroke="#ead9b3"/>
  <text x="736" y="197" font-size="10.5" fill="#8a5a12"><tspan font-weight="600">接口</tspan> Create(→ SnapshotSink)</text>
  <text x="736" y="213" font-size="10.5" fill="#8a5a12">List · Open(id)</text>
  <rect x="724" y="238" width="288" height="76" rx="8" fill="#fff" stroke="#ead9b3"/>
  <text x="736" y="257" font-size="10.5" font-weight="600" fill="#8a5a12">存 FSM 全量状态 + SnapshotMeta</text>
  <text x="736" y="275" font-size="10" fill="#a07a1e">meta 含 Index / Term / Configuration</text>
  <text x="736" y="291" font-size="10" fill="#a07a1e">Create 返回 sink,FSMSnapshot.Persist</text>
  <text x="736" y="307" font-size="10" fill="#a07a1e">往里写(可与后续 Apply 并发)</text>
  <rect x="724" y="322" width="288" height="46" rx="8" fill="#eef6f0" stroke="#c9e6cf"/>
  <text x="736" y="341" font-size="10.5" font-weight="600" fill="#1f5130">读者:restore(FSM 重建)</text>
  <text x="736" y="357" font-size="10" fill="#4f8b63">sendLatestSnapshot / installSnapshot Open</text>
  <rect x="724" y="378" width="288" height="66" rx="8" fill="#f7f7f9" stroke="#e2e2e7"/>
  <text x="736" y="397" font-size="10.5" font-weight="600" fill="#1d1d1f">实现</text>
  <text x="736" y="414" font-size="10" fill="#6e6e73">生产:FileSnapshotStore(目录文件)</text>
  <text x="736" y="431" font-size="10" fill="#6e6e73">测试:Inmem / Discard SnapshotStore</text>

  <!-- 核心 → 存储 箭头 -->
  <path d="M191,102 L191,128" stroke="#4a7fd0" stroke-width="1.6" fill="none" marker-end="url(#aA)"/>
  <path d="M529,102 L529,128" stroke="#4a7fd0" stroke-width="1.6" fill="none" marker-end="url(#aA)"/>
  <path d="M868,102 L868,128" stroke="#4a7fd0" stroke-width="1.6" fill="none" marker-end="url(#aA)"/>

  <!-- 底部一句话 -->
  <rect x="30" y="474" width="1000" height="88" rx="13" fill="#f7f7f9" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="46" y="497" font-size="12" font-weight="700" fill="#1d1d1f">三者如何协作</text>
  <text x="46" y="518" font-size="10.5" fill="#6e6e73">StableStore 保「投票/任期」不丢 → 保证选举安全;LogStore 保「有序日志」不丢 → 保证复制安全;SnapshotStore 让日志可截断 → 控制无限增长。</text>
  <text x="46" y="538" font-size="10.5" fill="#6e6e73">恢复顺序(重启):先从 SnapshotStore 装最新快照喂 FSM.Restore,再重放 LogStore 里快照点之后的日志,StableStore 恢复任期/投票——三者合力还原到宕机前一致点。</text>
  <text x="46" y="556" font-size="10.5" fill="#6e6e73">库只依赖接口:换存储 = 换注入实现,共识算法一行不动;这正是「库形态 + 依赖注入」可测可嵌的根源。</text>
</svg>
