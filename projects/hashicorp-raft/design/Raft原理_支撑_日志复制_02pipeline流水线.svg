<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="616" viewBox="0 0 1080 616" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/>
    </filter>
    <marker id="aB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#4a7fd0"/></marker>
    <marker id="aG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="aR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#e0654f"/></marker>
    <marker id="aA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#cf972b"/></marker>
  </defs>
  <rect width="1080" height="616" fill="#fbfbfd"/>

  <rect x="0" y="0" width="1080" height="46" fill="#f4f5f7" stroke="#e6e6eb"/>
  <text x="30" y="27" font-size="15" font-weight="700" fill="#1d1d1f">日志复制两态机 · RPC 追赶 ⇄ pipeline 流水线(每 follower 一个 replicate 协程)</text>
  <text x="30" y="40" font-size="10.5" fill="#8a8a90">健康则切流水线连发不等响应吃满带宽,出错回退稳妥 RPC 模式;心跳走独立通道不被磁盘 IO 卡住</text>

  <g font-size="10">
    <rect x="726" y="12" width="12" height="12" rx="3" fill="#eef3fb" stroke="#4a7fd0"/><text x="742" y="22" fill="#3a3a3c">复制/控制</text>
    <rect x="822" y="12" width="12" height="12" rx="3" fill="#f5faf6" stroke="#2f9e6e"/><text x="838" y="22" fill="#3a3a3c">已确认 match</text>
    <rect x="930" y="12" width="12" height="12" rx="3" fill="#fbf7ef" stroke="#cf972b"/><text x="946" y="22" fill="#3a3a3c">快照兜底</text>
    <rect x="1018" y="12" width="12" height="12" rx="3" fill="#fbf1f0" stroke="#e0654f"/><text x="1034" y="22" fill="#3a3a3c">回退</text>
  </g>

  <!-- followerReplication 状态卡 -->
  <rect x="30" y="60" width="256" height="240" rx="13" fill="#f7f7f9" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="46" y="84" font-size="12" font-weight="700" fill="#1d1d1f">followerReplication</text>
  <text x="46" y="99" font-size="10" fill="#86868b">replication.go:33 · 每 follower 一个</text>
  <g font-size="10.5">
    <rect x="46" y="110" width="224" height="34" rx="8" fill="#eef3fb" stroke="#bcd0ec"/>
    <text x="58" y="124" fill="#1b2a4a"><tspan font-weight="600">nextIndex</tspan> :44 下一条要发</text>
    <text x="58" y="138" font-size="9.5" fill="#5b7db1">乐观初始化 = LastIndex+1</text>
    <rect x="46" y="150" width="224" height="34" rx="8" fill="#f5faf6" stroke="#c9e6cf"/>
    <text x="58" y="164" fill="#1f5130"><tspan font-weight="600">matchIndex</tspan> 已确认复制到</text>
    <text x="58" y="178" font-size="9.5" fill="#4f8b63">→ commitment 用它算 commitIndex</text>
    <rect x="46" y="190" width="224" height="30" rx="8" fill="#fff" stroke="#e2e2e7"/>
    <text x="58" y="209" fill="#1d1d1f"><tspan font-weight="600">allowPipeline</tspan> — 是否可升流水线</text>
  </g>
  <rect x="46" y="228" width="224" height="58" rx="9" fill="#faf4fb" stroke="#e7cff0"/>
  <text x="58" y="247" font-size="10.5" font-weight="600" fill="#5a2b6b">heartbeat 独立协程 :388</text>
  <text x="58" y="263" font-size="9.5" fill="#9a5cb0">走独立 stopCh,发空 AppendEntries</text>
  <text x="58" y="277" font-size="9.5" fill="#9a5cb0">保活 + 刷新 LastContact(lease 用)</text>

  <!-- RPC 模式 -->
  <rect x="316" y="60" width="418" height="330" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="334" y="84" font-size="12.5" font-weight="700" fill="#1b2a4a">① RPC 模式 · replicate 循环(稳妥追赶)</text>
  <g font-size="10.5" fill="#2b3a5a">
    <rect x="334" y="96" width="382" height="46" rx="8" fill="#fff" stroke="#cfe0f2"/>
    <text x="346" y="115"><tspan font-weight="600">replicateTo</tspan> :202 — 从 nextIndex 组一批</text>
    <text x="346" y="132" font-size="10">最多 MaxAppendEntries=64 条,带 PrevLog 做一致性检查</text>
    <rect x="334" y="150" width="382" height="46" rx="8" fill="#f5faf6" stroke="#c9e6cf"/>
    <text x="346" y="169" fill="#1f5130"><tspan font-weight="600">success</tspan> — 更新 matchIndex / nextIndex 前进</text>
    <text x="346" y="186" font-size="10" fill="#4f8b63">notifyAll 唤醒 commitment 重算 commitIndex</text>
    <rect x="334" y="204" width="382" height="46" rx="8" fill="#fbf1f0" stroke="#f2cfca"/>
    <text x="346" y="223" fill="#8a2b1f"><tspan font-weight="600">rejected</tspan> — PrevLog 不匹配,一致性检查失败</text>
    <text x="346" y="240" font-size="10" fill="#c4675a">nextIndex 回退(max(min(next-1,LastLog+1),1))重试</text>
  </g>
  <rect x="334" y="258" width="382" height="48" rx="9" fill="#fbf7ef" stroke="#ead9b3"/>
  <text x="346" y="277" font-size="10.5" fill="#8a5a12"><tspan font-weight="600">sendLatestSnapshot</tspan> :299 — follower 落后到快照之前</text>
  <text x="346" y="293" font-size="10" fill="#a07a1e">改发 InstallSnapshot 追平,再把 nextIndex 设到 meta.Index+1</text>
  <text x="334" y="330" font-size="10" fill="#5b7db1">触发源(select):triggerCh / triggerDeferErrorCh / CommitTimeout / stopCh</text>
  <rect x="334" y="342" width="382" height="34" rx="8" fill="#e9edf6" stroke="#9db6de"/>
  <text x="346" y="363" font-size="10.5" fill="#1b2a4a"><tspan font-weight="600">健康且 allowPipeline</tspan> → goto PIPELINE(升级流水线)</text>

  <!-- PIPELINE 模式 -->
  <rect x="764" y="60" width="286" height="330" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="782" y="84" font-size="12.5" font-weight="700" fill="#1b2a4a">② PIPELINE 模式</text>
  <text x="782" y="99" font-size="10" fill="#5b7db1">pipelineReplicate :446</text>
  <g font-size="10.5" fill="#2b3a5a">
    <rect x="782" y="110" width="250" height="60" rx="8" fill="#fff" stroke="#cfe0f2"/>
    <text x="794" y="129"><tspan font-weight="600">pipelineSend</tspan></text>
    <text x="794" y="146" font-size="10">连续发多批 AppendEntries</text>
    <text x="794" y="161" font-size="10">不等响应即推进 nextIndex</text>
    <rect x="782" y="178" width="250" height="60" rx="8" fill="#f5faf6" stroke="#c9e6cf"/>
    <text x="794" y="197" fill="#1f5130"><tspan font-weight="600">pipelineDecode</tspan> :534</text>
    <text x="794" y="214" font-size="10" fill="#1f5130">独立协程异步收响应</text>
    <text x="794" y="229" font-size="10" fill="#4f8b63">更新 matchIndex → commitment</text>
  </g>
  <text x="782" y="258" font-size="10" fill="#5b7db1">发送/接收解耦 → 掩盖 RTT,吞吐吃满链路</text>
  <rect x="782" y="270" width="250" height="48" rx="9" fill="#fbf1f0" stroke="#f2cfca"/>
  <text x="794" y="289" font-size="10.5" fill="#8a2b1f"><tspan font-weight="600">出错不优雅恢复</tspan></text>
  <text x="794" y="305" font-size="10" fill="#c4675a">关闭 pipeline → goto RPC 回落</text>
  <text x="782" y="344" font-size="10" fill="#5b7db1">Transport 不支持 pipeline 时</text>
  <text x="782" y="360" font-size="10" fill="#5b7db1">直接留在 RPC 模式(inmem 等)</text>

  <!-- transitions -->
  <path d="M718,359 L764,300" stroke="#4a7fd0" stroke-width="1.8" fill="none" marker-end="url(#aB)"/>
  <path d="M900,318 C900,410 560,420 500,390" stroke="#e0654f" stroke-width="1.6" fill="none" marker-end="url(#aR)" stroke-dasharray="5 4"/>
  <text x="600" y="416" font-size="9.5" fill="#c4675a">出错回落 goto RPC</text>
  <path d="M286,250 L316,220" stroke="#4a7fd0" stroke-width="1.4" fill="none" marker-end="url(#aB)"/>

  <!-- 底部说明 -->
  <rect x="30" y="404" width="1020" height="192" rx="13" fill="#f7f7f9" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="46" y="428" font-size="12" font-weight="700" fill="#1d1d1f">为什么要两态?一句话对照</text>
  <g font-size="10.5" fill="#3a3a3c">
    <rect x="46" y="440" width="492" height="66" rx="9" fill="#eef3fb" stroke="#cfe0f2"/>
    <text x="60" y="460" font-weight="600" fill="#1b2a4a">RPC 模式 = 稳</text>
    <text x="60" y="478" font-size="10">一发一收、看响应决定进退,能优雅处理拒绝/回退/快照兜底</text>
    <text x="60" y="495" font-size="10">代价:每批一个 RTT 串行,吞吐受网络延迟限制</text>
    <rect x="546" y="440" width="492" height="66" rx="9" fill="#f5faf6" stroke="#c9e6cf"/>
    <text x="560" y="460" font-weight="600" fill="#1f5130">PIPELINE 模式 = 快</text>
    <text x="560" y="478" font-size="10">发送与解码解耦,连发不阻塞,RTT 被重叠掉 → 高吞吐</text>
    <text x="560" y="495" font-size="10">代价:不能优雅恢复,一旦出错整体回落到 RPC 重新对齐</text>
  </g>
  <text x="46" y="530" font-size="10.5" fill="#6e6e73">nextIndex/matchIndex 用 atomic 读写:发送侧乐观推进 nextIndex,解码侧据响应权威更新 matchIndex,二者不共享锁。</text>
  <text x="46" y="550" font-size="10.5" fill="#6e6e73">心跳与复制分离(issue #282):心跳保持不被 follower 磁盘 IO 阻塞,commit 传播则靠 replicate 的 CommitTimeout 兜底。</text>
  <text x="46" y="570" font-size="10.5" fill="#6e6e73">强 Leader 模型:Leader 日志是唯一真相,follower 与之冲突的尾巴会被覆盖删除。</text>
  <text x="46" y="588" font-size="10.5" fill="#6e6e73">升级门槛:只有 replicate 觉得链路健康(shouldStop=false 且 allowPipeline)才切流水线,冷启动/追赶阶段先走 RPC。</text>
</svg>
