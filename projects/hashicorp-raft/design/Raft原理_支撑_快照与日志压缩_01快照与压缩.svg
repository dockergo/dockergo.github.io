<svg xmlns="http://www.w3.org/2000/svg" width="920" height="540" viewBox="0 0 920 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="920" height="540" fill="#fbfbfd"/>
  <text x="30" y="34" font-size="15" font-weight="600" fill="#1d1d1f">快照与日志压缩：runSnapshots 阈值触发 · TrailingLogs 保留 · InstallSnapshot 追平</text>

  <!-- 触发与流程 -->
  <rect x="30" y="60" width="540" height="250" rx="13" fill="#f5faf6" stroke="#c9e6cf" filter="url(#soft)"/>
  <text x="46" y="84" font-size="12.5" font-weight="600" fill="#1f5130">本地快照（snapshot.go · runSnapshots:73）</text>
  <g font-size="10.5" fill="#2b3a5a">
    <rect x="46" y="96" width="508" height="30" rx="7" fill="#ffffff" stroke="#c9e6cf"/>
    <text x="56" y="115">① 每 SnapshotInterval(120s) 检查 shouldSnapshot（:107）</text>
    <rect x="46" y="132" width="508" height="30" rx="7" fill="#ffffff" stroke="#c9e6cf"/>
    <text x="56" y="151">② delta = lastIndex − lastSnap ≥ SnapshotThreshold(8192)？</text>
    <rect x="46" y="168" width="508" height="30" rx="7" fill="#ffffff" stroke="#c9e6cf"/>
    <text x="56" y="187">③ takeSnapshot（:126）→ 请 runFSM 调 <tspan font-weight="600">FSM.Snapshot</tspan></text>
    <rect x="46" y="204" width="508" height="30" rx="7" fill="#ffffff" stroke="#c9e6cf"/>
    <text x="56" y="223">④ <tspan font-weight="600">FSMSnapshot.Persist(sink)</tspan> 落盘到 SnapshotStore</text>
    <rect x="46" y="240" width="508" height="30" rx="7" fill="#fbf7ef" stroke="#efe2c8"/>
    <text x="56" y="259" fill="#8a6d1f">⑤ compactLogs（:253）删快照点之前的日志，留 TrailingLogs</text>
  </g>
  <text x="46" y="290" font-size="10" fill="#86868b">Snapshot 与 Apply 同线程分离：Persist 可与后续 Apply 并发（FSM 需支持并发读）</text>

  <!-- 日志压缩图示 -->
  <rect x="590" y="60" width="300" height="250" rx="13" fill="#fbf7ef" stroke="#efe2c8" filter="url(#soft)"/>
  <text x="606" y="84" font-size="12.5" font-weight="600" fill="#8a6d1f">日志压缩（compactLogsWithTrailing:217）</text>
  <text x="606" y="106" font-size="10.5" fill="#a1885a">快照点 snapIdx = 8000</text>
  <!-- 日志条 -->
  <rect x="606" y="120" width="80" height="40" rx="6" fill="#e8e8ec" stroke="#d0d0d5"/>
  <text x="646" y="144" text-anchor="middle" font-size="9.5" fill="#86868b">…删除…</text>
  <rect x="694" y="120" width="80" height="40" rx="6" fill="#ffffff" stroke="#efe2c8"/>
  <text x="734" y="140" text-anchor="middle" font-size="9" fill="#8a6d1f">TrailingLogs</text>
  <text x="734" y="153" text-anchor="middle" font-size="9" fill="#a1885a">保留 10240</text>
  <rect x="782" y="120" width="80" height="40" rx="6" fill="#f5faf6" stroke="#c9e6cf"/>
  <text x="822" y="144" text-anchor="middle" font-size="9.5" fill="#1f5130">新日志</text>
  <text x="606" y="182" font-size="10" fill="#a1885a">保留尾部日志：让稍落后的 follower</text>
  <text x="606" y="198" font-size="10" fill="#a1885a">仍能用日志追平，不必每次传整快照。</text>
  <rect x="606" y="212" width="256" height="80" rx="9" fill="#ffffff" stroke="#efe2c8"/>
  <text x="618" y="232" font-size="10.5" font-weight="600" fill="#8a2b1f">为什么要快照</text>
  <text x="618" y="250" font-size="10" fill="#a1885a">· 日志无限增长 → 磁盘爆 + 重启回放慢</text>
  <text x="618" y="268" font-size="10" fill="#a1885a">· 快照 = 状态机某点全量，替代其前所有日志</text>
  <text x="618" y="286" font-size="10" fill="#a1885a">· 重启从快照恢复 + 回放尾部日志</text>

  <!-- InstallSnapshot -->
  <rect x="30" y="330" width="860" height="180" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="354" font-size="12.5" font-weight="600" fill="#1b2a4a">InstallSnapshot：给落后过多的 follower 传整快照（raft.go:1837）</text>
  <g font-size="10.5" fill="#2b3a5a">
    <rect x="46" y="368" width="250" height="60" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
    <text x="171" y="392" text-anchor="middle">Leader 发现 follower</text>
    <text x="171" y="410" text-anchor="middle" fill="#5b7db1">nextIndex 落到快照点之前</text>

    <rect x="326" y="368" width="250" height="60" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
    <text x="451" y="392" text-anchor="middle">sendLatestSnapshot（:299）</text>
    <text x="451" y="410" text-anchor="middle" fill="#5b7db1">经 Transport 流式推快照</text>

    <rect x="606" y="368" width="250" height="60" rx="8" fill="#f5faf6" stroke="#c9e6cf"/>
    <text x="731" y="392" text-anchor="middle" fill="#1f5130">Follower 落盘 + FSM.Restore</text>
    <text x="731" y="410" text-anchor="middle" fill="#4f9d69">重置 nextIndex = 快照 index+1</text>
  </g>
  <path d="M296,398 L324,398" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <path d="M576,398 L604,398" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <text x="46" y="456" font-size="10.5" fill="#86868b">restoreUserSnapshot：宿主可从外部备份手动灌入快照，用当前配置恢复到新集群。</text>
  <text x="46" y="478" font-size="10.5" fill="#86868b">MonotonicLogStore：不容忍日志空洞的存储在快照恢复后会删光旧日志而非留空洞。</text>
</svg>
