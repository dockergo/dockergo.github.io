<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="556" viewBox="0 0 1040 556" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/>
    </filter>
    <marker id="aB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#4a7fd0"/></marker>
    <marker id="aG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="aR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#e0654f"/></marker>
  </defs>
  <rect width="1040" height="556" fill="#fbfbfd"/>

  <rect x="0" y="0" width="1040" height="46" fill="#f4f5f7" stroke="#e6e6eb"/>
  <text x="30" y="27" font-size="15" font-weight="700" fill="#1d1d1f">Leader 提交流水线 · inflight 队列如何把「多数派提交」翻译成「唤醒 ApplyFuture」</text>
  <text x="30" y="40" font-size="10.5" fill="#8a8a90">dispatchLogs 挂起 Future → commitment 推进 commitIndex → processLogs 出队应用 → future.respond 解阻塞</text>

  <g font-size="10">
    <rect x="700" y="12" width="12" height="12" rx="3" fill="#eef3fb" stroke="#4a7fd0"/><text x="716" y="22" fill="#3a3a3c">控制/提交</text>
    <rect x="800" y="12" width="12" height="12" rx="3" fill="#f5faf6" stroke="#2f9e6e"/><text x="816" y="22" fill="#3a3a3c">apply/唤醒</text>
    <rect x="906" y="12" width="12" height="12" rx="3" fill="#fbf1f0" stroke="#e0654f"/><text x="922" y="22" fill="#3a3a3c">失去领导权</text>
  </g>

  <!-- ① Apply -->
  <rect x="30" y="64" width="196" height="70" rx="11" fill="#faf4fb" stroke="#e7cff0" filter="url(#soft)"/>
  <text x="44" y="85" font-size="11" font-weight="600" fill="#5a2b6b">① 宿主 Apply(cmd)</text>
  <text x="44" y="103" font-size="10" fill="#9a5cb0">api.go:867 · 返回 ApplyFuture</text>
  <text x="44" y="120" font-size="10" fill="#9a5cb0">投 applyCh,阻塞在 .Error()</text>

  <!-- ② dispatchLogs -->
  <rect x="256" y="64" width="240" height="70" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="270" y="85" font-size="11" font-weight="600" fill="#1b2a4a">② dispatchLogs :1245(run 主线)</text>
  <text x="270" y="103" font-size="10" fill="#5b7db1">编码成 Log 写本地 LogStore</text>
  <text x="270" y="120" font-size="10" fill="#5b7db1">把 logFuture 按 index 入 inflight</text>

  <!-- ③ replicate -->
  <rect x="526" y="64" width="230" height="70" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="540" y="85" font-size="11" font-weight="600" fill="#1b2a4a">③ 复制到 followers</text>
  <text x="540" y="103" font-size="10" fill="#5b7db1">replication 推 AppendEntries</text>
  <text x="540" y="120" font-size="10" fill="#5b7db1">ack 回来 → matchIndex 更新</text>

  <!-- ④ commitment -->
  <rect x="786" y="64" width="224" height="70" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="800" y="85" font-size="11" font-weight="600" fill="#1b2a4a">④ commitment.recalculate</text>
  <text x="800" y="103" font-size="10" fill="#5b7db1">matchIndex 中位数 → commitIndex</text>
  <text x="800" y="120" font-size="10" fill="#5b7db1">前进则 asyncNotifyCh(commitCh)</text>

  <path d="M226,99 L252,99" stroke="#4a7fd0" stroke-width="1.5" fill="none" marker-end="url(#aB)"/>
  <path d="M496,99 L522,99" stroke="#4a7fd0" stroke-width="1.5" fill="none" marker-end="url(#aB)"/>
  <path d="M756,99 L782,99" stroke="#4a7fd0" stroke-width="1.5" fill="none" marker-end="url(#aB)"/>

  <!-- inflight 队列(中央数据结构) -->
  <rect x="256" y="158" width="500" height="96" rx="12" fill="#f0f4fb" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="272" y="180" font-size="11.5" font-weight="700" fill="#1b2a4a">leaderState.inflight · 有序 list(index → logFuture)</text>
  <g font-size="10" text-anchor="middle">
    <rect x="272" y="192" width="80" height="44" rx="8" fill="#eef6f0" stroke="#c9e6cf"/><text x="312" y="210" fill="#1f5130">idx 10</text><text x="312" y="226" font-size="9" fill="#4f8b63">已提交</text>
    <rect x="360" y="192" width="80" height="44" rx="8" fill="#eef6f0" stroke="#c9e6cf"/><text x="400" y="210" fill="#1f5130">idx 11</text><text x="400" y="226" font-size="9" fill="#4f8b63">已提交</text>
    <rect x="448" y="192" width="80" height="44" rx="8" fill="#fff" stroke="#cfe0f2"/><text x="488" y="210" fill="#1b2a4a">idx 12</text><text x="488" y="226" font-size="9" fill="#5b7db1">未达多数</text>
    <rect x="536" y="192" width="80" height="44" rx="8" fill="#fff" stroke="#cfe0f2"/><text x="576" y="210" fill="#1b2a4a">idx 13</text><text x="576" y="226" font-size="9" fill="#5b7db1">未达多数</text>
  </g>
  <line x1="632" y1="164" x2="632" y2="248" stroke="#e0654f" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="700" y="200" font-size="10" fill="#5b7db1">commitIndex</text>
  <text x="700" y="216" font-size="10" fill="#5b7db1">= 11 这道线</text>
  <text x="700" y="232" font-size="9.5" fill="#a1a1a6">左侧可出队</text>

  <!-- ⑤ leaderLoop commitCh -->
  <rect x="30" y="278" width="470" height="118" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="300" font-size="11.5" font-weight="700" fill="#1b2a4a">⑤ leaderLoop · case commitCh(raft.go:786)</text>
  <text x="46" y="320" font-size="10" fill="#5b7db1">setCommitIndex(commitment.getCommitIndex())</text>
  <text x="46" y="338" font-size="10" fill="#5b7db1">从 inflight.Front() 起取出所有 index ≤ commitIndex</text>
  <text x="46" y="356" font-size="10" fill="#5b7db1">→ 收进 groupFutures,调 processLogs 后 inflight.Remove</text>
  <rect x="46" y="366" width="440" height="22" rx="6" fill="#fff" stroke="#cfe0f2"/>
  <text x="56" y="381" font-size="9.5" fill="#5b7db1">配置日志提交则同步 committedConfiguration;移除自身则 stepDown</text>

  <!-- ⑥ runFSM apply -->
  <rect x="530" y="278" width="480" height="118" rx="12" fill="#f5faf6" stroke="#c9e6cf" filter="url(#soft)"/>
  <text x="546" y="300" font-size="11.5" font-weight="700" fill="#1f5130">⑥ processLogs → fsmMutateCh → runFSM(fsm.go:86)</text>
  <text x="546" y="320" font-size="10" fill="#4f8b63">按序调宿主 FSM.Apply(*Log)(可选 ApplyBatch)</text>
  <text x="546" y="338" font-size="10" fill="#4f8b63">拿到业务返回值 resp</text>
  <rect x="546" y="350" width="448" height="38" rx="8" fill="#fff" stroke="#c9e6cf"/>
  <text x="558" y="369" font-size="10.5" font-weight="600" fill="#1f5130">future.respond(resp) → 唤醒 ApplyFuture</text>
  <text x="558" y="383" font-size="9.5" fill="#4f8b63">宿主 .Error()/.Response() 解除阻塞,拿到「已提交且已 apply」的结果</text>

  <path d="M488,254 L400,276" stroke="#4a7fd0" stroke-width="1.5" fill="none" marker-end="url(#aB)"/>
  <path d="M500,340 L528,340" stroke="#2f9e6e" stroke-width="1.6" fill="none" marker-end="url(#aG)"/>
  <path d="M770,388 C400,470 260,150 320,134" stroke="#2f9e6e" stroke-width="1.4" fill="none" marker-end="url(#aG)" stroke-dasharray="5 4"/>
  <text x="300" y="460" font-size="9.5" fill="#2f9e6e">respond 回传 → 宿主 ① 处的 Future 被唤醒</text>

  <!-- 失败路径 -->
  <rect x="30" y="418" width="622" height="66" rx="12" fill="#fbf1f0" stroke="#f2cfca" filter="url(#soft)"/>
  <text x="46" y="440" font-size="11.5" font-weight="700" fill="#8a2b1f">失败路径 · 失去领导权(runLeader 退出 raft.go:519)</text>
  <text x="46" y="459" font-size="10" fill="#c4675a">遍历 inflight 里所有未提交的 logFuture → future.respond(ErrLeadershipLost)</text>
  <text x="46" y="476" font-size="10" fill="#c4675a">宿主的 Apply 阻塞立即解除并拿到错误 → 需向新 Leader 重试,绝不会静默丢写</text>

  <!-- 关键点 -->
  <rect x="668" y="418" width="342" height="66" rx="12" fill="#f7f7f9" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="684" y="440" font-size="11.5" font-weight="700" fill="#1d1d1f">为什么要 inflight 队列</text>
  <text x="684" y="459" font-size="10" fill="#6e6e73">它把「日志 index」与「等待中的 Future」绑定;</text>
  <text x="684" y="476" font-size="10" fill="#6e6e73">commitIndex 一推进,就能精确出队并逐个唤醒。</text>

  <text x="30" y="508" font-size="10.5" fill="#6e6e73">线性一致落点:客户端看到 Apply 成功,当且仅当该命令已被多数派持久化并在本机 FSM 应用——commitIndex 只前进不后退,故已回结果的写永不丢失。</text>
  <text x="30" y="528" font-size="10.5" fill="#6e6e73">本任期约束:commitment 要求 quorumMatchIndex ≥ startIndex(本任期首条日志),Leader 只能通过提交本任期新日志间接提交旧任期日志,防提交回滚。</text>
</svg>
