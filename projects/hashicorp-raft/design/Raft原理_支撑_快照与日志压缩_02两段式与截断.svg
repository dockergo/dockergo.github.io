<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="536" viewBox="0 0 1020 536" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/>
    </filter>
    <marker id="aA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#cf972b"/></marker>
    <marker id="aG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="aB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#4a7fd0"/></marker>
  </defs>
  <rect width="1020" height="536" fill="#fbfbfd"/>

  <rect x="0" y="0" width="1020" height="46" fill="#f4f5f7" stroke="#e6e6eb"/>
  <text x="30" y="27" font-size="15" font-weight="700" fill="#1d1d1f">快照两段式 + 日志截断窗口 · 为什么 Snapshot 要快返回、日志能删多少</text>
  <text x="30" y="40" font-size="10.5" fill="#8a8a90">Snapshot() 只捕状态指针秒回,重 IO 交给 Persist 并与后续 Apply 并发;截断保留尾部 TrailingLogs 供增量追平</text>

  <g font-size="10">
    <rect x="700" y="12" width="12" height="12" rx="3" fill="#fbf7ef" stroke="#cf972b"/><text x="716" y="22" fill="#3a3a3c">快照/存储</text>
    <rect x="800" y="12" width="12" height="12" rx="3" fill="#f5faf6" stroke="#2f9e6e"/><text x="816" y="22" fill="#3a3a3c">FSM/并发 Apply</text>
    <rect x="928" y="12" width="12" height="12" rx="3" fill="#eef3fb" stroke="#4a7fd0"/><text x="944" y="22" fill="#3a3a3c">控制</text>
  </g>

  <!-- 上半:两段式 -->
  <text x="30" y="70" font-size="12.5" font-weight="700" fill="#1d1d1f">一、两段式:Snapshot() 快返回 · Persist(sink) 重 IO(fsm.go:32-43)</text>

  <rect x="30" y="80" width="300" height="150" rx="12" fill="#f5faf6" stroke="#c9e6cf" filter="url(#soft)"/>
  <text x="46" y="102" font-size="11.5" font-weight="700" fill="#1f5130">① FSM.Snapshot() — 快</text>
  <text x="46" y="122" font-size="10" fill="#4f8b63">只捕获状态「指针/版本号」</text>
  <text x="46" y="139" font-size="10" fill="#4f8b63">不做重 IO,毫秒级返回</text>
  <text x="46" y="156" font-size="10" fill="#4f8b63">尽快放行 → 不阻塞 apply 流水线</text>
  <rect x="46" y="168" width="268" height="50" rx="8" fill="#fff" stroke="#c9e6cf"/>
  <text x="58" y="187" font-size="10" fill="#1f5130">返回 FSMSnapshot(持有那一刻的状态视图)</text>
  <text x="58" y="205" font-size="9.5" fill="#4f8b63">在 runFSM 内产生,与共识主线解耦</text>

  <rect x="360" y="80" width="320" height="150" rx="12" fill="#fbf7ef" stroke="#ead9b3" filter="url(#soft)"/>
  <text x="376" y="102" font-size="11.5" font-weight="700" fill="#8a5a12">② FSMSnapshot.Persist(sink) — 重</text>
  <text x="376" y="122" font-size="10" fill="#a07a1e">全量状态写入 SnapshotStore 的 sink</text>
  <text x="376" y="139" font-size="10" fill="#a07a1e">耗时 IO,但此时不占共识主线</text>
  <rect x="376" y="150" width="288" height="68" rx="8" fill="#eef6f0" stroke="#c9e6cf"/>
  <text x="388" y="169" font-size="10.5" font-weight="600" fill="#1f5130">关键:可与后续 FSM.Apply 并发</text>
  <text x="388" y="187" font-size="10" fill="#4f8b63">→ FSM 必须支持「边写快照边接新命令」</text>
  <text x="388" y="204" font-size="10" fill="#4f8b63">的并发读(fsm.go:35 明确要求)</text>

  <rect x="710" y="80" width="280" height="150" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="726" y="102" font-size="11.5" font-weight="700" fill="#1b2a4a">③ Release() — 收尾</text>
  <text x="726" y="122" font-size="10" fill="#5b7db1">无论 Persist 是否被调,</text>
  <text x="726" y="139" font-size="10" fill="#5b7db1">Raft 总会调 Release 释放资源</text>
  <rect x="726" y="150" width="248" height="68" rx="8" fill="#fff" stroke="#cfe0f2"/>
  <text x="738" y="169" font-size="10" fill="#1b2a4a">Snapshot() 产出的快照未必真被存</text>
  <text x="738" y="187" font-size="10" fill="#5b7db1">(Raft 可能丢弃),Persist 也许不调;</text>
  <text x="738" y="205" font-size="10" fill="#5b7db1">但 Release 一定调 → 资源不泄漏</text>

  <path d="M330,155 L356,155" stroke="#cf972b" stroke-width="1.6" fill="none" marker-end="url(#aA)"/>
  <path d="M680,155 L706,155" stroke="#4a7fd0" stroke-width="1.6" fill="none" marker-end="url(#aB)"/>

  <!-- 下半:截断窗口 -->
  <text x="30" y="270" font-size="12.5" font-weight="700" fill="#1d1d1f">二、截断窗口:maxLog = min(snapIdx, lastLogIdx − TrailingLogs)(snapshot.go:217)</text>

  <!-- 日志轴 -->
  <rect x="60" y="300" width="360" height="46" rx="8" fill="#fbf1f0" stroke="#f2cfca"/>
  <text x="240" y="322" font-size="10.5" font-weight="600" fill="#8a2b1f" text-anchor="middle">被删除区间 DeleteRange(FirstIndex, maxLog)</text>
  <text x="240" y="338" font-size="9.5" fill="#c4675a" text-anchor="middle">这些日志已被快照覆盖,可回收</text>

  <rect x="420" y="300" width="230" height="46" rx="8" fill="#fbf7ef" stroke="#ead9b3"/>
  <text x="535" y="322" font-size="10.5" font-weight="600" fill="#8a5a12" text-anchor="middle">保留:TrailingLogs 尾巴</text>
  <text x="535" y="338" font-size="9.5" fill="#a07a1e" text-anchor="middle">默认 10240 条,供增量追平</text>

  <rect x="650" y="300" width="310" height="46" rx="8" fill="#eef6f0" stroke="#c9e6cf"/>
  <text x="805" y="322" font-size="10.5" font-weight="600" fill="#1f5130" text-anchor="middle">快照点之后的新日志(绝不删)</text>
  <text x="805" y="338" font-size="9.5" fill="#4f8b63" text-anchor="middle">尚未进快照,删了会丢数据</text>

  <!-- 轴刻度 -->
  <line x1="60" y1="360" x2="960" y2="360" stroke="#c7c7cc" stroke-width="1.4"/>
  <g font-size="9.5" fill="#6e6e73" text-anchor="middle">
    <line x1="60" y1="354" x2="60" y2="366" stroke="#86868b" stroke-width="1.4"/><text x="60" y="382">FirstIndex</text>
    <line x1="420" y1="354" x2="420" y2="366" stroke="#e0654f" stroke-width="1.6"/><text x="420" y="382" fill="#8a2b1f">maxLog</text>
    <line x1="650" y1="354" x2="650" y2="366" stroke="#cf972b" stroke-width="1.6"/><text x="650" y="382" fill="#8a5a12">snapIdx</text>
    <line x1="960" y1="354" x2="960" y2="366" stroke="#86868b" stroke-width="1.4"/><text x="928" y="382">lastLogIdx</text>
  </g>
  <text x="535" y="398" font-size="9.5" fill="#a07a1e" text-anchor="middle">↑ lastLogIdx − TrailingLogs(尾巴左界)</text>

  <!-- 规则说明 -->
  <rect x="30" y="412" width="960" height="112" rx="13" fill="#f7f7f9" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="46" y="434" font-size="11.5" font-weight="700" fill="#1d1d1f">两条铁律,一句话</text>
  <text x="46" y="455" font-size="10.5" fill="#6e6e73"><tspan font-weight="600" fill="#8a5a12">① 至少留 TrailingLogs 条尾巴</tspan>:落后不多的 follower 可用增量 AppendEntries 追上,避免动辄走昂贵的 InstallSnapshot 全量传输。</text>
  <text x="46" y="475" font-size="10.5" fill="#6e6e73"><tspan font-weight="600" fill="#1f5130">② 绝不删快照点(snapIdx)之后的日志</tspan>:那部分状态还没进快照,取 min(snapIdx, …) 确保截断边界永不越过快照覆盖点。</text>
  <text x="46" y="495" font-size="10.5" fill="#6e6e73">若 lastLogIdx ≤ TrailingLogs 或 minLog &gt; maxLog,则「无可截断」直接返回——日志太少时不动手。</text>
  <text x="46" y="514" font-size="10.5" fill="#6e6e73">触发:runSnapshots 定时 + 阈值(delta = lastIndex − lastSnap ≥ SnapshotThreshold 8192),或宿主 Snapshot() API 手动触发。</text>
</svg>
