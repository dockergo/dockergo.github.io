<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="740" viewBox="0 0 1040 740" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/>
    </filter>
    <marker id="aHot" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#0a84ff"/></marker>
    <marker id="aCtl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#7c5fe6"/></marker>
    <marker id="aState" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#0f9e8e"/></marker>
    <marker id="aFail" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#e8730f"/></marker>
  </defs>

  <rect x="0" y="0" width="1040" height="740" fill="#fbfbfd"/>

  <!-- ===== 标题条 ===== -->
  <rect x="0" y="0" width="1040" height="48" fill="#f4f5f7" stroke="#e6e6eb" data-tid="Raft原理_全景主线框架" data-lab="全景总览"/>
  <text x="24" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Raft 总架构 · 复制状态机</text>
  <text x="250" y="30" font-size="11.5" fill="#8a8a90">Leader 单写 → 多数派复制 → 各副本 FSM 收敛到同一序列</text>

  <!-- ===== ① 宿主进程 + 编程 API ===== -->
  <rect x="40" y="52" width="960" height="46" rx="10" fill="#eef0f3" stroke="#d2d6dd" data-tid="Raft原理_接口_编程API与接口注入" data-lab="宿主进程注入六件套"/>
  <text x="56" y="72" font-size="12.5" font-weight="600" fill="#33373e">宿主进程</text>
  <text x="56" y="88" font-size="10.5" fill="#8a8a90">注入六件套 · FSM / LogStore / StableStore / SnapshotStore / Transport / Config</text>
  <text x="820" y="80" font-size="10" fill="#a1a1a6" text-anchor="middle"></text>

  <rect x="40" y="122" width="960" height="70" rx="11" fill="#e9edf6" stroke="#c6d2ea" data-tid="Raft原理_接口_编程API与接口注入" data-lab="编程 API"/>
  <text x="56" y="144" font-size="12.5" font-weight="600" fill="#274a78">编程 API · 接触面</text>
  <g font-size="11" text-anchor="middle" fill="#33373e">
    <rect x="150" y="152" width="150" height="30" rx="8" fill="#fff" stroke="#c6d2ea"/><text x="225" y="171"><tspan font-weight="600">Apply</tspan> 提交命令</text>
    <rect x="316" y="152" width="150" height="30" rx="8" fill="#fff" stroke="#c6d2ea"/><text x="391" y="171"><tspan font-weight="600">AddVoter</tspan> 成员变更</text>
    <rect x="482" y="152" width="150" height="30" rx="8" fill="#fff" stroke="#c6d2ea"/><text x="557" y="171"><tspan font-weight="600">Snapshot</tspan> 触发快照</text>
    <rect x="648" y="152" width="150" height="30" rx="8" fill="#fff" stroke="#c6d2ea"/><text x="723" y="171"><tspan font-weight="600">VerifyLeader</tspan> 线性读</text>
    <rect x="814" y="152" width="120" height="30" rx="8" fill="#fff" stroke="#c6d2ea"/><text x="874" y="171"><tspan font-weight="600">Barrier</tspan> 屏障</text>
  </g>

  <!-- Hot 主数据流:Apply → 日志复制(进核心) -->
  <line x1="225" y1="192" x2="225" y2="224" stroke="#0a84ff" stroke-width="2.2" marker-end="url(#aHot)"/>
  <text x="235" y="212" font-size="10" font-weight="600" fill="#0a84ff">写请求 Hot</text>

  <!-- ===== ② Raft 核心 6 盒 ===== -->
  <text x="60" y="238" font-size="11" font-weight="600" fill="#8a8a90">Raft 核心 run 三态主循环</text>

  <!-- 选举 -->
  <rect x="60" y="248" width="280" height="106" rx="12" fill="#eef0f3" stroke="#d2d6dd" filter="url(#soft)" data-tid="Raft原理_支撑_Leader选举" data-lab="Leader 选举"/>
  
  <text x="80" y="272" font-size="13" font-weight="700" fill="#1d1d1f">Leader 选举</text>
  <text x="80" y="290" font-size="10.5" fill="#5b6470">term++ → pre-vote → electSelf → 多数派</text>
  <text x="80" y="308" font-size="10" fill="#8a8a90">runCandidate</text>
  <text x="80" y="326" font-size="10" fill="#8a8a90">quorumSize 简单多数 · 每 term 至多一票</text>
  <text x="322" y="345" font-size="9.5" fill="#a1a1a6" text-anchor="end">control</text>

  <!-- 日志复制 (Hot center) -->
  <rect x="370" y="248" width="280" height="106" rx="12" fill="#e9f2ff" stroke="#a9ccf5" filter="url(#soft)" data-tid="Raft原理_支撑_日志复制" data-lab="日志复制"/>
  
  <text x="390" y="272" font-size="13" font-weight="700" fill="#0a3d78">日志复制</text>
  <text x="390" y="290" font-size="10.5" fill="#2a5a92">Leader 每 follower 一 goroutine 并行发</text>
  <text x="390" y="308" font-size="10" fill="#4a7ab0">replicate</text>
  <text x="390" y="326" font-size="10" fill="#4a7ab0">appendEntries 一致性检查</text>
  <text x="632" y="345" font-size="9.5" fill="#0a84ff" text-anchor="end" font-weight="600">Hot Path</text>

  <!-- 提交与应用 -->
  <rect x="680" y="248" width="280" height="106" rx="12" fill="#eef0f3" stroke="#d2d6dd" filter="url(#soft)" data-tid="Raft原理_支撑_提交与应用" data-lab="提交与应用"/>
  
  <text x="700" y="272" font-size="13" font-weight="700" fill="#1d1d1f">提交与应用</text>
  <text x="700" y="290" font-size="10.5" fill="#5b6470">多数派 matchIndex → commitIndex</text>
  <text x="700" y="308" font-size="10" fill="#8a8a90">commitment.recalculate</text>
  <text x="700" y="326" font-size="10" fill="#8a8a90">仅提交当前 term(startIndex 约束)</text>
  <text x="942" y="345" font-size="9.5" fill="#a1a1a6" text-anchor="end">FSM.Apply</text>

  <!-- 成员变更 -->
  <rect x="60" y="372" width="280" height="106" rx="12" fill="#eef0f3" stroke="#d2d6dd" filter="url(#soft)" data-tid="Raft原理_支撑_成员变更" data-lab="成员变更"/>
  
  <text x="80" y="396" font-size="13" font-weight="700" fill="#1d1d1f">成员变更</text>
  <text x="80" y="414" font-size="10.5" fill="#5b6470">single-server:一次 ±1 节点</text>
  <text x="80" y="432" font-size="10" fill="#8a8a90">LogConfiguration 走日志</text>
  <text x="80" y="450" font-size="10" fill="#8a8a90">配置差 ≤1 → 新旧多数派必相交</text>

  <!-- 可靠性/脑裂防护 -->
  <rect x="370" y="372" width="280" height="106" rx="12" fill="#fdf2ea" stroke="#f0cdaa" filter="url(#soft)" data-tid="Raft原理_支撑_可靠性与脑裂防护" data-lab="可靠性与脑裂防护"/>
  
  <text x="390" y="396" font-size="13" font-weight="700" fill="#8a4a12">可靠性 · 脑裂防护</text>
  <text x="390" y="414" font-size="10.5" fill="#a8641e">分区 → 心跳超时 → 重选举</text>
  <text x="390" y="432" font-size="10" fill="#b5793a">pre-vote 防无谓抬 term</text>
  <text x="390" y="450" font-size="10" fill="#b5793a">VerifyLeader 拒旧 Leader 陈旧读</text>
  <text x="632" y="469" font-size="9.5" fill="#e8730f" text-anchor="end" font-weight="600">Failure Path</text>

  <!-- 三状态机 -->
  <rect x="680" y="372" width="280" height="106" rx="12" fill="#eef0f3" stroke="#d2d6dd" filter="url(#soft)" data-tid="Raft原理_支撑_Leader选举" data-lab="三状态机"/>
  
  <text x="700" y="396" font-size="13" font-weight="700" fill="#1d1d1f">三状态机</text>
  <g font-size="10.5" text-anchor="middle" fill="#33373e">
    <rect x="700" y="408" width="76" height="26" rx="7" fill="#fff" stroke="#d2d6dd"/><text x="738" y="425">Follower</text>
    <rect x="784" y="408" width="80" height="26" rx="7" fill="#fff" stroke="#d2d6dd"/><text x="824" y="425">Candidate</text>
    <rect x="872" y="408" width="72" height="26" rx="7" fill="#fff" stroke="#d2d6dd"/><text x="908" y="425">Leader</text>
  </g>
  <text x="700" y="452" font-size="10" fill="#8a8a90">runFollower/Candidate/Leader</text>
  <text x="700" y="468" font-size="10" fill="#8a8a90">heartbeat 维持领导权(与复制解耦)</text>

  <!-- 核心内连线:选举→复制(control), 复制→提交(hot), 可靠性→选举(failure回环) -->
  <line x1="340" y1="301" x2="368" y2="301" stroke="#7c5fe6" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#aCtl)"/>
  <line x1="650" y1="301" x2="678" y2="301" stroke="#0a84ff" stroke-width="2.2" marker-end="url(#aHot)"/>
  <path d="M370,425 L250,425 L250,356" stroke="#e8730f" stroke-width="1.6" stroke-dasharray="3 3" fill="none" marker-end="url(#aFail)"/>
  <text x="258" y="372" font-size="9" fill="#e8730f">超时重选</text>
  <line x1="820" y1="354" x2="820" y2="406" stroke="#7c5fe6" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#aCtl)"/>

  <!-- Hot 下行:提交 → 注入 FSM -->
  <line x1="138" y1="478" x2="138" y2="558" stroke="#0f9e8e" stroke-width="1.6" marker-end="url(#aState)"/>
  <text x="146" y="522" font-size="9.5" fill="#0f9e8e">State</text>

  <!-- ===== ③ 注入接口层 5 cell ===== -->
  <text x="52" y="556" font-size="11" font-weight="600" fill="#8a8a90">注入接口 · 宿主实现的五大插件</text>
  <g font-size="10.5" text-anchor="middle">
    <rect x="52" y="566" width="172" height="32" rx="8" fill="#e6f4f1" stroke="#b9dfd8" data-tid="Raft原理_支撑_提交与应用" data-lab="FSM Apply"/><text x="138" y="586" fill="#0f6b5e"><tspan font-weight="600">FSM</tspan> → Apply 用户态</text>
    <rect x="236" y="566" width="172" height="32" rx="8" fill="#e6f4f1" stroke="#b9dfd8" data-tid="Raft原理_支撑_持久状态" data-lab="LogStore 日志"/><text x="322" y="586" fill="#0f6b5e"><tspan font-weight="600">LogStore</tspan> 日志</text>
    <rect x="420" y="566" width="172" height="32" rx="8" fill="#e6f4f1" stroke="#b9dfd8" data-tid="Raft原理_支撑_持久状态" data-lab="StableStore term/vote"/><text x="506" y="586" fill="#0f6b5e"><tspan font-weight="600">StableStore</tspan> term/vote</text>
    <rect x="604" y="566" width="172" height="32" rx="8" fill="#e6f4f1" stroke="#b9dfd8" data-tid="Raft原理_支撑_快照与日志压缩" data-lab="SnapshotStore 快照"/><text x="690" y="586" fill="#0f6b5e"><tspan font-weight="600">SnapshotStore</tspan> 快照</text>
    <rect x="788" y="566" width="200" height="32" rx="8" fill="#e9edf6" stroke="#c6d2ea" data-tid="Raft原理_支撑_Transport与RPC" data-lab="Transport RPC"/><text x="888" y="586" fill="#274a78"><tspan font-weight="600">Transport</tspan> 节点间 RPC</text>
  </g>

  <!-- 状态落盘 -->
  <line x1="322" y1="598" x2="322" y2="624" stroke="#0f9e8e" stroke-width="1.6" marker-end="url(#aState)"/>
  <line x1="506" y1="598" x2="506" y2="624" stroke="#0f9e8e" stroke-width="1.6" marker-end="url(#aState)"/>
  <line x1="888" y1="598" x2="888" y2="624" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#aState)"/>

  <!-- ===== ④ 底层 IO band ===== -->
  <rect x="40" y="632" width="450" height="60" rx="11" fill="#eef0f3" stroke="#d2d6dd" data-tid="Raft原理_支撑_持久状态" data-lab="磁盘持久化"/>
  <text x="60" y="656" font-size="12.5" font-weight="600" fill="#33373e">磁盘持久化 · State Path</text>
  <text x="60" y="676" font-size="10.5" fill="#8a8a90">CurrentTerm / LastVoteTerm / LastVoteCand + 日志 + 快照</text>

  <rect x="550" y="632" width="450" height="60" rx="11" fill="#eef0f3" stroke="#d2d6dd" data-tid="Raft原理_支撑_Transport与RPC" data-lab="网络 RPC"/>
  <text x="570" y="656" font-size="12.5" font-weight="600" fill="#33373e">网络 RPC · pipeline / heartbeat</text>
  <text x="570" y="676" font-size="10.5" fill="#8a8a90">AppendEntries 流水线复制(不等响应)Opt</text>

  <!-- ===== 图例(右下角 铭牌)===== -->
  <g font-size="10" fill="#5b6470">
    <line x1="60" y1="716" x2="86" y2="716" stroke="#0a84ff" stroke-width="2.2"/><text x="92" y="719">Hot 主数据流</text>
    <line x1="192" y1="716" x2="218" y2="716" stroke="#7c5fe6" stroke-width="1.6" stroke-dasharray="6 4"/><text x="224" y="719">Control 控制/选举</text>
    <line x1="352" y1="716" x2="378" y2="716" stroke="#0f9e8e" stroke-width="1.6"/><text x="384" y="719">State 状态落盘</text>
    <line x1="486" y1="716" x2="512" y2="716" stroke="#e8730f" stroke-width="1.6" stroke-dasharray="3 3"/><text x="518" y="719">Failure 分区/重选</text>
    <line x1="640" y1="716" x2="666" y2="716" stroke="#c7c7cc" stroke-width="1.5"/><text x="672" y="719">Opt 流水线/批</text>
  </g>
</svg>
