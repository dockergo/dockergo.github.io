<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="640" viewBox="0 0 1060 640" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="640" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StorageFactory 分发：按 ENGINE= 名查注册表 → creator_fn 造对象</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">StorageFactory::get → registerStorageMergeTree::create 映射引擎名到 MergingParams::mode</text>

  <!-- flow -->
  <g text-anchor="middle">
    <rect x="60" y="82" width="200" height="60" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="160" y="106" font-size="11" font-weight="600" fill="#1b2a4a">AST: ENGINE=MergeTree</text><text x="160" y="124" font-size="8.5" fill="#5b7db1">engine_def.name</text>
    <rect x="300" y="82" width="200" height="60" rx="11" fill="#fbeef0" stroke="#f0cdd4" filter="url(#soft)"/><text x="400" y="102" font-size="10.5" font-weight="600" fill="#7a2230">缺 ENGINE= ?</text><text x="400" y="120" font-size="8.5" fill="#a44">抛 ENGINE_REQUIRED</text>
    <rect x="540" y="82" width="220" height="60" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="650" y="102" font-size="10.5" font-weight="600" fill="#274a78">查注册表 storages.find</text><text x="650" y="120" font-size="8.5" fill="#5b7db1">校验能力位 supports_*</text>
    <rect x="800" y="82" width="220" height="60" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="910" y="102" font-size="10.5" font-weight="600" fill="#12402a">creator_fn(arguments)</text><text x="910" y="120" font-size="8.5" fill="#2f6f4f">分发到具体引擎</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="260" y1="112" x2="300" y2="112" marker-end="url(#ar)"/>
    <line x1="500" y1="112" x2="540" y2="112" marker-end="url(#ar)"/>
    <line x1="760" y1="112" x2="800" y2="112" marker-end="url(#ar)"/>
  </g>

  <!-- engine name -> MergingParams::mode mapping -->
  <rect x="40" y="170" width="600" height="320" rx="13" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="340" y="194" font-size="12" font-weight="700" fill="#7a5a1e" text-anchor="middle">registerStorageMergeTree：引擎名 → MergingParams::mode</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="60" y="208" width="180" height="40" rx="8" fill="#fff" stroke="#efdcb4"/><text x="150" y="226" font-size="9.5" fill="#5a3410">MergeTree</text><text x="150" y="240" fill="#93762e">Ordinary</text>
    <rect x="252" y="208" width="180" height="40" rx="8" fill="#fff" stroke="#efdcb4"/><text x="342" y="226" font-size="9.5" fill="#5a3410">ReplacingMergeTree</text><text x="342" y="240" fill="#93762e">Replacing</text>
    <rect x="444" y="208" width="180" height="40" rx="8" fill="#fff" stroke="#efdcb4"/><text x="534" y="226" font-size="9.5" fill="#5a3410">SummingMergeTree</text><text x="534" y="240" fill="#93762e">Summing</text>
    <rect x="60" y="256" width="180" height="40" rx="8" fill="#fff" stroke="#efdcb4"/><text x="150" y="274" font-size="9.5" fill="#5a3410">AggregatingMergeTree</text><text x="150" y="288" fill="#93762e">→ Aggregating</text>
    <rect x="252" y="256" width="180" height="40" rx="8" fill="#fff" stroke="#efdcb4"/><text x="342" y="274" font-size="9.5" fill="#5a3410">CollapsingMergeTree</text><text x="342" y="288" fill="#93762e">Collapsing</text>
    <rect x="444" y="256" width="180" height="40" rx="8" fill="#fff" stroke="#efdcb4"/><text x="534" y="274" font-size="9.5" fill="#5a3410">VersionedCollapsing</text><text x="534" y="288" fill="#93762e">VersionedCollapsing</text>
  </g>
  <text x="340" y="322" font-size="10" font-weight="600" fill="#7a5a1e" text-anchor="middle">解析尾部引擎参数（进 MergingParams）</text>
  <g text-anchor="start" font-size="9">
    <text x="70" y="346" fill="#93762e">sign_column（Collapsing 用）</text>
    <text x="360" y="346" fill="#93762e">version_column / is_deleted</text>
    <text x="70" y="366" fill="#93762e">columns_to_sum（Summing）</text>
    <text x="360" y="366" fill="#93762e">graphite rollup 参数</text>
  </g>
  <rect x="60" y="384" width="560" height="88" rx="9" fill="#fff" stroke="#efdcb4"/>
  <text x="340" y="404" font-size="9.5" font-weight="600" fill="#5a3410" text-anchor="middle">最终产物</text>
  <text x="340" y="424" font-size="9" fill="#93762e" text-anchor="middle">make_shared&lt;StorageMergeTree&gt;（单机）</text>
  <text x="340" y="442" font-size="9" fill="#93762e" text-anchor="middle">或 StorageReplicatedMergeTree（带 Replicated 前缀）</text>
  <text x="340" y="462" font-size="8.5" fill="#b08843" text-anchor="middle">同一份 create 代码，engine 名决定 mode 与是否复制</text>

  <!-- capability flags check -->
  <rect x="660" y="170" width="360" height="320" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="840" y="194" font-size="12" font-weight="700" fill="#274a78" text-anchor="middle">能力位校验</text>
  <text x="840" y="214" font-size="9" fill="#5b7db1" text-anchor="middle">引擎声明支持哪些子句，用错即报错</text>
  <g text-anchor="start" font-size="9">
    <rect x="680" y="228" width="320" height="30" rx="7" fill="#fff" stroke="#cfe0f2"/><text x="694" y="247" fill="#274a78">supports_sort_order　→ ORDER BY 是否合法</text>
    <rect x="680" y="264" width="320" height="30" rx="7" fill="#fff" stroke="#cfe0f2"/><text x="694" y="283" fill="#274a78">supports_settings　→ SETTINGS 是否合法</text>
    <rect x="680" y="300" width="320" height="30" rx="7" fill="#fff" stroke="#cfe0f2"/><text x="694" y="319" fill="#274a78">supports_ttl　→ TTL 子句是否合法</text>
    <rect x="680" y="336" width="320" height="30" rx="7" fill="#fff" stroke="#cfe0f2"/><text x="694" y="355" fill="#274a78">supports_skipping_indices　→ INDEX 是否合法</text>
    <rect x="680" y="372" width="320" height="30" rx="7" fill="#fff" stroke="#cfe0f2"/><text x="694" y="391" fill="#274a78">supports_projections　→ PROJECTION 是否合法</text>
  </g>
  <text x="840" y="428" font-size="8.5" fill="#8aa6cf" text-anchor="middle">例：给 Memory 引擎写 ORDER BY / TTL</text>
  <text x="840" y="444" font-size="8.5" fill="#8aa6cf" text-anchor="middle">会因能力位不支持而在建表期报错</text>
  <text x="840" y="466" font-size="8.5" fill="#8aa6cf" text-anchor="middle">→ 这是"选错引擎"的第一道拦截</text>

  <rect x="40" y="510" width="980" height="106" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="534" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="556" font-size="10" fill="#4b4b50">StorageFactory 是引擎的"总注册表 + 分发器"：按 ENGINE= 名查到 creator_fn，先用能力位挡掉不合法子句，</text>
  <text x="60" y="573" font-size="10" fill="#4b4b50">再把引擎参数造成存储对象。MergeTree 族的所有变体共用一份 create——engine 名映射到 MergingParams::mode，</text>
  <text x="60" y="590" font-size="10" fill="#4b4b50">决定 merge 时的合并语义；带 Replicated 前缀则造 StorageReplicatedMergeTree（多副本）。</text>
</svg>
