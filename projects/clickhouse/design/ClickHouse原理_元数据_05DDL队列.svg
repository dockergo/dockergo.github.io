<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="540" viewBox="0 0 1060 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">分布式 DDL：DDLWorker 与 task_queue（ON CLUSTER 的落地）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">DDLWorker (DDLWorker.h:55) · Keeper 队列 /clickhouse/task_queue/ddl · 完整链路见 DDL·分布式DDL篇</text>

  <g text-anchor="middle">
    <rect x="40" y="88" width="220" height="90" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="150" y="114" font-size="11" font-weight="700" fill="#1b2a4a">发起节点</text><text x="150" y="134" font-size="8.5" fill="#5b7db1">CREATE … ON CLUSTER</text><text x="150" y="152" font-size="8.5" fill="#5b7db1">executeDDLQueryOnCluster</text><text x="150" y="168" font-size="8" fill="#8aa6cf">建 DDLLogEntry</text>
    <rect x="320" y="80" width="300" height="110" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="470" y="104" font-size="11.5" font-weight="700" fill="#12402a">Keeper 队列</text><text x="470" y="124" font-size="8.5" fill="#2f6f4f">/clickhouse/task_queue/ddl</text><text x="470" y="144" font-size="8.5" fill="#2f6f4f">query-000...（PersistentSequential）</text><text x="470" y="164" font-size="8" fill="#4c8567">每 entry 下有 active/finished 子节点</text><text x="470" y="180" font-size="8" fill="#4c8567">DDLWorker::enqueueQuery（:1080）</text>
    <rect x="680" y="88" width="340" height="90" rx="13" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="850" y="112" font-size="11" font-weight="700" fill="#274a78">各节点 DDLWorker（:55）</text><text x="850" y="132" font-size="8.5" fill="#5b7db1">runMainThread 拉队列</text><text x="850" y="150" font-size="8.5" fill="#5b7db1">判断是否目标 host → 执行</text><text x="850" y="168" font-size="8" fill="#8aa6cf">回写 finished/&lt;host_id&gt; 状态</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="260" y1="133" x2="320" y2="133" marker-end="url(#ar)"/>
    <line x1="620" y1="133" x2="680" y2="133" marker-end="url(#ar)"/>
  </g>
  <text x="290" y="125" font-size="8" fill="#8a8a8f">写队列</text>
  <text x="650" y="125" font-size="8" fill="#8a8a8f">拉取执行</text>

  <!-- two paths -->
  <rect x="40" y="210" width="480" height="130" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="280" y="234" font-size="11" font-weight="700" fill="#274a78" text-anchor="middle">路径① ON CLUSTER（显式）</text>
  <text x="60" y="258" font-size="9.5" fill="#5b7db1">· 每条 DDL 手动带 ON CLUSTER &lt;name&gt;</text>
  <text x="60" y="278" font-size="9.5" fill="#5b7db1">· 经 task_queue/ddl 队列播到集群各节点</text>
  <text x="60" y="298" font-size="9.5" fill="#5b7db1">· 适合偶发的、指定范围的 DDL</text>
  <text x="60" y="320" font-size="9" fill="#8aa6cf">· 副本表的 DDL 只在 leader 执行一次再复制</text>

  <rect x="540" y="210" width="480" height="130" rx="13" fill="#f6f2fb" stroke="#d9c9ec"/>
  <text x="780" y="234" font-size="11" font-weight="700" fill="#3d2a5a" text-anchor="middle">路径② Replicated 库（自动）</text>
  <text x="560" y="258" font-size="9.5" fill="#7a5da5">· 库级自动，库内所有 DDL 都同步</text>
  <text x="560" y="278" font-size="9.5" fill="#7a5da5">· 无需每条写 ON CLUSTER</text>
  <text x="560" y="298" font-size="9.5" fill="#7a5da5">· 经库自己的 /log（DatabaseReplicated）</text>
  <text x="560" y="320" font-size="9" fill="#9a7cc4">· 更省心，适合"整库全集群一致"</text>

  <rect x="40" y="356" width="980" height="76" rx="13" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="60" y="380" font-size="11" font-weight="700" fill="#7a5a1e">诊断</text>
  <text x="60" y="402" font-size="9.5" fill="#93762e">· system.distributed_ddl_queue：看每条 ON CLUSTER DDL 在各节点的执行状态</text>
  <text x="60" y="420" font-size="9.5" fill="#93762e">· distributed_ddl_task_timeout 控制发起端等待所有节点 finished 的超时；超时后任务仍在队列异步完成</text>

  <rect x="40" y="448" width="980" height="76" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="472" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="494" font-size="10" fill="#4b4b50">分布式 DDL 靠 Keeper 队列 task_queue/ddl + 各节点 DDLWorker 拉取执行：发起端写带目标 hosts 的 entry，</text>
  <text x="60" y="511" font-size="10" fill="#4b4b50">各节点拉队列、判是否目标、执行并回写状态。ON CLUSTER（显式）与 Replicated 库（自动）是两条 DDL 播全集群的路径。</text>
</svg>
