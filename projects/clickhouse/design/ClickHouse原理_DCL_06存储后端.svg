<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="580" viewBox="0 0 1060 580" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="580" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">AccessStorage 多后端：SQL 权限经 Keeper 全集群一致 vs users.xml 节点本地</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">IAccessStorage · MultipleAccessStorage 聚合 · ReplicatedAccessStorage 经 Keeper</text>

  <!-- multiple aggregator -->
  <rect x="380" y="72" width="300" height="50" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="530" y="92" font-size="11" font-weight="700" fill="#1b2a4a" text-anchor="middle">MultipleAccessStorage（"multiple"）</text>
  <text x="530" y="110" font-size="8.5" fill="#5b7db1" text-anchor="middle">聚合下列所有后端，统一查询</text>

  <!-- backends -->
  <g text-anchor="middle">
    <rect x="40" y="160" width="230" height="150" rx="12" fill="#f2fbf6" stroke="#cdeadb" filter="url(#soft)"/>
    <text x="155" y="182" font-size="11" font-weight="700" fill="#12402a">ReplicatedAccessStorage</text>
    <text x="155" y="200" font-size="8" fill="#2f6f4f">"replicated" · ReplicatedAccessStorage</text>
    <text x="155" y="222" font-size="9" fill="#12402a">存 Keeper znode</text>
    <text x="155" y="240" font-size="8.5" fill="#2f6f4f">/uuid/&lt;uuid&gt;</text>
    <text x="155" y="262" font-size="9" font-weight="600" fill="#12402a">✓ 全集群一致</text>
    <text x="155" y="280" font-size="8" fill="#4c8567">watching 线程监听变更</text>
    <text x="155" y="296" font-size="8" fill="#4c8567">refreshEntity</text>

    <rect x="290" y="160" width="230" height="150" rx="12" fill="#fdf9f0" stroke="#efe3cd" filter="url(#soft)"/>
    <text x="405" y="182" font-size="11" font-weight="700" fill="#5a3410">DiskAccessStorage</text>
    <text x="405" y="200" font-size="8" fill="#93762e">"local_directory"</text>
    <text x="405" y="222" font-size="9" fill="#5a3410">SQL 创建的实体</text>
    <text x="405" y="240" font-size="8.5" fill="#93762e">本地 &lt;uuid&gt;.sql</text>
    <text x="405" y="262" font-size="9" font-weight="600" fill="#5a3410">节点本地（不复制）</text>
    <text x="405" y="280" font-size="8" fill="#b08843">默认开启</text>
    <text x="405" y="296" font-size="8" fill="#b08843">access_control_path 设时</text>

    <rect x="540" y="160" width="230" height="150" rx="12" fill="#f6f2fb" stroke="#d9c9ec" filter="url(#soft)"/>
    <text x="655" y="182" font-size="11" font-weight="700" fill="#3d2a5a">UsersConfigAccessStorage</text>
    <text x="655" y="200" font-size="8" fill="#7a5da5">"users_xml"</text>
    <text x="655" y="222" font-size="9" fill="#3d2a5a">来自 users.xml</text>
    <text x="655" y="240" font-size="8.5" fill="#7a5da5">周期性重载</text>
    <text x="655" y="262" font-size="9" font-weight="600" fill="#3d2a5a">节点本地 · 只读</text>
    <text x="655" y="280" font-size="8" fill="#9a7cc4">改一台不影响其他节点</text>
    <text x="655" y="296" font-size="8" fill="#9a7cc4">配置即代码</text>

    <rect x="790" y="160" width="230" height="150" rx="12" fill="#f7f7f9" stroke="#e6e6ea" filter="url(#soft)"/>
    <text x="905" y="182" font-size="11" font-weight="700" fill="#6b6b70">其余</text>
    <text x="905" y="204" font-size="9" fill="#6b6b70">MemoryAccessStorage</text>
    <text x="905" y="220" font-size="8" fill="#9a9a9f">"memory" · 内存临时</text>
    <text x="905" y="244" font-size="9" fill="#6b6b70">LDAPAccessStorage</text>
    <text x="905" y="260" font-size="8" fill="#9a9a9f">"ldap" · 外部目录</text>
    <text x="905" y="288" font-size="8" fill="#9a9a9f">按需组合进 multiple</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.3" fill="none">
    <line x1="470" y1="122" x2="200" y2="160" marker-end="url(#ar)"/>
    <line x1="510" y1="122" x2="405" y2="160" marker-end="url(#ar)"/>
    <line x1="550" y1="122" x2="655" y2="160" marker-end="url(#ar)"/>
    <line x1="590" y1="122" x2="890" y2="160" marker-end="url(#ar)"/>
  </g>

  <!-- key contrast -->
  <rect x="40" y="330" width="980" height="110" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="354" font-size="11.5" font-weight="700" fill="#274a78">关键区别：SQL 权限如何全集群生效</text>
  <text x="60" y="376" font-size="9.5" fill="#5b7db1">· SQL 方式（CREATE USER / GRANT）：默认写本地 DiskAccessStorage（节点本地）；多节点集群应改用 ReplicatedAccessStorage，</text>
  <text x="60" y="394" font-size="9.5" fill="#5b7db1">　实体存 Keeper，watching 线程监听 → GRANT/CREATE USER 在任一节点执行即全集群自动生效</text>
  <text x="60" y="414" font-size="9.5" fill="#5b7db1">· 配置方式（users.xml）：节点本地、只读——改一台不影响其他，适合"配置即代码"但不能 SQL 动态改</text>
  <text x="60" y="432" font-size="9" fill="#8aa6cf">access_control_improvements.* 多数 true（少数为兼容默认 false）</text>

  <rect x="40" y="454" width="980" height="96" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="478" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="500" font-size="10" fill="#4b4b50">访问实体存于多后端，由 MultipleAccessStorage 聚合：SQL 创建默认落本地 DiskAccessStorage，users.xml 是节点本地只读，</text>
  <text x="60" y="517" font-size="10" fill="#4b4b50">而 ReplicatedAccessStorage 经 Keeper 让 SQL 权限全集群一致。多节点集群务必启用 replicated，否则各节点权限会漂移。</text>
  <text x="60" y="538" font-size="9" fill="#8a8a8f">这正是 DCL 依赖「元数据与协调」（Keeper）的体现。</text>
</svg>
