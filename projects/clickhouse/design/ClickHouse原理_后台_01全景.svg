<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="560" viewBox="0 0 1060 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">后台调度全景：两类执行器承接各能力域的异步部分（正交维度）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">MergeTreeBackgroundExecutor 重任务 · BackgroundSchedulePool 轻周期任务 · 非第 8 个能力域</text>

  <!-- two executors -->
  <rect x="40" y="80" width="480" height="200" rx="14" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="280" y="104" font-size="12" font-weight="700" fill="#5a3410" text-anchor="middle">MergeTreeBackgroundExecutor（重任务）</text>
  <text x="280" y="122" font-size="8.5" fill="#93762e" text-anchor="middle">MergeTreeBackgroundExecutor · 独立线程池</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="60" y="136" width="105" height="40" rx="7" fill="#fff" stroke="#efdcb4"/><text x="112" y="160" fill="#5a3410">merge</text>
    <rect x="175" y="136" width="105" height="40" rx="7" fill="#fff" stroke="#efdcb4"/><text x="227" y="160" fill="#5a3410">mutate</text>
    <rect x="290" y="136" width="105" height="40" rx="7" fill="#fff" stroke="#efdcb4"/><text x="342" y="160" fill="#5a3410">move</text>
    <rect x="405" y="136" width="95" height="40" rx="7" fill="#fff" stroke="#efdcb4"/><text x="452" y="160" fill="#5a3410">fetch</text>
  </g>
  <text x="280" y="200" font-size="9" fill="#93762e" text-anchor="middle">运行时队列：RoundRobin / Priority / Dynamic</text>
  <text x="280" y="222" font-size="8.5" fill="#b08843" text-anchor="middle">重、有状态、耗 IO/CPU 的任务</text>
  <text x="280" y="242" font-size="8.5" fill="#b08843" text-anchor="middle">池大小 background_pool_size 等控制</text>
  <text x="280" y="264" font-size="8" fill="#b08843" text-anchor="middle">与前台查询争 CPU/IO → 需与资源调度协同</text>

  <rect x="540" y="80" width="480" height="200" rx="14" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="780" y="104" font-size="12" font-weight="700" fill="#274a78" text-anchor="middle">BackgroundSchedulePool（轻周期任务）</text>
  <text x="780" y="122" font-size="8.5" fill="#5b7db1" text-anchor="middle">Core/BackgroundSchedulePool.h · 定时轻活</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="560" y="136" width="130" height="40" rx="7" fill="#fff" stroke="#cfe0f2"/><text x="625" y="160" fill="#274a78">复制队列拉取</text>
    <rect x="700" y="136" width="130" height="40" rx="7" fill="#fff" stroke="#cfe0f2"/><text x="765" y="160" fill="#274a78">清理/GC</text>
    <rect x="840" y="136" width="160" height="40" rx="7" fill="#fff" stroke="#cfe0f2"/><text x="920" y="160" fill="#274a78">心跳/健康检查</text>
  </g>
  <text x="780" y="200" font-size="9" fill="#5b7db1" text-anchor="middle">轻量、周期性、不耗大量资源</text>
  <text x="780" y="222" font-size="8.5" fill="#8aa6cf" text-anchor="middle">自愈线程（Restarting/PartCheck/Cleanup）多在此</text>
  <text x="780" y="244" font-size="8.5" fill="#8aa6cf" text-anchor="middle">定时触发，做完即让出</text>

  <!-- orthogonal dimension -->
  <rect x="40" y="296" width="980" height="100" rx="13" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="60" y="320" font-size="11.5" font-weight="700" fill="#12402a">核心定位：正交的"执行时机"维度，非第 8 个能力域</text>
  <g text-anchor="middle" font-size="8">
    <rect x="60" y="334" width="130" height="46" rx="7" fill="#fff" stroke="#bfe0cd"/><text x="125" y="352" fill="#12402a">存储→merge</text><text x="125" y="368" fill="#2f6f4f">承接存储异步</text>
    <rect x="200" y="334" width="130" height="46" rx="7" fill="#fff" stroke="#bfe0cd"/><text x="265" y="352" fill="#12402a">DML→mutation</text><text x="265" y="368" fill="#2f6f4f">承接写入异步</text>
    <rect x="340" y="334" width="130" height="46" rx="7" fill="#fff" stroke="#bfe0cd"/><text x="405" y="352" fill="#12402a">复制→fetch</text><text x="405" y="368" fill="#2f6f4f">承接复制异步</text>
    <rect x="480" y="334" width="130" height="46" rx="7" fill="#fff" stroke="#bfe0cd"/><text x="545" y="352" fill="#12402a">集群→move</text><text x="545" y="368" fill="#2f6f4f">承接自愈异步</text>
    <rect x="620" y="334" width="130" height="46" rx="7" fill="#fff" stroke="#bfe0cd"/><text x="685" y="352" fill="#12402a">优化→统计</text><text x="685" y="368" fill="#2f6f4f">承接优化异步</text>
    <rect x="760" y="334" width="240" height="46" rx="7" fill="#f2fbf6" stroke="#cdeadb"/><text x="880" y="352" font-weight="600" fill="#12402a">= 各域异步部分的统一载体</text><text x="880" y="368" fill="#4c8567">不是独立能力，是"何时做"</text>
  </g>

  <rect x="40" y="412" width="980" height="110" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="436" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="458" font-size="10" fill="#4b4b50">后台任务由两类载体承接：MergeTreeBackgroundExecutor 跑重任务（merge/mutate/move/fetch，有独立线程池+优先级队列），</text>
  <text x="60" y="476" font-size="10" fill="#4b4b50">BackgroundSchedulePool 跑轻周期任务（复制拉取/清理/心跳）。它是横切各能力域的"执行时机"维度——</text>
  <text x="60" y="494" font-size="10" fill="#4b4b50" font-weight="600">存储的 merge、DML 的 mutation、复制的 fetch、集群的 move 都在这里被统一调度，而非某个独立能力域的专属。</text>
  <text x="60" y="514" font-size="9" fill="#8a8a8f">配置好后台池是关键：既要跟上写入（防 Part 堆积），又不抢前台查询资源。</text>
</svg>
