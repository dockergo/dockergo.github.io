<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="620" viewBox="0 0 1060 620" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="620" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">写入幂等去重：用块级 hash 替代事务，实现"重试安全"</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">复制表 block_id 写 Keeper /blocks (ReplicatedMergeTreeSink.cpp:645) · insert_deduplicate 默认 true (Settings.cpp:1759)</text>

  <!-- replicated dedup flow -->
  <text x="45" y="86" font-size="12" font-weight="700" fill="#3d2a5a">复制表：block_id → Keeper /blocks</text>
  <g text-anchor="middle">
    <rect x="40" y="98" width="150" height="60" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="115" y="122" font-size="10" font-weight="600" fill="#1b2a4a">INSERT 一批数据</text><text x="115" y="140" font-size="8.5" fill="#5b7db1">算内容 hash → block_id</text>
    <rect x="230" y="98" width="180" height="60" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="320" y="118" font-size="10" font-weight="600" fill="#12402a">查 Keeper /blocks/&lt;id&gt;</text><text x="320" y="136" font-size="8.5" fill="#2f6f4f">makeCreateRequest</text><text x="320" y="150" font-size="8.5" fill="#2f6f4f">Persistent :645</text>
    <rect x="450" y="82" width="260" height="42" rx="10" fill="#fbeef0" stroke="#f0cdd4"/><text x="580" y="102" font-size="9.5" font-weight="600" fill="#7a2230">已存在（ZNODEEXISTS :1037）</text><text x="580" y="117" font-size="8" fill="#a44">→ 这批写过了 → 跳过（去重命中）</text>
    <rect x="450" y="132" width="260" height="42" rx="10" fill="#f2fbf6" stroke="#cdeadb"/><text x="580" y="152" font-size="9.5" font-weight="600" fill="#12402a">不存在</text><text x="580" y="167" font-size="8" fill="#2f6f4f">→ 建 znode + 提交 Part（正常写入）</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <line x1="190" y1="128" x2="230" y2="128" marker-end="url(#ar)"/>
    <path d="M410,120 L450,103" marker-end="url(#ar)"/>
    <path d="M410,136 L450,153" marker-end="url(#ar)"/>
  </g>

  <!-- retry scenario -->
  <rect x="40" y="196" width="480" height="180" rx="13" fill="#f6f2fb" stroke="#d9c9ec"/>
  <text x="280" y="220" font-size="11.5" font-weight="700" fill="#3d2a5a" text-anchor="middle">场景：网络抖动导致客户端重发</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="60" y="234" width="200" height="46" rx="8" fill="#fff" stroke="#d9c9ec"/><text x="160" y="252" font-weight="600" fill="#3d2a5a">第 1 次发送</text><text x="160" y="268" fill="#7a5da5">写成功但 ACK 丢失</text>
    <rect x="300" y="234" width="200" height="46" rx="8" fill="#fff" stroke="#d9c9ec"/><text x="400" y="252" font-weight="600" fill="#3d2a5a">客户端超时重发</text><text x="400" y="268" fill="#7a5da5">同一批数据 → 同 block_id</text>
  </g>
  <rect x="60" y="292" width="440" height="70" rx="9" fill="#f2fbf6" stroke="#cdeadb"/>
  <text x="280" y="312" font-size="9.5" font-weight="600" fill="#12402a" text-anchor="middle">结果：第 2 次去重命中 → 不重复入库</text>
  <text x="280" y="330" font-size="8.5" fill="#2f6f4f" text-anchor="middle">无需事务，也能保证"至多一次"效果</text>
  <text x="280" y="348" font-size="8.5" fill="#4c8567" text-anchor="middle">前提：两次内容完全一致（相同 block_id）</text>

  <!-- non-replicated + quorum -->
  <rect x="540" y="196" width="480" height="180" rx="13" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="780" y="220" font-size="11.5" font-weight="700" fill="#7a5a1e" text-anchor="middle">非复制表 &amp; quorum 写入</text>
  <rect x="560" y="234" width="440" height="60" rx="9" fill="#fff" stroke="#efdcb4"/>
  <text x="780" y="254" font-size="9.5" font-weight="600" fill="#5a3410" text-anchor="middle">非复制表：MergeTreeDeduplicationLog</text>
  <text x="780" y="272" font-size="8.5" fill="#93762e" text-anchor="middle">本地记录近期块 hash · 窗口 non_replicated_deduplication_window</text>
  <text x="780" y="286" font-size="8.5" fill="#b08843" text-anchor="middle">默认 0 = 关闭（MergeTreeSettings.cpp:423）</text>
  <rect x="560" y="302" width="440" height="60" rx="9" fill="#fff" stroke="#efdcb4"/>
  <text x="780" y="322" font-size="9.5" font-weight="600" fill="#5a3410" text-anchor="middle">quorum 写入（可选，更强保证）</text>
  <text x="780" y="340" font-size="8.5" fill="#93762e" text-anchor="middle">insert_quorum=N（默认 0）→ 需 N 副本确认</text>
  <text x="780" y="354" font-size="8.5" fill="#b08843" text-anchor="middle">状态记 Keeper /quorum/status（Sink.cpp:192）</text>

  <!-- contrast -->
  <rect x="40" y="392" width="980" height="96" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="416" font-size="11" font-weight="700" fill="#274a78">对照 Doris：一致性保证方式的根本不同</text>
  <text x="60" y="438" font-size="9.5" fill="#5b7db1">· Doris：导入走 2PC 事务，事务提交即原子可见、重试由事务 label 幂等保证</text>
  <text x="60" y="458" font-size="9.5" fill="#5b7db1">· ClickHouse：无事务；可见性 = Part rename，重试安全 = 块 hash 去重（复制表经 Keeper，默认开）</text>
  <text x="60" y="478" font-size="9.5" fill="#8aa6cf">· 两者都能"重试不重复"，但 CH 用更轻的去重机制换取了写入路径的极简与高吞吐</text>

  <rect x="40" y="506" width="980" height="80" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="530" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="552" font-size="10" fill="#4b4b50">ClickHouse 不用事务保证"重试不重复"，而用块级 hash 幂等去重：复制表把 block_id 写进 Keeper /blocks，</text>
  <text x="60" y="569" font-size="10" fill="#4b4b50">重发同一批数据因 znode 已存在而被跳过（默认开启）。要多副本确认再加 insert_quorum；非复制表去重默认关闭。</text>
</svg>
