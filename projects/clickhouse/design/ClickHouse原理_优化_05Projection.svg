<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="560" viewBox="0 0 1060 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Projection（投影）：Part 内嵌的预计算副本，命中即跳过原表计算</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">optimizeUseAggregateProjections (optimizeTree.cpp:365) / optimizeUseNormalProjections (:385)</text>

  <!-- two projection types -->
  <rect x="40" y="76" width="480" height="200" rx="14" fill="#e9f1fb" stroke="#c4d8f0"/>
  <text x="280" y="100" font-size="12" font-weight="700" fill="#1b2a4a" text-anchor="middle">聚合投影（Aggregate Projection）</text>
  <rect x="60" y="116" width="440" height="60" rx="9" fill="#fff" stroke="#c4d8f0"/>
  <text x="280" y="136" font-size="9" fill="#1b2a4a" text-anchor="middle">预先按某维度聚合好（类似物化视图）</text>
  <text x="280" y="154" font-size="8.5" fill="#5b7db1" text-anchor="middle">如：PROJECTION p (SELECT k, sum(v) GROUP BY k)</text>
  <text x="280" y="170" font-size="8" fill="#8aa6cf" text-anchor="middle">与原表同 Part 内，随写入维护</text>
  <rect x="60" y="186" width="440" height="76" rx="9" fill="#f2fbf6" stroke="#cdeadb"/>
  <text x="280" y="206" font-size="9" font-weight="600" fill="#12402a" text-anchor="middle">查询 SELECT k, sum(v) GROUP BY k</text>
  <text x="280" y="226" font-size="8.5" fill="#2f6f4f" text-anchor="middle">→ optimizeUseAggregateProjections 命中</text>
  <text x="280" y="244" font-size="8.5" fill="#2f6f4f" text-anchor="middle">→ 直接读预聚合结果，跳过原表扫描+聚合</text>
  <text x="280" y="258" font-size="8" fill="#4c8567" text-anchor="middle">可能百倍加速</text>

  <rect x="540" y="76" width="480" height="200" rx="14" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="780" y="100" font-size="12" font-weight="700" fill="#5a3410" text-anchor="middle">普通投影（Normal Projection）</text>
  <rect x="560" y="116" width="440" height="60" rx="9" fill="#fff" stroke="#efdcb4"/>
  <text x="780" y="136" font-size="9" fill="#5a3410" text-anchor="middle">按不同主键重排序的副本</text>
  <text x="780" y="154" font-size="8.5" fill="#93762e" text-anchor="middle">如原表按 (a) 排，投影按 (b) 排</text>
  <text x="780" y="170" font-size="8" fill="#b08843" text-anchor="middle">同数据、不同排序键</text>
  <rect x="560" y="186" width="440" height="76" rx="9" fill="#fffdf5" stroke="#efdcb4"/>
  <text x="780" y="206" font-size="9" font-weight="600" fill="#5a3410" text-anchor="middle">查询 WHERE b = X（原表按 a 排，裁不了）</text>
  <text x="780" y="226" font-size="8.5" fill="#93762e" text-anchor="middle">→ optimizeUseNormalProjections 命中</text>
  <text x="780" y="244" font-size="8.5" fill="#93762e" text-anchor="middle">→ 读按 b 排序的投影，可走主键裁剪</text>
  <text x="780" y="258" font-size="8" fill="#b08843" text-anchor="middle">解决"多种查询模式需要多种排序"</text>

  <!-- cost -->
  <rect x="40" y="290" width="980" height="90" rx="13" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="60" y="314" font-size="11" font-weight="700" fill="#7a2230">代价：空间 + 写入 + merge 维护</text>
  <text x="60" y="336" font-size="9.5" fill="#a44">· 投影是"用空间/写入换查询速度"：每个投影都要额外存储、随每次 INSERT 一起写、随 merge 一起维护</text>
  <text x="60" y="354" font-size="9.5" fill="#a44">· 投影越多，写入越慢、存储越大——不是免费加速</text>
  <text x="60" y="372" font-size="9" fill="#7a2230">· 原则：只给"高频、固定模式"的查询建投影；一次性/临时查询不值得</text>

  <rect x="40" y="394" width="980" height="76" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="418" font-size="11" font-weight="700" fill="#274a78">与其他预计算手段的关系</text>
  <text x="60" y="440" font-size="9.5" fill="#5b7db1">· 物化视图（MV）：独立的表，写入时同步刷新——更灵活但需自己管一致性</text>
  <text x="60" y="458" font-size="9.5" fill="#5b7db1">· Projection：内嵌 Part、随表自动维护——更省心，查询优化器自动命中；聚合类引擎（Summing 等）是另一种预聚合</text>

  <rect x="40" y="484" width="980" height="58" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="508" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="530" font-size="10" fill="#4b4b50">Projection 是 Part 内嵌的预计算副本（预聚合或重排序），优化器自动命中后跳过原表计算/重排，可大幅提速；代价是额外存储+写入+merge 维护，只给高频固定查询建。</text>
</svg>
