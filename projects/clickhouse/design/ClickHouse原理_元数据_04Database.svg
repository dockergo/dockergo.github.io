<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="540" viewBox="0 0 1060 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Database 引擎与表元数据持久化：Atomic（默认）/ Replicated / Ordinary</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">DatabaseOnDisk → DatabaseAtomic → DatabaseReplicated · 详见 DDL·Database 引擎篇</text>

  <!-- inheritance chain -->
  <g text-anchor="middle">
    <rect x="60" y="86" width="260" height="160" rx="13" fill="#fdf9f0" stroke="#efe3cd" filter="url(#soft)"/>
    <text x="190" y="110" font-size="11.5" font-weight="700" fill="#7a5a1e">DatabaseOnDisk（基）</text>
    <text x="190" y="130" font-size="8.5" fill="#93762e">DatabaseOnDisk</text>
    <text x="190" y="152" font-size="9" fill="#5a3410">把表定义持久化为 .sql</text>
    <text x="190" y="172" font-size="9" fill="#5a3410">启动时解析重建表对象</text>
    <text x="190" y="196" font-size="8.5" fill="#b08843">所有磁盘型库的共同基础</text>
    <text x="190" y="216" font-size="8" fill="#8aa6cf">Ordinary 直接继承它</text>
    <text x="190" y="234" font-size="8" fill="#8aa6cf">（旧、不推荐）</text>

    <rect x="400" y="86" width="260" height="160" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="530" y="110" font-size="11.5" font-weight="700" fill="#1b2a4a">DatabaseAtomic（默认）</text>
    <text x="530" y="130" font-size="8.5" fill="#5b7db1">DatabaseAtomic</text>
    <text x="530" y="152" font-size="9" fill="#1b2a4a">加 UUID + 符号链接</text>
    <text x="530" y="172" font-size="9" fill="#1b2a4a">原子 CREATE/DROP/RENAME</text>
    <text x="530" y="196" font-size="8.5" fill="#8aa6cf">数据在 store/&lt;uuid&gt;/</text>
    <text x="530" y="216" font-size="8" fill="#8aa6cf">RENAME 只改链接不搬数据</text>
    <text x="530" y="234" font-size="8" fill="#8aa6cf">v25.8 默认库引擎</text>

    <rect x="740" y="86" width="280" height="160" rx="13" fill="#f6f2fb" stroke="#d9c9ec" filter="url(#soft)"/>
    <text x="880" y="110" font-size="11.5" font-weight="700" fill="#3d2a5a">DatabaseReplicated</text>
    <text x="880" y="130" font-size="8.5" fill="#7a5da5">DatabaseReplicated（继承 Atomic）</text>
    <text x="880" y="152" font-size="9" fill="#3d2a5a">再加：DDL 经 Keeper 同步</text>
    <text x="880" y="172" font-size="9" fill="#3d2a5a">库内所有 DDL 写 /log</text>
    <text x="880" y="196" font-size="8.5" fill="#9a7cc4">DatabaseReplicatedDDLWorker</text>
    <text x="880" y="216" font-size="8" fill="#9a7cc4">各节点自动同步</text>
    <text x="880" y="234" font-size="8" fill="#9a7cc4">无需每条写 ON CLUSTER</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.6" fill="none">
    <line x1="320" y1="166" x2="400" y2="166" marker-end="url(#ar)"/>
    <line x1="660" y1="166" x2="740" y2="166" marker-end="url(#ar)"/>
  </g>
  <text x="360" y="158" font-size="8" fill="#8a8a8f">继承+加原子性</text>
  <text x="700" y="158" font-size="8" fill="#8a8a8f">继承+加复制</text>

  <!-- startup recovery -->
  <rect x="40" y="266" width="980" height="90" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="290" font-size="11" font-weight="700" fill="#274a78">启动恢复流程</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="70" y="304" width="200" height="40" rx="8" fill="#fff" stroke="#cfe0f2"/><text x="170" y="329" fill="#274a78">扫元数据目录（loadTablesMetadata）</text>
    <rect x="300" y="304" width="200" height="40" rx="8" fill="#fff" stroke="#cfe0f2"/><text x="400" y="329" fill="#274a78">解析每个 .sql（parseQueryFromMetadata）</text>
    <rect x="530" y="304" width="200" height="40" rx="8" fill="#fff" stroke="#cfe0f2"/><text x="630" y="329" fill="#274a78">createTableFromAST 重建</text>
    <rect x="760" y="304" width="200" height="40" rx="8" fill="#f2fbf6" stroke="#cdeadb"/><text x="860" y="329" fill="#12402a">attachTable 挂回内存</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.2" fill="none">
    <line x1="270" y1="324" x2="300" y2="324" marker-end="url(#ar)"/>
    <line x1="500" y1="324" x2="530" y2="324" marker-end="url(#ar)"/>
    <line x1="730" y1="324" x2="760" y2="324" marker-end="url(#ar)"/>
  </g>

  <rect x="40" y="372" width="980" height="150" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="396" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="418" font-size="10" fill="#4b4b50">Database 引擎是元数据的组织者：DatabaseOnDisk 把表定义存 .sql，DatabaseAtomic（默认）加 UUID+符号链接实现原子</text>
  <text x="60" y="436" font-size="10" fill="#4b4b50">CREATE/DROP/RENAME，DatabaseReplicated 再把库内 DDL 经 Keeper 同步到所有节点。启动时扫 .sql 逐个解析重建。</text>
  <text x="60" y="460" font-size="10" fill="#4b4b50" font-weight="600">选型：单机默认 Atomic；多节点要 DDL 自动同步用 Replicated 库；Ordinary 已过时。</text>
  <text x="60" y="484" font-size="9" fill="#8a8a8f">与「DDL 数据定义」主线共享这套引擎——那里讲 DDL 视角，这里讲元数据组织视角。</text>
  <text x="60" y="506" font-size="9" fill="#8a8a8f">DatabaseReplicated（库级自动同步）与 ON CLUSTER（每条显式）是两条 DDL 播全集群的路径。</text>
</svg>
