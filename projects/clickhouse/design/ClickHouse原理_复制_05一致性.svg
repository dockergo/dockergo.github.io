<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="560" viewBox="0 0 1060 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">一致性模型：最终一致（默认）vs 实验性 MergeTree 事务</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">默认无 2PC/MVCC · 实验性事务 TransactionLog / MergeTreeTransaction（默认关闭）</text>

  <!-- comparison table -->
  <g font-size="9">
    <rect x="40" y="76" width="200" height="40" rx="8" fill="#f7f7f9" stroke="#e6e6ea"/><text x="140" y="101" font-weight="700" fill="#1d1d1f" text-anchor="middle">维度</text>
    <rect x="246" y="76" width="380" height="40" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="436" y="101" font-weight="700" fill="#12402a" text-anchor="middle">ClickHouse 默认（最终一致）</text>
    <rect x="632" y="76" width="388" height="40" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="826" y="101" font-weight="700" fill="#1b2a4a" text-anchor="middle">Doris 2PC（对照）</text>

    <rect x="40" y="122" width="200" height="44" rx="7" fill="#fdf9f0" stroke="#efe3cd"/><text x="140" y="148" fill="#5a3410" text-anchor="middle">写入原子性</text>
    <rect x="246" y="122" width="380" height="44" rx="7" fill="#fff" stroke="#cdeadb"/><text x="436" y="142" fill="#12402a" text-anchor="middle">单 Part 原子 rename</text><text x="436" y="158" fill="#2f6f4f" text-anchor="middle" font-size="8">无跨 Part/表事务</text>
    <rect x="632" y="122" width="388" height="44" rx="7" fill="#fff" stroke="#bcd0ec"/><text x="826" y="142" fill="#1b2a4a" text-anchor="middle">导入事务原子提交</text><text x="826" y="158" fill="#5b7db1" text-anchor="middle" font-size="8">多表事务可跨表</text>

    <rect x="40" y="172" width="200" height="44" rx="7" fill="#fdf9f0" stroke="#efe3cd"/><text x="140" y="198" fill="#5a3410" text-anchor="middle">多副本可见</text>
    <rect x="246" y="172" width="380" height="44" rx="7" fill="#fff" stroke="#cdeadb"/><text x="436" y="192" fill="#12402a" text-anchor="middle">最终一致（异步复制）</text><text x="436" y="208" fill="#2f6f4f" text-anchor="middle" font-size="8">可选 quorum 加强</text>
    <rect x="632" y="172" width="388" height="44" rx="7" fill="#fff" stroke="#bcd0ec"/><text x="826" y="192" fill="#1b2a4a" text-anchor="middle">事务提交即多副本可见</text>

    <rect x="40" y="222" width="200" height="44" rx="7" fill="#fdf9f0" stroke="#efe3cd"/><text x="140" y="248" fill="#5a3410" text-anchor="middle">重试安全</text>
    <rect x="246" y="222" width="380" height="44" rx="7" fill="#fff" stroke="#cdeadb"/><text x="436" y="248" fill="#12402a" text-anchor="middle">block hash 幂等去重</text>
    <rect x="632" y="222" width="388" height="44" rx="7" fill="#fff" stroke="#bcd0ec"/><text x="826" y="248" fill="#1b2a4a" text-anchor="middle">事务 label 幂等</text>

    <rect x="40" y="272" width="200" height="44" rx="7" fill="#fdf9f0" stroke="#efe3cd"/><text x="140" y="298" fill="#5a3410" text-anchor="middle">隔离级别</text>
    <rect x="246" y="272" width="380" height="44" rx="7" fill="#fff" stroke="#cdeadb"/><text x="436" y="292" fill="#12402a" text-anchor="middle">无（读当前 active Part 集）</text><text x="436" y="308" fill="#2f6f4f" text-anchor="middle" font-size="8">实验性事务提供快照隔离</text>
    <rect x="632" y="272" width="388" height="44" rx="7" fill="#fff" stroke="#bcd0ec"/><text x="826" y="298" fill="#1b2a4a" text-anchor="middle">快照隔离（MVCC）</text>
  </g>

  <!-- experimental txn -->
  <rect x="40" y="332" width="980" height="90" rx="13" fill="#f6f2fb" stroke="#d9c9ec"/>
  <text x="60" y="356" font-size="11" font-weight="700" fill="#3d2a5a">实验性 MergeTree 事务（默认关闭，非生产主流）</text>
  <text x="60" y="378" font-size="9.5" fill="#7a5da5">TransactionLog+ MergeTreeTransaction：提供跨 Part/表原子性与快照隔离（类 MVCC）</text>
  <text x="60" y="396" font-size="9.5" fill="#7a5da5">· 面向"需要事务语义"的边缘场景；默认关，性能/成熟度不及默认路径</text>
  <text x="60" y="414" font-size="9" fill="#9a7cc4">· 定位提醒：ClickHouse 是分析库，事务不是它的核心竞争力——别拿它当 OLTP 用</text>

  <rect x="40" y="440" width="980" height="100" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="464" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="486" font-size="10" fill="#4b4b50">ClickHouse 默认是最终一致：写入=单 Part 原子 rename（无跨 Part 事务），多副本异步收敛，重试靠 block hash 幂等，</text>
  <text x="60" y="504" font-size="10" fill="#4b4b50">无隔离级别。实验性 MergeTree 事务提供跨 Part 原子性 + 快照隔离但默认关闭。</text>
  <text x="60" y="524" font-size="10" fill="#4b4b50" font-weight="600">这是分析库的取舍：用最终一致 + 幂等换写入路径极简与高吞吐，要强一致按需开 quorum + sequential consistency。</text>
</svg>
