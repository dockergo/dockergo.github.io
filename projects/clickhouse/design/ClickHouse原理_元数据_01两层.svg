<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="560" viewBox="0 0 1060 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">元数据两层：本地 .sql（单机权威）+ Keeper znode（集群权威）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">本地 .sql 管"表长什么样"，Keeper 管"多副本/多节点如何一致"</text>

  <!-- local layer -->
  <rect x="40" y="76" width="480" height="230" rx="14" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="280" y="100" font-size="12" font-weight="700" fill="#7a5a1e" text-anchor="middle">本地层（单机权威 · 所有表）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="60" y="116" width="200" height="60" rx="9" fill="#fff" stroke="#efdcb4"/><text x="160" y="138" font-size="9.5" font-weight="600" fill="#5a3410">每表一个 .sql</text><text x="160" y="156" fill="#93762e">DatabaseOnDisk (h:34)</text><text x="160" y="170" fill="#b08843">存 CREATE 语句</text>
    <rect x="280" y="116" width="220" height="60" rx="9" fill="#fff" stroke="#efdcb4"/><text x="390" y="138" font-size="9.5" font-weight="600" fill="#5a3410">数据目录 store/&lt;uuid&gt;/</text><text x="390" y="156" fill="#93762e">Part 文件</text><text x="390" y="170" fill="#b08843">Atomic 引擎默认</text>
  </g>
  <rect x="60" y="186" width="440" height="106" rx="9" fill="#fffdf5" stroke="#efdcb4"/>
  <text x="280" y="206" font-size="9.5" font-weight="600" fill="#5a3410" text-anchor="middle">管什么</text>
  <text x="280" y="226" font-size="8.5" fill="#93762e" text-anchor="middle">表结构、列类型、引擎参数、TTL/索引定义</text>
  <text x="280" y="244" font-size="8.5" fill="#93762e" text-anchor="middle">启动时解析 .sql 重建表对象（loadTablesMetadata）</text>
  <text x="280" y="264" font-size="8.5" fill="#b08843" text-anchor="middle">单机足够——非复制表只需这一层</text>
  <text x="280" y="282" font-size="8" fill="#b08843" text-anchor="middle">改表 = 原子替换 .sql</text>

  <!-- keeper layer -->
  <rect x="540" y="76" width="480" height="230" rx="14" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="780" y="100" font-size="12" font-weight="700" fill="#12402a" text-anchor="middle">集群层（分布式权威 · Keeper znode）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="560" y="116" width="200" height="60" rx="9" fill="#fff" stroke="#bfe0cd"/><text x="660" y="138" font-size="9.5" font-weight="600" fill="#12402a">复制表 znode</text><text x="660" y="156" fill="#2f6f4f">/log /replicas /blocks</text><text x="660" y="170" fill="#4c8567">副本一致的核心</text>
    <rect x="780" y="116" width="220" height="60" rx="9" fill="#fff" stroke="#bfe0cd"/><text x="890" y="138" font-size="9.5" font-weight="600" fill="#12402a">分布式协调 znode</text><text x="890" y="156" fill="#2f6f4f">task_queue/ddl · Replicated 库 /log</text><text x="890" y="170" fill="#4c8567">DDL/访问控制传播</text>
  </g>
  <rect x="560" y="186" width="440" height="106" rx="9" fill="#f2fbf6" stroke="#cdeadb"/>
  <text x="780" y="206" font-size="9.5" font-weight="600" fill="#12402a" text-anchor="middle">管什么</text>
  <text x="780" y="226" font-size="8.5" fill="#2f6f4f" text-anchor="middle">多副本一致、幂等去重、分布式 DDL 队列</text>
  <text x="780" y="244" font-size="8.5" fill="#2f6f4f" text-anchor="middle">Raft 强一致（见 Keeper 篇）</text>
  <text x="780" y="264" font-size="8.5" fill="#4c8567" text-anchor="middle">只有"需要全集群一致"的状态才上 Keeper</text>
  <text x="780" y="282" font-size="8" fill="#4c8567" text-anchor="middle">不存表数据本身</text>

  <rect x="40" y="322" width="980" height="90" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="346" font-size="11" font-weight="700" fill="#274a78">两层的分工与恢复</text>
  <text x="60" y="368" font-size="9.5" fill="#5b7db1">· 非复制表：只用本地 .sql；单机启动即可恢复全部元数据</text>
  <text x="60" y="386" font-size="9.5" fill="#5b7db1">· 复制表：本地 .sql（表结构）+ Keeper（复制拓扑/进度）；恢复需两者都在</text>
  <text x="60" y="404" font-size="9" fill="#8aa6cf">· 备份要点：只备数据文件不够，还须备 .sql 与 Keeper 状态，否则无法重建集群</text>

  <rect x="40" y="428" width="980" height="112" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="452" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="474" font-size="10" fill="#4b4b50">元数据分两层：本地 .sql 是每张表的"长什么样"（单机权威，所有表都有），Keeper znode 是"多副本/多节点如何一致"</text>
  <text x="60" y="492" font-size="10" fill="#4b4b50">（分布式权威，只有需全集群一致的状态才上）。Keeper 不存表数据。</text>
  <text x="60" y="514" font-size="10" fill="#4b4b50" font-weight="600">恢复集群需要两层都在：.sql 给表定义，Keeper 给复制拓扑——只备数据文件不足以恢复。</text>
</svg>
