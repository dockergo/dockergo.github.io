<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="560" viewBox="0 0 1060 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Analyzer：QueryTree 的40+ 个 pass（把 SQL 规整成好优化的语义树）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">QueryTreePassManager 顺序跑 pass · 首个 QueryAnalysisPass（名称解析）· 详见 DQL·分析篇</text>

  <!-- pass pipeline -->
  <rect x="40" y="76" width="980" height="70" rx="12" fill="#f3f7fc" stroke="#cfe0f2"/>
  <g text-anchor="middle" font-size="8.5">
    <rect x="56" y="92" width="150" height="38" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="131" y="110" font-weight="600" fill="#274a78">QueryAnalysisPass</text><text x="131" y="124" fill="#5b7db1">名称解析（首个）</text>
    <rect x="216" y="92" width="150" height="38" rx="7" fill="#fff" stroke="#cfe0f2"/><text x="291" y="110" font-weight="600" fill="#274a78">常量折叠</text><text x="291" y="124" fill="#5b7db1">1+1→2</text>
    <rect x="376" y="92" width="150" height="38" rx="7" fill="#fff" stroke="#cfe0f2"/><text x="451" y="110" font-weight="600" fill="#274a78">谓词化简</text><text x="451" y="124" fill="#5b7db1">恒真/假消除</text>
    <rect x="536" y="92" width="150" height="38" rx="7" fill="#fff" stroke="#cfe0f2"/><text x="611" y="110" font-weight="600" fill="#274a78">函数重写</text><text x="611" y="124" fill="#5b7db1">等价更快形态</text>
    <rect x="696" y="92" width="150" height="38" rx="7" fill="#fff" stroke="#cfe0f2"/><text x="771" y="110" font-weight="600" fill="#274a78">子查询/CTE</text><text x="771" y="124" fill="#5b7db1">展开/规范化</text>
    <rect x="856" y="92" width="148" height="38" rx="7" fill="#f2fbf6" stroke="#cdeadb"/><text x="930" y="110" font-weight="600" fill="#12402a">…40+ 个</text><text x="930" y="124" fill="#2f6f4f">顺序应用</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.2" fill="none">
    <line x1="206" y1="111" x2="216" y2="111" marker-end="url(#ar)"/>
    <line x1="366" y1="111" x2="376" y2="111" marker-end="url(#ar)"/>
    <line x1="526" y1="111" x2="536" y2="111" marker-end="url(#ar)"/>
    <line x1="686" y1="111" x2="696" y2="111" marker-end="url(#ar)"/>
    <line x1="846" y1="111" x2="856" y2="111" marker-end="url(#ar)"/>
  </g>

  <!-- before / after -->
  <rect x="40" y="168" width="480" height="180" rx="13" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="280" y="192" font-size="11" font-weight="700" fill="#7a2230" text-anchor="middle">规整前（用户写的 AST）</text>
  <rect x="60" y="206" width="440" height="126" rx="9" fill="#fff5f6" stroke="#f0cdd4"/>
  <text x="75" y="228" font-size="8.5" fill="#a44" font-family="monospace">SELECT a, count(*) FROM t</text>
  <text x="75" y="248" font-size="8.5" fill="#a44" font-family="monospace">WHERE d = today AND 1=1</text>
  <text x="75" y="268" font-size="8.5" fill="#a44" font-family="monospace">  AND toYear(ts) = 2024</text>
  <text x="75" y="288" font-size="8.5" fill="#a44" font-family="monospace">GROUP BY a</text>
  <text x="75" y="312" font-size="8" fill="#7a2230">· 标识符未绑定 · 有冗余 1=1 · 函数未优化</text>

  <rect x="540" y="168" width="480" height="180" rx="13" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="780" y="192" font-size="11" font-weight="700" fill="#12402a" text-anchor="middle">规整后（QueryTree）</text>
  <rect x="560" y="206" width="440" height="126" rx="9" fill="#f2fbf6" stroke="#cdeadb"/>
  <text x="575" y="228" font-size="8.5" fill="#2f6f4f" font-family="monospace">a → t.a (已绑定列)</text>
  <text x="575" y="248" font-size="8.5" fill="#2f6f4f" font-family="monospace">d = '2024-07-13' (today 折叠)</text>
  <text x="575" y="268" font-size="8.5" fill="#2f6f4f" font-family="monospace">1=1 已消除</text>
  <text x="575" y="288" font-size="8.5" fill="#2f6f4f" font-family="monospace">toYear(ts)=2024 可转区间谓词</text>
  <text x="575" y="312" font-size="8" fill="#12402a">· 标识符已解析 · 冗余已消 · 谓词可下推</text>

  <g stroke="#c7c7cc" stroke-width="1.5" fill="none"><line x1="520" y1="258" x2="540" y2="258" marker-end="url(#ar)"/></g>

  <rect x="40" y="362" width="980" height="90" rx="13" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="60" y="386" font-size="11" font-weight="700" fill="#7a5a1e">为什么规整很重要</text>
  <text x="60" y="408" font-size="9.5" fill="#93762e">· 标识符解析后，优化器才知道每个列/表/函数到底指什么 → 才能做下推、投影匹配、类型推导</text>
  <text x="60" y="426" font-size="9.5" fill="#93762e">· 谓词化简/函数重写把等价但更慢的写法换成更快形态（如把 toYear(ts)=2024 转成 ts 的区间，能走主键裁剪）</text>
  <text x="60" y="444" font-size="9" fill="#b08843">· 好的语义形态是后续所有 QueryPlan 优化与存储裁剪的前提——garbage in, garbage out</text>

  <rect x="40" y="466" width="980" height="76" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="490" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="512" font-size="10" fill="#4b4b50">Analyzer 用40+ 个顺序 pass 把 AST 规整成 QueryTree：解析标识符、折叠常量、化简谓词、重写函数、展开子查询。</text>
  <text x="60" y="529" font-size="10" fill="#4b4b50">这一步不改变结果，只把 SQL 变成"引擎好优化的语义形态"——是 QueryPlan 优化与主键裁剪能生效的前提。</text>
</svg>
