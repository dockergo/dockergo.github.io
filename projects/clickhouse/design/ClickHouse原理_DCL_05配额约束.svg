<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="580" viewBox="0 0 1060 580" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="580" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">配额（Quota）与设置约束（SettingsProfile / Constraints）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">Quota 7 维度按周期限流 · SettingsConstraints check/clamp</text>

  <!-- quota -->
  <rect x="40" y="72" width="480" height="270" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="280" y="96" font-size="12" font-weight="700" fill="#274a78" text-anchor="middle">Quota：按周期限流（7 维度）</text>
  <text x="280" y="114" font-size="8.5" fill="#5b7db1" text-anchor="middle">QuotaDefs · EnabledQuota::checkExceeded</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="60" y="126" width="140" height="40" rx="7" fill="#fff" stroke="#cfe0f2"/><text x="130" y="144" font-weight="600" fill="#274a78">QUERIES</text><text x="130" y="158" fill="#5b7db1">查询次数</text>
    <rect x="210" y="126" width="140" height="40" rx="7" fill="#fff" stroke="#cfe0f2"/><text x="280" y="144" font-weight="600" fill="#274a78">ERRORS</text><text x="280" y="158" fill="#5b7db1">错误次数</text>
    <rect x="360" y="126" width="140" height="40" rx="7" fill="#fff" stroke="#cfe0f2"/><text x="430" y="144" font-weight="600" fill="#274a78">EXECUTION_TIME</text><text x="430" y="158" fill="#5b7db1">执行时长</text>
    <rect x="60" y="172" width="140" height="40" rx="7" fill="#fff" stroke="#cfe0f2"/><text x="130" y="190" font-weight="600" fill="#274a78">READ_ROWS</text><text x="130" y="204" fill="#5b7db1">读取行数</text>
    <rect x="210" y="172" width="140" height="40" rx="7" fill="#fff" stroke="#cfe0f2"/><text x="280" y="190" font-weight="600" fill="#274a78">READ_BYTES</text><text x="280" y="204" fill="#5b7db1">读取字节</text>
    <rect x="360" y="172" width="140" height="40" rx="7" fill="#fff" stroke="#cfe0f2"/><text x="430" y="190" font-weight="600" fill="#274a78">RESULT_ROWS/BYTES</text><text x="430" y="204" fill="#5b7db1">结果量</text>
  </g>
  <rect x="60" y="222" width="440" height="100" rx="9" fill="#f2fbf6" stroke="#cdeadb"/>
  <text x="280" y="242" font-size="9.5" font-weight="600" fill="#12402a" text-anchor="middle">按时间窗口（interval）计量</text>
  <text x="280" y="262" font-size="8.5" fill="#2f6f4f" text-anchor="middle">如"每小时最多 1000 次查询 / 读 10 亿行"</text>
  <text x="280" y="282" font-size="8.5" fill="#2f6f4f" text-anchor="middle">EnabledQuota::used累加消费 → checkExceeded 判超限</text>
  <text x="280" y="304" font-size="8.5" fill="#4c8567" text-anchor="middle">关键：限 read_rows/execution_time 比只限 queries 更能挡"重查询"</text>

  <!-- settings profile / constraints -->
  <rect x="540" y="72" width="480" height="270" rx="13" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="780" y="96" font-size="12" font-weight="700" fill="#12402a" text-anchor="middle">SettingsProfile + Constraints</text>
  <text x="780" y="114" font-size="8.5" fill="#2f6f4f" text-anchor="middle">SettingsProfile · SettingsProfileElement</text>
  <rect x="560" y="126" width="440" height="60" rx="9" fill="#fff" stroke="#bfe0cd"/>
  <text x="780" y="146" font-size="9.5" font-weight="600" fill="#12402a" text-anchor="middle">SettingsProfile：成组应用设置</text>
  <text x="780" y="164" font-size="8.5" fill="#2f6f4f" text-anchor="middle">如 profile 'readonly_user' 统一设 max_memory_usage 等</text>
  <text x="780" y="180" font-size="8" fill="#4c8567" text-anchor="middle">可赋给 User/Role</text>
  <rect x="560" y="196" width="440" height="72" rx="9" fill="#fff" stroke="#bfe0cd"/>
  <text x="780" y="216" font-size="9.5" font-weight="600" fill="#12402a" text-anchor="middle">Constraints：约束设置的取值</text>
  <text x="780" y="234" font-size="8.5" fill="#2f6f4f" text-anchor="middle">min_value / max_value· writability</text>
  <text x="780" y="250" font-size="8.5" fill="#2f6f4f" text-anchor="middle">check → THROW· clamp → 夹取</text>
  <text x="780" y="264" font-size="8" fill="#4c8567" text-anchor="middle">WRITABLE / CONST（只读锁定）</text>
  <rect x="560" y="278" width="440" height="52" rx="9" fill="#f2fbf6" stroke="#cdeadb"/>
  <text x="780" y="298" font-size="9" font-weight="600" fill="#12402a" text-anchor="middle">例：锁定 max_memory_usage 只读</text>
  <text x="780" y="316" font-size="8.5" fill="#2f6f4f" text-anchor="middle">用户无法自行调大 → 防止改坏内存保护</text>

  <!-- shared with resource mainline -->
  <rect x="40" y="356" width="980" height="80" rx="13" fill="#f6f2fb" stroke="#d9c9ec"/>
  <text x="60" y="380" font-size="11" font-weight="700" fill="#3d2a5a">与「资源与负载管理」主线的分工</text>
  <text x="60" y="402" font-size="9.5" fill="#7a5da5">· DCL（本主线）：定义"谁受什么限"——把 Quota/SettingsProfile 作为权限实体挂到 User/Role 上</text>
  <text x="60" y="420" font-size="9.5" fill="#7a5da5">· 资源与负载主线：执行"运行时怎么限"——MemoryTracker/并发控制/调度器在查询执行时实际拦截</text>

  <rect x="40" y="450" width="980" height="100" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="474" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="496" font-size="10" fill="#4b4b50">Quota 按周期在 7 个维度（查询/错误/行/字节/时长）限流；SettingsProfile 成组下发设置，Constraints 约束设置的</text>
  <text x="60" y="513" font-size="10" fill="#4b4b50">取值范围与可写性（可锁只读）。二者作为权限实体由 DCL 定义、由资源主线在运行时执行。</text>
  <text x="60" y="534" font-size="9" fill="#8a8a8f">工程要点：限"重查询"用 read_rows/execution_time；用 Constraints 锁定内存/超时等关键设置防误改。</text>
</svg>
