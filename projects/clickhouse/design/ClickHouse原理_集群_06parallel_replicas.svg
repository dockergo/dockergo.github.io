<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="540" viewBox="0 0 1060 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">parallel replicas：让副本从"纯冗余"变成"也分担读负载"（BETA）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">buildQueryPlanForParallelReplicas (findParallelReplicasQuery.cpp:604) · enable_parallel_replicas · 与 Distributed 正交</text>

  <!-- without -->
  <rect x="40" y="80" width="480" height="180" rx="14" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="280" y="104" font-size="11.5" font-weight="700" fill="#7a2230" text-anchor="middle">不开：副本只是冗余备份</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="60" y="120" width="200" height="60" rx="9" fill="#fff" stroke="#f0cdd4"/><text x="160" y="144" font-weight="600" fill="#7a2230">Replica 1</text><text x="160" y="162" fill="#a44">独自扫整个分片</text>
    <rect x="300" y="120" width="200" height="60" rx="9" fill="#fff5f6" stroke="#f0cdd4"/><text x="400" y="144" font-weight="600" fill="#7a2230">Replica 2（闲）</text><text x="400" y="162" fill="#a44">只备份，不参与查询</text>
  </g>
  <text x="280" y="204" font-size="9" fill="#a44">· 单分片大扫描只用一个副本 → 另一个副本算力浪费</text>
  <text x="280" y="224" font-size="9" fill="#7a2230">· 单分片查询吞吐受限于单副本</text>
  <text x="280" y="244" font-size="8.5" fill="#a44">· 副本纯粹为高可用而存在</text>

  <!-- with -->
  <rect x="540" y="80" width="480" height="180" rx="14" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="780" y="104" font-size="11.5" font-weight="700" fill="#12402a" text-anchor="middle">开：多副本并行分担同分片扫描</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="560" y="120" width="200" height="60" rx="9" fill="#fff" stroke="#bfe0cd"/><text x="660" y="144" font-weight="600" fill="#12402a">Replica 1</text><text x="660" y="162" fill="#2f6f4f">扫分片的前半段</text>
    <rect x="800" y="120" width="200" height="60" rx="9" fill="#f2fbf6" stroke="#cdeadb"/><text x="900" y="144" font-weight="600" fill="#12402a">Replica 2</text><text x="900" y="162" fill="#2f6f4f">扫分片的后半段</text>
  </g>
  <text x="780" y="204" font-size="9" fill="#2f6f4f">· 单分片扫描动态切成多段，分给多副本并行读</text>
  <text x="780" y="224" font-size="9" fill="#4c8567">· 再汇聚结果 → 单分片吞吐 ×副本数</text>
  <text x="780" y="244" font-size="8.5" fill="#4c8567">· 副本既保高可用、又分担读</text>

  <!-- orthogonal -->
  <rect x="40" y="276" width="980" height="90" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="300" font-size="11" font-weight="700" fill="#274a78">与 Distributed 正交</text>
  <text x="60" y="322" font-size="9.5" fill="#5b7db1">· Distributed：跨 shard 分数据（横向）——不同 shard 存不同数据，散射汇聚</text>
  <text x="60" y="340" font-size="9.5" fill="#5b7db1">· parallel replicas：同一 shard 内多副本分扫描（纵向）——同数据、分段并行读</text>
  <text x="60" y="358" font-size="9" fill="#8aa6cf">· 二者可叠加：跨 shard 散射 + 每 shard 内多副本并行 = 两个维度都吃满</text>

  <rect x="40" y="382" width="980" height="140" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="406" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="428" font-size="10" fill="#4b4b50">parallel replicas 把单分片的大扫描动态切成多段、分给该分片的多个副本并行读再汇聚，让副本从纯冗余备份变成</text>
  <text x="60" y="446" font-size="10" fill="#4b4b50">也能分担查询负载——单分片数据大、副本多时显著提升吞吐。它与 Distributed（跨 shard 分数据）正交、可叠加。</text>
  <text x="60" y="470" font-size="10" fill="#4b4b50" font-weight="600">注意：enable_parallel_replicas 是 BETA；对小查询反而增开销，只在单分片大扫描 + 副本多时开。</text>
  <text x="60" y="494" font-size="9" fill="#8a8a8f">规划入口 buildQueryPlanForParallelReplicas（findParallelReplicasQuery.cpp:604）。</text>
  <text x="60" y="512" font-size="9" fill="#8a8a8f">这是"副本"角色的演进：从被动备份到主动分担——集群资源利用率的提升。</text>
</svg>
