<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="580" viewBox="0 0 1060 580" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="580" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">权限判定链路：每条查询经 ContextAccess 鉴权</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">ContextAccess::checkAccess → calculateAccessRights → isGranted</text>

  <g text-anchor="middle">
    <rect x="40" y="88" width="160" height="66" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="120" y="114" font-size="10.5" font-weight="600" fill="#1b2a4a">查询到达</text><text x="120" y="132" font-size="8.5" fill="#5b7db1">已认证的用户上下文</text><text x="120" y="146" font-size="8.5" fill="#5b7db1">要访问某库.表.列</text>
    <rect x="240" y="88" width="180" height="66" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="330" y="108" font-size="10.5" font-weight="600" fill="#274a78">ContextAccess</text><text x="330" y="126" font-size="8.5" fill="#5b7db1">checkAccess(flags, db, table)</text>
    <rect x="460" y="88" width="200" height="66" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="560" y="108" font-size="10.5" font-weight="600" fill="#274a78">calculateAccessRights</text><text x="560" y="126" font-size="8.5" fill="#5b7db1">聚合直接权限 + 角色权限</text><text x="560" y="140" font-size="8.5" fill="#5b7db1">+ 隐式权限</text>
    <rect x="700" y="88" width="180" height="66" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="790" y="108" font-size="10.5" font-weight="600" fill="#12402a">isGranted 判定</text><text x="790" y="126" font-size="8.5" fill="#2f6f4f">在权限树上匹配</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="200" y1="121" x2="240" y2="121" marker-end="url(#ar)"/>
    <line x1="420" y1="121" x2="460" y2="121" marker-end="url(#ar)"/>
    <line x1="660" y1="121" x2="700" y2="121" marker-end="url(#ar)"/>
  </g>
  <g text-anchor="middle">
    <rect x="720" y="180" width="140" height="40" rx="9" fill="#f2fbf6" stroke="#cdeadb"/><text x="790" y="205" font-size="9.5" fill="#12402a">✓ 允许 → 继续执行</text>
    <rect x="880" y="180" width="140" height="40" rx="9" fill="#fbeef0" stroke="#f0cdd4"/><text x="950" y="205" font-size="9.5" fill="#7a2230">✗ 拒绝 → 抛异常</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.3" fill="none">
    <path d="M790,154 L790,180" marker-end="url(#ar)"/>
    <path d="M840,154 L950,180" marker-end="url(#ar)"/>
  </g>

  <rect x="40" y="240" width="480" height="150" rx="13" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="280" y="264" font-size="11.5" font-weight="700" fill="#7a5a1e" text-anchor="middle">判定中的短路（checkAccessImplHelper）</text>
  <text x="60" y="288" font-size="9.5" fill="#93762e">用户已被删除 → 抛 UNKNOWN_USER</text>
  <text x="60" y="308" font-size="9.5" fill="#93762e">full_access（如内部查询）→ 直接放行</text>
  <text x="60" y="328" font-size="9.5" fill="#93762e">否则取含隐式权限的 AccessRights</text>
  <text x="60" y="348" font-size="9.5" fill="#93762e">acs 在权限树上逐级 isGranted 匹配</text>
  <text x="60" y="372" font-size="9" fill="#b08843">失败即抛异常或返回 false</text>

  <rect x="540" y="240" width="480" height="150" rx="13" fill="#f6f2fb" stroke="#d9c9ec"/>
  <text x="780" y="264" font-size="11.5" font-weight="700" fill="#3d2a5a" text-anchor="middle">中枢 AccessControl</text>
  <text x="560" y="288" font-size="9.5" fill="#7a5da5">· 持有各类缓存：context_access / role / row_policy</text>
  <text x="560" y="308" font-size="9.5" fill="#7a5da5">/ quota / settings_profiles</text>
  <text x="560" y="328" font-size="9.5" fill="#7a5da5">认证入口 authenticate</text>
  <text x="560" y="348" font-size="9.5" fill="#7a5da5">· 管理多后端 AccessStorage（见存储后端篇）</text>
  <text x="560" y="372" font-size="9" fill="#9a7cc4">缓存让每查询鉴权无需重算全量权限</text>

  <rect x="40" y="406" width="980" height="76" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="430" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="452" font-size="10" fill="#4b4b50">每条查询在 ContextAccess 鉴权：把用户的直接权限、角色权限、隐式权限聚合成一棵 AccessRights 权限树，</text>
  <text x="60" y="469" font-size="10" fill="#4b4b50">再按 库/表/列 粒度 isGranted 匹配——命中放行、否则抛异常。中枢 AccessControl 用多级缓存加速这一高频判定。</text>
</svg>
