<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="600" viewBox="0 0 1060 600" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="600" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">算子族：表达式 / 过滤 / 聚合 / Join / 排序（各是一类 Transform）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">src/Processors/Transforms/ · Aggregator + AggregatingTransform · HashJoin · 排序 Partial+Merge</text>

  <g text-anchor="middle">
    <rect x="40" y="72" width="310" height="130" rx="12" fill="#f2fbf6" stroke="#cdeadb" filter="url(#soft)"/>
    <text x="195" y="94" font-size="11" font-weight="700" fill="#12402a">表达式 / 过滤</text>
    <text x="195" y="114" font-size="8.5" fill="#2f6f4f">ExpressionTransform · FilterTransform</text>
    <text x="195" y="136" font-size="9" fill="#12402a">按列批量算表达式 / 按掩码筛行</text>
    <text x="195" y="156" font-size="8.5" fill="#4c8567">最基础、最高频的两类算子</text>
    <text x="195" y="176" font-size="8.5" fill="#8aa6cf">FilterTransform 产出行掩码，下游按掩码收缩</text>
    <text x="195" y="192" font-size="8" fill="#8aa6cf">短路求值（and/or/if 惰性）在此</text>

    <rect x="375" y="72" width="310" height="130" rx="12" fill="#e9f1fb" stroke="#c4d8f0" filter="url(#soft)"/>
    <text x="530" y="94" font-size="11" font-weight="700" fill="#1b2a4a">聚合 Aggregation</text>
    <text x="530" y="114" font-size="8.5" fill="#5b7db1">Aggregator + AggregatingTransform</text>
    <text x="530" y="136" font-size="9" fill="#1b2a4a">每线程部分聚合 → 合并</text>
    <text x="530" y="156" font-size="8.5" fill="#5b7db1">大基数切 two-level（阈值 100000）</text>
    <text x="530" y="176" font-size="8.5" fill="#8aa6cf">AggregatingInOrderTransform：输入有序省哈希表</text>
    <text x="530" y="192" font-size="8" fill="#8aa6cf">聚合 state 支持 -State/-Merge 组合函数</text>

    <rect x="710" y="72" width="310" height="130" rx="12" fill="#f6f2fb" stroke="#d9c9ec" filter="url(#soft)"/>
    <text x="865" y="94" font-size="11" font-weight="700" fill="#3d2a5a">Join</text>
    <text x="865" y="114" font-size="8.5" fill="#7a5da5">HashJoin / GraceHashJoin / 排序归并</text>
    <text x="865" y="136" font-size="9" fill="#3d2a5a">按 join_algorithm 择优</text>
    <text x="865" y="156" font-size="8.5" fill="#7a5da5">HashJoin · GraceHashJoin</text>
    <text x="865" y="176" font-size="8.5" fill="#9a7cc4">JoiningTransform 运行期驱动</text>
    <text x="865" y="192" font-size="8" fill="#9a7cc4">选择逻辑详见「DQL」Join 篇</text>

    <rect x="40" y="216" width="470" height="130" rx="12" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
    <text x="275" y="238" font-size="11" font-weight="700" fill="#5a3410">排序 / TopN</text>
    <text x="275" y="258" font-size="8.5" fill="#93762e">PartialSortingTransform → MergeSortingTransform</text>
    <text x="275" y="280" font-size="9" fill="#5a3410">分块排序（各线程） → 归并成全局有序</text>
    <text x="275" y="300" font-size="8.5" fill="#93762e">超内存则外部排序（spill 到磁盘）</text>
    <text x="275" y="320" font-size="8.5" fill="#b08843">TopN：ORDER BY + LIMIT 只保 top-k，不全排</text>

    <rect x="530" y="216" width="490" height="130" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
    <text x="775" y="238" font-size="11" font-weight="700" fill="#12402a">其他常见 Transform</text>
    <text x="550" y="260" font-size="9" fill="#2f6f4f" text-anchor="start">· LimitTransform：截断行数（配合 pull 早停）</text>
    <text x="550" y="280" font-size="9" fill="#2f6f4f" text-anchor="start">· DistinctTransform：去重</text>
    <text x="550" y="300" font-size="9" fill="#2f6f4f" text-anchor="start">· MergingAggregatedTransform：合并部分聚合结果</text>
    <text x="550" y="320" font-size="9" fill="#2f6f4f" text-anchor="start">· Resize：多路 ↔ 单路的宽度调整</text>
  </g>

  <!-- common shape -->
  <rect x="40" y="360" width="980" height="90" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="384" font-size="11" font-weight="700" fill="#274a78">共同形态：都是 IProcessor 子类</text>
  <text x="60" y="406" font-size="9.5" fill="#5b7db1">· 每类算子 = 一个 Transform（IProcessor 子类），实现 prepare/work，吃 Chunk 吐 Chunk</text>
  <text x="60" y="424" font-size="9.5" fill="#5b7db1">· 有状态算子（聚合/join/排序）在 work 里累积状态；无状态算子（表达式/过滤）逐 Chunk 直接变换</text>
  <text x="60" y="442" font-size="9" fill="#8aa6cf">· 有状态算子是内存与 spill 的主要来源——大 GROUP BY/join/sort 要关注内存上限</text>

  <rect x="40" y="464" width="980" height="90" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="488" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="510" font-size="10" fill="#4b4b50">算子族都是 IProcessor 子类（Transform）：表达式/过滤无状态、逐 Chunk 变换；聚合/join/排序有状态、在 work 里累积。</text>
  <text x="60" y="528" font-size="10" fill="#4b4b50">聚合两阶段（部分→合并，大基数切 two-level）、join 按算法择优、排序分块+归并——有状态算子是内存与 spill 的主战场。</text>
  <text x="60" y="546" font-size="9" fill="#8a8a8f">聚合/join 的策略细节见「DQL 数据查询」深化篇。</text>
</svg>
