<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="760" viewBox="0 0 1060 760" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="760" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">读取路径 + PREWHERE：先读判断列过滤，再按存活行读投影列</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">MergeTreeReadPoolBase → MergeTreeSelectProcessor → MergeTreeRangeReader · WHERE→PREWHERE 自动 (optimize_move_to_prewhere 默认 true, Settings.cpp:722)</text>

  <!-- top flow -->
  <g text-anchor="middle">
    <rect x="30" y="78" width="150" height="70" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="105" y="104" font-size="10.5" font-weight="600" fill="#1b2a4a">裁剪得 MarkRange</text><text x="105" y="122" font-size="8.5" fill="#5b7db1">主键 + 跳数 + 分区</text><text x="105" y="137" font-size="8.5" fill="#5b7db1">→ 要读的 granule 段</text>
    <rect x="204" y="78" width="160" height="70" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="284" y="100" font-size="10.5" font-weight="600" fill="#274a78">ReadPool 分派</text><text x="284" y="118" font-size="8.5" fill="#5b7db1">MergeTreeReadPoolBase.h:10</text><text x="284" y="133" font-size="8.5" fill="#5b7db1">MarkRange → 多线程任务</text>
    <rect x="388" y="78" width="160" height="70" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="468" y="100" font-size="10.5" font-weight="600" fill="#274a78">SelectProcessor</text><text x="468" y="118" font-size="8.5" fill="#5b7db1">驱动逐 task 读取</text><text x="468" y="133" font-size="8.5" fill="#5b7db1">交给 RangeReader</text>
    <rect x="572" y="78" width="180" height="70" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="662" y="100" font-size="10.5" font-weight="600" fill="#12402a">RangeReader 分步读</text><text x="662" y="118" font-size="8.5" fill="#2f6f4f">PrewhereExprInfo::steps</text><text x="662" y="133" font-size="8.5" fill="#2f6f4f">MergeTreeRangeReader.h:50</text>
    <rect x="776" y="78" width="254" height="70" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/><text x="903" y="100" font-size="10.5" font-weight="600" fill="#5a3410">输出向量化 Block</text><text x="903" y="118" font-size="8.5" fill="#93762e">交执行引擎 Pipeline</text><text x="903" y="133" font-size="8.5" fill="#93762e">见「执行引擎」主线</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="180" y1="113" x2="204" y2="113" marker-end="url(#ar)"/>
    <line x1="364" y1="113" x2="388" y2="113" marker-end="url(#ar)"/>
    <line x1="548" y1="113" x2="572" y2="113" marker-end="url(#ar)"/>
    <line x1="752" y1="113" x2="776" y2="113" marker-end="url(#ar)"/>
  </g>

  <!-- PREWHERE deep dive -->
  <text x="45" y="188" font-size="13" font-weight="700" fill="#12402a">PREWHERE 是什么：为什么能省 IO</text>
  <text x="45" y="206" font-size="9.5" fill="#4c8567">tryBuildPrewhereSteps (MergeTreeSplitPrewhereIntoReadSteps.cpp:209) 把过滤拆成多步，executePrewhereActionsAndFilterColumns 逐步应用</text>

  <!-- without prewhere -->
  <rect x="40" y="222" width="470" height="240" rx="14" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="275" y="246" font-size="12" font-weight="700" fill="#7a2230" text-anchor="middle">❌ 普通 WHERE（无 PREWHERE）</text>
  <text x="275" y="264" font-size="9" fill="#a44" text-anchor="middle">SELECT big_col WHERE rare_flag = 1</text>
  <g text-anchor="middle">
    <rect x="64" y="280" width="422" height="50" rx="9" fill="#fff" stroke="#f0cdd4"/><text x="275" y="300" font-size="9.5" fill="#7a2230">① 读齐所有列（rare_flag + big_col）整段 granule</text><text x="275" y="316" font-size="8.5" fill="#a44">big_col 很宽，但先全读进来</text>
    <rect x="64" y="342" width="422" height="46" rx="9" fill="#fff" stroke="#f0cdd4"/><text x="275" y="362" font-size="9.5" fill="#7a2230">② 再用 rare_flag=1 过滤</text><text x="275" y="378" font-size="8.5" fill="#a44">若只有 0.1% 命中…</text>
    <rect x="64" y="400" width="422" height="46" rx="9" fill="#fff" stroke="#f0cdd4"/><text x="275" y="420" font-size="9.5" fill="#7a2230">③ 99.9% 读进来的 big_col 白读了</text><text x="275" y="436" font-size="8.5" fill="#a44">→ 大量无用列 IO</text>
  </g>

  <!-- with prewhere -->
  <rect x="550" y="222" width="480" height="240" rx="14" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="790" y="246" font-size="12" font-weight="700" fill="#12402a" text-anchor="middle">✓ PREWHERE（自动或手写）</text>
  <text x="790" y="264" font-size="9" fill="#2f6f4f" text-anchor="middle">先读窄列 rare_flag，过滤后再读 big_col</text>
  <g text-anchor="middle">
    <rect x="574" y="280" width="432" height="50" rx="9" fill="#fff" stroke="#bfe0cd"/><text x="790" y="300" font-size="9.5" fill="#12402a">① 只读判断列 rare_flag（窄）</text><text x="790" y="316" font-size="8.5" fill="#4c8567">代价极小</text>
    <rect x="574" y="342" width="432" height="46" rx="9" fill="#fff" stroke="#bfe0cd"/><text x="790" y="362" font-size="9.5" fill="#12402a">② 算出存活行掩码（哪些行 =1）</text><text x="790" y="378" font-size="8.5" fill="#4c8567">大部分 granule 被整段跳过</text>
    <rect x="574" y="400" width="432" height="46" rx="9" fill="#fff" stroke="#bfe0cd"/><text x="790" y="420" font-size="9.5" fill="#12402a">③ 只对存活行读 big_col</text><text x="790" y="436" font-size="8.5" fill="#4c8567">→ 省下 99.9% 的 big_col IO</text>
  </g>

  <!-- auto move -->
  <rect x="40" y="484" width="990" height="118" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="506" font-size="12" font-weight="700" fill="#274a78">自动化：MergeTreeWhereOptimizer 把 WHERE 里选择性高的条件下移为 PREWHERE</text>
  <text x="60" y="528" font-size="9.5" fill="#5b7db1">· MergeTreeWhereOptimizer.h:34 · 默认开启 optimize_move_to_prewhere（Settings.cpp:722）——用户写普通 WHERE 也能享受</text>
  <text x="60" y="546" font-size="9.5" fill="#5b7db1">· 可多步 PREWHERE：先最便宜/最能筛的条件，层层缩小存活集，再逐步读更贵的列</text>
  <text x="60" y="564" font-size="9.5" fill="#5b7db1">· 手写 PREWHERE 可覆盖优化器判断（当你比统计更了解选择性时）</text>
  <text x="60" y="586" font-size="9.5" fill="#8aa6cf">· 本质：把"过滤"尽量前移、把"读宽列"尽量后延，是列存 + 稀疏索引之外第三大读性能杠杆</text>

  <rect x="40" y="620" width="990" height="88" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="644" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="666" font-size="10" fill="#4b4b50">读取路径三级收窄：分区/主键/跳数索引先把 granule 段缩小 → ReadPool 多线程分派 → RangeReader 用 PREWHERE</text>
  <text x="60" y="683" font-size="10" fill="#4b4b50">先读窄判断列过滤、再按存活行读宽投影列。PREWHERE 默认自动开启，是"少读列"的关键，与主键"少读段"互补。</text>
</svg>
