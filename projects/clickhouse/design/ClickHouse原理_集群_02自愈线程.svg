<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="560" viewBox="0 0 1060 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">副本自愈线程：围绕 Keeper znode 的健康闭环（无人工干预）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">RestartingThread · PartCheckThread · CleanupThread · 发现异常 → 从健康副本恢复</text>

  <g text-anchor="middle">
    <rect x="40" y="80" width="310" height="150" rx="13" fill="#f6f2fb" stroke="#d9c9ec" filter="url(#soft)"/>
    <text x="195" y="104" font-size="11" font-weight="700" fill="#3d2a5a">RestartingThread</text>
    <text x="195" y="126" font-size="9" fill="#7a5da5">Keeper 会话恢复</text>
    <text x="195" y="146" font-size="9" fill="#7a5da5">重新注册副本到 /replicas</text>
    <text x="195" y="166" font-size="9" fill="#7a5da5">拉起复制队列</text>
    <text x="195" y="190" font-size="8.5" fill="#9a7cc4">触发：Keeper 断连/重连</text>
    <text x="195" y="210" font-size="8" fill="#9a7cc4">保证副本重新"上线"</text>

    <rect x="375" y="80" width="310" height="150" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="530" y="104" font-size="11" font-weight="700" fill="#1b2a4a">PartCheckThread</text>
    <text x="530" y="126" font-size="9" fill="#5b7db1">校验本地 Part 完整性</text>
    <text x="530" y="146" font-size="9" fill="#5b7db1">对比 Keeper 记录 vs 本地实际</text>
    <text x="530" y="166" font-size="9" fill="#5b7db1">损坏/缺失 → 标记重新 fetch</text>
    <text x="530" y="190" font-size="8.5" fill="#8aa6cf">触发：周期 / 发现异常</text>
    <text x="530" y="210" font-size="8" fill="#8aa6cf">数据损坏的自动修复入口</text>

    <rect x="710" y="80" width="310" height="150" rx="13" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
    <text x="865" y="104" font-size="11" font-weight="700" fill="#5a3410">CleanupThread</text>
    <text x="865" y="126" font-size="9" fill="#93762e">清理过期 /log entry</text>
    <text x="865" y="146" font-size="9" fill="#93762e">清理旧 /blocks（去重记录）</text>
    <text x="865" y="166" font-size="9" fill="#93762e">清理 outdated Part</text>
    <text x="865" y="190" font-size="8.5" fill="#b08843">触发：周期</text>
    <text x="865" y="210" font-size="8" fill="#b08843">防 znode/磁盘无限膨胀</text>
  </g>

  <!-- healing loop -->
  <rect x="40" y="250" width="980" height="170" rx="14" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="530" y="274" font-size="12" font-weight="700" fill="#12402a" text-anchor="middle">自愈闭环</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="80" y="292" width="180" height="60" rx="9" fill="#fff" stroke="#bfe0cd"/><text x="170" y="316" font-size="9.5" font-weight="600" fill="#12402a">① 发现问题</text><text x="170" y="334" fill="#2f6f4f">Part 损坏/副本落后</text><text x="170" y="347" fill="#4c8567">/会话丢失</text>
    <rect x="310" y="292" width="180" height="60" rx="9" fill="#fff" stroke="#bfe0cd"/><text x="400" y="316" font-size="9.5" font-weight="600" fill="#12402a">② 定位健康源</text><text x="400" y="334" fill="#2f6f4f">查 Keeper 找有该 Part</text><text x="400" y="347" fill="#4c8567">的健康副本</text>
    <rect x="540" y="292" width="180" height="60" rx="9" fill="#fff" stroke="#bfe0cd"/><text x="630" y="316" font-size="9.5" font-weight="600" fill="#12402a">③ 恢复</text><text x="630" y="334" fill="#2f6f4f">fetch Part / 重新注册</text><text x="630" y="347" fill="#4c8567">/RESTORE REPLICA</text>
    <rect x="770" y="292" width="180" height="60" rx="9" fill="#f2fbf6" stroke="#cdeadb"/><text x="860" y="316" font-size="9.5" font-weight="600" fill="#12402a">④ 回到一致</text><text x="860" y="334" fill="#2f6f4f">副本重新健康</text><text x="860" y="347" fill="#4c8567">无需人工</text>
  </g>
  <g stroke="#9ccbb0" stroke-width="1.4" fill="none">
    <line x1="260" y1="322" x2="310" y2="322" marker-end="url(#ar)"/>
    <line x1="490" y1="322" x2="540" y2="322" marker-end="url(#ar)"/>
    <line x1="720" y1="322" x2="770" y2="322" marker-end="url(#ar)"/>
  </g>
  <text x="530" y="378" font-size="9" fill="#4c8567" text-anchor="middle">前提：至少一个健康副本持有该数据 → 就能恢复</text>
  <text x="530" y="398" font-size="8.5" fill="#8aa6cf" text-anchor="middle">恢复动作（fetch/move）由「后台任务」的执行器承接</text>

  <rect x="40" y="436" width="980" height="104" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="460" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="482" font-size="10" fill="#4b4b50">每个副本跑守护线程围绕 Keeper znode 自愈：RestartingThread 恢复会话、PartCheckThread 校验并触发损坏 Part 的</text>
  <text x="60" y="500" font-size="10" fill="#4b4b50">重新 fetch、CleanupThread 清理过期状态。构成"发现→定位健康源→恢复→回到一致"的闭环，无需人工干预。</text>
  <text x="60" y="522" font-size="10" fill="#4b4b50" font-weight="600">前提：至少一个健康副本持有该数据；恢复动作由后台任务执行器承接。</text>
</svg>
