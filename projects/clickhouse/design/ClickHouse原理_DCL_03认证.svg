<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="560" viewBox="0 0 1060 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">认证方式：12 种 AuthenticationType（从明文到证书/令牌）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">Authentication::areCredentialsValid (Authentication.h:26) · AuthenticationType (AuthenticationType.h:9) · 外部认证器 ExternalAuthenticators</text>

  <!-- password-based -->
  <rect x="40" y="72" width="320" height="290" rx="13" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="200" y="96" font-size="11.5" font-weight="700" fill="#7a5a1e" text-anchor="middle">密码类（本地校验）</text>
  <g text-anchor="start" font-size="9">
    <rect x="60" y="108" width="280" height="34" rx="7" fill="#fbeef0" stroke="#f0cdd4"/><text x="74" y="122" font-weight="600" fill="#7a2230">no_password</text><text x="74" y="136" font-size="8" fill="#a44">无密码 · 生产禁用</text>
    <rect x="60" y="148" width="280" height="34" rx="7" fill="#fbeef0" stroke="#f0cdd4"/><text x="74" y="162" font-weight="600" fill="#7a2230">plaintext_password</text><text x="74" y="176" font-size="8" fill="#a44">明文 · 不推荐</text>
    <rect x="60" y="188" width="280" height="34" rx="7" fill="#f2fbf6" stroke="#cdeadb"/><text x="74" y="202" font-weight="600" fill="#12402a">sha256_password ✓</text><text x="74" y="216" font-size="8" fill="#2f6f4f">推荐的密码方式</text>
    <rect x="60" y="228" width="280" height="34" rx="7" fill="#f2fbf6" stroke="#cdeadb"/><text x="74" y="242" font-weight="600" fill="#12402a">bcrypt_password ✓</text><text x="74" y="256" font-size="8" fill="#2f6f4f">更强哈希（慢哈希抗暴破）</text>
    <rect x="60" y="268" width="280" height="34" rx="7" fill="#fff" stroke="#efdcb4"/><text x="74" y="282" font-weight="600" fill="#5a3410">double_sha1_password</text><text x="74" y="296" font-size="8" fill="#93762e">MySQL 协议兼容</text>
    <rect x="60" y="308" width="280" height="34" rx="7" fill="#fff" stroke="#efdcb4"/><text x="74" y="322" font-weight="600" fill="#5a3410">scram_sha256_password</text><text x="74" y="336" font-size="8" fill="#93762e">SCRAM 挑战响应</text>
  </g>

  <!-- external -->
  <rect x="380" y="72" width="320" height="290" rx="13" fill="#f6f2fb" stroke="#d9c9ec"/>
  <text x="540" y="96" font-size="11.5" font-weight="700" fill="#3d2a5a" text-anchor="middle">外部/企业认证</text>
  <g text-anchor="start" font-size="9">
    <rect x="400" y="108" width="280" height="44" rx="7" fill="#fff" stroke="#d9c9ec"/><text x="414" y="126" font-weight="600" fill="#3d2a5a">ldap</text><text x="414" y="142" font-size="8" fill="#7a5da5">对接 LDAP 目录 · 企业统一账号</text>
    <rect x="400" y="158" width="280" height="44" rx="7" fill="#fff" stroke="#d9c9ec"/><text x="414" y="176" font-weight="600" fill="#3d2a5a">kerberos</text><text x="414" y="192" font-size="8" fill="#7a5da5">Kerberos 票据 · 单点登录</text>
    <rect x="400" y="208" width="280" height="44" rx="7" fill="#fff" stroke="#d9c9ec"/><text x="414" y="226" font-weight="600" fill="#3d2a5a">http / jwt</text><text x="414" y="242" font-size="8" fill="#7a5da5">HTTP 外部认证 / JWT 令牌</text>
    <rect x="400" y="258" width="280" height="44" rx="7" fill="#faf7fd" stroke="#d9c9ec"/><text x="414" y="276" font-weight="600" fill="#3d2a5a">ExternalAuthenticators</text><text x="414" y="292" font-size="8" fill="#7a5da5">ExternalAuthenticators.h:36 管外部服务器</text>
    <rect x="400" y="308" width="280" height="34" rx="7" fill="#fff" stroke="#d9c9ec"/><text x="414" y="328" font-size="8" fill="#9a7cc4">外部认证：凭据交给外部系统裁决</text>
  </g>

  <!-- certificate/key -->
  <rect x="720" y="72" width="300" height="290" rx="13" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="870" y="96" font-size="11.5" font-weight="700" fill="#12402a" text-anchor="middle">证书/密钥（免密）</text>
  <g text-anchor="start" font-size="9">
    <rect x="740" y="108" width="260" height="50" rx="7" fill="#fff" stroke="#bfe0cd"/><text x="754" y="128" font-weight="600" fill="#12402a">ssl_certificate ✓</text><text x="754" y="144" font-size="8" fill="#2f6f4f">TLS 客户端证书 · 双向 TLS</text>
    <rect x="740" y="164" width="260" height="50" rx="7" fill="#fff" stroke="#bfe0cd"/><text x="754" y="184" font-weight="600" fill="#12402a">ssh_key</text><text x="754" y="200" font-size="8" fill="#2f6f4f">SSH 公钥认证</text>
  </g>
  <text x="870" y="238" font-size="9" fill="#4c8567" text-anchor="middle">最强身份保证</text>
  <text x="870" y="256" font-size="8.5" fill="#4c8567" text-anchor="middle">无需传密码，抗窃听</text>
  <rect x="740" y="272" width="260" height="72" rx="9" fill="#f2fbf6" stroke="#cdeadb"/>
  <text x="870" y="292" font-size="9" font-weight="600" fill="#12402a" text-anchor="middle">一个 User 可配多种认证方式</text>
  <text x="870" y="310" font-size="8" fill="#2f6f4f" text-anchor="middle">authentication_methods 是数组</text>
  <text x="870" y="326" font-size="8" fill="#2f6f4f" text-anchor="middle">任一方式验证通过即认证成功</text>

  <rect x="40" y="378" width="980" height="76" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="402" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="424" font-size="10" fill="#4b4b50">ClickHouse 支持 12 种认证：密码类（推荐 sha256/bcrypt，禁 no_password/plaintext）、企业外部认证（LDAP/Kerberos/JWT）、</text>
  <text x="60" y="441" font-size="10" fill="#4b4b50">证书密钥类（TLS 证书/SSH 密钥，最强）。一个用户可配多种方式，任一通过即认证成功。生产务必用强认证。</text>
</svg>
