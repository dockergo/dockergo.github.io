<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="540" viewBox="0 0 1060 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">并发控制与 spill：入口限并发 + 执行中救内存（共用 MemoryTracker）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">ConcurrencyControl（入口）· spill to disk（执行中）· 二者共用 MemoryTracker 计量基准</text>

  <!-- concurrency control -->
  <rect x="40" y="80" width="480" height="200" rx="14" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="280" y="104" font-size="12" font-weight="700" fill="#1b2a4a" text-anchor="middle">ConcurrencyControl（入口限并发）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="60" y="120" width="200" height="40" rx="7" fill="#fff" stroke="#bcd0ec"/><text x="160" y="145" fill="#1b2a4a">新查询涌入</text>
    <rect x="300" y="120" width="200" height="40" rx="7" fill="#fff" stroke="#bcd0ec"/><text x="400" y="140" fill="#1b2a4a">并发数已满？</text><text x="400" y="153" font-size="7.5" fill="#5b7db1">max_concurrent_queries</text>
  </g>
  <g text-anchor="middle" font-size="8">
    <rect x="60" y="176" width="200" height="44" rx="7" fill="#f2fbf6" stroke="#cdeadb"/><text x="160" y="196" font-weight="600" fill="#12402a">未满 → 立即执行</text><text x="160" y="212" fill="#2f6f4f">正常进入</text>
    <rect x="300" y="176" width="200" height="44" rx="7" fill="#fdf6ea" stroke="#efdcb4"/><text x="400" y="196" font-weight="600" fill="#5a3410">已满 → 排队等待</text><text x="400" y="212" fill="#93762e">防惊群同时爆内存</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.3" fill="none"><line x1="260" y1="140" x2="300" y2="140" marker-end="url(#ar)"/></g>
  <text x="280" y="244" font-size="9" fill="#5b7db1" text-anchor="middle">从"入口"控制：不让过多查询同时活跃</text>
  <text x="280" y="264" font-size="8.5" fill="#8aa6cf" text-anchor="middle">ConcurrencyControl · max_concurrent_queries</text>

  <!-- spill -->
  <rect x="540" y="80" width="480" height="200" rx="14" fill="#f2fbf6" stroke="#cdeadb"/>
  <text x="780" y="104" font-size="12" font-weight="700" fill="#12402a" text-anchor="middle">Spill to disk（执行中救内存）</text>
  <text x="560" y="128" font-size="9" fill="#2f6f4f">· 单查询内存超 max_memory_usage 阈值时触发</text>
  <g text-anchor="middle" font-size="8">
    <rect x="560" y="140" width="140" height="50" rx="7" fill="#fff" stroke="#cdeadb"/><text x="630" y="160" font-weight="600" fill="#12402a">聚合</text><text x="630" y="176" fill="#2f6f4f">two-level 落盘</text>
    <rect x="710" y="140" width="140" height="50" rx="7" fill="#fff" stroke="#cdeadb"/><text x="780" y="160" font-weight="600" fill="#12402a">排序</text><text x="780" y="176" fill="#2f6f4f">外部排序</text>
    <rect x="860" y="140" width="140" height="50" rx="7" fill="#fff" stroke="#cdeadb"/><text x="930" y="160" font-weight="600" fill="#12402a">Join</text><text x="930" y="176" fill="#2f6f4f">GraceHash 分批</text>
  </g>
  <text x="780" y="212" font-size="9" fill="#2f6f4f" text-anchor="middle">用磁盘 IO 换"不 OOM、查询继续跑"</text>
  <text x="780" y="232" font-size="8.5" fill="#4c8567" text-anchor="middle">阈值：max_bytes_before_external_group_by / _sort</text>
  <text x="780" y="252" font-size="8.5" fill="#8aa6cf" text-anchor="middle">代价：慢一些，但不失败</text>

  <!-- shared basis -->
  <rect x="40" y="300" width="980" height="80" rx="13" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="60" y="324" font-size="11" font-weight="700" fill="#7a5a1e">二者配合：MemoryTracker 是共用基准</text>
  <text x="60" y="346" font-size="9.5" fill="#93762e">· ConcurrencyControl 从"入口"限并发数（防同时挤爆），spill 从"执行中"救单查询内存（防单个 OOM）</text>
  <text x="60" y="364" font-size="9.5" fill="#93762e">· 两者都以 MemoryTracker 的计量为准：并发准入看整体内存压力，spill 看单查询是否超阈值</text>

  <rect x="40" y="396" width="980" height="128" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="420" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="442" font-size="10" fill="#4b4b50">两道保命机制：ConcurrencyControl 在入口限并发查询数（超限排队，防惊群同时爆内存），spill 在执行中把超内存的</text>
  <text x="60" y="460" font-size="10" fill="#4b4b50">聚合/排序/join 落盘续命（用磁盘 IO 换不 OOM）。二者共用 MemoryTracker 计量基准。</text>
  <text x="60" y="484" font-size="10" fill="#4b4b50" font-weight="600">工程要点：不限并发会被突发流量打爆；不设 spill 阈值的大聚合/排序会 OOM——两者都要配置。</text>
  <text x="60" y="508" font-size="9" fill="#8a8a8f">配合三级内存上限（见内存篇），构成 ClickHouse 抗 OOM 的完整防线。</text>
</svg>
