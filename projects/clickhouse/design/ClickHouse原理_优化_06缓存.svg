<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="560" viewBox="0 0 1060 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">缓存体系：从粗到细，命中即省对应工作</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">QueryResultCache · QueryConditionCache · MarkCache · UncompressedCache · PrimaryIndexCache</text>

  <!-- layered caches -->
  <g text-anchor="middle">
    <rect x="60" y="80" width="940" height="46" rx="10" fill="#f2fbf6" stroke="#cdeadb" filter="url(#soft)"/>
    <text x="530" y="100" font-size="10.5" font-weight="700" fill="#12402a">① QueryResultCache —— 整条查询结果</text>
    <text x="530" y="117" font-size="8.5" fill="#2f6f4f">命中 → 跳过一切计算（最粗、最省）· 仅对确定性重复查询有效 · use_query_cache=1</text>

    <rect x="120" y="138" width="820" height="46" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="530" y="158" font-size="10.5" font-weight="700" fill="#1b2a4a">② QueryConditionCache —— 条件 → 可跳过的段</text>
    <text x="530" y="175" font-size="8.5" fill="#5b7db1">缓存"某条件在某 Part 上能跳过哪些 granule"，省重复的跳数判定 · QueryConditionCache</text>

    <rect x="180" y="196" width="700" height="46" rx="10" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
    <text x="530" y="216" font-size="10.5" font-weight="700" fill="#274a78">③ PrimaryIndexCache —— 稀疏主键</text>
    <text x="530" y="233" font-size="8.5" fill="#5b7db1">缓存 primary.idx，省重复加载 · PrimaryIndexCache</text>

    <rect x="240" y="254" width="580" height="46" rx="10" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
    <text x="530" y="274" font-size="10.5" font-weight="700" fill="#5a3410">④ MarkCache —— .mrk 标记</text>
    <text x="530" y="291" font-size="8.5" fill="#93762e">缓存 mark 文件，省重复读标记 · MarkCache</text>

    <rect x="300" y="312" width="460" height="46" rx="10" fill="#f6f2fb" stroke="#d9c9ec" filter="url(#soft)"/>
    <text x="530" y="332" font-size="10.5" font-weight="700" fill="#3d2a5a">⑤ UncompressedCache —— 解压后的块</text>
    <text x="530" y="349" font-size="8.5" fill="#7a5da5">缓存解压结果，省重复解压 · 默认按需开</text>
  </g>
  <text x="1000" y="105" font-size="9" fill="#8a8a8f" text-anchor="end">粗</text>
  <text x="530" y="378" font-size="9" fill="#8a8a8f" text-anchor="middle">细 ↓（越往下命中省得越少，但更容易命中）</text>

  <!-- how they stack -->
  <rect x="40" y="392" width="980" height="76" rx="13" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="60" y="416" font-size="11" font-weight="700" fill="#7a5a1e">如何叠加</text>
  <text x="60" y="438" font-size="9.5" fill="#93762e">· 一次查询：先看结果缓存（命中直接返回）→ 未命中则执行，执行中逐层用条件/主键/mark/解压缓存省重复 IO 与计算</text>
  <text x="60" y="456" font-size="9.5" fill="#93762e">· 结果缓存跳过最多但最难命中（要完全相同）；底层缓存命中易但只省一小段——互补覆盖</text>

  <rect x="40" y="482" width="980" height="60" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="506" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="528" font-size="10" fill="#4b4b50">ClickHouse 多层缓存从粗到细：结果缓存跳过一切、条件缓存省跳数判定、主键/mark/解压缓存省重复读盘解压。粗的省得多但难命中，细的易命中但省得少，互补覆盖。</text>
</svg>
