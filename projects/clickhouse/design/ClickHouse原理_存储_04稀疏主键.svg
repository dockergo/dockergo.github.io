<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="800" viewBox="0 0 1060 800" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="800" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">稀疏主键索引 + Marks：每 granule 存一条，不是每行</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">MergeTreeDataPartWriterOnDisk「每 index_granularity 行存一条主键值」· 只写 granule.start_row — 这是"稀疏"的铁证</text>

  <!-- data rows column -->
  <text x="150" y="82" font-size="11" font-weight="600" fill="#5a3410" text-anchor="middle">列数据（按 ORDER BY 排序）</text>
  <rect x="40" y="94" width="220" height="600" rx="12" fill="#fff7e6" stroke="#e8cf9a"/>
  <!-- granules -->
  <g text-anchor="middle" font-size="8.5">
    <rect x="56" y="108" width="188" height="88" rx="8" fill="#fdf6ea" stroke="#efdcb4"/>
    <text x="150" y="124" font-size="9.5" font-weight="600" fill="#5a3410">granule 0 · 行 0..8191</text>
    <text x="150" y="140" fill="#93762e">(1, ...)  (1, ...)  (2, ...)</text>
    <text x="150" y="154" fill="#93762e">...  8192 行  ...</text>
    <text x="150" y="180" fill="#93762e">(45, ...) — 末行</text>
    <rect x="56" y="204" width="188" height="88" rx="8" fill="#fdf6ea" stroke="#efdcb4"/>
    <text x="150" y="220" font-size="9.5" font-weight="600" fill="#5a3410">granule 1 · 行 8192..16383</text>
    <text x="150" y="236" fill="#93762e">(45, ...)  (46, ...)</text>
    <text x="150" y="250" fill="#93762e">...  8192 行  ...</text>
    <text x="150" y="276" fill="#93762e">(90, ...) — 末行</text>
    <rect x="56" y="300" width="188" height="88" rx="8" fill="#fdf6ea" stroke="#efdcb4"/>
    <text x="150" y="316" font-size="9.5" font-weight="600" fill="#5a3410">granule 2 · 行 16384..</text>
    <text x="150" y="332" fill="#93762e">(90, ...)  (91, ...)</text>
    <text x="150" y="346" fill="#93762e">...  8192 行  ...</text>
    <text x="150" y="372" fill="#93762e">(140, ...)</text>
    <text x="150" y="420" font-size="11" fill="#b08843">⋮</text>
    <rect x="56" y="440" width="188" height="88" rx="8" fill="#fdf6ea" stroke="#efdcb4"/>
    <text x="150" y="456" font-size="9.5" font-weight="600" fill="#5a3410">granule N</text>
    <text x="150" y="480" fill="#93762e">... 8192 行 ...</text>
    <text x="150" y="504" fill="#93762e">(999, ...)</text>
  </g>
  <text x="150" y="560" font-size="9" fill="#93762e" text-anchor="middle">1 granule = index_granularity 行</text>
  <text x="150" y="576" font-size="9" fill="#93762e" text-anchor="middle">默认 8192</text>
  <rect x="56" y="596" width="188" height="82" rx="8" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="150" y="616" font-size="9.5" font-weight="600" fill="#7a2230" text-anchor="middle">主键不去重！</text>
  <text x="150" y="634" font-size="8.5" fill="#a44" text-anchor="middle">同键 (1,...) 多行共存</text>
  <text x="150" y="650" font-size="8.5" fill="#a44" text-anchor="middle">= 排序 + 跳数，非唯一约束</text>
  <text x="150" y="668" font-size="8.5" fill="#a44" text-anchor="middle">这是与 Doris Unique 的鸿沟</text>

  <!-- primary.idx -->
  <text x="470" y="82" font-size="11" font-weight="600" fill="#274a78" text-anchor="middle">primary.idx（稀疏 · 常驻内存）</text>
  <rect x="330" y="94" width="280" height="440" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="470" y="118" font-size="9.5" fill="#5b7db1" text-anchor="middle">每 granule 存"首行主键值"一条</text>
  <g text-anchor="middle" font-size="9.5">
    <rect x="352" y="132" width="236" height="30" rx="6" fill="#e9f1fb" stroke="#c4d8f0"/><text x="470" y="152" fill="#1b2a4a">idx[0] = 1　→ granule 0 起</text>
    <rect x="352" y="170" width="236" height="30" rx="6" fill="#e9f1fb" stroke="#c4d8f0"/><text x="470" y="190" fill="#1b2a4a">idx[1] = 45　→ granule 1 起</text>
    <rect x="352" y="208" width="236" height="30" rx="6" fill="#e9f1fb" stroke="#c4d8f0"/><text x="470" y="228" fill="#1b2a4a">idx[2] = 90　→ granule 2 起</text>
    <rect x="352" y="246" width="236" height="30" rx="6" fill="#e9f1fb" stroke="#c4d8f0"/><text x="470" y="266" fill="#1b2a4a">idx[3] = 140</text>
    <text x="470" y="298" font-size="12" fill="#8aa6cf">⋮</text>
    <rect x="352" y="312" width="236" height="30" rx="6" fill="#e9f1fb" stroke="#c4d8f0"/><text x="470" y="332" fill="#1b2a4a">idx[N] = 999</text>
  </g>
  <rect x="352" y="360" width="236" height="158" rx="10" fill="#f2fbf6" stroke="#cdeadb"/>
  <text x="470" y="380" font-size="10" font-weight="600" fill="#12402a" text-anchor="middle">为何稀疏？</text>
  <text x="470" y="400" font-size="8.8" fill="#2f6f4f" text-anchor="middle">10 亿行 / 8192 ≈ 12 万条索引</text>
  <text x="470" y="416" font-size="8.8" fill="#2f6f4f" text-anchor="middle">→ 索引极小，可全量常驻内存</text>
  <text x="470" y="436" font-size="8.8" fill="#2f6f4f" text-anchor="middle">loadIndex</text>
  <text x="470" y="456" font-size="8.8" fill="#2f6f4f" text-anchor="middle">代价：只能定位到 granule</text>
  <text x="470" y="472" font-size="8.8" fill="#2f6f4f" text-anchor="middle">不能定位到具体行</text>
  <text x="470" y="496" font-size="8.8" fill="#4c8567" text-anchor="middle">→ 命中的 granule 要整段读+过滤</text>

  <!-- KeyCondition + marks -->
  <text x="835" y="82" font-size="11" font-weight="600" fill="#12402a" text-anchor="middle">查询裁剪：主键值 → MarkRange → 物理位置</text>

  <rect x="640" y="94" width="390" height="150" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="835" y="116" font-size="11" font-weight="700" fill="#274a78" text-anchor="middle">① KeyCondition</text>
  <text x="835" y="136" font-size="9" fill="#5b7db1" text-anchor="middle">把 WHERE 编译成对主键区间的判定</text>
  <rect x="664" y="150" width="342" height="30" rx="6" fill="#fff" stroke="#cfe0f2"/><text x="835" y="169" font-size="9" fill="#274a78" text-anchor="middle">例：WHERE id = 50　→ 区间 [50,50]</text>
  <text x="835" y="200" font-size="9" fill="#5b7db1" text-anchor="middle">markRangesFromPKRange</text>
  <text x="835" y="216" font-size="9" fill="#5b7db1" text-anchor="middle">在 idx 上二分 落在 idx[1]=45..idx[2]=90</text>
  <text x="835" y="232" font-size="9" fill="#5b7db1" text-anchor="middle">→ 只需读 granule 1（跳过其余全部）</text>

  <rect x="640" y="258" width="390" height="150" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="835" y="280" font-size="11" font-weight="700" fill="#12402a" text-anchor="middle">② Mark：granule → .bin 物理位置</text>
  <text x="835" y="300" font-size="9" fill="#2f6f4f" text-anchor="middle">MarkInCompressedFile</text>
  <rect x="664" y="312" width="342" height="40" rx="7" fill="#fff" stroke="#cdeadb"/>
  <text x="835" y="329" font-size="9" fill="#12402a" text-anchor="middle">mark = { offset_in_compressed_file,</text>
  <text x="835" y="344" font-size="9" fill="#12402a" text-anchor="middle">offset_in_decompressed_block }</text>
  <text x="835" y="372" font-size="8.8" fill="#2f6f4f" text-anchor="middle">.mrk2(Wide)/.mrk3(Compact) 存每 granule 的这对偏移</text>
  <text x="835" y="390" font-size="8.8" fill="#4c8567" text-anchor="middle">先定位压缩块 → 再定位块内解压偏移</text>

  <rect x="640" y="422" width="390" height="112" rx="12" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="835" y="444" font-size="11" font-weight="700" fill="#5a3410" text-anchor="middle">③ 读取 granule 1 的压缩块</text>
  <text x="835" y="464" font-size="9" fill="#93762e" text-anchor="middle">按 mark 偏移 seek .bin → 解压 → 得到 8192 行</text>
  <text x="835" y="484" font-size="9" fill="#93762e" text-anchor="middle">在这 8192 行里再精确过滤 id = 50</text>
  <rect x="664" y="496" width="342" height="28" rx="6" fill="#fff" stroke="#efdcb4"/>
  <text x="835" y="514" font-size="8.8" fill="#5a3410" text-anchor="middle">跳数索引可在此之前进一步跳过整段（见下张）</text>

  <!-- arrows connecting the three columns -->
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <path d="M244,152 L300,152 L300,185 L352,185" marker-end="url(#ar)"/>
    <path d="M244,248 L300,248 L300,223 L352,223" marker-end="url(#ar)"/>
    <line x1="610" y1="185" x2="640" y2="169" marker-end="url(#ar)"/>
    <line x1="835" y1="244" x2="835" y2="258" marker-end="url(#ar)"/>
    <line x1="835" y1="408" x2="835" y2="422" marker-end="url(#ar)"/>
  </g>
  <path d="M835,534 L835,556 L150,556 L150,596" stroke="#c7c7cc" stroke-width="1.4" fill="none" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="480" y="551" font-size="8.5" fill="#a1a1a6" text-anchor="middle">回到列数据里读命中的 granule</text>

  <!-- bottom takeaway -->
  <rect x="40" y="702" width="990" height="80" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="726" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="748" font-size="10" fill="#4b4b50">稀疏主键用极小的内存换"跳过大部分数据"：它把查询范围缩到几个 granule，而非精确到行。所以 ClickHouse 擅长</text>
  <text x="60" y="766" font-size="10" fill="#4b4b50">"扫一段范围"，不擅长"点查一行"（点查也要读整个 granule）；且主键从不去重——这与 Doris 的唯一主键完全不同。</text>
</svg>
