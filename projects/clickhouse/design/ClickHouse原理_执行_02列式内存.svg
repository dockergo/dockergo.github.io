<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="580" viewBox="0 0 1060 580" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="580" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">列式内存模型：Column（列）+ DataType（类型）+ Block（内存表）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">IColumn (IColumn, COW) · IDataType · Block · Chunk = Block 的执行期载体</text>

  <!-- block anatomy -->
  <rect x="40" y="76" width="600" height="240" rx="14" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="340" y="100" font-size="12" font-weight="700" fill="#12402a" text-anchor="middle">Block = 一组同长度的列（内存中的一段表）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="64" y="116" width="180" height="180" rx="10" fill="#fff" stroke="#bfe0cd"/><text x="154" y="136" font-size="9.5" font-weight="600" fill="#12402a">列 id : UInt64</text>
    <rect x="80" y="146" width="148" height="20" rx="4" fill="#f2fbf6" stroke="#cdeadb"/><text x="154" y="160" fill="#2f6f4f">1</text>
    <rect x="80" y="170" width="148" height="20" rx="4" fill="#f2fbf6" stroke="#cdeadb"/><text x="154" y="184" fill="#2f6f4f">2</text>
    <rect x="80" y="194" width="148" height="20" rx="4" fill="#f2fbf6" stroke="#cdeadb"/><text x="154" y="208" fill="#2f6f4f">3</text>
    <text x="154" y="238" fill="#4c8567">ColumnVector&lt;UInt64&gt;</text>
    <text x="154" y="256" fill="#8aa6cf">连续内存 · SIMD 友好</text>
    <text x="154" y="278" fill="#4c8567">COW 写时复制</text>

    <rect x="256" y="116" width="180" height="180" rx="10" fill="#fff" stroke="#bfe0cd"/><text x="346" y="136" font-size="9.5" font-weight="600" fill="#12402a">列 name : String</text>
    <rect x="272" y="146" width="148" height="20" rx="4" fill="#f2fbf6" stroke="#cdeadb"/><text x="346" y="160" fill="#2f6f4f">"a"</text>
    <rect x="272" y="170" width="148" height="20" rx="4" fill="#f2fbf6" stroke="#cdeadb"/><text x="346" y="184" fill="#2f6f4f">"b"</text>
    <rect x="272" y="194" width="148" height="20" rx="4" fill="#f2fbf6" stroke="#cdeadb"/><text x="346" y="208" fill="#2f6f4f">"c"</text>
    <text x="346" y="238" fill="#4c8567">ColumnString</text>
    <text x="346" y="256" fill="#8aa6cf">偏移+连续字节</text>

    <rect x="448" y="116" width="180" height="180" rx="10" fill="#fff" stroke="#bfe0cd"/><text x="538" y="136" font-size="9.5" font-weight="600" fill="#12402a">列 val : Nullable(F64)</text>
    <rect x="464" y="146" width="148" height="20" rx="4" fill="#f2fbf6" stroke="#cdeadb"/><text x="538" y="160" fill="#2f6f4f">1.5</text>
    <rect x="464" y="170" width="148" height="20" rx="4" fill="#f2fbf6" stroke="#cdeadb"/><text x="538" y="184" fill="#2f6f4f">NULL</text>
    <rect x="464" y="194" width="148" height="20" rx="4" fill="#f2fbf6" stroke="#cdeadb"/><text x="538" y="208" fill="#2f6f4f">3.0</text>
    <text x="538" y="238" fill="#4c8567">ColumnNullable</text>
    <text x="538" y="256" fill="#8aa6cf">值列 + null 掩码列</text>
  </g>

  <!-- vectorization -->
  <rect x="660" y="76" width="360" height="240" rx="14" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="840" y="100" font-size="12" font-weight="700" fill="#274a78" text-anchor="middle">向量化：一次算一整列的一批</text>
  <rect x="680" y="116" width="320" height="70" rx="10" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="840" y="136" font-size="9.5" font-weight="600" fill="#7a2230" text-anchor="middle">逐行（传统 OLTP）</text>
  <text x="840" y="156" font-size="8.5" fill="#a44" text-anchor="middle">for row: f(row) → 每行一次函数调用</text>
  <text x="840" y="172" font-size="8.5" fill="#a44" text-anchor="middle">分支/调用开销大</text>
  <rect x="680" y="196" width="320" height="70" rx="10" fill="#f2fbf6" stroke="#cdeadb"/>
  <text x="840" y="216" font-size="9.5" font-weight="600" fill="#12402a" text-anchor="middle">向量化（ClickHouse）</text>
  <text x="840" y="236" font-size="8.5" fill="#2f6f4f" text-anchor="middle">f(整列一批) → 一次处理数千行</text>
  <text x="840" y="252" font-size="8.5" fill="#2f6f4f" text-anchor="middle">摊薄开销 + SIMD + 缓存友好</text>
  <text x="840" y="286" font-size="8.5" fill="#8aa6cf" text-anchor="middle">这是列存分析库快的根本原因之一</text>

  <!-- chunk relation -->
  <rect x="40" y="330" width="980" height="90" rx="13" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="60" y="354" font-size="11" font-weight="700" fill="#7a5a1e">Block 与 Chunk 的关系</text>
  <text x="60" y="376" font-size="9.5" fill="#93762e">Block：列 + 列名 + 类型——完整的"一段表"，用于计划/schema 层</text>
  <text x="60" y="394" font-size="9.5" fill="#93762e">· Chunk：执行期在 Processor 间流动的载体——去掉列名，只留列数据 + 行数（更轻，schema 由 Pipeline 头部固定）</text>
  <text x="60" y="412" font-size="9" fill="#b08843">· max_block_size 控制一个 Chunk 的行数上限（向量化批大小 ↔ 内存的权衡）</text>

  <rect x="40" y="434" width="980" height="126" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="458" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="480" font-size="10" fill="#4b4b50">ClickHouse 的内存数据是列式的：IColumn 把一列值连续存放（COW 写时复制、SIMD 友好），IDataType 管类型与序列化，</text>
  <text x="60" y="498" font-size="10" fill="#4b4b50">Block 把多列组成"一段表"。执行期以 Chunk（Block 的轻量载体）在算子间流动。向量化 = 一次算一整列的一批值，</text>
  <text x="60" y="516" font-size="10" fill="#4b4b50">把函数调用/分支开销摊薄到数千行——这是列存分析库高性能的根本。</text>
  <text x="60" y="540" font-size="9" fill="#8a8a8f">max_block_size 是批大小旋钮：大批更省 CPU、更吃内存。</text>
</svg>
