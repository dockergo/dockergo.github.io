<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="720" viewBox="0 0 1060 720" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="720" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">压缩与编码：先"编码"让数据变规律，再"压缩"缩体积</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">CompressionCodecFactory · 默认 LZ4 · CODEC(Delta, ZSTD) 链式组合</text>

  <!-- pipeline -->
  <g text-anchor="middle">
    <rect x="40" y="76" width="150" height="60" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="115" y="102" font-size="11" font-weight="600" fill="#1b2a4a">列的原始值</text><text x="115" y="120" font-size="9" fill="#5b7db1">内存 Block 一列</text>
    <rect x="250" y="76" width="200" height="60" rx="11" fill="#f6f2fb" stroke="#d9c9ec" filter="url(#soft)"/><text x="350" y="98" font-size="11" font-weight="600" fill="#3d2a5a">① 编码 Codec（可选）</text><text x="350" y="116" font-size="9" fill="#7a5da5">Delta/DoubleDelta/Gorilla/T64/GCD</text><text x="350" y="129" font-size="8.5" fill="#9a7cc4">利用数据规律 → 变小/变规律</text>
    <rect x="510" y="76" width="200" height="60" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="610" y="98" font-size="11" font-weight="600" fill="#12402a">② 压缩 Codec</text><text x="610" y="116" font-size="9" fill="#2f6f4f">LZ4（默认）/ ZSTD / LZ4HC</text><text x="610" y="129" font-size="8.5" fill="#4c8567">通用熵压缩</text>
    <rect x="770" y="76" width="250" height="60" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/><text x="895" y="98" font-size="11" font-weight="600" fill="#5a3410">落盘 .bin 压缩块</text><text x="895" y="116" font-size="9" fill="#93762e">块也是 IO/缓存单位</text><text x="895" y="129" font-size="8.5" fill="#b08843">UncompressedCache 缓存于此</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="190" y1="106" x2="250" y2="106" marker-end="url(#ar)"/>
    <line x1="450" y1="106" x2="510" y2="106" marker-end="url(#ar)"/>
    <line x1="710" y1="106" x2="770" y2="106" marker-end="url(#ar)"/>
  </g>

  <!-- encoding codecs -->
  <text x="45" y="176" font-size="12" font-weight="700" fill="#3d2a5a">① 编码 Codec（针对数据形态）</text>
  <g text-anchor="middle">
    <rect x="40" y="188" width="235" height="104" rx="12" fill="#f6f2fb" stroke="#d9c9ec"/>
    <text x="157" y="210" font-size="11" font-weight="700" fill="#3d2a5a">Delta</text>
    <text x="157" y="226" font-size="8.5" fill="#7a5da5">CompressionCodecDelta</text>
    <text x="157" y="248" font-size="9.5" fill="#3d2a5a">存相邻差值</text>
    <text x="157" y="266" font-size="9" fill="#9a7cc4">适用：缓变序列</text>
    <text x="157" y="282" font-size="8.5" fill="#9a7cc4">例：温度、计数器</text>

    <rect x="290" y="188" width="235" height="104" rx="12" fill="#f6f2fb" stroke="#d9c9ec"/>
    <text x="407" y="210" font-size="11" font-weight="700" fill="#3d2a5a">DoubleDelta</text>
    <text x="407" y="226" font-size="8.5" fill="#7a5da5">...DoubleDelta</text>
    <text x="407" y="248" font-size="9.5" fill="#3d2a5a">存差值的差值（二阶）</text>
    <text x="407" y="266" font-size="9" fill="#9a7cc4">适用：单调等步长</text>
    <text x="407" y="282" font-size="8.5" fill="#9a7cc4">例：递增时间戳</text>

    <rect x="540" y="188" width="235" height="104" rx="12" fill="#f6f2fb" stroke="#d9c9ec"/>
    <text x="657" y="210" font-size="11" font-weight="700" fill="#3d2a5a">Gorilla</text>
    <text x="657" y="226" font-size="8.5" fill="#7a5da5">CompressionCodecGorilla</text>
    <text x="657" y="248" font-size="9.5" fill="#3d2a5a">浮点异或前值</text>
    <text x="657" y="266" font-size="9" fill="#9a7cc4">适用：监控浮点指标</text>
    <text x="657" y="282" font-size="8.5" fill="#9a7cc4">例：CPU%、延迟</text>

    <rect x="790" y="188" width="230" height="104" rx="12" fill="#f6f2fb" stroke="#d9c9ec"/>
    <text x="905" y="210" font-size="11" font-weight="700" fill="#3d2a5a">T64 / GCD</text>
    <text x="905" y="226" font-size="8.5" fill="#7a5da5">T64 · GCD</text>
    <text x="905" y="248" font-size="9.5" fill="#3d2a5a">T64 位打包裁剪高位</text>
    <text x="905" y="266" font-size="9.5" fill="#3d2a5a">GCD 公约数缩放</text>
    <text x="905" y="282" font-size="8.5" fill="#9a7cc4">适用：小范围/等步长整型</text>
  </g>

  <!-- compression codecs -->
  <text x="45" y="330" font-size="12" font-weight="700" fill="#12402a">② 压缩 Codec（通用熵压缩）</text>
  <g text-anchor="middle">
    <rect x="40" y="342" width="310" height="104" rx="12" fill="#eafaf1" stroke="#bfe0cd"/>
    <text x="195" y="364" font-size="11.5" font-weight="700" fill="#12402a">LZ4（默认）</text>
    <text x="195" y="380" font-size="8.5" fill="#2f6f4f">register · getDefaultCodec · 默认</text>
    <text x="195" y="402" font-size="9.5" fill="#12402a">极快压/解压，压缩比适中</text>
    <text x="195" y="422" font-size="9" fill="#4c8567">适用：绝大多数场景的默认</text>
    <text x="195" y="438" font-size="8.5" fill="#4c8567">LZ4HC = 高压缩比变体</text>

    <rect x="365" y="342" width="310" height="104" rx="12" fill="#eafaf1" stroke="#bfe0cd"/>
    <text x="520" y="364" font-size="11.5" font-weight="700" fill="#12402a">ZSTD</text>
    <text x="520" y="380" font-size="8.5" fill="#2f6f4f">register</text>
    <text x="520" y="402" font-size="9.5" fill="#12402a">压缩比高，CPU 稍重（可调 level）</text>
    <text x="520" y="422" font-size="9" fill="#4c8567">适用：存储敏感/冷数据</text>
    <text x="520" y="438" font-size="8.5" fill="#4c8567">冷热分层常配 ZSTD 于冷层</text>

    <rect x="690" y="342" width="330" height="104" rx="12" fill="#eafaf1" stroke="#bfe0cd"/>
    <text x="855" y="364" font-size="11.5" font-weight="700" fill="#12402a">FPC / None</text>
    <text x="855" y="380" font-size="8.5" fill="#2f6f4f">FPC · None</text>
    <text x="855" y="402" font-size="9.5" fill="#12402a">FPC：科学浮点预测压缩</text>
    <text x="855" y="422" font-size="9.5" fill="#12402a">None：不压缩（已压缩数据/极热）</text>
    <text x="855" y="438" font-size="8.5" fill="#4c8567">Multiple 组合多个 codec</text>
  </g>

  <!-- chaining example -->
  <rect x="40" y="464" width="980" height="130" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="486" font-size="12" font-weight="700" fill="#274a78">链式组合：编码 + 压缩（DDL 里按列指定）</text>
  <rect x="60" y="498" width="900" height="30" rx="7" fill="#fff" stroke="#cfe0f2"/>
  <text x="72" y="518" font-size="10" fill="#274a78" font-family="monospace">ts DateTime CODEC(DoubleDelta, ZSTD),　　val Float64 CODEC(Gorilla, LZ4),　　id UInt64 CODEC(Delta, LZ4)</text>
  <text x="60" y="548" font-size="9.5" fill="#5b7db1">· 先编码（DoubleDelta 把递增时间戳变成一串接近 0 的小数）→ 再压缩（ZSTD 把这串小数高效熵压）</text>
  <text x="60" y="566" font-size="9.5" fill="#5b7db1">· 编码器"因数据形态而异"，压缩器"通用"；组合后压缩比远高于单用通用压缩</text>
  <text x="60" y="584" font-size="9.5" fill="#5b7db1">· 未指定 CODEC 的列走默认 LZ4；服务端可配 default_compression_codec 改全局默认</text>

  <rect x="40" y="612" width="980" height="86" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="636" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="658" font-size="10" fill="#4b4b50">列存 + 按列选 codec 是 ClickHouse 高压缩比的根源：同列同质数据让编码器（Delta/Gorilla/T64）先把数据变规律，</text>
  <text x="60" y="675" font-size="10" fill="#4b4b50">再交通用压缩器（LZ4/ZSTD）。默认 LZ4 求快，存储敏感转 ZSTD，时序列配 DoubleDelta/Gorilla 收益最大。</text>
</svg>
