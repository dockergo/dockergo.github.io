<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="580" viewBox="0 0 1060 580" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="580" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">写入幂等与 quorum：无事务，靠 block hash 去重 +（可选）副本确认</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">block_id 写 Keeper /blocks（insert_deduplicate 默认 true）· insert_quorum 默认 0（关闭）</text>

  <!-- idempotent -->
  <rect x="40" y="76" width="480" height="200" rx="14" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="280" y="100" font-size="12" font-weight="700" fill="#12402a" text-anchor="middle">幂等去重（替代事务的"精确一次"）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="60" y="116" width="200" height="50" rx="9" fill="#fff" stroke="#bfe0cd"/><text x="160" y="136" font-weight="600" fill="#12402a">INSERT 一批</text><text x="160" y="154" fill="#2f6f4f">算 block hash → block_id</text>
    <rect x="300" y="116" width="200" height="50" rx="9" fill="#fff" stroke="#bfe0cd"/><text x="400" y="136" font-weight="600" fill="#12402a">写 Keeper /blocks/&lt;id&gt;</text><text x="400" y="154" fill="#2f6f4f">znode 已存在 → 跳过</text>
  </g>
  <rect x="60" y="176" width="440" height="88" rx="9" fill="#f2fbf6" stroke="#cdeadb"/>
  <text x="280" y="196" font-size="9.5" font-weight="600" fill="#12402a" text-anchor="middle">效果：重发同批数据不重复入库</text>
  <text x="280" y="216" font-size="8.5" fill="#2f6f4f" text-anchor="middle">网络抖动重试安全，无需事务</text>
  <text x="280" y="234" font-size="8.5" fill="#2f6f4f" text-anchor="middle">insert_deduplicate 默认 true</text>
  <text x="280" y="252" font-size="8" fill="#4c8567" text-anchor="middle">（详见 DML·幂等去重篇）</text>

  <!-- quorum -->
  <rect x="540" y="76" width="480" height="200" rx="14" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="780" y="100" font-size="12" font-weight="700" fill="#274a78" text-anchor="middle">quorum 写入（可选，更强保证）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="560" y="116" width="200" height="50" rx="9" fill="#fff" stroke="#cfe0f2"/><text x="660" y="136" font-weight="600" fill="#274a78">insert_quorum = N</text><text x="660" y="154" fill="#5b7db1">要求 N 个副本确认</text>
    <rect x="800" y="116" width="200" height="50" rx="9" fill="#fff" stroke="#cfe0f2"/><text x="900" y="136" font-weight="600" fill="#274a78">状态记 /quorum/status</text><text x="900" y="154" fill="#5b7db1">达 N 前不算写成功</text>
  </g>
  <rect x="560" y="176" width="440" height="88" rx="9" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="780" y="196" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">默认 0 = 关闭</text>
  <text x="780" y="216" font-size="8.5" fill="#5b7db1" text-anchor="middle">默认只保证本副本落定 + 异步复制</text>
  <text x="780" y="234" font-size="8.5" fill="#5b7db1" text-anchor="middle">开启后：写延迟↑，但抗单副本丢失</text>
  <text x="780" y="252" font-size="8" fill="#8aa6cf" text-anchor="middle">配 select_sequential_consistency 保强一致读</text>

  <!-- default behavior -->
  <rect x="40" y="300" width="980" height="90" rx="13" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="60" y="324" font-size="11" font-weight="700" fill="#7a2230">默认行为的含义（重要认知）</text>
  <text x="60" y="346" font-size="9.5" fill="#a44">· 默认 insert_quorum=0：INSERT 返回时只保证写到本副本，其他副本还在异步追</text>
  <text x="60" y="364" font-size="9.5" fill="#a44">· 若此刻本副本宕机且数据未复制出去 → 可能丢这批（默认是"最终一致"，不是"强持久"）</text>
  <text x="60" y="382" font-size="9" fill="#7a2230">· 要害数据写入用 insert_quorum≥2 换取"至少 N 副本已持有"的保证</text>

  <rect x="40" y="410" width="980" height="130" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="434" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="456" font-size="10" fill="#4b4b50">ClickHouse 无事务，用两个机制保证写入正确：① block hash 幂等去重（默认开）——重发不重复；</text>
  <text x="60" y="474" font-size="10" fill="#4b4b50">② quorum 写入（默认关）——要求 N 副本确认才算成功。默认只保证本副本落定 + 异步复制（最终一致），</text>
  <text x="60" y="492" font-size="10" fill="#4b4b50">要害数据应开 insert_quorum 换强持久，配 select_sequential_consistency 换强一致读。</text>
  <text x="60" y="516" font-size="9" fill="#8a8a8f">这是"分析库默认高吞吐、按需换强保证"的取舍——与 Doris 默认 2PC 强一致的路线不同。</text>
</svg>
