<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="620" viewBox="0 0 1060 620" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="620" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">分布式 DDL：ON CLUSTER → Keeper 队列 → 各节点 DDLWorker 执行</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">executeDDLQueryOnCluster → DDLWorker::enqueueQuery · 队列路径 /clickhouse/task_queue/ddl</text>

  <!-- initiator -->
  <rect x="40" y="80" width="240" height="120" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="160" y="104" font-size="11.5" font-weight="700" fill="#1b2a4a" text-anchor="middle">发起节点</text>
  <text x="160" y="124" font-size="9" fill="#5b7db1" text-anchor="middle">CREATE … ON CLUSTER c</text>
  <rect x="60" y="136" width="200" height="50" rx="9" fill="#fff" stroke="#bcd0ec"/>
  <text x="160" y="155" font-size="8.5" fill="#1b2a4a" text-anchor="middle">executeDDLQueryOnCluster</text>
  <text x="160" y="170" font-size="8" fill="#5b7db1" text-anchor="middle">建 DDLLogEntry{hosts,query,initiator}</text>
  <text x="160" y="182" font-size="8" fill="#5b7db1" text-anchor="middle">enqueueQuery</text>

  <!-- keeper queue -->
  <rect x="360" y="80" width="340" height="200" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="530" y="104" font-size="12" font-weight="700" fill="#12402a" text-anchor="middle">Keeper 队列 /clickhouse/task_queue/ddl</text>
  <text x="530" y="122" font-size="8.5" fill="#2f6f4f" text-anchor="middle">PersistentSequential znode</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="384" y="134" width="292" height="30" rx="7" fill="#fff" stroke="#bfe0cd"/><text x="530" y="153" fill="#12402a">query-0000000001　（entry：含 query + 目标 hosts）</text>
    <rect x="384" y="170" width="292" height="30" rx="7" fill="#fff" stroke="#bfe0cd"/><text x="530" y="189" fill="#12402a">query-0000000002</text>
    <rect x="404" y="208" width="252" height="52" rx="8" fill="#f2fbf6" stroke="#cdeadb"/><text x="530" y="228" font-size="9" font-weight="600" fill="#12402a">每条 entry 下有状态子节点</text><text x="530" y="245" fill="#2f6f4f">active/&lt;host&gt; · finished/&lt;host_id&gt;</text>
  </g>

  <!-- worker nodes -->
  <text x="880" y="100" font-size="11.5" font-weight="700" fill="#274a78" text-anchor="middle">各节点 DDLWorker</text>
  <g text-anchor="middle">
    <rect x="740" y="112" width="280" height="52" rx="10" fill="#f3f7fc" stroke="#cfe0f2"/><text x="880" y="131" font-size="9.5" font-weight="600" fill="#274a78">node-1：runMainThread 主循环</text><text x="880" y="148" font-size="8" fill="#5b7db1">scheduleTasks getChildren</text>
    <rect x="740" y="172" width="280" height="52" rx="10" fill="#f3f7fc" stroke="#cfe0f2"/><text x="880" y="191" font-size="9.5" font-weight="600" fill="#274a78">node-2：initAndCheckTask</text><text x="880" y="208" font-size="8" fill="#5b7db1">判断本机是否目标 host</text>
    <rect x="740" y="232" width="280" height="52" rx="10" fill="#f3f7fc" stroke="#cfe0f2"/><text x="880" y="251" font-size="9.5" font-weight="600" fill="#274a78">node-3：processTask 执行</text><text x="880" y="268" font-size="8" fill="#5b7db1">tryExecuteQuery + 写 finished 状态</text>
  </g>

  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="280" y1="160" x2="360" y2="160" marker-end="url(#ar)"/>
    <line x1="700" y1="140" x2="740" y2="138" marker-end="url(#ar)"/>
    <line x1="700" y1="190" x2="740" y2="198" marker-end="url(#ar)"/>
    <line x1="700" y1="230" x2="740" y2="258" marker-end="url(#ar)"/>
  </g>
  <!-- feedback status -->
  <path d="M740,258 L710,300 L530,300 L530,280" stroke="#9ccbb0" stroke-width="1.3" fill="none" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="620" y="296" font-size="8" fill="#4c8567" text-anchor="middle">写回 finished 状态</text>

  <!-- leader replica note -->
  <rect x="40" y="320" width="980" height="110" rx="13" fill="#f6f2fb" stroke="#d9c9ec"/>
  <text x="60" y="344" font-size="11.5" font-weight="700" fill="#3d2a5a">副本表的特殊处理：Leader Replica</text>
  <text x="60" y="366" font-size="10" fill="#7a5da5">对 ReplicatedMergeTree 表的 DDL（如 merge/mutation 相关），只在 leader 副本执行一次：tryExecuteQueryOnLeaderReplica</text>
  <text x="60" y="386" font-size="10" fill="#7a5da5">· 其余副本经各自的复制队列同步结果，避免同一操作在每个副本重复执行</text>
  <text x="60" y="408" font-size="10" fill="#4b4b50">· 发起端可用 distributed_ddl_task_timeout 控制等待所有目标节点 finished 的超时；超时后查询返回但任务仍在队列异步完成</text>

  <!-- replicated database contrast -->
  <rect x="40" y="446" width="980" height="72" rx="12" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="470" font-size="11" font-weight="700" fill="#274a78">两种"DDL 播全集群"方式的区别</text>
  <text x="60" y="492" font-size="9.5" fill="#5b7db1">· ON CLUSTER：显式指定集群，每条 DDL 手动带子句；经 task_queue/ddl 队列</text>
  <text x="60" y="510" font-size="9.5" fill="#5b7db1">· Replicated 库：库级自动，库内所有 DDL 都自动同步，无需每条写 ON CLUSTER（经库自己的 /log）</text>

  <rect x="40" y="534" width="980" height="72" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="558" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="580" font-size="10" fill="#4b4b50">分布式 DDL 靠"Keeper 队列 + 各节点 DDLWorker 拉取执行"：发起端把带目标 hosts 的 entry 写进 task_queue/ddl，</text>
  <text x="60" y="597" font-size="10" fill="#4b4b50">各节点主循环拉队列、判断是否目标、执行并回写 finished 状态；副本表的 DDL 只在 leader 执行一次再经复制同步。</text>
</svg>
