<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="580" viewBox="0 0 1060 580" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="580" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">RBAC 权限模型：User ← Role（可嵌套）← GRANT（库/表/列粒度）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">User 持 granted_roles/default_roles · RoleCache → EnabledRoles → 聚合权限 · AccessRights 权限树</text>

  <!-- user -->
  <rect x="40" y="80" width="240" height="180" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="160" y="102" font-size="12" font-weight="700" fill="#1b2a4a" text-anchor="middle">User</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="60" y="114" width="200" height="30" rx="7" fill="#fff" stroke="#bcd0ec"/><text x="160" y="133" fill="#1b2a4a">authentication_methods</text>
    <rect x="60" y="150" width="200" height="30" rx="7" fill="#fff" stroke="#bcd0ec"/><text x="160" y="169" fill="#1b2a4a">granted_roles</text>
    <rect x="60" y="186" width="200" height="30" rx="7" fill="#fff" stroke="#bcd0ec"/><text x="160" y="205" fill="#1b2a4a">default_roles</text>
    <rect x="60" y="222" width="200" height="30" rx="7" fill="#fff" stroke="#bcd0ec"/><text x="160" y="241" fill="#1b2a4a">直接 GRANT 的权限</text>
  </g>

  <!-- roles (nestable) -->
  <rect x="330" y="80" width="240" height="180" rx="13" fill="#f6f2fb" stroke="#d9c9ec" filter="url(#soft)"/>
  <text x="450" y="102" font-size="12" font-weight="700" fill="#3d2a5a" text-anchor="middle">Role</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="350" y="116" width="200" height="40" rx="7" fill="#fff" stroke="#d9c9ec"/><text x="450" y="134" font-weight="600" fill="#3d2a5a">role: analyst</text><text x="450" y="148" fill="#7a5da5">SELECT ON db.*</text>
    <rect x="350" y="162" width="200" height="40" rx="7" fill="#fff" stroke="#d9c9ec"/><text x="450" y="180" font-weight="600" fill="#3d2a5a">role: admin</text><text x="450" y="194" fill="#7a5da5">granted_roles: [analyst]</text>
  </g>
  <text x="450" y="224" font-size="8.5" fill="#9a7cc4" text-anchor="middle">角色可嵌套角色</text>
  <text x="450" y="242" font-size="8.5" fill="#9a7cc4" text-anchor="middle">admin 继承 analyst 的权限</text>

  <!-- access rights tree -->
  <rect x="620" y="80" width="400" height="180" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="820" y="102" font-size="12" font-weight="700" fill="#12402a" text-anchor="middle">AccessRights 权限树</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="640" y="114" width="360" height="28" rx="6" fill="#fff" stroke="#bfe0cd"/><text x="820" y="132" fill="#12402a">*.*　（全局，通配）</text>
    <rect x="670" y="148" width="330" height="28" rx="6" fill="#f2fbf6" stroke="#cdeadb"/><text x="835" y="166" fill="#12402a">db.*　（库级）</text>
    <rect x="700" y="182" width="300" height="28" rx="6" fill="#f2fbf6" stroke="#cdeadb"/><text x="850" y="200" fill="#12402a">db.table　（表级）</text>
    <rect x="730" y="216" width="270" height="28" rx="6" fill="#f2fbf6" stroke="#cdeadb"/><text x="865" y="234" fill="#12402a">db.table.column　（列级）</text>
  </g>
  <text x="655" y="255" font-size="8" fill="#4c8567" text-anchor="start">粒度逐级细化 · 支持 WITH GRANT OPTION</text>

  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <line x1="280" y1="170" x2="330" y2="170" marker-end="url(#ar)"/>
    <line x1="570" y1="170" x2="620" y2="170" marker-end="url(#ar)"/>
  </g>
  <text x="305" y="162" font-size="8" fill="#8aa6cf" text-anchor="middle">授予</text>
  <text x="595" y="162" font-size="8" fill="#8aa6cf" text-anchor="middle">展开为</text>

  <!-- resolution -->
  <rect x="40" y="290" width="980" height="110" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="314" font-size="11.5" font-weight="700" fill="#274a78">权限解析：把 User + 生效角色 聚合成一棵有效权限树</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="60" y="328" width="220" height="56" rx="9" fill="#fff" stroke="#cfe0f2"/><text x="170" y="348" font-weight="600" fill="#274a78">RoleCache</text><text x="170" y="366" fill="#5b7db1">getEnabledRoles</text><text x="170" y="378" fill="#8aa6cf">解析当前生效的角色集</text>
    <rect x="300" y="328" width="220" height="56" rx="9" fill="#fff" stroke="#cfe0f2"/><text x="410" y="348" font-weight="600" fill="#274a78">EnabledRoles</text><text x="410" y="366" fill="#5b7db1">getRolesInfo</text><text x="410" y="378" fill="#8aa6cf">聚合角色 + 权限</text>
    <rect x="540" y="328" width="220" height="56" rx="9" fill="#fff" stroke="#cfe0f2"/><text x="650" y="348" font-weight="600" fill="#274a78">合并直接权限</text><text x="650" y="366" fill="#5b7db1">User 自己的 GRANT</text><text x="650" y="378" fill="#8aa6cf">+ 隐式权限</text>
    <rect x="780" y="328" width="220" height="56" rx="9" fill="#f2fbf6" stroke="#cdeadb"/><text x="890" y="348" font-weight="600" fill="#12402a">有效 AccessRights</text><text x="890" y="366" fill="#2f6f4f">供 isGranted 判定</text><text x="890" y="378" fill="#4c8567">缓存于 ContextAccess</text>
  </g>
  <g stroke="#9ccbb0" stroke-width="1.3" fill="none">
    <line x1="280" y1="356" x2="300" y2="356" marker-end="url(#ar)"/>
    <line x1="520" y1="356" x2="540" y2="356" marker-end="url(#ar)"/>
    <line x1="760" y1="356" x2="780" y2="356" marker-end="url(#ar)"/>
  </g>

  <rect x="40" y="416" width="980" height="86" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="440" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="462" font-size="10" fill="#4b4b50">RBAC 三层：User 被授予 Role（角色可嵌套继承），GRANT 在库/表/列粒度授权（支持通配与 WITH GRANT OPTION）。</text>
  <text x="60" y="479" font-size="10" fill="#4b4b50">鉴权前先把"User + 生效角色 + 直接权限 + 隐式权限"聚合成一棵有效 AccessRights 树，缓存起来供每查询快速 isGranted。</text>
</svg>
