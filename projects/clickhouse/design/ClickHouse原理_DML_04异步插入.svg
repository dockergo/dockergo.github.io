<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="600" viewBox="0 0 1060 600" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="600" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">async insert：把"客户端攒批"下放到服务端，解小 Part 之痛</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">AsynchronousInsertQueue · async_insert 默认 0 · 攒够 10MB/450条/200ms 合并成一个 Part</text>

  <!-- many clients -->
  <g text-anchor="middle" font-size="8.5">
    <rect x="40" y="90" width="120" height="34" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="100" y="111" fill="#1b2a4a">client A · 小 INSERT</text>
    <rect x="40" y="132" width="120" height="34" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="100" y="153" fill="#1b2a4a">client B · 小 INSERT</text>
    <rect x="40" y="174" width="120" height="34" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="100" y="195" fill="#1b2a4a">client C · 小 INSERT</text>
    <rect x="40" y="216" width="120" height="34" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="100" y="237" fill="#1b2a4a">… 高并发单条</text>
  </g>

  <!-- server buffer -->
  <rect x="220" y="88" width="360" height="200" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="400" y="112" font-size="12" font-weight="700" fill="#12402a" text-anchor="middle">服务端缓冲 AsynchronousInsertQueue</text>
  <text x="400" y="130" font-size="8.5" fill="#2f6f4f" text-anchor="middle">pushQueryWithBlock 入队</text>
  <g text-anchor="middle" font-size="8">
    <rect x="244" y="144" width="312" height="26" rx="6" fill="#fff" stroke="#bfe0cd"/><text x="400" y="161" fill="#12402a">缓冲区：A 的行 + B 的行 + C 的行 + …</text>
  </g>
  <text x="400" y="192" font-size="9.5" font-weight="600" fill="#12402a" text-anchor="middle">攒批触发条件（任一满足）</text>
  <g text-anchor="middle" font-size="8">
    <rect x="244" y="204" width="100" height="40" rx="6" fill="#f2fbf6" stroke="#cdeadb"/><text x="294" y="222" fill="#12402a">大小</text><text x="294" y="236" fill="#2f6f4f">10MB</text>
    <rect x="352" y="204" width="100" height="40" rx="6" fill="#f2fbf6" stroke="#cdeadb"/><text x="402" y="222" fill="#12402a">条数</text><text x="402" y="236" fill="#2f6f4f">450 条</text>
    <rect x="460" y="204" width="96" height="40" rx="6" fill="#f2fbf6" stroke="#cdeadb"/><text x="508" y="222" fill="#12402a">超时</text><text x="508" y="236" fill="#2f6f4f">200ms</text>
  </g>
  <text x="400" y="268" font-size="8" fill="#4c8567" text-anchor="middle">scheduleDataProcessingJob → processData</text>

  <!-- one part output -->
  <rect x="640" y="120" width="180" height="130" rx="13" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="730" y="144" font-size="11" font-weight="700" fill="#5a3410" text-anchor="middle">一个 Part</text>
  <text x="730" y="164" font-size="8.5" fill="#93762e" text-anchor="middle">一个 InterpreterInsertQuery</text>
  <text x="730" y="180" font-size="8.5" fill="#93762e" text-anchor="middle">把累积多批合并写入</text>
  
  <rect x="660" y="208" width="140" height="30" rx="6" fill="#fff" stroke="#efdcb4"/><text x="730" y="227" font-size="8" fill="#5a3410" text-anchor="middle">≥ 阈值大小的健康 Part</text>

  <!-- ack -->
  <rect x="870" y="120" width="150" height="130" rx="13" fill="#f6f2fb" stroke="#d9c9ec"/>
  <text x="945" y="144" font-size="10.5" font-weight="700" fill="#3d2a5a" text-anchor="middle">客户端返回</text>
  <text x="945" y="168" font-size="8.5" fill="#7a5da5" text-anchor="middle">wait_for_async_insert</text>
  <text x="945" y="184" font-size="8.5" fill="#7a5da5" text-anchor="middle">默认 1</text>
  <text x="945" y="204" font-size="8" fill="#9a7cc4" text-anchor="middle">=1：等 Part 落定再返回</text>
  <text x="945" y="220" font-size="8" fill="#9a7cc4" text-anchor="middle">=0：入队即返回（更快</text>
  <text x="945" y="234" font-size="8" fill="#9a7cc4" text-anchor="middle">但失败感知弱）</text>

  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <path d="M160,107 L200,150 L220,150" marker-end="url(#ar)"/>
    <path d="M160,149 L220,160" marker-end="url(#ar)"/>
    <path d="M160,191 L200,175 L220,172" marker-end="url(#ar)"/>
    <line x1="580" y1="185" x2="640" y2="185" marker-end="url(#ar)"/>
    <line x1="820" y1="185" x2="870" y2="185" marker-end="url(#ar)"/>
  </g>

  <!-- comparison -->
  <rect x="40" y="308" width="480" height="120" rx="13" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="280" y="332" font-size="11" font-weight="700" fill="#7a2230" text-anchor="middle">不用 async insert</text>
  <text x="60" y="356" font-size="9.5" fill="#a44">· N 个小 INSERT → N 个小 Part</text>
  <text x="60" y="376" font-size="9.5" fill="#a44">· merge 疲于奔命，查询归并慢</text>
  <text x="60" y="396" font-size="9.5" fill="#a44">· 高并发下易触发 too many parts</text>
  <text x="60" y="416" font-size="9" fill="#a44">· 除非客户端能自行攒批</text>

  <rect x="540" y="308" width="480" height="120" rx="13" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="780" y="332" font-size="11" font-weight="700" fill="#12402a" text-anchor="middle">用 async insert</text>
  <text x="560" y="356" font-size="9.5" fill="#2f6f4f">· N 个小 INSERT → 服务端合并成少量大 Part</text>
  <text x="560" y="376" font-size="9.5" fill="#2f6f4f">· 客户端仍写简单的单条 INSERT</text>
  <text x="560" y="396" font-size="9.5" fill="#2f6f4f">· 攒批逻辑对客户端透明</text>
  <text x="560" y="416" font-size="9" fill="#4c8567">· 类似 Doris 的 group commit 思路</text>

  <rect x="40" y="448" width="980" height="88" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="472" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="494" font-size="10" fill="#4b4b50">async insert 让服务端替你攒批：多个小 INSERT 先进缓冲，攒够大小/条数/超时后合并写成一个大 Part。</text>
  <text x="60" y="511" font-size="10" fill="#4b4b50">当客户端无法自行攒批（高并发单条上报）时，这是避免小 Part 爆炸的官方解法——用一点写入延迟换 Part 数骤降。</text>
  <text x="60" y="528" font-size="9" fill="#8a8a8f">wait_for_async_insert 决定是否等 Part 落定再返回；关掉更快但失败感知弱。</text>
</svg>
