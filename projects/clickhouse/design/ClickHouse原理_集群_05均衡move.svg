<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="540" viewBox="0 0 1060 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">数据均衡与 TTL move：Part 在存储卷/磁盘间移动</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">MergeTreePartsMover 执行 · TTL ... TO VOLUME/DISK 冷热分层 · 由后台 scheduleMoveTask 调度</text>

  <!-- TTL move -->
  <rect x="40" y="80" width="620" height="200" rx="14" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="350" y="104" font-size="12" font-weight="700" fill="#5a3410" text-anchor="middle">TTL move：按数据年龄下沉（冷热分层）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="60" y="120" width="180" height="80" rx="10" fill="#fff" stroke="#efdcb4"/><text x="150" y="142" font-size="9.5" font-weight="600" fill="#5a3410">热层（本地 SSD）</text><text x="150" y="162" fill="#93762e">近期数据</text><text x="150" y="178" fill="#93762e">快、贵</text><text x="150" y="194" fill="#b08843">volume: hot</text>
    <rect x="460" y="120" width="180" height="80" rx="10" fill="#fdf9f0" stroke="#efdcb4"/><text x="550" y="142" font-size="9.5" font-weight="600" fill="#5a3410">冷层（HDD/S3）</text><text x="550" y="162" fill="#93762e">历史数据</text><text x="550" y="178" fill="#93762e">慢、省</text><text x="550" y="194" fill="#b08843">volume: cold</text>
  </g>
  <path d="M240,160 L460,160" stroke="#d8b48a" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>
  <text x="350" y="150" font-size="9" fill="#93762e" text-anchor="middle">TTL ts + INTERVAL 30 DAY TO VOLUME 'cold'</text>
  <text x="350" y="230" font-size="9" fill="#93762e" text-anchor="middle">数据到期 → MergeTreePartsMover 把 Part 搬到冷层</text>
  <text x="350" y="250" font-size="8.5" fill="#b08843" text-anchor="middle">对查询透明：冷热数据仍是同一张表</text>
  <text x="350" y="268" font-size="8" fill="#b08843" text-anchor="middle">selectPartsForMove 选择要移动的 Part</text>

  <!-- volume balance -->
  <rect x="680" y="80" width="340" height="200" rx="14" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="850" y="104" font-size="11.5" font-weight="700" fill="#274a78" text-anchor="middle">卷间均衡</text>
  <text x="700" y="128" font-size="9" fill="#5b7db1">· 多磁盘卷时平衡负载</text>
  <text x="700" y="148" font-size="9" fill="#5b7db1">· 同 MergeTreePartsMover 执行</text>
  <text x="700" y="168" font-size="9" fill="#5b7db1">· 按 storage_policy 的卷配置</text>
  <text x="700" y="192" font-size="9" fill="#8aa6cf">· move_factor 触发阈值</text>
  <rect x="700" y="208" width="300" height="56" rx="9" fill="#fff" stroke="#cfe0f2"/>
  <text x="850" y="228" font-size="8.5" fill="#274a78" text-anchor="middle">TTL delete（删除）走另一条路：</text>
  <text x="850" y="246" font-size="8.5" fill="#5b7db1" text-anchor="middle">TTLMergeSelector 在 merge 时剔除过期行</text>
  <text x="850" y="260" font-size="8" fill="#8aa6cf" text-anchor="middle">（见后台任务篇）</text>

  <!-- move vs delete -->
  <rect x="40" y="296" width="980" height="90" rx="13" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="60" y="320" font-size="11" font-weight="700" fill="#12402a">TTL 的两种动作别混淆</text>
  <text x="60" y="342" font-size="9.5" fill="#2f6f4f">· TTL move（TO VOLUME/DISK）：把 Part 搬到别的存储介质——数据还在，只是换地方（本主线 PartsMover）</text>
  <text x="60" y="360" font-size="9.5" fill="#2f6f4f">· TTL delete（默认 TTL 表达式）：删除过期行——merge 时由 TTLMergeSelector 剔除（后台任务主线）</text>
  <text x="60" y="378" font-size="9" fill="#4c8567">· 二者都由后台调度，但一个"搬"一个"删"</text>

  <rect x="40" y="402" width="980" height="120" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="426" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="448" font-size="10" fill="#4b4b50">MergeTreePartsMover 负责 Part 在存储卷/磁盘间移动，两个用途：TTL move 按数据年龄把冷数据下沉到廉价介质</text>
  <text x="60" y="466" font-size="10" fill="#4b4b50">（冷热分层，对查询透明），以及多卷间的负载均衡。由后台 scheduleMoveTask 调度执行。</text>
  <text x="60" y="490" font-size="10" fill="#4b4b50" font-weight="600">注意区分：TTL move 是"搬数据换介质"，TTL delete 是"merge 时删过期行"——两条不同的路径。</text>
  <text x="60" y="512" font-size="9" fill="#8a8a8f">冷热分层是正交叠加的部署策略（见全景·部署形态）。</text>
</svg>
