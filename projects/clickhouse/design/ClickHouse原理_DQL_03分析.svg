<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="580" viewBox="0 0 1060 580" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="580" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">分析：AST → QueryTree，跑 40+ 个 pass 把 SQL 规整成好优化的语义树</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">buildQueryTree → addQueryTreePasses 40+ pass· QueryAnalysisPass 首个</text>

  <g text-anchor="middle">
    <rect x="40" y="88" width="150" height="70" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="115" y="114" font-size="10.5" font-weight="600" fill="#1b2a4a">AST</text><text x="115" y="132" font-size="8.5" fill="#5b7db1">Parser 产出</text><text x="115" y="147" font-size="8.5" fill="#5b7db1">纯语法树</text>
    <rect x="230" y="88" width="180" height="70" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="320" y="112" font-size="10.5" font-weight="600" fill="#274a78">buildQueryTree</text><text x="320" y="130" font-size="8.5" fill="#5b7db1">AST → QueryTree</text><text x="320" y="145" font-size="8.5" fill="#5b7db1">语义节点树</text>
    <rect x="450" y="88" width="200" height="70" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="550" y="112" font-size="10.5" font-weight="600" fill="#274a78">QueryTreePassManager</text><text x="550" y="130" font-size="8.5" fill="#5b7db1">顺序跑 40+ 个 pass</text><text x="550" y="145" font-size="8.5" fill="#5b7db1">逐步规整语义</text>
    <rect x="690" y="88" width="180" height="70" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="780" y="112" font-size="10.5" font-weight="600" fill="#12402a">规整后的 QueryTree</text><text x="780" y="130" font-size="8.5" fill="#2f6f4f">交给 Planner</text><text x="780" y="145" font-size="8.5" fill="#2f6f4f">生成 QueryPlan</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="190" y1="123" x2="230" y2="123" marker-end="url(#ar)"/>
    <line x1="410" y1="123" x2="450" y2="123" marker-end="url(#ar)"/>
    <line x1="650" y1="123" x2="690" y2="123" marker-end="url(#ar)"/>
  </g>

  <!-- what passes do -->
  <text x="45" y="196" font-size="12" font-weight="700" fill="#274a78">这些 pass 在做什么（举例）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="40" y="208" width="235" height="80" rx="10" fill="#f3f7fc" stroke="#cfe0f2"/><text x="157" y="230" font-size="9.5" font-weight="600" fill="#274a78">名称解析</text><text x="157" y="248" fill="#5b7db1">QueryAnalysisPass</text><text x="157" y="264" fill="#5b7db1">列/表/函数标识符</text><text x="157" y="280" fill="#8aa6cf">绑定到真实对象</text>
    <rect x="287" y="208" width="235" height="80" rx="10" fill="#f3f7fc" stroke="#cfe0f2"/><text x="404" y="230" font-size="9.5" font-weight="600" fill="#274a78">常量折叠 / 化简</text><text x="404" y="248" fill="#5b7db1">1+1→2 · 恒真谓词消除</text><text x="404" y="264" fill="#5b7db1">冗余表达式合并</text><text x="404" y="280" fill="#8aa6cf">减少运行期计算</text>
    <rect x="534" y="208" width="235" height="80" rx="10" fill="#f3f7fc" stroke="#cfe0f2"/><text x="651" y="230" font-size="9.5" font-weight="600" fill="#274a78">函数/谓词重写</text><text x="651" y="248" fill="#5b7db1">如 date 转换预映射</text><text x="651" y="264" fill="#5b7db1">count(*) 优化等</text><text x="651" y="280" fill="#8aa6cf">等价但更快的形态</text>
    <rect x="781" y="208" width="239" height="80" rx="10" fill="#f3f7fc" stroke="#cfe0f2"/><text x="900" y="230" font-size="9.5" font-weight="600" fill="#274a78">子查询/CTE 展开</text><text x="900" y="248" fill="#5b7db1">关联子查询改写</text><text x="900" y="264" fill="#5b7db1">JOIN 规范化</text><text x="900" y="280" fill="#8aa6cf">统一后续处理</text>
  </g>

  <!-- why querytree -->
  <rect x="40" y="308" width="980" height="96" rx="13" fill="#f6f2fb" stroke="#d9c9ec"/>
  <text x="60" y="332" font-size="11.5" font-weight="700" fill="#3d2a5a">为什么要 QueryTree 这层（对照旧 Analyzer）</text>
  <text x="60" y="354" font-size="10" fill="#7a5da5">· 旧路径把"解析 + 重写 + 生成执行"揉在 InterpreterSelectQuery/ExpressionAnalyzer 里，边界模糊、难扩展</text>
  <text x="60" y="372" font-size="10" fill="#7a5da5">· 新路径把"语义分析"独立成 QueryTree + 可组合的 pass 序列——名称解析彻底、优化点清晰、支持更复杂的 JOIN/子查询/窗口</text>
  <text x="60" y="392" font-size="9.5" fill="#9a7cc4">· 这是 v25.8 默认（enable_analyzer=true）：更强的分析能力，是近年查询能力提升的基础设施</text>

  <rect x="40" y="420" width="980" height="76" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="444" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="466" font-size="10" fill="#4b4b50">分析阶段把"用户写的 SQL（AST）"转成"引擎好优化的语义树（QueryTree）"，靠40+ 个 pass 依次做名称解析、</text>
  <text x="60" y="483" font-size="10" fill="#4b4b50">常量折叠、谓词化简、函数/子查询重写。规整后的 QueryTree 交给 Planner 生成逻辑计划——这是"规划期"的第一步。</text>
</svg>
