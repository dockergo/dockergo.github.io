<svg xmlns="http://www.w3.org/2000/svg" width="900" height="290" viewBox="0 0 900 290" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="900" height="290" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">优化三段式：RBO 定形 · CBO 定量 · HBO 纠偏</text>
  <rect x="352" y="44" width="196" height="34" rx="10" fill="#fff7e6" stroke="#e8cf9a" filter="url(#s)"/><text x="450" y="65" font-size="11.5" fill="#5a3410" text-anchor="middle">统计信息 · 行数/NDV/直方图</text>

  <rect x="30" y="108" width="260" height="150" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#s)"/>
  <text x="160" y="132" font-size="14" font-weight="600" fill="#1b2a4a" text-anchor="middle">RBO 规则改写</text><text x="160" y="150" font-size="10" fill="#5b7db1" text-anchor="middle">定形 · 总不更差</text>
  <g font-size="10.5" fill="#33507e"><text x="52" y="174">· 谓词下推 / 列裁剪</text><text x="52" y="194">· 常量折叠 / 表达式化简</text><text x="52" y="214">· 子查询解嵌套</text><text x="52" y="234">· Limit/TopN 下推 · 分区裁剪</text></g>

  <rect x="320" y="108" width="260" height="150" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#s)"/>
  <text x="450" y="132" font-size="14" font-weight="600" fill="#1b2a4a" text-anchor="middle">CBO 代价择优</text><text x="450" y="150" font-size="10" fill="#5b7db1" text-anchor="middle">定量 · 依统计</text>
  <g font-size="10.5" fill="#33507e"><text x="342" y="174">· Memo/Cascades 等价类搜索</text><text x="342" y="194">· Join Reorder（小表在前）</text><text x="342" y="214">· 分布方式选择</text><text x="342" y="234">· 聚合方式（一/两阶段）</text></g>

  <rect x="610" y="108" width="260" height="150" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#s)"/>
  <text x="740" y="132" font-size="14" font-weight="600" fill="#1b2a4a" text-anchor="middle">HBO 历史纠偏</text><text x="740" y="150" font-size="10" fill="#5b7db1" text-anchor="middle">纠偏 · 依实测</text>
  <g font-size="10.5" fill="#33507e"><text x="632" y="174">· 实测行数/耗时回灌</text><text x="632" y="194">· 纠正估算偏差</text><text x="632" y="214">· 重复负载越跑越准</text><text x="632" y="234">· 补 CBO 估不准软肋</text></g>

  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="290" y1="160" x2="320" y2="160" marker-end="url(#a)"/>
    <line x1="580" y1="160" x2="610" y2="160" marker-end="url(#a)"/>
    <line x1="450" y1="78" x2="450" y2="108" marker-end="url(#a)"/>
    <path d="M740,258 L740,278 L450,278 L450,258" stroke-dasharray="5 3" marker-end="url(#a)"/>
  </g>
  <text x="595" y="272" font-size="10.5" fill="#a1a1a6" text-anchor="middle">实测回灌纠偏</text>
