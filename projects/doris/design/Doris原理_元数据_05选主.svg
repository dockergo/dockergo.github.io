<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="320" viewBox="0 0 1000 320" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1000" height="320" fill="#fbfbfd"/>
  <text x="40" y="30" font-size="14" font-weight="600" fill="#1d1d1f">选主 · 恢复 · 元数据压力：Master 宕机透明切换，海量分片是反模式</text>
  <!-- election -->
  <rect x="40" y="60" width="290" height="150" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="185" y="86" font-size="12.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">选主（Paxos 家族 · BDB JE HA）</text>
  <rect x="60" y="100" width="250" height="30" rx="8" fill="#fbeaea" stroke="#e7c3c3"/><text x="185" y="120" font-size="10.5" fill="#4a1414" text-anchor="middle">Master 宕机</text>
  <rect x="60" y="138" width="250" height="30" rx="8" fill="#fff7e6" stroke="#e8cf9a"/><text x="185" y="158" font-size="10.5" fill="#5a3410" text-anchor="middle">Follower 依已提交位点选新主</text>
  <rect x="60" y="176" width="250" height="26" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="185" y="194" font-size="10.5" fill="#12402a" text-anchor="middle">对客户端透明 · 已提交不丢</text>
  <line x1="185" y1="130" x2="185" y2="138" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/><line x1="185" y1="168" x2="185" y2="176" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <!-- recovery -->
  <rect x="360" y="60" width="290" height="150" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="505" y="86" font-size="12.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">恢复流程</text>
  <rect x="380" y="100" width="250" height="30" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="505" y="120" font-size="10.5" fill="#1b2a4a" text-anchor="middle">① 加载最近 Image</text>
  <rect x="380" y="138" width="250" height="30" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="505" y="158" font-size="10.5" fill="#1b2a4a" text-anchor="middle">② 回放其后 Journal 到最新位点</text>
  <rect x="380" y="176" width="250" height="26" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="505" y="194" font-size="10.5" fill="#12402a" text-anchor="middle">③ 追平后对外服务</text>
  <line x1="505" y1="130" x2="505" y2="138" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/><line x1="505" y1="168" x2="505" y2="176" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <!-- pressure -->
  <rect x="680" y="60" width="280" height="150" rx="14" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="820" y="86" font-size="12.5" font-weight="600" fill="#7a5a1e" text-anchor="middle">元数据压力（反模式）</text>
  <g font-size="10.5" fill="#7a5a1e"><text x="700" y="112">· 全部元数据常驻内存</text><text x="700" y="136">· 海量小表 / 超多分区 / 超多分片</text><text x="700" y="160">  → 内存、选主、回放开销陡增</text><text x="700" y="184">· 应控分片规模、避免高频小 DDL</text></g>
  <text x="500" y="248" font-size="11.5" fill="#6e6e73" text-anchor="middle">单点写换强一致，但限元数据写吞吐；只读节点用日志号落后量衡量复制延迟。</text>
  <text x="500" y="272" font-size="11.5" fill="#6e6e73" text-anchor="middle">备份关键：Image + Journal 齐全才能恢复到最新，务必定期备份 meta 目录。</text>
</svg>
