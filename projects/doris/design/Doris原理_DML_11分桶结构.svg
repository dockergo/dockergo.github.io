<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="460" viewBox="0 0 1080 460" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect x="0" y="0" width="1080" height="460" fill="#fbfbfd"/>
  <text x="40" y="38" font-size="16" font-weight="600" fill="#1d1d1f">导入分桶结构 · 100 万行按 tablet 路由(VTabletWriter)</text>
  <text x="40" y="58" font-size="11.5" fill="#86868b">一批 Block 按分区键找 partition、按分桶键 hash 定 tablet,fan-out 到各 BE 并行写</text>

  <!-- 输入 -->
  <rect x="30" y="100" width="220" height="240" rx="14" fill="#f6f8fc" stroke="#e6ecf4" filter="url(#soft)"/>
  <text x="140" y="128" font-size="12.5" font-weight="600" fill="#1d5fb8" text-anchor="middle">输入 batch(Block)</text>
  <g font-size="10" fill="#4a4e57" text-anchor="middle">
    <rect x="50" y="146" width="180" height="30" rx="7" fill="#ffffff" stroke="#c4d5ee"/><text x="140" y="165">user_id=101 …</text>
    <rect x="50" y="182" width="180" height="30" rx="7" fill="#ffffff" stroke="#c4d5ee"/><text x="140" y="201">user_id=202 …</text>
    <rect x="50" y="218" width="180" height="30" rx="7" fill="#ffffff" stroke="#c4d5ee"/><text x="140" y="237">user_id=303 …</text>
    <text x="140" y="272" font-size="9.5" fill="#7d93b5">100 万行列式 Block</text>
    <text x="140" y="292" font-size="9.5" fill="#7d93b5">user_id = 分布键</text>
  </g>

  <!-- 分区+分桶计算 -->
  <rect x="310" y="100" width="240" height="240" rx="14" fill="#fbf7ef" stroke="#efe4cf" filter="url(#soft)"/>
  <text x="430" y="128" font-size="12.5" font-weight="600" fill="#8a5a12" text-anchor="middle">分区 + 分桶计算</text>
  <g font-size="10" fill="#8a5a12" text-anchor="middle">
    <rect x="330" y="146" width="200" height="52" rx="9" fill="#ffffff" stroke="#efe0c4"/><text x="430" y="167" font-weight="600" fill="#1d1d1f">① 分区</text><text x="430" y="185" font-size="9">按 date 找 partition</text>
    <rect x="330" y="208" width="200" height="52" rx="9" fill="#ffffff" stroke="#efe0c4"/><text x="430" y="229" font-weight="600" fill="#1d1d1f">② 分桶</text><text x="430" y="247" font-size="9">crc32(user_id) % 10 → tablet_id</text>
    <text x="430" y="288" font-size="9.5" fill="#a98b52">TabletFinder 定位目标 tablet</text>
    <text x="430" y="308" font-size="9.5" fill="#a98b52">同 tablet 行组批 AddBlockRequest</text>
  </g>

  <!-- 三 tablet channel fan-out -->
  <g font-size="10" text-anchor="middle">
    <rect x="610" y="104" width="230" height="66" rx="11" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/><text x="725" y="128" font-weight="600" fill="#2c5a3a">tablet-3 → BE-A</text><text x="725" y="148" font-size="9" fill="#4e7a5c">VNodeChannel · ~10 万行 · 并行发送</text>
    <rect x="610" y="187" width="230" height="66" rx="11" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/><text x="725" y="211" font-weight="600" fill="#2c5a3a">tablet-7 → BE-B</text><text x="725" y="231" font-size="9" fill="#4e7a5c">VNodeChannel · ~10 万行 · 并行发送</text>
    <rect x="610" y="270" width="230" height="66" rx="11" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/><text x="725" y="294" font-weight="600" fill="#2c5a3a">tablet-9 → BE-C</text><text x="725" y="314" font-size="9" fill="#4e7a5c">VNodeChannel · ~10 万行 · 并行发送</text>
  </g>

  <!-- DeltaWriter fan-in -->
  <rect x="880" y="150" width="170" height="140" rx="14" fill="#faf4fb" stroke="#ecd9ef" filter="url(#soft)"/>
  <text x="965" y="176" font-size="12" font-weight="600" fill="#7a3fb0" text-anchor="middle">各 BE</text>
  <text x="965" y="196" font-size="11" font-weight="600" fill="#1d1d1f" text-anchor="middle">DeltaWriter</text>
  <text x="965" y="214" font-size="9.5" fill="#a06fc0" text-anchor="middle">→ MemTable</text>
  <text x="965" y="234" font-size="9.5" fill="#a06fc0" text-anchor="middle">flush segment</text>
  <text x="965" y="256" font-size="9" fill="#c0a0d8" text-anchor="middle">LSM 落盘</text>

  <!-- arrows -->
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="250" y1="220" x2="309" y2="220" marker-end="url(#ar)"/>
    <path d="M550,190 L609,137" marker-end="url(#ar)"/>
    <line x1="550" y1="220" x2="609" y2="220" marker-end="url(#ar)"/>
    <path d="M550,250 L609,303" marker-end="url(#ar)"/>
    <path d="M840,137 L879,190" marker-end="url(#ar)"/>
    <line x1="840" y1="220" x2="879" y2="220" marker-end="url(#ar)"/>
    <path d="M840,303 L879,250" marker-end="url(#ar)"/>
  </g>
  <text x="580" y="185" font-size="8" fill="#a1a1a6">tablet-3</text>
  <text x="580" y="315" font-size="8" fill="#a1a1a6">tablet-9</text>

  <text x="40" y="392" font-size="10.5" fill="#86868b">fan-out:一批数据按分桶散到多个 tablet/BE 并行写 → fan-in:各 BE DeltaWriter 独立落盘。分桶键选高基数列才能均匀散布、避免热点。</text>
  <text x="40" y="414" font-size="10.5" fill="#86868b">分桶键同时决定 Colocate / Bucket Shuffle 能否免 shuffle;单 Tablet 数据量适中(经验 百MB~GB)。</text>
</svg>
