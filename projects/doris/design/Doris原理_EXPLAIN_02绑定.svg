<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 900 620" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect x="0" y="0" width="900" height="620" fill="#fbfbfd"/>
  <text x="40" y="38" font-size="15" font-weight="600" fill="#1d1d1f">② ANALYZED PLAN · 绑定</text>
  <text x="40" y="58" font-size="11" fill="#86868b">绑定列/类型/权限;UnboundRelation → LogicalOlapScan,Join 类型定为 INNER</text>
  <rect x="40" y="74" width="820" height="26" rx="8" fill="#f5faf6" stroke="#cfe6d5"/><text x="54" y="91" font-size="10.5" fill="#2c5a3a">Analyzer:查 Catalog 绑定每列到具体表、推导类型、校验权限</text>
  <g text-anchor="middle" font-size="12">
    <rect x="350" y="112" width="200" height="38" rx="10" fill="#f4eefb" stroke="#dcccf0" filter="url(#soft)"/><text x="450" y="136" fill="#4a2e78">Limit 10</text>
    <rect x="340" y="166" width="220" height="38" rx="10" fill="#f4eefb" stroke="#dcccf0" filter="url(#soft)"/><text x="450" y="190" fill="#4a2e78">Sort($2 DESC)</text>
    <rect x="300" y="220" width="300" height="44" rx="10" fill="#f4eefb" stroke="#dcccf0" filter="url(#soft)"/><text x="450" y="240" fill="#4a2e78" font-weight="600">Aggregate</text><text x="450" y="256" font-size="9.5" fill="#8a6ab5">region:VARCHAR, sum(amount:DECIMAL)</text>
    <rect x="330" y="280" width="240" height="38" rx="10" fill="#f4eefb" stroke="#dcccf0" filter="url(#soft)"/><text x="450" y="304" fill="#4a2e78">Filter(typed)</text>
    <rect x="310" y="334" width="280" height="44" rx="10" fill="#ecf2fb" stroke="#c4d5ee" filter="url(#soft)"/><text x="450" y="354" fill="#274a78" font-weight="600">LogicalJoin INNER</text><text x="450" y="370" font-size="9.5" fill="#7d93b5">BIGINT = BIGINT</text>
    <rect x="170" y="418" width="250" height="48" rx="10" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/><text x="295" y="438" fill="#2c5a3a" font-weight="600">LogicalOlapScan</text><text x="295" y="455" font-size="9.5" fill="#4e7a5c">orders · 已绑定 schema</text>
    <rect x="480" y="418" width="250" height="48" rx="10" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/><text x="605" y="438" fill="#2c5a3a" font-weight="600">LogicalOlapScan</text><text x="605" y="455" font-size="9.5" fill="#4e7a5c">users · 已绑定 schema</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="450" y1="150" x2="450" y2="165" marker-end="url(#ar)"/>
    <line x1="450" y1="204" x2="450" y2="219" marker-end="url(#ar)"/>
    <line x1="450" y1="264" x2="450" y2="279" marker-end="url(#ar)"/>
    <line x1="450" y1="318" x2="450" y2="333" marker-end="url(#ar)"/>
    <line x1="410" y1="378" x2="295" y2="417" marker-end="url(#ar)"/>
    <line x1="490" y1="378" x2="605" y2="417" marker-end="url(#ar)"/>
  </g>
  <text x="40" y="512" font-size="10.5" fill="#86868b">绑定后每个算子都有确定的输入/输出列与类型,叶子成为真实的 OlapScan,Join 类型确定为 INNER。</text>
</svg>
