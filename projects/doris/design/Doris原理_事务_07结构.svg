<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect x="0" y="0" width="1080" height="540" fill="#fbfbfd"/>
  <text x="40" y="38" font-size="16" font-weight="600" fill="#1d1d1f">事务与 MVCC 版本结构</text>
  <text x="40" y="58" font-size="11.5" fill="#86868b">每次导入生成新 version rowset;读按 version 快照选可见集,写读互不阻塞</text>

  <!-- 两阶段事务 三步 -->
  <rect x="30" y="80" width="640" height="180" rx="14" fill="#f6f8fc" stroke="#e6ecf4"/>
  <text x="50" y="104" font-size="13" font-weight="600" fill="#1d5fb8">两阶段事务(FE DatabaseTransactionMgr + BE TxnManager)</text>
  <g text-anchor="middle" font-size="11" fill="#274a78">
    <rect x="50" y="118" width="190" height="118" rx="11" fill="#ffffff" stroke="#c4d5ee" filter="url(#soft)"/><text x="145" y="142" font-weight="600" fill="#1d1d1f">① prepare</text><text x="145" y="164" font-size="9.5" fill="#7d93b5">登记事务槽</text><text x="145" y="204" font-size="10" fill="#a86a3a">数据不可见</text>
    <rect x="250" y="118" width="190" height="118" rx="11" fill="#ffffff" stroke="#c4d5ee" filter="url(#soft)"/><text x="345" y="142" font-weight="600" fill="#1d1d1f">② commit</text><text x="345" y="164" font-size="9.5" fill="#7d93b5">落 rowset meta</text><text x="345" y="204" font-size="10" fill="#a86a3a">已写未定版本</text>
    <rect x="450" y="118" width="200" height="118" rx="11" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/><text x="550" y="142" font-weight="600" fill="#2c5a3a">③ publish</text><text x="550" y="164" font-size="9.5" fill="#4e7a5c">定版本生效</text><text x="550" y="182" font-size="9.5" fill="#4e7a5c">add_inc_rowset</text><text x="550" y="204" font-size="10" fill="#2c8a4a">✓ 此刻可见</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="240" y1="177" x2="249" y2="177" marker-end="url(#ar)"/>
    <line x1="440" y1="177" x2="449" y2="177" marker-end="url(#ar)"/>
  </g>

  <!-- RowsetMeta.version -->
  <rect x="690" y="80" width="360" height="180" rx="14" fill="#fbf7ef" stroke="#efe4cf"/>
  <text x="710" y="104" font-size="13" font-weight="600" fill="#8a5a12">RowsetMeta.version</text>
  <text x="710" y="121" font-size="9" fill="#a98b52">每 rowset 带 [start,end]</text>
  <g font-size="10.5" text-anchor="middle" fill="#8a5a12">
    <rect x="710" y="134" width="150" height="40" rx="8" fill="#ffffff" stroke="#efe0c4"/><text x="785" y="158">[0-8] base</text>
    <rect x="870" y="134" width="160" height="40" rx="8" fill="#ffffff" stroke="#efe0c4"/><text x="950" y="158">[9-10] cumulative</text>
    <rect x="710" y="182" width="150" height="40" rx="8" fill="#ffffff" stroke="#efe0c4"/><text x="785" y="206">[11-11] 导入</text>
    <rect x="870" y="182" width="160" height="40" rx="8" fill="#ffffff" stroke="#efe0c4"/><text x="950" y="206">[12-12] 导入</text>
  </g>
  <text x="710" y="244" font-size="9.5" fill="#a98b52">每次导入 = 一个新 version 区间的 rowset</text>

  <!-- VersionGraph -->
  <rect x="30" y="276" width="510" height="230" rx="14" fill="#f3f0fb" stroke="#ddd4f2"/>
  <text x="50" y="300" font-size="13" font-weight="600" fill="#5b3fd6">VersionGraph(版本 DAG)</text>
  <text x="50" y="317" font-size="9" fill="#8a6fc0">version_graph.h · 顶点=version 端点,边=rowset,最短路=可见集</text>
  <rect x="50" y="330" width="470" height="60" rx="10" fill="#ffffff" stroke="#ddd4f2" filter="url(#soft)"/><text x="66" y="352" font-size="11" font-weight="600" fill="#1d1d1f">capture_rs_readers</text><text x="66" y="372" font-size="9.5" fill="#8a6fc0">从 _rs_version_map 选一致 rowset 集</text>
  <g font-size="10" text-anchor="middle" fill="#5b3fd6">
    <rect x="50" y="402" width="80" height="34" rx="7" fill="#f4eefb" stroke="#e6d9f2"/><text x="90" y="423">v0</text>
    <rect x="150" y="402" width="90" height="34" rx="7" fill="#f4eefb" stroke="#e6d9f2"/><text x="195" y="423">v8</text>
    <rect x="260" y="402" width="90" height="34" rx="7" fill="#f4eefb" stroke="#e6d9f2"/><text x="305" y="423">v10</text>
    <rect x="370" y="402" width="90" height="34" rx="7" fill="#f4eefb" stroke="#e6d9f2"/><text x="415" y="423">v12</text>
  </g>
  <g stroke="#c0a8e0" stroke-width="1.4" fill="none">
    <line x1="130" y1="419" x2="149" y2="419" marker-end="url(#ar)"/><line x1="240" y1="419" x2="259" y2="419" marker-end="url(#ar)"/><line x1="350" y1="419" x2="369" y2="419" marker-end="url(#ar)"/>
  </g>
  <text x="50" y="460" font-size="9.5" fill="#8a6fc0">读快照按最短路拼 [0-12] 连续区间,有洞→报错/等待</text>

  <!-- MoW 可见性 -->
  <rect x="560" y="276" width="490" height="230" rx="14" fill="#f5faf6" stroke="#e2ece5"/>
  <text x="580" y="300" font-size="13" font-weight="600" fill="#2c5a3a">MoW 版本可见性</text>
  <text x="580" y="317" font-size="9" fill="#4e7a5c">delete bitmap 按 version 生效,主键最新值语义</text>
  <g font-size="10.5" fill="#4e7a5c">
    <text x="580" y="344">· 每 version 有一份 delete bitmap,标记该版本下被覆盖/删除的行</text>
    <text x="580" y="368">· 读 version=N 的快照:取 ≤N 的 rowset 集 + 对应 delete bitmap</text>
    <text x="580" y="392">· 主键重复写:旧行在新 version 的 bitmap 里被标删 → 只见最新值</text>
    <text x="580" y="416">· 写读互不阻塞:读锁定一致 version,新导入不影响进行中的读</text>
  </g>
  <rect x="580" y="436" width="450" height="54" rx="10" fill="#ffffff" stroke="#cfe6d5"/><text x="596" y="458" font-size="10.5" font-weight="600" fill="#2c5a3a">一致性契约</text><text x="596" y="476" font-size="9.5" fill="#4e7a5c">publish 定 version 后读 ≥该 version 才可见;version 连续无洞是可见前提。</text>
</svg>
