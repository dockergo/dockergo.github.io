    <rect x="30" y="122" width="195" height="64" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#s)"/><text x="127" y="150" font-size="13" font-weight="600" fill="#1b2a4a">Stream Load</text><text x="127" y="172" font-size="10.5" fill="#5b7db1">HTTP 实时推流 · 低延迟</text>
