<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="340" viewBox="0 0 1000 340" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1000" height="340" fill="#fbfbfd"/>
  <text x="40" y="30" font-size="14" font-weight="600" fill="#1d1d1f">TopN 与极值下推：堆维护 top-k，把当前第 k 名作为动态阈值下推 Scan 裁行</text>
  <text x="40" y="54" font-size="11.5" fill="#5a3410">查询：ORDER BY x LIMIT k</text>

  <rect x="40" y="70" width="240" height="120" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="160" y="94" font-size="12.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">TopN 算子（堆 top-k）</text>
  <g text-anchor="middle" font-size="10">
    <rect x="70" y="106" width="80" height="22" rx="5" fill="#eafaf1" stroke="#bfe0cd"/><text x="110" y="121" fill="#12402a">v1</text>
    <rect x="160" y="106" width="80" height="22" rx="5" fill="#eafaf1" stroke="#bfe0cd"/><text x="200" y="121" fill="#12402a">v2</text>
    <rect x="70" y="132" width="80" height="22" rx="5" fill="#eafaf1" stroke="#bfe0cd"/><text x="110" y="147" fill="#12402a">…</text>
    <rect x="160" y="132" width="80" height="22" rx="5" fill="#fff7e6" stroke="#e8cf9a"/><text x="200" y="147" fill="#5a3410">第 k 名</text>
  </g>
  <text x="160" y="178" font-size="10" fill="#5b7db1" text-anchor="middle">只保留最优 k 个，无需全排序</text>

  <rect x="380" y="96" width="220" height="66" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="490" y="122" font-size="12" font-weight="600" fill="#5a3410" text-anchor="middle">RuntimePredicate</text>
  <text x="490" y="142" font-size="10" fill="#93762e" text-anchor="middle">当前第 k 名值 = 动态阈值</text>

  <rect x="700" y="70" width="260" height="120" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="830" y="94" font-size="12.5" font-weight="600" fill="#12402a" text-anchor="middle">Scan 按阈值裁行</text>
  <text x="830" y="116" font-size="10.5" fill="#2f6f4f" text-anchor="middle">比阈值差的行直接跳过</text>
  <text x="830" y="138" font-size="10.5" fill="#2f6f4f" text-anchor="middle">阈值随扫描不断收紧 →</text>
  <text x="830" y="160" font-size="10.5" fill="#2f6f4f" text-anchor="middle">越扫越少、提前收敛</text>

  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <path d="M280,140 L380,130" marker-end="url(#ar)"/>
    <path d="M600,129 L700,130" marker-end="url(#ar)"/>
    <path d="M700,175 L640,175 L640,210 L160,210 L160,190" stroke-dasharray="5 3" marker-end="url(#ar)"/>
  </g>
  <text x="400" y="205" font-size="9.5" fill="#a1a1a6" text-anchor="middle">Scan 结果回喂堆，刷新阈值</text>

  <rect x="40" y="242" width="920" height="72" rx="12" fill="#fafafb" stroke="#ececf1"/>
  <text x="60" y="266" font-size="11" fill="#6e6e73">· PartitionTopN：窗口/分组内各取 top-k（先分组再堆）。</text>
  <text x="60" y="288" font-size="11" fill="#6e6e73">· DeferMaterialize TopN：先只读排序列 + 行号定位 top-k，最后回表取其余列，减少解码。</text>
  <text x="60" y="308" font-size="11" fill="#86868b">效果：ORDER BY … LIMIT k 无需全表排序，Scan 阶段即大幅裁行。</text>
</svg>
