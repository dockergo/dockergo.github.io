<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="400" viewBox="0 0 1020 400" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1020" height="400" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">两级资源划分 + 下发链路：节点级 ComputeGroup / 组内 Workload Group</text>

  <!-- 查询路由 -->
  <rect x="30" y="58" width="130" height="40" rx="11" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/><text x="95" y="83" font-size="12" font-weight="600" fill="#4a1414" text-anchor="middle">查询 / 导入</text>

  <!-- 节点级 ComputeGroup -->
  <rect x="210" y="52" width="360" height="150" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="390" y="74" font-size="12" font-weight="600" fill="#2c5a3a" text-anchor="middle">节点级：ComputeGroup（按 ResourceTag 分组 BE）</text>
  <rect x="228" y="86" width="156" height="100" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="306" y="106" font-size="10.5" font-weight="600" fill="#12402a" text-anchor="middle">CG-在线（BE-1/2）</text>
  <rect x="240" y="116" width="132" height="26" rx="6" fill="#fff" stroke="#bfe0cd"/><text x="306" y="133" font-size="9.5" fill="#2f6f4f" text-anchor="middle">WG-在线 · WG-报表</text>
  <rect x="240" y="148" width="132" height="26" rx="6" fill="#fff" stroke="#bfe0cd"/><text x="306" y="165" font-size="9.5" fill="#2f6f4f" text-anchor="middle">cgroup CPU/内存/IO</text>
  <rect x="396" y="86" width="156" height="100" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="474" y="106" font-size="10.5" font-weight="600" fill="#12402a" text-anchor="middle">CG-批量（BE-3/4）</text>
  <rect x="408" y="116" width="132" height="26" rx="6" fill="#fff" stroke="#bfe0cd"/><text x="474" y="133" font-size="9.5" fill="#2f6f4f" text-anchor="middle">WG-ETL</text>
  <rect x="408" y="148" width="132" height="26" rx="6" fill="#fff" stroke="#bfe0cd"/><text x="474" y="165" font-size="9.5" fill="#2f6f4f" text-anchor="middle">物理隔离到独立 BE 集</text>

  <rect x="620" y="80" width="370" height="94" rx="13" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="805" y="104" font-size="12" font-weight="600" fill="#1d1d1f" text-anchor="middle">两级关系</text>
  <text x="805" y="128" font-size="10.5" fill="#6e6e73" text-anchor="middle">① ComputeGroup（节点级）：BE 分组，查询按 tag 路由</text>
  <text x="805" y="148" font-size="10.5" fill="#6e6e73" text-anchor="middle">→ 物理隔离（不同 BE 集，互不抢机器）</text>
  <text x="805" y="166" font-size="10.5" fill="#6e6e73" text-anchor="middle">② Workload Group（组内）：cgroup 软/硬限 CPU/内存/并发</text>

  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <path d="M160,78 L185,78 L185,120 L228,120" marker-end="url(#ar)"/>
    <path d="M160,78 L185,78 L185,140 L396,140" marker-end="url(#ar)"/>
  </g>
  <text x="188" y="72" font-size="9" fill="#a1a1a6">按 tag 路由</text>

  <!-- 下发链路 -->
  <text x="30" y="240" font-size="12" font-weight="600" fill="#1d1d1f">下发链路（配置如何从 FE 生效到 BE）</text>
  <g text-anchor="middle" font-size="11">
    <rect x="40" y="256" width="200" height="52" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="140" y="278" font-weight="600" fill="#274a78">FE 改 WG/组 元数据</text><text x="140" y="296" font-size="9.5" fill="#5b7db1">EditLog 复制全 FE</text>
    <rect x="300" y="256" width="200" height="52" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/><text x="400" y="278" font-weight="600" fill="#5a3410">TopicPublisher</text><text x="400" y="296" font-size="9.5" fill="#93762e">把配置组织成 Topic</text>
    <rect x="560" y="256" width="200" height="52" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="660" y="278" font-weight="600" fill="#1b2a4a">随 BE 心跳携带下发</text><text x="660" y="296" font-size="9.5" fill="#5b7db1">Heartbeat 捎带 TopicInfo</text>
    <rect x="820" y="256" width="180" height="52" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="910" y="278" font-weight="600" fill="#12402a">BE 应用</text><text x="910" y="296" font-size="9.5" fill="#2f6f4f">落 cgroup / 限流</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none"><line x1="240" y1="282" x2="300" y2="282" marker-end="url(#ar)"/><line x1="500" y1="282" x2="560" y2="282" marker-end="url(#ar)"/><line x1="760" y1="282" x2="820" y2="282" marker-end="url(#ar)"/></g>
  <text x="30" y="340" font-size="10.5" fill="#6e6e73">要点：Workload Group 的"是什么"是组内隔离；ComputeGroup 是"哪些机器"的节点级隔离；配置经 TopicPublisher 随心跳异步下发、BE 落 cgroup 生效。</text>
</svg>
