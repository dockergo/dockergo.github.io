<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="660" viewBox="0 0 1080 660" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1080" height="660" fill="#fbfbfd"/>
  <text x="40" y="40" font-size="16" font-weight="600" fill="#1d1d1f">内存治理 · MemTracker 树 + 进程仲裁 + GC/反压/Spill</text>
  <text x="40" y="60" font-size="11.5" fill="#86868b">分级额度逐层收敛;超限时按"软→硬"处理链:反压 → 触发 GC → cancel 最大查询 → spill 落盘</text>

  <!-- 左:MemTracker 树 -->
  <rect x="30" y="78" width="470" height="358" rx="16" fill="#faf4fb" stroke="#ecd9ef"/>
  <text x="50" y="102" font-size="13" font-weight="600" fill="#7a3fb0">MemTracker 分级树(自顶向下逐层收敛额度)</text>
  <g text-anchor="middle" font-size="11" fill="#7a3fb0">
    <rect x="150" y="116" width="230" height="40" rx="10" fill="#ffffff" stroke="#ecd9ef" filter="url(#soft)"/><text x="265" y="134" font-weight="600" fill="#1d1d1f">Process 进程根</text><text x="265" y="149" font-size="9">mem_limit(默认物理内存 80%~90%)</text>
    <rect x="60" y="184" width="185" height="40" rx="10" fill="#ffffff" stroke="#ecd9ef"/><text x="152" y="202" font-weight="600" fill="#1d1d1f">Type · Query</text><text x="152" y="217" font-size="9">查询类内存</text>
    <rect x="265" y="184" width="185" height="40" rx="10" fill="#ffffff" stroke="#ecd9ef"/><text x="357" y="202" font-weight="600" fill="#1d1d1f">Type · Load/Compaction</text><text x="357" y="217" font-size="9">写入/后台类</text>
    <rect x="60" y="252" width="185" height="40" rx="10" fill="#ffffff" stroke="#ecd9ef"/><text x="152" y="270" font-weight="600" fill="#1d1d1f">Query-N</text><text x="152" y="285" font-size="9">exec_mem_limit</text>
    <rect x="265" y="252" width="185" height="40" rx="10" fill="#ffffff" stroke="#ecd9ef"/><text x="357" y="270" font-weight="600" fill="#1d1d1f">Query-M</text><text x="357" y="285" font-size="9">单查询上限</text>
    <rect x="60" y="320" width="390" height="40" rx="10" fill="#f9f0fb" stroke="#e6d0ee"/><text x="255" y="338" font-weight="600" fill="#1d1d1f">算子级 · HashJoin / Agg / Sort</text><text x="255" y="353" font-size="9">叶子:每算子 consume/release 精确计量</text>
  </g>
  <g stroke="#c7a8d8" stroke-width="1.3" fill="none">
    <line x1="200" y1="156" x2="152" y2="183" marker-end="url(#ar)"/>
    <line x1="330" y1="156" x2="357" y2="183" marker-end="url(#ar)"/>
    <line x1="152" y1="224" x2="152" y2="251" marker-end="url(#ar)"/>
    <line x1="357" y1="224" x2="357" y2="251" marker-end="url(#ar)"/>
    <line x1="152" y1="292" x2="220" y2="319" marker-end="url(#ar)"/>
    <line x1="357" y1="292" x2="290" y2="319" marker-end="url(#ar)"/>
  </g>
  <text x="50" y="392" font-size="10" fill="#a06fc0">每次分配 consume 向上冒泡累加;释放 release 逐层回退。任一层超额即触发右侧处理链。</text>
  <text x="50" y="414" font-size="10" fill="#a06fc0">jemalloc 劫持 malloc/free,50ms 后台维护回收脏页 + tcache,按衰减曲线归还 OS。</text>

  <!-- 右:超限处理链 -->
  <rect x="520" y="78" width="530" height="358" rx="16" fill="#fbf7ef" stroke="#efe4cf"/>
  <text x="540" y="102" font-size="13" font-weight="600" fill="#8a5a12">超限处理链(软 → 硬,逐级升级)</text>
  <g text-anchor="middle" font-size="11" fill="#8a5a12">
    <rect x="600" y="116" width="370" height="42" rx="10" fill="#ffffff" stroke="#efe0c4" filter="url(#soft)"/><text x="785" y="134" font-weight="600" fill="#1d1d1f">try_reserve 预留失败</text><text x="785" y="150" font-size="9">分配前先问额度,不够则进入处理链</text>
    <rect x="600" y="176" width="370" height="42" rx="10" fill="#ffffff" stroke="#efe0c4"/><text x="785" y="194" font-weight="600" fill="#1d1d1f">① 反压 Backpressure</text><text x="785" y="210" font-size="9">降低上游生产速率,等待下游释放</text>
    <rect x="600" y="236" width="370" height="42" rx="10" fill="#ffffff" stroke="#efe0c4"/><text x="785" y="254" font-weight="600" fill="#1d1d1f">② 触发 GC · 回收 cache/空闲</text><text x="785" y="270" font-size="9">BlockFileCache / PageCache / 空闲 arena</text>
    <rect x="600" y="296" width="370" height="42" rx="10" fill="#ffffff" stroke="#efe0c4"/><text x="785" y="314" font-weight="600" fill="#1d1d1f">③ Cancel 最大内存查询</text><text x="785" y="330" font-size="9">进程级仲裁:牺牲最大者保集群可用</text>
    <rect x="600" y="356" width="370" height="42" rx="10" fill="#f5faf6" stroke="#cfe6d5"/><text x="785" y="374" font-weight="600" fill="#2c5a3a">④ Spill 落盘(优先于 cancel)</text><text x="785" y="390" font-size="9">HashJoin/Agg/Sort 中间结果溢写磁盘</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <line x1="785" y1="158" x2="785" y2="175" marker-end="url(#ar)"/>
    <line x1="785" y1="218" x2="785" y2="235" marker-end="url(#ar)"/>
    <line x1="785" y1="278" x2="785" y2="295" marker-end="url(#ar)"/>
    <line x1="785" y1="338" x2="785" y2="355" marker-end="url(#ar)"/>
  </g>
  <line x1="500" y1="260" x2="519" y2="260" stroke="#c7c7cc" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="510" y="252" font-size="9.5" fill="#a1a1a6" text-anchor="middle">超额</text>

  <!-- 时间线:一次分配的生命周期 -->
  <rect x="30" y="452" width="1020" height="176" rx="16" fill="#f6f8fc" stroke="#e6ecf4"/>
  <text x="50" y="476" font-size="13" font-weight="600" fill="#1d5fb8">一次内存分配的时间线</text>
  <g text-anchor="middle" font-size="10.5" fill="#1d5fb8">
    <rect x="50" y="490" width="180" height="52" rx="10" fill="#ffffff" stroke="#c4d5ee" filter="url(#soft)"/><text x="140" y="512" font-weight="600" fill="#1d1d1f">allocate</text><text x="140" y="528" font-size="9">算子请求内存</text>
    <rect x="260" y="490" width="180" height="52" rx="10" fill="#ffffff" stroke="#c4d5ee" filter="url(#soft)"/><text x="350" y="512" font-weight="600" fill="#1d1d1f">consume 冒泡</text><text x="350" y="528" font-size="9">逐层累加计量</text>
    <rect x="470" y="490" width="180" height="52" rx="10" fill="#ffffff" stroke="#c4d5ee" filter="url(#soft)"/><text x="560" y="512" font-weight="600" fill="#1d1d1f">try_reserve</text><text x="560" y="528" font-size="9">额度校验</text>
    <rect x="680" y="490" width="180" height="52" rx="10" fill="#ffffff" stroke="#c4d5ee" filter="url(#soft)"/><text x="770" y="512" font-weight="600" fill="#1d1d1f">进程仲裁</text><text x="770" y="528" font-size="9">超限→处理链</text>
    <rect x="890" y="490" width="130" height="52" rx="10" fill="#ffffff" stroke="#c4d5ee" filter="url(#soft)"/><text x="955" y="512" font-weight="600" fill="#1d1d1f">release</text><text x="955" y="528" font-size="9">逐层回退</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="230" y1="516" x2="259" y2="516" marker-end="url(#ar)"/>
    <line x1="440" y1="516" x2="469" y2="516" marker-end="url(#ar)"/>
    <line x1="650" y1="516" x2="679" y2="516" marker-end="url(#ar)"/>
    <line x1="860" y1="516" x2="889" y2="516" marker-end="url(#ar)"/>
  </g>
  <text x="50" y="576" font-size="10.5" fill="#86868b">关键开关:exec_mem_limit(单查询)· mem_limit(进程)· enable_spill(允许溢写)· query_timeout。</text>
  <text x="50" y="600" font-size="10.5" fill="#86868b">诊断:Memory Profile 看各算子峰值内存;-238(超内存被 cancel)多因单查询过大或并发过高。</text>
</svg>
