<svg xmlns="http://www.w3.org/2000/svg" width="900" height="270" viewBox="0 0 900 270" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="900" height="270" fill="#fbfbfd"/>
  <rect x="30" y="30" width="840" height="72" rx="14" fill="#f6f8fc" stroke="#e6ecf4"/>
  <text x="48" y="52" font-size="12" font-weight="600" fill="#1d1d1f">写事务（原子可见）</text>
  <g text-anchor="middle" font-size="12">
    <rect x="48" y="60" width="180" height="34" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="138" y="82" fill="#1b2a4a">Begin (+ Label)</text>
    <rect x="258" y="60" width="180" height="34" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="348" y="82" fill="#1b2a4a">写 Rowset（不可见）</text>
    <rect x="468" y="60" width="170" height="34" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="553" y="82" fill="#1b2a4a">Commit（记元数据）</text>
    <rect x="668" y="60" width="204" height="34" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="770" y="82" fill="#1b2a4a">Publish Version（可见·version++）</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4"><line x1="228" y1="77" x2="256" y2="77" marker-end="url(#a)"/><line x1="438" y1="77" x2="466" y2="77" marker-end="url(#a)"/><line x1="638" y1="77" x2="666" y2="77" marker-end="url(#a)"/></g>

  <rect x="30" y="168" width="840" height="72" rx="14" fill="#f5faf6" stroke="#e2ece5"/>
  <text x="48" y="190" font-size="12" font-weight="600" fill="#1d1d1f">读快照（多版本一致）</text>
  <g text-anchor="middle" font-size="12">
    <rect x="48" y="198" width="230" height="34" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="163" y="220" fill="#12402a">query start</text>
    <rect x="308" y="198" width="260" height="34" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="438" y="220" fill="#12402a">选定一个可见版本</text>
    <rect x="598" y="198" width="274" height="34" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="735" y="220" fill="#12402a">整条查询只读该快照</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4"><line x1="278" y1="215" x2="306" y2="215" marker-end="url(#a)"/><line x1="568" y1="215" x2="596" y2="215" marker-end="url(#a)"/></g>
  <path d="M770,94 L770,130 L438,130 L438,166" stroke="#c7c7cc" stroke-width="1.4" stroke-dasharray="4 4" fill="none" marker-end="url(#a)"/><text x="604" y="124" font-size="10" fill="#a1a1a6" text-anchor="middle">提供可见版本</text>
</svg>
