<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="900" height="340" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Workload Group 多租户隔离：一个大查询不拖垮全集群</text>
  <g text-anchor="middle" font-size="11">
    <rect x="50" y="46" width="230" height="34" rx="10" fill="#fbeaea" stroke="#e7c3c3"/><text x="165" y="68" fill="#4a1414">关键在线查询</text>
    <rect x="335" y="46" width="230" height="34" rx="10" fill="#fdf6ea" stroke="#e8cf9a"/><text x="450" y="68" fill="#5a3410">交互分析</text>
    <rect x="620" y="46" width="230" height="34" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="735" y="68" fill="#1b2a4a">批量 ETL</text>
  </g>
  <g text-anchor="middle">
    <rect x="50" y="108" width="230" height="118" rx="13" fill="#ffffff" stroke="#ececf1" filter="url(#s)"/><text x="165" y="130" font-size="12.5" font-weight="600" fill="#12402a">Group · 关键业务</text>
    <g font-size="10" fill="#4a4e57"><text x="165" y="152">CPU：高权重 + 硬限保底</text><text x="165" y="174">Memory：大配额</text><text x="165" y="196">并发：高 · 优先保障</text><text x="165" y="216" font-size="9" fill="#8a8a8f">低延迟不受批量挤压</text></g>
    <rect x="335" y="108" width="230" height="118" rx="13" fill="#ffffff" stroke="#ececf1" filter="url(#s)"/><text x="450" y="130" font-size="12.5" font-weight="600" fill="#5a3410">Group · 一般业务</text>
    <g font-size="10" fill="#4a4e57"><text x="450" y="152">CPU：中权重</text><text x="450" y="174">Memory：中配额</text><text x="450" y="196">并发：中 · 可排队</text><text x="450" y="216" font-size="9" fill="#8a8a8f">按需借用空闲算力</text></g>
    <rect x="620" y="108" width="230" height="118" rx="13" fill="#ffffff" stroke="#ececf1" filter="url(#s)"/><text x="735" y="130" font-size="12.5" font-weight="600" fill="#1b2a4a">Group · 批量 ETL</text>
    <g font-size="10" fill="#4a4e57"><text x="735" y="152">CPU：低权重 + 硬上限</text><text x="735" y="174">Memory：限额 + Spill</text><text x="735" y="196">并发：低 · 超限排队</text><text x="735" y="216" font-size="9" fill="#8a8a8f">不抢占在线资源</text></g>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none"><line x1="165" y1="80" x2="165" y2="108" marker-end="url(#a)"/><line x1="450" y1="80" x2="450" y2="108" marker-end="url(#a)"/><line x1="735" y1="80" x2="735" y2="108" marker-end="url(#a)"/></g>
  <rect x="50" y="244" width="800" height="56" rx="13" fill="#f5faf6" stroke="#dbe9e0"/>
  <text x="450" y="268" font-size="12" font-weight="600" fill="#2c5a3a" text-anchor="middle">cgroup · CPU 硬隔离底座</text>
  <text x="450" y="288" font-size="10" fill="#4e7a5c" text-anchor="middle">空闲时按权重软共享，繁忙时按硬限不超配 · 并发经 Query Queue 排队降级</text>
</svg>
