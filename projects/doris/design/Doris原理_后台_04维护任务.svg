<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="360" viewBox="0 0 1000 360" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1000" height="360" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">后台维护任务（Compaction 之外）：各守护异步反哺不同能力域，限速错峰</text>
  <g text-anchor="middle">
    <rect x="30" y="60" width="228" height="150" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="144" y="86" font-size="12.5" font-weight="600" fill="#1b2a4a">MV Refresh</text><text x="144" y="108" font-size="10" fill="#5b7db1">源数据变化触发</text><text x="144" y="128" font-size="10" fill="#5b7db1">全量 / AUTO 增量刷新</text><text x="144" y="150" font-size="10" fill="#5b7db1">反哺：优化 · 查询命中 MV</text>
    <rect x="274" y="60" width="228" height="150" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="388" y="86" font-size="12.5" font-weight="600" fill="#1b2a4a">Statistics 收集</text><text x="388" y="108" font-size="10" fill="#5b7db1">按变化量/周期触发</text><text x="388" y="128" font-size="10" fill="#5b7db1">行数/NDV/直方图（采样）</text><text x="388" y="150" font-size="10" fill="#5b7db1">反哺：CBO 基数/代价估计</text>
    <rect x="518" y="60" width="228" height="150" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="632" y="86" font-size="12.5" font-weight="600" fill="#1b2a4a">Checkpoint</text><text x="632" y="108" font-size="10" fill="#5b7db1">Journal 增长触发</text><text x="632" y="128" font-size="10" fill="#5b7db1">dump Image + 截断旧日志</text><text x="632" y="150" font-size="10" fill="#5b7db1">反哺：元数据 · 恢复快/可控</text>
    <rect x="762" y="60" width="228" height="150" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="876" y="86" font-size="12.5" font-weight="600" fill="#1b2a4a">Cleanup / GC</text><text x="876" y="108" font-size="10" fill="#5b7db1">引用消失/过期触发</text><text x="876" y="128" font-size="10" fill="#5b7db1">回收旧版本/回收站/临时文件</text><text x="876" y="150" font-size="10" fill="#5b7db1">反哺：防膨胀</text>
  </g>
  <rect x="30" y="240" width="960" height="46" rx="12" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="510" y="268" font-size="12" font-weight="600" fill="#5a3410" text-anchor="middle">共性：异步守护 · 限速 + 与前台错峰 · 滞后则前台迟早付出代价（读慢/估偏/日志膨胀/空间膨胀）</text>
  <text x="510" y="316" font-size="11.5" fill="#6e6e73" text-anchor="middle">加上 Compaction（降读放大）与 Replica Repair（保可用，决策在自愈），构成"各能力域异步部分"的统一调度载体。</text>
  <text x="510" y="338" font-size="10.5" fill="#86868b" text-anchor="middle">后台任务是正交的"执行时机"维度，承接而非并列于各能力域。</text>
</svg>
