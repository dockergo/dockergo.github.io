<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="460" viewBox="0 0 1080 460" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1080" height="460" fill="#fbfbfd"/>
  <text x="40" y="30" font-size="11" fill="#a1a1a6">实线 = 依赖关系（箭头指向被依赖方 · 标注依赖内容）　·　虚线 = 治理关系　·　纵轴向下 = 依赖变深</text>

  <!-- 连线（先画，卡片压其上） -->
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <path d="M260,110 L260,174" marker-end="url(#ar)"/>
    <path d="M260,234 L260,298" marker-end="url(#ar)"/>
    <path d="M520,234 L520,298" marker-end="url(#ar)"/>
    <path d="M780,234 L780,298" marker-end="url(#ar)"/>
    <path d="M206,110 L206,126 L130,144 L130,298" marker-end="url(#ar)"/>
    <path d="M388,80 L339,80" stroke-dasharray="4 4" marker-end="url(#ar)"/>
  </g>
  <g font-size="11" fill="#a1a1a6">
    <text x="270" y="146">需要物理计划</text>
    <text x="270" y="272">统计 / Schema / 索引</text>
    <text x="530" y="272">状态 / 版本 / Rowset</text>
    <text x="790" y="272">副本位置 / 健康 / 数据</text>
    <text x="70" y="210">扫描数据</text>
    <text x="363" y="73" text-anchor="middle">治理</text>
  </g>

  <!-- 顶层 -->
  <g font-size="15" text-anchor="middle">
    <rect x="185" y="52" width="150" height="58" rx="14" fill="#ecf2fb" stroke="#c4d5ee" filter="url(#soft)"/>
    <text x="260" y="87" fill="#274a78">执行引擎</text>
    <rect x="390" y="52" width="180" height="58" rx="14" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
    <text x="480" y="87" fill="#7a5a1e">资源与负载管理</text>
  </g>

  <!-- 中层 -->
  <g font-size="15" text-anchor="middle">
    <rect x="185" y="176" width="150" height="58" rx="14" fill="#ecf2fb" stroke="#c4d5ee" filter="url(#soft)"/>
    <text x="260" y="211" fill="#274a78">优化技术</text>
    <rect x="445" y="176" width="150" height="58" rx="14" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
    <text x="520" y="211" fill="#7a5a1e">事务一致性</text>
    <rect x="705" y="176" width="150" height="58" rx="14" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
    <text x="780" y="211" fill="#7a5a1e">集群自愈</text>
  </g>

  <!-- 底座 -->
  <rect x="60" y="300" width="960" height="96" rx="16" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="80" y="326" font-size="11" fill="#4e7a5c">底座 · 被依赖的根</text>
  <g font-size="15" text-anchor="middle">
    <rect x="220" y="338" width="200" height="42" rx="11" fill="#ecf5ee" stroke="#c2ddc9"/>
    <text x="320" y="365" fill="#2c5a3a">元数据</text>
    <rect x="620" y="338" width="200" height="42" rx="11" fill="#ecf5ee" stroke="#c2ddc9"/>
    <text x="720" y="365" fill="#2c5a3a">存储引擎</text>
  </g>
</svg>
