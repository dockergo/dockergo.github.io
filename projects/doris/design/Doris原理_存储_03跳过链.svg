<svg xmlns="http://www.w3.org/2000/svg" width="700" height="450" viewBox="0 0 700 450" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="700" height="450" fill="#fbfbfd"/>
  <text x="40" y="28" font-size="11" fill="#a1a1a6">从粗到细的跳过链：逐层缩小要读的数据</text>
  <g text-anchor="middle" font-size="13">
    <rect x="150" y="40" width="400" height="34" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="350" y="62" fill="#1b2a4a">Scan + predicates</text>
    <rect x="150" y="98" width="400" height="34" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="350" y="120" fill="#12402a">Partition prune（跳分区）</text>
    <rect x="150" y="156" width="400" height="34" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="350" y="178" fill="#12402a">Tablet / Bucket prune（跳分片）</text>
    <rect x="150" y="214" width="400" height="34" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="350" y="236" fill="#12402a">ZoneMap（min/max）→ 跳页</text>
    <rect x="150" y="272" width="400" height="34" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="350" y="294" fill="#12402a">BloomFilter → 高基数等值判不存在</text>
    <rect x="150" y="330" width="400" height="34" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="350" y="352" fill="#12402a">Inverted/Bitmap/Short Key → 定位行</text>
    <rect x="150" y="388" width="400" height="34" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="350" y="410" fill="#12402a">Page 读 + 字典过滤 + 延迟物化</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4"><line x1="350" y1="74" x2="350" y2="96" marker-end="url(#a)"/><line x1="350" y1="132" x2="350" y2="154" marker-end="url(#a)"/><line x1="350" y1="190" x2="350" y2="212" marker-end="url(#a)"/><line x1="350" y1="248" x2="350" y2="270" marker-end="url(#a)"/><line x1="350" y1="306" x2="350" y2="328" marker-end="url(#a)"/><line x1="350" y1="364" x2="350" y2="386" marker-end="url(#a)"/></g>
</svg>
