<svg xmlns="http://www.w3.org/2000/svg" width="900" height="310" viewBox="0 0 900 310" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="900" height="310" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">三种数据模型：相同 key 两次写入后的合并语义</text>

  <!-- Duplicate -->
  <rect x="24" y="46" width="272" height="246" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="160" y="70" font-size="13" font-weight="600" fill="#1b2a4a" text-anchor="middle">Duplicate Key</text>
  <text x="160" y="88" font-size="10" fill="#86868b" text-anchor="middle">保留每行 · 明细 / 日志</text>
  <g text-anchor="middle" font-size="11" fill="#274a78">
    <rect x="60" y="100" width="200" height="26" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="160" y="118">(k1, 10)</text>
    <rect x="60" y="130" width="200" height="26" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="160" y="148">(k1, 20)</text>
  </g>
  <line x1="160" y1="160" x2="160" y2="184" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/><text x="160" y="178" font-size="9" fill="#a1a1a6" text-anchor="middle">不合并</text>
  <g text-anchor="middle" font-size="11" fill="#12402a">
    <rect x="60" y="188" width="200" height="26" rx="7" fill="#eafaf1" stroke="#bfe0cd"/><text x="160" y="206">(k1, 10)</text>
    <rect x="60" y="218" width="200" height="26" rx="7" fill="#eafaf1" stroke="#bfe0cd"/><text x="160" y="236">(k1, 20)</text>
  </g>
  <text x="160" y="268" font-size="10" fill="#2f6f4f" text-anchor="middle">两行都保留</text>

  <!-- Aggregate -->
  <rect x="314" y="46" width="272" height="246" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="450" y="70" font-size="13" font-weight="600" fill="#1b2a4a" text-anchor="middle">Aggregate Key</text>
  <text x="450" y="88" font-size="10" fill="#86868b" text-anchor="middle">同键按聚合函数合并</text>
  <g text-anchor="middle" font-size="11" fill="#274a78">
    <rect x="350" y="100" width="200" height="26" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="450" y="118">(k1, 10)</text>
    <rect x="350" y="130" width="200" height="26" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="450" y="148">(k1, 20)</text>
  </g>
  <line x1="450" y1="160" x2="450" y2="184" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/><text x="450" y="178" font-size="9" fill="#a1a1a6" text-anchor="middle">SUM</text>
  <g text-anchor="middle" font-size="11" fill="#12402a">
    <rect x="350" y="188" width="200" height="26" rx="7" fill="#eafaf1" stroke="#bfe0cd"/><text x="450" y="206">(k1, 30)</text>
  </g>
  <text x="450" y="240" font-size="10" fill="#2f6f4f" text-anchor="middle">合并为一行（预聚合）</text>

  <!-- Unique -->
  <rect x="604" y="46" width="272" height="246" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="740" y="70" font-size="13" font-weight="600" fill="#1b2a4a" text-anchor="middle">Unique Key</text>
  <text x="740" y="88" font-size="10" fill="#86868b" text-anchor="middle">键唯一 · MoW + Delete Bitmap</text>
  <g text-anchor="middle" font-size="11" fill="#274a78">
    <rect x="640" y="100" width="200" height="26" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="740" y="118">(k1, 旧值)</text>
    <rect x="640" y="130" width="200" height="26" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="740" y="148">(k1, 新值)</text>
  </g>
  <line x1="740" y1="160" x2="740" y2="184" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/><text x="740" y="178" font-size="9" fill="#a1a1a6" text-anchor="middle">保留最新</text>
  <g text-anchor="middle" font-size="11">
    <rect x="640" y="188" width="200" height="26" rx="7" fill="#eafaf1" stroke="#bfe0cd"/><text x="740" y="206" fill="#12402a">(k1, 新值)</text>
    <rect x="640" y="218" width="200" height="26" rx="7" fill="#fbeaea" stroke="#e7c3c3"/><text x="740" y="236" fill="#4a1414">(k1, 旧值) → Delete Bitmap</text>
  </g>
  <text x="740" y="268" font-size="10" fill="#2f6f4f" text-anchor="middle">新行胜，旧行读时跳过</text>
</svg>
