<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="540" viewBox="0 0 1060 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">优化的四个位置：一条查询被逐层"少做 → 少算 → 少读 → 不算"</text>

  <!-- funnel -->
  <text x="86" y="60" font-size="10.5" fill="#86868b" text-anchor="middle">工作量递减</text>
  <g text-anchor="middle" font-size="9.5">
    <rect x="26" y="70" width="120" height="86" rx="8" fill="#fbeaea" stroke="#e7c3c3"/><text x="86" y="117" fill="#4a1414">全量工作</text>
    <rect x="38" y="186" width="96" height="86" rx="8" fill="#f6efe4" stroke="#e6d3b0"/><text x="86" y="233" fill="#5a3410">规划优化后</text>
    <rect x="50" y="302" width="72" height="86" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="86" y="349" fill="#1b2a4a">执行裁剪后</text>
    <rect x="60" y="418" width="52" height="86" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="86" y="462" fill="#12402a">存储/缓存</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.3" fill="none"><line x1="86" y1="156" x2="86" y2="186" marker-end="url(#ar)"/><line x1="86" y1="272" x2="86" y2="302" marker-end="url(#ar)"/><line x1="86" y1="388" x2="86" y2="418" marker-end="url(#ar)"/></g>

  <!-- Band 1 规划期 -->
  <rect x="176" y="66" width="810" height="104" rx="14" fill="#f3f7fc" stroke="#cfe0f2"/>
  <rect x="192" y="80" width="120" height="76" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="252" y="110" font-size="13" font-weight="700" fill="#1b2a4a" text-anchor="middle">① 规划期</text><text x="252" y="130" font-size="10" fill="#5b7db1" text-anchor="middle">少做 · FE</text><text x="252" y="146" font-size="9" fill="#5b7db1" text-anchor="middle">定"做什么/怎么做"</text>
  <g font-size="10">
    <rect x="326" y="80" width="152" height="76" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="402" y="104" font-weight="600" fill="#1b2a4a" text-anchor="middle">RBO 规则改写</text><text x="402" y="122" fill="#5b7db1" text-anchor="middle">等价保序</text><text x="402" y="138" fill="#5b7db1" text-anchor="middle">总不更差</text>
    <rect x="490" y="80" width="152" height="76" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="566" y="104" font-weight="600" fill="#1b2a4a" text-anchor="middle">CBO · Memo</text><text x="566" y="122" fill="#5b7db1" text-anchor="middle">统计驱动</text><text x="566" y="138" fill="#5b7db1" text-anchor="middle">代价择优</text>
    <rect x="654" y="80" width="152" height="76" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="730" y="104" font-weight="600" fill="#1b2a4a" text-anchor="middle">HBO 历史纠偏</text><text x="730" y="122" fill="#5b7db1" text-anchor="middle">实测回灌</text><text x="730" y="138" fill="#5b7db1" text-anchor="middle">纠估算偏差</text>
    <rect x="818" y="80" width="152" height="76" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="894" y="104" font-weight="600" fill="#1b2a4a" text-anchor="middle">MV 透明改写</text><text x="894" y="122" fill="#5b7db1" text-anchor="middle">命中即用</text><text x="894" y="138" fill="#5b7db1" text-anchor="middle">预计算结果</text>
  </g>

  <!-- Band 2 执行期 -->
  <rect x="176" y="182" width="810" height="104" rx="14" fill="#f5faf6" stroke="#cfe6d5"/>
  <rect x="192" y="196" width="120" height="76" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="252" y="226" font-size="13" font-weight="700" fill="#12402a" text-anchor="middle">② 执行期</text><text x="252" y="246" font-size="10" fill="#2f6f4f" text-anchor="middle">少算/少传/少等 · BE</text><text x="252" y="262" font-size="9" fill="#2f6f4f" text-anchor="middle">高效跑出来</text>
  <g font-size="10">
    <rect x="326" y="196" width="152" height="76" rx="9" fill="#ffffff" stroke="#bfe0cd"/><text x="402" y="220" font-weight="600" fill="#12402a" text-anchor="middle">Runtime Filter</text><text x="402" y="238" fill="#2f6f4f" text-anchor="middle">运行时裁行</text><text x="402" y="254" fill="#2f6f4f" text-anchor="middle">下推 Probe</text>
    <rect x="490" y="196" width="152" height="76" rx="9" fill="#ffffff" stroke="#bfe0cd"/><text x="566" y="220" font-weight="600" fill="#12402a" text-anchor="middle">向量化 + Pipeline</text><text x="566" y="238" fill="#2f6f4f" text-anchor="middle">依赖驱动</text><text x="566" y="254" fill="#2f6f4f" text-anchor="middle">打满多核</text>
    <rect x="654" y="196" width="152" height="76" rx="9" fill="#ffffff" stroke="#bfe0cd"/><text x="730" y="220" font-weight="600" fill="#12402a" text-anchor="middle">两阶段聚合/TopN</text><text x="730" y="238" fill="#2f6f4f" text-anchor="middle">本地预聚合</text><text x="730" y="254" fill="#2f6f4f" text-anchor="middle">压数据省网络</text>
    <rect x="818" y="196" width="152" height="76" rx="9" fill="#ffffff" stroke="#bfe0cd"/><text x="894" y="220" font-weight="600" fill="#12402a" text-anchor="middle">Spill 落盘</text><text x="894" y="238" fill="#2f6f4f" text-anchor="middle">超内存不 OOM</text><text x="894" y="254" fill="#2f6f4f" text-anchor="middle">慢但不崩</text>
  </g>

  <!-- Band 3 存储层 -->
  <rect x="176" y="298" width="810" height="104" rx="14" fill="#fdf9f0" stroke="#efdcb4"/>
  <rect x="192" y="312" width="120" height="76" rx="10" fill="#fdf6ea" stroke="#efdcb4"/><text x="252" y="342" font-size="13" font-weight="700" fill="#5a3410" text-anchor="middle">③ 存储层</text><text x="252" y="362" font-size="10" fill="#93762e" text-anchor="middle">少读 / 可跳过</text><text x="252" y="378" font-size="9" fill="#93762e" text-anchor="middle">只读必要数据</text>
  <g font-size="10">
    <rect x="326" y="312" width="206" height="76" rx="9" fill="#ffffff" stroke="#efdcb4"/><text x="429" y="336" font-weight="600" fill="#5a3410" text-anchor="middle">分区 / Tablet / 文件裁剪</text><text x="429" y="356" fill="#93762e" text-anchor="middle">只扫相关对象</text><text x="429" y="372" fill="#93762e" text-anchor="middle">Partition/Bucket/File Prune</text>
    <rect x="544" y="312" width="206" height="76" rx="9" fill="#ffffff" stroke="#efdcb4"/><text x="647" y="336" font-weight="600" fill="#5a3410" text-anchor="middle">索引跳过</text><text x="647" y="356" fill="#93762e" text-anchor="middle">ZoneMap·Bloom·倒排</text><text x="647" y="372" fill="#93762e" text-anchor="middle">Page Index · 判不存在</text>
    <rect x="762" y="312" width="208" height="76" rx="9" fill="#ffffff" stroke="#efdcb4"/><text x="866" y="336" font-weight="600" fill="#5a3410" text-anchor="middle">列裁剪 + 延迟物化</text><text x="866" y="356" fill="#93762e" text-anchor="middle">只读必要列</text><text x="866" y="372" fill="#93762e" text-anchor="middle">字典过滤 · 少解码</text>
  </g>

  <!-- Band 4 缓存 -->
  <rect x="176" y="414" width="810" height="104" rx="14" fill="#fdf3f3" stroke="#e7c3c3"/>
  <rect x="192" y="428" width="120" height="76" rx="10" fill="#fbeaea" stroke="#e7c3c3"/><text x="252" y="458" font-size="13" font-weight="700" fill="#4a1414" text-anchor="middle">④ 缓存</text><text x="252" y="478" font-size="10" fill="#a05252" text-anchor="middle">不算 / 短路</text><text x="252" y="494" font-size="9" fill="#a05252" text-anchor="middle">命中即返回</text>
  <g font-size="10">
    <rect x="326" y="428" width="252" height="76" rx="9" fill="#ffffff" stroke="#e7c3c3"/><text x="452" y="452" font-weight="600" fill="#4a1414" text-anchor="middle">SQL / Partition / Query Cache</text><text x="452" y="472" fill="#a05252" text-anchor="middle">结果 · 分区 · 算子级复用</text><text x="452" y="488" fill="#a05252" text-anchor="middle">数据未变即命中</text>
    <rect x="590" y="428" width="252" height="76" rx="9" fill="#ffffff" stroke="#e7c3c3"/><text x="716" y="452" font-weight="600" fill="#4a1414" text-anchor="middle">Data / Meta / Footer Cache</text><text x="716" y="472" fill="#a05252" text-anchor="middle">数据块 · 元信息 · Footer</text><text x="716" y="488" fill="#a05252" text-anchor="middle">减远端/重复读</text>
    <rect x="854" y="428" width="116" height="76" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="912" y="460" font-weight="600" fill="#12402a" text-anchor="middle">命中</text><text x="912" y="478" fill="#2f6f4f" text-anchor="middle">短路返回</text>
  </g>

  <!-- flow arrows between bands -->
  <g stroke="#c7c7cc" stroke-width="1.6" fill="none">
    <line x1="580" y1="170" x2="580" y2="182" marker-end="url(#ar)"/>
    <line x1="580" y1="286" x2="580" y2="298" marker-end="url(#ar)"/>
    <line x1="580" y1="402" x2="580" y2="414" marker-end="url(#ar)"/>
  </g>
  <!-- cache short-circuit -->
  <path d="M1000,466 L1030,466 L1030,120 L988,120" stroke="#c7c7cc" stroke-width="1.5" fill="none" stroke-dasharray="5 3" marker-end="url(#ar)"/>
  <text x="1042" y="300" font-size="10" fill="#a1a1a6" text-anchor="middle" transform="rotate(-90 1042 300)">命中任一级缓存 → 跳过其后所有层</text>
</svg>
