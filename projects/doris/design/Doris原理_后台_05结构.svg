<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect x="0" y="0" width="1080" height="500" fill="#fbfbfd"/>
  <text x="40" y="38" font-size="16" font-weight="600" fill="#1d1d1f">Compaction 数据结构</text>
  <text x="40" y="58" font-size="11.5" fill="#86868b">LSM 后台合并小 rowset 成大,降读放大;版本连续性由 version graph 保证</text>

  <!-- version 轴 + cumulative point -->
  <rect x="30" y="80" width="1020" height="150" rx="14" fill="#fbf7ef" stroke="#efe4cf"/>
  <text x="50" y="104" font-size="13" font-weight="600" fill="#8a5a12">Version{first,second} 版本轴 + cumulative point(稳定区 / 增量区分界)</text>
  <g font-size="10.5" text-anchor="middle" fill="#8a5a12">
    <rect x="50" y="118" width="380" height="46" rx="9" fill="#ffffff" stroke="#efe0c4"/><text x="240" y="139" font-weight="600" fill="#1d1d1f">[0-100] base(稳定区)</text><text x="240" y="156" font-size="9">point 前 · 已充分合并</text>
    <rect x="440" y="118" width="150" height="46" rx="9" fill="#ffffff" stroke="#efe0c4"/><text x="515" y="139" font-weight="600" fill="#1d1d1f">[101-110]</text><text x="515" y="156" font-size="9">cumulative</text>
    <rect x="600" y="118" width="120" height="46" rx="9" fill="#fdf1e7" stroke="#f2d9c2"/><text x="660" y="139" font-weight="600" fill="#8a3a12">[111]</text><text x="660" y="156" font-size="9">增量</text>
    <rect x="730" y="118" width="120" height="46" rx="9" fill="#fdf1e7" stroke="#f2d9c2"/><text x="790" y="139" font-weight="600" fill="#8a3a12">[112]</text><text x="790" y="156" font-size="9">增量</text>
    <rect x="860" y="118" width="170" height="46" rx="9" fill="#fdf1e7" stroke="#f2d9c2"/><text x="945" y="139" font-weight="600" fill="#8a3a12">[113] 导入中</text><text x="945" y="156" font-size="9">point 后 · 增量区</text>
  </g>
  <line x1="595" y1="112" x2="595" y2="172" stroke="#c1962a" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="595" y="188" font-size="10" fill="#c1962a" text-anchor="middle">▲ cumulative point(_cumulative_layer_point)</text>
  <text x="50" y="212" font-size="9.5" fill="#a98b52">Version 区间 [start,end] 闭区间;contains 判包含。</text>

  <!-- 两类 compaction + policy -->
  <g>
    <rect x="30" y="248" width="330" height="120" rx="13" fill="#f6f8fc" stroke="#e6ecf4"/>
    <text x="48" y="272" font-size="12" font-weight="600" fill="#1d5fb8">cumulative compaction</text>
    <text x="48" y="294" font-size="10" fill="#4a4e57">合并 point 后小增量 rowset</text>
    <text x="48" y="314" font-size="10" fill="#4a4e57">高频、低成本</text>
    <text x="48" y="340" font-size="9.5" fill="#7d93b5">降查询要读的 rowset 数量</text>
    <rect x="380" y="248" width="330" height="120" rx="13" fill="#f5faf6" stroke="#e2ece5"/>
    <text x="398" y="272" font-size="12" font-weight="600" fill="#2c5a3a">base compaction</text>
    <text x="398" y="294" font-size="10" fill="#4a4e57">cumulative 结果并入 base</text>
    <text x="398" y="314" font-size="10" fill="#4a4e57">低频、高成本</text>
    <text x="398" y="340" font-size="9.5" fill="#4e7a5c">彻底压平,回收删除标记</text>
    <rect x="730" y="248" width="320" height="120" rx="13" fill="#fbf7ef" stroke="#efe4cf"/>
    <text x="748" y="272" font-size="12" font-weight="600" fill="#8a5a12">SizeBased 策略</text>
    <text x="748" y="294" font-size="10" fill="#4a4e57">按 size 累加 compaction_score</text>
    <text x="748" y="314" font-size="10" fill="#4a4e57">挑候选 rowset 集</text>
    <text x="748" y="340" font-size="9.5" fill="#a98b52">promotion:1024MB / ratio 0.05</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="360" y1="308" x2="379" y2="308" marker-end="url(#ar)"/><text x="370" y="300" font-size="8.5" fill="#a1a1a6" text-anchor="middle">积累</text>
  </g>

  <!-- 底:MoW 合并 + GC -->
  <rect x="30" y="386" width="510" height="96" rx="13" fill="#faf4fb" stroke="#ecd9ef"/>
  <text x="48" y="410" font-size="12" font-weight="600" fill="#7a3fb0">MoW delete bitmap 合并</text>
  <text x="48" y="432" font-size="10" fill="#a06fc0">· rowid 转换:旧 rowset 行号 → 新 rowset 行号</text>
  <text x="48" y="452" font-size="10" fill="#a06fc0">· calc_compaction_output_rowset_delete_bitmap 重算</text>
  <text x="48" y="472" font-size="9.5" fill="#c0a0d8">合并不改可见语义,只重组物理 + 重算 bitmap</text>
  <rect x="560" y="386" width="490" height="96" rx="13" fill="#f4f5f7" stroke="#e6e7ea"/>
  <text x="578" y="410" font-size="12" font-weight="600" fill="#4a4e57">_unused_rowsets(GC)</text>
  <text x="578" y="432" font-size="10" fill="#4a4e57">· 老 rowset 转 stale(仍可能被读快照引用)</text>
  <text x="578" y="452" font-size="10" fill="#4a4e57">· start_delete_unused_rowset 延迟回收</text>
  <text x="578" y="472" font-size="9.5" fill="#86868b">引用归零才真正删</text>
</svg>
