<svg xmlns="http://www.w3.org/2000/svg" width="820" height="330" viewBox="0 0 820 330" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="820" height="330" fill="#fbfbfd"/>
  <text x="30" y="28" font-size="14" font-weight="600" fill="#1d1d1f">元数据三位一体：In-memory + EditLog + Image 的写入 / 检查点 / 恢复</text>
  <rect x="30" y="46" width="170" height="46" rx="12" fill="#f4eefb" stroke="#e2d3f3" filter="url(#s)"/><text x="115" y="68" font-size="12" font-weight="600" fill="#42246b" text-anchor="middle">元数据变更</text><text x="115" y="84" font-size="9.5" fill="#7a5aa0" text-anchor="middle">DDL / 事务 / 权限 …</text>
  <rect x="300" y="46" width="250" height="60" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#s)"/><text x="425" y="72" font-size="13" font-weight="600" fill="#12402a" text-anchor="middle">In-memory Metadata</text><text x="425" y="92" font-size="10" fill="#4e7a5c" text-anchor="middle">全量常驻内存 · 服务所有读</text>
  <rect x="40" y="196" width="260" height="66" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#s)"/><text x="170" y="222" font-size="13" font-weight="600" fill="#1b2a4a" text-anchor="middle">EditLog / Journal</text><text x="170" y="242" font-size="10" fill="#5b7db1" text-anchor="middle">变更追加 · 全序 · 多数派持久</text>
  <rect x="520" y="196" width="260" height="66" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#s)"/><text x="650" y="222" font-size="13" font-weight="600" fill="#5a3410" text-anchor="middle">Image（快照）</text><text x="650" y="242" font-size="10" fill="#93762e" text-anchor="middle">某位点全量 · 恢复起点</text>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <line x1="200" y1="66" x2="300" y2="72" marker-end="url(#a)"/>
    <path d="M100,92 L100,196" marker-end="url(#a)"/>
    <path d="M300,244 L520,244" marker-end="url(#a)"/>
    <path d="M640,196 L520,110" stroke-dasharray="4 3" marker-end="url(#a)"/>
    <path d="M230,196 L360,108" stroke-dasharray="4 3" marker-end="url(#a)"/>
  </g>
  <g font-size="10" fill="#a1a1a6">
    <text x="228" y="60">更新内存</text><text x="106" y="150">追加日志</text><text x="360" y="238" text-anchor="middle">Checkpoint：dump Image + 截断旧 Journal</text>
    <text x="470" y="150">重启：加载 Image</text><text x="250" y="150">恢复：回放增量 Journal</text>
  </g>
  <rect x="40" y="286" width="740" height="30" rx="9" fill="#fafafb" stroke="#ececf1"/><text x="410" y="306" font-size="10.5" fill="#6e6e73" text-anchor="middle">多数派提交 = 持久点；全序保证各 FE 按同序回放达成一致；恢复 = 加载最近 Image + 回放其后 Journal</text>
</svg>
