<svg xmlns="http://www.w3.org/2000/svg" width="860" height="330" viewBox="0 0 860 330" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="860" height="330" fill="#fbfbfd"/>
  <text x="30" y="28" font-size="14" font-weight="600" fill="#1d1d1f">RBAC 权限模型：User → Role → 授权(op × scope 沿层级匹配)</text>
  <g text-anchor="middle" font-size="11.5">
    <rect x="30" y="70" width="120" height="40" rx="11" fill="#fbeaea" stroke="#e7c3c3" filter="url(#s)"/><text x="90" y="94" fill="#4a1414">User A</text>
    <rect x="30" y="150" width="120" height="40" rx="11" fill="#fbeaea" stroke="#e7c3c3" filter="url(#s)"/><text x="90" y="174" fill="#4a1414">User B</text>
    <rect x="200" y="60" width="150" height="46" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#s)"/><text x="275" y="80" fill="#1b2a4a">Role · admin</text><text x="275" y="97" font-size="9.5" fill="#5b7db1">ADMIN 权限集合</text>
    <rect x="200" y="150" width="150" height="46" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#s)"/><text x="275" y="170" fill="#1b2a4a">Role · analyst</text><text x="275" y="187" font-size="9.5" fill="#5b7db1">SELECT 权限集合</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <line x1="150" y1="88" x2="200" y2="83" marker-end="url(#a)"/>
    <line x1="150" y1="170" x2="200" y2="173" marker-end="url(#a)"/>
    <line x1="150" y1="100" x2="200" y2="165" marker-end="url(#a)"/>
  </g>
  <text x="175" y="128" font-size="9" fill="#a1a1a6" text-anchor="middle">赋予角色</text>

  <!-- Scope ladder nested -->
  <rect x="410" y="52" width="420" height="212" rx="13" fill="#fdf9f0" stroke="#e8cf9a"/>
  <text x="424" y="72" font-size="11" font-weight="600" fill="#5a3410">Global　<tspan fill="#93762e" font-size="9">[ADMIN]</tspan></text>
  <rect x="430" y="80" width="384" height="172" rx="11" fill="#fdf6ea" stroke="#ecd9a8"/>
  <text x="444" y="99" font-size="11" font-weight="600" fill="#5a3410">Catalog</text>
  <rect x="450" y="106" width="348" height="138" rx="10" fill="#fdf3df" stroke="#ecd9a8"/>
  <text x="464" y="125" font-size="11" font-weight="600" fill="#5a3410">Database</text>
  <rect x="470" y="132" width="312" height="104" rx="10" fill="#fcefd4" stroke="#ecd9a8"/>
  <text x="484" y="151" font-size="11" font-weight="600" fill="#5a3410">Table　<tspan fill="#93762e" font-size="9">[SELECT/LOAD]</tspan></text>
  <rect x="490" y="158" width="180" height="30" rx="8" fill="#ffffff" stroke="#e8cf9a"/><text x="580" y="178" font-size="10.5" fill="#5a3410" text-anchor="middle">Column（列级/脱敏）</text>
  <rect x="490" y="196" width="180" height="30" rx="8" fill="#ffffff" stroke="#e8cf9a"/><text x="580" y="216" font-size="10.5" fill="#5a3410" text-anchor="middle">Row Policy（行级）</text>
  <rect x="690" y="158" width="80" height="68" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="730" y="188" font-size="10" fill="#1b2a4a" text-anchor="middle">Resource /</text><text x="730" y="204" font-size="10" fill="#1b2a4a" text-anchor="middle">Workload</text>
  <g stroke="#c7c7cc" stroke-width="1.3" fill="none">
    <path d="M350,80 L380,80 L380,66 L410,66" marker-end="url(#a)"/>
    <path d="M350,173 L380,173 L380,155 L470,155" marker-end="url(#a)"/>
  </g>
  <text x="30" y="300" font-size="10.5" fill="#6e6e73">鉴权：语句执行前，取所需 op（读/写/建/删/管理）× 对象 scope，沿 Global→…→Column 层级匹配用户经角色累积的权限，命中即放行。</text>
</svg>
