<svg xmlns="http://www.w3.org/2000/svg" width="860" height="300" viewBox="0 0 860 300" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="860" height="300" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Tablet Scheduler 自愈闭环：Detect → Decide → Act 持续巡检</text>
  <g text-anchor="middle">
    <rect x="30" y="58" width="250" height="120" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#s)"/><text x="155" y="82" font-size="13" font-weight="600" fill="#1b2a4a">① Detect 检测</text>
    <g font-size="10" fill="#33507e"><text x="50" y="106" text-anchor="start">· 副本数量是否达标</text><text x="50" y="126" text-anchor="start">· version 完整性</text><text x="50" y="146" text-anchor="start">· BE 存活状态</text><text x="50" y="166" text-anchor="start">· 分布 / 磁盘均匀度</text></g>
    <rect x="305" y="58" width="250" height="120" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#s)"/><text x="430" y="82" font-size="13" font-weight="600" fill="#5a3410">② Decide 决策</text>
    <g font-size="10" fill="#7a5a1e"><text x="325" y="106" text-anchor="start">· healthy / missing / corrupt</text><text x="325" y="126" text-anchor="start">· 缺失 → 补副本（高）</text><text x="325" y="146" text-anchor="start">· 落后/损坏 → 修复（高）</text><text x="325" y="166" text-anchor="start">· 倾斜 → 均衡（低）</text></g>
    <rect x="580" y="58" width="250" height="120" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#s)"/><text x="705" y="82" font-size="13" font-weight="600" fill="#12402a">③ Act 执行</text>
    <g font-size="10" fill="#2f6f4f"><text x="600" y="106" text-anchor="start">· Add 补齐冗余</text><text x="600" y="126" text-anchor="start">· Clone 修复追平 version</text><text x="600" y="146" text-anchor="start">· Balance 迁移</text><text x="600" y="166" text-anchor="start">· 全程限速</text></g>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="280" y1="118" x2="305" y2="118" marker-end="url(#a)"/>
    <line x1="555" y1="118" x2="580" y2="118" marker-end="url(#a)"/>
    <path d="M705,178 L705,224 L155,224 L155,178" marker-end="url(#a)"/>
  </g>
  <text x="430" y="216" font-size="10" fill="#a1a1a6" text-anchor="middle">周期巡检闭环</text>
  <rect x="30" y="248" width="800" height="34" rx="10" fill="#fafafb" stroke="#ececf1"/><text x="430" y="269" font-size="10.5" fill="#6e6e73" text-anchor="middle">优先级：可用性（补副本/修复）优先于优化性（均衡）；限速执行，不抢占在线读写</text>
</svg>
