<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="440" viewBox="0 0 1080 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1080" height="440" fill="#fbfbfd"/>
  <text x="40" y="42" font-size="16" font-weight="600" fill="#1d1d1f">上手路线总览 · 从零到一条查询</text>
  <text x="40" y="63" font-size="11.5" fill="#86868b">五步最小闭环:装好集群 → 建库建表 → 灌入数据 → 查出结果 → 导出结果。下方点击每一步展开该步的可复制命令。</text>

  <!-- 五步流水 -->
  <g text-anchor="middle">
    <!-- ① 环境搭建 -->
    <rect x="40" y="96" width="184" height="96" rx="14" fill="#f6f8fc" stroke="#e6ecf4" filter="url(#soft)"/>
    <circle cx="66" cy="122" r="12" fill="#0071e3"/><text x="66" y="127" font-size="13" font-weight="700" fill="#fff">1</text>
    <text x="132" y="128" font-size="14" font-weight="600" fill="#1d1d1f">环境搭建</text>
    <text x="132" y="150" font-size="10.5" fill="#86868b">start-doris.sh</text>
    <text x="132" y="167" font-size="10.5" fill="#86868b">一键拉起 FE+BE</text>
    <text x="132" y="184" font-size="10" fill="#a1a1a6">MySQL 协议连 9030</text>

    <!-- ② 建库建表 -->
    <rect x="256" y="96" width="184" height="96" rx="14" fill="#f5faf6" stroke="#e2ece5" filter="url(#soft)"/>
    <circle cx="282" cy="122" r="12" fill="#2c8a4a"/><text x="282" y="127" font-size="13" font-weight="700" fill="#fff">2</text>
    <text x="348" y="128" font-size="14" font-weight="600" fill="#1d1d1f">建库建表</text>
    <text x="348" y="150" font-size="10.5" fill="#86868b">CREATE DATABASE/TABLE</text>
    <text x="348" y="167" font-size="10.5" fill="#86868b">Duplicate/Unique/Aggregate</text>
    <text x="348" y="184" font-size="10" fill="#a1a1a6">分区 + 分桶</text>

    <!-- ③ 数据写入 -->
    <rect x="472" y="96" width="184" height="96" rx="14" fill="#fbf7ef" stroke="#efe4cf" filter="url(#soft)"/>
    <circle cx="498" cy="122" r="12" fill="#c1962a"/><text x="498" y="127" font-size="13" font-weight="700" fill="#fff">3</text>
    <text x="564" y="128" font-size="14" font-weight="600" fill="#1d1d1f">数据写入</text>
    <text x="564" y="150" font-size="10.5" fill="#86868b">Stream Load / INSERT</text>
    <text x="564" y="167" font-size="10.5" fill="#86868b">Broker Load</text>
    <text x="564" y="184" font-size="10" fill="#a1a1a6">MemTable→Segment→publish</text>

    <!-- ④ 查询分析 -->
    <rect x="688" y="96" width="184" height="96" rx="14" fill="#f4eefb" stroke="#e6d9f2" filter="url(#soft)"/>
    <circle cx="714" cy="122" r="12" fill="#8a4fc0"/><text x="714" y="127" font-size="13" font-weight="700" fill="#fff">4</text>
    <text x="780" y="128" font-size="14" font-weight="600" fill="#1d1d1f">查询分析</text>
    <text x="780" y="150" font-size="10.5" fill="#86868b">SELECT · JOIN</text>
    <text x="780" y="167" font-size="10.5" fill="#86868b">逻辑计划→物理计划</text>
    <text x="780" y="184" font-size="10" fill="#a1a1a6">EXPLAIN / Profile</text>

    <!-- ⑤ 数据导出 -->
    <rect x="888" y="96" width="152" height="96" rx="14" fill="#f7f7f9" stroke="#ececef" filter="url(#soft)"/>
    <circle cx="914" cy="122" r="12" fill="#6e6e73"/><text x="914" y="127" font-size="13" font-weight="700" fill="#fff">5</text>
    <text x="972" y="128" font-size="14" font-weight="600" fill="#1d1d1f">数据导出</text>
    <text x="964" y="150" font-size="10.5" fill="#86868b">OUTFILE</text>
    <text x="964" y="167" font-size="10.5" fill="#86868b">EXPORT</text>
    <text x="964" y="184" font-size="10" fill="#a1a1a6">mysqldump</text>
  </g>
  <!-- 箭头 -->
  <g stroke="#c7c7cc" stroke-width="1.6" fill="none">
    <line x1="224" y1="144" x2="255" y2="144" marker-end="url(#ar)"/>
    <line x1="440" y1="144" x2="471" y2="144" marker-end="url(#ar)"/>
    <line x1="656" y1="144" x2="687" y2="144" marker-end="url(#ar)"/>
    <line x1="872" y1="144" x2="887" y2="144" marker-end="url(#ar)"/>
  </g>

  <!-- 底部:一条查询贯穿 -->
  <rect x="40" y="228" width="1000" height="172" rx="16" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
  <text x="60" y="254" font-size="13" font-weight="600" fill="#1d1d1f">一条查询贯穿:数据如何变成答案</text>
  <g font-size="11" text-anchor="middle" fill="#4a4e57">
    <rect x="60" y="270" width="150" height="46" rx="10" fill="#f6f8fc" stroke="#e6ecf4"/><text x="135" y="290">客户端 SQL</text><text x="135" y="306" font-size="9.5" fill="#86868b">MySQL 协议 端口 9030</text>
    <rect x="240" y="270" width="200" height="46" rx="10" fill="#f6f8fc" stroke="#e6ecf4"/><text x="340" y="290">FE · Nereids 优化器</text><text x="340" y="306" font-size="9.5" fill="#86868b">解析→绑定→RBO/CBO→分布式计划</text>
    <rect x="470" y="270" width="200" height="46" rx="10" fill="#fbf7ef" stroke="#efe4cf"/><text x="570" y="290">BE · Pipeline 并行执行</text><text x="570" y="306" font-size="9.5" fill="#86868b">向量化算子 · Exchange 交换</text>
    <rect x="700" y="270" width="180" height="46" rx="10" fill="#f5faf6" stroke="#e2ece5"/><text x="790" y="290">存储 · 列存扫描</text><text x="790" y="306" font-size="9.5" fill="#86868b">三索引跳过 · 延迟物化</text>
    <rect x="910" y="270" width="110" height="46" rx="10" fill="#f6f8fc" stroke="#e6ecf4"/><text x="965" y="290">结果集</text><text x="965" y="306" font-size="9.5" fill="#86868b">流式返回</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="210" y1="293" x2="239" y2="293" marker-end="url(#ar)"/>
    <line x1="440" y1="293" x2="469" y2="293" marker-end="url(#ar)"/>
    <line x1="670" y1="293" x2="699" y2="293" marker-end="url(#ar)"/>
    <line x1="880" y1="293" x2="909" y2="293" marker-end="url(#ar)"/>
  </g>
  <text x="60" y="352" font-size="11" fill="#86868b">建议顺序:先跑通① ② ③ 装好并灌入数据,再用 ④ 查询验证,最后 ⑤ 导出。点击下方任一步展开该步的可复制命令。</text>
  <text x="60" y="376" font-size="10.5" fill="#a1a1a6">深入原理:查询链路见「DQL 数据查询」· 写入链路见「DML 数据写入」· 整体架构/数仓分层见 Appendix「集成架构」。</text>
</svg>
