<svg xmlns="http://www.w3.org/2000/svg" width="940" height="430" viewBox="0 0 940 430" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="arb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8fa0c0"/></marker>
    <marker id="arp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#a066c0"/></marker>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c0392b"/></marker>
  </defs>
  <rect width="940" height="430" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">shim 生命周期泳道 · containerd 只持连接，shim 守着容器（进程解耦）</text>

  <!-- legend -->
  <rect x="600" y="17" width="12" height="12" rx="3" fill="#f6f8fc" stroke="#cfe0f2"/><text x="617" y="27" font-size="10" fill="#6e6e73">containerd 侧</text>
  <rect x="706" y="17" width="12" height="12" rx="3" fill="#faf4fb" stroke="#e4cdea"/><text x="723" y="27" font-size="10" fill="#6e6e73">shim / runc 侧</text>
  <rect x="812" y="17" width="12" height="12" rx="3" fill="#fdf3f2" stroke="#f0cfc9"/><text x="829" y="27" font-size="10" fill="#6e6e73">daemon 重启</text>

  <!-- lane backgrounds -->
  <rect x="24" y="64" width="892" height="78" rx="10" fill="#fafcff" stroke="#e8eef7"/>
  <rect x="24" y="238" width="892" height="78" rx="10" fill="#fdfafe" stroke="#f0e8f4"/>
  <text x="34" y="80" font-size="10" font-weight="600" fill="#5b7db1">containerd 侧</text>
  <text x="34" y="254" font-size="10" font-weight="600" fill="#8944ab">shim / runc 侧</text>

  <!-- containerd lane boxes -->
  <rect x="34" y="88" width="158" height="46" rx="9" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="113" y="108" font-size="10" font-weight="600" fill="#5b7db1" text-anchor="middle">① 启动 shim</text>
  <text x="113" y="125" font-size="9" fill="#5b7db1" text-anchor="middle">Start</text>
  <rect x="210" y="88" width="158" height="46" rx="9" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="289" y="108" font-size="10" font-weight="600" fill="#5b7db1" text-anchor="middle">② 创建</text>
  <text x="289" y="125" font-size="9" fill="#5b7db1" text-anchor="middle">shimTask.Create</text>
  <rect x="386" y="88" width="158" height="46" rx="9" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="465" y="108" font-size="10" font-weight="600" fill="#5b7db1" text-anchor="middle">③ 启动</text>
  <text x="465" y="125" font-size="9" fill="#5b7db1" text-anchor="middle">tasks Start</text>
  <rect x="562" y="88" width="158" height="46" rx="9" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="641" y="108" font-size="10" font-weight="600" fill="#5b7db1" text-anchor="middle">④ exec</text>
  <text x="641" y="125" font-size="9" fill="#5b7db1" text-anchor="middle">tasks Exec</text>
  <rect x="738" y="88" width="158" height="46" rx="9" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="817" y="108" font-size="10" font-weight="600" fill="#5b7db1" text-anchor="middle">⑤ 删除</text>
  <text x="817" y="125" font-size="9" fill="#5b7db1" text-anchor="middle">Delete</text>

  <!-- sequence arrows in lane A -->
  <path d="M192 111 L208 111" fill="none" stroke="#8fa0c0" stroke-width="1.4" marker-end="url(#arb)"/>
  <path d="M368 111 L384 111" fill="none" stroke="#8fa0c0" stroke-width="1.4" marker-end="url(#arb)"/>
  <path d="M544 111 L560 111" fill="none" stroke="#8fa0c0" stroke-width="1.4" marker-end="url(#arb)"/>
  <path d="M720 111 L736 111" fill="none" stroke="#8fa0c0" stroke-width="1.4" marker-end="url(#arb)"/>

  <!-- shim lane boxes -->
  <rect x="34" y="262" width="158" height="46" rx="9" fill="#faf4fb" stroke="#e4cdea"/>
  <text x="113" y="282" font-size="9.5" fill="#8944ab" text-anchor="middle">start：fork 常驻进程</text>
  <text x="113" y="299" font-size="9" fill="#8944ab" text-anchor="middle">回传 socket 地址</text>
  <rect x="210" y="262" width="158" height="46" rx="9" fill="#faf4fb" stroke="#e4cdea"/>
  <text x="289" y="288" font-size="9.5" fill="#8944ab" text-anchor="middle">Create → runc create</text>
  <rect x="386" y="262" width="158" height="46" rx="9" fill="#faf4fb" stroke="#e4cdea"/>
  <text x="465" y="288" font-size="9.5" fill="#8944ab" text-anchor="middle">Start → runc start</text>
  <rect x="562" y="262" width="158" height="46" rx="9" fill="#faf4fb" stroke="#e4cdea"/>
  <text x="641" y="288" font-size="9.5" fill="#8944ab" text-anchor="middle">容器内起新进程</text>
  <rect x="738" y="262" width="158" height="46" rx="9" fill="#faf4fb" stroke="#e4cdea"/>
  <text x="817" y="282" font-size="9.5" fill="#8944ab" text-anchor="middle">杀容器 · 清理</text>
  <text x="817" y="299" font-size="9" fill="#8944ab" text-anchor="middle">shim 退出</text>

  <!-- TTRPC arrows down -->
  <path d="M113 134 L113 260" fill="none" stroke="#a066c0" stroke-width="1.4" marker-end="url(#arp)"/>
  <text x="120" y="200" font-size="9" fill="#a066c0">TTRPC</text>
  <path d="M289 134 L289 260" fill="none" stroke="#a066c0" stroke-width="1.4" marker-end="url(#arp)"/>
  <path d="M465 134 L465 260" fill="none" stroke="#a066c0" stroke-width="1.4" marker-end="url(#arp)"/>
  <path d="M641 134 L641 260" fill="none" stroke="#a066c0" stroke-width="1.4" marker-end="url(#arp)"/>
  <path d="M817 134 L817 260" fill="none" stroke="#a066c0" stroke-width="1.4" marker-end="url(#arp)"/>

  <!-- restart callout -->
  <rect x="386" y="160" width="510" height="42" rx="9" fill="#fdf3f2" stroke="#f0cfc9"/>
  <text x="402" y="180" font-size="10" font-weight="600" fill="#c0392b">daemon 重启 · LoadExistingShims 读 bootstrap.json 重连仍在运行的 shim</text>
  <text x="402" y="196" font-size="9.5" fill="#c0392b">容器进程挂 shim 名下、全程不中断；只对"真死"的 shim 才 cleanupAfterDeadShim</text>
  <path d="M465 202 L465 236" fill="none" stroke="#c0392b" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arr)"/>

  <!-- caption -->
  <rect x="30" y="330" width="866" height="74" rx="10" fill="#f8f8fb" stroke="#eceaf0"/>
  <text x="46" y="356" font-size="11" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">核心：</tspan>每个容器一个独立 shim 进程，containerd 只经 TTRPC 持有到它的连接；容器进程挂在 shim 名下，而非 containerd 名下。</text>
  <text x="46" y="378" font-size="10.5" fill="#6e6e73"><tspan font-weight="600" fill="#c0392b">因此 containerd 可随时重启 / 升级而容器不死</tspan>——重启后按落盘 bootstrap.json 重连接管，这是"守护进程平滑升级"这条设计张力的答案。</text>
  <text x="46" y="398" font-size="9.5" fill="#a1a1a6">各阶段精确落点见下方"shim 生命周期方法"表（shim_manager.go / task_manager.go / service.go / shim_load.go）。</text>
</svg>
