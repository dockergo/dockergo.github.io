<svg xmlns="http://www.w3.org/2000/svg" width="920" height="440" viewBox="0 0 920 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="arh" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="arf" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#d38236"/></marker>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="920" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">shim 创建与存活 · 每容器一独立 shim 进程 → 调 runc；daemon 重启后重连接管</text>

  <!-- containerd -->
  <rect x="30" y="60" width="200" height="120" rx="11" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="130" y="84" font-size="12" font-weight="600" fill="#5b7db1" text-anchor="middle">containerd 守护进程</text>
  <text x="46" y="106" font-size="10" fill="#1b2a4a">TaskManager.Create</text>
  <text x="46" y="124" font-size="9.5" fill="#5b7db1">NewBundle + mounts.Activate</text>
  <text x="46" y="142" font-size="9.5" fill="#5b7db1">manager.Start 起 shim</text>
  <text x="46" y="160" font-size="8.5" fill="#a1a1a6">task_manager.go:159 / :213</text>
  <text x="46" y="174" font-size="8.5" fill="#a1a1a6">shim_manager.go:208 Start</text>

  <!-- shim 进程 -->
  <rect x="330" y="60" width="240" height="120" rx="11" fill="#f5faf6" stroke="#cfe6d2" filter="url(#soft)"/>
  <text x="450" y="84" font-size="12" font-weight="600" fill="#1d8f3f" text-anchor="middle">shim 进程（独立 · 每容器一个）</text>
  <text x="346" y="106" font-size="10" fill="#1d8f3f">binary.go:66 Start → shim `start`</text>
  <text x="346" y="124" font-size="9.5" fill="#4a8a5c">fork 常驻进程、回传 socket</text>
  <text x="346" y="142" font-size="9.5" fill="#4a8a5c">service.go:223 Create / :296 Start</text>
  <text x="346" y="160" font-size="8.5" fill="#a1a1a6">TTRPC 连接（makeConnection）</text>
  <text x="346" y="174" font-size="8.5" fill="#a1a1a6">parseStartResponse 拿地址</text>

  <!-- runc / 容器 -->
  <rect x="670" y="60" width="220" height="120" rx="11" fill="#fff" stroke="#ececef" filter="url(#soft)"/>
  <text x="780" y="84" font-size="12" font-weight="600" fill="#1d1d1f" text-anchor="middle">runc / OCI + 容器进程</text>
  <text x="686" y="106" font-size="10" fill="#6e6e73">shim 调 runc create/start</text>
  <text x="686" y="124" font-size="10" fill="#6e6e73">容器进程挂在 shim 名下</text>
  <text x="686" y="146" font-size="9.5" fill="#4a8a5c">← 不挂在 containerd 名下</text>
  <text x="686" y="166" font-size="8.5" fill="#a1a1a6">故障/隔离边界在此</text>

  <path d="M230 108 L330 108" fill="none" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#arh)"/>
  <text x="238" y="100" font-size="9" fill="#2f9e6e">启动 shim</text>
  <path d="M570 108 L670 108" fill="none" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#arh)"/>
  <text x="578" y="100" font-size="9" fill="#2f9e6e">调 runc</text>
  <path d="M330 150 L230 150" fill="none" stroke="#b8b8bf" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="238" y="168" font-size="8.5" fill="#8a8a8f">回传 socket 地址</text>

  <!-- 落盘 -->
  <rect x="330" y="210" width="240" height="70" rx="10" fill="#fbf7ef" stroke="#ecdcbf"/>
  <text x="450" y="232" font-size="11" font-weight="600" fill="#8a6d3b" text-anchor="middle">落盘（state 目录，不随 daemon 消失）</text>
  <text x="346" y="252" font-size="9.5" fill="#b08535">bootstrap.json（协议+地址）binary.go:142</text>
  <text x="346" y="270" font-size="9.5" fill="#b08535">shim-binary-path binary.go:127</text>
  <path d="M450 180 L450 210" fill="none" stroke="#c99a3a" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- 重启接管 -->
  <rect x="30" y="310" width="860" height="80" rx="11" fill="#fff6ef" stroke="#f0c9a0"/>
  <text x="46" y="332" font-size="12" font-weight="600" fill="#c0641a">失败路径 · containerd 重启 / 升级 → shim 存活 → 重连接管（这就是设计张力的答案）</text>
  <rect x="46" y="344" width="200" height="34" rx="7" fill="#fff" stroke="#f0c9a0"/>
  <text x="56" y="365" font-size="9.5" fill="#c0641a">containerd 挂掉/升级重启</text>
  <rect x="286" y="344" width="260" height="34" rx="7" fill="#fff" stroke="#f0c9a0"/>
  <text x="296" y="365" font-size="9.5" fill="#c0641a">LoadExistingShims 扫 state 目录（:38）</text>
  <rect x="586" y="344" width="280" height="34" rx="7" fill="#fff" stroke="#f0c9a0"/>
  <text x="596" y="365" font-size="9.5" fill="#c0641a">读 bootstrap.json 重连存活 shim、接管（:127）</text>
  <path d="M246 361 L286 361" fill="none" stroke="#d38236" stroke-width="1.6" marker-end="url(#arf)"/>
  <path d="M546 361 L586 361" fill="none" stroke="#d38236" stroke-width="1.6" marker-end="url(#arf)"/>

  <text x="30" y="416" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">核心：</tspan>容器进程挂在独立 shim 上，daemon 重启期间容器全程不中断；只有确认死掉的 shim 才被 cleanupAfterDeadShim（:172）清理</text>
  <text x="30" y="436" font-size="11" fill="#a1a1a6">代价：需持久化连接态（bootstrap.json）+ 重连逻辑，每容器一进程有内存开销——用可升级性换复杂度。升级须保留 state 目录否则成孤儿 shim</text>
</svg>
