<svg xmlns="http://www.w3.org/2000/svg" width="920" height="410" viewBox="0 0 920 410" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
    <marker id="arg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c99a3a"/></marker>
  </defs>
  <rect width="920" height="410" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">内容寻址 · ingest 暂存 → commit 校验摘要 → 摘要即路径入库</text>

  <!-- 写入源 -->
  <rect x="30" y="66" width="150" height="80" rx="11" fill="#f5faf6" stroke="#cfe6d2" filter="url(#soft)"/>
  <text x="105" y="90" font-size="11.5" font-weight="600" fill="#1d8f3f" text-anchor="middle">写入源</text>
  <text x="105" y="112" font-size="10" fill="#4a8a5c" text-anchor="middle">fetch 镜像层</text>
  <text x="105" y="130" font-size="10" fill="#4a8a5c" text-anchor="middle">config / manifest</text>

  <!-- ingest 暂存 -->
  <rect x="220" y="56" width="230" height="110" rx="11" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#soft)"/>
  <text x="335" y="80" font-size="12" font-weight="600" fill="#8a6d3b" text-anchor="middle">ingest 暂存（临时）</text>
  <text x="236" y="102" font-size="10" fill="#b08535">Writer / writer 拿写入器</text>
  <text x="236" y="120" font-size="10" fill="#b08535">ingest/&lt;ref-hash&gt;/data</text>
  <text x="236" y="138" font-size="9" fill="#a1a1a6">store.go:475 Writer · :533 writer</text>
  <text x="236" y="154" font-size="9" fill="#a1a1a6">:654 ingestRoot</text>

  <!-- commit 校验 -->
  <rect x="490" y="56" width="180" height="110" rx="11" fill="#faf4fb" stroke="#e4cdea" filter="url(#soft)"/>
  <text x="580" y="80" font-size="12" font-weight="600" fill="#8944ab" text-anchor="middle">commit 校验</text>
  <text x="506" y="102" font-size="10" fill="#8944ab">实际摘要 == 期望？</text>
  <text x="506" y="120" font-size="10" fill="#8944ab">一致才入库</text>
  <text x="506" y="138" font-size="9" fill="#a1a1a6">content.go:159 Commit</text>
  <text x="506" y="154" font-size="9" fill="#a1a1a6">不一致 → 拒绝</text>

  <!-- blobs 最终 -->
  <rect x="710" y="56" width="180" height="110" rx="11" fill="#fbf2ea" stroke="#e6cdae" filter="url(#soft)"/>
  <text x="800" y="80" font-size="12" font-weight="600" fill="#b0651f" text-anchor="middle">blobs（不可变）</text>
  <text x="726" y="102" font-size="9.5" fill="#b08535">blobs/&lt;algo&gt;/&lt;digest&gt;</text>
  <text x="726" y="120" font-size="9.5" fill="#b08535">摘要即路径</text>
  <text x="726" y="138" font-size="9" fill="#a1a1a6">store.go:646 blobPath</text>
  <text x="726" y="154" font-size="9" fill="#a1a1a6">永不覆盖</text>

  <path d="M180 106 L220 106" fill="none" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/>
  <path d="M450 111 L490 111" fill="none" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/>
  <path d="M670 111 L710 111" fill="none" stroke="#c99a3a" stroke-width="1.8" marker-end="url(#arg)"/>
  <text x="676" y="104" font-size="8.5" fill="#c99a3a">move</text>

  <!-- 三性质 -->
  <rect x="30" y="190" width="270" height="70" rx="10" fill="#fff" stroke="#ecdcbf"/>
  <text x="46" y="212" font-size="11" font-weight="600" fill="#8a6d3b">① 不可变</text>
  <text x="46" y="232" font-size="9.5" fill="#b08535">内容变→摘要变→新 blob</text>
  <text x="46" y="250" font-size="9.5" fill="#b08535">永不原地覆盖</text>
  <rect x="320" y="190" width="270" height="70" rx="10" fill="#fff" stroke="#ecdcbf"/>
  <text x="336" y="212" font-size="11" font-weight="600" fill="#8a6d3b">② 天然去重</text>
  <text x="336" y="232" font-size="9.5" fill="#b08535">同层被多镜像引用</text>
  <text x="336" y="250" font-size="9.5" fill="#b08535">磁盘只存一份</text>
  <rect x="610" y="190" width="280" height="70" rx="10" fill="#fff" stroke="#ecdcbf"/>
  <text x="626" y="212" font-size="11" font-weight="600" fill="#8a6d3b">③ 可校验</text>
  <text x="626" y="232" font-size="9.5" fill="#b08535">读回时摘要即完整性校验</text>
  <text x="626" y="250" font-size="9.5" fill="#b08535">损坏立即可查</text>

  <!-- 元数据 + 租约 -->
  <rect x="30" y="278" width="860" height="60" rx="10" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="46" y="300" font-size="11" font-weight="600" fill="#5b7db1">bbolt 元数据库（core/metadata/db.go:120 NewDB）记账"谁引用了哪个摘要" + 租约 leases 作 GC 根</text>
  <text x="46" y="322" font-size="9.5" fill="#5b7db1">content store 只管字节；引用/命名空间/租约在元数据库里 · leases.AddResource（lease.go:36）防多步操作中途误删 · GC 按可达性清无引用 blob</text>

  <text x="30" y="366" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">核心：</tspan>摘要既是内容的名字、也是它的存储路径、还是它的校验和——这三合一就是内容寻址</text>
  <text x="30" y="392" font-size="11" fill="#a1a1a6">删镜像 = 删引用/元数据；blob 由 GC（plugins/gc 独立插件）按从镜像/容器/租约根的可达性回收</text>
</svg>
