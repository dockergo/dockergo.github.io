<svg xmlns="http://www.w3.org/2000/svg" width="920" height="380" viewBox="0 0 920 380" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
    <marker id="arb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
    <marker id="arp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8944ab"/></marker>
  </defs>
  <rect width="920" height="380" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">三类插件撑起一个接触面 · 协议壳 与 业务实现 彻底分离</text>

  <!-- GRPCPlugin -->
  <rect x="30" y="66" width="250" height="110" rx="12" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="155" y="90" font-size="12" font-weight="600" fill="#5b7db1" text-anchor="middle">GRPCPlugin（协议壳）</text>
  <text x="46" y="112" font-size="10" fill="#1b2a4a">暴露 gRPC 方法</text>
  <text x="46" y="130" font-size="10" fill="#1b2a4a">编解码 + 派发，几无业务逻辑</text>
  <text x="46" y="148" font-size="9.5" fill="#5b7db1">gRPC 前端调用</text>
  <text x="46" y="166" font-size="8.5" fill="#a1a1a6">plugins/types.go:35 GRPCPlugin</text>

  <!-- ServicePlugin -->
  <rect x="335" y="66" width="250" height="110" rx="12" fill="#f5faf6" stroke="#cfe6d2" filter="url(#soft)"/>
  <text x="460" y="90" font-size="12" font-weight="600" fill="#1d8f3f" text-anchor="middle">ServicePlugin（业务实现）</text>
  <text x="351" y="112" font-size="10" fill="#1d8f3f">内部服务实现，真正干活</text>
  <text x="351" y="130" font-size="10" fill="#1d8f3f">依赖运行时/存储等底层插件</text>
  <text x="351" y="148" font-size="9.5" fill="#4a8a5c">可被 gRPC 与 CRI 共用</text>
  <text x="351" y="166" font-size="8.5" fill="#a1a1a6">plugins/types.go:33 ServicePlugin</text>

  <!-- TTRPCPlugin -->
  <rect x="640" y="66" width="250" height="110" rx="12" fill="#faf4fb" stroke="#e4cdea" filter="url(#soft)"/>
  <text x="765" y="90" font-size="12" font-weight="600" fill="#8944ab" text-anchor="middle">TTRPCPlugin（面向 shim）</text>
  <text x="656" y="112" font-size="10" fill="#8944ab">更轻量的 RPC</text>
  <text x="656" y="130" font-size="10" fill="#8944ab">shim 不必依赖完整 gRPC 栈</text>
  <text x="656" y="148" font-size="9.5" fill="#9a76c0">containerd ↔ shim</text>
  <text x="656" y="166" font-size="8.5" fill="#a1a1a6">plugins/types.go:37 TTRPCPlugin</text>

  <path d="M280 110 L335 110" fill="none" stroke="#5b7db1" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#arb)"/>
  <text x="290" y="102" font-size="9" fill="#5b7db1">依赖注入</text>

  <!-- 以 tasks 为例 -->
  <rect x="30" y="210" width="540" height="120" rx="12" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="232" font-size="11.5" font-weight="600" fill="#1b2a4a">以 tasks 为例：一个对外能力 = GRPCPlugin 注入一个 ServicePlugin，再依赖底层</text>
  <rect x="46" y="244" width="150" height="40" rx="8" fill="#fff" stroke="#cfe0f2"/>
  <text x="121" y="262" font-size="9.5" fill="#5b7db1" text-anchor="middle">tasks GRPCPlugin</text>
  <text x="121" y="278" font-size="8.5" fill="#a1a1a6" text-anchor="middle">协议编解码</text>
  <rect x="216" y="244" width="150" height="40" rx="8" fill="#fff" stroke="#cfe6d2"/>
  <text x="291" y="262" font-size="9.5" fill="#1d8f3f" text-anchor="middle">tasks ServicePlugin</text>
  <text x="291" y="278" font-size="8.5" fill="#a1a1a6" text-anchor="middle">local.go:171 Create…</text>
  <rect x="386" y="244" width="164" height="40" rx="8" fill="#fff" stroke="#cfe6d2"/>
  <text x="468" y="262" font-size="9.5" fill="#1d8f3f" text-anchor="middle">runtime v2 / content…</text>
  <text x="468" y="278" font-size="8.5" fill="#a1a1a6" text-anchor="middle">ic.Get 注入</text>
  <path d="M196 264 L216 264" fill="none" stroke="#b8b8bf" stroke-width="1.4" marker-end="url(#ar)"/>
  <path d="M366 264 L386 264" fill="none" stroke="#b8b8bf" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="46" y="306" font-size="9.5" fill="#6e6e73">server.New（server.go:124）启动时按依赖图拓扑顺序把它们逐一初始化并注册到底层 gRPC server</text>
  <text x="46" y="322" font-size="9.5" fill="#a1a1a6">gRPC 地址取自 server.go:148 io.containerd.server.v1.grpc address；TTRPC 地址邻近</text>

  <!-- CRI 复用 -->
  <rect x="590" y="210" width="300" height="120" rx="12" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="606" y="232" font-size="11.5" font-weight="600" fill="#6f3ea8">CRI 直接复用同一 ServicePlugin</text>
  <text x="606" y="256" font-size="9.5" fill="#6f3ea8">进程内调用，省一次序列化</text>
  <text x="606" y="276" font-size="9.5" fill="#9a76c0">同一 tasks ServicePlugin 既被 gRPC</text>
  <text x="606" y="292" font-size="9.5" fill="#9a76c0">前端调用，也被 CRI plugin 复用</text>
  <text x="606" y="316" font-size="9" fill="#a1a1a6">这就是接触面"薄"的原因：gRPC 层几乎全是转发</text>
  <path d="M700 210 Q660 195 520 176" fill="none" stroke="#8944ab" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#arp)"/>

  <text x="30" y="360" font-size="11" fill="#a1a1a6">"协议壳"与"业务实现"分离让同一实现可被多前端复用；服务只做协议适配 + 派发，能力在被注入的底层插件里</text>
</svg>
