<svg xmlns="http://www.w3.org/2000/svg" width="920" height="400" viewBox="0 0 920 400" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="arh" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="arg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c99a3a"/></marker>
  </defs>
  <rect width="920" height="400" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">拉取与解包（Hot 流第一段）· pull 落 content → unpack 逐层 apply 成快照链</text>

  <!-- registry -->
  <rect x="30" y="66" width="120" height="80" rx="11" fill="#f7f7f9" stroke="#ececef" filter="url(#soft)"/>
  <text x="90" y="102" font-size="11.5" font-weight="600" fill="#3a3a3c" text-anchor="middle">registry</text>
  <text x="90" y="124" font-size="10" fill="#6e6e73" text-anchor="middle">远端镜像仓库</text>

  <!-- pull -->
  <rect x="190" y="56" width="230" height="100" rx="11" fill="#f5faf6" stroke="#cfe6d2" filter="url(#soft)"/>
  <text x="305" y="80" font-size="12" font-weight="600" fill="#1d8f3f" text-anchor="middle">① pull（resolve + fetch）</text>
  <text x="206" y="102" font-size="10" fill="#4a8a5c">manifest → config → layers</text>
  <text x="206" y="120" font-size="10" fill="#4a8a5c">按内容寻址落 content store</text>
  <text x="206" y="138" font-size="9" fill="#a1a1a6">pull.go:43 Pull · 并发/去重</text>

  <!-- content store -->
  <rect x="460" y="56" width="180" height="100" rx="11" fill="#fbf2ea" stroke="#e6cdae" filter="url(#soft)"/>
  <text x="550" y="80" font-size="12" font-weight="600" fill="#b0651f" text-anchor="middle">content store</text>
  <text x="476" y="102" font-size="9.5" fill="#b08535">blobs/&lt;algo&gt;/&lt;digest&gt;</text>
  <text x="476" y="120" font-size="9.5" fill="#b08535">压缩层 tar（不可变）</text>
  <text x="476" y="138" font-size="9" fill="#a1a1a6">去重 · 可断点续传</text>

  <!-- unpack -->
  <rect x="680" y="56" width="210" height="100" rx="11" fill="#faf4fb" stroke="#e4cdea" filter="url(#soft)"/>
  <text x="785" y="80" font-size="12" font-weight="600" fill="#8944ab" text-anchor="middle">② unpack（逐层）</text>
  <text x="696" y="102" font-size="10" fill="#8944ab">NewUnpacker(ContentStore)</text>
  <text x="696" y="120" font-size="10" fill="#8944ab">diff.Applier apply 每层</text>
  <text x="696" y="138" font-size="9" fill="#a1a1a6">pull.go:134 · unpacker.go:84</text>

  <path d="M150 106 L190 106" fill="none" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#arh)"/>
  <path d="M420 106 L460 106" fill="none" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#arh)"/>
  <path d="M640 106 L680 106" fill="none" stroke="#c99a3a" stroke-width="1.8" marker-end="url(#arg)"/>
  <text x="646" y="98" font-size="8.5" fill="#c99a3a">读层</text>

  <!-- 逐层 apply -->
  <rect x="30" y="184" width="500" height="150" rx="11" fill="#faf4fb" stroke="#e4cdea"/>
  <text x="46" y="206" font-size="11.5" font-weight="600" fill="#8944ab">逐层 apply：在前一层快照上 Prepare → Applier apply diff → Commit</text>
  <g font-size="9.5">
    <rect x="46" y="220" width="140" height="44" rx="7" fill="#fff" stroke="#e4cdea"/>
    <text x="56" y="240" fill="#8944ab" font-weight="600">层1</text>
    <text x="56" y="256" fill="#9a76c0">Prepare→apply→Commit</text>
    <rect x="200" y="220" width="140" height="44" rx="7" fill="#fff" stroke="#e4cdea"/>
    <text x="210" y="240" fill="#8944ab" font-weight="600">层2（parent=层1）</text>
    <text x="210" y="256" fill="#9a76c0">Prepare→apply→Commit</text>
    <rect x="354" y="220" width="160" height="44" rx="7" fill="#fff" stroke="#e4cdea"/>
    <text x="364" y="240" fill="#8944ab" font-weight="600">层N（parent=层N-1）</text>
    <text x="364" y="256" fill="#9a76c0">Prepare→apply→Commit</text>
  </g>
  <path d="M186 242 L200 242" fill="none" stroke="#c99a3a" stroke-width="1.5" marker-end="url(#arg)"/>
  <path d="M340 242 L354 242" fill="none" stroke="#c99a3a" stroke-width="1.5" marker-end="url(#arg)"/>
  <text x="46" y="290" font-size="9.5" fill="#6e6e73">结果 = snapshotter 里一条 Committed 快照链；diff 是插件（DiffPlugin），gzip/zstd/加密层由不同 differ 处理</text>
  <text x="46" y="312" font-size="9.5" fill="#a1a1a6">内容寻址使 unpack 幂等：已有摘要的层不重拉，已存在的快照层可跳过</text>

  <!-- 快照链结果 -->
  <rect x="560" y="184" width="330" height="150" rx="11" fill="#f5faf6" stroke="#cfe6d2"/>
  <text x="576" y="206" font-size="11" font-weight="600" fill="#1d8f3f">→ 交给快照篇：容器 rootfs 的来源</text>
  <text x="576" y="228" font-size="10" fill="#4a8a5c">镜像 = Committed 快照链</text>
  <text x="576" y="248" font-size="10" fill="#4a8a5c">容器启动：顶层上 Prepare 可写层</text>
  <text x="576" y="272" font-size="9.5" fill="#6e6e73">transfer 服务（transfer 插件）把</text>
  <text x="576" y="290" font-size="9.5" fill="#6e6e73">"拉到 content + unpack 到 snapshot"</text>
  <text x="576" y="308" font-size="9.5" fill="#6e6e73">封装成一次可插拔传输操作</text>

  <text x="30" y="360" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">核心：</tspan>pull（落 content，内容寻址去重）与 unpack（apply 成快照，diff 插件）解耦，可流水线并发</text>
  <text x="30" y="384" font-size="11" fill="#a1a1a6">远程 snapshotter（stargz 等）可让镜像懒加载——不拉全层即启动，改写这条路径</text>
</svg>
