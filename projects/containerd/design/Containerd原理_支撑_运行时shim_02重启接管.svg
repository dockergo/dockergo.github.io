<svg xmlns="http://www.w3.org/2000/svg" width="920" height="400" viewBox="0 0 920 400" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
    <marker id="arf" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#d38236"/></marker>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c4341c"/></marker>
  </defs>
  <rect width="920" height="400" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">daemon 重启时间线 · 容器进程全程不中断，重启后按落盘参数重连接管</text>

  <!-- 时间轴 -->
  <line x1="60" y1="90" x2="880" y2="90" stroke="#d2d2d7" stroke-width="1.5"/>
  <text x="60" y="78" font-size="10" font-weight="600" fill="#6e6e73">t →</text>

  <!-- containerd 泳道 -->
  <text x="60" y="128" font-size="11" font-weight="600" fill="#5b7db1">containerd</text>
  <rect x="60" y="138" width="150" height="34" rx="7" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="135" y="159" font-size="9.5" fill="#5b7db1" text-anchor="middle">运行中·持有 shim 连接</text>
  <rect x="330" y="138" width="150" height="34" rx="7" fill="#fdf1ef" stroke="#f0c4bc"/>
  <text x="405" y="159" font-size="9.5" fill="#c4341c" text-anchor="middle">挂掉 / 升级重启</text>
  <rect x="560" y="138" width="150" height="34" rx="7" fill="#fff6ef" stroke="#f0c9a0"/>
  <text x="635" y="159" font-size="9.5" fill="#c0641a" text-anchor="middle">LoadExistingShims 扫描</text>
  <rect x="730" y="138" width="150" height="34" rx="7" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="805" y="159" font-size="9.5" fill="#5b7db1" text-anchor="middle">重连、接管回 TaskManager</text>
  <path d="M210 155 L330 155" fill="none" stroke="#c4341c" stroke-width="1.4" marker-end="url(#arr)"/>
  <path d="M480 155 L560 155" fill="none" stroke="#d38236" stroke-width="1.5" marker-end="url(#arf)"/>
  <path d="M710 155 L730 155" fill="none" stroke="#d38236" stroke-width="1.5" marker-end="url(#arf)"/>

  <!-- shim + 容器泳道：全程连续 -->
  <text x="60" y="212" font-size="11" font-weight="600" fill="#1d8f3f">shim + 容器进程</text>
  <rect x="60" y="222" width="820" height="44" rx="9" fill="#f5faf6" stroke="#cfe6d2" filter="url(#soft)"/>
  <text x="470" y="242" font-size="11" font-weight="600" fill="#1d8f3f" text-anchor="middle">shim 进程独立存活 · 容器进程挂在它名下，全程不中断</text>
  <text x="470" y="258" font-size="9" fill="#4a8a5c" text-anchor="middle">— daemon 生死与此无关，这就是"设计张力的答案" —</text>
  <line x1="405" y1="172" x2="405" y2="222" stroke="#c4341c" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="412" y="196" font-size="8.5" fill="#c4341c">daemon 缺席期</text>

  <!-- 落盘 -->
  <rect x="60" y="290" width="380" height="80" rx="11" fill="#fbf7ef" stroke="#ecdcbf"/>
  <text x="76" y="312" font-size="11" font-weight="600" fill="#8a6d3b">重连凭据落盘 state 目录（不随 daemon 消失）</text>
  <text x="76" y="334" font-size="9.5" fill="#b08535">bootstrap.json（协议 + socket 地址）binary.go:142</text>
  <text x="76" y="352" font-size="9.5" fill="#b08535">shim-binary-path binary.go:127 · loadShim 用它重连 :127</text>

  <!-- 决策 -->
  <rect x="460" y="290" width="420" height="80" rx="11" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="476" y="312" font-size="11" font-weight="600" fill="#5b7db1">接管决策：只清真死的 shim</text>
  <text x="476" y="334" font-size="9.5" fill="#1d8f3f">· 连接成功 → 接管回 TaskManager（loadShimTask :203）</text>
  <text x="476" y="352" font-size="9.5" fill="#c4341c">· 连接失败、确认已死 → cleanupAfterDeadShim :172 清 bundle</text>

  <text x="30" y="392" font-size="10.5" fill="#a1a1a6">代价：需持久化连接态 + 重连逻辑，每容器一进程有内存开销——用可升级性换复杂度；升级须保留 state 目录否则成孤儿 shim</text>
</svg>
