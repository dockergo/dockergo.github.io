<svg xmlns="http://www.w3.org/2000/svg" width="940" height="430" viewBox="0 0 940 430" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8fa0c0"/></marker>
    <marker id="arg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5aa06e"/></marker>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c0392b"/></marker>
    <marker id="arm" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="940" height="430" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">逐层解包 · 每个压缩层 → 一个只读快照（parent = 前一层，链式）</text>

  <!-- legend -->
  <rect x="562" y="17" width="12" height="12" rx="3" fill="#f6f8fc" stroke="#cfe0f2"/><text x="579" y="27" font-size="10" fill="#6e6e73">控制</text>
  <rect x="620" y="17" width="12" height="12" rx="3" fill="#faf4fb" stroke="#e4cdea"/><text x="637" y="27" font-size="10" fill="#6e6e73">解包</text>
  <rect x="678" y="17" width="12" height="12" rx="3" fill="#fbf2ea" stroke="#e6cdae"/><text x="695" y="27" font-size="10" fill="#6e6e73">存储/快照</text>
  <rect x="760" y="17" width="12" height="12" rx="3" fill="#fdf3f2" stroke="#f0cfc9"/><text x="777" y="27" font-size="10" fill="#6e6e73">校验失败</text>

  <!-- B1 content store -->
  <rect x="26" y="70" width="128" height="92" rx="11" fill="#fbf2ea" stroke="#e6cdae" filter="url(#soft)"/>
  <text x="90" y="94" font-size="11.5" font-weight="600" fill="#b0651f" text-anchor="middle">content store</text>
  <text x="90" y="116" font-size="9.5" fill="#b08535" text-anchor="middle">压缩层 tar</text>
  <text x="90" y="134" font-size="9.5" fill="#b08535" text-anchor="middle">内容寻址 blob</text>
  <text x="90" y="152" font-size="9.5" fill="#b08535" text-anchor="middle">已有摘要不重拉</text>

  <!-- B2 Prepare -->
  <rect x="188" y="70" width="168" height="92" rx="11" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="272" y="94" font-size="11.5" font-weight="600" fill="#5b7db1" text-anchor="middle">① Prepare</text>
  <text x="272" y="116" font-size="9.5" fill="#5b7db1" text-anchor="middle">parent = 前层 chainID</text>
  <text x="272" y="134" font-size="9.5" fill="#5b7db1" text-anchor="middle">建 Active 快照</text>
  <text x="272" y="152" font-size="9.5" fill="#5b7db1" text-anchor="middle">返回 Mounts 挂载点</text>

  <!-- B3 Apply -->
  <rect x="390" y="70" width="168" height="92" rx="11" fill="#faf4fb" stroke="#e4cdea" filter="url(#soft)"/>
  <text x="474" y="94" font-size="11.5" font-weight="600" fill="#8944ab" text-anchor="middle">② Apply · diff 插件</text>
  <text x="474" y="116" font-size="9.5" fill="#8944ab" text-anchor="middle">解压 tar 到 Mounts</text>
  <text x="474" y="134" font-size="9.5" fill="#8944ab" text-anchor="middle">校验 diffID == 期望</text>
  <text x="474" y="152" font-size="9.5" fill="#8944ab" text-anchor="middle">gzip/zstd 各自 differ</text>

  <!-- B4 Commit -->
  <rect x="592" y="70" width="150" height="92" rx="11" fill="#f5faf6" stroke="#cfe6d2" filter="url(#soft)"/>
  <text x="667" y="94" font-size="11.5" font-weight="600" fill="#1d8f3f" text-anchor="middle">③ Commit</text>
  <text x="667" y="116" font-size="9.5" fill="#4a8a5c" text-anchor="middle">固化 Committed</text>
  <text x="667" y="134" font-size="9.5" fill="#4a8a5c" text-anchor="middle">以 chainID 命名</text>
  <text x="667" y="152" font-size="9.5" fill="#4a8a5c" text-anchor="middle">只读、可共享</text>

  <!-- B5 chain -->
  <rect x="778" y="70" width="134" height="92" rx="11" fill="#fbf2ea" stroke="#e6cdae" filter="url(#soft)"/>
  <text x="845" y="94" font-size="11.5" font-weight="600" fill="#b0651f" text-anchor="middle">Committed 链</text>
  <text x="845" y="116" font-size="9.5" fill="#b08535" text-anchor="middle">A → B → C …</text>
  <text x="845" y="134" font-size="9.5" fill="#b08535" text-anchor="middle">即镜像 rootfs</text>
  <text x="845" y="152" font-size="9.5" fill="#b08535" text-anchor="middle">顶层供容器</text>

  <!-- pipeline arrows -->
  <path d="M154 116 L186 116" fill="none" stroke="#8fa0c0" stroke-width="1.6" marker-end="url(#ar)"/>
  <path d="M356 116 L388 116" fill="none" stroke="#8fa0c0" stroke-width="1.6" marker-end="url(#ar)"/>
  <path d="M558 116 L590 116" fill="none" stroke="#5aa06e" stroke-width="1.7" marker-end="url(#arg)"/>
  <path d="M742 116 L776 116" fill="none" stroke="#5aa06e" stroke-width="1.7" marker-end="url(#arg)"/>

  <!-- skip branch -->
  <rect x="188" y="200" width="168" height="58" rx="10" fill="#fff" stroke="#cfe0f2"/>
  <text x="272" y="222" font-size="10" font-weight="600" fill="#5b7db1" text-anchor="middle">chainID 已存在？</text>
  <text x="272" y="242" font-size="9.5" fill="#5b7db1" text-anchor="middle">Stat 命中 → return 跳过该层</text>
  <path d="M272 162 L272 200" fill="none" stroke="#8fa0c0" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ar)"/>

  <!-- fail branch -->
  <rect x="390" y="200" width="168" height="58" rx="10" fill="#fdf3f2" stroke="#f0cfc9"/>
  <text x="474" y="222" font-size="10" font-weight="600" fill="#c0392b" text-anchor="middle">diffID ≠ 期望</text>
  <text x="474" y="242" font-size="9.5" fill="#c0392b" text-anchor="middle">abort → 删快照，不入链</text>
  <path d="M474 162 L474 200" fill="none" stroke="#c0392b" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- loop back -->
  <path d="M667 162 L667 300 L272 300 L272 260" fill="none" stroke="#b8b8bf" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#arm)"/>
  <text x="470" y="294" font-size="10" fill="#6e6e73" text-anchor="middle">循环下一层 · parent = 本层 chainID（层层叠加成链）</text>

  <!-- caption -->
  <rect x="26" y="330" width="886" height="74" rx="10" fill="#f8f8fb" stroke="#eceaf0"/>
  <text x="42" y="354" font-size="11" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">核心：</tspan>压缩层与快照层一一对应——每层严格 Prepare→Apply→Commit，parent 指向前一层 chainID，逐层叠成一条只读快照链。</text>
  <text x="42" y="376" font-size="10.5" fill="#6e6e73">chainID 已存在则整层跳过（跨镜像天然复用）；Apply 顺带校验解压后 diffID，不符即 abort，保证快照链每层内容都名副其实。</text>
  <text x="42" y="396" font-size="10.5" fill="#6e6e73">容器启动时在链顶再 Prepare 一个可写 Active 层即得 rootfs——镜像层只读、跨容器共享。</text>
</svg>
