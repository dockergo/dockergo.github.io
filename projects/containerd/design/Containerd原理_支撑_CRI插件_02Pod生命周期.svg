<svg xmlns="http://www.w3.org/2000/svg" width="920" height="400" viewBox="0 0 920 400" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="arx" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8a5cae"/></marker>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="920" height="400" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Pod 生命周期时序 · RunPodSandbox 建地基 → CreateContainer → StartContainer</text>

  <!-- 泳道标签 -->
  <text x="30" y="62" font-size="11" font-weight="600" fill="#1b2a4a">kubelet</text>
  <text x="30" y="152" font-size="11" font-weight="600" fill="#3c1361">CRI plugin</text>
  <text x="30" y="292" font-size="11" font-weight="600" fill="#1d8f3f">containerd 子系统</text>
  <line x1="120" y1="45" x2="120" y2="380" stroke="#e6e6ea" stroke-width="1"/>

  <!-- 步骤1 RunPodSandbox -->
  <rect x="140" y="52" width="200" height="40" rx="9" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="240" y="76" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">① RunPodSandbox</text>
  <rect x="140" y="128" width="200" height="52" rx="9" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="240" y="150" font-size="10" font-weight="600" fill="#6f3ea8" text-anchor="middle">建 Pod 沙箱（地基）</text>
  <text x="240" y="167" font-size="8.5" fill="#9a76c0" text-anchor="middle">sandbox_run.go:54</text>
  <rect x="140" y="252" width="200" height="70" rx="9" fill="#f5faf6" stroke="#cfe6d2" filter="url(#soft)"/>
  <text x="240" y="274" font-size="9.5" fill="#1d8f3f" text-anchor="middle">pause 容器 + 网络命名空间</text>
  <text x="240" y="292" font-size="9.5" fill="#4a8a5c" text-anchor="middle">sandbox controller</text>
  <text x="240" y="308" font-size="9.5" fill="#4a8a5c" text-anchor="middle">+ task/shim 起 sandbox 进程</text>

  <!-- 步骤2 CreateContainer -->
  <rect x="370" y="52" width="200" height="40" rx="9" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="470" y="76" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">② CreateContainer</text>
  <rect x="370" y="128" width="200" height="52" rx="9" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="470" y="150" font-size="10" font-weight="600" fill="#6f3ea8" text-anchor="middle">建容器对象 + rootfs</text>
  <text x="470" y="167" font-size="8.5" fill="#9a76c0" text-anchor="middle">container_create.go:60</text>
  <rect x="370" y="252" width="200" height="70" rx="9" fill="#f5faf6" stroke="#cfe6d2" filter="url(#soft)"/>
  <text x="470" y="274" font-size="9.5" fill="#1d8f3f" text-anchor="middle">拉镜像（若无）→ 内容存储</text>
  <text x="470" y="292" font-size="9.5" fill="#4a8a5c" text-anchor="middle">Prepare 快照作 rootfs</text>
  <text x="470" y="308" font-size="9.5" fill="#4a8a5c" text-anchor="middle">写 container 元数据</text>

  <!-- 步骤3 StartContainer -->
  <rect x="600" y="52" width="200" height="40" rx="9" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="700" y="76" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">③ StartContainer</text>
  <rect x="600" y="128" width="200" height="52" rx="9" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="700" y="150" font-size="10" font-weight="600" fill="#6f3ea8" text-anchor="middle">起容器 task</text>
  <text x="700" y="167" font-size="8.5" fill="#9a76c0" text-anchor="middle">container_start.go:50</text>
  <rect x="600" y="252" width="200" height="70" rx="9" fill="#f5faf6" stroke="#cfe6d2" filter="url(#soft)"/>
  <text x="700" y="274" font-size="9.5" fill="#1d8f3f" text-anchor="middle">tasks 服务 → runtime v2</text>
  <text x="700" y="292" font-size="9.5" fill="#4a8a5c" text-anchor="middle">PlatformRuntime.Create 起 shim</text>
  <text x="700" y="308" font-size="9.5" fill="#4a8a5c" text-anchor="middle">runtime.go:75</text>

  <!-- 竖直下派箭头 -->
  <path d="M240 92 L240 128" fill="none" stroke="#8a5cae" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arx)"/>
  <path d="M240 180 L240 252" fill="none" stroke="#b8b8bf" stroke-width="1.4" marker-end="url(#ar)"/>
  <path d="M470 92 L470 128" fill="none" stroke="#8a5cae" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arx)"/>
  <path d="M470 180 L470 252" fill="none" stroke="#b8b8bf" stroke-width="1.4" marker-end="url(#ar)"/>
  <path d="M700 92 L700 128" fill="none" stroke="#8a5cae" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arx)"/>
  <path d="M700 180 L700 252" fill="none" stroke="#b8b8bf" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- 水平时序箭头 -->
  <path d="M340 72 L370 72" fill="none" stroke="#bcd0ec" stroke-width="1.6" marker-end="url(#ar)"/>
  <path d="M570 72 L600 72" fill="none" stroke="#bcd0ec" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- 退出感知 -->
  <rect x="820" y="252" width="70" height="70" rx="9" fill="#faf4fb" stroke="#e4cdea"/>
  <text x="855" y="280" font-size="9" fill="#8944ab" text-anchor="middle">退出</text>
  <text x="855" y="296" font-size="9" fill="#8944ab" text-anchor="middle">events</text>
  <text x="855" y="312" font-size="9" fill="#8944ab" text-anchor="middle">订阅</text>
  <path d="M800 287 L820 287" fill="none" stroke="#8a5cae" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#arx)"/>

  <text x="30" y="352" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">核心：</tspan>CRI plugin 只编排、不含进程管理——全部复用 containerd 既有子系统；同 Pod 内容器共享 sandbox（pause）的网络命名空间</text>
  <text x="30" y="378" font-size="11" fill="#a1a1a6">CRI 对象固定落 k8s.io 命名空间；runtime handler 可按 RuntimeClass 映射 runc / kata / gVisor</text>
</svg>
