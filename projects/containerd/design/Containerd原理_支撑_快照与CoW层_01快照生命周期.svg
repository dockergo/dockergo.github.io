<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
    <marker id="arg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c99a3a"/></marker>
  </defs>
  <rect width="920" height="420" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">快照生命周期 · Prepare/View（Active）→ 挂载 → Commit（Committed 作父层）</text>

  <!-- 状态机 -->
  <rect x="40" y="70" width="180" height="70" rx="11" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#soft)"/>
  <text x="130" y="98" font-size="12" font-weight="600" fill="#8a6d3b" text-anchor="middle">KindActive（可写）</text>
  <text x="130" y="120" font-size="10" fill="#b08535" text-anchor="middle">Prepare 建立 · 进行中</text>
  <text x="130" y="135" font-size="8.5" fill="#a1a1a6" text-anchor="middle">snapshotter.go:60</text>

  <rect x="380" y="70" width="180" height="70" rx="11" fill="#fbf2ea" stroke="#e6cdae" filter="url(#soft)"/>
  <text x="470" y="98" font-size="12" font-weight="600" fill="#b0651f" text-anchor="middle">KindCommitted（只读）</text>
  <text x="470" y="120" font-size="10" fill="#b08535" text-anchor="middle">固化 · 可作 parent</text>
  <text x="470" y="135" font-size="8.5" fill="#a1a1a6" text-anchor="middle">snapshotter.go:61</text>

  <rect x="700" y="70" width="180" height="70" rx="11" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="790" y="98" font-size="12" font-weight="600" fill="#5b7db1" text-anchor="middle">KindView（只读视图）</text>
  <text x="790" y="120" font-size="10" fill="#5b7db1" text-anchor="middle">只看不改</text>
  <text x="790" y="135" font-size="8.5" fill="#a1a1a6" text-anchor="middle">snapshotter.go:59</text>

  <path d="M220 105 L380 105" fill="none" stroke="#c99a3a" stroke-width="1.8" marker-end="url(#arg)"/>
  <text x="300" y="96" font-size="9.5" fill="#c99a3a" text-anchor="middle">Commit 固化</text>
  <path d="M560 90 Q630 60 700 90" fill="none" stroke="#b8b8bf" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="630" y="58" font-size="9" fill="#8a8a8f" text-anchor="middle">View(parent)</text>
  <path d="M470 140 Q300 175 220 138" fill="none" stroke="#b8b8bf" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="330" y="172" font-size="9" fill="#8a8a8f" text-anchor="middle">Prepare(parent=Committed) 建新 Active</text>

  <!-- CoW 层栈 -->
  <text x="30" y="215" font-size="12" font-weight="600" fill="#1d1d1f">CoW 层栈 · 镜像 = Committed 快照链，容器 rootfs = 顶层上 Prepare 的 Active 层</text>
  <rect x="60" y="330" width="360" height="30" rx="5" fill="#fbf2ea" stroke="#e6cdae"/>
  <text x="240" y="350" font-size="10" fill="#b0651f" text-anchor="middle">镜像层 1（Committed，只读）</text>
  <rect x="80" y="300" width="320" height="30" rx="5" fill="#fbf2ea" stroke="#e6cdae"/>
  <text x="240" y="320" font-size="10" fill="#b0651f" text-anchor="middle">镜像层 2（Committed，只读）· parent=层1</text>
  <rect x="100" y="270" width="280" height="30" rx="5" fill="#fbf2ea" stroke="#e6cdae"/>
  <text x="240" y="290" font-size="10" fill="#b0651f" text-anchor="middle">镜像层 N（Committed，只读）</text>
  <rect x="120" y="240" width="240" height="30" rx="5" fill="#fbf7ef" stroke="#d8b888"/>
  <text x="240" y="260" font-size="10" font-weight="600" fill="#8a6d3b" text-anchor="middle">容器可写层（Active）— 写只落这里</text>

  <!-- 共享说明 -->
  <rect x="470" y="240" width="410" height="120" rx="11" fill="#f5faf6" stroke="#cfe6d2"/>
  <text x="486" y="262" font-size="11" font-weight="600" fill="#1d8f3f">写时复制（CoW）三收益</text>
  <text x="486" y="284" font-size="10" fill="#4a8a5c">· 启动快：只叠一个空可写层，不复制底层</text>
  <text x="486" y="304" font-size="10" fill="#4a8a5c">· 省磁盘：多容器共享同一镜像只读层</text>
  <text x="486" y="324" font-size="10" fill="#4a8a5c">· 读穿透到底层、写落 Active 层</text>
  <text x="486" y="346" font-size="9.5" fill="#6e6e73">Prepare 返回 Mounts → 运行时挂载得 rootfs</text>

  <text x="30" y="386" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">可插拔：</tspan>overlayfs（默认，内核联合挂载）/ native（纯拷贝无 CoW）/ btrfs / devmapper / 远程 snapshotter（懒加载）实现同一接口</text>
  <text x="30" y="408" font-size="11" fill="#a1a1a6">SnapshotPlugin=io.containerd.snapshotter.v1 · metadata/db.go:249 Snapshotter(name) 包装命名空间与 parent 链记账 · Usage 记录磁盘消耗</text>
</svg>
