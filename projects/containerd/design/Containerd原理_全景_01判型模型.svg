<svg xmlns="http://www.w3.org/2000/svg" width="920" height="440" viewBox="0 0 920 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="920" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">判型模型 · 接触面（2 类）× 插件子系统（一切皆插件）</text>
  <text x="30" y="50" font-size="10.5" fill="#6e6e73">元模式：所有请求收敛到 gRPC，所有能力都是一个 plugin.Type —— 定义性特质</text>

  <!-- 接触面列 -->
  <rect x="30" y="72" width="250" height="150" rx="12" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="46" y="94" font-size="12" font-weight="600" fill="#3c1361">接触面（外部入口）</text>
  <rect x="46" y="106" width="218" height="46" rx="8" fill="#fff" stroke="#d9c9ef"/>
  <text x="60" y="126" font-size="10.5" font-weight="600" fill="#6f3ea8">gRPC / TTRPC + ctr / client</text>
  <text x="60" y="143" font-size="9" fill="#9a76c0">通用入口 · Docker 也走此</text>
  <rect x="46" y="158" width="218" height="46" rx="8" fill="#fff" stroke="#d9c9ef"/>
  <text x="60" y="178" font-size="10.5" font-weight="600" fill="#6f3ea8">CRI plugin</text>
  <text x="60" y="195" font-size="9" fill="#9a76c0">k8s 入口 · 内部再转 gRPC</text>

  <!-- 插件子系统列 -->
  <rect x="310" y="72" width="580" height="240" rx="12" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="326" y="94" font-size="12" font-weight="600" fill="#5b7db1">插件子系统 · 每个都是一个 plugin.Type（plugins/types.go）</text>
  <g font-size="9.5">
    <rect x="326" y="106" width="176" height="44" rx="7" fill="#fff" stroke="#ecdcbf"/>
    <text x="336" y="124" font-weight="600" fill="#8a6d3b">content 内容寻址存储</text>
    <text x="336" y="140" fill="#b08535">io.containerd.content.v1</text>
    <rect x="510" y="106" width="176" height="44" rx="7" fill="#fff" stroke="#ecdcbf"/>
    <text x="520" y="124" font-weight="600" fill="#8a6d3b">snapshotter 快照 CoW</text>
    <text x="520" y="140" fill="#b08535">io.containerd.snapshotter.v1</text>
    <rect x="694" y="106" width="180" height="44" rx="7" fill="#fff" stroke="#ecdcbf"/>
    <text x="704" y="124" font-weight="600" fill="#8a6d3b">metadata bbolt</text>
    <text x="704" y="140" fill="#b08535">io.containerd.metadata.v1</text>

    <rect x="326" y="156" width="176" height="44" rx="7" fill="#fff" stroke="#cfe6d2"/>
    <text x="336" y="174" font-weight="600" fill="#1d8f3f">runtime v2 shim</text>
    <text x="336" y="190" fill="#4a8a5c">io.containerd.runtime.v2</text>
    <rect x="510" y="156" width="176" height="44" rx="7" fill="#fff" stroke="#cfe6d2"/>
    <text x="520" y="174" font-weight="600" fill="#1d8f3f">diff 差分器</text>
    <text x="520" y="190" fill="#4a8a5c">io.containerd.differ.v1</text>
    <rect x="694" y="156" width="180" height="44" rx="7" fill="#fff" stroke="#cfe6d2"/>
    <text x="704" y="174" font-weight="600" fill="#1d8f3f">leases 租约（GC 根）</text>
    <text x="704" y="190" fill="#4a8a5c">io.containerd.lease.v1</text>

    <rect x="326" y="206" width="176" height="44" rx="7" fill="#fff" stroke="#d9c9ef"/>
    <text x="336" y="224" font-weight="600" fill="#6f3ea8">CRI service</text>
    <text x="336" y="240" fill="#9a76c0">io.containerd.cri.v1</text>
    <rect x="510" y="206" width="176" height="44" rx="7" fill="#fff" stroke="#d9c9ef"/>
    <text x="520" y="224" font-weight="600" fill="#6f3ea8">gRPC / service</text>
    <text x="520" y="240" fill="#9a76c0">io.containerd.grpc.v1</text>
    <rect x="694" y="206" width="180" height="44" rx="7" fill="#fff" stroke="#d9c9ef"/>
    <text x="704" y="224" font-weight="600" fill="#6f3ea8">events / sandbox…</text>
    <text x="704" y="240" fill="#9a76c0">还有十余种类型</text>
  </g>
  <text x="326" y="272" font-size="9.5" fill="#5b7db1">禁用某 plugin 即裁剪对应能力（server.go:386 filter(config.DisabledPlugins)）；第三方实现注册同一 plugin.Type 即融入</text>
  <text x="326" y="292" font-size="9.5" fill="#5b7db1">互换性：overlayfs / native / btrfs snapshotter 共享 core/snapshots/snapshotter.go 的同一接口</text>

  <text x="30" y="340" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">正交性检验：</tspan>blobs/&lt;algo&gt;/&lt;digest&gt;→内容存储 · Prepare/Commit→快照 · shim/bootstrap.json→运行时 · Requires/Graph→插件架构 · RunPodSandbox→CRI</text>
  <text x="30" y="368" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">判型一句话：</tspan>工业级容器运行时 = 守护进程 + 插件化子系统（内容寻址存储 / 快照 CoW / runtime shim）+ gRPC API，被 k8s 经 CRI 驱动</text>
  <text x="30" y="396" font-size="11" fill="#a1a1a6">全表锚点：plugins/types.go（ContentPlugin / SnapshotPlugin / RuntimePluginV2 / GRPCPlugin / CRIServicePlugin / MetadataPlugin / DiffPlugin / LeasePlugin …）</text>
  <text x="30" y="420" font-size="11" fill="#a1a1a6">对照 k8s：containerd 管"单机把镜像变成运行的容器"，k8s 管"集群把期望态编排到多节点"，两者经 CRI 衔接</text>
</svg>
