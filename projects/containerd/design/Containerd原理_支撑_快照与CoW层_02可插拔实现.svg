<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="920" height="360" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">snapshotter 接口与可插拔实现 · 同一接口，多种 CoW 后端可互换</text>

  <!-- 接口 -->
  <rect x="280" y="52" width="360" height="86" rx="12" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="460" y="76" font-size="12" font-weight="600" fill="#5b7db1" text-anchor="middle">snapshotter 接口（八方法闭环事务）</text>
  <text x="460" y="98" font-size="10" fill="#1b2a4a" text-anchor="middle">Prepare / View → Mounts → Commit / Remove · Stat/Usage/Walk</text>
  <text x="460" y="116" font-size="9.5" fill="#5b7db1" text-anchor="middle">中间态永远是 Active，只有 Committed 能作 parent</text>
  <text x="460" y="132" font-size="8.5" fill="#a1a1a6" text-anchor="middle">core/snapshots/snapshotter.go:265</text>

  <!-- 五种实现 -->
  <rect x="30" y="200" width="158" height="118" rx="10" fill="#f5faf6" stroke="#cfe6d2" filter="url(#soft)"/>
  <text x="109" y="222" font-size="11" font-weight="600" fill="#1d8f3f" text-anchor="middle">overlayfs</text>
  <text x="109" y="240" font-size="9" fill="#4a8a5c" text-anchor="middle">Linux 默认</text>
  <text x="109" y="256" font-size="9" fill="#4a8a5c" text-anchor="middle">内核 overlay 联合挂载</text>
  <text x="109" y="274" font-size="9" fill="#4a8a5c" text-anchor="middle">通用高效</text>
  <text x="109" y="300" font-size="8.5" fill="#a1a1a6" text-anchor="middle">✓ 首选</text>

  <rect x="205" y="200" width="158" height="118" rx="10" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#soft)"/>
  <text x="284" y="222" font-size="11" font-weight="600" fill="#8a6d3b" text-anchor="middle">native</text>
  <text x="284" y="240" font-size="9" fill="#b08535" text-anchor="middle">纯拷贝、无 CoW</text>
  <text x="284" y="256" font-size="9" fill="#b08535" text-anchor="middle">无内核依赖</text>
  <text x="284" y="274" font-size="9" fill="#b08535" text-anchor="middle">慢、占空间大</text>
  <text x="284" y="300" font-size="8.5" fill="#a1a1a6" text-anchor="middle">兜底</text>

  <rect x="381" y="200" width="158" height="118" rx="10" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="460" y="222" font-size="11" font-weight="600" fill="#5b7db1" text-anchor="middle">btrfs / zfs</text>
  <text x="460" y="240" font-size="9" fill="#1b2a4a" text-anchor="middle">文件系统级快照</text>
  <text x="460" y="256" font-size="9" fill="#1b2a4a" text-anchor="middle">CoW 由 fs 提供</text>
  <text x="460" y="282" font-size="8.5" fill="#a1a1a6" text-anchor="middle">依赖底层 fs</text>

  <rect x="557" y="200" width="158" height="118" rx="10" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="636" y="222" font-size="11" font-weight="600" fill="#5b7db1" text-anchor="middle">devmapper</text>
  <text x="636" y="240" font-size="9" fill="#1b2a4a" text-anchor="middle">块设备快照</text>
  <text x="636" y="256" font-size="9" fill="#1b2a4a" text-anchor="middle">thin-pool</text>
  <text x="636" y="282" font-size="8.5" fill="#a1a1a6" text-anchor="middle">块级隔离</text>

  <rect x="733" y="200" width="158" height="118" rx="10" fill="#faf4fb" stroke="#e4cdea" filter="url(#soft)"/>
  <text x="812" y="222" font-size="11" font-weight="600" fill="#8944ab" text-anchor="middle">远程 snapshotter</text>
  <text x="812" y="240" font-size="9" fill="#8944ab" text-anchor="middle">stargz 等</text>
  <text x="812" y="256" font-size="9" fill="#8944ab" text-anchor="middle">镜像懒加载</text>
  <text x="812" y="274" font-size="9" fill="#8944ab" text-anchor="middle">不拉全层即启动</text>
  <text x="812" y="300" font-size="8.5" fill="#a1a1a6" text-anchor="middle">缩短启动</text>

  <path d="M400 138 L150 200" fill="none" stroke="#b8b8bf" stroke-width="1.3" marker-end="url(#ar)"/>
  <path d="M440 138 L300 200" fill="none" stroke="#b8b8bf" stroke-width="1.3" marker-end="url(#ar)"/>
  <path d="M460 140 L460 200" fill="none" stroke="#b8b8bf" stroke-width="1.3" marker-end="url(#ar)"/>
  <path d="M480 138 L620 200" fill="none" stroke="#b8b8bf" stroke-width="1.3" marker-end="url(#ar)"/>
  <path d="M520 138 L790 200" fill="none" stroke="#b8b8bf" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="600" y="172" font-size="9" fill="#8a8a8f" text-anchor="middle">实现同一接口，可按内核/文件系统能力替换</text>

  <text x="30" y="344" font-size="11" fill="#a1a1a6">SnapshotPlugin=io.containerd.snapshotter.v1 · metadata/db.go:249 Snapshotter(name) 为每个实现包命名空间与 parent 链记账 · 选型直接决定启动延迟与磁盘占用</text>
</svg>
