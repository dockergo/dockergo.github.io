<svg xmlns="http://www.w3.org/2000/svg" width="920" height="400" viewBox="0 0 920 400" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
    <marker id="arb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
  </defs>
  <rect width="920" height="400" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">gRPC 请求派发 · 服务层只适配+派发，实际能力在被注入的子系统插件</text>

  <!-- 客户端 -->
  <rect x="30" y="64" width="150" height="120" rx="11" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="105" y="88" font-size="12" font-weight="600" fill="#3c1361" text-anchor="middle">客户端</text>
  <text x="105" y="110" font-size="10" fill="#6f3ea8" text-anchor="middle">ctr / client SDK</text>
  <text x="105" y="128" font-size="10" fill="#6f3ea8" text-anchor="middle">Docker</text>
  <text x="105" y="150" font-size="10" fill="#9a76c0" text-anchor="middle">CRI（转 gRPC）</text>
  <text x="105" y="170" font-size="9" fill="#9a76c0" text-anchor="middle">每请求带 namespace</text>

  <!-- gRPC 服务层 -->
  <rect x="240" y="52" width="230" height="220" rx="12" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="355" y="76" font-size="12" font-weight="600" fill="#5b7db1" text-anchor="middle">gRPC / TTRPC 服务层</text>
  <g font-size="10">
    <rect x="256" y="88" width="198" height="30" rx="7" fill="#fff" stroke="#cfe0f2"/>
    <text x="266" y="108" fill="#1b2a4a">containers / images / content</text>
    <rect x="256" y="122" width="198" height="30" rx="7" fill="#fff" stroke="#cfe0f2"/>
    <text x="266" y="142" fill="#1b2a4a">snapshots / leases / events</text>
    <rect x="256" y="156" width="198" height="56" rx="7" fill="#e9f0fb" stroke="#bcd0ec"/>
    <text x="266" y="176" font-weight="600" fill="#1b2a4a">tasks 服务（本例）</text>
    <text x="266" y="192" fill="#5b7db1">Create local.go:171</text>
    <text x="266" y="206" fill="#5b7db1">Start :295 · Exec :518</text>
  </g>
  <text x="355" y="234" font-size="9" fill="#5b7db1" text-anchor="middle">每个服务本身是一个 plugin</text>
  <text x="355" y="250" font-size="9" fill="#5b7db1" text-anchor="middle">GRPCPlugin / ServicePlugin</text>
  <text x="355" y="264" font-size="9" fill="#a1a1a6" text-anchor="middle">plugins/services/*</text>

  <!-- 子系统插件 -->
  <rect x="530" y="52" width="360" height="220" rx="12" fill="#f5faf6" stroke="#cfe6d2" filter="url(#soft)"/>
  <text x="710" y="76" font-size="12" font-weight="600" fill="#1d8f3f" text-anchor="middle">被注入的子系统插件（真正干活）</text>
  <rect x="548" y="90" width="324" height="52" rx="8" fill="#fff" stroke="#cfe6d2"/>
  <text x="562" y="110" font-size="10.5" font-weight="600" fill="#1d1d1f">runtime v2（l.v2Runtime，local.go:268）</text>
  <text x="562" y="128" font-size="9.5" fill="#6e6e73">task 服务派发到此 → 起 shim → runc</text>
  <rect x="548" y="150" width="324" height="46" rx="8" fill="#fff" stroke="#ecdcbf"/>
  <text x="562" y="170" font-size="10.5" font-weight="600" fill="#8a6d3b">content / snapshots / metadata</text>
  <text x="562" y="186" font-size="9.5" fill="#b08535">Init 时经 ic.Get(plugin.Type) 注入</text>
  <rect x="548" y="204" width="324" height="46" rx="8" fill="#fff" stroke="#d9c9ef"/>
  <text x="562" y="224" font-size="10.5" font-weight="600" fill="#6f3ea8">events exchange</text>
  <text x="562" y="240" font-size="9.5" fill="#9a76c0">状态变化扇出给订阅者</text>

  <path d="M180 124 L240 130" fill="none" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="188" y="118" font-size="9" fill="#8a8a8f">gRPC 请求</text>
  <path d="M470 184 L548 116" fill="none" stroke="#5b7db1" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#arb)"/>
  <text x="478" y="150" font-size="9" fill="#5b7db1">派发 + 依赖注入</text>

  <text x="30" y="308" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">核心：</tspan>gRPC 服务层只做协议适配 + 派发；task 服务收到 Create/Start 请求后下派给 runtime v2 插件，由它去起 shim</text>
  <text x="30" y="334" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">隔离：</tspan>每请求带 namespace，moby（Docker）与 k8s.io（CRI）互不可见，一台 containerd 无串味服务多个上层</text>
  <text x="30" y="360" font-size="11" fill="#a1a1a6">TTRPC 用于 containerd ↔ shim（轻量，shim 不依赖完整 gRPC 栈）</text>
  <text x="30" y="384" font-size="11" fill="#a1a1a6">client/pull.go:43 Pull 是门面示例：把 content 拉取 + unpack 解包编排成一次调用</text>
</svg>
