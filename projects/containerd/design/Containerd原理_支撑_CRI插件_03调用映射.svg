<svg xmlns="http://www.w3.org/2000/svg" width="940" height="430" viewBox="0 0 940 430" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="arb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8fa0c0"/></marker>
    <marker id="arp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#a066c0"/></marker>
  </defs>
  <rect width="940" height="430" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">CRI 调用映射 · 薄编排层复用厚子系统（CRI 自身不含进程管理代码）</text>

  <!-- legend -->
  <rect x="560" y="17" width="12" height="12" rx="3" fill="#f6f8fc" stroke="#cfe0f2"/><text x="577" y="27" font-size="10" fill="#6e6e73">kubelet/CRI 调用</text>
  <rect x="678" y="17" width="12" height="12" rx="3" fill="#faf4fb" stroke="#e4cdea"/><text x="695" y="27" font-size="10" fill="#6e6e73">CRI 编排</text>
  <rect x="758" y="17" width="12" height="12" rx="3" fill="#fbf2ea" stroke="#e6cdae"/><text x="775" y="27" font-size="10" fill="#6e6e73">复用的子系统</text>

  <!-- kubelet calls -->
  <text x="46" y="62" font-size="11" font-weight="600" fill="#1d1d1f">kubelet（经 CRI gRPC）</text>
  <rect x="30" y="72" width="180" height="40" rx="9" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="120" y="97" font-size="10.5" fill="#5b7db1" text-anchor="middle">PullImage</text>
  <rect x="30" y="120" width="180" height="40" rx="9" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="120" y="145" font-size="10.5" fill="#5b7db1" text-anchor="middle">RunPodSandbox</text>
  <rect x="30" y="168" width="180" height="40" rx="9" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="120" y="193" font-size="10.5" fill="#5b7db1" text-anchor="middle">CreateContainer</text>
  <rect x="30" y="216" width="180" height="40" rx="9" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="120" y="241" font-size="10.5" fill="#5b7db1" text-anchor="middle">StartContainer</text>

  <!-- CRI plugin -->
  <rect x="272" y="96" width="176" height="136" rx="12" fill="#faf4fb" stroke="#e4cdea" filter="url(#soft)"/>
  <text x="360" y="120" font-size="11.5" font-weight="600" fill="#8944ab" text-anchor="middle">CRI plugin</text>
  <text x="288" y="144" font-size="9.5" fill="#8944ab">一个 GRPC 插件（ID=cri）</text>
  <text x="288" y="164" font-size="9.5" fill="#8944ab">翻译 / 编排 CRI 调用</text>
  <text x="288" y="184" font-size="9.5" fill="#8944ab">Requires 拉齐十余依赖</text>
  <text x="288" y="204" font-size="9.5" fill="#8944ab">ic.GetByID 注入取到</text>
  <text x="288" y="224" font-size="9.5" fill="#8944ab">自身无进程管理代码</text>

  <!-- fan-in -->
  <path d="M210 92 L270 130" fill="none" stroke="#8fa0c0" stroke-width="1.4" marker-end="url(#arb)"/>
  <path d="M210 140 L270 152" fill="none" stroke="#8fa0c0" stroke-width="1.4" marker-end="url(#arb)"/>
  <path d="M210 188 L270 176" fill="none" stroke="#8fa0c0" stroke-width="1.4" marker-end="url(#arb)"/>
  <path d="M210 236 L270 200" fill="none" stroke="#8fa0c0" stroke-width="1.4" marker-end="url(#arb)"/>

  <!-- subsystems -->
  <rect x="510" y="70" width="402" height="46" rx="10" fill="#fbf2ea" stroke="#e6cdae" filter="url(#soft)"/>
  <text x="526" y="90" font-size="10.5" font-weight="600" fill="#b0651f">content store + snapshotter</text>
  <text x="526" y="108" font-size="9.5" fill="#b08535">PullImage / CreateContainer：拉层落 blob、Prepare rootfs 快照</text>

  <rect x="510" y="124" width="402" height="46" rx="10" fill="#f5faf6" stroke="#cfe6d2" filter="url(#soft)"/>
  <text x="526" y="144" font-size="10.5" font-weight="600" fill="#1d8f3f">sandbox controller</text>
  <text x="526" y="162" font-size="9.5" fill="#4a8a5c">RunPodSandbox：建 Pod 沙箱（pause 容器 + 网络命名空间）</text>

  <rect x="510" y="178" width="402" height="46" rx="10" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="526" y="198" font-size="10.5" font-weight="600" fill="#5b7db1">containers 元数据</text>
  <text x="526" y="216" font-size="9.5" fill="#5b7db1">CreateContainer：写容器对象（落 k8s.io 命名空间）</text>

  <rect x="510" y="232" width="402" height="46" rx="10" fill="#faf4fb" stroke="#e4cdea" filter="url(#soft)"/>
  <text x="526" y="252" font-size="10.5" font-weight="600" fill="#8944ab">tasks 服务 + runtime v2 shim</text>
  <text x="526" y="270" font-size="9.5" fill="#8944ab">StartContainer：NewTask → task.Start → shim → runc 起进程</text>

  <!-- fan-out -->
  <path d="M448 140 L508 93" fill="none" stroke="#a066c0" stroke-width="1.5" marker-end="url(#arp)"/>
  <path d="M448 150 L508 147" fill="none" stroke="#a066c0" stroke-width="1.5" marker-end="url(#arp)"/>
  <path d="M448 170 L508 201" fill="none" stroke="#a066c0" stroke-width="1.5" marker-end="url(#arp)"/>
  <path d="M448 190 L508 255" fill="none" stroke="#a066c0" stroke-width="1.5" marker-end="url(#arp)"/>

  <!-- caption -->
  <rect x="30" y="296" width="882" height="106" rx="10" fill="#f8f8fb" stroke="#eceaf0"/>
  <text x="46" y="322" font-size="11" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">核心：</tspan>CRI plugin 只做"翻译 + 编排"，把 kubelet 的每个 CRI 调用拆成对既有子系统的调用，一行进程管理代码都不新增。</text>
  <text x="46" y="346" font-size="10.5" fill="#6e6e73"><tspan font-weight="600" fill="#8944ab">"给 Kubernetes 用" = 加一个编排插件、复用全部核心能力</tspan>——这正是"一切皆插件 + 依赖注入"的集大成范例。</text>
  <text x="46" y="368" font-size="10.5" fill="#6e6e73">容器退出不靠轮询：CRI 订阅 events 的 /tasks/exit 感知，再回报 kubelet（level-triggered）。</text>
  <text x="46" y="388" font-size="9.5" fill="#a1a1a6">各调用精确落点见下方"CRI 调用到子系统映射"表（sandbox_run.go / container_create.go / container_start.go → runtime.go）。</text>
</svg>
