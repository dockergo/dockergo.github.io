<svg xmlns="http://www.w3.org/2000/svg" width="920" height="410" viewBox="0 0 920 410" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="arh" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="arx" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8a5cae"/></marker>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="920" height="410" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">task/exec 派发 + 事件总线扇出 · 操作面与可观测面</text>

  <!-- tasks 服务 -->
  <rect x="30" y="62" width="220" height="150" rx="11" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="140" y="86" font-size="12" font-weight="600" fill="#5b7db1" text-anchor="middle">tasks gRPC 服务</text>
  <g font-size="10">
    <text x="46" y="110" fill="#1b2a4a">Create（起 task/shim）:171</text>
    <text x="46" y="130" fill="#1b2a4a">Start（起容器主进程）:295</text>
    <text x="46" y="150" fill="#1b2a4a">Exec（容器内新进程）:518</text>
    <text x="46" y="170" fill="#1b2a4a">Delete :318 / DeleteProcess :346</text>
  </g>
  <text x="46" y="196" font-size="9" fill="#5b7db1">派发到 v2Runtime（local.go:268）</text>

  <!-- runtime/shim -->
  <rect x="340" y="72" width="200" height="130" rx="11" fill="#f5faf6" stroke="#cfe6d2" filter="url(#soft)"/>
  <text x="440" y="96" font-size="12" font-weight="600" fill="#1d8f3f" text-anchor="middle">runtime v2 / shim</text>
  <text x="356" y="120" font-size="10" fill="#4a8a5c">task = 容器运行实例（PID1）</text>
  <text x="356" y="140" font-size="10" fill="#4a8a5c">exec = 同命名空间新进程</text>
  <text x="356" y="160" font-size="9.5" fill="#6e6e73">共享 rootfs / cgroup</text>
  <text x="356" y="182" font-size="9" fill="#a1a1a6">操作实际落到 shim → runc</text>

  <path d="M250 130 L340 130" fill="none" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#arh)"/>
  <text x="258" y="122" font-size="9" fill="#2f9e6e">下派</text>

  <!-- 事件总线 -->
  <rect x="630" y="62" width="260" height="150" rx="11" fill="#faf4fb" stroke="#e4cdea" filter="url(#soft)"/>
  <text x="760" y="86" font-size="12" font-weight="600" fill="#8944ab" text-anchor="middle">events exchange 事件总线</text>
  <text x="646" y="110" font-size="10" fill="#8944ab">Publish(topic, event) :80</text>
  <text x="646" y="130" font-size="10" fill="#8944ab">Subscribe(filters) :128</text>
  <text x="646" y="150" font-size="10" fill="#8944ab">Forward(envelope) :55</text>
  <text x="646" y="172" font-size="9.5" fill="#9a76c0">事件带 namespace，可按 topic 过滤</text>
  <text x="646" y="192" font-size="9" fill="#a1a1a6">exchange.go · NewExchange :41</text>

  <path d="M540 120 L630 120" fill="none" stroke="#8a5cae" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#arx)"/>
  <text x="548" y="112" font-size="9" fill="#8a5cae">状态变化 Publish</text>

  <!-- 订阅者 -->
  <text x="30" y="248" font-size="12" font-weight="600" fill="#1d1d1f">订阅者（谁关心谁订阅 · 生产者不需知道消费者）</text>
  <rect x="30" y="262" width="270" height="60" rx="10" fill="#fff" stroke="#e4cdea"/>
  <text x="46" y="284" font-size="10.5" font-weight="600" fill="#6f3ea8">CRI plugin</text>
  <text x="46" y="304" font-size="9.5" fill="#9a76c0">订阅 task exit → 更新 Pod 状态回报 kubelet</text>
  <rect x="320" y="262" width="270" height="60" rx="10" fill="#fff" stroke="#e4cdea"/>
  <text x="336" y="284" font-size="10.5" font-weight="600" fill="#6f3ea8">监控 / 审计</text>
  <text x="336" y="304" font-size="9.5" fill="#9a76c0">按 topic 计数容器生命周期事件</text>
  <rect x="610" y="262" width="280" height="60" rx="10" fill="#fff" stroke="#e4cdea"/>
  <text x="626" y="284" font-size="10.5" font-weight="600" fill="#6f3ea8">ctr events</text>
  <text x="626" y="304" font-size="9.5" fill="#9a76c0">调试时实时观察事件流</text>

  <path d="M700 212 Q700 240 165 240 L165 262" fill="none" stroke="#8a5cae" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#arx)"/>
  <path d="M730 212 L455 262" fill="none" stroke="#8a5cae" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#arx)"/>
  <path d="M770 212 L755 262" fill="none" stroke="#8a5cae" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#arx)"/>

  <text x="30" y="352" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">核心：</tspan>tasks 服务只派发、runtime/shim 才操作容器；每步状态变化 Publish 到 exchange 扇出，订阅方按 filter 各取所需</text>
  <text x="30" y="376" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">解耦：</tspan>事件是"变化通知"非真源，丢事件不致命（真源在元数据库/shim）——与 k8s level-triggered 精神相通</text>
  <text x="30" y="398" font-size="11" fill="#a1a1a6">exec 有独立 process id，DeleteProcess（:346）单独清理，不影响容器主 task</text>
</svg>
