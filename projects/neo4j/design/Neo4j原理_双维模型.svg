<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="548" viewBox="0 0 1080 548"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1080" height="548" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Neo4j 双维模型:能力域 × 执行时机</text>
  <text x="30" y="50" font-size="11.5" fill="#a1a1a6">接触面(Cypher)+ 支撑 6 域;每域按执行时机分前台(用户请求路径)与后台(维护路径)</text>

  <!-- 纵轴标签 -->
  <text x="22" y="300" font-size="11" font-weight="600" fill="#6e6e73" transform="rotate(-90 22 300)">能力域(纵)</text>

  <!-- 列表头 -->
  <rect x="214" y="70" width="406" height="26" rx="8" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="417" y="87" font-size="12" font-weight="700" fill="#1b2a4a" text-anchor="middle">前台 · foreground(用户请求路径)</text>
  <rect x="636" y="70" width="406" height="26" rx="8" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="839" y="87" font-size="12" font-weight="700" fill="#5a3410" text-anchor="middle">后台 · background(维护路径)</text>

  <!-- Row 1 接触面 Cypher -->
  <rect x="44" y="104" width="150" height="46" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="119" y="124" font-size="11.5" font-weight="600" fill="#3d2a5a" text-anchor="middle">接触面 · Cypher</text>
  <text x="119" y="139" font-size="9" fill="#8b7aa8" text-anchor="middle">声明式图查询</text>
  <rect x="214" y="104" width="406" height="46" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="230" y="122" font-size="11" font-weight="600" fill="#1b2a4a">Cypher 查询</text>
  <text x="230" y="137" font-size="9.5" fill="#5b7db1">解析 → 语义分析 → 规划 → 运行时执行</text>
  <rect x="636" y="104" width="406" height="46" rx="11" fill="#ffffff" stroke="#ececf1"/>
  <text x="839" y="132" font-size="11" fill="#c7c7cc" text-anchor="middle">—</text>

  <!-- Row 2 查询规划与执行 -->
  <rect x="44" y="162" width="150" height="46" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="119" y="182" font-size="11.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">查询规划与执行</text>
  <text x="119" y="197" font-size="9" fill="#5b7db1" text-anchor="middle">编译器 + 运行时</text>
  <rect x="214" y="162" width="406" height="46" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="230" y="180" font-size="11" font-weight="600" fill="#1b2a4a">成本规划 + 算子执行</text>
  <text x="230" y="195" font-size="9.5" fill="#5b7db1">IDP 选计划;游标读图产行</text>
  <rect x="636" y="162" width="406" height="46" rx="11" fill="#ffffff" stroke="#ececf1"/>
  <text x="839" y="190" font-size="11" fill="#c7c7cc" text-anchor="middle">—</text>

  <!-- Row 3 记录存储 -->
  <rect x="44" y="220" width="150" height="46" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="119" y="240" font-size="11.5" font-weight="600" fill="#5a3410" text-anchor="middle">记录存储(核心)</text>
  <text x="119" y="255" font-size="9" fill="#93762e" text-anchor="middle">定长记录 + 邻接</text>
  <rect x="214" y="220" width="406" height="46" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="230" y="238" font-size="11" font-weight="600" fill="#1b2a4a">指针遍历</text>
  <text x="230" y="253" font-size="9.5" fill="#5b7db1">免索引邻接:顺关系链走到 NULL</text>
  <rect x="636" y="220" width="406" height="46" rx="11" fill="#ffffff" stroke="#ececf1"/>
  <text x="839" y="248" font-size="11" fill="#c7c7cc" text-anchor="middle">—</text>

  <!-- Row 4 事务与恢复 -->
  <rect x="44" y="278" width="150" height="46" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="119" y="298" font-size="11.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">事务与恢复</text>
  <text x="119" y="313" font-size="9" fill="#5b7db1" text-anchor="middle">TxState → WAL</text>
  <rect x="214" y="278" width="406" height="46" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="230" y="296" font-size="11" font-weight="600" fill="#1b2a4a">事务提交</text>
  <text x="230" y="311" font-size="9.5" fill="#5b7db1">TxState → Command → 写 WAL</text>
  <rect x="636" y="278" width="406" height="46" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="652" y="296" font-size="11" font-weight="600" fill="#5a3410">检查点 checkpoint · 恢复重放</text>
  <text x="652" y="311" font-size="9.5" fill="#93762e">崩溃后从最后检查点重放 WAL</text>

  <!-- Row 5 锁与并发 -->
  <rect x="44" y="336" width="150" height="46" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="119" y="356" font-size="11.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">锁与并发</text>
  <text x="119" y="371" font-size="9" fill="#5b7db1" text-anchor="middle">Forseti · 非 MVCC</text>
  <rect x="214" y="336" width="406" height="46" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="230" y="354" font-size="11" font-weight="600" fill="#1b2a4a">Forseti 加锁串行化</text>
  <text x="230" y="369" font-size="9.5" fill="#5b7db1">节点/关系锁;锁基并发(非 MVCC)</text>
  <rect x="636" y="336" width="406" height="46" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="652" y="360" font-size="11" font-weight="600" fill="#5a3410">dreadlocks 死锁检测</text>

  <!-- Row 6 页缓存 -->
  <rect x="44" y="394" width="150" height="46" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="119" y="414" font-size="11.5" font-weight="600" fill="#12402a" text-anchor="middle">页缓存</text>
  <text x="119" y="429" font-size="9" fill="#2f6f4f" text-anchor="middle">MuninnPageCache</text>
  <rect x="214" y="394" width="406" height="46" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="230" y="412" font-size="11" font-weight="600" fill="#1b2a4a">分页读记录</text>
  <text x="230" y="427" font-size="9.5" fill="#5b7db1">store 文件分页进堆外内存</text>
  <rect x="636" y="394" width="406" height="46" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="652" y="418" font-size="11" font-weight="600" fill="#5a3410">eviction 换出</text>

  <!-- Row 7 索引与遍历 -->
  <rect x="44" y="452" width="150" height="46" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="119" y="472" font-size="11.5" font-weight="600" fill="#5a3410" text-anchor="middle">索引与遍历</text>
  <text x="119" y="487" font-size="9" fill="#93762e" text-anchor="middle">找起点用</text>
  <rect x="214" y="452" width="406" height="46" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="230" y="470" font-size="11" font-weight="600" fill="#1b2a4a">index seek 找起点</text>
  <text x="230" y="485" font-size="9.5" fill="#5b7db1">按 label + property 定位起点节点</text>
  <rect x="636" y="452" width="406" height="46" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="652" y="476" font-size="11" font-weight="600" fill="#5a3410">索引后台构建</text>
</svg>
