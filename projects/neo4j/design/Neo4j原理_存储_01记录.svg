<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Neo4j 定长记录:节点 / 关系 / 属性</text>
  <text x="30" y="50" font-size="11.5" fill="#a1a1a6">一切都是定长记录,各存 neostore.*.db;record id = 文件偏移,O(1) 定位,无需 id→位置索引</text>

  <!-- NodeRecord -->
  <rect x="40" y="76" width="320" height="180" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="60" y="102" font-size="13" font-weight="700" fill="#5a3410">NodeRecord</text>
  <rect x="270" y="88" width="72" height="22" rx="7" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="306" y="103" font-size="11" font-weight="600" fill="#5a3410" text-anchor="middle">15 字节</text>
  <text x="60" y="122" font-size="9.5" fill="#93762e">store:neostore.nodestore.db</text>
  <!-- byte fields -->
  <rect x="60" y="134" width="46" height="40" rx="6" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="83" y="151" font-size="9" fill="#5a3410" text-anchor="middle">in_use</text>
  <text x="83" y="166" font-size="8" fill="#93762e" text-anchor="middle">标志</text>
  <rect x="110" y="134" width="66" height="40" rx="6" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="143" y="151" font-size="9" fill="#12402a" text-anchor="middle">next_rel</text>
  <text x="143" y="166" font-size="8" fill="#2f6f4f" text-anchor="middle">第一条关系</text>
  <rect x="180" y="134" width="66" height="40" rx="6" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="213" y="151" font-size="9" fill="#3d2a5a" text-anchor="middle">next_prop</text>
  <text x="213" y="166" font-size="8" fill="#8b7aa8" text-anchor="middle">第一个属性</text>
  <rect x="250" y="134" width="52" height="40" rx="6" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="276" y="151" font-size="9" fill="#5a3410" text-anchor="middle">labels</text>
  <text x="276" y="166" font-size="8" fill="#93762e" text-anchor="middle">5B</text>
  <rect x="306" y="134" width="36" height="40" rx="6" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="324" y="151" font-size="9" fill="#5a3410" text-anchor="middle">extra</text>
  <text x="60" y="200" font-size="9.5" fill="#93762e">节点直接指向第一条关系(next_rel)</text>
  <text x="60" y="217" font-size="9" fill="#93762e">→ 免索引邻接的入口(见邻接篇)</text>
  <text x="60" y="238" font-size="8.5" fill="#a1a1a6">NodeRecordFormat.java:31</text>

  <!-- RelationshipRecord -->
  <rect x="380" y="76" width="320" height="180" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="400" y="102" font-size="13" font-weight="700" fill="#5a3410">RelationshipRecord</text>
  <rect x="610" y="88" width="72" height="22" rx="7" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="646" y="103" font-size="11" font-weight="600" fill="#5a3410" text-anchor="middle">34 字节</text>
  <text x="400" y="122" font-size="9.5" fill="#93762e">store:neostore.relationshipstore.db</text>
  <rect x="400" y="134" width="88" height="40" rx="6" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="444" y="151" font-size="9" fill="#5a3410" text-anchor="middle">两端节点 id</text>
  <text x="444" y="166" font-size="8" fill="#93762e" text-anchor="middle">first / second</text>
  <rect x="492" y="134" width="52" height="40" rx="6" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="518" y="151" font-size="9" fill="#5a3410" text-anchor="middle">类型</text>
  <text x="518" y="166" font-size="8" fill="#93762e" text-anchor="middle">type</text>
  <rect x="548" y="134" width="132" height="40" rx="6" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="614" y="150" font-size="9" fill="#12402a" text-anchor="middle">四个链指针</text>
  <text x="614" y="165" font-size="7.5" fill="#2f6f4f" text-anchor="middle">firstPrev/Next · secondPrev/Next</text>
  <text x="400" y="200" font-size="9.5" fill="#93762e">关系是两条双向链表的节点</text>
  <text x="400" y="217" font-size="9" fill="#93762e">每个端点一条链(见邻接篇)</text>
  <text x="400" y="238" font-size="8.5" fill="#a1a1a6">RelationshipRecordFormat.java:31</text>

  <!-- PropertyRecord -->
  <rect x="720" y="76" width="320" height="180" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="740" y="102" font-size="13" font-weight="700" fill="#5a3410">PropertyRecord</text>
  <rect x="950" y="88" width="72" height="22" rx="7" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="986" y="103" font-size="11" font-weight="600" fill="#5a3410" text-anchor="middle">41 字节</text>
  <text x="740" y="122" font-size="9.5" fill="#93762e">store:neostore.propertystore.db</text>
  <rect x="740" y="134" width="52" height="40" rx="6" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="766" y="157" font-size="9" fill="#5a3410" text-anchor="middle">header</text>
  <rect x="796" y="134" width="44" height="40" rx="6" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="818" y="157" font-size="9" fill="#3d2a5a" text-anchor="middle">prev</text>
  <rect x="844" y="134" width="44" height="40" rx="6" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="866" y="157" font-size="9" fill="#3d2a5a" text-anchor="middle">next</text>
  <rect x="892" y="134" width="128" height="40" rx="6" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="956" y="151" font-size="9" fill="#12402a" text-anchor="middle">32B payload</text>
  <text x="956" y="166" font-size="8" fill="#2f6f4f" text-anchor="middle">装 PropertyBlock</text>
  <text x="740" y="200" font-size="9.5" fill="#93762e">属性是 prev/next 双向链表节点</text>
  <text x="740" y="217" font-size="9" fill="#93762e">payload 装变长属性块(见属性篇)</text>
  <text x="740" y="238" font-size="8.5" fill="#a1a1a6">PropertyRecordFormat.java:34</text>

  <!-- record id = file offset -->
  <rect x="40" y="288" width="1000" height="132" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="60" y="314" font-size="13" font-weight="700" fill="#1b2a4a">定长的意义:record id = 文件偏移(id × recordSize)</text>
  <text x="60" y="336" font-size="10.5" fill="#5b7db1">默认格式 StandardV5_0;按 id 直接算出页号与页内偏移,O(1) 定位 —— 不需要任何 "id → 位置" 的索引</text>

  <!-- formula boxes -->
  <rect x="60" y="352" width="300" height="52" rx="10" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="76" y="374" font-size="11" font-weight="600" fill="#1b2a4a">pageIdForRecord(id)</text>
  <text x="76" y="392" font-size="10.5" fill="#274a78">= id / recordsPerPage &#8594; 定位到哪一页</text>

  <rect x="380" y="352" width="320" height="52" rx="10" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="396" y="374" font-size="11" font-weight="600" fill="#1b2a4a">offsetForId(id)</text>
  <text x="396" y="392" font-size="10.5" fill="#274a78">= (id % recordsPerPage) × recordSize &#8594; 页内偏移</text>

  <rect x="720" y="352" width="300" height="52" rx="10" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="736" y="374" font-size="11" font-weight="600" fill="#12402a">O(1) 直接寻址</text>
  <text x="736" y="392" font-size="10" fill="#2f6f4f">页 + 偏移一步到位,经页缓存取记录</text>

  <text x="1024" y="336" font-size="8.5" fill="#5b7db1" text-anchor="end">RecordPageLocationCalculator.java:35</text>

  <!-- bottom note -->
  <text x="40" y="452" font-size="10.5" fill="#6e6e73">定长让"按 id O(1) 定位",指针让"关系直连";变长数据(长字符串 / 数组)溢出到 dynamic store,记录里只存指针(见属性篇)。</text>
  <text x="40" y="474" font-size="10" fill="#a1a1a6">NodeRecord.java:32 · RelationshipRecord.java:39 · PropertyRecord.java:39 —— 三类记录定长是"数据即图 + O(1) 定位"的物理基础。</text>
</svg>
