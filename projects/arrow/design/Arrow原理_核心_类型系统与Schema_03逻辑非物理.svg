<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="tla" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
    <marker id="tlg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <filter id="tls" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="980" height="430" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="700" fill="#1d1d1f">逻辑 ≠ 物理 · 同一份字节，被不同 DataType「透镜」解读成不同逻辑值</text>
  <text x="30" y="50" font-size="10.5" fill="#6e6e73">Timestamp / Date64 / Int64 物理都是 8 字节 int64；DataType 决定这些字节被当作什么，是 compute 派发的键</text>

  <g font-size="10">
    <rect x="30" y="60" width="16" height="11" rx="2" fill="#fdeecf" stroke="#e6c98a"/><text x="52" y="69" fill="#3a3a3c">物理 buffer（字节）</text>
    <rect x="210" y="60" width="16" height="11" rx="2" fill="#eef3fb" stroke="#cfe0f2"/><text x="232" y="69" fill="#3a3a3c">DataType（逻辑透镜）</text>
    <rect x="410" y="60" width="16" height="11" rx="2" fill="#d9f2e4" stroke="#9ed9ba"/><text x="432" y="69" fill="#3a3a3c">解读出的逻辑值</text>
  </g>

  <!-- 物理 buffer -->
  <rect x="30" y="150" width="200" height="130" rx="12" fill="#fbf2ea" stroke="#e6cdae" filter="url(#tls)"/>
  <text x="130" y="176" font-size="11" font-weight="700" fill="#8a5a1f" text-anchor="middle">物理层 · value buffer</text>
  <text x="130" y="196" font-size="9" fill="#8a6d3b" text-anchor="middle">定长 8 字节 int64</text>
  <rect x="50" y="210" width="160" height="34" rx="6" fill="#fdeecf" stroke="#e6c98a"/>
  <text x="130" y="232" font-size="11" font-weight="700" fill="#b0651f" text-anchor="middle">1704067200000</text>
  <text x="130" y="262" font-size="8.5" fill="#a58a5a" text-anchor="middle">同一段字节，一字不改</text>

  <!-- 透镜 -->
  <g>
    <rect x="330" y="96" width="230" height="66" rx="10" fill="#eef3fb" stroke="#cfe0f2" filter="url(#tls)"/>
    <text x="346" y="120" font-size="11" font-weight="700" fill="#1b2a4a">Int64Type</text>
    <text x="346" y="140" font-size="9" fill="#5b7db1">当作有符号整数</text>
    <text x="346" y="154" font-size="8.5" fill="#8a9ab5">Layout = [BITMAP, FIXED_WIDTH(8)]</text>

    <rect x="330" y="182" width="230" height="66" rx="10" fill="#eef3fb" stroke="#cfe0f2" filter="url(#tls)"/>
    <text x="346" y="206" font-size="11" font-weight="700" fill="#1b2a4a">TimestampType(us)</text>
    <text x="346" y="226" font-size="9" fill="#5b7db1">当作 Unix 微秒时刻</text>
    <text x="346" y="240" font-size="8.5" fill="#8a9ab5">物理布局与 Int64 完全相同</text>

    <rect x="330" y="268" width="230" height="66" rx="10" fill="#eef3fb" stroke="#cfe0f2" filter="url(#tls)"/>
    <text x="346" y="292" font-size="11" font-weight="700" fill="#1b2a4a">Date64Type</text>
    <text x="346" y="312" font-size="9" fill="#5b7db1">当作距纪元的毫秒日期</text>
    <text x="346" y="326" font-size="8.5" fill="#8a9ab5">仍是同一 8 字节字节序</text>
  </g>

  <!-- 逻辑值输出 -->
  <g>
    <rect x="640" y="96" width="230" height="66" rx="10" fill="#eafaf1" stroke="#b8e6cd" filter="url(#tls)"/>
    <text x="656" y="124" font-size="11" font-weight="700" fill="#1c6b45">整数 1704067200000</text>
    <text x="656" y="146" font-size="9" fill="#2f7d57">一个大整数</text>

    <rect x="640" y="182" width="230" height="66" rx="10" fill="#eafaf1" stroke="#b8e6cd" filter="url(#tls)"/>
    <text x="656" y="210" font-size="11" font-weight="700" fill="#1c6b45">2024-01-01 00:00 时刻</text>
    <text x="656" y="232" font-size="9" fill="#2f7d57">带时区语义的时间点</text>

    <rect x="640" y="268" width="230" height="66" rx="10" fill="#eafaf1" stroke="#b8e6cd" filter="url(#tls)"/>
    <text x="656" y="296" font-size="11" font-weight="700" fill="#1c6b45">某一天（日期）</text>
    <text x="656" y="318" font-size="9" fill="#2f7d57">日历日粒度</text>
  </g>

  <!-- 连线 -->
  <line x1="230" y1="200" x2="328" y2="129" stroke="#5b7db1" stroke-width="1.5" marker-end="url(#tla)"/>
  <line x1="230" y1="215" x2="328" y2="215" stroke="#5b7db1" stroke-width="1.5" marker-end="url(#tla)"/>
  <line x1="230" y1="230" x2="328" y2="301" stroke="#5b7db1" stroke-width="1.5" marker-end="url(#tla)"/>
  <line x1="560" y1="129" x2="638" y2="129" stroke="#2f9e6e" stroke-width="1.6" marker-end="url(#tlg)"/>
  <line x1="560" y1="215" x2="638" y2="215" stroke="#2f9e6e" stroke-width="1.6" marker-end="url(#tlg)"/>
  <line x1="560" y1="301" x2="638" y2="301" stroke="#2f9e6e" stroke-width="1.6" marker-end="url(#tlg)"/>

  <!-- 结论带 -->
  <rect x="30" y="306" width="270" height="76" rx="10" fill="#fdf1f0" stroke="#e6b8b3"/>
  <text x="46" y="328" font-size="10.5" font-weight="700" fill="#a5342c">Equals 只认逻辑</text>
  <text x="46" y="348" font-size="9" fill="#8a4a44">Timestamp ≠ Int64</text>
  <text x="46" y="364" font-size="9" fill="#8a4a44">Binary ≠ List&lt;UInt8&gt;（即便字节一致）</text>
  <text x="46" y="378" font-size="8.5" fill="#b08a86">"逻辑可转换但 NOT equal"</text>

  <rect x="30" y="392" width="920" height="30" rx="9" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="44" y="412" font-size="9.5" fill="#3a4a63">类型与数据 shared_ptr 分离：一个 DataType 被无数 Array 共享、可先传 schema 再传数据、跨语言各自重建；compute 按类型 DispatchExact 选 kernel——DataType 是"解读字节的透镜"，也是派发键。</text>
</svg>
