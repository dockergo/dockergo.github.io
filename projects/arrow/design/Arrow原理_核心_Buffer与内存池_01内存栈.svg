<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="st" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c99a3a"/></marker>
    <filter id="s5" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="960" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="700" fill="#1d1d1f">Buffer + MemoryPool · 一切列数据字节的物理基石（buffer.h / memory_pool.h）</text>
  <text x="30" y="50" font-size="10.5" fill="#6e6e73">Buffer = 连续内存的引用视图（size ≤ capacity）；MemoryPool = 统一分配 / 回收 / 统计，强制 64 字节对齐</text>

  <!-- MemoryPool -->
  <rect x="30" y="76" width="410" height="200" rx="12" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#s5)"/>
  <text x="46" y="98" font-size="12" font-weight="700" fill="#8a6d3b">MemoryPool（memory_pool.h:109）· 分配器</text>
  <rect x="48" y="110" width="374" height="70" rx="8" fill="#fff" stroke="#ecdcbf"/>
  <text x="60" y="128" font-size="9.5" fill="#b08535">Allocate(size, alignment=64, out)（:116-124）→ 64B 对齐</text>
  <text x="60" y="145" font-size="9.5" fill="#b08535">Reallocate(old, new, ptr)（:130）· Free(ptr, size)（:143）</text>
  <text x="60" y="162" font-size="9.5" fill="#b08535">kDefaultBufferAlignment = 64（type_fwd.h:759）</text>
  <text x="60" y="176" font-size="8.5" fill="#c3ab7e">对齐利于 SIMD、缓存行、跨设备（GPU）</text>
  <rect x="48" y="186" width="374" height="80" rx="8" fill="#fff" stroke="#ecdcbf"/>
  <text x="60" y="204" font-size="9.5" font-weight="600" fill="#8a6d3b">统计（MemoryPoolStats, memory_pool.h:42）</text>
  <text x="60" y="221" font-size="9" fill="#b08535">bytes_allocated() · max_memory() · num_allocations()</text>
  <text x="60" y="237" font-size="9" fill="#b08535">acq-rel 原子累加，监控用量 / 峰值</text>
  <text x="60" y="256" font-size="8.5" fill="#c3ab7e">后端：system(:291) · jemalloc(:296) · mimalloc(:343)</text>

  <!-- Buffer -->
  <rect x="470" y="76" width="460" height="200" rx="12" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#s5)"/>
  <text x="486" y="98" font-size="12" font-weight="700" fill="#1b2a4a">Buffer（buffer.h:52）· 内存引用视图</text>
  <text x="486" y="117" font-size="9.5" fill="#5b7db1">不变量 size ≤ capacity（buffer.h:51）</text>
  <text x="486" y="133" font-size="9.5" fill="#5b7db1">基类不拥有内存，子类常拥有（buffer.h:49）</text>
  <rect x="488" y="144" width="424" height="52" rx="8" fill="#fff" stroke="#cfe0f2"/>
  <text x="500" y="162" font-size="9" fill="#1b2a4a">data_ / size_ / capacity_ / parent_ / MemoryManager</text>
  <text x="500" y="178" font-size="9" fill="#5b7db1">is_mutable_ · is_cpu_ · device_type_（可 CPU / GPU）</text>
  <text x="500" y="190" font-size="8" fill="#9aa8bd">by shared_ptr 引用计数持有</text>
  <rect x="488" y="204" width="424" height="62" rx="8" fill="#eafaf1" stroke="#b8e6cd"/>
  <text x="500" y="222" font-size="9.5" font-weight="700" fill="#1c6b45">零拷贝切片：Buffer(parent, offset, size)（buffer.h:114）</text>
  <text x="500" y="239" font-size="9" fill="#2f7d57">data = parent-&gt;data_ + offset；保留 parent shared_ptr</text>
  <text x="500" y="256" font-size="9" fill="#2f7d57">→ 子 Buffer 与父共享同段字节，不复制（CopySlice buffer.h:134 才复制）</text>

  <!-- 引用计数生命周期 -->
  <rect x="30" y="292" width="900" height="94" rx="12" fill="#f5faf6" stroke="#bfe6cd"/>
  <text x="46" y="314" font-size="11" font-weight="700" fill="#1c6b45">生命周期：shared_ptr 引用计数 —— 谁都可以持有，最后一个撒手才归还内存池</text>
  <g font-size="9.5" fill="#2f7d57">
    <rect x="46" y="326" width="200" height="46" rx="7" fill="#fff" stroke="#cdeadb"/>
    <text x="146" y="345" text-anchor="middle" font-weight="600" fill="#1c6b45">Array 持 buffers</text>
    <text x="146" y="361" text-anchor="middle">refcount=1</text>
    <rect x="380" y="326" width="200" height="46" rx="7" fill="#fff" stroke="#cdeadb"/>
    <text x="480" y="345" text-anchor="middle" font-weight="600" fill="#1c6b45">Slice / compute 复用</text>
    <text x="480" y="361" text-anchor="middle">refcount=2,3…</text>
    <rect x="714" y="326" width="200" height="46" rx="7" fill="#fff" stroke="#cdeadb"/>
    <text x="814" y="345" text-anchor="middle" font-weight="600" fill="#1c6b45">全部析构</text>
    <text x="814" y="361" text-anchor="middle">refcount=0 → Free 回池</text>
  </g>
  <line x1="246" y1="349" x2="380" y2="349" stroke="#c99a3a" stroke-width="1.6" marker-end="url(#st)"/>
  <line x1="580" y1="349" x2="714" y2="349" stroke="#c99a3a" stroke-width="1.6" marker-end="url(#st)"/>

  <rect x="30" y="402" width="900" height="112" rx="12" fill="#fbf2ea" stroke="#e6cdae"/>
  <text x="46" y="424" font-size="10.5" font-weight="700" fill="#b0651f">为什么要自管内存池 + 强制对齐</text>
  <text x="46" y="444" font-size="9.5" fill="#5a4a3a">① 64B 对齐：让 validity bitmap 与 value buffer 都能被 SIMD 指令整批加载，向量化 compute 无需处理未对齐边界。</text>
  <text x="46" y="463" font-size="9.5" fill="#5a4a3a">② 统一统计：一处知道全进程 Arrow 用了多少内存、峰值多少 —— 分析负载常逼近内存上限，需精确账本。</text>
  <text x="46" y="482" font-size="9.5" fill="#5a4a3a">③ 可插后端：jemalloc / mimalloc 在高频分配大 buffer 时碎片更少，可 ReleaseUnused 归还 OS。</text>
  <text x="46" y="501" font-size="9.5" fill="#5a4a3a">④ 引用计数 + 切片零拷贝：多个 Array / 视图安全共享同段字节，是"零拷贝"能成立的所有权基础。</text>
</svg>
