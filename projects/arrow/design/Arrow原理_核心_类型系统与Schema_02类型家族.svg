<svg xmlns="http://www.w3.org/2000/svg" width="980" height="480" viewBox="0 0 980 480" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="ty2a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8a5cae"/></marker>
    <filter id="ty2s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="980" height="480" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="700" fill="#1d1d1f">类型家族 → BufferKind 序列 · DataTypeLayout 指挥 Array 如何解读字节（type.h）</text>
  <text x="30" y="50" font-size="10.5" fill="#6e6e73">同一物理布局可承载不同逻辑语义（Timestamp/Date64/Int64 都是 int64）；Equals 只认逻辑</text>

  <!-- 中央 DataType -->
  <rect x="380" y="76" width="220" height="56" rx="12" fill="#f4eefb" stroke="#d9c9ef" filter="url(#ty2s)"/>
  <text x="490" y="100" font-size="12" font-weight="700" fill="#3c1361" text-anchor="middle">DataType（type.h:136）</text>
  <text x="490" y="120" font-size="9" fill="#6f3ea8" text-anchor="middle">Layout()（:175）→ 逐格声明 BufferKind</text>

  <!-- 定长 -->
  <rect x="30" y="168" width="290" height="86" rx="10" fill="#f5faf6" stroke="#bfe6cd" filter="url(#ty2s)"/>
  <text x="46" y="188" font-size="10" font-weight="700" fill="#1c6b45">定长 · FixedSizeBinary / Timestamp</text>
  <text x="46" y="207" font-size="9" fill="#2f7d57">type.h:967 / :1739</text>
  <g font-size="8.5" text-anchor="middle">
    <rect x="46" y="216" width="120" height="26" rx="5" fill="#fbf7ef" stroke="#ecdcbf"/><text x="106" y="233" fill="#8a6d3b">BITMAP validity</text>
    <rect x="172" y="216" width="130" height="26" rx="5" fill="#e8f5ec" stroke="#bfe6cd"/><text x="237" y="233" fill="#1c6b45">FIXED_WIDTH 定宽值</text>
  </g>

  <!-- 变长 -->
  <rect x="345" y="168" width="290" height="86" rx="10" fill="#f5faf6" stroke="#bfe6cd" filter="url(#ty2s)"/>
  <text x="361" y="188" font-size="10" font-weight="700" fill="#1c6b45">变长 · String / List（:1192）</text>
  <text x="361" y="207" font-size="9" fill="#2f7d57">ListType value_type()（:1184）</text>
  <g font-size="8.5" text-anchor="middle">
    <rect x="361" y="216" width="80" height="26" rx="5" fill="#fbf7ef" stroke="#ecdcbf"/><text x="401" y="233" fill="#8a6d3b">BITMAP</text>
    <rect x="447" y="216" width="90" height="26" rx="5" fill="#eef4fb" stroke="#cddcf0"/><text x="492" y="233" fill="#1b2a4a">VARIABLE offset</text>
    <rect x="543" y="216" width="76" height="26" rx="5" fill="#e8f5ec" stroke="#bfe6cd"/><text x="581" y="233" fill="#1c6b45">值/子数组</text>
  </g>

  <!-- 嵌套 -->
  <rect x="660" y="168" width="290" height="86" rx="10" fill="#f5faf6" stroke="#bfe6cd" filter="url(#ty2s)"/>
  <text x="676" y="188" font-size="10" font-weight="700" fill="#1c6b45">嵌套 · Struct（:1399）/ Union</text>
  <text x="676" y="207" font-size="9" fill="#2f7d57">NestedType（:349）值在 child_data</text>
  <g font-size="8.5" text-anchor="middle">
    <rect x="676" y="216" width="80" height="26" rx="5" fill="#fbf7ef" stroke="#ecdcbf"/><text x="716" y="233" fill="#8a6d3b">BITMAP</text>
    <rect x="762" y="216" width="176" height="26" rx="5" fill="#e8f5ec" stroke="#bfe6cd"/><text x="850" y="233" fill="#1c6b45">每字段一个 child_data</text>
  </g>

  <!-- 编码类型：dictionary / RLE -->
  <rect x="30" y="272" width="440" height="86" rx="10" fill="#eef4fb" stroke="#cddcf0" filter="url(#ty2s)"/>
  <text x="46" y="292" font-size="10" font-weight="700" fill="#1b2a4a">编码类型 · Dictionary（:1927）/ RunEndEncoded（:1548）</text>
  <text x="46" y="311" font-size="9" fill="#5b7db1">index_type() :1948 / value_type() :1949</text>
  <g font-size="8.5" text-anchor="middle">
    <rect x="46" y="320" width="180" height="26" rx="5" fill="#eef4fb" stroke="#cddcf0"/><text x="136" y="337" fill="#1b2a4a">小整数 index 数组</text>
    <rect x="232" y="320" width="180" height="26" rx="5" fill="#f4eefb" stroke="#d9c9ef"/><text x="322" y="337" fill="#3c1361">+ 一份独立去重字典</text>
  </g>

  <!-- 视图/扩展 -->
  <rect x="490" y="272" width="460" height="86" rx="10" fill="#fbf2ea" stroke="#e6cdae" filter="url(#ty2s)"/>
  <text x="506" y="292" font-size="10" font-weight="700" fill="#b0651f">视图 StringView（:931）· 扩展 ExtensionType（extension_type.h:39）</text>
  <text x="506" y="311" font-size="9" fill="#5a4a3a">StringView：变长 buffer 之外多个 data buffer（variadic）</text>
  <text x="506" y="329" font-size="9" fill="#5a4a3a">Extension：storage type 上贴自定义逻辑语义，Serialize 进 schema</text>
  <text x="506" y="347" font-size="8.5" fill="#8a7a5a">收端认得扩展名即还原、认不得退化成 storage type（向后兼容）</text>

  <!-- lines -->
  <g stroke="#8a5cae" stroke-width="1.4" fill="none">
    <line x1="420" y1="132" x2="180" y2="168" marker-end="url(#ty2a)"/>
    <line x1="480" y1="132" x2="480" y2="168" marker-end="url(#ty2a)"/>
    <line x1="540" y1="132" x2="800" y2="168" marker-end="url(#ty2a)"/>
    <line x1="440" y1="132" x2="250" y2="272" marker-end="url(#ty2a)"/>
    <line x1="560" y1="132" x2="720" y2="272" marker-end="url(#ty2a)"/>
  </g>

  <rect x="30" y="378" width="920" height="82" rx="12" fill="#f6f6f8" stroke="#e2e2e7"/>
  <text x="46" y="400" font-size="11" font-weight="700" fill="#1d1d1f">逻辑 ≠ 物理 · 类型是"解读字节的透镜"</text>
  <text x="46" y="421" font-size="9.5" fill="#4a4a4f">Equals（type.h:147）只认逻辑：List&lt;UInt8&gt; 与 Binary 物理相似但 NOT equal（:145-146）；Timestamp≠Int64 即便同为 8B。</text>
  <text x="46" y="440" font-size="9.5" fill="#4a4a4f">类型与数据 shared_ptr 分离 → schema 可独立传输、跨语言各自重建、compute 按类型 DispatchExact 派发。</text>
</svg>
