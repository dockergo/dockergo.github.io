<svg xmlns="http://www.w3.org/2000/svg" width="980" height="450" viewBox="0 0 980 450" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="bf2a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8a5cae"/></marker>
    <filter id="bf2s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="980" height="450" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="700" fill="#1d1d1f">Buffer 家族 + 内存节律 · 一次可写构建 → 之后只读零拷贝共享（buffer.h）</text>
  <text x="30" y="50" font-size="10.5" fill="#6e6e73">基类 Buffer 默认不可变，契合"已构建好的列式数据只读共享"；写入走 Builder / 可变派生类</text>

  <!-- 家族层级 -->
  <text x="30" y="82" font-size="11.5" font-weight="700" fill="#1c6b45">① Buffer 家族层级</text>
  <rect x="30" y="92" width="250" height="52" rx="9" fill="#f4eefb" stroke="#d9c9ef" filter="url(#bf2s)"/>
  <text x="155" y="113" font-size="10.5" font-weight="700" fill="#3c1361" text-anchor="middle">Buffer（buffer.h:52）· 基类</text>
  <text x="155" y="131" font-size="8.5" fill="#6f3ea8" text-anchor="middle">只读引用视图 · size ≤ capacity</text>

  <rect x="30" y="164" width="250" height="52" rx="9" fill="#eef4fb" stroke="#cddcf0" filter="url(#bf2s)"/>
  <text x="155" y="185" font-size="10" font-weight="700" fill="#1b2a4a" text-anchor="middle">MutableBuffer（buffer.h:464）</text>
  <text x="155" y="203" font-size="8.5" fill="#5b7db1" text-anchor="middle">可原地改字节 · 容量固定</text>

  <rect x="30" y="236" width="250" height="52" rx="9" fill="#f5faf6" stroke="#bfe6cd" filter="url(#bf2s)"/>
  <text x="155" y="257" font-size="10" font-weight="700" fill="#1c6b45" text-anchor="middle">ResizableBuffer（buffer.h:494）</text>
  <text x="155" y="275" font-size="8.5" fill="#2f7d57" text-anchor="middle">Resize（:504）/ Reserve（:512）可增长</text>

  <line x1="155" y1="144" x2="155" y2="164" stroke="#8a5cae" stroke-width="1.4" marker-end="url(#bf2a)"/>
  <line x1="155" y1="216" x2="155" y2="236" stroke="#8a5cae" stroke-width="1.4" marker-end="url(#bf2a)"/>
  <text x="292" y="180" font-size="8" fill="#8a8a90">加写入能力</text>
  <text x="292" y="252" font-size="8" fill="#8a8a90">加增长能力</text>

  <!-- 内存节律 -->
  <text x="360" y="82" font-size="11.5" font-weight="700" fill="#1c6b45">② 内存节律：构建期 → 冻结 → 只读共享期</text>

  <rect x="360" y="92" width="260" height="90" rx="10" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#bf2s)"/>
  <text x="376" y="112" font-size="10" font-weight="700" fill="#8a6d3b">构建期（可写）</text>
  <text x="376" y="132" font-size="9" fill="#b08535">BufferBuilder（buffer_builder.h:44）</text>
  <text x="376" y="149" font-size="8.5" fill="#b08535">Append（:113）追加 · Reserve（:93）预留</text>
  <text x="376" y="165" font-size="8.5" fill="#b08535">Resize（:68）取整到 64B 倍数 · 2x 倍增</text>
  <text x="376" y="178" font-size="8" fill="#c7a56a">摊薄再分配开销</text>

  <rect x="660" y="92" width="290" height="90" rx="10" fill="#f5faf6" stroke="#bfe6cd" filter="url(#bf2s)"/>
  <text x="676" y="112" font-size="10" font-weight="700" fill="#1c6b45">只读共享期（不可变）</text>
  <text x="676" y="132" font-size="9" fill="#2f7d57">Finish 冻结成不可变 Buffer 交给 Array</text>
  <text x="676" y="149" font-size="8.5" fill="#2f7d57">SliceBuffer（buffer.h:399）只递引用不复制</text>
  <text x="676" y="165" font-size="8.5" fill="#2f7d57">多 Array / 视图 / 跨语言消费者共享同段字节</text>
  <text x="676" y="178" font-size="8" fill="#8a9a8f">真要复制才用 CopySlice（buffer.h:134）</text>

  <line x1="620" y1="137" x2="660" y2="137" stroke="#8a5cae" stroke-width="1.8" marker-end="url(#bf2a)"/>
  <text x="640" y="129" font-size="8" fill="#8a5cae" text-anchor="middle">Finish</text>

  <!-- MemoryPool -->
  <rect x="360" y="200" width="590" height="88" rx="10" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#bf2s)"/>
  <text x="376" y="220" font-size="10.5" font-weight="700" fill="#1b2a4a">MemoryPool（memory_pool.h:109）· 统一分配 / 回收 / 统计 · 强制 64B 对齐</text>
  <text x="376" y="240" font-size="9" fill="#5b7db1">Allocate（:116，默认 kDefaultBufferAlignment=64）/ Reallocate（:130）/ Free（:143）</text>
  <text x="376" y="257" font-size="9" fill="#5b7db1">MemoryPoolStats（:42-101）：bytes_allocated / max_memory / num_allocations（原子累加）</text>
  <text x="376" y="275" font-size="8.5" fill="#8a9ab5">后端可插：system（:291）/ jemalloc（:296）/ mimalloc（:343）· AllocateBuffer / AllocateResizableBuffer 从此取内存</text>

  <!-- 底部要点 -->
  <rect x="30" y="308" width="920" height="128" rx="12" fill="#fbf2ea" stroke="#e6cdae"/>
  <text x="46" y="330" font-size="11" font-weight="700" fill="#b0651f">两条服务关系 · 对齐服务向量化，引用计数服务零拷贝</text>
  <text x="46" y="353" font-size="9.5" fill="#5a4a3a">· 64B 对齐 = SIMD 寄存器宽（AVX-512）与缓存行的公倍数考量：validity 与 value buffer 对齐后，向量化 compute 内核整批加载、免处理未对齐首尾边界，也利于跨设备 DMA。对齐不是可选优化，而是格式约定的一部分。</text>
  <text x="46" y="378" font-size="9.5" fill="#5a4a3a">· 引用计数：Buffer 由 shared_ptr 持有——构造 Array（refcount=1）→ Slice / compute 复用 validity（refcount++）→ C-Data export 藏 shared_ptr 保活 → 全部析构归零才 MemoryPool::Free 归还。</text>
  <text x="46" y="403" font-size="9.5" fill="#5a4a3a">· 不变量：基类 Buffer 不拥有内存（是引用视图），拥有内存的是分配它的子类（如 PoolBuffer）；size=有效数据、capacity=已分配，padding 部分可 ZeroPadding（buffer.h:138）。</text>
  <text x="46" y="426" font-size="8.5" fill="#8a7a5a">→ 一次可写构建、之后只读零拷贝共享，正是 Arrow 内存管理的基本节律，支撑起全部上层列式数据。</text>
</svg>
