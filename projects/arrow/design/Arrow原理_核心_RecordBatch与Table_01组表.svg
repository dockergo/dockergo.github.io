<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="s6" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter></defs>
  <rect width="960" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="700" fill="#1d1d1f">组合层 · 从"一列"到"一张表"（record_batch.h / table.h / chunked_array.h）</text>
  <text x="30" y="50" font-size="10.5" fill="#6e6e73">Array 是一列；RecordBatch / Table 把多列组成表；ChunkedArray 让一列"逻辑连续、物理分块"</text>

  <!-- RecordBatch -->
  <rect x="30" y="76" width="430" height="180" rx="12" fill="#f5faf6" stroke="#bfe6cd" filter="url(#s6)"/>
  <text x="46" y="98" font-size="12" font-weight="700" fill="#1c6b45">RecordBatch（record_batch.h:41）· 面向传输/计算的批</text>
  <text x="46" y="117" font-size="9.5" fill="#2f7d57">= Schema + 一组等长 Array（num_columns:223 · num_rows:226）</text>
  <g font-size="9" text-anchor="middle">
    <rect x="46" y="128" width="120" height="110" rx="7" fill="#fff" stroke="#cdeadb"/>
    <text x="106" y="146" font-weight="600" fill="#1c6b45">col id (Int32)</text>
    <rect x="60" y="156" width="92" height="20" fill="#d9f2e4" stroke="#9ed9ba"/><text x="106" y="170" fill="#1c6b45">1</text>
    <rect x="60" y="178" width="92" height="20" fill="#d9f2e4" stroke="#9ed9ba"/><text x="106" y="192" fill="#1c6b45">2</text>
    <rect x="60" y="200" width="92" height="20" fill="#d9f2e4" stroke="#9ed9ba"/><text x="106" y="214" fill="#1c6b45">3</text>
    <rect x="174" y="128" width="120" height="110" rx="7" fill="#fff" stroke="#cdeadb"/>
    <text x="234" y="146" font-weight="600" fill="#1c6b45">col name (Str)</text>
    <rect x="188" y="156" width="92" height="20" fill="#d9f2e4" stroke="#9ed9ba"/><text x="234" y="170" fill="#1c6b45">a</text>
    <rect x="188" y="178" width="92" height="20" fill="#d9f2e4" stroke="#9ed9ba"/><text x="234" y="192" fill="#1c6b45">b</text>
    <rect x="188" y="200" width="92" height="20" fill="#d9f2e4" stroke="#9ed9ba"/><text x="234" y="214" fill="#1c6b45">c</text>
    <rect x="302" y="128" width="144" height="110" rx="7" fill="#eef4fb" stroke="#cddcf0"/>
    <text x="374" y="152" fill="#1b2a4a">所有列等长</text>
    <text x="374" y="170" fill="#5b7db1">num_rows = 3</text>
    <text x="374" y="190" fill="#5b7db1">列仍是 Array</text>
    <text x="374" y="208" fill="#5b7db1">（各自 buffers）</text>
    <text x="374" y="228" fill="#9aa8bd" font-size="8">IPC / Flight 的传输单元</text>
  </g>

  <!-- ChunkedArray -->
  <rect x="480" y="76" width="450" height="180" rx="12" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#s6)"/>
  <text x="496" y="98" font-size="12" font-weight="700" fill="#8a6d3b">ChunkedArray（chunked_array.h:74）· 逻辑连续、物理分块</text>
  <text x="496" y="117" font-size="9.5" fill="#b08535">一列 = 若干 Array 分块（chunk），逻辑上首尾相接</text>
  <g font-size="9" text-anchor="middle">
    <rect x="496" y="130" width="130" height="80" rx="7" fill="#fff" stroke="#ecdcbf"/>
    <text x="561" y="148" font-weight="600" fill="#8a6d3b">chunk 0</text>
    <text x="561" y="166" fill="#b08535">Array [1,2,3]</text>
    <text x="561" y="184" fill="#c3ab7e" font-size="8">独立 buffers</text>
    <text x="561" y="200" fill="#c3ab7e" font-size="8">len=3</text>
    <rect x="636" y="130" width="130" height="80" rx="7" fill="#fff" stroke="#ecdcbf"/>
    <text x="701" y="148" font-weight="600" fill="#8a6d3b">chunk 1</text>
    <text x="701" y="166" fill="#b08535">Array [4,5]</text>
    <text x="701" y="184" fill="#c3ab7e" font-size="8">独立 buffers</text>
    <text x="701" y="200" fill="#c3ab7e" font-size="8">len=2</text>
    <rect x="776" y="130" width="138" height="80" rx="7" fill="#fff" stroke="#ecdcbf"/>
    <text x="845" y="148" font-weight="600" fill="#8a6d3b">chunk 2</text>
    <text x="845" y="166" fill="#b08535">Array [6,7,8]</text>
    <text x="845" y="184" fill="#c3ab7e" font-size="8">独立 buffers</text>
    <text x="845" y="200" fill="#c3ab7e" font-size="8">len=3</text>
  </g>
  <text x="496" y="230" font-size="9" fill="#b08535">逻辑视图：[1,2,3,4,5,6,7,8]（length=8）· 追加新数据 = 加一个 chunk，不重排旧内存</text>
  <text x="496" y="246" font-size="8.5" fill="#c3ab7e">流式读入 / 分段拼接天然适配，无需一次性连续大分配</text>

  <!-- Table -->
  <rect x="30" y="272" width="900" height="112" rx="12" fill="#eefaf3" stroke="#c4e8d5" filter="url(#s6)"/>
  <text x="46" y="294" font-size="12" font-weight="700" fill="#1c6b45">Table（table.h:43）· 每列一个 ChunkedArray</text>
  <text x="46" y="313" font-size="9.5" fill="#2f7d57">= Schema + 每列一个 ChunkedArray（num_columns:214 · num_rows:217/263）</text>
  <text x="46" y="331" font-size="9.5" fill="#2f7d57">Table 的各列可各自分块（但总行数一致）；等价于"若干 RecordBatch 纵向拼接的逻辑视图"</text>
  <text x="46" y="349" font-size="9.5" fill="#2f7d57">RecordBatch（每列单个 Array）→ 适合传输 / 单批计算；Table（每列 ChunkedArray）→ 适合承载全量大数据集</text>
  <text x="46" y="369" font-size="8.5" fill="#8a9a8f">Slice(offset,length)（table.h:144）零拷贝：仅调整各 ChunkedArray 的视图范围</text>

  <rect x="30" y="400" width="900" height="82" rx="12" fill="#fbf2ea" stroke="#e6cdae"/>
  <text x="46" y="422" font-size="10.5" font-weight="700" fill="#b0651f">为什么要 ChunkedArray（而非强求一列连续）</text>
  <text x="46" y="442" font-size="9.5" fill="#5a4a3a">· 变长/大列一次性连续分配困难且昂贵；分块让"边读边攒"成为可能（IPC 一批一 chunk、Flight 一消息一 chunk）。</text>
  <text x="46" y="461" font-size="9.5" fill="#5a4a3a">· 拼接两个数据集 = 拼 chunk 列表，O(1) 不复制；代价：跨 chunk 随机定位需先按 chunk 边界二分（chunk_resolver）。</text>
  <text x="46" y="477" font-size="8.5" fill="#8a7a5a">张力落点：吞吐/追加友好（分块） ⟷ 单值随机访问要多一层 chunk 定位</text>
</svg>
