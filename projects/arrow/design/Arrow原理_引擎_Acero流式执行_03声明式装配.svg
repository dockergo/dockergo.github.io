<svg xmlns="http://www.w3.org/2000/svg" width="980" height="452" viewBox="0 0 980 452" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="acc" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
    <marker id="acg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <filter id="acs" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="980" height="452" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="700" fill="#1d1d1f">声明式装配 · 一张 Options 表 → 工厂按名实例化并接线 → ExecNode DAG</text>
  <text x="30" y="50" font-size="10.5" fill="#6e6e73">用户不手工连线，只给每节点一份 *NodeOptions；运算全部借道 compute，Acero 只做编排与流控</text>

  <g font-size="10">
    <line x1="30" y1="64" x2="54" y2="64" stroke="#5b7db1" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#acc)"/><text x="60" y="68" fill="#3a3a3c">控制 · 声明与构造</text>
    <line x1="220" y1="64" x2="244" y2="64" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#acg)"/><text x="250" y="68" fill="#3a3a3c">数据 · push 批流过</text>
  </g>

  <!-- 声明列：Options 表 -->
  <rect x="30" y="84" width="250" height="330" rx="12" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#acs)"/>
  <text x="46" y="106" font-size="11.5" font-weight="700" fill="#1b2a4a">① 声明：每节点一份 Options</text>
  <g font-size="10">
    <rect x="46" y="118" width="218" height="42" rx="7" fill="#eef3fb" stroke="#cfe0f2"/><text x="58" y="136" font-weight="700" fill="#1b2a4a">SourceNodeOptions</text><text x="58" y="152" font-size="9" fill="#5b7db1">批的产出源（表/生成器/异步流）</text>
    <rect x="46" y="166" width="218" height="42" rx="7" fill="#eef3fb" stroke="#cfe0f2"/><text x="58" y="184" font-weight="700" fill="#1b2a4a">FilterNodeOptions</text><text x="58" y="200" font-size="9" fill="#5b7db1">一个布尔 Expression 谓词</text>
    <rect x="46" y="214" width="218" height="42" rx="7" fill="#eef3fb" stroke="#cfe0f2"/><text x="58" y="232" font-weight="700" fill="#1b2a4a">ProjectNodeOptions</text><text x="58" y="248" font-size="9" fill="#5b7db1">一组输出列表达式</text>
    <rect x="46" y="262" width="218" height="42" rx="7" fill="#eef3fb" stroke="#cfe0f2"/><text x="58" y="280" font-weight="700" fill="#1b2a4a">AggregateNodeOptions</text><text x="58" y="296" font-size="9" fill="#5b7db1">聚合函数 + 分组键</text>
    <rect x="46" y="310" width="218" height="42" rx="7" fill="#eef3fb" stroke="#cfe0f2"/><text x="58" y="328" font-weight="700" fill="#1b2a4a">HashJoinNodeOptions</text><text x="58" y="344" font-size="9" fill="#5b7db1">join 类型 + 左右键</text>
    <rect x="46" y="358" width="218" height="42" rx="7" fill="#eef3fb" stroke="#cfe0f2"/><text x="58" y="376" font-weight="700" fill="#1b2a4a">SinkNodeOptions</text><text x="58" y="392" font-size="9" fill="#5b7db1">结果出口（回调/生成器）</text>
  </g>

  <!-- 工厂 -->
  <rect x="330" y="180" width="180" height="120" rx="12" fill="#f4eefb" stroke="#d9c9ef" filter="url(#acs)"/>
  <text x="420" y="214" font-size="12" font-weight="700" fill="#3c1361" text-anchor="middle">② 工厂按名构造</text>
  <text x="420" y="238" font-size="10" fill="#6f3ea8" text-anchor="middle">ExecFactoryRegistry</text>
  <text x="420" y="258" font-size="10" fill="#6f3ea8" text-anchor="middle">MakeExecNode(name, opts)</text>
  <text x="420" y="282" font-size="9" fill="#8a6dae" text-anchor="middle">按名查工厂 → 实例化并接线</text>

  <line x1="280" y1="240" x2="328" y2="240" stroke="#5b7db1" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#acc)"/>

  <!-- DAG -->
  <rect x="560" y="84" width="390" height="330" rx="12" fill="#f5faf6" stroke="#bfe6cd" filter="url(#acs)"/>
  <text x="576" y="106" font-size="11.5" font-weight="700" fill="#1c6b45">③ 接成 ExecNode DAG（push 驱动）</text>
  <g text-anchor="middle" font-size="11" font-weight="700">
    <rect x="700" y="120" width="120" height="40" rx="8" fill="#d9f2e4" stroke="#9ed9ba"/><text x="760" y="144" fill="#1c6b45">source</text>
    <rect x="700" y="176" width="120" height="40" rx="8" fill="#d9f2e4" stroke="#9ed9ba"/><text x="760" y="200" fill="#1c6b45">filter</text>
    <rect x="700" y="232" width="120" height="40" rx="8" fill="#d9f2e4" stroke="#9ed9ba"/><text x="760" y="256" fill="#1c6b45">project</text>
    <rect x="700" y="288" width="120" height="40" rx="8" fill="#d9f2e4" stroke="#9ed9ba"/><text x="760" y="312" fill="#1c6b45">aggregate</text>
    <rect x="700" y="344" width="120" height="40" rx="8" fill="#d9f2e4" stroke="#9ed9ba"/><text x="760" y="368" fill="#1c6b45">sink</text>
  </g>
  <line x1="760" y1="160" x2="760" y2="174" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#acg)"/>
  <line x1="760" y1="216" x2="760" y2="230" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#acg)"/>
  <line x1="760" y1="272" x2="760" y2="286" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#acg)"/>
  <line x1="760" y1="328" x2="760" y2="342" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#acg)"/>
  <text x="836" y="200" font-size="9" fill="#2f7d57">InputReceived</text>
  <text x="836" y="214" font-size="9" fill="#8a9a8f">上游推批给下游</text>

  <!-- 借道 compute 侧注 -->
  <rect x="576" y="148" width="110" height="236" rx="8" fill="#eafaf1" stroke="#b8e6cd"/>
  <text x="631" y="168" font-size="9.5" font-weight="700" fill="#1c6b45" text-anchor="middle">借道 compute</text>
  <text x="631" y="196" font-size="8.5" fill="#2f7d57" text-anchor="middle">filter/project 的</text>
  <text x="631" y="210" font-size="8.5" fill="#2f7d57" text-anchor="middle">Expression 下沉为</text>
  <text x="631" y="224" font-size="8.5" fill="#2f7d57" text-anchor="middle">CallFunction</text>
  <text x="631" y="252" font-size="8.5" fill="#2f7d57" text-anchor="middle">aggregate/join 用</text>
  <text x="631" y="266" font-size="8.5" fill="#2f7d57" text-anchor="middle">compute 哈希 kernel</text>
  <text x="631" y="300" font-size="8.5" fill="#8a9a8f" text-anchor="middle">Acero 不自造</text>
  <text x="631" y="314" font-size="8.5" fill="#8a9a8f" text-anchor="middle">标量运算</text>

  <line x1="510" y1="240" x2="698" y2="140" stroke="#5b7db1" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#acc)"/>

  <rect x="30" y="424" width="920" height="0" fill="none"/>
  <text x="330" y="336" font-size="9" fill="#8a9ab5">ExecPlan 统一编排整图</text>
  <text x="330" y="352" font-size="9" fill="#8a9ab5">节点 StartProducing 不</text>
  <text x="330" y="368" font-size="9" fill="#8a9ab5">递归进 inputs</text>
</svg>
