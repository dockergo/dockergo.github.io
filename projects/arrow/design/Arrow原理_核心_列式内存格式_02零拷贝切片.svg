<svg xmlns="http://www.w3.org/2000/svg" width="980" height="440" viewBox="0 0 980 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="cl2a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8a5cae"/></marker>
    <filter id="cl2s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="980" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="700" fill="#1d1d1f">零拷贝切片微观机制 · Slice(2,2) 只改两个整数、共享同一批 Buffer</text>
  <text x="30" y="50" font-size="10.5" fill="#6e6e73">所有取值用 i+offset 定位 → 切片视图天然正确；对比行式"取子集要复制一段连续行"</text>

  <!-- 底层共享 buffers -->
  <rect x="300" y="250" width="640" height="120" rx="12" fill="#eafaf1" stroke="#b8e6cd" filter="url(#cl2s)"/>
  <text x="320" y="272" font-size="11" font-weight="700" fill="#1c6b45">底层 Buffer（shared_ptr，一份内存，不复制）</text>
  <text x="320" y="290" font-size="9" fill="#2f7d57">buffers[0] validity bitmap ＋ buffers[1] value buffer</text>
  <g font-size="12" font-weight="700" text-anchor="middle">
    <rect x="320" y="300" width="56" height="34" fill="#d9f2e4" stroke="#9ed9ba"/><text x="348" y="323" fill="#1c6b45">10</text>
    <rect x="378" y="300" width="56" height="34" fill="#d9f2e4" stroke="#9ed9ba"/><text x="406" y="323" fill="#1c6b45">11</text>
    <rect x="436" y="300" width="56" height="34" fill="#fdeecf" stroke="#e6c98a"/><text x="464" y="323" fill="#b0651f">12</text>
    <rect x="494" y="300" width="56" height="34" fill="#fdeecf" stroke="#e6c98a"/><text x="522" y="323" fill="#b0651f">13</text>
    <rect x="552" y="300" width="56" height="34" fill="#d9f2e4" stroke="#9ed9ba"/><text x="580" y="323" fill="#1c6b45">14</text>
    <rect x="610" y="300" width="56" height="34" fill="#d9f2e4" stroke="#9ed9ba"/><text x="638" y="323" fill="#1c6b45">15</text>
  </g>
  <text x="464" y="356" font-size="8.5" fill="#b0651f" text-anchor="middle">index 2,3 = 切片可见窗口（橙）</text>
  <text x="800" y="326" font-size="9" fill="#2f7d57">同一段字节被父/子共享</text>
  <text x="800" y="340" font-size="8.5" fill="#8a9a8f">引用计数 +1</text>

  <!-- 父 ArrayData -->
  <rect x="40" y="86" width="380" height="130" rx="12" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#cl2s)"/>
  <text x="60" y="108" font-size="11" font-weight="700" fill="#1b2a4a">父 ArrayData（原数组，length=6）</text>
  <text x="60" y="132" font-size="10" fill="#5b7db1">offset = 0</text>
  <text x="60" y="152" font-size="10" fill="#5b7db1">length = 6</text>
  <text x="60" y="172" font-size="9.5" fill="#8a9ab5">buffers = [validity, value]（shared_ptr）</text>
  <text x="60" y="192" font-size="9" fill="#8a9ab5">child_data / dictionary …</text>
  <text x="60" y="208" font-size="8.5" fill="#8a9ab5">元数据与数据分离</text>

  <!-- 子 ArrayData -->
  <rect x="560" y="86" width="380" height="130" rx="12" fill="#f4eefb" stroke="#d9c9ef" filter="url(#cl2s)"/>
  <text x="580" y="108" font-size="11" font-weight="700" fill="#3c1361">子 ArrayData = Slice(offset=2, length=2)</text>
  <text x="580" y="132" font-size="10" font-weight="700" fill="#6f3ea8">offset = 2　← 只改这个</text>
  <text x="580" y="152" font-size="10" font-weight="700" fill="#6f3ea8">length = 2　← 和这个</text>
  <text x="580" y="172" font-size="9.5" fill="#6f3ea8">buffers = 同一批 shared_ptr（不复制）</text>
  <text x="580" y="192" font-size="9" fill="#8a6dae">IsValid(i)=GetBit(bitmap, i+offset)</text>
  <text x="580" y="208" font-size="8.5" fill="#9a86c0">故 i+offset 定位 → 视图天然正确</text>

  <line x1="230" y1="216" x2="360" y2="298" stroke="#8a5cae" stroke-width="1.5" marker-end="url(#cl2a)"/>
  <line x1="750" y1="216" x2="620" y2="298" stroke="#8a5cae" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#cl2a)"/>
  <text x="490" y="240" font-size="9" fill="#8a5cae" text-anchor="middle">父与子指向同一 Buffer，只是各自的 offset/length 不同</text>

  <rect x="40" y="392" width="900" height="34" rx="9" fill="#fbf2ea" stroke="#e6cdae"/>
  <text x="54" y="413" font-size="9.5" fill="#5a4a3a">切片 / 拼接 / compute 输出都能廉价复用底层内存（如 Abs 复用输入 validity bitmap，data.h:73-77）——真要复制才用 CopySlice。行式结构取子集常需复制一段连续行；Arrow 只改两个整数。</text>
</svg>
