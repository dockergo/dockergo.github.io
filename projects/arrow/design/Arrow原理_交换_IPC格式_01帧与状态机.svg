<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="x1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8a5cae"/></marker>
    <filter id="s7" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="980" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="700" fill="#1d1d1f">IPC 格式 · 把列式内存原样落成字节流（ipc/message.h · writer.h · reader.h）</text>
  <text x="30" y="50" font-size="10.5" fill="#6e6e73">元数据用 Flatbuffers 描述、body 是原始 buffer 字节；解码是一个状态机，逐帧读出 Message</text>

  <!-- 帧结构 -->
  <text x="30" y="80" font-size="11.5" font-weight="700" fill="#3c1361">① 封装消息帧（encapsulated message）</text>
  <g font-size="8.5" text-anchor="middle">
    <rect x="30" y="90" width="150" height="60" rx="7" fill="#f4eefb" stroke="#d9c9ef"/><text x="105" y="112" font-weight="600" fill="#3c1361">续传令牌</text><text x="105" y="128" fill="#6f3ea8">int32 = 0xFFFFFFFF</text><text x="105" y="142" fill="#9a86c0">continuation</text>
    <rect x="184" y="90" width="150" height="60" rx="7" fill="#f4eefb" stroke="#d9c9ef"/><text x="259" y="112" font-weight="600" fill="#3c1361">元数据长度</text><text x="259" y="128" fill="#6f3ea8">int32 metadata_len</text><text x="259" y="142" fill="#9a86c0">EOS 时 = 0</text>
    <rect x="338" y="90" width="230" height="60" rx="7" fill="#eef4fb" stroke="#cddcf0"/><text x="453" y="112" font-weight="600" fill="#1b2a4a">元数据（Flatbuffers）</text><text x="453" y="128" fill="#5b7db1">Message: type + schema/batch 描述</text><text x="453" y="142" fill="#9aa8bd">节点/buffer 的 offset+length 表</text>
    <rect x="572" y="90" width="378" height="60" rx="7" fill="#f5faf6" stroke="#bfe6cd"/><text x="761" y="112" font-weight="600" fill="#1c6b45">body（原始 buffer 字节）</text><text x="761" y="128" fill="#2f7d57">validity | offset | values … 原样拼接</text><text x="761" y="142" fill="#8a9a8f">按 8 字节对齐；与内存布局同构 → 可零拷贝/ mmap</text>
  </g>
  <text x="30" y="168" font-size="8.5" fill="#8a8a90">前缀设计 message.h:245-247：INITIAL 态可接 续传令牌 / EOS(==0) / 旧版(0.15.0 前)直接给 metadata_len</text>

  <!-- 解码状态机 -->
  <text x="30" y="196" font-size="11.5" font-weight="700" fill="#1c6b45">② MessageDecoder 状态机（message.h:239, State enum :242）</text>
  <g font-size="9" text-anchor="middle">
    <rect x="30" y="208" width="150" height="42" rx="8" fill="#fff" stroke="#cdeadb"/><text x="105" y="234" font-weight="600" fill="#1c6b45">INITIAL</text>
    <rect x="212" y="208" width="150" height="42" rx="8" fill="#fff" stroke="#cdeadb"/><text x="287" y="228" font-weight="600" fill="#1c6b45">METADATA_LENGTH</text>
    <rect x="394" y="208" width="130" height="42" rx="8" fill="#fff" stroke="#cdeadb"/><text x="459" y="234" font-weight="600" fill="#1c6b45">METADATA</text>
    <rect x="556" y="208" width="130" height="42" rx="8" fill="#fff" stroke="#cdeadb"/><text x="621" y="234" font-weight="600" fill="#1c6b45">BODY</text>
    <rect x="718" y="208" width="130" height="42" rx="8" fill="#fbe9e3" stroke="#e8c4b3"/><text x="783" y="234" font-weight="600" fill="#b0651f">EOS</text>
  </g>
  <line x1="180" y1="229" x2="212" y2="229" stroke="#8a5cae" stroke-width="1.5" marker-end="url(#x1)"/>
  <line x1="362" y1="229" x2="394" y2="229" stroke="#8a5cae" stroke-width="1.5" marker-end="url(#x1)"/>
  <line x1="524" y1="229" x2="556" y2="229" stroke="#8a5cae" stroke-width="1.5" marker-end="url(#x1)"/>
  <line x1="686" y1="229" x2="718" y2="229" stroke="#8a5cae" stroke-width="1.5" marker-end="url(#x1)"/>
  <path d="M621,250 q-100,34 -516,0" fill="none" stroke="#5b7db1" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#x1)"/>
  <text x="360" y="286" font-size="8" fill="#5b7db1" text-anchor="middle">读完一个 Message 回到 INITIAL，继续下一帧（listener 收 OnMessage/OnEOS）</text>

  <!-- Stream vs File -->
  <rect x="30" y="304" width="450" height="120" rx="12" fill="#f4eefb" stroke="#d9c9ef" filter="url(#s7)"/>
  <text x="46" y="326" font-size="11.5" font-weight="700" fill="#3c1361">流式 Stream（顺序）</text>
  <text x="46" y="345" font-size="9.5" fill="#6f3ea8">MakeStreamWriter（writer.h:143）→ schema 消息 + 若干 batch + EOS</text>
  <text x="46" y="362" font-size="9.5" fill="#6f3ea8">RecordBatchStreamReader（reader.h:74）顺序读，来一批处理一批</text>
  <text x="46" y="379" font-size="9.5" fill="#6f3ea8">面向管道 / socket：无需知道总长度，可无限流</text>
  <text x="46" y="398" font-size="8.5" fill="#9a86c0">不能随机跳批（要顺序消费）</text>
  <text x="46" y="414" font-size="8.5" fill="#9a86c0">适合 Flight / 进程间管道</text>

  <rect x="496" y="304" width="454" height="120" rx="12" fill="#eef4fb" stroke="#cddcf0" filter="url(#s7)"/>
  <text x="512" y="326" font-size="11.5" font-weight="700" fill="#1b2a4a">文件 File（可随机读）</text>
  <text x="512" y="345" font-size="9.5" fill="#5b7db1">MakeFileWriter（writer.h:167）→ 头部魔数 + batch + footer</text>
  <text x="512" y="362" font-size="9.5" fill="#5b7db1">RecordBatchFileReader（reader.h:109）读 footer 拿每批 offset</text>
  <text x="512" y="379" font-size="9.5" fill="#5b7db1">footer 记录批索引 → 可随机读任意第 k 批</text>
  <text x="512" y="398" font-size="8.5" fill="#9aa8bd">Feather = Arrow IPC 文件格式的落地</text>
  <text x="512" y="414" font-size="8.5" fill="#9aa8bd">适合本地列存 / 中间结果落盘</text>

  <rect x="30" y="440" width="920" height="62" rx="11" fill="#f6f6f8" stroke="#e2e2e7"/>
  <text x="46" y="461" font-size="10" font-weight="700" fill="#3c1361">要点：IPC ≠ 序列化开销</text>
  <text x="46" y="480" font-size="9.5" fill="#4a4a4f">元数据（Flatbuffers）很小且"不完全反序列化"（message.h:41 注释）——只读 offset/length 表；body 是原始 buffer 字节，读端可零拷贝映射。</text>
  <text x="46" y="497" font-size="8.5" fill="#8a8a90">所以"落盘 / 跨进程"仍是同一份列式布局，读回来直接就是 buffers，不需要行↔列转换。</text>
</svg>
