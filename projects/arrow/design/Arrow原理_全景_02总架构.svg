<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="806" viewBox="0 0 1120 806" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="aHot" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="aState" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c99a3a"/></marker>
    <marker id="aCtl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
    <marker id="aFail" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#d38236"/></marker>
    <marker id="aX" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8a5cae"/></marker>
  </defs>
  <rect width="1120" height="806" fill="#fbfbfd"/>

  <!-- ===== 标题带 · 判型 ===== -->
  <text x="30" y="26" font-size="14" font-weight="600" fill="#1d1d1f">Apache Arrow 总架构 · 语言无关的列式内存格式 + 零拷贝交换标准：列式 Array + IPC / C-Data / Flight 免序列化互通 + 向量化 compute</text>
  <text x="30" y="44" font-size="10.5" fill="#6e6e73">分层脊：逻辑类型描述 → 列式 Array / ArrayData（灵魂）→ RecordBatch/Table 组合，立于 Buffer/MemoryPool 之上；compute/Acero 就地向量化，IPC/C-Data/Flight 横切免序列化交换　源码基准 v26.0.0-SNAPSHOT</text>

  <!-- ===== 设计张力铭牌带（显式）===== -->
  <rect x="24" y="52" width="1072" height="48" rx="10" fill="#fbf2ea" stroke="#e6cdae"/>
  <text x="40" y="72" font-size="11" font-weight="700" fill="#b0651f">设计张力</text>
  <text x="104" y="72" font-size="10" fill="#5a4a3a">标准化列式内存布局 ＋ C Data Interface<tspan fill="#8a6d3b">（免序列化、跨语言直接共享同一份内存）</tspan> 换来<tspan font-weight="700" fill="#b0651f"> 全生态零拷贝互通</tspan></text>
  <text x="104" y="90" font-size="9.5" fill="#5a4a3a">列式布局利于分析扫描 / 向量化 / 压缩<tspan font-weight="700" fill="#c0392b"> ⟷ vs ⟷ </tspan>对随机行访问、逐行写入、频繁更新不友好；与行式系统互转有转换成本<tspan fill="#8a6d3b">（Arrow 定位分析交换层，非事务存储）</tspan></text>

  <!-- ===== 图例：五型语义路径 ===== -->
  <line x1="40" y1="114" x2="62" y2="114" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aHot)"/>
  <text x="68" y="118" font-size="10" fill="#3a3a3c">Hot · 列式数据 / 计算流</text>
  <line x1="212" y1="114" x2="234" y2="114" stroke="#c99a3a" stroke-width="1.8" marker-end="url(#aState)"/>
  <text x="240" y="118" font-size="10" fill="#3a3a3c">State · Buffer + 内存池</text>
  <line x1="398" y1="114" x2="420" y2="114" stroke="#5b7db1" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aCtl)"/>
  <text x="426" y="118" font-size="10" fill="#3a3a3c">Control · Schema + 执行计划</text>
  <line x1="616" y1="114" x2="638" y2="114" stroke="#d38236" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aFail)"/>
  <text x="644" y="118" font-size="10" fill="#3a3a3c">失败 · validity 空值 / 校验</text>
  <line x1="820" y1="114" x2="842" y2="114" stroke="#8a5cae" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aX)"/>
  <text x="848" y="118" font-size="10" fill="#3a3a3c">横切 · IPC / C-Data / Flight 零拷贝</text>
  <text x="1096" y="118" font-size="10" fill="#a1a1a6" text-anchor="end">框 = 主线可下钻</text>

  <!-- ===== powers 立身带 ===== -->
  <rect x="24" y="128" width="1072" height="26" rx="8" fill="#f6f6f8" stroke="#e2e2e7" data-tid="Arrow原理_全景主线框架" data-lab="全景主线框架"/>
  <text x="40" y="145" font-size="10" fill="#4a4a4f">powers：为分析型数据定义一套语言无关的列式内存标准 —— 一次布局、处处零拷贝共享；免序列化跨引擎 / 跨语言 / 跨进程互通，把“数据交换”从复制成本降到指针传递</text>

  <!-- ===== 生态语境带（非模块，仅上下文）===== -->
  <rect x="24" y="166" width="1072" height="30" rx="9" fill="#eef1f6" stroke="#dbe2ec"/>
  <text x="40" y="185" font-size="10" fill="#4a5568">跨语言 · 跨引擎生态：C++ / Python(pyarrow) / Java / Rust / Go / R … 全部读写<tspan font-weight="700" fill="#334155"> 同一份列式内存布局</tspan>，无需逐语言重实现、无需序列化转换即可互通</text>

  <!-- ===================== 左列 · 格式栈 ===================== -->
  <!-- ① 逻辑类型层（Control 蓝）-->
  <rect x="40" y="212" width="632" height="60" rx="12" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#soft)" data-tid="Arrow原理_核心_类型系统与Schema" data-lab="类型系统与 Schema"/>
  <text x="56" y="233" font-size="12" font-weight="600" fill="#1b2a4a">① 逻辑类型层 · DataType / Field / Schema（描述“物理布局长什么样”）</text>
  <text x="56" y="251" font-size="9" fill="#5b7db1">DataTypeLayout 规定每类型的 buffer 序列：validity=BITMAP、值=FIXED_WIDTH / VARIABLE_WIDTH、ALWAYS_NULL</text>
  <text x="56" y="265" font-size="9" fill="#5b7db1">Field = name + type + nullable + metadata　·　Schema = 有序 Field 列表 + 元数据（逻辑 ≠ 物理，类型只是解释字节的透镜）</text>

  <!-- ② 列式核心（Hot 绿，灵魂）-->
  <rect x="40" y="286" width="632" height="172" rx="14" fill="#f5faf6" stroke="#bfe6cd" filter="url(#soft)" data-tid="Arrow原理_核心_列式内存格式" data-lab="列式内存格式"/>
  <text x="56" y="307" font-size="12.5" font-weight="700" fill="#1c6b45">② 列式 Array / ArrayData ★（灵魂）· 自包含列式数据容器</text>
  <text x="56" y="323" font-size="9" fill="#2f7d57">元数据与数据分离：length · offset（切片仅移 offset → 零拷贝）· null_count（惰性 = -1，首次用时算）· type · child_data · dictionary</text>
  <g text-anchor="middle">
    <rect x="54" y="332" width="146" height="112" rx="9" fill="#fff" stroke="#cdeadb"/>
    <text x="127" y="352" font-size="10" font-weight="600" fill="#1c6b45">buffers[0]</text><text x="127" y="352" font-size="10" font-weight="600" fill="#1c6b45"></text>
    <text x="127" y="368" font-size="9.5" font-weight="600" fill="#1d8f3f">validity bitmap</text><text x="127" y="384" font-size="8.5" fill="#4a4a4f">1 bit / 值</text><text x="127" y="399" font-size="8.5" fill="#4a4a4f">标记空值，值槽仍占位</text><text x="127" y="420" font-size="8" fill="#9a9aa0">可空才分配</text><text x="127" y="434" font-size="8" fill="#9a9aa0">缺失=全非空</text>
    <rect x="208" y="332" width="146" height="112" rx="9" fill="#fff" stroke="#cdeadb"/>
    <text x="281" y="352" font-size="10" font-weight="600" fill="#1c6b45">offset buffer</text><text x="281" y="368" font-size="8.5" fill="#4a4a4f">变长类型专用</text><text x="281" y="383" font-size="8.5" fill="#4a4a4f">string / list</text><text x="281" y="398" font-size="8.5" fill="#4a4a4f">第 i 值 = data[off[i]:</text><text x="281" y="411" font-size="8.5" fill="#4a4a4f">off[i+1]]</text><text x="281" y="431" font-size="8" fill="#9a9aa0">N+1 个偏移</text>
    <rect x="362" y="332" width="146" height="112" rx="9" fill="#fff" stroke="#cdeadb"/>
    <text x="435" y="352" font-size="10" font-weight="600" fill="#1c6b45">value buffer(s)</text><text x="435" y="368" font-size="8.5" fill="#4a4a4f">连续定长值</text><text x="435" y="383" font-size="8.5" fill="#4a4a4f">或变长字节数据</text><text x="435" y="398" font-size="8.5" fill="#4a4a4f">同列同类型紧排</text><text x="435" y="418" font-size="8" fill="#9a9aa0">利于 SIMD /</text><text x="435" y="431" font-size="8" fill="#9a9aa0">缓存 / 压缩</text>
    <rect x="516" y="332" width="150" height="112" rx="9" fill="#fff" stroke="#cdeadb"/>
    <text x="591" y="352" font-size="10" font-weight="600" fill="#1c6b45">child_data</text><text x="591" y="368" font-size="8.5" fill="#4a4a4f">嵌套：struct /</text><text x="591" y="383" font-size="8.5" fill="#4a4a4f">list / union 递归</text><text x="591" y="401" font-size="10" font-weight="600" fill="#1c6b45">dictionary</text><text x="591" y="417" font-size="8.5" fill="#4a4a4f">字典编码</text><text x="591" y="431" font-size="8.5" fill="#4a4a4f">低基数复用</text>
  </g>

  <!-- ③ 组合层 -->
  <rect x="40" y="470" width="632" height="58" rx="12" fill="#eefaf3" stroke="#c4e8d5" filter="url(#soft)" data-tid="Arrow原理_核心_RecordBatch与Table" data-lab="RecordBatch 与 Table"/>
  <text x="56" y="491" font-size="12" font-weight="600" fill="#1c6b45">③ 组合层 · RecordBatch / Table / ChunkedArray</text>
  <text x="56" y="509" font-size="9" fill="#2f7d57">RecordBatch = Schema + 一组等长列（面向传输 / 计算的批）　·　Table = 每列一个 ChunkedArray</text>
  <text x="56" y="522" font-size="9" fill="#2f7d57">ChunkedArray = 逻辑上连续、物理上分块的列（追加 / 拼接不重排，天然适配流式与分段读入）</text>

  <!-- ④ 物理内存基石（State 琥珀）-->
  <rect x="40" y="540" width="632" height="62" rx="12" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#soft)" data-tid="Arrow原理_核心_Buffer与内存池" data-lab="Buffer 与内存池"/>
  <text x="56" y="561" font-size="12" font-weight="600" fill="#8a6d3b">④ 物理内存基石 · Buffer + MemoryPool</text>
  <text x="56" y="579" font-size="9" fill="#b08535">Buffer = 一段连续内存的引用视图（size ≤ capacity）；切片 = 共享父 Buffer + 移 offset → 零拷贝；shared_ptr 引用计数持有</text>
  <text x="56" y="593" font-size="9" fill="#b08535">MemoryPool 统一分配 / 回收，强制 64 字节对齐（利于 SIMD 与跨设备）；可换 system / jemalloc / mimalloc 后端并统计用量</text>

  <!-- ===================== 右列 · 计算与执行 ===================== -->
  <!-- ⑤ compute 向量化内核（Hot 绿）-->
  <rect x="688" y="212" width="408" height="140" rx="13" fill="#f5faf6" stroke="#bfe6cd" filter="url(#soft)" data-tid="Arrow原理_计算_compute内核" data-lab="compute 向量化内核"/>
  <text x="704" y="233" font-size="12" font-weight="600" fill="#1c6b45">⑤ compute · 向量化函数内核</text>
  <text x="704" y="252" font-size="9" fill="#2f7d57">Function 分 5 类：SCALAR / VECTOR /</text>
  <text x="704" y="265" font-size="9" fill="#2f7d57">SCALAR_AGGREGATE / HASH_AGGREGATE / META</text>
  <text x="704" y="284" font-size="9" fill="#2f7d57">CallFunction(name, {Datum…}) → 注册表查名</text>
  <text x="704" y="297" font-size="9" fill="#2f7d57">→ DispatchExact 按参数类型选具体 Kernel</text>
  <text x="704" y="316" font-size="9" fill="#2f7d57">Kernel 直接在列式 buffer 上批量运算</text>
  <text x="704" y="329" font-size="9" fill="#2f7d57">复用 / 传播输入的 validity bitmap（省重算）</text>
  <text x="704" y="345" font-size="8" fill="#9a9aa0">FunctionRegistry · ScalarKernel / VectorKernel</text>

  <!-- ⑥ Acero 流式执行 -->
  <rect x="688" y="366" width="408" height="162" rx="13" fill="#f5faf6" stroke="#bfe6cd" filter="url(#soft)" data-tid="Arrow原理_引擎_Acero流式执行" data-lab="Acero 流式执行"/>
  <text x="704" y="387" font-size="12" font-weight="600" fill="#1c6b45">⑥ Acero · 流式执行引擎</text>
  <text x="704" y="406" font-size="9" fill="#2f7d57">ExecNode 组成 DAG，批次（ExecBatch）在节点间流动</text>
  <text x="704" y="419" font-size="9" fill="#2f7d57">push 驱动：上游 InputReceived(batch) 推给下游</text>
  <text x="704" y="432" font-size="9" fill="#2f7d57">pause / resume 施加背压，避免下游积压爆内存</text>
  <text x="704" y="451" font-size="9" fill="#2f7d57">节点库：source · filter · project · aggregate</text>
  <text x="704" y="464" font-size="9" fill="#2f7d57">　　　　hash_join · order_by · fetch · sink</text>
  <text x="704" y="483" font-size="9" fill="#2f7d57">与 compute 内核共栈：算子内部即调用向量化 Kernel</text>
  <text x="704" y="502" font-size="8.5" fill="#7a8a70">面向大于内存的数据：流式、分批、可背压，而非一次性全量物化</text>
  <text x="704" y="519" font-size="8" fill="#9a9aa0">MakeExecNode · ExecFactoryRegistry</text>

  <!-- ===================== 底部 · 横切零拷贝交换（紫）===================== -->
  <text x="40" y="626" font-size="11" font-weight="700" fill="#6f3ea8">横切 · 零拷贝数据交换 —— 让同一份列式内存直接跨进程 / 跨语言 / 跨网络流转，免序列化</text>

  <rect x="40" y="636" width="340" height="128" rx="13" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)" data-tid="Arrow原理_交换_IPC格式" data-lab="IPC 格式"/>
  <text x="56" y="658" font-size="11.5" font-weight="600" fill="#3c1361">IPC 格式（进程 / 文件间）</text>
  <text x="56" y="677" font-size="9" fill="#6f3ea8">Flatbuffers 元数据 + 消息帧封装（body 不解析、按需读）</text>
  <text x="56" y="692" font-size="9" fill="#6f3ea8">帧前缀：续传令牌 → 元数据长度 → 元数据 → body → EOS</text>
  <text x="56" y="712" font-size="9" fill="#6f3ea8">流式（Stream，顺序追加）</text>
  <text x="56" y="726" font-size="9" fill="#6f3ea8">文件（File，带 footer → 随机读任意批）</text>
  <text x="56" y="746" font-size="8.5" fill="#9a86c0">磁盘 / socket 上落地的列式字节，与内存布局同构</text>
  <text x="56" y="759" font-size="8" fill="#b0a3d0">MessageDecoder 状态机 · Stream/File Reader·Writer</text>

  <rect x="396" y="636" width="340" height="128" rx="13" fill="#f1e8fb" stroke="#d3bef0" filter="url(#soft)" data-tid="Arrow原理_交换_CData接口" data-lab="C Data Interface"/>
  <text x="412" y="658" font-size="11.5" font-weight="700" fill="#3c1361">C Data Interface ★（超能力）</text>
  <text x="412" y="677" font-size="9" fill="#6f3ea8">极小、ABI 稳定的 C struct，可 vendored 进任意项目</text>
  <text x="412" y="692" font-size="9" fill="#6f3ea8">ArrowSchema（类型）+ ArrowArray（数据，与 ArrayData 同构）</text>
  <text x="412" y="707" font-size="9" fill="#6f3ea8">ArrowArrayStream（批次流）· release 回调管生命周期</text>
  <text x="412" y="726" font-size="9" fill="#6f3ea8">同机跨语言 / 跨库直接传指针：免拷贝、免序列化</text>
  <text x="412" y="746" font-size="8.5" fill="#9a86c0">pyarrow ↔ DuckDB ↔ Polars … 交换只递结构体</text>
  <text x="412" y="759" font-size="8" fill="#b0a3d0">Export* / Import* 桥接到 Arrow C++ 对象</text>

  <rect x="752" y="636" width="344" height="128" rx="13" fill="#faf4fb" stroke="#e4cdea" filter="url(#soft)" data-tid="Arrow原理_交换_Flight" data-lab="Flight RPC"/>
  <text x="768" y="658" font-size="11.5" font-weight="600" fill="#6f3ea8">Flight（跨网络 RPC）</text>
  <text x="768" y="677" font-size="9" fill="#8944ab">基于 gRPC 直传 RecordBatch 流，复用 IPC 编码</text>
  <text x="768" y="692" font-size="9" fill="#8944ab">GetFlightInfo 定位数据端点（Ticket）</text>
  <text x="768" y="707" font-size="9" fill="#8944ab">DoGet 拉流 · DoPut 推流 · DoExchange 双向</text>
  <text x="768" y="726" font-size="9" fill="#8944ab">面向高吞吐数据服务，取代“逐行 ODBC / JSON”</text>
  <text x="768" y="746" font-size="8.5" fill="#a97fb8">列式批直达线缆，省掉行式序列化往返</text>
  <text x="768" y="759" font-size="8" fill="#c0a9c8">FlightServerBase · RecordBatchStream</text>

  <!-- ===================== 语义分型连线 ===================== -->
  <!-- Control：类型描述 → Array 布局 -->
  <line x1="200" y1="272" x2="200" y2="286" stroke="#5b7db1" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aCtl)"/>
  <text x="206" y="283" font-size="7.5" fill="#5b7db1">描述物理布局</text>
  <!-- State：Buffer/MemoryPool → 上层承载 buffers（向上） -->
  <line x1="356" y1="540" x2="356" y2="528" stroke="#c99a3a" stroke-width="1.6" marker-end="url(#aState)"/>
  <line x1="356" y1="470" x2="356" y2="458" stroke="#c99a3a" stroke-width="1.6" marker-end="url(#aState)"/>
  <text x="362" y="466" font-size="7.5" fill="#b08535">分配 / 持有 buffers（对齐 · 引用计数）</text>
  <!-- 失败：validity 空值语义（core 内自注） -->
  <path d="M92,444 q14,12 28,0" fill="none" stroke="#d38236" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#aFail)"/>
  <text x="126" y="456" font-size="7.5" fill="#d38236">空值经 bitmap 表达（非哨兵值）· ValidateFull 结构校验</text>
  <!-- Hot：Array core → compute（右） -->
  <line x1="672" y1="360" x2="688" y2="300" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aHot)"/>
  <!-- Hot：RecordBatch → Acero（右） -->
  <line x1="672" y1="499" x2="688" y2="470" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aHot)"/>
  <!-- 横切：Array/RecordBatch → 底部交换带（三条紫） -->
  <line x1="210" y1="528" x2="210" y2="636" stroke="#8a5cae" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aX)"/>
  <line x1="520" y1="528" x2="540" y2="636" stroke="#8a5cae" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aX)"/>
  <line x1="640" y1="528" x2="880" y2="636" stroke="#8a5cae" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aX)"/>

  <!-- ===== 读法 ===== -->
  <text x="560" y="790" font-size="10" fill="#4a4a4f" text-anchor="middle">读法：DataType 述布局 → Array/ArrayData（validity+offset+value buffers）→ RecordBatch/Table 组表 → compute/Acero 向量化 → IPC/C-Data/Flight 免序列化跨进程 / 语言 / 网络流转</text>
</svg>
