<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="pp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8a5cae"/></marker>
    <filter id="sa" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="960" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="700" fill="#1d1d1f">Flight · 基于 gRPC 的 Arrow 数据服务（flight/server.h · client.h）</text>
  <text x="30" y="50" font-size="10.5" fill="#6e6e73">直传 RecordBatch 流，payload 复用 IPC 编码 —— 取代逐行 ODBC/JDBC 的高吞吐数据端点</text>

  <!-- client -->
  <rect x="40" y="90" width="200" height="270" rx="12" fill="#f4eefb" stroke="#d9c9ef" filter="url(#sa)"/>
  <text x="140" y="114" font-size="12" font-weight="700" fill="#3c1361" text-anchor="middle">FlightClient</text>
  <text x="140" y="132" font-size="8.5" fill="#9a86c0" text-anchor="middle">client.h</text>
  <rect x="56" y="146" width="168" height="46" rx="7" fill="#fff" stroke="#d9c9ef"/>
  <text x="140" y="165" font-size="9" font-weight="600" fill="#6f3ea8" text-anchor="middle">① GetFlightInfo(descriptor)</text>
  <text x="140" y="181" font-size="8" fill="#8a6dae" text-anchor="middle">拿到数据在哪：endpoints + Ticket</text>
  <rect x="56" y="200" width="168" height="46" rx="7" fill="#fff" stroke="#d9c9ef"/>
  <text x="140" y="219" font-size="9" font-weight="600" fill="#6f3ea8" text-anchor="middle">② DoGet(Ticket)</text>
  <text x="140" y="235" font-size="8" fill="#8a6dae" text-anchor="middle">凭票拉一条 RecordBatch 流</text>
  <rect x="56" y="254" width="168" height="42" rx="7" fill="#fff" stroke="#d9c9ef"/>
  <text x="140" y="272" font-size="9" font-weight="600" fill="#6f3ea8" text-anchor="middle">DoPut / DoExchange</text>
  <text x="140" y="287" font-size="8" fill="#8a6dae" text-anchor="middle">推流 / 双向流</text>
  <rect x="56" y="304" width="168" height="42" rx="7" fill="#eef4fb" stroke="#cddcf0"/>
  <text x="140" y="322" font-size="8.5" fill="#1b2a4a" text-anchor="middle">收到的 FlightData</text>
  <text x="140" y="337" font-size="8" fill="#5b7db1" text-anchor="middle">= IPC 编码批 → 直接还原 Array</text>

  <!-- server -->
  <rect x="720" y="90" width="200" height="270" rx="12" fill="#faf4fb" stroke="#e4cdea" filter="url(#sa)"/>
  <text x="820" y="114" font-size="12" font-weight="700" fill="#6f3ea8" text-anchor="middle">FlightServerBase</text>
  <text x="820" y="132" font-size="8.5" fill="#a97fb8" text-anchor="middle">server.h</text>
  <rect x="736" y="146" width="168" height="46" rx="7" fill="#fff" stroke="#e4cdea"/>
  <text x="820" y="165" font-size="9" font-weight="600" fill="#8944ab" text-anchor="middle">GetFlightInfo（server.h:257）</text>
  <text x="820" y="181" font-size="8" fill="#a97fb8" text-anchor="middle">返回数据位置 + Ticket</text>
  <rect x="736" y="200" width="168" height="46" rx="7" fill="#fff" stroke="#e4cdea"/>
  <text x="820" y="219" font-size="9" font-weight="600" fill="#8944ab" text-anchor="middle">DoGet（server.h:285）</text>
  <text x="820" y="235" font-size="8" fill="#a97fb8" text-anchor="middle">返回 FlightDataStream</text>
  <rect x="736" y="254" width="168" height="46" rx="7" fill="#fff" stroke="#e4cdea"/>
  <text x="820" y="273" font-size="9" font-weight="600" fill="#8944ab" text-anchor="middle">DoPut（:293）/ DoExchange（:302）</text>
  <text x="820" y="289" font-size="8" fill="#a97fb8" text-anchor="middle">收流 / 双向</text>
  <rect x="736" y="308" width="168" height="42" rx="7" fill="#f5faf6" stroke="#bfe6cd"/>
  <text x="820" y="326" font-size="8.5" fill="#1c6b45" text-anchor="middle">RecordBatchStream（:64）</text>
  <text x="820" y="341" font-size="8" fill="#2f7d57" text-anchor="middle">把 batch 序列 → FlightData</text>

  <!-- 连线 gRPC -->
  <line x1="240" y1="169" x2="720" y2="169" stroke="#8a5cae" stroke-width="1.6" stroke-dasharray="6 3" marker-end="url(#pp)"/>
  <line x1="720" y1="223" x2="240" y2="223" stroke="#8a5cae" stroke-width="1.6" stroke-dasharray="6 3" marker-start="url(#pp)"/>
  <text x="480" y="162" font-size="9" fill="#8a5cae" text-anchor="middle">① 问路（gRPC 一元调用）</text>
  <text x="480" y="240" font-size="9" fill="#8a5cae" text-anchor="middle">② 取数（gRPC 服务端流：连续 FlightData 消息）</text>
  <rect x="360" y="270" width="240" height="30" rx="8" fill="#f6f6f8" stroke="#e2e2e7"/>
  <text x="480" y="290" font-size="9" fill="#4a4a4f" text-anchor="middle">payload = IPC 封装的 RecordBatch 字节</text>

  <rect x="30" y="380" width="900" height="106" rx="12" fill="#fbf2ea" stroke="#e6cdae"/>
  <text x="46" y="402" font-size="10.5" font-weight="700" fill="#b0651f">为什么 Flight 快（对比逐行协议）</text>
  <text x="46" y="422" font-size="9.5" fill="#5a4a3a">· 传输单元是 RecordBatch（一批多行多列），非逐行——省掉行级往返与逐字段编解码。</text>
  <text x="46" y="441" font-size="9.5" fill="#5a4a3a">· payload 直接是 IPC 编码字节（与内存布局同构），收端还原即得 buffers，无行↔列转换。</text>
  <text x="46" y="460" font-size="9.5" fill="#5a4a3a">· 两段式（GetFlightInfo 问路 → DoGet 取数）支持数据分布在多端点，可并行拉取、水平扩展。</text>
  <text x="46" y="478" font-size="8.5" fill="#8a7a5a">= "把 IPC 批送上网络" —— Flight 复用 IPC 编码，是零拷贝交换在跨网络维度的延伸</text>
</svg>
