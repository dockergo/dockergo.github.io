<svg xmlns="http://www.w3.org/2000/svg" width="980" height="460" viewBox="0 0 980 460" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="cp2a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8a5cae"/></marker>
    <filter id="cp2s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="980" height="460" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="700" fill="#1d1d1f">Kernel 解剖 · "如何跑 + 如何管空值 + 如何分配输出"的三元约定（kernel.h）</text>
  <text x="30" y="50" font-size="10.5" fill="#6e6e73">两个枚举定死框架替内核代劳多少：约定越强，内核只需填值、连 validity bitmap 都不用碰</text>

  <!-- 执行签名 -->
  <rect x="30" y="76" width="920" height="86" rx="12" fill="#f4eefb" stroke="#d9c9ef" filter="url(#cp2s)"/>
  <text x="46" y="98" font-size="11" font-weight="700" fill="#3c1361">执行体 ArrayKernelExec（kernel.h:556）· Status(KernelContext*, const ExecSpan&amp;, ExecResult*)</text>
  <g font-size="9" text-anchor="middle">
    <rect x="46" y="110" width="270" height="42" rx="7" fill="#eef4fb" stroke="#cddcf0"/>
    <text x="181" y="128" font-weight="700" fill="#1b2a4a">输入 ExecSpan（exec.h:369）</text>
    <text x="181" y="144" fill="#5b7db1">一批列的只读视图 · 纯指针+长度、不持所有权</text>
    <rect x="356" y="110" width="240" height="42" rx="7" fill="#f5faf6" stroke="#bfe6cd"/>
    <text x="476" y="128" font-weight="700" fill="#1c6b45">输出 ExecResult（exec.h:331）</text>
    <text x="476" y="144" fill="#2f7d57">承接结果 buffer</text>
    <rect x="636" y="110" width="300" height="42" rx="7" fill="#fbf7ef" stroke="#ecdcbf"/>
    <text x="786" y="128" font-weight="700" fill="#8a6d3b">KernelContext（kernel.h:60）</text>
    <text x="786" y="144" fill="#b08535">提供 MemoryPool 与 KernelState（有状态内核）</text>
  </g>

  <!-- ScalarKernel -->
  <rect x="30" y="180" width="450" height="150" rx="12" fill="#f5faf6" stroke="#bfe6cd" filter="url(#cp2s)"/>
  <text x="46" y="202" font-size="11.5" font-weight="700" fill="#1c6b45">ScalarKernel（kernel.h:561）· 逐元素</text>
  <text x="46" y="222" font-size="9" fill="#2f7d57">输出长度 = 输入长度（框架可提前算好）</text>
  <rect x="46" y="232" width="418" height="40" rx="7" fill="#fff" stroke="#bfe6cd"/>
  <text x="56" y="249" font-size="9.5" font-weight="700" fill="#1c6b45">空值 = INTERSECTION（kernel.h:587）</text>
  <text x="56" y="264" font-size="8.5" fill="#2f7d57">各输入 validity bitmap 按位与 → 框架算好</text>
  <rect x="46" y="278" width="418" height="40" rx="7" fill="#fff" stroke="#bfe6cd"/>
  <text x="56" y="295" font-size="9.5" font-weight="700" fill="#1c6b45">内存 = PREALLOCATE（kernel.h:588）</text>
  <text x="56" y="310" font-size="8.5" fill="#2f7d57">框架预分配输出 → 内核只填值、不碰 bitmap</text>

  <!-- VectorKernel -->
  <rect x="500" y="180" width="450" height="150" rx="12" fill="#eef4fb" stroke="#cddcf0" filter="url(#cp2s)"/>
  <text x="516" y="202" font-size="11.5" font-weight="700" fill="#1b2a4a">VectorKernel（kernel.h:598）· 整列相关</text>
  <text x="516" y="222" font-size="9" fill="#5b7db1">sort / unique / filter：输出长度事前未知</text>
  <rect x="516" y="232" width="418" height="40" rx="7" fill="#fff" stroke="#cddcf0"/>
  <text x="526" y="249" font-size="9.5" font-weight="700" fill="#1b2a4a">空值 = COMPUTED_NO_PREALLOCATE（:638）</text>
  <text x="526" y="264" font-size="8.5" fill="#5b7db1">内核自己算 validity</text>
  <rect x="516" y="278" width="418" height="40" rx="7" fill="#fff" stroke="#cddcf0"/>
  <text x="526" y="295" font-size="9.5" font-weight="700" fill="#1b2a4a">内存 = NO_PREALLOCATE（kernel.h:639）</text>
  <text x="526" y="310" font-size="8.5" fill="#5b7db1">内核自己分配输出</text>

  <!-- 枚举来源 + cast -->
  <rect x="30" y="346" width="450" height="96" rx="12" fill="#f6f6f8" stroke="#e2e2e7"/>
  <text x="46" y="368" font-size="10.5" font-weight="700" fill="#1d1d1f">两个定死枚举</text>
  <text x="46" y="389" font-size="9" fill="#4a4a4f">NullHandling（kernel.h:437）· MemAllocation（kernel.h:464）</text>
  <text x="46" y="408" font-size="9" fill="#4a4a4f">决定框架替内核代劳多少：约定越强，内核越省事</text>
  <text x="46" y="428" font-size="8.5" fill="#8a8a90">有状态内核用 KernelState（:55）+ KernelInitArgs（:489）开跑前初始化</text>

  <rect x="500" y="346" width="450" height="96" rx="12" fill="#fbf2ea" stroke="#e6cdae"/>
  <text x="516" y="368" font-size="10.5" font-weight="700" fill="#b0651f">隐式 cast（cast.h）</text>
  <text x="516" y="389" font-size="9" fill="#5a4a3a">DispatchExact 找不到精确匹配时：CanCast（:88）判可转</text>
  <text x="516" y="408" font-size="9" fill="#5a4a3a">Cast（:116）插入转换</text>
  <text x="516" y="428" font-size="8.5" fill="#8a7a5a">cast 本身也是注册在 registry 里的一族 kernel</text>
</svg>
