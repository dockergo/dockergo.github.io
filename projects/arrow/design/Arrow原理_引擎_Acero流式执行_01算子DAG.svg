<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="hh" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="ff" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#d38236"/></marker>
    <filter id="s9" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="960" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="700" fill="#1d1d1f">Acero · 把算子连成 DAG，批次 push 着流过（acero/exec_plan.h）</text>
  <text x="30" y="50" font-size="10.5" fill="#6e6e73">ExecNode 组 DAG，上游 InputReceived(batch) 推给下游；背压用 pause/resume 反压上游</text>

  <!-- DAG -->
  <rect x="40" y="86" width="150" height="70" rx="10" fill="#f5faf6" stroke="#bfe6cd" filter="url(#s9)"/>
  <text x="115" y="112" font-size="11" font-weight="700" fill="#1c6b45" text-anchor="middle">source</text>
  <text x="115" y="130" font-size="8.5" fill="#2f7d57" text-anchor="middle">读表 / 文件 / 流</text>
  <text x="115" y="145" font-size="8" fill="#8a9a8f" text-anchor="middle">产出 ExecBatch</text>

  <rect x="250" y="86" width="150" height="70" rx="10" fill="#f5faf6" stroke="#bfe6cd" filter="url(#s9)"/>
  <text x="325" y="112" font-size="11" font-weight="700" fill="#1c6b45" text-anchor="middle">filter</text>
  <text x="325" y="130" font-size="8.5" fill="#2f7d57" text-anchor="middle">谓词筛行</text>
  <text x="325" y="145" font-size="8" fill="#8a9a8f" text-anchor="middle">调 compute kernel</text>

  <rect x="460" y="86" width="150" height="70" rx="10" fill="#f5faf6" stroke="#bfe6cd" filter="url(#s9)"/>
  <text x="535" y="112" font-size="11" font-weight="700" fill="#1c6b45" text-anchor="middle">project</text>
  <text x="535" y="130" font-size="8.5" fill="#2f7d57" text-anchor="middle">列表达式求值</text>
  <text x="535" y="145" font-size="8" fill="#8a9a8f" text-anchor="middle">调 compute kernel</text>

  <rect x="670" y="86" width="150" height="70" rx="10" fill="#f5faf6" stroke="#bfe6cd" filter="url(#s9)"/>
  <text x="745" y="112" font-size="11" font-weight="700" fill="#1c6b45" text-anchor="middle">aggregate</text>
  <text x="745" y="130" font-size="8.5" fill="#2f7d57" text-anchor="middle">分组汇总</text>
  <text x="745" y="145" font-size="8" fill="#8a9a8f" text-anchor="middle">hash_aggregate</text>

  <rect x="820" y="200" width="110" height="60" rx="10" fill="#eef4fb" stroke="#cddcf0" filter="url(#s9)"/>
  <text x="875" y="226" font-size="11" font-weight="700" fill="#1b2a4a" text-anchor="middle">sink</text>
  <text x="875" y="244" font-size="8.5" fill="#5b7db1" text-anchor="middle">收结果</text>

  <line x1="190" y1="121" x2="250" y2="121" stroke="#2f9e6e" stroke-width="2" marker-end="url(#hh)"/>
  <line x1="400" y1="121" x2="460" y2="121" stroke="#2f9e6e" stroke-width="2" marker-end="url(#hh)"/>
  <line x1="610" y1="121" x2="670" y2="121" stroke="#2f9e6e" stroke-width="2" marker-end="url(#hh)"/>
  <path d="M745,156 L745,230 L820,230" fill="none" stroke="#2f9e6e" stroke-width="2" marker-end="url(#hh)"/>
  <text x="215" y="112" font-size="8" fill="#2f9e6e" text-anchor="middle">InputReceived</text>

  <!-- push 机制 -->
  <rect x="30" y="286" width="450" height="120" rx="12" fill="#f5faf6" stroke="#bfe6cd" filter="url(#s9)"/>
  <text x="46" y="308" font-size="11" font-weight="700" fill="#1c6b45">push 驱动（exec_plan.h）</text>
  <text x="46" y="329" font-size="9.5" fill="#2f7d57">ExecNode::InputReceived(input, batch)（:225）</text>
  <text x="46" y="346" font-size="9.5" fill="#2f7d57">→ 节点处理这批，再对自己的下游 InputReceived</text>
  <text x="46" y="363" font-size="9.5" fill="#2f7d57">InputFinished(input, total_batches)（:232）告知总批数</text>
  <text x="46" y="380" font-size="9.5" fill="#2f7d57">ExecPlan::StartProducing()（:100）从 source 起链</text>
  <text x="46" y="398" font-size="8.5" fill="#8a9a8f">StartProducing 不递归进 inputs，由 ExecPlan 统一编排（:249）</text>

  <!-- 背压 -->
  <rect x="496" y="286" width="434" height="120" rx="12" fill="#fbe9e3" stroke="#e8c4b3" filter="url(#s9)"/>
  <text x="512" y="308" font-size="11" font-weight="700" fill="#b0651f">背压 backpressure（:246, :750）</text>
  <text x="512" y="329" font-size="9.5" fill="#8a5a2a">下游消费不过来 → 队列积压 → PauseProducing</text>
  <text x="512" y="346" font-size="9.5" fill="#8a5a2a">反压上游暂停产批，避免内存爆</text>
  <text x="512" y="363" font-size="9.5" fill="#8a5a2a">下游缓解 → ResumeProducing 恢复</text>
  <text x="512" y="380" font-size="9.5" fill="#8a5a2a">面向"大于内存"的数据：流式分批、不全量物化</text>
  <line x1="600" y1="392" x2="560" y2="392" stroke="#d38236" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#ff)"/>
  <text x="700" y="398" font-size="8" fill="#b0651f">pause/resume 是背压信号</text>

  <rect x="30" y="422" width="900" height="80" rx="12" fill="#fbf2ea" stroke="#e6cdae"/>
  <text x="46" y="444" font-size="10.5" font-weight="700" fill="#b0651f">与 compute 的关系 · 与格式的关系</text>
  <text x="46" y="464" font-size="9.5" fill="#5a4a3a">Acero 是"算子编排 + 流控"层：filter/project/aggregate 节点内部就调 compute 的向量化 Kernel —— 两者共栈，不重复造轮子。</text>
  <text x="46" y="483" font-size="9.5" fill="#5a4a3a">流动的 ExecBatch 承载列式数据，节点间传的是列 buffer 视图；这让"流式执行"也保持零拷贝 / 向量化的底色。</text>
</svg>
