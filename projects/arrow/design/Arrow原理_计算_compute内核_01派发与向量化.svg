<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="h1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <filter id="s8" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="960" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="700" fill="#1d1d1f">compute · 按名调用 → 按类型派发 → 就地向量化（compute/function.h · exec.h · kernel.h）</text>
  <text x="30" y="50" font-size="10.5" fill="#6e6e73">CallFunction("add", {a,b}) 如何变成一段跑在列式 buffer 上的循环</text>

  <!-- 派发链 -->
  <rect x="30" y="76" width="200" height="70" rx="10" fill="#f5faf6" stroke="#bfe6cd" filter="url(#s8)"/>
  <text x="130" y="104" font-size="11" font-weight="700" fill="#1c6b45" text-anchor="middle">CallFunction(name,</text>
  <text x="130" y="122" font-size="11" font-weight="700" fill="#1c6b45" text-anchor="middle">{Datum…})</text>
  <text x="130" y="139" font-size="8.5" fill="#8a9a8f" text-anchor="middle">exec.h:436</text>

  <rect x="270" y="76" width="200" height="70" rx="10" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#s8)"/>
  <text x="370" y="100" font-size="11" font-weight="700" fill="#1b2a4a" text-anchor="middle">FunctionRegistry</text>
  <text x="370" y="118" font-size="9" fill="#5b7db1" text-anchor="middle">按名查 Function</text>
  <text x="370" y="134" font-size="8.5" fill="#9aa8bd" text-anchor="middle">registry.h:46 · 名字唯一</text>

  <rect x="510" y="76" width="200" height="70" rx="10" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#s8)"/>
  <text x="610" y="100" font-size="11" font-weight="700" fill="#1b2a4a" text-anchor="middle">DispatchExact(types)</text>
  <text x="610" y="118" font-size="9" fill="#5b7db1" text-anchor="middle">按参数类型选 Kernel</text>
  <text x="610" y="134" font-size="8.5" fill="#9aa8bd" text-anchor="middle">function.h:193（不匹配→隐式 cast）</text>

  <rect x="750" y="76" width="180" height="70" rx="10" fill="#f5faf6" stroke="#bfe6cd" filter="url(#s8)"/>
  <text x="840" y="100" font-size="11" font-weight="700" fill="#1c6b45" text-anchor="middle">Kernel::exec</text>
  <text x="840" y="118" font-size="9" fill="#2f7d57" text-anchor="middle">在 buffer 上批量算</text>
  <text x="840" y="134" font-size="8.5" fill="#8a9a8f" text-anchor="middle">kernel.h:510</text>

  <line x1="230" y1="111" x2="270" y2="111" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#h1)"/>
  <line x1="470" y1="111" x2="510" y2="111" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#h1)"/>
  <line x1="710" y1="111" x2="750" y2="111" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#h1)"/>

  <!-- Function 5 类 -->
  <text x="30" y="180" font-size="11.5" font-weight="700" fill="#1c6b45">Function::Kind 五类（function.h:146）</text>
  <g font-size="8.5" text-anchor="middle">
    <rect x="30" y="192" width="176" height="56" rx="7" fill="#fff" stroke="#cdeadb"/><text x="118" y="212" font-weight="600" fill="#1c6b45">SCALAR</text><text x="118" y="228" fill="#4a4a4f">逐元素：add/abs</text><text x="118" y="242" fill="#8a9a8f">输出长度=输入</text>
    <rect x="214" y="192" width="176" height="56" rx="7" fill="#fff" stroke="#cdeadb"/><text x="302" y="212" font-weight="600" fill="#1c6b45">VECTOR</text><text x="302" y="228" fill="#4a4a4f">整列相关：sort/unique</text><text x="302" y="242" fill="#8a9a8f">依赖全数组值</text>
    <rect x="398" y="192" width="176" height="56" rx="7" fill="#fff" stroke="#cdeadb"/><text x="486" y="212" font-weight="600" fill="#1c6b45">SCALAR_AGGREGATE</text><text x="486" y="228" fill="#4a4a4f">汇总：sum/min/max</text><text x="486" y="242" fill="#8a9a8f">数组→标量</text>
    <rect x="582" y="192" width="176" height="56" rx="7" fill="#fff" stroke="#cdeadb"/><text x="670" y="212" font-weight="600" fill="#1c6b45">HASH_AGGREGATE</text><text x="670" y="228" fill="#4a4a4f">分组：group by</text><text x="670" y="242" fill="#8a9a8f">带 group id</text>
    <rect x="766" y="192" width="164" height="56" rx="7" fill="#fff" stroke="#cdeadb"/><text x="848" y="212" font-weight="600" fill="#1c6b45">META</text><text x="848" y="228" fill="#4a4a4f">派发到其它函数</text><text x="848" y="242" fill="#8a9a8f">自身无 kernel</text>
  </g>

  <!-- 为什么快 -->
  <rect x="30" y="272" width="900" height="118" rx="12" fill="#eafaf1" stroke="#b8e6cd" filter="url(#s8)"/>
  <text x="46" y="294" font-size="11" font-weight="700" fill="#1c6b45">为什么向量化快（就地在列式 buffer 上）</text>
  <text x="46" y="315" font-size="9.5" fill="#2f7d57">· 同列同类型定长值连续紧排 → 一条 SIMD 指令处理多个值；无逐行虚调用、无类型分支（类型已在 DispatchExact 定死）。</text>
  <text x="46" y="334" font-size="9.5" fill="#2f7d57">· 空值批处理：validity bitmap 按字（word）扫描，全 valid 的块走无分支快路径；输出常直接复用输入 validity。</text>
  <text x="46" y="353" font-size="9.5" fill="#2f7d57">· 输出 buffer 从 MemoryPool 一次分配（长度已知），无逐元素 append 扩容。</text>
  <text x="46" y="372" font-size="9.5" fill="#2f7d57">· Datum 统一表示 Array/ChunkedArray/Scalar/RecordBatch/Table → 同一函数适配多种输入形态。</text>

  <rect x="30" y="406" width="900" height="76" rx="12" fill="#fbf2ea" stroke="#e6cdae"/>
  <text x="46" y="428" font-size="10.5" font-weight="700" fill="#b0651f">与格式的耦合</text>
  <text x="46" y="448" font-size="9.5" fill="#5a4a3a">compute 不复制数据：直接读 ArrayData 的 buffers、写新 buffers；能复用输入 validity 时连空值都不重算（data.h:73-77 例）。</text>
  <text x="46" y="467" font-size="9.5" fill="#5a4a3a">这正是"列式布局利于向量化"的兑现处 —— 格式（buffer 紧排 + 对齐）与计算（SIMD 批处理）互为因果。</text>
</svg>
