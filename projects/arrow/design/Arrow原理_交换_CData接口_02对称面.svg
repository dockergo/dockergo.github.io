<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="c2a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8a5cae"/></marker>
    <filter id="c2s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="980" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="700" fill="#1d1d1f">对称的 Export / Import 四层次面 · 一端填结构体，另一端建视图（c/bridge.h）</text>
  <text x="30" y="50" font-size="10.5" fill="#6e6e73">逻辑类型 / 数据 / 批 / 批流 四层各有成对函数；中间的 C 结构体是唯一媒介，方向对调即双向零拷贝路径</text>

  <text x="174" y="80" font-size="11" font-weight="700" fill="#1c6b45" text-anchor="middle">① Export（生产者填结构体 · 递 buffers 指针）</text>
  <text x="490" y="80" font-size="11" font-weight="700" fill="#3c1361" text-anchor="middle">ABI 稳定 C 结构体（唯一媒介）</text>
  <text x="806" y="80" font-size="11" font-weight="700" fill="#1b2a4a" text-anchor="middle">② Import（消费者按结构体建视图）</text>

  <!-- Row A -->
  <rect x="40" y="90" width="268" height="104" rx="10" fill="#f5faf6" stroke="#bfe6cd" filter="url(#c2s)"/>
  <text x="54" y="110" font-size="10" font-weight="700" fill="#1c6b45">逻辑类型 / Field / Schema</text>
  <text x="54" y="131" font-size="9" fill="#2f7d57">ExportType（bridge.h:48）</text>
  <text x="54" y="150" font-size="9" fill="#2f7d57">ExportField（bridge.h:55）</text>
  <text x="54" y="169" font-size="9" fill="#2f7d57">ExportSchema（bridge.h:62）</text>
  <text x="54" y="187" font-size="8.5" fill="#8a9a8f">填 format / flags / children</text>

  <rect x="356" y="90" width="268" height="104" rx="10" fill="#f1e8fb" stroke="#d3bef0" filter="url(#c2s)"/>
  <text x="370" y="110" font-size="10" font-weight="700" fill="#3c1361">struct ArrowSchema（abi.h:50）</text>
  <text x="370" y="131" font-size="9" fill="#6f3ea8">format / name / metadata / flags</text>
  <text x="370" y="150" font-size="9" fill="#6f3ea8">children / dictionary</text>
  <text x="370" y="169" font-size="8.5" fill="#8a6dae">release 回调 · private_data</text>
  <text x="370" y="187" font-size="8.5" fill="#9a86c0">描述"类型"</text>

  <rect x="672" y="90" width="268" height="104" rx="10" fill="#eef4fb" stroke="#cddcf0" filter="url(#c2s)"/>
  <text x="686" y="110" font-size="10" font-weight="700" fill="#1b2a4a">逻辑类型 / Field / Schema</text>
  <text x="686" y="131" font-size="9" fill="#5b7db1">ImportType（bridge.h:97）</text>
  <text x="686" y="150" font-size="9" fill="#5b7db1">ImportField（bridge.h:107）</text>
  <text x="686" y="169" font-size="9" fill="#5b7db1">ImportSchema（bridge.h:117）</text>
  <text x="686" y="187" font-size="8.5" fill="#9aa8bd">按结构体重建视图</text>

  <line x1="308" y1="142" x2="356" y2="142" stroke="#8a5cae" stroke-width="1.6" marker-end="url(#c2a)"/>
  <text x="332" y="135" font-size="8" fill="#8a5cae" text-anchor="middle">填</text>
  <line x1="624" y1="142" x2="672" y2="142" stroke="#8a5cae" stroke-width="1.6" marker-end="url(#c2a)"/>
  <text x="648" y="135" font-size="8" fill="#8a5cae" text-anchor="middle">读</text>

  <!-- Row B -->
  <rect x="40" y="212" width="268" height="104" rx="10" fill="#f5faf6" stroke="#bfe6cd" filter="url(#c2s)"/>
  <text x="54" y="232" font-size="10" font-weight="700" fill="#1c6b45">一批列数据 / RecordBatch</text>
  <text x="54" y="253" font-size="9" fill="#2f7d57">ExportArray（bridge.h:73）</text>
  <text x="54" y="272" font-size="9" fill="#2f7d57">ExportRecordBatch（bridge.h:86）</text>
  <text x="54" y="291" font-size="8.5" fill="#8a9a8f">buffers 指针填入 · private_data</text>
  <text x="54" y="308" font-size="8.5" fill="#8a9a8f">藏 shared_ptr 保活（引用计数 +1）</text>

  <rect x="356" y="212" width="268" height="104" rx="10" fill="#f1e8fb" stroke="#d3bef0" filter="url(#c2s)"/>
  <text x="370" y="232" font-size="10" font-weight="700" fill="#3c1361">struct ArrowArray（abi.h:66）</text>
  <text x="370" y="253" font-size="9" fill="#6f3ea8">length / null_count / offset</text>
  <text x="370" y="272" font-size="9" fill="#6f3ea8">const void** buffers（← 指针）</text>
  <text x="370" y="291" font-size="8.5" fill="#8a6dae">children · release · private_data</text>
  <text x="370" y="308" font-size="8.5" fill="#9a86c0">描述"数据"，与 ArrayData 一一对应</text>

  <rect x="672" y="212" width="268" height="104" rx="10" fill="#eef4fb" stroke="#cddcf0" filter="url(#c2s)"/>
  <text x="686" y="232" font-size="10" font-weight="700" fill="#1b2a4a">一批列数据 / RecordBatch</text>
  <text x="686" y="253" font-size="9" fill="#5b7db1">ImportArray（bridge.h:128）</text>
  <text x="686" y="272" font-size="9" fill="#5b7db1">ImportRecordBatch（bridge.h:153）</text>
  <text x="686" y="291" font-size="8.5" fill="#9aa8bd">直接读 buffers 指向的字节</text>
  <text x="686" y="308" font-size="8.5" fill="#9aa8bd">用完调 release → 引用计数 -1</text>

  <line x1="308" y1="264" x2="356" y2="264" stroke="#8a5cae" stroke-width="1.6" marker-end="url(#c2a)"/>
  <line x1="624" y1="264" x2="672" y2="264" stroke="#8a5cae" stroke-width="1.6" marker-end="url(#c2a)"/>

  <!-- Row C -->
  <rect x="40" y="334" width="268" height="92" rx="10" fill="#f5faf6" stroke="#bfe6cd" filter="url(#c2s)"/>
  <text x="54" y="354" font-size="10" font-weight="700" fill="#1c6b45">批流 / 设备</text>
  <text x="54" y="375" font-size="9" fill="#2f7d57">ExportRecordBatchReader（bridge.h:311）</text>
  <text x="54" y="394" font-size="9" fill="#2f7d57">ExportDeviceArray（bridge.h:192）</text>
  <text x="54" y="413" font-size="8.5" fill="#8a9a8f">一串批共享统一 schema</text>

  <rect x="356" y="334" width="268" height="92" rx="10" fill="#f1e8fb" stroke="#d3bef0" filter="url(#c2s)"/>
  <text x="370" y="354" font-size="10" font-weight="700" fill="#3c1361">struct ArrowArrayStream（abi.h:161）</text>
  <text x="370" y="375" font-size="9" fill="#6f3ea8">get_schema / get_next / release</text>
  <text x="370" y="394" font-size="8.5" fill="#8a6dae">get_next 返回已 release 空 array = 流结束</text>
  <text x="370" y="413" font-size="8.5" fill="#9a86c0">批次流版本，与单 Array 同一套语义</text>

  <rect x="672" y="334" width="268" height="92" rx="10" fill="#eef4fb" stroke="#cddcf0" filter="url(#c2s)"/>
  <text x="686" y="354" font-size="10" font-weight="700" fill="#1b2a4a">批流</text>
  <text x="686" y="375" font-size="9" fill="#5b7db1">ImportRecordBatchReader（bridge.h:358）</text>
  <text x="686" y="394" font-size="8.5" fill="#9aa8bd">接成 Arrow C++ RecordBatchReader</text>
  <text x="686" y="413" font-size="8.5" fill="#9aa8bd">跨语言流式 RecordBatch 管道</text>

  <line x1="308" y1="380" x2="356" y2="380" stroke="#8a5cae" stroke-width="1.6" marker-end="url(#c2a)"/>
  <line x1="624" y1="380" x2="672" y2="380" stroke="#8a5cae" stroke-width="1.6" marker-end="url(#c2a)"/>

  <rect x="40" y="440" width="900" height="52" rx="11" fill="#fbf2ea" stroke="#e6cdae"/>
  <text x="54" y="460" font-size="10" font-weight="700" fill="#b0651f">所有权自动接管 · 双向对称</text>
  <text x="54" y="477" font-size="9" fill="#5a4a3a">Import 返回的 shared_ptr 析构时自动回调 C 结构体 release（无需手动）；方向对调即 pyarrow ↔ DuckDB 同一套零拷贝路径。设备版 ArrowDeviceArray（abi.h:140）/ ArrowDeviceArrayStream（abi.h:207）加 device_type + 同步事件，延伸到 GPU 显存。</text>
</svg>
