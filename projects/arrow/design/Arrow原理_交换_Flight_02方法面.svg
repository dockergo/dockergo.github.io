<svg xmlns="http://www.w3.org/2000/svg" width="980" height="440" viewBox="0 0 980 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="fl2s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="980" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="700" fill="#1d1d1f">完整 RPC 方法面 · 不止取数（flight/server.h）</text>
  <text x="30" y="50" font-size="10.5" fill="#6e6e73">FlightServerBase 上一整套动作，按发现 / 取数 / 写入 / 扩展分组；数据编码全托管给 IPC</text>

  <!-- 发现 -->
  <rect x="30" y="76" width="222" height="200" rx="12" fill="#eef4fb" stroke="#cddcf0" filter="url(#fl2s)"/>
  <text x="141" y="98" font-size="11" font-weight="700" fill="#1b2a4a" text-anchor="middle">发现 / 元信息</text>
  <rect x="44" y="110" width="194" height="36" rx="7" fill="#fff" stroke="#cddcf0"/>
  <text x="54" y="126" font-size="9" font-weight="700" fill="#1b2a4a">ListFlights（:248）</text>
  <text x="54" y="139" font-size="8" fill="#5b7db1">列出可提供的数据集</text>
  <rect x="44" y="152" width="194" height="36" rx="7" fill="#fff" stroke="#cddcf0"/>
  <text x="54" y="168" font-size="9" font-weight="700" fill="#1b2a4a">GetFlightInfo（:257）</text>
  <text x="54" y="181" font-size="8" fill="#5b7db1">问路，返回 endpoints + Ticket</text>
  <rect x="44" y="194" width="194" height="36" rx="7" fill="#fff" stroke="#cddcf0"/>
  <text x="54" y="210" font-size="9" font-weight="700" fill="#1b2a4a">PollFlightInfo（:267）</text>
  <text x="54" y="223" font-size="8" fill="#5b7db1">轮询长任务进度</text>
  <rect x="44" y="236" width="194" height="36" rx="7" fill="#fff" stroke="#cddcf0"/>
  <text x="54" y="252" font-size="9" font-weight="700" fill="#1b2a4a">GetSchema（:276）</text>
  <text x="54" y="265" font-size="8" fill="#5b7db1">只取 Schema，不拉数据</text>

  <!-- 取数 -->
  <rect x="268" y="76" width="222" height="120" rx="12" fill="#f5faf6" stroke="#bfe6cd" filter="url(#fl2s)"/>
  <text x="379" y="98" font-size="11" font-weight="700" fill="#1c6b45" text-anchor="middle">取数（读）</text>
  <rect x="282" y="110" width="194" height="72" rx="7" fill="#fff" stroke="#bfe6cd"/>
  <text x="292" y="128" font-size="9.5" font-weight="700" fill="#1c6b45">DoGet(Ticket)（:285）</text>
  <text x="292" y="145" font-size="8.5" fill="#2f7d57">凭票拉一条 RecordBatch 流</text>
  <text x="292" y="161" font-size="8.5" fill="#2f7d57">FlightDataStream（:46）</text>
  <text x="292" y="176" font-size="8.5" fill="#2f7d57">RecordBatchStream（:64）转 FlightData</text>

  <!-- 写入 -->
  <rect x="268" y="208" width="222" height="120" rx="12" fill="#f4eefb" stroke="#d9c9ef" filter="url(#fl2s)"/>
  <text x="379" y="230" font-size="11" font-weight="700" fill="#3c1361" text-anchor="middle">写入 / 双向</text>
  <rect x="282" y="242" width="194" height="36" rx="7" fill="#fff" stroke="#d9c9ef"/>
  <text x="292" y="258" font-size="9" font-weight="700" fill="#3c1361">DoPut（:293）</text>
  <text x="292" y="271" font-size="8" fill="#6f3ea8">客户端向服务端推批流</text>
  <rect x="282" y="284" width="194" height="36" rx="7" fill="#fff" stroke="#d9c9ef"/>
  <text x="292" y="300" font-size="9" font-weight="700" fill="#3c1361">DoExchange（:302）</text>
  <text x="292" y="313" font-size="8" fill="#6f3ea8">全双工双向批流</text>

  <!-- 扩展 -->
  <rect x="506" y="76" width="222" height="120" rx="12" fill="#fbf2ea" stroke="#e6cdae" filter="url(#fl2s)"/>
  <text x="617" y="98" font-size="11" font-weight="700" fill="#b0651f" text-anchor="middle">扩展点</text>
  <rect x="520" y="110" width="194" height="72" rx="7" fill="#fff" stroke="#e6cdae"/>
  <text x="530" y="128" font-size="9.5" font-weight="700" fill="#b0651f">DoAction（:311）</text>
  <text x="530" y="145" font-size="8.5" fill="#5a4a3a">执行自定义动作</text>
  <text x="530" y="161" font-size="8.5" fill="#5a4a3a">DDL / 控制命令等</text>
  <text x="530" y="176" font-size="8.5" fill="#8a7a5a">Flight SQL 把 SQL 编码成 Action 走这</text>

  <!-- 客户端侧 -->
  <rect x="506" y="208" width="222" height="120" rx="12" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#fl2s)"/>
  <text x="617" y="230" font-size="11" font-weight="700" fill="#1b2a4a" text-anchor="middle">客户端侧（client.h）</text>
  <text x="520" y="252" font-size="9" fill="#5b7db1">Authenticate（:205）认证握手</text>
  <text x="520" y="271" font-size="9" fill="#5b7db1">GetFlightInfoAsync（:280）异步变体</text>
  <text x="520" y="290" font-size="8.5" fill="#8a9ab5">回调 / Future 避免阻塞线程</text>
  <text x="520" y="309" font-size="8.5" fill="#8a9ab5">与服务端各 RPC 一一对应</text>

  <!-- IPC 托管 -->
  <rect x="744" y="76" width="206" height="252" rx="12" fill="#f5faf6" stroke="#bfe6cd" filter="url(#fl2s)"/>
  <text x="847" y="98" font-size="11" font-weight="700" fill="#1c6b45" text-anchor="middle">数据编码托管给 IPC</text>
  <text x="758" y="122" font-size="9" fill="#2f7d57">FlightPayload（types.h:893）</text>
  <text x="758" y="140" font-size="9" fill="#2f7d57">字段含 ipc::IpcPayload</text>
  <text x="758" y="164" font-size="8.5" fill="#2f7d57">每个 FlightData 的 payload</text>
  <text x="758" y="180" font-size="8.5" fill="#2f7d57">就是 IPC 编码的 RecordBatch</text>
  <text x="758" y="204" font-size="8.5" fill="#8a9a8f">收端还原即得 buffers</text>
  <text x="758" y="220" font-size="8.5" fill="#8a9a8f">与内存布局同构，无行↔列转换</text>
  <line x1="758" y1="234" x2="936" y2="234" stroke="#bfe6cd" stroke-width="1"/>
  <text x="758" y="254" font-size="8.5" fill="#1c6b45">Flight 只管：gRPC 流式帧</text>
  <text x="758" y="270" font-size="8.5" fill="#1c6b45">Ticket / descriptor 路由</text>
  <text x="758" y="286" font-size="8.5" fill="#1c6b45">认证握手</text>
  <text x="758" y="310" font-size="8" fill="#8a9a8f">→ 零拷贝底色被完整继承</text>

  <rect x="30" y="344" width="920" height="80" rx="12" fill="#f6f6f8" stroke="#e2e2e7"/>
  <text x="46" y="366" font-size="10.5" font-weight="700" fill="#1d1d1f">两段式 · 水平扩展</text>
  <text x="46" y="387" font-size="9.5" fill="#4a4a4f">① GetFlightInfo 问路 → FlightInfo 一次给出全部 FlightEndpoint（每个带 Ticket + 可选 Location）；② DoGet 凭票拉流。</text>
  <text x="46" y="406" font-size="9.5" fill="#4a4a4f">数据可分布多 endpoint → 客户端并行拉取、水平扩展；本质是"把 IPC 批送上网络"，取代逐行 ODBC/JDBC。</text>
</svg>
