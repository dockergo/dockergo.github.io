<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="960" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="700" fill="#1d1d1f">依赖矩阵 · 谁立于谁之上（被依赖度越高越接近“灵魂”）</text>
  <text x="30" y="50" font-size="10.5" fill="#6e6e73">读法：行 = 上层能力，列 = 下层基石；● 强依赖　○ 间接依赖。列式 Array 与 Buffer 是被依赖最广的两格</text>

  <!-- 列头 -->
  <text x="300" y="86" font-size="10" font-weight="700" fill="#8a6d3b" text-anchor="middle">Buffer/MemoryPool</text>
  <text x="440" y="86" font-size="10" font-weight="700" fill="#1c6b45" text-anchor="middle">列式 Array/ArrayData</text>
  <text x="580" y="86" font-size="10" font-weight="700" fill="#1b2a4a" text-anchor="middle">DataType/Schema</text>
  <text x="720" y="86" font-size="10" font-weight="700" fill="#1c6b45" text-anchor="middle">RecordBatch/Table</text>
  <text x="860" y="86" font-size="10" font-weight="700" fill="#6f3ea8" text-anchor="middle">IPC 编码</text>

  <!-- 行 -->
  <g font-size="10" fill="#3a3a3c">
    <rect x="30" y="98" width="900" height="36" rx="7" fill="#f5faf6" stroke="#e2e2e7"/>
    <text x="40" y="121">列式 Array / ArrayData（灵魂）</text>
    <text x="300" y="121" text-anchor="middle" font-size="13" fill="#c99a3a">●</text>
    <text x="580" y="121" text-anchor="middle" font-size="13" fill="#5b7db1">●</text>

    <rect x="30" y="138" width="900" height="36" rx="7" fill="#fff" stroke="#e2e2e7"/>
    <text x="40" y="161">RecordBatch / Table / ChunkedArray</text>
    <text x="440" y="161" text-anchor="middle" font-size="13" fill="#2f9e6e">●</text>
    <text x="580" y="161" text-anchor="middle" font-size="13" fill="#5b7db1">●</text>

    <rect x="30" y="178" width="900" height="36" rx="7" fill="#f5faf6" stroke="#e2e2e7"/>
    <text x="40" y="201">compute 向量化内核</text>
    <text x="440" y="201" text-anchor="middle" font-size="13" fill="#2f9e6e">●</text>
    <text x="580" y="201" text-anchor="middle" font-size="11" fill="#9aa8bd">○</text>

    <rect x="30" y="218" width="900" height="36" rx="7" fill="#fff" stroke="#e2e2e7"/>
    <text x="40" y="241">Acero 流式执行引擎</text>
    <text x="440" y="241" text-anchor="middle" font-size="11" fill="#9aa8bd">○</text>
    <text x="720" y="241" text-anchor="middle" font-size="13" fill="#2f9e6e">●</text>

    <rect x="30" y="258" width="900" height="36" rx="7" fill="#f5faf6" stroke="#e2e2e7"/>
    <text x="40" y="281">IPC 格式（进程 / 文件）</text>
    <text x="440" y="281" text-anchor="middle" font-size="13" fill="#2f9e6e">●</text>
    <text x="580" y="281" text-anchor="middle" font-size="13" fill="#5b7db1">●</text>

    <rect x="30" y="298" width="900" height="36" rx="7" fill="#fff" stroke="#e2e2e7"/>
    <text x="40" y="321">C Data Interface（跨语言）</text>
    <text x="440" y="321" text-anchor="middle" font-size="13" fill="#2f9e6e">●</text>
    <text x="580" y="321" text-anchor="middle" font-size="13" fill="#5b7db1">●</text>

    <rect x="30" y="338" width="900" height="36" rx="7" fill="#f5faf6" stroke="#e2e2e7"/>
    <text x="40" y="361">Flight RPC（跨网络）</text>
    <text x="720" y="361" text-anchor="middle" font-size="13" fill="#2f9e6e">●</text>
    <text x="860" y="361" text-anchor="middle" font-size="13" fill="#6f3ea8">●</text>
  </g>

  <rect x="30" y="392" width="900" height="98" rx="12" fill="#fbf2ea" stroke="#e6cdae"/>
  <text x="46" y="415" font-size="11" font-weight="700" fill="#b0651f">结论</text>
  <text x="46" y="436" font-size="10" fill="#5a4a3a">① 列式 Array/ArrayData 被 compute / IPC / C-Data / Flight 全线依赖 —— 它塌了全盘皆停，故定为灵魂。</text>
  <text x="46" y="455" font-size="10" fill="#5a4a3a">② Buffer/MemoryPool 是最底基石：一切列数据的字节都由它对齐分配、引用计数持有、零拷贝切片。</text>
  <text x="46" y="474" font-size="10" fill="#5a4a3a">③ 交换三件套（IPC / C-Data / Flight）不各造轮子：C-Data 定义内存 ABI，IPC 定义落字节，Flight 把 IPC 批送上网络。</text>
</svg>
