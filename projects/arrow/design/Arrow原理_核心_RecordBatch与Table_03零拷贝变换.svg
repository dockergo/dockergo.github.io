<svg xmlns="http://www.w3.org/2000/svg" width="980" height="470" viewBox="0 0 980 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="rzg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="rzr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c0564e"/></marker>
    <filter id="rzs" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="980" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="700" fill="#1d1d1f">组表层变换 · 皆零拷贝或浅拷贝，唯 CombineChunks 是显式物化（真复制）</text>
  <text x="30" y="50" font-size="10.5" fill="#6e6e73">SelectColumns / Slice / AddColumn / RemoveColumn 只重组元数据、共享同一批列 Buffer；下游要连续内存时才 CombineChunks</text>

  <g font-size="10">
    <line x1="30" y1="64" x2="54" y2="64" stroke="#2f9e6e" stroke-width="1.8" stroke-dasharray="4 3" marker-end="url(#rzg)"/><text x="60" y="68" fill="#3a3a3c">引用共享（零拷贝）</text>
    <line x1="240" y1="64" x2="264" y2="64" stroke="#c0564e" stroke-width="1.8" marker-end="url(#rzr)"/><text x="270" y="68" fill="#3a3a3c">真实拷贝（物化）</text>
  </g>

  <!-- 变换卡片行 -->
  <g>
    <rect x="30" y="86" width="160" height="66" rx="10" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#rzs)"/>
    <text x="110" y="110" font-size="11" font-weight="700" fill="#1b2a4a" text-anchor="middle">SelectColumns</text>
    <text x="110" y="128" font-size="9" fill="#5b7db1" text-anchor="middle">挑列引用重组</text>
    <text x="110" y="143" font-size="8.5" fill="#8a9ab5" text-anchor="middle">选 [A, C]</text>

    <rect x="206" y="86" width="160" height="66" rx="10" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#rzs)"/>
    <text x="286" y="110" font-size="11" font-weight="700" fill="#1b2a4a" text-anchor="middle">Slice(off, len)</text>
    <text x="286" y="128" font-size="9" fill="#5b7db1" text-anchor="middle">各列同步切片</text>
    <text x="286" y="143" font-size="8.5" fill="#8a9ab5" text-anchor="middle">只改 offset/length</text>

    <rect x="382" y="86" width="160" height="66" rx="10" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#rzs)"/>
    <text x="462" y="110" font-size="11" font-weight="700" fill="#1b2a4a" text-anchor="middle">AddColumn</text>
    <text x="462" y="128" font-size="9" fill="#5b7db1" text-anchor="middle">列指针增删</text>
    <text x="462" y="143" font-size="8.5" fill="#8a9ab5" text-anchor="middle">＋列 D</text>

    <rect x="558" y="86" width="160" height="66" rx="10" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#rzs)"/>
    <text x="638" y="110" font-size="11" font-weight="700" fill="#1b2a4a" text-anchor="middle">RemoveColumn</text>
    <text x="638" y="128" font-size="9" fill="#5b7db1" text-anchor="middle">列指针增删</text>
    <text x="638" y="143" font-size="8.5" fill="#8a9ab5" text-anchor="middle">－列 B</text>

    <rect x="734" y="86" width="216" height="66" rx="10" fill="#fbf2ea" stroke="#e6cdae" filter="url(#rzs)"/>
    <text x="842" y="108" font-size="11" font-weight="700" fill="#8a5a1f" text-anchor="middle">CombineChunks</text>
    <text x="842" y="126" font-size="9" fill="#b0651f" text-anchor="middle">多 chunk 合并成单块</text>
    <text x="842" y="141" font-size="8.5" fill="#c0564e" text-anchor="middle">一次真实拷贝 · 显式物化</text>
  </g>

  <!-- 共享列 Buffer 带 -->
  <rect x="30" y="248" width="688" height="118" rx="12" fill="#eafaf1" stroke="#b8e6cd" filter="url(#rzs)"/>
  <text x="46" y="270" font-size="11" font-weight="700" fill="#1c6b45">底层列 Buffer（shared_ptr，一份内存被多个变换结果共享）</text>
  <g text-anchor="middle" font-size="11" font-weight="700">
    <rect x="60" y="284" width="120" height="64" rx="8" fill="#d9f2e4" stroke="#9ed9ba"/><text x="120" y="312" fill="#1c6b45">列 A</text><text x="120" y="332" font-size="8.5" font-weight="400" fill="#2f7d57">validity+value</text>
    <rect x="196" y="284" width="120" height="64" rx="8" fill="#d9f2e4" stroke="#9ed9ba"/><text x="256" y="312" fill="#1c6b45">列 B</text><text x="256" y="332" font-size="8.5" font-weight="400" fill="#2f7d57">validity+value</text>
    <rect x="332" y="284" width="120" height="64" rx="8" fill="#d9f2e4" stroke="#9ed9ba"/><text x="392" y="312" fill="#1c6b45">列 C</text><text x="392" y="332" font-size="8.5" font-weight="400" fill="#2f7d57">validity+value</text>
    <rect x="468" y="284" width="120" height="64" rx="8" fill="#d9f2e4" stroke="#9ed9ba"/><text x="528" y="312" fill="#1c6b45">列 D</text><text x="528" y="332" font-size="8.5" font-weight="400" fill="#2f7d57">新列指针</text>
  </g>
  <text x="662" y="316" font-size="9" fill="#2f7d57" text-anchor="middle">每次变换</text>
  <text x="662" y="331" font-size="9" fill="#2f7d57" text-anchor="middle">refcount++</text>

  <!-- 零拷贝箭头（虚线绿）-->
  <line x1="110" y1="152" x2="120" y2="282" stroke="#2f9e6e" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#rzg)"/>
  <line x1="286" y1="152" x2="256" y2="282" stroke="#2f9e6e" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#rzg)"/>
  <line x1="462" y1="152" x2="528" y2="282" stroke="#2f9e6e" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#rzg)"/>
  <line x1="638" y1="152" x2="392" y2="282" stroke="#2f9e6e" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#rzg)"/>

  <!-- 物化：CombineChunks 真复制到新连续块 -->
  <rect x="742" y="248" width="208" height="118" rx="12" fill="#fbf2ea" stroke="#e6cdae" filter="url(#rzs)"/>
  <text x="846" y="270" font-size="10.5" font-weight="700" fill="#8a5a1f" text-anchor="middle">新连续 Buffer（物化后）</text>
  <g text-anchor="middle" font-size="10">
    <rect x="762" y="286" width="168" height="30" rx="6" fill="#fdeecf" stroke="#e6c98a"/><text x="846" y="306" fill="#b0651f">chunk0 ＋ chunk1 → 单块</text>
  </g>
  <text x="846" y="336" font-size="9" fill="#8a6d3b" text-anchor="middle">碎片化多 chunk 合并成连续</text>
  <text x="846" y="351" font-size="9" fill="#8a6d3b" text-anchor="middle">供需连续内存的下游 kernel</text>
  <line x1="842" y1="152" x2="846" y2="246" stroke="#c0564e" stroke-width="1.8" marker-end="url(#rzr)"/>

  <rect x="30" y="392" width="920" height="30" rx="9" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="44" y="412" font-size="9.5" fill="#3a4a63">RecordBatch = Schema + 等长 Array；Table 每列一个 ChunkedArray。绝大多数变换是浅拷贝（重组元数据、共享列 Buffer），唯 CombineChunks / CombineChunksToBatch 显式物化。</text>
  <text x="30" y="444" font-size="9" fill="#8a9ab5">一致性校验统一走 ValidateFull()</text>
</svg>
