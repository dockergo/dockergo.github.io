<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="p1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8a5cae"/></marker>
    <filter id="s3" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="980" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="700" fill="#1d1d1f">C Data Interface · 极小、ABI 稳定的 C struct，跨语言零拷贝递指针（c/abi.h）</text>
  <text x="30" y="50" font-size="10.5" fill="#6e6e73">场景：同进程内，Python(pyarrow) 把一个 Array 交给 DuckDB / Polars —— 不序列化、不拷贝字节，只填两个结构体并移交所有权</text>

  <!-- 生产者 -->
  <rect x="30" y="80" width="250" height="180" rx="12" fill="#f5faf6" stroke="#bfe6cd" filter="url(#s3)"/>
  <text x="155" y="104" font-size="12" font-weight="700" fill="#1c6b45" text-anchor="middle">生产者（如 pyarrow）</text>
  <text x="155" y="126" font-size="9.5" fill="#2f7d57" text-anchor="middle">持有 Arrow C++ Array</text>
  <rect x="50" y="140" width="210" height="46" rx="8" fill="#fff" stroke="#cdeadb"/>
  <text x="155" y="160" font-size="9" fill="#1c6b45" text-anchor="middle">ExportType/ExportArray（bridge.h:62）</text>
  <text x="155" y="176" font-size="9" fill="#1c6b45" text-anchor="middle">填 ArrowSchema + ArrowArray</text>
  <text x="155" y="206" font-size="9" fill="#2f7d57" text-anchor="middle">buffers 指针指向原内存</text>
  <text x="155" y="222" font-size="9" fill="#2f7d57" text-anchor="middle">private_data 存住 shared_ptr</text>
  <text x="155" y="244" font-size="8.5" fill="#8a9a8f" text-anchor="middle">引用计数 +1，内存不释放</text>

  <!-- 两个结构体（中间媒介）-->
  <rect x="330" y="80" width="320" height="180" rx="12" fill="#f1e8fb" stroke="#d3bef0" filter="url(#s3)"/>
  <text x="490" y="102" font-size="11.5" font-weight="700" fill="#3c1361" text-anchor="middle">ABI 稳定的两个 C 结构体（栈上传递）</text>

  <rect x="346" y="112" width="288" height="66" rx="8" fill="#fff" stroke="#d9c9ef"/>
  <text x="356" y="128" font-size="9.5" font-weight="700" fill="#6f3ea8">struct ArrowSchema（abi.h:50）</text>
  <text x="356" y="143" font-size="8.5" fill="#6f3ea8">format / name / metadata / flags</text>
  <text x="356" y="156" font-size="8.5" fill="#6f3ea8">n_children / children / dictionary</text>
  <text x="356" y="171" font-size="8.5" fill="#8a6dae">void (*release)(…)　void* private_data</text>

  <rect x="346" y="184" width="288" height="66" rx="8" fill="#fff" stroke="#d9c9ef"/>
  <text x="356" y="200" font-size="9.5" font-weight="700" fill="#6f3ea8">struct ArrowArray（abi.h:66）</text>
  <text x="356" y="215" font-size="8.5" fill="#6f3ea8">length / null_count / offset / n_buffers</text>
  <text x="356" y="228" font-size="8.5" fill="#6f3ea8">const void** buffers（← 指向原字节）· children · dictionary</text>
  <text x="356" y="243" font-size="8.5" fill="#8a6dae">void (*release)(…)　void* private_data</text>

  <!-- 消费者 -->
  <rect x="700" y="80" width="250" height="180" rx="12" fill="#f5faf6" stroke="#bfe6cd" filter="url(#s3)"/>
  <text x="825" y="104" font-size="12" font-weight="700" fill="#1c6b45" text-anchor="middle">消费者（如 DuckDB）</text>
  <rect x="720" y="120" width="210" height="46" rx="8" fill="#fff" stroke="#cdeadb"/>
  <text x="825" y="140" font-size="9" fill="#1c6b45" text-anchor="middle">ImportType/ImportArray（bridge.h:97）</text>
  <text x="825" y="156" font-size="9" fill="#1c6b45" text-anchor="middle">按结构体重建自己的视图</text>
  <text x="825" y="188" font-size="9" fill="#2f7d57" text-anchor="middle">直接读 buffers 指向的字节</text>
  <text x="825" y="204" font-size="9" fill="#2f7d57" text-anchor="middle">用完调 release 回调</text>
  <text x="825" y="226" font-size="8.5" fill="#8a9a8f" text-anchor="middle">→ 生产者 shared_ptr -1</text>
  <text x="825" y="244" font-size="8.5" fill="#8a9a8f" text-anchor="middle">归零才真正释放内存</text>

  <line x1="280" y1="150" x2="330" y2="150" stroke="#8a5cae" stroke-width="1.8" marker-end="url(#p1)"/>
  <text x="305" y="142" font-size="8" fill="#8a5cae" text-anchor="middle">填</text>
  <line x1="650" y1="150" x2="700" y2="150" stroke="#8a5cae" stroke-width="1.8" marker-end="url(#p1)"/>
  <text x="675" y="142" font-size="8" fill="#8a5cae" text-anchor="middle">读</text>

  <!-- 关键性质 -->
  <rect x="30" y="280" width="450" height="130" rx="11" fill="#f6f6f8" stroke="#e2e2e7"/>
  <text x="46" y="302" font-size="11" font-weight="700" fill="#3c1361">为何是"超能力"</text>
  <text x="46" y="323" font-size="9.5" fill="#4a4a4f">· 定义在一个仅含结构体 + 宏的头文件（abi.h），可 vendored 进任意项目</text>
  <text x="46" y="341" font-size="9.5" fill="#4a4a4f">· 不依赖 Arrow 库、不依赖 C++ ABI —— 任何语言只要能声明 C struct 即可对接</text>
  <text x="46" y="359" font-size="9.5" fill="#4a4a4f">· 零拷贝：buffers 是指针，交换不搬字节；免序列化：不经 protobuf/JSON 编解码</text>
  <text x="46" y="377" font-size="9.5" fill="#4a4a4f">· release 回调 = 明确的所有权移交协议（abi.h:61/78），跨语言也不泄漏内存</text>
  <text x="46" y="399" font-size="8.5" fill="#8a8a90">doc abi.h:20-31：a very small, stable set of C definitions</text>

  <rect x="496" y="280" width="454" height="130" rx="11" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="512" y="302" font-size="11" font-weight="700" fill="#3c1361">ArrowArrayStream（abi.h:161）· 批次流版本</text>
  <text x="512" y="323" font-size="9.5" fill="#6f3ea8">get_schema() → 拿统一 schema</text>
  <text x="512" y="341" font-size="9.5" fill="#6f3ea8">get_next() → 取下一个 ArrowArray；返回已 release 的空 array = 流结束</text>
  <text x="512" y="359" font-size="9.5" fill="#6f3ea8">get_last_error() → 失败时的详情　release() → 释放流自身资源</text>
  <text x="512" y="377" font-size="9.5" fill="#6f3ea8">ImportRecordBatchReader（bridge.h:358）把它接成 Arrow C++ reader</text>
  <text x="512" y="399" font-size="8.5" fill="#9a86c0">= 跨语言的"流式 RecordBatch 管道"，与单个 Array 同一套零拷贝语义</text>

  <rect x="30" y="426" width="920" height="112" rx="11" fill="#fbf2ea" stroke="#e6cdae"/>
  <text x="46" y="448" font-size="10.5" font-weight="700" fill="#b0651f">对照 · 为什么不用序列化</text>
  <text x="46" y="468" font-size="9.5" fill="#5a4a3a">传统跨语言交换（protobuf / JSON / pickle）：内存对象 → 编码成字节 → 拷贝 / 传输 → 解码重建对象，两次遍历 + 两份内存。</text>
  <text x="46" y="487" font-size="9.5" fill="#5a4a3a">C Data Interface：因两端都认同"Arrow 列式内存布局"，生产者只把已有 buffers 的指针填进结构体，消费者按同一布局解读 —— 数据本体一个字节都不动。</text>
  <text x="46" y="506" font-size="9.5" fill="#5a4a3a">这把"跨语言数据交换"从 O(数据量) 降到 O(1)，是 pyarrow / polars / duckdb / cudf 等能无缝互换列的根基。</text>
  <text x="46" y="525" font-size="8.5" fill="#8a7a5a">约束：仅同机 / 同地址空间零拷贝；跨进程用 IPC，跨网络用 Flight（都仍复用同一列式布局）。</text>
</svg>
