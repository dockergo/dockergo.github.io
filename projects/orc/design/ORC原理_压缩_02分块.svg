<svg xmlns="http://www.w3.org/2000/svg" width="980" height="570" viewBox="0 0 980 570" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="980" height="570" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="700" fill="#1d1d1f">ORC 原理 · 压缩 · 256KB 分块 &#43; 3 字节块头</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">压缩不是整流一段，而是按缓冲区大小切块逐块压；每块前 3 字节头带长度，reader 读头即知块长可 seek 到指定块只解那块</text>

  <!-- block size card -->
  <rect x="30" y="72" width="440" height="96" rx="13" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="48" y="96" font-size="11" font-weight="700" fill="#5a3410">压缩块大小 orc.compress.size</text>
  <rect x="48" y="108" width="404" height="46" rx="9" fill="#fbf1dd" stroke="#e8cf9a"/>
  <text x="60" y="128" font-size="10.5" font-weight="700" fill="#5a3410">默认 256KB = 256 * 1024（OrcConf.java:48，BUFFER_SIZE）</text>
  <text x="60" y="145" font-size="8.6" fill="#93762e">读侧同名常量 DEFAULT_COMPRESSION_BLOCK_SIZE = 256 * 1024（ReaderImpl.java:76）</text>

  <!-- tradeoff card -->
  <rect x="490" y="72" width="460" height="96" rx="13" fill="#f7f7f9" stroke="#e3e3e8" filter="url(#soft)"/>
  <text x="508" y="96" font-size="11" font-weight="700" fill="#1d1d1f">块大小权衡</text>
  <text x="508" y="118" font-size="9" fill="#6e6e73">· 调大：压缩率略升，但 seek 粒度变粗、解压放大读</text>
  <text x="508" y="137" font-size="9" fill="#6e6e73">· 调小：seek 更精，但块头开销与 CPU 上升</text>
  <text x="508" y="156" font-size="9" fill="#6e6e73">· 攒满一个缓冲区（256KB）才压出一块并写头</text>

  <!-- 3-byte header bit field -->
  <text x="30" y="204" font-size="12" font-weight="700" fill="#1d1d1f">3 字节块头（OutStream.java:52 HEADER_SIZE=3；writeHeader 小端 OutStream.java:184）</text>
  <text x="30" y="224" font-size="9" fill="#6e6e73">写入的 24 位整数值 = <tspan font-weight="700" fill="#1d1d1f">(长度 &lt;&lt; 1) | isOriginal</tspan>，以小端序占 3 字节：</text>

  <!-- bit layout bar -->
  <rect x="30" y="236" width="770" height="70" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="416" y="256" font-size="9" text-anchor="middle" fill="#5b7db1">← 高 23 位 = 块字节长度（压后或原文长度）——————————————————→</text>
  <rect x="46" y="264" width="700" height="30" rx="6" fill="#e7f0fb" stroke="#bcd0ec"/>
  <text x="396" y="284" font-size="10" font-weight="700" text-anchor="middle" fill="#1b2a4a">length（23 bits）</text>
  <rect x="748" y="264" width="38" height="30" rx="6" fill="#f9ecec" stroke="#e8c9c9"/>
  <text x="767" y="281" font-size="8" text-anchor="middle" fill="#7a2230">isOrig</text>
  <text x="767" y="292" font-size="8" text-anchor="middle" fill="#7a2230">1 bit</text>

  <rect x="812" y="236" width="138" height="70" rx="10" fill="#f9ecec" stroke="#e8c9c9" filter="url(#soft)"/>
  <text x="881" y="258" font-size="9" font-weight="700" text-anchor="middle" fill="#7a2230">低 1 位 isOriginal</text>
  <text x="828" y="278" font-size="8.4" fill="#a85560">0 = 已压缩块</text>
  <text x="828" y="295" font-size="8.4" fill="#a85560">1 = 未压存原文</text>

  <!-- block sequence -->
  <text x="30" y="344" font-size="12" font-weight="700" fill="#1d1d1f">每个 stream 的字节 → "块头 &#43; 块" 序列（各块独立，reader 顺块头即可跳读 / seek）</text>

  <!-- sequence bar -->
  <!-- block 0 -->
  <rect x="30" y="360" width="40" height="60" rx="6" fill="#f9ecec" stroke="#e8c9c9" filter="url(#soft)"/>
  <text x="50" y="386" font-size="8" text-anchor="middle" fill="#7a2230">头0</text>
  <text x="50" y="400" font-size="7" text-anchor="middle" fill="#a85560">3B</text>
  <rect x="72" y="360" width="180" height="60" rx="6" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="162" y="386" font-size="9.5" font-weight="700" text-anchor="middle" fill="#5a3410">压缩块 0</text>
  <text x="162" y="404" font-size="8" text-anchor="middle" fill="#93762e">isOriginal=0 · len 见头</text>

  <!-- block 1 -->
  <rect x="256" y="360" width="40" height="60" rx="6" fill="#f9ecec" stroke="#e8c9c9" filter="url(#soft)"/>
  <text x="276" y="386" font-size="8" text-anchor="middle" fill="#7a2230">头1</text>
  <text x="276" y="400" font-size="7" text-anchor="middle" fill="#a85560">3B</text>
  <rect x="298" y="360" width="150" height="60" rx="6" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="373" y="386" font-size="9.5" font-weight="700" text-anchor="middle" fill="#5a3410">压缩块 1</text>
  <text x="373" y="404" font-size="8" text-anchor="middle" fill="#93762e">isOriginal=0</text>

  <!-- block 2 original -->
  <rect x="452" y="360" width="40" height="60" rx="6" fill="#f9ecec" stroke="#e8c9c9" filter="url(#soft)"/>
  <text x="472" y="386" font-size="8" text-anchor="middle" fill="#7a2230">头2</text>
  <text x="472" y="400" font-size="7" text-anchor="middle" fill="#a85560">3B</text>
  <rect x="494" y="360" width="200" height="60" rx="6" fill="#fbf6ef" stroke="#e6d8c4" filter="url(#soft)"/>
  <text x="594" y="382" font-size="9.5" font-weight="700" text-anchor="middle" fill="#5a3410">原文块 2（压不动）</text>
  <text x="594" y="400" font-size="8" text-anchor="middle" fill="#93762e">isOriginal=1 · 存未压字节</text>

  <!-- more -->
  <rect x="698" y="360" width="40" height="60" rx="6" fill="#f9ecec" stroke="#e8c9c9" filter="url(#soft)"/>
  <text x="718" y="386" font-size="8" text-anchor="middle" fill="#7a2230">头3</text>
  <rect x="740" y="360" width="130" height="60" rx="6" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="805" y="386" font-size="9.5" font-weight="700" text-anchor="middle" fill="#5a3410">压缩块 3</text>
  <text x="880" y="394" font-size="14" fill="#a1a1a6">…</text>

  <!-- seek arrow -->
  <path d="M472,428 L472,452 L594,452" stroke="#c7c7cc" stroke-width="1.4" stroke-dasharray="5 4" fill="none" marker-end="url(#ar)"/>
  <path d="M50,428 L50,452 L162,452" stroke="#c7c7cc" stroke-width="1.4" stroke-dasharray="5 4" fill="none" marker-end="url(#ar)"/>
  <text x="330" y="456" font-size="8.4" text-anchor="middle" fill="#6e6e73">读块头拿到本块长度 → 加偏移即下一块起点 → 可直接 seek 到目标块</text>

  <!-- why chunked -->
  <rect x="30" y="480" width="920" height="72" rx="13" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="48" y="504" font-size="11" font-weight="700" fill="#12402a">为什么分块</text>
  <text x="48" y="526" font-size="9" fill="#2f6f4f">整流压缩必须从头解到目标位置；分块 &#43; 块头长度让 reader 定位到某压缩块起点、只解那块——</text>
  <text x="48" y="544" font-size="9" fill="#2f6f4f">这是【行组与索引】的 row-group 级 seek 能落到字节的前提（positions 给出块内偏移，块头给出块边界）。</text>
</svg>
