<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="600" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="700" fill="#1d1d1f">ORC 原理 · 列编码 · 整数 RLE：v1 vs v2</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">整数用游程编码压重复/规律；v2 按数据分布自动选 4 种子编码之一，压缩率明显优于 v1，是现代 ORC 默认</text>

  <!-- LEFT: RLE v1 -->
  <rect x="30" y="72" width="420" height="216" rx="14" fill="#f7f7f9" stroke="#e3e3e8" filter="url(#soft)"/>
  <text x="50" y="98" font-size="12" font-weight="700" fill="#1d1d1f">RLE v1（Hive 0.11 · 简单）</text>
  <text x="50" y="116" font-size="9" fill="#6e6e73">初始字节的取值把段分成两类：</text>

  <rect x="50" y="128" width="380" height="66" rx="9" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="66" y="148" font-size="10" font-weight="700" fill="#12402a">游程 run（初始字节 0x00–0x7f）</text>
  <text x="66" y="165" font-size="8.6" fill="#2f6f4f">= 长度−3 &#43; 定长 delta（1 字节） &#43; varint base</text>
  <text x="66" y="181" font-size="8.6" fill="#2f6f4f">示例 5,5,5,5 → 一个 run（重复/等差都能压）</text>

  <rect x="50" y="200" width="380" height="66" rx="9" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="66" y="220" font-size="10" font-weight="700" fill="#5a3410">字面量 literal（初始字节 0x80–0xff）</text>
  <text x="66" y="237" font-size="8.6" fill="#93762e">= −count &#43; 逐个 varint 原样存</text>
  <text x="66" y="253" font-size="8.6" fill="#93762e">示例 7,3,9,1 → 直存（无规律时兜底）</text>

  <!-- vs badge -->
  <circle cx="500" cy="180" r="18" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="500" y="185" font-size="11" font-weight="700" text-anchor="middle" fill="#3d2a5a">vs</text>

  <!-- RIGHT: RLE v2 -->
  <rect x="550" y="72" width="420" height="216" rx="14" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="570" y="98" font-size="12" font-weight="700" fill="#12402a">RLE v2（Hive 0.12 · 默认）</text>
  <text x="570" y="116" font-size="9" fill="#2f6f4f">RunLengthIntegerWriterV2.java:123 — 4 子编码</text>
  <text x="570" y="150" font-size="9" fill="#2f6f4f">按数据分布自动选最省的子编码：</text>
  <rect x="570" y="162" width="182" height="46" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="661" y="181" font-size="9.5" font-weight="700" text-anchor="middle" fill="#12402a">SHORT_REPEAT</text>
  <text x="661" y="197" font-size="8" text-anchor="middle" fill="#2f6f4f">短重复串</text>
  <rect x="762" y="162" width="182" height="46" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="853" y="181" font-size="9.5" font-weight="700" text-anchor="middle" fill="#12402a">DIRECT</text>
  <text x="853" y="197" font-size="8" text-anchor="middle" fill="#2f6f4f">无规律直存</text>
  <rect x="570" y="214" width="182" height="46" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="661" y="233" font-size="9.5" font-weight="700" text-anchor="middle" fill="#12402a">PATCHED_BASE</text>
  <text x="661" y="249" font-size="8" text-anchor="middle" fill="#2f6f4f">基值 &#43; 离群补丁</text>
  <rect x="762" y="214" width="182" height="46" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="853" y="233" font-size="9.5" font-weight="700" text-anchor="middle" fill="#12402a">DELTA</text>
  <text x="853" y="249" font-size="8" text-anchor="middle" fill="#2f6f4f">等差序列</text>
  <rect x="570" y="266" width="374" height="16" rx="5" fill="#f5faf6" stroke="none"/>
  <text x="570" y="278" font-size="8.4" fill="#2f6f4f">MAX_SCOPE = 512（单编码块最大跨度） · MIN_REPEAT = 3（触发重复编码的最短游程）</text>

  <!-- bottom: v2 4 subencodings suited data shapes -->
  <text x="30" y="322" font-size="12" font-weight="700" fill="#1d1d1f">v2 四子编码各自适合的数据形态（写侧按分布探测后自动挑最省的）</text>

  <!-- SHORT_REPEAT -->
  <rect x="30" y="338" width="228" height="234" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="46" y="362" font-size="10.5" font-weight="700" fill="#12402a">SHORT_REPEAT</text>
  <text x="46" y="380" font-size="8.6" fill="#2f6f4f">同一小整数重复 3–10 次</text>
  <rect x="46" y="392" width="196" height="30" rx="7" fill="#fff" stroke="#d7ecdd"/>
  <text x="144" y="411" font-size="9" text-anchor="middle" fill="#12402a">7,7,7,7,7</text>
  <text x="46" y="444" font-size="8.4" fill="#2f6f4f">编码：1 字节头（宽度 &#43;</text>
  <text x="46" y="459" font-size="8.4" fill="#2f6f4f">次数） &#43; 1 个值</text>
  <text x="46" y="484" font-size="8.4" fill="#6e6e73">最省：极短游程，头都不用</text>
  <text x="46" y="499" font-size="8.4" fill="#6e6e73">MIN_REPEAT。</text>
  <rect x="46" y="516" width="196" height="40" rx="8" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="144" y="540" font-size="8.6" text-anchor="middle" fill="#12402a">形态：短重复</text>

  <!-- DIRECT -->
  <rect x="270" y="338" width="228" height="234" rx="13" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="286" y="362" font-size="10.5" font-weight="700" fill="#5a3410">DIRECT</text>
  <text x="286" y="380" font-size="8.6" fill="#93762e">无规律 / 高熵整数</text>
  <rect x="286" y="392" width="196" height="30" rx="7" fill="#fff" stroke="#eaddc0"/>
  <text x="384" y="411" font-size="9" text-anchor="middle" fill="#5a3410">3,91,7,42,18</text>
  <text x="286" y="444" font-size="8.4" fill="#93762e">编码：定长位宽逐个直存</text>
  <text x="286" y="459" font-size="8.4" fill="#93762e">（位宽取本块最大值所需）</text>
  <text x="286" y="484" font-size="8.4" fill="#6e6e73">兜底：既不重复也不等差、</text>
  <text x="286" y="499" font-size="8.4" fill="#6e6e73">也无集中离群时用它。</text>
  <rect x="286" y="516" width="196" height="40" rx="8" fill="#fbf6ef" stroke="#e6d8c4"/>
  <text x="384" y="540" font-size="8.6" text-anchor="middle" fill="#5a3410">形态：直存</text>

  <!-- PATCHED_BASE -->
  <rect x="510" y="338" width="228" height="234" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="526" y="362" font-size="10.5" font-weight="700" fill="#1b2a4a">PATCHED_BASE</text>
  <text x="526" y="380" font-size="8.6" fill="#5b7db1">大多小、少数离群大</text>
  <rect x="526" y="392" width="196" height="30" rx="7" fill="#fff" stroke="#cfe0f2"/>
  <text x="624" y="411" font-size="9" text-anchor="middle" fill="#1b2a4a">5,6,4,7,9999,5</text>
  <text x="526" y="444" font-size="8.4" fill="#5b7db1">编码：减去 base 用窄位宽，</text>
  <text x="526" y="459" font-size="8.4" fill="#5b7db1">离群值单独走补丁列</text>
  <text x="526" y="484" font-size="8.4" fill="#6e6e73">最省：不让个别离群值把</text>
  <text x="526" y="499" font-size="8.4" fill="#6e6e73">整块位宽撑大。</text>
  <rect x="526" y="516" width="196" height="40" rx="8" fill="#e7f0fb" stroke="#bcd0ec"/>
  <text x="624" y="540" font-size="8.6" text-anchor="middle" fill="#1b2a4a">形态：基值 &#43; 离群补丁</text>

  <!-- DELTA -->
  <rect x="750" y="338" width="220" height="234" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="766" y="362" font-size="10.5" font-weight="700" fill="#3d2a5a">DELTA</text>
  <text x="766" y="380" font-size="8.6" fill="#8a6db3">等差 / 单调递增</text>
  <rect x="766" y="392" width="188" height="30" rx="7" fill="#fff" stroke="#e3d3f2"/>
  <text x="860" y="411" font-size="9" text-anchor="middle" fill="#3d2a5a">10,12,14,16,18</text>
  <text x="766" y="444" font-size="8.4" fill="#8a6db3">编码：存 base &#43; 定长/变长</text>
  <text x="766" y="459" font-size="8.4" fill="#8a6db3">delta 序列（差值窄）</text>
  <text x="766" y="484" font-size="8.4" fill="#6e6e73">最省：自增主键、时间戳</text>
  <text x="766" y="499" font-size="8.4" fill="#6e6e73">这类规律递增列。</text>
  <rect x="766" y="516" width="188" height="40" rx="8" fill="#f9f3fe" stroke="#d9c7ec"/>
  <text x="860" y="540" font-size="8.6" text-anchor="middle" fill="#3d2a5a">形态：等差</text>
</svg>
