<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1000" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">ORC 写路径 · TreeWriter 树:与类型树同构,每列一个 writer</text>

  <text x="30" y="58" font-size="10.5" fill="#6e6e73">示例 schema: <tspan font-weight="600" fill="#3d2a5a">struct&lt;id:int, name:string, tags:list&lt;string&gt;&gt;</tspan></text>

  <!-- panel headers -->
  <text x="267" y="82" font-size="11" font-weight="600" fill="#8a6db3" text-anchor="middle">类型树 (schema)</text>
  <text x="757" y="82" font-size="11" font-weight="600" fill="#5b7db1" text-anchor="middle">TreeWriter 树 (WriterImpl 建)</text>

  <!-- ===== central isomorphism arrow between roots ===== -->
  <path d="M345,111 L672,111" stroke="#c7c7cc" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <text x="508" y="102" font-size="9.5" fill="#a1a1a6" text-anchor="middle">同构镜像 · TreeWriter.create 按 category 分派</text>

  <!-- ============ LEFT: type tree (purple) ============ -->
  <!-- connectors -->
  <path d="M267,134 L267,165 L122,165 L122,188" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M267,134 L267,188" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M267,134 L267,165 L412,165 L412,188" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M412,240 L412,298" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- root struct -->
  <rect x="190" y="88" width="155" height="46" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="267" y="107" font-size="12" font-weight="600" fill="#3d2a5a" text-anchor="middle">STRUCT (root)</text>
  <text x="267" y="124" font-size="9" fill="#8a6db3" text-anchor="middle">col0</text>

  <!-- children -->
  <rect x="55" y="188" width="135" height="52" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="122" y="209" font-size="11.5" font-weight="600" fill="#3d2a5a" text-anchor="middle">id : int</text>
  <text x="122" y="227" font-size="9" fill="#8a6db3" text-anchor="middle">col1 · 原始类型</text>

  <rect x="200" y="188" width="135" height="52" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="267" y="209" font-size="11.5" font-weight="600" fill="#3d2a5a" text-anchor="middle">name : string</text>
  <text x="267" y="227" font-size="9" fill="#8a6db3" text-anchor="middle">col2 · 原始类型</text>

  <rect x="345" y="188" width="135" height="52" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="412" y="209" font-size="11.5" font-weight="600" fill="#3d2a5a" text-anchor="middle">tags : list</text>
  <text x="412" y="227" font-size="9" fill="#8a6db3" text-anchor="middle">col3 · 嵌套(递归)</text>

  <!-- list element -->
  <rect x="345" y="298" width="135" height="52" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="412" y="319" font-size="11.5" font-weight="600" fill="#3d2a5a" text-anchor="middle">element : string</text>
  <text x="412" y="337" font-size="9" fill="#8a6db3" text-anchor="middle">col4 · list 子类型</text>

  <!-- ============ RIGHT: TreeWriter tree (blue) ============ -->
  <path d="M757,134 L757,165 L612,165 L612,188" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M757,134 L757,188" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M757,134 L757,165 L902,165 L902,188" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M902,240 L902,298" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- root StructTreeWriter -->
  <rect x="672" y="88" width="170" height="46" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="757" y="107" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">StructTreeWriter</text>
  <text x="757" y="124" font-size="9" fill="#5b7db1" text-anchor="middle">col0 · 递归 Factory.create</text>

  <!-- children writers -->
  <rect x="545" y="188" width="135" height="52" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="612" y="209" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">LongTreeWriter</text>
  <text x="612" y="227" font-size="9" fill="#5b7db1" text-anchor="middle">col1 · stream+统计</text>

  <rect x="690" y="188" width="135" height="52" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="757" y="209" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">StringTreeWriter</text>
  <text x="757" y="227" font-size="9" fill="#5b7db1" text-anchor="middle">col2 · stream+统计</text>

  <rect x="835" y="188" width="135" height="52" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="902" y="209" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">ListTreeWriter</text>
  <text x="902" y="227" font-size="9" fill="#5b7db1" text-anchor="middle">col3 · 递归建子 writer</text>

  <rect x="835" y="298" width="135" height="52" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="902" y="319" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">StringTreeWriter</text>
  <text x="902" y="337" font-size="9" fill="#5b7db1" text-anchor="middle">col4 · list 元素 writer</text>

  <!-- ===== bottom notes ===== -->
  <rect x="55" y="392" width="890" height="140" rx="12" fill="#f7f7f9" stroke="#e3e3e8"/>
  <text x="75" y="416" font-size="11" font-weight="600" fill="#1d1d1f">机制要点</text>

  <text x="75" y="442" font-size="10.5" fill="#1d1d1f"><tspan font-weight="600">① 分派建树</tspan>:TreeWriter.create(writer/TreeWriter.java:124) 按 schema.getCategory 分派(:148)——原始类型建对应 writer,</text>
  <text x="75" y="460" font-size="10.5" fill="#1d1d1f">STRUCT 建 StructTreeWriter 并 Factory.create 递归建每个子字段 writer;list/map/union 同理递归。</text>

  <text x="75" y="486" font-size="10.5" fill="#1d1d1f"><tspan font-weight="600">② 各归其位</tspan>:每个 TreeWriterBase(writer/TreeWriterBase.java:52) 持自己的输出 stream(PRESENT / DATA / …) 与统计累加器,与列 ID 一一对应。</text>

  <text x="75" y="512" font-size="10.5" fill="#1d1d1f"><tspan font-weight="600">③ 列式并行</tspan>:写一批时 StructTreeWriter 把批里各列分派给对应子 writer——<tspan font-weight="600" fill="#5b7db1">列式并行编码</tspan>,而非逐行;嵌套类型写入天然递归。</text>
</svg>
