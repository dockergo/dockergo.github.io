<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="536" viewBox="0 0 1080 536" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="536" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">ORC 原理 · 从尾倒读（一次小 IO 拿全文件地图）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">reader 从文件尾倒读:末字节→postscript 长度→解析 postscript 得 footer 长度+压缩→解压 footer 得全部 stripe 位置/类型/统计</text>

  <!-- file byte bar with tail-read window -->
  <text x="30" y="78" font-size="9.5" fill="#6e6e73">文件字节流（尾部含全图索引）</text>
  <rect x="30" y="86" width="620" height="40" rx="10" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="340" y="110" font-size="9.6" text-anchor="middle" fill="#93762e">header + stripes …（文件主体，不在首读范围内）</text>

  <rect x="656" y="86" width="394" height="40" rx="10" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="853" y="103" font-size="9.4" font-weight="700" text-anchor="middle" fill="#12402a">末 16KB 首读窗口（DIRECTORY_SIZE_GUESS）</text>
  <text x="853" y="118" font-size="8.4" text-anchor="middle" fill="#2f6f4f">赌一次读到 footer + postscript</text>
  <rect x="1016" y="86" width="34" height="40" rx="6" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="1033" y="104" font-size="8" text-anchor="middle" fill="#3d2a5a">末</text>
  <text x="1033" y="116" font-size="8" text-anchor="middle" fill="#3d2a5a">字节</text>

  <!-- 4 reverse-read steps -->
  <!-- step 1 -->
  <rect x="30" y="156" width="248" height="150" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="46" y="180" font-size="11" font-weight="700" fill="#3d2a5a">① 读末 16KB</text>
  <text x="46" y="202" font-size="8.8" fill="#8a6db3">reader 先读文件尾 16KB</text>
  <text x="46" y="220" font-size="8.8" fill="#8a6db3">DIRECTORY_SIZE_GUESS = 16*1024</text>
  <rect x="46" y="246" width="216" height="46" rx="8" fill="#f9f2ff" stroke="#e4d3f5"/>
  <text x="154" y="265" font-size="8.4" text-anchor="middle" fill="#8a6db3">一次小 IO，通常够拿到</text>
  <text x="154" y="281" font-size="8.4" text-anchor="middle" fill="#8a6db3">footer + postscript 两段</text>

  <!-- step 2 -->
  <rect x="298" y="156" width="248" height="150" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="314" y="180" font-size="11" font-weight="700" fill="#1b2a4a">② 末字节 → postscript 长度</text>
  <text x="314" y="200" font-size="8.8" fill="#5b7db1">读窗口最后 1 字节</text>
  <text x="314" y="216" font-size="8.8" fill="#5b7db1">= postscript 的长度（必 &lt;256）</text>
  <text x="314" y="232" font-size="8.8" fill="#5b7db1">向前截出 postscript 段</text>
  <rect x="314" y="246" width="216" height="46" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="422" y="265" font-size="8.4" text-anchor="middle" fill="#274a78">postscript 不压缩，</text>
  <text x="422" y="281" font-size="8.4" text-anchor="middle" fill="#274a78">可直接解析（自举起点）</text>

  <!-- step 3 -->
  <rect x="566" y="156" width="248" height="150" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="582" y="180" font-size="11" font-weight="700" fill="#1b2a4a">③ 解析 postscript</text>
  <text x="582" y="200" font-size="8.8" fill="#5b7db1">解 postscript（proto，不压缩）</text>
  <text x="582" y="216" font-size="8.8" fill="#5b7db1">得 footerLength（footer 长度）</text>
  <text x="582" y="232" font-size="8.8" fill="#5b7db1">得 compression（压缩方式）</text>
  <rect x="582" y="246" width="216" height="46" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="690" y="265" font-size="8.4" text-anchor="middle" fill="#274a78">知道 footer 有多长、</text>
  <text x="690" y="281" font-size="8.4" text-anchor="middle" fill="#274a78">用哪种压缩才能解开它</text>

  <!-- step 4 -->
  <rect x="834" y="156" width="216" height="150" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="850" y="180" font-size="11" font-weight="700" fill="#12402a">④ 解压 footer</text>
  <text x="850" y="200" font-size="8.8" fill="#2f6f4f">按 footer 长度解压 footer</text>
  <text x="850" y="216" font-size="8.8" fill="#2f6f4f">按声明压缩方式还原</text>
  <rect x="850" y="230" width="184" height="62" rx="8" fill="#f2fbf6" stroke="#cdeadb"/>
  <text x="942" y="249" font-size="8.4" text-anchor="middle" fill="#2f6f4f">得全部 stripe 位置</text>
  <text x="942" y="265" font-size="8.4" text-anchor="middle" fill="#2f6f4f">+ 类型树 types[]</text>
  <text x="942" y="281" font-size="8.4" text-anchor="middle" fill="#2f6f4f">+ 文件级统计 → 全图就绪</text>

  <!-- step connectors -->
  <path d="M278,231 L298,231" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M546,231 L566,231" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M814,231 L834,231" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- window → step1 connector -->
  <path d="M853,126 L853,140 L154,140 L154,156" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>

  <!-- why reverse-read -->
  <rect x="30" y="326" width="1020" height="120" rx="14" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="348" font-size="11" font-weight="700" fill="#1d1d1f">为什么倒读？（尾部索引 + 倒读 = 写单遍 + 读一次小 IO 拿全图）</text>

  <rect x="46" y="360" width="492" height="74" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="62" y="382" font-size="10" font-weight="700" fill="#5a3410">写侧：footer 在尾 → 支持写单遍</text>
  <text x="62" y="401" font-size="8.8" fill="#93762e">写时才知全部 stripe;边写 stripe 边攒信息,</text>
  <text x="62" y="417" font-size="8.8" fill="#93762e">最后一次写 footer——无需回头改文件头,顺序写出。</text>

  <rect x="562" y="360" width="488" height="74" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="578" y="382" font-size="10" font-weight="700" fill="#12402a">读侧：一次尾读拿全图 → 极省 IO</text>
  <text x="578" y="401" font-size="8.8" fill="#2f6f4f">末 16KB 常够 footer+postscript;拿到全部 stripe</text>
  <text x="578" y="417" font-size="8.8" fill="#2f6f4f">位置后,再按需读列 stream(超大 footer 才二次读)。</text>

  <path d="M538,397 L562,397" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <text x="30" y="470" font-size="8.6" fill="#a1a1a6">C++ 镜像:readPostscript、ensureOrcFooter——与 Java ReaderImpl 同构，倒读逻辑一致。</text>
  <text x="30" y="500" font-size="9" fill="#a1a1a6">一句话:倒读靠"末字节自表 postscript 长度(&lt;256)"自举 → postscript 给 footer 长度+压缩 → 解压 footer 得全图;尾部索引让写单遍、读一次小 IO 拿全文件地图</text>
</svg>
