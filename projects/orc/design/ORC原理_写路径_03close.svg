<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="660" viewBox="0 0 1000 660" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1000" height="660" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">ORC 写路径 · close 收尾步骤链 与 最终文件尾部布局</text>

  <text x="50" y="60" font-size="11" font-weight="600" fill="#2f6f4f">close 收尾步骤 (WriterImpl.java:804)</text>
  <text x="600" y="60" font-size="11" font-weight="600" fill="#93762e">最终 ORC 文件布局 (从头到尾)</text>

  <!-- ===== LEFT: close step chain (green flow) ===== -->
  <path d="M230,122 L230,146" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M230,198 L230,224" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M230,276 L230,302" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M230,384 L230,410" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="50" y="78" width="360" height="44" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="230" y="105" font-size="12" font-weight="600" fill="#12402a" text-anchor="middle">close 触发收尾 (WriterImpl.java:804)</text>

  <rect x="50" y="146" width="360" height="52" rx="11" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="230" y="167" font-size="11.5" font-weight="600" fill="#12402a" text-anchor="middle">① flushStripe 落最后未满 stripe (:813)</text>
  <text x="230" y="185" font-size="9" fill="#2f6f4f" text-anchor="middle">末 stripe 落盘</text>

  <rect x="50" y="224" width="360" height="52" rx="11" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="230" y="245" font-size="11.5" font-weight="600" fill="#12402a" text-anchor="middle">② writeFileStatistics (:707)</text>
  <text x="230" y="263" font-size="9" fill="#2f6f4f" text-anchor="middle">汇总文件级统计</text>

  <rect x="50" y="302" width="360" height="82" rx="11" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="230" y="322" font-size="11.5" font-weight="600" fill="#12402a" text-anchor="middle">③ writeFooter (:691)</text>
  <text x="230" y="343" font-size="9.5" fill="#2f6f4f" text-anchor="middle">writeMetadata(:624) — stripe 级统计</text>
  <text x="230" y="362" font-size="9.5" fill="#2f6f4f" text-anchor="middle">writeFileFooter(:718) — 类型树 / stripe 目录 / 文件统计</text>

  <rect x="50" y="410" width="360" height="60" rx="11" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="230" y="432" font-size="11.5" font-weight="600" fill="#12402a" text-anchor="middle">④ writePostScript (:630 / PhysicalFsWriter:475)</text>
  <text x="230" y="450" font-size="9.5" fill="#2f6f4f" text-anchor="middle">压缩方式 · footer 长度 · 版本</text>
  <text x="230" y="464" font-size="9" fill="#2f6f4f" text-anchor="middle">末字节 = postscript 长度</text>

  <!-- ===== RIGHT: file layout (amber storage) ===== -->
  <rect x="600" y="92" width="340" height="32" rx="6" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="770" y="112" font-size="10.5" font-weight="600" fill="#5a3410" text-anchor="middle">magic "ORC" (3 字节, 文件开头)</text>

  <rect x="600" y="124" width="340" height="124" rx="6" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="770" y="172" font-size="11.5" font-weight="600" fill="#5a3410" text-anchor="middle">stripe 1 · stripe 2 · … · stripe N</text>
  <text x="770" y="192" font-size="9" fill="#93762e" text-anchor="middle">每 stripe = 各列 stream + row index + stripe footer</text>
  <text x="770" y="212" font-size="9" fill="#93762e" text-anchor="middle">(数据主体, 边写边落)</text>

  <rect x="600" y="248" width="340" height="44" rx="6" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="770" y="270" font-size="11" font-weight="600" fill="#5a3410" text-anchor="middle">Metadata</text>
  <text x="770" y="285" font-size="9" fill="#93762e" text-anchor="middle">stripe 级统计</text>

  <rect x="600" y="292" width="340" height="66" rx="6" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="770" y="314" font-size="11" font-weight="600" fill="#5a3410" text-anchor="middle">File Footer</text>
  <text x="770" y="331" font-size="9" fill="#93762e" text-anchor="middle">类型树 · stripe 目录(偏移/长度)</text>
  <text x="770" y="346" font-size="9" fill="#93762e" text-anchor="middle">文件级统计</text>

  <rect x="600" y="358" width="340" height="42" rx="6" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="770" y="379" font-size="11" font-weight="600" fill="#5a3410" text-anchor="middle">PostScript</text>
  <text x="770" y="393" font-size="9" fill="#93762e" text-anchor="middle">压缩方式 · footer 长度 · 版本 (不压缩)</text>

  <rect x="600" y="400" width="340" height="30" rx="6" fill="#f9ecec" stroke="#e8c9c9"/>
  <text x="770" y="420" font-size="10" font-weight="600" fill="#7a2230" text-anchor="middle">末字节 = PostScript 长度 (reader 倒读入口)</text>

  <!-- ===== mapping dashed arrows (step → produced block) ===== -->
  <path d="M410,172 L505,172 L505,186 L600,186" stroke="#c7c7cc" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#ar)"/>
  <text x="530" y="166" font-size="9" fill="#a1a1a6" text-anchor="middle">落 stripe</text>
  <path d="M410,332 L470,332 L470,270 L600,270" stroke="#c7c7cc" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#ar)"/>
  <path d="M410,360 L490,360 L490,325 L600,325" stroke="#c7c7cc" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#ar)"/>
  <path d="M410,440 L525,440 L525,379 L600,379" stroke="#c7c7cc" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#ar)"/>

  <!-- ===== bottom notes ===== -->
  <rect x="50" y="492" width="890" height="150" rx="12" fill="#f7f7f9" stroke="#e3e3e8"/>
  <text x="70" y="516" font-size="11" font-weight="600" fill="#1d1d1f">机制要点</text>
  <text x="70" y="542" font-size="10.5" fill="#1d1d1f"><tspan font-weight="600">收尾链</tspan>:close(:804) 先 flushStripe(:813) 落末 stripe → writeFileStatistics(:707) → writeFooter(:691) = writeMetadata(:624, stripe 统计)</text>
  <text x="70" y="560" font-size="10.5" fill="#1d1d1f">+ writeFileFooter(:718, 类型树/stripe 目录/文件统计) → writePostScript(:630 / PhysicalFsWriter:475, 压缩方式/footer 长度, 末字节 = 其长度)。</text>
  <text x="70" y="586" font-size="10.5" fill="#1d1d1f"><tspan font-weight="600">开头 magic</tspan>:3 字节 "ORC"(PhysicalFsWriter.java:717, OrcFile.MAGIC) 在建 writer 时已写。</text>
  <text x="70" y="612" font-size="10.5" fill="#1d1d1f"><tspan font-weight="600">为什么尾部写</tspan>:写时行数/stripe 边界事先未知,写完才知全貌;尾部索引 + 末字节长度让 reader 倒读一次小 IO 拿全图。</text>
</svg>
