<svg xmlns="http://www.w3.org/2000/svg" width="980" height="590" viewBox="0 0 980 590" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="980" height="590" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="700" fill="#1d1d1f">ORC 原理 · 列编码 · 一列拆多个 Stream 分工</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">一列不是一个 stream，而是按需拆成多个 Stream.Kind：null 位图 / 值 / 长度 / 字典各自独立压缩、按需读取</text>

  <!-- source column -->
  <rect x="34" y="150" width="158" height="256" rx="14" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="113" y="180" font-size="12" font-weight="700" text-anchor="middle" fill="#3d2a5a">一列 col_i</text>
  <text x="113" y="200" font-size="8.6" text-anchor="middle" fill="#8a6db3">（如 string 类型）</text>
  <rect x="52" y="216" width="122" height="26" rx="7" fill="#faf6fe" stroke="#e3d3f2"/>
  <text x="113" y="233" font-size="8.6" text-anchor="middle" fill="#3d2a5a">"CN" · null · "US"</text>
  <rect x="52" y="248" width="122" height="26" rx="7" fill="#faf6fe" stroke="#e3d3f2"/>
  <text x="113" y="265" font-size="8.6" text-anchor="middle" fill="#3d2a5a">"CN" · "JP" · …</text>
  <text x="113" y="300" font-size="8.6" text-anchor="middle" fill="#8a6db3">同列值相邻 →</text>
  <text x="113" y="316" font-size="8.6" text-anchor="middle" fill="#8a6db3">分 stream 各压最优</text>
  <rect x="52" y="330" width="122" height="60" rx="8" fill="#faf6fe" stroke="#e3d3f2"/>
  <text x="113" y="349" font-size="8.4" text-anchor="middle" fill="#8a6db3">null 走 PRESENT，</text>
  <text x="113" y="364" font-size="8.4" text-anchor="middle" fill="#8a6db3">DATA 只存非 null 值</text>
  <text x="113" y="379" font-size="8.4" text-anchor="middle" fill="#8a6db3">— 稀疏列省很多</text>

  <!-- distribution bus -->
  <path d="M192,278 L228,278" stroke="#c7c7cc" stroke-width="1.4" fill="none"/>
  <path d="M228,112 L228,470" stroke="#c7c7cc" stroke-width="1.4" fill="none"/>

  <!-- stream rows -->
  <!-- PRESENT -->
  <path d="M228,120 L286,120" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <rect x="288" y="98" width="604" height="44" rx="10" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <circle cx="312" cy="120" r="12" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="312" y="124" font-size="10" font-weight="700" text-anchor="middle" fill="#12402a">0</text>
  <text x="336" y="116" font-size="10.5" font-weight="700" fill="#12402a">PRESENT</text>
  <text x="336" y="132" font-size="8.6" fill="#2f6f4f">null 位图：标每行是否非 null（全非 null 时省略）</text>
  <text x="878" y="124" font-size="8.4" text-anchor="end" fill="#2f6f4f">位图</text>

  <!-- DATA -->
  <path d="M228,170 L286,170" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <rect x="288" y="148" width="604" height="44" rx="10" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <circle cx="312" cy="170" r="12" fill="#fbf1dd" stroke="#e8cf9a"/>
  <text x="312" y="174" font-size="10" font-weight="700" text-anchor="middle" fill="#5a3410">1</text>
  <text x="336" y="166" font-size="10.5" font-weight="700" fill="#5a3410">DATA</text>
  <text x="336" y="182" font-size="8.6" fill="#93762e">主数据：值本身，或字典编码时存整数字典引用</text>
  <text x="878" y="174" font-size="8.4" text-anchor="end" fill="#93762e">主流</text>

  <!-- LENGTH -->
  <path d="M228,220 L286,220" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <rect x="288" y="198" width="604" height="44" rx="10" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <circle cx="312" cy="220" r="12" fill="#fbf1dd" stroke="#e8cf9a"/>
  <text x="312" y="224" font-size="10" font-weight="700" text-anchor="middle" fill="#5a3410">2</text>
  <text x="336" y="216" font-size="10.5" font-weight="700" fill="#5a3410">LENGTH</text>
  <text x="336" y="232" font-size="8.6" fill="#93762e">变长值（string / list / map）的每项长度</text>
  <text x="878" y="224" font-size="8.4" text-anchor="end" fill="#93762e">变长</text>

  <!-- DICTIONARY_DATA -->
  <path d="M228,270 L286,270" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <rect x="288" y="248" width="604" height="44" rx="10" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <circle cx="312" cy="270" r="12" fill="#f9f3fe" stroke="#d9c7ec"/>
  <text x="312" y="274" font-size="10" font-weight="700" text-anchor="middle" fill="#3d2a5a">3</text>
  <text x="336" y="266" font-size="10.5" font-weight="700" fill="#3d2a5a">DICTIONARY_DATA</text>
  <text x="490" y="266" font-size="8.6" fill="#8a6db3">字符串字典：排序后的唯一值 blob（仅字典编码时有）</text>
  <text x="878" y="274" font-size="8.4" text-anchor="end" fill="#8a6db3">字典</text>

  <!-- SECONDARY -->
  <path d="M228,320 L286,320" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <rect x="288" y="298" width="604" height="44" rx="10" fill="#f7f7f9" stroke="#e3e3e8" filter="url(#soft)"/>
  <circle cx="312" cy="320" r="12" fill="#f0f0f3" stroke="#d8d8dd"/>
  <text x="312" y="324" font-size="10" font-weight="700" text-anchor="middle" fill="#1d1d1f">5</text>
  <text x="336" y="316" font-size="10.5" font-weight="700" fill="#1d1d1f">SECONDARY</text>
  <text x="336" y="332" font-size="8.6" fill="#6e6e73">辅助流：decimal 的 scale、timestamp 的纳秒部分</text>
  <text x="878" y="324" font-size="8.4" text-anchor="end" fill="#6e6e73">辅助</text>

  <!-- ROW_INDEX -->
  <path d="M228,370 L286,370" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <rect x="288" y="348" width="604" height="44" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <circle cx="312" cy="370" r="12" fill="#e7f0fb" stroke="#bcd0ec"/>
  <text x="312" y="374" font-size="10" font-weight="700" text-anchor="middle" fill="#1b2a4a">6</text>
  <text x="336" y="366" font-size="10.5" font-weight="700" fill="#1b2a4a">ROW_INDEX</text>
  <text x="336" y="382" font-size="8.6" fill="#5b7db1">row-group 索引：每组的统计 + seek 位置（供细粒度跳读）</text>
  <text x="878" y="374" font-size="8.4" text-anchor="end" fill="#5b7db1">索引</text>

  <!-- BLOOM -->
  <path d="M228,420 L286,420" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <rect x="288" y="398" width="604" height="44" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <circle cx="312" cy="420" r="12" fill="#e7f0fb" stroke="#bcd0ec"/>
  <text x="312" y="424" font-size="9" font-weight="700" text-anchor="middle" fill="#1b2a4a">7·8</text>
  <text x="336" y="416" font-size="10.5" font-weight="700" fill="#1b2a4a">BLOOM_FILTER / BLOOM_FILTER_UTF8</text>
  <text x="612" y="416" font-size="8.6" fill="#5b7db1">布隆过滤器：等值谓词快速排除（UTF8 版按字符串编码）</text>
  <text x="878" y="424" font-size="8.4" text-anchor="end" fill="#5b7db1">布隆</text>

  <!-- ColumnEncoding row -->
  <rect x="34" y="470" width="858" height="96" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="52" y="494" font-size="11" font-weight="700" fill="#1b2a4a">ColumnEncoding.Kind — 每列在 stripe footer 记自己的编码（决定 DATA/LENGTH 走哪版 RLE、是否字典）</text>
  <rect x="52" y="506" width="196" height="48" rx="9" fill="#e7f0fb" stroke="#bcd0ec"/>
  <text x="150" y="526" font-size="10" font-weight="700" text-anchor="middle" fill="#1b2a4a">DIRECT (0)</text>
  <text x="150" y="543" font-size="8.4" text-anchor="middle" fill="#5b7db1">直存 · RLE v1</text>
  <rect x="258" y="506" width="196" height="48" rx="9" fill="#e7f0fb" stroke="#bcd0ec"/>
  <text x="356" y="526" font-size="10" font-weight="700" text-anchor="middle" fill="#1b2a4a">DICTIONARY (1)</text>
  <text x="356" y="543" font-size="8.4" text-anchor="middle" fill="#5b7db1">字典 · RLE v1</text>
  <rect x="464" y="506" width="196" height="48" rx="9" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="562" y="526" font-size="10" font-weight="700" text-anchor="middle" fill="#12402a">DIRECT_V2 (2)</text>
  <text x="562" y="543" font-size="8.4" text-anchor="middle" fill="#2f6f4f">直存 · RLE v2（默认）</text>
  <rect x="670" y="506" width="204" height="48" rx="9" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="772" y="526" font-size="10" font-weight="700" text-anchor="middle" fill="#12402a">DICTIONARY_V2 (3)</text>
  <text x="772" y="543" font-size="8.4" text-anchor="middle" fill="#2f6f4f">字典 · RLE v2（默认）</text>
</svg>
