<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="530" viewBox="0 0 1080 530" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="530" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">ORC 原理 · 文件布局（四段字节流）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">单个 .orc 文件 = header + stripes + footer + postscript 四段;magic "ORC" 出现两次(header 头 + postscript 尾)双重确认文件类型</text>

  <!-- byte stream axis label -->
  <text x="30" y="80" font-size="9.5" fill="#6e6e73">文件偏移 →（从 0 到 EOF，尾部索引段在最后）</text>

  <!-- the 4-segment byte bar -->
  <rect x="30" y="90" width="90" height="56" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="75" y="114" font-size="10.5" font-weight="700" text-anchor="middle" fill="#1b2a4a">header</text>
  <text x="75" y="132" font-size="8.4" text-anchor="middle" fill="#5b7db1">3B "ORC"</text>

  <rect x="126" y="90" width="560" height="56" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="406" y="114" font-size="10.5" font-weight="700" text-anchor="middle" fill="#5a3410">stripes（文件主体 · 多个自包含行组，默认 64MB）</text>
  <text x="406" y="132" font-size="8.4" text-anchor="middle" fill="#93762e">stripe 0 … stripe 1 … stripe N-1（每个含一批行的列数据）</text>

  <rect x="692" y="90" width="230" height="56" rx="11" fill="#e7f0fb" stroke="#b9d2ef" filter="url(#soft)"/>
  <text x="807" y="114" font-size="10.5" font-weight="700" text-anchor="middle" fill="#1b2a4a">footer</text>
  <text x="807" y="132" font-size="8.4" text-anchor="middle" fill="#5b7db1">文件级元数据（可压缩）</text>

  <rect x="928" y="90" width="122" height="56" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="989" y="112" font-size="10.5" font-weight="700" text-anchor="middle" fill="#3d2a5a">postscript</text>
  <text x="989" y="130" font-size="8.2" text-anchor="middle" fill="#8a6db3">不压缩 · 末字节=其长度</text>

  <!-- EOF marker -->
  <text x="1050" y="82" font-size="8.4" text-anchor="end" fill="#a1a1a6">EOF ↑ 末 1 字节</text>

  <!-- magic twice callout -->
  <path d="M75,146 L75,168 L989,168 L989,146" stroke="#c7c7cc" stroke-width="1.4" fill="none"/>
  <rect x="452" y="156" width="176" height="24" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="540" y="172" font-size="9" font-weight="600" text-anchor="middle" fill="#12402a">magic "ORC" 两处校验 ensureOrcFooter</text>

  <!-- detail cards row -->
  <!-- header detail -->
  <rect x="30" y="196" width="243" height="300" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="218" font-size="11" font-weight="700" fill="#1b2a4a">① header</text>
  <text x="46" y="238" font-size="9" fill="#5b7db1">3 字节 magic <tspan font-weight="600" fill="#1b2a4a">"ORC"</tspan></text>
  <text x="46" y="256" font-size="9" fill="#5b7db1">headerLength = 3（恒定）</text>
  <text x="46" y="274" font-size="9" fill="#5b7db1">标识这是一个 ORC 文件</text>
  <rect x="46" y="288" width="211" height="26" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="151" y="305" font-size="8.4" text-anchor="middle" fill="#274a78">占位起点</text>
  <text x="46" y="336" font-size="8.4" fill="#8e8e93">作用：读时校验头部 magic，</text>
  <text x="46" y="352" font-size="8.4" fill="#8e8e93">与 postscript 内 magic 双重确认，</text>
  <text x="46" y="368" font-size="8.4" fill="#8e8e93">防止误读非 ORC 文件。</text>

  <!-- stripes detail -->
  <rect x="285" y="196" width="243" height="300" rx="13" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="301" y="218" font-size="11" font-weight="700" fill="#5a3410">② stripes</text>
  <text x="301" y="238" font-size="9" fill="#93762e">多个 stripe（行组）</text>
  <text x="301" y="256" font-size="9" fill="#93762e">默认 <tspan font-weight="600" fill="#5a3410">64MB</tspan> / stripe</text>
  <text x="301" y="274" font-size="9" fill="#93762e">每个自包含一批行的列数据</text>
  <rect x="301" y="288" width="211" height="70" rx="8" fill="#fbf6ef" stroke="#e6d8c4"/>
  <text x="406" y="307" font-size="8.6" font-weight="600" text-anchor="middle" fill="#5a3410">stripe 内三部分</text>
  <text x="406" y="324" font-size="8.2" text-anchor="middle" fill="#93762e">index streams（行索引+统计）</text>
  <text x="406" y="339" font-size="8.2" text-anchor="middle" fill="#93762e">+ data streams（列数据）</text>
  <text x="406" y="352" font-size="8.2" text-anchor="middle" fill="#93762e">+ stripe footer</text>
  <text x="301" y="380" font-size="8.4" fill="#8e8e93">不跨行边界 → 每 stripe 可</text>
  <text x="301" y="396" font-size="8.4" fill="#8e8e93">独立读、并行读、按统计跳读。</text>

  <!-- footer detail -->
  <rect x="540" y="196" width="243" height="300" rx="13" fill="#e7f0fb" stroke="#b9d2ef" filter="url(#soft)"/>
  <text x="556" y="218" font-size="11" font-weight="700" fill="#1b2a4a">③ file footer</text>
  <text x="556" y="238" font-size="8.8" fill="#5b7db1">headerLength · contentLength</text>
  <text x="556" y="256" font-size="8.8" fill="#5b7db1">stripes[]（每个 StripeInformation：</text>
  <text x="565" y="272" font-size="8.2" fill="#5b7db1">offset/index/data/footer len/rows）</text>
  <text x="556" y="290" font-size="8.8" fill="#5b7db1">types[]（类型树）· metadata[]</text>
  <text x="556" y="308" font-size="8.8" fill="#5b7db1">文件级 statistics[]</text>
  <text x="556" y="326" font-size="8.8" fill="#5b7db1">numberOfRows · rowIndexStride</text>
  <rect x="556" y="340" width="211" height="26" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="661" y="357" font-size="8.4" text-anchor="middle" fill="#274a78">WriterImpl.writeFooter · 可压缩</text>
  <text x="556" y="388" font-size="8.4" fill="#8e8e93">全文件地图：定位每个 stripe、</text>
  <text x="556" y="404" font-size="8.4" fill="#8e8e93">列类型、文件级统计，供剪枝。</text>

  <!-- postscript detail -->
  <rect x="795" y="196" width="255" height="300" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="811" y="218" font-size="11" font-weight="700" fill="#3d2a5a">④ postscript</text>
  <text x="811" y="238" font-size="9" fill="#8a6db3"><tspan font-weight="600" fill="#3d2a5a">不压缩</tspan>（其它段皆可压）</text>
  <text x="811" y="256" font-size="9" fill="#8a6db3">footerLength（footer 有多长）</text>
  <text x="811" y="274" font-size="9" fill="#8a6db3">compression（压缩方式）</text>
  <text x="811" y="292" font-size="9" fill="#8a6db3">compressionBlockSize · version</text>
  <text x="811" y="310" font-size="9" fill="#8a6db3">magic（第二处 "ORC"）</text>
  <rect x="811" y="324" width="223" height="46" rx="8" fill="#fbeaea" stroke="#e7c3c3"/>
  <text x="922" y="343" font-size="9" font-weight="700" text-anchor="middle" fill="#4a1414">文件末 1 字节 = postscript 长度</text>
  <text x="922" y="360" font-size="8.6" text-anchor="middle" fill="#7a2a2a">故 postscript 长度必 &lt;256（单字节表达）</text>
  <text x="811" y="392" font-size="8.4" fill="#8e8e93">自举读起点：末字节 → postscript</text>
  <text x="811" y="408" font-size="8.4" fill="#8e8e93">长度 → 解析得 footer 长度+压缩。</text>

  <text x="30" y="518" font-size="9" fill="#a1a1a6">一句话:四段中 postscript 不压缩且末字节自表长度(&lt;256)，是倒读的自举锚点;magic 两处确认;footer 是全文件地图,stripes 是主体数据</text>
</svg>
