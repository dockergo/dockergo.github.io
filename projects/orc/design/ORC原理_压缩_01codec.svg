<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="980" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="700" fill="#1d1d1f">ORC 原理 · 压缩 · codec 选型（默认 ZSTD）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">7 种可插拔 codec 作用于每个 stream 的字节流（非整文件），选型在速度与压缩率间权衡；所选方式记进 postscript 供读时倒推解压</text>

  <!-- speed/ratio axis -->
  <text x="30" y="82" font-size="11" font-weight="700" fill="#1d1d1f">CompressionKind · 速度 ↔ 压缩率权衡轴</text>
  <line x1="60" y1="150" x2="920" y2="150" stroke="#c7c7cc" stroke-width="1.6"/>
  <path d="M60,150 L66,146 M60,150 L66,154" stroke="#c7c7cc" stroke-width="1.6" fill="none"/>
  <path d="M920,150 L914,146 M920,150 L914,154" stroke="#c7c7cc" stroke-width="1.6" fill="none"/>
  <text x="60" y="172" font-size="9" fill="#2f6f4f">← 解压/压缩更快</text>
  <text x="920" y="172" font-size="9" text-anchor="end" fill="#8a6db3">压缩率更高 →</text>

  <!-- codec chips on axis -->
  <!-- NONE -->
  <line x1="100" y1="142" x2="100" y2="158" stroke="#d8d8dd" stroke-width="1.4"/>
  <rect x="66" y="100" width="80" height="34" rx="8" fill="#f7f7f9" stroke="#e3e3e8" filter="url(#soft)"/>
  <text x="106" y="121" font-size="10" font-weight="700" text-anchor="middle" fill="#1d1d1f">NONE</text>
  <text x="106" y="192" font-size="7.8" text-anchor="middle" fill="#6e6e73">不压 · 直落</text>

  <!-- LZ4 -->
  <line x1="230" y1="142" x2="230" y2="158" stroke="#bfe0cd" stroke-width="1.4"/>
  <rect x="190" y="100" width="80" height="34" rx="8" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="230" y="121" font-size="10" font-weight="700" text-anchor="middle" fill="#12402a">LZ4</text>
  <text x="230" y="192" font-size="7.8" text-anchor="middle" fill="#2f6f4f">极快解压</text>

  <!-- SNAPPY -->
  <line x1="340" y1="142" x2="340" y2="158" stroke="#bfe0cd" stroke-width="1.4"/>
  <rect x="298" y="100" width="84" height="34" rx="8" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="340" y="121" font-size="10" font-weight="700" text-anchor="middle" fill="#12402a">SNAPPY</text>
  <text x="340" y="192" font-size="7.8" text-anchor="middle" fill="#2f6f4f">快 · 低延迟</text>

  <!-- LZO -->
  <line x1="440" y1="142" x2="440" y2="158" stroke="#bfe0cd" stroke-width="1.4"/>
  <rect x="404" y="100" width="72" height="34" rx="8" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="440" y="121" font-size="10" font-weight="700" text-anchor="middle" fill="#12402a">LZO</text>
  <text x="440" y="192" font-size="7.8" text-anchor="middle" fill="#2f6f4f">快</text>

  <!-- ZSTD default -->
  <line x1="580" y1="142" x2="580" y2="158" stroke="#5b7db1" stroke-width="1.8"/>
  <rect x="536" y="94" width="88" height="40" rx="9" fill="#e7f0fb" stroke="#5b7db1" stroke-width="1.6" filter="url(#soft)"/>
  <text x="580" y="112" font-size="10.5" font-weight="700" text-anchor="middle" fill="#1b2a4a">ZSTD</text>
  <text x="580" y="127" font-size="8" text-anchor="middle" fill="#5b7db1">默认</text>
  <text x="580" y="192" font-size="7.8" text-anchor="middle" fill="#1b2a4a">率速俱佳</text>

  <!-- ZLIB -->
  <line x1="720" y1="142" x2="720" y2="158" stroke="#d9c7ec" stroke-width="1.4"/>
  <rect x="682" y="100" width="76" height="34" rx="8" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="720" y="121" font-size="10" font-weight="700" text-anchor="middle" fill="#3d2a5a">ZLIB</text>
  <text x="720" y="192" font-size="7.8" text-anchor="middle" fill="#8a6db3">早期默认</text>

  <!-- BROTLI -->
  <line x1="850" y1="142" x2="850" y2="158" stroke="#d9c7ec" stroke-width="1.4"/>
  <rect x="810" y="100" width="80" height="34" rx="8" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="850" y="121" font-size="10" font-weight="700" text-anchor="middle" fill="#3d2a5a">BROTLI</text>
  <text x="850" y="192" font-size="7.8" text-anchor="middle" fill="#8a6db3">高压缩率</text>

  <!-- default + strategy cards -->
  <rect x="30" y="222" width="450" height="130" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="48" y="246" font-size="11" font-weight="700" fill="#1b2a4a">默认与策略</text>
  <rect x="48" y="258" width="414" height="38" rx="8" fill="#e7f0fb" stroke="#bcd0ec"/>
  <text x="60" y="277" font-size="9.5" fill="#1b2a4a"><tspan font-weight="700">orc.compress</tspan> 默认 = "ZSTD"（OrcConf.java:55，COMPRESS）</text>
  <text x="60" y="291" font-size="8.4" fill="#5b7db1">现代 ORC 首选；早期默认是 ZLIB</text>
  <rect x="48" y="302" width="414" height="42" rx="8" fill="#e7f0fb" stroke="#bcd0ec"/>
  <text x="60" y="320" font-size="9.5" fill="#1b2a4a"><tspan font-weight="700">orc.compression.strategy</tspan> 默认 = SPEED（OrcConf.java:71）</text>
  <text x="60" y="335" font-size="8.4" fill="#5b7db1">同一 codec 下：SPEED 偏速度；COMPRESSION 偏压缩率（如 ZLIB 提高 level）</text>

  <!-- how it works card -->
  <rect x="500" y="222" width="450" height="130" rx="13" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="518" y="246" font-size="11" font-weight="700" fill="#5a3410">codec 作用粒度</text>
  <text x="518" y="270" font-size="9" fill="#93762e">· 作用于<tspan font-weight="700" fill="#5a3410">每个 stream 的字节流</tspan>，不是整文件一次</text>
  <text x="518" y="290" font-size="9" fill="#93762e">· NONE 时不压，stream 字节直接落盘</text>
  <text x="518" y="310" font-size="9" fill="#93762e">· 所选 codec 与块大小记进 <tspan font-weight="700" fill="#5a3410">postscript</tspan>（不压缩段）</text>
  <text x="518" y="330" font-size="9" fill="#93762e">· 读时按 postscript 声明选对应解码器</text>

  <!-- flow: stream -> codec -> postscript -->
  <rect x="30" y="386" width="150" height="70" rx="11" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="105" y="416" font-size="10" font-weight="700" text-anchor="middle" fill="#12402a">编码后 stream</text>
  <text x="105" y="434" font-size="8.4" text-anchor="middle" fill="#2f6f4f">（RLE/字典字节）</text>

  <path d="M180,421 L262,421" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <text x="221" y="412" font-size="8" text-anchor="middle" fill="#6e6e73">逐块压</text>

  <rect x="264" y="386" width="170" height="70" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="349" y="410" font-size="10" font-weight="700" text-anchor="middle" fill="#1b2a4a">选定 codec</text>
  <text x="349" y="428" font-size="8.4" text-anchor="middle" fill="#5b7db1">冷数据高压缩率</text>
  <text x="349" y="443" font-size="8.4" text-anchor="middle" fill="#5b7db1">热查询快解压</text>

  <path d="M434,421 L516,421" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <text x="475" y="412" font-size="8" text-anchor="middle" fill="#6e6e73">压缩字节</text>

  <rect x="518" y="386" width="180" height="70" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="608" y="416" font-size="10" font-weight="700" text-anchor="middle" fill="#5a3410">落盘 stripe</text>
  <text x="608" y="434" font-size="8.4" text-anchor="middle" fill="#93762e">压缩后的字节流</text>

  <path d="M608,456 L608,494" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <text x="598" y="480" font-size="8.4" text-anchor="end" fill="#8a6db3">↓ 记 codec 名 &#43; 块大小</text>

  <rect x="518" y="500" width="180" height="48" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="608" y="522" font-size="10" font-weight="700" text-anchor="middle" fill="#3d2a5a">postscript</text>
  <text x="608" y="538" font-size="8" text-anchor="middle" fill="#8a6db3">不压缩 · 记压缩方式供自举</text>

  <rect x="740" y="386" width="210" height="162" rx="13" fill="#f9ecec" stroke="#e8c9c9" filter="url(#soft)"/>
  <text x="758" y="410" font-size="10.5" font-weight="700" fill="#7a2230">选型经验</text>
  <text x="758" y="432" font-size="8.6" fill="#a85560">冷归档：ZLIB / 更高 level</text>
  <text x="758" y="450" font-size="8.6" fill="#a85560">求极致压缩率</text>
  <text x="758" y="474" font-size="8.6" fill="#a85560">低延迟读：LZ4 / SNAPPY</text>
  <text x="758" y="492" font-size="8.6" fill="#a85560">求极快解压</text>
  <text x="758" y="516" font-size="8.6" fill="#a85560">通用默认：ZSTD</text>
  <text x="758" y="534" font-size="8.6" fill="#a85560">率速平衡，多数场景直接用</text>
</svg>
