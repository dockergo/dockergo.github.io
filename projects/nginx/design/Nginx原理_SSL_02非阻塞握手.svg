<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="400" viewBox="0 0 1020 400"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="400" fill="#fbfbfd"/>
  <text x="30" y="28" font-size="14" font-weight="600" fill="#1d1d1f">非阻塞 TLS 握手状态机 · 慢握手不占线程（ngx_ssl_handshake → SSL_do_handshake）</text>
  <!-- 图例 -->
  <rect x="640" y="18" width="12" height="12" rx="3" fill="#eef3fb" stroke="#bcd0ec"/><text x="656" y="28" font-size="9" fill="#6a6a70">推进一步</text>
  <rect x="728" y="18" width="12" height="12" rx="3" fill="#fff7e6" stroke="#f0dcae"/><text x="744" y="28" font-size="9" fill="#6a6a70">挂起等待</text>
  <rect x="816" y="18" width="12" height="12" rx="3" fill="#eafaf1" stroke="#bce6cd"/><text x="832" y="28" font-size="9" fill="#6a6a70">完成</text>

  <!-- 状态机主环 -->
  <rect x="30" y="48" width="470" height="270" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="72" font-size="12" font-weight="600" fill="#1d1d1f">一次握手 = 事件循环里的多次重入</text>

  <rect x="120" y="88" width="290" height="52" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="265" y="110" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">SSL_do_handshake()</text><text x="265" y="128" font-size="8.5" fill="#5b7db1" text-anchor="middle">算一步：读/写一段握手报文</text>

  <rect x="120" y="164" width="290" height="52" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="265" y="186" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">返回 1 → 握手完成</text><text x="265" y="204" font-size="8.5" fill="#3f8f66" text-anchor="middle">此后收发的都是加密应用数据</text>

  <rect x="120" y="240" width="290" height="60" rx="10" fill="#fff7e6" stroke="#f0dcae"/><text x="265" y="262" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">返回 WANT_READ / WANT_WRITE</text><text x="265" y="282" font-size="8.5" fill="#9a7328" text-anchor="middle">数据没齐 → 注册对应读/写事件后</text><text x="265" y="296" font-size="8.5" fill="#9a7328" text-anchor="middle">return，让出线程（不阻塞）</text>

  <line x1="265" y1="140" x2="265" y2="164" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="300" y="156" font-size="8.5" fill="#3f8f66">数据齐</text>
  <path d="M120,114 L70,114 L70,270 L120,270" fill="none" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="60" y="196" font-size="8.5" fill="#9a7328" transform="rotate(-90 60 196)">事件就绪→重入续跑</text>
  <line x1="265" y1="216" x2="265" y2="240" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="300" y="232" font-size="8.5" fill="#9a7328">未完成</text>

  <!-- 右：慢握手时间线 -->
  <rect x="520" y="48" width="468" height="270" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="538" y="72" font-size="12" font-weight="600" fill="#1b2a4a">一次慢握手横跨多个 epoll 周期</text>
  <rect x="538" y="86" width="432" height="46" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="554" y="106" font-size="9.5" font-weight="600" fill="#1b2a4a">周期 1：收到 ClientHello，算一步</text><text x="554" y="122" font-size="8.5" fill="#5b7db1">缺后续报文 → WANT_READ → 挂起</text>
  <rect x="538" y="140" width="432" height="46" rx="9" fill="#f6f6f8" stroke="#e2e2e7"/><text x="554" y="160" font-size="9.5" font-weight="600" fill="#494950">周期间隙：worker 服务成百上千别的连接</text><text x="554" y="176" font-size="8.5" fill="#6a6a70">这个握手不占用任何线程，零成本挂着</text>
  <rect x="538" y="194" width="432" height="46" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="554" y="214" font-size="9.5" font-weight="600" fill="#1b2a4a">周期 2：客户端报文到 → 重入续算</text><text x="554" y="230" font-size="8.5" fill="#5b7db1">密钥协商还差一段 → 再次挂起</text>
  <rect x="538" y="248" width="432" height="46" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="554" y="268" font-size="9.5" font-weight="600" fill="#0f5132">周期 N：最后一段到 → 返回 1，握手完成</text><text x="554" y="284" font-size="8.5" fill="#3f8f66">全程无阻塞，慢客户端不拖垮 worker</text>
  <line x1="754" y1="132" x2="754" y2="140" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="754" y1="186" x2="754" y2="194" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="754" y1="240" x2="754" y2="248" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- 底注 -->
  <rect x="30" y="332" width="958" height="52" rx="12" fill="#f6f6f8" stroke="#e2e2e7"/>
  <text x="48" y="354" font-size="9.5" fill="#494950">与 phase 引擎的 AGAIN 机制同构：每次只推进一步，缺数据即让出线程；SNI 选证书、会话复用等发生在握手内（见"握手与终止"图）。</text>
  <text x="48" y="373" font-size="9.5" fill="#86868b">不变式：握手未完成前绝不收发应用数据；一个连接的握手状态由 SSL* 保存，跨事件周期续跑。</text>
</svg>
