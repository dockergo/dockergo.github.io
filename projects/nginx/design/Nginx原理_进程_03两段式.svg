<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="420" viewBox="0 0 1020 420"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="420" fill="#fbfbfd"/>
  <text x="30" y="28" font-size="14" font-weight="600" fill="#1d1d1f">posted 两段式 · accept 优先、锁只在 accept 期间持有（ngx_event_process_posted）</text>
  <!-- 图例 -->
  <rect x="640" y="18" width="12" height="12" rx="3" fill="#eef3fb" stroke="#bcd0ec"/><text x="656" y="28" font-size="9" fill="#6a6a70">accept 队列</text>
  <rect x="732" y="18" width="12" height="12" rx="3" fill="#fff7e6" stroke="#f0dcae"/><text x="748" y="28" font-size="9" fill="#6a6a70">业务队列</text>
  <rect x="816" y="18" width="12" height="12" rx="3" fill="#eafaf1" stroke="#bce6cd"/><text x="832" y="28" font-size="9" fill="#6a6a70">锁临界区</text>

  <!-- 分拣 -->
  <rect x="30" y="48" width="230" height="120" rx="12" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="72" font-size="11.5" font-weight="600" fill="#1d1d1f">epoll_wait 返回就绪</text>
  <text x="48" y="94" font-size="9.5" fill="#494950">事件先不立即处理，</text>
  <text x="48" y="110" font-size="9.5" fill="#494950">按 NGX_POST_EVENTS</text>
  <text x="48" y="126" font-size="9.5" fill="#494950">标志分拣进两个队列，</text>
  <text x="48" y="142" font-size="9.5" fill="#494950">回到主循环再统一执行。</text>

  <!-- 两队列 -->
  <rect x="300" y="48" width="300" height="55" rx="11" fill="#eef3fb" stroke="#bcd0ec"/><text x="316" y="72" font-size="10.5" font-weight="600" fill="#1b2a4a">ngx_posted_accept_events</text><text x="316" y="90" font-size="8.5" fill="#5b7db1">新连接的 accept 事件（要尽快接掉）</text>
  <rect x="300" y="113" width="300" height="55" rx="11" fill="#fff7e6" stroke="#f0dcae"/><text x="316" y="137" font-size="10.5" font-weight="600" fill="#7a4d00">ngx_posted_events</text><text x="316" y="155" font-size="8.5" fill="#9a7328">读写/业务事件（处理可能较耗时）</text>
  <line x1="260" y1="90"  x2="300" y2="75"  stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="260" y1="120" x2="300" y2="140" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- 三段执行时间线 -->
  <rect x="30" y="192" width="958" height="118" rx="14" fill="#fbfbfd" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="214" font-size="12" font-weight="600" fill="#1d1d1f">回到主循环后的执行次序（关键纪律）</text>
  <rect x="48" y="226" width="290" height="70" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="193" y="250" font-size="10.5" font-weight="600" fill="#0f5132" text-anchor="middle">① 先跑 accept 队列</text><text x="193" y="270" font-size="8.5" fill="#3f8f66" text-anchor="middle">把新连接全部 accept 进来</text><text x="193" y="286" font-size="8.5" fill="#3f8f66" text-anchor="middle">此时仍持有 accept_mutex</text>
  <rect x="356" y="226" width="290" height="70" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="501" y="250" font-size="10.5" font-weight="600" fill="#0f5132" text-anchor="middle">② 立即释放 accept_mutex</text><text x="501" y="270" font-size="8.5" fill="#3f8f66" text-anchor="middle">ngx_shmtx_unlock</text><text x="501" y="286" font-size="8.5" fill="#3f8f66" text-anchor="middle">让别的 worker 能接下一批连接</text>
  <rect x="664" y="226" width="290" height="70" rx="10" fill="#fff7e6" stroke="#f0dcae"/><text x="809" y="250" font-size="10.5" font-weight="600" fill="#7a4d00" text-anchor="middle">③ 再跑业务队列</text><text x="809" y="270" font-size="8.5" fill="#9a7328" text-anchor="middle">处理读写等耗时事件</text><text x="809" y="286" font-size="8.5" fill="#9a7328" text-anchor="middle">此时已不占锁</text>
  <line x1="338" y1="261" x2="356" y2="261" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="646" y1="261" x2="664" y2="261" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <!-- 锁临界区标注 -->
  <rect x="48" y="226" width="598" height="70" rx="10" fill="none" stroke="#8fbf9e" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="347" y="222" font-size="9" fill="#3f8f66" text-anchor="middle">accept_mutex 持有期 = 仅 ①②（最短）</text>

  <!-- 为什么 -->
  <rect x="30" y="326" width="958" height="80" rx="14" fill="#fbeaea" stroke="#f0cccc" filter="url(#soft)"/>
  <text x="48" y="350" font-size="11.5" font-weight="600" fill="#7d1f1f">为什么不能"接完连接就直接跑业务再放锁"</text>
  <text x="48" y="372" font-size="9.5" fill="#b06a6a">若持锁期间夹带耗时业务处理，锁被长时间占用 → 其它 worker 抢不到 accept → 新连接积压、分配不均、尾延迟抬高。</text>
  <text x="48" y="392" font-size="9.5" fill="#b06a6a">两段式把"接连接"与"干活"切开，锁持有时间压到最短——这是多 worker 共享监听 fd 时连接及时分配的关键。</text>
</svg>
