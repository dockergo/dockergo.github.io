<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="430" viewBox="0 0 1020 430"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="430" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">配置解析流程 · 递归下降读 token，派发给指令的 set 回调（ngx_conf_file.c）</text>

  <rect x="30" y="56" width="960" height="150" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="80" font-size="12.5" font-weight="600" fill="#1d1d1f">主循环 ngx_conf_parse（:158）</text>
  <rect x="48" y="96" width="210" height="90" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="153" y="120" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">read_token（:243）</text><text x="153" y="140" font-size="9" fill="#5b7db1" text-anchor="middle">逐字符切出一条指令</text><text x="153" y="156" font-size="9" fill="#5b7db1" text-anchor="middle">的 name + 参数们</text><text x="153" y="174" font-size="8.5" fill="#8fa9cf" text-anchor="middle">遇 { 返回 BLOCK_START</text>
  <rect x="288" y="96" width="230" height="90" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="403" y="120" font-size="10.5" font-weight="600" fill="#0f5132" text-anchor="middle">ngx_conf_handler</text><text x="403" y="140" font-size="9" fill="#3f8f66" text-anchor="middle">在所有模块的 commands 里</text><text x="403" y="156" font-size="9" fill="#3f8f66" text-anchor="middle">按 name 找匹配指令</text><text x="403" y="174" font-size="8.5" fill="#5aa06f" text-anchor="middle">校验上下文 + 参数个数</text>
  <rect x="548" y="96" width="210" height="90" rx="10" fill="#f4eefb" stroke="#d9c9ef"/><text x="653" y="120" font-size="10.5" font-weight="600" fill="#3c1361" text-anchor="middle">调用 set 回调</text><text x="653" y="140" font-size="9" fill="#7a5aa8" text-anchor="middle">把参数写进配置结构</text><text x="653" y="156" font-size="9" fill="#7a5aa8" text-anchor="middle">set_str/num/flag_slot…</text><text x="653" y="174" font-size="8.5" fill="#a58fc9" text-anchor="middle">或自定义解析</text>
  <rect x="788" y="96" width="184" height="90" rx="10" fill="#fff7e6" stroke="#f0dcae"/><text x="880" y="120" font-size="10.5" font-weight="600" fill="#7a4d00" text-anchor="middle">遇块指令</text><text x="880" y="142" font-size="9" fill="#9a7328" text-anchor="middle">set 回调内递归</text><text x="880" y="160" font-size="9" fill="#9a7328" text-anchor="middle">再调 ngx_conf_parse</text><text x="880" y="178" font-size="8.5" fill="#b8912e" text-anchor="middle">进入子块解析</text>

  <line x1="258" y1="141" x2="288" y2="141" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="518" y1="141" x2="548" y2="141" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="758" y1="141" x2="788" y2="141" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- 块递归 -->
  <rect x="30" y="222" width="470" height="192" rx="14" fill="#f6f9fd" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="48" y="246" font-size="12" font-weight="600" fill="#1b2a4a">块指令 → 递归下降建配置树</text>
  <rect x="150" y="258" width="220" height="30" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="260" y="278" font-size="9.5" fill="#1b2a4a" text-anchor="middle">http { }</text>
  <rect x="120" y="300" width="130" height="30" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="185" y="320" font-size="9" fill="#1b2a4a" text-anchor="middle">server { }</text>
  <rect x="270" y="300" width="130" height="30" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="335" y="320" font-size="9" fill="#1b2a4a" text-anchor="middle">server { }</text>
  <rect x="120" y="342" width="130" height="30" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="185" y="362" font-size="9" fill="#1b2a4a" text-anchor="middle">location { }</text>
  <rect x="270" y="342" width="130" height="30" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="335" y="362" font-size="9" fill="#1b2a4a" text-anchor="middle">location { }</text>
  <line x1="220" y1="288" x2="185" y2="300" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="300" y1="288" x2="335" y2="300" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="185" y1="330" x2="185" y2="342" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="335" y1="330" x2="335" y2="342" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="48" y="394" font-size="9" fill="#5b7db1">每层块对应一个配置结构；子块可覆盖/继承父块（见"继承合并"）。</text>

  <!-- 时机 -->
  <rect x="520" y="222" width="470" height="192" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="538" y="246" font-size="12" font-weight="600" fill="#1d1d1f">解析发生在启动 / reload 时（非请求路径）</text>
  <text x="538" y="270" font-size="10" fill="#494950">• 启动：master 一次性解析整份配置，构建各层配置结构。</text>
  <text x="538" y="292" font-size="10" fill="#494950">• 语法/上下文/参数错误在此暴露 → 启动失败或 reload 拒绝。</text>
  <text x="538" y="314" font-size="10" fill="#494950">• `nginx -t` 只解析校验不启动，上线前必做。</text>
  <text x="538" y="336" font-size="10" fill="#494950">• include 指令把多文件拼进来（ngx_conf_include）。</text>
  <text x="538" y="358" font-size="10" fill="#494950">• 变量（$host 等）在请求期求值，非解析期。</text>
  <rect x="538" y="374" width="434" height="28" rx="8" fill="#eafaf1" stroke="#bce6cd"/><text x="755" y="393" font-size="9.5" fill="#0f5132" text-anchor="middle">解析产物 = 只读配置结构，供 worker 请求处理时查</text>

  <line x1="260" y1="206" x2="260" y2="222" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
</svg>
