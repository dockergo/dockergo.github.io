<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="900" viewBox="0 0 1020 900" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="aHot" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#0a84ff"/></marker>
    <marker id="aCtl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#7c5fe6"/></marker>
    <marker id="aState" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#0f9e8e"/></marker>
    <marker id="aFail" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#e8730f"/></marker>
  </defs>

  <rect width="1020" height="900" fill="#fbfbfd"/>

  <!-- ===== 标题条 ===== -->
  <rect x="0" y="0" width="1020" height="48" fill="#f4f5f7" stroke="#e6e6eb"/>
  <text x="24" y="30" font-size="15" font-weight="700" fill="#1d1d1f">nginx 总架构 · 事件驱动 master-worker 反向代理</text>
  <text x="392" y="30" font-size="11.5" fill="#8a8a90">1 master 管控 + N 单线程 worker · 每 worker 一条 epoll 事件循环非阻塞多路复用海量连接（C10K）</text>

  <!-- ===== ① 顶部 clients + 共享 listen ===== -->
  <rect x="24" y="60" width="972" height="42" rx="10" fill="#eef0f3" stroke="#d2d6dd"/>
  <text x="44" y="86" font-size="11" font-weight="700" fill="#33373e">clients</text>
  <text x="130" y="86" font-size="10" fill="#8a8a90">海量并发连接 → 共享 listen sockets（fork 前已 open，N 个 worker 继承同一组监听 fd）</text>

  <!-- ===== master 管控条（Control · 信号） ===== -->
  <rect x="24" y="116" width="972" height="52" rx="11" fill="#eef0f3" stroke="#d2d6dd" filter="url(#soft)" data-tid="Nginx原理_接触面_信号控制"/>
  
  <text x="44" y="137" font-size="11.5" font-weight="700" fill="#1d1d1f">master 进程 · 只监控 / 转信号，不碰请求</text>
  <text x="44" y="156" font-size="9.5" fill="#5b6470">ngx_master_process_cycle · HUP 重载(新配置零停机) · USR2 换二进制 · reap 崩溃 worker 重生</text>
  <text x="976" y="137" font-size="9.5" fill="#7c5fe6" text-anchor="end" font-weight="600">Control</text>

  <!-- ===== 单 worker 工业剖面 大框 ===== -->
  <rect x="24" y="188" width="972" height="512" rx="16" fill="#ffffff" stroke="#d0d0d6" filter="url(#soft)" data-tid="Nginx原理_支撑_进程与事件模型"/>
  <text x="44" y="212" font-size="12" font-weight="700" fill="#1d1d1f">放大任一 worker · 事件循环引擎（ngx_worker_process_cycle → ngx_process_events_and_timers）</text>

  <!-- 事件循环 心脏（Hot 中心） -->
  <rect x="360" y="226" width="300" height="66" rx="11" fill="#e9f2ff" stroke="#a9ccf5" filter="url(#soft)" data-tid="Nginx原理_支撑_进程与事件模型"/>
  
  <text x="380" y="247" font-size="11" font-weight="700" fill="#0a3d78">事件循环心脏 · epoll_wait</text>
  <text x="378" y="265" font-size="9" fill="#2a5a92">ngx_epoll_process_events · EPOLLET 边缘触发</text>
  <text x="378" y="281" font-size="8.5" fill="#4a7ab0">就绪即 rev/wev->handler(ev) 分派 · instance 位防陈旧</text>

  <!-- 左 Control 栏：accept_mutex + config -->
  <rect x="44" y="226" width="150" height="120" rx="11" fill="#eef0f3" stroke="#d2d6dd" filter="url(#soft)" data-tid="Nginx原理_支撑_进程与事件模型"/>
  
  <text x="62" y="247" font-size="10.5" font-weight="700" fill="#1d1d1f">accept_mutex</text>
  <text x="60" y="266" font-size="8.5" fill="#5b6470">共享内存锁 · trylock</text>
  <text x="60" y="281" font-size="8.5" fill="#5b6470">同刻仅一 worker 监听</text>
  <text x="60" y="296" font-size="8.5" fill="#5b6470">→ 防惊群</text>
  <text x="60" y="316" font-size="8.5" fill="#5b6470">accept_disabled 忙则</text>
  <text x="60" y="330" font-size="8.5" fill="#5b6470">让锁 → 连接均摊</text>

  <rect x="44" y="358" width="150" height="96" rx="11" fill="#eef0f3" stroke="#d2d6dd" filter="url(#soft)" data-tid="Nginx原理_接触面_配置指令"/>
  
  <text x="62" y="379" font-size="10.5" font-weight="700" fill="#1d1d1f">config 指令表</text>
  <text x="60" y="398" font-size="8.5" fill="#5b6470">ngx_conf_parse</text>
  <text x="60" y="413" font-size="8.5" fill="#5b6470">每模块 commands[]</text>
  <text x="60" y="428" font-size="8.5" fill="#5b6470">cmd->set 回调落配置</text>
  <text x="60" y="443" font-size="8" fill="#8a8a90">指令即插件</text>

  <!-- Hot 横向主轨：accept → 解析 → 11 阶段 → content → filter → sendfile -->
  <text x="220" y="378" font-size="10" font-weight="600" fill="#0a84ff">Hot 主轨 · 一条 worker 交错推进上万请求</text>

  <rect x="220" y="388" width="118" height="58" rx="9" fill="#e9f2ff" stroke="#a9ccf5"/>
  
  <text x="236" y="408" font-size="9.5" font-weight="700" fill="#0a3d78">accept + 解析</text>
  <text x="234" y="424" font-size="8" fill="#4a7ab0">event_accept</text>
  <text x="234" y="437" font-size="8" fill="#4a7ab0">process_request_line</text>

  <rect x="352" y="388" width="150" height="58" rx="9" fill="#e9f2ff" stroke="#a9ccf5" filter="url(#soft)" data-tid="Nginx原理_支撑_HTTP阶段处理"/>
  
  <text x="368" y="408" font-size="9.5" font-weight="700" fill="#0a3d78">11 阶段相位引擎</text>
  <text x="366" y="424" font-size="8" fill="#4a7ab0">run_phases · checker 驱动</text>
  <text x="366" y="437" font-size="8" fill="#4a7ab0">POST_READ…ACCESS…CONTENT…LOG</text>

  <rect x="516" y="388" width="144" height="58" rx="9" fill="#e9f2ff" stroke="#a9ccf5" data-tid="Nginx原理_支撑_HTTP阶段处理"/>
  
  <text x="532" y="408" font-size="9.5" font-weight="700" fill="#0a3d78">content handler</text>
  <text x="530" y="424" font-size="8" fill="#4a7ab0">CONTENT 相位产内容</text>
  <text x="530" y="437" font-size="8" fill="#4a7ab0">静态文件 / 反代 / 应用</text>

  <rect x="674" y="388" width="150" height="58" rx="9" fill="#e9f2ff" stroke="#a9ccf5" filter="url(#soft)" data-tid="Nginx原理_支撑_模块体系"/>
  
  <text x="690" y="408" font-size="9.5" font-weight="700" fill="#0a3d78">header/body filter 双链</text>
  <text x="688" y="424" font-size="8" fill="#4a7ab0">gzip/chunked/range 链式叠加</text>
  <text x="688" y="437" font-size="8" fill="#4a7ab0">top_body_filter → write_filter</text>

  <rect x="838" y="388" width="140" height="58" rx="9" fill="#e6f4f1" stroke="#b9dfd8" filter="url(#soft)" data-tid="Nginx原理_支撑_内存池与缓冲"/>
  
  <text x="854" y="408" font-size="9.5" font-weight="700" fill="#0f6b5e">sendfile 零拷贝</text>
  <text x="852" y="424" font-size="8" fill="#2f6f5f">linux_sendfile_chain</text>
  <text x="852" y="437" font-size="8" fill="#2f6f5f">页缓存→socket 出</text>

  <!-- upstream 支线（Hot 反代） -->
  <rect x="352" y="470" width="308" height="70" rx="10" fill="#e9f2ff" stroke="#a9ccf5" filter="url(#soft)" data-tid="Nginx原理_支撑_upstream负载均衡"/>
  
  <text x="372" y="491" font-size="10.5" font-weight="700" fill="#0a3d78">upstream 反向代理支线（非阻塞连后端）</text>
  <text x="370" y="509" font-size="8.5" fill="#2a5a92">connect → send_request → process_header → send_response</text>
  <text x="370" y="525" font-size="8.5" fill="#4a7ab0">平滑加权 RR（current_weight 累加取最大）· upstream_next 故障切下一 peer</text>

  <!-- SSL/TLS（Hot 前置） -->
  <rect x="674" y="470" width="150" height="70" rx="10" fill="#eef0f3" stroke="#d2d6dd" data-tid="Nginx原理_支撑_SSL_TLS"/>
  
  <text x="690" y="491" font-size="10" font-weight="700" fill="#1d1d1f">SSL / TLS</text>
  <text x="688" y="509" font-size="8.5" fill="#5b6470">握手事件回调驱动</text>
  <text x="688" y="525" font-size="8.5" fill="#5b6470">终止加密 → 明文入相位</text>

  <!-- 右 State 栏：内存池 + 缓存 + 限流 + 定时器 -->
  <rect x="838" y="226" width="140" height="120" rx="11" fill="#e6f4f1" stroke="#b9dfd8" filter="url(#soft)" data-tid="Nginx原理_支撑_内存池与缓冲"/>
  
  <text x="856" y="247" font-size="10.5" font-weight="700" fill="#0f6b5e">每请求内存池</text>
  <text x="854" y="266" font-size="8.5" fill="#2f6f5f">create_pool</text>
  <text x="854" y="281" font-size="8.5" fill="#2f6f5f">palloc 指针碰撞 O(1)</text>
  <text x="854" y="296" font-size="8.5" fill="#2f6f5f">大块走 large 链</text>
  <text x="854" y="316" font-size="8.5" fill="#2f6f5f">请求结束 destroy_pool</text>
  <text x="854" y="330" font-size="8" fill="#4c8567">整体回收 · 免碎片</text>
  <text x="976" y="240" font-size="9.5" fill="#0f9e8e" text-anchor="end" font-weight="600">State</text>

  <rect x="838" y="470" width="140" height="70" rx="11" fill="#e6f4f1" stroke="#b9dfd8" data-tid="Nginx原理_支撑_代理缓存"/>
  
  <text x="856" y="491" font-size="10" font-weight="700" fill="#0f6b5e">proxy cache</text>
  <text x="854" y="509" font-size="8.5" fill="#2f6f5f">共享内存 rbtree 索引</text>
  <text x="854" y="525" font-size="8.5" fill="#2f6f5f">响应体落磁盘 · 后台淘汰</text>

  <rect x="674" y="560" width="150" height="66" rx="11" fill="#e6f4f1" stroke="#b9dfd8" data-tid="Nginx原理_支撑_日志与限流"/>
  
  <text x="690" y="581" font-size="10" font-weight="700" fill="#0f6b5e">limit_req 限流 + 日志</text>
  <text x="688" y="599" font-size="8.5" fill="#2f6f5f">leaky bucket · excess 衰减</text>
  <text x="688" y="615" font-size="8.5" fill="#2f6f5f">跨 worker 共享内存 + shmtx</text>

  <rect x="838" y="560" width="140" height="66" rx="11" fill="#e6f4f1" stroke="#b9dfd8" data-tid="Nginx原理_支撑_进程与事件模型"/>
  
  <text x="856" y="581" font-size="10" font-weight="700" fill="#0f6b5e">定时器红黑树</text>
  <text x="854" y="599" font-size="8.5" fill="#2f6f5f">取最左最近到期</text>
  <text x="854" y="615" font-size="8.5" fill="#2f6f5f">= epoll_wait 超时 O(log n)</text>

  <!-- 缓存/负载均衡 第二 tid（覆盖率：cache×2, upstream×2） -->
  <rect x="352" y="560" width="308" height="66" rx="11" fill="#fdf2ea" stroke="#f0cdaa" filter="url(#soft)" data-tid="Nginx原理_支撑_代理缓存"/>
  
  <text x="372" y="581" font-size="10" font-weight="700" fill="#8a4a12">缓存命中直接回吐 · upstream 二次分流</text>
  <text x="370" y="599" font-size="8.5" fill="#a8641e">cache HIT → 免回源；MISS → upstream 取 + 落缓存</text>
  <text x="370" y="615" font-size="8.5" fill="#b5793a" data-tid="Nginx原理_支撑_upstream负载均衡">peer 健康 → RR 均衡；失败 → next 重试其它后端</text>

  <!-- 左下 Failure 栏 -->
  <rect x="44" y="470" width="290" height="156" rx="12" fill="#fdf2ea" stroke="#f0cdaa" filter="url(#soft)"/>
  
  <text x="64" y="491" font-size="10.5" font-weight="700" fill="#8a4a12">Failure · 故障与过载</text>
  <text x="62" y="512" font-size="9" fill="#a8641e">worker 崩溃 → master reap 重生</text>
  <text x="62" y="530" font-size="9" fill="#a8641e">后端失败 → upstream_next 切 peer</text>
  <text x="62" y="548" font-size="9" fill="#a8641e">超时 → timer rbtree 触发 handler</text>
  <text x="62" y="566" font-size="9" fill="#a8641e">过载 → accept_disabled + limit_req 拒</text>
  <text x="62" y="590" font-size="9" font-weight="600" fill="#c0392b">⚠ 任一阻塞调用卡死整条 worker</text>
  <text x="62" y="607" font-size="8.5" fill="#b5793a">磁盘/DNS/CPU 密集 → thread_pool / AIO 外移</text>
  <text x="322" y="622" font-size="9.5" fill="#e8730f" text-anchor="end" font-weight="600">Failure Path</text>

  <!-- ===================== 连线 五路径 ===================== -->
  <!-- Control 紫虚：master → worker框；accept_mutex/config → 事件循环 -->
  <g stroke="#7c5fe6" stroke-width="1.6" stroke-dasharray="6 4" fill="none">
    <path d="M510,168 L510,224" marker-end="url(#aCtl)"/>
    <path d="M194,286 L358,262" marker-end="url(#aCtl)"/>
  </g>
  <text x="518" y="184" font-size="8" fill="#7c5fe6">HUP/USR2 管控</text>
  <text x="200" y="250" font-size="8" fill="#7c5fe6">抢锁才监听</text>

  <!-- clients → worker（Hot 入） -->
  <line x1="300" y1="102" x2="420" y2="186" stroke="#0a84ff" stroke-width="2.2" fill="none" marker-end="url(#aHot)"/>

  <!-- 事件循环 → accept+解析（Hot 下钻主轨） -->
  <line x1="420" y1="292" x2="360" y2="388" stroke="#0a84ff" stroke-width="2.2" fill="none" marker-end="url(#aHot)"/>

  <!-- Hot 横向流水线 -->
  <g stroke="#0a84ff" stroke-width="2.2" fill="none">
    <line x1="338" y1="417" x2="350" y2="417" marker-end="url(#aHot)"/>
    <line x1="502" y1="417" x2="514" y2="417" marker-end="url(#aHot)"/>
    <line x1="660" y1="417" x2="672" y2="417" marker-end="url(#aHot)"/>
    <line x1="824" y1="417" x2="836" y2="417" marker-end="url(#aHot)"/>
  </g>

  <!-- content → upstream 支线（Hot） -->
  <line x1="540" y1="446" x2="500" y2="470" stroke="#0a84ff" stroke-width="1.8" fill="none" marker-end="url(#aHot)"/>

  <!-- State 青：内存池/定时器 服务事件循环 -->
  <g stroke="#0f9e8e" stroke-width="1.6" fill="none">
    <line x1="836" y1="286" x2="662" y2="262" marker-end="url(#aState)"/>
    <path d="M908,560 L908,470" marker-end="url(#aState)"/>
  </g>
  <text x="690" y="278" font-size="8" fill="#0f9e8e">池/缓冲服务请求</text>

  <!-- Failure 橙虚：worker → master reap 回环 -->
  <path d="M60,470 L60,168" stroke="#e8730f" stroke-width="1.6" stroke-dasharray="3 3" fill="none" marker-end="url(#aFail)"/>
  <text x="66" y="200" font-size="8" fill="#e8730f">崩溃 → master 重生</text>

  <!-- ===== 底部 铭牌：设计张力 + 五路径图例 ===== -->
  <rect x="24" y="716" width="972" height="60" rx="11" fill="#f4f5f7" stroke="#e6e6eb"/>
  <text x="44" y="738" font-size="10.5" font-weight="700" fill="#1d1d1f">核心设计张力 · 单线程 worker 全异步非阻塞换 C10K 高并发（纪律：绝不阻塞）</text>
  <text x="44" y="758" font-size="9" fill="#5b6470">任一同步磁盘/DNS/CPU 密集调用都会卡死整条 worker → thread_pool/AIO 外移。次级：master-worker 隔离换零停机热重载，共享状态(accept_mutex/cache/limit_req)靠 shmem+锁协调。</text>

  <g font-size="9.5" fill="#5b6470">
    <line x1="560" y1="730" x2="586" y2="730" stroke="#0a84ff" stroke-width="2.2"/><text x="592" y="733">Hot 请求主轨</text>
    <line x1="700" y1="730" x2="726" y2="730" stroke="#0f9e8e" stroke-width="1.6"/><text x="732" y="733">State 池/缓存/定时</text>
    <line x1="560" y1="750" x2="586" y2="750" stroke="#7c5fe6" stroke-width="1.6" stroke-dasharray="6 4"/><text x="592" y="753">Control 信号/锁/配置</text>
    <line x1="700" y1="750" x2="726" y2="750" stroke="#e8730f" stroke-width="1.6" stroke-dasharray="3 3"/><text x="732" y="753">Failure 崩溃/切后端</text>
    <text x="860" y="740" font-size="8.5" fill="#a1a1a6">Opt：EPOLLET · 防惊群 · 内存池碰撞 · sendfile · 加权 RR</text>
  </g>
</svg>
