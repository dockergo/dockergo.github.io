<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="430" viewBox="0 0 1020 430"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="430" fill="#fbfbfd"/>
  <text x="30" y="28" font-size="14" font-weight="600" fill="#1d1d1f">平滑加权轮询（SWRR）· 权重高被选更频繁，但不连续扎堆（ngx_http_upstream_get_peer）</text>
  <!-- 图例 -->
  <rect x="640" y="18" width="12" height="12" rx="3" fill="#eef3fb" stroke="#bcd0ec"/><text x="656" y="28" font-size="9" fill="#6a6a70">每轮迭代</text>
  <rect x="720" y="18" width="12" height="12" rx="3" fill="#eafaf1" stroke="#bce6cd"/><text x="736" y="28" font-size="9" fill="#6a6a70">本轮选中</text>
  <rect x="800" y="18" width="12" height="12" rx="3" fill="#fff7e6" stroke="#f0dcae"/><text x="816" y="28" font-size="9" fill="#6a6a70">权重/失败</text>

  <!-- 三步规则 -->
  <rect x="30" y="48" width="330" height="230" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="72" font-size="12.5" font-weight="600" fill="#1d1d1f">每选一次 peer 的三步</text>
  <rect x="48" y="86" width="294" height="50" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="62" y="106" font-size="10" font-weight="600" fill="#1b2a4a">① 各 peer 累加</text><text x="62" y="124" font-size="9" fill="#5b7db1">current_weight += effective_weight</text>
  <rect x="48" y="144" width="294" height="50" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="62" y="164" font-size="10" font-weight="600" fill="#0f5132">② 选 current_weight 最大者</text><text x="62" y="182" font-size="9" fill="#3f8f66">它就是本次被转发的后端</text>
  <rect x="48" y="202" width="294" height="50" rx="10" fill="#fff7e6" stroke="#f0dcae"/><text x="62" y="222" font-size="10" font-weight="600" fill="#7a4d00">③ 胜者扣减 total</text><text x="62" y="240" font-size="9" fill="#9a7328">best.current_weight -= 所有权重之和</text>
  <text x="48" y="270" font-size="9" fill="#86868b">effective_weight 因转发失败下调、成功回升 → 自愈</text>

  <!-- 迭代表 -->
  <text x="392" y="70" font-size="11.5" font-weight="600" fill="#1d1d1f">权重 a=5 · b=1 · c=1（total=7）逐轮 current_weight</text>
  <!-- 表头 -->
  <rect x="392" y="80" width="70"  height="30" rx="6" fill="#f6f6f8" stroke="#e2e2e7"/><text x="427" y="100" font-size="9.5" fill="#494950" text-anchor="middle">轮</text>
  <rect x="466" y="80" width="120" height="30" rx="6" fill="#f6f6f8" stroke="#e2e2e7"/><text x="526" y="100" font-size="9.5" fill="#494950" text-anchor="middle">a（w=5）</text>
  <rect x="590" y="80" width="120" height="30" rx="6" fill="#f6f6f8" stroke="#e2e2e7"/><text x="650" y="100" font-size="9.5" fill="#494950" text-anchor="middle">b（w=1）</text>
  <rect x="714" y="80" width="120" height="30" rx="6" fill="#f6f6f8" stroke="#e2e2e7"/><text x="774" y="100" font-size="9.5" fill="#494950" text-anchor="middle">c（w=1）</text>
  <rect x="838" y="80" width="150" height="30" rx="6" fill="#f6f6f8" stroke="#e2e2e7"/><text x="913" y="100" font-size="9.5" fill="#494950" text-anchor="middle">选中</text>

  <!-- R1 a -->
  <rect x="392" y="114" width="70"  height="30" rx="6" fill="#ffffff" stroke="#ececef"/><text x="427" y="134" font-size="9.5" fill="#6a6a70" text-anchor="middle">1</text>
  <rect x="466" y="114" width="120" height="30" rx="6" fill="#eafaf1" stroke="#bce6cd"/><text x="526" y="134" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">5</text>
  <rect x="590" y="114" width="120" height="30" rx="6" fill="#ffffff" stroke="#ececef"/><text x="650" y="134" font-size="9.5" fill="#6a6a70" text-anchor="middle">1</text>
  <rect x="714" y="114" width="120" height="30" rx="6" fill="#ffffff" stroke="#ececef"/><text x="774" y="134" font-size="9.5" fill="#6a6a70" text-anchor="middle">1</text>
  <rect x="838" y="114" width="150" height="30" rx="6" fill="#eafaf1" stroke="#bce6cd"/><text x="913" y="134" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">a</text>
  <!-- R2 a -->
  <rect x="392" y="148" width="70"  height="30" rx="6" fill="#ffffff" stroke="#ececef"/><text x="427" y="168" font-size="9.5" fill="#6a6a70" text-anchor="middle">2</text>
  <rect x="466" y="148" width="120" height="30" rx="6" fill="#eafaf1" stroke="#bce6cd"/><text x="526" y="168" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">3</text>
  <rect x="590" y="148" width="120" height="30" rx="6" fill="#ffffff" stroke="#ececef"/><text x="650" y="168" font-size="9.5" fill="#6a6a70" text-anchor="middle">2</text>
  <rect x="714" y="148" width="120" height="30" rx="6" fill="#ffffff" stroke="#ececef"/><text x="774" y="168" font-size="9.5" fill="#6a6a70" text-anchor="middle">2</text>
  <rect x="838" y="148" width="150" height="30" rx="6" fill="#eafaf1" stroke="#bce6cd"/><text x="913" y="168" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">a</text>
  <!-- R3 b -->
  <rect x="392" y="182" width="70"  height="30" rx="6" fill="#ffffff" stroke="#ececef"/><text x="427" y="202" font-size="9.5" fill="#6a6a70" text-anchor="middle">3</text>
  <rect x="466" y="182" width="120" height="30" rx="6" fill="#ffffff" stroke="#ececef"/><text x="526" y="202" font-size="9.5" fill="#6a6a70" text-anchor="middle">1</text>
  <rect x="590" y="182" width="120" height="30" rx="6" fill="#eafaf1" stroke="#bce6cd"/><text x="650" y="202" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">3</text>
  <rect x="714" y="182" width="120" height="30" rx="6" fill="#ffffff" stroke="#ececef"/><text x="774" y="202" font-size="9.5" fill="#6a6a70" text-anchor="middle">3</text>
  <rect x="838" y="182" width="150" height="30" rx="6" fill="#eafaf1" stroke="#bce6cd"/><text x="913" y="202" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">b</text>
  <!-- R4 a -->
  <rect x="392" y="216" width="70"  height="30" rx="6" fill="#ffffff" stroke="#ececef"/><text x="427" y="236" font-size="9.5" fill="#6a6a70" text-anchor="middle">4</text>
  <rect x="466" y="216" width="120" height="30" rx="6" fill="#eafaf1" stroke="#bce6cd"/><text x="526" y="236" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">6</text>
  <rect x="590" y="216" width="120" height="30" rx="6" fill="#ffffff" stroke="#ececef"/><text x="650" y="236" font-size="9.5" fill="#6a6a70" text-anchor="middle">-3</text>
  <rect x="714" y="216" width="120" height="30" rx="6" fill="#ffffff" stroke="#ececef"/><text x="774" y="236" font-size="9.5" fill="#6a6a70" text-anchor="middle">4</text>
  <rect x="838" y="216" width="150" height="30" rx="6" fill="#eafaf1" stroke="#bce6cd"/><text x="913" y="236" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">a</text>
  <!-- R5 c -->
  <rect x="392" y="250" width="70"  height="30" rx="6" fill="#ffffff" stroke="#ececef"/><text x="427" y="270" font-size="9.5" fill="#6a6a70" text-anchor="middle">5</text>
  <rect x="466" y="250" width="120" height="30" rx="6" fill="#ffffff" stroke="#ececef"/><text x="526" y="270" font-size="9.5" fill="#6a6a70" text-anchor="middle">4</text>
  <rect x="590" y="250" width="120" height="30" rx="6" fill="#ffffff" stroke="#ececef"/><text x="650" y="270" font-size="9.5" fill="#6a6a70" text-anchor="middle">-2</text>
  <rect x="714" y="250" width="120" height="30" rx="6" fill="#eafaf1" stroke="#bce6cd"/><text x="774" y="270" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">5</text>
  <rect x="838" y="250" width="150" height="30" rx="6" fill="#eafaf1" stroke="#bce6cd"/><text x="913" y="270" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">c</text>

  <!-- 序列结论 -->
  <rect x="30" y="294" width="958" height="118" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="48" y="318" font-size="12" font-weight="600" fill="#0f5132">7 次一循环的选取序列（回到初始 0,0,0）</text>
  <rect x="48"  y="332" width="90" height="40" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="93"  y="357" font-size="12" font-weight="700" fill="#0f5132" text-anchor="middle">a</text>
  <rect x="146" y="332" width="90" height="40" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="191" y="357" font-size="12" font-weight="700" fill="#0f5132" text-anchor="middle">a</text>
  <rect x="244" y="332" width="90" height="40" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="289" y="357" font-size="12" font-weight="700" fill="#0f5132" text-anchor="middle">b</text>
  <rect x="342" y="332" width="90" height="40" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="387" y="357" font-size="12" font-weight="700" fill="#0f5132" text-anchor="middle">a</text>
  <rect x="440" y="332" width="90" height="40" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="485" y="357" font-size="12" font-weight="700" fill="#0f5132" text-anchor="middle">c</text>
  <rect x="538" y="332" width="90" height="40" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="583" y="357" font-size="12" font-weight="700" fill="#0f5132" text-anchor="middle">a</text>
  <rect x="636" y="332" width="90" height="40" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="681" y="357" font-size="12" font-weight="700" fill="#0f5132" text-anchor="middle">a</text>
  <text x="746" y="349" font-size="10" fill="#3f8f66">a 共 5 次 · b 1 次 · c 1 次</text>
  <text x="746" y="366" font-size="10" fill="#3f8f66">= 各自权重，且 a 不连续 5 连发</text>
  <text x="48" y="392" font-size="9.5" fill="#5aa06f">对比朴素加权（a a a a a b c）：SWRR 把高权重 peer 的请求"摊匀"在时间轴上，避免瞬时打爆单台。</text>
</svg>
