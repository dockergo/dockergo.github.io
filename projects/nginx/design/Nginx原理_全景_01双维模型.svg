<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="640" viewBox="0 0 1020 640"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="640" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">nginx 双维模型 · 能力域（连接底座 / 请求处理 / 后端与安全）× 执行时机（前台 / 后台）</text>

  <!-- 接触面 -->
  <rect x="30" y="52" width="960" height="46" rx="12" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="50" y="72" font-size="12.5" font-weight="600" fill="#3c1361">接触面主线（用户如何驱动 nginx）</text>
  <text x="50" y="90" font-size="11.5" fill="#7a5aa8">配置指令体系（directive / context 块）　·　信号控制（reload / reopen / quit / 二进制热升级）</text>

  <!-- 前台 -->
  <text x="30" y="128" font-size="12" font-weight="600" fill="#86868b">前台 · 请求路径（worker 事件循环内同步处理海量连接）</text>
  <line x1="30" y1="136" x2="990" y2="136" stroke="#e2e2e7" stroke-width="1"/>

  <!-- 连接底座 -->
  <rect x="30" y="150" width="300" height="300" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="50" y="176" font-size="13" font-weight="600" fill="#1d1d1f">连接底座 · 收发与内存</text>
  <rect x="50" y="192" width="260" height="72" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="66" y="214" font-size="12" font-weight="600" fill="#1b2a4a">① 进程模型 + 事件驱动</text>
  <text x="66" y="234" font-size="10.5" fill="#5b7db1">master-worker · epoll/kqueue</text>
  <text x="66" y="250" font-size="10.5" fill="#5b7db1">非阻塞 · 单 worker 万级连接</text>
  <rect x="50" y="274" width="260" height="72" rx="11" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="66" y="296" font-size="12" font-weight="600" fill="#0f5132">④ 内存池 pool 与缓冲</text>
  <text x="66" y="316" font-size="10.5" fill="#3f8f66">按请求/连接分配，一次性销毁</text>
  <text x="66" y="332" font-size="10.5" fill="#3f8f66">chain buffer 零拷贝传递</text>
  <rect x="50" y="356" width="260" height="76" rx="11" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="66" y="378" font-size="12" font-weight="600" fill="#7a4d00">⑧ 日志与限流</text>
  <text x="66" y="398" font-size="10.5" fill="#9a7328">access/error log · 缓冲写</text>
  <text x="66" y="414" font-size="10.5" fill="#9a7328">limit_req/limit_conn 漏桶</text>

  <!-- 请求处理 -->
  <rect x="360" y="150" width="300" height="300" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="380" y="176" font-size="13" font-weight="600" fill="#1d1d1f">请求处理 · 把请求跑完</text>
  <rect x="380" y="192" width="260" height="90" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="396" y="214" font-size="12" font-weight="600" fill="#1b2a4a">② HTTP 11 阶段处理</text>
  <text x="396" y="234" font-size="10.5" fill="#5b7db1">POST_READ → REWRITE → ACCESS</text>
  <text x="396" y="250" font-size="10.5" fill="#5b7db1">→ CONTENT → LOG（灵魂主线）</text>
  <text x="396" y="266" font-size="10.5" fill="#5b7db1">handler 挂在各 phase</text>
  <rect x="380" y="292" width="260" height="90" rx="11" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="396" y="314" font-size="12" font-weight="600" fill="#3c1361">③ 三类模块</text>
  <text x="396" y="334" font-size="10.5" fill="#7a5aa8">handler（产内容）</text>
  <text x="396" y="350" font-size="10.5" fill="#7a5aa8">filter（改 header/body 链）</text>
  <text x="396" y="366" font-size="10.5" fill="#7a5aa8">upstream（转后端）</text>

  <!-- 后端与安全 -->
  <rect x="690" y="150" width="300" height="300" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="710" y="176" font-size="13" font-weight="600" fill="#1d1d1f">后端与安全 · 反代与加密</text>
  <rect x="710" y="192" width="260" height="72" rx="11" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="726" y="214" font-size="12" font-weight="600" fill="#0f5132">⑤ upstream 负载均衡</text>
  <text x="726" y="234" font-size="10.5" fill="#3f8f66">round robin/ip_hash/least_conn</text>
  <text x="726" y="250" font-size="10.5" fill="#3f8f66">健康检查 · keepalive 连接池</text>
  <rect x="710" y="274" width="260" height="72" rx="11" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="726" y="296" font-size="12" font-weight="600" fill="#7a4d00">⑥ 代理缓存</text>
  <text x="726" y="316" font-size="10.5" fill="#9a7328">proxy_cache · key→磁盘文件</text>
  <text x="726" y="332" font-size="10.5" fill="#9a7328">共享内存索引 + 命中直返</text>
  <rect x="710" y="356" width="260" height="76" rx="11" fill="#fbeaea" stroke="#f0cccc"/>
  <text x="726" y="378" font-size="12" font-weight="600" fill="#7d1f1f">⑦ SSL/TLS</text>
  <text x="726" y="398" font-size="10.5" fill="#b06a6a">握手 · SNI · 证书 · 会话复用</text>
  <text x="726" y="414" font-size="10.5" fill="#b06a6a">终止加密 → 明文转后端</text>

  <!-- 后台 -->
  <text x="30" y="482" font-size="12" font-weight="600" fill="#86868b">后台 · 非请求路径（专职进程 / reload 时机）</text>
  <line x1="30" y1="490" x2="990" y2="490" stroke="#e2e2e7" stroke-width="1"/>
  <rect x="30" y="504" width="960" height="106" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="50" y="528" font-size="13" font-weight="600" fill="#1d1d1f">后台任务（横切，非独立能力域）</text>
  <rect x="50" y="540" width="290" height="56" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="66" y="562" font-size="11.5" font-weight="600" fill="#1b2a4a">配置热加载（reload）</text>
  <text x="66" y="580" font-size="10.5" fill="#5b7db1">master 起新 worker、旧 worker 优雅退出</text>
  <rect x="356" y="540" width="290" height="56" rx="11" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="372" y="562" font-size="11.5" font-weight="600" fill="#7a4d00">cache manager / loader 进程</text>
  <text x="372" y="580" font-size="10.5" fill="#9a7328">按容量/失效清理缓存、启动时载入索引</text>
  <rect x="662" y="540" width="308" height="56" rx="11" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="678" y="562" font-size="11.5" font-weight="600" fill="#0f5132">日志切割（reopen）· 二进制热升级</text>
  <text x="678" y="580" font-size="10.5" fill="#3f8f66">重开日志文件 · 不丢连接换 nginx 可执行文件</text>

  <line x1="510" y1="98" x2="510" y2="136" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
</svg>
