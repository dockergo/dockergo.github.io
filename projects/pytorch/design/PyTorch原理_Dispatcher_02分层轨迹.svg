<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="404" viewBox="0 0 1020 404"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="404" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Dispatcher 分层轨迹 · 一次 add 逐层 redispatch（DispatchKeySet 优先级由高到低穿透）</text>
  <!-- legend -->
  <rect x="640" y="18" width="12" height="12" rx="3" fill="#eef3fb" stroke="#bcd0ec"/><text x="658" y="28" font-size="9.5" fill="#1b2a4a">分发层</text>
  <rect x="722" y="18" width="12" height="12" rx="3" fill="#eafaf1" stroke="#bce6cd"/><text x="740" y="28" font-size="9.5" fill="#0f5132">真正算/返回</text>
  <rect x="828" y="18" width="12" height="12" rx="3" fill="#f2f2f4" stroke="#d8d8dd"/><text x="846" y="28" font-size="9.5" fill="#5b5b63">fallthrough</text>

  <!-- 入口 -->
  <rect x="40" y="60" width="590" height="52" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="60" y="83" font-size="11" font-weight="600" fill="#1b2a4a">computeDispatchKeySet：输入张量 key_set 并集 → 取最高优先键</text>
  <text x="60" y="101" font-size="8.5" fill="#5b7db1">highestPriorityTypeId → OperatorEntry 的 dispatchTable_ 查 kernel</text>
  <line x1="120" y1="112" x2="120" y2="132" stroke="#b8b8bf" marker-end="url(#ar)"/>

  <!-- 优先级轴 -->
  <text x="30" y="150" font-size="8.5" fill="#a1a1a6">优先级高</text>
  <text x="30" y="344" font-size="8.5" fill="#a1a1a6">优先级低</text>

  <!-- Autograd -->
  <rect x="90" y="132" width="540" height="52" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="110" y="155" font-size="11" font-weight="600" fill="#1b2a4a">① Autograd 层</text>
  <text x="110" y="173" font-size="8.5" fill="#5b7db1">建 grad_fn 节点 · 记 next_edges · 存 saved tensors</text>
  <line x1="360" y1="184" x2="360" y2="204" stroke="#b8b8bf" marker-end="url(#ar)"/><text x="372" y="199" font-size="8" fill="#86868b">redispatch 划掉本键 ↓</text>

  <!-- Autocast -->
  <rect x="90" y="204" width="540" height="52" rx="11" fill="#eef3fb" stroke="#bcd0ec" stroke-dasharray="4 3" filter="url(#soft)"/>
  <text x="110" y="227" font-size="11" font-weight="600" fill="#1b2a4a">② Autocast 层（可选）</text>
  <text x="110" y="245" font-size="8.5" fill="#5b7db1">输入按策略转 fp16 / bf16，再 redispatch</text>
  <line x1="360" y1="256" x2="360" y2="276" stroke="#b8b8bf" marker-end="url(#ar)"/><text x="372" y="271" font-size="8" fill="#86868b">redispatch 划掉本键 ↓</text>

  <!-- Backend -->
  <rect x="90" y="276" width="540" height="52" rx="11" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="110" y="299" font-size="11" font-weight="600" fill="#0f5132">③ Backend 层（CPU / CUDA）</text>
  <text x="110" y="317" font-size="8.5" fill="#3f8f66">真正算数值：MKL / cuBLAS / 自写 kernel → 返回结果</text>

  <!-- Fallthrough aside -->
  <rect x="680" y="132" width="300" height="70" rx="11" fill="#f2f2f4" stroke="#d8d8dd" filter="url(#soft)"/>
  <text x="700" y="156" font-size="10.5" font-weight="600" fill="#5b5b63">Fallthrough</text>
  <text x="700" y="176" font-size="8.5" fill="#86868b">某键无 kernel → 不做事</text>
  <text x="700" y="192" font-size="8.5" fill="#86868b">立即 redispatch 落下一层</text>

  <!-- no_grad panel -->
  <rect x="680" y="216" width="300" height="112" rx="11" fill="#f6f8fc" stroke="#dfe6f2" filter="url(#soft)"/>
  <text x="700" y="240" font-size="10.5" font-weight="600" fill="#1b2a4a">no_grad / inference_mode</text>
  <text x="700" y="262" font-size="8.5" fill="#5b7db1">张量不带 Autograd 键</text>
  <text x="700" y="280" font-size="8.5" fill="#5b7db1">→ computeDispatchKeySet 算不出该层</text>
  <text x="700" y="298" font-size="8.5" fill="#5b7db1">→ 整层被跳过（自动省 autograd）</text>
  <text x="700" y="318" font-size="8" fill="#a1a1a6">逐层穿透：每层做一件横切事再下探</text>
</svg>
