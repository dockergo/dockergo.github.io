<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="470" viewBox="0 0 1020 470"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">CUDA 显存 malloc · 分级兜底（命中即返回，逐级下探）CUDACachingAllocator.cpp</text>
  <!-- legend -->
  <rect x="612" y="18" width="12" height="12" rx="3" fill="#fff7e6" stroke="#f0dcae"/><text x="630" y="28" font-size="9.5" fill="#7a4d00">分配步骤</text>
  <rect x="702" y="18" width="12" height="12" rx="3" fill="#eafaf1" stroke="#bce6cd"/><text x="720" y="28" font-size="9.5" fill="#0f5132">命中返回</text>
  <rect x="792" y="18" width="12" height="12" rx="3" fill="#fbeaea" stroke="#f0cccc"/><text x="810" y="28" font-size="9.5" fill="#7d1f1f">OOM 失败</text>

  <!-- L1 -->
  <rect x="40" y="70" width="380" height="52" rx="10" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="60" y="93" font-size="11" font-weight="600" fill="#7a4d00">① round_size 对齐 · 选大小池</text>
  <text x="60" y="111" font-size="8.5" fill="#9a7328">规整请求大小，落到对应桶</text>
  <line x1="230" y1="122" x2="230" y2="140" stroke="#b8b8bf" marker-end="url(#ar)"/>

  <!-- L2 -->
  <rect x="40" y="140" width="380" height="52" rx="10" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="60" y="163" font-size="11" font-weight="600" fill="#7a4d00">② get_free_block 池内找空闲块</text>
  <text x="60" y="181" font-size="8.5" fill="#9a7328">先查缓存池，不碰 CUDA</text>
  <line x1="420" y1="166" x2="560" y2="166" stroke="#3f8f66" marker-end="url(#ar)"/><text x="470" y="159" font-size="8.5" fill="#0f5132">命中</text>
  <rect x="560" y="140" width="420" height="52" rx="10" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="580" y="163" font-size="10.5" font-weight="600" fill="#0f5132">命中：池内秒返回</text>
  <text x="580" y="181" font-size="8.5" fill="#3f8f66">无 cudaMalloc，最快路径</text>
  <line x1="230" y1="192" x2="230" y2="210" stroke="#b8b8bf" marker-end="url(#ar)"/><text x="240" y="205" font-size="8" fill="#86868b">未命中 ↓</text>

  <!-- L3 -->
  <rect x="40" y="210" width="380" height="52" rx="10" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="60" y="233" font-size="11" font-weight="600" fill="#7a4d00">③ alloc_block → cudaMalloc 要新段</text>
  <text x="60" y="251" font-size="8.5" fill="#9a7328">向 CUDA 申请新 segment</text>
  <line x1="420" y1="236" x2="560" y2="236" stroke="#3f8f66" marker-end="url(#ar)"/><text x="470" y="229" font-size="8.5" fill="#0f5132">成功</text>
  <rect x="560" y="210" width="420" height="52" rx="10" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="580" y="233" font-size="10.5" font-weight="600" fill="#0f5132">成功：切新段返回</text>
  <text x="580" y="251" font-size="8.5" fill="#3f8f66">cudaMalloc 拿到新 segment 后切块</text>
  <line x1="230" y1="262" x2="230" y2="280" stroke="#b8b8bf" marker-end="url(#ar)"/><text x="240" y="275" font-size="8" fill="#86868b">失败 ↓</text>

  <!-- L4 -->
  <rect x="40" y="280" width="380" height="52" rx="10" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="60" y="303" font-size="11" font-weight="600" fill="#7a4d00">④ release_cached_blocks 还池重试</text>
  <text x="60" y="321" font-size="8.5" fill="#9a7328">腾空闲段还给 CUDA 后再试</text>
  <line x1="420" y1="306" x2="560" y2="306" stroke="#3f8f66" marker-end="url(#ar)"/><text x="463" y="299" font-size="8.5" fill="#0f5132">重试成功</text>
  <rect x="560" y="280" width="420" height="52" rx="10" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="580" y="303" font-size="10.5" font-weight="600" fill="#0f5132">重试成功：释放缓存段后再分配</text>
  <text x="580" y="321" font-size="8.5" fill="#3f8f66">回收全部空闲 segment 腾出连续空间</text>
  <line x1="230" y1="332" x2="230" y2="350" stroke="#b8b8bf" marker-end="url(#ar)"/><text x="240" y="345" font-size="8" fill="#86868b">仍失败 ↓</text>

  <!-- L5 -->
  <rect x="40" y="350" width="380" height="52" rx="10" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="60" y="373" font-size="11" font-weight="600" fill="#7a4d00">⑤ 仍失败</text>
  <text x="60" y="391" font-size="8.5" fill="#9a7328">所有路径耗尽</text>
  <line x1="420" y1="376" x2="560" y2="376" stroke="#c99" marker-end="url(#ar)"/>
  <rect x="560" y="350" width="420" height="52" rx="10" fill="#fbeaea" stroke="#f0cccc"/>
  <text x="580" y="373" font-size="10.5" font-weight="600" fill="#7d1f1f">CUDA OOM</text>
  <text x="580" y="391" font-size="8.5" fill="#b06a6a">碎片致无连续大块，free_block 合并有限时仍溢出</text>

  <!-- bottom note -->
  <rect x="40" y="418" width="940" height="40" rx="10" fill="#f6f8fc" stroke="#dfe6f2"/>
  <text x="60" y="443" font-size="9.5" fill="#3a5680">流感知复用：块带 stream 归属，被另一条流用过的块须事件完成（synchronize_and_free_events）才可复用——这是「看似有空闲却不给你」的常见根源。</text>
</svg>
