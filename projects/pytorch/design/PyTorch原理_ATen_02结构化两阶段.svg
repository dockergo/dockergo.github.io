<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="372" viewBox="0 0 1020 372"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="372" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">ATen structured kernel · meta / impl 两阶段分离（native_functions.yaml → add.out）</text>
  <!-- legend -->
  <rect x="612" y="18" width="12" height="12" rx="3" fill="#eef3fb" stroke="#bcd0ec"/><text x="630" y="28" font-size="9.5" fill="#1b2a4a">meta 只算元信息</text>
  <rect x="742" y="18" width="12" height="12" rx="3" fill="#eafaf1" stroke="#bce6cd"/><text x="760" y="28" font-size="9.5" fill="#0f5132">impl 碰真实数据</text>
  <rect x="880" y="18" width="12" height="12" rx="3" fill="#f4eefb" stroke="#d9c9ef"/><text x="898" y="28" font-size="9.5" fill="#3c1361">schema 声明</text>

  <!-- schema -->
  <rect x="40" y="64" width="200" height="128" rx="12" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="140" y="98" font-size="11" font-weight="600" fill="#3c1361" text-anchor="middle">add.out 结构化算子</text>
  <text x="140" y="122" font-size="8.5" fill="#7a5aa8" text-anchor="middle">native_functions.yaml</text>
  <text x="140" y="140" font-size="8.5" fill="#7a5aa8" text-anchor="middle">单一声明</text>
  <text x="140" y="164" font-size="8.5" fill="#7a5aa8" text-anchor="middle">structured_delegate</text>
  <line x1="240" y1="128" x2="276" y2="128" stroke="#b8b8bf" marker-end="url(#ar)"/>

  <!-- meta -->
  <rect x="276" y="64" width="300" height="128" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="296" y="90" font-size="11.5" font-weight="600" fill="#1b2a4a">meta 阶段</text>
  <text x="296" y="112" font-size="8.5" fill="#5b7db1">广播 · 推形状 / dtype</text>
  <text x="296" y="130" font-size="8.5" fill="#5b7db1">分配输出张量</text>
  <text x="296" y="148" font-size="8.5" fill="#5b7db1">不碰真实数据（只算元信息）</text>
  <text x="296" y="174" font-size="8" fill="#8fa9cf">TORCH_META_FUNC → TensorIteratorBase</text>
  <line x1="576" y1="128" x2="632" y2="128" stroke="#b8b8bf" marker-end="url(#ar)"/><text x="604" y="120" font-size="8" fill="#86868b">输出已分配</text>

  <!-- impl -->
  <rect x="632" y="64" width="300" height="128" rx="12" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="652" y="90" font-size="11.5" font-weight="600" fill="#0f5132">impl 阶段</text>
  <text x="652" y="112" font-size="8.5" fill="#3f8f66">在已分配输出上逐元素算</text>
  <text x="652" y="130" font-size="8.5" fill="#3f8f66">for_each → add_stub</text>
  <text x="652" y="148" font-size="8.5" fill="#3f8f66">碰真实数据（eager 真正执行）</text>
  <text x="652" y="174" font-size="8" fill="#7fbf9c">各后端只写这一段</text>

  <!-- meta 分支 -->
  <line x1="426" y1="192" x2="426" y2="212" stroke="#b8b8bf" marker-end="url(#ar)"/>
  <rect x="276" y="212" width="300" height="66" rx="11" fill="#f6f8fc" stroke="#dfe6f2"/>
  <text x="296" y="235" font-size="10" font-weight="600" fill="#1b2a4a">meta 设备：只跑 meta 阶段</text>
  <text x="296" y="254" font-size="8.5" fill="#5b7db1">校验整张网络形状而不耗显存</text>
  <text x="296" y="270" font-size="8.5" fill="#5b7db1">编译期形状传播同理复用</text>

  <!-- impl 结果 -->
  <line x1="782" y1="192" x2="782" y2="212" stroke="#b8b8bf" marker-end="url(#ar)"/>
  <rect x="632" y="212" width="300" height="66" rx="11" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="782" y="240" font-size="10.5" font-weight="600" fill="#0f5132" text-anchor="middle">结果张量返回</text>
  <text x="782" y="262" font-size="8.5" fill="#3f8f66" text-anchor="middle">eager 路径的落点</text>

  <!-- 红利 band -->
  <rect x="40" y="298" width="892" height="52" rx="11" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="60" y="321" font-size="9.5" font-weight="600" fill="#7a4d00">分离红利</text>
  <text x="60" y="339" font-size="9" fill="#9a7328">形状逻辑写一次被所有后端共享，各后端只写 impl；meta 设备 / 编译期复用同一套形状推导，样板大减。</text>
</svg>
