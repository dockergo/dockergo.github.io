<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter></defs>
  <rect width="880" height="400" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">三种查询类型读什么文件（MOR 视角）</text>
  <text x="30" y="49" font-size="10" fill="#a1a1a6">同一 MOR 文件片，三种查询类型读到的范围不同 = "最新/快/流式"取舍</text>

  <!-- slice reference bar -->
  <rect x="30" y="66" width="820" height="40" rx="10" fill="#fdf6ea" stroke="#efdcb4"/>
  <g font-size="8.6" text-anchor="middle">
    <text x="46" y="90" text-anchor="start" font-weight="600" fill="#5a3410">MOR slice：</text>
    <rect x="150" y="74" width="150" height="24" rx="6" fill="#fef2e0" stroke="#e8cf9a"/><text x="225" y="90" fill="#5a3410">base（compaction 产）</text>
    <rect x="310" y="74" width="120" height="24" rx="6" fill="#fdf3e2" stroke="#efdcb4"/><text x="370" y="90" fill="#93762e">log1</text>
    <rect x="440" y="74" width="120" height="24" rx="6" fill="#fdf3e2" stroke="#efdcb4"/><text x="500" y="90" fill="#93762e">log2</text>
    <rect x="570" y="74" width="120" height="24" rx="6" fill="#fbeaea" stroke="#e7c3c3"/><text x="630" y="90" fill="#7a2a2a">log3(del)</text>
    <text x="760" y="90" fill="#a1a1a6">← instant 递增 →</text>
  </g>

  <g font-size="10.5">
    <rect x="30" y="122" width="820" height="80" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="46" y="146" font-weight="700" fill="#1b2a4a">快照查（SNAPSHOT）· 最新最全、最慢</text>
    <text x="46" y="168" font-size="9" fill="#274a78">读 base + 所有 log 合并（HoodieMergedLogRecordReader）</text>
    <text x="46" y="188" font-size="8.8" fill="#5b7db1">读范围：base ∪ log1 ∪ log2 ∪ log3　→ 要看到刚写入的最新值</text>
    <rect x="600" y="134" width="234" height="56" rx="8" fill="#e7f0fb" stroke="#b9d2ef"/><text x="717" y="156" font-size="8.6" text-anchor="middle" fill="#1b2a4a">读 base + 全部 log</text><text x="717" y="176" font-size="8.4" text-anchor="middle" fill="#5b7db1">代价：合并（慢）</text>

    <rect x="30" y="216" width="820" height="80" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
    <text x="46" y="240" font-weight="700" fill="#12402a">读优化查（READ_OPTIMIZED）· 快、略旧</text>
    <text x="46" y="262" font-size="9" fill="#2f6f4f">仅读 base 文件（getAllBaseFiles 只暴露 baseFile，不合并 log）</text>
    <text x="46" y="282" font-size="8.8" fill="#2f6f4f">读范围：仅 base　→ 看不到最后 compaction 之后的 log 增量；compaction 越勤越新</text>
    <rect x="600" y="228" width="234" height="56" rx="8" fill="#e6f7ee" stroke="#bfe0cd"/><text x="717" y="250" font-size="8.6" text-anchor="middle" fill="#12402a">只读 base</text><text x="717" y="270" font-size="8.4" text-anchor="middle" fill="#2f6f4f">代价：可能略旧</text>

    <rect x="30" y="310" width="820" height="80" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
    <text x="46" y="334" font-weight="700" fill="#3d2a5a">增量查（INCREMENTAL）· 只拿区间变更</text>
    <text x="46" y="356" font-size="9" fill="#7a5a95">读两个 instant 之间提交的变更（InstantRange 穿进 log reader）</text>
    <text x="46" y="376" font-size="8.8" fill="#7a5a95">读范围：区间内改动的记录　→ 流式 / CDC 下游</text>
    <rect x="600" y="322" width="234" height="56" rx="8" fill="#faf4fb" stroke="#e2d2ee"/><text x="717" y="344" font-size="8.6" text-anchor="middle" fill="#3d2a5a">读 instant 区间</text><text x="717" y="364" font-size="8.4" text-anchor="middle" fill="#7a5a95">时间线驱动</text>
  </g>
</svg>
