<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter></defs>
  <rect width="880" height="420" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">log block 格式（HoodieLogBlock）</text>
  <text x="30" y="49" font-size="10" fill="#a1a1a6">log 文件由 block 组成；header/footer 元数据 map + 内容位置 + lazy-read；schema 在 block header</text>

  <!-- block anatomy -->
  <rect x="30" y="70" width="360" height="180" rx="12" fill="#f6f8fc" stroke="#dbe6f4" filter="url(#soft)"/>
  <text x="46" y="92" font-size="10.5" font-weight="700" fill="#1b2a4a">一个 log block 的结构</text>
  <rect x="46" y="104" width="328" height="32" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="210" y="124" font-size="8.8" text-anchor="middle" fill="#274a78">header：block 类型 + SCHEMA + 元数据 map</text>
  <rect x="46" y="142" width="328" height="56" rx="8" fill="#fff" stroke="#cfe0f2"/><text x="210" y="164" font-size="8.8" text-anchor="middle" fill="#1b2a4a">content：记录数据（lazy-read）</text><text x="210" y="184" font-size="8.2" text-anchor="middle" fill="#5b7db1">内容位置记录，按需读取</text>
  <rect x="46" y="204" width="328" height="32" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="210" y="224" font-size="8.8" text-anchor="middle" fill="#274a78">footer：元数据 map（version=3）</text>

  <!-- block types -->
  <rect x="410" y="70" width="440" height="180" rx="12" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="426" y="92" font-size="10.5" font-weight="700" fill="#12402a">block 类型（HoodieLogBlockType）</text>
  <g font-size="8.8">
    <rect x="426" y="102" width="200" height="40" rx="8" fill="#e6f7ee" stroke="#bfe0cd"/><text x="440" y="120" font-weight="600" fill="#12402a">数据块（存记录）</text><text x="440" y="135" fill="#2f6f4f">AVRO / HFILE / PARQUET(v4) / CDC(v6)</text>
    <rect x="636" y="102" width="200" height="40" rx="8" fill="#fbeaea" stroke="#e7c3c3"/><text x="650" y="120" font-weight="600" fill="#4a1414">DELETE_BLOCK</text><text x="650" y="135" fill="#7a2a2a">删除标记</text>
    <rect x="426" y="150" width="200" height="40" rx="8" fill="#faf4fb" stroke="#e2d2ee"/><text x="440" y="168" font-weight="600" fill="#5a3d78">COMMAND_BLOCK</text><text x="440" y="183" fill="#7a5a95">命令（如回滚）</text>
    <rect x="636" y="150" width="200" height="40" rx="8" fill="#f7f7f9" stroke="#e2e2e7"/><text x="650" y="168" font-weight="600" fill="#6e6e73">CORRUPT_BLOCK</text><text x="650" y="183" fill="#a1a1a6">损坏块</text>
    <rect x="426" y="198" width="410" height="38" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="440" y="216" fill="#274a78">isDataOrDeleteBlock 排除 COMMAND / CORRUPT；</text><text x="440" y="230" fill="#5b7db1">合并只看数据块 + 删除块</text>
  </g>

  <!-- ordering -->
  <rect x="30" y="266" width="820" height="130" rx="12" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="46" y="288" font-size="10.5" font-weight="700" fill="#5a3410">扩展名/排序保证 commit 时间序</text>
  <text x="46" y="310" font-size="9.3" fill="#93762e">log 文件扩展名让"删除排在数据之后"（HoodieLogFile 比较逻辑）——合并时先应用数据再应用删除，保证同一 commit 内的时序正确。</text>
  <g font-size="8.8" text-anchor="middle">
    <rect x="60" y="326" width="200" height="40" rx="8" fill="#fef2e0" stroke="#e8cf9a"/><text x="160" y="346" fill="#5a3410">先：数据块（写入值）</text><text x="160" y="360" fill="#93762e" font-size="8">按 instant 序</text>
    <rect x="340" y="326" width="200" height="40" rx="8" fill="#fbeaea" stroke="#e7c3c3"/><text x="440" y="346" fill="#4a1414">后：删除块（应用删除）</text><text x="440" y="360" fill="#7a2a2a" font-size="8">保序不被数据覆盖</text>
    <rect x="620" y="326" width="200" height="40" rx="8" fill="#e6f7ee" stroke="#bfe0cd"/><text x="720" y="346" fill="#12402a">正确的最新视图</text><text x="720" y="360" fill="#2f6f4f" font-size="8">交计算引擎</text>
  </g>
</svg>
