<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter></defs>
  <rect width="880" height="400" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Cleaning：按策略回收旧文件片（CleanActionExecutor）</text>
  <text x="30" y="49" font-size="10" fill="#a1a1a6">每次更新/compaction 产新 base，旧 slice 堆积；cleaning 按保留策略回收，记 clean 动作</text>

  <!-- slice versions timeline -->
  <rect x="30" y="70" width="820" height="80" rx="12" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="92" font-size="10" font-weight="600" fill="#12402a">一个 file group 的历史版本（新 → 旧）</text>
  <g font-size="8.6" text-anchor="middle">
    <rect x="46" y="102" width="150" height="34" rx="7" fill="#e6f7ee" stroke="#bfe0cd"/><text x="121" y="123" fill="#12402a">slice c5（最新·保留）</text>
    <rect x="206" y="102" width="150" height="34" rx="7" fill="#e6f7ee" stroke="#bfe0cd"/><text x="281" y="123" fill="#12402a">slice c4（保留）</text>
    <rect x="366" y="102" width="150" height="34" rx="7" fill="#eafaf1" stroke="#bfe0cd"/><text x="441" y="123" fill="#12402a">slice c3（窗口内）</text>
    <rect x="526" y="102" width="150" height="34" rx="7" fill="#fbeaea" stroke="#e7c3c3"/><text x="601" y="123" fill="#7a2a2a">slice c1（超窗 · 回收）</text>
    <rect x="686" y="102" width="150" height="34" rx="7" fill="#fbeaea" stroke="#e7c3c3"/><text x="761" y="123" fill="#7a2a2a">slice c0（回收）</text>
  </g>

  <!-- policies -->
  <text x="30" y="180" font-size="10.5" font-weight="600" fill="#6e6e73">HoodieCleaningPolicy · 保留策略</text>
  <g font-size="10">
    <rect x="30" y="192" width="266" height="120" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="46" y="214" font-weight="700" fill="#1b2a4a">KEEP_LATEST_COMMITS</text>
    <text x="46" y="234" font-size="8.8" fill="#274a78">（默认）保留最近 N 次提交</text>
    <text x="46" y="252" font-size="8.8" fill="#274a78">涉及的文件片。</text>
    <text x="46" y="278" font-size="8.6" fill="#5b7db1">兼顾时间旅行与空间，</text>
    <text x="46" y="296" font-size="8.6" fill="#5b7db1">是平衡点。</text>

    <rect x="306" y="192" width="266" height="120" rx="12" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
    <text x="322" y="214" font-weight="700" fill="#12402a">KEEP_LATEST_FILE_VERSIONS</text>
    <text x="322" y="234" font-size="8.8" fill="#2f6f4f">每个 file group 保留</text>
    <text x="322" y="252" font-size="8.8" fill="#2f6f4f">最新 N 个版本。</text>
    <text x="322" y="278" font-size="8.6" fill="#6e9a7c">时间旅行需求低时</text>
    <text x="322" y="296" font-size="8.6" fill="#6e9a7c">更省空间。</text>

    <rect x="582" y="192" width="268" height="120" rx="12" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
    <text x="598" y="214" font-weight="700" fill="#5a3410">KEEP_LATEST_BY_HOURS</text>
    <text x="598" y="234" font-size="8.8" fill="#93762e">保留最近 N 小时的版本。</text>
    <text x="598" y="260" font-size="8.6" fill="#a98b6a">按时间窗口回收，</text>
    <text x="598" y="278" font-size="8.6" fill="#a98b6a">适合有明确回溯时长</text>
    <text x="598" y="296" font-size="8.6" fill="#a98b6a">要求的场景。</text>
  </g>

  <rect x="30" y="330" width="820" height="56" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="352" font-size="9.6" font-weight="600" fill="#1d1d1f">与时间旅行的关系</text>
  <text x="46" y="372" font-size="8.8" fill="#6e6e73">保留窗口决定"能回溯多久"——cleaning 删掉的版本无法再时间旅行或作增量读起点。保留多占空间强能力；保留少省空间窗口短。</text>
</svg>
