<svg xmlns="http://www.w3.org/2000/svg" width="880" height="410" viewBox="0 0 880 410" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="880" height="410" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">引擎集成：Spark / Flink write client 分层</text>
  <text x="30" y="49" font-size="10" fill="#a1a1a6">引擎无关逻辑 BaseHoodieWriteClient + 引擎特定实现；适配层桥接引擎数据抽象到 Hudi 写入模型</text>

  <!-- engine layer -->
  <rect x="30" y="70" width="390" height="76" rx="12" fill="#fbf6ef" stroke="#e6d8c4" filter="url(#soft)"/>
  <text x="46" y="92" font-size="10.5" font-weight="700" fill="#5a3410">Spark</text>
  <text x="46" y="112" font-size="9" fill="#93762e">df.write.format("hudi") → DataSource（hudi-spark）</text>
  <text x="46" y="130" font-size="9" fill="#93762e">读经 Hudi relation（按查询类型）</text>

  <rect x="460" y="70" width="390" height="76" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="476" y="92" font-size="10.5" font-weight="700" fill="#3d2a5a">Flink</text>
  <text x="476" y="112" font-size="9" fill="#7a5a95">sink / source（hudi-flink）· 流式 upsert</text>
  <text x="476" y="130" font-size="9" fill="#7a5a95">FLINK_STATE 索引（状态后端存记录位置）</text>

  <!-- engine-specific client -->
  <rect x="30" y="176" width="390" height="48" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="225" y="205" font-size="10" text-anchor="middle" font-weight="600" fill="#274a78">SparkRDDWriteClient（桥接 RDD）</text>
  <rect x="460" y="176" width="390" height="48" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="655" y="205" font-size="10" text-anchor="middle" font-weight="600" fill="#274a78">FlinkWriteClient（桥接 DataStream）</text>

  <!-- base client -->
  <rect x="30" y="254" width="820" height="72" rx="12" fill="#e7f0fb" stroke="#b9d2ef" filter="url(#soft)"/>
  <text x="440" y="278" font-size="11" text-anchor="middle" font-weight="700" fill="#1b2a4a">BaseHoodieWriteClient（引擎无关核心逻辑）</text>
  <text x="440" y="300" font-size="9.3" text-anchor="middle" fill="#274a78">preWrite 按 WriteOperationType 分派（upsert / insert / compact / cluster …）</text>
  <text x="440" y="317" font-size="9" text-anchor="middle" fill="#5b7db1">同一套：时间线 · 索引 · 表类型 语义（引擎无关）</text>

  <!-- shared model -->
  <rect x="30" y="340" width="820" height="52" rx="12" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="440" y="362" font-size="10" text-anchor="middle" font-weight="600" fill="#12402a">所有引擎共享：时间线（instant）+ 索引（键→文件组）+ 表类型（COW/MOR）</text>
  <text x="440" y="381" font-size="8.8" text-anchor="middle" fill="#2f6f4f">适配层只负责把引擎数据抽象桥接进来；机制在 Hudi 库里统一</text>

  <line x1="225" y1="146" x2="225" y2="176" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="655" y1="146" x2="655" y2="176" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="225" y1="224" x2="225" y2="254" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="655" y1="224" x2="655" y2="254" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="440" y1="326" x2="440" y2="340" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
</svg>
