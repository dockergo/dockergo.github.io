<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="880" height="420" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">分区目录布局 + .hoodie 根 + bootstrap</text>
  <text x="30" y="49" font-size="10" fill="#a1a1a6">表根：.hoodie（时间线/配置/元数据表）+ 分区数据目录</text>

  <!-- directory tree -->
  <rect x="30" y="70" width="420" height="326" rx="12" fill="#f6f8fc" stroke="#dbe6f4"/>
  <text x="46" y="92" font-size="10.5" font-weight="700" fill="#1b2a4a">表目录结构</text>
  <g font-size="9" fill="#274a78">
    <text x="52" y="116" font-weight="700">表根/</text>
    <rect x="66" y="124" width="368" height="70" rx="8" fill="#e7f0fb" stroke="#b9d2ef"/><text x="80" y="144" font-weight="600" fill="#1b2a4a">├ .hoodie/（表的大脑）</text><text x="94" y="162" font-size="8.4" fill="#274a78">· 时间线 instant 文件（见【时间线】）</text><text x="94" y="178" font-size="8.4" fill="#274a78">· hoodie.properties（HoodieTableConfig）· metadata/</text>
    <rect x="66" y="200" width="368" height="86" rx="8" fill="#f5faf6" stroke="#cfe6d5"/><text x="80" y="220" font-weight="600" fill="#12402a">├ region=cn/dt=2026-07-17/（分区）</text><text x="94" y="238" font-size="8.4" fill="#2f6f4f">· .hoodie_partition_metadata（分区标记）</text><text x="94" y="254" font-size="8.4" fill="#2f6f4f">· a1_..._c2.parquet（base）</text><text x="94" y="270" font-size="8.4" fill="#2f6f4f">· .a1_c2.log.1（log，MOR）</text>
    <rect x="66" y="292" width="368" height="30" rx="8" fill="#f5faf6" stroke="#cfe6d5"/><text x="80" y="311" font-size="8.6" fill="#2f6f4f">├ region=cn/dt=2026-07-16/ …（更多分区）</text>
    <text x="52" y="344" font-size="8.4" fill="#5b7db1">.hoodie_partition_metadata 让 Hudi 识别这是 Hudi 分区</text>
    <text x="52" y="362" font-size="8.4" fill="#5b7db1">（记分区 commit time / 分区深度）</text>
    <text x="52" y="384" font-size="8.4" fill="#5b7db1">元数据（.hoodie）是分区数据之外的表大脑</text>
  </g>

  <!-- bootstrap -->
  <rect x="470" y="70" width="380" height="150" rx="12" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="486" y="92" font-size="10.5" font-weight="700" fill="#5a3410">bootstrap：存量 parquet 低成本接入</text>
  <g font-size="8.8" text-anchor="middle">
    <rect x="486" y="104" width="160" height="40" rx="8" fill="#fef2e0" stroke="#e8cf9a"/><text x="566" y="122" fill="#5a3410">原始 parquet</text><text x="566" y="137" fill="#93762e" font-size="8">不重写</text>
    <rect x="674" y="104" width="160" height="40" rx="8" fill="#e6f7ee" stroke="#bfe0cd"/><text x="754" y="122" fill="#12402a">骨架 skeleton</text><text x="754" y="137" fill="#2f6f4f" font-size="8">存 Hudi 元字段</text>
  </g>
  <line x1="646" y1="124" x2="674" y2="124" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="486" y="164" font-size="8.6" fill="#93762e">BootstrapFileMapping：骨架 ↔ 原始文件映射；读时拼元字段 + 数据列</text>
  <text x="486" y="182" font-size="8.6" fill="#93762e">METADATA_ONLY（只建骨架）vs FULL（重写）</text>
  <text x="486" y="204" font-size="8.4" fill="#a98b6a">存量迁移用 METADATA_ONLY 最省</text>

  <!-- metadata table layout -->
  <rect x="470" y="240" width="380" height="156" rx="12" fill="#f7f2fb" stroke="#ddd0ec"/>
  <text x="486" y="262" font-size="10.5" font-weight="700" fill="#4a2f78">metadata table（.hoodie/metadata）</text>
  <text x="486" y="282" font-size="8.8" fill="#6e4f95">内置 MOR 表加速文件列举/统计/索引</text>
  <g font-size="8.4" text-anchor="middle">
    <rect x="486" y="292" width="170" height="30" rx="7" fill="#f4eefb" stroke="#e2d2ee"/><text x="571" y="311" fill="#4a2f78">files（免 list）</text>
    <rect x="664" y="292" width="170" height="30" rx="7" fill="#f4eefb" stroke="#e2d2ee"/><text x="749" y="311" fill="#4a2f78">column_stats（skipping）</text>
    <rect x="486" y="328" width="170" height="30" rx="7" fill="#f4eefb" stroke="#e2d2ee"/><text x="571" y="347" fill="#4a2f78">bloom_filters</text>
    <rect x="664" y="328" width="170" height="30" rx="7" fill="#f4eefb" stroke="#e2d2ee"/><text x="749" y="347" fill="#4a2f78">record_index</text>
  </g>
  <text x="486" y="380" font-size="8.4" fill="#6e4f95">详见【并发控制与元数据】</text>
</svg>
