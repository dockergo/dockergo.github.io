<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="880" height="420" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">时间线视图：不可变、可过滤，决定文件片可见性</text>
  <text x="30" y="49" font-size="10" fill="#a1a1a6">HoodieTimeline 是 instant 序列的视图；filter* 产生新视图，不改原时间线</text>

  <!-- full timeline -->
  <rect x="30" y="70" width="820" height="70" rx="12" fill="#f6f8fc" stroke="#dbe6f4"/>
  <text x="46" y="90" font-size="10" font-weight="600" fill="#1b2a4a">完整时间线（所有 instant）</text>
  <g font-size="8.6" text-anchor="middle">
    <rect x="52" y="100" width="110" height="30" rx="7" fill="#eafaf1" stroke="#bfe0cd"/><text x="107" y="119" fill="#12402a">c1 COMPLETED</text>
    <rect x="172" y="100" width="110" height="30" rx="7" fill="#eafaf1" stroke="#bfe0cd"/><text x="227" y="119" fill="#12402a">c2 COMPLETED</text>
    <rect x="292" y="100" width="110" height="30" rx="7" fill="#fff7e6" stroke="#e8cf9a"/><text x="347" y="119" fill="#5a3410">c3 INFLIGHT</text>
    <rect x="412" y="100" width="110" height="30" rx="7" fill="#eafaf1" stroke="#bfe0cd"/><text x="467" y="119" fill="#12402a">c4 COMPLETED</text>
    <rect x="532" y="100" width="110" height="30" rx="7" fill="#f6f8fc" stroke="#cfe0f2"/><text x="587" y="119" fill="#274a78">c5 REQUESTED</text>
    <text x="720" y="119" fill="#a1a1a6">→ instant time 递增</text>
  </g>

  <!-- filtered views -->
  <rect x="30" y="164" width="400" height="72" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="46" y="186" font-size="10" font-weight="700" fill="#12402a">filterCompletedInstants</text>
  <text x="46" y="207" font-size="9" fill="#2f6f4f">产生只含 c1/c2/c4 的新视图；</text>
  <text x="46" y="225" font-size="9" fill="#2f6f4f">读端据此判定"哪些已提交"。</text>

  <rect x="450" y="164" width="400" height="72" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="466" y="186" font-size="10" font-weight="700" fill="#5a3410">filterInflights / 其它过滤</text>
  <text x="466" y="207" font-size="9" fill="#93762e">产生只含 c3 的新视图（待完成/待回滚）；</text>
  <text x="466" y="225" font-size="9" fill="#93762e">原时间线不变 —— 不可变 + 过滤。</text>

  <!-- visibility rule -->
  <rect x="30" y="258" width="820" height="82" rx="12" fill="#e7f0fb" stroke="#b9d2ef" filter="url(#soft)"/>
  <text x="46" y="280" font-size="10.5" font-weight="700" fill="#1b2a4a">文件片可见性 = 时间线说了算</text>
  <text x="46" y="302" font-size="9.3" fill="#274a78">HoodieFileGroup.isFileSliceCommitted：用 timeline.containsOrBeforeTimelineStarts(baseInstantTime) + 最后完成 instant 水位判定。</text>
  <text x="46" y="322" font-size="9.3" fill="#274a78">只有对应 COMPLETED instant 的文件片才对读可见；c3（inflight）写出的文件读不到。</text>

  <!-- truth -->
  <rect x="30" y="356" width="820" height="50" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="378" font-size="9.6" font-weight="600" fill="#1d1d1f">为什么时间线是真相</text>
  <text x="46" y="396" font-size="8.8" fill="#6e6e73">文件在对象存储上，但"哪些属于已提交版本 / 增量从哪读 / 回滚到哪"只有时间线知道——它是表状态唯一权威。</text>

  <line x1="180" y1="140" x2="180" y2="164" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="347" y1="140" x2="600" y2="164" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
</svg>
