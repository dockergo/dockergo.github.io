<svg xmlns="http://www.w3.org/2000/svg" width="900" height="580" viewBox="0 0 900 580" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="900" height="580" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">三级分配器 · mcache / mcentral / mheap</text>

  <!-- mcache (blue, per-P lock-free) -->
  <rect x="40" y="64" width="540" height="96" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="56" y="88" font-size="13" font-weight="600" fill="#1b2a4a">mcache · 每 P 一个，无锁分配缓存</text>
  <text x="56" y="108" font-size="10.5" fill="#5b7db1">为每个 span class 缓存一个 mspan：alloc[numSpanClasses]*mspan</text>
  <text x="56" y="126" font-size="10.5" fill="#5b7db1">绑定到 P，同一时刻仅一个 M 访问 · 含 tiny 分配器状态</text>
  <text x="56" y="148" font-size="9.5" fill="#8fabd4">mcache.go:20</text>
  <rect x="490" y="76" width="74" height="24" rx="10" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="527" y="92" font-size="10.5" font-weight="600" fill="#1d4a2b" text-anchor="middle">无锁</text>

  <!-- arrow -->
  <line x1="310" y1="160" x2="310" y2="194" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="322" y="181" font-size="9.5" fill="#8e8e93">span 用完 · cacheSpan</text>

  <!-- mcentral (neutral) -->
  <rect x="40" y="194" width="540" height="128" rx="13" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="56" y="218" font-size="13" font-weight="600" fill="#1d1d1f">mcentral · 每个 size class 一个（全局共享 · 有锁）</text>
  <text x="56" y="237" font-size="10.5" fill="#6e6e73">持有该 class 的 span 集合 · 按 sweepgen 每轮 GC 换 swept/unswept 角色</text>
  <rect x="54" y="250" width="122" height="34" rx="7" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="115" y="271" font-size="9.5" fill="#1d4a2b" text-anchor="middle">partial · swept</text>
  <rect x="184" y="250" width="122" height="34" rx="7" fill="#f6f6f7" stroke="#e2e2e7"/>
  <text x="245" y="271" font-size="9.5" fill="#6e6e73" text-anchor="middle">partial · unswept</text>
  <rect x="314" y="250" width="122" height="34" rx="7" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="375" y="271" font-size="9.5" fill="#1d4a2b" text-anchor="middle">full · swept</text>
  <rect x="444" y="250" width="122" height="34" rx="7" fill="#f6f6f7" stroke="#e2e2e7"/>
  <text x="505" y="271" font-size="9.5" fill="#6e6e73" text-anchor="middle">full · unswept</text>
  <text x="56" y="308" font-size="9.5" fill="#a3a3a8">mcentral.go:82 · cacheSpan 换新 span</text>
  <rect x="486" y="296" width="78" height="22" rx="10" fill="#fdf6ec" stroke="#f0dcaf"/>
  <text x="525" y="311" font-size="10" font-weight="600" fill="#6b4e16" text-anchor="middle">class 级锁</text>

  <!-- arrow -->
  <line x1="310" y1="322" x2="310" y2="356" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="322" y="343" font-size="9.5" fill="#8e8e93">无可用 span · mheap.alloc</text>

  <!-- mheap (amber, heap) -->
  <rect x="40" y="356" width="540" height="108" rx="13" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <text x="56" y="380" font-size="13" font-weight="600" fill="#6b4e16">mheap · 全局唯一的堆</text>
  <text x="56" y="400" font-size="10.5" fill="#a9822f">管理所有 span (allspans) · 页分配器 pages · arena 映射 arenas</text>
  <text x="56" y="418" font-size="10.5" fill="#a9822f">无可用 span 时切新 span；空间不够则向 OS 申请更多 arena</text>
  <text x="56" y="440" font-size="9.5" fill="#c6a45f">mheap.go:64 · mheap.go:997</text>
  <rect x="498" y="368" width="66" height="24" rx="10" fill="#fbeeee" stroke="#f0c4c4"/>
  <text x="531" y="384" font-size="10.5" font-weight="600" fill="#7a1f1f" text-anchor="middle">堆锁</text>

  <!-- arrow -->
  <line x1="310" y1="464" x2="310" y2="498" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="322" y="485" font-size="9.5" fill="#8e8e93">堆不够 · mmap 申请 arena</text>

  <!-- OS -->
  <rect x="40" y="498" width="540" height="54" rx="12" fill="#f6f6f7" stroke="#e2e2e7"/>
  <text x="56" y="521" font-size="12.5" font-weight="600" fill="#1d1d1f">操作系统 (OS)</text>
  <text x="56" y="540" font-size="10.5" fill="#6e6e73">按 arena（64 位平台通常 64MB）向 OS 申请虚存</text>

  <!-- right column: path + lock legend -->
  <rect x="612" y="64" width="268" height="210" rx="13" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <text x="628" y="88" font-size="12" font-weight="600" fill="#3d2a5a">分配请求自上而下穿透</text>
  <text x="628" y="112" font-size="10.5" fill="#7d5bb1">① mcache 命中最快（无锁）</text>
  <text x="628" y="134" font-size="10.5" fill="#7d5bb1">② 未命中 → 问 mcentral（class 锁）</text>
  <text x="628" y="156" font-size="10.5" fill="#7d5bb1">③ 再未命中 → 问 mheap（堆锁）</text>
  <text x="628" y="178" font-size="10.5" fill="#7d5bb1">④ 最后 → 问 OS 要虚存</text>
  <line x1="628" y1="196" x2="864" y2="196" stroke="#ddcdf0" stroke-width="1"/>
  <text x="628" y="220" font-size="10.5" fill="#7d5bb1">层级越低越慢、加锁越粗，</text>
  <text x="628" y="238" font-size="10.5" fill="#7d5bb1">命中率也越低。小对象绝大多数</text>
  <text x="628" y="256" font-size="10.5" fill="#7d5bb1">命中 mcache 无锁快路径。</text>

  <rect x="612" y="300" width="268" height="164" rx="13" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="628" y="324" font-size="12" font-weight="600" fill="#1d1d1f">锁粒度图例</text>
  <rect x="628" y="338" width="74" height="24" rx="10" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="665" y="354" font-size="10.5" font-weight="600" fill="#1d4a2b" text-anchor="middle">无锁</text>
  <text x="714" y="354" font-size="10" fill="#6e6e73">mcache（每 P 独占）</text>
  <rect x="628" y="372" width="74" height="24" rx="10" fill="#fdf6ec" stroke="#f0dcaf"/>
  <text x="665" y="388" font-size="10" font-weight="600" fill="#6b4e16" text-anchor="middle">class 锁</text>
  <text x="714" y="388" font-size="10" fill="#6e6e73">mcentral（每 class）</text>
  <rect x="628" y="406" width="74" height="24" rx="10" fill="#fbeeee" stroke="#f0c4c4"/>
  <text x="665" y="422" font-size="10.5" font-weight="600" fill="#7a1f1f" text-anchor="middle">堆锁</text>
  <text x="714" y="422" font-size="10" fill="#6e6e73">mheap（全局唯一）</text>
  <text x="628" y="450" font-size="9.5" fill="#a3a3a8">源自 tcmalloc：多级缓存 + 尺寸分级</text>
</svg>
