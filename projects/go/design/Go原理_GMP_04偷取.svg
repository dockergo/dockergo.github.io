<svg xmlns="http://www.w3.org/2000/svg" width="920" height="540" viewBox="0 0 920 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
    <marker id="arG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#4a8c60"/>
    </marker>
  </defs>
  <rect width="920" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Work-Stealing · 空闲 M 自旋偷取其他 P 的一半 G</text>

  <!-- idle M -> spinning flow (left column) -->
  <rect x="40" y="54" width="230" height="60" rx="12" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="56" y="79" font-size="12.5" font-weight="600" fill="#1d1d1f">空闲 M · 本地/全局皆空</text>
  <text x="56" y="98" font-size="10" fill="#6e6e73">findRunnable 前几级都没找到 G</text>
  <line x1="155" y1="114" x2="155" y2="128" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="40" y="130" width="230" height="60" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="56" y="155" font-size="12.5" font-weight="600" fill="#1b2a4a">M 变 spinning（自旋）</text>
  <text x="56" y="174" font-size="10" fill="#5b7db1">nmspinning++ · 门槛 2·nmspinning &lt; GOMAXPROCS−npidle</text>
  <line x1="155" y1="190" x2="155" y2="204" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="40" y="206" width="230" height="72" rx="12" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="56" y="231" font-size="12.5" font-weight="600" fill="#1d4a2b">stealWork</text>
  <text x="253" y="229" font-size="9" fill="#4a8c60" text-anchor="end">proc.go:3843</text>
  <text x="56" y="251" font-size="10" fill="#4a8c60">随机起点遍历所有其他 P</text>
  <text x="56" y="268" font-size="10" fill="#4a8c60">最多 4 轮，含 runnext</text>

  <rect x="40" y="294" width="230" height="72" rx="12" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <text x="56" y="319" font-size="12.5" font-weight="600" fill="#6b4e16">runqsteal</text>
  <text x="253" y="317" font-size="9" fill="#a9822f" text-anchor="end">proc.go:7781</text>
  <text x="56" y="339" font-size="10" fill="#a9822f">从目标 P 偷约一半 G 到本地</text>
  <text x="56" y="356" font-size="10" fill="#a9822f">load-acquire / store-release 无锁</text>

  <rect x="40" y="382" width="230" height="66" rx="12" fill="#f5f0fb" stroke="#ddcdf0"/>
  <text x="56" y="406" font-size="11.5" font-weight="600" fill="#3d2a5a">偷到 → execute</text>
  <text x="56" y="425" font-size="10" fill="#7d5bb1">nmspinning-- · 恢复运行</text>
  <text x="56" y="441" font-size="10" fill="#7d5bb1">全轮空 → stopm 休眠</text>

  <!-- P grid on the right: thief P + victims -->
  <!-- thief P (empty) -->
  <rect x="320" y="80" width="180" height="150" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="336" y="104" font-size="12" font-weight="600" fill="#1b2a4a">P0 · 偷取方（空）</text>
  <text x="336" y="123" font-size="9.5" fill="#5b7db1">绑定 spinning M</text>
  <rect x="336" y="134" width="148" height="80" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="410" y="178" font-size="10.5" fill="#5b7db1" text-anchor="middle">runq 空</text>

  <!-- victim P1 (full) -->
  <rect x="540" y="80" width="170" height="150" rx="12" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <text x="556" y="104" font-size="12" font-weight="600" fill="#6b4e16">P1 · 目标（满）</text>
  <rect x="556" y="118" width="30" height="22" rx="4" fill="#ffffff" stroke="#f0dcaf"/>
  <rect x="590" y="118" width="30" height="22" rx="4" fill="#ffffff" stroke="#f0dcaf"/>
  <rect x="624" y="118" width="30" height="22" rx="4" fill="#ffffff" stroke="#f0dcaf"/>
  <rect x="658" y="118" width="30" height="22" rx="4" fill="#ffffff" stroke="#f0dcaf"/>
  <rect x="556" y="146" width="30" height="22" rx="4" fill="#eef7f0" stroke="#bfe0c8"/>
  <rect x="590" y="146" width="30" height="22" rx="4" fill="#eef7f0" stroke="#bfe0c8"/>
  <rect x="624" y="146" width="30" height="22" rx="4" fill="#eef7f0" stroke="#bfe0c8"/>
  <rect x="658" y="146" width="30" height="22" rx="4" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="556" y="192" font-size="9.5" fill="#a9822f">绿色 = 被偷走的一半</text>
  <text x="556" y="210" font-size="9.5" fill="#a9822f">白色 = 留给 P1 继续跑</text>

  <!-- victim P2 -->
  <rect x="730" y="80" width="150" height="150" rx="12" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <text x="746" y="104" font-size="12" font-weight="600" fill="#6b4e16">P2</text>
  <rect x="746" y="118" width="26" height="20" rx="4" fill="#ffffff" stroke="#f0dcaf"/>
  <rect x="778" y="118" width="26" height="20" rx="4" fill="#ffffff" stroke="#f0dcaf"/>
  <rect x="810" y="118" width="26" height="20" rx="4" fill="#ffffff" stroke="#f0dcaf"/>
  <text x="746" y="168" font-size="9.5" fill="#a9822f">随机遍历时</text>
  <text x="746" y="185" font-size="9.5" fill="#a9822f">也是候选目标</text>
  <text x="746" y="210" font-size="9.5" fill="#a9822f">跳过 _Psyscall P</text>

  <!-- steal arrows: victim -> thief (green G flow) -->
  <path d="M556,170 C520,210 505,175 500,168" fill="none" stroke="#4a8c60" stroke-width="1.8" marker-end="url(#arG)"/>
  <text x="512" y="208" font-size="9.5" fill="#4a8c60">偷 ½ G</text>
  <path d="M746,150 C660,250 560,200 502,180" fill="none" stroke="#4a8c60" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#arG)"/>

  <!-- connect stealWork flow to grid -->
  <line x1="270" y1="242" x2="316" y2="180" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="278" y="222" font-size="9" fill="#8e8e93">扫描</text>

  <!-- bottom notes -->
  <rect x="320" y="252" width="560" height="90" rx="12" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="338" y="277" font-size="12" font-weight="600" fill="#1d1d1f">无锁偷取的正确性</text>
  <text x="338" y="299" font-size="10.5" fill="#6e6e73">· 生产/本地消费方用 store-release 写 tail；偷取方用 load-acquire 读，建立 happens-before</text>
  <text x="338" y="319" font-size="10.5" fill="#6e6e73">· 偷取方 CAS 目标 P 的 runqhead 抢占 G，失败即重试或换目标，无需持锁</text>
  <text x="338" y="337" font-size="10.5" fill="#6e6e73">· runnext 有 3µs 保护窗口，避免刚唤醒的 G 立刻被偷、破坏局部性</text>

  <rect x="320" y="356" width="560" height="92" rx="12" fill="#f5f0fb" stroke="#ddcdf0"/>
  <text x="338" y="381" font-size="12" font-weight="600" fill="#3d2a5a">为什么要 spinning M</text>
  <text x="338" y="403" font-size="10.5" fill="#7d5bb1">· 保留少量自旋 M，新 G 到来时无需唤醒/新建线程即可立刻抢占，降延迟</text>
  <text x="338" y="423" font-size="10.5" fill="#7d5bb1">· 门槛 2·nmspinning &lt; GOMAXPROCS−npidle（proc.go:3532），平衡响应与空转</text>
  <text x="338" y="441" font-size="10.5" fill="#7d5bb1">· 偷取让负载在 P 之间自动均衡，无中心调度器瓶颈</text>
</svg>
