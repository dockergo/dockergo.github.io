<svg xmlns="http://www.w3.org/2000/svg" width="900" height="540" viewBox="0 0 900 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
    <marker id="arR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#d99a9a"/>
    </marker>
  </defs>
  <rect width="900" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">panic 展开 · gopanic 建 _panic 记录、逆序遍历 defer 链「边跑边爬栈」</text>

  <!-- step 1: gopanic (red) -->
  <rect x="30" y="48" width="500" height="72" rx="12" fill="#fbeeee" stroke="#f0c4c4" filter="url(#soft)"/>
  <text x="46" y="72" font-size="12.5" font-weight="600" fill="#7a1f1f">① panic(v) → gopanic(v) · panic.go:809</text>
  <text x="46" y="91" font-size="10.5" fill="#b15b5b">建 _panic 记录（runtime2.go:1175，仅存在于栈上）</text>
  <text x="46" y="108" font-size="10.5" fill="#b15b5b">头插 g._panic · 中断正常流程</text>

  <!-- _panic anchor mini (amber) -->
  <rect x="548" y="48" width="322" height="72" rx="12" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <text x="564" y="72" font-size="11.5" font-weight="600" fill="#6b4e16">_panic（栈上）</text>
  <text x="564" y="91" font-size="10" fill="#a9822f">arg 值 / link / recovered 标志 / goexit</text>
  <text x="564" y="108" font-size="10" fill="#a9822f">用于记录展开状态与恢复点</text>

  <line x1="280" y1="120" x2="280" y2="146" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- step 2 header (blue) -->
  <rect x="30" y="148" width="840" height="46" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="167" font-size="12.5" font-weight="600" fill="#1b2a4a">② 逆序遍历 g._defer 链，逐个执行 defer（open-coded 经 addOneOpenDeferFrame 收进来统一跑）</text>
  <text x="46" y="184" font-size="10" fill="#5b7db1">「边跑 defer 边爬栈向上」——不是先爬完再跑，因为 defer 里可能 recover 中止爬栈</text>

  <!-- stack frames climbing up (neutral cards), with defer + check -->
  <!-- frame bottom -->
  <rect x="60" y="210" width="360" height="60" rx="10" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="76" y="233" font-size="11.5" font-weight="600" fill="#1d1d1f">栈帧 · panic 发生处 f3</text>
  <text x="76" y="252" font-size="10" fill="#6e6e73">执行 f3 注册的 defer</text>

  <rect x="440" y="210" width="200" height="60" rx="10" fill="#f5f0fb" stroke="#ddcdf0"/>
  <text x="540" y="234" font-size="10.5" font-weight="600" fill="#3d2a5a" text-anchor="middle">③ 检查是否 recover？</text>
  <text x="540" y="253" font-size="10" fill="#7d5bb1" text-anchor="middle">否 → 继续下一个 defer</text>

  <line x1="420" y1="240" x2="438" y2="240" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <!-- climb arrow up -->
  <line x1="240" y1="210" x2="240" y2="292" stroke="#d99a9a" stroke-width="1.6" marker-end="url(#arR)"/>
  <text x="252" y="288" font-size="9.5" fill="#b15b5b">向上爬栈</text>

  <rect x="60" y="296" width="360" height="60" rx="10" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="76" y="319" font-size="11.5" font-weight="600" fill="#1d1d1f">栈帧 · 调用者 f2</text>
  <text x="76" y="338" font-size="10" fill="#6e6e73">跨越栈帧、执行 f2 的 defer</text>

  <rect x="440" y="296" width="200" height="60" rx="10" fill="#f5f0fb" stroke="#ddcdf0"/>
  <text x="540" y="320" font-size="10.5" font-weight="600" fill="#3d2a5a" text-anchor="middle">仍未 recover？</text>
  <text x="540" y="339" font-size="10" fill="#7d5bb1" text-anchor="middle">否 → 继续展开</text>
  <line x1="420" y1="326" x2="438" y2="326" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="240" y1="296" x2="240" y2="378" stroke="#d99a9a" stroke-width="1.6" marker-end="url(#arR)"/>

  <rect x="60" y="382" width="360" height="60" rx="10" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="76" y="405" font-size="11.5" font-weight="600" fill="#1d1d1f">栈帧 · main / 栈顶</text>
  <text x="76" y="424" font-size="10" fill="#6e6e73">defer 全跑完仍无 recover</text>

  <!-- branch to recover (right, green success path) -->
  <rect x="660" y="210" width="210" height="60" rx="10" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="765" y="234" font-size="10.5" font-weight="600" fill="#1d4a2b" text-anchor="middle">是 → 被 recover</text>
  <text x="765" y="253" font-size="10" fill="#4a8c60" text-anchor="middle">停止展开（见 recover 图）</text>
  <line x1="640" y1="230" x2="658" y2="230" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- final fatalpanic (red) -->
  <line x1="240" y1="442" x2="240" y2="466" stroke="#d99a9a" stroke-width="1.6" marker-end="url(#arR)"/>
  <rect x="30" y="470" width="840" height="56" rx="12" fill="#fbeeee" stroke="#f0c4c4" filter="url(#soft)"/>
  <text x="46" y="494" font-size="12.5" font-weight="600" fill="#7a1f1f">④ 到达栈顶仍无 recover → fatalpanic · panic.go:1470</text>
  <text x="46" y="513" font-size="10.5" fill="#b15b5b">打印 panic 信息 + 所有 goroutine 栈 → 进程崩溃（exit 2）</text>
</svg>
