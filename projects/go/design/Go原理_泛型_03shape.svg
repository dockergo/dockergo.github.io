<svg xmlns="http://www.w3.org/2000/svg" width="920" height="510" viewBox="0 0 920 510" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
    <marker id="arP" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#9b7dc4"/>
    </marker>
  </defs>
  <rect width="920" height="510" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">GC shape stenciling · 形状分组与 go.shape</text>

  <!-- Shapify intro (purple) -->
  <rect x="30" y="50" width="860" height="52" rx="12" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <text x="46" y="72" font-size="12" font-weight="600" fill="#3d2a5a">Shapify (reader.go:960) · 把类型实参坍缩成它的 "GC 形状类型"</text>
  <text x="46" y="90" font-size="10" fill="#7d5bb1">代码中称 shape-based stenciling —— 类型实参不逐个生成代码，而按形状归组</text>

  <!-- pointer collapse group (purple) -->
  <rect x="30" y="120" width="530" height="220" rx="13" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <text x="46" y="144" font-size="12" font-weight="600" fill="#3d2a5a">所有指针类型 → 共享一个形状</text>
  <text x="46" y="162" font-size="10" fill="#7d5bb1">内存布局 / GC 扫描一致（都是一个需扫描的指针字）</text>

  <rect x="46" y="178" width="120" height="38" rx="9" fill="#ffffff" stroke="#ddcdf0"/>
  <text x="106" y="202" font-size="11" fill="#3d2a5a" text-anchor="middle" font-family="'SF Mono','Menlo',monospace">*int</text>
  <rect x="46" y="224" width="120" height="38" rx="9" fill="#ffffff" stroke="#ddcdf0"/>
  <text x="106" y="248" font-size="11" fill="#3d2a5a" text-anchor="middle" font-family="'SF Mono','Menlo',monospace">*string</text>
  <rect x="46" y="270" width="120" height="38" rx="9" fill="#ffffff" stroke="#ddcdf0"/>
  <text x="106" y="294" font-size="11" fill="#3d2a5a" text-anchor="middle" font-family="'SF Mono','Menlo',monospace">*T (任意指针)</text>

  <path d="M170,197 C210,197 210,243 246,243" fill="none" stroke="#9b7dc4" stroke-width="1.5" marker-end="url(#arP)"/>
  <path d="M170,243 H246" fill="none" stroke="#9b7dc4" stroke-width="1.5" marker-end="url(#arP)"/>
  <path d="M170,289 C210,289 210,243 246,243" fill="none" stroke="#9b7dc4" stroke-width="1.5" marker-end="url(#arP)"/>
  <text x="208" y="224" font-size="9.5" fill="#7d5bb1" text-anchor="middle">坍缩</text>

  <rect x="248" y="216" width="150" height="54" rx="10" fill="#f5f0fb" stroke="#9b7dc4" stroke-width="1.5"/>
  <text x="323" y="240" font-size="12" font-weight="600" fill="#3d2a5a" text-anchor="middle" font-family="'SF Mono','Menlo',monospace">*byte</text>
  <text x="323" y="258" font-size="9.5" fill="#7d5bb1" text-anchor="middle">reader.go:983</text>

  <line x1="398" y1="243" x2="430" y2="243" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="432" y="210" width="112" height="66" rx="10" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="488" y="234" font-size="10.5" font-weight="600" fill="#1d4a2b" text-anchor="middle">Stack[*int]</text>
  <text x="488" y="252" font-size="10.5" font-weight="600" fill="#1d4a2b" text-anchor="middle">Stack[*string]</text>
  <text x="488" y="268" font-size="9" fill="#4a8c60" text-anchor="middle">共用同一份机器码</text>

  <!-- non-pointer group (amber) -->
  <rect x="580" y="120" width="310" height="220" rx="13" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <text x="596" y="144" font-size="12" font-weight="600" fill="#6b4e16">非指针类型 → 按底层类型定形状</text>
  <text x="596" y="162" font-size="10" fill="#a9822f">值类型各自成形（Underlying）</text>

  <rect x="596" y="178" width="130" height="40" rx="9" fill="#ffffff" stroke="#f0dcaf"/>
  <text x="661" y="203" font-size="11" fill="#6b4e16" text-anchor="middle" font-family="'SF Mono','Menlo',monospace">int</text>
  <rect x="744" y="178" width="130" height="40" rx="9" fill="#ffffff" stroke="#f0dcaf"/>
  <text x="809" y="203" font-size="11" fill="#6b4e16" text-anchor="middle" font-family="'SF Mono','Menlo',monospace">int32</text>
  <rect x="596" y="228" width="130" height="40" rx="9" fill="#ffffff" stroke="#f0dcaf"/>
  <text x="661" y="253" font-size="11" fill="#6b4e16" text-anchor="middle" font-family="'SF Mono','Menlo',monospace">float64</text>
  <rect x="744" y="228" width="130" height="40" rx="9" fill="#ffffff" stroke="#f0dcaf"/>
  <text x="809" y="253" font-size="11" fill="#6b4e16" text-anchor="middle" font-family="'SF Mono','Menlo',monospace">struct{...}</text>
  <text x="596" y="292" font-size="10" fill="#a9822f">各自独立形状 → 各生成一份特化代码</text>
  <text x="596" y="312" font-size="10" fill="#a9822f">（值类型特化，无装箱开销）</text>

  <!-- go.shape package (purple) -->
  <rect x="30" y="358" width="860" height="66" rx="13" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <text x="46" y="382" font-size="12" font-weight="600" fill="#3d2a5a">形状类型放在假包 go.shape</text>
  <rect x="330" y="366" width="220" height="34" rx="8" fill="#ffffff" stroke="#ddcdf0"/>
  <text x="440" y="388" font-size="10.5" fill="#3d2a5a" text-anchor="middle" font-family="'SF Mono','Menlo',monospace">go.shape (type.go:1987)</text>
  <rect x="566" y="366" width="308" height="34" rx="8" fill="#ffffff" stroke="#ddcdf0"/>
  <text x="720" y="388" font-size="10.5" fill="#3d2a5a" text-anchor="middle">带 typeIsShape 标志 (type.go:231)</text>
  <text x="46" y="416" font-size="10" fill="#7d5bb1">形状是编译器合成的类型，不出现在用户代码里</text>

  <!-- benefit (green) -->
  <rect x="30" y="440" width="860" height="52" rx="12" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="46" y="463" font-size="11.5" font-weight="600" fill="#1d4a2b">收益</text>
  <text x="46" y="482" font-size="10.5" fill="#4a8c60">代码膨胀收敛到 "形状数" 而非 "类型数" —— 大量指针实例共享一份代码，是全单态化与全装箱的折中。</text>
</svg>
