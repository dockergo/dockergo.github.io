<svg xmlns="http://www.w3.org/2000/svg" width="920" height="480" viewBox="0 0 920 480" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="920" height="480" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">类型检查 · types2.checkFiles 的有序阶段（给表达式绑类型、报类型错误）</text>

  <!-- input: AST -->
  <rect x="30" y="58" width="150" height="46" rx="11" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <text x="46" y="80" font-size="11.5" font-weight="600" fill="#3d2a5a">*syntax.File</text>
  <text x="46" y="96" font-size="9.5" fill="#7d5bb1">无类型 AST（多文件）</text>
  <line x1="180" y1="81" x2="214" y2="81" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- driver -->
  <rect x="216" y="58" width="480" height="46" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="236" y="80" font-size="12" font-weight="600" fill="#1b2a4a">types2.checkFiles · 与标准库 go/types 同算法</text>
  <text x="236" y="96" font-size="9.5" fill="#5b7db1">按固定顺序跑各阶段 · check.go:422 / 464</text>
  <line x1="456" y1="104" x2="456" y2="128" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- phase pipeline: 7 ordered stages, 2 rows -->
  <!-- row 1 -->
  <rect x="30" y="132" width="200" height="72" rx="12" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <circle cx="52" cy="154" r="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="52" y="158" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">1</text>
  <text x="70" y="152" font-size="11" font-weight="600" fill="#1d1d1f">collectObjects</text>
  <text x="46" y="176" font-size="9.5" fill="#6e6e73">遍历声明，登记每个包级</text>
  <text x="46" y="192" font-size="9.5" fill="#6e6e73">对象（常量/变量/类型/函数）</text>

  <line x1="230" y1="168" x2="256" y2="168" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="258" y="132" width="200" height="72" rx="12" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <circle cx="280" cy="154" r="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="280" y="158" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">2</text>
  <text x="298" y="152" font-size="11" font-weight="600" fill="#1d1d1f">sortObjects</text>
  <text x="274" y="176" font-size="9.5" fill="#6e6e73">按依赖拓扑排序；</text>
  <text x="274" y="192" font-size="9.5" fill="#6e6e73">directCycles 检出非法循环</text>

  <line x1="458" y1="168" x2="484" y2="168" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="486" y="132" width="200" height="72" rx="12" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <circle cx="508" cy="154" r="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="508" y="158" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">3</text>
  <text x="526" y="152" font-size="11" font-weight="600" fill="#1d1d1f">packageObjects</text>
  <text x="502" y="176" font-size="9.5" fill="#6e6e73">按序推导每个对象类型，</text>
  <text x="502" y="192" font-size="9.5" fill="#6e6e73">填 TypeAndValue 到 Info</text>

  <!-- turn down -->
  <line x1="686" y1="168" x2="710" y2="168" stroke="#c7c7cc" stroke-width="1.5"/>
  <line x1="710" y1="168" x2="710" y2="240" stroke="#c7c7cc" stroke-width="1.5"/>
  <line x1="710" y1="240" x2="686" y2="240" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- row 2 -->
  <rect x="486" y="204" width="200" height="72" rx="12" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <circle cx="508" cy="226" r="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="508" y="230" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">4</text>
  <text x="526" y="224" font-size="11" font-weight="600" fill="#1d1d1f">processDelayed</text>
  <text x="502" y="248" font-size="9.5" fill="#6e6e73">检查所有函数体内部：</text>
  <text x="502" y="264" font-size="9.5" fill="#6e6e73">语句/表达式逐一定型</text>

  <line x1="486" y1="240" x2="460" y2="240" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="258" y="204" width="200" height="72" rx="12" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <circle cx="280" cy="226" r="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="280" y="230" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">5</text>
  <text x="298" y="224" font-size="11" font-weight="600" fill="#1d1d1f">initOrder</text>
  <text x="274" y="248" font-size="9.5" fill="#6e6e73">推导包级变量初始化顺序，</text>
  <text x="274" y="264" font-size="9.5" fill="#6e6e73">保证依赖先于被依赖</text>

  <line x1="258" y1="240" x2="232" y2="240" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="30" y="204" width="200" height="72" rx="12" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <circle cx="52" cy="226" r="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="52" y="230" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">6</text>
  <text x="70" y="224" font-size="11" font-weight="600" fill="#1d1d1f">unusedImports</text>
  <text x="46" y="248" font-size="9.5" fill="#6e6e73">检查未使用的 import，</text>
  <text x="46" y="264" font-size="9.5" fill="#6e6e73">未用即报错</text>

  <!-- turn down to phase 7 -->
  <line x1="130" y1="276" x2="130" y2="300" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="30" y="304" width="200" height="66" rx="12" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <circle cx="52" cy="326" r="11" fill="#ffffff" stroke="#ddcdf0"/>
  <text x="52" y="330" font-size="11" font-weight="600" fill="#3d2a5a" text-anchor="middle">7</text>
  <text x="70" y="324" font-size="11" font-weight="600" fill="#3d2a5a">monomorph</text>
  <text x="46" y="346" font-size="9.5" fill="#7d5bb1">泛型单态化检查：验证类型</text>
  <text x="46" y="362" font-size="9.5" fill="#7d5bb1">实参满足约束 · 见【泛型】</text>

  <line x1="230" y1="337" x2="256" y2="337" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- output: typed tree -->
  <rect x="258" y="304" width="200" height="66" rx="12" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="274" y="326" font-size="11" font-weight="600" fill="#1d4a2b">类型完备的语法树</text>
  <text x="274" y="346" font-size="9.5" fill="#4a8c60">每个表达式绑定 types2.Type，</text>
  <text x="274" y="362" font-size="9.5" fill="#4a8c60">Info 表存 Defs/Uses/Types</text>

  <!-- error sink -->
  <rect x="486" y="304" width="200" height="66" rx="12" fill="#fbeeee" stroke="#f0c4c4" filter="url(#soft)"/>
  <text x="502" y="326" font-size="11" font-weight="600" fill="#7a1f1f">类型错误汇总</text>
  <text x="502" y="346" font-size="9.5" fill="#b15b5b">任一阶段发现不匹配即记录，</text>
  <text x="502" y="362" font-size="9.5" fill="#b15b5b">尽量多报，最终统一输出</text>

  <!-- right note panel -->
  <rect x="710" y="132" width="180" height="238" rx="13" fill="#f6f6f7" stroke="#e2e2e7"/>
  <text x="726" y="156" font-size="11.5" font-weight="600" fill="#1d1d1f">为何分阶段</text>
  <text x="726" y="180" font-size="10" fill="#6e6e73">Go 允许声明前置引用</text>
  <text x="726" y="196" font-size="10" fill="#6e6e73">（后声明的类型/函数</text>
  <text x="726" y="212" font-size="10" fill="#6e6e73">可被前面使用）。</text>
  <text x="726" y="236" font-size="10" fill="#6e6e73">因此必须：</text>
  <text x="726" y="256" font-size="10" fill="#6e6e73">先全部解析成 AST，</text>
  <text x="726" y="272" font-size="10" fill="#6e6e73">再统一定型 —— 类型</text>
  <text x="726" y="288" font-size="10" fill="#6e6e73">检查不在解析时同步做。</text>
  <line x1="726" y1="304" x2="874" y2="304" stroke="#e2e2e7" stroke-width="1"/>
  <text x="726" y="326" font-size="9.5" fill="#a3a3a8">与 go/types 共享同一套</text>
  <text x="726" y="342" font-size="9.5" fill="#a3a3a8">类型算法实现，行为一致。</text>
  <text x="726" y="360" font-size="9.5" fill="#a3a3a8">check.go:422 / 464</text>
</svg>
