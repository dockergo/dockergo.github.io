<svg xmlns="http://www.w3.org/2000/svg" width="900" height="440" viewBox="0 0 900 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="900" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">接口的两种表示 · eface（空接口 any）vs iface（非空接口）</text>
  <text x="30" y="49" font-size="10.5" fill="#6e6e73">运行期一个接口值 = 两个机器字（类型信息 + 数据指针）</text>

  <!-- eface card (purple = interface) -->
  <rect x="30" y="66" width="400" height="200" rx="13" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <text x="46" y="92" font-size="13" font-weight="600" fill="#3d2a5a">eface · 空接口 any（interface{}）</text>
  <text x="46" y="110" font-size="10.5" fill="#7d5bb1">runtime2.go:189 · 无方法，只需「是什么 + 值在哪」</text>

  <rect x="46" y="122" width="368" height="54" rx="9" fill="#ffffff" stroke="#ddcdf0"/>
  <text x="60" y="144" font-size="11.5" font-weight="600" fill="#3d2a5a">_type · *_type</text>
  <text x="60" y="163" font-size="10" fill="#7d5bb1">动态类型描述符（机器字 1）</text>

  <rect x="46" y="182" width="368" height="54" rx="9" fill="#ffffff" stroke="#ddcdf0"/>
  <text x="60" y="204" font-size="11.5" font-weight="600" fill="#3d2a5a">data · unsafe.Pointer</text>
  <text x="60" y="223" font-size="10" fill="#7d5bb1">数据指针（机器字 2）</text>

  <text x="46" y="256" font-size="10" fill="#7d5bb1">例：var x any = 42</text>

  <!-- iface card (purple, distinguished with tab) -->
  <rect x="470" y="66" width="400" height="200" rx="13" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <text x="486" y="92" font-size="13" font-weight="600" fill="#3d2a5a">iface · 非空接口（有方法，如 io.Reader）</text>
  <text x="486" y="110" font-size="10.5" fill="#7d5bb1">runtime2.go:184 · 方法派发靠 tab</text>

  <rect x="486" y="122" width="368" height="54" rx="9" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="500" y="144" font-size="11.5" font-weight="600" fill="#1b2a4a">tab · *itab</text>
  <text x="500" y="163" font-size="10" fill="#5b7db1">接口方法表（含类型信息 + 方法地址表）</text>

  <rect x="486" y="182" width="368" height="54" rx="9" fill="#ffffff" stroke="#ddcdf0"/>
  <text x="500" y="204" font-size="11.5" font-weight="600" fill="#3d2a5a">data · unsafe.Pointer</text>
  <text x="500" y="223" font-size="10" fill="#7d5bb1">数据指针（机器字 2）</text>

  <text x="486" y="256" font-size="10" fill="#7d5bb1">例：var r io.Reader = f</text>

  <!-- data destination (blue = concrete type) -->
  <rect x="255" y="300" width="390" height="72" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="271" y="325" font-size="12" font-weight="600" fill="#1b2a4a">data 指向实际数据（堆 / 栈上的拷贝）</text>
  <text x="271" y="345" font-size="10.5" fill="#5b7db1">值较大或非指针 → 指向拷贝；小值经装箱（convT 系列）</text>
  <text x="271" y="362" font-size="10.5" fill="#5b7db1">两种接口的 data 字段语义一致</text>

  <line x1="230" y1="236" x2="360" y2="298" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="670" y1="236" x2="540" y2="298" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- escape warning (amber = storage) -->
  <rect x="30" y="388" width="840" height="40" rx="11" fill="#fdf6ec" stroke="#f0dcaf"/>
  <text x="46" y="413" font-size="10.5" fill="#6b4e16"><tspan font-weight="600">逃逸提醒：</tspan>把值装进接口通常会逃逸到堆（data 需指针）——接口是常见的逃逸源，性能敏感处注意。</text>
</svg>
