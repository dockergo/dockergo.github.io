<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">混合写屏障 · Yuasa 删除 + Dijkstra 插入</text>
  <text x="30" y="48" font-size="11" fill="#6e6e73">并发标记时用户程序改指针 → 可能把白对象藏到黑对象下漏标；混合写屏障（mbarrier.go:24）维持不变式</text>

  <!-- ==== pseudocode (purple, rules) ==== -->
  <rect x="30" y="72" width="440" height="204" rx="13" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <text x="46" y="96" font-size="12.5" font-weight="600" fill="#3d2a5a">屏障伪码 · writePointer(slot, ptr)</text>

  <rect x="46" y="110" width="408" height="40" rx="8" fill="#ffffff" stroke="#ddcdf0"/>
  <text x="58" y="135" font-size="12" fill="#3d2a5a" font-family="'SF Mono','Menlo',monospace">shade(*slot)</text>
  <text x="228" y="135" font-size="10" fill="#7d5bb1">删除屏障 · 旧值先染灰（Yuasa）</text>

  <rect x="46" y="158" width="408" height="40" rx="8" fill="#ffffff" stroke="#ddcdf0"/>
  <text x="58" y="183" font-size="12" fill="#3d2a5a" font-family="'SF Mono','Menlo',monospace">if 栈灰: shade(ptr)</text>
  <text x="228" y="183" font-size="10" fill="#7d5bb1">插入屏障 · 新值染灰（Dijkstra）</text>

  <rect x="46" y="206" width="408" height="40" rx="8" fill="#f6f6f7" stroke="#e2e2e7"/>
  <text x="58" y="231" font-size="12" fill="#1d1d1f" font-family="'SF Mono','Menlo',monospace">*slot = ptr</text>
  <text x="228" y="231" font-size="10" fill="#6e6e73">最后才真正写入指针</text>

  <text x="46" y="266" font-size="10" fill="#7d5bb1">组合效果：栈一旦扫描变黑就不再变灰 → 消除重扫栈的 STW</text>

  <!-- ==== fast path -> wbBuf (amber buffer) ==== -->
  <rect x="490" y="72" width="440" height="204" rx="13" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <text x="506" y="96" font-size="12.5" font-weight="600" fill="#6b4e16">快路径 · gcWriteBarrier → wbBuf</text>

  <rect x="506" y="110" width="200" height="60" rx="9" fill="#ffffff" stroke="#f0dcaf"/>
  <text x="516" y="130" font-size="10.5" font-weight="600" fill="#6b4e16">gcWriteBarrier（汇编）</text>
  <text x="516" y="147" font-size="9.5" fill="#a9822f">编译器为每个指针写插入</text>
  <text x="516" y="162" font-size="9.5" fill="#a9822f">把"待染色指针"入缓冲</text>

  <line x1="706" y1="140" x2="736" y2="140" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="736" y="110" width="178" height="60" rx="9" fill="#f6e6c8" stroke="#e2c88f"/>
  <text x="746" y="130" font-size="10.5" font-weight="600" fill="#6b4e16">wbBuf（P 本地）</text>
  <text x="746" y="147" font-size="9.5" fill="#a9822f">512 项顺序存储缓冲 SSB</text>
  <text x="746" y="162" font-size="9.5" fill="#a9822f">mwbbuf.go:42 · 无锁</text>

  <!-- buffer slots -->
  <rect x="506" y="184" width="408" height="30" rx="7" fill="#ffffff" stroke="#f0dcaf"/>
  <rect x="514" y="190" width="22" height="18" rx="3" fill="#f6e6c8" stroke="#e2c88f"/>
  <rect x="540" y="190" width="22" height="18" rx="3" fill="#f6e6c8" stroke="#e2c88f"/>
  <rect x="566" y="190" width="22" height="18" rx="3" fill="#f6e6c8" stroke="#e2c88f"/>
  <rect x="592" y="190" width="22" height="18" rx="3" fill="#f6e6c8" stroke="#e2c88f"/>
  <rect x="618" y="190" width="22" height="18" rx="3" fill="#f6e6c8" stroke="#e2c88f"/>
  <text x="660" y="203" font-size="9.5" fill="#a9822f">…… 顺序追加至 512 项</text>
  <text x="820" y="203" font-size="9.5" font-weight="600" fill="#6b4e16">[满]</text>

  <text x="506" y="240" font-size="10" fill="#6b4e16">批处理摊薄单次写屏障成本 —— 缓冲满则一次性 flush 批量染灰</text>
  <line x1="640" y1="252" x2="640" y2="286" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="700" y="272" font-size="9.5" fill="#6e6e73" text-anchor="middle">wbBufFlush（mwbbuf.go:166）</text>

  <!-- ==== flush -> mark queue (green) ==== -->
  <rect x="490" y="296" width="440" height="88" rx="13" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="506" y="320" font-size="12.5" font-weight="600" fill="#1d4a2b">wbBufFlush · 批量染灰入工作队列</text>
  <text x="506" y="342" font-size="10" fill="#1d4a2b">把缓冲中所有指针一次性 shade → 灰色对象进标记队列，</text>
  <text x="506" y="360" font-size="10" fill="#1d4a2b">交由后台 worker / mark assist 继续扫描其引用（灰→黑）。</text>
  <text x="506" y="378" font-size="9.5" fill="#4a8c60">批量 flush 把 N 次真扫摊成一次，显著降屏障均摊开销</text>

  <!-- ==== when enabled + invariant (bottom) ==== -->
  <rect x="30" y="296" width="440" height="88" rx="13" fill="#f6f6f7" stroke="#e2e2e7"/>
  <text x="46" y="320" font-size="12.5" font-weight="600" fill="#1d1d1f">屏障启用时机</text>
  <text x="46" y="342" font-size="10" fill="#3a3a3c">仅 _GCmark / _GCmarktermination 相位开启</text>
  <text x="46" y="360" font-size="10" fill="#3a3a3c">（writeBarrier.enabled）；</text>
  <text x="46" y="378" font-size="10" fill="#6e6e73">_GCoff 期间指针写无任何额外开销。</text>

  <!-- invariant strip -->
  <rect x="30" y="404" width="900" height="112" rx="13" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <text x="46" y="428" font-size="12.5" font-weight="600" fill="#3d2a5a">为什么两个屏障都要？——同时防两条漏标路径，维持"黑不指白"不变式</text>

  <rect x="46" y="442" width="428" height="60" rx="9" fill="#ffffff" stroke="#ddcdf0"/>
  <text x="58" y="462" font-size="10.5" font-weight="600" fill="#3d2a5a">Yuasa 删除屏障 · shade(*slot)</text>
  <text x="58" y="480" font-size="9.5" fill="#7d5bb1">旧值可能是"只被此处引用的白对象"，</text>
  <text x="58" y="495" font-size="9.5" fill="#7d5bb1">覆盖前先染灰，防被覆盖后失联漏标。</text>

  <rect x="486" y="442" width="444" height="60" rx="9" fill="#ffffff" stroke="#ddcdf0"/>
  <text x="498" y="462" font-size="10.5" font-weight="600" fill="#3d2a5a">Dijkstra 插入屏障 · shade(ptr)</text>
  <text x="498" y="480" font-size="9.5" fill="#7d5bb1">新值被写入黑对象时染灰，</text>
  <text x="498" y="495" font-size="9.5" fill="#7d5bb1">防"白被塞进已扫描黑对象"漏标（栈灰时才需）。</text>
</svg>
