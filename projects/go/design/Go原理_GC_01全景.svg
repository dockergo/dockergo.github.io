<svg xmlns="http://www.w3.org/2000/svg" width="940" height="480" viewBox="0 0 940 480" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
    <marker id="arR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#d05a5a"/>
    </marker>
  </defs>
  <rect width="940" height="480" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">GC 全景 · 三色标记清除四步</text>
  <text x="30" y="48" font-size="11" fill="#6e6e73">并发 · 三色标记清除 · 非分代 · 非压缩（mgc.go:6）——只在标记开始 / 终止做两段极短 STW</text>

  <!-- ==== step chain ==== -->
  <!-- step1 sweep termination (red/STW) -->
  <rect x="30" y="64" width="190" height="108" rx="13" fill="#fbeeee" stroke="#f0c4c4" filter="url(#soft)"/>
  <circle cx="57" cy="90" r="13" fill="#b15b5b"/>
  <text x="57" y="94" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">1</text>
  <text x="78" y="88" font-size="13" font-weight="600" fill="#7a1f1f">清扫终止</text>
  <text x="78" y="104" font-size="9.5" fill="#b15b5b">sweep termination</text>
  <rect x="44" y="116" width="70" height="18" rx="9" fill="#f7dada" stroke="#e6a5a5"/>
  <text x="52" y="129" font-size="9.5" font-weight="600" fill="#7a1f1f">STW 停世界</text>
  <text x="45" y="151" font-size="10" fill="#7a1f1f">确保上一轮</text>
  <text x="45" y="165" font-size="10" fill="#7a1f1f">清扫全部完成</text>

  <!-- step2 mark (green/concurrent) -->
  <rect x="260" y="64" width="190" height="108" rx="13" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)"/>
  <circle cx="287" cy="90" r="13" fill="#4a8c60"/>
  <text x="287" y="94" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">2</text>
  <text x="308" y="88" font-size="13" font-weight="600" fill="#1d4a2b">标记</text>
  <text x="308" y="104" font-size="9.5" fill="#4a8c60">mark · _GCmark 相位</text>
  <rect x="274" y="116" width="112" height="18" rx="9" fill="#dcefe0" stroke="#a9d3b6"/>
  <text x="282" y="129" font-size="9.5" font-weight="600" fill="#1d4a2b">并发 · 写屏障开</text>
  <text x="275" y="151" font-size="10" fill="#1d4a2b">根+堆对象 灰→黑</text>
  <text x="275" y="165" font-size="10" fill="#1d4a2b">新分配直接变黑</text>

  <!-- step3 mark termination (red/STW) -->
  <rect x="490" y="64" width="190" height="108" rx="13" fill="#fbeeee" stroke="#f0c4c4" filter="url(#soft)"/>
  <circle cx="517" cy="90" r="13" fill="#b15b5b"/>
  <text x="517" y="94" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">3</text>
  <text x="538" y="88" font-size="13" font-weight="600" fill="#7a1f1f">标记终止</text>
  <text x="538" y="104" font-size="9.5" fill="#b15b5b">mark termination · gcMarkDone</text>
  <rect x="504" y="116" width="70" height="18" rx="9" fill="#f7dada" stroke="#e6a5a5"/>
  <text x="512" y="129" font-size="9.5" font-weight="600" fill="#7a1f1f">STW 停世界</text>
  <text x="505" y="151" font-size="10" fill="#7a1f1f">确认无灰 · 关写屏障</text>
  <text x="505" y="165" font-size="10" fill="#7a1f1f">算下一轮触发点</text>

  <!-- step4 sweep (amber/concurrent) -->
  <rect x="720" y="64" width="190" height="108" rx="13" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <circle cx="747" cy="90" r="13" fill="#a9822f"/>
  <text x="747" y="94" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">4</text>
  <text x="768" y="88" font-size="13" font-weight="600" fill="#6b4e16">清扫</text>
  <text x="768" y="104" font-size="9.5" fill="#a9822f">sweep · _GCoff 相位</text>
  <rect x="734" y="116" width="112" height="18" rx="9" fill="#f6e6c8" stroke="#e2c88f"/>
  <text x="742" y="129" font-size="9.5" font-weight="600" fill="#6b4e16">并发 · 写屏障关</text>
  <text x="735" y="151" font-size="10" fill="#6b4e16">逐 span 回收</text>
  <text x="735" y="165" font-size="10" fill="#6b4e16">白色对象空间</text>

  <!-- chain arrows -->
  <line x1="220" y1="110" x2="260" y2="110" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="450" y1="110" x2="490" y2="110" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="680" y1="110" x2="720" y2="110" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ==== tricolor abstraction ==== -->
  <rect x="30" y="196" width="568" height="248" rx="13" fill="#f6f6f7" stroke="#e2e2e7"/>
  <text x="46" y="220" font-size="12.5" font-weight="600" fill="#1d1d1f">三色抽象 · 标记推进（白 → 灰 → 黑）</text>

  <circle cx="140" cy="308" r="33" fill="#ffffff" stroke="#b0b0b5" stroke-width="1.5"/>
  <text x="140" y="314" font-size="16" font-weight="600" fill="#1d1d1f" text-anchor="middle">白</text>
  <circle cx="314" cy="308" r="33" fill="#c7c7cc" stroke="#98989d" stroke-width="1.5"/>
  <text x="314" y="314" font-size="16" font-weight="600" fill="#3a3a3c" text-anchor="middle">灰</text>
  <circle cx="488" cy="308" r="33" fill="#48484a" stroke="#1d1d1f" stroke-width="1.5"/>
  <text x="488" y="314" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">黑</text>

  <line x1="176" y1="308" x2="278" y2="308" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="227" y="300" font-size="9.5" fill="#6e6e73" text-anchor="middle">首次访问·入队</text>
  <line x1="350" y1="308" x2="452" y2="308" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="401" y="300" font-size="9.5" fill="#6e6e73" text-anchor="middle">引用扫描完</text>

  <text x="140" y="364" font-size="11" font-weight="600" fill="#1d1d1f" text-anchor="middle">未访问</text>
  <text x="140" y="380" font-size="9.5" fill="#6e6e73" text-anchor="middle">可能是垃圾</text>
  <text x="140" y="394" font-size="9.5" fill="#6e6e73" text-anchor="middle">清扫将回收</text>
  <text x="314" y="364" font-size="11" font-weight="600" fill="#3a3a3c" text-anchor="middle">已访问·待扫描</text>
  <text x="314" y="380" font-size="9.5" fill="#6e6e73" text-anchor="middle">引用尚未扫描</text>
  <text x="314" y="394" font-size="9.5" fill="#6e6e73" text-anchor="middle">在标记队列中</text>
  <text x="488" y="364" font-size="11" font-weight="600" fill="#1d4a2b" text-anchor="middle">已访问·已扫描</text>
  <text x="488" y="380" font-size="9.5" fill="#6e6e73" text-anchor="middle">引用已全部扫描</text>
  <text x="488" y="394" font-size="9.5" fill="#6e6e73" text-anchor="middle">确认存活</text>

  <!-- ==== invariant ==== -->
  <rect x="612" y="196" width="298" height="248" rx="13" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <text x="628" y="220" font-size="12.5" font-weight="600" fill="#3d2a5a">三色不变式</text>
  <text x="628" y="238" font-size="10.5" fill="#7d5bb1">黑对象不能直接指向白对象</text>

  <rect x="640" y="262" width="64" height="46" rx="9" fill="#48484a" stroke="#1d1d1f"/>
  <text x="672" y="290" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">黑</text>
  <rect x="806" y="262" width="64" height="46" rx="9" fill="#ffffff" stroke="#b0b0b5"/>
  <text x="838" y="290" font-size="14" font-weight="600" fill="#1d1d1f" text-anchor="middle">白</text>
  <line x1="704" y1="285" x2="806" y2="285" stroke="#d05a5a" stroke-width="1.5" marker-end="url(#arR)"/>
  <line x1="748" y1="279" x2="760" y2="291" stroke="#d05a5a" stroke-width="2"/>
  <line x1="760" y1="279" x2="748" y2="291" stroke="#d05a5a" stroke-width="2"/>
  <text x="754" y="272" font-size="9.5" font-weight="600" fill="#b15b5b" text-anchor="middle">禁止</text>

  <text x="628" y="336" font-size="10" fill="#3d2a5a">若黑 → 白：白对象被漏标，</text>
  <text x="628" y="352" font-size="10" fill="#3d2a5a">存活对象被误当垃圾回收。</text>
  <text x="628" y="374" font-size="10" font-weight="600" fill="#3d2a5a">写屏障强制维持此不变式，</text>
  <text x="628" y="390" font-size="10" fill="#3d2a5a">从而无需 STW 全量重扫栈。</text>
  <text x="628" y="422" font-size="9.5" fill="#7d5bb1">锚点 mgc.go:6 · 非分代 · 非压缩</text>
</svg>
