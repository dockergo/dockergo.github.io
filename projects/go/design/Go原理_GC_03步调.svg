<svg xmlns="http://www.w3.org/2000/svg" width="940" height="540" viewBox="0 0 940 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="940" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">GC 步调 · gcController 的堆目标计算</text>
  <text x="30" y="48" font-size="11" fill="#6e6e73">gcControllerState（mgcpacer.go:92）——一个反馈控制系统：何时该 GC、投多少 CPU 标记</text>

  <!-- ==== controller core (blue) ==== -->
  <rect x="30" y="72" width="470" height="196" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="96" font-size="12.5" font-weight="600" fill="#1b2a4a">gcController · 反馈控制器</text>

  <rect x="46" y="110" width="205" height="70" rx="9" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="56" y="130" font-size="11" font-weight="600" fill="#1b2a4a">GOGC（gcPercent，默认 100）</text>
  <text x="56" y="148" font-size="9.5" fill="#5b7db1">heapGoal = 存活堆 ×(1 + GOGC/100)</text>
  <text x="56" y="164" font-size="9.5" fill="#5b7db1">=100：堆翻倍触发；越大 GC 越少堆越大</text>

  <rect x="263" y="110" width="221" height="70" rx="9" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="273" y="130" font-size="11" font-weight="600" fill="#1b2a4a">GOMEMLIMIT（memoryLimit :104）</text>
  <text x="273" y="148" font-size="9.5" fill="#5b7db1">软上限 · 接近则加频 GC 防 OOM</text>
  <text x="273" y="164" font-size="9.5" fill="#5b7db1">"软"限：达不到会持续 GC 而非崩溃</text>

  <rect x="46" y="190" width="205" height="62" rx="9" fill="#eef3fb" stroke="#cfe0f2"/>
  <text x="56" y="209" font-size="10.5" font-weight="600" fill="#1b2a4a">revise（:492）</text>
  <text x="56" y="226" font-size="9.5" fill="#5b7db1">标记期动态修正</text>
  <text x="56" y="241" font-size="9.5" fill="#5b7db1">标记辅助强度</text>

  <rect x="263" y="190" width="221" height="62" rx="9" fill="#eef3fb" stroke="#cfe0f2"/>
  <text x="273" y="209" font-size="10.5" font-weight="600" fill="#1b2a4a">endCycle</text>
  <text x="273" y="226" font-size="9.5" fill="#5b7db1">轮末据实际用量校准</text>
  <text x="273" y="241" font-size="9.5" fill="#5b7db1">下轮触发点与 worker 配比</text>

  <!-- ==== heapGoal bar (amber) ==== -->
  <rect x="524" y="72" width="386" height="196" rx="13" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <text x="540" y="96" font-size="12.5" font-weight="600" fill="#6b4e16">堆增长与 heapGoal（GOGC=100）</text>

  <!-- baseline heap -->
  <rect x="540" y="120" width="120" height="34" rx="7" fill="#f6e6c8" stroke="#e2c88f"/>
  <text x="600" y="141" font-size="10.5" fill="#6b4e16" text-anchor="middle">上轮存活堆</text>
  <!-- growth -->
  <rect x="660" y="120" width="120" height="34" rx="0" fill="#fbeeee" stroke="#f0c4c4"/>
  <text x="720" y="141" font-size="10.5" fill="#7a1f1f" text-anchor="middle">本轮新增</text>
  <!-- goal line -->
  <line x1="780" y1="110" x2="780" y2="168" stroke="#b15b5b" stroke-width="2"/>
  <text x="806" y="130" font-size="10.5" font-weight="600" fill="#7a1f1f">heapGoal</text>
  <text x="806" y="146" font-size="9.5" fill="#b15b5b">= ×2 触发</text>

  <text x="540" y="188" font-size="9.5" fill="#6b4e16">堆达到 heapGoal → gcTriggerHeap 触发下一轮标记</text>

  <rect x="540" y="200" width="354" height="52" rx="9" fill="#ffffff" stroke="#f0dcaf"/>
  <text x="550" y="220" font-size="10.5" font-weight="600" fill="#6b4e16">时间 / 空间权衡</text>
  <text x="550" y="238" font-size="9.5" fill="#a9822f">GOGC 大 → GC 少、内存高；小 → GC 频、CPU 高。配 GOMEMLIMIT 更稳</text>

  <!-- ==== mark CPU 25% (green) ==== -->
  <rect x="30" y="288" width="880" height="228" rx="13" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="46" y="312" font-size="12.5" font-weight="600" fill="#1d4a2b">标记 CPU 目标 ≈ 25% × GOMAXPROCS · 三种 worker 模式</text>
  <text x="46" y="330" font-size="10" fill="#4a8c60">控制器把标记算力压在约 1/4 核，剩余留给用户 goroutine 继续跑</text>

  <!-- 25% bar -->
  <rect x="46" y="346" width="848" height="30" rx="8" fill="#ffffff" stroke="#bfe0c8"/>
  <rect x="48" y="348" width="210" height="26" rx="7" fill="#dcefe0"/>
  <text x="153" y="365" font-size="10.5" font-weight="600" fill="#1d4a2b" text-anchor="middle">标记 worker ≈ 25%</text>
  <text x="576" y="365" font-size="10.5" fill="#4a8c60" text-anchor="middle">用户 goroutine ≈ 75%</text>

  <!-- three workers -->
  <rect x="46" y="392" width="272" height="108" rx="11" fill="#ffffff" stroke="#bfe0c8"/>
  <text x="60" y="414" font-size="11.5" font-weight="600" fill="#1d4a2b">dedicated · 整核 worker</text>
  <text x="60" y="434" font-size="10" fill="#4a8c60">独占一个 P 全程标记，</text>
  <text x="60" y="450" font-size="10" fill="#4a8c60">凑够 25% 的整数核部分。</text>
  <text x="60" y="474" font-size="9.5" fill="#8e8e93">不被用户 G 抢占，标记主力</text>

  <rect x="334" y="392" width="272" height="108" rx="11" fill="#ffffff" stroke="#bfe0c8"/>
  <text x="348" y="414" font-size="11.5" font-weight="600" fill="#1d4a2b">fractional · 分数 worker</text>
  <text x="348" y="434" font-size="10" fill="#4a8c60">补齐 25% 的小数部分，</text>
  <text x="348" y="450" font-size="10" fill="#4a8c60">按配额定时让出 P。</text>
  <text x="348" y="474" font-size="9.5" fill="#8e8e93">精确逼近 25% CPU 目标</text>

  <rect x="622" y="392" width="272" height="108" rx="11" fill="#ffffff" stroke="#bfe0c8"/>
  <text x="636" y="414" font-size="11.5" font-weight="600" fill="#1d4a2b">idle · 空闲 worker</text>
  <text x="636" y="434" font-size="10" fill="#4a8c60">P 无用户 G 可跑时，</text>
  <text x="636" y="450" font-size="10" fill="#4a8c60">顺手标记榨干空闲算力。</text>
  <text x="636" y="474" font-size="9.5" fill="#8e8e93">白捡的额外标记吞吐</text>

  <line x1="180" y1="376" x2="180" y2="390" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
</svg>
