<svg xmlns="http://www.w3.org/2000/svg" width="900" height="472" viewBox="0 0 900 472" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="900" height="472" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">defer 两套实现 · open-coded（开放编码）vs 堆 _defer 链</text>

  <!-- top decision card (blue = compiler driven) -->
  <rect x="30" y="48" width="840" height="56" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="72" font-size="12.5" font-weight="600" fill="#1b2a4a">编译器为每个含 defer 的函数选择实现路径</text>
  <text x="46" y="91" font-size="10.5" fill="#5b7db1">按 defer 的数量与位置分流：简单场景走开放编码，复杂场景回退堆链 · panic.go:38</text>

  <!-- left card: open-coded (green = fast/success) -->
  <rect x="30" y="132" width="405" height="308" rx="13" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="46" y="158" font-size="13" font-weight="600" fill="#1d4a2b">open-coded defer · 开放编码（最快）</text>
  <text x="46" y="176" font-size="10.5" fill="#4a8c60">Go 1.14+ 默认 · 近零运行时开销</text>

  <rect x="46" y="186" width="373" height="30" rx="8" fill="#eff9f2" stroke="#bfe0c8"/>
  <text x="56" y="205" font-size="10.5" fill="#1d4a2b">启用条件：defer ≤ 8 且不在循环中</text>

  <rect x="46" y="222" width="373" height="30" rx="8" fill="#ffffff" stroke="#bfe0c8"/>
  <text x="56" y="241" font-size="10.5" fill="#3a3a3c"><tspan font-weight="600">不建 _defer 记录</tspan> · 无堆分配</text>

  <rect x="46" y="258" width="373" height="30" rx="8" fill="#ffffff" stroke="#bfe0c8"/>
  <text x="56" y="277" font-size="10.5" fill="#3a3a3c">defer 的 fn/参数 → 存进<tspan font-weight="600">栈上固定槽位</tspan></text>

  <rect x="46" y="294" width="373" height="30" rx="8" fill="#ffffff" stroke="#bfe0c8"/>
  <text x="56" y="313" font-size="10.5" fill="#3a3a3c"><tspan font-weight="600">deferBits 位掩码</tspan>：标记哪些 defer 已激活</text>

  <rect x="46" y="330" width="373" height="30" rx="8" fill="#ffffff" stroke="#bfe0c8"/>
  <text x="56" y="349" font-size="10.5" fill="#3a3a3c">函数出口：编译器<tspan font-weight="600">内联展开</tspan>（按位检查）</text>

  <rect x="46" y="368" width="373" height="56" rx="8" fill="#e3f3e9" stroke="#bfe0c8"/>
  <text x="56" y="390" font-size="11" font-weight="600" fill="#1d4a2b">结果 · 开销 ≈ 直接函数调用</text>
  <text x="56" y="409" font-size="10" fill="#4a8c60">覆盖绝大多数常见场景（简单函数里一两个 defer）</text>

  <!-- vs badge -->
  <circle cx="450" cy="286" r="16" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="450" y="290" font-size="11" font-weight="600" fill="#6e6e73" text-anchor="middle">vs</text>

  <!-- right card: heap chain (amber = storage/fallback) -->
  <rect x="465" y="132" width="405" height="308" rx="13" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <text x="481" y="158" font-size="13" font-weight="600" fill="#6b4e16">堆 _defer 链 · 通用回退</text>
  <text x="481" y="176" font-size="10.5" fill="#a9822f">语义完备 · 每 defer 有运行时记录</text>

  <rect x="481" y="186" width="373" height="30" rx="8" fill="#fbf0da" stroke="#f0dcaf"/>
  <text x="491" y="205" font-size="10.5" fill="#6b4e16">触发：defer 在循环 / 数量多 / 条件不满足</text>

  <rect x="481" y="222" width="373" height="30" rx="8" fill="#ffffff" stroke="#f0dcaf"/>
  <text x="491" y="241" font-size="10.5" fill="#3a3a3c"><tspan font-weight="600">deferproc(fn)</tspan> 建 _defer 记录 · runtime2.go:1154</text>

  <rect x="481" y="258" width="373" height="30" rx="8" fill="#ffffff" stroke="#f0dcaf"/>
  <text x="491" y="277" font-size="10.5" fill="#3a3a3c">头插进 <tspan font-weight="600">g._defer 链表</tspan>（LIFO）</text>

  <rect x="481" y="294" width="373" height="30" rx="8" fill="#ffffff" stroke="#f0dcaf"/>
  <text x="491" y="313" font-size="10.5" fill="#3a3a3c"><tspan font-weight="600">deferreturn</tspan> 遍历链表逆序执行 · panic.go:658</text>

  <rect x="481" y="330" width="373" height="30" rx="8" fill="#ffffff" stroke="#f0dcaf"/>
  <text x="491" y="349" font-size="10.5" fill="#3a3a3c">每个 defer：一次<tspan font-weight="600">堆分配</tspan> + 链表操作</text>

  <rect x="481" y="368" width="373" height="56" rx="8" fill="#f7ebd6" stroke="#f0dcaf"/>
  <text x="491" y="390" font-size="11" font-weight="600" fill="#6b4e16">结果 · 较慢但语义完备</text>
  <text x="491" y="409" font-size="10" fill="#a9822f">保证循环 defer 等所有场景正确</text>
</svg>
