<svg xmlns="http://www.w3.org/2000/svg" width="880" height="470" viewBox="0 0 880 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="880" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">GMP 三元组 · G(goroutine) / M(线程) / P(逻辑处理器) 的持有与关联</text>

  <!-- schedt global -->
  <rect x="30" y="52" width="820" height="58" rx="12" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="46" y="76" font-size="12.5" font-weight="600" fill="#1d1d1f">schedt · 全局调度状态</text>
  <rect x="200" y="64" width="180" height="34" rx="8" fill="#fdf6ec" stroke="#f0dcaf"/>
  <text x="290" y="85" font-size="11.5" fill="#6b4e16" text-anchor="middle">全局运行队列 runq</text>
  <rect x="396" y="64" width="150" height="34" rx="8" fill="#ffffff" stroke="#e2e2e7"/>
  <text x="471" y="85" font-size="11.5" fill="#3a3a3c" text-anchor="middle">空闲 M / P 列表</text>
  <rect x="562" y="64" width="272" height="34" rx="8" fill="#ffffff" stroke="#e2e2e7"/>
  <text x="698" y="85" font-size="11.5" fill="#3a3a3c" text-anchor="middle">nmspinning 自旋 M 计数</text>

  <!-- P card (blue) -->
  <rect x="30" y="140" width="250" height="290" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="166" font-size="13" font-weight="600" fill="#1b2a4a">P · 逻辑处理器</text>
  <text x="46" y="184" font-size="10.5" fill="#5b7db1">数量 = GOMAXPROCS · 执行 G 的许可</text>
  <rect x="46" y="198" width="218" height="40" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="56" y="215" font-size="11" font-weight="600" fill="#1b2a4a">runnext</text>
  <text x="56" y="230" font-size="10" fill="#5b7db1">下一个优先跑的 G（局部性）</text>
  <rect x="46" y="246" width="218" height="52" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="56" y="263" font-size="11" font-weight="600" fill="#1b2a4a">runq [256] 本地运行队列</text>
  <text x="56" y="278" font-size="10" fill="#5b7db1">环形数组 · 无锁 · 满则甩半数入全局</text>
  <rect x="60" y="284" width="20" height="8" rx="2" fill="#eef7f0" stroke="#bfe0c8"/>
  <rect x="86" y="284" width="20" height="8" rx="2" fill="#eef7f0" stroke="#bfe0c8"/>
  <rect x="112" y="284" width="20" height="8" rx="2" fill="#eef7f0" stroke="#bfe0c8"/>
  <rect x="138" y="284" width="20" height="8" rx="2" fill="#eef7f0" stroke="#bfe0c8"/>
  <rect x="46" y="306" width="218" height="40" rx="8" fill="#fdf6ec" stroke="#f0dcaf"/>
  <text x="56" y="323" font-size="11" font-weight="600" fill="#6b4e16">mcache</text>
  <text x="56" y="338" font-size="10" fill="#a9822f">每 P 无锁分配缓存（见 分配器）</text>
  <rect x="46" y="354" width="218" height="34" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="56" y="375" font-size="10.5" fill="#3a3a3c">gFree · G 空闲复用池</text>
  <rect x="46" y="396" width="218" height="22" rx="7" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="155" y="411" font-size="10" fill="#5b7db1" text-anchor="middle">status: _Prunning / _Pidle / _Psyscall</text>

  <!-- M card (neutral) -->
  <rect x="315" y="140" width="230" height="200" rx="13" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="331" y="166" font-size="13" font-weight="600" fill="#1d1d1f">M · 工作线程</text>
  <text x="331" y="184" font-size="10.5" fill="#6e6e73">OS 线程（machine）</text>
  <rect x="331" y="198" width="198" height="40" rx="8" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="341" y="215" font-size="11" font-weight="600" fill="#1d4a2b">g0 · 调度专用栈</text>
  <text x="341" y="230" font-size="10" fill="#4a8c60">调度/GC/栈增长都在 g0 上跑</text>
  <rect x="331" y="246" width="198" height="34" rx="8" fill="#ffffff" stroke="#e2e2e7"/>
  <text x="341" y="267" font-size="10.5" fill="#3a3a3c">curg · 当前用户 G</text>
  <rect x="331" y="288" width="198" height="34" rx="8" fill="#ffffff" stroke="#e2e2e7"/>
  <text x="341" y="309" font-size="10.5" fill="#3a3a3c">tls · 线程本地存储</text>

  <!-- G cards (green) -->
  <rect x="600" y="150" width="250" height="80" rx="12" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="616" y="174" font-size="13" font-weight="600" fill="#1d4a2b">G · goroutine（运行中）</text>
  <text x="616" y="193" font-size="10.5" fill="#4a8c60">stack / stackguard0 / sched(gobuf)</text>
  <text x="616" y="210" font-size="10.5" fill="#4a8c60">atomicstatus / _defer / _panic / goid</text>

  <rect x="600" y="250" width="119" height="72" rx="11" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="659" y="283" font-size="11" fill="#1d4a2b" text-anchor="middle">G（可运行）</text>
  <text x="659" y="301" font-size="10" fill="#4a8c60" text-anchor="middle">在 runq 中</text>
  <rect x="731" y="250" width="119" height="72" rx="11" fill="#f6f6f7" stroke="#e2e2e7"/>
  <text x="790" y="283" font-size="11" fill="#6e6e73" text-anchor="middle">G（等待）</text>
  <text x="790" y="301" font-size="10" fill="#8e8e93" text-anchor="middle">_Gwaiting · 不在队列</text>

  <!-- relationships -->
  <line x1="315" y1="240" x2="282" y2="240" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="298" y="232" font-size="9.5" fill="#8e8e93" text-anchor="middle">持有</text>
  <line x1="545" y1="212" x2="598" y2="190" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="572" y="192" font-size="9.5" fill="#8e8e93" text-anchor="middle">curg→</text>

  <rect x="600" y="350" width="250" height="70" rx="12" fill="#f5f0fb" stroke="#ddcdf0"/>
  <text x="616" y="373" font-size="11.5" font-weight="600" fill="#3d2a5a">铁律</text>
  <text x="616" y="392" font-size="10.5" fill="#7d5bb1">M 必须持有 P 才能执行用户 G；</text>
  <text x="616" y="408" font-size="10.5" fill="#7d5bb1">P 数（GOMAXPROCS）= 并行执行 G 上限。</text>
</svg>
