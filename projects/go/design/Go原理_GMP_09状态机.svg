<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="680" viewBox="0 0 1060 680" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="aHot" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="aCtl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
    <marker id="aState" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c99a3a"/></marker>
    <marker id="aFail" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c25b4e"/></marker>
  </defs>
  <rect width="1060" height="680" fill="#fbfbfd"/>

  <!-- ===== 标题带 ===== -->
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">goroutine 状态机 · atomicstatus 的六态流转（转换统一走 casgstatus，proc.go:1290）</text>
  <text x="30" y="48" font-size="10.5" fill="#6e6e73">运行态 _Grunning 是唯一持 P 执行用户码的态；进 syscall / park / 抢占都从它出发，回来都先变 _Grunnable 再被 execute 选中　源码基准 go1.26.4</text>

  <!-- ===== 图例：四型转换 ===== -->
  <line x1="34" y1="64" x2="64" y2="64" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aHot)"/>
  <text x="70" y="68" font-size="10" fill="#3a3a3c">运行循环 Hot（选中/抢回）</text>
  <line x1="270" y1="64" x2="300" y2="64" stroke="#5b7db1" stroke-width="1.8" marker-end="url(#aCtl)"/>
  <text x="306" y="68" font-size="10" fill="#3a3a3c">调度切换 Control（syscall/复用）</text>
  <line x1="530" y1="64" x2="560" y2="64" stroke="#c99a3a" stroke-width="1.8" marker-end="url(#aState)"/>
  <text x="566" y="68" font-size="10" fill="#3a3a3c">阻塞挂起 State（park/ready）</text>
  <line x1="780" y1="64" x2="810" y2="64" stroke="#c25b4e" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aFail)"/>
  <text x="816" y="68" font-size="10" fill="#3a3a3c">抢占 / 退出（preempt/exit）</text>

  <!-- ===================== 左列：出生与复用池 ===================== -->
  <!-- Gidle -->
  <rect x="60" y="96" width="214" height="56" rx="11" fill="#f6f6f7" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="74" y="120" font-size="12" font-weight="600" fill="#6e6e73">_Gidle · 0</text>
  <text x="74" y="140" font-size="9.5" fill="#8e8e93">malg 刚分配、未初始化</text>

  <!-- Gdead -->
  <rect x="60" y="248" width="214" height="86" rx="11" fill="#f0f0f4" stroke="#d8d8de" filter="url(#soft)"/>
  <text x="74" y="272" font-size="12" font-weight="600" fill="#48484a">_Gdead · 6</text>
  <text x="74" y="292" font-size="9.5" fill="#6e6e73">已退出 / 待复用</text>
  <text x="74" y="309" font-size="9.5" fill="#6e6e73">存于 P.gFree + sched.gFree 池</text>
  <text x="74" y="326" font-size="9" fill="#a1a1a6">gfput 入池 proc.go:5516</text>

  <!-- Grunnable -->
  <rect x="60" y="424" width="214" height="96" rx="12" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <text x="74" y="449" font-size="12.5" font-weight="600" fill="#6b4e16">_Grunnable · 1</text>
  <text x="74" y="470" font-size="9.5" fill="#a9822f">就绪，在运行队列里排队</text>
  <text x="74" y="487" font-size="9.5" fill="#a9822f">本地 runq / runnext / 全局 runq</text>
  <text x="74" y="506" font-size="9.5" fill="#a9822f">等待某个 M 的 findRunnable 选中</text>

  <!-- 左列出生链 -->
  <line x1="167" y1="152" x2="167" y2="248" stroke="#5b7db1" stroke-width="1.6" marker-end="url(#aCtl)"/>
  <text x="175" y="188" font-size="9" fill="#5b7db1">newproc 建好即入池</text>
  <text x="175" y="202" font-size="8.5" fill="#8aa0c0">_Gidle→_Gdead (5362)</text>
  <line x1="167" y1="334" x2="167" y2="424" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aHot)"/>
  <text x="175" y="372" font-size="9" fill="#2f8f5e">gfget 复用 / newproc</text>
  <text x="175" y="386" font-size="8.5" fill="#5fa07a">_Gdead→_Grunnable (5359/5438)</text>

  <!-- ===================== 中心 HUB：Grunning ===================== -->
  <rect x="372" y="272" width="256" height="150" rx="16" fill="#eef7f0" stroke="#8fd0aa" stroke-width="1.4" filter="url(#soft)"/>
  <text x="392" y="300" font-size="14" font-weight="700" fill="#12572f">_Grunning · 2</text>
  <text x="392" y="322" font-size="10" fill="#2f8f5e">唯一持 P 执行用户码的态</text>
  <rect x="392" y="334" width="216" height="30" rx="8" fill="#ffffff" stroke="#bfe0c8"/>
  <text x="500" y="354" font-size="9.5" fill="#1d4a2b" text-anchor="middle">M 绑 P · curg=本 G · 跑到让出为止</text>
  <text x="392" y="384" font-size="9" fill="#4a8c60">让出触发：syscall / park / 抢占 / goexit</text>
  <text x="392" y="402" font-size="9" fill="#4a8c60">回来必先 _Grunnable，再被 execute 选中</text>

  <!-- Grunnable → Grunning：execute（Hot 主循环） -->
  <line x1="274" y1="448" x2="372" y2="392" stroke="#2f9e6e" stroke-width="2" marker-end="url(#aHot)"/>
  <text x="286" y="432" font-size="9.5" fill="#2f8f5e" font-weight="600">execute(gp)</text>
  <text x="286" y="446" font-size="8.5" fill="#5fa07a">_Grunnable→_Grunning (3360)</text>

  <!-- Grunning → Gdead：goexit（Fail 红） -->
  <line x1="372" y1="330" x2="274" y2="300" stroke="#c25b4e" stroke-width="1.6" marker-end="url(#aFail)"/>
  <text x="284" y="322" font-size="9" fill="#b5483a">goexit0 → gfput</text>
  <text x="284" y="248" font-size="8.5" fill="#c98077"> </text>
  <text x="300" y="336" font-size="8" fill="#c98077">_Grunning→_Gdead (4522)</text>

  <!-- ===================== 右上：Gsyscall ===================== -->
  <rect x="712" y="112" width="300" height="98" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="730" y="137" font-size="12.5" font-weight="600" fill="#1b2a4a">_Gsyscall · 3</text>
  <text x="730" y="158" font-size="9.5" fill="#5b7db1">M 带 G 陷入内核，P 解绑（_Psyscall）</text>
  <text x="730" y="176" font-size="9.5" fill="#5b7db1">M 不占 P → M 数可远超 GOMAXPROCS</text>
  <text x="730" y="196" font-size="9" fill="#8aa0c0">P 超 1 tick(≥20µs) 未回 → sysmon handoffp (6743)</text>

  <!-- Grunning → Gsyscall（Control 上行） -->
  <line x1="600" y1="286" x2="740" y2="210" stroke="#5b7db1" stroke-width="1.8" marker-end="url(#aCtl)"/>
  <text x="612" y="250" font-size="9" fill="#5b7db1" font-weight="600">entersyscall</text>
  <text x="612" y="264" font-size="8.5" fill="#8aa0c0">_Grunning→_Gsyscall (4737)</text>
  <!-- Gsyscall → Grunning（Hot 抢回原P） -->
  <line x1="770" y1="210" x2="628" y2="290" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aHot)"/>
  <text x="700" y="230" font-size="9" fill="#2f8f5e" font-weight="600">exitsyscallfast 抢回原P</text>
  <text x="700" y="244" font-size="8.5" fill="#5fa07a">_Gsyscall→_Grunning (4953)</text>

  <!-- ===================== 右中：Gwaiting ===================== -->
  <rect x="712" y="300" width="300" height="98" rx="13" fill="#faf4fb" stroke="#e2d2ee" filter="url(#soft)"/>
  <text x="730" y="325" font-size="12.5" font-weight="600" fill="#5a3d78">_Gwaiting · 4</text>
  <text x="730" y="346" font-size="9.5" fill="#7d5bb1">阻塞挂起，不在任何运行队列</text>
  <text x="730" y="364" font-size="9.5" fill="#7d5bb1">chan 收发 / mutex / time.Sleep / netpoll</text>
  <text x="730" y="384" font-size="9" fill="#a48bc4">挂在等待对象上（如 hchan.recvq、pollDesc.rg）</text>

  <!-- Grunning → Gwaiting（State 琥珀） -->
  <line x1="628" y1="352" x2="712" y2="350" stroke="#c99a3a" stroke-width="1.8" marker-end="url(#aState)"/>
  <text x="636" y="340" font-size="9" fill="#a9822f" font-weight="600">gopark</text>
  <text x="636" y="393" font-size="8.5" fill="#c0a24a">chan/锁/sleep (4290)</text>

  <!-- ===================== 顶部：Gpreempted ===================== -->
  <rect x="372" y="112" width="256" height="72" rx="12" fill="#fdf4f3" stroke="#ecc6c1" filter="url(#soft)"/>
  <text x="392" y="136" font-size="12" font-weight="600" fill="#7a2016">_Gpreempted · 9</text>
  <text x="392" y="156" font-size="9.5" fill="#a5453a">异步信号抢占后的中转态（Go 1.14+）</text>
  <text x="392" y="174" font-size="9" fill="#c07d74">suspendG 收尾时转 _Gwaiting 待恢复 (1448)</text>

  <!-- Grunning → Gpreempted（Fail 红上行） -->
  <line x1="500" y1="272" x2="500" y2="184" stroke="#c25b4e" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aFail)"/>
  <text x="508" y="230" font-size="9" fill="#b5483a">异步 SIGURG 抢占</text>
  <text x="508" y="244" font-size="8.5" fill="#c98077">asyncPreempt 停到安全点</text>
  <!-- Gpreempted → Gwaiting（转 waiting，红虚） -->
  <path d="M628,168 C680,168 690,300 712,320" fill="none" stroke="#c25b4e" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#aFail)"/>
  <text x="652" y="210" font-size="8.5" fill="#c07d74">_Gpreempted</text>
  <text x="652" y="223" font-size="8.5" fill="#c07d74">→_Gwaiting</text>

  <!-- ===================== 底部返回轨：所有路径回 _Grunnable ===================== -->
  <!-- rail -->
  <line x1="167" y1="602" x2="880" y2="602" stroke="#cdd3da" stroke-width="1.4"/>
  <line x1="167" y1="602" x2="167" y2="520" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aHot)"/>
  <text x="180" y="560" font-size="9" fill="#2f8f5e">回到就绪队列，等下一次被选中</text>

  <!-- Gwaiting → rail：ready -->
  <line x1="820" y1="398" x2="820" y2="602" stroke="#c99a3a" stroke-width="1.6" marker-end="url(#aState)"/>
  <text x="828" y="470" font-size="9" fill="#a9822f" font-weight="600">goready / ready</text>
  <text x="828" y="484" font-size="8.5" fill="#c0a24a">_Gwaiting→_Grunnable (1133)</text>

  <!-- Grunning → rail：yield（Gosched / 协作抢占让出） -->
  <line x1="500" y1="422" x2="500" y2="602" stroke="#c25b4e" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#aFail)"/>
  <text x="508" y="500" font-size="9" fill="#b5483a">Gosched / 协作 morestack 让出</text>
  <text x="508" y="514" font-size="8.5" fill="#c98077">_Grunning→_Grunnable（放回队列）</text>

  <!-- Gsyscall → rail：exitsyscall 慢速 -->
  <path d="M862,210 C862,560 880,560 880,602" fill="none" stroke="#5b7db1" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#aCtl)"/>
  <text x="700" y="595" font-size="9" fill="#5b7db1">exitsyscall 慢速：原P被夺 → 入全局 runq</text>
  <text x="700" y="580" font-size="8.5" fill="#8aa0c0">_Gsyscall→_Grunnable (4922)</text>

  <!-- ===================== 铭牌 ===================== -->
  <rect x="24" y="628" width="1012" height="42" rx="10" fill="#f5f0fb" stroke="#ddcdf0"/>
  <text x="40" y="649" font-size="10" font-weight="600" fill="#3d2a5a">读法</text>
  <text x="40" y="664" font-size="9.5" fill="#7d5bb1">_Grunning 是中枢：syscall（蓝）陷内核、park（琥珀）阻塞、抢占/退出（红）让出——三条出边；回程一律先落 _Grunnable（就绪队列），由某 M 的 execute 重新选中，形成「就绪⇄运行」主循环。_Gcopystack(8)/_Gscan(0x1000) 是叠加中间态，不单列。</text>
</svg>
