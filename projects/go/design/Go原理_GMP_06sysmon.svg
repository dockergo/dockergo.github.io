<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="900" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">sysmon · 不占 P 的后台监控线程职责</text>

  <!-- radial connectors first (under cards) from center (450,290) -->
  <line x1="450" y1="290" x2="190" y2="120" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="450" y1="290" x2="450" y2="118" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="450" y1="290" x2="712" y2="120" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="450" y1="290" x2="150" y2="360" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="450" y1="290" x2="750" y2="360" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="450" y1="290" x2="450" y2="450" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- center sysmon node (blue) -->
  <circle cx="450" cy="290" r="88" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="450" y="278" font-size="16" font-weight="600" fill="#1b2a4a" text-anchor="middle">sysmon</text>
  <text x="450" y="298" font-size="10" fill="#5b7db1" text-anchor="middle">独立 M · 不绑定 P</text>
  <text x="450" y="314" font-size="10" fill="#5b7db1" text-anchor="middle">自适应巡检 20µs~10ms</text>
  <text x="450" y="330" font-size="9" fill="#5b7db1" text-anchor="middle">proc.go:6537</text>

  <!-- retake (red - preempt/reclaim) top-left -->
  <rect x="40" y="66" width="270" height="82" rx="12" fill="#fbeeee" stroke="#f0c4c4" filter="url(#soft)"/>
  <text x="58" y="90" font-size="12" font-weight="600" fill="#7a1f1f">retake · 抢占 &amp; 回收</text>
  <text x="300" y="88" font-size="9" fill="#b15b5b" text-anchor="end">proc.go:6681</text>
  <text x="58" y="110" font-size="10" fill="#b15b5b">跑 &gt;10ms 的 G → preemptone 抢占</text>
  <text x="58" y="128" font-size="10" fill="#b15b5b">syscall P 超 1 tick(≥20µs) → handoffp 回收</text>

  <!-- netpoll (white) top-center -->
  <rect x="330" y="60" width="240" height="58" rx="12" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="348" y="84" font-size="12" font-weight="600" fill="#1d1d1f">netpoll · 补轮询</text>
  <text x="348" y="104" font-size="10" fill="#6e6e73">&gt;10ms 未轮询 → injectglist 注入全局</text>

  <!-- force GC (green) top-right -->
  <rect x="592" y="66" width="270" height="82" rx="12" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="610" y="90" font-size="12" font-weight="600" fill="#1d4a2b">强制 GC</text>
  <text x="610" y="110" font-size="10" fill="#4a8c60">距上次 GC 超 2 分钟</text>
  <text x="610" y="128" font-size="10" fill="#4a8c60">强制触发一轮回收</text>

  <!-- scavenge (amber) mid-left -->
  <rect x="40" y="326" width="230" height="72" rx="12" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <text x="58" y="350" font-size="12" font-weight="600" fill="#6b4e16">scavenge</text>
  <text x="58" y="370" font-size="10" fill="#a9822f">长期空闲的堆内存</text>
  <text x="58" y="388" font-size="10" fill="#a9822f">归还操作系统</text>

  <!-- checkdead (red) mid-right -->
  <rect x="630" y="326" width="230" height="72" rx="12" fill="#fbeeee" stroke="#f0c4c4" filter="url(#soft)"/>
  <text x="648" y="350" font-size="12" font-weight="600" fill="#7a1f1f">checkdead</text>
  <text x="648" y="370" font-size="10" fill="#b15b5b">全部 G 阻塞时</text>
  <text x="648" y="388" font-size="10" fill="#b15b5b">检测死锁并报错退出</text>

  <!-- bottom summary (purple) -->
  <rect x="250" y="456" width="400" height="76" rx="12" fill="#f5f0fb" stroke="#ddcdf0"/>
  <text x="450" y="480" font-size="12" font-weight="600" fill="#3d2a5a" text-anchor="middle">调度器的"安全网"</text>
  <text x="450" y="502" font-size="10.5" fill="#7d5bb1" text-anchor="middle">本地/偷取路径推不动的事——超时抢占、</text>
  <text x="450" y="520" font-size="10.5" fill="#7d5bb1" text-anchor="middle">syscall 回收、死锁检测——都由 sysmon 兜底</text>
</svg>
