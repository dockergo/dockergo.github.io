<svg xmlns="http://www.w3.org/2000/svg" width="900" height="470" viewBox="0 0 900 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="900" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">itab · 接口方法表（=abi.ITab）：接口类型 × 具体类型 → 方法地址表</text>

  <!-- itab struct card (purple = interface) -->
  <rect x="30" y="52" width="470" height="384" rx="13" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <text x="46" y="78" font-size="13" font-weight="600" fill="#3d2a5a">itab（abi.ITab）· abi/iface.go:17</text>
  <text x="46" y="96" font-size="10.5" fill="#7d5bb1">「具体类型如何满足某接口」的运行期表 · 非 GC 内存</text>

  <rect x="46" y="108" width="438" height="40" rx="8" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="60" y="126" font-size="11" font-weight="600" fill="#1b2a4a">Inter · *InterfaceType</text>
  <text x="60" y="142" font-size="10" fill="#5b7db1">接口类型（如 io.Reader）</text>

  <rect x="46" y="154" width="438" height="40" rx="8" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="60" y="172" font-size="11" font-weight="600" fill="#1b2a4a">Type · *Type</text>
  <text x="60" y="188" font-size="10" fill="#5b7db1">具体类型（如 *os.File）</text>

  <rect x="46" y="200" width="438" height="40" rx="8" fill="#ffffff" stroke="#ddcdf0"/>
  <text x="60" y="218" font-size="11" font-weight="600" fill="#3d2a5a">Hash · uint32</text>
  <text x="60" y="234" font-size="10" fill="#7d5bb1">Type.Hash 的拷贝，用于类型 switch 分派</text>

  <rect x="46" y="246" width="438" height="72" rx="8" fill="#ffffff" stroke="#ddcdf0"/>
  <text x="60" y="266" font-size="11" font-weight="600" fill="#3d2a5a">Fun [1]uintptr · 变长方法指针表</text>
  <text x="60" y="284" font-size="10" fill="#7d5bb1">具体类型实现该接口各方法的函数地址</text>
  <text x="60" y="302" font-size="10" fill="#7d5bb1">Fun[0] / Fun[1] / Fun[2] … 按接口方法序排列</text>

  <rect x="46" y="326" width="438" height="42" rx="8" fill="#fbeeee" stroke="#f0c4c4"/>
  <text x="60" y="345" font-size="10.5" font-weight="600" fill="#7a1f1f">Fun[0] == 0</text>
  <text x="60" y="361" font-size="10" fill="#b15b5b">表示该类型「不」实现此接口</text>

  <text x="46" y="392" font-size="10" fill="#7d5bb1">全局去重缓存：同 (接口,类型) 对只建一次</text>
  <text x="46" y="410" font-size="10" fill="#7d5bb1">itab 分配在非 GC 内存，不参与垃圾回收扫描</text>

  <!-- dispatch mechanism (blue = coordination) -->
  <rect x="520" y="52" width="350" height="180" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="536" y="78" font-size="13" font-weight="600" fill="#1b2a4a">方法派发 · O(1) 间接跳转</text>
  <text x="536" y="96" font-size="10.5" fill="#5b7db1">调用接口第 k 个方法 = 取 Fun[k] 跳转</text>

  <rect x="536" y="108" width="318" height="34" rx="8" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="546" y="129" font-size="11" fill="#1b2a4a">iface.tab.Fun[k] → 具体实现地址</text>
  <line x1="695" y1="142" x2="695" y2="160" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="536" y="164" width="318" height="34" rx="8" fill="#eff9f2" stroke="#bfe0c8"/>
  <text x="546" y="185" font-size="11" fill="#1d4a2b">间接 call → 执行方法（不搜索）</text>
  <text x="536" y="220" font-size="10" fill="#5b7db1">预先排好的方法地址数组，无运行期查找</text>

  <!-- Fun[] table illustration (amber = storage) -->
  <rect x="520" y="248" width="350" height="188" rx="13" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <text x="536" y="274" font-size="12.5" font-weight="600" fill="#6b4e16">Fun[] 方法表布局（示例：io.ReadWriter）</text>

  <rect x="536" y="288" width="318" height="30" rx="7" fill="#ffffff" stroke="#f0dcaf"/>
  <text x="548" y="307" font-size="10.5" fill="#6b4e16">Fun[0] → (*File).Read 地址</text>
  <rect x="536" y="324" width="318" height="30" rx="7" fill="#ffffff" stroke="#f0dcaf"/>
  <text x="548" y="343" font-size="10.5" fill="#6b4e16">Fun[1] → (*File).Write 地址</text>
  <rect x="536" y="360" width="318" height="30" rx="7" fill="#ffffff" stroke="#f0dcaf"/>
  <text x="548" y="379" font-size="10.5" fill="#a9822f">…按接口方法声明顺序排列</text>
  <text x="536" y="412" font-size="10" fill="#a9822f">k 由编译期确定 → 运行期直接索引</text>

  <!-- link struct Fun to dispatch -->
  <line x1="484" y1="282" x2="534" y2="125" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
</svg>
