<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="510" viewBox="0 0 1080 510" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="510" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Kafka KRaft · Broker 角色与 quorum 形成</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">process.roles 定角色;KafkaRaftServer 按角色建 BrokerServer / ControllerServer(控制器先启);quorum.voters/bootstrap.servers 定成员,Raft 多数派提交</text>

  <!-- process.roles three options -->
  <text x="30" y="80" font-size="9.5" font-weight="600" fill="#86868b">process.roles · 定义节点角色</text>

  <rect x="30" y="90" width="330" height="72" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="195" y="114" font-size="11" font-weight="700" fill="#5a3410" text-anchor="middle">broker（数据面）</text>
  <text x="195" y="134" font-size="8.6" fill="#93762e" text-anchor="middle">处理 produce / fetch 数据请求</text>
  <text x="195" y="150" font-size="8.6" fill="#93762e" text-anchor="middle">元数据的消费者(经 MetadataLoader 应用)</text>

  <rect x="374" y="90" width="330" height="72" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="539" y="114" font-size="11" font-weight="700" fill="#1b2a4a" text-anchor="middle">controller（元数据面）</text>
  <text x="539" y="134" font-size="8.6" fill="#5b7db1" text-anchor="middle">组成 quorum、Raft 选主投票</text>
  <text x="539" y="150" font-size="8.6" fill="#5b7db1" text-anchor="middle">QuorumController 处理元数据变更</text>

  <rect x="718" y="90" width="332" height="72" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="884" y="114" font-size="11" font-weight="700" fill="#274a78" text-anchor="middle">combined（两者）</text>
  <text x="884" y="134" font-size="8.6" fill="#5b7db1" text-anchor="middle">同进程兼任 broker + controller</text>
  <text x="884" y="150" font-size="8.6" fill="#5b7db1" text-anchor="middle">小集群用;职责仍分离</text>

  <!-- KafkaRaftServer startup -->
  <rect x="30" y="182" width="1020" height="150" rx="14" fill="#f3f7fc" stroke="#dbe7f5"/>
  <text x="46" y="206" font-size="11" font-weight="700" fill="#1b2a4a">KafkaRaftServer 按角色建服务 · 控制器先启动</text>

  <rect x="48" y="220" width="300" height="100" rx="11" fill="#ffffff" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="198" y="244" font-size="10.5" font-weight="700" fill="#274a78" text-anchor="middle">ControllerServer</text>
  <text x="198" y="264" font-size="8.6" fill="#5b7db1" text-anchor="middle">有 controller 角色时创建</text>
  <text x="198" y="282" font-size="8.6" fill="#5b7db1" text-anchor="middle">把 raft client 注入 QuorumController</text>
  <text x="198" y="300" font-size="8.6" fill="#5b7db1" text-anchor="middle"></text>
  <rect x="64" y="308" width="268" height="6" rx="3" fill="#eef3fb"/>

  <rect x="390" y="220" width="300" height="100" rx="11" fill="#ffffff" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="540" y="244" font-size="10.5" font-weight="700" fill="#274a78" text-anchor="middle">SharedServer（共享）</text>
  <text x="540" y="266" font-size="8.6" fill="#5b7db1" text-anchor="middle">持 KafkaRaftManager(raft)</text>
  <text x="540" y="284" font-size="8.6" fill="#5b7db1" text-anchor="middle">+ MetadataLoader</text>
  <text x="540" y="304" font-size="8.6" fill="#5b7db1" text-anchor="middle">被 Broker/Controller 共用</text>

  <rect x="732" y="220" width="300" height="100" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="882" y="244" font-size="10.5" font-weight="700" fill="#5a3410" text-anchor="middle">BrokerServer</text>
  <text x="882" y="264" font-size="8.6" fill="#93762e" text-anchor="middle">有 broker 角色时创建</text>
  <text x="882" y="282" font-size="8.6" fill="#93762e" text-anchor="middle">跑数据面(日志/副本/网络)</text>
  <text x="882" y="300" font-size="8.6" fill="#93762e" text-anchor="middle">经 MetadataLoader 收元数据</text>

  <path d="M348,270 L390,270" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M690,270 L732,270" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- quorum formation -->
  <rect x="30" y="352" width="1020" height="112" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="376" font-size="11.5" font-weight="700" fill="#1b2a4a">quorum 形成 · 控制器成员定义</text>

  <rect x="48" y="388" width="490" height="62" rx="10" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="293" y="410" font-size="9.4" font-weight="600" fill="#274a78" text-anchor="middle">controller.quorum.voters</text>
  <text x="293" y="429" font-size="8.4" fill="#5b7db1" text-anchor="middle">格式 {id}@{host}:{port} 静态列出投票成员</text>
  <text x="293" y="444" font-size="8.4" fill="#5b7db1" text-anchor="middle">或新的 controller.quorum.bootstrap.servers</text>

  <rect x="554" y="388" width="480" height="62" rx="10" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="794" y="410" font-size="9.4" font-weight="600" fill="#12402a" text-anchor="middle">Raft 选主 + 多数派提交</text>
  <text x="794" y="429" font-size="8.4" fill="#2f6f4f" text-anchor="middle">控制器 quorum 用 Raft 选一个 leader 控制器</text>
  <text x="794" y="444" font-size="8.4" fill="#2f6f4f" text-anchor="middle">奇数个(3/5)便于多数派;元数据多数派确认才提交</text>

  <line x1="538" y1="419" x2="554" y2="419" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <text x="30" y="492" font-size="8.8" fill="#a1a1a6">生产部署常把 controller 独立成专用节点(隔离元数据面);小集群用 combined。误区:控制器只管元数据,数据 produce/fetch 走 Broker</text>
</svg>
