<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
    <marker id="arG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#2f6f4f"/>
    </marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Kafka 页缓存 + 零拷贝 · sendfile 磁盘页缓存直达网卡</text>
  <text x="30" y="50" font-size="12" fill="#a1a1a6">Kafka 不做应用层缓存，缓存管理交给内核；零拷贝数据不经 JVM 堆</text>

  <!-- OS page cache dependency -->
  <rect x="48" y="72" width="984" height="60" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="68" y="98" font-size="13" font-weight="700" fill="#5a3410">依赖 OS 页缓存（不做应用层缓存）</text>
  <text x="68" y="118" font-size="11" fill="#93762e">写经 FileChannel 落页缓存（OS 异步刷盘）· 读多从页缓存命中 → 把缓存管理交内核，省 JVM 堆缓存的 GC 压力</text>

  <!-- Kernel space band -->
  <rect x="48" y="156" width="984" height="196" rx="14" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="68" y="182" font-size="12.5" font-weight="700" fill="#2c5a3a">内核态（Kernel space）</text>

  <rect x="80" y="200" width="220" height="120" rx="11" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="190" y="228" font-size="12" font-weight="700" fill="#5a3410" text-anchor="middle">磁盘</text>
  <text x="190" y="250" font-size="10.5" fill="#93762e" text-anchor="middle">.log 段文件</text>
  <text x="190" y="272" font-size="10.5" fill="#93762e" text-anchor="middle">顺序写 / 顺序读</text>
  <text x="190" y="296" font-size="10" fill="#93762e" text-anchor="middle">近乎磁盘顺序读速度</text>

  <rect x="430" y="200" width="220" height="120" rx="11" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="540" y="228" font-size="12" font-weight="700" fill="#5a3410" text-anchor="middle">OS 页缓存</text>
  <text x="540" y="250" font-size="10.5" fill="#93762e" text-anchor="middle">page cache</text>
  <text x="540" y="272" font-size="10.5" fill="#93762e" text-anchor="middle">读命中避免磁盘 IO</text>
  <text x="540" y="296" font-size="10" fill="#93762e" text-anchor="middle">异步刷盘</text>

  <rect x="780" y="200" width="220" height="120" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="890" y="228" font-size="12" font-weight="700" fill="#1b2a4a" text-anchor="middle">网卡 NIC</text>
  <text x="890" y="250" font-size="10.5" fill="#5b7db1" text-anchor="middle">socket 缓冲</text>
  <text x="890" y="272" font-size="10.5" fill="#5b7db1" text-anchor="middle">直达消费者</text>
  <text x="890" y="296" font-size="10" fill="#5b7db1" text-anchor="middle">明文传输</text>

  <!-- zero copy path (green, bypasses JVM) -->
  <polyline points="300,260 430,260" fill="none" stroke="#2f6f4f" stroke-width="2.2" marker-end="url(#arG)"/>
  <polyline points="650,260 780,260" fill="none" stroke="#2f6f4f" stroke-width="2.2" marker-end="url(#arG)"/>
  <text x="540" y="340" font-size="11" font-weight="600" fill="#2f6f4f" text-anchor="middle">零拷贝：transferTo = sendfile 系统调用，数据全程留内核态</text>

  <!-- JVM heap bypassed -->
  <rect x="430" y="372" width="220" height="80" rx="11" fill="#f2f2f4" stroke="#d2d2d7" stroke-dasharray="5 4"/>
  <text x="540" y="400" font-size="12" font-weight="700" fill="#86868b" text-anchor="middle">JVM 堆</text>
  <text x="540" y="422" font-size="10.5" fill="#a1a1a6" text-anchor="middle">零拷贝时被绕过</text>
  <text x="540" y="440" font-size="10" fill="#a1a1a6" text-anchor="middle">不经用户态、不复制到堆</text>
  <polyline points="540,352 540,372" fill="none" stroke="#d2d2d7" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="672" y="410" font-size="10.5" fill="#86868b">← 传统路径需 磁盘→内核→堆→内核→网卡 多次拷贝</text>

  <!-- call chain -->
  <rect x="48" y="372" width="360" height="80" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="68" y="396" font-size="11.5" font-weight="700" fill="#1b2a4a">零拷贝调用链</text>
  <text x="68" y="416" font-size="10.5" fill="#274a78">FileRecords.writeTo → destChannel.transferFrom</text>
  <text x="68" y="435" font-size="10.5" fill="#274a78">→ FileChannel.transferTo</text>

  <!-- TLS warning -->
  <rect x="672" y="372" width="360" height="80" rx="11" fill="#fbeaea" stroke="#e6b8b8" filter="url(#soft)"/>
  <text x="692" y="396" font-size="11.5" font-weight="700" fill="#7a2b2b">TLS 破坏零拷贝</text>
  <text x="692" y="416" font-size="10.5" fill="#a35555">开启 TLS 时需经用户态加密</text>
  <text x="692" y="435" font-size="10.5" fill="#a35555">失去零拷贝 → 高吞吐场景权衡加密开销</text>

  <rect x="48" y="470" width="984" height="34" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="540" y="491" font-size="11" fill="#274a78" text-anchor="middle">关键：顺序写 + OS 页缓存 + 零拷贝 sendfile —— Kafka 高吞吐的根基</text>
</svg>
