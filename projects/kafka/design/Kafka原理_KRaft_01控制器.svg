<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Kafka KRaft · 控制器 QuorumController（元数据即事件日志）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">单线程事件队列处理所有元数据变更;写路径 appendWriteEvent → generateRecordsAndResult → appendRecords;先 replay 进内存再复制</text>

  <!-- single-thread event queue -->
  <rect x="30" y="70" width="1020" height="58" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="92" font-size="11.5" font-weight="700" fill="#1b2a4a">QuorumController · 单线程事件队列 KafkaEventQueue（QuorumController.java:1365）</text>
  <text x="46" y="112" font-size="9" fill="#5b7db1">所有元数据变更在单线程上串行处理 —— 消除并发、保证确定性(同一序列的记录在每个控制器上产生相同状态)</text>

  <!-- write path steps -->
  <text x="30" y="152" font-size="9.5" font-weight="600" fill="#86868b">写路径（RPC → 记录 → 日志）</text>

  <rect x="30" y="164" width="228" height="70" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="144" y="190" font-size="10.5" font-weight="600" fill="#274a78" text-anchor="middle">① appendWriteEvent</text>
  <text x="144" y="209" font-size="8.4" fill="#5b7db1" text-anchor="middle">写请求入事件队列(:953)</text>
  <text x="144" y="224" font-size="8.4" fill="#5b7db1" text-anchor="middle">ControllerWriteEvent.run</text>

  <rect x="288" y="164" width="228" height="70" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="402" y="190" font-size="10.5" font-weight="600" fill="#274a78" text-anchor="middle">② generateRecordsAndResult</text>
  <text x="402" y="209" font-size="8.4" fill="#5b7db1" text-anchor="middle">op 产出元数据记录(:801)</text>
  <text x="402" y="224" font-size="8.4" fill="#5b7db1" text-anchor="middle">只生成记录,不改状态</text>

  <rect x="546" y="164" width="228" height="70" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="660" y="190" font-size="10.5" font-weight="600" fill="#274a78" text-anchor="middle">③ appendRecords</text>
  <text x="660" y="209" font-size="8.4" fill="#5b7db1" text-anchor="middle">进入"先写后应用"(:898)</text>
  <text x="660" y="224" font-size="8.4" fill="#5b7db1" text-anchor="middle">交给下方三步</text>

  <line x1="258" y1="199" x2="288" y2="199" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="516" y1="199" x2="546" y2="199" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- deferred queue note -->
  <rect x="804" y="164" width="246" height="70" rx="11" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="927" y="188" font-size="9.6" font-weight="600" fill="#5a3410" text-anchor="middle">写 future 挂 deferredEventQueue</text>
  <text x="927" y="208" font-size="8.4" fill="#93762e" text-anchor="middle">直到 Raft commit 才回调</text>
  <text x="927" y="224" font-size="8.4" fill="#93762e" text-anchor="middle">(读到内存但对外未确认)</text>

  <!-- 先写后应用 group -->
  <rect x="30" y="256" width="1020" height="180" rx="14" fill="#f3f7fc" stroke="#dbe7f5"/>
  <text x="46" y="280" font-size="11" font-weight="700" fill="#1b2a4a">先写后应用（active controller）· 三步</text>

  <rect x="48" y="294" width="316" height="128" rx="11" fill="#ffffff" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="206" y="318" font-size="10.5" font-weight="700" fill="#274a78" text-anchor="middle">A. prepareAppend</text>
  <text x="206" y="338" font-size="8.6" fill="#5b7db1" text-anchor="middle">raftClient.prepareAppend(epoch,records)</text>
  <text x="206" y="354" font-size="8.6" fill="#5b7db1" text-anchor="middle">(:831)</text>
  <text x="206" y="376" font-size="8.6" fill="#5b7db1" text-anchor="middle">记录追加 Leader BatchAccumulator</text>
  <text x="206" y="394" font-size="8.6" fill="#5b7db1" text-anchor="middle">暂不复制(等放行)</text>

  <rect x="382" y="294" width="316" height="128" rx="11" fill="#ffffff" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="540" y="318" font-size="10.5" font-weight="700" fill="#274a78" text-anchor="middle">B. replay 进内存</text>
  <text x="540" y="338" font-size="8.6" fill="#5b7db1" text-anchor="middle">立即 replay(...) 应用(:836)</text>
  <text x="540" y="356" font-size="8.6" fill="#5b7db1" text-anchor="middle">按 MetadataRecordType 分派</text>
  <text x="540" y="374" font-size="8.6" fill="#5b7db1" text-anchor="middle">→ clusterControl / replicationControl</text>
  <rect x="398" y="386" width="284" height="26" rx="6" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="540" y="403" font-size="8.4" fill="#1b2a4a" text-anchor="middle">SnapshotRegistry 做 MVCC 快照(:1238)</text>

  <rect x="716" y="294" width="316" height="128" rx="11" fill="#ffffff" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="874" y="318" font-size="10.5" font-weight="700" fill="#274a78" text-anchor="middle">C. schedulePreparedAppend</text>
  <text x="874" y="338" font-size="8.6" fill="#5b7db1" text-anchor="middle">放行复制(:847)</text>
  <text x="874" y="358" font-size="8.6" fill="#5b7db1" text-anchor="middle">Raft 多数派复制提交</text>
  <text x="874" y="378" font-size="8.6" fill="#5b7db1" text-anchor="middle">commit 后回调 deferredEventQueue</text>
  <text x="874" y="396" font-size="8.6" fill="#5b7db1" text-anchor="middle">对外确认写成功</text>

  <path d="M364,358 L382,358" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M698,358 L716,358" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M660,234 L660,246 L206,246 L206,294" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <text x="30" y="466" font-size="8.8" fill="#a1a1a6">与消费者组协调器同构:请求只生成记录、replay 才应用状态;先内存(MVCC 快照可回滚)后复制日志 —— 元数据即日志,与数据日志同样是追加/复制/快照</text>
  <text x="30" y="486" font-size="8.8" fill="#a1a1a6">误区:KRaft 不是内嵌 ZK,而是把元数据变成一条 Raft 复制的事件日志(__cluster_metadata)</text>
</svg>
