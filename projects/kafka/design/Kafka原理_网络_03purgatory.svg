<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="548" viewBox="0 0 1080 548"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1080" height="548" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Kafka Purgatory 延迟操作 · 等条件的请求挂起、释放线程</text>
  <text x="30" y="50" font-size="12" fill="#a1a1a6">少量线程扛大量"在等"的请求（DelayedOperationPurgatory.java:38）</text>

  <!-- DelayedOperation card -->
  <rect x="48" y="72" width="470" height="146" rx="13" fill="#f4eefb" stroke="#dcc9f0" filter="url(#soft)"/>
  <text x="68" y="98" font-size="13" font-weight="700" fill="#4a2b6b">DelayedOperation（带超时的 TimerTask，:38）</text>
  <rect x="68" y="110" width="212" height="46" rx="8" fill="#ffffff" stroke="#dcc9f0"/>
  <text x="174" y="130" font-size="11" font-weight="600" fill="#4a2b6b" text-anchor="middle">tryComplete</text>
  <text x="174" y="147" font-size="10" fill="#7c5aa6" text-anchor="middle">条件满足则完成</text>
  <rect x="290" y="110" width="216" height="46" rx="8" fill="#ffffff" stroke="#dcc9f0"/>
  <text x="398" y="130" font-size="11" font-weight="600" fill="#4a2b6b" text-anchor="middle">onComplete / onExpiration</text>
  <text x="398" y="147" font-size="10" fill="#7c5aa6" text-anchor="middle">完成 / 超时回调</text>
  <rect x="68" y="164" width="438" height="42" rx="8" fill="#efe4fb" stroke="#dcc9f0"/>
  <text x="82" y="182" font-size="11" font-weight="600" fill="#4a2b6b">forceComplete：CAS 保证只完成一次</text>
  <text x="82" y="199" font-size="10.5" fill="#7c5aa6">DelayedProduce（已 Java 化）/ DelayedFetch（仍 Scala）在 ReplicaManager:184 实例化</text>

  <!-- examples -->
  <rect x="546" y="72" width="486" height="146" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="566" y="98" font-size="13" font-weight="700" fill="#1b2a4a">两类"要等条件"的请求</text>
  <rect x="566" y="112" width="446" height="42" rx="8" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="580" y="130" font-size="11" font-weight="600" fill="#1b2a4a">DelayedProduce：acks=all 等 ISR 复制到该 offset</text>
  <text x="580" y="147" font-size="10.5" fill="#5b7db1">副本复制进度更新事件触发 checkAndComplete</text>
  <rect x="566" y="162" width="446" height="42" rx="8" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="580" y="180" font-size="11" font-weight="600" fill="#1b2a4a">DelayedFetch：等够 fetch.min.bytes 数据</text>
  <text x="580" y="197" font-size="10.5" fill="#5b7db1">攒够或到 fetch.max.wait.ms 才返回</text>

  <!-- tryCompleteElseWatch flow -->
  <rect x="48" y="238" width="984" height="182" rx="13" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="68" y="264" font-size="13" font-weight="700" fill="#2c5a3a">tryCompleteElseWatch —— 先试立即完成，否则挂起</text>

  <rect x="68" y="282" width="210" height="120" rx="10" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="173" y="312" font-size="12" font-weight="700" fill="#12402a" text-anchor="middle">① tryComplete</text>
  <text x="173" y="334" font-size="10.5" fill="#2f6f4f" text-anchor="middle">先试立即完成</text>
  <text x="173" y="356" font-size="10.5" fill="#2f6f4f" text-anchor="middle">成功 → 立即返回</text>
  <text x="173" y="380" font-size="10" fill="#2f6f4f" text-anchor="middle">不占后续资源</text>

  <rect x="308" y="282" width="230" height="120" rx="10" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="423" y="312" font-size="12" font-weight="700" fill="#5a3410" text-anchor="middle">② 挂 watch 列表</text>
  <text x="423" y="334" font-size="10.5" fill="#93762e" text-anchor="middle">否则挂到 512 个分片</text>
  <text x="423" y="356" font-size="10.5" fill="#93762e" text-anchor="middle">watch（按 key 分散锁竞争）</text>
  <text x="423" y="380" font-size="10" fill="#93762e" text-anchor="middle">事件到来 checkAndComplete(key)</text>

  <rect x="568" y="282" width="230" height="120" rx="10" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="683" y="312" font-size="12" font-weight="700" fill="#5a3410" text-anchor="middle">③ 加入超时 timer</text>
  <text x="683" y="334" font-size="10.5" fill="#93762e" text-anchor="middle">分层时间轮 TimingWheel</text>
  <text x="683" y="356" font-size="10.5" fill="#93762e" text-anchor="middle">+ SystemTimer 推进时钟</text>
  <text x="683" y="380" font-size="10" fill="#93762e" text-anchor="middle">ExpiredOperationReaper:386</text>

  <rect x="828" y="282" width="184" height="120" rx="10" fill="#f4eefb" stroke="#dcc9f0"/>
  <text x="920" y="312" font-size="12" font-weight="700" fill="#4a2b6b" text-anchor="middle">④ 完成</text>
  <text x="920" y="336" font-size="10.5" fill="#7c5aa6" text-anchor="middle">条件满足</text>
  <text x="920" y="356" font-size="10.5" fill="#7c5aa6" text-anchor="middle">或超时到达</text>
  <text x="920" y="380" font-size="10" fill="#7c5aa6" text-anchor="middle">forceComplete 一次</text>

  <polyline points="278,342 308,342" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <polyline points="538,342 568,342" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <polyline points="798,342 828,342" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- key idea -->
  <rect x="48" y="440" width="984" height="84" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="68" y="466" font-size="13" font-weight="700" fill="#12402a">关键思想：挂起而非空占线程</text>
  <text x="68" y="488" font-size="11" fill="#2f6f4f">若占着 IO 线程原地等条件，线程很快耗尽 → 挂起后释放线程去处理别的请求</text>
  <text x="68" y="508" font-size="11" fill="#2f6f4f">条件满足（如复制进度更新）或超时才完成 —— 少量线程扛住大量"在等"的请求</text>
</svg>
