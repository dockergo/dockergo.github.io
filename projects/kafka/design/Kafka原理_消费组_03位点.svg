<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="510" viewBox="0 0 1080 510" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="510" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Kafka 消费者组 · 位点管理（__consumer_offsets）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">commitOffset 产生 OffsetCommit 记录(不原地改) → CoordinatorRuntime 先 replay 再追加日志 → 3 级 TimelineHashMap;OffsetFetch requireStable 强制读已提交</text>

  <!-- commit flow -->
  <rect x="30" y="74" width="234" height="94" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="147" y="100" font-size="10.5" font-weight="700" fill="#12402a" text-anchor="middle">① commitOffset 产生记录</text>
  <text x="147" y="122" font-size="8.4" fill="#2f6f4f" text-anchor="middle">校验后追加 OffsetCommit 记录</text>
  <text x="147" y="140" font-size="8.4" fill="#2f6f4f" text-anchor="middle">返回 CoordinatorResult(records,response)</text>
  <text x="147" y="158" font-size="8.4" fill="#2f6f4f" text-anchor="middle">不原地改</text>

  <rect x="296" y="74" width="234" height="94" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="413" y="100" font-size="10.5" font-weight="700" fill="#5a3410" text-anchor="middle">② 存 __consumer_offsets</text>
  <text x="413" y="122" font-size="8.4" fill="#93762e" text-anchor="middle">内部 topic</text>
  <text x="413" y="140" font-size="8.4" fill="#93762e" text-anchor="middle">GROUP_METADATA_TOPIC_NAME</text>
  <text x="413" y="158" font-size="8.4" fill="#93762e" text-anchor="middle">key/value 由 JSON schema 生成</text>

  <rect x="562" y="74" width="234" height="94" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="679" y="100" font-size="10.5" font-weight="700" fill="#274a78" text-anchor="middle">③ CoordinatorRuntime</text>
  <text x="679" y="122" font-size="8.4" fill="#5b7db1" text-anchor="middle">先 replay 进内存(timeline)</text>
  <text x="679" y="140" font-size="8.4" fill="#5b7db1" text-anchor="middle">再追加日志</text>
  <text x="679" y="158" font-size="8.4" fill="#5b7db1" text-anchor="middle">与 KRaft 同构:记录→replay→复制</text>

  <rect x="828" y="74" width="222" height="94" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="939" y="100" font-size="10.5" font-weight="700" fill="#274a78" text-anchor="middle">④ replay 应用</text>
  <text x="939" y="122" font-size="8.4" fill="#5b7db1" text-anchor="middle">把 OFFSET_COMMIT 存进</text>
  <text x="939" y="140" font-size="8.4" fill="#5b7db1" text-anchor="middle">3 级 TimelineHashMap</text>
  <text x="939" y="158" font-size="8.4" fill="#5b7db1" text-anchor="middle">按 group/topic/partition 分级</text>

  <line x1="264" y1="121" x2="296" y2="121" stroke="#c7c7cc" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="530" y1="121" x2="562" y2="121" stroke="#c7c7cc" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="796" y1="121" x2="828" y2="121" stroke="#c7c7cc" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- 3-level TimelineHashMap -->
  <rect x="30" y="192" width="620" height="196" rx="14" fill="#f3f7fc" stroke="#dbe7f5"/>
  <text x="46" y="216" font-size="11" font-weight="700" fill="#1b2a4a">3 级 TimelineHashMap（组 → topic → 分区）· 内存中的位点索引</text>

  <rect x="48" y="230" width="180" height="146" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="138" y="254" font-size="10" font-weight="700" fill="#1b2a4a" text-anchor="middle">Level 1 · 组</text>
  <text x="138" y="274" font-size="8.4" fill="#5b7db1" text-anchor="middle">groupId</text>
  <text x="138" y="292" font-size="8.4" fill="#5b7db1" text-anchor="middle">每个消费者组</text>
  <text x="138" y="310" font-size="8.4" fill="#5b7db1" text-anchor="middle">一棵子树</text>

  <rect x="248" y="230" width="180" height="146" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="338" y="254" font-size="10" font-weight="700" fill="#274a78" text-anchor="middle">Level 2 · topic</text>
  <text x="338" y="274" font-size="8.4" fill="#5b7db1" text-anchor="middle">组内订阅的</text>
  <text x="338" y="292" font-size="8.4" fill="#5b7db1" text-anchor="middle">每个 topic</text>

  <rect x="448" y="230" width="184" height="146" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="540" y="254" font-size="10" font-weight="700" fill="#274a78" text-anchor="middle">Level 3 · 分区</text>
  <text x="540" y="274" font-size="8.4" fill="#5b7db1" text-anchor="middle">每分区 → 已提交 offset</text>
  <text x="540" y="292" font-size="8.4" fill="#5b7db1" text-anchor="middle">timeline 支持 MVCC 快照</text>
  <text x="540" y="310" font-size="8.4" fill="#5b7db1" text-anchor="middle">按版本读一致视图</text>

  <line x1="228" y1="303" x2="248" y2="303" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="428" y1="303" x2="448" y2="303" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- OffsetFetch read -->
  <rect x="672" y="192" width="378" height="196" rx="14" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="688" y="216" font-size="11" font-weight="700" fill="#12402a">读取 · OffsetFetch</text>

  <rect x="690" y="230" width="342" height="66" rx="10" fill="#e6f7ee" stroke="#bfe0cd"/>
  <text x="861" y="254" font-size="9.6" font-weight="600" fill="#12402a" text-anchor="middle">requireStable = true → 强制读已提交</text>
  <text x="861" y="274" font-size="8.4" fill="#2f6f4f" text-anchor="middle">走写操作路径,确保读到最新已 commit 位点</text>
  <text x="861" y="290" font-size="8.4" fill="#2f6f4f" text-anchor="middle">(事务场景避免读到未提交)</text>

  <rect x="690" y="304" width="342" height="66" rx="10" fill="#e6f7ee" stroke="#bfe0cd"/>
  <text x="861" y="328" font-size="9.6" font-weight="600" fill="#12402a" text-anchor="middle">否则 → 快照读(snapshot read)</text>
  <text x="861" y="348" font-size="8.4" fill="#2f6f4f" text-anchor="middle">从 timeline 某版本读,无需等写</text>
  <text x="861" y="364" font-size="8.4" fill="#2f6f4f" text-anchor="middle">低延迟,读一致快照视图</text>

  <text x="30" y="416" font-size="9" fill="#6e6e73">位点存 topic 意味着协调器故障可从日志恢复 —— 位点本身也是"日志上的状态";一分区最多一消费者,并行度上限 = 分区数</text>
  <text x="30" y="438" font-size="8.8" fill="#a1a1a6">误区:位点存在消费者本地 —— 实际存 __consumer_offsets(服务端),故换消费者/重启能续上;自动提交可能丢/重,严格语义手动提交</text>
</svg>
