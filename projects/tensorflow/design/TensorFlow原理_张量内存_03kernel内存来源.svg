<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="400" viewBox="0 0 1000 400"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="aA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c99a3a"/></marker>
    <marker id="aG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
  </defs>
  <rect width="1000" height="400" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">kernel 内存来源 · 经 OpKernelContext 申请，可原地复用输入</text>

  <!-- 图例 -->
  <rect x="30" y="44" width="16" height="10" rx="2" fill="#fff2da" stroke="#e8cf9a"/><text x="52" y="53" font-size="9.5" fill="#3a3a3c">向设备 Allocator 新分配</text>
  <line x1="192" y1="49" x2="216" y2="49" stroke="#2f9e6e" stroke-width="2" marker-end="url(#aG)"/><text x="222" y="53" font-size="9.5" fill="#3a3a3c">缓冲原地转交（零拷贝）</text>
  <text x="970" y="53" font-size="9.5" fill="#a1a1a6" text-anchor="end">算子内存视角</text>
  <line x1="30" y1="62" x2="970" y2="62" stroke="#e4e7ec" stroke-width="1"/>

  <!-- 中心 kernel -->
  <rect x="392" y="150" width="216" height="80" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="500" y="184" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">OpKernel::Compute</text>
  <text x="500" y="204" font-size="9" fill="#5b7db1" text-anchor="middle">不 new/malloc</text>
  <text x="500" y="219" font-size="9" fill="#5b7db1" text-anchor="middle">经 OpKernelContext 申请</text>

  <!-- 输入 -->
  <rect x="40" y="150" width="150" height="80" rx="12" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="115" y="180" font-size="11" font-weight="600" fill="#0f5132" text-anchor="middle">输入张量</text>
  <text x="115" y="200" font-size="9" fill="#2f6f4f" text-anchor="middle">共享 TensorBuffer</text>
  <text x="115" y="216" font-size="9" fill="#2f6f4f" text-anchor="middle">带 refcount</text>

  <!-- 三条申请路径 -->
  <rect x="660" y="80" width="300" height="66" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="676" y="103" font-size="10.5" font-weight="600" fill="#5a3410">allocate_output(i, shape)</text>
  <text x="676" y="122" font-size="9" fill="#93762e">为第 i 个输出向设备 Allocator 新分配缓冲</text>
  <text x="676" y="138" font-size="9" fill="#93762e">CPU→系统内存 · GPU→BFC 池</text>

  <rect x="660" y="158" width="300" height="64" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="676" y="181" font-size="10.5" font-weight="600" fill="#5a3410">allocate_temp(...)</text>
  <text x="676" y="200" font-size="9" fill="#93762e">kernel 内部临时张量</text>
  <text x="676" y="216" font-size="9" fill="#93762e">出作用域即释放</text>

  <rect x="660" y="234" width="300" height="78" rx="12" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="676" y="257" font-size="10.5" font-weight="600" fill="#0f5132">forward_input_or_allocate_output</text>
  <text x="676" y="277" font-size="9" fill="#2f6f4f">原地复用：输入 refcount==1（无人共享）时</text>
  <text x="676" y="293" font-size="9" fill="#2f6f4f">直接把它的缓冲转给输出，省一次分配+拷贝</text>
  <text x="676" y="308" font-size="9" fill="#8a5a1a">否则退化为新分配</text>

  <!-- 连线：kernel -> 三接口 -->
  <line x1="608" y1="176" x2="660" y2="113" stroke="#c99a3a" stroke-width="1.6" marker-end="url(#aA)"/>
  <line x1="608" y1="190" x2="660" y2="190" stroke="#c99a3a" stroke-width="1.6" marker-end="url(#aA)"/>
  <line x1="608" y1="204" x2="660" y2="264" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aG)"/>

  <!-- 输入 -> kernel -->
  <line x1="190" y1="190" x2="392" y2="190" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aG)"/>
  <text x="291" y="182" font-size="9" fill="#2f6f4f" text-anchor="middle">refcount==1</text>
  <text x="291" y="206" font-size="8.5" fill="#a1a1a6" text-anchor="middle">可被转交给输出</text>

  <!-- 收尾 -->
  <rect x="40" y="252" width="336" height="90" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="60" y="276" font-size="11" font-weight="600" fill="#1d1d1f">要点</text>
  <text x="60" y="298" font-size="9.5" fill="#494950">· 所有缓冲由设备 Allocator 统一管理</text>
  <text x="60" y="317" font-size="9.5" fill="#494950">· element-wise 算子常靠原地复用省显存</text>
  <text x="60" y="335" font-size="9.5" fill="#7a2a2a">· 有别名/多消费者时不可原地，会新分配</text>
</svg>
