<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="470" viewBox="0 0 1000 470"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1000" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">AutoGraph · 把 Python 控制流改写成图算子</text>

  <!-- 源码 vs 改写 -->
  <rect x="30" y="52" width="455" height="200" rx="14" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="52" y="76" font-size="12" font-weight="600" fill="#3c1361">你写的 Python（tf.function 内）</text>
  <rect x="52" y="90" width="411" height="146" rx="9" fill="#ffffff" stroke="#d9c9ef"/>
  <text x="66" y="114" font-size="9.5" fill="#3c1361" font-family="monospace">@tf.function</text>
  <text x="66" y="134" font-size="9.5" fill="#3c1361" font-family="monospace">def f(x):</text>
  <text x="66" y="154" font-size="9.5" fill="#3c1361" font-family="monospace">  if tf.reduce_sum(x) &gt; 0:</text>
  <text x="66" y="174" font-size="9.5" fill="#3c1361" font-family="monospace">    x = x * 2</text>
  <text x="66" y="194" font-size="9.5" fill="#3c1361" font-family="monospace">  for i in tf.range(3):</text>
  <text x="66" y="214" font-size="9.5" fill="#3c1361" font-family="monospace">    x = x + i</text>

  <rect x="515" y="52" width="455" height="200" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="537" y="76" font-size="12" font-weight="600" fill="#1b2a4a">AutoGraph 改写后（进入图的样子）</text>
  <rect x="537" y="90" width="411" height="146" rx="9" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="551" y="114" font-size="9.5" fill="#1b2a4a" font-family="monospace"># if → tf.cond</text>
  <text x="551" y="134" font-size="9.5" fill="#1b2a4a" font-family="monospace">x = tf.cond(sum&gt;0,</text>
  <text x="551" y="154" font-size="9.5" fill="#1b2a4a" font-family="monospace">      lambda: x*2, lambda: x)</text>
  <text x="551" y="178" font-size="9.5" fill="#1b2a4a" font-family="monospace"># for → tf.while_loop</text>
  <text x="551" y="198" font-size="9.5" fill="#1b2a4a" font-family="monospace">x = tf.while_loop(cond,</text>
  <text x="551" y="218" font-size="9.5" fill="#1b2a4a" font-family="monospace">      body, [x, i])</text>

  <line x1="485" y1="152" x2="515" y2="152" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- 规则说明 -->
  <rect x="30" y="272" width="455" height="180" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="52" y="296" font-size="12" font-weight="600" fill="#0f5132">为什么要改写</text>
  <text x="66" y="320" font-size="9.5" fill="#2f6f4f">· 图是静态的，普通 Python if/for 在追踪期只会</text>
  <text x="66" y="338" font-size="9.5" fill="#2f6f4f">  按"追踪那一刻的值"走一条分支、展开固定次数</text>
  <text x="66" y="360" font-size="9.5" fill="#2f6f4f">· 依赖张量值的控制流必须变成图算子（tf.cond /</text>
  <text x="66" y="378" font-size="9.5" fill="#2f6f4f">  tf.while_loop），才能在执行期按真实数据分支</text>
  <text x="66" y="400" font-size="9.5" fill="#2f6f4f">· AutoGraph 自动完成这层源码到源码的转换</text>
  <text x="66" y="422" font-size="9" fill="#5b9e78">autograph=True 是 tf.function 默认（:466）</text>

  <!-- 边界 -->
  <rect x="515" y="272" width="455" height="180" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="537" y="296" font-size="12" font-weight="600" fill="#5a3410">边界与陷阱</text>
  <text x="551" y="320" font-size="9.5" fill="#93762e">· 只有"依赖张量"的控制流才转；依赖 Python</text>
  <text x="551" y="338" font-size="9.5" fill="#93762e">  常量的分支在追踪期就定死（不入图）</text>
  <text x="551" y="360" font-size="9.5" fill="#93762e">· 副作用（print、list.append）在追踪期只跑一次</text>
  <text x="551" y="378" font-size="9.5" fill="#93762e">  → 用 tf.print、tf.TensorArray 才进图</text>
  <text x="551" y="400" font-size="9.5" fill="#93762e">· Python 值当参数 → 每个新值触发一次重追踪</text>
  <text x="551" y="422" font-size="9" fill="#a1791f">口诀：想让它在执行期"活"，就用张量与 tf.* 算子</text>
</svg>
