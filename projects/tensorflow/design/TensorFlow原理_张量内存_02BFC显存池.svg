<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="470" viewBox="0 0 1000 470"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="aA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c99a3a"/></marker>
    <marker id="aG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="aB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#4a7fd0"/></marker>
  </defs>
  <rect width="1000" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">GPU 显存 BFC 池化 · best-fit 分配 + 相邻空闲合并</text>

  <!-- 图例 -->
  <rect x="30" y="44" width="16" height="10" rx="2" fill="#fff2da" stroke="#e8cf9a"/><text x="52" y="53" font-size="9.5" fill="#3a3a3c">大块预取</text>
  <line x1="132" y1="49" x2="156" y2="49" stroke="#2f9e6e" stroke-width="2" marker-end="url(#aG)"/><text x="162" y="53" font-size="9.5" fill="#3a3a3c">按 bin 切分请求</text>
  <line x1="290" y1="49" x2="314" y2="49" stroke="#4a7fd0" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#aB)"/><text x="320" y="53" font-size="9.5" fill="#3a3a3c">释放即合并</text>
  <text x="970" y="53" font-size="9.5" fill="#a1a1a6" text-anchor="end">显存池机理</text>
  <line x1="30" y1="62" x2="970" y2="62" stroke="#e4e7ec" stroke-width="1"/>

  <!-- ① 大块预取 -->
  <rect x="30" y="74" width="940" height="86" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="50" y="97" font-size="12" font-weight="600" fill="#5a3410">① 大块预取：一次向驱动要一整片，切成 AllocationRegion</text>
  <rect x="50" y="108" width="150" height="40" rx="9" fill="#ffffff" stroke="#e8cf9a"/><text x="125" y="132" font-size="10" fill="#5a3410" text-anchor="middle">驱动 cudaMalloc</text>
  <line x1="200" y1="128" x2="252" y2="128" stroke="#c99a3a" stroke-width="1.6" marker-end="url(#aA)"/>
  <rect x="256" y="108" width="500" height="40" rx="9" fill="#fdeccb" stroke="#e8cf9a"/><text x="506" y="132" font-size="10" fill="#5a3410" text-anchor="middle">AllocationRegion · 一整片池化显存（如 2 GB）</text>
  <text x="782" y="124" font-size="9.5" fill="#93762e">免每个张量都</text>
  <text x="782" y="140" font-size="9.5" fill="#93762e">陷入内核态</text>

  <!-- ② best-fit 切分 -->
  <rect x="30" y="172" width="940" height="158" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="50" y="195" font-size="12" font-weight="600" fill="#5a3410">② best-fit 切分：请求向上取整到 bin，FindChunkPtr 找最小够用的空闲 Chunk</text>
  <!-- bins -->
  <rect x="50" y="210" width="150" height="106" rx="9" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="125" y="230" font-size="9.5" font-weight="600" fill="#5a3410" text-anchor="middle">bin 分级（2^k）</text>
  <rect x="64" y="240" width="122" height="18" rx="4" fill="#fdeccb"/><text x="125" y="253" font-size="8.5" fill="#5a3410" text-anchor="middle">bin ≤ 256 B</text>
  <rect x="64" y="262" width="122" height="18" rx="4" fill="#fdeccb"/><text x="125" y="275" font-size="8.5" fill="#5a3410" text-anchor="middle">bin ≤ 4 KB</text>
  <rect x="64" y="284" width="122" height="18" rx="4" fill="#fdeccb"/><text x="125" y="297" font-size="8.5" fill="#5a3410" text-anchor="middle">bin ≤ 64 KB</text>
  <line x1="200" y1="263" x2="240" y2="263" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aG)"/>
  <!-- chunk 链 -->
  <text x="248" y="228" font-size="9.5" fill="#93762e">region 切成 Chunk 双向链，best-fit 选最小够用：</text>
  <rect x="248" y="238" width="150" height="46" rx="7" fill="#eafaf1" stroke="#bce6cd"/><text x="323" y="259" font-size="9" fill="#0f5132" text-anchor="middle">已用 · Tensor A</text><text x="323" y="274" font-size="8" fill="#2f6f4f" text-anchor="middle">refcount 管生命周期</text>
  <rect x="402" y="238" width="96" height="46" rx="7" fill="#ffffff" stroke="#e8cf9a" stroke-dasharray="3 2"/><text x="450" y="264" font-size="9" fill="#93762e" text-anchor="middle">空闲</text>
  <rect x="502" y="238" width="150" height="46" rx="7" fill="#eafaf1" stroke="#bce6cd"/><text x="577" y="264" font-size="9" fill="#0f5132" text-anchor="middle">已用 · Tensor B</text>
  <rect x="656" y="238" width="290" height="46" rx="7" fill="#ffffff" stroke="#e8cf9a" stroke-dasharray="3 2"/><text x="801" y="264" font-size="9" fill="#93762e" text-anchor="middle">空闲（大块，供大请求）</text>
  <text x="248" y="308" font-size="9" fill="#93762e">找不到够用块 → 向 region 尾部扩展或再 cudaMalloc 一片</text>

  <!-- ③ 释放合并 -->
  <rect x="30" y="342" width="940" height="70" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="50" y="365" font-size="12" font-weight="600" fill="#5a3410">③ 释放即合并：TryToCoalesce 把相邻空闲 Chunk 并成大块，抑制外部碎片</text>
  <rect x="50" y="378" width="90" height="22" rx="5" fill="#ffffff" stroke="#e8cf9a" stroke-dasharray="3 2"/><text x="95" y="393" font-size="8.5" fill="#93762e" text-anchor="middle">空闲</text>
  <rect x="144" y="378" width="90" height="22" rx="5" fill="#ffffff" stroke="#e8cf9a" stroke-dasharray="3 2"/><text x="189" y="393" font-size="8.5" fill="#93762e" text-anchor="middle">空闲</text>
  <line x1="248" y1="389" x2="300" y2="389" stroke="#4a7fd0" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#aB)"/>
  <rect x="306" y="378" width="196" height="22" rx="5" fill="#eef3fb" stroke="#4a7fd0" stroke-dasharray="3 2"/><text x="404" y="393" font-size="8.5" fill="#1b2a4a" text-anchor="middle">合并成一个大空闲块</text>
  <text x="524" y="393" font-size="9.5" fill="#93762e">默认预占大片、内部自管，免频繁 cudaMalloc/Free 的内核态延迟与驱动同步</text>

  <!-- 收尾 -->
  <rect x="30" y="424" width="940" height="34" rx="10" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="50" y="446" font-size="10" fill="#494950">不变式：池化解决<tspan font-weight="600" fill="#5a3410">碎片与分配延迟</tspan>，但峰值显存仍受<tspan font-weight="600" fill="#7a2a2a">同时存活张量</tspan>制约 → OOM 先降 batch / 开梯度检查点。</text>
</svg>
