<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1000" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">tf.function · 首次追踪成图，之后按签名复用</text>

  <!-- 首次调用：追踪 -->
  <rect x="30" y="52" width="940" height="176" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="52" y="76" font-size="12.5" font-weight="600" fill="#1b2a4a">首次调用某签名 —— 追踪（tracing）：跑一遍 Python，把 op 录成图，值不真算</text>
  <rect x="52" y="90" width="200" height="56" rx="10" fill="#ffffff" stroke="#bcd0ec"/><text x="152" y="112" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">@tf.function</text><text x="152" y="130" font-size="8.5" fill="#5b7db1" text-anchor="middle">Function 对象 :453</text>
  <rect x="288" y="90" width="200" height="56" rx="10" fill="#ffffff" stroke="#bcd0ec"/><text x="388" y="112" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">AutoGraph 改写</text><text x="388" y="130" font-size="8.5" fill="#5b7db1" text-anchor="middle">Python 控制流→图算子</text>
  <rect x="524" y="90" width="200" height="56" rx="10" fill="#ffffff" stroke="#bcd0ec"/><text x="624" y="112" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">func_graph_from_py_func</text><text x="624" y="130" font-size="8.5" fill="#5b7db1" text-anchor="middle">tracing_compilation.py:310</text>
  <rect x="760" y="90" width="200" height="56" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="860" y="112" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">FuncGraph（GraphDef）</text><text x="860" y="130" font-size="8.5" fill="#2f6f4f" text-anchor="middle">一张静态图</text>
  <line x1="252" y1="118" x2="288" y2="118" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="488" y1="118" x2="524" y2="118" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="724" y1="118" x2="760" y2="118" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="52" y="158" width="908" height="56" rx="10" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="68" y="180" font-size="9.5" font-weight="600" fill="#274a78">封装成 ConcreteFunction，并按输入签名（TypeSpec：dtype + shape）存入 FunctionCache</text>
  <text x="68" y="200" font-size="9" fill="#5b7db1">追踪期间 tf 算子只往图里加节点、不真正计算；Grappler 随后对这张图做整体优化（见「计算图与 Grappler」）</text>

  <!-- 后续调用 -->
  <rect x="30" y="248" width="455" height="150" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="52" y="272" font-size="12" font-weight="600" fill="#0f5132">后续调用 · 同签名命中缓存</text>
  <rect x="52" y="286" width="411" height="40" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="257" y="310" font-size="9.5" fill="#0f5132" text-anchor="middle">签名匹配 → 取缓存的 ConcreteFunction</text>
  <line x1="257" y1="326" x2="257" y2="340" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <rect x="52" y="340" width="411" height="40" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="257" y="364" font-size="9.5" fill="#0f5132" text-anchor="middle">直接执行图，不再跑 Python（快）</text>

  <!-- 变签名重追踪 -->
  <rect x="515" y="248" width="455" height="150" rx="14" fill="#fbeaea" stroke="#f0cccc" filter="url(#soft)"/>
  <text x="537" y="272" font-size="12" font-weight="600" fill="#7d1f1f">变签名 · 重追踪（retrace）</text>
  <rect x="537" y="286" width="411" height="40" rx="9" fill="#ffffff" stroke="#f0cccc"/><text x="742" y="310" font-size="9.5" fill="#7d1f1f" text-anchor="middle">新 dtype / 新 shape / 新 Python 值 → 缓存未命中</text>
  <line x1="742" y1="326" x2="742" y2="340" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <rect x="537" y="340" width="411" height="40" rx="9" fill="#ffffff" stroke="#f0cccc"/><text x="742" y="364" font-size="9.5" fill="#7d1f1f" text-anchor="middle">再追踪一份新图（过频会告警 :123）</text>

  <!-- 收尾 -->
  <rect x="30" y="418" width="940" height="62" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="52" y="442" font-size="10.5" fill="#494950">治理重追踪：用 <tspan font-weight="600" fill="#1b2a4a">input_signature</tspan> 固定输入 spec，或 <tspan font-weight="600" fill="#1b2a4a">reduce_retracing=True</tspan>（:468）让 TF 泛化 shape；</text>
  <text x="52" y="464" font-size="10.5" fill="#494950">避免把频繁变化的 Python 标量当参数（每个新值都触发一次追踪，图会爆炸）。</text>
</svg>
