<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="568" viewBox="0 0 1080 568" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="aH" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="aC" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
    <marker id="aS" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c99a3a"/></marker>
    <marker id="aX" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#7c5cd6"/></marker>
  </defs>
  <rect width="1080" height="568" fill="#fbfbfd"/>

  <!-- ===== 标题带（全景热区） ===== -->
  <rect x="24" y="8" width="1032" height="54" rx="10" fill="none" data-tid="TensorFlow原理_全景主线框架" data-lab="全景主线框架"/>
  <text x="30" y="30" font-size="13" font-weight="600" fill="#1d1d1f">总架构 · 数据流图执行引擎 —— 默认 eager 逐算子即时发射 · @tf.function 追踪成 FuncGraph 编译优化 · Executor 按入度归零就绪调度</text>
  <text x="30" y="50" font-size="10.5" fill="#6e6e73">主视角＝tf.function 追踪成图 → Grappler 重写 / (可选)XLA 融合 → Placer 定设备 → Executor 数据流调度 · 旁路＝eager 逐算子直发 · 横切＝autodiff / 分布式　源码基准 v2.22.0</text>

  <!-- ===== 设计张力铭牌带（eager ⇄ graph 的定义性二元对立） ===== -->
  <rect x="24" y="68" width="1032" height="32" rx="9" fill="#f7f6fb" stroke="#e4e0ee"/>
  <rect x="32" y="75" width="60" height="18" rx="5" fill="#eceaf6" stroke="#d8d1ec"/>
  <text x="62" y="88" font-size="10.5" font-weight="600" fill="#5a4a86" text-anchor="middle">设计张力</text>
  <text x="104" y="88" font-size="11" fill="#3a3a3c"><tspan fill="#a9822f" font-weight="600">eager 即时执行</tspan><tspan fill="#6e6e73"> 易调试·Python 原生·灵活</tspan><tspan fill="#1d1d1f" font-weight="700">　⇄　</tspan><tspan fill="#3a5a8c" font-weight="600">graph 整图编译</tspan><tspan fill="#6e6e73"> Grappler 重写 / XLA 融合 / 常量折叠 → 高吞吐·可序列化部署</tspan></text>

  <!-- ===== 图例：四型语义路径 ===== -->
  <line x1="40" y1="116" x2="70" y2="116" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aH)"/>
  <text x="76" y="120" font-size="10.5" fill="#3a3a3c">主执行流 Hot（graph 编译后发射）</text>
  <line x1="300" y1="116" x2="330" y2="116" stroke="#5b7db1" stroke-width="1.8" marker-end="url(#aC)"/>
  <text x="336" y="120" font-size="10.5" fill="#3a3a3c">图编译 Control（整图重写/编译）</text>
  <line x1="560" y1="116" x2="590" y2="116" stroke="#c99a3a" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aS)"/>
  <text x="596" y="120" font-size="10.5" fill="#3a3a3c">State 张量内存 / eager 旁路</text>
  <line x1="806" y1="116" x2="836" y2="116" stroke="#7c5cd6" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aX)"/>
  <text x="842" y="120" font-size="10.5" fill="#3a3a3c">autodiff / 分布式 横切</text>
  <text x="1056" y="120" font-size="10" fill="#a1a1a6" text-anchor="end">框=可下钻主线 · 灰字=源码锚点</text>

  <!-- ================= 接口层 ================= -->
  <rect x="24" y="128" width="1032" height="90" rx="14" fill="#f5f6f8" stroke="#e2e4e9"/>
  <text x="40" y="148" font-size="12" font-weight="600" fill="#1d1d1f">接口层 · Python 前端</text>
  <text x="150" y="148" font-size="10" fill="#86868b">tf / keras / tf.data —— 默认 eager 即时执行，@tf.function 才追踪成图</text>

  <rect x="40" y="156" width="320" height="56" rx="11" fill="#f6f6f7" stroke="#e2e2e7" filter="url(#soft)" data-tid="TensorFlow原理_接口_张量与变量编程" data-lab="张量与变量编程"/>
  <text x="56" y="178" font-size="11.5" font-weight="600" fill="#1d1d1f">张量与变量编程</text>
  <text x="56" y="194" font-size="9.5" fill="#6e6e73">tf.Tensor 不可变值 / tf.Variable 有状态</text>
  <text x="56" y="207" font-size="8" fill="#9d9da3" font-family="ui-monospace,'SF Mono',Menlo,monospace">quick_execute</text>

  <rect x="380" y="156" width="320" height="56" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)" data-tid="TensorFlow原理_接口_图与tf_function" data-lab="图与 tf.function"/>
  <text x="396" y="178" font-size="11.5" font-weight="600" fill="#1b2a4a">图与 tf.function</text>
  <text x="396" y="194" font-size="9.5" fill="#5b7db1">追踪成 FuncGraph · 按签名缓存/重追踪</text>
  <text x="396" y="207" font-size="8" fill="#9d9da3" font-family="ui-monospace,'SF Mono',Menlo,monospace">polymorphic_function</text>

  <rect x="720" y="156" width="320" height="56" rx="11" fill="#f6f6f7" stroke="#e2e2e7" filter="url(#soft)" data-tid="TensorFlow原理_接口_建模与训练" data-lab="建模与训练"/>
  <text x="736" y="178" font-size="11.5" font-weight="600" fill="#1d1d1f">建模与训练</text>
  <text x="736" y="194" font-size="9.5" fill="#6e6e73">Keras · 训练循环 · tf.data 管道</text>
  <text x="736" y="207" font-size="8" fill="#9d9da3" font-family="ui-monospace,'SF Mono',Menlo,monospace"></text>

  <!-- 成图下沉（蓝 Control） -->
  <line x1="540" y1="212" x2="540" y2="238" stroke="#5b7db1" stroke-width="1.8" fill="none" marker-end="url(#aC)"/>
  <text x="548" y="229" font-size="8.5" fill="#5b7db1">追踪成图</text>

  <!-- ================= 图编译管线 ================= -->
  <rect x="24" y="240" width="1032" height="96" rx="14" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="40" y="260" font-size="12" font-weight="600" fill="#1b2a4a">图编译管线 · 仅 graph 模式（eager 不经此）</text>
  <text x="330" y="260" font-size="10" fill="#7b93b8">整图拿到手后离线重写、编译、定位设备 —— 一次编译多次复用</text>

  <rect x="40" y="268" width="320" height="60" rx="11" fill="#ffffff" stroke="#bcd0ec" filter="url(#soft)" data-tid="TensorFlow原理_支撑_计算图与Grappler" data-lab="计算图与 Grappler"/>
  <text x="56" y="291" font-size="11.5" font-weight="600" fill="#1b2a4a">Grappler 图优化</text>
  <text x="56" y="308" font-size="9" fill="#5b7db1">MetaOptimizer 串多 pass · 折叠/融合/布局</text>
  <text x="56" y="322" font-size="8" fill="#9d9da3" font-family="ui-monospace,'SF Mono',Menlo,monospace">c</text>

  <rect x="380" y="268" width="320" height="60" rx="11" fill="#ffffff" stroke="#bcd0ec" filter="url(#soft)" data-tid="TensorFlow原理_支撑_XLA编译与融合" data-lab="XLA 编译与融合"/>
  <text x="396" y="291" font-size="11.5" font-weight="600" fill="#1b2a4a">XLA 编译（可选）</text>
  <text x="396" y="308" font-size="9" fill="#5b7db1">自动聚类子图 → HLO 融成大 kernel</text>
  <text x="396" y="322" font-size="8" fill="#9d9da3" font-family="ui-monospace,'SF Mono',Menlo,monospace">c</text>

  <rect x="720" y="268" width="320" height="60" rx="11" fill="#ffffff" stroke="#bcd0ec" filter="url(#soft)" data-tid="TensorFlow原理_支撑_设备与后端" data-lab="设备与后端"/>
  <text x="736" y="291" font-size="11.5" font-weight="600" fill="#1b2a4a">设备放置 Placer</text>
  <text x="736" y="308" font-size="9" fill="#5b7db1">按 colocation + soft placement 定 CPU/GPU/TPU</text>
  <text x="736" y="322" font-size="8" fill="#9d9da3" font-family="ui-monospace,'SF Mono',Menlo,monospace">c</text>

  <g stroke="#5b7db1" stroke-width="1.8" fill="none">
    <line x1="360" y1="298" x2="378" y2="298" marker-end="url(#aC)"/>
    <line x1="700" y1="298" x2="718" y2="298" marker-end="url(#aC)"/>
  </g>

  <!-- 编译完落执行（绿 Hot） -->
  <line x1="200" y1="336" x2="200" y2="356" stroke="#2f9e6e" stroke-width="1.8" fill="none" marker-end="url(#aH)"/>
  <text x="208" y="350" font-size="8.5" fill="#4a8c60">下发运行时</text>

  <!-- ================= 运行时执行 ================= -->
  <rect x="24" y="358" width="1032" height="96" rx="14" fill="#f3faf5" stroke="#cfe6d6"/>
  <text x="40" y="378" font-size="12" font-weight="600" fill="#1d4a2b">运行时执行 · 数据流调度</text>
  <text x="230" y="378" font-size="10" fill="#5fa07a">真正跑算子处 —— 入度归零即就绪发射，kernel 落设备读写张量</text>

  <rect x="40" y="386" width="320" height="60" rx="11" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)" data-tid="TensorFlow原理_支撑_执行引擎" data-lab="执行引擎"/>
  <text x="56" y="409" font-size="11.5" font-weight="600" fill="#1d4a2b">执行引擎 Executor</text>
  <text x="56" y="426" font-size="9" fill="#4a8c60">pending 归零即就绪 · 传播输出 · 异步</text>
  <text x="56" y="440" font-size="8" fill="#9d9da3" font-family="ui-monospace,'SF Mono',Menlo,monospace">c</text>

  <rect x="380" y="386" width="320" height="60" rx="11" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)" data-tid="TensorFlow原理_支撑_算子与kernel" data-lab="算子与 kernel"/>
  <text x="396" y="409" font-size="11.5" font-weight="600" fill="#1d4a2b">算子分发 OpKernel</text>
  <text x="396" y="426" font-size="9" fill="#4a8c60">按 op+设备 查表 · 虚 Compute</text>
  <text x="396" y="440" font-size="8" fill="#9d9da3" font-family="ui-monospace,'SF Mono',Menlo,monospace">c</text>

  <rect x="720" y="386" width="320" height="60" rx="11" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)" data-tid="TensorFlow原理_支撑_张量与内存" data-lab="张量与内存"/>
  <text x="736" y="409" font-size="11.5" font-weight="600" fill="#6b4e16">张量与内存</text>
  <text x="736" y="426" font-size="9" fill="#a9822f">Tensor + 引用计数 Buffer · BFC 显存池</text>
  <text x="736" y="440" font-size="8" fill="#9d9da3" font-family="ui-monospace,'SF Mono',Menlo,monospace"></text>

  <g stroke="#2f9e6e" stroke-width="1.8" fill="none">
    <line x1="360" y1="416" x2="378" y2="416" marker-end="url(#aH)"/>
    <line x1="700" y1="416" x2="718" y2="416" marker-end="url(#aH)"/>
  </g>

  <!-- ===== eager 旁路（琥珀虚线 · 右侧下行跳过编译） ===== -->
  <path d="M1050,212 L1050,414 L1046,414" fill="none" stroke="#c99a3a" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aS)"/>
  <text x="1044" y="316" font-size="9" fill="#a9822f" transform="rotate(-90 1044 316)" text-anchor="middle">eager 旁路 · 逐算子直发（跳过图编译）</text>

  <!-- ================= 横切能力域 ================= -->
  <text x="40" y="470" font-size="10.5" font-weight="600" fill="#4a2e78">横切能力域 · 缠绕主执行流（非线性阶段，eager/graph 两档皆生效）</text>

  <rect x="40" y="478" width="500" height="60" rx="11" fill="#f0ecfb" stroke="#d3c6ef" filter="url(#soft)" data-tid="TensorFlow原理_支撑_自动微分引擎" data-lab="自动微分引擎"/>
  <text x="56" y="501" font-size="11.5" font-weight="600" fill="#4a2e78">自动微分 · GradientTape</text>
  <text x="56" y="518" font-size="9" fill="#6b52a3">with 上下文录前向 op → 沿录制逆序回放求梯度</text>
  <text x="56" y="532" font-size="8" fill="#9d9da3" font-family="ui-monospace,'SF Mono',Menlo,monospace">imperative_grad</text>

  <rect x="556" y="478" width="484" height="60" rx="11" fill="#f0ecfb" stroke="#d3c6ef" filter="url(#soft)" data-tid="TensorFlow原理_支撑_分布式训练" data-lab="分布式训练"/>
  <text x="572" y="501" font-size="11.5" font-weight="600" fill="#4a2e78">分布式 · tf.distribute</text>
  <text x="572" y="518" font-size="9" fill="#6b52a3">Strategy.scope 镜像变量 · run 并行副本 · all-reduce 聚梯度</text>
  <text x="572" y="532" font-size="8" fill="#9d9da3" font-family="ui-monospace,'SF Mono',Menlo,monospace"></text>

  <g stroke="#7c5cd6" stroke-width="1.4" stroke-dasharray="5 3" fill="none">
    <line x1="200" y1="454" x2="200" y2="476" marker-end="url(#aX)"/>
    <line x1="820" y1="454" x2="820" y2="476" marker-end="url(#aX)"/>
  </g>
</svg>
