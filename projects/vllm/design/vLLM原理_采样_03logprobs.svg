<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">vLLM 采样附加能力 · penalties 与 logprobs —— 惩罚在采样前、logprobs 在采样后</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">中轴是采样时刻 · 左惩罚项作用于采样前的 logits · 右 logprobs 在采样后提取 · 一前一后夹住 Sampler</text>

  <!-- timeline axis -->
  <text x="540" y="86" font-size="10.5" font-weight="600" text-anchor="middle" fill="#12402a">采样时刻（Sampler）</text>
  <rect x="470" y="94" width="140" height="30" rx="8" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="540" y="113" font-size="9.5" font-weight="600" text-anchor="middle" fill="#12402a">softmax → 抽样</text>

  <!-- before : penalties (red - suppress) -->
  <rect x="30" y="140" width="500" height="180" rx="13" fill="#fbeaea" stroke="#e6b8b8" filter="url(#soft)"/>
  <text x="50" y="166" font-size="12.5" font-weight="600" fill="#7a2a2a">penalties · 采样前作用于 logits</text>
  <text x="50" y="187" font-size="9" fill="#a05a5a">penalties.py —— 对已出现的 token 降分，抑制重复啰嗦</text>
  <rect x="50" y="200" width="460" height="58" rx="9" fill="#ffffff" stroke="#e6b8b8"/>
  <text x="280" y="222" font-size="10" font-weight="600" text-anchor="middle" fill="#7a2a2a">presence / frequency / repetition penalty</text>
  <text x="280" y="242" font-size="8.5" text-anchor="middle" fill="#a05a5a">对已生成 token 减分，打破"的的的"式循环</text>
  <text x="50" y="282" font-size="9" fill="#7a2a2a">为什么：纯采样易重复；惩罚项对已生成 token</text>
  <text x="50" y="300" font-size="9" fill="#7a2a2a">减分打破循环，让输出不啰嗦</text>

  <!-- after : logprobs (blue - readout) -->
  <rect x="550" y="140" width="500" height="180" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="570" y="166" font-size="12.5" font-weight="600" fill="#1b2a4a">logprobs · 采样后提取</text>
  <text x="570" y="187" font-size="9" fill="#5b7db1">ops/logprobs.py —— 返回所选 / 候选 token 的对数概率</text>
  <rect x="570" y="200" width="460" height="58" rx="9" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="800" y="222" font-size="10" font-weight="600" text-anchor="middle" fill="#1b2a4a">所选 token 及候选的 log 概率</text>
  <text x="800" y="242" font-size="8.5" text-anchor="middle" fill="#5b7db1">用于置信度分析、beam search、评测、推测解码</text>
  <text x="570" y="282" font-size="9" fill="#1b2a4a">为什么：logprobs 让调用方知道模型对每个</text>
  <text x="570" y="300" font-size="9" fill="#1b2a4a">选择多有把握（评测 / 可解释性 / 推测解码需要）</text>

  <!-- flow arrows through center -->
  <path d="M280,140 L280,124 L470,124 L470,110 L470,110" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M610,109 L800,109 L800,124 L800,140" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="375" y="105" font-size="8.5" fill="#a1a1a6">惩罚后的 logits 进采样</text>
  <text x="700" y="105" font-size="8.5" fill="#a1a1a6">采样结果供提取</text>

  <!-- summary band -->
  <rect x="30" y="344" width="1020" height="96" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="50" y="370" font-size="12" font-weight="600" fill="#5a3410">一前一后夹住采样</text>
  <text x="50" y="394" font-size="9.5" fill="#93762e">惩罚（penalties）在采样前作用于 logits —— 改变分数、抑制重复；</text>
  <text x="50" y="414" font-size="9.5" fill="#93762e">logprobs 在采样后提取 —— 只读、不改分数，给出置信度读数。</text>
  <text x="50" y="432" font-size="9" fill="#b1974e">调优：啰嗦 / 循环时加 repetition / frequency penalty；需要置信度或推测解码时开 logprobs</text>

  <text x="30" y="484" font-size="9" fill="#a1a1a6">源码基准 vLLM(git 7aab6e2 · v1-only) · logprobs vllm/v1/sample/ops/logprobs.py · penalties penalties.py（presence / frequency / repetition）· 惩罚采样前、logprobs 采样后</text>
</svg>
