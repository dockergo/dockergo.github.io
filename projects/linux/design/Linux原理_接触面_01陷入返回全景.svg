<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="440" viewBox="0 0 1000 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">系统调用全景：唯一硬件门 syscall 指令 → 陷入 → 分派 → sysret/iret 返回</text>

  <!-- 用户态区 -->
  <rect x="28" y="58" width="944" height="86" rx="13" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="46" y="80" font-size="11.5" font-weight="600" fill="#3d2a5a">用户态（低特权 ring 3）</text>
  <rect x="60" y="94" width="240" height="38" rx="10" fill="#ffffff" stroke="#ececf1"/><text x="180" y="118" font-size="10.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">libc 封装：参数入寄存器</text>
  <rect x="360" y="94" width="240" height="38" rx="10" fill="#ffffff" stroke="#ececf1"/><text x="480" y="118" font-size="10.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">执行 syscall 指令（陷入）</text>
  <rect x="720" y="94" width="230" height="38" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="835" y="118" font-size="10.5" font-weight="600" fill="#12402a" text-anchor="middle">拿到返回值，继续运行</text>
  <path d="M300,113 L360,113" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 分隔：特权边界 -->
  <line x1="28" y1="160" x2="972" y2="160" stroke="#c1962a" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="972" y="156" font-size="9" fill="#a05411" text-anchor="end">← 特权边界（硬件门，唯一入口）</text>

  <!-- 内核态区 -->
  <rect x="28" y="176" width="944" height="192" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="198" font-size="11.5" font-weight="600" fill="#1b2a4a">内核态（高特权 ring 0）</text>

  <rect x="52" y="214" width="228" height="130" rx="11" fill="#ffffff" stroke="#ececf1"/>
  <text x="166" y="236" font-size="11" font-weight="600" fill="#1d1d1f" text-anchor="middle">① entry_SYSCALL_64</text>
  <text x="166" y="252" font-size="8.5" fill="#6e6e73" text-anchor="middle">(entry_64.S:87)</text>
  <text x="68" y="276" font-size="9.5" fill="#3a3a3c">· swapgs 切内核 GS (:91)</text>
  <text x="68" y="296" font-size="9.5" fill="#3a3a3c">· 切换到内核栈</text>
  <text x="68" y="316" font-size="9.5" fill="#3a3a3c">· 保存寄存器为 pt_regs</text>
  <text x="68" y="336" font-size="9.5" fill="#6e6e73">（后续参数从此取）</text>

  <rect x="308" y="214" width="228" height="130" rx="11" fill="#ffffff" stroke="#ececf1"/>
  <text x="422" y="236" font-size="11" font-weight="600" fill="#1d1d1f" text-anchor="middle">② do_syscall_64</text>
  <text x="422" y="252" font-size="8.5" fill="#6e6e73" text-anchor="middle">(syscall_64.c:87)</text>
  <text x="324" y="276" font-size="9.5" fill="#3a3a3c">· 进入钩子（seccomp/ptrace）</text>
  <text x="324" y="296" font-size="9.5" fill="#3a3a3c">· 按 nr 分派（见 分派图）</text>
  <text x="324" y="316" font-size="9.5" fill="#3a3a3c">· 退出钩子 + 信号处理</text>
  <text x="324" y="336" font-size="9.5" fill="#6e6e73">syscall_exit_to_user_mode</text>

  <rect x="564" y="214" width="228" height="130" rx="11" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="678" y="236" font-size="11" font-weight="600" fill="#12402a" text-anchor="middle">③ sys_xxx 具体实现</text>
  <text x="678" y="252" font-size="8.5" fill="#2f6f4f" text-anchor="middle">SYSCALL_DEFINEn 生成</text>
  <text x="580" y="276" font-size="9.5" fill="#2f6f4f">· 分派给能力域主线</text>
  <text x="580" y="296" font-size="9.5" fill="#2f6f4f">  （调度/内存/VFS/网络…）</text>
  <text x="580" y="316" font-size="9.5" fill="#2f6f4f">· copy_from/to_user 访问</text>
  <text x="580" y="336" font-size="9.5" fill="#2f6f4f">  用户内存并返回值</text>

  <rect x="820" y="214" width="128" height="130" rx="11" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="884" y="236" font-size="11" font-weight="600" fill="#5a3410" text-anchor="middle">④ 返回</text>
  <text x="884" y="258" font-size="9.5" fill="#93762e" text-anchor="middle">寄存器合规？</text>
  <text x="884" y="282" font-size="9.5" fill="#93762e" text-anchor="middle">是 → sysretq</text>
  <text x="884" y="300" font-size="8.5" fill="#93762e" text-anchor="middle">(快, entry_64.S:166)</text>
  <text x="884" y="322" font-size="9.5" fill="#93762e" text-anchor="middle">否 → iret</text>
  <text x="884" y="340" font-size="8.5" fill="#93762e" text-anchor="middle">(慢但全能)</text>

  <g stroke="#c7c7cc" stroke-width="1.6" fill="none">
    <line x1="280" y1="279" x2="308" y2="279" marker-end="url(#ar)"/>
    <line x1="536" y1="279" x2="564" y2="279" marker-end="url(#ar)"/>
    <line x1="792" y1="279" x2="820" y2="279" marker-end="url(#ar)"/>
    <path d="M480,132 L480,176" marker-end="url(#ar)"/>
    <path d="M884,214 L884,150 L835,150 L835,132" marker-end="url(#ar)"/>
  </g>
  <text x="500" y="172" font-size="9" fill="#a1a1a6">陷入</text>
  <text x="800" y="172" font-size="9" fill="#a1a1a6" text-anchor="end">返回用户态</text>

  <!-- 底注 -->
  <text x="46" y="392" font-size="10" fill="#3a3a3c">要点：用户代码从不直接跳进内核函数——只能经这个唯一的硬件门；内核在门内完全掌控栈、GS、特权级后才分派。</text>
  <text x="46" y="412" font-size="10" fill="#6e6e73">接触面本身不占能力域，它把请求分派给各能力域主线（调度/内存/VFS/网络…），故被下游全部依赖。</text>
</svg>
