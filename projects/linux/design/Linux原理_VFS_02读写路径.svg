<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="540" viewBox="0 0 1000 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">读写贯穿路径：vfs_read/write → 页缓存命中/缺失 → read_folio 下块层 / 标脏后台回写</text>

  <!-- 读路径 左列 -->
  <rect x="28" y="54" width="462" height="466" rx="13" fill="#fbfbfd" stroke="#ececf1"/>
  <text x="46" y="76" font-size="12" font-weight="600" fill="#1b2a4a">读路径 read(fd, buf, n)</text>

  <rect x="48" y="88" width="422" height="42" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="259" y="107" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">ksys_read :706 → vfs_read（read_write.c:554）</text>
  <text x="259" y="123" font-size="9" fill="#5b7db1" text-anchor="middle">校验 f_mode → 调 file-&gt;f_op-&gt;read_iter</text>

  <rect x="48" y="146" width="422" height="42" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="259" y="165" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">generic_file_read_iter（filemap.c:2957）</text>
  <text x="259" y="181" font-size="9" fill="#5b7db1" text-anchor="middle">→ filemap_read :2769 → filemap_get_pages :2668</text>

  <!-- 命中/缺失 判定 -->
  <rect x="48" y="204" width="422" height="36" rx="10" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="259" y="227" font-size="10.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">folio 在 address_space 页缓存中？</text>

  <!-- 命中 -->
  <rect x="48" y="264" width="200" height="100" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="148" y="285" font-size="10.5" font-weight="600" fill="#12402a" text-anchor="middle">命中（uptodate）</text>
  <text x="148" y="307" font-size="9.5" fill="#2f6f4f" text-anchor="middle">直接把 folio 内容</text>
  <text x="148" y="325" font-size="9.5" fill="#2f6f4f" text-anchor="middle">拷回用户 buffer</text>
  <text x="148" y="349" font-size="9.5" font-weight="600" fill="#2f6f4f" text-anchor="middle">不碰块层（纯内存）</text>

  <!-- 缺失 -->
  <rect x="270" y="264" width="200" height="100" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="370" y="285" font-size="10.5" font-weight="600" fill="#5a3410" text-anchor="middle">缺失</text>
  <text x="370" y="307" font-size="9.5" fill="#93762e" text-anchor="middle">filemap_read_folio :2492</text>
  <text x="370" y="325" font-size="9.5" fill="#93762e" text-anchor="middle">→ a_ops-&gt;read_folio</text>
  <text x="370" y="349" font-size="9.5" fill="#93762e" text-anchor="middle">顺序访问 → 预读 :2654</text>

  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <path d="M259,130 L259,146" marker-end="url(#ar)"/>
    <path d="M259,188 L259,204" marker-end="url(#ar)"/>
    <path d="M259,240 L148,240 L148,264" marker-end="url(#ar)"/>
    <path d="M259,240 L370,240 L370,264" marker-end="url(#ar)"/>
  </g>
  <text x="180" y="257" font-size="8.5" fill="#a1a1a6">是</text>
  <text x="375" y="257" font-size="8.5" fill="#a1a1a6">否</text>

  <!-- 写路径 右列 -->
  <rect x="510" y="54" width="462" height="466" rx="13" fill="#fbfbfd" stroke="#ececf1"/>
  <text x="528" y="76" font-size="12" font-weight="600" fill="#4a1414">写路径 write(fd, buf, n)</text>

  <rect x="530" y="88" width="422" height="42" rx="10" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="741" y="107" font-size="10.5" font-weight="600" fill="#4a1414" text-anchor="middle">vfs_write（read_write.c:668）→ write_iter</text>
  <text x="741" y="123" font-size="9" fill="#7a2a2a" text-anchor="middle">generic_file_write_iter（filemap.c:4459）</text>

  <rect x="530" y="146" width="422" height="66" rx="10" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="741" y="166" font-size="10.5" font-weight="600" fill="#4a1414" text-anchor="middle">generic_perform_write（filemap.c:4297）</text>
  <text x="546" y="186" font-size="9.5" fill="#7a2a2a">① a_ops-&gt;write_begin :4325 准备页</text>
  <text x="546" y="204" font-size="9.5" fill="#7a2a2a">② 拷入数据 → ③ write_end :4346 标脏</text>

  <rect x="530" y="228" width="422" height="46" rx="10" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="741" y="248" font-size="10.5" font-weight="600" fill="#5a3410" text-anchor="middle">数据在页缓存被标脏（dirty folio）</text>
  <text x="741" y="264" font-size="9" fill="#93762e" text-anchor="middle">write 此刻即返回 —— 尚未落盘</text>

  <!-- 回写触发 -->
  <rect x="530" y="292" width="422" height="76" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="741" y="312" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">后台回写 wb_workfn（fs-writeback.c:2411）</text>
  <text x="546" y="332" font-size="9.5" fill="#5b7db1">__mark_inode_dirty :2588 → wb_writeback :2184</text>
  <text x="546" y="350" font-size="9.5" fill="#5b7db1">→ writeback_sb_inodes :1957 逐 inode 回写脏页</text>
  <text x="546" y="365" font-size="9.5" fill="#5b7db1">触发：周期 / dirty 阈值 / fsync</text>

  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <path d="M741,130 L741,146" marker-end="url(#ar)"/>
    <path d="M741,212 L741,228" marker-end="url(#ar)"/>
    <path d="M741,274 L741,292" marker-end="url(#ar)"/>
  </g>

  <!-- 块层 底部横跨 -->
  <rect x="130" y="430" width="740" height="66" rx="12" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="500" y="452" font-size="11.5" font-weight="600" fill="#5a3410" text-anchor="middle">块层（提交 bio → blk-mq → 驱动 → 完成中断）</text>
  <text x="500" y="472" font-size="9.5" fill="#93762e" text-anchor="middle">读缺失时下发读 bio；回写时下发写 bio</text>
  <text x="500" y="488" font-size="9" fill="#a1a1a6" text-anchor="middle">→ 详见「块层与 IO 调度」主线</text>

  <g stroke="#c7c7cc" stroke-width="1.6" fill="none">
    <path d="M370,364 L370,400 L400,400 L400,430" marker-end="url(#ar)"/>
    <path d="M741,368 L741,400 L620,400 L620,430" marker-end="url(#ar)"/>
  </g>
  <text x="373" y="392" font-size="8.5" fill="#a1a1a6">读 bio</text>
  <text x="624" y="392" font-size="8.5" fill="#a1a1a6">写 bio</text>
</svg>
