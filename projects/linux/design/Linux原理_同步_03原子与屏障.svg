<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="420" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">最底层：原子操作（CAS 无锁循环）+ 内存屏障（约束访存顺序）</text>

  <!-- 左：CAS 无锁循环 -->
  <rect x="28" y="56" width="440" height="340" rx="13" fill="#fbfbfd" stroke="#ececf1"/>
  <text x="44" y="78" font-size="11.5" font-weight="600" fill="#1d1d1f">原子操作：cmpxchg 无锁更新循环</text>

  <rect x="120" y="94" width="256" height="44" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="248" y="121" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">① old = atomic_read(v)</text>

  <rect x="120" y="158" width="256" height="44" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="248" y="185" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">② new = f(old) 计算新值</text>

  <polygon points="128,254 248,216 368,254 248,292" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="248" y="250" font-size="10.5" font-weight="600" fill="#5a3410" text-anchor="middle">③ cmpxchg(v, old→new)</text>
  <text x="248" y="266" font-size="9.5" fill="#93762e" text-anchor="middle">成功？（v 仍等于 old）</text>

  <rect x="120" y="322" width="256" height="52" rx="10" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="248" y="344" font-size="10.5" font-weight="600" fill="#12402a" text-anchor="middle">完成 · 无锁更新成功</text>
  <text x="248" y="362" font-size="9" fill="#2f6f4f" text-anchor="middle">硬件保证不可分割</text>

  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="248" y1="138" x2="248" y2="158" marker-end="url(#ar)"/>
    <line x1="248" y1="202" x2="248" y2="216" marker-end="url(#ar)"/>
    <line x1="248" y1="292" x2="248" y2="322" marker-end="url(#ar)"/>
    <path d="M368,254 L410,254 L410,116 L376,116" marker-end="url(#ar)"/>
  </g>
  <text x="258" y="308" font-size="9" fill="#2f6f4f">成功</text>
  <text x="414" y="188" font-size="9" fill="#7a2a2a">失败：被别的</text>
  <text x="414" y="204" font-size="9" fill="#7a2a2a">CPU 改了 → 重试</text>

  <!-- 右：内存屏障 -->
  <rect x="500" y="56" width="472" height="340" rx="13" fill="#fbfbfd" stroke="#ececf1"/>
  <text x="516" y="78" font-size="11.5" font-weight="600" fill="#1d1d1f">内存屏障：多核 CPU / 编译器会乱序，需约束顺序</text>

  <rect x="516" y="94" width="440" height="50" rx="10" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="532" y="114" font-size="10.5" font-weight="600" fill="#3d2a5a">acquire（加锁 / 拿读锁）</text>
  <text x="532" y="134" font-size="9.5" fill="#6e6e73">其后的访存不得上移越过它 —— 进入临界区</text>

  <rect x="516" y="154" width="440" height="50" rx="10" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="532" y="174" font-size="10.5" font-weight="600" fill="#3d2a5a">release（解锁 / 发布）</text>
  <text x="532" y="194" font-size="9.5" fill="#6e6e73">其前的访存不得下移越过它 —— 离开临界区</text>

  <rect x="516" y="214" width="440" height="50" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="532" y="234" font-size="10.5" font-weight="600" fill="#1b2a4a">smp_mb（全屏障）</text>
  <text x="532" y="254" font-size="9.5" fill="#5b7db1">两侧访存都不得跨越 —— 最强约束</text>

  <rect x="516" y="278" width="440" height="98" rx="10" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="532" y="300" font-size="10.5" font-weight="600" fill="#5a3410">要点：acquire/release 成对</text>
  <text x="532" y="322" font-size="9.5" fill="#93762e">· 加锁 = acquire、解锁 = release → 临界区访存不外溢</text>
  <text x="532" y="342" font-size="9.5" fill="#93762e">· rcu_assign_pointer 内含 release：发布指针必须用它</text>
  <text x="532" y="362" font-size="9.5" fill="#93762e">　否则读者可能看到"指针已更新、内容未写完"的半成品</text>
</svg>
