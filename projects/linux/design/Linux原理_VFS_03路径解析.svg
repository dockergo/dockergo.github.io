<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="470" viewBox="0 0 1000 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">路径解析：link_path_walk 逐段 walk_component，优先走 dcache 的 RCU 无锁查找</text>

  <!-- 路径字符串分段 -->
  <text x="30" y="66" font-size="10.5" font-weight="600" fill="#6e6e73">贯穿示例：解析 /home/u/a.txt</text>
  <rect x="30" y="78" width="70" height="34" rx="8" fill="#f4eefb" stroke="#d9c7ec"/><text x="65" y="100" font-size="10.5" font-weight="600" fill="#3d2a5a" text-anchor="middle">/  (根)</text>
  <rect x="122" y="78" width="80" height="34" rx="8" fill="#ffffff" stroke="#ececf1"/><text x="162" y="100" font-size="10.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">home</text>
  <rect x="224" y="78" width="70" height="34" rx="8" fill="#ffffff" stroke="#ececf1"/><text x="259" y="100" font-size="10.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">u</text>
  <rect x="316" y="78" width="90" height="34" rx="8" fill="#fff7e6" stroke="#e8cf9a"/><text x="361" y="100" font-size="10.5" font-weight="600" fill="#5a3410" text-anchor="middle">a.txt</text>
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <path d="M100,95 L122,95" marker-end="url(#ar)"/>
    <path d="M202,95 L224,95" marker-end="url(#ar)"/>
    <path d="M294,95 L316,95" marker-end="url(#ar)"/>
  </g>
  <text x="470" y="100" font-size="9.5" fill="#a1a1a6">link_path_walk（namei.c:2574）按 / 拆分，逐段前进</text>

  <!-- 每段处理循环 -->
  <rect x="30" y="140" width="942" height="238" rx="13" fill="#f5faf6" stroke="#e2ece5"/>
  <text x="48" y="162" font-size="11.5" font-weight="600" fill="#2c5a3a">对每一段：walk_component（namei.c:2261）→ 决定这段名字对应哪个 dentry</text>

  <!-- nameidata 游标 -->
  <rect x="48" y="176" width="200" height="180" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="148" y="197" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">nameidata 游标</text>
  <text x="64" y="219" font-size="9" fill="#5b7db1">namei.c:723</text>
  <text x="64" y="240" font-size="9.5" fill="#1b2a4a">· 当前所在目录 dentry</text>
  <text x="64" y="259" font-size="9.5" fill="#1b2a4a">· 剩余待解析路径</text>
  <text x="64" y="278" font-size="9.5" fill="#1b2a4a">· LOOKUP_RCU 标志</text>
  <text x="64" y="304" font-size="9" fill="#5b7db1">path_lookupat :2797 驱动</text>
  <text x="64" y="322" font-size="9" fill="#5b7db1">先试 RCU 无锁，</text>
  <text x="64" y="338" font-size="9" fill="#5b7db1">失败降级持锁重试</text>

  <!-- lookup_fast RCU 命中 -->
  <rect x="288" y="176" width="310" height="84" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="443" y="197" font-size="10.5" font-weight="600" fill="#12402a" text-anchor="middle">① lookup_fast（namei.c:1838）· 快路</text>
  <text x="304" y="219" font-size="9.5" fill="#12402a">__d_lookup_rcu :1849 —— 无锁 RCU 查 dcache</text>
  <text x="304" y="238" font-size="9.5" fill="#12402a">命中：直接拿到子 dentry，不下盘</text>
  <text x="304" y="255" font-size="9" fill="#2f6f4f">热路径几乎全在内存完成（dcache 命脉）</text>

  <!-- 慢路 -->
  <rect x="288" y="272" width="310" height="84" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="443" y="293" font-size="10.5" font-weight="600" fill="#5a3410" text-anchor="middle">② 缓存未命中 · 慢路（持锁）</text>
  <text x="304" y="315" font-size="9.5" fill="#93762e">调父目录 inode-&gt;i_op-&gt;lookup</text>
  <text x="304" y="334" font-size="9.5" fill="#93762e">具体文件系统读目录项、建新 dentry</text>
  <text x="304" y="351" font-size="9" fill="#93762e">填回 dcache，供后续命中</text>

  <!-- step_into -->
  <rect x="638" y="176" width="316" height="180" rx="11" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="796" y="197" font-size="10.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">③ step_into（namei.c:2126）步进</text>
  <text x="654" y="222" font-size="9.5" fill="#1d1d1f">拿到本段 dentry 后更新游标：</text>
  <rect x="654" y="234" width="284" height="30" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="796" y="253" font-size="9.5" fill="#1b2a4a" text-anchor="middle">进入子目录（游标下移一层）</text>
  <rect x="654" y="270" width="284" height="30" rx="8" fill="#f4eefb" stroke="#d9c7ec"/><text x="796" y="289" font-size="9.5" fill="#3d2a5a" text-anchor="middle">跟随符号链接（递归解析）</text>
  <rect x="654" y="306" width="284" height="30" rx="8" fill="#fff7e6" stroke="#e8cf9a"/><text x="796" y="325" font-size="9.5" fill="#5a3410" text-anchor="middle">跨越挂载点（切到子 fs 的 s_root）</text>

  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <path d="M248,218 L288,218" marker-end="url(#ar)"/>
    <path d="M443,260 L443,272" marker-end="url(#ar)"/>
    <path d="M598,218 L638,218" marker-end="url(#ar)"/>
    <path d="M796,336 L796,362 L148,362 L148,356" marker-end="url(#ar)"/>
  </g>
  <text x="252" y="212" font-size="8.5" fill="#a1a1a6">查缓存</text>
  <text x="602" y="212" font-size="8.5" fill="#a1a1a6">得 dentry</text>
  <text x="420" y="376" font-size="9" fill="#a1a1a6" text-anchor="middle">下一段回到游标，循环直到路径末段 → 得到目标 dentry/inode</text>
</svg>
