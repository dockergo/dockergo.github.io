<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="480" viewBox="0 0 1000 480" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="480" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">软中断向量表 + 执行时机 + 过载兜底（raise 只置位，两处执行，三闸门限流）</text>

  <!-- 左：向量表 -->
  <rect x="28" y="58" width="196" height="404" rx="13" fill="#fbfbfd" stroke="#ececf1"/>
  <text x="44" y="80" font-size="11" font-weight="600" fill="#1d1d1f">软中断向量（interrupt.h:550）</text>
  <text x="44" y="96" font-size="8.5" fill="#a1a1a6">优先级 高 → 低，共 NR_SOFTIRQS=10</text>
  <g font-size="9.5">
    <rect x="44" y="106" width="164" height="26" rx="7" fill="#ffffff" stroke="#ececf1"/><text x="52" y="123" fill="#1d1d1f">0 HI_SOFTIRQ</text><text x="200" y="123" fill="#a1a1a6" text-anchor="end">高优 tasklet</text>
    <rect x="44" y="138" width="164" height="26" rx="7" fill="#ffffff" stroke="#ececf1"/><text x="52" y="155" fill="#1d1d1f">1 TIMER</text><text x="200" y="155" fill="#a1a1a6" text-anchor="end">定时器</text>
    <rect x="44" y="170" width="164" height="26" rx="7" fill="#ffffff" stroke="#ececf1"/><text x="52" y="187" fill="#1d1d1f">2 NET_TX</text><text x="200" y="187" fill="#a1a1a6" text-anchor="end">网络发</text>
    <rect x="44" y="202" width="164" height="26" rx="7" fill="#ffffff" stroke="#ececf1"/><text x="52" y="219" fill="#1d1d1f">3 NET_RX</text><text x="200" y="219" fill="#a1a1a6" text-anchor="end">网络收</text>
    <rect x="44" y="234" width="164" height="26" rx="7" fill="#ffffff" stroke="#ececf1"/><text x="52" y="251" fill="#1d1d1f">4 BLOCK</text><text x="200" y="251" fill="#a1a1a6" text-anchor="end">块层 IO</text>
    <rect x="44" y="266" width="164" height="26" rx="7" fill="#ffffff" stroke="#ececf1"/><text x="52" y="283" fill="#1d1d1f">5 IRQ_POLL</text>
    <rect x="44" y="298" width="164" height="26" rx="7" fill="#ffffff" stroke="#ececf1"/><text x="52" y="315" fill="#1d1d1f">6 TASKLET</text><text x="200" y="315" fill="#a1a1a6" text-anchor="end">普通 tasklet</text>
    <rect x="44" y="330" width="164" height="26" rx="7" fill="#ffffff" stroke="#ececf1"/><text x="52" y="347" fill="#1d1d1f">7 SCHED</text><text x="200" y="347" fill="#a1a1a6" text-anchor="end">负载均衡</text>
    <rect x="44" y="362" width="164" height="26" rx="7" fill="#ffffff" stroke="#ececf1"/><text x="52" y="379" fill="#1d1d1f">8 HRTIMER</text>
    <rect x="44" y="394" width="164" height="26" rx="7" fill="#ffffff" stroke="#ececf1"/><text x="52" y="411" fill="#1d1d1f">9 RCU</text><text x="200" y="411" fill="#a1a1a6" text-anchor="end">宽限期</text>
  </g>

  <!-- 右上：注册 + 触发 -->
  <rect x="248" y="58" width="352" height="96" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="264" y="80" font-size="11.5" font-weight="600" fill="#3d2a5a">open_softirq（softirq.c:806）· 注册</text>
  <text x="264" y="102" font-size="9.5" fill="#6e6e73">编译期静态：把向量号绑定处理函数 action</text>
  <text x="264" y="122" font-size="9.5" fill="#6e6e73">softirq_vec[nr].action = action</text>
  <text x="264" y="142" font-size="9.5" fill="#6e6e73">子系统启动时调用（网络 / 块层 / 定时器…）</text>

  <rect x="620" y="58" width="352" height="96" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="636" y="80" font-size="11.5" font-weight="600" fill="#5a3410">raise_softirq（softirq.c:790）· 触发</text>
  <text x="636" y="102" font-size="9.5" fill="#93762e">只把 pending 位置 1：or_softirq_pending(1&lt;&lt;nr)</text>
  <text x="636" y="122" font-size="9.5" fill="#93762e">不立即执行；非中断上下文则唤醒 ksoftirqd</text>
  <text x="636" y="142" font-size="9.5" fill="#93762e">→ 真正执行推迟到下方两处时机</text>

  <!-- 右下：执行循环 -->
  <rect x="248" y="170" width="724" height="292" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="264" y="192" font-size="11.5" font-weight="600" fill="#2c5a3a">执行 handle_softirqs 一轮（__do_softirq，softirq.c:579）</text>

  <!-- 两处时机 -->
  <rect x="264" y="204" width="330" height="54" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="280" y="224" font-size="10.5" font-weight="600" fill="#1b2a4a">时机①：中断返回时</text>
  <text x="280" y="244" font-size="9" fill="#5b7db1">irq_exit → invoke_softirq（softirq.c:735）就地跑</text>

  <rect x="610" y="204" width="346" height="54" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="626" y="224" font-size="10.5" font-weight="600" fill="#1b2a4a">时机②：ksoftirqd 内核线程</text>
  <text x="626" y="244" font-size="9" fill="#5b7db1">per-CPU 线程 run_ksoftirqd（softirq.c:1068）补跑</text>

  <!-- 处理体 -->
  <rect x="264" y="278" width="330" height="72" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="280" y="300" font-size="10.5" font-weight="600" fill="#1d1d1f">一轮处理</text>
  <text x="280" y="320" font-size="9" fill="#6e6e73">清 pending 位 → 开中断 → ffs 逐位</text>
  <text x="280" y="336" font-size="9" fill="#6e6e73">调 h-&gt;action 跑各置位向量</text>

  <!-- 三闸门 -->
  <rect x="264" y="368" width="330" height="80" rx="10" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="280" y="388" font-size="10.5" font-weight="600" fill="#5a3410">还有 pending？三闸门（softirq.c:641）</text>
  <text x="280" y="408" font-size="9" fill="#93762e">① 未超 MAX_SOFTIRQ_TIME = 2ms</text>
  <text x="280" y="424" font-size="9" fill="#93762e">② !need_resched（不欠调度）</text>
  <text x="280" y="440" font-size="9" fill="#93762e">③ --max_restart（初值 10）未耗尽</text>

  <!-- 两个出口 -->
  <rect x="620" y="278" width="336" height="64" rx="10" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="636" y="300" font-size="10.5" font-weight="600" fill="#12402a">三条都满足 → goto restart</text>
  <text x="636" y="322" font-size="9" fill="#2f6f4f">在本轮继续再跑一遍，快速消化积压</text>

  <rect x="620" y="356" width="336" height="80" rx="10" fill="#fbeaea" stroke="#e7c3c3"/>
  <text x="636" y="378" font-size="10.5" font-weight="600" fill="#4a1414">任一不满足 → wakeup_softirqd</text>
  <text x="636" y="398" font-size="9" fill="#7a2a2a">剩余工作甩给 ksoftirqd 排队（softirq.c:645）</text>
  <text x="636" y="416" font-size="9" fill="#7a2a2a">让出 CPU：防高速硬件饿死普通进程</text>

  <!-- 连线 -->
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="424" y1="154" x2="424" y2="204" marker-end="url(#ar)"/>
    <line x1="429" y1="258" x2="429" y2="278" marker-end="url(#ar)"/>
    <line x1="783" y1="258" x2="783" y2="204" marker-end="url(#ar)"/>
    <line x1="429" y1="350" x2="429" y2="368" marker-end="url(#ar)"/>
    <path d="M594,394 L607,394 L607,310 L620,310" marker-end="url(#ar)"/>
    <path d="M594,414 L620,396" marker-end="url(#ar)"/>
    <path d="M788,342 L788,352" marker-end="url(#ar)"/>
  </g>
  <text x="600" y="303" font-size="8.5" fill="#a1a1a6">是</text>
  <text x="600" y="426" font-size="8.5" fill="#a1a1a6">否</text>
</svg>
