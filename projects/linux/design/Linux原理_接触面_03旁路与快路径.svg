<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="440" viewBox="0 0 1000 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">三种接触面代价对比：系统调用陷入 · /proc·/sys 文件旁路 · vDSO 免陷入</text>

  <!-- 特权边界示意（横向虚线，靠上表示"是否越界") -->
  <line x1="28" y1="250" x2="972" y2="250" stroke="#c1962a" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="36" y="244" font-size="9" fill="#a05411">特权边界（越过 = 陷入内核，有切换开销）</text>

  <!-- 列1：系统调用 -->
  <rect x="40" y="66" width="290" height="150" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="185" y="90" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">① 系统调用（动作主入口）</text>
  <text x="56" y="116" font-size="10" fill="#5b7db1">· syscall 指令陷入 → entry → 分派</text>
  <text x="56" y="136" font-size="10" fill="#5b7db1">· 有特权切换、保存/恢复现场开销</text>
  <text x="56" y="156" font-size="10" fill="#5b7db1">· 适合有副作用的动作</text>
  <text x="56" y="176" font-size="10" fill="#5b7db1">  （open/read/write/fork…）</text>
  <text x="56" y="200" font-size="9" fill="#6e6e73">entry_64.S:87 / syscall_64.c:87</text>

  <!-- 列2：proc/sys -->
  <rect x="355" y="66" width="290" height="150" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="500" y="90" font-size="12" font-weight="600" fill="#5a3410" text-anchor="middle">② /proc · /sys 文件旁路</text>
  <text x="371" y="116" font-size="10" fill="#93762e">· 内核状态映射成文件</text>
  <text x="371" y="136" font-size="10" fill="#93762e">· 复用 open/read/write（仍陷入）</text>
  <text x="371" y="156" font-size="10" fill="#93762e">· 免为每项新增系统调用</text>
  <text x="371" y="176" font-size="10" fill="#93762e">· cat/echo 即可交互、可脚本化</text>
  <text x="371" y="200" font-size="9" fill="#93762e">fs/proc/root.c:357 · fs/sysfs/file.c:107</text>

  <!-- 列3：vDSO -->
  <rect x="670" y="66" width="290" height="150" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="815" y="90" font-size="12" font-weight="600" fill="#12402a" text-anchor="middle">③ vDSO 免陷入快路径</text>
  <text x="686" y="116" font-size="10" fill="#2f6f4f">· 共享只读页映射进每个进程</text>
  <text x="686" y="136" font-size="10" fill="#2f6f4f">· 用户态直接读内核数据页算结果</text>
  <text x="686" y="156" font-size="10" fill="#2f6f4f">· 无 syscall 指令、零特权切换</text>
  <text x="686" y="176" font-size="10" fill="#2f6f4f">· 仅限高频只读（gettimeofday）</text>
  <text x="686" y="200" font-size="9" fill="#2f6f4f">vdso/common/vclock_gettime.c:18</text>

  <!-- 下半部：是否陷入落点 -->
  <rect x="40" y="284" width="290" height="120" rx="12" fill="#fbeaea" stroke="#e7c3c3"/>
  <text x="185" y="308" font-size="11" font-weight="600" fill="#4a1414" text-anchor="middle">陷入内核（付切换代价）</text>
  <text x="185" y="332" font-size="10" fill="#7a2a2a" text-anchor="middle">走 do_syscall_64 全套分派</text>
  <text x="185" y="352" font-size="10" fill="#7a2a2a" text-anchor="middle">+ 进入/退出钩子</text>
  <text x="185" y="376" font-size="9.5" fill="#7a2a2a" text-anchor="middle">代价最高、能力最全</text>

  <rect x="355" y="284" width="290" height="120" rx="12" fill="#fbeaea" stroke="#e7c3c3"/>
  <text x="500" y="308" font-size="11" font-weight="600" fill="#4a1414" text-anchor="middle">陷入内核（借 VFS 通道）</text>
  <text x="500" y="332" font-size="10" fill="#7a2a2a" text-anchor="middle">读写触发 show/store 回调</text>
  <text x="500" y="352" font-size="10" fill="#7a2a2a" text-anchor="middle">代价 ≈ 一次文件读写</text>
  <text x="500" y="376" font-size="9.5" fill="#7a2a2a" text-anchor="middle">胜在通用、可组合</text>

  <rect x="670" y="284" width="290" height="120" rx="12" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="815" y="308" font-size="11" font-weight="600" fill="#12402a" text-anchor="middle">不陷入内核（留在用户态）</text>
  <text x="815" y="332" font-size="10" fill="#2f6f4f" text-anchor="middle">直接读映射的时间数据页</text>
  <text x="815" y="352" font-size="10" fill="#2f6f4f" text-anchor="middle">代价最低（几条指令）</text>
  <text x="815" y="376" font-size="9.5" fill="#2f6f4f" text-anchor="middle">时钟源不支持时回退系统调用</text>

  <g stroke="#c7c7cc" stroke-width="1.6" fill="none">
    <line x1="185" y1="216" x2="185" y2="284" marker-end="url(#ar)"/>
    <line x1="500" y1="216" x2="500" y2="284" marker-end="url(#ar)"/>
  </g>
  <!-- vDSO 不越界：用一条停在边界上方的线示意 -->
  <line x1="815" y1="216" x2="815" y2="246" stroke="#5aa06a" stroke-width="1.6" fill="none"/>
  <text x="815" y="270" font-size="9" fill="#2f6f4f" text-anchor="middle">✗ 不越过边界</text>
</svg>
