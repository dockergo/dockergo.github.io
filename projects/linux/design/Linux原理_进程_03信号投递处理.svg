<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="480" viewBox="0 0 1000 480" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="480" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">信号：① 发送时入队 + 唤醒（不当场执行） → ② 返回用户态时才由 get_signal 取出处理</text>

  <!-- 阶段一：发送 -->
  <rect x="28" y="62" width="470" height="288" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="263" y="84" font-size="11.5" font-weight="600" fill="#2c5a3a" text-anchor="middle">① 发送：__send_signal_locked (signal.c:1040) —— 只入队 + 唤醒</text>

  <rect x="52" y="102" width="180" height="60" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="142" y="126" font-size="11" font-weight="600" fill="#3d2a5a" text-anchor="middle">发送方</text>
  <text x="142" y="146" font-size="9.5" fill="#7a5aa6" text-anchor="middle">kill / sigqueue / 内核</text>

  <!-- 分岔：可靠 vs 不可靠 -->
  <rect x="52" y="188" width="418" height="70" rx="11" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="261" y="210" font-size="10.5" font-weight="600" fill="#12402a" text-anchor="middle">实时信号 sig ≥ SIGRTMIN：真正排队</text>
  <text x="261" y="230" font-size="9.5" fill="#2f6f4f" text-anchor="middle">逐个入 sigqueue、按序投递、可带数据</text>
  <text x="261" y="248" font-size="9" fill="#2f6f4f" text-anchor="middle">（legacy_queue 返回 false，signal.c:1035）</text>

  <rect x="52" y="272" width="418" height="66" rx="11" fill="#fbeaea" stroke="#e7c3c3"/>
  <text x="261" y="294" font-size="10.5" font-weight="600" fill="#4a1414" text-anchor="middle">传统信号 sig &lt; SIGRTMIN：合并</text>
  <text x="261" y="314" font-size="9.5" fill="#7a2a2a" text-anchor="middle">同种已挂起则重复发送被丢弃（只留一个）</text>
  <text x="261" y="331" font-size="9" fill="#7a2a2a" text-anchor="middle">legacy_queue 命中即 return（signal.c:1061）</text>

  <path d="M142,162 L142,188" stroke="#c7c7cc" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>

  <!-- 挂起队列（中间桥） -->
  <rect x="530" y="150" width="200" height="120" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="630" y="174" font-size="11.5" font-weight="600" fill="#5a3410" text-anchor="middle">挂起队列</text>
  <text x="546" y="200" font-size="10" fill="#93762e">· t-&gt;pending（私有）</text>
  <text x="546" y="222" font-size="10" fill="#93762e">· shared_pending（线程组）</text>
  <text x="546" y="248" font-size="9.5" fill="#93762e">complete_signal 挑线程</text>
  <text x="546" y="264" font-size="9.5" fill="#93762e">signal_wake_up 置 TIF 标志</text>

  <path d="M470,222 L530,210" stroke="#c7c7cc" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>

  <!-- 阶段二：处理 -->
  <rect x="530" y="298" width="442" height="160" rx="13" fill="#fbfbfd" stroke="#ececf1"/>
  <text x="751" y="320" font-size="11.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">② 处理：目标任务返回用户态那一刻</text>

  <rect x="548" y="336" width="196" height="52" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="646" y="358" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">exit_to_user_mode_loop</text><text x="646" y="374" font-size="8.5" fill="#5b7db1" text-anchor="middle">见 _TIF_SIGPENDING (entry/common.c:63)</text>

  <rect x="548" y="400" width="196" height="46" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="646" y="421" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">get_signal (signal.c:2802)</text><text x="646" y="437" font-size="8.5" fill="#5b7db1" text-anchor="middle">取出一个待处理信号</text>

  <rect x="768" y="336" width="188" height="52" rx="10" fill="#f4eefb" stroke="#d9c7ec"/><text x="862" y="358" font-size="10" font-weight="600" fill="#3d2a5a" text-anchor="middle">handle_signal</text><text x="862" y="374" font-size="8.5" fill="#7a5aa6" text-anchor="middle">用户栈搭信号帧 (x86/signal.c:255)</text>

  <rect x="768" y="400" width="188" height="46" rx="10" fill="#fbeaea" stroke="#e7c3c3"/><text x="862" y="421" font-size="10" font-weight="600" fill="#4a1414" text-anchor="middle">默认动作 / 忽略</text><text x="862" y="437" font-size="8.5" fill="#7a2a2a" text-anchor="middle">SIGKILL·SIGSTOP 不可捕获</text>

  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <path d="M646,388 L646,400" marker-end="url(#ar)"/>
    <path d="M744,423 L768,423 L768,414" marker-end="url(#ar)"/>
    <path d="M744,362 L768,362" marker-end="url(#ar)"/>
    <path d="M630,270 L630,336" marker-end="url(#ar)"/>
  </g>
  <text x="640" y="292" font-size="9" fill="#a1a1a6" text-anchor="middle">被唤醒 → 择机返回用户态</text>
</svg>
