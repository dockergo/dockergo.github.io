<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="496" viewBox="0 0 1000 496" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="496" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">exec 替换执行映像：不建新任务——选 binfmt → 越过不可回头点 → 收编线程组、整体换地址空间</text>

  <!-- 顶部流水线 -->
  <rect x="28" y="62" width="232" height="96" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="144" y="86" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">do_execveat_common</text>
  <text x="44" y="106" font-size="9.5" fill="#5b7db1">fs/exec.c:1778</text>
  <text x="44" y="128" font-size="10" fill="#5b7db1">建 linux_binprm（bprm）：</text>
  <text x="44" y="146" font-size="10" fill="#5b7db1">装程序文件 / argv / envp</text>

  <rect x="284" y="62" width="200" height="96" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="384" y="86" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">bprm_execve</text>
  <text x="300" y="106" font-size="9.5" fill="#5b7db1">exec.c:1724</text>
  <text x="300" y="128" font-size="10" fill="#5b7db1">→ exec_binprm</text>
  <text x="300" y="146" font-size="10" fill="#5b7db1">发起加载</text>

  <rect x="508" y="62" width="210" height="96" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="613" y="86" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">search_binary_handler</text>
  <text x="524" y="106" font-size="9.5" fill="#5b7db1">exec.c:1645</text>
  <text x="524" y="128" font-size="10" fill="#5b7db1">按格式选 binfmt</text>
  <text x="524" y="146" font-size="10" fill="#5b7db1">（ELF / 脚本 …）</text>

  <rect x="742" y="62" width="230" height="96" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="857" y="86" font-size="11" font-weight="600" fill="#5a3410" text-anchor="middle">begin_new_exec</text>
  <text x="758" y="106" font-size="9.5" fill="#93762e">exec.c:1091</text>
  <text x="758" y="128" font-size="10" font-weight="600" fill="#a05411">【不可回头点】</text>
  <text x="758" y="146" font-size="10" fill="#93762e">point_of_no_return</text>

  <g stroke="#c7c7cc" stroke-width="1.6" fill="none">
    <line x1="260" y1="110" x2="284" y2="110" marker-end="url(#ar)"/>
    <line x1="484" y1="110" x2="508" y2="110" marker-end="url(#ar)"/>
    <line x1="718" y1="110" x2="742" y2="110" marker-end="url(#ar)"/>
  </g>

  <!-- begin_new_exec 内部两步 -->
  <rect x="508" y="178" width="464" height="92" rx="12" fill="#fbfbfd" stroke="#e8cf9a" stroke-dasharray="5 3"/>
  <text x="740" y="198" font-size="10.5" font-weight="600" fill="#5a3410" text-anchor="middle">begin_new_exec 内部（越过不可回头点后依次）</text>
  <rect x="524" y="210" width="210" height="48" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="629" y="230" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">de_thread（exec.c:1115）</text>
  <text x="629" y="248" font-size="9" fill="#5b7db1" text-anchor="middle">收编线程组，只留调用线程</text>
  <rect x="748" y="210" width="210" height="48" rx="10" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="853" y="230" font-size="10.5" font-weight="600" fill="#12402a" text-anchor="middle">exec_mmap（exec.c:1148）</text>
  <text x="853" y="248" font-size="9" fill="#2f6f4f" text-anchor="middle">卸旧 mm，挂上全新 mm</text>
  <g stroke="#c7c7cc" stroke-width="1.6" fill="none">
    <line x1="857" y1="158" x2="857" y2="178" marker-end="url(#ar)"/>
    <line x1="734" y1="234" x2="748" y2="234" marker-end="url(#ar)"/>
  </g>

  <!-- 映像替换 before/after -->
  <rect x="28" y="286" width="944" height="196" rx="13" fill="#fbfbfd" stroke="#ececf1"/>
  <text x="46" y="310" font-size="11.5" font-weight="600" fill="#1d1d1f">映像替换：外壳（task_struct）留下，内核（地址空间）整体换掉</text>

  <text x="238" y="340" font-size="10.5" font-weight="600" fill="#6e6e73" text-anchor="middle">替换前</text>
  <rect x="60" y="326" width="356" height="124" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <rect x="76" y="352" width="324" height="32" rx="8" fill="#f2f2f4" stroke="#d9d9de"/>
  <text x="238" y="373" font-size="10.5" fill="#3a3a3c" text-anchor="middle">task_struct · pid=1234 · tgid=1234</text>
  <rect x="76" y="394" width="324" height="44" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="238" y="414" font-size="10" fill="#12402a" text-anchor="middle">旧 mm → 旧程序</text>
  <text x="238" y="430" font-size="9" fill="#2f6f4f" text-anchor="middle">代码/数据/堆/栈（即将卸下）</text>

  <text x="784" y="340" font-size="10.5" font-weight="600" fill="#6e6e73" text-anchor="middle">替换后</text>
  <rect x="556" y="326" width="356" height="124" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <rect x="572" y="352" width="324" height="32" rx="8" fill="#f2f2f4" stroke="#d9d9de"/>
  <text x="734" y="373" font-size="10.5" fill="#3a3a3c" text-anchor="middle">task_struct · pid=1234（不变，壳仍在）</text>
  <rect x="572" y="394" width="324" height="44" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="734" y="414" font-size="10" fill="#12402a" text-anchor="middle">新 mm → 新程序</text>
  <text x="734" y="430" font-size="9" fill="#2f6f4f" text-anchor="middle">ELF text/data/bss + 全新堆栈</text>

  <line x1="416" y1="388" x2="556" y2="388" stroke="#c7c7cc" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="486" y="380" font-size="9.5" fill="#8a8a8e" text-anchor="middle">exec_mmap 换 mm</text>
  <text x="486" y="404" font-size="8.5" fill="#a1a1a6" text-anchor="middle">旧 mm 计数减→可回收</text>

  <text x="46" y="470" font-size="10.5" fill="#3a3a3c">要点：exec 不创建新任务——pid/tgid 不变，de_thread 收编线程组，exec_mmap 整体换掉地址空间。</text>
</svg>
