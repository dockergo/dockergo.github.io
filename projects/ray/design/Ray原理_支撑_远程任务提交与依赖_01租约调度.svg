<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="470" viewBox="0 0 1000 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif"><defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker><marker id="arb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker></defs><rect width="1000" height="470" fill="#fbfbfd"/><text x="30" y="40" font-size="15" font-weight="600" fill="#1d1d1f">提交流水线 · spec → lease → 直投（去中心化）</text><text x="30" y="59" font-size="11.5" fill="#86868b">CoreWorker 向 Raylet 租 worker，拿到后直投 task，不经中央调度器</text><rect x="40" y="100" width="210" height="58" rx="12" fill="#eaf6ee" stroke="#bfe0c8" filter="url(#soft)"/><text x="53" y="121" font-size="12.5" font-weight="600" fill="#14432a">① 按 scheduling key 入队</text><text x="53" y="153" font-size="10.5" fill="#4f8b63">同 key 复用同类 worker 租约</text><rect x="290" y="100" width="210" height="58" rx="12" fill="#eaf6ee" stroke="#bfe0c8" filter="url(#soft)"/><text x="303" y="121" font-size="12.5" font-weight="600" fill="#14432a">② 申请租约</text><text x="303" y="138" font-size="10.5" fill="#4f8b63">RequestNewWorkerIfNeeded</text><text x="303" y="153" font-size="10.5" fill="#4f8b63">发 RequestWorkerLease</text><rect x="540" y="100" width="210" height="58" rx="12" fill="#f4ecfa" stroke="#dcc6ec" filter="url(#soft)"/><text x="553" y="121" font-size="12.5" font-weight="600" fill="#3d2357">③ Raylet 授租</text><text x="553" y="138" font-size="10.5" fill="#8158a6">HandleRequestWorkerLease</text><rect x="800" y="100" width="170" height="58" rx="12" fill="#fbf2e0" stroke="#ecd6a8" filter="url(#soft)"/><text x="813" y="121" font-size="12.5" font-weight="600" fill="#5a3d13">④ 直投</text><text x="813" y="138" font-size="10.5" fill="#a9822f">PushNormalTask</text><text x="813" y="153" font-size="10.5" fill="#a9822f">RPC 推给被租 worker</text><line x1="250" y1="129.0" x2="290" y2="129.0" stroke="#5b7db1" stroke-width="1.6" marker-end="url(#arb)"/><line x1="500" y1="129.0" x2="540" y2="129.0" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/><line x1="750" y1="129.0" x2="800" y2="129.0" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/><rect x="290" y="230" width="210" height="54" rx="12" fill="#fcecec" stroke="#f0c9c9" filter="url(#soft)"/><text x="303" y="251" font-size="12.5" font-weight="600" fill="#5a1d1d">spillback</text><text x="303" y="268" font-size="10.5" fill="#b06a6a">本地放不下改投别节点</text><text x="303" y="283" font-size="10.5" fill="#b06a6a">raylet_address != nullptr</text><line x1="645.0" y1="158" x2="500" y2="257.0" stroke="#b06a6a" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><rect x="540" y="230" width="210" height="54" rx="12" fill="#f2f2f4" stroke="#dadade" filter="url(#soft)"/><text x="553" y="251" font-size="12.5" font-weight="600" fill="#3a3a3c">⑤ 归还 / 续租</text><text x="553" y="268" font-size="10.5" fill="#86868b">同 key 有排队则复用</text><text x="553" y="283" font-size="10.5" fill="#86868b">否则 HandleReturnWorkerLease</text><line x1="885.0" y1="158" x2="750" y2="257.0" stroke="#b8b8bf" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><rect x="40" y="314" width="930" height="27" rx="9" fill="#fbf2e0" stroke="#ecd6a8"/><text x="51" y="333" font-size="10.5" fill="#5a3d13" font-weight="600">scheduling key = 资源需求 + 调度策略 + 依赖。相同 key 的 task 复用 worker 租约，减少反复起 worker。</text></svg>