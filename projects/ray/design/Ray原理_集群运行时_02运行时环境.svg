<svg xmlns="http://www.w3.org/2000/svg" width="980" height="410" viewBox="0 0 980 410" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif"><defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker><marker id="arb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker></defs><rect width="980" height="410" fill="#fbfbfd"/><text x="30" y="40" font-size="15" font-weight="600" fill="#1d1d1f">Runtime Environment · 依赖隔离</text><text x="30" y="59" font-size="11.5" fill="#86868b">让不同 job/actor/task 带各自 pip/conda/env/working_dir，不污染基础镜像</text><rect x="40" y="110" width="220" height="58" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="53" y="131" font-size="12.5" font-weight="600" fill="#1b2a4a">声明 runtime_env</text><text x="53" y="148" font-size="10.5" fill="#5b7db1">ray.init(runtime_env=...)</text><text x="53" y="163" font-size="10.5" fill="#5b7db1">@ray.remote(runtime_env=...)</text><rect x="320" y="110" width="240" height="58" rx="12" fill="#eaf6ee" stroke="#bfe0c8" filter="url(#soft)"/><text x="333" y="131" font-size="12.5" font-weight="600" fill="#14432a">runtime env agent</text><text x="333" y="148" font-size="10.5" fill="#4f8b63">每节点一个</text><text x="333" y="163" font-size="10.5" fill="#4f8b63">raylet/runtime_env_agent_client</text><rect x="620" y="110" width="320" height="58" rx="12" fill="#fbf2e0" stroke="#ecd6a8" filter="url(#soft)"/><text x="633" y="131" font-size="12.5" font-weight="600" fill="#5a3d13">准备隔离环境</text><text x="633" y="148" font-size="10.5" fill="#a9822f">下载 / 安装 / 解压到隔离目录</text><text x="633" y="163" font-size="10.5" fill="#a9822f">worker 起在该环境里</text><line x1="260" y1="139.0" x2="320" y2="139.0" stroke="#5b7db1" stroke-width="1.6" marker-end="url(#arb)"/><line x1="560" y1="139.0" x2="620" y2="139.0" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/><rect x="320" y="230" width="240" height="54" rx="12" fill="#f2f2f4" stroke="#dadade" filter="url(#soft)"/><text x="333" y="251" font-size="12.5" font-weight="600" fill="#3a3a3c">缓存复用</text><text x="333" y="268" font-size="10.5" fill="#86868b">相同 env 结果缓存</text><text x="333" y="283" font-size="10.5" fill="#86868b">无引用时清理</text><rect x="620" y="230" width="320" height="54" rx="12" fill="#f4ecfa" stroke="#dcc6ec" filter="url(#soft)"/><text x="633" y="251" font-size="12.5" font-weight="600" fill="#3d2357">继承与层叠</text><text x="633" y="268" font-size="10.5" fill="#8158a6">job 级 env 作默认</text><text x="633" y="283" font-size="10.5" fill="#8158a6">task/actor 级可覆盖</text><line x1="780.0" y1="168" x2="560" y2="257.0" stroke="#b8b8bf" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><rect x="40" y="312" width="900" height="27" rx="9" fill="#fbf2e0" stroke="#ecd6a8"/><text x="51" y="331" font-size="10.5" fill="#5a3d13" font-weight="600">代价意识：env 变更触发 worker 重建 + 依赖安装（非零成本）。把稳定依赖固化进镜像，只把差异放 runtime env。</text></svg>