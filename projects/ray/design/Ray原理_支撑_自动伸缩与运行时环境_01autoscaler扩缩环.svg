<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="450" viewBox="0 0 1000 450" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif"><defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker><marker id="arb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker></defs><rect width="1000" height="450" fill="#fbfbfd"/><text x="30" y="40" font-size="15" font-weight="600" fill="#1d1d1f">autoscaler · 需求驱动的扩缩环</text><text x="30" y="59" font-size="11.5" fill="#86868b">管物理节点数（对比 PG 管逻辑资源）；响应 pending 需求而非利用率</text><rect x="40" y="110" width="220" height="58" rx="12" fill="#e8f5f5" stroke="#b9e0e0" filter="url(#soft)"/><text x="53" y="131" font-size="12.5" font-weight="600" fill="#134444">① 收集需求</text><text x="53" y="148" font-size="10.5" fill="#4b9494">GCS HandleGetClusterResourceState</text><rect x="300" y="110" width="240" height="58" rx="12" fill="#f4ecfa" stroke="#dcc6ec" filter="url(#soft)"/><text x="313" y="131" font-size="12.5" font-weight="600" fill="#3d2357">② 算要开多少</text><text x="313" y="148" font-size="10.5" fill="#8158a6">get_nodes_to_launch bin-pack</text><text x="313" y="163" font-size="10.5" fill="#8158a6">并发启动限流</text><rect x="580" y="110" width="180" height="58" rx="12" fill="#eaf6ee" stroke="#bfe0c8" filter="url(#soft)"/><text x="593" y="131" font-size="12.5" font-weight="600" fill="#14432a">③ 扩容</text><text x="593" y="148" font-size="10.5" fill="#4f8b63">launch_required_nodes</text><text x="593" y="163" font-size="10.5" fill="#4f8b63">node provider 拉起</text><line x1="260" y1="139.0" x2="300" y2="139.0" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/><line x1="540" y1="139.0" x2="580" y2="139.0" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/><rect x="580" y="232" width="180" height="58" rx="12" fill="#fcecec" stroke="#f0c9c9" filter="url(#soft)"/><text x="593" y="253" font-size="12.5" font-weight="600" fill="#5a1d1d">④ 缩容</text><text x="593" y="270" font-size="10.5" fill="#b06a6a">idle 超时</text><text x="593" y="285" font-size="10.5" fill="#b06a6a">杀失活</text><rect x="300" y="232" width="240" height="58" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="313" y="253" font-size="12.5" font-weight="600" fill="#1b2a4a">⑤ 回写 GCS</text><text x="313" y="270" font-size="10.5" fill="#5b7db1">HandleReportAutoscalingState</text><text x="313" y="285" font-size="10.5" fill="#5b7db1">形成闭环</text><line x1="670.0" y1="168" x2="670.0" y2="232" stroke="#b8b8bf" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><line x1="580" y1="261.0" x2="540" y2="261.0" stroke="#b06a6a" stroke-width="1.6" marker-end="url(#ar)"/><line x1="300" y1="261.0" x2="150.0" y2="168" stroke="#b8b8bf" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><rect x="208.5" y="203.5" width="33.0" height="18" rx="6" fill="#ffffff" stroke="#ececef"/><text x="225.0" y="217.0" font-size="10.5" fill="#86868b" text-anchor="middle">下一轮</text><rect x="40" y="320" width="930" height="27" rx="9" fill="#fbf2e0" stroke="#ecd6a8"/><text x="51" y="339" font-size="10.5" fill="#5a3d13" font-weight="600">StandardAutoscaler 周期 update → _update；响应的是「调度不下、pending 的需求」，不是简单 CPU 利用率阈值。</text></svg>