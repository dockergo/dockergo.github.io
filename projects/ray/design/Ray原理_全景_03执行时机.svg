<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif"><defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker><marker id="arb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker></defs><rect width="960" height="500" fill="#fbfbfd"/><text x="30" y="40" font-size="15" font-weight="600" fill="#1d1d1f">ObjectRef 是分布式 future · 贯穿一切主线</text><text x="30" y="59" font-size="11.5" fill="#86868b">谁创建 ObjectRef 谁是 owner；值按大小分流两级存储</text><rect x="50" y="92" width="220" height="56" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="63" y="113" font-size="12.5" font-weight="600" fill="#1b2a4a">.remote 调用</text><text x="63" y="130" font-size="10.5" fill="#5b7db1">立即返回 ObjectRef</text><text x="63" y="145" font-size="10.5" fill="#5b7db1">task 异步执行，不阻塞</text><rect x="350" y="92" width="250" height="56" rx="12" fill="#f4ecfa" stroke="#dcc6ec" filter="url(#soft)"/><text x="363" y="113" font-size="12.5" font-weight="600" fill="#3d2357">ObjectRef（分布式 future）</text><text x="363" y="130" font-size="10.5" fill="#8158a6">指针 + owner 地址，非数据本身</text><rect x="680" y="92" width="230" height="56" rx="12" fill="#fcecec" stroke="#f0c9c9" filter="url(#soft)"/><text x="693" y="113" font-size="12.5" font-weight="600" fill="#5a1d1d">owner 的 CoreWorker</text><text x="693" y="130" font-size="10.5" fill="#b06a6a">ReferenceCounter 记引用/位置/lineage</text><line x1="270" y1="120.0" x2="350" y2="120.0" stroke="#5b7db1" stroke-width="1.6" marker-end="url(#arb)"/><line x1="600" y1="120.0" x2="680" y2="120.0" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/><rect x="350" y="200" width="250" height="50" rx="12" fill="#fbf2e0" stroke="#ecd6a8" filter="url(#soft)"/><text x="363" y="221" font-size="12.5" font-weight="600" fill="#5a3d13">in-process memory store</text><text x="363" y="238" font-size="10.5" fill="#a9822f">小对象 &lt;100KiB</text><rect x="680" y="200" width="230" height="50" rx="12" fill="#fbf2e0" stroke="#ecd6a8" filter="url(#soft)"/><text x="693" y="221" font-size="12.5" font-weight="600" fill="#5a3d13">Plasma 共享内存</text><text x="693" y="238" font-size="10.5" fill="#a9822f">大对象 · 零拷贝</text><line x1="475.0" y1="148" x2="475.0" y2="200" stroke="#b8b8bf" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><rect x="458.5" y="163.0" width="33.0" height="18" rx="6" fill="#ffffff" stroke="#ececef"/><text x="475.0" y="176.5" font-size="10.5" fill="#86868b" text-anchor="middle">值存哪</text><line x1="600" y1="225.0" x2="680" y2="225.0" stroke="#b8b8bf" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><rect x="50" y="300" width="220" height="50" rx="12" fill="#eaf6ee" stroke="#bfe0c8" filter="url(#soft)"/><text x="63" y="321" font-size="12.5" font-weight="600" fill="#14432a">ray.get(ref)</text><text x="63" y="338" font-size="10.5" fill="#4f8b63">阻塞直到值就绪并取回</text><rect x="350" y="300" width="250" height="50" rx="12" fill="#eaf6ee" stroke="#bfe0c8" filter="url(#soft)"/><text x="363" y="321" font-size="12.5" font-weight="600" fill="#14432a">ObjectRef 作参数</text><text x="363" y="338" font-size="10.5" fill="#4f8b63">→ 隐式依赖 DAG（动态）</text><rect x="680" y="300" width="230" height="50" rx="12" fill="#fcecec" stroke="#f0c9c9" filter="url(#soft)"/><text x="693" y="321" font-size="12.5" font-weight="600" fill="#5a1d1d">值丢失 → lineage 重算</text><text x="693" y="338" font-size="10.5" fill="#b06a6a">ReconstructObject 重跑 task</text><line x1="160.0" y1="300" x2="160.0" y2="148" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/><line x1="475.0" y1="250" x2="270" y2="325.0" stroke="#b8b8bf" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><line x1="795.0" y1="148" x2="795.0" y2="300" stroke="#b06a6a" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><rect x="50" y="392" width="860" height="27" rx="9" fill="#fbf2e0" stroke="#ecd6a8"/><text x="61" y="411" font-size="10.5" fill="#5a3d13" font-weight="600">前台同步：ray.get / actor 方法结果 / ray.wait；后台异步：对象 spill、引用 GC、lineage 重建、autoscaler 扩缩、心跳上报。</text></svg>