<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="450" viewBox="0 0 1000 450" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif"><defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker><marker id="arb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker></defs><rect width="1000" height="450" fill="#fbfbfd"/><text x="30" y="40" font-size="15" font-weight="600" fill="#1d1d1f">GCS 控制面全景 · 一进程多 manager</text><text x="30" y="59" font-size="11.5" fill="#86868b">GcsServer::DoStart 按序初始化各 manager</text><rect x="60" y="96" width="290" height="58" rx="12" fill="#eaf6ee" stroke="#bfe0c8" filter="url(#soft)"/><text x="73" y="117" font-size="12" font-weight="600" fill="#14432a">GcsResourceManager</text><text x="73" y="134" font-size="10.5" fill="#4f8b63">资源汇总</text><rect x="370" y="96" width="290" height="58" rx="12" fill="#e8f5f5" stroke="#b9e0e0" filter="url(#soft)"/><text x="383" y="117" font-size="12" font-weight="600" fill="#134444">GcsNodeManager</text><text x="383" y="134" font-size="10.5" fill="#4b9494">节点注册表</text><rect x="680" y="96" width="290" height="58" rx="12" fill="#f4ecfa" stroke="#dcc6ec" filter="url(#soft)"/><text x="693" y="117" font-size="12" font-weight="600" fill="#3d2357">GcsActorManager</text><text x="693" y="134" font-size="10.5" fill="#8158a6">actor 注册表</text><rect x="60" y="180" width="290" height="58" rx="12" fill="#fbf2e0" stroke="#ecd6a8" filter="url(#soft)"/><text x="73" y="201" font-size="12" font-weight="600" fill="#5a3d13">GcsPlacementGroupManager</text><text x="73" y="218" font-size="10.5" fill="#a9822f">PG 编排</text><rect x="370" y="180" width="290" height="58" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="383" y="201" font-size="12" font-weight="600" fill="#1b2a4a">KV Manager</text><text x="383" y="218" font-size="10.5" fill="#5b7db1">元数据</text><rect x="680" y="180" width="290" height="58" rx="12" fill="#fcecec" stroke="#f0c9c9" filter="url(#soft)"/><text x="693" y="201" font-size="12" font-weight="600" fill="#5a1d1d">PubSub Handler</text><text x="693" y="218" font-size="10.5" fill="#b06a6a">状态广播</text><rect x="60" y="246" width="910" height="70" rx="16" fill="#f2f2f4" stroke="#dadade"/><text x="76" y="270" font-size="12" fill="#1d1d1f" font-weight="600">GcsTableStorage（gcs_table_storage.cc）· 持久化抽象</text><text x="76" y="292" font-size="10.5" fill="#86868b">后端可为内存（单机/测试）或 Redis（生产可恢复）</text><line x1="205.0" y1="154" x2="205.0" y2="246" stroke="#b8b8bf" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><line x1="515.0" y1="154" x2="515.0" y2="246" stroke="#b8b8bf" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><line x1="825.0" y1="154" x2="825.0" y2="246" stroke="#b8b8bf" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><rect x="60" y="336" width="910" height="27" rx="9" fill="#fbf2e0" stroke="#ecd6a8"/><text x="71" y="355" font-size="10.5" fill="#5a3d13" font-weight="600">GCS 只管控制面（节点/actor/PG/KV 等集群级状态）；对象值走 Plasma、普通 task 调度走 worker lease，都不经 GCS——这是可扩展性根基。</text></svg>