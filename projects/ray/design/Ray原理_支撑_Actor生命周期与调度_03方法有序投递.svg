<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="360" viewBox="0 0 1000 360" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="aG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="aB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#4a7fd0"/></marker>
    <marker id="aP" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8a5cae"/></marker>
  </defs>
  <rect width="1000" height="360" fill="#fbfbfd"/>

  <text x="30" y="34" font-size="15" font-weight="700" fill="#1d1d1f">Actor 方法有序投递 · 同一 actor 按提交序串行执行</text>
  <text x="30" y="54" font-size="10.5" fill="#6e6e73">方法按 sequence number 编号入队，依赖就绪后按序推给宿主 worker，串行是状态一致性的根基</text>

  <!-- legend -->
  <rect x="30" y="70" width="14" height="10" rx="2" fill="#f4ecfa" stroke="#dcc6ec"/><text x="49" y="79" font-size="10" fill="#3a3a3c">接口调用</text>
  <rect x="150" y="70" width="14" height="10" rx="2" fill="#eef3fb" stroke="#bcd0ec"/><text x="169" y="79" font-size="10" fill="#3a3a3c">编号 · 有序投递</text>
  <rect x="300" y="70" width="14" height="10" rx="2" fill="#eaf6ee" stroke="#bfe0c8"/><text x="319" y="79" font-size="10" fill="#3a3a3c">宿主 worker 执行</text>
  <text x="970" y="79" font-size="10" fill="#a1a1a6" text-anchor="end">core_worker / actor_task_submitter</text>
  <line x1="30" y1="90" x2="970" y2="90" stroke="#e4e7ec" stroke-width="1"/>

  <!-- 1 接口 -->
  <rect x="30" y="140" width="176" height="72" rx="12" fill="#f4ecfa" stroke="#dcc6ec" filter="url(#soft)"/>
  <text x="118" y="170" font-size="12" font-weight="700" fill="#3d2357" text-anchor="middle">actor 方法调用</text>
  <text x="118" y="190" font-size="9.5" fill="#8158a6" text-anchor="middle">handle.method.remote</text>

  <!-- 2 编号 -->
  <rect x="242" y="140" width="196" height="72" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="340" y="166" font-size="12" font-weight="700" fill="#1b2a4a" text-anchor="middle">ActorTaskSubmitter 编号</text>
  <text x="340" y="185" font-size="9.5" fill="#4a7fd0" text-anchor="middle">按 sequence number</text>
  <text x="340" y="200" font-size="9.5" fill="#4a7fd0" text-anchor="middle">同并发组内单调递增</text>

  <!-- 3 有序队列 -->
  <rect x="474" y="140" width="176" height="72" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="562" y="166" font-size="12" font-weight="700" fill="#1b2a4a" text-anchor="middle">actor_submit_queue</text>
  <text x="562" y="185" font-size="9.5" fill="#4a7fd0" text-anchor="middle">保持提交序</text>
  <text x="562" y="200" font-size="9.5" fill="#4a7fd0" text-anchor="middle">缺号则等待不越序</text>

  <!-- 4 按序推 -->
  <rect x="686" y="140" width="152" height="72" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="762" y="166" font-size="12" font-weight="700" fill="#1b2a4a" text-anchor="middle">SendPendingTasks</text>
  <text x="762" y="185" font-size="9.5" fill="#4a7fd0" text-anchor="middle">依赖就绪 → 按序推</text>
  <text x="762" y="200" font-size="9.5" fill="#4a7fd0" text-anchor="middle">ConnectActor 直连</text>

  <!-- 5 宿主执行 -->
  <rect x="874" y="140" width="96" height="72" rx="12" fill="#eaf6ee" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="922" y="170" font-size="12" font-weight="700" fill="#14432a" text-anchor="middle">宿主 worker</text>
  <text x="922" y="190" font-size="9.5" fill="#2f9e6e" text-anchor="middle">串行执行</text>

  <!-- arrows -->
  <line x1="206" y1="176" x2="242" y2="176" stroke="#8a5cae" stroke-width="1.8" marker-end="url(#aP)"/>
  <line x1="438" y1="176" x2="474" y2="176" stroke="#4a7fd0" stroke-width="1.8" marker-end="url(#aB)"/>
  <line x1="650" y1="176" x2="686" y2="176" stroke="#4a7fd0" stroke-width="1.8" marker-end="url(#aB)"/>
  <line x1="838" y1="176" x2="874" y2="176" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aG)"/>

  <!-- serial emphasis: self-loop on 宿主 -->
  <path d="M922,212 C 900,250 944,250 922,212" fill="none" stroke="#2f9e6e" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#aG)"/>
  <text x="922" y="262" font-size="9" fill="#2f6b4e" text-anchor="middle">一个执行完才发下一个</text>

  <!-- note -->
  <rect x="30" y="296" width="940" height="34" rx="9" fill="#f6f7f9" stroke="#e4e7ec"/>
  <text x="46" y="312" font-size="10" fill="#3a3a3c">方法虽同样编译成 TaskSpec，但投递路径独立于普通 task：不再每次去租新 worker，而是直投这个 actor 独占的宿主 worker。</text>
  <text x="46" y="326" font-size="10" fill="#6e6e73">async actor / 并发组 可放宽串行——同一并发组内仍按 sequence number 有序，跨组才并行。</text>
</svg>
