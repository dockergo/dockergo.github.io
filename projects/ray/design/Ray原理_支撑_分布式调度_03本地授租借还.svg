<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="440" viewBox="0 0 1000 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="aG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="aB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#4a7fd0"/></marker>
    <marker id="aA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c99a3a"/></marker>
    <marker id="aR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c65d5d"/></marker>
  </defs>
  <rect width="1000" height="440" fill="#fbfbfd"/>

  <text x="30" y="34" font-size="15" font-weight="700" fill="#1d1d1f">本地授租 · 资源借—用—还闭环</text>
  <text x="30" y="54" font-size="10.5" fill="#6e6e73">LocalLeaseManager 等依赖就绪→取 worker 并扣减可用资源→执行→完成后归还资源、worker 回池</text>

  <!-- legend -->
  <rect x="30" y="70" width="14" height="10" rx="2" fill="#eef3fb" stroke="#bcd0ec"/><text x="49" y="79" font-size="10" fill="#3a3a3c">授租 · 调度</text>
  <rect x="140" y="70" width="14" height="10" rx="2" fill="#eaf6ee" stroke="#bfe0c8"/><text x="159" y="79" font-size="10" fill="#3a3a3c">资源借还</text>
  <rect x="240" y="70" width="14" height="10" rx="2" fill="#fbf3e2" stroke="#ecd6a8"/><text x="259" y="79" font-size="10" fill="#3a3a3c">worker 池</text>
  <rect x="345" y="70" width="14" height="10" rx="2" fill="#fbeeee" stroke="#eecccc"/><text x="364" y="79" font-size="10" fill="#3a3a3c">无可行节点（失败）</text>
  <text x="970" y="79" font-size="10" fill="#a1a1a6" text-anchor="end">raylet · local_lease_manager</text>
  <line x1="30" y1="90" x2="970" y2="90" stroke="#e4e7ec" stroke-width="1"/>

  <!-- top row: 1 lease到本地 -> 2 等参数就绪 -> 3 取worker+占资源 -->
  <rect x="40" y="122" width="220" height="66" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="150" y="150" font-size="12" font-weight="700" fill="#1b2a4a" text-anchor="middle">① lease 到本地</text>
  <text x="150" y="170" font-size="9.5" fill="#4a7fd0" text-anchor="middle">cluster 选中本节点授租</text>

  <rect x="392" y="122" width="216" height="66" rx="12" fill="#eaf6ee" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="500" y="150" font-size="12" font-weight="700" fill="#14432a" text-anchor="middle">② 等参数依赖就绪</text>
  <text x="500" y="170" font-size="9.5" fill="#2f9e6e" text-anchor="middle">WaitForTaskArgs · Pull 到本地</text>

  <rect x="740" y="122" width="220" height="66" rx="12" fill="#fbf3e2" stroke="#ecd6a8" filter="url(#soft)"/>
  <text x="850" y="145" font-size="12" font-weight="700" fill="#8a6417" text-anchor="middle">③ 取 worker + 借资源</text>
  <text x="850" y="163" font-size="9.5" fill="#a9822f" text-anchor="middle">WorkerPool 取空闲 worker</text>
  <text x="850" y="178" font-size="9.5" fill="#a9822f" text-anchor="middle">从可用量扣减（占用）</text>

  <line x1="260" y1="155" x2="392" y2="155" stroke="#4a7fd0" stroke-width="1.8" marker-end="url(#aB)"/>
  <line x1="608" y1="155" x2="740" y2="155" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aG)"/>

  <!-- down: 4 授租直投执行 -->
  <rect x="740" y="240" width="220" height="66" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="850" y="268" font-size="12" font-weight="700" fill="#1b2a4a" text-anchor="middle">④ 授租 → 直投执行</text>
  <text x="850" y="288" font-size="9.5" fill="#4a7fd0" text-anchor="middle">CoreWorker 直推 task 到 worker</text>
  <line x1="850" y1="188" x2="850" y2="240" stroke="#4a7fd0" stroke-width="1.8" marker-end="url(#aB)"/>

  <!-- bottom row (return leg): 5 归还资源 <- 4 ; 6 worker回池 -->
  <rect x="392" y="240" width="216" height="66" rx="12" fill="#eaf6ee" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="500" y="263" font-size="12" font-weight="700" fill="#14432a" text-anchor="middle">⑤ 完成 → 还资源</text>
  <text x="500" y="281" font-size="9.5" fill="#2f9e6e" text-anchor="middle">执行完把占用量加回可用</text>
  <text x="500" y="296" font-size="9.5" fill="#2f9e6e" text-anchor="middle">值入对象存储</text>
  <line x1="740" y1="273" x2="608" y2="273" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aG)"/>

  <rect x="40" y="240" width="220" height="66" rx="12" fill="#fbf3e2" stroke="#ecd6a8" filter="url(#soft)"/>
  <text x="150" y="268" font-size="12" font-weight="700" fill="#8a6417" text-anchor="middle">⑥ worker 回池</text>
  <text x="150" y="288" font-size="9.5" fill="#a9822f" text-anchor="middle">空闲复用，服务下一 lease</text>
  <line x1="392" y1="273" x2="260" y2="273" stroke="#c99a3a" stroke-width="1.8" marker-end="url(#aA)"/>

  <!-- close loop: 6 -> 1 -->
  <line x1="150" y1="240" x2="150" y2="188" stroke="#c99a3a" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aA)"/>
  <text x="158" y="216" font-size="9" fill="#8a6417">下一 lease</text>

  <!-- failure branch: infeasible -->
  <rect x="330" y="352" width="340" height="44" rx="11" fill="#fbeeee" stroke="#eecccc" filter="url(#soft)"/>
  <text x="500" y="372" font-size="11" font-weight="700" fill="#a33e3e" text-anchor="middle">无可行节点 → infeasible</text>
  <text x="500" y="388" font-size="9" fill="#c65d5d" text-anchor="middle">挂起等资源变化 / autoscaler 扩容；或 spillback 改投别的 raylet</text>
  <line x1="150" y1="306" x2="330" y2="368" stroke="#c65d5d" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aR)"/>
</svg>
