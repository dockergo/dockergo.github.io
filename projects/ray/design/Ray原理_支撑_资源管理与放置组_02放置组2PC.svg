<svg xmlns="http://www.w3.org/2000/svg" width="980" height="440" viewBox="0 0 980 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif"><defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker><marker id="arb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker></defs><rect width="980" height="440" fill="#fbfbfd"/><text x="30" y="40" font-size="15" font-weight="600" fill="#1d1d1f">放置组 · bundle 的原子成组放置（两阶段提交）</text><text x="30" y="59" font-size="11.5" fill="#86868b">要么全 bundle 就位，要么整体回滚——避免部分占用死锁</text><rect x="40" y="104" width="220" height="58" rx="12" fill="#e8f5f5" stroke="#b9e0e0" filter="url(#soft)"/><text x="53" y="125" font-size="12.5" font-weight="600" fill="#134444">RegisterPlacementGroup</text><text x="53" y="157" font-size="10.5" fill="#4b9494">SchedulePendingPlacementGroups</text><rect x="300" y="104" width="220" height="58" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="313" y="125" font-size="12.5" font-weight="600" fill="#1b2a4a">bundle + 策略</text><text x="313" y="142" font-size="10.5" fill="#5b7db1">每 bundle=一份资源需求</text><text x="313" y="157" font-size="10.5" fill="#5b7db1">PACK/SPREAD/STRICT_*</text><rect x="560" y="104" width="260" height="58" rx="12" fill="#f4ecfa" stroke="#dcc6ec" filter="url(#soft)"/><text x="573" y="125" font-size="12.5" font-weight="600" fill="#3d2357">ScheduleUnplacedBundles</text><text x="573" y="157" font-size="10.5" fill="#8158a6">按策略为每 bundle 选节点</text><line x1="260" y1="133.0" x2="300" y2="133.0" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/><line x1="520" y1="133.0" x2="560" y2="133.0" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/><rect x="300" y="232" width="220" height="58" rx="12" fill="#fbf2e0" stroke="#ecd6a8" filter="url(#soft)"/><text x="313" y="253" font-size="12.5" font-weight="600" fill="#5a3d13">① Prepare</text><text x="313" y="270" font-size="10.5" fill="#a9822f">PrepareResources</text><text x="313" y="285" font-size="10.5" fill="#a9822f">各节点预留资源（可回滚）</text><rect x="560" y="232" width="260" height="58" rx="12" fill="#eaf6ee" stroke="#bfe0c8" filter="url(#soft)"/><text x="573" y="253" font-size="12.5" font-weight="600" fill="#14432a">② Commit</text><text x="573" y="270" font-size="10.5" fill="#4f8b63">CommitResources / CommitAllBundles</text><text x="573" y="285" font-size="10.5" fill="#4f8b63">全成后提交，资源归该 PG</text><line x1="690.0" y1="162" x2="410.0" y2="232" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/><line x1="520" y1="261.0" x2="560" y2="261.0" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/><rect x="527.0" y="250.0" width="26.0" height="18" rx="6" fill="#ffffff" stroke="#ececef"/><text x="540.0" y="263.5" font-size="10.5" fill="#86868b" text-anchor="middle">全成</text><rect x="300" y="320" width="220" height="42" rx="12" fill="#fcecec" stroke="#f0c9c9" filter="url(#soft)"/><text x="313" y="345.0" font-size="11" font-weight="600" fill="#5a1d1d">任一失败 → 回滚重排</text><line x1="410.0" y1="290" x2="410.0" y2="320" stroke="#b06a6a" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/></svg>