<svg xmlns="http://www.w3.org/2000/svg" width="980" height="440" viewBox="0 0 980 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif"><defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker><marker id="arb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker></defs><rect width="980" height="440" fill="#fbfbfd"/><text x="30" y="40" font-size="15" font-weight="600" fill="#1d1d1f">owner-based 引用计数 · 借用与归还</text><text x="30" y="59" font-size="11.5" fill="#86868b">引用状态只在 owner 一处收敛，去中心化、无需全局协议</text><rect x="40" y="104" width="240" height="58" rx="12" fill="#fcecec" stroke="#f0c9c9" filter="url(#soft)"/><text x="53" y="125" font-size="12.5" font-weight="600" fill="#5a1d1d">owner: AddOwnedObject</text><text x="53" y="157" font-size="10.5" fill="#b06a6a">记元数据 · 值位置 · 初始引用</text><rect x="330" y="104" width="240" height="58" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="343" y="125" font-size="12.5" font-weight="600" fill="#1b2a4a">本地引用增减</text><text x="343" y="142" font-size="10.5" fill="#5b7db1">AddLocalReference</text><text x="343" y="157" font-size="10.5" fill="#5b7db1">RemoveLocalReference</text><rect x="620" y="104" width="320" height="58" rx="12" fill="#f4ecfa" stroke="#dcc6ec" filter="url(#soft)"/><text x="633" y="125" font-size="12.5" font-weight="600" fill="#3d2357">借用（borrow）</text><text x="633" y="142" font-size="10.5" fill="#8158a6">ref 作参数/返回给他人</text><text x="633" y="157" font-size="10.5" fill="#8158a6">借用者用完把借用信息回传 owner</text><line x1="280" y1="133.0" x2="330" y2="133.0" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/><line x1="570" y1="133.0" x2="620" y2="133.0" stroke="#b8b8bf" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><rect x="620" y="224" width="320" height="54" rx="12" fill="#f4ecfa" stroke="#dcc6ec" filter="url(#soft)"/><text x="633" y="245" font-size="12.5" font-weight="600" fill="#3d2357">owner 合并引用状态</text><text x="633" y="262" font-size="10.5" fill="#8158a6">distributed ref counting</text><line x1="780.0" y1="162" x2="780.0" y2="224" stroke="#b8b8bf" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><rect x="767.0" y="182.0" width="26.0" height="18" rx="6" fill="#ffffff" stroke="#ececef"/><text x="780.0" y="195.5" font-size="10.5" fill="#86868b" text-anchor="middle">回传</text><rect x="330" y="224" width="240" height="54" rx="12" fill="#eaf6ee" stroke="#bfe0c8" filter="url(#soft)"/><text x="343" y="245" font-size="12.5" font-weight="600" fill="#14432a">归零 → 释放 Plasma</text><text x="343" y="262" font-size="10.5" fill="#4f8b63">FreePlasmaObjects</text><line x1="620" y1="251.0" x2="570" y2="251.0" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/><rect x="578.5" y="240.0" width="33.0" height="18" rx="6" fill="#ffffff" stroke="#ececef"/><text x="595.0" y="253.5" font-size="10.5" fill="#86868b" text-anchor="middle">全归零</text><rect x="40" y="312" width="900" height="27" rx="9" fill="#fbf2e0" stroke="#ecd6a8"/><text x="51" y="331" font-size="10.5" fill="#5a3d13" font-weight="600">对比集中式引用表：owner 本地单点决策，无需全局一致性协议——这是 Ray 扩到百万级细粒度 task 的关键取舍。GCS 不记录对象级引用。</text></svg>