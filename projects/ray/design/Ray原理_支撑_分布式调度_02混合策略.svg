<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif"><defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker><marker id="arb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker></defs><rect width="960" height="430" fill="#fbfbfd"/><text x="30" y="40" font-size="15" font-weight="600" fill="#1d1d1f">混合调度策略 · 打包与铺开的平衡</text><text x="30" y="59" font-size="11.5" fill="#86868b">hybrid policy 以关键资源利用率打分（hybrid_scheduling_policy.cc）</text><rect x="40" y="110" width="260" height="66" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="53" y="131" font-size="12.5" font-weight="600" fill="#1b2a4a">节点打分</text><text x="53" y="148" font-size="10.5" fill="#5b7db1">ComputeNodeScoreImpl</text><text x="53" y="163" font-size="10.5" fill="#5b7db1">基于 critical_resource_utilization</text><rect x="380" y="110" width="200" height="66" rx="12" fill="#fbf2e0" stroke="#ecd6a8" filter="url(#soft)"/><text x="393" y="131" font-size="12.5" font-weight="600" fill="#5a3d13">spread_threshold 拐点</text><line x1="300" y1="143.0" x2="380" y2="143.0" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/><rect x="380" y="220" width="200" height="58" rx="12" fill="#eaf6ee" stroke="#bfe0c8" filter="url(#soft)"/><text x="393" y="241" font-size="12.5" font-weight="600" fill="#14432a">低于阈值 → 打包</text><text x="393" y="258" font-size="10.5" fill="#4f8b63">填满一个再用下一个</text><text x="393" y="273" font-size="10.5" fill="#4f8b63">利于局部性 + autoscaler 缩容</text><rect x="640" y="220" width="280" height="58" rx="12" fill="#e8f5f5" stroke="#b9e0e0" filter="url(#soft)"/><text x="653" y="241" font-size="12.5" font-weight="600" fill="#134444">超过阈值 → 铺开</text><text x="653" y="258" font-size="10.5" fill="#4b9494">转向利用率更低的节点</text><text x="653" y="273" font-size="10.5" fill="#4b9494">避免过载热点</text><line x1="480.0" y1="176" x2="480.0" y2="220" stroke="#b8b8bf" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><line x1="580" y1="143.0" x2="780.0" y2="220" stroke="#b8b8bf" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><rect x="640" y="110" width="280" height="66" rx="12" fill="#f2f2f4" stroke="#dadade" filter="url(#soft)"/><text x="653" y="131" font-size="12.5" font-weight="600" fill="#3a3a3c">其它策略</text><text x="653" y="148" font-size="10.5" fill="#86868b">SPREAD · STRICT_PACK/SPREAD</text><text x="653" y="163" font-size="10.5" fill="#86868b">NodeAffinity · Schedule</text><rect x="40" y="318" width="880" height="27" rx="9" fill="#fbf2e0" stroke="#ecd6a8"/><text x="51" y="337" font-size="10.5" fill="#5a3d13" font-weight="600">hybrid 默认既省节点（利缩容降本）又防单点过载，无需用户手调；放置组用 STRICT_PACK/SPREAD 保证进程组拓扑。</text></svg>