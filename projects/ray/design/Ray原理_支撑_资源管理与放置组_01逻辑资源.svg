<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif"><defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker><marker id="arb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker></defs><rect width="960" height="420" fill="#fbfbfd"/><text x="30" y="40" font-size="15" font-weight="600" fill="#1d1d1f">逻辑资源 · 声明式配额</text><text x="30" y="59" font-size="11.5" fill="#86868b">资源是调度并发度的旋钮，不是 cgroup 级硬隔离</text><rect x="40" y="104" width="240" height="58" rx="12" fill="#e8f5f5" stroke="#b9e0e0" filter="url(#soft)"/><text x="53" y="125" font-size="12.5" font-weight="600" fill="#134444">节点上报资源总量</text><text x="53" y="142" font-size="10.5" fill="#4b9494">num_cpus/gpus/memory/自定义</text><rect x="330" y="104" width="240" height="58" rx="12" fill="#eaf6ee" stroke="#bfe0c8" filter="url(#soft)"/><text x="343" y="125" font-size="12.5" font-weight="600" fill="#14432a">GcsResourceManager 汇总</text><text x="343" y="142" font-size="10.5" fill="#4f8b63">全集群资源视图</text><line x1="280" y1="133.0" x2="330" y2="133.0" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/><rect x="40" y="224" width="240" height="58" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="53" y="245" font-size="12.5" font-weight="600" fill="#1b2a4a">task/actor 声明需求</text><text x="53" y="262" font-size="10.5" fill="#5b7db1">@ray.remote(num_cpus=...)</text><rect x="330" y="224" width="240" height="58" rx="12" fill="#f4ecfa" stroke="#dcc6ec" filter="url(#soft)"/><text x="343" y="245" font-size="12.5" font-weight="600" fill="#3d2357">调度器匹配 + 扣减</text><text x="343" y="262" font-size="10.5" fill="#8158a6">足够可用量的节点授租</text><text x="343" y="277" font-size="10.5" fill="#8158a6">执行完归还</text><line x1="280" y1="253.0" x2="330" y2="253.0" stroke="#5b7db1" stroke-width="1.6" marker-end="url(#arb)"/><line x1="450.0" y1="162" x2="450.0" y2="224" stroke="#b8b8bf" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><rect x="620" y="104" width="300" height="178" rx="12" fill="#f2f2f4" stroke="#dadade" filter="url(#soft)"/><text x="633" y="125" font-size="12.5" font-weight="600" fill="#3a3a3c">记账语义</text><text x="633" y="142" font-size="10.5" fill="#86868b">num_cpus 不绑核（仅并发度）</text><text x="633" y="157" font-size="10.5" fill="#86868b">num_gpus 设 CUDA_VISIBLE_DEVICES</text><text x="633" y="172" font-size="10.5" fill="#86868b">自定义资源做标签/亲和</text><text x="633" y="187" font-size="10.5" fill="#86868b">声明式：要多少给多少、按可用并发</text></svg>