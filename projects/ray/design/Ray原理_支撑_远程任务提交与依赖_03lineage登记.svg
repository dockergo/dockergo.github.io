<svg xmlns="http://www.w3.org/2000/svg" width="940" height="400" viewBox="0 0 940 400" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif"><defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker><marker id="arb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker></defs><rect width="940" height="400" fill="#fbfbfd"/><text x="30" y="40" font-size="15" font-weight="600" fill="#1d1d1f">lineage 与重试登记</text><text x="30" y="59" font-size="11.5" fill="#86868b">owner 本地登记 task spec 以备容错重放</text><rect x="40" y="110" width="220" height="58" rx="12" fill="#eaf6ee" stroke="#bfe0c8" filter="url(#soft)"/><text x="53" y="131" font-size="12.5" font-weight="600" fill="#14432a">AddPendingTask</text><text x="53" y="163" font-size="10.5" fill="#4f8b63">登记 spec + 返回 ref</text><rect x="320" y="110" width="200" height="58" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="333" y="131" font-size="12.5" font-weight="600" fill="#1b2a4a">task 执行</text><text x="333" y="148" font-size="10.5" fill="#5b7db1">worker 上运行</text><rect x="600" y="110" width="300" height="58" rx="12" fill="#eaf6ee" stroke="#bfe0c8" filter="url(#soft)"/><text x="613" y="131" font-size="12.5" font-weight="600" fill="#14432a">CompletePendingTask</text><text x="613" y="163" font-size="10.5" fill="#4f8b63">落值 · 按需清 lineage</text><line x1="260" y1="139.0" x2="320" y2="139.0" stroke="#5b7db1" stroke-width="1.6" marker-end="url(#arb)"/><line x1="520" y1="139.0" x2="600" y2="139.0" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/><rect x="547.0" y="128.0" width="26.0" height="18" rx="6" fill="#ffffff" stroke="#ececef"/><text x="560.0" y="141.5" font-size="10.5" fill="#86868b" text-anchor="middle">成功</text><rect x="320" y="236" width="200" height="58" rx="12" fill="#fcecec" stroke="#f0c9c9" filter="url(#soft)"/><text x="333" y="257" font-size="12.5" font-weight="600" fill="#5a1d1d">失败 / 对象丢失</text><text x="333" y="274" font-size="10.5" fill="#b06a6a">按 max_retries 判定</text><rect x="600" y="236" width="300" height="58" rx="12" fill="#fcecec" stroke="#f0c9c9" filter="url(#soft)"/><text x="613" y="257" font-size="12.5" font-weight="600" fill="#5a1d1d">ResubmitTask</text><text x="613" y="289" font-size="10.5" fill="#b06a6a">按登记 spec 重放（假设幂等）</text><line x1="420.0" y1="168" x2="420.0" y2="236" stroke="#b06a6a" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><line x1="520" y1="265.0" x2="600" y2="265.0" stroke="#b06a6a" stroke-width="1.6" marker-end="url(#ar)"/><line x1="750.0" y1="236" x2="750.0" y2="168" stroke="#b8b8bf" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><rect x="730.0" y="191.0" width="40.0" height="18" rx="6" fill="#ffffff" stroke="#ececef"/><text x="750.0" y="204.5" font-size="10.5" fill="#86868b" text-anchor="middle">重放成功</text></svg>