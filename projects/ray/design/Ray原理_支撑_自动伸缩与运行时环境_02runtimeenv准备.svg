<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif"><defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker><marker id="arb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker></defs><rect width="980" height="420" fill="#fbfbfd"/><text x="30" y="40" font-size="15" font-weight="600" fill="#1d1d1f">runtime env · worker 启动前的环境准备</text><text x="30" y="59" font-size="11.5" fill="#86868b">依赖随 job/actor/task 走，不污染基础镜像</text><rect x="40" y="104" width="200" height="58" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="53" y="125" font-size="12.5" font-weight="600" fill="#1b2a4a">声明 runtime_env</text><text x="53" y="142" font-size="10.5" fill="#5b7db1">pip/conda/env_vars</text><text x="53" y="157" font-size="10.5" fill="#5b7db1">working_dir/py_modules</text><rect x="270" y="104" width="220" height="58" rx="12" fill="#eaf6ee" stroke="#bfe0c8" filter="url(#soft)"/><text x="283" y="125" font-size="12.5" font-weight="600" fill="#14432a">Raylet 请求准备</text><text x="283" y="157" font-size="10.5" fill="#4f8b63">GetOrCreateRuntimeEnv</text><rect x="520" y="104" width="240" height="58" rx="12" fill="#e8f5f5" stroke="#b9e0e0" filter="url(#soft)"/><text x="533" y="125" font-size="12.5" font-weight="600" fill="#134444">runtime env agent</text><text x="533" y="142" font-size="10.5" fill="#4b9494">315</text><text x="533" y="157" font-size="10.5" fill="#4b9494">下载/安装/解压到隔离目录</text><rect x="790" y="104" width="160" height="58" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="803" y="125" font-size="12.5" font-weight="600" fill="#1b2a4a">worker 起在环境里</text><text x="803" y="142" font-size="10.5" fill="#5b7db1">带重试</text><line x1="240" y1="133.0" x2="270" y2="133.0" stroke="#5b7db1" stroke-width="1.6" marker-end="url(#arb)"/><line x1="490" y1="133.0" x2="520" y2="133.0" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/><line x1="760" y1="133.0" x2="790" y2="133.0" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/><rect x="520" y="232" width="240" height="58" rx="12" fill="#f2f2f4" stroke="#dadade" filter="url(#soft)"/><text x="533" y="253" font-size="12.5" font-weight="600" fill="#3a3a3c">缓存复用（URI 级）</text><text x="533" y="270" font-size="10.5" fill="#86868b">相同 env 结果缓存</text><text x="533" y="285" font-size="10.5" fill="#86868b">DeleteRuntimeEnvIfPossible</text><line x1="640.0" y1="162" x2="640.0" y2="232" stroke="#b8b8bf" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><rect x="40" y="314" width="910" height="27" rx="9" fill="#fbf2e0" stroke="#ecd6a8"/><text x="51" y="333" font-size="10.5" fill="#5a3d13" font-weight="600">代价意识：env 变更触发 worker 重建 + 依赖安装（非零成本）。稳定依赖固化进镜像、只把差异放 runtime env；相同 env+签名的 worker 可复用。</text></svg>