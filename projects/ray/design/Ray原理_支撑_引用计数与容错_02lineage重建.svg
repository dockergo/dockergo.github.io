<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="440" viewBox="0 0 1000 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif"><defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker><marker id="arb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker></defs><rect width="1000" height="440" fill="#fbfbfd"/><text x="30" y="40" font-size="15" font-weight="600" fill="#1d1d1f">lineage 重建 · 值丢了就重算</text><text x="30" y="59" font-size="11.5" fill="#86868b">对象不可变 → 重跑造它的 task，而非依赖多副本</text><rect x="40" y="104" width="200" height="58" rx="12" fill="#eaf6ee" stroke="#bfe0c8" filter="url(#soft)"/><text x="53" y="125" font-size="12.5" font-weight="600" fill="#14432a">AddPendingTask</text><text x="53" y="157" font-size="10.5" fill="#4f8b63">登记 spec + 返回 ref = lineage</text><rect x="280" y="104" width="180" height="58" rx="12" fill="#fcecec" stroke="#f0c9c9" filter="url(#soft)"/><text x="293" y="125" font-size="12.5" font-weight="600" fill="#5a1d1d">副本全丢</text><text x="293" y="142" font-size="10.5" fill="#b06a6a">消费方检测</text><rect x="500" y="104" width="220" height="58" rx="12" fill="#fcecec" stroke="#f0c9c9" filter="url(#soft)"/><text x="513" y="125" font-size="12.5" font-weight="600" fill="#5a1d1d">RecoverObject</text><rect x="760" y="104" width="210" height="58" rx="12" fill="#fbf2e0" stroke="#ecd6a8" filter="url(#soft)"/><text x="773" y="125" font-size="12.5" font-weight="600" fill="#5a3d13">PinOrReconstruct</text><text x="773" y="142" font-size="10.5" fill="#a9822f">先找副本 pin/restore</text><text x="773" y="157" font-size="10.5" fill="#a9822f">没有才重算</text><line x1="240" y1="133.0" x2="280" y2="133.0" stroke="#b8b8bf" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><line x1="460" y1="133.0" x2="500" y2="133.0" stroke="#b06a6a" stroke-width="1.6" marker-end="url(#ar)"/><line x1="720" y1="133.0" x2="760" y2="133.0" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/><rect x="500" y="232" width="220" height="58" rx="12" fill="#fcecec" stroke="#f0c9c9" filter="url(#soft)"/><text x="513" y="253" font-size="12.5" font-weight="600" fill="#5a1d1d">ReconstructObject</text><text x="513" y="270" font-size="10.5" fill="#b06a6a">ResubmitTask 重跑</text><line x1="865.0" y1="162" x2="720" y2="261.0" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/><rect x="776.0" y="200.5" width="33.0" height="18" rx="6" fill="#ffffff" stroke="#ececef"/><text x="792.5" y="214.0" font-size="10.5" fill="#86868b" text-anchor="middle">无副本</text><rect x="760" y="232" width="210" height="58" rx="12" fill="#f4ecfa" stroke="#dcc6ec" filter="url(#soft)"/><text x="773" y="253" font-size="12.5" font-weight="600" fill="#3d2357">递归上溯</text><text x="773" y="270" font-size="10.5" fill="#8158a6">参数也丢 → 沿 lineage 重算</text><line x1="720" y1="261.0" x2="760" y2="261.0" stroke="#b8b8bf" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><rect x="280" y="232" width="180" height="58" rx="12" fill="#eaf6ee" stroke="#bfe0c8" filter="url(#soft)"/><text x="293" y="253" font-size="12.5" font-weight="600" fill="#14432a">CompletePendingTask</text><text x="293" y="285" font-size="10.5" fill="#4f8b63">落值 · 清 lineage</text><line x1="500" y1="261.0" x2="460" y2="261.0" stroke="#b8b8bf" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><rect x="467.0" y="250.0" width="26.0" height="18" rx="6" fill="#ffffff" stroke="#ececef"/><text x="480.0" y="263.5" font-size="10.5" fill="#86868b" text-anchor="middle">成功</text><rect x="40" y="320" width="930" height="27" rx="9" fill="#fbf2e0" stroke="#ecd6a8"/><text x="51" y="339" font-size="10.5" fill="#5a3d13" font-weight="600">受 max_retries 限、假设 task 幂等；lineage 无限增长占 owner 内存，成功后适时截断。owner 挂了其 owned 对象引用/lineage 失效。</text></svg>