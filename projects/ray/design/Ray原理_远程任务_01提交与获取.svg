<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="470" viewBox="0 0 1000 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif"><defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker><marker id="arb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker></defs><rect width="1000" height="470" fill="#fbfbfd"/><text x="30" y="40" font-size="15" font-weight="600" fill="#1d1d1f">一次 f.remote(x) 的完整链路</text><text x="30" y="59" font-size="11.5" fill="#86868b">.remote 立即返回 ObjectRef，真正阻塞只在 ray.get</text><rect x="40" y="88" width="210" height="54" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="53" y="109" font-size="12.5" font-weight="600" fill="#1b2a4a">@ray.remote 装饰</text><text x="53" y="126" font-size="10.5" fill="#5b7db1">函数登记为可远程调用</text><rect x="290" y="88" width="220" height="54" rx="12" fill="#eaf6ee" stroke="#bfe0c8" filter="url(#soft)"/><text x="303" y="109" font-size="12.5" font-weight="600" fill="#14432a">SubmitTask 构 TaskSpec</text><text x="303" y="141" font-size="10.5" fill="#4f8b63">TaskSpecBuilder · num_returns</text><rect x="550" y="88" width="210" height="54" rx="12" fill="#fcecec" stroke="#f0c9c9" filter="url(#soft)"/><text x="563" y="109" font-size="12.5" font-weight="600" fill="#5a1d1d">AddPendingTask</text><text x="563" y="141" font-size="10.5" fill="#b06a6a">本地登记 lineage</text><rect x="800" y="88" width="170" height="54" rx="12" fill="#eaf6ee" stroke="#bfe0c8" filter="url(#soft)"/><text x="813" y="109" font-size="12.5" font-weight="600" fill="#14432a">异步提交</text><text x="813" y="126" font-size="10.5" fill="#4f8b63">normal_task_submitter</text><text x="813" y="141" font-size="10.5" fill="#4f8b63">cc</text><line x1="250" y1="115.0" x2="290" y2="115.0" stroke="#5b7db1" stroke-width="1.6" marker-end="url(#arb)"/><line x1="510" y1="115.0" x2="550" y2="115.0" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/><line x1="760" y1="115.0" x2="800" y2="115.0" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/><rect x="800" y="200" width="170" height="50" rx="12" fill="#f4ecfa" stroke="#dcc6ec" filter="url(#soft)"/><text x="813" y="221" font-size="12.5" font-weight="600" fill="#3d2357">立即返回 ObjectRef</text><text x="813" y="238" font-size="10.5" fill="#8158a6">cc · 不阻塞</text><line x1="885.0" y1="142" x2="885.0" y2="200" stroke="#5b7db1" stroke-width="1.6" marker-end="url(#arb)"/><rect x="540" y="290" width="230" height="54" rx="12" fill="#fbf2e0" stroke="#ecd6a8" filter="url(#soft)"/><text x="553" y="311" font-size="12.5" font-weight="600" fill="#5a3d13">worker 执行写值</text><text x="553" y="328" font-size="10.5" fill="#a9822f">返回值入对象存储</text><rect x="260" y="290" width="220" height="54" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="273" y="311" font-size="12.5" font-weight="600" fill="#1b2a4a">ray.get(ref)</text><text x="273" y="343" font-size="10.5" fill="#5b7db1">阻塞直到就绪并取回</text><line x1="885.0" y1="250" x2="770" y2="317.0" stroke="#b8b8bf" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><line x1="540" y1="317.0" x2="480" y2="317.0" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/><rect x="493.5" y="306.0" width="33.0" height="18" rx="6" fill="#ffffff" stroke="#ececef"/><text x="510.0" y="319.5" font-size="10.5" fill="#86868b" text-anchor="middle">值就绪</text><rect x="40" y="290" width="180" height="54" rx="12" fill="#fbf2e0" stroke="#ecd6a8" filter="url(#soft)"/><text x="53" y="311" font-size="12.5" font-weight="600" fill="#5a3d13">ray.put(obj)</text><text x="53" y="343" font-size="10.5" fill="#a9822f">直接放对象→ObjectRef</text><line x1="220" y1="317.0" x2="260" y2="317.0" stroke="#b8b8bf" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><rect x="40" y="378" width="930" height="27" rx="9" fill="#fbf2e0" stroke="#ecd6a8"/><text x="51" y="397" font-size="10.5" fill="#5a3d13" font-weight="600">依赖解析在 owner 侧（提交前内联本地小对象值）与 raylet 侧（等远程依赖 Pull 到本地）两处发生。</text></svg>