<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="420" viewBox="0 0 1020 420"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="420" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">SECRET 管理 · 外部数据源凭证集中管理（secret_manager.hpp）</text>

  <!-- 创建 -->
  <rect x="30" y="52" width="300" height="330" rx="14" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="48" y="76" font-size="12" font-weight="600" fill="#3c1361">CREATE SECRET</text>
  <rect x="48" y="90" width="264" height="70" rx="10" fill="#ffffff" stroke="#d9c9ef"/>
  <text x="180" y="112" font-size="9" fill="#3c1361" text-anchor="middle" font-family="monospace">CREATE SECRET s (</text>
  <text x="180" y="128" font-size="9" fill="#3c1361" text-anchor="middle" font-family="monospace">TYPE S3, KEY_ID …,</text>
  <text x="180" y="144" font-size="9" fill="#3c1361" text-anchor="middle" font-family="monospace">SECRET …, REGION …)</text>
  <rect x="48" y="176" width="264" height="48" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="180" y="197" font-size="9.5" fill="#1b2a4a" text-anchor="middle">按 TYPE 找 CreateSecretFunction</text>
  <text x="180" y="214" font-size="8.5" fill="#5b7db1" text-anchor="middle">RegisterSecretType（:115）</text>
  <rect x="48" y="240" width="264" height="48" rx="10" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="180" y="261" font-size="9.5" fill="#0f5132" text-anchor="middle">CreateSecret 生成 SecretEntry</text>
  <text x="180" y="278" font-size="8.5" fill="#3f8f66" text-anchor="middle">secret_manager.hpp:125</text>
  <rect x="48" y="304" width="264" height="62" rx="10" fill="#f6f6f8" stroke="#e2e2e7"/>
  <text x="180" y="326" font-size="9.5" fill="#494950" text-anchor="middle">存入 SecretStorage（下）</text>
  <text x="180" y="344" font-size="8.5" fill="#6a6a70" text-anchor="middle">存在 CatalogSet 里管理</text>
  <text x="180" y="358" font-size="8.5" fill="#6a6a70" text-anchor="middle">（CatalogSetSecretStorage）</text>

  <!-- 存储 -->
  <rect x="356" y="52" width="310" height="330" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="374" y="76" font-size="12" font-weight="600" fill="#1d1d1f">两种存储（secret_storage.hpp）</text>
  <rect x="374" y="92" width="274" height="120" rx="10" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="511" y="114" font-size="10.5" font-weight="600" fill="#0f5132" text-anchor="middle">TemporarySecretStorage（:135）</text>
  <text x="511" y="136" font-size="9.5" fill="#3f8f66" text-anchor="middle">仅存内存，进程退出即消失</text>
  <text x="511" y="156" font-size="9.5" fill="#3f8f66" text-anchor="middle">persistent = false</text>
  <text x="511" y="178" font-size="9" fill="#5aa06f" text-anchor="middle">默认；适合临时会话</text>
  <text x="511" y="196" font-size="9" fill="#5aa06f" text-anchor="middle">CREATE SECRET（无 PERSISTENT）</text>

  <rect x="374" y="224" width="274" height="142" rx="10" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="511" y="246" font-size="10.5" font-weight="600" fill="#7a4d00" text-anchor="middle">LocalFileSecretStorage（:146）</text>
  <text x="511" y="268" font-size="9.5" fill="#9a7328" text-anchor="middle">落盘到 secret 目录，跨会话保留</text>
  <text x="511" y="288" font-size="9.5" fill="#9a7328" text-anchor="middle">persistent = true，惰性加载</text>
  <text x="511" y="310" font-size="9" fill="#b8912e" text-anchor="middle">CREATE PERSISTENT SECRET …</text>
  <text x="511" y="330" font-size="9" fill="#b8912e" text-anchor="middle">受 allow_persistent_secrets 控制</text>
  <text x="511" y="350" font-size="9" fill="#b8912e" text-anchor="middle">（默认 true，secret_manager.hpp:77）</text>

  <!-- 使用 -->
  <rect x="692" y="52" width="298" height="330" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="710" y="76" font-size="12" font-weight="600" fill="#1b2a4a">使用：按路径匹配</text>
  <rect x="710" y="92" width="262" height="90" rx="10" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="841" y="118" font-size="9.5" fill="#1b2a4a" text-anchor="middle">读外部数据时（如 httpfs）</text>
  <text x="841" y="140" font-size="9" fill="#5b7db1" text-anchor="middle">LookupSecret(path, type)</text>
  <text x="841" y="158" font-size="9" fill="#5b7db1" text-anchor="middle">:129　按最长前缀匹配</text>
  <text x="841" y="174" font-size="8.5" fill="#8fa9cf" text-anchor="middle">自动挑选合适凭证</text>

  <rect x="710" y="200" width="262" height="80" rx="10" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="841" y="224" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">SELECT * FROM</text>
  <text x="841" y="244" font-size="9" fill="#3f8f66" text-anchor="middle" font-family="monospace">'s3://bucket/data.parquet'</text>
  <text x="841" y="264" font-size="9" fill="#3f8f66" text-anchor="middle">→ 自动用匹配的 S3 secret</text>

  <rect x="710" y="298" width="262" height="68" rx="10" fill="#fbeaea" stroke="#f0cccc"/>
  <text x="841" y="320" font-size="9.5" font-weight="600" fill="#7d1f1f" text-anchor="middle">安全价值</text>
  <text x="841" y="340" font-size="9" fill="#b06a6a" text-anchor="middle">凭证与 SQL 解耦</text>
  <text x="841" y="356" font-size="9" fill="#b06a6a" text-anchor="middle">不再明文散落在查询里</text>

  <line x1="330" y1="330" x2="356" y2="200" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="666" y1="180" x2="692" y2="130" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
</svg>
