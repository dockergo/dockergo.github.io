<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="470" viewBox="0 0 1020 470"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">列压缩 · 每段自动选最省编码（column_data_checkpointer.cpp:172）</text>

  <!-- analyze 流程 -->
  <rect x="30" y="52" width="960" height="130" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="76" font-size="12.5" font-weight="600" fill="#1d1d1f">checkpoint 时对每个 Segment 做 analyze，逐候选试算、取最低估计大小</text>
  <rect x="48" y="92" width="200" height="70" rx="10" fill="#fff7e6" stroke="#f0dcae"/><text x="148" y="120" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">InitAnalyze（:154）</text><text x="148" y="140" font-size="9" fill="#9a7328" text-anchor="middle">对该列数据分布采样</text>
  <rect x="278" y="92" width="360" height="70" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="458" y="116" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">逐候选压缩函数打分 best_score（:229-254）</text><text x="458" y="138" font-size="9" fill="#5b7db1" text-anchor="middle">谁的估计字节数最小选谁</text><text x="458" y="153" font-size="8.5" fill="#8fa9cf" text-anchor="middle">DetectBestCompressionMethod</text>
  <rect x="668" y="92" width="304" height="70" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="820" y="120" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">用选中编码压缩写盘</text><text x="820" y="140" font-size="9" fill="#3f8f66" text-anchor="middle">WriteToDisk（:317）</text>
  <line x1="248" y1="127" x2="278" y2="127" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="638" y1="127" x2="668" y2="127" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- 编码族 -->
  <rect x="30" y="200" width="960" height="200" rx="14" fill="#f6f6f8" stroke="#e2e2e7"/>
  <text x="48" y="224" font-size="12.5" font-weight="600" fill="#1d1d1f">候选编码族（compression_type.hpp + storage/compression/）</text>

  <rect x="48" y="238" width="220" height="70" rx="10" fill="#ffffff" stroke="#e2e2e7"/><text x="158" y="260" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">RLE（3）/ Constant</text><text x="158" y="280" font-size="8.5" fill="#6a6a70" text-anchor="middle">大量重复值</text><text x="158" y="296" font-size="8.5" fill="#6a6a70" text-anchor="middle">游程 / 全同</text>
  <rect x="278" y="238" width="220" height="70" rx="10" fill="#ffffff" stroke="#e2e2e7"/><text x="388" y="260" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">Dictionary（4）</text><text x="388" y="280" font-size="8.5" fill="#6a6a70" text-anchor="middle">低基数字符串/值</text><text x="388" y="296" font-size="8.5" fill="#6a6a70" text-anchor="middle">存字典 + 编号</text>
  <rect x="508" y="238" width="220" height="70" rx="10" fill="#ffffff" stroke="#e2e2e7"/><text x="618" y="260" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">Bitpacking（6）</text><text x="618" y="280" font-size="8.5" fill="#6a6a70" text-anchor="middle">小范围整数</text><text x="618" y="296" font-size="8.5" fill="#6a6a70" text-anchor="middle">按最小位宽打包</text>
  <rect x="738" y="238" width="234" height="70" rx="10" fill="#ffffff" stroke="#e2e2e7"/><text x="855" y="260" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">FSST（7）</text><text x="855" y="280" font-size="8.5" fill="#6a6a70" text-anchor="middle">通用字符串</text><text x="855" y="296" font-size="8.5" fill="#6a6a70" text-anchor="middle">子串符号表压缩</text>

  <rect x="48" y="316" width="220" height="70" rx="10" fill="#ffffff" stroke="#e2e2e7"/><text x="158" y="338" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">ALP / ALPRD（10/11）</text><text x="158" y="358" font-size="8.5" fill="#6a6a70" text-anchor="middle">浮点数</text><text x="158" y="374" font-size="8.5" fill="#6a6a70" text-anchor="middle">自适应无损</text>
  <rect x="278" y="316" width="220" height="70" rx="10" fill="#ffffff" stroke="#e2e2e7"/><text x="388" y="338" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">Chimp / Patas（8/9）</text><text x="388" y="358" font-size="8.5" fill="#6a6a70" text-anchor="middle">时序浮点</text><text x="388" y="374" font-size="8.5" fill="#6a6a70" text-anchor="middle">XOR 差分</text>
  <rect x="508" y="316" width="220" height="70" rx="10" fill="#ffffff" stroke="#e2e2e7"/><text x="618" y="338" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">Roaring / zstd</text><text x="618" y="358" font-size="8.5" fill="#6a6a70" text-anchor="middle">validity 位图 / 通用</text><text x="618" y="374" font-size="8.5" fill="#6a6a70" text-anchor="middle">兜底块压缩</text>
  <rect x="738" y="316" width="234" height="70" rx="10" fill="#ffffff" stroke="#e2e2e7"/><text x="855" y="338" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">Uncompressed</text><text x="855" y="358" font-size="8.5" fill="#6a6a70" text-anchor="middle">压缩无收益时</text><text x="855" y="374" font-size="8.5" fill="#6a6a70" text-anchor="middle">原样存</text>

  <text x="30" y="428" font-size="10.5" fill="#494950">关键：压缩是<tspan font-weight="600">列级、按段自选</tspan>——同一列不同段可用不同编码，随局部数据分布走；解压在扫描时向量化进行。</text>
  <text x="30" y="450" font-size="10.5" fill="#86868b">直接作用于扫描速度：编码越贴合分布，I/O 越少、解压越快、cache 越友好。</text>
</svg>
