<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="540" viewBox="0 0 1020 540"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Join 物理算子选择决策树（execution/physical_plan/plan_comparison_join.cpp:33-105）</text>

  <!-- 根 -->
  <rect x="410" y="52" width="200" height="46" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="510" y="72" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">LogicalComparisonJoin</text>
  <text x="510" y="88" font-size="9" fill="#5b7db1" text-anchor="middle">检查 conditions</text>

  <!-- 决策1：无条件 -->
  <rect x="60" y="140" width="180" height="60" rx="11" fill="#f6f6f8" stroke="#e2e2e7"/>
  <text x="150" y="164" font-size="10" fill="#6a6a70" text-anchor="middle">conditions 为空？</text>
  <rect x="60" y="230" width="180" height="52" rx="10" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="150" y="255" font-size="10.5" font-weight="600" fill="#7a4d00" text-anchor="middle">CrossProduct</text>
  <text x="150" y="271" font-size="8.5" fill="#9a7328" text-anchor="middle">笛卡尔积</text>

  <!-- 决策2：有等值 -->
  <rect x="270" y="140" width="200" height="60" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="370" y="160" font-size="10" fill="#5b7db1" text-anchor="middle">有等值条件 且</text>
  <text x="370" y="176" font-size="10" fill="#5b7db1" text-anchor="middle">非 prefer_range_joins？</text>
  <rect x="270" y="230" width="200" height="60" rx="10" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="370" y="256" font-size="11.5" font-weight="600" fill="#0f5132" text-anchor="middle">PhysicalHashJoin</text>
  <text x="370" y="274" font-size="8.5" fill="#3f8f66" text-anchor="middle">默认主力（等值 Join）</text>

  <!-- 决策3：范围条件 (无等值) -->
  <rect x="510" y="140" width="200" height="60" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="610" y="160" font-size="10" fill="#5b7db1" text-anchor="middle">范围条件数 has_range</text>
  <text x="610" y="176" font-size="10" fill="#5b7db1" text-anchor="middle">＋ 基数阈值判定</text>

  <rect x="500" y="240" width="150" height="56" rx="10" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="575" y="264" font-size="10.5" font-weight="600" fill="#3c1361" text-anchor="middle">IEJoin</text>
  <text x="575" y="282" font-size="8" fill="#7a5aa8" text-anchor="middle">range≥2 且够大</text>

  <rect x="668" y="240" width="150" height="56" rx="10" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="743" y="260" font-size="10.5" font-weight="600" fill="#3c1361" text-anchor="middle">PiecewiseMerge</text>
  <text x="743" y="278" font-size="8" fill="#7a5aa8" text-anchor="middle">range≥1（排序归并）</text>

  <!-- 决策4：其他不等值 -->
  <rect x="770" y="140" width="200" height="60" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="870" y="160" font-size="10" fill="#5b7db1" text-anchor="middle">任意不等值 /</text>
  <text x="870" y="176" font-size="10" fill="#5b7db1" text-anchor="middle">小表兜底</text>

  <rect x="770" y="330" width="200" height="56" rx="10" fill="#fbeaea" stroke="#f0cccc"/>
  <text x="870" y="354" font-size="10.5" font-weight="600" fill="#7d1f1f" text-anchor="middle">NestedLoopJoin</text>
  <text x="870" y="372" font-size="8.5" fill="#b06a6a" text-anchor="middle">支持的比较（小基数）</text>

  <rect x="770" y="404" width="200" height="56" rx="10" fill="#fbeaea" stroke="#f0cccc"/>
  <text x="870" y="428" font-size="10.5" font-weight="600" fill="#7d1f1f" text-anchor="middle">BlockwiseNLJoin</text>
  <text x="870" y="446" font-size="8.5" fill="#b06a6a" text-anchor="middle">任意布尔条件（最兜底）</text>

  <!-- 连线 -->
  <line x1="440" y1="98" x2="150" y2="140" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="480" y1="98" x2="370" y2="140" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="540" y1="98" x2="610" y2="140" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="570" y1="98" x2="870" y2="140" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <line x1="150" y1="200" x2="150" y2="230" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="162" y="220" font-size="9" fill="#0f5132">是</text>
  <line x1="370" y1="200" x2="370" y2="230" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="382" y="220" font-size="9" fill="#0f5132">是</text>
  <line x1="575" y1="200" x2="575" y2="240" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="640" y1="200" x2="743" y2="240" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="870" y1="200" x2="870" y2="330" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="870" y1="386" x2="870" y2="404" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="880" y="400" font-size="8.5" fill="#b06a6a">不支持则降级</text>

  <!-- 说明 -->
  <rect x="30" y="470" width="720" height="56" rx="11" fill="#f6f6f8" stroke="#e2e2e7"/>
  <text x="46" y="492" font-size="10.5" fill="#494950">优先级：等值 → HashJoin（除非 PreferRangeJoins）；纯范围 → 依 has_range 与基数阈值在 IEJoin / PiecewiseMerge 间选；</text>
  <text x="46" y="512" font-size="10.5" fill="#494950">SEMI/ANTI/MARK 限单条件才可 merge；RIGHT_SEMI/ANTI 禁用 IEJoin；小基数（低于 NestedLoopJoinThreshold）退回 NL 系。</text>
</svg>
