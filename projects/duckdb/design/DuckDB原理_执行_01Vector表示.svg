<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="460" viewBox="0 0 1020 460"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
  </defs>
  <rect width="1020" height="460" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Vector 物理表示 · 同一列可有多种内存布局，省内存也省计算（vector_type.hpp:16-20）</text>

  <rect x="30" y="52" width="470" height="130" rx="12" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="48" y="76" font-size="12" font-weight="600" fill="#1b2a4a">FLAT_VECTOR（标准未压缩）</text>
  <rect x="48" y="90" width="40" height="30" rx="5" fill="#ffffff" stroke="#bcd0ec"/><text x="68" y="110" font-size="9" fill="#1b2a4a" text-anchor="middle">100</text>
  <rect x="92" y="90" width="40" height="30" rx="5" fill="#ffffff" stroke="#bcd0ec"/><text x="112" y="110" font-size="9" fill="#1b2a4a" text-anchor="middle">200</text>
  <rect x="136" y="90" width="40" height="30" rx="5" fill="#ffffff" stroke="#bcd0ec"/><text x="156" y="110" font-size="9" fill="#1b2a4a" text-anchor="middle">300</text>
  <rect x="180" y="90" width="40" height="30" rx="5" fill="#ffffff" stroke="#bcd0ec"/><text x="200" y="110" font-size="9" fill="#1b2a4a" text-anchor="middle">…</text>
  <text x="48" y="146" font-size="9.5" fill="#5b7db1">每个值独立存储，一行一格。最通用。</text>
  <text x="48" y="166" font-size="9.5" fill="#5b7db1">配 validity mask 标记 NULL。</text>

  <rect x="520" y="52" width="470" height="130" rx="12" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="538" y="76" font-size="12" font-weight="600" fill="#0f5132">CONSTANT_VECTOR（单一常量）</text>
  <rect x="538" y="90" width="60" height="30" rx="5" fill="#ffffff" stroke="#bce6cd"/><text x="568" y="110" font-size="9" fill="#0f5132" text-anchor="middle">42</text>
  <text x="614" y="110" font-size="10" fill="#3f8f66">×2048（逻辑上整列都是 42）</text>
  <text x="538" y="146" font-size="9.5" fill="#3f8f66">只存一个值，整列共享。</text>
  <text x="538" y="166" font-size="9.5" fill="#3f8f66">常量折叠、标量参数用它——O(1) 内存。</text>

  <rect x="30" y="196" width="470" height="130" rx="12" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="48" y="220" font-size="12" font-weight="600" fill="#3c1361">DICTIONARY_VECTOR（选择向量+字典）</text>
  <rect x="48" y="234" width="150" height="30" rx="5" fill="#ffffff" stroke="#d9c9ef"/><text x="123" y="254" font-size="8.5" fill="#3c1361" text-anchor="middle">字典[EU,US,APAC]</text>
  <rect x="210" y="234" width="200" height="30" rx="5" fill="#ffffff" stroke="#d9c9ef"/><text x="310" y="254" font-size="8.5" fill="#3c1361" text-anchor="middle">下标 [0,1,0,2,1,0,…]</text>
  <text x="48" y="290" font-size="9.5" fill="#7a5aa8">低基数值：存字典 + 每行的下标，</text>
  <text x="48" y="310" font-size="9.5" fill="#7a5aa8">避免重复大字符串占内存。</text>

  <rect x="520" y="196" width="470" height="130" rx="12" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="538" y="220" font-size="12" font-weight="600" fill="#7a4d00">SEQUENCE / FSST</text>
  <text x="538" y="244" font-size="9.5" fill="#9a7328">SEQUENCE_VECTOR：起点 + 步长表达等差序列</text>
  <text x="538" y="262" font-size="9.5" fill="#9a7328">（如 row id 0,1,2,3…），只存两个数。</text>
  <text x="538" y="288" font-size="9.5" fill="#9a7328">FSST_VECTOR：字符串保持 FSST 压缩态，</text>
  <text x="538" y="306" font-size="9.5" fill="#9a7328">延迟解压——扫描与计算尽量在压缩域进行。</text>

  <rect x="30" y="340" width="960" height="106" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="364" font-size="12.5" font-weight="600" fill="#1d1d1f">为什么要多种布局</text>
  <text x="48" y="388" font-size="10.5" fill="#494950">• <tspan font-weight="600">省内存</tspan>：常量/序列/字典用极少字节表达一整列，2048 行可能只占几个值。</text>
  <text x="48" y="410" font-size="10.5" fill="#494950">• <tspan font-weight="600">省计算</tspan>：算子可对常量走快速路径（如 x+常量），对字典只算字典项而非每行。</text>
  <text x="48" y="432" font-size="10.5" fill="#494950">• <tspan font-weight="600">validity mask</tspan> 独立位图标记 NULL，与值数据分离，判空批量化。</text>
</svg>
