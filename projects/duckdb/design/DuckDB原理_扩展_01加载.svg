<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="440" viewBox="0 0 1020 440"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">扩展加载 · INSTALL / LOAD 与自动加载（extension_manager.hpp:49）</text>

  <!-- 流程 -->
  <rect x="30" y="52" width="960" height="150" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="76" font-size="12.5" font-weight="600" fill="#1d1d1f">加载流程</text>
  <rect x="48" y="92" width="200" height="90" rx="10" fill="#f4eefb" stroke="#d9c9ef"/><text x="148" y="116" font-size="10.5" font-weight="600" fill="#3c1361" text-anchor="middle">INSTALL name</text><text x="148" y="138" font-size="9" fill="#7a5aa8" text-anchor="middle">从仓库下载扩展二进制</text><text x="148" y="156" font-size="9" fill="#7a5aa8" text-anchor="middle">到本地扩展目录</text><text x="148" y="172" font-size="8.5" fill="#a58fc9" text-anchor="middle">受签名/信任策略约束</text>
  <rect x="288" y="92" width="200" height="90" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="388" y="116" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">LOAD name</text><text x="388" y="138" font-size="9" fill="#5b7db1" text-anchor="middle">BeginLoad（:8）动态载入</text><text x="388" y="156" font-size="9" fill="#5b7db1" text-anchor="middle">调用扩展入口函数</text><text x="388" y="172" font-size="8.5" fill="#8fa9cf" text-anchor="middle">登记进 loaded_extensions_info</text>
  <rect x="528" y="92" width="200" height="90" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="628" y="116" font-size="10.5" font-weight="600" fill="#0f5132" text-anchor="middle">注册能力进引擎</text><text x="628" y="138" font-size="9" fill="#3f8f66" text-anchor="middle">函数 / 类型 / 表函数</text><text x="628" y="156" font-size="9" fill="#3f8f66" text-anchor="middle">/ 存储 / SECRET provider</text><text x="628" y="172" font-size="8.5" fill="#5aa06f" text-anchor="middle">进 Catalog，SQL 即可用</text>
  <rect x="768" y="92" width="204" height="90" rx="10" fill="#fff7e6" stroke="#f0dcae"/><text x="870" y="116" font-size="10.5" font-weight="600" fill="#7a4d00" text-anchor="middle">自动加载</text><text x="870" y="138" font-size="9" fill="#9a7328" text-anchor="middle">autoload_known_extensions</text><text x="870" y="156" font-size="9" fill="#9a7328" text-anchor="middle">autoinstall（:365/380）</text><text x="870" y="172" font-size="8.5" fill="#b8912e" text-anchor="middle">首次用到已知扩展自动装载</text>

  <line x1="248" y1="137" x2="288" y2="137" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="488" y1="137" x2="528" y2="137" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- 扩展能提供什么 -->
  <rect x="30" y="222" width="960" height="130" rx="14" fill="#f6f6f8" stroke="#e2e2e7"/>
  <text x="48" y="246" font-size="12.5" font-weight="600" fill="#1d1d1f">扩展能提供的能力</text>
  <rect x="48" y="262" width="220" height="74" rx="9" fill="#ffffff" stroke="#e2e2e7"/><text x="158" y="284" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">数据源</text><text x="158" y="304" font-size="8.5" fill="#6a6a70" text-anchor="middle">httpfs（S3/HTTP）</text><text x="158" y="320" font-size="8.5" fill="#6a6a70" text-anchor="middle">parquet / json / iceberg</text>
  <rect x="284" y="262" width="220" height="74" rx="9" fill="#ffffff" stroke="#e2e2e7"/><text x="394" y="284" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">函数/类型</text><text x="394" y="304" font-size="8.5" fill="#6a6a70" text-anchor="middle">全文检索 / 空间(spatial)</text><text x="394" y="320" font-size="8.5" fill="#6a6a70" text-anchor="middle">向量相似度 / 自定义标量</text>
  <rect x="520" y="262" width="220" height="74" rx="9" fill="#ffffff" stroke="#e2e2e7"/><text x="630" y="284" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">存储/目录</text><text x="630" y="304" font-size="8.5" fill="#6a6a70" text-anchor="middle">postgres/mysql/sqlite scanner</text><text x="630" y="320" font-size="8.5" fill="#6a6a70" text-anchor="middle">catalog 扩展（外部库当目录）</text>
  <rect x="756" y="262" width="216" height="74" rx="9" fill="#ffffff" stroke="#e2e2e7"/><text x="864" y="284" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">各语言绑定</text><text x="864" y="304" font-size="8.5" fill="#6a6a70" text-anchor="middle">Python/R/Node/JDBC…</text><text x="864" y="320" font-size="8.5" fill="#6a6a70" text-anchor="middle">通过 C API 接入</text>

  <text x="30" y="378" font-size="10.5" fill="#494950">扩展是 DuckDB 保持"内核精简 + 能力可插拔"的关键：核心只做 SQL 存算，格式/协议/领域函数按需装载。</text>
  <text x="30" y="400" font-size="10.5" fill="#86868b">安全：INSTALL/LOAD 受 allow_unsigned_extensions / allow_community_extensions / enable_external_access 约束（见 DCL）。</text>
</svg>
