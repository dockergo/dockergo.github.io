<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="430" viewBox="0 0 1020 430"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="430" fill="#fbfbfd"/>
  <text x="30" y="28" font-size="14" font-weight="600" fill="#1d1d1f">三类写的存储形态 · INSERT 追加 / UPDATE 就地+版本链 / DELETE 打标记</text>
  <rect x="640" y="16" width="14" height="10" rx="2" fill="#fff7e6" stroke="#f0dcae"/><text x="658" y="25" font-size="9" fill="#9a7328">列段/存储块</text>

  <!-- INSERT -->
  <rect x="30" y="44" width="306" height="300" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="48" y="68" font-size="12.5" font-weight="600" fill="#0f5132">INSERT · 追加新行</text>
  <rect x="48" y="82" width="270" height="60" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="183" y="104" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">① 事务本地 LocalStorage</text><text x="183" y="122" font-size="8.5" fill="#3f8f66" text-anchor="middle">新行按列批写入本地</text><text x="183" y="135" font-size="8.5" fill="#3f8f66" text-anchor="middle">RowGroupCollection（仅本连接可见）</text>
  <line x1="183" y1="142" x2="183" y2="168" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="196" y="160" font-size="8.5" fill="#86868b">COMMIT</text>
  <rect x="48" y="170" width="270" height="60" rx="9" fill="#fff7e6" stroke="#f0dcae"/><text x="183" y="192" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">② 挂接进全局表</text><text x="183" y="210" font-size="8.5" fill="#9a7328" text-anchor="middle">乐观预写的块直接引用，</text><text x="183" y="223" font-size="8.5" fill="#9a7328" text-anchor="middle">定 commit_id 后新行才可见</text>
  <rect x="48" y="248" width="270" height="76" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="183" y="270" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">版本机制</text><text x="183" y="290" font-size="9" fill="#3f8f66" text-anchor="middle">无旧版本——</text><text x="183" y="306" font-size="9" fill="#3f8f66" text-anchor="middle">可见性完全由 commit_id 决定</text>

  <!-- UPDATE -->
  <rect x="366" y="44" width="306" height="300" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="384" y="68" font-size="12.5" font-weight="600" fill="#1b2a4a">UPDATE · 就地写 + 版本链</text>
  <rect x="384" y="82" width="270" height="60" rx="9" fill="#fff7e6" stroke="#f0dcae"/><text x="519" y="104" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">列段就地：v1 → v2</text><text x="519" y="122" font-size="8.5" fill="#9a7328" text-anchor="middle">新值直接覆盖列存原位置</text><text x="519" y="135" font-size="8.5" fill="#9a7328" text-anchor="middle">（不新建行）</text>
  <line x1="519" y1="142" x2="519" y2="168" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="533" y="160" font-size="8.5" fill="#86868b">旧值旁路</text>
  <rect x="384" y="170" width="270" height="60" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="519" y="192" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">UpdateInfo 版本链</text><text x="519" y="210" font-size="8.5" fill="#5b7db1" text-anchor="middle">旧值 v1 + 写入事务 id 存入旁路，</text><text x="519" y="223" font-size="8.5" fill="#5b7db1" text-anchor="middle">供旧快照回溯</text>
  <rect x="384" y="248" width="270" height="76" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="519" y="270" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">读者按 start_time 快照</text><text x="519" y="290" font-size="9" fill="#5b7db1" text-anchor="middle">新快照见 v2；</text><text x="519" y="306" font-size="9" fill="#5b7db1" text-anchor="middle">旧快照用 UpdateInfo 覆回 v1</text>

  <!-- DELETE -->
  <rect x="702" y="44" width="288" height="300" rx="14" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="720" y="68" font-size="12.5" font-weight="600" fill="#3c1361">DELETE · 只打标记</text>
  <rect x="720" y="82" width="252" height="60" rx="9" fill="#fff7e6" stroke="#f0dcae"/><text x="846" y="104" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">列段：行仍在</text><text x="846" y="122" font-size="8.5" fill="#9a7328" text-anchor="middle">不物理擦除数据，</text><text x="846" y="135" font-size="8.5" fill="#9a7328" text-anchor="middle">空间待 checkpoint 整理</text>
  <line x1="846" y1="142" x2="846" y2="168" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="860" y="160" font-size="8.5" fill="#86868b">标记</text>
  <rect x="720" y="170" width="252" height="60" rx="9" fill="#ffffff" stroke="#d9c9ef"/><text x="846" y="192" font-size="10" font-weight="600" fill="#3c1361" text-anchor="middle">ChunkInfo 删除标记</text><text x="846" y="210" font-size="8.5" fill="#7a5aa8" text-anchor="middle">按行记删除事务 id，</text><text x="846" y="223" font-size="8.5" fill="#7a5aa8" text-anchor="middle">不动列数据本身</text>
  <rect x="720" y="248" width="252" height="76" rx="9" fill="#ffffff" stroke="#d9c9ef"/><text x="846" y="270" font-size="9.5" font-weight="600" fill="#3c1361" text-anchor="middle">RowVersionManager 判可见</text><text x="846" y="290" font-size="9" fill="#7a5aa8" text-anchor="middle">删除前建立的快照</text><text x="846" y="306" font-size="9" fill="#7a5aa8" text-anchor="middle">仍能读到该行</text>

  <!-- 共性 -->
  <rect x="30" y="356" width="960" height="58" rx="12" fill="#f6f6f8" stroke="#e2e2e7"/>
  <text x="48" y="378" font-size="10.5" font-weight="600" fill="#1d1d1f">共性</text>
  <text x="48" y="396" font-size="10" fill="#494950">三类写都先落事务本地/旁路版本，COMMIT 统一定 commit_id 决定可见性并写 WAL；乐观并发下写写冲突在提交时失败回滚。</text>
  <text x="48" y="410" font-size="10" fill="#86868b">旧版本（UpdateInfo / 被删行）按最低活跃事务 start_time 由后台 Cleanup 回收——详见「事务与 MVCC」。</text>
</svg>
