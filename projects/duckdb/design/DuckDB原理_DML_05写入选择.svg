<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="440" viewBox="0 0 1020 440"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">写入方式选择 · 单行调试 → 批量导入 → 从文件直灌，用对接口差一个量级</text>

  <rect x="410" y="50" width="200" height="46" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="510" y="70" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">要写入数据</text>
  <text x="510" y="86" font-size="9" fill="#5b7db1" text-anchor="middle">数据从哪来 / 多大量？</text>

  <!-- 分支 -->
  <rect x="40" y="150" width="215" height="120" rx="12" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="147" y="174" font-size="11" font-weight="600" fill="#3c1361" text-anchor="middle">少量字面量</text>
  <text x="147" y="198" font-size="10.5" fill="#3c1361" text-anchor="middle" font-family="monospace">INSERT INTO t VALUES …</text>
  <text x="147" y="222" font-size="9.5" fill="#7a5aa8" text-anchor="middle">调试 / 少量行</text>
  <text x="147" y="242" font-size="9" fill="#a58fc9" text-anchor="middle">逐行有解析开销</text>
  <text x="147" y="258" font-size="9" fill="#a58fc9" text-anchor="middle">别在循环里高频调用</text>

  <rect x="275" y="150" width="215" height="120" rx="12" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="382" y="174" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">程序高频追加</text>
  <text x="382" y="198" font-size="10.5" fill="#1b2a4a" text-anchor="middle" font-family="monospace">Appender API</text>
  <text x="382" y="222" font-size="9.5" fill="#5b7db1" text-anchor="middle">C/C++/Python 等绑定</text>
  <text x="382" y="242" font-size="9" fill="#8fa9cf" text-anchor="middle">按列批攒块，避开 SQL 解析</text>
  <text x="382" y="258" font-size="9" fill="#8fa9cf" text-anchor="middle">流式写入首选</text>

  <rect x="510" y="150" width="215" height="120" rx="12" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="617" y="174" font-size="11" font-weight="600" fill="#0f5132" text-anchor="middle">已有结果集/表</text>
  <text x="617" y="198" font-size="10.5" fill="#0f5132" text-anchor="middle" font-family="monospace">INSERT … SELECT</text>
  <text x="617" y="222" font-size="9.5" fill="#3f8f66" text-anchor="middle">或 CREATE TABLE AS</text>
  <text x="617" y="242" font-size="9" fill="#5aa06f" text-anchor="middle">全程向量化、并行</text>
  <text x="617" y="258" font-size="9" fill="#5aa06f" text-anchor="middle">批量转换的主力</text>

  <rect x="745" y="150" width="235" height="120" rx="12" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="862" y="174" font-size="11" font-weight="600" fill="#7a4d00" text-anchor="middle">外部文件</text>
  <text x="862" y="198" font-size="10.5" fill="#7a4d00" text-anchor="middle" font-family="monospace">COPY / read_csv / read_parquet</text>
  <text x="862" y="222" font-size="9.5" fill="#9a7328" text-anchor="middle">CSV / Parquet / JSON</text>
  <text x="862" y="242" font-size="9" fill="#b8912e" text-anchor="middle">并行分块读，最快批量入库</text>
  <text x="862" y="258" font-size="9" fill="#b8912e" text-anchor="middle">也可直接查文件不入库</text>

  <line x1="470" y1="96" x2="147" y2="150" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="490" y1="96" x2="382" y2="150" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="530" y1="96" x2="617" y2="150" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="560" y1="96" x2="862" y2="150" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- 共同收口 -->
  <rect x="40" y="310" width="940" height="60" rx="12" fill="#f6f6f8" stroke="#e2e2e7"/>
  <text x="510" y="334" font-size="11" font-weight="600" fill="#1d1d1f" text-anchor="middle">四条路径最终都走同一写入引擎：LocalAppend → OptimisticDataWriter → COMMIT 并入 RowGroup + WAL</text>
  <text x="510" y="356" font-size="10" fill="#6a6a70" text-anchor="middle">差别只在"数据怎么进来"与解析/攒批开销；落盘机制一致。</text>

  <rect x="40" y="384" width="940" height="42" rx="10" fill="#fbeaea" stroke="#f0cccc"/>
  <text x="510" y="410" font-size="10.5" fill="#7d1f1f" text-anchor="middle">批量导入后建议显式 CHECKPOINT，把 WAL 合并进单文件；大导入用单个大事务而非逐行提交。</text>
</svg>
