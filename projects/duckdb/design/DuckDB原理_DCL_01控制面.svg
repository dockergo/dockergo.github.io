<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="410" viewBox="0 0 1020 410"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="410" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">DCL 数据控制 · 嵌入式没有多用户 GRANT，控制面 = 访问模式 + 配置/安全 + 密钥</text>

  <!-- 心智对照 -->
  <rect x="30" y="52" width="470" height="120" rx="14" fill="#fbeaea" stroke="#f0cccc" filter="url(#soft)"/>
  <text x="48" y="76" font-size="12" font-weight="600" fill="#7d1f1f">与服务器数据库的关键差异</text>
  <text x="48" y="100" font-size="10.5" fill="#b06a6a">服务器库：用户/角色/权限（GRANT/REVOKE）+ 登录认证</text>
  <text x="48" y="122" font-size="10.5" fill="#b06a6a">DuckDB：进程内库，"谁能访问"由<tspan font-weight="600">宿主进程与操作系统</tspan>决定</text>
  <text x="48" y="144" font-size="10.5" fill="#b06a6a">—— 能打开这个进程/文件，就有它的数据权限</text>
  <text x="48" y="164" font-size="9.5" fill="#c99">（GRANT/REVOKE 仅为保留关键字，无传统多用户权限体系）</text>

  <!-- DuckDB 的三类控制 -->
  <rect x="520" y="52" width="470" height="120" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="538" y="76" font-size="12" font-weight="600" fill="#1b2a4a">DuckDB 的"数据控制"落在三处</text>
  <text x="538" y="100" font-size="10.5" fill="#5b7db1">① 访问模式：READ_ONLY / READ_WRITE（开库时定）</text>
  <text x="538" y="122" font-size="10.5" fill="#5b7db1">② 配置与安全：SET/RESET · 外部访问闸门 · 扩展信任</text>
  <text x="538" y="144" font-size="10.5" fill="#5b7db1">③ 密钥（SECRET）：外部数据源凭证的集中管理</text>
  <text x="538" y="164" font-size="9.5" fill="#8fa9cf">可用 lock_configuration 锁死配置防运行时篡改</text>

  <!-- 三支路 -->
  <rect x="30" y="196" width="310" height="190" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="220" font-size="11.5" font-weight="600" fill="#1d1d1f">① 访问模式（access_mode）</text>
  <rect x="48" y="234" width="274" height="40" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="185" y="259" font-size="10" fill="#0f5132" text-anchor="middle">READ_WRITE：可读可写</text>
  <rect x="48" y="282" width="274" height="40" rx="9" fill="#fff7e6" stroke="#f0dcae"/><text x="185" y="307" font-size="10" fill="#7a4d00" text-anchor="middle">READ_ONLY：只读挂载，禁写</text>
  <text x="48" y="344" font-size="9" fill="#86868b">access_mode.hpp:15　开库/ATTACH 时指定</text>
  <text x="48" y="362" font-size="9" fill="#86868b">AUTOMATIC=按文件权限自动定</text>

  <rect x="356" y="196" width="310" height="190" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="374" y="220" font-size="11.5" font-weight="600" fill="#1d1d1f">② 配置与安全闸门</text>
  <rect x="374" y="234" width="274" height="34" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="511" y="255" font-size="9.5" fill="#1b2a4a" text-anchor="middle">SET / RESET（GLOBAL·SESSION）</text>
  <rect x="374" y="276" width="274" height="34" rx="8" fill="#fbeaea" stroke="#f0cccc"/><text x="511" y="297" font-size="9.5" fill="#7d1f1f" text-anchor="middle">enable_external_access（文件/网络）</text>
  <rect x="374" y="318" width="274" height="34" rx="8" fill="#f4eefb" stroke="#d9c9ef"/><text x="511" y="339" font-size="9.5" fill="#3c1361" text-anchor="middle">扩展信任 + lock_configuration</text>
  <text x="374" y="372" font-size="9" fill="#86868b">settings.hpp:956/1443…</text>

  <rect x="682" y="196" width="308" height="190" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="700" y="220" font-size="11.5" font-weight="600" fill="#1d1d1f">③ 密钥（SECRET）</text>
  <rect x="700" y="234" width="272" height="40" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="836" y="259" font-size="9.5" fill="#1b2a4a" text-anchor="middle">CREATE SECRET（S3/HTTP/…凭证）</text>
  <rect x="700" y="282" width="272" height="40" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="836" y="307" font-size="9.5" fill="#0f5132" text-anchor="middle">持久 / 临时两种存储</text>
  <text x="700" y="344" font-size="9" fill="#86868b">SecretManager · secret_manager.hpp</text>
  <text x="700" y="362" font-size="9" fill="#86868b">凭证不再散落在 SQL 文本里</text>
</svg>
