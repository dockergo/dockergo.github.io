<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="440" viewBox="0 0 1020 440"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">larger-than-memory · 大聚合/排序/Join 内存不够就溢写临时文件</text>

  <!-- 内存预算协调 -->
  <rect x="30" y="52" width="470" height="180" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="48" y="76" font-size="12" font-weight="600" fill="#1b2a4a">TemporaryMemoryManager 协调预算</text>
  <text x="48" y="98" font-size="9.5" fill="#5b7db1">（temporary_memory_manager.hpp:71）</text>
  <rect x="48" y="110" width="434" height="50" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="265" y="131" font-size="9.5" fill="#1b2a4a" text-anchor="middle">多个阻塞算子（聚合/排序/Join）竞争 memory_limit</text><text x="265" y="149" font-size="8.5" fill="#5b7db1" text-anchor="middle">按需给每个算子分配内存额度</text>
  <rect x="48" y="170" width="434" height="50" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="265" y="191" font-size="9.5" fill="#0f5132" text-anchor="middle">额度够 → 全内存跑；不够 → 触发溢写</text><text x="265" y="209" font-size="8.5" fill="#3f8f66" text-anchor="middle">动态调整，避免单算子吃光内存</text>

  <!-- 溢写 -->
  <rect x="520" y="52" width="470" height="180" rx="14" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="538" y="76" font-size="12" font-weight="600" fill="#7a4d00">TemporaryFileManager 溢写</text>
  <text x="538" y="98" font-size="9.5" fill="#9a7328">（temporary_file_manager.hpp:261）</text>
  <rect x="538" y="110" width="434" height="50" rx="9" fill="#ffffff" stroke="#f0dcae"/><text x="755" y="131" font-size="9.5" fill="#7a4d00" text-anchor="middle">WriteTemporaryBuffer：把内存块写到 temp_directory</text><text x="755" y="149" font-size="8.5" fill="#9a7328" text-anchor="middle">需要时再读回，像扩展的"交换空间"</text>
  <rect x="538" y="170" width="434" height="50" rx="9" fill="#fdfdf5" stroke="#f0dcae"/><text x="755" y="191" font-size="9.5" fill="#7a4d00" text-anchor="middle">按分区溢写：只落超出内存的那部分</text><text x="755" y="209" font-size="8.5" fill="#9a7328" text-anchor="middle">radix 分区天然契合分批处理</text>

  <line x1="500" y1="142" x2="520" y2="142" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- 三类溢写算子 -->
  <rect x="30" y="252" width="960" height="180" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="276" font-size="12.5" font-weight="600" fill="#1d1d1f">哪些算子会溢写</text>
  <rect x="48" y="292" width="300" height="120" rx="10" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="198" y="316" font-size="10.5" font-weight="600" fill="#0f5132" text-anchor="middle">Hash 聚合</text>
  <text x="198" y="340" font-size="9.5" fill="#3f8f66" text-anchor="middle">分区哈希表过大 →</text>
  <text x="198" y="358" font-size="9.5" fill="#3f8f66" text-anchor="middle">部分分区落盘</text>
  <text x="198" y="378" font-size="9.5" fill="#3f8f66" text-anchor="middle">分批 Finalize</text>
  <text x="198" y="400" font-size="8.5" fill="#5aa06f" text-anchor="middle">见 DQL·Hash 聚合</text>
  <rect x="360" y="292" width="300" height="120" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="510" y="316" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">排序</text>
  <text x="510" y="340" font-size="9.5" fill="#5b7db1" text-anchor="middle">外部归并排序：</text>
  <text x="510" y="358" font-size="9.5" fill="#5b7db1" text-anchor="middle">分段排序落盘 →</text>
  <text x="510" y="378" font-size="9.5" fill="#5b7db1" text-anchor="middle">归并阶段读回</text>
  <rect x="672" y="292" width="300" height="120" rx="10" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="822" y="316" font-size="10.5" font-weight="600" fill="#3c1361" text-anchor="middle">Hash Join</text>
  <text x="822" y="340" font-size="9.5" fill="#7a5aa8" text-anchor="middle">构建端过大 →</text>
  <text x="822" y="358" font-size="9.5" fill="#7a5aa8" text-anchor="middle">分区落盘（Grace）</text>
  <text x="822" y="378" font-size="9.5" fill="#7a5aa8" text-anchor="middle">probe 端同分区匹配</text>
  <text x="822" y="400" font-size="8.5" fill="#a58fc9" text-anchor="middle">见 DQL·Hash Join</text>
</svg>
