<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="o2" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="900" height="340" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">代价模型 · 选索引 + 定连接顺序</text>
  <text x="30" y="48" font-size="10.5" fill="#6e6e73">代价 = 估算 I/O + CPU；选择性高的索引、结果小的表放前，总代价最低</text>

  <!-- 单表访问路径对比 -->
  <text x="40" y="80" font-size="11.5" font-weight="700" fill="#1d1d1f">单表：全表扫描 vs 索引扫描</text>
  <rect x="40" y="92" width="380" height="54" rx="9" fill="#fff7f1" stroke="#f0d4b8" filter="url(#o2)"/>
  <text x="58" y="114" font-size="10" font-weight="600" fill="#b0651f">全表扫描</text><text x="58" y="132" font-size="8.5" fill="#8a6d3b">顺序读所有数据页 · 选择性低（要读大半行）时反而快</text>
  <rect x="40" y="154" width="380" height="54" rx="9" fill="#eef7f1" stroke="#8fcaa8" filter="url(#o2)"/>
  <text x="58" y="176" font-size="10" font-weight="600" fill="#1c7a4d">索引扫描</text><text x="58" y="194" font-size="8.5" fill="#3c7a58">按索引定位少量页 · 选择性高（能过滤大量行）时优</text>

  <!-- 连接顺序 -->
  <text x="470" y="80" font-size="11.5" font-weight="700" fill="#1d1d1f">多表：连接顺序决定中间集大小</text>
  <g text-anchor="middle">
    <rect x="470" y="92" width="90" height="50" rx="8" fill="#f4f7fc" stroke="#cfe0f2"/><text x="515" y="114" font-size="9.5" font-weight="600" fill="#5b7db1">小表A</text><text x="515" y="130" font-size="7.5" fill="#6e6e73">过滤强</text>
    <rect x="580" y="92" width="90" height="50" rx="8" fill="#f4f7fc" stroke="#cfe0f2"/><text x="625" y="114" font-size="9.5" font-weight="600" fill="#5b7db1">中表B</text>
    <rect x="690" y="92" width="90" height="50" rx="8" fill="#f4f7fc" stroke="#cfe0f2"/><text x="735" y="114" font-size="9.5" font-weight="600" fill="#5b7db1">大表C</text>
    <text x="625" y="164" font-size="8.5" fill="#1c7a4d">A→B→C：先过滤出小结果，后续扫描量最小 ✓</text>
    <text x="625" y="184" font-size="8.5" fill="#b0651f">C→B→A：先扫大表，中间集膨胀，代价高 ✗</text>
  </g>

  <!-- 统计新鲜度 -->
  <rect x="40" y="230" width="820" height="66" rx="11" fill="#fbf2ea" stroke="#e6cdae" filter="url(#o2)"/>
  <text x="58" y="252" font-size="11" font-weight="700" fill="#b0651f">关键前提：统计信息新鲜度</text>
  <text x="58" y="272" font-size="9" fill="#5a4a3a">优化器据统计（行数、索引基数）估代价 → 统计过期 = 估错 = 选错计划（"加了索引却不走"的常见根因）</text>
  <text x="58" y="289" font-size="9" fill="#5a4a3a">对策：大量增删改后 ANALYZE TABLE 刷新；确认失准再用 FORCE INDEX 提示；EXPLAIN 观察实际计划</text>

  <text x="450" y="322" font-size="9" fill="#8a94a6" text-anchor="middle">最优计划 = 单表最省访问路径 × 最优连接顺序的组合，由 best_access_path 逐表估算后剪枝搜索</text>
</svg>
