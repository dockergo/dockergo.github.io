<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="c2" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="c2h" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
  </defs>
  <rect width="900" height="340" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">连接处理器 · 两种线程模型</text>
  <text x="30" y="48" font-size="10.5" fill="#6e6e73">监听 socket 收新连接 → Connection_handler_manager 分派 → 选定线程模型服务</text>

  <!-- 监听 -->
  <rect x="40" y="130" width="150" height="80" rx="11" fill="#eef2f7" stroke="#d4ddeb" filter="url(#c2)"/>
  <text x="115" y="164" font-size="11" font-weight="700" fill="#3f5573" text-anchor="middle">监听 socket</text>
  <text x="115" y="184" font-size="8.3" fill="#6a7c96" text-anchor="middle">accept 新连接</text>

  <rect x="240" y="130" width="170" height="80" rx="11" fill="#f4f7fc" stroke="#cfe0f2" filter="url(#c2)"/>
  <text x="325" y="160" font-size="10.5" font-weight="700" fill="#5b7db1" text-anchor="middle">连接处理器管理</text>
  <text x="325" y="178" font-size="8.3" fill="#6e6e73" text-anchor="middle">Connection_handler_manager</text>
  <text x="325" y="194" font-size="8" fill="#9aa8bd" text-anchor="middle">选模型分派</text>

  <line x1="190" y1="170" x2="240" y2="170" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#c2h)"/>

  <!-- per-thread -->
  <rect x="470" y="76" width="390" height="94" rx="11" fill="#eef7f1" stroke="#8fcaa8" filter="url(#c2)"/>
  <text x="490" y="100" font-size="11.5" font-weight="700" fill="#1c7a4d">per-thread（每连接一线程 · 默认）</text>
  <text x="490" y="120" font-size="9" fill="#3c7a58">add_connection → 每连接创建/复用一个 OS 线程</text>
  <text x="490" y="137" font-size="9" fill="#3c7a58">线程运行 handle_connection，独占该连接的 THD</text>
  <text x="490" y="156" font-size="8.3" fill="#6ba489">实现简单、隔离强；万级连接时线程过多</text>

  <!-- thread pool -->
  <rect x="470" y="184" width="390" height="94" rx="11" fill="#fff7f1" stroke="#f0d4b8" filter="url(#c2)"/>
  <text x="490" y="208" font-size="11.5" font-weight="700" fill="#b0651f">线程池 / 单线程（可选）</text>
  <text x="490" y="228" font-size="9" fill="#8a6d3b">线程池：一组工作线程服务多连接，连接数与线程数解耦</text>
  <text x="490" y="245" font-size="9" fill="#8a6d3b">no-threads 单线程：嵌入 / 调试场景</text>
  <text x="490" y="264" font-size="8.3" fill="#b0651f">高并发短事务更省资源</text>

  <line x1="410" y1="160" x2="470" y2="123" stroke="#2f9e6e" stroke-width="1.6" marker-end="url(#c2h)"/>
  <line x1="410" y1="182" x2="470" y2="230" stroke="#c99a3a" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#c2h)"/>

  <text x="450" y="312" font-size="9" fill="#8a94a6" text-anchor="middle">锚点：add_connection `sql/conn_handler/connection_handler_per_thread.cc:399` · handle_connection `:249`</text>
  <text x="450" y="330" font-size="9" fill="#8a94a6" text-anchor="middle">管理器：`sql/conn_handler/connection_handler_manager.cc`</text>
</svg>
