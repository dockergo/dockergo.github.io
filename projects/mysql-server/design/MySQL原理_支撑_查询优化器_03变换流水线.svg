<svg xmlns="http://www.w3.org/2000/svg" width="940" height="380" viewBox="0 0 940 380" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="ots" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="otb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
  </defs>
  <rect width="940" height="380" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">优化器变换流水线 · 从语法树到执行计划</text>
  <text x="30" y="48" font-size="10.5" fill="#6e6e73">先做等价逻辑重写降复杂度，再按代价枚举选最便宜的访问路径与连接顺序</text>

  <!-- 阶段串 -->
  <rect x="30" y="76" width="150" height="60" rx="10" fill="#eef7f1" stroke="#6aa17f" filter="url(#ots)"/>
  <text x="105" y="100" font-size="10.5" font-weight="700" fill="#2f7a4f" text-anchor="middle">语法树</text>
  <text x="105" y="120" font-size="8.8" fill="#6e6e73" text-anchor="middle">parser 产出</text>

  <rect x="215" y="76" width="160" height="60" rx="10" fill="#eef3fb" stroke="#5b7db1" filter="url(#ots)"/>
  <text x="295" y="100" font-size="10.5" font-weight="700" fill="#3a5a8a" text-anchor="middle">名字解析 setup</text>
  <text x="295" y="120" font-size="8.8" fill="#6e6e73" text-anchor="middle">绑定表/列，检查权限</text>

  <rect x="410" y="76" width="200" height="60" rx="10" fill="#eef3fb" stroke="#5b7db1" filter="url(#ots)"/>
  <text x="510" y="100" font-size="10.5" font-weight="700" fill="#3a5a8a" text-anchor="middle">逻辑变换（等价重写）</text>
  <text x="510" y="120" font-size="8.8" fill="#6e6e73" text-anchor="middle">改写查询，不改结果</text>

  <rect x="645" y="76" width="130" height="60" rx="10" fill="#eef3fb" stroke="#5b7db1" filter="url(#ots)"/>
  <text x="710" y="100" font-size="10.5" font-weight="700" fill="#3a5a8a" text-anchor="middle">代价枚举</text>
  <text x="710" y="120" font-size="8.8" fill="#6e6e73" text-anchor="middle">选路径+连接序</text>

  <rect x="810" y="76" width="100" height="60" rx="10" fill="#eef7f1" stroke="#6aa17f" filter="url(#ots)"/>
  <text x="860" y="100" font-size="10.5" font-weight="700" fill="#2f7a4f" text-anchor="middle">执行计划</text>
  <text x="860" y="120" font-size="8.8" fill="#6e6e73" text-anchor="middle">QEP 交执行器</text>

  <path d="M180,106 L213,106" fill="none" stroke="#5b7db1" stroke-width="1.6" marker-end="url(#otb)"/>
  <path d="M375,106 L408,106" fill="none" stroke="#5b7db1" stroke-width="1.6" marker-end="url(#otb)"/>
  <path d="M610,106 L643,106" fill="none" stroke="#5b7db1" stroke-width="1.6" marker-end="url(#otb)"/>
  <path d="M775,106 L808,106" fill="none" stroke="#5b7db1" stroke-width="1.6" marker-end="url(#otb)"/>

  <!-- 逻辑变换清单 -->
  <rect x="30" y="168" width="440" height="180" rx="12" fill="#f7faff" stroke="#cfe0f2" filter="url(#ots)"/>
  <text x="48" y="190" font-size="11" font-weight="700" fill="#3a5a8a">逻辑变换典型手段</text>
  <text x="48" y="214" font-size="9.3" fill="#1d1d1f">· 子查询上拉 / 半连接转换：把 IN/EXISTS 子查询</text>
  <text x="60" y="230" font-size="9.3" fill="#6e6e73">摊平成 join，避免逐行重复执行子查询</text>
  <text x="48" y="252" font-size="9.3" fill="#1d1d1f">· 派生表 / 视图合并：把子查询并入外层</text>
  <text x="48" y="274" font-size="9.3" fill="#1d1d1f">· 冗余子句消除：删恒真/重复条件</text>
  <text x="48" y="296" font-size="9.3" fill="#1d1d1f">· 常量传播与折叠：编译期算掉常量表达式</text>
  <text x="48" y="318" font-size="9.3" fill="#1d1d1f">· 外连接转内连接：条件允许时收紧，扩大优化空间</text>
  <text x="48" y="340" font-size="8.6" fill="#8a94a6">锚点见正文：flatten_subqueries / convert_subquery_to_semijoin</text>

  <!-- 代价枚举 -->
  <rect x="490" y="168" width="420" height="180" rx="12" fill="#fbf6ee" stroke="#ecdcbf" filter="url(#ots)"/>
  <text x="508" y="190" font-size="11" font-weight="700" fill="#9a6a1f">代价枚举做什么</text>
  <text x="508" y="214" font-size="9.3" fill="#1d1d1f">· 访问路径：全表扫描 vs 用哪个索引 vs 范围扫描</text>
  <text x="508" y="236" font-size="9.3" fill="#1d1d1f">· 连接顺序：谁做驱动表，逐步扩展最优前缀</text>
  <text x="508" y="258" font-size="9.3" fill="#1d1d1f">· 代价 = 估算行数 × (I/O + CPU) 权重</text>
  <text x="508" y="280" font-size="9.3" fill="#6e6e73">行数来自索引统计/直方图，估不准则可能选错</text>
  <text x="508" y="304" font-size="9.3" fill="#1d1d1f">· 目标：在庞大计划空间里挑总代价最低的一个</text>
  <text x="508" y="328" font-size="8.6" fill="#8a94a6">变换缩小空间，枚举在空间内择优 —— 两步合力出计划</text>
</svg>
