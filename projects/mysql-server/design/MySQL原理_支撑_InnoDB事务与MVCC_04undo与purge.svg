<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="pgs" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="pga" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#9a6a1f"/></marker>
    <marker id="pgb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
    <marker id="pgr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c0392b"/></marker>
  </defs>
  <rect width="960" height="430" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">undo 回滚段 · 版本链 · purge 历史清理</text>
  <text x="30" y="48" font-size="10.5" fill="#6e6e73">更新把旧值写入 undo 形成版本链；purge 线程回收再无快照可见的旧版本</text>

  <!-- 回滚段结构 -->
  <rect x="30" y="66" width="270" height="200" rx="13" fill="#fbf6ee" stroke="#ecdcbf" filter="url(#pgs)"/>
  <text x="48" y="88" font-size="11" font-weight="700" fill="#9a6a1f">回滚段（rollback segment）</text>
  <rect x="48" y="100" width="234" height="34" rx="8" fill="#fbf5ec" stroke="#d9b98a"/>
  <text x="165" y="122" font-size="9.5" fill="#1d1d1f" text-anchor="middle">128 个回滚段（并发分摊）</text>
  <rect x="48" y="142" width="234" height="34" rx="8" fill="#fbf5ec" stroke="#d9b98a"/>
  <text x="165" y="164" font-size="9.5" fill="#1d1d1f" text-anchor="middle">每段 1024 个 undo slot</text>
  <rect x="48" y="184" width="112" height="34" rx="8" fill="#fbf5ec" stroke="#d9b98a"/>
  <text x="104" y="205" font-size="9" fill="#1d1d1f" text-anchor="middle">insert undo</text>
  <rect x="170" y="184" width="112" height="34" rx="8" fill="#fbf5ec" stroke="#d9b98a"/>
  <text x="226" y="205" font-size="9" fill="#1d1d1f" text-anchor="middle">update undo</text>
  <text x="165" y="240" font-size="8.5" fill="#6e6e73" text-anchor="middle">insert undo 提交后即可丢弃</text>
  <text x="165" y="256" font-size="8.5" fill="#6e6e73" text-anchor="middle">update undo 供 MVCC 回溯，待 purge</text>

  <!-- 版本链 -->
  <rect x="330" y="66" width="330" height="200" rx="13" fill="#f7faff" stroke="#cfe0f2" filter="url(#pgs)"/>
  <text x="348" y="88" font-size="11" font-weight="700" fill="#3a5a8a">同一行的版本链（DB_ROLL_PTR 串联）</text>
  <rect x="348" y="104" width="294" height="40" rx="8" fill="#eef7f1" stroke="#6aa17f"/>
  <text x="360" y="122" font-size="9.5" font-weight="700" fill="#2f7a4f">当前版本 trx=50</text>
  <text x="360" y="137" font-size="8.5" fill="#6e6e73">聚簇索引行，含 DB_TRX_ID / DB_ROLL_PTR</text>
  <rect x="348" y="156" width="294" height="34" rx="8" fill="#fbf5ec" stroke="#d9b98a"/>
  <text x="360" y="177" font-size="9" fill="#1d1d1f">旧版本 trx=30（undo）</text>
  <rect x="348" y="200" width="294" height="34" rx="8" fill="#fbf5ec" stroke="#d9b98a"/>
  <text x="360" y="221" font-size="9" fill="#1d1d1f">更旧版本 trx=10（undo）</text>
  <path d="M495,144 L495,154" fill="none" stroke="#9a6a1f" stroke-width="1.5" marker-end="url(#pga)"/>
  <path d="M495,190 L495,198" fill="none" stroke="#9a6a1f" stroke-width="1.5" marker-end="url(#pga)"/>
  <text x="565" y="252" font-size="8.5" fill="#6e6e73" text-anchor="middle">ReadView 沿链回溯选可见版本</text>

  <!-- purge -->
  <rect x="690" y="66" width="240" height="200" rx="13" fill="#f7faff" stroke="#cfe0f2" filter="url(#pgs)"/>
  <text x="708" y="88" font-size="11" font-weight="700" fill="#3a5a8a">purge 线程</text>
  <rect x="708" y="100" width="204" height="34" rx="8" fill="#eef3fb" stroke="#5b7db1"/>
  <text x="810" y="121" font-size="9" fill="#3a5a8a" text-anchor="middle">purge 协调 + 工作线程</text>
  <rect x="708" y="142" width="204" height="52" rx="8" fill="#eef3fb" stroke="#5b7db1"/>
  <text x="810" y="162" font-size="9" fill="#1d1d1f" text-anchor="middle">取最老活跃 ReadView 水位</text>
  <text x="810" y="180" font-size="8.5" fill="#6e6e73" text-anchor="middle">早于它的旧版本再无人可见</text>
  <rect x="708" y="202" width="204" height="34" rx="8" fill="#eef7f1" stroke="#6aa17f"/>
  <text x="810" y="223" font-size="9" fill="#2f7a4f" text-anchor="middle">回收 undo → 释放空间</text>
  <text x="810" y="256" font-size="8.5" fill="#6e6e73" text-anchor="middle">同时删已标记删除的行</text>
  <path d="M660,150 L704,150" fill="none" stroke="#5b7db1" stroke-width="1.5" marker-end="url(#pgb)"/>

  <!-- history list / 长事务风险 -->
  <rect x="30" y="286" width="900" height="118" rx="13" fill="#fdeeec" stroke="#e0a49a" filter="url(#pgs)"/>
  <text x="48" y="308" font-size="11" font-weight="700" fill="#c0392b">history list 长度 = 未 purge 的旧版本堆积量（关键健康指标）</text>
  <text x="48" y="332" font-size="9.5" fill="#1d1d1f">长事务持有一个很老的 ReadView → purge 水位被卡住 → 旧版本无法回收</text>
  <text x="48" y="352" font-size="9.5" fill="#8a4a3a">后果：undo 表空间膨胀、版本链变长、快照读回溯变慢、history list 持续增长</text>
  <text x="48" y="376" font-size="9.5" fill="#c0392b" font-weight="700">对策：控制大事务时长、避免"开着事务不提交"、监控 history list length</text>
  <text x="48" y="396" font-size="8.6" fill="#6e6e73">锚点见正文：purge_sys / srv_purge_coordinator_thread / TRX_RSEG_N_SLOTS</text>
</svg>
