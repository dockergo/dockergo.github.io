<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="sl2" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="l2h" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="l2s" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c99a3a"/></marker>
  </defs>
  <rect width="900" height="360" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">SQL 层 ↔ 引擎层交接 · 读写路径对称</text>
  <text x="30" y="48" font-size="10.5" fill="#6e6e73">执行器只调 handler 虚函数；InnoDB 内部完成 B+树定位 + Buffer Pool 取页 + MVCC 判可见</text>

  <!-- 执行器 -->
  <rect x="60" y="80" width="200" height="200" rx="12" fill="#eef7f1" stroke="#8fcaa8" filter="url(#sl2)"/>
  <text x="160" y="104" font-size="11.5" font-weight="700" fill="#1c7a4d" text-anchor="middle">执行器（Server 层）</text>
  <rect x="80" y="120" width="160" height="52" rx="8" fill="#fff" stroke="#cfe6d6"/><text x="160" y="142" font-size="10" font-weight="600" fill="#1c7a4d" text-anchor="middle">读一行</text><text x="160" y="160" font-size="8.3" fill="#3c7a58" text-anchor="middle">ha_index_read_map / rnd_next</text>
  <rect x="80" y="184" width="160" height="52" rx="8" fill="#fff" stroke="#cfe6d6"/><text x="160" y="206" font-size="10" font-weight="600" fill="#1c7a4d" text-anchor="middle">写一行</text><text x="160" y="224" font-size="8.3" fill="#3c7a58" text-anchor="middle">ha_write_row</text>

  <!-- handler 边界虚线 -->
  <line x1="330" y1="70" x2="330" y2="300" stroke="#8fcaa8" stroke-width="2" stroke-dasharray="8 5"/>
  <text x="330" y="316" font-size="9" font-weight="600" fill="#1c7a4d" text-anchor="middle">handler API 边界</text>

  <!-- InnoDB -->
  <rect x="400" y="80" width="440" height="200" rx="12" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#sl2)"/>
  <text x="620" y="104" font-size="11.5" font-weight="700" fill="#8a6d3b" text-anchor="middle">InnoDB（存储引擎层）</text>
  <g text-anchor="middle">
    <rect x="420" y="120" width="190" height="60" rx="9" fill="#fff" stroke="#ecdcbf"/><text x="515" y="144" font-size="10" font-weight="600" fill="#1d1d1f">B+树定位</text><text x="515" y="162" font-size="8.3" fill="#b08535">btr_cur_search_to_nth_level</text>
    <rect x="630" y="120" width="190" height="60" rx="9" fill="#fff" stroke="#ecdcbf"/><text x="725" y="144" font-size="10" font-weight="600" fill="#1d1d1f">Buffer Pool 取页</text><text x="725" y="162" font-size="8.3" fill="#b08535">命中即内存、缺页读盘</text>
    <rect x="420" y="196" width="190" height="60" rx="9" fill="#fff" stroke="#ecdcbf"/><text x="515" y="220" font-size="10" font-weight="600" fill="#1d1d1f">MVCC 判可见</text><text x="515" y="238" font-size="8.3" fill="#b08535">ReadView + undo 版本链</text>
    <rect x="630" y="196" width="190" height="60" rx="9" fill="#fff" stroke="#ecdcbf"/><text x="725" y="220" font-size="10" font-weight="600" fill="#1d1d1f">返回行 / 写 redo·undo</text><text x="725" y="238" font-size="8.3" fill="#b08535">row_search_mvcc</text>
  </g>

  <line x1="260" y1="146" x2="420" y2="146" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#l2h)"/>
  <text x="340" y="138" font-size="8" fill="#2f9e6e" text-anchor="middle">读请求</text>
  <line x1="420" y1="210" x2="260" y2="210" stroke="#c99a3a" stroke-width="1.6" marker-end="url(#l2s)"/>
  <text x="340" y="224" font-size="8" fill="#b08535" text-anchor="middle">返回行数据</text>

  <text x="450" y="340" font-size="9.5" fill="#8a94a6" text-anchor="middle">锚点：ha_write_row `sql/handler.h:2437` · ha_index_read_map `sql/handler.h:2407` · row_search_mvcc `storage/innobase/row/row0sel.cc:4674` · btr_cur_search_to_nth_level `storage/innobase/btr/btr0cur.cc:745`</text>
</svg>
