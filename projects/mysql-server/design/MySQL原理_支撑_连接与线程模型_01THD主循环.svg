<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="c1" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="c1h" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
  </defs>
  <rect width="900" height="340" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">THD 会话对象与 do_command 命令主循环</text>
  <text x="30" y="48" font-size="10.5" fill="#6e6e73">一连接一 THD，逐条读命令→派发→返回，会话状态跨语句保持</text>

  <!-- THD -->
  <rect x="40" y="76" width="250" height="228" rx="12" fill="#eef2f7" stroke="#d4ddeb" filter="url(#c1)"/>
  <text x="165" y="100" font-size="12" font-weight="700" fill="#3f5573" text-anchor="middle">THD 会话对象</text>
  <text x="165" y="116" font-size="8" fill="#9aa8bd" text-anchor="middle">sql/sql_class.h:1465</text>
  <g text-anchor="middle" font-size="9.5">
    <rect x="58" y="128" width="214" height="30" rx="7" fill="#fff" stroke="#d4ddeb"/><text x="165" y="148" fill="#1d1d1f">当前语句 LEX / 查询结构</text>
    <rect x="58" y="164" width="214" height="30" rx="7" fill="#fff" stroke="#d4ddeb"/><text x="165" y="184" fill="#1d1d1f">事务状态 + 引擎事务句柄</text>
    <rect x="58" y="200" width="214" height="30" rx="7" fill="#fff" stroke="#d4ddeb"/><text x="165" y="220" fill="#1d1d1f">权限 security context</text>
    <rect x="58" y="236" width="214" height="30" rx="7" fill="#fff" stroke="#d4ddeb"/><text x="165" y="256" fill="#1d1d1f">NET 网络连接 + 诊断区</text>
  </g>
  <text x="165" y="288" font-size="8.5" fill="#6a7c96" text-anchor="middle">同连接多语句复用同一 THD</text>

  <!-- 主循环 -->
  <rect x="360" y="100" width="500" height="180" rx="12" fill="#f4f7fc" stroke="#cfe0f2" filter="url(#c1)"/>
  <text x="610" y="124" font-size="12" font-weight="700" fill="#5b7db1" text-anchor="middle">do_command 命令主循环</text>
  <g text-anchor="middle">
    <rect x="384" y="140" width="130" height="56" rx="9" fill="#fff" stroke="#cfe0f2"/><text x="449" y="164" font-size="10" font-weight="600" fill="#1d1d1f">① 读命令</text><text x="449" y="182" font-size="8" fill="#6e6e73">net_read</text>
    <rect x="540" y="140" width="130" height="56" rx="9" fill="#fff" stroke="#cfe0f2"/><text x="605" y="164" font-size="10" font-weight="600" fill="#5b7db1">② 派发</text><text x="605" y="182" font-size="8" fill="#6e6e73">dispatch_command</text>
    <rect x="696" y="140" width="140" height="56" rx="9" fill="#fff" stroke="#cfe0f2"/><text x="766" y="164" font-size="10" font-weight="600" fill="#1d1d1f">③ 执行+返回</text><text x="766" y="182" font-size="8" fill="#6e6e73">结果回送</text>
  </g>
  <line x1="514" y1="168" x2="540" y2="168" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#c1h)"/>
  <line x1="670" y1="168" x2="696" y2="168" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#c1h)"/>
  <!-- 回环 -->
  <path d="M766,196 L766,236 L449,236 L449,196" fill="none" stroke="#5b7db1" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#c1h)"/>
  <text x="610" y="252" font-size="8.5" fill="#5b7db1" text-anchor="middle">循环到下一条命令，直到 COM_QUIT / 断连</text>

  <line x1="290" y1="168" x2="360" y2="168" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#c1h)"/>
  <text x="325" y="160" font-size="8" fill="#2f9e6e" text-anchor="middle">绑定</text>
  <text x="450" y="322" font-size="9" fill="#8a94a6" text-anchor="middle">锚点：do_command `sql/sql_parse.cc:901` · dispatch_command `sql/sql_parse.cc:1218`</text>
</svg>
