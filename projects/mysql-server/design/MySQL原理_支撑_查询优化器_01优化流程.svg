<svg xmlns="http://www.w3.org/2000/svg" width="900" height="330" viewBox="0 0 900 330" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="o1" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="o1c" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
  </defs>
  <rect width="900" height="330" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">查询优化流程 · 语法树 → 执行计划 QEP</text>
  <text x="30" y="48" font-size="10.5" fill="#6e6e73">JOIN::optimize 驱动一系列变换，核心是 make_join_plan 枚举连接顺序 + 选访问路径</text>

  <g text-anchor="middle">
    <rect x="30" y="86" width="150" height="70" rx="10" fill="#f4f7fc" stroke="#cfe0f2" filter="url(#o1)"/>
    <text x="105" y="114" font-size="10.5" font-weight="600" fill="#1d1d1f">语法树</text><text x="105" y="132" font-size="8.3" fill="#6e6e73">解析器交来</text>

    <rect x="210" y="86" width="170" height="70" rx="10" fill="#f4f7fc" stroke="#cfe0f2" filter="url(#o1)"/>
    <text x="295" y="110" font-size="10.5" font-weight="700" fill="#5b7db1">前处理变换</text><text x="295" y="128" font-size="8.3" fill="#6e6e73">常量表 · 外连接化简</text><text x="295" y="144" font-size="8.3" fill="#6e6e73">WHERE 下推</text>

    <rect x="410" y="86" width="190" height="70" rx="10" fill="#eef2f7" stroke="#c9d6e8" filter="url(#o1)"/>
    <text x="505" y="110" font-size="10.5" font-weight="700" fill="#3f5573">make_join_plan（核心）</text><text x="505" y="128" font-size="8.3" fill="#5a6b82">枚举连接顺序</text><text x="505" y="144" font-size="8.3" fill="#5a6b82">每表选 best_access_path</text>

    <rect x="630" y="86" width="150" height="70" rx="10" fill="#f4f7fc" stroke="#cfe0f2" filter="url(#o1)"/>
    <text x="705" y="110" font-size="10.5" font-weight="600" fill="#5b7db1">去重/分组/排序</text><text x="705" y="128" font-size="8.3" fill="#6e6e73">GROUP/DISTINCT</text><text x="705" y="144" font-size="8.3" fill="#6e6e73">ORDER 优化</text>

    <rect x="810" y="86" width="60" height="70" rx="10" fill="#eef7f1" stroke="#8fcaa8" filter="url(#o1)"/>
    <text x="840" y="118" font-size="10" font-weight="700" fill="#1c7a4d">QEP</text><text x="840" y="136" font-size="7.5" fill="#3c7a58">执行计划</text>
  </g>
  <g stroke="#5b7db1" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#o1c)">
    <line x1="180" y1="121" x2="210" y2="121"/><line x1="380" y1="121" x2="410" y2="121"/>
    <line x1="600" y1="121" x2="630" y2="121"/><line x1="780" y1="121" x2="810" y2="121"/>
  </g>

  <!-- 引擎统计 -->
  <rect x="410" y="196" width="190" height="60" rx="10" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#o1)"/>
  <text x="505" y="220" font-size="10" font-weight="600" fill="#8a6d3b" text-anchor="middle">引擎统计信息</text>
  <text x="505" y="238" font-size="8.3" fill="#b08535" text-anchor="middle">行数 · 索引基数（经 handler 索要）</text>
  <line x1="505" y1="196" x2="505" y2="156" stroke="#c99a3a" stroke-width="1.5" marker-end="url(#o1c)"/>
  <text x="580" y="180" font-size="8" fill="#b08535" text-anchor="middle">喂给代价估算</text>

  <text x="450" y="290" font-size="10" fill="#4a4a4f" text-anchor="middle">优化器引擎无关：只向 handler 索要统计，不直接读数据 → 换引擎不改优化逻辑</text>
  <text x="450" y="312" font-size="9" fill="#8a94a6" text-anchor="middle">锚点：JOIN::optimize `sql/sql_optimizer.cc:138` · make_join_plan `:375` · optimize_distinct_group_order `:1111`</text>
</svg>
