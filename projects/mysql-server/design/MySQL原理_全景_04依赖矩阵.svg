<svg xmlns="http://www.w3.org/2000/svg" width="900" height="440" viewBox="0 0 900 440" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="900" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">依赖矩阵 · 接触面「一条 SQL」× 能力域</text>
  <text x="30" y="48" font-size="10.5" fill="#6e6e73">● 强依赖　◐ 部分依赖　空 弱/无　—— handler API 与 Buffer Pool 被依赖度最高</text>

  <!-- 表头 -->
  <g font-size="9.5" fill="#3a3a3c" text-anchor="middle">
    <text x="330" y="86" transform="rotate(-32 330 86)">连接/THD</text>
    <text x="410" y="86" transform="rotate(-32 410 86)">优化器</text>
    <text x="490" y="86" transform="rotate(-32 490 86)" font-weight="700" fill="#1c7a4d">handler缝</text>
    <text x="570" y="86" transform="rotate(-32 570 86)" font-weight="700" fill="#b0651f">BufferPool/B+树</text>
    <text x="650" y="86" transform="rotate(-32 650 86)">MVCC/undo</text>
    <text x="730" y="86" transform="rotate(-32 730 86)">redo/恢复</text>
    <text x="810" y="86" transform="rotate(-32 810 86)">binlog/复制</text>
  </g>

  <!-- 行 -->
  <g font-size="10" fill="#1d1d1f">
    <text x="40" y="122">读查询 SELECT（快照读）</text>
    <text x="40" y="158">写事务 INSERT/UPDATE/DELETE</text>
    <text x="40" y="194">当前读 SELECT ... FOR UPDATE</text>
    <text x="40" y="230">COMMIT 提交时刻</text>
    <text x="40" y="266">崩溃重启恢复</text>
    <text x="40" y="302">搭建主从复制</text>
  </g>

  <!-- 网格线 -->
  <g stroke="#e2e2e7" stroke-width="1">
    <line x1="290" y1="100" x2="850" y2="100"/>
    <line x1="290" y1="136" x2="850" y2="136"/><line x1="290" y1="172" x2="850" y2="172"/>
    <line x1="290" y1="208" x2="850" y2="208"/><line x1="290" y1="244" x2="850" y2="244"/>
    <line x1="290" y1="280" x2="850" y2="280"/><line x1="290" y1="316" x2="850" y2="316"/>
  </g>

  <!-- 单元格：列 x = 330,410,490,570,650,730,810 ; 行 y = 118,154,190,226,262,298 -->
  <g font-size="12" text-anchor="middle">
    <!-- SELECT 快照读 -->
    <text x="330" y="122" fill="#2f9e6e">●</text><text x="410" y="122" fill="#2f9e6e">●</text><text x="490" y="122" fill="#1c7a4d">●</text><text x="570" y="122" fill="#b0651f">●</text><text x="650" y="122" fill="#2f9e6e">●</text><text x="730" y="122" fill="#c9c9cf">◐</text><text x="810" y="122" fill="#e2e2e7">·</text>
    <!-- 写事务 -->
    <text x="330" y="158" fill="#2f9e6e">●</text><text x="410" y="158" fill="#2f9e6e">●</text><text x="490" y="158" fill="#1c7a4d">●</text><text x="570" y="158" fill="#b0651f">●</text><text x="650" y="158" fill="#2f9e6e">●</text><text x="730" y="158" fill="#2f9e6e">●</text><text x="810" y="158" fill="#c9963a">◐</text>
    <!-- 当前读 -->
    <text x="330" y="194" fill="#2f9e6e">●</text><text x="410" y="194" fill="#c9c9cf">◐</text><text x="490" y="194" fill="#1c7a4d">●</text><text x="570" y="194" fill="#b0651f">●</text><text x="650" y="194" fill="#2f9e6e">●</text><text x="730" y="194" fill="#c9c9cf">◐</text><text x="810" y="194" fill="#e2e2e7">·</text>
    <!-- COMMIT -->
    <text x="330" y="230" fill="#c9c9cf">◐</text><text x="410" y="230" fill="#e2e2e7">·</text><text x="490" y="230" fill="#1c7a4d">●</text><text x="570" y="230" fill="#c9c9cf">◐</text><text x="650" y="230" fill="#c9c9cf">◐</text><text x="730" y="230" fill="#2f9e6e">●</text><text x="810" y="230" fill="#8a5cae">●</text>
    <!-- 崩溃恢复 -->
    <text x="330" y="266" fill="#e2e2e7">·</text><text x="410" y="266" fill="#e2e2e7">·</text><text x="490" y="266" fill="#c9c9cf">◐</text><text x="570" y="266" fill="#b0651f">●</text><text x="650" y="266" fill="#2f9e6e">●</text><text x="730" y="266" fill="#d38236">●</text><text x="810" y="266" fill="#c9963a">◐</text>
    <!-- 复制 -->
    <text x="330" y="302" fill="#c9c9cf">◐</text><text x="410" y="302" fill="#e2e2e7">·</text><text x="490" y="302" fill="#c9c9cf">◐</text><text x="570" y="302" fill="#e2e2e7">·</text><text x="650" y="302" fill="#e2e2e7">·</text><text x="730" y="302" fill="#c9c9cf">◐</text><text x="810" y="302" fill="#8a5cae">●</text>
  </g>

  <!-- 高亮列：handler + bufferpool -->
  <rect x="470" y="100" width="40" height="216" fill="#1c7a4d" opacity="0.06"/>
  <rect x="550" y="100" width="40" height="216" fill="#b0651f" opacity="0.06"/>

  <text x="40" y="356" font-size="10.5" font-weight="600" fill="#1d1d1f">读法</text>
  <text x="40" y="376" font-size="9.5" fill="#6e6e73">每一行都必过 handler 缝（绿列全实），且几乎都落 Buffer Pool（琥珀列全实）——这两格塌了全盘皆停，故定 handler 缝为灵魂。</text>
  <text x="40" y="396" font-size="9.5" fill="#6e6e73">写事务是"全能力域联动"的最重路径：优化器→handler→B+树→MVCC→redo→（提交）binlog，牵动 2PC 组提交。</text>
  <text x="40" y="416" font-size="9.5" fill="#6e6e73">崩溃恢复独占"失败"路径（橙）：redo 重放 + double-write 修复 + undo 回滚，把系统拉回一致态。</text>
</svg>
