<svg xmlns="http://www.w3.org/2000/svg" width="900" height="350" viewBox="0 0 900 350" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="m2r" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="m2x" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8a5cae"/></marker>
  </defs>
  <rect width="900" height="350" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">主从复制 · 三线程模型（dump / I/O / SQL）</text>
  <text x="30" y="48" font-size="10.5" fill="#6e6e73">主库 dump 线程推 binlog → 从库 I/O 线程落 relay log → SQL 线程重放；GTID 标识每事务</text>

  <!-- 主库 -->
  <rect x="40" y="80" width="360" height="200" rx="12" fill="#eef7f1" stroke="#8fcaa8" filter="url(#m2r)"/>
  <text x="220" y="104" font-size="12" font-weight="700" fill="#1c7a4d" text-anchor="middle">主库 Master</text>
  <rect x="60" y="118" width="320" height="46" rx="8" fill="#fff" stroke="#cfe6d6"/><text x="220" y="140" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">事务提交 → 写 binlog</text><text x="220" y="156" font-size="8" fill="#3c7a58" text-anchor="middle">组提交落盘</text>
  <rect x="60" y="176" width="320" height="46" rx="8" fill="#faf6fb" stroke="#e4cdea"/><text x="220" y="198" font-size="10" font-weight="600" fill="#8944ab" text-anchor="middle">dump 线程（每从库一个）</text><text x="220" y="214" font-size="8" fill="#6e6e73" text-anchor="middle">流式推送 binlog 事件 · rpl_binlog_sender.cc</text>
  <rect x="60" y="234" width="320" height="34" rx="8" fill="#f6f6f8" stroke="#e2e2e7"/><text x="220" y="255" font-size="8.5" fill="#4a4a4f" text-anchor="middle">GTID 给每事务打全局唯一 ID（rpl_gtid_*.cc）</text>

  <!-- 从库 -->
  <rect x="500" y="80" width="360" height="200" rx="12" fill="#f4f7fc" stroke="#cfe0f2" filter="url(#m2r)"/>
  <text x="680" y="104" font-size="12" font-weight="700" fill="#5b7db1" text-anchor="middle">从库 Slave</text>
  <rect x="520" y="118" width="320" height="42" rx="8" fill="#fff" stroke="#cfe0f2"/><text x="680" y="138" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">① I/O 线程接收</text><text x="680" y="153" font-size="8" fill="#6e6e73" text-anchor="middle">原样写入本地 relay log（中继日志）</text>
  <rect x="520" y="170" width="320" height="42" rx="8" fill="#fff" stroke="#cfe0f2"/><text x="680" y="190" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">② relay log 中继日志</text><text x="680" y="205" font-size="8" fill="#6e6e73" text-anchor="middle">暂存待重放事件</text>
  <rect x="520" y="222" width="320" height="46" rx="8" fill="#eef7f1" stroke="#8fcaa8"/><text x="680" y="242" font-size="10" font-weight="600" fill="#1c7a4d" text-anchor="middle">③ SQL 线程重放（可多线程）</text><text x="680" y="258" font-size="8" fill="#3c7a58" text-anchor="middle">apply_event 逐个应用 · rpl_slave.cc</text>

  <!-- 推送箭头 -->
  <path d="M400,199 L500,139" fill="none" stroke="#8a5cae" stroke-width="1.8" marker-end="url(#m2x)"/>
  <text x="450" y="160" font-size="8.5" fill="#8a5cae" text-anchor="middle">推 binlog</text>
  <!-- 内部流转 -->
  <line x1="680" y1="160" x2="680" y2="170" stroke="#5b7db1" stroke-width="1.5" marker-end="url(#m2x)"/>
  <line x1="680" y1="212" x2="680" y2="222" stroke="#5b7db1" stroke-width="1.5" marker-end="url(#m2x)"/>

  <text x="450" y="308" font-size="9.5" fill="#4a4a4f" text-anchor="middle">默认异步复制：从库有延迟；多线程 apply 缓解单线程重放瓶颈；半同步/组复制可增强一致性</text>
  <text x="450" y="330" font-size="9" fill="#8a94a6" text-anchor="middle">锚点：dump `sql/rpl_binlog_sender.cc` · 从库 apply `sql/rpl_slave.cc` Relay_log_info · GTID `sql/rpl_gtid_*.cc`</text>
</svg>
