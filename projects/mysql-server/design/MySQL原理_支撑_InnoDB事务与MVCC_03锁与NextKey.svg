<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="lks" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="lkr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c0392b"/></marker>
  </defs>
  <rect width="960" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">当前读的行锁 · Next-Key = 记录锁 + 间隙锁 · 死锁检测</text>
  <text x="30" y="48" font-size="10.5" fill="#6e6e73">锁加在索引记录上；间隙锁封住空隙防幻读；等待成环即回滚代价小的一方</text>

  <!-- 数轴 -->
  <rect x="30" y="66" width="900" height="180" rx="13" fill="#fbf6ee" stroke="#ecdcbf" filter="url(#lks)"/>
  <text x="48" y="88" font-size="11.5" font-weight="700" fill="#9a6a1f">索引数轴：三种锁封住的范围（记录 id = 10 / 20 / 30）</text>
  <!-- axis line -->
  <line x1="80" y1="150" x2="900" y2="150" stroke="#8a94a6" stroke-width="1.5"/>
  <!-- records -->
  <g text-anchor="middle">
    <circle cx="230" cy="150" r="9" fill="#d9b98a" stroke="#9a6a1f"/><text x="230" y="176" font-size="10" fill="#1d1d1f">id=10</text>
    <circle cx="480" cy="150" r="9" fill="#d9b98a" stroke="#9a6a1f"/><text x="480" y="176" font-size="10" fill="#1d1d1f">id=20</text>
    <circle cx="730" cy="150" r="9" fill="#d9b98a" stroke="#9a6a1f"/><text x="730" y="176" font-size="10" fill="#1d1d1f">id=30</text>
  </g>
  <!-- 记录锁 -->
  <circle cx="480" cy="150" r="15" fill="none" stroke="#5b7db1" stroke-width="2.4"/>
  <text x="480" y="118" font-size="9.5" font-weight="700" fill="#3a5a8a" text-anchor="middle">记录锁 REC_NOT_GAP</text>
  <text x="480" y="132" font-size="8.5" fill="#6e6e73" text-anchor="middle">只锁 id=20 这一行</text>
  <!-- 间隙锁 -->
  <rect x="242" y="140" width="226" height="20" rx="10" fill="#eef3fb" stroke="#5b7db1" stroke-dasharray="4 3"/>
  <text x="355" y="207" font-size="9.5" font-weight="700" fill="#3a5a8a" text-anchor="middle">间隙锁 GAP：开区间 (10,20)</text>
  <text x="355" y="221" font-size="8.5" fill="#6e6e73" text-anchor="middle">封空隙，禁止插入 → 防幻读</text>
  <!-- next-key -->
  <rect x="492" y="138" width="250" height="24" rx="12" fill="#eef3fb" stroke="#5b7db1"/>
  <text x="615" y="207" font-size="9.5" font-weight="700" fill="#3a5a8a" text-anchor="middle">Next-Key：左开右闭 (20,30]</text>
  <text x="615" y="221" font-size="8.5" fill="#6e6e73" text-anchor="middle">= 间隙 (20,30) + 记录 30，RR 默认</text>

  <!-- 兼容矩阵 -->
  <rect x="30" y="262" width="380" height="160" rx="13" fill="#f7faff" stroke="#cfe0f2" filter="url(#lks)"/>
  <text x="48" y="284" font-size="11" font-weight="700" fill="#3a5a8a">行锁兼容矩阵（S/X）</text>
  <g font-size="10" text-anchor="middle">
    <rect x="130" y="296" width="120" height="26" fill="#eef3fb" stroke="#cfe0f2"/><text x="190" y="313" fill="#3a5a8a">持有 S</text>
    <rect x="250" y="296" width="120" height="26" fill="#eef3fb" stroke="#cfe0f2"/><text x="310" y="313" fill="#3a5a8a">持有 X</text>
    <rect x="48" y="322" width="82" height="34" fill="#eef3fb" stroke="#cfe0f2"/><text x="89" y="343" fill="#3a5a8a">请求 S</text>
    <rect x="130" y="322" width="120" height="34" fill="#eef7f1" stroke="#cfe0f2"/><text x="190" y="343" fill="#2f7a4f" font-weight="700">兼容 ✓</text>
    <rect x="250" y="322" width="120" height="34" fill="#fdeeec" stroke="#e0a49a"/><text x="310" y="343" fill="#c0392b" font-weight="700">冲突 ✗</text>
    <rect x="48" y="356" width="82" height="34" fill="#eef3fb" stroke="#cfe0f2"/><text x="89" y="377" fill="#3a5a8a">请求 X</text>
    <rect x="130" y="356" width="120" height="34" fill="#fdeeec" stroke="#e0a49a"/><text x="190" y="377" fill="#c0392b" font-weight="700">冲突 ✗</text>
    <rect x="250" y="356" width="120" height="34" fill="#fdeeec" stroke="#e0a49a"/><text x="310" y="377" fill="#c0392b" font-weight="700">冲突 ✗</text>
  </g>
  <text x="220" y="408" font-size="8.6" fill="#6e6e73" text-anchor="middle">读读并存(S+S)；有写(X)即互斥</text>

  <!-- 死锁 -->
  <rect x="430" y="262" width="500" height="160" rx="13" fill="#fdeeec" stroke="#e0a49a" filter="url(#lks)"/>
  <text x="448" y="284" font-size="11" font-weight="700" fill="#c0392b">死锁检测：等待图成环 → 回滚牺牲者</text>
  <g text-anchor="middle" font-size="11">
    <circle cx="560" cy="345" r="26" fill="#fff" stroke="#e0a49a" stroke-width="1.6"/><text x="560" y="350" fill="#c0392b" font-weight="700">T1</text>
    <circle cx="800" cy="345" r="26" fill="#fff" stroke="#e0a49a" stroke-width="1.6"/><text x="800" y="350" fill="#c0392b" font-weight="700">T2</text>
  </g>
  <path d="M588,332 C650,312 710,312 772,332" fill="none" stroke="#c0392b" stroke-width="1.6" marker-end="url(#lkr)"/>
  <path d="M772,358 C710,378 650,378 588,358" fill="none" stroke="#c0392b" stroke-width="1.6" marker-end="url(#lkr)"/>
  <text x="680" y="308" font-size="8.8" fill="#8a4a3a" text-anchor="middle">T1 等 T2 的锁</text>
  <text x="680" y="392" font-size="8.8" fill="#8a4a3a" text-anchor="middle">T2 又等 T1 的锁 → 成环</text>
  <text x="680" y="412" font-size="9" fill="#c0392b" text-anchor="middle" font-weight="700">检测器选 undo 量小者回滚，另一方继续</text>
</svg>
