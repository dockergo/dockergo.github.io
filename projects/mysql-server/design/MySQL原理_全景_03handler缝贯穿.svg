<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="s3" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="h3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="p3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8a5cae"/></marker>
  </defs>
  <rect width="900" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">handler API 缝贯穿环 · 灵魂：引擎无关 × 事务一致的交汇点</text>
  <text x="30" y="48" font-size="10.5" fill="#6e6e73">执行器每读写一行都调 handler 虚函数；提交时 binlog 与 redo 靠两阶段提交（2PC）对账</text>

  <!-- 执行器 -->
  <rect x="60" y="72" width="220" height="70" rx="11" fill="#f4f7fc" stroke="#cfe0f2" filter="url(#s3)"/>
  <text x="170" y="102" font-size="11.5" font-weight="700" fill="#5b7db1" text-anchor="middle">执行器 Executor</text>
  <text x="170" y="122" font-size="9" fill="#6e6e73" text-anchor="middle">火山模型逐行迭代</text>

  <!-- handler 实例 -->
  <rect x="340" y="72" width="220" height="70" rx="11" fill="#eef7f1" stroke="#8fcaa8" stroke-width="1.5" filter="url(#s3)"/>
  <text x="450" y="98" font-size="11.5" font-weight="700" fill="#1c7a4d" text-anchor="middle">handler 实例（每表）</text>
  <text x="450" y="116" font-size="8.7" fill="#3c7a58" text-anchor="middle">ha_write_row / index_read_map</text>
  <text x="450" y="132" font-size="8.7" fill="#3c7a58" text-anchor="middle">ha_external_lock（事务边界）</text>

  <!-- handlerton -->
  <rect x="620" y="72" width="220" height="70" rx="11" fill="#eef7f1" stroke="#8fcaa8" stroke-width="1.5" filter="url(#s3)"/>
  <text x="730" y="98" font-size="11.5" font-weight="700" fill="#1c7a4d" text-anchor="middle">handlerton（每引擎单例）</text>
  <text x="730" y="116" font-size="8.7" fill="#3c7a58" text-anchor="middle">create → 产出 handler 实例</text>
  <text x="730" y="132" font-size="8.7" fill="#3c7a58" text-anchor="middle">commit / prepare / rollback</text>

  <line x1="280" y1="107" x2="340" y2="107" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#h3)"/>
  <text x="310" y="100" font-size="8" fill="#2f9e6e" text-anchor="middle">调虚函数</text>
  <line x1="620" y1="107" x2="560" y2="107" stroke="#3c7a58" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#h3)"/>
  <text x="590" y="100" font-size="8" fill="#3c7a58" text-anchor="middle">create</text>

  <!-- InnoDB 实现 -->
  <rect x="340" y="176" width="220" height="60" rx="11" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#s3)"/>
  <text x="450" y="200" font-size="11" font-weight="600" fill="#8a6d3b" text-anchor="middle">InnoDB 实现 ha_innobase</text>
  <text x="450" y="218" font-size="8.5" fill="#b08535" text-anchor="middle">row_search_mvcc / innobase_commit</text>
  <line x1="450" y1="142" x2="450" y2="176" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#h3)"/>

  <!-- 2PC 提交序列 -->
  <rect x="40" y="270" width="820" height="150" rx="14" fill="#fff7f1" stroke="#f0d4b8"/>
  <text x="58" y="292" font-size="12" font-weight="700" fill="#b0651f">提交时刻 · 两阶段提交（2PC）+ 组提交：binlog（Server）与 redo（引擎）一致</text>
  <g text-anchor="middle">
    <rect x="60" y="306" width="170" height="60" rx="9" fill="#fff" stroke="#f0d4b8"/><text x="145" y="330" font-size="10" font-weight="600" fill="#1d1d1f">① Prepare</text><text x="145" y="348" font-size="8.3" fill="#6e6e73">引擎写 redo(prepare)</text>
    <rect x="250" y="306" width="170" height="60" rx="9" fill="#faf6fb" stroke="#e4cdea"/><text x="335" y="330" font-size="10" font-weight="600" fill="#8944ab">② Flush binlog</text><text x="335" y="348" font-size="8.3" fill="#6e6e73">写 binlog 事件</text>
    <rect x="440" y="306" width="170" height="60" rx="9" fill="#faf6fb" stroke="#e4cdea"/><text x="525" y="330" font-size="10" font-weight="600" fill="#8944ab">③ Sync binlog</text><text x="525" y="348" font-size="8.3" fill="#6e6e73">组提交合并 fsync</text>
    <rect x="630" y="306" width="170" height="60" rx="9" fill="#fff" stroke="#f0d4b8"/><text x="715" y="330" font-size="10" font-weight="600" fill="#1d1d1f">④ Commit</text><text x="715" y="348" font-size="8.3" fill="#6e6e73">引擎写 redo(commit)</text>
  </g>
  <line x1="230" y1="336" x2="250" y2="336" stroke="#8a5cae" stroke-width="1.5" marker-end="url(#p3)"/>
  <line x1="420" y1="336" x2="440" y2="336" stroke="#8a5cae" stroke-width="1.5" marker-end="url(#p3)"/>
  <line x1="610" y1="336" x2="630" y2="336" stroke="#8a5cae" stroke-width="1.5" marker-end="url(#p3)"/>
  <text x="58" y="392" font-size="9.5" fill="#6e6e73">锚点：ha_commit_trans `sql/handler.cc:1671`（tc_log->prepare `:1792` → commit `:1807`）· ordered_commit `sql/binlog.cc:9520`</text>
  <text x="58" y="410" font-size="9.5" fill="#6e6e73">崩溃恢复据此判定：redo 有 prepare 但 binlog 无记录 → 回滚；binlog 已记 → 提交（保证主从一致）</text>

  <text x="450" y="452" font-size="10" fill="#4a4a4f" text-anchor="middle">这条缝是全库灵魂：向上给 Server 层"引擎无关"的统一接口，向下靠 2PC 兑现"双日志一致"的事务保证</text>
  <text x="450" y="474" font-size="9" fill="#8a94a6" text-anchor="middle">丢事件不致命：崩溃后按 redo/binlog 状态重放收敛，与 K8s reconcile 的"最终一致"思想同构</text>
</svg>
