<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="500" viewBox="0 0 1040 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="1040" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Trino 调度策略 · SchedulingPolicy 四型 × 队列实现</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">资源组内"下一个跑谁":子组队列 + 查询队列各按策略选取;切换策略会迁移已有条目</text>

  <!-- table -->
  <rect x="30" y="72" width="980" height="240" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <g font-size="9">
    <!-- header -->
    <rect x="40" y="82" width="220" height="36" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="150" y="105" text-anchor="middle" font-weight="700" fill="#1b2a4a">SchedulingPolicy</text>
    <rect x="264" y="82" width="240" height="36" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="384" y="105" text-anchor="middle" font-weight="700" fill="#1b2a4a">子组队列</text>
    <rect x="508" y="82" width="240" height="36" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="628" y="105" text-anchor="middle" font-weight="700" fill="#1b2a4a">查询队列</text>
    <rect x="752" y="82" width="248" height="36" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="876" y="105" text-anchor="middle" font-weight="700" fill="#1b2a4a">语义</text>

    <!-- FAIR -->
    <rect x="40" y="122" width="220" height="42" rx="7" fill="#eafaf1" stroke="#bfe0cd"/><text x="150" y="148" text-anchor="middle" font-weight="700" fill="#12402a">FAIR（默认）</text>
    <rect x="264" y="122" width="240" height="42" rx="7" fill="#fff" stroke="#ececf1"/><text x="384" y="148" text-anchor="middle" fill="#4b4b50">FifoQueue</text>
    <rect x="508" y="122" width="240" height="42" rx="7" fill="#fff" stroke="#ececf1"/><text x="628" y="148" text-anchor="middle" fill="#4b4b50">FifoQueue</text>
    <rect x="752" y="122" width="248" height="42" rx="7" fill="#fff" stroke="#ececf1"/><text x="876" y="148" text-anchor="middle" fill="#4b4b50">先到先服务(插入序)</text>

    <!-- WEIGHTED -->
    <rect x="40" y="168" width="220" height="42" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="150" y="194" text-anchor="middle" font-weight="700" fill="#1b2a4a">WEIGHTED</text>
    <rect x="264" y="168" width="240" height="42" rx="7" fill="#fff" stroke="#ececf1"/><text x="384" y="194" text-anchor="middle" fill="#4b4b50">StochasticPriorityQueue</text>
    <rect x="508" y="168" width="240" height="42" rx="7" fill="#fff" stroke="#ececf1"/><text x="628" y="194" text-anchor="middle" fill="#4b4b50">StochasticPriorityQueue</text>
    <rect x="752" y="168" width="248" height="42" rx="7" fill="#fff" stroke="#ececf1"/><text x="876" y="189" text-anchor="middle" fill="#4b4b50">按权重随机抽签</text><text x="876" y="203" text-anchor="middle" font-size="8" fill="#93762e">Fenwick 树,权重=票数</text>

    <!-- WEIGHTED_FAIR -->
    <rect x="40" y="214" width="220" height="42" rx="7" fill="#f5faf6" stroke="#cfe6d5"/><text x="150" y="240" text-anchor="middle" font-weight="700" fill="#2c5a3a">WEIGHTED_FAIR</text>
    <rect x="264" y="214" width="240" height="42" rx="7" fill="#fff" stroke="#ececf1"/><text x="384" y="240" text-anchor="middle" fill="#4b4b50">WeightedFairQueue</text>
    <rect x="508" y="214" width="240" height="42" rx="7" fill="#fff" stroke="#ececf1"/><text x="628" y="240" text-anchor="middle" fill="#4b4b50">IndexedPriorityQueue</text>
    <rect x="752" y="214" width="248" height="42" rx="7" fill="#fff" stroke="#ececf1"/><text x="876" y="235" text-anchor="middle" fill="#4b4b50">按 share/utilization 比</text><text x="876" y="249" text-anchor="middle" font-size="8" fill="#2f6f4f">最偏离期望份额的先跑</text>

    <!-- QUERY_PRIORITY -->
    <rect x="40" y="260" width="220" height="42" rx="7" fill="#faf4fb" stroke="#e2d2ee"/><text x="150" y="286" text-anchor="middle" font-weight="700" fill="#5a3d78">QUERY_PRIORITY</text>
    <rect x="264" y="260" width="240" height="42" rx="7" fill="#fff" stroke="#ececf1"/><text x="384" y="286" text-anchor="middle" fill="#4b4b50">IndexedPriorityQueue</text>
    <rect x="508" y="260" width="240" height="42" rx="7" fill="#fff" stroke="#ececf1"/><text x="628" y="286" text-anchor="middle" fill="#4b4b50">IndexedPriorityQueue</text>
    <rect x="752" y="260" width="248" height="42" rx="7" fill="#fff" stroke="#ececf1"/><text x="876" y="281" text-anchor="middle" fill="#4b4b50">按查询优先级</text><text x="876" y="295" text-anchor="middle" font-size="8" fill="#7a5a95">强制所有子组也 QUERY_PRIORITY</text>
  </g>

  <!-- queue impls -->
  <rect x="30" y="332" width="980" height="90" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="354" font-size="11" font-weight="700" fill="#2c5a3a">队列实现（UpdateablePriorityQueue）</text>
  <text x="46" y="376" font-size="9" fill="#2f6f4f">· FifoQueue：LinkedHashSet,忽略优先级 · IndexedPriorityQueue：TreeSet 支撑,O(1) contains/O(log n) remove</text>
  <text x="46" y="394" font-size="9" fill="#2f6f4f">· StochasticPriorityQueue：Fenwick 树按票数(权重)随机抽 · WeightedFairQueue：按 Usage(share,utilization) 选最少利用的</text>
  <text x="46" y="412" font-size="9" fill="#93762e">setSchedulingPolicy 切换时把旧队列条目 drain 进新队列类型(不丢查询)</text>

  <rect x="30" y="432" width="980" height="56" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="454" font-size="10.5" font-weight="700" fill="#1d1d1f">用途</text>
  <text x="46" y="474" font-size="9" fill="#6e6e73">多租户隔离：给不同团队/业务分不同资源组,FAIR 保公平、WEIGHTED 按重要性倾斜、QUERY_PRIORITY 保高优先查询插队。默认 FAIR。</text>
</svg>
