<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1040" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Trino Spooling Exchange · 中间结果落外部存储 + committed 去重</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">TASK 策略下 stage 间不走直连,经 ExchangeManager SPI 落外部存储;去重靠 committed 标记</text>

  <!-- write path -->
  <rect x="30" y="72" width="470" height="200" rx="13" fill="#faf4fb" stroke="#e2d2ee"/>
  <text x="46" y="94" font-size="11" font-weight="700" fill="#5a3d78">写路径（上游 task）</text>
  <rect x="50" y="108" width="440" height="44" rx="8" fill="#fff" stroke="#e2d2ee"/><text x="64" y="128" font-size="9" font-weight="600" fill="#5a3d78">ExchangeSink.add(partitionId, Slice)</text><text x="64" y="144" font-size="8.5" fill="#7a5a95">SpoolingExchangeOutputBuffer 缓冲后写出</text>
  <rect x="50" y="160" width="440" height="44" rx="8" fill="#fff" stroke="#e2d2ee"/><text x="64" y="180" font-size="9" font-weight="600" fill="#5a3d78">FileSystemExchangeSink</text><text x="64" y="196" font-size="8.5" fill="#7a5a95">每分区写成 &lt;partitionId&gt;_&lt;n&gt;.data 文件</text>
  <rect x="50" y="212" width="440" height="50" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="64" y="232" font-size="9" font-weight="600" fill="#12402a">finish → 写 "committed" 标记文件</text><text x="64" y="250" font-size="8.5" fill="#2f6f4f">abort → 删输出目录（重试的失败 attempt 无 committed）</text>

  <!-- storage -->
  <rect x="530" y="72" width="480" height="200" rx="13" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="546" y="94" font-size="11" font-weight="700" fill="#5a3410">外部存储（ExchangeManager SPI）</text>
  <rect x="546" y="108" width="448" height="44" rx="8" fill="#fdf6ea" stroke="#e8cf9a"/><text x="560" y="128" font-size="9" font-weight="600" fill="#5a3410">FileSystemExchangeStorage</text><text x="560" y="144" font-size="8.5" fill="#93762e">本地盘 / S3;createWriter/Reader/EmptyFile(标记)</text>
  <g font-size="8.5" text-anchor="middle">
    <rect x="546" y="160" width="140" height="46" rx="7" fill="#fff" stroke="#e8cf9a"/><text x="616" y="180" fill="#5a3410">attempt 0 目录</text><text x="616" y="196" fill="#b1483a">无 committed(失败)</text>
    <rect x="700" y="160" width="140" height="46" rx="7" fill="#fff" stroke="#e8cf9a"/><text x="770" y="180" fill="#5a3410">attempt 1 目录</text><text x="770" y="196" fill="#12402a">有 committed ✓</text>
    <rect x="854" y="160" width="140" height="46" rx="7" fill="#f7f7f9" stroke="#ececf1"/><text x="924" y="180" fill="#6e6e73">.data 文件</text><text x="924" y="196" fill="#6e6e73">序列化 Page</text>
  </g>
  <rect x="546" y="214" width="448" height="48" rx="8" fill="#fff" stroke="#e8cf9a"/><text x="560" y="234" font-size="9" font-weight="600" fill="#5a3410">exchange-manager.properties 配置</text><text x="560" y="250" font-size="8.5" fill="#93762e">exchange-manager.name=filesystem + 路径;未配 → EXCHANGE_MANAGER_NOT_CONFIGURED</text>

  <!-- read path -->
  <rect x="30" y="290" width="980" height="130" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="312" font-size="11" font-weight="700" fill="#2c5a3a">读路径（下游 task）+ 去重</text>
  <g font-size="8.8" text-anchor="middle">
    <rect x="46" y="326" width="280" height="50" rx="9" fill="#fff" stroke="#cfe6d5"/><text x="186" y="346" font-weight="600" fill="#2c5a3a">ExchangeSource.read</text><text x="186" y="364" fill="#2f6f4f">从暂存读 Slice → 反序列化 Page</text>
    <rect x="366" y="326" width="300" height="50" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="516" y="346" font-weight="600" fill="#12402a">忽略无 committed 标记的目录</text><text x="516" y="364" fill="#2f6f4f">→ 重试的失败 attempt 输出被跳过(去重核心)</text>
    <rect x="706" y="326" width="288" height="50" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/><text x="850" y="346" font-weight="600" fill="#274a78">只读 committed 的那份</text><text x="850" y="364" fill="#5b7db1">保证幂等:同分区多次重试结果不重复</text>
  </g>
  <line x1="326" y1="351" x2="366" y2="351" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="666" y1="351" x2="706" y2="351" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="46" y="402" font-size="8.5" fill="#6e6e73">SPI 术语：SPI 自称"external exchange";引擎内部叫"spooling exchange"(SpoolingExchangeInput/DataSource/OutputBuffer)——同一东西两层叫法</text>

  <rect x="30" y="432" width="980" height="72" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="454" font-size="10" font-weight="700" fill="#1d1d1f">要点</text>
  <text x="46" y="474" font-size="9" fill="#6e6e73">· 为什么要暂存：task 失败重试时,下游必须能重新拿到上游输出——直连流式做不到(上游 task 已亡),故落外部存储</text>
  <text x="46" y="492" font-size="9" fill="#b1483a">· committed 标记 = 事务性可见:只有完整写完并 commit 的 attempt 才对下游可见,天然解决"重试产生多份"的去重</text>
</svg>
