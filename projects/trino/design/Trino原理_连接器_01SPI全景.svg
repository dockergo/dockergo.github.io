<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="640" viewBox="0 0 1080 640" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="640" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Trino 连接器 SPI 全景 · Connector 的五大提供者</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">一个 catalog 绑一个 Connector 实例;向引擎交付元数据/split/读/写/事务五类能力</text>

  <!-- engine side -->
  <rect x="30" y="72" width="300" height="500" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="94" font-size="11" font-weight="700" fill="#1b2a4a">引擎侧（装配与路由）</text>
  <rect x="50" y="108" width="260" height="60" rx="9" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="180" y="130" text-anchor="middle" font-size="10" font-weight="600" fill="#274a78">CatalogManager</text><text x="180" y="148" text-anchor="middle" font-size="8.5" fill="#5b7db1">catalog.config-dir/*.properties</text><text x="180" y="162" text-anchor="middle" font-size="8.5" fill="#5b7db1">catalog 名 → Connector 实例</text>
  <rect x="50" y="178" width="260" height="60" rx="9" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="180" y="200" text-anchor="middle" font-size="10" font-weight="600" fill="#274a78">MetadataManager</text><text x="180" y="218" text-anchor="middle" font-size="8.5" fill="#5b7db1">QualifiedObjectName 路由</text><text x="180" y="232" text-anchor="middle" font-size="8.5" fill="#5b7db1">→ 对应连接器 ConnectorMetadata</text>
  <rect x="50" y="248" width="260" height="56" rx="9" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="180" y="270" text-anchor="middle" font-size="10" font-weight="600" fill="#274a78">ConnectorManager</text><text x="180" y="288" text-anchor="middle" font-size="8.5" fill="#5b7db1">ConnectorFactory.create(配置)</text>
  <rect x="50" y="320" width="260" height="240" rx="9" fill="#fff" stroke="#bcd0ec"/>
  <text x="180" y="342" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1b2a4a">一次查询可跨多 catalog</text>
  <text x="66" y="366" font-size="8.5" fill="#5b7db1">hive.orders JOIN mysql.customer</text>
  <text x="66" y="384" font-size="8.5" fill="#5b7db1">→ 两个 Connector 各自读各自的源</text>
  <text x="66" y="402" font-size="8.5" fill="#5b7db1">→ 引擎侧统一成 Page 后 Join</text>
  <rect x="66" y="416" width="228" height="130" rx="8" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="80" y="436" font-size="8.5" font-weight="600" fill="#4b4b50">连接器举例</text>
  <text x="80" y="454" font-size="8" fill="#6e6e73">Hive / Iceberg / Delta / Hudi</text>
  <text x="80" y="471" font-size="8" fill="#6e6e73">MySQL / PostgreSQL / Oracle</text>
  <text x="80" y="488" font-size="8" fill="#6e6e73">Cassandra / MongoDB / ES</text>
  <text x="80" y="505" font-size="8" fill="#6e6e73">Kafka / TPCH / JMX / system</text>
  <text x="80" y="528" font-size="8" fill="#93762e">各自实现同一套 SPI 接口</text>

  <!-- connector SPI -->
  <rect x="360" y="72" width="690" height="500" rx="13" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="376" y="94" font-size="11" font-weight="700" fill="#5a3410">Connector 接口 · 五大提供者</text>

  <rect x="380" y="108" width="650" height="80" rx="10" fill="#fdf6ea" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="396" y="130" font-size="10.5" font-weight="700" fill="#5a3410">① getMetadata → ConnectorMetadata</text>
  <text x="396" y="150" font-size="8.8" fill="#93762e">列库/表/列、表统计(供 CBO)、以及全部下推方法 apply*(filter/projection/aggregation/limit/topN/join)</text>
  <text x="396" y="168" font-size="8.8" fill="#93762e">是最重的接口——元信息 + 下推能力都在这</text>

  <rect x="380" y="198" width="650" height="66" rx="10" fill="#fdf6ea" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="396" y="220" font-size="10.5" font-weight="700" fill="#5a3410">② getSplitManager → ConnectorSplitManager</text>
  <text x="396" y="240" font-size="8.8" fill="#93762e">getSplits(表句柄) → ConnectorSplitSource（可异步分批产 split）</text>
  <text x="396" y="256" font-size="8.8" fill="#93762e">决定"一次扫描拆成几片、每片描述什么"——并行度的源头</text>

  <rect x="380" y="274" width="650" height="66" rx="10" fill="#fdf6ea" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="396" y="296" font-size="10.5" font-weight="700" fill="#5a3410">③ getPageSourceProvider → ConnectorPageSource</text>
  <text x="396" y="316" font-size="8.8" fill="#93762e">把一个 split 读成列式 Page（getNextSourcePage → SourcePage → Page）</text>
  <text x="396" y="332" font-size="8.8" fill="#93762e">读取时应用下推谓词 + 动态过滤裁剪</text>

  <rect x="380" y="350" width="650" height="60" rx="10" fill="#fdf6ea" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="396" y="372" font-size="10.5" font-weight="700" fill="#5a3410">④ getPageSinkProvider → ConnectorPageSink</text>
  <text x="396" y="392" font-size="8.8" fill="#93762e">写入路径：INSERT / CTAS / MERGE 下推给连接器落库</text>

  <rect x="380" y="420" width="650" height="60" rx="10" fill="#fdf6ea" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="396" y="442" font-size="10.5" font-weight="700" fill="#5a3410">⑤ getTransactionHandle → ConnectorTransactionHandle</text>
  <text x="396" y="462" font-size="8.8" fill="#93762e">连接器级事务句柄（每查询/每语句范围）——引擎协调,语义由连接器实现</text>

  <rect x="380" y="490" width="650" height="70" rx="10" fill="#fff" stroke="#e8cf9a"/>
  <text x="396" y="512" font-size="9.5" font-weight="700" fill="#5a3410">数据流向</text>
  <text x="396" y="531" font-size="8.5" fill="#93762e">读：SplitManager 拆 split → PageSource 逐 split 读成 Page → 喂给引擎算子</text>
  <text x="396" y="548" font-size="8.5" fill="#93762e">写：引擎算子产 Page → PageSink 落外部源 → 连接器返回 OutputMetadata</text>

  <line x1="330" y1="140" x2="380" y2="148" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
</svg>
