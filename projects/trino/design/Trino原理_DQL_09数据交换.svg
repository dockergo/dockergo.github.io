<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="700" viewBox="0 0 1100 700" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1100" height="700" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Trino Exchange · stage 间数据移动（流式直连 vs FTE 暂存）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">传输方式运行期按 RetryPolicy 决定,不在计划里定死;发送侧分区去向由 ExchangeNode.Type 决定</text>

  <!-- streaming path -->
  <rect x="30" y="70" width="1040" height="200" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="92" font-size="11.5" font-weight="700" fill="#1b2a4a">① 流式直连（RetryPolicy = NONE / QUERY · PipelinedQueryScheduler）</text>
  <g font-size="8.8" text-anchor="middle">
    <rect x="46" y="106" width="220" height="120" rx="9" fill="#f5faf6" stroke="#cfe6d5"/><text x="156" y="126" font-size="9.5" font-weight="700" fill="#2c5a3a">上游 Task（发送侧）</text><text x="156" y="146" fill="#2f6f4f">Operator 输出 Page</text><text x="156" y="164" fill="#2f6f4f">→ 序列化进 OutputBuffer</text><rect x="60" y="176" width="192" height="40" rx="7" fill="#fff" stroke="#cfe6d5"/><text x="156" y="193" fill="#2c5a3a">PartitionedOutputBuffer</text><text x="156" y="208" font-size="7.5" fill="#2f6f4f">按分区攒 Page 等下游拉</text>
    <rect x="440" y="106" width="220" height="120" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/><text x="550" y="126" font-size="9.5" font-weight="700" fill="#274a78">HTTP 拉取</text><text x="550" y="146" fill="#5b7db1">HttpPageBufferClient</text><text x="550" y="164" fill="#5b7db1">GET /results/{buffer}/{token}</text><text x="550" y="182" fill="#5b7db1">翻 token + acknowledge 释放</text><text x="550" y="200" fill="#5b7db1">完成时 DELETE</text>
    <rect x="834" y="106" width="220" height="120" rx="9" fill="#f5faf6" stroke="#cfe6d5"/><text x="944" y="126" font-size="9.5" font-weight="700" fill="#2c5a3a">下游 Task（接收侧）</text><text x="944" y="146" fill="#2f6f4f">ExchangeOperator</text><text x="944" y="164" fill="#2f6f4f">DirectExchangeClient.pollPage</text><text x="944" y="182" fill="#2f6f4f">反序列化 → Page</text><text x="944" y="200" fill="#2f6f4f">喂给本 task 算子链</text>
  </g>
  <line x1="266" y1="166" x2="440" y2="166" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="660" y1="166" x2="834" y2="166" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="353" y="158" text-anchor="middle" font-size="8" fill="#a1a1a6">HTTP GET</text>
  <text x="747" y="158" text-anchor="middle" font-size="8" fill="#a1a1a6">Page(Slice)</text>
  <rect x="46" y="234" width="1008" height="28" rx="7" fill="#fff" stroke="#bcd0ec"/><text x="60" y="252" font-size="8.5" fill="#1b2a4a">特点：task 到 task 直连、无落盘;上游挂了下游拿不到数据 → 整查询失败重来(QUERY 策略在 PipelinedQueryScheduler 内整查询重试)</text>

  <!-- FTE path -->
  <rect x="30" y="282" width="1040" height="180" rx="13" fill="#faf4fb" stroke="#e2d2ee"/>
  <text x="46" y="304" font-size="11.5" font-weight="700" fill="#5a3d78">② 溢出暂存 spooling（RetryPolicy = TASK · FTE · EventDrivenFaultTolerantQueryScheduler）</text>
  <g font-size="8.8" text-anchor="middle">
    <rect x="46" y="318" width="240" height="110" rx="9" fill="#fff" stroke="#e2d2ee"/><text x="166" y="338" font-size="9.5" font-weight="700" fill="#5a3d78">上游 Task</text><text x="166" y="358" fill="#7a5a95">ExchangeSink.add(partition,Slice)</text><text x="166" y="376" fill="#7a5a95">SpoolingExchangeOutputBuffer</text><text x="166" y="396" fill="#7a5a95">每 attempt 一个 sink 实例</text><text x="166" y="414" fill="#7a5a95">(按 attempt 去重)</text>
    <rect x="430" y="318" width="240" height="110" rx="9" fill="#fff7e6" stroke="#e8cf9a"/><text x="550" y="338" font-size="9.5" font-weight="700" fill="#5a3410">ExchangeManager SPI</text><text x="550" y="358" fill="#93762e">外部存储：文件系统 / S3</text><text x="550" y="376" fill="#93762e">写 .data 文件 + committed 标记</text><text x="550" y="396" fill="#93762e">exchange-manager.properties 配</text><text x="550" y="414" fill="#93762e">未配则 EXCHANGE_MANAGER_NOT_CONFIGURED</text>
    <rect x="814" y="318" width="240" height="110" rx="9" fill="#fff" stroke="#e2d2ee"/><text x="934" y="338" font-size="9.5" font-weight="700" fill="#5a3d78">下游 Task</text><text x="934" y="358" fill="#7a5a95">ExchangeSource.read</text><text x="934" y="376" fill="#7a5a95">从暂存读 Slice</text><text x="934" y="396" fill="#7a5a95">忽略无 committed 标记的目录</text><text x="934" y="414" fill="#7a5a95">→ 天然去重</text>
  </g>
  <line x1="286" y1="373" x2="430" y2="373" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="670" y1="373" x2="814" y2="373" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="358" y="365" text-anchor="middle" font-size="8" fill="#a1a1a6">写暂存</text>
  <text x="742" y="365" text-anchor="middle" font-size="8" fill="#a1a1a6">读暂存</text>
  <text x="46" y="452" font-size="8.5" fill="#5a3d78">特点：数据落外部存储 → 单个 task 失败只重跑该 task(不整查询重来);代价是落盘开销。SPI 叫"external exchange",引擎内部叫"spooling exchange"。</text>

  <!-- send-side partition targets -->
  <rect x="30" y="474" width="1040" height="146" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="496" font-size="11.5" font-weight="700" fill="#2c5a3a">发送侧 = 分区去向（ExchangeNode.Type → OutputBuffer 实现）</text>
  <g font-size="8.8">
    <rect x="46" y="508" width="330" height="100" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="60" y="528" font-size="9.5" font-weight="700" fill="#1b2a4a">REPARTITION（hash 重分区）</text><text x="60" y="547" fill="#5b7db1">PagePartitioner 按 PartitionFunction 逐行算分区</text><text x="60" y="563" fill="#5b7db1">→ PartitionedOutputBuffer（每分区一 ClientBuffer）</text><text x="60" y="581" fill="#5b7db1">用途：GROUP BY / PARTITIONED Join 的 key 重分布</text><text x="60" y="599" fill="#5b7db1">HashBucketFunction 决定行→分区</text>
    <rect x="386" y="508" width="330" height="100" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="400" y="528" font-size="9.5" font-weight="700" fill="#12402a">REPLICATE（广播）</text><text x="400" y="547" fill="#2f6f4f">BroadcastOutputBuffer</text><text x="400" y="563" fill="#2f6f4f">每个 Page 拷到所有下游 buffer</text><text x="400" y="581" fill="#2f6f4f">用途：广播小表给 REPLICATED Join</text>
    <rect x="726" y="508" width="330" height="100" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/><text x="740" y="528" font-size="9.5" font-weight="700" fill="#274a78">GATHER（汇聚）/ ARBITRARY</text><text x="740" y="547" fill="#5b7db1">GATHER → 单分区输出,汇到单点</text><text x="740" y="563" fill="#5b7db1">ARBITRARY → ArbitraryOutputBuffer(先到先取)</text><text x="740" y="581" fill="#5b7db1">用途：最终结果汇聚 / round-robin 分发</text>
  </g>
  <rect x="30" y="628" width="1040" height="0" fill="none"/>
</svg>
