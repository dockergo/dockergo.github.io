<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="480" viewBox="0 0 1040 480" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="1040" height="480" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Trino QUERY vs TASK 重试 · 粒度与代价对比</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">选型：中短查询用 QUERY(简单),长 ETL/大查询用 TASK(粒度细但需暂存)</text>

  <!-- table -->
  <rect x="30" y="72" width="980" height="300" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <g font-size="9">
    <rect x="40" y="82" width="200" height="34" rx="7" fill="#f7f7f9" stroke="#ececf1"/><text x="140" y="104" text-anchor="middle" font-weight="700" fill="#1d1d1f">维度</text>
    <rect x="244" y="82" width="380" height="34" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="434" y="104" text-anchor="middle" font-weight="700" fill="#1b2a4a">QUERY</text>
    <rect x="628" y="82" width="382" height="34" rx="7" fill="#faf4fb" stroke="#e2d2ee"/><text x="819" y="104" text-anchor="middle" font-weight="700" fill="#5a3d78">TASK</text>

    <rect x="40" y="120" width="200" height="36" rx="6" fill="#fff" stroke="#ececf1"/><text x="54" y="142" fill="#4b4b50">重试粒度</text>
    <rect x="244" y="120" width="380" height="36" rx="6" fill="#fff" stroke="#ececf1"/><text x="258" y="142" fill="#5b7db1">整条查询重跑</text>
    <rect x="628" y="120" width="382" height="36" rx="6" fill="#fff" stroke="#ececf1"/><text x="642" y="142" fill="#7a5a95">单个 task(分区)重跑</text>

    <rect x="40" y="160" width="200" height="36" rx="6" fill="#fff" stroke="#ececf1"/><text x="54" y="182" fill="#4b4b50">调度器</text>
    <rect x="244" y="160" width="380" height="36" rx="6" fill="#fff" stroke="#ececf1"/><text x="258" y="182" fill="#5b7db1">PipelinedQueryScheduler</text>
    <rect x="628" y="160" width="382" height="36" rx="6" fill="#fff" stroke="#ececf1"/><text x="642" y="182" fill="#7a5a95">EventDrivenFaultTolerantQueryScheduler</text>

    <rect x="40" y="200" width="200" height="36" rx="6" fill="#fff" stroke="#ececf1"/><text x="54" y="222" fill="#4b4b50">exchange</text>
    <rect x="244" y="200" width="380" height="36" rx="6" fill="#fff" stroke="#ececf1"/><text x="258" y="222" fill="#5b7db1">流式直连(无需额外配置)</text>
    <rect x="628" y="200" width="382" height="36" rx="6" fill="#fff" stroke="#ececf1"/><text x="642" y="222" fill="#7a5a95">spooling(必须配 exchange-manager)</text>

    <rect x="40" y="240" width="200" height="36" rx="6" fill="#fff" stroke="#ececf1"/><text x="54" y="262" fill="#4b4b50">失败代价</text>
    <rect x="244" y="240" width="380" height="36" rx="6" fill="#fff" stroke="#ececf1"/><text x="258" y="262" fill="#b1483a">大:全部重算</text>
    <rect x="628" y="240" width="382" height="36" rx="6" fill="#fff" stroke="#ececf1"/><text x="642" y="262" fill="#12402a">小:只赔一个 task</text>

    <rect x="40" y="280" width="200" height="36" rx="6" fill="#fff" stroke="#ececf1"/><text x="54" y="302" fill="#4b4b50">持续开销</text>
    <rect x="244" y="280" width="380" height="36" rx="6" fill="#fff" stroke="#ececf1"/><text x="258" y="302" fill="#12402a">低:无中间落盘</text>
    <rect x="628" y="280" width="382" height="36" rx="6" fill="#fff" stroke="#ececf1"/><text x="642" y="302" fill="#b1483a">高:中间结果持续落盘</text>

    <rect x="40" y="320" width="200" height="36" rx="6" fill="#fff" stroke="#ececf1"/><text x="54" y="342" fill="#4b4b50">适用</text>
    <rect x="244" y="320" width="380" height="36" rx="6" fill="#eafaf1" stroke="#bfe0cd"/><text x="258" y="342" fill="#2f6f4f">交互式、中短查询、瞬时故障多</text>
    <rect x="628" y="320" width="382" height="36" rx="6" fill="#eafaf1" stroke="#bfe0cd"/><text x="642" y="342" fill="#2f6f4f">长 ETL、大查询、跑几十分钟不能重来</text>
  </g>

  <rect x="30" y="388" width="980" height="72" rx="12" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="410" font-size="10.5" font-weight="700" fill="#2c5a3a">共同点与选型建议</text>
  <text x="46" y="430" font-size="9" fill="#2f6f4f">· 都排除 USER_ERROR(SQL 写错重试无用)与 fatal 错误码;都有 attempt 上限(默认各 4)</text>
  <text x="46" y="448" font-size="9" fill="#2f6f4f">· 默认 NONE 不容错。交互场景保持 NONE/QUERY;批处理/长查询上 TASK 并配 S3/文件系统 exchange-manager</text>
</svg>
