<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="680" viewBox="0 0 1080 680" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="680" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Trino 能力域依赖关系 · 8 支撑主线的分层与依赖</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">箭头 = "依赖/调用"方向;分四层：底座(数据入口) → 计算(查询期核心) → 保障(集群守护) · 安全贯穿</text>

  <!-- 接触面 top -->
  <rect x="340" y="70" width="400" height="44" rx="11" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="540" y="97" text-anchor="middle" font-size="11" font-weight="700" fill="#3d2a5a">接触面：DQL（主）/ DCL / DDL·DML(下推)</text>

  <!-- 计算层 -->
  <text x="46" y="146" font-size="10.5" font-weight="700" fill="#274a78">计算能力域</text>
  <rect x="170" y="156" width="330" height="70" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="335" y="182" text-anchor="middle" font-size="11" font-weight="700" fill="#1b2a4a">查询规划与优化</text><text x="335" y="202" text-anchor="middle" font-size="8.5" fill="#5b7db1">Analyzer→Planner→IterativeOptimizer→CBO→Fragmenter</text>
  <rect x="580" y="156" width="330" height="70" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="745" y="182" text-anchor="middle" font-size="11" font-weight="700" fill="#1b2a4a">分布式执行</text><text x="745" y="202" text-anchor="middle" font-size="8.5" fill="#5b7db1">Stage/Task/Split/Driver/Operator/Exchange</text>

  <!-- 底座层 -->
  <text x="46" y="268" font-size="10.5" font-weight="700" fill="#5a3410">底座能力域</text>
  <rect x="170" y="278" width="330" height="70" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/><text x="335" y="304" text-anchor="middle" font-size="11" font-weight="700" fill="#5a3410">连接器框架 SPI</text><text x="335" y="324" text-anchor="middle" font-size="8.5" fill="#93762e">Connector/Metadata/SplitManager/PageSource · 下推</text>
  <rect x="580" y="278" width="330" height="70" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/><text x="745" y="304" text-anchor="middle" font-size="11" font-weight="700" fill="#5a3410">元数据与 Catalog</text><text x="745" y="324" text-anchor="middle" font-size="8.5" fill="#93762e">CatalogManager/MetadataManager · Session</text>

  <!-- 保障层 -->
  <text x="46" y="390" font-size="10.5" font-weight="700" fill="#2c5a3a">保障能力域</text>
  <rect x="130" y="400" width="250" height="66" rx="11" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/><text x="255" y="426" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2c5a3a">调度与资源</text><text x="255" y="445" text-anchor="middle" font-size="8" fill="#2f6f4f">NodeScheduler / ResourceGroup</text>
  <rect x="415" y="400" width="250" height="66" rx="11" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/><text x="540" y="426" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2c5a3a">内存管理</text><text x="540" y="445" text-anchor="middle" font-size="8" fill="#2f6f4f">MemoryPool / Spill / OOM killer</text>
  <rect x="700" y="400" width="250" height="66" rx="11" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/><text x="825" y="426" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2c5a3a">容错执行 FTE</text><text x="825" y="445" text-anchor="middle" font-size="8" fill="#2f6f4f">RetryPolicy / spooling exchange</text>

  <!-- 安全贯穿 -->
  <rect x="130" y="500" width="820" height="50" rx="11" fill="#faf4fb" stroke="#e2d2ee"/>
  <text x="540" y="522" text-anchor="middle" font-size="10.5" font-weight="700" fill="#5a3d78">安全（贯穿所有主线）</text>
  <text x="540" y="540" text-anchor="middle" font-size="8.5" fill="#7a5a95">认证过滤链 + SystemAccessControl + ConnectorAccessControl（行过滤/列掩码）</text>

  <!-- arrows: 接触面 -> 计算 -->
  <line x1="470" y1="114" x2="360" y2="156" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="610" y1="114" x2="720" y2="156" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <!-- 计算 -> 底座 -->
  <line x1="335" y1="226" x2="335" y2="278" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/><text x="352" y="256" font-size="8" fill="#a1a1a6">拿数据/下推</text>
  <line x1="745" y1="226" x2="745" y2="278" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/><text x="762" y="256" font-size="8" fill="#a1a1a6">解析库表/统计</text>
  <line x1="500" y1="191" x2="580" y2="191" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/><text x="540" y="184" text-anchor="middle" font-size="8" fill="#a1a1a6">计划→执行</text>
  <!-- 连接器 <-> 元数据 -->
  <line x1="500" y1="313" x2="580" y2="313" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <!-- 计算 -> 保障 -->
  <line x1="700" y1="226" x2="300" y2="400" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)" opacity="0.7"/>
  <line x1="745" y1="226" x2="560" y2="400" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)" opacity="0.7"/>
  <line x1="800" y1="226" x2="825" y2="400" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)" opacity="0.7"/>

  <!-- notes -->
  <rect x="30" y="566" width="1020" height="98" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="588" font-size="10.5" font-weight="700" fill="#1d1d1f">依赖要点</text>
  <text x="46" y="608" font-size="9" fill="#6e6e73">· 元数据与 Catalog 是最底座：连接器框架也依赖它做 catalog→Connector 映射;所有语句先经它解析库表</text>
  <text x="46" y="626" font-size="9" fill="#6e6e73">· 分布式执行依赖调度与资源(要 task 放哪、几个)、内存管理(算子内存/溢写)、容错执行(TASK 策略时)</text>
  <text x="46" y="644" font-size="9" fill="#b1483a">· 与存算一体引擎的能力域差异：Trino 无"存储引擎/事务一致性/后台任务(Compaction)"——数据不归它管,这些是连接器或外部源的事</text>
</svg>
