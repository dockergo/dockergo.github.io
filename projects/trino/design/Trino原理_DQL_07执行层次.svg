<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="720" viewBox="0 0 1120 720" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1120" height="720" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Trino 分布式执行六级层次 · Query→Stage→Task→Split→Driver→Operator</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">1 fragment : 1 stage;stage fan-out 成 N task 到 worker;task 内编译成 pipeline,每 pipeline 起多个 Driver</text>

  <!-- Query -->
  <rect x="30" y="70" width="1060" height="70" rx="12" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="92" font-size="11" font-weight="700" fill="#1b2a4a">① Query · SqlQueryExecution.start</text>
  <text x="46" y="112" font-size="9" fill="#5b7db1">按 RetryPolicy 选调度器：NONE/QUERY → PipelinedQueryScheduler　·　TASK → EventDrivenFaultTolerantQueryScheduler</text>
  <text x="46" y="129" font-size="9" fill="#5b7db1">状态机：QUEUED → PLANNING → STARTING → RUNNING → FINISHING → FINISHED（QueryStateMachine）</text>

  <!-- Stage -->
  <rect x="30" y="152" width="1060" height="86" rx="12" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="174" font-size="11" font-weight="700" fill="#2c5a3a">② Stage · 1 fragment : 1 stage（StageManager 广度遍历 SubPlan,stage id = fragment id）</text>
  <text x="46" y="194" font-size="9" fill="#2f6f4f">两个对象别混：SqlStage（持有 RemoteTask）　vs　StageExecution / PipelinedStageExecution（调度 + 状态机）</text>
  <g font-size="8.5" text-anchor="middle">
    <rect x="46" y="204" width="200" height="26" rx="6" fill="#fff" stroke="#cfe6d5"/><text x="146" y="221" fill="#2c5a3a">Stage 0 (SINGLE,coordinator)</text>
    <rect x="256" y="204" width="200" height="26" rx="6" fill="#fff" stroke="#cfe6d5"/><text x="356" y="221" fill="#2c5a3a">Stage 1 (FIXED_HASH,多 task)</text>
    <rect x="466" y="204" width="200" height="26" rx="6" fill="#fff" stroke="#cfe6d5"/><text x="566" y="221" fill="#2c5a3a">Stage 2 (SOURCE scan)</text>
    <rect x="676" y="204" width="380" height="26" rx="6" fill="#f7f7f9" stroke="#ececf1"/><text x="866" y="221" fill="#6e6e73">task 数由 createStageScheduler 按 PartitioningHandle 定</text>
  </g>

  <!-- Task -->
  <rect x="30" y="250" width="1060" height="112" rx="12" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="272" font-size="11" font-weight="700" fill="#1b2a4a">③ Task · 一 stage fan-out 成 N task,分布到 worker 节点</text>
  <text x="46" y="291" font-size="9" fill="#5b7db1">coordinator 端 = RemoteTask(HttpRemoteTask),经 POST /v1/task/{taskId} 远程创建;worker 端 = SqlTask 容器包 SqlTaskExecution 运行实例</text>
  <g font-size="8.5" text-anchor="middle">
    <rect x="46" y="302" width="240" height="48" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="166" y="321" font-weight="600" fill="#274a78">Task@worker A</text><text x="166" y="337" fill="#5b7db1">TaskId(stageId, partition, attempt)</text>
    <rect x="296" y="302" width="240" height="48" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="416" y="321" font-weight="600" fill="#274a78">Task@worker B</text><text x="416" y="337" fill="#5b7db1">TaskStateMachine + TaskStatus</text>
    <rect x="546" y="302" width="240" height="48" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="666" y="321" font-weight="600" fill="#274a78">Task@worker C …</text><text x="666" y="337" fill="#5b7db1">同 fragment 的并行实例</text>
    <rect x="796" y="302" width="260" height="48" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="926" y="321" font-weight="600" fill="#12402a">调度器决定 task 数</text><text x="926" y="337" fill="#2f6f4f">FixedCount / SourcePartitioned / ScaledWriter</text>
  </g>

  <!-- Split + Driver + Operator (nested inside a task) -->
  <rect x="30" y="374" width="1060" height="232" rx="12" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="396" font-size="11" font-weight="700" fill="#2c5a3a">④⑤⑥ 一个 Task 内：Split → Pipeline(DriverFactory) → Driver → Operator</text>

  <rect x="46" y="408" width="300" height="184" rx="10" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="62" y="428" font-size="10" font-weight="700" fill="#5a3410">④ Split（数据分片）</text>
  <text x="62" y="447" font-size="8.8" fill="#93762e">Split = CatalogHandle + ConnectorSplit</text>
  <text x="62" y="463" font-size="8.8" fill="#93762e">连接器 SplitManager.getSplits 产出</text>
  <text x="62" y="479" font-size="8.8" fill="#93762e">源 pipeline：一个 split 一个 Driver</text>
  <rect x="62" y="490" width="268" height="90" rx="8" fill="#fff" stroke="#e8cf9a"/>
  <text x="76" y="509" font-size="8.5" font-weight="600" fill="#5a3410">Split 放置(NodeScheduler)</text>
  <text x="76" y="526" font-size="8" fill="#93762e">UniformNodeSelector：选最闲节点</text>
  <text x="76" y="541" font-size="8" fill="#93762e">TopologyAware：机架感知</text>
  <text x="76" y="556" font-size="8" fill="#93762e">max-splits-per-node 默认 256</text>
  <text x="76" y="572" font-size="8" fill="#b1483a">483 已移除 Lifespan/grouped execution</text>

  <rect x="360" y="408" width="360" height="184" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="376" y="428" font-size="10" font-weight="700" fill="#1b2a4a">⑤ Pipeline / Driver</text>
  <text x="376" y="447" font-size="8.8" fill="#5b7db1">Pipeline = 一个 DriverFactory(一串 OperatorFactory)</text>
  <text x="376" y="463" font-size="8.8" fill="#5b7db1">Driver = 从 factory 实例化的一条算子链</text>
  <text x="376" y="479" font-size="8.8" fill="#5b7db1">LocalExecutionPlanner 把 fragment 编成多 pipeline</text>
  <rect x="376" y="490" width="328" height="42" rx="7" fill="#fff" stroke="#bcd0ec"/><text x="540" y="509" text-anchor="middle" font-size="8.5" fill="#1b2a4a">Pipeline 0：Scan → Filter → Project（源,per-split driver）</text><text x="540" y="524" text-anchor="middle" font-size="8" fill="#5b7db1">每遇 local/remote exchange 边界起新 pipeline</text>
  <rect x="376" y="538" width="328" height="42" rx="7" fill="#fff" stroke="#bcd0ec"/><text x="540" y="557" text-anchor="middle" font-size="8.5" fill="#1b2a4a">Pipeline 1：Join → 部分聚合（固定 driver 数）</text><text x="540" y="572" text-anchor="middle" font-size="8" fill="#5b7db1">TaskExecutor 以 1s 时间片调度各 Driver</text>

  <rect x="734" y="408" width="322" height="184" rx="10" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="750" y="428" font-size="10" font-weight="700" fill="#274a78">⑥ Operator 链（处理 Page）</text>
  <g font-size="8.5" text-anchor="middle">
    <rect x="750" y="440" width="290" height="26" rx="6" fill="#fff7e6" stroke="#e8cf9a"/><text x="895" y="457" fill="#5a3410">TableScanOperator（连接器 PageSource）</text>
    <rect x="750" y="472" width="290" height="26" rx="6" fill="#fff" stroke="#cfe0f2"/><text x="895" y="489" fill="#274a78">ScanFilterAndProject（融合扫描+过滤+投影）</text>
    <rect x="750" y="504" width="290" height="26" rx="6" fill="#fff" stroke="#cfe0f2"/><text x="895" y="521" fill="#274a78">HashBuilder / LookupJoin（Join）</text>
    <rect x="750" y="536" width="290" height="26" rx="6" fill="#eef3fb" stroke="#bcd0ec"/><text x="895" y="553" fill="#1b2a4a">HashAggregation（聚合,可溢写）</text>
    <rect x="750" y="568" width="290" height="16" rx="5" fill="#f5faf6" stroke="#cfe6d5"/><text x="895" y="580" font-size="7.5" fill="#2f6f4f">Page 在算子间流动(见 Driver 泵篇)</text>
  </g>

  <line x1="560" y1="140" x2="560" y2="152" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="560" y1="238" x2="560" y2="250" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="560" y1="362" x2="560" y2="374" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>

  <rect x="30" y="618" width="1060" height="86" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="640" font-size="10.5" font-weight="700" fill="#1d1d1f">记忆锚点</text>
  <text x="46" y="660" font-size="9" fill="#6e6e73">Query 定调度、Stage 对齐 fragment、Task 是 fragment 在某节点的实例、Split 是数据分片、Driver 是算子链的并行实例、Operator 处理列式 Page。</text>
  <text x="46" y="678" font-size="9" fill="#6e6e73">全程资源随查询生灭;coordinator 只规划不碰 split 数据;worker 无状态。</text>
  <text x="46" y="696" font-size="9" fill="#b1483a">别用 SqlQueryScheduler（不存在）· 别引用 Lifespan（已移除）· task 数不是单一规则(看 PartitioningHandle)。</text>
</svg>
