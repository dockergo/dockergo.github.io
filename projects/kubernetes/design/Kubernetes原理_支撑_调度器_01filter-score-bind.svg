<svg xmlns="http://www.w3.org/2000/svg" width="920" height="430" viewBox="0 0 920 430" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="920" height="430" fill="#fbfbfd"/>
  <text x="30" y="32" font-size="14" font-weight="600" fill="#1d1d1f">调度器 · filter（剔除）→ score（打分）→ bind（写 nodeName）</text>

  <!-- pending pod -->
  <rect x="30" y="150" width="120" height="80" rx="11" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#soft)"/>
  <text x="90" y="184" font-size="12" font-weight="600" fill="#8a6d3b" text-anchor="middle">Pending Pod</text>
  <text x="90" y="204" font-size="10.5" fill="#6e6e73" text-anchor="middle">未绑定节点</text>

  <!-- Filter -->
  <rect x="180" y="80" width="200" height="220" rx="12" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
  <text x="280" y="104" font-size="12.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">① Filter 预选</text>
  <text x="280" y="124" font-size="10.5" fill="#a1a1a6" text-anchor="middle">findNodesThatFitPod :463</text>
  <rect x="196" y="136" width="168" height="26" rx="6" fill="#f5faf6" stroke="#cfe6d2"/>
  <text x="280" y="154" font-size="10.5" fill="#1d8f3f" text-anchor="middle">node-1 资源够 ✓</text>
  <rect x="196" y="166" width="168" height="26" rx="6" fill="#fdeeeb" stroke="#e6c9c2"/>
  <text x="280" y="184" font-size="10.5" fill="#8a3527" text-anchor="middle">node-2 资源不足 ✗</text>
  <rect x="196" y="196" width="168" height="26" rx="6" fill="#f5faf6" stroke="#cfe6d2"/>
  <text x="280" y="214" font-size="10.5" fill="#1d8f3f" text-anchor="middle">node-3 容忍污点 ✓</text>
  <rect x="196" y="226" width="168" height="26" rx="6" fill="#fdeeeb" stroke="#e6c9c2"/>
  <text x="280" y="244" font-size="10.5" fill="#8a3527" text-anchor="middle">node-4 端口冲突 ✗</text>
  <text x="280" y="272" font-size="10" fill="#a1a1a6" text-anchor="middle">布尔可行性 · 空集→抢占/Pending</text>

  <!-- Score -->
  <rect x="410" y="80" width="200" height="220" rx="12" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
  <text x="510" y="104" font-size="12.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">② Score 优选</text>
  <text x="510" y="124" font-size="10.5" fill="#a1a1a6" text-anchor="middle">prioritizeNodes :755</text>
  <rect x="426" y="140" width="168" height="30" rx="6" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="510" y="160" font-size="11" fill="#1b2a4a" text-anchor="middle">node-1 → 82 分</text>
  <rect x="426" y="176" width="168" height="30" rx="6" fill="#e9f0fb" stroke="#bcd0ec"/>
  <text x="510" y="196" font-size="11" fill="#1b2a4a" text-anchor="middle">node-3 → 65 分</text>
  <text x="510" y="234" font-size="10.5" fill="#6e6e73" text-anchor="middle">每插件 0~100 加权求和</text>
  <text x="510" y="254" font-size="10.5" fill="#6e6e73" text-anchor="middle">MaxNodeScore=100</text>
  <text x="510" y="274" font-size="10.5" fill="#a1a1a6" text-anchor="middle">selectHost 选最高分 :873</text>

  <!-- Bind -->
  <rect x="640" y="80" width="250" height="220" rx="12" fill="#faf4fb" stroke="#e4cdea" filter="url(#soft)"/>
  <text x="765" y="104" font-size="12.5" font-weight="600" fill="#8944ab" text-anchor="middle">③ assume + bind</text>
  <rect x="656" y="118" width="218" height="52" rx="8" fill="#ffffff" stroke="#ececef"/>
  <text x="765" y="139" font-size="10.5" fill="#8944ab" text-anchor="middle">assume 乐观占位（内存）:197</text>
  <text x="765" y="157" font-size="10.5" fill="#6e6e73" text-anchor="middle">好让下个 Pod 算作已占用</text>
  <rect x="656" y="178" width="218" height="44" rx="8" fill="#ffffff" stroke="#ececef"/>
  <text x="765" y="198" font-size="10.5" fill="#8944ab" text-anchor="middle">Reserve / Permit（可等齐）</text>
  <text x="765" y="215" font-size="10.5" fill="#6e6e73" text-anchor="middle">RunPermitPlugins :231</text>
  <rect x="656" y="230" width="218" height="52" rx="8" fill="#ffffff" stroke="#ececef"/>
  <text x="765" y="251" font-size="10.5" fill="#8944ab" text-anchor="middle">bind：建 Binding → 写 nodeName</text>
  <text x="765" y="269" font-size="10.5" fill="#6e6e73" text-anchor="middle">失败 ForgetPod 回滚 · :968</text>

  <path d="M150 190 L180 190" fill="none" stroke="#b8b8bf" stroke-width="1.5" marker-end="url(#ar)"/>
  <path d="M380 190 L410 190" fill="none" stroke="#b8b8bf" stroke-width="1.5" marker-end="url(#ar)"/>
  <path d="M610 190 L640 190" fill="none" stroke="#b8b8bf" stroke-width="1.5" marker-end="url(#ar)"/>

  <text x="30" y="340" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">调度周期</tspan>（filter+score+assume，串行、需全局视图）　vs　<tspan font-weight="600" fill="#1d1d1f">绑定周期</tspan>（reserve/permit/prebind/bind，可与下个 Pod 并行）</text>
  <text x="30" y="366" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">只做选址：</tspan>调度器只写 pod.spec.nodeName，真正拉起容器的是目标节点 kubelet；assume 失败会回滚</text>
  <text x="30" y="392" font-size="11.5" fill="#a1a1a6">为何 assume：调度是串行全局决策，等 etcd 写完再调下一个会极慢 —— 乐观假设提吞吐，失败再回滚</text>
</svg>
