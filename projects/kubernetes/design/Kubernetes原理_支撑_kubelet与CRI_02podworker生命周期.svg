<svg xmlns="http://www.w3.org/2000/svg" width="900" height="470" viewBox="0 0 900 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="900" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">pod worker · 每 Pod 一 goroutine 串行 + 三段生命周期状态机</text>
  <g font-size="10.5">
    <rect x="560" y="20" width="12" height="12" rx="3" fill="#eef3fb" stroke="#bcd0ec"/><text x="578" y="30" fill="#6e6e73">分发/协调</text>
    <rect x="654" y="20" width="12" height="12" rx="3" fill="#f5faf6" stroke="#cfe6d2"/><text x="672" y="30" fill="#6e6e73">运行收敛</text>
    <rect x="748" y="20" width="12" height="12" rx="3" fill="#fbf7ef" stroke="#ecdcbf"/><text x="766" y="30" fill="#6e6e73">终止清理</text>
  </g>

  <!-- syncLoop dispatch -->
  <rect x="30" y="70" width="150" height="120" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="105" y="98" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">syncLoop</text>
  <text x="105" y="118" font-size="10" fill="#5b7db1" text-anchor="middle">多源 select</text>
  <text x="105" y="136" font-size="10" fill="#5b7db1" text-anchor="middle">config/pleg/tick</text>
  <text x="105" y="160" font-size="10" fill="#a1a1a6" text-anchor="middle">只分发</text>
  <text x="105" y="176" font-size="10" fill="#a1a1a6" text-anchor="middle">UpdatePod</text>

  <!-- per-pod channel -->
  <rect x="210" y="96" width="120" height="68" rx="10" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
  <text x="270" y="122" font-size="11" font-weight="600" fill="#1d1d1f" text-anchor="middle">podUpdates</text>
  <text x="270" y="140" font-size="10" fill="#6e6e73" text-anchor="middle">该 Pod 专属</text>
  <text x="270" y="156" font-size="10" fill="#a1a1a6" text-anchor="middle">串行消费</text>

  <!-- state machine: three states -->
  <rect x="380" y="70" width="150" height="86" rx="11" fill="#f5faf6" stroke="#cfe6d2" filter="url(#soft)"/>
  <text x="455" y="96" font-size="11.5" font-weight="600" fill="#1d8f3f" text-anchor="middle">SyncPod</text>
  <text x="455" y="115" font-size="10" fill="#6e6e73" text-anchor="middle">运行中 · 补齐差异</text>
  <text x="455" y="132" font-size="10" fill="#6e6e73" text-anchor="middle">期望容器 vs 实际</text>
  <text x="455" y="148" font-size="10" fill="#a1a1a6" text-anchor="middle">经 CRI 起/杀容器</text>

  <rect x="560" y="70" width="150" height="86" rx="11" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#soft)"/>
  <text x="635" y="96" font-size="11.5" font-weight="600" fill="#8a6d3b" text-anchor="middle">SyncTerminating</text>
  <text x="635" y="115" font-size="10" fill="#6e6e73" text-anchor="middle">被删/驱逐</text>
  <text x="635" y="132" font-size="10" fill="#6e6e73" text-anchor="middle">杀容器直到全停</text>

  <rect x="740" y="70" width="150" height="86" rx="11" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#soft)"/>
  <text x="815" y="96" font-size="11.5" font-weight="600" fill="#8a6d3b" text-anchor="middle">SyncTerminated</text>
  <text x="815" y="115" font-size="10" fill="#6e6e73" text-anchor="middle">清卷/cgroup/资源</text>
  <text x="815" y="132" font-size="10" fill="#6e6e73" text-anchor="middle">走完才移除 worker</text>

  <!-- arrows top row -->
  <path d="M180 130 L210 130" fill="none" stroke="#b8b8bf" stroke-width="1.5" marker-end="url(#ar)"/>
  <path d="M330 130 L380 118" fill="none" stroke="#b8b8bf" stroke-width="1.5" marker-end="url(#ar)"/>
  <path d="M530 113 L560 113" fill="none" stroke="#b8b8bf" stroke-width="1.5" marker-end="url(#ar)"/>
  <path d="M710 113 L740 113" fill="none" stroke="#b8b8bf" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="536" y="106" font-size="9.5" fill="#a1a1a6">删除</text>
  <text x="714" y="106" font-size="9.5" fill="#a1a1a6">全停</text>

  <!-- failure loops box -->
  <rect x="380" y="200" width="510" height="130" rx="12" fill="#f7f7f9" stroke="#ececef"/>
  <text x="396" y="224" font-size="12" font-weight="600" fill="#1d1d1f">SyncPod 内的失败路径 —— 失败不是终态，下轮重算重试</text>
  <g font-size="10.5" fill="#6e6e73">
    <rect x="396" y="238" width="150" height="76" rx="9" fill="#ffffff" stroke="#ececef"/>
    <text x="471" y="260" font-size="10.5" font-weight="600" fill="#8a3527" text-anchor="middle">CrashLoopBackOff</text>
    <text x="471" y="279" text-anchor="middle">doBackOff 判退避窗</text>
    <text x="471" y="296" text-anchor="middle">窗内跳过重启</text>

    <rect x="560" y="238" width="150" height="76" rx="9" fill="#ffffff" stroke="#ececef"/>
    <text x="635" y="260" font-size="10.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">沙箱/网络失败</text>
    <text x="635" y="279" text-anchor="middle">CNI 报错本轮失败</text>
    <text x="635" y="296" text-anchor="middle">PLEG relist 再触发</text>

    <rect x="724" y="238" width="150" height="76" rx="9" fill="#ffffff" stroke="#ececef"/>
    <text x="799" y="260" font-size="10.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">卷未就绪阻塞</text>
    <text x="799" y="279" text-anchor="middle">WaitForAttachMount</text>
    <text x="799" y="296" text-anchor="middle">挂载超时下轮重试</text>
  </g>
  <path d="M455 200 L455 156" fill="none" stroke="#c7c7cc" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ar)"/>

  <!-- bottom notes -->
  <line x1="30" y1="360" x2="870" y2="360" stroke="#ececef"/>
  <text x="30" y="382" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">每 Pod 串行：</tspan>同一 Pod 绝不并发 sync（避免容器操作竞争），不同 Pod 各自 goroutine 并行</text>
  <text x="30" y="406" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">删除也收敛：</tspan>走完 Terminating→Terminated 才移除 worker，而非一刀切——"删 Pod"同样是状态机收敛</text>
  <text x="30" y="430" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">节点级 level-triggered：</tspan>不管收到什么事件，SyncPod 都重算"该有哪些容器 vs 实际"，PLEG 健康兜底保护心跳</text>
</svg>
