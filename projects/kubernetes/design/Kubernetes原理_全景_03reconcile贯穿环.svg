<svg xmlns="http://www.w3.org/2000/svg" width="900" height="470" viewBox="0 0 900 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#8944ab"/>
    </marker>
  </defs>
  <rect width="900" height="470" fill="#fbfbfd"/>
  <text x="30" y="32" font-size="14" font-weight="600" fill="#1d1d1f">reconcile 贯穿环 · 所有控制器共用的同一骨架（level-triggered）</text>

  <!-- API Server center -->
  <rect x="360" y="200" width="180" height="70" rx="12" fill="#e9f0fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="450" y="230" font-size="13" font-weight="600" fill="#1b2a4a" text-anchor="middle">API Server</text>
  <text x="450" y="250" font-size="11" fill="#5b7db1" text-anchor="middle">对象 spec / status</text>

  <!-- ring nodes -->
  <rect x="330" y="60" width="240" height="56" rx="11" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
  <text x="450" y="83" font-size="12.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">① Informer watch 缓存对象</text>
  <text x="450" y="102" font-size="11" fill="#6e6e73" text-anchor="middle">变更事件 → 算出对象 key</text>

  <rect x="628" y="180" width="230" height="56" rx="11" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
  <text x="743" y="203" font-size="12.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">② workqueue 入队 key</text>
  <text x="743" y="222" font-size="11" fill="#6e6e73" text-anchor="middle">去重 · 限速 · 退避重试</text>

  <rect x="628" y="300" width="230" height="66" rx="11" fill="#faf4fb" stroke="#e4cdea" filter="url(#soft)"/>
  <text x="743" y="324" font-size="12.5" font-weight="600" fill="#8944ab" text-anchor="middle">③ syncHandler 取 key</text>
  <text x="743" y="343" font-size="11" fill="#8944ab" text-anchor="middle">读缓存当前状态</text>
  <text x="743" y="359" font-size="11" fill="#8944ab" text-anchor="middle">对比 spec 与实际</text>

  <rect x="330" y="330" width="240" height="66" rx="11" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
  <text x="450" y="354" font-size="12.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">④ 执行差异动作</text>
  <text x="450" y="373" font-size="11" fill="#6e6e73" text-anchor="middle">创建/更新/删除下游对象</text>
  <text x="450" y="389" font-size="11" fill="#6e6e73" text-anchor="middle">写回 status</text>

  <rect x="42" y="180" width="230" height="56" rx="11" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
  <text x="157" y="203" font-size="12.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">出错 → 退避重入队</text>
  <text x="157" y="222" font-size="11" fill="#6e6e73" text-anchor="middle">达 maxRetries=15 才 Forget</text>

  <!-- ring arrows -->
  <path d="M570 92 Q680 110 720 176" fill="none" stroke="#8944ab" stroke-width="1.6" marker-end="url(#ar)"/>
  <path d="M743 236 L743 296" fill="none" stroke="#8944ab" stroke-width="1.6" marker-end="url(#ar)"/>
  <path d="M628 344 Q560 380 574 372" fill="none" stroke="#8944ab" stroke-width="1.6" marker-end="url(#ar)"/>
  <path d="M450 330 L450 274" fill="none" stroke="#8944ab" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="470" y="300" font-size="10.5" fill="#8944ab">写回 API Server</text>
  <path d="M360 235 L272 210" fill="none" stroke="#b8b8bf" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <path d="M157 180 Q210 110 330 90" fill="none" stroke="#b8b8bf" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="120" y="150" font-size="10.5" fill="#a1a1a6">重试也回到队列</text>

  <text x="30" y="440" font-size="11.5" fill="#a1a1a6">关键：事件只是"唤醒"，syncHandler 永远重算当前全量差异 —— 丢事件靠 resync 兜底、重复入队去重无害、崩溃重启即恢复</text>
</svg>
