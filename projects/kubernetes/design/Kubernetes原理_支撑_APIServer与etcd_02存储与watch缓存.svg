<svg xmlns="http://www.w3.org/2000/svg" width="900" height="440" viewBox="0 0 900 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="900" height="440" fill="#fbfbfd"/>
  <text x="30" y="32" font-size="14" font-weight="600" fill="#1d1d1f">存储与 watch 缓存 · 一个 etcd watch 扇出给成千客户端</text>

  <!-- etcd -->
  <rect x="30" y="120" width="180" height="200" rx="12" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#soft)"/>
  <text x="120" y="146" font-size="13" font-weight="600" fill="#8a6d3b" text-anchor="middle">etcd</text>
  <text x="120" y="170" font-size="11" fill="#6e6e73" text-anchor="middle">全量对象</text>
  <text x="120" y="192" font-size="11" fill="#6e6e73" text-anchor="middle">每次写 → revision↑</text>
  <rect x="46" y="210" width="148" height="44" rx="8" fill="#ffffff" stroke="#ececef"/>
  <text x="120" y="230" font-size="10.5" fill="#1d1d1f" text-anchor="middle">Txn 创建（key 不存在）</text>
  <text x="120" y="246" font-size="10.5" fill="#6e6e73" text-anchor="middle">etcd3store.go:241</text>
  <rect x="46" y="262" width="148" height="44" rx="8" fill="#ffffff" stroke="#ececef"/>
  <text x="120" y="282" font-size="10.5" fill="#1d1d1f" text-anchor="middle">GuaranteedUpdate</text>
  <text x="120" y="298" font-size="10.5" fill="#6e6e73" text-anchor="middle">读-改-写重试 :429</text>

  <!-- Cacher -->
  <rect x="300" y="90" width="240" height="260" rx="12" fill="#e9f0fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="420" y="116" font-size="13" font-weight="600" fill="#1b2a4a" text-anchor="middle">API Server · Cacher（watch cache）</text>
  <rect x="318" y="130" width="204" height="54" rx="8" fill="#ffffff" stroke="#ececef"/>
  <text x="420" y="152" font-size="11" fill="#1d1d1f" text-anchor="middle">1 个 etcd watch 灌入</text>
  <text x="420" y="170" font-size="11" fill="#6e6e73" text-anchor="middle">watchCache 环形缓冲</text>
  <rect x="318" y="192" width="204" height="54" rx="8" fill="#ffffff" stroke="#ececef"/>
  <text x="420" y="214" font-size="11" fill="#1d1d1f" text-anchor="middle">processEvent 扇出 :1025</text>
  <text x="420" y="232" font-size="11" fill="#6e6e73" text-anchor="middle">按 resourceVersion 分发</text>
  <rect x="318" y="254" width="204" height="54" rx="8" fill="#ffffff" stroke="#ececef"/>
  <text x="420" y="276" font-size="11" fill="#1d1d1f" text-anchor="middle">GetList 由缓存应答 :827</text>
  <text x="420" y="294" font-size="11" fill="#6e6e73" text-anchor="middle">降 etcd 负载</text>

  <!-- clients -->
  <g font-size="11">
    <rect x="630" y="96" width="240" height="46" rx="9" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
    <text x="646" y="124" fill="#1d1d1f">控制器 A watch（带 rv 续传）</text>
    <rect x="630" y="152" width="240" height="46" rx="9" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
    <text x="646" y="180" fill="#1d1d1f">控制器 B watch</text>
    <rect x="630" y="208" width="240" height="46" rx="9" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
    <text x="646" y="236" fill="#1d1d1f">kubelet watch（本节点 Pod）</text>
    <rect x="630" y="264" width="240" height="46" rx="9" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
    <text x="646" y="292" fill="#1d1d1f">… 成千上万 watcher</text>
  </g>

  <path d="M210 200 L300 190" fill="none" stroke="#b8b8bf" stroke-width="1.6" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <text x="216" y="184" font-size="10" fill="#a1a1a6">唯一读写</text>
  <path d="M540 130 L630 119" fill="none" stroke="#b8b8bf" stroke-width="1.4" marker-end="url(#ar)"/>
  <path d="M540 175 L630 175" fill="none" stroke="#b8b8bf" stroke-width="1.4" marker-end="url(#ar)"/>
  <path d="M540 231 L630 231" fill="none" stroke="#b8b8bf" stroke-width="1.4" marker-end="url(#ar)"/>
  <path d="M540 276 L630 287" fill="none" stroke="#b8b8bf" stroke-width="1.4" marker-end="url(#ar)"/>

  <text x="30" y="380" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">要害：</tspan>若每个 watch 都直连 etcd，etcd 会被压垮 —— Cacher 让 etcd 压力与集群规模解耦</text>
  <text x="30" y="404" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">resourceVersion：</tspan>etcd revision 映射为对象版本，支撑乐观并发 + watch 断点续传（"too old" 则重列）</text>
</svg>
