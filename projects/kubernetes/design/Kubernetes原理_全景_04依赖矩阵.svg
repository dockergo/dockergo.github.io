<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="880" height="520" fill="#fbfbfd"/>
  <text x="30" y="32" font-size="14" font-weight="600" fill="#1d1d1f">依赖矩阵 · 接触面动作 × 能力域（● 强依赖　◐ 中　○ 弱/无）</text>

  <!-- column headers -->
  <g font-size="11.5" fill="#1b2a4a" font-weight="600" text-anchor="middle">
    <text x="470" y="72">提交 spec</text>
    <text x="580" y="72">读 status</text>
    <text x="690" y="72">watch 变更</text>
    <text x="800" y="72">删除对象</text>
  </g>
  <line x1="30" y1="82" x2="850" y2="82" stroke="#d2d2d7"/>

  <!-- rows -->
  <g font-size="11.5">
    <!-- row template: label at x40, dots at 470/580/690/800 -->
    <text x="40" y="112" fill="#1d1d1f" font-weight="600">认证授权与准入</text>
    <circle cx="470" cy="108" r="8" fill="#1b2a4a"/><circle cx="580" cy="108" r="8" fill="#c7c7cc"/><circle cx="690" cy="108" r="8" fill="#c7c7cc"/><circle cx="800" cy="108" r="8" fill="#1b2a4a"/>

    <text x="40" y="148" fill="#1d1d1f" font-weight="600">API Server + etcd</text>
    <circle cx="470" cy="144" r="8" fill="#1b2a4a"/><circle cx="580" cy="144" r="8" fill="#1b2a4a"/><circle cx="690" cy="144" r="8" fill="#1b2a4a"/><circle cx="800" cy="144" r="8" fill="#1b2a4a"/>

    <text x="40" y="184" fill="#1d1d1f" font-weight="600">Informer / Watch</text>
    <circle cx="470" cy="180" r="8" fill="#c7c7cc"/><circle cx="580" cy="180" r="8" fill="#7f9bc4"/><circle cx="690" cy="180" r="8" fill="#1b2a4a"/><circle cx="800" cy="180" r="8" fill="#7f9bc4"/>

    <text x="40" y="220" fill="#8944ab" font-weight="600">控制器 reconcile 循环 ★</text>
    <circle cx="470" cy="216" r="8" fill="#1b2a4a"/><circle cx="580" cy="216" r="8" fill="#1b2a4a"/><circle cx="690" cy="216" r="8" fill="#1b2a4a"/><circle cx="800" cy="216" r="8" fill="#1b2a4a"/>

    <text x="40" y="256" fill="#1d1d1f" font-weight="600">调度器</text>
    <circle cx="470" cy="252" r="8" fill="#7f9bc4"/><circle cx="580" cy="252" r="8" fill="#7f9bc4"/><circle cx="690" cy="252" r="8" fill="#1b2a4a"/><circle cx="800" cy="252" r="8" fill="#c7c7cc"/>

    <text x="40" y="292" fill="#1d1d1f" font-weight="600">kubelet + CRI</text>
    <circle cx="470" cy="288" r="8" fill="#7f9bc4"/><circle cx="580" cy="288" r="8" fill="#1b2a4a"/><circle cx="690" cy="288" r="8" fill="#1b2a4a"/><circle cx="800" cy="288" r="8" fill="#7f9bc4"/>

    <text x="40" y="328" fill="#1d1d1f" font-weight="600">网络</text>
    <circle cx="470" cy="324" r="8" fill="#7f9bc4"/><circle cx="580" cy="324" r="8" fill="#c7c7cc"/><circle cx="690" cy="324" r="8" fill="#1b2a4a"/><circle cx="800" cy="324" r="8" fill="#7f9bc4"/>

    <text x="40" y="364" fill="#1d1d1f" font-weight="600">存储</text>
    <circle cx="470" cy="360" r="8" fill="#1b2a4a"/><circle cx="580" cy="360" r="8" fill="#7f9bc4"/><circle cx="690" cy="360" r="8" fill="#1b2a4a"/><circle cx="800" cy="360" r="8" fill="#7f9bc4"/>

    <text x="40" y="400" fill="#1d1d1f" font-weight="600">扩展机制 CRD/Operator</text>
    <circle cx="470" cy="396" r="8" fill="#1b2a4a"/><circle cx="580" cy="396" r="8" fill="#7f9bc4"/><circle cx="690" cy="396" r="8" fill="#1b2a4a"/><circle cx="800" cy="396" r="8" fill="#7f9bc4"/>

    <text x="40" y="436" fill="#1d1d1f" font-weight="600">控制器管理器 + GC</text>
    <circle cx="470" cy="432" r="8" fill="#7f9bc4"/><circle cx="580" cy="432" r="8" fill="#c7c7cc"/><circle cx="690" cy="432" r="8" fill="#1b2a4a"/><circle cx="800" cy="432" r="8" fill="#1b2a4a"/>
  </g>

  <line x1="30" y1="452" x2="850" y2="452" stroke="#d2d2d7"/>
  <text x="30" y="480" font-size="11.5" fill="#a1a1a6">被依赖度最高的两格：API Server + etcd 与 控制器 reconcile 循环 —— 它们是全盘响应式行为的枢纽与引擎</text>
  <text x="30" y="500" font-size="11.5" fill="#a1a1a6">读法：横看某能力域被哪些接触面动作触发，纵看某动作强依赖哪些能力域</text>
</svg>
