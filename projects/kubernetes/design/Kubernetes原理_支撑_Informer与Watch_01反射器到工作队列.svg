<svg xmlns="http://www.w3.org/2000/svg" width="920" height="400" viewBox="0 0 920 400" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="920" height="400" fill="#fbfbfd"/>
  <text x="30" y="32" font-size="14" font-weight="600" fill="#1d1d1f">Informer 五级流水线 · Reflector → DeltaFIFO → Indexer → 通知 → workqueue</text>

  <!-- apiserver -->
  <rect x="30" y="150" width="110" height="90" rx="11" fill="#e9f0fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="85" y="188" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">API</text>
  <text x="85" y="206" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">Server</text>

  <!-- Reflector -->
  <rect x="170" y="140" width="150" height="110" rx="11" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
  <text x="245" y="164" font-size="12.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">① Reflector</text>
  <text x="245" y="186" font-size="10.5" fill="#6e6e73" text-anchor="middle">LIST（起始 rv）</text>
  <text x="245" y="204" font-size="10.5" fill="#6e6e73" text-anchor="middle">WATCH 增量续传</text>
  <text x="245" y="222" font-size="10.5" fill="#6e6e73" text-anchor="middle">断线用最新 rv</text>
  <text x="245" y="240" font-size="10.5" fill="#a1a1a6" text-anchor="middle">reflector.go:348</text>

  <!-- DeltaFIFO -->
  <rect x="350" y="140" width="150" height="110" rx="11" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
  <text x="425" y="164" font-size="12.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">② DeltaFIFO</text>
  <text x="425" y="186" font-size="10.5" fill="#6e6e73" text-anchor="middle">增量按 key 排队</text>
  <text x="425" y="204" font-size="10.5" fill="#6e6e73" text-anchor="middle">Added/Updated/Deleted</text>
  <text x="425" y="222" font-size="10.5" fill="#6e6e73" text-anchor="middle">Replace 重列补 Deleted</text>
  <text x="425" y="240" font-size="10.5" fill="#a1a1a6" text-anchor="middle">delta_fifo.go:576</text>

  <!-- Indexer + distribute -->
  <rect x="530" y="140" width="160" height="110" rx="11" fill="#ffffff" stroke="#ececef" filter="url(#soft)"/>
  <text x="610" y="164" font-size="12.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">③ Pop → HandleDeltas</text>
  <text x="610" y="186" font-size="10.5" fill="#6e6e73" text-anchor="middle">先更新 Indexer 缓存</text>
  <text x="610" y="204" font-size="10.5" fill="#6e6e73" text-anchor="middle">再 distribute 扇出</text>
  <text x="610" y="222" font-size="10.5" fill="#6e6e73" text-anchor="middle">listener 两 goroutine</text>
  <text x="610" y="240" font-size="10.5" fill="#a1a1a6" text-anchor="middle">shared_informer.go:638</text>

  <!-- workqueue -->
  <rect x="720" y="140" width="170" height="110" rx="11" fill="#faf4fb" stroke="#e4cdea" filter="url(#soft)"/>
  <text x="805" y="164" font-size="12.5" font-weight="600" fill="#8944ab" text-anchor="middle">④ handler → workqueue</text>
  <text x="805" y="186" font-size="10.5" fill="#8944ab" text-anchor="middle">只把 key 入队</text>
  <text x="805" y="204" font-size="10.5" fill="#8944ab" text-anchor="middle">去重 + 限速</text>
  <text x="805" y="222" font-size="10.5" fill="#8944ab" text-anchor="middle">退避 5ms·2ⁿ / 10qps</text>
  <text x="805" y="240" font-size="10.5" fill="#8944ab" text-anchor="middle">→ 交给 reconcile</text>

  <path d="M140 195 L170 195" fill="none" stroke="#b8b8bf" stroke-width="1.5" marker-end="url(#ar)"/>
  <path d="M320 195 L350 195" fill="none" stroke="#b8b8bf" stroke-width="1.5" marker-end="url(#ar)"/>
  <path d="M500 195 L530 195" fill="none" stroke="#b8b8bf" stroke-width="1.5" marker-end="url(#ar)"/>
  <path d="M690 195 L720 195" fill="none" stroke="#b8b8bf" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Indexer store note -->
  <rect x="530" y="278" width="160" height="46" rx="9" fill="#f5faf6" stroke="#cfe6d2"/>
  <text x="610" y="300" font-size="11" font-weight="600" fill="#1d8f3f" text-anchor="middle">Indexer 本地缓存</text>
  <text x="610" y="317" font-size="10.5" fill="#4a8a5c" text-anchor="middle">List/Get 走本地不打 API</text>
  <path d="M610 250 L610 278" fill="none" stroke="#b8b8bf" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ar)"/>

  <text x="30" y="300" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">Shared：</tspan>同一资源</text>
  <text x="30" y="320" font-size="11.5" fill="#6e6e73">多控制器共用一个</text>
  <text x="30" y="340" font-size="11.5" fill="#6e6e73">informer（一份缓存）</text>

  <text x="30" y="376" font-size="11.5" fill="#a1a1a6">解耦事件速率与处理速率：handler 只入队，业务在 workqueue worker 里跑；resync 最小 1s 全量重发兜底 level-triggered</text>
</svg>
