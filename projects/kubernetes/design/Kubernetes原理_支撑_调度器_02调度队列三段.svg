<svg xmlns="http://www.w3.org/2000/svg" width="900" height="470" viewBox="0 0 900 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
    <marker id="arG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#7bb98a"/>
    </marker>
  </defs>
  <rect width="900" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">调度队列 · 三段结构 + 事件驱动重试（Pod 永不永久卡死）</text>
  <!-- legend -->
  <g font-size="10.5">
    <rect x="560" y="20" width="12" height="12" rx="3" fill="#fbf7ef" stroke="#ecdcbf"/><text x="578" y="30" fill="#6e6e73">队列暂存</text>
    <rect x="648" y="20" width="12" height="12" rx="3" fill="#eef3fb" stroke="#bcd0ec"/><text x="666" y="30" fill="#6e6e73">调度决策</text>
    <rect x="736" y="20" width="12" height="12" rx="3" fill="#f5faf6" stroke="#cfe6d2"/><text x="754" y="30" fill="#6e6e73">成功 / 唤醒</text>
  </g>

  <!-- three queue segments (left column) -->
  <rect x="40" y="70" width="240" height="66" rx="11" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#soft)"/>
  <text x="56" y="98" font-size="12" font-weight="600" fill="#8a6d3b">activeQ · 优先级堆</text>
  <text x="56" y="118" font-size="10.5" fill="#6e6e73">Pop 取队头 · 等待调度</text>

  <rect x="40" y="188" width="240" height="66" rx="11" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#soft)"/>
  <text x="56" y="216" font-size="12" font-weight="600" fill="#8a6d3b">backoffQ · 退避冷却</text>
  <text x="56" y="236" font-size="10.5" fill="#6e6e73">刚失败 Pod 指数退避</text>

  <rect x="40" y="306" width="240" height="66" rx="11" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#soft)"/>
  <text x="56" y="334" font-size="12" font-weight="600" fill="#8a6d3b">unschedulablePods</text>
  <text x="56" y="354" font-size="10.5" fill="#6e6e73">确定当前无处可放</text>

  <!-- scheduler -->
  <rect x="380" y="90" width="200" height="120" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="480" y="120" font-size="12.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">调度周期</text>
  <text x="480" y="142" font-size="10.5" fill="#5b7db1" text-anchor="middle">filter → score</text>
  <text x="480" y="160" font-size="10.5" fill="#5b7db1" text-anchor="middle">→ selectHost → assume</text>
  <text x="480" y="188" font-size="10" fill="#a1a1a6" text-anchor="middle">串行 · 需全局视图</text>

  <!-- outcomes -->
  <rect x="668" y="82" width="200" height="52" rx="10" fill="#f5faf6" stroke="#cfe6d2"/>
  <text x="768" y="104" font-size="11.5" font-weight="600" fill="#1d8f3f" text-anchor="middle">绑定成功</text>
  <text x="768" y="122" font-size="10.5" fill="#6e6e73" text-anchor="middle">写 pod.spec.nodeName</text>

  <!-- cluster event -->
  <rect x="668" y="300" width="200" height="72" rx="11" fill="#f5faf6" stroke="#cfe6d2" filter="url(#soft)"/>
  <text x="768" y="326" font-size="11.5" font-weight="600" fill="#1d8f3f" text-anchor="middle">集群事件</text>
  <text x="768" y="345" font-size="10.5" fill="#6e6e73" text-anchor="middle">删 Pod 释放 / 加 Node</text>
  <text x="768" y="362" font-size="10" fill="#a1a1a6" text-anchor="middle">MoveAllToActiveOrBackoff</text>

  <!-- arrows: activeQ -> scheduler -->
  <path d="M280 103 L380 120" fill="none" stroke="#b8b8bf" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="300" y="98" font-size="10.5" fill="#6e6e73">Pop</text>
  <!-- scheduler -> success -->
  <path d="M580 118 L668 108" fill="none" stroke="#7bb98a" stroke-width="1.5" marker-end="url(#arG)"/>
  <!-- scheduler -> backoffQ (fail) -->
  <path d="M400 210 C360 240 320 210 280 216" fill="none" stroke="#b8b8bf" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="300" y="205" font-size="10.5" fill="#8a3527">调度失败</text>
  <!-- scheduler -> unschedulable (no fit) -->
  <path d="M470 210 C450 300 360 330 280 334" fill="none" stroke="#b8b8bf" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="380" y="300" font-size="10.5" fill="#6e6e73">无可行节点</text>
  <!-- backoffQ -> activeQ (timer) -->
  <path d="M120 188 L120 136" fill="none" stroke="#b8b8bf" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="128" y="170" font-size="10" fill="#6e6e73">退避到点搬回</text>
  <!-- unschedulable -> backoff/active (leftover timeout) -->
  <path d="M200 306 L200 254" fill="none" stroke="#b8b8bf" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="208" y="288" font-size="10" fill="#6e6e73">超时 5min 兜底</text>
  <!-- cluster event -> unschedulable (wake) -->
  <path d="M668 336 C480 400 360 372 280 350" fill="none" stroke="#7bb98a" stroke-width="1.5" marker-end="url(#arG)"/>
  <text x="420" y="392" font-size="10.5" fill="#1d8f3f">唤醒相关 Pod 重排队</text>

  <!-- bottom notes -->
  <line x1="30" y1="410" x2="870" y2="410" stroke="#ececef"/>
  <text x="30" y="432" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">三段隔离：</tspan>热失败 Pod 关进 backoffQ 冷却，不占 activeQ 空转烧 CPU；无解 Pod 沉入 unschedulable 不反复重试</text>
  <text x="30" y="456" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">level-triggered：</tspan>队列 + 集群事件唤醒（MoveAll）保证一次失败不等于永久卡死，条件变化即重新入队</text>
</svg>
