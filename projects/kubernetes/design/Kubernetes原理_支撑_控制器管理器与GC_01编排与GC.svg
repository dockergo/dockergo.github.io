<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="900" height="430" fill="#fbfbfd"/>
  <text x="30" y="32" font-size="14" font-weight="600" fill="#1d1d1f">控制器管理器与 GC · 编排多控制器 + ownerReferences 级联删除</text>

  <!-- controller-manager -->
  <rect x="30" y="66" width="410" height="200" rx="12" fill="#faf4fb" stroke="#e4cdea" filter="url(#soft)"/>
  <text x="46" y="90" font-size="12.5" font-weight="600" fill="#8944ab">kube-controller-manager（一个进程）</text>
  <rect x="46" y="100" width="180" height="44" rx="8" fill="#ffffff" stroke="#ececef"/>
  <text x="136" y="120" font-size="10.5" fill="#1d1d1f" text-anchor="middle">Deployment 控制器</text>
  <text x="136" y="136" font-size="10" fill="#a1a1a6" text-anchor="middle">reconcile</text>
  <rect x="238" y="100" width="180" height="44" rx="8" fill="#ffffff" stroke="#ececef"/>
  <text x="328" y="120" font-size="10.5" fill="#1d1d1f" text-anchor="middle">Node / Job / PV 控制器…</text>
  <text x="328" y="136" font-size="10" fill="#a1a1a6" text-anchor="middle">reconcile</text>
  <rect x="46" y="152" width="372" height="44" rx="8" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="232" y="172" font-size="10.5" fill="#1b2a4a" text-anchor="middle">共享 SharedInformerFactory（同一资源只 List+Watch 一次）</text>
  <text x="232" y="188" font-size="10" fill="#5b7db1" text-anchor="middle">NewControllerDescriptors 注册全部控制器（:248）</text>
  <rect x="46" y="204" width="372" height="46" rx="8" fill="#f5faf6" stroke="#cfe6d2"/>
  <text x="232" y="224" font-size="10.5" font-weight="600" fill="#1d8f3f" text-anchor="middle">leader 选举（竞争 Lease 锁）</text>
  <text x="232" y="242" font-size="10" fill="#4a8a5c" text-anchor="middle">只有 leader 真正运行控制器循环，其余待命（:315）</text>

  <!-- GC -->
  <rect x="470" y="66" width="400" height="200" rx="12" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#soft)"/>
  <text x="486" y="90" font-size="12.5" font-weight="600" fill="#8a6d3b">垃圾回收 GC · 对象依赖图</text>
  <rect x="560" y="104" width="220" height="30" rx="6" fill="#ffffff" stroke="#ececef"/>
  <text x="670" y="124" font-size="10.5" fill="#1d1d1f" text-anchor="middle">Deployment（owner）</text>
  <rect x="560" y="150" width="220" height="30" rx="6" fill="#ffffff" stroke="#ececef"/>
  <text x="670" y="170" font-size="10.5" fill="#1d1d1f" text-anchor="middle">ReplicaSet（owner=Deploy）</text>
  <rect x="560" y="196" width="220" height="30" rx="6" fill="#ffffff" stroke="#ececef"/>
  <text x="670" y="216" font-size="10.5" fill="#1d1d1f" text-anchor="middle">Pod（owner=RS）</text>
  <path d="M670 134 L670 150" fill="none" stroke="#8a6d3b" stroke-width="1.3" marker-end="url(#ar)"/>
  <path d="M670 180 L670 196" fill="none" stroke="#8a6d3b" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="486" y="128" font-size="10.5" fill="#6e6e73">删 owner →</text>
  <text x="486" y="148" font-size="10.5" fill="#6e6e73">沿 ownerRef</text>
  <text x="486" y="168" font-size="10.5" fill="#6e6e73">级联删孤儿</text>
  <text x="486" y="188" font-size="10.5" fill="#6e6e73">attemptTo</text>
  <text x="486" y="208" font-size="10.5" fill="#6e6e73">DeleteItem</text>
  <text x="486" y="228" font-size="10" fill="#a1a1a6">gc.go:342</text>

  <!-- finalizer -->
  <rect x="30" y="286" width="840" height="56" rx="10" fill="#f7f7f9" stroke="#ececef"/>
  <text x="46" y="310" font-size="12" font-weight="600" fill="#1d1d1f">finalizers · 删除前钩子（可阻塞）</text>
  <text x="46" y="330" font-size="11" fill="#6e6e73">删除只是打 deletionTimestamp；对象要等所有 finalizer 被对应控制器处理并移除后才真正消失（用于释放云盘/注销 LB 等外部清理）</text>

  <text x="30" y="372" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">删除传播：</tspan>Foreground（先删下游）/ Background（owner 先删、后台清下游）/ Orphan（只删 owner、留下游）</text>
  <text x="30" y="398" font-size="11.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">卡 Terminating：</tspan>几乎总是 finalizer 未被移除 —— 排查对应控制器是否健康，勿盲目强删</text>
  <text x="30" y="422" font-size="11.5" fill="#a1a1a6">GC + finalizer 让"删除"也纳入声明式 + reconcile 的正确收敛，是支撑控制平面稳定运转的公共机制</text>
</svg>
