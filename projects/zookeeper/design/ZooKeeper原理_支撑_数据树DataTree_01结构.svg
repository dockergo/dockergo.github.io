<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">DataTree / ZKDatabase：全量内存 znode 树（读写都在此，磁盘只为恢复）</text>

  <!-- ZKDatabase 容器 -->
  <rect x="30" y="52" width="600" height="300" rx="14" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="48" y="76" font-size="12" font-weight="600" fill="#2c5a3a">ZKDatabase（内存数据库门面）</text>

  <!-- nodes map -->
  <rect x="52" y="90" width="270" height="120" rx="12" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="70" y="112" font-size="10.5" font-weight="600" fill="#7a4d00">nodes：ConcurrentHashMap</text>
  <text x="70" y="128" font-size="9" fill="#9a7328">path(String) → DataNode（快速定位）</text>
  <rect x="70" y="138" width="234" height="24" rx="6" fill="#ffffff" stroke="#f0dcae"/><text x="187" y="154" font-size="8.5" fill="#7a4d00" text-anchor="middle">"" → root DataNode</text>
  <rect x="70" y="166" width="234" height="24" rx="6" fill="#ffffff" stroke="#f0dcae"/><text x="187" y="182" font-size="8.5" fill="#7a4d00" text-anchor="middle">"/app/config" → DataNode …</text>
  <text x="70" y="204" font-size="8" fill="#86868b">DataTree · root</text>

  <!-- ephemerals index -->
  <rect x="342" y="90" width="270" height="120" rx="12" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="360" y="112" font-size="10.5" font-weight="600" fill="#0f5132">ephemerals：sessionId → 路径集</text>
  <text x="360" y="128" font-size="9" fill="#3f8f66">会话结束时按此批量删临时节点</text>
  <rect x="360" y="138" width="234" height="24" rx="6" fill="#ffffff" stroke="#bce6cd"/><text x="477" y="154" font-size="8.5" fill="#0f5132" text-anchor="middle">0x1a2b → {/app/workers/w-01, …}</text>
  <text x="360" y="182" font-size="9" fill="#3f8f66">另有 containers / ttls 集合</text>
  <text x="360" y="204" font-size="8" fill="#86868b">ephemerals · containers · ttls</text>

  <!-- DataNode 剖面 -->
  <rect x="52" y="224" width="560" height="112" rx="12" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="70" y="246" font-size="10.5" font-weight="600" fill="#1d1d1f">DataNode</text>
  <text x="70" y="268" font-size="9" fill="#494950">data[] · acl 引用 Long（多节点共享去重）</text>
  <text x="70" y="288" font-size="9" fill="#494950">stat：czxid/mzxid/pzxid · version/cversion/aversion · ephemeralOwner</text>
  <text x="70" y="308" font-size="9" fill="#494950">children：Set&lt;String&gt;（子节点名）</text>
  <text x="70" y="326" font-size="8" fill="#86868b">读直接查 nodes.get(path)；无锁并发读（ConcurrentHashMap + NodeHashMap 摘要）</text>

  <!-- 操作 -->
  <rect x="650" y="52" width="280" height="300" rx="14" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="668" y="76" font-size="12" font-weight="600" fill="#1b2a4a">写操作（processTxn 幂等应用）</text>
  <rect x="668" y="90" width="244" height="30" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="790" y="109" font-size="8.5" fill="#1b2a4a" text-anchor="middle">createNode</text>
  <rect x="668" y="126" width="244" height="30" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="790" y="145" font-size="8.5" fill="#1b2a4a" text-anchor="middle">setData（version 自增）</text>
  <rect x="668" y="162" width="244" height="30" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="790" y="181" font-size="8.5" fill="#1b2a4a" text-anchor="middle">deleteNode</text>
  <rect x="668" y="198" width="244" height="30" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="790" y="217" font-size="8.5" fill="#1b2a4a" text-anchor="middle">getChildren / getData</text>
  <text x="668" y="252" font-size="9" fill="#5b7db1">processTxn：ZAB Commit 后按 zxid</text>
  <text x="668" y="270" font-size="9" fill="#5b7db1">顺序 apply 事务，幂等（重放安全）。</text>
  <text x="668" y="294" font-size="9" fill="#5b7db1">读不改树、不加写锁 → 读吞吐高。</text>
  <text x="668" y="318" font-size="9" fill="#5b7db1">digest（可选）：树内容摘要，防不一致。</text>

  <!-- 底部 -->
  <rect x="30" y="366" width="900" height="130" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="390" font-size="11.5" font-weight="600" fill="#1d1d1f">为什么全量在内存</text>
  <text x="48" y="414" font-size="9.5" fill="#494950">· ZK 存小数据（配置/元数据/协调状态），整棵树轻松放进内存 → 读写都是内存操作，微秒级延迟。</text>
  <text x="48" y="434" font-size="9.5" fill="#494950">· 磁盘上的 TxnLog + 快照只用于崩溃恢复与新成员同步（见 事务日志与快照），不在读写关键路径查磁盘。</text>
  <text x="48" y="454" font-size="9.5" fill="#494950">· 代价：znode 数量与总数据量受内存约束（勿存海量/大 value）；jute.maxbuffer 限单节点数据默认约 1MB。</text>
  <text x="48" y="476" font-size="9" fill="#86868b">对比 etcd：etcd 用 boltdb（B+树落盘）+ treeIndex 内存索引 + MVCC 多版本；ZK 是纯内存树、仅最新值 + stat 版本号。</text>
</svg>
