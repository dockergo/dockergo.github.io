<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">一次写请求在 Leader 链的流水线 · 主链广播与内嵌 Sync→Ack 并行，CommitProcessor 汇合</text>

  <!-- 图例 -->
  <rect x="30" y="46" width="14" height="10" rx="2" fill="#eef3fb" stroke="#bcd0ec"/><text x="50" y="55" font-size="9" fill="#494950">处理器</text>
  <rect x="112" y="46" width="14" height="10" rx="2" fill="#fdf6ea" stroke="#efdcb4"/><text x="132" y="55" font-size="9" fill="#494950">落盘</text>
  <rect x="182" y="46" width="14" height="10" rx="2" fill="#eafaf1" stroke="#bce6cd"/><text x="202" y="55" font-size="9" fill="#494950">提交 / apply</text>
  <rect x="292" y="46" width="14" height="10" rx="2" fill="#f2f2f4" stroke="#d5d5db"/><text x="312" y="55" font-size="9" fill="#494950">跨节点网络</text>

  <!-- 主链 -->
  <rect x="30" y="72" width="120" height="46" rx="9" fill="#f4eefb" stroke="#d9c9ef"/><text x="90" y="92" font-size="9.5" font-weight="600" fill="#3c1361" text-anchor="middle">Prep</text><text x="90" y="107" font-size="7.5" fill="#7a3fb0" text-anchor="middle">校验+ACL+建事务</text>
  <rect x="182" y="72" width="130" height="46" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="247" y="92" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Proposal</text><text x="247" y="107" font-size="7.5" fill="#5b7db1" text-anchor="middle">写 → 分道</text>
  <rect x="620" y="72" width="130" height="46" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="685" y="92" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">CommitProcessor</text><text x="685" y="107" font-size="7.5" fill="#5b7db1" text-anchor="middle">汇合两条序</text>
  <rect x="800" y="72" width="130" height="46" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="865" y="92" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">Final</text><text x="865" y="107" font-size="7.5" fill="#3f8f66" text-anchor="middle">apply+watch+响应</text>
  <line x1="150" y1="95" x2="182" y2="95" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="750" y1="95" x2="800" y2="95" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- 分叉：广播路径（上） -->
  <rect x="356" y="146" width="230" height="96" rx="12" fill="#f2f2f4" stroke="#d5d5db"/>
  <text x="372" y="168" font-size="10" font-weight="600" fill="#3a3a3c">① 广播路径（跨节点）</text>
  <rect x="372" y="180" width="90" height="46" rx="8" fill="#ffffff" stroke="#d5d5db"/><text x="417" y="200" font-size="8.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">propose</text><text x="417" y="215" font-size="7.5" fill="#86868b" text-anchor="middle">PROPOSAL→follower</text>
  <rect x="480" y="180" width="94" height="46" rx="8" fill="#ffffff" stroke="#d5d5db"/><text x="527" y="200" font-size="8.5" font-weight="600" fill="#0f5132" text-anchor="middle">过半 ACK</text><text x="527" y="215" font-size="7.5" fill="#86868b" text-anchor="middle">follower 落盘后回</text>
  <line x1="462" y1="203" x2="480" y2="203" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- 分叉：本地落盘路径（下） -->
  <rect x="356" y="256" width="230" height="96" rx="12" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="372" y="278" font-size="10" font-weight="600" fill="#7a4d00">② 内嵌 Sync→Ack（Leader 本地）</text>
  <rect x="372" y="290" width="90" height="46" rx="8" fill="#ffffff" stroke="#efdcb4"/><text x="417" y="310" font-size="8.5" font-weight="600" fill="#7a4d00" text-anchor="middle">Sync</text><text x="417" y="325" font-size="7.5" fill="#9a7328" text-anchor="middle">落 TxnLog+快照</text>
  <rect x="480" y="290" width="94" height="46" rx="8" fill="#ffffff" stroke="#efdcb4"/><text x="527" y="310" font-size="8.5" font-weight="600" fill="#7a4d00" text-anchor="middle">Ack</text><text x="527" y="325" font-size="7.5" fill="#9a7328" text-anchor="middle">给自己记一票</text>
  <line x1="462" y1="313" x2="480" y2="313" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- Proposal 分叉出两路 -->
  <line x1="247" y1="118" x2="247" y2="194" stroke="#c7c7cc" stroke-width="1.2"/>
  <line x1="247" y1="194" x2="356" y2="194" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="247" y1="118" x2="247" y2="304" stroke="#c7c7cc" stroke-width="1.2"/>
  <line x1="247" y1="304" x2="356" y2="304" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- 两路汇入 tryToCommit -->
  <rect x="620" y="200" width="130" height="52" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="685" y="222" font-size="9" font-weight="600" fill="#0f5132" text-anchor="middle">tryToCommit</text><text x="685" y="238" font-size="7.5" fill="#3f8f66" text-anchor="middle">过半且 zxid 按序 → COMMIT</text>
  <line x1="586" y1="203" x2="620" y2="220" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="586" y1="313" x2="620" y2="240" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="685" y1="200" x2="685" y2="118" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="694" y="165" font-size="7.5" fill="#86868b">COMMIT 交 CommitProcessor 放行</text>

  <!-- 读旁路 -->
  <rect x="30" y="146" width="300" height="80" rx="12" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="168" font-size="10" font-weight="600" fill="#2c5a3a">读请求：不进 ZAB</text>
  <text x="46" y="188" font-size="8.5" fill="#2f6f4f">getData/getChildren 由 Final 直查内存树，</text>
  <text x="46" y="204" font-size="8.5" fill="#2f6f4f">不 propose、不落盘 → 可被任意 follower 服务。</text>
  <text x="46" y="220" font-size="8" fill="#86868b">读写分道，是读吞吐可扩展的物理基础。</text>

  <!-- 底部不变式 -->
  <rect x="30" y="372" width="900" height="146" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="396" font-size="11.5" font-weight="600" fill="#1d1d1f">为什么这样拼</text>
  <text x="48" y="420" font-size="9.5" fill="#494950">· 每个 RequestProcessor 有独立线程 + 输入队列，请求像流水线推进 → 关注点分离 + 并发吞吐。</text>
  <text x="48" y="440" font-size="9.5" fill="#494950">· CommitProcessor 是"本地排序序 ↔ ZAB 提交序"的唯一汇合点：写按全序放行、读看到已提交状态。</text>
  <text x="48" y="460" font-size="9.5" fill="#494950">· Leader 两条 sync 分支不同：主链 propose 广播给 follower；内嵌 Sync→Ack 让 Leader 自己落盘并自投一票。</text>
  <text x="48" y="484" font-size="10.5" font-weight="600" fill="#1d1d1f">不变式</text>
  <text x="48" y="506" font-size="9.5" fill="#86868b">过半即定（不等所有节点）· 按 zxid 顺序提交（全序）· 先落盘再 Ack（持久性）· 单机链无 Proposal/Commit，Sync→Final 直落。</text>
</svg>
