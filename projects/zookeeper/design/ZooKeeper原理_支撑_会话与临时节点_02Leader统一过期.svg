<svg xmlns="http://www.w3.org/2000/svg" width="960" height="470" viewBox="0 0 960 470"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">为什么过期由 Leader 统一裁决 · 临时节点回收走 ZAB 全序，各副本在同一 zxid 点一致删除</text>

  <!-- 图例 -->
  <rect x="30" y="46" width="14" height="10" rx="2" fill="#fbeaea" stroke="#e7c3c3"/><text x="50" y="55" font-size="9" fill="#494950">各自判定的隐患</text>
  <rect x="176" y="46" width="14" height="10" rx="2" fill="#eef3fb" stroke="#bcd0ec"/><text x="196" y="55" font-size="9" fill="#494950">Leader 统一裁决</text>
  <rect x="322" y="46" width="14" height="10" rx="2" fill="#eafaf1" stroke="#bce6cd"/><text x="342" y="55" font-size="9" fill="#494950">全序回收结果</text>

  <!-- 隐患 -->
  <rect x="30" y="72" width="300" height="180" rx="14" fill="#fbeaea" stroke="#e7c3c3"/>
  <text x="48" y="94" font-size="11" font-weight="600" fill="#7a2a2a">若各节点各自判过期</text>
  <text x="48" y="118" font-size="9" fill="#7a2a2a">· 时钟漂移 / 网络抖动不一致</text>
  <text x="48" y="140" font-size="9" fill="#7a2a2a">· 同一 session 在 A 判过期、</text>
  <text x="62" y="156" font-size="9" fill="#7a2a2a">在 B 仍存活</text>
  <text x="48" y="180" font-size="9" fill="#7a2a2a">· 其临时节点在不同副本上</text>
  <text x="62" y="196" font-size="9" fill="#7a2a2a">存亡不一致 → 分裂视图</text>
  <text x="48" y="226" font-size="8.5" fill="#a15b5b">锁/选主依赖"临时节点存在性"，</text>
  <text x="48" y="242" font-size="8.5" fill="#a15b5b">不一致即可能双主 / 锁错释放</text>

  <!-- 因果链（中右） -->
  <rect x="352" y="72" width="578" height="180" rx="14" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="370" y="94" font-size="11" font-weight="600" fill="#1b2a4a">解法：Leader 统一发起 closeSession，经 ZAB 全序广播</text>
  <rect x="368" y="106" width="120" height="56" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="428" y="128" font-size="8.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">桶到点</text><text x="428" y="144" font-size="7.5" fill="#5b7db1" text-anchor="middle">session 未续期</text>
  <rect x="508" y="106" width="130" height="56" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="573" y="128" font-size="8.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Leader closeSession</text><text x="573" y="144" font-size="7.5" fill="#5b7db1" text-anchor="middle">编码成事务</text>
  <rect x="658" y="106" width="120" height="56" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="718" y="128" font-size="8.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">ZAB 全序</text><text x="718" y="144" font-size="7.5" fill="#5b7db1" text-anchor="middle">同一 zxid 提交</text>
  <rect x="798" y="106" width="118" height="56" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="857" y="128" font-size="8.5" font-weight="600" fill="#0f5132" text-anchor="middle">各副本一致删</text><text x="857" y="144" font-size="7.5" fill="#3f8f66" text-anchor="middle">同一逻辑点</text>
  <line x1="488" y1="134" x2="508" y2="134" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="638" y1="134" x2="658" y2="134" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="778" y1="134" x2="798" y2="134" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="370" y="188" font-size="9" fill="#5b7db1">删除依据：DataTree 的 ephemerals[sessionId] → 该会话创建的所有临时节点路径集，批量删。</text>
  <text x="370" y="208" font-size="9" fill="#5b7db1">删除后触发 NodeDeleted watch，通知监听者（锁竞争者据此抢锁、成员感知刷新）。</text>
  <text x="370" y="230" font-size="8.5" fill="#86868b">心跳 touchSession 也汇聚到 Leader 续期；LeaderSessionTracker 统一管理 global 会话。</text>

  <!-- 底部不变式 -->
  <rect x="30" y="266" width="900" height="186" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="290" font-size="11.5" font-weight="600" fill="#1d1d1f">由此保证的不变式</text>
  <text x="48" y="314" font-size="9.5" fill="#494950">· "临时节点存在性"本身也是强一致：所有副本在同一 zxid 点看到同样的存/亡，不会分裂。</text>
  <text x="48" y="334" font-size="9.5" fill="#494950">· ephemeralOwner = sessionId 让"会话在节点在、会话亡节点删"成为全序事实——这是锁/选主/成员感知的根。</text>
  <text x="48" y="354" font-size="9.5" fill="#494950">· 分桶过期只是"何时判"的高效机制（O(桶数)）；"如何一致地删"由 Leader + ZAB 保证，二者分工。</text>
  <text x="48" y="378" font-size="10.5" font-weight="600" fill="#1d1d1f">工程要害</text>
  <text x="48" y="400" font-size="9.5" fill="#86868b">· sessionTimeout 太小 → 抖动/GC 停顿即过期 → 锁临时节点被删 → 多客户端同时以为持锁。</text>
  <text x="48" y="420" font-size="9.5" fill="#86868b">· TCP 断开 ≠ 会话结束：仅进重连，超 timeout 未续期才 EXPIRED；会话恢复后须重建临时节点 + 重挂 watch。</text>
  <text x="48" y="440" font-size="9.5" fill="#86868b">· 与 etcd 不同：ZK 无显式 lease/keepalive RPC，绑的是连接生命周期。</text>
</svg>
