<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">RequestProcessor 责任链 · 三种拓扑（每个处理器一个线程 + 队列）</text>

  <!-- 单机 -->
  <rect x="30" y="52" width="900" height="86" rx="12" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="74" font-size="11" font-weight="600" fill="#2c5a3a">单机 standalone（ZooKeeperServer.setupRequestProcessors）</text>
  <rect x="120" y="88" width="200" height="34" rx="8" fill="#f4eefb" stroke="#d9c9ef"/><text x="220" y="109" font-size="9.5" font-weight="600" fill="#3c1361" text-anchor="middle">PrepRequestProcessor</text>
  <rect x="390" y="88" width="200" height="34" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="490" y="109" font-size="9.5" font-weight="600" fill="#7a4d00" text-anchor="middle">SyncRequestProcessor</text>
  <rect x="660" y="88" width="200" height="34" rx="8" fill="#eafaf1" stroke="#bce6cd"/><text x="760" y="109" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">FinalRequestProcessor</text>
  <line x1="320" y1="105" x2="390" y2="105" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="590" y1="105" x2="660" y2="105" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- Leader -->
  <rect x="30" y="152" width="900" height="180" rx="12" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="174" font-size="11" font-weight="600" fill="#1b2a4a">Leader（LeaderZooKeeperServer.setupRequestProcessors）</text>
  <rect x="46" y="188" width="150" height="34" rx="8" fill="#ffffff" stroke="#bcd0ec"/><text x="121" y="209" font-size="8.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">LeaderRequestProc</text>
  <rect x="212" y="188" width="150" height="34" rx="8" fill="#f4eefb" stroke="#d9c9ef"/><text x="287" y="209" font-size="8.5" font-weight="600" fill="#3c1361" text-anchor="middle">PrepRequestProc</text>
  <rect x="378" y="188" width="160" height="34" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="458" y="205" font-size="8.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">ProposalRequestProc</text><text x="458" y="217" font-size="7" fill="#5b7db1" text-anchor="middle">写→ Leader.propose</text>
  <rect x="554" y="188" width="150" height="34" rx="8" fill="#ffffff" stroke="#bcd0ec"/><text x="629" y="209" font-size="8.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">CommitProcessor</text>
  <rect x="720" y="188" width="90" height="34" rx="8" fill="#ffffff" stroke="#bcd0ec"/><text x="765" y="205" font-size="7.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">ToBeApplied</text><text x="765" y="216" font-size="7" fill="#5b7db1" text-anchor="middle">Proc</text>
  <rect x="826" y="188" width="90" height="34" rx="8" fill="#eafaf1" stroke="#bce6cd"/><text x="871" y="205" font-size="7.5" font-weight="600" fill="#0f5132" text-anchor="middle">Final</text><text x="871" y="216" font-size="7" fill="#3f8f66" text-anchor="middle">Proc</text>
  <line x1="196" y1="205" x2="212" y2="205" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="362" y1="205" x2="378" y2="205" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="538" y1="205" x2="554" y2="205" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="704" y1="205" x2="720" y2="205" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="810" y1="205" x2="826" y2="205" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <!-- 旁路 sync -->
  <rect x="378" y="262" width="160" height="52" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="458" y="282" font-size="8.5" font-weight="600" fill="#7a4d00" text-anchor="middle">SyncRequestProc</text><text x="458" y="298" font-size="7.5" fill="#9a7328" text-anchor="middle">落 TxnLog + 快照</text>
  <rect x="554" y="262" width="150" height="52" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="629" y="282" font-size="8.5" font-weight="600" fill="#7a4d00" text-anchor="middle">AckRequestProc</text><text x="629" y="298" font-size="7.5" fill="#9a7328" text-anchor="middle">Leader 给自己记 Ack</text>
  <line x1="458" y1="222" x2="458" y2="262" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="538" y1="288" x2="554" y2="288" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="46" y="292" font-size="8.5" fill="#5b7db1">ProposalRequestProc 分叉：① 转 Commit（等提交）</text>
  <text x="46" y="308" font-size="8.5" fill="#5b7db1">② 写才 propose 广播 ③ 经 Sync→Ack 自己落盘计票</text>

  <!-- Follower -->
  <rect x="30" y="346" width="900" height="140" rx="12" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="46" y="368" font-size="11" font-weight="600" fill="#0f5132">Follower（FollowerZooKeeperServer.setupRequestProcessors）</text>
  <rect x="80" y="384" width="180" height="34" rx="8" fill="#ffffff" stroke="#bce6cd"/><text x="170" y="405" font-size="8.5" font-weight="600" fill="#0f5132" text-anchor="middle">FollowerRequestProc</text>
  <rect x="320" y="384" width="180" height="34" rx="8" fill="#ffffff" stroke="#bce6cd"/><text x="410" y="405" font-size="8.5" font-weight="600" fill="#0f5132" text-anchor="middle">CommitProcessor</text>
  <rect x="560" y="384" width="180" height="34" rx="8" fill="#ffffff" stroke="#bce6cd"/><text x="650" y="405" font-size="8.5" font-weight="600" fill="#0f5132" text-anchor="middle">FinalRequestProc</text>
  <line x1="260" y1="401" x2="320" y2="401" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="500" y1="401" x2="560" y2="401" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <rect x="320" y="432" width="200" height="36" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="420" y="450" font-size="8" font-weight="600" fill="#7a4d00" text-anchor="middle">SyncRequestProc → SendAck</text><text x="420" y="463" font-size="7.5" fill="#9a7328" text-anchor="middle">logRequest：落盘后回 Ack 给 Leader</text>
  <text x="560" y="446" font-size="8.5" fill="#3f8f66">写请求转发给 Leader；收到 COMMIT 才经</text>
  <text x="560" y="462" font-size="8.5" fill="#3f8f66">CommitProcessor 放行到 Final apply。</text>

  <text x="30" y="512" font-size="9.5" fill="#494950">责任链模式：每个 RequestProcessor 有独立线程 + 输入队列，processRequest 入队后异步流向 nextProcessor。</text>
  <text x="30" y="532" font-size="9.5" fill="#494950">CommitProcessor 的作用：把"本地已排好的写"与"ZAB 送回的 COMMIT"对齐，保证读看到的是已提交状态、写按全序放行。</text>
  <text x="30" y="550" font-size="9" fill="#86868b">Observer 类似 Follower 但无 SyncRequestProc 参与投票（ObserverZooKeeperServer.setupRequestProcessors），只同步 + 服务读。</text>
</svg>
