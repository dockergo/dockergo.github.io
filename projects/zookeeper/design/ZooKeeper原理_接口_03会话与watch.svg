<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">会话生命周期 + watch 一次性触发（客户端视角）</text>

  <!-- session 状态机 -->
  <rect x="30" y="56" width="900" height="150" rx="14" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="48" y="80" font-size="12" font-weight="600" fill="#2c5a3a">会话状态机（一次 TCP + 一个 sessionId + 一个 timeout）</text>

  <rect x="60" y="100" width="140" height="48" rx="11" fill="#ffffff" stroke="#bcd0ec" filter="url(#soft)"/><text x="130" y="128" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">CONNECTING</text>
  <rect x="250" y="100" width="140" height="48" rx="11" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/><text x="320" y="128" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">CONNECTED</text>
  <rect x="440" y="100" width="150" height="48" rx="11" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/><text x="515" y="122" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">SUSPENDED</text><text x="515" y="138" font-size="7.5" fill="#9a7328" text-anchor="middle">断连重连中</text>
  <rect x="640" y="100" width="140" height="48" rx="11" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/><text x="710" y="128" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">RECONNECTED</text>
  <rect x="640" y="160" width="140" height="36" rx="11" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/><text x="710" y="182" font-size="10" font-weight="600" fill="#7a2a2a" text-anchor="middle">EXPIRED</text>

  <line x1="200" y1="124" x2="250" y2="124" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="390" y1="124" x2="440" y2="124" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="590" y1="124" x2="640" y2="124" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="515" y1="148" x2="680" y2="160" stroke="#e7c3c3" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="600" y="158" font-size="8" fill="#7a2a2a">超 timeout 未重连 → 过期</text>
  <text x="180" y="196" font-size="9" fill="#3f8f66">CONNECTED 时定期发 PING 心跳（约 timeout/3）；重连可换到集群里另一台服务器（同一 sessionId 迁移）。</text>

  <!-- watch 一次性 -->
  <rect x="30" y="228" width="900" height="180" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="252" font-size="12" font-weight="600" fill="#1d1d1f">watch：一次性触发（标准模式）</text>

  <rect x="60" y="268" width="180" height="44" rx="10" fill="#f4eefb" stroke="#d9c9ef"/><text x="150" y="290" font-size="9.5" font-weight="600" fill="#3c1361" text-anchor="middle">① getData(path, watch=true)</text><text x="150" y="304" font-size="8" fill="#7a3fb0" text-anchor="middle">读的同时注册一个 watcher</text>
  <rect x="290" y="268" width="180" height="44" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="380" y="290" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">② 别人 setData(path)</text><text x="380" y="304" font-size="8" fill="#3f8f66" text-anchor="middle">该 znode 发生变更</text>
  <rect x="520" y="268" width="180" height="44" rx="10" fill="#fff7e6" stroke="#f0dcae"/><text x="610" y="290" font-size="9.5" font-weight="600" fill="#7a4d00" text-anchor="middle">③ 服务端推 1 个事件</text><text x="610" y="304" font-size="8" fill="#9a7328" text-anchor="middle">NodeDataChanged</text>
  <rect x="750" y="268" width="180" height="44" rx="10" fill="#fbeaea" stroke="#e7c3c3"/><text x="840" y="290" font-size="9.5" font-weight="600" fill="#7a2a2a" text-anchor="middle">④ watcher 即失效</text><text x="840" y="304" font-size="8" fill="#7a2a2a" text-anchor="middle">想继续收 → 重新 getData</text>

  <line x1="240" y1="290" x2="290" y2="290" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="470" y1="290" x2="520" y2="290" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="700" y1="290" x2="750" y2="290" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <text x="48" y="344" font-size="10" fill="#494950">· 一次性：触发后必须重新注册，否则后续变更收不到——设计上避免服务端为海量长期 watch 保持状态。</text>
  <text x="48" y="364" font-size="10" fill="#494950">· 有序保证：客户端先收到 watch 事件、再看到后续读结果，watch 与数据视图顺序一致（同一 zxid 序）。</text>
  <text x="48" y="384" font-size="10" fill="#494950">· 3.6+ 持久/递归 watch（addWatch PERSISTENT / PERSISTENT_RECURSIVE）：触发后不失效、可监子树——补足一次性语义。</text>
  <text x="30" y="436" font-size="9.5" fill="#86868b">对比 etcd：etcd watch 按 revision 持续流、可从历史 revision 补发；ZK 标准 watch 一次性、无历史补发（重连时客户端重挂）。</text>
</svg>
