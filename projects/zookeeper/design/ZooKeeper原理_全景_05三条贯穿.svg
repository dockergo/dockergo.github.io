<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">三条贯穿声明 · 不单列主线，但覆盖全局的 ZooKeeper 心智锚</text>

  <!-- ① 写全序、读本地 -->
  <rect x="30" y="56" width="290" height="240" rx="14" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="48" y="80" font-size="11.5" font-weight="600" fill="#1b2a4a">① 写全序、读本地</text>
  <rect x="48" y="94" width="254" height="52" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="175" y="114" font-size="9" font-weight="600" fill="#1b2a4a" text-anchor="middle">写 → 编码成事务 → ZAB 广播</text><text x="175" y="130" font-size="8" fill="#5b7db1" text-anchor="middle">过半 + 按 zxid 全序提交 = 线性化写</text>
  <rect x="48" y="154" width="254" height="52" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="175" y="174" font-size="9" font-weight="600" fill="#0f5132" text-anchor="middle">读 → 直查本地内存树</text><text x="175" y="190" font-size="8" fill="#3f8f66" text-anchor="middle">不经共识 → 可随 follower/observer 扩展</text>
  <text x="48" y="228" font-size="8.5" fill="#5b7db1">· 代价：读可能略旧；要最新用 sync + read。</text>
  <text x="48" y="248" font-size="8.5" fill="#5b7db1">· 这是 ZK "读多写少" 场景的立身之本。</text>
  <text x="48" y="276" font-size="8.5" fill="#86868b">对应总架构：写走请求处理链 + ZAB，</text>
  <text x="48" y="290" font-size="8.5" fill="#86868b">读在 Final 直接返回。</text>

  <!-- ② zxid 顺序锚 -->
  <rect x="336" y="56" width="290" height="240" rx="14" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="352" y="80" font-size="11.5" font-weight="600" fill="#7a4d00">② zxid 是一切顺序的锚</text>
  <rect x="352" y="94" width="258" height="46" rx="9" fill="#ffffff" stroke="#efdcb4"/><text x="481" y="112" font-size="9" font-weight="600" fill="#7a4d00" text-anchor="middle">64 位 zxid</text><text x="481" y="128" font-size="8" fill="#9a7328" text-anchor="middle">epoch（高32）| counter（低32）</text>
  <text x="352" y="162" font-size="9" fill="#9a7328">· epoch：第几任 leader（换主则 +1）</text>
  <text x="352" y="182" font-size="9" fill="#9a7328">· counter：任内单调递增</text>
  <rect x="352" y="196" width="258" height="70" rx="9" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="481" y="216" font-size="8.5" font-weight="600" fill="#7a4d00" text-anchor="middle">全序由它统一</text>
  <text x="481" y="234" font-size="8" fill="#9a7328" text-anchor="middle">选举比 zxid · 恢复比 zxid</text>
  <text x="481" y="250" font-size="8" fill="#9a7328" text-anchor="middle">提交按 zxid 递增 · 快照记 zxid</text>
  <text x="352" y="286" font-size="8.5" fill="#86868b">epoch 单调 → 旧 leader 复活的低 epoch 包被拒（防脑裂）。</text>

  <!-- ③ 全量内存 + 磁盘只为恢复 -->
  <rect x="642" y="56" width="288" height="240" rx="14" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="658" y="80" font-size="11.5" font-weight="600" fill="#2c5a3a">③ 全量内存 + 磁盘只为恢复</text>
  <rect x="658" y="94" width="256" height="52" rx="9" fill="#ffffff" stroke="#cfe6d5"/><text x="786" y="114" font-size="9" font-weight="600" fill="#0f5132" text-anchor="middle">整棵 znode 树常驻内存</text><text x="786" y="130" font-size="8" fill="#3f8f66" text-anchor="middle">读写都在内存树上 → 微秒级</text>
  <rect x="658" y="154" width="256" height="52" rx="9" fill="#fdf6ea" stroke="#efdcb4"/><text x="786" y="174" font-size="9" font-weight="600" fill="#7a4d00" text-anchor="middle">TxnLog + 快照在磁盘</text><text x="786" y="190" font-size="8" fill="#9a7328" text-anchor="middle">只用于崩溃恢复与新成员同步</text>
  <text x="658" y="230" font-size="8.5" fill="#2f6f4f">· 故 ZK 存"小数据"：配置 / 元数据 /</text>
  <text x="672" y="246" font-size="8.5" fill="#2f6f4f">协调状态，不是海量业务数据。</text>
  <text x="658" y="270" font-size="8.5" fill="#86868b">要正确与低延迟协调，而非大吞吐存储；</text>
  <text x="658" y="284" font-size="8.5" fill="#86868b">jute.maxbuffer 默认约 1MB 限单节点。</text>

  <!-- 底部收束 -->
  <rect x="30" y="312" width="900" height="112" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="336" font-size="11.5" font-weight="600" fill="#1d1d1f">三条如何合流</text>
  <text x="48" y="360" font-size="9.5" fill="#494950">· 一次 create 临时顺序节点：经 ZAB 达成全序（①）、按 zxid 定序并分配顺序号（②）、apply 到内存树并落 TxnLog（③）。</text>
  <text x="48" y="380" font-size="9.5" fill="#494950">· 同一个操作在多条主线各有落点，正是 ZK 的分层——归属看"能力域"而非它出现在哪个 API。</text>
  <text x="48" y="402" font-size="9.5" fill="#86868b">· 由此 ZK 成为 Kafka / HBase / Hadoop 等系统的协调底座：存"关于系统的关键真相"，用奇数节点抗故障。</text>
</svg>
