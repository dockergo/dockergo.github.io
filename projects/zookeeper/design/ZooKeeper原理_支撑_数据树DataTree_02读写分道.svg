<svg xmlns="http://www.w3.org/2000/svg" width="960" height="470" viewBox="0 0 960 470"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">DataTree 读写分道 · 读直查内存返回，写经 ZAB 提交后 processTxn 按 zxid 幂等 apply</text>

  <!-- 图例 -->
  <rect x="30" y="46" width="14" height="10" rx="2" fill="#eafaf1" stroke="#bce6cd"/><text x="50" y="55" font-size="9" fill="#494950">读路径（不经共识）</text>
  <rect x="176" y="46" width="14" height="10" rx="2" fill="#eef3fb" stroke="#bcd0ec"/><text x="196" y="55" font-size="9" fill="#494950">写路径（经 ZAB 全序）</text>

  <!-- 读路径 -->
  <rect x="30" y="72" width="900" height="110" rx="14" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="48" y="94" font-size="11.5" font-weight="600" fill="#2c5a3a">读：getData / getChildren / exists</text>
  <rect x="60" y="106" width="150" height="52" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="135" y="128" font-size="9" font-weight="600" fill="#0f5132" text-anchor="middle">client</text><text x="135" y="144" font-size="7.5" fill="#3f8f66" text-anchor="middle">读请求</text>
  <rect x="270" y="106" width="180" height="52" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="360" y="128" font-size="9" font-weight="600" fill="#0f5132" text-anchor="middle">FinalRequestProcessor</text><text x="360" y="144" font-size="7.5" fill="#3f8f66" text-anchor="middle">读在链尾直接处理</text>
  <rect x="510" y="106" width="180" height="52" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="600" y="128" font-size="9" font-weight="600" fill="#0f5132" text-anchor="middle">nodes.get(path)</text><text x="600" y="144" font-size="7.5" fill="#3f8f66" text-anchor="middle">无写锁 · 无磁盘 IO</text>
  <rect x="750" y="106" width="150" height="52" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="825" y="128" font-size="9" font-weight="600" fill="#0f5132" text-anchor="middle">返回</text><text x="825" y="144" font-size="7.5" fill="#3f8f66" text-anchor="middle">微秒级 · 可能略旧</text>
  <line x1="210" y1="132" x2="270" y2="132" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="450" y1="132" x2="510" y2="132" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="690" y1="132" x2="750" y2="132" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- 写路径 -->
  <rect x="30" y="196" width="900" height="120" rx="14" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="48" y="218" font-size="11.5" font-weight="600" fill="#1b2a4a">写：create / setData / delete / multi</text>
  <rect x="60" y="232" width="130" height="56" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="125" y="254" font-size="8.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Prep 建事务</text><text x="125" y="270" font-size="7.5" fill="#5b7db1" text-anchor="middle">校验 + ChangeRecord</text>
  <rect x="210" y="232" width="180" height="56" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="300" y="250" font-size="8.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">ZAB 全序</text><text x="300" y="266" font-size="7.5" fill="#5b7db1" text-anchor="middle">Proposal→过半Ack→Commit</text><text x="300" y="280" font-size="7.5" fill="#5b7db1" text-anchor="middle">分配单调 zxid</text>
  <rect x="410" y="232" width="200" height="56" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="510" y="250" font-size="8.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">processTxn 幂等 apply</text><text x="510" y="266" font-size="7.5" fill="#5b7db1" text-anchor="middle">createNode/setData/deleteNode</text><text x="510" y="280" font-size="7.5" fill="#5b7db1" text-anchor="middle">按 zxid 顺序 · version 自增</text>
  <rect x="630" y="232" width="130" height="56" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="695" y="254" font-size="8.5" font-weight="600" fill="#0f5132" text-anchor="middle">DataTree 变更</text><text x="695" y="270" font-size="7.5" fill="#3f8f66" text-anchor="middle">仅存最新值</text>
  <rect x="780" y="232" width="120" height="56" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="840" y="254" font-size="8.5" font-weight="600" fill="#0f5132" text-anchor="middle">触发 watch</text><text x="840" y="270" font-size="7.5" fill="#3f8f66" text-anchor="middle">返回响应</text>
  <line x1="190" y1="260" x2="210" y2="260" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="390" y1="260" x2="410" y2="260" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="610" y1="260" x2="630" y2="260" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="760" y1="260" x2="780" y2="260" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- 底部 -->
  <rect x="30" y="330" width="900" height="122" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="354" font-size="11.5" font-weight="600" fill="#1d1d1f">为什么读写要分道</text>
  <text x="48" y="378" font-size="9.5" fill="#494950">· 读不改树、不加写锁、不查磁盘 → 读吞吐可随 follower/observer 水平扩展（"读多写少"场景的立身之本）。</text>
  <text x="48" y="398" font-size="9.5" fill="#494950">· 写不直接改树：必经 ZAB Commit 后才 apply，未提交不可见；幂等 + 全序 ⇒ 任何副本重放同一段日志得到同一棵树。</text>
  <text x="48" y="418" font-size="9.5" fill="#494950">· 代价：读可能读到略旧值（刚写完从另一节点读或未追上）→ 要最新用 sync + read 付一次共识开销。</text>
  <text x="48" y="440" font-size="9" fill="#86868b">只存最新值 + stat.version（非 MVCC，version 仅供 CAS）；磁盘上的日志/快照只用于恢复，不在读写关键路径。</text>
</svg>
