<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="580" viewBox="0 0 1080 580" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="aHot" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="aCtl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
    <marker id="aState" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c99a3a"/></marker>
    <marker id="aRead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2b9ca8"/></marker>
    <marker id="aEvt" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8a5cae"/></marker>
  </defs>
  <rect width="1080" height="580" fill="#fbfbfd"/>

  <!-- ===== 标题带 ===== -->
  <text x="30" y="28" font-size="14" font-weight="600" fill="#1d1d1f">Apache ZooKeeper 总架构 · 多视角透视：唯一 Leader 用 ZAB 把内存 znode 树复制成线性化协调服务</text>
  <text x="30" y="45" font-size="10.5" fill="#6e6e73">分层脊：客户端 API → 请求处理链 → ZAB 原子广播（Leader/Follower 集群）→ 内存 DataTree → 事务日志/快照　源码基准 3.10.0</text>

  <!-- ===== 设计张力铭牌带 ===== -->
  <rect x="24" y="54" width="1032" height="24" rx="7" fill="#f5f0fb" stroke="#ddcdf0"/>
  <text x="40" y="70" font-size="10" font-weight="600" fill="#3d2a5a">设计张力</text>
  <text x="108" y="70" font-size="9.5" fill="#6d5b8f">线性化强一致（唯一 Leader·ZAB 过半提交·zxid 全序，写要正确非吞吐） vs 写吞吐受限于单 Leader + 过半 Ack（靠读旁路直查内存 + Observer 扩读，不扩写）</text>

  <!-- ===== 图例：五型语义路径 ===== -->
  <line x1="40" y1="88" x2="68" y2="88" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aHot)"/>
  <text x="74" y="92" font-size="10.5" fill="#3a3a3c">写主链 Hot</text>
  <line x1="196" y1="88" x2="224" y2="88" stroke="#5b7db1" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aCtl)"/>
  <text x="230" y="92" font-size="10.5" fill="#3a3a3c">ZAB 两阶段 Control（虚线）</text>
  <line x1="416" y1="88" x2="444" y2="88" stroke="#2b9ca8" stroke-width="1.8" marker-end="url(#aRead)"/>
  <text x="450" y="92" font-size="10.5" fill="#3a3a3c">读旁路·直查内存树</text>
  <line x1="616" y1="88" x2="644" y2="88" stroke="#c99a3a" stroke-width="1.8" marker-end="url(#aState)"/>
  <text x="650" y="92" font-size="10.5" fill="#3a3a3c">日志/快照 State</text>
  <line x1="786" y1="88" x2="814" y2="88" stroke="#8a5cae" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aEvt)"/>
  <text x="820" y="92" font-size="10.5" fill="#3a3a3c">watch 事件（虚线）</text>
  <text x="1056" y="92" font-size="10" fill="#a1a1a6" text-anchor="end">框 = 主线可下钻</text>

  <!-- ===== powers 立身带（全景主线框架） ===== -->
  <rect x="24" y="104" width="1032" height="30" rx="8" fill="#f6f6f8" stroke="#e2e2e7" data-tid="ZooKeeper原理_全景主线框架" data-lab="全景主线框架"/>
  <text x="40" y="123" font-size="10" fill="#4a4a4f">powers：Kafka(旧)·HBase·Hadoop·Flink·Curator 的协调底座 —— 存"系统关键真相"（小数据·强一致·读多写少·要正确非吞吐）</text>

  <!-- ===== ① 客户端接触面 ===== -->
  <rect x="24" y="144" width="1032" height="60" rx="14" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)" data-tid="ZooKeeper原理_接口_客户端API与znode" data-lab="客户端 API 与 znode"/>
  <text x="40" y="164" font-size="12" font-weight="600" fill="#3c1361">① 客户端接触面 · ZooKeeper API + znode 路径 + session</text>
  <g text-anchor="middle" font-size="9">
    <rect x="40" y="172" width="316" height="26" rx="7" fill="#fff" stroke="#d9c9ef"/><text x="198" y="189" fill="#3c1361">写：create / setData / delete（走 ZAB）</text>
    <rect x="372" y="172" width="316" height="26" rx="7" fill="#fff" stroke="#d9c9ef"/><text x="530" y="189" fill="#3c1361">读：getData / getChildren / exists（直查本地）</text>
    <rect x="704" y="172" width="336" height="26" rx="7" fill="#fff" stroke="#d9c9ef"/><text x="872" y="189" fill="#3c1361">watch 一次性通知 · session 心跳</text>
  </g>

  <!-- ===== ② 请求处理链 ===== -->
  <rect x="24" y="212" width="1032" height="62" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)" data-tid="ZooKeeper原理_支撑_请求处理链" data-lab="请求处理链"/>
  <text x="40" y="230" font-size="11.5" font-weight="600" fill="#1b2a4a">② 请求处理链 · RequestProcessor 责任链（Leader 拓扑）</text>
  <g text-anchor="middle">
    <rect x="40" y="238" width="188" height="30" rx="8" fill="#fff" stroke="#bcd0ec"/><text x="134" y="252" font-size="9" font-weight="600" fill="#1b2a4a">Prep</text><text x="134" y="263" font-size="7.5" fill="#5b7db1">校验+ACL+生成 Txn</text>
    <rect x="240" y="238" width="188" height="30" rx="8" fill="#fff" stroke="#bcd0ec"/><text x="334" y="252" font-size="9" font-weight="600" fill="#1b2a4a">Proposal</text><text x="334" y="263" font-size="7.5" fill="#5b7db1">写才 propose 给 ZAB</text>
    <rect x="440" y="238" width="188" height="30" rx="8" fill="#fff" stroke="#bcd0ec"/><text x="534" y="252" font-size="9" font-weight="600" fill="#1b2a4a">Sync</text><text x="534" y="263" font-size="7.5" fill="#5b7db1">落 TxnLog + 触发快照</text>
    <rect x="640" y="238" width="188" height="30" rx="8" fill="#fff" stroke="#bcd0ec"/><text x="734" y="252" font-size="9" font-weight="600" fill="#1b2a4a">Commit</text><text x="734" y="263" font-size="7.5" fill="#5b7db1">保证提交顺序</text>
    <rect x="840" y="238" width="200" height="30" rx="8" fill="#fff" stroke="#bcd0ec"/><text x="940" y="252" font-size="9" font-weight="600" fill="#1b2a4a">Final</text><text x="940" y="263" font-size="7.5" fill="#5b7db1">apply DataTree + 触 watch</text>
  </g>

  <!-- ===== ③ ZAB 共识核心（Leader ↔ Follower） ===== -->
  <rect x="24" y="282" width="1032" height="100" rx="14" fill="#eafaf1" stroke="#b8e6cd" filter="url(#soft)"/>
  <text x="40" y="302" font-size="12" font-weight="600" fill="#1c6b45">③ ZAB 原子广播 · 共识核心（Leader ↔ Follower 集群，写的灵魂）</text>
  <rect x="40" y="310" width="280" height="62" rx="9" fill="#fff" stroke="#b8e6cd" data-tid="ZooKeeper原理_支撑_ZAB原子广播" data-lab="ZAB 原子广播"/>
  <text x="180" y="332" font-size="10.5" font-weight="600" fill="#1c6b45" text-anchor="middle">Leader · 唯一写入者</text>
  <text x="180" y="349" font-size="8.5" fill="#3a9b6e" text-anchor="middle">Proposal → Ack → Commit</text>
  <text x="180" y="364" font-size="8.5" fill="#3a9b6e" text-anchor="middle">收齐过半 Ack 即提交 · zxid 全序</text>
  <rect x="392" y="310" width="286" height="62" rx="9" fill="#f7fdfa" stroke="#cdeadc"/>
  <text x="535" y="332" font-size="10.5" font-weight="600" fill="#1c6b45" text-anchor="middle">Follower ×(N−1)</text>
  <text x="535" y="349" font-size="8.5" fill="#3a9b6e" text-anchor="middle">落 TxnLog 回 Ack · apply · 转发写</text>
  <text x="535" y="364" font-size="8.5" fill="#3a9b6e" text-anchor="middle">Observer 只同步不投票 · 扩读吞吐</text>
  <rect x="700" y="310" width="340" height="62" rx="9" fill="#fff" stroke="#b8e6cd" data-tid="ZooKeeper原理_支撑_集群与Quorum" data-lab="集群与 Quorum"/>
  <text x="870" y="332" font-size="10.5" font-weight="600" fill="#1c6b45" text-anchor="middle">集群与 Quorum</text>
  <text x="870" y="349" font-size="8.5" fill="#3a9b6e" text-anchor="middle">FastLeaderElection 选主 · QuorumCnxManager</text>
  <text x="870" y="364" font-size="8.5" fill="#3a9b6e" text-anchor="middle">过半 QuorumVerifier · reconfig 动态成员</text>
  <!-- Control：Leader ↔ Follower 两阶段广播 -->
  <text x="356" y="322" font-size="7.5" fill="#5b7db1" text-anchor="middle">Proposal→</text>
  <text x="356" y="362" font-size="7.5" fill="#5b7db1" text-anchor="middle">←Ack</text>
  <line x1="322" y1="326" x2="390" y2="326" stroke="#5b7db1" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#aCtl)"/>
  <line x1="390" y1="356" x2="322" y2="356" stroke="#5b7db1" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#aCtl)"/>

  <!-- ===== ④ 内存数据层 ===== -->
  <rect x="24" y="390" width="1032" height="96" rx="14" fill="#fdf3e5" stroke="#f0d9b5" filter="url(#soft)"/>
  <text x="40" y="410" font-size="12" font-weight="600" fill="#7a5a1e">④ 内存数据层 · DataTree（全量常驻内存，读写都在此）+ 协调保障</text>
  <g text-anchor="middle">
    <rect x="40" y="418" width="300" height="60" rx="9" fill="#fff" stroke="#f0d9b5" data-tid="ZooKeeper原理_支撑_数据树DataTree" data-lab="数据树 DataTree"/><text x="190" y="442" font-size="10.5" font-weight="600" fill="#7a5a1e">数据树 DataTree</text><text x="190" y="459" font-size="8.5" fill="#b08535">层级 znode · DataNode · ephemerals 索引</text><text x="190" y="472" font-size="8.5" fill="#b08535">stat 版本号（CAS）</text>
    <rect x="356" y="418" width="220" height="60" rx="9" fill="#fff" stroke="#f0d9b5" data-tid="ZooKeeper原理_支撑_Watch机制" data-lab="Watch 机制"/><text x="466" y="442" font-size="10" font-weight="600" fill="#7a5a1e">Watch 机制</text><text x="466" y="459" font-size="8.5" fill="#b08535">一次性触发通知</text><text x="466" y="472" font-size="8.5" fill="#b08535">标准/持久/递归</text>
    <rect x="592" y="418" width="220" height="60" rx="9" fill="#fff" stroke="#f0d9b5" data-tid="ZooKeeper原理_支撑_会话与临时节点" data-lab="会话与临时节点"/><text x="702" y="442" font-size="10" font-weight="600" fill="#7a5a1e">会话与临时节点</text><text x="702" y="459" font-size="8.5" fill="#b08535">心跳 + 分桶过期</text><text x="702" y="472" font-size="8.5" fill="#b08535">ephemeral 绑 session</text>
    <rect x="828" y="418" width="212" height="60" rx="9" fill="#fff" stroke="#f0d9b5" data-tid="ZooKeeper原理_支撑_ACL权限" data-lab="ACL 权限"/><text x="934" y="442" font-size="10" font-weight="600" fill="#7a5a1e">ACL 权限</text><text x="934" y="459" font-size="8.5" fill="#b08535">scheme:id:perm</text><text x="934" y="472" font-size="8.5" fill="#b08535">每 znode 独立 · 插件</text>
  </g>

  <!-- ===== ⑤ 事务日志 / 快照 ===== -->
  <rect x="24" y="494" width="1032" height="56" rx="14" fill="#fdf9f0" stroke="#efe3cd" data-tid="ZooKeeper原理_支撑_事务日志与快照" data-lab="事务日志与快照"/>
  <text x="40" y="513" font-size="11" font-weight="600" fill="#7a5a1e">⑤ 事务日志 / 快照 · 崩溃恢复与新成员同步（磁盘只为恢复，非业务大数据）</text>
  <g text-anchor="middle" font-size="8.5" fill="#b08535">
    <rect x="40" y="520" width="244" height="24" rx="7" fill="#fff" stroke="#efe3cd"/><text x="162" y="536">FileTxnLog · WAL 顺序追加</text>
    <rect x="296" y="520" width="244" height="24" rx="7" fill="#fff" stroke="#efe3cd"/><text x="418" y="536">FileSnap · 模糊快照</text>
    <rect x="552" y="520" width="244" height="24" rx="7" fill="#fff" stroke="#efe3cd"/><text x="674" y="536">崩溃恢复：snap + log 重放</text>
    <rect x="808" y="520" width="232" height="24" rx="7" fill="#fff" stroke="#efe3cd"/><text x="924" y="536">新成员：DIFF/SNAP 同步</text>
  </g>

  <!-- ===== 语义分型连线 ===== -->
  <!-- Hot 写主链：接触面 → 处理链 → ZAB → 数据层 -->
  <line x1="200" y1="204" x2="200" y2="212" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aHot)"/>
  <line x1="200" y1="274" x2="200" y2="282" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aHot)"/>
  <line x1="200" y1="382" x2="200" y2="390" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aHot)"/>
  <!-- State 落盘：数据层 → 日志/快照 -->
  <line x1="500" y1="486" x2="500" y2="494" stroke="#c99a3a" stroke-width="1.8" marker-end="url(#aState)"/>
  <!-- 读旁路（右侧栏）：接触面 → 数据层，跳过处理链 / ZAB -->
  <path d="M1068,175 L1068,445" fill="none" stroke="#2b9ca8" stroke-width="1.8" marker-end="url(#aRead)"/>
  <text x="1064" y="310" font-size="8.5" fill="#2b9ca8" text-anchor="middle" transform="rotate(90 1064 310)">读旁路 · 直查内存树</text>
  <!-- watch 事件（左侧栏）：数据层 → 接触面 通知回推 -->
  <path d="M12,445 L12,178" fill="none" stroke="#8a5cae" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aEvt)"/>
  <text x="16" y="310" font-size="8.5" fill="#8a5cae" text-anchor="middle" transform="rotate(-90 16 310)">watch 通知回推</text>

  <!-- ===== 读法 ===== -->
  <rect x="24" y="558" width="1032" height="0.1" fill="none"/>
  <text x="540" y="572" font-size="10" fill="#4a4a4f" text-anchor="middle">读法：写经处理链 propose 给 Leader → ZAB 广播过半 Ack → 按 zxid 提交并 apply 到内存 DataTree → 触发 watch；读直查本地内存树不经共识；TxnLog/快照只为崩溃恢复</text>
</svg>
