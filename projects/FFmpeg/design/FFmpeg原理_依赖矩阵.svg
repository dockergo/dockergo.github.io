<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="480" viewBox="0 0 1080 480" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="480" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">FFmpeg 依赖矩阵 —— 接触面用例 × 支撑能力域</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">转码=基础用例(依赖 5 域);滤镜、硬件解码为可选叠加,各自引入专属能力域 ｜ ✓ 表示该用例依赖该能力域</text>

  <!-- 列表头 -->
  <text x="244" y="112" font-size="9.5" font-weight="600" text-anchor="middle" fill="#1d1d1f">库分层</text>
  <text x="352" y="112" font-size="9.5" font-weight="600" text-anchor="middle" fill="#1d1d1f">核心数据结构</text>
  <text x="460" y="112" font-size="9.5" font-weight="600" text-anchor="middle" fill="#1d1d1f">编解码管线</text>
  <text x="568" y="112" font-size="9.5" font-weight="600" text-anchor="middle" fill="#1d1d1f">容器格式</text>
  <text x="676" y="112" font-size="9.5" font-weight="600" text-anchor="middle" fill="#1d1d1f">引用计数</text>
  <text x="784" y="112" font-size="9.5" font-weight="600" text-anchor="middle" fill="#1d1d1f">滤镜图</text>
  <text x="892" y="112" font-size="9.5" font-weight="600" text-anchor="middle" fill="#1d1d1f">像素采样格式</text>
  <text x="1000" y="112" font-size="9.5" font-weight="600" text-anchor="middle" fill="#1d1d1f">硬件加速</text>
  <path d="M30,120 L1054,120" stroke="#e4e4ea" stroke-width="1" fill="none"/>

  <!-- 行:转码 -->
  <rect x="30" y="132" width="160" height="70" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="110" y="162" font-size="12" font-weight="600" text-anchor="middle" fill="#12402a">转码</text>
  <text x="110" y="182" font-size="8.5" text-anchor="middle" fill="#2f6f4f">基础用例 · 各库协作</text>
  <rect x="196" y="138" width="96" height="58" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="244" y="172" font-size="16" text-anchor="middle" fill="#2f6f4f">✓</text>
  <rect x="304" y="138" width="96" height="58" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="352" y="172" font-size="16" text-anchor="middle" fill="#2f6f4f">✓</text>
  <rect x="412" y="138" width="96" height="58" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="460" y="172" font-size="16" text-anchor="middle" fill="#2f6f4f">✓</text>
  <rect x="520" y="138" width="96" height="58" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="568" y="172" font-size="16" text-anchor="middle" fill="#2f6f4f">✓</text>
  <rect x="628" y="138" width="96" height="58" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="676" y="172" font-size="16" text-anchor="middle" fill="#2f6f4f">✓</text>
  <rect x="736" y="138" width="96" height="58" rx="9" fill="#f7f7f9" stroke="#ececf1"/><text x="784" y="171" font-size="12" text-anchor="middle" fill="#c7c7cc"></text>
  <rect x="844" y="138" width="96" height="58" rx="9" fill="#f7f7f9" stroke="#ececf1"/><text x="892" y="171" font-size="12" text-anchor="middle" fill="#c7c7cc"></text>
  <rect x="952" y="138" width="96" height="58" rx="9" fill="#f7f7f9" stroke="#ececf1"/><text x="1000" y="171" font-size="12" text-anchor="middle" fill="#c7c7cc"></text>

  <!-- 行:滤镜 -->
  <rect x="30" y="212" width="160" height="70" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="110" y="242" font-size="12" font-weight="600" text-anchor="middle" fill="#1b2a4a">滤镜(可选)</text>
  <text x="110" y="262" font-size="8.5" text-anchor="middle" fill="#5b7db1">-vf 编译成滤镜图</text>
  <rect x="196" y="218" width="96" height="58" rx="9" fill="#f7f7f9" stroke="#ececf1"/><text x="244" y="251" font-size="12" text-anchor="middle" fill="#c7c7cc"></text>
  <rect x="304" y="218" width="96" height="58" rx="9" fill="#f7f7f9" stroke="#ececf1"/><text x="352" y="251" font-size="12" text-anchor="middle" fill="#c7c7cc"></text>
  <rect x="412" y="218" width="96" height="58" rx="9" fill="#f7f7f9" stroke="#ececf1"/><text x="460" y="251" font-size="12" text-anchor="middle" fill="#c7c7cc"></text>
  <rect x="520" y="218" width="96" height="58" rx="9" fill="#f7f7f9" stroke="#ececf1"/><text x="568" y="251" font-size="12" text-anchor="middle" fill="#c7c7cc"></text>
  <rect x="628" y="218" width="96" height="58" rx="9" fill="#f7f7f9" stroke="#ececf1"/><text x="676" y="251" font-size="12" text-anchor="middle" fill="#c7c7cc"></text>
  <rect x="736" y="218" width="96" height="58" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="784" y="252" font-size="16" text-anchor="middle" fill="#5b7db1">✓</text>
  <rect x="844" y="218" width="96" height="58" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="892" y="252" font-size="16" text-anchor="middle" fill="#5b7db1">✓</text>
  <rect x="952" y="218" width="96" height="58" rx="9" fill="#f7f7f9" stroke="#ececf1"/><text x="1000" y="251" font-size="12" text-anchor="middle" fill="#c7c7cc"></text>

  <!-- 行:硬件解码 -->
  <rect x="30" y="292" width="160" height="70" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="110" y="322" font-size="12" font-weight="600" text-anchor="middle" fill="#5a3410">硬件解码(可选)</text>
  <text x="110" y="342" font-size="8.5" text-anchor="middle" fill="#93762e">GPU 加速解码</text>
  <rect x="196" y="298" width="96" height="58" rx="9" fill="#f7f7f9" stroke="#ececf1"/><text x="244" y="331" font-size="12" text-anchor="middle" fill="#c7c7cc"></text>
  <rect x="304" y="298" width="96" height="58" rx="9" fill="#f7f7f9" stroke="#ececf1"/><text x="352" y="331" font-size="12" text-anchor="middle" fill="#c7c7cc"></text>
  <rect x="412" y="298" width="96" height="58" rx="9" fill="#f7f7f9" stroke="#ececf1"/><text x="460" y="331" font-size="12" text-anchor="middle" fill="#c7c7cc"></text>
  <rect x="520" y="298" width="96" height="58" rx="9" fill="#f7f7f9" stroke="#ececf1"/><text x="568" y="331" font-size="12" text-anchor="middle" fill="#c7c7cc"></text>
  <rect x="628" y="298" width="96" height="58" rx="9" fill="#f7f7f9" stroke="#ececf1"/><text x="676" y="331" font-size="12" text-anchor="middle" fill="#c7c7cc"></text>
  <rect x="736" y="298" width="96" height="58" rx="9" fill="#f7f7f9" stroke="#ececf1"/><text x="784" y="331" font-size="12" text-anchor="middle" fill="#c7c7cc"></text>
  <rect x="844" y="298" width="96" height="58" rx="9" fill="#f7f7f9" stroke="#ececf1"/><text x="892" y="331" font-size="12" text-anchor="middle" fill="#c7c7cc"></text>
  <rect x="952" y="298" width="96" height="58" rx="9" fill="#fff7e6" stroke="#e8cf9a"/><text x="1000" y="332" font-size="16" text-anchor="middle" fill="#93762e">✓</text>

  <!-- 图例 -->
  <rect x="30" y="384" width="1024" height="54" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="50" y="408" font-size="10.5" font-weight="600" fill="#1d1d1f">读法</text>
  <text x="50" y="426" font-size="9" fill="#6e6e73">转码是基础:依赖 库分层+核心数据结构+编解码管线+容器格式+引用计数 五域协作;滤镜叠加需 滤镜图+像素采样格式;硬件解码叠加需 hwaccel</text>
  <text x="820" y="408" font-size="9" fill="#2f6f4f">✓ = 依赖</text>
  <text x="820" y="426" font-size="9" fill="#c7c7cc">· = 无</text>

  <text x="30" y="462" font-size="9" fill="#a1a1a6">源码基准 FFmpeg(git 1588bce) · 依赖是叠加式:多数转码只需基础五域,加 -vf 才引入滤镜图/格式转换,-hwaccel 才引入 GPU 解码</text>
</svg>
