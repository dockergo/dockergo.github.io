<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">CLI vs API —— 何时用哪个</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">多数转码用 CLI(声明式参数);做产品(播放器/云转码)用 API(编程控制) ｜ CLI 本身用 API 实现</text>

  <!-- CLI 卡 -->
  <rect x="30" y="80" width="500" height="260" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="52" y="110" font-size="13" font-weight="600" fill="#1b2a4a">命令行 ffmpeg 工具</text>
  <text x="52" y="130" font-size="9" fill="#5b7db1">无需写代码 · 声明式参数 · 绝大多数转码需求够用</text>

  <text x="52" y="162" font-size="10.5" font-weight="600" fill="#1b2a4a">适用场景</text>
  <rect x="52" y="172" width="456" height="30" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="66" y="191" font-size="9.5" fill="#274a78">一次性转码 / 处理:ffmpeg -i in.mp4 out.webm</text>
  <rect x="52" y="208" width="456" height="30" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="66" y="227" font-size="9.5" fill="#274a78">脚本批处理:循环调用命令批量转</text>
  <rect x="52" y="244" width="456" height="30" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="66" y="263" font-size="9.5" fill="#274a78">快速试参数:调分辨率/码率/滤镜效果</text>

  <text x="52" y="300" font-size="10.5" font-weight="600" fill="#1b2a4a">特点</text>
  <text x="52" y="320" font-size="9" fill="#5b7db1">声明式:参数按位置编译成管线配置,不接触代码</text>

  <!-- API 卡 -->
  <rect x="550" y="80" width="500" height="260" rx="14" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="572" y="110" font-size="13" font-weight="600" fill="#4a2c6f">libav* C API</text>
  <text x="572" y="130" font-size="9" fill="#7a5aa0">链接库编程 · 精细控制 · 嵌入应用</text>

  <text x="572" y="162" font-size="10.5" font-weight="600" fill="#4a2c6f">适用场景</text>
  <rect x="572" y="172" width="456" height="30" rx="8" fill="#faf5ff" stroke="#e5d5f2"/>
  <text x="586" y="191" font-size="9.5" fill="#4a2c6f">嵌入应用:播放器 / 编辑器 / 流媒体服务</text>
  <rect x="572" y="208" width="456" height="30" rx="8" fill="#faf5ff" stroke="#e5d5f2"/>
  <text x="586" y="227" font-size="9.5" fill="#4a2c6f">精细控制:逐帧处理 / 自定义滤镜 / 动态参数</text>
  <rect x="572" y="244" width="456" height="30" rx="8" fill="#faf5ff" stroke="#e5d5f2"/>
  <text x="586" y="263" font-size="9.5" fill="#4a2c6f">性能敏感集成:写 C / 语言绑定调用</text>

  <text x="572" y="300" font-size="10.5" font-weight="600" fill="#4a2c6f">特点</text>
  <text x="572" y="320" font-size="9" fill="#7a5aa0">编程式:avformat_open_input → send/receive → write_frame</text>

  <!-- 关系:CLI 用 API 实现 -->
  <rect x="30" y="366" width="1020" height="70" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="50" y="392" font-size="12" font-weight="600" fill="#12402a">关系 · API 是底层,CLI 是封装</text>
  <text x="50" y="414" font-size="9.5" fill="#2f6f4f">命令行工具 <tspan font-weight="600">fftools/ffmpeg.c</tspan> 本身就用 libav API 实现 —— 底层都是 demux→decode→filter→encode→mux 管线;CLI 把声明式参数编译成 API 调用序列</text>
  <!-- 从 CLI/API 卡指向关系条 -->
  <path d="M280,340 L280,354 L540,354 L540,366" stroke="#c7c7cc" stroke-width="1.3" fill="none" marker-end="url(#ar)"/>
  <path d="M800,340 L800,354 L560,354 L560,366" stroke="#c7c7cc" stroke-width="1.3" stroke-dasharray="5 4" fill="none" marker-end="url(#ar)"/>

  <text x="30" y="470" font-size="9" fill="#a1a1a6">源码基准 FFmpeg(git 1588bce) · CLI 覆盖常见转码(声明式),API 覆盖深度集成(编程控制);两层同一底座——CLI 是 API 的高层封装</text>
</svg>
