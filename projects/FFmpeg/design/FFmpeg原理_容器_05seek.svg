<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
    <marker id="arG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#7fb79a"/></marker>
    <marker id="arR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#d6a2a2"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">seek 定位 —— 三级策略回退 + 关键帧对齐</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">给目标时间戳,依次试格式专属 / 二分 / 通用索引 ｜ 命中即返回 ｜ 定位后清队列,回退到目标前最近关键帧</text>

  <!-- 图例 -->
  <rect x="700" y="20" width="12" height="12" rx="3" fill="#eef3fb" stroke="#bcd0ec"/><text x="717" y="30" font-size="9" fill="#6e6e73">入口/控制</text>
  <rect x="782" y="20" width="12" height="12" rx="3" fill="#fff7e6" stroke="#e8cf9a"/><text x="799" y="30" font-size="9" fill="#6e6e73">回退策略</text>
  <rect x="864" y="20" width="12" height="12" rx="3" fill="#eafaf1" stroke="#bfe0cd"/><text x="881" y="30" font-size="9" fill="#6e6e73">命中/收尾</text>
  <rect x="944" y="20" width="12" height="12" rx="3" fill="#fbeaea" stroke="#e6b8b8"/><text x="961" y="30" font-size="9" fill="#6e6e73">失败回退</text>

  <!-- 入口 -->
  <rect x="30" y="86" width="216" height="104" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="138" y="116" font-size="11.5" font-weight="600" text-anchor="middle" fill="#1b2a4a">av_seek_frame</text>
  <text x="138" y="136" font-size="11.5" font-weight="600" text-anchor="middle" fill="#1b2a4a">avformat_seek_file</text>
  <text x="138" y="160" font-size="9" text-anchor="middle" fill="#5b7db1">入参:流 + 目标时间戳</text>
  <text x="138" y="176" font-size="9" text-anchor="middle" fill="#5b7db1">+ flags(范围版带 min/max)</text>

  <!-- FLAG -->
  <rect x="30" y="204" width="216" height="176" rx="13" fill="#ffffff" stroke="#e4e4ea" filter="url(#soft)"/>
  <text x="52" y="230" font-size="11" font-weight="600" fill="#1d1d1f">flags · 定位语义</text>
  <rect x="52" y="242" width="172" height="40" rx="8" fill="#f7f7f9" stroke="#e4e4ea"/>
  <text x="66" y="260" font-size="9.5" font-weight="600" fill="#1d1d1f">BACKWARD</text>
  <text x="66" y="276" font-size="8.5" fill="#86868b">回退到目标前最近关键帧</text>
  <rect x="52" y="288" width="172" height="40" rx="8" fill="#f7f7f9" stroke="#e4e4ea"/>
  <text x="66" y="306" font-size="9.5" font-weight="600" fill="#1d1d1f">ANY</text>
  <text x="66" y="322" font-size="8.5" fill="#86868b">允许非关键帧(可能花屏)</text>
  <rect x="52" y="334" width="172" height="40" rx="8" fill="#f7f7f9" stroke="#e4e4ea"/>
  <text x="66" y="352" font-size="9.5" font-weight="600" fill="#1d1d1f">BYTE</text>
  <text x="66" y="368" font-size="8.5" fill="#86868b">按字节偏移,不按时间</text>

  <!-- 回退策略栈 -->
  <text x="300" y="80" font-size="11" font-weight="600" fill="#5a3410">策略回退栈 · 从上到下,命中即返回</text>
  <rect x="300" y="88" width="410" height="64" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="320" y="114" font-size="10.5" font-weight="600" fill="#1b2a4a">① read_seek2 · 范围定位(优先)</text>
  <text x="320" y="134" font-size="8.8" fill="#5b7db1">带 min/ts/max,格式在区间内精确定位;新式接口</text>

  <rect x="300" y="164" width="410" height="64" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="320" y="190" font-size="10.5" font-weight="600" fill="#5a3410">② read_seek · 格式专属</text>
  <text x="320" y="210" font-size="8.8" fill="#93762e">muxer/demuxer 自带 seek(如索引原子直接跳)</text>

  <rect x="300" y="240" width="410" height="64" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="320" y="266" font-size="10.5" font-weight="600" fill="#5a3410">③ ff_seek_frame_binary · 二分查找</text>
  <text x="320" y="286" font-size="8.8" fill="#93762e">靠 read_timestamp 在文件里二分逼近目标</text>

  <rect x="300" y="316" width="410" height="64" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="320" y="342" font-size="10.5" font-weight="600" fill="#5a3410">④ seek_frame_generic · 通用索引</text>
  <text x="320" y="362" font-size="8.8" fill="#93762e">查 index_entries 索引表,跳到最近条目</text>

  <!-- 失败回退箭头 -->
  <path d="M712,120 C740,120 740,196 714,196" stroke="#d6a2a2" stroke-width="1.4" stroke-dasharray="3 3" fill="none" marker-end="url(#arR)"/>
  <path d="M712,196 C740,196 740,272 714,272" stroke="#d6a2a2" stroke-width="1.4" stroke-dasharray="3 3" fill="none" marker-end="url(#arR)"/>
  <path d="M712,272 C740,272 740,348 714,348" stroke="#d6a2a2" stroke-width="1.4" stroke-dasharray="3 3" fill="none" marker-end="url(#arR)"/>
  <text x="748" y="238" font-size="8.5" fill="#a05a5a">不支持</text>
  <text x="748" y="252" font-size="8.5" fill="#a05a5a">则回退</text>

  <path d="M246,138 L298,120" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 收尾 -->
  <rect x="792" y="88" width="258" height="292" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="814" y="116" font-size="11.5" font-weight="600" fill="#12402a">命中后收尾</text>
  <rect x="814" y="130" width="214" height="60" rx="9" fill="#ffffff" stroke="#dceee4"/>
  <text x="828" y="152" font-size="10" font-weight="600" fill="#12402a">ff_read_frame_flush</text>
  <text x="828" y="170" font-size="8.8" fill="#2f6f4f">清空 packet / parse 队列</text>
  <text x="828" y="184" font-size="8.8" fill="#2f6f4f">丢弃 seek 前的残留数据</text>
  <rect x="814" y="200" width="214" height="60" rx="9" fill="#ffffff" stroke="#dceee4"/>
  <text x="828" y="222" font-size="10" font-weight="600" fill="#12402a">更新 cur_dts</text>
  <text x="828" y="240" font-size="8.8" fill="#2f6f4f">重置各流当前解码时间戳</text>
  <text x="828" y="254" font-size="8.8" fill="#2f6f4f">下次读包从新位置起</text>
  <rect x="814" y="270" width="214" height="60" rx="9" fill="#ffffff" stroke="#dceee4"/>
  <text x="828" y="292" font-size="10" font-weight="600" fill="#12402a">queue_attached_pictures</text>
  <text x="828" y="310" font-size="8.8" fill="#2f6f4f">重排封面/附加图片</text>
  <text x="828" y="324" font-size="8.8" fill="#2f6f4f">保证附图仍在流首</text>
  <text x="814" y="356" font-size="9" fill="#4a8a63">随后从关键帧解到目标,再交给上层</text>

  <path d="M710,120 C750,120 760,120 790,150" stroke="#7fb79a" stroke-width="1.6" fill="none" marker-end="url(#arG)"/>
  <text x="726" y="98" font-size="8.5" fill="#4a8a63">命中</text>

  <!-- 为什么 -->
  <rect x="30" y="398" width="1020" height="88" rx="13" fill="#ffffff" stroke="#e4e4ea" filter="url(#soft)"/>
  <text x="52" y="424" font-size="11" font-weight="600" fill="#1d1d1f">为什么回退到关键帧</text>
  <text x="52" y="446" font-size="9.5" fill="#6e6e73">解码器需从关键帧(I 帧,自带完整画面)起步,P/B 帧只存与参考帧的差分,脱离参考无法独立解码。</text>
  <text x="52" y="464" font-size="9.5" fill="#6e6e73">BACKWARD 先定位到目标前最近关键帧,再顺序解到目标时刻并丢弃前面的帧 —— 保证画面正确,代价是多解几帧。ANY 跳过此步但可能花屏。</text>

  <text x="30" y="504" font-size="9" fill="#a1a1a6">源码基准 FFmpeg(1588bce) · read_seek2 → read_seek → binary → generic 回退 · 定位后 flush + 关键帧对齐</text>
</svg>
