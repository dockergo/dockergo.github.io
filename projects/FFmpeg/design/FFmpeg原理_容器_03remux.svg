<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">FFmpeg remux —— 免解码转封装（换容器不换编码）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">demux 出压缩包 → 直接 mux 进新容器，跳过 decode/encode；编码流一字不改，无质量损失、极快</text>

  <!-- command bar -->
  <rect x="30" y="72" width="1020" height="40" rx="10" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="50" y="97" font-size="12" font-weight="600" fill="#3d2a5a">ffmpeg -i in.mkv -c copy out.mp4</text>
  <text x="360" y="97" font-size="9.5" fill="#7a5aa0">-c copy = 流原样拷贝，不重新压缩</text>

  <!-- main pipeline -->
  <rect x="30" y="150" width="170" height="86" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="115" y="182" font-size="11.5" font-weight="600" text-anchor="middle" fill="#5a3410">in.mkv</text>
  <text x="115" y="204" font-size="9" text-anchor="middle" fill="#93762e">mkv 容器</text>
  <text x="115" y="221" font-size="9" text-anchor="middle" fill="#93762e">内含 H.264 流</text>

  <rect x="260" y="150" width="180" height="86" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="350" y="182" font-size="11.5" font-weight="600" text-anchor="middle" fill="#1b2a4a">demux 拆</text>
  <text x="350" y="204" font-size="9" text-anchor="middle" fill="#5b7db1">av_read_frame</text>
  <text x="350" y="221" font-size="9" text-anchor="middle" fill="#5b7db1">出 H.264 压缩包</text>

  <rect x="500" y="150" width="200" height="86" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="600" y="182" font-size="11.5" font-weight="600" text-anchor="middle" fill="#3d2a5a">AVPacket（H.264）</text>
  <text x="600" y="204" font-size="9" text-anchor="middle" fill="#7a5aa0">压缩数据原样搬运</text>
  <text x="600" y="221" font-size="9" text-anchor="middle" fill="#7a5aa0">一字节不改</text>

  <rect x="760" y="150" width="180" height="86" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="850" y="182" font-size="11.5" font-weight="600" text-anchor="middle" fill="#12402a">mux 封</text>
  <text x="850" y="204" font-size="9" text-anchor="middle" fill="#2f6f4f">interleaved</text>
  <text x="850" y="221" font-size="9" text-anchor="middle" fill="#2f6f4f">write_frame</text>

  <rect x="1000" y="150" width="50" height="86" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="1025" y="188" font-size="10.5" font-weight="600" text-anchor="middle" fill="#5a3410">out</text>
  <text x="1025" y="206" font-size="10.5" font-weight="600" text-anchor="middle" fill="#5a3410">.mp4</text>

  <path d="M200,193 L260,193" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M440,193 L500,193" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M700,193 L760,193" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M940,193 L1000,193" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- skipped decode/encode -->
  <rect x="500" y="270" width="200" height="60" rx="12" fill="#ffffff" stroke="#e4e4ea" stroke-dasharray="5 4"/>
  <text x="600" y="296" font-size="10.5" font-weight="600" text-anchor="middle" fill="#86868b">decode / encode</text>
  <text x="600" y="316" font-size="9" text-anchor="middle" fill="#a1a1a6">被跳过 · 不解压不重压</text>
  <path d="M600,236 L600,270" stroke="#c7c7cc" stroke-width="1.5" stroke-dasharray="4 4" fill="none"/>
  <text x="616" y="258" font-size="9" fill="#a1a1a6">不经过</text>

  <!-- benefits -->
  <rect x="30" y="360" width="330" height="98" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="50" y="386" font-size="11.5" font-weight="600" fill="#12402a">无质量损失</text>
  <text x="50" y="408" font-size="9.5" fill="#2f6f4f">编码流原样搬运、压缩数据不改</text>
  <text x="50" y="426" font-size="9.5" fill="#2f6f4f">不 decode 解压、不 encode 重压</text>
  <text x="50" y="446" font-size="9.5" fill="#2f6f4f">只重组织封装层</text>

  <rect x="378" y="360" width="330" height="98" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="398" y="386" font-size="11.5" font-weight="600" fill="#1b2a4a">极快</text>
  <text x="398" y="408" font-size="9.5" fill="#5b7db1">不重压缩、无编解码算力开销</text>
  <text x="398" y="426" font-size="9.5" fill="#5b7db1">仅拆包再装包</text>
  <text x="398" y="446" font-size="9.5" fill="#5b7db1">远快于重编码转码</text>

  <rect x="726" y="360" width="324" height="98" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="746" y="386" font-size="11.5" font-weight="600" fill="#5a3410">典型用途</text>
  <text x="746" y="408" font-size="9.5" fill="#93762e">改容器兼容（mkv→mp4）</text>
  <text x="746" y="426" font-size="9.5" fill="#93762e">去除某条流</text>
  <text x="746" y="446" font-size="9.5" fill="#93762e">改元数据</text>

  <text x="30" y="484" font-size="9.5" fill="#86868b">为什么无损又快：容器与编码正交，换容器只需重新封装，压缩数据不动 · 源码基准 FFmpeg(1588bce) · libavformat/</text>
</svg>
