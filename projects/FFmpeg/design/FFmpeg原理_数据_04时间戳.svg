<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">时间戳 · PTS/DTS 与 time_base 换算</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">时间戳是整数 tick,乘 time_base 才是秒 ｜ 有 B 帧时解码序(DTS)≠显示序(PTS) ｜ 跨 time_base 用 av_rescale_q 换算</text>

  <!-- 图例 -->
  <rect x="770" y="20" width="12" height="12" rx="3" fill="#eef3fb" stroke="#bcd0ec"/><text x="787" y="30" font-size="9" fill="#6e6e73">换算/控制</text>
  <rect x="852" y="20" width="12" height="12" rx="3" fill="#eafaf1" stroke="#bfe0cd"/><text x="869" y="30" font-size="9" fill="#6e6e73">显示序 PTS</text>
  <rect x="940" y="20" width="12" height="12" rx="3" fill="#fff7e6" stroke="#e8cf9a"/><text x="957" y="30" font-size="9" fill="#6e6e73">解码序 DTS</text>
  <rect x="1024" y="20" width="12" height="12" rx="3" fill="#f4eefb" stroke="#d9c7ec"/><text x="1041" y="30" font-size="9" fill="#6e6e73">接口</text>

  <!-- 左:time_base 定义 -->
  <rect x="30" y="72" width="500" height="184" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="52" y="100" font-size="12.5" font-weight="600" fill="#1b2a4a">time_base · 一个 tick 值多少秒</text>
  <rect x="52" y="114" width="456" height="46" rx="9" fill="#ffffff" stroke="#ececf1"/>
  <text x="72" y="134" font-size="11" font-weight="600" fill="#1d1d1f">AVRational { num, den }</text>
  <text x="72" y="151" font-size="9.5" fill="#6e6e73">有理数分数,避免浮点误差累积</text>
  <rect x="52" y="170" width="456" height="40" rx="9" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="280" y="195" font-size="12" font-weight="700" text-anchor="middle" fill="#1b2a4a">秒 = 时间戳(tick) × num ÷ den</text>
  <text x="52" y="232" font-size="9.5" fill="#5b7db1">例 time_base = 1/90000,pts = 90000 → 1.000 秒</text>
  <text x="52" y="249" font-size="9.5" fill="#5b7db1">每条流各有 time_base:视频常 1/fps,音频常 1/采样率</text>

  <!-- 右:解码序 vs 显示序 -->
  <rect x="550" y="72" width="500" height="184" rx="13" fill="#ffffff" stroke="#e4e4ea" filter="url(#soft)"/>
  <text x="572" y="100" font-size="12.5" font-weight="600" fill="#1d1d1f">解码序(DTS) ≠ 显示序(PTS) —— B 帧</text>

  <text x="572" y="128" font-size="10" fill="#2f6f4f">显示顺序(按 PTS 播放)</text>
  <rect x="572" y="136" width="70" height="40" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="607" y="161" font-size="11" text-anchor="middle" fill="#12402a">I</text>
  <rect x="654" y="136" width="70" height="40" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="689" y="161" font-size="11" text-anchor="middle" fill="#12402a">B</text>
  <rect x="736" y="136" width="70" height="40" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="771" y="161" font-size="11" text-anchor="middle" fill="#12402a">B</text>
  <rect x="818" y="136" width="70" height="40" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="853" y="161" font-size="11" text-anchor="middle" fill="#12402a">P</text>

  <text x="572" y="200" font-size="10" fill="#93762e">解码顺序(按 DTS 送解码器)</text>
  <rect x="572" y="208" width="70" height="40" rx="8" fill="#fff7e6" stroke="#e8cf9a"/><text x="607" y="233" font-size="11" text-anchor="middle" fill="#5a3410">I</text>
  <rect x="654" y="208" width="70" height="40" rx="8" fill="#fff7e6" stroke="#e8cf9a"/><text x="689" y="233" font-size="11" text-anchor="middle" fill="#5a3410">P</text>
  <rect x="736" y="208" width="70" height="40" rx="8" fill="#fff7e6" stroke="#e8cf9a"/><text x="771" y="233" font-size="11" text-anchor="middle" fill="#5a3410">B</text>
  <rect x="818" y="208" width="70" height="40" rx="8" fill="#fff7e6" stroke="#e8cf9a"/><text x="853" y="233" font-size="11" text-anchor="middle" fill="#5a3410">B</text>

  <text x="910" y="160" font-size="9" fill="#6e6e73">B 帧双向参考</text>
  <text x="910" y="176" font-size="9" fill="#6e6e73">前后帧,参考帧</text>
  <text x="910" y="192" font-size="9" fill="#6e6e73">须先解出,故</text>
  <text x="910" y="216" font-size="9" fill="#6e6e73">P 提前到 B 之</text>
  <text x="910" y="232" font-size="9" fill="#6e6e73">前解码 → 两序</text>
  <text x="910" y="248" font-size="9" fill="#6e6e73">不一致</text>

  <!-- 底:换算 -->
  <rect x="30" y="272" width="1020" height="176" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="52" y="300" font-size="12.5" font-weight="600" fill="#3d2a5a">跨 time_base 换算 —— 数据从一段流到另一段,时间基常不同</text>

  <rect x="52" y="316" width="230" height="104" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="167" y="342" font-size="10.5" font-weight="600" text-anchor="middle" fill="#1d1d1f">源 time_base</text>
  <text x="167" y="362" font-size="9.5" text-anchor="middle" fill="#6e6e73">如解码器流的 1/90000</text>
  <text x="167" y="392" font-size="9" text-anchor="middle" fill="#86868b">pts / dts / duration</text>
  <text x="167" y="408" font-size="9" text-anchor="middle" fill="#86868b">都是这个基下的整数</text>

  <rect x="410" y="316" width="260" height="104" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="540" y="342" font-size="11" font-weight="700" text-anchor="middle" fill="#1b2a4a">av_rescale_q(值, 源tb, 目标tb)</text>
  <text x="540" y="366" font-size="10" text-anchor="middle" fill="#1b2a4a">= 值 × 源tb ÷ 目标tb</text>
  <text x="540" y="392" font-size="9" text-anchor="middle" fill="#5b7db1">64 位中间量防溢出与舍入</text>
  <text x="540" y="408" font-size="9" text-anchor="middle" fill="#5b7db1">整体换 pts/dts/duration</text>

  <rect x="798" y="316" width="230" height="104" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="913" y="342" font-size="10.5" font-weight="600" text-anchor="middle" fill="#1d1d1f">目标 time_base</text>
  <text x="913" y="362" font-size="9.5" text-anchor="middle" fill="#6e6e73">如输出容器流的 1/1000</text>
  <text x="913" y="392" font-size="9" text-anchor="middle" fill="#86868b">换算后写入 mux</text>
  <text x="913" y="408" font-size="9" text-anchor="middle" fill="#86868b">保音画同步不漂移</text>

  <path d="M282,368 L408,368" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M670,368 L796,368" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <text x="30" y="472" font-size="9" fill="#a1a1a6">源码基准 FFmpeg(1588bce) · 时间戳=tick,乘 time_base 得秒 · B 帧致 DTS≠PTS · 跨基换算防漂移</text>
</svg>
