<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">AVPacket · 压缩数据包 —— demux/encode 的产物,管线里的"压缩态"载体</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">libavcodec/packet.h:580 · 一个压缩数据单元(编码后的字节) · buf 置位时数据引用计数,av_packet_unref 降到 0 才释放</text>

  <!-- 左:AVPacket 结构卡(琥珀=压缩态数据) -->
  <rect x="30" y="76" width="590" height="414" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="54" y="106" font-size="14" font-weight="700" fill="#5a3410">AVPacket</text>
  <text x="54" y="125" font-size="9.5" fill="#93762e">struct · packet.h:580 · 压缩字节单元(如一个编码帧)</text>

  <!-- 字段行 chips -->
  <rect x="54" y="138" width="542" height="56" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="74" y="162" font-size="12" font-weight="600" fill="#1d1d1f">AVBufferRef *buf</text>
  <text x="576" y="162" font-size="9" text-anchor="end" fill="#93762e">:586</text>
  <text x="74" y="182" font-size="9.5" fill="#6e6e73">引用计数所有权 · 数据的持有者,归零才释放</text>

  <rect x="54" y="202" width="542" height="56" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="74" y="226" font-size="12" font-weight="600" fill="#1d1d1f">data / size</text>
  <text x="576" y="226" font-size="9" text-anchor="end" fill="#93762e">:603</text>
  <text x="74" y="246" font-size="9.5" fill="#6e6e73">指向压缩字节的指针与其长度</text>

  <rect x="54" y="266" width="542" height="56" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="74" y="290" font-size="12" font-weight="600" fill="#1b2a4a">pts / dts</text>
  <text x="576" y="290" font-size="9" text-anchor="end" fill="#5b7db1">:596</text>
  <text x="74" y="310" font-size="9.5" fill="#5b7db1">显示时间戳 / 解码时间戳 · 有 B 帧时 dts≠pts</text>

  <rect x="54" y="330" width="542" height="56" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="74" y="354" font-size="12" font-weight="600" fill="#1b2a4a">stream_index</text>
  <text x="576" y="354" font-size="9" text-anchor="end" fill="#5b7db1">:605</text>
  <text x="74" y="374" font-size="9.5" fill="#5b7db1">属哪条流 · 索引到 AVFormatContext 的 streams[]</text>

  <rect x="54" y="394" width="542" height="56" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="74" y="418" font-size="12" font-weight="600" fill="#1d1d1f">AVPacketSideData *side_data</text>
  <text x="576" y="418" font-size="9" text-anchor="end" fill="#93762e">:614</text>
  <text x="74" y="438" font-size="9.5" fill="#6e6e73">附加数据(如旋转、HDR 元信息)</text>

  <text x="54" y="474" font-size="9" fill="#93762e">buf 是引用计数缓冲 · 传引用不复制数据(零拷贝)</text>

  <!-- 右上:语义卡 -->
  <rect x="644" y="76" width="406" height="168" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="666" y="104" font-size="12" font-weight="600" fill="#3d2a5a">语义 · 压缩态数据载体</text>
  <text x="666" y="130" font-size="9.5" fill="#7a5aa0">packet 承载"压缩字节",管线里流动的压缩单元</text>
  <text x="666" y="152" font-size="9.5" fill="#7a5aa0">· demux 拆容器 → 产出 AVPacket</text>
  <text x="666" y="174" font-size="9.5" fill="#7a5aa0">· encode 编码 → 产出 AVPacket</text>
  <text x="666" y="196" font-size="9.5" fill="#7a5aa0">· decode 消费 packet → 得到 AVFrame(原始态)</text>
  <text x="666" y="222" font-size="9" fill="#9a7ac0">对照 AVFrame:frame 是解码后的原始像素/采样</text>

  <!-- 右下:packet 在管线中的位置 -->
  <rect x="644" y="260" width="406" height="230" rx="13" fill="#ffffff" stroke="#e4e4ea" filter="url(#soft)"/>
  <text x="666" y="288" font-size="12" font-weight="600" fill="#1d1d1f">packet 在管线中的位置</text>

  <text x="666" y="314" font-size="9.5" fill="#6e6e73">读路径 · demux 产出 packet</text>
  <rect x="666" y="324" width="104" height="42" rx="9" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="718" y="349" font-size="10" text-anchor="middle" fill="#5a3410">demux</text>
  <rect x="792" y="324" width="104" height="42" rx="9" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="844" y="345" font-size="9.5" text-anchor="middle" fill="#5a3410">AVPacket</text>
  <text x="844" y="359" font-size="8" text-anchor="middle" fill="#93762e">压缩</text>
  <rect x="918" y="324" width="104" height="42" rx="9" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="970" y="349" font-size="10" text-anchor="middle" fill="#12402a">decode</text>
  <path d="M770,345 L790,345" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M896,345 L916,345" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <text x="666" y="404" font-size="9.5" fill="#6e6e73">写路径 · encode 产出 packet</text>
  <rect x="666" y="414" width="104" height="42" rx="9" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="718" y="439" font-size="10" text-anchor="middle" fill="#12402a">encode</text>
  <rect x="792" y="414" width="104" height="42" rx="9" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="844" y="435" font-size="9.5" text-anchor="middle" fill="#5a3410">AVPacket</text>
  <text x="844" y="449" font-size="8" text-anchor="middle" fill="#93762e">压缩</text>
  <rect x="918" y="414" width="104" height="42" rx="9" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="970" y="439" font-size="10" text-anchor="middle" fill="#5a3410">mux</text>
  <path d="M770,435 L790,435" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M896,435 L916,435" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <text x="30" y="510" font-size="9" fill="#a1a1a6">源码基准 FFmpeg(1588bce) · AVPacket=压缩态载体(pts/dts/buf/size/stream_index) · demux 与 encode 都产出 packet · buf 引用计数零拷贝</text>
</svg>
