<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="480" viewBox="0 0 1080 480" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
    <marker id="arB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#9db8dc"/></marker>
  </defs>
  <rect width="1080" height="480" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">avformat_find_stream_info · 流探测</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">打开容器后 codecpar 常不全 ｜ 循环读包试解,累积参数、估时长 ｜ 每流参数齐或读够探测量即停</text>

  <!-- 图例 -->
  <rect x="700" y="20" width="12" height="12" rx="3" fill="#eef3fb" stroke="#bcd0ec"/><text x="717" y="30" font-size="9" fill="#6e6e73">控制/参数</text>
  <rect x="782" y="20" width="12" height="12" rx="3" fill="#fff7e6" stroke="#e8cf9a"/><text x="799" y="30" font-size="9" fill="#6e6e73">读包</text>
  <rect x="852" y="20" width="12" height="12" rx="3" fill="#eafaf1" stroke="#bfe0cd"/><text x="869" y="30" font-size="9" fill="#6e6e73">试解/产出</text>
  <rect x="934" y="20" width="12" height="12" rx="3" fill="#f4eefb" stroke="#d9c7ec"/><text x="951" y="30" font-size="9" fill="#6e6e73">估时长</text>

  <!-- 起点 -->
  <rect x="30" y="100" width="196" height="104" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="128" y="132" font-size="11" font-weight="600" text-anchor="middle" fill="#1b2a4a">avformat_open_input</text>
  <text x="128" y="156" font-size="9" text-anchor="middle" fill="#5b7db1">流列表已知</text>
  <text x="128" y="172" font-size="9" text-anchor="middle" fill="#5b7db1">但 codecpar 常缺</text>
  <text x="128" y="188" font-size="9" text-anchor="middle" fill="#5b7db1">(裸流无头/参数不全)</text>

  <!-- 探测循环容器 -->
  <rect x="246" y="82" width="476" height="196" rx="13" fill="none" stroke="#d0d0d6" stroke-dasharray="5 4"/>
  <text x="266" y="102" font-size="10.5" font-weight="600" fill="#6e6e73">探测循环 · 直到参数齐 / 读够探测量</text>

  <rect x="266" y="116" width="196" height="60" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="364" y="142" font-size="10.5" font-weight="600" text-anchor="middle" fill="#5a3410">read_frame 读一包</text>
  <text x="364" y="162" font-size="8.8" text-anchor="middle" fill="#93762e">从流中取压缩 AVPacket</text>

  <rect x="486" y="116" width="216" height="60" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="594" y="142" font-size="10.5" font-weight="600" text-anchor="middle" fill="#12402a">try_decode_frame 试解</text>
  <text x="594" y="162" font-size="8.8" text-anchor="middle" fill="#2f6f4f">解出帧以读出真实参数</text>

  <rect x="266" y="196" width="436" height="62" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="484" y="220" font-size="10.5" font-weight="600" text-anchor="middle" fill="#1b2a4a">累积 codecpar</text>
  <text x="484" y="240" font-size="8.8" text-anchor="middle" fill="#5b7db1">width / height / pix_fmt · sample_rate / channels · frame_rate</text>

  <path d="M462,146 L484,146" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M594,176 L560,194" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M266,224 C226,224 226,146 264,146" stroke="#9db8dc" stroke-width="1.5" stroke-dasharray="4 3" fill="none" marker-end="url(#arB)"/>
  <text x="150" y="240" font-size="8.5" fill="#5b7db1">参数未齐/未读够</text>
  <text x="176" y="253" font-size="8.5" fill="#5b7db1">→ 继续读</text>

  <path d="M226,152 L264,146" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 估时长 -->
  <rect x="742" y="100" width="308" height="178" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="764" y="128" font-size="11.5" font-weight="600" fill="#3d2a5a">estimate_timings · 估时长</text>
  <rect x="764" y="140" width="264" height="58" rx="9" fill="#ffffff" stroke="#eee2f6"/>
  <text x="778" y="162" font-size="10" font-weight="600" fill="#3d2a5a">from_pts · 有时间戳</text>
  <text x="778" y="180" font-size="8.8" fill="#7a5aa0">读尾部包的 pts,首尾差即时长</text>
  <rect x="764" y="206" width="264" height="58" rx="9" fill="#ffffff" stroke="#eee2f6"/>
  <text x="778" y="228" font-size="10" font-weight="600" fill="#3d2a5a">from_bit_rate · 无时间戳</text>
  <text x="778" y="246" font-size="8.8" fill="#7a5aa0">文件大小 ÷ 码率 估算时长</text>

  <path d="M722,180 L740,180" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="700" y="172" font-size="8.5" fill="#7a5aa0">探够</text>

  <!-- 底:停止条件 + 输出 + 为什么 -->
  <rect x="30" y="300" width="500" height="146" rx="13" fill="#ffffff" stroke="#e4e4ea" filter="url(#soft)"/>
  <text x="52" y="326" font-size="11" font-weight="600" fill="#1d1d1f">停止条件</text>
  <rect x="52" y="338" width="216" height="48" rx="9" fill="#f7f7f9" stroke="#e4e4ea"/>
  <text x="160" y="358" font-size="9.5" font-weight="600" text-anchor="middle" fill="#1d1d1f">每流参数齐</text>
  <text x="160" y="375" font-size="8.5" text-anchor="middle" fill="#86868b">codecpar 已完整</text>
  <rect x="280" y="338" width="228" height="48" rx="9" fill="#f7f7f9" stroke="#e4e4ea"/>
  <text x="394" y="358" font-size="9.5" font-weight="600" text-anchor="middle" fill="#1d1d1f">读满探测量</text>
  <text x="394" y="375" font-size="8.5" text-anchor="middle" fill="#86868b">probesize / analyzeduration</text>
  <rect x="52" y="398" width="456" height="34" rx="9" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="280" y="420" font-size="9.5" font-weight="600" text-anchor="middle" fill="#12402a">输出:完整 codecpar + time_base + duration</text>

  <rect x="546" y="300" width="504" height="146" rx="13" fill="#ffffff" stroke="#e4e4ea" filter="url(#soft)"/>
  <text x="568" y="326" font-size="11" font-weight="600" fill="#1d1d1f">为什么要探测</text>
  <text x="568" y="350" font-size="9.5" fill="#6e6e73">mp4/mkv 头里已带参数,可少探甚至跳过;MPEG-TS / 裸流</text>
  <text x="568" y="368" font-size="9.5" fill="#6e6e73">无全局头,只能边读边试解才知道分辨率/采样率/时长。</text>
  <text x="568" y="392" font-size="9.5" fill="#6e6e73">探测越久越准但越慢 —— probesize / analyzeduration 调这个</text>
  <text x="568" y="410" font-size="9.5" fill="#6e6e73">权衡:开播延迟 vs 参数准确度。</text>

  <text x="30" y="468" font-size="9" fill="#a1a1a6">源码基准 FFmpeg(1588bce) · 循环 read_frame + try_decode_frame 累积参数 → estimate_timings 估时长 · probesize/analyzeduration 控探测量</text>
</svg>
