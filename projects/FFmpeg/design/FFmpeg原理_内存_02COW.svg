<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">FFmpeg 写时复制与所有权 —— 引用计数配合规则</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">读多写少时零拷贝共享，写时才付复制代价；移动语义转移所有权，unref 后置空防悬垂</text>

  <!-- 共享读 -->
  <rect x="30" y="76" width="510" height="160" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="50" y="102" font-size="12" font-weight="600" fill="#12402a">共享读 · 零拷贝</text>
  <rect x="50" y="118" width="130" height="44" rx="9" fill="#ffffff" stroke="#bfe0cd"/><text x="115" y="145" font-size="10.5" font-weight="600" text-anchor="middle" fill="#12402a">frame A</text>
  <rect x="50" y="176" width="130" height="44" rx="9" fill="#ffffff" stroke="#bfe0cd"/><text x="115" y="203" font-size="10.5" font-weight="600" text-anchor="middle" fill="#12402a">frame B</text>
  <rect x="360" y="147" width="160" height="44" rx="9" fill="#fff7e6" stroke="#e8cf9a"/><text x="440" y="174" font-size="10.5" font-weight="600" text-anchor="middle" fill="#5a3410">同一 buffer</text>
  <path d="M180,140 L270,140 L270,163 L360,163" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M180,198 L270,198 L270,175 L360,175" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="50" y="228" font-size="9.5" fill="#2f6f4f">多个 AVFrame 引用同一 buffer，都能读</text>

  <!-- 写时复制 -->
  <rect x="560" y="76" width="490" height="160" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="580" y="102" font-size="12" font-weight="600" fill="#1b2a4a">写时复制 · av_frame_make_writable</text>
  <text x="580" y="124" font-size="9.5" fill="#5b7db1">要修改数据时先调用：</text>
  <rect x="580" y="136" width="215" height="40" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="687" y="154" font-size="9.5" font-weight="600" text-anchor="middle" fill="#12402a">refcount = 1（独占）</text>
  <text x="687" y="170" font-size="8.5" text-anchor="middle" fill="#2f6f4f">直接改</text>
  <rect x="815" y="136" width="215" height="40" rx="8" fill="#fbeaea" stroke="#e6b8b8"/>
  <text x="922" y="154" font-size="9.5" font-weight="600" text-anchor="middle" fill="#7a2a2a">refcount &gt; 1（共享）</text>
  <text x="922" y="170" font-size="8.5" text-anchor="middle" fill="#a05a5a">复制一份再改</text>
  <text x="580" y="200" font-size="9.5" fill="#5b7db1">共享的 buffer 若直接改会破坏其他引用</text>
  <text x="580" y="220" font-size="9.5" fill="#5b7db1">→ 复制后独占再改，避免改乱别的引用</text>

  <!-- 移动语义 -->
  <rect x="30" y="264" width="510" height="176" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="50" y="290" font-size="12" font-weight="600" fill="#3d2a5a">移动语义 · 转移所有权（不增引用）</text>
  <text x="50" y="312" font-size="9.5" fill="#7a5aa0">av_packet_move_ref / av_frame_move_ref</text>

  <rect x="50" y="328" width="150" height="72" rx="10" fill="#ffffff" stroke="#d9c7ec"/>
  <text x="125" y="356" font-size="10.5" font-weight="600" text-anchor="middle" fill="#3d2a5a">源 src</text>
  <text x="125" y="378" font-size="9" text-anchor="middle" fill="#7a5aa0">持有引用</text>
  <rect x="370" y="328" width="150" height="72" rx="10" fill="#ffffff" stroke="#d9c7ec"/>
  <text x="445" y="356" font-size="10.5" font-weight="600" text-anchor="middle" fill="#3d2a5a">目标 dst</text>
  <text x="445" y="378" font-size="9" text-anchor="middle" fill="#7a5aa0">接管引用</text>
  <path d="M200,364 L370,364" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="285" y="356" font-size="9" text-anchor="middle" fill="#a1a1a6">move</text>
  <text x="50" y="424" font-size="9.5" fill="#9a7ac0">转移后源置空（不增引用，所有权交给 dst）</text>

  <!-- unref 置空 -->
  <rect x="560" y="264" width="490" height="176" rx="13" fill="#fbeaea" stroke="#e6b8b8" filter="url(#soft)"/>
  <text x="580" y="290" font-size="12" font-weight="600" fill="#7a2a2a">unref 后置空 · 防悬垂</text>
  <text x="580" y="314" font-size="9.5" fill="#a05a5a">av_buffer_unref 减引用后</text>
  <text x="580" y="334" font-size="9.5" fill="#a05a5a">指针置空（= NULL）</text>

  <rect x="580" y="350" width="450" height="40" rx="8" fill="#ffffff" stroke="#e6b8b8"/>
  <text x="805" y="375" font-size="10" font-weight="600" text-anchor="middle" fill="#7a2a2a">悬垂指针 → 访问已释放内存 → 崩溃</text>
  <text x="580" y="420" font-size="9.5" fill="#a05a5a">置空后再误用即为空指针，避免访问已释放的数据</text>

  <text x="30" y="490" font-size="12" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="30" y="512" font-size="9.5" fill="#86868b">共享读零拷贝；写前 make_writable（引用&gt;1 则写时复制确保独占）；move_ref 转移所有权源置空；unref 后置空防悬垂 · FFmpeg(1588bce)</text>
</svg>
