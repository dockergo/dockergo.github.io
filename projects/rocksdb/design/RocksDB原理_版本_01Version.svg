<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">RocksDB Version · 每层活跃 SST 集合的不可变快照</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">Version = 某时刻每层有哪些 SST(FileMetaData 列表);L0 重叠、L1+ 非重叠有序;Version::Get 靠 key 范围定位</text>

  <!-- version structure -->
  <rect x="30" y="70" width="640" height="290" rx="13" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="46" y="92" font-size="11" font-weight="700" fill="#5a3410">一个 Version 的层结构</text>
  <g font-size="8" text-anchor="middle">
    <rect x="46" y="104" width="608" height="40" rx="6" fill="#fef2e0" stroke="#e8cf9a"/><text x="350" y="120" font-weight="600" fill="#5a3410">L0(可重叠,按 seq)</text><text x="350" y="135" fill="#93762e">[a,f]@seq9  [c,k]@seq7  [b,m]@seq5  ← key 范围互相重叠</text>
    <rect x="46" y="150" width="290" height="32" rx="6" fill="#fdf6ea" stroke="#efdcb4"/><text x="191" y="170" fill="#93762e">L1: [a..h] 非重叠</text>
    <rect x="356" y="150" width="298" height="32" rx="6" fill="#fdf6ea" stroke="#efdcb4"/><text x="505" y="170" fill="#93762e">L1: [i..z] 有序</text>
    <rect x="46" y="188" width="190" height="32" rx="6" fill="#fdf6ea" stroke="#efdcb4"/><text x="141" y="208" fill="#93762e">L2: [a..e]</text>
    <rect x="256" y="188" width="190" height="32" rx="6" fill="#fdf6ea" stroke="#efdcb4"/><text x="351" y="208" fill="#93762e">L2: [f..o]</text>
    <rect x="466" y="188" width="188" height="32" rx="6" fill="#fdf6ea" stroke="#efdcb4"/><text x="560" y="208" fill="#93762e">L2: [p..z]</text>
    <rect x="46" y="226" width="608" height="28" rx="6" fill="#fdf6ea" stroke="#efdcb4"/><text x="350" y="244" fill="#93762e">L3..Ln: 更多更老数据,每层容量约上层 10×</text>
  </g>
  <rect x="46" y="262" width="608" height="88" rx="8" fill="#fff" stroke="#e8cf9a"/>
  <text x="60" y="282" font-size="9" font-weight="600" fill="#5a3410">每个方块 = 一个 FileMetaData</text>
  <text x="60" y="300" font-size="8.3" fill="#93762e">· 文件号(唯一标识 SST)　· [smallest, largest] 内部键(定位范围)</text>
  <text x="60" y="316" font-size="8.3" fill="#93762e">· seq 范围(该文件覆盖的 SequenceNumber 段)　· 文件大小</text>
  <text x="60" y="334" font-size="8.3" fill="#5a3410">Version::Get 用 [smallest,largest] 逐层二分定位命中哪个文件</text>

  <!-- L0 vs L1+ -->
  <rect x="690" y="70" width="360" height="290" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="706" y="92" font-size="11" font-weight="700" fill="#1b2a4a">L0 vs L1+ 的关键区别</text>
  <rect x="706" y="104" width="328" height="110" rx="8" fill="#fef2e0" stroke="#e8cf9a"/>
  <text x="720" y="124" font-size="9.5" font-weight="600" fill="#5a3410">L0:可重叠</text>
  <text x="720" y="142" font-size="8.3" fill="#93762e">· 直接接 Flush(各 MemTable 独立落)</text>
  <text x="720" y="158" font-size="8.3" fill="#93762e">· 文件间 key 范围可交叉</text>
  <text x="720" y="174" font-size="8.3" fill="#93762e">· 读要查每个可能命中的 L0 文件</text>
  <text x="720" y="190" font-size="8.3" fill="#93762e">· 触发按文件数(不是大小)</text>
  <text x="720" y="206" font-size="8.3" fill="#b1483a">· L0 是 LSM 读写的关键瓶颈</text>
  <rect x="706" y="222" width="328" height="128" rx="8" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="720" y="242" font-size="9.5" font-weight="600" fill="#1b2a4a">L1+:非重叠有序</text>
  <text x="720" y="260" font-size="8.3" fill="#5b7db1">· Compaction 整理产出</text>
  <text x="720" y="276" font-size="8.3" fill="#5b7db1">· 层内文件 key 不交叉、全局有序</text>
  <text x="720" y="292" font-size="8.3" fill="#5b7db1">· 读每层二分定位至多一个文件</text>
  <text x="720" y="308" font-size="8.3" fill="#5b7db1">· 触发按"当前字节/目标字节"</text>
  <text x="720" y="326" font-size="8.3" fill="#5b7db1">· 迭代器每层一个 LevelIterator</text>
  <text x="720" y="344" font-size="8" fill="#a1a1a6">(见读取路径/Compaction Leveled)</text>

  <!-- notes -->
  <rect x="30" y="376" width="1020" height="146" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="398" font-size="11" font-weight="700" fill="#1d1d1f">要点</text>
  <text x="46" y="420" font-size="9" fill="#6e6e73">· Version 不可变:每次 Flush/Compaction 生成新 Version(见 MANIFEST 篇);旧 Version 被读引用则保留,无人引用才回收</text>
  <text x="46" y="438" font-size="9" fill="#6e6e73">· VersionSet 管所有 CF 的 Version 链 + 全局 SequenceNumber + 下一个文件号</text>
  <text x="46" y="456" font-size="9" fill="#6e6e73">· Version 是 SuperVersion 的第三部分(另两个是活跃/immutable MemTable)——读的一致快照(见读取路径)</text>
  <text x="46" y="474" font-size="9" fill="#6e6e73">· FileMetaData 的 [smallest,largest] 是读定位与 Compaction 挑重叠文件的依据</text>
  <text x="46" y="494" font-size="8.5" fill="#b1483a">· 归属:Version 组成 SuperVersion(【读取路径】);变更记录在 MANIFEST(本主线下篇);产生变更的是【Flush】【Compaction】</text>
  <text x="46" y="512" font-size="8.5" fill="#a1a1a6">· "哪些 SST 是活的"这个问题的答案就是当前 Version;它必须持久化且原子更新(见 MANIFEST)</text>
</svg>
