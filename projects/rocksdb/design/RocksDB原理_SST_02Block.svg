<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">RocksDB Block 内部 · restart 点 + 前缀压缩</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">块内 KV 有序:前缀压缩省空间,每隔若干条设 restart 点(存完整 key)支持二分</text>

  <!-- block content -->
  <rect x="30" y="70" width="640" height="270" rx="13" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="46" y="92" font-size="11" font-weight="700" fill="#5a3410">一个 data block 的内部(block_restart_interval=4 示例)</text>
  <g font-size="8" text-anchor="middle">
    <rect x="46" y="104" width="608" height="26" rx="5" fill="#fef2e0" stroke="#e8cf9a"/><text x="350" y="121" font-weight="600" fill="#5a3410">restart[0] → 完整 key "user:1001" = "v"（存整键）</text>
    <rect x="46" y="134" width="608" height="22" rx="5" fill="#fff" stroke="#efdcb4"/><text x="350" y="149" fill="#93762e">共享前缀 8 + 后缀 "2" → user:1002 (只存差异)</text>
    <rect x="46" y="160" width="608" height="22" rx="5" fill="#fff" stroke="#efdcb4"/><text x="350" y="175" fill="#93762e">共享 8 + "3" → user:1003</text>
    <rect x="46" y="186" width="608" height="22" rx="5" fill="#fff" stroke="#efdcb4"/><text x="350" y="201" fill="#93762e">共享 8 + "4" → user:1004</text>
    <rect x="46" y="214" width="608" height="26" rx="5" fill="#fef2e0" stroke="#e8cf9a"/><text x="350" y="231" font-weight="600" fill="#5a3410">restart[1] → 完整 key "user:1005"（重置前缀基准）</text>
    <rect x="46" y="244" width="608" height="22" rx="5" fill="#fff" stroke="#efdcb4"/><text x="350" y="259" fill="#93762e">共享 8 + "6" → user:1006 …</text>
  </g>
  <rect x="46" y="278" width="608" height="52" rx="8" fill="#fff" stroke="#efdcb4"/><text x="60" y="298" font-size="8.5" font-weight="600" fill="#5a3410">块尾:restart 点偏移数组 [off0, off1, …] + 数组长度</text><text x="60" y="316" font-size="8.3" fill="#93762e">记录每个 restart 点在块内的字节偏移 → 供二分定位</text>

  <!-- lookup in block -->
  <rect x="690" y="70" width="360" height="270" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="706" y="92" font-size="11" font-weight="700" fill="#1b2a4a">块内查找 key</text>
  <g font-size="8.5">
    <rect x="706" y="104" width="328" height="44" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="720" y="124" font-weight="600" fill="#274a78">① restart 点上二分</text><text x="720" y="140" fill="#5b7db1">restart 点存完整 key,可直接比较</text>
    <rect x="706" y="156" width="328" height="44" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="720" y="176" font-weight="600" fill="#274a78">② 定位到目标区间</text><text x="720" y="192" fill="#5b7db1">key 落在 restart[i] 与 restart[i+1] 之间</text>
    <rect x="706" y="208" width="328" height="44" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="720" y="228" font-weight="600" fill="#12402a">③ 区间内线性扫</text><text x="720" y="244" fill="#2f6f4f">逐条重建 key(用前缀+后缀)比较</text>
  </g>
  <rect x="706" y="260" width="328" height="70" rx="8" fill="#fff" stroke="#bcd0ec"/>
  <text x="720" y="280" font-size="8.5" font-weight="600" fill="#1b2a4a">为什么这样设计</text>
  <text x="720" y="298" font-size="8" fill="#5b7db1">纯前缀压缩无法二分(每条依赖前一条)</text>
  <text x="720" y="314" font-size="8" fill="#5b7db1">restart 点是"锚":二分到区间 + 区间内线性</text>
  <text x="720" y="330" font-size="8" fill="#93762e">兼得空间(压缩)与查找效率(近似二分)</text>
  <line x1="870" y1="148" x2="870" y2="156" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="870" y1="200" x2="870" y2="208" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- notes -->
  <rect x="30" y="356" width="1020" height="170" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="378" font-size="11" font-weight="700" fill="#1d1d1f">要点</text>
  <text x="46" y="400" font-size="9" fill="#6e6e73">· block_restart_interval(默认 16):每 16 条设一个 restart 点。调小 → 查更快但压缩率降;调大 → 更省空间但区间线性扫更长</text>
  <text x="46" y="418" font-size="9" fill="#6e6e73">· 前缀压缩对"有公共前缀的 key"收益大(如 user:1001/1002…、时间序 key);随机短 key 收益小</text>
  <text x="46" y="436" font-size="9" fill="#6e6e73">· 整个 block 再被压缩算法(Snappy/LZ4/ZSTD)压一次 → 前缀压缩(逻辑)+ 块压缩(字节)两级省空间</text>
  <text x="46" y="454" font-size="9" fill="#6e6e73">· block cache 缓存的是解压后的 block;读命中缓存则免磁盘 IO + 免解压</text>
  <text x="46" y="476" font-size="9" fill="#6e6e73">· 内部键(user_key+seq+type)也在块内:同 user_key 的多版本按 seq 降序相邻排列</text>
  <text x="46" y="498" font-size="8.5" fill="#b1483a">· 归属:block 内格式是 SST 存储的细节;块压缩/缓存在【缓存】;读块在【读取路径】</text>
  <text x="46" y="516" font-size="8.5" fill="#a1a1a6">· BlockBuilder(table/block_based/block_builder.cc)负责写、Block(reader)负责读</text>
</svg>
