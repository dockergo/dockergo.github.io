<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">RocksDB 布隆过滤器 · 跳过一定不含 key 的 SST</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">极小空间回答"key 一定不在本文件":说不在→跳过免读盘;说可能在→读 data block(可假阳,绝无假阴)</text>

  <!-- decision flow -->
  <rect x="30" y="70" width="1020" height="150" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="92" font-size="11.5" font-weight="700" fill="#1b2a4a">Get 到某个 SST 时的判定</text>
  <g font-size="8.8" text-anchor="middle">
    <rect x="60" y="106" width="180" height="90" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/><text x="150" y="128" font-weight="600" fill="#274a78">读该 SST 的 filter block</text><text x="150" y="148" fill="#5b7db1">(常驻内存或 block cache)</text><text x="150" y="168" fill="#5b7db1">对 key 算哈希查位</text><text x="150" y="186" fill="#5b7db1">极小内存、极快</text>
    <rect x="320" y="106" width="200" height="40" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="420" y="126" font-weight="600" fill="#12402a">"一定不在"</text><text x="420" y="140" fill="#2f6f4f">→ 跳过该文件,不读 data block</text>
    <rect x="320" y="156" width="200" height="40" rx="9" fill="#fff7e6" stroke="#e8cf9a"/><text x="420" y="176" font-weight="600" fill="#5a3410">"可能在"</text><text x="420" y="190" fill="#93762e">→ 读 index → data block 验证</text>
    <rect x="600" y="106" width="200" height="40" rx="9" fill="#f5faf6" stroke="#cfe6d5"/><text x="700" y="126" font-weight="600" fill="#2c5a3a">省一次磁盘 IO</text><text x="700" y="140" fill="#2f6f4f">大多数无关文件被跳过</text>
    <rect x="600" y="156" width="200" height="40" rx="9" fill="#fff" stroke="#e8cf9a"/><text x="700" y="176" fill="#5a3410">真读:命中或假阳性</text><text x="700" y="190" fill="#93762e">假阳性≈1%(白读一次)</text>
    <rect x="820" y="106" width="214" height="90" rx="9" fill="#fbfbfd" stroke="#ececf1"/><text x="927" y="126" font-weight="600" fill="#1d1d1f">关键性质</text><text x="927" y="146" fill="#6e6e73">无假阴性:说"不在"</text><text x="927" y="162" fill="#6e6e73">就绝对不在(安全跳过)</text><text x="927" y="182" fill="#6e6e73">有假阳性:说"在"可能白读</text>
  </g>
  <line x1="240" y1="140" x2="320" y2="126" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="240" y1="162" x2="320" y2="176" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="520" y1="126" x2="600" y2="126" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="520" y1="176" x2="600" y2="176" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- bloom mechanics -->
  <rect x="30" y="236" width="500" height="180" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="258" font-size="11" font-weight="700" fill="#2c5a3a">布隆过滤器机制</text>
  <text x="46" y="280" font-size="8.8" fill="#2f6f4f">· 位数组 + k 个哈希函数</text>
  <text x="46" y="298" font-size="8.8" fill="#2f6f4f">· 建文件时:每个 key 算 k 个位置置 1</text>
  <text x="46" y="316" font-size="8.8" fill="#2f6f4f">· 查:key 的 k 个位置全为 1 → "可能在"</text>
  <text x="46" y="334" font-size="8.8" fill="#2f6f4f">· 任一位为 0 → "一定不在"</text>
  <text x="46" y="356" font-size="8.8" fill="#93762e">· 默认 bits_per_key≈10 → 假阳性≈1%</text>
  <text x="46" y="374" font-size="8.8" fill="#93762e">· Ribbon filter:更省空间的新型过滤器</text>
  <text x="46" y="396" font-size="8.5" fill="#a1a1a6">filter_policy(table factory)配置</text>

  <!-- full vs partitioned + prefix -->
  <rect x="550" y="236" width="500" height="180" rx="13" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="566" y="258" font-size="11" font-weight="700" fill="#5a3410">布局与前缀布隆</text>
  <text x="566" y="280" font-size="8.8" fill="#93762e">· full filter:整个 SST 一个过滤块(默认)</text>
  <text x="566" y="298" font-size="8.8" fill="#93762e">· partitioned filter:分块,按需入 cache(大文件省内存)</text>
  <text x="566" y="316" font-size="8.8" fill="#93762e">· cache_index_and_filter_blocks:是否进 block cache</text>
  <text x="566" y="338" font-size="8.8" fill="#93762e">· 前缀布隆(prefix_extractor):对 key 前缀建过滤器</text>
  <text x="566" y="356" font-size="8.8" fill="#93762e">  → 让"同前缀 Seek(范围扫描)"也能短路无关文件</text>
  <text x="566" y="378" font-size="8.5" fill="#b1483a">· optimize_filters_for_hits:大量命中场景省最底层布隆内存</text>
  <text x="566" y="398" font-size="8.5" fill="#a1a1a6">(最底层数据最多,过滤器也最占内存)</text>

  <!-- notes -->
  <rect x="30" y="432" width="1020" height="90" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="454" font-size="11" font-weight="700" fill="#1d1d1f">要点</text>
  <text x="46" y="476" font-size="9" fill="#6e6e73">· 布隆过滤器是 LSM 读性能的命门:没有它,一次点查要读每层每个可能的文件,读放大不可接受</text>
  <text x="46" y="494" font-size="9" fill="#6e6e73">· 只对点查有效;纯范围扫描(无前缀假设)无法用布隆短路,必须真读相交文件——这是扫描比点查贵的原因之一</text>
  <text x="46" y="512" font-size="9" fill="#b1483a">· 归属:布隆是 SST 的 filter block(见【SST 存储格式】);读时消费它在读取路径;缓存它在【缓存】</text>
</svg>
