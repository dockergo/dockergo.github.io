<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">RocksDB 崩溃恢复 · 先 MANIFEST 后 WAL(两阶段,顺序不能反)</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">DBImpl::Recover:① 从 CURRENT→MANIFEST 重放 VersionEdit 重建 Version;② 重放比"已flush最大seq"更新的 WAL 补未flush的写</text>

  <!-- phase 1 -->
  <rect x="30" y="70" width="1020" height="150" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="92" font-size="11.5" font-weight="700" fill="#1b2a4a">阶段① MANIFEST 恢复 —— 先搞清"已经有哪些 SST、数据到哪个 seq"</text>
  <g font-size="8.5" text-anchor="middle">
    <rect x="46" y="106" width="200" height="60" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="146" y="130" font-weight="600" fill="#274a78">CURRENT 文件</text><text x="146" y="148" fill="#5b7db1">指向当前 MANIFEST</text>
    <rect x="286" y="106" width="230" height="60" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="401" y="130" font-weight="600" fill="#274a78">重放 VersionEdit</text><text x="401" y="148" fill="#5b7db1">逐条应用 → 重建最新 Version</text>
    <rect x="556" y="106" width="230" height="60" rx="8" fill="#e6f7ee" stroke="#bfe0cd"/><text x="671" y="126" font-weight="600" fill="#12402a">得到 Version</text><text x="671" y="144" fill="#2f6f4f">知道有哪些 SST 文件</text><text x="671" y="160" fill="#2f6f4f">及已持久化的最大 seq</text>
    <rect x="826" y="106" width="208" height="60" rx="8" fill="#fff" stroke="#bcd0ec"/><text x="930" y="126" font-weight="600" fill="#1b2a4a">恢复起点确定</text><text x="930" y="144" fill="#5b7db1">> 该 seq 的写才需</text><text x="930" y="160" fill="#5b7db1">从 WAL 重放</text>
  </g>
  <line x1="246" y1="136" x2="286" y2="136" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="516" y1="136" x2="556" y2="136" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="786" y1="136" x2="826" y2="136" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="46" y="200" font-size="8.5" fill="#5b7db1">db/version_set.cc · db/db_impl/db_impl_open.cc(见【版本】主线)  —  不先做这步就不知道哪些 WAL 记录已落 SST、会重复重放</text>

  <!-- arrow down -->
  <line x1="540" y1="220" x2="540" y2="250" stroke="#86868b" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="556" y="242" font-size="9" font-weight="600" fill="#6e6e73">顺序严格:先①后②</text>

  <!-- phase 2 -->
  <rect x="30" y="256" width="1020" height="150" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="278" font-size="11.5" font-weight="700" fill="#12402a">阶段② WAL 重放(RecoverLogFiles)—— 补上崩溃前"写了 WAL 但没来得及 flush"的数据</text>
  <g font-size="8.5" text-anchor="middle">
    <rect x="46" y="292" width="230" height="58" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="161" y="314" font-weight="600" fill="#12402a">筛 WAL 记录</text><text x="161" y="332" fill="#2f6f4f">找 seq &gt; 已flush最大seq 的</text>
    <rect x="316" y="292" width="230" height="58" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="431" y="314" font-weight="600" fill="#12402a">逐条重放</text><text x="431" y="332" fill="#2f6f4f">写进新 MemTable</text>
    <rect x="586" y="292" width="230" height="58" rx="8" fill="#e6f7ee" stroke="#bfe0cd"/><text x="701" y="314" font-weight="600" fill="#12402a">恢复到一致状态</text><text x="701" y="332" fill="#2f6f4f">= 崩溃前最后已持久的点</text>
    <rect x="856" y="292" width="178" height="58" rx="8" fill="#fff7e6" stroke="#e8cf9a"/><text x="945" y="312" font-weight="600" fill="#5a3410">2PC:prepared</text><text x="945" y="330" fill="#93762e">无 commit 标记</text><text x="945" y="346" fill="#93762e">→ 回滚</text>
  </g>
  <line x1="276" y1="321" x2="316" y2="321" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="546" y1="321" x2="586" y2="321" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="46" y="386" font-size="8.5" fill="#2f6f4f">wal_recovery_mode 控制遇损坏记录的策略:TolerateCorruptedTailRecords(容忍尾部损坏)/ AbsoluteConsistency(严格)/ PointInTimeRecovery / SkipAnyCorruptedRecords</text>

  <!-- misconception -->
  <rect x="30" y="422" width="1020" height="46" rx="13" fill="#fdf4f3" stroke="#ecc6c1"/>
  <text x="46" y="443" font-size="10" font-weight="700" fill="#7a2016">易错:恢复不是"先重放 WAL"</text>
  <text x="46" y="460" font-size="8.8" fill="#a5453a">先 MANIFEST 重建 Version(知道已有 SST 到哪个 seq),再只重放更新的 WAL —— 反过来会重复重放已落盘数据或漏判边界</text>

  <!-- notes -->
  <rect x="30" y="480" width="1020" height="46" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="501" font-size="10" font-weight="700" fill="#1d1d1f">要点</text>
  <text x="46" y="518" font-size="8.8" fill="#6e6e73">· 两阶段的分工:MANIFEST 管"持久化到哪了"(SST 全景 + seq 水位),WAL 管"水位之上还欠什么";先定水位、再补差量,恢复才既不漏也不重</text>
</svg>
