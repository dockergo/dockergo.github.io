<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">RocksDB 开库恢复 · 先 MANIFEST 重建 Version,后重放 WAL</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">两阶段严格有序:先知道"有哪些 SST、数据到哪个 seq",再重放 WAL 补未 flush 的最新写</text>

  <!-- two phases -->
  <rect x="30" y="70" width="500" height="230" rx="13" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="46" y="92" font-size="11.5" font-weight="700" fill="#5a3410">阶段① MANIFEST 恢复(VersionSet::Recover)</text>
  <g font-size="8.8" text-anchor="middle">
    <rect x="46" y="104" width="470" height="40" rx="8" fill="#fef2e0" stroke="#e8cf9a"/><text x="281" y="122" font-weight="600" fill="#5a3410">读 CURRENT → 找当前 MANIFEST</text><text x="281" y="138" fill="#93762e">CURRENT 文件指向生效的 MANIFEST</text>
    <rect x="46" y="152" width="470" height="40" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="281" y="170" font-weight="600" fill="#5a3410">重放所有 VersionEdit</text><text x="281" y="186" fill="#93762e">VersionBuilder 逐个应用</text>
    <rect x="46" y="200" width="470" height="40" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="281" y="218" font-weight="600" fill="#12402a">重建崩溃前最后的 Version</text><text x="281" y="234" fill="#2f6f4f">= 每层有哪些 SST、已 flush 到哪个 seq</text>
  </g>
  <text x="46" y="264" font-size="8.5" fill="#93762e">产出:知道磁盘上有哪些数据、最大已持久 seq</text>
  <text x="46" y="282" font-size="8.5" fill="#b1483a">为什么先做:得先知道"数据到哪了",才知道 WAL 要从哪补</text>

  <!-- phase 2 -->
  <rect x="550" y="70" width="500" height="230" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="566" y="92" font-size="11.5" font-weight="700" fill="#1b2a4a">阶段② WAL 重放(RecoverLogFiles)</text>
  <g font-size="8.8" text-anchor="middle">
    <rect x="566" y="104" width="470" height="40" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="801" y="122" font-weight="600" fill="#274a78">找比"已 flush 最大 seq"更新的 WAL</text><text x="801" y="138" fill="#5b7db1">老 WAL(已 flush 覆盖)跳过</text>
    <rect x="566" y="152" width="470" height="40" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="801" y="170" font-weight="600" fill="#1b2a4a">逐条重放记录进新 MemTable</text><text x="801" y="186" fill="#5b7db1">按 WAL 里的 seq 恢复多版本</text>
    <rect x="566" y="200" width="470" height="40" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="801" y="218" font-weight="600" fill="#12402a">恢复到崩溃前一致状态</text><text x="801" y="234" fill="#2f6f4f">未 flush 的写补回内存</text>
  </g>
  <text x="566" y="264" font-size="8.5" fill="#5b7db1">wal_recovery_mode 控制遇损坏记录的策略:</text>
  <text x="566" y="282" font-size="8.5" fill="#5b7db1">容忍尾部损坏(默认) / 严格一致 / 跳过损坏点 / 只读点</text>

  <line x1="530" y1="185" x2="550" y2="185" stroke="#c7c7cc" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="540" y="177" font-size="7.5" fill="#a1a1a6">然后</text>

  <!-- notes -->
  <rect x="30" y="316" width="1020" height="170" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="338" font-size="11" font-weight="700" fill="#1d1d1f">要点</text>
  <text x="46" y="360" font-size="9" fill="#6e6e73">· 顺序不能反:MANIFEST 先给出"数据基线(SST 到哪个 seq)",WAL 才知道"从哪个 seq 之后开始补"——反了会重放已持久的数据或漏掉</text>
  <text x="46" y="378" font-size="9" fill="#6e6e73">· 恢复完成后通常触发一次 flush:把重放进 MemTable 的数据落成 SST,并可删掉刚重放的 WAL(得到干净起点)</text>
  <text x="46" y="396" font-size="9" fill="#6e6e73">· wal_recovery_mode:kTolerateCorruptedTailRecords(默认,容忍最后一条写到一半)、kAbsoluteConsistency(严格,任何损坏即失败)、kPointInTimeRecovery、kSkipAnyCorruptedRecords</text>
  <text x="46" y="414" font-size="9" fill="#6e6e73">· sync=false 时崩溃可能丢 WAL 尾部几条(OS 缓冲未刷)→ kTolerateCorruptedTail 容忍它;要零丢失用 sync=true</text>
  <text x="46" y="432" font-size="9" fill="#6e6e73">· MANIFEST 恢复用到的 SST 文件必须都在(否则报 Corruption);Version 里引用的文件是恢复的完整性前提</text>
  <text x="46" y="452" font-size="8.5" fill="#b1483a">· 归属:MANIFEST 恢复是本主线;WAL 重放在【WAL 与崩溃恢复】;恢复出的 seq 是【事务与快照】MVCC 时钟的起点</text>
  <text x="46" y="472" font-size="8.5" fill="#a1a1a6">· 完整开库链:CURRENT→MANIFEST 重建 Version → 重放 WAL 补 MemTable → (可选)flush → 就绪接受读写</text>
</svg>
