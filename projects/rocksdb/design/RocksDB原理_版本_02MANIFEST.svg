<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">RocksDB VersionEdit + MANIFEST · LogAndApply 原子换版本</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">每次文件变更 = 一个 VersionEdit 差量,追加进 MANIFEST 日志 + 应用生成新 Version + 原子安装</text>

  <!-- LogAndApply flow -->
  <rect x="30" y="70" width="1020" height="150" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="92" font-size="11" font-weight="700" fill="#1b2a4a">VersionSet::LogAndApply 三步</text>
  <g font-size="8.8" text-anchor="middle">
    <rect x="46" y="106" width="300" height="90" rx="9" fill="#f5faf6" stroke="#cfe6d5"/><text x="196" y="128" font-weight="600" fill="#2c5a3a">① 产生 VersionEdit(差量)</text><text x="196" y="148" fill="#2f6f4f">Flush:+ 一个 L0 文件</text><text x="196" y="164" fill="#2f6f4f">Compaction:+ 新文件 / − 旧文件</text><text x="196" y="182" fill="#2f6f4f">(不是全量,是增删差量)</text>
    <rect x="386" y="106" width="300" height="90" rx="9" fill="#fdf6ea" stroke="#efdcb4"/><text x="536" y="128" font-weight="600" fill="#5a3410">② 追加写 MANIFEST</text><text x="536" y="148" fill="#93762e">把 VersionEdit 序列化</text><text x="536" y="164" fill="#93762e">追加进 MANIFEST 日志文件</text><text x="536" y="182" fill="#93762e">(先落盘,崩溃可重放)</text>
    <rect x="726" y="106" width="308" height="90" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="880" y="128" font-weight="600" fill="#12402a">③ 建新 Version + 原子安装</text><text x="880" y="148" fill="#2f6f4f">VersionBuilder 应用 edit</text><text x="880" y="164" fill="#2f6f4f">→ 新 Version,原子换 SuperVersion</text><text x="880" y="182" fill="#2f6f4f">旧 Version 无引用后回收</text>
  </g>
  <line x1="346" y1="151" x2="386" y2="151" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="686" y1="151" x2="726" y2="151" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- manifest structure -->
  <rect x="30" y="236" width="500" height="180" rx="13" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="46" y="258" font-size="11" font-weight="700" fill="#5a3410">MANIFEST 是变更日志(非全量)</text>
  <g font-size="8" text-anchor="middle">
    <rect x="46" y="270" width="470" height="24" rx="5" fill="#fef2e0" stroke="#e8cf9a"/><text x="281" y="286" fill="#5a3410">VersionEdit 1: 基准全量(+ 所有初始文件)</text>
    <rect x="46" y="298" width="470" height="22" rx="5" fill="#fff" stroke="#efdcb4"/><text x="281" y="313" fill="#93762e">VersionEdit 2: Flush + L0 文件#42</text>
    <rect x="46" y="324" width="470" height="22" rx="5" fill="#fff" stroke="#efdcb4"/><text x="281" y="339" fill="#93762e">VersionEdit 3: Compaction −#42 −#38 +#51</text>
    <rect x="46" y="350" width="470" height="22" rx="5" fill="#fff" stroke="#efdcb4"/><text x="281" y="365" fill="#93762e">VersionEdit 4: …(不断追加)</text>
  </g>
  <text x="46" y="392" font-size="8.5" fill="#93762e">重放所有 edit(1→N) = 得到最新文件集合</text>
  <text x="46" y="408" font-size="8.5" fill="#b1483a">CURRENT 文件指向当前生效的 MANIFEST</text>

  <!-- atomicity + rolling -->
  <rect x="550" y="236" width="500" height="180" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="566" y="258" font-size="11" font-weight="700" fill="#2c5a3a">原子性与滚动</text>
  <text x="566" y="280" font-size="8.8" fill="#2f6f4f">· 原子:先写 MANIFEST(持久)再换内存 Version</text>
  <text x="566" y="298" font-size="8.8" fill="#2f6f4f">  崩溃时:要么 edit 在 MANIFEST(重放生效)、要么不在(如同没发生)</text>
  <text x="566" y="316" font-size="8.8" fill="#2f6f4f">· 旧文件延后删:换 Version 后,旧 SST 等无人引用(读/旧 Version)才真删</text>
  <text x="566" y="334" font-size="8.8" fill="#2f6f4f">· MANIFEST 滚动:太大时新建一个,把当前 Version 全量写进作基准</text>
  <text x="566" y="352" font-size="8.8" fill="#2f6f4f">  → 避免 MANIFEST 无限增长、加速恢复</text>
  <rect x="566" y="366" width="468" height="42" rx="8" fill="#fff" stroke="#cfe6d5"/><text x="580" y="386" font-size="8.5" fill="#2c5a3a">CURRENT → MANIFEST-000123(当前)</text><text x="580" y="402" font-size="8" fill="#93762e">切换 MANIFEST 时原子更新 CURRENT 指向新的</text>

  <!-- notes -->
  <rect x="30" y="432" width="1020" height="72" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="454" font-size="11" font-weight="700" fill="#1d1d1f">要点</text>
  <text x="46" y="476" font-size="9" fill="#6e6e73">· MANIFEST 是"文件集合的账本",只记增删差量;重放它得到崩溃前最后的 Version(见恢复篇)。它保证 LSM 元数据的原子性与持久性</text>
  <text x="46" y="494" font-size="8.5" fill="#b1483a">· 归属:VersionEdit 由【Flush】【Compaction】产生;换出的 Version 组成 SuperVersion(【读取路径】);恢复重放在本主线下篇</text>
</svg>
