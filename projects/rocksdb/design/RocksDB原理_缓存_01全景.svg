<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">RocksDB 缓存全景 · block cache + table cache 多级</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">读一个块:先查 block cache(命中免磁盘免解压)→ 未命中经 table cache 读盘解压回填 → OS page cache 兜底</text>

  <!-- read path with caches -->
  <g font-size="8.8" text-anchor="middle">
    <rect x="30" y="80" width="180" height="60" rx="10" fill="#f5faf6" stroke="#cfe6d5"/><text x="120" y="104" font-size="9.5" font-weight="700" fill="#2c5a3a">读取路径要一个块</text><text x="120" y="124" fill="#2f6f4f">键=文件号+块偏移</text>
    <rect x="250" y="80" width="200" height="60" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="350" y="104" font-size="9.5" font-weight="700" fill="#1b2a4a">① block cache</text><text x="350" y="124" fill="#5b7db1">命中 → 直接用(解压后的块)</text>
    <rect x="490" y="80" width="200" height="60" rx="10" fill="#f3f7fc" stroke="#cfe0f2"/><text x="590" y="104" font-size="9.5" font-weight="700" fill="#274a78">② table cache</text><text x="590" y="124" fill="#5b7db1">缓存打开的 SST reader</text>
    <rect x="730" y="80" width="150" height="60" rx="10" fill="#fdf6ea" stroke="#efdcb4"/><text x="805" y="104" font-size="9.5" font-weight="700" fill="#5a3410">③ 磁盘读 + 解压</text><text x="805" y="124" fill="#93762e">读 block,解压</text>
    <rect x="900" y="80" width="150" height="60" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="975" y="104" font-size="9.5" font-weight="700" fill="#12402a">④ 回填 block cache</text><text x="975" y="124" fill="#2f6f4f">下次命中</text>
  </g>
  <line x1="210" y1="110" x2="250" y2="110" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="450" y1="110" x2="490" y2="110" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="690" y1="110" x2="730" y2="110" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="880" y1="110" x2="900" y2="110" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="350" y="158" text-anchor="middle" font-size="7.5" fill="#a1a1a6">未命中↓</text>

  <!-- what's cached -->
  <rect x="30" y="176" width="500" height="200" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="198" font-size="11" font-weight="700" fill="#1b2a4a">block cache 缓存三类块</text>
  <rect x="46" y="210" width="470" height="40" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="60" y="230" font-size="9" font-weight="600" fill="#5a3410">data block</text><text x="60" y="244" font-size="8.3" fill="#93762e">真实 KV;命中最省(免读+免解压)</text>
  <rect x="46" y="258" width="470" height="40" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="60" y="278" font-size="9" font-weight="600" fill="#1b2a4a">index block</text><text x="60" y="292" font-size="8.3" fill="#5b7db1">定位 data block;可高优先级/常驻</text>
  <rect x="46" y="306" width="470" height="40" rx="8" fill="#f5faf6" stroke="#cfe6d5"/><text x="60" y="326" font-size="9" font-weight="600" fill="#2c5a3a">filter block</text><text x="60" y="340" font-size="8.3" fill="#2f6f4f">布隆过滤器;短路收益大,宜钉住</text>
  <text x="46" y="366" font-size="8.3" fill="#5b7db1">cache_index_and_filter_blocks:进 cache(省内存)还是常驻</text>

  <!-- table cache + os -->
  <rect x="550" y="176" width="500" height="200" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="566" y="198" font-size="11" font-weight="700" fill="#12402a">table cache 与 OS page cache</text>
  <rect x="566" y="210" width="470" height="50" rx="8" fill="#f5faf6" stroke="#cfe6d5"/><text x="580" y="230" font-size="9" font-weight="600" fill="#2c5a3a">table cache(db/table_cache.cc)</text><text x="580" y="248" font-size="8.3" fill="#2f6f4f">缓存已打开的 BlockBasedTableReader,免重复打开文件、解析 footer/index</text>
  <rect x="566" y="268" width="470" height="50" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="580" y="288" font-size="9" font-weight="600" fill="#5a3410">OS page cache(兜底)</text><text x="580" y="306" font-size="8.3" fill="#93762e">缓存文件原始字节(含压缩);block cache 未命中时可能 page cache 命中</text>
  <rect x="566" y="326" width="470" height="40" rx="8" fill="#fff" stroke="#cfe6d5"/><text x="580" y="346" font-size="8.5" fill="#2c5a3a">use_direct_reads=true 可绕过 OS page cache(避免双重缓存)</text><text x="580" y="360" font-size="8" fill="#93762e">此时全靠 block cache,内存预算要给足</text>

  <!-- notes -->
  <rect x="30" y="392" width="1020" height="130" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="414" font-size="11" font-weight="700" fill="#1d1d1f">要点</text>
  <text x="46" y="436" font-size="9" fill="#6e6e73">· 三级缓存:block cache(解压后的应用层块)→ OS page cache(压缩的文件字节)→ 磁盘;block cache 命中收益最大</text>
  <text x="46" y="454" font-size="9" fill="#6e6e73">· block cache 是 LSM 读性能的放大器:没它,读要跨多层反复读盘;命中率高则读近似内存操作</text>
  <text x="46" y="472" font-size="9" fill="#6e6e73">· 多个 CF/DB 可共享一个 block cache 实例(统一内存预算);容量是最重要的内存调优项之一</text>
  <text x="46" y="492" font-size="9" fill="#b1483a">· 归属:缓存的是【SST 存储格式】的块;命中查询在【读取路径】;table cache 的 reader 对应【版本】里的 SST 文件</text>
  <text x="46" y="510" font-size="8.5" fill="#a1a1a6">· 观测:rocksdb.block-cache-hit / -miss、block-cache-usage 看命中率与占用</text>
</svg>
