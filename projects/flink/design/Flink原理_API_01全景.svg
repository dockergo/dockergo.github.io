<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Flink 原理 · API 全景（两 API 汇入统一后端）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">DataStream(命令式) + Table/SQL(声明式) → 同一 StreamGraph→JobGraph 管线;一份引擎两种表达</text>

  <!-- DataStream API column -->
  <rect x="40" y="70" width="470" height="150" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="60" y="92" font-size="11" font-weight="700" fill="#3d2a5a">DataStream API（命令式 · 精细控制）</text>
  <g font-size="8.6">
    <rect x="60" y="102" width="430" height="34" rx="8" fill="#faf4fb" stroke="#e2d2ee"/><text x="74" y="118" font-weight="600" fill="#3d2a5a">StreamExecutionEnvironment(入口)</text><text x="74" y="131" font-size="7.8" fill="#7a5aa8">map/filter/keyBy/window 转换累积进 List&lt;Transformation&gt;</text>
    <rect x="60" y="142" width="430" height="30" rx="8" fill="#faf4fb" stroke="#e2d2ee"/><text x="74" y="161" fill="#3d2a5a">addOperator 登记 · execute 惰性 getStreamGraph</text>
    <rect x="60" y="178" width="430" height="30" rx="8" fill="#faf4fb" stroke="#e2d2ee"/><text x="74" y="197" fill="#3d2a5a">DataStream V2(FLIP-409)同样汇入 StreamGraphGenerator</text>
  </g>

  <!-- Table/SQL API column -->
  <rect x="570" y="70" width="470" height="150" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="590" y="92" font-size="11" font-weight="700" fill="#3d2a5a">Table / SQL API（声明式 · Calcite 优化）</text>
  <g font-size="8.6">
    <rect x="590" y="102" width="430" height="34" rx="8" fill="#faf4fb" stroke="#e2d2ee"/><text x="604" y="118" font-weight="600" fill="#3d2a5a">TableEnvironmentImpl.executeSql</text><text x="604" y="131" font-size="7.8" fill="#7a5aa8">SQL 文本 → ParserImpl.parse(Calcite) → Operation 树</text>
    <rect x="590" y="142" width="430" height="30" rx="8" fill="#faf4fb" stroke="#e2d2ee"/><text x="604" y="161" fill="#3d2a5a">PlannerBase.translate:Rel→optimize→ExecNode→Plan</text>
    <rect x="590" y="178" width="430" height="30" rx="8" fill="#faf4fb" stroke="#e2d2ee"/><text x="604" y="197" fill="#3d2a5a">批/流共享 PlannerBase,isStreamingMode 选 Planner</text>
  </g>

  <!-- convergence arrows -->
  <line x1="275" y1="220" x2="470" y2="266" stroke="#c7c7cc" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="805" y1="220" x2="610" y2="266" stroke="#c7c7cc" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="330" y="248" font-size="8.4" fill="#7a5aa8">产 Transformation 列表</text>
  <text x="640" y="248" font-size="8.4" fill="#7a5aa8">产 Transformation 列表</text>

  <!-- unified backend -->
  <rect x="240" y="270" width="600" height="46" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="540" y="291" font-size="10.5" font-weight="700" text-anchor="middle" fill="#1b2a4a">汇合点 · StreamGraphGenerator</text>
  <text x="540" y="307" font-size="8.2" text-anchor="middle" fill="#5b7db1">两条路输出的 Transformation 都进这里 · 统一后端起点</text>

  <line x1="540" y1="316" x2="540" y2="336" stroke="#86868b" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- pipeline -->
  <rect x="40" y="338" width="1000" height="94" rx="14" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="56" y="360" font-size="11" font-weight="700" fill="#1b2a4a">统一执行管线（同一套图变换与执行）</text>
  <g text-anchor="middle" font-size="9">
    <rect x="56" y="370" width="300" height="50" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/><text x="206" y="392" font-weight="600" fill="#274a78">StreamGraph</text><text x="206" y="408" font-size="7.8" fill="#5b7db1">逻辑 DAG</text>
    <rect x="390" y="370" width="300" height="50" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/><text x="540" y="392" font-weight="600" fill="#274a78">JobGraph</text><text x="540" y="408" font-size="7.8" fill="#5b7db1">算子链化</text>
    <rect x="724" y="370" width="300" height="50" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/><text x="874" y="392" font-weight="600" fill="#274a78">ExecutionGraph</text><text x="874" y="408" font-size="7.8" fill="#5b7db1">并行展开</text>
  </g>
  <line x1="356" y1="395" x2="390" y2="395" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="690" y1="395" x2="724" y2="395" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- bottom banner -->
  <rect x="40" y="446" width="1000" height="46" rx="12" fill="#f0f0f4" stroke="#d2d2d7"/>
  <text x="540" y="473" font-size="9.5" font-weight="700" text-anchor="middle" fill="#48484a">误区破除:DataStream 与 Table 不是两个引擎——都翻译成 Transformation,汇入同一执行后端</text>
</svg>
