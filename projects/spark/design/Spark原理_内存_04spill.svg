<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="540" viewBox="0 0 1060 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1060" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">spill：内存不够就落盘，不 OOM——处理超内存数据集的兜底</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">MemoryConsumer.spill(:86) · TaskMemoryManager.acquireExecutionMemory(:193) 触发其他 consumer spill（:205-220）</text>
  <g text-anchor="middle">
    <rect x="60" y="82" width="200" height="70" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="160" y="110" font-size="10" font-weight="700" fill="#12402a">consumer 要更多内存</text><text x="160" y="128" font-size="8" fill="#4c8567">ExternalSorter 攒排序数据</text><text x="160" y="142" font-size="7.5" fill="#4c8567">acquireExecutionMemory(:193)</text>
    <text x="290" y="122" font-size="20" fill="#c7c7cc">→</text>
    <rect x="320" y="82" width="200" height="70" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/><text x="420" y="110" font-size="10" font-weight="700" fill="#5a3410">内存池不够分</text><text x="420" y="128" font-size="8" fill="#93762e">execution 池已借满</text><text x="420" y="142" font-size="7.5" fill="#b08843">无法立即满足</text>
    <text x="550" y="122" font-size="20" fill="#c7c7cc">→</text>
    <rect x="580" y="82" width="200" height="70" rx="11" fill="#f6f2fb" stroke="#d9c9ec" filter="url(#soft)"/><text x="680" y="110" font-size="10" font-weight="700" fill="#3d2a5a">触发 spill</text><text x="680" y="128" font-size="8" fill="#7a5da5">让其他 consumer 写盘</text><text x="680" y="142" font-size="7.5" fill="#9a7cc4">spill(size, trigger)(:86)</text>
    <text x="810" y="122" font-size="20" fill="#c7c7cc">→</text>
    <rect x="840" y="82" width="180" height="70" rx="11" fill="#e9f1fb" stroke="#c4d8f0" filter="url(#soft)"/><text x="930" y="110" font-size="10" font-weight="700" fill="#1b2a4a">释放内存、继续</text><text x="930" y="128" font-size="8" fill="#5b7db1">腾出空间给请求者</text><text x="930" y="142" font-size="7.5" fill="#8aa6cf">数据在盘上，后续归并</text>
  </g>
  <rect x="40" y="176" width="480" height="150" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="200" font-size="11" font-weight="700" fill="#274a78">谁会 spill</text>
  <text x="60" y="224" font-size="9.5" fill="#5b7db1">· ExternalSorter（ExternalSorter.scala:259）——shuffle/sort 排序缓冲</text>
  <text x="60" y="244" font-size="9.5" fill="#5b7db1">· ExternalAppendOnlyMap（:186）——聚合 map（reduceByKey 等）</text>
  <text x="60" y="264" font-size="9.5" fill="#5b7db1">· 共同基类 Spillable（Spillable.scala:118）</text>
  <text x="60" y="286" font-size="9" fill="#8aa6cf">· MemoryConsumer（MemoryConsumer.java:32）是抽象</text>
  <text x="60" y="306" font-size="9" fill="#8aa6cf">· TaskMemoryManager（:57）协调一个 task 内所有 consumer</text>
  <rect x="540" y="176" width="480" height="150" rx="13" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="560" y="200" font-size="11" font-weight="700" fill="#7a5a1e">spill 的意义与代价</text>
  <text x="560" y="224" font-size="9.5" fill="#93762e">· 意义：能处理<tspan font-weight="600">超过内存</tspan>的数据集——不因单批数据大就崩</text>
  <text x="560" y="244" font-size="9.5" fill="#93762e">· 代价：磁盘 IO + 后续归并（merge spilled files）</text>
  <text x="560" y="264" font-size="9.5" fill="#93762e">· spill 频繁 = 内存偏小的信号 → 加内存/减分区大小</text>
  <text x="560" y="286" font-size="9" fill="#b08843">· 老开关 spark.shuffle.spill 已移除：spill 恒开</text>
  <text x="560" y="306" font-size="9" fill="#b08843">· 只余强制阈值 numElementsForceSpillThreshold 可调</text>
  <rect x="40" y="338" width="980" height="88" rx="13" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="60" y="362" font-size="11" font-weight="700" fill="#7a2230">spill ≠ 万能：真正 OOM 的来源</text>
  <text x="60" y="384" font-size="9.5" fill="#a44">· 单条记录/单分区过大：一条记录塞不进内存，spill 也救不了 → 减小分区、加盐拆倾斜</text>
  <text x="60" y="404" font-size="9.5" fill="#a44">· User Memory 爆掉：UDF 里攒大对象（大 HashMap/大数组）不受 Spark 内存管理 → 崩</text>
  <text x="60" y="420" font-size="9" fill="#7a2230">· execution 内存不够 → spill（慢但不崩）；上面两类才是真 OOM</text>
  <rect x="40" y="438" width="980" height="48" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="466" font-size="10" fill="#4b4b50"><tspan font-weight="700" fill="#1d1d1f">一句话：</tspan>内存紧张时 TaskMemoryManager 触发 consumer 的 spill 落盘（而非 OOM），让 Spark 跑超内存数据集；代价是磁盘 IO，频繁 spill 说明内存偏小。</text>
</svg>
