<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="540" viewBox="0 0 1060 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1060" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">watermark：用 event time 界定迟到丢弃与状态清理</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">EventTimeWatermark(logical:72) · WatermarkTracker(:85) · watermark = maxEventTime − delay(:123) · withWatermark(Dataset:597)</text>
  <!-- timeline -->
  <text x="60" y="82" font-size="10" font-weight="700" fill="#1d1d1f">问题：数据乱序到达，窗口状态留多久？</text>
  <rect x="60" y="94" width="900" height="70" rx="10" fill="#f7f7f9" stroke="#e6e6ea"/>
  <line x1="80" y1="140" x2="940" y2="140" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="946" y="144" font-size="8" fill="#a1a1a6">event time</text>
  <g font-size="8" text-anchor="middle">
    <circle cx="200" cy="140" r="5" fill="#5b7db1"/><text x="200" y="122" fill="#5b7db1">10:00</text>
    <circle cx="360" cy="140" r="5" fill="#5b7db1"/><text x="360" y="122" fill="#5b7db1">10:05</text>
    <circle cx="520" cy="140" r="5" fill="#34c759"/><text x="520" y="122" fill="#2f6f4f">10:10 最大</text>
    <line x1="440" y1="128" x2="440" y2="156" stroke="#ff9500" stroke-width="2"/><text x="440" y="120" fill="#b06a00" font-weight="600">watermark=10:00</text><text x="440" y="176" fill="#b08843" font-size="7">(10:10−delay 10min)</text>
    <circle cx="150" cy="140" r="5" fill="#ff3b30"/><text x="150" y="122" fill="#a44">9:58 迟到</text><text x="150" y="176" fill="#a44" font-size="7">&lt; watermark → 丢弃</text>
  </g>
  <rect x="40" y="196" width="480" height="150" rx="13" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="60" y="220" font-size="11" font-weight="700" fill="#5a3410">watermark 语义</text>
  <text x="60" y="244" font-size="9.5" fill="#93762e">· watermark = 已见最大 event time − delayThreshold</text>
  <text x="60" y="264" font-size="9.5" fill="#93762e">· 比 watermark 更旧的数据 = "太迟" → 丢弃</text>
  <text x="60" y="284" font-size="9.5" fill="#93762e">· watermark 之前的窗口状态可安全清理</text>
  <text x="60" y="306" font-size="9" fill="#b08843">· WatermarkTracker.updateWatermark(:106/:123)</text>
  <text x="60" y="326" font-size="9" fill="#b08843">· API：df.withWatermark("eventTime","10 minutes")</text>
  <rect x="540" y="196" width="480" height="150" rx="13" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="560" y="220" font-size="11" font-weight="700" fill="#7a2230">为什么必须有 watermark</text>
  <text x="560" y="244" font-size="9.5" fill="#a44">· 无 watermark：不知何时窗口"关闭"→ 状态永久保留</text>
  <text x="560" y="264" font-size="9.5" fill="#a44">· windowed 聚合的 state 无限累积 → 最终 OOM</text>
  <text x="560" y="284" font-size="9.5" fill="#a44">· watermark 给出"晚于此不再等" → 可清理旧状态</text>
  <text x="560" y="306" font-size="9" fill="#7a2230">· 权衡：delay 大=容忍更迟数据但状态更大/延迟高</text>
  <text x="560" y="326" font-size="9" fill="#7a2230">· delay 小=状态小但迟到数据被丢得多</text>
  <rect x="40" y="358" width="980" height="100" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="382" font-size="11" font-weight="700" fill="#274a78">输出模式（OutputMode，sql/api/OutputMode.java:30）</text>
  <text x="60" y="406" font-size="9.5" fill="#5b7db1">· Append（:39）：只输出确定不再变的行（配 watermark 的窗口聚合）——最常用</text>
  <text x="60" y="426" font-size="9.5" fill="#5b7db1">· Update（:61）：输出本批有变化的行——增量更新场景</text>
  <text x="60" y="444" font-size="9.5" fill="#5b7db1">· Complete（:50）：每次输出全量结果表（需聚合，状态全留）——小结果集</text>
  <rect x="40" y="470" width="980" height="52" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="494" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="514" font-size="10" fill="#4b4b50">watermark = 最大 event time − delay：比它旧的迟到数据丢弃、之前的窗口状态可清理——让 windowed 聚合的 state 有界（否则 OOM）。</text>
</svg>
