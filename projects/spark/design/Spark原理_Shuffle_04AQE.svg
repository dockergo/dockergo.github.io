<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="560" viewBox="0 0 1060 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1060" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">AQE：在 shuffle 边界用运行期真实统计重优化后续计划</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">AdaptiveSparkPlanExec.scala:70 · reOptimize(:813) · spark.sql.adaptive.enabled 默认 true · 弥补"规划期统计不准"</text>
  <rect x="40" y="76" width="980" height="60" rx="12" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="530" y="100" font-size="10.5" font-weight="700" fill="#274a78" text-anchor="middle">核心思想：跑完一个 shuffle stage → 拿到真实统计 → 重优化下一段 → 再跑</text>
  <text x="530" y="120" font-size="8.5" fill="#5b7db1" text-anchor="middle">规划期估算常不准（尤其多 join/过滤后），AQE 用"边跑边看到的真实数据"动态调整</text>
  <g text-anchor="middle">
    <rect x="40" y="156" width="310" height="150" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
    <text x="195" y="180" font-size="10.5" font-weight="700" fill="#12402a">① 合并小分区</text>
    <text x="195" y="202" font-size="8.5" fill="#2f6f4f">CoalesceShufflePartitions</text>
    <text x="195" y="222" font-size="8.5" fill="#2f6f4f">shuffle 后很多小分区</text>
    <text x="195" y="242" font-size="8.5" fill="#12402a">→ 合并成合理数量</text>
    <text x="195" y="262" font-size="8" fill="#4c8567">避免过多小 task 的调度开销</text>
    <text x="195" y="284" font-size="8" fill="#8aa6cf">解决 shuffle.partitions 设太大</text>
    <rect x="375" y="156" width="310" height="150" rx="13" fill="#fbeef0" stroke="#f0cdd4" filter="url(#soft)"/>
    <text x="530" y="180" font-size="10.5" font-weight="700" fill="#7a2230">② 倾斜 Join 处理</text>
    <text x="530" y="202" font-size="8.5" fill="#a44">OptimizeSkewedJoin</text>
    <text x="530" y="222" font-size="8.5" fill="#a44">检测某分区数据远超其他</text>
    <text x="530" y="242" font-size="8.5" fill="#7a2230">→ 拆成多个子分区并行</text>
    <text x="530" y="262" font-size="8" fill="#a44">避免倾斜 task 拖垮整个 stage</text>
    <text x="530" y="284" font-size="8" fill="#a44">数据倾斜的自动缓解</text>
    <rect x="710" y="156" width="310" height="150" rx="13" fill="#e9f1fb" stroke="#c4d8f0" filter="url(#soft)"/>
    <text x="865" y="180" font-size="10.5" font-weight="700" fill="#1b2a4a">③ 动态选 Join 策略</text>
    <text x="865" y="202" font-size="8.5" fill="#5b7db1">运行期发现某侧实际很小</text>
    <text x="865" y="222" font-size="8.5" fill="#5b7db1">→ 改成 broadcast join</text>
    <text x="865" y="242" font-size="8.5" fill="#1b2a4a">省掉一次 shuffle</text>
    <text x="865" y="264" font-size="8" fill="#8aa6cf">规划期不知道过滤后有多小</text>
    <text x="865" y="284" font-size="8" fill="#8aa6cf">运行期才知道 → 改策略</text>
  </g>
  <rect x="40" y="326" width="980" height="90" rx="13" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="60" y="350" font-size="11" font-weight="700" fill="#7a5a1e">机制</text>
  <text x="60" y="372" font-size="9.5" fill="#93762e">· AdaptiveSparkPlanExec 把计划切成"查询阶段"，每个 shuffle 边界是一个重优化点：reOptimize(:813) 用已完成阶段的真实统计</text>
  <text x="60" y="390" font-size="9.5" fill="#93762e">· 应用 queryStageOptimizerRules（coalesce/skew/…）重规划后续，再提交执行</text>
  <text x="60" y="408" font-size="9" fill="#b08843">· 默认开（spark.sql.adaptive.enabled=true）——现代 Spark 的重要提速来源</text>
  <rect x="40" y="426" width="980" height="76" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="450" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="472" font-size="10" fill="#4b4b50">AQE 在每个 shuffle 边界用运行期真实统计重优化后续计划：合并小分区（省调度）、拆倾斜 Join（防拖垮）、动态改 broadcast join（省 shuffle）。</text>
  <text x="60" y="490" font-size="10" fill="#4b4b50">默认开启，弥补规划期统计不准——"边跑边调"，是现代 Spark 的重要提速手段。</text>
</svg>
