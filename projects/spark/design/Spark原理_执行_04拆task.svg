<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="580" viewBox="0 0 1060 580" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="580" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Stage → Task：一个 stage 的 task 数 = 该 stage RDD 的分区数</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">Stage.numPartitions = rdd.partitions.length (Stage.scala:66)；一分区一 task，逻辑同、数据异（SIMD 式并行）</text>

  <!-- stage -> partitions -> tasks -->
  <rect x="40" y="76" width="200" height="120" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="140" y="100" font-size="11" font-weight="700" fill="#12402a" text-anchor="middle">Stage（RDD）</text>
  <text x="140" y="122" font-size="8.5" fill="#2f6f4f" text-anchor="middle">该 stage 的 RDD</text>
  <text x="140" y="140" font-size="8.5" fill="#2f6f4f" text-anchor="middle">有 4 个分区</text>
  <text x="140" y="164" font-size="8" fill="#4c8567" text-anchor="middle">numTasks = 4</text>
  <text x="140" y="180" font-size="8" fill="#4c8567" text-anchor="middle">(DAGScheduler.scala:656)</text>

  <text x="290" y="140" font-size="18" fill="#c7c7cc" text-anchor="middle">→</text>
  <text x="290" y="158" font-size="8" fill="#a1a1a6" text-anchor="middle">findMissing</text>
  <text x="290" y="170" font-size="8" fill="#a1a1a6" text-anchor="middle">Partitions(:1865)</text>

  <!-- partitions -->
  <g text-anchor="middle" font-size="8.5">
    <rect x="340" y="80" width="120" height="26" rx="6" fill="#fff7e6" stroke="#e8cf9a"/><text x="400" y="97" fill="#5a3410">分区 0</text>
    <rect x="340" y="112" width="120" height="26" rx="6" fill="#fff7e6" stroke="#e8cf9a"/><text x="400" y="129" fill="#5a3410">分区 1</text>
    <rect x="340" y="144" width="120" height="26" rx="6" fill="#fff7e6" stroke="#e8cf9a"/><text x="400" y="161" fill="#5a3410">分区 2</text>
    <rect x="340" y="176" width="120" height="26" rx="6" fill="#fff7e6" stroke="#e8cf9a"/><text x="400" y="193" fill="#5a3410">分区 3</text>
  </g>
  <text x="510" y="145" font-size="18" fill="#c7c7cc" text-anchor="middle">→</text>
  <text x="510" y="163" font-size="8" fill="#a1a1a6" text-anchor="middle">一分区</text>
  <text x="510" y="174" font-size="8" fill="#a1a1a6" text-anchor="middle">一 task</text>

  <!-- tasks -->
  <g text-anchor="middle" font-size="8.5">
    <rect x="560" y="80" width="170" height="26" rx="6" fill="#eef3fb" stroke="#bcd0ec"/><text x="645" y="97" fill="#1b2a4a">Task 0（算分区 0）</text>
    <rect x="560" y="112" width="170" height="26" rx="6" fill="#eef3fb" stroke="#bcd0ec"/><text x="645" y="129" fill="#1b2a4a">Task 1（算分区 1）</text>
    <rect x="560" y="144" width="170" height="26" rx="6" fill="#eef3fb" stroke="#bcd0ec"/><text x="645" y="161" fill="#1b2a4a">Task 2（算分区 2）</text>
    <rect x="560" y="176" width="170" height="26" rx="6" fill="#eef3fb" stroke="#bcd0ec"/><text x="645" y="193" fill="#1b2a4a">Task 3（算分区 3）</text>
  </g>
  <text x="780" y="145" font-size="18" fill="#c7c7cc" text-anchor="middle">→</text>
  <rect x="820" y="100" width="200" height="82" rx="11" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="920" y="122" font-size="10" font-weight="600" fill="#274a78" text-anchor="middle">打包成 TaskSet</text>
  <text x="920" y="142" font-size="8.5" fill="#5b7db1" text-anchor="middle">交 TaskScheduler</text>
  <text x="920" y="160" font-size="8.5" fill="#5b7db1" text-anchor="middle">分派到 executor 并行跑</text>
  <text x="920" y="176" font-size="8" fill="#8aa6cf" text-anchor="middle">见交接图</text>

  <!-- task types -->
  <rect x="40" y="222" width="480" height="120" rx="13" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="280" y="246" font-size="11" font-weight="700" fill="#1d1d1f" text-anchor="middle">两类 task（对应两类 stage）</text>
  <rect x="60" y="260" width="200" height="66" rx="9" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="160" y="280" font-size="9.5" font-weight="600" fill="#12402a" text-anchor="middle">ShuffleMapTask（:54）</text>
  <text x="160" y="298" font-size="8" fill="#2f6f4f" text-anchor="middle">算完写 shuffle 输出</text>
  <text x="160" y="314" font-size="8" fill="#4c8567" text-anchor="middle">runTask 返回 MapStatus</text>
  <rect x="300" y="260" width="200" height="66" rx="9" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="400" y="280" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">ResultTask（:55）</text>
  <text x="400" y="298" font-size="8" fill="#5b7db1" text-anchor="middle">跑 action 函数</text>
  <text x="400" y="314" font-size="8" fill="#8aa6cf" text-anchor="middle">结果回 driver</text>

  <!-- why partition = parallelism -->
  <rect x="540" y="222" width="480" height="120" rx="13" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="780" y="246" font-size="11" font-weight="700" fill="#7a5a1e" text-anchor="middle">分区数 = 并行度旋钮</text>
  <text x="560" y="268" font-size="9" fill="#93762e">· task 数 = 分区数 → 分区数直接决定并行度</text>
  <text x="560" y="286" font-size="9" fill="#93762e">· 太少：并行不足、单 task 过大易 OOM</text>
  <text x="560" y="304" font-size="9" fill="#93762e">· 太多：调度开销大、小文件多</text>
  <text x="560" y="324" font-size="8.5" fill="#b08843">· 调：spark.default.parallelism / spark.sql.shuffle.partitions</text>

  <rect x="40" y="358" width="980" height="90" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="382" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="404" font-size="10" fill="#4b4b50">一个 stage 按其 RDD 的分区数拆成等量 task（一分区一 task），同 stage 的 task 逻辑相同只是数据分区不同——</text>
  <text x="60" y="422" font-size="10" fill="#4b4b50">这就是 Spark 的数据并行。ShuffleMapTask 写 shuffle 输出、ResultTask 产最终结果。分区数即并行度旋钮。</text>
  <text x="60" y="440" font-size="9" fill="#8a8a8f">task 打包成 TaskSet 交 TaskScheduler，是执行模型与调度主线的交接（见下张）。</text>
</svg>
