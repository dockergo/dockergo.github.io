<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="560" viewBox="0 0 1060 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1060" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">TaskSetManager：locality 级别与延迟调度</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">TaskSetManager.scala:56 · 5 级 locality(TaskLocality.scala:25) · 延迟调度 getAllowedLocalityLevel(:621) · spark.locality.wait 默认 3s</text>
  <text x="30" y="82" font-size="11" font-weight="700" fill="#1b2a4a">locality 级别（优先就近，逐级降级）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="40" y="94" width="180" height="60" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="130" y="116" font-weight="600" fill="#12402a">PROCESS_LOCAL</text><text x="130" y="134" fill="#2f6f4f">数据在同一 executor</text><text x="130" y="148" fill="#4c8567">最优（内存直取）</text>
    <rect x="230" y="94" width="180" height="60" rx="9" fill="#e9f1fb" stroke="#c4d8f0"/><text x="320" y="116" font-weight="600" fill="#1b2a4a">NODE_LOCAL</text><text x="320" y="134" fill="#5b7db1">数据在同一节点</text><text x="320" y="148" fill="#8aa6cf">磁盘/跨进程读</text>
    <rect x="420" y="94" width="160" height="60" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/><text x="500" y="116" font-weight="600" fill="#274a78">NO_PREF</text><text x="500" y="134" fill="#5b7db1">无偏好</text><text x="500" y="148" fill="#8aa6cf">如读外部源</text>
    <rect x="590" y="94" width="180" height="60" rx="9" fill="#fdf6ea" stroke="#efdcb4"/><text x="680" y="116" font-weight="600" fill="#5a3410">RACK_LOCAL</text><text x="680" y="134" fill="#93762e">数据在同机架</text><text x="680" y="148" fill="#b08843">跨节点、同机架网络</text>
    <rect x="780" y="94" width="180" height="60" rx="9" fill="#fbeef0" stroke="#f0cdd4"/><text x="870" y="116" font-weight="600" fill="#7a2230">ANY</text><text x="870" y="134" fill="#a44">任意位置</text><text x="870" y="148" fill="#7a2230">最差（跨机架网络）</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.2" fill="none"><line x1="220" y1="124" x2="230" y2="124" marker-end="url(#ar)"/><line x1="410" y1="124" x2="420" y2="124" marker-end="url(#ar)"/><line x1="580" y1="124" x2="590" y2="124" marker-end="url(#ar)"/><line x1="770" y1="124" x2="780" y2="124" marker-end="url(#ar)"/></g>
  <text x="500" y="176" font-size="8" fill="#a1a1a6" text-anchor="middle">优 ← locality 递减 → 差（数据离计算越来越远）</text>
  <rect x="40" y="196" width="480" height="150" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="280" y="220" font-size="11" font-weight="700" fill="#274a78" text-anchor="middle">延迟调度：宁等一下，就近算</text>
  <text x="60" y="244" font-size="9.5" fill="#5b7db1">· 最优 locality（如 PROCESS_LOCAL）暂无空闲 executor 时</text>
  <text x="60" y="264" font-size="9.5" fill="#5b7db1">· 不立刻降级派远处，而是等 spark.locality.wait（默认 3s）</text>
  <text x="60" y="284" font-size="9.5" fill="#5b7db1">· 等到了就近资源 → 就近算（数据不搬）</text>
  <text x="60" y="306" font-size="9.5" fill="#5b7db1">· 超时仍无 → 降一级 locality 再试</text>
  <text x="60" y="330" font-size="8.5" fill="#8aa6cf">getAllowedLocalityLevel(:621) 控制当前允许级别</text>
  <rect x="540" y="196" width="480" height="150" rx="13" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="780" y="220" font-size="11" font-weight="700" fill="#7a5a1e" text-anchor="middle">为什么"等"划算</text>
  <text x="560" y="244" font-size="9.5" fill="#93762e">· 移动计算 ≪ 移动数据：把 task 派到数据处，比把数据网络搬过来快得多</text>
  <text x="560" y="266" font-size="9.5" fill="#93762e">· 等 3s 就近算，常比立刻远程算（含网络传输）总时间更短</text>
  <text x="560" y="288" font-size="9" fill="#b08843">· 权衡：locality.wait 太大 → 空等拖慢；太小 → 频繁远程读</text>
  <text x="560" y="310" font-size="9" fill="#b08843">· 数据分布均匀/网络快时可调小</text>
  <text x="560" y="330" font-size="8.5" fill="#8aa6cf">resourceOffer(:461) 据此挑 task</text>
  <rect x="40" y="360" width="980" height="90" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="384" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="406" font-size="10" fill="#4b4b50">TaskSetManager 按 locality 就近派 task（PROCESS→NODE→NO_PREF→RACK→ANY 逐级），并用延迟调度："最优位置暂无资源</text>
  <text x="60" y="424" font-size="10" fill="#4b4b50">宁等 spark.locality.wait（默认3s）也不降级"——因为移动计算远比移动数据便宜，等一下就近算通常总时间更短。</text>
  <text x="60" y="442" font-size="9" fill="#8a8a8f">这是 Spark"计算向数据靠拢"原则的调度层落地。</text>
</svg>
