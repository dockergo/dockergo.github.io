<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="620" viewBox="0 0 1060 620" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="620" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">执行模型全景：action → job → stage（按 shuffle 切）→ task（按分区拆）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">DAGScheduler.submitJob (DAGScheduler.scala:1058)；RDD/DataFrame/SQL/Streaming 最终都落到这套模型</text>

  <!-- top chain -->
  <g text-anchor="middle">
    <rect x="40" y="80" width="150" height="60" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/><text x="115" y="104" font-size="11" font-weight="600" fill="#3d2a5a">action</text><text x="115" y="122" font-size="8.5" fill="#7a5da5">count/collect/save</text><text x="115" y="135" font-size="8" fill="#9a7cc4">触发执行</text>
    <rect x="230" y="80" width="150" height="60" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="305" y="104" font-size="11" font-weight="600" fill="#1b2a4a">job</text><text x="305" y="122" font-size="8.5" fill="#5b7db1">submitJob :1058</text><text x="305" y="135" font-size="8" fill="#8aa6cf">一个 action = 一个 job</text>
    <rect x="420" y="80" width="150" height="60" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="495" y="104" font-size="11" font-weight="600" fill="#12402a">stage 集</text><text x="495" y="122" font-size="8.5" fill="#2f6f4f">按 shuffle 边界切</text><text x="495" y="135" font-size="8" fill="#4c8567">DAG 拓扑</text>
    <rect x="610" y="80" width="150" height="60" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/><text x="685" y="104" font-size="11" font-weight="600" fill="#5a3410">task 集</text><text x="685" y="122" font-size="8.5" fill="#93762e">每 stage 按分区拆</text><text x="685" y="135" font-size="8" fill="#b08843">最小执行单位</text>
    <rect x="800" y="80" width="220" height="60" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="910" y="104" font-size="11" font-weight="600" fill="#274a78">executor 上并行执行</text><text x="910" y="122" font-size="8.5" fill="#5b7db1">TaskScheduler 分派</text><text x="910" y="135" font-size="8" fill="#8aa6cf">见「调度」主线</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="190" y1="110" x2="230" y2="110" marker-end="url(#ar)"/>
    <line x1="380" y1="110" x2="420" y2="110" marker-end="url(#ar)"/>
    <line x1="570" y1="110" x2="610" y2="110" marker-end="url(#ar)"/>
    <line x1="760" y1="110" x2="800" y2="110" marker-end="url(#ar)"/>
  </g>

  <!-- concrete DAG example -->
  <rect x="40" y="168" width="980" height="250" rx="14" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="192" font-size="11.5" font-weight="700" fill="#1d1d1f">例：textFile.map.filter.reduceByKey.collect —— 一个 shuffle 切成 2 个 stage</text>
  <!-- stage 1 -->
  <rect x="66" y="208" width="440" height="150" rx="12" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="286" y="228" font-size="10.5" font-weight="700" fill="#12402a" text-anchor="middle">Stage 0（ShuffleMapStage）· 窄依赖流水线</text>
  <g text-anchor="middle" font-size="8">
    <rect x="86" y="240" width="90" height="34" rx="7" fill="#fff" stroke="#bfe0cd"/><text x="131" y="261" fill="#12402a">textFile</text>
    <rect x="196" y="240" width="70" height="34" rx="7" fill="#fff" stroke="#bfe0cd"/><text x="231" y="261" fill="#12402a">map</text>
    <rect x="286" y="240" width="70" height="34" rx="7" fill="#fff" stroke="#bfe0cd"/><text x="321" y="261" fill="#12402a">filter</text>
    <rect x="376" y="240" width="110" height="34" rx="7" fill="#f2fbf6" stroke="#cdeadb"/><text x="431" y="256" fill="#12402a">map 端聚合</text><text x="431" y="268" fill="#4c8567">(shuffle write)</text>
  </g>
  <text x="286" y="296" font-size="8.5" fill="#2f6f4f" text-anchor="middle">窄依赖（map/filter）折进同一 stage，流水线执行、不落盘</text>
  <text x="286" y="316" font-size="8.5" fill="#4c8567" text-anchor="middle">task 数 = textFile 的分区数（如 4 分区 → 4 个 ShuffleMapTask）</text>
  <text x="286" y="340" font-size="8" fill="#8aa6cf" text-anchor="middle">stage 末尾写 shuffle 输出（MapStatus）</text>

  <!-- shuffle boundary -->
  <text x="530" y="285" font-size="24" fill="#f0a020" text-anchor="middle">⇉</text>
  <text x="530" y="305" font-size="8" fill="#b08843" text-anchor="middle">shuffle</text>
  <text x="530" y="318" font-size="8" fill="#b08843" text-anchor="middle">(宽依赖=边界)</text>

  <!-- stage 2 -->
  <rect x="554" y="208" width="440" height="150" rx="12" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="774" y="228" font-size="10.5" font-weight="700" fill="#1b2a4a" text-anchor="middle">Stage 1（ResultStage）</text>
  <g text-anchor="middle" font-size="8">
    <rect x="574" y="240" width="130" height="34" rx="7" fill="#e9f1fb" stroke="#c4d8f0"/><text x="639" y="256" fill="#1b2a4a">reduce 端聚合</text><text x="639" y="268" fill="#5b7db1">(shuffle read)</text>
    <rect x="724" y="240" width="90" height="34" rx="7" fill="#fff" stroke="#bcd0ec"/><text x="769" y="261" fill="#1b2a4a">reduceByKey</text>
    <rect x="834" y="240" width="140" height="34" rx="7" fill="#fff" stroke="#bcd0ec"/><text x="904" y="261" fill="#1b2a4a">collect → 结果</text>
  </g>
  <text x="774" y="296" font-size="8.5" fill="#5b7db1" text-anchor="middle">从 Stage 0 的 shuffle 输出拉数据、按 key 聚合</text>
  <text x="774" y="316" font-size="8.5" fill="#8aa6cf" text-anchor="middle">task 数 = shuffle 分区数（spark.sql.shuffle.partitions / partitioner）</text>
  <text x="774" y="340" font-size="8" fill="#8aa6cf" text-anchor="middle">ResultTask 产最终结果回 driver</text>

  <g stroke="#f0a020" stroke-width="1.6" fill="none"><line x1="506" y1="283" x2="554" y2="283" marker-end="url(#ar)"/></g>

  <rect x="40" y="434" width="980" height="90" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="458" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="480" font-size="10" fill="#4b4b50">一个 action 触发一个 job；DAGScheduler 沿 RDD 依赖，在每个 shuffle（宽依赖）处切一个 stage 边界、连续窄依赖折进</text>
  <text x="60" y="498" font-size="10" fill="#4b4b50">同一 stage 流水线；每个 stage 按其 RDD 分区数拆成并行 task，交 executor 执行。这套 job→stage→task 是 Spark 一切执行的骨架。</text>
  <text x="60" y="516" font-size="9" fill="#8a8a8f">RDD/DataFrame/SQL/Streaming 上层不同，最终都编译到这套模型（DataFrame/SQL 先过 Catalyst+Tungsten）。</text>
</svg>
