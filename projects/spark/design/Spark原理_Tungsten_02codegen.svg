<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="560" viewBox="0 0 1060 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">whole-stage codegen：一个 stage 的算子融合成一个 Java 函数</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">WholeStageCodegenExec.scala:643 · produce(:94)/consume(:352) 模型 · 开关 spark.sql.codegen.wholeStage（默认开）</text>

  <!-- before: separate operators -->
  <rect x="40" y="76" width="470" height="180" rx="13" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="275" y="100" font-size="11" font-weight="700" fill="#7a2230" text-anchor="middle">❌ 传统 Volcano：算子各自迭代</text>
  <g text-anchor="middle" font-size="8">
    <rect x="60" y="116" width="120" height="40" rx="7" fill="#fff" stroke="#f0cdd4"/><text x="120" y="132" fill="#7a2230">Scan.next</text><text x="120" y="146" fill="#a44">迭代器</text>
    <rect x="200" y="116" width="120" height="40" rx="7" fill="#fff" stroke="#f0cdd4"/><text x="260" y="132" fill="#7a2230">Filter.next</text><text x="260" y="146" fill="#a44">迭代器</text>
    <rect x="340" y="116" width="120" height="40" rx="7" fill="#fff" stroke="#f0cdd4"/><text x="400" y="132" fill="#7a2230">Project.next</text><text x="400" y="146" fill="#a44">迭代器</text>
  </g>
  <g stroke="#f0cdd4" stroke-width="1.4" fill="none">
    <line x1="180" y1="136" x2="200" y2="136" marker-end="url(#ar)"/>
    <line x1="320" y1="136" x2="340" y2="136" marker-end="url(#ar)"/>
  </g>
  <text x="275" y="182" font-size="9" fill="#a44">每行经每算子一次虚函数 next 调用</text>
  <text x="275" y="202" font-size="8.5" fill="#7a2230">虚调用开销大、分支预测差、行对象在算子间传</text>
  <text x="275" y="222" font-size="8.5" fill="#a44">CPU 大量时间花在"调度"而非"计算"</text>
  <text x="275" y="242" font-size="8" fill="#a44">受解释执行开销限制</text>

  <!-- after: fused -->
  <rect x="550" y="76" width="470" height="180" rx="13" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="785" y="100" font-size="11" font-weight="700" fill="#12402a" text-anchor="middle">✓ whole-stage：融成一个函数</text>
  <rect x="570" y="116" width="430" height="70" rx="8" fill="#fff" stroke="#bfe0cd"/>
  <text x="785" y="136" font-size="8.5" font-weight="600" fill="#12402a" text-anchor="middle">生成的 Java 函数（内联所有算子）</text>
  <text x="590" y="156" font-size="8" fill="#2f6f4f" font-family="monospace">while (scan.hasNext) {</text>
  <text x="600" y="170" font-size="8" fill="#2f6f4f" font-family="monospace">row=scan; if(filter(row)) emit(project(row));</text>
  <text x="590" y="182" font-size="8" fill="#2f6f4f" font-family="monospace">}</text>
  <text x="785" y="206" font-size="9" fill="#2f6f4f">无虚函数、无迭代器边界，数据在寄存器流转</text>
  <text x="785" y="226" font-size="8.5" fill="#4c8567">CPU 直线执行，分支预测友好</text>
  <text x="785" y="244" font-size="8" fill="#4c8567">效率接近手写代码</text>

  <!-- produce-consume -->
  <rect x="40" y="270" width="980" height="110" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="294" font-size="11" font-weight="700" fill="#274a78">produce-consume 模型（CodegenSupport, WholeStageCodegenExec.scala:47）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="60" y="308" width="280" height="46" rx="8" fill="#fff" stroke="#cfe0f2"/><text x="200" y="328" font-weight="600" fill="#274a78">produce（:94）自顶向下</text><text x="200" y="344" fill="#5b7db1">根算子问下游"你要数据吗"→ 驱动数据源</text>
    <rect x="360" y="308" width="280" height="46" rx="8" fill="#fff" stroke="#cfe0f2"/><text x="500" y="328" font-weight="600" fill="#274a78">doConsume（:352）自底向上</text><text x="500" y="344" fill="#5b7db1">拿到一行 → 生成"怎么处理这行"的内联代码</text>
    <rect x="660" y="308" width="340" height="46" rx="8" fill="#f2fbf6" stroke="#cdeadb"/><text x="830" y="328" font-weight="600" fill="#12402a">拼成一个紧凑循环</text><text x="830" y="344" fill="#2f6f4f">InputAdapter(:511) 隔断不支持 codegen 的算子</text>
  </g>

  <rect x="40" y="392" width="980" height="76" rx="13" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="60" y="416" font-size="11" font-weight="700" fill="#7a5a1e">安全回退</text>
  <text x="60" y="438" font-size="9.5" fill="#93762e">· 生成代码超 JVM 方法大小限制（64KB，超宽表可能触发）→ 回落 child.execute（:749）迭代器</text>
  <text x="60" y="456" font-size="9.5" fill="#93762e">· codegen 编译失败 → 同样回落，保正确性；UDF 常打断 whole-stage（插 InputAdapter）</text>

  <rect x="40" y="480" width="980" height="60" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="504" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="526" font-size="10" fill="#4b4b50">whole-stage codegen 把一个 stage 的连续算子（经 produce-consume 模型）融合成一个无虚调用的 Java 函数，数据在寄存器流转——把 Volcano 的逐行虚调用变成直线代码；超方法大小或含 UDF 时安全回落迭代器。</text>
</svg>
