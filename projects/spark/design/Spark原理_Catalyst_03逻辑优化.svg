<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="560" viewBox="0 0 1060 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">逻辑优化：规则驱动的等价改写，减少要算的数据与算子</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">Optimizer (optimizer/Optimizer.scala:51, defaultBatches:100) · TreeNode.transform 改写 · RuleExecutor 分批到不动点</text>

  <!-- rules grid -->
  <g text-anchor="middle">
    <rect x="40" y="76" width="235" height="96" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
    <text x="157" y="98" font-size="10.5" font-weight="700" fill="#12402a">PushDownPredicates</text>
    <text x="157" y="118" font-size="8.5" fill="#2f6f4f">谓词下推：过滤尽早做</text>
    <text x="157" y="136" font-size="8.5" fill="#2f6f4f">WHERE 穿过 join 下到扫描</text>
    <text x="157" y="156" font-size="8" fill="#4c8567">Optimizer.scala:2092 · 少读行</text>

    <rect x="290" y="76" width="235" height="96" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
    <text x="407" y="98" font-size="10.5" font-weight="700" fill="#12402a">ColumnPruning</text>
    <text x="407" y="118" font-size="8.5" fill="#2f6f4f">列裁剪：只读用到的列</text>
    <text x="407" y="136" font-size="8.5" fill="#2f6f4f">列存下省大量 IO</text>
    <text x="407" y="156" font-size="8" fill="#4c8567">Optimizer.scala:1089 · 少读列</text>

    <rect x="540" y="76" width="235" height="96" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
    <text x="657" y="98" font-size="10.5" font-weight="700" fill="#12402a">ConstantFolding</text>
    <text x="657" y="118" font-size="8.5" fill="#2f6f4f">常量折叠：1+1→2</text>
    <text x="657" y="136" font-size="8.5" fill="#2f6f4f">编译期算掉常量表达式</text>
    <text x="657" y="156" font-size="8" fill="#4c8567">expressions.scala:50 · 少算</text>

    <rect x="790" y="76" width="230" height="96" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
    <text x="905" y="98" font-size="10.5" font-weight="700" fill="#12402a">投影穿透 / 算子合并</text>
    <text x="905" y="118" font-size="8.5" fill="#2f6f4f">PushProjectionThroughLimit</text>
    <text x="905" y="136" font-size="8.5" fill="#2f6f4f">CollapseProject/CombineFilters</text>
    <text x="905" y="156" font-size="8" fill="#4c8567">…几十条规则</text>
  </g>

  <!-- how rules apply -->
  <rect x="40" y="196" width="480" height="150" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="280" y="220" font-size="11" font-weight="700" fill="#274a78" text-anchor="middle">规则如何应用</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="60" y="234" width="200" height="44" rx="8" fill="#fff" stroke="#cfe0f2"/><text x="160" y="254" font-weight="600" fill="#274a78">TreeNode.transform（:438）</text><text x="160" y="270" fill="#5b7db1">模式匹配递归改写树</text>
    <rect x="280" y="234" width="220" height="44" rx="8" fill="#fff" stroke="#cfe0f2"/><text x="390" y="254" font-weight="600" fill="#274a78">RuleExecutor 分批（:125）</text><text x="390" y="270" fill="#5b7db1">Batch = 一组规则 + 迭代策略</text>
  </g>
  <text x="280" y="300" font-size="9" fill="#5b7db1">Once（跑一次）/ FixedPoint（跑到计划不再变）</text>
  <text x="280" y="320" font-size="8.5" fill="#8aa6cf">规则可插拔、可组合——加优化 = 加 Rule</text>
  <text x="280" y="338" font-size="8" fill="#8aa6cf">rules/RuleExecutor.scala:150(Once)/:156(FixedPoint)</text>

  <!-- before/after example -->
  <rect x="540" y="196" width="480" height="150" rx="13" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="780" y="220" font-size="11" font-weight="700" fill="#7a5a1e" text-anchor="middle">效果：改写前 → 改写后</text>
  <text x="560" y="244" font-size="8.5" fill="#93762e" font-family="monospace">SELECT a FROM t JOIN s WHERE t.x=1</text>
  <text x="560" y="264" font-size="8" fill="#b08843">↓ 谓词下推 + 列裁剪</text>
  <text x="560" y="286" font-size="8.5" fill="#93762e" font-family="monospace">t 先过滤 x=1（少读行）</text>
  <text x="560" y="304" font-size="8.5" fill="#93762e" font-family="monospace">t/s 只读 a 及 join key（少读列）</text>
  <text x="560" y="326" font-size="8" fill="#b08843">再做 join——扫描量骤降，结果不变</text>

  <rect x="40" y="362" width="980" height="90" rx="13" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="386" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="408" font-size="10" fill="#4b4b50">逻辑优化在逻辑计划上跑几十条等价改写规则（谓词下推、列裁剪、常量折叠、算子合并），减少要读的数据与要算的算子。</text>
  <text x="60" y="426" font-size="10" fill="#4b4b50">规则用 TreeNode.transform 模式匹配改写、RuleExecutor 分批到不动点执行；不改结果、只改"读多少算多少"。</text>
  <text x="60" y="444" font-size="9" fill="#8a8a8f">规则可插拔是 Catalyst 可扩展性核心——用 df.explain(true) 看优化前后计划。</text>
</svg>
