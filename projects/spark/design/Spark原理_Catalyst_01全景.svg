<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="560" viewBox="0 0 1060 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Catalyst 四阶段：分析 → 逻辑优化 → 物理规划 → CBO</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">统一树变换框架（TreeNode + Rule + RuleExecutor）· 只服务结构化 API，RDD 不过</text>

  <!-- pipeline -->
  <g text-anchor="middle">
    <rect x="30" y="80" width="150" height="70" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/><text x="105" y="106" font-size="10" font-weight="600" fill="#3d2a5a">parser 产出</text><text x="105" y="124" font-size="8" fill="#7a5da5">未解析逻辑计划</text><text x="105" y="140" font-size="8" fill="#9a7cc4">UnresolvedRelation</text>
    <rect x="210" y="80" width="160" height="70" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="290" y="102" font-size="10" font-weight="600" fill="#1b2a4a">① 分析 Analyzer</text><text x="290" y="120" font-size="8" fill="#5b7db1">解析名称/类型/函数</text><text x="290" y="136" font-size="8" fill="#8aa6cf">:363 · analyzed 计划</text>
    <rect x="400" y="80" width="160" height="70" rx="12" fill="#e9f1fb" stroke="#c4d8f0" filter="url(#soft)"/><text x="480" y="102" font-size="10" font-weight="600" fill="#1b2a4a">② 逻辑优化</text><text x="480" y="120" font-size="8" fill="#5b7db1">规则改写（下推/裁剪）</text><text x="480" y="136" font-size="8" fill="#8aa6cf">Optimizer:51</text>
    <rect x="590" y="80" width="160" height="70" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="670" y="102" font-size="10" font-weight="600" fill="#12402a">③ 物理规划</text><text x="670" y="120" font-size="8" fill="#2f6f4f">逻辑算子→物理算子</text><text x="670" y="136" font-size="8" fill="#4c8567">SparkPlanner:31</text>
    <rect x="780" y="80" width="160" height="70" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="860" y="102" font-size="10" font-weight="600" fill="#12402a">④ CBO</text><text x="860" y="120" font-size="8" fill="#2f6f4f">代价选择/Join 重排</text><text x="860" y="136" font-size="8" fill="#4c8567">默认关</text>
    <rect x="960" y="80" width="70" height="70" rx="12" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/><text x="995" y="110" font-size="9" font-weight="600" fill="#5a3410">交</text><text x="995" y="128" font-size="8" fill="#93762e">Tungsten</text><text x="995" y="142" font-size="8" fill="#b08843">codegen</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <line x1="180" y1="115" x2="210" y2="115" marker-end="url(#ar)"/>
    <line x1="370" y1="115" x2="400" y2="115" marker-end="url(#ar)"/>
    <line x1="560" y1="115" x2="590" y2="115" marker-end="url(#ar)"/>
    <line x1="750" y1="115" x2="780" y2="115" marker-end="url(#ar)"/>
    <line x1="940" y1="115" x2="960" y2="115" marker-end="url(#ar)"/>
  </g>

  <!-- logical vs physical -->
  <rect x="40" y="180" width="480" height="130" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="280" y="204" font-size="11" font-weight="700" fill="#1b2a4a" text-anchor="middle">逻辑计划（做什么）</text>
  <text x="60" y="228" font-size="9" fill="#5b7db1">· 描述查询语义：读哪些表、什么过滤、怎么聚合</text>
  <text x="60" y="248" font-size="9" fill="#5b7db1">· 分析 + 逻辑优化在此层做（等价改写）</text>
  <text x="60" y="268" font-size="9" fill="#5b7db1">· 一个逻辑 Join 不指定具体实现方式</text>
  <text x="60" y="290" font-size="8.5" fill="#8aa6cf">· 与执行引擎无关的"意图"</text>

  <rect x="540" y="180" width="480" height="130" rx="13" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="780" y="204" font-size="11" font-weight="700" fill="#12402a" text-anchor="middle">物理计划（怎么做）</text>
  <text x="560" y="228" font-size="9" fill="#2f6f4f">· 每个逻辑算子选具体物理实现</text>
  <text x="560" y="248" font-size="9" fill="#2f6f4f">· Join：broadcast / sort-merge / shuffle-hash</text>
  <text x="560" y="268" font-size="9" fill="#2f6f4f">· CBO/统计辅助选择</text>
  <text x="560" y="290" font-size="8.5" fill="#4c8567">· 产物 SparkPlan → Tungsten codegen → 执行</text>

  <!-- unified framework note -->
  <rect x="40" y="326" width="980" height="76" rx="13" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="60" y="350" font-size="11" font-weight="700" fill="#3d2a5a">统一树变换框架（贯穿四阶段）</text>
  <text x="60" y="372" font-size="9.5" fill="#7a5da5">· 所有计划/表达式都是 TreeNode；所有优化都是 Rule；RuleExecutor 把 Rule 分批到不动点执行（详见机制图）</text>
  <text x="60" y="390" font-size="9" fill="#9a7cc4">· 加一条优化 = 写一个 Rule 加进 batch——Catalyst 可扩展性的核心</text>

  <rect x="40" y="418" width="980" height="90" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="442" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="464" font-size="10" fill="#4b4b50">Catalyst 四阶段把结构化查询从用户逻辑优化成高效物理执行：分析解析→逻辑优化改写→物理规划选算子→CBO 代价重排，</text>
  <text x="60" y="482" font-size="10" fill="#4b4b50">全程建立在 TreeNode+Rule+RuleExecutor 的统一树变换框架上。只服务 DataFrame/SQL（有 schema），RDD 不过。</text>
  <text x="60" y="500" font-size="9" fill="#8a8a8f">产物 SparkPlan 交 Tungsten whole-stage codegen 编译成 Java 函数再执行（见 Tungsten 主线）。</text>
</svg>
