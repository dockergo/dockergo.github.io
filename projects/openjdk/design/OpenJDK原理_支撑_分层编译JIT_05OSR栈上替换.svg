<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="486" viewBox="0 0 1040 486" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="os_s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="os_g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="os_b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
    <marker id="os_m" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8a5a1a"/></marker>
  </defs>
  <rect width="1040" height="486" fill="#fbfbfd"/>
  <text x="24" y="30" font-size="14" font-weight="700" fill="#1d1d1f">OSR 栈上替换 · 让"跑到一半的长循环"当场换成编译码</text>
  <text x="24" y="49" font-size="10" fill="#6e6e73">方法迟迟不返回、却有个百万次热循环时，普通"下次调用才升级"帮不上；OSR 在循环回边把正在执行的解释帧就地换成编译帧</text>

  <!-- legend -->
  <g font-size="9.5">
    <rect x="24" y="60" width="12" height="12" rx="3" fill="#f5faf6" stroke="#cfe6d2"/><text x="41" y="70" fill="#3a3a3c">执行·计数</text>
    <rect x="140" y="60" width="12" height="12" rx="3" fill="#f6f8fc" stroke="#cfe0f2"/><text x="157" y="70" fill="#3a3a3c">编译派发·控制</text>
    <rect x="276" y="60" width="12" height="12" rx="3" fill="#faf3ea" stroke="#ecdcbf"/><text x="293" y="70" fill="#3a3a3c">栈帧·搬运</text>
    <rect x="392" y="60" width="12" height="12" rx="3" fill="#fbeeee" stroke="#e0b4b0"/><text x="409" y="70" fill="#3a3a3c">与 deopt 反向对照</text>
  </g>

  <!-- pipeline -->
  <g>
    <rect x="24" y="88" width="226" height="118" rx="11" fill="#f5faf6" stroke="#cfe6d2" filter="url(#os_s)"/>
    <text x="40" y="110" font-size="11" font-weight="700" fill="#1d8f3f">① 解释执行热循环</text>
    <text x="40" y="130" font-size="9" fill="#1c6b45">每跨一次循环回边，</text>
    <text x="40" y="146" font-size="9" fill="#1c6b45">回边计数器 backedge +1。</text>
    <text x="40" y="168" font-size="9" fill="#3a3a3c">超阈 → 从模板里陷入</text>
    <text x="40" y="184" font-size="9" fill="#3a3a3c">frequency_counter_overflow</text>
    <text x="40" y="200" font-size="8.5" fill="#9a9aa0">带上 branch_bcp（回边位置）</text>

    <rect x="274" y="88" width="226" height="118" rx="11" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#os_s)"/>
    <text x="290" y="110" font-size="11" font-weight="700" fill="#5b7db1">② 策略请求 OSR</text>
    <text x="290" y="130" font-size="9" fill="#1b2a4a">CompilationPolicy 收 loop</text>
    <text x="290" y="146" font-size="9" fill="#1b2a4a">事件，算出目标级别。</text>
    <text x="290" y="168" font-size="9" fill="#3a3a3c">发起 OSR 编译请求，</text>
    <text x="290" y="184" font-size="9" fill="#3a3a3c">锚点是 osr_bci =</text>
    <text x="290" y="200" font-size="9" fill="#3a3a3c">循环入口那条字节码。</text>

    <rect x="524" y="88" width="226" height="118" rx="11" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#os_s)"/>
    <text x="540" y="110" font-size="11" font-weight="700" fill="#5b7db1">③ 异步编 OSR 码</text>
    <text x="540" y="130" font-size="9" fill="#1b2a4a">CompileBroker 后台线程</text>
    <text x="540" y="146" font-size="9" fill="#1b2a4a">编译一个 OSR nmethod。</text>
    <text x="540" y="168" font-size="9" fill="#3a3a3c">它有专门的 osr_entry：</text>
    <text x="540" y="184" font-size="9" fill="#3a3a3c">专为"从循环中段进入"</text>
    <text x="540" y="200" font-size="9" fill="#3a3a3c">而非方法开头设计。</text>

    <rect x="774" y="88" width="226" height="118" rx="11" fill="#faf3ea" stroke="#ecdcbf" filter="url(#os_s)"/>
    <text x="790" y="110" font-size="11" font-weight="700" fill="#8a5a1a">④ 回边处热切换</text>
    <text x="790" y="130" font-size="9" fill="#3a3a3c">回边再触发 →</text>
    <text x="790" y="146" font-size="9" fill="#3a3a3c">lookup_osr_nmethod_for</text>
    <text x="790" y="162" font-size="9" fill="#3a3a3c">命中已编好的 OSR 码。</text>
    <text x="790" y="184" font-size="9" fill="#1d8f3f">迁移栈帧后从 osr_entry</text>
    <text x="790" y="200" font-size="9" fill="#1d8f3f">继续跑（不等方法返回）</text>
  </g>
  <line x1="250" y1="147" x2="274" y2="147" stroke="#2f9e6e" stroke-width="1.4" marker-end="url(#os_g)"/>
  <line x1="500" y1="147" x2="524" y2="147" stroke="#5b7db1" stroke-width="1.4" marker-end="url(#os_b)"/>
  <line x1="750" y1="147" x2="774" y2="147" stroke="#5b7db1" stroke-width="1.4" marker-end="url(#os_b)"/>

  <!-- 帧迁移细节 -->
  <rect x="24" y="222" width="976" height="118" rx="12" fill="#fbfbfd" stroke="#e2e2e7"/>
  <text x="40" y="244" font-size="11" font-weight="600" fill="#8a5a1a">栈帧迁移：把"活着的值"从解释帧逐槽搬进编译帧</text>
  <g text-anchor="middle">
    <rect x="60" y="258" width="300" height="66" rx="9" fill="#f5faf6" stroke="#cfe6d2" filter="url(#os_s)"/>
    <text x="210" y="278" font-size="9.5" font-weight="700" fill="#1d8f3f">解释帧（迁移前）</text>
    <text x="210" y="298" font-size="9" fill="#1c6b45">locals + 操作数栈 + bcp（停在回边）</text>
    <text x="210" y="314" font-size="8.5" fill="#3a3a3c">值都摊在栈内存里</text>
    <rect x="640" y="258" width="300" height="66" rx="9" fill="#faf3ea" stroke="#ecdcbf" filter="url(#os_s)"/>
    <text x="790" y="278" font-size="9.5" font-weight="700" fill="#8a5a1a">OSR 编译帧（迁移后）</text>
    <text x="790" y="298" font-size="9" fill="#3a3a3c">C1/C2 的寄存器 + 栈布局</text>
    <text x="790" y="314" font-size="8.5" fill="#3a3a3c">从 osr_entry 恢复执行</text>
  </g>
  <line x1="360" y1="291" x2="640" y2="291" stroke="#8a5a1a" stroke-width="1.6" marker-end="url(#os_m)"/>
  <text x="500" y="284" font-size="9" fill="#8a5a1a" text-anchor="middle">按 osr_bci 对齐执行位置</text>
  <text x="500" y="308" font-size="8.5" fill="#9a9aa0" text-anchor="middle">逐槽搬运局部变量与操作数栈里的活跃值</text>

  <!-- 对照 -->
  <rect x="24" y="356" width="976" height="112" rx="12" fill="#fbeeee" stroke="#e0b4b0"/>
  <text x="40" y="377" font-size="10.5" font-weight="600" fill="#b0413e">两组对照，抓住 OSR 的定位</text>
  <text x="40" y="398" font-size="9" fill="#3a3a3c"><tspan font-weight="700">vs 普通编译</tspan>：普通编译"下次调用整方法才用新码"；OSR 针对"正在跑、可能永不返回的长循环"，当场从中段切入——入口点与触发方式都不同。</text>
  <text x="40" y="418" font-size="9" fill="#3a3a3c"><tspan font-weight="700">vs 去优化 deopt</tspan>：方向正相反。OSR = 解释帧 → 编译帧（升级提速）；deopt = 编译帧 → 解释帧（投机失败回退）。</text>
  <text x="40" y="438" font-size="9" fill="#3a3a3c">两者都要做"栈帧格式转换 + 执行位置精确对齐"，共享同一套帧描述（ScopeDesc / 活跃变量映射）基础设施，只是搬运方向相反。</text>
  <text x="40" y="458" font-size="8.5" fill="#9a9aa0">补图价值：分层升级链原本只覆盖"高频短方法型热点"，OSR 补上"长循环型热点"，两者互补才让分层编译无死角。</text>
</svg>
