<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="470" viewBox="0 0 1000 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="jh_s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="jh_b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
    <marker id="jh_g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="jh_p" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8a5cae"/></marker>
  </defs>
  <rect width="1000" height="470" fill="#fbfbfd"/>
  <text x="24" y="30" font-size="14" font-weight="700" fill="#1d1d1f">JNI 句柄机制 · native 永远拿不到裸 oop，只握一层「间接句柄」</text>
  <text x="24" y="49" font-size="10" fill="#6e6e73">移动式 GC 会搬迁对象、地址随时变；裸 oop 交给 native 一次 GC 后即成野指针，故隔一层句柄</text>

  <!-- 图例 -->
  <g font-size="9">
    <rect x="640" y="20" width="12" height="12" rx="3" fill="#f4eefb" stroke="#d9c9ef"/><text x="656" y="30" fill="#6f3ea8">紫 native 边界</text>
    <rect x="748" y="20" width="12" height="12" rx="3" fill="#f6f8fc" stroke="#cfe0f2"/><text x="764" y="30" fill="#5b7db1">蓝 句柄存储</text>
    <rect x="856" y="20" width="12" height="12" rx="3" fill="#faf3ea" stroke="#ecdcbf"/><text x="872" y="30" fill="#8a5a1a">琥珀 堆 oop</text>
  </g>

  <!-- native 世界 -->
  <rect x="24" y="70" width="210" height="150" rx="12" fill="#f4eefb" stroke="#d9c9ef" filter="url(#jh_s)"/>
  <text x="129" y="94" font-size="11" font-weight="700" fill="#6f3ea8" text-anchor="middle">native (C/C++) 世界</text>
  <text x="129" y="118" font-size="9.5" fill="#3a3a3c" text-anchor="middle">手持 jobject / jclass</text>
  <text x="129" y="134" font-size="9.5" fill="#3a3a3c" text-anchor="middle">jstring …</text>
  <rect x="44" y="150" width="170" height="52" rx="9" fill="#fff" stroke="#d9c9ef"/>
  <text x="129" y="171" font-size="9" fill="#6f3ea8" text-anchor="middle">= 不透明句柄值</text>
  <text x="129" y="189" font-size="8.5" fill="#9a9aa0" text-anchor="middle">非对象真实地址</text>

  <!-- 间接层 -->
  <rect x="292" y="70" width="360" height="150" rx="12" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="308" y="90" font-size="11" font-weight="600" fill="#5b7db1">间接层 · 三类句柄存储（VM 侧持真实 oop）</text>
  <g text-anchor="middle">
    <rect x="304" y="102" width="110" height="104" rx="9" fill="#fff" stroke="#cfe0f2" filter="url(#jh_s)"/>
    <text x="359" y="122" font-size="9.5" font-weight="700" fill="#1b2a4a">local 本地</text>
    <text x="359" y="140" font-size="8" fill="#6e6e73">绑当前调用帧</text>
    <text x="359" y="156" font-size="8" fill="#6e6e73">JNIHandleBlock</text>
    <text x="359" y="176" font-size="8" fill="#2f9e6e">返回自动批释放</text>
    <text x="359" y="194" font-size="8" fill="#6e6e73">是 GC 根</text>
    <rect x="420" y="102" width="110" height="104" rx="9" fill="#fff" stroke="#cfe0f2" filter="url(#jh_s)"/>
    <text x="475" y="122" font-size="9.5" font-weight="700" fill="#1b2a4a">global 全局</text>
    <text x="475" y="140" font-size="8" fill="#6e6e73">跨调用长存</text>
    <text x="475" y="156" font-size="8" fill="#6e6e73">OopStorage</text>
    <text x="475" y="176" font-size="8" fill="#b0413e">须手动 destroy</text>
    <text x="475" y="194" font-size="8" fill="#6e6e73">是 GC 根</text>
    <rect x="536" y="102" width="110" height="104" rx="9" fill="#fff" stroke="#cfe0f2" filter="url(#jh_s)"/>
    <text x="591" y="122" font-size="9.5" font-weight="700" fill="#1b2a4a">weak 弱全局</text>
    <text x="591" y="140" font-size="8" fill="#6e6e73">跨调用不保命</text>
    <text x="591" y="156" font-size="8" fill="#6e6e73">独立 OopStorage</text>
    <text x="591" y="176" font-size="8" fill="#8a5a1a">不阻止回收</text>
    <text x="591" y="194" font-size="8" fill="#6e6e73">弱引用</text>
  </g>

  <!-- Java 堆 -->
  <rect x="710" y="70" width="266" height="150" rx="12" fill="#faf3ea" stroke="#ecdcbf" filter="url(#jh_s)"/>
  <text x="843" y="94" font-size="11" font-weight="700" fill="#8a5a1a" text-anchor="middle">Java 堆</text>
  <rect x="732" y="110" width="100" height="60" rx="9" fill="#fff" stroke="#ecdcbf"/>
  <text x="782" y="136" font-size="9.5" fill="#8a5a1a" text-anchor="middle">oop 实例</text>
  <text x="782" y="154" font-size="8" fill="#9a9aa0" text-anchor="middle">地址 0x…A</text>
  <rect x="854" y="110" width="100" height="60" rx="9" fill="#fdf6ec" stroke="#ecdcbf" stroke-dasharray="4 3"/>
  <text x="904" y="136" font-size="9.5" fill="#8a5a1a" text-anchor="middle">GC 搬迁后</text>
  <text x="904" y="154" font-size="8" fill="#9a9aa0" text-anchor="middle">地址 0x…B</text>
  <line x1="832" y1="140" x2="854" y2="140" stroke="#8a5a1a" stroke-width="1.3" marker-end="url(#jh_p)"/>
  <text x="843" y="192" font-size="8" fill="#9a9aa0" text-anchor="middle">对象会移动</text>

  <!-- 连线 -->
  <line x1="234" y1="176" x2="292" y2="150" stroke="#8a5cae" stroke-width="1.4" marker-end="url(#jh_p)"/>
  <text x="263" y="150" font-size="8" fill="#8a5cae" text-anchor="middle">句柄值</text>
  <line x1="652" y1="150" x2="710" y2="140" stroke="#5b7db1" stroke-width="1.4" marker-end="url(#jh_b)"/>
  <text x="681" y="130" font-size="8" fill="#5b7db1" text-anchor="middle">存真实 oop</text>
  <line x1="710" y1="176" x2="652" y2="196" stroke="#2f9e6e" stroke-width="1.4" marker-end="url(#jh_g)"/>
  <text x="681" y="205" font-size="8" fill="#2f9e6e" text-anchor="middle">resolve 取值（仅 in_vm）</text>

  <!-- 核心不变量 banner -->
  <rect x="24" y="238" width="952" height="66" rx="12" fill="#f5faf6" stroke="#cfe6d2"/>
  <text x="40" y="262" font-size="10.5" font-weight="700" fill="#1d8f3f">核心不变量 · 空间间接解耦</text>
  <text x="40" y="284" font-size="9.5" fill="#3a3a3c">GC 扫根时遍历这些句柄存储、更新其中的 oop —— 对象移动了、存储里的 oop 随之改写，</text>
  <text x="40" y="299" font-size="9.5" fill="#3a3a3c">而 native 手里的<tspan font-weight="700" fill="#6f3ea8">句柄值纹丝不动</tspan>；取真实 oop 必走 resolve，且只能在 in_vm 状态下短暂使用。</text>

  <!-- Critical 区 -->
  <rect x="24" y="320" width="952" height="128" rx="12" fill="#fbfbfd" stroke="#e2e2e7"/>
  <text x="40" y="342" font-size="11" font-weight="600" fill="#1d1d1f">Critical 区 · 省拷贝的例外（代价是临时 pin 住对象）</text>
  <g text-anchor="middle">
    <rect x="60" y="356" width="200" height="72" rx="9" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#jh_s)"/>
    <text x="160" y="378" font-size="9.5" font-weight="600" fill="#1b2a4a">GetPrimitiveArrayCritical</text>
    <text x="160" y="396" font-size="8.5" fill="#6e6e73">直接给底层内存指针</text>
    <text x="160" y="412" font-size="8.5" fill="#6e6e73">不拷贝</text>
    <rect x="400" y="356" width="200" height="72" rx="9" fill="#faf3ea" stroke="#ecdcbf" filter="url(#jh_s)"/>
    <text x="500" y="378" font-size="9.5" font-weight="600" fill="#8a5a1a">区间内 pin 对象</text>
    <text x="500" y="396" font-size="8.5" fill="#6e6e73">实质禁止 GC 移动它</text>
    <text x="500" y="412" font-size="8.5" fill="#6e6e73">须尽快 Release（成对）</text>
    <rect x="740" y="356" width="200" height="72" rx="9" fill="#fbeeed" stroke="#f0cfca" filter="url(#jh_s)"/>
    <text x="840" y="378" font-size="9.5" font-weight="600" fill="#b0413e">误用后果</text>
    <text x="840" y="396" font-size="8.5" fill="#6e6e73">区内调可触发 GC 的</text>
    <text x="840" y="412" font-size="8.5" fill="#6e6e73">JNI 函数 → 停顿/死锁</text>
  </g>
  <line x1="260" y1="392" x2="400" y2="392" stroke="#5b7db1" stroke-width="1.3" marker-end="url(#jh_b)"/>
  <line x1="600" y1="392" x2="740" y2="392" stroke="#5b7db1" stroke-width="1.3" marker-end="url(#jh_b)"/>
</svg>
