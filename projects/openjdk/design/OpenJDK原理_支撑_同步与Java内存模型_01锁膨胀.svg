<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="640" viewBox="0 0 1040 640" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="s2" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="a1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
    <marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="a3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#d38236"/></marker>
    <marker id="a4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c0392b"/></marker>
  </defs>
  <rect width="1040" height="640" fill="#fbfbfd"/>
  <text x="24" y="30" font-size="14" font-weight="700" fill="#1d1d1f">synchronized 锁膨胀 · 无锁 → 轻量级锁(LockStack) → 竞争膨胀为 ObjectMonitor 重量级锁</text>
  <text x="24" y="49" font-size="10" fill="#6e6e73">markWord 低 2 位复用为锁位：01=无锁 / 00=轻量(oop 记在线程私有持锁栈) / 10=膨胀(指向 ObjectMonitor)。JDK 28 已删除偏向锁与 LockingMode/UseHeavyMonitors 开关。</text>

  <!-- 状态一：无锁 -->
  <rect x="40" y="90" width="250" height="118" rx="13" fill="#f5faf6" stroke="#cfe6d2" filter="url(#s2)"/>
  <text x="165" y="116" font-size="12" font-weight="700" fill="#1d8f3f" text-anchor="middle">① 无锁 unlocked</text>
  <text x="165" y="136" font-size="9" fill="#6e6e73" text-anchor="middle">对象刚分配 / 未被 synchronized</text>
  <rect x="60" y="150" width="210" height="42" rx="8" fill="#fff" stroke="#cfe6d2"/>
  <text x="165" y="168" font-size="9.5" font-weight="600" fill="#1c6b45" text-anchor="middle">markWord = [hash:31 | age:4 | <tspan font-weight="700">01</tspan>]</text>
  <text x="165" y="184" font-size="8" fill="#6e6e73" text-anchor="middle">prototype() 初值即 unlocked_value</text>

  <!-- 状态二：轻量级锁 -->
  <rect x="395" y="90" width="270" height="118" rx="13" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#s2)"/>
  <text x="530" y="116" font-size="12" font-weight="700" fill="#3b6cb0" text-anchor="middle">② 轻量级锁 fast-locked</text>
  <text x="530" y="136" font-size="9" fill="#6e6e73" text-anchor="middle">无竞争快路径 · 全程无内核态陷入</text>
  <rect x="415" y="150" width="230" height="42" rx="8" fill="#fff" stroke="#cfe0f2"/>
  <text x="530" y="167" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">锁位清零为 <tspan font-weight="700">00</tspan> · oop 压入 LockStack</text>
  <text x="530" y="183" font-size="8" fill="#6e6e73" text-anchor="middle">CAPACITY=8，重入靠栈内重复计数</text>

  <!-- 状态三：重量级锁 -->
  <rect x="770" y="90" width="250" height="118" rx="13" fill="#fbeeec" stroke="#eccfc9" filter="url(#s2)"/>
  <text x="895" y="116" font-size="12" font-weight="700" fill="#c0392b" text-anchor="middle">③ 重量级锁 monitor</text>
  <text x="895" y="136" font-size="9" fill="#6e6e73" text-anchor="middle">竞争 / wait / hashCode 触发膨胀</text>
  <rect x="790" y="150" width="210" height="42" rx="8" fill="#fff" stroke="#eccfc9"/>
  <text x="895" y="167" font-size="9.5" font-weight="600" fill="#93261a" text-anchor="middle">锁位 <tspan font-weight="700">10</tspan> · 头字指向 ObjectMonitor</text>
  <text x="895" y="183" font-size="8" fill="#6e6e73" text-anchor="middle">原 markWord 位移到 monitor(displaced)</text>

  <!-- 迁移：无锁→轻量 -->
  <line x1="290" y1="149" x2="395" y2="149" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#a2)"/>
  <text x="342" y="140" font-size="8.5" font-weight="600" fill="#1d8f3f" text-anchor="middle">CAS set_fast_locked</text>
  <text x="342" y="163" font-size="7.5" fill="#6e6e73" text-anchor="middle">push oop 入栈</text>
  <!-- 迁移：轻量→重量 -->
  <line x1="665" y1="149" x2="770" y2="149" stroke="#c0392b" stroke-width="1.8" marker-end="url(#a4)"/>
  <text x="717" y="140" font-size="8.5" font-weight="600" fill="#c0392b" text-anchor="middle">inflate 膨胀</text>
  <text x="717" y="163" font-size="7.5" fill="#6e6e73" text-anchor="middle">竞争/wait/栈满</text>
  <!-- 自环：轻量重入 -->
  <path d="M470,90 C470,72 590,72 590,90" fill="none" stroke="#5b7db1" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="530" y="68" font-size="8" fill="#3b6cb0" text-anchor="middle">同线程重入 try_recursive_enter（栈内累计，≤8）</text>
  <!-- 迁移：重量→无锁(去膨胀) -->
  <path d="M895,208 C895,250 165,250 165,208" fill="none" stroke="#8a6d3b" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#a3)"/>
  <text x="530" y="245" font-size="8.5" font-weight="600" fill="#8a6d3b" text-anchor="middle">异步去膨胀 deflate_monitor：空闲且无竞争的 monitor 被回收，头字复位为 unlocked</text>

  <!-- 膨胀触发条件 -->
  <rect x="40" y="278" width="450" height="150" rx="12" fill="#fbf7ef" stroke="#ecdcbf"/>
  <text x="58" y="300" font-size="11" font-weight="700" fill="#8a6d3b">膨胀触发条件（任一即升级为 ObjectMonitor）</text>
  <text x="58" y="322" font-size="9.5" fill="#3a3a3c">• <tspan font-weight="600">真实竞争</tspan>：fast_lock_try_enter 反复 CAS 失败</text>
  <text x="58" y="342" font-size="9.5" fill="#3a3a3c">• <tspan font-weight="600">调用 wait()/notify()</tspan>：需要 _wait_set 挂起队列</text>
  <text x="58" y="362" font-size="9.5" fill="#3a3a3c">• <tspan font-weight="600">请求 identityHashCode</tspan>：无 OM 表时 hash 挤占头字</text>
  <text x="58" y="382" font-size="9.5" fill="#3a3a3c">• <tspan font-weight="600">LockStack 满（8 个）</tspan>：把栈底对象先膨胀腾位</text>
  <text x="58" y="405" font-size="8.5" fill="#9a7b3b">代价：分配 C 堆对象 + 可能 park/unpark 陷入内核，故仅在划算时才做</text>

  <!-- ObjectMonitor 结构 -->
  <rect x="510" y="278" width="510" height="150" rx="12" fill="#fbeeec" stroke="#eccfc9"/>
  <text x="528" y="300" font-size="11" font-weight="700" fill="#c0392b">ObjectMonitor 结构（重量级锁的内核）</text>
  <g text-anchor="middle">
    <rect x="528" y="312" width="150" height="48" rx="8" fill="#fff" stroke="#eccfc9"/>
    <text x="603" y="332" font-size="9.5" font-weight="600" fill="#93261a">_owner</text><text x="603" y="349" font-size="8" fill="#6e6e73">持有者 owner_id / 匿名</text>
    <rect x="690" y="312" width="150" height="48" rx="8" fill="#fff" stroke="#eccfc9"/>
    <text x="765" y="332" font-size="9.5" font-weight="600" fill="#93261a">_recursions</text><text x="765" y="349" font-size="8" fill="#6e6e73">重入计数，首入为 0</text>
    <rect x="852" y="312" width="150" height="48" rx="8" fill="#fff" stroke="#eccfc9"/>
    <text x="927" y="332" font-size="9.5" font-weight="600" fill="#93261a">_entry_list</text><text x="927" y="349" font-size="8" fill="#6e6e73">阻塞在入口的线程</text>
    <rect x="528" y="368" width="230" height="44" rx="8" fill="#fff" stroke="#eccfc9"/>
    <text x="643" y="386" font-size="9.5" font-weight="600" fill="#93261a">_wait_set</text><text x="643" y="402" font-size="8" fill="#6e6e73">wait() 挂起队列，notify 迁回 entry_list</text>
    <rect x="770" y="368" width="232" height="44" rx="8" fill="#fff" stroke="#eccfc9"/>
    <text x="886" y="386" font-size="9.5" font-weight="600" fill="#93261a">_succ / _SpinDuration</text><text x="886" y="402" font-size="8" fill="#6e6e73">继承者提示 + 自适应自旋，抑制惊群</text>
  </g>

  <!-- markWord 头字复用 -->
  <rect x="40" y="452" width="980" height="82" rx="12" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="58" y="474" font-size="11" font-weight="700" fill="#6f3ea8">markWord 头字复用（一个 64 位机器字同时承载锁 / hash / age）</text>
  <g text-anchor="middle" font-size="9">
    <rect x="58" y="486" width="150" height="36" rx="7" fill="#fff" stroke="#d9c9ef"/><text x="133" y="503" font-weight="600" fill="#5a2f8f">… | hash:31</text><text x="133" y="516" font-size="7.5" fill="#6e6e73">identity hashCode</text>
    <rect x="220" y="486" width="120" height="36" rx="7" fill="#fff" stroke="#d9c9ef"/><text x="280" y="503" font-weight="600" fill="#5a2f8f">age:4</text><text x="280" y="516" font-size="7.5" fill="#6e6e73">GC 年龄</text>
    <rect x="352" y="486" width="140" height="36" rx="7" fill="#fff" stroke="#d9c9ef"/><text x="422" y="503" font-weight="600" fill="#5a2f8f">self-fwd:1</text><text x="422" y="516" font-size="7.5" fill="#6e6e73">GC 就地转发</text>
    <rect x="504" y="486" width="150" height="36" rx="7" fill="#fbeeec" stroke="#eccfc9"/><text x="579" y="503" font-weight="600" fill="#c0392b">lock:2</text><text x="579" y="516" font-size="7.5" fill="#6e6e73">01/00/10/11</text>
  </g>
  <text x="700" y="500" font-size="8.5" fill="#3a3a3c">冲突点：一旦对象膨胀(10)，头字整体被 ObjectMonitor 指针占用，</text>
  <text x="700" y="514" font-size="8.5" fill="#3a3a3c">原 hash/age 位移(displaced)保存进 monitor，这正是 hashCode 会触发膨胀的根因。</text>

  <!-- 底注 -->
  <text x="24" y="560" font-size="8.5" fill="#9a9aa0">锚点：markWord.hpp:157-160 锁值 · :203 is_fast_locked · :211 has_monitor · :224 encode ｜ lockStack.hpp:42/46/63 ｜ objectMonitor.hpp:147/176/185/186/202</text>
  <text x="24" y="576" font-size="8.5" fill="#9a9aa0">路径：synchronizer.cpp:1789 enter → :1806 try_recursive_enter → :1825 fast_lock_try_enter → :2122 inflate_and_enter；objectMonitor.cpp:785 deflate_monitor</text>
</svg>
