<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="440" viewBox="0 0 1000 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="sp_s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="sp_b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
  </defs>
  <rect width="1000" height="440" fill="#fbfbfd"/>
  <text x="24" y="30" font-size="14" font-weight="700" fill="#1d1d1f">到达安全点 · 不同线程状态用不同机制停下（判定依据 JavaThreadState）</text>
  <text x="24" y="49" font-size="10" fill="#6e6e73">VMThread 武装每线程本地 poll → 各线程按自身状态各自停在安全位置；JDK 9+ 本地 poll 是 handshake 只停一个线程的基础</text>

  <!-- 图例 -->
  <g font-size="9">
    <rect x="612" y="20" width="12" height="12" rx="3" fill="#f5faf6" stroke="#cfe6d2"/><text x="628" y="30" fill="#1d8f3f">绿 执行</text>
    <rect x="690" y="20" width="12" height="12" rx="3" fill="#f4eefb" stroke="#d9c9ef"/><text x="706" y="30" fill="#6f3ea8">紫 native 边界</text>
    <rect x="806" y="20" width="12" height="12" rx="3" fill="#f6f8fc" stroke="#cfe0f2"/><text x="822" y="30" fill="#5b7db1">蓝 VM/控制</text>
    <rect x="908" y="20" width="12" height="12" rx="3" fill="#fbeeed" stroke="#f0cfca"/><text x="924" y="30" fill="#c0504d">红 STW</text>
  </g>

  <!-- VMThread 武装 -->
  <rect x="360" y="70" width="280" height="52" rx="12" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#sp_s)"/>
  <text x="500" y="92" font-size="11" font-weight="700" fill="#5b7db1" text-anchor="middle">VMThread：武装各线程本地 poll</text>
  <text x="500" y="110" font-size="8.5" fill="#6e6e73" text-anchor="middle">safepoint_counter 置奇（进行中）· should_process 统一入口</text>

  <!-- 四种状态 -->
  <g text-anchor="middle">
    <rect x="24" y="150" width="232" height="120" rx="12" fill="#f5faf6" stroke="#cfe6d2" filter="url(#sp_s)"/>
    <text x="140" y="172" font-size="10.5" font-weight="700" fill="#1d8f3f">解释执行</text>
    <text x="140" y="194" font-size="8.5" fill="#3a3a3c">字节码边界检查本地 poll</text>
    <text x="140" y="212" font-size="8.5" fill="#3a3a3c">需停时下一条前停下</text>
    <text x="140" y="238" font-size="8" fill="#9a9aa0">切到第二张派发表实现</text>
    <text x="140" y="254" font-size="8" fill="#9a9aa0">零热路径开销</text>

    <rect x="264" y="150" width="232" height="120" rx="12" fill="#f5faf6" stroke="#cfe6d2" filter="url(#sp_s)"/>
    <text x="380" y="172" font-size="10.5" font-weight="700" fill="#1d8f3f">编译代码</text>
    <text x="380" y="194" font-size="8.5" fill="#3a3a3c">方法返回/回边读「轮询页」</text>
    <text x="380" y="212" font-size="8.5" fill="#3a3a3c">需停时该页设为缺页</text>
    <text x="380" y="230" font-size="8.5" fill="#3a3a3c">load 触发信号 → 导入 safepoint</text>
    <text x="380" y="252" font-size="8" fill="#1d8f3f">正常路径零开销·靠内存保护陷阱</text>

    <rect x="504" y="150" width="232" height="120" rx="12" fill="#f4eefb" stroke="#d9c9ef" filter="url(#sp_s)"/>
    <text x="620" y="172" font-size="10.5" font-weight="700" fill="#6f3ea8">native (in_native)</text>
    <text x="620" y="194" font-size="8.5" fill="#3a3a3c">根本不用停 · 栈对 VM 已「安全」</text>
    <text x="620" y="212" font-size="8.5" fill="#3a3a3c">VMThread 直接跳过它</text>
    <text x="620" y="230" font-size="8.5" fill="#3a3a3c">返回 Java 时检查 _state</text>
    <text x="620" y="252" font-size="8" fill="#9a9aa0">进行中则就地 block（进前等→返时挡）</text>

    <rect x="744" y="150" width="232" height="120" rx="12" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#sp_s)"/>
    <text x="860" y="172" font-size="10.5" font-weight="700" fill="#5b7db1">在 VM 内 / 转换中</text>
    <text x="860" y="194" font-size="8.5" fill="#3a3a3c">轮询直到下次状态转换</text>
    <text x="860" y="212" font-size="8.5" fill="#3a3a3c">在转换点 block</text>
    <text x="860" y="238" font-size="8" fill="#9a9aa0">与 native 互为进出边界</text>
  </g>
  <line x1="440" y1="122" x2="200" y2="150" stroke="#5b7db1" stroke-width="1.3" marker-end="url(#sp_b)"/>
  <line x1="480" y1="122" x2="400" y2="150" stroke="#5b7db1" stroke-width="1.3" marker-end="url(#sp_b)"/>
  <line x1="520" y1="122" x2="600" y2="150" stroke="#5b7db1" stroke-width="1.3" marker-end="url(#sp_b)"/>
  <line x1="560" y1="122" x2="800" y2="150" stroke="#5b7db1" stroke-width="1.3" marker-end="url(#sp_b)"/>

  <!-- TTSP banner -->
  <rect x="24" y="290" width="952" height="60" rx="12" fill="#faf3ea" stroke="#ecdcbf"/>
  <text x="40" y="312" font-size="10.5" font-weight="600" fill="#8a5a1a">TTSP（time-to-safepoint）</text>
  <text x="40" y="334" font-size="9.5" fill="#3a3a3c">从武装 poll 到<tspan font-weight="600">最后一个线程 block</tspan> 的墙钟时间。<tspan font-weight="700" fill="#b0413e">真正 STW = TTSP + VM 操作耗时</tspan>；超长无回边循环会拖长 TTSP，表现为「GC 很快、停顿却久」。</text>

  <!-- 结论 -->
  <rect x="24" y="364" width="952" height="60" rx="12" fill="#fbeeed" stroke="#f0cfca"/>
  <text x="40" y="386" font-size="10.5" font-weight="600" fill="#b0413e">安全点的本质</text>
  <text x="40" y="408" font-size="9.5" fill="#3a3a3c">只有当每个线程都停在自己预埋的安全位置、且此处寄存器/栈映射（OopMap）完整可信时，VM 线程才能放心遍历它的栈、移动它引用的对象——这份「一致、静止」的堆+栈视图，是 GC / deopt / 栈采样 / 类重定义的共同前提。</text>
</svg>
