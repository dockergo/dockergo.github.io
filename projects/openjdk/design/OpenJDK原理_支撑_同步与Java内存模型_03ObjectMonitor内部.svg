<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="460" viewBox="0 0 1000 460" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="om_s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="om_b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
    <marker id="om_g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
  </defs>
  <rect width="1000" height="460" fill="#fbfbfd"/>
  <text x="24" y="30" font-size="14" font-weight="700" fill="#1d1d1f">ObjectMonitor 内部 · 竞争膨胀后的重量级锁：owner + 队列 + 重入计数</text>
  <text x="24" y="49" font-size="10" fill="#6e6e73">无竞争走 markWord 一个 CAS 位的轻量级锁；出现竞争、wait/notify、JNI monitor 时才膨胀出堆外 ObjectMonitor</text>

  <!-- 图例 -->
  <g font-size="9">
    <rect x="670" y="20" width="12" height="12" rx="3" fill="#faf3ea" stroke="#ecdcbf"/><text x="686" y="30" fill="#8a5a1a">琥珀 monitor 结构</text>
    <rect x="800" y="20" width="12" height="12" rx="3" fill="#f6f8fc" stroke="#cfe0f2"/><text x="816" y="30" fill="#5b7db1">蓝 owner/控制</text>
    <rect x="908" y="20" width="12" height="12" rx="3" fill="#f5faf6" stroke="#cfe6d2"/><text x="924" y="30" fill="#1d8f3f">绿 排队流转</text>
  </g>

  <!-- 中心 monitor 结构 -->
  <rect x="330" y="72" width="340" height="270" rx="14" fill="#faf3ea" stroke="#ecdcbf" filter="url(#om_s)"/>
  <text x="500" y="94" font-size="11.5" font-weight="700" fill="#8a5a1a" text-anchor="middle">ObjectMonitor（堆外 · markWord monitor_value=2 指向它）</text>
  <rect x="350" y="106" width="300" height="46" rx="9" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="500" y="126" font-size="10" font-weight="700" fill="#1b2a4a" text-anchor="middle">_owner</text>
  <text x="500" y="143" font-size="8.5" fill="#6e6e73" text-anchor="middle">当前持有者 · 独立缓存行防伪共享</text>
  <rect x="350" y="160" width="145" height="46" rx="9" fill="#fff" stroke="#ecdcbf"/>
  <text x="422" y="180" font-size="9.5" font-weight="700" fill="#8a5a1a" text-anchor="middle">_recursions</text>
  <text x="422" y="197" font-size="8" fill="#6e6e73" text-anchor="middle">重入计数</text>
  <rect x="505" y="160" width="145" height="46" rx="9" fill="#fff" stroke="#ecdcbf"/>
  <text x="577" y="180" font-size="9.5" font-weight="700" fill="#8a5a1a" text-anchor="middle">_succ</text>
  <text x="577" y="197" font-size="8" fill="#6e6e73" text-anchor="middle">继任者·抑制无谓唤醒</text>
  <rect x="350" y="214" width="300" height="52" rx="9" fill="#f5faf6" stroke="#cfe6d2"/>
  <text x="500" y="234" font-size="9.5" font-weight="700" fill="#1c6b45" text-anchor="middle">_entry_list（+_entry_list_tail）</text>
  <text x="500" y="252" font-size="8.5" fill="#6e6e73" text-anchor="middle">竞争/重入受阻线程的入口阻塞队列</text>
  <rect x="350" y="274" width="300" height="52" rx="9" fill="#f5faf6" stroke="#cfe6d2"/>
  <text x="500" y="294" font-size="9.5" font-weight="700" fill="#1c6b45" text-anchor="middle">_wait_set</text>
  <text x="500" y="312" font-size="8.5" fill="#6e6e73" text-anchor="middle">调用 wait() 后挂起线程的等待集</text>

  <!-- 左: 获锁/重入 -->
  <rect x="24" y="90" width="270" height="110" rx="12" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#om_s)"/>
  <text x="159" y="112" font-size="10.5" font-weight="600" fill="#5b7db1" text-anchor="middle">获锁 / 重入</text>
  <text x="42" y="134" font-size="9" fill="#3a3a3c">· CAS 抢 _owner 成功 = 获锁</text>
  <text x="42" y="153" font-size="9" fill="#3a3a3c">· 同一线程重入 → _recursions++</text>
  <text x="42" y="172" font-size="9" fill="#3a3a3c">· 释放：归零才真正解锁</text>
  <text x="42" y="190" font-size="8" fill="#9a9aa0">这正是 synchronized 可重入的实现</text>
  <line x1="294" y1="128" x2="350" y2="128" stroke="#5b7db1" stroke-width="1.5" marker-end="url(#om_b)"/>

  <!-- 左下: 竞争排队 -->
  <rect x="24" y="216" width="270" height="86" rx="12" fill="#f5faf6" stroke="#cfe6d2" filter="url(#om_s)"/>
  <text x="159" y="238" font-size="10.5" font-weight="600" fill="#1d8f3f" text-anchor="middle">竞争线程</text>
  <text x="42" y="260" font-size="9" fill="#3a3a3c">· 抢 _owner 失败 → 排 _entry_list</text>
  <text x="42" y="279" font-size="9" fill="#3a3a3c">· park 挂起（内核阻塞）</text>
  <text x="42" y="296" font-size="8" fill="#9a9aa0">owner 释放时从队列唤醒一个</text>
  <line x1="294" y1="250" x2="350" y2="240" stroke="#2f9e6e" stroke-width="1.5" marker-end="url(#om_g)"/>

  <!-- 右: wait/notify -->
  <rect x="706" y="106" width="270" height="120" rx="12" fill="#f5faf6" stroke="#cfe6d2" filter="url(#om_s)"/>
  <text x="841" y="128" font-size="10.5" font-weight="600" fill="#1d8f3f" text-anchor="middle">wait / notify</text>
  <text x="722" y="150" font-size="9" fill="#3a3a3c">· wait()：释放锁 + 挂入 _wait_set</text>
  <text x="722" y="169" font-size="9" fill="#3a3a3c">· notify()：从 _wait_set</text>
  <text x="722" y="186" font-size="9" fill="#3a3a3c">　移一个回 _entry_list</text>
  <text x="722" y="205" font-size="8" fill="#9a9aa0">被唤醒者重新竞争 _owner</text>
  <line x1="670" y1="240" x2="706" y2="180" stroke="#2f9e6e" stroke-width="1.5" marker-end="url(#om_g)"/>

  <!-- 右下: deflate -->
  <rect x="706" y="240" width="270" height="102" rx="12" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#om_s)"/>
  <text x="841" y="262" font-size="10.5" font-weight="600" fill="#5b7db1" text-anchor="middle">去膨胀 deflate</text>
  <text x="722" y="284" font-size="9" fill="#3a3a3c">· 长期不再竞争的 monitor 被回收</text>
  <text x="722" y="303" font-size="9" fill="#3a3a3c">· markWord 恢复无锁 / 轻量态</text>
  <text x="722" y="322" font-size="8" fill="#9a9aa0">异步 deflater，节省堆外内存</text>
  <line x1="670" y1="300" x2="706" y2="290" stroke="#5b7db1" stroke-width="1.5" marker-end="url(#om_b)"/>

  <!-- banner -->
  <rect x="24" y="356" width="952" height="88" rx="12" fill="#fbeeed" stroke="#f0cfca"/>
  <text x="40" y="378" font-size="10.5" font-weight="600" fill="#b0413e">一条常被忽视的因果</text>
  <text x="40" y="400" font-size="9.5" fill="#3a3a3c">wait()/notify() 与从 JNI 进入的锁<tspan font-weight="700" fill="#b0413e">一定是重量级的</tspan>——它们必须用 monitor 的等待集与阻塞队列，</text>
  <text x="40" y="418" font-size="9.5" fill="#3a3a3c">无法用 markWord 里一个 CAS 位表达。同理，对象一旦算过 identity hashCode（hash 占了本要放锁记录的位），</text>
  <text x="40" y="436" font-size="9.5" fill="#3a3a3c">就不能再走轻量级锁，只能直接膨胀——这是「调用 System.identityHashCode 后同步变慢」的底层原因。</text>
</svg>
