<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="470" viewBox="0 0 1000 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="dp_s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="dp_g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="dp_r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c0504d"/></marker>
    <marker id="dp_b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
  </defs>
  <rect width="1000" height="470" fill="#fbfbfd"/>
  <text x="24" y="30" font-size="14" font-weight="700" fill="#1d1d1f">去优化 (deopt) · C2 激进投机的安全网：赌错也不出错，只退回慢路径</text>
  <text x="24" y="49" font-size="10" fill="#6e6e73">C2 优化建立在来自 L3 profile 的投机假设上——大概率成立但不保证；一旦被现实推翻，把执行从编译帧安全退回解释器</text>

  <!-- 图例 -->
  <g font-size="9">
    <rect x="640" y="20" width="12" height="12" rx="3" fill="#f5faf6" stroke="#cfe6d2"/><text x="656" y="30" fill="#1d8f3f">绿 正常执行</text>
    <rect x="742" y="20" width="12" height="12" rx="3" fill="#fbeeed" stroke="#f0cfca"/><text x="758" y="30" fill="#c0504d">红 假设失效/去优化</text>
    <rect x="884" y="20" width="12" height="12" rx="3" fill="#faf3ea" stroke="#ecdcbf"/><text x="900" y="30" fill="#8a5a1a">琥珀 堆</text>
  </g>

  <!-- 顶: C2 nmethod 运行 -->
  <rect x="24" y="72" width="440" height="66" rx="12" fill="#f5faf6" stroke="#cfe6d2" filter="url(#dp_s)"/>
  <text x="244" y="96" font-size="11" font-weight="700" fill="#1d8f3f" text-anchor="middle">C2 编译的 nmethod 运行中（机器码峰值）</text>
  <text x="244" y="118" font-size="9" fill="#3a3a3c" text-anchor="middle">投机假设：某分支几乎不走 · 某虚调用永远同一实现 · 某处不抛异常</text>

  <!-- 假设推翻 -->
  <rect x="536" y="72" width="440" height="66" rx="12" fill="#fbeeed" stroke="#f0cfca" filter="url(#dp_s)"/>
  <text x="756" y="96" font-size="11" font-weight="700" fill="#c0504d" text-anchor="middle">假设被推翻 → 命中 uncommon trap</text>
  <text x="756" y="118" font-size="9" fill="#3a3a3c" text-anchor="middle">加载了新子类 · 走了从未走过的冷分支 · 出现未预期异常</text>
  <line x1="464" y1="105" x2="536" y2="105" stroke="#c0504d" stroke-width="1.6" marker-end="url(#dp_r)"/>

  <!-- deopt 三步 -->
  <rect x="24" y="162" width="952" height="150" rx="12" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="40" y="184" font-size="11" font-weight="600" fill="#5b7db1">去优化流程 · 把压缩的编译栈帧安全「解卷」回解释器可执行的形态</text>
  <g text-anchor="middle">
    <rect x="44" y="198" width="280" height="98" rx="10" fill="#fff" stroke="#cfe0f2" filter="url(#dp_s)"/>
    <text x="184" y="222" font-size="10" font-weight="600" fill="#1b2a4a">① fetch_unroll_info 解卷栈帧</text>
    <text x="184" y="244" font-size="8.5" fill="#6e6e73">一个被内联/优化压扁的编译帧</text>
    <text x="184" y="262" font-size="8.5" fill="#6e6e73">展开成若干独立的解释帧</text>
    <text x="184" y="282" font-size="8" fill="#9a9aa0">恢复局部变量/操作数栈/程序计数</text>
    <rect x="360" y="198" width="280" height="98" rx="10" fill="#faf3ea" stroke="#ecdcbf" filter="url(#dp_s)"/>
    <text x="500" y="222" font-size="10" font-weight="600" fill="#8a5a1a">② 物化被标量替换的对象</text>
    <text x="500" y="244" font-size="8.5" fill="#6e6e73">逃逸分析曾把对象拆成寄存器标量</text>
    <text x="500" y="262" font-size="8.5" fill="#6e6e73">realloc_objects + reassign_fields</text>
    <text x="500" y="282" font-size="8.5" fill="#8a5a1a">重新在堆上分配并回填字段</text>
    <rect x="676" y="198" width="280" height="98" rx="10" fill="#fbeeed" stroke="#f0cfca" filter="url(#dp_s)"/>
    <text x="816" y="222" font-size="10" font-weight="600" fill="#c0504d">③ 批量作废失效 nmethod</text>
    <text x="816" y="244" font-size="8.5" fill="#6e6e73">deoptimize_all_marked</text>
    <text x="816" y="262" font-size="8.5" fill="#6e6e73">标记 not-entrant · 不再进入</text>
    <text x="816" y="282" font-size="8" fill="#9a9aa0">依赖被破坏的编译产物统一失效</text>
  </g>
  <line x1="324" y1="247" x2="360" y2="247" stroke="#5b7db1" stroke-width="1.4" marker-end="url(#dp_b)"/>
  <line x1="640" y1="247" x2="676" y2="247" stroke="#5b7db1" stroke-width="1.4" marker-end="url(#dp_b)"/>

  <!-- 落点 -->
  <rect x="270" y="336" width="460" height="52" rx="12" fill="#f5faf6" stroke="#cfe6d2" filter="url(#dp_s)"/>
  <text x="500" y="358" font-size="10.5" font-weight="700" fill="#1d8f3f" text-anchor="middle">退回解释器慢路径继续执行</text>
  <text x="500" y="377" font-size="9" fill="#1c6b45" text-anchor="middle">记录 trap，后续可用更保守策略重新编译（避免反复 deopt 抖动）</text>
  <line x1="500" y1="312" x2="500" y2="336" stroke="#2f9e6e" stroke-width="1.6" marker-end="url(#dp_g)"/>

  <!-- banner -->
  <rect x="24" y="404" width="952" height="48" rx="12" fill="#faf3ea" stroke="#ecdcbf"/>
  <text x="40" y="426" font-size="10.5" font-weight="600" fill="#8a5a1a">为何值得</text>
  <text x="40" y="444" font-size="9.5" fill="#3a3a3c">正因有 deopt 兜底，C2 才敢「赌」——投机去虚化/省略检查/激进内联；赌错不出错，只是从峰值机器码退回解释慢路径。</text>
</svg>
