<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="440" viewBox="0 0 1000 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="s4" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="c1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="c2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
    <marker id="c3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c99a3a"/></marker>
  </defs>
  <rect width="1000" height="440" fill="#fbfbfd"/>
  <text x="24" y="30" font-size="14" font-weight="700" fill="#1d1d1f">字节码解释器 · 模板解释器 + Rewriter/cpCache + 首执符号解析</text>
  <text x="24" y="49" font-size="10" fill="#6e6e73">启动即可执行、无需预热；运行期为每条字节码生成机器码片段装入派发表；首次执行 invoke/new 时把符号引用解析并缓存进 cpCache</text>

  <!-- 生成期 -->
  <rect x="24" y="66" width="952" height="78" rx="12" fill="#f5faf6" stroke="#cfe6d2"/>
  <text x="40" y="86" font-size="11" font-weight="600" fill="#1d8f3f">① VM 启动期：TemplateInterpreterGenerator 生成派发表（dispatch table）</text>
  <g text-anchor="middle">
    <rect x="44" y="96" width="300" height="40" rx="9" fill="#fff" stroke="#cfe6d2" filter="url(#s4)"/>
    <text x="194" y="121" font-size="9.5" fill="#1c6b45">为每个字节码生成一段机器码模板</text>
    <rect x="360" y="96" width="300" height="40" rx="9" fill="#fff" stroke="#cfe6d2" filter="url(#s4)"/>
    <text x="510" y="121" font-size="9.5" fill="#1c6b45">填入 normal / safepoint 两张派发表</text>
    <rect x="676" y="96" width="300" height="40" rx="9" fill="#fff" stroke="#cfe6d2" filter="url(#s4)"/>
    <text x="826" y="115" font-size="9.5" fill="#1c6b45">遇 safepoint 切到 safepoint 表</text><text x="826" y="130" font-size="8" fill="#9a9aa0">令解释循环在每条边界可暂停</text>
  </g>

  <!-- Rewriter -->
  <rect x="24" y="158" width="952" height="80" rx="12" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="40" y="178" font-size="11" font-weight="600" fill="#5b7db1">② 类装入后：Rewriter 改写字节码 + 建 ConstantPoolCache（cpCache）</text>
  <text x="40" y="199" font-size="9" fill="#3a3a3c">把 getfield/putfield、invoke* 的常量池索引改写成指向 cpCache 的间接索引——首次解析结果就地缓存，后续零重复解析。</text>
  <text x="40" y="218" font-size="8.5" fill="#9a9aa0">rewriter.cpp:107 make_constant_pool_cache · :187 rewrite_field_reference · :200 rewrite_method_reference</text>

  <!-- 解释循环 -->
  <rect x="24" y="252" width="620" height="170" rx="12" fill="#eef6f2" stroke="#cfe6da"/>
  <text x="40" y="272" font-size="11" font-weight="600" fill="#2a8f6a">③ 解释循环：取码 → 查表 → 执行 → 累计计数</text>
  <g text-anchor="middle">
    <rect x="44" y="284" width="130" height="52" rx="9" fill="#fff" stroke="#cfe6da" filter="url(#s4)"/>
    <text x="109" y="306" font-size="10" font-weight="600" fill="#207a58">取下一字节码</text><text x="109" y="323" font-size="8" fill="#6e6e73">按 bcp 读 opcode</text>
    <rect x="200" y="284" width="130" height="52" rx="9" fill="#fff" stroke="#cfe6da" filter="url(#s4)"/>
    <text x="265" y="306" font-size="10" font-weight="600" fill="#207a58">查派发表跳转</text><text x="265" y="323" font-size="8" fill="#6e6e73">跳到该码机器模板</text>
    <rect x="356" y="284" width="130" height="52" rx="9" fill="#fff" stroke="#cfe6da" filter="url(#s4)"/>
    <text x="421" y="306" font-size="10" font-weight="600" fill="#207a58">执行该码语义</text><text x="421" y="323" font-size="8" fill="#6e6e73">操作栈 / 局部变量</text>
    <rect x="512" y="284" width="112" height="52" rx="9" fill="#fff" stroke="#cfe6da" filter="url(#s4)"/>
    <text x="568" y="306" font-size="10" font-weight="600" fill="#207a58">累计计数器</text><text x="568" y="323" font-size="8" fill="#6e6e73">调用/回边</text>
  </g>
  <line x1="174" y1="310" x2="200" y2="310" stroke="#2f9e6e" stroke-width="1.5" marker-end="url(#c1)"/>
  <line x1="330" y1="310" x2="356" y2="310" stroke="#2f9e6e" stroke-width="1.5" marker-end="url(#c1)"/>
  <line x1="486" y1="310" x2="512" y2="310" stroke="#2f9e6e" stroke-width="1.5" marker-end="url(#c1)"/>
  <path d="M568,336 L568,356 L109,356 L109,336" fill="none" stroke="#2f9e6e" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#c1)"/>
  <text x="330" y="352" font-size="8" fill="#2f9e6e" text-anchor="middle">循环下一条</text>
  <text x="40" y="392" font-size="9" fill="#2a8f6a">计数超阈 → 提交 JIT 编译（见分层编译主线）</text>
  <text x="40" y="410" font-size="8.5" fill="#9a9aa0">invocationCounter.hpp：invocation counter（方法调用）+ backedge counter（循环回边）</text>

  <!-- 首执解析 -->
  <rect x="660" y="252" width="316" height="170" rx="12" fill="#fbf7ef" stroke="#ecdcbf"/>
  <text x="676" y="272" font-size="11" font-weight="600" fill="#8a6d3b">④ 首次执行符号引用 → 解析入口</text>
  <text x="676" y="294" font-size="9" fill="#3a3a3c">解释器遇未解析的 invoke/字段/new，</text>
  <text x="676" y="309" font-size="9" fill="#3a3a3c">陷入 InterpreterRuntime 解析：</text>
  <rect x="676" y="320" width="284" height="30" rx="7" fill="#fff" stroke="#ecdcbf"/>
  <text x="686" y="339" font-size="8.5" fill="#8a5a1a">resolve_invoke / resolve_invokedynamic / _new</text>
  <rect x="676" y="356" width="284" height="30" rx="7" fill="#fff" stroke="#ecdcbf"/>
  <text x="686" y="375" font-size="8.5" fill="#8a5a1a">LinkResolver 定位实际 Method* / 字段偏移</text>
  <text x="676" y="404" font-size="8.5" fill="#9a9aa0">结果写回 cpCache → 后续走缓存 resolve_from_cache</text>

  <line x1="500" y1="144" x2="500" y2="158" stroke="#5b7db1" stroke-width="1.5" marker-end="url(#c2)"/>
  <line x1="330" y1="238" x2="330" y2="252" stroke="#2f9e6e" stroke-width="1.5" marker-end="url(#c1)"/>
  <line x1="644" y1="337" x2="660" y2="337" stroke="#c99a3a" stroke-width="1.5" marker-end="url(#c3)"/>
</svg>
