<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="410" viewBox="0 0 1000 410" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="cb_s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="cb_b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
    <marker id="cb_g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
  </defs>
  <rect width="1000" height="410" fill="#fbfbfd"/>
  <text x="24" y="30" font-size="14" font-weight="700" fill="#1d1d1f">CompileBroker · 编译与执行解耦 = 生产者（策略）— 队列 — 消费者（编译线程）</text>
  <text x="24" y="49" font-size="10" fill="#6e6e73">JIT 不在应用线程上同步进行；应用线程发出请求后继续解释执行，编译完成后自动切换到机器码</text>

  <!-- 图例 -->
  <g font-size="9">
    <rect x="720" y="20" width="12" height="12" rx="3" fill="#f6f8fc" stroke="#cfe0f2"/><text x="736" y="30" fill="#5b7db1">蓝 编译派发</text>
    <rect x="828" y="20" width="12" height="12" rx="3" fill="#f5faf6" stroke="#cfe6d2"/><text x="844" y="30" fill="#1d8f3f">绿 执行流</text>
  </g>

  <!-- 生产者 -->
  <rect x="24" y="76" width="200" height="248" rx="12" fill="#f5faf6" stroke="#cfe6d2"/>
  <text x="124" y="98" font-size="11" font-weight="600" fill="#1d8f3f" text-anchor="middle">① 生产者</text>
  <rect x="44" y="112" width="160" height="60" rx="9" fill="#fff" stroke="#cfe6d2" filter="url(#cb_s)"/>
  <text x="124" y="134" font-size="9.5" fill="#1c6b45" text-anchor="middle">解释器 / C1 埋计数器</text>
  <text x="124" y="152" font-size="8.5" fill="#6e6e73" text-anchor="middle">调用数 + 回边数 超阈</text>
  <rect x="44" y="184" width="160" height="60" rx="9" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#cb_s)"/>
  <text x="124" y="206" font-size="9.5" fill="#1b2a4a" text-anchor="middle">CompilationPolicy</text>
  <text x="124" y="224" font-size="8.5" fill="#6e6e73" text-anchor="middle">判定目标级别 → 入队</text>
  <rect x="44" y="256" width="160" height="56" rx="9" fill="#f5faf6" stroke="#cfe6d2" filter="url(#cb_s)"/>
  <text x="124" y="278" font-size="9" fill="#1c6b45" text-anchor="middle">应用线程发请求后</text>
  <text x="124" y="296" font-size="9" font-weight="700" fill="#1d8f3f" text-anchor="middle">继续解释执行（不阻塞）</text>

  <!-- 队列 -->
  <rect x="300" y="76" width="360" height="248" rx="12" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="480" y="98" font-size="11" font-weight="600" fill="#5b7db1" text-anchor="middle">② 两条独立队列（MethodCompileQueue_lock 保护）</text>
  <rect x="326" y="114" width="308" height="88" rx="10" fill="#fff" stroke="#cfe0f2" filter="url(#cb_s)"/>
  <text x="346" y="136" font-size="9.5" font-weight="600" fill="#1b2a4a">C1 编译队列</text>
  <text x="346" y="156" font-size="8.5" fill="#6e6e73">L1/2/3 快速出码任务</text>
  <text x="346" y="176" font-size="8.5" fill="#6e6e73">CompileQueue::add 入 · get 阻塞取</text>
  <text x="346" y="194" font-size="8" fill="#9a9aa0">FIFO + 优先级</text>
  <rect x="326" y="212" width="308" height="88" rx="10" fill="#fff" stroke="#cfe0f2" filter="url(#cb_s)"/>
  <text x="346" y="234" font-size="9.5" font-weight="600" fill="#1b2a4a">C2 编译队列</text>
  <text x="346" y="254" font-size="8.5" fill="#6e6e73">L4 深度优化任务（耗时长）</text>
  <text x="346" y="274" font-size="8.5" fill="#8a5a1a" font-weight="600">两队互不阻塞</text>
  <text x="346" y="292" font-size="8" fill="#9a9aa0">C1 快任务不被慢 C2 卡住</text>

  <!-- 消费者 -->
  <rect x="736" y="76" width="240" height="248" rx="12" fill="#f5faf6" stroke="#cfe6d2"/>
  <text x="856" y="98" font-size="11" font-weight="600" fill="#1d8f3f" text-anchor="middle">③ 消费者（后台编译线程）</text>
  <rect x="756" y="114" width="200" height="52" rx="9" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#cb_s)"/>
  <text x="856" y="136" font-size="9.5" fill="#1b2a4a" text-anchor="middle">C1 线程组 (_c1_count)</text>
  <text x="856" y="154" font-size="8.5" fill="#6e6e73" text-anchor="middle">阻塞取 → 出码</text>
  <rect x="756" y="176" width="200" height="52" rx="9" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#cb_s)"/>
  <text x="856" y="198" font-size="9.5" fill="#1b2a4a" text-anchor="middle">C2 线程组 (_c2_count)</text>
  <text x="856" y="216" font-size="8.5" fill="#6e6e73" text-anchor="middle">阻塞取 → 出码</text>
  <rect x="756" y="238" width="200" height="72" rx="9" fill="#f5faf6" stroke="#cfe6d2" filter="url(#cb_s)"/>
  <text x="856" y="260" font-size="9.5" font-weight="700" fill="#1d8f3f" text-anchor="middle">装上新 nmethod</text>
  <text x="856" y="280" font-size="8.5" fill="#1c6b45" text-anchor="middle">后续调用自动切换</text>
  <text x="856" y="297" font-size="8.5" fill="#6e6e73" text-anchor="middle">到机器码执行</text>

  <!-- 连线 -->
  <line x1="224" y1="214" x2="300" y2="200" stroke="#5b7db1" stroke-width="1.5" marker-end="url(#cb_b)"/>
  <text x="262" y="196" font-size="8" fill="#5b7db1" text-anchor="middle">入队</text>
  <line x1="660" y1="158" x2="736" y2="140" stroke="#5b7db1" stroke-width="1.5" marker-end="url(#cb_b)"/>
  <line x1="660" y1="256" x2="736" y2="202" stroke="#5b7db1" stroke-width="1.5" marker-end="url(#cb_b)"/>
  <text x="698" y="240" font-size="8" fill="#5b7db1" text-anchor="middle">取任务</text>

  <!-- banner -->
  <rect x="24" y="338" width="952" height="56" rx="12" fill="#faf3ea" stroke="#ecdcbf"/>
  <text x="40" y="360" font-size="10.5" font-weight="600" fill="#8a5a1a">要点</text>
  <text x="40" y="381" font-size="9.5" fill="#3a3a3c">异步后台编译是默认；<tspan font-weight="600" fill="#8a5a1a">-XX:-BackgroundCompilation</tspan> 关闭后编译在应用线程同步进行（仅测试/复现用），生产应保持异步。</text>
</svg>
