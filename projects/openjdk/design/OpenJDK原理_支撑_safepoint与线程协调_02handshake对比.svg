<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="500" viewBox="0 0 1040 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="s2" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="hp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8a5cae"/></marker>
    <marker id="hg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="ho" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#d38236"/></marker>
  </defs>
  <rect width="1040" height="500" fill="#fbfbfd"/>
  <text x="24" y="30" font-size="14" font-weight="700" fill="#1d1d1f">全局 safepoint  vs  thread-local handshake · 停顿范围对比</text>
  <text x="24" y="49" font-size="10" fill="#6e6e73">两者复用同一套"每线程本地 poll"设施；区别只在武装谁的 poll——全体 or 单个目标。能用 handshake 就别用全局停顿。</text>

  <!-- 左：全局 safepoint -->
  <rect x="24" y="64" width="486" height="404" rx="12" fill="#fbf7ef" stroke="#ecdcbf"/>
  <text x="44" y="86" font-size="11.5" font-weight="600" fill="#8a5a1a">全局 safepoint（STW）· SafepointSynchronize::begin（safepoint.cpp:333）</text>
  <text x="44" y="103" font-size="8.5" fill="#6e6e73">武装全部线程 poll，等所有 Java 线程同时停下，VM 独占后再统一释放</text>

  <g text-anchor="middle">
    <rect x="176" y="116" width="182" height="42" rx="9" fill="#f4eefb" stroke="#d9c9ef" filter="url(#s2)"/>
    <text x="267" y="133" font-size="9.5" font-weight="600" fill="#6f3ea8">VMThread</text><text x="267" y="148" font-size="7.5" fill="#6e6e73">arm 全部本地 poll</text>
  </g>
  <!-- 三个 fan-out 到全体阻塞 -->
  <path d="M215,158 L215,182 L120,182 L120,206" fill="none" stroke="#8a5cae" stroke-width="1.4" marker-end="url(#hp)"/>
  <path d="M267,158 L267,206" fill="none" stroke="#8a5cae" stroke-width="1.4" marker-end="url(#hp)"/>
  <path d="M319,158 L319,182 L414,182 L414,206" fill="none" stroke="#8a5cae" stroke-width="1.4" marker-end="url(#hp)"/>
  <g text-anchor="middle">
    <rect x="60" y="208" width="120" height="42" rx="9" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#s2)"/>
    <text x="120" y="225" font-size="9" font-weight="600" fill="#8a5a1a">T1 阻塞</text><text x="120" y="239" font-size="7.5" fill="#6e6e73">block()</text>
    <rect x="207" y="208" width="120" height="42" rx="9" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#s2)"/>
    <text x="267" y="225" font-size="9" font-weight="600" fill="#8a5a1a">T2 阻塞</text><text x="267" y="239" font-size="7.5" fill="#6e6e73">block()</text>
    <rect x="354" y="208" width="120" height="42" rx="9" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#s2)"/>
    <text x="414" y="225" font-size="9" font-weight="600" fill="#8a5a1a">T3 阻塞</text><text x="414" y="239" font-size="7.5" fill="#6e6e73">block()</text>
  </g>
  <!-- STW 窗口 -->
  <rect x="60" y="266" width="414" height="60" rx="10" fill="#f5faf6" stroke="#cfe6d2"/>
  <text x="267" y="288" font-size="10" font-weight="600" fill="#1c6b45" text-anchor="middle">_state = _synchronized（safepoint.cpp:400）</text>
  <text x="267" y="306" font-size="8.5" fill="#3a3a3c" text-anchor="middle">世界静止 · VMThread 独占执行整堆 GC / 类重定义 / 批量去优化</text>
  <text x="267" y="320" font-size="8" fill="#8a5a1a" text-anchor="middle">停顿受最慢线程 TTSP 拖累</text>
  <path d="M120,250 L120,266 M267,250 L267,266 M414,250 L414,266" fill="none" stroke="#d38236" stroke-width="1.4" marker-end="url(#ho)"/>
  <!-- 释放 -->
  <rect x="176" y="344" width="182" height="42" rx="9" fill="#f5faf6" stroke="#cfe6d2" filter="url(#s2)"/>
  <text x="267" y="361" font-size="9" font-weight="600" fill="#1c6b45" text-anchor="middle">end / disarm 唤醒全体</text><text x="267" y="375" font-size="7.5" fill="#6e6e73" text-anchor="middle">safepoint.cpp:472 / :424</text>
  <line x1="267" y1="326" x2="267" y2="344" stroke="#2f9e6e" stroke-width="1.4" marker-end="url(#hg)"/>
  <text x="267" y="410" font-size="9" font-weight="600" fill="#8a5a1a" text-anchor="middle">代价：全体停顿</text>
  <text x="267" y="426" font-size="8" fill="#6e6e73" text-anchor="middle">适合需要全堆一致视图的操作</text>
  <text x="267" y="450" font-size="8" fill="#9a9aa0" text-anchor="middle">停顿 = TTSP + VM 操作耗时</text>

  <!-- 右：handshake -->
  <rect x="530" y="64" width="486" height="404" rx="12" fill="#f5faf6" stroke="#cfe6d2"/>
  <text x="550" y="86" font-size="11.5" font-weight="600" fill="#1c6b45">thread-local handshake · Handshake::execute（handshake.cpp:361 / :388）</text>
  <text x="550" y="103" font-size="8.5" fill="#6e6e73">只武装目标线程 poll，只打扰它；其余线程 poll 未武装，照常飞奔</text>

  <g text-anchor="middle">
    <rect x="640" y="116" width="182" height="42" rx="9" fill="#f4eefb" stroke="#d9c9ef" filter="url(#s2)"/>
    <text x="731" y="133" font-size="9.5" font-weight="600" fill="#6f3ea8">VMThread 发起</text><text x="731" y="148" font-size="7.5" fill="#6e6e73">挂操作到 T2 队列 · arm T2 poll</text>
  </g>
  <!-- 只指向 T2 -->
  <path d="M731,158 L731,182 L724,182 L724,206" fill="none" stroke="#8a5cae" stroke-width="1.4" marker-end="url(#hp)"/>
  <g text-anchor="middle">
    <rect x="554" y="208" width="120" height="42" rx="9" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#s2)"/>
    <text x="614" y="225" font-size="9" font-weight="600" fill="#3a5a8a">T1 照跑</text><text x="614" y="239" font-size="7.5" fill="#6e6e73">poll 未武装</text>
    <rect x="664" y="208" width="120" height="42" rx="9" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#s2)"/>
    <text x="724" y="225" font-size="9" font-weight="600" fill="#8a5a1a">T2 目标</text><text x="724" y="239" font-size="7.5" fill="#6e6e73">下个安全点执行闭包</text>
    <rect x="774" y="208" width="120" height="42" rx="9" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#s2)"/>
    <text x="834" y="225" font-size="9" font-weight="600" fill="#3a5a8a">T3 照跑</text><text x="834" y="239" font-size="7.5" fill="#6e6e73">poll 未武装</text>
  </g>
  <!-- T2 执行闭包 -->
  <rect x="600" y="266" width="248" height="60" rx="10" fill="#f5faf6" stroke="#cfe6d2"/>
  <text x="724" y="288" font-size="10" font-weight="600" fill="#1c6b45" text-anchor="middle">do_handshake（handshake.cpp:332）</text>
  <text x="724" y="304" font-size="8.5" fill="#3a3a3c" text-anchor="middle">_handshake_cl-&gt;do_thread(thread)</text>
  <text x="724" y="319" font-size="8" fill="#6e6e73" text-anchor="middle">谁先到谁执行：VMThread 代跑 or T2 自执行</text>
  <line x1="724" y1="250" x2="724" y2="266" stroke="#2f9e6e" stroke-width="1.4" marker-end="url(#hg)"/>
  <!-- process_by_self 分支 -->
  <rect x="600" y="344" width="248" height="42" rx="9" fill="#fff" stroke="#e2e2e7" filter="url(#s2)"/>
  <text x="724" y="361" font-size="9" font-weight="600" fill="#3a3a3c" text-anchor="middle">process_by_self（handshake.cpp:603）</text><text x="724" y="375" font-size="7.5" fill="#6e6e73" text-anchor="middle">CAS 抢所有权 · 闭包只跑一次</text>
  <line x1="724" y1="326" x2="724" y2="344" stroke="#2f9e6e" stroke-width="1.4" marker-end="url(#hg)"/>
  <text x="724" y="410" font-size="9" font-weight="600" fill="#1c6b45" text-anchor="middle">收益：只打扰相关线程</text>
  <text x="724" y="426" font-size="8" fill="#6e6e73" text-anchor="middle">偏向锁撤销 / 单线程栈采样 / 部分挂起</text>
  <text x="724" y="450" font-size="8" fill="#9a9aa0" text-anchor="middle">现代 HotSpot 削减停顿的主路径</text>

  <!-- 中缝 VS -->
  <circle cx="520" cy="266" r="17" fill="#fff" stroke="#d9c9ef" stroke-width="1.5"/>
  <text x="520" y="270" font-size="10" font-weight="700" fill="#6f3ea8" text-anchor="middle">VS</text>
</svg>
