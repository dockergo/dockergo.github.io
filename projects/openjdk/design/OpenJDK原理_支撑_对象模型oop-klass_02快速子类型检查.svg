<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="540" viewBox="0 0 1000 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="a1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
    <marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="a3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#d38236"/></marker>
  </defs>
  <rect width="1000" height="540" fill="#fbfbfd"/>
  <text x="24" y="30" font-size="14" font-weight="700" fill="#1d1d1f">快速子类型检查 · is_subtype_of 用 super_check_offset 统一分流快/慢路径</text>
  <text x="24" y="49" font-size="10" fill="#6e6e73">instanceof / checkcast / 数组存储检查：普通类走 primary_supers 一次读比；接口与深祖先走 secondary_supers 哈希探测</text>

  <!-- 入口 -->
  <rect x="360" y="64" width="280" height="52" rx="10" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="500" y="86" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">this-&gt;is_subtype_of(k)</text>
  <text x="500" y="104" font-size="8.5" fill="#6e6e73" text-anchor="middle">目标类型 k，判断 this 是否为 k 的子类型</text>

  <!-- 分流判定 -->
  <rect x="330" y="140" width="340" height="58" rx="10" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#soft)"/>
  <text x="500" y="162" font-size="10.5" font-weight="600" fill="#8a5a1a" text-anchor="middle">off = k-&gt;super_check_offset()</text>
  <text x="500" y="180" font-size="8.5" fill="#6e6e73" text-anchor="middle">off 是否等于 secondary_super_cache 的偏移？</text>
  <text x="500" y="192" font-size="8" fill="#9a9aa0" text-anchor="middle">编译期就把接口/深祖先的 off 设成这个哨兵值</text>
  <line x1="500" y1="116" x2="500" y2="140" stroke="#5b7db1" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- 快路径 -->
  <rect x="40" y="238" width="430" height="150" rx="12" fill="#f5faf6" stroke="#cfe6d2"/>
  <text x="58" y="258" font-size="11" font-weight="600" fill="#1d8f3f">快路径 · off ≠ 哨兵（k 是深度 ≤ 8 的普通类）</text>
  <g>
    <rect x="58" y="270" width="394" height="40" rx="9" fill="#fff" stroke="#cfe6d2" filter="url(#soft)"/>
    <text x="70" y="288" font-size="9.5" font-weight="600" fill="#1c6b45">sup = *(Klass**)((address)this + off)</text>
    <text x="70" y="303" font-size="8.5" fill="#6e6e73">off 恰好指向 this-&gt;_primary_supers[k.depth]</text>
    <rect x="58" y="318" width="394" height="36" rx="9" fill="#fff" stroke="#cfe6d2" filter="url(#soft)"/>
    <text x="70" y="341" font-size="9.5" font-weight="600" fill="#1c6b45">return (sup == k)  —— 一次指针相等比较</text>
    <rect x="58" y="360" width="394" height="20" rx="6" fill="#f6f8fc" stroke="#cfe0f2"/>
    <text x="70" y="374" font-size="8.5" fill="#1b2a4a">_primary_supers[8] 把浅祖先平铺缓存，深度作下标 O(1)</text>
  </g>
  <line x1="440" y1="198" x2="255" y2="238" stroke="#2f9e6e" stroke-width="1.6" marker-end="url(#a2)"/>
  <text x="330" y="222" font-size="8" fill="#2f9e6e">普通类</text>

  <!-- 慢路径 -->
  <rect x="530" y="238" width="430" height="230" rx="12" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="548" y="258" font-size="11" font-weight="600" fill="#6f3ea8">慢路径 · off = 哨兵（k 是接口或深度 &gt; 8 的祖先）</text>
  <g>
    <rect x="548" y="270" width="394" height="34" rx="9" fill="#fff" stroke="#d9c9ef" filter="url(#soft)"/>
    <text x="560" y="291" font-size="9.5" font-weight="600" fill="#6f3ea8">search_secondary_supers(k)</text>
    <rect x="548" y="312" width="394" height="48" rx="9" fill="#fff" stroke="#d9c9ef" filter="url(#soft)"/>
    <text x="560" y="330" font-size="9.5" font-weight="600" fill="#6f3ea8">① 位图预筛 lookup_secondary_supers_table</text>
    <text x="560" y="346" font-size="8.5" fill="#6e6e73">用 k 的哈希槽在 _secondary_supers_bitmap 探测</text>
    <text x="560" y="357" font-size="8" fill="#9a76c0">位为 0 → 直接判否（无需扫数组）</text>
    <rect x="548" y="368" width="394" height="42" rx="9" fill="#fff" stroke="#d9c9ef" filter="url(#soft)"/>
    <text x="560" y="386" font-size="9.5" font-weight="600" fill="#6f3ea8">② 位为 1 → 核对 _secondary_supers[] 数组</text>
    <text x="560" y="401" font-size="8.5" fill="#6e6e73">Array&lt;Klass*&gt;，含所有接口与深祖先</text>
    <rect x="548" y="418" width="394" height="40" rx="9" fill="#f5faf6" stroke="#cfe6d2" filter="url(#soft)"/>
    <text x="560" y="436" font-size="9.5" font-weight="600" fill="#1c6b45">③ 命中 → 写回 _secondary_super_cache</text>
    <text x="560" y="451" font-size="8.5" fill="#6e6e73">下次同类型判定直接命中缓存</text>
  </g>
  <line x1="560" y1="198" x2="745" y2="238" stroke="#8a5cae" stroke-width="1.6" marker-end="url(#a1)"/>
  <text x="640" y="222" font-size="8" fill="#8a5cae">接口/深祖先</text>
  <line x1="745" y1="304" x2="745" y2="312" stroke="#8a5cae" stroke-width="1.4" marker-end="url(#a1)"/>
  <line x1="745" y1="360" x2="745" y2="368" stroke="#8a5cae" stroke-width="1.4" marker-end="url(#a1)"/>
  <line x1="745" y1="410" x2="745" y2="418" stroke="#2f9e6e" stroke-width="1.4" marker-end="url(#a2)"/>

  <!-- 底部说明 -->
  <rect x="40" y="404" width="430" height="64" rx="12" fill="#fbf7ef" stroke="#ecdcbf"/>
  <text x="58" y="424" font-size="10.5" font-weight="600" fill="#8a6d3b">为什么快路径能只读一个字</text>
  <text x="58" y="443" font-size="8.5" fill="#3a3a3c">Klass 布局刻意让 k 的 super_check_offset 指向本类</text>
  <text x="58" y="459" font-size="8.5" fill="#3a3a3c">primary_supers 里应存放 k 的那个槽 → 读一次比一次</text>

  <!-- 底部总结条 -->
  <rect x="40" y="486" width="920" height="38" rx="10" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="500" y="510" font-size="9.5" fill="#1b2a4a" text-anchor="middle">同一段判定代码，靠 super_check_offset 是否等于哨兵偏移，无分支地把"普通类"与"接口/深祖先"分流到快/慢两条路径</text>
</svg>
