<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="s2" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="a1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
    <marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="a5" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8a5cae"/></marker>
  </defs>
  <rect width="1040" height="560" fill="#fbfbfd"/>
  <text x="24" y="30" font-size="14" font-weight="700" fill="#1d1d1f">Java 内存模型 · happens-before 与内存屏障：可见性 + 禁重排序如何在 HotSpot 落地</text>
  <text x="24" y="49" font-size="10" fill="#6e6e73">JMM 用 happens-before 偏序约束"一个写对另一个读可见"；HotSpot 用 OrderAccess 的四种基元屏障 + acquire/release/fence 实现它。</text>

  <!-- happens-before 规则 -->
  <rect x="24" y="70" width="992" height="118" rx="12" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="40" y="92" font-size="11" font-weight="700" fill="#6f3ea8">happens-before 主要规则（若 A hb B，则 A 的所有写对 B 可见，且二者不得违序重排）</text>
  <g text-anchor="middle">
    <rect x="40" y="104" width="230" height="70" rx="9" fill="#fff" stroke="#d9c9ef" filter="url(#s2)"/>
    <text x="155" y="126" font-size="10" font-weight="600" fill="#5a2f8f">① 程序次序</text><text x="155" y="144" font-size="8" fill="#6e6e73">同一线程内前序语句</text><text x="155" y="160" font-size="8" fill="#6e6e73">hb 后序语句</text>
    <rect x="284" y="104" width="230" height="70" rx="9" fill="#fff" stroke="#d9c9ef" filter="url(#s2)"/>
    <text x="399" y="126" font-size="10" font-weight="600" fill="#5a2f8f">② 监视器锁</text><text x="399" y="144" font-size="8" fill="#6e6e73">unlock hb 后续 lock</text><text x="399" y="160" font-size="8" fill="#6e6e73">synchronized 出块→入块</text>
    <rect x="528" y="104" width="230" height="70" rx="9" fill="#fff" stroke="#d9c9ef" filter="url(#s2)"/>
    <text x="643" y="126" font-size="10" font-weight="600" fill="#5a2f8f">③ volatile</text><text x="643" y="144" font-size="8" fill="#6e6e73">写 hb 后续读同一变量</text><text x="643" y="160" font-size="8" fill="#6e6e73">release-store / acquire-load</text>
    <rect x="772" y="104" width="244" height="70" rx="9" fill="#fff" stroke="#d9c9ef" filter="url(#s2)"/>
    <text x="894" y="126" font-size="10" font-weight="600" fill="#5a2f8f">④ 线程启动/终止</text><text x="894" y="144" font-size="8" fill="#6e6e73">start() hb 新线程首条</text><text x="894" y="160" font-size="8" fill="#6e6e73">线程内末条 hb join() 返回</text>
  </g>

  <!-- 两线程 volatile 例子 -->
  <rect x="24" y="204" width="600" height="240" rx="12" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="40" y="226" font-size="11" font-weight="700" fill="#3b6cb0">贯穿示例：一写一读的 volatile 标志（发布-订阅）</text>

  <rect x="44" y="240" width="264" height="188" rx="10" fill="#fff" stroke="#cfe0f2" filter="url(#s2)"/>
  <text x="176" y="260" font-size="10" font-weight="700" fill="#1b2a4a" text-anchor="middle">线程 T1（发布者）</text>
  <rect x="60" y="272" width="232" height="34" rx="7" fill="#f5faf6" stroke="#cfe6d2"/>
  <text x="176" y="293" font-size="9" fill="#1c6b45" text-anchor="middle">data = 42;  <tspan fill="#6e6e73">// 普通写</tspan></text>
  <rect x="60" y="314" width="232" height="34" rx="7" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="176" y="329" font-size="9" font-weight="600" fill="#5a2f8f" text-anchor="middle">」release 屏障（StoreStore+LoadStore）</text>
  <text x="176" y="342" font-size="7.5" fill="#6e6e73" text-anchor="middle">禁止上面的普通写下沉到 flag 写之后</text>
  <rect x="60" y="356" width="232" height="34" rx="7" fill="#fbeeec" stroke="#eccfc9"/>
  <text x="176" y="377" font-size="9" font-weight="600" fill="#93261a" text-anchor="middle">flag = true;  <tspan fill="#6e6e73">// volatile 写</tspan></text>
  <text x="176" y="410" font-size="8" fill="#6e6e73" text-anchor="middle">release-store：先前所有写"打包"发布</text>

  <rect x="360" y="240" width="248" height="188" rx="10" fill="#fff" stroke="#cfe0f2" filter="url(#s2)"/>
  <text x="484" y="260" font-size="10" font-weight="700" fill="#1b2a4a" text-anchor="middle">线程 T2（订阅者）</text>
  <rect x="376" y="272" width="216" height="34" rx="7" fill="#fbeeec" stroke="#eccfc9"/>
  <text x="484" y="293" font-size="9" font-weight="600" fill="#93261a" text-anchor="middle">while(!flag);  <tspan fill="#6e6e73">// volatile 读</tspan></text>
  <rect x="376" y="314" width="216" height="34" rx="7" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="484" y="329" font-size="9" font-weight="600" fill="#5a2f8f" text-anchor="middle">acquire 屏障（LoadLoad+LoadStore）「</text>
  <text x="484" y="342" font-size="7.5" fill="#6e6e73" text-anchor="middle">禁止下面的读上浮到 flag 读之前</text>
  <rect x="376" y="356" width="216" height="34" rx="7" fill="#f5faf6" stroke="#cfe6d2"/>
  <text x="484" y="377" font-size="9" fill="#1c6b45" text-anchor="middle">读 data 必得 42  <tspan fill="#6e6e73">// 可见</tspan></text>
  <text x="484" y="410" font-size="8" fill="#6e6e73" text-anchor="middle">acquire-load：观察到发布则后续读可见</text>

  <!-- 同步边 -->
  <path d="M292,373 C325,373 340,289 376,289" fill="none" stroke="#8a5cae" stroke-width="2" marker-end="url(#a5)"/>
  <text x="333" y="440" font-size="8.5" font-weight="600" fill="#6f3ea8" text-anchor="middle">volatile 写 hb 读到它的 volatile 读 ⇒ 传递可见性</text>

  <!-- OrderAccess 屏障基元 -->
  <rect x="640" y="204" width="376" height="240" rx="12" fill="#f5faf6" stroke="#cfe6d2"/>
  <text x="656" y="226" font-size="11" font-weight="700" fill="#1d8f3f">OrderAccess 四基元 + 三接口（HotSpot 落点）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="656" y="238" width="172" height="40" rx="7" fill="#fff" stroke="#cfe6d2"/><text x="742" y="256" font-weight="600" fill="#1c6b45">LoadLoad / LoadStore</text><text x="742" y="270" fill="#6e6e73">acquire() 组合</text>
    <rect x="840" y="238" width="160" height="40" rx="7" fill="#fff" stroke="#cfe6d2"/><text x="920" y="256" font-weight="600" fill="#1c6b45">StoreStore / LoadStore</text><text x="920" y="270" fill="#6e6e73">release() 组合</text>
    <rect x="656" y="286" width="344" height="40" rx="7" fill="#fbeeec" stroke="#eccfc9"/><text x="828" y="304" font-weight="600" fill="#93261a">fence() = 全序双向屏障（含 StoreLoad）</text><text x="828" y="318" fill="#6e6e73">最重：x86 上以 lock addl 实现，volatile 写用它</text>
  </g>
  <text x="656" y="346" font-size="9" fill="#3a3a3c">• volatile 写 = release-store + StoreLoad(fence)，读 = acquire-load</text>
  <text x="656" y="366" font-size="9" fill="#3a3a3c">• synchronized 出块 = release，入块 = acquire（等价 volatile 语义）</text>
  <text x="656" y="386" font-size="9" fill="#3a3a3c">• final 字段：构造末尾 StoreStore，保证正确发布</text>
  <text x="656" y="410" font-size="8.5" fill="#9a7b3b">TSO(x86) 天然禁 3 种重排，仅 StoreLoad 需显式屏障；ARM/PPC 需更多。</text>

  <!-- 一句话 -->
  <rect x="24" y="460" width="992" height="72" rx="12" fill="#fbf7ef" stroke="#ecdcbf"/>
  <text x="40" y="484" font-size="10.5" font-weight="700" fill="#8a6d3b">要点：happens-before 是"契约"，OrderAccess 屏障是"兑现手段"</text>
  <text x="40" y="506" font-size="9" fill="#3a3a3c">JMM 只承诺"存在 hb 关系时可见且不违序"，不承诺无 hb 关系的实时性；编译器/CPU 在不破坏 hb 的前提下可自由重排与缓存。</text>
  <text x="40" y="524" font-size="8.5" fill="#9a9aa0">锚点：orderAccess.hpp:241 loadload · :242 storestore · :243 loadstore · :244 storeload · :246 acquire · :247 release · :248 fence</text>
</svg>
