<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="s2" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="a1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
    <marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="a3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8a5cae"/></marker>
  </defs>
  <rect width="1000" height="560" fill="#fbfbfd"/>
  <text x="24" y="30" font-size="14" font-weight="700" fill="#1d1d1f">JNI 边界 · JNI_ENTRY 宏封装线程状态切换（in_native ↔ in_vm）+ 句柄解耦 GC 移动</text>
  <text x="24" y="49" font-size="10" fill="#6e6e73">native 代码调 JNI 时线程处于 in_native（对 safepoint「已安全」）；进 JNI 实现体切到 in_vm 才可触碰对象；对象引用一律用句柄间接持有，GC 移动对象而句柄不动</text>

  <!-- 顶：native 世界 -->
  <rect x="24" y="66" width="952" height="70" rx="12" fill="#f7f7f9" stroke="#e2e2e7"/>
  <text x="40" y="86" font-size="11" font-weight="600" fill="#6e6e73">① native 用户代码 · 线程状态 = <tspan font-weight="600" fill="#c0642a">_thread_in_native</tspan>（不碰 JVM 内部对象 → GC/safepoint 视其「已安全」，无需等它）</text>
  <g text-anchor="middle">
    <rect x="44" y="96" width="300" height="34" rx="9" fill="#fff" stroke="#e2e2e7" filter="url(#s2)"/>
    <text x="194" y="117" font-size="10" fill="#3a3a3c">C/C++ 调用 jni_FindClass / jni_NewObject…</text>
    <rect x="360" y="96" width="300" height="34" rx="9" fill="#fff" stroke="#e2e2e7" filter="url(#s2)"/>
    <text x="510" y="117" font-size="10" fill="#3a3a3c">手里只有 jobject / jclass（间接句柄，非裸地址）</text>
    <rect x="676" y="96" width="300" height="34" rx="9" fill="#fff" stroke="#e2e2e7" filter="url(#s2)"/>
    <text x="826" y="117" font-size="10" fill="#3a3a3c">JNIEnv* 每线程独有 · 不可跨线程使用</text>
  </g>

  <!-- 中：JNI_ENTRY 边界（紫） -->
  <rect x="24" y="150" width="952" height="150" rx="12" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="40" y="170" font-size="11" font-weight="600" fill="#6f3ea8">② JNI_ENTRY 宏边界 · interfaceSupport.inline.hpp:362 → :366（进入实现体的固定序幕）</text>
  <g text-anchor="middle">
    <rect x="44" y="182" width="216" height="52" rx="9" fill="#fff" stroke="#d9c9ef" filter="url(#s2)"/>
    <text x="152" y="203" font-size="10" font-weight="600" fill="#5a2f88">thread_from_jni_environment</text><text x="152" y="221" font-size="8" fill="#6e6e73">从 env 反查 JavaThread · 断言当前线程 :369</text>
    <rect x="276" y="182" width="248" height="52" rx="9" fill="#fff" stroke="#b98bd6" stroke-width="1.6" filter="url(#s2)"/>
    <text x="400" y="203" font-size="10.5" font-weight="600" fill="#5a2f88">ThreadInVMfromNative __tiv</text><text x="400" y="221" font-size="8" fill="#6e6e73">构造：in_native → in_vm（:371 / 类 :172）</text>
    <rect x="540" y="182" width="216" height="52" rx="9" fill="#fff" stroke="#d9c9ef" filter="url(#s2)"/>
    <text x="648" y="203" font-size="10" font-weight="600" fill="#5a2f88">VM_ENTRY_BASE</text><text x="648" y="221" font-size="8" fill="#6e6e73">装 HandleMark / resource area :377</text>
    <rect x="772" y="182" width="204" height="52" rx="9" fill="#fff" stroke="#d9c9ef" filter="url(#s2)"/>
    <text x="874" y="203" font-size="10" font-weight="600" fill="#5a2f88">-Xcheck:jni（可选）</text><text x="874" y="221" font-size="8" fill="#6e6e73">jniCheck.cpp:213 functionEnter 校验</text>
  </g>
  <text x="40" y="256" font-size="9.5" fill="#5a2f88">析构对偶（JNI_END :389 → } }）：__tiv 析构自动 in_vm → in_native（:181 / transition_from_native :96 带内存屏障 set_thread_state_fence :102）</text>
  <g text-anchor="middle">
    <rect x="44" y="264" width="440" height="30" rx="8" fill="#faf5ff" stroke="#d9c9ef"/>
    <text x="264" y="283" font-size="9" fill="#5a2f88">切 in_vm 的契约含义：「我要碰 Java 对象了，GC 请等我到安全点」</text>
    <rect x="500" y="264" width="476" height="30" rx="8" fill="#faf5ff" stroke="#d9c9ef"/>
    <text x="738" y="283" font-size="9" fill="#5a2f88">状态切换靠 C++ 栈对象构造/析构成对完成 → 异常路径也不漏切</text>
  </g>

  <!-- VM/Java 侧（蓝） -->
  <rect x="24" y="314" width="620" height="146" rx="12" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="40" y="334" font-size="11" font-weight="600" fill="#5b7db1">③ VM / Java 侧 · 状态 = _thread_in_vm（可安全触碰对象、常量池、类字典）</text>
  <g text-anchor="middle">
    <rect x="44" y="346" width="286" height="46" rx="9" fill="#fff" stroke="#cfe0f2" filter="url(#s2)"/>
    <text x="187" y="365" font-size="10" font-weight="600" fill="#1b2a4a">jni_DefineClass / jni_FindClass</text><text x="187" y="382" font-size="8" fill="#6e6e73">jni.cpp:270 / :306（JNI_ENTRY 体内）</text>
    <rect x="346" y="346" width="286" height="46" rx="9" fill="#fff" stroke="#cfe0f2" filter="url(#s2)"/>
    <text x="489" y="365" font-size="10" font-weight="600" fill="#1b2a4a">SystemDictionary::resolve…</text><text x="489" y="382" font-size="8" fill="#6e6e73">建 Klass / 触碰堆对象</text>
  </g>
  <g text-anchor="middle">
    <rect x="44" y="402" width="286" height="46" rx="9" fill="#fff" stroke="#cfe0f2" filter="url(#s2)"/>
    <text x="187" y="421" font-size="10" font-weight="600" fill="#1b2a4a">开销来源</text><text x="187" y="438" font-size="8" fill="#6e6e73">状态切换 + 句柄分配 + 无法内联</text>
    <rect x="346" y="402" width="286" height="46" rx="9" fill="#fff" stroke="#cfe0f2" filter="url(#s2)"/>
    <text x="489" y="421" font-size="10" font-weight="600" fill="#1b2a4a">Critical 区（临时 pin 对象）</text><text x="489" y="438" font-size="8" fill="#6e6e73">GetPrimitiveArrayCritical jni.cpp:2830</text>
  </g>

  <!-- 句柄机制（绿） -->
  <rect x="660" y="314" width="316" height="146" rx="12" fill="#f5faf6" stroke="#cfe6d2"/>
  <text x="676" y="334" font-size="11" font-weight="600" fill="#1d8f3f">④ 句柄机制 · runtime/jniHandles.hpp</text>
  <g text-anchor="middle">
    <rect x="676" y="344" width="284" height="30" rx="8" fill="#fff" stroke="#cfe6d2" filter="url(#s2)"/>
    <text x="818" y="363" font-size="9" fill="#1c6b45">local · make_local :95 · 帧内 · 自动释放</text>
    <rect x="676" y="378" width="284" height="30" rx="8" fill="#fff" stroke="#cfe6d2" filter="url(#s2)"/>
    <text x="818" y="397" font-size="9" fill="#1c6b45">global · make_global :101 · 手动 destroy :103</text>
    <rect x="676" y="412" width="284" height="30" rx="8" fill="#fff" stroke="#cfe6d2" filter="url(#s2)"/>
    <text x="818" y="431" font-size="9" fill="#1c6b45">weak · make_weak_global :106 · 不保命</text>
  </g>
  <text x="676" y="453" font-size="8.5" fill="#2f7d55">GC 移动对象 → 更新句柄内容；native 手里句柄值不变 → 对象会动、句柄不动</text>

  <!-- 竖向连线 -->
  <line x1="500" y1="136" x2="500" y2="150" stroke="#8a5cae" stroke-width="1.5" marker-end="url(#a3)"/>
  <line x1="334" y1="300" x2="334" y2="314" stroke="#5b7db1" stroke-width="1.5" marker-end="url(#a1)"/>
  <!-- VM侧 → 句柄 -->
  <line x1="644" y1="387" x2="660" y2="387" stroke="#2f9e6e" stroke-width="1.6" marker-end="url(#a2)"/>
</svg>
