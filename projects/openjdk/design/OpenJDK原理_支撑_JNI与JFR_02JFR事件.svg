<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="s2" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="a1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
    <marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="a3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#d38236"/></marker>
  </defs>
  <rect width="1000" height="520" fill="#fbfbfd"/>
  <text x="24" y="30" font-size="14" font-weight="700" fill="#1d1d1f">JFR 事件采集 · 线程本地缓冲 → 全局缓冲 → chunk 落盘（低开销、尽量不进 safepoint）</text>
  <text x="24" y="49" font-size="10" fill="#6e6e73">设计目标：生产可长开、开销约 1% 量级。每线程独享无锁缓冲写事件，满了晋升全局缓冲，后台线程成批刷成自包含 chunk；宁丢样本也不阻塞业务线程</text>

  <!-- ① 埋点/事件源 -->
  <rect x="24" y="66" width="952" height="70" rx="12" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="40" y="86" font-size="11" font-weight="600" fill="#5b7db1">① 事件源 · 各子系统埋点在业务线程执行流内就地写事件（无世界静止）</text>
  <g text-anchor="middle">
    <rect x="44" y="96" width="222" height="34" rx="9" fill="#fff" stroke="#cfe0f2" filter="url(#s2)"/>
    <text x="155" y="117" font-size="9.5" fill="#1b2a4a">常规事件 · 分配/锁/GC/编译</text>
    <rect x="282" y="96" width="222" height="34" rx="9" fill="#fff" stroke="#cfe0f2" filter="url(#s2)"/>
    <text x="393" y="117" font-size="9.5" fill="#1b2a4a">周期事件 · jfr/periodic/</text>
    <rect x="520" y="96" width="222" height="34" rx="9" fill="#fff" stroke="#cfe0f2" filter="url(#s2)"/>
    <text x="631" y="117" font-size="9.5" fill="#1b2a4a">埋点 · jfr/instrumentation/</text>
    <rect x="758" y="96" width="218" height="34" rx="9" fill="#fff" stroke="#cfe0f2" filter="url(#s2)"/>
    <text x="867" y="117" font-size="9.5" fill="#1b2a4a">泄漏采样 · jfr/leakprofiler/</text>
  </g>

  <!-- ② 线程本地缓冲（绿） -->
  <rect x="24" y="150" width="952" height="98" rx="12" fill="#f5faf6" stroke="#cfe6d2"/>
  <text x="40" y="170" font-size="11" font-weight="600" fill="#1d8f3f">② 线程本地缓冲（thread-local buffer）· 无锁 · 低开销核心 · jfr/support/jfrThreadLocal.hpp</text>
  <g text-anchor="middle">
    <rect x="44" y="182" width="288" height="54" rx="9" fill="#fff" stroke="#cfe6d2" filter="url(#s2)"/>
    <text x="188" y="203" font-size="10" font-weight="600" fill="#1c6b45">线程 A：_native_buffer / _java_buffer</text><text x="188" y="221" font-size="8" fill="#6e6e73">jfrThreadLocal.hpp:54 / :55 · 各线程独享无竞争</text>
    <rect x="352" y="182" width="288" height="54" rx="9" fill="#fff" stroke="#cfe6d2" filter="url(#s2)"/>
    <text x="496" y="203" font-size="10" font-weight="600" fill="#1c6b45">惰性分配 install_native_buffer</text><text x="496" y="221" font-size="8" fill="#6e6e73">:102 → acquire_thread_local jfrStorage.cpp:142</text>
    <rect x="660" y="182" width="316" height="54" rx="9" fill="#fff" stroke="#cfe6d2" filter="url(#s2)"/>
    <text x="818" y="203" font-size="10" font-weight="600" fill="#1c6b45">线程 B / C … 各自本地缓冲</text><text x="818" y="221" font-size="8" fill="#6e6e73">事件只写自己缓冲 → 无跨线程锁</text>
  </g>

  <!-- ③ 全局缓冲（琥珀） -->
  <rect x="24" y="262" width="952" height="90" rx="12" fill="#fbf7ef" stroke="#ecdcbf"/>
  <text x="40" y="282" font-size="11" font-weight="600" fill="#8a6d3b">③ 全局缓冲池（global buffer）· 本地缓冲写满后晋升 · jfr/recorder/storage/jfrStorage.cpp</text>
  <g text-anchor="middle">
    <rect x="44" y="294" width="296" height="46" rx="9" fill="#fff" stroke="#ecdcbf" filter="url(#s2)"/>
    <text x="192" y="313" font-size="10" font-weight="600" fill="#8a5a1a">晋升 acquire_promotion_buffer</text><text x="192" y="330" font-size="8" fill="#6e6e73">jfrStorage.cpp:176 · 满缓冲移交全局池</text>
    <rect x="356" y="294" width="296" height="46" rx="9" fill="#fff" stroke="#ecdcbf" filter="url(#s2)"/>
    <text x="504" y="313" font-size="10" font-weight="600" fill="#8a5a1a">领用失败 → transient 或丢弃</text><text x="504" y="330" font-size="8" fill="#6e6e73">:187 按是否落盘决定退化路径</text>
    <rect x="668" y="294" width="308" height="46" rx="9" fill="#fff" stroke="#ecdcbf" filter="url(#s2)"/>
    <text x="822" y="313" font-size="10" font-weight="600" fill="#8a5a1a">data-loss 事件</text><text x="822" y="330" font-size="8" fill="#6e6e73">write_data_loss_event :210 · 宁丢勿阻塞</text>
  </g>

  <!-- ④ chunk 落盘（绿深 + safepoint 侧注） -->
  <rect x="24" y="366" width="620" height="130" rx="12" fill="#f5faf6" stroke="#cfe6d2"/>
  <text x="40" y="386" font-size="11" font-weight="600" fill="#1d8f3f">④ 后台记录线程刷 chunk · jfr/recorder/service/jfrRecorderService.cpp</text>
  <g text-anchor="middle">
    <rect x="44" y="398" width="286" height="42" rx="9" fill="#fff" stroke="#cfe6d2" filter="url(#s2)"/>
    <text x="187" y="415" font-size="10" font-weight="600" fill="#1c6b45">flush/write_storage → JfrChunkWriter</text><text x="187" y="431" font-size="8" fill="#6e6e73">:305 / :312 成批写出全局缓冲</text>
    <rect x="346" y="398" width="286" height="42" rx="9" fill="#fff" stroke="#cfe6d2" filter="url(#s2)"/>
    <text x="489" y="415" font-size="10" font-weight="600" fill="#1c6b45">堆栈 + 常量池去重同写</text><text x="489" y="431" font-size="8" fill="#6e6e73">flush_stacktrace :290 / stringpool :324</text>
  </g>
  <g text-anchor="middle">
    <rect x="44" y="448" width="588" height="38" rx="9" fill="#eef7f1" stroke="#cfe6d2"/>
    <text x="338" y="465" font-size="9.5" font-weight="600" fill="#1c6b45">轮转 → 一个个自包含 .jfr chunk（含 metadata / checkpoint 映射，可独立解析）</text>
    <text x="338" y="479" font-size="8" fill="#6e6e73">create_storage jfrRecorder.cpp:299 · create_recorder_thread :477 · is_enabled :79 · on_create_vm_1 :92</text>
  </g>

  <!-- safepoint / JVMTI 对比（中性） -->
  <rect x="660" y="366" width="316" height="130" rx="12" fill="#f7f7f9" stroke="#e2e2e7"/>
  <text x="676" y="386" font-size="11" font-weight="600" fill="#6e6e73">⑤ 与 safepoint / JVMTI 的关系</text>
  <text x="676" y="407" font-size="9" fill="#3a3a3c">多数事件：线程写本地缓冲，<tspan font-weight="600">不需世界静止</tspan></text>
  <text x="676" y="425" font-size="9" fill="#3a3a3c">仅轮转 / 写 checkpoint 少数时刻</text>
  <text x="676" y="440" font-size="9" fill="#3a3a3c">才与 safepoint 协作（service :55/:80）</text>
  <text x="676" y="461" font-size="9" fill="#8a6d3b">对比 JVMTI：常需挂起线程 / 进安全点</text>
  <text x="676" y="476" font-size="9" fill="#8a6d3b">→ JFR 用无锁分层换来「可长开」</text>

  <!-- 竖向连线 -->
  <line x1="500" y1="136" x2="500" y2="150" stroke="#5b7db1" stroke-width="1.5" marker-end="url(#a1)"/>
  <line x1="500" y1="248" x2="500" y2="262" stroke="#2f9e6e" stroke-width="1.6" marker-end="url(#a2)"/>
  <line x1="334" y1="352" x2="334" y2="366" stroke="#d38236" stroke-width="1.6" marker-end="url(#a3)"/>
</svg>
