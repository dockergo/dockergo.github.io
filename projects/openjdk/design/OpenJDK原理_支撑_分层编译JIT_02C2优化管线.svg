  </defs>
  <rect width="1000" height="500" fill="#fbfbfd"/>
  <text x="24" y="30" font-size="14" font-weight="700" fill="#1d1d1f">C2 优化管线 · sea-of-nodes：<tspan font-weight="600">Optimize() 图优化 → Code_Gen() 出码</tspan> → nmethod</text>
  <text x="24" y="49" font-size="10" fill="#6e6e73">控制流与数据流统一进一张有向图，节点自由浮动重排；GVN → 内联 → 逃逸分析/宏消除 → 循环优化 → 指令选择 → 全局调度 → 图着色寄存器分配；投机失败经 deopt 橙线回退解释器</text>

  <!-- ⓪ sea-of-nodes 表示 -->
  <rect x="24" y="66" width="952" height="58" rx="12" fill="#fbf7ef" stroke="#ecdcbf"/>
  <text x="40" y="86" font-size="11" font-weight="600" fill="#8a6d3b">⓪ sea-of-nodes 程序表示 · 不受基本块边界束缚，节点仅受真实数据依赖约束</text>
  <g text-anchor="middle">
    <rect x="600" y="76" width="176" height="40" rx="9" fill="#fff" stroke="#ecdcbf" filter="url(#s2)"/>
    <text x="688" y="93" font-size="9.5" font-weight="600" fill="#8a5a1a">class Node</text><text x="688" y="107" font-size="7.5" fill="#9a9aa0">opto/node.hpp:248</text>
    <rect x="792" y="76" width="176" height="40" rx="9" fill="#fff" stroke="#ecdcbf" filter="url(#s2)"/>
    <text x="880" y="93" font-size="9.5" font-weight="600" fill="#8a5a1a">class PhaseGVN 家族</text><text x="880" y="107" font-size="7.5" fill="#9a9aa0">opto/node.hpp:160</text>
  </g>

  <!-- ① Compile::Optimize() -->
  <rect x="24" y="136" width="952" height="118" rx="12" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="40" y="156" font-size="11" font-weight="600" fill="#5b7db1">① Compile::Optimize() · 图优化到不动点 · opto/compile.cpp:2324</text>
  <g text-anchor="middle">
    <rect x="34" y="168" width="210" height="76" rx="10" fill="#fff" stroke="#cfe0f2" filter="url(#s2)"/>
    <text x="139" y="190" font-size="10" font-weight="600" fill="#1b2a4a">迭代全局值编号 IGVN</text><text x="139" y="207" font-size="8" fill="#6e6e73">合并等价节点 + ideal 变换</text><text x="139" y="222" font-size="8" fill="#6e6e73">常量折叠/化简/死码消除</text><text x="139" y="237" font-size="7.5" fill="#9a9aa0">compile.cpp:2347</text>
    <rect x="275" y="168" width="210" height="76" rx="10" fill="#fff" stroke="#cfe0f2" filter="url(#s2)"/>
    <text x="380" y="190" font-size="10" font-weight="600" fill="#1b2a4a">增量内联</text><text x="380" y="207" font-size="8" fill="#6e6e73">嵌入热点被调方法体</text><text x="380" y="222" font-size="8" fill="#6e6e73">投机去虚化（依 L3 类型剖面）</text><text x="380" y="237" font-size="7.5" fill="#9a9aa0">compile.cpp:2364</text>
    <rect x="516" y="168" width="210" height="76" rx="10" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#s2)"/>
    <text x="621" y="190" font-size="10" font-weight="600" fill="#8a5a1a">逃逸分析 + 宏消除</text><text x="621" y="207" font-size="8" fill="#6e6e73">标量替换 + 锁消除</text><text x="621" y="222" font-size="8" fill="#6e6e73">do_analysis / eliminate_macro</text><text x="621" y="237" font-size="7.5" fill="#9a9aa0">escape.cpp:104 · macro.cpp:2512</text>
    <rect x="757" y="168" width="209" height="76" rx="10" fill="#fff" stroke="#cfe0f2" filter="url(#s2)"/>
    <text x="861" y="190" font-size="10" font-weight="600" fill="#1b2a4a">循环优化</text><text x="861" y="207" font-size="8" fill="#6e6e73">不变量外提 / 展开 / 向量化</text><text x="861" y="222" font-size="8" fill="#6e6e73">范围检查消除</text><text x="861" y="237" font-size="7.5" fill="#9a9aa0">loopnode.cpp:5225</text>
  </g>
  <line x1="244" y1="206" x2="275" y2="206" stroke="#2f9e6e" stroke-width="1.6" marker-end="url(#a2)"/>
  <line x1="485" y1="206" x2="516" y2="206" stroke="#2f9e6e" stroke-width="1.6" marker-end="url(#a2)"/>
  <line x1="726" y1="206" x2="757" y2="206" stroke="#2f9e6e" stroke-width="1.6" marker-end="url(#a2)"/>
  <line x1="500" y1="124" x2="500" y2="136" stroke="#8a6d3b" stroke-width="1.4" marker-end="url(#a3)"/>

  <!-- ② Compile::Code_Gen() -->
  <rect x="24" y="266" width="952" height="118" rx="12" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="40" y="286" font-size="11" font-weight="600" fill="#5b7db1">② Compile::Code_Gen() · 从"节点之海"落到机器码 · opto/compile.cpp:3050</text>
  <g text-anchor="middle">
    <rect x="34" y="298" width="210" height="76" rx="10" fill="#fff" stroke="#cfe0f2" filter="url(#s2)"/>
    <text x="139" y="320" font-size="10" font-weight="600" fill="#1b2a4a">指令选择 Matcher</text><text x="139" y="337" font-size="8" fill="#6e6e73">matcher.match() 树匹配</text><text x="139" y="352" font-size="8" fill="#6e6e73">ideal 节点 → 机器节点</text><text x="139" y="367" font-size="7.5" fill="#9a9aa0">compile.cpp:3065</text>
    <rect x="275" y="298" width="210" height="76" rx="10" fill="#fff" stroke="#cfe0f2" filter="url(#s2)"/>
    <text x="380" y="320" font-size="10" font-weight="600" fill="#1b2a4a">全局调度 PhaseCFG</text><text x="380" y="337" font-size="8" fill="#6e6e73">漂浮节点落基本块</text><text x="380" y="352" font-size="8" fill="#6e6e73">确定执行顺序 → 建 CFG</text><text x="380" y="367" font-size="7.5" fill="#9a9aa0">compile.cpp:3087</text>
    <rect x="516" y="298" width="210" height="76" rx="10" fill="#fff" stroke="#cfe0f2" filter="url(#s2)"/>
    <text x="621" y="320" font-size="10" font-weight="600" fill="#1b2a4a">图着色 Chaitin</text><text x="621" y="337" font-size="8" fill="#6e6e73">Register_Allocate 干涉图着色</text><text x="621" y="352" font-size="8" fill="#6e6e73">冲突时 spill 到栈</text><text x="621" y="367" font-size="7.5" fill="#9a9aa0">chaitin.cpp:356 · compile.cpp:3107</text>
    <rect x="757" y="298" width="209" height="76" rx="10" fill="#f5faf6" stroke="#cfe6d2" filter="url(#s2)"/>
    <text x="861" y="320" font-size="10" font-weight="600" fill="#1c6b45">nmethod 产物</text><text x="861" y="337" font-size="8" fill="#6e6e73">装入 code cache</text><text x="861" y="352" font-size="8" fill="#6e6e73">后续调用切 L4 峰值码</text><text x="861" y="367" font-size="7.5" fill="#9a9aa0">ReservedCodeCacheSize 约束</text>
  </g>
  <line x1="244" y1="336" x2="275" y2="336" stroke="#2f9e6e" stroke-width="1.6" marker-end="url(#a2)"/>
  <line x1="485" y1="336" x2="516" y2="336" stroke="#2f9e6e" stroke-width="1.6" marker-end="url(#a2)"/>
  <line x1="726" y1="336" x2="757" y2="336" stroke="#2f9e6e" stroke-width="1.6" marker-end="url(#a2)"/>
  <!-- ① -> ② 连接 -->
  <path d="M861 244 L861 255 L139 255 L139 298" fill="none" stroke="#5b7db1" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#a1)"/>
  <text x="500" y="252" font-size="8" fill="#5b7db1" text-anchor="middle">优化完成 → 进入代码生成</text>

  <!-- ③ deopt 回退 -->
  <rect x="24" y="396" width="952" height="88" rx="12" fill="#fef2ea" stroke="#f2cba3"/>
  <text x="40" y="416" font-size="11" font-weight="600" fill="#c96a1f">③ 投机兜底 · uncommon trap → deoptimization 退回解释器 · runtime/deoptimization.cpp</text>
  <text x="40" y="437" font-size="9" fill="#3a3a3c">C2 在可疑处（罕见分支 / 单态虚调用 / 免检查）埋 uncommon trap；假设被现实推翻（加载新子类、走冷分支）即触发去优化。</text>
  <text x="40" y="455" font-size="8.5" fill="#3a3a3c">fetch_unroll_info(:283) 解卷编译帧 → 解释帧；标量替换对象 deoptimize_objects_internal(:445) 重物化；deoptimize_all_marked(:171) 批量作废。</text>
  <text x="40" y="472" font-size="8.5" fill="#c96a1f">deopt 是激进优化的安全网：赌错不出错，仅退回慢速路径，并可能以更保守策略重编译。</text>
  <path d="M861 374 L861 384 L944 384 L944 392" fill="none" stroke="#d38236" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#a3)"/>
  <text x="944" y="388" font-size="7.5" fill="#c96a1f" text-anchor="middle">回退</text>
</svg>
