<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="428" viewBox="0 0 1000 428" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="s2" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="a1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
    <marker id="ap" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8a5cae"/></marker>
    <marker id="ao" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c2611f"/></marker>
  </defs>
  <rect width="1000" height="428" fill="#fbfbfd"/>
  <text x="24" y="28" font-size="14" font-weight="700" fill="#1d1d1f">垃圾回收与可插拔 GC · 两条正交抽象轴：CollectedHeap（分配 + 回收） × BarrierSet（读/写屏障插桩）</text>
  <text x="24" y="47" font-size="10" fill="#6e6e73">执行引擎只依赖两个纯虚接口；启动时按 -XX:+UseXXXGC 择一具体收集器装配，并把对应屏障插到解释器 / C1 / C2 三条执行路径。</text>

  <!-- 接口行 -->
  <rect x="24" y="60" width="468" height="80" rx="13" fill="#f4eefb" stroke="#d9c9ef" filter="url(#s2)"/>
  <text x="40" y="82" font-size="11.5" font-weight="600" fill="#6f3ea8">接口①　<tspan font-weight="600">CollectedHeap</tspan> : public CHeapObj&lt;mtGC&gt;</text>
  <text x="40" y="101" font-size="9" fill="#3a3a3c">mem_allocate(size) 分配 · collect(GCCause) 回收 · kind() 返回收集器种类（纯虚，各 GC override）</text>
  <text x="40" y="120" font-size="8" fill="#9a76c0">gc/shared/collectedHeap.hpp:91 · :163 mem_allocate · :358 collect · :233 kind · :187 enum Name</text>
  <text x="40" y="134" font-size="8" fill="#9a76c0">enum Name { None, Serial, Parallel, G1, Epsilon, Z, Shenandoah }</text>

  <rect x="508" y="60" width="468" height="80" rx="13" fill="#f4eefb" stroke="#d9c9ef" filter="url(#s2)"/>
  <text x="524" y="82" font-size="11.5" font-weight="600" fill="#6f3ea8">接口②　<tspan font-weight="600">BarrierSet</tspan> : public CHeapObj&lt;mtGC&gt;（引用读/写要顺带做什么）</text>
  <text x="524" y="101" font-size="9" fill="#3a3a3c">持有 3 个代码生成器，把屏障语义翻译成三种执行路径的机器码</text>
  <text x="524" y="120" font-size="8" fill="#9a76c0">gc/shared/barrierSet.hpp:36-38 前向声明 · :74-76 成员 · :108/:113/:118 make_barrier_set_*</text>
  <text x="524" y="134" font-size="8" fill="#9a76c0">启动选定 GC 后一次性装配 Assembler / C1 / C2 屏障</text>

  <!-- 左：override 总线 -->
  <line x1="258" y1="140" x2="258" y2="150" stroke="#8a5cae" stroke-width="1.5"/>
  <line x1="98" y1="150" x2="410" y2="150" stroke="#8a5cae" stroke-width="1.4"/>
  <line x1="98" y1="150" x2="98" y2="168" stroke="#8a5cae" stroke-width="1.4" marker-end="url(#ap)"/>
  <line x1="254" y1="150" x2="254" y2="168" stroke="#8a5cae" stroke-width="1.4" marker-end="url(#ap)"/>
  <line x1="410" y1="150" x2="410" y2="168" stroke="#8a5cae" stroke-width="1.4" marker-end="url(#ap)"/>
  <text x="418" y="164" font-size="8.5" fill="#8a5cae">六款收集器 override CollectedHeap</text>

  <!-- 右：装配总线 -->
  <line x1="742" y1="140" x2="742" y2="150" stroke="#8a5cae" stroke-width="1.5"/>
  <line x1="582" y1="150" x2="894" y2="150" stroke="#8a5cae" stroke-width="1.4"/>
  <line x1="582" y1="150" x2="582" y2="168" stroke="#8a5cae" stroke-width="1.4" marker-end="url(#ap)"/>
  <line x1="738" y1="150" x2="738" y2="168" stroke="#8a5cae" stroke-width="1.4" marker-end="url(#ap)"/>
  <line x1="894" y1="150" x2="894" y2="168" stroke="#8a5cae" stroke-width="1.4" marker-end="url(#ap)"/>

  <!-- GC 子类 row1 (琥珀=堆) -->
  <g text-anchor="middle">
    <rect x="24" y="168" width="148" height="56" rx="9" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#s2)"/>
    <text x="98" y="189" font-size="10.5" font-weight="600" fill="#8a5a1a">Serial</text><text x="98" y="205" font-size="8" fill="#6e6e73">单线程 STW 分代</text><text x="98" y="218" font-size="7.5" fill="#b08a4a">卡表写屏障</text>
    <rect x="180" y="168" width="148" height="56" rx="9" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#s2)"/>
    <text x="254" y="189" font-size="10.5" font-weight="600" fill="#8a5a1a">Parallel</text><text x="254" y="205" font-size="8" fill="#6e6e73">多线程并行·吞吐优先</text><text x="254" y="218" font-size="7.5" fill="#b08a4a">gc_globals.hpp:112</text>
    <rect x="336" y="168" width="148" height="56" rx="9" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#s2)"/>
    <text x="410" y="189" font-size="10.5" font-weight="600" fill="#8a5a1a">G1（默认）</text><text x="410" y="205" font-size="8" fill="#6e6e73">Region+并发标记</text><text x="410" y="218" font-size="7.5" fill="#b08a4a">g1CollectedHeap.hpp:922</text>
    <!-- row2 -->
    <rect x="24" y="232" width="148" height="56" rx="9" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#s2)"/>
    <text x="98" y="253" font-size="10.5" font-weight="600" fill="#8a5a1a">ZGC</text><text x="98" y="269" font-size="8" fill="#6e6e73">着色指针+加载屏障</text><text x="98" y="282" font-size="7.5" fill="#b08a4a">zCollectedHeap.hpp:40</text>
    <rect x="180" y="232" width="148" height="56" rx="9" fill="#fbf7ef" stroke="#ecdcbf" filter="url(#s2)"/>
    <text x="254" y="253" font-size="10.5" font-weight="600" fill="#8a5a1a">Shenandoah</text><text x="254" y="269" font-size="8" fill="#6e6e73">转发指针+读引用屏障</text><text x="254" y="282" font-size="7.5" fill="#b08a4a">并发疏散</text>
    <rect x="336" y="232" width="148" height="56" rx="9" fill="#fff" stroke="#e2e2e7" filter="url(#s2)"/>
    <text x="410" y="253" font-size="10.5" font-weight="600" fill="#6e6e73">Epsilon</text><text x="410" y="269" font-size="8" fill="#9a9aa0">只分配·从不回收</text><text x="410" y="282" font-size="7.5" fill="#9a9aa0">epsilonHeap.hpp:37/:100</text>
  </g>

  <!-- 屏障插桩三路径 (蓝=逻辑) -->
  <g text-anchor="middle">
    <rect x="508" y="168" width="148" height="56" rx="9" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#s2)"/>
    <text x="582" y="188" font-size="10" font-weight="600" fill="#5b7db1">解释器 / 模板汇编</text><text x="582" y="204" font-size="8" fill="#6e6e73">BarrierSetAssembler</text><text x="582" y="218" font-size="7.5" fill="#7f9ec4">生成内联屏障机器码</text>
    <rect x="664" y="168" width="148" height="56" rx="9" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#s2)"/>
    <text x="738" y="188" font-size="10" font-weight="600" fill="#5b7db1">C1 客户端编译器</text><text x="738" y="204" font-size="8" fill="#6e6e73">BarrierSetC1</text><text x="738" y="218" font-size="7.5" fill="#7f9ec4">barrierSet.hpp:37</text>
    <rect x="820" y="168" width="156" height="56" rx="9" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#s2)"/>
    <text x="898" y="188" font-size="10" font-weight="600" fill="#5b7db1">C2 服务端编译器</text><text x="898" y="204" font-size="8" fill="#6e6e73">BarrierSetC2（读屏障热点）</text><text x="898" y="218" font-size="7.5" fill="#7f9ec4">barrierSet.hpp:38</text>
  </g>
  <!-- barrierSetConfig 清单 (绿) -->
  <rect x="508" y="232" width="468" height="56" rx="9" fill="#f5faf6" stroke="#cfe6d2" filter="url(#s2)"/>
  <text x="524" y="252" font-size="10" font-weight="600" fill="#1c6b45">编译期清单　FOR_EACH_BARRIER_SET_DO　gc/shared/barrierSetConfig.hpp:31</text>
  <text x="524" y="270" font-size="8.5" fill="#3a3a3c">CardTableBarrierSet（Serial/Parallel） · EpsilonBarrierSet · G1BarrierSet · ShenandoahBarrierSet · ZBarrierSet</text>
  <text x="524" y="283" font-size="7.5" fill="#4e9e78">加一款 GC 就在此登记它需要的屏障实现 —— 这是"可插拔"在编译期的注册表</text>

  <!-- 底部：写屏障 vs 读屏障 -->
  <line x1="516" y1="140" x2="516" y2="300" stroke="#e2e2e7" stroke-width="1" stroke-dasharray="3 3"/>
  <rect x="24" y="304" width="468" height="72" rx="12" fill="#fbf7ef" stroke="#ecdcbf"/>
  <text x="40" y="325" font-size="10.5" font-weight="600" fill="#8a5a1a">分代 GC（Serial / Parallel / G1）→ <tspan font-weight="600">写屏障</tspan></text>
  <text x="40" y="344" font-size="8.5" fill="#3a3a3c">弱分代假说：多数对象朝生夕死。写引用时记跨代/跨 Region 引用（卡表 / RSet），</text>
  <text x="40" y="358" font-size="8.5" fill="#3a3a3c">Minor GC 只扫脏卡而非整堆。G1 前屏障 SATB 兜漏标：g1BarrierSet.hpp:102 write_ref_field_pre</text>
  <text x="40" y="371" font-size="8" fill="#b08a4a">g1BarrierSet.hpp:69 G1SATBMarkQueueSet · :107 write_ref_field_post</text>

  <rect x="508" y="304" width="468" height="72" rx="12" fill="#fdf3ec" stroke="#f3d9c4"/>
  <text x="524" y="325" font-size="10.5" font-weight="600" fill="#c2611f">并发重定位 GC（ZGC / Shenandoah）→ <tspan font-weight="600">读屏障</tspan></text>
  <text x="524" y="344" font-size="8.5" fill="#3a3a3c">读出引用的瞬间纠正它（对象若已搬走则重映射/协助搬迁），把对象复制搬出 STW，</text>
  <text x="524" y="358" font-size="8.5" fill="#3a3a3c">停顿与堆大小近乎无关。zBarrier.hpp:149 load_barrier_on_oop_field · :88 relocate_or_remap</text>
  <text x="524" y="371" font-size="8" fill="#d18a4a">shenandoahBarrierSet.hpp:105 load_reference_barrier · shenandoahForwarding.hpp:37 get_forwardee</text>

  <text x="24" y="398" font-size="9.5" fill="#6e6e73">一句话：<tspan font-weight="600" fill="#1d1d1f">CollectedHeap 管"堆整体分配+回收"，BarrierSet 管"每次引用读写的额外动作"；二者正交组合，撑起六款可插拔收集器。</tspan></text>
  <text x="24" y="416" font-size="8" fill="#9a9aa0">开关：gc/shared/gc_globals.hpp:106 UseSerialGC · :109 UseG1GC · :112 UseParallelGC · :115 UseEpsilonGC · :118 UseZGC · :121 UseShenandoahGC · :320 MaxGCPauseMillis</text>
</svg>
