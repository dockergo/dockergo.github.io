<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">listpack：一段连续内存装多个元素，每 entry 存自身长度 → 消除级联更新</text>
  <text x="30" y="49" font-size="10.5" fill="#a1a1a6">取代 ziplist；小规模 Hash/List/ZSet/Set 都用它</text>

  <!-- listpack layout -->
  <text x="40" y="86" font-size="11" font-weight="700" fill="#7a5a1e">内存布局</text>
  <g>
    <rect x="60" y="98" width="90" height="52" rx="7" fill="#fdf3e5" stroke="#f0d9b5" filter="url(#soft)"/>
    <text x="105" y="120" font-size="9.5" font-weight="600" fill="#7a5a1e" text-anchor="middle">总字节数</text>
    <text x="105" y="136" font-size="8.5" fill="#b08535" text-anchor="middle">32 bit</text>
    <rect x="152" y="98" width="80" height="52" rx="7" fill="#fdf3e5" stroke="#f0d9b5" filter="url(#soft)"/>
    <text x="192" y="120" font-size="9.5" font-weight="600" fill="#7a5a1e" text-anchor="middle">元素数</text>
    <text x="192" y="136" font-size="8.5" fill="#b08535" text-anchor="middle">16 bit</text>
    <text x="146" y="166" font-size="8.5" fill="#a1a1a6" text-anchor="middle">6 字节头（LP_HDR_SIZE）</text>

    <rect x="240" y="98" width="150" height="52" rx="7" fill="#fff" stroke="#f0d9b5" filter="url(#soft)"/>
    <text x="315" y="118" font-size="9.5" fill="#7a5a1e" text-anchor="middle">entry 1</text>
    <text x="315" y="134" font-size="8" fill="#b08535" text-anchor="middle">enc + data + backlen</text>
    <rect x="392" y="98" width="150" height="52" rx="7" fill="#fff" stroke="#f0d9b5" filter="url(#soft)"/>
    <text x="467" y="118" font-size="9.5" fill="#7a5a1e" text-anchor="middle">entry 2</text>
    <text x="467" y="134" font-size="8" fill="#b08535" text-anchor="middle">enc + data + backlen</text>
    <rect x="544" y="98" width="150" height="52" rx="7" fill="#fff" stroke="#f0d9b5" filter="url(#soft)"/>
    <text x="619" y="118" font-size="9.5" fill="#7a5a1e" text-anchor="middle">entry 3</text>
    <text x="619" y="134" font-size="8" fill="#b08535" text-anchor="middle">enc + data + backlen</text>
    <rect x="696" y="98" width="60" height="52" rx="7" fill="#f43f7e" fill-opacity="0.12" stroke="#f6a5c0" filter="url(#soft)"/>
    <text x="726" y="127" font-size="10" font-weight="600" fill="#c02a56" text-anchor="middle">0xFF</text>
    <text x="726" y="166" font-size="8.5" fill="#a1a1a6" text-anchor="middle">EOF</text>
  </g>

  <!-- entry detail -->
  <text x="40" y="210" font-size="11" font-weight="700" fill="#1b2a4a">单个 entry 的三段结构</text>
  <g>
    <rect x="60" y="222" width="180" height="46" rx="7" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="150" y="242" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">encoding-type</text>
    <text x="150" y="258" font-size="8.5" fill="#5b7db1" text-anchor="middle">7bit整数/6-32bit串等</text>
    <rect x="248" y="222" width="180" height="46" rx="7" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="338" y="242" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">data</text>
    <text x="338" y="258" font-size="8.5" fill="#5b7db1" text-anchor="middle">实际值</text>
    <rect x="436" y="222" width="220" height="46" rx="7" fill="#eafaf1" stroke="#b8e6cd" filter="url(#soft)"/>
    <text x="546" y="242" font-size="10" font-weight="600" fill="#1c6b45" text-anchor="middle">backlen（本 entry 自身长度）</text>
    <text x="546" y="258" font-size="8.5" fill="#3a9b6e" text-anchor="middle">用于从尾向头反向遍历</text>
    <path d="M656 245 C 700 245 700 300 620 300 L 250 300" fill="none" stroke="#2dd4a7" stroke-width="1.4" marker-end="url(#ar)"/>
    <text x="440" y="316" font-size="9" fill="#1c6b45" text-anchor="middle">反向遍历：读 backlen 即可跳回上一个 entry 头</text>
  </g>

  <!-- ziplist vs listpack -->
  <text x="40" y="360" font-size="11" font-weight="700" fill="#c02a56">为何取代 ziplist：消除级联更新（cascading update）</text>
  <rect x="60" y="374" width="430" height="120" rx="10" fill="#fdeef2" stroke="#f6c9d6"/>
  <text x="80" y="398" font-size="10.5" font-weight="600" fill="#c02a56">ziplist（旧）：entry 存"前一个的长度" prevlen</text>
  <text x="80" y="420" font-size="9.5" fill="#88304a">插入/删除令某 entry 长度跨过编码边界（1B↔5B）</text>
  <text x="80" y="440" font-size="9.5" fill="#88304a">→ 后一个的 prevlen 字段被迫变长 → 再触发下一个…</text>
  <text x="80" y="460" font-size="9.5" fill="#88304a">→ <tspan font-weight="600">连锁重排，最坏 O(n²)</tspan></text>
  <text x="80" y="482" font-size="9" fill="#a1a1a6">典型触发：一批临界长度（253~256B）的元素相邻</text>

  <rect x="510" y="374" width="450" height="120" rx="10" fill="#eafaf1" stroke="#b8e6cd"/>
  <text x="530" y="398" font-size="10.5" font-weight="600" fill="#1c6b45">listpack（新）：entry 只存"自己的长度" backlen</text>
  <text x="530" y="420" font-size="9.5" fill="#2f7a56">每个 entry 的长度字段与"邻居"无关</text>
  <text x="530" y="440" font-size="9.5" fill="#2f7a56">插入/删除只影响本 entry + 头部计数</text>
  <text x="530" y="460" font-size="9.5" fill="#2f7a56">→ <tspan font-weight="600">无连锁，从根本上消除级联更新</tspan></text>
  <text x="530" y="482" font-size="9" fill="#3a9b6e">反向遍历能力不减：backlen 同样支持从尾往头</text>
</svg>
