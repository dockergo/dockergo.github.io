<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="470" viewBox="0 0 1000 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">过期回收：惰性（命令路径）+ 定期（后台采样）双机制</text>
  <text x="30" y="49" font-size="10.5" fill="#a1a1a6">TTL 键存 db-&gt;expires 独立 kvstore；不为每键起定时器（省内存/CPU）</text>

  <!-- lazy -->
  <rect x="30" y="76" width="450" height="170" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="50" y="100" font-size="12" font-weight="700" fill="#1b2a4a">① 惰性过期（前台，访问时）</text>
  <g text-anchor="middle" font-size="9.5">
    <rect x="50" y="114" width="120" height="40" rx="7" fill="#fff" stroke="#cfe0f2"/><text x="110" y="132" fill="#1b2a4a">GET key</text><text x="110" y="146" fill="#5b7db1" font-size="8.5">任意读命令</text>
    <rect x="190" y="114" width="130" height="40" rx="7" fill="#fff" stroke="#cfe0f2"/><text x="255" y="132" fill="#1b2a4a">expireIfNeeded</text>
    <rect x="340" y="114" width="120" height="40" rx="7" fill="#fdeef2" stroke="#f6c9d6"/><text x="400" y="132" fill="#c02a56">now &gt; when?</text><text x="400" y="146" fill="#c02a56" font-size="8.5">是→删+传播</text>
  </g>
  <line x1="170" y1="134" x2="188" y2="134" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="320" y1="134" x2="338" y2="134" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="255" y="182" font-size="9.5" fill="#5b7db1" text-anchor="middle">优点：零额外开销，只在访问时判定</text>
  <text x="255" y="202" font-size="9.5" fill="#88304a" text-anchor="middle">缺点：冷键过期后长期占内存（不访问就不删）</text>
  <text x="255" y="228" font-size="9" fill="#8ba7cc" text-anchor="middle">→ 需要定期过期兜底</text>

  <!-- active -->
  <rect x="520" y="76" width="450" height="170" rx="12" fill="#eafaf1" stroke="#b8e6cd" filter="url(#soft)"/>
  <text x="540" y="100" font-size="12" font-weight="700" fill="#1c6b45">② 定期过期（后台，采样删）activeExpireCycle</text>
  <text x="540" y="122" font-size="9.5" fill="#1c6b45">serverCron 每 100ms 跑 SLOW；beforeSleep 跑 FAST</text>
  <g font-size="9.5" fill="#2f7a56">
    <text x="540" y="144">· 每 db 采样 20 个 TTL 键（KEYS_PER_LOOP）</text>
    <text x="540" y="164">· 过期比例 &gt; 10% → 继续下一批（自适应）</text>
    <text x="540" y="184">· SLOW 最多用 25% 的 hz-tick 时间片</text>
    <text x="540" y="204">· active-expire-effort（1~10）放大力度</text>
  </g>
  

  <!-- adaptive loop illustration -->
  <text x="40" y="284" font-size="11" font-weight="700" fill="#7a5a1e">定期过期的自适应循环（为何按过期比例决定是否继续）</text>
  <rect x="30" y="298" width="940" height="130" rx="10" fill="#fdf9f0" stroke="#efe3cd"/>
  <g text-anchor="middle" font-size="9.5">
    <rect x="60" y="322" width="150" height="44" rx="8" fill="#fff" stroke="#f0d9b5"/><text x="135" y="341" fill="#7a5a1e">采样 20 个 TTL 键</text><text x="135" y="356" fill="#b08535" font-size="8.5">删除其中已过期的</text>
    <rect x="280" y="322" width="180" height="44" rx="8" fill="#fff" stroke="#f0d9b5"/><text x="370" y="341" fill="#7a5a1e">过期比例 &gt; 10%?</text><text x="370" y="356" fill="#b08535" font-size="8.5">expired/sampled</text>
    <rect x="530" y="308" width="150" height="34" rx="8" fill="#eafaf1" stroke="#b8e6cd"/><text x="605" y="329" fill="#1c6b45">是 → 再采一批</text>
    <rect x="530" y="352" width="150" height="34" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="605" y="373" fill="#1b2a4a">否 → 本轮结束</text>
    <rect x="730" y="322" width="200" height="44" rx="8" fill="#fdeef2" stroke="#f6c9d6"/><text x="830" y="341" fill="#c02a56">或耗尽 25% 时间片</text><text x="830" y="356" fill="#c02a56" font-size="8.5">强制退出（保命令延迟）</text>
  </g>
  <line x1="210" y1="344" x2="278" y2="344" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="460" y1="332" x2="528" y2="326" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="460" y1="356" x2="528" y2="368" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <path d="M605 342 C 605 300 135 296 135 320" fill="none" stroke="#2dd4a7" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <line x1="680" y1="344" x2="728" y2="344" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="400" y="414" font-size="9.5" fill="#7a5a1e" text-anchor="middle">意义：过期键多时多删几批快速回收，过期键少时早停不空耗 CPU —— 反馈即控制</text>

  <rect x="30" y="440" width="940" height="24" rx="7" fill="#f7f7f9" stroke="#ececef"/>
  <text x="500" y="456" font-size="9.5" fill="#4a4a4f" text-anchor="middle">两者互补：惰性省 CPU 但漏冷键，定期兜底但受时间片约束 —— 合起来近似"及时且低开销"</text>
</svg>
