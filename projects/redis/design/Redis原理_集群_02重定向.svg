<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="450" viewBox="0 0 1000 450" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="450" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">请求路由：MOVED（永久）vs ASK（迁移临时）重定向</text>
  <text x="30" y="49" font-size="10.5" fill="#a1a1a6">客户端把命令发到不持有该槽的节点时，集群用重定向纠正</text>

  <!-- MOVED -->
  <rect x="30" y="72" width="460" height="170" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="50" y="96" font-size="12" font-weight="700" fill="#1b2a4a">MOVED：槽稳定属于另一节点（永久纠正）</text>
  <g text-anchor="middle" font-size="9">
    <rect x="50" y="110" width="110" height="40" rx="7" fill="#fff" stroke="#cfe0f2"/><text x="105" y="128" fill="#1b2a4a">客户端</text><text x="105" y="142" fill="#5b7db1" font-size="8">GET foo → 节点A</text>
    <rect x="190" y="110" width="130" height="40" rx="7" fill="#fdeef2" stroke="#f6c9d6"/><text x="255" y="128" fill="#c02a56">A：不持此槽</text><text x="255" y="142" fill="#c02a56" font-size="8">-MOVED 866 B:6380</text>
    <rect x="350" y="110" width="120" height="40" rx="7" fill="#eafaf1" stroke="#b8e6cd"/><text x="410" y="128" fill="#1c6b45">重发到 B</text><text x="410" y="142" fill="#3a9b6e" font-size="8">命中</text>
  </g>
  <line x1="160" y1="130" x2="188" y2="130" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="320" y1="130" x2="348" y2="130" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="255" y="176" font-size="9.5" fill="#1b2a4a" text-anchor="middle">客户端更新本地槽表：槽 866 → B</text>
  <text x="255" y="196" font-size="9.5" fill="#5b7db1" text-anchor="middle">以后对槽 866 的命令直接发 B（不再走 A）</text>
  <text x="255" y="218" font-size="9" fill="#8ba7cc" text-anchor="middle">n != myself 时返回 · 永久性</text>

  <!-- ASK -->
  <rect x="510" y="72" width="460" height="170" rx="12" fill="#fdf3e5" stroke="#f0d9b5" filter="url(#soft)"/>
  <text x="530" y="96" font-size="12" font-weight="700" fill="#7a5a1e">ASK：槽正在迁移中（本次临时重定向）</text>
  <g text-anchor="middle" font-size="9">
    <rect x="530" y="110" width="110" height="40" rx="7" fill="#fff" stroke="#f0d9b5"/><text x="585" y="128" fill="#7a5a1e">客户端</text><text x="585" y="142" fill="#b08535" font-size="8">GET bar → A(源)</text>
    <rect x="670" y="110" width="130" height="40" rx="7" fill="#fdeef2" stroke="#f6c9d6"/><text x="735" y="126" fill="#c02a56">A:key 已迁走</text><text x="735" y="140" fill="#c02a56" font-size="8">-ASK 300 B:6380</text>
    <rect x="820" y="110" width="130" height="40" rx="7" fill="#eafaf1" stroke="#b8e6cd"/><text x="885" y="126" fill="#1c6b45">ASKING+重发 B</text><text x="885" y="140" fill="#3a9b6e" font-size="8">本次到目标</text>
  </g>
  <line x1="640" y1="130" x2="668" y2="130" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="800" y1="130" x2="818" y2="130" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="740" y="176" font-size="9.5" fill="#7a5a1e" text-anchor="middle">客户端不更新槽表（迁移未完成）</text>
  <text x="740" y="196" font-size="9.5" fill="#b08535" text-anchor="middle">仅本次带 ASKING 前缀发目标节点</text>
  <text x="740" y="218" font-size="9" fill="#c79a4e" text-anchor="middle">migrating_slot &amp;&amp; missing_keys · 临时性</text>

  <!-- migration process -->
  <text x="40" y="278" font-size="11" font-weight="700" fill="#1d1d1f">槽迁移流程（CLUSTER SETSLOT）</text>
  <g text-anchor="middle" font-size="9.5">
    <rect x="60" y="292" width="200" height="46" rx="8" fill="#fdf3e5" stroke="#f0d9b5"/><text x="160" y="311" fill="#7a5a1e">源标 MIGRATING</text><text x="160" y="327" fill="#b08535" font-size="8.5">目标标 IMPORTING</text>
    <rect x="300" y="292" width="200" height="46" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="400" y="311" fill="#1b2a4a">逐 key MIGRATE</text><text x="400" y="327" fill="#5b7db1" font-size="8.5">一个个搬到目标</text>
    <rect x="540" y="292" width="200" height="46" rx="8" fill="#eafaf1" stroke="#b8e6cd"/><text x="640" y="311" fill="#1c6b45">SETSLOT NODE</text><text x="640" y="327" fill="#3a9b6e" font-size="8.5">正式转移归属</text>
    <rect x="780" y="292" width="180" height="46" rx="8" fill="#f6f0fb" stroke="#dcc6ee"/><text x="870" y="311" fill="#5a2a82">广播新归属</text><text x="870" y="327" fill="#8a5cae" font-size="8.5">后续走 MOVED</text>
  </g>
  <line x1="260" y1="315" x2="298" y2="315" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="500" y1="315" x2="538" y2="315" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="740" y1="315" x2="778" y2="315" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>

  <rect x="40" y="356" width="920" height="80" rx="10" fill="#f7f7f9" stroke="#ececef"/>
  <text x="60" y="380" font-size="10.5" font-weight="600" fill="#1d1d1f">迁移期间为何要 ASK 而非 MOVED</text>
  <text x="60" y="402" font-size="10" fill="#4a4a4f">槽还没完全迁完 → 归属未定，不能让客户端永久更新槽表（会把还在源的 key 也发错）</text>
  <text x="60" y="422" font-size="10" fill="#4a4a4f">ASK 只说"这个 key 已经在目标了，本次去那儿"，迁移完成后再由 SETSLOT NODE + MOVED 永久固化</text>
</svg>
