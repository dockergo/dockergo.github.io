<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="420" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">String 命令族与原子计数</text>
  <text x="30" y="49" font-size="10.5" fill="#a1a1a6">单线程执行 → INCR 等计数天然原子，无需加锁</text>

  <!-- command groups -->
  <rect x="30" y="72" width="300" height="150" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="50" y="96" font-size="11" font-weight="700" fill="#1b2a4a">读写</text>
  <g font-size="9.5" fill="#5b7db1">
    <text x="50" y="120">SET / GET / GETSET</text>
    <text x="50" y="140">SETEX（带过期）</text>
    <text x="50" y="160">SETNX（不存在才设 → 锁基础）</text>
    <text x="50" y="180">MSET / MGET（批量）</text>
    <text x="50" y="204" font-size="8.5" fill="#8ba7cc">SET k v NX EX 30 = 原子"设值+过期+不覆盖"</text>
  </g>

  <rect x="350" y="72" width="300" height="150" rx="12" fill="#eafaf1" stroke="#b8e6cd" filter="url(#soft)"/>
  <text x="370" y="96" font-size="11" font-weight="700" fill="#1c6b45">原子计数</text>
  <g font-size="9.5" fill="#3a9b6e">
    <text x="370" y="120">INCR / DECR（±1）</text>
    <text x="370" y="140">INCRBY / DECRBY（±N）</text>
    <text x="370" y="160">INCRBYFLOAT（浮点）</text>
    <text x="370" y="184" font-size="8.5" fill="#5cb88a">int 编码下直接算术运算</text>
    <text x="370" y="202" font-size="8.5" fill="#5cb88a">用途：计数器 / 限流 / 分布式 ID</text>
  </g>

  <rect x="670" y="72" width="300" height="150" rx="12" fill="#fdf3e5" stroke="#f0d9b5" filter="url(#soft)"/>
  <text x="690" y="96" font-size="11" font-weight="700" fill="#7a5a1e">子串 / 长度</text>
  <g font-size="9.5" fill="#b08535">
    <text x="690" y="120">GETRANGE（按字节读子串）</text>
    <text x="690" y="140">SETRANGE（按偏移写）</text>
    <text x="690" y="160">APPEND（追加 → 触发 raw）</text>
    <text x="690" y="180">STRLEN（字节长度）</text>
    <text x="690" y="204" font-size="8.5" fill="#c79a4e">二进制安全，可存任意字节序列</text>
  </g>

  <!-- atomic counter illustration -->
  <text x="40" y="258" font-size="11" font-weight="700" fill="#1c6b45">为何 INCR 无需加锁：单线程串行 = 天然原子</text>
  <g text-anchor="middle" font-size="9">
    <rect x="60" y="272" width="150" height="46" rx="8" fill="#fff" stroke="#bcd0ec"/><text x="135" y="291" fill="#1b2a4a">客户端A INCR c</text><text x="135" y="307" fill="#5b7db1" font-size="8">同时到达</text>
    <rect x="60" y="326" width="150" height="46" rx="8" fill="#fff" stroke="#bcd0ec"/><text x="135" y="345" fill="#1b2a4a">客户端B INCR c</text><text x="135" y="361" fill="#5b7db1" font-size="8">同时到达</text>
    <rect x="270" y="298" width="200" height="46" rx="8" fill="#eafaf1" stroke="#b8e6cd"/><text x="370" y="317" fill="#1c6b45">主线程串行执行</text><text x="370" y="333" fill="#3a9b6e" font-size="8">一个接一个，绝不交错</text>
    <rect x="530" y="298" width="200" height="46" rx="8" fill="#eafaf1" stroke="#b8e6cd"/><text x="630" y="317" fill="#1c6b45">c: 5 → 6 → 7</text><text x="630" y="333" fill="#3a9b6e" font-size="8">无丢失更新</text>
  </g>
  <line x1="210" y1="295" x2="268" y2="312" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="210" y1="349" x2="268" y2="330" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="470" y1="321" x2="528" y2="321" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="800" y="317" font-size="9" fill="#3a9b6e">对比多线程：读-改-写需 CAS/锁</text>
  <text x="800" y="333" font-size="9" fill="#5cb88a">Redis 单线程免去这一切</text>

  <rect x="40" y="384" width="920" height="22" rx="6" fill="#f7f7f9" stroke="#ececef"/>
  <text x="500" y="399" font-size="9.5" fill="#4a4a4f" text-anchor="middle">要点:任何单个 Redis 命令都是原子的 —— 这是"单线程执行"的直接推论,String 计数只是最典型的受益者</text>
</svg>
