<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="580" viewBox="0 0 1080 580" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="aHot" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="aState" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c99a3a"/></marker>
    <marker id="aCtl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
    <marker id="aBg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8a5cae"/></marker>
  </defs>
  <rect width="1080" height="580" fill="#fbfbfd"/>

  <!-- ===== 标题带 ===== -->
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Redis 总架构 · 多视角透视：单线程事件循环守着一张内存大 dict</text>
  <text x="30" y="47" font-size="10.5" fill="#6e6e73">分层脊：接入（Reactor）→ 命令执行（单线程）→ 数据结构 → 持久化 → 复制 / 集群　源码基准 unstable</text>

  <!-- ===== 图例：四型语义路径 ===== -->
  <line x1="40" y1="66" x2="70" y2="66" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aHot)"/>
  <text x="76" y="70" font-size="10.5" fill="#3a3a3c">命令热数据流 Hot</text>
  <line x1="238" y1="66" x2="268" y2="66" stroke="#c99a3a" stroke-width="1.8" marker-end="url(#aState)"/>
  <text x="274" y="70" font-size="10.5" fill="#3a3a3c">持久化落盘 State（RDB/AOF）</text>
  <line x1="516" y1="66" x2="546" y2="66" stroke="#5b7db1" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aCtl)"/>
  <text x="552" y="70" font-size="10.5" fill="#3a3a3c">复制 / 集群传播 Control（虚线）</text>
  <line x1="800" y1="66" x2="830" y2="66" stroke="#8a5cae" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aBg)"/>
  <text x="836" y="70" font-size="10.5" fill="#3a3a3c">后台旁路 bio/fork/cron（虚线）</text>
  <text x="1056" y="70" font-size="10" fill="#a1a1a6" text-anchor="end">框 = 主线可下钻</text>

  <!-- ===== 接入层（net） ===== -->
  <rect x="24" y="84" width="1032" height="86" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)" data-tid="net" data-lab="接入层/事件循环"/>
  <text x="40" y="104" font-size="12" font-weight="600" fill="#1b2a4a">接入层 · 单线程事件循环（Reactor）</text>
  <g text-anchor="middle" font-size="10">
    <rect x="40" y="116" width="190" height="46" rx="9" fill="#fff" stroke="#cfe0f2"/><text x="135" y="138" fill="#1b2a4a" font-weight="600">ae 事件循环</text><text x="135" y="154" fill="#5b7db1" font-size="9">epoll 多路复用</text>
    <rect x="246" y="116" width="180" height="46" rx="9" fill="#fff" stroke="#cfe0f2"/><text x="336" y="138" fill="#1b2a4a" font-weight="600">RESP 编解码</text><text x="336" y="154" fill="#5b7db1" font-size="9">RESP2/3 协议</text>
    <rect x="442" y="116" width="180" height="46" rx="9" fill="#fff" stroke="#cfe0f2"/><text x="532" y="138" fill="#1b2a4a" font-weight="600">命令表分派</text><text x="532" y="154" fill="#5b7db1" font-size="9">查表 → proc</text>
    <rect x="638" y="116" width="170" height="46" rx="9" fill="#eafaf1" stroke="#b8e6cd"/><text x="723" y="138" fill="#1c6b45" font-weight="600">call 中枢</text><text x="723" y="154" fill="#3a9b6e" font-size="9">执行 · 统计 · 传播</text>
    <rect x="824" y="116" width="216" height="46" rx="9" fill="#f6f0fb" stroke="#dcc6ee"/><text x="932" y="138" fill="#5a2a82" font-weight="600">IO 线程（可选）</text><text x="932" y="154" fill="#8a5cae" font-size="9">并行读写 · 不执行命令</text>
  </g>

  <!-- ===== 数据层（object + 类型 chips） ===== -->
  <rect x="24" y="182" width="1032" height="118" rx="14" fill="#fdf3e5" stroke="#f0d9b5" filter="url(#soft)"/>
  <text x="40" y="202" font-size="12" font-weight="600" fill="#7a5a1e">数据层 · 键空间 dict + redisObject（内存核心）</text>
  <rect x="40" y="214" width="300" height="76" rx="9" fill="#fff" stroke="#f0d9b5" data-tid="object" data-lab="键空间dict/对象编码"/>
  <text x="190" y="240" font-size="10.5" font-weight="600" fill="#7a5a1e" text-anchor="middle">键空间 dict</text>
  <text x="190" y="258" font-size="9" fill="#b08535" text-anchor="middle">key → redisObject</text>
  <text x="190" y="276" font-size="9" fill="#b08535" text-anchor="middle">渐进式 rehash · 独立 expires</text>
  <rect x="356" y="214" width="684" height="76" rx="9" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="698" y="232" font-size="9.5" font-weight="600" fill="#7a5a1e" text-anchor="middle">value = 类型对象 · 按规模自动选底层编码</text>
  <g text-anchor="middle" font-size="9">
    <rect x="368" y="244" width="104" height="40" rx="7" fill="#fff" stroke="#f0d9b5" data-tid="string" data-lab="String"/><text x="420" y="262" fill="#7a5a1e" font-weight="600">String</text><text x="420" y="277" fill="#b08535" font-size="8">int·embstr·raw</text>
    <rect x="478" y="244" width="104" height="40" rx="7" fill="#fff" stroke="#f0d9b5" data-tid="hash" data-lab="Hash"/><text x="530" y="262" fill="#7a5a1e" font-weight="600">Hash</text><text x="530" y="277" fill="#b08535" font-size="8">listpack·ht</text>
    <rect x="588" y="244" width="96" height="40" rx="7" fill="#fff" stroke="#f0d9b5" data-tid="list" data-lab="List"/><text x="636" y="262" fill="#7a5a1e" font-weight="600">List</text><text x="636" y="277" fill="#b08535" font-size="8">quicklist</text>
    <rect x="690" y="244" width="118" height="40" rx="7" fill="#fff" stroke="#f0d9b5" data-tid="setzset" data-lab="ZSet"/><text x="749" y="262" fill="#7a5a1e" font-weight="600">ZSet</text><text x="749" y="277" fill="#b08535" font-size="8">listpack·skiplist</text>
    <rect x="814" y="244" width="96" height="40" rx="7" fill="#fff" stroke="#f0d9b5" data-tid="setzset" data-lab="Set"/><text x="862" y="262" fill="#7a5a1e" font-weight="600">Set</text><text x="862" y="277" fill="#b08535" font-size="8">intset·ht</text>
    <rect x="916" y="244" width="118" height="40" rx="7" fill="#fff" stroke="#f0d9b5" data-tid="stream" data-lab="Stream"/><text x="975" y="262" fill="#7a5a1e" font-weight="600">Stream</text><text x="975" y="277" fill="#b08535" font-size="8">rax·listpack</text>
  </g>

  <!-- ===== 保障层 ===== -->
  <rect x="24" y="312" width="1032" height="108" rx="14" fill="#eafaf1" stroke="#b8e6cd" filter="url(#soft)"/>
  <text x="40" y="332" font-size="12" font-weight="600" fill="#1c6b45">保障层 · 内存 / 持久化 / 复制 / 集群（后台线程或子进程）</text>
  <g text-anchor="middle" font-size="10">
    <rect x="40" y="344" width="236" height="64" rx="9" fill="#fff" stroke="#b8e6cd" data-tid="mem" data-lab="内存管理/过期淘汰"/><text x="158" y="374" fill="#1c6b45" font-weight="600">内存管理</text><text x="158" y="392" fill="#3a9b6e" font-size="9">过期 · LRU/LFU 淘汰</text>
    <rect x="288" y="344" width="236" height="64" rx="9" fill="#fdf3e5" stroke="#f0d9b5" data-tid="rdb" data-lab="持久化RDB/AOF"/><text x="406" y="374" fill="#7a5a1e" font-weight="600">持久化 RDB/AOF</text><text x="406" y="392" fill="#b08535" font-size="9">fork 快照 · 日志追加</text>
    <rect x="536" y="344" width="236" height="64" rx="9" fill="#eef3fb" stroke="#bcd0ec" data-tid="repl" data-lab="复制"/><text x="654" y="374" fill="#1b2a4a" font-weight="600">复制</text><text x="654" y="392" fill="#5b7db1" font-size="9">PSYNC 全量 / 部分</text>
    <rect x="784" y="344" width="256" height="64" rx="9" fill="#f6f0fb" stroke="#dcc6ee" data-tid="cluster" data-lab="集群与高可用"/><text x="912" y="374" fill="#5a2a82" font-weight="600">集群与高可用</text><text x="912" y="392" fill="#8a5cae" font-size="9">16384 槽 · Gossip</text>
  </g>

  <!-- ===== 后台执行体 ===== -->
  <rect x="24" y="432" width="1032" height="96" rx="14" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="40" y="452" font-size="11" font-weight="600" fill="#7a5a1e">后台执行体 · 不阻塞主线程命令执行</text>
  <g text-anchor="middle" font-size="9.5">
    <rect x="40" y="462" width="236" height="56" rx="9" fill="#fff" stroke="#efe3cd" data-tid="aof" data-lab="bio线程/AOF fsync"/><text x="158" y="488" fill="#7a5a1e" font-weight="600">bio 线程</text><text x="158" y="505" fill="#b08535" font-size="8.5">AOF fsync · lazyfree</text>
    <rect x="288" y="462" width="236" height="56" rx="9" fill="#fff" stroke="#efe3cd" data-tid="rdb" data-lab="fork子进程/BGSAVE"/><text x="406" y="488" fill="#7a5a1e" font-weight="600">fork 子进程</text><text x="406" y="505" fill="#b08535" font-size="8.5">BGSAVE · AOF 重写</text>
    <rect x="536" y="462" width="236" height="56" rx="9" fill="#fff" stroke="#efe3cd" data-tid="mem" data-lab="serverCron"/><text x="654" y="488" fill="#7a5a1e" font-weight="600">serverCron（hz=10）</text><text x="654" y="505" fill="#b08535" font-size="8.5">定期过期 · rehash</text>
    <rect x="784" y="462" width="256" height="56" rx="9" fill="#fff" stroke="#efe3cd" data-tid="repl" data-lab="命令传播propagate"/><text x="912" y="488" fill="#7a5a1e" font-weight="600">命令传播 propagate</text><text x="912" y="505" fill="#b08535" font-size="8.5">→ AOF 缓冲 + 复制流</text>
  </g>

  <!-- ===== 语义分型连线 ===== -->
  <!-- Hot：接入 → 数据 -->
  <line x1="300" y1="170" x2="300" y2="182" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aHot)"/>
  <!-- State：数据 → 保障（落盘） -->
  <line x1="380" y1="300" x2="380" y2="312" stroke="#c99a3a" stroke-width="1.8" marker-end="url(#aState)"/>
  <!-- Control：数据 → 保障（复制 / 集群） -->
  <line x1="700" y1="300" x2="700" y2="312" stroke="#5b7db1" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aCtl)"/>
  <!-- 保障 → 后台旁路 -->
  <line x1="158" y1="408" x2="158" y2="462" stroke="#8a5cae" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aBg)"/>
  <line x1="406" y1="408" x2="406" y2="462" stroke="#c99a3a" stroke-width="1.8" marker-end="url(#aState)"/>
  <line x1="654" y1="408" x2="654" y2="462" stroke="#8a5cae" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aBg)"/>
  <line x1="912" y1="408" x2="912" y2="462" stroke="#5b7db1" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aCtl)"/>

  <!-- ===== 读法 ===== -->
  <rect x="24" y="540" width="1032" height="30" rx="8" fill="#f7f7f9" stroke="#ececef"/>
  <text x="540" y="559" font-size="10" fill="#4a4a4f" text-anchor="middle">读法：命令经接入层进主线程 call → 改数据层内存 dict → propagate 把写效果分发到 AOF / 复制，fork 子进程做 RDB，内存不足时后台淘汰</text>
</svg>
