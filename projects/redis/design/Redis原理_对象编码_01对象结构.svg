<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">redisObject：逻辑类型（type）与底层编码（encoding）分离</text>
  <text x="30" y="49" font-size="10.5" fill="#a1a1a6">键空间 dict：key（sds）→ redisObject；一种 type 可对应多种 encoding，随规模切换</text>

  <!-- keyspace dict -->
  <rect x="40" y="80" width="200" height="360" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="140" y="104" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">键空间 dict（db-&gt;keys）</text>
  <g text-anchor="middle" font-size="10">
    <rect x="60" y="120" width="160" height="34" rx="7" fill="#fff" stroke="#cfe0f2"/><text x="140" y="141" fill="#1b2a4a">"user:1" → robj</text>
    <rect x="60" y="162" width="160" height="34" rx="7" fill="#fff" stroke="#cfe0f2"/><text x="140" y="183" fill="#1b2a4a">"counter" → robj</text>
    <rect x="60" y="204" width="160" height="34" rx="7" fill="#fff" stroke="#cfe0f2"/><text x="140" y="225" fill="#1b2a4a">"ranking" → robj</text>
  </g>
  <text x="140" y="270" font-size="9" fill="#5b7db1" text-anchor="middle">key 是 sds 字符串</text>
  <text x="140" y="286" font-size="9" fill="#5b7db1" text-anchor="middle">value 统一是 redisObject 指针</text>

  <!-- redisObject struct -->
  <rect x="330" y="80" width="300" height="360" rx="12" fill="#fdf3e5" stroke="#f0d9b5" filter="url(#soft)"/>
  <text x="480" y="104" font-size="12" font-weight="600" fill="#7a5a1e" text-anchor="middle">redisObject</text>
  <g font-size="10.5">
    <rect x="350" y="118" width="260" height="40" rx="7" fill="#fff" stroke="#f0d9b5"/>
    <text x="362" y="135" fill="#1d1d1f"><tspan font-weight="600">type:4</tspan> 逻辑类型</text>
    <text x="362" y="150" fill="#86868b" font-size="9">OBJ_STRING/LIST/SET/ZSET/HASH/STREAM</text>
    <rect x="350" y="164" width="260" height="40" rx="7" fill="#fff" stroke="#f0d9b5"/>
    <text x="362" y="181" fill="#1d1d1f"><tspan font-weight="600">encoding:4</tspan> 底层编码</text>
    <text x="362" y="196" fill="#86868b" font-size="9">int/embstr/raw/listpack/ht/skiplist…</text>
    <rect x="350" y="210" width="260" height="36" rx="7" fill="#fff" stroke="#f0d9b5"/>
    <text x="362" y="232" fill="#1d1d1f"><tspan font-weight="600">lru:24</tspan> LRU 时钟 / LFU 计数（复用）</text>
    <rect x="350" y="252" width="260" height="34" rx="7" fill="#fff" stroke="#f0d9b5"/>
    <text x="362" y="273" fill="#1d1d1f"><tspan font-weight="600">refcount</tspan> 引用计数（共享对象）</text>
    <rect x="350" y="292" width="260" height="36" rx="7" fill="#eafaf1" stroke="#b8e6cd"/>
    <text x="362" y="314" fill="#1c6b45"><tspan font-weight="600">*ptr</tspan> → 指向真实数据结构 ↓</text>
  </g>
  <text x="480" y="360" font-size="9.5" fill="#b08535" text-anchor="middle">命令看 type 分派逻辑</text>
  <text x="480" y="376" font-size="9.5" fill="#b08535" text-anchor="middle">内存看 encoding 决定布局</text>

  <!-- underlying encodings -->
  <rect x="720" y="80" width="240" height="360" rx="12" fill="#eafaf1" stroke="#b8e6cd" filter="url(#soft)"/>
  <text x="840" y="104" font-size="12" font-weight="600" fill="#1c6b45" text-anchor="middle">底层数据结构</text>
  <g text-anchor="middle" font-size="10">
    <rect x="740" y="118" width="200" height="30" rx="7" fill="#fff" stroke="#b8e6cd"/><text x="840" y="137" fill="#1c6b45">sds（字符串）</text>
    <rect x="740" y="154" width="200" height="30" rx="7" fill="#fff" stroke="#b8e6cd"/><text x="840" y="173" fill="#1c6b45">listpack（紧凑连续）</text>
    <rect x="740" y="190" width="200" height="30" rx="7" fill="#fff" stroke="#b8e6cd"/><text x="840" y="209" fill="#1c6b45">dict / hashtable</text>
    <rect x="740" y="226" width="200" height="30" rx="7" fill="#fff" stroke="#b8e6cd"/><text x="840" y="245" fill="#1c6b45">skiplist（有序）</text>
    <rect x="740" y="262" width="200" height="30" rx="7" fill="#fff" stroke="#b8e6cd"/><text x="840" y="281" fill="#1c6b45">quicklist（listpack 链）</text>
    <rect x="740" y="298" width="200" height="30" rx="7" fill="#fff" stroke="#b8e6cd"/><text x="840" y="317" fill="#1c6b45">intset（有序整数数组）</text>
    <rect x="740" y="334" width="200" height="30" rx="7" fill="#fff" stroke="#b8e6cd"/><text x="840" y="353" fill="#1c6b45">rax（Stream 基数树）</text>
  </g>

  <!-- arrows -->
  <line x1="240" y1="180" x2="326" y2="180" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="630" y1="310" x2="716" y2="240" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>

  <rect x="40" y="456" width="920" height="30" rx="8" fill="#f7f7f9" stroke="#ececef"/>
  <text x="500" y="475" font-size="10" fill="#4a4a4f" text-anchor="middle">要点：type/encoding 分离让"用户语义"与"内存效率"解耦——同一个 ZSet，元素少时是 listpack，多时自动变 skiplist+dict，命令行为不变</text>
</svg>
