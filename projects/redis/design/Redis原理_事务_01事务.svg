<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="470" viewBox="0 0 1000 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">事务：MULTI 排队 → EXEC 单线程连续执行；WATCH 乐观锁</text>
  <text x="30" y="49" font-size="10.5" fill="#a1a1a6">原子 = 不被打断，非可回滚；运行时错误不回滚其余命令</text>

  <!-- MULTI queue flow -->
  <text x="40" y="86" font-size="11" font-weight="700" fill="#1b2a4a">命令排队与执行</text>
  <g text-anchor="middle" font-size="9">
    <rect x="50" y="98" width="90" height="40" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="95" y="116" fill="#1b2a4a">MULTI</text><text x="95" y="130" fill="#5b7db1" font-size="8">开启事务</text>
    <rect x="160" y="98" width="110" height="40" rx="7" fill="#fff" stroke="#bcd0ec"/><text x="215" y="116" fill="#1b2a4a">SET a 1</text><text x="215" y="130" fill="#5b7db1" font-size="8">+QUEUED</text>
    <rect x="290" y="98" width="110" height="40" rx="7" fill="#fff" stroke="#bcd0ec"/><text x="345" y="116" fill="#1b2a4a">INCR b</text><text x="345" y="130" fill="#5b7db1" font-size="8">+QUEUED</text>
    <rect x="420" y="98" width="110" height="40" rx="7" fill="#fff" stroke="#bcd0ec"/><text x="475" y="116" fill="#1b2a4a">LPUSH c x</text><text x="475" y="130" fill="#5b7db1" font-size="8">+QUEUED</text>
    <rect x="560" y="98" width="90" height="40" rx="7" fill="#eafaf1" stroke="#b8e6cd"/><text x="605" y="116" fill="#1c6b45">EXEC</text><text x="605" y="130" fill="#3a9b6e" font-size="8">连续执行</text>
  </g>
  <line x1="140" y1="118" x2="158" y2="118" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="270" y1="118" x2="288" y2="118" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="400" y1="118" x2="418" y2="118" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="530" y1="118" x2="558" y2="118" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="700" y="114" font-size="9" fill="#3a9b6e">入队时置 CLIENT_MULTI</text>
  <text x="700" y="128" font-size="9" fill="#3a9b6e">命令存 mstate.commands[]</text>

  <text x="345" y="164" font-size="9" fill="#a1a1a6" text-anchor="middle">排队期间命令不执行，只校验命令是否存在（语法错→标 DIRTY_EXEC）</text>

  <!-- WATCH CAS -->
  <rect x="40" y="182" width="450" height="150" rx="10" fill="#f6f0fb" stroke="#dcc6ee"/>
  <text x="60" y="206" font-size="11" font-weight="600" fill="#5a2a82">WATCH 乐观锁（CAS）</text>
  <g font-size="9.5" fill="#8a5cae">
    <text x="60" y="228">1. WATCH balance（监视 key）</text>
    <text x="60" y="248">2. 读 balance，据此决定要做什么</text>
    <text x="60" y="268">3. MULTI … 命令 … EXEC</text>
    <text x="60" y="290" fill="#c02a56">若 balance 在 EXEC 前被别人改 → 标 DIRTY_CAS</text>
    <text x="60" y="310" fill="#c02a56">→ EXEC 返回 nil（放弃），客户端重试</text>
  </g>
  <text x="265" y="326" font-size="8.5" fill="#a884c8" text-anchor="middle">touchWatchedKey · 不加锁，冲突即失败</text>

  <!-- no rollback -->
  <rect x="510" y="182" width="450" height="150" rx="10" fill="#fdeef2" stroke="#f6c9d6"/>
  <text x="530" y="206" font-size="11" font-weight="600" fill="#c02a56">关键：无回滚</text>
  <g font-size="9.5" fill="#88304a">
    <text x="530" y="228">EXEC 中若某命令运行时出错（如对 String 做 LPUSH）：</text>
    <text x="530" y="250" fill="#c02a56">· 该命令返回错误</text>
    <text x="530" y="270" fill="#c02a56">· 其余命令照常执行 —— 不回滚！</text>
    <text x="530" y="292">对比关系库"要么全成要么全滚"：Redis 没有</text>
    <text x="530" y="312">只有排队期语法错（DIRTY_EXEC）才整体 -EXECABORT</text>
  </g>

  <rect x="40" y="348" width="920" height="106" rx="10" fill="#f7f7f9" stroke="#ececef"/>
  <text x="60" y="372" font-size="11" font-weight="600" fill="#1d1d1f">两种错误路径</text>
  <text x="60" y="394" font-size="10" fill="#4a4a4f"><tspan font-weight="600">DIRTY_EXEC</tspan>（排队期错误：命令不存在/参数错）→ EXEC 整体拒绝 -EXECABORT，一条不执行</text>
  <text x="60" y="414" font-size="10" fill="#4a4a4f"><tspan font-weight="600">DIRTY_CAS</tspan>（WATCH 的 key 被改）→ EXEC 返回 nil，全部放弃，客户端应重试</text>
  <text x="60" y="436" font-size="10" fill="#4a4a4f">· 运行时错误（类型不匹配等）→ 不属于以上两类，该命令报错、其余照跑（无回滚）</text>
</svg>
