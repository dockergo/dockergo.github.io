<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="440" viewBox="0 0 1000 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">阻塞命令：把客户端从事件循环摘下，由就绪信号唤醒</text>
  <text x="30" y="49" font-size="10.5" fill="#a1a1a6">单线程如何支持 BLPOP 阻塞 —— 不是让线程 sleep，而是"挂起+精准唤醒"</text>

  <!-- block flow -->
  <text x="40" y="86" font-size="11" font-weight="700" fill="#5a2a82">① 阻塞：条件不满足时挂起客户端</text>
  <g text-anchor="middle" font-size="9.5">
    <rect x="60" y="98" width="150" height="50" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="135" y="119" fill="#1b2a4a">BLPOP mylist 0</text><text x="135" y="135" fill="#5b7db1" font-size="8.5">mylist 为空</text>
    <rect x="250" y="98" width="170" height="50" rx="8" fill="#f6f0fb" stroke="#dcc6ee"/><text x="335" y="119" fill="#5a2a82">blockClient</text><text x="335" y="135" fill="#8a5cae" font-size="8.5">置 CLIENT_BLOCKED</text>
    <rect x="460" y="98" width="200" height="50" rx="8" fill="#fdf3e5" stroke="#f0d9b5"/><text x="560" y="115" fill="#7a5a1e">登记 db-&gt;blocking_keys</text><text x="560" y="131" fill="#b08535" font-size="8.5">"哪个客户端等哪些 key"</text>
    <rect x="700" y="98" width="240" height="50" rx="8" fill="#eafaf1" stroke="#b8e6cd"/><text x="820" y="115" fill="#1c6b45">主线程继续服务其他客户端</text><text x="820" y="131" fill="#3a9b6e" font-size="8.5">不 sleep、不忙等、不阻塞 server</text>
  </g>
  <line x1="210" y1="123" x2="248" y2="123" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="420" y1="123" x2="458" y2="123" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="660" y1="123" x2="698" y2="123" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- wake flow -->
  <text x="40" y="192" font-size="11" font-weight="700" fill="#1c6b45">② 唤醒：另一客户端写入使 key 就绪</text>
  <g text-anchor="middle" font-size="9.5">
    <rect x="60" y="204" width="150" height="50" rx="8" fill="#eafaf1" stroke="#b8e6cd"/><text x="135" y="225" fill="#1c6b45">LPUSH mylist x</text><text x="135" y="241" fill="#3a9b6e" font-size="8.5">另一客户端写入</text>
    <rect x="250" y="204" width="180" height="50" rx="8" fill="#fdf3e5" stroke="#f0d9b5"/><text x="340" y="221" fill="#7a5a1e">signalKeyAsReady</text><text x="340" y="237" fill="#b08535" font-size="8.5">加入 server.ready_keys</text>
    <rect x="470" y="204" width="220" height="50" rx="8" fill="#f6f0fb" stroke="#dcc6ee"/><text x="580" y="221" fill="#5a2a82">handleClientsBlockedOnKeys</text><text x="580" y="237" fill="#8a5cae" font-size="8.5">命令执行后处理就绪队列</text>
    <rect x="730" y="204" width="210" height="50" rx="8" fill="#eafaf1" stroke="#b8e6cd"/><text x="835" y="221" fill="#1c6b45">唤醒 BLPOP 客户端</text><text x="835" y="237" fill="#3a9b6e" font-size="8.5">FIFO 公平，返回 [mylist, x]</text>
  </g>
  <line x1="210" y1="229" x2="248" y2="229" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="430" y1="229" x2="468" y2="229" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="690" y1="229" x2="728" y2="229" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- key insight -->
  <rect x="40" y="288" width="450" height="140" rx="10" fill="#f7f7f9" stroke="#ececef"/>
  <text x="60" y="312" font-size="11" font-weight="600" fill="#1d1d1f">为何单线程能"阻塞"</text>
  <text x="60" y="334" font-size="9.5" fill="#4a4a4f">阻塞的是"这个客户端"，不是"整个线程"：</text>
  <text x="60" y="354" font-size="9.5" fill="#4a4a4f">· 客户端被从事件循环摘下（不读它的输入）</text>
  <text x="60" y="374" font-size="9.5" fill="#4a4a4f">· 主线程照常处理其他所有客户端</text>
  <text x="60" y="394" font-size="9.5" fill="#4a4a4f">· 登记到"等待表"，写操作就绪时精准唤醒</text>
  <text x="60" y="416" font-size="9" fill="#86868b">对比 sleep：sleep 会卡死整个单线程 server</text>

  <!-- commands + timeout -->
  <rect x="510" y="288" width="450" height="140" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="530" y="312" font-size="11" font-weight="600" fill="#1b2a4a">阻塞命令家族与超时</text>
  <text x="530" y="334" font-size="9.5" fill="#5b7db1">· BLPOP / BRPOP / BLMOVE：等 List 有元素</text>
  <text x="530" y="354" font-size="9.5" fill="#5b7db1">· BZPOPMIN / BZPOPMAX：等 ZSet</text>
  <text x="530" y="374" font-size="9.5" fill="#5b7db1">· XREAD BLOCK：等 Stream 新消息</text>
  <text x="530" y="394" font-size="9.5" fill="#5b7db1">· WAIT / WAITAOF：等复制/AOF 确认（不等 key）</text>
  <text x="530" y="416" font-size="9" fill="#8ba7cc">带超时：到点由 serverCron 唤醒返回 nil；MULTI 内不阻塞（DENY_BLOCKING）</text>
</svg>
