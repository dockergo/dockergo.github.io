<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="430" viewBox="0 0 1000 430" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="430" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">混合持久化：base 用 RDB 格式 + incr 用 AOF 命令（aof-use-rdb-preamble，默认 yes）</text>
  <text x="30" y="49" font-size="10.5" fill="#a1a1a6">兼 RDB 恢复快/体积小 与 AOF 丢失少 之长</text>

  <!-- base = RDB -->
  <rect x="60" y="80" width="380" height="120" rx="10" fill="#fdf3e5" stroke="#f0d9b5" filter="url(#soft)"/>
  <text x="250" y="104" font-size="11" font-weight="700" fill="#7a5a1e" text-anchor="middle">base 部分 = RDB 二进制格式</text>
  <text x="250" y="126" font-size="9.5" fill="#b08535" text-anchor="middle">appendonly.aof.N.base.rdb</text>
  <text x="80" y="150" font-size="9.5" fill="#7a5a1e">· 重写时刻的全量数据，紧凑二进制</text>
  <text x="80" y="170" font-size="9.5" fill="#7a5a1e">· 加载时直接建数据结构（不重放命令）</text>
  <text x="80" y="190" font-size="9" fill="#c79a4e">→ 恢复快、体积小</text>

  <!-- incr = AOF -->
  <rect x="560" y="80" width="380" height="120" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="750" y="104" font-size="11" font-weight="700" fill="#1b2a4a" text-anchor="middle">incr 部分 = AOF 命令文本</text>
  <text x="750" y="126" font-size="9.5" fill="#5b7db1" text-anchor="middle">appendonly.aof.N.incr.aof</text>
  <text x="580" y="150" font-size="9.5" fill="#1b2a4a">· base 之后的增量写命令</text>
  <text x="580" y="170" font-size="9.5" fill="#1b2a4a">· everysec fsync，保留最近命令</text>
  <text x="580" y="190" font-size="9" fill="#8ba7cc">→ 丢失少（1 秒级）</text>

  <text x="500" y="145" font-size="18" fill="#a1a1a6" text-anchor="middle">+</text>

  <!-- load order -->
  <text x="40" y="240" font-size="11" font-weight="700" fill="#1d1d1f">加载恢复流程</text>
  <g text-anchor="middle" font-size="9.5">
    <rect x="60" y="254" width="200" height="50" rx="8" fill="#fdf3e5" stroke="#f0d9b5"/><text x="160" y="276" fill="#7a5a1e">① 加载 base（RDB）</text><text x="160" y="292" fill="#b08535" font-size="8.5">直接建结构，快</text>
    <rect x="320" y="254" width="200" height="50" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="420" y="276" fill="#1b2a4a">② 重放各 incr（AOF）</text><text x="420" y="292" fill="#5b7db1" font-size="8.5">补 base 之后的命令</text>
    <rect x="580" y="254" width="200" height="50" rx="8" fill="#eafaf1" stroke="#b8e6cd"/><text x="680" y="276" fill="#1c6b45">③ 得到最新数据集</text><text x="680" y="292" fill="#3a9b6e" font-size="8.5">丢失窗口 ≤1 秒</text>
  </g>
  <line x1="260" y1="279" x2="318" y2="279" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="520" y1="279" x2="578" y2="279" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- priority -->
  <rect x="820" y="254" width="140" height="50" rx="8" fill="#f6f0fb" stroke="#dcc6ee"/>
  <text x="890" y="274" font-size="9" font-weight="600" fill="#5a2a82" text-anchor="middle">启动优先级</text>
  <text x="890" y="292" font-size="8" fill="#8a5cae" text-anchor="middle">appendonly=yes</text>
  <text x="890" y="303" font-size="8" fill="#8a5cae" text-anchor="middle">→ 优先 AOF</text>

  <!-- comparison -->
  <rect x="40" y="330" width="920" height="90" rx="10" fill="#f7f7f9" stroke="#ececef"/>
  <text x="60" y="354" font-size="11" font-weight="600" fill="#1d1d1f">三种方案对比</text>
  <text x="60" y="376" font-size="10" fill="#4a4a4f">· 纯 RDB：恢复快、体积小，但丢两次快照间数据（分钟级）</text>
  <text x="60" y="396" font-size="10" fill="#4a4a4f">· 纯 AOF（无 preamble）：丢失少，但文件大、全靠重放命令恢复慢</text>
  <text x="60" y="414" font-size="10" fill="#1c6b45">· 混合（默认）：base 用 RDB 恢复快 + incr 用 AOF 丢失少 —— 生产推荐</text>
</svg>
