<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="440" viewBox="0 0 1000 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="1000" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">RDB 文件格式：紧凑二进制 + CRC64 校验</text>
  <text x="30" y="49" font-size="10.5" fill="#a1a1a6">RDB_VERSION=14；加载时校验 magic 与 CRC64</text>

  <!-- linear file layout -->
  <g text-anchor="middle" font-size="9.5">
    <rect x="40" y="80" width="120" height="60" rx="8" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="100" y="104" font-weight="600" fill="#1b2a4a">头 Header</text>
    <text x="100" y="122" fill="#5b7db1" font-size="8.5">"REDIS0014"</text>
    <text x="100" y="134" fill="#8ba7cc" font-size="8">magic+版本</text>

    <rect x="168" y="80" width="120" height="60" rx="8" fill="#fdf3e5" stroke="#f0d9b5" filter="url(#soft)"/>
    <text x="228" y="104" font-weight="600" fill="#7a5a1e">AUX 字段</text>
    <text x="228" y="122" fill="#b08535" font-size="8.5">redis-ver/bits</text>
    <text x="228" y="134" fill="#c79a4e" font-size="8">ctime 等元信息</text>

    <rect x="296" y="80" width="130" height="60" rx="8" fill="#f6f0fb" stroke="#dcc6ee" filter="url(#soft)"/>
    <text x="361" y="100" font-weight="600" fill="#5a2a82">SELECTDB 0</text>
    <text x="361" y="118" fill="#8a5cae" font-size="8.5">opcode 254</text>
    <text x="361" y="132" fill="#a884c8" font-size="8">+ RESIZEDB(251)</text>

    <rect x="434" y="80" width="330" height="60" rx="8" fill="#eafaf1" stroke="#b8e6cd" filter="url(#soft)"/>
    <text x="599" y="100" font-weight="600" fill="#1c6b45">键值对序列（本 DB 全部 key）</text>
    <text x="599" y="118" fill="#3a9b6e" font-size="8.5">[EXPIRETIME_MS 252][IDLE 248/FREQ 249] type key value</text>
    <text x="599" y="132" fill="#5cb88a" font-size="8">value 按各自编码序列化</text>

    <rect x="772" y="80" width="90" height="60" rx="8" fill="#f6f0fb" stroke="#dcc6ee" filter="url(#soft)"/>
    <text x="817" y="104" font-weight="600" fill="#5a2a82">EOF</text>
    <text x="817" y="122" fill="#8a5cae" font-size="8.5">opcode 255</text>

    <rect x="870" y="80" width="90" height="60" rx="8" fill="#fdeef2" stroke="#f6c9d6" filter="url(#soft)"/>
    <text x="915" y="104" font-weight="600" fill="#c02a56">CRC64</text>
    <text x="915" y="122" fill="#88304a" font-size="8.5">8 字节</text>
    <text x="915" y="134" fill="#c8607f" font-size="8">校验和</text>
  </g>

  <!-- opcodes table -->
  <text x="40" y="184" font-size="11" font-weight="700" fill="#1d1d1f">关键 opcodes</text>
  <g font-size="10">
    <rect x="40" y="198" width="290" height="30" rx="6" fill="#f7f7f9" stroke="#ececef"/><text x="52" y="218" fill="#4a4a4f"><tspan font-weight="600">SELECTDB (254)</tspan> — 切换到某个 DB</text>
    <rect x="340" y="198" width="290" height="30" rx="6" fill="#f7f7f9" stroke="#ececef"/><text x="352" y="218" fill="#4a4a4f"><tspan font-weight="600">RESIZEDB (251)</tspan> — 预告 dict 大小，加速加载</text>
    <rect x="640" y="198" width="320" height="30" rx="6" fill="#f7f7f9" stroke="#ececef"/><text x="652" y="218" fill="#4a4a4f"><tspan font-weight="600">EXPIRETIME_MS (252)</tspan> — key 的毫秒过期时间</text>
    <rect x="40" y="234" width="290" height="30" rx="6" fill="#f7f7f9" stroke="#ececef"/><text x="52" y="254" fill="#4a4a4f"><tspan font-weight="600">AUX (250)</tspan> — 辅助键值元信息</text>
    <rect x="340" y="234" width="290" height="30" rx="6" fill="#f7f7f9" stroke="#ececef"/><text x="352" y="254" fill="#4a4a4f"><tspan font-weight="600">IDLE (248) / FREQ (249)</tspan> — LRU 空闲 / LFU 频率</text>
    <rect x="640" y="234" width="320" height="30" rx="6" fill="#f7f7f9" stroke="#ececef"/><text x="652" y="254" fill="#4a4a4f"><tspan font-weight="600">EOF (255)</tspan> — 数据结束，其后是 CRC64</text>
  </g>

  <!-- properties -->
  <rect x="40" y="288" width="450" height="130" rx="10" fill="#eafaf1" stroke="#b8e6cd"/>
  <text x="60" y="312" font-size="11" font-weight="600" fill="#1c6b45">RDB 的优势</text>
  <text x="60" y="334" font-size="9.5" fill="#2f7a56">· 紧凑二进制 → 文件小、恢复快（直接建结构）</text>
  <text x="60" y="354" font-size="9.5" fill="#2f7a56">· 单文件 → 灾备/冷备/迁移方便</text>
  <text x="60" y="374" font-size="9.5" fill="#2f7a56">· 主库全量同步直接复用（发给从库）</text>
  <text x="60" y="396" font-size="9.5" fill="#2f7a56">· CRC64 → 加载前检测文件损坏</text>

  <rect x="510" y="288" width="450" height="130" rx="10" fill="#fdeef2" stroke="#f6c9d6"/>
  <text x="530" y="312" font-size="11" font-weight="600" fill="#c02a56">RDB 的取舍</text>
  <text x="530" y="334" font-size="9.5" fill="#88304a">· 时点快照 → 两次快照间宕机丢数据</text>
  <text x="530" y="354" font-size="9.5" fill="#88304a">· fork 开销 + COW 内存膨胀（写密集时）</text>
  <text x="530" y="374" font-size="9.5" fill="#88304a">· 版本升级需兼容 RDB_VERSION</text>
  <text x="530" y="396" font-size="9.5" fill="#c02a56">→ 低丢失要求用 AOF，或 RDB+AOF 混合</text>
</svg>
