<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="410" viewBox="0 0 1000 410" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="410" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">quicklist：listpack 节点组成的双向链表</text>
  <text x="30" y="49" font-size="10.5" fill="#a1a1a6">兼顾链表两端 O(1) 与 listpack 的低指针开销；节点上限 list-max-listpack-size=-2（8KB）</text>

  <!-- quicklist structure -->
  <text x="40" y="86" font-size="11" font-weight="700" fill="#7a5a1e">结构：每个链表节点是一个 listpack</text>
  <g text-anchor="middle" font-size="9">
    <rect x="60" y="100" width="150" height="80" rx="9" fill="#fdf3e5" stroke="#f0d9b5" filter="url(#soft)"/>
    <text x="135" y="118" font-weight="600" fill="#7a5a1e">节点1 listpack</text>
    <rect x="72" y="126" width="30" height="24" rx="4" fill="#fff" stroke="#f0d9b5"/><text x="87" y="142" fill="#7a5a1e" font-size="8">a</text>
    <rect x="106" y="126" width="30" height="24" rx="4" fill="#fff" stroke="#f0d9b5"/><text x="121" y="142" fill="#7a5a1e" font-size="8">b</text>
    <rect x="140" y="126" width="30" height="24" rx="4" fill="#fff" stroke="#f0d9b5"/><text x="155" y="142" fill="#7a5a1e" font-size="8">c</text>
    <text x="135" y="170" font-size="8" fill="#b08535">≤8KB</text>

    <rect x="280" y="100" width="150" height="80" rx="9" fill="#fdf3e5" stroke="#f0d9b5" filter="url(#soft)"/>
    <text x="355" y="118" font-weight="600" fill="#7a5a1e">节点2 listpack</text>
    <rect x="292" y="126" width="30" height="24" rx="4" fill="#fff" stroke="#f0d9b5"/><text x="307" y="142" fill="#7a5a1e" font-size="8">d</text>
    <rect x="326" y="126" width="30" height="24" rx="4" fill="#fff" stroke="#f0d9b5"/><text x="341" y="142" fill="#7a5a1e" font-size="8">e</text>
    <rect x="360" y="126" width="30" height="24" rx="4" fill="#fff" stroke="#f0d9b5"/><text x="375" y="142" fill="#7a5a1e" font-size="8">f</text>
    <text x="355" y="170" font-size="8" fill="#b08535">LZF 可压缩</text>

    <rect x="500" y="100" width="150" height="80" rx="9" fill="#fdf3e5" stroke="#f0d9b5" filter="url(#soft)"/>
    <text x="575" y="118" font-weight="600" fill="#7a5a1e">节点3 listpack</text>
    <rect x="512" y="126" width="30" height="24" rx="4" fill="#fff" stroke="#f0d9b5"/><text x="527" y="142" fill="#7a5a1e" font-size="8">g</text>
    <rect x="546" y="126" width="30" height="24" rx="4" fill="#fff" stroke="#f0d9b5"/><text x="561" y="142" fill="#7a5a1e" font-size="8">h</text>
    <text x="575" y="170" font-size="8" fill="#b08535">头尾不压</text>
  </g>
  <!-- doubly linked arrows -->
  <line x1="210" y1="132" x2="278" y2="132" stroke="#4f9dff" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="278" y1="148" x2="210" y2="148" stroke="#4f9dff" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="430" y1="132" x2="498" y2="132" stroke="#4f9dff" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="498" y1="148" x2="430" y2="148" stroke="#4f9dff" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="720" y="130" font-size="9" fill="#5b7db1">head/tail 指针 → 两端 O(1)</text>
  <text x="720" y="148" font-size="9" fill="#5b7db1">中间节点 LZF 压缩省内存</text>

  <!-- why -->
  <rect x="40" y="200" width="450" height="90" rx="10" fill="#fdeef2" stroke="#f6c9d6"/>
  <text x="60" y="224" font-size="10.5" font-weight="600" fill="#c02a56">纯双向链表的问题</text>
  <text x="60" y="246" font-size="9.5" fill="#88304a">每个元素一个节点 = 每元素 2 个指针（prev/next）</text>
  <text x="60" y="264" font-size="9.5" fill="#88304a">→ 小元素时指针开销比数据还大，内存碎片多</text>
  <text x="60" y="282" font-size="8.5" fill="#c8607f">Redis 3.2 前用 ziplist/linkedlist 两种，各有短板</text>

  <rect x="510" y="200" width="450" height="90" rx="10" fill="#eafaf1" stroke="#b8e6cd"/>
  <text x="530" y="224" font-size="10.5" font-weight="600" fill="#1c6b45">quicklist 的折中</text>
  <text x="530" y="246" font-size="9.5" fill="#2f7a56">链表节点不是单个元素，而是一个 listpack（装多个元素）</text>
  <text x="530" y="264" font-size="9.5" fill="#2f7a56">→ 指针数 = 节点数（远少于元素数），内存紧凑</text>
  <text x="530" y="282" font-size="8.5" fill="#5cb88a">→ 仍保留链表两端 O(1) 增删的优势</text>

  <rect x="40" y="306" width="920" height="88" rx="10" fill="#f7f7f9" stroke="#ececef"/>
  <text x="60" y="330" font-size="11" font-weight="600" fill="#1d1d1f">复杂度</text>
  <text x="60" y="352" font-size="10" fill="#4a4a4f">· LPUSH/RPUSH/LPOP/RPOP（两端）：O(1) —— List 的强项</text>
  <text x="60" y="372" font-size="10" fill="#4a4a4f">· LINDEX/LRANGE（中间/范围）：O(n) —— 需从一端遍历节点，List 不适合随机访问</text>
  <text x="60" y="390" font-size="9" fill="#86868b">压缩深度 compress：0=不压；N=头尾各 N 个节点不压（两端最常访问，压了反而拖慢）</text>
</svg>
