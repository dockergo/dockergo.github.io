<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="480" viewBox="0 0 1080 480" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="480" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">认证：Authenticate 换 token，后续请求带 token</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">store.go: Authenticate(:333) CheckPassword bcrypt(:361) tokenProvider.assign(:349) · --auth-token 默认 simple · --bcrypt-cost 默认 10</text>
  <g text-anchor="middle">
    <rect x="40" y="80" width="230" height="70" rx="11" fill="#f6f2fb" stroke="#d9c9ec" filter="url(#soft)"/><text x="155" y="106" font-size="10" font-weight="700" fill="#3d2a5a">① Authenticate(user,pwd)</text><text x="155" y="126" font-size="8" fill="#7a5da5">客户端首次登录</text><text x="155" y="140" font-size="8" fill="#9a7cc4">送用户名+密码</text>
    <rect x="320" y="80" width="230" height="70" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="435" y="102" font-size="10" font-weight="700" fill="#1b2a4a">② bcrypt 校验密码</text><text x="435" y="122" font-size="8" fill="#5b7db1">CompareHashAndPassword</text><text x="435" y="138" font-size="8" fill="#8aa6cf">存 hash 非明文，cost=10</text>
    <rect x="600" y="80" width="230" height="70" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="715" y="102" font-size="10" font-weight="700" fill="#12402a">③ 签发 token</text><text x="715" y="122" font-size="8" fill="#2f6f4f">tokenProvider.assign</text><text x="715" y="138" font-size="8" fill="#4c8567">返回给客户端</text>
    <rect x="880" y="80" width="160" height="70" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/><text x="960" y="102" font-size="10" font-weight="700" fill="#5a3410">④ 后续请求带 token</text><text x="960" y="122" font-size="8" fill="#93762e">metadata 里携带</text><text x="960" y="138" font-size="8" fill="#b08843">拦截器解析出 user</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <line x1="270" y1="115" x2="320" y2="115" marker-end="url(#ar)"/>
    <line x1="550" y1="115" x2="600" y2="115" marker-end="url(#ar)"/>
    <line x1="830" y1="115" x2="880" y2="115" marker-end="url(#ar)"/>
  </g>
  <g text-anchor="middle">
    <rect x="40" y="180" width="490" height="160" rx="12" fill="#f3f7fc" stroke="#cfe0f2"/>
    <text x="285" y="204" font-size="11" font-weight="700" fill="#274a78">simple token（默认）</text>
    <text x="60" y="228" font-size="9.5" fill="#5b7db1" text-anchor="start">· 服务端内存维护 token→user 映射</text>
    <text x="60" y="248" font-size="9.5" fill="#5b7db1" text-anchor="start">· TTL 默认 300s</text>
    <text x="60" y="268" font-size="9.5" fill="#4c8567" text-anchor="start">✓ 简单，单节点/测试够用</text>
    <text x="60" y="288" font-size="9.5" fill="#a44" text-anchor="start">✗ leader 切换/重启 token 失效</text>
    <text x="60" y="308" font-size="9.5" fill="#a44" text-anchor="start">✗ 不能跨节点共享（各节点内存独立）</text>
    <text x="285" y="332" font-size="8.5" fill="#8aa6cf">适合：单节点、开发测试</text>

    <rect x="550" y="180" width="490" height="160" rx="12" fill="#eafaf1" stroke="#bfe0cd"/>
    <text x="795" y="204" font-size="11" font-weight="700" fill="#12402a">JWT（多节点生产推荐）</text>
    <text x="570" y="228" font-size="9.5" fill="#2f6f4f" text-anchor="start">· 自包含签名 token（含 user/权限/过期）</text>
    <text x="570" y="248" font-size="9.5" fill="#2f6f4f" text-anchor="start">· 无状态：服务端不存映射</text>
    <text x="570" y="268" font-size="9.5" fill="#2f6f4f" text-anchor="start">✓ 可跨节点验证（任意节点验签即可）</text>
    <text x="570" y="288" font-size="9.5" fill="#2f6f4f" text-anchor="start">✓ leader 切换/重启不失效</text>
    <text x="570" y="308" font-size="9.5" fill="#4c8567" text-anchor="start">· 需配签名密钥（pub/priv key）</text>
    <text x="795" y="332" font-size="8.5" fill="#4c8567">适合：多节点集群、生产</text>
  </g>
  <rect x="40" y="360" width="1000" height="56" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="384" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="406" font-size="10" fill="#4b4b50">客户端 Authenticate（bcrypt 校验密码，存 hash 非明文）换 token，后续请求带 token 由拦截器解析出 user；simple token 有状态不跨节点（默认，测试用），JWT 无状态可跨节点（多节点生产推荐）。</text>
</svg>
