<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">日志复制与背压：状态机复制 + in-flight 流控</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">raft.go: maxSizePerMsg=1MB(:38) · maxInflightMsgs=512(:41) · v3_server.go: maxGapBetweenApplyAndCommitIndex=5000(:50)</text>
  <!-- log replication visual -->
  <text x="60" y="82" font-size="10" font-weight="700" fill="#1b2a4a">Leader 日志</text>
  <g font-size="8" text-anchor="middle">
    <rect x="60" y="90" width="50" height="34" rx="5" fill="#dce9fa" stroke="#c4d8f0"/><text x="85" y="111" fill="#1b2a4a">e1✓</text>
    <rect x="112" y="90" width="50" height="34" rx="5" fill="#dce9fa" stroke="#c4d8f0"/><text x="137" y="111" fill="#1b2a4a">e2✓</text>
    <rect x="164" y="90" width="50" height="34" rx="5" fill="#dce9fa" stroke="#c4d8f0"/><text x="189" y="111" fill="#1b2a4a">e3✓</text>
    <rect x="216" y="90" width="50" height="34" rx="5" fill="#fff7e6" stroke="#e8cf9a"/><text x="241" y="111" fill="#5a3410">e4</text>
    <rect x="268" y="90" width="50" height="34" rx="5" fill="#fff7e6" stroke="#e8cf9a"/><text x="293" y="111" fill="#5a3410">e5</text>
  </g>
  <text x="330" y="103" font-size="8" fill="#2f6f4f">✓=committed（多数派已存）</text>
  <text x="330" y="117" font-size="8" fill="#b08843">黄=已追加未 commit</text>
  <!-- followers with Match -->
  <g text-anchor="middle">
    <rect x="60" y="150" width="300" height="60" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="210" y="174" font-size="9.5" font-weight="700" fill="#1b2a4a">Follower 1（Match=5，最新）</text><text x="210" y="194" font-size="8" fill="#5b7db1">已复制 e1..e5，与 leader 一致</text>
    <rect x="60" y="220" width="300" height="60" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="210" y="244" font-size="9.5" font-weight="700" fill="#1b2a4a">Follower 2（Match=3，落后）</text><text x="210" y="264" font-size="8" fill="#5b7db1">leader 据 Next 补发 e4,e5</text>
    <rect x="60" y="290" width="300" height="60" rx="10" fill="#fdf6ea" stroke="#efdcb4"/><text x="210" y="314" font-size="9.5" font-weight="700" fill="#5a3410">Follower 3（落后过多）</text><text x="210" y="334" font-size="8" fill="#93762e">日志已被压缩 → 直接发快照追平</text>
  </g>
  <text x="400" y="185" font-size="9" fill="#8aa6cf">leader 为每个 follower 维护</text>
  <text x="400" y="203" font-size="9" fill="#8aa6cf">Next/Match 索引，据此决定发哪些条目</text>
  <text x="400" y="250" font-size="9" fill="#8aa6cf">落后 → 逐条补；落后太多 → 快照</text>
  <rect x="60" y="374" width="470" height="140" rx="12" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="80" y="398" font-size="11" font-weight="700" fill="#274a78">状态机复制（SMR）</text>
  <text x="80" y="420" font-size="9.5" fill="#5b7db1">· 所有节点以相同顺序 apply 相同的已 commit 条目</text>
  <text x="80" y="440" font-size="9.5" fill="#5b7db1">· 相同初始状态 + 相同操作序列 → 相同最终状态</text>
  <text x="80" y="460" font-size="9" fill="#8aa6cf">· 因此每个 follower 是对等全量副本，可服务串行读</text>
  <text x="80" y="480" font-size="9" fill="#8aa6cf">· apply 必须确定性——同样的 Txn 在每节点结果一致</text>
  <text x="80" y="500" font-size="8.5" fill="#8aa6cf">这是"每成员存全量数据"能成立的原理基础</text>
  <rect x="550" y="374" width="490" height="140" rx="12" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="570" y="398" font-size="11" font-weight="700" fill="#7a2230">流控与背压</text>
  <text x="570" y="420" font-size="9.5" fill="#a44">· maxSizePerMsg=1MB：单条 MsgApp 最大字节，防大批量撑爆网络</text>
  <text x="570" y="440" font-size="9.5" fill="#a44">· maxInflightMsgs=512：未确认的 in-flight 消息上限，防 leader 发太快</text>
  <text x="570" y="460" font-size="9.5" fill="#a44">· apply 落后 commit &gt; 5000（maxGap…）→ 拒新 propose</text>
  <text x="570" y="480" font-size="9" fill="#7a2230">· 该背压触发 = apply 跟不上（多为 backend/WAL 磁盘慢）</text>
  <text x="570" y="500" font-size="8.5" fill="#7a2230">→ 查 fsync 延迟 / db 大小 / defrag</text>
</svg>
