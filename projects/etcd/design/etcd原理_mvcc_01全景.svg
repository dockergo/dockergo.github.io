<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter></defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">MVCC 全景：key → 一串带版本的 value（不是 key→value）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">kvstore.go: currentRev(:72,初值1@:104,End递增@kvstore_txn.go:214) · Revision{Main,Sub}(revision.go:35)</text>
  <!-- version chain of one key -->
  <text x="60" y="86" font-size="10" font-weight="700" fill="#5a3410">key "foo" 的版本历史</text>
  <g font-size="8" text-anchor="middle">
    <rect x="60" y="96" width="130" height="54" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="125" y="116" font-weight="600" fill="#5a3410">rev 3</text><text x="125" y="132" fill="#93762e">val="a"</text><text x="125" y="145" fill="#b08843">create=3,mod=3</text>
    <rect x="210" y="96" width="130" height="54" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="275" y="116" font-weight="600" fill="#5a3410">rev 7</text><text x="275" y="132" fill="#93762e">val="b"</text><text x="275" y="145" fill="#b08843">mod=7,ver=2</text>
    <rect x="360" y="96" width="130" height="54" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="425" y="116" font-weight="600" fill="#5a3410">rev 12</text><text x="425" y="132" fill="#93762e">val="c"</text><text x="425" y="145" fill="#b08843">mod=12,ver=3</text>
    <rect x="510" y="96" width="130" height="54" rx="8" fill="#fbeef0" stroke="#f0cdd4"/><text x="575" y="116" font-weight="600" fill="#7a2230">rev 15</text><text x="575" y="132" fill="#a44">tombstone</text><text x="575" y="145" fill="#7a2230">删除标记</text>
  </g>
  <text x="670" y="118" font-size="9" fill="#8aa6cf">读 rev=10 → 拿到 val="b"</text>
  <text x="670" y="134" font-size="9" fill="#8aa6cf">读最新（&gt;15）→ 已删（not found）</text>
  <text x="670" y="150" font-size="9" fill="#8aa6cf">全局 currentRev 随每次写单调 +1</text>
  <!-- three capabilities -->
  <g text-anchor="middle">
    <rect x="60" y="180" width="300" height="120" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
    <text x="210" y="204" font-size="10.5" font-weight="700" fill="#12402a">① Watch 精确重放</text>
    <text x="210" y="226" font-size="9" fill="#2f6f4f">从某 revision 起</text>
    <text x="210" y="244" font-size="9" fill="#2f6f4f">按序推送每次变更</text>
    <text x="210" y="264" font-size="8.5" fill="#4c8567">断连重连不丢事件</text>
    <text x="210" y="284" font-size="8" fill="#4c8567">（只要未被 compact）</text>
    <rect x="390" y="180" width="300" height="120" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="540" y="204" font-size="10.5" font-weight="700" fill="#1b2a4a">② 事务 CAS</text>
    <text x="540" y="226" font-size="9" fill="#5b7db1">Txn 基于版本比较</text>
    <text x="540" y="244" font-size="9" fill="#5b7db1">"若 mod_rev==X 则 put"</text>
    <text x="540" y="264" font-size="8.5" fill="#8aa6cf">乐观并发控制</text>
    <text x="540" y="284" font-size="8" fill="#8aa6cf">分布式锁/选主的基础</text>
    <rect x="720" y="180" width="300" height="120" rx="12" fill="#fdf9f0" stroke="#efe3cd" filter="url(#soft)"/>
    <text x="870" y="204" font-size="10.5" font-weight="700" fill="#7a5a1e">③ 快照一致点</text>
    <text x="870" y="226" font-size="9" fill="#93762e">某 revision = 一致快照</text>
    <text x="870" y="244" font-size="9" fill="#93762e">备份/恢复到精确点</text>
    <text x="870" y="264" font-size="8.5" fill="#b08843">代价：需定期 compact</text>
    <text x="870" y="284" font-size="8" fill="#b08843">清旧版本防膨胀</text>
  </g>
  <rect x="60" y="322" width="960" height="90" rx="12" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="80" y="346" font-size="11" font-weight="700" fill="#274a78">两层索引（下一张详解）</text>
  <text x="80" y="368" font-size="9.5" fill="#5b7db1">· treeIndex（内存 B-tree）：key → keyIndex（该 key 的所有历史 revision）——查"某时间点是哪个版本"</text>
  <text x="80" y="388" font-size="9.5" fill="#5b7db1">· boltdb（磁盘）：key = revision 编码字节，value = protobuf KeyValue——存"那个版本的实际内容"</text>
  <text x="80" y="406" font-size="9" fill="#8aa6cf">· 读 = 先 treeIndex 定位 revision，再用 revision 作 key 去 boltdb 取值</text>
  <rect x="60" y="424" width="960" height="60" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="80" y="448" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="80" y="470" font-size="10" fill="#4b4b50">MVCC 让每次写 revision+1、每个 key 保留版本历史，可按 revision 回看——支撑 Watch 重放、事务 CAS、快照一致点，代价是需定期 compaction 清旧版本。</text>
</svg>
