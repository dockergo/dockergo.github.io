<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">gRPC API 全景：七大服务汇聚，分派到内部能力域</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">api/etcdserverpb/rpc.proto · v3rpc/grpc.go 注册(:80-89) · Election/Lock 在 embed/serve.go(:186)</text>
  <!-- services -->
  <g text-anchor="middle">
    <rect x="40" y="76" width="150" height="70" rx="10" fill="#f6f2fb" stroke="#d9c9ec" filter="url(#soft)"/><text x="115" y="100" font-size="10" font-weight="700" fill="#3d2a5a">KV ★核心</text><text x="115" y="118" font-size="7.5" fill="#7a5da5">Range/Put/Del</text><text x="115" y="132" font-size="7.5" fill="#9a7cc4">Txn/Compact</text>
    <rect x="200" y="76" width="150" height="70" rx="10" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="275" y="100" font-size="10" font-weight="700" fill="#12402a">Watch</text><text x="275" y="118" font-size="7.5" fill="#2f6f4f">双向流订阅</text><text x="275" y="132" font-size="7.5" fill="#4c8567">变更事件</text>
    <rect x="360" y="76" width="150" height="70" rx="10" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/><text x="435" y="100" font-size="10" font-weight="700" fill="#5a3410">Lease</text><text x="435" y="118" font-size="7.5" fill="#93762e">Grant/Revoke</text><text x="435" y="132" font-size="7.5" fill="#b08843">KeepAlive</text>
    <rect x="520" y="76" width="150" height="70" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="595" y="100" font-size="10" font-weight="700" fill="#1b2a4a">Cluster</text><text x="595" y="118" font-size="7.5" fill="#5b7db1">MemberAdd/Remove</text><text x="595" y="132" font-size="7.5" fill="#8aa6cf">Promote</text>
    <rect x="680" y="76" width="150" height="70" rx="10" fill="#fbeef0" stroke="#f0cdd4" filter="url(#soft)"/><text x="755" y="100" font-size="10" font-weight="700" fill="#7a2230">Auth</text><text x="755" y="118" font-size="7.5" fill="#a44">Authenticate</text><text x="755" y="132" font-size="7.5" fill="#7a2230">UserAdd/Grant</text>
    <rect x="840" y="76" width="200" height="70" rx="10" fill="#fdf9f0" stroke="#efe3cd" filter="url(#soft)"/><text x="940" y="100" font-size="10" font-weight="700" fill="#7a5a1e">Maintenance + Election/Lock</text><text x="940" y="118" font-size="7.5" fill="#93762e">Alarm/Status/Defrag/Snapshot</text><text x="940" y="132" font-size="7.5" fill="#b08843">Campaign/Lock（基于 Lease+Txn）</text>
  </g>
  <!-- interceptor -->
  <rect x="40" y="176" width="1000" height="44" rx="10" fill="#f2f2f4" stroke="#dcdce0"/>
  <text x="540" y="196" font-size="10.5" font-weight="700" fill="#48484c" text-anchor="middle">拦截器链（认证 → 授权 → 配额 → capability/learner/leader 检查）</text>
  <text x="540" y="212" font-size="8" fill="#86868b" text-anchor="middle">interceptor.go · 所有 RPC 统一入口，执行前检查</text>
  <!-- capability domains -->
  <text x="540" y="250" font-size="10" font-weight="700" fill="#1d1d1f" text-anchor="middle">↓ 分派到内部能力域 ↓</text>
  <g text-anchor="middle" font-size="8">
    <rect x="60" y="264" width="220" height="60" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="170" y="286" font-weight="600" fill="#1b2a4a">写 → Raft 共识 → apply</text><text x="170" y="304" fill="#5b7db1">读 → MVCC（线性读经 ReadIndex）</text><text x="170" y="317" fill="#8aa6cf">KV/Txn 落这里</text>
    <rect x="300" y="264" width="200" height="60" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="400" y="286" font-weight="600" fill="#12402a">Watch → watchableStore</text><text x="400" y="304" fill="#2f6f4f">Lease → lessor</text><text x="400" y="317" fill="#4c8567">协调能力域</text>
    <rect x="520" y="264" width="200" height="60" rx="9" fill="#fdf6ea" stroke="#efdcb4"/><text x="620" y="286" font-weight="600" fill="#5a3410">Cluster → membership</text><text x="620" y="304" fill="#93762e">走 ConfChange</text><text x="620" y="317" fill="#b08843">成员能力域</text>
    <rect x="740" y="264" width="200" height="60" rx="9" fill="#fbeef0" stroke="#f0cdd4"/><text x="840" y="286" font-weight="600" fill="#7a2230">Auth → authStore</text><text x="840" y="304" fill="#a44">Maintenance → backend</text><text x="840" y="317" fill="#7a2230">保障能力域</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.2" fill="none"><line x1="540" y1="146" x2="540" y2="176" marker-end="url(#ar)"/><line x1="540" y1="220" x2="540" y2="240" marker-end="url(#ar)"/></g>
  <rect x="40" y="344" width="1000" height="80" rx="12" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="368" font-size="11" font-weight="700" fill="#274a78">接触面的本质</text>
  <text x="60" y="390" font-size="9.5" fill="#5b7db1">· 对 SQL 引擎是"语句族（DDL/DML/DQL/DCL）"，对 etcd 是"gRPC 服务族"——用户下发操作的唯一入口</text>
  <text x="60" y="408" font-size="9" fill="#8aa6cf">· 每个服务映射到一条支撑主线；一次请求穿过拦截器链后落到对应能力域执行。所有服务共享 Raft+MVCC 底座。</text>
  <rect x="40" y="440" width="1000" height="60" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="464" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="486" font-size="10" fill="#4b4b50">gRPC API 族（KV/Watch/Lease/Cluster/Auth/Maintenance + Election/Lock）是 etcd 的接触面，请求过统一拦截器链（认证/授权/配额/leader 检查）后分派到各内部能力域——所有服务共享 Raft+MVCC 底座。</text>
</svg>
