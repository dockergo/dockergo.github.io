<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="480" viewBox="0 0 1080 480" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="480" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">成员变更：运行时经 Raft ConfChange 单步增删</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">cluster.go RaftCluster(:43) AddMember(:394)/RemoveMember(:429) · server.go ConfChangeAddNode(:1370)/RemoveNode(:1429)</text>
  <g text-anchor="middle">
    <rect x="40" y="80" width="230" height="70" rx="11" fill="#f6f2fb" stroke="#d9c9ec" filter="url(#soft)"/><text x="155" y="106" font-size="10" font-weight="700" fill="#3d2a5a">MemberAdd/Remove 请求</text><text x="155" y="126" font-size="8" fill="#7a5da5">经 Cluster gRPC 服务</text><text x="155" y="140" font-size="8" fill="#9a7cc4">带 peerURL</text>
    <rect x="320" y="80" width="240" height="70" rx="11" fill="#e9f1fb" stroke="#c4d8f0" filter="url(#soft)"/><text x="440" y="102" font-size="10" font-weight="700" fill="#1b2a4a">编码成 ConfChange 条目</text><text x="440" y="122" font-size="8" fill="#5b7db1">AddNode/RemoveNode/AddLearner</text><text x="440" y="138" font-size="8" fill="#8aa6cf">这是特殊的 Raft 日志条目</text>
    <rect x="610" y="80" width="200" height="70" rx="11" fill="#dce9fa" stroke="#c4d8f0" filter="url(#soft)"/><text x="710" y="106" font-size="10" font-weight="700" fill="#1b2a4a">Raft 复制 + commit</text><text x="710" y="126" font-size="8" fill="#5b7db1">多数派确认</text><text x="710" y="140" font-size="8" fill="#8aa6cf">变更点在日志有确定位置</text>
    <rect x="860" y="80" width="180" height="70" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="950" y="106" font-size="10" font-weight="700" fill="#12402a">各节点 apply</text><text x="950" y="126" font-size="8" fill="#2f6f4f">更新本地成员表</text><text x="950" y="140" font-size="8" fill="#4c8567">全集群一致</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <line x1="270" y1="115" x2="320" y2="115" marker-end="url(#ar)"/>
    <line x1="560" y1="115" x2="610" y2="115" marker-end="url(#ar)"/>
    <line x1="810" y1="115" x2="860" y2="115" marker-end="url(#ar)"/>
  </g>
  <rect x="40" y="180" width="490" height="150" rx="12" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="204" font-size="11" font-weight="700" fill="#274a78">为什么成员变更必须走 Raft</text>
  <text x="60" y="228" font-size="9.5" fill="#5b7db1">· 成员集是 Raft 自身正确性的基础</text>
  <text x="60" y="248" font-size="9.5" fill="#5b7db1">· quorum = N/2+1，N 就是成员数——变更 N 必须全员一致</text>
  <text x="60" y="268" font-size="9.5" fill="#5b7db1">· 若各节点对"当前有几个成员"看法不一 → quorum 算错 → 脑裂</text>
  <text x="60" y="290" font-size="9" fill="#8aa6cf">· 所以变更点必须在日志里有确定位置，让"变更前用旧 N、变更后用新 N"清晰</text>
  <text x="60" y="310" font-size="9" fill="#8aa6cf">· ConfChange 就是把成员变更也纳入同一份复制日志</text>
  <rect x="550" y="180" width="490" height="150" rx="12" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="570" y="204" font-size="11" font-weight="700" fill="#7a5a1e">单步变更（etcd 的选择）</text>
  <text x="570" y="228" font-size="9.5" fill="#93762e">· 一次只加/删一个成员（不用联合共识 joint consensus）</text>
  <text x="570" y="248" font-size="9.5" fill="#93762e">· 简单、不易出错，代价是批量变更要分多次</text>
  <text x="570" y="268" font-size="9.5" fill="#93762e">· 扩容 3→5：分两次，各加一个，中间等健康</text>
  <text x="570" y="290" font-size="9" fill="#b08843">· 单步变更保证：任意时刻新旧成员集的 quorum 必有交集</text>
  <text x="570" y="310" font-size="9" fill="#b08843">  → 不会出现两个不相交多数派（防脑裂）</text>
  <rect x="40" y="346" width="1000" height="56" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="370" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="392" font-size="10" fill="#4b4b50">成员增删是经 Raft 复制的单步 ConfChange——因成员集是 quorum 计算的基础、必须全员一致且变更点在日志有确定位置；单步变更保证新旧 quorum 有交集、防脑裂。</text>
</svg>
