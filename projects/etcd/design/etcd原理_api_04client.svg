<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">客户端交互模型：clientv3 的负载均衡 + 定向 + 重试</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">配多 endpoint 故障转移 · 写/线性读定向 leader · 串行读走任意成员 · Watch/Lease 长连接自动重连</text>
  <!-- client -->
  <rect x="40" y="90" width="200" height="120" rx="12" fill="#f6f2fb" stroke="#d9c9ec" filter="url(#soft)"/>
  <text x="140" y="114" font-size="11" font-weight="700" fill="#3d2a5a" text-anchor="middle">clientv3</text>
  <text x="60" y="138" font-size="8.5" fill="#7a5da5">endpoints:[A,B,C]</text>
  <text x="60" y="156" font-size="8.5" fill="#7a5da5">gRPC 负载均衡</text>
  <text x="60" y="174" font-size="8.5" fill="#7a5da5">自动重试幂等请求</text>
  <text x="60" y="192" font-size="8" fill="#9a7cc4">Watch/Lease 长连接管理</text>
  <!-- cluster -->
  <g text-anchor="middle">
    <rect x="340" y="80" width="200" height="60" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="440" y="104" font-size="10" font-weight="700" fill="#1b2a4a">成员 A（Leader）</text><text x="440" y="124" font-size="8" fill="#5b7db1">写 + 线性读定向这里</text>
    <rect x="340" y="150" width="200" height="50" rx="10" fill="#f7f7f9" stroke="#e0e0e4"/><text x="440" y="170" font-size="10" font-weight="700" fill="#48484c">成员 B（Follower）</text><text x="440" y="188" font-size="8" fill="#6e6e73">串行读可服务</text>
    <rect x="340" y="210" width="200" height="50" rx="10" fill="#f7f7f9" stroke="#e0e0e4"/><text x="440" y="230" font-size="10" font-weight="700" fill="#48484c">成员 C（Follower）</text><text x="440" y="248" font-size="8" fill="#6e6e73">串行读可服务</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.3" fill="none">
    <line x1="240" y1="120" x2="340" y2="110" marker-end="url(#ar)"/>
    <line x1="240" y1="150" x2="340" y2="170" marker-end="url(#ar)" stroke-dasharray="4 3"/>
    <line x1="240" y1="180" x2="340" y2="230" marker-end="url(#ar)" stroke-dasharray="4 3"/>
  </g>
  <text x="270" y="105" font-size="7.5" fill="#5b7db1">写/线性读</text>
  <text x="255" y="205" font-size="7.5" fill="#a1a1a6">串行读</text>
  <!-- behaviors -->
  <rect x="580" y="80" width="460" height="180" rx="12" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="600" y="104" font-size="11" font-weight="700" fill="#274a78">client 关键行为</text>
  <text x="600" y="128" font-size="9" fill="#5b7db1">· 多 endpoint 负载均衡 + 故障转移（成员挂 → 切健康的）</text>
  <text x="600" y="148" font-size="9" fill="#5b7db1">· 写/线性读定向 leader（非 leader 返回错误 → 重试其他）</text>
  <text x="600" y="168" font-size="9" fill="#5b7db1">· 串行读走任意成员（分摊读压力，见线性读篇）</text>
  <text x="600" y="188" font-size="9" fill="#5b7db1">· 自动重试幂等请求（网络错误/leader 切换时）</text>
  <text x="600" y="208" font-size="9" fill="#5b7db1">· Watch 一条 stream 多路复用；Lease 一条 stream 持续心跳</text>
  <text x="600" y="230" font-size="8.5" fill="#8aa6cf">· client 库管理这些长连接的重连，用户只管调 API</text>
  <text x="600" y="250" font-size="8.5" fill="#8aa6cf">工程要点：配多 endpoint 才有故障转移，别单点</text>
  <rect x="40" y="280" width="1000" height="90" rx="12" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="60" y="304" font-size="11" font-weight="700" fill="#7a5a1e">k8s apiserver 是 etcd 最大的客户端</text>
  <text x="60" y="326" font-size="9.5" fill="#93762e">· k8s 所有资源状态存在 etcd；apiserver 对每次 list-watch、每次资源写都经这套 gRPC API</text>
  <text x="60" y="346" font-size="9.5" fill="#93762e">· etcd 的可用性 = k8s 控制面的可用性；etcd 慢/不可用 → 整个集群控制面失灵</text>
  <text x="60" y="364" font-size="9" fill="#b08843">· 这就是为什么 etcd 把正确性/稳定性放在吞吐之前——它存的是"关于系统的关键真相"</text>
  <rect x="40" y="386" width="1000" height="56" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="410" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="432" font-size="10" fill="#4b4b50">clientv3 管多 endpoint 负载均衡与故障转移、写/线性读定向 leader、串行读走任意成员、幂等自动重试、Watch/Lease 长连接重连；k8s apiserver 是最大客户端——这套 API 的可用性即控制面的可用性。</text>
</svg>
