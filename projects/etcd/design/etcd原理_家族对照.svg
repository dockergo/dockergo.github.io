<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter></defs>
  <rect width="800" height="800" fill="#fbfbfd"/>
  <text x="30" y="34" font-size="16" font-weight="700" fill="#1d1d1f">与其它系统家族的心智对照 —— 读前必看</text>
  <text x="30" y="56" font-size="10.5" fill="#a1a1a6">etcd 属"新家族·分布式协调 / 共识 KV"：不是查询引擎，也不是文件系统</text>

  <!-- row labels down the left gutter, aligned to card rows -->
  <g font-size="9.5" fill="#a1a1a6" text-anchor="start">
    <text x="30" y="190">接触面</text>
    <text x="30" y="288">存储</text>
    <text x="30" y="386">一致性</text>
    <text x="30" y="484">定位</text>
  </g>

  <!-- card 1: 计算引擎 (gray / other family) -->
  <g text-anchor="middle">
    <rect x="118" y="92" width="205" height="470" rx="12" fill="#f5f5f7" stroke="#e0e0e4" filter="url(#soft)"/>
    <text x="220" y="122" font-size="12" font-weight="700" fill="#48484c">计算引擎</text>
    <text x="220" y="140" font-size="8.5" fill="#a1a1a6">Doris / ClickHouse</text>
    <text x="220" y="192" font-size="10.5" fill="#48484c">SQL 语句族</text>
    <text x="220" y="290" font-size="10.5" fill="#48484c">自管列存大表</text>
    <text x="220" y="388" font-size="10.5" fill="#48484c">事务 / 最终一致</text>
    <text x="220" y="486" font-size="10.5" fill="#48484c">存海量业务数据</text>
  </g>

  <!-- card 2: 分布式文件系统 (gray / other family) -->
  <g text-anchor="middle">
    <rect x="338" y="92" width="205" height="470" rx="12" fill="#f5f5f7" stroke="#e0e0e4" filter="url(#soft)"/>
    <text x="440" y="122" font-size="12" font-weight="700" fill="#48484c">分布式文件系统</text>
    <text x="440" y="140" font-size="8.5" fill="#a1a1a6">HDFS</text>
    <text x="440" y="192" font-size="10.5" fill="#48484c">FileSystem API</text>
    <text x="440" y="290" font-size="10.5" fill="#48484c">分块大文件多副本</text>
    <text x="440" y="388" font-size="10.5" fill="#48484c">租约 + 主控</text>
    <text x="440" y="486" font-size="10.5" fill="#48484c">存海量文件</text>
  </g>

  <!-- card 3: etcd (highlighted / soul) -->
  <g text-anchor="middle">
    <rect x="558" y="86" width="212" height="482" rx="13" fill="#eef3fb" stroke="#7aa0d8" stroke-width="1.6" filter="url(#soft)"/>
    <text x="664" y="122" font-size="13" font-weight="700" fill="#1b2a4a">etcd ★</text>
    <text x="664" y="140" font-size="8.5" fill="#5b7db1">分布式协调 / 共识 KV</text>
    <text x="664" y="187" font-size="10.5" font-weight="600" fill="#1b2a4a">一族 gRPC API</text>
    <text x="664" y="203" font-size="8.5" fill="#5b7db1">KV / Watch / Lease…</text>
    <text x="664" y="285" font-size="10.5" font-weight="600" fill="#1b2a4a">全量小数据</text>
    <text x="664" y="301" font-size="8.5" fill="#5b7db1">每节点全副本 · GB 级</text>
    <text x="664" y="383" font-size="10.5" font-weight="600" fill="#1b2a4a">Raft 强一致</text>
    <text x="664" y="399" font-size="8.5" fill="#5b7db1">线性一致读写</text>
    <text x="664" y="481" font-size="10.5" font-weight="600" fill="#1b2a4a">系统关键元数据</text>
    <text x="664" y="497" font-size="8.5" fill="#5b7db1">k8s 状态 / 服务发现 / 选主</text>
  </g>

  <!-- takeaway strip: three counter-intuitive resets -->
  <rect x="30" y="600" width="740" height="168" rx="12" fill="#fdf9f0" stroke="#efe3cd" filter="url(#soft)"/>
  <text x="52" y="630" font-size="11.5" font-weight="700" fill="#7a5a1e">三条"反直觉"认知（后文不再重复）</text>
  <g font-size="10.5" fill="#8a6a2e">
    <text x="52" y="662">① 不是查询，是"读写小 KV + 监听变化 + 协调"——接触面是 gRPC API，不是 SQL / 文件。</text>
    <text x="52" y="694">② 数据量小（默认配额 2GB），每个成员存全量、不分片——集群规模由"要几个副本抗故障"定。</text>
    <text x="52" y="726">③ 每次写都经 Raft 多数派 commit、线性读经 ReadIndex——CAP 里是 CP，要正确而非吞吐。</text>
  </g>
  <text x="52" y="754" font-size="9.5" fill="#b08843">灵魂主线 = Raft 共识：把"单机 KV"变成"线性一致的分布式 KV"，是 etcd 的立身之本。</text>
</svg>
