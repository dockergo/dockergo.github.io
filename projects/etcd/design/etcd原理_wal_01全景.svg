<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">WAL 全景：先写后生效，append-only 分段 + fsync</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">wal.go: WAL(:72) Save(*HardState,[]*Entry)(:958) sync/Fdatasync(:832) · SegmentSizeBytes=64MB(:55) · 记录类型(:38-43)</text>
  <!-- segmented files -->
  <text x="60" y="82" font-size="10" font-weight="700" fill="#5a3410">WAL = append-only 分段文件（每段 64MB，预分配）</text>
  <g text-anchor="middle" font-size="8">
    <rect x="60" y="92" width="150" height="54" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="135" y="112" font-weight="600" fill="#5a3410">0000.wal（满）</text><text x="135" y="128" fill="#93762e">entry,entry,state…</text><text x="135" y="140" fill="#b08843">每条带 CRC</text>
    <rect x="220" y="92" width="150" height="54" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="295" y="112" font-weight="600" fill="#5a3410">0001.wal（满）</text><text x="295" y="128" fill="#93762e">…</text>
    <rect x="380" y="92" width="150" height="54" rx="8" fill="#fff7e6" stroke="#e8cf9a"/><text x="455" y="112" font-weight="600" fill="#5a3410">0002.wal（当前）</text><text x="455" y="128" fill="#93762e">正在 append</text><text x="455" y="140" fill="#b08843">满 → cut 开新段</text>
  </g>
  <text x="560" y="112" font-size="9" fill="#8aa6cf">只追加、不修改、不随机写</text>
  <text x="560" y="128" font-size="9" fill="#8aa6cf">→ 磁盘顺序写，fsync 快</text>
  <text x="560" y="144" font-size="9" fill="#8aa6cf">max-wals=5 限保留段数</text>
  <!-- record types -->
  <rect x="60" y="166" width="470" height="140" rx="12" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="80" y="190" font-size="11" font-weight="700" fill="#274a78">5 类记录（导出 PascalCase）</text>
  <text x="80" y="214" font-size="9.5" fill="#5b7db1">· EntryType：Raft 日志条目（最主要）</text>
  <text x="80" y="234" font-size="9.5" fill="#5b7db1">· StateType：HardState（term/vote/commit）</text>
  <text x="80" y="254" font-size="9.5" fill="#5b7db1">· SnapshotType：快照点标记</text>
  <text x="80" y="274" font-size="9.5" fill="#5b7db1">· MetadataType：元信息（文件头）· CrcType：校验</text>
  <text x="80" y="296" font-size="9" fill="#8aa6cf">Save(*HardState, []*Entry)：先存条目再存状态，fsync 落盘</text>
  <rect x="550" y="166" width="490" height="140" rx="12" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="570" y="190" font-size="11" font-weight="700" fill="#7a2230">为什么先写 WAL（铁律）</text>
  <text x="570" y="214" font-size="9.5" fill="#a44">· Raft Ready 循环：条目落 WAL 并 fsync 后，才算 committed、才 apply</text>
  <text x="570" y="234" font-size="9.5" fill="#a44">· crash 时刻：已 committed 的每条写必在 WAL 里</text>
  <text x="570" y="254" font-size="9.5" fill="#a44">· 重启回放 WAL → 恢复到 crash 前状态，不丢</text>
  <text x="570" y="276" font-size="9" fill="#7a2230">· WAL fsync 延迟 = 写延迟决定因素 → 必须 SSD</text>
  <text x="570" y="296" font-size="8.5" fill="#a44">etcd_disk_wal_fsync_duration_seconds（P99 应 &lt; 10ms）</text>
  <rect x="60" y="322" width="980" height="66" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="80" y="346" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="80" y="368" font-size="10" fill="#4b4b50">WAL 是崩溃恢复地基：变更生效前先 append 到 append-only 分段文件（64MB、CRC 校验、纯顺序写）并 fsync；</text>
  <text x="80" y="384" font-size="10" fill="#4b4b50">"先写 WAL 后 apply"保证 crash 后能回放已 committed 的写——其 fsync 延迟是写性能头号信号，必须 SSD。</text>
</svg>
