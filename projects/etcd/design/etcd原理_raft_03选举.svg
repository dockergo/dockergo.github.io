<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">leader 选举与任期：term + 心跳 + PreVote/CheckQuorum</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">bootstrap.go raftConfig(:541): HeartbeatTick=1(:544) · ElectionTick=ElectionMs/TickMs=10(:543) · PreVote(:549) · CheckQuorum(:548)</text>
  <!-- state machine -->
  <g text-anchor="middle">
    <rect x="80" y="90" width="200" height="90" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="180" y="118" font-size="11" font-weight="700" fill="#12402a">Follower</text><text x="180" y="140" font-size="8.5" fill="#2f6f4f">被动接收 leader 心跳/日志</text><text x="180" y="158" font-size="8.5" fill="#2f6f4f">election timeout 内收到心跳</text><text x="180" y="172" font-size="7.5" fill="#4c8567">→ 保持 follower</text>
    <rect x="440" y="90" width="200" height="90" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/><text x="540" y="118" font-size="11" font-weight="700" fill="#5a3410">Candidate</text><text x="540" y="140" font-size="8.5" fill="#93762e">超时未收心跳 → 自增 term</text><text x="540" y="158" font-size="8.5" fill="#93762e">先 PreVote 试探，再拉票</text><text x="540" y="172" font-size="7.5" fill="#b08843">赢多数 → leader</text>
    <rect x="800" y="90" width="200" height="90" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="900" y="118" font-size="11" font-weight="700" fill="#1b2a4a">Leader</text><text x="900" y="140" font-size="8.5" fill="#5b7db1">发心跳（每 tick 100ms）</text><text x="900" y="158" font-size="8.5" fill="#5b7db1">复制日志、定序写</text><text x="900" y="172" font-size="7.5" fill="#8aa6cf">CheckQuorum 失多数则退位</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <line x1="280" y1="125" x2="440" y2="125" marker-end="url(#ar)"/>
    <line x1="640" y1="125" x2="800" y2="125" marker-end="url(#ar)"/>
    <path d="M800,155 Q540,230 280,155" marker-end="url(#ar)"/>
    <path d="M440,165 Q310,210 200,180" marker-end="url(#ar)"/>
  </g>
  <text x="360" y="118" font-size="8" fill="#a1a1a6">选举超时</text>
  <text x="720" y="118" font-size="8" fill="#a1a1a6">赢得多数票</text>
  <text x="540" y="228" font-size="8" fill="#a1a1a6">发现更高 term → 退回 follower</text>
  <text x="300" y="205" font-size="8" fill="#a1a1a6">选举失败/收到合法 leader</text>
  <rect x="40" y="256" width="490" height="130" rx="12" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="280" font-size="11" font-weight="700" fill="#274a78">两个时间参数</text>
  <text x="60" y="302" font-size="9.5" fill="#5b7db1">· heartbeat-interval（默认 100ms）：leader 发心跳的节奏</text>
  <text x="60" y="322" font-size="9.5" fill="#5b7db1">· election-timeout（默认 1000ms）：follower 多久没心跳就发起选举</text>
  <text x="60" y="344" font-size="9" fill="#8aa6cf">· 经验：election ≥ 10× heartbeat（etcd 内部 ElectionTick=10）</text>
  <text x="60" y="364" font-size="9" fill="#8aa6cf">· 跨地域高延迟：两者都要调大，否则网络抖动误触发选举、集群震荡</text>
  <rect x="550" y="256" width="490" height="130" rx="12" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="570" y="280" font-size="11" font-weight="700" fill="#7a5a1e">两个防护机制</text>
  <text x="570" y="302" font-size="9.5" fill="#93762e">· PreVote：候选人先"预投票"探能否赢，再真正自增 term</text>
  <text x="570" y="322" font-size="9" fill="#b08843">  防止被网络分区隔离的节点反复自增 term、回归时扰乱集群</text>
  <text x="570" y="344" font-size="9.5" fill="#93762e">· CheckQuorum：leader 定期确认仍能联系多数派</text>
  <text x="570" y="364" font-size="9" fill="#b08843">  联系不上则主动退位——防脑裂下旧 leader 继续服务旧数据</text>
  <rect x="40" y="400" width="1000" height="70" rx="12" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="60" y="424" font-size="11" font-weight="700" fill="#7a2230">选举安全性</text>
  <text x="60" y="446" font-size="9.5" fill="#a44">· term 单调递增，每 term 至多一个 leader；投票者只投给"日志至少和自己一样新"的候选人（选举限制）</text>
  <text x="60" y="464" font-size="9" fill="#7a2230">· 因此新 leader 必含所有已 commit 条目——不会丢已确认的写。这是 Raft 正确性的核心保证之一。</text>
  <rect x="40" y="484" width="1000" height="60" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="508" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="530" font-size="10" fill="#4b4b50">Follower 超时未收心跳 → Candidate 自增 term、PreVote 试探后拉票 → 赢多数成 Leader；靠心跳维持、CheckQuorum 防脑裂、选举限制保证新 leader 含全部已 commit 条目。</text>
</svg>
