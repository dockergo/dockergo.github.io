<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">gRPC stream 多路复用：一条流承载多个 watcher</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">v3rpc/watch.go: serverWatchStream(:130) recvLoop(:249)/sendLoop(:410) · progressReportInterval 默认 10min(:94)</text>
  <!-- client -->
  <rect x="40" y="90" width="180" height="120" rx="12" fill="#f6f2fb" stroke="#d9c9ec" filter="url(#soft)"/>
  <text x="130" y="114" font-size="10" font-weight="700" fill="#3d2a5a" text-anchor="middle">client</text>
  <text x="130" y="136" font-size="8" fill="#7a5da5" text-anchor="middle">watch "/svc/" (id=1)</text>
  <text x="130" y="152" font-size="8" fill="#7a5da5" text-anchor="middle">watch "/lock/" (id=2)</text>
  <text x="130" y="168" font-size="8" fill="#7a5da5" text-anchor="middle">watch "/cfg/" (id=3)</text>
  <text x="130" y="190" font-size="7.5" fill="#9a7cc4" text-anchor="middle">几百个 watch...</text>
  <!-- single stream -->
  <rect x="300" y="120" width="200" height="60" rx="10" fill="#e9f1fb" stroke="#c4d8f0"/>
  <text x="400" y="146" font-size="10" font-weight="700" fill="#1b2a4a" text-anchor="middle">一条 gRPC Watch 流</text>
  <text x="400" y="164" font-size="8" fill="#5b7db1" text-anchor="middle">双向 stream，watchId 区分</text>
  <!-- serverWatchStream -->
  <rect x="560" y="80" width="480" height="180" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="800" y="104" font-size="11" font-weight="700" fill="#1b2a4a" text-anchor="middle">serverWatchStream</text>
  <rect x="580" y="116" width="440" height="54" rx="8" fill="#fff" stroke="#bcd0ec"/>
  <text x="800" y="136" font-size="9" font-weight="600" fill="#1b2a4a" text-anchor="middle">recvLoop（:249）收客户端请求</text>
  <text x="800" y="154" font-size="8" fill="#5b7db1" text-anchor="middle">WatchCreate/Cancel → 在底层 watchStream 建/删 watcher</text>
  <rect x="580" y="176" width="440" height="54" rx="8" fill="#fff" stroke="#bcd0ec"/>
  <text x="800" y="196" font-size="9" font-weight="600" fill="#1b2a4a" text-anchor="middle">sendLoop（:410）汇聚事件发回</text>
  <text x="800" y="214" font-size="8" fill="#5b7db1" text-anchor="middle">所有 watcher 事件 → 打 watchId → 经这条流发</text>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <line x1="220" y1="150" x2="300" y2="150" marker-end="url(#ar)"/>
    <line x1="500" y1="150" x2="560" y2="150" marker-end="url(#ar)"/>
  </g>
  <rect x="40" y="286" width="490" height="130" rx="12" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="60" y="310" font-size="11" font-weight="700" fill="#7a5a1e">进度通知（progress notify）</text>
  <text x="60" y="332" font-size="9.5" fill="#93762e">· 即使无变更，周期性（默认 10min）发一个空响应</text>
  <text x="60" y="352" font-size="9.5" fill="#93762e">· 内容 = "当前 revision"，告诉 client"我还活着、已同步到此"</text>
  <text x="60" y="372" font-size="9" fill="#b08843">· k8s 用它判断 watch 是否健康、更新 resourceVersion</text>
  <text x="60" y="390" font-size="9" fill="#b08843">· 相邻进度事件可 elide 合并（:503），减少无谓推送</text>
  <text x="60" y="408" font-size="8.5" fill="#a98a4a">注意：它不是数据变更，别当事件处理</text>
  <rect x="550" y="286" width="490" height="130" rx="12" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="570" y="310" font-size="11" font-weight="700" fill="#274a78">为什么多路复用</text>
  <text x="570" y="332" font-size="9.5" fill="#5b7db1">· 一个 client watch 几百 key，若每个开一条连接 → 连接爆炸</text>
  <text x="570" y="352" font-size="9.5" fill="#5b7db1">· 一条 gRPC 流承载全部 watcher，用 watchId 区分</text>
  <text x="570" y="372" font-size="9.5" fill="#5b7db1">· 省连接、省内存、省 goroutine</text>
  <text x="570" y="392" font-size="9" fill="#8aa6cf">· client 库自动做多路复用，用户只管 Watch(key) 拿 channel</text>
  <text x="570" y="408" font-size="8.5" fill="#8aa6cf">工程要点：别为每个 key 手动开新连接</text>
</svg>
