<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter></defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks 依赖矩阵 · 接口主线 × 支撑能力域</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">三角一致性仲裁表:每个接口主线实际触达哪些支撑能力域。● 直接依赖　○ 间接/条件依赖</text>

  <!-- column headers -->
  <g font-size="8.3" text-anchor="middle" font-weight="600">
    <text x="300" y="92" fill="#274a78">元数据</text>
    <text x="392" y="92" fill="#5b7db1">存储引擎</text>
    <text x="484" y="92" fill="#12402a">优化技术</text>
    <text x="576" y="92" fill="#2c5a3a">执行引擎</text>
    <text x="668" y="92" fill="#5a3410">事务一致</text>
    <text x="760" y="92" fill="#7a2016">资源负载</text>
    <text x="852" y="92" fill="#5a3d78">集群自愈</text>
    <text x="944" y="92" fill="#93762e">后台任务</text>
  </g>
  <line x1="30" y1="100" x2="1004" y2="100" stroke="#d2d2d7" stroke-width="1"/>

  <!-- DDL -->
  <rect x="30" y="106" width="220" height="86" rx="8" fill="#faf4fb" stroke="#e2d2ee"/>
  <text x="44" y="134" font-size="11" font-weight="700" fill="#5a3d78">DDL 定义</text><text x="44" y="153" font-size="7.5" fill="#7a5a95">建库/表/分区/分桶</text><text x="44" y="169" font-size="7.5" fill="#7a5a95">动态分区</text>
  <g font-size="12" text-anchor="middle">
    <text x="300" y="153" fill="#274a78">●</text><text x="392" y="153" fill="#5b7db1">●</text><text x="852" y="153" fill="#5a3d78">●</text><text x="944" y="153" fill="#93762e">○</text>
  </g>

  <!-- DML -->
  <rect x="30" y="198" width="220" height="86" rx="8" fill="#faf4fb" stroke="#e2d2ee"/>
  <text x="44" y="226" font-size="11" font-weight="700" fill="#5a3d78">DML 操纵</text><text x="44" y="245" font-size="7.5" fill="#7a5a95">INSERT/Stream/Broker</text><text x="44" y="261" font-size="7.5" fill="#7a5a95">/Routine Load</text>
  <g font-size="12" text-anchor="middle">
    <text x="300" y="245" fill="#274a78">●</text><text x="392" y="245" fill="#5b7db1">●</text><text x="576" y="245" fill="#8ab89a">○</text><text x="668" y="245" fill="#5a3410">●</text><text x="944" y="245" fill="#93762e">●</text>
  </g>

  <!-- DQL -->
  <rect x="30" y="290" width="220" height="86" rx="8" fill="#faf4fb" stroke="#e2d2ee"/>
  <text x="44" y="318" font-size="11" font-weight="700" fill="#5a3d78">DQL 查询</text><text x="44" y="337" font-size="7.5" fill="#7a5a95">SELECT · MPP</text><text x="44" y="353" font-size="7.5" fill="#7a5a95">解析→CBO→执行</text>
  <g font-size="12" text-anchor="middle">
    <text x="300" y="337" fill="#274a78">●</text><text x="392" y="337" fill="#5b7db1">●</text><text x="484" y="337" fill="#12402a">●</text><text x="576" y="337" fill="#2c5a3a">●</text><text x="760" y="337" fill="#7a2016">●</text><text x="852" y="337" fill="#b6a0cf">○</text>
  </g>

  <!-- DCL -->
  <rect x="30" y="382" width="220" height="86" rx="8" fill="#faf4fb" stroke="#e2d2ee"/>
  <text x="44" y="410" font-size="11" font-weight="700" fill="#5a3d78">DCL 控制</text><text x="44" y="429" font-size="7.5" fill="#7a5a95">认证 + RBAC 授权</text><text x="44" y="445" font-size="7.5" fill="#7a5a95">横切所有主线</text>
  <g font-size="12" text-anchor="middle">
    <text x="300" y="429" fill="#274a78">●</text><text x="484" y="429" fill="#8ab89a">○</text>
  </g>

  <!-- separators -->
  <g stroke="#ececf1" stroke-width="1">
    <line x1="346" y1="100" x2="346" y2="468"/><line x1="438" y1="100" x2="438" y2="468"/><line x1="530" y1="100" x2="530" y2="468"/><line x1="622" y1="100" x2="622" y2="468"/><line x1="714" y1="100" x2="714" y2="468"/><line x1="806" y1="100" x2="806" y2="468"/><line x1="898" y1="100" x2="898" y2="468"/>
  </g>

  <text x="30" y="492" font-size="8.5" fill="#b1483a">· DQL 依赖优化(CBO)+执行(pipeline)+存储(扫 Segment)+元数据(schema/统计)+资源组(WorkGroup)+DCL(鉴权);DML 依赖事务(2PC/publish)+存储(写 Rowset)+元数据(版本落 EditLog)+后台(Compaction 收尾)</text>
  <text x="30" y="508" font-size="8.5" fill="#a1a1a6">· 每个 ●/○ 都能在对应主线正文找到落点——这是三角一致性的检查依据</text>
</svg>
