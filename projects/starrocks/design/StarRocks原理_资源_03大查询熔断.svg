<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks CPU 加权调度与大查询熔断</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">WorkGroup 用 cpu_weight 做加权公平调度(类 CFS);运行中检查大查询限额,超限熔断</text>

  <!-- CPU weighted -->
  <rect x="30" y="72" width="500" height="200" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="94" font-size="11" font-weight="700" fill="#1b2a4a">CPU 隔离 · 加权公平调度</text>
  <rect x="46" y="106" width="468" height="50" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="60" y="126" font-size="8.8" font-weight="600" fill="#274a78">runtime_ns(cpu_weight) 折算 vruntime</text><text x="60" y="144" font-size="8.3" fill="#5b7db1">消耗 CPU 时间 × 权重 → vruntime(work_group.h:52)</text>
  <rect x="46" y="164" width="468" height="50" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="60" y="184" font-size="8.8" font-weight="600" fill="#274a78">GlobalDriverExecutor 按 vruntime 选下一个</text><text x="60" y="202" font-size="8.3" fill="#5b7db1">权重高的组拿更多 CPU 份额(类 CFS)</text>
  <text x="46" y="236" font-size="8.8" fill="#5b7db1">· cpu_weight 是相对份额,非绝对核数</text>
  <text x="46" y="254" font-size="8.8" fill="#5b7db1">· 空闲时高权重组也能用满;竞争时才按比例分</text>

  <!-- big query circuit break -->
  <rect x="550" y="72" width="500" height="200" rx="13" fill="#fbeaea" stroke="#e7c3c3"/>
  <text x="566" y="94" font-size="11" font-weight="700" fill="#4a1414">大查询熔断 · check_big_query(work_group.h:216)</text>
  <text x="566" y="116" font-size="8.8" fill="#7a2a2a">运行中持续检查累计消耗,超限即终止:</text>
  <rect x="566" y="126" width="468" height="34" rx="7" fill="#fbeaea" stroke="#e7c3c3"/><text x="580" y="147" font-size="8.5" fill="#4a1414">big_query_mem_limit(内存上限,:233)</text>
  <rect x="566" y="166" width="468" height="34" rx="7" fill="#fbeaea" stroke="#e7c3c3"/><text x="580" y="187" font-size="8.5" fill="#4a1414">big_query_cpu_second_limit(CPU 秒,:237)</text>
  <rect x="566" y="206" width="468" height="34" rx="7" fill="#fbeaea" stroke="#e7c3c3"/><text x="580" y="227" font-size="8.5" fill="#4a1414">big_query_scan_rows_limit(扫描行,:238)</text>
  <text x="566" y="260" font-size="8.5" fill="#7a2a2a">短查询不受影响;保护共享组不被单查询拖垮</text>

  <!-- spill -->
  <rect x="30" y="288" width="1020" height="90" rx="13" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="46" y="310" font-size="11" font-weight="700" fill="#5a3410">内存溢写 · spill_mem_limit_threshold</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="46" y="322" width="300" height="44" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="196" y="342" fill="#5a3410">算子内存超阈值</text><text x="196" y="358" fill="#93762e">如聚合/排序/Join 的中间结果</text>
    <rect x="386" y="322" width="300" height="44" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="536" y="342" fill="#12402a">可溢写算子落盘</text><text x="536" y="358" fill="#2f6f4f">以磁盘换内存,保稳定</text>
    <rect x="726" y="322" width="308" height="44" rx="8" fill="#fff" stroke="#e8cf9a"/><text x="880" y="342" fill="#5a3410">避免 OOM 拖垮整组</text><text x="880" y="358" fill="#93762e">代价:溢写查询变慢</text>
  </g>
  <line x1="346" y1="344" x2="386" y2="344" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="686" y1="344" x2="726" y2="344" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- note -->
  <rect x="30" y="392" width="1020" height="110" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="414" font-size="11" font-weight="700" fill="#1d1d1f">要点</text>
  <text x="46" y="436" font-size="9" fill="#6e6e73">· 资源组四维隔离:CPU(加权调度)、内存(上限+溢写)、并发(上限)、大查询(运行中熔断)——让 ETL 大查询与在线小查询混跑而互不拖垮</text>
  <text x="46" y="456" font-size="9" fill="#6e6e73">· cpu_weight 是相对份额不是硬绑核:空闲让满、竞争按比例,类似 Linux CFS 的 vruntime 公平调度</text>
  <text x="46" y="476" font-size="9" fill="#6e6e73">· 大查询熔断是运行中持续检查(不是一开始就拒),超累计限额才终止,短查询无感</text>
  <text x="46" y="494" font-size="8.5" fill="#b1483a">· 归属:Driver 实际调度在【执行引擎】(WorkGroup 提供份额约束);资源组定义落点在【元数据】</text>
</svg>
