<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks Tablet 调度与克隆修复 · TabletScheduler 分发 CloneTask</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">优先级队列排队 → 每盘并发槽限流 → 目标 BE 拉健康副本 → publish 追版本转 HEALTHY</text>

  <!-- Scheduler container -->
  <rect x="30" y="72" width="440" height="240" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="50" y="98" font-size="12" font-weight="700" fill="#1b2a4a">TabletScheduler</text>
  <text x="50" y="115" font-size="8" fill="#5b7db1">extends LeaderDaemon</text>
  <text x="50" y="131" font-size="8" fill="#5b7db1">SCHEDULE_INTERVAL_MS = 1000ms(间隔调度)</text>

  <!-- invariant -->
  <rect x="50" y="144" width="400" height="30" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="250" y="164" font-size="9" text-anchor="middle" fill="#274a78">不变式:allTabletIds = pendingTablets + runningTablets</text>

  <!-- pending queue -->
  <rect x="50" y="184" width="192" height="112" rx="10" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="146" y="206" font-size="9.5" font-weight="700" text-anchor="middle" fill="#5a3d78">pendingTablets</text>
  <text x="146" y="222" font-size="8" text-anchor="middle" fill="#8d6bb0">PriorityQueue&lt;TabletSchedCtx&gt;</text>
  <text x="146" y="236" font-size="8" text-anchor="middle" fill="#8d6bb0">按优先级排序</text>
  <g text-anchor="middle" font-size="7.5">
    <rect x="62" y="246" width="168" height="16" rx="4" fill="#fbeaea" stroke="#e6b8b8"/><text x="146" y="258" fill="#8a2a2a">VERY_HIGH · REPLICA_MISSING</text>
    <rect x="62" y="265" width="168" height="16" rx="4" fill="#fff7e6" stroke="#e8cf9a"/><text x="146" y="277" fill="#5a3410">HIGH · VERSION_INCOMPLETE</text>
  </g>

  <!-- running map -->
  <rect x="258" y="184" width="192" height="112" rx="10" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="354" y="206" font-size="9.5" font-weight="700" text-anchor="middle" fill="#12402a">runningTablets</text>
  <text x="354" y="222" font-size="8" text-anchor="middle" fill="#2f6f4f">Map(调度中)</text>
  <text x="354" y="248" font-size="8" text-anchor="middle" fill="#2f6f4f">updateClusterLoadStatistics</text>
  <text x="354" y="262" font-size="8" text-anchor="middle" fill="#2f6f4f">AndPriority</text>
  <text x="354" y="282" font-size="8" text-anchor="middle" fill="#2f6f4f">→ handleRunningTablets</text>

  <!-- backpressure card -->
  <rect x="30" y="330" width="440" height="180" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="50" y="354" font-size="11" font-weight="700" fill="#5a3410">背压与限流(防克隆 IO 打满)</text>
  <rect x="50" y="366" width="400" height="42" rx="9" fill="#fef2e0" stroke="#e8cf9a"/>
  <text x="66" y="385" font-size="9" fill="#5a3410"><tspan font-weight="600">tablet_sched_max_scheduling_tablets</tspan></text>
  <text x="66" y="400" font-size="8" fill="#93762e">全局同时调度 Tablet 上限</text>
  <rect x="50" y="416" width="400" height="42" rx="9" fill="#fef2e0" stroke="#e8cf9a"/>
  <text x="66" y="435" font-size="9" fill="#5a3410">每盘并发槽 <tspan font-weight="600">MIN_SLOT_PER_PATH=2 .. MAX=64</tspan></text>
  <text x="66" y="450" font-size="8" fill="#93762e">防单盘 IO 被克隆打满,不抢查询</text>
  <text x="50" y="480" font-size="8.5" fill="#93762e">修复优先级 &gt; 均衡(共用同一调度器与并发槽)</text>
  <text x="50" y="497" font-size="8.5" fill="#93762e">tablet_sched_disable_balance:大导入期可临时只保修复</text>

  <!-- CloneTask flow -->
  <text x="710" y="98" font-size="10.5" font-weight="700" fill="#1d1d1f">分发 CloneTask · 拉取健康副本</text>

  <rect x="530" y="120" width="200" height="86" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="630" y="150" font-size="10.5" font-weight="700" text-anchor="middle" fill="#274a78">CloneTask</text>
  <text x="630" y="170" font-size="8" text-anchor="middle" fill="#5b7db1">task.CloneTask</text>
  <text x="630" y="188" font-size="8" text-anchor="middle" fill="#5b7db1">下发到目标 BE 执行</text>

  <!-- source BE (healthy replica) -->
  <rect x="820" y="112" width="230" height="52" rx="11" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="935" y="134" font-size="9.5" font-weight="700" text-anchor="middle" fill="#12402a">源 BE · 健康副本</text>
  <text x="935" y="151" font-size="8" text-anchor="middle" fill="#2f6f4f">提供完整版本数据</text>

  <!-- target BE -->
  <rect x="820" y="176" width="230" height="52" rx="11" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="935" y="198" font-size="9.5" font-weight="700" text-anchor="middle" fill="#5a3410">目标 BE · 新副本落盘</text>
  <text x="935" y="215" font-size="8" text-anchor="middle" fill="#93762e">从源 BE 拉取,占用盘并发槽</text>

  <line x1="450" y1="240" x2="530" y2="180" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="500" y="200" font-size="7.5" fill="#86868b" transform="rotate(-37 500 200)">分发</text>
  <line x1="730" y1="150" x2="818" y2="140" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <path d="M820,150 L780,150 L780,200 L818,200" fill="none" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="758" y="178" font-size="7.5" text-anchor="middle" fill="#86868b">拉数据</text>

  <!-- completion -> publish -> healthy -->
  <rect x="530" y="248" width="520" height="120" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="546" y="272" font-size="10.5" font-weight="700" fill="#1d1d1f">克隆完成 → publish 追版本 → 转 HEALTHY</text>
  <g text-anchor="middle">
    <rect x="546" y="286" width="150" height="62" rx="10" fill="#fef2e0" stroke="#e8cf9a"/><text x="621" y="312" font-size="9" font-weight="600" fill="#5a3410">克隆完成</text><text x="621" y="330" font-size="8" fill="#93762e">新副本落盘</text>
    <rect x="726" y="286" width="150" height="62" rx="10" fill="#f4eefb" stroke="#d9c7ec"/><text x="801" y="312" font-size="9" font-weight="600" fill="#5a3d78">publish 追版本</text><text x="801" y="330" font-size="8" fill="#8d6bb0">补齐至最新可见版本</text>
    <rect x="906" y="286" width="128" height="62" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="970" y="312" font-size="9" font-weight="600" fill="#12402a">转 HEALTHY</text><text x="970" y="330" font-size="8" fill="#2f6f4f">脱离调度</text>
  </g>
  <line x1="696" y1="317" x2="724" y2="317" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="876" y1="317" x2="904" y2="317" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- feedback dashed back to scheduler -->
  <path d="M790,368 L790,392 L500,392 L500,296 L452,296" fill="none" stroke="#c7c7cc" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="600" y="386" font-size="8" fill="#86868b">HEALTHY 后从 runningTablets 移除,释放并发槽</text>

  <rect x="530" y="384" width="520" height="126" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="546" y="408" font-size="10" font-weight="700" fill="#1d1d1f">要点</text>
  <text x="546" y="430" font-size="8.7" fill="#6e6e73">· pending 按优先级出队,running 用 Map 跟踪,二者之和恒等于 allTabletIds。</text>
  <text x="546" y="450" font-size="8.7" fill="#6e6e73">· 每 1000ms 一轮:先更新负载与优先级,再处理运行中 Tablet。</text>
  <text x="546" y="470" font-size="8.7" fill="#6e6e73">· 本地表靠多副本克隆补齐;云原生表 CN 无状态,只需 StarOS 重分配 Shard。</text>
  <text x="546" y="490" font-size="8.7" fill="#6e6e73">· 并发槽把修复 IO 限在每盘 2..64,避免抢占前台查询。</text>
</svg>
