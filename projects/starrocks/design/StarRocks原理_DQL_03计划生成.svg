<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks 计划生成 · 逻辑计划 → 物理计划 → Fragment</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">createQueryPlan(StatementPlanner.java:319):AST 转逻辑计划 → Cascades CBO 出物理计划 → 切成分布式 PlanFragment</text>

  <!-- three-stage top row -->
  <g text-anchor="middle">
    <rect x="30" y="76" width="316" height="92" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="188" y="102" font-size="11" font-weight="700" fill="#1b2a4a">RelationTransformer</text><text x="188" y="122" font-size="8.8" fill="#5b7db1">transformWithSelectLimit(:333)</text><text x="188" y="140" font-size="8.8" fill="#5b7db1">AST → 逻辑计划 LogicalPlan</text><text x="188" y="158" font-size="8" fill="#a1a1a6">算子树(Scan/Join/Agg/…)</text>
    <rect x="382" y="76" width="316" height="92" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="540" y="102" font-size="11" font-weight="700" fill="#12402a">Optimizer.optimize · Cascades CBO</text><text x="540" y="122" font-size="8.8" fill="#2f6f4f">代价驱动搜索最优物理实现(:347)</text><text x="540" y="140" font-size="8.8" fill="#2f6f4f">产出物理 OptExpression</text><text x="540" y="158" font-size="8" fill="#a1a1a6">选 Join/分布/算子(见优化技术篇)</text>
    <rect x="734" y="76" width="316" height="92" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="892" y="102" font-size="11" font-weight="700" fill="#1b2a4a">PlanFragmentBuilder</text><text x="892" y="122" font-size="8.8" fill="#5b7db1">createPhysicalPlan(:279)</text><text x="892" y="140" font-size="8.8" fill="#5b7db1">物理计划 → 切 PlanFragment</text><text x="892" y="158" font-size="8" fill="#a1a1a6">插入 ExchangeNode 划界</text>
  </g>
  <line x1="346" y1="122" x2="382" y2="122" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="698" y1="122" x2="734" y2="122" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- fragment tree container -->
  <rect x="30" y="196" width="700" height="316" rx="14" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="46" y="218" font-size="11" font-weight="700" fill="#274a78">切成 PlanFragment · ExchangeNode 做分布式重分布</text>
  <text x="714" y="218" font-size="8" text-anchor="end" fill="#a1a1a6">planner/ExchangeNode.java:75</text>

  <!-- root fragment -->
  <rect x="196" y="234" width="368" height="76" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="380" y="256" font-size="10.5" font-weight="700" text-anchor="middle" fill="#1b2a4a">根 Fragment(结果汇聚)</text>
  <text x="380" y="275" font-size="8.5" text-anchor="middle" fill="#5b7db1">ExchangeNode 下用 UNPARTITIONED 汇聚(:338)</text>
  <text x="380" y="292" font-size="8.5" text-anchor="middle" fill="#5b7db1">单实例收所有上游数据 → 返回 FE</text>

  <!-- exchange node -->
  <rect x="256" y="330" width="248" height="46" rx="10" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="380" y="350" font-size="10" font-weight="700" text-anchor="middle" fill="#5a3d78">ExchangeNode → EXCHANGE_NODE</text>
  <text x="380" y="366" font-size="8.3" text-anchor="middle" fill="#8a6db3">数据经所在 fragment 的 DataStreamSink 移动</text>
  <line x1="380" y1="330" x2="380" y2="310" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- scan fragments -->
  <g text-anchor="middle">
    <rect x="60" y="404" width="290" height="88" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/><text x="205" y="428" font-size="10.5" font-weight="700" fill="#5a3410">扫描 Fragment A</text><text x="205" y="448" font-size="8.5" fill="#93762e">DataPartition.RANDOM 播种</text><text x="205" y="464" font-size="8.5" fill="#93762e">多实例并行扫 Tablet</text><text x="205" y="480" font-size="8" fill="#a1a1a6">数据源头,分布到多 BE</text>
    <rect x="410" y="404" width="290" height="88" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/><text x="555" y="428" font-size="10.5" font-weight="700" fill="#5a3410">扫描 Fragment B</text><text x="555" y="448" font-size="8.5" fill="#93762e">DataPartition.RANDOM 播种</text><text x="555" y="464" font-size="8.5" fill="#93762e">经 Exchange 向上重分布</text><text x="555" y="480" font-size="8" fill="#a1a1a6">Shuffle/Broadcast 到父</text>
  </g>
  <path d="M205,404 L205,388 L300,388 L300,376" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M555,404 L555,388 L460,388 L460,376" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- right panel: key points -->
  <rect x="746" y="196" width="304" height="316" rx="14" fill="#ffffff" stroke="#ececf1"/>
  <text x="762" y="218" font-size="11" font-weight="700" fill="#1d1d1f">分布式化要点</text>
  <g>
    <rect x="762" y="230" width="272" height="66" rx="10" fill="#f4eefb" stroke="#d9c7ec"/><text x="774" y="250" font-size="9.5" font-weight="700" fill="#5a3d78">ExchangeNode = 分布式骨架</text><text x="774" y="267" font-size="8.5" fill="#8a6db3">fragment 间重分布/汇聚全靠它</text><text x="774" y="283" font-size="8.5" fill="#8a6db3">(误区:它是可选优化)</text>
    <rect x="762" y="304" width="272" height="66" rx="10" fill="#fff7e6" stroke="#e8cf9a"/><text x="774" y="324" font-size="9.5" font-weight="700" fill="#5a3410">扫描 fragment · RANDOM</text><text x="774" y="341" font-size="8.5" fill="#93762e">数据播种源头,多实例并行</text><text x="774" y="357" font-size="8.5" fill="#93762e">分散到各 BE 提高吞吐</text>
    <rect x="762" y="378" width="272" height="66" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="774" y="398" font-size="9.5" font-weight="700" fill="#1b2a4a">根 fragment · UNPARTITIONED</text><text x="774" y="415" font-size="8.5" fill="#5b7db1">单实例汇聚全部结果</text><text x="774" y="431" font-size="8.5" fill="#5b7db1">交回 FE 返回客户端</text>
    <rect x="762" y="452" width="272" height="46" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="774" y="472" font-size="9.5" font-weight="700" fill="#12402a">下一步 → DefaultCoordinator</text><text x="774" y="488" font-size="8.5" fill="#2f6f4f">把 Fragment 实例分发到各 BE</text>
  </g>
</svg>
