<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks 存储层级 · Tablet → Rowset → Segment</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">表按分区+分桶切成 Tablet;每次导入产出一个 Rowset(版本+1);Rowset 含多个列式 Segment 文件。与 Doris 同源同名</text>

  <!-- table -->
  <rect x="30" y="70" width="1020" height="40" rx="10" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="540" y="95" font-size="11" font-weight="700" text-anchor="middle" fill="#5a3d78">表 Table（分区 Partition × 分桶 Distribution）</text>

  <!-- tablets -->
  <g text-anchor="middle">
    <rect x="30" y="130" width="320" height="70" rx="11" fill="#eef3fb" stroke="#bcd0ec"/><text x="190" y="154" font-size="10.5" font-weight="700" fill="#1b2a4a">Tablet 1</text><text x="190" y="174" font-size="8" fill="#5b7db1">数据分布/副本/调度单位</text><text x="190" y="190" font-size="8" fill="#5b7db1">带 KeysType</text>
    <rect x="380" y="130" width="320" height="70" rx="11" fill="#eef3fb" stroke="#bcd0ec"/><text x="540" y="154" font-size="10.5" font-weight="700" fill="#1b2a4a">Tablet 2</text><text x="540" y="174" font-size="8" fill="#5b7db1">三副本(存算一体)/ Shard(存算分离)</text><text x="540" y="190" font-size="8" fill="#5b7db1">add_rowset / get_rowset_by_version</text>
    <rect x="730" y="130" width="320" height="70" rx="11" fill="#eef3fb" stroke="#bcd0ec"/><text x="890" y="154" font-size="10.5" font-weight="700" fill="#1b2a4a">Tablet N …</text><text x="890" y="174" font-size="8" fill="#5b7db1">分桶数 = Tablet 数</text><text x="890" y="190" font-size="8" fill="#5b7db1">决定并行度</text>
  </g>
  <line x1="540" y1="110" x2="540" y2="130" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- rowsets in tablet 1 -->
  <rect x="30" y="220" width="1020" height="120" rx="12" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="46" y="242" font-size="10.5" font-weight="700" fill="#5a3410">Tablet 1 内的 Rowset（每个 = 一个版本区间 Version{start,end}）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="46" y="254" width="230" height="72" rx="9" fill="#fef2e0" stroke="#e8cf9a" filter="url(#soft)"/><text x="161" y="276" font-weight="600" fill="#5a3410">Rowset [0-5]</text><text x="161" y="294" fill="#93762e">首批导入(已 Compaction)</text><text x="161" y="310" fill="#93762e">基线大文件</text>
    <rect x="286" y="254" width="230" height="72" rx="9" fill="#fef2e0" stroke="#e8cf9a" filter="url(#soft)"/><text x="401" y="276" font-weight="600" fill="#5a3410">Rowset [6-6]</text><text x="401" y="294" fill="#93762e">一次导入=一个版本</text><text x="401" y="310" fill="#93762e">增量小文件</text>
    <rect x="526" y="254" width="230" height="72" rx="9" fill="#fef2e0" stroke="#e8cf9a" filter="url(#soft)"/><text x="641" y="276" font-weight="600" fill="#5a3410">Rowset [7-7]</text><text x="641" y="294" fill="#93762e">增量小文件</text><text x="641" y="310" fill="#93762e">待 Compaction 合并</text>
    <rect x="766" y="254" width="268" height="72" rx="9" fill="#fff" stroke="#e8cf9a"/><text x="900" y="276" font-weight="600" fill="#5a3410">版本 = MVCC 载体</text><text x="900" y="294" fill="#93762e">读按可见版本取快照</text><text x="900" y="310" fill="#93762e">Compaction 合并版本</text>
  </g>

  <!-- segments -->
  <rect x="30" y="360" width="1020" height="100" rx="12" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="382" font-size="10.5" font-weight="700" fill="#12402a">Rowset 内的 Segment（列式数据文件）</text>
  <g text-anchor="middle" font-size="8.3">
    <rect x="46" y="394" width="300" height="56" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="196" y="414" font-weight="600" fill="#12402a">Segment 0</text><text x="196" y="432" fill="#2f6f4f">列式:每列 ColumnReader + 索引</text><text x="196" y="446" fill="#2f6f4f">Zone Map/Bloom/Bitmap/短键</text>
    <rect x="356" y="394" width="300" height="56" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="506" y="414" font-weight="600" fill="#12402a">Segment 1</text><text x="506" y="432" fill="#2f6f4f">footer 存列元 + 行数</text><text x="506" y="446" fill="#2f6f4f">列内分页(DATA/INDEX/DICT)</text>
    <rect x="666" y="394" width="368" height="56" rx="9" fill="#fff" stroke="#bfe0cd"/><text x="850" y="414" font-weight="600" fill="#12402a">一 Tablet → 多 Rowset → 多 Segment → 多列</text><text x="850" y="432" fill="#2f6f4f">层层向下,最终是列式页</text><text x="850" y="446" fill="#a1a1a6">与 Doris 词汇一致(声明 fork 自 Doris)</text>
  </g>
  <line x1="161" y1="326" x2="196" y2="394" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
</svg>
