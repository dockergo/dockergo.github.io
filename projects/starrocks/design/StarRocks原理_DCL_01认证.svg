<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks 认证链 · 可插拔身份验证(你是谁)</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">AuthenticationHandler 连接期先试原生认证再试安全集成;原生按 AuthPlugin 选 provider(误区:只能密码认证)</text>

  <!-- connect -->
  <rect x="30" y="76" width="150" height="64" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="105" y="104" font-size="11" font-weight="700" text-anchor="middle" fill="#1d1d1f">连接建立</text>
  <text x="105" y="123" font-size="8.5" text-anchor="middle" fill="#6e6e73">MySQL 握手</text>
  <line x1="180" y1="108" x2="212" y2="108" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- handler -->
  <rect x="212" y="76" width="838" height="64" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="228" y="100" font-size="11" font-weight="700" fill="#5a3d78">AuthenticationHandler.authenticate · 认证入口</text>
  <text x="228" y="120" font-size="8.8" fill="#8a6db3">先试 authenticateWithNative,失败再试 authenticateWithSecurityIntegration</text>
  <text x="1034" y="120" font-size="8" text-anchor="end" fill="#a1a1a6"></text>

  <!-- two branches -->
  <line x1="430" y1="140" x2="430" y2="168" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="800" y1="140" x2="800" y2="168" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Native auth container -->
  <rect x="30" y="170" width="700" height="242" rx="14" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="192" font-size="11" font-weight="700" fill="#1b2a4a">① 原生认证 authenticateWithNative</text>
  <text x="714" y="192" font-size="8" text-anchor="end" fill="#a1a1a6">按 AuthPlugin · ProviderFactory.create</text>
  <text x="46" y="210" font-size="8.8" fill="#5b7db1">按 AuthPlugin 经 AuthenticationProviderFactory 选 provider,再 authenticate(...)</text>

  <g text-anchor="middle">
    <rect x="46" y="224" width="326" height="80" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="209" y="250" font-size="10.5" font-weight="700" fill="#274a78">PlainPasswordAuthenticationProvider</text><text x="209" y="270" font-size="8.8" fill="#5b7db1">密码认证(默认)</text><text x="209" y="288" font-size="8.5" fill="#a1a1a6">校验用户名 + 密码散列</text>
    <rect x="388" y="224" width="326" height="80" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="551" y="250" font-size="10.5" font-weight="700" fill="#274a78">LDAPAuthProvider</text><text x="551" y="270" font-size="8.8" fill="#5b7db1">LDAP 认证</text><text x="551" y="288" font-size="8.5" fill="#a1a1a6">对接企业目录服务</text>
    <rect x="46" y="316" width="326" height="80" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="209" y="342" font-size="10.5" font-weight="700" fill="#274a78">JWTAuthenticationProvider</text><text x="209" y="362" font-size="8.8" fill="#5b7db1">JWT 令牌认证</text><text x="209" y="380" font-size="8.5" fill="#a1a1a6">校验签名与声明</text>
    <rect x="388" y="316" width="326" height="80" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="551" y="342" font-size="10.5" font-weight="700" fill="#274a78">OAuth2AuthenticationProvider</text><text x="551" y="362" font-size="8.8" fill="#5b7db1">OAuth2 认证</text><text x="551" y="380" font-size="8.5" fill="#a1a1a6">第三方授权服务器</text>
  </g>

  <!-- Security integration container -->
  <rect x="746" y="170" width="304" height="242" rx="14" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="762" y="192" font-size="11" font-weight="700" fill="#5a3410">② 安全集成 SecurityIntegration</text>
  <text x="762" y="210" font-size="8.8" fill="#93762e">可插拔接入企业身份源</text>
  <g text-anchor="middle">
    <rect x="762" y="224" width="272" height="52" rx="10" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/><text x="898" y="245" font-size="10" font-weight="700" fill="#5a3410">SecurityIntegrationFactory</text><text x="898" y="263" font-size="8.5" fill="#93762e">按配置组合多身份源</text>
    <rect x="762" y="286" width="272" height="52" rx="10" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/><text x="898" y="307" font-size="10" font-weight="700" fill="#5a3410">组信息 GroupProvider</text><text x="898" y="325" font-size="8.3" fill="#93762e">LDAP / Unix / File GroupProvider</text>
    <rect x="762" y="348" width="272" height="48" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="898" y="368" font-size="9.5" font-weight="700" fill="#12402a">组 → 授权阶段合并权限</text><text x="898" y="385" font-size="8.3" fill="#2f6f4f">有效权限含组(见 RBAC)</text>
  </g>

  <!-- session identity -->
  <rect x="30" y="440" width="1020" height="56" rx="12" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="46" y="463" font-size="11" font-weight="700" fill="#12402a">验证通过 → 建立会话身份(UserIdentity)</text>
  <text x="46" y="483" font-size="9" fill="#2f6f4f">认证一次(连接期);之后每条语句在规划期由 Authorizer 授权检查(见 DCL_03)。归属:权限元数据持久化在【元数据】EditLog。</text>
  <path d="M380,412 L380,426 L540,426 L540,440" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M898,412 L898,426 L560,426 L560,440" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
</svg>
