<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="480" viewBox="0 0 1080 480" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="480" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks 安全完整链路 · 认证一次 + 授权每语句</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">连接期认证一次建立身份;之后每条语句在规划阶段单独授权——粒度不同、职责分离</text>

  <!-- connection phase -->
  <rect x="30" y="72" width="1020" height="150" rx="13" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="46" y="94" font-size="11" font-weight="700" fill="#5a3d78">阶段一 · 连接建立(认证一次)</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="46" y="106" width="200" height="96" rx="9" fill="#faf4fb" stroke="#e2d2ee" filter="url(#soft)"/><text x="146" y="130" font-weight="600" fill="#3d2a5a">客户端连接</text><text x="146" y="150" fill="#7a5a95">MySQL 协议握手</text><text x="146" y="170" fill="#7a5a95">带用户名 + 凭证</text>
    <rect x="286" y="106" width="330" height="96" rx="9" fill="#faf4fb" stroke="#e2d2ee" filter="url(#soft)"/><text x="451" y="130" font-weight="600" fill="#3d2a5a">AuthenticationHandler.authenticate</text><text x="451" y="150" fill="#7a5a95">原生(密码/LDAP/JWT/OAuth2)</text><text x="451" y="170" fill="#7a5a95">→ 或安全集成 SecurityIntegration</text><text x="451" y="188" fill="#a1a1a6"></text>
    <rect x="656" y="106" width="378" height="96" rx="9" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="845" y="130" font-weight="600" fill="#12402a">建立会话身份</text><text x="845" y="150" fill="#2f6f4f">UserIdentity + 所属角色/组</text><text x="845" y="170" fill="#2f6f4f">整个连接期复用,不再重认证</text>
  </g>
  <line x1="246" y1="154" x2="286" y2="154" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="616" y1="154" x2="656" y2="154" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- per-statement phase -->
  <rect x="30" y="238" width="1020" height="150" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="260" font-size="11" font-weight="700" fill="#1b2a4a">阶段二 · 每条语句规划期(授权每语句)</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="46" y="272" width="230" height="96" rx="9" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="161" y="296" font-weight="600" fill="#274a78">语句到达</text><text x="161" y="316" fill="#5b7db1">SELECT/INSERT/CREATE…</text><text x="161" y="336" fill="#5b7db1">StatementPlanner.plan</text>
    <rect x="316" y="272" width="330" height="96" rx="9" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="481" y="296" font-weight="600" fill="#274a78">Authorizer.check(stmt, session)</text><text x="481" y="316" fill="#5b7db1">按涉及对象(库/表/列)× 动作</text><text x="481" y="336" fill="#5b7db1">查有效权限集(直授+角色+组)</text><text x="481" y="354" fill="#a1a1a6"></text>
    <rect x="686" y="272" width="170" height="96" rx="9" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="771" y="300" font-weight="600" fill="#12402a">过 → 生成计划</text><text x="771" y="322" fill="#2f6f4f">继续 CBO/执行</text>
    <rect x="866" y="272" width="168" height="96" rx="9" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/><text x="950" y="300" font-weight="600" fill="#4a1414">拒 → 权限错误</text><text x="950" y="322" fill="#7a2a2a">不生成计划</text><text x="950" y="342" fill="#7a2a2a">省得白执行</text>
  </g>
  <line x1="276" y1="320" x2="316" y2="320" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="646" y1="308" x2="686" y2="308" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="646" y1="332" x2="866" y2="332" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- note -->
  <rect x="30" y="404" width="1020" height="60" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="426" font-size="11" font-weight="700" fill="#1d1d1f">要点</text>
  <text x="46" y="448" font-size="9" fill="#6e6e73">· 认证一次(连接期验"你是谁")、授权每语句(规划期查"你能干啥");二者可插拔、职责分离,授权在规划期就挡住不合规语句</text>
</svg>
