<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks CBO 优化器 · 真正的 Cascades 三阶段</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">QueryOptimizer.optimizeByCost:Memo 记忆化搜索 + 规则驱动 + 代价择优,不是规则堆叠</text>

  <!-- Phase 1: RBO -->
  <rect x="30" y="70" width="1020" height="82" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="92" font-size="12" font-weight="700" fill="#1b2a4a">① 逻辑改写(RBO)· rewriteAndValidatePlan</text>
  <text x="46" y="111" font-size="9.5" fill="#5b7db1">定点改写,总不更差:谓词下推 · 列裁剪 · 常量折叠 · 子查询解嵌套 · Limit/TopN 下推 · 分区裁剪</text>
  <g text-anchor="middle" font-size="9">
    <rect x="640" y="118" width="122" height="24" rx="6" fill="#fff" stroke="#bcd0ec"/><text x="701" y="134" fill="#274a78">谓词下推</text>
    <rect x="770" y="118" width="122" height="24" rx="6" fill="#fff" stroke="#bcd0ec"/><text x="831" y="134" fill="#274a78">列裁剪</text>
    <rect x="900" y="118" width="134" height="24" rx="6" fill="#fff" stroke="#bcd0ec"/><text x="967" y="134" fill="#274a78">常量折叠</text>
  </g>

  <line x1="540" y1="152" x2="540" y2="172" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- Phase 2: Memo init -->
  <rect x="30" y="172" width="1020" height="96" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="46" y="194" font-size="12" font-weight="700" fill="#5a3410">② Memo 初始化 · memo.init</text>
  <text x="46" y="213" font-size="9.5" fill="#93762e">计划树 copyIn 成 Group + GroupExpression 去重;deriveAllGroupLogicalProperty 推导逻辑属性</text>
  <g text-anchor="middle" font-size="8.8">
    <rect x="46" y="226" width="300" height="30" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="196" y="245" fill="#5a3410">Join(Scan A, Scan B) → 3 个 Group</text>
    <rect x="360" y="226" width="330" height="30" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="525" y="245" fill="#5a3410">Group = 逻辑等价类;GroupExpression = 算子+输入 Group</text>
    <rect x="704" y="226" width="330" height="30" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="869" y="245" fill="#5a3410">同结构表达式去重,压缩搜索空间</text>
  </g>

  <line x1="540" y1="268" x2="540" y2="288" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- Phase 3: Cascades search -->
  <rect x="30" y="288" width="1020" height="164" rx="13" fill="#f6f8fc" stroke="#e6ecf4"/>
  <text x="46" y="310" font-size="12" font-weight="700" fill="#1d1d1f">③ Cascades 搜索 · memoOptimize → extractBestPlan → physicalRuleRewrite</text>
  <text x="46" y="328" font-size="9.3" fill="#5b7db1">任务队列驱动,经 TaskScheduler 调度</text>

  <!-- task queue cards -->
  <g text-anchor="middle" font-size="9">
    <rect x="46" y="340" width="188" height="42" rx="9" fill="#f4eefb" stroke="#d9c7ec"/><text x="140" y="358" font-weight="600" fill="#3d2a5a">OptimizeGroupTask</text><text x="140" y="374" font-size="8" fill="#5a3d78">优化整个 Group</text>
    <rect x="246" y="340" width="188" height="42" rx="9" fill="#f4eefb" stroke="#d9c7ec"/><text x="340" y="358" font-weight="600" fill="#3d2a5a">ApplyRuleTask</text><text x="340" y="374" font-size="8" fill="#5a3d78">对表达式套规则</text>
    <rect x="446" y="340" width="188" height="42" rx="9" fill="#f4eefb" stroke="#d9c7ec"/><text x="540" y="358" font-weight="600" fill="#3d2a5a">EnforceAndCostTask</text><text x="540" y="374" font-size="8" fill="#5a3d78">定价 + 强制输出属性</text>
    <rect x="646" y="340" width="188" height="42" rx="9" fill="#f4eefb" stroke="#d9c7ec"/><text x="740" y="358" font-weight="600" fill="#3d2a5a">DeriveStatsTask</text><text x="740" y="374" font-size="8" fill="#5a3d78">推导统计</text>
    <rect x="846" y="340" width="188" height="42" rx="9" fill="#ffffff" stroke="#d9c7ec"/><text x="940" y="358" font-weight="600" fill="#3d2a5a">ExploreGroupTask</text><text x="940" y="374" font-size="8" fill="#5a3d78">/ OptimizeExpressionTask</text>
  </g>

  <!-- rule split -->
  <rect x="46" y="394" width="500" height="46" rx="9" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="62" y="413" font-size="9.5" font-weight="700" fill="#12402a">转换规则 transformation(logical → logical)</text>
  <text x="62" y="430" font-size="8.5" fill="#2f6f4f">rule/transformation/ · 交换律/结合律等改写,不改物理形态</text>
  <rect x="558" y="394" width="476" height="46" rx="9" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="574" y="413" font-size="9.5" font-weight="700" fill="#1b2a4a">实现规则 implementation(logical → physical)</text>
  <text x="574" y="430" font-size="8.5" fill="#5b7db1">rule/implementation/ 如 HashJoinImplementationRule · 基类 Rule 持 RuleType+Pattern+transform</text>

  <!-- output -->
  <line x1="540" y1="452" x2="540" y2="472" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <rect x="30" y="472" width="1020" height="46" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="540" y="494" font-size="10.5" font-weight="700" text-anchor="middle" fill="#12402a">extractBestPlan 抽出最优物理计划 → physicalRuleRewrite 物理改写 → 交给执行引擎</text>
  <text x="540" y="510" font-size="8.5" text-anchor="middle" fill="#2f6f4f">转换规则探索等价形态,实现规则落地物理算子,EnforceAndCostTask 按代价择优</text>
</svg>
