<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks 版本发布与可见性 · publish → visible</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">COMMITTED ≠ 可见;PublishVersionDaemon(extends LeaderDaemon ·)把 COMMITTED 推到 VISIBLE——预留版本号在前、可见在后</text>

  <!-- COMMITTED source -->
  <rect x="30" y="76" width="180" height="90" rx="12" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="120" y="104" font-size="12" font-weight="700" text-anchor="middle" fill="#5a3410">COMMITTED 事务</text>
  <text x="120" y="126" font-size="8.4" text-anchor="middle" fill="#93762e">commit 已预留 nextVersion</text>
  <text x="120" y="142" font-size="8.4" text-anchor="middle" fill="#93762e">applyCommitLog</text>
  <text x="120" y="158" font-size="8.4" text-anchor="middle" fill="#93762e">尚不可读</text>

  <!-- daemon -->
  <rect x="270" y="76" width="200" height="90" rx="12" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="370" y="104" font-size="11.5" font-weight="700" text-anchor="middle" fill="#1b2a4a">PublishVersionDaemon</text>
  <text x="370" y="126" font-size="8.4" text-anchor="middle" fill="#5b7db1"></text>
  <text x="370" y="142" font-size="8.4" text-anchor="middle" fill="#5b7db1">为每个 BE 建一个任务</text>
  <text x="370" y="158" font-size="8.4" text-anchor="middle" fill="#5b7db1">携 txnId + List&lt;TPartitionVersionInfo&gt;</text>

  <line x1="210" y1="121" x2="270" y2="121" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- per-BE tasks -->
  <g text-anchor="middle">
    <rect x="540" y="70" width="170" height="46" rx="10" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
    <text x="625" y="90" font-size="10" font-weight="600" fill="#274a78">PublishVersionTask → BE 1</text>
    <text x="625" y="106" font-size="8" fill="#5b7db1"></text>

    <rect x="540" y="124" width="170" height="46" rx="10" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
    <text x="625" y="144" font-size="10" font-weight="600" fill="#274a78">PublishVersionTask → BE 2</text>
    <text x="625" y="160" font-size="8" fill="#5b7db1">按分区 apply 版本</text>

    <rect x="540" y="178" width="170" height="46" rx="10" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
    <text x="625" y="198" font-size="10" font-weight="600" fill="#274a78">PublishVersionTask → BE N</text>
    <text x="625" y="214" font-size="8" fill="#5b7db1">run_publish_version_task</text>
  </g>
  <path d="M470,111 L505,111 L505,93 L540,93" fill="none" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <path d="M470,121 L505,121 L505,147 L540,147" fill="none" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <path d="M470,131 L505,131 L505,201 L540,201" fill="none" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- BE side compute -->
  <rect x="770" y="70" width="280" height="154" rx="12" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="786" y="92" font-size="10" font-weight="700" fill="#12402a">BE 侧</text>
  <text x="786" y="112" font-size="8.5" fill="#2f6f4f">run_publish_version_task 按分区应用版本</text>
  <text x="786" y="130" font-size="8.5" fill="#2f6f4f">支持 enable_sync_publish(写后立即可读)</text>
  <rect x="786" y="142" width="248" height="70" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="910" y="162" font-size="8.4" text-anchor="middle" fill="#2f6f4f">每 BE 报完成 → 汇总</text>
  <text x="910" y="180" font-size="8.4" text-anchor="middle" fill="#2f6f4f">所有 BE 任务完成后</text>
  <text x="910" y="198" font-size="9.4" text-anchor="middle" font-weight="600" fill="#12402a">finishTransaction(...)</text>

  <!-- finish -> visible flow -->
  <path d="M910,224 L910,250 L370,250 L370,270" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="640" y="244" font-size="8.6" text-anchor="middle" fill="#6e6e73">全 BE 完成 → finishTransaction → 置 VISIBLE</text>

  <!-- visible rule band -->
  <rect x="30" y="278" width="620" height="120" rx="13" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="46" y="302" font-size="11" font-weight="700" fill="#12402a">可见版本只进不退 · OlapTableTxnLogApplier.applyVisibleLog</text>
  <rect x="46" y="314" width="588" height="34" rx="8" fill="#fff" stroke="#bfe0cd"/>
  <text x="340" y="336" font-size="10" text-anchor="middle" font-weight="600" fill="#12402a">if (partition.getVisibleVersion &lt; version) partition.updateVisibleVersion(...)</text>
  <text x="46" y="368" font-size="8.6" fill="#2f6f4f">注释:"data version == visible version in shared-nothing mode";失败副本记 lastFailedVersion,后续克隆修复</text>
  <text x="46" y="386" font-size="8.6" fill="#2f6f4f">PartitionCommitInfo持久化 version / versionTime / dataVersion / versionEpoch</text>

  <!-- lake path band -->
  <rect x="670" y="278" width="380" height="120" rx="13" fill="#faf4fb" stroke="#e2d2ee"/>
  <text x="686" y="302" font-size="11" font-weight="700" fill="#5a3d78">云原生表 · publishVersionForLakeTable</text>
  <text x="686" y="324" font-size="8.6" fill="#7a5a95">LakeTableTxnLogApplier.applyVisibleLog</text>
  <text x="686" y="342" font-size="8.6" fill="#7a5a95">断言 version == visibleVersion + 1</text>
  <text x="686" y="360" font-size="8.6" fill="#7a5a95">单一真源:无需 per-replica 跟踪</text>
  <text x="686" y="378" font-size="8.6" fill="#7a5a95"></text>

  <!-- MVCC essence footer -->
  <rect x="30" y="412" width="1020" height="98" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="436" font-size="10.5" font-weight="700" fill="#1d1d1f">为什么"预留在前、可见在后"是 MVCC 关键</text>
  <text x="46" y="458" font-size="9" fill="#6e6e73">· commit 阶段先在 applyCommitLog 预留 nextVersion(占位但读不到),publish 阶段才让它 visible——读永远取"已可见"的一致快照</text>
  <text x="46" y="478" font-size="9" fill="#6e6e73">· 误区:commit 成功就能读到。不。需等 PublishVersionDaemon 把版本推到 VISIBLE;不开 enable_sync_publish 时有短暂延迟</text>
  <text x="46" y="498" font-size="9" fill="#6e6e73">· 误区:版本会回退。可见版本严格只增(if visible &lt; version);失败副本用 lastFailedVersion 记录、后续克隆修复</text>
</svg>
