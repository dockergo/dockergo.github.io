<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks 导入事务 2PC 状态机 · TransactionStatus 6 态</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">一次导入=一个原子单元;GlobalTransactionMgr 统管、按库分派 DatabaseTransactionMgr;状态枚举</text>

  <!-- commitTransaction bracket over PREPARE..COMMITTED -->
  <text x="540" y="72" font-size="8.6" text-anchor="middle" fill="#93762e">commitTransaction = prepareTransaction + commitPreparedTransaction</text>
  <path d="M330,84 L330,80 L750,80 L750,84" fill="none" stroke="#e8cf9a" stroke-width="1.2"/>

  <!-- state cards (happy path) -->
  <g text-anchor="middle">
    <rect x="45" y="92" width="150" height="80" rx="12" fill="#f7f7f9" stroke="#e2e2e7"/>
    <text x="120" y="120" font-size="12" font-weight="700" fill="#48484a">UNKNOWN</text>
    <text x="120" y="140" font-size="8.3" fill="#86868b">默认 / 未找到</text>
    <text x="120" y="156" font-size="8.3" fill="#86868b">枚举零值</text>

    <rect x="255" y="92" width="150" height="80" rx="12" fill="#eef3fb" stroke="#bcd0ec"/>
    <text x="330" y="120" font-size="12" font-weight="700" fill="#1b2a4a">PREPARE</text>
    <text x="330" y="140" font-size="8.3" fill="#5b7db1">begin 创建</text>
    <text x="330" y="156" font-size="8.3" fill="#5b7db1">label 去重 · 限流</text>

    <rect x="465" y="92" width="150" height="80" rx="12" fill="#f3f7fc" stroke="#cfe0f2"/>
    <text x="540" y="120" font-size="12" font-weight="700" fill="#274a78">PREPARED</text>
    <text x="540" y="140" font-size="8.3" fill="#5b7db1">prepareTransaction</text>
    <text x="540" y="156" font-size="8.3" fill="#5b7db1">已预备待提交</text>

    <rect x="675" y="92" width="150" height="80" rx="12" fill="#fff7e6" stroke="#e8cf9a"/>
    <text x="750" y="120" font-size="12" font-weight="700" fill="#5a3410">COMMITTED</text>
    <text x="750" y="140" font-size="8.3" fill="#93762e">已提交 · 未可见</text>
    <text x="750" y="156" font-size="8.3" fill="#93762e">预留 nextVersion</text>

    <rect x="885" y="92" width="150" height="80" rx="12" fill="#eafaf1" stroke="#bfe0cd"/>
    <text x="960" y="120" font-size="12" font-weight="700" fill="#12402a">VISIBLE</text>
    <text x="960" y="140" font-size="8.3" fill="#2f6f4f">publish 后可读</text>
    <text x="960" y="156" font-size="8.3" fill="#2f6f4f">MVCC 快照可见</text>
  </g>

  <!-- happy-path transitions -->
  <line x1="195" y1="132" x2="255" y2="132" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="225" y="124" font-size="8.5" text-anchor="middle" fill="#6e6e73">begin</text>
  <line x1="405" y1="132" x2="465" y2="132" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="435" y="124" font-size="8.5" text-anchor="middle" fill="#6e6e73">prepare</text>
  <line x1="615" y1="132" x2="675" y2="132" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="645" y="124" font-size="8.5" text-anchor="middle" fill="#6e6e73">commit</text>
  <line x1="825" y1="132" x2="885" y2="132" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="855" y="124" font-size="8.5" text-anchor="middle" fill="#6e6e73">publish</text>

  <!-- ABORTED sink -->
  <rect x="335" y="232" width="200" height="72" rx="12" fill="#fbeaea" stroke="#e3b7b7"/>
  <text x="435" y="258" font-size="12" font-weight="700" text-anchor="middle" fill="#7a2016">ABORTED</text>
  <text x="435" y="278" font-size="8.3" text-anchor="middle" fill="#a5453a">回滚 / 失败 · 终态</text>
  <text x="435" y="294" font-size="8.3" text-anchor="middle" fill="#a5453a">仅 PREPARE / PREPARED 可转入</text>

  <!-- abort connectors -->
  <path d="M330,172 L330,205 L392,205 L392,232" fill="none" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <path d="M540,172 L540,205 L478,205 L478,232" fill="none" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="435" y="200" font-size="8.5" text-anchor="middle" fill="#a5453a">abort · 提交前可回滚</text>
  <text x="820" y="203" font-size="8.5" text-anchor="middle" fill="#93762e">COMMITTED / VISIBLE 不再回 ABORTED（版本只增）</text>

  <!-- bottom explainer band -->
  <rect x="30" y="336" width="1020" height="170" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="360" font-size="10.5" font-weight="700" fill="#1d1d1f">每次状态变更都在事务级锁内落 EditLog（persistTxnStateInTxnLevelLock ·）→ 故障重启回放到一致点</text>

  <g>
    <rect x="46" y="372" width="318" height="118" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
    <text x="62" y="394" font-size="10" font-weight="700" fill="#1b2a4a">总入口 · GlobalTransactionMgr</text>
    <text x="62" y="415" font-size="8.6" fill="#5b7db1">· 按 label 去重:一 label 至多一非 ABORTED 事务</text>
    <text x="62" y="433" font-size="8.6" fill="#5b7db1">· 同 requestId 重试 → DuplicatedRequestException</text>
    <text x="62" y="451" font-size="8.6" fill="#5b7db1">· checkRunningTxnExceedLimit 每库限流</text>
    <text x="62" y="469" font-size="8.6" fill="#5b7db1">· 按库分派 DatabaseTransactionMgr</text>

    <rect x="380" y="372" width="318" height="118" rx="10" fill="#fff7e6" stroke="#e8cf9a"/>
    <text x="396" y="394" font-size="10" font-weight="700" fill="#5a3410">PREPARED → COMMITTED</text>
    <text x="396" y="415" font-size="8.6" fill="#93762e">unprotectedCommitPreparedTransaction</text>
    <text x="396" y="433" font-size="8.6" fill="#93762e">· 校验状态合法</text>
    <text x="396" y="451" font-size="8.6" fill="#93762e">· reserveCommitTs 取严格单调 commitTs</text>
    <text x="396" y="469" font-size="8.6" fill="#93762e">分配全局事务号 GTID nextGtid</text>

    <rect x="714" y="372" width="318" height="118" rx="10" fill="#fbeaea" stroke="#e3b7b7"/>
    <text x="730" y="394" font-size="10" font-weight="700" fill="#7a2016">提交法定副本校验（本地表）</text>
    <text x="730" y="415" font-size="8.6" fill="#a5453a">OlapTableTxnStateListener.preCommit</text>
    <text x="730" y="433" font-size="8.6" fill="#a5453a">· 算 quorumReplicaNum(writeQuorum)</text>
    <text x="730" y="451" font-size="8.6" fill="#a5453a">· 成功副本不足 → TabletQuorumFailed</text>
    <text x="730" y="469" font-size="8.6" fill="#a5453a">Exception</text>
  </g>
</svg>
