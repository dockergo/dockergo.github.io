<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks 元数据日志 · EditLog → JournalWriter → BDB-JE（日志即真相）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">每个元数据变更先写一条带 op-code 的 EditLog,异步批量落 BDB-JE;GlobalStateMgr 是全局状态中枢,持有 EditLog/Journal/事务/调度器</text>

  <!-- 1. change source -->
  <rect x="30" y="80" width="200" height="120" rx="12" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="130" y="104" font-size="11" font-weight="700" text-anchor="middle" fill="#5a3d78">元数据变更</text>
  <text x="130" y="126" font-size="8.4" text-anchor="middle" fill="#7a5a95">建库 / 建表 / 加分区</text>
  <text x="130" y="142" font-size="8.4" text-anchor="middle" fill="#7a5a95">事务状态 …</text>
  <text x="130" y="164" font-size="8.4" text-anchor="middle" fill="#7a5a95">由 leader 发起</text>
  <text x="130" y="184" font-size="8.4" text-anchor="middle" fill="#7a5a95">(唯一写日志者)</text>

  <!-- 2. EditLog with op-code -->
  <rect x="270" y="80" width="230" height="120" rx="12" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="385" y="104" font-size="11" font-weight="700" text-anchor="middle" fill="#1b2a4a">EditLog · 带 op-code</text>
  <text x="385" y="122" font-size="8.2" text-anchor="middle" fill="#5b7db1">巨型 switch</text>
  <g text-anchor="middle" font-size="8.2">
    <rect x="286" y="132" width="198" height="20" rx="5" fill="#f3f7fc" stroke="#cfe0f2"/><text x="385" y="146" fill="#274a78">OP_CREATE_DB_V2</text>
    <rect x="286" y="156" width="198" height="20" rx="5" fill="#f3f7fc" stroke="#cfe0f2"/><text x="385" y="170" fill="#274a78">OP_CREATE_TABLE_V2</text>
    <rect x="286" y="180" width="198" height="14" rx="4" fill="#f3f7fc" stroke="#cfe0f2"/><text x="385" y="191" fill="#274a78">OP_ADD_PARTITION_V2 …</text>
  </g>

  <!-- 3. JournalWriter -->
  <rect x="540" y="80" width="230" height="120" rx="12" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="655" y="104" font-size="11" font-weight="700" text-anchor="middle" fill="#12402a">JournalWriter · 异步批量</text>
  <text x="655" y="122" font-size="8.2" text-anchor="middle" fill="#2f6f4f"></text>
  <text x="655" y="140" font-size="8.3" text-anchor="middle" fill="#2f6f4f">从 BlockingQueue&lt;JournalTask&gt; 取任务</text>
  <text x="655" y="158" font-size="8.3" text-anchor="middle" fill="#2f6f4f">batchWriteBegin / Append / Commit</text>
  <text x="655" y="176" font-size="8.3" text-anchor="middle" fill="#2f6f4f">提交成功后才推进</text>
  <text x="655" y="192" font-size="8.3" text-anchor="middle" fill="#2f6f4f">nextVisibleJournalId</text>

  <!-- 4. BDBJEJournal -->
  <rect x="810" y="80" width="240" height="120" rx="12" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="930" y="104" font-size="11" font-weight="700" text-anchor="middle" fill="#5a3410">BDBJEJournal · 底层存储</text>
  <text x="930" y="122" font-size="8.2" text-anchor="middle" fill="#93762e"></text>
  <text x="930" y="140" font-size="8.3" text-anchor="middle" fill="#93762e">每个日志段 = 一个 BDB Database</text>
  <text x="930" y="158" font-size="8.3" text-anchor="middle" fill="#93762e">rollJournal 换段</text>
  <text x="930" y="176" font-size="8.3" text-anchor="middle" fill="#93762e">getMaxJournalId</text>
  <text x="930" y="192" font-size="8.3" text-anchor="middle" fill="#93762e">deleteJournals …</text>

  <!-- flow arrows -->
  <line x1="230" y1="140" x2="270" y2="140" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="250" y="132" font-size="8" text-anchor="middle" fill="#6e6e73">序列化</text>
  <line x1="500" y1="140" x2="540" y2="140" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="520" y="132" font-size="8" text-anchor="middle" fill="#6e6e73">入队</text>
  <line x1="770" y1="140" x2="810" y2="140" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="790" y="132" font-size="8" text-anchor="middle" fill="#6e6e73">批量写</text>

  <!-- segments visual -->
  <rect x="810" y="230" width="240" height="90" rx="10" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="930" y="250" font-size="9" text-anchor="middle" font-weight="600" fill="#5a3410">BDB Database 日志段</text>
  <g text-anchor="middle" font-size="7.8" fill="#93762e">
    <rect x="824" y="260" width="48" height="46" rx="5" fill="#fff" stroke="#efdcb4"/><text x="848" y="280">段 0</text><text x="848" y="296">已镜像</text>
    <rect x="878" y="260" width="48" height="46" rx="5" fill="#fff" stroke="#efdcb4"/><text x="902" y="280">段 1</text><text x="902" y="296">活跃</text>
    <rect x="932" y="260" width="48" height="46" rx="5" fill="#fff" stroke="#efdcb4"/><text x="956" y="280">段 2</text><text x="956" y="296">活跃</text>
    <rect x="986" y="260" width="50" height="46" rx="5" fill="#f7f7f9" stroke="#e2e2e7"/><text x="1011" y="280" fill="#a1a1a6">段 …</text><text x="1011" y="296" fill="#a1a1a6">新段</text>
  </g>
  <line x1="930" y1="200" x2="930" y2="230" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- 为什么日志即真相 -->
  <rect x="30" y="230" width="740" height="90" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="46" y="254" font-size="10.5" font-weight="700" fill="#274a78">为什么"日志即真相"</text>
  <rect x="46" y="266" width="708" height="30" rx="7" fill="#fff" stroke="#cfe0f2"/>
  <text x="400" y="286" font-size="10" text-anchor="middle" font-weight="600" fill="#1b2a4a">任意时刻元数据全集 = 初始镜像 + 从镜像点到现在的所有 EditLog 回放</text>
  <text x="46" y="312" font-size="8.6" fill="#5b7db1">让 FE 重启、切主、扩缩容都收敛到同一状态;follower/observer 靠回放日志追平 leader</text>

  <!-- footer misconceptions -->
  <rect x="30" y="352" width="1020" height="126" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="376" font-size="10.5" font-weight="700" fill="#1d1d1f">工程要点</text>
  <text x="46" y="398" font-size="9" fill="#6e6e73">· GlobalStateMgr(server/GlobalStateMgr.java)持有 EditLog / Journal / 事务管理器 / Tablet 调度器 / 心跳 / StarOSAgent / LocalMetastore——几乎所有全局状态的根</text>
  <text x="46" y="418" font-size="9" fill="#6e6e73">· 写入异步批量:JournalWriter 攒批提交,提交成功才推进 nextVisibleJournalId——已可见 journalId 之前的变更才算生效</text>
  <text x="46" y="438" font-size="9" fill="#6e6e73">· 持久性由 master_sync_policy / replica_sync_policy 决定(SYNC / NO_SYNC / WRITE_NO_SYNC),权衡写延迟与断电丢失窗口</text>
  <text x="46" y="458" font-size="9" fill="#6e6e73">· 误区:follower 也能写元数据。不。只有 leader 写 EditLog,follower / observer 只回放</text>
</svg>
