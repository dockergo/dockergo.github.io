<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks 存算分离元数据 · StarManager / StarOS</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">云原生表的 Tablet↔节点放置不由 FE 直管,交给内嵌的 StarManager;跑在与 FE 同一套 BDBJE、随 FE 一起选主</text>

  <!-- FE process big container -->
  <rect x="30" y="72" width="620" height="270" rx="16" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="46" y="95" font-size="12" font-weight="700" fill="#274a78">FE 进程</text>
  <text x="46" y="112" font-size="8.4" fill="#5b7db1">误区:StarManager 是独立进程——不,它内嵌在 FE 里,与 FE 共享 BDBJE 并一起选主</text>

  <!-- GlobalStateMgr / FE meta -->
  <rect x="46" y="124" width="286" height="92" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="189" y="146" font-size="10.5" font-weight="700" text-anchor="middle" fill="#1b2a4a">FE 元数据(库表 schema)</text>
  <text x="189" y="166" font-size="8.4" text-anchor="middle" fill="#5b7db1">GlobalStateMgr + EditLog</text>
  <text x="189" y="184" font-size="8.4" text-anchor="middle" fill="#5b7db1">误区:存算分离没 FE 元数据——仍有</text>
  <text x="189" y="202" font-size="8.4" text-anchor="middle" fill="#5b7db1">只是 Tablet 放置额外交给 StarManager</text>

  <!-- StarMgrServer embedded -->
  <rect x="348" y="124" width="286" height="92" rx="11" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="491" y="146" font-size="10.5" font-weight="700" text-anchor="middle" fill="#5a3d78">StarMgrServer(内嵌)</text>
  <text x="491" y="166" font-size="8.4" text-anchor="middle" fill="#7a5a95">内嵌运行 StarManagerServer</text>
  <text x="491" y="184" font-size="8.4" text-anchor="middle" fill="#7a5a95">跑在 StarOSBDBJEJournalSystem</text>
  <text x="491" y="202" font-size="8.4" text-anchor="middle" fill="#7a5a95">随 FE 一起选主 becomeLeader</text>

  <!-- shared BDBJE -->
  <rect x="46" y="228" width="588" height="46" rx="10" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="340" y="248" font-size="10" text-anchor="middle" font-weight="700" fill="#12402a">同一套 BDBJE(FE 主日志 + StarOS 日志,同源)</text>
  <text x="340" y="266" font-size="8.4" text-anchor="middle" fill="#2f6f4f">StarManager 元数据单独做检查点(StarMgrCheckpointWorker),但同一套 BDBJE</text>

  <!-- StarOSAgent -->
  <rect x="46" y="286" width="588" height="46" rx="10" fill="#f7f7f9" stroke="#e2e2e7"/>
  <text x="60" y="306" font-size="9.6" font-weight="700" fill="#1d1d1f">StarOSAgent</text>
  <text x="60" y="324" font-size="8.4" fill="#6e6e73">FE ↔ StarManager 交互:addFileStore(注册对象存储)· shard / worker 管理 · 解析某 Shard 当前由哪个 CN 服务</text>

  <line x1="189" y1="216" x2="189" y2="228" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="491" y1="216" x2="491" y2="228" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- RIGHT: shards / workers -->
  <rect x="670" y="72" width="380" height="270" rx="16" fill="#faf4fb" stroke="#e2d2ee"/>
  <text x="686" y="95" font-size="12" font-weight="700" fill="#5a3d78">StarManager 管的映射</text>
  <text x="686" y="112" font-size="8.4" fill="#7a5a95">Tablet ↔ Shard ↔ Worker(CN)放置</text>

  <g text-anchor="middle" font-size="8.4">
    <rect x="686" y="126" width="168" height="70" rx="9" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/><text x="770" y="148" font-weight="600" fill="#5a3d78">Shard 1 → CN A</text><text x="770" y="167" fill="#7a5a95">对象存储上一段数据</text><text x="770" y="184" fill="#7a5a95">CN 无状态,可重分配</text>
    <rect x="866" y="126" width="168" height="70" rx="9" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/><text x="950" y="148" font-weight="600" fill="#5a3d78">Shard 2 → CN B</text><text x="950" y="167" fill="#7a5a95">CN 挂了 StarOS</text><text x="950" y="184" fill="#7a5a95">重分配 Shard 即可</text>
    <rect x="686" y="204" width="348" height="60" rx="9" fill="#fff7e6" stroke="#e8cf9a"/><text x="860" y="226" font-weight="600" fill="#5a3410">对象存储 S3 / OSS(共享数据真源)</text><text x="860" y="246" fill="#93762e">Shard 只是逻辑放置,数据在对象存储,搬 CN 不搬数据</text>
  </g>
  <rect x="686" y="286" width="348" height="46" rx="9" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="860" y="306" font-size="8.7" text-anchor="middle" font-weight="600" fill="#5a3d78">FE 通过 StarOSAgent 查询"某 Shard 现在归哪个 CN"</text>
  <text x="860" y="323" font-size="8.2" text-anchor="middle" fill="#7a5a95">查询下推时据此把 morsel 派给持有 Shard 的 CN</text>

  <line x1="634" y1="309" x2="686" y2="309" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- MetaSyncer -->
  <rect x="30" y="356" width="1020" height="94" rx="13" fill="#fbeaea" stroke="#e3b7b7"/>
  <text x="46" y="380" font-size="11" font-weight="700" fill="#7a2016">元数据同步守护 · StarMgrMetaSyncer · （周期对账 GC 孤儿 shard）</text>
  <g font-size="8.6" fill="#a5453a">
    <rect x="46" y="392" width="320" height="46" rx="8" fill="#fff" stroke="#e3b7b7"/><text x="60" y="412" font-weight="600" fill="#7a2016">deleteUnusedShardAndShardGroup</text><text x="60" y="430">回收不再被 FE 引用的 shard-group</text>
    <rect x="378" y="392" width="320" height="46" rx="8" fill="#fff" stroke="#e3b7b7"/><text x="392" y="412" font-weight="600" fill="#7a2016">deleteUnusedWorker</text><text x="392" y="430">清理下线 worker(CN)</text>
    <rect x="710" y="392" width="324" height="46" rx="8" fill="#fff" stroke="#e3b7b7"/><text x="724" y="412" font-weight="600" fill="#7a2016">dropTabletAndDeleteShard</text><text x="724" y="430">把 FE shard-group 与 StarMgr 对账,防泄漏</text>
  </g>

  <!-- footer -->
  <rect x="30" y="464" width="1020" height="52" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="486" font-size="10.5" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="46" y="506" font-size="9" fill="#6e6e73">StarManager 内嵌 FE、共享 BDBJE、随 FE 选主,管 Tablet↔Shard↔CN 映射;StarMgrMetaSyncer 周期对账回收孤儿,防元数据泄漏</text>
</svg>
