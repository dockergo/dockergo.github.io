<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="548" viewBox="0 0 1080 548" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="548" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks Segment 磁盘格式 · 列式不可变文件</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">格式定义 gensrc/proto/segment.proto;文件尾 footer 指向各列,列内按页组织,列级挂多种索引</text>

  <!-- Segment file layout (amber container) -->
  <rect x="30" y="70" width="640" height="176" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="46" y="92" font-size="12" font-weight="700" fill="#5a3410">Segment 文件布局(自顶向下:各列数据 → 文件尾)</text>
  <!-- column data blocks -->
  <rect x="46" y="104" width="140" height="76" rx="9" fill="#fdf6ea" stroke="#efdcb4"/><text x="116" y="123" font-size="9.5" font-weight="600" text-anchor="middle" fill="#5a3410">列 0 数据区</text><text x="116" y="141" font-size="8" text-anchor="middle" fill="#93762e">DATA pages</text><text x="116" y="157" font-size="8" text-anchor="middle" fill="#93762e">INDEX / DICT pages</text><text x="116" y="173" font-size="8" text-anchor="middle" fill="#93762e">列级索引数据</text>
  <rect x="196" y="104" width="140" height="76" rx="9" fill="#fdf6ea" stroke="#efdcb4"/><text x="266" y="123" font-size="9.5" font-weight="600" text-anchor="middle" fill="#5a3410">列 1 数据区</text><text x="266" y="141" font-size="8" text-anchor="middle" fill="#93762e">DATA pages</text><text x="266" y="157" font-size="8" text-anchor="middle" fill="#93762e">INDEX / DICT pages</text><text x="266" y="173" font-size="8" text-anchor="middle" fill="#93762e">列级索引数据</text>
  <rect x="346" y="104" width="120" height="76" rx="9" fill="#fdf6ea" stroke="#efdcb4"/><text x="406" y="123" font-size="9.5" font-weight="600" text-anchor="middle" fill="#5a3410">列 N …</text><text x="406" y="149" font-size="8" text-anchor="middle" fill="#93762e">每列独立</text><text x="406" y="165" font-size="8" text-anchor="middle" fill="#93762e">编码/压缩</text>
  <!-- footer -->
  <rect x="476" y="104" width="178" height="76" rx="9" fill="#fff" stroke="#e8cf9a"/><text x="565" y="122" font-size="9.5" font-weight="700" text-anchor="middle" fill="#5a3410">SegmentFooterPB</text><text x="565" y="139" font-size="8" text-anchor="middle" fill="#93762e"></text><text x="565" y="155" font-size="8" text-anchor="middle" fill="#93762e">repeated ColumnMetaPB columns</text><text x="565" y="171" font-size="8" text-anchor="middle" fill="#93762e">num_rows + 短键索引页指针</text>
  <text x="46" y="204" font-size="8.4" fill="#93762e">Segment::parse_segment_footer 解析 footer;行号索引是 B-tree(OrdinalIndexPB)</text>
  <text x="46" y="222" font-size="8.4" fill="#93762e">读列时:先读 footer 定位该列 ColumnMetaPB,再按需读其 DATA / INDEX / DICT 页</text>
  <text x="46" y="240" font-size="8.4" fill="#93762e">Segment 不可变;更新走新 Rowset + 删除向量,不原地改写</text>
  <line x1="565" y1="180" x2="565" y2="200" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- ColumnMetaPB (blue) -->
  <rect x="690" y="70" width="360" height="176" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="706" y="92" font-size="12" font-weight="700" fill="#1b2a4a">每列 ColumnMetaPB</text>
  <rect x="706" y="104" width="328" height="26" rx="7" fill="#e7eff9" stroke="#bcd0ec"/><text x="720" y="121" font-size="8.6" fill="#1b2a4a">type / encoding / compression(编码 + 压缩)</text>
  <rect x="706" y="136" width="328" height="26" rx="7" fill="#e7eff9" stroke="#bcd0ec"/><text x="720" y="153" font-size="8.6" fill="#1b2a4a">字典页(低基数列 DICT encoding)</text>
  <rect x="706" y="168" width="328" height="26" rx="7" fill="#e7eff9" stroke="#bcd0ec"/><text x="720" y="185" font-size="8.6" fill="#1b2a4a">repeated ColumnIndexMetaPB indexes(挂载列级索引)</text>
  <text x="706" y="214" font-size="8.4" fill="#5b7db1">列内按页组织:DATA / INDEX / DICTIONARY / SHORT_KEY page</text>
  <text x="706" y="232" font-size="8.4" fill="#5b7db1">每页带 PageFooterPB</text>

  <!-- Column-level indexes (green container) ColumnIndexTypePB:259 -->
  <rect x="30" y="266" width="1020" height="150" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="288" font-size="12" font-weight="700" fill="#12402a">列级索引 · ColumnIndexTypePB</text>
  <g>
    <rect x="46" y="300" width="242" height="100" rx="9" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="167" y="322" font-size="10" font-weight="700" text-anchor="middle" fill="#12402a">Zone Map</text><text x="167" y="342" font-size="8.3" text-anchor="middle" fill="#2f6f4f">min / max / has_null</text><text x="167" y="360" font-size="8.3" text-anchor="middle" fill="#2f6f4f">段级 + 页级</text><text x="167" y="380" font-size="8.3" text-anchor="middle" fill="#2f6f4f">谓词下推第一道裁剪</text>
    <rect x="300" y="300" width="242" height="100" rx="9" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="421" y="322" font-size="10" font-weight="700" text-anchor="middle" fill="#12402a">Bloom Filter</text><text x="421" y="342" font-size="8.3" text-anchor="middle" fill="#2f6f4f"></text><text x="421" y="360" font-size="8.3" text-anchor="middle" fill="#2f6f4f">MURMUR3 哈希</text><text x="421" y="380" font-size="8.3" text-anchor="middle" fill="#2f6f4f">BLOCK / CLASSIC 两算法</text>
    <rect x="554" y="300" width="242" height="100" rx="9" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="675" y="322" font-size="10" font-weight="700" text-anchor="middle" fill="#12402a">Bitmap</text><text x="675" y="342" font-size="8.3" text-anchor="middle" fill="#2f6f4f"></text><text x="675" y="360" font-size="8.3" text-anchor="middle" fill="#2f6f4f">ROARING 位图</text><text x="675" y="380" font-size="8.3" text-anchor="middle" fill="#2f6f4f">低基数等值列高效</text>
    <rect x="808" y="300" width="242" height="100" rx="9" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="929" y="322" font-size="10" font-weight="700" text-anchor="middle" fill="#12402a">Builtin Inverted</text><text x="929" y="342" font-size="8.3" text-anchor="middle" fill="#2f6f4f"></text><text x="929" y="360" font-size="8.3" text-anchor="middle" fill="#2f6f4f">基于 bitmap</text><text x="929" y="380" font-size="8.3" text-anchor="middle" fill="#2f6f4f">内建倒排</text>
  </g>

  <!-- short key prefix index (purple) -->
  <rect x="30" y="436" width="1020" height="94" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="46" y="458" font-size="12" font-weight="700" fill="#3d2a5a">稀疏短键前缀索引 · SHORT_KEY page</text>
  <text x="46" y="478" font-size="8.5" fill="#7a5a95">把排序前缀 → 块序号,每 num_rows_per_block 行一条(稀疏)· Segment::num_short_keys</text>
  <text x="46" y="496" font-size="8.5" fill="#7a5a95">定位候选块后再页内二分,缩小扫描范围;边界标记见</text>
  <rect x="700" y="452" width="334" height="62" rx="9" fill="#faf4fb" stroke="#d9c7ec"/><text x="867" y="474" font-size="8.6" text-anchor="middle" font-weight="600" fill="#3d2a5a">裁剪链:短键定块 → Zone Map 裁段/页</text><text x="867" y="494" font-size="8.6" text-anchor="middle" fill="#7a5a95">→ Bloom/Bitmap 过滤 → 读命中 DATA 页</text>
</svg>
