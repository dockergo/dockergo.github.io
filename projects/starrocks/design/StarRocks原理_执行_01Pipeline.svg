<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="550" viewBox="0 0 1080 550" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="550" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks Pipeline / Driver / Operator 三级模型</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">一个 fragment 拆成若干 Pipeline,每个实例化成 DOP 个 Driver(调度单位);Driver 内算子用推拉模型流转列式 Chunk</text>

  <!-- Pipeline band -->
  <rect x="30" y="68" width="1020" height="60" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="92" font-size="12" font-weight="700" fill="#1b2a4a">Pipeline · exec/runtime/pipeline.h:33</text>
  <text x="46" y="112" font-size="9.5" fill="#5b7db1">计划级模板:持有算子工厂与实例化出的 Driver 集合</text>
  <rect x="620" y="82" width="190" height="32" rx="8" fill="#fff" stroke="#bcd0ec"/><text x="715" y="102" font-size="10" font-weight="600" text-anchor="middle" fill="#274a78">OpFactories 算子工厂</text>
  <rect x="826" y="82" width="208" height="32" rx="8" fill="#fff" stroke="#bcd0ec"/><text x="930" y="102" font-size="10" font-weight="600" text-anchor="middle" fill="#274a78">Drivers 集合(= DOP 个)</text>

  <line x1="540" y1="128" x2="540" y2="152" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="556" y="145" font-size="9" fill="#a1a1a6">实例化 · 并行度 = DOP</text>

  <!-- Driver row (three parallel instances) -->
  <g>
    <rect x="30" y="152" width="328" height="72" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
    <text x="46" y="175" font-size="11" font-weight="700" fill="#12402a">PipelineDriver #0</text>
    <text x="46" y="194" font-size="8.8" fill="#2f6f4f">可调度单位 · pipeline_driver.h:65</text>
    <text x="46" y="211" font-size="8.8" fill="#2f6f4f">source=队首 · sink=队尾 · process(state,worker_id)</text>

    <rect x="376" y="152" width="328" height="72" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
    <text x="392" y="175" font-size="11" font-weight="700" fill="#12402a">PipelineDriver #1</text>
    <text x="392" y="194" font-size="8.8" fill="#2f6f4f">同一 Pipeline 的另一并行实例</text>
    <text x="392" y="211" font-size="8.8" fill="#2f6f4f">各持一串 Operators,独立被调度</text>

    <rect x="722" y="152" width="328" height="72" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
    <text x="738" y="175" font-size="11" font-weight="700" fill="#12402a">PipelineDriver #N …</text>
    <text x="738" y="194" font-size="8.8" fill="#2f6f4f">Driver 实例数 = pipeline_dop</text>
    <text x="738" y="211" font-size="8.8" fill="#2f6f4f">运行期抢 morsel 自动均衡</text>
  </g>

  <path d="M120,224 L120,240 L540,240 L540,252" stroke="#c7c7cc" stroke-width="1.4" fill="none" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="330" y="236" font-size="9" fill="#a1a1a6" text-anchor="middle">放大 Driver #0 内部算子链 ↓</text>

  <!-- Operator chain band -->
  <rect x="30" y="252" width="1020" height="156" rx="13" fill="#f6f8fc" stroke="#e6ecf4"/>
  <text x="46" y="274" font-size="11" font-weight="700" fill="#1d1d1f">Driver.process 循环 · 遍历相邻算子对 · pipeline_driver.cpp:351</text>
  <text x="46" y="293" font-size="9.3" fill="#5b7db1">相邻算子对:上游 has_output 且 下游 need_input → Driver 从上游 pull_chunk、向下游 push_chunk(共享 ChunkPtr),推进 _first_unfinished</text>

  <g text-anchor="middle">
    <rect x="50" y="312" width="204" height="72" rx="11" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/><text x="152" y="342" font-size="10.5" font-weight="600" fill="#1d1d1f">Source Operator</text><text x="152" y="360" font-size="8.5" fill="#6e6e73">队首 source_operator</text><text x="152" y="374" font-size="8.5" fill="#6e6e73">has_output</text>
    <rect x="310" y="312" width="204" height="72" rx="11" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/><text x="412" y="342" font-size="10.5" font-weight="600" fill="#1d1d1f">Operator</text><text x="412" y="360" font-size="8.5" fill="#6e6e73">中间算子(如 Join/Agg)</text><text x="412" y="374" font-size="8.5" fill="#6e6e73">need_input → has_output</text>
    <rect x="570" y="312" width="204" height="72" rx="11" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/><text x="672" y="342" font-size="10.5" font-weight="600" fill="#1d1d1f">Operator</text><text x="672" y="360" font-size="8.5" fill="#6e6e73">中间算子</text><text x="672" y="374" font-size="8.5" fill="#6e6e73">need_input → has_output</text>
    <rect x="830" y="312" width="204" height="72" rx="11" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/><text x="932" y="342" font-size="10.5" font-weight="600" fill="#1d1d1f">Sink Operator</text><text x="932" y="360" font-size="8.5" fill="#6e6e73">队尾 sink_operator</text><text x="932" y="374" font-size="8.5" fill="#6e6e73">need_input</text>
  </g>
  <!-- chain arrows carrying Chunk tokens -->
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="254" y1="348" x2="310" y2="348" marker-end="url(#ar)"/>
    <line x1="514" y1="348" x2="570" y2="348" marker-end="url(#ar)"/>
    <line x1="774" y1="348" x2="830" y2="348" marker-end="url(#ar)"/>
  </g>
  <g text-anchor="middle">
    <rect x="262" y="330" width="40" height="15" rx="4" fill="#fff7e6" stroke="#e8cf9a"/><text x="282" y="341" font-size="8" fill="#5a3410">Chunk</text>
    <rect x="522" y="330" width="40" height="15" rx="4" fill="#fff7e6" stroke="#e8cf9a"/><text x="542" y="341" font-size="8" fill="#5a3410">Chunk</text>
    <rect x="782" y="330" width="40" height="15" rx="4" fill="#fff7e6" stroke="#e8cf9a"/><text x="802" y="341" font-size="8" fill="#5a3410">Chunk</text>
  </g>

  <!-- Operator interface card -->
  <rect x="30" y="424" width="630" height="102" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="46" y="446" font-size="11" font-weight="700" fill="#3d2a5a">Operator 推拉状态机(纯虚接口) · exec_primitive/pipeline/operator.h:48</text>
  <g font-size="9.5" fill="#5a3d78">
    <text x="46" y="468">has_output — 有产出可被拉走</text>
    <text x="360" y="468">need_input — 可接收上游输入</text>
    <text x="46" y="488">pull_chunk(state) — 拉出一批 Chunk</text>
    <text x="360" y="488">push_chunk(state, chunk) — 推入一批</text>
    <text x="46" y="508">is_finished — 该算子是否结束</text>
    <text x="360" y="508">纯虚:各算子实现自己的推拉语义</text>
  </g>

  <!-- lifecycle card -->
  <rect x="680" y="424" width="370" height="102" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="865" y="446" font-size="11" font-weight="700" fill="#1d1d1f" text-anchor="middle">Operator 生命周期</text>
  <g text-anchor="middle" font-size="9">
    <rect x="700" y="462" width="72" height="26" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="736" y="479" fill="#274a78">prepare</text>
    <rect x="790" y="462" width="76" height="26" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="828" y="479" fill="#274a78">finishing</text>
    <rect x="884" y="462" width="76" height="26" rx="7" fill="#eafaf1" stroke="#bfe0cd"/><text x="922" y="479" fill="#12402a">finished</text>
  </g>
  <g text-anchor="middle" font-size="9">
    <rect x="740" y="496" width="88" height="26" rx="7" fill="#fbeaea" stroke="#e7c3c3"/><text x="784" y="513" fill="#7a2a2a">[cancelled]</text>
    <rect x="846" y="496" width="72" height="26" rx="7" fill="#ffffff" stroke="#ececf1"/><text x="882" y="513" fill="#1d1d1f">closed</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.3" fill="none">
    <line x1="772" y1="475" x2="790" y2="475" marker-end="url(#ar)"/>
    <line x1="866" y1="475" x2="884" y2="475" marker-end="url(#ar)"/>
    <path d="M922,488 L922,509 L918,509" stroke-dasharray="3 3" marker-end="url(#ar)"/>
    <line x1="828" y1="509" x2="846" y2="509" marker-end="url(#ar)"/>
  </g>
</svg>
