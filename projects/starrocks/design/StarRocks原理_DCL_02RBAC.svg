<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks RBAC 授权 · 有效权限 = 直授 + 激活角色 + 组</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">Authorizer 门面 → NativeAccessController → AuthorizationMgr;权限按 CATALOG→DATABASE→TABLE 层级 × 类型判定</text>

  <!-- flow -->
  <g text-anchor="middle">
    <rect x="30" y="76" width="230" height="66" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/><text x="145" y="102" font-size="10.5" font-weight="700" fill="#3d2a5a">Authorizer 门面</text><text x="145" y="120" font-size="8" fill="#7a5a95">check(stmt, ctx)</text><text x="145" y="134" font-size="8" fill="#7a5a95"></text>
    <rect x="300" y="76" width="230" height="66" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="415" y="102" font-size="10.5" font-weight="700" fill="#1b2a4a">NativeAccessController</text><text x="415" y="120" font-size="8" fill="#5b7db1">checkSystemAction/checkTableAction</text><text x="415" y="134" font-size="8" fill="#5b7db1"></text>
    <rect x="570" y="76" width="230" height="66" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="685" y="102" font-size="10.5" font-weight="700" fill="#1b2a4a">AuthorizationMgr</text><text x="685" y="120" font-size="8" fill="#5b7db1">provider.check(objectType, priv, obj)</text><text x="685" y="134" font-size="8" fill="#5b7db1"></text>
    <rect x="840" y="76" width="210" height="66" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="945" y="102" font-size="10.5" font-weight="700" fill="#12402a">过 / 拒</text><text x="945" y="120" font-size="8" fill="#2f6f4f">checkAction 判定</text></g>
  <line x1="260" y1="109" x2="300" y2="109" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="530" y1="109" x2="570" y2="109" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="800" y1="109" x2="840" y2="109" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- effective privilege = merge -->
  <rect x="30" y="164" width="1020" height="150" rx="13" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="46" y="186" font-size="11" font-weight="700" fill="#5a3410">有效权限 = mergePrivilegeCollection(user, groups, roleIds)</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="60" y="200" width="280" height="96" rx="9" fill="#fdf6ea" stroke="#efdcb4"/><text x="200" y="222" font-weight="600" fill="#5a3410">① 直授权限</text><text x="200" y="242" fill="#93762e">直接 GRANT 给用户的</text><text x="200" y="262" fill="#93762e">PrivilegeEntry</text><text x="200" y="282" fill="#93762e">authorization/PrivilegeEntry.java</text>
    <rect x="400" y="200" width="280" height="96" rx="9" fill="#fdf6ea" stroke="#efdcb4"/><text x="540" y="222" font-weight="600" fill="#5a3410">② 激活角色权限</text><text x="540" y="242" fill="#93762e">roleIdToPrivilegeCollection</text><text x="540" y="262" fill="#93762e">角色聚合的权限集(V2)</text><rect x="740" y="200" width="294" height="96" rx="9" fill="#fdf6ea" stroke="#efdcb4"/><text x="887" y="222" font-weight="600" fill="#5a3410">③ 组权限</text><text x="887" y="242" fill="#93762e">LDAP/Unix/File 组来源</text><text x="887" y="262" fill="#93762e">继承所属组的权限</text><text x="887" y="282" fill="#93762e">合并三者 → 判定</text>
  </g>

  <!-- privilege model -->
  <rect x="30" y="330" width="500" height="140" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="352" font-size="11" font-weight="700" fill="#1b2a4a">权限类型 × 对象类型</text>
  <text x="46" y="374" font-size="8.8" fill="#274a78">类型 PrivilegeType:SELECT / INSERT / CREATE_TABLE …</text>
  <text x="46" y="394" font-size="8.8" fill="#274a78">对象 ObjectType 层级:CATALOG → DATABASE → TABLE</text>
  <text x="46" y="414" font-size="8.5" fill="#5b7db1">· 上层授权可批量覆盖下层对象(库级授权 = 库内所有表)</text>
  <text x="46" y="432" font-size="8.5" fill="#5b7db1">内置 root 角色最高权限</text>
  <text x="46" y="452" font-size="8" fill="#a1a1a6">authorization/PrivilegeType.java · ObjectType.java</text>

  <rect x="550" y="330" width="500" height="140" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="566" y="352" font-size="11" font-weight="700" fill="#1d1d1f">要点</text>
  <text x="566" y="374" font-size="9" fill="#6e6e73">· 用角色聚合权限、给用户授角色(而非直授),便于批量管理</text>
  <text x="566" y="394" font-size="9" fill="#6e6e73">· 有效权限是三者合并,别只看直授</text>
  <text x="566" y="414" font-size="9" fill="#6e6e73">授权在规划阶段(StatementPlanner.plan)就判,不过关不生成计划</text>
  <text x="566" y="434" font-size="8.5" fill="#b1483a">· 归属:权限元数据落【元数据】EditLog;鉴权被 DQL/DDL/DML 规划调用</text>
  <text x="566" y="454" font-size="8" fill="#a1a1a6">DefaultAuthorizationProvider.java</text>
</svg>
