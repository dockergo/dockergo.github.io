<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks 分区与分桶 · 两级数据切分</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">分区(粗粒度大块,裁剪/TTL)+ 分桶(把分区切成 Tablet,决定并行);两级正交(误区:分区就是分桶)</text>

  <!-- table -->
  <rect x="30" y="72" width="1020" height="40" rx="10" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="540" y="97" font-size="11" font-weight="700" text-anchor="middle" fill="#5a3d78">表 Table(建表同时定:数据模型 KeysType × 分区 Partition × 分桶 Distribution)</text>

  <!-- Level 1: Partition -->
  <rect x="30" y="132" width="1020" height="150" rx="14" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="154" font-size="11" font-weight="700" fill="#1b2a4a">① 分区 Partition · 粗粒度(按范围 Range / 列表 List 把表切成大块)</text>
  <text x="1034" y="154" font-size="8" text-anchor="end" fill="#a1a1a6">用于分区裁剪 · TTL · 冷热分层</text>
  <g text-anchor="middle">
    <rect x="46" y="168" width="236" height="100" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="164" y="194" font-size="10.5" font-weight="700" fill="#274a78">分区 p20240101</text><text x="164" y="214" font-size="8.5" fill="#5b7db1">Range:[01-01, 01-02)</text><text x="164" y="232" font-size="8.5" fill="#5b7db1">常按日期切</text><text x="164" y="250" font-size="8" fill="#a1a1a6">裁剪:查一天只扫一区</text>
    <rect x="292" y="168" width="236" height="100" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="410" y="194" font-size="10.5" font-weight="700" fill="#274a78">分区 p20240102</text><text x="410" y="214" font-size="8.5" fill="#5b7db1">Range:[01-02, 01-03)</text><text x="410" y="232" font-size="8.5" fill="#5b7db1">独立版本/副本管理</text><text x="410" y="250" font-size="8" fill="#a1a1a6">过期可按 TTL 删</text>
    <rect x="538" y="168" width="236" height="100" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="656" y="194" font-size="10.5" font-weight="700" fill="#274a78">分区 p20240103 …</text><text x="656" y="214" font-size="8.5" fill="#5b7db1">List 分区:按枚举值</text><text x="656" y="232" font-size="8.5" fill="#5b7db1">冷热分层可配介质</text><text x="656" y="250" font-size="8" fill="#a1a1a6">粒度粗,数量不宜过多</text>
    <rect x="784" y="168" width="250" height="100" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/><text x="909" y="194" font-size="10.5" font-weight="700" fill="#5a3410">调优</text><text x="909" y="214" font-size="8.5" fill="#93762e">分区键选高频过滤列</text><text x="909" y="232" font-size="8.5" fill="#93762e">过多增元数据压力</text><text x="909" y="250" font-size="8.5" fill="#93762e">过少限并行</text>
  </g>

  <!-- Level 2: Distribution -->
  <rect x="30" y="302" width="1020" height="176" rx="14" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="46" y="324" font-size="11" font-weight="700" fill="#5a3410">② 分桶 Distribution · 细粒度(把分区内数据按分桶键切成 Tablet)</text>
  <text x="1034" y="324" font-size="8" text-anchor="end" fill="#a1a1a6">getDistributionInfo</text>

  <g text-anchor="middle">
    <rect x="46" y="338" width="300" height="124" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/><text x="196" y="362" font-size="10.5" font-weight="700" fill="#5a3410">HashDistributionInfo</text><text x="196" y="382" font-size="8.8" fill="#93762e">按 hash 均匀分</text><text x="196" y="400" font-size="8.8" fill="#93762e">同键落同 Tablet</text><text x="196" y="418" font-size="8.8" fill="#93762e">Join/聚合可利用(免 shuffle)</text><text x="196" y="438" font-size="8.5" fill="#a1a1a6">colocate_with 组内分桶对齐</text>
    <rect x="360" y="338" width="300" height="124" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/><text x="510" y="362" font-size="10.5" font-weight="700" fill="#5a3410">RandomDistributionInfo</text><text x="510" y="382" font-size="8.8" fill="#93762e">随机分</text><text x="510" y="400" font-size="8.8" fill="#93762e">写入更均匀</text><text x="510" y="418" font-size="8.8" fill="#93762e">无分桶键约束</text><text x="510" y="438" font-size="8.5" fill="#a1a1a6">适合明细/无 Join 场景</text>
    <rect x="674" y="338" width="360" height="124" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="854" y="362" font-size="10.5" font-weight="700" fill="#12402a">bucketNum = Tablet 数</text><text x="854" y="384" font-size="8.8" fill="#2f6f4f">决定 Tablet 数与并行度</text><text x="854" y="404" font-size="8.8" fill="#2f6f4f">Tablet = 数据分布/副本/调度单位</text><text x="854" y="424" font-size="8.8" fill="#2f6f4f">经验值让单 Tablet 数据量合理</text><text x="854" y="444" font-size="8.5" fill="#a1a1a6">误区:分桶越多越快(小 Tablet 拖累调度)</text>
  </g>
  <line x1="164" y1="268" x2="164" y2="338" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="230" y="292" font-size="8.5" fill="#a1a1a6">每个分区内再按分桶键切成若干 Tablet</text>
</svg>
