<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks DDL 执行链路 · CREATE TABLE 的旅程</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">DDLStmtExecutor → MetadataMgr 按 catalog 路由 → LocalMetastore 11 步契约 → TableFactory 造表 → onCreate 建分区/Tablet</text>

  <!-- top chain -->
  <g text-anchor="middle">
    <rect x="30" y="76" width="300" height="72" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="180" y="102" font-size="11" font-weight="700" fill="#1b2a4a">DDLStmtExecutor</text><text x="180" y="122" font-size="8.8" fill="#5b7db1">visitCreateTableStatement</text><text x="180" y="139" font-size="8" fill="#a1a1a6">qe/DDLStmtExecutor.java · DDL 分派</text>
    <rect x="390" y="76" width="300" height="72" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="540" y="102" font-size="11" font-weight="700" fill="#1b2a4a">MetadataMgr.createTable</text><text x="540" y="122" font-size="8.8" fill="#5b7db1">按 catalog 解析 ConnectorMetadata</text><text x="540" y="139" font-size="8" fill="#a1a1a6">server/MetadataMgr.java</text>
    <rect x="750" y="76" width="300" height="72" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/><text x="900" y="102" font-size="11" font-weight="700" fill="#5a3d78">catalog 路由分叉</text><text x="900" y="122" font-size="8.8" fill="#8a6db3">内部 → LocalMetastore</text><text x="900" y="139" font-size="8.8" fill="#8a6db3">外部 → 对应连接器</text>
  </g>
  <line x1="330" y1="112" x2="390" y2="112" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="690" y1="112" x2="750" y2="112" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- LocalMetastore 11-step contract -->
  <rect x="30" y="176" width="660" height="252" rx="14" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="198" font-size="11" font-weight="700" fill="#1b2a4a">LocalMetastore.createTable(stmt) · 11 步契约(内部表建表核心)</text>
  <text x="674" y="198" font-size="8" text-anchor="end" fill="#a1a1a6">契约</text>
  <g text-anchor="middle">
    <rect x="46" y="212" width="196" height="88" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="144" y="240" font-size="10.5" font-weight="700" fill="#274a78">① 配额校验</text><text x="144" y="260" font-size="8.5" fill="#5b7db1">库表配额检查</text><text x="144" y="276" font-size="8.5" fill="#5b7db1">失败即拒</text><text x="144" y="292" font-size="8" fill="#a1a1a6">契约起点</text>
    <rect x="252" y="212" width="196" height="88" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/><text x="350" y="240" font-size="10.5" font-weight="700" fill="#5a3d78">② TableFactory 造表</text><text x="350" y="260" font-size="8.5" fill="#8a6db3">getFactory(engine)</text><text x="350" y="276" font-size="8.5" fill="#8a6db3">.createTable(…)</text><text x="350" y="292" font-size="8" fill="#a1a1a6">依模型/引擎产出表对象</text>
    <rect x="458" y="212" width="216" height="88" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="566" y="240" font-size="10.5" font-weight="700" fill="#12402a">③ onCreate(…)</text><text x="566" y="260" font-size="8.5" fill="#2f6f4f">真正建分区与 Tablet</text><text x="566" y="276" font-size="8.5" fill="#2f6f4f">下发副本到 BE/CN</text><text x="566" y="292" font-size="8" fill="#a1a1a6">分布式动作</text>
  </g>
  <line x1="242" y1="256" x2="252" y2="256" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="448" y1="256" x2="458" y2="256" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="46" y="314" width="628" height="98" rx="11" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="62" y="336" font-size="9.8" font-weight="700" fill="#274a78">契约要点 · 分布式事务式建表</text>
  <text x="62" y="357" font-size="8.8" fill="#6e6e73">· 建表要下发 Tablet 到多个 BE/CN,是分布式动作(误区:DDL 是同步立即生效的原子操作)</text>
  <text x="62" y="376" font-size="8.8" fill="#6e6e73">· 失败会回滚已建部分——11 步契约含清理逻辑</text>
  <text x="62" y="395" font-size="8.8" fill="#6e6e73">· schema 落点在【元数据】EditLog;Tablet 副本创建/调度在【集群管理】</text>

  <!-- engine fork panel -->
  <rect x="706" y="176" width="344" height="252" rx="14" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="722" y="198" font-size="11" font-weight="700" fill="#5a3410">onCreate 建 Tablet · 本地表 vs 云原生表</text>
  <g text-anchor="middle">
    <rect x="722" y="212" width="312" height="44" rx="10" fill="#fdf6ea" stroke="#efdcb4"/><text x="878" y="232" font-size="9.8" font-weight="700" fill="#5a3410">buildPartitions → TabletTaskExecutor</text><text x="878" y="248" font-size="8.3" fill="#93762e">buildPartitionsConcurrently/Sequentially</text>
    <rect x="722" y="270" width="312" height="34" rx="9" fill="#fdf6ea" stroke="#efdcb4"/><text x="878" y="291" font-size="9" font-weight="700" fill="#5a3410">下发 CreateReplicaTask 到 BE/CN</text>
  </g>
  <line x1="878" y1="256" x2="878" y2="270" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <g text-anchor="middle">
    <rect x="722" y="318" width="152" height="94" rx="10" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/><text x="798" y="342" font-size="9.8" font-weight="700" fill="#5a3410">本地表(OLAP)</text><text x="798" y="362" font-size="8.5" fill="#93762e">createOlapTablets</text><text x="798" y="378" font-size="8.5" fill="#93762e">绑定本地盘</text><text x="798" y="396" font-size="8" fill="#a1a1a6">三副本</text>
    <rect x="882" y="318" width="152" height="94" rx="10" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/><text x="958" y="342" font-size="9.8" font-weight="700" fill="#5a3410">云原生表(Lake)</text><text x="958" y="362" font-size="8.5" fill="#93762e">createLakeTablets</text><text x="958" y="378" font-size="8.5" fill="#93762e">向 StarOS 申请 Shard</text><text x="958" y="396" font-size="8" fill="#a1a1a6">存算分离</text>
  </g>
  <line x1="878" y1="304" x2="798" y2="318" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="878" y1="304" x2="958" y2="318" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <line x1="566" y1="300" x2="566" y2="176" stroke="#c7c7cc" stroke-width="0" fill="none"/>
  <path d="M660,256 L690,256 L690,270 L706,270" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <text x="30" y="464" font-size="9" fill="#6e6e73">一句话:DDLStmtExecutor → MetadataMgr 按 catalog 路由 → LocalMetastore 的 11 步契约用 TableFactory 造表、onCreate/buildPartitions 下发</text>
  <text x="30" y="482" font-size="9" fill="#6e6e73">CreateReplicaTask(本地表绑本地盘、云原生表申请 StarOS Shard);建表是分布式动作,失败回滚已建部分。</text>
</svg>
