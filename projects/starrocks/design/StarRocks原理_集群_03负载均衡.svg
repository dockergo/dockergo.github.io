<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks 负载均衡 · ClusterLoadStatistic + 再平衡器(与修复共用调度器)</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">健康之外还要均匀:统计各 BE 盘用量/Tablet 数,搬迁副本使分布趋平;修复优先级高于均衡</text>

  <!-- statistic source -->
  <rect x="30" y="74" width="300" height="140" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="50" y="100" font-size="11.5" font-weight="700" fill="#1b2a4a">ClusterLoadStatistic</text>
  <text x="50" y="117" font-size="8" fill="#5b7db1">updateClusterLoadStatistic</text>
  <text x="50" y="140" font-size="9" fill="#1b2a4a">统计各 BE 的负载画像:</text>
  <rect x="50" y="150" width="120" height="46" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="110" y="170" font-size="9" text-anchor="middle" fill="#274a78">磁盘用量</text>
  <text x="110" y="186" font-size="8" text-anchor="middle" fill="#5b7db1">disk usage</text>
  <rect x="182" y="150" width="128" height="46" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="246" y="170" font-size="9" text-anchor="middle" fill="#274a78">Tablet 数</text>
  <text x="246" y="186" font-size="8" text-anchor="middle" fill="#5b7db1">副本计数</text>

  <!-- shared scheduler -->
  <rect x="390" y="74" width="300" height="140" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="540" y="100" font-size="11.5" font-weight="700" text-anchor="middle" fill="#5a3d78">TabletScheduler(共用)</text>
  <text x="540" y="117" font-size="8" text-anchor="middle" fill="#8d6bb0">同一调度器 + 同一并发槽</text>
  <rect x="410" y="130" width="260" height="34" rx="8" fill="#fbeaea" stroke="#e6b8b8"/>
  <text x="540" y="151" font-size="9" text-anchor="middle" fill="#8a2a2a">修复任务 · 高优先级(缺副本更急)</text>
  <rect x="410" y="170" width="260" height="34" rx="8" fill="#faf4fb" stroke="#e2d2ee"/>
  <text x="540" y="191" font-size="9" text-anchor="middle" fill="#5a3d78">均衡任务 · 低优先级(仅分布不均)</text>

  <!-- rebalancers -->
  <rect x="750" y="74" width="300" height="140" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="900" y="100" font-size="11.5" font-weight="700" text-anchor="middle" fill="#12402a">再平衡器 ReBalancer</text>
  <rect x="770" y="112" width="260" height="44" rx="9" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="782" y="130" font-size="9" font-weight="600" fill="#12402a">DiskAndTabletLoadReBalancer</text>
  <text x="782" y="146" font-size="8" fill="#2f6f4f">按盘用量 + Tablet 数迁热点→空闲</text>
  <rect x="770" y="162" width="260" height="44" rx="9" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="782" y="180" font-size="9" font-weight="600" fill="#12402a">ColocateTableBalancer</text>
  <text x="782" y="196" font-size="8" fill="#2f6f4f">维持 colocate 组对齐,Join 免 shuffle</text>

  <line x1="330" y1="144" x2="388" y2="144" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="359" y="138" font-size="7.5" text-anchor="middle" fill="#86868b">负载依据</text>
  <line x1="690" y1="144" x2="748" y2="144" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="719" y="138" font-size="7.5" text-anchor="middle" fill="#86868b">选副本迁移</text>

  <!-- before/after balance illustration -->
  <rect x="30" y="234" width="1020" height="200" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="258" font-size="11" font-weight="700" fill="#1d1d1f">均衡示意 · 热点 BE 副本迁到空闲 BE(Tablet 数趋平)</text>

  <!-- before -->
  <text x="260" y="284" font-size="9.5" font-weight="700" text-anchor="middle" fill="#8a2a2a">均衡前 · 分布不均</text>
  <g text-anchor="middle" font-size="7.5">
    <rect x="70" y="298" width="110" height="120" rx="9" fill="#fbeaea" stroke="#e6b8b8"/><text x="125" y="316" font-size="9" font-weight="600" fill="#8a2a2a">BE-A(热)</text>
    <rect x="80" y="326" width="90" height="14" rx="3" fill="#f6d6d6"/><rect x="80" y="344" width="90" height="14" rx="3" fill="#f6d6d6"/><rect x="80" y="362" width="90" height="14" rx="3" fill="#f6d6d6"/><rect x="80" y="380" width="90" height="14" rx="3" fill="#f6d6d6"/><text x="125" y="410" fill="#a5453a">4 Tablet · 盘满</text>
    <rect x="200" y="298" width="110" height="120" rx="9" fill="#f5faf6" stroke="#cfe6d5"/><text x="255" y="316" font-size="9" font-weight="600" fill="#12402a">BE-B(空)</text>
    <rect x="210" y="326" width="90" height="14" rx="3" fill="#e0f0e6"/><text x="255" y="410" fill="#2f6f4f">1 Tablet · 空闲</text>
  </g>

  <!-- arrow -->
  <line x1="330" y1="358" x2="440" y2="358" stroke="#c7c7cc" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="385" y="350" font-size="8" text-anchor="middle" fill="#86868b">迁移 Tablet</text>

  <!-- after -->
  <text x="640" y="284" font-size="9.5" font-weight="700" text-anchor="middle" fill="#12402a">均衡后 · 分布趋平</text>
  <g text-anchor="middle" font-size="7.5">
    <rect x="450" y="298" width="110" height="120" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="505" y="316" font-size="9" font-weight="600" fill="#12402a">BE-A</text>
    <rect x="460" y="326" width="90" height="14" rx="3" fill="#d3ecdd"/><rect x="460" y="344" width="90" height="14" rx="3" fill="#d3ecdd"/><rect x="460" y="362" width="90" height="14" rx="3" fill="#d3ecdd"/><text x="505" y="410" fill="#2f6f4f">3 Tablet</text>
    <rect x="580" y="298" width="110" height="120" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="635" y="316" font-size="9" font-weight="600" fill="#12402a">BE-B</text>
    <rect x="590" y="326" width="90" height="14" rx="3" fill="#d3ecdd"/><rect x="590" y="344" width="90" height="14" rx="3" fill="#d3ecdd"/><text x="635" y="410" fill="#2f6f4f">2 Tablet</text>
  </g>

  <!-- notes -->
  <rect x="720" y="292" width="314" height="128" rx="11" fill="#fff" stroke="#e8cf9a"/>
  <text x="736" y="314" font-size="9.5" font-weight="700" fill="#5a3410">要点</text>
  <text x="736" y="336" font-size="8.5" fill="#93762e">· 修复(缺副本)优先于均衡(不均匀),</text>
  <text x="736" y="352" font-size="8.5" fill="#93762e">  但两者共用同一调度器与并发槽。</text>
  <text x="736" y="374" font-size="8.5" fill="#93762e">· Colocate 组内同分桶落同 BE,</text>
  <text x="736" y="390" font-size="8.5" fill="#93762e">  Join 就地完成,免网络 shuffle。</text>
  <text x="736" y="412" font-size="8.5" fill="#93762e">· tablet_sched_disable_balance 可临时关均衡。</text>

  <rect x="30" y="450" width="1020" height="52" rx="13" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="46" y="474" font-size="10" font-weight="700" fill="#5a3d78">一句话</text>
  <text x="46" y="492" font-size="9" fill="#8d6bb0">健康(修复缺副本)与均匀(均衡分布)是自愈的两个目标,共享 TabletScheduler;修复优先级更高,均衡在其后填补分布偏差。</text>
</svg>
