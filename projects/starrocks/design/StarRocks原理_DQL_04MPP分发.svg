<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks MPP 分发执行 · Coordinator → Deployer → BE</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">物理计划切成 fragment 后由协调器分发;每 fragment 多实例并行分布在 BE(误区:一个查询一个进程)</text>

  <!-- coordinator pipeline (FE) -->
  <rect x="30" y="72" width="1020" height="150" rx="14" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="94" font-size="11" font-weight="700" fill="#1b2a4a">FE · DefaultCoordinator 调度流水线</text>
  <text x="1034" y="94" font-size="8" text-anchor="end" fill="#a1a1a6"></text>
  <g text-anchor="middle">
    <rect x="46" y="106" width="228" height="96" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="160" y="132" font-size="10.5" font-weight="700" fill="#274a78">startScheduling</text><text x="160" y="152" font-size="8.5" fill="#5b7db1">调度入口</text><text x="160" y="170" font-size="8.5" fill="#5b7db1">启动 fragment 分发</text><text x="160" y="186" font-size="8" fill="#a1a1a6">→ prepareExec</text>
    <rect x="290" y="106" width="228" height="96" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="404" y="132" font-size="10.5" font-weight="700" fill="#274a78">prepareExec</text><text x="404" y="150" font-size="8.5" fill="#5b7db1">computeFragmentInstances</text><text x="404" y="166" font-size="8.5" fill="#5b7db1">扫描范围经 FragmentScan-</text><text x="404" y="180" font-size="8.5" fill="#5b7db1">RangeAssignment 分派</text>
    <rect x="534" y="106" width="228" height="96" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="648" y="132" font-size="10.5" font-weight="700" fill="#274a78">deliverExecFragments</text><text x="648" y="152" font-size="8.5" fill="#5b7db1">交付执行</text><text x="648" y="170" font-size="8.5" fill="#5b7db1">委托 Deployer 部署</text><text x="648" y="186" font-size="8" fill="#a1a1a6">多 worker 走调度策略</text>
    <rect x="778" y="106" width="256" height="96" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="906" y="132" font-size="10.5" font-weight="700" fill="#1b2a4a">Deployer.deployFragments</text><text x="906" y="152" font-size="8.5" fill="#5b7db1">异步部署实例</text><text x="906" y="170" font-size="8.5" fill="#5b7db1"></text><text x="906" y="186" font-size="8" fill="#a1a1a6">并发下发各 BE</text>
  </g>
  <line x1="274" y1="154" x2="290" y2="154" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="518" y1="154" x2="534" y2="154" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="762" y1="154" x2="778" y2="154" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- schedule strategy note -->
  <rect x="30" y="238" width="500" height="76" rx="12" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="46" y="260" font-size="10" font-weight="700" fill="#5a3d78">调度策略</text>
  <text x="46" y="280" font-size="8.8" fill="#8a6db3">单 worker 快路径 SingleNodeSchedule</text>
  <text x="46" y="298" font-size="8.8" fill="#8a6db3">· 多 worker:AllAtOnceExecutionSchedule / PhasedExecutionSchedule</text>

  <rect x="550" y="238" width="500" height="76" rx="12" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="566" y="260" font-size="10" font-weight="700" fill="#5a3410">每 BE 经 FragmentInstanceExecState RPC</text>
  <text x="566" y="280" font-size="8.8" fill="#93762e">execPlanFragmentAsync 下发 TExecPlanFragmentParams</text>
  <text x="566" y="298" font-size="8.8" fill="#93762e"></text>

  <!-- BE row -->
  <rect x="30" y="330" width="1020" height="184" rx="14" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="46" y="352" font-size="11" font-weight="700" fill="#5a3410">BE 侧 · 收到 RPC 建 FragmentExecutor 跑 pipeline(见执行引擎篇)</text>
  <text x="1034" y="352" font-size="8" text-anchor="end" fill="#a1a1a6"></text>
  <g text-anchor="middle">
    <rect x="46" y="364" width="316" height="134" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/><text x="204" y="388" font-size="10.5" font-weight="700" fill="#5a3410">BE 1</text><text x="204" y="408" font-size="8.5" fill="#93762e">exec_plan_fragment</text><text x="204" y="424" font-size="8.5" fill="#93762e">→ _exec_plan_fragment_by_pipeline</text><text x="204" y="442" font-size="8.5" fill="#93762e">Fragment 实例 · 多 pipeline 并行</text><text x="204" y="460" font-size="8.5" fill="#93762e">扫描分派的 tablet 范围</text><text x="204" y="480" font-size="8" fill="#a1a1a6">morsel 驱动向量化执行</text>
    <rect x="382" y="364" width="316" height="134" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/><text x="540" y="388" font-size="10.5" font-weight="700" fill="#5a3410">BE 2</text><text x="540" y="408" font-size="8.5" fill="#93762e">同 fragment 的另一实例</text><text x="540" y="424" font-size="8.5" fill="#93762e">并行处理各自数据分片</text><text x="540" y="442" font-size="8.5" fill="#93762e">经 Exchange 与兄弟实例交换</text><text x="540" y="460" font-size="8.5" fill="#93762e">Shuffle/Broadcast 数据流</text><text x="540" y="480" font-size="8" fill="#a1a1a6">FragmentExecutor 承载</text>
    <rect x="718" y="364" width="316" height="134" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/><text x="876" y="388" font-size="10.5" font-weight="700" fill="#5a3410">BE N …</text><text x="876" y="408" font-size="8.5" fill="#93762e">一 fragment → 多实例</text><text x="876" y="424" font-size="8.5" fill="#93762e">分布在多 BE(MPP)</text><text x="876" y="442" font-size="8.5" fill="#93762e">上游结果 → 根 fragment</text><text x="876" y="460" font-size="8.5" fill="#93762e">汇聚 → 返回 FE → 客户端</text><text x="876" y="480" font-size="8" fill="#a1a1a6">coord.join 等待完成</text>
  </g>
  <line x1="204" y1="314" x2="204" y2="364" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="540" y1="314" x2="540" y2="364" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="876" y1="314" x2="876" y2="364" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
</svg>
