<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks 代价模型与统计 · CBO 的燃料</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">代价 = 加权求和;统计自底向上推导;EnforceAndCostTask 给每个物理表达式定价并剪枝</text>

  <!-- cost model -->
  <rect x="30" y="72" width="500" height="180" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="94" font-size="11" font-weight="700" fill="#12402a">代价模型 CostModel</text>
  <rect x="46" y="106" width="468" height="46" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="280" y="132" text-anchor="middle" font-size="11" font-weight="600" fill="#12402a">realCost = cpu×0.5 + memory×2 + network×1.5</text>
  <text x="46" y="170" font-size="8.8" fill="#2f6f4f">· cost/CostModel.java:129 · 权重 :130</text>
  <text x="46" y="190" font-size="8.8" fill="#2f6f4f">· CostEstimator(OperatorVisitor)按算子分别估:</text>
  <text x="60" y="208" font-size="8.5" fill="#2f6f4f">visitPhysicalOlapScan:171 / HashJoin:469 / HashAggregate:265</text>
  <text x="46" y="228" font-size="8.5" fill="#2f6f4f">· CostEstimate 携带 cpu / memory / network 三分量</text>
  <text x="46" y="245" font-size="8" fill="#a1a1a6">cost/CostEstimate.java</text>

  <!-- statistics -->
  <rect x="550" y="72" width="500" height="180" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="566" y="94" font-size="11" font-weight="700" fill="#1b2a4a">统计信息 Statistics</text>
  <rect x="566" y="106" width="468" height="52" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="580" y="126" font-size="8.8" font-weight="600" fill="#274a78">ColumnStatistic(statistics/ColumnStatistic.java:24)</text><text x="580" y="146" font-size="8.3" fill="#5b7db1">min / max / nullsFraction / averageRowSize / distinctValuesCount(+可选直方图)</text>
  <text x="566" y="176" font-size="8.8" fill="#5b7db1">· StatisticsCalculator 自底向上推每算子行数/列统计</text>
  <text x="580" y="194" font-size="8.5" fill="#5b7db1">statistics/StatisticsCalculator.java:197</text>
  <text x="566" y="212" font-size="8.8" fill="#5b7db1">· 谓词选择率:PredicateStatisticsCalculator</text>
  <text x="566" y="230" font-size="8.8" fill="#5b7db1">· ANALYZE 收集存 _statistics_.column_statistics</text>
  <text x="566" y="246" font-size="8" fill="#a1a1a6">statistic/FullStatisticsCollectJob.java · StatsConstants.java:67</text>

  <!-- EnforceAndCost -->
  <rect x="30" y="268" width="1020" height="150" rx="13" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="46" y="290" font-size="11" font-weight="700" fill="#5a3410">EnforceAndCostTask · Cascades 给物理表达式定价(task/EnforceAndCostTask.java:147)</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="46" y="304" width="300" height="90" rx="9" fill="#fdf6ea" stroke="#efdcb4"/><text x="196" y="326" font-weight="600" fill="#5a3410">① 累加代价</text><text x="196" y="346" fill="#93762e">curTotalCost +=</text><text x="196" y="364" fill="#93762e">CostModel.calculateCost(ge)</text><text x="196" y="382" fill="#93762e">+ 子节点最优代价 :188</text>
    <rect x="386" y="304" width="300" height="90" rx="9" fill="#fdf6ea" stroke="#efdcb4"/><text x="536" y="326" font-weight="600" fill="#5a3410">② 上界剪枝</text><text x="536" y="346" fill="#93762e">超 upperBoundCost 即剪</text><text x="536" y="364" fill="#93762e">避免搜索劣质分支</text><text x="536" y="382" fill="#93762e">:189</text>
    <rect x="726" y="304" width="308" height="90" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="880" y="326" font-weight="600" fill="#12402a">③ 强制输出属性</text><text x="880" y="346" fill="#2f6f4f">子节点分布不满足要求</text><text x="880" y="364" fill="#2f6f4f">→ 插 Exchange enforcer</text><text x="880" y="382" fill="#2f6f4f">:205</text>
  </g>
  <line x1="346" y1="349" x2="386" y2="349" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="686" y1="349" x2="726" y2="349" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- note -->
  <rect x="30" y="434" width="1020" height="72" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="456" font-size="11" font-weight="700" fill="#1d1d1f">要点</text>
  <text x="46" y="478" font-size="9" fill="#6e6e73">· 统计是 CBO 的燃料:统计缺失/过期 → 代价估不准、Join 重排退化为左深(见 Join 重排篇),所以定期 ANALYZE 是 CBO 生效的前提</text>
  <text x="46" y="496" font-size="8.5" fill="#b1483a">· 归属:统计存储落点在【元数据】;物理计划交给【执行引擎】跑;代价择优是本主线核心</text>
</svg>
