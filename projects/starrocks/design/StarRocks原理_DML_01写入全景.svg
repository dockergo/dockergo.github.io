<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks 写入方式全景 · 5 种导入 × 共享事务骨架</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">导入 = 把外部数据变成 Tablet 里的 Rowset;方式不同在"数据从哪来、由谁驱动",骨架相同</text>

  <!-- comparison table -->
  <text x="30" y="76" font-size="11" font-weight="700" fill="#1d1d1f">五种写入方式对比</text>
  <!-- header row -->
  <g font-size="9" font-weight="700" text-anchor="middle">
    <rect x="30" y="84" width="200" height="30" rx="7" fill="#f7f7f9" stroke="#ececf1"/><text x="130" y="103" fill="#48484a">方式</text>
    <rect x="234" y="84" width="240" height="30" rx="7" fill="#f7f7f9" stroke="#ececf1"/><text x="354" y="103" fill="#48484a">数据源</text>
    <rect x="478" y="84" width="180" height="30" rx="7" fill="#f7f7f9" stroke="#ececf1"/><text x="568" y="103" fill="#48484a">驱动</text>
    <rect x="662" y="84" width="388" height="30" rx="7" fill="#f7f7f9" stroke="#ececf1"/><text x="856" y="103" fill="#48484a">入口</text>
  </g>
  <!-- data rows -->
  <g font-size="8.8">
    <rect x="30" y="118" width="200" height="30" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="42" y="137" font-weight="700" fill="#1b2a4a">INSERT</text>
    <rect x="234" y="118" width="240" height="30" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="246" y="137" fill="#274a78">SQL values / SELECT 结果</text>
    <rect x="478" y="118" width="180" height="30" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="490" y="137" fill="#274a78">前台查询</text>
    <rect x="662" y="118" width="388" height="30" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="674" y="137" fill="#5b7db1">StmtExecutor.handleDMLStmt(StmtExecutor.java:3300)</text>

    <rect x="30" y="152" width="200" height="30" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="42" y="171" font-weight="700" fill="#1b2a4a">Stream Load</text>
    <rect x="234" y="152" width="240" height="30" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="246" y="171" fill="#274a78">HTTP PUT 一批数据</text>
    <rect x="478" y="152" width="180" height="30" rx="7" fill="#eafaf1" stroke="#bfe0cd"/><text x="490" y="171" fill="#12402a">客户端同步</text>
    <rect x="662" y="152" width="388" height="30" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="674" y="171" fill="#5b7db1">StreamLoadMgr(load/streamload/StreamLoadMgr.java:69)</text>

    <rect x="30" y="186" width="200" height="30" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="42" y="205" font-weight="700" fill="#1b2a4a">Broker Load</text>
    <rect x="234" y="186" width="240" height="30" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="246" y="205" fill="#274a78">HDFS / S3 大文件</text>
    <rect x="478" y="186" width="180" height="30" rx="7" fill="#fff7e6" stroke="#e8cf9a"/><text x="490" y="205" fill="#5a3410">FE 拉取异步</text>
    <rect x="662" y="186" width="388" height="30" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="674" y="205" fill="#5b7db1">BrokerLoadJob(load/loadv2/BrokerLoadJob.java:108)</text>

    <rect x="30" y="220" width="200" height="30" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="42" y="239" font-weight="700" fill="#1b2a4a">Routine Load</text>
    <rect x="234" y="220" width="240" height="30" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="246" y="239" fill="#274a78">Kafka / Pulsar 流</text>
    <rect x="478" y="220" width="180" height="30" rx="7" fill="#fff7e6" stroke="#e8cf9a"/><text x="490" y="239" fill="#5a3410">常驻消费</text>
    <rect x="662" y="220" width="388" height="30" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="674" y="239" fill="#5b7db1">RoutineLoadScheduler(RoutineLoadScheduler.java:51)</text>

    <rect x="30" y="254" width="200" height="30" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="42" y="273" font-weight="700" fill="#1b2a4a">Insert Overwrite</text>
    <rect x="234" y="254" width="240" height="30" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="246" y="273" fill="#274a78">SELECT 结果覆盖</text>
    <rect x="478" y="254" width="180" height="30" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="490" y="273" fill="#274a78">前台查询</text>
    <rect x="662" y="254" width="388" height="30" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="674" y="273" fill="#5b7db1">handleInsertOverwrite(临时分区原子替换,:3195)</text>
  </g>

  <!-- shared skeleton -->
  <rect x="30" y="308" width="1020" height="164" rx="14" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="46" y="330" font-size="11" font-weight="700" fill="#12402a">共享骨架 · 每次导入都是一个导入事务(见事务一致性篇)</text>
  <text x="1034" y="330" font-size="8" text-anchor="end" fill="#a1a1a6">beginTransaction · StatementPlanner.java:120(INSERT)</text>
  <g text-anchor="middle">
    <rect x="46" y="344" width="220" height="104" rx="11" fill="#e5f6ec" stroke="#bfe0cd" filter="url(#soft)"/><text x="156" y="380" font-size="11" font-weight="700" fill="#12402a">① beginTxn</text><text x="156" y="402" font-size="8.8" fill="#2f6f4f">开启导入事务</text><text x="156" y="420" font-size="8.8" fill="#2f6f4f">分配 label(幂等去重)</text>
    <rect x="298" y="344" width="220" height="104" rx="11" fill="#e5f6ec" stroke="#bfe0cd" filter="url(#soft)"/><text x="408" y="380" font-size="11" font-weight="700" fill="#12402a">② 写 Rowset</text><text x="408" y="402" font-size="8.8" fill="#2f6f4f">数据写入 BE 的 Tablet</text><text x="408" y="420" font-size="8.8" fill="#2f6f4f">生成 Rowset(版本 +1)</text>
    <rect x="550" y="344" width="220" height="104" rx="11" fill="#e5f6ec" stroke="#bfe0cd" filter="url(#soft)"/><text x="660" y="380" font-size="11" font-weight="700" fill="#12402a">③ commit</text><text x="660" y="402" font-size="8.8" fill="#2f6f4f">提交事务(2PC)</text><text x="660" y="420" font-size="8.8" fill="#2f6f4f">返回成功 ≠ 立即可见</text>
    <rect x="802" y="344" width="232" height="104" rx="11" fill="#e5f6ec" stroke="#bfe0cd" filter="url(#soft)"/><text x="918" y="380" font-size="11" font-weight="700" fill="#12402a">④ publish 可见</text><text x="918" y="402" font-size="8.8" fill="#2f6f4f">守护推版本可见</text><text x="918" y="420" font-size="8.8" fill="#2f6f4f">读按可见版本取快照</text>
  </g>
  <line x1="266" y1="396" x2="298" y2="396" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="518" y1="396" x2="550" y2="396" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="770" y1="396" x2="802" y2="396" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <text x="30" y="500" font-size="9" fill="#6e6e73">误区:Stream Load 返回成功即可见——返回成功意味 commit,可见还需 publish(不开同步发布时有短暂延迟)。</text>
  <text x="30" y="520" font-size="9" fill="#6e6e73">误区:Routine Load 是一次性导入——它是常驻消费,由两级调度守护持续拉增量。归属:2PC/版本在【事务一致性】,Rowset 落盘在【存储引擎】。</text>
</svg>
