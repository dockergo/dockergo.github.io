<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks INSERT 执行路径 · 复用 MPP 查询框架</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">INSERT ... SELECT 复用查询执行:SELECT 侧照常 MPP,结果经 OlapTableSink 写目标 Tablet(误区:INSERT 逐行写)</text>

  <!-- main flow -->
  <rect x="30" y="74" width="1020" height="212" rx="14" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="96" font-size="11" font-weight="700" fill="#1b2a4a">handleDMLStmt · INSERT SELECT 主链</text>
  <g text-anchor="middle">
    <rect x="46" y="110" width="230" height="90" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/><text x="161" y="136" font-size="10.5" font-weight="700" fill="#5a3d78">拿 TransactionState</text><text x="161" y="156" font-size="8.5" fill="#8a6db3">规划阶段已开的事务</text><text x="161" y="173" font-size="8.5" fill="#8a6db3">beginTxn 在 plan 里</text><text x="161" y="190" font-size="8" fill="#a1a1a6"></text>
    <rect x="300" y="110" width="230" height="90" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="415" y="136" font-size="10.5" font-weight="700" fill="#1b2a4a">coord.join(timeout)</text><text x="415" y="156" font-size="8.5" fill="#5b7db1">SELECT 侧 MPP 执行</text><text x="415" y="173" font-size="8.5" fill="#5b7db1">等所有实例完成</text><rect x="554" y="110" width="230" height="90" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/><text x="669" y="136" font-size="10.5" font-weight="700" fill="#5a3410">OlapTableSink 写 Tablet</text><text x="669" y="156" font-size="8.5" fill="#93762e">结果批量落 Rowset</text><text x="669" y="173" font-size="8.5" fill="#93762e">非逐行(MPP 批量)</text><text x="669" y="190" font-size="8" fill="#a1a1a6">BE 侧写入</text>
    <rect x="808" y="110" width="226" height="90" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="921" y="136" font-size="10.5" font-weight="700" fill="#12402a">commit → 返回</text><text x="921" y="156" font-size="8.5" fill="#2f6f4f">retryCommitOnRate-</text><text x="921" y="173" font-size="8.5" fill="#2f6f4f">LimitExceeded 提交</text><text x="921" y="190" font-size="8" fill="#a1a1a6">→ VisibleStateWaiter</text>
  </g>
  <line x1="276" y1="155" x2="300" y2="155" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="530" y1="155" x2="554" y2="155" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="784" y1="155" x2="808" y2="155" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- outcome branches -->
  <g text-anchor="middle">
    <rect x="300" y="222" width="230" height="52" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="415" y="244" font-size="9.5" font-weight="700" fill="#12402a">成功 → 收尾回调</text><text x="415" y="262" font-size="8.3" fill="#2f6f4f">onDMLStmtJobTransactionFinish</text>
    <rect x="554" y="222" width="230" height="52" rx="10" fill="#fbeaea" stroke="#e7c3c3"/><text x="669" y="244" font-size="9.5" font-weight="700" fill="#7a2a2a">失败 → abortTransaction</text><text x="669" y="262" font-size="8.3" fill="#7a2a2a">回滚事务,不留脏数据</text>
  </g>
  <line x1="921" y1="200" x2="921" y2="248" stroke="#c7c7cc" stroke-width="1.4" fill="none"/>
  <path d="M921,248 L784,248" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <path d="M415,200 L415,222" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>

  <text x="30" y="312" font-size="11" font-weight="700" fill="#1d1d1f">VisibleStateWaiter · commit 后等 publish 版本可见,再返回客户端(可见性由 publish 守护保证)</text>

  <!-- Insert Overwrite atomic swap -->
  <rect x="30" y="330" width="1020" height="188" rx="14" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="46" y="352" font-size="11" font-weight="700" fill="#5a3410">Insert Overwrite · 临时分区 + 原子替换(InsertOverwriteJobRunner)</text>
  <text x="1034" y="352" font-size="8" text-anchor="end" fill="#a1a1a6">handleInsertOverwrite</text>
  <g text-anchor="middle">
    <rect x="46" y="366" width="228" height="128" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/><text x="160" y="398" font-size="10.5" font-weight="700" fill="#5a3410">① 建临时分区</text><text x="160" y="420" font-size="8.8" fill="#93762e">为目标分区创建影子</text><text x="160" y="438" font-size="8.8" fill="#93762e">原分区不受影响</text><text x="160" y="460" font-size="8" fill="#a1a1a6">写入隔离</text>
    <rect x="298" y="366" width="228" height="128" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/><text x="412" y="398" font-size="10.5" font-weight="700" fill="#5a3410">② 写临时分区</text><text x="412" y="420" font-size="8.8" fill="#93762e">SELECT 结果经 MPP</text><text x="412" y="438" font-size="8.8" fill="#93762e">落进临时分区</text><text x="412" y="460" font-size="8" fill="#a1a1a6">与查询同路径</text>
    <rect x="550" y="366" width="228" height="128" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="664" y="398" font-size="10.5" font-weight="700" fill="#12402a">③ 原子替换</text><text x="664" y="420" font-size="8.8" fill="#2f6f4f">成功后整体换入</text><text x="664" y="438" font-size="8.8" fill="#2f6f4f">瞬时切换,无中间窗口</text><text x="664" y="460" font-size="8" fill="#a1a1a6">误区:先删后写有窗口</text>
    <rect x="802" y="366" width="232" height="128" rx="11" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/><text x="918" y="398" font-size="10.5" font-weight="700" fill="#7a2a2a">失败保护</text><text x="918" y="420" font-size="8.8" fill="#7a2a2a">失败不影响原数据</text><text x="918" y="438" font-size="8.8" fill="#7a2a2a">丢弃临时分区即可</text><text x="918" y="460" font-size="8" fill="#a5453a">成功瞬时切换</text>
  </g>
  <line x1="274" y1="430" x2="298" y2="430" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="526" y1="430" x2="550" y2="430" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="778" y1="430" x2="802" y2="430" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
</svg>
