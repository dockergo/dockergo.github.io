<svg xmlns="http://www.w3.org/2000/svg" width="960" height="480" viewBox="0 0 960 480"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="480" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">ZKFC 自动故障切换:抢 ZooKeeper 锁选主 + fencing 防脑裂</text>

  <!-- ZooKeeper -->
  <rect x="330" y="52" width="300" height="70" rx="13" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="480" y="78" font-size="11.5" font-weight="600" fill="#0f5132" text-anchor="middle">ZooKeeper 集群</text>
  <text x="480" y="100" font-size="8.8" fill="#3f8f66" text-anchor="middle">临时锁 znode(谁抢到谁 Active)</text>

  <!-- NN1 + ZKFC1 -->
  <rect x="30" y="160" width="380" height="150" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="220" y="184" font-size="11.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">节点 1</text>
  <rect x="48" y="198" width="170" height="96" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="133" y="222" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">NameNode 1</text>
  <rect x="60" y="234" width="146" height="46" rx="8" fill="#e7eefb" stroke="#bcd0ec"/>
  <text x="133" y="256" font-size="10.5" font-weight="700" fill="#0f5132" text-anchor="middle">Active</text>
  <text x="133" y="272" font-size="7.8" fill="#5b7db1" text-anchor="middle">持锁 · 对外服务</text>
  <rect x="230" y="198" width="164" height="96" rx="10" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="312" y="220" font-size="9.5" font-weight="600" fill="#7a4d00" text-anchor="middle">ZKFC 1</text>
  <text x="312" y="240" font-size="8" fill="#9a7328" text-anchor="middle">ZKFailoverController:65</text>
  <text x="312" y="256" font-size="8" fill="#9a7328" text-anchor="middle">监控本地 NN 健康</text>
  <text x="312" y="272" font-size="8" fill="#9a7328" text-anchor="middle">ActiveStandbyElector(:112)</text>

  <!-- NN2 + ZKFC2 -->
  <rect x="550" y="160" width="380" height="150" rx="13" fill="#f5faf6" stroke="#e2ece5"/>
  <text x="740" y="184" font-size="11.5" font-weight="600" fill="#2c5a3a" text-anchor="middle">节点 2</text>
  <rect x="742" y="198" width="170" height="96" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="827" y="222" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">NameNode 2</text>
  <rect x="754" y="234" width="146" height="46" rx="8" fill="#f4f4f6" stroke="#e2e2e7"/>
  <text x="827" y="256" font-size="10.5" font-weight="700" fill="#6e6e73" text-anchor="middle">Standby</text>
  <text x="827" y="272" font-size="7.8" fill="#a1a1a6" text-anchor="middle">追日志热同步</text>
  <rect x="566" y="198" width="164" height="96" rx="10" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="648" y="220" font-size="9.5" font-weight="600" fill="#7a4d00" text-anchor="middle">ZKFC 2</text>
  <text x="648" y="240" font-size="8" fill="#9a7328" text-anchor="middle">DFSZKFailoverController:63</text>
  <text x="648" y="258" font-size="8" fill="#9a7328" text-anchor="middle">Active 挂 → 锁消失</text>
  <text x="648" y="274" font-size="8" fill="#9a7328" text-anchor="middle">感知并抢锁接管</text>

  <path d="M300,198 L440,122" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="300" y="150" font-size="8.5" fill="#7a4d00">抢锁成功 becomeActive(:411)</text>
  <path d="M640,198 L520,122" stroke="#c7c7cc" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>
  <text x="560" y="150" font-size="8.5" fill="#9a7328">监听锁</text>

  <!-- fencing -->
  <rect x="30" y="330" width="900" height="130" rx="13" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="48" y="354" font-size="11.5" font-weight="600" fill="#3c1361">切换流程 + 双重防脑裂</text>
  <rect x="48" y="368" width="290" height="80" rx="10" fill="#faf4fb" stroke="#e4d3ee"/>
  <text x="193" y="390" font-size="9.5" font-weight="600" fill="#3c1361" text-anchor="middle">① fenceOldActive(:535)</text>
  <text x="193" y="410" font-size="8.5" fill="#7c5aa6" text-anchor="middle">sshfence(SSH 去 kill 旧进程)</text>
  <text x="193" y="428" font-size="8.5" fill="#7c5aa6" text-anchor="middle">或 shell fence 兜底</text>
  <rect x="352" y="368" width="290" height="80" rx="10" fill="#faf4fb" stroke="#e4d3ee"/>
  <text x="497" y="390" font-size="9.5" font-weight="600" fill="#3c1361" text-anchor="middle">② epoch 兜底</text>
  <text x="497" y="410" font-size="8.5" fill="#7c5aa6" text-anchor="middle">即便 fencing 失败,旧 Active</text>
  <text x="497" y="428" font-size="8.5" fill="#7c5aa6" text-anchor="middle">epoch 已过期,写不进 JN quorum</text>
  <rect x="656" y="368" width="274" height="80" rx="10" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="793" y="390" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">③ becomeActive(:411)</text>
  <text x="793" y="410" font-size="8.5" fill="#3f8f66" text-anchor="middle">Standby 晋升,秒级接管</text>
  <text x="793" y="428" font-size="8.5" fill="#3f8f66" text-anchor="middle">DataNode 已双汇报,无需重建映射</text>
</svg>
