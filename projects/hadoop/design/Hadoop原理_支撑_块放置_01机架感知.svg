<svg xmlns="http://www.w3.org/2000/svg" width="920" height="500" viewBox="0 0 920 500"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="920" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">默认三副本放置:一近两远、跨两机架 —— 可靠性与跨机架带宽的平衡</text>

  <rect x="30" y="50" width="860" height="34" rx="9" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="460" y="72" font-size="10" fill="#3c1361" text-anchor="middle">BlockPlacementPolicyDefault.chooseTarget(BlockPlacementPolicyDefault.java:174) · 机架信息来自 DatanodeManager 的 NetworkTopology</text>

  <!-- 机架1 -->
  <rect x="40" y="104" width="400" height="290" rx="14" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="240" y="128" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">机架 A(Rack A)</text>

  <rect x="66" y="146" width="160" height="90" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="146" y="172" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">DataNode A1</text>
  <rect x="82" y="184" width="128" height="40" rx="8" fill="#dfeafb" stroke="#bcd0ec"/>
  <text x="146" y="202" font-size="9" font-weight="600" fill="#1b2a4a" text-anchor="middle">副本 1</text>
  <text x="146" y="217" font-size="7.8" fill="#5b7db1" text-anchor="middle">本地(写者所在)</text>

  <rect x="254" y="146" width="160" height="90" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="334" y="172" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">DataNode A2</text>
  <rect x="270" y="184" width="128" height="40" rx="8" fill="#f4f4f6" stroke="#e2e2e7"/>
  <text x="334" y="207" font-size="8" fill="#a1a1a6" text-anchor="middle">(未放)</text>

  <rect x="66" y="256" width="348" height="120" rx="11" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="240" y="280" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">chooseLocalStorage(:597)</text>
  <text x="240" y="304" font-size="8.8" fill="#5b7db1" text-anchor="middle">第 1 副本:写者是 DataNode → 放本机</text>
  <text x="240" y="324" font-size="8.8" fill="#5b7db1" text-anchor="middle">(写本地零网络);否则随机一台</text>
  <text x="240" y="352" font-size="8.5" fill="#86868b" text-anchor="middle">每机架副本上限 maxNodesPerRack 防集中</text>

  <!-- 机架2 -->
  <rect x="480" y="104" width="410" height="290" rx="14" fill="#f5faf6" stroke="#e2ece5"/>
  <text x="685" y="128" font-size="12" font-weight="600" fill="#2c5a3a" text-anchor="middle">机架 B(Rack B)</text>

  <rect x="506" y="146" width="170" height="90" rx="11" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="591" y="172" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">DataNode B1</text>
  <rect x="522" y="184" width="138" height="40" rx="8" fill="#d5f0e0" stroke="#bce6cd"/>
  <text x="591" y="202" font-size="9" font-weight="600" fill="#0f5132" text-anchor="middle">副本 2</text>
  <text x="591" y="217" font-size="7.8" fill="#3f8f66" text-anchor="middle">跨机架容灾</text>

  <rect x="700" y="146" width="170" height="90" rx="11" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="785" y="172" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">DataNode B2</text>
  <rect x="716" y="184" width="138" height="40" rx="8" fill="#d5f0e0" stroke="#bce6cd"/>
  <text x="785" y="202" font-size="9" font-weight="600" fill="#0f5132" text-anchor="middle">副本 3</text>
  <text x="785" y="217" font-size="7.8" fill="#3f8f66" text-anchor="middle">与副本 2 同机架</text>

  <rect x="506" y="256" width="364" height="120" rx="11" fill="#ffffff" stroke="#e2ece5"/>
  <text x="688" y="280" font-size="10" font-weight="600" fill="#2c5a3a" text-anchor="middle">chooseRemoteRack(:570) + chooseLocalRack(:582)</text>
  <text x="688" y="304" font-size="8.8" fill="#3f8f66" text-anchor="middle">第 2 副本:另一机架(单机架整挂不丢)</text>
  <text x="688" y="324" font-size="8.8" fill="#3f8f66" text-anchor="middle">第 3 副本:第 2 同机架另一台(省跨机架带宽)</text>
  <text x="688" y="352" font-size="8.5" fill="#c4341c" text-anchor="middle">共 2 个机架、不是 3 个 —— 常见误区</text>

  <path d="M226,204 L506,204" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M660,204 L700,204" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="30" y="412" width="860" height="70" rx="12" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="48" y="436" font-size="10.5" font-weight="600" fill="#7a4d00">效果:任一单机架整体故障都不丢数据(需两机架同挂才丢),而跨机架流量只有 1 份</text>
  <text x="48" y="462" font-size="9" fill="#9a7328">前提:必须配置机架拓扑 net.topology.script;未配则全集群视作一个机架,第 2/3 副本策略退化、无跨机架容灾</text>
</svg>
