<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">元数据持久化:FsImage 快照 + EditLog 预写日志 —— 先写日志、后改内存</text>

  <!-- 写路径 -->
  <rect x="30" y="52" width="900" height="150" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="48" y="74" font-size="11.5" font-weight="600" fill="#1b2a4a">一次元数据变更的写入顺序(铁律)</text>

  <rect x="48" y="92" width="160" height="80" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="128" y="126" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">变更请求</text>
  <text x="128" y="146" font-size="8.3" fill="#5b7db1" text-anchor="middle">create/delete/addBlock</text>

  <rect x="260" y="92" width="200" height="80" rx="10" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="360" y="120" font-size="10.5" font-weight="600" fill="#7a4d00" text-anchor="middle">① logEdit + logSync</text>
  <text x="360" y="140" font-size="8.3" fill="#9a7328" text-anchor="middle">追加 EditLog 并刷盘</text>
  <text x="360" y="156" font-size="8.3" fill="#9a7328" text-anchor="middle">FSEditLog.java:466 / :661</text>
  <path d="M208,132 L260,132" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="512" y="92" width="180" height="80" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="602" y="120" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">② 改内存树</text>
  <text x="602" y="140" font-size="8.3" fill="#5b7db1" text-anchor="middle">更新 FSDirectory</text>
  <text x="602" y="156" font-size="8.3" fill="#5b7db1" text-anchor="middle">INode 增删改</text>
  <path d="M460,132 L512,132" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="744" y="92" width="168" height="80" rx="10" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="828" y="126" font-size="10.5" font-weight="600" fill="#0f5132" text-anchor="middle">③ 返回成功</text>
  <text x="828" y="146" font-size="8.3" fill="#3f8f66" text-anchor="middle">sync 之后才可见</text>
  <path d="M692,132 L744,132" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 两个档案 -->
  <rect x="30" y="222" width="440" height="270" rx="13" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="250" y="246" font-size="12" font-weight="600" fill="#7a4d00" text-anchor="middle">EditLog · 增量预写日志(FSEditLog.java:127)</text>
  <rect x="50" y="262" width="400" height="30" rx="7" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="250" y="282" font-size="9" fill="#7a4d00" text-anchor="middle">edit_0001: OP_ADD /data/a.log</text>
  <rect x="50" y="298" width="400" height="30" rx="7" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="250" y="318" font-size="9" fill="#7a4d00" text-anchor="middle">edit_0002: OP_ALLOCATE_BLOCK blk_1</text>
  <rect x="50" y="334" width="400" height="30" rx="7" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="250" y="354" font-size="9" fill="#7a4d00" text-anchor="middle">edit_0003: OP_CLOSE /data/a.log</text>
  <text x="250" y="392" font-size="9" fill="#9a7328" text-anchor="middle">= 自上次快照以来「发生了什么」</text>
  <text x="250" y="414" font-size="9" fill="#9a7328" text-anchor="middle">每条即时追加 + sync,恒增长</text>
  <text x="250" y="440" font-size="9" fill="#9a7328" text-anchor="middle">类比:RocksDB WAL / etcd Raft log</text>
  <text x="250" y="466" font-size="9" fill="#9a7328" text-anchor="middle">HA 时写入 JournalNode 多数派</text>

  <rect x="500" y="222" width="430" height="270" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="715" y="246" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">FsImage · 命名空间快照(FSImage.java:89)</text>
  <rect x="520" y="262" width="390" height="120" rx="9" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="715" y="286" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">某时刻整棵 INode 树的序列化镜像</text>
  <text x="715" y="308" font-size="8.8" fill="#5b7db1" text-anchor="middle">Protobuf 格式(FSImageFormatProtobuf)</text>
  <text x="715" y="330" font-size="8.8" fill="#5b7db1" text-anchor="middle">目录/文件/块列表/权限 —— 无块位置</text>
  <text x="715" y="354" font-size="8.8" fill="#5b7db1" text-anchor="middle">检查点时整体写(saveNamespace:1144)</text>
  <text x="715" y="374" font-size="8.8" fill="#5b7db1" text-anchor="middle">类比:RocksDB SST / etcd snapshot</text>

  <rect x="520" y="398" width="390" height="78" rx="9" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="715" y="422" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">崩溃恢复(loadFSImage FSImage.java:672)</text>
  <text x="715" y="444" font-size="8.8" fill="#3f8f66" text-anchor="middle">载最新 FsImage → 重放其后 EditLog</text>
  <text x="715" y="464" font-size="8.8" fill="#3f8f66" text-anchor="middle">= 恢复到崩溃前的内存树</text>

  <path d="M470,357 L500,357" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
</svg>
