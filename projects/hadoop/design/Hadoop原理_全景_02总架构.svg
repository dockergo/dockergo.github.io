<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="790" viewBox="0 0 1080 790" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="aHot" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="aCtl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
    <marker id="aState" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c99a3a"/></marker>
    <marker id="aFail" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#d97a34"/></marker>
    <marker id="aCross" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8a63c9"/></marker>
  </defs>
  <rect width="1080" height="790" fill="#fbfbfd"/>

  <!-- ===== 标题带：判型 ===== -->
  <text x="30" y="27" font-size="14" font-weight="600" fill="#1d1d1f">HDFS 总架构 · 主从式分布式文件系统：NameNode 单点管元数据（内存 namespace + EditLog）+ DataNode 存块 + 块三副本跨机架容错</text>
  <text x="30" y="45" font-size="10.5" fill="#6e6e73">元数据面与数据面分离：客户端向 NameNode 要块位置，再直连 DataNode 搬字节；块 128MB · 副本 3 · 心跳 3s　　源码基准 Apache Hadoop 3.6.0-SNAPSHOT</text>

  <!-- ===== 图例：五型语义路径 ===== -->
  <line x1="34" y1="61" x2="62" y2="61" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aHot)"/>
  <text x="68" y="65" font-size="10.5" fill="#3a3a3c">数据流 Hot · 客户端直连 DN 读写 + 写流水线</text>
  <line x1="330" y1="61" x2="358" y2="61" stroke="#5b7db1" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aCtl)"/>
  <text x="364" y="65" font-size="10.5" fill="#3a3a3c">Control · 心跳 + 块调度 / 元数据 RPC（虚线）</text>
  <line x1="640" y1="61" x2="668" y2="61" stroke="#c99a3a" stroke-width="1.8" marker-end="url(#aState)"/>
  <text x="674" y="65" font-size="10.5" fill="#3a3a3c">State · namespace + 块映射 + EditLog</text>
  <line x1="34" y1="80" x2="62" y2="80" stroke="#d97a34" stroke-width="1.8" marker-end="url(#aFail)"/>
  <text x="68" y="84" font-size="10.5" fill="#3a3a3c">失败 · 副本重建 + HA 故障切换</text>
  <line x1="330" y1="80" x2="358" y2="80" stroke="#8a63c9" stroke-width="1.8" marker-end="url(#aCross)"/>
  <text x="364" y="84" font-size="10.5" fill="#3a3a3c">横切 · 机架感知放置 + Balancer 均衡</text>
  <text x="1056" y="84" font-size="10" fill="#a1a1a6" text-anchor="end">框 = 主线可下钻</text>

  <!-- ===== 设计张力 铭牌带 ===== -->
  <rect x="24" y="92" width="1032" height="48" rx="12" fill="#f6f4fb" stroke="#ddd4ee"/>
  <text x="38" y="108" font-size="10.5" font-weight="700" fill="#5a3d78">设计张力</text>
  <text x="98" y="108" font-size="9.5" fill="#4a4a4f">中心化元数据·简单强一致（单 NameNode 全内存管全部 namespace / 块映射）　⟷　单点内存瓶颈与 SPOF（靠 HA Standby + JournalNode 多数派兜底）</text>
  <text x="98" y="128" font-size="9.5" fill="#4a4a4f">大块顺序高吞吐（128MB 块 · 一次写多次读 · 就近读）　⟷　小文件 / 低延迟不友好（每块都占 NameNode 内存，海量小文件撑爆主控）</text>

  <!-- ===== 接触面 ===== -->
  <rect x="24" y="146" width="1032" height="46" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="40" y="164" font-size="11" font-weight="600" fill="#5a3d78">接触面 · 外部如何用 HDFS</text>
  <text x="40" y="180" font-size="8.5" fill="#8a6db0">一次访问分两路：找 NameNode 要元数据、直连 DataNode 搬字节</text>
  <g text-anchor="middle" font-size="9">
    <rect x="470" y="152" width="176" height="32" rx="8" fill="#fff" stroke="#e2d2ee" data-tid="Hadoop原理_接口_FileSystem与Shell" data-lab="FileSystem API / fs shell"/><text x="558" y="172" fill="#5a3d78">FileSystem API / fs shell</text>
    <rect x="656" y="152" width="176" height="32" rx="8" fill="#fff" stroke="#e2d2ee" data-tid="Hadoop原理_接口_YARN应用提交" data-lab="YARN Client"/><text x="744" y="172" fill="#5a3d78">YARN Client · 提交应用</text>
    <rect x="842" y="152" width="196" height="32" rx="8" fill="#fff" stroke="#ececef"/><text x="940" y="172" fill="#86868b">MapReduce Job · Job.submit</text>
  </g>

  <!-- ===== HDFS 存储面（主体） ===== -->
  <rect x="24" y="198" width="1032" height="328" rx="16" fill="#f3f7fc" stroke="#d3e2f2"/>
  <text x="40" y="218" font-size="11.5" font-weight="600" fill="#1b2a4a">HDFS 存储面 · 元数据面(NameNode) + 数据面(DataNode) 分离</text>

  <!-- NameNode 控制面 -->
  <rect x="60" y="228" width="450" height="150" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="74" y="247" font-size="11" font-weight="600" fill="#1b2a4a">控制面 · NameNode（元数据权威 · 不存数据字节）</text>
  <g text-anchor="middle">
    <rect x="74" y="253" width="422" height="37" rx="8" fill="#fff" stroke="#bcd0ec" data-tid="Hadoop原理_支撑_NameNode命名空间与元数据" data-lab="命名空间树"/><text x="285" y="268" font-size="9" font-weight="600" fill="#1b2a4a">命名空间树 · FSDirectory / INode（全内存）</text><text x="285" y="282" font-size="7.5" fill="#98a0ab">rootDir blocks</text>
    <rect x="74" y="293" width="422" height="37" rx="8" fill="#fff" stroke="#bcd0ec"/><text x="285" y="308" font-size="9" font-weight="600" fill="#1b2a4a">元数据持久化 · EditLog(预写日志) + FsImage(检查点)</text><text x="285" y="322" font-size="7.5" fill="#98a0ab">logSync</text>
    <rect x="74" y="333" width="422" height="39" rx="8" fill="#e7eefb" stroke="#bcd0ec" data-tid="Hadoop原理_支撑_块放置与复制策略" data-lab="BlockManager"/><text x="285" y="349" font-size="9" font-weight="600" fill="#1b2a4a">BlockManager · 块 ↔ DataNode 映射 · 副本监控</text><text x="285" y="363" font-size="7.5" fill="#98a0ab">blocksMap RedundancyMonitor</text>
  </g>

  <!-- HA 失败域 -->
  <rect x="524" y="228" width="510" height="150" rx="13" fill="#fdf1ea" stroke="#f2d6c2" filter="url(#soft)"/>
  <text x="538" y="247" font-size="11" font-weight="600" fill="#a85824">失败域 · HA 双 NameNode（Active / Standby）</text>
  <g text-anchor="middle">
    <rect x="538" y="253" width="482" height="37" rx="8" fill="#fff" stroke="#f2d6c2"/><text x="779" y="268" font-size="9" font-weight="600" fill="#a85824">Standby NN · 追 EditLog + 周期检查点</text><text x="779" y="282" font-size="7.5" fill="#b98a6a"></text>
    <rect x="538" y="293" width="482" height="37" rx="8" fill="#fff" stroke="#f2d6c2"/><text x="779" y="308" font-size="9" font-weight="600" fill="#a85824">JournalNode ×3 · EditLog 写多数派 quorum</text><text x="779" y="322" font-size="7.5" fill="#b98a6a"></text>
    <rect x="538" y="333" width="482" height="39" rx="8" fill="#fbe7db" stroke="#eec6ad" data-tid="Hadoop原理_支撑_HA高可用" data-lab="ZKFC 切换"/><text x="779" y="349" font-size="9" font-weight="600" fill="#a85824">ZKFC + ZooKeeper · 选主 + fencing 防脑裂</text><text x="779" y="363" font-size="7.5" fill="#b98a6a">DN 双报</text>
  </g>

  <!-- 心跳 / 块汇报 对账 strip -->
  <rect x="60" y="386" width="974" height="26" rx="7" fill="#fff4e0" stroke="#f0dcae" data-tid="Hadoop原理_支撑_心跳与块汇报对账" data-lab="心跳 + 块汇报对账"/>
  <text x="547" y="403" font-size="8.8" font-weight="600" fill="#7a4d00" text-anchor="middle">DataNode ⇄ NameNode 心跳(3s · 携 DatanodeCommand) + 块汇报(全量/增量) → 对账内存块映射　 sendHeartBeat blockReport</text>

  <!-- DataNode 数据面 -->
  <rect x="60" y="420" width="450" height="48" rx="10" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)" data-tid="Hadoop原理_支撑_DataNode块存储" data-lab="DataNode 块存储"/>
  <text x="285" y="440" font-size="10" font-weight="600" fill="#5a3410" text-anchor="middle">数据面 · DataNode ×N · 块存储</text>
  <text x="285" y="456" font-size="7.8" fill="#98a0ab" text-anchor="middle">block + .meta 校验和 · 多卷 FsDatasetImpl</text>
  <rect x="524" y="420" width="510" height="48" rx="10" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)" data-tid="Hadoop原理_支撑_Pipeline写数据流" data-lab="Pipeline 写数据流"/>
  <text x="779" y="440" font-size="10" font-weight="600" fill="#5a3410" text-anchor="middle">写流水线 · client → DN1 → DN2 → DN3</text>
  <text x="779" y="456" font-size="7.8" fill="#98a0ab" text-anchor="middle">mirrorPacketTo · packet 流水 + ack 反向</text>

  <!-- 横切：机架感知 + 就近读 strip -->
  <rect x="60" y="476" width="974" height="42" rx="9" fill="#f6f2fc" stroke="#e0d3f0"/>
  <text x="547" y="493" font-size="9" font-weight="600" fill="#6b4a99" text-anchor="middle">横切 · 机架感知放置：1 本地 + 跨机架副本（1 近 2 远）· 读排最近副本</text>
  <text x="547" y="508" font-size="7.8" fill="#98a0ab" text-anchor="middle">chooseLocalStorage chooseRemoteRack sortByDistance</text>

  <!-- ===== YARN 计算面（压缩置底） ===== -->
  <rect x="24" y="532" width="1032" height="200" rx="16" fill="#f5faf6" stroke="#dfeae2"/>
  <text x="40" y="552" font-size="11.5" font-weight="600" fill="#1b2a4a">YARN 计算面 · 叠加在 HDFS 之上（资源调度 + 计算贴数据）</text>

  <!-- ResourceManager -->
  <rect x="60" y="562" width="450" height="110" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="74" y="580" font-size="11" font-weight="600" fill="#1b2a4a">控制面 · ResourceManager（资源仲裁）</text>
  <g text-anchor="middle">
    <rect x="74" y="586" width="422" height="36" rx="8" fill="#fff" stroke="#bcd0ec" data-tid="Hadoop原理_支撑_YARN资源调度" data-lab="Scheduler"/><text x="285" y="601" font-size="9" font-weight="600" fill="#1b2a4a">Scheduler · Capacity / Fair · 按队列分 Container</text><text x="285" y="614" font-size="7.5" fill="#98a0ab">纯分配不监控执行</text>
    <rect x="74" y="628" width="422" height="36" rx="8" fill="#fff" stroke="#bcd0ec"/><text x="285" y="643" font-size="9" font-weight="600" fill="#1b2a4a">ApplicationsManager · 管 AM 生命周期</text><text x="285" y="656" font-size="7.5" fill="#98a0ab">受理提交 · 启动首个 Container 跑 AM</text>
  </g>

  <!-- MapReduce + 运维 -->
  <rect x="524" y="562" width="510" height="52" rx="13" fill="#fff" stroke="#e2e2e7" filter="url(#soft)" data-tid="Hadoop原理_支撑_MapReduce执行" data-lab="MapReduce on YARN"/>
  <text x="538" y="582" font-size="10.5" font-weight="600" fill="#1d1d1f">MapReduce on YARN · MRAppMaster 是一种 AM</text>
  <text x="538" y="601" font-size="8" fill="#86868b">Map（就近读 HDFS 块）→ shuffle → Reduce · 计算贴数据</text>
  <rect x="524" y="620" width="510" height="52" rx="13" fill="#f6f2fc" stroke="#e0d3f0" filter="url(#soft)" data-tid="Hadoop原理_支撑_Balancer与Federation" data-lab="Balancer / Federation"/>
  <text x="538" y="640" font-size="10.5" font-weight="600" fill="#6b4a99">横切运维 · Balancer / Federation(RBF)</text>
  <text x="538" y="659" font-size="8" fill="#98a0ab">均衡 DN 利用率 · Router 挂多命名空间横向扩展</text>

  <!-- NodeManager -->
  <rect x="60" y="682" width="300" height="42" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="210" y="700" font-size="9.5" font-weight="600" fill="#5a3410" text-anchor="middle">数据面 · NodeManager #1</text>
  <text x="210" y="716" font-size="8" fill="#93762e" text-anchor="middle">Container：AM = MRAppMaster</text>
  <rect x="372" y="682" width="300" height="42" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="522" y="700" font-size="9.5" font-weight="600" fill="#5a3410" text-anchor="middle">NodeManager #2</text>
  <text x="522" y="716" font-size="8" fill="#93762e" text-anchor="middle">Container：Map / Reduce Task</text>
  <rect x="684" y="682" width="350" height="42" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="859" y="700" font-size="9.5" font-weight="600" fill="#5a3410" text-anchor="middle">NodeManager #3</text>
  <text x="859" y="716" font-size="8" fill="#93762e" text-anchor="middle">Container：Reduce Task</text>

  <!-- ===== 语义分型连线 ===== -->
  <!-- Control：元数据 RPC → NameNode -->
  <path d="M558,184 L558,208 L285,208 L285,228" stroke="#5b7db1" stroke-width="1.6" stroke-dasharray="5 3" fill="none" marker-end="url(#aCtl)"/>
  <text x="360" y="204" font-size="8" fill="#5b7db1">元数据 RPC：create / open / addBlock</text>
  <!-- Hot：数据字节直连 DataNode（绕 NameNode） -->
  <path d="M470,184 L470,192 L44,192 L44,444 L60,444" stroke="#2f9e6e" stroke-width="1.6" fill="none" marker-end="url(#aHot)"/>
  <text x="66" y="205" font-size="8" fill="#2f9e6e">数据字节直连 DataNode（绕 NameNode）</text>
  <!-- Control：心跳↑ / 块汇报 → 对账 → BlockManager -->
  <line x1="300" y1="420" x2="300" y2="412" stroke="#5b7db1" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#aCtl)"/>
  <line x1="300" y1="386" x2="300" y2="372" stroke="#5b7db1" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#aCtl)"/>
  <text x="308" y="383" font-size="8" fill="#5b7db1">心跳 / 块汇报</text>
  <!-- 失败：BlockManager 调度副本重建 → DataNode -->
  <line x1="180" y1="372" x2="180" y2="420" stroke="#d97a34" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#aFail)"/>
  <text x="120" y="404" font-size="8" fill="#d97a34" text-anchor="middle">副本不足→重建</text>
  <!-- State：EditLog → JournalNode 多数派 -->
  <line x1="496" y1="311" x2="538" y2="311" stroke="#c99a3a" stroke-width="1.8" marker-end="url(#aState)"/>
  <text x="500" y="305" font-size="7.5" fill="#c99a3a">EditLog→JN</text>
  <!-- 失败：ZKFC 故障切换 Active ⇄ Standby -->
  <line x1="510" y1="242" x2="524" y2="242" stroke="#d97a34" stroke-width="1.8" marker-start="url(#aFail)" marker-end="url(#aFail)"/>
  <text x="517" y="238" font-size="7.5" fill="#d97a34" text-anchor="middle">failover</text>
  <!-- Hot：Pipeline 副本流水（DN → DN） -->
  <line x1="510" y1="444" x2="524" y2="444" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aHot)"/>
  <!-- 横切：机架感知放置（BlockManager → rack strip，走 HA 下沿净空带 + 右侧走廊） -->
  <path d="M496,368 L496,382 L1044,382 L1044,486 L1034,486" stroke="#8a63c9" stroke-width="1.5" stroke-dasharray="4 3" fill="none" marker-end="url(#aCross)"/>
  <text x="1040" y="380" font-size="7.5" fill="#8a63c9" text-anchor="end">机架感知放置</text>
  <!-- Control：提交应用 → ResourceManager（右侧走廊） -->
  <path d="M744,184 L744,196 L1050,196 L1050,548 L285,548 L285,562" stroke="#5b7db1" stroke-width="1.5" stroke-dasharray="5 3" fill="none" marker-end="url(#aCtl)"/>
  <text x="300" y="559" font-size="8" fill="#5b7db1">提交应用 submitApplication</text>
  <!-- Control：RM ↔ NodeManager -->
  <line x1="150" y1="672" x2="150" y2="682" stroke="#5b7db1" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#aCtl)"/>
  <text x="158" y="680" font-size="8" fill="#5b7db1">分配 / 启动容器</text>
  <line x1="300" y1="682" x2="300" y2="672" stroke="#5b7db1" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#aCtl)"/>
  <text x="308" y="680" font-size="8" fill="#5b7db1">心跳注册</text>
  <!-- Hot：数据本地性 Map 就近读 HDFS 块（跨平面） -->
  <line x1="620" y1="532" x2="620" y2="518" stroke="#2f9e6e" stroke-width="1.6" marker-end="url(#aHot)"/>
  <text x="628" y="528" font-size="8" fill="#2f9e6e">数据本地性：Map 就近读 HDFS 块</text>

  <!-- ===== 读法 ===== -->
  <rect x="24" y="740" width="1032" height="30" rx="8" fill="#f7f7f9" stroke="#ececef" data-tid="Hadoop原理_全景主线框架" data-lab="全景读法"/>
  <text x="540" y="759" font-size="8.6" fill="#4a4a4f" text-anchor="middle">读法：写先向 NameNode 要块位置 → 字节直连 DataNode，经 DN1→DN2→DN3 流水落三副本；DataNode 靠心跳+块汇报让 NN 对账内存块映射；副本不足由 RedundancyMonitor 重建，NN 宕由 ZKFC 切 Standby；YARN 同构叠加其上。</text>
</svg>
