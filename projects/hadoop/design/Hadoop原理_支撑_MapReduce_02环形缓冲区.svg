<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Map 端环形缓冲区:内存排序 + 达水位溢写 + 归并成分区有序文件</text>

  <!-- 图例 -->
  <rect x="640" y="18" width="12" height="12" rx="3" fill="#eef3fb" stroke="#bcd0ec"/><text x="656" y="28" font-size="9" fill="#5b7db1">主线程/控制</text>
  <rect x="740" y="18" width="12" height="12" rx="3" fill="#fff7e6" stroke="#f0dcae"/><text x="756" y="28" font-size="9" fill="#9a7328">缓冲/溢写文件</text>
  <rect x="852" y="18" width="12" height="12" rx="3" fill="#eafaf1" stroke="#bce6cd"/><text x="868" y="28" font-size="9" fill="#3f8f66">排序/输出</text>

  <!-- 环形缓冲区区 -->
  <rect x="26" y="52" width="908" height="196" rx="14" fill="#fdfaf3" stroke="#efdcb4"/>
  <text x="46" y="76" font-size="12" font-weight="600" fill="#7a4d00">① 环形缓冲区 kvbuffer(单块 byte[],默认 100MB) · equator 分界双向增长</text>

  <rect x="46" y="92" width="150" height="70" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="121" y="122" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">Map 主线程</text>
  <text x="121" y="141" font-size="8.3" fill="#5b7db1" text-anchor="middle">map() → collect</text>
  <path d="M196,127 L236,127" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 缓冲带 -->
  <rect x="236" y="96" width="560" height="62" rx="9" fill="#ffffff" stroke="#efdcb4"/>
  <rect x="236" y="96" width="230" height="62" rx="9" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="351" y="122" font-size="9" font-weight="600" fill="#7a4d00" text-anchor="middle">序列化 &lt;k,v&gt; 记录</text>
  <text x="351" y="140" font-size="8" fill="#9a7328" text-anchor="middle">bufindex 向右增长 →</text>
  <rect x="640" y="96" width="156" height="62" rx="9" fill="#f4f2f8" stroke="#e0d8ee"/>
  <text x="718" y="122" font-size="9" font-weight="600" fill="#3c1361" text-anchor="middle">元数据 kvmeta</text>
  <text x="718" y="140" font-size="8" fill="#7c5aa6" text-anchor="middle">← kvindex 向左增长</text>
  <line x1="558" y1="90" x2="558" y2="164" stroke="#9a7328" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="558" y="86" font-size="8.5" font-weight="600" fill="#7a4d00" text-anchor="middle">equator</text>

  <rect x="796" y="96" width="118" height="62" rx="9" fill="#fff3f0" stroke="#f0c4b8"/>
  <text x="855" y="122" font-size="9" font-weight="600" fill="#c4341c" text-anchor="middle">softLimit</text>
  <text x="855" y="140" font-size="8" fill="#c4341c" text-anchor="middle">占用达 80%</text>

  <text x="480" y="186" font-size="9" fill="#9a7328" text-anchor="middle">记录与元数据从 equator 背向而生,中间未用空间是「环」的活动区;占用达 softLimit 即触发溢写</text>
  <text x="480" y="206" font-size="9" fill="#9a7328" text-anchor="middle">io.sort.mb=100MB(缓冲大小) · sort.spill.percent=0.8(溢写水位) —— 越大溢写越少、内存占用越高</text>
  <path d="M480,214 L480,234" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 溢写并行区 -->
  <rect x="26" y="256" width="908" height="150" rx="14" fill="#f3fbf6" stroke="#bce6cd"/>
  <text x="46" y="280" font-size="12" font-weight="600" fill="#0f5132">② 达水位 startSpill:主线程写剩余空间 与 后台 spill 线程并行</text>

  <rect x="46" y="296" width="230" height="90" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="161" y="322" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">主线程(不阻塞)</text>
  <text x="161" y="342" font-size="8.5" fill="#5b7db1" text-anchor="middle">继续 collect 写剩余 20% 空间</text>
  <text x="161" y="360" font-size="8.5" fill="#5b7db1" text-anchor="middle">= 写入与溢写重叠,减少停顿</text>

  <rect x="316" y="296" width="290" height="90" rx="10" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="461" y="320" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">spill 线程 · sortAndSpill</text>
  <text x="461" y="340" font-size="8.5" fill="#3f8f66" text-anchor="middle">按 (partition, key) 内存排序</text>
  <text x="461" y="358" font-size="8.5" fill="#3f8f66" text-anchor="middle">可选 combiner:map 端预聚合压缩量</text>
  <text x="461" y="376" font-size="8.5" fill="#3f8f66" text-anchor="middle">带校验和写出一个 spill 文件</text>
  <path d="M276,341 L316,341" stroke="#3f8f66" stroke-width="2" fill="none" marker-end="url(#ar)"/>

  <rect x="646" y="296" width="268" height="90" rx="10" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="780" y="322" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">本地磁盘 · 多个 spill 文件</text>
  <text x="780" y="342" font-size="8.5" fill="#9a7328" text-anchor="middle">spill0.out spill1.out …(各自分区有序)</text>
  <text x="780" y="360" font-size="8.5" fill="#9a7328" text-anchor="middle">mapreduce.cluster.local.dir</text>
  <text x="780" y="378" font-size="8.5" fill="#9a7328" text-anchor="middle">盘满则 Task 失败,别处重试</text>
  <path d="M606,341 L646,341" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 归并下发区 -->
  <rect x="26" y="416" width="908" height="128" rx="14" fill="#fbfbfd" stroke="#e2e2e7"/>
  <text x="46" y="440" font-size="12" font-weight="600" fill="#1d1d1f">③ Map 结束 mergeParts:多路归并 → 一个按分区有序的最终输出 + 索引</text>

  <rect x="46" y="454" width="250" height="72" rx="10" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="171" y="480" font-size="9.5" font-weight="600" fill="#7a4d00" text-anchor="middle">多个 spill 文件</text>
  <text x="171" y="500" font-size="8.3" fill="#9a7328" text-anchor="middle">多路归并排序 mergeParts</text>
  <path d="M296,490 L346,490" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="346" y="454" width="280" height="72" rx="10" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="486" y="480" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">最终输出文件 + 索引文件</text>
  <text x="486" y="500" font-size="8.3" fill="#3f8f66" text-anchor="middle">按 reduce 分区连续存放,索引记偏移</text>
  <path d="M626,490 L676,490" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="676" y="454" width="238" height="72" rx="10" fill="#f4f2f8" stroke="#e0d8ee"/>
  <text x="795" y="480" font-size="9.5" font-weight="600" fill="#3c1361" text-anchor="middle">ShuffleHandler(NM 辅助服务)</text>
  <text x="795" y="500" font-size="8.3" fill="#7c5aa6" text-anchor="middle">按索引切片,HTTP 供 Reduce 端拉取</text>
</svg>
