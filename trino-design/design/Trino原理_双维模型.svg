<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="740" viewBox="0 0 1080 740" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="740" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Trino 双维模型：能力域（管什么）× 执行时机（何时做）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">接触面以 DQL 为主（DDL/DML 多下推连接器）；支撑能力域横切引擎内部；无自有存储 → 无后台数据维护，守护进程只做调度/资源/内存仲裁</text>

  <!-- 接触面 layer -->
  <rect x="30" y="70" width="1020" height="72" rx="12" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="46" y="92" font-size="11.5" font-weight="700" fill="#3d2a5a">接触面主线（用户下发 SQL）</text>
  <g font-size="10">
    <rect x="46" y="100" width="220" height="34" rx="8" fill="#f4eefb" stroke="#d9c7ec"/><text x="156" y="121" text-anchor="middle" font-weight="600" fill="#3d2a5a">DQL 数据查询（主）</text>
    <rect x="278" y="100" width="220" height="34" rx="8" fill="#faf4fb" stroke="#e2d2ee"/><text x="388" y="121" text-anchor="middle" fill="#5a3d78">DCL 安全控制（贯穿）</text>
    <rect x="510" y="100" width="300" height="34" rx="8" fill="#f7f7f9" stroke="#ececf1"/><text x="660" y="121" text-anchor="middle" fill="#6e6e73">DDL / DML → 下推连接器（旁支）</text>
    <text x="826" y="121" font-size="9.5" fill="#a1a1a6">← 语句族窄，威力在读</text>
  </g>

  <!-- 底座 -->
  <rect x="30" y="162" width="1020" height="118" rx="12" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="46" y="184" font-size="11.5" font-weight="700" fill="#5a3410">底座能力域 · 数据入口与元信息</text>
  <rect x="46" y="196" width="490" height="72" rx="10" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="66" y="220" font-size="11" font-weight="600" fill="#5a3410">连接器框架 SPI</text>
  <text x="66" y="240" font-size="9.5" fill="#93762e">Connector / ConnectorMetadata / SplitManager</text>
  <text x="66" y="256" font-size="9.5" fill="#93762e">PageSource · 下推(filter/projection/agg) · 动态过滤</text>
  <rect x="560" y="196" width="474" height="72" rx="10" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="580" y="220" font-size="11" font-weight="600" fill="#5a3410">元数据与 Catalog</text>
  <text x="580" y="240" font-size="9.5" fill="#93762e">CatalogManager / MetadataManager · 每查询现取 schema</text>
  <text x="580" y="256" font-size="9.5" fill="#93762e">Session · 无常驻元数据服务</text>

  <!-- 计算 -->
  <rect x="30" y="290" width="1020" height="118" rx="12" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="312" font-size="11.5" font-weight="700" fill="#1b2a4a">计算能力域 · 查询期核心</text>
  <rect x="46" y="324" width="490" height="72" rx="10" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="66" y="348" font-size="11" font-weight="600" fill="#274a78">查询规划与优化</text>
  <text x="66" y="368" font-size="9.5" fill="#5b7db1">Analyzer → LogicalPlanner → IterativeOptimizer(Memo)</text>
  <text x="66" y="384" font-size="9.5" fill="#5b7db1">CBO(cost/stats) · Join 重排与分布 · PlanFragmenter</text>
  <rect x="560" y="324" width="474" height="72" rx="10" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="580" y="348" font-size="11" font-weight="600" fill="#274a78">分布式执行</text>
  <text x="580" y="368" font-size="9.5" fill="#5b7db1">Query→Stage→Task→Split→Driver→Operator</text>
  <text x="580" y="384" font-size="9.5" fill="#5b7db1">Page 列式批 · Exchange 交换 · Pipeline</text>

  <!-- 保障 -->
  <rect x="30" y="418" width="1020" height="118" rx="12" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="46" y="440" font-size="11.5" font-weight="700" fill="#12402a">保障能力域 · 集群守护（查询期在线仲裁）</text>
  <rect x="46" y="452" width="320" height="72" rx="10" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="66" y="476" font-size="11" font-weight="600" fill="#2c5a3a">调度与资源</text>
  <text x="66" y="496" font-size="9.5" fill="#2f6f4f">NodeScheduler · SplitPlacement</text>
  <text x="66" y="512" font-size="9.5" fill="#2f6f4f">ResourceGroup 排队/限额</text>
  <rect x="378" y="452" width="320" height="72" rx="10" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="398" y="476" font-size="11" font-weight="600" fill="#2c5a3a">内存管理</text>
  <text x="398" y="496" font-size="9.5" fill="#2f6f4f">MemoryPool · 每查询/算子追踪</text>
  <text x="398" y="512" font-size="9.5" fill="#2f6f4f">Spill 落盘 · 低内存 killer</text>
  <rect x="710" y="452" width="324" height="72" rx="10" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="730" y="476" font-size="11" font-weight="600" fill="#2c5a3a">容错执行 FTE</text>
  <text x="730" y="496" font-size="9.5" fill="#2f6f4f">RetryPolicy QUERY/TASK · task 重试</text>
  <text x="730" y="512" font-size="9.5" fill="#2f6f4f">spooling exchange（ExchangeManager）</text>

  <!-- 贯穿 安全 -->
  <rect x="30" y="546" width="1020" height="58" rx="12" fill="#faf4fb" stroke="#e2d2ee"/>
  <text x="46" y="568" font-size="11.5" font-weight="700" fill="#5a3d78">贯穿 · 安全（横切所有主线）</text>
  <text x="46" y="590" font-size="9.5" fill="#7a5a95">认证：PasswordAuthenticator / Certificate / JWT / OAuth2 / Kerberos ·  访问控制：SystemAccessControl + ConnectorAccessControl（行过滤/列掩码 ViewExpression）</text>

  <!-- 执行时机 axis note -->
  <rect x="30" y="620" width="1020" height="90" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="642" font-size="11.5" font-weight="700" fill="#1d1d1f">横轴 · 执行时机：查询期同步（生灭随查询） ┃ 集群守护（常驻但不做数据维护）</text>
  <text x="46" y="666" font-size="9.5" fill="#6e6e73">查询期：解析→规划→优化→调度→执行→交换→汇聚，所有 stage/task/split/内存随查询创建、随结束回收。</text>
  <text x="46" y="684" font-size="9.5" fill="#6e6e73">集群守护：discovery/心跳、资源组排队、集群内存仲裁、（FTE 时）exchange 数据的暂存清理。</text>
  <text x="46" y="702" font-size="9.5" fill="#b1483a">关键差异：无 Compaction/Merge/TTL/统计刷新等"后台数据维护"——因为数据不归 Trino 管。</text>
</svg>
