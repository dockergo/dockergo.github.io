<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="702" viewBox="0 0 1100 702" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="aHot" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#0a84ff"/></marker>
    <marker id="aCtl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#7c5fe6"/></marker>
    <marker id="aFail" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#e8730f"/></marker>
    <marker id="aTouch" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b5793a"/></marker>
  </defs>

  <rect width="1100" height="702" fill="#fbfbfd"/>

  <!-- ===== 标题条 ===== -->
  <rect x="0" y="0" width="1100" height="46" fill="#f4f5f7" stroke="#e6e6eb"/>
  <text x="24" y="28" font-size="15" font-weight="700" fill="#1d1d1f">Trino 核心原理 · 总架构图（控制面 / 数据面 · 查询生命周期）</text>
  <text x="560" y="28" font-size="10" fill="#8a8a90">coordinator 单脑规划调度 · worker 并行执行 · 连接器读外部源 · 数据不归 Trino 存储</text>

  <!-- ===== 客户端接入 ===== -->
  <rect x="24" y="58" width="1052" height="42" rx="10" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="40" y="83" font-size="11" font-weight="700" fill="#4b4b50">客户端 / 协议接入</text>
  <g text-anchor="middle" font-size="9.5" fill="#1b2a4a">
    <rect x="400" y="65" width="150" height="28" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="475" y="83">HTTP REST</text>
    <rect x="564" y="65" width="150" height="28" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="639" y="83">JDBC / CLI</text>
    <rect x="728" y="65" width="180" height="28" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="818" y="83">Web UI / BI</text>
  </g>

  <!-- ===== 控制面 Coordinator ===== -->
  <rect x="24" y="112" width="636" height="300" rx="16" fill="#f3f0fb" stroke="#d9cff2" filter="url(#soft)"/>
  <rect x="24" y="112" width="4" height="300" rx="2" fill="#7c5fe6"/>
  <text x="44" y="134" font-size="12.5" font-weight="700" fill="#4b3a8c">控制面 · Coordinator（单脑 · 一个 trino-server）</text>
  <text x="44" y="151" font-size="9.5" fill="#8574c4">解析 · 分析 · 规划/优化 · 调度；不碰 split 级数据</text>
  <text x="632" y="134" font-size="9.5" text-anchor="end" font-weight="600" fill="#7c5fe6">Control</text>

  <!-- 查询编排链 -->
  <text x="44" y="176" font-size="10.5" font-weight="700" fill="#4b3a8c">查询编排链（前台同步）</text>
  <g text-anchor="middle">
    <rect x="44" y="184" width="112" height="56" rx="9" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)" data-tid="qlife" data-lab="接入/解析"/><text x="100" y="210" font-size="9.5" font-weight="600" fill="#1b2a4a">接入/解析</text><text x="100" y="227" font-size="8.5" fill="#5b7db1">SqlParser</text>
    <rect x="164" y="184" width="112" height="56" rx="9" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)" data-tid="qlife" data-lab="分析绑定"/><text x="220" y="210" font-size="9.5" font-weight="600" fill="#1b2a4a">分析绑定</text><text x="220" y="227" font-size="8.5" fill="#5b7db1">Analyzer</text>
    <rect x="284" y="184" width="112" height="56" rx="9" fill="#efeafc" stroke="#d9cff2" filter="url(#soft)" data-tid="tabletsched" data-lab="规划/优化"/><text x="340" y="210" font-size="9.5" font-weight="600" fill="#4b3a8c">规划/优化</text><text x="340" y="227" font-size="8.5" fill="#8574c4">迭代规则·CBO</text>
    <rect x="404" y="184" width="112" height="56" rx="9" fill="#efeafc" stroke="#d9cff2" filter="url(#soft)" data-tid="transaction" data-lab="切分/分发"/><text x="460" y="210" font-size="9.5" font-weight="600" fill="#4b3a8c">切 Fragment</text><text x="460" y="227" font-size="8.5" fill="#8574c4">PlanFragmenter</text>
    <rect x="524" y="184" width="112" height="56" rx="9" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)" data-tid="transaction" data-lab="调度"/><text x="580" y="210" font-size="9.5" font-weight="600" fill="#12402a">调度</text><text x="580" y="227" font-size="8.5" fill="#2f6f4f">StageScheduler</text>
  </g>
  <!-- 编排链内部 Hot 流 -->
  <g stroke="#0a84ff" stroke-width="1.6" fill="none">
    <line x1="156" y1="212" x2="164" y2="212" marker-end="url(#aHot)"/>
    <line x1="276" y1="212" x2="284" y2="212" marker-end="url(#aHot)"/>
    <line x1="396" y1="212" x2="404" y2="212" marker-end="url(#aHot)"/>
    <line x1="516" y1="212" x2="524" y2="212" marker-end="url(#aHot)"/>
  </g>

  <!-- 集群守护 -->
  <text x="44" y="258" font-size="10.5" font-weight="700" fill="#2c5a3a">集群守护（常驻）</text>
  <g text-anchor="middle">
    <rect x="44" y="266" width="192" height="44" rx="9" fill="#f5faf6" stroke="#cfe6d5" data-tid="transaction" data-lab="资源组/排队"/><text x="140" y="288" font-size="9.5" font-weight="600" fill="#2c5a3a">资源组 / 排队</text><text x="140" y="303" font-size="8.5" fill="#2f6f4f">ResourceGroup</text>
    <rect x="246" y="266" width="192" height="44" rx="9" fill="#f5faf6" stroke="#cfe6d5" data-tid="metadata" data-lab="集群内存仲裁"/><text x="342" y="288" font-size="9.5" font-weight="600" fill="#2c5a3a">集群内存仲裁</text><text x="342" y="303" font-size="8.5" fill="#2f6f4f">ClusterMemory</text>
    <rect x="448" y="266" width="192" height="44" rx="9" fill="#f5faf6" stroke="#cfe6d5" data-tid="transaction" data-lab="发现/心跳"/><text x="544" y="288" font-size="9.5" font-weight="600" fill="#2c5a3a">发现 / 心跳</text><text x="544" y="303" font-size="8.5" fill="#2f6f4f">节点存活</text>
  </g>

  <!-- 安全 贯穿入口 -->
  <text x="44" y="336" font-size="10.5" font-weight="700" fill="#5a3d78">安全（贯穿入口）</text>
  <rect x="44" y="344" width="596" height="44" rx="9" fill="#faf4fb" stroke="#e2d2ee" data-tid="dcl" data-lab="安全·认证+访问控制"/>
  <rect x="44" y="344" width="4" height="44" rx="2" fill="#7c5fe6"/>
  <text x="60" y="365" font-size="9.5" font-weight="600" fill="#5a3d78">认证链 → 两层访问控制</text>
  <text x="60" y="380" font-size="8.5" fill="#8f74a8">System + Connector 双层鉴权</text>

  <!-- ===== 数据面 Worker ===== -->
  <rect x="680" y="112" width="396" height="300" rx="16" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <rect x="680" y="112" width="4" height="300" rx="2" fill="#12946f"/>
  <text x="700" y="134" font-size="12.5" font-weight="700" fill="#12402a">数据面 · Worker 集群（对等 · 每个 trino-server）</text>
  <text x="700" y="151" font-size="9.5" fill="#2f6f4f">并行执行 stage/task · 无自有存储</text>
  <text x="1056" y="134" font-size="9.5" text-anchor="end" font-weight="600" fill="#0a84ff">Hot</text>

  <rect x="696" y="166" width="364" height="94" rx="11" fill="#f5faf6" stroke="#cfe6d5" data-tid="execengine" data-lab="Task/Driver/Operator 执行"/>
  <text x="712" y="186" font-size="10" font-weight="700" fill="#2c5a3a">Task 执行层次（worker 内）</text>
  <g text-anchor="middle" font-size="9">
    <rect x="710" y="194" width="168" height="28" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="794" y="212" fill="#1b2a4a">Task → Pipeline</text>
    <rect x="886" y="194" width="160" height="28" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="966" y="212" fill="#1b2a4a">Driver（并行）</text>
    <rect x="710" y="228" width="336" height="26" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="878" y="245" fill="#274a78">Operator 链 · Page（列式）</text>
  </g>

  <rect x="696" y="268" width="364" height="40" rx="10" fill="#eef3fb" stroke="#bcd0ec" data-tid="compaction" data-lab="Exchange 数据交换"/>
  <rect x="696" y="268" width="4" height="40" rx="2" fill="#0a84ff"/>
  <text x="712" y="286" font-size="10" font-weight="700" fill="#274a78">Exchange 数据交换</text>
  <text x="712" y="300" font-size="8.8" fill="#5b7db1">stage 间 shuffle（流式直连）</text>

  <rect x="696" y="316" width="364" height="40" rx="10" fill="#fdf2ea" stroke="#f0cdaa" data-tid="workload" data-lab="FTE 容错·spooling"/>
  <rect x="696" y="316" width="4" height="40" rx="2" fill="#e8730f"/>
  <text x="712" y="334" font-size="10" font-weight="700" fill="#8a4a12">FTE 容错执行</text>
  <text x="712" y="348" font-size="8.8" fill="#a8641e">spooling exchange 暂存重试</text>

  <rect x="696" y="364" width="364" height="40" rx="10" fill="#fff7e6" stroke="#e8cf9a" data-tid="storageformat" data-lab="连接器读写 PageSource"/>
  <rect x="696" y="364" width="4" height="40" rx="2" fill="#b5793a"/>
  <text x="712" y="382" font-size="10" font-weight="700" fill="#5a3410">连接器读写（叶子算子）</text>
  <text x="712" y="396" font-size="8.8" fill="#93762e">ConnectorPageSource → Page</text>

  <!-- 数据面内部 Hot 竖流 + Failure 兜底 -->
  <line x1="878" y1="260" x2="878" y2="268" stroke="#0a84ff" stroke-width="1.6" fill="none" marker-end="url(#aHot)"/>
  <line x1="820" y1="308" x2="820" y2="316" stroke="#e8730f" stroke-width="1.6" stroke-dasharray="3 3" fill="none" marker-end="url(#aFail)"/>
  <text x="826" y="314" font-size="8" fill="#e8730f">FTE 时</text>

  <!-- ===== 跨面连线：客户端→控制面（Hot），控制面→数据面（Control 下发） ===== -->
  <line x1="475" y1="93" x2="330" y2="112" stroke="#0a84ff" stroke-width="1.8" fill="none" marker-end="url(#aHot)"/>
  <text x="336" y="106" font-size="8" fill="#0a84ff">提交 SQL</text>
  <line x1="660" y1="250" x2="680" y2="250" stroke="#7c5fe6" stroke-width="1.8" stroke-dasharray="6 4" fill="none" marker-end="url(#aCtl)"/>
  <text x="620" y="244" font-size="8" text-anchor="middle" fill="#7c5fe6">下发 fragment</text>
  <text x="620" y="255" font-size="8" text-anchor="middle" fill="#7c5fe6">· 调度</text>

  <!-- ===== 外部数据生态（接触面） ===== -->
  <rect x="24" y="428" width="1052" height="84" rx="12" fill="#f4f2ee" stroke="#e3ddd2" stroke-dasharray="6 4"/>
  <rect x="24" y="428" width="4" height="84" rx="2" fill="#b5793a"/>
  <text x="44" y="450" font-size="11" font-weight="700" fill="#6e6357" data-tid="opttech" data-lab="外部数据生态·Catalog 接入">外部数据生态（非 Trino 组件 · 经连接器 SPI · 数据不进 Trino）</text>
  <g text-anchor="middle" font-size="8.8">
    <rect x="40" y="460" width="196" height="44" rx="8" fill="#fbf6ef" stroke="#e6d8c4"/><text x="138" y="480" font-size="9.5" font-weight="600" fill="#5a3410">数据湖 / 对象存储</text><text x="138" y="496" fill="#93762e">Hive · Iceberg · Delta</text>
    <rect x="246" y="460" width="196" height="44" rx="8" fill="#fbf6ef" stroke="#e6d8c4"/><text x="344" y="480" font-size="9.5" font-weight="600" fill="#5a3410">关系数据库</text><text x="344" y="496" fill="#93762e">MySQL · PostgreSQL</text>
    <rect x="452" y="460" width="196" height="44" rx="8" fill="#fbf6ef" stroke="#e6d8c4"/><text x="550" y="480" font-size="9.5" font-weight="600" fill="#5a3410">NoSQL / 检索</text><text x="550" y="496" fill="#93762e">Mongo · Cassandra · ES</text>
    <rect x="658" y="460" width="196" height="44" rx="8" fill="#fbf6ef" stroke="#e6d8c4"/><text x="756" y="480" font-size="9.5" font-weight="600" fill="#5a3410">流 / 消息</text><text x="756" y="496" fill="#93762e">Kafka · streaming</text>
    <rect x="864" y="460" width="196" height="44" rx="8" fill="#fbf6ef" stroke="#e6d8c4"/><text x="962" y="480" font-size="9.5" font-weight="600" fill="#5a3410">跨源联邦</text><text x="962" y="496" fill="#93762e">多 catalog 同查</text>
  </g>
  <!-- 连接器 SPI 接触面（Touch） -->
  <line x1="878" y1="404" x2="878" y2="428" stroke="#b5793a" stroke-width="1.8" fill="none" marker-end="url(#aTouch)"/>
  <text x="884" y="420" font-size="8" fill="#b5793a">连接器 SPI 读写</text>

  <!-- ===== 查询生命周期主线（贯穿主轴） ===== -->
  <rect x="24" y="528" width="1052" height="68" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="44" y="549" font-size="10.5" font-weight="700" fill="#1d1d1f">查询生命周期主线（贯穿主轴）</text>
  <text x="1056" y="549" font-size="9" text-anchor="end" fill="#a1a1a6">资源随查询创建、随结束回收</text>
  <g text-anchor="middle" font-size="9.5">
    <rect x="38" y="558" width="150" height="30" rx="8" fill="#efeafc" stroke="#d9cff2"/><text x="113" y="577" font-weight="600" fill="#4b3a8c">Query 查询</text>
    <rect x="212" y="558" width="150" height="30" rx="8" fill="#efeafc" stroke="#d9cff2"/><text x="287" y="577" font-weight="600" fill="#4b3a8c">Stage 阶段</text>
    <rect x="386" y="558" width="150" height="30" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="461" y="577" font-weight="600" fill="#1b2a4a">Task 任务</text>
    <rect x="560" y="558" width="150" height="30" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="635" y="577" font-weight="600" fill="#1b2a4a">Split 分片</text>
    <rect x="734" y="558" width="150" height="30" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="809" y="577" font-weight="600" fill="#1b2a4a">Driver 驱动</text>
    <rect x="908" y="558" width="150" height="30" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="983" y="577" font-weight="600" fill="#1b2a4a">Operator 算子</text>
  </g>
  <g stroke="#0a84ff" stroke-width="1.6" fill="none">
    <line x1="188" y1="573" x2="212" y2="573" marker-end="url(#aHot)"/>
    <line x1="362" y1="573" x2="386" y2="573" marker-end="url(#aHot)"/>
    <line x1="536" y1="573" x2="560" y2="573" marker-end="url(#aHot)"/>
    <line x1="710" y1="573" x2="734" y2="573" marker-end="url(#aHot)"/>
    <line x1="884" y1="573" x2="908" y2="573" marker-end="url(#aHot)"/>
  </g>
  <text x="113" y="530" font-size="0" fill="none"> </text>

  <!-- ===== 图例 · 语义分型 ===== -->
  <rect x="24" y="608" width="1052" height="82" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="44" y="630" font-size="10.5" font-weight="700" fill="#1d1d1f">图例 · 语义分型</text>
  <text x="200" y="630" font-size="9" fill="#b1483a">纵切 = 控制面 / 数据面；横轴 = 查询生命周期六级；连接器 SPI 定义「数据在哪、谁下推」</text>
  <g font-size="9.5" fill="#5b6470">
    <line x1="44" y1="650" x2="74" y2="650" stroke="#0a84ff" stroke-width="2.2"/><text x="82" y="654">Hot 数据流（实线）· exchange / operator 数据流</text>
    <line x1="44" y1="674" x2="74" y2="674" stroke="#7c5fe6" stroke-width="1.8" stroke-dasharray="6 4"/><text x="82" y="678">Control（虚线）· 计划下发 · Stage/Node 调度</text>
    <line x1="560" y1="650" x2="590" y2="650" stroke="#e8730f" stroke-width="1.8" stroke-dasharray="3 3"/><text x="598" y="654">Failure（虚线）· FTE spooling exchange 兜底重试</text>
    <line x1="560" y1="674" x2="590" y2="674" stroke="#b5793a" stroke-width="1.8"/><text x="598" y="678">接触面 · Catalog / Connector SPI 接外部数据源</text>
  </g>
</svg>
