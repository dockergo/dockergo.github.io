<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="880" viewBox="0 0 1080 880" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="880" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Trino 核心原理 · 总架构图</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">coordinator 单脑做解析/规划/优化/调度；worker 集群并行执行；连接器读外部源；数据不归 Trino 存储</text>

  <!-- 客户端 -->
  <rect x="30" y="66" width="1020" height="52" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="46" y="86" font-size="11" font-weight="700" fill="#4b4b50">客户端 / 协议接入</text>
  <g text-anchor="middle" font-size="9.5">
    <rect x="360" y="76" width="150" height="32" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="435" y="96" fill="#1b2a4a">HTTP REST (client)</text>
    <rect x="524" y="76" width="140" height="32" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="594" y="96" fill="#1b2a4a">JDBC / CLI</text>
    <rect x="678" y="76" width="180" height="32" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="768" y="96" fill="#1b2a4a">Web UI / BI 工具</text>
  </g>

  <!-- Coordinator -->
  <rect x="30" y="132" width="640" height="300" rx="16" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="46" y="156" font-size="12.5" font-weight="700" fill="#274a78">Coordinator（单脑 · 一个 trino-server）</text>
  <text x="46" y="174" font-size="9.5" fill="#5b7db1">查询的解析→分析→规划→优化→切 fragment→调度，全在这里；不参与 split 级数据处理（可配是否兼作 worker）</text>

  <text x="46" y="200" font-size="10.5" font-weight="700" fill="#1b2a4a">查询编排链（前台同步）</text>
  <rect x="46" y="208" width="118" height="58" rx="9" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)" data-tid="qlife" data-lab="接入/解析"/><text x="105" y="230" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1b2a4a">接入/解析</text><text x="105" y="245" text-anchor="middle" font-size="8.5" fill="#5b7db1">SqlParser</text><text x="105" y="257" text-anchor="middle" font-size="8.5" fill="#5b7db1">Statement</text>
  <rect x="176" y="208" width="118" height="58" rx="9" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)" data-tid="qlife" data-lab="分析绑定"/><text x="235" y="230" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1b2a4a">分析</text><text x="235" y="245" text-anchor="middle" font-size="8.5" fill="#5b7db1">StatementAnalyzer</text><text x="235" y="257" text-anchor="middle" font-size="8.5" fill="#5b7db1">元数据/类型绑定</text>
  <rect x="306" y="208" width="118" height="58" rx="9" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)" data-tid="tabletsched" data-lab="规划/优化"/><text x="365" y="230" text-anchor="middle" font-size="9.5" font-weight="600" fill="#274a78">规划/优化</text><text x="365" y="245" text-anchor="middle" font-size="8.5" fill="#5b7db1">IterativeOptimizer</text><text x="365" y="257" text-anchor="middle" font-size="8.5" fill="#5b7db1">CBO · Memo</text>
  <rect x="436" y="208" width="118" height="58" rx="9" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)" data-tid="transaction" data-lab="切分/分发"/><text x="495" y="230" text-anchor="middle" font-size="9.5" font-weight="600" fill="#274a78">切分/分发</text><text x="495" y="245" text-anchor="middle" font-size="8.5" fill="#5b7db1">PlanFragmenter</text><text x="495" y="257" text-anchor="middle" font-size="8.5" fill="#5b7db1">SubPlan→Stage</text>
  <rect x="566" y="208" width="88" height="58" rx="9" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)" data-tid="transaction" data-lab="调度"/><text x="610" y="230" text-anchor="middle" font-size="9.5" font-weight="600" fill="#12402a">调度</text><text x="610" y="245" text-anchor="middle" font-size="8.5" fill="#2f6f4f">Stage/Node</text><text x="610" y="257" text-anchor="middle" font-size="8.5" fill="#2f6f4f">Scheduler</text>

  <text x="46" y="292" font-size="10.5" font-weight="700" fill="#2c5a3a">集群守护（常驻）</text>
  <rect x="46" y="300" width="196" height="52" rx="9" fill="#f5faf6" stroke="#cfe6d5" data-tid="transaction" data-lab="资源组/排队"/><text x="144" y="322" text-anchor="middle" font-size="9.5" font-weight="600" fill="#2c5a3a">资源组 / 排队</text><text x="144" y="338" text-anchor="middle" font-size="8.5" fill="#2f6f4f">ResourceGroupManager</text>
  <rect x="254" y="300" width="196" height="52" rx="9" fill="#f5faf6" stroke="#cfe6d5" data-tid="metadata" data-lab="集群内存仲裁"/><text x="352" y="322" text-anchor="middle" font-size="9.5" font-weight="600" fill="#2c5a3a">集群内存仲裁</text><text x="352" y="338" text-anchor="middle" font-size="8.5" fill="#2f6f4f">ClusterMemoryManager</text>
  <rect x="462" y="300" width="192" height="52" rx="9" fill="#f5faf6" stroke="#cfe6d5" data-tid="opttech" data-lab="发现/心跳"/><text x="558" y="322" text-anchor="middle" font-size="9.5" font-weight="600" fill="#2c5a3a">发现 / 心跳</text><text x="558" y="338" text-anchor="middle" font-size="8.5" fill="#2f6f4f">Discovery + 节点存活</text>

  <text x="46" y="378" font-size="10.5" font-weight="700" fill="#5a3d78">安全（贯穿入口）</text>
  <rect x="46" y="386" width="608" height="36" rx="9" fill="#faf4fb" stroke="#e2d2ee" data-tid="dcl" data-lab="安全·认证+访问控制"/><text x="60" y="408" font-size="9.5" fill="#5a3d78">认证过滤链（Password/Cert/JWT/OAuth2/Kerberos）→ SystemAccessControl 鉴权 → 交连接器 ConnectorAccessControl</text>

  <!-- Worker cluster -->
  <rect x="690" y="132" width="360" height="300" rx="16" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="706" y="156" font-size="12.5" font-weight="700" fill="#12402a">Worker 集群（对等 · 每个是一个 trino-server）</text>
  <text x="706" y="174" font-size="9.5" fill="#2f6f4f">并行执行分到的 stage/task；彼此经 exchange 交换数据</text>

  <rect x="706" y="188" width="328" height="104" rx="11" fill="#f5faf6" stroke="#cfe6d5" data-tid="execengine" data-lab="Task/Driver/Operator 执行"/>
  <text x="722" y="208" font-size="10" font-weight="700" fill="#2c5a3a">Task 执行层次（一个 worker 内）</text>
  <rect x="720" y="216" width="150" height="30" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="795" y="235" text-anchor="middle" font-size="9" fill="#1b2a4a">Task → Pipeline</text>
  <rect x="882" y="216" width="140" height="30" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="952" y="235" text-anchor="middle" font-size="9" fill="#1b2a4a">Driver（并行）</text>
  <rect x="720" y="252" width="150" height="32" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="795" y="272" text-anchor="middle" font-size="9" fill="#274a78">Operator 链 · Page</text>
  <rect x="882" y="252" width="140" height="32" rx="7" fill="#eafaf1" stroke="#bfe0cd"/><text x="952" y="272" text-anchor="middle" font-size="9" fill="#12402a">局部内存/spill</text>

  <rect x="706" y="300" width="328" height="52" rx="11" fill="#f3f7fc" stroke="#cfe0f2" data-tid="compaction" data-lab="Exchange 数据交换"/>
  <text x="722" y="320" font-size="10" font-weight="700" fill="#274a78">Exchange 数据交换</text>
  <text x="722" y="338" font-size="8.8" fill="#5b7db1">stage 间 shuffle：流式（直连）/ FTE 时经 spooling exchange 暂存</text>

  <rect x="706" y="362" width="328" height="52" rx="11" fill="#fff7e6" stroke="#e8cf9a" data-tid="storageformat" data-lab="连接器读写(PageSource)"/>
  <text x="722" y="382" font-size="10" font-weight="700" fill="#5a3410">连接器读写（叶子 Operator 处）</text>
  <text x="722" y="400" font-size="8.8" fill="#93762e">ConnectorPageSource 拉外部源字节 → Page；写下推 PageSink</text>

  <!-- arrows client->coord, coord->worker -->
  <line x1="435" y1="118" x2="350" y2="132" stroke="#c7c7cc" stroke-width="1.3" fill="none" marker-end="url(#ar)"/>
  <path d="M654,282 L690,282" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="662" y="276" font-size="8" fill="#4c8567" transform="rotate(-8 662 276)">分发 fragment</text>

  <!-- ecosystem layer (external data — 非 Trino 组件) -->
  <rect x="30" y="452" width="1020" height="86" rx="12" fill="#f4f2ee" stroke="#e3ddd2" stroke-dasharray="6 4" data-tid="opttech" data-lab="外部数据生态·Catalog 接入"/>
  <text x="46" y="474" font-size="11.5" font-weight="700" fill="#6e6357">外部数据生态（非 Trino 组件 · 经连接器 SPI 读写,数据不进 Trino 存储）</text>
  <g text-anchor="middle" font-size="8.8">
    <rect x="46" y="484" width="188" height="44" rx="8" fill="#fbf6ef" stroke="#e6d8c4"/><text x="140" y="502" font-size="9.5" font-weight="600" fill="#5a3410">数据湖 / 对象存储</text><text x="140" y="518" fill="#93762e">Hive · Iceberg · Delta · Hudi(S3/HDFS)</text>
    <rect x="246" y="484" width="188" height="44" rx="8" fill="#fbf6ef" stroke="#e6d8c4"/><text x="340" y="502" font-size="9.5" font-weight="600" fill="#5a3410">关系数据库</text><text x="340" y="518" fill="#93762e">MySQL · PostgreSQL · Oracle · SQLServer</text>
    <rect x="446" y="484" width="188" height="44" rx="8" fill="#fbf6ef" stroke="#e6d8c4"/><text x="540" y="502" font-size="9.5" font-weight="600" fill="#5a3410">NoSQL / 检索</text><text x="540" y="518" fill="#93762e">Cassandra · MongoDB · Elasticsearch</text>
    <rect x="646" y="484" width="188" height="44" rx="8" fill="#fbf6ef" stroke="#e6d8c4"/><text x="740" y="502" font-size="9.5" font-weight="600" fill="#5a3410">流 / 消息</text><text x="740" y="518" fill="#93762e">Kafka · 其它 streaming 连接器</text>
    <rect x="846" y="484" width="188" height="44" rx="8" fill="#fbf6ef" stroke="#e6d8c4"/><text x="940" y="502" font-size="9.5" font-weight="600" fill="#5a3410">跨源联邦</text><text x="940" y="518" fill="#93762e">TPCH/JMX/system · 多 catalog 同查</text>
  </g>
  <path d="M540,432 L540,452" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="548" y="446" font-size="8.5" fill="#a1a1a6">连接器 SPI 读写</text>

  <!-- takeaway -->
  <rect x="30" y="556" width="1020" height="92" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="46" y="578" font-size="11" font-weight="700" fill="#1d1d1f"></text>
  <text x="46" y="600" font-size="10" fill="#4b4b50">纵向 = 一条查询在 coordinator 内的编排链（解析→分析→规划→优化→切分→调度）；右侧 = worker 集群的并行执行与数据交换。</text>
  <text x="46" y="618" font-size="10" fill="#4b4b50">与存算一体引擎（Doris FE/BE、ClickHouse 对等节点）不同：Trino 的 coordinator 是单脑规划器，worker 无自有存储，表字节全部来自底部"外部数据生态"。</text>
  <text x="46" y="636" font-size="9.5" fill="#b1483a">因此没有存储引擎/事务/Compaction 主线；"数据在哪、谁做下推"由连接器 SPI 定义。</text>

  <!-- lifecycle note -->
  <rect x="30" y="662" width="1020" height="52" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="684" font-size="10.5" font-weight="700" fill="#1d1d1f">查询即生命周期</text>
  <text x="46" y="702" font-size="9.5" fill="#6e6e73">Query→Stage→Task→Split→Driver→Operator 六级：所有资源随查询创建、随结束回收；集群守护进程只做调度/资源/内存仲裁，不做数据维护。</text>
</svg>
