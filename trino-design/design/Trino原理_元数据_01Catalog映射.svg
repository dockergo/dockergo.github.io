<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1040" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Trino Catalog 映射 · catalog.schema.table 如何路由到连接器</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">一个 properties 文件 = 一个 catalog = 一个 Connector 实例;一次查询可跨多 catalog</text>

  <!-- config files -->
  <rect x="30" y="72" width="300" height="230" rx="13" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="46" y="94" font-size="11" font-weight="700" fill="#5a3410">etc/catalog/*.properties</text>
  <text x="46" y="112" font-size="8" fill="#93762e">catalog.config-dir 加载</text>
  <rect x="50" y="122" width="260" height="40" rx="7" fill="#fdf6ea" stroke="#e8cf9a"/><text x="64" y="139" font-size="8.8" font-weight="600" fill="#5a3410">hive.properties</text><text x="64" y="154" font-size="8" fill="#93762e">connector.name=hive + metastore/S3</text>
  <rect x="50" y="170" width="260" height="40" rx="7" fill="#fdf6ea" stroke="#e8cf9a"/><text x="64" y="187" font-size="8.8" font-weight="600" fill="#5a3410">mysql.properties</text><text x="64" y="202" font-size="8" fill="#93762e">connector.name=mysql + jdbc url</text>
  <rect x="50" y="218" width="260" height="40" rx="7" fill="#fdf6ea" stroke="#e8cf9a"/><text x="64" y="235" font-size="8.8" font-weight="600" fill="#5a3410">iceberg.properties …</text><text x="64" y="250" font-size="8" fill="#93762e">每文件 = 一个数据源接入</text>
  <text x="46" y="282" font-size="8.5" fill="#93762e">FileCatalogStore 读 → CatalogProperties</text>

  <!-- engine routing -->
  <rect x="360" y="72" width="330" height="230" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="376" y="94" font-size="11" font-weight="700" fill="#1b2a4a">引擎侧路由</text>
  <rect x="380" y="108" width="290" height="50" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="394" y="128" font-size="9" font-weight="600" fill="#274a78">ConnectorManager</text><text x="394" y="144" font-size="8.5" fill="#5b7db1">ConnectorFactory.create(配置) → Connector</text>
  <rect x="380" y="166" width="290" height="50" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="394" y="186" font-size="9" font-weight="600" fill="#274a78">CatalogManager</text><text x="394" y="202" font-size="8.5" fill="#5b7db1">catalog 名 → Connector 实例</text>
  <rect x="380" y="224" width="290" height="66" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="394" y="244" font-size="9" font-weight="600" fill="#12402a">MetadataManager</text><text x="394" y="262" font-size="8.5" fill="#2f6f4f">QualifiedObjectName(cat.sch.tbl)</text><text x="394" y="278" font-size="8.5" fill="#2f6f4f">→ 路由到该连接器 ConnectorMetadata</text>

  <!-- connectors -->
  <rect x="720" y="72" width="290" height="230" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="736" y="94" font-size="11" font-weight="700" fill="#2c5a3a">连接器实例（各读各源）</text>
  <rect x="736" y="108" width="258" height="44" rx="8" fill="#fff" stroke="#cfe6d5"/><text x="750" y="128" font-size="8.8" font-weight="600" fill="#2c5a3a">Hive Connector</text><text x="750" y="144" font-size="8" fill="#2f6f4f">→ Hive metastore + S3/HDFS</text>
  <rect x="736" y="160" width="258" height="44" rx="8" fill="#fff" stroke="#cfe6d5"/><text x="750" y="180" font-size="8.8" font-weight="600" fill="#2c5a3a">MySQL Connector</text><text x="750" y="196" font-size="8" fill="#2f6f4f">→ MySQL 库</text>
  <rect x="736" y="212" width="258" height="44" rx="8" fill="#fff" stroke="#cfe6d5"/><text x="750" y="232" font-size="8.8" font-weight="600" fill="#2c5a3a">Iceberg Connector …</text><text x="750" y="248" font-size="8" fill="#2f6f4f">→ Iceberg catalog + 对象存储</text>
  <text x="736" y="282" font-size="8.5" fill="#93762e">各连接器实现同一 SPI</text>

  <line x1="330" y1="180" x2="360" y2="180" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="690" y1="240" x2="720" y2="180" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- cross-catalog example -->
  <rect x="30" y="320" width="980" height="180" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="342" font-size="11" font-weight="700" fill="#1d1d1f">跨 catalog 联邦示例</text>
  <rect x="46" y="356" width="948" height="34" rx="7" fill="#fff" stroke="#ececf1"/><text x="60" y="377" font-size="9" fill="#4b4b50">SELECT * FROM <tspan font-weight="700" fill="#5a3410">hive.sales.orders</tspan> o JOIN <tspan font-weight="700" fill="#2c5a3a">mysql.crm.customer</tspan> c ON o.cust=c.id</text>
  <text x="46" y="412" font-size="9" fill="#6e6e73">· MetadataManager 把 hive.sales.orders 路由给 Hive Connector,mysql.crm.customer 路由给 MySQL Connector</text>
  <text x="46" y="430" font-size="9" fill="#6e6e73">· 两连接器各自读各自源、各自下推,引擎侧统一成 Page 后 Join——一条 SQL 查两个异构源</text>
  <text x="46" y="448" font-size="9" fill="#6e6e73">· 无需预先"注册"或"同步"两库的元数据——都是查询期实时穿透获取(见下张图)</text>
  <text x="46" y="470" font-size="9" fill="#b1483a">· 归属：Connector 实例化属【连接器框架】;本篇管引擎侧"catalog 名→连接器"的路由与元数据调用分发</text>
  <text x="46" y="490" font-size="8.5" fill="#6e6e73">· catalog 是逻辑命名空间,不是物理库;同一物理源可配多个 catalog(不同参数),同一 catalog 也可含多 schema</text>
</svg>
