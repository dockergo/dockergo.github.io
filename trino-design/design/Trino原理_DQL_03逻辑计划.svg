<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="660" viewBox="0 0 1080 660" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="660" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Trino 逻辑计划 · PlanNode 树（示例查询）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">PlanNode 不可变、可 JSON 序列化（fragment 走网络）；OutputNode 永远是 SELECT 的逻辑根</text>

  <!-- plan tree (left) -->
  <text x="46" y="80" font-size="11" font-weight="700" fill="#1d1d1f">示例计划树（自顶向下）</text>
  <g font-size="9" text-anchor="middle">
    <rect x="150" y="92" width="220" height="38" rx="9" fill="#faf4fb" stroke="#e2d2ee" filter="url(#soft)"/><text x="260" y="110" font-size="10" font-weight="700" fill="#5a3d78">OutputNode</text><text x="260" y="124" fill="#7a5a95">c.name, sum(o.price)</text>
    <rect x="150" y="150" width="220" height="38" rx="9" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="260" y="168" font-size="10" font-weight="700" fill="#1b2a4a">AggregationNode</text><text x="260" y="182" fill="#5b7db1">GROUP BY c.name · sum(o.price)</text>
    <rect x="150" y="208" width="220" height="38" rx="9" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="260" y="226" font-size="10" font-weight="700" fill="#1b2a4a">ProjectNode</text><text x="260" y="240" fill="#5b7db1">投影所需列</text>
    <rect x="150" y="266" width="220" height="38" rx="9" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/><text x="260" y="284" font-size="10" font-weight="700" fill="#2c5a3a">JoinNode (INNER)</text><text x="260" y="298" fill="#2f6f4f">o.cust = c.id</text>
    <rect x="60" y="330" width="180" height="52" rx="9" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/><text x="150" y="350" font-size="10" font-weight="700" fill="#5a3410">FilterNode</text><text x="150" y="365" fill="#93762e">o.day='2026-07-01'</text><text x="150" y="378" fill="#93762e">→ 下推候选</text>
    <rect x="280" y="330" width="180" height="52" rx="9" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/><text x="370" y="350" font-size="10" font-weight="700" fill="#5a3410">TableScanNode</text><text x="370" y="365" fill="#93762e">customer (c)</text><text x="370" y="378" fill="#93762e">TableHandle</text>
    <rect x="60" y="402" width="180" height="42" rx="9" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/><text x="150" y="422" font-size="10" font-weight="700" fill="#5a3410">TableScanNode</text><text x="150" y="436" fill="#93762e">orders (o)</text>
  </g>
  <line x1="260" y1="130" x2="260" y2="150" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="260" y1="188" x2="260" y2="208" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="260" y1="246" x2="260" y2="266" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="220" y1="304" x2="150" y2="330" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="300" y1="304" x2="370" y2="330" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="150" y1="382" x2="150" y2="402" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- node family (right) -->
  <rect x="510" y="72" width="540" height="558" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="528" y="94" font-size="11.5" font-weight="700" fill="#1d1d1f">PlanNode 节点族（DQL 相关）</text>
  <g font-size="9">
    <text x="528" y="120" font-size="10" font-weight="700" fill="#5a3410">扫描 / 过滤 / 投影</text>
    <rect x="528" y="128" width="504" height="30" rx="7" fill="#fff7e6" stroke="#e8cf9a"/><text x="542" y="147" fill="#5a3410">TableScanNode（叶子·连接器读）· FilterNode（谓词）· ProjectNode（投影/表达式）</text>

    <text x="528" y="180" font-size="10" font-weight="700" fill="#2c5a3a">连接</text>
    <rect x="528" y="188" width="504" height="30" rx="7" fill="#f5faf6" stroke="#cfe6d5"/><text x="542" y="207" fill="#2c5a3a">JoinNode · SemiJoinNode（IN/EXISTS）· SpatialJoinNode · IndexJoinNode</text>

    <text x="528" y="240" font-size="10" font-weight="700" fill="#1b2a4a">聚合 / 窗口</text>
    <rect x="528" y="248" width="504" height="46" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="542" y="267" fill="#1b2a4a">AggregationNode（+GroupIdNode 处理 grouping sets）· MarkDistinctNode</text><text x="542" y="284" fill="#5b7db1">WindowNode · TopNRankingNode · RowNumberNode · PatternRecognitionNode</text>

    <text x="528" y="316" font-size="10" font-weight="700" fill="#274a78">排序 / 限制 / 集合</text>
    <rect x="528" y="324" width="504" height="46" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="542" y="343" fill="#274a78">SortNode · TopNNode · LimitNode · DistinctLimitNode · OffsetNode</text><text x="542" y="360" fill="#5b7db1">UnionNode · IntersectNode · ExceptNode（SetOperationNode）· ValuesNode</text>

    <text x="528" y="392" font-size="10" font-weight="700" fill="#5a3d78">分布式化后插入</text>
    <rect x="528" y="400" width="504" height="46" rx="7" fill="#faf4fb" stroke="#e2d2ee"/><text x="542" y="419" fill="#5a3d78">ExchangeNode（LOCAL/REMOTE × GATHER/REPARTITION/REPLICATE）</text><text x="542" y="436" fill="#7a5a95">RemoteSourceNode（fragment 剪点标记）</text>

    <text x="528" y="468" font-size="10" font-weight="700" fill="#4b4b50">子查询相关</text>
    <rect x="528" y="476" width="504" height="30" rx="7" fill="#fff" stroke="#ececf1"/><text x="542" y="495" fill="#4b4b50">CorrelatedJoinNode · ApplyNode · EnforceSingleRowNode · UnnestNode</text>

    <rect x="528" y="524" width="504" height="88" rx="9" fill="#fbfbfd" stroke="#ececf1"/>
    <text x="542" y="546" font-size="10" font-weight="700" fill="#1d1d1f">关键性质</text>
    <text x="542" y="566" font-size="9" fill="#6e6e73">· 不可变：优化 = 生成新树，不原地改（Memo 缓解重建成本，见优化器篇）</text>
    <text x="542" y="583" font-size="9" fill="#6e6e73">· 可 JSON 序列化：fragment 要序列化后经 HTTP 发到 worker</text>
    <text x="542" y="600" font-size="9" fill="#6e6e73">· 一个计划 = PlanNode 根 + StatsAndCosts（每节点统计与代价估计）</text>
  </g>
</svg>
