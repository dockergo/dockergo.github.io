<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="680" viewBox="0 0 1100 680" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1100" height="680" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Trino 优化器 · IterativeOptimizer 规则改写到定点（不是 Cascades）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">Memo 每组只持单个 PlanNode（非等价表达式集）；规则反复套用到 fixpoint；CBO 仅局部用于 Join 顺序/分布</text>

  <!-- left: iterative loop -->
  <rect x="30" y="70" width="520" height="360" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="92" font-size="11.5" font-weight="700" fill="#1b2a4a">迭代改写引擎（exploreGroup / exploreNode）</text>

  <rect x="60" y="106" width="200" height="52" rx="9" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="160" y="128" text-anchor="middle" font-size="10" font-weight="600" fill="#274a78">Memo：计划放进组</text><text x="160" y="146" text-anchor="middle" font-size="8.5" fill="#5b7db1">每组 membership = 单个 PlanNode</text>
  <rect x="320" y="106" width="200" height="52" rx="9" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="420" y="128" text-anchor="middle" font-size="10" font-weight="600" fill="#274a78">RuleIndex 按根节点类型选规则</text><text x="420" y="146" text-anchor="middle" font-size="8.5" fill="#5b7db1">getCandidates(node)</text>

  <rect x="60" y="176" width="460" height="120" rx="10" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="76" y="197" font-size="10" font-weight="700" fill="#2c5a3a">exploreNode：对一个节点反复套规则</text>
  <g font-size="8.8">
    <rect x="76" y="206" width="200" height="34" rx="7" fill="#fff" stroke="#cfe6d5"/><text x="176" y="227" text-anchor="middle" fill="#2c5a3a">pattern.match(node) → rule.apply</text>
    <rect x="296" y="206" width="208" height="34" rx="7" fill="#fff" stroke="#cfe6d5"/><text x="400" y="227" text-anchor="middle" fill="#2c5a3a">命中 → memo.replace(组, 新子树)</text>
    <rect x="76" y="248" width="428" height="38" rx="7" fill="#eafaf1" stroke="#bfe0cd"/><text x="290" y="264" text-anchor="middle" fill="#12402a" font-weight="600">done=false; 同一节点重试所有规则,直到没有规则再触发（fixpoint）</text><text x="290" y="278" text-anchor="middle" fill="#2f6f4f" font-size="8">replace 时驱逐该组及父组缓存的 stats/cost</text>
  </g>
  <path d="M400,240 C440,258 440,270 400,286" fill="none" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <rect x="60" y="310" width="460" height="104" rx="10" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="76" y="331" font-size="10" font-weight="700" fill="#b1483a">为什么不是 Cascades</text>
  <text x="76" y="351" font-size="8.8" fill="#4b4b50">· Cascades 的组持有"一组等价逻辑/物理表达式" + 自顶向下代价搜索</text>
  <text x="76" y="368" font-size="8.8" fill="#4b4b50">· Trino 的 Memo 组只持单个节点,replace() 就地替换（Lookup 注释明写</text>
  <text x="90" y="382" font-size="8.8" fill="#4b4b50">  "assumes group contains only one node"）</text>
  <text x="76" y="399" font-size="8.8" fill="#4b4b50">· 这里 Memo 是"改写效率结构"(免不可变树全量重建),不是代价搜索解空间</text>

  <!-- right: optimizer batch pipeline -->
  <rect x="566" y="70" width="504" height="590" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="582" y="92" font-size="11.5" font-weight="700" fill="#1d1d1f">PlanOptimizers：数十个批次按固定顺序（节选）</text>
  <g font-size="9">
    <rect x="582" y="104" width="472" height="26" rx="6" fill="#eef3fb" stroke="#bcd0ec"/><text x="596" y="122" fill="#1b2a4a">初始清理 · 列裁剪 columnPruning · 投影下推</text>
    <rect x="582" y="136" width="472" height="26" rx="6" fill="#eef3fb" stroke="#bcd0ec"/><text x="596" y="154" fill="#1b2a4a">去关联子查询 DecorrelateSubqueries</text>
    <rect x="582" y="168" width="472" height="26" rx="6" fill="#f5faf6" stroke="#cfe6d5"/><text x="596" y="186" fill="#2c5a3a">谓词下推 PredicatePushDown（多次穿插）</text>
    <rect x="582" y="200" width="472" height="26" rx="6" fill="#fff7e6" stroke="#e8cf9a"/><text x="596" y="218" fill="#5a3410">下推进 TableScan：applyFilter/Projection/Aggregation/Limit/TopN</text>
    <rect x="582" y="232" width="472" height="26" rx="6" fill="#f5faf6" stroke="#cfe6d5"/><text x="596" y="250" fill="#2c5a3a">消除 Cross Join EliminateCrossJoins</text>
    <rect x="582" y="264" width="472" height="30" rx="6" fill="#eafaf1" stroke="#bfe0cd"/><text x="596" y="283" fill="#12402a" font-weight="600">★ ReorderJoins（Join 顺序 · CBO · 只跑一次）</text>
    <rect x="582" y="300" width="472" height="30" rx="6" fill="#eafaf1" stroke="#bfe0cd"/><text x="596" y="319" fill="#12402a" font-weight="600">★ DetermineJoinDistributionType（Join 分布 · CBO）</text>
    <rect x="582" y="336" width="472" height="26" rx="6" fill="#faf4fb" stroke="#e2d2ee"/><text x="596" y="354" fill="#5a3d78">AddExchanges（插入 REMOTE exchange · 分布式化前置）</text>
    <rect x="582" y="368" width="472" height="26" rx="6" fill="#f7f7f9" stroke="#ececf1"/><text x="596" y="386" fill="#6e6e73">DeterminePartitionCount（估分区数,仅 AddExchanges 后）</text>
    <rect x="582" y="400" width="472" height="26" rx="6" fill="#f5faf6" stroke="#cfe6d5"/><text x="596" y="418" fill="#2c5a3a">动态过滤下推 PredicatePushDown(dynamicFilters=true)</text>
    <rect x="582" y="432" width="472" height="26" rx="6" fill="#eef3fb" stroke="#bcd0ec"/><text x="596" y="450" fill="#1b2a4a">部分聚合下推 PushPartialAggregations · 加中间聚合</text>
    <rect x="582" y="464" width="472" height="26" rx="6" fill="#eef3fb" stroke="#bcd0ec"/><text x="596" y="482" fill="#1b2a4a">AddDynamicFilterSources · BeginTableWrite</text>
  </g>
  <rect x="582" y="504" width="472" height="60" rx="9" fill="#fff" stroke="#ececf1"/>
  <text x="596" y="525" font-size="9.5" font-weight="700" fill="#1d1d1f">代价计算器切换点</text>
  <text x="596" y="544" font-size="8.8" fill="#6e6e73">AddExchanges 之前用"含预估 exchange 代价"的计算器（供 ReorderJoins/分布决策）;</text>
  <text x="596" y="558" font-size="8.8" fill="#6e6e73">之后切换为"不含预估 exchange"的计算器（exchange 已在计划里,不用再估）。</text>

  <rect x="582" y="574" width="472" height="74" rx="9" fill="#fbfbfd" stroke="#ececf1"/>
  <text x="596" y="595" font-size="9.5" font-weight="700" fill="#b1483a">术语精度</text>
  <text x="596" y="614" font-size="8.8" fill="#4b4b50">说"迭代规则优化器 + Memo 改写结构 + 局部 CBO",不要笼统写"Cascades 优化器"</text>
  <text x="596" y="631" font-size="8.8" fill="#4b4b50">或"代价优化器"——全 plan 的自顶向下代价搜索在 Trino 里并不存在。</text>
</svg>
