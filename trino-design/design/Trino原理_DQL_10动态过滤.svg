<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="600" viewBox="0 0 1080 600" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="600" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Trino 动态过滤 · Join 构建侧生成谓词回推探测侧扫描</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">先用小表实际值域生成运行时谓词,推到大表 TableScan,读数据前就跳过不匹配的 split/文件/行组</text>

  <!-- build side -->
  <rect x="30" y="72" width="300" height="200" rx="13" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="46" y="94" font-size="11" font-weight="700" fill="#12402a">① 构建侧（小表 · 先执行）</text>
  <rect x="50" y="106" width="260" height="46" rx="9" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/><text x="180" y="126" text-anchor="middle" font-size="9.5" font-weight="600" fill="#2c5a3a">scan customer WHERE region='EU'</text><text x="180" y="142" text-anchor="middle" font-size="8" fill="#2f6f4f">实际命中 cust_id ∈ {3,7,12,…}</text>
  <rect x="50" y="162" width="260" height="46" rx="9" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/><text x="180" y="182" text-anchor="middle" font-size="9.5" font-weight="600" fill="#2c5a3a">HashBuilderOperator 建 LookupSource</text><text x="180" y="198" text-anchor="middle" font-size="8" fill="#2f6f4f">收集 Join key 的实际值域/范围</text>
  <rect x="50" y="218" width="260" height="42" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="180" y="237" text-anchor="middle" font-size="9" font-weight="600" fill="#12402a">生成 DynamicFilter</text><text x="180" y="252" text-anchor="middle" font-size="8" fill="#2f6f4f">o.cust ∈ {3,7,12,…}（运行时才知道）</text>

  <!-- probe side -->
  <rect x="750" y="72" width="300" height="200" rx="13" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="766" y="94" font-size="11" font-weight="700" fill="#5a3410">② 探测侧（大表 · 后扫描）</text>
  <rect x="770" y="106" width="260" height="46" rx="9" fill="#fdf6ea" stroke="#e8cf9a" filter="url(#soft)"/><text x="900" y="126" text-anchor="middle" font-size="9.5" font-weight="600" fill="#5a3410">scan orders（十亿行）</text><text x="900" y="142" text-anchor="middle" font-size="8" fill="#93762e">若无动态过滤：全表扫</text>
  <rect x="770" y="162" width="260" height="46" rx="9" fill="#fdf6ea" stroke="#e8cf9a" filter="url(#soft)"/><text x="900" y="182" text-anchor="middle" font-size="9.5" font-weight="600" fill="#5a3410">应用 DynamicFilter</text><text x="900" y="198" text-anchor="middle" font-size="8" fill="#93762e">连接器 SplitManager/PageSource 用它裁剪</text>
  <rect x="770" y="218" width="260" height="42" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="900" y="237" text-anchor="middle" font-size="9" font-weight="600" fill="#12402a">跳过不匹配的 split/文件/行组</text><text x="900" y="252" text-anchor="middle" font-size="8" fill="#2f6f4f">扫描量可数量级下降</text>

  <!-- arrow build->probe -->
  <path d="M330,240 C520,240 560,182 748,182" fill="none" stroke="#0a84ff" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ar)"/>
  <rect x="430" y="150" width="220" height="48" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="540" y="170" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1b2a4a">运行时谓词回推</text>
  <text x="540" y="187" text-anchor="middle" font-size="8" fill="#5b7db1">DynamicFilter（SPI）· 构建完成后下发探测侧</text>

  <!-- wiring -->
  <rect x="30" y="292" width="1020" height="130" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="46" y="314" font-size="11" font-weight="700" fill="#274a78">规划期如何织入</text>
  <text x="46" y="336" font-size="9" fill="#5b7db1">· 优化批次 PredicatePushDown(dynamicFilters=true) + AddDynamicFilterSource.rules 插入动态过滤源与消费点</text>
  <text x="46" y="356" font-size="9" fill="#5b7db1">· SPI 侧 io.trino.spi.connector.DynamicFilter：连接器在 getSplits / PageSource 读取前查询它,拿到就绪的谓词做裁剪</text>
  <text x="46" y="376" font-size="9" fill="#5b7db1">· 时序：构建侧必须先跑出值域,探测侧扫描才拿得到谓词;未就绪时探测侧可先等一小段(有超时兜底)</text>
  <text x="46" y="398" font-size="9" fill="#5b7db1">· PARTITIONED Join 的动态过滤跨节点汇总;REPLICATED（广播）Join 每 worker 本地即可生成</text>

  <!-- value -->
  <rect x="30" y="442" width="1020" height="130" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="464" font-size="11" font-weight="700" fill="#1d1d1f">为什么关键（联邦查询的提速命门）</text>
  <text x="46" y="486" font-size="9" fill="#6e6e73">星型/雪花查询里,事实表(大)Join 维表(小,带过滤)是最常见形态。静态谓词只能过滤维表;事实表侧的过滤条件</text>
  <text x="46" y="504" font-size="9" fill="#6e6e73">"隐含在 Join 里",静态推不下去。动态过滤在运行期把维表的实际命中值变成事实表扫描的谓词——</text>
  <text x="46" y="522" font-size="9" fill="#6e6e73">对列存/分区表(Hive/Iceberg),这直接转成分区裁剪 + 文件级 min/max 跳过 + 行组跳过,扫描量常降 1~2 个数量级。</text>
  <text x="46" y="546" font-size="9" fill="#b1483a">归属：动态过滤是【查询规划与优化】+【连接器框架】协作——规划期插入,连接器侧消费。开关 enable-dynamic-filtering。</text>
</svg>
