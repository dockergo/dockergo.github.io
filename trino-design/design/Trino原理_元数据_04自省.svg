<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="480" viewBox="0 0 1040 480" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="1040" height="480" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Trino system 连接器与自省 · 一切皆表</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">运行时状态、元数据本身都以"表"暴露,用 SQL 查——诊断/监控/内省走同一接口</text>

  <!-- system.runtime -->
  <rect x="30" y="72" width="320" height="230" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="94" font-size="11" font-weight="700" fill="#1b2a4a">system.runtime.*（运行时）</text>
  <rect x="46" y="108" width="288" height="42" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="60" y="126" font-size="8.8" font-weight="600" fill="#274a78">queries</text><text x="60" y="142" font-size="8" fill="#5b7db1">在跑/历史查询(id/状态/用户/耗时/内存)</text>
  <rect x="46" y="158" width="288" height="42" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="60" y="176" font-size="8.8" font-weight="600" fill="#274a78">nodes</text><text x="60" y="192" font-size="8" fill="#5b7db1">节点存活视图(coordinator/worker/状态)</text>
  <rect x="46" y="208" width="288" height="42" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="60" y="226" font-size="8.8" font-weight="600" fill="#274a78">tasks</text><text x="60" y="242" font-size="8" fill="#5b7db1">task 级运行指标</text>
  <text x="46" y="272" font-size="8.5" fill="#5b7db1">SELECT * FROM system.runtime.queries</text>
  <text x="46" y="288" font-size="8.5" fill="#5b7db1">WHERE state='RUNNING' —— 直接诊断</text>

  <!-- system.metadata + information_schema -->
  <rect x="360" y="72" width="320" height="230" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="376" y="94" font-size="11" font-weight="700" fill="#2c5a3a">system.metadata.* / information_schema</text>
  <rect x="376" y="108" width="288" height="42" rx="7" fill="#fff" stroke="#cfe6d5"/><text x="390" y="126" font-size="8.8" font-weight="600" fill="#2c5a3a">system.metadata.catalogs</text><text x="390" y="142" font-size="8" fill="#2f6f4f">所有已配 catalog</text>
  <rect x="376" y="158" width="288" height="42" rx="7" fill="#fff" stroke="#cfe6d5"/><text x="390" y="176" font-size="8.8" font-weight="600" fill="#2c5a3a">information_schema.tables/columns</text><text x="390" y="192" font-size="8" fill="#2f6f4f">标准 SQL 元数据视图(每 catalog 一份)</text>
  <rect x="376" y="208" width="288" height="42" rx="7" fill="#fff" stroke="#cfe6d5"/><text x="390" y="226" font-size="8.8" font-weight="600" fill="#2c5a3a">穿透到连接器</text><text x="390" y="242" font-size="8" fill="#2f6f4f">list 表/列仍实时问外部源</text>
  <text x="376" y="272" font-size="8.5" fill="#2f6f4f">SHOW TABLES / SHOW COLUMNS 也走这套</text>
  <text x="376" y="288" font-size="8.5" fill="#2f6f4f">(经 StatementRewrite 变成 SELECT)</text>

  <!-- jmx + others -->
  <rect x="690" y="72" width="320" height="230" rx="13" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="706" y="94" font-size="11" font-weight="700" fill="#5a3410">其它内省连接器</text>
  <rect x="706" y="108" width="288" height="42" rx="7" fill="#fdf6ea" stroke="#e8cf9a"/><text x="720" y="126" font-size="8.8" font-weight="600" fill="#5a3410">jmx 连接器</text><text x="720" y="142" font-size="8" fill="#93762e">JVM/组件 JMX 指标当表查</text>
  <rect x="706" y="158" width="288" height="42" rx="7" fill="#fdf6ea" stroke="#e8cf9a"/><text x="720" y="176" font-size="8.8" font-weight="600" fill="#5a3410">tpch / tpcds 连接器</text><text x="720" y="192" font-size="8" fill="#93762e">合成基准数据(无需外部源)</text>
  <rect x="706" y="208" width="288" height="42" rx="7" fill="#fdf6ea" stroke="#e8cf9a"/><text x="720" y="226" font-size="8.8" font-weight="600" fill="#5a3410">memory 连接器</text><text x="720" y="242" font-size="8" fill="#93762e">纯内存表(测试/临时)</text>
  <text x="706" y="272" font-size="8.5" fill="#93762e">它们都实现同一套连接器 SPI</text>
  <text x="706" y="288" font-size="8.5" fill="#93762e">→ 内省与查外部源无差别</text>

  <!-- takeaway -->
  <rect x="30" y="320" width="980" height="140" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="342" font-size="11" font-weight="700" fill="#1d1d1f">"一切皆表"的一致性</text>
  <text x="46" y="364" font-size="9" fill="#6e6e73">· 运行时状态、元数据、JMX 指标、合成数据——全部以"表"暴露,用同一套 SQL 查,无特殊 API</text>
  <text x="46" y="382" font-size="9" fill="#6e6e73">· 诊断慢查询：SELECT ... FROM system.runtime.queries ORDER BY elapsed DESC —— 不用另学监控接口</text>
  <text x="46" y="400" font-size="9" fill="#6e6e73">· 编程式内省：BI/运维工具用标准 JDBC 查 information_schema/system,与查业务数据同一通道</text>
  <text x="46" y="418" font-size="9" fill="#6e6e73">· 这是连接器 SPI 抽象的红利：把"引擎自身状态"也建模成一个连接器,复用全部查询能力</text>
  <text x="46" y="440" font-size="8.5" fill="#b1483a">· 归属：这些是内置连接器,底层仍走【连接器框架】SPI;本篇强调其作为"元数据/自省入口"的角色</text>
</svg>
