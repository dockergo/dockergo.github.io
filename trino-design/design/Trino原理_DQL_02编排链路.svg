<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1120" height="640" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Trino 查询编排链路 · coordinator 内 SQL→分发</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">分析产出的是 Analysis 旁表（不改写 AST）；逻辑计划以 OutputNode 为根；优化是规则改写到定点</text>

  <!-- stage 1: parse -->
  <rect x="30" y="72" width="1060" height="118" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="94" font-size="11.5" font-weight="700" fill="#1b2a4a">① 解析（ANTLR4 · 两阶段预测）</text>
  <g font-size="9">
    <rect x="46" y="104" width="200" height="70" rx="9" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="146" y="126" text-anchor="middle" font-size="10" font-weight="600" fill="#274a78">SqlParser.createStatement</text><text x="146" y="144" text-anchor="middle" fill="#5b7db1">先 SLL 快速预测</text><text x="146" y="158" text-anchor="middle" fill="#5b7db1">失败回退 LL 重试</text>
    <rect x="270" y="104" width="200" height="70" rx="9" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="370" y="126" text-anchor="middle" font-size="10" font-weight="600" fill="#274a78">AstBuilder.visit</text><text x="370" y="144" text-anchor="middle" fill="#5b7db1">解析树 → Statement AST</text><text x="370" y="158" text-anchor="middle" fill="#5b7db1">io.trino.sql.tree.*</text>
    <rect x="494" y="104" width="240" height="70" rx="9" fill="#f7f7f9" stroke="#ececf1"/><text x="614" y="126" text-anchor="middle" font-size="10" font-weight="600" fill="#4b4b50">语法在独立模块</text><text x="614" y="144" text-anchor="middle" fill="#6e6e73">trino-grammar / SqlBase.g4</text><text x="614" y="158" text-anchor="middle" fill="#6e6e73">（483 中已从 trino-parser 拆出）</text>
    <rect x="758" y="104" width="316" height="70" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="916" y="126" text-anchor="middle" font-size="10" font-weight="600" fill="#1b2a4a">产物：Statement AST</text><text x="916" y="146" text-anchor="middle" fill="#5b7db1">纯语法树，未绑定任何库表/类型</text></g>

  <line x1="560" y1="190" x2="560" y2="206" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- stage 2: analyze -->
  <rect x="30" y="208" width="1060" height="132" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="230" font-size="11.5" font-weight="700" fill="#1b2a4a">② 分析（Analyzer · 产出 Analysis 旁表 + 访问控制）</text>
  <g font-size="9">
    <rect x="46" y="240" width="180" height="52" rx="9" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="136" y="260" text-anchor="middle" font-size="10" font-weight="600" fill="#274a78">StatementRewrite</text><text x="136" y="278" text-anchor="middle" fill="#5b7db1">展开视图/SHOW→SELECT/参数</text>
    <rect x="250" y="240" width="200" height="52" rx="9" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="350" y="260" text-anchor="middle" font-size="10" font-weight="600" fill="#274a78">StatementAnalyzer</text><text x="350" y="278" text-anchor="middle" fill="#5b7db1">递归下降建 Scope/Field</text>
    <rect x="474" y="240" width="200" height="52" rx="9" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="574" y="260" text-anchor="middle" font-size="10" font-weight="600" fill="#274a78">ExpressionAnalyzer</text><text x="574" y="278" text-anchor="middle" fill="#5b7db1">类型 + 函数解析</text>
    <rect x="698" y="240" width="180" height="52" rx="9" fill="#fff7e6" stroke="#e8cf9a"/><text x="788" y="260" text-anchor="middle" font-size="10" font-weight="600" fill="#5a3410">visitTable</text><text x="788" y="278" text-anchor="middle" fill="#93762e">元数据绑定→TableHandle</text>
    <rect x="902" y="240" width="172" height="52" rx="9" fill="#faf4fb" stroke="#e2d2ee"/><text x="988" y="260" text-anchor="middle" font-size="10" font-weight="600" fill="#5a3d78">访问控制</text><text x="988" y="278" text-anchor="middle" fill="#7a5a95">checkCanSelectFromColumns</text>
  </g>
  <rect x="46" y="300" width="1028" height="30" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="60" y="320" font-size="9.5" fill="#1b2a4a">产物：Analysis（可变旁表，收集 types/coercions/resolvedFunctions/scopes）——planner 从它读取，<tspan font-weight="700">AST 不被改写</tspan></text>

  <line x1="560" y1="340" x2="560" y2="356" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- stage 3: plan+optimize+fragment -->
  <rect x="30" y="358" width="1060" height="182" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="380" font-size="11.5" font-weight="700" fill="#2c5a3a">③ 规划 → 优化 → 分布式化</text>
  <g font-size="9">
    <rect x="46" y="392" width="240" height="66" rx="9" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="166" y="413" text-anchor="middle" font-size="10" font-weight="600" fill="#274a78">LogicalPlanner.plan</text><text x="166" y="431" text-anchor="middle" fill="#5b7db1">RelationPlanner + QueryPlanner</text><text x="166" y="447" text-anchor="middle" fill="#5b7db1">→ OutputNode 根 PlanNode 树</text>
    <rect x="310" y="392" width="240" height="66" rx="9" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="430" y="413" text-anchor="middle" font-size="10" font-weight="600" fill="#274a78">PlanOptimizers（数十批次）</text><text x="430" y="431" text-anchor="middle" fill="#5b7db1">IterativeOptimizer 规则改写到定点</text><text x="430" y="447" text-anchor="middle" fill="#5b7db1">+ Join 顺序/分布局部 CBO</text>
    <rect x="574" y="392" width="240" height="66" rx="9" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="694" y="413" text-anchor="middle" font-size="10" font-weight="600" fill="#12402a">PlanFragmenter</text><text x="694" y="431" text-anchor="middle" fill="#2f6f4f">在 REMOTE exchange 处剪断</text><text x="694" y="447" text-anchor="middle" fill="#2f6f4f">→ SubPlan(fragment 树)</text>
    <rect x="838" y="392" width="236" height="66" rx="9" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="956" y="413" text-anchor="middle" font-size="10" font-weight="600" fill="#12402a">selectScheduler</text><text x="956" y="431" text-anchor="middle" fill="#2f6f4f">按 RetryPolicy：</text><text x="956" y="447" text-anchor="middle" fill="#2f6f4f">Pipelined / EventDriven FTE</text>
  </g>
  <line x1="286" y1="425" x2="310" y2="425" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="550" y1="425" x2="574" y2="425" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="814" y1="425" x2="838" y2="425" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <rect x="46" y="500" width="1028" height="30" rx="8" fill="#f7f7f9" stroke="#ececf1"/><text x="60" y="520" font-size="9.5" fill="#4b4b50">子句成节点顺序：FROM → WHERE(FilterNode) → 聚合(AggregationNode) → HAVING → 窗口(WindowNode) → 投影(ProjectNode) → DISTINCT → ORDER BY/LIMIT</text>
</svg>
