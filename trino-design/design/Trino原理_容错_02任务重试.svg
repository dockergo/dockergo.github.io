<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="540" viewBox="0 0 1040 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1040" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Trino 任务级重试 · 每分区独立重试 + 内存感知增长</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">EventDrivenFaultTolerantQueryScheduler:每 StagePartition 有独立 attempt 预算</text>

  <!-- retry decision flow -->
  <rect x="30" y="72" width="980" height="210" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="94" font-size="11" font-weight="700" fill="#1b2a4a">task 失败时的重试决策（StageExecution.taskFailed）</text>
  <g font-size="8.8" text-anchor="middle">
    <rect x="46" y="108" width="200" height="50" rx="9" fill="#ffecec" stroke="#e0a0a0"/><text x="146" y="128" font-weight="600" fill="#b1483a">task 失败</text><text x="146" y="146" fill="#b1483a">partition.taskFailed</text>
    <rect x="286" y="108" width="240" height="50" rx="9" fill="#fff7e6" stroke="#e8cf9a"/><text x="406" y="128" font-weight="600" fill="#5a3410">remainingAttempts-- 后判断</text><text x="406" y="146" fill="#93762e">==0 或 USER_ERROR 或 fatal?</text>
    <rect x="566" y="96" width="200" height="36" rx="9" fill="#fff" stroke="#bcd0ec"/><text x="666" y="118" fill="#b1483a">是 → stage.fail(放弃)</text>
    <rect x="566" y="140" width="200" height="36" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="666" y="162" fill="#12402a">否 → 重发 ScheduledTask</text>
    <rect x="806" y="108" width="204" height="50" rx="9" fill="#f5faf6" stroke="#cfe6d5"/><text x="908" y="128" font-weight="600" fill="#2c5a3a">重试同 partition</text><text x="908" y="146" fill="#2f6f4f">attempt = maxAttempts − remaining</text>
  </g>
  <line x1="246" y1="133" x2="286" y2="133" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="526" y1="120" x2="566" y2="114" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="526" y1="146" x2="566" y2="158" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="766" y1="158" x2="806" y2="140" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>

  <rect x="46" y="172" width="964" height="46" rx="9" fill="#fff" stroke="#bcd0ec"/><text x="60" y="192" font-size="8.8" font-weight="600" fill="#1b2a4a">StagePartition：remainingAttempts 初始 = task-retry-attempts-per-task + 1（默认 5，上限 126+1）</text><text x="60" y="208" font-size="8.5" fill="#5b7db1">每 partition 独立计数;speculative(未 sealed)partition 不重试</text>
  <rect x="46" y="228" width="964" height="44" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="60" y="248" font-size="8.8" font-weight="600" fill="#12402a">每 attempt 新 sink 实例：exchange.instantiateSink(handle, attempt)</text><text x="60" y="264" font-size="8.5" fill="#2f6f4f">按 attempt 键控 → 重试产生的多份输出,只有最终 committed 的被下游读(去重)</text>

  <!-- memory-aware retry -->
  <rect x="30" y="300" width="490" height="140" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="322" font-size="11" font-weight="700" fill="#2c5a3a">内存感知重试（OOM 专治）</text>
  <text x="46" y="344" font-size="9" fill="#2f6f4f">· OOM 失败时 getNextRetryMemoryRequirements 给更大内存估计</text>
  <text x="46" y="362" font-size="9" fill="#2f6f4f">· ExponentialGrowthPartitionMemoryEstimator：指数增长</text>
  <text x="46" y="380" font-size="9" fill="#2f6f4f">· BinPackingNodeAllocatorService：按新内存需求选节点</text>
  <text x="46" y="398" font-size="9" fill="#2f6f4f">· 若已到最大内存仍 OOM 且不能再涨 → 硬失败</text>
  <text x="46" y="420" font-size="8.5" fill="#93762e">意义：大 task 首次可能低估内存,重试时"长记性"给更多,避免反复 OOM</text>

  <!-- adaptive -->
  <rect x="540" y="300" width="470" height="140" rx="13" fill="#faf4fb" stroke="#e2d2ee"/>
  <text x="556" y="322" font-size="11" font-weight="700" fill="#5a3d78">FTE 附带的运行期自适应</text>
  <text x="556" y="344" font-size="9" fill="#7a5a95">· AdaptivePlanner：用 stage 间实际输出统计再优化(仅 FTE)</text>
  <text x="556" y="362" font-size="9" fill="#7a5a95">· AdaptivePartitioning：运行期调分区数,治数据倾斜</text>
  <text x="556" y="380" font-size="9" fill="#7a5a95">· AdaptiveReorderPartitionedJoin：按运行时统计翻转 Join 构建/探测</text>
  <text x="556" y="398" font-size="9" fill="#7a5a95">· 靠 RuntimeInfoProvider 提供实际 exchange 输出统计</text>
  <text x="556" y="420" font-size="8.5" fill="#b1483a">仅 FTE 路径存在,非通用查询优化(见 DQL 优化器篇)</text>

  <rect x="30" y="452" width="980" height="60" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="474" font-size="10" font-weight="700" fill="#1d1d1f">支撑组件（faulttolerant/ 子包）</text>
  <text x="46" y="494" font-size="8.8" fill="#6e6e73">EventDrivenTaskSource(产 task 描述) · ArbitraryDistribution/HashDistributionSplitAssigner(分 split 到分区) · BinPackingNodeAllocatorService(内存感知节点分配)</text>
</svg>
