<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="1120" height="640" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Trino 依赖矩阵 · 接触面主线 × 支撑能力域</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">● 强依赖　◐ 部分依赖　○ 弱/间接。三角一致性仲裁表：每条主线声称的依赖须在此与被依赖主线正文对齐</text>

  <!-- column headers (8 support domains) -->
  <g font-size="8.5" text-anchor="middle" fill="#4b4b50">
    <text x="330" y="88" font-weight="600">连接器</text><text x="330" y="99">框架 SPI</text>
    <text x="418" y="88" font-weight="600">元数据</text><text x="418" y="99">Catalog</text>
    <text x="506" y="88" font-weight="600">规划</text><text x="506" y="99">优化</text>
    <text x="594" y="88" font-weight="600">分布式</text><text x="594" y="99">执行</text>
    <text x="682" y="88" font-weight="600">调度</text><text x="682" y="99">资源</text>
    <text x="770" y="88" font-weight="600">内存</text><text x="770" y="99">管理</text>
    <text x="858" y="88" font-weight="600">容错</text><text x="858" y="99">执行</text>
    <text x="946" y="88" font-weight="600">安全</text><text x="946" y="99">DCL</text>
  </g>

  <!-- grid -->
  <g>
    <!-- row backgrounds -->
    <rect x="40" y="112" width="1040" height="72" rx="8" fill="#f4eefb" stroke="#e2d2ee"/>
    <rect x="40" y="192" width="1040" height="72" rx="8" fill="#eef3fb" stroke="#bcd0ec"/>
    <rect x="40" y="272" width="1040" height="72" rx="8" fill="#f5faf6" stroke="#cfe6d5"/>
    <rect x="40" y="352" width="1040" height="72" rx="8" fill="#faf4fb" stroke="#e2d2ee"/>
  </g>

  <!-- row labels -->
  <g font-size="10" font-weight="700">
    <text x="56" y="144" fill="#3d2a5a">DQL 数据查询</text><text x="56" y="160" font-size="8" font-weight="400" fill="#7a5a95">主接触面</text>
    <text x="56" y="224" fill="#1b2a4a">DDL 数据定义</text><text x="56" y="240" font-size="8" font-weight="400" fill="#5b7db1">多下推连接器</text>
    <text x="56" y="304" fill="#2c5a3a">DML 数据写入</text><text x="56" y="320" font-size="8" font-weight="400" fill="#2f6f4f">多下推连接器</text>
    <text x="56" y="384" fill="#5a3d78">DCL 数据控制</text><text x="56" y="400" font-size="8" font-weight="400" fill="#7a5a95">贯穿</text>
  </g>

  <!-- cells: columns x = 330,418,506,594,682,770,858,946 ; rows y = 148,228,308,388 -->
  <g font-size="14" text-anchor="middle" font-weight="700">
    <!-- DQL row -->
    <text x="330" y="153" fill="#12402a">●</text><text x="418" y="153" fill="#12402a">●</text><text x="506" y="153" fill="#12402a">●</text><text x="594" y="153" fill="#12402a">●</text><text x="682" y="153" fill="#12402a">●</text><text x="770" y="153" fill="#12402a">●</text><text x="858" y="153" fill="#93762e">◐</text><text x="946" y="153" fill="#93762e">◐</text>
    <!-- DDL row -->
    <text x="330" y="233" fill="#12402a">●</text><text x="418" y="233" fill="#12402a">●</text><text x="506" y="233" fill="#a1a1a6">○</text><text x="594" y="233" fill="#a1a1a6">○</text><text x="682" y="233" fill="#93762e">◐</text><text x="770" y="233" fill="#a1a1a6">○</text><text x="858" y="233" fill="#a1a1a6">○</text><text x="946" y="233" fill="#12402a">●</text>
    <!-- DML row -->
    <text x="330" y="313" fill="#12402a">●</text><text x="418" y="313" fill="#12402a">●</text><text x="506" y="313" fill="#93762e">◐</text><text x="594" y="313" fill="#12402a">●</text><text x="682" y="313" fill="#93762e">◐</text><text x="770" y="313" fill="#93762e">◐</text><text x="858" y="313" fill="#93762e">◐</text><text x="946" y="313" fill="#12402a">●</text>
    <!-- DCL row -->
    <text x="330" y="393" fill="#93762e">◐</text><text x="418" y="393" fill="#12402a">●</text><text x="506" y="393" fill="#a1a1a6">○</text><text x="594" y="393" fill="#a1a1a6">○</text><text x="682" y="393" fill="#93762e">◐</text><text x="770" y="393" fill="#a1a1a6">○</text><text x="858" y="393" fill="#a1a1a6">○</text><text x="946" y="393" fill="#12402a">●</text>
  </g>

  <!-- reading notes -->
  <rect x="40" y="444" width="1040" height="176" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="56" y="466" font-size="11" font-weight="700" fill="#1d1d1f">读法与关键三角</text>
  <text x="56" y="488" font-size="9" fill="#6e6e73">· DQL 强依赖全部计算/底座/保障域：连接器拿数据、规划优化定计划、分布式执行跑、调度分 task、内存保底——这是主战场</text>
  <text x="56" y="506" font-size="9" fill="#6e6e73">· DDL/DML 是"薄接触面"：语句解析在 coordinator,真正的建表/写入多经 ConnectorMetadata / ConnectorPageSink 下推给连接器</text>
  <text x="56" y="524" font-size="9" fill="#6e6e73">· 元数据与 Catalog 被四条主线全依赖(●)：任何语句都要先经 CatalogManager/MetadataManager 解析库表——它是最底座</text>
  <text x="56" y="542" font-size="9" fill="#6e6e73">· 安全(DCL 能力域)横切：DQL/DDL/DML 都要过 AccessControl 鉴权(读=◐ 因为多为过滤类,写/定义=● 强校验)</text>
  <text x="56" y="560" font-size="9" fill="#6e6e73">· 容错执行对 DQL=◐：仅 TASK 策略时深度介入(spooling exchange + task 重试);默认 NONE 时几乎不参与</text>
  <text x="56" y="582" font-size="9" fill="#b1483a">· 归属仲裁：改任一主线的"定位"依赖声明,必须回此矩阵核对,并与被依赖主线正文一致(三角一致性铁律)</text>
  <text x="56" y="604" font-size="9" fill="#6e6e73">· 与存算一体引擎差异：无"存储引擎/事务/后台任务"列——数据不归 Trino 管,这三类退化成连接器职责或不存在</text>
</svg>
