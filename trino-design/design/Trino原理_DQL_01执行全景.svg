<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="800" viewBox="0 0 1160 800" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1160" height="800" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Trino 查询执行全景 · 一条 SELECT 从文本到结果</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">示例：SELECT c.name, sum(o.price) FROM orders o JOIN customer c ON o.cust=c.id WHERE o.day='2026-07-01' GROUP BY c.name</text>

  <!-- coordinator band -->
  <rect x="24" y="66" width="1112" height="286" rx="16" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="42" y="90" font-size="12.5" font-weight="700" fill="#274a78">① Coordinator 编排（前台单脑 · 全部规划在此）</text>

  <g font-size="9">
    <rect x="42" y="104" width="150" height="70" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="117" y="126" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1b2a4a">解析</text><text x="117" y="144" text-anchor="middle" fill="#5b7db1">SqlParser</text><text x="117" y="158" text-anchor="middle" fill="#5b7db1">文本→Statement AST</text>
    <rect x="206" y="104" width="150" height="70" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="281" y="126" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1b2a4a">分析</text><text x="281" y="144" text-anchor="middle" fill="#5b7db1">StatementAnalyzer</text><text x="281" y="158" text-anchor="middle" fill="#5b7db1">→ Analysis 旁表</text>
    <rect x="370" y="104" width="150" height="70" rx="10" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="445" y="126" text-anchor="middle" font-size="10.5" font-weight="700" fill="#274a78">逻辑计划</text><text x="445" y="144" text-anchor="middle" fill="#5b7db1">LogicalPlanner</text><text x="445" y="158" text-anchor="middle" fill="#5b7db1">OutputNode 根 PlanNode 树</text>
    <rect x="534" y="104" width="150" height="70" rx="10" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="609" y="126" text-anchor="middle" font-size="10.5" font-weight="700" fill="#274a78">优化</text><text x="609" y="144" text-anchor="middle" fill="#5b7db1">PlanOptimizers</text><text x="609" y="158" text-anchor="middle" fill="#5b7db1">规则改写+局部 CBO</text>
    <rect x="698" y="104" width="150" height="70" rx="10" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="773" y="126" text-anchor="middle" font-size="10.5" font-weight="700" fill="#12402a">分布式化</text><text x="773" y="144" text-anchor="middle" fill="#2f6f4f">PlanFragmenter</text><text x="773" y="158" text-anchor="middle" fill="#2f6f4f">切成 SubPlan(fragment 树)</text>
    <rect x="862" y="104" width="150" height="70" rx="10" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="937" y="126" text-anchor="middle" font-size="10.5" font-weight="700" fill="#12402a">调度分发</text><text x="937" y="144" text-anchor="middle" fill="#2f6f4f">按 RetryPolicy 选调度器</text><text x="937" y="158" text-anchor="middle" fill="#2f6f4f">Pipelined / FTE</text>
  </g>
  <line x1="192" y1="139" x2="206" y2="139" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="356" y1="139" x2="370" y2="139" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="520" y1="139" x2="534" y2="139" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="684" y1="139" x2="698" y2="139" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="848" y1="139" x2="862" y2="139" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- fragment tree illustration -->
  <text x="42" y="200" font-size="10.5" font-weight="700" fill="#274a78">切出的 fragment 树（示例）</text>
  <g font-size="8.5" text-anchor="middle">
    <rect x="470" y="210" width="220" height="34" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="580" y="231" fill="#1b2a4a">Fragment 0 · Output+最终聚合（SINGLE）</text>
    <rect x="300" y="264" width="230" height="34" rx="8" fill="#f5faf6" stroke="#cfe6d5"/><text x="415" y="285" fill="#2c5a3a">Fragment 1 · Join+部分聚合（FIXED_HASH）</text>
    <rect x="630" y="264" width="230" height="34" rx="8" fill="#f5faf6" stroke="#cfe6d5"/><text x="745" y="285" fill="#2c5a3a">Fragment 2 · 构建侧 scan customer</text>
    <rect x="300" y="312" width="230" height="30" rx="8" fill="#fff7e6" stroke="#e8cf9a"/><text x="415" y="331" fill="#5a3410">Fragment 3 · scan orders（SOURCE）</text>
  </g>
  <line x1="530" y1="244" x2="440" y2="264" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="630" y1="244" x2="720" y2="264" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="415" y1="298" x2="415" y2="312" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="700" y="330" font-size="8.5" fill="#a1a1a6">RemoteSourceNode = fragment 剪点（REMOTE exchange）</text>

  <!-- worker band -->
  <rect x="24" y="366" width="1112" height="330" rx="16" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="42" y="390" font-size="12.5" font-weight="700" fill="#12402a">② Worker 执行（并行多机 · 每 fragment → 1 stage → N task）</text>

  <!-- stage->task->pipeline->driver->operator nesting -->
  <rect x="42" y="404" width="1078" height="128" rx="12" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="58" y="424" font-size="10.5" font-weight="700" fill="#2c5a3a">Stage（=fragment）→ fan-out 成多个 Task（分布到 worker 节点）</text>
  <g font-size="8.5" text-anchor="middle">
    <rect x="58" y="434" width="300" height="88" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
    <text x="208" y="452" font-size="9.5" font-weight="700" fill="#1b2a4a">Task（worker A）= 一个 fragment 实例</text>
    <rect x="72" y="460" width="272" height="26" rx="6" fill="#f3f7fc" stroke="#cfe0f2"/><text x="208" y="477" fill="#274a78">Pipeline = DriverFactory（一串 OperatorFactory）</text>
    <rect x="72" y="490" width="130" height="26" rx="6" fill="#eafaf1" stroke="#bfe0cd"/><text x="137" y="507" fill="#12402a">Driver 1（并行）</text>
    <rect x="214" y="490" width="130" height="26" rx="6" fill="#eafaf1" stroke="#bfe0cd"/><text x="279" y="507" fill="#12402a">Driver 2 … 一 split 一 driver</text>
    <rect x="374" y="434" width="300" height="88" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
    <text x="524" y="452" font-size="9.5" font-weight="700" fill="#1b2a4a">Task（worker B）</text>
    <rect x="388" y="460" width="272" height="26" rx="6" fill="#f3f7fc" stroke="#cfe0f2"/><text x="524" y="477" fill="#274a78">Operator 链：Scan→Filter→Project→Join→Agg</text>
    <rect x="388" y="490" width="272" height="26" rx="6" fill="#fff7e6" stroke="#e8cf9a"/><text x="524" y="507" fill="#5a3410">叶子 Operator：连接器 PageSource 读外部源</text>
    <rect x="690" y="434" width="414" height="88" rx="10" fill="#f3f7fc" stroke="#cfe0f2"/>
    <text x="897" y="452" font-size="9.5" font-weight="700" fill="#274a78">Exchange 数据交换（stage 间）</text>
    <text x="897" y="472" font-size="8.5" fill="#5b7db1">REPARTITION(hash) / REPLICATE(广播) / GATHER(汇聚)</text>
    <text x="897" y="490" font-size="8.5" fill="#5b7db1">流式：HTTP 直连拉 Page ┃ FTE：spooling 暂存</text>
    <text x="897" y="508" font-size="8.5" fill="#5b7db1">数据以列式 Page（~1MB 批）在算子/stage 间流动</text>
  </g>

  <!-- data flow arrows -->
  <text x="42" y="556" font-size="10.5" font-weight="700" fill="#12402a">数据流（自底向上汇聚）</text>
  <g font-size="8.8" text-anchor="middle">
    <rect x="58" y="566" width="240" height="40" rx="9" fill="#fff7e6" stroke="#e8cf9a"/><text x="178" y="583" font-weight="600" fill="#5a3410">scan orders / customer</text><text x="178" y="598" fill="#93762e">连接器读外部源 → Page</text>
    <rect x="330" y="566" width="240" height="40" rx="9" fill="#f5faf6" stroke="#cfe6d5"/><text x="450" y="583" font-weight="600" fill="#2c5a3a">Join + 部分聚合</text><text x="450" y="598" fill="#2f6f4f">按 cust/name 重分区(REPARTITION)</text>
    <rect x="602" y="566" width="240" height="40" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="722" y="583" font-weight="600" fill="#1b2a4a">最终聚合 sum(price)</text><text x="722" y="598" fill="#5b7db1">GATHER 汇聚到单点</text>
    <rect x="874" y="566" width="230" height="40" rx="9" fill="#faf4fb" stroke="#e2d2ee"/><text x="989" y="583" font-weight="600" fill="#5a3d78">Output → 客户端</text><text x="989" y="598" fill="#7a5a95">HTTP 分页返回结果</text>
  </g>
  <line x1="298" y1="586" x2="330" y2="586" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="570" y1="586" x2="602" y2="586" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="842" y1="586" x2="874" y2="586" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- takeaway -->
  <rect x="42" y="622" width="1062" height="60" rx="11" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="58" y="644" font-size="10.5" font-weight="700" fill="#1d1d1f">六级层次：Query → Stage(=fragment) → Task(分布到节点) → Split(数据分片) → Driver(算子链实例) → Operator(处理 Page)</text>
  <text x="58" y="666" font-size="9.5" fill="#6e6e73">全程资源随查询生灭；coordinator 只规划不处理 split 数据；worker 无状态、数据始终来自外部连接器。</text>

  <line x1="580" y1="352" x2="580" y2="366" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="590" y="362" font-size="8.5" fill="#4c8567">分发 fragment → stage</text>
</svg>
