<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="500" viewBox="0 0 1040 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1040" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Trino 集群协调 · discovery + 心跳,无 Raft/共识</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">无持久元数据 → 无需分布式共识;协调只剩发现、存活视图、catalog 分发</text>

  <!-- topology -->
  <rect x="30" y="72" width="600" height="240" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="46" y="94" font-size="11" font-weight="700" fill="#274a78">协调拓扑</text>
  <rect x="180" y="108" width="290" height="60" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="325" y="130" text-anchor="middle" font-size="10" font-weight="700" fill="#1b2a4a">Coordinator（单脑）</text><text x="325" y="148" text-anchor="middle" font-size="8.5" fill="#5b7db1">内嵌 Discovery 服务 + NodeScheduler</text><text x="325" y="162" text-anchor="middle" font-size="8" fill="#5b7db1">规划/调度都在此</text>
  <rect x="60" y="220" width="150" height="60" rx="9" fill="#f5faf6" stroke="#cfe6d5"/><text x="135" y="242" text-anchor="middle" font-size="9" font-weight="600" fill="#2c5a3a">Worker 1</text><text x="135" y="260" text-anchor="middle" font-size="8" fill="#2f6f4f">启动注册</text><text x="135" y="274" text-anchor="middle" font-size="8" fill="#2f6f4f">周期心跳</text>
  <rect x="250" y="220" width="150" height="60" rx="9" fill="#f5faf6" stroke="#cfe6d5"/><text x="325" y="242" text-anchor="middle" font-size="9" font-weight="600" fill="#2c5a3a">Worker 2</text><text x="325" y="260" text-anchor="middle" font-size="8" fill="#2f6f4f">无状态</text><text x="325" y="274" text-anchor="middle" font-size="8" fill="#2f6f4f">对等</text>
  <rect x="440" y="220" width="150" height="60" rx="9" fill="#f5faf6" stroke="#cfe6d5"/><text x="515" y="242" text-anchor="middle" font-size="9" font-weight="600" fill="#2c5a3a">Worker N</text><text x="515" y="260" text-anchor="middle" font-size="8" fill="#2f6f4f">加机器即扩</text>
  <line x1="135" y1="220" x2="280" y2="168" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="325" y1="220" x2="325" y2="168" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="515" y1="220" x2="370" y2="168" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="200" y="200" font-size="7.5" fill="#a1a1a6">注册/心跳 → discovery.uri</text>

  <!-- coordination items -->
  <rect x="650" y="72" width="360" height="240" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="666" y="94" font-size="11" font-weight="700" fill="#1b2a4a">协调的全部内容（很轻）</text>
  <rect x="666" y="108" width="328" height="56" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="680" y="128" font-size="9" font-weight="600" fill="#274a78">① Discovery（内嵌 coordinator）</text><text x="680" y="146" font-size="8.5" fill="#5b7db1">worker 启动向 discovery.uri 注册</text><text x="680" y="159" font-size="8" fill="#5b7db1">无独立 ZK/etcd</text>
  <rect x="666" y="172" width="328" height="56" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="680" y="192" font-size="9" font-weight="600" fill="#274a78">② 心跳存活视图</text><text x="680" y="210" font-size="8.5" fill="#5b7db1">NodeMap 缓存 ACTIVE 节点(默认 5s 过期)</text><text x="680" y="223" font-size="8" fill="#5b7db1">NodeScheduler 据此选可用节点</text>
  <rect x="666" y="236" width="328" height="56" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="680" y="256" font-size="9" font-weight="600" fill="#274a78">③ catalog 分发</text><text x="680" y="274" font-size="8.5" fill="#5b7db1">静态：各节点读同样 etc/catalog/</text><text x="680" y="287" font-size="8" fill="#5b7db1">动态 catalog：经协议同步</text>

  <!-- why no consensus -->
  <rect x="30" y="332" width="980" height="150" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="354" font-size="11" font-weight="700" fill="#1d1d1f">为什么不需要 Raft/Paxos/ZooKeeper</text>
  <text x="46" y="376" font-size="9" fill="#6e6e73">· 分布式共识是为了"多副本一致地持久化状态"——而 Trino 没有要持久化的元数据/数据,自然无此需求</text>
  <text x="46" y="394" font-size="9" fill="#6e6e73">· coordinator 单脑规划：不存在"多个 leader 竞争"——规划/调度都在唯一 coordinator,worker 只执行</text>
  <text x="46" y="412" font-size="9" fill="#6e6e73">· HA 靠备用 coordinator 接管(冷/热备),不是共识选主;worker 挂了靠 FTE 重试(见容错执行篇),不影响元数据</text>
  <text x="46" y="430" font-size="9" fill="#6e6e73">· 对比：ClickHouse 对等节点需 Keeper(Raft) 协调复制;Doris FE 需 BDB-JE 多数派——因为它们要一致地存自己的数据/元数据</text>
  <text x="46" y="452" font-size="9" fill="#b1483a">· 这是 coordinator-worker + 无自有存储的自然结果:轻协调是"无状态计算层"的红利</text>
  <text x="46" y="472" font-size="8.5" fill="#6e6e73">· 归属:节点存活视图(NodeMap)被【调度与资源】的 NodeScheduler 消费;本篇管"如何维护这个视图 + 集群协调的边界"</text>
</svg>
