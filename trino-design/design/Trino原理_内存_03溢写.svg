<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="540" viewBox="0 0 1040 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1040" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Trino 溢写 · revocable 内存落盘（内存装不下也能算完）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">可溢写算子用 revocable 内存;框架征用时落盘再归并;受 SpillSpaceTracker 磁盘配额</text>

  <!-- flow -->
  <g font-size="8.8" text-anchor="middle">
    <rect x="30" y="76" width="220" height="80" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="140" y="98" font-size="9.5" font-weight="700" fill="#12402a">① 算子申请 revocable</text><text x="140" y="118" fill="#2f6f4f">localRevocableMemoryContext</text><text x="140" y="134" fill="#2f6f4f">聚合/Join构建/排序/窗口</text><text x="140" y="150" fill="#2f6f4f">数据先在内存累积</text>
    <rect x="280" y="76" width="220" height="80" rx="10" fill="#fff7e6" stroke="#e8cf9a"/><text x="390" y="98" font-size="9.5" font-weight="700" fill="#5a3410">② 内存压力 → 征用</text><text x="390" y="118" fill="#93762e">框架调 startMemoryRevoke()</text><text x="390" y="134" fill="#93762e">算子把 revocable 数据</text><text x="390" y="150" fill="#93762e">交给 Spiller 落盘</text>
    <rect x="530" y="76" width="220" height="80" rx="10" fill="#f3f7fc" stroke="#cfe0f2"/><text x="640" y="98" font-size="9.5" font-weight="700" fill="#274a78">③ Spiller 写盘</text><text x="640" y="118" fill="#5b7db1">GenericSpiller</text><text x="640" y="134" fill="#5b7db1">→ FileSingleStreamSpiller</text><text x="640" y="150" fill="#5b7db1">写 spill-path 临时文件</text>
    <rect x="780" y="76" width="230" height="80" rx="10" fill="#f5faf6" stroke="#cfe6d5"/><text x="895" y="98" font-size="9.5" font-weight="700" fill="#2c5a3a">④ 回读归并</text><text x="895" y="118" fill="#2f6f4f">收尾时读回 spilled pages</text><text x="895" y="134" fill="#2f6f4f">与内存中数据归并</text><text x="895" y="150" fill="#2f6f4f">保留部分转记 user 内存</text>
  </g>
  <line x1="250" y1="116" x2="280" y2="116" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="500" y1="116" x2="530" y2="116" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="750" y1="116" x2="780" y2="116" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- which operators -->
  <rect x="30" y="176" width="490" height="180" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="198" font-size="11" font-weight="700" fill="#1b2a4a">哪些算子溢写</text>
  <rect x="50" y="212" width="450" height="30" rx="7" fill="#fff" stroke="#bcd0ec"/><text x="64" y="231" font-size="8.8" fill="#1b2a4a">HashAggregation → SpillableHashAggregationBuilder（溢写分区再归并）</text>
  <rect x="50" y="248" width="450" height="30" rx="7" fill="#fff" stroke="#bcd0ec"/><text x="64" y="267" font-size="8.8" fill="#1b2a4a">Join 构建 → HashBuilderOperator（8 态含 SPILLING/UNSPILLING）</text>
  <rect x="50" y="284" width="450" height="30" rx="7" fill="#fff" stroke="#bcd0ec"/><text x="64" y="303" font-size="8.8" fill="#1b2a4a">Join 探测 → LookupJoin（对应分区溢写,PartitioningSpiller）</text>
  <rect x="50" y="320" width="450" height="30" rx="7" fill="#fff" stroke="#bcd0ec"/><text x="64" y="339" font-size="8.8" fill="#1b2a4a">OrderBy（全排序）· Window —— 均可溢写</text>

  <!-- spill infra -->
  <rect x="540" y="176" width="470" height="180" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="556" y="198" font-size="11" font-weight="700" fill="#2c5a3a">溢写基础设施</text>
  <text x="556" y="220" font-size="8.8" fill="#2f6f4f">· Spiller / SingleStreamSpiller：spill(Iterator&lt;Page&gt;) → getSpills 回读</text>
  <text x="556" y="238" font-size="8.8" fill="#2f6f4f">· FileSingleStreamSpiller：写序列化 Page 到临时文件</text>
  <text x="556" y="256" font-size="8.8" fill="#2f6f4f">  可压缩 + 可 AES 加密;spill 缓冲占 LocalMemoryContext</text>
  <text x="556" y="274" font-size="8.8" fill="#2f6f4f">· FileSingleStreamSpillerFactory：多 spill-path 轮转</text>
  <text x="556" y="292" font-size="8.8" fill="#2f6f4f">· SpillSpaceTracker：节点级磁盘配额</text>
  <text x="556" y="310" font-size="8.8" fill="#b1483a">  reserve 超 maxBytes → OUT_OF_SPILL_SPACE</text>
  <text x="556" y="330" font-size="8.5" fill="#6e6e73">· PartitioningSpiller：hash join 的分区感知溢写</text>
  <text x="556" y="348" font-size="8.5" fill="#6e6e73">· spill 空间在 QueryContext 单独记账(reserveSpill)</text>

  <!-- notes -->
  <rect x="30" y="372" width="980" height="140" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="394" font-size="11" font-weight="700" fill="#1d1d1f">要点</text>
  <text x="46" y="416" font-size="9" fill="#6e6e73">· 为什么用 revocable：这类内存"可被征用"——框架能在压力大时命令算子交出它去溢写,不像 user 内存那样刚性</text>
  <text x="46" y="434" font-size="9" fill="#6e6e73">· 溢写 = 用磁盘 IO 换"能算完":内存装不下的大聚合/大 Join/大排序仍能完成,只是慢</text>
  <text x="46" y="452" font-size="9" fill="#6e6e73">· 输出转 user：溢写数据回读归并后,最终保留在内存的结果转记为 user 内存(不能再被征用)</text>
  <text x="46" y="470" font-size="9" fill="#6e6e73">· 开关：spill-enabled + spiller-spill-path(建议多块盘轮转);不开则内存不足直接失败</text>
  <text x="46" y="492" font-size="9" fill="#b1483a">· 归属：溢写"触发/状态机"在【执行引擎】算子;本篇管 Spiller/SpillSpaceTracker/spill 记账。别把两者混述</text>
</svg>
