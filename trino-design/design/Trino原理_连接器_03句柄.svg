<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1040" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Trino 句柄不透明模型 · 引擎持有,连接器解释</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">TableHandle/ColumnHandle/ConnectorSplit 是连接器私有对象;引擎只传递不解析——这是解耦的关键</text>

  <!-- engine view -->
  <rect x="30" y="72" width="470" height="240" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="94" font-size="11" font-weight="700" fill="#1b2a4a">引擎看到的（不透明句柄）</text>
  <rect x="50" y="108" width="200" height="50" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/><text x="150" y="128" text-anchor="middle" font-size="9.5" font-weight="600" fill="#274a78">ConnectorTableHandle</text><text x="150" y="145" text-anchor="middle" font-size="8" fill="#5b7db1">"某张表" — 内部结构未知</text>
  <rect x="270" y="108" width="210" height="50" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/><text x="375" y="128" text-anchor="middle" font-size="9.5" font-weight="600" fill="#274a78">ColumnHandle</text><text x="375" y="145" text-anchor="middle" font-size="8" fill="#5b7db1">"某一列" — 内部结构未知</text>
  <rect x="50" y="168" width="200" height="50" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/><text x="150" y="188" text-anchor="middle" font-size="9.5" font-weight="600" fill="#274a78">ConnectorSplit</text><text x="150" y="205" text-anchor="middle" font-size="8" fill="#5b7db1">"一段数据" — 内部结构未知</text>
  <rect x="270" y="168" width="210" height="50" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/><text x="375" y="188" text-anchor="middle" font-size="9.5" font-weight="600" fill="#274a78">ConnectorTransactionHandle</text><text x="375" y="205" text-anchor="middle" font-size="8" fill="#5b7db1">"一个事务" — 内部结构未知</text>
  <rect x="50" y="230" width="430" height="66" rx="9" fill="#fff" stroke="#bcd0ec"/>
  <text x="64" y="250" font-size="9" font-weight="600" fill="#1b2a4a">引擎能做的：</text>
  <text x="64" y="268" font-size="8.5" fill="#5b7db1">· 持有、在计划/task/split 间传递这些句柄</text>
  <text x="64" y="284" font-size="8.5" fill="#5b7db1">· 调 SPI 方法时把句柄传回连接器,由连接器解释</text>

  <!-- connector view -->
  <rect x="540" y="72" width="470" height="240" rx="13" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="556" y="94" font-size="11" font-weight="700" fill="#5a3410">连接器内部（真实结构 · 举例 Hive）</text>
  <rect x="560" y="108" width="200" height="50" rx="9" fill="#fdf6ea" stroke="#e8cf9a"/><text x="660" y="128" text-anchor="middle" font-size="9.5" font-weight="600" fill="#5a3410">HiveTableHandle</text><text x="660" y="145" text-anchor="middle" font-size="8" fill="#93762e">schema.table + 分区谓词 + 已下推 filter</text>
  <rect x="780" y="108" width="210" height="50" rx="9" fill="#fdf6ea" stroke="#e8cf9a"/><text x="885" y="128" text-anchor="middle" font-size="9.5" font-weight="600" fill="#5a3410">HiveColumnHandle</text><text x="885" y="145" text-anchor="middle" font-size="8" fill="#93762e">列名 + 类型 + 是否分区列</text>
  <rect x="560" y="168" width="200" height="50" rx="9" fill="#fdf6ea" stroke="#e8cf9a"/><text x="660" y="188" text-anchor="middle" font-size="9.5" font-weight="600" fill="#5a3410">HiveSplit</text><text x="660" y="205" text-anchor="middle" font-size="8" fill="#93762e">文件路径 + 起始偏移 + 长度 + 分桶</text>
  <rect x="780" y="168" width="210" height="50" rx="9" fill="#fdf6ea" stroke="#e8cf9a"/><text x="885" y="188" text-anchor="middle" font-size="9.5" font-weight="600" fill="#5a3410">HiveTransactionHandle</text><text x="885" y="205" text-anchor="middle" font-size="8" fill="#93762e">事务快照 id 等</text>
  <rect x="560" y="230" width="430" height="66" rx="9" fill="#fff" stroke="#e8cf9a"/>
  <text x="574" y="250" font-size="9" font-weight="600" fill="#5a3410">下推信息"累积"在 TableHandle 里：</text>
  <text x="574" y="268" font-size="8.5" fill="#93762e">applyFilter 返回新 HiveTableHandle(含已下推谓词)</text>
  <text x="574" y="284" font-size="8.5" fill="#93762e">PageSource 读时按句柄里的谓词裁剪数据</text>

  <line x1="500" y1="133" x2="540" y2="133" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="520" y="126" text-anchor="middle" font-size="7.5" fill="#a1a1a6">传回解释</text>

  <!-- why -->
  <rect x="30" y="332" width="980" height="210" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="354" font-size="11" font-weight="700" fill="#1d1d1f">为什么这样设计</text>
  <text x="46" y="378" font-size="9" fill="#6e6e73">· 解耦：引擎只认 SPI 接口,不需要理解任何连接器的内部数据模型——加新连接器不动引擎代码</text>
  <text x="46" y="398" font-size="9" fill="#6e6e73">· 下推承载：下推的结果无处安放?——就塞进不透明的 TableHandle。引擎不看内容,连接器读时自己用</text>
  <text x="46" y="418" font-size="9" fill="#6e6e73">· 可序列化：句柄要随 split/计划序列化后经 HTTP 发到 worker,连接器负责其 JSON 序列化</text>
  <text x="46" y="438" font-size="9" fill="#6e6e73">· 类型安全边界：引擎侧用泛型 ConnectorTableHandle,连接器侧强转成自己的具体类型(HiveTableHandle 等)</text>
  <rect x="46" y="454" width="948" height="72" rx="9" fill="#fbfbfd" stroke="#ececf1"/>
  <text x="60" y="474" font-size="9.5" font-weight="700" fill="#b1483a">工程要点</text>
  <text x="60" y="493" font-size="8.8" fill="#4b4b50">· 别试图从引擎侧"读懂"句柄内容——那是连接器的私有约定,跨版本可变</text>
  <text x="60" y="510" font-size="8.8" fill="#4b4b50">· 同一张表在不同下推阶段是不同的 TableHandle 实例(不可变,每次 apply* 生成新的)——这也是为什么下推可迭代</text>
</svg>
