<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="720" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Trino 物理部署视图 · 一套 trino-server 二进制,靠配置分角色</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">coordinator 与 worker 是同一进程；node-scheduler.include-coordinator 决定 coordinator 是否兼跑 split；catalog 由 catalog.config-dir 下的 *.properties 定义</text>

  <!-- clients -->
  <rect x="30" y="70" width="1020" height="46" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="46" y="98" font-size="10.5" fill="#4b4b50">客户端：trino-cli · JDBC · Python/Go 客户端 · BI（Superset/Tableau）——统一走 coordinator 的 HTTP REST 接口</text>

  <!-- coordinator node -->
  <rect x="30" y="132" width="470" height="230" rx="16" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="46" y="156" font-size="12" font-weight="700" fill="#274a78">Coordinator 节点（trino-server, coordinator=true）</text>
  <rect x="46" y="170" width="212" height="52" rx="9" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="152" y="191" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1b2a4a">查询编排</text><text x="152" y="207" text-anchor="middle" font-size="8.5" fill="#5b7db1">解析/分析/规划/优化/调度</text>
  <rect x="272" y="170" width="212" height="52" rx="9" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/><text x="378" y="191" text-anchor="middle" font-size="9.5" font-weight="600" fill="#2c5a3a">集群守护</text><text x="378" y="207" text-anchor="middle" font-size="8.5" fill="#2f6f4f">资源组队列 · 集群内存仲裁</text>
  <rect x="46" y="232" width="212" height="52" rx="9" fill="#faf4fb" stroke="#e2d2ee" filter="url(#soft)"/><text x="152" y="253" text-anchor="middle" font-size="9.5" font-weight="600" fill="#5a3d78">安全入口</text><text x="152" y="269" text-anchor="middle" font-size="8.5" fill="#7a5a95">认证过滤链 · 系统访问控制</text>
  <rect x="272" y="232" width="212" height="52" rx="9" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/><text x="378" y="253" text-anchor="middle" font-size="9.5" font-weight="600" fill="#5a3410">Discovery 服务</text><text x="378" y="269" text-anchor="middle" font-size="8.5" fill="#93762e">内嵌 · worker 注册/心跳</text>
  <rect x="46" y="294" width="438" height="54" rx="9" fill="#f7f7f9" stroke="#ececf1"/><text x="60" y="314" font-size="9.5" font-weight="600" fill="#4b4b50">config.properties</text><text x="60" y="332" font-size="8.8" fill="#6e6e73">coordinator=true · node-scheduler.include-coordinator=false（生产典型）· query.max-memory</text>

  <!-- worker nodes -->
  <rect x="520" y="132" width="530" height="230" rx="16" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="536" y="156" font-size="12" font-weight="700" fill="#12402a">Worker 节点 ×N（trino-server, coordinator=false · 对等横向扩展）</text>
  <g>
    <rect x="536" y="170" width="240" height="80" rx="10" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
    <text x="552" y="190" font-size="10" font-weight="700" fill="#2c5a3a">Worker A</text>
    <text x="552" y="208" font-size="8.8" fill="#2f6f4f">Task/Driver/Operator 执行</text>
    <text x="552" y="224" font-size="8.8" fill="#2f6f4f">局部内存池 · spill 目录</text>
    <text x="552" y="240" font-size="8.8" fill="#2f6f4f">连接器 PageSource 读外部源</text>
    <rect x="794" y="170" width="240" height="80" rx="10" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
    <text x="810" y="190" font-size="10" font-weight="700" fill="#2c5a3a">Worker B … N</text>
    <text x="810" y="208" font-size="8.8" fill="#2f6f4f">同构 · 加节点即扩并行度</text>
    <text x="810" y="224" font-size="8.8" fill="#2f6f4f">彼此 exchange 交换数据</text>
    <text x="810" y="240" font-size="8.8" fill="#2f6f4f">无本地持久数据（无状态）</text>
  </g>
  <rect x="536" y="260" width="498" height="42" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/><text x="550" y="286" font-size="9" fill="#274a78">worker 间 Exchange：流式模式直连 HTTP 拉取；FTE 模式经 ExchangeManager 暂存（对象存储/本地盘）</text>
  <rect x="536" y="310" width="498" height="38" rx="9" fill="#f7f7f9" stroke="#ececf1"/><text x="550" y="333" font-size="8.8" fill="#6e6e73">config.properties: coordinator=false · discovery.uri 指向 coordinator · 内存/并发开关</text>

  <!-- catalog config -->
  <rect x="30" y="378" width="1020" height="86" rx="12" fill="#fff7e6" stroke="#efdcb4"/>
  <text x="46" y="400" font-size="11.5" font-weight="700" fill="#5a3410">Catalog 配置（catalog.config-dir，默认 etc/catalog/*.properties）—— 每个文件 = 一个数据源接入</text>
  <g font-size="8.8" text-anchor="middle">
    <rect x="46" y="410" width="188" height="44" rx="8" fill="#fbf6ef" stroke="#e6d8c4"/><text x="140" y="428" font-size="9.2" font-weight="600" fill="#5a3410">hive.properties</text><text x="140" y="444" fill="#93762e">connector.name=hive · 元存储/S3</text>
    <rect x="246" y="410" width="188" height="44" rx="8" fill="#fbf6ef" stroke="#e6d8c4"/><text x="340" y="428" font-size="9.2" font-weight="600" fill="#5a3410">iceberg.properties</text><text x="340" y="444" fill="#93762e">connector.name=iceberg</text>
    <rect x="446" y="410" width="188" height="44" rx="8" fill="#fbf6ef" stroke="#e6d8c4"/><text x="540" y="428" font-size="9.2" font-weight="600" fill="#5a3410">mysql.properties</text><text x="540" y="444" fill="#93762e">connection-url=jdbc:mysql://…</text>
    <rect x="646" y="410" width="188" height="44" rx="8" fill="#fbf6ef" stroke="#e6d8c4"/><text x="740" y="428" font-size="9.2" font-weight="600" fill="#5a3410">kafka.properties</text><text x="740" y="444" fill="#93762e">connector.name=kafka</text>
    <rect x="846" y="410" width="188" height="44" rx="8" fill="#fbf6ef" stroke="#e6d8c4"/><text x="940" y="428" font-size="9.2" font-weight="600" fill="#5a3410">…可挂任意多个</text><text x="940" y="444" fill="#93762e">一次查询可跨 catalog</text>
  </g>

  <!-- arrows -->
  <path d="M500,247 L520,247" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="502" y="241" font-size="8" fill="#4c8567">分发</text>

  <!-- takeaway -->
  <rect x="30" y="480" width="1020" height="96" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="46" y="502" font-size="11" font-weight="700" fill="#1d1d1f">部署要点</text>
  <text x="46" y="524" font-size="9.5" fill="#4b4b50">① 一种二进制两种角色：coordinator 单点做大脑（可 HA 备用），worker 无状态横向扩展——加机器直接提并行度。</text>
  <text x="46" y="542" font-size="9.5" fill="#4b4b50">② 无自有存储：worker 不落持久数据，重启不丢数据；数据永远在外部源，靠 catalog 配置接入。</text>
  <text x="46" y="560" font-size="9.5" fill="#4b4b50">③ Discovery 内嵌于 coordinator：worker 启动向 discovery.uri 注册，心跳维持存活视图（NodeScheduler 据此选节点）。</text>

  <text x="30" y="600" font-size="9" fill="#a1a1a6">配套详见：总架构图（编排链）与依赖矩阵（接触面 × 能力域）。</text>
</svg>
