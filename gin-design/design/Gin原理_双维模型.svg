<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="558" viewBox="0 0 1080 558" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="558" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Gin 原理 · 双维模型（能力域 × 执行时机）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">接触面（路由注册 + Context API）面向开发者;支撑侧 7 域;注册期建结构 vs 请求期复用——全同步,无后台守护</text>

  <rect x="30" y="66" width="200" height="30" rx="8" fill="#f0f0f4" stroke="#d2d2d7"/>
  <text x="130" y="85" font-size="10" font-weight="700" text-anchor="middle" fill="#48484a">能力域 ＼ 执行时机</text>
  <rect x="238" y="66" width="400" height="30" rx="8" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="438" y="85" font-size="10" font-weight="700" text-anchor="middle" fill="#1b2a4a">注册期 · 启动时建结构</text>
  <rect x="646" y="66" width="404" height="30" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="848" y="85" font-size="10" font-weight="700" text-anchor="middle" fill="#12402a">请求期 · ServeHTTP 每请求</text>

  <!-- row 1 接触面 -->
  <rect x="30" y="100" width="200" height="46" rx="10" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="44" y="122" font-size="11" font-weight="700" fill="#3d2a5a">接触面 · 路由+Context</text>
  <text x="44" y="138" font-size="8" fill="#8a6db3">routergroup.go · context.go</text>
  <rect x="238" y="100" width="400" height="46" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="252" y="128" font-size="9" fill="#3d2a5a">GET/POST 声明路由 · Use 挂中间件</text>
  <rect x="646" y="100" width="404" height="46" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="660" y="128" font-size="9" fill="#12402a">c.Param/Query/Bind 读 · c.JSON 写响应</text>

  <!-- row 2 引擎与路由树 -->
  <rect x="30" y="151" width="200" height="46" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="44" y="173" font-size="11" font-weight="700" fill="#1b2a4a">引擎与路由树</text>
  <text x="44" y="189" font-size="8" fill="#5b7db1">gin.go · tree.go</text>
  <rect x="238" y="151" width="400" height="46" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="252" y="179" font-size="9" fill="#1b2a4a">addRoute 建 radix 树 · 算 maxParams</text>
  <rect x="646" y="151" width="404" height="46" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="660" y="179" font-size="9" fill="#12402a">getValue O(路径长)匹配 + 提路径参数</text>

  <!-- row 3 Context与对象池 -->
  <rect x="30" y="202" width="200" height="46" rx="10" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="44" y="224" font-size="11" font-weight="700" fill="#12402a">Context 与对象池</text>
  <text x="44" y="240" font-size="8" fill="#2f6f4f">context.go:61 · gin.go:229</text>
  <rect x="238" y="202" width="400" height="46" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="252" y="230" font-size="9" fill="#1b2a4a">pool.New = allocateContext 预分配容量</text>
  <rect x="646" y="202" width="404" height="46" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="660" y="230" font-size="9" fill="#12402a">pool.Get → reset → pool.Put 复用</text>

  <!-- row 4 中间件链 -->
  <rect x="30" y="253" width="200" height="46" rx="10" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="44" y="275" font-size="11" font-weight="700" fill="#5a3410">中间件链</text>
  <text x="44" y="291" font-size="8" fill="#93762e">context.go:198</text>
  <rect x="238" y="253" width="400" height="46" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="252" y="281" font-size="9" fill="#5a3410">combineHandlers 合链（组中间件在前）</text>
  <rect x="646" y="253" width="404" height="46" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="660" y="281" font-size="9" fill="#12402a">c.Next() int8 index 推进 · Abort 停</text>

  <!-- row 5 请求处理流程 -->
  <rect x="30" y="304" width="200" height="46" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="44" y="326" font-size="11" font-weight="700" fill="#1b2a4a">请求处理流程</text>
  <text x="44" y="342" font-size="8" fill="#5b7db1">gin.go:662</text>
  <rect x="238" y="304" width="400" height="46" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="252" y="332" font-size="9" fill="#a1a1a6">—（无注册期动作）</text>
  <rect x="646" y="304" width="404" height="46" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="660" y="332" font-size="9" fill="#12402a">ServeHTTP: 池取 → 树查 → 链跑 → 池还</text>

  <!-- row 6 绑定 -->
  <rect x="30" y="355" width="200" height="46" rx="10" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="44" y="377" font-size="11" font-weight="700" fill="#3d2a5a">绑定</text>
  <text x="44" y="393" font-size="8" fill="#8a6db3">binding/</text>
  <rect x="238" y="355" width="400" height="46" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="252" y="383" font-size="9" fill="#a1a1a6">—（仅请求期生效）</text>
  <rect x="646" y="355" width="404" height="46" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="660" y="383" font-size="9" fill="#12402a">按 Content-Type 绑 JSON/form 到 struct</text>

  <!-- row 7 渲染 -->
  <rect x="30" y="406" width="200" height="46" rx="10" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="44" y="428" font-size="11" font-weight="700" fill="#3d2a5a">渲染</text>
  <text x="44" y="444" font-size="8" fill="#8a6db3">render/</text>
  <rect x="238" y="406" width="400" height="46" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="252" y="434" font-size="9" fill="#a1a1a6">—（仅请求期生效）</text>
  <rect x="646" y="406" width="404" height="46" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="660" y="434" font-size="9" fill="#12402a">c.JSON/XML/HTML 设类型 + 序列化写出</text>

  <!-- row 8 RouterGroup -->
  <rect x="30" y="457" width="200" height="46" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="44" y="479" font-size="11" font-weight="700" fill="#1b2a4a">RouterGroup</text>
  <text x="44" y="495" font-size="8" fill="#5b7db1">routergroup.go:55</text>
  <rect x="238" y="457" width="400" height="46" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="252" y="485" font-size="9" fill="#1b2a4a">Group 建子组 · 前缀累积 + 中间件继承</text>
  <rect x="646" y="457" width="404" height="46" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="660" y="485" font-size="9" fill="#a1a1a6">—（仅注册期组织）</text>

  <rect x="30" y="512" width="1020" height="36" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="540" y="534" font-size="9.5" font-weight="700" text-anchor="middle" fill="#48484a">全同步无后台:注册期一次性建路由树/合中间件链/算 maxParams;请求期从池取 Context 复用,零重分配走完整条链</text>
</svg>
