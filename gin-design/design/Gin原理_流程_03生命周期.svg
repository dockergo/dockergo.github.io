<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Gin 请求生命周期 · 端到端（全同步，无后台守护）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">每步串起一个能力域：池（Context）、树（路由）、链（中间件）、绑定/渲染（输入输出）；并发靠 net/http 的 goroutine-per-request + Context 池</text>

  <!-- 顶栏 net/http -->
  <rect x="30" y="70" width="1020" height="38" rx="12" fill="#f4f2ee" stroke="#e3ddd2" stroke-dasharray="6 4"/>
  <text x="540" y="94" font-size="10.5" font-weight="600" text-anchor="middle" fill="#6e6357">net/http 收请求 → 调 Engine.ServeHTTP（每连接一 goroutine）</text>

  <!-- 主流水线：池取 -->
  <rect x="30" y="130" width="235" height="66" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="147" y="158" font-size="11" font-weight="600" text-anchor="middle" fill="#12402a">pool.Get 取 Context</text>
  <text x="147" y="180" font-size="9" text-anchor="middle" fill="#2f6f4f">复用（近零分配）</text>

  <rect x="295" y="130" width="235" height="66" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="412" y="158" font-size="11" font-weight="600" text-anchor="middle" fill="#12402a">reset 清空</text>
  <text x="412" y="180" font-size="9" text-anchor="middle" fill="#2f6f4f">绑本请求 req/resp</text>

  <rect x="560" y="130" width="490" height="66" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="805" y="154" font-size="11" font-weight="600" text-anchor="middle" fill="#1b2a4a">handleHTTPRequest</text>
  <text x="805" y="176" font-size="9" text-anchor="middle" fill="#274a78">按 method 选树 → radix getValue 匹配 + 提路径参数 → 设 handlers 链</text>

  <line x1="265" y1="163" x2="293" y2="163" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="530" y1="163" x2="558" y2="163" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- c.Next 洋葱区 -->
  <rect x="30" y="222" width="1020" height="150" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="46" y="245" font-size="12" font-weight="600" fill="#5a3410">c.Next()：依次跑链（洋葱模型）</text>
  <rect x="70" y="258" width="910" height="98" rx="11" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="525" y="279" font-size="10.5" font-weight="600" text-anchor="middle" fill="#5a3410">全局中间件</text>
  <rect x="150" y="288" width="750" height="58" rx="10" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="525" y="309" font-size="10.5" font-weight="600" text-anchor="middle" fill="#5a3410">组中间件</text>
  <rect x="290" y="316" width="470" height="30" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="525" y="336" font-size="10" font-weight="600" text-anchor="middle" fill="#12402a">业务 handler：c.Bind 读 · 业务逻辑 · c.JSON 写</text>

  <line x1="805" y1="196" x2="805" y2="222" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- 收尾 -->
  <rect x="295" y="398" width="235" height="66" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="412" y="426" font-size="11" font-weight="600" text-anchor="middle" fill="#1b2a4a">WriteHeaderNow</text>
  <text x="412" y="448" font-size="9" text-anchor="middle" fill="#274a78">写响应头 → 客户端</text>

  <rect x="560" y="398" width="235" height="66" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="677" y="426" font-size="11" font-weight="600" text-anchor="middle" fill="#12402a">pool.Put 还 Context</text>
  <text x="677" y="448" font-size="9" text-anchor="middle" fill="#2f6f4f">供下请求复用</text>

  <line x1="412" y1="372" x2="412" y2="398" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="530" y1="431" x2="558" y2="431" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="30" y="486" width="1020" height="42" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="540" y="512" font-size="9.8" font-weight="600" text-anchor="middle" fill="#48484a">全同步（无后台守护）· 池取还包裹全程实现近零分配 · 每步串起一个能力域：池 / 树 / 链 / 绑定渲染</text>
</svg>
