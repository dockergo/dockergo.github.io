<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Gin 原理 · 引擎 ③ addRoute 注册</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">GET → group.handle → engine.addRoute（断言 → 无树建 root → root.addRoute 插入）;countParams/Sections 更新 maxParams</text>

  <!-- flow steps left->right -->
  <rect x="30" y="80" width="228" height="96" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="144" y="108" font-size="11" font-weight="700" text-anchor="middle" fill="#3d2a5a">GET / POST / …</text>
  <text x="144" y="130" font-size="8.8" text-anchor="middle" fill="#8a6db3">动词方法委托</text>
  <text x="144" y="148" font-size="9" text-anchor="middle" fill="#8a6db3">→ group.handle</text>
  <text x="144" y="166" font-size="8" text-anchor="middle" fill="#a1a1a6">routergroup.go:86</text>

  <rect x="288" y="80" width="228" height="96" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="402" y="108" font-size="11" font-weight="700" text-anchor="middle" fill="#1b2a4a">engine.addRoute</text>
  <text x="402" y="130" font-size="8.8" text-anchor="middle" fill="#274a78">(method, absolutePath,</text>
  <text x="402" y="146" font-size="8.8" text-anchor="middle" fill="#274a78">handlers)</text>
  <text x="402" y="166" font-size="8" text-anchor="middle" fill="#a1a1a6">gin.go:364</text>

  <rect x="546" y="80" width="228" height="96" rx="13" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="660" y="108" font-size="11" font-weight="700" text-anchor="middle" fill="#4a1414">断言校验（:365）</text>
  <text x="660" y="130" font-size="8.8" text-anchor="middle" fill="#7a2a2a">path 以 / 开头</text>
  <text x="660" y="146" font-size="8.8" text-anchor="middle" fill="#7a2a2a">method 非空 · ≥1 handler</text>
  <text x="660" y="166" font-size="8" text-anchor="middle" fill="#a1a1a6">不满足则 panic</text>

  <rect x="804" y="80" width="246" height="96" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="927" y="108" font-size="11" font-weight="700" text-anchor="middle" fill="#1b2a4a">无该 method 树？</text>
  <text x="927" y="130" font-size="8.8" text-anchor="middle" fill="#274a78">建 root 节点（:372）</text>
  <text x="927" y="146" font-size="8.8" text-anchor="middle" fill="#274a78">再 root.addRoute 插入</text>
  <text x="927" y="166" font-size="8" text-anchor="middle" fill="#a1a1a6">tree.go:135</text>

  <path d="M258,128 L288,128" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M516,128 L546,128" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M774,128 L804,128" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 插入树结果 -->
  <rect x="546" y="208" width="504" height="96" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="798" y="234" font-size="11.5" font-weight="700" text-anchor="middle" fill="#12402a">root.addRoute 插入压缩前缀树（tree.go:135）</text>
  <text x="798" y="258" font-size="9.5" text-anchor="middle" fill="#2f6f4f">按公共前缀分裂/合并节点,设 nType（static/param/catchAll）+ handlers</text>
  <text x="798" y="280" font-size="9" text-anchor="middle" fill="#a1a1a6">请求期由 getValue 匹配这棵树</text>
  <path d="M927,176 L927,192 L798,192 L798,208" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>

  <!-- maxParams -->
  <rect x="30" y="208" width="486" height="96" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="46" y="232" font-size="11.5" font-weight="700" fill="#5a3410">更新 maxParams / maxSections（gin.go:379）</text>
  <text x="46" y="256" font-size="9.5" fill="#93762e"><tspan font-weight="600">countParams</tspan> 数 :+*　·　<tspan font-weight="600">countSections</tspan> 数 /（tree.go:80）</text>
  <text x="46" y="278" font-size="9.5" fill="#93762e">取最大值,记在 Engine.maxParams / maxSections</text>
  <path d="M402,176 L402,208" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>

  <!-- 为什么算 maxParams -->
  <rect x="30" y="336" width="1020" height="94" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="540" y="362" font-size="12" font-weight="700" text-anchor="middle" fill="#12402a">为什么算 maxParams —— 供 Context 池预分配容量</text>
  <text x="540" y="386" font-size="9.5" text-anchor="middle" fill="#2f6f4f">Context 池按 maxParams 预分配 Params 切片容量（见 Context 池篇）</text>
  <text x="540" y="408" font-size="9.5" text-anchor="middle" fill="#2f6f4f">注册期算好上限 → 请求期填充 Params 零重分配</text>

  <rect x="30" y="450" width="1020" height="30" rx="10" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="469" font-size="9" fill="#6e6e73">注册期一次性建树 + 算容量;engine.GET 继承自 RouterGroup（根组），最终都进 addRoute</text>
</svg>
