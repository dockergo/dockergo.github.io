<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Gin ServeHTTP · 入口与 Context 池管理（gin.go:662）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">Engine 实现 http.Handler；池取还包裹全程——Context 一次请求一个，取自池复用、用完还池，高 QPS 下分配近零</text>

  <!-- 顶：net/http -->
  <rect x="30" y="70" width="1020" height="40" rx="12" fill="#f4f2ee" stroke="#e3ddd2" stroke-dasharray="6 4"/>
  <text x="540" y="95" font-size="10.5" font-weight="600" text-anchor="middle" fill="#6e6357">标准库 net/http 调 Engine.ServeHTTP（实现 http.Handler，无缝嵌入）</text>

  <!-- 步骤链 -->
  <rect x="30" y="140" width="300" height="110" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="164" font-size="12" font-weight="600" fill="#1b2a4a">① 懒初始化路由树</text>
  <text x="46" y="188" font-size="10" fill="#274a78">routeTreesUpdated.Do(</text>
  <text x="62" y="206" font-size="10" fill="#274a78">updateRouteTrees)</text>
  <text x="46" y="230" font-size="9.5" fill="#5b7db1">一次性，sync.Once 懒建路由树</text>

  <rect x="390" y="140" width="300" height="110" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="406" y="164" font-size="12" font-weight="600" fill="#12402a">② pool.Get 取 Context</text>
  <text x="406" y="188" font-size="10" fill="#2f6f4f">c := engine.pool.Get()</text>
  <text x="406" y="206" font-size="10" fill="#2f6f4f">.(*Context)（:667）</text>
  <text x="406" y="230" font-size="9.5" fill="#2f6f4f">取复用 Context 或新建</text>

  <rect x="750" y="140" width="300" height="110" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="766" y="164" font-size="12" font-weight="600" fill="#12402a">③ reset 清空 + 绑请求</text>
  <text x="766" y="186" font-size="9.5" fill="#2f6f4f">c.writermem.reset(w)</text>
  <text x="766" y="204" font-size="9.5" fill="#2f6f4f">c.Request = req</text>
  <text x="766" y="222" font-size="9.5" fill="#2f6f4f">c.reset()（:668）</text>
  <text x="766" y="242" font-size="9" fill="#2f6f4f">绑本请求 + 清空复用状态</text>

  <rect x="390" y="290" width="300" height="110" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="406" y="314" font-size="12" font-weight="600" fill="#1b2a4a">④ handleHTTPRequest(c)</text>
  <text x="406" y="338" font-size="10" fill="#274a78">（:672）</text>
  <text x="406" y="362" font-size="9.5" fill="#5b7db1">路由匹配 + 跑中间件链</text>
  <text x="406" y="382" font-size="9" fill="#a1a1a6">详见 流程_02handle</text>

  <rect x="750" y="290" width="300" height="110" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="766" y="314" font-size="12" font-weight="600" fill="#12402a">⑤ pool.Put 还 Context</text>
  <text x="766" y="338" font-size="10" fill="#2f6f4f">engine.pool.Put(c)（:674）</text>
  <text x="766" y="362" font-size="9.5" fill="#2f6f4f">请求完还池</text>
  <text x="766" y="382" font-size="9" fill="#2f6f4f">供下个请求复用</text>

  <!-- 连线 -->
  <line x1="540" y1="110" x2="540" y2="140" stroke="#86868b" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="556" y="130" font-size="9" fill="#a1a1a6">每请求进入</text>
  <path d="M330,195 L360,195 L360,195 L388,195" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M690,195 L720,195 L720,195 L748,195" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M900,250 L900,270 L540,270 L540,290" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M690,345 L720,345 L720,345 L748,345" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="30" y="290" width="330" height="110" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="314" font-size="11" font-weight="600" fill="#2c5a3a">ServeHTTP = 每请求的框</text>
  <text x="46" y="338" font-size="9.5" fill="#2f6f4f">Get → 处理 → Put</text>
  <text x="46" y="358" font-size="9.5" fill="#2f6f4f">Context 池贯穿全程</text>
  <text x="46" y="378" font-size="9.5" fill="#2f6f4f">高 QPS 下分配近零</text>

  <text x="30" y="440" font-size="9.5" fill="#a1a1a6">为什么池取还包裹全程：Context 一次请求一个，取自池（复用）、用完还池——不是每请求都建新 Context，分配近零。</text>
  <text x="30" y="462" font-size="9.5" fill="#a1a1a6">全同步无后台：net/http 每连接一 goroutine 调 ServeHTTP，Gin 不额外起后台守护。</text>
</svg>
