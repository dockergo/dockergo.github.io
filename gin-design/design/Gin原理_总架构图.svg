<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="760" viewBox="0 0 1080 760" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="760" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Gin 总架构图 —— 一个 HTTP 请求在 Engine 内的生命周期：路由 → Context → 中间件链 → handler</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">位置即语义：顶=net/http 接入，中=请求主干（radix 匹配→取 Context→中间件链→handler），底=支撑设施 · 点击模块下钻</text>

  <!-- 顶：net/http 接入层 -->
  <rect x="30" y="70" width="1020" height="60" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="50" y="95" font-size="12.5" font-weight="600" fill="#1b2a4a">net/http 接入 · Engine 实现 http.Handler（goroutine-per-request）</text>
  <text x="50" y="116" font-size="9.5" fill="#5b7db1">http.Server 收到请求 → 调 Engine.ServeHTTP(w, req) 作为唯一入口 · 每请求一个 goroutine，无共享可变状态</text>

  <!-- 接触面：路由注册 + Context API -->
  <rect x="30" y="146" width="1020" height="58" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="50" y="170" font-size="12" font-weight="600" fill="#4a2c6f">接触面 · 路由注册 r.GET(path, handler) + Context API（c.Param/Query/Bind、c.JSON/String）</text>
  <text x="50" y="190" font-size="9.5" fill="#7a5aa0">开发者用链式 API 注册路由 + 在 handler 里用 c 读请求/写响应 —— 声明式挂载，运行时由下面主干驱动</text>

  <!-- 请求主干：4 段流水 -->
  <rect x="30" y="220" width="1020" height="132" rx="14" fill="#ffffff" stroke="#e4e4ea" filter="url(#soft)"/>
  <text x="48" y="244" font-size="12" font-weight="600" fill="#1d1d1f">请求处理主干 · ServeHTTP 内一次流转（engine.go / context.go）</text>
  <rect x="48" y="258" width="216" height="78" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="156" y="282" font-size="10.5" font-weight="600" text-anchor="middle" fill="#1b2a4a">① radix 路由匹配</text>
  <text x="156" y="302" font-size="8.5" text-anchor="middle" fill="#5b7db1">按 method 选树 → 前缀匹配</text>
  <text x="156" y="318" font-size="8.5" text-anchor="middle" fill="#5b7db1">取出 handlers + Params</text>
  <rect x="286" y="258" width="216" height="78" rx="10" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="394" y="282" font-size="10.5" font-weight="600" text-anchor="middle" fill="#5a3410">② 取 Context</text>
  <text x="394" y="302" font-size="8.5" text-anchor="middle" fill="#93762e">pool.Get() 拿复用 Context</text>
  <text x="394" y="318" font-size="8.5" text-anchor="middle" fill="#93762e">reset 绑定本次 req/resp</text>
  <rect x="524" y="258" width="216" height="78" rx="10" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="632" y="282" font-size="10.5" font-weight="600" text-anchor="middle" fill="#4a2c6f">③ 中间件链</text>
  <text x="632" y="302" font-size="8.5" text-anchor="middle" fill="#7a5aa0">c.Next() 顺序推进 index</text>
  <text x="632" y="318" font-size="8.5" text-anchor="middle" fill="#7a5aa0">Abort 截断 · 洋葱模型</text>
  <rect x="762" y="258" width="216" height="78" rx="10" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="870" y="282" font-size="10.5" font-weight="600" text-anchor="middle" fill="#12402a">④ handler + 回收</text>
  <text x="870" y="302" font-size="8.5" text-anchor="middle" fill="#2f6f4f">c.Bind 读入 → c.JSON 写出</text>
  <text x="870" y="318" font-size="8.5" text-anchor="middle" fill="#2f6f4f">结束 pool.Put() 归还</text>
  <path d="M264,297 L286,297" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M502,297 L524,297" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M740,297 L762,297" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 支撑设施带 -->
  <rect x="30" y="368" width="330" height="150" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="50" y="392" font-size="11.5" font-weight="600" fill="#1b2a4a">引擎与路由树（radix）</text>
  <text x="50" y="414" font-size="9" fill="#5b7db1">Engine 持每 method 一棵 radix 树</text>
  <text x="50" y="432" font-size="9" fill="#5b7db1">node 压缩前缀 · O(路径长) 匹配</text>
  <text x="50" y="450" font-size="9" fill="#5b7db1">:name 参数 / *catchAll 通配</text>
  <text x="50" y="468" font-size="9" fill="#5b7db1">handlers 切片存于叶节点</text>
  <text x="50" y="500" font-size="8.5" fill="#8aa4c8">tree.go · 支撑「① 路由匹配」</text>

  <rect x="375" y="368" width="330" height="150" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="395" y="392" font-size="11.5" font-weight="600" fill="#5a3410">Context 与对象池（灵魂）</text>
  <text x="395" y="414" font-size="9" fill="#93762e">sync.Pool 复用 Context 对象</text>
  <text x="395" y="432" font-size="9" fill="#93762e">reset 清空后绑定新 req/resp</text>
  <text x="395" y="450" font-size="9" fill="#93762e">承载 Params/Keys/index/errors</text>
  <text x="395" y="468" font-size="9" fill="#93762e">请求内单 goroutine 无需加锁</text>
  <text x="395" y="500" font-size="8.5" fill="#b1974e">context.go · 支撑「② 取 Context」</text>

  <rect x="720" y="368" width="330" height="150" rx="14" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="740" y="392" font-size="11.5" font-weight="600" fill="#4a2c6f">中间件链</text>
  <text x="740" y="414" font-size="9" fill="#7a5aa0">HandlersChain = []HandlerFunc</text>
  <text x="740" y="432" font-size="9" fill="#7a5aa0">c.Next() 递增 index 依次执行</text>
  <text x="740" y="450" font-size="9" fill="#7a5aa0">c.Abort 置 index=63 终止后续</text>
  <text x="740" y="468" font-size="9" fill="#7a5aa0">Use 注册全局/组级中间件</text>
  <text x="740" y="500" font-size="8.5" fill="#9a7ac0">context.go · 支撑「③ 中间件链」</text>

  <!-- 底部：绑定渲染 / RouterGroup -->
  <rect x="30" y="534" width="502" height="150" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="50" y="558" font-size="11.5" font-weight="600" fill="#12402a">绑定与渲染</text>
  <text x="50" y="580" font-size="9" fill="#2f6f4f">binding 按 Content-Type 选择器 · JSON/form/XML → 结构体</text>
  <text x="50" y="598" font-size="9" fill="#2f6f4f">validator/v10 校验 tag（binding:"required"）</text>
  <text x="50" y="616" font-size="9" fill="#2f6f4f">render 统一出口：c.JSON/String/HTML 设 Content-Type + 写 body</text>
  <text x="50" y="640" font-size="9" fill="#2f6f4f">handler 里读入(Bind) / 写出(render) 都经它</text>
  <text x="50" y="668" font-size="8.5" fill="#4a8a63">binding/ · render/ · 支撑「④ handler 的入出」</text>

  <rect x="548" y="534" width="502" height="150" rx="14" fill="#ffffff" stroke="#e4e4ea" filter="url(#soft)"/>
  <text x="568" y="558" font-size="11.5" font-weight="600" fill="#1d1d1f">RouterGroup（路由组织）</text>
  <text x="568" y="580" font-size="9" fill="#6e6e73">公共前缀 + 组级中间件栈（/api 下统一鉴权）</text>
  <text x="568" y="598" font-size="9" fill="#6e6e73">Group 嵌套 → 继承父组前缀与中间件</text>
  <text x="568" y="616" font-size="9" fill="#6e6e73">注册时把组前缀拼进路径、组中间件并进 handlers</text>
  <text x="568" y="640" font-size="9" fill="#6e6e73">Engine 本身是根 RouterGroup</text>
  <text x="568" y="668" font-size="8.5" fill="#86868b">routergroup.go · 组织「路由注册」</text>

  <!-- 支撑带 → 主干 归属虚线 -->
  <path d="M156,368 L156,352" stroke="#c7c7cc" stroke-width="1.2" stroke-dasharray="4 3" fill="none" marker-end="url(#ar)"/>
  <path d="M394,368 L394,352" stroke="#c7c7cc" stroke-width="1.2" stroke-dasharray="4 3" fill="none" marker-end="url(#ar)"/>
  <path d="M632,368 L632,352" stroke="#c7c7cc" stroke-width="1.2" stroke-dasharray="4 3" fill="none" marker-end="url(#ar)"/>

  <text x="30" y="716" font-size="9.5" fill="#a1a1a6">灵魂：Context 用 sync.Pool 复用（reset+[:0] backing array + int8 index 推进中间件）——高并发下几乎零分配，是 Gin 快的关键</text>
  <text x="30" y="740" font-size="9" fill="#a1a1a6">源码基准 Gin v1.12.0(git 34dac20) · flat package gin + binding/render + httprouter 派生 radix 树 · 位置即语义，点击模块下钻</text>
</svg>
