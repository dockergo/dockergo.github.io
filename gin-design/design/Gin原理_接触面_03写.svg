<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="530" viewBox="0 0 1080 530" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="530" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Gin 原理 · 接触面 ③ Context 写响应</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">c.JSON 一行完成 设 Content-Type + 序列化 + 写 body——最常用的响应出口</text>

  <!-- 渲染 -->
  <rect x="30" y="72" width="500" height="140" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="46" y="94" font-size="11.5" font-weight="700" fill="#3d2a5a">渲染（设 Content-Type + 序列化写出）</text>
  <text x="46" y="118" font-size="10" fill="#8a6db3"><tspan font-weight="600">c.JSON(200, obj)</tspan>　c.XML　c.String</text>
  <text x="46" y="140" font-size="10" fill="#8a6db3"><tspan font-weight="600">c.HTML(200, "tmpl", data)</tspan></text>
  <text x="46" y="162" font-size="10" fill="#8a6db3"><tspan font-weight="600">c.Data</tspan>　（原始字节 + 指定类型）</text>
  <text x="46" y="184" font-size="9" fill="#a1a1a6">实现见渲染篇（render/）</text>
  <text x="46" y="202" font-size="9" fill="#a1a1a6">context.go:1255…</text>

  <!-- 状态/头/Cookie -->
  <rect x="550" y="72" width="500" height="140" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="566" y="94" font-size="11.5" font-weight="700" fill="#1b2a4a">状态 / 头 / Cookie / 重定向</text>
  <text x="566" y="118" font-size="10" fill="#274a78"><tspan font-weight="600">c.Status(code)</tspan>　设响应状态码</text>
  <text x="566" y="140" font-size="10" fill="#274a78"><tspan font-weight="600">c.Header(k, v)</tspan>　设响应头</text>
  <text x="566" y="162" font-size="10" fill="#274a78"><tspan font-weight="600">c.SetCookie(...)</tspan>　写 Set-Cookie</text>
  <text x="566" y="184" font-size="10" fill="#274a78"><tspan font-weight="600">c.Redirect(302, url)</tspan>　重定向</text>

  <!-- 中断 -->
  <rect x="30" y="232" width="500" height="128" rx="13" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="46" y="254" font-size="11.5" font-weight="700" fill="#4a1414">中断中间件链</text>
  <text x="46" y="278" font-size="10" fill="#7a2a2a"><tspan font-weight="600">c.Abort()</tspan>　停后续 handler（设 index=63）</text>
  <text x="46" y="300" font-size="10" fill="#7a2a2a"><tspan font-weight="600">c.AbortWithStatusJSON(401, err)</tspan></text>
  <text x="46" y="322" font-size="9" fill="#7a2a2a">典型：鉴权失败 → Abort → 业务 handler 不跑</text>
  <text x="46" y="344" font-size="8.5" fill="#a1a1a6">实现见中间件链篇（context.go:217）</text>

  <!-- 错误 -->
  <rect x="550" y="232" width="500" height="128" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="566" y="254" font-size="11.5" font-weight="700" fill="#5a3410">错误挂载</text>
  <text x="566" y="278" font-size="10" fill="#93762e"><tspan font-weight="600">c.Error(err)</tspan>　挂到 c.Errors</text>
  <text x="566" y="300" font-size="9" fill="#93762e">供后续中间件统一处理（错误收集/上报）</text>
  <text x="566" y="322" font-size="9" fill="#93762e">不立即写响应,累积在 c.Errors 列表</text>
  <text x="566" y="344" font-size="8.5" fill="#a1a1a6">配合日志/错误中间件统一输出</text>

  <!-- 汇聚出口 -->
  <rect x="30" y="380" width="1020" height="80" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="540" y="404" font-size="12" font-weight="700" text-anchor="middle" fill="#12402a">gin.Context → ResponseWriter → net/http 写回客户端</text>
  <text x="540" y="426" font-size="9.5" text-anchor="middle" fill="#2f6f4f">c.JSON/String/HTML 等应是 handler 最后一步——响应已提交,别重复写</text>
  <text x="540" y="446" font-size="9" text-anchor="middle" fill="#a1a1a6">误区：c.JSON 后还能写别的（响应已提交,不可再改）</text>

  <path d="M280,212 L280,380" stroke="#c7c7cc" stroke-width="1.3" fill="none" marker-end="url(#ar)"/>
  <path d="M800,212 L800,225 L540,225 L540,380" stroke="#c7c7cc" stroke-width="1.3" fill="none" marker-end="url(#ar)"/>

  <rect x="30" y="484" width="1020" height="30" rx="10" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="503" font-size="9" fill="#6e6e73">归属：JSON/HTML 在【渲染】,Abort 在【中间件链】,c.Errors 供错误中间件消费——写响应统一经 c</text>
</svg>
