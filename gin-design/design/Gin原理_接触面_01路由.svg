<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Gin 原理 · 接触面 ① 路由注册 API</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">HTTP 动词方法委托 handle;路径参数 :name / *filepath;多 HandlerFunc 前中间件后业务;注册进 radix 树</text>

  <!-- HTTP verbs -->
  <rect x="30" y="72" width="500" height="128" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="46" y="94" font-size="11.5" font-weight="700" fill="#3d2a5a">HTTP 动词方法（routergroup.go:111）</text>
  <text x="46" y="116" font-size="9.5" fill="#8a6db3"><tspan font-weight="600">GET / POST / PUT / PATCH</tspan> / DELETE / HEAD / OPTIONS</text>
  <text x="46" y="136" font-size="9.5" fill="#8a6db3">全部委托 → <tspan font-weight="600">handle(method, path, handlers)</tspan></text>
  <text x="46" y="156" font-size="9.5" fill="#8a6db3"><tspan font-weight="600">Any</tspan>（:147）循环注册所有 method</text>
  <text x="46" y="178" font-size="9" fill="#a1a1a6">一行 r.GET(path, handler) 声明"这路径这方法 → 这处理"</text>

  <!-- 路径参数 -->
  <rect x="550" y="72" width="500" height="128" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="566" y="94" font-size="11.5" font-weight="700" fill="#1b2a4a">路径参数（radix 匹配提取）</text>
  <text x="566" y="118" font-size="9.5" fill="#274a78"><tspan font-weight="600">:name</tspan>　param 一段　→ c.Param("name") 取</text>
  <text x="566" y="140" font-size="9.5" fill="#274a78"><tspan font-weight="600">*filepath</tspan>　catchAll 吞剩余路径</text>
  <text x="566" y="162" font-size="9.5" fill="#274a78">例：/user/:id/*action</text>
  <text x="566" y="182" font-size="9" fill="#a1a1a6">每段一个 wildcard、名非空（否则 panic）</text>

  <!-- 多 HandlerFunc 链 -->
  <rect x="30" y="224" width="1020" height="112" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="46" y="248" font-size="11.5" font-weight="700" fill="#5a3410">多 HandlerFunc：前面中间件 · 最后业务</text>
  <text x="46" y="270" font-size="9.5" fill="#93762e">r.GET("/x", mw1, mw2, finalHandler)——可传多个 HandlerFunc</text>
  <rect x="300" y="284" width="150" height="38" rx="9" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="375" y="307" font-size="9.5" font-weight="600" text-anchor="middle" fill="#5a3410">mw1（中间件）</text>
  <rect x="470" y="284" width="150" height="38" rx="9" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="545" y="307" font-size="9.5" font-weight="600" text-anchor="middle" fill="#5a3410">mw2（中间件）</text>
  <rect x="640" y="284" width="180" height="38" rx="9" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="730" y="307" font-size="9.5" font-weight="600" text-anchor="middle" fill="#12402a">finalHandler（业务）</text>
  <path d="M450,303 L470,303" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M620,303 L640,303" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="46" y="307" font-size="9" fill="#a1a1a6">前中间件</text>

  <!-- 落地 radix 树 -->
  <rect x="30" y="360" width="1020" height="86" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="540" y="384" font-size="11.5" font-weight="700" text-anchor="middle" fill="#1b2a4a">注册进对应 method 的 radix 树</text>
  <text x="540" y="406" font-size="9.5" text-anchor="middle" fill="#274a78">handle → engine.addRoute(method, absolutePath, handlers) → root.addRoute 插入压缩前缀树</text>
  <text x="540" y="426" font-size="9" text-anchor="middle" fill="#a1a1a6">请求来时按 method 选树 → getValue O(路径长)匹配（见引擎路由树篇）</text>

  <!-- connectors from verbs+params down to radix -->
  <path d="M280,200 L280,340 L400,340 L400,360" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <path d="M375,322 L375,342 L520,342 L520,360" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <path d="M800,200 L800,340 L680,340 L680,360" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>

  <rect x="30" y="470" width="1020" height="30" rx="10" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="489" font-size="9" fill="#6e6e73">Engine 嵌 RouterGroup,engine.GET 继承自 group.handle;GET/POST 等仅方法名不同,路由承载全在 radix 树</text>
</svg>
