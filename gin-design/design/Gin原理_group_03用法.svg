<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="530" viewBox="0 0 1080 530" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="530" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Gin RouterGroup 典型用法 · 按模块聚合前缀 + 组级横切中间件</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">分组让路由按模块聚合、前缀和横切中间件（鉴权/限流/日志）在组级声明一次、组内共享——大型服务清晰可维护</text>

  <!-- 代码块 -->
  <rect x="30" y="70" width="470" height="230" rx="13" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="46" y="94" font-size="11" font-weight="600" fill="#1d1d1f">典型代码</text>
  <text x="46" y="120" font-size="9.8" fill="#274a78">r := gin.Default()</text>
  <text x="46" y="142" font-size="9.8" fill="#5a3410">api := r.Group("/api", AuthMiddleware())</text>
  <text x="46" y="160" font-size="9" fill="#a1a1a6">　// /api 组 + 鉴权</text>
  <text x="46" y="182" font-size="9.8" fill="#12402a">v1 := api.Group("/v1")　// 继承鉴权</text>
  <text x="46" y="204" font-size="9.8" fill="#12402a">v1.GET("/users", listUsers)</text>
  <text x="46" y="224" font-size="9.8" fill="#12402a">v1.POST("/users", createUser)</text>
  <text x="46" y="252" font-size="9.8" fill="#5a3410">admin := r.Group("/admin", AdminAuth())</text>
  <text x="46" y="274" font-size="9.8" fill="#12402a">admin.GET("/stats", stats)</text>
  <text x="46" y="294" font-size="9" fill="#a1a1a6">// /admin 组 + 管理员鉴权</text>

  <!-- 路由树结果 -->
  <rect x="530" y="70" width="520" height="230" rx="13" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="546" y="94" font-size="11" font-weight="600" fill="#2c5a3a">生成的路由（前缀累积 + 中间件继承）</text>

  <rect x="546" y="106" width="488" height="80" rx="11" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="562" y="126" font-size="10" font-weight="600" fill="#5a3410">/api 组（AuthMiddleware）</text>
  <rect x="576" y="134" width="442" height="22" rx="6" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="797" y="149" font-size="9" text-anchor="middle" fill="#12402a">GET /api/v1/users （带鉴权）</text>
  <rect x="576" y="160" width="442" height="22" rx="6" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="797" y="175" font-size="9" text-anchor="middle" fill="#12402a">POST /api/v1/users （带鉴权）</text>

  <rect x="546" y="196" width="488" height="52" rx="11" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="562" y="216" font-size="10" font-weight="600" fill="#5a3410">/admin 组（AdminAuth）</text>
  <rect x="576" y="222" width="442" height="20" rx="6" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="797" y="237" font-size="9" text-anchor="middle" fill="#12402a">GET /admin/stats （带管理员鉴权）</text>

  <text x="546" y="272" font-size="9.5" fill="#2f6f4f">v1 继承 /api 鉴权：/api/v1/users 自动带鉴权，无需重复挂</text>
  <text x="546" y="290" font-size="9" fill="#a1a1a6">按业务/版本分组，前缀 + 中间件组级声明一次</text>

  <line x1="500" y1="150" x2="528" y2="150" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- 要点 -->
  <rect x="30" y="320" width="335" height="120" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="46" y="344" font-size="11" font-weight="600" fill="#5a3410">按模块分组</text>
  <text x="46" y="368" font-size="9.5" fill="#93762e">/api、/admin 等按业务/版本分组</text>
  <text x="46" y="388" font-size="9.5" fill="#93762e">前缀 + 中间件组级声明</text>
  <text x="46" y="410" font-size="9.5" fill="#93762e">根组 = Engine，engine.GET 注册根组</text>
  <text x="46" y="430" font-size="9" fill="#a1a1a6">全局中间件用 engine.Use</text>

  <rect x="375" y="320" width="335" height="120" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="391" y="344" font-size="11" font-weight="600" fill="#3d2a5a">组级中间件</text>
  <text x="391" y="368" font-size="9.5" fill="#8a6db3">鉴权/限流/CORS 挂组级</text>
  <text x="391" y="388" font-size="9.5" fill="#8a6db3">（Group 的 handlers 参数）</text>
  <text x="391" y="410" font-size="9.5" fill="#8a6db3">组内路由自动带</text>
  <text x="391" y="430" font-size="9" fill="#a1a1a6">横切关注点声明一次共享</text>

  <rect x="720" y="320" width="330" height="120" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="736" y="344" font-size="11" font-weight="600" fill="#1b2a4a">嵌套版本控制</text>
  <text x="736" y="368" font-size="9.5" fill="#274a78">/api/v1、/api/v2 用嵌套 group</text>
  <text x="736" y="388" font-size="9.5" fill="#274a78">前缀累积、中间件继承</text>
  <text x="736" y="410" font-size="9.5" fill="#274a78">多版本共享鉴权/日志</text>
  <text x="736" y="430" font-size="9" fill="#a1a1a6">分组按模块聚合，DRY</text>

  <rect x="30" y="460" width="1020" height="52" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="482" font-size="10.5" font-weight="600" fill="#1d1d1f">分组按模块聚合前缀 + 横切中间件组级声明一次共享</text>
  <text x="46" y="502" font-size="9.5" fill="#6e6e73">误区：每路由重复挂鉴权 —— 挂组级一次，组内所有路由（含嵌套）自动带（DRY）；运行期仍是 radix 树匹配。</text>
</svg>
