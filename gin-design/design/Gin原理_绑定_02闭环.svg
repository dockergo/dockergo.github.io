<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Gin 输入输出闭环 · 绑定与渲染对称（handler 的 IO）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">绑定（输入：body→struct）与渲染（输出：struct→body）对称，中间是业务；Bind 失败自动 400，ShouldBind 让你自定义错误响应</text>

  <!-- 请求入 -->
  <rect x="30" y="90" width="150" height="150" rx="13" fill="#f4f2ee" stroke="#e3ddd2" filter="url(#soft)"/>
  <text x="105" y="160" font-size="12" font-weight="600" text-anchor="middle" fill="#6e6357">请求</text>
  <text x="105" y="182" font-size="9" text-anchor="middle" fill="#8a7d6a">HTTP body</text>

  <!-- c.Bind -->
  <rect x="210" y="90" width="230" height="150" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="325" y="114" font-size="12" font-weight="600" text-anchor="middle" fill="#3d2a5a">c.Bind(&amp;req)</text>
  <text x="325" y="140" font-size="9.5" text-anchor="middle" fill="#8a6db3">按 Content-Type 选 binding</text>
  <text x="325" y="160" font-size="9.5" text-anchor="middle" fill="#8a6db3">解析 body 到 struct</text>
  <text x="325" y="180" font-size="9.5" text-anchor="middle" fill="#8a6db3">validator 校验</text>
  <text x="325" y="206" font-size="9" text-anchor="middle" fill="#a1a1a6">Bind 失败自动 400 + Abort</text>
  <text x="325" y="224" font-size="9" text-anchor="middle" fill="#a1a1a6">ShouldBind 只返 error</text>

  <!-- 强类型输入 -->
  <rect x="470" y="90" width="140" height="150" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="540" y="150" font-size="11" font-weight="600" text-anchor="middle" fill="#12402a">强类型</text>
  <text x="540" y="170" font-size="11" font-weight="600" text-anchor="middle" fill="#12402a">输入 struct</text>

  <!-- 业务逻辑 -->
  <rect x="640" y="90" width="140" height="150" rx="13" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="710" y="160" font-size="12" font-weight="600" text-anchor="middle" fill="#1d1d1f">业务逻辑</text>
  <text x="710" y="182" font-size="9" text-anchor="middle" fill="#6e6e73">处理 → 结果</text>

  <!-- c.JSON -->
  <rect x="810" y="90" width="240" height="150" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="930" y="114" font-size="12" font-weight="600" text-anchor="middle" fill="#3d2a5a">c.JSON(200, resp)</text>
  <text x="930" y="140" font-size="9.5" text-anchor="middle" fill="#8a6db3">选 render.JSON</text>
  <text x="930" y="160" font-size="9.5" text-anchor="middle" fill="#8a6db3">设 Content-Type</text>
  <text x="930" y="180" font-size="9.5" text-anchor="middle" fill="#8a6db3">marshal struct</text>
  <text x="930" y="200" font-size="9.5" text-anchor="middle" fill="#8a6db3">写 body</text>
  <text x="930" y="222" font-size="9" text-anchor="middle" fill="#a1a1a6">application/json; charset=utf-8</text>

  <line x1="180" y1="165" x2="208" y2="165" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="440" y1="165" x2="468" y2="165" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="610" y1="165" x2="638" y2="165" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="780" y1="165" x2="808" y2="165" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- 响应出 -->
  <path d="M930,240 L930,290 L105,290 L105,262" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="520" y="284" font-size="9" fill="#a1a1a6">响应 body 写回客户端</text>
  <rect x="30" y="262" width="150" height="70" rx="12" fill="#f4f2ee" stroke="#e3ddd2" filter="url(#soft)"/>
  <text x="105" y="304" font-size="11" font-weight="600" text-anchor="middle" fill="#6e6357">响应</text>

  <!-- 对称说明 -->
  <rect x="30" y="356" width="500" height="120" rx="12" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="46" y="380" font-size="11" font-weight="600" fill="#3d2a5a">输入侧 · binding</text>
  <text x="46" y="402" font-size="9.5" fill="#8a6db3">body → struct（解析 + 校验）</text>
  <text x="46" y="422" font-size="9.5" fill="#8a6db3">按 Content-Type 自动选解析器</text>
  <text x="46" y="444" font-size="9.5" fill="#8a6db3">得到强类型输入</text>
  <text x="46" y="466" font-size="9" fill="#a1a1a6">c.Bind 出错 400，c.ShouldBind 自定义</text>

  <rect x="550" y="356" width="500" height="120" rx="12" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="566" y="380" font-size="11" font-weight="600" fill="#3d2a5a">输出侧 · render</text>
  <text x="566" y="402" font-size="9.5" fill="#8a6db3">struct → body（序列化 + 设头）</text>
  <text x="566" y="422" font-size="9.5" fill="#8a6db3">按类型选渲染器（JSON/XML/…）</text>
  <text x="566" y="444" font-size="9.5" fill="#8a6db3">自动设 Content-Type</text>
  <text x="566" y="466" font-size="9" fill="#a1a1a6">闭环：body→binding→struct→业务→struct→render→body</text>
</svg>
