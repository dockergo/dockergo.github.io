<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="530" viewBox="0 0 1080 530" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="530" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Gin 中间件链 · HandlersChain + c.Next() 索引推进（洋葱模型）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">一次请求的中间件 + 最终 handler 合成一条 HandlersChain 切片，int8 index 顺序推进；中间件调 Next 跑下游、返回后续跑自己剩余代码</text>

  <rect x="30" y="66" width="1020" height="52" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="46" y="88" font-size="12" font-weight="600" fill="#5a3410">类型定义</text>
  <text x="46" y="107" font-size="10.5" fill="#93762e">HandlerFunc func(*Context)（gin.go:51）　·　HandlersChain []HandlerFunc（gin.go:57）—— 一条链是 handler 切片</text>

  <!-- 左：c.Next() 代码 -->
  <rect x="30" y="138" width="300" height="200" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="162" font-size="12" font-weight="600" fill="#1b2a4a">c.Next()（context.go:198）</text>
  <text x="46" y="188" font-size="10" fill="#274a78">c.index++</text>
  <text x="46" y="208" font-size="10" fill="#274a78">for c.index &lt; len(c.handlers) {</text>
  <text x="62" y="228" font-size="10" fill="#274a78">c.handlers[c.index](c)</text>
  <text x="62" y="248" font-size="10" fill="#274a78">c.index++</text>
  <text x="46" y="268" font-size="10" fill="#274a78">}</text>
  <text x="46" y="298" font-size="9.5" fill="#5b7db1">index++ 后循环顺序跑；一个 int8 index</text>
  <text x="46" y="315" font-size="9.5" fill="#5b7db1">记录链推进位置，状态存 Context</text>

  <!-- 中：洋葱模型 -->
  <rect x="360" y="138" width="420" height="360" rx="14" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="570" y="162" font-size="12" font-weight="600" text-anchor="middle" fill="#5a3410">洋葱模型 · 层层包裹</text>
  <rect x="392" y="176" width="356" height="300" rx="12" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="570" y="197" font-size="10.5" font-weight="600" text-anchor="middle" fill="#5a3410">Logger 中间件（外层）</text>
  <text x="570" y="215" font-size="9.5" text-anchor="middle" fill="#93762e">① c.Next() 前：记开始时间</text>
  <rect x="430" y="228" width="280" height="196" rx="11" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="570" y="249" font-size="10.5" font-weight="600" text-anchor="middle" fill="#5a3410">Auth 中间件（中层）</text>
  <text x="570" y="267" font-size="9.5" text-anchor="middle" fill="#93762e">② c.Next() 前：校验鉴权</text>
  <rect x="466" y="282" width="208" height="90" rx="10" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="570" y="315" font-size="10.5" font-weight="600" text-anchor="middle" fill="#12402a">③ 业务 handler</text>
  <text x="570" y="335" font-size="9.5" text-anchor="middle" fill="#2f6f4f">（链最内层）</text>
  <text x="570" y="400" font-size="9.5" text-anchor="middle" fill="#93762e">④ c.Next() 返回后：记耗时</text>
  <text x="570" y="452" font-size="9.5" text-anchor="middle" fill="#93762e">调 Next 跑下游 → 返回续跑自己剩余代码</text>

  <!-- 右：combineHandlers + 链切片 -->
  <rect x="810" y="138" width="240" height="120" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="826" y="162" font-size="12" font-weight="600" fill="#3d2a5a">combineHandlers</text>
  <text x="826" y="180" font-size="9.5" fill="#8a6db3">（routergroup.go:241）</text>
  <text x="826" y="202" font-size="9.5" fill="#8a6db3">合并 group 中间件 + 路由 handler</text>
  <text x="826" y="220" font-size="9.5" fill="#8a6db3">group 中间件在前</text>
  <text x="826" y="240" font-size="9.5" fill="#8a6db3">断言总数 &lt; abortIndex</text>

  <rect x="810" y="272" width="240" height="226" rx="13" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="930" y="294" font-size="11" font-weight="600" text-anchor="middle" fill="#1d1d1f">HandlersChain 切片</text>
  <rect x="826" y="308" width="208" height="40" rx="9" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="930" y="332" font-size="10" text-anchor="middle" fill="#5a3410">[0] Logger（组中间件）</text>
  <rect x="826" y="356" width="208" height="40" rx="9" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="930" y="380" font-size="10" text-anchor="middle" fill="#5a3410">[1] Auth（组中间件）</text>
  <rect x="826" y="404" width="208" height="40" rx="9" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="930" y="428" font-size="10" text-anchor="middle" fill="#12402a">[2] 业务 handler（在后）</text>
  <text x="930" y="470" font-size="9" text-anchor="middle" fill="#6e6e73">c.index 从 0 依次推进</text>
  <text x="930" y="486" font-size="9" text-anchor="middle" fill="#6e6e73">index++ 跑 [0]→[1]→[2]</text>

  <path d="M330,238 L345,238 L345,238 L358,238" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M780,318 L795,318 L795,328 L808,328" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="120" y="516" font-size="9.5" fill="#a1a1a6">为什么索引式：一个 int8 index 记录推进位置，Next 递增、下游跑完回中间件续跑；比嵌套闭包简单，状态就一个 index。</text>
</svg>
