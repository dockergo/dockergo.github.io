<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Gin 原理 · Context ① 结构</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">gin.Context（context.go:61）包一次请求全部状态——中间件、handler 都拿同一个 c 传状态、读请求、写响应</text>

  <!-- Context 外框 -->
  <rect x="30" y="72" width="1020" height="330" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="46" y="96" font-size="12.5" font-weight="700" fill="#12402a">gin.Context（context.go:61）</text>

  <!-- 请求/响应 -->
  <rect x="48" y="110" width="320" height="132" rx="11" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="208" y="132" font-size="10.5" font-weight="700" text-anchor="middle" fill="#12402a">请求 / 响应（:62）</text>
  <text x="64" y="156" font-size="9.2" fill="#2f6f4f"><tspan font-weight="600">writermem responseWriter</tspan></text>
  <text x="64" y="178" font-size="9.2" fill="#2f6f4f"><tspan font-weight="600">Request *http.Request</tspan></text>
  <text x="64" y="200" font-size="9.2" fill="#2f6f4f"><tspan font-weight="600">Writer ResponseWriter</tspan></text>
  <text x="64" y="222" font-size="8.5" fill="#a1a1a6">Writer 包 writermem,统一响应出口</text>

  <!-- 路由/链状态 -->
  <rect x="380" y="110" width="320" height="132" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="540" y="132" font-size="10.5" font-weight="700" text-anchor="middle" fill="#1b2a4a">路由 / 链状态（:66）</text>
  <text x="396" y="156" font-size="9.2" fill="#274a78"><tspan font-weight="600">Params</tspan>　路径参数（池化）</text>
  <text x="396" y="178" font-size="9.2" fill="#274a78"><tspan font-weight="600">handlers HandlersChain</tspan></text>
  <text x="396" y="200" font-size="9.2" fill="#274a78"><tspan font-weight="600">index int8</tspan>　链推进位置</text>
  <text x="396" y="222" font-size="9.2" fill="#274a78"><tspan font-weight="600">fullPath</tspan>　命中路由完整路径</text>

  <!-- 每请求状态 Keys -->
  <rect x="712" y="110" width="320" height="132" rx="11" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="872" y="132" font-size="10.5" font-weight="700" text-anchor="middle" fill="#5a3410">每请求状态</text>
  <text x="728" y="156" font-size="9.2" fill="#93762e"><tspan font-weight="600">Keys map[any]any</tspan>（:79）</text>
  <text x="728" y="176" font-size="8.6" fill="#93762e">c.Set/Get 存跨中间件数据</text>
  <text x="728" y="196" font-size="9.2" fill="#93762e"><tspan font-weight="600">mu sync.RWMutex</tspan>（:76）守并发</text>
  <text x="728" y="218" font-size="8.6" fill="#93762e">Errors · Accepted · queryCache/formCache</text>

  <!-- 回指 engine + 池化 scratch -->
  <rect x="48" y="256" width="984" height="126" rx="11" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="64" y="280" font-size="10.5" font-weight="700" fill="#2c5a3a">回指 engine + 池化 scratch（:71）</text>
  <text x="64" y="304" font-size="9.5" fill="#2f6f4f"><tspan font-weight="600">engine *Engine</tspan>　回指引擎（拿 pool / trees / 配置）</text>
  <text x="64" y="326" font-size="9.5" fill="#2f6f4f"><tspan font-weight="600">params *Params</tspan> · <tspan font-weight="600">skippedNodes</tspan>　池化 scratch（复用 backing array,匹配时暂存）</text>
  <text x="64" y="348" font-size="9" fill="#a1a1a6">Params/skippedNodes 容量由 Engine.maxParams/maxSections 预分配（注册期算好）</text>
  <text x="64" y="368" font-size="9" fill="#a1a1a6">一个 Context 贯穿请求始终:中间件 + handler 靠它传状态、读请求、写响应</text>

  <rect x="30" y="418" width="1020" height="66" rx="14" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="540" y="442" font-size="10.5" font-weight="700" text-anchor="middle" fill="#48484a">Context = 请求/响应 + 路由链状态 + Keys 跨件传值 + 回指 engine 与池化 scratch</text>
  <text x="540" y="464" font-size="9" text-anchor="middle" fill="#6e6e73">Keys 有 sync.RWMutex 守（误区：Keys 无并发问题）;由 sync.Pool 复用（见对象池篇）</text>
</svg>
