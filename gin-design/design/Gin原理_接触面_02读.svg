<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="530" viewBox="0 0 1080 530" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="530" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Gin 原理 · 接触面 ② Context 读请求</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">c 是请求统一入口——所有输入（路径 / 查询 / 体 / 头）都从 c 取</text>

  <!-- 路径参数 -->
  <rect x="30" y="72" width="330" height="118" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="94" font-size="11.5" font-weight="700" fill="#1b2a4a">路径参数</text>
  <text x="46" y="118" font-size="10" fill="#274a78"><tspan font-weight="600">c.Param("id")</tspan></text>
  <text x="46" y="140" font-size="9" fill="#5b7db1">取 radix 匹配提取的 :name 段</text>
  <text x="46" y="162" font-size="9" fill="#5b7db1">来自路由树 getValue 提参数</text>
  <text x="46" y="182" font-size="8.5" fill="#a1a1a6">/user/:id → c.Param("id")</text>

  <!-- 查询/表单 -->
  <rect x="375" y="72" width="330" height="118" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="391" y="94" font-size="11.5" font-weight="700" fill="#1b2a4a">查询 / 表单（带 cache）</text>
  <text x="391" y="118" font-size="10" fill="#274a78"><tspan font-weight="600">c.Query("q")</tspan>　取 URL ?q=</text>
  <text x="391" y="140" font-size="10" fill="#274a78"><tspan font-weight="600">c.PostForm("name")</tspan>　取表单</text>
  <text x="391" y="162" font-size="9" fill="#5b7db1">queryCache / formCache 首次解析后复用</text>
  <text x="391" y="182" font-size="8.5" fill="#a1a1a6">多次取同参数不重复解析</text>

  <!-- 绑定 -->
  <rect x="720" y="72" width="330" height="118" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="736" y="94" font-size="11.5" font-weight="700" fill="#3d2a5a">绑定到 struct</text>
  <text x="736" y="118" font-size="10" fill="#8a6db3"><tspan font-weight="600">c.Bind(&amp;obj)</tspan>　出错自动 400+Abort</text>
  <text x="736" y="140" font-size="10" fill="#8a6db3"><tspan font-weight="600">c.ShouldBind(&amp;obj)</tspan>　只返 error</text>
  <text x="736" y="162" font-size="9" fill="#8a6db3">按 Content-Type 自动绑 JSON/form/query</text>
  <text x="736" y="182" font-size="8.5" fill="#a1a1a6">实现见绑定篇（binding/）</text>

  <!-- 跨中间件传值 -->
  <rect x="30" y="210" width="500" height="118" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="46" y="232" font-size="11.5" font-weight="700" fill="#5a3410">跨中间件传值（Keys map，有锁）</text>
  <text x="46" y="256" font-size="10" fill="#93762e"><tspan font-weight="600">c.Set("key", v)</tspan> / <tspan font-weight="600">c.Get("key")</tspan></text>
  <text x="46" y="278" font-size="9" fill="#93762e">存 Keys map[any]any（context.go:79）</text>
  <text x="46" y="298" font-size="9" fill="#93762e">mu sync.RWMutex 守并发安全</text>
  <text x="46" y="318" font-size="8.5" fill="#a1a1a6">请求级数据（用户身份/traceID）用它,不用全局变量</text>

  <!-- 请求信息 -->
  <rect x="550" y="210" width="500" height="118" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="566" y="232" font-size="11.5" font-weight="700" fill="#1b2a4a">原始请求信息</text>
  <text x="566" y="256" font-size="10" fill="#274a78"><tspan font-weight="600">c.Request</tspan>　原始 *http.Request</text>
  <text x="566" y="278" font-size="10" fill="#274a78"><tspan font-weight="600">c.GetHeader</tspan> / <tspan font-weight="600">c.ClientIP</tspan></text>
  <text x="566" y="300" font-size="9" fill="#5b7db1">需要底层 net/http 请求对象时直取 c.Request</text>

  <!-- 底部：来源汇聚 -->
  <rect x="30" y="352" width="1020" height="88" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="540" y="376" font-size="12" font-weight="700" text-anchor="middle" fill="#12402a">gin.Context —— 请求输入统一入口</text>
  <text x="540" y="400" font-size="9.5" text-anchor="middle" fill="#2f6f4f">路径 c.Param · 查询 c.Query · 表单 c.PostForm · 体 c.Bind · 头 c.GetHeader · 跨件 c.Set/Get</text>
  <text x="540" y="420" font-size="9" text-anchor="middle" fill="#a1a1a6">:name 用 c.Param、?q= 用 c.Query——不同来源不同方法（误区：一样取）</text>

  <path d="M280,328 L280,352" stroke="#c7c7cc" stroke-width="1.3" fill="none" marker-end="url(#ar)"/>
  <path d="M800,328 L800,352" stroke="#c7c7cc" stroke-width="1.3" fill="none" marker-end="url(#ar)"/>

  <rect x="30" y="464" width="1020" height="30" rx="10" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="483" font-size="9" fill="#6e6e73">Bind vs ShouldBind：Bind 失败自动 400+Abort 写响应;要自定义错误响应用 ShouldBind（只返 error）</text>
</svg>
