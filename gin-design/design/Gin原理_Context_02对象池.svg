<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="510" viewBox="0 0 1080 510" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="510" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Gin 原理 · Context ② sync.Pool 对象池</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">Context 由 sync.Pool 复用（不是每请求 new）——高 QPS 下分配次数从"每请求一次"降到接近零</text>

  <!-- 池初始化 -->
  <rect x="30" y="72" width="500" height="128" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="94" font-size="11.5" font-weight="700" fill="#1b2a4a">池初始化：pool.New（gin.go:229）</text>
  <text x="46" y="118" font-size="9.3" fill="#274a78">engine.pool.New = func() any {</text>
  <text x="62" y="138" font-size="9.3" fill="#274a78">return engine.allocateContext(engine.maxParams) }</text>
  <text x="46" y="160" font-size="9" fill="#5b7db1">池空时才调 New 新建一个 Context</text>
  <text x="46" y="180" font-size="9" fill="#a1a1a6">New 在 New()/Default() 装好</text>

  <!-- allocateContext -->
  <rect x="550" y="72" width="500" height="128" rx="13" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="566" y="94" font-size="11.5" font-weight="700" fill="#2c5a3a">allocateContext（gin.go:252）预分配</text>
  <text x="566" y="118" font-size="9.5" fill="#2f6f4f">Params 预分配到 <tspan font-weight="600">maxParams</tspan> 容量</text>
  <text x="566" y="140" font-size="9.5" fill="#2f6f4f">skippedNodes 预分配到 <tspan font-weight="600">maxSections</tspan> 容量</text>
  <text x="566" y="162" font-size="9" fill="#5b8a6f">一次分配,请求间复用（容量由注册期算的 maxParams 定）</text>
  <text x="566" y="182" font-size="9" fill="#a1a1a6">请求期填充切片零重分配</text>

  <!-- ServeHTTP 循环 -->
  <rect x="30" y="224" width="1020" height="140" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="46" y="248" font-size="11.5" font-weight="700" fill="#12402a">请求流程 ServeHTTP（gin.go:662）· Get → reset → 处理 → Put</text>

  <rect x="60" y="264" width="210" height="80" rx="11" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="165" y="296" font-size="10" font-weight="700" text-anchor="middle" fill="#12402a">c := pool.Get()</text>
  <text x="165" y="316" font-size="8.6" text-anchor="middle" fill="#2f6f4f">取复用 Context</text>
  <text x="165" y="332" font-size="8.6" text-anchor="middle" fill="#2f6f4f">或池空时新建</text>

  <rect x="300" y="264" width="210" height="80" rx="11" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="405" y="296" font-size="10" font-weight="700" text-anchor="middle" fill="#12402a">reset()</text>
  <text x="405" y="316" font-size="8.6" text-anchor="middle" fill="#2f6f4f">清空复用状态</text>
  <text x="405" y="332" font-size="8.6" text-anchor="middle" fill="#2f6f4f">[:0] 复用底层数组</text>

  <rect x="540" y="264" width="210" height="80" rx="11" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="645" y="296" font-size="10" font-weight="700" text-anchor="middle" fill="#12402a">处理请求</text>
  <text x="645" y="316" font-size="8.6" text-anchor="middle" fill="#2f6f4f">树查 → 跑中间件链</text>
  <text x="645" y="332" font-size="8.6" text-anchor="middle" fill="#2f6f4f">→ handler 绑定/渲染</text>

  <rect x="780" y="264" width="210" height="80" rx="11" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="885" y="296" font-size="10" font-weight="700" text-anchor="middle" fill="#12402a">pool.Put(c)</text>
  <text x="885" y="316" font-size="8.6" text-anchor="middle" fill="#2f6f4f">还池</text>
  <text x="885" y="332" font-size="8.6" text-anchor="middle" fill="#2f6f4f">供下请求复用</text>

  <path d="M270,304 L300,304" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M510,304 L540,304" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M750,304 L780,304" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 为什么池 -->
  <rect x="30" y="388" width="1020" height="76" rx="14" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="540" y="412" font-size="12" font-weight="700" text-anchor="middle" fill="#48484a">为什么池 —— 高 QPS 下分配近零、GC 压力骤降</text>
  <text x="540" y="434" font-size="9.5" text-anchor="middle" fill="#6e6e73">每请求 new Context 会产生大量短命对象、GC 频繁;sync.Pool 复用一批,分配从"每请求一次"降到接近零</text>
  <text x="540" y="454" font-size="9" text-anchor="middle" fill="#a1a1a6">误区：每请求 new 一个 Context（实为池复用 Get/reset/Put）</text>

  <path d="M280,200 L280,224" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <path d="M800,200 L800,224" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
</svg>
