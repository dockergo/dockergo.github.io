<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Gin 中间件 Abort · 设 index=63 让 Next 循环停、后续 handler 不跑</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">abortIndex 是远大于任何合法链长的哨兵；一个值同时表达“停”和“已中断”——鉴权失败 AbortWithStatus(401) 后续业务不执行</text>

  <!-- 哨兵定义 -->
  <rect x="30" y="66" width="1020" height="52" rx="12" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="46" y="88" font-size="12" font-weight="600" fill="#4a1414">abortIndex = math.MaxInt8 &gt;&gt; 1 = 63（context.go:57）</text>
  <text x="46" y="107" font-size="10" fill="#7a2a2a">63 是“远大于任何合法链长”的哨兵——combineHandlers 断言链长 &lt; 63</text>

  <!-- 左：c.Abort 代码 -->
  <rect x="30" y="138" width="330" height="150" rx="13" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="46" y="162" font-size="12" font-weight="600" fill="#4a1414">c.Abort()（context.go:217）</text>
  <text x="46" y="188" font-size="10.5" fill="#7a2a2a">c.index = abortIndex</text>
  <text x="46" y="212" font-size="9.5" fill="#7a2a2a">Next 的 for c.index &lt; len 循环</text>
  <text x="46" y="230" font-size="9.5" fill="#7a2a2a">因 index(63) ≥ len 而停</text>
  <text x="46" y="252" font-size="9.5" fill="#7a2a2a">→ 后续 handler 不跑</text>
  <text x="46" y="274" font-size="9" fill="#a1a1a6">当前中间件 Abort 后代码仍执行（需自己 return）</text>

  <!-- 左下：IsAborted -->
  <rect x="30" y="304" width="330" height="120" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="328" font-size="12" font-weight="600" fill="#1b2a4a">IsAborted()（context.go:209）</text>
  <text x="46" y="352" font-size="10.5" fill="#274a78">return c.index &gt;= abortIndex</text>
  <text x="46" y="376" font-size="9.5" fill="#5b7db1">判 index ≥ 63 → 已中断</text>
  <text x="46" y="398" font-size="9.5" fill="#5b7db1">一个值同时表达“停” + “已中断”</text>

  <!-- 中：链推进演示 -->
  <rect x="390" y="138" width="330" height="286" rx="13" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="555" y="162" font-size="12" font-weight="600" text-anchor="middle" fill="#1d1d1f">鉴权失败 · 链在此中断</text>
  <rect x="410" y="176" width="290" height="42" rx="9" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="555" y="202" font-size="10.5" text-anchor="middle" fill="#12402a">[0] Logger　index=0 ✓ 跑</text>
  <rect x="410" y="226" width="290" height="52" rx="9" fill="#fbeaea" stroke="#e7c3c3"/>
  <text x="555" y="248" font-size="10.5" font-weight="600" text-anchor="middle" fill="#4a1414">[1] Auth　index=1 ✓ 跑</text>
  <text x="555" y="266" font-size="9.5" text-anchor="middle" fill="#7a2a2a">校验失败 → c.AbortWithStatus(401)</text>
  <rect x="410" y="286" width="290" height="42" rx="9" fill="#f7f7f9" stroke="#e0e0e6" stroke-dasharray="5 4"/>
  <text x="555" y="312" font-size="10.5" text-anchor="middle" fill="#a1a1a6">[2] 业务 handler　✗ 不跑</text>
  <text x="555" y="352" font-size="9.5" text-anchor="middle" fill="#7a2a2a">Abort 设 index=63</text>
  <text x="555" y="372" font-size="9.5" text-anchor="middle" fill="#7a2a2a">for c.index(63) &lt; len(3) 为假 → 停</text>
  <text x="555" y="400" font-size="9" text-anchor="middle" fill="#a1a1a6">index=63 远超 len，循环立即结束</text>

  <!-- 右：Abort 族方法 -->
  <rect x="750" y="138" width="300" height="286" rx="13" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="766" y="162" font-size="12" font-weight="600" fill="#4a1414">Abort 族方法</text>
  <rect x="766" y="176" width="268" height="52" rx="10" fill="#fff2f2" stroke="#e7c3c3"/>
  <text x="782" y="197" font-size="10" font-weight="600" fill="#4a1414">c.Abort()</text>
  <text x="782" y="216" font-size="9" fill="#7a2a2a">设 index=63 中断链（不写响应）</text>
  <rect x="766" y="236" width="268" height="52" rx="10" fill="#fff2f2" stroke="#e7c3c3"/>
  <text x="782" y="257" font-size="10" font-weight="600" fill="#4a1414">AbortWithStatus(code)</text>
  <text x="782" y="276" font-size="9" fill="#7a2a2a">写状态码 + 中断</text>
  <rect x="766" y="296" width="268" height="52" rx="10" fill="#fff2f2" stroke="#e7c3c3"/>
  <text x="782" y="317" font-size="10" font-weight="600" fill="#4a1414">AbortWithStatusJSON</text>
  <text x="782" y="336" font-size="9" fill="#7a2a2a">写 JSON 响应体 + 中断</text>
  <text x="766" y="372" font-size="9.5" fill="#7a2a2a">典型：鉴权中间件校验失败</text>
  <text x="766" y="392" font-size="9.5" fill="#7a2a2a">→ AbortWithStatus(401)</text>
  <text x="766" y="410" font-size="9" fill="#a1a1a6">Abort vs return：return 只结束当前，下游仍跑</text>

  <path d="M360,213 L375,213 L375,213 L388,213" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M720,252 L735,252 L735,252 L748,252" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="30" y="446" font-size="9.5" fill="#a1a1a6">为什么设 63 而非 len：63 是哨兵（链长断言 &lt; 63）；设 index=63 让循环立即停、且 IsAborted 可判——阻止后续用 Abort，单纯 return 不阻断已在跑的下游。</text>
</svg>
