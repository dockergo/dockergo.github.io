<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="510" viewBox="0 0 1080 510" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="510" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Gin RouterGroup · 结构与 Group（前缀 + 共享中间件 + 同一 engine）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">一个 group = 一个前缀 + 一组共享中间件 + 指向同一 engine；子组继承父组两者。Engine 嵌 RouterGroup 作根组</text>

  <!-- RouterGroup 结构 -->
  <rect x="30" y="70" width="330" height="200" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="94" font-size="12" font-weight="600" fill="#1b2a4a">RouterGroup（routergroup.go:55）</text>
  <rect x="46" y="108" width="298" height="34" rx="8" fill="#e7f0fb" stroke="#b9d2ef"/>
  <text x="60" y="130" font-size="10" fill="#274a78">Handlers HandlersChain　·　组中间件</text>
  <rect x="46" y="150" width="298" height="34" rx="8" fill="#e7f0fb" stroke="#b9d2ef"/>
  <text x="60" y="172" font-size="10" fill="#274a78">basePath string　·　前缀</text>
  <rect x="46" y="192" width="298" height="34" rx="8" fill="#e7f0fb" stroke="#b9d2ef"/>
  <text x="60" y="214" font-size="10" fill="#274a78">engine *Engine　·　指向引擎</text>
  <rect x="46" y="234" width="298" height="30" rx="8" fill="#e7f0fb" stroke="#b9d2ef"/>
  <text x="60" y="254" font-size="10" fill="#274a78">root bool　·　是否根组</text>

  <!-- Group 建子组 -->
  <rect x="390" y="70" width="330" height="200" rx="13" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="406" y="94" font-size="12" font-weight="600" fill="#2c5a3a">Group(prefix, handlers...)（:72）建子组</text>
  <text x="406" y="122" font-size="9.8" fill="#2f6f4f">Handlers: combineHandlers(handlers)</text>
  <text x="406" y="142" font-size="9.5" fill="#2f6f4f">　→ 前置父组中间件（继承）</text>
  <text x="406" y="166" font-size="9.8" fill="#2f6f4f">basePath: calculateAbsolutePath(prefix)</text>
  <text x="406" y="186" font-size="9.5" fill="#2f6f4f">　→ 拼父前缀（累积）</text>
  <text x="406" y="210" font-size="9.8" fill="#2f6f4f">engine: 共享同一 engine</text>
  <text x="406" y="240" font-size="9.5" fill="#a1a1a6">子组继承父组：前缀 + 中间件 + engine</text>

  <!-- returnObj -->
  <rect x="750" y="70" width="300" height="200" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="766" y="94" font-size="12" font-weight="600" fill="#1b2a4a">returnObj()（:254）</text>
  <text x="766" y="122" font-size="9.8" fill="#274a78">root 为真 → 返 engine</text>
  <text x="766" y="144" font-size="9.8" fill="#274a78">否则 → 返 group</text>
  <text x="766" y="170" font-size="9.5" fill="#5b7db1">支持链式调用</text>
  <text x="766" y="190" font-size="9.5" fill="#5b7db1">根组方法解析到 Engine</text>
  <text x="766" y="220" font-size="9" fill="#a1a1a6">engine.GET 就是根组的</text>
  <text x="766" y="240" font-size="9" fill="#a1a1a6">全局中间件用 engine.Use</text>

  <line x1="360" y1="150" x2="388" y2="150" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="720" y1="150" x2="748" y2="150" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Engine 嵌根组 -->
  <rect x="30" y="298" width="1020" height="110" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="46" y="322" font-size="12" font-weight="600" fill="#5a3410">Engine 嵌 RouterGroup（根组）</text>
  <text x="46" y="348" font-size="10" fill="#93762e">Engine struct 内嵌 RouterGroup：basePath = "/"、root = true</text>
  <text x="46" y="370" font-size="10" fill="#93762e">→ engine.GET / engine.POST 就是根组的方法（注册到 basePath "/"）</text>
  <text x="46" y="392" font-size="9.5" fill="#93762e">→ returnObj 在 root 时返 engine，支持链式；全局中间件用 engine.Use</text>

  <rect x="30" y="428" width="1020" height="64" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="450" font-size="11" font-weight="600" fill="#1d1d1f">一个 group = 前缀 + 共享中间件 + 同一 engine</text>
  <text x="46" y="472" font-size="9.5" fill="#6e6e73">子组继承父组前缀与中间件；Group 只是注册期组织（拼前缀 + 攒中间件），运行期仍是 radix 树匹配。</text>
</svg>
