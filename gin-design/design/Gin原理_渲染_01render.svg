<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="530" viewBox="0 0 1080 530" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="530" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Gin render · Render 接口与 c.Render 中枢（按类型选渲染器）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">每种响应格式一个 Render 实现、自己设 Content-Type + 序列化；c.JSON 等是便捷入口，统一走 c.Render 中枢</text>

  <!-- Render 接口 -->
  <rect x="30" y="70" width="300" height="118" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="46" y="94" font-size="12" font-weight="600" fill="#3d2a5a">Render 接口（render.go:10）</text>
  <text x="46" y="118" font-size="10" fill="#8a6db3">Render(w) error</text>
  <text x="46" y="138" font-size="10" fill="#8a6db3">WriteContentType(w)</text>
  <text x="46" y="162" font-size="9.5" fill="#8a6db3">每格式一实现，自设 Content-Type</text>
  <text x="46" y="180" font-size="9.5" fill="#8a6db3">+ 序列化</text>

  <!-- 实现族 -->
  <rect x="360" y="70" width="690" height="118" rx="13" fill="#f9f5fd" stroke="#e5d6f3" filter="url(#soft)"/>
  <text x="376" y="94" font-size="12" font-weight="600" fill="#3d2a5a">实现族（render.go:17）</text>
  <rect x="376" y="106" width="122" height="32" rx="8" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="437" y="127" font-size="10" text-anchor="middle" fill="#3d2a5a">JSON</text>
  <rect x="510" y="106" width="122" height="32" rx="8" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="571" y="127" font-size="10" text-anchor="middle" fill="#3d2a5a">XML</text>
  <rect x="644" y="106" width="122" height="32" rx="8" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="705" y="127" font-size="10" text-anchor="middle" fill="#3d2a5a">String</text>
  <rect x="778" y="106" width="122" height="32" rx="8" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="839" y="127" font-size="10" text-anchor="middle" fill="#3d2a5a">HTML</text>
  <rect x="912" y="106" width="122" height="32" rx="8" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="973" y="127" font-size="10" text-anchor="middle" fill="#3d2a5a">YAML</text>
  <rect x="376" y="146" width="122" height="32" rx="8" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="437" y="167" font-size="10" text-anchor="middle" fill="#3d2a5a">ProtoBuf</text>
  <rect x="510" y="146" width="122" height="32" rx="8" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="571" y="167" font-size="10" text-anchor="middle" fill="#3d2a5a">Redirect</text>
  <rect x="644" y="146" width="122" height="32" rx="8" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="705" y="167" font-size="10" text-anchor="middle" fill="#3d2a5a">Data</text>

  <line x1="330" y1="129" x2="358" y2="129" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- 中枢 c.Render -->
  <rect x="360" y="220" width="330" height="150" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="525" y="244" font-size="12" font-weight="600" text-anchor="middle" fill="#1b2a4a">c.Render(code, r)（context.go:1202）</text>
  <text x="376" y="270" font-size="9.8" fill="#274a78">① 设状态码</text>
  <text x="376" y="292" font-size="9.8" fill="#274a78">② body 允许则 r.Render(c.Writer)</text>
  <text x="376" y="314" font-size="9.8" fill="#274a78">③ 出错挂 c.Errors + Abort</text>
  <text x="376" y="340" font-size="9.5" fill="#5b7db1">渲染中枢：所有 c.JSON / c.XML 等走它</text>
  <text x="376" y="360" font-size="9" fill="#a1a1a6">统一入口，各 Render 实现负责格式细节</text>

  <!-- c.JSON 便捷入口 -->
  <rect x="30" y="220" width="300" height="150" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="46" y="244" font-size="12" font-weight="600" fill="#3d2a5a">c.JSON（便捷入口）</text>
  <text x="46" y="270" font-size="9.8" fill="#8a6db3">= c.Render(code, render.JSON{Data})</text>
  <text x="46" y="292" font-size="9.5" fill="#8a6db3">（context.go:1255）</text>
  <text x="46" y="314" font-size="9.5" fill="#8a6db3">设 application/json; charset=utf-8</text>
  <text x="46" y="336" font-size="9.5" fill="#8a6db3">（render/json.go:51）+ marshal</text>
  <text x="46" y="358" font-size="9" fill="#a1a1a6">c.XML/String/HTML 类似</text>

  <line x1="330" y1="295" x2="358" y2="295" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- 内容协商 -->
  <rect x="720" y="220" width="330" height="150" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="736" y="244" font-size="12" font-weight="600" fill="#12402a">c.Negotiate（context.go:1414）</text>
  <text x="736" y="270" font-size="9.8" fill="#2f6f4f">按 NegotiateFormat(offered...) 选</text>
  <text x="736" y="292" font-size="9.8" fill="#2f6f4f">JSON / HTML / XML（按 Accept 头）</text>
  <text x="736" y="316" font-size="9.5" fill="#2f6f4f">内容协商：一个 handler 多格式响应</text>
  <text x="736" y="344" font-size="9" fill="#a1a1a6">客户端 Accept 头决定返回格式</text>

  <rect x="30" y="392" width="1020" height="112" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="414" font-size="11" font-weight="600" fill="#1d1d1f">Content-Type set-once</text>
  <text x="46" y="436" font-size="9.5" fill="#6e6e73">writeContentType 只在头未设时写（render/render.go:37）——已设则不覆盖。</text>
  <text x="46" y="458" font-size="9.5" fill="#6e6e73">为什么渲染器抽象：每种响应格式一个 Render 实现、自己会设 Content-Type + 序列化；c.JSON 等是便捷入口，统一走 c.Render 中枢。</text>
  <text x="46" y="480" font-size="9.5" fill="#6e6e73">误区：c.JSON 不设 Content-Type —— render.JSON 自动设 application/json; charset=utf-8（set-once）。</text>
</svg>
