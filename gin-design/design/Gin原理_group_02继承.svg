<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="530" viewBox="0 0 1080 530" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="530" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Gin 前缀拼接与中间件继承 · 嵌套累积（层层继承）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">/api 组挂鉴权，组内所有路由（含嵌套子组）自动带鉴权——不用每路由重复挂；前缀同理省重复写</text>

  <!-- 前缀拼接 -->
  <rect x="30" y="70" width="500" height="120" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="94" font-size="12" font-weight="600" fill="#1b2a4a">前缀拼接 · calculateAbsolutePath（:250）</text>
  <text x="46" y="120" font-size="10" fill="#274a78">= joinPaths(group.basePath, relativePath)</text>
  <text x="46" y="142" font-size="9.8" fill="#274a78">子组路由绝对路径 = 父前缀 + 相对路径</text>
  <text x="46" y="166" font-size="9.5" fill="#5b7db1">api := r.Group("/api")；api.GET("/users") = /api/users</text>

  <!-- 中间件继承 -->
  <rect x="550" y="70" width="500" height="120" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="566" y="94" font-size="12" font-weight="600" fill="#5a3410">中间件继承 · combineHandlers（:241）</text>
  <text x="566" y="120" font-size="10" fill="#93762e">新建切片、父组 Handlers 在前 + 本次 handlers 在后</text>
  <text x="566" y="142" font-size="9.8" fill="#93762e">子组路由执行 [父组中间件… 子组中间件… handler]</text>
  <text x="566" y="166" font-size="9.5" fill="#93762e">父组挂鉴权 → 子组（含嵌套）自动带</text>

  <!-- 嵌套累积可视化 -->
  <text x="30" y="228" font-size="12" font-weight="600" fill="#1d1d1f">嵌套：v1 := api.Group("/v1") 再嵌——前缀累积 /api/v1，中间件层层继承</text>

  <rect x="30" y="244" width="1020" height="200" rx="14" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="52" y="268" font-size="11" font-weight="600" fill="#2c5a3a">根组 r （basePath "/"）</text>
  <text x="52" y="286" font-size="9" fill="#2f6f4f">全局中间件：Logger, Recovery</text>

  <rect x="90" y="296" width="920" height="132" rx="12" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="112" y="318" font-size="11" font-weight="600" fill="#5a3410">/api 组　+ AuthMiddleware（鉴权）</text>
  <text x="112" y="336" font-size="9" fill="#93762e">前缀累积：/api　·　中间件：[Logger, Recovery, Auth]</text>

  <rect x="150" y="346" width="820" height="70" rx="11" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="172" y="368" font-size="11" font-weight="600" fill="#5a3410">/v1 子组（api.Group("/v1")，继承鉴权）</text>
  <text x="172" y="386" font-size="9" fill="#93762e">前缀累积：/api/v1　·　中间件：[Logger, Recovery, Auth]（层层继承）</text>
  <rect x="200" y="392" width="720" height="20" rx="6" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="560" y="407" font-size="9" text-anchor="middle" fill="#12402a">v1.GET("/users") = GET /api/v1/users（自动带鉴权）</text>

  <rect x="30" y="462" width="1020" height="52" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="484" font-size="10.5" font-weight="600" fill="#1d1d1f">为什么继承：挂组级一次，组内所有路由（含嵌套）自动带——DRY</text>
  <text x="46" y="504" font-size="9.5" fill="#6e6e73">误区：组中间件顺序随意 —— 父组中间件在子组之前（combineHandlers 前置），执行序父→子→handler。</text>
</svg>
