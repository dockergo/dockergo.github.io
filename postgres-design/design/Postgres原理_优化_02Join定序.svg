<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="420" viewBox="0 0 1020 420"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="420" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Join 定序 · 表少用精确 DP，表多切换 GEQO（allpaths.c:3915）</text>

  <rect x="410" y="52" width="200" height="46" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="510" y="72" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">levels_needed 张表要连接</text>
  <text x="510" y="90" font-size="9" fill="#5b7db1" text-anchor="middle">enable_geqo &amp;&amp; ≥ geqo_threshold ?</text>

  <rect x="60" y="150" width="410" height="220" rx="14" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="78" y="174" font-size="12" font-weight="600" fill="#3c1361">表少（&lt; geqo_threshold，默认12）→ 精确 DP</text>
  <text x="78" y="198" font-size="10" fill="#7a5aa8">standard_join_search（allpaths.c:3918）</text>
  <rect x="78" y="212" width="374" height="44" rx="9" fill="#ffffff" stroke="#d9c9ef"/><text x="265" y="232" font-size="9.5" fill="#3c1361" text-anchor="middle">动态规划：按 join level 逐层构建</text><text x="265" y="248" font-size="8.5" fill="#7a5aa8" text-anchor="middle">2 表→3 表→…最优子结构复用</text>
  <rect x="78" y="264" width="374" height="44" rx="9" fill="#ffffff" stroke="#d9c9ef"/><text x="265" y="284" font-size="9.5" fill="#3c1361" text-anchor="middle">在搜索空间内保证找到最优顺序</text><text x="265" y="300" font-size="8.5" fill="#7a5aa8" text-anchor="middle">但复杂度随表数指数增长</text>
  <text x="78" y="336" font-size="9.5" fill="#a58fc9">适合绝大多数查询（Join 表数有限）</text>
  <text x="78" y="356" font-size="9" fill="#a58fc9">考虑索引/有序性/物理属性做剪枝</text>

  <rect x="550" y="150" width="410" height="220" rx="14" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="568" y="174" font-size="12" font-weight="600" fill="#7a4d00">表多（≥ geqo_threshold）→ GEQO 遗传算法</text>
  <text x="568" y="198" font-size="10" font-weight="600" fill="#9a7328">geqo/ 遗传查询优化</text>
  <rect x="568" y="212" width="374" height="44" rx="9" fill="#ffffff" stroke="#f0dcae"/><text x="755" y="232" font-size="9.5" fill="#7a4d00" text-anchor="middle">把 Join 顺序编码成"染色体"</text><text x="755" y="248" font-size="8.5" fill="#9a7328" text-anchor="middle">选择/交叉/变异迭代进化</text>
  <rect x="568" y="264" width="374" height="44" rx="9" fill="#ffffff" stroke="#f0dcae"/><text x="755" y="284" font-size="9.5" fill="#7a4d00" text-anchor="middle">不保证最优，但规划时间可控</text><text x="755" y="300" font-size="8.5" fill="#9a7328" text-anchor="middle">避免 DP 在大量表时爆炸</text>
  <text x="568" y="336" font-size="9.5" fill="#b8912e">多表大宽 Join（星型/雪花）时触发</text>
  <text x="568" y="356" font-size="9" fill="#b8912e">geqo_threshold 可调（默认 12）</text>

  <line x1="470" y1="98" x2="265" y2="150" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="330" y="130" font-size="9" fill="#0f5132">否</text>
  <line x1="550" y1="98" x2="755" y2="150" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="670" y="130" font-size="9" fill="#7a4d00">是</text>

  <rect x="30" y="384" width="960" height="0" fill="none"/>
  <text x="30" y="404" font-size="10" fill="#86868b">对照 DuckDB：DuckDB 也是"小 join DP、大 join 贪心近似"——同样的"精确 vs 近似按规模切换"思路，算法不同（GEQO 遗传 vs 贪心）。</text>
</svg>
