<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="430" viewBox="0 0 1020 430"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="430" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">DML 总览 · ModifyTable 驱动 heap 写 + 索引 + WAL + MVCC 版本</text>

  <!-- 三语句 -->
  <rect x="30" y="52" width="290" height="110" rx="12" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="175" y="76" font-size="12" font-weight="600" fill="#3c1361" text-anchor="middle">INSERT</text>
  <text x="175" y="98" font-size="9.5" fill="#7a5aa8" text-anchor="middle">heap_insert 追加新 tuple</text>
  <text x="175" y="116" font-size="9.5" fill="#7a5aa8" text-anchor="middle">t_xmin=当前事务</text>
  <text x="175" y="136" font-size="9" fill="#a58fc9" text-anchor="middle">heapam.c:2004</text>

  <rect x="360" y="52" width="290" height="110" rx="12" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="505" y="76" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">UPDATE</text>
  <text x="505" y="98" font-size="9.5" fill="#5b7db1" text-anchor="middle">旧 tuple 打 t_xmax=当前事务</text>
  <text x="505" y="116" font-size="9.5" fill="#5b7db1" text-anchor="middle">插入新版本 tuple（不就地改）</text>
  <text x="505" y="136" font-size="9" fill="#8fa9cf" text-anchor="middle">heapam.c:3201</text>

  <rect x="690" y="52" width="300" height="110" rx="12" fill="#fbeaea" stroke="#f0cccc"/>
  <text x="840" y="76" font-size="12" font-weight="600" fill="#7d1f1f" text-anchor="middle">DELETE</text>
  <text x="840" y="98" font-size="9.5" fill="#b06a6a" text-anchor="middle">tuple 打 t_xmax=当前事务</text>
  <text x="840" y="116" font-size="9.5" fill="#b06a6a" text-anchor="middle">不物理删除（留给 VACUUM）</text>
  <text x="840" y="136" font-size="9" fill="#c99" text-anchor="middle">heapam.c:2717</text>

  <!-- 统一路径 -->
  <rect x="30" y="184" width="960" height="100" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="208" font-size="12.5" font-weight="600" fill="#1d1d1f">统一走 ExecModifyTable（nodeModifyTable.c）</text>
  <rect x="48" y="224" width="215" height="44" rx="9" fill="#fff7e6" stroke="#f0dcae"/><text x="155" y="245" font-size="9.5" fill="#7a4d00" text-anchor="middle">① 改 heap page 里的 tuple</text><text x="155" y="261" font-size="8.5" fill="#9a7328" text-anchor="middle">在 shared_buffers 缓冲页上改</text>
  <rect x="271" y="224" width="215" height="44" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="378" y="245" font-size="9.5" fill="#0f5132" text-anchor="middle">② 写 WAL（先于刷盘）</text><text x="378" y="261" font-size="8.5" fill="#3f8f66" text-anchor="middle">崩溃可重放</text>
  <rect x="494" y="224" width="215" height="44" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="601" y="245" font-size="9.5" fill="#1b2a4a" text-anchor="middle">③ 更新索引</text><text x="601" y="261" font-size="8.5" fill="#5b7db1" text-anchor="middle">新 tuple 需新索引项（除非 HOT）</text>
  <rect x="717" y="224" width="255" height="44" rx="9" fill="#f4eefb" stroke="#d9c9ef"/><text x="844" y="245" font-size="9.5" fill="#3c1361" text-anchor="middle">④ 提交定 xid 可见性</text><text x="844" y="261" font-size="8.5" fill="#7a5aa8" text-anchor="middle">commit log(clog) 记事务状态</text>
  <line x1="263" y1="246" x2="271" y2="246" stroke="#c7c7cc" stroke-width="1.1" marker-end="url(#ar)"/>
  <line x1="486" y1="246" x2="494" y2="246" stroke="#c7c7cc" stroke-width="1.1" marker-end="url(#ar)"/>
  <line x1="709" y1="246" x2="717" y2="246" stroke="#c7c7cc" stroke-width="1.1" marker-end="url(#ar)"/>

  <!-- MVCC 关键 -->
  <rect x="30" y="300" width="600" height="112" rx="14" fill="#fbeaea" stroke="#f0cccc" filter="url(#soft)"/>
  <text x="48" y="324" font-size="12.5" font-weight="600" fill="#7d1f1f">关键：写不就地覆盖，而是造版本</text>
  <text x="48" y="348" font-size="10" fill="#b06a6a">UPDATE/DELETE 都不删旧数据——旧 tuple 打上删除事务 t_xmax 后仍在页里，</text>
  <text x="48" y="368" font-size="10" fill="#b06a6a">供还需要它的旧快照读；新版本另存。这就是 MVCC 的写侧形态。</text>
  <text x="48" y="392" font-size="10" fill="#b06a6a">代价：死元组堆积 → 表膨胀 → 靠 VACUUM 回收（见"事务与 MVCC"）。</text>

  <!-- 后台 -->
  <rect x="650" y="300" width="340" height="112" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="668" y="324" font-size="12" font-weight="600" fill="#0f5132">写路径的后续</text>
  <text x="668" y="348" font-size="9.5" fill="#3f8f66">· 脏页留在缓冲池，checkpointer/bgwriter 异步刷盘</text>
  <text x="668" y="368" font-size="9.5" fill="#3f8f66">· 死元组由 autovacuum 回收并更新 FSM/VM</text>
  <text x="668" y="388" font-size="9.5" fill="#3f8f66">· 提交仅需 WAL 落盘 fsync，数据页可稍后刷</text>
</svg>
