<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="430" viewBox="0 0 1020 430"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="430" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">先写日志（WAL）· 改动先落日志、数据页后刷（access/transam/xlog*.c）</text>

  <!-- 写路径 -->
  <rect x="30" y="56" width="960" height="170" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="80" font-size="12.5" font-weight="600" fill="#1d1d1f">一次修改的持久化路径</text>
  <rect x="48" y="96" width="200" height="70" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="148" y="120" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">① 改缓冲池里的页</text><text x="148" y="140" font-size="8.5" fill="#3f8f66" text-anchor="middle">shared_buffers 中标脏</text><text x="148" y="156" font-size="8.5" fill="#3f8f66" text-anchor="middle">未落盘</text>
  <rect x="268" y="96" width="220" height="70" rx="10" fill="#fff7e6" stroke="#f0dcae"/><text x="378" y="120" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">② 生成 WAL 记录</text><text x="378" y="140" font-size="8.5" fill="#9a7328" text-anchor="middle">XLogInsert（xloginsert.c:482）</text><text x="378" y="156" font-size="8.5" fill="#9a7328" text-anchor="middle">描述"改了什么"</text>
  <rect x="508" y="96" width="220" height="70" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="618" y="120" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">③ 提交时 WAL 落盘</text><text x="618" y="140" font-size="8.5" fill="#5b7db1" text-anchor="middle">fsync 到 pg_wal/</text><text x="618" y="156" font-size="8.5" fill="#5b7db1" text-anchor="middle">此刻才算"持久"</text>
  <rect x="748" y="96" width="222" height="70" rx="10" fill="#f4eefb" stroke="#d9c9ef"/><text x="859" y="120" font-size="10" font-weight="600" fill="#3c1361" text-anchor="middle">④ 脏数据页稍后刷</text><text x="859" y="140" font-size="8.5" fill="#7a5aa8" text-anchor="middle">bgwriter/checkpointer</text><text x="859" y="156" font-size="8.5" fill="#7a5aa8" text-anchor="middle">异步、批量</text>
  <line x1="248" y1="131" x2="268" y2="131" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="488" y1="131" x2="508" y2="131" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="728" y1="131" x2="748" y2="131" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="48" y="196" font-size="10" fill="#494950">WAL 规则：数据页刷盘前，描述该修改的 WAL 必须已落盘（write-ahead）——保证崩溃可重放。</text>
  <text x="48" y="216" font-size="9.5" fill="#86868b">提交只需 WAL 顺序写 + fsync（快），数据页随机写可推迟——把随机写摊平成顺序写。</text>

  <!-- checkpoint -->
  <rect x="30" y="242" width="960" height="180" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="48" y="266" font-size="12.5" font-weight="600" fill="#0f5132">Checkpoint · 把脏页落盘、推进 redo 点（xlog.c，CheckPointGuts:703）</text>
  <rect x="48" y="282" width="290" height="70" rx="10" fill="#ffffff" stroke="#bce6cd"/><text x="193" y="306" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">刷所有脏页到数据文件</text><text x="193" y="326" font-size="8.5" fill="#3f8f66" text-anchor="middle">此前的 WAL 不再需要用于恢复</text><text x="193" y="342" font-size="8.5" fill="#3f8f66" text-anchor="middle">可回收/归档旧 WAL 段</text>
  <rect x="354" y="282" width="290" height="70" rx="10" fill="#ffffff" stroke="#bce6cd"/><text x="499" y="306" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">记录 redo 点</text><text x="499" y="326" font-size="8.5" fill="#3f8f66" text-anchor="middle">崩溃恢复从此点开始重放</text><text x="499" y="342" font-size="8.5" fill="#3f8f66" text-anchor="middle">越近恢复越快</text>
  <rect x="660" y="282" width="310" height="70" rx="10" fill="#fff7e6" stroke="#f0dcae"/><text x="815" y="306" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">触发时机</text><text x="815" y="326" font-size="8.5" fill="#9a7328" text-anchor="middle">checkpoint_timeout / max_wal_size(默1GB)</text><text x="815" y="342" font-size="8.5" fill="#9a7328" text-anchor="middle">越频繁恢复越快但刷盘压力越大</text>
  <text x="48" y="384" font-size="9.5" fill="#3f8f66">权衡：checkpoint 稀疏 → WAL 堆积、恢复慢；过密 → 频繁刷盘、IO 抖动。full_page_writes 防页部分写。</text>
  <text x="48" y="406" font-size="9" fill="#5aa06f">max_wal_size_mb 默认 1024（xlog.c:121）；checkpoint_completion_target 把刷盘摊平到周期内。</text>
</svg>
