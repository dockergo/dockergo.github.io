<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="440" viewBox="0 0 1020 440"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">DCL 总览 · 四道关卡：连接认证 → 角色 → 对象权限 → 行级安全</text>

  <rect x="30" y="60" width="225" height="130" rx="12" fill="#fbeaea" stroke="#f0cccc"/>
  <text x="142" y="86" font-size="11.5" font-weight="600" fill="#7d1f1f" text-anchor="middle">① 认证 AuthN</text>
  <text x="142" y="110" font-size="9.5" fill="#b06a6a" text-anchor="middle">pg_hba.conf 匹配</text>
  <text x="142" y="128" font-size="9.5" fill="#b06a6a" text-anchor="middle">host/user/db/method</text>
  <text x="142" y="148" font-size="9.5" fill="#b06a6a" text-anchor="middle">scram/md5/peer/ldap…</text>
  <text x="142" y="170" font-size="8.5" fill="#c99" text-anchor="middle">你是谁？libpq/hba.c</text>

  <rect x="271" y="60" width="225" height="130" rx="12" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="383" y="86" font-size="11.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">② 角色 Role</text>
  <text x="383" y="110" font-size="9.5" fill="#5b7db1" text-anchor="middle">用户 = 角色（pg_authid）</text>
  <text x="383" y="128" font-size="9.5" fill="#5b7db1" text-anchor="middle">角色可继承成员关系</text>
  <text x="383" y="148" font-size="9.5" fill="#5b7db1" text-anchor="middle">LOGIN/SUPERUSER 等属性</text>
  <text x="383" y="170" font-size="8.5" fill="#8fa9cf" text-anchor="middle">你属于哪些组？commands/user.c</text>

  <rect x="512" y="60" width="225" height="130" rx="12" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="624" y="86" font-size="11.5" font-weight="600" fill="#0f5132" text-anchor="middle">③ 对象权限 AuthZ</text>
  <text x="624" y="110" font-size="9.5" fill="#3f8f66" text-anchor="middle">GRANT/REVOKE → ACL</text>
  <text x="624" y="128" font-size="9.5" fill="#3f8f66" text-anchor="middle">SELECT/INSERT/… on 表/列</text>
  <text x="624" y="148" font-size="9.5" fill="#3f8f66" text-anchor="middle">存 pg_class.relacl 等</text>
  <text x="624" y="170" font-size="8.5" fill="#5aa06f" text-anchor="middle">能对该对象做什么？aclchk.c</text>

  <rect x="753" y="60" width="237" height="130" rx="12" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="871" y="86" font-size="11.5" font-weight="600" fill="#3c1361" text-anchor="middle">④ 行级安全 RLS</text>
  <text x="871" y="110" font-size="9.5" fill="#7a5aa8" text-anchor="middle">POLICY 谓词注入查询</text>
  <text x="871" y="128" font-size="9.5" fill="#7a5aa8" text-anchor="middle">按行过滤可见/可改</text>
  <text x="871" y="148" font-size="9.5" fill="#7a5aa8" text-anchor="middle">rewrite 期加 WHERE</text>
  <text x="871" y="170" font-size="8.5" fill="#a58fc9" text-anchor="middle">能看哪些行？rls.c</text>

  <line x1="255" y1="125" x2="271" y2="125" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="496" y1="125" x2="512" y2="125" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="737" y1="125" x2="753" y2="125" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <rect x="30" y="212" width="960" height="90" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="236" font-size="12.5" font-weight="600" fill="#1d1d1f">与 DuckDB 的关键差异</text>
  <text x="48" y="260" font-size="10.5" fill="#494950">DuckDB 嵌入式无多用户权限；PostgreSQL 作为服务器有<tspan font-weight="600"> 完整四层权限体系</tspan>——这是数据库多租户/合规的基石。</text>
  <text x="48" y="282" font-size="10.5" fill="#494950">前两层（认证+角色）回答"你是谁、属于谁"，后两层（对象权限+RLS）回答"你能对什么、看哪些行"。</text>

  <rect x="30" y="318" width="960" height="96" rx="14" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="48" y="342" font-size="12" font-weight="600" fill="#1b2a4a">检查时机</text>
  <text x="48" y="366" font-size="10" fill="#5b7db1">· 认证：连接建立时（backend 启动早期）　· 角色：会话建立与 SET ROLE 时</text>
  <text x="48" y="388" font-size="10" fill="#5b7db1">· 对象权限：查询编译/执行期按 ACL 校验　· RLS：rewrite 期把策略谓词注入查询树</text>
  <text x="48" y="408" font-size="9" fill="#8fa9cf">任一关卡不过 → 拒绝（认证失败 / permission denied / 行不可见）</text>
</svg>
