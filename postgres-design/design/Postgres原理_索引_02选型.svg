<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="400" viewBox="0 0 1020 400"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="400" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">索引选型决策 · 按查询形态与数据特征选</text>

  <rect x="410" y="52" width="200" height="42" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="510" y="72" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">要加什么索引？</text>
  <text x="510" y="88" font-size="9" fill="#5b7db1" text-anchor="middle">看查询谓词 + 列类型</text>

  <rect x="30" y="140" width="180" height="100" rx="12" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="120" y="164" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">等值 + 范围 + 排序</text>
  <text x="120" y="188" font-size="9.5" fill="#3f8f66" text-anchor="middle">→ B-tree</text>
  <text x="120" y="210" font-size="8.5" fill="#5aa06f" text-anchor="middle">默认首选，覆盖 90% 场景</text>
  <text x="120" y="228" font-size="8.5" fill="#5aa06f" text-anchor="middle">= &lt; &gt; BETWEEN ORDER BY</text>

  <rect x="228" y="140" width="180" height="100" rx="12" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="318" y="164" font-size="10" font-weight="600" fill="#3c1361" text-anchor="middle">包含/成员/全文</text>
  <text x="318" y="188" font-size="9.5" fill="#7a5aa8" text-anchor="middle">→ GIN</text>
  <text x="318" y="210" font-size="8.5" fill="#a58fc9" text-anchor="middle">jsonb @&gt; / 数组 @&gt;</text>
  <text x="318" y="228" font-size="8.5" fill="#a58fc9" text-anchor="middle">tsvector 全文检索</text>

  <rect x="426" y="140" width="180" height="100" rx="12" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="516" y="164" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">几何/范围/KNN</text>
  <text x="516" y="188" font-size="9.5" fill="#9a7328" text-anchor="middle">→ GiST / SP-GiST</text>
  <text x="516" y="210" font-size="8.5" fill="#b8912e" text-anchor="middle">地理位置、范围重叠</text>
  <text x="516" y="228" font-size="8.5" fill="#b8912e" text-anchor="middle">最近邻排序</text>

  <rect x="624" y="140" width="180" height="100" rx="12" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="714" y="164" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">超大 + 物理有序</text>
  <text x="714" y="188" font-size="9.5" fill="#5b7db1" text-anchor="middle">→ BRIN</text>
  <text x="714" y="210" font-size="8.5" fill="#8fa9cf" text-anchor="middle">时序/日志按时间递增</text>
  <text x="714" y="228" font-size="8.5" fill="#8fa9cf" text-anchor="middle">索引极小、省空间</text>

  <rect x="822" y="140" width="168" height="100" rx="12" fill="#fbeaea" stroke="#f0cccc"/>
  <text x="906" y="164" font-size="10" font-weight="600" fill="#7d1f1f" text-anchor="middle">纯等值、无序无范围</text>
  <text x="906" y="188" font-size="9.5" fill="#b06a6a" text-anchor="middle">→ Hash（少用）</text>
  <text x="906" y="210" font-size="8.5" fill="#c99" text-anchor="middle">多数仍用 btree</text>

  <line x1="470" y1="94" x2="120" y2="140" stroke="#c7c7cc" stroke-width="1.1" marker-end="url(#ar)"/>
  <line x1="490" y1="94" x2="318" y2="140" stroke="#c7c7cc" stroke-width="1.1" marker-end="url(#ar)"/>
  <line x1="510" y1="94" x2="516" y2="140" stroke="#c7c7cc" stroke-width="1.1" marker-end="url(#ar)"/>
  <line x1="530" y1="94" x2="714" y2="140" stroke="#c7c7cc" stroke-width="1.1" marker-end="url(#ar)"/>
  <line x1="560" y1="94" x2="906" y2="140" stroke="#c7c7cc" stroke-width="1.1" marker-end="url(#ar)"/>

  <rect x="30" y="266" width="960" height="60" rx="12" fill="#f6f6f8" stroke="#e2e2e7"/>
  <text x="510" y="290" font-size="10.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">正交能力：partial（带 WHERE 只索引部分行）· expression（索引函数结果）· 多列（复合）· 唯一（约束）· covering(INCLUDE)</text>
  <text x="510" y="312" font-size="9.5" fill="#6a6a70" text-anchor="middle">这些可叠加在上述任一索引类型上</text>

  <rect x="30" y="336" width="960" height="52" rx="12" fill="#fbeaea" stroke="#f0cccc"/>
  <text x="510" y="366" font-size="10" fill="#7d1f1f" text-anchor="middle">代价：每个索引都要随 DML 维护（写放大）+ 占空间 + VACUUM 清理——按真实查询建，勿滥建</text>
</svg>
