<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="880" viewBox="0 0 1020 880"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="880" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">PostgreSQL 总架构 · postmaster + 每连接 backend + 共享内存 + 辅助进程</text>

  <!-- clients -->
  <rect x="30" y="50" width="960" height="56" rx="12" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)" data-tid="Postgres原理_DCL数据控制" data-lab="客户端/DCL"/>
  <text x="48" y="74" font-size="12" font-weight="600" fill="#3c1361">客户端（libpq / JDBC / psql …）</text>
  <text x="48" y="94" font-size="9.5" fill="#7a5aa8">经 TCP/Unix socket 连接，走 PostgreSQL 前后端协议</text>

  <!-- postmaster -->
  <rect x="30" y="122" width="300" height="150" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)" data-tid="Postgres原理_支撑_进程与内存架构" data-lab="postmaster"/>
  <text x="48" y="146" font-size="12" font-weight="600" fill="#1b2a4a">postmaster（守护进程）</text>
  <text x="48" y="166" font-size="9" fill="#5b7db1">postmaster.c · ServerLoop:1678</text>
  <rect x="48" y="176" width="264" height="34" rx="8" fill="#ffffff" stroke="#bcd0ec"/><text x="180" y="198" font-size="9.5" fill="#1b2a4a" text-anchor="middle">监听端口 · 接受连接</text>
  <rect x="48" y="216" width="264" height="34" rx="8" fill="#ffffff" stroke="#bcd0ec"/><text x="180" y="238" font-size="9.5" fill="#1b2a4a" text-anchor="middle">每连接 fork 一 backend（:3576）</text>
  <text x="48" y="264" font-size="9" fill="#8fa9cf">不处理 SQL，只管控与派生</text>

  <!-- backends -->
  <rect x="350" y="122" width="380" height="150" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)" data-tid="Postgres原理_支撑_进程与内存架构" data-lab="backend进程"/>
  <text x="368" y="146" font-size="12" font-weight="600" fill="#1d1d1f">backend 进程（每连接一个，处理 SQL）</text>
  <rect x="368" y="160" width="170" height="46" rx="8" fill="#f4eefb" stroke="#d9c9ef"/><text x="453" y="180" font-size="9.5" fill="#3c1361" text-anchor="middle">backend #1</text><text x="453" y="196" font-size="8" fill="#7a5aa8" text-anchor="middle">跑查询流水线</text>
  <rect x="548" y="160" width="170" height="46" rx="8" fill="#f4eefb" stroke="#d9c9ef"/><text x="633" y="180" font-size="9.5" fill="#3c1361" text-anchor="middle">backend #2 … #N</text><text x="633" y="196" font-size="8" fill="#7a5aa8" text-anchor="middle">进程隔离</text>
  <text x="368" y="228" font-size="9" fill="#5b7db1">每 backend 独立地址空间 + 私有内存（work_mem）</text>
  <text x="368" y="246" font-size="9" fill="#5b7db1">经共享内存协作；崩溃隔离在单连接</text>
  <text x="368" y="264" font-size="9" fill="#8fa9cf">进程级并发（非线程）——稳定但连接开销大，常配连接池</text>

  <!-- aux -->
  <rect x="750" y="122" width="240" height="150" rx="14" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)" data-tid="Postgres原理_支撑_WAL与恢复复制" data-lab="辅助进程"/>
  <text x="768" y="146" font-size="12" font-weight="600" fill="#7a4d00">辅助进程</text>
  <rect x="768" y="158" width="204" height="26" rx="7" fill="#ffffff" stroke="#f0dcae"/><text x="870" y="176" font-size="9" fill="#7a4d00" text-anchor="middle">checkpointer / bgwriter</text>
  <rect x="768" y="190" width="204" height="26" rx="7" fill="#ffffff" stroke="#f0dcae"/><text x="870" y="208" font-size="9" fill="#7a4d00" text-anchor="middle">walwriter / autovacuum</text>
  <rect x="768" y="222" width="204" height="26" rx="7" fill="#ffffff" stroke="#f0dcae"/><text x="870" y="240" font-size="9" fill="#7a4d00" text-anchor="middle">startup / walsender / archiver</text>
  <text x="768" y="264" font-size="8.5" fill="#9a7328">backend/postmaster/*.c</text>

  <!-- query pipeline -->
  <rect x="30" y="288" width="700" height="150" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="312" font-size="12.5" font-weight="600" fill="#1d1d1f">backend 内的查询流水线（tcop/postgres.c · exec_simple_query:1030）</text>
  <rect x="48" y="328" width="120" height="52" rx="9" fill="#f4eefb" stroke="#d9c9ef" data-tid="Postgres原理_DQL数据查询" data-lab="Parser"/><text x="108" y="350" font-size="9.5" font-weight="600" fill="#3c1361" text-anchor="middle">Parser</text><text x="108" y="368" font-size="8" fill="#7a5aa8" text-anchor="middle">SQL→raw tree :617</text>
  <rect x="184" y="328" width="140" height="52" rx="9" fill="#eef3fb" stroke="#bcd0ec" data-tid="Postgres原理_DQL数据查询" data-lab="Analyzer+Rewriter"/><text x="254" y="348" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Analyzer+Rewriter</text><text x="254" y="366" font-size="8" fill="#5b7db1" text-anchor="middle">→query tree :1213</text>
  <rect x="340" y="328" width="140" height="52" rx="9" fill="#eef3fb" stroke="#bcd0ec" data-tid="Postgres原理_支撑_查询优化器" data-lab="Planner/Optimizer"/><text x="410" y="348" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Planner/Optimizer</text><text x="410" y="366" font-size="8" fill="#5b7db1" text-anchor="middle">→plan tree :1216</text>
  <rect x="496" y="328" width="216" height="52" rx="9" fill="#eafaf1" stroke="#bce6cd" data-tid="Postgres原理_支撑_执行引擎" data-lab="Executor"/><text x="604" y="348" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">Executor（Portal）</text><text x="604" y="366" font-size="8" fill="#3f8f66" text-anchor="middle">PortalRun 逐行拉取 :1297</text>
  <line x1="168" y1="354" x2="184" y2="354" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="324" y1="354" x2="340" y2="354" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="480" y1="354" x2="496" y2="354" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="48" y="402" font-size="9" fill="#86868b">贯穿示例：SELECT u.name,count(o.id) FROM users u JOIN orders o ON o.user_id=u.id WHERE u.city='NYC' GROUP BY u.name ORDER BY 2 DESC LIMIT 10;</text>
  <text x="48" y="424" font-size="9" fill="#86868b">读写数据经共享内存 buffer pool，改动先写 WAL。</text>

  <!-- shared memory -->
  <rect x="750" y="288" width="240" height="150" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="768" y="312" font-size="12" font-weight="600" fill="#0f5132">共享内存</text>
  <rect x="768" y="324" width="204" height="26" rx="7" fill="#ffffff" stroke="#bce6cd" data-tid="Postgres原理_支撑_存储引擎" data-lab="shared_buffers"/><text x="870" y="342" font-size="9" fill="#0f5132" text-anchor="middle">shared_buffers 缓冲池</text>
  <rect x="768" y="356" width="204" height="26" rx="7" fill="#ffffff" stroke="#bce6cd" data-tid="Postgres原理_支撑_WAL与恢复复制" data-lab="WAL buffers"/><text x="870" y="374" font-size="9" fill="#0f5132" text-anchor="middle">WAL buffers</text>
  <rect x="768" y="388" width="204" height="26" rx="7" fill="#ffffff" stroke="#bce6cd" data-tid="Postgres原理_支撑_并发控制与锁" data-lab="锁表/ProcArray/快照"/><text x="870" y="406" font-size="9" fill="#0f5132" text-anchor="middle">锁表 / ProcArray / 快照</text>
  <text x="768" y="430" font-size="8.5" fill="#3f8f66">所有进程共享的协作区</text>

  <!-- storage -->
  <rect x="30" y="454" width="960" height="200" rx="14" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="48" y="478" font-size="12.5" font-weight="600" fill="#7a4d00">存储层 · 磁盘（自管，PGDATA 目录）</text>
  <rect x="48" y="494" width="300" height="146" rx="11" fill="#ffffff" stroke="#f0dcae" data-tid="Postgres原理_支撑_存储引擎" data-lab="数据文件heap"/>
  <text x="198" y="516" font-size="11" font-weight="600" fill="#7a4d00" text-anchor="middle">数据文件（行存 heap）</text>
  <text x="198" y="538" font-size="9.5" fill="#9a7328" text-anchor="middle">每表 = 一组 8KB page 文件</text>
  <text x="198" y="558" font-size="9.5" fill="#9a7328" text-anchor="middle">page 内多个 tuple（含 xmin/xmax）</text>
  <text x="198" y="578" font-size="9.5" fill="#9a7328" text-anchor="middle">大值走 TOAST 表</text>
  <text x="198" y="598" font-size="9.5" fill="#9a7328" text-anchor="middle">FSM 空闲空间 · VM 可见性图</text>
  <text x="198" y="620" font-size="9.5" fill="#9a7328" text-anchor="middle">索引单独文件（btree 等）</text>
  <rect x="364" y="494" width="300" height="146" rx="11" fill="#ffffff" stroke="#f0dcae" data-tid="Postgres原理_支撑_WAL与恢复复制" data-lab="WAL/pg_wal"/>
  <text x="514" y="516" font-size="11" font-weight="600" fill="#7a4d00" text-anchor="middle">WAL（pg_wal/）</text>
  <text x="514" y="538" font-size="9.5" fill="#9a7328" text-anchor="middle">先写日志：任何改动先落 WAL</text>
  <text x="514" y="558" font-size="9.5" fill="#9a7328" text-anchor="middle">checkpoint 把脏页刷进数据文件</text>
  <text x="514" y="578" font-size="9.5" fill="#9a7328" text-anchor="middle">崩溃时 startup 进程回放 WAL 恢复</text>
  <text x="514" y="598" font-size="9.5" fill="#9a7328" text-anchor="middle">流复制：WAL 传给备库回放</text>
  <rect x="680" y="494" width="290" height="146" rx="11" fill="#ffffff" stroke="#f0dcae" data-tid="Postgres原理_支撑_索引方法" data-lab="系统目录/access method"/>
  <text x="825" y="516" font-size="11" font-weight="600" fill="#7a4d00" text-anchor="middle">系统目录（pg_catalog）</text>
  <text x="825" y="538" font-size="9.5" fill="#9a7328" text-anchor="middle">元数据本身也是表</text>
  <text x="825" y="558" font-size="9.5" fill="#9a7328" text-anchor="middle">pg_class/pg_attribute/pg_statistic…</text>
  <text x="825" y="578" font-size="9.5" fill="#9a7328" text-anchor="middle">relcache/syscache 缓存加速</text>
  <text x="825" y="598" font-size="9.5" fill="#9a7328" text-anchor="middle">可扩展：extension / 索引类型</text>

  <line x1="180" y1="106" x2="180" y2="122" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="330" y1="197" x2="350" y2="185" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="332" y="180" font-size="8" fill="#86868b">fork</text>
  <line x1="500" y1="438" x2="500" y2="454" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- 接口/保障主线带（下钻）：DML 写路径 · 事务MVCC · DDL 定义 -->
  <text x="30" y="680" font-size="11.5" font-weight="600" fill="#86868b">接口与保障主线（可下钻）</text>

  <!-- DML 数据写入（贴近数据文件 heap 列） -->
  <rect x="30" y="694" width="310" height="176" rx="12" fill="#e9f6fb" stroke="#b8dcec" filter="url(#soft)" data-tid="Postgres原理_DML数据写入" data-lab="DML写入"/>
  <text x="48" y="718" font-size="11" font-weight="700" fill="#0b4a63">DML 数据写入（INSERT/UPDATE/DELETE）</text>
  <text x="48" y="740" font-size="8.5" fill="#3f7f99">ExecModifyTable 驱动三类写</text>
  <text x="48" y="758" font-size="8.5" fill="#3f7f99">INSERT 追加新 tuple · UPDATE/DELETE 打 t_xmax</text>
  <text x="48" y="776" font-size="8.5" fill="#3f7f99">改缓冲页 → 先写 WAL → 维护索引（HOT 可省）</text>
  <text x="48" y="794" font-size="8.5" fill="#3f7f99">提交经 clog 定可见 · 死元组留 VACUUM 回收</text>
  <text x="48" y="856" font-size="8" fill="#6fa3b8">executor/nodeModifyTable.c · heapam.c:2004/3201/2717</text>

  <!-- 事务与 MVCC（贴近 WAL 列，管版本可见性） -->
  <rect x="356" y="694" width="310" height="176" rx="12" fill="#fdeef3" stroke="#f0c9d8" filter="url(#soft)" data-tid="Postgres原理_支撑_事务与MVCC" data-lab="事务/MVCC"/>
  <text x="374" y="718" font-size="11" font-weight="700" fill="#8a1f45">事务与 MVCC（多版本并发）</text>
  <text x="374" y="740" font-size="8.5" fill="#b3547a">快照 xmin/xmax/xip（GetSnapshotData）</text>
  <text x="374" y="758" font-size="8.5" fill="#b3547a">每行 t_xmin/t_xmax + CLOG 判可见性</text>
  <text x="374" y="776" font-size="8.5" fill="#b3547a">读写互不阻塞 · RC/RR/Serializable 三隔离级</text>
  <text x="374" y="794" font-size="8.5" fill="#b3547a">VACUUM 回收死元组 + 冻结防 XID 回卷</text>
  <text x="374" y="856" font-size="8" fill="#c98ba6">heapam_visibility.c:917 · procarray.c · vacuumlazy.c</text>

  <!-- DDL 数据定义（贴近系统目录列，改元数据表） -->
  <rect x="682" y="694" width="308" height="176" rx="12" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)" data-tid="Postgres原理_DDL数据定义" data-lab="DDL定义"/>
  <text x="700" y="718" font-size="11" font-weight="700" fill="#3c1361">DDL 数据定义（CREATE/ALTER/DROP）</text>
  <text x="700" y="740" font-size="8.5" fill="#7a5aa8">ProcessUtility 分派 commands/ 处理器</text>
  <text x="700" y="758" font-size="8.5" fill="#7a5aa8">取锁 → 改系统目录表行（CatalogTupleInsert）</text>
  <text x="700" y="776" font-size="8.5" fill="#7a5aa8">建物理文件 · 记 pg_depend · 写 WAL</text>
  <text x="700" y="794" font-size="8.5" fill="#7a5aa8">目录即表 复用 MVCC/WAL · 随事务原子提交</text>
  <text x="700" y="856" font-size="8" fill="#9d84c4">tcop/utility.c · commands/*.c · catalog/</text>

  <!-- 存储层 → 主线带 支撑连线 -->
  <line x1="185" y1="654" x2="185" y2="694" stroke="#c7c7cc" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="192" y="676" font-size="8" fill="#86868b">写 heap</text>
  <line x1="511" y1="654" x2="511" y2="694" stroke="#c7c7cc" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="518" y="676" font-size="8" fill="#86868b">版本可见</text>
  <line x1="836" y1="654" x2="836" y2="694" stroke="#c7c7cc" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="843" y="676" font-size="8" fill="#86868b">改目录</text>
</svg>
