  <text x="30" y="372" font-size="10.5" fill="#86868b">DQL 调用优化器/执行/索引/存储全链；DML 以存储+MVCC+WAL 为轴；DDL 改系统目录（存储）且事务性；DCL 落在权限检查(优化/执行期)与目录。</text>
  <text x="30" y="392" font-size="10.5" fill="#494950">灵魂：<tspan font-weight="600" fill="#1b2a4a">进程与内存架构</tspan>（并发根基）与 <tspan font-weight="600" fill="#7d1f1f">事务与 MVCC</tspan>（正确性根基）——所有写路径都强依赖后者。</text>
