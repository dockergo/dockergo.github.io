<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="440" viewBox="0 0 1020 440"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">三种 Join 算法 · 优化器按两表大小与有序性/索引选（executor/nodeXxxjoin.c）</text>

  <rect x="30" y="56" width="310" height="250" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="48" y="80" font-size="12.5" font-weight="600" fill="#1b2a4a">Nested Loop</text>
  <text x="48" y="102" font-size="9.5" fill="#5b7db1">外表每行 × 内表查找</text>
  <rect x="48" y="114" width="274" height="40" rx="8" fill="#ffffff" stroke="#bcd0ec"/><text x="185" y="139" font-size="9" fill="#1b2a4a" text-anchor="middle">for 外表行: 探内表（最好走索引）</text>
  <text x="48" y="176" font-size="9.5" fill="#5b7db1">适合：外表小 + 内表有索引</text>
  <text x="48" y="196" font-size="9.5" fill="#5b7db1">小结果集、OLTP 点查常用</text>
  <text x="48" y="222" font-size="9.5" fill="#5b7db1">内表无索引则 O(N×M) 很慢</text>
  <rect x="48" y="240" width="274" height="52" rx="9" fill="#f6f9fd" stroke="#cfe0f2"/><text x="185" y="262" font-size="9" fill="#1b2a4a" text-anchor="middle">可配 Memoize 缓存内表查找结果</text><text x="185" y="280" font-size="8.5" fill="#5b7db1" text-anchor="middle">nodeNestloop / nodeMemoize</text>

  <rect x="360" y="56" width="310" height="250" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="378" y="80" font-size="12.5" font-weight="600" fill="#0f5132">Merge Join</text>
  <text x="378" y="102" font-size="9.5" fill="#3f8f66">两表按 join key 排序后归并</text>
  <rect x="378" y="114" width="274" height="40" rx="8" fill="#ffffff" stroke="#bce6cd"/><text x="515" y="139" font-size="9" fill="#0f5132" text-anchor="middle">双指针同步前进匹配</text>
  <text x="378" y="176" font-size="9.5" fill="#3f8f66">适合：两表已按 key 有序</text>
  <text x="378" y="196" font-size="9.5" fill="#3f8f66">（有 btree 索引或需先排序）</text>
  <text x="378" y="222" font-size="9.5" fill="#3f8f66">大表 × 大表、结果需有序时优</text>
  <rect x="378" y="240" width="274" height="52" rx="9" fill="#fdfdf5" stroke="#bce6cd"/><text x="515" y="262" font-size="9" fill="#0f5132" text-anchor="middle">排序代价可能主导</text><text x="515" y="280" font-size="8.5" fill="#3f8f66" text-anchor="middle">nodeMergejoin</text>

  <rect x="690" y="56" width="300" height="250" rx="14" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="708" y="80" font-size="12.5" font-weight="600" fill="#3c1361">Hash Join</text>
  <text x="708" y="102" font-size="9.5" fill="#7a5aa8">小表建 hash 表，大表探测</text>
  <rect x="708" y="114" width="264" height="40" rx="8" fill="#ffffff" stroke="#d9c9ef"/><text x="840" y="139" font-size="9" fill="#3c1361" text-anchor="middle">build 小表 → probe 大表</text>
  <text x="708" y="176" font-size="9.5" fill="#7a5aa8">适合：等值 Join、大表、无序</text>
  <text x="708" y="196" font-size="9.5" fill="#7a5aa8">最通用的大 Join 主力</text>
  <text x="708" y="222" font-size="9.5" fill="#7a5aa8">hash 表超 work_mem → 分批落盘</text>
  <rect x="708" y="240" width="264" height="52" rx="9" fill="#f9f5fd" stroke="#d9c9ef"/><text x="840" y="262" font-size="9" fill="#3c1361" text-anchor="middle">本例 users⋈orders 常选它</text><text x="840" y="280" font-size="8.5" fill="#7a5aa8" text-anchor="middle">nodeHashjoin / nodeHash</text>

  <rect x="30" y="326" width="960" height="108" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="350" font-size="12" font-weight="600" fill="#1d1d1f">优化器如何选</text>
  <text x="48" y="374" font-size="10" fill="#494950">优化器为每种 Join 算 <tspan font-weight="600">代价</tspan>（含内外表基数、索引可用性、排序需求、work_mem 是否够），选最小者——不是固定规则。</text>
  <text x="48" y="396" font-size="10" fill="#494950">经验：外小内有索引→Nested Loop；两侧有序→Merge Join；大表等值→Hash Join。这些只是常见结果，实际以代价为准。</text>
  <text x="48" y="418" font-size="10" fill="#86868b">Join 顺序（先连哪两张）由 DP/GEQO 决定，见"查询优化器"主线。</text>
</svg>
