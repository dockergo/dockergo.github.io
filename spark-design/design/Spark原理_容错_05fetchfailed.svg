<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="540" viewBox="0 0 1060 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1060" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">FetchFailed：shuffle 输出丢 → 重跑产生它的 map stage</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">FetchFailed(TaskEndReason:83) · handleTaskCompletion(DAGScheduler:2403) FetchFailed 分支(:2593) · maxConsecutiveAttempts 4(:2694)</text>
  <!-- flow -->
  <g text-anchor="middle">
    <rect x="40" y="80" width="180" height="70" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="130" y="106" font-size="10" font-weight="700" fill="#1b2a4a">map stage 完成</text><text x="130" y="124" font-size="8" fill="#5b7db1">shuffle 输出落盘</text><text x="130" y="140" font-size="7.5" fill="#8aa6cf">在各 executor 本地</text>
    <text x="240" y="120" font-size="16" fill="#c7c7cc">→</text>
    <rect x="262" y="80" width="180" height="70" rx="11" fill="#fbeef0" stroke="#f0cdd4" filter="url(#soft)"/><text x="352" y="106" font-size="10" font-weight="700" fill="#7a2230">executor 挂了</text><text x="352" y="124" font-size="8" fill="#a44">其上 shuffle 文件丢</text><text x="352" y="140" font-size="7.5" fill="#7a2230">（无 ESS 时）</text>
    <text x="462" y="120" font-size="16" fill="#c7c7cc">→</text>
    <rect x="484" y="80" width="180" height="70" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/><text x="574" y="106" font-size="10" font-weight="700" fill="#5a3410">reduce 拉不到</text><text x="574" y="124" font-size="8" fill="#93762e">抛 FetchFailed</text><text x="574" y="140" font-size="7.5" fill="#b08843">TaskEndReason:83</text>
    <text x="684" y="120" font-size="16" fill="#c7c7cc">→</text>
    <rect x="706" y="80" width="314" height="70" rx="11" fill="#f6f2fb" stroke="#d9c9ec" filter="url(#soft)"/><text x="863" y="106" font-size="10" font-weight="700" fill="#3d2a5a">DAGScheduler 处理(:2593)</text><text x="863" y="124" font-size="8" fill="#7a5da5">注销丢失 map 输出 + 标记重跑</text><text x="863" y="140" font-size="7.5" fill="#9a7cc4">而非整 job 重跑</text>
  </g>
  <rect x="40" y="172" width="480" height="180" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="196" font-size="11" font-weight="700" fill="#274a78">DAGScheduler 的 FetchFailed 处理步骤</text>
  <text x="60" y="220" font-size="9.5" fill="#5b7db1">① 注销丢失的 map 输出</text>
  <text x="80" y="238" font-size="8.5" fill="#8aa6cf">mapOutputTracker.unregisterMapOutput(:2643)</text>
  <text x="60" y="260" font-size="9.5" fill="#5b7db1">② 把产出该 shuffle 的 map stage + 当前 stage 标记重跑</text>
  <text x="80" y="278" font-size="8.5" fill="#8aa6cf">failedStages += failedStage / mapStage(:2684-2685)</text>
  <text x="60" y="300" font-size="9.5" fill="#5b7db1">③ 延迟重新提交失败的 stage</text>
  <text x="80" y="318" font-size="8.5" fill="#8aa6cf">scheduleResubmit → ResubmitFailedStages(:2714)</text>
  <text x="60" y="340" font-size="9" fill="#8aa6cf">连续失败上限 maxConsecutiveAttempts 默认 4（:2694）</text>
  <rect x="540" y="172" width="480" height="180" rx="13" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="560" y="196" font-size="11" font-weight="700" fill="#7a5a1e">为什么只重跑 map stage（不整 job）</text>
  <text x="560" y="220" font-size="9.5" fill="#93762e">· 丢的只是"某段 shuffle 输出"——只需重造那段</text>
  <text x="560" y="240" font-size="9.5" fill="#93762e">· 重跑产它的 map stage（重新算并落盘 shuffle）</text>
  <text x="560" y="260" font-size="9.5" fill="#93762e">· 已完成的其他 stage / 未丢的输出不动 → 局部恢复</text>
  <text x="560" y="282" font-size="9" fill="#b08843">· 这是宽依赖版的 lineage 重算：以 shuffle 输出为"物化点"</text>
  <text x="560" y="302" font-size="9" fill="#b08843">· 若 map stage 的输入还在，重算便宜；否则继续沿血缘回溯</text>
  <text x="560" y="324" font-size="9" fill="#b08843">· 连环 FetchFailed（大量 executor 挂）会拖慢——故要 ESS</text>
  <text x="560" y="344" font-size="8.5" fill="#a1a1a6">unregisterMapOutput → 下次调度重造</text>
  <rect x="40" y="364" width="980" height="100" rx="13" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="60" y="388" font-size="11" font-weight="700" fill="#7a2230">与动态资源分配的关系（根因）</text>
  <text x="60" y="410" font-size="9.5" fill="#a44">· 默认 shuffle 数据存 executor 本地 → executor 被回收/挂掉，其 shuffle 输出没了 → FetchFailed</text>
  <text x="60" y="430" font-size="9.5" fill="#a44">· 动态分配频繁增减 executor，不配 external shuffle service → FetchFailed 连环重算，得不偿失</text>
  <text x="60" y="450" font-size="9" fill="#7a2230">· ESS 把 shuffle 数据托管独立进程，executor 生命周期与 shuffle 解耦（见调度篇/Shuffle篇）</text>
  <rect x="40" y="476" width="980" height="42" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="502" font-size="10" fill="#4b4b50"><tspan font-weight="700" fill="#1d1d1f">一句话：</tspan>reduce 拉不到 shuffle 输出抛 FetchFailed，DAGScheduler 注销丢失输出、只重跑产生它的 map stage（非整 job）；不配 ESS 时 executor 回收会连环触发。</text>
</svg>
