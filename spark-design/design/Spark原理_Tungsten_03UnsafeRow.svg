<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="540" viewBox="0 0 1060 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">UnsafeRow：紧凑二进制行格式（免对象开销、堆外可存）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">expressions/UnsafeRow.java:63 · null 位图 + 固定值区 + 变长区 · baseObject+baseOffset 寻址(pointTo:161)</text>
  <text x="30" y="82" font-size="11" font-weight="700" fill="#1b2a4a">内存布局（一行 = 一段连续字节）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="40" y="94" width="180" height="70" rx="9" fill="#e9f1fb" stroke="#c4d8f0"/><text x="130" y="116" font-size="9.5" font-weight="600" fill="#1b2a4a">① null 位图</text><text x="130" y="134" fill="#5b7db1">每字段 1 bit</text><text x="130" y="150" fill="#8aa6cf">标记哪些字段为 null</text>
    <rect x="230" y="94" width="360" height="70" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="410" y="116" font-size="9.5" font-weight="600" fill="#12402a">② 固定长度值区（每字段 8 字节）</text><text x="410" y="134" fill="#2f6f4f">定长值直接存；变长值存"偏移+长度"指针</text><text x="410" y="150" fill="#4c8567">随机访问第 N 字段 = O(1) 定位</text>
    <rect x="600" y="94" width="420" height="70" rx="9" fill="#fdf6ea" stroke="#efdcb4"/><text x="810" y="116" font-size="9.5" font-weight="600" fill="#5a3410">③ 变长区（String/Array/Map 的实际字节）</text><text x="810" y="134" fill="#93762e">紧接固定区之后，按固定区里的偏移定位</text><text x="810" y="150" fill="#b08843">整行连续、可整体拷贝/序列化</text>
  </g>
  <rect x="40" y="188" width="480" height="150" rx="13" fill="#f2fbf6" stroke="#cdeadb"/>
  <text x="280" y="212" font-size="11" font-weight="700" fill="#12402a" text-anchor="middle">相比 Java 对象行的优势</text>
  <text x="60" y="236" font-size="9.5" fill="#2f6f4f">· 免对象头（每个 Java 对象 12-16 字节头）</text>
  <text x="60" y="256" font-size="9.5" fill="#2f6f4f">· 免指针跳转——整行连续，缓存友好</text>
  <text x="60" y="276" font-size="9.5" fill="#2f6f4f">· 可直接在字节上比较/哈希，免反序列化</text>
  <text x="60" y="296" font-size="9.5" fill="#2f6f4f">· 可存堆外（绕 GC）——baseObject 可为 null + 绝对地址</text>
  <text x="60" y="322" font-size="8.5" fill="#4c8567">· shuffle/sort 时直接搬字节，不重建对象</text>
  <rect x="540" y="188" width="480" height="150" rx="13" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="780" y="212" font-size="11" font-weight="700" fill="#3d2a5a" text-anchor="middle">寻址与投影</text>
  <text x="560" y="236" font-size="9.5" fill="#7a5da5">· pointTo(baseObject, baseOffset, sizeInBytes)（:161）</text>
  <text x="560" y="256" font-size="9.5" fill="#7a5da5">　—— 把 UnsafeRow 指向一段字节（堆内数组或堆外）</text>
  <text x="560" y="278" font-size="9.5" fill="#7a5da5">· UnsafeProjection：把普通行转成 UnsafeRow</text>
  <text x="560" y="300" font-size="9.5" fill="#7a5da5">· codegen 生成的代码直接操作 UnsafeRow 字节</text>
  <text x="560" y="322" font-size="8.5" fill="#9a7cc4">· 三支柱在此闭合：codegen×UnsafeRow×堆外</text>
  <rect x="40" y="352" width="980" height="76" rx="13" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="376" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="398" font-size="10" fill="#4b4b50">UnsafeRow 是紧凑二进制行：null 位图 + 定长值区（8 字节/字段，变长值存偏移指针）+ 变长区，整行连续、可堆外存。</text>
  <text x="60" y="416" font-size="10" fill="#4b4b50">免 Java 对象头/指针跳转、缓存友好、可直接在字节上比较——codegen 生成的代码直接操作它，三支柱由此闭合。</text>
</svg>
