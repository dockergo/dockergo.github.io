<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="640" viewBox="0 0 1060 640" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="640" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">能力域依赖关系（按依赖深度分层：上层依赖下层）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">箭头 A→B 表示"A 依赖 B"；越靠下越基础。执行模型是枢纽——上承规划、下驱资源与容错。</text>

  <!-- 接触面 -->
  <rect x="40" y="72" width="980" height="58" rx="14" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="56" y="94" font-size="11" font-weight="700" fill="#3d2a5a">接触面</text>
  <g text-anchor="middle" font-size="9.5">
    <rect x="360" y="84" width="150" height="34" rx="8" fill="#fff" stroke="#d9c7ec"/><text x="435" y="105" font-weight="600" fill="#3d2a5a">编程接口层</text>
    <rect x="530" y="84" width="330" height="34" rx="8" fill="#faf7fd" stroke="#d9c7ec"/><text x="695" y="105" font-size="8.5" fill="#7a5da5">RDD / DataFrame / SQL / Structured Streaming</text>
  </g>

  <!-- 计算·规划 -->
  <rect x="40" y="146" width="980" height="72" rx="14" fill="#e9f1fb" stroke="#c4d8f0"/>
  <text x="56" y="168" font-size="11" font-weight="700" fill="#1b2a4a">计算·规划（SQL/DataFrame 走，RDD 不走）</text>
  <g text-anchor="middle" font-size="9.5">
    <rect x="300" y="178" width="200" height="32" rx="8" fill="#fff" stroke="#c4d8f0"/><text x="400" y="199" fill="#1b2a4a">Catalyst 优化</text>
    <rect x="540" y="178" width="200" height="32" rx="8" fill="#fff" stroke="#c4d8f0"/><text x="640" y="199" fill="#1b2a4a">Tungsten 代码生成</text>
  </g>

  <!-- 计算·执行 -->
  <rect x="40" y="234" width="980" height="72" rx="14" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="56" y="256" font-size="11" font-weight="700" fill="#12402a">计算·执行（枢纽）</text>
  <g text-anchor="middle" font-size="9.5">
    <rect x="300" y="266" width="200" height="32" rx="8" fill="#fff" stroke="#bfe0cd"/><text x="400" y="287" font-weight="600" fill="#12402a">执行模型（DAG/Stage/Task）</text>
    <rect x="540" y="266" width="200" height="32" rx="8" fill="#fff" stroke="#bfe0cd"/><text x="640" y="287" fill="#12402a">Shuffle</text>
  </g>

  <!-- 资源 -->
  <rect x="40" y="322" width="980" height="72" rx="14" fill="#f6f2fb" stroke="#d9c9ec"/>
  <text x="56" y="344" font-size="11" font-weight="700" fill="#3d2a5a">资源</text>
  <g text-anchor="middle" font-size="9">
    <rect x="200" y="354" width="200" height="32" rx="8" fill="#fff" stroke="#d9c9ec"/><text x="300" y="374" fill="#3d2a5a">调度与集群管理</text>
    <rect x="430" y="354" width="180" height="32" rx="8" fill="#fff" stroke="#d9c9ec"/><text x="520" y="374" fill="#3d2a5a">内存管理</text>
    <rect x="640" y="354" width="220" height="32" rx="8" fill="#fff" stroke="#d9c9ec"/><text x="750" y="374" fill="#3d2a5a">存储与缓存(BlockManager)</text>
  </g>

  <!-- 保障 + 流式 -->
  <rect x="40" y="410" width="480" height="58" rx="14" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="56" y="432" font-size="11" font-weight="700" fill="#7a2230">保障</text>
  <rect x="200" y="422" width="300" height="34" rx="8" fill="#fff" stroke="#f0cdd4"/><text x="350" y="443" font-size="9.5" fill="#7a2230" text-anchor="middle">容错（lineage/checkpoint/重试/推测）</text>
  <rect x="540" y="410" width="480" height="58" rx="14" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="556" y="432" font-size="11" font-weight="700" fill="#1b2a4a">流式</text>
  <rect x="700" y="422" width="300" height="34" rx="8" fill="#fff" stroke="#bcd0ec"/><text x="850" y="443" font-size="9.5" fill="#1b2a4a" text-anchor="middle">Structured Streaming（复用批栈）</text>

  <!-- arrows -->
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <path d="M435,118 L400,146" marker-end="url(#ar)"/>
    <path d="M600,118 L640,146" marker-end="url(#ar)"/>
    <path d="M400,210 L400,234" marker-end="url(#ar)"/>
    <path d="M640,210 L640,234" marker-end="url(#ar)"/>
    <path d="M400,298 L300,322" marker-end="url(#ar)"/>
    <path d="M450,298 L520,322" marker-end="url(#ar)"/>
    <path d="M640,298 L750,322" marker-end="url(#ar)"/>
    <path d="M350,394 L350,410" marker-end="url(#ar)"/>
    <path d="M850,306 L850,410" marker-end="url(#ar)"/>
  </g>

  <rect x="40" y="486" width="980" height="130" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="510" font-size="11" font-weight="700" fill="#1d1d1f">读法与要点</text>
  <text x="60" y="532" font-size="10" fill="#4b4b50">· DataFrame/SQL 依赖 Catalyst+Tungsten 规划，再落执行模型；RDD 跳过规划直落执行模型（两条路径）。</text>
  <text x="60" y="550" font-size="10" fill="#4b4b50">· 执行模型是枢纽：上承所有规划产物，下驱调度（分派 task）、Shuffle（宽依赖）、内存/存储（跑 task 要资源）。</text>
  <text x="60" y="568" font-size="10" fill="#4b4b50">· 容错横切执行模型（lineage 就是 RDD 依赖）与 Shuffle（FetchFailed）与存储（cache 丢失重算）。</text>
  <text x="60" y="586" font-size="10" fill="#4b4b50">· Structured Streaming 复用整套批栈（接口层→Catalyst→执行模型），只加增量执行 + state + checkpoint。</text>
  <text x="60" y="606" font-size="9" fill="#8a8a8f">灵魂主线是执行模型——理解 Spark 从它入手，向上到 API、向下到资源与容错。</text>
</svg>
