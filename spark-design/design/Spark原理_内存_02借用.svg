<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="560" viewBox="0 0 1060 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1060" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">软边界借用：execution 可驱逐 storage，storage 不可驱逐 execution</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">storageFraction 默认 0.5（package.scala:485）· acquireExecution(:134/:160-168) · acquireStorage(:206/:239-245)</text>
  <!-- two directions -->
  <rect x="40" y="76" width="480" height="200" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="280" y="100" font-size="12" font-weight="700" fill="#12402a" text-anchor="middle">execution 借 storage（可驱逐）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="60" y="116" width="180" height="50" rx="8" fill="#fff" stroke="#bfe0cd"/><text x="150" y="136" font-weight="600" fill="#12402a">execution 内存不够</text><text x="150" y="152" fill="#4c8567">跑 shuffle/sort 需更多</text>
    <text x="270" y="145" font-size="18" fill="#34c759">→</text>
    <rect x="300" y="116" width="200" height="50" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="400" y="136" font-weight="600" fill="#5a3410">驱逐 storage 借走的</text><text x="400" y="152" fill="#b08843">cache 块被踢出（可重算）</text>
  </g>
  <text x="280" y="196" font-size="9.5" fill="#2f6f4f">若 storage 用量超过其保底区（storageFraction）</text>
  <text x="280" y="216" font-size="9.5" fill="#2f6f4f">→ execution 收回被借的内存，踢掉超额 cache</text>
  <text x="280" y="238" font-size="8.5" fill="#4c8567">maybeGrowExecutionPool: reclaim any free memory from storage</text>
  <text x="280" y="258" font-size="8.5" fill="#4c8567">"execution can evict blocks storage borrowed"</text>
  <rect x="540" y="76" width="480" height="200" rx="14" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="780" y="100" font-size="12" font-weight="700" fill="#5a3410" text-anchor="middle">storage 借 execution（不可驱逐）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="560" y="116" width="180" height="50" rx="8" fill="#fff" stroke="#efdcb4"/><text x="650" y="136" font-weight="600" fill="#5a3410">storage 想 cache 更多</text><text x="650" y="152" fill="#b08843">persist 大 RDD</text>
    <text x="770" y="145" font-size="18" fill="#ff9500">→</text>
    <rect x="800" y="116" width="200" height="50" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="900" y="136" font-weight="600" fill="#12402a">只借 execution 空闲</text><text x="900" y="152" fill="#4c8567">绝不踢正在算的</text>
  </g>
  <text x="780" y="196" font-size="9.5" fill="#93762e">storage 只能 min(execution 空闲, 需求)</text>
  <text x="780" y="216" font-size="9.5" fill="#93762e">execution 一旦要用，storage 借的必须立即让</text>
  <text x="780" y="238" font-size="8.5" fill="#b08843">acquireStorageMemory: borrow only free execution memory</text>
  <text x="780" y="258" font-size="8.5" fill="#b08843">storage 借用不驱逐 execution</text>
  <!-- why asymmetric -->
  <rect x="40" y="292" width="980" height="112" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="316" font-size="11.5" font-weight="700" fill="#274a78">为什么不对称？—— 丢失代价不同</text>
  <text x="60" y="342" font-size="9.5" fill="#5b7db1">· execution 内存装着"正在跑的 shuffle/sort/agg 中间态"——丢了要<tspan font-weight="600">重算整个 task</tspan>，代价高</text>
  <text x="60" y="364" font-size="9.5" fill="#5b7db1">· storage 内存装着 cache——丢了顶多<tspan font-weight="600">按 lineage 重算那个 RDD 分区</tspan>（见容错），代价低</text>
  <text x="60" y="386" font-size="9" fill="#8aa6cf">· 所以：execution 优先级更高，可无情驱逐 storage；storage 谦让，只捡 execution 的空闲</text>
  <rect x="40" y="418" width="980" height="80" rx="13" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="60" y="442" font-size="11" font-weight="700" fill="#7a5a1e">storageFraction 的真正含义</text>
  <text x="60" y="464" font-size="9.5" fill="#93762e">· 不是 storage 的"上限"，而是 storage 的"免驱逐保底"——低于它 execution 不能踢，高于它可以踢</text>
  <text x="60" y="484" font-size="9" fill="#b08843">· cache 重的应用调大 storageFraction；计算重的调小，给 execution 更稳的空间</text>
  <rect x="40" y="510" width="980" height="42" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="536" font-size="10" fill="#4b4b50"><tspan font-weight="700" fill="#1d1d1f">一句话：</tspan>软边界内 execution 可驱逐 storage 借走的、storage 绝不驱逐 execution——因 execution 中间态丢了代价更高。</text>
</svg>
