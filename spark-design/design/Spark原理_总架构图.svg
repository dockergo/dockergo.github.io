<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="760" viewBox="0 0 1080 760" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="760" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Spark 总架构图：driver–executor</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">一个 SparkContext 的 driver 协调 N 个 executor；cluster manager 供资源；数据在外部存储（不自管持久存储）</text>

  <!-- API layer -->
  <rect x="30" y="66" width="1020" height="52" rx="12" fill="#f4eefb" stroke="#d9c7ec" data-tid="Spark原理_编程接口层" data-lab="编程接口层"/>
  <text x="50" y="88" font-size="11" font-weight="700" fill="#3d2a5a">编程接口层</text>
  <g text-anchor="middle" font-size="9">
    <rect x="360" y="78" width="120" height="30" rx="7" fill="#fff" stroke="#d9c7ec"/><text x="420" y="97" fill="#3d2a5a">RDD</text>
    <rect x="490" y="78" width="140" height="30" rx="7" fill="#fff" stroke="#d9c7ec"/><text x="560" y="97" fill="#3d2a5a">DataFrame/Dataset</text>
    <rect x="640" y="78" width="90" height="30" rx="7" fill="#fff" stroke="#d9c7ec"/><text x="685" y="97" fill="#3d2a5a">SQL</text>
    <rect x="740" y="78" width="160" height="30" rx="7" fill="#fff" stroke="#d9c7ec" data-tid="Spark原理_支撑_StructuredStreaming" data-lab="Structured Streaming"/><text x="820" y="97" fill="#3d2a5a">Structured Streaming</text>
  </g>

  <!-- driver -->
  <rect x="30" y="134" width="620" height="360" rx="16" fill="#f3f7fc" stroke="#cfe0f2" data-tid="Spark原理_支撑_执行模型" data-lab="Driver"/>
  <text x="50" y="158" font-size="12.5" font-weight="700" fill="#274a78">Driver（SparkContext / SparkSession）</text>
  <text x="50" y="176" font-size="8.5" fill="#5b7db1">规划与协调中枢——每个 app 一个</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="46" y="188" width="140" height="52" rx="9" fill="#e9f1fb" stroke="#c4d8f0" data-tid="Spark原理_支撑_Catalyst优化" data-lab="Catalyst"/><text x="116" y="208" font-weight="600" fill="#1b2a4a">Catalyst</text><text x="116" y="224" fill="#5b7db1">SQL/DF 优化</text>
    <rect x="196" y="188" width="140" height="52" rx="9" fill="#e9f1fb" stroke="#c4d8f0" data-tid="Spark原理_支撑_Tungsten代码生成" data-lab="Tungsten"/><text x="266" y="208" font-weight="600" fill="#1b2a4a">Tungsten</text><text x="266" y="224" fill="#5b7db1">codegen</text>
    <rect x="346" y="188" width="140" height="52" rx="9" fill="#eafaf1" stroke="#bfe0cd" data-tid="Spark原理_支撑_调度与集群管理" data-lab="DAGScheduler"/><text x="416" y="208" font-weight="600" fill="#12402a">DAGScheduler</text><text x="416" y="224" fill="#2f6f4f">切 stage</text>
    <rect x="496" y="188" width="140" height="52" rx="9" fill="#eafaf1" stroke="#bfe0cd" data-tid="Spark原理_支撑_调度与集群管理" data-lab="TaskScheduler"/><text x="566" y="208" font-weight="600" fill="#12402a">TaskScheduler</text><text x="566" y="224" fill="#2f6f4f">分派 task</text>
    <rect x="46" y="252" width="290" height="46" rx="9" fill="#f6f2fb" stroke="#d9c9ec" data-tid="Spark原理_支撑_存储与缓存" data-lab="BlockManagerMaster"/><text x="191" y="271" font-weight="600" fill="#3d2a5a">BlockManagerMaster</text><text x="191" y="286" fill="#7a5da5">记录所有 block 位置</text>
    <rect x="346" y="252" width="290" height="46" rx="9" fill="#f6f2fb" stroke="#d9c9ec" data-tid="Spark原理_支撑_Shuffle" data-lab="MapOutputTracker"/><text x="491" y="271" font-weight="600" fill="#3d2a5a">MapOutputTracker</text><text x="491" y="286" fill="#7a5da5">记录 shuffle 输出位置</text>
  </g>
  <rect x="46" y="310" width="590" height="70" rx="10" fill="#fff" stroke="#cfe0f2" data-tid="Spark原理_支撑_执行模型" data-lab="driver 职责总览"/>
  <text x="341" y="330" font-size="9.5" font-weight="600" fill="#274a78" text-anchor="middle">driver 职责总览</text>
  <text x="341" y="348" font-size="8.5" fill="#5b7db1" text-anchor="middle">构建 DAG · 优化计划 · 切 stage 拆 task · 调度到 executor · 收集结果 · 容错决策</text>
  <text x="341" y="366" font-size="8" fill="#8aa6cf" text-anchor="middle">driver 是单点：挂了整个 app 失败（RDD lineage 不覆盖 driver 丢失）</text>
  <rect x="46" y="392" width="590" height="90" rx="10" fill="#fdf9f0" stroke="#efe3cd" data-tid="Spark原理_支撑_执行模型" data-lab="SparkListener 事件总线"/>
  <text x="341" y="412" font-size="9.5" font-weight="600" fill="#7a5a1e" text-anchor="middle">SparkListener 事件总线 → Web UI / event log</text>
  <text x="341" y="430" font-size="8.5" fill="#93762e" text-anchor="middle">job/stage/task/DAG 可视化 · 指标 · history server（可观测性）</text>
  <text x="341" y="452" font-size="8" fill="#b08843" text-anchor="middle">运行形态与部署详见物理部署图</text>
  <text x="341" y="470" font-size="8" fill="#b08843" text-anchor="middle">client/cluster deploy mode 决定 driver 位置</text>

  <!-- cluster manager -->
  <rect x="670" y="134" width="380" height="120" rx="16" fill="#fff7e6" stroke="#e8cf9a" data-tid="Spark原理_支撑_调度与集群管理" data-lab="Cluster Manager"/>
  <text x="860" y="158" font-size="12" font-weight="700" fill="#5a3410" text-anchor="middle">Cluster Manager（资源）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="690" y="172" width="110" height="60" rx="9" fill="#fff" stroke="#e8cf9a"/><text x="745" y="192" font-weight="600" fill="#5a3410">Standalone</text><text x="745" y="210" fill="#93762e">Master/Worker</text>
    <rect x="810" y="172" width="110" height="60" rx="9" fill="#fff" stroke="#e8cf9a"/><text x="865" y="192" font-weight="600" fill="#5a3410">YARN</text><text x="865" y="210" fill="#93762e">RM/AM/container</text>
    <rect x="930" y="172" width="110" height="60" rx="9" fill="#fff" stroke="#e8cf9a"/><text x="985" y="192" font-weight="600" fill="#5a3410">K8s</text><text x="985" y="210" fill="#93762e">executor=pod</text>
  </g>

  <!-- executors -->
  <rect x="670" y="272" width="380" height="222" rx="16" fill="#fdf9f0" stroke="#efe3cd" data-tid="Spark原理_支撑_执行模型" data-lab="Executors"/>
  <text x="860" y="296" font-size="12" font-weight="700" fill="#7a5a1e" text-anchor="middle">Executors（执行 · N 个）</text>
  <g text-anchor="middle" font-size="8">
    <rect x="690" y="308" width="170" height="80" rx="10" fill="#fff" stroke="#efdcb4" data-tid="Spark原理_支撑_内存管理" data-lab="统一内存"/><text x="775" y="326" font-size="9" font-weight="600" fill="#5a3410">Executor 1</text><text x="775" y="344" fill="#93762e">跑 task（多线程）</text><text x="775" y="360" fill="#93762e">BlockManager（存块）</text><text x="775" y="376" fill="#93762e">统一内存 + shuffle</text>
    <rect x="870" y="308" width="170" height="80" rx="10" fill="#fff" stroke="#efdcb4" data-tid="Spark原理_支撑_Shuffle" data-lab="executor 间 shuffle 交换"/><text x="955" y="326" font-size="9" font-weight="600" fill="#5a3410">Executor 2 … N</text><text x="955" y="344" fill="#93762e">同构</text><text x="955" y="360" fill="#93762e">task 并行 = core 数</text><text x="955" y="376" fill="#93762e">executor 间 shuffle 交换</text>
  </g>
  <rect x="690" y="398" width="350" height="84" rx="10" fill="#eafaf1" stroke="#bfe0cd" data-tid="Spark原理_支撑_容错" data-lab="lineage 重算"/>
  <text x="865" y="418" font-size="9" font-weight="600" fill="#12402a" text-anchor="middle">executor 职责</text>
  <text x="865" y="436" font-size="8.5" fill="#2f6f4f" text-anchor="middle">领 task 跑该分区计算 · shuffle 读写 · 缓存 block · 汇报状态</text>
  <text x="865" y="454" font-size="8" fill="#4c8567" text-anchor="middle">executor 丢失 → 其 cached/shuffle 块按 lineage 重算</text>
  <text x="865" y="472" font-size="8" fill="#4c8567" text-anchor="middle">动态资源分配可增减 executor</text>

  <!-- external storage -->
  <rect x="30" y="512" width="1020" height="80" rx="14" fill="#f7f7f9" stroke="#e6e6ea" data-tid="Spark原理_支撑_存储与缓存" data-lab="外部存储"/>
  <text x="50" y="536" font-size="11" font-weight="700" fill="#4b4b50">外部存储（Spark 不自管持久存储）</text>
  <g text-anchor="middle" font-size="9">
    <rect x="360" y="548" width="120" height="30" rx="7" fill="#fff" stroke="#e6e6ea"/><text x="420" y="567" fill="#6b6b70">HDFS / S3</text>
    <rect x="490" y="548" width="120" height="30" rx="7" fill="#fff" stroke="#e6e6ea"/><text x="550" y="567" fill="#6b6b70">Hive / 数仓</text>
    <rect x="620" y="548" width="120" height="30" rx="7" fill="#fff" stroke="#e6e6ea"/><text x="680" y="567" fill="#6b6b70">Kafka（流）</text>
    <rect x="750" y="548" width="120" height="30" rx="7" fill="#fff" stroke="#e6e6ea"/><text x="810" y="567" fill="#6b6b70">JDBC / 文件</text>
  </g>

  <!-- connections -->
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <line x1="560" y1="240" x2="670" y2="272" marker-end="url(#ar)"/>
    <line x1="860" y1="254" x2="860" y2="272" marker-end="url(#ar)"/>
    <line x1="340" y1="494" x2="420" y2="548" marker-end="url(#ar)"/>
    <line x1="860" y1="494" x2="700" y2="548" marker-end="url(#ar)"/>
  </g>
  <text x="605" y="262" font-size="8" fill="#a1a1a6">分派 task</text>
  <text x="900" y="266" font-size="8" fill="#a1a1a6">申请 executor</text>

  <rect x="30" y="606" width="1020" height="126" rx="12" fill="#f7f7f9" stroke="#e6e6ea" data-tid="Spark原理_全景主线框架" data-lab=""/>
  <text x="50" y="630" font-size="11" font-weight="700" fill="#1d1d1f"></text>
  <text x="50" y="652" font-size="10" fill="#4b4b50">与 SQL 存算引擎（有自管存储的 FE/BE）不同：Spark 是 driver–executor 纯计算框架——driver 规划调度、executor 执行，</text>
  <text x="50" y="670" font-size="10" fill="#4b4b50">cluster manager 供资源，数据在外部存储。driver 是单点（挂了 app 失败），executor 可动态增减、丢了按 lineage 重算。</text>
  <text x="50" y="694" font-size="9" fill="#8a8a8f">纵向 = 一个 app 内 driver 到 executor 的协调；横向 = executor 间 shuffle 数据交换。同一模型跑在 Standalone/YARN/K8s 上。</text>
  <text x="50" y="712" font-size="9" fill="#8a8a8f">DataFrame/SQL 先过 Catalyst+Tungsten（driver 侧）再落执行模型；RDD 直接落执行模型。</text>
</svg>
