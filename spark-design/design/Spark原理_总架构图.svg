<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="580" viewBox="0 0 1080 580" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="aHot" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="aState" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c99a3a"/></marker>
    <marker id="aCtl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
  </defs>
  <rect width="1080" height="580" fill="#fbfbfd"/>

  <!-- ===== 标题带 ===== -->
  <text x="30" y="28" font-size="14" font-weight="600" fill="#1d1d1f">Spark 总架构 · 多视角透视：控制面 Driver 规划调度，数据面 Executor 跑 task</text>
  <text x="30" y="45" font-size="10.5" fill="#6e6e73">执行脊：job → stage → task → shuffle → 结果回收；Driver 是单点，Executor 可增减、丢了按 lineage 重算　源码基准 Spark 3.5</text>

  <!-- ===== 图例：三型语义路径 ===== -->
  <line x1="40" y1="64" x2="70" y2="64" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aHot)"/>
  <text x="76" y="68" font-size="10.5" fill="#3a3a3c">执行热流 Hot（规划管线 · task 计算）</text>
  <line x1="330" y1="64" x2="360" y2="64" stroke="#c99a3a" stroke-width="1.8" marker-end="url(#aState)"/>
  <text x="366" y="68" font-size="10.5" fill="#3a3a3c">shuffle 交换 State（map 写→reduce 拉）</text>
  <line x1="636" y1="64" x2="666" y2="64" stroke="#5b7db1" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aCtl)"/>
  <text x="672" y="68" font-size="10.5" fill="#3a3a3c">调度 / 资源 Control（分发·起 executor·回报）</text>
  <text x="1056" y="68" font-size="10" fill="#a1a1a6" text-anchor="end">框 = 主线可下钻</text>

  <!-- ===== 接触面 · 编程接口层 ===== -->
  <rect x="24" y="82" width="1032" height="54" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)" data-tid="Spark原理_编程接口层" data-lab="编程接口层"/>
  <text x="40" y="103" font-size="11.5" font-weight="600" fill="#5a3d78">接触面 · 编程接口层（惰性算子 → 一个 DAG）</text>
  <text x="40" y="120" font-size="9" fill="#8a6db0">RDD 底层 · DataFrame/SQL 走 Catalyst · 流式建模为增量表</text>
  <g text-anchor="middle" font-size="9.5">
    <rect x="512" y="94" width="110" height="32" rx="8" fill="#fff" stroke="#e2d2ee"/><text x="567" y="114" fill="#5a3d78">RDD</text>
    <rect x="632" y="94" width="158" height="32" rx="8" fill="#fff" stroke="#e2d2ee"/><text x="711" y="114" fill="#5a3d78">DataFrame / Dataset</text>
    <rect x="800" y="94" width="70" height="32" rx="8" fill="#fff" stroke="#e2d2ee"/><text x="835" y="114" fill="#5a3d78">SQL</text>
    <rect x="880" y="94" width="160" height="32" rx="8" fill="#fff" stroke="#e2d2ee" data-tid="Spark原理_支撑_StructuredStreaming" data-lab="Structured Streaming"/><text x="960" y="114" fill="#5a3d78">Structured Streaming</text>
  </g>

  <!-- ===== 控制面 · Driver ===== -->
  <rect x="24" y="146" width="636" height="300" rx="16" fill="#eafaf1" stroke="#b8e6cd" filter="url(#soft)" data-tid="Spark原理_支撑_执行模型" data-lab="Driver"/>
  <text x="40" y="168" font-size="11.5" font-weight="600" fill="#1c6b45">控制面 · Driver（SparkContext · 每 app 一个 · 规划协调中枢）</text>
  <g text-anchor="middle" font-size="9">
    <rect x="40" y="180" width="150" height="52" rx="9" fill="#fff" stroke="#b8e6cd" data-tid="Spark原理_支撑_Catalyst优化" data-lab="Catalyst"/><text x="115" y="201" font-weight="600" fill="#1c6b45">Catalyst</text><text x="115" y="217" fill="#3a9b6e">SQL/DF 优化</text>
    <rect x="200" y="180" width="150" height="52" rx="9" fill="#fff" stroke="#b8e6cd" data-tid="Spark原理_支撑_Tungsten代码生成" data-lab="Tungsten"/><text x="275" y="201" font-weight="600" fill="#1c6b45">Tungsten</text><text x="275" y="217" fill="#3a9b6e">codegen</text>
    <rect x="360" y="180" width="140" height="52" rx="9" fill="#e6f7ee" stroke="#a8dfc0" data-tid="Spark原理_支撑_调度与集群管理" data-lab="DAGScheduler"/><text x="430" y="201" font-weight="600" fill="#1c6b45">DAGScheduler</text><text x="430" y="217" fill="#3a9b6e">切 stage</text>
    <rect x="510" y="180" width="140" height="52" rx="9" fill="#e6f7ee" stroke="#a8dfc0" data-tid="Spark原理_支撑_调度与集群管理" data-lab="TaskScheduler"/><text x="580" y="201" font-weight="600" fill="#1c6b45">TaskScheduler</text><text x="580" y="217" fill="#3a9b6e">分派 task</text>
  </g>
  <g text-anchor="middle" font-size="9">
    <rect x="40" y="244" width="300" height="44" rx="9" fill="#f6f2fb" stroke="#d9c9ec" data-tid="Spark原理_支撑_存储与缓存" data-lab="BlockManagerMaster"/><text x="190" y="264" font-weight="600" fill="#5a3d78">BlockManagerMaster</text><text x="190" y="279" fill="#8a6db0" font-size="8.5">记录所有 block 位置</text>
    <rect x="350" y="244" width="300" height="44" rx="9" fill="#fdf3e5" stroke="#efdcb4" data-tid="Spark原理_支撑_Shuffle" data-lab="MapOutputTracker"/><text x="500" y="264" font-weight="600" fill="#7a5a1e">MapOutputTracker</text><text x="500" y="279" fill="#b08843" font-size="8.5">记录 shuffle 输出位置</text>
  </g>
  <rect x="40" y="300" width="610" height="60" rx="10" fill="#fff" stroke="#b8e6cd" data-tid="Spark原理_支撑_执行模型" data-lab="Driver 职责"/>
  <text x="345" y="320" font-size="9.5" font-weight="600" fill="#1c6b45" text-anchor="middle">Driver 职责总览</text>
  <text x="345" y="338" font-size="8.5" fill="#3a9b6e" text-anchor="middle">构建 DAG · 切 stage 拆 task · 调度到 executor · 收集结果 · 容错决策</text>
  <text x="345" y="353" font-size="8" fill="#7fb89a" text-anchor="middle">单点：driver 挂了整个 app 失败（lineage 不覆盖 driver）</text>
  <rect x="40" y="368" width="610" height="60" rx="10" fill="#fdf9f0" stroke="#efe3cd" data-tid="Spark原理_支撑_执行模型" data-lab="SparkListener 事件总线"/>
  <text x="345" y="388" font-size="9.5" font-weight="600" fill="#7a5a1e" text-anchor="middle">SparkListener 事件总线 → Web UI / event log</text>
  <text x="345" y="406" font-size="8.5" fill="#b08843" text-anchor="middle">job/stage/task 可视化 · 指标 · history server（可观测性）</text>
  <text x="345" y="421" font-size="8" fill="#c6a668" text-anchor="middle">client / cluster deploy mode 决定 driver 位置</text>

  <!-- ===== Cluster Manager ===== -->
  <rect x="676" y="146" width="380" height="110" rx="16" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)" data-tid="Spark原理_支撑_调度与集群管理" data-lab="Cluster Manager"/>
  <text x="866" y="168" font-size="11.5" font-weight="600" fill="#5a3410" text-anchor="middle">Cluster Manager · 供资源</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="692" y="182" width="112" height="60" rx="9" fill="#fff" stroke="#e8cf9a"/><text x="748" y="205" font-weight="600" fill="#5a3410">Standalone</text><text x="748" y="222" fill="#93762e">Master/Worker</text>
    <rect x="812" y="182" width="112" height="60" rx="9" fill="#fff" stroke="#e8cf9a"/><text x="868" y="205" font-weight="600" fill="#5a3410">YARN</text><text x="868" y="222" fill="#93762e">RM/AM/container</text>
    <rect x="932" y="182" width="108" height="60" rx="9" fill="#fff" stroke="#e8cf9a"/><text x="986" y="205" font-weight="600" fill="#5a3410">K8s</text><text x="986" y="222" fill="#93762e">executor=pod</text>
  </g>

  <!-- ===== 数据面 · Executors ===== -->
  <rect x="676" y="270" width="380" height="176" rx="16" fill="#fdf3e5" stroke="#efdcb4" filter="url(#soft)" data-tid="Spark原理_支撑_执行模型" data-lab="Executors"/>
  <text x="866" y="292" font-size="11.5" font-weight="600" fill="#7a5a1e" text-anchor="middle">数据面 · Executor（跑 task · N 个 · 同构）</text>
  <g text-anchor="middle" font-size="8">
    <rect x="692" y="302" width="170" height="72" rx="10" fill="#fff" stroke="#efdcb4" data-tid="Spark原理_支撑_内存管理" data-lab="统一内存"/><text x="777" y="322" font-size="9" font-weight="600" fill="#7a5a1e">Executor 1</text><text x="777" y="340" fill="#93762e">task 多线程 · 缓存 block</text><text x="777" y="356" fill="#93762e">统一内存（执行/存储）</text>
    <rect x="870" y="302" width="170" height="72" rx="10" fill="#fff" stroke="#efdcb4" data-tid="Spark原理_支撑_Shuffle" data-lab="executor 间 shuffle"/><text x="955" y="322" font-size="9" font-weight="600" fill="#7a5a1e">Executor 2 … N</text><text x="955" y="340" fill="#93762e">task 并行 = core 数</text><text x="955" y="356" fill="#93762e">executor 间 shuffle 交换</text>
  </g>
  <rect x="692" y="382" width="348" height="56" rx="10" fill="#eafaf1" stroke="#b8e6cd" data-tid="Spark原理_支撑_容错" data-lab="lineage 重算"/>
  <text x="866" y="401" font-size="9" font-weight="600" fill="#1c6b45" text-anchor="middle">executor 职责：跑分区 · shuffle 读写 · 汇报状态</text>
  <text x="866" y="418" font-size="8.5" fill="#3a9b6e" text-anchor="middle">丢失 → cached/shuffle 块按 lineage 重算</text>
  <text x="866" y="432" font-size="8" fill="#7fb89a" text-anchor="middle">动态资源分配可增减 executor</text>

  <!-- ===== 外部存储 ===== -->
  <rect x="24" y="456" width="1032" height="48" rx="12" fill="#f4f2ee" stroke="#e3ddd2" stroke-dasharray="6 4" data-tid="Spark原理_支撑_存储与缓存" data-lab="外部存储"/>
  <text x="40" y="475" font-size="10.5" font-weight="600" fill="#6e6357">外部存储（Spark 不自管持久存储）</text>
  <g text-anchor="middle" font-size="8.8">
    <rect x="360" y="466" width="150" height="28" rx="7" fill="#fbf6ef" stroke="#e6d8c4"/><text x="435" y="484" fill="#5a3410">HDFS / S3</text>
    <rect x="520" y="466" width="150" height="28" rx="7" fill="#fbf6ef" stroke="#e6d8c4"/><text x="595" y="484" fill="#5a3410">Hive / 数仓</text>
    <rect x="680" y="466" width="150" height="28" rx="7" fill="#fbf6ef" stroke="#e6d8c4"/><text x="755" y="484" fill="#5a3410">Kafka（流）</text>
    <rect x="840" y="466" width="150" height="28" rx="7" fill="#fbf6ef" stroke="#e6d8c4"/><text x="915" y="484" fill="#5a3410">JDBC / 文件</text>
  </g>

  <!-- ===== 语义分型连线 ===== -->
  <!-- Hot：接口 → Driver -->
  <line x1="200" y1="136" x2="200" y2="146" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aHot)"/>
  <!-- Hot：driver 内规划管线 -->
  <line x1="190" y1="206" x2="200" y2="206" stroke="#2f9e6e" stroke-width="1.6" marker-end="url(#aHot)"/>
  <line x1="350" y1="206" x2="360" y2="206" stroke="#2f9e6e" stroke-width="1.6" marker-end="url(#aHot)"/>
  <line x1="500" y1="206" x2="510" y2="206" stroke="#2f9e6e" stroke-width="1.6" marker-end="url(#aHot)"/>
  <!-- Control：TaskScheduler → Executors（分发 task） -->
  <path d="M650,206 L664,206 L664,320 L676,320" stroke="#5b7db1" stroke-width="1.6" stroke-dasharray="5 3" fill="none" marker-end="url(#aCtl)"/>
  <text x="668" y="288" font-size="8" fill="#5b7db1">分发 task</text>
  <!-- Control：Cluster Manager → Executors（起 executor） -->
  <line x1="866" y1="256" x2="866" y2="270" stroke="#5b7db1" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aCtl)"/>
  <text x="874" y="267" font-size="8" fill="#5b7db1">供资源 · 起 executor</text>
  <!-- State：Executor ↔ Executor shuffle -->
  <line x1="862" y1="338" x2="870" y2="338" stroke="#c99a3a" stroke-width="1.8" marker-start="url(#aState)" marker-end="url(#aState)"/>
  <!-- Control：结果/状态回 driver -->
  <path d="M676,400 L664,400 L664,344 L650,344" stroke="#5b7db1" stroke-width="1.5" stroke-dasharray="4 3" fill="none" marker-end="url(#aCtl)"/>
  <text x="600" y="356" font-size="8" fill="#5b7db1" text-anchor="end">结果 / 状态回报</text>
  <!-- Hot：driver / executor 读写外部存储 -->
  <line x1="345" y1="446" x2="345" y2="456" stroke="#2f9e6e" stroke-width="1.6" marker-end="url(#aHot)"/>
  <line x1="866" y1="446" x2="866" y2="456" stroke="#2f9e6e" stroke-width="1.6" marker-end="url(#aHot)"/>

  <!-- ===== 读法 ===== -->
  <rect x="24" y="512" width="1032" height="44" rx="8" fill="#f7f7f9" stroke="#ececef" data-tid="Spark原理_全景主线框架" data-lab="全景读法"/>
  <text x="540" y="530" font-size="10" fill="#4a4a4f" text-anchor="middle">读法：算子在 Driver 汇成 DAG → DAGScheduler 按 shuffle 边界切 stage → TaskScheduler 把 task 分发到 Executor 跑；executor 间 shuffle 交换数据，结果回 driver。</text>
  <text x="540" y="547" font-size="9" fill="#8a8a8f" text-anchor="middle">纵向 = app 内 driver 到 executor 的协调；横向 = executor 间 shuffle 数据交换。同一模型跑在 Standalone / YARN / K8s 上；数据在外部存储。</text>
</svg>
