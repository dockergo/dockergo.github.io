<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="560" viewBox="0 0 1060 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1060" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">reduce 端读：找位置 → 并发限流拉取 → 聚合排序</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">BlockStoreShuffleReader.read (:72) · ShuffleBlockFetcherIterator (:86) · MapOutputTracker 告诉去哪拉</text>
  <g text-anchor="middle">
    <rect x="40" y="80" width="230" height="120" rx="13" fill="#f6f2fb" stroke="#d9c9ec" filter="url(#soft)"/>
    <text x="155" y="104" font-size="10.5" font-weight="700" fill="#3d2a5a">① 查位置</text>
    <text x="155" y="126" font-size="8.5" fill="#7a5da5">MapOutputTracker</text>
    <text x="155" y="144" font-size="8.5" fill="#7a5da5">(MapOutputTracker.scala)</text>
    <text x="155" y="164" font-size="8.5" fill="#3d2a5a">driver Master 记录</text>
    <text x="155" y="180" font-size="8" fill="#9a7cc4">所有 map 输出在哪个 executor</text>
    <rect x="290" y="80" width="230" height="120" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="405" y="104" font-size="10.5" font-weight="700" fill="#1b2a4a">② 并发拉取</text>
    <text x="405" y="126" font-size="8.5" fill="#5b7db1">ShuffleBlockFetcherIterator</text>
    <text x="405" y="146" font-size="8.5" fill="#5b7db1">本地直读 fetchLocalBlocks(:580)</text>
    <text x="405" y="164" font-size="8.5" fill="#5b7db1">远程 sendRequest(:264)</text>
    <text x="405" y="182" font-size="8" fill="#8aa6cf">maxBytesInFlight 限流防拉爆</text>
    <rect x="540" y="80" width="230" height="120" rx="13" fill="#e9f1fb" stroke="#c4d8f0" filter="url(#soft)"/>
    <text x="655" y="104" font-size="10.5" font-weight="700" fill="#1b2a4a">③ 聚合</text>
    <text x="655" y="126" font-size="8.5" fill="#5b7db1">dep.aggregator 按 key 聚合</text>
    <text x="655" y="146" font-size="8.5" fill="#5b7db1">(:135-145)</text>
    <text x="655" y="166" font-size="8" fill="#8aa6cf">如 reduceByKey 的 reduce</text>
    <rect x="790" y="80" width="230" height="120" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
    <text x="905" y="104" font-size="10.5" font-weight="700" fill="#12402a">④ 排序（若需）</text>
    <text x="905" y="126" font-size="8.5" fill="#2f6f4f">keyOrdering → ExternalSorter</text>
    <text x="905" y="146" font-size="8.5" fill="#2f6f4f">超内存 spill 磁盘</text>
    <text x="905" y="166" font-size="8" fill="#4c8567">如 sortByKey</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.3" fill="none">
    <line x1="270" y1="140" x2="290" y2="140" marker-end="url(#ar)"/><line x1="520" y1="140" x2="540" y2="140" marker-end="url(#ar)"/><line x1="770" y1="140" x2="790" y2="140" marker-end="url(#ar)"/>
  </g>
  <rect x="40" y="224" width="480" height="130" rx="13" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="280" y="248" font-size="11" font-weight="700" fill="#7a2230" text-anchor="middle">限流的意义（maxBytesInFlight）</text>
  <text x="60" y="272" font-size="9.5" fill="#a44">· reduce 要从很多 executor 拉块，若全并发 → 内存爆</text>
  <text x="60" y="292" font-size="9.5" fill="#a44">· 限制 in-flight 字节数，边拉边处理</text>
  <text x="60" y="312" font-size="9.5" fill="#7a2230">· spark.reducer.maxSizeInFlight 控制</text>
  <text x="60" y="334" font-size="8.5" fill="#a44">· 拉取失败 → FetchFailed → 容错重跑 map stage</text>
  <rect x="540" y="224" width="480" height="130" rx="13" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="780" y="248" font-size="11" font-weight="700" fill="#7a5a1e" text-anchor="middle">与其他主线的交接</text>
  <text x="560" y="272" font-size="9.5" fill="#93762e">· 位置来自 MapOutputTracker（元数据/调度）</text>
  <text x="560" y="292" font-size="9.5" fill="#93762e">· spill 用内存管理的 ExternalSorter</text>
  <text x="560" y="312" font-size="9.5" fill="#93762e">· 块拉取用存储的 ShuffleBlockFetcherIterator</text>
  <text x="560" y="332" font-size="9.5" fill="#93762e">· 拉取失败经容错主线（FetchFailed）处理</text>
  <rect x="40" y="366" width="980" height="76" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="390" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="412" font-size="10" fill="#4b4b50">reduce task 经 MapOutputTracker 找到各 map 输出位置，用 ShuffleBlockFetcherIterator 并发限流拉取（本地直读/远程请求），</text>
  <text x="60" y="430" font-size="10" fill="#4b4b50">按 aggregator 聚合、按 keyOrdering 排序（超内存 spill）。限流防拉爆内存，拉取失败转 FetchFailed 容错。</text>
</svg>
