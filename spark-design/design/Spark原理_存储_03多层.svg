<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="520" viewBox="0 0 1060 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1060" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">block 取数多层：本地内存 → 本地磁盘 → 远程拉取</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">BlockManager.get(:1347) · getLocalValues(:997) · getRemoteBlock(:1152) · MemoryStore LRU 驱逐(:472/:93)</text>
  <g text-anchor="middle">
    <rect x="60" y="82" width="150" height="70" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="135" y="112" font-size="10" font-weight="700" fill="#1b2a4a">要一个 block</text><text x="135" y="130" font-size="8" fill="#5b7db1">get(blockId)</text>
    <text x="238" y="122" font-size="18" fill="#c7c7cc">→</text>
    <rect x="266" y="82" width="180" height="70" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="356" y="108" font-size="10" font-weight="700" fill="#12402a">① 本地内存</text><text x="356" y="126" font-size="8" fill="#4c8567">MemoryStore 命中？</text><text x="356" y="142" font-size="7.5" fill="#4c8567">getLocalValues:997 · 最快</text>
    <text x="474" y="122" font-size="14" fill="#a1a1a6">miss→</text>
    <rect x="522" y="82" width="180" height="70" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/><text x="612" y="108" font-size="10" font-weight="700" fill="#5a3410">② 本地磁盘</text><text x="612" y="126" font-size="8" fill="#93762e">DiskStore 命中？</text><text x="612" y="142" font-size="7.5" fill="#b08843">反序列化回内存</text>
    <text x="730" y="122" font-size="14" fill="#a1a1a6">miss→</text>
    <rect x="778" y="82" width="220" height="70" rx="11" fill="#f6f2fb" stroke="#d9c9ec" filter="url(#soft)"/><text x="888" y="108" font-size="10" font-weight="700" fill="#3d2a5a">③ 远程拉取</text><text x="888" y="126" font-size="8" fill="#7a5da5">问 Master 在哪 → 拉</text><text x="888" y="142" font-size="7.5" fill="#9a7cc4">getRemoteBlock:1152</text>
  </g>
  <rect x="40" y="176" width="480" height="150" rx="13" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="60" y="200" font-size="11" font-weight="700" fill="#12402a">存：MemoryStore / DiskStore</text>
  <text x="60" y="224" font-size="9.5" fill="#2f6f4f">· MemoryStore（memory/MemoryStore.scala:82）——内存里的 block</text>
  <text x="60" y="244" font-size="9.5" fill="#2f6f4f">· DiskStore（DiskStore.scala:45）——落盘的 block</text>
  <text x="60" y="264" font-size="9.5" fill="#2f6f4f">· 反序列化态存内存（占空间快）vs 序列化态（省空间）</text>
  <text x="60" y="286" font-size="9" fill="#4c8567">· MEMORY_AND_DISK：内存放不下的分区自动溢到 DiskStore</text>
  <text x="60" y="306" font-size="9" fill="#4c8567">· 远程块位置由 BlockManagerMaster 目录提供</text>
  <rect x="540" y="176" width="480" height="150" rx="13" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="560" y="200" font-size="11" font-weight="700" fill="#7a2230">LRU 驱逐：内存压力下踢最久未用</text>
  <text x="560" y="224" font-size="9.5" fill="#a44">· evictBlocksToFreeSpace（MemoryStore.scala:472）</text>
  <text x="560" y="244" font-size="9.5" fill="#a44">· 底层 LinkedHashMap（:93）构造参数 true = 访问序 → LRU</text>
  <text x="560" y="264" font-size="9.5" fill="#a44">· 内存不够存新块 → 踢最久未访问的旧块</text>
  <text x="560" y="286" font-size="9" fill="#7a2230">· MEMORY_ONLY 被踢的分区丢失，下次用按 lineage 重算</text>
  <text x="560" y="306" font-size="9" fill="#7a2230">· MEMORY_AND_DISK 被踢的落盘，不丢</text>
  <rect x="40" y="338" width="980" height="76" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="362" font-size="11" font-weight="700" fill="#274a78">为什么多层</text>
  <text x="60" y="384" font-size="9.5" fill="#5b7db1">· 内存装得下就快（本地内存直读）；装不下也不崩（溢盘/远程）——性能与稳定性兼顾</text>
  <text x="60" y="404" font-size="9" fill="#8aa6cf">· 与内存管理（storage 内存软边界）联动：storage 内存被 execution 借走 → cache 块被驱逐</text>
  <rect x="40" y="426" width="980" height="48" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="454" font-size="10" fill="#4b4b50"><tspan font-weight="700" fill="#1d1d1f">一句话：</tspan>取块按本地内存→本地磁盘→远程拉取多层降级，内存不足按 LRU 驱逐——装得下就快、装不下不崩。</text>
</svg>
