<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="560" viewBox="0 0 1060 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">四套 API 如何汇入同一执行引擎：两条路径都到 DAGScheduler</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">RDD 直落（跳 Catalyst）· DataFrame/SQL/Streaming 过 QueryExecution.toRdd — 终点都是 DAGScheduler.runJob(:1117)</text>

  <!-- RDD path -->
  <rect x="40" y="76" width="470" height="150" rx="13" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="275" y="100" font-size="11.5" font-weight="700" fill="#5a3410" text-anchor="middle">路径 A · RDD（直落，跳过优化器）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="60" y="116" width="120" height="40" rx="8" fill="#fff" stroke="#e8cf9a"/><text x="120" y="140" fill="#5a3410">RDD 转换链</text>
    <rect x="200" y="116" width="130" height="40" rx="8" fill="#fff" stroke="#e8cf9a"/><text x="265" y="136" fill="#5a3410">action</text><text x="265" y="150" font-size="7.5" fill="#93762e">collect/count</text>
    <rect x="350" y="116" width="140" height="40" rx="8" fill="#fff" stroke="#e8cf9a"/><text x="420" y="136" fill="#5a3410">sc.runJob</text><text x="420" y="150" font-size="7.5" fill="#93762e">RDD.scala:1073</text>
  </g>
  <g stroke="#d8b48a" stroke-width="1.3" fill="none">
    <line x1="180" y1="136" x2="200" y2="136" marker-end="url(#ar)"/>
    <line x1="330" y1="136" x2="350" y2="136" marker-end="url(#ar)"/>
  </g>
  <text x="275" y="182" font-size="9" fill="#93762e" text-anchor="middle">无 Catalyst、无 Tungsten——转换链直接是 DAG</text>
  <text x="275" y="202" font-size="8.5" fill="#b08843" text-anchor="middle">性能靠用户自己写好</text>

  <!-- DF path -->
  <rect x="550" y="76" width="470" height="150" rx="13" fill="#e9f1fb" stroke="#c4d8f0"/>
  <text x="785" y="100" font-size="11.5" font-weight="700" fill="#1b2a4a" text-anchor="middle">路径 B · DataFrame/SQL（过优化器）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="570" y="116" width="120" height="40" rx="8" fill="#fff" stroke="#c4d8f0"/><text x="630" y="136" fill="#1b2a4a">逻辑计划</text><text x="630" y="150" font-size="7.5" fill="#5b7db1">DataFrame/SQL</text>
    <rect x="710" y="116" width="130" height="40" rx="8" fill="#fff" stroke="#c4d8f0"/><text x="775" y="136" fill="#1b2a4a">QueryExecution</text><text x="775" y="150" font-size="7.5" fill="#5b7db1">4 阶段优化</text>
    <rect x="860" y="116" width="140" height="40" rx="8" fill="#fff" stroke="#c4d8f0"/><text x="930" y="136" fill="#1b2a4a">toRdd（:392）</text><text x="930" y="150" font-size="7.5" fill="#5b7db1">RDD[InternalRow]</text>
  </g>
  <g stroke="#c4d8f0" stroke-width="1.3" fill="none">
    <line x1="690" y1="136" x2="710" y2="136" marker-end="url(#ar)"/>
    <line x1="840" y1="136" x2="860" y2="136" marker-end="url(#ar)"/>
  </g>
  <text x="785" y="182" font-size="9" fill="#5b7db1" text-anchor="middle">过 Catalyst+Tungsten 优化后，也变成 RDD 落 DAG</text>
  <text x="785" y="202" font-size="8.5" fill="#8aa6cf" text-anchor="middle">Streaming 每 micro-batch 走此路径（增量）</text>

  <!-- converge -->
  <rect x="330" y="266" width="400" height="70" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="530" y="290" font-size="12" font-weight="700" fill="#12402a" text-anchor="middle">DAGScheduler.runJob（:1117）</text>
  <text x="530" y="312" font-size="9" fill="#2f6f4f" text-anchor="middle">两条路径的共同终点——都变成 RDD 的 DAG</text>
  <text x="530" y="328" font-size="8" fill="#4c8567" text-anchor="middle">之后：切 stage → 拆 task → 执行（见执行模型）</text>
  <g stroke="#9ccbb0" stroke-width="1.4" fill="none">
    <path d="M420,226 L470,266" marker-end="url(#ar)"/>
    <path d="M640,226 L590,266" marker-end="url(#ar)"/>
  </g>

  <rect x="40" y="356" width="980" height="100" rx="13" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="60" y="380" font-size="11" font-weight="700" fill="#3d2a5a">统一性的意义</text>
  <text x="60" y="402" font-size="9.5" fill="#7a5da5">· 一套执行引擎（DAG/Stage/Task/调度/内存/容错）服务所有 API——学一次执行模型，四套 API 都懂</text>
  <text x="60" y="420" font-size="9.5" fill="#7a5da5">· 差异只在"落 DAG 之前"：RDD 直落，结构化 API 先过 Catalyst+Tungsten 优化</text>
  <text x="60" y="438" font-size="9.5" fill="#9a7cc4">· Structured Streaming 把无界流拆成一连串 micro-batch，每批走路径 B（复用整套批栈）</text>

  <rect x="40" y="470" width="980" height="76" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="494" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="516" font-size="10" fill="#4b4b50">四套 API 两条路径最终都汇到 DAGScheduler.runJob：RDD 直落（跳优化器），DataFrame/SQL/Streaming 过 QueryExecution</text>
  <text x="60" y="534" font-size="10" fill="#4b4b50">优化后 toRdd 再落。一套执行引擎服务所有 API——这是 Spark 接触面统一性的本质。</text>
</svg>
