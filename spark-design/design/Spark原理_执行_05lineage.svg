<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="600" viewBox="0 0 1060 600" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="600" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">lineage 血缘与容错重算：丢分区不靠副本，沿血缘重算</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">RDD 依赖链=血缘 · resubmitFailedStages(:1318) · FetchFailed 重跑 map stage(:2593,:2684) · checkpoint 截断(:1686)</text>

  <!-- lineage chain -->
  <rect x="40" y="72" width="600" height="130" rx="13" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="340" y="96" font-size="11" font-weight="700" fill="#3d2a5a" text-anchor="middle">血缘 = 转换链（不可变 RDD 记录"从父怎么算"）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="60" y="112" width="90" height="40" rx="8" fill="#fff" stroke="#d9c7ec"/><text x="105" y="132" fill="#3d2a5a">HDFS 文件</text><text x="105" y="145" fill="#9a7cc4">RDD0</text>
    <rect x="180" y="112" width="90" height="40" rx="8" fill="#fff" stroke="#d9c7ec"/><text x="225" y="132" fill="#3d2a5a">map</text><text x="225" y="145" fill="#9a7cc4">RDD1</text>
    <rect x="300" y="112" width="90" height="40" rx="8" fill="#fff" stroke="#d9c7ec"/><text x="345" y="132" fill="#3d2a5a">filter</text><text x="345" y="145" fill="#9a7cc4">RDD2</text>
    <rect x="420" y="112" width="90" height="40" rx="8" fill="#fbeef0" stroke="#f0cdd4"/><text x="465" y="128" fill="#7a2230">reduceByKey</text><text x="465" y="145" fill="#a44">RDD3(丢分区!)</text>
    <rect x="540" y="112" width="80" height="40" rx="8" fill="#fff" stroke="#d9c7ec"/><text x="580" y="132" fill="#3d2a5a">collect</text><text x="580" y="145" fill="#9a7cc4">结果</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.3" fill="none">
    <line x1="150" y1="132" x2="180" y2="132" marker-end="url(#ar)"/>
    <line x1="270" y1="132" x2="300" y2="132" marker-end="url(#ar)"/>
    <line x1="390" y1="132" x2="420" y2="132" marker-end="url(#ar)"/>
    <line x1="510" y1="132" x2="540" y2="132" marker-end="url(#ar)"/>
  </g>
  <text x="340" y="176" font-size="8.5" fill="#7a5da5" text-anchor="middle">RDD3 某分区丢失 → 不需副本，按血缘从 RDD2（及其父）重算该分区</text>
  <text x="340" y="192" font-size="8" fill="#9a7cc4" text-anchor="middle">窄依赖只重算对应父分区；宽依赖需重跑上游 map stage 再生 shuffle 输出</text>

  <!-- fetchfailed -->
  <rect x="660" y="72" width="360" height="130" rx="13" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="840" y="96" font-size="11" font-weight="700" fill="#7a2230" text-anchor="middle">FetchFailed：shuffle 输出丢失</text>
  <text x="680" y="118" font-size="9" fill="#a44">· reduce task 拉不到 map 输出（executor 挂/磁盘坏）</text>
  <text x="680" y="136" font-size="9" fill="#a44">· handleTaskCompletion(:2403) 的 FetchFailed 分支(:2593)</text>
  <text x="680" y="154" font-size="9" fill="#a44">· 把对应 map stage 重新入队(:2684) 重跑</text>
  <text x="680" y="174" font-size="8.5" fill="#7a2230">→ 再生丢失的 shuffle 输出，再重跑 reduce</text>
  <text x="680" y="190" font-size="8" fill="#a44">这是分布式 shuffle 容错的关键路径</text>

  <!-- checkpoint -->
  <rect x="40" y="220" width="480" height="150" rx="13" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="280" y="244" font-size="11.5" font-weight="700" fill="#12402a" text-anchor="middle">checkpoint：截断血缘</text>
  <text x="60" y="268" font-size="9.5" fill="#2f6f4f">· RDD.checkpoint()（:1686）把 RDD 物化到可靠存储（HDFS）</text>
  <text x="60" y="286" font-size="9.5" fill="#2f6f4f">· ReliableRDDCheckpointData.doCheckpoint 写盘</text>
  <text x="60" y="304" font-size="9.5" fill="#2f6f4f">· markCheckpointed 清除依赖 → 血缘断在此处</text>
  <text x="60" y="326" font-size="9" fill="#4c8567">· 之后丢分区从 checkpoint 读，不再向上重算</text>
  <text x="60" y="348" font-size="8.5" fill="#8aa6cf">· 适用：长迭代（图计算/ML）血缘无限增长时</text>

  <!-- cache vs checkpoint -->
  <rect x="540" y="220" width="480" height="150" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="780" y="244" font-size="11.5" font-weight="700" fill="#274a78" text-anchor="middle">cache vs checkpoint 别混淆</text>
  <text x="560" y="268" font-size="9.5" fill="#5b7db1">· cache/persist：缓存分区加速，但**不断血缘**</text>
  <text x="560" y="286" font-size="9.5" fill="#8aa6cf">　缓存丢了仍可沿血缘重算（只是慢）</text>
  <text x="560" y="308" font-size="9.5" fill="#5b7db1">· checkpoint：物化到可靠存储并**断血缘**</text>
  <text x="560" y="326" font-size="9.5" fill="#8aa6cf">　更可靠但要写 HDFS、需触发一次额外计算</text>
  <text x="560" y="350" font-size="8.5" fill="#8aa6cf">· 常配合：先 cache 再 checkpoint，避免重算两次</text>

  <rect x="40" y="386" width="980" height="90" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="410" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="432" font-size="10" fill="#4b4b50">Spark 容错的根是"血缘可重算"：RDD 不可变、依赖链完整，丢分区就沿血缘重算（窄依赖重算父分区、宽依赖重跑 map stage），</text>
  <text x="60" y="450" font-size="10" fill="#4b4b50">FetchFailed 触发 map stage 重跑再生 shuffle 输出。长血缘用 checkpoint 物化+截断防重算爆炸。</text>
  <text x="60" y="468" font-size="9" fill="#8a8a8f">这是与 SQL 存算引擎最大差异：无副本、无事务，容错=可重算性。完整容错主线见「容错」篇。</text>
</svg>
