<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="540" viewBox="0 0 1060 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter></defs>
  <rect width="1060" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">统一内存模型：execution 与 storage 共享一块可互借区域</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">UnifiedMemoryManager.scala:58 · memory.fraction 默认 0.6（package.scala:495）· 预留 300MB（:264）</text>
  <!-- executor heap bar -->
  <text x="60" y="84" font-size="11" font-weight="700" fill="#1d1d1f">Executor 堆内存（自底向上切分）</text>
  <rect x="60" y="96" width="200" height="360" rx="12" fill="#f2f2f4" stroke="#dcdce0" filter="url(#soft)"/>
  <text x="160" y="118" font-size="10" font-weight="600" fill="#48484c" text-anchor="middle">Reserved 300MB</text>
  <text x="160" y="134" font-size="8" fill="#8a8a8f" text-anchor="middle">系统预留（不参与划分）</text>
  <line x1="60" y1="146" x2="260" y2="146" stroke="#dcdce0"/>
  <rect x="72" y="152" width="176" height="150" rx="9" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="160" y="174" font-size="10" font-weight="700" fill="#1b2a4a" text-anchor="middle">Unified 区（fraction 0.6）</text>
  <text x="160" y="192" font-size="8.5" fill="#5b7db1" text-anchor="middle">execution + storage 共享</text>
  <rect x="84" y="202" width="152" height="42" rx="7" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="160" y="222" font-size="8.5" font-weight="600" fill="#12402a" text-anchor="middle">execution 池</text>
  <text x="160" y="236" font-size="7.5" fill="#4c8567" text-anchor="middle">shuffle/sort/agg/join</text>
  <rect x="84" y="250" width="152" height="42" rx="7" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="160" y="270" font-size="8.5" font-weight="600" fill="#5a3410" text-anchor="middle">storage 池</text>
  <text x="160" y="284" font-size="7.5" fill="#b08843" text-anchor="middle">cache / broadcast</text>
  <line x1="60" y1="310" x2="260" y2="310" stroke="#dcdce0"/>
  <rect x="72" y="318" width="176" height="128" rx="9" fill="#faf6ff" stroke="#e3d5f2"/>
  <text x="160" y="342" font-size="10" font-weight="700" fill="#3d2a5a" text-anchor="middle">User Memory（~0.4）</text>
  <text x="160" y="362" font-size="8.5" fill="#7a5da5" text-anchor="middle">用户数据结构</text>
  <text x="160" y="380" font-size="8.5" fill="#7a5da5" text-anchor="middle">UDF 里的对象</text>
  <text x="160" y="400" font-size="8" fill="#9a7cc4" text-anchor="middle">Spark 不管这块</text>
  <text x="160" y="424" font-size="8" fill="#9a7cc4" text-anchor="middle">攒大对象易 OOM</text>
  <!-- right explanation -->
  <rect x="300" y="96" width="720" height="150" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="320" y="120" font-size="11" font-weight="700" fill="#1b2a4a">核心思想：不再静态切分，而是共享互借</text>
  <text x="320" y="144" font-size="9.5" fill="#5b7db1">· 老（1.6 前）静态模型：execution / storage 各占死比例——一边闲一边挤，浪费</text>
  <text x="320" y="164" font-size="9.5" fill="#5b7db1">· 统一模型：一块共享区，谁忙谁多占；storageFraction 只是 storage 的"免驱逐保底"</text>
  <text x="320" y="184" font-size="9.5" fill="#5b7db1">· 四个池：on-heap/off-heap × execution/storage（MemoryManager.scala:50-56）</text>
  <text x="320" y="208" font-size="9" fill="#8aa6cf">· MemoryManager（:39）抽象，UnifiedMemoryManager（:58）为默认实现</text>
  <text x="320" y="228" font-size="9" fill="#8aa6cf">· 434MB 默认例：(1024−300)×0.6（源码注释 :260-263）</text>
  <rect x="300" y="258" width="720" height="120" rx="13" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="320" y="282" font-size="11" font-weight="700" fill="#7a5a1e">三段划分（自底向上）</text>
  <text x="320" y="306" font-size="9.5" fill="#93762e">① Reserved 300MB —— 系统预留，恒定</text>
  <text x="320" y="326" font-size="9.5" fill="#93762e">② Unified（fraction 0.6）—— execution+storage 共享、软边界互借（下一张）</text>
  <text x="320" y="346" font-size="9.5" fill="#93762e">③ User Memory（余下 ~0.4）—— 用户对象/UDF，不受 Spark 内存管理器约束</text>
  <text x="320" y="368" font-size="8.5" fill="#b08843">调 memory.fraction：调大给计算多、调小留 user memory 多</text>
  <rect x="300" y="390" width="720" height="66" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="320" y="414" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="320" y="436" font-size="10" fill="#4b4b50">堆内存自底向上分三段：300MB 预留 + Unified 共享区（0.6，execution/storage 互借）+ User Memory（~0.4）。</text>
</svg>
