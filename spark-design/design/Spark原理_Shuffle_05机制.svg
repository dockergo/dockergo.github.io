<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="540" viewBox="0 0 1060 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1060" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">ShuffleManager / handle / resolver：可插拔的 shuffle 框架</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">ShuffleManager trait(:38) 入口 · handle 标识策略 · getWriter/getReader · MapOutputTracker 位置目录</text>
  <rect x="360" y="76" width="340" height="54" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="530" y="98" font-size="11" font-weight="700" fill="#12402a" text-anchor="middle">ShuffleManager（ShuffleManager.scala:38）</text>
  <text x="530" y="118" font-size="8.5" fill="#2f6f4f" text-anchor="middle">唯一实现 SortShuffleManager（sort/:73）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="60" y="160" width="270" height="70" rx="10" fill="#fff7e6" stroke="#e8cf9a"/><text x="195" y="182" font-weight="600" fill="#5a3410">registerShuffle → ShuffleHandle</text><text x="195" y="200" fill="#93762e">标识本次 shuffle 用哪种策略</text><text x="195" y="216" fill="#b08843">Bypass/Serialized/Base（:93-108）</text>
    <rect x="395" y="160" width="270" height="70" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="530" y="182" font-weight="600" fill="#1b2a4a">getWriter / getReader</text><text x="530" y="200" fill="#5b7db1">据 handle 造 map 写器 / reduce 读器</text><text x="530" y="216" fill="#8aa6cf">:145 / :119</text>
    <rect x="730" y="160" width="270" height="70" rx="10" fill="#f6f2fb" stroke="#d9c9ec"/><text x="865" y="182" font-weight="600" fill="#3d2a5a">shuffleBlockResolver</text><text x="865" y="200" fill="#7a5da5">定位物理块（data/index 文件）</text><text x="865" y="216" fill="#9a7cc4">IndexShuffleBlockResolver</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.3" fill="none">
    <path d="M470,130 L195,160" marker-end="url(#ar)"/><line x1="530" y1="130" x2="530" y2="160" marker-end="url(#ar)"/><path d="M590,130 L865,160" marker-end="url(#ar)"/>
  </g>
  <rect x="40" y="252" width="480" height="130" rx="13" fill="#f6f2fb" stroke="#d9c9ec"/>
  <text x="280" y="276" font-size="11" font-weight="700" fill="#3d2a5a" text-anchor="middle">MapOutputTracker：位置目录</text>
  <text x="60" y="300" font-size="9.5" fill="#7a5da5">· Master（driver）：registerMapOutput 记录所有 map 输出位置</text>
  <text x="60" y="320" font-size="9.5" fill="#7a5da5">· Worker（executor）：getMapSizesByExecutorId 查询</text>
  <text x="60" y="340" font-size="9.5" fill="#7a5da5">· reduce 端据此知道"去哪个 executor 拉哪个块"</text>
  <text x="60" y="362" font-size="8.5" fill="#9a7cc4">· MapOutputTracker.scala:798(Master)</text>
  <rect x="540" y="252" width="480" height="130" rx="13" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="780" y="276" font-size="11" font-weight="700" fill="#7a5a1e" text-anchor="middle">可插拔的意义</text>
  <text x="560" y="300" font-size="9.5" fill="#93762e">· 写策略（bypass/unsafe/sort）由 handle 决定，可扩展</text>
  <text x="560" y="320" font-size="9.5" fill="#93762e">· 存储可换：本地磁盘 / external shuffle service</text>
  <text x="560" y="340" font-size="9.5" fill="#93762e">· push-based shuffle 等新机制可接入</text>
  <text x="560" y="362" font-size="8.5" fill="#b08843">· 抽象让 shuffle 实现随硬件/规模演进</text>
  <rect x="40" y="392" width="980" height="76" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="416" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="438" font-size="10" fill="#4b4b50">Shuffle 框架可插拔：ShuffleManager 入口按 handle 决定写策略、造读写器、resolver 定位物理块；MapOutputTracker（driver Master 记录、</text>
  <text x="60" y="456" font-size="10" fill="#4b4b50">executor Worker 查询）是 map 与 reduce 端的位置目录。这套抽象让写策略与存储（本地/ESS/push-based）可替换、随规模演进。</text>
</svg>
