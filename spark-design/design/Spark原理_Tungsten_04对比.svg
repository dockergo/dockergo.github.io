<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="540" viewBox="0 0 1060 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="1060" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Volcano 迭代器 vs whole-stage codegen（对比）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">produce-consume 是钥匙：produce 自上而下问"要数据吗"，consume 自下而上生成"怎么处理一行"</text>
  <g font-size="9">
    <rect x="40" y="72" width="240" height="40" rx="8" fill="#f7f7f9" stroke="#e6e6ea"/><text x="160" y="97" font-weight="700" fill="#1d1d1f" text-anchor="middle">维度</text>
    <rect x="286" y="72" width="360" height="40" rx="8" fill="#fbeef0" stroke="#f0cdd4"/><text x="466" y="97" font-weight="700" fill="#7a2230" text-anchor="middle">Volcano 迭代器</text>
    <rect x="652" y="72" width="368" height="40" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="836" y="97" font-weight="700" fill="#12402a" text-anchor="middle">whole-stage codegen</text>
  </g>
  <g font-size="8.5" text-anchor="middle">
    <rect x="40" y="118" width="240" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="160" y="144" fill="#4b4b50">算子间</text>
    <rect x="286" y="118" width="360" height="42" rx="7" fill="#fff5f6" stroke="#f0cdd4"/><text x="466" y="144" fill="#7a2230">每算子一个 iterator，逐行 next</text>
    <rect x="652" y="118" width="368" height="42" rx="7" fill="#f2fbf6" stroke="#cdeadb"/><text x="836" y="144" fill="#12402a">融合成一个函数，行在函数内流转</text>
    <rect x="40" y="166" width="240" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="160" y="192" fill="#4b4b50">虚函数调用</text>
    <rect x="286" y="166" width="360" height="42" rx="7" fill="#fff5f6" stroke="#f0cdd4"/><text x="466" y="192" fill="#7a2230">每行每算子一次虚调用（开销大）</text>
    <rect x="652" y="166" width="368" height="42" rx="7" fill="#f2fbf6" stroke="#cdeadb"/><text x="836" y="192" fill="#12402a">无——内联展开</text>
    <rect x="40" y="214" width="240" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="160" y="240" fill="#4b4b50">分支预测</text>
    <rect x="286" y="214" width="360" height="42" rx="7" fill="#fff5f6" stroke="#f0cdd4"/><text x="466" y="240" fill="#7a2230">差（虚调用难预测）</text>
    <rect x="652" y="214" width="368" height="42" rx="7" fill="#f2fbf6" stroke="#cdeadb"/><text x="836" y="240" fill="#12402a">好（直线代码）</text>
    <rect x="40" y="262" width="240" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="160" y="288" fill="#4b4b50">中间数据</text>
    <rect x="286" y="262" width="360" height="42" rx="7" fill="#fff5f6" stroke="#f0cdd4"/><text x="466" y="288" fill="#7a2230">行对象在算子间传递</text>
    <rect x="652" y="262" width="368" height="42" rx="7" fill="#f2fbf6" stroke="#cdeadb"/><text x="836" y="288" fill="#12402a">数据在寄存器/栈上（UnsafeRow 字节）</text>
    <rect x="40" y="310" width="240" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="160" y="336" fill="#4b4b50">CPU 效率</text>
    <rect x="286" y="310" width="360" height="42" rx="7" fill="#fff5f6" stroke="#f0cdd4"/><text x="466" y="336" fill="#7a2230">受解释开销限制</text>
    <rect x="652" y="310" width="368" height="42" rx="7" fill="#f2fbf6" stroke="#cdeadb"/><text x="836" y="336" fill="#12402a">接近手写代码</text>
  </g>
  <rect x="40" y="366" width="980" height="76" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="390" font-size="11" font-weight="700" fill="#274a78">produce-consume 心智模型</text>
  <text x="60" y="412" font-size="9.5" fill="#5b7db1">· produce 自顶向下驱动：根算子问下游"你要数据吗" → 一路问到数据源开始产行</text>
  <text x="60" y="430" font-size="9.5" fill="#5b7db1">· consume 自底向上生成：拿到一行 → 每个算子生成"处理这行"的内联代码 → 拼成一个紧凑 while 循环</text>
  <rect x="40" y="452" width="980" height="76" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="476" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="498" font-size="10" fill="#4b4b50">Volcano 逐行虚调用、行对象在算子间传，受解释开销限制；whole-stage codegen 把算子融成一个函数、无虚调用、</text>
  <text x="60" y="516" font-size="10" fill="#4b4b50">数据在寄存器流转，效率接近手写。理解 codegen 靠 produce-consume：自上而下驱动、自下而上生成、拼成紧凑循环。</text>
</svg>
