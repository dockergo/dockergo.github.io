<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="600" viewBox="0 0 1060 600" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="1060" height="600" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">接触面（多 API）× 能力域 依赖矩阵</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">● 强依赖　◐ 部分依赖　○ 弱/间接　空 = 基本无关。RDD 跳过 Catalyst/Tungsten 是关键区别。</text>

  <g font-size="9">
    <!-- header -->
    <rect x="40" y="72" width="200" height="42" rx="8" fill="#f7f7f9" stroke="#e6e6ea"/><text x="140" y="98" font-weight="700" fill="#1d1d1f" text-anchor="middle">能力域 ↓ / API →</text>
    <rect x="246" y="72" width="130" height="42" rx="8" fill="#f4eefb" stroke="#d9c7ec"/><text x="311" y="90" font-weight="700" fill="#3d2a5a" text-anchor="middle">RDD</text><text x="311" y="106" font-size="7.5" fill="#7a5da5" text-anchor="middle">底层手动</text>
    <rect x="382" y="72" width="160" height="42" rx="8" fill="#f4eefb" stroke="#d9c7ec"/><text x="462" y="90" font-weight="700" fill="#3d2a5a" text-anchor="middle">DataFrame/Dataset</text><text x="462" y="106" font-size="7.5" fill="#7a5da5" text-anchor="middle">结构化</text>
    <rect x="548" y="72" width="120" height="42" rx="8" fill="#f4eefb" stroke="#d9c7ec"/><text x="608" y="90" font-weight="700" fill="#3d2a5a" text-anchor="middle">SQL</text><text x="608" y="106" font-size="7.5" fill="#7a5da5" text-anchor="middle">声明式</text>
    <rect x="674" y="72" width="150" height="42" rx="8" fill="#f4eefb" stroke="#d9c7ec"/><text x="749" y="90" font-weight="700" fill="#3d2a5a" text-anchor="middle">Structured Streaming</text><text x="749" y="106" font-size="7.5" fill="#7a5da5" text-anchor="middle">流式</text>
    <rect x="830" y="72" width="190" height="42" rx="8" fill="#f7f7f9" stroke="#e6e6ea"/><text x="925" y="98" font-size="8.5" fill="#6b6b70" text-anchor="middle">说明</text>
  </g>

  <g font-size="13" text-anchor="middle">
    <!-- rows -->
    <rect x="40" y="120" width="200" height="40" rx="7" fill="#e9f1fb" stroke="#c4d8f0"/><text x="140" y="145" font-size="9.5" font-weight="600" fill="#1b2a4a">Catalyst 优化</text>
    <rect x="246" y="120" width="130" height="40" rx="7" fill="#fff" stroke="#eee"/><text x="311" y="146" fill="#eee"></text>
    <rect x="382" y="120" width="160" height="40" rx="7" fill="#fff" stroke="#eee"/><text x="462" y="146" fill="#12402a">●</text>
    <rect x="548" y="120" width="120" height="40" rx="7" fill="#fff" stroke="#eee"/><text x="608" y="146" fill="#12402a">●</text>
    <rect x="674" y="120" width="150" height="40" rx="7" fill="#fff" stroke="#eee"/><text x="749" y="146" fill="#12402a">●</text>
    <text x="925" y="145" font-size="8.5" fill="#6b6b70">RDD 不过 Catalyst（关键区别）</text>

    <rect x="40" y="166" width="200" height="40" rx="7" fill="#e9f1fb" stroke="#c4d8f0"/><text x="140" y="191" font-size="9.5" font-weight="600" fill="#1b2a4a">Tungsten codegen</text>
    <rect x="246" y="166" width="130" height="40" rx="7" fill="#fff" stroke="#eee"/><text x="311" y="192" fill="#eee"></text>
    <rect x="382" y="166" width="160" height="40" rx="7" fill="#fff" stroke="#eee"/><text x="462" y="192" fill="#12402a">●</text>
    <rect x="548" y="166" width="120" height="40" rx="7" fill="#fff" stroke="#eee"/><text x="608" y="192" fill="#12402a">●</text>
    <rect x="674" y="166" width="150" height="40" rx="7" fill="#fff" stroke="#eee"/><text x="749" y="192" fill="#12402a">●</text>
    <text x="925" y="191" font-size="8.5" fill="#6b6b70">同上，只服务结构化 API</text>

    <rect x="40" y="212" width="200" height="40" rx="7" fill="#eafaf1" stroke="#bfe0cd"/><text x="140" y="237" font-size="9.5" font-weight="600" fill="#12402a">执行模型</text>
    <rect x="246" y="212" width="130" height="40" rx="7" fill="#fff" stroke="#eee"/><text x="311" y="238" fill="#12402a">●</text>
    <rect x="382" y="212" width="160" height="40" rx="7" fill="#fff" stroke="#eee"/><text x="462" y="238" fill="#12402a">●</text>
    <rect x="548" y="212" width="120" height="40" rx="7" fill="#fff" stroke="#eee"/><text x="608" y="238" fill="#12402a">●</text>
    <rect x="674" y="212" width="150" height="40" rx="7" fill="#fff" stroke="#eee"/><text x="749" y="238" fill="#12402a">●</text>
    <text x="925" y="237" font-size="8.5" fill="#6b6b70">全 API 最终都落 DAG/Stage/Task</text>

    <rect x="40" y="258" width="200" height="40" rx="7" fill="#eafaf1" stroke="#bfe0cd"/><text x="140" y="283" font-size="9.5" font-weight="600" fill="#12402a">Shuffle</text>
    <rect x="246" y="258" width="130" height="40" rx="7" fill="#fff" stroke="#eee"/><text x="311" y="284" fill="#5a3410">◐</text>
    <rect x="382" y="258" width="160" height="40" rx="7" fill="#fff" stroke="#eee"/><text x="462" y="284" fill="#12402a">●</text>
    <rect x="548" y="258" width="120" height="40" rx="7" fill="#fff" stroke="#eee"/><text x="608" y="284" fill="#12402a">●</text>
    <rect x="674" y="258" width="150" height="40" rx="7" fill="#fff" stroke="#eee"/><text x="749" y="284" fill="#5a3410">◐</text>
    <text x="925" y="283" font-size="8.5" fill="#6b6b70">有宽依赖就 shuffle（AQE 仅结构化）</text>

    <rect x="40" y="304" width="200" height="40" rx="7" fill="#f6f2fb" stroke="#d9c9ec"/><text x="140" y="329" font-size="9.5" font-weight="600" fill="#3d2a5a">调度与集群管理</text>
    <rect x="246" y="304" width="130" height="40" rx="7" fill="#fff" stroke="#eee"/><text x="311" y="330" fill="#12402a">●</text>
    <rect x="382" y="304" width="160" height="40" rx="7" fill="#fff" stroke="#eee"/><text x="462" y="330" fill="#12402a">●</text>
    <rect x="548" y="304" width="120" height="40" rx="7" fill="#fff" stroke="#eee"/><text x="608" y="330" fill="#12402a">●</text>
    <rect x="674" y="304" width="150" height="40" rx="7" fill="#fff" stroke="#eee"/><text x="749" y="330" fill="#12402a">●</text>
    <text x="925" y="329" font-size="8.5" fill="#6b6b70">全 API 共用调度层</text>

    <rect x="40" y="350" width="200" height="40" rx="7" fill="#f6f2fb" stroke="#d9c9ec"/><text x="140" y="375" font-size="9.5" font-weight="600" fill="#3d2a5a">内存 / 存储缓存</text>
    <rect x="246" y="350" width="130" height="40" rx="7" fill="#fff" stroke="#eee"/><text x="311" y="376" fill="#12402a">●</text>
    <rect x="382" y="350" width="160" height="40" rx="7" fill="#fff" stroke="#eee"/><text x="462" y="376" fill="#12402a">●</text>
    <rect x="548" y="350" width="120" height="40" rx="7" fill="#fff" stroke="#eee"/><text x="608" y="376" fill="#12402a">●</text>
    <rect x="674" y="350" width="150" height="40" rx="7" fill="#fff" stroke="#eee"/><text x="749" y="376" fill="#12402a">●</text>
    <text x="925" y="375" font-size="8.5" fill="#6b6b70">cache/broadcast/spill 全 API 通用</text>

    <rect x="40" y="396" width="200" height="40" rx="7" fill="#fbeef0" stroke="#f0cdd4"/><text x="140" y="421" font-size="9.5" font-weight="600" fill="#7a2230">容错</text>
    <rect x="246" y="396" width="130" height="40" rx="7" fill="#fff" stroke="#eee"/><text x="311" y="422" fill="#12402a">●</text>
    <rect x="382" y="396" width="160" height="40" rx="7" fill="#fff" stroke="#eee"/><text x="462" y="422" fill="#12402a">●</text>
    <rect x="548" y="396" width="120" height="40" rx="7" fill="#fff" stroke="#eee"/><text x="608" y="422" fill="#12402a">●</text>
    <rect x="674" y="396" width="150" height="40" rx="7" fill="#fff" stroke="#eee"/><text x="749" y="422" fill="#12402a">●</text>
    <text x="925" y="421" font-size="8.5" fill="#6b6b70">lineage 重算全 API；流式另加 checkpoint</text>

    <rect x="40" y="442" width="200" height="40" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="140" y="467" font-size="9.5" font-weight="600" fill="#1b2a4a">Structured Streaming</text>
    <rect x="246" y="442" width="130" height="40" rx="7" fill="#fff" stroke="#eee"/><text x="311" y="468" fill="#eee"></text>
    <rect x="382" y="442" width="160" height="40" rx="7" fill="#fff" stroke="#eee"/><text x="462" y="468" fill="#5a3410">◐</text>
    <rect x="548" y="442" width="120" height="40" rx="7" fill="#fff" stroke="#eee"/><text x="608" y="468" fill="#5a3410">◐</text>
    <rect x="674" y="442" width="150" height="40" rx="7" fill="#fff" stroke="#eee"/><text x="749" y="468" fill="#12402a">●</text>
    <text x="925" y="467" font-size="8.5" fill="#6b6b70">流式 API 复用 DataFrame 栈做增量</text>
  </g>

  <rect x="40" y="500" width="980" height="86" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="524" font-size="11" font-weight="700" fill="#1d1d1f">读矩阵</text>
  <text x="60" y="546" font-size="10" fill="#4b4b50">· 关键区别一眼看出：RDD 列在 Catalyst/Tungsten 两行是空的——RDD 不过优化器，是更底层的手动 API。</text>
  <text x="60" y="564" font-size="10" fill="#4b4b50">· 执行模型/调度/内存/存储/容错对所有 API 都 ●——它们是所有 API 汇入后的公共执行底座。</text>
  <text x="60" y="580" font-size="9" fill="#8a8a8f">· Structured Streaming 复用 DataFrame 栈（Catalyst/执行/容错）做增量执行，是"批栈的流式扩展"。</text>
</svg>
