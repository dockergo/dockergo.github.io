<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="580" viewBox="0 0 1060 580" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="580" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">多 API 全景与统一入口：四套 API 汇入同一执行引擎</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">SparkSession（sql/classic/SparkSession.scala:99）统一入口 · SparkContext RDD 入口 · 原型 C 的"多 API"接触面</text>

  <!-- unified entry -->
  <rect x="380" y="76" width="300" height="56" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="530" y="98" font-size="11.5" font-weight="700" fill="#3d2a5a" text-anchor="middle">SparkSession（统一入口）</text>
  <text x="530" y="118" font-size="8.5" fill="#7a5da5" text-anchor="middle">sql → DataFrame · 内含 SparkContext（RDD 入口）</text>

  <!-- four APIs -->
  <g text-anchor="middle">
    <rect x="40" y="168" width="220" height="90" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
    <text x="150" y="190" font-size="11" font-weight="700" fill="#5a3410">RDD</text>
    <text x="150" y="210" font-size="8.5" fill="#93762e">底层手动转换</text>
    <text x="150" y="228" font-size="8.5" fill="#93762e">不过 Catalyst</text>
    <text x="150" y="246" font-size="8" fill="#b08843">最大控制力，自管性能</text>

    <rect x="280" y="168" width="220" height="90" rx="12" fill="#e9f1fb" stroke="#c4d8f0" filter="url(#soft)"/>
    <text x="390" y="190" font-size="11" font-weight="700" fill="#1b2a4a">DataFrame / Dataset</text>
    <text x="390" y="210" font-size="8.5" fill="#5b7db1">结构化，有 schema</text>
    <text x="390" y="228" font-size="8.5" fill="#5b7db1">DataFrame = Dataset[Row]</text>
    <text x="390" y="246" font-size="8" fill="#8aa6cf">过 Catalyst + Tungsten</text>

    <rect x="520" y="168" width="220" height="90" rx="12" fill="#e9f1fb" stroke="#c4d8f0" filter="url(#soft)"/>
    <text x="630" y="190" font-size="11" font-weight="700" fill="#1b2a4a">SQL</text>
    <text x="630" y="210" font-size="8.5" fill="#5b7db1">声明式 spark.sql</text>
    <text x="630" y="228" font-size="8.5" fill="#5b7db1">与 DataFrame 同栈</text>
    <text x="630" y="246" font-size="8" fill="#8aa6cf">BI/SQL 用户</text>

    <rect x="760" y="168" width="260" height="90" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="890" y="190" font-size="11" font-weight="700" fill="#1b2a4a">Structured Streaming</text>
    <text x="890" y="210" font-size="8.5" fill="#5b7db1">DataFrame 的流式扩展</text>
    <text x="890" y="228" font-size="8.5" fill="#5b7db1">流即无界表 · 增量执行</text>
    <text x="890" y="246" font-size="8" fill="#8aa6cf">复用批栈做流</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.3" fill="none">
    <path d="M470,132 L150,168" marker-end="url(#ar)"/>
    <path d="M510,132 L390,168" marker-end="url(#ar)"/>
    <path d="M550,132 L630,168" marker-end="url(#ar)"/>
    <path d="M590,132 L890,168" marker-end="url(#ar)"/>
  </g>

  <!-- converge -->
  <rect x="280" y="296" width="500" height="56" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="530" y="318" font-size="11" font-weight="700" fill="#12402a" text-anchor="middle">统一执行引擎：RDD 的 DAG → DAGScheduler</text>
  <text x="530" y="338" font-size="8.5" fill="#2f6f4f" text-anchor="middle">四套 API 最终都编译成 RDD 的 DAG，落到同一执行模型</text>
  <g stroke="#9ccbb0" stroke-width="1.3" fill="none">
    <path d="M150,258 L400,296" marker-end="url(#ar)"/>
    <path d="M390,258 L480,296" marker-end="url(#ar)"/>
    <path d="M630,258 L580,296" marker-end="url(#ar)"/>
    <path d="M890,258 L660,296" marker-end="url(#ar)"/>
  </g>
  <text x="250" y="285" font-size="8" fill="#b08843">直落（跳 Catalyst）</text>
  <text x="700" y="285" font-size="8" fill="#4c8567">过 Catalyst+Tungsten 后落</text>

  <rect x="40" y="384" width="980" height="80" rx="13" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="60" y="408" font-size="11" font-weight="700" fill="#7a5a1e">与 SQL 存算引擎的接触面差异</text>
  <text x="60" y="430" font-size="9.5" fill="#93762e">· SQL 存算引擎：接触面是 SQL 语句族（DDL/DML/DQL/DCL），一种语言</text>
  <text x="60" y="448" font-size="9.5" fill="#93762e">· Spark：接触面是多套抽象层级不同的编程 API，用户按需选（底层 RDD ↔ 高层 SQL），底层执行统一</text>

  <rect x="40" y="476" width="980" height="76" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="500" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="522" font-size="10" fill="#4b4b50">编程接口层 = 四套 API（RDD 底层手动 / DataFrame-Dataset-SQL 结构化过优化器 / Structured Streaming 流式扩展）</text>
  <text x="60" y="540" font-size="10" fill="#4b4b50">经 SparkSession 统一入口汇入——抽象层级不同，但最终都编译成 RDD 的 DAG 落到同一执行模型。</text>
</svg>
