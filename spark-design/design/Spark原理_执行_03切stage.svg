<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="600" viewBox="0 0 1060 600" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="600" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">DAG 按 shuffle 边界切 stage：宽依赖切、窄依赖折</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">getMissingParentStages (DAGScheduler.scala:911)：遇 ShuffleDependency(:925) 切独立父 stage；遇 NarrowDependency(:939) 折进同 stage</text>

  <!-- the rule -->
  <rect x="40" y="72" width="480" height="200" rx="14" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="280" y="96" font-size="12" font-weight="700" fill="#1d1d1f" text-anchor="middle">切 stage 的唯一规则</text>
  <rect x="60" y="112" width="440" height="66" rx="10" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="280" y="134" font-size="10" font-weight="600" fill="#5a3410" text-anchor="middle">遇 ShuffleDependency（宽依赖，:925）</text>
  <text x="280" y="154" font-size="8.5" fill="#93762e" text-anchor="middle">→ getOrCreateShuffleMapStage 切一个独立父 stage</text>
  <text x="280" y="170" font-size="8.5" fill="#b08843" text-anchor="middle">stage 边界 + 物化 shuffle 输出</text>
  <rect x="60" y="186" width="440" height="66" rx="10" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="280" y="208" font-size="10" font-weight="600" fill="#12402a" text-anchor="middle">遇 NarrowDependency（窄依赖，:939）</text>
  <text x="280" y="228" font-size="8.5" fill="#2f6f4f" text-anchor="middle">→ enqueue 该 RDD，折进同一 stage 继续遍历</text>
  <text x="280" y="244" font-size="8.5" fill="#4c8567" text-anchor="middle">流水线执行，不切、不落盘</text>

  <!-- two stage types -->
  <rect x="540" y="72" width="480" height="200" rx="14" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="780" y="96" font-size="12" font-weight="700" fill="#274a78" text-anchor="middle">两类 stage</text>
  <rect x="560" y="112" width="440" height="62" rx="10" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="780" y="134" font-size="10" font-weight="600" fill="#12402a" text-anchor="middle">ShuffleMapStage（ShuffleMapStage.scala:37）</text>
  <text x="780" y="153" font-size="8.5" fill="#2f6f4f" text-anchor="middle">中间 stage，输出 shuffle 数据（MapStatus）供下游拉</text>
  <text x="780" y="168" font-size="8" fill="#4c8567" text-anchor="middle">isAvailable = 所有分区输出就绪（:89）</text>
  <rect x="560" y="182" width="440" height="62" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="780" y="204" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">ResultStage（ResultStage.scala:30）</text>
  <text x="780" y="223" font-size="8.5" fill="#5b7db1" text-anchor="middle">最后一个 stage，跑 action 的函数产最终结果</text>
  <text x="780" y="238" font-size="8" fill="#8aa6cf" text-anchor="middle">一个 job 恰有一个 ResultStage</text>

  <!-- submit recursion -->
  <rect x="40" y="288" width="980" height="140" rx="14" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="60" y="312" font-size="11.5" font-weight="700" fill="#7a5a1e">submitStage 递归：先父后子（DAGScheduler.scala:1614）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="70" y="326" width="200" height="56" rx="9" fill="#fff" stroke="#efdcb4"/><text x="170" y="346" font-weight="600" fill="#5a3410">submitStage(目标 stage)</text><text x="170" y="364" fill="#93762e">getMissingParentStages(:1627)</text>
    <rect x="300" y="326" width="200" height="56" rx="9" fill="#fff" stroke="#efdcb4"/><text x="400" y="346" font-weight="600" fill="#5a3410">有缺失父？</text><text x="400" y="364" fill="#93762e">递归提交父 stage(:1635)</text>
    <rect x="530" y="326" width="200" height="56" rx="9" fill="#f2fbf6" stroke="#cdeadb"/><text x="630" y="346" font-weight="600" fill="#12402a">父都就绪？</text><text x="630" y="364" fill="#2f6f4f">submitMissingTasks(:1632)</text>
    <rect x="760" y="326" width="234" height="56" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="877" y="346" font-weight="600" fill="#1b2a4a">该 stage 拆 task 执行</text><text x="877" y="364" fill="#5b7db1">见下张</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.3" fill="none">
    <line x1="270" y1="354" x2="300" y2="354" marker-end="url(#ar)"/>
    <line x1="500" y1="354" x2="530" y2="354" marker-end="url(#ar)"/>
    <line x1="730" y1="354" x2="760" y2="354" marker-end="url(#ar)"/>
  </g>
  <path d="M400,382 L400,400 L170,400 L170,382" stroke="#d8b48a" stroke-width="1.2" fill="none" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="285" y="414" font-size="8" fill="#b08843" text-anchor="middle">有缺失父 → 先递归建父</text>

  <rect x="40" y="444" width="980" height="90" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="468" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="490" font-size="10" fill="#4b4b50">切 stage 只看依赖类型：宽依赖（shuffle）处切一个独立父 stage（边界+物化），连续窄依赖折进同一 stage 流水线。</text>
  <text x="60" y="508" font-size="10" fill="#4b4b50">产出 ShuffleMapStage（中间）与 ResultStage（末尾）；submitStage 递归"先父后子"，父就绪才拆 task 执行。</text>
  <text x="60" y="526" font-size="9" fill="#8a8a8f">推论：一个 job 的 stage 数 = shuffle 数 + 1；stage 数多 = shuffle 多 = 可能的性能瓶颈。</text>
</svg>
