<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="520" viewBox="0 0 1060 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1060" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">broadcast：BitTorrent 式点对点分发只读数据（broadcast join 基础）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">TorrentBroadcast.scala:60（"BitTorrent-like":39）· blockSize 默认 4m（package.scala:2351）· readBlocks:189</text>
  <!-- bad: all from driver -->
  <rect x="40" y="76" width="480" height="180" rx="14" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="280" y="100" font-size="11" font-weight="700" fill="#7a2230" text-anchor="middle">❌ 朴素：全从 driver 拉</text>
  <g text-anchor="middle" font-size="8">
    <rect x="220" y="112" width="120" height="40" rx="8" fill="#fff" stroke="#f0cdd4"/><text x="280" y="136" font-weight="600" fill="#7a2230">driver（源）</text>
    <rect x="60" y="196" width="110" height="40" rx="8" fill="#fff" stroke="#f0cdd4"/><text x="115" y="220" fill="#a44">exec 1</text>
    <rect x="225" y="196" width="110" height="40" rx="8" fill="#fff" stroke="#f0cdd4"/><text x="280" y="220" fill="#a44">exec 2</text>
    <rect x="390" y="196" width="110" height="40" rx="8" fill="#fff" stroke="#f0cdd4"/><text x="445" y="220" fill="#a44">exec 3</text>
  </g>
  <g stroke="#f0a0b0" stroke-width="1.3" fill="none"><path d="M250,152 L120,196" marker-end="url(#ar)"/><line x1="280" y1="152" x2="280" y2="196" marker-end="url(#ar)"/><path d="M310,152 L440,196" marker-end="url(#ar)"/></g>
  <text x="280" y="252" font-size="8.5" fill="#a44">driver 成瓶颈：N 个 executor 全向它要 → 带宽爆</text>
  <!-- good: torrent -->
  <rect x="540" y="76" width="480" height="180" rx="14" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="780" y="100" font-size="11" font-weight="700" fill="#12402a" text-anchor="middle">✓ TorrentBroadcast：点对点互拉</text>
  <g text-anchor="middle" font-size="8">
    <rect x="720" y="112" width="120" height="40" rx="8" fill="#fff" stroke="#bfe0cd"/><text x="780" y="136" font-weight="600" fill="#12402a">driver（切块）</text>
    <rect x="560" y="196" width="110" height="40" rx="8" fill="#fff" stroke="#bfe0cd"/><text x="615" y="216" fill="#2f6f4f">exec 1</text><text x="615" y="228" fill="#4c8567" font-size="7">块0</text>
    <rect x="725" y="196" width="110" height="40" rx="8" fill="#fff" stroke="#bfe0cd"/><text x="780" y="216" fill="#2f6f4f">exec 2</text><text x="780" y="228" fill="#4c8567" font-size="7">块1</text>
    <rect x="890" y="196" width="110" height="40" rx="8" fill="#fff" stroke="#bfe0cd"/><text x="945" y="216" fill="#2f6f4f">exec 3</text><text x="945" y="228" fill="#4c8567" font-size="7">块2</text>
  </g>
  <g stroke="#8fd0aa" stroke-width="1.2" fill="none"><path d="M750,152 L620,196" marker-end="url(#ar)"/><line x1="780" y1="152" x2="780" y2="196" marker-end="url(#ar)"/><path d="M810,152 L940,196" marker-end="url(#ar)"/>
  <path d="M670,216 L725,216" marker-end="url(#ar)"/><path d="M835,222 L890,222" marker-end="url(#ar)"/><path d="M835,210 L670,210" marker-end="url(#ar)"/></g>
  <text x="780" y="252" font-size="8.5" fill="#2f6f4f">数据切块，executor 互相拉缺的块 → driver 不再是瓶颈</text>
  <rect x="40" y="272" width="980" height="130" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="296" font-size="11" font-weight="700" fill="#274a78">用途与机制</text>
  <text x="60" y="320" font-size="9.5" fill="#5b7db1">· 用途：分发只读数据到所有 executor——最典型是 <tspan font-weight="600">broadcast join</tspan> 的小表、大字典/查找表</text>
  <text x="60" y="342" font-size="9.5" fill="#5b7db1">· 机制：数据切成块（blockSize 默认 4m），经 BlockManager 存取；executor 缺块时优先从<tspan font-weight="600">其他 executor</tspan> 拉</text>
  <text x="60" y="364" font-size="9.5" fill="#5b7db1">· broadcast join：小表广播到各节点，与本地大表分区直接 join——<tspan font-weight="600">省掉 shuffle</tspan>（见 Shuffle / Catalyst AQE）</text>
  <text x="60" y="386" font-size="9" fill="#8aa6cf">· BroadcastManager（BroadcastManager.scala:32）管生命周期；AQE 可运行期动态改成 broadcast join</text>
  <rect x="40" y="414" width="980" height="88" rx="13" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="60" y="438" font-size="11" font-weight="700" fill="#7a5a1e">注意</text>
  <text x="60" y="460" font-size="9.5" fill="#93762e">· 只广播<tspan font-weight="600">小表</tspan>：广播的数据要装进每个 executor 内存，太大会 OOM（autoBroadcastJoinThreshold 默认 10MB 控自动触发）</text>
  <text x="60" y="480" font-size="9.5" fill="#93762e">· 一句话：TorrentBroadcast 用 BitTorrent 式点对点分发只读数据，让 driver 不成瓶颈，是 broadcast join 省 shuffle 的底座。</text>
</svg>
