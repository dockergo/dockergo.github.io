<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="540" viewBox="0 0 1060 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">分析阶段：把未解析计划解析成语义完整的逻辑计划</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">Analyzer (analysis/Analyzer.scala:363) 分批跑规则 · ResolveRelations(:1101) 绑定表 · 类比编译器语义分析</text>
  <g text-anchor="middle">
    <rect x="60" y="90" width="380" height="150" rx="13" fill="#fbeef0" stroke="#f0cdd4"/>
    <text x="250" y="114" font-size="11" font-weight="700" fill="#7a2230">未解析（parser 刚产出）</text>
    <rect x="80" y="128" width="340" height="26" rx="6" fill="#fff5f6" stroke="#f0cdd4"/><text x="250" y="146" font-size="8.5" fill="#7a2230">UnresolvedRelation("orders")  表未绑定</text>
    <rect x="80" y="160" width="340" height="26" rx="6" fill="#fff5f6" stroke="#f0cdd4"/><text x="250" y="178" font-size="8.5" fill="#7a2230">UnresolvedAttribute("amount")  列未绑定</text>
    <rect x="80" y="192" width="340" height="26" rx="6" fill="#fff5f6" stroke="#f0cdd4"/><text x="250" y="210" font-size="8.5" fill="#7a2230">函数/类型待推导</text>
    <text x="250" y="232" font-size="8" fill="#a44">只有语法结构，无语义</text>
  </g>
  <g text-anchor="middle">
    <rect x="620" y="90" width="380" height="150" rx="13" fill="#eafaf1" stroke="#bfe0cd"/>
    <text x="810" y="114" font-size="11" font-weight="700" fill="#12402a">已解析（analyzed 计划）</text>
    <rect x="640" y="128" width="340" height="26" rx="6" fill="#f2fbf6" stroke="#cdeadb"/><text x="810" y="146" font-size="8.5" fill="#12402a">orders 表 → catalog 里的真实表 + schema</text>
    <rect x="640" y="160" width="340" height="26" rx="6" fill="#f2fbf6" stroke="#cdeadb"/><text x="810" y="178" font-size="8.5" fill="#12402a">amount → orders.amount : Decimal</text>
    <rect x="640" y="192" width="340" height="26" rx="6" fill="#f2fbf6" stroke="#cdeadb"/><text x="810" y="210" font-size="8.5" fill="#12402a">函数已绑定、类型已推导</text>
    <text x="810" y="232" font-size="8" fill="#4c8567">语义完整，可优化</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none"><line x1="440" y1="165" x2="620" y2="165" marker-end="url(#ar)"/></g>
  <text x="530" y="156" font-size="9" fill="#a1a1a6" text-anchor="middle">Analyzer</text>
  <text x="530" y="182" font-size="8" fill="#a1a1a6" text-anchor="middle">分批规则解析</text>
  <rect x="40" y="264" width="980" height="90" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="288" font-size="11" font-weight="700" fill="#274a78">关键规则：ResolveRelations（Analyzer.scala:1101）</text>
  <text x="60" y="310" font-size="9.5" fill="#5b7db1">· 匹配 UnresolvedRelation（:1147/:1176），去 catalog 查表元数据，绑定到真实表 + schema</text>
  <text x="60" y="328" font-size="9.5" fill="#5b7db1">· 其余规则解析列引用、函数、隐式类型转换——都在 "Resolution" batch（:565-569）里跑到不动点</text>
  <text x="60" y="346" font-size="9" fill="#8aa6cf">· 解析失败（表/列不存在）→ AnalysisException（这就是你写错表名的报错来源）</text>
  <rect x="40" y="370" width="980" height="76" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="394" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="416" font-size="10" fill="#4b4b50">分析阶段把 parser 产出的"未解析"逻辑计划（表/列/函数都是占位符）解析成语义完整的计划：绑定表到 catalog、</text>
  <text x="60" y="434" font-size="10" fill="#4b4b50">推导类型、解析函数。这是后续所有优化的前提——就像编译器的语义分析，解析失败即 AnalysisException。</text>
</svg>
