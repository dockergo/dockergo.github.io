<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="520" viewBox="0 0 1060 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1060" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">流即无界表：把流当"不断追加行的表"，复用 DataFrame/Catalyst</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">StreamExecution(runtime/StreamExecution.scala:74) · IncrementalExecution(:65 "execute incrementally, preserving state")</text>
  <!-- unbounded table -->
  <rect x="40" y="76" width="440" height="200" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="260" y="100" font-size="11" font-weight="700" fill="#1b2a4a" text-anchor="middle">无界输入表（不断追加）</text>
  <g font-size="8" text-anchor="middle">
    <rect x="70" y="114" width="380" height="24" rx="5" fill="#e9f1fb" stroke="#c4d8f0"/><text x="260" y="130" fill="#1b2a4a">t=1 行：{user, event, time}</text>
    <rect x="70" y="142" width="380" height="24" rx="5" fill="#e9f1fb" stroke="#c4d8f0"/><text x="260" y="158" fill="#1b2a4a">t=2 行：新数据追加</text>
    <rect x="70" y="170" width="380" height="24" rx="5" fill="#e9f1fb" stroke="#c4d8f0"/><text x="260" y="186" fill="#1b2a4a">t=3 行：又追加……</text>
    <rect x="70" y="198" width="380" height="24" rx="5" fill="#f2f7fd" stroke="#d4e2f2" stroke-dasharray="3 2"/><text x="260" y="214" fill="#8aa6cf">…… 永不结束</text>
  </g>
  <text x="260" y="248" font-size="9" fill="#5b7db1" text-anchor="middle">你写的查询：df.groupBy(...).count —— 和批一模一样</text>
  <text x="260" y="266" font-size="8" fill="#8aa6cf" text-anchor="middle">不用学新 API，流只是"这张表在长"</text>
  <text x="510" y="184" font-size="24" fill="#c7c7cc">→</text>
  <!-- incremental exec -->
  <rect x="560" y="76" width="460" height="200" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="790" y="100" font-size="11" font-weight="700" fill="#12402a" text-anchor="middle">增量执行（复用 Catalyst）</text>
  <g font-size="8.5" text-anchor="middle">
    <rect x="580" y="116" width="420" height="34" rx="7" fill="#fff" stroke="#bfe0cd"/><text x="790" y="137" fill="#12402a">每批：analyze → optimize → physical（同批处理那套）</text>
    <rect x="580" y="158" width="420" height="34" rx="7" fill="#fff" stroke="#bfe0cd"/><text x="790" y="179" fill="#12402a">带上上一批的 state（IncrementalExecution）</text>
    <rect x="580" y="200" width="420" height="34" rx="7" fill="#f2fbf6" stroke="#cdeadb"/><text x="790" y="221" fill="#2f6f4f">结果事务性提交到 Sink</text>
  </g>
  <text x="790" y="256" font-size="8.5" fill="#2f6f4f" text-anchor="middle">流批一体：同一套引擎，流=分批增量地跑</text>
  <rect x="40" y="292" width="980" height="112" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="316" font-size="11" font-weight="700" fill="#274a78">为什么这样设计（流批一体）</text>
  <text x="60" y="340" font-size="9.5" fill="#5b7db1">· 老 Spark Streaming（DStream）是独立 API，与批不通用——学两套、代码不复用</text>
  <text x="60" y="362" font-size="9.5" fill="#5b7db1">· Structured Streaming 复用 DataFrame/Catalyst：<tspan font-weight="600">写批的代码，跑流的语义</tspan>——一套逻辑两种模式</text>
  <text x="60" y="384" font-size="9" fill="#8aa6cf">· 引擎负责把"对无界表的查询"翻译成"对每个增量批的执行 + 跨批状态维护"</text>
  <rect x="40" y="416" width="980" height="88" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="440" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="462" font-size="10" fill="#4b4b50">Structured Streaming 把无界流建模为"不断追加行的表"，你写的查询和批一样；引擎（StreamExecution +</text>
  <text x="60" y="480" font-size="10" fill="#4b4b50">IncrementalExecution）复用 Catalyst 那套 analyze→optimize→physical，每批带上一批 state 增量执行——</text>
  <text x="60" y="498" font-size="10" fill="#4b4b50">这就是"流批一体"：写批的代码，跑流的语义。</text>
</svg>
