<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="540" viewBox="0 0 1060 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1060" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">提交流程：SparkSubmit → driver → executor + app 内调度模式</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">SparkSubmit(deploy/SparkSubmit.scala:63) 按 deploy mode 分流(:270) · FIFO/FAIR(spark.scheduler.mode)</text>
  <g text-anchor="middle">
    <rect x="40" y="80" width="160" height="60" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/><text x="120" y="104" font-size="10" font-weight="600" fill="#3d2a5a">SparkSubmit</text><text x="120" y="122" font-size="8" fill="#7a5da5">解析参数、选 mode</text><text x="120" y="135" font-size="7.5" fill="#9a7cc4">:63 · deploy mode 分流:270</text>
    <rect x="230" y="80" width="160" height="60" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="310" y="104" font-size="10" font-weight="600" fill="#1b2a4a">driver 启动</text><text x="310" y="122" font-size="8" fill="#5b7db1">建 SparkContext</text><text x="310" y="135" font-size="7.5" fill="#8aa6cf">DAG/Task Scheduler</text>
    <rect x="420" y="80" width="160" height="60" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="500" y="104" font-size="10" font-weight="600" fill="#12402a">申请 executor</text><text x="500" y="122" font-size="8" fill="#2f6f4f">经 backend 向 mgr</text><text x="500" y="135" font-size="7.5" fill="#4c8567">cluster manager 起</text>
    <rect x="610" y="80" width="160" height="60" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/><text x="690" y="104" font-size="10" font-weight="600" fill="#5a3410">executor 注册</text><text x="690" y="122" font-size="8" fill="#93762e">RegisterExecutor</text><text x="690" y="135" font-size="7.5" fill="#b08843">回 driver</text>
    <rect x="800" y="80" width="220" height="60" rx="11" fill="#f6f2fb" stroke="#d9c9ec" filter="url(#soft)"/><text x="910" y="104" font-size="10" font-weight="600" fill="#3d2a5a">开始领 task 执行</text><text x="910" y="122" font-size="8" fill="#7a5da5">makeOffers → LaunchTask</text><text x="910" y="135" font-size="7.5" fill="#9a7cc4">进入 job→stage→task</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.3" fill="none"><line x1="200" y1="110" x2="230" y2="110" marker-end="url(#ar)"/><line x1="390" y1="110" x2="420" y2="110" marker-end="url(#ar)"/><line x1="580" y1="110" x2="610" y2="110" marker-end="url(#ar)"/><line x1="770" y1="110" x2="800" y2="110" marker-end="url(#ar)"/></g>
  <rect x="40" y="164" width="480" height="150" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="280" y="188" font-size="11" font-weight="700" fill="#1b2a4a" text-anchor="middle">deploy mode 分流（:270 / childMainClass:298）</text>
  <text x="60" y="212" font-size="9.5" fill="#5b7db1">· client：driver 在提交端（交互式，提交端断=app 死）</text>
  <text x="60" y="232" font-size="9.5" fill="#5b7db1">· cluster：driver 在集群内（生产，提交端可断开）</text>
  <text x="60" y="254" font-size="9.5" fill="#5b7db1">· 按 (clusterManager, deployMode) 选 childMainClass</text>
  <text x="60" y="276" font-size="8.5" fill="#8aa6cf">决定 driver 生命周期与网络位置（见运行形态图）</text>
  <text x="60" y="298" font-size="8.5" fill="#8aa6cf">Standalone cluster 可 driver.supervise 自动重启</text>
  <rect x="540" y="164" width="480" height="150" rx="13" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="780" y="188" font-size="11" font-weight="700" fill="#7a5a1e" text-anchor="middle">app 内调度模式（多 job 并发）</text>
  <text x="560" y="212" font-size="9.5" fill="#93762e">· FIFO（默认）：先提交的 job 先占资源</text>
  <text x="560" y="232" font-size="9.5" fill="#93762e">　—— 大 job 会让后来的小 job 排队</text>
  <text x="560" y="254" font-size="9.5" fill="#93762e">· FAIR：多 job 公平分享（Pool 分组）</text>
  <text x="560" y="276" font-size="9.5" fill="#93762e">　—— 交互式/多租户场景更公平</text>
  <text x="560" y="298" font-size="8.5" fill="#b08843">SchedulableBuilder/Pool · spark.scheduler.mode</text>
  <rect x="40" y="330" width="980" height="76" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="354" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="376" font-size="10" fill="#4b4b50">提交流程：SparkSubmit 按 deploy mode 决定 driver 位置（client 提交端/cluster 集群内）→ driver 建 SparkContext →</text>
  <text x="60" y="394" font-size="10" fill="#4b4b50">申请 executor → executor 注册 → 领 task。app 内多 job 用 FIFO（默认）或 FAIR（公平分享）调度。</text>
</svg>
