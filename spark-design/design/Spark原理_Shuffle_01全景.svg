<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="580" viewBox="0 0 1060 580" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="580" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Shuffle 全景：宽依赖处的跨节点数据重分布（stage 物化边界）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">相同 key 要聚到一起，但分散在上游各分区 → 必须跨节点重分布 · 网络+磁盘+序列化的集中点</text>

  <!-- map side -->
  <rect x="40" y="76" width="440" height="200" rx="14" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="260" y="100" font-size="11.5" font-weight="700" fill="#5a3410" text-anchor="middle">上游 stage（map 端）</text>
  <g text-anchor="middle" font-size="8">
    <rect x="60" y="116" width="120" height="60" rx="9" fill="#fff" stroke="#e8cf9a"/><text x="120" y="136" font-weight="600" fill="#5a3410">map task 1</text><text x="120" y="152" fill="#93762e">按 partitioner</text><text x="120" y="166" fill="#93762e">分桶写盘</text>
    <rect x="200" y="116" width="120" height="60" rx="9" fill="#fff" stroke="#e8cf9a"/><text x="260" y="136" font-weight="600" fill="#5a3410">map task 2</text><text x="260" y="152" fill="#93762e">同</text>
    <rect x="340" y="116" width="120" height="60" rx="9" fill="#fff" stroke="#e8cf9a"/><text x="400" y="136" font-weight="600" fill="#5a3410">map task 3</text><text x="400" y="152" fill="#93762e">同</text>
  </g>
  <rect x="60" y="188" width="400" height="70" rx="9" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="260" y="208" font-size="9" font-weight="600" fill="#5a3410" text-anchor="middle">每 map task 输出：1 数据文件 + 1 索引文件</text>
  <text x="260" y="226" font-size="8" fill="#93762e" text-anchor="middle">数据文件按 reduce 分区分桶；索引记每桶偏移</text>
  <text x="260" y="244" font-size="8" fill="#b08843" text-anchor="middle">IndexShuffleBlockResolver:57 · 避免海量小文件</text>

  <!-- shuffle -->
  <text x="530" y="176" font-size="28" fill="#f0a020" text-anchor="middle">⇉</text>
  <text x="530" y="200" font-size="8.5" fill="#b08843" text-anchor="middle">shuffle</text>
  <text x="530" y="214" font-size="8" fill="#b08843" text-anchor="middle">网络拉取</text>

  <!-- reduce side -->
  <rect x="580" y="76" width="440" height="200" rx="14" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="800" y="100" font-size="11.5" font-weight="700" fill="#1b2a4a" text-anchor="middle">下游 stage（reduce 端）</text>
  <g text-anchor="middle" font-size="8">
    <rect x="600" y="116" width="130" height="60" rx="9" fill="#fff" stroke="#bcd0ec"/><text x="665" y="136" font-weight="600" fill="#1b2a4a">reduce task 1</text><text x="665" y="152" fill="#5b7db1">拉所有 map 的桶 0</text><text x="665" y="166" fill="#5b7db1">聚合 key</text>
    <rect x="750" y="116" width="130" height="60" rx="9" fill="#fff" stroke="#bcd0ec"/><text x="815" y="136" font-weight="600" fill="#1b2a4a">reduce task 2</text><text x="815" y="152" fill="#5b7db1">拉所有 map 的桶 1</text>
    <rect x="900" y="116" width="100" height="60" rx="9" fill="#fff" stroke="#bcd0ec"/><text x="950" y="136" font-weight="600" fill="#1b2a4a">…</text>
  </g>
  <rect x="600" y="188" width="400" height="70" rx="9" fill="#e9f1fb" stroke="#c4d8f0"/>
  <text x="800" y="208" font-size="9" font-weight="600" fill="#1b2a4a" text-anchor="middle">每 reduce task 从所有 map 输出拉自己的桶</text>
  <text x="800" y="226" font-size="8" fill="#5b7db1" text-anchor="middle">MapOutputTracker 告诉去哪拉 · 并发限流拉取</text>
  <text x="800" y="244" font-size="8" fill="#8aa6cf" text-anchor="middle">相同 key 现在聚到同一 reduce task</text>

  <g stroke="#f0a020" stroke-width="1.4" fill="none">
    <path d="M480,150 L580,140" marker-end="url(#ar)"/>
    <path d="M480,175 L580,175" marker-end="url(#ar)"/>
  </g>

  <rect x="40" y="290" width="980" height="90" rx="13" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="60" y="314" font-size="11" font-weight="700" fill="#7a2230">为什么 shuffle 是头号性能变量</text>
  <text x="60" y="336" font-size="9.5" fill="#a44">· 三重开销：网络传输（跨节点拉取）+ 磁盘 IO（map 写盘/reduce spill）+ 序列化/反序列化</text>
  <text x="60" y="354" font-size="9.5" fill="#a44">· stage 物化边界：上游 stage 必须全完成、输出落盘，下游才能开始——串行化点</text>
  <text x="60" y="372" font-size="9" fill="#7a2230">· 数据倾斜在此暴露：某 key 太多 → 对应 reduce task 慢/OOM</text>

  <rect x="40" y="392" width="980" height="90" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="416" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="438" font-size="10" fill="#4b4b50">Shuffle 是宽依赖处"把相同 key 聚到一起"的跨节点重分布：map 端按 partitioner 分桶写盘（一数据+一索引），</text>
  <text x="60" y="456" font-size="10" fill="#4b4b50">reduce 端从所有 map 输出拉自己的桶再聚合。它是 stage 的物化边界、网络+磁盘+序列化的集中点——</text>
  <text x="60" y="474" font-size="10" fill="#4b4b50">Spark 性能与稳定性的头号变量，能减则减（broadcast join / 预分区）。</text>
</svg>
