<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="792" viewBox="0 0 1300 792" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="1300" height="792" fill="#fbfbfd"/>

  <text x="24" y="32" font-size="15" font-weight="700" fill="#1d1d1f">工程实现差异 · 同一套 MVCC，在真实系统里怎么落地 —— PostgreSQL / MySQL(InnoDB) / TiKV(Percolator) / CockroachDB</text>
  <text x="24" y="53" font-size="10.5" fill="#6e6e73">快照读内核几乎同构，分歧在「旧版本存哪、谁来 GC、要不要跨分片原子提交」。图例：◆ 库内已源码核实　◇ 权威文档 / 论文引证。下表按 6 个工程取舍维度横向对照。</text>

  <!-- 维度列头 -->
  <rect x="24" y="74" width="168" height="42" rx="9" fill="#eef0f3" stroke="#e4e7ec"/>
  <text x="108" y="100" font-size="12" font-weight="700" fill="#4a4a4f" text-anchor="middle">工程取舍维度</text>

  <!-- 四项目列头 -->
  <rect x="196" y="74" width="264" height="42" rx="9" fill="#eaf1fb" stroke="#c6d9f2"/>
  <text x="328" y="94" font-size="13" font-weight="800" fill="#20375e" text-anchor="middle">◆ PostgreSQL</text>
  <text x="328" y="109" font-size="9" fill="#5b7196" text-anchor="middle">单机 · 堆内多版本 MVCC</text>

  <rect x="464" y="74" width="264" height="42" rx="9" fill="#fbf0e2" stroke="#ecd6b6"/>
  <text x="596" y="94" font-size="13" font-weight="800" fill="#9a5f1c" text-anchor="middle">◆ MySQL · InnoDB</text>
  <text x="596" y="109" font-size="9" fill="#b0854a" text-anchor="middle">单机 · undo 回滚段版本链</text>

  <rect x="732" y="74" width="264" height="42" rx="9" fill="#e4f4f4" stroke="#bfe1e1"/>
  <text x="864" y="94" font-size="13" font-weight="800" fill="#1d6b6e" text-anchor="middle">◇ TiKV · Percolator</text>
  <text x="864" y="109" font-size="9" fill="#4a8a8c" text-anchor="middle">分布式 · 带 ts 的多版本 KV</text>

  <rect x="1000" y="74" width="276" height="42" rx="9" fill="#f4eefb" stroke="#dcc9ef"/>
  <text x="1138" y="94" font-size="13" font-weight="800" fill="#6f3ea8" text-anchor="middle">◇ CockroachDB · SSI</text>
  <text x="1138" y="109" font-size="9" fill="#8a6bab" text-anchor="middle">分布式 · HLC 时间戳 MVCC</text>

  <!-- ============ 行1：多版本存储 ============ -->
  <rect x="24" y="122" width="168" height="88" rx="9" fill="#f6f7f9" stroke="#e4e7ec"/>
  <text x="38" y="150" font-size="11.5" font-weight="700" fill="#1d1d1f">① 多版本存储</text>
  <text x="38" y="171" font-size="9" fill="#8a97ab">旧版本存在</text>
  <text x="38" y="185" font-size="9" fill="#8a97ab">哪里、以什么</text>
  <text x="38" y="199" font-size="9" fill="#8a97ab">形式组织</text>

  <rect x="196" y="122" width="264" height="88" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="210" y="146" font-size="10.5" font-weight="700" fill="#20375e">堆内多版本</text>
  <text x="210" y="165" font-size="9.5" fill="#4a4a4f">新版本另存堆页，旧版原地</text>
  <text x="210" y="181" font-size="9.5" fill="#4a4a4f">保留、打 t_xmax 标记删除；</text>
  <text x="210" y="197" font-size="9.5" fill="#4a4a4f">同行多版本并存于表页。</text>

  <rect x="464" y="122" width="264" height="88" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="478" y="146" font-size="10.5" font-weight="700" fill="#9a5f1c">undo 回滚段版本链</text>
  <text x="478" y="165" font-size="9.5" fill="#4a4a4f">主键行就地更新，旧值拷进</text>
  <text x="478" y="181" font-size="9.5" fill="#4a4a4f">undo；DB_ROLL_PTR 把历史</text>
  <text x="478" y="197" font-size="9.5" fill="#4a4a4f">版本串成链。</text>

  <rect x="732" y="122" width="264" height="88" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="746" y="146" font-size="10.5" font-weight="700" fill="#1d6b6e">RocksDB 多版本 KV</text>
  <text x="746" y="165" font-size="9.5" fill="#4a4a4f">三列族 CF_DEFAULT/LOCK/WRITE</text>
  <text x="746" y="181" font-size="9.5" fill="#4a4a4f">= data/lock/write；key 编码</text>
  <text x="746" y="197" font-size="9.5" fill="#4a4a4f">时间戳，新版本排在前。</text>

  <rect x="1000" y="122" width="276" height="88" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="1014" y="146" font-size="10.5" font-weight="700" fill="#6f3ea8">MVCC KV（每 key 多版本）</text>
  <text x="1014" y="165" font-size="9.5" fill="#4a4a4f">每 key 存多个时间戳版本，</text>
  <text x="1014" y="181" font-size="9.5" fill="#4a4a4f">落在底层 KV（Pebble），</text>
  <text x="1014" y="197" font-size="9.5" fill="#4a4a4f">未提交写先落「写意图」。</text>

  <!-- ============ 行2：可见性判定 ============ -->
  <rect x="24" y="215" width="168" height="88" rx="9" fill="#f6f7f9" stroke="#e4e7ec"/>
  <text x="38" y="243" font-size="11.5" font-weight="700" fill="#1d1d1f">② 可见性判定</text>
  <text x="38" y="264" font-size="9" fill="#8a97ab">怎样判断某</text>
  <text x="38" y="278" font-size="9" fill="#8a97ab">版本对本事务</text>
  <text x="38" y="292" font-size="9" fill="#8a97ab">可见</text>

  <rect x="196" y="215" width="264" height="88" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="210" y="239" font-size="10.5" font-weight="700" fill="#20375e">快照 xmin/xmax/xip</text>
  <text x="210" y="258" font-size="9.5" fill="#4a4a4f">对照行头 t_xmin/t_xmax，</text>
  <text x="210" y="274" font-size="9.5" fill="#4a4a4f">提交状态查 CLOG，</text>
  <text x="210" y="290" font-size="9.5" fill="#4a4a4f">结论以 hint bits 回写缓存。</text>

  <rect x="464" y="215" width="264" height="88" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="478" y="239" font-size="10.5" font-weight="700" fill="#9a5f1c">ReadView 沿链回溯</text>
  <text x="478" y="258" font-size="9.5" fill="#4a4a4f">快照记活跃事务 min/max/列表，</text>
  <text x="478" y="274" font-size="9.5" fill="#4a4a4f">版本不可见就沿 DB_ROLL_PTR</text>
  <text x="478" y="290" font-size="9.5" fill="#4a4a4f">回溯 undo 重建旧版本。</text>

  <rect x="732" y="215" width="264" height="88" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="746" y="239" font-size="10.5" font-weight="700" fill="#1d6b6e">start_ts 快照读</text>
  <text x="746" y="258" font-size="9.5" fill="#4a4a4f">读 write 列中 commit_ts ≤ ts</text>
  <text x="746" y="274" font-size="9.5" fill="#4a4a4f">的最新记录；遇 lock 列</text>
  <text x="746" y="290" font-size="9.5" fill="#4a4a4f">在 [0,ts] 内则退避 / 清锁。</text>

  <rect x="1000" y="215" width="276" height="88" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="1014" y="239" font-size="10.5" font-weight="700" fill="#6f3ea8">HLC 时间戳 + 事务记录</text>
  <text x="1014" y="258" font-size="9.5" fill="#4a4a4f">混合逻辑时钟给版本定序，</text>
  <text x="1014" y="274" font-size="9.5" fill="#4a4a4f">遇写意图查其事务记录判</text>
  <text x="1014" y="290" font-size="9.5" fill="#4a4a4f">提交 / 中止 / 进行中。</text>

  <!-- ============ 行3：GC / 清理 ============ -->
  <rect x="24" y="308" width="168" height="88" rx="9" fill="#f6f7f9" stroke="#e4e7ec"/>
  <text x="38" y="336" font-size="11.5" font-weight="700" fill="#1d1d1f">③ 旧版本 GC</text>
  <text x="38" y="357" font-size="9" fill="#8a97ab">谁回收再无人</text>
  <text x="38" y="371" font-size="9" fill="#8a97ab">可见的旧版本、</text>
  <text x="38" y="385" font-size="9" fill="#8a97ab">怎样定水位</text>

  <rect x="196" y="308" width="264" height="88" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="210" y="332" font-size="10.5" font-weight="700" fill="#20375e">VACUUM（autovacuum）</text>
  <text x="210" y="351" font-size="9.5" fill="#4a4a4f">后台回收死元组，并冻结老</text>
  <text x="210" y="367" font-size="9.5" fill="#4a4a4f">事务防 XID 回卷；长事务 /</text>
  <text x="210" y="383" font-size="9.5" fill="#4a4a4f">关 autovacuum 会膨胀甚至停写。</text>

  <rect x="464" y="308" width="264" height="88" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="478" y="332" font-size="10.5" font-weight="700" fill="#9a5f1c">purge 线程</text>
  <text x="478" y="351" font-size="9.5" fill="#4a4a4f">再无快照可见后回收 undo</text>
  <text x="478" y="367" font-size="9.5" fill="#4a4a4f">版本；长事务拖长 history</text>
  <text x="478" y="383" font-size="9.5" fill="#4a4a4f">list、purge 滞后则回滚段膨胀。</text>

  <rect x="732" y="308" width="264" height="88" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="746" y="332" font-size="10.5" font-weight="700" fill="#1d6b6e">GC by safe point</text>
  <text x="746" y="351" font-size="9.5" fill="#4a4a4f">按全局 GC safepoint 删除</text>
  <text x="746" y="367" font-size="9.5" fill="#4a4a4f">早于它的旧版本；</text>
  <text x="746" y="383" font-size="9.5" fill="#4a4a4f">受最老快照制约上不去。</text>

  <rect x="1000" y="308" width="276" height="88" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="1014" y="332" font-size="10.5" font-weight="700" fill="#6f3ea8">MVCC GC + protected ts</text>
  <text x="1014" y="351" font-size="9.5" fill="#4a4a4f">按 gc.ttlseconds 回收过期</text>
  <text x="1014" y="367" font-size="9.5" fill="#4a4a4f">版本；protected timestamp</text>
  <text x="1014" y="383" font-size="9.5" fill="#4a4a4f">为备份 / 变更流护住旧版本。</text>

  <!-- ============ 行4：默认隔离级别 ============ -->
  <rect x="24" y="401" width="168" height="88" rx="9" fill="#f6f7f9" stroke="#e4e7ec"/>
  <text x="38" y="429" font-size="11.5" font-weight="700" fill="#1d1d1f">④ 默认隔离级别</text>
  <text x="38" y="450" font-size="9" fill="#8a97ab">开箱默认给</text>
  <text x="38" y="464" font-size="9" fill="#8a97ab">哪一档、可调</text>
  <text x="38" y="478" font-size="9" fill="#8a97ab">到什么</text>

  <rect x="196" y="401" width="264" height="88" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="210" y="425" font-size="10.5" font-weight="700" fill="#20375e">Read Committed（默认）</text>
  <text x="210" y="444" font-size="9.5" fill="#4a4a4f">每条语句取新快照；</text>
  <text x="210" y="460" font-size="9.5" fill="#4a4a4f">可调 Repeatable Read 或</text>
  <text x="210" y="476" font-size="9.5" fill="#4a4a4f">Serializable（叠加 SSI）。</text>

  <rect x="464" y="401" width="264" height="88" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="478" y="425" font-size="10.5" font-weight="700" fill="#9a5f1c">Repeatable Read（默认）</text>
  <text x="478" y="444" font-size="9.5" fill="#4a4a4f">事务级快照沿用到结束，</text>
  <text x="478" y="460" font-size="9.5" fill="#4a4a4f">配间隙锁（gap lock）防</text>
  <text x="478" y="476" font-size="9.5" fill="#4a4a4f">幻读；可调 RC / Serializable。</text>

  <rect x="732" y="401" width="264" height="88" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="746" y="425" font-size="10.5" font-weight="700" fill="#1d6b6e">Snapshot Isolation</text>
  <text x="746" y="444" font-size="9.5" fill="#4a4a4f">Percolator 提供 SI；TiDB 侧</text>
  <text x="746" y="460" font-size="9.5" fill="#4a4a4f">默认 RR≈SI，start_ts 全局</text>
  <text x="746" y="476" font-size="9.5" fill="#4a4a4f">一致快照读。</text>

  <rect x="1000" y="401" width="276" height="88" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="1014" y="425" font-size="10.5" font-weight="700" fill="#6f3ea8">Serializable（默认，唯一）</text>
  <text x="1014" y="444" font-size="9.5" fill="#4a4a4f">开箱即可串行化，</text>
  <text x="1014" y="460" font-size="9.5" fill="#4a4a4f">冲突则事务重试；</text>
  <text x="1014" y="476" font-size="9.5" fill="#4a4a4f">另可选 Read Committed。</text>

  <!-- ============ 行5：写冲突控制 ============ -->
  <rect x="24" y="494" width="168" height="88" rx="9" fill="#f6f7f9" stroke="#e4e7ec"/>
  <text x="38" y="522" font-size="11.5" font-weight="700" fill="#1d1d1f">⑤ 写冲突控制</text>
  <text x="38" y="543" font-size="9" fill="#8a97ab">悲观锁还是</text>
  <text x="38" y="557" font-size="9" fill="#8a97ab">乐观校验、怎样</text>
  <text x="38" y="571" font-size="9" fill="#8a97ab">解决写写冲突</text>

  <rect x="196" y="494" width="264" height="88" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="210" y="518" font-size="10.5" font-weight="700" fill="#20375e">MVCC + 行锁 + SSI</text>
  <text x="210" y="537" font-size="9.5" fill="#4a4a4f">写取行锁、当前读锁行；</text>
  <text x="210" y="553" font-size="9.5" fill="#4a4a4f">Serializable 追踪 rw-依赖，</text>
  <text x="210" y="569" font-size="9.5" fill="#4a4a4f">危险结构命中即回滚一方。</text>

  <rect x="464" y="494" width="264" height="88" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="478" y="518" font-size="10.5" font-weight="700" fill="#9a5f1c">2PL 行锁 + 间隙锁</text>
  <text x="478" y="537" font-size="9.5" fill="#4a4a4f">S/X 行锁 + next-key 锁，</text>
  <text x="478" y="553" font-size="9.5" fill="#4a4a4f">死锁检测器发现等待图有环</text>
  <text x="478" y="569" font-size="9.5" fill="#4a4a4f">即回滚代价小的一方。</text>

  <rect x="732" y="494" width="264" height="88" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="746" y="518" font-size="10.5" font-weight="700" fill="#1d6b6e">Percolator 乐观锁</text>
  <text x="746" y="537" font-size="9.5" fill="#4a4a4f">Prewrite 给每行上锁、选一</text>
  <text x="746" y="553" font-size="9.5" fill="#4a4a4f">key 作 Primary；亦支持悲观</text>
  <text x="746" y="569" font-size="9.5" fill="#4a4a4f">锁模式（SELECT ... FOR UPDATE）。</text>

  <rect x="1000" y="494" width="276" height="88" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="1014" y="518" font-size="10.5" font-weight="700" fill="#6f3ea8">乐观 + 读刷新（refresh）</text>
  <text x="1014" y="537" font-size="9.5" fill="#4a4a4f">timestamp cache 防写落在</text>
  <text x="1014" y="553" font-size="9.5" fill="#4a4a4f">已服务的读之下；被推时间</text>
  <text x="1014" y="569" font-size="9.5" fill="#4a4a4f">戳则 refresh，失败才重启事务。</text>

  <!-- ============ 行6：分布式提交 ============ -->
  <rect x="24" y="587" width="168" height="88" rx="9" fill="#f6f7f9" stroke="#e4e7ec"/>
  <text x="38" y="615" font-size="11.5" font-weight="700" fill="#1d1d1f">⑥ 分布式提交</text>
  <text x="38" y="636" font-size="9" fill="#8a97ab">跨分片 / 跨节点</text>
  <text x="38" y="650" font-size="9" fill="#8a97ab">怎样原子成败、</text>
  <text x="38" y="664" font-size="9" fill="#8a97ab">仲裁点在哪</text>

  <rect x="196" y="587" width="264" height="88" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="210" y="611" font-size="10.5" font-weight="700" fill="#20375e">单机（2PC 仅外部）</text>
  <text x="210" y="630" font-size="9.5" fill="#4a4a4f">内部单节点提交；</text>
  <text x="210" y="646" font-size="9.5" fill="#4a4a4f">PREPARE TRANSACTION 的 2PC</text>
  <text x="210" y="662" font-size="9.5" fill="#4a4a4f">用于外部分布式 / 逻辑复制。</text>

  <rect x="464" y="587" width="264" height="88" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="478" y="611" font-size="10.5" font-weight="700" fill="#9a5f1c">单机（内部两阶段）</text>
  <text x="478" y="630" font-size="9.5" fill="#4a4a4f">redo + binlog 组提交做内部</text>
  <text x="478" y="646" font-size="9.5" fill="#4a4a4f">两阶段（引擎间一致）；</text>
  <text x="478" y="662" font-size="9.5" fill="#4a4a4f">跨库靠 XA(2PC)。</text>

  <rect x="732" y="587" width="264" height="88" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="746" y="611" font-size="10.5" font-weight="700" fill="#1d6b6e">Percolator 2PC</text>
  <text x="746" y="630" font-size="9.5" fill="#4a4a4f">Prewrite → Commit；先原子</text>
  <text x="746" y="646" font-size="9.5" fill="#4a4a4f">提交 Primary lock 即算事务</text>
  <text x="746" y="662" font-size="9.5" fill="#4a4a4f">成功，Secondary 异步跟进。</text>

  <rect x="1000" y="587" width="276" height="88" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="1014" y="611" font-size="10.5" font-weight="700" fill="#6f3ea8">Parallel Commit</text>
  <text x="1014" y="630" font-size="9.5" fill="#4a4a4f">并行写意图 + 事务记录置</text>
  <text x="1014" y="646" font-size="9.5" fill="#4a4a4f">STAGING，用「意图全就位」</text>
  <text x="1014" y="662" font-size="9.5" fill="#4a4a4f">推断已提交，省一轮 RTT。</text>

  <!-- 底部一句话总括 -->
  <rect x="24" y="688" width="1252" height="70" rx="12" fill="#ffffff" stroke="#e4e7ec" filter="url(#soft)"/>
  <text x="42" y="713" font-size="10.5" font-weight="700" fill="#1d1d1f">本质差异</text>
  <text x="112" y="713" font-size="10" fill="#4a4a4f">同一套快照读内核：<tspan font-weight="700" fill="#20375e">PostgreSQL</tspan> 把旧版本留在堆页（VACUUM 回收 + 防 XID 回卷）、<tspan font-weight="700" fill="#9a5f1c">MySQL/InnoDB</tspan> 存进 undo 回滚段（purge 回收），两者单机、2PC 仅用于外部；</text>
  <text x="112" y="731" font-size="10" fill="#4a4a4f"><tspan font-weight="700" fill="#1d6b6e">TiKV</tspan> 把 MVCC 搬进带 ts 的 KV 用 Percolator 2PC（Primary lock 作原子点）、<tspan font-weight="700" fill="#6f3ea8">CockroachDB</tspan> 用 HLC + 事务记录、默认串行化并以 Parallel Commit 收口。</text>
  <text x="112" y="750" font-size="9" fill="#8a97ab">取舍两根主轴：版本存储位置（堆 / undo / 带 ts 的 KV）× 提交是否跨节点——单机把可见性做进堆或 undo，分布式把它做进带时间戳的 KV 并用 2PC / 并行提交收口。</text>
</svg>
