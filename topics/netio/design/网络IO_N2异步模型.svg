<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="aT" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2aa0a4"/></marker>
    <marker id="aG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="aR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#d1544a"/></marker>
  </defs>
  <rect width="1120" height="620" fill="#fbfbfd"/>

  <text x="30" y="32" font-size="15" font-weight="700" fill="#1d1d1f">异步 I/O 两种范式 · epoll 就绪通知 vs io_uring 完成通知 —— 分野是「先问就绪再自己做」还是「交出去等回执」</text>
  <text x="30" y="53" font-size="10.5" fill="#6e6e73">epoll 只报 fd 可读/可写，读写仍是独立 syscall + 内核→用户拷贝；io_uring 用共享的 SQ/CQ 双环批量提交、结果直接回写，把 syscall 摊薄到接近零</text>

  <line x1="30" y1="80" x2="54" y2="80" stroke="#d1544a" stroke-width="2" marker-end="url(#aR)"/>
  <text x="60" y="84" font-size="10" fill="#3a3a3c">syscall 陷入内核（每次 read 一趟 + 一次拷贝）</text>
  <line x1="380" y1="80" x2="404" y2="80" stroke="#2aa0a4" stroke-width="2" marker-end="url(#aT)"/>
  <text x="410" y="84" font-size="10" fill="#3a3a3c">共享环读写 / 批量提交（无 syscall）</text>
  <line x1="720" y1="80" x2="744" y2="80" stroke="#2f9e6e" stroke-width="2" marker-end="url(#aG)"/>
  <text x="750" y="84" font-size="10" fill="#3a3a3c">完成通知回写 CQ</text>

  <!-- ===== 左：epoll 就绪通知 ===== -->
  <rect x="30" y="100" width="520" height="500" rx="14" fill="#eaf1fb" stroke="#c6d9f2"/>
  <text x="50" y="128" font-size="13" font-weight="700" fill="#20375e">epoll · 就绪通知（readiness）</text>
  <text x="50" y="147" font-size="9" fill="#5a7099">内核只告诉你「哪些 fd 就绪」，真正的 read / write 仍要各自陷入内核</text>

  <!-- ① epoll_wait -->
  <rect x="60" y="162" width="440" height="46" rx="10" fill="#ffffff" stroke="#c6d9f2" filter="url(#soft)"/>
  <text x="280" y="184" font-size="11.5" font-weight="700" fill="#20375e" text-anchor="middle">① 应用 epoll_wait(epfd, events)</text>
  <text x="280" y="200" font-size="9" fill="#5a7099" text-anchor="middle">阻塞等待，一次 syscall 换回一批就绪事件</text>

  <line x1="280" y1="210" x2="280" y2="230" stroke="#d1544a" stroke-width="2" marker-end="url(#aR)"/>
  <text x="292" y="225" font-size="8.5" fill="#b23b30">syscall 陷入①</text>

  <!-- 内核返回就绪集 -->
  <rect x="60" y="232" width="440" height="66" rx="10" fill="#fdecea" stroke="#f3c9c3"/>
  <text x="76" y="254" font-size="10.5" font-weight="700" fill="#b23b30">内核：扫描就绪列表，返回就绪 fd 集合</text>
  <g font-size="9" text-anchor="middle">
    <rect x="76" y="266" width="120" height="22" rx="6" fill="#ffffff" stroke="#e8a79f"/><text x="136" y="281" fill="#9a4038">fd3 可读</text>
    <rect x="206" y="266" width="120" height="22" rx="6" fill="#ffffff" stroke="#e8a79f"/><text x="266" y="281" fill="#9a4038">fd7 可读</text>
    <rect x="336" y="266" width="120" height="22" rx="6" fill="#ffffff" stroke="#e8a79f"/><text x="396" y="281" fill="#9a4038">fd9 可读</text>
  </g>

  <text x="70" y="326" font-size="10.5" font-weight="700" fill="#20375e">② 对每个就绪 fd 各发一次 read()（数据搬运在此发生）</text>

  <!-- 三次 read -->
  <g font-size="9.5">
    <rect x="70" y="342" width="120" height="28" rx="7" fill="#ffffff" stroke="#d1544a"/><text x="130" y="360" fill="#b23b30" text-anchor="middle">read(fd3)</text>
    <line x1="192" y1="356" x2="248" y2="356" stroke="#d1544a" stroke-width="1.8" marker-end="url(#aR)"/>
    <rect x="252" y="342" width="200" height="28" rx="7" fill="#fdecea" stroke="#f3c9c3"/><text x="352" y="360" fill="#9a4038" text-anchor="middle">一次内核→用户拷贝</text>
    <text x="462" y="360" font-size="8.5" fill="#8a97ab">→buf</text>

    <rect x="70" y="378" width="120" height="28" rx="7" fill="#ffffff" stroke="#d1544a"/><text x="130" y="396" fill="#b23b30" text-anchor="middle">read(fd7)</text>
    <line x1="192" y1="392" x2="248" y2="392" stroke="#d1544a" stroke-width="1.8" marker-end="url(#aR)"/>
    <rect x="252" y="378" width="200" height="28" rx="7" fill="#fdecea" stroke="#f3c9c3"/><text x="352" y="396" fill="#9a4038" text-anchor="middle">一次内核→用户拷贝</text>
    <text x="462" y="396" font-size="8.5" fill="#8a97ab">→buf</text>

    <rect x="70" y="414" width="120" height="28" rx="7" fill="#ffffff" stroke="#d1544a"/><text x="130" y="432" fill="#b23b30" text-anchor="middle">read(fd9)</text>
    <line x1="192" y1="428" x2="248" y2="428" stroke="#d1544a" stroke-width="1.8" marker-end="url(#aR)"/>
    <rect x="252" y="414" width="200" height="28" rx="7" fill="#fdecea" stroke="#f3c9c3"/><text x="352" y="432" fill="#9a4038" text-anchor="middle">一次内核→用户拷贝</text>
    <text x="462" y="432" font-size="8.5" fill="#8a97ab">→buf</text>
  </g>

  <!-- 代价 -->
  <rect x="60" y="458" width="440" height="128" rx="10" fill="#fdecea" stroke="#f3c9c3"/>
  <text x="76" y="480" font-size="11" font-weight="700" fill="#b23b30">代价 · 每个 IO 至少两趟陷入内核</text>
  <text x="76" y="502" font-size="9.5" fill="#9a4038">· N 个就绪 fd = 1×epoll_wait + N×read，syscall 随并发线性增长</text>
  <text x="76" y="522" font-size="9.5" fill="#9a4038">· 每次 read 一趟陷入 + 一次内核→用户拷贝，逐次搬运</text>
  <text x="76" y="542" font-size="9.5" fill="#9a4038">· 就绪 ≠ 完成：内核只报「能读了」，读与拷贝仍甩回应用做</text>
  <text x="76" y="564" font-size="8.5" fill="#8a97ab">优点：语义简单、成熟通用、内核托底，生态与工具最完整</text>

  <!-- ===== 右：io_uring 完成通知 ===== -->
  <rect x="570" y="100" width="520" height="500" rx="14" fill="#e3f4f4" stroke="#bfe3e4"/>
  <text x="590" y="128" font-size="13" font-weight="700" fill="#1a6d70">io_uring · 完成通知（completion）</text>
  <text x="590" y="147" font-size="9" fill="#4a8d8f">SQ / CQ 双环共享内存，批量提交请求、结果直接回写，无需逐次陷入</text>

  <!-- SQ 环 -->
  <rect x="586" y="162" width="234" height="122" rx="11" fill="#ffffff" stroke="#bfe3e4" filter="url(#soft)"/>
  <text x="703" y="184" font-size="10.5" font-weight="700" fill="#1a6d70" text-anchor="middle">提交队列 SQ（用户/内核共享环）</text>
  <g font-size="9" text-anchor="middle">
    <rect x="602" y="196" width="202" height="24" rx="6" fill="#d5efef" stroke="#8fcccd"/><text x="703" y="212" fill="#1a6d70">SQE0 · read(fd3)</text>
    <rect x="602" y="224" width="202" height="24" rx="6" fill="#d5efef" stroke="#8fcccd"/><text x="703" y="240" fill="#1a6d70">SQE1 · read(fd7)</text>
    <rect x="602" y="252" width="202" height="24" rx="6" fill="#d5efef" stroke="#8fcccd"/><text x="703" y="268" fill="#1a6d70">SQE2 · write(fd9)</text>
  </g>

  <!-- CQ 环 -->
  <rect x="844" y="162" width="230" height="122" rx="11" fill="#eaf6f0" stroke="#bfe3d1" filter="url(#soft)"/>
  <text x="959" y="184" font-size="10.5" font-weight="700" fill="#2f6b4e" text-anchor="middle">完成队列 CQ（共享环）</text>
  <g font-size="9" text-anchor="middle">
    <rect x="860" y="196" width="198" height="24" rx="6" fill="#dff2e8" stroke="#9ed3b8"/><text x="959" y="212" fill="#2f6b4e">CQE0 · res=1024</text>
    <rect x="860" y="224" width="198" height="24" rx="6" fill="#dff2e8" stroke="#9ed3b8"/><text x="959" y="240" fill="#2f6b4e">CQE1 · res=512</text>
    <rect x="860" y="252" width="198" height="24" rx="6" fill="#dff2e8" stroke="#9ed3b8"/><text x="959" y="268" fill="#2f6b4e">CQE2 · res=256</text>
  </g>

  <!-- 提交 / 完成 箭头 -->
  <line x1="703" y1="284" x2="703" y2="304" stroke="#2aa0a4" stroke-width="2.2" marker-end="url(#aT)"/>
  <text x="586" y="300" font-size="8.5" fill="#1a6d70">提交</text>
  <line x1="959" y1="304" x2="959" y2="284" stroke="#2f9e6e" stroke-width="2.2" marker-end="url(#aG)"/>
  <text x="1030" y="300" font-size="8.5" fill="#2f6b4e" text-anchor="end">完成回写</text>

  <!-- 内核条 -->
  <rect x="586" y="306" width="488" height="62" rx="10" fill="#fbf3e2" stroke="#ecd6a8"/>
  <text x="602" y="328" font-size="10.5" font-weight="700" fill="#8a6417">内核：从 SQ 取请求 → 执行各 IO → 完成后把结果写回 CQ</text>
  <text x="602" y="348" font-size="9.5" fill="#7a5a1a">SQPOLL 模式：内核线程主动轮询 SQ，应用连 io_uring_enter() 都省 → 零 syscall</text>
  <text x="602" y="362" font-size="8.5" fill="#a98a3a">批量：一次 enter 提交整批 N 个请求，一次收割整批 CQE</text>

  <!-- 提交/收割流程 -->
  <rect x="586" y="378" width="488" height="72" rx="10" fill="#ffffff" stroke="#bfe3e4"/>
  <text x="602" y="400" font-size="9.5" fill="#1a6d70">① 应用把待办 IO 作为 SQE 批量写入 SQ 环 —— 直接写共享内存，无 syscall</text>
  <text x="602" y="420" font-size="9.5" fill="#1a6d70">② io_uring_enter() 一次提交整批（SQPOLL 下由内核线程自拉，连这次也省）</text>
  <text x="602" y="440" font-size="9.5" fill="#2f6b4e">③ 内核完成后写 CQE 回 CQ，应用轮询收割结果 —— 同样无 syscall、无逐次拷贝陷阱</text>

  <!-- 收益 -->
  <rect x="586" y="458" width="488" height="128" rx="10" fill="#eaf6f0" stroke="#bfe3d1"/>
  <text x="602" y="480" font-size="11" font-weight="700" fill="#2f6b4e">收益 · syscall 摊薄到接近零</text>
  <text x="602" y="502" font-size="9.5" fill="#3a5a48">· N 个 IO = 1 次 io_uring_enter（SQPOLL 下 0 次），不随并发线性膨胀</text>
  <text x="602" y="522" font-size="9.5" fill="#3a5a48">· 请求与结果都走共享环，无 per-IO 陷入、无逐次内核→用户拷贝</text>
  <text x="602" y="542" font-size="9.5" fill="#3a5a48">· 完成通知：交出去等回执，不必自己盯就绪、再亲自动手</text>
  <text x="602" y="564" font-size="8.5" fill="#8a97ab">代价：接口与内存序更复杂，正确使用门槛高于 epoll</text>
</svg>
