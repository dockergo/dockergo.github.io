<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="636" viewBox="0 0 1180 636" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="1180" height="636" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">工程实现差异 · 高性能网络 I/O 在真实项目里的落地取舍</text>
  <text x="30" y="50" font-size="10.5" fill="#6e6e73">同一批机理（多路复用 / 零拷贝 / 连接模型 / 协议层）在 4 个真实系统上各有取舍；列头着色区分项目，越靠内核越通用、越旁路越极致</text>

  <!-- 列头行 -->
  <rect x="30" y="64" width="200" height="44" rx="9" fill="#f6f7f9" stroke="#e4e7ec"/>
  <text x="130" y="83" font-size="11.5" font-weight="700" fill="#4a4a4f" text-anchor="middle">工程取舍维度</text>
  <text x="130" y="99" font-size="8.5" fill="#8a97ab" text-anchor="middle">同一机理，不同落地</text>

  <rect x="234" y="64" width="223" height="44" rx="9" fill="#e5f3ec" stroke="#bfe0cf"/>
  <text x="345" y="85" font-size="12.5" font-weight="800" fill="#1f6f4a" text-anchor="middle">nginx</text>
  <text x="345" y="100" font-size="8.5" fill="#4a8b6a" text-anchor="middle">反向代理 / 静态服务器 · C</text>

  <rect x="465" y="64" width="223" height="44" rx="9" fill="#e3f4f4" stroke="#bfe3e4"/>
  <text x="576" y="85" font-size="12.5" font-weight="800" fill="#1a6d70" text-anchor="middle">gRPC</text>
  <text x="576" y="100" font-size="8.5" fill="#4a8d8f" text-anchor="middle">RPC 框架 · C++ core</text>

  <rect x="696" y="64" width="223" height="44" rx="9" fill="#fbeee5" stroke="#f0cbb0"/>
  <text x="807" y="85" font-size="12.5" font-weight="800" fill="#b3542a" text-anchor="middle">DPDK</text>
  <text x="807" y="100" font-size="8.5" fill="#c07a52" text-anchor="middle">内核旁路数据面 · C</text>

  <rect x="927" y="64" width="223" height="44" rx="9" fill="#f0eaf6" stroke="#dcc9ec"/>
  <text x="1038" y="85" font-size="12.5" font-weight="800" fill="#6b4a8f" text-anchor="middle">Envoy</text>
  <text x="1038" y="100" font-size="8.5" fill="#8a6bab" text-anchor="middle">服务网格 L7 sidecar · C++</text>

  <!-- ============ 行1：I/O 多路复用 ============ -->
  <rect x="30" y="112" width="200" height="72" rx="9" fill="#f6f7f9" stroke="#e4e7ec"/>
  <text x="44" y="142" font-size="11" font-weight="700" fill="#1d1d1f">① I/O 多路复用</text>
  <text x="44" y="160" font-size="8.5" fill="#8a97ab">靠什么等就绪 / 完成</text>
  <rect x="234" y="112" width="223" height="72" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="248" y="139" font-size="10" font-weight="700" fill="#1f6f4a">epoll 事件循环</text>
  <text x="248" y="158" font-size="8.5" fill="#4a4a4f">边缘触发 · 单线程跑满一核</text>
  <rect x="465" y="112" width="223" height="72" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="479" y="139" font-size="10" font-weight="700" fill="#1a6d70">epoll + 流复用</text>
  <text x="479" y="158" font-size="8.5" fill="#4a4a4f">HTTP/2 流 over 事件循环</text>
  <rect x="696" y="112" width="223" height="72" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="710" y="139" font-size="10" font-weight="700" fill="#b3542a">PMD 轮询</text>
  <text x="710" y="158" font-size="8.5" fill="#4a4a4f">忙查 rx ring · 无 epoll</text>
  <rect x="927" y="112" width="223" height="72" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="941" y="139" font-size="10" font-weight="700" fill="#6b4a8f">epoll 事件循环</text>
  <text x="941" y="158" font-size="8.5" fill="#4a4a4f">每 worker 线程一循环</text>

  <!-- ============ 行2：并发 / 连接模型 ============ -->
  <rect x="30" y="184" width="200" height="72" rx="9" fill="#f6f7f9" stroke="#e4e7ec"/>
  <text x="44" y="214" font-size="11" font-weight="700" fill="#1d1d1f">② 并发 / 连接模型</text>
  <text x="44" y="232" font-size="8.5" fill="#8a97ab">谁扛住海量连接</text>
  <rect x="234" y="184" width="223" height="72" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="248" y="211" font-size="10" font-weight="700" fill="#1f6f4a">多进程单线程</text>
  <text x="248" y="230" font-size="8.5" fill="#4a4a4f">master-worker · worker 非阻塞</text>
  <rect x="465" y="184" width="223" height="72" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="479" y="211" font-size="10" font-weight="700" fill="#1a6d70">线程池 + CQ</text>
  <text x="479" y="230" font-size="8.5" fill="#4a4a4f">每核一 CQ 一线程死循环</text>
  <rect x="696" y="184" width="223" height="72" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="710" y="211" font-size="10" font-weight="700" fill="#b3542a">每核绑定独占</text>
  <text x="710" y="230" font-size="8.5" fill="#4a4a4f">run-to-completion · 无切换</text>
  <rect x="927" y="184" width="223" height="72" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="941" y="211" font-size="10" font-weight="700" fill="#6b4a8f">多 worker 线程</text>
  <text x="941" y="230" font-size="8.5" fill="#4a4a4f">各自独立事件循环</text>

  <!-- ============ 行3：零拷贝手段 ============ -->
  <rect x="30" y="256" width="200" height="72" rx="9" fill="#f6f7f9" stroke="#e4e7ec"/>
  <text x="44" y="286" font-size="11" font-weight="700" fill="#1d1d1f">③ 零拷贝手段</text>
  <text x="44" y="304" font-size="8.5" fill="#8a97ab">字节怎么少搬</text>
  <rect x="234" y="256" width="223" height="72" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="248" y="283" font-size="10" font-weight="700" fill="#1f6f4a">sendfile 零拷贝</text>
  <text x="248" y="302" font-size="8.5" fill="#4a4a4f">buffer chain 只传引用</text>
  <rect x="465" y="256" width="223" height="72" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="479" y="283" font-size="10" font-weight="700" fill="#1a6d70">Slice 引用计数</text>
  <text x="479" y="302" font-size="8.5" fill="#4a4a4f">切帧移指针 · 不复制字节</text>
  <rect x="696" y="256" width="223" height="72" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="710" y="283" font-size="10" font-weight="700" fill="#b3542a">DMA 直写 mbuf</text>
  <text x="710" y="302" font-size="8.5" fill="#4a4a4f">网卡→用户态零拷贝</text>
  <rect x="927" y="256" width="223" height="72" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="941" y="283" font-size="10" font-weight="700" fill="#6b4a8f">buffer 分片</text>
  <text x="941" y="302" font-size="8.5" fill="#4a4a4f">零拷贝 · 可选 io_uring</text>

  <!-- ============ 行4：协议层定位 ============ -->
  <rect x="30" y="328" width="200" height="72" rx="9" fill="#f6f7f9" stroke="#e4e7ec"/>
  <text x="44" y="358" font-size="11" font-weight="700" fill="#1d1d1f">④ 协议层定位</text>
  <text x="44" y="376" font-size="8.5" fill="#8a97ab">处在协议栈哪一层</text>
  <rect x="234" y="328" width="223" height="72" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="248" y="355" font-size="10" font-weight="700" fill="#1f6f4a">HTTP 反向代理</text>
  <text x="248" y="374" font-size="8.5" fill="#4a4a4f">HTTP/1.1 · HTTP/2 · 静态</text>
  <rect x="465" y="328" width="223" height="72" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="479" y="355" font-size="10" font-weight="700" fill="#1a6d70">gRPC / HTTP2</text>
  <text x="479" y="374" font-size="8.5" fill="#4a4a4f">chttp2 双端共用 transport</text>
  <rect x="696" y="328" width="223" height="72" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="710" y="355" font-size="10" font-weight="700" fill="#b3542a">L2/L3 原始帧</text>
  <text x="710" y="374" font-size="8.5" fill="#4a4a4f">协议栈须自建</text>
  <rect x="927" y="328" width="223" height="72" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="941" y="355" font-size="10" font-weight="700" fill="#6b4a8f">L7 代理</text>
  <text x="941" y="374" font-size="8.5" fill="#4a4a4f">HTTP / gRPC / TCP 通吃</text>

  <!-- ============ 行5：多路复用 / 流控 ============ -->
  <rect x="30" y="400" width="200" height="72" rx="9" fill="#f6f7f9" stroke="#e4e7ec"/>
  <text x="44" y="430" font-size="11" font-weight="700" fill="#1d1d1f">⑤ 复用 / 流控</text>
  <text x="44" y="448" font-size="8.5" fill="#8a97ab">一条连接跑多请求</text>
  <rect x="234" y="400" width="223" height="72" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="248" y="427" font-size="10" font-weight="700" fill="#1f6f4a">HTTP/2 stream</text>
  <text x="248" y="446" font-size="8.5" fill="#4a4a4f">keepalive 连接复用</text>
  <rect x="465" y="400" width="223" height="72" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="479" y="427" font-size="10" font-weight="700" fill="#1a6d70">两级流控</text>
  <text x="479" y="446" font-size="8.5" fill="#4a4a4f">stream 复用 · BDP 动态调窗</text>
  <rect x="696" y="400" width="223" height="72" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="710" y="427" font-size="10" font-weight="700" fill="#b3542a">无内建</text>
  <text x="710" y="446" font-size="8.5" fill="#4a4a4f">复用逻辑由应用自定</text>
  <rect x="927" y="400" width="223" height="72" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="941" y="427" font-size="10" font-weight="700" fill="#6b4a8f">stream + 连接池</text>
  <text x="941" y="446" font-size="8.5" fill="#4a4a4f">上游连接复用</text>

  <!-- ============ 行6：与内核的关系 ============ -->
  <rect x="30" y="472" width="200" height="72" rx="9" fill="#f6f7f9" stroke="#e4e7ec"/>
  <text x="44" y="502" font-size="11" font-weight="700" fill="#1d1d1f">⑥ 与内核的关系</text>
  <text x="44" y="520" font-size="8.5" fill="#8a97ab">在内核内还是旁路</text>
  <rect x="234" y="472" width="223" height="72" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="248" y="499" font-size="10" font-weight="700" fill="#1f6f4a">走内核协议栈</text>
  <text x="248" y="518" font-size="8.5" fill="#4a4a4f">syscall 收发字节</text>
  <rect x="465" y="472" width="223" height="72" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="479" y="499" font-size="10" font-weight="700" fill="#1a6d70">走内核栈</text>
  <text x="479" y="518" font-size="8.5" fill="#4a4a4f">iomgr / EventEngine 驱动</text>
  <rect x="696" y="472" width="223" height="72" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="710" y="499" font-size="10" font-weight="700" fill="#b3542a">完全内核旁路</text>
  <text x="710" y="518" font-size="8.5" fill="#4a4a4f">bypass · 独占网卡</text>
  <rect x="927" y="472" width="223" height="72" rx="9" fill="#fff" stroke="#e4e7ec"/>
  <text x="941" y="499" font-size="10" font-weight="700" fill="#6b4a8f">走内核</text>
  <text x="941" y="518" font-size="8.5" fill="#4a4a4f">sidecar 拦截进出流量</text>

  <!-- 底部本质差异总纲 -->
  <rect x="30" y="558" width="1120" height="64" rx="12" fill="#ffffff" stroke="#e4e7ec" filter="url(#soft)"/>
  <text x="48" y="582" font-size="10.5" font-weight="700" fill="#1d1d1f">本质差异</text>
  <text x="120" y="582" font-size="10" fill="#4a4a4f">四者都在「谁搬字节 · 用什么连接模型 · 在内核内还是旁路」上取舍：<tspan font-weight="700" fill="#1f6f4a">nginx</tspan> 多进程单线程 + sendfile 把数据面留在内核；<tspan font-weight="700" fill="#1a6d70">gRPC</tspan> 把一条 TCP 复用成 N 个 stream、用 CQ / Slice 换复用与零拷贝；</text>
  <text x="120" y="602" font-size="10" fill="#4a4a4f"><tspan font-weight="700" fill="#b3542a">DPDK</tspan> 彻底旁路内核、独占核轮询榨干数据面；<tspan font-weight="700" fill="#6b4a8f">Envoy</tspan> 以 L7 sidecar 多线程代理通吃协议。</text>
  <text x="120" y="617" font-size="9" fill="#8a97ab">一句话：越靠近内核越通用（省心、可移植），越旁路 / 越专用越极致（榨吞吐、低时延），代价是自己扛安全与协议。</text>
</svg>
