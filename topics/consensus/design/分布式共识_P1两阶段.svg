<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="aP" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8a5cae"/></marker>
    <marker id="aB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#4a7fd0"/></marker>
    <marker id="aG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
  </defs>
  <rect width="1120" height="620" fill="#fbfbfd"/>

  <text x="30" y="32" font-size="15" font-weight="700" fill="#1d1d1f">两阶段 prepare / accept · 单个值的决议：先以提案号 n 抢占承诺，再在承诺范围内提交值 —— 保证一旦被多数派选定就永不改变</text>
  <text x="30" y="53" font-size="10.5" fill="#6e6e73">提案号 n 全局唯一且递增；Acceptor 只承诺「不再接受编号更小的提案」。核心约束：Proposer 若发现已有被接受的值，必须沿用它而非自己的值</text>

  <!-- 图例 -->
  <line x1="30" y1="80" x2="54" y2="80" stroke="#8a5cae" stroke-width="2" marker-end="url(#aP)"/>
  <text x="60" y="84" font-size="10" fill="#3a3a3c">Phase 1: Prepare(n) / Promise</text>
  <line x1="330" y1="80" x2="354" y2="80" stroke="#4a7fd0" stroke-width="2" marker-end="url(#aB)"/>
  <text x="360" y="84" font-size="10" fill="#3a3a3c">Phase 2: Accept(n,v) / Accepted</text>
  <line x1="640" y1="80" x2="664" y2="80" stroke="#2f9e6e" stroke-width="2" marker-end="url(#aG)"/>
  <text x="670" y="84" font-size="10" fill="#3a3a3c">多数派达成 → 值被 chosen（不可变）</text>

  <!-- 角色列头 -->
  <text x="130" y="120" font-size="12" font-weight="700" fill="#6f3ea8" text-anchor="middle">Proposer</text>
  <text x="620" y="120" font-size="12" font-weight="700" fill="#20375e" text-anchor="middle">Acceptors（多数派仲裁）</text>

  <!-- Proposer 生命线 -->
  <line x1="130" y1="130" x2="130" y2="560" stroke="#dcc9ef" stroke-width="2"/>
  <!-- 三个 acceptor 生命线 -->
  <line x1="520" y1="130" x2="520" y2="560" stroke="#c6d9f2" stroke-width="1.6"/>
  <line x1="720" y1="130" x2="720" y2="560" stroke="#c6d9f2" stroke-width="1.6"/>
  <line x1="920" y1="130" x2="920" y2="560" stroke="#c6d9f2" stroke-width="1.6"/>
  <text x="520" y="146" font-size="9.5" fill="#5a7099" text-anchor="middle">A1</text>
  <text x="720" y="146" font-size="9.5" fill="#5a7099" text-anchor="middle">A2</text>
  <text x="920" y="146" font-size="9.5" fill="#5a7099" text-anchor="middle">A3</text>

  <!-- Phase 1 box -->
  <rect x="40" y="158" width="1050" height="182" rx="12" fill="#f4eefb" stroke="#dcc9ef"/>
  <text x="58" y="180" font-size="12" font-weight="700" fill="#6f3ea8">Phase 1 · Prepare —— 抢占：拿到多数派「不接受更小编号」的承诺，并回收已接受的值</text>

  <!-- prepare 箭头 -->
  <line x1="130" y1="204" x2="512" y2="204" stroke="#8a5cae" stroke-width="1.8" marker-end="url(#aP)"/>
  <line x1="130" y1="206" x2="712" y2="220" stroke="#8a5cae" stroke-width="1.8" marker-end="url(#aP)"/>
  <line x1="130" y1="208" x2="912" y2="236" stroke="#8a5cae" stroke-width="1.8" marker-end="url(#aP)"/>
  <text x="300" y="198" font-size="9.5" fill="#6f3ea8">Prepare(n=5)</text>

  <!-- promise 返回 -->
  <line x1="520" y1="250" x2="138" y2="270" stroke="#8a5cae" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#aP)"/>
  <line x1="720" y1="258" x2="138" y2="274" stroke="#8a5cae" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#aP)"/>
  <text x="330" y="286" font-size="9.5" fill="#6f3ea8">Promise(n=5, 已接受? ⟨n_a, v_a⟩)</text>

  <rect x="440" y="298" width="620" height="32" rx="8" fill="#fff" stroke="#dcc9ef"/>
  <text x="454" y="318" font-size="9.5" fill="#5a3a7a">收到多数派 Promise → 若其中带回已接受值，取<tspan font-weight="700"> 编号最大的那个 v_a 作为本次提案值</tspan>；否则可用自己的值</text>

  <!-- Phase 2 box -->
  <rect x="40" y="352" width="1050" height="182" rx="12" fill="#eaf1fb" stroke="#c6d9f2"/>
  <text x="58" y="374" font-size="12" font-weight="700" fill="#20375e">Phase 2 · Accept —— 在承诺范围内提交值；多数派 Accepted 即 chosen</text>

  <line x1="130" y1="398" x2="512" y2="398" stroke="#4a7fd0" stroke-width="1.8" marker-end="url(#aB)"/>
  <line x1="130" y1="400" x2="712" y2="414" stroke="#4a7fd0" stroke-width="1.8" marker-end="url(#aB)"/>
  <line x1="130" y1="402" x2="912" y2="430" stroke="#4a7fd0" stroke-width="1.8" marker-end="url(#aB)"/>
  <text x="300" y="392" font-size="9.5" fill="#20375e">Accept(n=5, v)</text>

  <!-- accepted -->
  <line x1="520" y1="444" x2="138" y2="462" stroke="#2f9e6e" stroke-width="1.4" marker-end="url(#aG)"/>
  <line x1="720" y1="452" x2="138" y2="466" stroke="#2f9e6e" stroke-width="1.4" marker-end="url(#aG)"/>
  <text x="330" y="480" font-size="9.5" fill="#2f6b4e">Accepted(n=5, v)  —— A1,A2 接受（A3 更小编号会被拒）</text>

  <rect x="440" y="492" width="620" height="32" rx="8" fill="#eaf6f0" stroke="#bfe3d1"/>
  <text x="454" y="512" font-size="9.5" fill="#2f6b4e">多数派(2/3) Accepted → 值 <tspan font-weight="700">v 被 chosen</tspan>：任何更高编号的后续提案都会经 Phase 1 回收到 v 并沿用它</text>

  <!-- 底部安全性 -->
  <rect x="40" y="546" width="1050" height="58" rx="12" fill="#ffffff" stroke="#e4e7ec" filter="url(#soft)"/>
  <text x="58" y="570" font-size="10.5" font-weight="700" fill="#2f6b4e">安全性</text>
  <text x="120" y="570" font-size="10" fill="#4a4a4f">一旦某值被多数派 chosen，因「Phase 1 必回收已接受的最大编号值并强制沿用」，后续更高编号提案只会再次选定同一个值 → 值唯一、不可变。</text>
  <text x="58" y="590" font-size="10" fill="#8a97ab">代价：每决议两轮 RTT + 两次持久化；且并发 Proposer 互相抬高编号会「活锁」。→ 见下一机制：稳定 Leader 摊销 Phase 1。</text>
</svg>
