<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="aB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#4a7fd0"/></marker>
    <marker id="aR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#d1544a"/></marker>
    <marker id="aG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
  </defs>
  <rect width="1120" height="620" fill="#fbfbfd"/>

  <text x="30" y="32" font-size="15" font-weight="700" fill="#1d1d1f">Leader 选举与任期 · 任期 term 单调递增；选举超时触发 Candidate 拉票，赢得多数派选票即成为该 term 唯一 Leader</text>
  <text x="30" y="53" font-size="10.5" fill="#6e6e73">选举安全：每个 term 至多一个 Leader。随机化选举超时打破对称，避免选票长期瓜分（split vote）</text>

  <!-- 图例 -->
  <line x1="30" y1="80" x2="54" y2="80" stroke="#4a7fd0" stroke-width="2" marker-end="url(#aB)"/>
  <text x="60" y="84" font-size="10" fill="#3a3a3c">角色状态转换</text>
  <line x1="200" y1="80" x2="224" y2="80" stroke="#2f9e6e" stroke-width="2" marker-end="url(#aG)"/>
  <text x="230" y="84" font-size="10" fill="#3a3a3c">获多数派选票 → 当选</text>
  <line x1="420" y1="80" x2="444" y2="80" stroke="#d1544a" stroke-width="2" marker-end="url(#aR)"/>
  <text x="450" y="84" font-size="10" fill="#3a3a3c">见更高 term → 退位为 Follower</text>

  <!-- Panel A: 状态机 -->
  <rect x="30" y="100" width="600" height="290" rx="14" fill="#ffffff" stroke="#e4e7ec" filter="url(#soft)"/>
  <text x="52" y="126" font-size="13" font-weight="700" fill="#1d1d1f">① 角色状态机（Follower / Candidate / Leader）</text>

  <!-- 前进标注 -->
  <text x="205" y="172" font-size="9" fill="#5a3a7a">选举超时 → term+1，自投一票</text>
  <text x="452" y="172" font-size="9" fill="#2f6b4e">赢得多数派选票</text>

  <!-- 节点 -->
  <rect x="55" y="180" width="140" height="52" rx="12" fill="#eaf1fb" stroke="#c6d9f2"/>
  <text x="125" y="203" font-size="12.5" font-weight="700" fill="#20375e" text-anchor="middle">Follower</text>
  <text x="125" y="220" font-size="9" fill="#5a7099" text-anchor="middle">跟随日志 · 超时计时</text>

  <rect x="290" y="180" width="150" height="52" rx="12" fill="#f4eefb" stroke="#dcc9ef"/>
  <text x="365" y="203" font-size="12.5" font-weight="700" fill="#6f3ea8" text-anchor="middle">Candidate</text>
  <text x="365" y="220" font-size="9" fill="#8a5cae" text-anchor="middle">发起 RequestVote 拉票</text>

  <rect x="520" y="180" width="110" height="52" rx="12" fill="#eaf6f0" stroke="#bfe3d1"/>
  <text x="575" y="203" font-size="12.5" font-weight="700" fill="#2f6b4e" text-anchor="middle">Leader</text>
  <text x="575" y="220" font-size="9" fill="#3f8a63" text-anchor="middle">复制日志 · 心跳</text>

  <!-- 前进箭头 -->
  <line x1="195" y1="206" x2="286" y2="206" stroke="#4a7fd0" stroke-width="2" marker-end="url(#aB)"/>
  <line x1="440" y1="206" x2="516" y2="206" stroke="#2f9e6e" stroke-width="2" marker-end="url(#aG)"/>

  <!-- 回退弧（红） -->
  <path d="M300 232 C 260 278 190 278 152 234" fill="none" stroke="#d1544a" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#aR)"/>
  <text x="226" y="296" font-size="9" fill="#8a4038" text-anchor="middle">收到现任 Leader 心跳 / 见更高 term → 退回</text>
  <path d="M525 232 C 380 350 260 350 150 238" fill="none" stroke="#d1544a" stroke-width="1.8" marker-end="url(#aR)"/>
  <text x="345" y="368" font-size="9" fill="#8a4038" text-anchor="middle">任何角色见到更高 term → 立即退位为 Follower</text>

  <!-- Panel B: 拉票 -->
  <rect x="650" y="100" width="440" height="290" rx="14" fill="#ffffff" stroke="#e4e7ec" filter="url(#soft)"/>
  <text x="672" y="126" font-size="13" font-weight="700" fill="#1d1d1f">② 拉票：自投 + 收集选票，过半即当选</text>

  <rect x="672" y="238" width="100" height="50" rx="12" fill="#f4eefb" stroke="#dcc9ef"/>
  <text x="722" y="260" font-size="11.5" font-weight="700" fill="#6f3ea8" text-anchor="middle">Candidate</text>
  <text x="722" y="277" font-size="9" fill="#8a5cae" text-anchor="middle">term T · 自投✓</text>

  <text x="792" y="152" font-size="9" fill="#4a7fd0">RequestVote(term T, lastLog)</text>
  <!-- peers -->
  <line x1="774" y1="256" x2="988" y2="160" stroke="#4a7fd0" stroke-width="1.6" marker-end="url(#aB)"/>
  <line x1="774" y1="258" x2="988" y2="216" stroke="#4a7fd0" stroke-width="1.6" marker-end="url(#aB)"/>
  <line x1="774" y1="262" x2="988" y2="272" stroke="#4a7fd0" stroke-width="1.6" marker-end="url(#aB)"/>
  <line x1="774" y1="266" x2="988" y2="328" stroke="#4a7fd0" stroke-width="1.6" marker-end="url(#aB)"/>

  <circle cx="1010" cy="160" r="18" fill="#eaf6f0" stroke="#bfe3d1"/><text x="1010" y="164" font-size="12" fill="#2f6b4e" text-anchor="middle">✓</text>
  <circle cx="1010" cy="216" r="18" fill="#eaf6f0" stroke="#bfe3d1"/><text x="1010" y="220" font-size="12" fill="#2f6b4e" text-anchor="middle">✓</text>
  <circle cx="1010" cy="272" r="18" fill="#fbe6e3" stroke="#e8a79f"/><text x="1010" y="276" font-size="12" fill="#8a4038" text-anchor="middle">✗</text>
  <circle cx="1010" cy="328" r="18" fill="#f4f4f6" stroke="#d7d7dd" stroke-dasharray="3 2"/><text x="1010" y="332" font-size="8.5" fill="#a1a1a6" text-anchor="middle">超时</text>
  <text x="1040" y="164" font-size="9" fill="#3f8a63">授票</text>
  <text x="1040" y="220" font-size="9" fill="#3f8a63">授票</text>
  <text x="1040" y="276" font-size="9" fill="#b06a60">已投他人</text>
  <text x="1040" y="332" font-size="9" fill="#a1a1a6">无响应</text>

  <rect x="672" y="330" width="300" height="42" rx="10" fill="#eaf6f0" stroke="#bfe3d1"/>
  <text x="686" y="347" font-size="10" font-weight="700" fill="#2f6b4e">自投 1 + 2 = 3/5 ≥ ⌈5/2⌉ 多数派</text>
  <text x="686" y="363" font-size="9.5" fill="#3f8a63">→ 成为 term T 的唯一 Leader，立即广播心跳压制其余 Candidate</text>

  <!-- Panel C: 任期时间轴 -->
  <rect x="30" y="404" width="1060" height="196" rx="14" fill="#ffffff" stroke="#e4e7ec" filter="url(#soft)"/>
  <text x="52" y="430" font-size="13" font-weight="700" fill="#1d1d1f">③ 任期(term) 时间轴 · term 单调递增，每 term 至多一个 Leader</text>

  <!-- 段 -->
  <rect x="60" y="446" width="240" height="42" rx="9" fill="#eaf6f0" stroke="#bfe3d1"/>
  <text x="180" y="466" font-size="10.5" font-weight="700" fill="#2f6b4e" text-anchor="middle">term 1 · Leader A 服务</text>
  <text x="180" y="481" font-size="9" fill="#3f8a63" text-anchor="middle">A 宕机 ✗</text>

  <rect x="312" y="446" width="248" height="42" rx="9" fill="#fbe6e3" stroke="#e8a79f" stroke-dasharray="5 3"/>
  <text x="436" y="466" font-size="10.5" font-weight="700" fill="#8a4038" text-anchor="middle">term 2 · 选票瓜分</text>
  <text x="436" y="481" font-size="9" fill="#b06a60" text-anchor="middle">无人过半 → 本 term 无 Leader，作废</text>

  <rect x="572" y="446" width="288" height="42" rx="9" fill="#eaf6f0" stroke="#bfe3d1"/>
  <text x="716" y="466" font-size="10.5" font-weight="700" fill="#2f6b4e" text-anchor="middle">term 3 · 随机超时错峰 → Leader B 当选</text>
  <text x="716" y="481" font-size="9" fill="#3f8a63" text-anchor="middle">B 服务中</text>

  <rect x="872" y="446" width="188" height="42" rx="9" fill="#eaf1fb" stroke="#c6d9f2"/>
  <text x="966" y="466" font-size="10.5" font-weight="700" fill="#20375e" text-anchor="middle">term 4 · …</text>
  <text x="966" y="481" font-size="9" fill="#5a7099" text-anchor="middle">term↑ 持续</text>

  <line x1="60" y1="512" x2="1060" y2="512" stroke="#d7d7dd" stroke-width="1.2" marker-end="url(#aB)"/>
  <text x="1058" y="528" font-size="9" fill="#a1a1a6" text-anchor="end">时间 →</text>

  <text x="60" y="556" font-size="10" fill="#4a4a4f">· 旧 term 的 Leader 一旦见到更高 term，立即退位；同一 term 内绝不会有第二个 Leader（多数派相交保证）。</text>
  <text x="60" y="576" font-size="10" fill="#4a4a4f">· 已提交日志经「Leader 完备性」延续：新 Leader 必包含此前所有已提交条目 —— 选举时只投给日志至少与自己一样新的候选人。</text>
</svg>
