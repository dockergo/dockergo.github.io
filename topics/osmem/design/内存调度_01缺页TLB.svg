<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="aG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="aA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c99a3a"/></marker>
    <marker id="aR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c4562f"/></marker>
  </defs>
  <rect width="1120" height="640" fill="#fbfbfd"/>

  <text x="30" y="32" font-size="15" font-weight="700" fill="#1d1d1f">图解点 ① 缺页处理与 TLB 命中 · 一个虚拟地址如何被翻译：TLB 命中最快、未命中查页表、页不在则缺页陷入内核</text>
  <text x="30" y="53" font-size="10.5" fill="#6e6e73">CPU 发出 VA → 先查 TLB；命中直接得物理帧；未命中走页表 walk 并回填 TLB；页表项无效（页不在内存）→ 缺页异常陷入内核建立映射后重试</text>

  <line x1="30" y1="80" x2="54" y2="80" stroke="#2f9e6e" stroke-width="2" marker-end="url(#aG)"/>
  <text x="60" y="84" font-size="10" fill="#3a3a3c">快路径：TLB 命中（纯硬件，1 步）</text>
  <line x1="336" y1="80" x2="360" y2="80" stroke="#c99a3a" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#aA)"/>
  <text x="366" y="84" font-size="10" fill="#3a3a3c">中速：TLB 未命中 → 页表 walk（minor）</text>
  <line x1="700" y1="80" x2="724" y2="80" stroke="#c4562f" stroke-width="2" marker-end="url(#aR)"/>
  <text x="730" y="84" font-size="10" fill="#3a3a3c">慢路径：缺页陷入内核（major/minor fault）</text>

  <!-- CPU 发出 VA -->
  <rect x="30" y="112" width="180" height="120" rx="13" fill="#ffffff" stroke="#d9dde4" filter="url(#soft)"/>
  <text x="120" y="138" font-size="12" font-weight="700" fill="#1d1d1f" text-anchor="middle">CPU · 访存</text>
  <text x="46" y="164" font-size="9.5" fill="#4a4a4f">指令要读 / 写某地址</text>
  <text x="46" y="186" font-size="9.5" fill="#4a4a4f">发出虚拟地址 VA</text>
  <text x="46" y="208" font-size="9.5" fill="#4a4a4f">= VPN（页号）+ 页内偏移</text>
  <text x="46" y="226" font-size="8.5" fill="#8a97ab">翻译由 MMU 自动完成</text>

  <!-- TLB 查询 -->
  <rect x="250" y="112" width="200" height="120" rx="13" fill="#eef7f2" stroke="#c9e6d7" filter="url(#soft)"/>
  <text x="350" y="138" font-size="12" font-weight="700" fill="#2f6b4e" text-anchor="middle">① 查 TLB</text>
  <text x="266" y="164" font-size="9.5" fill="#2f6b4e">用 VPN 查翻译缓存</text>
  <text x="266" y="186" font-size="9.5" fill="#2f6b4e">存 VPN → 物理帧号 PFN</text>
  <text x="266" y="208" font-size="9.5" fill="#2f6b4e">硬件并行比对，极快</text>
  <text x="266" y="226" font-size="8.5" fill="#5a9078">命中率高 → 大多数访存走快路径</text>

  <!-- 判定分叉 -->
  <path d="M490 172 L540 142 L590 172 L540 202 Z" fill="#fff" stroke="#c9c9cf"/>
  <text x="540" y="168" font-size="9.5" font-weight="700" fill="#4a4a4f" text-anchor="middle">TLB</text>
  <text x="540" y="184" font-size="9.5" font-weight="700" fill="#4a4a4f" text-anchor="middle">命中?</text>

  <!-- 命中 → 物理帧 -->
  <rect x="640" y="112" width="200" height="120" rx="13" fill="#eef7f2" stroke="#c9e6d7" filter="url(#soft)"/>
  <text x="740" y="138" font-size="12" font-weight="700" fill="#2f6b4e" text-anchor="middle">命中 · 直接得物理帧</text>
  <text x="656" y="164" font-size="9.5" fill="#2f6b4e">PFN + 页内偏移 = 物理地址</text>
  <text x="656" y="186" font-size="9.5" fill="#2f6b4e">直接访问物理内存</text>
  <text x="656" y="208" font-size="9.5" fill="#2f6b4e">一步完成，无内核介入</text>
  <text x="656" y="226" font-size="8.5" fill="#5a9078">最快、最常见的稳态路径</text>

  <!-- 访问物理内存 -->
  <rect x="880" y="112" width="210" height="120" rx="13" fill="#ffffff" stroke="#d9dde4" filter="url(#soft)"/>
  <text x="985" y="138" font-size="12" font-weight="700" fill="#1d1d1f" text-anchor="middle">物理内存</text>
  <text x="896" y="164" font-size="9.5" fill="#4a4a4f">按物理地址读 / 写</text>
  <text x="896" y="186" font-size="9.5" fill="#4a4a4f">数据返回给 CPU</text>
  <text x="896" y="208" font-size="9.5" fill="#4a4a4f">指令继续执行</text>
  <text x="896" y="226" font-size="8.5" fill="#8a97ab">三条路径最终都汇到这里</text>

  <!-- 未命中 → 页表 walk -->
  <rect x="250" y="288" width="330" height="150" rx="13" fill="#fbf3e2" stroke="#ecd6a8" filter="url(#soft)"/>
  <text x="266" y="314" font-size="12" font-weight="700" fill="#8a6417">② TLB 未命中 → 页表 walk</text>
  <text x="266" y="338" font-size="9.5" fill="#7a5a1a">硬件按 VA 分段逐级索引多级页表</text>
  <text x="266" y="360" font-size="9.5" fill="#7a5a1a">读页表项 PTE：含物理帧号 + 有效位 / 权限</text>
  <text x="266" y="382" font-size="9.5" fill="#7a5a1a">PTE 有效 → 取出 PFN，回填 TLB</text>
  <text x="266" y="404" font-size="9.5" fill="#2f6b4e">→ 下次同页访问就命中快路径</text>
  <text x="266" y="424" font-size="8.5" fill="#a98a3a">多访存本身（走内存查表），但无需内核</text>

  <!-- PTE 有效? 分叉 -->
  <path d="M610 363 L660 333 L710 363 L660 393 Z" fill="#fff" stroke="#c9c9cf"/>
  <text x="660" y="359" font-size="9" font-weight="700" fill="#4a4a4f" text-anchor="middle">PTE</text>
  <text x="660" y="374" font-size="9" font-weight="700" fill="#4a4a4f" text-anchor="middle">有效?</text>

  <!-- 缺页陷入内核 -->
  <rect x="250" y="472" width="530" height="150" rx="13" fill="#fdecea" stroke="#f3c9c3" filter="url(#soft)"/>
  <text x="266" y="498" font-size="12" font-weight="700" fill="#b23b30">③ 页不在内存 → 缺页异常陷入内核</text>
  <text x="266" y="522" font-size="9.5" fill="#9a4038">PTE 无效（页从未映射 / 被换出）→ CPU 抛 page fault，切内核态</text>
  <text x="266" y="544" font-size="9.5" fill="#9a4038"><tspan font-weight="700">minor fault</tspan>：页已在内存（如共享页 / 已在页缓存）→ 只需建立映射</text>
  <text x="266" y="566" font-size="9.5" fill="#9a4038"><tspan font-weight="700">major fault</tspan>：页在磁盘（换出 / 文件）→ 需 I/O 读回，代价高</text>
  <text x="266" y="588" font-size="9.5" fill="#9a4038">内核分配物理帧、填好 PTE → 返回用户态<tspan fill="#c4562f" font-weight="700"> 重新执行该指令</tspan></text>
  <text x="266" y="610" font-size="8.5" fill="#c98a82">重试后 TLB 未命中 → walk 命中 → 正常访问，故障对程序透明</text>

  <!-- 右下：三路径代价对照 -->
  <rect x="810" y="288" width="280" height="334" rx="13" fill="#f6f7f9" stroke="#e4e7ec"/>
  <text x="828" y="314" font-size="11.5" font-weight="700" fill="#1d1d1f">三路径代价（由快到慢）</text>
  <rect x="828" y="330" width="244" height="60" rx="9" fill="#eef7f2" stroke="#c9e6d7"/>
  <text x="842" y="352" font-size="10" font-weight="600" fill="#2f6b4e">TLB 命中</text>
  <text x="842" y="372" font-size="9" fill="#2f6b4e">≈ 1 步，纯硬件，占绝大多数</text>
  <rect x="828" y="400" width="244" height="60" rx="9" fill="#fbf3e2" stroke="#ecd6a8"/>
  <text x="842" y="422" font-size="10" font-weight="600" fill="#8a6417">TLB 未命中 + walk</text>
  <text x="842" y="442" font-size="9" fill="#7a5a1a">多次查内存，仍不入内核</text>
  <rect x="828" y="470" width="244" height="82" rx="9" fill="#fdecea" stroke="#f3c9c3"/>
  <text x="842" y="492" font-size="10" font-weight="600" fill="#b23b30">缺页陷入内核</text>
  <text x="842" y="512" font-size="9" fill="#9a4038">minor：建映射；major：+磁盘 I/O</text>
  <text x="842" y="530" font-size="9" fill="#9a4038">最慢，尽量靠局部性与预取减少</text>
  <text x="828" y="574" font-size="8.5" fill="#8a97ab">优化本质：提高 TLB / 页表命中率，</text>
  <text x="828" y="592" font-size="8.5" fill="#8a97ab">少触发（尤其 major）缺页</text>

  <!-- 连线 -->
  <!-- CPU → TLB -->
  <line x1="210" y1="172" x2="248" y2="172" stroke="#c4562f" stroke-width="2.2" marker-end="url(#aR)"/>
  <text x="212" y="164" font-size="8.5" fill="#a5401f">VA</text>
  <!-- TLB → 判定 -->
  <line x1="450" y1="172" x2="488" y2="172" stroke="#4a4a4f" stroke-width="1.6"/>
  <!-- 判定 命中 → 物理帧 -->
  <line x1="590" y1="172" x2="638" y2="172" stroke="#2f9e6e" stroke-width="2" marker-end="url(#aG)"/>
  <text x="596" y="164" font-size="8.5" fill="#2f6b4e">命中</text>
  <!-- 物理帧 → 物理内存 -->
  <line x1="840" y1="172" x2="878" y2="172" stroke="#2f9e6e" stroke-width="2" marker-end="url(#aG)"/>
  <!-- 判定 未命中 ↓ walk -->
  <line x1="540" y1="202" x2="540" y2="286" stroke="#c99a3a" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#aA)"/>
  <text x="546" y="250" font-size="8.5" fill="#8a6417">未命中</text>
  <!-- walk → PTE判定 -->
  <line x1="580" y1="363" x2="608" y2="363" stroke="#c99a3a" stroke-width="1.8"/>
  <!-- PTE有效 → 回填TLB(上行) -->
  <line x1="660" y1="333" x2="660" y2="234" stroke="#2f9e6e" stroke-width="1.8" stroke-dasharray="4 3" marker-end="url(#aG)"/>
  <text x="666" y="270" font-size="8.5" fill="#2f6b4e">有效：回填 TLB</text>
  <!-- PTE无效 ↓ 缺页 -->
  <line x1="540" y1="438" x2="540" y2="470" stroke="#c4562f" stroke-width="2" marker-end="url(#aR)"/>
  <text x="546" y="460" font-size="8.5" fill="#c4562f">无效：缺页</text>
  <!-- 缺页 → 重试(回CPU/TLB) 提示线 -->
  <line x1="640" y1="393" x2="655" y2="470" stroke="#c4562f" stroke-width="1.4" stroke-dasharray="3 3"/>
</svg>
