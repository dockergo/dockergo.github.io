<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="aG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="aA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c99a3a"/></marker>
    <marker id="aR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#d1544a"/></marker>
  </defs>
  <rect width="1120" height="640" fill="#fbfbfd"/>

  <text x="30" y="32" font-size="15" font-weight="700" fill="#1d1d1f">图解点 ① LSM Compaction 写放大路径与 L0 停顿根因 · 一条数据被逐层重写多次（写放大），L0 文件堆积超阈值触发写停顿</text>
  <text x="30" y="53" font-size="10.5" fill="#6e6e73">内存满 flush 成 L0（文件间键可重叠 → 读要查全部 L0 → 读放大）；L1..Ln 逐层归并重写把数据往下沉，同一份数据被多次重写 → 写放大</text>

  <!-- 图例 -->
  <line x1="30" y1="80" x2="54" y2="80" stroke="#2f9e6e" stroke-width="2" marker-end="url(#aG)"/>
  <text x="60" y="84" font-size="10" fill="#3a3a3c">flush · 内存满刷成 L0</text>
  <line x1="230" y1="80" x2="254" y2="80" stroke="#c99a3a" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#aA)"/>
  <text x="260" y="84" font-size="10" fill="#3a3a3c">compaction · 逐层归并重写（写放大）</text>
  <line x1="520" y1="80" x2="544" y2="80" stroke="#d1544a" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#aR)"/>
  <text x="550" y="84" font-size="10" fill="#3a3a3c">L0 超阈值 → write stall 停顿</text>

  <!-- 内存 memtable -->
  <rect x="30" y="112" width="196" height="150" rx="12" fill="#eaf6f0" stroke="#bfe3d1" filter="url(#soft)"/>
  <text x="128" y="138" font-size="12" font-weight="700" fill="#2f6b4e" text-anchor="middle">memtable（内存）</text>
  <text x="46" y="162" font-size="9.5" fill="#2f6b4e">写先入内存有序表</text>
  <text x="46" y="182" font-size="9.5" fill="#2f6b4e">满 → 转不可变 → flush</text>
  <rect x="46" y="196" width="164" height="24" rx="5" fill="#d7efe2" stroke="#9ed3b8"/><text x="128" y="212" font-size="9" fill="#2f6b4e" text-anchor="middle">active memtable</text>
  <rect x="46" y="226" width="164" height="24" rx="5" fill="#fff" stroke="#9ed3b8" stroke-dasharray="3 2"/><text x="128" y="242" font-size="9" fill="#5f9c81" text-anchor="middle">immutable（待 flush）</text>

  <!-- L0 -->
  <rect x="270" y="112" width="330" height="150" rx="12" fill="#fbeceb" stroke="#e8b9b3" filter="url(#soft)"/>
  <text x="286" y="136" font-size="12" font-weight="700" fill="#a5372c">L0 · 文件间键可重叠</text>
  <text x="286" y="156" font-size="9" fill="#8a4038">flush 直接落此，键区间彼此重叠 → 一次读要查所有 L0 文件（读放大）</text>
  <g font-size="8.5" text-anchor="middle">
    <rect x="286" y="168" width="66" height="34" rx="5" fill="#f6d9d5" stroke="#d99a90"/><text x="319" y="182" fill="#8a4038">file a</text><text x="319" y="195" fill="#b06a60">[a–m]</text>
    <rect x="358" y="168" width="66" height="34" rx="5" fill="#f6d9d5" stroke="#d99a90"/><text x="391" y="182" fill="#8a4038">file b</text><text x="391" y="195" fill="#b06a60">[c–q]</text>
    <rect x="430" y="168" width="66" height="34" rx="5" fill="#f6d9d5" stroke="#d99a90"/><text x="463" y="182" fill="#8a4038">file c</text><text x="463" y="195" fill="#b06a60">[e–z]</text>
    <rect x="502" y="168" width="66" height="34" rx="5" fill="#fbe6e3" stroke="#e8a79f" stroke-dasharray="3 2"/><text x="535" y="182" fill="#b06a60">file d</text><text x="535" y="195" fill="#c98a82">堆积…</text>
  </g>
  <text x="286" y="228" font-size="9" fill="#8a4038">区间重叠：查 key「e」需扫 a,b,c… 命中越多文件读越慢</text>
  <text x="286" y="248" font-size="9.5" font-weight="700" fill="#d1544a">文件数 ≥ 阈值 → 触发 write stall</text>

  <!-- 停顿盒 -->
  <rect x="644" y="112" width="446" height="150" rx="12" fill="#ffffff" stroke="#e8b9b3" filter="url(#soft)"/>
  <text x="666" y="138" font-size="12" font-weight="700" fill="#a5372c">L0 停顿根因 · write stall</text>
  <text x="666" y="162" font-size="10" fill="#8a4038">前台写速度 > compaction 消化速度</text>
  <text x="666" y="184" font-size="10" fill="#8a4038">→ L0 文件持续堆积</text>
  <text x="666" y="206" font-size="10" fill="#8a4038">→ 文件数越过软限：<tspan font-weight="700" fill="#d1544a">限速前台写</tspan></text>
  <text x="666" y="228" font-size="10" fill="#8a4038">→ 越过硬限：<tspan font-weight="700" fill="#d1544a">写完全停顿</tspan>直至 L0 消化</text>
  <text x="666" y="250" font-size="9" fill="#a98a4a">缓解：加大 compaction 并发 / 提高阈值 / 削峰</text>

  <!-- 分层重写 -->
  <text x="40" y="306" font-size="11" font-weight="700" fill="#1d1d1f">分层结构与逐层归并重写（写放大来源：同一份数据被重写多次）</text>

  <!-- L0 bar -->
  <text x="40" y="344" font-size="10" font-weight="700" fill="#a5372c">L0</text>
  <rect x="80" y="330" width="240" height="26" rx="5" fill="#f6d9d5" stroke="#d99a90"/>
  <text x="200" y="347" font-size="9" fill="#8a4038" text-anchor="middle">键区间重叠 · 小而多</text>
  <!-- L1 -->
  <text x="40" y="384" font-size="10" font-weight="700" fill="#8a6417">L1</text>
  <rect x="80" y="370" width="420" height="26" rx="5" fill="#fbf0d8" stroke="#e6ce9a"/>
  <text x="290" y="387" font-size="9" fill="#8a6417" text-anchor="middle">层内键不重叠 · 有序分段</text>
  <!-- L2 -->
  <text x="40" y="424" font-size="10" font-weight="700" fill="#8a6417">L2</text>
  <rect x="80" y="410" width="640" height="26" rx="5" fill="#f7ead0" stroke="#ddc290"/>
  <text x="400" y="427" font-size="9" fill="#8a6417" text-anchor="middle">容量约 ×10 · 键区间更宽</text>
  <!-- Ln -->
  <text x="40" y="464" font-size="10" font-weight="700" fill="#2f6b4e">Ln</text>
  <rect x="80" y="450" width="920" height="26" rx="5" fill="#eaf6f0" stroke="#bfe3d1"/>
  <text x="540" y="467" font-size="9" fill="#2f6b4e" text-anchor="middle">数据主体 · 最大、最旧、改动最少</text>

  <!-- compaction arrows down -->
  <line x1="1020" y1="336" x2="1020" y2="366" stroke="#c99a3a" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#aA)"/>
  <line x1="1020" y1="376" x2="1020" y2="406" stroke="#c99a3a" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#aA)"/>
  <line x1="1020" y1="416" x2="1020" y2="446" stroke="#c99a3a" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#aA)"/>
  <text x="1034" y="392" font-size="8.5" fill="#8a6417">读上层</text>
  <text x="1034" y="410" font-size="8.5" fill="#8a6417">+下层</text>
  <text x="1034" y="428" font-size="8.5" fill="#8a6417">归并</text>
  <text x="1034" y="446" font-size="8.5" fill="#8a6417">重写</text>

  <!-- 写放大量化 -->
  <rect x="40" y="500" width="1050" height="118" rx="13" fill="#f6f7f9" stroke="#e4e7ec"/>
  <text x="58" y="526" font-size="11" font-weight="700" fill="#8a6417">写放大 = 落盘总字节 / 用户写入字节</text>
  <text x="58" y="548" font-size="10" fill="#4a4a4f">一条数据从 L0 沉到 Ln 会被 compaction <tspan font-weight="700">重写约层数次</tspan>：每层归并都把它连同邻居一起读出、合并、重新写下 → 放大随层数累加。</text>
  <text x="58" y="570" font-size="10" fill="#4a4a4f">三角权衡：<tspan font-weight="700" fill="#c4562f">写放大</tspan>（层越多、重写越多）↔ <tspan font-weight="700" fill="#4a7fd0">读放大</tspan>（层越少、每读查得越多）↔ <tspan font-weight="700" fill="#2f6b4e">空间放大</tspan>（旧版本滞留）。</text>
  <text x="58" y="592" font-size="10" fill="#4a4a4f">调层数 / 每层放大系数 / 整理策略（分层 vs 分级）即在三者间移动工作点。</text>
  <text x="58" y="611" font-size="9" fill="#a1a1a6">不变式：compaction 只重写、不改变可见数据；停顿是「保护读放大不失控」的反压，不是错误。</text>
</svg>
