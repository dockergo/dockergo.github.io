<text x="46" y="515" font-size="11" font-weight="700" fill="#1d1d1f">适用负载</text>
<text x="46" y="534" font-size="8.7" fill="#8a97ab">为谁而生</text>
<rect x="214.0" y="486" width="214.5" height="66" rx="8" fill="#fff" stroke="#e4e7ec"/>
<text x="228.0" y="515" font-size="9.8" font-weight="700" fill="#2f6b4e">高写点查</text>
<text x="228.0" y="534" font-size="9.3" fill="#4a4a4f">KV 存储引擎</text>
<rect x="434.5" y="486" width="214.5" height="66" rx="8" fill="#fff" stroke="#e4e7ec"/>
<text x="448.5" y="515" font-size="9.8" font-weight="700" fill="#a03048">OLTP</text>
<text x="448.5" y="534" font-size="9.3" fill="#4a4a4f">事务读写</text>
<rect x="655.0" y="486" width="214.5" height="66" rx="8" fill="#fff" stroke="#e4e7ec"/>
<text x="669.0" y="515" font-size="9.8" font-weight="700" fill="#6f3ea8">OLAP</text>
<text x="669.0" y="534" font-size="9.3" fill="#4a4a4f">大列扫 / 聚合</text>
<rect x="875.5" y="486" width="214.5" height="66" rx="8" fill="#fff" stroke="#e4e7ec"/>
<text x="889.5" y="515" font-size="9.8" font-weight="700" fill="#2f6bb0">湖仓表</text>
<text x="889.5" y="534" font-size="9.3" fill="#4a4a4f">海量不可变+ACID</text>
<rect x="30" y="566" width="1060" height="96" rx="12" fill="#ffffff" stroke="#e4e7ec" filter="url(#soft)"/>
<text x="48" y="592" font-size="10.5" font-weight="700" fill="#1d1d1f">本质差异</text>
<text x="120" y="592" font-size="10" fill="#4a4a4f"><tspan font-weight='700' fill='#2f6b4e'>RocksDB</tspan> 用追加+compaction 换低写放大（写优 KV）；<tspan font-weight='700' fill='#a03048'>PostgreSQL</tspan> 用就地更新+B树换低读放大（OLTP 行存）；两者是同一 RUM 三角上的对称工作点。</text>
<text x="120" y="614" font-size="10" fill="#4a4a4f"><tspan font-weight='700' fill='#6f3ea8'>ORC</tspan> 把「一行所有列」翻成「一列所有行」、整文件不可变，服务 OLAP 大扫；<tspan font-weight='700' fill='#2f6bb0'>Iceberg</tspan> 更上一层——不碰数据文件字节，只用快照元数据树给列存加 ACID 与时间旅行。</text>
<text x="48" y="640" font-size="9" fill="#8a97ab">四者恰是一条演进链上的四个工作点：点写 KV → OLTP 行存 → OLAP 列文件 → 湖仓表格式；越往右，可变性越弱、批量与不可变性越强，元数据的地位越重。</text>
</svg>