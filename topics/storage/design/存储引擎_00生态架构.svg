<svg xmlns="http://www.w3.org/2000/svg" width="1140" height="700" viewBox="0 0 1140 700" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="aG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="aB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#4a7fd0"/></marker>
    <marker id="aA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c99a3a"/></marker>
    <marker id="aP" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8a5cae"/></marker>
  </defs>
  <rect width="1140" height="700" fill="#fbfbfd"/>

  <!-- 判型标题带 -->
  <text x="30" y="32" font-size="15" font-weight="700" fill="#1d1d1f">存储引擎与物理数据布局 · 写入换顺序 IO、读靠布局与索引、后台整理平衡放大：介质特性决定「数据长什么样躺在盘上」</text>
  <text x="30" y="53" font-size="10.5" fill="#6e6e73">写路径先入内存缓冲并落 WAL 保命 → 满则顺序刷成不可变有序单元 → 后台整理合并重写 → 读路径跨内存与落盘多单元归并；一切围绕「顺序快、随机慢」布局</text>

  <!-- 语义图例（≥4 路径） -->
  <line x1="30" y1="82" x2="54" y2="82" stroke="#2f9e6e" stroke-width="2" marker-end="url(#aG)"/>
  <text x="60" y="86" font-size="10" fill="#3a3a3c">写入路径 · 追加换顺序 IO</text>
  <line x1="250" y1="82" x2="274" y2="82" stroke="#4a7fd0" stroke-width="2" marker-end="url(#aB)"/>
  <text x="280" y="86" font-size="10" fill="#3a3a3c">读路径 · 多单元归并</text>
  <line x1="452" y1="82" x2="476" y2="82" stroke="#c99a3a" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#aA)"/>
  <text x="482" y="86" font-size="10" fill="#3a3a3c">后台整理 · 合并重写（写放大）</text>
  <line x1="720" y1="82" x2="744" y2="82" stroke="#8a5cae" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#aP)"/>
  <text x="750" y="86" font-size="10" fill="#3a3a3c">持久化 · WAL 先落盘</text>
  <text x="1110" y="86" font-size="10" fill="#a1a1a6" text-anchor="end">概念层机理</text>
  <line x1="30" y1="98" x2="1110" y2="98" stroke="#e4e7ec" stroke-width="1"/>

  <!-- 上层接口 -->
  <rect x="28" y="206" width="156" height="108" rx="12" fill="#ffffff" stroke="#d9dde4" filter="url(#soft)"/>
  <text x="106" y="238" font-size="12.5" font-weight="700" fill="#1d1d1f" text-anchor="middle">上层接口</text>
  <text x="106" y="262" font-size="9.5" fill="#6e6e73" text-anchor="middle">读 / 写请求入口</text>
  <text x="106" y="282" font-size="9.5" fill="#6e6e73" text-anchor="middle">只见 KV / 行</text>
  <text x="106" y="302" font-size="9.5" fill="#6e6e73" text-anchor="middle">不关心物理布局</text>

  <!-- WAL -->
  <rect x="214" y="172" width="184" height="92" rx="12" fill="#f4eefb" stroke="#dcc9ef" filter="url(#soft)"/>
  <text x="306" y="200" font-size="12" font-weight="700" fill="#6f3ea8" text-anchor="middle">WAL · 预写日志</text>
  <text x="230" y="224" font-size="9.5" fill="#5a3a7a">写先顺序追加 + fsync</text>
  <text x="230" y="243" font-size="9.5" fill="#5a3a7a">崩溃后重放恢复内存态</text>
  <text x="230" y="260" font-size="8.5" fill="#8a5cae">已确认写不丢，代价一次顺序 IO</text>

  <!-- 内存写缓冲 -->
  <rect x="214" y="300" width="184" height="120" rx="12" fill="#eaf6f0" stroke="#bfe3d1" filter="url(#soft)"/>
  <text x="306" y="328" font-size="12" font-weight="700" fill="#2f6b4e" text-anchor="middle">内存写缓冲</text>
  <text x="230" y="352" font-size="9.5" fill="#2f6b4e">写先进内存有序结构</text>
  <text x="230" y="372" font-size="9.5" fill="#2f6b4e">读写都快（无落盘 IO）</text>
  <text x="230" y="392" font-size="9.5" fill="#2f6b4e">满 / 超时 → flush 落盘</text>
  <text x="230" y="411" font-size="8.5" fill="#5f9c81">易失，靠 WAL 兜底持久</text>

  <!-- 落盘布局 容器 -->
  <rect x="436" y="150" width="344" height="350" rx="14" fill="#f6f7f9" stroke="#e4e7ec"/>
  <text x="456" y="178" font-size="12" font-weight="700" fill="#2f6b4e">落盘布局 · 不可变有序单元</text>
  <text x="456" y="196" font-size="9" fill="#8a97ab">flush 出的有序文件 / 数据页，只增不改（就地改代价高）</text>

  <rect x="456" y="212" width="304" height="60" rx="9" fill="#eaf6f0" stroke="#bfe3d1"/>
  <text x="470" y="234" font-size="10.5" font-weight="600" fill="#2f6b4e">较新有序单元</text>
  <text x="470" y="253" font-size="9" fill="#4a7a63">键有序 · 带块索引 / 布隆过滤加速定位</text>
  <text x="470" y="267" font-size="8.5" fill="#6f9c86">刚从内存刷出，数据量小</text>

  <rect x="456" y="282" width="304" height="56" rx="9" fill="#e3f1ea" stroke="#a9d6c0"/>
  <text x="470" y="304" font-size="10.5" font-weight="600" fill="#2f6b4e">较旧有序单元</text>
  <text x="470" y="323" font-size="9" fill="#4a7a63">整理沉淀而来，键区间更宽</text>

  <rect x="456" y="348" width="304" height="56" rx="9" fill="#dcede4" stroke="#9dceb4"/>
  <text x="470" y="370" font-size="10.5" font-weight="600" fill="#2f6b4e">更旧 / 大块单元</text>
  <text x="470" y="389" font-size="9" fill="#4a7a63">数据主体，容量最大、改动最少</text>

  <text x="456" y="428" font-size="9" fill="#8a97ab">越往下越旧越大；一次读可能跨多单元归并 → 读放大</text>
  <text x="456" y="446" font-size="9" fill="#8a97ab">整理会把它们合并重写为更少、更有序的单元</text>
  <text x="456" y="470" font-size="9.5" font-weight="600" fill="#c4562f">核心权衡：写放大 ↔ 读放大 ↔ 空间放大，三者按介质取舍</text>
  <text x="456" y="488" font-size="8.5" fill="#a1a1a6">（有序=顺序写友好；分层/分页只是有序单元的不同组织）</text>

  <!-- 后台整理 -->
  <rect x="812" y="172" width="300" height="180" rx="13" fill="#fbf3e2" stroke="#ecd6a8" filter="url(#soft)"/>
  <text x="828" y="200" font-size="12" font-weight="700" fill="#8a6417">后台整理 · 合并 / GC</text>
  <text x="828" y="226" font-size="9.5" fill="#7a5a1a">把多个有序单元读出 → 归并 → 重写</text>
  <text x="828" y="248" font-size="9.5" fill="#7a5a1a">丢弃旧版本 / 落实删除标记</text>
  <text x="828" y="270" font-size="9.5" fill="#7a5a1a">结果：更少单元、键更有序</text>
  <text x="828" y="292" font-size="9.5" font-weight="600" fill="#2f6b4e">→ 读放大 ↓、空间 ↓</text>
  <text x="828" y="314" font-size="9.5" font-weight="600" fill="#b5791f">代价：重写数据 = 写放大 ↑</text>
  <text x="828" y="336" font-size="8.5" fill="#a98a4a">抖动：整理与前台写争 IO / CPU</text>

  <!-- 读路径 -->
  <rect x="28" y="430" width="156" height="158" rx="12" fill="#eaf1fb" stroke="#c6d9f2" filter="url(#soft)"/>
  <text x="106" y="460" font-size="12" font-weight="700" fill="#20375e" text-anchor="middle">读路径</text>
  <text x="44" y="484" font-size="9.5" fill="#2f4a70">查内存缓冲</text>
  <text x="44" y="503" font-size="9.5" fill="#2f4a70">+ 落盘多单元</text>
  <text x="44" y="522" font-size="9.5" fill="#2f4a70">index / bloom</text>
  <text x="44" y="541" font-size="9.5" fill="#2f4a70">/ cache 加速</text>
  <text x="44" y="564" font-size="8.5" fill="#5a7099">命中越少单元</text>
  <text x="44" y="578" font-size="8.5" fill="#5a7099">→ 读放大越低</text>

  <!-- 存储介质 -->
  <rect x="436" y="540" width="676" height="94" rx="13" fill="#ffffff" stroke="#d9dde4" filter="url(#soft)"/>
  <text x="456" y="568" font-size="12" font-weight="700" fill="#1d1d1f">存储介质 · 磁盘 HDD / SSD</text>
  <text x="456" y="592" font-size="9.5" fill="#4a4a4f">顺序读写快、随机读写慢</text>
  <text x="456" y="612" font-size="9.5" fill="#4a4a4f">SSD 以块为单位擦写，就地改代价高</text>
  <text x="770" y="592" font-size="9.5" fill="#2f6b4e">布局据此：顺序化写入</text>
  <text x="770" y="612" font-size="9.5" fill="#2f6b4e">· 批量化整理 · 避免随机就地改</text>

  <!-- 连线 -->
  <!-- client → WAL (purple, durability) -->
  <line x1="184" y1="238" x2="212" y2="212" stroke="#8a5cae" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#aP)"/>
  <text x="150" y="196" font-size="8.5" fill="#6f3ea8">① 先写 WAL</text>
  <!-- client → 内存缓冲 (green, write) -->
  <line x1="184" y1="272" x2="212" y2="352" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aG)"/>
  <text x="150" y="330" font-size="8.5" fill="#2f6b4e">② 进内存</text>
  <!-- WAL → 介质 (purple, fsync) via gap -->
  <path d="M398 218 L416 218 L416 522 L434 548" fill="none" stroke="#8a5cae" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#aP)"/>
  <text x="420" y="240" font-size="8.5" fill="#6f3ea8">fsync</text>
  <!-- 内存缓冲 → 落盘布局 (green, flush) -->
  <line x1="398" y1="356" x2="434" y2="300" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aG)"/>
  <text x="400" y="326" font-size="8.5" fill="#2f6b4e">flush 顺序写</text>
  <!-- 落盘 → 整理 (amber, read units) -->
  <line x1="780" y1="238" x2="810" y2="222" stroke="#c99a3a" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#aA)"/>
  <text x="782" y="216" font-size="8.5" fill="#8a6417">读出多单元</text>
  <!-- 整理 → 落盘 (amber, rewrite) -->
  <line x1="810" y1="300" x2="780" y2="360" stroke="#c99a3a" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#aA)"/>
  <text x="784" y="336" font-size="8.5" fill="#8a6417">归并重写</text>
  <!-- 落盘 → 介质 (green, land) -->
  <line x1="608" y1="500" x2="608" y2="538" stroke="#2f9e6e" stroke-width="2" marker-end="url(#aG)"/>
  <text x="614" y="524" font-size="8.5" fill="#2f6b4e">落盘</text>
  <!-- client → 读路径 (blue, read) -->
  <line x1="106" y1="314" x2="106" y2="428" stroke="#4a7fd0" stroke-width="1.8" marker-end="url(#aB)"/>
  <text x="112" y="360" font-size="8.5" fill="#20375e">读请求</text>
  <!-- 读路径 → 内存缓冲 (blue) -->
  <line x1="184" y1="470" x2="212" y2="404" stroke="#4a7fd0" stroke-width="1.6" marker-end="url(#aB)"/>
  <text x="188" y="440" font-size="8.5" fill="#20375e">查内存</text>
  <!-- 读路径 → 落盘布局 (blue) -->
  <line x1="184" y1="512" x2="434" y2="474" stroke="#4a7fd0" stroke-width="1.6" marker-end="url(#aB)"/>
  <text x="250" y="500" font-size="8.5" fill="#20375e">查落盘（多单元归并）</text>
</svg>
