<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="730" viewBox="0 0 1120 730" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="aR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#d1544a"/></marker>
    <marker id="aG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="aA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#d98a00"/></marker>
  </defs>
  <rect width="1120" height="730" fill="#fbfbfd"/>

  <text x="30" y="32" font-size="15" font-weight="700" fill="#1d1d1f">执行范式核心差异对比 · 火山迭代器 vs 向量化 vs 编译(JIT) —— 同解一个病灶「逐行解释开销」，分歧在处理粒度与如何榨干 CPU</text>
  <text x="30" y="53" font-size="10.5" fill="#6e6e73">三者拿到的是同一份正确物理计划，差别只在「怎么把它跑完」；下面先看处理粒度（数据流形态），再按 解释开销来源 / 如何消除 / CPU 利用 三维横向对照</text>

  <!-- ============ 顶部视觉带：处理粒度 ============ -->
  <!-- 维度列头 -->
  <rect x="30" y="72" width="176" height="150" rx="9" fill="#eef0f3" stroke="#e4e7ec"/>
  <text x="46" y="100" font-size="11.5" font-weight="700" fill="#1d1d1f">① 处理粒度</text>
  <text x="46" y="122" font-size="9" fill="#8a97ab">数据在算子之间</text>
  <text x="46" y="138" font-size="9" fill="#8a97ab">以什么为单位流动</text>
  <text x="46" y="160" font-size="9" fill="#8a97ab">—— 决定其余一切</text>
  <text x="46" y="192" font-size="9" fill="#8a97ab">一行 / 一列批 /</text>
  <text x="46" y="208" font-size="9" fill="#8a97ab">整条流水线段</text>

  <!-- 火山 header + 粒度图示 -->
  <rect x="214" y="72" width="284" height="150" rx="9" fill="#fbeceb" stroke="#e8b9b3"/>
  <text x="230" y="98" font-size="12.5" font-weight="800" fill="#a5372c">火山迭代器 · Volcano</text>
  <g font-size="9" text-anchor="middle">
    <rect x="236" y="110" width="54" height="12" rx="3" fill="#fff" stroke="#eecfca"/>
    <rect x="236" y="124" width="54" height="12" rx="3" fill="#f6d9d5" stroke="#d99a90"/>
    <rect x="236" y="138" width="54" height="12" rx="3" fill="#fff" stroke="#eecfca"/>
    <rect x="236" y="152" width="54" height="12" rx="3" fill="#fff" stroke="#eecfca"/>
    <rect x="236" y="166" width="54" height="12" rx="3" fill="#fff" stroke="#eecfca"/>
  </g>
  <text x="302" y="122" font-size="8" fill="#b06a60">1 行</text>
  <line x1="292" y1="130" x2="368" y2="130" stroke="#d1544a" stroke-width="1.6" marker-end="url(#aR)"/>
  <rect x="372" y="112" width="112" height="40" rx="8" fill="#fff" stroke="#d99a90"/>
  <text x="428" y="130" font-size="9.5" fill="#a5372c" text-anchor="middle">算子 next()</text>
  <text x="428" y="144" font-size="8" fill="#b06a60" text-anchor="middle">返回一行</text>
  <text x="230" y="198" font-size="9.5" fill="#8a4038">一次拉 1 行，逐行穿过整条流水线</text>

  <!-- 向量化 header + 粒度图示 -->
  <rect x="510" y="72" width="284" height="150" rx="9" fill="#eaf6f0" stroke="#bfe3d1"/>
  <text x="526" y="98" font-size="12.5" font-weight="800" fill="#2f6b4e">向量化 · Vectorized</text>
  <g font-size="9" text-anchor="middle">
    <rect x="532" y="110" width="56" height="12" rx="3" fill="#d7efe2" stroke="#9ed3b8"/>
    <rect x="532" y="124" width="56" height="12" rx="3" fill="#d7efe2" stroke="#9ed3b8"/>
    <rect x="532" y="138" width="56" height="12" rx="3" fill="#d7efe2" stroke="#9ed3b8"/>
    <rect x="532" y="152" width="56" height="12" rx="3" fill="#d7efe2" stroke="#9ed3b8"/>
    <rect x="532" y="166" width="56" height="12" rx="3" fill="#d7efe2" stroke="#9ed3b8"/>
  </g>
  <rect x="528" y="106" width="64" height="76" rx="6" fill="none" stroke="#2f9e6e" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="560" y="196" font-size="8" fill="#5f9c81" text-anchor="middle">1 批 ~1024 行</text>
  <line x1="594" y1="144" x2="664" y2="144" stroke="#2f9e6e" stroke-width="1.6" marker-end="url(#aG)"/>
  <rect x="668" y="124" width="112" height="40" rx="8" fill="#fff" stroke="#9ed3b8"/>
  <text x="724" y="142" font-size="9.5" fill="#2f6b4e" text-anchor="middle">算子（整批）</text>
  <text x="724" y="156" font-size="8" fill="#5f9c81" text-anchor="middle">吞吐一整批</text>
  <text x="526" y="212" font-size="9.5" fill="#4a7a63">一次吃「一列批」，一批一次调用</text>

  <!-- 编译 header + 粒度图示 -->
  <rect x="806" y="72" width="284" height="150" rx="9" fill="#fdf6e8" stroke="#ecd6a8"/>
  <text x="822" y="98" font-size="12.5" font-weight="800" fill="#8a6417">编译 · JIT / Compiled</text>
  <rect x="822" y="110" width="252" height="40" rx="8" fill="#fff" stroke="#e6ce9a"/>
  <text x="948" y="128" font-size="9.5" fill="#8a6417" text-anchor="middle">扫描 · 过滤 · 投影 · 聚合</text>
  <text x="948" y="142" font-size="8" fill="#a98a4a" text-anchor="middle">整段流水线融成一个函数</text>
  <line x1="887" y1="118" x2="887" y2="142" stroke="#e6ce9a" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="948" y1="118" x2="948" y2="142" stroke="#e6ce9a" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="1009" y1="118" x2="1009" y2="142" stroke="#e6ce9a" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="948" y1="150" x2="948" y2="164" stroke="#d98a00" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#aA)"/>
  <rect x="858" y="166" width="180" height="26" rx="8" fill="#fdf6e8" stroke="#ecd6a8"/>
  <text x="948" y="183" font-size="9.5" font-weight="700" fill="#8a6417" text-anchor="middle">编成一段原生机器码</text>
  <text x="822" y="212" font-size="9.5" fill="#7a5a1a">整条流水线段 = 1 段代码，元组直穿</text>

  <!-- ============ 对比矩阵 ============ -->
  <!-- 行A：解释开销来源 -->
  <rect x="30" y="226" width="176" height="104" rx="9" fill="#f6f7f9" stroke="#e4e7ec"/>
  <text x="46" y="252" font-size="11.5" font-weight="700" fill="#1d1d1f">② 解释开销来源</text>
  <text x="46" y="274" font-size="9" fill="#8a97ab">花在「解释」而非</text>
  <text x="46" y="290" font-size="9" fill="#8a97ab">计算上的 CPU 从哪来</text>

  <rect x="214" y="226" width="284" height="104" rx="9" fill="#fdf3f2" stroke="#eecfca"/>
  <text x="230" y="252" font-size="10.5" font-weight="700" fill="#a5372c">逐行虚调用 + 类型分支</text>
  <text x="230" y="276" font-size="9.5" fill="#8a4a42">每行·每算子都付：一次虚函数调用</text>
  <text x="230" y="293" font-size="9.5" fill="#8a4a42">（难内联、预测差）+ 一次类型判断</text>
  <text x="230" y="310" font-size="9.5" fill="#8a4a42">与条件分支。开销 × 总行数。</text>

  <rect x="510" y="226" width="284" height="104" rx="9" fill="#f1faf5" stroke="#cfe8da"/>
  <text x="526" y="252" font-size="10.5" font-weight="700" fill="#2f6b4e">仍解释，但按批摊薄</text>
  <text x="526" y="276" font-size="9.5" fill="#436b58">调用 / 分派每「批」才发生一次 →</text>
  <text x="526" y="293" font-size="9.5" fill="#436b58">固定开销 ÷ 批大小（如 ÷1024）；</text>
  <text x="526" y="310" font-size="9.5" fill="#436b58">批内退化成紧凑简单循环。</text>

  <rect x="806" y="226" width="284" height="104" rx="9" fill="#fdf8ee" stroke="#eaddba"/>
  <text x="822" y="252" font-size="10.5" font-weight="700" fill="#8a6417">编译期直接消除</text>
  <text x="822" y="276" font-size="9.5" fill="#75601f">根源是运行期边判类型、边分派；</text>
  <text x="822" y="293" font-size="9.5" fill="#75601f">编译把类型定死、把结构展开，</text>
  <text x="822" y="310" font-size="9.5" fill="#75601f">运行期不再有「解释」这一步。</text>

  <!-- 行B：如何消除 / 加速 -->
  <rect x="30" y="334" width="176" height="104" rx="9" fill="#f6f7f9" stroke="#e4e7ec"/>
  <text x="46" y="360" font-size="11.5" font-weight="700" fill="#1d1d1f">③ 如何消除开销</text>
  <text x="46" y="382" font-size="9" fill="#8a97ab">把「解释税」降下来</text>
  <text x="46" y="398" font-size="9" fill="#8a97ab">各自的核心手段</text>

  <rect x="214" y="334" width="284" height="104" rx="9" fill="#fdf3f2" stroke="#eecfca"/>
  <text x="230" y="360" font-size="10.5" font-weight="700" fill="#a5372c">不消除（作基准形态）</text>
  <text x="230" y="384" font-size="9.5" fill="#8a4a42">逐行解释是最朴素基准，简单通用；</text>
  <text x="230" y="401" font-size="9.5" fill="#8a4a42">但每一行都重复缴一遍解释税，</text>
  <text x="230" y="418" font-size="9.5" fill="#8a4a42">没有任何摊薄或特化。</text>

  <rect x="510" y="334" width="284" height="104" rx="9" fill="#f1faf5" stroke="#cfe8da"/>
  <text x="526" y="360" font-size="10.5" font-weight="700" fill="#2f6b4e">摊薄 + SIMD 数据并行</text>
  <text x="526" y="384" font-size="9.5" fill="#436b58">① 调用开销 ÷ 批大小；② 一条 SIMD</text>
  <text x="526" y="401" font-size="9.5" fill="#436b58">指令对一列相邻多值并行算、产出</text>
  <text x="526" y="418" font-size="9.5" fill="#436b58">位掩码；③ 列连续存储、缓存友好。</text>

  <rect x="806" y="334" width="284" height="104" rx="9" fill="#fdf8ee" stroke="#eaddba"/>
  <text x="822" y="360" font-size="10.5" font-weight="700" fill="#8a6417">编译成原生机器码</text>
  <text x="822" y="384" font-size="9.5" fill="#75601f">表达式树 / 流水线 → IR → 机器码：</text>
  <text x="822" y="401" font-size="9.5" fill="#75601f">常量折叠、内联、寄存器分配，</text>
  <text x="822" y="418" font-size="9.5" fill="#75601f">运行期直接跑几条原生指令。</text>

  <!-- 行C：CPU 利用 -->
  <rect x="30" y="442" width="176" height="104" rx="9" fill="#f6f7f9" stroke="#e4e7ec"/>
  <text x="46" y="468" font-size="11.5" font-weight="700" fill="#1d1d1f">④ CPU 利用</text>
  <text x="46" y="490" font-size="9" fill="#8a97ab">硬件亲和度</text>
  <text x="46" y="506" font-size="9" fill="#8a97ab">周期花得值不值</text>

  <rect x="214" y="442" width="284" height="104" rx="9" fill="#fdf3f2" stroke="#eecfca"/>
  <text x="230" y="468" font-size="10.5" font-weight="700" fill="#a5372c">大半周期在空转</text>
  <text x="230" y="492" font-size="9.5" fill="#8a4a42">解释占用大量周期；虚调用破坏内联、</text>
  <text x="230" y="509" font-size="9.5" fill="#8a4a42">分支频繁预测失败、缓存局部性差 ——</text>
  <text x="230" y="526" font-size="9.5" fill="#8a4a42">真正的计算只占少数。</text>

  <rect x="510" y="442" width="284" height="104" rx="9" fill="#f1faf5" stroke="#cfe8da"/>
  <text x="526" y="468" font-size="10.5" font-weight="700" fill="#2f6b4e">缓存友好 + 向量并行</text>
  <text x="526" y="492" font-size="9.5" fill="#436b58">顺序读列、可预取，缓存命中高；</text>
  <text x="526" y="509" font-size="9.5" fill="#436b58">循环无分支 → 自动 SIMD，数据级</text>
  <text x="526" y="526" font-size="9.5" fill="#436b58">并行填满向量通道。</text>

  <rect x="806" y="442" width="284" height="104" rx="9" fill="#fdf8ee" stroke="#eaddba"/>
  <text x="822" y="468" font-size="10.5" font-weight="700" fill="#8a6417">指令级特化到底</text>
  <text x="822" y="492" font-size="9.5" fill="#75601f">无树遍历 / 类型分支 / 虚调用，元组</text>
  <text x="822" y="509" font-size="9.5" fill="#75601f">尽量驻留寄存器；分支预测与流水线</text>
  <text x="822" y="526" font-size="9.5" fill="#75601f">全面受益。</text>

  <!-- ============ 底部：代价 + 一句话 ============ -->
  <rect x="30" y="554" width="1060" height="152" rx="12" fill="#ffffff" stroke="#e4e7ec" filter="url(#soft)"/>
  <text x="48" y="580" font-size="11" font-weight="700" fill="#1d1d1f">代价 · 何时选它</text>
  <text x="48" y="602" font-size="10" fill="#4a4a4f"><tspan font-weight="700" fill="#a5372c">火山迭代器</tspan>：实现最简、任意查询即插即用；数据量一大就最慢，现代分析引擎已很少纯用它。</text>
  <text x="48" y="624" font-size="10" fill="#4a4a4f"><tspan font-weight="700" fill="#2f6b4e">向量化</tspan>：批增大延迟粒度、物化中间列占内存；是 OLAP 扫描 / 过滤 / 聚合的主力执行形态。</text>
  <text x="48" y="646" font-size="10" fill="#4a4a4f"><tspan font-weight="700" fill="#8a6417">编译(JIT)</tspan>：编译有毫秒级固定成本，须「编译一次、执行万次」摊销；短查询 / 小数据反而更慢。</text>
  <text x="48" y="674" font-size="10" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="110" y="674" font-size="10" fill="#4a4a4f">三者同解一个病灶——逐行「解释开销」：<tspan font-weight="700" fill="#a5372c">火山</tspan>不治（作基准），<tspan font-weight="700" fill="#2f6b4e">向量化</tspan>「拓宽每次处理的数据」摊薄它，<tspan font-weight="700" fill="#8a6417">编译</tspan>「压缩每次处理的指令」消灭它。</text>
  <text x="110" y="694" font-size="9" fill="#a1a1a6">两条路线正交互补，现代引擎（向量化主干 + 局部 JIT）常把二者组合使用；粒度越粗，固定开销摊得越薄、但延迟与内存代价越高。</text>
</svg>
