<rect x="655.0" y="486" width="214.5" height="66" rx="8" fill="#fff" stroke="#e4e7ec"/>
<text x="669.0" y="515" font-size="9.8" font-weight="700" fill="#2f6b4e">大数据批</text>
<text x="669.0" y="534" font-size="9.3" fill="#4a4a4f">ETL · ML</text>
<rect x="875.5" y="486" width="214.5" height="66" rx="8" fill="#fff" stroke="#e4e7ec"/>
<text x="889.5" y="515" font-size="9.8" font-weight="700" fill="#2f6bb0">联邦交互</text>
<text x="889.5" y="534" font-size="9.3" fill="#4a4a4f">多源即席查询</text>
<rect x="30" y="566" width="1060" height="96" rx="12" fill="#ffffff" stroke="#e4e7ec" filter="url(#soft)"/>
<text x="48" y="592" font-size="10.5" font-weight="700" fill="#1d1d1f">本质差异</text>
<text x="120" y="592" font-size="10" fill="#4a4a4f"><tspan font-weight='700' fill='#c47f16'>DuckDB</tspan> 走进程内 push 向量化，靠 buffer manager 做 out-of-core，专攻嵌入式单机分析；<tspan font-weight='700' fill='#a03048'>ClickHouse</tspan> 用 Processors 拉取图 + 大 Block，规则优化为主，主打实时列式 OLAP。</text>
<text x="120" y="614" font-size="10" fill="#4a4a4f"><tspan font-weight='700' fill='#2f6b4e'>Spark</tspan> 用 Tungsten whole-stage codegen 编成 JVM 字节码、shuffle 物化到磁盘，胜在大数据批与容错；<tspan font-weight='700' fill='#2f6bb0'>Trino</tspan> 是纯 MPP 流水线拉取、默认全内存不落盘，为跨数据源的交互式联邦查询而生。</text>
<text x="48" y="640" font-size="9" fill="#8a97ab">同为列式分析引擎，取舍随场景分野：嵌入式向量化(DuckDB) → 实时列 OLAP(ClickHouse) → 批 codegen 物化(Spark) → 交互 MPP 联邦(Trino)；越往分布式端，容错与落盘越重，越往单机端，向量化流水线越极致。</text>
</svg>