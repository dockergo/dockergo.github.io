<svg xmlns="http://www.w3.org/2000/svg" width="1140" height="700" viewBox="0 0 1140 700" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="aA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#d98a00"/></marker>
    <marker id="aB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#4a7fd0"/></marker>
    <marker id="aG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="aP" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8a5cae"/></marker>
  </defs>
  <rect width="1140" height="700" fill="#fbfbfd"/>

  <!-- 判型标题带 -->
  <text x="30" y="32" font-size="15" font-weight="700" fill="#1d1d1f">查询优化与执行引擎 · 声明式查询「说要什么」→ 优化器搜出代价最小的计划形状 → 执行器把计划榨成 CPU 密集指令</text>
  <text x="30" y="53" font-size="10.5" fill="#6e6e73">用户只写 what（SQL），引擎决定 how：解析成计划树 → 优化器在等价计划空间里按代价搜最优形状 → 物理计划 → 执行器以向量化 / JIT 高效跑完</text>

  <!-- 语义图例（≥4 路径） -->
  <line x1="30" y1="82" x2="54" y2="82" stroke="#4a7fd0" stroke-width="2" marker-end="url(#aB)"/>
  <text x="60" y="86" font-size="10" fill="#3a3a3c">计划流转 · 树形变换</text>
  <line x1="230" y1="82" x2="254" y2="82" stroke="#d98a00" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#aA)"/>
  <text x="260" y="86" font-size="10" fill="#3a3a3c">优化器搜索 · 按代价择优</text>
  <line x1="452" y1="82" x2="476" y2="82" stroke="#2f9e6e" stroke-width="2" marker-end="url(#aG)"/>
  <text x="482" y="86" font-size="10" fill="#3a3a3c">执行数据流 · 算子间传批</text>
  <line x1="680" y1="82" x2="704" y2="82" stroke="#8a5cae" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#aP)"/>
  <text x="710" y="86" font-size="10" fill="#3a3a3c">统计信息 · 喂给代价模型</text>
  <text x="1110" y="86" font-size="10" fill="#a1a1a6" text-anchor="end">概念层机理</text>
  <line x1="30" y1="98" x2="1110" y2="98" stroke="#e4e7ec" stroke-width="1"/>

  <!-- 前端：SQL → 计划树 -->
  <rect x="28" y="150" width="168" height="180" rx="12" fill="#ffffff" stroke="#d9dde4" filter="url(#soft)"/>
  <text x="112" y="178" font-size="12.5" font-weight="700" fill="#1d1d1f" text-anchor="middle">前端 · 声明式入口</text>
  <line x1="44" y1="188" x2="180" y2="188" stroke="#eef0f3" stroke-width="1"/>
  <text x="44" y="210" font-size="9.5" fill="#4a4a4f">SQL / 声明式查询</text>
  <text x="44" y="230" font-size="9.5" fill="#4a4a4f">解析 → 语法树</text>
  <text x="44" y="250" font-size="9.5" fill="#4a4a4f">绑定 / 语义检查</text>
  <text x="44" y="270" font-size="9.5" fill="#4a4a4f">→ 逻辑计划树</text>
  <text x="44" y="294" font-size="8.5" fill="#8a97ab">只描述 what</text>
  <text x="44" y="310" font-size="8.5" fill="#8a97ab">不含执行策略</text>

  <!-- 优化器容器 -->
  <rect x="228" y="132" width="440" height="424" rx="14" fill="#fdf6e8" stroke="#ecd6a8"/>
  <text x="248" y="160" font-size="12.5" font-weight="700" fill="#8a6417">优化器 · 在等价计划空间里搜代价最小的形状</text>

  <!-- 逻辑改写 -->
  <rect x="248" y="176" width="400" height="70" rx="10" fill="#fff" stroke="#ecd6a8"/>
  <text x="264" y="198" font-size="11" font-weight="700" fill="#8a6417">逻辑改写（规则）</text>
  <text x="264" y="218" font-size="9" fill="#7a5a1a">谓词下推、投影裁剪、常量折叠、子查询解相关</text>
  <text x="264" y="234" font-size="9" fill="#7a5a1a">等价变换：不改结果，只改形状，缩小搜索空间</text>

  <!-- 代价搜索 -->
  <rect x="248" y="256" width="400" height="120" rx="10" fill="#fbf3e2" stroke="#e6ce9a"/>
  <text x="264" y="278" font-size="11" font-weight="700" fill="#8a6417">代价搜索（枚举 + 剪枝）</text>
  <text x="264" y="300" font-size="9.5" fill="#7a5a1a">枚举等价物理计划：连接顺序 / 连接算法 / 访问路径</text>
  <text x="264" y="320" font-size="9.5" fill="#7a5a1a">代价模型估行数 × 单位代价 → 每计划算总代价</text>
  <text x="264" y="340" font-size="9.5" font-weight="700" fill="#b5791f">动态规划自底向上定连接顺序（见 图解点 ①）</text>
  <text x="264" y="360" font-size="9" fill="#a98a4a">空间随表数爆炸 → 靠 DP / 剪枝 / 启发式压住</text>

  <!-- 统计信息 -->
  <rect x="248" y="386" width="400" height="66" rx="10" fill="#f4eefb" stroke="#dcc9ef"/>
  <text x="264" y="408" font-size="11" font-weight="700" fill="#6f3ea8">统计信息 · 代价模型的燃料</text>
  <text x="264" y="428" font-size="9" fill="#5a3a7a">直方图 / distinct 数 / 数据分布 → 估选择率与行数</text>
  <text x="264" y="444" font-size="9" fill="#5a3a7a">估不准 → 计划选错（优化器的头号误差源）</text>

  <text x="248" y="480" font-size="9.5" font-weight="700" fill="#2f6b4e">产物 · 物理执行计划（选定形状 + 算子实现）</text>
  <rect x="248" y="490" width="400" height="52" rx="9" fill="#eaf6f0" stroke="#bfe3d1"/>
  <text x="264" y="512" font-size="9.5" fill="#2f6b4e">带明确算子实现的算子树：扫描 / 连接 / 聚合 / 排序</text>
  <text x="264" y="528" font-size="9" fill="#4a7a63">已定连接顺序与算法，交给执行器落地</text>

  <!-- 执行器容器 -->
  <rect x="700" y="132" width="412" height="424" rx="14" fill="#eaf6f0" stroke="#bfe3d1"/>
  <text x="720" y="160" font-size="12.5" font-weight="700" fill="#2f6b4e">执行引擎 · 把计划榨成 CPU 密集指令</text>

  <!-- 算子模型 -->
  <rect x="720" y="176" width="372" height="86" rx="10" fill="#fff" stroke="#bfe3d1"/>
  <text x="736" y="198" font-size="11" font-weight="700" fill="#2f6b4e">算子流水线 · 数据在算子间流动</text>
  <text x="736" y="218" font-size="9" fill="#4a7a63">扫描 → 过滤 → 连接 → 聚合 → 排序 → 输出</text>
  <text x="736" y="236" font-size="9" fill="#4a7a63">逐行「拉」模型解释开销大 → 转向批处理</text>
  <text x="736" y="254" font-size="9" fill="#4a7a63">目标：让 CPU 少空转、多干活</text>

  <!-- 向量化 -->
  <rect x="720" y="272" width="372" height="80" rx="10" fill="#eaf1fb" stroke="#c6d9f2"/>
  <text x="736" y="294" font-size="11" font-weight="700" fill="#20375e">向量化执行（见 图解点 ②）</text>
  <text x="736" y="314" font-size="9.5" fill="#2f4a70">一次处理「一列一批」而非逐行</text>
  <text x="736" y="332" font-size="9.5" fill="#2f4a70">SIMD 一指令多值，摊薄每行解释开销</text>
  <text x="736" y="348" font-size="8.5" fill="#5a7099">缓存友好、分支少</text>

  <!-- JIT -->
  <rect x="720" y="362" width="372" height="80" rx="10" fill="#f4eefb" stroke="#dcc9ef"/>
  <text x="736" y="384" font-size="11" font-weight="700" fill="#6f3ea8">JIT 编译（见 图解点 ③）</text>
  <text x="736" y="404" font-size="9.5" fill="#5a3a7a">表达式树 → IR → 机器码</text>
  <text x="736" y="422" font-size="9.5" fill="#5a3a7a">消除逐行解释的分支 / 虚调用开销</text>
  <text x="736" y="438" font-size="8.5" fill="#8a5cae">编译一次、执行万次才划算</text>

  <!-- 存储访问 -->
  <rect x="720" y="452" width="372" height="90" rx="10" fill="#fff" stroke="#d9dde4"/>
  <text x="736" y="474" font-size="11" font-weight="700" fill="#1d1d1f">存储访问层</text>
  <text x="736" y="494" font-size="9" fill="#4a4a4f">扫描算子向存储要数据（列批 / 行）</text>
  <text x="736" y="512" font-size="9" fill="#4a4a4f">谓词下推到存储，减少上送的数据量</text>
  <text x="736" y="530" font-size="8.5" fill="#8a97ab">← 与「存储引擎」主题在此衔接</text>

  <!-- 连线 -->
  <!-- SQL → 优化器 (blue) -->
  <line x1="196" y1="220" x2="226" y2="220" stroke="#4a7fd0" stroke-width="2" marker-end="url(#aB)"/>
  <text x="200" y="212" font-size="8.5" fill="#20375e">逻辑计划</text>
  <!-- 改写 → 搜索 (amber) -->
  <line x1="448" y1="246" x2="448" y2="254" stroke="#d98a00" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#aA)"/>
  <!-- 统计 → 搜索 (purple) -->
  <line x1="448" y1="386" x2="448" y2="378" stroke="#8a5cae" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#aP)"/>
  <text x="454" y="384" font-size="8.5" fill="#6f3ea8">喂代价</text>
  <!-- 搜索 → 物理计划 (amber) -->
  <line x1="448" y1="452" x2="448" y2="488" stroke="#d98a00" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#aA)"/>
  <text x="454" y="474" font-size="8.5" fill="#8a6417">择优</text>
  <!-- 优化器 → 执行器 (blue) -->
  <line x1="668" y1="300" x2="698" y2="300" stroke="#4a7fd0" stroke-width="2" marker-end="url(#aB)"/>
  <text x="640" y="292" font-size="8.5" fill="#20375e">物理计划</text>
  <!-- 算子 → 向量化 (green) -->
  <line x1="906" y1="262" x2="906" y2="270" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aG)"/>
  <!-- 向量化 → JIT (green) -->
  <line x1="906" y1="352" x2="906" y2="360" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aG)"/>
  <!-- JIT → 存储访问 (green) -->
  <line x1="906" y1="442" x2="906" y2="450" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aG)"/>
  <text x="912" y="448" font-size="8.5" fill="#2f6b4e">要数据</text>

  <!-- 底部：核心权衡带 -->
  <rect x="28" y="576" width="1084" height="104" rx="13" fill="#f6f7f9" stroke="#e4e7ec"/>
  <text x="46" y="602" font-size="11" font-weight="700" fill="#8a6417">两半各一个核心难题</text>
  <text x="46" y="624" font-size="10" fill="#4a4a4f"><tspan font-weight="700" fill="#8a6417">优化器（搜）</tspan>：计划空间随表数组合爆炸，且代价靠统计估算 —— 搜得起 + 估得准，才选得对。省的是「跑错计划」的巨额浪费。</text>
  <text x="46" y="646" font-size="10" fill="#4a4a4f"><tspan font-weight="700" fill="#2f6b4e">执行器（跑）</tspan>：同一份正确计划，逐行解释 vs 向量化 / JIT 可差一个数量级 —— 榨的是 CPU 的每一个周期。</text>
  <text x="46" y="668" font-size="9" fill="#a1a1a6">分工：优化器决定「做什么形状」（一次性、离线味），执行器决定「多快做完」（每行、在线味）；两者以物理计划为界。</text>
</svg>
