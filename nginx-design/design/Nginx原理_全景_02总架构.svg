<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="680" viewBox="0 0 1020 680"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="680" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">nginx 总架构 · master-worker 进程 + 事件驱动 + 模块流水线（位置即语义）</text>

  <!-- master -->
  <rect x="30" y="50" width="960" height="96" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="48" y="74" font-size="12.5" font-weight="600" fill="#1b2a4a">master 进程 · 不处理请求，只管控（ngx_master_process_cycle，process_cycle.c:74）</text>
  <rect x="48" y="88" width="220" height="46" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="158" y="108" font-size="10" fill="#1b2a4a" text-anchor="middle">读配置 / 绑定监听端口</text><text x="158" y="124" font-size="8.5" fill="#5b7db1" text-anchor="middle">特权操作在此完成</text>
  <rect x="280" y="88" width="220" height="46" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="390" y="108" font-size="10" fill="#1b2a4a" text-anchor="middle">fork worker 进程</text><text x="390" y="124" font-size="8.5" fill="#5b7db1" text-anchor="middle">start_worker_processes:336</text>
  <rect x="512" y="88" width="220" height="46" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="622" y="108" font-size="10" fill="#1b2a4a" text-anchor="middle">接信号：reload/reopen/quit</text><text x="622" y="124" font-size="8.5" fill="#5b7db1" text-anchor="middle">监控并重启挂掉的 worker</text>
  <rect x="744" y="88" width="226" height="46" rx="9" fill="#fff7e6" stroke="#f0dcae"/><text x="857" y="108" font-size="10" fill="#7a4d00" text-anchor="middle">派生 cache manager/loader</text><text x="857" y="124" font-size="8.5" fill="#9a7328" text-anchor="middle">专职后台进程</text>

  <!-- workers -->
  <rect x="30" y="162" width="700" height="230" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="186" font-size="12.5" font-weight="600" fill="#1d1d1f">worker 进程（多个，各自独立事件循环，共享监听套接字）</text>

  <rect x="48" y="200" width="320" height="176" rx="11" fill="#f6f9fd" stroke="#cfe0f2"/>
  <text x="208" y="222" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">worker #1 · 事件循环</text>
  <rect x="64" y="234" width="288" height="34" rx="8" fill="#eafaf1" stroke="#bce6cd"/><text x="208" y="256" font-size="9.5" fill="#0f5132" text-anchor="middle">epoll_wait 拿就绪事件（epoll_module.c:784）</text>
  <rect x="64" y="274" width="288" height="34" rx="8" fill="#ffffff" stroke="#cfe0f2"/><text x="208" y="296" font-size="9.5" fill="#1b2a4a" text-anchor="middle">accept 新连接 / 读写已连接</text>
  <rect x="64" y="314" width="288" height="34" rx="8" fill="#f4eefb" stroke="#d9c9ef"/><text x="208" y="336" font-size="9.5" fill="#3c1361" text-anchor="middle">跑 HTTP 阶段 → handler/filter</text>
  <text x="208" y="366" font-size="8.5" fill="#5b7db1" text-anchor="middle">process_events_and_timers（event.c:195）</text>

  <rect x="384" y="200" width="330" height="176" rx="11" fill="#f6f9fd" stroke="#cfe0f2"/>
  <text x="549" y="222" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">worker #2 … #N（对称）</text>
  <text x="549" y="250" font-size="9.5" fill="#5b7db1" text-anchor="middle">accept_mutex 或 SO_REUSEPORT</text>
  <text x="549" y="268" font-size="9.5" fill="#5b7db1" text-anchor="middle">决定谁接新连接（event.c:53）</text>
  <text x="549" y="296" font-size="9.5" fill="#5b7db1" text-anchor="middle">worker 数通常 = CPU 核数</text>
  <text x="549" y="320" font-size="9.5" fill="#5b7db1" text-anchor="middle">进程间无共享请求状态</text>
  <text x="549" y="344" font-size="9.5" fill="#5b7db1" text-anchor="middle">共享内存仅存缓存索引/限流计数</text>

  <!-- 模块生态 -->
  <rect x="746" y="162" width="244" height="230" rx="14" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="764" y="186" font-size="12" font-weight="600" fill="#3c1361">模块生态</text>
  <rect x="764" y="200" width="208" height="40" rx="8" fill="#ffffff" stroke="#d9c9ef"/><text x="868" y="225" font-size="9.5" fill="#3c1361" text-anchor="middle">core / event / conf 模块</text>
  <rect x="764" y="248" width="208" height="40" rx="8" fill="#ffffff" stroke="#d9c9ef"/><text x="868" y="273" font-size="9.5" fill="#3c1361" text-anchor="middle">http / stream / mail 模块</text>
  <rect x="764" y="296" width="208" height="40" rx="8" fill="#ffffff" stroke="#d9c9ef"/><text x="868" y="321" font-size="9.5" fill="#3c1361" text-anchor="middle">handler / filter / upstream</text>
  <text x="764" y="360" font-size="8.5" fill="#7a5aa8">编译期静态链接（或动态 .so）</text>
  <text x="764" y="376" font-size="8.5" fill="#7a5aa8">指令注册进配置解析</text>

  <!-- 数据流 -->
  <rect x="30" y="408" width="960" height="120" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="48" y="432" font-size="12.5" font-weight="600" fill="#0f5132">一个请求在 worker 内的流水线</text>
  <rect x="48" y="446" width="150" height="64" rx="10" fill="#ffffff" stroke="#bce6cd"/><text x="123" y="472" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">连接接入</text><text x="123" y="490" font-size="8.5" fill="#3f8f66" text-anchor="middle">读请求行/头</text>
  <rect x="214" y="446" width="180" height="64" rx="10" fill="#ffffff" stroke="#bce6cd"/><text x="304" y="472" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">11 阶段处理</text><text x="304" y="490" font-size="8.5" fill="#3f8f66" text-anchor="middle">rewrite/access/content</text>
  <rect x="410" y="446" width="180" height="64" rx="10" fill="#ffffff" stroke="#bce6cd"/><text x="500" y="472" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">content handler</text><text x="500" y="490" font-size="8.5" fill="#3f8f66" text-anchor="middle">静态文件 / proxy_pass</text>
  <rect x="606" y="446" width="180" height="64" rx="10" fill="#ffffff" stroke="#bce6cd"/><text x="696" y="472" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">filter 链</text><text x="696" y="490" font-size="8.5" fill="#3f8f66" text-anchor="middle">gzip/chunked/header</text>
  <rect x="802" y="446" width="168" height="64" rx="10" fill="#ffffff" stroke="#bce6cd"/><text x="886" y="472" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">发送 + LOG</text><text x="886" y="490" font-size="8.5" fill="#3f8f66" text-anchor="middle">写回客户端 · 记日志</text>
  <line x1="198" y1="478" x2="214" y2="478" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="394" y1="478" x2="410" y2="478" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="590" y1="478" x2="606" y2="478" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="786" y1="478" x2="802" y2="478" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- 后端 -->
  <rect x="30" y="544" width="960" height="118" rx="14" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="48" y="568" font-size="12.5" font-weight="600" fill="#7a4d00">反向代理时：worker → upstream 后端</text>
  <rect x="48" y="582" width="300" height="64" rx="10" fill="#ffffff" stroke="#f0dcae"/><text x="198" y="606" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">upstream 负载均衡选 peer</text><text x="198" y="626" font-size="8.5" fill="#9a7328" text-anchor="middle">round robin / ip_hash / least_conn</text>
  <rect x="364" y="582" width="300" height="64" rx="10" fill="#ffffff" stroke="#f0dcae"/><text x="514" y="606" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">proxy 缓存命中则直返</text><text x="514" y="626" font-size="8.5" fill="#9a7328" text-anchor="middle">未命中转后端并回填</text>
  <rect x="680" y="582" width="290" height="64" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="825" y="606" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">后端服务器（app/其他 nginx）</text><text x="825" y="626" font-size="8.5" fill="#5b7db1" text-anchor="middle">HTTP/FastCGI/gRPC/uwsgi</text>
  <line x1="348" y1="614" x2="364" y2="614" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="664" y1="614" x2="680" y2="614" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>

  <line x1="380" y1="146" x2="380" y2="162" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="396" y="158" font-size="9" fill="#86868b">fork</text>
  <line x1="500" y1="392" x2="500" y2="408" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="500" y1="528" x2="500" y2="544" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
</svg>
