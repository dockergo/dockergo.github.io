<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="360" viewBox="0 0 1020 360"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
  </defs>
  <rect width="1020" height="360" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">接触面 × 能力域 依赖矩阵（■ 强　▨ 中　· 弱/无）</text>

  <!-- 列头 -->
  <text x="212" y="70" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">进程/事件</text>
  <text x="300" y="70" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">HTTP阶段</text>
  <text x="388" y="70" font-size="10" font-weight="600" fill="#3c1361" text-anchor="middle">模块体系</text>
  <text x="476" y="70" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">内存池</text>
  <text x="564" y="70" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">upstream</text>
  <text x="652" y="70" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">代理缓存</text>
  <text x="740" y="70" font-size="10" font-weight="600" fill="#7d1f1f" text-anchor="middle">SSL/TLS</text>
  <text x="828" y="70" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">日志限流</text>

  <!-- 行头 -->
  <text x="60" y="122" font-size="12" font-weight="600" fill="#3c1361">配置指令</text>
  <text x="60" y="196" font-size="12" font-weight="600" fill="#3c1361">信号控制</text>

  <!-- 配置指令行 y=96 -->
  <g>
    <rect x="174" y="96" width="76" height="54" rx="9" fill="#dfe8f5" stroke="#bcd0ec"/><text x="212" y="128" font-size="12" fill="#1b2a4a" text-anchor="middle">■</text>
    <rect x="262" y="96" width="76" height="54" rx="9" fill="#dfe8f5" stroke="#bcd0ec"/><text x="300" y="128" font-size="12" fill="#1b2a4a" text-anchor="middle">■</text>
    <rect x="350" y="96" width="76" height="54" rx="9" fill="#e3d5f3" stroke="#d9c9ef"/><text x="388" y="128" font-size="12" fill="#3c1361" text-anchor="middle">■</text>
    <rect x="438" y="96" width="76" height="54" rx="9" fill="#f6f6f8" stroke="#e2e2e7"/><text x="476" y="128" font-size="12" fill="#c0c0c5" text-anchor="middle">·</text>
    <rect x="526" y="96" width="76" height="54" rx="9" fill="#cfe8da" stroke="#bce6cd"/><text x="564" y="128" font-size="12" fill="#0f5132" text-anchor="middle">■</text>
    <rect x="614" y="96" width="76" height="54" rx="9" fill="#e8d49a" stroke="#f0dcae"/><text x="652" y="128" font-size="12" fill="#7a4d00" text-anchor="middle">■</text>
    <rect x="702" y="96" width="76" height="54" rx="9" fill="#f3d4d4" stroke="#f0cccc"/><text x="740" y="128" font-size="12" fill="#7d1f1f" text-anchor="middle">■</text>
    <rect x="790" y="96" width="76" height="54" rx="9" fill="#e8d49a" stroke="#f0dcae"/><text x="828" y="128" font-size="12" fill="#7a4d00" text-anchor="middle">■</text>
  </g>
  <!-- 信号控制行 y=170 -->
  <g>
    <rect x="174" y="170" width="76" height="54" rx="9" fill="#dfe8f5" stroke="#bcd0ec"/><text x="212" y="202" font-size="12" fill="#1b2a4a" text-anchor="middle">■</text>
    <rect x="262" y="170" width="76" height="54" rx="9" fill="#f6f6f8" stroke="#e2e2e7"/><text x="300" y="202" font-size="12" fill="#c0c0c5" text-anchor="middle">·</text>
    <rect x="350" y="170" width="76" height="54" rx="9" fill="#f6f6f8" stroke="#e2e2e7"/><text x="388" y="202" font-size="12" fill="#c0c0c5" text-anchor="middle">·</text>
    <rect x="438" y="170" width="76" height="54" rx="9" fill="#dcefe4" stroke="#bce6cd"/><text x="476" y="202" font-size="12" fill="#0f5132" text-anchor="middle">▨</text>
    <rect x="526" y="170" width="76" height="54" rx="9" fill="#dcefe4" stroke="#bce6cd"/><text x="564" y="202" font-size="12" fill="#0f5132" text-anchor="middle">▨</text>
    <rect x="614" y="170" width="76" height="54" rx="9" fill="#f6f6f8" stroke="#e2e2e7"/><text x="652" y="202" font-size="12" fill="#c0c0c5" text-anchor="middle">·</text>
    <rect x="702" y="170" width="76" height="54" rx="9" fill="#f6f6f8" stroke="#e2e2e7"/><text x="740" y="202" font-size="12" fill="#c0c0c5" text-anchor="middle">·</text>
    <rect x="790" y="170" width="76" height="54" rx="9" fill="#e8d49a" stroke="#f0dcae"/><text x="828" y="202" font-size="12" fill="#7a4d00" text-anchor="middle">■</text>
  </g>

  <text x="30" y="268" font-size="10.5" fill="#86868b">配置指令几乎驱动全部能力域——每条指令由某个模块注册，决定进程数、监听、location 路由、upstream、缓存、SSL、限流。</text>
  <text x="30" y="290" font-size="10.5" fill="#86868b">信号控制轻：reload 重建配置与进程（连带重建内存池、重载 upstream），reopen 重开日志文件；不触碰请求处理逻辑本身。</text>
  <text x="30" y="326" font-size="10.5" fill="#494950">灵魂两域：<tspan font-weight="600" fill="#1b2a4a">进程/事件模型</tspan>（高并发根基）与 <tspan font-weight="600" fill="#1b2a4a">HTTP 阶段处理</tspan>（请求怎么被跑完）——两个接触面都强依赖前者。</text>
</svg>
