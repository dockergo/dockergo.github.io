<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="440" viewBox="0 0 1020 440"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">代理缓存 · key 命中直返，未命中回源并回填（ngx_http_file_cache.c）</text>

  <!-- 查找流程 -->
  <rect x="40" y="56" width="230" height="46" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="155" y="78" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">请求到 proxy_cache location</text>
  <text x="155" y="94" font-size="8.5" fill="#5b7db1" text-anchor="middle">算 cache key（MD5，file_cache.c:11）</text>

  <rect x="40" y="132" width="230" height="60" rx="11" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="155" y="156" font-size="10.5" font-weight="600" fill="#7a4d00" text-anchor="middle">查共享内存索引</text>
  <text x="155" y="176" font-size="8.5" fill="#9a7328" text-anchor="middle">红黑树 by key → 缓存节点状态</text>

  <!-- 三种结果 -->
  <rect x="330" y="60" width="300" height="52" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="480" y="82" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">HIT（有效）</text><text x="480" y="100" font-size="8.5" fill="#3f8f66" text-anchor="middle">直接读磁盘缓存文件返回，不碰后端</text>
  <rect x="330" y="122" width="300" height="52" rx="10" fill="#fff7e6" stroke="#f0dcae"/><text x="480" y="144" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">EXPIRED / STALE</text><text x="480" y="162" font-size="8.5" fill="#9a7328" text-anchor="middle">回源校验；可配 stale-while-revalidate 先返旧的</text>
  <rect x="330" y="184" width="300" height="52" rx="10" fill="#fbeaea" stroke="#f0cccc"/><text x="480" y="206" font-size="10" font-weight="600" fill="#7d1f1f" text-anchor="middle">MISS</text><text x="480" y="224" font-size="8.5" fill="#b06a6a" text-anchor="middle">回源取，边返客户端边写缓存文件</text>

  <!-- 回源+回填 -->
  <rect x="690" y="60" width="290" height="176" rx="12" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="835" y="84" font-size="11" font-weight="600" fill="#3c1361" text-anchor="middle">回源与回填</text>
  <text x="705" y="108" font-size="9" fill="#7a5aa8">• upstream 取响应</text>
  <text x="705" y="128" font-size="9" fill="#7a5aa8">• 依 Cache-Control/proxy_cache_valid</text>
  <text x="705" y="144" font-size="9" fill="#7a5aa8">  决定是否可缓存 + TTL</text>
  <text x="705" y="166" font-size="9" fill="#7a5aa8">• 写临时文件 → 原子改名进缓存目录</text>
  <text x="705" y="188" font-size="9" fill="#7a5aa8">• proxy_cache_lock：并发 MISS 只放</text>
  <text x="705" y="204" font-size="9" fill="#7a5aa8">  一个回源，其余等它回填（防击穿）</text>
  <text x="705" y="226" font-size="8.5" fill="#a58fc9">共享内存存索引，数据存磁盘文件</text>

  <line x1="155" y1="102" x2="155" y2="132" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="270" y1="86" x2="330" y2="86" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="270" y1="162" x2="330" y2="148" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="270" y1="180" x2="330" y2="210" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="630" y1="210" x2="690" y2="160" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- 后台管理 -->
  <rect x="40" y="256" width="940" height="160" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="56" y="280" font-size="12.5" font-weight="600" fill="#1d1d1f">缓存的存储与后台管理</text>
  <rect x="56" y="296" width="290" height="104" rx="10" fill="#fff7e6" stroke="#f0dcae"/><text x="201" y="320" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">磁盘布局</text><text x="201" y="342" font-size="8.5" fill="#9a7328" text-anchor="middle">按 key hash 分级目录（levels=1:2）</text><text x="201" y="360" font-size="8.5" fill="#9a7328" text-anchor="middle">文件头存元数据 + 响应头 + 体</text><text x="201" y="380" font-size="8.5" fill="#9a7328" text-anchor="middle">keys_zone 存内存索引</text>
  <rect x="360" y="296" width="290" height="104" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="505" y="320" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">cache manager 进程</text><text x="505" y="342" font-size="8.5" fill="#3f8f66" text-anchor="middle">按 max_size 淘汰（LRU）</text><text x="505" y="360" font-size="8.5" fill="#3f8f66" text-anchor="middle">按 inactive 清理久未访问</text><text x="505" y="380" font-size="8.5" fill="#3f8f66" text-anchor="middle">后台专职进程</text>
  <rect x="664" y="296" width="316" height="104" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="822" y="320" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">cache loader 进程</text><text x="822" y="342" font-size="8.5" fill="#5b7db1" text-anchor="middle">启动时扫描缓存目录</text><text x="822" y="360" font-size="8.5" fill="#5b7db1" text-anchor="middle">把已有缓存文件载入内存索引</text><text x="822" y="380" font-size="8.5" fill="#5b7db1" text-anchor="middle">只在启动跑一次</text>
</svg>
