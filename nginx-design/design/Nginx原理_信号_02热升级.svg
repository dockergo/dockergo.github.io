<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="440" viewBox="0 0 1020 440"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">reload 与二进制热升级 · 不中断服务地换配置 / 换可执行文件</text>

  <!-- reload -->
  <rect x="30" y="56" width="960" height="170" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="48" y="80" font-size="12.5" font-weight="600" fill="#0f5132">reload（SIGHUP）：优雅换配置</text>
  <rect x="48" y="96" width="170" height="60" rx="10" fill="#ffffff" stroke="#bce6cd"/><text x="133" y="120" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">① master 收 SIGHUP</text><text x="133" y="140" font-size="8.5" fill="#3f8f66" text-anchor="middle">重新解析配置</text>
  <rect x="238" y="96" width="180" height="60" rx="10" fill="#ffffff" stroke="#bce6cd"/><text x="328" y="120" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">② 配置合法？</text><text x="328" y="140" font-size="8.5" fill="#3f8f66" text-anchor="middle">不合法 → 保留旧配置，放弃</text>
  <rect x="438" y="96" width="180" height="60" rx="10" fill="#ffffff" stroke="#bce6cd"/><text x="528" y="120" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">③ fork 新 worker</text><text x="528" y="140" font-size="8.5" fill="#3f8f66" text-anchor="middle">用新配置，开始接新连接</text>
  <rect x="638" y="96" width="180" height="60" rx="10" fill="#ffffff" stroke="#bce6cd"/><text x="728" y="120" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">④ 旧 worker 停止 accept</text><text x="728" y="140" font-size="8.5" fill="#3f8f66" text-anchor="middle">处理完存量请求</text>
  <rect x="838" y="96" width="132" height="60" rx="10" fill="#ffffff" stroke="#bce6cd"/><text x="904" y="120" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">⑤ 旧 worker 退出</text><text x="904" y="140" font-size="8.5" fill="#3f8f66" text-anchor="middle">平滑完成切换</text>
  <line x1="218" y1="126" x2="238" y2="126" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="418" y1="126" x2="438" y2="126" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="618" y1="126" x2="638" y2="126" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="818" y1="126" x2="838" y2="126" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="48" y="180" font-size="9.5" fill="#3f8f66">新旧 worker 短暂并存；客户端无感。配置错误不影响在跑的旧配置——这是"配置即代码"安全演进的关键。</text>
  <text x="48" y="202" font-size="9.5" fill="#5aa06f">内存池随之重建：旧 worker 的 cycle/pool 在退出时整体释放，新 worker 用新 cycle。</text>

  <!-- 热升级 -->
  <rect x="30" y="246" width="960" height="194" rx="14" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="48" y="270" font-size="12.5" font-weight="600" fill="#3c1361">二进制热升级（SIGUSR2）：不丢连接换 nginx 可执行文件</text>
  <rect x="48" y="286" width="220" height="64" rx="10" fill="#ffffff" stroke="#d9c9ef"/><text x="158" y="310" font-size="9.5" font-weight="600" fill="#3c1361" text-anchor="middle">① 旧 master 收 SIGUSR2</text><text x="158" y="330" font-size="8.5" fill="#7a5aa8" text-anchor="middle">fork + exec 新版 nginx</text><text x="158" y="344" font-size="8.5" fill="#7a5aa8" text-anchor="middle">继承监听套接字（环境变量传 fd）</text>
  <rect x="288" y="286" width="220" height="64" rx="10" fill="#ffffff" stroke="#d9c9ef"/><text x="398" y="310" font-size="9.5" font-weight="600" fill="#3c1361" text-anchor="middle">② 新旧两套并存</text><text x="398" y="330" font-size="8.5" fill="#7a5aa8" text-anchor="middle">都在同一端口 accept</text><text x="398" y="344" font-size="8.5" fill="#7a5aa8" text-anchor="middle">验证新版是否正常</text>
  <rect x="528" y="286" width="220" height="64" rx="10" fill="#ffffff" stroke="#d9c9ef"/><text x="638" y="310" font-size="9.5" font-weight="600" fill="#3c1361" text-anchor="middle">③ 旧 master 收 SIGWINCH</text><text x="638" y="330" font-size="8.5" fill="#7a5aa8" text-anchor="middle">旧 worker 停止接新连接</text><text x="638" y="344" font-size="8.5" fill="#7a5aa8" text-anchor="middle">排空存量</text>
  <rect x="768" y="286" width="202" height="64" rx="10" fill="#ffffff" stroke="#d9c9ef"/><text x="869" y="310" font-size="9.5" font-weight="600" fill="#3c1361" text-anchor="middle">④ 确认后</text><text x="869" y="330" font-size="8.5" fill="#7a5aa8" text-anchor="middle">SIGQUIT 旧 master</text><text x="869" y="344" font-size="8.5" fill="#7a5aa8" text-anchor="middle">彻底切到新版</text>
  <line x1="268" y1="318" x2="288" y2="318" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="508" y1="318" x2="528" y2="318" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="748" y1="318" x2="768" y2="318" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <rect x="48" y="364" width="922" height="60" rx="10" fill="#fdf2f2" stroke="#f0cccc"/>
  <text x="64" y="386" font-size="9.5" font-weight="600" fill="#7d1f1f">回滚安全网</text>
  <text x="64" y="406" font-size="9" fill="#b06a6a">若新版有问题，第③步前可给旧 master SIGHUP 复活旧 worker、给新 master SIGQUIT——回退到旧版本，全程不丢连接。</text>
</svg>
