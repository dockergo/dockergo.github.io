<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="440" viewBox="0 0 1020 440"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">upstream 负载均衡 · 在多后端间选 peer（round_robin.c 为默认基座）</text>

  <!-- 决策树 -->
  <rect x="410" y="52" width="200" height="44" rx="11" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="510" y="72" font-size="11" font-weight="600" fill="#7a4d00" text-anchor="middle">选后端 peer</text>
  <text x="510" y="88" font-size="9" fill="#9a7328" text-anchor="middle">upstream{} 声明策略</text>

  <rect x="40" y="150" width="215" height="90" rx="12" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="147" y="174" font-size="10.5" font-weight="600" fill="#0f5132" text-anchor="middle">round robin（默认）</text>
  <text x="147" y="196" font-size="9" fill="#3f8f66" text-anchor="middle">按 weight 加权轮询</text>
  <text x="147" y="214" font-size="9" fill="#3f8f66" text-anchor="middle">最通用、无状态</text>
  <text x="147" y="232" font-size="8.5" fill="#5aa06f" text-anchor="middle">get_round_robin_peer</text>

  <rect x="270" y="150" width="215" height="90" rx="12" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="377" y="174" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">ip_hash / hash</text>
  <text x="377" y="196" font-size="9" fill="#5b7db1" text-anchor="middle">按客户端 IP / 自定 key 哈希</text>
  <text x="377" y="214" font-size="9" fill="#5b7db1" text-anchor="middle">同源打同后端（会话保持）</text>
  <text x="377" y="232" font-size="8.5" fill="#8fa9cf" text-anchor="middle">consistent 减少重分布</text>

  <rect x="500" y="150" width="215" height="90" rx="12" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="607" y="174" font-size="10.5" font-weight="600" fill="#3c1361" text-anchor="middle">least_conn / least_time</text>
  <text x="607" y="196" font-size="9" fill="#7a5aa8" text-anchor="middle">选当前连接最少 / 响应最快</text>
  <text x="607" y="214" font-size="9" fill="#7a5aa8" text-anchor="middle">适合请求耗时不均</text>

  <rect x="730" y="150" width="240" height="90" rx="12" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="850" y="174" font-size="10.5" font-weight="600" fill="#7a4d00" text-anchor="middle">random（power of two）</text>
  <text x="850" y="196" font-size="9" fill="#9a7328" text-anchor="middle">随机选 2 个取较优</text>
  <text x="850" y="214" font-size="9" fill="#9a7328" text-anchor="middle">近似 least_conn 更省状态</text>
  <text x="850" y="232" font-size="8.5" fill="#b8912e" text-anchor="middle">大规模后端友好</text>

  <line x1="470" y1="96" x2="147" y2="150" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="490" y1="96" x2="377" y2="150" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="530" y1="96" x2="607" y2="150" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="560" y1="96" x2="850" y2="150" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- 共同基座 -->
  <rect x="40" y="264" width="930" height="70" rx="12" fill="#f6f6f8" stroke="#e2e2e7"/>
  <text x="505" y="288" font-size="11" font-weight="600" fill="#1d1d1f" text-anchor="middle">所有策略共享 round_robin 基座的 peer 状态（rr_peers）：weight / 当前连接数 / 失败计数</text>
  <text x="505" y="310" font-size="9.5" fill="#6a6a70" text-anchor="middle">init_round_robin 建 peer 数组（round_robin.c:37），各策略只是不同的 get_peer 选法</text>
  <text x="505" y="326" font-size="8.5" fill="#86868b" text-anchor="middle">共享内存 zone（upstream_zone）让多 worker 共享 peer 状态与统计</text>

  <rect x="40" y="350" width="930" height="72" rx="12" fill="#fbeaea" stroke="#f0cccc"/>
  <text x="56" y="374" font-size="10.5" font-weight="600" fill="#7d1f1f">选中后失败怎么办</text>
  <text x="56" y="396" font-size="9.5" fill="#b06a6a">被动健康检查：请求失败累计到 max_fails 次 → 标记 peer 在 fail_timeout 内"不可用" → 跳过它选下一个。</text>
  <text x="56" y="414" font-size="9.5" fill="#b06a6a">proxy_next_upstream 控制哪些错误触发重试到别的 peer。</text>
</svg>
