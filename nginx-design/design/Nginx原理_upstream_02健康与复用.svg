<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="420" viewBox="0 0 1020 420"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="420" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">健康检查与连接复用 · 让流量避开坏后端、少握手</text>

  <!-- 被动健康检查 -->
  <rect x="30" y="56" width="470" height="200" rx="14" fill="#fbeaea" stroke="#f0cccc" filter="url(#soft)"/>
  <text x="48" y="80" font-size="12.5" font-weight="600" fill="#7d1f1f">被动健康检查（开源版内建）</text>
  <rect x="48" y="96" width="434" height="44" rx="9" fill="#ffffff" stroke="#f0cccc"/><text x="64" y="116" font-size="9.5" font-weight="600" fill="#7d1f1f">① 转发失败累计</text><text x="64" y="132" font-size="8.5" fill="#b06a6a">连接超时/拒绝/错误 → 该 peer fail 计数 +1</text>
  <rect x="48" y="148" width="434" height="44" rx="9" fill="#ffffff" stroke="#f0cccc"/><text x="64" y="168" font-size="9.5" font-weight="600" fill="#7d1f1f">② 达 max_fails → 熔断</text><text x="64" y="184" font-size="8.5" fill="#b06a6a">在 fail_timeout 窗口内标记不可用，选 peer 时跳过</text>
  <rect x="48" y="200" width="434" height="44" rx="9" fill="#ffffff" stroke="#f0cccc"/><text x="64" y="220" font-size="9.5" font-weight="600" fill="#7d1f1f">③ 窗口后半开重试</text><text x="64" y="236" font-size="8.5" fill="#b06a6a">超时后再放一个请求试探，成功则恢复</text>

  <!-- keepalive -->
  <rect x="520" y="56" width="470" height="200" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="538" y="80" font-size="12.5" font-weight="600" fill="#0f5132">keepalive 连接池（到后端）</text>
  <rect x="538" y="96" width="434" height="44" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="554" y="116" font-size="9.5" font-weight="600" fill="#0f5132">复用长连接</text><text x="554" y="132" font-size="8.5" fill="#3f8f66">请求完不关到后端的连接，放回池等下次复用</text>
  <rect x="538" y="148" width="434" height="44" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="554" y="168" font-size="9.5" font-weight="600" fill="#0f5132">省握手开销</text><text x="554" y="184" font-size="8.5" fill="#3f8f66">避免每请求都 TCP 三次握手 + TLS，降延迟</text>
  <rect x="538" y="200" width="434" height="44" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="554" y="220" font-size="9.5" font-weight="600" fill="#0f5132">keepalive N 配池大小</text><text x="554" y="236" font-size="8.5" fill="#3f8f66">需配 proxy_http_version 1.1 + 清 Connection 头</text>

  <!-- 完整代理链路 -->
  <rect x="30" y="272" width="960" height="140" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="296" font-size="12.5" font-weight="600" fill="#1d1d1f">一次反向代理的完整链路（贯穿示例 /api/users）</text>
  <rect x="48" y="312" width="150" height="70" rx="10" fill="#f4eefb" stroke="#d9c9ef"/><text x="123" y="338" font-size="9.5" font-weight="600" fill="#3c1361" text-anchor="middle">CONTENT 阶段</text><text x="123" y="358" font-size="8.5" fill="#7a5aa8" text-anchor="middle">proxy_pass 触发</text><text x="123" y="372" font-size="8.5" fill="#7a5aa8" text-anchor="middle">upstream 模块</text>
  <rect x="214" y="312" width="150" height="70" rx="10" fill="#fff7e6" stroke="#f0dcae"/><text x="289" y="338" font-size="9.5" font-weight="600" fill="#7a4d00" text-anchor="middle">选 peer</text><text x="289" y="358" font-size="8.5" fill="#9a7328" text-anchor="middle">LB 策略 + 跳过坏的</text>
  <rect x="380" y="312" width="150" height="70" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="455" y="338" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">取/建连接</text><text x="455" y="358" font-size="8.5" fill="#3f8f66" text-anchor="middle">keepalive 池优先</text>
  <rect x="546" y="312" width="150" height="70" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="621" y="338" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">发请求/收响应</text><text x="621" y="358" font-size="8.5" fill="#5b7db1" text-anchor="middle">非阻塞、可暂停</text>
  <rect x="712" y="312" width="150" height="70" rx="10" fill="#f4eefb" stroke="#d9c9ef"/><text x="787" y="338" font-size="9.5" font-weight="600" fill="#3c1361" text-anchor="middle">经 filter 回客户端</text><text x="787" y="358" font-size="8.5" fill="#7a5aa8" text-anchor="middle">可同时写缓存</text>
  <rect x="878" y="312" width="92" height="70" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="924" y="345" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">连接放回池</text>
  <line x1="198" y1="347" x2="214" y2="347" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="364" y1="347" x2="380" y2="347" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="530" y1="347" x2="546" y2="347" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="696" y1="347" x2="712" y2="347" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="862" y1="347" x2="878" y2="347" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
</svg>
