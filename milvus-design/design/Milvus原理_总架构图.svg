<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="800" viewBox="0 0 1080 800" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="800" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Milvus 核心原理 · 总架构图</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">分布式向量数据库:存算分离,写入日志驱动(streaming WAL),ANN 检索(knowhere),全局 TSO 一致性;数据在对象存储</text>

  <!-- API -->
  <rect x="30" y="64" width="1020" height="46" rx="13" fill="#f4eefb" stroke="#d9c7ec" data-tid="Milvus原理_接触面_向量CRUD与检索API" data-lab="向量CRUD/检索API"/>
  <text x="46" y="92" font-size="11" fill="#3d2a5a"><tspan font-weight="700">向量 CRUD + ANN 检索 API</tspan>　insert / delete / upsert · search(topK 最近邻)· query　—— 经 Proxy 接入</text>

  <!-- Proxy -->
  <rect x="30" y="124" width="1020" height="40" rx="12" fill="#e7f0fb" stroke="#b9d2ef" data-tid="Milvus原理_支撑_分布式架构" data-lab="Proxy接入"/>
  <text x="540" y="149" font-size="10.5" font-weight="700" text-anchor="middle" fill="#1b2a4a">Proxy（接入层 · 无状态 · 路由 + 聚合结果）</text>

  <!-- MixCoord (right column) -->
  <rect x="746" y="178" width="304" height="330" rx="16" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="762" y="200" font-size="11.5" font-weight="700" fill="#1b2a4a">MixCoord(统管)</text>
  <text x="762" y="218" font-size="8" fill="#5b7db1">内嵌 root/data/query/streaming coord</text>
  <g font-size="8">
    <rect x="762" y="228" width="272" height="56" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><rect x="762" y="228" width="272" height="26" fill="none" data-tid="Milvus原理_支撑_元数据" data-lab="RootCoord·DDL元数据/RBAC"/><rect x="762" y="254" width="272" height="30" fill="none" data-tid="Milvus原理_支撑_一致性与时间" data-lab="RootCoord·TSO时间戳/HLC"/><text x="776" y="248" font-weight="600" fill="#274a78">RootCoord</text><text x="776" y="264" fill="#5b7db1">DDL 元数据 · RBAC · TSO 时间戳</text><text x="776" y="278" fill="#5b7db1">全局单调时钟(HLC)</text>
    <rect x="762" y="292" width="272" height="52" rx="8" fill="#f3f7fc" stroke="#cfe0f2" data-tid="Milvus原理_支撑_段与生命周期" data-lab="DataCoord·段/flush"/><text x="776" y="312" font-weight="600" fill="#274a78">DataCoord</text><text x="776" y="328" fill="#5b7db1">段管理 · compaction · flush · 索引</text>
    <rect x="762" y="352" width="272" height="52" rx="8" fill="#f3f7fc" stroke="#cfe0f2" data-tid="Milvus原理_支撑_分布式架构" data-lab="QueryCoord·副本/均衡"/><text x="776" y="372" font-weight="600" fill="#274a78">QueryCoord</text><text x="776" y="388" fill="#5b7db1">副本管理 · 负载均衡 · target</text>
    <rect x="762" y="412" width="272" height="52" rx="8" fill="#e7f0fb" stroke="#b9d2ef" data-tid="Milvus原理_支撑_写入路径" data-lab="StreamingCoord·PChannel"/><text x="776" y="432" font-weight="600" fill="#1b2a4a">StreamingCoord</text><text x="776" y="448" fill="#5b7db1">PChannel→StreamingNode 分配</text>
    <rect x="762" y="472" width="272" height="28" rx="7" fill="#fff" stroke="#bcd0ec" data-tid="Milvus原理_支撑_元数据" data-lab="元数据存 etcd/tikv"/><text x="898" y="490" text-anchor="middle" fill="#5b7db1">元数据存 etcd / tikv</text>
  </g>

  <!-- write path (left) -->
  <rect x="30" y="178" width="340" height="330" rx="16" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="46" y="200" font-size="11.5" font-weight="700" fill="#5a3410">写入路径(日志驱动)</text>
  <g font-size="8" text-anchor="middle">
    <rect x="46" y="212" width="308" height="50" rx="8" fill="#fef2e0" stroke="#e8cf9a" data-tid="Milvus原理_支撑_写入路径" data-lab="streaming WAL"/><text x="200" y="232" font-weight="600" fill="#5a3410">streaming WAL(按 vchannel 分片)</text><text x="200" y="248" fill="#93762e">Pulsar/Kafka/woodpecker 为底</text>
    <rect x="46" y="270" width="308" height="50" rx="8" fill="#fef2e0" stroke="#e8cf9a" data-tid="Milvus原理_支撑_写入路径" data-lab="消费/路由"/><text x="200" y="290" font-weight="600" fill="#5a3410">StreamingNode/DataNode 消费</text><text x="200" y="306" fill="#93762e">Flusher 按 vchannel 路由</text>
    <rect x="46" y="328" width="308" height="50" rx="8" fill="#fef2e0" stroke="#e8cf9a" data-tid="Milvus原理_支撑_写入路径" data-lab="WriteBuffer"/><text x="200" y="348" font-weight="600" fill="#5a3410">WriteBuffer(insert/delta/stats)</text><text x="200" y="364" fill="#93762e">SyncManager 序列化</text>
    <rect x="46" y="386" width="308" height="50" rx="8" fill="#eafaf1" stroke="#bfe0cd" data-tid="Milvus原理_支撑_写入路径" data-lab="binlog+delta log"/><text x="200" y="406" font-weight="600" fill="#12402a">binlog + delta log</text><text x="200" y="422" fill="#2f6f4f">列式,落对象存储</text>
    <rect x="46" y="444" width="308" height="52" rx="8" fill="#fff" stroke="#e8cf9a" data-tid="Milvus原理_支撑_段与生命周期" data-lab="段 growing→sealed"/><text x="200" y="464" fill="#5a3410">段:growing(内存可变)→ sealed(封存)</text><text x="200" y="480" fill="#93762e">→ flushed → 异步建索引</text>
  </g>
  <line x1="200" y1="262" x2="200" y2="270" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="200" y1="320" x2="200" y2="328" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="200" y1="378" x2="200" y2="386" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- query path (middle) -->
  <rect x="386" y="178" width="344" height="330" rx="16" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="402" y="200" font-size="11.5" font-weight="700" fill="#12402a">读/检索路径(QueryNode)</text>
  <g font-size="8" text-anchor="middle">
    <rect x="402" y="212" width="312" height="50" rx="8" fill="#eafaf1" stroke="#bfe0cd" data-tid="Milvus原理_支撑_向量索引与检索" data-lab="加载sealed+knowhere索引"/><text x="558" y="232" font-weight="600" fill="#12402a">加载 sealed 段 + knowhere 索引</text><text x="558" y="248" fill="#2f6f4f">从对象存储拉;无状态</text>
    <rect x="402" y="270" width="312" height="58" rx="8" fill="#eafaf1" stroke="#bfe0cd" data-tid="Milvus原理_支撑_向量索引与检索" data-lab="ANN向量检索(segcore)"/><text x="558" y="290" font-weight="600" fill="#12402a">ANN 向量检索(C++ segcore)</text><text x="558" y="306" fill="#2f6f4f">HNSW/IVF/DiskANN/FLAT</text><text x="558" y="320" fill="#2f6f4f">度量 L2/IP/COSINE · cgo 调 knowhere</text>
    <rect x="402" y="336" width="312" height="52" rx="8" fill="#e6f7ee" stroke="#bfe0cd" data-tid="Milvus原理_支撑_向量索引与检索" data-lab="标量bitset预过滤"/><text x="558" y="356" font-weight="600" fill="#12402a">标量过滤 bitset 预过滤</text><text x="558" y="372" fill="#2f6f4f">FilterBitsNode→ANN 遍历内跳过</text>
    <rect x="402" y="396" width="312" height="52" rx="8" fill="#faf4fb" stroke="#e2d2ee" data-tid="Milvus原理_支撑_一致性与时间" data-lab="等tSafe追guaranteeTs"/><text x="558" y="416" font-weight="600" fill="#5a3d78">一致性:等 tSafe 追上 guaranteeTs</text><text x="558" y="432" fill="#7a5a95">看一致快照(时间戳 MVCC)</text>
    <rect x="402" y="456" width="312" height="40" rx="8" fill="#fff" stroke="#cfe6d5" data-tid="Milvus原理_支撑_段与生命周期" data-lab="growing段暴力搜"/><text x="558" y="480" fill="#2f6f4f">growing 段/未建索引段 → 暴力搜</text>
  </g>

  <!-- object storage -->
  <rect x="30" y="524" width="1020" height="56" rx="14" fill="#fdf6ea" stroke="#efdcb4" data-tid="Milvus原理_支撑_分布式架构" data-lab="对象存储·共享持久层"/>
  <text x="46" y="546" font-size="11" font-weight="700" fill="#5a3410">对象存储(S3 / MinIO)· 存算分离的共享持久层</text>
  <text x="46" y="566" font-size="8.8" fill="#93762e">所有段 binlog + delta log + 索引文件在此;计算节点(Query/Data)无状态,挂了重新加载;存储与计算独立弹性扩容</text>

  <!-- flow arrows -->
  <line x1="370" y1="343" x2="386" y2="290" stroke="#9db0c9" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <line x1="200" y1="508" x2="200" y2="524" stroke="#86868b" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="558" y1="524" x2="558" y2="508" stroke="#86868b" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="540" y1="164" x2="540" y2="178" stroke="#86868b" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- semantics + pervasive -->
  <rect x="30" y="596" width="1020" height="52" rx="12" fill="#f7f7f9" stroke="#ececf1" data-tid="Milvus原理_全景主线框架" data-lab=""/>
  <text x="46" y="618" font-size="11" font-weight="700" fill="#1d1d1f"></text>
  <text x="46" y="638" font-size="8.8" fill="#6e6e73">上=API+Proxy;左=写入路径(WAL→binlog);中=读检索(ANN+过滤+一致性);右=MixCoord 统管+etcd;底=对象存储共享持久层。计算无状态、存储共享。</text>

  <rect x="30" y="662" width="1020" height="44" rx="12" fill="#f0f0f4" stroke="#d2d2d7" data-tid="Milvus原理_支撑_一致性与时间" data-lab="贯穿层·timestamp/TSO"/>
  <text x="540" y="689" font-size="10" font-weight="700" text-anchor="middle" fill="#48484a">贯穿层 · timestamp(HLC 全局 TSO)—— 每操作领全局单调 ts,读按 guaranteeTs 等 tSafe 看一致快照,段/binlog 按 ts 版本化,横切写入/一致性/段</text>

  <!-- declarations -->
  <rect x="30" y="720" width="1020" height="66" rx="13" fill="#eafaf1" stroke="#bfe0cd" data-tid="Milvus原理_全景主线框架" data-lab="三条贯穿声明"/>
  <text x="46" y="740" font-size="10" font-weight="700" fill="#12402a">三条贯穿声明</text>
  <text x="46" y="758" font-size="8.5" fill="#2f6f4f">① 一切围绕 ANN 向量检索(knowhere,标量 bitset 预过滤)　② 存算分离 + 日志驱动(streaming WAL→异步 binlog,类比 Kafka 分区日志)</text>
  <text x="46" y="774" font-size="8.5" fill="#2f6f4f">③ 时间戳驱动一致性(全局 TSO 定序 + guaranteeTs 等 tSafe;一致性级别=选不同 guaranteeTs)　—— 不做 SQL join,核心是相似度检索</text>

  <!-- ==== 补充连线：跨模块数据流(实线) + 控制/调度(虚线) ==== -->
  <!-- 图例 -->
  <g font-size="8">
    <line x1="852" y1="40" x2="874" y2="40" stroke="#86868b" stroke-width="1.4" marker-end="url(#ar)"/><text x="879" y="43" fill="#86868b">数据流</text>
    <line x1="852" y1="53" x2="874" y2="53" stroke="#9db0c9" stroke-width="1.1" stroke-dasharray="4 3" marker-end="url(#ar)"/><text x="879" y="56" fill="#86868b">控制/调度</text>
  </g>

  <!-- 数据流：API → Proxy → 工作面 -->
  <line x1="540" y1="110" x2="540" y2="124" stroke="#86868b" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="547" y="121" font-size="6.8" fill="#8a8a8f">接入</text>
  <line x1="200" y1="164" x2="200" y2="178" stroke="#86868b" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="120" y="175" font-size="6.8" fill="#8a8a8f">insert/delete 写请求</text>
  <text x="548" y="175" font-size="6.8" fill="#8a8a8f">search/query 检索</text>
  <line x1="660" y1="178" x2="660" y2="164" stroke="#86868b" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="667" y="175" font-size="6.8" fill="#8a8a8f">topK 结果回聚</text>

  <!-- 数据流：底部持久层 写下沉 / 读加载 -->
  <text x="52" y="519" font-size="7" fill="#7a6a3e">binlog/delta 落盘</text>
  <text x="430" y="505" font-size="7" fill="#2f6f4f">加载 sealed 段+索引</text>

  <!-- L61 旁路标注：growing 段经 WAL 实时可见 -->
  <text x="379" y="410" font-size="6.8" fill="#6f83a3" text-anchor="middle" transform="rotate(-90 379 410)">WAL·growing 实时可见</text>

  <!-- 控制平面：MixCoord → 各工作面(虚线) -->
  <line x1="746" y1="256" x2="731" y2="256" stroke="#9db0c9" stroke-width="1.1" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="740" y="256" font-size="6.8" fill="#6f83a3" text-anchor="middle" transform="rotate(-90 740 256)">TSO·元数据·DDL</text>
  <line x1="746" y1="378" x2="731" y2="378" stroke="#9db0c9" stroke-width="1.1" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="740" y="378" font-size="6.8" fill="#6f83a3" text-anchor="middle" transform="rotate(-90 740 378)">副本·负载均衡</text>
  <line x1="830" y1="508" x2="830" y2="524" stroke="#9db0c9" stroke-width="1.1" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="840" y="519" font-size="7" fill="#6f83a3">compaction/GC 调度</text>
  <path d="M750,508 L750,517 L300,517 L300,508" fill="none" stroke="#9db0c9" stroke-width="1.1" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="330" y="514" font-size="7" fill="#6f83a3">段/flush·PChannel 调度</text>
</svg>
