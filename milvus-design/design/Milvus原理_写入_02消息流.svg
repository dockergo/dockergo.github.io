<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Milvus DML 消息流 · 日志驱动架构（类比 Kafka 分区日志 + 消费者）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">写入基于消息/日志:客户端追加 → StreamingCoord 管分配 → StreamingNode 持 WAL、Flusher 消费 → 按 vchannel 分发落盘</text>

  <!-- Producer side: WALAccesser -->
  <rect x="30" y="90" width="230" height="150" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="145" y="114" font-size="10.5" font-weight="700" text-anchor="middle" fill="#3d2a5a">WAL 客户端 · WALAccesser</text>
  <text x="145" y="132" font-size="8" text-anchor="middle" fill="#7a5a95">全局 producer(distributed/streaming)</text>
  <g font-size="8.5" text-anchor="middle" fill="#5a3d78">
    <rect x="46" y="146" width="198" height="34" rx="8" fill="#faf4fb" stroke="#e2d2ee"/><text x="145" y="167">RawAppend / AppendMessages</text>
    <rect x="46" y="188" width="198" height="40" rx="8" fill="#faf4fb" stroke="#e2d2ee"/><text x="145" y="205" fill="#3d2a5a">写日志(producer 角色)</text><text x="145" y="219" font-size="7.5">类比:Kafka producer 发消息到分区</text>
  </g>

  <!-- StreamingCoord (blue coordinate) -->
  <rect x="300" y="90" width="230" height="150" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="415" y="114" font-size="10.5" font-weight="700" text-anchor="middle" fill="#1b2a4a">StreamingCoord(协调)</text>
  <text x="415" y="132" font-size="8" text-anchor="middle" fill="#5b7db1">管 PChannel → StreamingNode 分配</text>
  <g font-size="8.5" text-anchor="middle" fill="#274a78">
    <rect x="316" y="146" width="198" height="34" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="415" y="167">balancer 分配 PChannel</text>
    <rect x="316" y="188" width="198" height="40" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="415" y="205" fill="#1b2a4a">决定哪个节点持哪 PChannel</text><text x="415" y="219" font-size="7.5">类比:Kafka 分区 leader 分配</text>
  </g>

  <!-- StreamingNode (amber holds WAL) -->
  <rect x="570" y="90" width="480" height="150" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="810" y="114" font-size="10.5" font-weight="700" text-anchor="middle" fill="#5a3410">StreamingNode · 持 WAL(walmanager)</text>
  <text x="810" y="132" font-size="8" text-anchor="middle" fill="#93762e">WALFlusherImpl.Execute 消费日志(consumer 角色)</text>
  <g font-size="8.5" text-anchor="middle">
    <rect x="586" y="146" width="220" height="82" rx="8" fill="#fef2e0" stroke="#e8cf9a"/>
    <text x="696" y="167" fill="#5a3410" font-weight="600">WAL(按 PChannel)</text>
    <text x="696" y="185" fill="#93762e" font-size="8">顺序日志:msg0 · msg1 · msg2 …</text>
    <text x="696" y="203" fill="#93762e" font-size="8">检查点标记消费位点</text>
    <text x="696" y="220" fill="#93762e" font-size="7.5">类比:Kafka 分区日志 + offset</text>
    <rect x="814" y="146" width="220" height="82" rx="8" fill="#fdf6ea" stroke="#efdcb4"/>
    <text x="924" y="167" fill="#5a3410" font-weight="600">flusherComponents</text>
    <text x="924" y="185" fill="#93762e" font-size="8">.HandleMessage 按 vchannel 分发</text>
    <text x="924" y="203" fill="#93762e" font-size="8">DML → 对应 DataSyncService</text>
    <text x="924" y="220" fill="#93762e" font-size="7.5">类比:consumer group 按 key 路由</text>
  </g>

  <!-- flow arrows producer chain -->
  <line x1="260" y1="165" x2="300" y2="165" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="530" y1="165" x2="570" y2="165" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="550" y="158" font-size="7.5" text-anchor="middle" fill="#a1a1a6">分配</text>

  <!-- vchannel routing fan-out -->
  <rect x="570" y="284" width="480" height="118" rx="13" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="810" y="306" font-size="10" font-weight="700" text-anchor="middle" fill="#12402a">按 vchannel 分发给 per-vchannel DataSyncService</text>
  <g font-size="8" text-anchor="middle">
    <rect x="590" y="320" width="130" height="68" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="655" y="340" font-weight="600" fill="#12402a">DataSyncService</text><text x="655" y="356" fill="#2f6f4f">vchannel-0</text><text x="655" y="376" fill="#2f6f4f" font-size="7.5">DML 消息(insert/delete)</text>
    <rect x="745" y="320" width="130" height="68" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="810" y="340" font-weight="600" fill="#12402a">DataSyncService</text><text x="810" y="356" fill="#2f6f4f">vchannel-1</text><text x="810" y="376" fill="#2f6f4f" font-size="7.5">DML 消息(insert/delete)</text>
    <rect x="900" y="320" width="130" height="68" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="965" y="340" font-weight="600" fill="#12402a">DataSyncService</text><text x="965" y="356" fill="#2f6f4f">vchannel-N</text><text x="965" y="376" fill="#2f6f4f" font-size="7.5">DML 消息(insert/delete)</text>
  </g>
  <line x1="696" y1="228" x2="696" y2="284" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- PChannel broadcast (TimeTick) -->
  <rect x="30" y="284" width="500" height="118" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="280" y="306" font-size="10" font-weight="700" text-anchor="middle" fill="#1b2a4a">PChannel 级消息 · 广播所有服务</text>
  <g font-size="8.5" text-anchor="middle" fill="#274a78">
    <rect x="46" y="320" width="220" height="68" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="156" y="342" font-weight="600" fill="#1b2a4a">TimeTick 等控制消息</text><text x="156" y="360" fill="#5b7db1">不属单个 vchannel</text><text x="156" y="378" fill="#5b7db1" font-size="7.5">广播给全部 DataSyncService</text>
    <rect x="290" y="320" width="224" height="68" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="402" y="342" font-weight="600" fill="#1b2a4a">推进各 vchannel 时间</text><text x="402" y="360" fill="#5b7db1">TimeTick 驱动 tSafe/水位</text><text x="402" y="378" fill="#5b7db1" font-size="7.5">DML 按 vchannel、控制类广播</text>
  </g>

  <!-- insight -->
  <rect x="30" y="418" width="1020" height="82" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="442" font-size="10.5" font-weight="700" fill="#1d1d1f">为什么日志驱动</text>
  <text x="46" y="462" font-size="8.8" fill="#6e6e73">写入与落盘解耦:Proxy 只管追加日志(快),消费端异步落盘 · 崩溃后从 WAL 检查点回放恢复未落盘数据 · vchannel 分片让写入并行</text>
  <text x="46" y="480" font-size="8.8" fill="#6e6e73">这与 Kafka 的“分区日志 + 消费者”同构:WALAccesser=producer、PChannel=分区、Flusher/DataSyncService=consumer、检查点=offset</text>
  <text x="46" y="497" font-size="8.8" fill="#6e6e73">DML 消息按 vchannel 分发到对应服务;PChannel 级消息(如 TimeTick)广播——这是消息路由的两种粒度</text>
</svg>
