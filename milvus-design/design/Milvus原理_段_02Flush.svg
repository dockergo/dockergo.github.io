<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Milvus Flush · growing → sealed → binlog（把内存 growing 段固化）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">flush 把内存 growing 段固化到对象存储:sync policy 选段 → metacache 转态 → SyncManager 序列化列式 binlog → 内存释放、可多 QueryNode 加载</text>

  <!-- Step 1: sync policy selects segments -->
  <rect x="30" y="94" width="300" height="240" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <circle cx="50" cy="112" r="9" fill="#ffffff" stroke="#bcd0ec"/><text x="50" y="115" font-size="9" font-weight="700" text-anchor="middle" fill="#1b2a4a">1</text>
  <text x="180" y="116" font-size="10.5" font-weight="700" text-anchor="middle" fill="#1b2a4a">sync policy 选段</text>
  <text x="180" y="134" font-size="8" text-anchor="middle" fill="#5b7db1">writebuffer/sync_policy.go · 各选段 id 同步</text>
  <g font-size="8.5">
    <rect x="46" y="146" width="132" height="40" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="112" y="170" text-anchor="middle" fill="#274a78">dropped-segment</text>
    <rect x="182" y="146" width="132" height="40" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="248" y="170" text-anchor="middle" fill="#274a78">buffer 满</text>
    <rect x="46" y="192" width="132" height="40" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="112" y="216" text-anchor="middle" fill="#274a78">buffer 过期</text>
    <rect x="182" y="192" width="132" height="40" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="248" y="216" text-anchor="middle" fill="#274a78">sealed-segments</text>
    <rect x="46" y="238" width="132" height="40" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="112" y="262" text-anchor="middle" fill="#274a78">flush-ts</text>
    <rect x="182" y="238" width="132" height="40" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="248" y="262" text-anchor="middle" fill="#274a78">oldest-buffer</text>
  </g>
  <text x="180" y="302" font-size="8" text-anchor="middle" fill="#5b7db1">任一条件命中即选该段落盘</text>

  <!-- Step 2: metacache state tracking -->
  <rect x="390" y="94" width="300" height="240" rx="14" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <circle cx="410" cy="112" r="9" fill="#ffffff" stroke="#cfe6d5"/><text x="410" y="115" font-size="9" font-weight="700" text-anchor="middle" fill="#12402a">2</text>
  <text x="540" y="116" font-size="10.5" font-weight="700" text-anchor="middle" fill="#12402a">metacache 段状态跟踪</text>
  <text x="540" y="134" font-size="8" text-anchor="middle" fill="#2f6f4f">meta_cache.go · UpdateState 转态</text>
  <rect x="406" y="148" width="268" height="66" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="540" y="170" font-size="8.5" text-anchor="middle" fill="#12402a" font-weight="600">按状态索引段</text>
  <text x="540" y="188" font-size="8" text-anchor="middle" fill="#2f6f4f">stateSegments</text>
  <text x="540" y="204" font-size="7.5" text-anchor="middle" fill="#2f6f4f">map[SegmentState]map[int64]*SegmentInfo</text>
  <g font-size="8.5" text-anchor="middle">
    <rect x="406" y="224" width="84" height="36" rx="7" fill="#eafaf1" stroke="#bfe0cd"/><text x="448" y="246" fill="#12402a">Growing</text>
    <rect x="498" y="224" width="84" height="36" rx="7" fill="#fff7e6" stroke="#e8cf9a"/><text x="540" y="246" fill="#5a3410">Sealed</text>
    <rect x="590" y="224" width="84" height="36" rx="7" fill="#fdf6ea" stroke="#efdcb4"/><text x="632" y="246" fill="#5a3410">Flushed</text>
  </g>
  <line x1="490" y1="242" x2="498" y2="242" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="582" y1="242" x2="590" y2="242" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="540" y="290" font-size="8" text-anchor="middle" fill="#2f6f4f">UpdateState 驱动状态转移</text>
  <text x="540" y="308" font-size="8" text-anchor="middle" fill="#2f6f4f">flush 后 growing → sealed/flushed</text>

  <!-- Step 3: SyncManager serialize -->
  <rect x="750" y="94" width="300" height="240" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <circle cx="770" cy="112" r="9" fill="#ffffff" stroke="#e8cf9a"/><text x="770" y="115" font-size="9" font-weight="700" text-anchor="middle" fill="#5a3410">3</text>
  <text x="900" y="116" font-size="10.5" font-weight="700" text-anchor="middle" fill="#5a3410">SyncManager 序列化</text>
  <text x="900" y="134" font-size="8" text-anchor="middle" fill="#93762e">growing_source.go · 列式 binlog(按列组)</text>
  <g font-size="8.5" text-anchor="middle">
    <rect x="766" y="148" width="268" height="40" rx="8" fill="#fef2e0" stroke="#e8cf9a"/><text x="900" y="172" fill="#5a3410">insert binlog(列式,按列组)</text>
    <rect x="766" y="194" width="268" height="40" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="900" y="218" fill="#5a3410">delta log(删除标记)</text>
    <rect x="766" y="240" width="268" height="40" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="900" y="264" fill="#5a3410">stats log(主键 min/max + bloom)</text>
  </g>
  <text x="900" y="306" font-size="8" text-anchor="middle" fill="#93762e">序列化 growing 段插入数据 → 对象存储</text>

  <!-- arrows between steps -->
  <line x1="330" y1="214" x2="390" y2="214" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="690" y1="214" x2="750" y2="214" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- object storage result band -->
  <rect x="30" y="352" width="1020" height="56" rx="14" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="46" y="376" font-size="11" font-weight="700" fill="#5a3410">flush 后:growing 段变 sealed/flushed,内存释放,数据在对象存储可被多 QueryNode 加载</text>
  <text x="46" y="396" font-size="8.8" fill="#93762e">存算分离——段落盘后计算节点无状态,挂了从对象存储重新加载;多副本 QueryNode 共享同一份 binlog</text>
  <line x1="900" y1="334" x2="900" y2="352" stroke="#86868b" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- insight -->
  <rect x="30" y="424" width="1020" height="76" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="448" font-size="10.5" font-weight="700" fill="#1d1d1f">要点</text>
  <text x="46" y="468" font-size="8.8" fill="#6e6e73">flush 是“内存 growing 段固化到对象存储”的动作:sync policy 决定何时、选哪段;metacache 跟踪段状态并 UpdateState 转态;SyncManager 落列式 binlog</text>
  <text x="46" y="486" font-size="8.8" fill="#6e6e73">调优:flush 策略(buffer 阈值)权衡内存与 binlog 碎片——攒批大省 binlog 数,攒批小降内存/延迟;太多小段增查询开销与 etcd 元数据压力,靠 compaction 合并</text>
</svg>
