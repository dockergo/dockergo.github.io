<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Milvus Compaction · 合段 + 应用删除（类比 LSM compaction）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">写入产生很多小段 + 删除只写 delta 标记 → 查询要读多段、叠加删除,慢;compaction 后台合小段成大段、物理应用删除,提查询性能、回收空间</text>

  <!-- mix compaction (top) -->
  <rect x="30" y="90" width="1020" height="180" rx="16" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="46" y="112" font-size="11.5" font-weight="700" fill="#12402a">mix compaction · 合并小段 + 应用删除</text>
  <text x="46" y="130" font-size="8" fill="#2f6f4f">internal/datanode/compactor/mix_compactor.go</text>

  <!-- input small segments -->
  <g font-size="8" text-anchor="middle">
    <rect x="46" y="146" width="80" height="42" rx="7" fill="#fff7e6" stroke="#e8cf9a"/><text x="86" y="164" fill="#5a3410" font-weight="600">小段 A</text><text x="86" y="179" fill="#93762e" font-size="7.5">binlog</text>
    <rect x="46" y="196" width="80" height="42" rx="7" fill="#fff7e6" stroke="#e8cf9a"/><text x="86" y="214" fill="#5a3410" font-weight="600">小段 B</text><text x="86" y="229" fill="#93762e" font-size="7.5">binlog</text>
    <rect x="140" y="171" width="80" height="42" rx="7" fill="#fbeaea" stroke="#e7c3c3"/><text x="180" y="189" fill="#4a1414" font-weight="600">delta log</text><text x="180" y="204" fill="#7a2a2a" font-size="7.5">删除标记</text>
  </g>
  <line x1="126" y1="167" x2="140" y2="184" stroke="#c7c7cc" stroke-width="1.1"/>
  <line x1="126" y1="217" x2="140" y2="200" stroke="#c7c7cc" stroke-width="1.1"/>

  <!-- EntityFilter -->
  <rect x="256" y="146" width="360" height="108" rx="10" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="436" y="167" font-size="9.5" font-weight="700" text-anchor="middle" fill="#12402a">EntityFilter（entity_filter.go）逐行判定</text>
  <g font-size="8.5">
    <rect x="270" y="178" width="332" height="30" rx="6" fill="#eafaf1" stroke="#bfe0cd"/><text x="282" y="197" fill="#12402a"><tspan font-weight="600">effectiveTs &lt; deleteTs</tspan> → 丢被删行</text>
    <rect x="270" y="212" width="332" height="30" rx="6" fill="#e6f7ee" stroke="#bfe0cd"/><text x="282" y="231" fill="#2f6f4f">strict <tspan font-weight="600">&lt;</tspan> 保留 insert_ts==delete_ts 的 upsert · 按 TTL 丢过期行</text>
  </g>

  <!-- output merged segment -->
  <rect x="656" y="160" width="150" height="80" rx="9" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="731" y="184" font-size="9.5" font-weight="700" text-anchor="middle" fill="#5a3410">大段(合并后)</text>
  <text x="731" y="204" font-size="8" text-anchor="middle" fill="#93762e">删除已物理应用</text>
  <text x="731" y="222" font-size="8" text-anchor="middle" fill="#93762e">空间回收</text>

  <!-- benefit note right -->
  <rect x="836" y="146" width="198" height="108" rx="9" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="935" y="168" font-size="8.5" font-weight="700" text-anchor="middle" fill="#12402a">收益</text>
  <text x="935" y="188" font-size="8" text-anchor="middle" fill="#2f6f4f">读一段替代读多段</text>
  <text x="935" y="206" font-size="8" text-anchor="middle" fill="#2f6f4f">无需查询时叠加删除</text>
  <text x="935" y="224" font-size="8" text-anchor="middle" fill="#2f6f4f">提查询性能 · 回收空间</text>

  <line x1="220" y1="192" x2="256" y2="200" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="616" y1="200" x2="656" y2="200" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="806" y1="200" x2="836" y2="200" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- L0 compaction (bottom left) -->
  <rect x="30" y="288" width="500" height="150" rx="16" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="46" y="310" font-size="11.5" font-weight="700" fill="#4a1414">L0（level-zero）compaction · 处理纯删除段</text>
  <text x="46" y="328" font-size="8" fill="#7a2a2a">l0_compactor.go</text>
  <g font-size="8.5" text-anchor="middle">
    <rect x="46" y="342" width="130" height="80" rx="8" fill="#fdeaea" stroke="#e7c3c3"/><text x="111" y="366" fill="#4a1414" font-weight="600">累积的删除数据</text><text x="111" y="384" fill="#7a2a2a">纯删除段(L0)</text><text x="111" y="404" fill="#7a2a2a" font-size="7.5">只含删除、无插入</text>
    <rect x="360" y="342" width="154" height="80" rx="8" fill="#fff" stroke="#e7c3c3"/><text x="437" y="366" fill="#4a1414" font-weight="600">按目标段拆分</text><text x="437" y="384" fill="#7a2a2a">写成 delta log</text><text x="437" y="404" fill="#7a2a2a" font-size="7.5">分派到对应段</text>
  </g>
  <line x1="176" y1="382" x2="360" y2="382" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="268" y="374" font-size="7.5" text-anchor="middle" fill="#a1a1a6">拆分</text>

  <!-- other strategies + LSM analogy (bottom right) -->
  <rect x="550" y="288" width="500" height="150" rx="16" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="566" y="310" font-size="11" font-weight="700" fill="#1d1d1f">其它策略 &amp; LSM 类比</text>
  <g font-size="8.5">
    <text x="566" y="332" fill="#6e6e73">其它 compaction 策略(compaction_policy_*.go):</text>
    <rect x="566" y="342" width="100" height="28" rx="6" fill="#ffffff" stroke="#ececf1"/><text x="616" y="360" text-anchor="middle" fill="#48484a">clustering</text>
    <rect x="676" y="342" width="80" height="28" rx="6" fill="#ffffff" stroke="#ececf1"/><text x="716" y="360" text-anchor="middle" fill="#48484a">sort</text>
    <rect x="766" y="342" width="80" height="28" rx="6" fill="#ffffff" stroke="#ececf1"/><text x="806" y="360" text-anchor="middle" fill="#48484a">single</text>
    <text x="566" y="392" font-size="8.5" fill="#6e6e73">类比 LSM 的 compaction:合小段成大段、把删除物理</text>
    <text x="566" y="410" font-size="8.5" fill="#6e6e73">应用掉,是写入吞吐与查询性能的平衡机制</text>
  </g>

  <!-- insight -->
  <rect x="30" y="454" width="1020" height="66" rx="12" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="478" font-size="10.5" font-weight="700" fill="#1b2a4a">为什么 compaction</text>
  <text x="46" y="498" font-size="8.8" fill="#5b7db1">误区:删除立即回收空间 —— 删除写 delta 标记,compaction 应用后才物理移除 · 误区:段越小越灵活 —— 太多小段增查询开销 + 撑大 etcd 元数据</text>
  <text x="46" y="515" font-size="8.8" fill="#5b7db1">调优:小段多 / 删除多时及时 compact 提查询性能;但 compaction 耗 IO/CPU —— 权衡触发频率</text>
</svg>
