<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Milvus 异步索引构建 · DataCoord inspector → knowhere</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">sealed/flushed 段的向量索引异步建;“导入后一段时间查询慢、之后变快”= 索引还在异步建。建好前暴力搜、建好走 knowhere 快路径</text>

  <!-- Step 1 DataCoord index inspector -->
  <rect x="30" y="94" width="300" height="220" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <circle cx="50" cy="112" r="9" fill="#ffffff" stroke="#bcd0ec"/><text x="50" y="115" font-size="9" font-weight="700" text-anchor="middle" fill="#1b2a4a">1</text>
  <text x="180" y="116" font-size="10.5" font-weight="700" text-anchor="middle" fill="#1b2a4a">DataCoord index inspector</text>
  <text x="180" y="134" font-size="8" text-anchor="middle" fill="#5b7db1">index_inspector.go · 循环触发</text>
  <g font-size="8.5" text-anchor="middle">
    <rect x="46" y="146" width="268" height="42" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="180" y="164" fill="#1b2a4a" font-weight="600">ticker + notify 驱动</text><text x="180" y="180" fill="#5b7db1" font-size="8">周期 + 事件双触发</text>
    <rect x="46" y="196" width="268" height="66" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="180" y="216" fill="#1b2a4a" font-weight="600">选段条件</text><text x="180" y="234" fill="#5b7db1" font-size="8">isFlush &amp;&amp; (无 sort compaction</text><text x="180" y="250" fill="#5b7db1" font-size="8">或 已排序)的段</text>
  </g>
  <text x="180" y="286" font-size="8" text-anchor="middle" fill="#5b7db1">只为已 flush 且已排序的段建索引</text>
  <text x="180" y="302" font-size="8" text-anchor="middle" fill="#5b7db1">分配 index/segment id</text>

  <!-- Step 2 broadcast + DataNode build -->
  <rect x="390" y="94" width="300" height="220" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <circle cx="410" cy="112" r="9" fill="#ffffff" stroke="#e8cf9a"/><text x="410" y="115" font-size="9" font-weight="700" text-anchor="middle" fill="#5a3410">2</text>
  <text x="540" y="116" font-size="10.5" font-weight="700" text-anchor="middle" fill="#5a3410">DataNode index 子系统</text>
  <text x="540" y="134" font-size="8" text-anchor="middle" fill="#93762e">index/task_index.go · 调 knowhere</text>
  <g font-size="8.5" text-anchor="middle">
    <rect x="406" y="146" width="268" height="42" rx="8" fill="#fef2e0" stroke="#e8cf9a"/><text x="540" y="164" fill="#5a3410" font-weight="600">广播 CreateIndexMessageV2</text><text x="540" y="180" fill="#93762e" font-size="8">DataCoord → DataNode</text>
    <rect x="406" y="196" width="268" height="42" rx="8" fill="#fef2e0" stroke="#e8cf9a"/><text x="540" y="216" fill="#5a3410" font-weight="600">调 knowhere 建向量索引</text><text x="540" y="232" fill="#93762e" font-size="8">HNSW / IVF / DiskANN …</text>
    <rect x="406" y="246" width="268" height="42" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="540" y="266" fill="#5a3410" font-weight="600">索引产物落对象存储</text><text x="540" y="282" fill="#93762e" font-size="8">供 QueryNode 加载</text>
  </g>

  <!-- Step 3 QueryNode ExistIndex -->
  <rect x="750" y="94" width="300" height="220" rx="14" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <circle cx="770" cy="112" r="9" fill="#ffffff" stroke="#cfe6d5"/><text x="770" y="115" font-size="9" font-weight="700" text-anchor="middle" fill="#12402a">3</text>
  <text x="900" y="116" font-size="10.5" font-weight="700" text-anchor="middle" fill="#12402a">QueryNode ExistIndex 判定</text>
  <text x="900" y="134" font-size="8" text-anchor="middle" fill="#2f6f4f">segment.go · ExistIndex(field)</text>
  <rect x="766" y="146" width="268" height="70" rx="8" fill="#fbeaea" stroke="#e7c3c3"/>
  <text x="900" y="168" font-size="8.5" text-anchor="middle" fill="#4a1414" font-weight="600">无索引 → 暴力搜</text>
  <text x="900" y="186" font-size="8" text-anchor="middle" fill="#7a2a2a">growing 段</text>
  <text x="900" y="202" font-size="8" text-anchor="middle" fill="#7a2a2a">+ 未建索引 sealed 段("search without indexes")</text>
  <rect x="766" y="224" width="268" height="66" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="900" y="246" font-size="8.5" text-anchor="middle" fill="#12402a" font-weight="600">有索引 → 走 knowhere</text>
  <text x="900" y="264" font-size="8" text-anchor="middle" fill="#2f6f4f">加载段 + 索引</text>
  <text x="900" y="280" font-size="8" text-anchor="middle" fill="#2f6f4f">ANN 快路径查询</text>

  <!-- arrows between steps -->
  <line x1="330" y1="204" x2="390" y2="204" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="360" y="197" font-size="7.5" text-anchor="middle" fill="#a1a1a6">广播</text>
  <line x1="690" y1="204" x2="750" y2="204" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="720" y="197" font-size="7.5" text-anchor="middle" fill="#a1a1a6">加载</text>

  <!-- timeline band -->
  <rect x="30" y="332" width="1020" height="66" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="356" font-size="10.5" font-weight="700" fill="#1d1d1f">时间线:异步 = 有窗口</text>
  <text x="46" y="376" font-size="8.8" fill="#6e6e73">flush 完成 → inspector 选中 → 广播建索引 → DataNode 调 knowhere 构建 → 产物落对象存储 → QueryNode 加载索引 → 查询走快路径</text>
  <text x="46" y="393" font-size="8.8" fill="#6e6e73">这段窗口内 sealed 段无索引,查询仍暴力搜(慢);索引就绪后才变快 —— 所以“导入后一段时间查询慢、之后变快”</text>

  <!-- insight -->
  <rect x="30" y="414" width="1020" height="86" rx="12" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="438" font-size="10.5" font-weight="700" fill="#1b2a4a">工程要点</text>
  <text x="46" y="458" font-size="8.8" fill="#5b7db1">误区:数据写入就有索引 —— growing 段无索引(暴力搜);要 flush 成 sealed + 异步建索引才走 knowhere</text>
  <text x="46" y="476" font-size="8.8" fill="#5b7db1">调优:导入后主动建索引,避免长期暴力搜;索引及时性直接影响查询延迟 · 索引算法交给 knowhere(见【向量索引与检索】)</text>
  <text x="46" y="494" font-size="8.8" fill="#5b7db1">归属:索引元(字段 / 路径 / 构建状态)存 etcd(见【元数据】);段由【写入路径】产出、按 ts 版本化(见【一致性与时间】)</text>
</svg>
