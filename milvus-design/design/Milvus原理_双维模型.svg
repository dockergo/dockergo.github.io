<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Milvus 双维模型 · 能力域 × 执行时机</text>
  <text x="30" y="50" font-size="11" fill="#a1a1a6">纵轴=能力域(接触面 + 支撑 6);横轴=执行时机(前台在线请求 vs 后台异步维护)</text>

  <!-- axis captions -->
  <text x="360" y="80" font-size="10.5" fill="#a1a1a6">执行时机 →</text>

  <!-- corner -->
  <rect x="30" y="92" width="120" height="36" rx="9" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="90" y="115" font-size="10.5" font-weight="600" fill="#6e6e73" text-anchor="middle">能力域 ↓</text>

  <!-- column headers -->
  <rect x="160" y="92" width="430" height="36" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="375" y="115" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">前台 · 在线请求路径(低延迟,用户等待)</text>
  <rect x="610" y="92" width="430" height="36" rx="10" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="825" y="115" font-size="12" font-weight="600" fill="#5a3410" text-anchor="middle">后台 · 异步维护(吞吐导向,不阻塞前台)</text>

  <!-- Row 1: 接触面 -->
  <rect x="30" y="140" width="120" height="108" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="90" y="188" font-size="12" font-weight="600" fill="#3d2a5a" text-anchor="middle">接触面</text>
  <text x="90" y="206" font-size="9" fill="#3d2a5a" text-anchor="middle">向量 CRUD</text>
  <text x="90" y="220" font-size="9" fill="#3d2a5a" text-anchor="middle">+ ANN 检索</text>

  <!-- (接触面,前台) chips -->
  <rect x="160" y="140" width="430" height="108" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <rect x="175" y="156" width="195" height="34" rx="9" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="272" y="177" font-size="10.5" font-weight="600" fill="#3d2a5a" text-anchor="middle">insert 请求</text>
  <rect x="382" y="156" width="195" height="34" rx="9" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="479" y="177" font-size="10.5" font-weight="600" fill="#3d2a5a" text-anchor="middle">search 请求</text>
  <rect x="175" y="198" width="195" height="34" rx="9" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="272" y="219" font-size="10.5" font-weight="600" fill="#3d2a5a" text-anchor="middle">ANN 检索</text>
  <rect x="382" y="198" width="195" height="34" rx="9" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="479" y="219" font-size="10.5" font-weight="600" fill="#3d2a5a" text-anchor="middle">标量过滤</text>

  <!-- (接触面,后台) -->
  <rect x="610" y="140" width="430" height="108" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="630" y="172" font-size="10.5" fill="#6e6e73">接触面能力域几乎只在前台</text>
  <text x="630" y="192" font-size="10.5" fill="#6e6e73">(用户可见的请求-响应闭环)</text>
  <text x="630" y="218" font-size="10.5" fill="#6e6e73">写入落盘、建索引等重活</text>
  <text x="630" y="236" font-size="10.5" fill="#6e6e73">交给右下角的后台能力域完成</text>

  <!-- Row 2: 支撑 -->
  <rect x="30" y="260" width="120" height="150" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="90" y="326" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">支撑侧</text>
  <text x="90" y="345" font-size="9" fill="#5b7db1" text-anchor="middle">6 能力域</text>
  <text x="90" y="359" font-size="9" fill="#5b7db1" text-anchor="middle">支撑前台</text>

  <!-- (支撑,前台) -->
  <rect x="160" y="260" width="430" height="150" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="180" y="288" font-size="11" font-weight="600" fill="#1d1d1f">支撑能力域 · 前台执行</text>
  <text x="180" y="316" font-size="10.5" fill="#3f3f45">search:QueryNode 各段并行 ANN</text>
  <text x="180" y="340" font-size="10.5" fill="#3f3f45">标量 bitset 预过滤(FilterBitsNode)</text>
  <text x="180" y="364" font-size="10.5" fill="#3f3f45">TSO 定序 · guaranteeTs 等 tSafe 追上</text>
  <text x="180" y="388" font-size="10.5" fill="#3f3f45">读一致快照后归并全局 topK</text>

  <!-- (支撑,后台) chips -->
  <rect x="610" y="260" width="430" height="150" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <rect x="625" y="278" width="195" height="38" rx="9" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="722" y="302" font-size="10.5" font-weight="600" fill="#5a3410" text-anchor="middle">flush growing→sealed</text>
  <rect x="832" y="278" width="195" height="38" rx="9" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="929" y="302" font-size="10.5" font-weight="600" fill="#5a3410" text-anchor="middle">compaction 合段应用删除</text>
  <rect x="625" y="326" width="195" height="38" rx="9" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="722" y="350" font-size="10.5" font-weight="600" fill="#5a3410" text-anchor="middle">异步建索引(knowhere)</text>
  <rect x="832" y="326" width="195" height="38" rx="9" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="929" y="350" font-size="10.5" font-weight="600" fill="#5a3410" text-anchor="middle">WAL 消费落 binlog</text>
  <text x="722" y="392" font-size="9.5" fill="#93762e" text-anchor="middle">异步、吞吐导向,不阻塞前台请求</text>

  <!-- footer: 7 capability domains -->
  <text x="30" y="450" font-size="11" font-weight="600" fill="#1d1d1f">七大能力域(能力域维度全景)</text>
  <rect x="30" y="462" width="138" height="42" rx="10" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="99" y="484" font-size="10.5" font-weight="600" fill="#3d2a5a" text-anchor="middle">接触面</text>
  <text x="99" y="498" font-size="8.5" fill="#3d2a5a" text-anchor="middle">CRUD+检索</text>
  <rect x="176" y="462" width="138" height="42" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="245" y="484" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">分布式架构</text>
  <text x="245" y="498" font-size="8.5" fill="#5b7db1" text-anchor="middle">存算分离</text>
  <rect x="322" y="462" width="138" height="42" rx="10" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="391" y="484" font-size="10.5" font-weight="600" fill="#12402a" text-anchor="middle">向量索引与检索</text>
  <text x="391" y="498" font-size="8.5" fill="#2f6f4f" text-anchor="middle">knowhere ANN</text>
  <rect x="468" y="462" width="138" height="42" rx="10" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="537" y="484" font-size="10.5" font-weight="600" fill="#5a3410" text-anchor="middle">写入路径</text>
  <text x="537" y="498" font-size="8.5" fill="#93762e" text-anchor="middle">streaming WAL</text>
  <rect x="614" y="462" width="138" height="42" rx="10" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="683" y="484" font-size="10.5" font-weight="600" fill="#5a3410" text-anchor="middle">段与生命周期</text>
  <text x="683" y="498" font-size="8.5" fill="#93762e" text-anchor="middle">growing/sealed</text>
  <rect x="760" y="462" width="138" height="42" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="829" y="484" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">一致性与时间</text>
  <text x="829" y="498" font-size="8.5" fill="#5b7db1" text-anchor="middle">TSO/guaranteeTs</text>
  <rect x="906" y="462" width="138" height="42" rx="10" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="975" y="484" font-size="10.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">元数据</text>
  <text x="975" y="498" font-size="8.5" fill="#6e6e73" text-anchor="middle">etcd</text>
</svg>
