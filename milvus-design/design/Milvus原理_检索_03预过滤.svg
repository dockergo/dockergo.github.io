<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Milvus 标量过滤 + 向量检索 · bitset 预过滤(pre-filter)</text>
  <text x="30" y="50" font-size="11" fill="#a1a1a6">SELECT ... WHERE age&gt;30 ORDER BY vector &lt;-&gt; query LIMIT 10 —— 过滤在 ANN 遍历内部生效,而非搜完再滤</text>

  <!-- top query -->
  <rect x="30" y="72" width="1020" height="40" rx="10" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="540" y="97" font-size="11" font-weight="600" fill="#3d2a5a" text-anchor="middle">查询:标量谓词 age&gt;30 + 向量最近邻 topK=10 + metric(L2/IP/COSINE)</text>

  <!-- Stage 1: FilterBitsNode -->
  <rect x="40" y="140" width="300" height="220" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="190" y="166" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">① FilterBitsNode 评估 expr</text>
  <text x="190" y="184" font-size="9" fill="#5b7db1" text-anchor="middle">FilterBitsNode.cpp · ExecPlanNodeVisitor.cpp:464</text>

  <text x="190" y="210" font-size="9.5" fill="#274a78" text-anchor="middle">对每行算标量谓词,输出位图列</text>

  <!-- bitset visual -->
  <rect x="70" y="226" width="240" height="46" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="90" y="245" font-size="9" fill="#274a78">bitset(bit=1 表示该行被过滤掉/排除)</text>
  <rect x="90" y="252" width="18" height="14" rx="2" fill="#fbeaea" stroke="#e7c3c3"/><text x="99" y="263" font-size="8" fill="#7a2a2a" text-anchor="middle">1</text>
  <rect x="112" y="252" width="18" height="14" rx="2" fill="#eafaf1" stroke="#bfe0cd"/><text x="121" y="263" font-size="8" fill="#12402a" text-anchor="middle">0</text>
  <rect x="134" y="252" width="18" height="14" rx="2" fill="#eafaf1" stroke="#bfe0cd"/><text x="143" y="263" font-size="8" fill="#12402a" text-anchor="middle">0</text>
  <rect x="156" y="252" width="18" height="14" rx="2" fill="#fbeaea" stroke="#e7c3c3"/><text x="165" y="263" font-size="8" fill="#7a2a2a" text-anchor="middle">1</text>
  <rect x="178" y="252" width="18" height="14" rx="2" fill="#eafaf1" stroke="#bfe0cd"/><text x="187" y="263" font-size="8" fill="#12402a" text-anchor="middle">0</text>
  <rect x="200" y="252" width="18" height="14" rx="2" fill="#fbeaea" stroke="#e7c3c3"/><text x="209" y="263" font-size="8" fill="#7a2a2a" text-anchor="middle">1</text>
  <rect x="222" y="252" width="18" height="14" rx="2" fill="#eafaf1" stroke="#bfe0cd"/><text x="231" y="263" font-size="8" fill="#12402a" text-anchor="middle">0</text>
  <rect x="244" y="252" width="18" height="14" rx="2" fill="#eafaf1" stroke="#bfe0cd"/><text x="253" y="263" font-size="8" fill="#12402a" text-anchor="middle">0</text>

  <text x="190" y="296" font-size="9" fill="#7a2a2a" text-anchor="middle">红 bit=1 排除 · 绿 bit=0 保留为候选</text>
  <text x="190" y="322" font-size="9" fill="#5b7db1" text-anchor="middle">优化器可 filter_only_ 先算 valid_count</text>
  <text x="190" y="340" font-size="9" fill="#5b7db1" text-anchor="middle">决定迭代式 or 一次性过滤</text>

  <!-- Stage 2: PhyVectorSearchNode -->
  <rect x="390" y="140" width="300" height="220" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="540" y="166" font-size="12" font-weight="600" fill="#12402a" text-anchor="middle">② PhyVectorSearchNode 转 BitsetView</text>
  <text x="540" y="184" font-size="9" fill="#2f6f4f" text-anchor="middle">VectorSearchNode.cpp:162</text>

  <text x="540" y="212" font-size="9.5" fill="#12402a" text-anchor="middle">上游 bitset → BitsetView</text>
  <text x="540" y="232" font-size="9.5" fill="#12402a" text-anchor="middle">交给 vector_search 传入 knowhere</text>

  <rect x="420" y="248" width="240" height="46" rx="8" fill="#fbeaea" stroke="#e7c3c3"/>
  <text x="540" y="270" font-size="10" font-weight="600" fill="#4a1414" text-anchor="middle">若 view.all()(全被过滤)</text>
  <text x="540" y="286" font-size="9" fill="#7a2a2a" text-anchor="middle">直接返空 · VectorSearchNode.cpp:165</text>

  <text x="540" y="318" font-size="9.5" fill="#2f6f4f" text-anchor="middle">bitset 一路穿到 knowhere Search</text>
  <text x="540" y="338" font-size="9.5" fill="#2f6f4f" text-anchor="middle">不是在结果上事后过滤</text>

  <!-- Stage 3: knowhere -->
  <rect x="740" y="140" width="300" height="220" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="890" y="166" font-size="12" font-weight="600" fill="#12402a" text-anchor="middle">③ knowhere index_.Search</text>
  <text x="890" y="184" font-size="9" fill="#2f6f4f" text-anchor="middle">index_.Search(dataset, conf, bitset, ...)</text>

  <text x="890" y="212" font-size="9.5" fill="#12402a" text-anchor="middle">ANN 遍历内部读 bitset</text>
  <text x="890" y="232" font-size="9.5" fill="#12402a" text-anchor="middle">bit=1 的行直接跳过</text>

  <rect x="770" y="248" width="240" height="46" rx="8" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="890" y="270" font-size="9.5" font-weight="600" fill="#12402a" text-anchor="middle">只在候选集(bit=0)里找最近邻</text>
  <text x="890" y="286" font-size="8.5" fill="#2f6f4f" text-anchor="middle">返回全局 topK,质量有保证</text>

  <text x="890" y="318" font-size="9.5" fill="#2f6f4f" text-anchor="middle">过滤与 ANN 融合成一次遍历</text>
  <text x="890" y="338" font-size="9.5" fill="#2f6f4f" text-anchor="middle">高选择性时收益最大</text>

  <!-- connectors -->
  <path d="M340,250 L390,250" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="365" y="242" font-size="8.5" fill="#a1a1a6" text-anchor="middle">bitset</text>
  <path d="M690,250 L740,250" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="715" y="242" font-size="8.5" fill="#a1a1a6" text-anchor="middle">BitsetView</text>

  <!-- compare pre vs post filter -->
  <rect x="40" y="392" width="500" height="120" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="60" y="416" font-size="11" font-weight="600" fill="#12402a">pre-filter(Milvus 采用)</text>
  <text x="60" y="440" font-size="9.5" fill="#2f6f4f">ANN 只在过滤后候选集里找 topK</text>
  <text x="60" y="460" font-size="9.5" fill="#2f6f4f">保证凑满 K 个且都满足谓词</text>
  <text x="60" y="482" font-size="9.5" fill="#12402a">topK 质量优 · 高选择性收益大</text>
  <text x="60" y="500" font-size="9" fill="#a1a1a6">过滤在遍历内生效,不浪费距离计算</text>

  <rect x="560" y="392" width="480" height="120" rx="13" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="580" y="416" font-size="11" font-weight="600" fill="#4a1414">post-filter(对比:先搜后滤)</text>
  <text x="580" y="440" font-size="9.5" fill="#7a2a2a">先搜出 topK,再过滤掉不满足谓词的</text>
  <text x="580" y="460" font-size="9.5" fill="#7a2a2a">过滤后可能剩不够 K 个</text>
  <text x="580" y="482" font-size="9.5" fill="#4a1414">topK 质量差 · 高选择性时几乎全被滤掉</text>
  <text x="580" y="500" font-size="9" fill="#a1a1a6">Milvus 不用此法 —— 常见误区</text>
</svg>
