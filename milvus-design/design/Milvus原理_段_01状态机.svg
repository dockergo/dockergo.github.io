<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Milvus 段状态机 · Growing → Sealed → Flushed → Indexed</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">数据以段(segment)为物理单位;段有生命周期,是“写入吞吐 vs 查询性能”的平衡机制。SegmentState: NotExist/Growing/Sealed/Flushed/Flushing/Dropped/Importing</text>

  <!-- State 1 Growing (green, mutable memory) -->
  <rect x="30" y="96" width="235" height="210" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="147" y="122" font-size="12" font-weight="700" text-anchor="middle" fill="#12402a">Growing</text>
  <text x="147" y="140" font-size="8" text-anchor="middle" fill="#2f6f4f">SegmentGrowingImpl</text>
  <g font-size="8.5" text-anchor="middle" fill="#2f6f4f">
    <text x="147" y="164">新写入落这里</text>
    <text x="147" y="184" fill="#12402a" font-weight="600">内存可变 · Insert 追加</text>
    <text x="147" y="204">无向量索引</text>
    <text x="147" y="224" fill="#12402a" font-weight="600">查询暴力搜</text>
  </g>
  <rect x="46" y="240" width="203" height="52" rx="8" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="147" y="260" font-size="8" text-anchor="middle" fill="#2f6f4f">DataCoord 按</text>
  <text x="147" y="276" font-size="8" text-anchor="middle" fill="#2f6f4f">(collection, partition, channel) 分配</text>

  <!-- State 2 Sealed (amber, immutable) -->
  <rect x="295" y="96" width="235" height="210" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="412" y="122" font-size="12" font-weight="700" text-anchor="middle" fill="#5a3410">Sealed</text>
  <text x="412" y="140" font-size="8" text-anchor="middle" fill="#93762e">ChunkedSegmentSealedImpl</text>
  <g font-size="8.5" text-anchor="middle" fill="#93762e">
    <text x="412" y="164">超 maxSize / idle 策略封</text>
    <text x="412" y="184" fill="#5a3410" font-weight="600">不可变 · load-only</text>
    <text x="412" y="204">LoadIndex / LoadSegmentMeta</text>
    <text x="412" y="224">新数据进新 growing 段</text>
  </g>
  <rect x="311" y="240" width="203" height="52" rx="8" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="412" y="260" font-size="8" text-anchor="middle" fill="#93762e">maxSize 默认 1024MB</text>
  <text x="412" y="276" font-size="8" text-anchor="middle" fill="#93762e">(磁盘索引 2048MB)</text>

  <!-- State 3 Flushed (amber variant, persisted) -->
  <rect x="560" y="96" width="235" height="210" rx="14" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="677" y="122" font-size="12" font-weight="700" text-anchor="middle" fill="#5a3410">Flushed</text>
  <text x="677" y="140" font-size="8" text-anchor="middle" fill="#93762e">bufferManager.SealSegments</text>
  <g font-size="8.5" text-anchor="middle" fill="#93762e">
    <text x="677" y="164">flush 成列式 binlog</text>
    <text x="677" y="184" fill="#5a3410" font-weight="600">落对象存储</text>
    <text x="677" y="204">内存释放</text>
    <text x="677" y="224">可被多 QueryNode 加载</text>
  </g>
  <rect x="576" y="240" width="203" height="52" rx="8" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="677" y="260" font-size="8" text-anchor="middle" fill="#93762e">binlog + delta log + stats log</text>
  <text x="677" y="276" font-size="8" text-anchor="middle" fill="#93762e">存算分离的共享持久层</text>

  <!-- State 4 Indexed (purple, query fast path) -->
  <rect x="825" y="96" width="225" height="210" rx="14" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="937" y="122" font-size="12" font-weight="700" text-anchor="middle" fill="#3d2a5a">Indexed</text>
  <text x="937" y="140" font-size="8" text-anchor="middle" fill="#7a5a95">DataNode index 子系统</text>
  <g font-size="8.5" text-anchor="middle" fill="#5a3d78">
    <text x="937" y="164">异步建 knowhere 索引</text>
    <text x="937" y="184" fill="#3d2a5a" font-weight="600">QueryNode 加载段 + 索引</text>
    <text x="937" y="204">查询走快路径</text>
    <text x="937" y="224">(建好前仍暴力搜)</text>
  </g>
  <rect x="841" y="240" width="193" height="52" rx="8" fill="#faf4fb" stroke="#e2d2ee"/>
  <text x="937" y="260" font-size="8" text-anchor="middle" fill="#5a3d78">“导入后一段时间查询慢、</text>
  <text x="937" y="276" font-size="8" text-anchor="middle" fill="#5a3d78">之后变快”= 索引在异步建</text>

  <!-- state transitions -->
  <line x1="265" y1="201" x2="295" y2="201" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="280" y="194" font-size="7.5" text-anchor="middle" fill="#a1a1a6">封</text>
  <line x1="530" y1="201" x2="560" y2="201" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="545" y="194" font-size="7.5" text-anchor="middle" fill="#a1a1a6">flush</text>
  <line x1="795" y1="201" x2="825" y2="201" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="810" y="194" font-size="7.5" text-anchor="middle" fill="#a1a1a6">建索引</text>

  <!-- axis annotation -->
  <rect x="30" y="330" width="1020" height="42" rx="11" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="147" y="356" font-size="8.5" text-anchor="middle" fill="#6e6e73">内存 · 可变 · 暴力搜</text>
  <text x="412" y="356" font-size="8.5" text-anchor="middle" fill="#6e6e73">不可变 · 封存</text>
  <text x="677" y="356" font-size="8.5" text-anchor="middle" fill="#6e6e73">持久化 · 对象存储</text>
  <text x="937" y="356" font-size="8.5" text-anchor="middle" fill="#6e6e73">快路径 · knowhere</text>
  <line x1="147" y1="306" x2="147" y2="330" stroke="#d2d2d7" stroke-width="1"/>
  <line x1="412" y1="306" x2="412" y2="330" stroke="#d2d2d7" stroke-width="1"/>
  <line x1="677" y1="306" x2="677" y2="330" stroke="#d2d2d7" stroke-width="1"/>
  <line x1="937" y1="306" x2="937" y2="330" stroke="#d2d2d7" stroke-width="1"/>

  <!-- insight -->
  <rect x="30" y="386" width="1020" height="96" rx="12" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="410" font-size="10.5" font-weight="700" fill="#1b2a4a">工程要点</text>
  <text x="46" y="430" font-size="8.8" fill="#5b7db1">误区:数据写入就有索引 —— growing 段无索引(暴力搜),要 flush 成 sealed + 异步建索引才走 knowhere 快路径</text>
  <text x="46" y="448" font-size="8.8" fill="#5b7db1">误区:sealed 段还能改 —— sealed 不可变(load-only),新数据进新 growing 段;删除写 delta 标记,compaction 应用后才物理移除</text>
  <text x="46" y="466" font-size="8.8" fill="#5b7db1">调优:segment.maxSize 大段查询高效但 flush/建索引久;删除后及时 compaction;导入后主动建索引避免长期暴力搜</text>
</svg>
