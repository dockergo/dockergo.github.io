<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Milvus 依赖矩阵 · 接触面操作 × 支撑能力域</text>
  <text x="30" y="50" font-size="11" fill="#a1a1a6">insert 与 search 各依赖哪些支撑能力域;实心=依赖,横线=不直接依赖</text>

  <!-- header row -->
  <rect x="30" y="80" width="130" height="60" rx="10" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="95" y="115" font-size="11" font-weight="600" fill="#6e6e73" text-anchor="middle">操作 \ 能力域</text>

  <rect x="160" y="80" width="150" height="60" rx="10" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="235" y="106" font-size="11" font-weight="600" fill="#5a3410" text-anchor="middle">写入路径</text>
  <text x="235" y="123" font-size="8.5" fill="#93762e" text-anchor="middle">streaming WAL</text>

  <rect x="310" y="80" width="150" height="60" rx="10" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="385" y="106" font-size="11" font-weight="600" fill="#5a3410" text-anchor="middle">段与生命周期</text>
  <text x="385" y="123" font-size="8.5" fill="#93762e" text-anchor="middle">growing / sealed</text>

  <rect x="460" y="80" width="150" height="60" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="535" y="106" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">一致性与时间</text>
  <text x="535" y="123" font-size="8.5" fill="#5b7db1" text-anchor="middle">TSO / guaranteeTs</text>

  <rect x="610" y="80" width="150" height="60" rx="10" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="685" y="106" font-size="11" font-weight="600" fill="#1d1d1f" text-anchor="middle">元数据</text>
  <text x="685" y="123" font-size="8.5" fill="#6e6e73" text-anchor="middle">etcd schema/段元</text>

  <rect x="760" y="80" width="150" height="60" rx="10" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="835" y="106" font-size="11" font-weight="600" fill="#12402a" text-anchor="middle">向量索引与检索</text>
  <text x="835" y="123" font-size="8.5" fill="#2f6f4f" text-anchor="middle">knowhere ANN</text>

  <rect x="910" y="80" width="150" height="60" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="985" y="106" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">分布式架构</text>
  <text x="985" y="123" font-size="8.5" fill="#5b7db1" text-anchor="middle">QueryNode 执行</text>

  <!-- row: insert -->
  <rect x="30" y="152" width="130" height="98" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="95" y="196" font-size="13" font-weight="600" fill="#3d2a5a" text-anchor="middle">insert</text>
  <text x="95" y="216" font-size="9" fill="#3d2a5a" text-anchor="middle">写入接触面</text>

  <rect x="160" y="152" width="150" height="98" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <circle cx="235" cy="182" r="6" fill="#93762e"/>
  <text x="235" y="212" font-size="10" font-weight="600" fill="#5a3410" text-anchor="middle">依赖</text>
  <text x="235" y="230" font-size="8.5" fill="#93762e" text-anchor="middle">写日志 AppendMessages</text>

  <rect x="310" y="152" width="150" height="98" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <circle cx="385" cy="182" r="6" fill="#93762e"/>
  <text x="385" y="212" font-size="10" font-weight="600" fill="#5a3410" text-anchor="middle">依赖</text>
  <text x="385" y="230" font-size="8.5" fill="#93762e" text-anchor="middle">写入 growing 段</text>

  <rect x="460" y="152" width="150" height="98" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <circle cx="535" cy="182" r="6" fill="#5b7db1"/>
  <text x="535" y="212" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">依赖</text>
  <text x="535" y="230" font-size="8.5" fill="#5b7db1" text-anchor="middle">TSO 全局定序</text>

  <rect x="610" y="152" width="150" height="98" rx="11" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <circle cx="685" cy="182" r="6" fill="#8e8e93"/>
  <text x="685" y="212" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">依赖</text>
  <text x="685" y="230" font-size="8.5" fill="#6e6e73" text-anchor="middle">查 schema 校验</text>

  <rect x="760" y="152" width="150" height="98" rx="11" fill="#fbfbfd" stroke="#ececf1"/>
  <text x="835" y="205" font-size="18" fill="#c7c7cc" text-anchor="middle">—</text>

  <rect x="910" y="152" width="150" height="98" rx="11" fill="#fbfbfd" stroke="#ececf1"/>
  <text x="985" y="205" font-size="18" fill="#c7c7cc" text-anchor="middle">—</text>

  <!-- row: search -->
  <rect x="30" y="262" width="130" height="98" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="95" y="306" font-size="13" font-weight="600" fill="#3d2a5a" text-anchor="middle">search</text>
  <text x="95" y="326" font-size="9" fill="#3d2a5a" text-anchor="middle">ANN 检索接触面</text>

  <rect x="160" y="262" width="150" height="98" rx="11" fill="#fbfbfd" stroke="#ececf1"/>
  <text x="235" y="315" font-size="18" fill="#c7c7cc" text-anchor="middle">—</text>

  <rect x="310" y="262" width="150" height="98" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <circle cx="385" cy="292" r="6" fill="#93762e"/>
  <text x="385" y="322" font-size="10" font-weight="600" fill="#5a3410" text-anchor="middle">依赖</text>
  <text x="385" y="340" font-size="8.5" fill="#93762e" text-anchor="middle">sealed 段 + 索引</text>

  <rect x="460" y="262" width="150" height="98" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <circle cx="535" cy="292" r="6" fill="#5b7db1"/>
  <text x="535" y="322" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">依赖</text>
  <text x="535" y="340" font-size="8.5" fill="#5b7db1" text-anchor="middle">guaranteeTs 等 tSafe</text>

  <rect x="610" y="262" width="150" height="98" rx="11" fill="#fbfbfd" stroke="#ececf1"/>
  <text x="685" y="315" font-size="18" fill="#c7c7cc" text-anchor="middle">—</text>

  <rect x="760" y="262" width="150" height="98" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <circle cx="835" cy="292" r="6" fill="#2f6f4f"/>
  <text x="835" y="322" font-size="10" font-weight="600" fill="#12402a" text-anchor="middle">依赖</text>
  <text x="835" y="340" font-size="8.5" fill="#2f6f4f" text-anchor="middle">knowhere ANN topK</text>

  <rect x="910" y="262" width="150" height="98" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <circle cx="985" cy="292" r="6" fill="#5b7db1"/>
  <text x="985" y="322" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">依赖</text>
  <text x="985" y="340" font-size="8.5" fill="#5b7db1" text-anchor="middle">QueryNode 各段并行</text>

  <!-- legend / summary -->
  <text x="30" y="400" font-size="11" font-weight="600" fill="#1d1d1f">读写依赖分野</text>
  <text x="30" y="422" font-size="10.5" fill="#3f3f45">insert = 写入路径 + 段生命周期(growing)+ 一致性(TSO 定序)+ 元数据 — 关注"把数据安全定序落进日志与内存段"</text>
  <text x="30" y="444" font-size="10.5" fill="#3f3f45">search = 向量索引(knowhere ANN)+ 段(sealed+索引)+ 一致性(guaranteeTs/tSafe 快照)+ 分布式架构(QueryNode)</text>
  <text x="30" y="466" font-size="10.5" fill="#a1a1a6">共用列:段与生命周期、一致性与时间 — 写建段/定序,读取段/等快照,时间戳是二者的公共纽带</text>
</svg>
