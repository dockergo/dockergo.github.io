<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Milvus 元数据内容与 MVCC · etcd 里存什么</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">catalog 操作带 ts,支持按时间戳快照读 schema / 元数据(与数据侧 guaranteeTs / tSafe 呼应)—— 向量数据在对象存储,不在 etcd</text>

  <!-- four content cards -->
  <!-- schema (blue) -->
  <rect x="30" y="92" width="248" height="176" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="114" font-size="10.5" font-weight="700" fill="#1b2a4a">collection / partition schema</text>
  <g font-size="8.5" fill="#5b7db1">
    <text x="46" y="138">字段定义(向量维度、标量类型)</text>
    <text x="46" y="160">ShardsNum(vchannel 数)</text>
    <text x="46" y="182">别名 alias</text>
  </g>
  <rect x="46" y="196" width="216" height="56" rx="8" fill="#e7f0fb" stroke="#b9d2ef"/>
  <text x="154" y="217" font-size="8" text-anchor="middle" fill="#1b2a4a" font-weight="600">DDL 的最终落点</text>
  <text x="154" y="234" font-size="7.5" text-anchor="middle" fill="#5b7db1">建表 / 建分区 / 建别名</text>
  <text x="154" y="248" font-size="7.5" text-anchor="middle" fill="#5b7db1">写元数据由【接触面】触发</text>

  <!-- segment info (amber) -->
  <rect x="290" y="92" width="248" height="176" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="306" y="114" font-size="10.5" font-weight="700" fill="#5a3410">段信息</text>
  <g font-size="8.5" fill="#93762e">
    <text x="306" y="138">状态(growing / sealed / flushed)</text>
    <text x="306" y="160">binlog 路径 · 行数</text>
    <text x="306" y="182">所属 (collection, partition, vchannel)</text>
  </g>
  <rect x="306" y="196" width="216" height="56" rx="8" fill="#fef2e0" stroke="#e8cf9a"/>
  <text x="414" y="217" font-size="8" text-anchor="middle" fill="#5a3410" font-weight="600">由【段与生命周期】更新</text>
  <text x="414" y="234" font-size="7.5" text-anchor="middle" fill="#93762e">段状态转移即写这里</text>
  <text x="414" y="248" font-size="7.5" text-anchor="middle" fill="#93762e">小段碎片过多会撑大 etcd</text>

  <!-- index meta (purple) -->
  <rect x="550" y="92" width="248" height="176" rx="14" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="566" y="114" font-size="10.5" font-weight="700" fill="#3d2a5a">索引元</text>
  <g font-size="8.5" fill="#5a3d78">
    <text x="566" y="138">哪些字段建了什么索引</text>
    <text x="566" y="160">索引文件路径</text>
    <text x="566" y="182">构建状态(建到哪)</text>
  </g>
  <rect x="566" y="196" width="216" height="56" rx="8" fill="#faf4fb" stroke="#e2d2ee"/>
  <text x="674" y="217" font-size="8" text-anchor="middle" fill="#3d2a5a" font-weight="600">异步建索引的进度记这里</text>
  <text x="674" y="234" font-size="7.5" text-anchor="middle" fill="#5a3d78">QueryNode 据此判断走</text>
  <text x="674" y="248" font-size="7.5" text-anchor="middle" fill="#5a3d78">knowhere 还是暴力搜</text>

  <!-- ID/TSO watermark (green) -->
  <rect x="810" y="92" width="240" height="176" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="826" y="114" font-size="10.5" font-weight="700" fill="#12402a">ID / TSO 水位</text>
  <g font-size="8.5" fill="#2f6f4f">
    <text x="826" y="138">ID 分配器水位</text>
    <text x="826" y="160">TSO 用独立 KV path</text>
    <text x="826" y="182">(同后端)持久化</text>
  </g>
  <rect x="826" y="196" width="208" height="56" rx="8" fill="#e6f7ee" stroke="#bfe0cd"/>
  <text x="930" y="217" font-size="8" text-anchor="middle" fill="#12402a" font-weight="600">服务【一致性与时间】</text>
  <text x="930" y="234" font-size="7.5" text-anchor="middle" fill="#2f6f4f">TSO 每 3s 持久化到此</text>
  <text x="930" y="248" font-size="7.5" text-anchor="middle" fill="#2f6f4f">重启从 saved-time 恢复</text>

  <!-- MVCC band -->
  <rect x="30" y="288" width="1020" height="80" rx="14" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="46" y="312" font-size="11" font-weight="700" fill="#12402a">元数据 MVCC · catalog 操作带 ts（kv_catalog.go）</text>
  <text x="46" y="332" font-size="8.8" fill="#2f6f4f">每个 collection / partition 操作带 ts;读也带 ts(如 GetDatabaseByName(..., MaxTimestamp))—— 支持按时间戳快照读 schema / 元数据</text>
  <text x="46" y="350" font-size="8.8" fill="#2f6f4f">与数据侧的 guaranteeTs / tSafe 呼应:元数据也有版本,可读某时刻的 schema 快照(全局时间戳横切数据与元数据)</text>

  <!-- criticality warning (red) -->
  <rect x="30" y="384" width="1020" height="116" rx="12" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="46" y="408" font-size="10.5" font-weight="700" fill="#4a1414">丢 etcd 致命 · 元数据是系统真相</text>
  <text x="46" y="428" font-size="8.8" fill="#7a2a2a">误区:丢对象存储才丢数据 —— 丢 etcd 元数据同样致命:对象存储里的 binlog 没有元数据索引就是一堆无结构文件(不知哪个段属哪 collection、schema 是什么)</text>
  <text x="46" y="446" font-size="8.8" fill="#7a2a2a">误区:向量数据存 etcd —— 不。etcd 只存元数据(小而关键);向量数据在对象存储 · 误区:元数据无版本 —— catalog 操作带 ts,支持 MVCC 快照读</text>
  <text x="46" y="464" font-size="8.8" fill="#7a2a2a">误区:段太多没关系 —— 段元数据都在 etcd,小段碎片过多撑大 etcd + 增协调开销;及时 compaction 合段</text>
  <text x="46" y="484" font-size="8.8" fill="#7a2a2a">要点:etcd 须定期备份;协调器读元数据做调度(见【分布式架构】);catalog 结构化 key + MultiSaveAndRemove 原子事务保证一致</text>
</svg>
