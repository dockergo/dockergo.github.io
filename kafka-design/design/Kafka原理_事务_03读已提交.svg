<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Kafka 事务 · read_committed（消费端只读已提交）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">isolation.level=read_committed 只读已 commit;Broker 维护每分区 LSO;消费者只读到 LSO、跳过 aborted(.txnindex 记区间)</text>

  <!-- partition log with LSO visualization -->
  <rect x="30" y="72" width="1020" height="128" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="46" y="96" font-size="11" font-weight="700" fill="#5a3410">分区日志 · LSO（last stable offset）划界</text>

  <!-- log cells -->
  <g font-size="8.4" text-anchor="middle">
    <rect x="46" y="112" width="120" height="40" rx="6" fill="#eafaf1" stroke="#bfe0cd"/><text x="106" y="136" fill="#12402a">committed</text>
    <rect x="170" y="112" width="120" height="40" rx="6" fill="#fbeaea" stroke="#e7c3c3"/><text x="230" y="136" fill="#4a1414">aborted(跳过)</text>
    <rect x="294" y="112" width="120" height="40" rx="6" fill="#eafaf1" stroke="#bfe0cd"/><text x="354" y="136" fill="#12402a">committed</text>
    <rect x="418" y="112" width="120" height="40" rx="6" fill="#eafaf1" stroke="#bfe0cd"/><text x="478" y="136" fill="#12402a">committed</text>
    <rect x="542" y="112" width="150" height="40" rx="6" fill="#fdf6ea" stroke="#efdcb4" stroke-dasharray="4 3"/><text x="617" y="131" fill="#93762e">进行中事务</text><text x="617" y="145" fill="#93762e">(未确定)</text>
    <rect x="696" y="112" width="150" height="40" rx="6" fill="#fdf6ea" stroke="#efdcb4" stroke-dasharray="4 3"/><text x="771" y="131" fill="#93762e">进行中事务</text><text x="771" y="145" fill="#93762e">(未确定)</text>
    <rect x="850" y="112" width="184" height="40" rx="6" fill="#f7f7f9" stroke="#ececf1"/><text x="942" y="131" fill="#6e6e73">HW(高水位)</text><text x="942" y="145" fill="#a1a1a6">已复制到 ISR</text>
  </g>
  <!-- LSO marker -->
  <line x1="542" y1="104" x2="542" y2="176" stroke="#4a1414" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="542" y="192" font-size="9" font-weight="700" fill="#4a1414" text-anchor="middle">LSO ← read_committed 读到此为止</text>
  <text x="290" y="170" font-size="8.4" fill="#2f6f4f" text-anchor="middle">read_committed 可见区(≤ LSO,跳过 aborted)</text>

  <!-- how it works -->
  <rect x="30" y="216" width="500" height="150" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="46" y="240" font-size="11" font-weight="700" fill="#12402a">机制 · LSO + abort marker + .txnindex</text>
  <rect x="46" y="252" width="468" height="34" rx="8" fill="#e6f7ee" stroke="#bfe0cd"/>
  <text x="60" y="273" font-size="8.8" fill="#12402a">Broker 维护每分区 LSO = 最后一个已确定 commit/abort 的位置</text>
  <rect x="46" y="292" width="468" height="34" rx="8" fill="#e6f7ee" stroke="#bfe0cd"/>
  <text x="60" y="313" font-size="8.8" fill="#12402a">read_committed 消费者只读到 LSO,不读"进行中事务"消息</text>
  <rect x="46" y="332" width="468" height="26" rx="8" fill="#e6f7ee" stroke="#bfe0cd"/>
  <text x="60" y="349" font-size="8.8" fill="#12402a">.txnindex 记录 aborted 事务的 offset 区间 → 消费者跳过</text>

  <!-- isolation levels compare -->
  <rect x="550" y="216" width="500" height="150" rx="14" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="566" y="240" font-size="11" font-weight="700" fill="#274a78">isolation.level 两档</text>
  <rect x="566" y="252" width="468" height="48" rx="9" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="580" y="272" font-size="9.4" font-weight="600" fill="#1b2a4a">read_committed（EOS 用）</text>
  <text x="580" y="290" font-size="8.4" fill="#5b7db1">只读已 commit,跳过 aborted;读到 LSO 为止(原子可见的代价)</text>
  <rect x="566" y="308" width="468" height="48" rx="9" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="580" y="328" font-size="9.4" font-weight="600" fill="#48484a">read_uncommitted（默认）</text>
  <text x="580" y="346" font-size="8.4" fill="#6e6e73">读所有消息(含未提交);读到 HW,不受 LSO 约束</text>

  <!-- end-to-end EOS -->
  <rect x="30" y="382" width="1020" height="72" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="540" y="406" font-size="11" font-weight="700" fill="#12402a" text-anchor="middle">配合幂等 + 事务 = 消费-处理-生产的端到端精确一次 EOS</text>
  <text x="540" y="428" font-size="8.8" fill="#2f6f4f" text-anchor="middle">读入位点提交与结果输出在同一事务里原子完成 —— 这是 Kafka Streams / Flink EOS 的基础</text>
  <text x="540" y="446" font-size="8.6" fill="#2f6f4f" text-anchor="middle">幂等(单分区不重不乱) + 事务(跨分区原子) + read_committed(只读已提交) 三者叠加</text>

  <text x="30" y="480" font-size="8.8" fill="#a1a1a6">误区:read_committed 读不到最新 —— 只读到 LSO(已确定 commit/abort),进行中事务消息暂不可见,这是原子可见的必要代价</text>
</svg>
