<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="800" viewBox="0 0 1080 800" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="800" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Kafka 核心原理 · 总架构图（位置即语义）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">分布式事件流平台:生产者追加分区日志,副本 ISR 复制保容错,消费者按位点顺序读,KRaft 共识管元数据(替代 ZooKeeper)</text>

  <!-- clients -->
  <rect x="30" y="64" width="1020" height="56" rx="13" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="46" y="84" font-size="11" font-weight="700" fill="#5a3d78">生产/消费 API 接触面</text>
  <g text-anchor="middle" font-size="8.8">
    <rect x="46" y="92" width="490" height="24" rx="7" fill="#faf4fb" stroke="#e2d2ee"/><text x="291" y="108" fill="#5a3d78">Producer:send 攒批(RecordAccumulator)→ 按分区发,acks 定确认</text>
    <rect x="546" y="92" width="488" height="24" rx="7" fill="#faf4fb" stroke="#e2d2ee"/><text x="790" y="108" fill="#5a3d78">Consumer:poll/fetch 顺序读 → 提交位点(KIP-848 组协调)</text>
  </g>

  <!-- broker cluster -->
  <rect x="30" y="134" width="700" height="380" rx="16" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="46" y="156" font-size="12" font-weight="700" fill="#5a3410">Broker 集群（数据面 · process.roles=broker）</text>

  <!-- network layer -->
  <rect x="46" y="168" width="668" height="66" rx="10" fill="#fef2e0" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="60" y="188" font-size="9.5" font-weight="600" fill="#5a3410">网络与请求处理(Reactor + Purgatory)</text>
  <g text-anchor="middle" font-size="8">
    <rect x="60" y="198" width="200" height="28" rx="6" fill="#fff" stroke="#e8cf9a"/><text x="160" y="216" fill="#5a3410">Acceptor/Processor(收发)</text>
    <rect x="270" y="198" width="200" height="28" rx="6" fill="#fff" stroke="#e8cf9a"/><text x="370" y="216" fill="#5a3410">KafkaApis 分派</text>
    <rect x="480" y="198" width="220" height="28" rx="6" fill="#fff" stroke="#e8cf9a"/><text x="590" y="216" fill="#5a3410">Purgatory 延迟操作(等 ISR/数据)</text>
  </g>

  <!-- partition log + replication -->
  <rect x="46" y="244" width="668" height="150" rx="10" fill="#fef2e0" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="60" y="264" font-size="9.5" font-weight="600" fill="#5a3410">日志存储 + 副本与 ISR</text>
  <g text-anchor="middle" font-size="8">
    <rect x="60" y="274" width="315" height="110" rx="8" fill="#fff" stroke="#e8cf9a"/><text x="217" y="292" font-weight="600" fill="#5a3410">Partition Leader(UnifiedLog)</text><text x="217" y="308" fill="#93762e">追加 active LogSegment</text><rect x="74" y="316" width="287" height="18" rx="4" fill="#fdf6ea"/><text x="217" y="329" fill="#93762e">.log + .index + .timeindex(稀疏)</text><rect x="74" y="338" width="287" height="18" rx="4" fill="#fdf6ea"/><text x="217" y="351" fill="#93762e">retention 删除 / compaction 压缩</text><text x="217" y="374" fill="#93762e">零拷贝 sendfile 给消费者</text>
    <rect x="385" y="274" width="315" height="110" rx="8" fill="#fff" stroke="#e8cf9a"/><text x="542" y="292" font-weight="600" fill="#5a3410">Follower 副本(ISR)</text><text x="542" y="308" fill="#93762e">pull 复制 Leader 日志</text><rect x="399" y="316" width="287" height="18" rx="4" fill="#fdf6ea"/><text x="542" y="329" fill="#93762e">ISR=跟上的副本集</text><rect x="399" y="338" width="287" height="18" rx="4" fill="#fdf6ea"/><text x="542" y="351" fill="#93762e">HW=ISR 最小 LEO(可见边界)</text><text x="542" y="374" fill="#93762e">acks=all + min.insync 保不丢</text>
  </g>
  <line x1="375" y1="330" x2="385" y2="330" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- coordinators -->
  <rect x="46" y="404" width="668" height="98" rx="10" fill="#e6f7ee" stroke="#bfe0cd"/>
  <text x="60" y="424" font-size="9.5" font-weight="600" fill="#12402a">协调器(在 Broker 上)</text>
  <g text-anchor="middle" font-size="8">
    <rect x="60" y="434" width="320" height="58" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="220" y="454" font-weight="600" fill="#12402a">消费者组协调器 GroupCoordinator</text><text x="220" y="470" fill="#2f6f4f">rebalance(KIP-848 服务端分配)</text><text x="220" y="484" fill="#2f6f4f">位点存 __consumer_offsets</text>
    <rect x="390" y="434" width="310" height="58" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="545" y="454" font-weight="600" fill="#12402a">事务协调器 TransactionCoordinator</text><text x="545" y="470" fill="#2f6f4f">PID/epoch · commit/abort 标记</text><text x="545" y="484" fill="#2f6f4f">幂等 + 事务 = EOS</text>
  </g>

  <!-- KRaft controller quorum -->
  <rect x="746" y="134" width="304" height="380" rx="16" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="762" y="156" font-size="12" font-weight="700" fill="#1b2a4a">KRaft 控制器 quorum</text>
  <text x="762" y="174" font-size="8.3" fill="#5b7db1">(元数据面 · process.roles=controller)</text>
  <rect x="762" y="184" width="272" height="90" rx="9" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="898" y="206" font-size="9.5" font-weight="600" text-anchor="middle" fill="#274a78">QuorumController</text>
  <text x="776" y="226" font-size="8" fill="#5b7db1">单线程事件队列处理元数据变更</text>
  <text x="776" y="242" font-size="8" fill="#5b7db1">prepareAppend→replay→复制</text>
  <text x="776" y="260" font-size="8" fill="#5b7db1">metadata/controller/QuorumController</text>
  <rect x="762" y="284" width="272" height="80" rx="9" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="898" y="306" font-size="9.5" font-weight="600" text-anchor="middle" fill="#274a78">KafkaRaftClient(Raft 共识)</text>
  <text x="776" y="326" font-size="8" fill="#5b7db1">选主 + 多数派提交</text>
  <text x="776" y="344" font-size="8" fill="#5b7db1">元数据日志 = __cluster_metadata</text>
  <text x="776" y="358" font-size="8" fill="#5b7db1">(单分区,与数据日志同构)</text>
  <rect x="762" y="374" width="272" height="128" rx="9" fill="#e7f0fb" stroke="#b9d2ef"/>
  <text x="898" y="396" font-size="9.5" font-weight="600" text-anchor="middle" fill="#1b2a4a">元数据传播</text>
  <text x="776" y="416" font-size="8" fill="#5b7db1">MetadataLoader(Raft Listener)</text>
  <text x="776" y="432" font-size="8" fill="#5b7db1">→ 不可变 MetadataImage</text>
  <text x="776" y="448" font-size="8" fill="#5b7db1">→ 扇出各 Broker</text>
  <text x="776" y="468" font-size="8" fill="#5b7db1">Broker: KRaftMetadataCache</text>
  <text x="776" y="484" font-size="8" fill="#5b7db1">setImage 无锁应用</text>

  <line x1="746" y1="330" x2="714" y2="330" stroke="#c9b6de" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#ar)"/>
  <text x="620" y="324" font-size="7.5" fill="#7a5a95">元数据下发</text>

  <!-- flow arrows client->broker -->
  <line x1="291" y1="120" x2="291" y2="134" stroke="#86868b" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="600" y1="120" x2="600" y2="134" stroke="#86868b" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- semantics + pervasive -->
  <rect x="30" y="526" width="1020" height="56" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="548" font-size="11" font-weight="700" fill="#1d1d1f">位置即语义</text>
  <text x="46" y="568" font-size="8.8" fill="#6e6e73">上=生产/消费 API;左大块=Broker 数据面(网络→日志+副本→协调器);右=KRaft 元数据面(控制器 quorum + 传播)。数据面与元数据面职责分离。</text>

  <rect x="30" y="594" width="1020" height="46" rx="12" fill="#f0f0f4" stroke="#d2d2d7"/>
  <text x="540" y="621" font-size="10" font-weight="700" text-anchor="middle" fill="#48484a">贯穿层 · offset(位点)+ HW(高水位) —— offset 是日志地址,HW 是已复制到 ISR 的可见边界,横切存储/复制/消费</text>

  <!-- three declarations -->
  <rect x="30" y="652" width="1020" height="120" rx="13" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="46" y="674" font-size="11" font-weight="700" fill="#12402a">三条贯穿声明</text>
  <text x="46" y="696" font-size="9" fill="#2f6f4f">① 一切是分区的追加日志:无随机写、无 update-in-place;顺序写 + 页缓存 + 零拷贝是高吞吐根基</text>
  <text x="46" y="716" font-size="9" fill="#2f6f4f">② 容错靠副本 ISR:Leader/Follower 复制,HW + acks=all + min.insync.replicas 定义"写成功且不丢",非共享存储</text>
  <text x="46" y="736" font-size="9" fill="#2f6f4f">③ KRaft 用共识管元数据(4.x 立身之本):ZooKeeper 已移除,元数据本身是一条 Raft 复制的事件日志</text>
  <text x="46" y="758" font-size="8.5" fill="#b1483a">· 与数据库不同:无查询优化/事务表;与 KV 不同:无随机读写。它是"把日志做到极致"的流平台。</text>
</svg>
