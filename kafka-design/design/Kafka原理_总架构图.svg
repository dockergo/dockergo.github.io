<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="800" viewBox="0 0 1080 800"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#1d1d1f" flood-opacity="0.06"/></filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="ar-hot" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#0a84ff"/></marker>
    <marker id="ar-ctrl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#a78bfa"/></marker>
    <marker id="ar-state" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#1aa89a"/></marker>
    <marker id="ar-fail" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#e0742a"/></marker>
  </defs>

  <rect width="1080" height="800" fill="#fbfbfd"/>

  <rect x="24" y="8" width="1032" height="56" rx="10" fill="none" data-tid="overallarch" data-lab="全景框架"/>
  <text x="30" y="32" font-size="16" font-weight="700" fill="#1d1d1f">Kafka · 分布式提交日志剖面 <tspan font-size="11" font-weight="500" fill="#86868b">数据面 broker + 元数据面 KRaft</tspan></text>
  <text x="30" y="54" font-size="11" fill="#6e6e73">设计张力：顺序日志的<tspan font-weight="600" fill="#1d1d1f">简单高吞吐</tspan> vs 副本/消费组的<tspan font-weight="600" fill="#1d1d1f">一致性协调</tspan> —— 分区内严格有序 + ISR 复制 + KRaft 共识管元数据</text>

  <!-- ① 生产/消费 API 接触面 -->
  <rect x="30" y="66" width="1020" height="58" rx="11" fill="#f5f5f7" stroke="#d8d8dc" filter="url(#soft)" data-tid="api" data-lab="生产/消费 API"/>
  <text x="46" y="86" font-size="11" font-weight="600" fill="#1d1d1f">① 生产 / 消费 API 接触面</text>
  <rect x="46" y="94" width="492" height="24" rx="7" fill="#fbfbfd" stroke="#d8d8dc"/><text x="292" y="110" font-size="8.8" fill="#6e6e73" text-anchor="middle">Producer:send 攒批(RecordAccumulator)→ 按分区发 · acks 定确认</text>
  <rect x="548" y="94" width="486" height="24" rx="7" fill="#fbfbfd" stroke="#d8d8dc"/><text x="791" y="110" font-size="8.8" fill="#6e6e73" text-anchor="middle">Consumer:poll/fetch 顺序读 → 提交位点(KIP-848 组协调)</text>

  <!-- ② Broker 集群(数据面) -->
  <rect x="30" y="140" width="700" height="380" rx="16" fill="#f7f8fa" stroke="#dfe2e8"/>
  <text x="46" y="163" font-size="12" font-weight="700" fill="#1d1d1f">② Broker 集群 · 数据面 <tspan font-size="8.5" fill="#a1a1a6">process.roles=broker</tspan></text>

  <rect x="46" y="174" width="668" height="64" rx="10" fill="#f5f5f7" stroke="#d8d8dc" filter="url(#soft)" data-tid="net" data-lab="网络与请求处理"/>
  <text x="60" y="193" font-size="9.8" font-weight="600" fill="#1d1d1f">网络与请求处理 · Reactor + Purgatory</text>
  <g text-anchor="middle" font-size="8">
    <rect x="60" y="202" width="200" height="28" rx="6" fill="#fbfbfd" stroke="#d8d8dc"/><text x="160" y="219" fill="#6e6e73">Acceptor / Processor 收发</text>
    <rect x="270" y="202" width="200" height="28" rx="6" fill="#fbfbfd" stroke="#d8d8dc"/><text x="370" y="219" fill="#6e6e73">KafkaApis 分派</text>
    <rect x="480" y="202" width="220" height="28" rx="6" fill="#fbfbfd" stroke="#d8d8dc"/><text x="590" y="219" fill="#6e6e73">Purgatory 延迟操作(等 ISR/数据)</text>
  </g>

  <rect x="46" y="248" width="668" height="152" rx="10" fill="#f5f5f7" stroke="#d8d8dc" filter="url(#soft)"/>
  <text x="60" y="267" font-size="9.8" font-weight="600" fill="#1d1d1f">日志存储 + 副本与 ISR <tspan font-size="8" fill="#1aa89a">State</tspan></text>
  <rect x="60" y="276" width="316" height="116" rx="8" fill="#fbfbfd" stroke="#d8d8dc" data-tid="log" data-lab="日志存储 · Partition Leader"/>
  <text x="218" y="296" font-size="9" font-weight="600" fill="#1d1d1f" text-anchor="middle">Partition Leader · UnifiedLog</text>
  <text x="218" y="313" font-size="8" fill="#6e6e73" text-anchor="middle">append active LogSegment(顺序写)</text>
  <text x="218" y="330" font-size="8" fill="#6e6e73" text-anchor="middle">.log + .index + .timeindex(稀疏)</text>
  <text x="218" y="347" font-size="8" fill="#6e6e73" text-anchor="middle">retention 删除 / compaction 压缩</text>
  <text x="218" y="368" font-size="8" fill="#8a8a90" text-anchor="middle">零拷贝 sendfile 给消费者(Opt)</text>
  <text x="218" y="384" font-size="7.5" fill="#a1a1a6" text-anchor="middle">UnifiedLog.scala</text>
  <rect x="386" y="276" width="316" height="116" rx="8" fill="#fbfbfd" stroke="#d8d8dc" data-tid="repl" data-lab="副本与 ISR · Follower"/>
  <text x="544" y="296" font-size="9" font-weight="600" fill="#1d1d1f" text-anchor="middle">Follower 副本 · ISR</text>
  <text x="544" y="313" font-size="8" fill="#6e6e73" text-anchor="middle">pull 复制 Leader 日志</text>
  <text x="544" y="330" font-size="8" fill="#6e6e73" text-anchor="middle">ISR = 跟上的副本集</text>
  <text x="544" y="347" font-size="8" fill="#6e6e73" text-anchor="middle">HW = ISR 最小 LEO(可见边界)</text>
  <text x="544" y="368" font-size="8" fill="#6e6e73" text-anchor="middle">acks=all + min.insync 保不丢</text>
  <text x="544" y="384" font-size="7.5" fill="#e0742a" text-anchor="middle">ISR 收缩→unclean 选举风险(Fail)</text>
  <line x1="376" y1="334" x2="386" y2="334" stroke="#1aa89a" stroke-width="1.5" marker-end="url(#ar-state)"/>

  <rect x="46" y="410" width="668" height="98" rx="10" fill="#f5f5f7" stroke="#d8d8dc" filter="url(#soft)"/>
  <text x="60" y="429" font-size="9.8" font-weight="600" fill="#1d1d1f">协调器(在 Broker 上) <tspan font-size="8" fill="#a78bfa">Control</tspan></text>
  <rect x="60" y="438" width="320" height="60" rx="8" fill="#fbfbfd" stroke="#d8d8dc" data-tid="group" data-lab="消费者组协调器"/>
  <text x="220" y="458" font-size="8.8" font-weight="600" fill="#1d1d1f" text-anchor="middle">GroupCoordinator 消费者组</text>
  <text x="220" y="474" font-size="8" fill="#6e6e73" text-anchor="middle">rebalance(KIP-848 服务端分配)</text>
  <text x="220" y="490" font-size="8" fill="#6e6e73" text-anchor="middle">位点存 __consumer_offsets</text>
  <rect x="390" y="438" width="312" height="60" rx="8" fill="#fbfbfd" stroke="#d8d8dc" data-tid="txn" data-lab="事务协调器"/>
  <text x="546" y="458" font-size="8.8" font-weight="600" fill="#1d1d1f" text-anchor="middle">TransactionCoordinator 事务</text>
  <text x="546" y="474" font-size="8" fill="#6e6e73" text-anchor="middle">PID/epoch · commit/abort 标记</text>
  <text x="546" y="490" font-size="8" fill="#6e6e73" text-anchor="middle">幂等 + 事务 = EOS 恰好一次</text>

  <!-- ③ KRaft 控制器 quorum(元数据面) -->
  <rect x="746" y="140" width="304" height="380" rx="16" fill="#f7f8fa" stroke="#c9b8ec"/>
  <text x="762" y="163" font-size="12" font-weight="700" fill="#7c5cd6">③ KRaft 控制器 quorum</text>
  <text x="762" y="180" font-size="8.3" fill="#9a86c9">元数据面 · process.roles=controller · Control</text>
  <rect x="762" y="190" width="272" height="88" rx="9" fill="#fbfbfd" stroke="#d8d8dc" data-tid="kraft" data-lab="QuorumController"/>
  <text x="898" y="211" font-size="9.5" font-weight="600" text-anchor="middle" fill="#1d1d1f">QuorumController</text>
  <text x="776" y="230" font-size="8" fill="#6e6e73">单线程事件队列处理元数据变更</text>
  <text x="776" y="246" font-size="8" fill="#6e6e73">prepareAppend → replay → 复制</text>
  <text x="776" y="264" font-size="7.5" fill="#a1a1a6">metadata/controller/QuorumController</text>
  <rect x="762" y="286" width="272" height="80" rx="9" fill="#fbfbfd" stroke="#d8d8dc" data-tid="kraft" data-lab="KafkaRaftClient 共识"/>
  <text x="898" y="307" font-size="9.5" font-weight="600" text-anchor="middle" fill="#1d1d1f">KafkaRaftClient · Raft 共识</text>
  <text x="776" y="326" font-size="8" fill="#6e6e73">选主 + 多数派提交</text>
  <text x="776" y="342" font-size="8" fill="#6e6e73">元数据日志 = __cluster_metadata</text>
  <text x="776" y="358" font-size="8" fill="#a1a1a6">单分区,与数据日志同构</text>
  <rect x="762" y="374" width="272" height="130" rx="9" fill="#fbfbfd" stroke="#d8d8dc" data-tid="kraft" data-lab="元数据传播"/>
  <text x="898" y="395" font-size="9.5" font-weight="600" text-anchor="middle" fill="#1d1d1f">元数据传播</text>
  <text x="776" y="415" font-size="8" fill="#6e6e73">MetadataLoader(Raft Listener)</text>
  <text x="776" y="431" font-size="8" fill="#6e6e73">→ 不可变 MetadataImage</text>
  <text x="776" y="447" font-size="8" fill="#6e6e73">→ 扇出各 Broker</text>
  <text x="776" y="467" font-size="8" fill="#6e6e73">Broker:KRaftMetadataCache</text>
  <text x="776" y="483" font-size="8" fill="#8a8a90">setImage 无锁应用(Opt)</text>

  <g filter="url(#glow)">
    <line x1="380" y1="124" x2="380" y2="174" stroke="#0a84ff" stroke-width="2" marker-end="url(#ar-hot)"/>
    <line x1="380" y1="238" x2="380" y2="248" stroke="#0a84ff" stroke-width="2" marker-end="url(#ar-hot)"/>
  </g>
  <path d="M746,330 C726,330 726,207 714,207" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#ar-ctrl)"/>
  <text x="694" y="150" font-size="8" fill="#7c5cd6" text-anchor="end">元数据扇出</text>

  <text x="46" y="540" font-size="9" fill="#0a84ff">Hot 主链:Producer → 网络层 → Leader 顺序 append → ISR 复制到 HW → Consumer 从 Leader 零拷贝顺序读(按位点)</text>

  <rect x="30" y="560" width="1020" height="76" rx="12" fill="#f5f5f7" stroke="#d8d8dc"/>
  <text x="48" y="582" font-size="10.5" font-weight="700" fill="#1d1d1f">核心设计张力 · 顺序日志简单高吞吐 vs 副本/消费组一致性协调</text>
  <text x="48" y="602" font-size="9" fill="#6e6e73">分区内严格有序是简单性根基;跨副本一致靠 ISR+HW+acks;消费进度靠组协调+位点;元数据一致由 KRaft 共识兜底(替代 ZooKeeper)。</text>
  <g font-size="8.5" fill="#6e6e73">
    <line x1="560" y1="622" x2="586" y2="622" stroke="#0a84ff" stroke-width="2"/><text x="592" y="625">Hot 日志主轨</text>
    <line x1="690" y1="622" x2="716" y2="622" stroke="#1aa89a" stroke-width="1.5"/><text x="722" y="625">State ISR/HW</text>
    <line x1="820" y1="622" x2="846" y2="622" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="6 4"/><text x="852" y="625">Control 元数据/协调</text>
    <line x1="980" y1="622" x2="1006" y2="622" stroke="#e0742a" stroke-width="1.5" stroke-dasharray="3 3"/><text x="1012" y="625">Failure</text>
  </g>

  <text x="30" y="656" font-size="9" fill="#a1a1a6">Kafka(KRaft 模式)· 所有机制回本地源码核实 · 不变量:分区内偏移单调、HW≤LEO、__consumer_offsets 幂等提交</text>
</svg>
