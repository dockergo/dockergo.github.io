<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Kafka KRaft · 元数据传播（控制器 → Broker）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">MetadataLoader(Raft Listener) → 不可变 MetadataImage → 扇出 MetadataPublisher → BrokerMetadataPublisher → KRaftMetadataCache.setImage</text>

  <!-- source: committed metadata log -->
  <rect x="30" y="76" width="150" height="120" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="105" y="100" font-size="10" font-weight="700" fill="#5a3410" text-anchor="middle">已提交元数据日志</text>
  <text x="105" y="120" font-size="8.3" fill="#93762e" text-anchor="middle">__cluster_metadata</text>
  <text x="105" y="140" font-size="8.3" fill="#93762e" text-anchor="middle">Raft commit 的记录</text>
  <text x="105" y="168" font-size="8.3" fill="#93762e" text-anchor="middle">控制器 quorum</text>
  <text x="105" y="184" font-size="8.3" fill="#93762e" text-anchor="middle">复制提交</text>

  <!-- step 1 MetadataLoader -->
  <rect x="204" y="76" width="196" height="120" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="302" y="100" font-size="10.5" font-weight="700" fill="#1b2a4a" text-anchor="middle">① MetadataLoader</text>
  <text x="302" y="117" font-size="8" fill="#5b7db1" text-anchor="middle">image/loader/MetadataLoader.java:76</text>
  <text x="302" y="137" font-size="8.4" fill="#5b7db1" text-anchor="middle">是 Raft Listener</text>
  <text x="302" y="155" font-size="8.4" fill="#5b7db1" text-anchor="middle">handleCommit / handleLoadSnapshot</text>
  <text x="302" y="173" font-size="8.4" fill="#5b7db1" text-anchor="middle">建 MetadataDelta</text>
  <text x="302" y="189" font-size="8.4" fill="#5b7db1" text-anchor="middle">→ maybePublishMetadata(:396)</text>

  <!-- step 2 Delta -> Image -->
  <rect x="424" y="76" width="196" height="120" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="522" y="100" font-size="10.5" font-weight="700" fill="#274a78" text-anchor="middle">② Delta → 不可变 Image</text>
  <text x="522" y="119" font-size="8.4" fill="#5b7db1" text-anchor="middle">MetadataDelta.replay 按</text>
  <text x="522" y="135" font-size="8.4" fill="#5b7db1" text-anchor="middle">MetadataRecordType 分域重放(:194)</text>
  <text x="522" y="153" font-size="8.4" fill="#5b7db1" text-anchor="middle">apply() 构建新 MetadataImage(:387)</text>
  <rect x="440" y="164" width="164" height="24" rx="6" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="522" y="180" font-size="8.2" fill="#1b2a4a" text-anchor="middle">每次变更 = 一个新 image 快照</text>

  <!-- step 3 fanout publishers -->
  <rect x="644" y="76" width="196" height="120" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="742" y="100" font-size="10.5" font-weight="700" fill="#274a78" text-anchor="middle">③ 扇出到 Publisher</text>
  <text x="742" y="119" font-size="8.4" fill="#5b7db1" text-anchor="middle">遍历各 MetadataPublisher</text>
  <text x="742" y="137" font-size="8.4" fill="#5b7db1" text-anchor="middle">调 onMetadataUpdate</text>
  <text x="742" y="155" font-size="8.4" fill="#5b7db1" text-anchor="middle">(MetadataLoader.java:362)</text>
  <text x="742" y="177" font-size="8.4" fill="#5b7db1" text-anchor="middle">一个 image 广播给多个订阅者</text>

  <!-- step 4 broker publisher -->
  <rect x="864" y="76" width="186" height="120" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="957" y="100" font-size="10" font-weight="700" fill="#5a3410" text-anchor="middle">④ BrokerMetadataPublisher</text>
  <text x="957" y="118" font-size="7.8" fill="#93762e" text-anchor="middle">server/metadata/…:68</text>
  <text x="957" y="137" font-size="8.4" fill="#93762e" text-anchor="middle">onMetadataUpdate:</text>
  <text x="957" y="155" font-size="8.4" fill="#93762e" text-anchor="middle">→ metadataCache.setImage(:130)</text>
  <text x="957" y="173" font-size="8.4" fill="#93762e" text-anchor="middle">→ replicaManager.applyDelta(:148)</text>

  <!-- arrows -->
  <line x1="180" y1="136" x2="204" y2="136" stroke="#c7c7cc" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="400" y1="136" x2="424" y2="136" stroke="#c7c7cc" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="620" y1="136" x2="644" y2="136" stroke="#c7c7cc" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="840" y1="136" x2="864" y2="136" stroke="#c7c7cc" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- KRaftMetadataCache detail -->
  <rect x="30" y="228" width="1020" height="150" rx="14" fill="#f3f7fc" stroke="#dbe7f5"/>
  <text x="46" y="252" font-size="11.5" font-weight="700" fill="#1b2a4a">⑤ KRaftMetadataCache · 无锁读当前元数据视图（已 Java 化 · metadata/…/KRaftMetadataCache.java:65）</text>

  <rect x="48" y="266" width="470" height="98" rx="11" fill="#ffffff" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="283" y="290" font-size="10.5" font-weight="700" fill="#274a78" text-anchor="middle">持 volatile MetadataImage</text>
  <text x="283" y="312" font-size="9" fill="#5b7db1" text-anchor="middle">setImage(newImage) 原子换引用(:485)</text>
  <text x="283" y="332" font-size="9" fill="#5b7db1" text-anchor="middle">volatile 保证换引用对所有读线程立即可见</text>
  <text x="283" y="352" font-size="9" fill="#5b7db1" text-anchor="middle">整块替换,不做增量原地改</text>

  <rect x="538" y="266" width="496" height="98" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="786" y="290" font-size="10.5" font-weight="700" fill="#12402a" text-anchor="middle">查询无锁读(lock-free read)</text>
  <text x="786" y="312" font-size="9" fill="#2f6f4f" text-anchor="middle">读者只读 volatile 引用指向的不可变 image</text>
  <text x="786" y="332" font-size="9" fill="#2f6f4f" text-anchor="middle">image 不可变 → 读期间不会被改,无需加锁</text>
  <text x="786" y="352" font-size="9" fill="#2f6f4f" text-anchor="middle">KafkaApis 处理请求时高频读,零竞争</text>

  <path d="M957,196 L957,212 L283,212 L283,266" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <line x1="518" y1="315" x2="538" y2="315" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <text x="30" y="410" font-size="8.8" fill="#a1a1a6">最终一致:控制器提交 → 复制 → MetadataLoader 发布 → 各 Broker setImage 才应用,有传播延迟;不可变 image + volatile 原子换 = 无锁高并发读</text>
  <text x="30" y="432" font-size="8.8" fill="#a1a1a6">纯 broker 角色只是元数据的消费者(经 MetadataLoader 应用),不参与 Raft 选举</text>
</svg>
