<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="516" viewBox="0 0 1080 516"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1080" height="516" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Kafka KafkaApis 请求分派 · 按 apiKey 路由到 handler</text>
  <text x="30" y="50" font-size="12" fill="#a1a1a6">KafkaApis.handle（KafkaApis.scala:157）是"请求 → 能力域"的路由中枢</text>

  <!-- central dispatcher -->
  <rect x="390" y="80" width="300" height="72" rx="13" fill="#f4eefb" stroke="#dcc9f0" filter="url(#soft)"/>
  <text x="540" y="110" font-size="13.5" font-weight="700" fill="#4a2b6b" text-anchor="middle">KafkaApis.handle(request)</text>
  <text x="540" y="132" font-size="11" fill="#7c5aa6" text-anchor="middle">按 request.apiKey 分派 · KafkaApis.scala:157</text>

  <!-- data-plane handlers -->
  <rect x="48" y="212" width="300" height="118" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="68" y="238" font-size="12.5" font-weight="700" fill="#5a3410">PRODUCE</text>
  <text x="68" y="260" font-size="11" fill="#93762e">→ handleProduceRequest（:400）</text>
  <text x="68" y="282" font-size="10.5" fill="#93762e">调 ReplicaManager 追加到 Leader 日志</text>
  <text x="68" y="304" font-size="10.5" fill="#93762e">acks=all 时可能进 purgatory 挂起</text>
  <text x="68" y="322" font-size="10.5" fill="#93762e">→【日志存储】【副本与 ISR】</text>

  <rect x="390" y="212" width="300" height="118" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="410" y="238" font-size="12.5" font-weight="700" fill="#5a3410">FETCH</text>
  <text x="410" y="260" font-size="11" fill="#93762e">→ handleFetchRequest（:567）</text>
  <text x="410" y="282" font-size="10.5" fill="#93762e">从日志读取，零拷贝返回</text>
  <text x="410" y="304" font-size="10.5" fill="#93762e">数据不够时进 purgatory 等待</text>
  <text x="410" y="322" font-size="10.5" fill="#93762e">→【日志存储】</text>

  <rect x="732" y="212" width="300" height="118" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="752" y="238" font-size="12.5" font-weight="700" fill="#1b2a4a">METADATA 等</text>
  <text x="752" y="260" font-size="11" fill="#5b7db1">→ handleTopicMetadataRequest</text>
  <text x="752" y="282" font-size="10.5" fill="#5b7db1">返回主题/分区/副本布局</text>
  <text x="752" y="304" font-size="10.5" fill="#5b7db1">每个 API 对应一个 handler</text>
  <text x="752" y="322" font-size="10.5" fill="#5b7db1">handler 调 ReplicaManager 等</text>

  <!-- controller forward -->
  <rect x="240" y="384" width="600" height="106" rx="13" fill="#fbeaea" stroke="#e6b8b8" filter="url(#soft)"/>
  <text x="260" y="410" font-size="12.5" font-weight="700" fill="#7a2b2b">集群变更类 → forwardToController（:190）转 KRaft</text>
  <text x="260" y="434" font-size="11" fill="#a35555">CREATE_TOPICS / ALTER_CONFIGS / DELETE_TOPICS …</text>
  <text x="260" y="456" font-size="11" fill="#a35555">Broker 不直接改元数据 → 转给 KRaft 控制器，Broker 只应用</text>
  <text x="260" y="478" font-size="10.5" fill="#a35555">元数据一致性的单一权威在控制器</text>

  <!-- connectors -->
  <polyline points="470,152 470,180 198,180 198,212" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <polyline points="540,152 540,212" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <polyline points="610,152 610,180 882,180 882,212" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <polyline points="690,116 960,116 960,360 540,360 540,384" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
</svg>
