<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
    <marker id="arB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/>
    </marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Kafka Leader / Follower 复制 · pull 模型（Follower 主动拉）</text>
  <text x="30" y="50" font-size="12" fill="#a1a1a6">写只走 Leader；Follower 拉取复制；Leader 记录进度触发 ISR 扩张与 HW 推进</text>

  <!-- Producer -->
  <rect x="48" y="96" width="150" height="70" rx="12" fill="#f4eefb" stroke="#dcc9f0" filter="url(#soft)"/>
  <text x="123" y="126" font-size="12.5" font-weight="700" fill="#4a2b6b" text-anchor="middle">Producer</text>
  <text x="123" y="147" font-size="10.5" fill="#7c5aa6" text-anchor="middle">写请求</text>

  <!-- Leader -->
  <rect x="270" y="80" width="330" height="220" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="290" y="107" font-size="13.5" font-weight="700" fill="#1b2a4a">Leader（读写）</text>
  <rect x="290" y="120" width="290" height="44" rx="9" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="304" y="139" font-size="11" font-weight="600" fill="#1b2a4a">appendRecordsToLeader（ReplicaManager:586）</text>
  <text x="304" y="156" font-size="10.5" fill="#5b7db1">→ appendToLocalLog（:1376）写本地日志</text>
  <rect x="290" y="172" width="290" height="46" rx="9" fill="#f3f7fc" stroke="#bcd0ec"/>
  <text x="304" y="191" font-size="11" font-weight="600" fill="#274a78">updateFollowerFetchState（Partition:767）</text>
  <text x="304" y="208" font-size="10.5" fill="#5b7db1">记录每个 Follower 拉取进度</text>
  <rect x="290" y="226" width="140" height="60" rx="9" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="360" y="252" font-size="10.5" font-weight="600" fill="#12402a" text-anchor="middle">maybeExpandIsr</text>
  <text x="360" y="270" font-size="10" fill="#2f6f4f" text-anchor="middle">追上者入 ISR（:797）</text>
  <rect x="440" y="226" width="140" height="60" rx="9" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="510" y="246" font-size="10.5" font-weight="600" fill="#12402a" text-anchor="middle">maybeIncrement</text>
  <text x="510" y="262" font-size="10.5" font-weight="600" fill="#12402a" text-anchor="middle">LeaderHW</text>
  <text x="510" y="279" font-size="10" fill="#2f6f4f" text-anchor="middle">推进 HW（:805）</text>

  <!-- Followers -->
  <rect x="680" y="80" width="352" height="104" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="700" y="106" font-size="12.5" font-weight="700" fill="#5a3410">Follower A · ReplicaFetcherThread</text>
  <text x="700" y="127" font-size="10.5" fill="#93762e">processPartitionData 追加拉到的记录</text>
  <text x="700" y="146" font-size="10.5" fill="#93762e">校验 fetchOffset == log.logEndOffset（:113）</text>
  <text x="700" y="168" font-size="10.5" fill="#93762e">拉取后向 Leader 上报本地 LEO</text>

  <rect x="680" y="196" width="352" height="104" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="700" y="222" font-size="12.5" font-weight="700" fill="#5a3410">Follower B · ReplicaFetcherThread</text>
  <text x="700" y="243" font-size="10.5" fill="#93762e">从 Leader fetch，顺序追加到本地日志</text>
  <text x="700" y="262" font-size="10.5" fill="#93762e">落后超阈值会被移出 ISR</text>
  <text x="700" y="284" font-size="10.5" fill="#93762e">追上后重新入 ISR</text>

  <!-- connectors -->
  <polyline points="198,131 270,131" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <!-- follower pulls from leader (arrows point to leader = pull) -->
  <polyline points="680,124 600,124" fill="none" stroke="#5b7db1" stroke-width="1.8" marker-end="url(#arB)"/>
  <polyline points="680,240 640,240 640,150 600,150" fill="none" stroke="#5b7db1" stroke-width="1.8" marker-end="url(#arB)"/>
  <text x="642" y="112" font-size="10.5" font-weight="600" fill="#5b7db1" text-anchor="middle">pull fetch</text>

  <!-- bottom note -->
  <rect x="48" y="330" width="984" height="76" rx="13" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="68" y="356" font-size="12.5" font-weight="700" fill="#2c5a3a">pull 模型（非 Leader 推）</text>
  <text x="68" y="378" font-size="11" fill="#2f6f4f">Follower 主动拉 → 简化流控与 Follower 落后处理：慢副本自己跟不上，Leader 无需感知背压</text>
  <text x="68" y="398" font-size="11" fill="#2f6f4f">Leader 拿到 Follower 上报的 fetch offset 后，才更新进度 → 尝试扩张 ISR、推进 HW</text>

  <rect x="48" y="424" width="984" height="72" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="68" y="450" font-size="12.5" font-weight="700" fill="#1b2a4a">复制链路一句话</text>
  <text x="68" y="472" font-size="11" fill="#274a78">Producer → Leader.appendToLocalLog → Follower pull → Leader.updateFollowerFetchState</text>
  <text x="68" y="490" font-size="11" fill="#274a78">→ maybeExpandIsr + maybeIncrementLeaderHW（进度足够则 HW 前移，暴露给消费者）</text>
</svg>
