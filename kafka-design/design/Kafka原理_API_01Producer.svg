<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Kafka API · Producer 发送路径（KafkaProducer.doSend）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">等元数据 → 序列化 → 算分区 → RecordAccumulator 攒批(每分区 Deque) → 唤醒 Sender;acks 写进 ProduceRequest</text>

  <!-- app thread lane label -->
  <text x="30" y="80" font-size="9.5" font-weight="600" fill="#86868b">应用线程 · doSend（clients/…/producer/KafkaProducer.java:1127）</text>

  <!-- step 1 wait metadata -->
  <rect x="30" y="90" width="150" height="60" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="105" y="116" font-size="11" font-weight="600" fill="#3d2a5a" text-anchor="middle">① 等元数据</text>
  <text x="105" y="136" font-size="8.4" fill="#8a6db0" text-anchor="middle">waitOnMetadata</text>

  <!-- step 2 serialize -->
  <rect x="198" y="90" width="150" height="60" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="273" y="116" font-size="11" font-weight="600" fill="#3d2a5a" text-anchor="middle">② 序列化</text>
  <text x="273" y="136" font-size="8.4" fill="#8a6db0" text-anchor="middle">key / value serializer</text>

  <!-- step 3 partition -->
  <rect x="366" y="90" width="150" height="60" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="441" y="116" font-size="11" font-weight="600" fill="#3d2a5a" text-anchor="middle">③ 算分区</text>
  <text x="441" y="136" font-size="8.4" fill="#8a6db0" text-anchor="middle">partition() :1627</text>

  <line x1="180" y1="120" x2="198" y2="120" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="348" y1="120" x2="366" y2="120" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- partition decision branch -->
  <rect x="366" y="170" width="150" height="46" rx="8" fill="#fff" stroke="#d9c7ec"/>
  <text x="441" y="188" font-size="8.4" fill="#3d2a5a" text-anchor="middle">显式 record.partition()</text>
  <text x="441" y="204" font-size="8.4" fill="#8a6db0" text-anchor="middle">优先(&gt;=0 直接用)</text>
  <rect x="366" y="222" width="150" height="46" rx="8" fill="#fff" stroke="#d9c7ec"/>
  <text x="441" y="240" font-size="8.4" fill="#3d2a5a" text-anchor="middle">有 key → 哈希</text>
  <text x="441" y="256" font-size="8.4" fill="#8a6db0" text-anchor="middle">BuiltInPartitioner.partitionForKey</text>
  <rect x="366" y="274" width="150" height="46" rx="8" fill="#fff" stroke="#d9c7ec"/>
  <text x="441" y="292" font-size="8.4" fill="#3d2a5a" text-anchor="middle">无 key → 粘性自适应</text>
  <text x="441" y="308" font-size="8.4" fill="#8a6db0" text-anchor="middle">BuiltInPartitioner :1643</text>
  <path d="M441,150 L441,170" stroke="#c7c7cc" stroke-width="1.3" fill="none" marker-end="url(#ar)"/>
  <path d="M441,216 L441,222" stroke="#e6dcef" stroke-width="1.1" fill="none"/>
  <path d="M441,268 L441,274" stroke="#e6dcef" stroke-width="1.1" fill="none"/>

  <!-- step 4 accumulator -->
  <rect x="558" y="90" width="300" height="230" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="574" y="112" font-size="11.5" font-weight="700" fill="#5a3410">④ RecordAccumulator 攒批</text>
  <text x="574" y="129" font-size="8.3" fill="#93762e">producer/internals/RecordAccumulator.java:308</text>

  <rect x="574" y="140" width="268" height="70" rx="9" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="708" y="160" font-size="9" font-weight="600" fill="#5a3410" text-anchor="middle">每分区一个 Deque&lt;ProducerBatch&gt;</text>
  <text x="708" y="178" font-size="8.3" fill="#93762e" text-anchor="middle">append 往最后一个批追加(:325)</text>
  <text x="708" y="196" font-size="8.3" fill="#93762e" text-anchor="middle">多条消息合并成一个批一次发</text>

  <rect x="574" y="218" width="268" height="86" rx="9" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="708" y="238" font-size="9" font-weight="600" fill="#5a3410" text-anchor="middle">批满 → BufferPool 分配新批</text>
  <text x="708" y="256" font-size="8.3" fill="#93762e" text-anchor="middle">从 BufferPool 取 batch.size(默认 16384)</text>
  <text x="708" y="274" font-size="8.3" fill="#93762e" text-anchor="middle">缓冲建新 ProducerBatch(:335)</text>
  <text x="708" y="292" font-size="8.3" fill="#93762e" text-anchor="middle">batch.size / linger.ms 控吞吐↔延迟</text>

  <line x1="516" y1="120" x2="558" y2="120" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Sender lane -->
  <text x="30" y="360" font-size="9.5" font-weight="600" fill="#86868b">Sender 线程 · drain 后按 node 组请求发送（Sender.java:418）</text>

  <rect x="558" y="372" width="220" height="86" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="668" y="396" font-size="11" font-weight="700" fill="#1b2a4a" text-anchor="middle">⑤ 唤醒 Sender</text>
  <text x="668" y="416" font-size="8.4" fill="#5b7db1" text-anchor="middle">drain 攒好的批</text>
  <text x="668" y="432" font-size="8.4" fill="#5b7db1" text-anchor="middle">按目标 node 分组</text>
  <text x="668" y="448" font-size="8.4" fill="#5b7db1" text-anchor="middle">组成 ProduceRequest</text>

  <rect x="806" y="372" width="244" height="86" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="928" y="396" font-size="11" font-weight="700" fill="#1b2a4a" text-anchor="middle">⑥ 发往分区 Leader Broker</text>
  <text x="928" y="416" font-size="8.4" fill="#5b7db1" text-anchor="middle">acks=all 等 ISR 齐才应答</text>
  <text x="928" y="432" font-size="8.4" fill="#5b7db1" text-anchor="middle">acks=1 Leader 落盘即答</text>
  <text x="928" y="448" font-size="8.4" fill="#5b7db1" text-anchor="middle">acks=0 fire-and-forget(不等)</text>

  <path d="M708,320 L708,352 L668,352 L668,372" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <line x1="778" y1="415" x2="806" y2="415" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- acks note -->
  <rect x="30" y="372" width="500" height="86" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="394" font-size="10.5" font-weight="700" fill="#1d1d1f">acks 写进 ProduceRequest</text>
  <text x="46" y="414" font-size="9" fill="#6e6e73">默认 acks=all(ProducerConfig.java:405);写请求头部,Broker 据此定确认强度</text>
  <text x="46" y="432" font-size="9" fill="#6e6e73">acks=0 时 Sender 本地完成批(不等响应),fire-and-forget</text>
  <text x="46" y="450" font-size="9" fill="#6e6e73">幂等开启时:批带 PID + 序列号(见事务与幂等篇),max.in.flight≤5</text>

  <text x="30" y="490" font-size="8.6" fill="#a1a1a6">一句话:doSend 在应用线程序列化选分区攒批(不发网络),Sender 线程按 node 组批发送——攒批是吞吐关键,一次 send ≠ 一次网络</text>
</svg>
