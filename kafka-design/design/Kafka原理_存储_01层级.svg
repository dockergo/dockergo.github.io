<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="552" viewBox="0 0 1080 552"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1080" height="552" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Kafka 日志层级 · Topic → Partition → UnifiedLog → LogSegment</text>
  <text x="30" y="50" font-size="12" fill="#a1a1a6">一个 Partition = 一条日志 = 一串按基准 offset 排序的不可变 Segment；只有基准 offset 最高的是 active（可追加）</text>

  <!-- Topic band -->
  <rect x="60" y="70" width="960" height="66" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="80" y="98" font-size="13" font-weight="700" fill="#1b2a4a">Topic（逻辑名）</text>
  <text x="80" y="118" font-size="11" fill="#5b7db1">并行与复制单位是 Partition</text>
  <rect x="360" y="82" width="150" height="42" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="435" y="108" font-size="12" font-weight="600" fill="#274a78" text-anchor="middle">Partition 0</text>
  <rect x="530" y="82" width="150" height="42" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="605" y="108" font-size="12" font-weight="600" fill="#274a78" text-anchor="middle">Partition 1</text>
  <rect x="700" y="82" width="150" height="42" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="775" y="108" font-size="12" font-weight="600" fill="#274a78" text-anchor="middle">Partition 2</text>

  <!-- UnifiedLog band -->
  <rect x="60" y="170" width="960" height="66" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="80" y="198" font-size="13" font-weight="700" fill="#5a3410">UnifiedLog · 某个 Partition 的日志抽象（追加 / 滚段 / HW）</text>
  <text x="80" y="220" font-size="11" fill="#93762e">UnifiedLog.java:128 —— 内含 LocalLog；activeSegment() = 基准 offset 最高的段（:2414）</text>

  <!-- LogSegments band -->
  <rect x="60" y="270" width="960" height="66" rx="13" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="80" y="298" font-size="13" font-weight="700" fill="#5a3410">LogSegments · 段集合</text>
  <text x="80" y="320" font-size="11" fill="#93762e">ConcurrentNavigableMap&lt;Long, LogSegment&gt; 按基准 offset 排序（LogSegments.java:42）</text>

  <!-- Segment cards -->
  <!-- seg base 0 -->
  <rect x="60" y="372" width="286" height="140" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="74" y="398" font-size="12" font-weight="700" fill="#5a3410">LogSegment · base=0</text>
  <rect x="266" y="384" width="66" height="20" rx="7" fill="#f2e3c6" stroke="#e8cf9a"/>
  <text x="299" y="398" font-size="10" font-weight="600" fill="#8a5a1e" text-anchor="middle">不可变</text>
  <rect x="74" y="410" width="258" height="26" rx="7" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="86" y="427" font-size="11" fill="#5a3410">00000000000000000000<tspan fill="#93762e">.log</tspan> · FileRecords</text>
  <rect x="74" y="442" width="258" height="26" rx="7" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="86" y="459" font-size="11" fill="#5a3410">…<tspan fill="#93762e">.index</tspan> · OffsetIndex</text>
  <rect x="74" y="474" width="258" height="26" rx="7" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="86" y="491" font-size="11" fill="#5a3410">…<tspan fill="#93762e">.timeindex</tspan> · TimeIndex</text>

  <!-- seg base 5000 -->
  <rect x="397" y="372" width="286" height="140" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="411" y="398" font-size="12" font-weight="700" fill="#5a3410">LogSegment · base=5000</text>
  <rect x="603" y="384" width="66" height="20" rx="7" fill="#f2e3c6" stroke="#e8cf9a"/>
  <text x="636" y="398" font-size="10" font-weight="600" fill="#8a5a1e" text-anchor="middle">不可变</text>
  <rect x="411" y="410" width="258" height="26" rx="7" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="423" y="427" font-size="11" fill="#5a3410">00000000000000005000<tspan fill="#93762e">.log</tspan></text>
  <rect x="411" y="442" width="258" height="26" rx="7" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="423" y="459" font-size="11" fill="#5a3410">…<tspan fill="#93762e">.index</tspan> + …<tspan fill="#93762e">.timeindex</tspan></text>
  <rect x="411" y="474" width="258" height="26" rx="7" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="423" y="491" font-size="11" fill="#93762e">已封存，只读</text>

  <!-- seg base 9000 active -->
  <rect x="734" y="372" width="286" height="140" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="748" y="398" font-size="12" font-weight="700" fill="#12402a">LogSegment · base=9000</text>
  <rect x="922" y="384" width="84" height="20" rx="7" fill="#d6f0e1" stroke="#bfe0cd"/>
  <text x="964" y="398" font-size="10" font-weight="600" fill="#2f6f4f" text-anchor="middle">active 可追加</text>
  <rect x="748" y="410" width="258" height="26" rx="7" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="760" y="427" font-size="11" fill="#12402a">00000000000000009000<tspan fill="#2f6f4f">.log</tspan></text>
  <rect x="748" y="442" width="258" height="26" rx="7" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="760" y="459" font-size="11" fill="#12402a">写永远追加到尾部 → 更新 LEO</text>
  <rect x="748" y="474" width="258" height="26" rx="7" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="760" y="491" font-size="11" fill="#2f6f4f">超 segment.bytes/ms 则滚新段</text>

  <!-- connectors -->
  <polyline points="435,124 435,170" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <polyline points="540,236 540,270" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <polyline points="540,336 540,352 203,352 203,372" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <polyline points="540,336 540,372" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <polyline points="540,336 540,352 877,352 877,372" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
</svg>
