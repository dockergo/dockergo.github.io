<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Kafka API · Consumer 消费路径（poll + fetch + 提交位点）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">group.protocol 选实现;AsyncKafkaConsumer(KIP-848)双线程:应用线程提交事件 + 后台 ConsumerNetworkThread 驱动 RequestManager</text>

  <!-- protocol selection -->
  <rect x="30" y="70" width="1020" height="56" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="46" y="92" font-size="11" font-weight="700" fill="#3d2a5a">group.protocol 选实现（GroupProtocol{CLASSIC, CONSUMER}）· ConsumerDelegateCreator.java:61</text>
  <g font-size="8.6">
    <rect x="600" y="86" width="212" height="32" rx="7" fill="#faf4fb" stroke="#e2d2ee"/><text x="706" y="106" fill="#5a3d78" text-anchor="middle">CONSUMER → AsyncKafkaConsumer(KIP-848)</text>
    <rect x="822" y="86" width="212" height="32" rx="7" fill="#faf4fb" stroke="#e2d2ee"/><text x="928" y="106" fill="#5a3d78" text-anchor="middle">CLASSIC → ClassicKafkaConsumer(旧)</text>
  </g>

  <!-- App thread lane -->
  <rect x="30" y="146" width="490" height="330" rx="14" fill="#f3f7fc" stroke="#dbe7f5"/>
  <text x="46" y="168" font-size="11" font-weight="700" fill="#274a78">应用线程 · poll 循环（AsyncKafkaConsumer.java:933）</text>

  <rect x="48" y="182" width="454" height="66" rx="10" fill="#ffffff" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="275" y="206" font-size="10.5" font-weight="600" fill="#274a78" text-anchor="middle">poll 提交 AsyncPollEvent</text>
  <text x="275" y="226" font-size="8.6" fill="#5b7db1" text-anchor="middle">循环 pollForFetches 取回已就绪的 fetch 结果</text>
  <text x="275" y="241" font-size="8.6" fill="#5b7db1" text-anchor="middle">应用线程不直接做网络 IO,只投递事件</text>

  <rect x="48" y="262" width="454" height="60" rx="10" fill="#ffffff" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="275" y="286" font-size="10.5" font-weight="600" fill="#274a78" text-anchor="middle">位点提交事件</text>
  <text x="275" y="306" font-size="8.6" fill="#5b7db1" text-anchor="middle">commitSync → SyncCommitEvent · commitAsync → AsyncCommitEvent</text>

  <rect x="48" y="336" width="454" height="60" rx="10" fill="#ffffff" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="275" y="360" font-size="10.5" font-weight="600" fill="#274a78" text-anchor="middle">应用侧处理拉到的记录</text>
  <text x="275" y="380" font-size="8.6" fill="#5b7db1" text-anchor="middle">max.poll.records 控批 · max.poll.interval.ms 超时会被踢出组</text>

  <text x="48" y="424" font-size="9" font-weight="600" fill="#274a78">事件队列(应用线程 → 后台线程)</text>
  <rect x="48" y="432" width="454" height="30" rx="8" fill="#e9f1fb" stroke="#cfe0f2"/>
  <text x="275" y="451" font-size="8.6" fill="#5b7db1" text-anchor="middle">AsyncPollEvent / SyncCommitEvent / AsyncCommitEvent 投递</text>

  <!-- background thread lane -->
  <rect x="540" y="146" width="510" height="330" rx="14" fill="#fdf6ea" stroke="#efe3cc"/>
  <text x="556" y="168" font-size="11" font-weight="700" fill="#5a3410">后台 ConsumerNetworkThread.runOnce（:210）</text>
  <text x="556" y="184" font-size="8.4" fill="#93762e">排空事件队列、驱动各 RequestManager 与网络 IO</text>

  <rect x="558" y="196" width="474" height="86" rx="10" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="795" y="218" font-size="10.5" font-weight="700" fill="#5a3410" text-anchor="middle">FetchRequestManager 备 fetch（:105）</text>
  <text x="795" y="238" font-size="8.6" fill="#93762e" text-anchor="middle">AbstractFetch.createFetchRequest 建请求(:310)</text>
  <text x="795" y="256" font-size="8.6" fill="#93762e" text-anchor="middle">带 fetch-session · isolationLevel(EOS 用 read_committed)</text>
  <text x="795" y="274" font-size="8.6" fill="#93762e" text-anchor="middle">min/max bytes 控每次拉取量</text>

  <rect x="558" y="294" width="474" height="86" rx="10" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="795" y="316" font-size="10.5" font-weight="700" fill="#5a3410" text-anchor="middle">CommitRequestManager 提交位点（:76）</text>
  <text x="795" y="336" font-size="8.6" fill="#93762e" text-anchor="middle">建 OffsetCommitRequest 发协调器</text>
  <text x="795" y="354" font-size="8.6" fill="#93762e" text-anchor="middle">管自动提交(enable.auto.commit · AutoCommitState)</text>
  <text x="795" y="372" font-size="8.6" fill="#93762e" text-anchor="middle">位点存 __consumer_offsets(见消费者组篇)</text>

  <rect x="558" y="392" width="474" height="70" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="795" y="414" font-size="10" font-weight="700" fill="#1b2a4a" text-anchor="middle">网络 → 分区 Leader / 组协调器 Broker</text>
  <text x="795" y="433" font-size="8.6" fill="#5b7db1" text-anchor="middle">FetchRequest → Leader 顺序读(零拷贝回传)</text>
  <text x="795" y="450" font-size="8.6" fill="#5b7db1" text-anchor="middle">OffsetCommitRequest → 组协调器落 __consumer_offsets</text>

  <!-- cross-lane arrows -->
  <path d="M502,447 L540,447 L540,239 L558,239" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M502,440 L520,440 L520,337 L558,337" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="510" y="330" font-size="8" fill="#a1a1a6" transform="rotate(-90 510 330)">驱动 RequestManager</text>

  <!-- return fetch results back -->
  <path d="M558,220 L512,220 L512,215" stroke="#c7c7cc" stroke-width="1.3" stroke-dasharray="4 3" fill="none" marker-end="url(#ar)"/>

  <text x="30" y="500" font-size="8.6" fill="#a1a1a6">一句话:4.x 默认 KIP-848 双线程异步模型——应用线程只投递事件+取结果,后台线程排空事件、驱动 Fetch/Commit RequestManager 做网络;误区:自动提交可能丢/重,严格语义手动提交</text>
</svg>
