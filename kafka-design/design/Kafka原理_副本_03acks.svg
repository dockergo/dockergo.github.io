<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Kafka acks / min.insync.replicas · 不丢语义</text>
  <text x="30" y="50" font-size="12" fill="#a1a1a6">写"成功且不丢"由生产者 acks 与主题 min.insync.replicas 共同定义</text>

  <!-- acks comparison table -->
  <text x="60" y="82" font-size="13" font-weight="700" fill="#1d1d1f">acks 对比</text>
  <!-- header -->
  <rect x="60" y="94" width="120" height="34" rx="8" fill="#f2f2f4" stroke="#d2d2d7"/>
  <text x="120" y="116" font-size="11.5" font-weight="700" fill="#1d1d1f" text-anchor="middle">acks</text>
  <rect x="184" y="94" width="420" height="34" rx="8" fill="#f2f2f4" stroke="#d2d2d7"/>
  <text x="200" y="116" font-size="11.5" font-weight="700" fill="#1d1d1f">含义</text>
  <rect x="608" y="94" width="412" height="34" rx="8" fill="#f2f2f4" stroke="#d2d2d7"/>
  <text x="624" y="116" font-size="11.5" font-weight="700" fill="#1d1d1f">保证</text>

  <!-- acks=0 -->
  <rect x="60" y="132" width="120" height="46" rx="8" fill="#fbeaea" stroke="#e6b8b8"/>
  <text x="120" y="160" font-size="13" font-weight="700" fill="#7a2b2b" text-anchor="middle">0</text>
  <rect x="184" y="132" width="420" height="46" rx="8" fill="#ffffff" stroke="#eaeaec"/>
  <text x="200" y="160" font-size="11.5" fill="#1d1d1f">不等确认（fire-and-forget）</text>
  <rect x="608" y="132" width="412" height="46" rx="8" fill="#ffffff" stroke="#eaeaec"/>
  <text x="624" y="160" font-size="11.5" fill="#7a2b2b">最快，可能丢</text>

  <!-- acks=1 -->
  <rect x="60" y="182" width="120" height="46" rx="8" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="120" y="210" font-size="13" font-weight="700" fill="#5a3410" text-anchor="middle">1</text>
  <rect x="184" y="182" width="420" height="46" rx="8" fill="#ffffff" stroke="#eaeaec"/>
  <text x="200" y="210" font-size="11.5" fill="#1d1d1f">Leader 落盘即确认</text>
  <rect x="608" y="182" width="412" height="46" rx="8" fill="#ffffff" stroke="#eaeaec"/>
  <text x="624" y="210" font-size="11.5" fill="#93762e">Leader 挂且未复制则丢</text>

  <!-- acks=all -->
  <rect x="60" y="232" width="120" height="46" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="120" y="260" font-size="12.5" font-weight="700" fill="#12402a" text-anchor="middle">all / -1</text>
  <rect x="184" y="232" width="420" height="46" rx="8" fill="#ffffff" stroke="#eaeaec"/>
  <text x="200" y="260" font-size="11.5" fill="#1d1d1f">等 ISR 都确认（默认，ProducerConfig:405）</text>
  <rect x="608" y="232" width="412" height="46" rx="8" fill="#ffffff" stroke="#eaeaec"/>
  <text x="624" y="260" font-size="11.5" fill="#12402a">配合 min ISR 不丢</text>

  <!-- effectiveMinIsr logic -->
  <rect x="60" y="300" width="470" height="140" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="80" y="326" font-size="13" font-weight="700" fill="#1b2a4a">acks=all 的准入判定（Partition.scala）</text>
  <rect x="80" y="340" width="430" height="40" rx="9" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="94" y="358" font-size="11" font-weight="600" fill="#1b2a4a">effectiveMinIsr = min(min.insync.replicas, 副本数)</text>
  <text x="94" y="374" font-size="10.5" fill="#5b7db1">Partition.scala:246</text>
  <rect x="80" y="388" width="430" height="40" rx="9" fill="#fbeaea" stroke="#e6b8b8"/>
  <text x="94" y="406" font-size="11" font-weight="600" fill="#7a2b2b">若 inSyncSize &lt; minIsr → 拒绝写并抛异常</text>
  <text x="94" y="422" font-size="10.5" fill="#a35555">Partition.scala:1234</text>

  <!-- not-lose formula -->
  <rect x="550" y="300" width="470" height="140" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="570" y="326" font-size="13" font-weight="700" fill="#12402a">不丢公式</text>
  <rect x="570" y="340" width="430" height="34" rx="8" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="585" y="362" font-size="11.5" font-weight="600" fill="#12402a">acks=all</text>
  <rect x="570" y="380" width="430" height="34" rx="8" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="585" y="402" font-size="11.5" font-weight="600" fill="#12402a">+ min.insync.replicas ≥ 2</text>
  <text x="585" y="432" font-size="11.5" font-weight="600" fill="#12402a">+ 副本数 ≥ 3　→　挂 1 个仍有完整数据</text>

  <!-- purgatory note -->
  <rect x="60" y="458" width="960" height="60" rx="13" fill="#f4eefb" stroke="#dcc9f0" filter="url(#soft)"/>
  <text x="80" y="484" font-size="12.5" font-weight="700" fill="#4a2b6b">produce 等待用 purgatory 挂起（见网络篇）</text>
  <text x="80" y="505" font-size="11" fill="#7c5aa6">produce 请求挂起直到 ISR 都复制到该 offset，才返回成功 —— 不空占 IO 线程</text>
</svg>
