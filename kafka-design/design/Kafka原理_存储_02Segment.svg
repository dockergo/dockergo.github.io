<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Kafka Segment 磁盘格式与稀疏索引 · 二分找下界 + 顺序扫</text>
  <text x="30" y="50" font-size="12" fill="#a1a1a6">文件名 = 基准 offset 补齐 20 位；索引每 indexIntervalBytes 一条、内存映射常驻（LogSegment.java:271）</text>

  <!-- filename box -->
  <rect x="60" y="72" width="960" height="52" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="80" y="94" font-size="12" font-weight="700" fill="#274a78">文件名 = 基准 offset 补 20 位（LogFileUtils.java:104）</text>
  <text x="80" y="113" font-size="12" fill="#5b7db1">00000000000000005000<tspan font-weight="600" fill="#274a78">.log</tspan> / <tspan font-weight="600" fill="#274a78">.index</tspan> / <tspan font-weight="600" fill="#274a78">.timeindex</tspan> / .txnindex（:37）</text>

  <!-- OffsetIndex card -->
  <rect x="60" y="150" width="300" height="204" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="78" y="176" font-size="13" font-weight="700" fill="#5a3410">OffsetIndex（.index）</text>
  <text x="78" y="196" font-size="11" fill="#93762e">相对 offset → 物理字节位置 · 每条 8 字节</text>
  <text x="78" y="212" font-size="10.5" fill="#93762e">4B 相对 offset + 4B 位置（:56,204）</text>
  <rect x="78" y="224" width="264" height="26" rx="7" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="90" y="241" font-size="11" fill="#5a3410">槽 relOff=0 → pos=0</text>
  <rect x="78" y="256" width="264" height="26" rx="7" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="90" y="273" font-size="11" fill="#5a3410">槽 relOff=37 → pos=4096</text>
  <rect x="78" y="288" width="264" height="26" rx="7" fill="#ffe9c2" stroke="#e8cf9a"/>
  <text x="90" y="305" font-size="11" font-weight="600" fill="#5a3410">槽 relOff=74 → pos=8192  ← 下界</text>
  <rect x="78" y="320" width="264" height="26" rx="7" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="90" y="337" font-size="11" fill="#5a3410">槽 relOff=111 → pos=12288</text>

  <!-- TimeIndex card -->
  <rect x="384" y="150" width="300" height="204" rx="13" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="402" y="176" font-size="13" font-weight="700" fill="#5a3410">TimeIndex（.timeindex）</text>
  <text x="402" y="196" font-size="11" fill="#93762e">时间戳 → 相对 offset · 每条 12 字节</text>
  <text x="402" y="212" font-size="10.5" fill="#93762e">8B 时间戳 + 4B 相对 offset（TimeIndex.java:56）</text>
  <rect x="402" y="224" width="264" height="26" rx="7" fill="#ffffff" stroke="#efdcb4"/>
  <text x="414" y="241" font-size="11" fill="#5a3410">ts=1700..000 → relOff=0</text>
  <rect x="402" y="256" width="264" height="26" rx="7" fill="#ffffff" stroke="#efdcb4"/>
  <text x="414" y="273" font-size="11" fill="#5a3410">ts=1700..500 → relOff=37</text>
  <rect x="402" y="288" width="264" height="26" rx="7" fill="#ffffff" stroke="#efdcb4"/>
  <text x="414" y="305" font-size="11" fill="#5a3410">ts=1700..900 → relOff=74</text>
  <text x="402" y="337" font-size="11" fill="#93762e">稀疏：每 indexIntervalBytes 才加一条</text>

  <!-- .log data -->
  <rect x="708" y="150" width="312" height="204" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="726" y="176" font-size="13" font-weight="700" fill="#1b2a4a">.log 数据（FileRecords）</text>
  <text x="726" y="196" font-size="11" fill="#5b7db1">索引只标稀疏锚点，其间靠顺序扫</text>
  <rect x="726" y="210" width="276" height="30" rx="7" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="738" y="229" font-size="10.5" fill="#274a78">pos=8192 batch[relOff 74..80] ← 命中槽</text>
  <rect x="726" y="246" width="276" height="30" rx="7" fill="#f3f7fc" stroke="#bcd0ec"/>
  <text x="738" y="265" font-size="10.5" fill="#274a78">pos=8600 batch[relOff 81..92] 顺序扫</text>
  <rect x="726" y="282" width="276" height="30" rx="7" fill="#f3f7fc" stroke="#bcd0ec"/>
  <text x="738" y="301" font-size="10.5" font-weight="600" fill="#1b2a4a">pos=9100 batch[relOff 93..99] ← 目标</text>
  <text x="726" y="336" font-size="10.5" fill="#5b7db1">从下界锚点线性前扫直到目标 offset</text>

  <!-- lookup flow -->
  <rect x="60" y="382" width="960" height="128" rx="13" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="80" y="408" font-size="13" font-weight="700" fill="#2c5a3a">查找 offset（OffsetIndex.lookup → largestLowerBoundSlotFor，:97）</text>
  <rect x="80" y="424" width="200" height="66" rx="10" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="180" y="452" font-size="12" font-weight="600" fill="#12402a" text-anchor="middle">① 二分索引</text>
  <text x="180" y="472" font-size="10.5" fill="#2f6f4f" text-anchor="middle">找最大下界槽</text>
  <rect x="330" y="424" width="200" height="66" rx="10" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="430" y="452" font-size="12" font-weight="600" fill="#12402a" text-anchor="middle">② 定位 .log 位置</text>
  <text x="430" y="472" font-size="10.5" fill="#2f6f4f" text-anchor="middle">槽给出起始字节</text>
  <rect x="580" y="424" width="200" height="66" rx="10" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="680" y="452" font-size="12" font-weight="600" fill="#12402a" text-anchor="middle">③ 顺序扫</text>
  <text x="680" y="472" font-size="10.5" fill="#2f6f4f" text-anchor="middle">前扫到目标 offset</text>
  <rect x="830" y="424" width="170" height="66" rx="10" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="915" y="452" font-size="11.5" font-weight="600" fill="#274a78" text-anchor="middle">内存映射 mmap</text>
  <text x="915" y="472" font-size="10.5" fill="#5b7db1" text-anchor="middle">走 OS 缓冲区（:72）</text>
  <polyline points="280,457 330,457" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <polyline points="530,457 580,457" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
</svg>
