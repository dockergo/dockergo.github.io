<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Kafka 原理 · 依赖矩阵（接触面 API × 支撑能力域）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">两个接触面 API 各依赖哪些支撑域:● 强依赖(核心路径) ○ 间接依赖;所有 topic/分区/leader 元数据统一来自 KRaft</text>

  <!-- column headers (support domains) -->
  <rect x="248" y="70" width="196" height="40" rx="9" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="346" y="88" font-size="10" font-weight="600" fill="#5a3410" text-anchor="middle">日志存储</text>
  <text x="346" y="103" font-size="8" fill="#93762e" text-anchor="middle">追加 / 顺序读 / 零拷贝</text>
  <rect x="450" y="70" width="196" height="40" rx="9" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="548" y="88" font-size="10" font-weight="600" fill="#5a3410" text-anchor="middle">副本与 ISR</text>
  <text x="548" y="103" font-size="8" fill="#93762e" text-anchor="middle">acks / HW / min.insync</text>
  <rect x="652" y="70" width="196" height="40" rx="9" fill="#ffffff" stroke="#ececf1"/>
  <text x="750" y="88" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">网络与请求处理</text>
  <text x="750" y="103" font-size="8" fill="#6e6e73" text-anchor="middle">KafkaApis / purgatory</text>
  <rect x="854" y="70" width="196" height="40" rx="9" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="952" y="88" font-size="10" font-weight="600" fill="#12402a" text-anchor="middle">消费者组与协调</text>
  <text x="952" y="103" font-size="8" fill="#2f6f4f" text-anchor="middle">rebalance / 位点</text>

  <!-- row: produce -->
  <rect x="30" y="118" width="212" height="86" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="46" y="150" font-size="12" font-weight="600" fill="#3d2a5a">produce API</text>
  <text x="46" y="170" font-size="8.6" fill="#8a6db0">send 攒批 → Sender 发</text>
  <text x="46" y="187" font-size="8.6" fill="#8a6db0">写入路径</text>

  <rect x="248" y="118" width="196" height="86" rx="10" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="346" y="140" font-size="12" font-weight="700" fill="#5a3410" text-anchor="middle">●</text>
  <text x="346" y="162" font-size="8.8" fill="#5a3410" text-anchor="middle">Leader 追加</text>
  <text x="346" y="178" font-size="8.8" fill="#93762e" text-anchor="middle">active LogSegment</text>
  <text x="346" y="194" font-size="8.8" fill="#93762e" text-anchor="middle">顺序写尾部</text>

  <rect x="450" y="118" width="196" height="86" rx="10" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="548" y="140" font-size="12" font-weight="700" fill="#5a3410" text-anchor="middle">●</text>
  <text x="548" y="162" font-size="8.8" fill="#5a3410" text-anchor="middle">acks=all 等 ISR</text>
  <text x="548" y="178" font-size="8.8" fill="#93762e" text-anchor="middle">全部同步副本确认</text>
  <text x="548" y="194" font-size="8.8" fill="#93762e" text-anchor="middle">HW 推进才算成功</text>

  <rect x="652" y="118" width="196" height="86" rx="10" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="750" y="140" font-size="12" font-weight="700" fill="#1d1d1f" text-anchor="middle">●</text>
  <text x="750" y="162" font-size="8.8" fill="#1d1d1f" text-anchor="middle">purgatory 延迟</text>
  <text x="750" y="178" font-size="8.8" fill="#6e6e73" text-anchor="middle">挂起 ProduceRequest</text>
  <text x="750" y="194" font-size="8.8" fill="#6e6e73" text-anchor="middle">等 ISR 齐再应答</text>

  <rect x="854" y="118" width="196" height="86" rx="10" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="952" y="156" font-size="11" fill="#c7c7cc" text-anchor="middle">○</text>
  <text x="952" y="176" font-size="8.6" fill="#a1a1a6" text-anchor="middle">不直接依赖</text>

  <!-- row: consume -->
  <rect x="30" y="214" width="212" height="86" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="46" y="246" font-size="12" font-weight="600" fill="#3d2a5a">consume API</text>
  <text x="46" y="266" font-size="8.6" fill="#8a6db0">poll → fetch → 提交位点</text>
  <text x="46" y="283" font-size="8.6" fill="#8a6db0">读取路径</text>

  <rect x="248" y="214" width="196" height="86" rx="10" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="346" y="236" font-size="12" font-weight="700" fill="#5a3410" text-anchor="middle">●</text>
  <text x="346" y="258" font-size="8.8" fill="#5a3410" text-anchor="middle">顺序读 + 零拷贝</text>
  <text x="346" y="274" font-size="8.8" fill="#93762e" text-anchor="middle">sendfile 直发</text>
  <text x="346" y="290" font-size="8.8" fill="#93762e" text-anchor="middle">按 offset 定位读</text>

  <rect x="450" y="214" width="196" height="86" rx="10" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="548" y="248" font-size="11" fill="#c7c7cc" text-anchor="middle">○</text>
  <text x="548" y="268" font-size="8.6" fill="#a1a1a6" text-anchor="middle">仅读到 HW</text>
  <text x="548" y="284" font-size="8.6" fill="#a1a1a6" text-anchor="middle">(可见边界受 ISR 约束)</text>

  <rect x="652" y="214" width="196" height="86" rx="10" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="750" y="240" font-size="12" font-weight="700" fill="#1d1d1f" text-anchor="middle">●</text>
  <text x="750" y="262" font-size="8.8" fill="#1d1d1f" text-anchor="middle">FetchRequest 分派</text>
  <text x="750" y="280" font-size="8.8" fill="#6e6e73" text-anchor="middle">数据不足挂 purgatory</text>

  <rect x="854" y="214" width="196" height="86" rx="10" fill="#e6f7ee" stroke="#bfe0cd"/>
  <text x="952" y="236" font-size="12" font-weight="700" fill="#12402a" text-anchor="middle">●</text>
  <text x="952" y="258" font-size="8.8" fill="#12402a" text-anchor="middle">组内分区分配</text>
  <text x="952" y="274" font-size="8.8" fill="#2f6f4f" text-anchor="middle">rebalance</text>
  <text x="952" y="290" font-size="8.8" fill="#2f6f4f" text-anchor="middle">位点存/取</text>

  <!-- KRaft foundation bar -->
  <rect x="30" y="322" width="1020" height="72" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="346" font-size="12" font-weight="700" fill="#1b2a4a">KRaft 元数据 · 统一底座</text>
  <text x="46" y="368" font-size="9.2" fill="#5b7db1">一切 topic / 分区 / leader / 配置 元数据均来自 KRaft 控制器,经 __cluster_metadata 传播;produce 找 Leader、consume 找协调器所在 Broker 都靠它</text>
  <text x="46" y="386" font-size="9.2" fill="#5b7db1">两个 API 在发起任何请求前都需先获取集群元数据(哪个 Broker 是分区 Leader / 组协调器)——元数据是所有路径的前置依赖</text>

  <!-- dependency arrows from both API rows down to KRaft -->
  <path d="M136,204 L136,314 L136,322" stroke="#c9b6de" stroke-width="1.4" stroke-dasharray="5 4" fill="none" marker-end="url(#ar)"/>
  <path d="M136,300 L136,322" stroke="#c9b6de" stroke-width="1.4" stroke-dasharray="5 4" fill="none"/>

  <text x="30" y="424" font-size="10" font-weight="700" fill="#1d1d1f">读法</text>
  <text x="30" y="444" font-size="9" fill="#6e6e73">produce = 日志存储(追加)● + 副本ISR(acks=all 等 ISR 确认)● + 网络(purgatory 延迟到 ISR 齐)●;对消费者组无直接依赖</text>
  <text x="30" y="463" font-size="9" fill="#6e6e73">consume = 日志存储(顺序读 + 零拷贝)● + 消费者组(位点/rebalance)● + 网络(fetch 分派)●;副本 ISR 仅经 HW 间接约束可见范围</text>
  <text x="30" y="482" font-size="9" fill="#5b7db1">虚线:两个 API 的元数据来源统一指向 KRaft 底座——横向依赖之外的纵向前置依赖</text>
</svg>
