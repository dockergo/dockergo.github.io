<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="510" viewBox="0 0 1080 510" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="510" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Kafka 消费者组 · 组协调器（两层架构）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">异步服务层(校验+调度) → 单线程分片(委托 GroupMetadataManager);请求只生成记录、replay 才应用(与 KRaft 同构)</text>

  <!-- request entry -->
  <rect x="30" y="74" width="180" height="70" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="120" y="104" font-size="10.5" font-weight="600" fill="#3d2a5a" text-anchor="middle">consumer 请求</text>
  <text x="120" y="124" font-size="8.4" fill="#8a6db0" text-anchor="middle">consumerGroupHeartbeat</text>
  <text x="120" y="138" font-size="8.4" fill="#8a6db0" text-anchor="middle">/ commitOffset …</text>

  <!-- layer 1 service -->
  <rect x="240" y="74" width="810" height="118" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="256" y="98" font-size="11.5" font-weight="700" fill="#1b2a4a">第 1 层 · 异步服务 GroupCoordinatorService（GroupCoordinatorService.java:519）</text>

  <rect x="256" y="110" width="380" height="70" rx="10" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="446" y="132" font-size="9.6" font-weight="600" fill="#274a78" text-anchor="middle">校验请求 + scheduleWriteOperation</text>
  <text x="446" y="152" font-size="8.4" fill="#5b7db1" text-anchor="middle">参数/权限校验后,把写操作调度到对应分片</text>
  <text x="446" y="168" font-size="8.4" fill="#5b7db1" text-anchor="middle">异步:不阻塞网络线程</text>

  <rect x="652" y="110" width="382" height="70" rx="10" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="843" y="132" font-size="9.6" font-weight="600" fill="#274a78" text-anchor="middle">协调器分布定位</text>
  <text x="843" y="152" font-size="8.4" fill="#5b7db1" text-anchor="middle">groupId.hashCode() % numPartitions</text>
  <text x="843" y="168" font-size="8.4" fill="#5b7db1" text-anchor="middle">决定哪个 Broker 是某组协调器(:449)</text>

  <line x1="210" y1="109" x2="240" y2="120" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- layer 2 shard -->
  <rect x="240" y="210" width="810" height="132" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="256" y="234" font-size="11.5" font-weight="700" fill="#12402a">第 2 层 · 单线程分片 GroupCoordinatorShard（GroupCoordinatorShard.java:472）</text>

  <rect x="256" y="246" width="380" height="82" rx="10" fill="#e6f7ee" stroke="#bfe0cd"/>
  <text x="446" y="268" font-size="9.6" font-weight="600" fill="#12402a" text-anchor="middle">委托 GroupMetadataManager</text>
  <text x="446" y="288" font-size="8.4" fill="#2f6f4f" text-anchor="middle">组状态与 rebalance 逻辑的实际持有者</text>
  <text x="446" y="306" font-size="8.4" fill="#2f6f4f" text-anchor="middle">单线程:一个分片串行处理,无并发竞争</text>
  <text x="446" y="322" font-size="8.4" fill="#2f6f4f" text-anchor="middle">(与 KRaft 单线程事件队列同构)</text>

  <rect x="652" y="246" width="382" height="82" rx="10" fill="#e6f7ee" stroke="#bfe0cd"/>
  <text x="843" y="268" font-size="9.6" font-weight="600" fill="#12402a" text-anchor="middle">关键模式:记录 vs 应用分离</text>
  <text x="843" y="288" font-size="8.4" fill="#2f6f4f" text-anchor="middle">请求处理器只生成记录、不改状态</text>
  <text x="843" y="306" font-size="8.4" fill="#2f6f4f" text-anchor="middle">replay 方法才应用(GroupCoordinatorShard:150)</text>
  <text x="843" y="322" font-size="8.4" fill="#2f6f4f" text-anchor="middle">位点/组状态 = 复制日志上的状态机</text>

  <path d="M446,180 L446,210" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M843,180 L843,210" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- CoordinatorRuntime bottom -->
  <rect x="240" y="360" width="810" height="96" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="256" y="384" font-size="11" font-weight="700" fill="#5a3410">CoordinatorRuntime（coordinator-common/）· 复制日志运行时</text>
  <g font-size="8.6" text-anchor="middle">
    <rect x="256" y="396" width="252" height="48" rx="9" fill="#fdf6ea" stroke="#efdcb4"/><text x="382" y="416" font-weight="600" fill="#5a3410">① 先 replay 进内存</text><text x="382" y="433" fill="#93762e">timeline 结构应用记录</text>
    <rect x="524" y="396" width="252" height="48" rx="9" fill="#fdf6ea" stroke="#efdcb4"/><text x="650" y="416" font-weight="600" fill="#5a3410">② 再追加复制日志</text><text x="650" y="433" fill="#93762e">写 __consumer_offsets</text>
    <rect x="792" y="396" width="242" height="48" rx="9" fill="#fdf6ea" stroke="#efdcb4"/><text x="913" y="416" font-weight="600" fill="#5a3410">③ 可从日志恢复</text><text x="913" y="433" fill="#93762e">协调器故障可重建状态</text>
  </g>
  <path d="M446,342 L446,360" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <text x="30" y="480" font-size="8.8" fill="#a1a1a6">误区:分配是消费者自己商量的 —— KIP-848 起由协调器(服务端)算分配、客户端只对账;位点存 __consumer_offsets(服务端),换消费者/重启能续上</text>
</svg>
