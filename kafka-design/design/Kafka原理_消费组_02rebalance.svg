<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Kafka 消费者组 · rebalance（KIP-848 服务端主导分配）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">分配由协调器计算(不再客户端 leader 算);心跳三步 → CurrentAssignmentBuilder 4 态机增量 delta 下发,避免 stop-the-world</text>

  <!-- heartbeat 3 steps -->
  <text x="30" y="80" font-size="9.5" font-weight="600" fill="#86868b">心跳三步（GroupMetadataManager.java:2479）</text>

  <rect x="30" y="90" width="330" height="96" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="195" y="114" font-size="10.5" font-weight="700" fill="#12402a" text-anchor="middle">① 更新成员</text>
  <text x="195" y="136" font-size="8.6" fill="#2f6f4f" text-anchor="middle">收心跳 → 更新该成员的订阅/epoch</text>
  <text x="195" y="154" font-size="8.6" fill="#2f6f4f" text-anchor="middle">成员增减在此感知</text>
  <text x="195" y="172" font-size="8.6" fill="#2f6f4f" text-anchor="middle">触发下游是否需要重算</text>

  <rect x="374" y="90" width="330" height="96" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="539" y="114" font-size="10.5" font-weight="700" fill="#12402a" text-anchor="middle">② maybeUpdateTargetAssignment</text>
  <text x="539" y="136" font-size="8.6" fill="#2f6f4f" text-anchor="middle">epoch 推进时重算全组目标分配</text>
  <text x="539" y="154" font-size="8.6" fill="#2f6f4f" text-anchor="middle">可插拔 PartitionAssignor(TargetAssignmentBuilder:4160)</text>
  <text x="539" y="172" font-size="8.6" fill="#2f6f4f" text-anchor="middle">RangeAssignor / UniformAssignor</text>

  <rect x="718" y="90" width="332" height="96" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="884" y="114" font-size="10.5" font-weight="700" fill="#12402a" text-anchor="middle">③ maybeReconcile</text>
  <text x="884" y="136" font-size="8.6" fill="#2f6f4f" text-anchor="middle">推进单成员向目标收敛</text>
  <text x="884" y="154" font-size="8.6" fill="#2f6f4f" text-anchor="middle">按 4 态机分步撤销/获取分区</text>
  <text x="884" y="172" font-size="8.6" fill="#2f6f4f" text-anchor="middle">增量 delta 下发,非全量</text>

  <line x1="360" y1="138" x2="374" y2="138" stroke="#c7c7cc" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="704" y1="138" x2="718" y2="138" stroke="#c7c7cc" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- 4-state machine -->
  <rect x="30" y="204" width="1020" height="196" rx="14" fill="#f3f7fc" stroke="#dbe7f5"/>
  <text x="46" y="228" font-size="11" font-weight="700" fill="#1b2a4a">增量对账 · CurrentAssignmentBuilder 4 态机（modern/consumer/CurrentAssignmentBuilder.java:187）</text>

  <rect x="60" y="246" width="200" height="88" rx="11" fill="#e6f7ee" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="160" y="272" font-size="10.5" font-weight="700" fill="#12402a" text-anchor="middle">STABLE</text>
  <text x="160" y="294" font-size="8.4" fill="#2f6f4f" text-anchor="middle">已收敛到目标分配</text>
  <text x="160" y="312" font-size="8.4" fill="#2f6f4f" text-anchor="middle">正常消费,无待处理变更</text>

  <rect x="316" y="246" width="200" height="88" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="416" y="272" font-size="10" font-weight="700" fill="#5a3410" text-anchor="middle">UNREVOKED_PARTITIONS</text>
  <text x="416" y="294" font-size="8.4" fill="#93762e" text-anchor="middle">等客户端放弃被撤分区</text>
  <text x="416" y="312" font-size="8.4" fill="#93762e" text-anchor="middle">先撤后给,避免重复消费</text>

  <rect x="572" y="246" width="200" height="88" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="672" y="272" font-size="10" font-weight="700" fill="#5a3410" text-anchor="middle">UNRELEASED_PARTITIONS</text>
  <text x="672" y="294" font-size="8.4" fill="#93762e" text-anchor="middle">目标分区尚未被前主释放</text>
  <text x="672" y="312" font-size="8.4" fill="#93762e" text-anchor="middle">等待可安全获取</text>

  <rect x="828" y="246" width="200" height="88" rx="11" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="928" y="272" font-size="10.5" font-weight="700" fill="#4a1414" text-anchor="middle">UNKNOWN</text>
  <text x="928" y="294" font-size="8.4" fill="#7a2a2a" text-anchor="middle">epoch 被 fence</text>
  <text x="928" y="312" font-size="8.4" fill="#7a2a2a" text-anchor="middle">→ 重入(重新加入组)</text>

  <line x1="260" y1="290" x2="316" y2="290" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="516" y1="290" x2="572" y2="290" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <path d="M772,320 L800,320 L800,360 L160,360 L160,334" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <text x="470" y="356" font-size="8" fill="#a1a1a6" text-anchor="middle">收敛完成回到 STABLE</text>
  <path d="M888,246 L860,220 L200,220 L172,246" stroke="#e0b8b8" stroke-width="1.3" stroke-dasharray="5 4" fill="none" marker-end="url(#ar)"/>
  <text x="530" y="216" font-size="8" fill="#c98a8a" text-anchor="middle">fence 异常 → UNKNOWN 触发重入</text>

  <!-- comparison classic vs KIP-848 -->
  <rect x="30" y="418" width="500" height="96" rx="12" fill="#fbeaea" stroke="#e7c3c3"/>
  <text x="46" y="440" font-size="10" font-weight="700" fill="#4a1414">经典协议(CLASSIC)· stop-the-world</text>
  <text x="46" y="460" font-size="8.6" fill="#7a2a2a">5 态组机:EMPTY / PREPARING_REBALANCE / COMPLETING_REBALANCE / STABLE / DEAD</text>
  <text x="46" y="478" font-size="8.6" fill="#7a2a2a">leader 客户端算分配上传(classic/ClassicGroupState.java:27)</text>
  <text x="46" y="498" font-size="8.6" fill="#7a2a2a">rebalance 时全组暂停消费(代价高)</text>

  <rect x="550" y="418" width="500" height="96" rx="12" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="566" y="440" font-size="10" font-weight="700" fill="#12402a">KIP-848(CONSUMER)· 增量对账</text>
  <text x="566" y="460" font-size="8.6" fill="#2f6f4f">协调器服务端算分配,客户端只对账</text>
  <text x="566" y="478" font-size="8.6" fill="#2f6f4f">分配以 delta 增量下发,不是每次全量</text>
  <text x="566" y="498" font-size="8.6" fill="#2f6f4f">大幅缓解 stop-the-world,更稳更快(推荐)</text>
</svg>
