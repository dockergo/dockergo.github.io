<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Kafka 事务 · 跨分区原子写（客户端状态机 + 事务协调器）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">客户端 TransactionManager 9 态机;协调器分 PID/epoch、登记分区、写 commit/abort 标记;一批跨多分区的写要么全成要么全不</text>

  <!-- client 9-state machine -->
  <rect x="30" y="72" width="1020" height="196" rx="14" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="46" y="96" font-size="11" font-weight="700" fill="#3d2a5a">客户端 TransactionManager · 9 态机（TransactionManager.java:157）</text>

  <g font-size="9" text-anchor="middle">
    <rect x="46" y="110" width="150" height="40" rx="9" fill="#faf4fb" stroke="#e2d2ee"/><text x="121" y="134" fill="#5a3d78">UNINITIALIZED</text>
    <rect x="216" y="110" width="150" height="40" rx="9" fill="#faf4fb" stroke="#e2d2ee"/><text x="291" y="134" fill="#5a3d78">INITIALIZING</text>
    <rect x="386" y="110" width="150" height="40" rx="9" fill="#faf4fb" stroke="#e2d2ee"/><text x="461" y="134" fill="#5a3d78">READY</text>
    <rect x="556" y="110" width="180" height="40" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="646" y="134" fill="#1b2a4a" font-weight="600">IN_TRANSACTION</text>
    <rect x="756" y="110" width="180" height="40" rx="9" fill="#faf4fb" stroke="#e2d2ee"/><text x="846" y="130" fill="#5a3d78">PREPARED_TRANSACTION</text><text x="846" y="144" font-size="7.4" fill="#8a6db0">KIP-939 两阶段提交</text>

    <rect x="386" y="176" width="150" height="40" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="461" y="200" fill="#12402a" font-weight="600">COMMITTING</text>
    <rect x="556" y="176" width="180" height="40" rx="9" fill="#fbeaea" stroke="#e7c3c3"/><text x="646" y="200" fill="#4a1414" font-weight="600">ABORTING</text>
    <rect x="756" y="176" width="180" height="40" rx="9" fill="#fbeaea" stroke="#e7c3c3"/><text x="846" y="200" fill="#4a1414">ABORTABLE_ERROR</text>
    <rect x="46" y="176" width="310" height="40" rx="9" fill="#fbeaea" stroke="#e7c3c3"/><text x="201" y="200" fill="#4a1414">FATAL_ERROR（不可恢复,需重建生产者）</text>
  </g>

  <!-- transitions -->
  <line x1="196" y1="130" x2="216" y2="130" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="366" y1="130" x2="386" y2="130" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="536" y1="130" x2="556" y2="130" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="736" y1="130" x2="756" y2="130" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <path d="M626,150 L560,176" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <path d="M646,150 L510,176" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <path d="M461,216 L461,236 L461,150 L461,150" stroke="#c9b6de" stroke-width="1.2" stroke-dasharray="4 3" fill="none"/>
  <text x="484" y="168" font-size="7.6" fill="#a1a1a6">commit</text>
  <text x="590" y="168" font-size="7.6" fill="#c98a8a">abort</text>
  <path d="M846,150 L846,160 L740,196" stroke="#e0b8b8" stroke-width="1.2" stroke-dasharray="4 3" fill="none" marker-end="url(#ar)"/>

  <text x="46" y="246" font-size="8.4" fill="#8a6db0">maybeAddPartition 把分区登记进当前事务(:465);事务性请求串行发送(Sender.maybeSendAndPollTransactionalRequest:460)保证顺序</text>

  <!-- transaction coordinator -->
  <rect x="30" y="288" width="1020" height="150" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="312" font-size="11" font-weight="700" fill="#1b2a4a">事务协调器 TransactionCoordinator（core/…/coordinator/transaction/TransactionCoordinator.scala）</text>

  <rect x="48" y="326" width="320" height="98" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="208" y="350" font-size="10" font-weight="700" fill="#274a78" text-anchor="middle">handleInitProducerId（:118）</text>
  <text x="208" y="372" font-size="8.6" fill="#5b7db1" text-anchor="middle">分配 PID / epoch</text>
  <text x="208" y="390" font-size="8.6" fill="#5b7db1" text-anchor="middle">同 transactional.id 跨会话 fencing</text>
  <text x="208" y="408" font-size="8.6" fill="#5b7db1" text-anchor="middle">(旧生产者被隔离)</text>

  <rect x="382" y="326" width="320" height="98" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="542" y="350" font-size="10" font-weight="700" fill="#274a78" text-anchor="middle">handleAddPartitionsToTransaction（:417）</text>
  <text x="542" y="372" font-size="8.6" fill="#5b7db1" text-anchor="middle">登记事务涉及的分区</text>
  <text x="542" y="390" font-size="8.6" fill="#5b7db1" text-anchor="middle">协调器记录事务成员分区集</text>
  <text x="542" y="408" font-size="8.6" fill="#5b7db1" text-anchor="middle">为结束时写标记做准备</text>

  <rect x="716" y="326" width="318" height="98" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="875" y="350" font-size="10" font-weight="700" fill="#12402a" text-anchor="middle">handleEndTransaction（:516）</text>
  <text x="875" y="372" font-size="8.6" fill="#2f6f4f" text-anchor="middle">往涉及分区写 commit/abort 标记</text>
  <text x="875" y="390" font-size="8.6" fill="#2f6f4f" text-anchor="middle">控制记录标记事务边界</text>
  <text x="875" y="408" font-size="8.6" fill="#2f6f4f" text-anchor="middle">(TransactionMarkerChannelManager)</text>

  <line x1="368" y1="375" x2="382" y2="375" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="702" y1="375" x2="716" y2="375" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <text x="30" y="464" font-size="9" fill="#6e6e73">事务让"一批跨多分区的写 + 位点提交"要么全成要么全不 —— commit/abort marker 是【日志存储】的控制记录,标记事务边界</text>
  <text x="30" y="486" font-size="8.8" fill="#a1a1a6">误区:事务能跨 Kafka 集群 —— 事务在单集群内跨分区原子,跨集群不保证;误区:开事务不影响吞吐 —— 有协调开销+标记写入+LSO 约束,非必要用幂等即可</text>
</svg>
