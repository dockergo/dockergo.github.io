<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Iceberg schema 演进 · 按不可变字段 ID 追踪</text>
  <text x="30" y="50" font-size="11" fill="#a1a1a6">列靠整数字段 ID(非名字/位置)追踪;rename 保 ID、加列给新 ID、删列去 ID —— data file 按 ID 存,全部零重写</text>

  <!-- Schema banner (metadata / blue) -->
  <rect x="40" y="80" width="1000" height="104" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="60" y="110" font-size="12.5" font-weight="600" fill="#1b2a4a">Schema · 字段 ID 映射（真相源）</text>
  <text x="60" y="129" font-size="9.5" fill="#5b7db1">api/.../Schema.java:78 · findField(int id) / findColumnName(int id)</text>
  <rect x="60" y="142" width="150" height="30" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="135" y="161" font-size="10.5" fill="#1b2a4a" text-anchor="middle">idToField</text>
  <rect x="224" y="142" width="150" height="30" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="299" y="161" font-size="10.5" fill="#1b2a4a" text-anchor="middle">idToName</text>
  <rect x="388" y="142" width="150" height="30" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="463" y="161" font-size="10.5" fill="#1b2a4a" text-anchor="middle">aliasToId</text>
  <rect x="552" y="142" width="270" height="30" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="687" y="161" font-size="10.5" fill="#1b2a4a" text-anchor="middle">highestFieldId 单调发新 ID</text>

  <!-- three evolution operations (interface / purple) -->
  <rect x="40" y="214" width="316" height="140" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="58" y="248" font-size="11.5" font-weight="600" fill="#3d2a5a">rename · 保 ID</text>
  <text x="58" y="276" font-size="10" fill="#3d2a5a">renameColumn 读 field.fieldId()</text>
  <text x="58" y="300" font-size="10" fill="#3d2a5a">只改 withName、保持同一 ID</text>
  <text x="58" y="330" font-size="10" font-weight="600" fill="#12402a">→ 不重写数据(按 ID 存)</text>

  <rect x="382" y="214" width="316" height="140" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="400" y="248" font-size="11.5" font-weight="600" fill="#3d2a5a">加列 · 给新 ID</text>
  <text x="400" y="276" font-size="10" fill="#3d2a5a">assignFreshIds 分配全新 ID</text>
  <text x="400" y="300" font-size="10" fill="#3d2a5a">须 optional 或有默认值</text>
  <text x="400" y="330" font-size="10" font-weight="600" fill="#12402a">→ 老文件缺该 ID 返回默认</text>

  <rect x="724" y="214" width="316" height="140" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="742" y="248" font-size="11.5" font-weight="600" fill="#3d2a5a">删列 · 去 ID / 改类型</text>
  <text x="742" y="276" font-size="10" fill="#3d2a5a">deleteColumn 去掉该 ID</text>
  <text x="742" y="300" font-size="10" fill="#3d2a5a">updateColumn 类型提升(int→long)</text>
  <text x="742" y="330" font-size="10" font-weight="600" fill="#12402a">→ 老文件按 ID 仍可读</text>

  <!-- Schema -> ops arrows -->
  <path d="M198,184 L198,214" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M540,184 L540,214" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M882,184 L882,214" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- data file (storage / amber) -->
  <rect x="40" y="398" width="478" height="86" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="58" y="430" font-size="12" font-weight="600" fill="#5a3410">data file · 列按字段 ID 标识存储</text>
  <text x="58" y="456" font-size="10" fill="#93762e">读时按字段 ID 投影 —— 不依赖列名/位置</text>

  <!-- conclusion (success / green) -->
  <rect x="560" y="398" width="480" height="86" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="578" y="430" font-size="12" font-weight="600" fill="#12402a">跨 schema 演进可读 · 零重写数据</text>
  <text x="578" y="456" font-size="10" fill="#2f6f4f">名字变 / 位置变 / 增删改列 → 老 data file 照样正确读</text>

  <!-- ops -> data file (merge) -->
  <path d="M540,354 L540,376 L279,376 L279,398" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="552" y="372" font-size="9" fill="#a1a1a6">三种演进都只改元数据映射</text>
  <!-- data file -> conclusion -->
  <path d="M518,441 L560,441" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
</svg>
