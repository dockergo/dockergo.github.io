<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="700" fill="#1d1d1f">接触面操作 × 支撑能力域 · 依赖矩阵</text>
  <text x="30" y="49" font-size="10" fill="#a1a1a6">● 强依赖　◐ 部分/条件依赖　空 = 基本不涉及。行=接触面对外操作,列=支撑能力域</text>

  <!-- column headers -->
  <g font-size="9" text-anchor="middle" fill="#48484a">
    <text x="330" y="82" font-weight="600">元数据树</text>
    <text x="425" y="82" font-weight="600">快照与提交</text>
    <text x="520" y="82" font-weight="600">schema 演进</text>
    <text x="615" y="82" font-weight="600">分区演进</text>
    <text x="710" y="82" font-weight="600">扫描规划</text>
    <text x="805" y="82" font-weight="600">行级删除</text>
    <text x="900" y="82" font-weight="600">catalog 并发</text>
    <text x="995" y="82" font-weight="600">表维护</text>
  </g>

  <!-- rows -->
  <g font-size="10">
  <!-- row template positions: y for each row -->
  <!-- 读 scan -->
  <rect x="30" y="92" width="240" height="44" rx="8" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="112" font-weight="700" fill="#1b2a4a">读 · TableScan</text>
  <text x="46" y="128" font-size="8.2" fill="#5b7db1">规划当前快照 data file</text>
  <!-- 时间旅行 -->
  <rect x="30" y="144" width="240" height="44" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="46" y="164" font-weight="700" fill="#274a78">时间旅行 / 增量读</text>
  <text x="46" y="180" font-size="8.2" fill="#5b7db1">pin 历史快照 / 快照间差异</text>
  <!-- 写 append/overwrite -->
  <rect x="30" y="196" width="240" height="44" rx="8" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="216" font-weight="700" fill="#12402a">写 · append / overwrite</text>
  <text x="46" y="232" font-size="8.2" fill="#2f6f4f">产 data file → 提交新快照</text>
  <!-- rowDelta -->
  <rect x="30" y="248" width="240" height="44" rx="8" fill="#f9ecec" stroke="#e8c9c9"/>
  <text x="46" y="268" font-weight="700" fill="#7a2230">行级删除 · rowDelta</text>
  <text x="46" y="284" font-size="8.2" fill="#a85560">写 delete file + 提交</text>
  <!-- DDL 演进 -->
  <rect x="30" y="300" width="240" height="44" rx="8" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="46" y="320" font-weight="700" fill="#3d2a5a">DDL · schema/分区演进</text>
  <text x="46" y="336" font-size="8.2" fill="#8a6db3">改元数据不重写数据</text>
  <!-- 维护 -->
  <rect x="30" y="352" width="240" height="44" rx="8" fill="#f7f7f9" stroke="#e3e3e8"/>
  <text x="46" y="372" font-weight="700" fill="#1d1d1f">维护 · compaction/expire</text>
  <text x="46" y="388" font-size="8.2" fill="#6e6e73">后台重写/回收</text>
  </g>

  <!-- cells: 8 columns centered at 330,425,520,615,710,805,900,995 ; rows centered at 114,166,218,270,322,374 -->
  <g font-size="13" text-anchor="middle" fill="#1b2a4a">
  <!-- 读: 元数据●,快照●(读快照),schema◐,分区◐,规划●,删除◐,catalog●,维护空 -->
  <text x="330" y="119">●</text><text x="425" y="119">●</text><text x="520" y="119">◐</text><text x="615" y="119">◐</text><text x="710" y="119">●</text><text x="805" y="119">◐</text><text x="900" y="119">●</text>
  <!-- 时间旅行: 元数据●,快照●,schema◐,,规划●,,catalog●, -->
  <text x="330" y="171">●</text><text x="425" y="171">●</text><text x="520" y="171">◐</text><text x="710" y="171">●</text><text x="900" y="171">●</text>
  <!-- 写: 元数据●,快照●,,分区◐,,,catalog●, -->
  <text x="330" y="223">●</text><text x="425" y="223">●</text><text x="615" y="223">◐</text><text x="900" y="223">●</text>
  <!-- rowDelta: 元数据●,快照●,,,,删除●,catalog●, -->
  <text x="330" y="275">●</text><text x="425" y="275">●</text><text x="805" y="275">●</text><text x="900" y="275">●</text>
  <!-- DDL: 元数据●,快照●,schema●,分区●,,,catalog●, -->
  <text x="330" y="327">●</text><text x="425" y="327">●</text><text x="520" y="327">●</text><text x="615" y="327">●</text><text x="900" y="327">●</text>
  <!-- 维护: 元数据●,快照●,,,,删除◐,catalog●,表维护● -->
  <text x="330" y="379">●</text><text x="425" y="379">●</text><text x="805" y="379">◐</text><text x="900" y="379">●</text><text x="995" y="379">●</text>
  </g>

  <!-- column guide lines -->
  <g stroke="#ececf1" stroke-width="1">
    <line x1="282" y1="92" x2="282" y2="396"/>
    <line x1="377" y1="92" x2="377" y2="396"/>
    <line x1="472" y1="92" x2="472" y2="396"/>
    <line x1="567" y1="92" x2="567" y2="396"/>
    <line x1="662" y1="92" x2="662" y2="396"/>
    <line x1="757" y1="92" x2="757" y2="396"/>
    <line x1="852" y1="92" x2="852" y2="396"/>
    <line x1="947" y1="92" x2="947" y2="396"/>
    <line x1="1042" y1="92" x2="1042" y2="396"/>
  </g>

  <rect x="30" y="416" width="1012" height="60" rx="12" fill="#f7f9fc" stroke="#e5ecf5"/>
  <text x="46" y="440" font-size="10.5" font-weight="700" fill="#1b2a4a">读点:一切操作都经 catalog(找当前 metadata 指针)+ 元数据树(读/写树)+ 快照与提交(读/产快照)</text>
  <text x="46" y="461" font-size="9.5" fill="#5b7db1">读依赖扫描规划(两级剪枝)+ 行级删除(叠加);写/DDL 依赖快照与提交(原子 CAS)+ 相应演进;维护是后台侧,与前台共享同一提交路径</text>
</svg>
