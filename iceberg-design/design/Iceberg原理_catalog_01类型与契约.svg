<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="700" fill="#1d1d1f">Catalog 与 TableOperations · 找表 + 提交契约</text>
  <text x="30" y="49" font-size="9.5" fill="#a1a1a6">Catalog 找表(表名→metadata 位置),TableOperations 抽象"读当前/刷新/原子提交"这一契约 · api/.../catalog/Catalog.java:33 · core/.../TableOperations.java:28</text>

  <!-- Catalog interface -->
  <rect x="30" y="72" width="500" height="150" rx="13" fill="#e7f0fb" stroke="#b9d2ef"/>
  <text x="46" y="96" font-size="11" font-weight="700" fill="#1b2a4a">Catalog（找表 / 建表 / 删表 / 列表）</text>
  <g font-size="9.3" fill="#5b7db1">
  <text x="46" y="120">loadTable(id) —— 拿到 Table(内含 TableOperations)</text>
  <text x="46" y="140">createTable / dropTable(id, purge) / listTables</text>
  <text x="46" y="160">renameTable / namespace 管理</text>
  </g>
  <text x="46" y="186" font-size="8.6" fill="#4a6fa0">catalog 只解决"表名 → 当前 metadata 位置"的映射</text>
  <text x="46" y="204" font-size="8.6" fill="#4a6fa0">拿到指针后,顺元数据树读/写由 TableOperations 承接</text>

  <!-- TableOperations -->
  <rect x="550" y="72" width="500" height="150" rx="13" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="566" y="96" font-size="11" font-weight="700" fill="#3d2a5a">TableOperations（提交契约 · 各 catalog 实现）</text>
  <g font-size="9.3" fill="#8a6db3">
  <text x="566" y="120">current() —— 当前 TableMetadata(:35)</text>
  <text x="566" y="140">refresh() —— 重读最新元数据(:42)</text>
  <text x="566" y="160">commit(base, metadata) —— 原子换指针(:64)</text>
  </g>
  <text x="566" y="186" font-size="8.6" fill="#a07dc4">commit 校验 base==current,否则 CommitFailedException</text>
  <text x="566" y="204" font-size="8.6" fill="#a07dc4">BaseMetastoreTableOperations 统一"写新 metadata + doCommit"</text>

  <line x1="280" y1="222" x2="280" y2="252" stroke="#b8b8bf" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="800" y1="222" x2="800" y2="252" stroke="#b8b8bf" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- catalog impl matrix -->
  <text x="30" y="270" font-size="11" font-weight="700" fill="#1d1d1f">catalog 实现 · 指针存哪 + 怎么原子换</text>
  <g font-size="8.8">
  <rect x="30" y="282" width="200" height="120" rx="11" fill="#f6f8fc" stroke="#dbe6f3"/>
  <text x="46" y="304" font-size="10" font-weight="700" fill="#1b2a4a">Hadoop</text>
  <text x="46" y="324" fill="#5b7db1">指针=目录序号文件</text>
  <text x="46" y="342" fill="#5b7db1">rename 原子提交</text>
  <text x="46" y="360" font-size="8" fill="#a1a1a6">依赖 FS 原子 rename</text>
  <text x="46" y="378" font-size="8" fill="#a1a1a6">S3 无原子 rename,弱</text>
  <text x="46" y="394" font-size="8" fill="#a1a1a6">测试/单机</text>

  <rect x="242" y="282" width="200" height="120" rx="11" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="258" y="304" font-size="10" font-weight="700" fill="#12402a">Hive metastore</text>
  <text x="258" y="324" fill="#2f6f4f">指针=HMS 表参数</text>
  <text x="258" y="342" fill="#2f6f4f">条件更新 + 锁</text>
  <text x="258" y="360" font-size="8" fill="#a1a1a6">兼容 Hive 生态</text>
  <text x="258" y="378" font-size="8" fill="#a1a1a6">HMS 成瓶颈/单点</text>
  <text x="258" y="394" font-size="8" fill="#a1a1a6">传统数仓迁移</text>

  <rect x="454" y="282" width="200" height="120" rx="11" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="470" y="304" font-size="10" font-weight="700" fill="#3d2a5a">JDBC</text>
  <text x="470" y="324" fill="#8a6db3">指针=关系表一行</text>
  <text x="470" y="342" fill="#8a6db3">条件 UPDATE(1 行)</text>
  <text x="470" y="360" font-size="8" fill="#a1a1a6">靠 DB 事务保证</text>
  <text x="470" y="378" font-size="8" fill="#a1a1a6">轻量、易部署</text>
  <text x="470" y="394" font-size="8" fill="#a1a1a6">中小规模</text>

  <rect x="666" y="282" width="200" height="120" rx="11" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="682" y="304" font-size="10" font-weight="700" fill="#5a3410">REST</text>
  <text x="682" y="324" fill="#93762e">指针由服务端管</text>
  <text x="682" y="342" fill="#93762e">CAS 在服务端</text>
  <text x="682" y="360" font-size="8" fill="#a1a1a6">引擎与 catalog 解耦</text>
  <text x="682" y="378" font-size="8" fill="#a1a1a6">可托管、多引擎共享</text>
  <text x="682" y="394" font-size="8" fill="#a1a1a6">RESTSessionCatalog</text>

  <rect x="878" y="282" width="172" height="120" rx="11" fill="#f7f7f9" stroke="#e3e3e8"/>
  <text x="894" y="304" font-size="10" font-weight="700" fill="#1d1d1f">Nessie / Glue</text>
  <text x="894" y="324" fill="#6e6e73">Nessie:Git 式分支</text>
  <text x="894" y="342" fill="#6e6e73">Glue:AWS 托管</text>
  <text x="894" y="360" font-size="8" fill="#a1a1a6">多表版本/分支</text>
  <text x="894" y="378" font-size="8" fill="#a1a1a6">云原生集成</text>
  <text x="894" y="394" font-size="8" fill="#a1a1a6">按平台选</text>
  </g>

  <rect x="30" y="418" width="1020" height="50" rx="12" fill="#f7f9fc" stroke="#e5ecf5"/>
  <text x="46" y="440" font-size="10" font-weight="700" fill="#1b2a4a">关键:并发正确性 = catalog 提供的"原子换指针"能力</text>
  <text x="46" y="459" font-size="9" fill="#5b7db1">catalog 越强(集中式、服务端 CAS),多写者并发越可靠;文件系统 catalog 依赖 FS 原子 rename,对象存储(S3)上并发弱。</text>

  <rect x="30" y="480" width="1020" height="46" rx="12" fill="#f0f0f4" stroke="#d2d2d7"/>
  <text x="46" y="508" font-size="9" fill="#48484a"><tspan font-weight="700">归属:</tspan> catalog 找表 + 提供提交原语在本主线;快照产出 + OCC 重试逻辑在【快照与提交】;元数据树结构在【元数据树】。三者共同实现 ACID。</text>
</svg>
