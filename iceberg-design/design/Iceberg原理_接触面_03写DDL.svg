<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="700" fill="#1d1d1f">写与 DDL · 统一走"改元数据 → 原子提交新快照"</text>
  <text x="30" y="49" font-size="9.5" fill="#a1a1a6">引擎只管产 data file 和调 API;原子性/一致性由 Iceberg 保证 · core/.../SnapshotProducer.java</text>

  <!-- write data -->
  <rect x="30" y="70" width="330" height="180" rx="12" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="94" font-size="11" font-weight="700" fill="#12402a">写数据 · SnapshotProducer</text>
  <g font-size="9" fill="#2f6f4f">
  <text x="46" y="118">append —— 纯追加(无冲突)</text>
  <text x="46" y="138">overwrite —— 覆盖分区/条件</text>
  <text x="46" y="158">rowDelta —— 行级删除(v2)</text>
  <text x="46" y="178">replace —— compaction 重写</text>
  </g>
  <text x="46" y="206" font-size="8.5" fill="#5b8f6f">引擎写 data file → 产新 manifest/list</text>
  <text x="46" y="223" font-size="8.5" fill="#5b8f6f">→ 建新 TableMetadata → catalog CAS</text>
  <text x="46" y="242" font-size="8" fill="#a1a1a6">冲突则乐观重试(见快照与提交)</text>

  <!-- DDL -->
  <rect x="375" y="70" width="330" height="180" rx="12" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="391" y="94" font-size="11" font-weight="700" fill="#3d2a5a">DDL 演进 · 只改元数据</text>
  <g font-size="9" fill="#8a6db3">
  <text x="391" y="118">SchemaUpdate —— 加/删/rename 列</text>
  <text x="391" y="138">　按不可变字段 ID,不重写数据</text>
  <text x="391" y="158">UpdatePartitionSpec —— 演进分区</text>
  <text x="391" y="178">　新增 spec,老数据留老规则</text>
  <text x="391" y="198">UpdateProperties —— 表属性</text>
  </g>
  <text x="391" y="226" font-size="8.5" fill="#a07dc4">都产新 metadata.json 原子提交</text>
  <text x="391" y="244" font-size="8" fill="#a1a1a6">不停写、不重写数据(见演进篇)</text>

  <!-- maintenance -->
  <rect x="720" y="70" width="330" height="180" rx="12" fill="#f7f7f9" stroke="#e3e3e8"/>
  <text x="736" y="94" font-size="11" font-weight="700" fill="#1d1d1f">维护操作(后台)</text>
  <g font-size="9" fill="#6e6e73">
  <text x="736" y="118">expire snapshots —— 过期旧快照</text>
  <text x="736" y="138">rewrite data files —— 合并小文件</text>
  <text x="736" y="158">rewrite manifests —— 合并 manifest</text>
  <text x="736" y="178">remove orphan files —— 清孤儿</text>
  </g>
  <text x="736" y="206" font-size="8.5" fill="#8e8e93">由引擎存储过程/维护任务触发</text>
  <text x="736" y="224" font-size="8.5" fill="#8e8e93">同样经"提交新快照"路径</text>
  <text x="736" y="242" font-size="8" fill="#a1a1a6">详见【表维护】</text>

  <!-- unified path -->
  <line x1="195" y1="250" x2="480" y2="290" stroke="#b8b8bf" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="540" y1="250" x2="540" y2="290" stroke="#b8b8bf" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="885" y1="250" x2="600" y2="290" stroke="#b8b8bf" stroke-width="1.4" marker-end="url(#ar)"/>

  <rect x="290" y="292" width="500" height="70" rx="13" fill="#e7f0fb" stroke="#b9d2ef"/>
  <text x="540" y="320" font-size="12" font-weight="700" text-anchor="middle" fill="#1b2a4a">统一提交路径</text>
  <text x="540" y="343" font-size="9.5" text-anchor="middle" fill="#5b7db1">改元数据 → 写新 metadata.json(UUID)→ catalog 原子 CAS 换指针 → 冲突乐观重试</text>

  <rect x="30" y="384" width="1020" height="56" rx="12" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="408" font-size="10.5" font-weight="700" fill="#12402a">关键:写/DDL/维护三类操作,底层是同一套原子提交</text>
  <text x="46" y="428" font-size="9.5" fill="#2f6f4f">差别只在"改了元数据树的哪部分"(加 data file / 改 schema / 换 spec / 清快照);提交原子性、并发正确性由 Iceberg 统一保证</text>

  <rect x="30" y="452" width="1020" height="52" rx="12" fill="#f0f0f4" stroke="#d2d2d7"/>
  <text x="46" y="475" font-size="10" font-weight="700" fill="#48484a">引擎的分工</text>
  <text x="46" y="494" font-size="9" fill="#6e6e73">引擎:产 data file(真正写数据)+ 调 Iceberg API。Iceberg:管元数据、保证原子提交与一致性。二者边界清晰。</text>
</svg>
