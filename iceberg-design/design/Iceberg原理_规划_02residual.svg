<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Iceberg 扫描规划 · Residual 残差与 split 切分</text>
  <text x="30" y="50" font-size="11" fill="#a1a1a6">去掉分区已满足的谓词避免引擎重复过滤 → 组装 FileScanTask → planTasks 按 target split 切分合并</text>

  <!-- Residual (logic / blue tint) -->
  <rect x="40" y="80" width="1000" height="150" rx="13" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="60" y="110" font-size="12.5" font-weight="600" fill="#274a78">Residual · 残差谓词(按 spec id 缓存)</text>
  <text x="60" y="129" font-size="9.5" fill="#5b7db1">ResidualEvaluator · ManifestGroup.java:182 —— 已被分区满足的谓词从行过滤里去掉</text>
  <rect x="60" y="144" width="300" height="70" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="76" y="167" font-size="10" fill="#274a78">查询: WHERE day(ts)='2024-01-01'</text>
  <text x="76" y="189" font-size="9.5" fill="#5b7db1">分区就是 day(ts)</text>
  <text x="76" y="207" font-size="9.5" fill="#5b7db1">→ 已由分区剪枝保证</text>
  <path d="M360,179 L404,179" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <rect x="406" y="144" width="300" height="70" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="422" y="167" font-size="10" fill="#12402a">残差为空(residual = true)</text>
  <text x="422" y="189" font-size="9.5" fill="#2f6f4f">引擎读文件时无需再过滤</text>
  <text x="422" y="207" font-size="9.5" fill="#2f6f4f">省 CPU · 不重复过滤</text>
  <rect x="722" y="144" width="298" height="70" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="738" y="167" font-size="10" fill="#274a78">未被分区覆盖的谓词</text>
  <text x="738" y="189" font-size="9.5" fill="#5b7db1">保留为残差,下发引擎</text>
  <text x="738" y="207" font-size="9.5" fill="#5b7db1">读时按残差逐行过滤</text>

  <!-- FileScanTask assembly (amber) -->
  <rect x="40" y="262" width="1000" height="108" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="60" y="290" font-size="12.5" font-weight="600" fill="#5a3410">FileScanTask 组装 · 每个存活条目一个任务</text>
  <text x="60" y="309" font-size="9.5" fill="#93762e">BaseFileScanTask(dataFile, deleteFiles, schema, spec, residuals) · ManifestGroup.java:402</text>
  <rect x="60" y="322" width="228" height="34" rx="8" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="174" y="343" font-size="10" fill="#5a3410" text-anchor="middle">dataFile</text>
  <rect x="300" y="322" width="228" height="34" rx="8" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="414" y="343" font-size="10" fill="#5a3410" text-anchor="middle">deleteFiles(附匹配删除)</text>
  <rect x="540" y="322" width="228" height="34" rx="8" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="654" y="343" font-size="10" fill="#5a3410" text-anchor="middle">schema + spec</text>
  <rect x="780" y="322" width="240" height="34" rx="8" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="900" y="343" font-size="10" fill="#5a3410" text-anchor="middle">residuals(残差)</text>

  <path d="M540,230 L540,262" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- planTasks split (interface / purple) -->
  <rect x="40" y="402" width="1000" height="118" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="60" y="430" font-size="12.5" font-weight="600" fill="#3d2a5a">planTasks() · 按 target split 大小切分/合并</text>
  <text x="60" y="449" font-size="9.5" fill="#5b7db1">TableScanUtil.planTasks · BaseTableScan.java:43</text>
  <rect x="60" y="462" width="470" height="46" rx="8" fill="#ffffff" stroke="#e0d0ef"/>
  <text x="76" y="482" font-size="10" fill="#3d2a5a">大文件 → 切成多 split 并行读</text>
  <text x="76" y="500" font-size="9.5" fill="#5b7db1">匹配引擎并行度</text>
  <rect x="550" y="462" width="470" height="46" rx="8" fill="#ffffff" stroke="#e0d0ef"/>
  <text x="566" y="482" font-size="10" fill="#3d2a5a">小文件 → 合并减少任务数</text>
  <text x="566" y="500" font-size="9.5" fill="#5b7db1">不是一文件一任务</text>

  <path d="M540,370 L540,402" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
</svg>
