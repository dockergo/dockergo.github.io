<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="820" viewBox="0 0 1080 820" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="820" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Iceberg 核心原理 · 总架构图（位置即语义）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">开放表格式:数据文件之上的不可变元数据树,让一堆文件表现得像有 ACID/时间旅行/演进的表;自己不读写数据、不执行查询</text>

  <!-- compute engines (external) -->
  <rect x="30" y="64" width="1020" height="52" rx="13" fill="#f4f2ee" stroke="#e3ddd2" stroke-dasharray="6 4"/>
  <text x="46" y="84" font-size="11" font-weight="700" fill="#6e6357">计算引擎(非 Iceberg · 链接 Iceberg 库读写表,负责真正读写数据/执行查询)</text>
  <g text-anchor="middle" font-size="8.8">
    <rect x="46" y="92" width="320" height="20" rx="6" fill="#fbf6ef" stroke="#e6d8c4"/><text x="206" y="106" fill="#5a3410">Spark(读写+维护)</text>
    <rect x="376" y="92" width="320" height="20" rx="6" fill="#fbf6ef" stroke="#e6d8c4"/><text x="536" y="106" fill="#5a3410">Trino / Presto(查询)</text>
    <rect x="706" y="92" width="328" height="20" rx="6" fill="#fbf6ef" stroke="#e6d8c4"/><text x="870" y="106" fill="#5a3410">Flink(流式读写)</text>
  </g>

  <!-- API layer (iface) -->
  <rect x="30" y="130" width="1020" height="46" rx="13" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="46" y="153" font-size="11" fill="#3d2a5a"><tspan font-weight="700">① 接触面 · 表 API</tspan>　catalog 找表 · TableScan 读(时间旅行/增量)· SnapshotProducer 写 · SchemaUpdate/UpdatePartitionSpec 演进 DDL</text>
  <text x="46" y="169" font-size="8.6" fill="#8a6db3">给计算引擎集成的库 API,不面向终端用户 SQL</text>

  <!-- catalog row -->
  <rect x="30" y="190" width="1020" height="44" rx="12" fill="#e7f0fb" stroke="#b9d2ef"/>
  <text x="540" y="210" font-size="10.5" font-weight="700" text-anchor="middle" fill="#1b2a4a">② Catalog 与并发(表名 → 当前 metadata 位置 · 一个指针)Hadoop / Hive / JDBC / REST / Nessie / Glue</text>
  <text x="540" y="226" font-size="8.6" text-anchor="middle" fill="#5b7db1">TableOperations: current / refresh / commit(base, metadata) —— 原子换指针是 ACID 落点</text>

  <!-- metadata tree (core) -->
  <rect x="30" y="248" width="1020" height="196" rx="16" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="270" font-size="12" font-weight="700" fill="#1b2a4a">③ 不可变元数据树（核心 · 自带文件清单+列统计,不 list 目录）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="46" y="280" width="988" height="34" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="540" y="301" font-weight="600" fill="#274a78">metadata.json(根:schemas/specs/snapshots/currentSnapshotId)</text>
    <rect x="46" y="322" width="988" height="32" rx="8" fill="#e7f0fb" stroke="#b9d2ef"/><text x="540" y="342" fill="#1b2a4a">Snapshot(不可变,每提交一个,记父快照)→ 指向一个 manifest list</text>
    <rect x="46" y="362" width="988" height="32" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="540" y="382" fill="#274a78">Manifest list → Manifest files(带分区摘要,第一级剪枝)</text>
    <rect x="46" y="402" width="988" height="32" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="540" y="422" fill="#5a3410">Manifest → DataFile 条目(路径 + content 0/1/2 + 列统计 min/max/null,第二级剪枝)</text>
  </g>
  <line x1="540" y1="314" x2="540" y2="322" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="540" y1="354" x2="540" y2="362" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="540" y1="394" x2="540" y2="402" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- capabilities band: 6 boxes 2 rows -->
  <rect x="30" y="458" width="330" height="78" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="479" font-size="10.5" font-weight="700" fill="#12402a">④ 快照与提交(ACID · 灵魂)</text>
  <text x="46" y="497" font-size="8.4" fill="#2f6f4f">每提交产不可变快照(时间旅行/隔离免费)</text>
  <text x="46" y="512" font-size="8.4" fill="#2f6f4f">catalog 原子 CAS 换指针 + OCC 乐观重试</text>
  <text x="46" y="528" font-size="8" fill="#a1a1a6">SnapshotProducer.commit / runValidations</text>

  <rect x="375" y="458" width="330" height="78" rx="13" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="391" y="479" font-size="10.5" font-weight="700" fill="#3d2a5a">⑤ schema 演进</text>
  <text x="391" y="497" font-size="8.4" fill="#8a6db3">列靠不可变字段 ID 追踪(非名字/位置)</text>
  <text x="391" y="512" font-size="8.4" fill="#8a6db3">rename/加删列/类型提升都不重写数据</text>
  <text x="391" y="528" font-size="8" fill="#a1a1a6">SchemaUpdate / 字段 ID</text>

  <rect x="720" y="458" width="330" height="78" rx="13" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="736" y="479" font-size="10.5" font-weight="700" fill="#3d2a5a">⑥ 分区演进与隐藏分区</text>
  <text x="736" y="497" font-size="8.4" fill="#8a6db3">分区值从源列经 transform 派生(隐藏)</text>
  <text x="736" y="512" font-size="8.4" fill="#8a6db3">每 manifest 记 spec id,改规则不重写老数据</text>
  <text x="736" y="528" font-size="8" fill="#a1a1a6">PartitionSpec / Transforms</text>

  <rect x="30" y="548" width="330" height="78" rx="13" fill="#e7f0fb" stroke="#b9d2ef"/>
  <text x="46" y="569" font-size="10.5" font-weight="700" fill="#1b2a4a">⑦ 扫描规划</text>
  <text x="46" y="587" font-size="8.4" fill="#5b7db1">两级剪枝:manifest 分区剪 + 文件列统计剪</text>
  <text x="46" y="602" font-size="8.4" fill="#5b7db1">residual 残差 + planTasks split 切分</text>
  <text x="46" y="618" font-size="8" fill="#a1a1a6">DataTableScan / ManifestGroup</text>

  <rect x="375" y="548" width="330" height="78" rx="13" fill="#f9ecec" stroke="#e8c9c9"/>
  <text x="391" y="569" font-size="10.5" font-weight="700" fill="#7a2230">⑧ 行级删除(v2 · MoR)</text>
  <text x="391" y="587" font-size="8.4" fill="#a85560">position / equality delete file,不重写数据</text>
  <text x="391" y="602" font-size="8.4" fill="#a85560">读时 merge-on-read 叠加,按 seq 定作用范围</text>
  <text x="391" y="618" font-size="8" fill="#a1a1a6">DeleteFileIndex / delete manifest</text>

  <rect x="720" y="548" width="330" height="78" rx="13" fill="#f7f7f9" stroke="#e3e3e8"/>
  <text x="736" y="569" font-size="10.5" font-weight="700" fill="#1d1d1f">⑨ 表维护(后台)</text>
  <text x="736" y="587" font-size="8.4" fill="#6e6e73">compaction 合并小文件/物化删除</text>
  <text x="736" y="602" font-size="8.4" fill="#6e6e73">expire snapshots + 孤儿文件清理</text>
  <text x="736" y="618" font-size="8" fill="#a1a1a6">RewriteDataFiles / RemoveSnapshots</text>

  <!-- data files (object storage) -->
  <rect x="30" y="640" width="1020" height="52" rx="14" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="46" y="662" font-size="11" font-weight="700" fill="#5a3410">数据文件(对象存储 S3 / HDFS)· parquet / orc / avro + delete files</text>
  <text x="46" y="681" font-size="8.6" fill="#93762e">元数据树引用这些 data file(按字段 ID 存列);Iceberg 不读写数据,由计算引擎读;delete file 读时 merge-on-read 叠加</text>

  <!-- flow arrows -->
  <line x1="540" y1="116" x2="540" y2="130" stroke="#86868b" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="540" y1="176" x2="540" y2="190" stroke="#86868b" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="540" y1="234" x2="540" y2="248" stroke="#86868b" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- semantics -->
  <rect x="30" y="706" width="1020" height="48" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="727" font-size="11" font-weight="700" fill="#1d1d1f">位置即语义</text>
  <text x="46" y="745" font-size="8.6" fill="#6e6e73">上=计算引擎(外部);②接触面表API;②catalog与并发;③不可变元数据树(核心四层);④~⑨六大能力域;底=数据文件(对象存储)。Iceberg 只管元数据。</text>

  <!-- pervasive layer -->
  <rect x="30" y="768" width="1020" height="42" rx="12" fill="#f0f0f4" stroke="#d2d2d7"/>
  <text x="540" y="794" font-size="10" font-weight="700" text-anchor="middle" fill="#48484a">贯穿层 · sequence number(每提交递增)—— 快照/manifest 条目/行级删除都带 seq,删除靠 seq 比较决定作用范围,横切快照/元数据/删除</text>
</svg>
