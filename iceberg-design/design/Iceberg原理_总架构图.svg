<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="780" viewBox="0 0 1080 780" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="780" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Iceberg 核心原理 · 总架构图（位置即语义）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">开放表格式:数据文件之上的不可变元数据树,让一堆文件表现得像有 ACID/时间旅行/演进的表;自己不读写数据、不执行查询</text>

  <!-- compute engines (external) -->
  <rect x="30" y="64" width="1020" height="52" rx="13" fill="#f4f2ee" stroke="#e3ddd2" stroke-dasharray="6 4"/>
  <text x="46" y="84" font-size="11" font-weight="700" fill="#6e6357">计算引擎(非 Iceberg · 链接 Iceberg 库读写表)</text>
  <g text-anchor="middle" font-size="8.8">
    <rect x="46" y="92" width="320" height="20" rx="6" fill="#fbf6ef" stroke="#e6d8c4"/><text x="206" y="106" fill="#5a3410">Spark(读写+维护)</text>
    <rect x="376" y="92" width="320" height="20" rx="6" fill="#fbf6ef" stroke="#e6d8c4"/><text x="536" y="106" fill="#5a3410">Trino / Presto(查询)</text>
    <rect x="706" y="92" width="328" height="20" rx="6" fill="#fbf6ef" stroke="#e6d8c4"/><text x="870" y="106" fill="#5a3410">Flink(流式读写)</text>
  </g>

  <!-- API layer -->
  <rect x="30" y="130" width="1020" height="46" rx="13" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="46" y="158" font-size="11" fill="#3d2a5a"><tspan font-weight="700">表 API + catalog 接触面</tspan>　catalog 找表 · TableScan 读(时间旅行)· SnapshotProducer 写 · SchemaUpdate 演进 DDL</text>

  <!-- catalog -->
  <rect x="30" y="190" width="1020" height="42" rx="12" fill="#e7f0fb" stroke="#b9d2ef"/>
  <text x="540" y="216" font-size="10.5" font-weight="700" text-anchor="middle" fill="#1b2a4a">Catalog（表名 → 当前 metadata 位置 · 一个指针）Hadoop / Hive / JDBC / REST</text>

  <!-- metadata tree (core) -->
  <rect x="30" y="246" width="1020" height="200" rx="16" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="268" font-size="12" font-weight="700" fill="#1b2a4a">不可变元数据树（核心 · 自带文件清单+列统计,不 list 目录）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="46" y="280" width="988" height="38" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="540" y="303" font-weight="600" fill="#274a78">① metadata.json(根:schemas/specs/snapshots/currentSnapshotId)</text>
    <rect x="46" y="326" width="988" height="34" rx="8" fill="#e7f0fb" stroke="#b9d2ef"/><text x="540" y="348" fill="#1b2a4a">② Snapshot(不可变,每提交一个,记父快照)→ 指向一个 manifest list</text>
    <rect x="46" y="368" width="988" height="34" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="540" y="390" fill="#274a78">③ Manifest list → Manifest files(带分区摘要,第一级剪枝)</text>
    <rect x="46" y="410" width="988" height="30" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="540" y="430" fill="#5a3410">④ Manifest → DataFile 条目(路径 + content 0/1/2 + 列统计 min/max/null,第二级剪枝)</text>
  </g>
  <line x1="540" y1="318" x2="540" y2="326" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="540" y1="360" x2="540" y2="368" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="540" y1="402" x2="540" y2="410" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- capabilities row -->
  <rect x="30" y="460" width="500" height="96" rx="14" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="482" font-size="11" font-weight="700" fill="#12402a">快照与提交(ACID)</text>
  <text x="46" y="502" font-size="8.5" fill="#2f6f4f">· 每提交产不可变快照(时间旅行/隔离免费)</text>
  <text x="46" y="519" font-size="8.5" fill="#2f6f4f">· catalog 原子 CAS 换 metadata 指针</text>
  <text x="46" y="536" font-size="8.5" fill="#2f6f4f">· OCC 乐观重试 + 冲突检测</text>
  <text x="46" y="551" font-size="8" fill="#a1a1a6">SnapshotProducer.commit</text>

  <rect x="550" y="460" width="500" height="96" rx="14" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="566" y="482" font-size="11" font-weight="700" fill="#5a3410">schema/分区演进 + 扫描规划 + 行级删除</text>
  <text x="566" y="502" font-size="8.5" fill="#93762e">· 按字段 ID 演进(rename/加删列不重写数据)</text>
  <text x="566" y="519" font-size="8.5" fill="#93762e">· 隐藏分区 + 分区演进(每 manifest 记 spec id)</text>
  <text x="566" y="536" font-size="8.5" fill="#93762e">· 两级剪枝规划;v2 行级删除(MoR delete files)</text>
  <text x="566" y="551" font-size="8" fill="#a1a1a6">SchemaUpdate / ManifestGroup / DeleteFileIndex</text>

  <!-- data files (object storage) -->
  <rect x="30" y="570" width="1020" height="56" rx="14" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="46" y="592" font-size="11" font-weight="700" fill="#5a3410">数据文件(对象存储 S3/HDFS)· parquet / orc / avro + delete files</text>
  <text x="46" y="612" font-size="8.8" fill="#93762e">元数据树引用这些 data file(按字段 ID 存列);Iceberg 不读写数据,由计算引擎读;delete file(位置/等值删)读时 merge-on-read 叠加</text>

  <!-- flow arrows -->
  <line x1="540" y1="116" x2="540" y2="130" stroke="#86868b" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="540" y1="176" x2="540" y2="190" stroke="#86868b" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="540" y1="232" x2="540" y2="246" stroke="#86868b" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="540" y1="446" x2="540" y2="460" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="540" y1="556" x2="540" y2="570" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- semantics + pervasive -->
  <rect x="30" y="640" width="1020" height="52" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="662" font-size="11" font-weight="700" fill="#1d1d1f">位置即语义</text>
  <text x="46" y="682" font-size="8.8" fill="#6e6e73">上=计算引擎(外部);上中=表 API+catalog;中=不可变元数据树(核心,四层);中下=快照提交+演进+规划+删除;底=数据文件(对象存储)。Iceberg 只管元数据。</text>

  <rect x="30" y="704" width="1020" height="44" rx="12" fill="#f0f0f4" stroke="#d2d2d7"/>
  <text x="540" y="731" font-size="10" font-weight="700" text-anchor="middle" fill="#48484a">贯穿层 · sequence number(每提交递增)—— 快照/manifest 条目/行级删除都带 seq,删除靠 seq 比较决定作用范围,横切快照/元数据/删除</text>
</svg>
