<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="700" viewBox="0 0 1080 700" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="aHot" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="aRead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2b9ca8"/></marker>
    <marker id="aState" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c99a3a"/></marker>
    <marker id="aBg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8a5cae"/></marker>
    <marker id="aNeut" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#86868b"/></marker>
  </defs>
  <rect width="1080" height="700" fill="#fbfbfd"/>

  <!-- ===== 标题带 ===== -->
  <text x="30" y="28" font-size="14" font-weight="600" fill="#1d1d1f">Apache Iceberg 总架构 · 多视角透视：数据文件之上一棵不可变元数据树，让文件集表现得像有 ACID / 时间旅行的表</text>
  <text x="30" y="45" font-size="10.5" fill="#6e6e73">分层脊：计算引擎 → 表 API → catalog 指针 → 不可变元数据树（snapshot→manifest→data file）→ 对象存储　自己不读写数据、不执行查询</text>

  <!-- ===== 图例：四型语义路径 ===== -->
  <line x1="40" y1="88" x2="68" y2="88" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aHot)"/>
  <text x="74" y="92" font-size="10.5" fill="#3a3a3c">写 · commit 新快照 Hot</text>
  <line x1="250" y1="88" x2="278" y2="88" stroke="#2b9ca8" stroke-width="1.8" marker-end="url(#aRead)"/>
  <text x="284" y="92" font-size="10.5" fill="#3a3a3c">读 · 两级剪枝</text>
  <line x1="420" y1="88" x2="448" y2="88" stroke="#c99a3a" stroke-width="1.8" marker-end="url(#aState)"/>
  <text x="454" y="92" font-size="10.5" fill="#3a3a3c">元数据落地 State（不可变文件）</text>
  <line x1="720" y1="88" x2="748" y2="88" stroke="#8a5cae" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aBg)"/>
  <text x="754" y="92" font-size="10.5" fill="#3a3a3c">维护后台 compaction/expire（虚线）</text>
  <text x="1056" y="92" font-size="10" fill="#a1a1a6" text-anchor="end">框 = 主线可下钻</text>

  <!-- ===== powers 立身带 ===== -->
  <rect x="24" y="104" width="1032" height="26" rx="8" fill="#f6f6f8" stroke="#e2e2e7" data-tid="Iceberg原理_全景主线框架" data-lab="全景主线框架"/>
  <text x="40" y="121" font-size="10" fill="#4a4a4f">powers：开放表格式事实标准 —— 用元数据把一堆不可变文件组织成有 ACID / 时间旅行 / 演进的表；只管元数据，数据读写交给引擎</text>

  <!-- ===== 计算引擎（外部） ===== -->
  <rect x="24" y="138" width="1032" height="42" rx="13" fill="#f4f2ee" stroke="#e3ddd2" stroke-dasharray="6 4"/>
  <text x="40" y="157" font-size="10.5" font-weight="600" fill="#6e6357">计算引擎（外部 · 链接 Iceberg 库）· Spark 读写维护 · Trino / Presto 查询 · Flink 流式读写</text>
  <text x="40" y="172" font-size="8.5" fill="#93867a">负责真正读写数据 / 执行查询 —— Iceberg 自己不做</text>

  <!-- ===== ① 接触面 表 API ===== -->
  <rect x="24" y="188" width="1032" height="46" rx="13" fill="#f4eefb" stroke="#d9c7ec" data-tid="Iceberg原理_接触面_表API与快照读" data-lab="接触面·表API"/>
  <text x="40" y="209" font-size="11.5" font-weight="600" fill="#3d2a5a">① 接触面 · 表 API（给引擎集成的库，不面向终端 SQL）</text>
  <text x="40" y="226" font-size="9" fill="#8a6db3">catalog 找表 · TableScan 读（时间旅行/增量）· SnapshotProducer 写 · Schema/Partition 演进</text>

  <!-- ===== ② Catalog 与并发 ===== -->
  <rect x="24" y="242" width="1032" height="44" rx="12" fill="#e7f0fb" stroke="#b9d2ef" data-tid="Iceberg原理_支撑_catalog与并发" data-lab="catalog与并发"/>
  <text x="540" y="262" font-size="11" font-weight="600" text-anchor="middle" fill="#1b2a4a">② Catalog 与并发 · 表名 → 当前 metadata 位置（一个指针）</text>
  <text x="540" y="279" font-size="9" text-anchor="middle" fill="#5b7db1">Hadoop / Hive / JDBC / REST / Glue · commit(base, metadata) 原子换指针 = ACID 落点</text>

  <!-- ===== ③ 不可变元数据树（核心） ===== -->
  <rect x="24" y="294" width="1032" height="150" rx="16" fill="#eef3fb" stroke="#bcd0ec" data-tid="Iceberg原理_支撑_元数据树" data-lab="元数据树"/>
  <text x="40" y="314" font-size="12" font-weight="600" fill="#1b2a4a">③ 不可变元数据树（核心 · 自带文件清单 + 列统计，不 list 目录）</text>
  <g text-anchor="middle" font-size="9">
    <rect x="40" y="322" width="1000" height="26" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="540" y="339" font-weight="600" fill="#274a78">metadata.json（根：schemas / specs / snapshots / currentSnapshotId）</text>
    <rect x="40" y="352" width="1000" height="26" rx="8" fill="#e7f0fb" stroke="#b9d2ef"/><text x="540" y="369" fill="#1b2a4a">Snapshot（每次提交一个不可变快照，记父快照）→ 指向一个 manifest list</text>
    <rect x="40" y="382" width="1000" height="26" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="540" y="399" fill="#274a78">Manifest list → Manifest files（带分区摘要 · 第一级剪枝）</text>
    <rect x="40" y="412" width="1000" height="26" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="540" y="429" fill="#5a3410">Manifest → DataFile 条目（路径 + content 0/1/2 + 列统计 min/max/null · 第二级剪枝）</text>
  </g>
  <line x1="540" y1="348" x2="540" y2="352" stroke="#c99a3a" stroke-width="1.2" marker-end="url(#aState)"/>
  <line x1="540" y1="378" x2="540" y2="382" stroke="#c99a3a" stroke-width="1.2" marker-end="url(#aState)"/>
  <line x1="540" y1="408" x2="540" y2="412" stroke="#c99a3a" stroke-width="1.2" marker-end="url(#aState)"/>

  <!-- ===== 能力域（6 域 · 2 行） ===== -->
  <rect x="24" y="452" width="336" height="70" rx="13" fill="#f5faf6" stroke="#cfe6d5" data-tid="Iceberg原理_支撑_快照与提交" data-lab="快照与提交"/>
  <text x="40" y="473" font-size="10.5" font-weight="600" fill="#12402a">④ 快照与提交（ACID · 灵魂）</text>
  <text x="40" y="491" font-size="8.6" fill="#2f6f4f">每提交产不可变快照（时间旅行/隔离）</text>
  <text x="40" y="507" font-size="8.6" fill="#2f6f4f">catalog CAS 换指针 + OCC 乐观重试</text>

  <rect x="372" y="452" width="336" height="70" rx="13" fill="#f4eefb" stroke="#d9c7ec" data-tid="Iceberg原理_支撑_schema演进" data-lab="schema演进"/>
  <text x="388" y="473" font-size="10.5" font-weight="600" fill="#3d2a5a">⑤ schema 演进</text>
  <text x="388" y="491" font-size="8.6" fill="#8a6db3">列靠不可变字段 ID 追踪（非名字/位置）</text>
  <text x="388" y="507" font-size="8.6" fill="#8a6db3">rename/加删列/类型提升都不重写数据</text>

  <rect x="720" y="452" width="336" height="70" rx="13" fill="#f4eefb" stroke="#d9c7ec" data-tid="Iceberg原理_支撑_分区演进与隐藏分区" data-lab="分区演进"/>
  <text x="736" y="473" font-size="10.5" font-weight="600" fill="#3d2a5a">⑥ 分区演进 / 隐藏分区</text>
  <text x="736" y="491" font-size="8.6" fill="#8a6db3">分区值从源列经 transform 派生（隐藏）</text>
  <text x="736" y="507" font-size="8.6" fill="#8a6db3">每 manifest 记 spec id，改规则不重写老数据</text>

  <rect x="24" y="530" width="336" height="70" rx="13" fill="#e7f0fb" stroke="#b9d2ef" data-tid="Iceberg原理_支撑_扫描规划" data-lab="扫描规划"/>
  <text x="40" y="551" font-size="10.5" font-weight="600" fill="#1b2a4a">⑦ 扫描规划（读）</text>
  <text x="40" y="569" font-size="8.6" fill="#5b7db1">两级剪枝：manifest 分区剪 + 文件列统计剪</text>
  <text x="40" y="585" font-size="8.6" fill="#5b7db1">residual 残差 + planTasks split 切分</text>

  <rect x="372" y="530" width="336" height="70" rx="13" fill="#f9ecec" stroke="#e8c9c9" data-tid="Iceberg原理_支撑_行级删除" data-lab="行级删除"/>
  <text x="388" y="551" font-size="10.5" font-weight="600" fill="#7a2230">⑧ 行级删除（v2 · MoR）</text>
  <text x="388" y="569" font-size="8.6" fill="#a85560">position / equality delete file，不重写数据</text>
  <text x="388" y="585" font-size="8.6" fill="#a85560">读时按 seq 叠加 merge-on-read</text>

  <rect x="720" y="530" width="336" height="70" rx="13" fill="#f7f7f9" stroke="#e3e3e8" data-tid="Iceberg原理_支撑_表维护" data-lab="表维护"/>
  <text x="736" y="551" font-size="10.5" font-weight="600" fill="#1d1d1f">⑨ 表维护（后台）</text>
  <text x="736" y="569" font-size="8.6" fill="#6e6e73">compaction 合并小文件 / 物化删除</text>
  <text x="736" y="585" font-size="8.6" fill="#6e6e73">expire snapshots + 孤儿文件清理</text>

  <!-- ===== 数据文件（对象存储） ===== -->
  <rect x="24" y="614" width="1032" height="40" rx="14" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="40" y="633" font-size="10.5" font-weight="600" fill="#5a3410">数据文件（对象存储 S3 / HDFS）· parquet / orc / avro + delete files</text>
  <text x="40" y="648" font-size="8.5" fill="#93762e">元数据树引用这些 data file（按字段 ID 存列）· Iceberg 不读写数据，由引擎读；delete file 读时 MoR 叠加</text>

  <!-- ===== 语义分型连线 ===== -->
  <!-- 主脊（结构）：引擎 → 表API → catalog -->
  <line x1="540" y1="180" x2="540" y2="188" stroke="#86868b" stroke-width="1.5" marker-end="url(#aNeut)"/>
  <line x1="540" y1="234" x2="540" y2="242" stroke="#86868b" stroke-width="1.4" marker-end="url(#aNeut)"/>
  <!-- State：catalog 指针 → 元数据树 -->
  <line x1="540" y1="286" x2="540" y2="294" stroke="#c99a3a" stroke-width="1.6" marker-end="url(#aState)"/>
  <!-- Hot 写：④快照与提交 → 元数据树（commit 新 snapshot/manifest） -->
  <line x1="120" y1="451" x2="120" y2="444" stroke="#2f9e6e" stroke-width="1.6" marker-end="url(#aHot)"/>
  <text x="126" y="449" font-size="8" fill="#2f9e6e">commit 写新 snapshot</text>
  <!-- State：⑤schema/⑥分区演进 → 元数据树 -->
  <line x1="470" y1="451" x2="470" y2="444" stroke="#c99a3a" stroke-width="1.5" marker-end="url(#aState)"/>
  <text x="476" y="449" font-size="8" fill="#b08535">改 schemasById（字段 ID）</text>
  <line x1="820" y1="451" x2="820" y2="444" stroke="#c99a3a" stroke-width="1.5" marker-end="url(#aState)"/>
  <text x="826" y="449" font-size="8" fill="#b08535">改 specs（每 manifest 记 spec id）</text>
  <!-- Read：⑦扫描规划 → 数据文件（定位待读 data file，交引擎读） -->
  <line x1="120" y1="601" x2="120" y2="613" stroke="#2b9ca8" stroke-width="1.6" marker-end="url(#aRead)"/>
  <text x="126" y="610" font-size="8" fill="#2b9ca8">planTasks 定位待读 data file</text>
  <!-- State：⑧行级删除 → 数据文件（写 delete file） -->
  <line x1="468" y1="601" x2="468" y2="613" stroke="#c99a3a" stroke-width="1.5" marker-end="url(#aState)"/>
  <text x="474" y="610" font-size="8" fill="#b08535">写 delete file（不重写 data）</text>
  <!-- Bg：⑨表维护 → 数据文件（compaction 重写 / 清孤儿） -->
  <line x1="820" y1="601" x2="820" y2="613" stroke="#8a5cae" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#aBg)"/>
  <text x="826" y="610" font-size="8" fill="#8a5cae">compaction 重写 / 清孤儿（后台）</text>
  <!-- 行级删除 → 扫描规划：读时 MoR 叠加（横向虚线） -->
  <line x1="371" y1="558" x2="360" y2="558" stroke="#2b9ca8" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#aRead)"/>
  <text x="366" y="527" font-size="8" text-anchor="middle" fill="#2b9ca8">delete 附 FileScanTask · MoR 叠加</text>
  <!-- 扫描规划 → 元数据树：读存活快照 + 两级剪枝（左侧回路 · 主读流） -->
  <path d="M24,565 L12,565 L12,432 L24,432" fill="none" stroke="#2b9ca8" stroke-width="1.6" marker-end="url(#aRead)"/>
  <text x="8" y="500" font-size="8" fill="#2b9ca8" text-anchor="middle" transform="rotate(-90 8 500)">读存活 snapshot · 两级剪枝</text>
  <!-- manifest 条目 → 物理 data file：层级末端（右侧回路） -->
  <path d="M1056,428 L1068,428 L1068,636 L1056,636" fill="none" stroke="#c99a3a" stroke-width="1.5" marker-end="url(#aState)"/>
  <text x="1074" y="532" font-size="8" fill="#b08535" text-anchor="middle" transform="rotate(-90 1074 532)">manifest 条目 → 物理 data file</text>

  <!-- ===== 贯穿层 sequence number ===== -->
  <rect x="24" y="660" width="1032" height="24" rx="8" fill="#f0f0f4" stroke="#d2d2d7"/>
  <text x="540" y="676" font-size="9.5" font-weight="600" text-anchor="middle" fill="#48484a">贯穿层 · sequence number（每提交递增）—— 快照 / manifest 条目 / 行级删除都带 seq，删除靠 seq 比较决定作用范围，横切快照/元数据/删除</text>

  <!-- ===== 读法 ===== -->
  <text x="540" y="697" font-size="10" fill="#4a4a4f" text-anchor="middle">读法：写经表 API commit → catalog CAS 原子换 metadata 指针产新 snapshot → 读顺存活快照做两级剪枝定位 data file 交引擎读 → 维护后台 compaction/expire，全程 Iceberg 只改元数据</text>
</svg>
