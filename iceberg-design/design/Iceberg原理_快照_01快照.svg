<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="700" fill="#1d1d1f">快照 · 每次提交一个不可变版本(时间旅行/隔离免费)</text>
  <text x="30" y="49" font-size="9.5" fill="#a1a1a6">Snapshot 不可变:sequenceNumber/snapshotId/parentId/timestampMillis/operation/summary · api/.../Snapshot.java:42</text>

  <!-- snapshot chain -->
  <g text-anchor="middle" font-size="9.5">
    <rect x="60" y="80" width="180" height="70" rx="12" fill="#f3f7fc" stroke="#cfe0f2"/>
    <text x="150" y="106" font-weight="700" fill="#274a78">S1</text><text x="150" y="124" font-size="8.4" fill="#5b7db1">seq=1 · parent=∅</text><text x="150" y="140" font-size="8" fill="#a1a1a6">append</text>
    <rect x="330" y="80" width="180" height="70" rx="12" fill="#f3f7fc" stroke="#cfe0f2"/>
    <text x="420" y="106" font-weight="700" fill="#274a78">S2</text><text x="420" y="124" font-size="8.4" fill="#5b7db1">seq=2 · parent=S1</text><text x="420" y="140" font-size="8" fill="#a1a1a6">overwrite</text>
    <rect x="600" y="80" width="180" height="70" rx="12" fill="#e7f0fb" stroke="#b9d2ef"/>
    <text x="690" y="106" font-weight="700" fill="#1b2a4a">S3 (current)</text><text x="690" y="124" font-size="8.4" fill="#5b7db1">seq=3 · parent=S2</text><text x="690" y="140" font-size="8" fill="#a1a1a6">rowDelta</text>
    <rect x="870" y="80" width="160" height="70" rx="12" fill="#f5faf6" stroke="#cfe6d5" stroke-dasharray="5 4"/>
    <text x="950" y="106" font-weight="700" fill="#12402a">S4</text><text x="950" y="124" font-size="8.4" fill="#2f6f4f">下次提交</text><text x="950" y="140" font-size="8" fill="#a1a1a6">parent=S3</text>
  </g>
  <line x1="240" y1="115" x2="330" y2="115" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="510" y1="115" x2="600" y2="115" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="780" y1="115" x2="870" y2="115" stroke="#c7c7cc" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#ar)"/>
  <g font-size="7.5" fill="#a1a1a6" text-anchor="middle"><text x="285" y="108">parent</text><text x="555" y="108">parent</text></g>

  <!-- apply flow -->
  <rect x="30" y="176" width="1020" height="90" rx="12" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="200" font-size="11" font-weight="700" fill="#12402a">SnapshotProducer.apply 每次提交做什么</text>
  <text x="46" y="222" font-size="9.3" fill="#2f6f4f">① 分配 sequenceNumber = base.nextSequenceNumber(:297)　② 记录父快照 parentSnapshotId(:295,:298)</text>
  <text x="46" y="241" font-size="9.3" fill="#2f6f4f">③ 写新 manifest list　④ 返回全新 BaseSnapshot(:357) —— 不改任何旧快照</text>
  <text x="46" y="259" font-size="8.4" fill="#5b8f6f">旧快照永不改、永不删(除非显式 expire);snapshotsById 索引所有快照</text>

  <!-- three properties -->
  <g font-size="9.3">
  <rect x="30" y="286" width="330" height="118" rx="12" fill="#e7f0fb" stroke="#b9d2ef"/>
  <text x="46" y="310" font-size="10.5" font-weight="700" fill="#1b2a4a">快照链</text>
  <text x="46" y="332" fill="#5b7db1">每个新快照记 parentSnapshotId</text>
  <text x="46" y="351" fill="#5b7db1">(目标分支最新快照)</text>
  <text x="46" y="370" fill="#5b7db1">形成不可变版本链</text>

  <rect x="375" y="286" width="330" height="118" rx="12" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="391" y="310" font-size="10.5" font-weight="700" fill="#12402a">时间旅行免费</text>
  <text x="391" y="332" fill="#2f6f4f">旧快照永久保留</text>
  <text x="391" y="351" fill="#2f6f4f">按 id/时间读任意历史</text>
  <text x="391" y="370" fill="#2f6f4f">零额外存储成本</text>

  <rect x="720" y="286" width="330" height="118" rx="12" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="736" y="310" font-size="10.5" font-weight="700" fill="#274a78">快照隔离</text>
  <text x="736" y="332" fill="#5b7db1">读者 pin 一个快照</text>
  <text x="736" y="351" fill="#5b7db1">读它不可变的 manifests</text>
  <text x="736" y="370" fill="#5b7db1">别人提交新快照不影响</text>
  </g>

  <rect x="30" y="424" width="1020" height="56" rx="12" fill="#f0f0f4" stroke="#d2d2d7"/>
  <text x="46" y="448" font-size="10" font-weight="700" fill="#48484a">不可变是一切的根</text>
  <text x="46" y="468" font-size="9" fill="#6e6e73">因快照从不原地修改,时间旅行、快照隔离、无锁并发都成为"免费红利" —— 提交只是"加新快照 + 换 current 指针"。</text>
</svg>
