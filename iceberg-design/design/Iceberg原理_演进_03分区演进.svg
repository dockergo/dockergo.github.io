<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Iceberg 分区演进 · 改规则不重写老数据</text>
  <text x="30" y="50" font-size="11" fill="#a1a1a6">每 manifest 记自己的 spec id;TableMetadata 保留所有 spec —— 老数据留老规则、新数据用新规则</text>

  <!-- TableMetadata specsById (metadata / blue) -->
  <rect x="40" y="78" width="1000" height="92" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="60" y="106" font-size="12.5" font-weight="600" fill="#1b2a4a">TableMetadata.specsById · 保留所有分区规则(演进基础)</text>
  <text x="60" y="125" font-size="9.5" fill="#5b7db1">core/.../TableMetadata.java:262 · 改规则只加新 spec,老 spec 永不删</text>
  <rect x="640" y="120" width="180" height="34" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="730" y="141" font-size="10.5" fill="#1b2a4a" text-anchor="middle">spec 0 = day(ts)</text>
  <rect x="836" y="120" width="184" height="34" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="928" y="141" font-size="10.5" fill="#1b2a4a" text-anchor="middle">spec 1 = hour(ts) (新)</text>

  <!-- old data (amber) -->
  <rect x="40" y="204" width="470" height="150" rx="13" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="60" y="234" font-size="12" font-weight="600" fill="#5a3410">老数据 · 留老 spec</text>
  <rect x="60" y="250" width="430" height="30" rx="8" fill="#ffffff" stroke="#efdcb4"/>
  <text x="76" y="270" font-size="10" fill="#5a3410">manifest A · partition_spec_id = 0</text>
  <text x="76" y="300" font-size="9.5" fill="#93762e">按 day(ts) 分区 —— 规则改动后不重写</text>
  <text x="76" y="322" font-size="9.5" fill="#93762e">ManifestFile.java:36 记录自身 spec id</text>

  <!-- new data (amber variant) -->
  <rect x="570" y="204" width="470" height="150" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="590" y="234" font-size="12" font-weight="600" fill="#5a3410">新数据 · 用新 spec</text>
  <rect x="590" y="250" width="430" height="30" rx="8" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="606" y="270" font-size="10" fill="#5a3410">manifest B · partition_spec_id = 1</text>
  <text x="606" y="300" font-size="9.5" fill="#93762e">按 hour(ts) 分区 —— 演进后写入的数据</text>
  <text x="606" y="322" font-size="9.5" fill="#93762e">新老 spec 共存,互不影响</text>

  <path d="M730,170 L730,192 L275,192 L275,204" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M928,170 L928,192 L805,192 L805,204" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- scan by per-manifest spec (logic / blue tint) -->
  <rect x="40" y="386" width="1000" height="130" rx="13" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="60" y="416" font-size="12.5" font-weight="600" fill="#274a78">扫描 · 按每 manifest 的 spec 正确读</text>
  <text x="60" y="436" font-size="9.5" fill="#5b7db1">ManifestFiles.read(manifest, io, specsById) · ManifestGroup.java:345</text>
  <rect x="60" y="452" width="470" height="46" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="76" y="472" font-size="10" fill="#274a78">读 manifest A → 查 specsById[0] = day(ts)</text>
  <text x="76" y="490" font-size="9.5" fill="#5b7db1">按 day 规则剪枝</text>
  <rect x="550" y="452" width="470" height="46" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="566" y="472" font-size="10" fill="#274a78">读 manifest B → 查 specsById[1] = hour(ts)</text>
  <text x="566" y="490" font-size="9.5" fill="#5b7db1">按 hour 规则剪枝</text>

  <path d="M275,354 L275,386" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M805,354 L805,386" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
</svg>
