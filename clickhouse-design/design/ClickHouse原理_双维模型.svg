<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="720" viewBox="0 0 1060 720" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="720" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">双维模型：能力域（管什么）× 执行时机（何时做）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">4 接口主线纵向面向用户；7 支撑能力域横切面向引擎内部；后台任务是正交的"执行时机"维度，承接各域异步部分</text>

  <!-- axis labels -->
  <text x="45" y="92" font-size="11" font-weight="700" fill="#1d1d1f">纵轴：能力域</text>
  <text x="530" y="672" font-size="11" font-weight="700" fill="#1d1d1f" text-anchor="middle">横轴：执行时机　前台同步（请求路径）　←→　后台异步（守护线程）</text>

  <!-- foreground column band -->
  <rect x="150" y="104" width="500" height="520" rx="16" fill="#f3f7fc" stroke="#e3ecf7"/>
  <text x="400" y="126" font-size="12" font-weight="600" fill="#274a78" text-anchor="middle">前台同步（一条请求的路径上完成）</text>
  <!-- background column band -->
  <rect x="670" y="104" width="360" height="520" rx="16" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="850" y="126" font-size="12" font-weight="600" fill="#7a5a1e" text-anchor="middle">后台异步（守护线程）</text>

  <!-- interface mainlines (top, foreground) -->
  <text x="60" y="160" font-size="10.5" font-weight="700" fill="#1b2a4a">接口主线</text>
  <g text-anchor="middle">
    <rect x="164" y="146" width="112" height="44" rx="9" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="220" y="166" font-size="11" font-weight="600" fill="#1b2a4a">DDL</text><text x="220" y="181" font-size="8" fill="#5b7db1">建/改元数据</text>
    <rect x="284" y="146" width="112" height="44" rx="9" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="340" y="166" font-size="11" font-weight="600" fill="#1b2a4a">DML</text><text x="340" y="181" font-size="8" fill="#5b7db1">写数据</text>
    <rect x="404" y="146" width="112" height="44" rx="9" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="460" y="166" font-size="11" font-weight="600" fill="#1b2a4a">DQL</text><text x="460" y="181" font-size="8" fill="#5b7db1">读数据</text>
    <rect x="524" y="146" width="112" height="44" rx="9" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="580" y="166" font-size="11" font-weight="600" fill="#1b2a4a">DCL</text><text x="580" y="181" font-size="8" fill="#5b7db1">管权限</text>
  </g>

  <!-- support capability domains (rows) -->
  <text x="60" y="222" font-size="10.5" font-weight="700" fill="#7a5a1e">支撑能力域</text>
  <g>
    <!-- each row spans foreground; some extend to background -->
    <rect x="60" y="230" width="80" height="360" rx="8" fill="none"/>
  </g>
  <g font-size="9.5" text-anchor="middle">
    <!-- 底座 -->
    <rect x="164" y="212" width="472" height="40" rx="8" fill="#e9f1fb" stroke="#c4d8f0"/><text x="400" y="230" font-size="10" font-weight="600" fill="#1b2a4a">元数据与协调（Keeper/Database/DDLWorker）</text><text x="400" y="245" font-size="8" fill="#5b7db1">底座 · DDL/DCL/复制的落点</text>
    <rect x="164" y="258" width="472" height="40" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="400" y="276" font-size="10" font-weight="600" fill="#5a3410">存储引擎（MergeTree · 不可变 Part）</text><text x="400" y="291" font-size="8" fill="#93762e">底座 · 数据组织落盘读取</text>
    <!-- 计算 -->
    <rect x="164" y="304" width="472" height="40" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="400" y="322" font-size="10" font-weight="600" fill="#274a78">优化技术（Analyzer + QueryPlan 优化 + 主键裁剪）</text><text x="400" y="337" font-size="8" fill="#5b7db1">计算 · 规划期减少要做的事</text>
    <rect x="164" y="350" width="472" height="40" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="400" y="368" font-size="10" font-weight="600" fill="#12402a">执行引擎（Processors 向量化 · Pipeline）</text><text x="400" y="383" font-size="8" fill="#2f6f4f">计算 · 执行期并行跑</text>
    <!-- 保障 (extend into background) -->
    <rect x="164" y="396" width="700" height="40" rx="8" fill="#f6f2fb" stroke="#d9c9ec"/><text x="380" y="414" font-size="10" font-weight="600" fill="#3d2a5a">复制与一致性（ReplicatedMergeTree + Keeper · 最终一致）</text><text x="380" y="429" font-size="8" fill="#7a5da5">保障 · 前台幂等写 + 后台副本同步</text>
    <rect x="164" y="442" width="700" height="40" rx="8" fill="#f6f2fb" stroke="#d9c9ec"/><text x="380" y="460" font-size="10" font-weight="600" fill="#3d2a5a">资源与负载管理（Settings/Quota/内存/调度）</text><text x="380" y="475" font-size="8" fill="#7a5da5">保障 · 前台限流 + 后台审计</text>
    <rect x="164" y="488" width="700" height="40" rx="8" fill="#f6f2fb" stroke="#d9c9ec"/><text x="380" y="506" font-size="10" font-weight="600" fill="#3d2a5a">集群与自愈（Distributed 路由 + 副本恢复）</text><text x="380" y="521" font-size="8" fill="#7a5da5">保障 · 前台分片读写 + 后台修复</text>
  </g>

  <!-- background-only: background tasks orthogonal band -->
  <rect x="700" y="212" width="164" height="316" rx="10" fill="#fff3e0" stroke="#e8cf9a" stroke-dasharray="5 3"/>
  <text x="782" y="234" font-size="10.5" font-weight="700" fill="#7a5a1e" text-anchor="middle">后台任务（第8支撑）</text>
  <text x="782" y="252" font-size="8" fill="#93762e" text-anchor="middle">正交维度 · 非能力域</text>
  <g text-anchor="middle" font-size="8.5" fill="#5a3410">
    <text x="782" y="276">承接各域的异步部分：</text>
    <text x="782" y="296">· Merge（存储）</text>
    <text x="782" y="314">· Mutation/TTL（存储）</text>
    <text x="782" y="332">· 副本 fetch（复制）</text>
    <text x="782" y="350">· 副本修复（自愈）</text>
    <text x="782" y="368">· 统计刷新（优化）</text>
    <text x="782" y="386">· 清理 GC（各域）</text>
  </g>
  <text x="782" y="418" font-size="8.5" fill="#93762e" text-anchor="middle">统一调度载体：</text>
  <text x="782" y="434" font-size="8" fill="#93762e" text-anchor="middle">MergeTreeBackgroundExecutor</text>
  <text x="782" y="450" font-size="8" fill="#93762e" text-anchor="middle">BackgroundSchedulePool</text>

  <!-- horizontal time arrow -->
  <line x1="180" y1="600" x2="1000" y2="600" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- bottom takeaway -->
  <rect x="150" y="628" width="880" height="0" />
  <text x="60" y="700" font-size="9.5" fill="#8a8a8f">读法：一行 = 一个能力域；能力域横跨前台/后台两栏，说明它既有请求路径部分、也有守护线程部分——后者统一交给后台任务。</text>
</svg>
