<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="720" viewBox="0 0 1060 720" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="720" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">物理部署视图：Shard（分片）× Replica（副本）+ Keeper 协调组</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">Shard 横向拆数据（不同分片存不同数据）· Replica 纵向冗余（同分片多副本）· Keeper 仲裁复制与去重</text>

  <!-- Keeper ensemble on top -->
  <rect x="330" y="70" width="400" height="94" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="530" y="92" font-size="12" font-weight="700" fill="#12402a" text-anchor="middle">clickhouse-keeper 集群（3 或 5 节点 Raft 组）</text>
  <g text-anchor="middle" font-size="9">
    <rect x="350" y="104" width="110" height="46" rx="9" fill="#fff" stroke="#bfe0cd"/><text x="405" y="124" font-weight="600" fill="#12402a">Keeper-1</text><text x="405" y="140" fill="#2f6f4f">Leader</text>
    <rect x="475" y="104" width="110" height="46" rx="9" fill="#fff" stroke="#bfe0cd"/><text x="530" y="124" font-weight="600" fill="#12402a">Keeper-2</text><text x="530" y="140" fill="#2f6f4f">Follower</text>
    <rect x="600" y="104" width="110" height="46" rx="9" fill="#fff" stroke="#bfe0cd"/><text x="655" y="124" font-weight="600" fill="#12402a">Keeper-3</text><text x="655" y="140" fill="#2f6f4f">Follower</text>
  </g>

  <!-- shard 1 -->
  <rect x="40" y="210" width="460" height="290" rx="16" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="270" y="234" font-size="12.5" font-weight="700" fill="#274a78" text-anchor="middle">Shard 1（数据分片 A）</text>
  <g text-anchor="middle">
    <rect x="64" y="250" width="200" height="230" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="164" y="272" font-size="11" font-weight="700" fill="#1b2a4a">Replica 1（node A1）</text>
    <rect x="80" y="284" width="168" height="52" rx="8" fill="#fff" stroke="#bcd0ec"/><text x="164" y="304" font-size="9" font-weight="600" fill="#1b2a4a">clickhouse-server</text><text x="164" y="320" font-size="8" fill="#5b7db1">完整查询/存储栈</text>
    <rect x="80" y="344" width="168" height="60" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="164" y="364" font-size="9" font-weight="600" fill="#5a3410">本地盘</text><text x="164" y="380" font-size="8" fill="#93762e">分片 A 全量数据</text><text x="164" y="394" font-size="8" fill="#93762e">Part 目录（shared-nothing）</text>
    <rect x="80" y="412" width="168" height="52" rx="8" fill="#f2fbf6" stroke="#cdeadb"/><text x="164" y="432" font-size="8.5" fill="#12402a">ReplicatedMergeTree</text><text x="164" y="447" font-size="8" fill="#2f6f4f">经 Keeper 与 Replica 2 对齐</text>

    <rect x="276" y="250" width="200" height="230" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="376" y="272" font-size="11" font-weight="700" fill="#1b2a4a">Replica 2（node A2）</text>
    <rect x="292" y="284" width="168" height="52" rx="8" fill="#fff" stroke="#bcd0ec"/><text x="376" y="304" font-size="9" font-weight="600" fill="#1b2a4a">clickhouse-server</text><text x="376" y="320" font-size="8" fill="#5b7db1">对等 · 可独立服务读写</text>
    <rect x="292" y="344" width="168" height="60" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="376" y="364" font-size="9" font-weight="600" fill="#5a3410">本地盘</text><text x="376" y="380" font-size="8" fill="#93762e">分片 A 全量（副本）</text><text x="376" y="394" font-size="8" fill="#93762e">与 Replica 1 同数据</text>
    <rect x="292" y="412" width="168" height="52" rx="8" fill="#f2fbf6" stroke="#cdeadb"/><text x="376" y="432" font-size="8.5" fill="#12402a">part fetch（HTTP）</text><text x="376" y="447" font-size="8" fill="#2f6f4f">缺 part 从对方拉取</text>
  </g>

  <!-- shard 2 -->
  <rect x="560" y="210" width="460" height="290" rx="16" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="790" y="234" font-size="12.5" font-weight="700" fill="#274a78" text-anchor="middle">Shard 2（数据分片 B）</text>
  <g text-anchor="middle">
    <rect x="584" y="250" width="200" height="230" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="684" y="272" font-size="11" font-weight="700" fill="#1b2a4a">Replica 1（node B1）</text>
    <rect x="600" y="284" width="168" height="52" rx="8" fill="#fff" stroke="#bcd0ec"/><text x="684" y="304" font-size="9" font-weight="600" fill="#1b2a4a">clickhouse-server</text><text x="684" y="320" font-size="8" fill="#5b7db1">完整查询/存储栈</text>
    <rect x="600" y="344" width="168" height="60" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="684" y="364" font-size="9" font-weight="600" fill="#5a3410">本地盘</text><text x="684" y="380" font-size="8" fill="#93762e">分片 B 全量数据</text><text x="684" y="394" font-size="8" fill="#93762e">与分片 A 数据不同</text>
    <rect x="600" y="412" width="168" height="52" rx="8" fill="#f2fbf6" stroke="#cdeadb"/><text x="684" y="432" font-size="8.5" fill="#12402a">ReplicatedMergeTree</text><text x="684" y="447" font-size="8" fill="#2f6f4f">经 Keeper 与 B2 对齐</text>

    <rect x="796" y="250" width="200" height="230" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="896" y="272" font-size="11" font-weight="700" fill="#1b2a4a">Replica 2（node B2）</text>
    <rect x="812" y="284" width="168" height="52" rx="8" fill="#fff" stroke="#bcd0ec"/><text x="896" y="304" font-size="9" font-weight="600" fill="#1b2a4a">clickhouse-server</text><text x="896" y="320" font-size="8" fill="#5b7db1">对等副本</text>
    <rect x="812" y="344" width="168" height="60" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="896" y="364" font-size="9" font-weight="600" fill="#5a3410">本地盘</text><text x="896" y="380" font-size="8" fill="#93762e">分片 B 全量（副本）</text><text x="896" y="394" font-size="8" fill="#93762e">高可用冗余</text>
    <rect x="812" y="412" width="168" height="52" rx="8" fill="#f2fbf6" stroke="#cdeadb"/><text x="896" y="432" font-size="8.5" fill="#12402a">parallel replicas</text><text x="896" y="447" font-size="8" fill="#2f6f4f">读时分担同分片扫描</text>
  </g>

  <!-- connections to keeper -->
  <g stroke="#9ccbb0" stroke-width="1.4" fill="none" stroke-dasharray="5 3">
    <path d="M405,164 L270,210" marker-end="url(#ar)"/>
    <path d="M655,164 L790,210" marker-end="url(#ar)"/>
  </g>
  <text x="320" y="192" font-size="8.5" fill="#4c8567">Keeper 协调复制/去重</text>
  <text x="700" y="192" font-size="8.5" fill="#4c8567">Keeper 协调复制/去重</text>
  <!-- replica sync within shard -->
  <line x1="264" y1="370" x2="276" y2="370" stroke="#bcd0ec" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="276" y1="380" x2="264" y2="380" stroke="#bcd0ec" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="784" y1="370" x2="796" y2="370" stroke="#bcd0ec" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="796" y1="380" x2="784" y2="380" stroke="#bcd0ec" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- distributed view -->
  <rect x="40" y="520" width="980" height="80" rx="13" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="60" y="542" font-size="11.5" font-weight="700" fill="#5a3410">Distributed 表：客户端看到的"逻辑全表"（无数据，只做路由）</text>
  <text x="60" y="564" font-size="9.5" fill="#93762e">· 查询命中 Distributed 表 → 散射（scatter）到 Shard1/Shard2 各选一个健康 Replica 执行 → 汇聚（gather）结果</text>
  <text x="60" y="582" font-size="9.5" fill="#93762e">· 写入 Distributed 表 → 按 sharding key 路由到目标 shard（或直接写各 shard 的本地 ReplicatedMergeTree 表更可控）</text>

  <rect x="40" y="622" width="980" height="80" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="646" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="668" font-size="10" fill="#4b4b50">两个正交维度：Shard 决定"数据怎么拆"（扩容量/吞吐），Replica 决定"每份存几副本"（高可用/读扩展）。</text>
  <text x="60" y="685" font-size="10" fill="#4b4b50">默认 shared-nothing——每副本本地盘存该分片全量；Keeper 只协调不存数据；Distributed 表把它们拼成一张逻辑表。</text>
</svg>
