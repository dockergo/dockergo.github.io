<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="520" viewBox="0 0 1060 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">清理任务：旧 Part / 临时文件 / znode（"产新替旧"的必要收尾）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">多在 BackgroundSchedulePool · 不清理会导致磁盘/Keeper 无限膨胀</text>

  <g text-anchor="middle">
    <rect x="40" y="80" width="310" height="150" rx="13" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
    <text x="195" y="104" font-size="11.5" font-weight="700" fill="#5a3410">旧 Part GC</text>
    <text x="195" y="126" font-size="9" fill="#93762e">merge/mutation 产新替旧后</text>
    <text x="195" y="146" font-size="9" fill="#93762e">旧 Part 变 outdated</text>
    <text x="195" y="168" font-size="9" fill="#5a3410">无查询引用 → 物理删除</text>
    <text x="195" y="190" font-size="8.5" fill="#b08843">延迟删除：查询引用期间不删</text>
    <text x="195" y="210" font-size="8" fill="#b08843">保证快照一致性</text>

    <rect x="375" y="80" width="310" height="150" rx="13" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
    <text x="530" y="104" font-size="11.5" font-weight="700" fill="#274a78">临时文件清理</text>
    <text x="530" y="126" font-size="9" fill="#5b7db1">中断的写入/merge 残留</text>
    <text x="530" y="146" font-size="9" fill="#5b7db1">tmp_insert_* / tmp_merge_*</text>
    <text x="530" y="168" font-size="9" fill="#274a78">周期扫描并删除</text>
    <text x="530" y="190" font-size="8.5" fill="#8aa6cf">进程崩溃/中断后的垃圾</text>
    <text x="530" y="210" font-size="8" fill="#8aa6cf">防临时目录堆积</text>

    <rect x="710" y="80" width="310" height="150" rx="13" fill="#f6f2fb" stroke="#d9c9ec" filter="url(#soft)"/>
    <text x="865" y="104" font-size="11.5" font-weight="700" fill="#3d2a5a">znode 清理（复制表）</text>
    <text x="865" y="126" font-size="9" fill="#7a5da5">ReplicatedMergeTreeCleanupThread</text>
    <text x="865" y="146" font-size="9" fill="#7a5da5">过期 /log entry</text>
    <text x="865" y="166" font-size="9" fill="#7a5da5">旧 /blocks 去重记录</text>
    <text x="865" y="188" font-size="8.5" fill="#9a7cc4">防 Keeper znode 无限增长</text>
    <text x="865" y="208" font-size="8" fill="#9a7cc4">Keeper 内存有限，必须清</text>
  </g>

  <!-- why matters -->
  <rect x="40" y="252" width="980" height="90" rx="13" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="60" y="276" font-size="11" font-weight="700" fill="#7a2230">为什么清理是必要收尾</text>
  <text x="60" y="298" font-size="9.5" fill="#a44">· "不可变 Part + 产新替旧"模型天然产生垃圾：每次 merge/mutation 都留下 outdated 旧 Part</text>
  <text x="60" y="316" font-size="9.5" fill="#a44">· 不清理 → 磁盘被旧 Part 撑爆、Keeper 被过期 znode 撑爆（Keeper 内存有限，尤其危险）</text>
  <text x="60" y="334" font-size="9" fill="#7a2230">· 清理让"产新替旧"闭环——新数据可见、旧数据回收</text>

  <rect x="40" y="360" width="980" height="120" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="384" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="406" font-size="10" fill="#4b4b50">清理任务（多在 BackgroundSchedulePool）是"产新替旧"模型的必要收尾：GC 无引用的 outdated 旧 Part、删中断残留的</text>
  <text x="60" y="424" font-size="10" fill="#4b4b50">临时文件、清复制表过期的 /log 与 /blocks znode。不清理会让磁盘和 Keeper 无限膨胀。</text>
  <text x="60" y="446" font-size="10" fill="#4b4b50" font-weight="600">尤其 Keeper znode 清理很关键——Keeper 内存有限，过期 /blocks/log 堆积会拖垮协调层。</text>
  <text x="60" y="468" font-size="9" fill="#8a8a8f">旧 Part 延迟删除保证快照一致性：查询引用期间不删，等引用结束才回收。</text>
</svg>
