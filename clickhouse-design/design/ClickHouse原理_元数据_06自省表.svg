<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="560" viewBox="0 0 1060 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">system.* 自省表：一切内部状态皆可 SQL 查（可观测性基石）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">基类 IStorageSystemOneBlock (h:23) · 把内部状态暴露成可 SQL 查询的虚拟表</text>

  <!-- categories -->
  <g text-anchor="middle">
    <rect x="40" y="76" width="315" height="180" rx="13" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
    <text x="197" y="98" font-size="11" font-weight="700" fill="#5a3410">存储 / Part</text>
    <text x="55" y="122" font-size="9" fill="#5a3410" text-anchor="start">· system.parts — Part 状态/大小/行数</text>
    <text x="55" y="142" font-size="9" fill="#5a3410" text-anchor="start">· system.parts_columns — 列级细节</text>
    <text x="55" y="162" font-size="9" fill="#5a3410" text-anchor="start">· system.detached_parts — 卸载的 Part</text>
    <text x="55" y="182" font-size="9" fill="#5a3410" text-anchor="start">· system.disks / storage_policies</text>
    <text x="197" y="212" font-size="8.5" fill="#93762e">诊断：Part 数、碎片、磁盘占用</text>
    <text x="197" y="232" font-size="8" fill="#b08843">"too many parts" 从这里查</text>

    <rect x="373" y="76" width="315" height="180" rx="13" fill="#f6f2fb" stroke="#d9c9ec" filter="url(#soft)"/>
    <text x="530" y="98" font-size="11" font-weight="700" fill="#3d2a5a">复制 / 后台</text>
    <text x="388" y="122" font-size="9" fill="#3d2a5a" text-anchor="start">· system.replicas — 副本 log_pointer/队列</text>
    <text x="388" y="142" font-size="9" fill="#3d2a5a" text-anchor="start">· system.replication_queue — 复制队列</text>
    <text x="388" y="162" font-size="9" fill="#3d2a5a" text-anchor="start">· system.merges — 进行中的 merge</text>
    <text x="388" y="182" font-size="9" fill="#3d2a5a" text-anchor="start">· system.mutations — mutation 进度</text>
    <text x="530" y="212" font-size="8.5" fill="#7a5da5">诊断：副本落后、任务卡住</text>
    <text x="530" y="232" font-size="8" fill="#9a7cc4">复制健康的一手数据</text>

    <rect x="706" y="76" width="314" height="180" rx="13" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
    <text x="863" y="98" font-size="11" font-weight="700" fill="#274a78">查询 / 指标 / 协调</text>
    <text x="721" y="122" font-size="9" fill="#274a78" text-anchor="start">· system.query_log — 查询历史+指标</text>
    <text x="721" y="142" font-size="9" fill="#274a78" text-anchor="start">· system.processes — 当前运行查询</text>
    <text x="721" y="162" font-size="9" fill="#274a78" text-anchor="start">· system.metrics / asynchronous_metrics</text>
    <text x="721" y="182" font-size="9" fill="#274a78" text-anchor="start">· system.zookeeper — 直接查 znode</text>
    <text x="863" y="212" font-size="8.5" fill="#5b7db1">诊断：慢查询、资源、协调状态</text>
    <text x="863" y="232" font-size="8" fill="#8aa6cf">query_log 是性能分析核心</text>
  </g>

  <!-- why it matters -->
  <rect x="40" y="272" width="980" height="110" rx="13" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="60" y="296" font-size="11.5" font-weight="700" fill="#12402a">"一切皆可 SQL 查" = ClickHouse 可观测性的核心哲学</text>
  <text x="60" y="318" font-size="9.5" fill="#2f6f4f">· 内部状态（Part/副本/merge/查询/内存/znode）全部暴露成 system.* 表，用普通 SELECT 就能查</text>
  <text x="60" y="336" font-size="9.5" fill="#2f6f4f">· 运维/诊断无需额外工具：慢查询查 query_log、副本落后查 replicas、Part 碎片查 parts</text>
  <text x="60" y="354" font-size="9.5" fill="#2f6f4f">· 甚至能 JOIN/聚合 system 表做复杂分析（如"哪些表 Part 最多"）</text>
  <text x="60" y="374" font-size="9" fill="#4c8567">· 全景框架里"可观测性归资源与负载的事后审计"——system.* 就是审计的数据源</text>

  <rect x="40" y="398" width="980" height="130" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="422" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="444" font-size="10" fill="#4b4b50">system.* 把 ClickHouse 的一切内部状态（Part、副本、merge、mutation、查询、内存、znode）暴露成可 SQL 查询的</text>
  <text x="60" y="462" font-size="10" fill="#4b4b50">虚拟表（基类 IStorageSystemOneBlock）。"一切皆可 SQL 查"是它可观测性的核心——运维诊断查 system.* 即可，无需额外工具。</text>
  <text x="60" y="486" font-size="10" fill="#4b4b50" font-weight="600">常用速记：慢查询→query_log；副本落后→replicas/replication_queue；Part 过多→parts；后台任务→merges/mutations。</text>
  <text x="60" y="510" font-size="9" fill="#8a8a8f">这些表也是「资源与负载」事后审计、「集群与自愈」健康判断的数据来源。</text>
</svg>
