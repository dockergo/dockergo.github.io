<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="740" viewBox="0 0 1060 740" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="740" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Merge 合并：选取 → 执行（水平/垂直）→ 版本替换（产新 Part 替旧，永不原地改）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">selectPartsToMerge (MergeTreeDataMergerMutator.cpp:400) → MergeTask (MergeTask.h:72) · chooseMergeAlgorithm(:320)</text>

  <!-- why -->
  <rect x="40" y="72" width="980" height="66" rx="12" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="60" y="94" font-size="11.5" font-weight="700" fill="#7a2230">为什么需要 merge：INSERT 越碎 → Part 越多 → 查询要归并的路数越多越慢 → merge 把它降下来</text>
  <text x="60" y="114" font-size="9.5" fill="#a44">这是"不可变 Part"模型的代价与解药：写入只追加（快），代价推迟到后台 merge 统一偿还</text>
  <text x="60" y="130" font-size="9.5" fill="#a44">同时 merge 也是变体引擎（Replacing/Summing…）兑现合并语义、TTL 删除生效的时机</text>

  <!-- step 1 select -->
  <rect x="40" y="158" width="300" height="230" rx="13" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="190" y="182" font-size="12.5" font-weight="700" fill="#274a78" text-anchor="middle">① 选取 Select</text>
  <text x="190" y="200" font-size="9" fill="#5b7db1" text-anchor="middle">MergeSelectorFactory · 默认 SimpleMergeSelector</text>
  <g text-anchor="middle">
    <rect x="60" y="212" width="120" height="34" rx="7" fill="#fdf6ea" stroke="#efdcb4"/><text x="120" y="234" font-size="9" fill="#5a3410">Part A (小)</text>
    <rect x="196" y="212" width="120" height="34" rx="7" fill="#fdf6ea" stroke="#efdcb4"/><text x="256" y="234" font-size="9" fill="#5a3410">Part B (小)</text>
    <rect x="60" y="252" width="120" height="34" rx="7" fill="#fdf6ea" stroke="#efdcb4"/><text x="120" y="274" font-size="9" fill="#5a3410">Part C (小)</text>
    <rect x="196" y="252" width="120" height="34" rx="7" fill="#f7f7f9" stroke="#e6e6ea"/><text x="256" y="274" font-size="9" fill="#a1a1a6">Part Z (大·暂不选)</text>
  </g>
  <text x="190" y="308" font-size="9" fill="#5b7db1" text-anchor="middle">策略：挑大小相近的相邻 Part</text>
  <text x="190" y="324" font-size="9" fill="#5b7db1" text-anchor="middle">避免"大 Part 反复被重写"的写放大</text>
  <text x="190" y="348" font-size="8.5" fill="#8aa6cf" text-anchor="middle">TTL 相关有专用 selector（TTLMergeSelector.h）</text>
  <text x="190" y="366" font-size="8.5" fill="#8aa6cf" text-anchor="middle">受 max_bytes_to_merge_at_max_space 上限约束</text>

  <!-- step 2 execute -->
  <rect x="380" y="158" width="300" height="230" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="530" y="182" font-size="12.5" font-weight="700" fill="#12402a" text-anchor="middle">② 执行 MergeTask</text>
  <text x="530" y="200" font-size="9" fill="#2f6f4f" text-anchor="middle">多路归并（已按主键有序）→ 一个新 Part</text>
  <rect x="400" y="212" width="260" height="70" rx="9" fill="#fff" stroke="#cdeadb"/>
  <text x="530" y="232" font-size="10" font-weight="600" fill="#12402a" text-anchor="middle">水平 Horizontal</text>
  <text x="530" y="250" font-size="8.5" fill="#2f6f4f" text-anchor="middle">整行一起归并</text>
  <text x="530" y="266" font-size="8.5" fill="#2f6f4f" text-anchor="middle">适合窄表 / 列不多</text>
  <rect x="400" y="290" width="260" height="82" rx="9" fill="#fff" stroke="#cdeadb"/>
  <text x="530" y="310" font-size="10" font-weight="600" fill="#12402a" text-anchor="middle">垂直 Vertical（默认开）</text>
  <text x="530" y="328" font-size="8.5" fill="#2f6f4f" text-anchor="middle">先归并排序键列 → 再逐列合并</text>
  <text x="530" y="344" font-size="8.5" fill="#2f6f4f" text-anchor="middle">大宽表内存友好</text>
  <text x="530" y="362" font-size="8" fill="#4c8567" text-anchor="middle">enable_vertical_merge_algorithm=1 (:1314)</text>

  <!-- step 3 replace -->
  <rect x="720" y="158" width="300" height="230" rx="13" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="870" y="182" font-size="12.5" font-weight="700" fill="#5a3410" text-anchor="middle">③ 版本替换</text>
  <text x="870" y="200" font-size="9" fill="#93762e" text-anchor="middle">新 Part 变 active · 旧 Part 转 outdated</text>
  <g text-anchor="middle">
    <rect x="745" y="214" width="250" height="40" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="870" y="232" font-size="10" font-weight="600" fill="#12402a">新 Part：A_C_1（level+1）</text><text x="870" y="247" font-size="8" fill="#4c8567">min_max 合并、level 递增</text>
    <rect x="760" y="264" width="220" height="26" rx="6" fill="#f7f7f9" stroke="#e6e6ea"/><text x="870" y="281" font-size="8.5" fill="#a1a1a6">旧 A/B/C → outdated（待 GC）</text>
  </g>
  <text x="870" y="312" font-size="9" fill="#93762e" text-anchor="middle">查询引用旧 Part 期间不删</text>
  <text x="870" y="328" font-size="9" fill="#93762e" text-anchor="middle">清理线程延后物理删除</text>
  <rect x="745" y="342" width="250" height="34" rx="7" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="870" y="363" font-size="9" fill="#7a2230" text-anchor="middle">全程无原地修改 · Part 恒不可变</text>

  <g stroke="#c7c7cc" stroke-width="1.6" fill="none">
    <line x1="340" y1="273" x2="380" y2="273" marker-end="url(#ar)"/>
    <line x1="680" y1="273" x2="720" y2="273" marker-end="url(#ar)"/>
  </g>

  <!-- write amplification -->
  <rect x="40" y="410" width="640" height="190" rx="13" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="60" y="432" font-size="12" font-weight="700" fill="#5a3410">写放大与三放大权衡</text>
  <g text-anchor="middle">
    <rect x="60" y="446" width="190" height="130" rx="10" fill="#fdf6ea" stroke="#efdcb4"/>
    <text x="155" y="468" font-size="10.5" font-weight="600" fill="#5a3410">写放大</text>
    <text x="155" y="488" font-size="8.5" fill="#93762e">同一行数据被多次</text>
    <text x="155" y="503" font-size="8.5" fill="#93762e">merge 重写 → 磁盘写量翻倍</text>
    <text x="155" y="524" font-size="8.5" fill="#93762e">选取策略就是为压低它</text>
    <text x="155" y="548" font-size="8" fill="#b08843">避免频繁 OPTIMIZE FINAL</text>
    <text x="155" y="564" font-size="8" fill="#b08843">（强制全表重写=巨大写放大）</text>

    <rect x="262" y="446" width="190" height="130" rx="10" fill="#fdf6ea" stroke="#efdcb4"/>
    <text x="357" y="468" font-size="10.5" font-weight="600" fill="#5a3410">读放大</text>
    <text x="357" y="488" font-size="8.5" fill="#93762e">Part 越多，查询归并</text>
    <text x="357" y="503" font-size="8.5" fill="#93762e">路数越多 → 读越慢</text>
    <text x="357" y="524" font-size="8.5" fill="#93762e">merge 减少 Part 数即降读放大</text>
    <text x="357" y="550" font-size="8" fill="#b08843">active parts 数是关键健康指标</text>

    <rect x="464" y="446" width="200" height="130" rx="10" fill="#fdf6ea" stroke="#efdcb4"/>
    <text x="564" y="468" font-size="10.5" font-weight="600" fill="#5a3410">空间放大</text>
    <text x="564" y="488" font-size="8.5" fill="#93762e">outdated Part 未 GC 前</text>
    <text x="564" y="503" font-size="8.5" fill="#93762e">新旧并存 → 临时占空间</text>
    <text x="564" y="524" font-size="8.5" fill="#93762e">merge 峰值需预留磁盘</text>
    <text x="564" y="550" font-size="8" fill="#b08843">三者此消彼长，merge 是平衡杆</text>
  </g>

  <!-- background note -->
  <rect x="700" y="410" width="320" height="190" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="860" y="432" font-size="11.5" font-weight="700" fill="#274a78" text-anchor="middle">谁来跑 merge</text>
  <text x="720" y="456" font-size="9.5" fill="#5b7db1">· 后台线程池 MergeTreeBackgroundExecutor</text>
  <text x="720" y="474" font-size="9.5" fill="#5b7db1">· 由 BackgroundJobsAssignee 分配任务</text>
  <text x="720" y="492" font-size="9.5" fill="#5b7db1">· 复制表：merge 也是一条 log entry，</text>
  <text x="730" y="508" font-size="9" fill="#8aa6cf">各副本按队列各自执行（见复制主线）</text>
  <text x="720" y="530" font-size="9.5" fill="#5b7db1">· 详见「后台任务」主线</text>
  <rect x="720" y="544" width="284" height="42" rx="8" fill="#fff" stroke="#cfe0f2"/>
  <text x="862" y="562" font-size="8.8" fill="#274a78" text-anchor="middle">merge 是自动的：无需手动干预</text>
  <text x="862" y="577" font-size="8.8" fill="#274a78" text-anchor="middle">OPTIMIZE 只是"催"，不改变模型</text>

  <rect x="40" y="624" width="980" height="82" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="648" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="670" font-size="10" fill="#4b4b50">Merge 是后台把多个小 Part 归并成一个大 Part 的过程：选相近大小的 Part（压低写放大）→ 水平/垂直归并 →</text>
  <text x="60" y="687" font-size="10" fill="#4b4b50">新 Part 替旧（永不原地改）。它同时兑现变体合并语义与 TTL 删除，是"写快、读慢账后台还"的核心机制。</text>
</svg>
