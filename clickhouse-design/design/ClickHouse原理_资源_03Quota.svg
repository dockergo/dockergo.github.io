<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="540" viewBox="0 0 1060 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Quota：按时间窗口限制资源消费（7 维度）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">QuotaDefs.h 7 维度 · EnabledQuota::checkExceeded · 限"重查询"比限"查询数"更有效</text>

  <!-- dimensions -->
  <g text-anchor="middle" font-size="9">
    <rect x="40" y="80" width="150" height="70" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="115" y="106" font-weight="700" fill="#1b2a4a">QUERIES</text><text x="115" y="126" font-size="8" fill="#5b7db1">查询次数</text><text x="115" y="142" font-size="8" fill="#8aa6cf">挡高频轰炸</text>
    <rect x="200" y="80" width="150" height="70" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="275" y="106" font-weight="700" fill="#1b2a4a">ERRORS</text><text x="275" y="126" font-size="8" fill="#5b7db1">错误次数</text><text x="275" y="142" font-size="8" fill="#8aa6cf">挡错误风暴</text>
    <rect x="360" y="80" width="180" height="70" rx="10" fill="#f2fbf6" stroke="#cdeadb"/><text x="450" y="106" font-weight="700" fill="#12402a">READ_ROWS ★</text><text x="450" y="126" font-size="8" fill="#2f6f4f">读取行数</text><text x="450" y="142" font-size="8" fill="#4c8567">挡重扫描（关键）</text>
    <rect x="550" y="80" width="180" height="70" rx="10" fill="#f2fbf6" stroke="#cdeadb"/><text x="640" y="106" font-weight="700" fill="#12402a">EXECUTION_TIME ★</text><text x="640" y="126" font-size="8" fill="#2f6f4f">累计执行时长</text><text x="640" y="142" font-size="8" fill="#4c8567">挡慢查询占用（关键）</text>
    <rect x="740" y="80" width="130" height="70" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="805" y="106" font-weight="700" fill="#1b2a4a">READ_BYTES</text><text x="805" y="126" font-size="8" fill="#5b7db1">读取字节</text>
    <rect x="880" y="80" width="140" height="70" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="950" y="106" font-weight="700" fill="#1b2a4a">RESULT_ROWS/BYTES</text><text x="950" y="126" font-size="8" fill="#5b7db1">结果量</text><text x="950" y="142" font-size="8" fill="#8aa6cf">挡大结果集</text>
  </g>

  <!-- interval -->
  <rect x="40" y="176" width="480" height="150" rx="13" fill="#f6f2fb" stroke="#d9c9ec"/>
  <text x="280" y="200" font-size="11" font-weight="700" fill="#3d2a5a" text-anchor="middle">按周期（interval）计量</text>
  <text x="60" y="224" font-size="9.5" fill="#7a5da5">· 定义窗口：如每小时 / 每天</text>
  <text x="60" y="244" font-size="9.5" fill="#7a5da5">· EnabledQuota::used 累加本周期消费</text>
  <text x="60" y="264" font-size="9.5" fill="#7a5da5">· checkExceeded 判断是否超限</text>
  <text x="60" y="284" font-size="9.5" fill="#7a5da5">· 超限 → 拒绝该用户后续查询</text>
  <text x="60" y="308" font-size="8.5" fill="#9a7cc4">· 窗口结束后配额重置</text>

  <!-- best practice -->
  <rect x="540" y="176" width="480" height="150" rx="13" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="780" y="200" font-size="11" font-weight="700" fill="#7a5a1e" text-anchor="middle">关键：限"重查询"而非只限"查询数"</text>
  <rect x="560" y="214" width="440" height="44" rx="8" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="780" y="234" font-size="9" font-weight="600" fill="#7a2230" text-anchor="middle">❌ 只限 QUERIES</text>
  <text x="780" y="250" font-size="8.5" fill="#a44" text-anchor="middle">一个全表扫描 = 一次查询，但杀伤力 &gt;&gt; 1000 个点查</text>
  <rect x="560" y="266" width="440" height="52" rx="8" fill="#f2fbf6" stroke="#cdeadb"/>
  <text x="780" y="286" font-size="9" font-weight="600" fill="#12402a" text-anchor="middle">✓ 限 READ_ROWS + EXECUTION_TIME</text>
  <text x="780" y="302" font-size="8.5" fill="#2f6f4f" text-anchor="middle">按"实际消耗的资源"限流</text>
  <text x="780" y="316" font-size="8" fill="#4c8567" text-anchor="middle">重查询自然被挡下</text>

  <rect x="40" y="342" width="980" height="76" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="366" font-size="11" font-weight="700" fill="#274a78">Quota 是 DCL 实体，本主线执行</text>
  <text x="60" y="388" font-size="9.5" fill="#5b7db1">· 定义：CREATE QUOTA … FOR INTERVAL … MAX read_rows = N（DCL）</text>
  <text x="60" y="406" font-size="9.5" fill="#5b7db1">· 执行：查询运行时 EnabledQuota 累加消费、超限拒绝（本主线运行时）</text>

  <rect x="40" y="434" width="980" height="90" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="458" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="480" font-size="10" fill="#4b4b50">Quota 按时间窗口在 7 个维度（查询/错误/读行/读字节/结果量/执行时长）限制消费，超限拒绝该用户查询。</text>
  <text x="60" y="498" font-size="10" fill="#4b4b50" font-weight="600">工程要点：限 read_rows / execution_time 比只限 queries 有效得多——一个重查询的资源消耗远超上千个点查。</text>
  <text x="60" y="516" font-size="9" fill="#8a8a8f">Quota 作为 DCL 实体定义（见 DCL·配额约束），运行时由本主线的 EnabledQuota 执行。</text>
</svg>
