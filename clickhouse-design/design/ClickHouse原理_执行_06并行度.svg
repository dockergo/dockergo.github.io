<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="560" viewBox="0 0 1060 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">两大性能杠杆：向量化 × 并行度（max_threads）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">向量化摊薄单行开销 · max_threads（默认 0=CPU 核数, Settings.cpp:206）决定并行宽度 · 二者相乘</text>

  <!-- lever 1 -->
  <rect x="40" y="76" width="480" height="200" rx="14" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="280" y="100" font-size="12" font-weight="700" fill="#12402a" text-anchor="middle">杠杆① 向量化（纵向：单核更快）</text>
  <rect x="60" y="116" width="440" height="60" rx="9" fill="#fff" stroke="#bfe0cd"/>
  <text x="280" y="138" font-size="9.5" font-weight="600" fill="#12402a" text-anchor="middle">一次处理一整列的一批（数千行）</text>
  <text x="280" y="156" font-size="8.5" fill="#2f6f4f" text-anchor="middle">函数调用/分支/解释开销摊薄到整批</text>
  <text x="280" y="170" font-size="8.5" fill="#4c8567" text-anchor="middle">SIMD + 缓存局部性拉满</text>
  <rect x="60" y="186" width="440" height="76" rx="9" fill="#f2fbf6" stroke="#cdeadb"/>
  <text x="280" y="206" font-size="9" font-weight="600" fill="#12402a" text-anchor="middle">批大小旋钮 max_block_size</text>
  <text x="280" y="226" font-size="8.5" fill="#2f6f4f" text-anchor="middle">批大 → 更省 CPU、更吃内存</text>
  <text x="280" y="244" font-size="8.5" fill="#2f6f4f" text-anchor="middle">批小 → 内存友好、开销占比升</text>
  <text x="280" y="258" font-size="8" fill="#8aa6cf" text-anchor="middle">默认值通常无需调</text>

  <!-- lever 2 -->
  <rect x="540" y="76" width="480" height="200" rx="14" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="780" y="100" font-size="12" font-weight="700" fill="#274a78" text-anchor="middle">杠杆② 并行度 max_threads（横向：多核）</text>
  <rect x="560" y="116" width="440" height="60" rx="9" fill="#fff" stroke="#cfe0f2"/>
  <text x="780" y="138" font-size="9.5" font-weight="600" fill="#274a78" text-anchor="middle">每 Step 展开成 max_threads 路 Processor</text>
  <text x="780" y="156" font-size="8.5" fill="#5b7db1" text-anchor="middle">读/过滤/部分聚合并行跑</text>
  <text x="780" y="170" font-size="8.5" fill="#8aa6cf" text-anchor="middle">默认 0 = 自动取 CPU 核数（:206）</text>
  <rect x="560" y="186" width="440" height="76" rx="9" fill="#f6f2fb" stroke="#d9c9ec"/>
  <text x="780" y="206" font-size="9" font-weight="600" fill="#3d2a5a" text-anchor="middle">按场景设</text>
  <text x="780" y="226" font-size="8.5" fill="#7a5da5" text-anchor="middle">大分析查询：设大，吃满 CPU</text>
  <text x="780" y="244" font-size="8.5" fill="#7a5da5" text-anchor="middle">高并发小查询：设小，保隔离防争抢</text>
  <text x="780" y="258" font-size="8" fill="#9a7cc4" text-anchor="middle">线程越多 → 峰值内存越高</text>

  <!-- multiply + resource -->
  <rect x="40" y="290" width="980" height="90" rx="13" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="60" y="314" font-size="11" font-weight="700" fill="#7a5a1e">两杠杆相乘 + 与资源主线协同</text>
  <text x="60" y="336" font-size="9.5" fill="#93762e">· 总吞吐 ≈ 向量化单核速度 × max_threads 并行度——两者叠加才是 ClickHouse 单机扫描惊人的原因</text>
  <text x="60" y="354" font-size="9.5" fill="#93762e">· 但并行不是免费：max_threads 越大，同时活跃的聚合状态/哈希表/排序缓冲越多 → 峰值内存越高</text>
  <text x="60" y="372" font-size="9" fill="#b08843">· 与「资源与负载」协同：ConcurrencyControl 限并发查询数、MemoryTracker 限单查询内存，防多大查询同时打爆</text>

  <rect x="40" y="394" width="980" height="146" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="418" font-size="11" font-weight="700" fill="#1d1d1f">一句话与调优</text>
  <text x="60" y="440" font-size="10" fill="#4b4b50">性能 = 向量化（一次算一列批，单核快）× 并行度（max_threads 路同时跑，多核快）。这是 ClickHouse 单机扫描</text>
  <text x="60" y="458" font-size="10" fill="#4b4b50">吞吐惊人的根本，代价是并行越高内存峰值越大。</text>
  <text x="60" y="482" font-size="10" fill="#4b4b50" font-weight="600">调优三原则：</text>
  <text x="60" y="502" font-size="9.5" fill="#4b4b50">① 大分析查询 max_threads 设大吃满 CPU；② 高并发场景设小 + 用 ConcurrencyControl 限并发；</text>
  <text x="60" y="520" font-size="9.5" fill="#4b4b50">③ 大聚合/join 前评估内存，给足 max_memory_usage 或用 spill 变体。max_block_size 通常保持默认。</text>
  <text x="60" y="536" font-size="8.5" fill="#8a8a8f">运行时的并发/内存拦截见「资源与负载管理」主线。</text>
</svg>
