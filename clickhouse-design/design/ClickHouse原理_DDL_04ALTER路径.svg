<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="620" viewBox="0 0 1060 620" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="620" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">ALTER 两类路径：轻量元数据改（改 .sql）vs 重量 mutation（整 Part 重写）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">决策在 StorageMergeTree::alter (StorageMergeTree.cpp:387)；判据在 AlterCommands 的谓词</text>

  <!-- classify -->
  <rect x="380" y="72" width="300" height="64" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="530" y="96" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">InterpreterAlterQuery 拆分 AST</text>
  <text x="530" y="114" font-size="8.5" fill="#5b7db1" text-anchor="middle">alter / partition / mutation 三类命令（:159-191）</text>
  <text x="530" y="128" font-size="8.5" fill="#5b7db1" text-anchor="middle">→ StorageMergeTree::alter 判轻重</text>

  <!-- light path -->
  <rect x="40" y="180" width="470" height="180" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="275" y="204" font-size="12" font-weight="700" fill="#12402a" text-anchor="middle">轻量：只改元数据（秒级，不动数据）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="60" y="218" width="200" height="56" rx="9" fill="#fff" stroke="#bfe0cd"/><text x="160" y="238" font-size="9.5" font-weight="600" fill="#12402a">isSettingsAlter (:415)</text><text x="160" y="256" fill="#2f6f4f">MODIFY SETTING …</text><text x="160" y="269" fill="#2f6f4f">changeSettings + 写 .sql</text>
    <rect x="272" y="218" width="220" height="56" rx="9" fill="#fff" stroke="#bfe0cd"/><text x="382" y="238" font-size="9.5" font-weight="600" fill="#12402a">isCommentAlter (:421)</text><text x="382" y="256" fill="#2f6f4f">MODIFY COMMENT …</text><text x="382" y="269" fill="#2f6f4f">改内存元数据 + 写 .sql</text>
  </g>
  <rect x="60" y="284" width="432" height="64" rx="9" fill="#f2fbf6" stroke="#cdeadb"/>
  <text x="275" y="304" font-size="9.5" font-weight="600" fill="#12402a" text-anchor="middle">落盘：原子替换 .sql</text>
  <text x="275" y="322" font-size="8.5" fill="#2f6f4f" text-anchor="middle">DatabaseOrdinary::alterTable 写 .sql.tmp → replaceFile</text>
  <text x="275" y="337" font-size="8.5" fill="#4c8567" text-anchor="middle">DatabaseOnDisk.cpp:313 · ADD INDEX/PROJECTION 元数据也走这里</text>

  <!-- heavy path -->
  <rect x="550" y="180" width="470" height="180" rx="13" fill="#fbeef0" stroke="#f0cdd4" filter="url(#soft)"/>
  <text x="785" y="204" font-size="12" font-weight="700" fill="#7a2230" text-anchor="middle">重量：触发 mutation（整 Part 重写）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="570" y="218" width="200" height="56" rx="9" fill="#fff" stroke="#f0cdd4"/><text x="670" y="238" font-size="9.5" font-weight="600" fill="#7a2230">改物理数据的 ALTER</text><text x="670" y="256" fill="#a44">DROP/MODIFY COLUMN</text><text x="670" y="269" fill="#a44">CLEAR/RENAME COLUMN</text>
    <rect x="782" y="218" width="220" height="56" rx="9" fill="#fff" stroke="#f0cdd4"/><text x="892" y="238" font-size="9.5" font-weight="600" fill="#7a2230">tryConvertToMutationCommand</text><text x="892" y="256" fill="#a44">AlterCommands.cpp:1166</text><text x="892" y="269" fill="#a44">→ MutationCommand</text>
  </g>
  <rect x="570" y="284" width="432" height="64" rx="9" fill="#fff5f6" stroke="#f0cdd4"/>
  <text x="785" y="304" font-size="9.5" font-weight="600" fill="#7a2230" text-anchor="middle">startMutation (:476) → 异步整 Part 重写</text>
  <text x="785" y="322" font-size="8.5" fill="#a44" text-anchor="middle">读旧 Part → 应用变更 → 写全新 Part（见「存储引擎」Mutation）</text>
  <text x="785" y="337" font-size="8.5" fill="#a44" text-anchor="middle">大表代价 = 重写整表，看 system.mutations 进度</text>

  <!-- partition commands -->
  <rect x="40" y="380" width="980" height="110" rx="13" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="60" y="404" font-size="11.5" font-weight="700" fill="#7a5a1e">第三类：PartitionCommands（分区级操作，PartitionCommands.h:21）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="60" y="418" width="175" height="56" rx="9" fill="#fff" stroke="#efdcb4"/><text x="147" y="438" font-size="9.5" font-weight="600" fill="#5a3410">DROP PARTITION</text><text x="147" y="456" fill="#93762e">删整分区（快）</text><text x="147" y="469" fill="#93762e">:27</text>
    <rect x="247" y="418" width="175" height="56" rx="9" fill="#fff" stroke="#efdcb4"/><text x="334" y="438" font-size="9.5" font-weight="600" fill="#5a3410">ATTACH/DETACH</text><text x="334" y="456" fill="#93762e">挂载/卸载分区</text><text x="334" y="469" fill="#93762e">:25</text>
    <rect x="434" y="418" width="175" height="56" rx="9" fill="#fff" stroke="#efdcb4"/><text x="521" y="438" font-size="9.5" font-weight="600" fill="#5a3410">MOVE PARTITION</text><text x="521" y="456" fill="#93762e">跨盘/表移动</text><text x="521" y="469" fill="#93762e">:26</text>
    <rect x="621" y="418" width="175" height="56" rx="9" fill="#fff" stroke="#efdcb4"/><text x="708" y="438" font-size="9.5" font-weight="600" fill="#5a3410">FREEZE PARTITION</text><text x="708" y="456" fill="#93762e">硬链接快照（备份）</text><text x="708" y="469" fill="#93762e">:32</text>
    <rect x="808" y="418" width="192" height="56" rx="9" fill="#fff" stroke="#efdcb4"/><text x="904" y="438" font-size="9.5" font-weight="600" fill="#5a3410">UNFREEZE</text><text x="904" y="456" fill="#93762e">释放快照</text><text x="904" y="469" fill="#93762e">:34</text>
  </g>

  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <path d="M450,136 L275,160 L275,180" marker-end="url(#ar)"/>
    <path d="M610,136 L785,160 L785,180" marker-end="url(#ar)"/>
    <path d="M530,136 L530,370 L530,378" opacity="0"/>
  </g>
  <path d="M530,136 L530,374" stroke="#c7c7cc" stroke-width="1.4" fill="none" stroke-dasharray="4 3" marker-end="url(#ar)"/>

  <rect x="40" y="508" width="980" height="94" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="532" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="554" font-size="10" fill="#4b4b50">ALTER 有两种代价量级：改设置/注释/加索引定义 = 秒级重写 .sql，不动数据；改列的物理形态（DROP/MODIFY COLUMN）</text>
  <text x="60" y="571" font-size="10" fill="#4b4b50">= 触发 mutation 整 Part 重写，大表等同重写整表。分区级操作（DROP/MOVE/FREEZE PARTITION）是第三类，多为元数据/</text>
  <text x="60" y="588" font-size="10" fill="#4b4b50">硬链接级的快操作。工程上：先分清你的 ALTER 属于哪一类，重量级的错峰执行并监控 system.mutations。</text>
</svg>
