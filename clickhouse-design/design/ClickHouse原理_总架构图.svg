<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="900" viewBox="0 0 1080 900" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="900" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">ClickHouse 核心原理 · 总架构图（位置即语义）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">对称架构：每个节点是对等的 clickhouse-server；无中心 FE/BE 之分，Keeper 只做协调仲裁</text>

  <!-- external data ecosystem layer (非 ClickHouse 组件 · 经集成引擎/表函数/字典接入) -->
  <rect x="30" y="64" width="1020" height="70" rx="12" fill="#f4f2ee" stroke="#e3ddd2" stroke-dasharray="6 4"/>
  <text x="50" y="84" font-size="11" font-weight="700" fill="#6e6357">外部数据生态（非 ClickHouse 组件 · 经集成引擎 / 表函数 / 字典旁路接入,不进本地 Part）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="46" y="94" width="176" height="32" rx="8" fill="#fbf6ef" stroke="#e6d8c4"/><text x="134" y="107" font-size="9" font-weight="600" fill="#5a3410">流式接入</text><text x="134" y="120" fill="#93762e">Kafka / RabbitMQ / NATS / FileLog</text>
    <rect x="230" y="94" width="196" height="32" rx="8" fill="#fbf6ef" stroke="#e6d8c4"/><text x="328" y="107" font-size="9" font-weight="600" fill="#5a3410">对象存储 / 数据湖</text><text x="328" y="120" fill="#93762e">S3 / HDFS / Azure · Iceberg/Delta/Hudi</text>
    <rect x="434" y="94" width="196" height="32" rx="8" fill="#fbf6ef" stroke="#e6d8c4"/><text x="532" y="107" font-size="9" font-weight="600" fill="#5a3410">外部数据库</text><text x="532" y="120" fill="#93762e">MySQL / PostgreSQL / MongoDB</text>
    <rect x="638" y="94" width="196" height="32" rx="8" fill="#fbf6ef" stroke="#e6d8c4"/><text x="736" y="107" font-size="9" font-weight="600" fill="#5a3410">表函数 · 即席读</text><text x="736" y="120" fill="#93762e">s3() / url() / remote() / file()</text>
    <rect x="842" y="94" width="194" height="32" rx="8" fill="#fbf6ef" stroke="#e6d8c4"/><text x="939" y="107" font-size="9" font-weight="600" fill="#5a3410">字典 Dictionary</text><text x="939" y="120" fill="#93762e">维表 JOIN 加速 · 多源加载</text>
  </g>

  <!-- client layer -->
  <rect x="30" y="146" width="1020" height="56" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="50" y="168" font-size="11" font-weight="700" fill="#4b4b50">客户端 / 协议接入</text>
  <g text-anchor="middle" font-size="9.5">
    <rect x="360" y="158" width="150" height="34" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="435" y="179" fill="#1b2a4a">Native TCP (9000)</text>
    <rect x="524" y="158" width="140" height="34" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="594" y="179" fill="#1b2a4a">HTTP (8123)</text>
    <rect x="678" y="158" width="200" height="34" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="778" y="179" fill="#1b2a4a">MySQL / gRPC / PG 兼容</text>
  </g>

  <!-- one server node (detailed, left) — body 整体下移 80 让出顶部外部数据生态层 -->
  <g transform="translate(0,80)">
  <rect x="30" y="140" width="640" height="470" rx="16" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="50" y="164" font-size="12.5" font-weight="700" fill="#274a78">clickhouse-server 节点（每个节点都是这套完整栈 · 对等）</text>

  <!-- query path -->
  <text x="50" y="192" font-size="10.5" font-weight="700" fill="#1b2a4a">查询/写入路径（前台同步）</text>
  <g text-anchor="middle" font-size="9">
    <rect x="46" y="200" width="118" height="52" rx="9" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="105" y="220" font-size="9.5" font-weight="600" fill="#1b2a4a">接入/解析</text><text x="105" y="235" fill="#5b7db1">TCPHandler</text><text x="105" y="247" fill="#5b7db1">executeQuery</text>
    <rect x="176" y="200" width="118" height="52" rx="9" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="235" y="220" font-size="9.5" font-weight="600" fill="#1b2a4a">分析/规划</text><text x="235" y="235" fill="#5b7db1">Analyzer</text><text x="235" y="247" fill="#5b7db1">Planner→QueryPlan</text>
    <rect x="306" y="200" width="118" height="52" rx="9" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="365" y="220" font-size="9.5" font-weight="600" fill="#274a78">优化</text><text x="365" y="235" fill="#5b7db1">QueryPlan 优化 pass</text><text x="365" y="247" fill="#5b7db1">主键/PREWHERE 裁剪</text>
    <rect x="436" y="200" width="118" height="52" rx="9" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="495" y="220" font-size="9.5" font-weight="600" fill="#12402a">执行</text><text x="495" y="235" fill="#2f6f4f">Processors 向量化</text><text x="495" y="247" fill="#2f6f4f">PipelineExecutor</text>
    <rect x="566" y="200" width="80" height="52" rx="9" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/><text x="606" y="223" font-size="9.5" font-weight="600" fill="#5a3410">存储读写</text><text x="606" y="240" fill="#93762e">MergeTree</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.3" fill="none">
    <line x1="164" y1="226" x2="176" y2="226" marker-end="url(#ar)"/>
    <line x1="294" y1="226" x2="306" y2="226" marker-end="url(#ar)"/>
    <line x1="424" y1="226" x2="436" y2="226" marker-end="url(#ar)"/>
    <line x1="554" y1="226" x2="566" y2="226" marker-end="url(#ar)"/>
  </g>

  <!-- storage layer -->
  <text x="50" y="284" font-size="10.5" font-weight="700" fill="#5a3410">存储引擎（本地盘 · 不可变 Part）</text>
  <rect x="46" y="292" width="600" height="86" rx="11" fill="#fdf9f0" stroke="#efe3cd"/>
  <g text-anchor="middle" font-size="8.5">
    <rect x="60" y="304" width="130" height="62" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="125" y="324" font-size="9.5" font-weight="600" fill="#5a3410">Part 目录</text><text x="125" y="340" fill="#93762e">列 .bin/.mrk · primary.idx</text><text x="125" y="354" fill="#93762e">Wide/Compact</text>
    <rect x="202" y="304" width="130" height="62" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="267" y="324" font-size="9.5" font-weight="600" fill="#5a3410">索引</text><text x="267" y="340" fill="#93762e">稀疏主键 · 跳数索引</text><text x="267" y="354" fill="#93762e">分区 minmax</text>
    <rect x="344" y="304" width="130" height="62" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="409" y="324" font-size="9.5" font-weight="600" fill="#5a3410">缓存</text><text x="409" y="340" fill="#93762e">Mark/Uncompressed</text><text x="409" y="354" fill="#93762e">PrimaryIndex</text>
    <rect x="486" y="304" width="146" height="62" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="559" y="324" font-size="9.5" font-weight="600" fill="#5a3410">Disks 抽象</text><text x="559" y="340" fill="#93762e">本地盘 / S3 / HDFS</text><text x="559" y="354" fill="#93762e">存算分离可选</text>
  </g>

  <!-- background layer -->
  <text x="50" y="404" font-size="10.5" font-weight="700" fill="#7a5a1e">后台任务（守护线程）</text>
  <rect x="46" y="412" width="600" height="72" rx="11" fill="#fff3e0" stroke="#e8cf9a"/>
  <g text-anchor="middle" font-size="8.5" fill="#5a3410">
    <rect x="60" y="424" width="110" height="48" rx="8" fill="#fff" stroke="#e8cf9a"/><text x="115" y="443" font-weight="600">Merge</text><text x="115" y="459" fill="#93762e">合并 Part</text>
    <rect x="182" y="424" width="110" height="48" rx="8" fill="#fff" stroke="#e8cf9a"/><text x="237" y="443" font-weight="600">Mutation/TTL</text><text x="237" y="459" fill="#93762e">重写/过期</text>
    <rect x="304" y="424" width="110" height="48" rx="8" fill="#fff" stroke="#e8cf9a"/><text x="359" y="443" font-weight="600">Fetch</text><text x="359" y="459" fill="#93762e">副本拉取</text>
    <rect x="426" y="424" width="110" height="48" rx="8" fill="#fff" stroke="#e8cf9a"/><text x="481" y="443" font-weight="600">清理/移动</text><text x="481" y="459" fill="#93762e">GC / TTL move</text>
    <rect x="548" y="424" width="84" height="48" rx="8" fill="#fff" stroke="#e8cf9a"/><text x="590" y="443" font-weight="600">统计</text><text x="590" y="459" fill="#93762e">刷新</text>
  </g>

  <!-- access & resource -->
  <text x="50" y="508" font-size="10.5" font-weight="700" fill="#3d2a5a">贯穿：访问控制 · 资源管理</text>
  <rect x="46" y="516" width="600" height="80" rx="11" fill="#f6f2fb" stroke="#d9c9ec"/>
  <g text-anchor="middle" font-size="8.5" fill="#3d2a5a">
    <rect x="60" y="528" width="180" height="56" rx="8" fill="#fff" stroke="#d9c9ec"/><text x="150" y="548" font-weight="600">AccessControl (DCL)</text><text x="150" y="564" fill="#7a5da5">User/Role/RowPolicy</text><text x="150" y="577" fill="#7a5da5">Quota/认证</text>
    <rect x="252" y="528" width="180" height="56" rx="8" fill="#fff" stroke="#d9c9ec"/><text x="342" y="548" font-weight="600">资源与负载</text><text x="342" y="564" fill="#7a5da5">Settings/MemoryTracker</text><text x="342" y="577" fill="#7a5da5">Scheduler/并发控制</text>
    <rect x="444" y="528" width="188" height="56" rx="8" fill="#fff" stroke="#d9c9ec"/><text x="538" y="548" font-weight="600">可观测</text><text x="538" y="564" fill="#7a5da5">system.* 表</text><text x="538" y="577" fill="#7a5da5">query_log/parts/merges</text>
  </g>

  <!-- Keeper (right top) -->
  <rect x="690" y="140" width="360" height="230" rx="16" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="870" y="164" font-size="12.5" font-weight="700" fill="#12402a" text-anchor="middle">clickhouse-keeper（Raft 协调集群）</text>
  <text x="870" y="182" font-size="9" fill="#2f6f4f" text-anchor="middle">替代 ZooKeeper · 只存协调元数据，不存表数据</text>
  <g text-anchor="middle" font-size="8.5" fill="#12402a">
    <rect x="710" y="196" width="150" height="56" rx="9" fill="#fff" stroke="#bfe0cd"/><text x="785" y="216" font-weight="600">复制日志仲裁</text><text x="785" y="232" fill="#2f6f4f">/log /replicas</text><text x="785" y="245" fill="#2f6f4f">/mutations</text>
    <rect x="882" y="196" width="150" height="56" rx="9" fill="#fff" stroke="#bfe0cd"/><text x="957" y="216" font-weight="600">写入去重</text><text x="957" y="232" fill="#2f6f4f">/blocks (block hash)</text><text x="957" y="245" fill="#2f6f4f">quorum 跟踪</text>
    <rect x="710" y="262" width="150" height="52" rx="9" fill="#fff" stroke="#bfe0cd"/><text x="785" y="282" font-weight="600">分布式 DDL</text><text x="785" y="298" fill="#2f6f4f">task_queue/ddl</text>
    <rect x="882" y="262" width="150" height="52" rx="9" fill="#fff" stroke="#bfe0cd"/><text x="957" y="282" font-weight="600">复制型元数据</text><text x="957" y="298" fill="#2f6f4f">DDL/Access 传播</text>
  </g>
  <text x="870" y="340" font-size="9" fill="#2f6f4f" text-anchor="middle">3/5 节点 Raft 组 · 多数派提交 · 见「元数据与协调」「复制与一致性」</text>

  <!-- other replica nodes (right bottom) -->
  <rect x="690" y="388" width="360" height="222" rx="16" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="870" y="412" font-size="12" font-weight="700" fill="#274a78" text-anchor="middle">其余对等节点（Shard × Replica）</text>
  <g text-anchor="middle" font-size="8.5" fill="#274a78">
    <rect x="710" y="424" width="150" height="70" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="785" y="446" font-weight="600">Shard 1</text><text x="785" y="463" fill="#5b7db1">Replica A / B</text><text x="785" y="479" fill="#5b7db1">同数据多副本</text>
    <rect x="882" y="424" width="150" height="70" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="957" y="446" font-weight="600">Shard 2</text><text x="957" y="463" fill="#5b7db1">Replica A / B</text><text x="957" y="479" fill="#5b7db1">不同数据分片</text>
  </g>
  <rect x="710" y="504" width="322" height="42" rx="9" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="871" y="522" font-size="9" font-weight="600" fill="#5a3410" text-anchor="middle">Distributed 表 = 跨 shard 路由/汇聚视图</text>
  <text x="871" y="537" font-size="8" fill="#93762e" text-anchor="middle">散射到各 shard 本地表 → 汇聚（scatter/gather，非 MPP fragment 交换）</text>
  <text x="871" y="574" font-size="9" fill="#5b7db1" text-anchor="middle">副本间 part fetch（HTTP）· parallel replicas 分担读</text>
  <text x="871" y="592" font-size="8.5" fill="#8aa6cf" text-anchor="middle">见「集群与自愈」主线</text>

  <!-- connections -->
  <g stroke="#9ccbb0" stroke-width="1.5" fill="none" stroke-dasharray="5 3">
    <path d="M646,300 L690,255" marker-end="url(#ar)"/>
    <path d="M690,300 L646,300" opacity="0"/>
  </g>
  <line x1="435" y1="122" x2="350" y2="200" stroke="#c7c7cc" stroke-width="1.3" fill="none" marker-end="url(#ar)"/>
  <path d="M660,490 L690,490" stroke="#c7c7cc" stroke-width="1.3" fill="none" marker-end="url(#ar)"/>
  <text x="668" y="270" font-size="8" fill="#4c8567" transform="rotate(-38 668 270)">Keeper 协调</text>

  <!-- bottom takeaway -->
  <rect x="30" y="626" width="1020" height="76" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="50" y="650" font-size="11" font-weight="700" fill="#1d1d1f">位置即语义</text>
  <text x="50" y="672" font-size="10" fill="#4b4b50">与 Doris 的 FE/BE 主从架构不同：ClickHouse 每个节点都是对等的完整 server（解析→优化→执行→存储一条龙），</text>
  <text x="50" y="689" font-size="10" fill="#4b4b50">没有中心协调进程；Keeper 只做"协调仲裁"（复制日志/去重/DDL 队列），Distributed 表做跨 shard 路由汇聚。</text>
  <text x="30" y="726" font-size="9" fill="#a1a1a6">纵向 = 一条请求在单节点内的处理链；右侧 = 节点间协作（Keeper 仲裁 + 副本/分片）。后台任务贴在存储侧异步偿还写入欠账。</text>
  <text x="30" y="744" font-size="9" fill="#a1a1a6">配套详见：物理部署图（Shard/Replica/Keeper 布局）与依赖关系图（能力域分层）。</text>
  </g>
</svg>
