<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="700" viewBox="0 0 1060 700" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="700" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">能力域依赖关系（按依赖深度分层：上层依赖下层）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">箭头 A→B 表示"A 依赖 B"；越靠下越基础。后台任务横切承接各层异步部分。</text>

  <!-- Layer: interface (top) -->
  <rect x="40" y="72" width="820" height="72" rx="14" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="56" y="94" font-size="11" font-weight="700" fill="#1b2a4a">接口层（面向用户）</text>
  <g text-anchor="middle" font-size="10">
    <rect x="120" y="102" width="150" height="34" rx="8" fill="#fff" stroke="#bcd0ec"/><text x="195" y="124" font-weight="600" fill="#1b2a4a">DDL</text>
    <rect x="290" y="102" width="150" height="34" rx="8" fill="#fff" stroke="#bcd0ec"/><text x="365" y="124" font-weight="600" fill="#1b2a4a">DML</text>
    <rect x="460" y="102" width="150" height="34" rx="8" fill="#fff" stroke="#bcd0ec"/><text x="535" y="124" font-weight="600" fill="#1b2a4a">DQL</text>
    <rect x="630" y="102" width="150" height="34" rx="8" fill="#fff" stroke="#bcd0ec"/><text x="705" y="124" font-weight="600" fill="#1b2a4a">DCL</text>
  </g>

  <!-- Layer: 保障 -->
  <rect x="40" y="184" width="820" height="88" rx="14" fill="#f6f2fb" stroke="#d9c9ec"/>
  <text x="56" y="206" font-size="11" font-weight="700" fill="#3d2a5a">保障层</text>
  <g text-anchor="middle" font-size="9.5">
    <rect x="120" y="216" width="200" height="46" rx="8" fill="#fff" stroke="#d9c9ec"/><text x="220" y="236" font-weight="600" fill="#3d2a5a">复制与一致性</text><text x="220" y="252" font-size="8" fill="#7a5da5">ReplicatedMergeTree + Keeper</text>
    <rect x="340" y="216" width="200" height="46" rx="8" fill="#fff" stroke="#d9c9ec"/><text x="440" y="236" font-weight="600" fill="#3d2a5a">资源与负载管理</text><text x="440" y="252" font-size="8" fill="#7a5da5">Settings/Quota/内存/调度</text>
    <rect x="560" y="216" width="220" height="46" rx="8" fill="#fff" stroke="#d9c9ec"/><text x="670" y="236" font-weight="600" fill="#3d2a5a">集群与自愈</text><text x="670" y="252" font-size="8" fill="#7a5da5">Distributed + 副本恢复</text>
  </g>

  <!-- Layer: 计算 -->
  <rect x="40" y="312" width="820" height="88" rx="14" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="56" y="334" font-size="11" font-weight="700" fill="#12402a">计算层</text>
  <g text-anchor="middle" font-size="9.5">
    <rect x="200" y="344" width="240" height="46" rx="8" fill="#fff" stroke="#bfe0cd"/><text x="320" y="364" font-weight="600" fill="#12402a">优化技术</text><text x="320" y="380" font-size="8" fill="#2f6f4f">Analyzer + QueryPlan 优化 + 主键裁剪</text>
    <rect x="460" y="344" width="240" height="46" rx="8" fill="#fff" stroke="#bfe0cd"/><text x="580" y="364" font-weight="600" fill="#12402a">执行引擎</text><text x="580" y="380" font-size="8" fill="#2f6f4f">Processors 向量化 · Pipeline</text>
  </g>

  <!-- Layer: 底座 -->
  <rect x="40" y="440" width="820" height="88" rx="14" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="56" y="462" font-size="11" font-weight="700" fill="#7a5a1e">底座层（最基础）</text>
  <g text-anchor="middle" font-size="9.5">
    <rect x="200" y="472" width="240" height="46" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="320" y="492" font-weight="600" fill="#5a3410">存储引擎</text><text x="320" y="508" font-size="8" fill="#93762e">MergeTree · 不可变 Part</text>
    <rect x="460" y="472" width="240" height="46" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="580" y="492" font-weight="600" fill="#5a3410">元数据与协调</text><text x="580" y="508" font-size="8" fill="#93762e">Keeper/Database/DDLWorker</text>
  </g>

  <!-- background tasks orthogonal (right) -->
  <rect x="880" y="184" width="150" height="344" rx="14" fill="#fff3e0" stroke="#e8cf9a" stroke-dasharray="5 3"/>
  <text x="955" y="208" font-size="10.5" font-weight="700" fill="#7a5a1e" text-anchor="middle">后台任务</text>
  <text x="955" y="224" font-size="8" fill="#93762e" text-anchor="middle">正交横切</text>
  <g text-anchor="middle" font-size="8.5" fill="#5a3410">
    <text x="955" y="252">承接各层</text>
    <text x="955" y="270">的异步部分：</text>
    <text x="955" y="296">Merge/Mutation</text>
    <text x="955" y="314">TTL/清理</text>
    <text x="955" y="332">副本 fetch/修复</text>
    <text x="955" y="350">统计刷新</text>
  </g>
  <text x="955" y="392" font-size="8" fill="#93762e" text-anchor="middle">不在依赖链上</text>
  <text x="955" y="408" font-size="8" fill="#93762e" text-anchor="middle">而是"执行时机"</text>
  <text x="955" y="424" font-size="8" fill="#93762e" text-anchor="middle">维度</text>

  <!-- dependency arrows -->
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <!-- interface -> compute/support -->
    <line x1="535" y1="144" x2="535" y2="184" marker-end="url(#ar)"/>
    <path d="M365,144 L365,170 L440,170 L440,184" marker-end="url(#ar)"/>
    <path d="M705,144 L705,170 L670,170 L670,184" marker-end="url(#ar)"/>
    <!-- support -> compute -->
    <path d="M220,262 L220,290 L320,290 L320,312" marker-end="url(#ar)"/>
    <path d="M670,262 L670,290 L580,290 L580,312" marker-end="url(#ar)"/>
    <!-- compute -> base -->
    <line x1="320" y1="390" x2="320" y2="440" marker-end="url(#ar)"/>
    <path d="M580,390 L580,420 L320,420 L320,440" marker-end="url(#ar)"/>
    <line x1="580" y1="390" x2="580" y2="440" marker-end="url(#ar)"/>
    <!-- storage <-> metadata (mutual) -->
    <line x1="440" y1="495" x2="460" y2="495" marker-end="url(#ar)"/>
    <!-- 保障 -> 底座 (replication depends on both) -->
    <path d="M220,262 L120,290 L120,495 L200,495" marker-end="url(#ar)"/>
  </g>

  <!-- takeaway -->
  <rect x="40" y="548" width="990" height="128" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="572" font-size="11" font-weight="700" fill="#1d1d1f">读法与要点</text>
  <text x="60" y="594" font-size="10" fill="#4b4b50">· 接口主线（DDL/DML/DQL/DCL）都建立在支撑层之上：一条 SQL 的表现由它依赖的能力域共同决定。</text>
  <text x="60" y="612" font-size="10" fill="#4b4b50">· 计算层（优化/执行）依赖底座（存储/元数据）：优化要读存储的稀疏索引，执行要读存储的 Part。</text>
  <text x="60" y="630" font-size="10" fill="#4b4b50">· 复制与一致性同时依赖存储（Part 是复制单位）与元数据（Keeper 是复制日志仲裁者）——保障层的基石。</text>
  <text x="60" y="648" font-size="10" fill="#4b4b50">· 存储 ↔ 元数据互依：元数据记录表结构/副本位置，存储的 Part 状态又要持久化进元数据。</text>
  <text x="60" y="668" font-size="10" fill="#4b4b50">· 后台任务不在依赖链上——它是横切各层的"执行时机"维度，承接每层被推迟到后台的工作。</text>
</svg>
