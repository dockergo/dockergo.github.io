<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="580" viewBox="0 0 1060 580" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="580" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">QueryPlan 优化 pass：在逻辑算子树上做变换（optimizeTree.cpp）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">目标：减少算子、减少行数、把裁剪条件推给 ReadFromMergeTree 读取步</text>

  <g text-anchor="middle">
    <rect x="40" y="76" width="235" height="120" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
    <text x="157" y="98" font-size="11" font-weight="700" fill="#12402a">filterPushDown</text>
    <text x="157" y="120" font-size="9" fill="#2f6f4f">谓词尽量下推到源附近</text>
    <text x="157" y="140" font-size="8.5" fill="#4c8567">早过滤 → 少传数据到上层</text>
    <text x="157" y="164" font-size="8" fill="#8aa6cf">如 WHERE 穿过 JOIN 下到扫描</text>
    <text x="157" y="182" font-size="8" fill="#8aa6cf">filterPushDown.cpp</text>

    <rect x="290" y="76" width="235" height="120" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
    <text x="407" y="98" font-size="11" font-weight="700" fill="#12402a">optimizePrewhere</text>
    <text x="407" y="120" font-size="9" fill="#2f6f4f">WHERE → PREWHERE</text>
    <text x="407" y="140" font-size="8.5" fill="#4c8567">先读判断列，少读投影列</text>
    <text x="407" y="164" font-size="8" fill="#8aa6cf">optimizePrewhere.cpp</text>
    <text x="407" y="182" font-size="8" fill="#8aa6cf">见存储·读取路径篇</text>

    <rect x="540" y="76" width="235" height="120" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
    <text x="657" y="98" font-size="11" font-weight="700" fill="#12402a">optimizeReadInOrder</text>
    <text x="657" y="120" font-size="9" fill="#2f6f4f">ORDER BY 与主键序一致时</text>
    <text x="657" y="140" font-size="8.5" fill="#4c8567">省全量排序 + 流式 LIMIT</text>
    <text x="657" y="164" font-size="8" fill="#8aa6cf">optimizeReadInOrder.cpp</text>
    <text x="657" y="182" font-size="8" fill="#8aa6cf">大表 ORDER BY LIMIT 神器</text>

    <rect x="790" y="76" width="230" height="120" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
    <text x="905" y="98" font-size="11" font-weight="700" fill="#274a78">主键裁剪 + limit</text>
    <text x="905" y="120" font-size="8.5" fill="#5b7db1">optimizePrimaryKeyConditionAndLimit</text>
    <text x="905" y="140" font-size="9" fill="#274a78">缩小 MarkRange + 早停</text>
    <text x="905" y="164" font-size="8" fill="#8aa6cf">条件推给 ReadFromMergeTree</text>
    <text x="905" y="182" font-size="8" fill="#8aa6cf">见主键裁剪篇</text>

    <rect x="40" y="210" width="360" height="110" rx="12" fill="#f6f2fb" stroke="#d9c9ec" filter="url(#soft)"/>
    <text x="220" y="232" font-size="11" font-weight="700" fill="#3d2a5a">投影使用</text>
    <text x="220" y="252" font-size="8.5" fill="#7a5da5">optimizeUseAggregateProjections（:365）</text>
    <text x="220" y="268" font-size="8.5" fill="#7a5da5">optimizeUseNormalProjections（:385）</text>
    <text x="220" y="288" font-size="9" fill="#3d2a5a">命中预聚合/重排序投影 → 跳过原表计算</text>
    <text x="220" y="306" font-size="8" fill="#9a7cc4">见 Projection 篇</text>

    <rect x="420" y="210" width="280" height="110" rx="12" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
    <text x="560" y="232" font-size="11" font-weight="700" fill="#5a3410">TopN / 延迟物化</text>
    <text x="560" y="252" font-size="8.5" fill="#93762e">optimizeTopK · optimizeLazyMaterialization</text>
    <text x="560" y="272" font-size="9" fill="#5a3410">ORDER BY+LIMIT 只保 top-k</text>
    <text x="560" y="290" font-size="9" fill="#5a3410">先算过滤，晚读大列</text>
    <text x="560" y="308" font-size="8" fill="#b08843">减少排序缓冲与列读取</text>

    <rect x="720" y="210" width="300" height="110" rx="12" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
    <text x="870" y="232" font-size="11" font-weight="700" fill="#5a3410">Join / limit 下推等</text>
    <text x="870" y="252" font-size="8.5" fill="#93762e">optimizeJoin · pushDownLimit</text>
    <text x="870" y="272" font-size="9" fill="#5a3410">join 重排 · limit 尽早截断</text>
    <text x="870" y="290" font-size="9" fill="#5a3410">表达式合并 · 冗余排序消除</text>
    <text x="870" y="308" font-size="8" fill="#b08843">共十余条 pass</text>
  </g>

  <rect x="40" y="336" width="980" height="90" rx="13" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="60" y="360" font-size="11" font-weight="700" fill="#7a5a1e">共同落点：推给 ReadFromMergeTree</text>
  <text x="60" y="382" font-size="9.5" fill="#93762e">· 大多数优化最终把"过滤/裁剪/limit/PREWHERE"条件下推给读取步 ReadFromMergeTree（源步）</text>
  <text x="60" y="400" font-size="9.5" fill="#93762e">· 读取步据此裁剪 granule、分步 PREWHERE、早停——见「DQL·优化」篇的 addFilter/applyFilters 落点</text>
  <text x="60" y="418" font-size="9" fill="#b08843">· 即：QueryPlan 优化的成果，最终兑现为"存储层少读、少算"</text>

  <rect x="40" y="440" width="980" height="100" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="464" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="486" font-size="10" fill="#4b4b50">QueryPlan 优化在逻辑算子树上做十余条变换：谓词/limit 下推、PREWHERE 移动、read-in-order、投影使用、TopN、</text>
  <text x="60" y="504" font-size="10" fill="#4b4b50">延迟物化、join 重排。它们不改结果，只把"要做的事"削减并推给 ReadFromMergeTree，最终兑现为存储层少读少算。</text>
  <text x="60" y="524" font-size="9" fill="#8a8a8f">read-in-order 与投影是大表查询提速的两大杠杆，但都依赖合理的主键/投影设计。</text>
</svg>
