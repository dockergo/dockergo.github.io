<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="560" viewBox="0 0 1060 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Workload 资源调度：按 workload 层级分配 CPU/IO（在线不被后台饿死）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">src/Common/Scheduler/ · FairPolicy/PriorityPolicy/FifoQueue · CPUSlotsAllocation · CREATE WORKLOAD/RESOURCE</text>

  <!-- scheduler tree -->
  <g text-anchor="middle">
    <rect x="410" y="80" width="240" height="50" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="530" y="100" font-size="11" font-weight="700" fill="#12402a">资源层级树（root）</text><text x="530" y="118" font-size="8.5" fill="#2f6f4f">CREATE RESOURCE / WORKLOAD</text>
    <rect x="120" y="164" width="220" height="60" rx="11" fill="#eef3fb" stroke="#bcd0ec"/><text x="230" y="186" font-size="10" font-weight="600" fill="#1b2a4a">workload: 在线查询</text><text x="230" y="204" font-size="8" fill="#5b7db1">PriorityPolicy 高优先</text><text x="230" y="218" font-size="8" fill="#8aa6cf">保证低延迟</text>
    <rect x="420" y="164" width="220" height="60" rx="11" fill="#f6f2fb" stroke="#d9c9ec"/><text x="530" y="186" font-size="10" font-weight="600" fill="#3d2a5a">workload: 报表/ETL</text><text x="530" y="204" font-size="8" fill="#7a5da5">FairPolicy 公平分享</text><text x="530" y="218" font-size="8" fill="#9a7cc4">不抢在线资源</text>
    <rect x="720" y="164" width="220" height="60" rx="11" fill="#fdf6ea" stroke="#efdcb4"/><text x="830" y="186" font-size="10" font-weight="600" fill="#5a3410">workload: 后台任务</text><text x="830" y="204" font-size="8" fill="#93762e">低优先 + 限流</text><text x="830" y="218" font-size="8" fill="#b08843">merge/fetch 不抢前台</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <path d="M470,130 L230,164" marker-end="url(#ar)"/>
    <line x1="530" y1="130" x2="530" y2="164" marker-end="url(#ar)"/>
    <path d="M590,130 L830,164" marker-end="url(#ar)"/>
  </g>

  <!-- policy nodes -->
  <rect x="40" y="248" width="480" height="150" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="280" y="272" font-size="11" font-weight="700" fill="#274a78" text-anchor="middle">调度策略节点（Scheduler/Nodes）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="60" y="286" width="130" height="44" rx="8" fill="#fff" stroke="#cfe0f2"/><text x="125" y="306" font-weight="600" fill="#274a78">FairPolicy</text><text x="125" y="320" fill="#5b7db1">公平分享</text>
    <rect x="200" y="286" width="130" height="44" rx="8" fill="#fff" stroke="#cfe0f2"/><text x="265" y="306" font-weight="600" fill="#274a78">PriorityPolicy</text><text x="265" y="320" fill="#5b7db1">按优先级</text>
    <rect x="340" y="286" width="160" height="44" rx="8" fill="#fff" stroke="#cfe0f2"/><text x="420" y="306" font-weight="600" fill="#274a78">FifoQueue</text><text x="420" y="320" fill="#5b7db1">先进先出排队</text>
    <rect x="60" y="340" width="200" height="44" rx="8" fill="#fff" stroke="#cfe0f2"/><text x="160" y="360" font-weight="600" fill="#274a78">SemaphoreConstraint</text><text x="160" y="374" fill="#5b7db1">并发数约束</text>
    <rect x="270" y="340" width="230" height="44" rx="8" fill="#fff" stroke="#cfe0f2"/><text x="385" y="360" font-weight="600" fill="#274a78">ThrottlerConstraint</text><text x="385" y="374" fill="#5b7db1">带宽/速率约束</text>
  </g>

  <!-- cpu + admission -->
  <rect x="540" y="248" width="480" height="150" rx="13" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="780" y="272" font-size="11" font-weight="700" fill="#7a5a1e" text-anchor="middle">CPU 分配与准入控制</text>
  <rect x="560" y="286" width="440" height="44" rx="8" fill="#fff" stroke="#efdcb4"/>
  <text x="780" y="306" font-size="9.5" font-weight="600" fill="#5a3410" text-anchor="middle">CPUSlotsAllocation（Scheduler/）</text>
  <text x="780" y="322" font-size="8.5" fill="#93762e" text-anchor="middle">按 workload 分配 CPU slot</text>
  <rect x="560" y="338" width="440" height="46" rx="8" fill="#fff" stroke="#efdcb4"/>
  <text x="780" y="358" font-size="9.5" font-weight="600" fill="#5a3410" text-anchor="middle">ConcurrencyControl（h:62）</text>
  <text x="780" y="374" font-size="8.5" fill="#93762e" text-anchor="middle">限同时活跃查询数（max_concurrent_queries, :474）</text>

  <rect x="40" y="414" width="980" height="130" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="438" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="460" font-size="10" fill="#4b4b50">Workload 调度用层级化资源树把 CPU/IO 按 workload 分配：策略节点（Fair/Priority/Fifo + 并发/带宽约束）组合出</text>
  <text x="60" y="478" font-size="10" fill="#4b4b50">"在线查询高优先、报表公平、后台低优先"的隔离。CPUSlotsAllocation 分 CPU、ConcurrencyControl 限并发数。</text>
  <text x="60" y="500" font-size="10" fill="#4b4b50" font-weight="600">核心价值：在线查询不被后台大查询/ETL 饿死——多租户/混合负载场景的隔离基石。</text>
  <text x="60" y="524" font-size="9" fill="#8a8a8f">用 CREATE WORKLOAD / CREATE RESOURCE 定义资源层级树。</text>
</svg>
