<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="580" viewBox="0 0 1060 580" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="580" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">行级安全（Row Policy）：给表附加过滤，规划期自动注入 WHERE</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">RowPolicy (RowPolicy.h:15) · restrictive AND / permissive OR (RowPolicyCache.cpp:24) · 应用于 InterpreterSelectQuery.cpp:695,:894</text>

  <!-- policy types -->
  <rect x="40" y="72" width="480" height="180" rx="13" fill="#f6f2fb" stroke="#d9c9ec"/>
  <text x="280" y="96" font-size="12" font-weight="700" fill="#3d2a5a" text-anchor="middle">两种策略，组合方式不同</text>
  <rect x="60" y="110" width="220" height="120" rx="10" fill="#fff" stroke="#d9c9ec"/>
  <text x="170" y="132" font-size="10" font-weight="600" fill="#3d2a5a" text-anchor="middle">restrictive（限制型）</text>
  <text x="170" y="152" font-size="8.5" fill="#7a5da5" text-anchor="middle">多条之间用 AND</text>
  <text x="170" y="172" font-size="8.5" fill="#7a5da5" text-anchor="middle">isRestrictive :36</text>
  <text x="170" y="196" font-size="8" fill="#9a7cc4" text-anchor="middle">"必须同时满足"</text>
  <text x="170" y="214" font-size="8" fill="#9a7cc4" text-anchor="middle">收紧可见范围</text>
  <rect x="300" y="110" width="200" height="120" rx="10" fill="#fff" stroke="#d9c9ec"/>
  <text x="400" y="132" font-size="10" font-weight="600" fill="#3d2a5a" text-anchor="middle">permissive（许可型）</text>
  <text x="400" y="152" font-size="8.5" fill="#7a5da5" text-anchor="middle">多条之间用 OR</text>
  <text x="400" y="172" font-size="8.5" fill="#7a5da5" text-anchor="middle">isPermissive :45</text>
  <text x="400" y="196" font-size="8" fill="#9a7cc4" text-anchor="middle">"满足任一即可"</text>
  <text x="400" y="214" font-size="8" fill="#9a7cc4" text-anchor="middle">放宽可见范围</text>

  <!-- combine -->
  <rect x="540" y="72" width="480" height="180" rx="13" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="780" y="96" font-size="12" font-weight="700" fill="#12402a" text-anchor="middle">组合：mixFilters（RowPolicyCache.cpp:24）</text>
  <rect x="560" y="110" width="440" height="60" rx="9" fill="#fff" stroke="#bfe0cd"/>
  <text x="780" y="132" font-size="9" fill="#12402a" text-anchor="middle">例：3 条 restrictive 策略 a=1, b=2, c=3</text>
  <text x="780" y="152" font-size="9.5" font-weight="600" fill="#12402a" text-anchor="middle">→ 合并为 a=1 AND b=2 AND c=3（:306）</text>
  <text x="780" y="188" font-size="9" fill="#2f6f4f" text-anchor="middle">restrictive 全 AND、permissive 全 OR</text>
  <text x="780" y="206" font-size="8.5" fill="#4c8567" text-anchor="middle">最终得到该用户在该表上的有效过滤表达式</text>
  <text x="780" y="228" font-size="8.5" fill="#4c8567" text-anchor="middle">EnabledRowPolicies::getFilter（EnabledRowPolicies.h:59）</text>

  <!-- injection -->
  <rect x="40" y="272" width="980" height="140" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="296" font-size="11.5" font-weight="700" fill="#274a78">应用点：规划期把策略表达式注入查询的 WHERE（对用户透明）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="60" y="312" width="220" height="64" rx="9" fill="#fff" stroke="#cfe0f2"/><text x="170" y="332" font-weight="600" fill="#274a78">用户写：SELECT * FROM t</text><text x="170" y="350" fill="#5b7db1">未写任何过滤</text><text x="170" y="366" fill="#8aa6cf">但该用户有行策略</text>
    <text x="305" y="348" font-size="16" fill="#c7c7cc">→</text>
    <rect x="330" y="312" width="280" height="64" rx="9" fill="#f2fbf6" stroke="#cdeadb"/><text x="470" y="332" font-weight="600" fill="#12402a">规划期取策略过滤</text><text x="470" y="350" fill="#2f6f4f">getRowPolicyFilter（:695）</text><text x="470" y="366" fill="#2f6f4f">push 进 query_info.filter_asts（:894）</text>
    <text x="635" y="348" font-size="16" fill="#c7c7cc">→</text>
    <rect x="660" y="312" width="340" height="64" rx="9" fill="#fff" stroke="#cfe0f2"/><text x="830" y="332" font-weight="600" fill="#274a78">实际执行：SELECT * FROM t WHERE &lt;策略&gt;</text><text x="830" y="350" fill="#5b7db1">用户只看到符合策略的行</text><text x="830" y="366" fill="#8aa6cf">与用户自己的 WHERE 用 AND 叠加</text>
  </g>

  <rect x="40" y="426" width="980" height="120" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="450" font-size="11" font-weight="700" fill="#1d1d1f">一句话与陷阱</text>
  <text x="60" y="472" font-size="10" fill="#4b4b50">行级安全 = 给表按用户附加过滤表达式，规划期自动注入 WHERE，对用户透明：restrictive 策略 AND 叠加（收紧）、</text>
  <text x="60" y="489" font-size="10" fill="#4b4b50">permissive 策略 OR 叠加（放宽）。用户即使写 SELECT * 也只能看到策略允许的行。</text>
  <text x="60" y="512" font-size="10" fill="#7a2230">陷阱：users_without_row_policies_can_read_rows 默认 true——没给某用户设策略时，他能看全部行；</text>
  <text x="60" y="529" font-size="10" fill="#7a2230">要"默认拒绝"需显式为所有相关用户配置策略（或改该开关）。</text>
</svg>
