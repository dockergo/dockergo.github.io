<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="740" viewBox="0 0 1080 740" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="740" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">查询执行全景：一条 SELECT 从文本到结果的完整链路</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">executeQueryImpl (executeQuery.cpp:973) 总漏斗 · v25.8 默认 Analyzer→Planner→QueryPlan→Processors（enable_analyzer=true :6521）</text>

  <!-- vertical pipeline -->
  <g text-anchor="middle">
    <rect x="380" y="72" width="320" height="46" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="540" y="90" font-size="11" font-weight="600" fill="#1b2a4a">① 接入 executeQuery</text><text x="540" y="106" font-size="8.5" fill="#5b7db1">TCPHandler/HTTPHandler → 查结果缓存</text>
    <rect x="380" y="134" width="320" height="46" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="540" y="152" font-size="11" font-weight="600" fill="#1b2a4a">② Parser</text><text x="540" y="168" font-size="8.5" fill="#5b7db1">SQL 文本 → AST（:1053）</text>
    <rect x="380" y="196" width="320" height="46" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="540" y="214" font-size="11" font-weight="600" fill="#274a78">③ Analyzer：AST → QueryTree</text><text x="540" y="230" font-size="8.5" fill="#5b7db1">40+ pass 语义规整（QueryTreePassManager）</text>
    <rect x="380" y="258" width="320" height="46" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="540" y="276" font-size="11" font-weight="600" fill="#274a78">④ Planner：QueryTree → QueryPlan</text><text x="540" y="292" font-size="8.5" fill="#5b7db1">逻辑算子树（Planner.cpp:1373）</text>
    <rect x="380" y="320" width="320" height="46" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="540" y="338" font-size="11" font-weight="600" fill="#274a78">⑤ 优化 pass</text><text x="540" y="354" font-size="8.5" fill="#5b7db1">下推/PREWHERE/主键裁剪/read-in-order</text>
    <rect x="380" y="382" width="320" height="46" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="540" y="400" font-size="11" font-weight="600" fill="#12402a">⑥ QueryPlan → QueryPipeline</text><text x="540" y="416" font-size="8.5" fill="#2f6f4f">IProcessor 物理执行图（QueryPlan.cpp:168）</text>
    <rect x="380" y="444" width="320" height="46" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="540" y="462" font-size="11" font-weight="600" fill="#12402a">⑦ PipelineExecutor 执行</text><text x="540" y="478" font-size="8.5" fill="#2f6f4f">pull 模型 · Chunk 列式批 · max_threads 并行</text>
    <rect x="380" y="506" width="320" height="46" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/><text x="540" y="524" font-size="11" font-weight="600" fill="#5a3410">⑧ 存储读取 ReadFromMergeTree</text><text x="540" y="540" font-size="8.5" fill="#93762e">MarkRange → 解压 → PREWHERE（存储主线）</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="540" y1="118" x2="540" y2="134" marker-end="url(#ar)"/>
    <line x1="540" y1="180" x2="540" y2="196" marker-end="url(#ar)"/>
    <line x1="540" y1="242" x2="540" y2="258" marker-end="url(#ar)"/>
    <line x1="540" y1="304" x2="540" y2="320" marker-end="url(#ar)"/>
    <line x1="540" y1="366" x2="540" y2="382" marker-end="url(#ar)"/>
    <line x1="540" y1="428" x2="540" y2="444" marker-end="url(#ar)"/>
    <line x1="540" y1="490" x2="540" y2="506" marker-end="url(#ar)"/>
  </g>

  <!-- left: which domain -->
  <rect x="40" y="196" width="310" height="170" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="195" y="218" font-size="11" font-weight="700" fill="#274a78" text-anchor="middle">③④⑤ = 优化技术主线</text>
  <text x="60" y="240" font-size="9" fill="#5b7db1">· Analyzer 规整语义（名称解析/化简）</text>
  <text x="60" y="258" font-size="9" fill="#5b7db1">· Planner 生成逻辑计划</text>
  <text x="60" y="276" font-size="9" fill="#5b7db1">· 优化 pass 减少"要做的事"</text>
  <text x="60" y="300" font-size="9" fill="#8aa6cf">规划期决定：读多少数据、</text>
  <text x="60" y="316" font-size="9" fill="#8aa6cf">用什么 join、能否命中投影</text>
  <text x="60" y="342" font-size="8.5" fill="#8aa6cf">→ 见「优化技术」主线</text>

  <rect x="40" y="382" width="310" height="108" rx="13" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="195" y="404" font-size="11" font-weight="700" fill="#12402a" text-anchor="middle">⑥⑦ = 执行引擎主线</text>
  <text x="60" y="426" font-size="9" fill="#2f6f4f">· Processors 向量化框架</text>
  <text x="60" y="444" font-size="9" fill="#2f6f4f">· PipelineExecutor pull 调度</text>
  <text x="60" y="462" font-size="9" fill="#2f6f4f">· 聚合/join/排序算子</text>
  <text x="60" y="482" font-size="8.5" fill="#4c8567">→ 见「执行引擎」主线</text>

  <rect x="40" y="506" width="310" height="60" rx="13" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="195" y="528" font-size="11" font-weight="700" fill="#7a5a1e" text-anchor="middle">⑧ = 存储引擎主线</text>
  <text x="60" y="550" font-size="9" fill="#93762e">主键/跳数裁剪 → ReadPool → PREWHERE</text>

  <!-- right: distributed -->
  <rect x="730" y="196" width="310" height="294" rx="13" fill="#f6f2fb" stroke="#d9c9ec"/>
  <text x="885" y="218" font-size="11" font-weight="700" fill="#3d2a5a" text-anchor="middle">跨节点：⑥⑦⑧ 在各 shard 上并行</text>
  <text x="750" y="242" font-size="9.5" font-weight="600" fill="#3d2a5a">Distributed（scatter/gather）</text>
  <text x="750" y="260" font-size="9" fill="#7a5da5">· 子查询发到各 shard 一个副本</text>
  <text x="750" y="278" font-size="9" fill="#7a5da5">· 各 shard 独立算完 → 汇聚</text>
  <text x="750" y="296" font-size="9" fill="#7a5da5">· 无节点间 shuffle（非 MPP）</text>
  <text x="750" y="320" font-size="9.5" font-weight="600" fill="#3d2a5a">parallel replicas（BETA）</text>
  <text x="750" y="338" font-size="9" fill="#7a5da5">· 同 shard 多副本分担扫描</text>
  <text x="750" y="356" font-size="9" fill="#7a5da5">· 提升单分片大扫描吞吐</text>
  <rect x="750" y="374" width="270" height="100" rx="9" fill="#faf7fd" stroke="#d9c9ec"/>
  <text x="885" y="394" font-size="9" font-weight="600" fill="#3d2a5a" text-anchor="middle">与 Doris MPP 的区别</text>
  <text x="885" y="414" font-size="8.5" fill="#7a5da5" text-anchor="middle">Doris：fragment 间 Exchange shuffle</text>
  <text x="885" y="432" font-size="8.5" fill="#7a5da5" text-anchor="middle">CH：shard 独立算 + 顶层汇聚</text>
  <text x="885" y="452" font-size="8.5" fill="#9a7cc4" text-anchor="middle">跨 shard 大 join 需 GLOBAL join</text>
  <text x="885" y="468" font-size="8" fill="#9a7cc4" text-anchor="middle">→ 见「集群与自愈」主线</text>

  <!-- result -->
  <rect x="380" y="572" width="320" height="50" rx="11" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="540" y="592" font-size="11" font-weight="700" fill="#1d1d1f" text-anchor="middle">结果返回（可写入 QueryResultCache）</text>
  <text x="540" y="610" font-size="8.5" fill="#6b6b70" text-anchor="middle">下次相同查询直接命中缓存，跳过①-⑧</text>
  <line x1="540" y1="552" x2="540" y2="572" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="40" y="640" width="1000" height="80" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="664" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="686" font-size="10" fill="#4b4b50">一条 SELECT 是"优化技术 + 执行引擎 + 存储引擎"三条支撑主线的合力：Analyzer/Planner/优化决定读多少、怎么算，</text>
  <text x="60" y="703" font-size="10" fill="#4b4b50">Processors 向量化并行执行，ReadFromMergeTree 高效读盘；跨节点是 Distributed 的散射汇聚，而非 MPP shuffle。</text>
</svg>
