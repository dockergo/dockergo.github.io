<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="620" viewBox="0 0 1060 620" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="1060" height="620" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">接口主线 × 能力域 依赖矩阵</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">● 强依赖（主路径必经）　◐ 部分依赖（特定场景）　○ 弱/间接　空 = 基本无关</text>

  <!-- table -->
  <g font-size="10">
    <!-- header row -->
    <rect x="40" y="72" width="150" height="46" rx="8" fill="#f7f7f9" stroke="#e6e6ea"/><text x="115" y="100" font-weight="700" fill="#1d1d1f" text-anchor="middle">能力域 ↓ / 接口 →</text>
    <rect x="196" y="72" width="120" height="46" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="256" y="94" font-weight="700" fill="#1b2a4a" text-anchor="middle">DDL</text><text x="256" y="110" font-size="8" fill="#5b7db1" text-anchor="middle">建/改元数据</text>
    <rect x="322" y="72" width="120" height="46" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="382" y="94" font-weight="700" fill="#1b2a4a" text-anchor="middle">DML</text><text x="382" y="110" font-size="8" fill="#5b7db1" text-anchor="middle">写数据</text>
    <rect x="448" y="72" width="120" height="46" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="508" y="94" font-weight="700" fill="#1b2a4a" text-anchor="middle">DQL</text><text x="508" y="110" font-size="8" fill="#5b7db1" text-anchor="middle">读数据</text>
    <rect x="574" y="72" width="120" height="46" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="634" y="94" font-weight="700" fill="#1b2a4a" text-anchor="middle">DCL</text><text x="634" y="110" font-size="8" fill="#5b7db1" text-anchor="middle">管权限</text>
    <rect x="700" y="72" width="330" height="46" rx="8" fill="#f7f7f9" stroke="#e6e6ea"/><text x="865" y="100" font-size="9" fill="#6b6b70" text-anchor="middle">说明</text>
  </g>

  <!-- rows -->
  <g font-size="14" text-anchor="middle">
    <!-- storage -->
    <rect x="40" y="124" width="150" height="42" rx="7" fill="#fdf6ea" stroke="#efdcb4"/><text x="115" y="150" font-size="10" font-weight="600" fill="#5a3410">存储引擎</text>
    <rect x="196" y="124" width="120" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="256" y="151" fill="#5a3410">◐</text>
    <rect x="322" y="124" width="120" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="382" y="151" fill="#12402a">●</text>
    <rect x="448" y="124" width="120" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="508" y="151" fill="#12402a">●</text>
    <rect x="574" y="124" width="120" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="634" y="151" fill="#b8b8bf">○</text>
    <text x="712" y="150" font-size="9" fill="#6b6b70" text-anchor="start">读写数据都落在 Part 上；DDL 定引擎/schema</text>

    <!-- 元数据 -->
    <rect x="40" y="170" width="150" height="42" rx="7" fill="#fdf6ea" stroke="#efdcb4"/><text x="115" y="196" font-size="10" font-weight="600" fill="#5a3410">元数据与协调</text>
    <rect x="196" y="170" width="120" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="256" y="197" fill="#12402a">●</text>
    <rect x="322" y="170" width="120" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="382" y="197" fill="#5a3410">◐</text>
    <rect x="448" y="170" width="120" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="508" y="197" fill="#b8b8bf">○</text>
    <rect x="574" y="170" width="120" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="634" y="197" fill="#12402a">●</text>
    <text x="712" y="196" font-size="9" fill="#6b6b70" text-anchor="start">DDL/DCL 改元数据经 Keeper 全集群一致</text>

    <!-- 优化 -->
    <rect x="40" y="216" width="150" height="42" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="115" y="242" font-size="10" font-weight="600" fill="#274a78">优化技术</text>
    <rect x="196" y="216" width="120" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="256" y="243" fill="#b8b8bf">○</text>
    <rect x="322" y="216" width="120" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="382" y="243" fill="#b8b8bf">○</text>
    <rect x="448" y="216" width="120" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="508" y="243" fill="#12402a">●</text>
    <rect x="574" y="216" width="120" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="634" y="243" fill="#eee"></text>
    <text x="712" y="242" font-size="9" fill="#6b6b70" text-anchor="start">优化几乎只服务 DQL（裁剪/下推/PREWHERE）</text>

    <!-- 执行 -->
    <rect x="40" y="262" width="150" height="42" rx="7" fill="#eafaf1" stroke="#bfe0cd"/><text x="115" y="288" font-size="10" font-weight="600" fill="#12402a">执行引擎</text>
    <rect x="196" y="262" width="120" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="256" y="289" fill="#eee"></text>
    <rect x="322" y="262" width="120" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="382" y="289" fill="#5a3410">◐</text>
    <rect x="448" y="262" width="120" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="508" y="289" fill="#12402a">●</text>
    <rect x="574" y="262" width="120" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="634" y="289" fill="#eee"></text>
    <text x="712" y="288" font-size="9" fill="#6b6b70" text-anchor="start">DQL 全程走 Processors；DML/mutation 也用管线</text>

    <!-- 复制 -->
    <rect x="40" y="308" width="150" height="42" rx="7" fill="#f6f2fb" stroke="#d9c9ec"/><text x="115" y="334" font-size="10" font-weight="600" fill="#3d2a5a">复制与一致性</text>
    <rect x="196" y="308" width="120" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="256" y="335" fill="#5a3410">◐</text>
    <rect x="322" y="308" width="120" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="382" y="335" fill="#12402a">●</text>
    <rect x="448" y="308" width="120" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="508" y="335" fill="#5a3410">◐</text>
    <rect x="574" y="308" width="120" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="634" y="335" fill="#b8b8bf">○</text>
    <text x="712" y="334" font-size="9" fill="#6b6b70" text-anchor="start">写入幂等去重/副本对齐；读可选就近副本</text>

    <!-- 资源 -->
    <rect x="40" y="354" width="150" height="42" rx="7" fill="#f6f2fb" stroke="#d9c9ec"/><text x="115" y="380" font-size="10" font-weight="600" fill="#3d2a5a">资源与负载</text>
    <rect x="196" y="354" width="120" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="256" y="381" fill="#b8b8bf">○</text>
    <rect x="322" y="354" width="120" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="382" y="381" fill="#5a3410">◐</text>
    <rect x="448" y="354" width="120" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="508" y="381" fill="#12402a">●</text>
    <rect x="574" y="354" width="120" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="634" y="381" fill="#5a3410">◐</text>
    <text x="712" y="380" font-size="9" fill="#6b6b70" text-anchor="start">内存/并发/Quota 主要约束 DQL；DCL 定 Quota</text>

    <!-- 集群 -->
    <rect x="40" y="400" width="150" height="42" rx="7" fill="#f6f2fb" stroke="#d9c9ec"/><text x="115" y="426" font-size="10" font-weight="600" fill="#3d2a5a">集群与自愈</text>
    <rect x="196" y="400" width="120" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="256" y="427" fill="#5a3410">◐</text>
    <rect x="322" y="400" width="120" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="382" y="427" fill="#5a3410">◐</text>
    <rect x="448" y="400" width="120" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="508" y="427" fill="#12402a">●</text>
    <rect x="574" y="400" width="120" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="634" y="427" fill="#eee"></text>
    <text x="712" y="426" font-size="9" fill="#6b6b70" text-anchor="start">分布式查询散射汇聚；ON CLUSTER DDL/写路由</text>

    <!-- 后台 -->
    <rect x="40" y="446" width="150" height="42" rx="7" fill="#fff3e0" stroke="#e8cf9a"/><text x="115" y="472" font-size="10" font-weight="600" fill="#7a5a1e">后台任务</text>
    <rect x="196" y="446" width="120" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="256" y="473" fill="#b8b8bf">○</text>
    <rect x="322" y="446" width="120" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="382" y="473" fill="#12402a">●</text>
    <rect x="448" y="446" width="120" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="508" y="473" fill="#5a3410">◐</text>
    <rect x="574" y="446" width="120" height="42" rx="7" fill="#fff" stroke="#eee"/><text x="634" y="473" fill="#eee"></text>
    <text x="712" y="472" font-size="9" fill="#6b6b70" text-anchor="start">DML 欠的账（merge/mutation/TTL）后台偿还</text>
  </g>

  <!-- takeaway -->
  <rect x="40" y="508" width="990" height="92" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="532" font-size="11" font-weight="700" fill="#1d1d1f">读矩阵</text>
  <text x="60" y="554" font-size="10" fill="#4b4b50">· DQL 依赖面最广（存储/优化/执行/资源/集群全 ●）——所以"查得快不快"是全栈能力的合力。</text>
  <text x="60" y="572" font-size="10" fill="#4b4b50">· DML 强依赖存储与复制（写 Part + 幂等去重），并欠下后台 merge 的账。</text>
  <text x="60" y="590" font-size="10" fill="#4b4b50">· DDL/DCL 强依赖元数据与协调（改元数据经 Keeper 全集群一致），对计算层几乎无关。</text>
</svg>
