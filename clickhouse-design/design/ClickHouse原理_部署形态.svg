<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="640" viewBox="0 0 1060 640" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="640" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">部署形态：存储关系维度的取值（主线清单不变，形态变）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">shared-nothing（默认）↔ shared storage（存算分离），冷热分层可正交叠加；Distributed 是旁路路由</text>

  <!-- shared-nothing -->
  <rect x="30" y="72" width="320" height="330" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="190" y="96" font-size="12.5" font-weight="700" fill="#1b2a4a" text-anchor="middle">① shared-nothing（默认）</text>
  <text x="190" y="114" font-size="9" fill="#5b7db1" text-anchor="middle">每副本本地盘存该分片全量</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="54" y="128" width="128" height="90" rx="9" fill="#fff" stroke="#bcd0ec"/><text x="118" y="148" font-size="9.5" font-weight="600" fill="#1b2a4a">node A</text><text x="118" y="166" fill="#5b7db1">server + 本地盘</text><rect x="70" y="176" width="96" height="30" rx="6" fill="#fdf6ea" stroke="#efdcb4"/><text x="118" y="195" fill="#5a3410">Part 全量</text>
    <rect x="198" y="128" width="128" height="90" rx="9" fill="#fff" stroke="#bcd0ec"/><text x="262" y="148" font-size="9.5" font-weight="600" fill="#1b2a4a">node B</text><text x="262" y="166" fill="#5b7db1">server + 本地盘</text><rect x="214" y="176" width="96" height="30" rx="6" fill="#fdf6ea" stroke="#efdcb4"/><text x="262" y="195" fill="#5a3410">Part 副本</text>
  </g>
  <text x="190" y="242" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">特点</text>
  <text x="50" y="262" font-size="9" fill="#5b7db1" text-anchor="start">· 读写全走本地盘，延迟最低</text>
  <text x="50" y="280" font-size="9" fill="#5b7db1" text-anchor="start">· 副本间 part fetch 复制数据</text>
  <text x="50" y="298" font-size="9" fill="#5b7db1" text-anchor="start">· 扩容 = 加节点 + 重分布数据</text>
  <text x="50" y="316" font-size="9" fill="#5b7db1" text-anchor="start">· 存储与计算绑定，不独立伸缩</text>
  <rect x="50" y="330" width="280" height="56" rx="9" fill="#f2fbf6" stroke="#cdeadb"/>
  <text x="190" y="350" font-size="9" font-weight="600" fill="#12402a" text-anchor="middle">适用</text>
  <text x="190" y="368" font-size="8.5" fill="#2f6f4f" text-anchor="middle">追求最低查询延迟、数据量可控</text>
  <text x="190" y="382" font-size="8.5" fill="#2f6f4f" text-anchor="middle">最经典、最成熟的部署</text>

  <!-- shared storage -->
  <rect x="370" y="72" width="320" height="330" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="530" y="96" font-size="12.5" font-weight="700" fill="#12402a" text-anchor="middle">② shared storage（存算分离）</text>
  <text x="530" y="114" font-size="9" fill="#2f6f4f" text-anchor="middle">数据放对象存储，本地盘作缓存</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="394" y="128" width="128" height="60" rx="9" fill="#fff" stroke="#bfe0cd"/><text x="458" y="148" font-size="9.5" font-weight="600" fill="#12402a">node A（计算）</text><text x="458" y="166" fill="#2f6f4f">本地盘=缓存</text><text x="458" y="180" fill="#2f6f4f">无状态可弹性</text>
    <rect x="538" y="128" width="128" height="60" rx="9" fill="#fff" stroke="#bfe0cd"/><text x="602" y="148" font-size="9.5" font-weight="600" fill="#12402a">node B（计算）</text><text x="602" y="166" fill="#2f6f4f">本地盘=缓存</text><text x="602" y="180" fill="#2f6f4f">按需扩缩</text>
    <rect x="430" y="204" width="200" height="46" rx="9" fill="#fdf6ea" stroke="#efdcb4"/><text x="530" y="224" font-size="9.5" font-weight="600" fill="#5a3410">对象存储 S3 / HDFS</text><text x="530" y="240" fill="#93762e">Part 真身在此（Disks 抽象）</text>
  </g>
  <g stroke="#9ccbb0" stroke-width="1.3" fill="none">
    <line x1="458" y1="188" x2="500" y2="204" marker-end="url(#ar)"/>
    <line x1="602" y1="188" x2="560" y2="204" marker-end="url(#ar)"/>
  </g>
  <text x="530" y="272" font-size="9.5" font-weight="600" fill="#12402a" text-anchor="middle">特点</text>
  <text x="390" y="292" font-size="9" fill="#2f6f4f" text-anchor="start">· 计算无状态 → 秒级弹性扩缩</text>
  <text x="390" y="310" font-size="9" fill="#2f6f4f" text-anchor="start">· zero-copy replication：多副本</text>
  <text x="405" y="325" font-size="8.5" fill="#4c8567" text-anchor="start">共享远端数据，只复制元数据</text>
  <rect x="390" y="336" width="280" height="50" rx="9" fill="#f2fbf6" stroke="#cdeadb"/>
  <text x="530" y="356" font-size="9" font-weight="600" fill="#12402a" text-anchor="middle">适用</text>
  <text x="530" y="374" font-size="8.5" fill="#2f6f4f" text-anchor="middle">云上、海量数据、弹性优先</text>

  <!-- cold-hot tiering (orthogonal) -->
  <rect x="710" y="72" width="320" height="196" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="870" y="96" font-size="12" font-weight="700" fill="#5a3410" text-anchor="middle">③ 冷热分层（正交叠加）</text>
  <text x="870" y="114" font-size="9" fill="#93762e" text-anchor="middle">TTL move：可叠在①或②之上</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="730" y="128" width="130" height="50" rx="8" fill="#fff" stroke="#efdcb4"/><text x="795" y="148" font-size="9" font-weight="600" fill="#5a3410">热层（本地 SSD）</text><text x="795" y="164" fill="#93762e">近期数据 · 快</text>
    <rect x="880" y="128" width="130" height="50" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="945" y="148" font-size="9" font-weight="600" fill="#5a3410">冷层（HDD/S3）</text><text x="945" y="164" fill="#93762e">历史数据 · 省</text>
  </g>
  <line x1="860" y1="153" x2="880" y2="153" stroke="#d8b48a" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="870" y="196" font-size="9" fill="#93762e" text-anchor="middle">TTL ... TO VOLUME/DISK 按时间下沉</text>
  <text x="870" y="214" font-size="8.5" fill="#b08843" text-anchor="middle">不是独立部署模式，是生命周期策略</text>
  <text x="870" y="232" font-size="8.5" fill="#b08843" text-anchor="middle">由后台 MergeTreePartsMover 执行</text>
  <text x="870" y="252" font-size="8.5" fill="#b08843" text-anchor="middle">见「集群与自愈」「后台任务」</text>

  <!-- distributed bypass -->
  <rect x="710" y="286" width="320" height="116" rx="14" fill="#f6f2fb" stroke="#d9c9ec" filter="url(#soft)"/>
  <text x="870" y="310" font-size="12" font-weight="700" fill="#3d2a5a" text-anchor="middle">④ Distributed 表（旁路路由）</text>
  <text x="870" y="330" font-size="9" fill="#7a5da5" text-anchor="middle">本身不存数据，是跨 shard 的</text>
  <text x="870" y="346" font-size="9" fill="#7a5da5" text-anchor="middle">路由/汇聚视图</text>
  <text x="870" y="368" font-size="8.5" fill="#9a7cc4" text-anchor="middle">不是"存储实现形态"，而是平行的</text>
  <text x="870" y="384" font-size="8.5" fill="#9a7cc4" text-anchor="middle">分布式接入路径（可叠在①②之上）</text>

  <!-- takeaway -->
  <rect x="30" y="418" width="1000" height="200" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="50" y="442" font-size="11" font-weight="700" fill="#1d1d1f">形态维度总纲（与 Doris 全景对齐的讲法）</text>
  <text x="50" y="466" font-size="10" fill="#4b4b50">· ①②是真正的"部署形态"取值——区别在于自管数据放本地盘（shared-nothing）还是共享对象存储（存算分离，本地盘退化为缓存）。</text>
  <text x="50" y="486" font-size="10" fill="#4b4b50">· ③冷热分层是正交、可叠加的数据生命周期策略，把冷数据下沉到廉价介质——不是与①②平级的部署模式。</text>
  <text x="50" y="506" font-size="10" fill="#4b4b50">· ④Distributed 表是旁路路由：数据仍由各 shard 的本地表（①或②）组织，Distributed 只做散射/汇聚——平行的接入路径。</text>
  <text x="50" y="530" font-size="10" fill="#4b4b50">· 无论哪种形态，12 条主线清单不变：变的只是"存储介质"与"数据位置"，不是"引擎有哪些能力域"。</text>
  <rect x="50" y="548" width="960" height="54" rx="9" fill="#eef3fb" stroke="#cfe0f2"/>
  <text x="60" y="570" font-size="9.5" fill="#274a78">对照 Doris：Doris 的"存算一体↔存算分离"= 这里的 ①↔②；Doris"冷热分离"= ③；Doris"湖仓查询"≈ 外部表接入（另一条旁路，</text>
  <text x="60" y="588" font-size="9.5" fill="#274a78">CH 对应 S3/File/Iceberg 等表引擎与表函数，数据不由 MergeTree 组织）。主线清单在两个引擎里都不因部署形态改变。</text>
</svg>
