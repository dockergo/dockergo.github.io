<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">离线 LLM 类 · 一行 generate 批量跑 prompt</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">entrypoints/llm.py:66 · 封装「引擎加载 + 批量驱动」· 评测 / 离线生成场景,无需起 HTTP 服务</text>

  <!-- prompts 输入 (neutral) -->
  <rect x="30" y="150" width="140" height="96" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="100" y="190" font-size="11.5" font-weight="600" text-anchor="middle" fill="#1d1d1f">prompts 批</text>
  <text x="100" y="212" font-size="9" text-anchor="middle" fill="#6e6e73">一次传全部 prompt</text>

  <!-- LLM 类容器 (purple 接口/API) -->
  <rect x="210" y="108" width="360" height="258" rx="14" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="230" y="134" font-size="12.5" font-weight="600" fill="#3d2a5a">LLM 类 · entrypoints/llm.py:66</text>
  <text x="230" y="154" font-size="9.5" fill="#7a5aa0">构造 LLM(model="…") → 加载模型权重 + 初始化引擎</text>

  <rect x="228" y="168" width="324" height="88" rx="9" fill="#ffffff" stroke="#d9c7ec"/>
  <text x="244" y="194" font-size="11" font-weight="600" fill="#3d2a5a">.generate(prompts, sampling_params)  (:411)</text>
  <text x="244" y="215" font-size="9.5" fill="#6e6e73">批量传一批 prompt → 返回一批 RequestOutput</text>
  <text x="244" y="233" font-size="9.5" fill="#86868b">(含生成的 token / 文本)</text>

  <rect x="228" y="266" width="324" height="84" rx="9" fill="#ffffff" stroke="#d9c7ec"/>
  <text x="244" y="294" font-size="11" font-weight="600" fill="#3d2a5a">.chat(messages, …)  (:605)</text>
  <text x="244" y="315" font-size="9.5" fill="#6e6e73">对话格式:应用 chat template 后走 generate</text>

  <!-- EngineCore (green) -->
  <rect x="610" y="150" width="170" height="96" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="695" y="184" font-size="11.5" font-weight="600" text-anchor="middle" fill="#12402a">EngineCore 执行循环</text>
  <text x="695" y="206" font-size="9" text-anchor="middle" fill="#2f6f4f">驱动引擎跑到</text>
  <text x="695" y="222" font-size="9" text-anchor="middle" fill="#2f6f4f">全部请求完成</text>

  <!-- RequestOutput (neutral) -->
  <rect x="820" y="150" width="230" height="96" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="935" y="186" font-size="11.5" font-weight="600" text-anchor="middle" fill="#1d1d1f">RequestOutput 批</text>
  <text x="935" y="210" font-size="9.5" text-anchor="middle" fill="#6e6e73">收集输出:生成的 token / 文本</text>

  <!-- 连线 -->
  <path d="M170,198 L210,198" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M570,198 L610,198" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M780,198 L820,198" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 为什么 band (amber insight) -->
  <rect x="30" y="390" width="1020" height="96" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="50" y="416" font-size="11.5" font-weight="600" fill="#5a3410">为什么有离线入口</text>
  <text x="50" y="440" font-size="9.5" fill="#93762e">评测 · 数据生成 · 批处理场景不需 HTTP 服务;LLM 类封装「引擎加载 + 批量驱动」,一行 generate 拿到全部结果。</text>
  <text x="50" y="462" font-size="9.5" fill="#93762e">内部把 prompts 全加进引擎连续批处理并发跑(非串行);两种接触面都驱动 EngineCore 执行循环。</text>
</svg>
