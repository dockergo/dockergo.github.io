<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">OpenAI 兼容 server · 起 HTTP 服务,零改造接入现有生态</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">vllm serve · api_server.py:196 build_app() 构建 FastAPI 应用挂载路由 · 内部 AsyncLLM 异步驱动</text>

  <!-- 客户端 (neutral) -->
  <rect x="30" y="150" width="150" height="120" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="105" y="192" font-size="11.5" font-weight="600" text-anchor="middle" fill="#1d1d1f">OpenAI 客户端</text>
  <text x="105" y="216" font-size="9" text-anchor="middle" fill="#6e6e73">改个 base_url</text>
  <text x="105" y="232" font-size="9" text-anchor="middle" fill="#6e6e73">即可直连</text>
  <text x="105" y="252" font-size="9" text-anchor="middle" fill="#86868b">迁移成本≈零</text>

  <!-- server 容器 (blue 淡蓝 协议) -->
  <rect x="222" y="102" width="410" height="316" rx="14" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="242" y="128" font-size="12.5" font-weight="600" fill="#274a78">OpenAI 兼容 server · openai/api_server.py</text>
  <text x="242" y="148" font-size="9.5" fill="#5b7db1">build_app() (:196) 构建 FastAPI 应用,挂载模块化路由</text>

  <!-- 端点 1 -->
  <rect x="240" y="164" width="374" height="70" rx="9" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="256" y="190" font-size="11" font-weight="600" fill="#274a78">POST /v1/chat/completions</text>
  <text x="256" y="210" font-size="9" fill="#6e6e73">对话端点 · chat_completion/api_router.py:40</text>
  <text x="256" y="226" font-size="9" fill="#86868b">兼容 OpenAI 对话格式</text>

  <!-- 端点 2 -->
  <rect x="240" y="244" width="374" height="70" rx="9" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="256" y="270" font-size="11" font-weight="600" fill="#274a78">POST /v1/completions</text>
  <text x="256" y="290" font-size="9" fill="#6e6e73">补全端点 · completion/api_router.py:34</text>
  <text x="256" y="306" font-size="9" fill="#86868b">兼容 OpenAI 补全格式</text>

  <!-- 流式 -->
  <rect x="240" y="324" width="374" height="80" rx="9" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="256" y="350" font-size="11" font-weight="600" fill="#274a78">流式返回 (SSE)</text>
  <text x="256" y="371" font-size="9" fill="#6e6e73">HTTP 请求 → 转成引擎请求</text>
  <text x="256" y="389" font-size="9" fill="#86868b">支持整体或逐 token 流式返回</text>

  <!-- AsyncLLM (green) -->
  <rect x="674" y="150" width="150" height="120" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="749" y="196" font-size="11.5" font-weight="600" text-anchor="middle" fill="#12402a">AsyncLLM</text>
  <text x="749" y="220" font-size="9" text-anchor="middle" fill="#2f6f4f">异步驱动</text>
  <text x="749" y="236" font-size="9" text-anchor="middle" fill="#2f6f4f">并发处理请求</text>

  <!-- EngineCore (green) -->
  <rect x="866" y="150" width="184" height="120" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="958" y="196" font-size="11.5" font-weight="600" text-anchor="middle" fill="#12402a">EngineCore 循环</text>
  <text x="958" y="220" font-size="9" text-anchor="middle" fill="#2f6f4f">高吞吐引擎</text>
  <text x="958" y="236" font-size="9" text-anchor="middle" fill="#2f6f4f">PagedAttention + 连续批处理</text>

  <!-- 连线 -->
  <path d="M180,210 L222,210" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M632,210 L674,210" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M824,210 L866,210" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 为什么 band -->
  <rect x="30" y="440" width="1020" height="60" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="50" y="466" font-size="11.5" font-weight="600" fill="#5a3410">为什么兼容 OpenAI</text>
  <text x="50" y="488" font-size="9.5" fill="#93762e">OpenAI API 是事实标准,生态无数客户端 / 框架按它写;兼容的是「API 格式」,底层仍是 vLLM 自己的高吞吐引擎——用户零改造把自托管模型接进现有系统。</text>
</svg>
