<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">vLLM AsyncLLM 与客户端 —— 同一 EngineCore，三种 EngineCoreClient 适配离线 / 在线</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">位置即语义：上前端入口 · 中 EngineCoreClient 抽象分三实现 · 下同一 EngineCore 核心循环 · 按场景选客户端复用核心</text>

  <!-- Frontend entry : purple -->
  <rect x="30" y="76" width="1020" height="66" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="50" y="102" font-size="12.5" font-weight="600" fill="#3d2a5a">前端入口 · AsyncLLM（async_llm.py:70）—— OpenAI server 用的异步引擎接口</text>
  <text x="50" y="124" font-size="9.5" fill="#7a5aa0">经 EngineCoreClient.make_async_mp_client（:146）建客户端，连到 EngineCore 进程</text>

  <path d="M540,142 L540,166" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- EngineCoreClient abstraction : blue container -->
  <rect x="30" y="168" width="1020" height="176" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="50" y="194" font-size="12.5" font-weight="600" fill="#1b2a4a">EngineCoreClient（core_client.py:71）· 客户端抽象 —— 三种实现按场景选</text>

  <rect x="50" y="210" width="316" height="118" rx="10" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="208" y="234" font-size="11" font-weight="600" text-anchor="middle" fill="#12402a">InprocClient（:276）</text>
  <text x="208" y="256" font-size="8.5" text-anchor="middle" fill="#2f6f4f">同进程直调，无 IPC 开销</text>
  <text x="208" y="274" font-size="8.5" text-anchor="middle" fill="#2f6f4f">离线简单场景</text>
  <rect x="66" y="290" width="284" height="26" rx="7" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="208" y="307" font-size="9" font-weight="600" text-anchor="middle" fill="#12402a">离线 LLM 类 → 用它</text>

  <rect x="382" y="210" width="316" height="118" rx="10" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="540" y="234" font-size="11" font-weight="600" text-anchor="middle" fill="#274a78">MPClient（:467）</text>
  <text x="540" y="256" font-size="8.5" text-anchor="middle" fill="#5b7db1">多进程客户端</text>
  <text x="540" y="274" font-size="8.5" text-anchor="middle" fill="#5b7db1">跨进程连 EngineCore</text>
  <rect x="398" y="290" width="284" height="26" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="540" y="307" font-size="9" font-weight="600" text-anchor="middle" fill="#274a78">同步多进程基础</text>

  <rect x="714" y="210" width="316" height="118" rx="10" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="872" y="234" font-size="11" font-weight="600" text-anchor="middle" fill="#1b2a4a">AsyncMPClient（:950）</text>
  <text x="872" y="256" font-size="8.5" text-anchor="middle" fill="#5b7db1">异步多进程</text>
  <text x="872" y="274" font-size="8.5" text-anchor="middle" fill="#5b7db1">在线高并发服务</text>
  <rect x="730" y="290" width="284" height="26" rx="7" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="872" y="307" font-size="9" font-weight="600" text-anchor="middle" fill="#1b2a4a">在线 server → 用它</text>

  <path d="M540,344 L540,368" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- Same EngineCore : green -->
  <rect x="30" y="370" width="1020" height="52" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="540" y="394" font-size="12" font-weight="600" text-anchor="middle" fill="#12402a">同一 EngineCore 核心循环（step busy loop）—— 三种客户端复用它</text>
  <text x="540" y="413" font-size="9" text-anchor="middle" fill="#2f6f4f">场景不同只换客户端：离线省事同进程直调，在线要前端不阻塞用异步多进程</text>

  <!-- takeaway -->
  <text x="30" y="454" font-size="10" font-weight="600" fill="#1d1d1f">选型：离线批量 → InprocClient（无 IPC 更简单）；在线高并发 → AsyncMPClient（前端 IO 与 GPU 循环分进程，吞吐稳）</text>

  <text x="30" y="508" font-size="9" fill="#a1a1a6">源码基准 vLLM(git 7aab6e2 · v1-only) · AsyncLLM async_llm.py:70 · make_async_mp_client:146 · EngineCoreClient core_client.py:71 · InprocClient:276 / MPClient:467 / AsyncMPClient:950</text>
</svg>
