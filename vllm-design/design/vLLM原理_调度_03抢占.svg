<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>

  <!-- 标题 -->
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">vLLM 重算式抢占 —— 显存(KV 块)不够时释放块让路,被抢请求回队头稍后重算</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">v1 抢占是重算式而非 CPU swap:KV 数据量大,换出换入的 PCIe 传输往往比重新计算还慢</text>

  <!-- 触发条件 (red) -->
  <rect x="30" y="70" width="1020" height="58" rx="12" fill="#fbeaea" stroke="#e6b8b8" filter="url(#soft)"/>
  <text x="50" y="94" font-size="12" font-weight="600" fill="#7a2a2a">触发 · running 请求要继续解码需分配新块,但块池空了</text>
  <text x="50" y="115" font-size="9.5" fill="#a05a5a">调度器抢占部分请求让路 → 释放它们的 KV 块给别人用</text>

  <path d="M540,128 L540,150" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- _preempt_request 三动作 (amber container) -->
  <rect x="30" y="150" width="1020" height="130" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="50" y="174" font-size="12.5" font-weight="600" fill="#5a3410">_preempt_request · 对被抢请求执行三个动作</text>

  <rect x="50" y="188" width="316" height="76" rx="9" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="208" y="212" font-size="10.5" font-weight="600" text-anchor="middle" fill="#5a3410">① 状态 + 归零</text>
  <text x="208" y="232" font-size="9" text-anchor="middle" fill="#93762e">status = PREEMPTED</text>
  <text x="208" y="248" font-size="9" text-anchor="middle" fill="#93762e">num_computed_tokens = 0</text>

  <rect x="382" y="188" width="316" height="76" rx="9" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="540" y="212" font-size="10.5" font-weight="600" text-anchor="middle" fill="#5a3410">② 释放 KV 块</text>
  <text x="540" y="232" font-size="9" text-anchor="middle" fill="#93762e">free 其占用的 KV 块回池</text>
  <text x="540" y="248" font-size="9" text-anchor="middle" fill="#93762e">腾出显存给继续解码的请求</text>

  <rect x="714" y="188" width="316" height="76" rx="9" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="872" y="212" font-size="10.5" font-weight="600" text-anchor="middle" fill="#5a3410">③ prepend 回 waiting</text>
  <text x="872" y="232" font-size="9" text-anchor="middle" fill="#93762e">prepend_request 放回 waiting 队头</text>
  <text x="872" y="248" font-size="9" text-anchor="middle" fill="#93762e">稍后优先重新调度</text>

  <path d="M366,226 L382,226" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M698,226 L714,226" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <path d="M540,280 L540,302" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 重新调度重算 (green) -->
  <rect x="30" y="302" width="1020" height="66" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="50" y="326" font-size="12" font-weight="600" fill="#12402a">重新调度 · 从头重算(重新 prefill)——不是把 KV 换出到 CPU 再换回</text>
  <text x="50" y="348" font-size="9.5" fill="#2f6f4f">被抢请求稍后从 waiting 队头再被调度时,重跑 prefill 恢复 KV;前缀缓存命中可大幅降低重算成本</text>

  <!-- 对比:重算 vs CPU swap -->
  <text x="30" y="392" font-size="11.5" font-weight="700" fill="#1d1d1f">为什么重算而非换出</text>
  <rect x="30" y="404" width="500" height="72" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="50" y="426" font-size="10.5" font-weight="600" fill="#12402a">v1 · 重算式抢占</text>
  <text x="50" y="446" font-size="9" fill="#2f6f4f">释放块给别人 · 被抢的重新算</text>
  <text x="50" y="463" font-size="9" fill="#4a8a63">整体更快更简单;代价是重算前缀(前缀缓存可缓解)</text>

  <rect x="550" y="404" width="500" height="72" rx="11" fill="#fbeaea" stroke="#e6b8b8" filter="url(#soft)"/>
  <text x="570" y="426" font-size="10.5" font-weight="600" fill="#7a2a2a">v0 · CPU swap(已弃用)</text>
  <text x="570" y="446" font-size="9" fill="#a05a5a">把 KV 换出到 CPU 内存再换回</text>
  <text x="570" y="463" font-size="9" fill="#a05a5a">KV 数据量大,PCIe 换出换入往往比重算还慢</text>

  <!-- 底注 -->
  <text x="30" y="510" font-size="9" fill="#a1a1a6">误区:抢占是把 KV 换到 CPU。v1 是重算式(释放块+归零+重入队) · 减少抢占:调 gpu_memory_utilization 给足 KV 空间或限并发 · vLLM(git 7aab6e2, v1)</text>
</svg>
