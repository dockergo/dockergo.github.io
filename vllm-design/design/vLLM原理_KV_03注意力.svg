<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">PagedAttention 核 · 按块表 gather 分块 KV 算注意力</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">默认 FlashAttention 后端 · 块物理分散,块表让逻辑连续 · 让分块存储对计算透明</text>

  <!-- 后端选择 (blue 逻辑) -->
  <rect x="30" y="78" width="1020" height="72" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="50" y="104" font-size="12" font-weight="600" fill="#1b2a4a">默认后端 FlashAttention  ("FLASH_ATTN")</text>
  <text x="50" y="128" font-size="9.5" fill="#5b7db1">flash_attn.py:71 · CUDA 平台选择 platforms/cuda.py:391 get_attn_backend_cls · FLASH_ATTN 优先级 :147 · 快且省显存</text>

  <!-- query (green) -->
  <rect x="30" y="184" width="150" height="150" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="105" y="222" font-size="12" font-weight="600" text-anchor="middle" fill="#12402a">query</text>
  <text x="105" y="248" font-size="9" text-anchor="middle" fill="#2f6f4f">当前 token</text>
  <text x="105" y="266" font-size="9" text-anchor="middle" fill="#2f6f4f">要算注意力</text>
  <text x="105" y="292" font-size="8.5" text-anchor="middle" fill="#4a8a63">与所有历史 K</text>
  <text x="105" y="308" font-size="8.5" text-anchor="middle" fill="#4a8a63">算分 → 加权 V</text>

  <!-- 块表 (purple) -->
  <rect x="216" y="184" width="150" height="150" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="291" y="214" font-size="11.5" font-weight="600" text-anchor="middle" fill="#3d2a5a">块表</text>
  <text x="291" y="234" font-size="8.5" text-anchor="middle" fill="#7a5aa0">block table</text>
  <text x="291" y="262" font-size="9" text-anchor="middle" fill="#7a5aa0">逻辑块号</text>
  <text x="291" y="280" font-size="9" text-anchor="middle" fill="#7a5aa0">→ 物理块号</text>
  <text x="291" y="308" font-size="8.5" text-anchor="middle" fill="#7a5aa0">kernel 据此定位</text>

  <!-- 物理块(分散) amber -->
  <rect x="402" y="184" width="410" height="150" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="422" y="210" font-size="11.5" font-weight="600" fill="#5a3410">物理显存 · KV 块分散存放</text>
  <rect x="422" y="224" width="66" height="60" rx="6" fill="#f5d99a" stroke="#e0b968"/>
  <text x="455" y="258" font-size="10" text-anchor="middle" fill="#5a3410">块 #7</text>
  <rect x="502" y="224" width="66" height="60" rx="6" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="535" y="258" font-size="9" text-anchor="middle" fill="#b1974e">他人</text>
  <rect x="582" y="224" width="66" height="60" rx="6" fill="#f5d99a" stroke="#e0b968"/>
  <text x="615" y="258" font-size="10" text-anchor="middle" fill="#5a3410">块 #2</text>
  <rect x="662" y="224" width="66" height="60" rx="6" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="695" y="258" font-size="9" text-anchor="middle" fill="#b1974e">他人</text>
  <rect x="742" y="224" width="60" height="60" rx="6" fill="#f5d99a" stroke="#e0b968"/>
  <text x="772" y="258" font-size="10" text-anchor="middle" fill="#5a3410">块 #9</text>
  <text x="422" y="310" font-size="8.5" fill="#93762e">■ 本请求 K/V 块(逐块 gather)　□ 其他请求块(交错)</text>

  <!-- softmax (green) -->
  <rect x="848" y="184" width="202" height="150" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="949" y="216" font-size="11.5" font-weight="600" text-anchor="middle" fill="#12402a">softmax</text>
  <text x="949" y="242" font-size="9" text-anchor="middle" fill="#2f6f4f">query × 历史 K → 分</text>
  <text x="949" y="262" font-size="9" text-anchor="middle" fill="#2f6f4f">归一化后加权 V</text>
  <text x="949" y="290" font-size="9" text-anchor="middle" fill="#4a8a63">块物理分散,块表</text>
  <text x="949" y="308" font-size="9" text-anchor="middle" fill="#4a8a63">让它逻辑上像连续序列</text>

  <!-- 连线 -->
  <path d="M180,259 L216,259" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M366,259 L402,259" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M812,259 L848,259" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 两条底注 -->
  <rect x="30" y="368" width="500" height="146" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="50" y="394" font-size="11.5" font-weight="600" fill="#3d2a5a">为什么核要感知分块</text>
  <text x="50" y="418" font-size="9.5" fill="#7a5aa0">传统 attention kernel 假设 KV 连续;</text>
  <text x="50" y="438" font-size="9.5" fill="#7a5aa0">PagedAttention 的 KV 物理分散,所以</text>
  <text x="50" y="458" font-size="9.5" fill="#7a5aa0">kernel 要接受块表、按块 gather——</text>
  <text x="50" y="482" font-size="9.5" fill="#7a5aa0">这是「分页」对上「注意力计算」的关键改造。</text>
  <text x="50" y="504" font-size="9" fill="#a98fca">误区:注意力核不改就能用分块 KV。</text>

  <rect x="548" y="368" width="502" height="146" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="568" y="394" font-size="11.5" font-weight="600" fill="#12402a">分块带来的两个能力</text>
  <text x="568" y="418" font-size="9.5" fill="#2f6f4f">① 只读实际存在的块,不读预留空洞</text>
  <text x="568" y="438" font-size="9.5" fill="#2f6f4f">　→ 计算与存储都无浪费</text>
  <text x="568" y="462" font-size="9.5" fill="#2f6f4f">② 支持共享块:多个请求指向同一物理块</text>
  <text x="568" y="482" font-size="9.5" fill="#2f6f4f">　→ 前缀共享成为可能</text>
  <text x="568" y="504" font-size="9" fill="#4a8a63">分块存储对注意力计算透明。</text>
</svg>
