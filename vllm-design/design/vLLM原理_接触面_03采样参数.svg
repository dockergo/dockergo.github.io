<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">SamplingParams · 请求级控制「怎么生成」</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">sampling_params.py:199 · 每个请求可独立设定(非全局)· 由「采样」阶段应用 · logits → 下一个 token</text>

  <!-- 主容器 (purple 接口/参数) -->
  <rect x="30" y="80" width="640" height="410" rx="14" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="50" y="106" font-size="12.5" font-weight="600" fill="#3d2a5a">SamplingParams · sampling_params.py:199</text>

  <!-- temperature -->
  <rect x="50" y="122" width="290" height="86" rx="9" fill="#ffffff" stroke="#d9c7ec"/>
  <text x="66" y="148" font-size="11" font-weight="600" fill="#3d2a5a">temperature  (:236)</text>
  <text x="66" y="170" font-size="9.5" fill="#6e6e73">温度:0 = 确定性(贪心)</text>
  <text x="66" y="188" font-size="9.5" fill="#86868b">越大越随机</text>

  <!-- top_p / top_k -->
  <rect x="360" y="122" width="290" height="86" rx="9" fill="#ffffff" stroke="#d9c7ec"/>
  <text x="376" y="148" font-size="11" font-weight="600" fill="#3d2a5a">top_p (:240) / top_k (:243)</text>
  <text x="376" y="170" font-size="9.5" fill="#6e6e73">核采样 / 前 k 采样</text>
  <text x="376" y="188" font-size="9.5" fill="#86868b">截断候选分布</text>

  <!-- max_tokens -->
  <rect x="50" y="220" width="290" height="86" rx="9" fill="#ffffff" stroke="#d9c7ec"/>
  <text x="66" y="246" font-size="11" font-weight="600" fill="#3d2a5a">max_tokens  (:262)</text>
  <text x="66" y="268" font-size="9.5" fill="#6e6e73">最多生成多少 token</text>
  <text x="66" y="286" font-size="9.5" fill="#86868b">过大浪费 KV 块 / 延迟</text>

  <!-- stop / n / logprobs -->
  <rect x="360" y="220" width="290" height="86" rx="9" fill="#ffffff" stroke="#d9c7ec"/>
  <text x="376" y="246" font-size="11" font-weight="600" fill="#3d2a5a">stop / n / logprobs</text>
  <text x="376" y="268" font-size="9.5" fill="#6e6e73">停止词 · 生成几个</text>
  <text x="376" y="286" font-size="9.5" fill="#86868b">对数概率</text>

  <!-- SamplingType -->
  <rect x="50" y="318" width="600" height="154" rx="9" fill="#ffffff" stroke="#d9c7ec"/>
  <text x="66" y="344" font-size="11" font-weight="600" fill="#3d2a5a">SamplingType  (:64)</text>
  <rect x="66" y="358" width="180" height="96" rx="8" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="156" y="392" font-size="10.5" font-weight="600" text-anchor="middle" fill="#1b2a4a">GREEDY</text>
  <text x="156" y="414" font-size="9" text-anchor="middle" fill="#5b7db1">贪心</text>
  <text x="156" y="432" font-size="8.5" text-anchor="middle" fill="#7a9dcb">确定性</text>
  <rect x="256" y="358" width="180" height="96" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="346" y="392" font-size="10.5" font-weight="600" text-anchor="middle" fill="#12402a">RANDOM</text>
  <text x="346" y="414" font-size="9" text-anchor="middle" fill="#2f6f4f">随机</text>
  <text x="346" y="432" font-size="8.5" text-anchor="middle" fill="#4a8a63">多样性</text>
  <rect x="446" y="358" width="188" height="96" rx="8" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="540" y="392" font-size="10.5" font-weight="600" text-anchor="middle" fill="#5a3410">RANDOM_SEED</text>
  <text x="540" y="414" font-size="9" text-anchor="middle" fill="#93762e">可复现随机</text>
  <text x="540" y="432" font-size="8.5" text-anchor="middle" fill="#b1974e">固定种子</text>

  <!-- 为什么参数化 (right column) -->
  <rect x="694" y="80" width="356" height="410" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="714" y="106" font-size="12" font-weight="600" fill="#5a3410">为什么参数化采样</text>
  <text x="714" y="134" font-size="9.5" fill="#93762e">同一模型,不同任务要不同</text>
  <text x="714" y="152" font-size="9.5" fill="#93762e">「创造性」——</text>

  <rect x="714" y="172" width="316" height="88" rx="9" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="730" y="198" font-size="10.5" font-weight="600" fill="#5a3410">代码补全 / 抽取</text>
  <text x="730" y="220" font-size="9.5" fill="#93762e">要确定 → 低温 / 贪心</text>
  <text x="730" y="238" font-size="9.5" fill="#b1974e">temperature = 0</text>

  <rect x="714" y="272" width="316" height="88" rx="9" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="730" y="298" font-size="10.5" font-weight="600" fill="#5a3410">创意写作</text>
  <text x="730" y="320" font-size="9.5" fill="#93762e">要多样 → 高温 / top_p</text>
  <text x="730" y="338" font-size="9.5" fill="#b1974e">调高 temperature</text>

  <text x="714" y="392" font-size="9.5" fill="#93762e">解耦成请求级参数,每个请求</text>
  <text x="714" y="410" font-size="9.5" fill="#93762e">可独立设温度 / top_p / max_tokens,</text>
  <text x="714" y="428" font-size="9.5" fill="#93762e">由「采样」阶段应用。</text>
  <text x="714" y="456" font-size="9" fill="#b1974e">误区:采样参数并非全局。</text>
</svg>
