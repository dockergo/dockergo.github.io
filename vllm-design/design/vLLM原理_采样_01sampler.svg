<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">vLLM Sampler · logits → token —— 采样与前向解耦的独立 nn.Module</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">位置即语义：左 logits 入口 · 中 Sampler 分贪心 / 随机两分支 · 右 token id 出口 · 整批同策略走快路径</text>

  <!-- logits input : blue -->
  <rect x="30" y="80" width="200" height="180" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="130" y="106" font-size="11.5" font-weight="600" text-anchor="middle" fill="#1b2a4a">logits</text>
  <text x="130" y="130" font-size="8.5" text-anchor="middle" fill="#5b7db1">模型前向的输出</text>
  <text x="130" y="147" font-size="8.5" text-anchor="middle" fill="#5b7db1">词表上每个词的分数</text>
  <text x="130" y="164" font-size="8.5" text-anchor="middle" fill="#5b7db1">（未归一）</text>
  <text x="130" y="192" font-size="8.5" text-anchor="middle" fill="#7a9dcb">来自 EngineCore</text>
  <text x="130" y="209" font-size="8.5" text-anchor="middle" fill="#7a9dcb">的 execute_model</text>
  <text x="130" y="238" font-size="8" text-anchor="middle" fill="#7a9dcb">+ 采样元数据</text>

  <path d="M230,170 L268,170" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- Sampler : green container -->
  <rect x="270" y="80" width="530" height="180" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="290" y="106" font-size="12.5" font-weight="600" fill="#12402a">Sampler（sampler.py:20，nn.Module）</text>
  <text x="290" y="126" font-size="9" fill="#2f6f4f">forward（:72）收 logits + 元数据 → sample（:243）核心采样逻辑</text>

  <rect x="290" y="140" width="240" height="104" rx="9" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="410" y="164" font-size="10.5" font-weight="600" text-anchor="middle" fill="#12402a">贪心 greedy_sample</text>
  <text x="410" y="186" font-size="8.5" text-anchor="middle" fill="#2f6f4f">= logits.argmax(dim=-1)（:240）</text>
  <text x="410" y="204" font-size="8.5" text-anchor="middle" fill="#2f6f4f">直接取分数最高的词</text>
  <text x="410" y="226" font-size="8.5" text-anchor="middle" fill="#4a8a63">确定性、结果可复现</text>

  <rect x="546" y="140" width="240" height="104" rx="9" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="666" y="164" font-size="10.5" font-weight="600" text-anchor="middle" fill="#12402a">随机采样 random</text>
  <text x="666" y="186" font-size="8.5" text-anchor="middle" fill="#2f6f4f">先整形分布再按概率抽</text>
  <text x="666" y="204" font-size="8.5" text-anchor="middle" fill="#2f6f4f">temperature / top_k / top_p</text>
  <text x="666" y="226" font-size="8.5" text-anchor="middle" fill="#4a8a63">带随机、更自然（见截断图）</text>

  <path d="M800,170 L838,170" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- token output : amber -->
  <rect x="840" y="80" width="210" height="180" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="945" y="106" font-size="11.5" font-weight="600" text-anchor="middle" fill="#5a3410">token id</text>
  <text x="945" y="132" font-size="8.5" text-anchor="middle" fill="#93762e">采出的下一个 token</text>
  <text x="945" y="150" font-size="8.5" text-anchor="middle" fill="#93762e">回填给 EngineCore</text>
  <text x="945" y="168" font-size="8.5" text-anchor="middle" fill="#93762e">判停止 / 继续</text>
  <text x="945" y="196" font-size="8" text-anchor="middle" fill="#b1974e">每步生成的最后一环</text>
  <text x="945" y="230" font-size="8" text-anchor="middle" fill="#b1974e">进入下一轮 step</text>

  <!-- fast path -->
  <rect x="30" y="284" width="500" height="126" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="50" y="310" font-size="12" font-weight="600" fill="#3d2a5a">分支优化 · 快路径（:256）</text>
  <text x="50" y="334" font-size="9" fill="#7a5aa0">整批全贪心 or 全随机时走快路径；</text>
  <text x="50" y="352" font-size="9" fill="#7a5aa0">混合时分别处理。</text>
  <text x="50" y="374" font-size="9" fill="#7a5aa0">在 GPU 上批量处理一批请求的 logits，</text>
  <text x="50" y="392" font-size="9" fill="#7a5aa0">每个请求参数可不同。</text>

  <rect x="550" y="284" width="500" height="126" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="570" y="310" font-size="12" font-weight="600" fill="#1b2a4a">为什么 Sampler 是独立模块</text>
  <text x="570" y="334" font-size="9" fill="#5b7db1">采样与模型前向解耦——同一模型输出</text>
  <text x="570" y="352" font-size="9" fill="#5b7db1">可按不同 SamplingParams 采不同结果。</text>
  <text x="570" y="374" font-size="9" fill="#5b7db1">做成 nn.Module 便于在 GPU 上</text>
  <text x="570" y="392" font-size="9" fill="#5b7db1">批量处理一批请求（各自参数）。</text>

  <text x="30" y="470" font-size="10" font-weight="600" fill="#1d1d1f">误区：采样不是 CPU 后处理——Sampler 是 nn.Module 在 GPU 上并行批处理；贪心非全局最优、随机反而更自然</text>
  <text x="30" y="490" font-size="9" fill="#a1a1a6">源码基准 vLLM(git 7aab6e2 · v1-only) · vllm/v1/sample/sampler.py · Sampler:20 · forward:72 · sample:243 · greedy_sample argmax:240 · 快路径:256</text>
</svg>
