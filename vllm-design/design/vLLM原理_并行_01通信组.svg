<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">vLLM 通信组 · TP × PP —— parallel_state 按 tp_size × pp_size 把 GPU 划成两类正交通信组</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">位置即语义：左两类通信组定义 · 右 8 卡 = TP4 × PP2 拓扑实例 · TP 切层内 / PP 切层间，正交可组合</text>

  <!-- TP group def : green -->
  <rect x="30" y="78" width="470" height="90" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="50" y="104" font-size="12" font-weight="600" fill="#12402a">张量并行组 _TP（:1365）· get_tp_group（:1368）</text>
  <text x="50" y="126" font-size="9" fill="#2f6f4f">同一 TP 组的卡协作算一层（大矩阵乘横切到多卡）</text>
  <text x="50" y="146" font-size="9" fill="#4a8a63">切层内 —— 用集合通信 all-reduce / all-gather，通信重无气泡</text>

  <!-- PP group def : blue -->
  <rect x="30" y="180" width="470" height="90" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="50" y="206" font-size="12" font-weight="600" fill="#1b2a4a">流水线并行组 _PP（:1381）· get_pp_group（:1384）</text>
  <text x="50" y="228" font-size="9" fill="#5b7db1">PP 组的卡按层段接力（不同层放不同卡）</text>
  <text x="50" y="248" font-size="9" fill="#7a9dcb">切层间 —— 点对点传激活，通信轻但有气泡</text>

  <!-- init : amber -->
  <rect x="30" y="282" width="470" height="86" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="50" y="308" font-size="12" font-weight="600" fill="#5a3410">initialize_model_parallel（:1713）</text>
  <text x="50" y="330" font-size="9" fill="#93762e">按 tensor_parallel_size × pipeline_parallel_size 划分 GPU 到各组</text>
  <text x="50" y="350" font-size="9" fill="#b1974e">设 _TP（:1805）、_PP（:1868）</text>

  <!-- topology example : purple container 8 GPU = TP4 x PP2 -->
  <rect x="524" y="78" width="526" height="290" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="544" y="104" font-size="12" font-weight="600" fill="#3d2a5a">例：8 卡 = TP4 × PP2</text>
  <text x="544" y="123" font-size="8.5" fill="#7a5aa0">每 4 卡组成一个 TP 组算一段的层，2 段流水线</text>

  <!-- PP stage 1 : 4 GPU TP group -->
  <text x="544" y="150" font-size="9.5" font-weight="600" fill="#1b2a4a">PP 段 1（层段 A）· TP 组 = 4 卡</text>
  <rect x="544" y="158" width="110" height="52" rx="8" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="599" y="180" font-size="9" font-weight="600" text-anchor="middle" fill="#12402a">GPU 0</text>
  <text x="599" y="197" font-size="7.5" text-anchor="middle" fill="#2f6f4f">TP rank 0</text>
  <rect x="662" y="158" width="110" height="52" rx="8" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="717" y="180" font-size="9" font-weight="600" text-anchor="middle" fill="#12402a">GPU 1</text>
  <text x="717" y="197" font-size="7.5" text-anchor="middle" fill="#2f6f4f">TP rank 1</text>
  <rect x="780" y="158" width="110" height="52" rx="8" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="835" y="180" font-size="9" font-weight="600" text-anchor="middle" fill="#12402a">GPU 2</text>
  <text x="835" y="197" font-size="7.5" text-anchor="middle" fill="#2f6f4f">TP rank 2</text>
  <rect x="898" y="158" width="110" height="52" rx="8" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="953" y="180" font-size="9" font-weight="600" text-anchor="middle" fill="#12402a">GPU 3</text>
  <text x="953" y="197" font-size="7.5" text-anchor="middle" fill="#2f6f4f">TP rank 3</text>
  <text x="775" y="226" font-size="7.5" text-anchor="middle" fill="#4a8a63">组内 all-reduce / all-gather 协作算一层</text>

  <!-- PP arrow down -->
  <path d="M775,236 L775,258" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="820" y="251" font-size="7.5" fill="#a1a1a6">PP 传激活（点对点）</text>

  <!-- PP stage 2 -->
  <text x="544" y="280" font-size="9.5" font-weight="600" fill="#1b2a4a">PP 段 2（层段 B）· TP 组 = 4 卡</text>
  <rect x="544" y="288" width="110" height="52" rx="8" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="599" y="310" font-size="9" font-weight="600" text-anchor="middle" fill="#12402a">GPU 4</text>
  <text x="599" y="327" font-size="7.5" text-anchor="middle" fill="#2f6f4f">TP rank 0</text>
  <rect x="662" y="288" width="110" height="52" rx="8" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="717" y="310" font-size="9" font-weight="600" text-anchor="middle" fill="#12402a">GPU 5</text>
  <text x="717" y="327" font-size="7.5" text-anchor="middle" fill="#2f6f4f">TP rank 1</text>
  <rect x="780" y="288" width="110" height="52" rx="8" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="835" y="310" font-size="9" font-weight="600" text-anchor="middle" fill="#12402a">GPU 6</text>
  <text x="835" y="327" font-size="7.5" text-anchor="middle" fill="#2f6f4f">TP rank 2</text>
  <rect x="898" y="288" width="110" height="52" rx="8" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="953" y="310" font-size="9" font-weight="600" text-anchor="middle" fill="#12402a">GPU 7</text>
  <text x="953" y="327" font-size="7.5" text-anchor="middle" fill="#2f6f4f">TP rank 3</text>
  <text x="775" y="357" font-size="7.5" text-anchor="middle" fill="#4a8a63">组内 all-reduce / all-gather 协作算一层</text>

  <!-- why two groups -->
  <rect x="30" y="384" width="1020" height="106" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="50" y="410" font-size="12" font-weight="600" fill="#274a78">为什么分两种组 · 解决不同瓶颈</text>
  <text x="50" y="434" font-size="9.5" fill="#5b7db1">单层太大（参数 / 激活放不下）用 TP 切层内；层数太多（总参数放不下）用 PP 切层间。</text>
  <text x="50" y="454" font-size="9.5" fill="#5b7db1">两者正交可组合（TP × PP）：parallel_state 把 GPU 拓扑组织成这两类通信组，各自用不同集合通信。</text>
  <text x="50" y="474" font-size="9" fill="#274a78">调优：TP 通信重宜单机内 NVLink，PP 通信轻宜跨机；每卡只存自己那份 KV 块（TP 下按头切）</text>

  <text x="30" y="522" font-size="9" fill="#a1a1a6">源码基准 vLLM(git 7aab6e2 · v1-only) · vllm/distributed/parallel_state.py · _TP:1365 get_tp_group:1368 · _PP:1381 get_pp_group:1384 · initialize_model_parallel:1713</text>
</svg>
