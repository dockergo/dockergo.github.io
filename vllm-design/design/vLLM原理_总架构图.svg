<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="440" viewBox="0 0 1080 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="aH" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="aC" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
    <marker id="aS" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c99a3a"/></marker>
    <marker id="aX" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#7c5cd6"/></marker>
  </defs>
  <rect width="1080" height="440" fill="#fbfbfd"/>

  <!-- ===== 标题带（全景热区） ===== -->
  <rect x="24" y="8" width="1032" height="46" rx="10" fill="none" data-tid="vLLM原理_全景主线框架" data-lab="全景主线框架"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">总架构 · 多视角透视：一切围着 KV 缓存转，让 GPU 一刻不闲</text>
  <text x="30" y="47" font-size="10.5" fill="#6e6e73">主视角＝EngineCore step 循环（选批→前向→采样）· 中心＝分块 KV 横切全域 · 旁路＝多卡并行　源码基准 v1-only</text>

  <!-- ===== 图例：四型语义路径 ===== -->
  <line x1="40" y1="70" x2="70" y2="70" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aH)"/>
  <text x="76" y="74" font-size="10.5" fill="#3a3a3c">推理流 Hot（step 出 token）</text>
  <line x1="270" y1="70" x2="300" y2="70" stroke="#5b7db1" stroke-width="1.8" marker-end="url(#aC)"/>
  <text x="306" y="74" font-size="10.5" fill="#3a3a3c">连续批处理调度 Control</text>
  <line x1="486" y1="70" x2="516" y2="70" stroke="#c99a3a" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aS)"/>
  <text x="522" y="74" font-size="10.5" fill="#3a3a3c">KV 块 State（中心资源）</text>
  <line x1="690" y1="70" x2="720" y2="70" stroke="#7c5cd6" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aX)"/>
  <text x="726" y="74" font-size="10.5" fill="#3a3a3c">分布式并行 横切</text>
  <text x="1056" y="74" font-size="10" fill="#a1a1a6" text-anchor="end">框=主线可下钻 · 显存利用率 ~20%→接近满</text>

  <!-- ================= 接触面 ================= -->
  <rect x="24" y="84" width="1032" height="54" rx="13" fill="#f5f6f8" stroke="#e2e4e9" filter="url(#soft)" data-tid="vLLM原理_接触面_入口与API" data-lab="入口与 API"/>
  <text x="40" y="106" font-size="12" font-weight="600" fill="#1d1d1f">接触面 · 入口与 API</text>
  <text x="180" y="106" font-size="10" fill="#6e6e73">离线 LLM.generate 批量　·　在线 OpenAI 兼容 server（HTTP）　·　SamplingParams 控生成</text>
  <text x="40" y="124" font-size="9.5" fill="#86868b">请求经 input_queue 入队 · 结果经 output_queue 异步回流，前端 IO 不阻塞 GPU 循环</text>

  <!-- 请求入队（绿 Hot）/ 结果回流（虚线） -->
  <line x1="200" y1="138" x2="200" y2="162" stroke="#2f9e6e" stroke-width="1.8" fill="none" marker-end="url(#aH)"/>
  <text x="208" y="154" font-size="8.5" fill="#4a8c60">请求入队 → 选批</text>
  <path d="M880,162 L880,138" fill="none" stroke="#9aa2b1" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#aH)"/>
  <text x="770" y="154" font-size="8.5" fill="#8a8a90">token 异步回流前端</text>

  <!-- ================= EngineCore step 循环 ================= -->
  <rect x="24" y="164" width="1032" height="108" rx="14" fill="#f3faf5" stroke="#cfe6d6" data-tid="vLLM原理_支撑_EngineCore执行循环" data-lab="EngineCore 执行循环"/>
  <text x="40" y="184" font-size="12" font-weight="600" fill="#1d4a2b">EngineCore · step busy loop</text>
  <text x="230" y="184" font-size="10" fill="#5fa07a">独立进程，与前端异步 —— 每一步：选批 → 前向 → 采样，循环直到出完 token</text>

  <rect x="40" y="192" width="320" height="66" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)" data-tid="vLLM原理_支撑_连续批处理调度" data-lab="连续批处理调度"/>
  <text x="56" y="214" font-size="11.5" font-weight="600" fill="#1b2a4a">① schedule 调度选批</text>
  <text x="56" y="233" font-size="9" fill="#5b7db1">连续批处理：随到随入 · 完成即出</text>
  <text x="56" y="248" font-size="9" fill="#5b7db1">按可用块数收批 · chunked prefill</text>

  <rect x="380" y="192" width="320" height="66" rx="11" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="396" y="214" font-size="11.5" font-weight="600" fill="#1d4a2b">② execute_model 前向</text>
  <text x="396" y="233" font-size="9" fill="#4a8c60">ModelRunner 跑一遍模型</text>
  <text x="396" y="248" font-size="9" fill="#4a8c60">PagedAttention 按块表读 KV</text>

  <rect x="720" y="192" width="320" height="66" rx="11" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)" data-tid="vLLM原理_支撑_采样" data-lab="采样"/>
  <text x="736" y="214" font-size="11.5" font-weight="600" fill="#1d4a2b">③ 采样 + 回填</text>
  <text x="736" y="233" font-size="9" fill="#4a8c60">Sampler logits → token</text>
  <text x="736" y="248" font-size="9" fill="#4a8c60">判停止 · 未完成进下一步</text>

  <line x1="360" y1="225" x2="378" y2="225" stroke="#5b7db1" stroke-width="1.8" fill="none" marker-end="url(#aC)"/>
  <line x1="700" y1="225" x2="718" y2="225" stroke="#2f9e6e" stroke-width="1.8" fill="none" marker-end="url(#aH)"/>
  <!-- loop back（绿虚线：未停则回到选批） -->
  <path d="M880,258 L880,266 L200,266 L200,258" fill="none" stroke="#2f9e6e" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#aH)"/>
  <text x="540" y="264" font-size="8.5" fill="#4a8c60" text-anchor="middle">未停止 → 下一 step 重组批</text>

  <!-- ================= KV 中心资源带 ================= -->
  <rect x="24" y="288" width="1032" height="58" rx="13" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)" data-tid="vLLM原理_支撑_PagedAttention与KV缓存" data-lab="PagedAttention 与 KV 缓存"/>
  <text x="40" y="310" font-size="12" font-weight="600" fill="#6b4e16">PagedAttention 与 KV 缓存 · 中心资源（灵魂）</text>
  <text x="40" y="330" font-size="9.5" fill="#a9822f">KV 切固定块(默认 16 token/块)像 OS 分页 · 块表映射逻辑→物理 · 按需分配、物理分散、可共享 · 利用率接近满</text>

  <!-- 前向读写 KV（琥珀虚线 · 上接 execute_model） -->
  <line x1="540" y1="272" x2="540" y2="286" stroke="#c99a3a" stroke-width="1.6" stroke-dasharray="5 3" fill="none" marker-start="url(#aS)" marker-end="url(#aS)"/>
  <text x="548" y="283" font-size="8.5" fill="#a9822f">按块表 gather / 写块</text>

  <!-- ================= 底部能力域 ================= -->
  <rect x="24" y="366" width="606" height="60" rx="12" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)" data-tid="vLLM原理_支撑_块管理与前缀缓存" data-lab="块管理与前缀缓存"/>
  <text x="40" y="390" font-size="11.5" font-weight="600" fill="#6b4e16">块管理与前缀缓存</text>
  <text x="40" y="410" font-size="9" fill="#a9822f">BlockPool 分配 / 回收 · 引用计数共享块 · hash 前缀复用 · 显存不足则重算式抢占</text>

  <rect x="646" y="366" width="410" height="60" rx="12" fill="#f0ecfb" stroke="#d3c6ef" filter="url(#soft)" data-tid="vLLM原理_支撑_分布式并行" data-lab="分布式并行"/>
  <text x="662" y="390" font-size="11.5" font-weight="600" fill="#4a2e78">分布式并行 · TP / PP（横切）</text>
  <text x="662" y="410" font-size="9" fill="#6b52a3">TP 切层内 all-reduce · PP 切层间传激活 · 各卡各存 KV 分片</text>

  <!-- KV 横切能力域（琥珀 / 紫 虚线） -->
  <line x1="200" y1="346" x2="200" y2="364" stroke="#c99a3a" stroke-width="1.4" stroke-dasharray="5 3" fill="none" marker-start="url(#aS)" marker-end="url(#aS)"/>
  <text x="212" y="360" font-size="8" fill="#a9822f">分配 / 回收 / 共享块</text>
  <line x1="820" y1="346" x2="820" y2="364" stroke="#7c5cd6" stroke-width="1.4" stroke-dasharray="5 3" fill="none" marker-end="url(#aX)"/>
  <text x="832" y="360" font-size="8" fill="#6b52a3">多卡各存 KV 分片</text>
</svg>
