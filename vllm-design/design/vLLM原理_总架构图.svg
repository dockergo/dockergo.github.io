<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="800" viewBox="0 0 1080 800" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="800" fill="#fbfbfd"/>

  <!-- 标题条 (0,0,1080,58) -->
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">vLLM 总架构图 —— LLM 推理引擎：分块 KV 缓存 + 连续批处理，让 GPU 满载生成 token</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">位置即语义：顶接触面(LLM/server)·中 EngineCore step 循环(调度→前向→采样)·核心分块 KV·底能力域 · 点击任意模块下钻</text>

  <!-- ① 接触面 (30,92,1020,58) purple -->
  <rect x="30" y="92" width="1020" height="58" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="50" y="116" font-size="12.5" font-weight="600" fill="#4a2c6f">接触面 · 离线 LLM 类（批量 generate） + OpenAI 兼容 server（在线 HTTP）+ SamplingParams</text>
  <text x="50" y="137" font-size="10" fill="#7a5aa0">llm.generate(prompts) ｜ POST /v1/chat/completions ｜ temperature/top_p/top_k/max_tokens 控制生成</text>

  <!-- ② EngineCore step 循环 (30,172,1020,116) green -->
  <rect x="30" y="172" width="1020" height="116" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="50" y="196" font-size="12.5" font-weight="600" fill="#12402a">EngineCore · step() busy loop（可独立进程,与前端异步通信）</text>
  <!-- 三步 -->
  <rect x="50" y="210" width="290" height="62" rx="9" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="195" y="234" font-size="11" font-weight="600" text-anchor="middle" fill="#12402a">① schedule 调度选批</text>
  <text x="195" y="253" font-size="8.5" text-anchor="middle" fill="#2f6f4f">连续批处理:随到随入完成即出</text>
  <text x="195" y="267" font-size="8.5" text-anchor="middle" fill="#4a8a63">token 预算 + 分配 KV 块</text>
  <rect x="395" y="210" width="290" height="62" rx="9" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="540" y="234" font-size="11" font-weight="600" text-anchor="middle" fill="#12402a">② execute_model 前向</text>
  <text x="540" y="253" font-size="8.5" text-anchor="middle" fill="#2f6f4f">ModelRunner 跑模型</text>
  <text x="540" y="267" font-size="8.5" text-anchor="middle" fill="#4a8a63">PagedAttention 读分块 KV</text>
  <rect x="740" y="210" width="290" height="62" rx="9" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="885" y="234" font-size="11" font-weight="600" text-anchor="middle" fill="#12402a">③ 采样 + 回填</text>
  <text x="885" y="253" font-size="8.5" text-anchor="middle" fill="#2f6f4f">Sampler logits→token</text>
  <text x="885" y="267" font-size="8.5" text-anchor="middle" fill="#4a8a63">判停止,未完成下一步</text>
  <path d="M340,241 L395,241" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M685,241 L740,241" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <!-- loop back arrow -->
  <path d="M885,272 L885,282 L195,282 L195,272" stroke="#bcd0ec" stroke-width="1.3" fill="none" marker-end="url(#ar)"/>

  <!-- ③ 核心分块 KV 带 (30,306,1020,70) amber -->
  <rect x="30" y="306" width="1020" height="70" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="50" y="332" font-size="12" font-weight="600" fill="#5a3410">PagedAttention 与 KV 缓存 · vLLM 的灵魂(中心资源)</text>
  <text x="50" y="354" font-size="9.5" fill="#93762e">KV 缓存切成固定块(默认 16 token/块,像 OS 分页)· 块表映射逻辑→物理块 · 按需分配、物理分散、可共享 · reshape_and_cache 写块</text>
  <text x="50" y="370" font-size="9" fill="#b1974e">显存利用率从 ~20% 提到接近满 → 同显存装更多并发请求 → 吞吐倍增 · 默认 FlashAttention 后端按块表 gather KV</text>

  <!-- ④~⑦ 底部能力域带 y=400 h=92 -->
  <!-- 块管理与前缀缓存 (30,400,245,92) -->
  <rect x="30" y="400" width="245" height="92" rx="12" fill="#ffffff" stroke="#e4e4ea" filter="url(#soft)"/>
  <text x="152" y="426" font-size="11" font-weight="600" text-anchor="middle" fill="#1d1d1f">块管理与前缀缓存</text>
  <text x="152" y="448" font-size="8.5" text-anchor="middle" fill="#6e6e73">BlockPool 分配/回收</text>
  <text x="152" y="464" font-size="8.5" text-anchor="middle" fill="#6e6e73">引用计数共享块</text>
  <text x="152" y="480" font-size="8.5" text-anchor="middle" fill="#86868b">hash 前缀复用</text>
  <!-- 连续批处理调度 (285,400,245,92) -->
  <rect x="285" y="400" width="245" height="92" rx="12" fill="#ffffff" stroke="#e4e4ea" filter="url(#soft)"/>
  <text x="407" y="426" font-size="11" font-weight="600" text-anchor="middle" fill="#1d1d1f">连续批处理调度</text>
  <text x="407" y="448" font-size="8.5" text-anchor="middle" fill="#6e6e73">每步重组批 GPU 满载</text>
  <text x="407" y="464" font-size="8.5" text-anchor="middle" fill="#6e6e73">token 预算 + chunked prefill</text>
  <text x="407" y="480" font-size="8.5" text-anchor="middle" fill="#86868b">重算式抢占</text>
  <!-- 采样 (540,400,245,92) -->
  <rect x="540" y="400" width="245" height="92" rx="12" fill="#ffffff" stroke="#e4e4ea" filter="url(#soft)"/>
  <text x="662" y="426" font-size="11" font-weight="600" text-anchor="middle" fill="#1d1d1f">采样</text>
  <text x="662" y="448" font-size="8.5" text-anchor="middle" fill="#6e6e73">logits→token</text>
  <text x="662" y="464" font-size="8.5" text-anchor="middle" fill="#6e6e73">greedy / random</text>
  <text x="662" y="480" font-size="8.5" text-anchor="middle" fill="#86868b">temperature/top_p/top_k</text>
  <!-- 分布式并行 (795,400,255,92) -->
  <rect x="795" y="400" width="255" height="92" rx="12" fill="#ffffff" stroke="#e4e4ea" filter="url(#soft)"/>
  <text x="922" y="426" font-size="11" font-weight="600" text-anchor="middle" fill="#1d1d1f">分布式并行(TP/PP)</text>
  <text x="922" y="448" font-size="8.5" text-anchor="middle" fill="#6e6e73">TP 切层内 all-reduce</text>
  <text x="922" y="464" font-size="8.5" text-anchor="middle" fill="#6e6e73">PP 切层间传激活</text>
  <text x="922" y="480" font-size="8.5" text-anchor="middle" fill="#86868b">切大模型上多卡</text>

  <!-- 贯穿层 (30,514,1020,52) red -->
  <rect x="30" y="514" width="1020" height="52" rx="12" fill="#fbeaea" stroke="#e6b8b8" filter="url(#soft)"/>
  <text x="50" y="537" font-size="11" font-weight="600" fill="#7a2a2a">贯穿层 · KV 缓存块 是中心资源,横切所有能力域</text>
  <text x="50" y="556" font-size="9" fill="#a05a5a">PagedAttention 读写它 · 块管理分配回收它 · 调度按可用块数决定收多少请求/是否抢占 · 前缀缓存靠 hash 复用它 · 多卡每卡存自己那份</text>

  <!-- 三条贯穿声明 -->
  <text x="30" y="600" font-size="12" font-weight="700" fill="#1d1d1f">三条贯穿声明（vLLM 区别于朴素推理循环）</text>
  <g>
    <rect x="30" y="614" width="336" height="150" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
    <text x="50" y="638" font-size="10.5" font-weight="600" fill="#5a3410">① PagedAttention KV 分块</text>
    <text x="50" y="660" font-size="9" fill="#93762e">朴素为每请求预留 max_len 连续</text>
    <text x="50" y="676" font-size="9" fill="#93762e">显存,浪费(利用率~20%)</text>
    <text x="50" y="692" font-size="9" fill="#93762e">vLLM 切固定块(16 token)按需</text>
    <text x="50" y="708" font-size="9" fill="#93762e">分配、物理分散、块表映射</text>
    <text x="50" y="732" font-size="8.5" fill="#b1974e">利用率接近满 · 块可共享</text>
    <text x="50" y="750" font-size="8.5" fill="#b1974e">吞吐倍增 · 前缀复用成为可能</text>

    <rect x="378" y="614" width="336" height="150" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
    <text x="398" y="638" font-size="10.5" font-weight="600" fill="#12402a">② 连续批处理 GPU 不闲</text>
    <text x="398" y="660" font-size="9" fill="#2f6f4f">朴素静态批等整批做完才收下批</text>
    <text x="398" y="676" font-size="9" fill="#2f6f4f">短请求做完 GPU 空转等长请求</text>
    <text x="398" y="692" font-size="9" fill="#2f6f4f">vLLM 每步重组批:完成即出、</text>
    <text x="398" y="708" font-size="9" fill="#2f6f4f">等待即入,GPU 每步满载</text>
    <text x="398" y="732" font-size="8.5" fill="#4a8a63">chunked prefill 长 prompt 切块混批</text>
    <text x="398" y="750" font-size="8.5" fill="#4a8a63">平滑吞吐与单请求时延</text>

    <rect x="726" y="614" width="324" height="150" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="746" y="638" font-size="10.5" font-weight="600" fill="#1b2a4a">③ v1 架构 + 重算式抢占</text>
    <text x="746" y="660" font-size="9" fill="#5b7db1">v0 已删,全 v1</text>
    <text x="746" y="676" font-size="9" fill="#5b7db1">EngineCore 拆独立进程</text>
    <text x="746" y="692" font-size="9" fill="#5b7db1">经队列与 API 前端异步通信</text>
    <text x="746" y="708" font-size="9" fill="#5b7db1">前端 IO 不阻塞 GPU 循环</text>
    <text x="746" y="732" font-size="8.5" fill="#7a9dcb">显存不够重算式抢占(释放块重算)</text>
    <text x="746" y="750" font-size="8.5" fill="#7a9dcb">KV 太大,重算比换出换入更快</text>
  </g>

  <text x="30" y="788" font-size="9" fill="#a1a1a6">源码基准 vLLM(git 7aab6e2 · v1-only) · Python + CUDA · 位置即语义:顶接触面→中 step 循环→核心分块 KV→底能力域,KV 块贯穿全程</text>
</svg>
