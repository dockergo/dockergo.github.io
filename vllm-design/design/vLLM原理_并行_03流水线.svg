<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">vLLM 流水线并行 · PP —— N 层切 P 段每段一卡，段边界点对点传激活，配连续批处理减气泡</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">位置即语义：上层分段接力（数据从段 1 流到段 P）· 下气泡示意（朴素 PP 前段算时后段空等）· TP 重无气泡 vs PP 轻有气泡</text>

  <!-- stage relay : blue -->
  <rect x="30" y="78" width="1020" height="132" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="50" y="104" font-size="12.5" font-weight="600" fill="#1b2a4a">层分段接力 —— 模型 N 层切成 P 段，每段放一个 PP rank（卡），数据前向从第一段流到最后段</text>

  <rect x="50" y="120" width="220" height="72" rx="9" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="160" y="146" font-size="10" font-weight="600" text-anchor="middle" fill="#1b2a4a">段 1 · GPU A</text>
  <text x="160" y="166" font-size="8.5" text-anchor="middle" fill="#5b7db1">层 0 ~ N/P-1</text>
  <text x="160" y="182" font-size="8" text-anchor="middle" fill="#7a9dcb">第一段：接收输入</text>

  <rect x="330" y="120" width="220" height="72" rx="9" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="440" y="146" font-size="10" font-weight="600" text-anchor="middle" fill="#1b2a4a">段 2 · GPU B</text>
  <text x="440" y="166" font-size="8.5" text-anchor="middle" fill="#5b7db1">中间层段</text>
  <text x="440" y="182" font-size="8" text-anchor="middle" fill="#7a9dcb">承上启下</text>

  <rect x="610" y="120" width="220" height="72" rx="9" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="720" y="146" font-size="10" font-weight="600" text-anchor="middle" fill="#1b2a4a">…（P 段）</text>
  <text x="720" y="166" font-size="8.5" text-anchor="middle" fill="#5b7db1">逐段接力</text>
  <text x="720" y="182" font-size="8" text-anchor="middle" fill="#7a9dcb">段边界传激活</text>

  <rect x="890" y="120" width="160" height="72" rx="9" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="970" y="146" font-size="10" font-weight="600" text-anchor="middle" fill="#1b2a4a">段 P · GPU N</text>
  <text x="970" y="166" font-size="8.5" text-anchor="middle" fill="#5b7db1">末层段</text>
  <text x="970" y="182" font-size="8" text-anchor="middle" fill="#7a9dcb">出 logits</text>

  <path d="M270,156 L330,156" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M550,156 L610,156" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M830,156 L890,156" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="300" y="115" font-size="7.5" text-anchor="middle" fill="#a1a1a6">点对点传激活</text>
  <text x="580" y="115" font-size="7.5" text-anchor="middle" fill="#a1a1a6">点对点</text>
  <text x="860" y="115" font-size="7.5" text-anchor="middle" fill="#a1a1a6">点对点</text>

  <!-- bubble diagram : amber -->
  <rect x="30" y="224" width="500" height="196" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="50" y="250" font-size="12" font-weight="600" fill="#5a3410">朴素 PP 有气泡（bubble）</text>
  <text x="50" y="270" font-size="8.5" fill="#93762e">前段算第一批时，后段还没数据只能空等</text>

  <!-- schedule grid: 3 stages x time -->
  <text x="60" y="298" font-size="8.5" fill="#5a3410">段1</text>
  <rect x="86" y="290" width="60" height="16" rx="3" fill="#e8cf9a"/>
  <rect x="148" y="290" width="60" height="16" rx="3" fill="#e8cf9a"/>
  <rect x="210" y="290" width="60" height="16" rx="3" fill="#f0e2c0"/>
  <text x="60" y="322" font-size="8.5" fill="#5a3410">段2</text>
  <rect x="86" y="314" width="60" height="16" rx="3" fill="#f7efd8" stroke="#e8cf9a" stroke-dasharray="2,2"/>
  <rect x="148" y="314" width="60" height="16" rx="3" fill="#e8cf9a"/>
  <rect x="210" y="314" width="60" height="16" rx="3" fill="#e8cf9a"/>
  <text x="60" y="346" font-size="8.5" fill="#5a3410">段3</text>
  <rect x="86" y="338" width="60" height="16" rx="3" fill="#f7efd8" stroke="#e8cf9a" stroke-dasharray="2,2"/>
  <rect x="148" y="338" width="60" height="16" rx="3" fill="#f7efd8" stroke="#e8cf9a" stroke-dasharray="2,2"/>
  <rect x="210" y="338" width="60" height="16" rx="3" fill="#e8cf9a"/>
  <text x="300" y="303" font-size="8" fill="#b1974e">实心=计算</text>
  <text x="300" y="323" font-size="8" fill="#b1974e">虚框=空等（气泡）</text>
  <text x="300" y="343" font-size="8" fill="#b1974e">→ 时间</text>

  <text x="50" y="378" font-size="9" fill="#93762e">配连续批处理 / microbatch 让不同请求填满流水线</text>
  <text x="50" y="398" font-size="9" fill="#93762e">各段（段 1 算下一批时段 2 算上一批），减少空等</text>

  <!-- PP vs TP : green -->
  <rect x="550" y="224" width="500" height="196" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="570" y="250" font-size="12" font-weight="600" fill="#12402a">PP 通信轻但有气泡 · 对比 TP</text>
  <text x="570" y="274" font-size="9" fill="#2f6f4f">PP 只在段边界传激活（点对点），通信量远小于 TP；</text>
  <text x="570" y="294" font-size="9" fill="#2f6f4f">但朴素 PP 有气泡（前几段算时后几段空等）。</text>

  <rect x="570" y="308" width="220" height="58" rx="8" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="680" y="330" font-size="9.5" font-weight="600" text-anchor="middle" fill="#12402a">TP 重无气泡</text>
  <text x="680" y="350" font-size="8" text-anchor="middle" fill="#2f6f4f">集合通信 all-reduce，宜单机</text>
  <rect x="810" y="308" width="220" height="58" rx="8" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="920" y="330" font-size="9.5" font-weight="600" text-anchor="middle" fill="#1b2a4a">PP 轻有气泡</text>
  <text x="920" y="350" font-size="8" text-anchor="middle" fill="#5b7db1">点对点，宜跨机 + microbatch</text>

  <text x="570" y="392" font-size="9" fill="#4a8a63">按模型 / 硬件权衡组合：超大模型单机 TP + 多机 PP</text>
  <text x="570" y="410" font-size="8.5" fill="#4a8a63">误区：多卡 ≠ 线性加速——通信开销、气泡、负载不均使加速次线性</text>

  <text x="30" y="454" font-size="10" font-weight="600" fill="#1d1d1f">PP 切层间点对点传激活（比 TP 集合通信少），朴素有气泡；连续批处理 / microbatch 填流水线减气泡</text>
  <text x="30" y="522" font-size="9" fill="#a1a1a6">源码基准 vLLM(git 7aab6e2 · v1-only) · PP 把 N 层切 P 段每段一卡 · 段边界点对点传激活 · 配连续批处理 / microbatch 填流水线减气泡 · TP 重无气泡 vs PP 轻有气泡</text>
</svg>
