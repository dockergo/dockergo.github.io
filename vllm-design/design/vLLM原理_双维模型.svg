<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">vLLM 双维模型 —— 能力域 × 执行时机</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">纵轴:接触面(可见)vs 支撑侧(内部)· 横轴:前台(请求路径)vs 后台(EngineCore busy loop + 块回收)</text>

  <text x="40" y="92" font-size="12" font-weight="700" fill="#1d1d1f">能力域（自上而下：接触面 → 支撑侧）</text>

  <!-- 接触面 -->
  <rect x="40" y="104" width="1000" height="66" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="60" y="128" font-size="11.5" font-weight="600" fill="#4a2c6f">接触面（用户可见）</text>
  <text x="60" y="150" font-size="9.5" fill="#7a5aa0">离线 LLM 类(.generate 批量)· OpenAI 兼容 server(在线 HTTP)· SamplingParams(temperature/top_p/max_tokens)</text>
  <text x="60" y="166" font-size="9" fill="#9a7ac0">提交 prompt + 采样参数,拿回生成的 token</text>

  <!-- 支撑侧 -->
  <rect x="40" y="182" width="1000" height="116" rx="12" fill="#ffffff" stroke="#e4e4ea" filter="url(#soft)"/>
  <text x="60" y="206" font-size="11.5" font-weight="600" fill="#1d1d1f">支撑侧（引擎内部机制）</text>
  <text x="60" y="228" font-size="9.5" fill="#6e6e73">PagedAttention 与 KV 缓存(分块)· 块管理与前缀缓存(BlockPool + hash 复用)· 连续批处理调度(每步重组批)</text>
  <text x="60" y="248" font-size="9.5" fill="#6e6e73">EngineCore 执行循环(step busy loop)· 采样(logits→token)· 分布式并行(TP/PP 切大模型上多卡)</text>
  <text x="60" y="274" font-size="9" fill="#86868b">贯穿层:KV 缓存块(中心资源)——PagedAttention 读写、块管理分配回收、调度按可用块数选批、前缀缓存 hash 复用</text>

  <!-- 执行时机 -->
  <text x="40" y="336" font-size="12" font-weight="700" fill="#1d1d1f">执行时机</text>
  <rect x="40" y="348" width="490" height="120" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="60" y="372" font-size="11.5" font-weight="600" fill="#1b2a4a">前台（请求路径）</text>
  <text x="60" y="394" font-size="9.5" fill="#5b7db1">提交 prompt → 调度选批 → 模型前向</text>
  <text x="60" y="414" font-size="9.5" fill="#5b7db1">→ PagedAttention 算注意力 → 采样出 token</text>
  <text x="60" y="434" font-size="9.5" fill="#5b7db1">→ 流式返回;每步一个 token(自回归)</text>
  <text x="60" y="456" font-size="9" fill="#8aa4c8">接触面 + 采样 + 前向在此路径</text>

  <rect x="550" y="348" width="490" height="120" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="570" y="372" font-size="11.5" font-weight="600" fill="#12402a">后台（持续循环 / 资源管理）</text>
  <text x="570" y="394" font-size="9.5" fill="#2f6f4f">EngineCore busy loop 持续 step(独立进程)</text>
  <text x="570" y="414" font-size="9.5" fill="#2f6f4f">KV 块的分配/回收/引用计数/前缀缓存驱逐</text>
  <text x="570" y="434" font-size="9.5" fill="#2f6f4f">显存不够时重算式抢占(释放块重入队)</text>
  <text x="570" y="456" font-size="9" fill="#4a8a63">连续批处理调度 + 块管理在此</text>

  <text x="30" y="498" font-size="9" fill="#a1a1a6">要点:v1 把 EngineCore 拆独立进程(后台 GPU 循环)与 API 前端(前台 IO)异步,避 Python GIL 阻塞 · 源码基准 vLLM(git 7aab6e2 · v1-only)</text>
</svg>
