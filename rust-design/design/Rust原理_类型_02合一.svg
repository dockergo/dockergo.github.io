<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Rust 合一 · union-find 求解类型变量（Hindley-Milner 系）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">推断本质是解约束方程组:遇未知引入类型变量 ?T,从使用约束合一,归并相等变量到具体类型;解不出则要求标注</text>

  <!-- flow of 4 steps -->
  <rect x="40" y="80" width="228" height="128" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="56" y="104" font-size="11.5" font-weight="600" fill="#1b2a4a">① 引入类型变量</text>
  <text x="56" y="126" font-size="10" fill="#5b7db1">遇未知类型 → ?T</text>
  <text x="56" y="145" font-size="10" fill="#5b7db1">let mut x = Vec::new;</text>
  <text x="56" y="163" font-size="10" fill="#5b7db1">x : Vec&lt;?U&gt;（元素未知）</text>
  <text x="56" y="185" font-size="9" fill="#a1a1a6">类型未定,占位待解</text>

  <rect x="296" y="80" width="228" height="128" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="312" y="104" font-size="11.5" font-weight="600" fill="#1b2a4a">② 收集使用约束</text>
  <text x="312" y="126" font-size="10" fill="#5b7db1">x.push(1) →</text>
  <text x="312" y="145" font-size="10" fill="#5b7db1">?U = i32</text>
  <text x="312" y="163" font-size="10" fill="#5b7db1">从后续使用推元素类型</text>
  <text x="312" y="185" font-size="9" fill="#a1a1a6">约束方程逐条累积</text>

  <rect x="552" y="80" width="228" height="128" rx="13" fill="#e7f0fb" stroke="#b9d2ef" filter="url(#soft)"/>
  <text x="568" y="104" font-size="11.5" font-weight="600" fill="#1b2a4a">③ 合一 · union-find</text>
  <text x="568" y="126" font-size="10" fill="#5b7db1">同一类型的变量</text>
  <text x="568" y="145" font-size="10" fill="#5b7db1">归并到一个代表</text>
  <text x="568" y="163" font-size="10" fill="#5b7db1">?U 与 i32 合一</text>
  <text x="568" y="185" font-size="9" fill="#a1a1a6">高效维护"必须相等"</text>

  <rect x="808" y="80" width="232" height="128" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="824" y="104" font-size="11.5" font-weight="600" fill="#12402a">④ 解析成具体类型</text>
  <text x="824" y="126" font-size="10" fill="#2f6f4f">全部约束合一后</text>
  <text x="824" y="145" font-size="10" fill="#2f6f4f">?T → 具体类型</text>
  <text x="824" y="163" font-size="10" fill="#2f6f4f">x : Vec&lt;i32&gt;</text>
  <text x="824" y="185" font-size="9" fill="#a1a1a6">无需任何标注</text>

  <path d="M268,144 L296,144" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M524,144 L552,144" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M780,144 L808,144" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- data structures -->
  <rect x="40" y="240" width="640" height="150" rx="14" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="56" y="266" font-size="12" font-weight="600" fill="#274a78">ena 风格 union-find 表 · rustc_infer/src/infer/mod.rs</text>
  <g text-anchor="middle" font-size="9.5">
    <rect x="56" y="282" width="290" height="40" rx="8" fill="#ffffff" stroke="#cfe0f2"/><text x="201" y="299" fill="#274a78">UnificationTable（:83）</text><text x="201" y="313" fill="#5b7db1">union-find 类型变量</text>
    <rect x="366" y="282" width="298" height="40" rx="8" fill="#ffffff" stroke="#cfe0f2"/><text x="515" y="299" fill="#274a78">TypeVariableTable（:211）</text><text x="515" y="313" fill="#5b7db1">类型变量表</text>
  </g>
  <rect x="56" y="332" width="608" height="42" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="360" y="352" font-size="9.5" text-anchor="middle" fill="#274a78">int / float / const 各自的表（:221）</text>
  <text x="360" y="367" font-size="9" text-anchor="middle" fill="#5b7db1">整数字面量、浮点、常量泛型分别有独立的合一表</text>

  <!-- failure branch -->
  <rect x="708" y="240" width="332" height="150" rx="14" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="724" y="266" font-size="12" font-weight="600" fill="#4a1414">解不出 → 要求标注</text>
  <text x="724" y="290" font-size="10" fill="#7a2a2a">冲突（两约束矛盾）</text>
  <text x="724" y="309" font-size="10" fill="#7a2a2a">或信息不足（无使用线索）</text>
  <text x="724" y="332" font-size="10" fill="#7a2a2a">报 "type annotations needed"</text>
  <text x="724" y="355" font-size="9.5" fill="#7a2a2a">let v = Vec::new; // 未用,无元素类型</text>
  <text x="724" y="374" font-size="9" fill="#a1a1a6">加标注或 turbofish 帮推断</text>

  <text x="30" y="478" font-size="9" fill="#a1a1a6">为什么合一:union-find 高效维护"哪些类型变量必须相等",逐步求出具体类型 —— Hindley-Milner 系推断的经典手法</text>
  <text x="30" y="502" font-size="9" fill="#a1a1a6">源码基准 Rust 1.99.0 · rustc_infer/src/infer/mod.rs</text>
</svg>
