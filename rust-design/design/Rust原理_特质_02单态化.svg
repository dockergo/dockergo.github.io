<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Rust 单态化 · 泛型→具体 —— 零成本抽象的核心(每具体类型一份专版)</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">rustc_monomorphize/src/collector.rs:1 "Mono Item Collection";为每个 (fn, 具体类型参数) 生成代码</text>

  <!-- source: 泛型 fn (purple) -->
  <rect x="40" y="88" width="300" height="150" rx="14" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="62" y="114" font-size="12.5" font-weight="600" fill="#3d2a5a">泛型 fn(一份源码)</text>
  <rect x="62" y="128" width="256" height="40" rx="8" fill="#ffffff" stroke="#d9c7ec"/>
  <text x="190" y="153" font-size="10.5" text-anchor="middle" fill="#3d2a5a">fn f&lt;T&gt;(x: T) { … }</text>
  <text x="62" y="192" font-size="10" fill="#3d2a5a">非泛型 fn → 一份 LLVM 代码</text>
  <text x="62" y="212" font-size="10" fill="#3d2a5a">泛型 fn → 每实例化 0..N 份</text>
  <text x="62" y="230" font-size="9" fill="#a1a1a6">collector.rs:7</text>

  <!-- collector engine (blue) -->
  <rect x="390" y="88" width="300" height="150" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="412" y="114" font-size="12.5" font-weight="600" fill="#1b2a4a">collector · 收集单态项</text>
  <text x="412" y="136" font-size="9.5" fill="#5b7db1">collect_roots :1471(从 main/导出出发)</text>
  <rect x="412" y="150" width="256" height="42" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="540" y="168" font-size="9.5" font-weight="600" text-anchor="middle" fill="#1b2a4a">MonoItemCollectionStrategy :244</text>
  <text x="540" y="184" font-size="9" text-anchor="middle" fill="#5b7db1">Lazy(默认,按需)/ Eager(增量)</text>
  <text x="412" y="212" font-size="10" fill="#1b2a4a">Instance::expect_resolve</text>
  <text x="412" y="230" font-size="9" fill="#a1a1a6">rustc_middle/ty/instance.rs:603</text>

  <!-- specialized outputs (green) -->
  <rect x="740" y="88" width="300" height="150" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="762" y="114" font-size="12.5" font-weight="600" fill="#12402a">具体专版(每类型一份)</text>
  <rect x="762" y="128" width="256" height="40" rx="8" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="890" y="153" font-size="10" text-anchor="middle" fill="#12402a">Vec&lt;i32&gt; 版 · i32 专版</text>
  <rect x="762" y="176" width="256" height="40" rx="8" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="890" y="201" font-size="10" text-anchor="middle" fill="#12402a">Vec&lt;String&gt; 版 · String 专版</text>
  <text x="762" y="232" font-size="9" fill="#a1a1a6">各自像手写的一样紧凑</text>

  <path d="M340,163 L390,163" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M690,163 L740,163" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- CGU (blue) -->
  <rect x="40" y="262" width="480" height="120" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="62" y="288" font-size="12" font-weight="600" fill="#1b2a4a">CGU 分区 · 并行编译</text>
  <text x="62" y="312" font-size="9.5" fill="#5b7db1">partitioning.rs</text>
  <text x="62" y="334" font-size="10" fill="#1b2a4a">把单态项分到 codegen units 并行编译</text>
  <text x="62" y="356" font-size="9.5" fill="#1b2a4a">注:单态化即时发生,从不创建单态化 MIR (instance.rs:25)</text>

  <!-- 零成本 vs 代价 (green + red split) -->
  <rect x="540" y="262" width="500" height="120" rx="14" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="562" y="288" font-size="12" font-weight="600" fill="#2c5a3a">零成本 · 但有代价</text>
  <rect x="562" y="300" width="220" height="66" rx="8" fill="#ffffff" stroke="#cfe6d5"/>
  <text x="672" y="322" font-size="9.5" font-weight="600" text-anchor="middle" fill="#2c5a3a">收益:运行时零成本</text>
  <text x="672" y="340" font-size="9" text-anchor="middle" fill="#2f6f4f">无运行时类型参数</text>
  <text x="672" y="356" font-size="9" text-anchor="middle" fill="#2f6f4f">无装箱</text>
  <rect x="798" y="300" width="220" height="66" rx="8" fill="#fbeaea" stroke="#e7c3c3"/>
  <text x="908" y="322" font-size="9.5" font-weight="600" text-anchor="middle" fill="#4a1414">代价:代码膨胀</text>
  <text x="908" y="340" font-size="9" text-anchor="middle" fill="#7a2a2a">多份专版增体积</text>
  <text x="908" y="356" font-size="9" text-anchor="middle" fill="#7a2a2a">编译变慢</text>

  <text x="30" y="416" font-size="9.5" fill="#a1a1a6">为什么零成本:Vec&lt;i32&gt; 与 Vec&lt;String&gt; 各生成专版,各自像手写的一样紧凑 —— 无运行时类型参数、无装箱</text>
  <text x="30" y="440" font-size="9.5" fill="#a1a1a6">误区:泛型有运行时开销 —— 静态分发的泛型单态化成具体代码,零运行时开销(只有 dyn 才有虚表开销,见 03分发)</text>
  <text x="30" y="464" font-size="9" fill="#a1a1a6">误区:单态化免费 —— 零运行时成本,但编译期成本(代码膨胀 + 编译慢),泛型用太多会胖二进制 · 源码基准 Rust 1.99.0</text>
</svg>
