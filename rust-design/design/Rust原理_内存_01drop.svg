<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Rust Drop 与 RAII · 出作用域自动析构（无 GC）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">资源绑定到值的生命周期:值在资源在,值 Drop 资源释放;编译器保证一定调（正常/panic 都调）、只调一次</text>

  <!-- Drop trait card -->
  <rect x="50" y="82" width="480" height="200" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="72" y="108" font-size="12.5" font-weight="600" fill="#5a3410">Drop trait · library/core/src/ops/drop.rs:209</text>
  <text x="72" y="128" font-size="9.5" fill="#93762e">pub const trait Drop · #[lang="drop"]（:206）</text>
  <rect x="72" y="140" width="436" height="44" rx="8" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="290" y="160" font-size="10.5" font-weight="600" text-anchor="middle" fill="#5a3410">唯一方法 fn drop(&amp;mut self)</text>
  <text x="290" y="176" font-size="9.5" text-anchor="middle" fill="#93762e">owner 出作用域时隐式调用,回收资源</text>
  <text x="72" y="204" font-size="9.5" fill="#93762e">回收:关文件、释放堆内存、释放锁等</text>
  <text x="72" y="224" font-size="9.5" fill="#93762e">不能显式调 drop（E0040）</text>
  <text x="72" y="244" font-size="9.5" fill="#93762e">要提前析构 → 用 mem::drop(x)（move 进去即析构）</text>
  <text x="72" y="268" font-size="9" fill="#a1a1a6">C++ 也用 RAII,Rust 加所有权让它更安全</text>

  <!-- RAII lifecycle -->
  <rect x="560" y="82" width="470" height="200" rx="14" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="582" y="108" font-size="12.5" font-weight="600" fill="#5a3410">RAII · 资源获取即初始化</text>
  <g text-anchor="middle" font-size="9.5">
    <rect x="582" y="126" width="200" height="46" rx="8" fill="#ffffff" stroke="#efdcb4"/><text x="682" y="145" fill="#5a3410">获取资源</text><text x="682" y="160" fill="#93762e">let f = File::open</text>
    <rect x="808" y="126" width="200" height="46" rx="8" fill="#ffffff" stroke="#efdcb4"/><text x="908" y="145" fill="#5a3410">值在 → 资源在</text><text x="908" y="160" fill="#93762e">作用域内可用</text>
    <rect x="582" y="200" width="426" height="46" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="795" y="219" fill="#12402a">出作用域 → 隐式 Drop → 资源释放</text><text x="795" y="234" fill="#2f6f4f">无需手动 free / close,不会忘</text>
  </g>
  <path d="M782,149 L808,149" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M908,172 L908,186 L795,186 L795,200" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="582" y="270" font-size="9" fill="#a1a1a6">编译器保证:正常返回与 panic 展开都会调 Drop</text>

  <!-- double panic warning -->
  <rect x="50" y="308" width="980" height="88" rx="14" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="72" y="334" font-size="12" font-weight="600" fill="#4a1414">告警 · Drop 中 panic（drop.rs:221）</text>
  <text x="72" y="356" font-size="10" fill="#7a2a2a">Drop 中 panic + 正在 unwind → double-panic → abort（进程直接终止,不再展开）</text>
  <text x="72" y="378" font-size="9.5" fill="#7a2a2a">工程建议:Drop 里避免做可能 panic 的操作 —— 展开中再 panic 无法安全恢复</text>

  <text x="30" y="428" font-size="9.5" fill="#a1a1a6">为什么 RAII:把"释放"绑到"作用域结束",编译器保证一定调、所有权保证只调一次 —— 无 GC 也不手动 free</text>
  <text x="30" y="452" font-size="9" fill="#a1a1a6">逆声明序析构（后声明先 Drop）· 复合类型字段递归析构（drop glue）· 源码基准 Rust 1.99.0</text>
</svg>
