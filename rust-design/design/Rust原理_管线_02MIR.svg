<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Rust MIR · 中心舞台 —— 安全检查与语言级优化的公共基础</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">MIR(中层 IR)是控制流图形式:基本块 + 语句 + 终结符,borrow / move / drop 都显式</text>

  <!-- center stage MIR (blue, emphasized) -->
  <rect x="390" y="180" width="300" height="150" rx="14" fill="#eef3fb" stroke="#7ea3d6" stroke-width="2" filter="url(#soft)"/>
  <text x="540" y="214" font-size="14" font-weight="700" text-anchor="middle" fill="#1b2a4a">MIR · 中心舞台 ★</text>
  <text x="540" y="238" font-size="10" text-anchor="middle" fill="#5b7db1">控制流图 (基本块 + 语句 + 终结符)</text>
  <text x="540" y="262" font-size="10.5" text-anchor="middle" fill="#1b2a4a">borrow / move / drop 显式</text>
  <rect x="418" y="278" width="244" height="40" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="540" y="296" font-size="9.5" font-weight="600" text-anchor="middle" fill="#1b2a4a">足够低能安全检查 · 足够高能语言级优化</text>
  <text x="540" y="311" font-size="9" text-anchor="middle" fill="#5b7db1">独立于 LLVM</text>

  <!-- top-left: 借用检查 (green) -->
  <rect x="40" y="86" width="300" height="120" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="62" y="112" font-size="12.5" font-weight="600" fill="#12402a">① 借用检查</text>
  <text x="62" y="134" font-size="9.5" fill="#2f6f4f">mir_borrowck 拉 mir_promoted</text>
  <text x="62" y="154" font-size="10" fill="#12402a">CFG 便于数据流分析</text>
  <text x="62" y="174" font-size="10" fill="#12402a">哪个借用在哪活着</text>
  <text x="62" y="196" font-size="9" fill="#a1a1a6">详见借用检查器篇</text>

  <!-- top-right: Drop 精化 (green) -->
  <rect x="740" y="86" width="300" height="120" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="762" y="112" font-size="12.5" font-weight="600" fill="#12402a">② Drop 精化</text>
  <text x="762" y="134" font-size="9.5" fill="#2f6f4f">mir_drops_elaborated_and_const_checked</text>
  <text x="762" y="150" font-size="9" fill="#2f6f4f">rustc_mir_transform/src/lib.rs:537</text>
  <text x="762" y="172" font-size="10" fill="#12402a">插入 Drop 调用 (RAII 落地)</text>
  <text x="762" y="196" font-size="9" fill="#a1a1a6">详见内存与 Drop 篇</text>

  <!-- bottom-left: 优化 (blue) -->
  <rect x="40" y="336" width="300" height="120" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="62" y="362" font-size="12.5" font-weight="600" fill="#1b2a4a">③ 优化</text>
  <text x="62" y="384" font-size="9.5" fill="#5b7db1">run_optimization_passes :700</text>
  <text x="62" y="404" font-size="10" fill="#1b2a4a">内联、常量传播等</text>
  <text x="62" y="424" font-size="10" fill="#1b2a4a">产 optimized_mir</text>
  <text x="62" y="446" font-size="9" fill="#a1a1a6">语言级优化,独立于 LLVM</text>

  <!-- bottom-right: 单态化产实例 (purple) -->
  <rect x="740" y="336" width="300" height="120" rx="14" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="762" y="362" font-size="12.5" font-weight="600" fill="#3d2a5a">④ 单态化产 MIR 实例</text>
  <text x="762" y="384" font-size="9.5" fill="#7c68a6">rustc_monomorphize</text>
  <text x="762" y="404" font-size="10" fill="#3d2a5a">泛型函数按具体类型实例化</text>
  <text x="762" y="424" font-size="10" fill="#3d2a5a">每个具体类型一份专版</text>
  <text x="762" y="446" font-size="9" fill="#a1a1a6">详见特质与单态化篇</text>

  <!-- connectors radiating to/from center -->
  <path d="M340,146 L365,146 L365,220 L390,220" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M740,146 L715,146 L715,220 L690,220" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M340,396 L365,396 L365,290 L390,290" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M740,396 L715,396 L715,290 L690,290" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <text x="30" y="486" font-size="9.5" fill="#a1a1a6">为什么 MIR 是中心:足够低(显式 drop/borrow,能安全检查)又足够高(独立 LLVM,能语言级优化) —— 四件事的公共基础</text>
  <text x="30" y="508" font-size="9" fill="#a1a1a6">误区:借用检查独立于管线 —— 它是 MIR 阶段的一个 query(mir_borrowck),嵌在管线里 · 源码基准 Rust 1.99.0</text>
</svg>
