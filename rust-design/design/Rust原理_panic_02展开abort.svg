<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="510" viewBox="0 0 1080 510" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="510" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Rust 展开 vs abort · 两种 panic 运行时（编译期 -C panic= 选）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">panic 后两种运行时行为:展开逐层析构栈上值(RAII 一致、可 catch);abort 直接终止(快、小、不析构)—— 按场景选</text>

  <!-- 展开 unwind (green = RAII 一致/资源释放) -->
  <rect x="40" y="80" width="500" height="230" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="62" y="106" font-size="12.5" font-weight="600" fill="#12402a">展开（unwind,默认）· library/panic_unwind</text>
  <text x="62" y="126" font-size="9" fill="#2f6f4f">__rust_start_panic · lib.rs:99 启动栈展开</text>
  <rect x="62" y="140" width="456" height="46" rx="8" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="290" y="160" font-size="10" font-weight="600" text-anchor="middle" fill="#12402a">逐层析构栈上的值 → 调各 owner 的 Drop</text>
  <text x="290" y="176" font-size="9" text-anchor="middle" fill="#2f6f4f">回收资源,直到线程边界终止</text>
  <text x="62" y="208" font-size="10" fill="#12402a">· 资源正确释放（RAII 一致）</text>
  <text x="62" y="230" font-size="10" fill="#12402a">· 可被 catch_unwind 捕获</text>
  <rect x="62" y="244" width="456" height="30" rx="8" fill="#fff7e6" stroke="#efdcb4"/>
  <text x="290" y="263" font-size="9.5" font-weight="600" text-anchor="middle" fill="#5a3410">开销大：需要展开表</text>
  <text x="62" y="296" font-size="9" fill="#a1a1a6">-C panic=unwind · 可 catch、资源释放</text>

  <!-- abort (red = 直接终止) -->
  <rect x="560" y="80" width="480" height="230" rx="14" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="582" y="106" font-size="12.5" font-weight="600" fill="#4a1414">abort · library/panic_abort</text>
  <text x="582" y="126" font-size="9" fill="#7a2a2a">"via process aborts" · lib.rs:1</text>
  <rect x="582" y="140" width="436" height="46" rx="8" fill="#ffffff" stroke="#e7c3c3"/>
  <text x="800" y="160" font-size="10" font-weight="600" text-anchor="middle" fill="#4a1414">__rust_start_panic 忽略 payload</text>
  <text x="800" y="176" font-size="9" text-anchor="middle" fill="#7a2a2a">直接 __rust_abort() 终止进程（:33）</text>
  <text x="582" y="208" font-size="10" fill="#4a1414">· 不析构（资源不释放,靠 OS 回收）</text>
  <text x="582" y="230" font-size="10" fill="#4a1414">· 不能 catch_unwind</text>
  <rect x="582" y="244" width="436" height="30" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="800" y="263" font-size="9.5" font-weight="600" text-anchor="middle" fill="#12402a">快、小：无展开表</text>
  <text x="582" y="296" font-size="9" fill="#7a2a2a">-C panic=abort · 嵌入式 / 减体积,直接崩</text>

  <!-- 选择 strip (blue) -->
  <rect x="40" y="330" width="1000" height="86" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="62" y="356" font-size="12" font-weight="600" fill="#1b2a4a">选择 · 编译期 -C panic= 决定</text>
  <text x="62" y="380" font-size="10" fill="#1b2a4a">unwind（默认）：可 catch、资源释放、RAII 一致 —— 一般应用</text>
  <text x="62" y="402" font-size="10" fill="#1b2a4a">abort：省展开表(减二进制体积) + 更快崩 —— 嵌入式 / 容器 / 确定性场景</text>

  <text x="30" y="444" font-size="9.5" fill="#a1a1a6">为什么两种:展开保证 panic 时也析构(RAII 一致) + 可恢复(catch_unwind);abort 省展开表(减体积) + 更快崩 —— 按场景选</text>
  <text x="30" y="468" font-size="9" fill="#a1a1a6">展开时调的 Drop 在【内存与 Drop】;abort 直接终止不走析构 · 源码基准 Rust 1.99.0</text>
</svg>
