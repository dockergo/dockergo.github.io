<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Rust 原理 · 依赖矩阵（开发者动作 × 能力域）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">你做什么 → 依赖哪些能力域。● 直接依赖　○ 间接依赖。安全检查全在编译期</text>

  <!-- column headers -->
  <g font-size="9.5" text-anchor="middle" fill="#1d1d1f">
    <text x="358" y="96">编译管线</text>
    <text x="458" y="96">借用检查</text>
    <text x="558" y="96">类型推断</text>
    <text x="658" y="96">特质单态化</text>
    <text x="758" y="96">内存 Drop</text>
    <text x="858" y="96">并发 SendSync</text>
    <text x="958" y="96">智能指针/内部可变</text>
  </g>
  <line x1="30" y1="106" x2="1050" y2="106" stroke="#d0d0d6" stroke-width="1.2"/>
  <line x1="300" y1="72" x2="300" y2="452" stroke="#d0d0d6" stroke-width="1.2"/>

  <!-- row 1: 写代码(编译) -->
  <rect x="34" y="118" width="256" height="88" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="50" y="150" font-size="12" font-weight="600" fill="#1b2a4a">写代码 → 编译</text>
  <text x="50" y="170" font-size="9" fill="#5b7db1">struct / fn / trait，走全流程</text>
  <text x="50" y="188" font-size="9" fill="#5b7db1">编译期证明内存安全</text>
  <g font-size="14" text-anchor="middle">
    <text x="358" y="167" fill="#2f6f4f">●</text>
    <text x="458" y="167" fill="#2f6f4f">●</text>
    <text x="558" y="167" fill="#2f6f4f">●</text>
    <text x="658" y="167" fill="#2f6f4f">●</text>
    <text x="758" y="167" fill="#c7a24a">○</text>
    <text x="858" y="167" fill="#cfcfd6"></text>
    <text x="958" y="167" fill="#cfcfd6"></text>
  </g>
  <line x1="30" y1="216" x2="1050" y2="216" stroke="#eff0f3" stroke-width="1"/>

  <!-- row 2: 用并发 -->
  <rect x="34" y="228" width="256" height="88" rx="11" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="50" y="260" font-size="12" font-weight="600" fill="#7a2a2a">用并发</text>
  <text x="50" y="280" font-size="9" fill="#a85560">thread::spawn / Arc / Mutex</text>
  <text x="50" y="298" font-size="9" fill="#a85560">跨线程移动/共享</text>
  <g font-size="14" text-anchor="middle">
    <text x="358" y="277" fill="#c7a24a">○</text>
    <text x="458" y="277" fill="#2f6f4f">●</text>
    <text x="558" y="277" fill="#cfcfd6"></text>
    <text x="658" y="277" fill="#cfcfd6"></text>
    <text x="758" y="277" fill="#cfcfd6"></text>
    <text x="858" y="277" fill="#2f6f4f">●</text>
    <text x="958" y="277" fill="#c7a24a">○</text>
  </g>
  <line x1="30" y1="326" x2="1050" y2="326" stroke="#eff0f3" stroke-width="1"/>

  <!-- row 3: 用智能指针 -->
  <rect x="34" y="338" width="256" height="88" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="50" y="370" font-size="12" font-weight="600" fill="#3d2a5a">用智能指针</text>
  <text x="50" y="390" font-size="9" fill="#8a6db3">Box / Rc / Arc / RefCell</text>
  <text x="50" y="408" font-size="9" fill="#8a6db3">共享所有权 / 内部可变</text>
  <g font-size="14" text-anchor="middle">
    <text x="358" y="387" fill="#cfcfd6"></text>
    <text x="458" y="387" fill="#c7a24a">○</text>
    <text x="558" y="387" fill="#cfcfd6"></text>
    <text x="658" y="387" fill="#cfcfd6"></text>
    <text x="758" y="387" fill="#2f6f4f">●</text>
    <text x="858" y="387" fill="#cfcfd6"></text>
    <text x="958" y="387" fill="#2f6f4f">●</text>
  </g>

  <!-- legend -->
  <text x="30" y="470" font-size="9.5" fill="#6e6e73"><tspan font-weight="600" fill="#2f6f4f">●</tspan> 直接依赖　<tspan font-weight="600" fill="#c7a24a">○</tspan> 间接依赖　·  基本无关　　写代码依赖编译管线（全流程）+ 借用检查（安全）+ 类型推断 + 特质单态化（泛型）</text>
  <text x="30" y="488" font-size="9" fill="#a1a1a6">用并发依赖 Send/Sync（编译保）；用智能指针依赖内存 Drop（RAII 回收）+ 内部可变（UnsafeCell）。</text>
</svg>
