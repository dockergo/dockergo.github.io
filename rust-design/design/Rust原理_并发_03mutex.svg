<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="530" viewBox="0 0 1080 530" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="530" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Rust Arc&lt;Mutex&lt;T&gt;&gt; · 跨线程共享可变的正道</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">编译期借用规则(&amp;mut 唯一)单线程够用;跨线程要 Arc(共享所有权,原子计数) + Mutex(运行时互斥,把"可变唯一"用锁保证)</text>

  <!-- Arc card (green = 跨线程共享) -->
  <rect x="40" y="78" width="500" height="182" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="62" y="106" font-size="12.5" font-weight="600" fill="#12402a">Arc&lt;T&gt; · 原子引用计数,跨线程共享所有权</text>
  <text x="62" y="126" font-size="9.5" fill="#2f6f4f">library/alloc/src/sync.rs:269</text>
  <rect x="62" y="140" width="456" height="46" rx="8" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="290" y="160" font-size="9.5" font-weight="600" text-anchor="middle" fill="#12402a">unsafe impl Send/Sync for Arc where T: Sync+Send（:279）</text>
  <text x="290" y="176" font-size="9" text-anchor="middle" fill="#2f6f4f">原子计数（区别 Rc 的非原子 Cell）</text>
  <text x="62" y="208" font-size="10" fill="#12402a">· 多线程共享同一份数据的所有权</text>
  <text x="62" y="228" font-size="10" fill="#12402a">· 计数原子操作,增减线程安全</text>
  <text x="62" y="250" font-size="9" fill="#a1a1a6">负责"跨线程共享",不负责"可变"</text>

  <!-- Mutex card (red = 并发告警/锁) -->
  <rect x="560" y="78" width="480" height="182" rx="14" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="582" y="106" font-size="12.5" font-weight="600" fill="#4a1414">Mutex&lt;T&gt; · 运行时互斥锁</text>
  <text x="582" y="126" font-size="9.5" fill="#7a2a2a">library/std/src/sync/poison/mutex.rs:227</text>
  <rect x="582" y="140" width="436" height="46" rx="8" fill="#ffffff" stroke="#e7c3c3"/>
  <text x="800" y="160" font-size="9.5" font-weight="600" text-anchor="middle" fill="#4a1414">unsafe impl&lt;T: Send&gt; Sync for Mutex&lt;T&gt;（:257）</text>
  <text x="800" y="176" font-size="9" text-anchor="middle" fill="#7a2a2a">Sync 只需 T: Send</text>
  <text x="582" y="208" font-size="10" fill="#4a1414">· 锁序列化访问:同一时刻一个线程持锁</text>
  <text x="582" y="228" font-size="10" fill="#4a1414">· 把"可变唯一"从编译期借用扩到运行时锁</text>
  <text x="582" y="250" font-size="9" fill="#7a2a2a">Sync 只需 T:Send —— 因锁序列化,不需 T 本身可共享</text>

  <!-- 组合 (blue) -->
  <rect x="40" y="278" width="1000" height="130" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="62" y="304" font-size="12" font-weight="600" fill="#1b2a4a">组合 Arc&lt;Mutex&lt;T&gt;&gt; · 共享 + 可变都安全</text>
  <g text-anchor="middle">
    <rect x="62" y="320" width="290" height="66" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
    <text x="207" y="346" font-size="10" font-weight="600" fill="#12402a">Arc 让多线程共享</text>
    <text x="207" y="366" font-size="9" fill="#2f6f4f">原子计数,共享所有权</text>
    <rect x="412" y="320" width="290" height="66" rx="8" fill="#fbeaea" stroke="#e7c3c3"/>
    <text x="557" y="346" font-size="10" font-weight="600" fill="#4a1414">Mutex 让共享的可变安全</text>
    <text x="557" y="366" font-size="9" fill="#7a2a2a">锁保证互斥,可变唯一</text>
    <rect x="762" y="320" width="256" height="66" rx="8" fill="#ffffff" stroke="#bcd0ec"/>
    <text x="890" y="346" font-size="10" font-weight="600" fill="#1b2a4a">Send/Sync 保证类型安全</text>
    <text x="890" y="366" font-size="9" fill="#5b7db1">整套组合可跨线程</text>
  </g>
  <path d="M352,353 L412,353" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M702,353 L762,353" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <text x="30" y="438" font-size="9.5" fill="#a1a1a6">为什么这组合:跨线程要 Arc(共享所有权,原子计数) + Mutex(运行时互斥,把"可变唯一"用锁保证)—— Send/Sync 保证类型安全可跨线程</text>
  <text x="30" y="462" font-size="9" fill="#a1a1a6">读多写少可用 RwLock · 死锁需固定锁序,编译期不查 · 源码基准 Rust 1.99.0</text>
</svg>
