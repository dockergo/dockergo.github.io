<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="510" viewBox="0 0 1080 510" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="510" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Rust 借用检查在 MIR —— 不在 HIR/源码,控制流图便于数据流分析</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">借用检查是 MIR 阶段的一个 query;源码/HIR 是树难做流敏感分析,MIR 是 CFG 自然适配</text>

  <!-- flow: MIR promoted → MIR typeck → mir_borrowck -->
  <!-- 1 mir_promoted (blue) -->
  <rect x="40" y="92" width="290" height="150" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="62" y="118" font-size="12.5" font-weight="600" fill="#1b2a4a">① MIR (mir_promoted)</text>
  <text x="62" y="140" font-size="9.5" fill="#5b7db1">mir_borrowck 拉 tcx.mir_promoted(def)</text>
  <text x="62" y="156" font-size="9" fill="#5b7db1">rustc_borrowck/src/lib.rs:125</text>
  <text x="62" y="180" font-size="10" fill="#1b2a4a">控制流图:基本块 + 语句</text>
  <text x="62" y="200" font-size="10" fill="#1b2a4a">borrow / move / drop 都显式</text>
  <text x="62" y="224" font-size="9" fill="#a1a1a6">被检查的 MIR 由 rustc_mir_build 产</text>

  <!-- 2 MIR typeck (green) -->
  <rect x="395" y="92" width="290" height="150" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="417" y="118" font-size="12.5" font-weight="600" fill="#12402a">② MIR typeck · 先跑</text>
  <text x="417" y="140" font-size="9.5" fill="#2f6f4f">type_check/mod.rs</text>
  <text x="417" y="164" font-size="10" fill="#12402a">类型检查 MIR</text>
  <text x="417" y="184" font-size="10" fill="#12402a">产出区域约束 (region)</text>
  <rect x="417" y="198" width="246" height="34" rx="8" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="540" y="219" font-size="9.5" text-anchor="middle" fill="#12402a">区域约束 → 喂给借用检查</text>

  <!-- 3 mir_borrowck (green, emphasized) -->
  <rect x="750" y="92" width="290" height="150" rx="14" fill="#eafaf1" stroke="#7fc39c" stroke-width="2" filter="url(#soft)"/>
  <text x="772" y="118" font-size="12.5" font-weight="600" fill="#12402a">③ mir_borrowck · 借用检查 ★</text>
  <text x="772" y="140" font-size="9.5" fill="#2f6f4f">query · rustc_borrowck/src/lib.rs:115</text>
  <text x="772" y="164" font-size="10" fill="#12402a">在 MIR 上验证所有权规则</text>
  <text x="772" y="184" font-size="10" fill="#12402a">哪个借用在哪活着 (数据流)</text>
  <rect x="772" y="198" width="246" height="34" rx="8" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="895" y="219" font-size="9.5" text-anchor="middle" fill="#12402a">过不了 → 编译错误 (运行时零开销)</text>

  <path d="M330,167 L395,167" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M685,167 L750,167" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- crate header / pipeline anchor (white) -->
  <rect x="40" y="266" width="480" height="118" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="62" y="292" font-size="12" font-weight="600" fill="#1d1d1f">crate 头 &amp; 管线锚点</text>
  <text x="62" y="316" font-size="9.5" fill="#6e6e73">//! This crate implements MIR typeck and MIR borrowck</text>
  <text x="62" y="332" font-size="9" fill="#a1a1a6">rustc_borrowck/src/lib.rs:1</text>
  <text x="62" y="356" font-size="10" fill="#1d1d1f">管线 "MIR_borrow_checking" 阶段调 mir_borrowck(def_id)</text>
  <text x="62" y="374" font-size="9" fill="#a1a1a6">rustc_interface passes.rs:1154</text>

  <!-- why MIR (green) -->
  <rect x="540" y="266" width="500" height="118" rx="14" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="562" y="292" font-size="12" font-weight="600" fill="#2c5a3a">为什么在 MIR(不在源码/HIR)</text>
  <text x="562" y="316" font-size="10" fill="#2c5a3a">源码 / HIR 是树 —— 难做流敏感分析</text>
  <text x="562" y="338" font-size="10" fill="#2c5a3a">MIR 是控制流图(基本块 + 语句),borrow/move/drop 显式</text>
  <text x="562" y="360" font-size="10" fill="#2c5a3a">数据流分析(哪个借用在哪活着)在 CFG 上自然</text>
  <text x="562" y="378" font-size="9" fill="#a1a1a6">流敏感:随控制流精确判断借用存活</text>

  <text x="30" y="418" font-size="9.5" fill="#a1a1a6">误区:借用检查在源码/HIR —— 在 MIR(控制流图),便于流敏感数据流分析</text>
  <text x="30" y="442" font-size="9.5" fill="#a1a1a6">误区:借用检查是运行时 —— 全编译期(MIR 上区域推断证明),过不了不编译,运行时零开销</text>
  <text x="30" y="466" font-size="9" fill="#a1a1a6">MIR typeck 先产区域约束 → 喂借用检查;NLL / 区域推断见 02NLL · 源码基准 Rust 1.99.0</text>
</svg>
