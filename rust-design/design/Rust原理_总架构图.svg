<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="648" viewBox="0 0 1080 648" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="aBuild" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f6fd6"/></marker>
    <marker id="aCheck" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#1aa89a"/></marker>
    <marker id="aOpt" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8a5cae"/></marker>
    <marker id="aFail" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#e0742a"/></marker>
  </defs>
  <rect width="1080" height="648" fill="#fbfbfd"/>

  <!-- ===== 标题带 ===== -->
  <text x="24" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Rust 总架构 · 多视角透视：内存安全全部搬到编译期证明，运行期几乎零机制</text>
  <text x="24" y="47" font-size="10.5" fill="#6e6e73">分层脊：接触面（三规则）→ 编译期（管线 + 借用检查横切 MIR）→ 运行期（无 GC，仅剩析构与 panic）　源码基准 rustc 1.99</text>

  <!-- ===== 图例：四型语义路径 ===== -->
  <line x1="34" y1="66" x2="64" y2="66" stroke="#2f6fd6" stroke-width="1.8" marker-end="url(#aBuild)"/>
  <text x="70" y="70" font-size="10.5" fill="#3a3a3c">编译流水 Build（AST→…→codegen）</text>
  <line x1="330" y1="66" x2="360" y2="66" stroke="#1aa89a" stroke-width="1.8" marker-end="url(#aCheck)"/>
  <text x="366" y="70" font-size="10.5" fill="#3a3a3c">借用/类型检查（横切 MIR）</text>
  <line x1="588" y1="66" x2="618" y2="66" stroke="#8a5cae" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aOpt)"/>
  <text x="624" y="70" font-size="10.5" fill="#3a3a3c">单态化 / 优化 Opt</text>
  <line x1="770" y1="66" x2="800" y2="66" stroke="#e0742a" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aFail)"/>
  <text x="806" y="70" font-size="10.5" fill="#3a3a3c">运行期 panic（错误路径）</text>
  <text x="1056" y="70" font-size="10" fill="#a1a1a6" text-anchor="end">框 = 主线可下钻</text>

  <!-- ===== 接触面：语法与所有权 ===== -->
  <rect x="24" y="80" width="1032" height="46" rx="12" fill="#f2f4f8" stroke="#d4dae6" filter="url(#soft)" data-tid="Rust原理_接触面_语法与所有权" data-lab="语法与所有权"/>
  <text x="40" y="100" font-size="12" font-weight="600" fill="#2a3550">接触面 · 所有权三规则（开发者心智模型，编译器强制）</text>
  <text x="40" y="118" font-size="9.5" fill="#6e6e73">所有权：每值一主 + move　·　借用：&amp;T 多读 / &amp;mut T 唯一写　·　生命周期：防悬垂引用</text>

  <!-- ===== COMPILE-TIME 大层 ===== -->
  <rect x="24" y="138" width="1032" height="340" rx="14" fill="#eef3fb" stroke="#c9d8ef" filter="url(#soft)"/>
  <text x="40" y="160" font-size="12" font-weight="600" fill="#1b5fb0">COMPILE-TIME · 编译期（所有安全检查在此完成，过不了借用检查就不编译）</text>

  <!-- 编译管线 -->
  <rect x="40" y="172" width="1000" height="80" rx="10" fill="#ffffff" stroke="#c9d8ef" data-tid="Rust原理_支撑_编译管线" data-lab="编译管线"/>
  <text x="56" y="191" font-size="11" font-weight="600" fill="#1b2a4a">编译管线 rustc · query 系统按需求值 + 增量编译</text>
  <g text-anchor="middle" font-size="9">
    <rect x="48" y="202" width="150" height="42" rx="8" fill="#f5f7fb" stroke="#d4dae6"/><text x="123" y="221" fill="#1d1d1f" font-weight="600">源码 → lex/parse</text><text x="123" y="236" fill="#a1a1a6" font-size="8.5">→ AST</text>
    <rect x="213" y="202" width="150" height="42" rx="8" fill="#eafaf1" stroke="#bce6cd" data-tid="Rust原理_支撑_类型推断" data-lab="类型推断"/><text x="288" y="221" fill="#0f6b5e" font-weight="600">HIR → THIR</text><text x="288" y="236" fill="#1aa89a" font-size="8.5">类型推断 / 合一</text>
    <rect x="378" y="202" width="150" height="42" rx="8" fill="#e3edfb" stroke="#a9ccf5"/><text x="453" y="221" fill="#0a3d78" font-weight="700">THIR → MIR</text><text x="453" y="236" fill="#2a5a92" font-size="8.5">中层 IR · 中心舞台</text>
    <rect x="543" y="202" width="150" height="42" rx="8" fill="#eafaf1" stroke="#bce6cd" data-tid="Rust原理_支撑_借用检查器" data-lab="借用检查"/><text x="618" y="221" fill="#0f6b5e" font-weight="700">借用检查</text><text x="618" y="236" fill="#1aa89a" font-size="8.5">在 MIR 上</text>
    <rect x="708" y="202" width="150" height="42" rx="8" fill="#f6f0fb" stroke="#dcc6ee" data-tid="Rust原理_支撑_特质与单态化" data-lab="特质与单态化"/><text x="783" y="221" fill="#5a2a82" font-weight="600">单态化 + 优化</text><text x="783" y="236" fill="#8a5cae" font-size="8.5">泛型 → 具体 · 内联</text>
    <rect x="873" y="202" width="157" height="42" rx="8" fill="#f5f7fb" stroke="#d4dae6"/><text x="951" y="221" fill="#1d1d1f" font-weight="600">codegen → LLVM</text><text x="951" y="236" fill="#a1a1a6" font-size="8.5">→ 机器码</text>
  </g>

  <!-- 借用检查器 横切 strip -->
  <rect x="40" y="262" width="1000" height="34" rx="9" fill="#e0f5ef" stroke="#a5ddca" data-tid="Rust原理_支撑_借用检查器" data-lab="借用检查器"/>
  <rect x="40" y="262" width="4" height="34" rx="2" fill="#1aa89a"/>
  <text x="60" y="283" font-size="10" font-weight="600" fill="#0f6b5e">借用检查器 = 灵魂（横切 MIR）：验所有权 / 借用 / 生命周期 · NLL 非词法 + Polonius 区域推断</text>

  <!-- 三个能力域 box -->
  <g font-size="9">
    <rect x="40" y="306" width="325" height="82" rx="10" fill="#ffffff" stroke="#bce6cd" filter="url(#soft)" data-tid="Rust原理_支撑_内存与Drop" data-lab="内存与 Drop"/>
    <rect x="40" y="306" width="4" height="82" rx="2" fill="#1aa89a"/>
    <text x="60" y="328" font-size="10.5" font-weight="600" fill="#0f6b5e">内存与 Drop · 无 GC</text>
    <text x="60" y="348" fill="#6e6e73">RAII：出作用域自动析构</text>
    <text x="60" y="366" fill="#6e6e73">move 语义，编译器插 Drop glue</text>

    <rect x="377" y="306" width="325" height="82" rx="10" fill="#ffffff" stroke="#bce6cd" filter="url(#soft)" data-tid="Rust原理_支撑_并发SendSync" data-lab="并发 Send/Sync"/>
    <rect x="377" y="306" width="4" height="82" rx="2" fill="#1aa89a"/>
    <text x="397" y="328" font-size="10.5" font-weight="600" fill="#0f6b5e">并发 Send / Sync</text>
    <text x="397" y="348" fill="#6e6e73">marker trait 编译期保无数据竞争</text>
    <text x="397" y="366" fill="#6e6e73">跨线程共享走 Arc / Mutex</text>

    <rect x="714" y="306" width="326" height="82" rx="10" fill="#ffffff" stroke="#d4dae6" filter="url(#soft)" data-tid="Rust原理_支撑_智能指针与内部可变" data-lab="智能指针与内部可变"/>
    <text x="734" y="328" font-size="10.5" font-weight="600" fill="#1d1d1f">智能指针与内部可变</text>
    <text x="734" y="348" fill="#6e6e73">Box / Rc / Arc + Cell / RefCell</text>
    <text x="734" y="366" fill="#6e6e73">所有权太死时的受控逃生舱</text>
  </g>

  <!-- 三条贯穿声明 condensed -->
  <rect x="40" y="400" width="1000" height="62" rx="10" fill="#f5f7fb" stroke="#d4dae6"/>
  <text x="56" y="420" font-size="10" font-weight="600" fill="#1b2a4a">三条贯穿声明</text>
  <text x="56" y="438" font-size="9" fill="#6e6e73">① 所有权 + 编译期检查 = 无 GC 内存安全，运行时零开销　② 借用检查在 MIR 上（灵魂）</text>
  <text x="56" y="454" font-size="9" fill="#6e6e73">③ 零成本抽象：泛型 / trait 单态化成具体代码，迭代器链 = 手写循环</text>

  <!-- ===== RUNTIME 薄层 ===== -->
  <rect x="24" y="490" width="1032" height="110" rx="14" fill="#fdf4ee" stroke="#f0d3bd" filter="url(#soft)"/>
  <text x="40" y="512" font-size="12" font-weight="600" fill="#a8541e">RUNTIME · 运行期（library/ · 几乎零机制）</text>
  <text x="40" y="530" font-size="9.5" fill="#94571f">无 GC · 无运行时类型 · 无虚表（除非 dyn）—— 安全已在编译期证明，仅剩 Drop 析构 / Arc 计数 / panic</text>
  <rect x="40" y="540" width="1000" height="52" rx="10" fill="#ffffff" stroke="#f0d3bd" data-tid="Rust原理_支撑_panic与展开" data-lab="panic 与展开"/>
  <rect x="40" y="540" width="4" height="52" rx="2" fill="#e0742a"/>
  <text x="60" y="562" font-size="10.5" font-weight="600" fill="#a8541e">panic 与展开 · 不可恢复错误路径（区别可恢复的 Result）</text>
  <text x="60" y="581" font-size="9" fill="#94571f">unwind：逐层析构栈值可 catch_unwind　·　abort：直接终止不析构（快 / 小）</text>

  <!-- ===== 语义分型连线 ===== -->
  <!-- Build：接触面 → 编译管线 -->
  <line x1="123" y1="126" x2="123" y2="172" stroke="#2f6fd6" stroke-width="1.8" marker-end="url(#aBuild)"/>
  <!-- Build：管线内横向 -->
  <g stroke="#2f6fd6" stroke-width="1.6">
    <line x1="198" y1="223" x2="211" y2="223" marker-end="url(#aBuild)"/>
    <line x1="363" y1="223" x2="376" y2="223" marker-end="url(#aBuild)"/>
    <line x1="528" y1="223" x2="541" y2="223" marker-end="url(#aCheck)"/>
    <line x1="693" y1="223" x2="706" y2="223" stroke="#8a5cae" marker-end="url(#aOpt)"/>
    <line x1="858" y1="223" x2="871" y2="223" stroke="#8a5cae" marker-end="url(#aOpt)"/>
  </g>
  <!-- Check：借用横切 strip 向上作用于 MIR / 借用检查 chip -->
  <line x1="453" y1="262" x2="453" y2="246" stroke="#1aa89a" stroke-width="1.6" marker-end="url(#aCheck)"/>
  <line x1="618" y1="262" x2="618" y2="246" stroke="#1aa89a" stroke-width="1.6" marker-end="url(#aCheck)"/>
  <!-- Fail：运行期 → panic -->
  <line x1="540" y1="530" x2="540" y2="540" stroke="#e0742a" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#aFail)"/>

  <!-- ===== 读法 ===== -->
  <rect x="24" y="612" width="1032" height="30" rx="8" fill="#f7f7f9" stroke="#ececef"/>
  <text x="540" y="631" font-size="10" fill="#4a4a4f" text-anchor="middle">读法：代码守三规则 → 编译管线把源码降到 MIR，借用检查器横切 MIR 证明安全 → 单态化 / 优化 / codegen 出机器码，运行期只剩析构与 panic</text>

  <!-- 标题带热区（全景可下钻） -->
  <rect x="0" y="0" width="1080" height="56" fill="none" stroke="none" data-tid="Rust原理_全景主线框架" data-lab="全景主线框架"/>
</svg>
