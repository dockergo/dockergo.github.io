<svg xmlns="http://www.w3.org/2000/svg" width="920" height="540" viewBox="0 0 920 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="920" height="540" fill="#fbfbfd"/>
  <text x="30" y="34" font-size="15" font-weight="600" fill="#1d1d1f">可靠性与脑裂防护：Leader Lease + quorum 退位 + PreVote + 单调任期</text>

  <!-- Leader Lease -->
  <rect x="30" y="60" width="430" height="250" rx="13" fill="#fbf1f0" stroke="#f2cfca" filter="url(#soft)"/>
  <text x="46" y="84" font-size="12.5" font-weight="600" fill="#8a2b1f">Leader Lease 自检退位（raft.go:1037）</text>
  <text x="46" y="104" font-size="10.5" fill="#c4675a">leaderLoop 每 LeaderLeaseTimeout(500ms) 检查：</text>
  <g font-size="10.5" fill="#2b3a5a">
    <rect x="46" y="116" width="398" height="30" rx="7" fill="#ffffff" stroke="#f2cfca"/>
    <text x="56" y="135">① 遍历 Voter，看每个 follower 的 LastContact</text>
    <rect x="46" y="152" width="398" height="30" rx="7" fill="#ffffff" stroke="#f2cfca"/>
    <text x="56" y="171">② diff ≤ leaseTimeout → contacted++</text>
    <rect x="46" y="188" width="398" height="30" rx="7" fill="#ffffff" stroke="#f2cfca"/>
    <text x="56" y="207">③ contacted &lt; quorum(voters/2+1)？</text>
    <rect x="46" y="224" width="398" height="30" rx="7" fill="#fbf7ef" stroke="#efe2c8"/>
    <text x="56" y="243" fill="#8a2b1f">④ 是 → <tspan font-weight="600">setState(Follower) 主动退位</tspan></text>
  </g>
  <text x="46" y="276" font-size="10" fill="#a1885a">被分区到少数派的旧 Leader 联系不到多数派 →</text>
  <text x="46" y="292" font-size="10" fill="#a1885a">主动退位，不会以为自己还是 Leader 而乱应答。</text>

  <!-- 脑裂防护原理 -->
  <rect x="490" y="60" width="400" height="250" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="506" y="84" font-size="12.5" font-weight="600" fill="#1b2a4a">为什么不会脑裂</text>
  <g font-size="10.5" fill="#2b3a5a">
    <text x="506" y="110">· 选举需 <tspan font-weight="600">多数派授权</tspan>——两个 Leader 各需</text>
    <text x="518" y="127">多数派，而两个多数派必有交集 → 不可能</text>
    <text x="518" y="144">同任期存在两个 Leader</text>
    <text x="506" y="168">· 提交需 <tspan font-weight="600">多数派复制</tspan>——少数派侧的旧</text>
    <text x="518" y="185">Leader 永远凑不齐 quorum，写不进任何数据</text>
    <text x="506" y="209">· <tspan font-weight="600">单调任期</tspan>——新 Leader 任期更高，旧</text>
    <text x="518" y="226">Leader 一收到高 term 消息立即退位</text>
    <text x="506" y="250">· <tspan font-weight="600">Lease</tspan>——旧 Leader 主动退位，不必等被</text>
    <text x="518" y="267">发现，缩短“假 Leader”窗口</text>
  </g>
  <rect x="506" y="278" width="368" height="24" rx="6" fill="#f5faf6" stroke="#c9e6cf"/>
  <text x="516" y="294" font-size="10" fill="#1f5130">结论：分区时最多一侧能工作（含多数派的一侧），CP 系统</text>

  <!-- VerifyLeader + LeadershipTransfer -->
  <rect x="30" y="330" width="860" height="180" rx="13" fill="#f5faf6" stroke="#c9e6cf" filter="url(#soft)"/>
  <text x="46" y="354" font-size="12.5" font-weight="600" fill="#1f5130">配套机制</text>
  <g font-size="10.5">
    <rect x="46" y="368" width="270" height="80" rx="9" fill="#ffffff" stroke="#c9e6cf"/>
    <text x="181" y="390" text-anchor="middle" font-weight="600" fill="#1f5130">VerifyLeader（api.go:931）</text>
    <text x="181" y="410" text-anchor="middle" font-size="10" fill="#4f9d69">线性读前哨：向多数派确认</text>
    <text x="181" y="426" text-anchor="middle" font-size="10" fill="#4f9d69">自己仍是 Leader，再返回读</text>
    <text x="181" y="442" text-anchor="middle" font-size="10" fill="#86868b">避免读到旧 Leader 的过期数据</text>

    <rect x="326" y="368" width="270" height="80" rx="9" fill="#ffffff" stroke="#c9e6cf"/>
    <text x="461" y="390" text-anchor="middle" font-weight="600" fill="#1f5130">PreVote（默认开）</text>
    <text x="461" y="410" text-anchor="middle" font-size="10" fill="#4f9d69">隔离节点不真正自增 term</text>
    <text x="461" y="426" text-anchor="middle" font-size="10" fill="#4f9d69">恢复时不强迫现任 Leader 退位</text>
    <text x="461" y="442" text-anchor="middle" font-size="10" fill="#86868b">防 term 膨胀扰动</text>

    <rect x="606" y="368" width="270" height="80" rx="9" fill="#fbf7ef" stroke="#efe2c8"/>
    <text x="741" y="390" text-anchor="middle" font-weight="600" fill="#8a6d1f">LeadershipTransfer</text>
    <text x="741" y="410" text-anchor="middle" font-size="10" fill="#a1885a">主动转移领导权（api.go:1309）</text>
    <text x="741" y="426" text-anchor="middle" font-size="10" fill="#a1885a">发 TimeoutNow 让目标立即选举</text>
    <text x="741" y="442" text-anchor="middle" font-size="10" fill="#86868b">优雅维护，避免超时空窗</text>
  </g>
  <text x="46" y="478" font-size="10.5" fill="#6e6e73">脑裂防护的三重保险：多数派选举 + 多数派提交 + 单调任期；Lease 只是加速旧 Leader 主动退位。</text>
  <text x="46" y="498" font-size="10.5" fill="#6e6e73">quorumSize = voters/2+1（raft.go:1087），只数 Voter；Nonvoter 不影响可用性判定。</text>
</svg>
