<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="920" height="520" fill="#fbfbfd"/>
  <text x="30" y="34" font-size="15" font-weight="600" fill="#1d1d1f">持久状态：StableStore 元数据 + LogStore 日志（先落盘再改内存）</text>

  <!-- StableStore -->
  <rect x="30" y="60" width="410" height="220" rx="13" fill="#f5faf6" stroke="#c9e6cf" filter="url(#soft)"/>
  <text x="46" y="84" font-size="12.5" font-weight="600" fill="#1f5130">StableStore（stable.go:8）· 单调元数据</text>
  <text x="46" y="104" font-size="10.5" fill="#4f9d69">Set/Get([]byte) + SetUint64/GetUint64</text>
  <g font-size="10.5">
    <rect x="46" y="116" width="378" height="34" rx="7" fill="#ffffff" stroke="#c9e6cf"/>
    <text x="56" y="138" fill="#1f5130"><tspan font-weight="600">CurrentTerm</tspan> — 当前任期（raft.go:28）</text>
    <rect x="46" y="156" width="378" height="34" rx="7" fill="#ffffff" stroke="#c9e6cf"/>
    <text x="56" y="178" fill="#1f5130"><tspan font-weight="600">LastVoteTerm</tspan> — 上次投票的任期（:29）</text>
    <rect x="46" y="196" width="378" height="34" rx="7" fill="#ffffff" stroke="#c9e6cf"/>
    <text x="56" y="218" fill="#1f5130"><tspan font-weight="600">LastVoteCand</tspan> — 上次投票给谁（:30）</text>
  </g>
  <text x="46" y="252" font-size="10" fill="#86868b">这三项 = Raft 论文的“持久状态”，保证宕机重启不违反</text>
  <text x="46" y="270" font-size="10" fill="#86868b">“一任期一票”与“任期单调不回退”。</text>

  <!-- LogStore -->
  <rect x="470" y="60" width="420" height="220" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="486" y="84" font-size="12.5" font-weight="600" fill="#1b2a4a">LogStore（log.go:112）· 日志条目</text>
  <g font-size="10.5" fill="#2b3a5a">
    <text x="486" y="108">· FirstIndex / LastIndex</text>
    <text x="486" y="130">· GetLog(index, *Log)</text>
    <text x="486" y="152">· StoreLog / StoreLogs（批量）</text>
    <text x="486" y="174">· DeleteRange(min, max) — 压缩/删冲突</text>
  </g>
  <rect x="486" y="188" width="388" height="76" rx="9" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="496" y="208" font-size="10.5" font-weight="600" fill="#1b2a4a">Log 结构（log.go:68）</text>
  <text x="496" y="226" font-size="10" fill="#5b7db1">Index · Term · Type(LogCommand/LogConfiguration/</text>
  <text x="496" y="242" font-size="10" fill="#5b7db1">LogBarrier/LogNoop) · Data · Extensions</text>
  <text x="496" y="258" font-size="10" fill="#86868b">MonotonicLogStore：可选，声明不容忍空洞</text>

  <!-- 先落盘再改内存 -->
  <rect x="30" y="300" width="860" height="200" rx="13" fill="#fbf1f0" stroke="#f2cfca" filter="url(#soft)"/>
  <text x="46" y="324" font-size="12.5" font-weight="600" fill="#8a2b1f">铁律：先落盘，再改内存（raft.go setCurrentTerm / persistVote）</text>
  <g font-size="10.5" fill="#2b3a5a">
    <rect x="46" y="340" width="250" height="70" rx="8" fill="#ffffff" stroke="#f2cfca"/>
    <text x="171" y="366" text-anchor="middle" font-weight="600" fill="#8a2b1f">setCurrentTerm(t)</text>
    <text x="171" y="386" text-anchor="middle" fill="#c4675a">① stable.SetUint64 落盘</text>
    <text x="171" y="402" text-anchor="middle" fill="#c4675a">失败 → panic</text>

    <rect x="326" y="340" width="250" height="70" rx="8" fill="#ffffff" stroke="#f2cfca"/>
    <text x="451" y="366" text-anchor="middle" font-weight="600" fill="#8a2b1f">② raftState.setCurrentTerm</text>
    <text x="451" y="386" text-anchor="middle" fill="#c4675a">再更新内存原子变量</text>
    <text x="451" y="402" text-anchor="middle" fill="#c4675a">顺序不可颠倒</text>

    <rect x="606" y="340" width="270" height="70" rx="8" fill="#f5faf6" stroke="#c9e6cf"/>
    <text x="741" y="366" text-anchor="middle" font-weight="600" fill="#1f5130">persistVote(term, cand)</text>
    <text x="741" y="386" text-anchor="middle" fill="#4f9d69">投票前先写 LastVoteTerm/Cand</text>
    <text x="741" y="402" text-anchor="middle" fill="#4f9d69">保证重启不重复投票</text>
  </g>
  <path d="M296,375 L324,375" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <text x="46" y="440" font-size="10.5" fill="#86868b">若先改内存后落盘失败：内存说“term=5 已投票”，磁盘还停在旧值——重启回退，可能一任期投两票 → 破坏安全性。</text>
  <text x="46" y="464" font-size="10.5" fill="#86868b">日志同理：StoreLogs 落盘成功才算“已持有”，matchIndex 才推进——持久化是共识安全的物理基础。</text>
  <text x="46" y="486" font-size="10.5" fill="#86868b">生产实现：raft-boltdb 同时充当 LogStore + StableStore；测试用 InmemStore。</text>
</svg>
