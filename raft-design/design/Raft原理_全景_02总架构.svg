<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="740" viewBox="0 0 1040 740" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1040" height="740" fill="#fbfbfd"/>
  <rect x="0" y="0" width="1040" height="48" fill="none" stroke="none" data-tid="Raft原理_全景主线框架" data-lab="全景"/>
  <text x="40" y="34" font-size="15" font-weight="600" fill="#1d1d1f">HashiCorp raft 总架构 · 可嵌入的共识算法库（库形态 · 接口由宿主注入）</text>

  <!-- 宿主进程层 -->
  <rect x="40" y="52" width="960" height="46" rx="12" fill="#fbf7ef" stroke="#efe2c8" filter="url(#soft)" data-tid="Raft原理_接口_编程API与接口注入" data-lab="宿主注入六件套"/>
  <text x="60" y="72" font-size="12.5" font-weight="600" fill="#8a6d1f">宿主进程（Consul / Nomad / Vault …）</text>
  <text x="60" y="89" font-size="11" fill="#a1885a">链接进本库 · 实现 FSM 业务状态机 + 提供 LogStore / StableStore / SnapshotStore / Transport 存储与 IO</text>

  <!-- 编程 API band -->
  <rect x="40" y="122" width="960" height="70" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="52" y="140" font-size="12.5" font-weight="600" fill="#1b2a4a">编程 API（宿主调用 · api.go）</text>
  <g font-size="11" fill="#2b3a5a">
    <rect x="52" y="148" width="172" height="36" rx="8" fill="#ffffff" stroke="#cfe0f2" data-tid="Raft原理_接口_编程API与接口注入" data-lab="NewRaft"/>
    <text x="138" y="170" text-anchor="middle"><tspan font-weight="600">NewRaft</tspan> 启动</text>
    <rect x="236" y="148" width="172" height="36" rx="8" fill="#ffffff" stroke="#cfe0f2" data-tid="Raft原理_接口_编程API与接口注入" data-lab="Apply/Barrier"/>
    <text x="322" y="170" text-anchor="middle"><tspan font-weight="600">Apply</tspan> / Barrier 写</text>
    <rect x="420" y="148" width="172" height="36" rx="8" fill="#ffffff" stroke="#cfe0f2" data-tid="Raft原理_支撑_成员变更" data-lab="AddVoter"/>
    <text x="506" y="170" text-anchor="middle"><tspan font-weight="600">AddVoter</tspan> / RemoveServer</text>
    <rect x="604" y="148" width="172" height="36" rx="8" fill="#ffffff" stroke="#cfe0f2" data-tid="Raft原理_支撑_快照与日志压缩" data-lab="手动 Snapshot"/>
    <text x="690" y="170" text-anchor="middle"><tspan font-weight="600">Snapshot</tspan> 手动快照</text>
    <rect x="788" y="148" width="200" height="36" rx="8" fill="#ffffff" stroke="#cfe0f2" data-tid="Raft原理_支撑_可靠性与脑裂防护" data-lab="LeadershipTransfer"/>
    <text x="888" y="170" text-anchor="middle"><tspan font-weight="600">LeadershipTransfer</tspan> / VerifyLeader</text>
  </g>

  <!-- Raft 核心容器 -->
  <rect x="40" y="212" width="960" height="308" rx="14" fill="#f7f7f9" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="52" y="232" font-size="12.5" font-weight="600" fill="#1d1d1f">Raft 核心（raft.go · 单线程 run 主循环驱动状态机与日志）</text>

  <!-- Row1 -->
  <rect x="60" y="248" width="280" height="106" rx="11" fill="#eef3fb" stroke="#bcd0ec" data-tid="Raft原理_支撑_Leader选举" data-lab="Leader 选举"/>
  <text x="200" y="272" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1b2a4a">Leader 选举</text>
  <text x="200" y="292" text-anchor="middle" font-size="10.5" fill="#5b7db1">term++ · RequestVote · PreVote</text>
  <text x="200" y="309" text-anchor="middle" font-size="10.5" fill="#5b7db1">随机超时 · 多数派授权</text>
  <text x="200" y="330" text-anchor="middle" font-size="10.5" fill="#86868b">electSelf / requestVote</text>

  <rect x="370" y="248" width="280" height="106" rx="11" fill="#f3f7fc" stroke="#cfe0f2" data-tid="Raft原理_支撑_日志复制" data-lab="日志复制"/>
  <text x="510" y="272" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1b2a4a">日志复制</text>
  <text x="510" y="292" text-anchor="middle" font-size="10.5" fill="#5b7db1">AppendEntries · nextIndex 回退</text>
  <text x="510" y="309" text-anchor="middle" font-size="10.5" fill="#5b7db1">pipeline · 一致性检查</text>
  <text x="510" y="330" text-anchor="middle" font-size="10.5" fill="#86868b">replication.go</text>

  <rect x="680" y="248" width="280" height="106" rx="11" fill="#f5faf6" stroke="#c9e6cf" data-tid="Raft原理_支撑_提交与应用" data-lab="提交与应用"/>
  <text x="820" y="272" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f5130">提交与应用</text>
  <text x="820" y="292" text-anchor="middle" font-size="10.5" fill="#4f9d69">多数派 match 中位数 → commit</text>
  <text x="820" y="309" text-anchor="middle" font-size="10.5" fill="#4f9d69">commitIndex → FSM.Apply</text>
  <text x="820" y="330" text-anchor="middle" font-size="10.5" fill="#86868b">commitment.go / runFSM</text>

  <!-- Row2 -->
  <rect x="60" y="372" width="280" height="106" rx="11" fill="#faf4fb" stroke="#e7cff0" data-tid="Raft原理_支撑_成员变更" data-lab="成员变更"/>
  <text x="200" y="396" text-anchor="middle" font-size="12.5" font-weight="600" fill="#5a2b6b">成员变更</text>
  <text x="200" y="416" text-anchor="middle" font-size="10.5" fill="#9a5cb0">单步 AddVoter/RemoveServer</text>
  <text x="200" y="433" text-anchor="middle" font-size="10.5" fill="#9a5cb0">一次一变更（非 joint）</text>
  <text x="200" y="454" text-anchor="middle" font-size="10.5" fill="#86868b">configuration.go</text>

  <rect x="370" y="372" width="280" height="106" rx="11" fill="#fbf1f0" stroke="#f2cfca" data-tid="Raft原理_支撑_可靠性与脑裂防护" data-lab="可靠性/脑裂防护"/>
  <text x="510" y="396" text-anchor="middle" font-size="12.5" font-weight="600" fill="#8a2b1f">可靠性与脑裂防护</text>
  <text x="510" y="416" text-anchor="middle" font-size="10.5" fill="#c4675a">Leader Lease · quorum 退位</text>
  <text x="510" y="433" text-anchor="middle" font-size="10.5" fill="#c4675a">PreVote · 单调任期</text>
  <text x="510" y="454" text-anchor="middle" font-size="10.5" fill="#86868b">checkLeaderLease</text>

  <rect x="680" y="372" width="280" height="106" rx="11" fill="#eef3fb" stroke="#bcd0ec" data-tid="Raft原理_支撑_Leader选举" data-lab="三状态机"/>
  <text x="820" y="396" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1b2a4a">三状态机 · 单线程</text>
  <text x="820" y="416" text-anchor="middle" font-size="10.5" fill="#5b7db1">Follower ⇄ Candidate ⇄ Leader</text>
  <text x="820" y="433" text-anchor="middle" font-size="10.5" fill="#5b7db1">run 串行处理事件</text>
  <text x="820" y="454" text-anchor="middle" font-size="10.5" fill="#86868b">state.go / raft.go</text>

  <!-- 注入接口层 -->
  <rect x="40" y="540" width="960" height="66" rx="13" fill="#f5faf6" stroke="#c9e6cf" filter="url(#soft)"/>
  <text x="52" y="558" font-size="12" font-weight="600" fill="#1f5130">注入接口层（由宿主实现 · 本库只依赖接口不碰真实 IO）</text>
  <g font-size="10.5">
    <rect x="52" y="566" width="172" height="32" rx="8" fill="#ffffff" stroke="#c9e6cf" data-tid="Raft原理_支撑_提交与应用" data-lab="FSM.Apply"/>
    <text x="138" y="586" text-anchor="middle" fill="#1f5130"><tspan font-weight="600">FSM</tspan> 业务状态机</text>
    <rect x="236" y="566" width="172" height="32" rx="8" fill="#ffffff" stroke="#c9e6cf" data-tid="Raft原理_支撑_持久状态" data-lab="LogStore"/>
    <text x="322" y="586" text-anchor="middle" fill="#1f5130"><tspan font-weight="600">LogStore</tspan> 日志</text>
    <rect x="420" y="566" width="172" height="32" rx="8" fill="#ffffff" stroke="#c9e6cf" data-tid="Raft原理_支撑_持久状态" data-lab="StableStore"/>
    <text x="506" y="586" text-anchor="middle" fill="#1f5130"><tspan font-weight="600">StableStore</tspan> 元数据</text>
    <rect x="604" y="566" width="172" height="32" rx="8" fill="#ffffff" stroke="#c9e6cf" data-tid="Raft原理_支撑_快照与日志压缩" data-lab="SnapshotStore"/>
    <text x="690" y="586" text-anchor="middle" fill="#1f5130"><tspan font-weight="600">SnapshotStore</tspan></text>
    <rect x="788" y="566" width="200" height="32" rx="8" fill="#ffffff" stroke="#c9e6cf" data-tid="Raft原理_支撑_Transport与RPC" data-lab="Transport"/>
    <text x="888" y="586" text-anchor="middle" fill="#1f5130"><tspan font-weight="600">Transport</tspan> 网络传输</text>
  </g>

  <!-- 底层 IO band -->
  <rect x="40" y="632" width="450" height="60" rx="12" fill="#fbf7ef" stroke="#efe2c8" filter="url(#soft)" data-tid="Raft原理_支撑_持久状态" data-lab="磁盘持久化"/>
  <text x="265" y="656" text-anchor="middle" font-size="12" font-weight="600" fill="#8a6d1f">磁盘持久化</text>
  <text x="265" y="676" text-anchor="middle" font-size="10.5" fill="#a1885a">日志 / CurrentTerm·LastVote 元数据 / 快照文件</text>

  <rect x="550" y="632" width="450" height="60" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)" data-tid="Raft原理_支撑_Transport与RPC" data-lab="网络 RPC"/>
  <text x="775" y="656" text-anchor="middle" font-size="12" font-weight="600" fill="#1b2a4a">网络 RPC（TCP / Inmem）</text>
  <text x="775" y="676" text-anchor="middle" font-size="10.5" fill="#5b7db1">AppendEntries · RequestVote · InstallSnapshot · TimeoutNow</text>

  <!-- ============ 模块间数据流 / 调用连线（顺出写入主线）============ -->
  <!-- 主数据面（实线灰）：写入路径 Apply→日志→commit→FSM -->
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <!-- Apply 命令进入日志复制（dispatchLogs 写本地日志并复制） -->
    <path d="M322,184 L322,240 L490,240 L490,248" marker-end="url(#ar)"/>
    <!-- 日志复制 → 提交与应用：matchIndex 中位数推进 commit -->
    <path d="M650,300 L680,300" marker-end="url(#ar)"/>
    <!-- 已提交条目下发状态机：提交与应用 → FSM（经右侧空隙与层间总线到 FSM 左侧） -->
    <path d="M690,354 L690,362 L665,362 L665,528 L44,528 L44,582 L52,582" marker-end="url(#ar)"/>
    <!-- 注入接口 → 底层 IO：日志/元数据落盘、RPC 收发 -->
    <path d="M322,598 L322,632" marker-end="url(#ar)"/>
    <path d="M888,598 L888,632" marker-end="url(#ar)"/>
  </g>
  <text x="330" y="206" font-size="8.5" fill="#86868b">Apply 命令编码为日志 · dispatchLogs</text>
  <text x="665" y="242" text-anchor="middle" font-size="8.5" fill="#86868b">matchIndex 中位数推进 commit</text>
  <text x="150" y="522" font-size="8.5" fill="#86868b">已提交条目 → runFSM 调 FSM.Apply</text>
  <text x="330" y="622" font-size="8.5" fill="#86868b">日志 / 元数据落盘</text>
  <text x="830" y="622" font-size="8.5" fill="#1b2a4a">RPC 收发</text>

  <!-- 选举 / 控制旁路（虚线蓝） -->
  <g stroke="#5b7db1" stroke-width="1.3" fill="none" stroke-dasharray="5 3">
    <!-- Leader 选举 → 日志复制：当选后启动复制 -->
    <path d="M340,300 L370,300" marker-end="url(#ar)"/>
    <!-- 三状态机 run 串行驱动提交推进 -->
    <path d="M820,372 L820,354" marker-end="url(#ar)"/>
  </g>
  <text x="355" y="366" text-anchor="middle" font-size="8" fill="#5b7db1">当选后启动复制</text>
  <text x="690" y="366" font-size="8" fill="#5b7db1">run 单线程串行驱动</text>

  <!-- 可靠性 / 脑裂防护旁路（虚线红） -->
  <g stroke="#b58a8a" stroke-width="1.3" fill="none" stroke-dasharray="4 3">
    <!-- 日志复制 ack → 可靠性：刷新 Leader Lease -->
    <path d="M510,354 L510,372" marker-end="url(#ar)"/>
  </g>
  <text x="516" y="366" font-size="8" fill="#b58a8a">acks 刷新 Leader Lease</text>

  <!-- 成员变更旁路（虚线紫）：配置定义投票成员 / quorum -->
  <g stroke="#9a5cb0" stroke-width="1.3" fill="none" stroke-dasharray="4 3">
    <path d="M200,372 L200,354" marker-end="url(#ar)"/>
  </g>
  <text x="140" y="366" font-size="8" fill="#9a5cb0">配置定义投票成员</text>

  <!-- 机制标注（取自主线 md，勿杜撰） -->
  <text x="595" y="206" font-size="8.5" fill="#b0982e">落后 follower 改发 InstallSnapshot 追平</text>
  <text x="60" y="622" font-size="8.5" fill="#4f9d69">runFSM 单线程串行 Apply · 各节点状态机确定性一致</text>

  <text x="1000" y="726" text-anchor="end" font-size="10" fill="#a1a1a6">灵魂：多数派日志复制达成线性一致 · IO/存储/状态机全由宿主注入</text>
</svg>
