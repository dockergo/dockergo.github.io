<svg xmlns="http://www.w3.org/2000/svg" width="920" height="540" viewBox="0 0 920 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="920" height="540" fill="#fbfbfd"/>
  <text x="30" y="34" font-size="15" font-weight="600" fill="#1d1d1f">Transport 与 RPC：节点间通信抽象（宿主实现 · TCP / Inmem 可插拔）</text>

  <!-- Transport 接口 -->
  <rect x="30" y="60" width="410" height="250" rx="13" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="46" y="84" font-size="12.5" font-weight="600" fill="#1b2a4a">Transport 接口（transport.go:31）</text>
  <g font-size="10.5" fill="#2b3a5a">
    <text x="46" y="108"><tspan font-weight="600">Consumer</tspan> — 消费入站 RPC 的 channel</text>
    <text x="46" y="130"><tspan font-weight="600">AppendEntries</tspan> / RequestVote / InstallSnapshot</text>
    <text x="46" y="152"><tspan font-weight="600">AppendEntriesPipeline</tspan> — 流水线发送</text>
    <text x="46" y="174"><tspan font-weight="600">TimeoutNow</tspan> — 触发领导权转移</text>
    <text x="46" y="196"><tspan font-weight="600">SetHeartbeatHandler</tspan> — 心跳快路径</text>
    <text x="46" y="218">· EncodePeer / DecodePeer — 地址编解码</text>
    <text x="46" y="240">· LocalAddr</text>
  </g>
  <text x="46" y="268" font-size="10" fill="#86868b">可选扩展接口：WithPreVote（预投票）、WithClose、</text>
  <text x="46" y="284" font-size="10" fill="#86868b">WithPeers、LoopbackTransport（测试）</text>
  <text x="46" y="302" font-size="10" fill="#86868b">RPC.Respond(resp, err) 应答（transport.go:25）</text>

  <!-- 5 RPC -->
  <rect x="470" y="60" width="420" height="250" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="486" y="84" font-size="12.5" font-weight="600" fill="#1b2a4a">5 类 RPC（commands.go）</text>
  <g font-size="10.5">
    <rect x="486" y="96" width="388" height="34" rx="7" fill="#ffffff" stroke="#cfe0f2"/>
    <text x="496" y="118" fill="#1b2a4a"><tspan font-weight="600">AppendEntries</tspan>（:27）— 复制日志 + 心跳</text>
    <rect x="486" y="136" width="388" height="34" rx="7" fill="#ffffff" stroke="#cfe0f2"/>
    <text x="496" y="158" fill="#1b2a4a"><tspan font-weight="600">RequestVote</tspan>（:78）— 拉票</text>
    <rect x="486" y="176" width="388" height="34" rx="7" fill="#ffffff" stroke="#cfe0f2"/>
    <text x="496" y="198" fill="#1b2a4a"><tspan font-weight="600">RequestPreVote</tspan>（:125）— 预投票探路</text>
    <rect x="486" y="216" width="388" height="34" rx="7" fill="#ffffff" stroke="#cfe0f2"/>
    <text x="496" y="238" fill="#1b2a4a"><tspan font-weight="600">InstallSnapshot</tspan>（:159）— 推整快照</text>
    <rect x="486" y="256" width="388" height="34" rx="7" fill="#ffffff" stroke="#cfe0f2"/>
    <text x="496" y="278" fill="#1b2a4a"><tspan font-weight="600">TimeoutNow</tspan>（:206）— 领导权转移</text>
  </g>
  <text x="486" y="302" font-size="10" fill="#86868b">入站经 Consumer channel → processRPC 分派（raft.go:1408）</text>

  <!-- 实现 + 优化 -->
  <rect x="30" y="330" width="860" height="180" rx="13" fill="#f7f7f9" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="46" y="354" font-size="12.5" font-weight="600" fill="#1d1d1f">实现与优化</text>
  <g font-size="10.5">
    <rect x="46" y="368" width="270" height="70" rx="9" fill="#ffffff" stroke="#e2e2e7"/>
    <text x="181" y="392" text-anchor="middle" font-weight="600" fill="#1d1d1f">NetworkTransport</text>
    <text x="181" y="410" text-anchor="middle" fill="#86868b">net_transport.go:81</text>
    <text x="181" y="426" text-anchor="middle" fill="#86868b">走 StreamLayer 抽象（:179）</text>

    <rect x="326" y="368" width="270" height="70" rx="9" fill="#ffffff" stroke="#e2e2e7"/>
    <text x="461" y="392" text-anchor="middle" font-weight="600" fill="#1d1d1f">TCPTransport</text>
    <text x="461" y="410" text-anchor="middle" fill="#86868b">tcp_transport.go:67</text>
    <text x="461" y="426" text-anchor="middle" fill="#86868b">生产用 TCP StreamLayer</text>

    <rect x="606" y="368" width="270" height="70" rx="9" fill="#f5faf6" stroke="#c9e6cf"/>
    <text x="741" y="392" text-anchor="middle" font-weight="600" fill="#1f5130">InmemTransport</text>
    <text x="741" y="410" text-anchor="middle" fill="#4f9d69">inmem_transport.go</text>
    <text x="741" y="426" text-anchor="middle" fill="#4f9d69">测试用内存回环</text>
  </g>
  <text x="46" y="464" font-size="10.5" fill="#6e6e73"><tspan font-weight="600">Pipeline</tspan>：AppendEntriesPipeline 不等上一批 ACK 连发，吃满高延迟链路带宽</text>
  <text x="46" y="486" font-size="10.5" fill="#6e6e73"><tspan font-weight="600">心跳快路径</tspan>：SetHeartbeatHandler 让心跳绕过普通 RPC 队列，避免磁盘 IO 造成的队头阻塞</text>
</svg>
