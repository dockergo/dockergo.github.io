<svg xmlns="http://www.w3.org/2000/svg" width="920" height="540" viewBox="0 0 920 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="920" height="540" fill="#fbfbfd"/>
  <text x="30" y="34" font-size="15" font-weight="600" fill="#1d1d1f">成员变更：单步变更（一次一个 server · 非 joint consensus）</text>

  <!-- suffrage -->
  <rect x="30" y="60" width="410" height="180" rx="13" fill="#faf4fb" stroke="#e7cff0" filter="url(#soft)"/>
  <text x="46" y="84" font-size="12.5" font-weight="600" fill="#5a2b6b">ServerSuffrage（configuration.go:9）</text>
  <g font-size="10.5">
    <rect x="46" y="96" width="378" height="38" rx="8" fill="#ffffff" stroke="#e7cff0"/>
    <text x="56" y="114" fill="#5a2b6b"><tspan font-weight="600">Voter</tspan>（:15）</text>
    <text x="56" y="129" fill="#9a5cb0">计入选举与 quorum，match 影响 commit</text>
    <rect x="46" y="140" width="378" height="38" rx="8" fill="#ffffff" stroke="#e7cff0"/>
    <text x="56" y="158" fill="#5a2b6b"><tspan font-weight="600">Nonvoter</tspan>（:18）</text>
    <text x="56" y="173" fill="#9a5cb0">收日志但不投票、不计 quorum（如只读副本）</text>
    <rect x="46" y="184" width="378" height="38" rx="8" fill="#ffffff" stroke="#e7cff0"/>
    <text x="56" y="202" fill="#86868b"><tspan font-weight="600">Staging</tspan>（:23，已弃用）</text>
    <text x="56" y="217" fill="#a1a1a6">追平后 Promote 成 Voter；改用 Nonvoter + AddVoter</text>
  </g>

  <!-- commands -->
  <rect x="470" y="60" width="420" height="180" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="486" y="84" font-size="12.5" font-weight="600" fill="#1b2a4a">ConfigurationChangeCommand（:86）</text>
  <g font-size="10.5" fill="#2b3a5a">
    <text x="486" y="110">· <tspan font-weight="600">AddVoter</tspan> — 加投票成员</text>
    <text x="486" y="134">· <tspan font-weight="600">AddNonvoter</tspan> — 加非投票成员</text>
    <text x="486" y="158">· <tspan font-weight="600">DemoteVoter</tspan> — Voter 降为 Nonvoter</text>
    <text x="486" y="182">· <tspan font-weight="600">RemoveServer</tspan> — 移除成员</text>
    <text x="486" y="206">· Promote（弃用）— Staging→Voter</text>
  </g>
  <text x="486" y="230" font-size="10" fill="#86868b">每条变更 = 一条 LogConfiguration 日志，走正常复制+提交</text>

  <!-- 稳定性门 -->
  <rect x="30" y="262" width="860" height="130" rx="13" fill="#fbf1f0" stroke="#f2cfca" filter="url(#soft)"/>
  <text x="46" y="286" font-size="12.5" font-weight="600" fill="#8a2b1f">串行化门：一次只允许一个未提交的配置变更（raft.go:654）</text>
  <text x="46" y="310" font-size="11" fill="#c4675a">configurationChangeChIfStable 仅当两条件都满足才接新变更：</text>
  <rect x="46" y="322" width="410" height="52" rx="9" fill="#ffffff" stroke="#f2cfca"/>
  <text x="56" y="343" font-size="10.5" fill="#8a2b1f">① latestIndex == committedIndex</text>
  <text x="56" y="362" font-size="10" fill="#c4675a">上一次配置变更已提交</text>
  <rect x="470" y="322" width="410" height="52" rx="9" fill="#ffffff" stroke="#f2cfca"/>
  <text x="480" y="343" font-size="10.5" fill="#8a2b1f">② commitIndex ≥ leaderState.commitment.startIndex</text>
  <text x="480" y="362" font-size="10" fill="#c4675a">本任期已提交 no-op（Leader 已确立）</text>

  <!-- 变更流程 -->
  <rect x="30" y="412" width="860" height="106" rx="13" fill="#f5faf6" stroke="#c9e6cf" filter="url(#soft)"/>
  <text x="46" y="436" font-size="12" font-weight="600" fill="#1f5130">变更流程（两配置追踪：committed + latest）</text>
  <g font-size="10.5" fill="#2b3a5a">
    <rect x="46" y="448" width="190" height="54" rx="8" fill="#ffffff" stroke="#c9e6cf"/>
    <text x="141" y="470" text-anchor="middle">AddVoter/Remove API</text>
    <text x="141" y="488" text-anchor="middle" fill="#4f9d69">nextConfiguration(:224)</text>
    <rect x="266" y="448" width="190" height="54" rx="8" fill="#ffffff" stroke="#c9e6cf"/>
    <text x="361" y="470" text-anchor="middle">appendConfigurationEntry</text>
    <text x="361" y="488" text-anchor="middle" fill="#4f9d69">raft.go:1204 · 立即生效</text>
    <rect x="486" y="448" width="190" height="54" rx="8" fill="#ffffff" stroke="#c9e6cf"/>
    <text x="581" y="470" text-anchor="middle">复制到多数派</text>
    <text x="581" y="488" text-anchor="middle" fill="#4f9d69">按新配置计 quorum</text>
    <rect x="706" y="448" width="160" height="54" rx="8" fill="#fbf7ef" stroke="#efe2c8"/>
    <text x="786" y="470" text-anchor="middle" fill="#8a6d1f">提交 → committed</text>
    <text x="786" y="488" text-anchor="middle" fill="#a1885a">可接下一变更</text>
  </g>
  <path d="M236,475 L264,475" stroke="#c7c7cc" stroke-width="1.2" fill="none" marker-end="url(#ar)"/>
  <path d="M456,475 L484,475" stroke="#c7c7cc" stroke-width="1.2" fill="none" marker-end="url(#ar)"/>
  <path d="M676,475 L704,475" stroke="#c7c7cc" stroke-width="1.2" fill="none" marker-end="url(#ar)"/>
</svg>
