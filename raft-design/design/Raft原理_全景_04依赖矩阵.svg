<svg xmlns="http://www.w3.org/2000/svg" width="940" height="560" viewBox="0 0 940 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
  </defs>
  <rect width="940" height="560" fill="#fbfbfd"/>
  <text x="30" y="34" font-size="15" font-weight="600" fill="#1d1d1f">主线 × 核心资源 依赖矩阵（● 强依赖 · ◐ 中 · ○ 弱/无）</text>
  <text x="30" y="54" font-size="11.5" fill="#86868b">灵魂列是「多数派 quorum」——几乎所有写路径都强依赖它；日志与任期是横切一切的骨架资源</text>

  <!-- 列头 -->
  <g font-size="11" font-weight="600" fill="#1b2a4a">
    <text x="392" y="92" text-anchor="middle">任期/投票</text>
    <text x="490" y="92" text-anchor="middle">日志 Log</text>
    <text x="588" y="92" text-anchor="middle">多数派 quorum</text>
    <text x="686" y="92" text-anchor="middle">StableStore</text>
    <text x="784" y="92" text-anchor="middle">Transport</text>
    <text x="882" y="92" text-anchor="middle">FSM</text>
  </g>
  <line x1="343" y1="100" x2="931" y2="100" stroke="#e2e2e7"/>

  <!-- 行 + 单元格 -->
  <g font-size="11">
    <!-- helper: rows y from 118 step 46 -->
    <!-- 接口 -->
    <text x="40" y="130" fill="#1d1d1f" font-weight="600">接口 · 编程 API 与注入</text>
    <text x="392" y="130" text-anchor="middle" fill="#c4675a">◐</text>
    <text x="490" y="130" text-anchor="middle" fill="#1f7a3f">●</text>
    <text x="588" y="130" text-anchor="middle" fill="#1f7a3f">●</text>
    <text x="686" y="130" text-anchor="middle" fill="#c4675a">◐</text>
    <text x="784" y="130" text-anchor="middle" fill="#1f7a3f">●</text>
    <text x="882" y="130" text-anchor="middle" fill="#1f7a3f">●</text>

    <text x="40" y="176" fill="#1d1d1f" font-weight="600">Leader 选举</text>
    <text x="392" y="176" text-anchor="middle" fill="#1f7a3f">●</text>
    <text x="490" y="176" text-anchor="middle" fill="#1f7a3f">●</text>
    <text x="588" y="176" text-anchor="middle" fill="#1f7a3f">●</text>
    <text x="686" y="176" text-anchor="middle" fill="#1f7a3f">●</text>
    <text x="784" y="176" text-anchor="middle" fill="#1f7a3f">●</text>
    <text x="882" y="176" text-anchor="middle" fill="#a1a1a6">○</text>

    <text x="40" y="222" fill="#1d1d1f" font-weight="600">日志复制</text>
    <text x="392" y="222" text-anchor="middle" fill="#c4675a">◐</text>
    <text x="490" y="222" text-anchor="middle" fill="#1f7a3f">●</text>
    <text x="588" y="222" text-anchor="middle" fill="#c4675a">◐</text>
    <text x="686" y="222" text-anchor="middle" fill="#a1a1a6">○</text>
    <text x="784" y="222" text-anchor="middle" fill="#1f7a3f">●</text>
    <text x="882" y="222" text-anchor="middle" fill="#a1a1a6">○</text>

    <text x="40" y="268" fill="#1d1d1f" font-weight="600">提交与应用</text>
    <text x="392" y="268" text-anchor="middle" fill="#a1a1a6">○</text>
    <text x="490" y="268" text-anchor="middle" fill="#1f7a3f">●</text>
    <text x="588" y="268" text-anchor="middle" fill="#1f7a3f">●</text>
    <text x="686" y="268" text-anchor="middle" fill="#a1a1a6">○</text>
    <text x="784" y="268" text-anchor="middle" fill="#a1a1a6">○</text>
    <text x="882" y="268" text-anchor="middle" fill="#1f7a3f">●</text>

    <text x="40" y="314" fill="#1d1d1f" font-weight="600">快照与日志压缩</text>
    <text x="392" y="314" text-anchor="middle" fill="#a1a1a6">○</text>
    <text x="490" y="314" text-anchor="middle" fill="#1f7a3f">●</text>
    <text x="588" y="314" text-anchor="middle" fill="#a1a1a6">○</text>
    <text x="686" y="314" text-anchor="middle" fill="#a1a1a6">○</text>
    <text x="784" y="314" text-anchor="middle" fill="#c4675a">◐</text>
    <text x="882" y="314" text-anchor="middle" fill="#1f7a3f">●</text>

    <text x="40" y="360" fill="#1d1d1f" font-weight="600">成员变更</text>
    <text x="392" y="360" text-anchor="middle" fill="#a1a1a6">○</text>
    <text x="490" y="360" text-anchor="middle" fill="#1f7a3f">●</text>
    <text x="588" y="360" text-anchor="middle" fill="#1f7a3f">●</text>
    <text x="686" y="360" text-anchor="middle" fill="#a1a1a6">○</text>
    <text x="784" y="360" text-anchor="middle" fill="#c4675a">◐</text>
    <text x="882" y="360" text-anchor="middle" fill="#a1a1a6">○</text>

    <text x="40" y="406" fill="#1d1d1f" font-weight="600">持久状态</text>
    <text x="392" y="406" text-anchor="middle" fill="#1f7a3f">●</text>
    <text x="490" y="406" text-anchor="middle" fill="#1f7a3f">●</text>
    <text x="588" y="406" text-anchor="middle" fill="#a1a1a6">○</text>
    <text x="686" y="406" text-anchor="middle" fill="#1f7a3f">●</text>
    <text x="784" y="406" text-anchor="middle" fill="#a1a1a6">○</text>
    <text x="882" y="406" text-anchor="middle" fill="#a1a1a6">○</text>

    <text x="40" y="452" fill="#1d1d1f" font-weight="600">Transport 与 RPC</text>
    <text x="392" y="452" text-anchor="middle" fill="#a1a1a6">○</text>
    <text x="490" y="452" text-anchor="middle" fill="#a1a1a6">○</text>
    <text x="588" y="452" text-anchor="middle" fill="#a1a1a6">○</text>
    <text x="686" y="452" text-anchor="middle" fill="#a1a1a6">○</text>
    <text x="784" y="452" text-anchor="middle" fill="#1f7a3f">●</text>
    <text x="882" y="452" text-anchor="middle" fill="#a1a1a6">○</text>

    <text x="40" y="498" fill="#1d1d1f" font-weight="600">可靠性与脑裂防护</text>
    <text x="392" y="498" text-anchor="middle" fill="#1f7a3f">●</text>
    <text x="490" y="498" text-anchor="middle" fill="#a1a1a6">○</text>
    <text x="588" y="498" text-anchor="middle" fill="#1f7a3f">●</text>
    <text x="686" y="498" text-anchor="middle" fill="#a1a1a6">○</text>
    <text x="784" y="498" text-anchor="middle" fill="#1f7a3f">●</text>
    <text x="882" y="498" text-anchor="middle" fill="#a1a1a6">○</text>
  </g>
  <line x1="30" y1="524" x2="931" y2="524" stroke="#e2e2e7"/>
  <text x="30" y="546" font-size="10.5" fill="#a1a1a6">读法：Leader 选举踩满任期/日志/quorum/StableStore/Transport；提交与应用把 quorum-committed 日志喂给 FSM——多数派是全库咽喉。</text>
</svg>
