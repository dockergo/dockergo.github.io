<svg xmlns="http://www.w3.org/2000/svg" width="900" height="540" viewBox="0 0 900 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="900" height="540" fill="#fbfbfd"/>
  <text x="30" y="34" font-size="15" font-weight="600" fill="#1d1d1f">库形态：接口注入（宿主实现 IO / 存储 / 业务，本库只持共识状态机）</text>

  <!-- 宿主 -->
  <rect x="300" y="60" width="300" height="58" rx="12" fill="#fbf7ef" stroke="#efe2c8" filter="url(#soft)"/>
  <text x="450" y="84" text-anchor="middle" font-size="12.5" font-weight="600" fill="#8a6d1f">宿主进程（Consul / Nomad / Vault）</text>
  <text x="450" y="103" text-anchor="middle" font-size="10.5" fill="#a1885a">拥有事件循环、磁盘、socket、业务逻辑</text>

  <!-- 库核心 -->
  <rect x="270" y="200" width="360" height="90" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="450" y="228" text-anchor="middle" font-size="13" font-weight="600" fill="#1b2a4a">raft 库核心（共识状态机）</text>
  <text x="450" y="249" text-anchor="middle" font-size="10.5" fill="#5b7db1">Follower / Candidate / Leader · 日志 · 提交</text>
  <text x="450" y="269" text-anchor="middle" font-size="10.5" fill="#5b7db1">单线程 run() · 只调接口，不碰真实 IO</text>

  <!-- 注入的5接口 -->
  <g font-size="10.5">
    <rect x="30"  y="360" width="150" height="70" rx="10" fill="#f5faf6" stroke="#c9e6cf"/>
    <text x="105" y="386" text-anchor="middle" font-weight="600" fill="#1f5130">FSM</text>
    <text x="105" y="404" text-anchor="middle" fill="#4f9d69">业务状态机</text>
    <text x="105" y="420" text-anchor="middle" fill="#86868b">Apply/Snapshot/Restore</text>

    <rect x="196" y="360" width="150" height="70" rx="10" fill="#f5faf6" stroke="#c9e6cf"/>
    <text x="271" y="386" text-anchor="middle" font-weight="600" fill="#1f5130">LogStore</text>
    <text x="271" y="404" text-anchor="middle" fill="#4f9d69">日志条目存取</text>
    <text x="271" y="420" text-anchor="middle" fill="#86868b">Store/Get/DeleteRange</text>

    <rect x="362" y="360" width="150" height="70" rx="10" fill="#f5faf6" stroke="#c9e6cf"/>
    <text x="437" y="386" text-anchor="middle" font-weight="600" fill="#1f5130">StableStore</text>
    <text x="437" y="404" text-anchor="middle" fill="#4f9d69">任期/投票元数据</text>
    <text x="437" y="420" text-anchor="middle" fill="#86868b">Set/Get(Uint64)</text>

    <rect x="528" y="360" width="150" height="70" rx="10" fill="#f5faf6" stroke="#c9e6cf"/>
    <text x="603" y="386" text-anchor="middle" font-weight="600" fill="#1f5130">SnapshotStore</text>
    <text x="603" y="404" text-anchor="middle" fill="#4f9d69">快照创建/打开</text>
    <text x="603" y="420" text-anchor="middle" fill="#86868b">Create/Open/List</text>

    <rect x="694" y="360" width="176" height="70" rx="10" fill="#f5faf6" stroke="#c9e6cf"/>
    <text x="782" y="386" text-anchor="middle" font-weight="600" fill="#1f5130">Transport</text>
    <text x="782" y="404" text-anchor="middle" fill="#4f9d69">节点间 RPC</text>
    <text x="782" y="420" text-anchor="middle" fill="#86868b">AppendEntries/RequestVote…</text>
  </g>

  <path d="M450,118 L450,198" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <text x="462" y="162" font-size="10" fill="#86868b">NewRaft 注入六件套</text>
  <path d="M300,290 L105,358" stroke="#c7c7cc" stroke-width="1.2" fill="none" marker-end="url(#ar)"/>
  <path d="M370,290 L271,358" stroke="#c7c7cc" stroke-width="1.2" fill="none" marker-end="url(#ar)"/>
  <path d="M450,290 L440,358" stroke="#c7c7cc" stroke-width="1.2" fill="none" marker-end="url(#ar)"/>
  <path d="M540,290 L600,358" stroke="#c7c7cc" stroke-width="1.2" fill="none" marker-end="url(#ar)"/>
  <path d="M600,290 L780,358" stroke="#c7c7cc" stroke-width="1.2" fill="none" marker-end="url(#ar)"/>

  <!-- 谱系 -->
  <rect x="30" y="462" width="840" height="60" rx="11" fill="#f7f7f9" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="50" y="486" font-size="11.5" fill="#6e6e73">形态谱系：<tspan font-weight="600" fill="#1d1d1f">传统嵌入库（自管 IO，难测难嵌）</tspan> → <tspan font-weight="600" fill="#1b2a4a">raft（接口注入：库持状态机，IO/存储/业务由宿主实现，可测可嵌）</tspan></text>
  <text x="50" y="507" font-size="11" fill="#86868b">与 etcd（把 Raft 内嵌进 server 进程、自带 boltdb WAL）不同——raft 是纯库，同一算法可复用到任意宿主，存储/传输可插拔（BoltDB / TCP / Inmem）。</text>
</svg>
