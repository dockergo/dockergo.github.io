<svg xmlns="http://www.w3.org/2000/svg" width="920" height="600" viewBox="0 0 920 600" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="920" height="600" fill="#fbfbfd"/>
  <text x="30" y="34" font-size="15" font-weight="600" fill="#1d1d1f">编程 API 与接口注入：NewRaft 注入六件套 · Apply 写路径</text>

  <!-- 左：NewRaft 注入 -->
  <rect x="30" y="58" width="300" height="284" rx="13" fill="#f7f7f9" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="46" y="82" font-size="12.5" font-weight="600" fill="#1d1d1f">NewRaft(conf, fsm, logs, stable, snaps, trans)</text>
  <text x="46" y="100" font-size="10.5" fill="#86868b">api.go:508 · 注入六件套并启动 3 协程</text>
  <g font-size="10.5">
    <rect x="46" y="112" width="268" height="30" rx="7" fill="#eef3fb" stroke="#bcd0ec"/>
    <text x="56" y="131" fill="#1b2a4a"><tspan font-weight="600">conf</tspan> · 超时/阈值等参数（config.go）</text>
    <rect x="46" y="148" width="268" height="30" rx="7" fill="#f5faf6" stroke="#c9e6cf"/>
    <text x="56" y="167" fill="#1f5130"><tspan font-weight="600">fsm</tspan> · 业务状态机（宿主实现）</text>
    <rect x="46" y="184" width="268" height="30" rx="7" fill="#f5faf6" stroke="#c9e6cf"/>
    <text x="56" y="203" fill="#1f5130"><tspan font-weight="600">logs</tspan> · LogStore 日志条目</text>
    <rect x="46" y="220" width="268" height="30" rx="7" fill="#f5faf6" stroke="#c9e6cf"/>
    <text x="56" y="239" fill="#1f5130"><tspan font-weight="600">stable</tspan> · StableStore 任期/投票</text>
    <rect x="46" y="256" width="268" height="30" rx="7" fill="#f5faf6" stroke="#c9e6cf"/>
    <text x="56" y="275" fill="#1f5130"><tspan font-weight="600">snaps</tspan> · SnapshotStore 快照</text>
    <rect x="46" y="292" width="268" height="30" rx="7" fill="#f5faf6" stroke="#c9e6cf"/>
    <text x="56" y="311" fill="#1f5130"><tspan font-weight="600">trans</tspan> · Transport 节点间 RPC</text>
  </g>
  <text x="46" y="335" font-size="10" fill="#a1a1a6">启动：goFunc(run) · goFunc(runFSM) · goFunc(runSnapshots)</text>

  <!-- 右：写路径时序 -->
  <rect x="360" y="58" width="530" height="284" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="376" y="82" font-size="12.5" font-weight="600" fill="#1b2a4a">Apply(cmd, timeout) 写路径（Leader 上）</text>
  <g font-size="10.5" fill="#2b3a5a">
    <rect x="376" y="96" width="498" height="30" rx="7" fill="#ffffff" stroke="#cfe0f2"/>
    <text x="386" y="115">① 宿主 <tspan font-weight="600">Apply(cmd)</tspan> → 返回 ApplyFuture（api.go:867）</text>
    <rect x="376" y="132" width="498" height="30" rx="7" fill="#ffffff" stroke="#cfe0f2"/>
    <text x="386" y="151">② 命令投递到 applyCh，run 主线程 <tspan font-weight="600">dispatchLogs</tspan> 写本地日志（:1245）</text>
    <rect x="376" y="168" width="498" height="30" rx="7" fill="#ffffff" stroke="#cfe0f2"/>
    <text x="386" y="187">③ Leader 经 Transport <tspan font-weight="600">AppendEntries</tspan> 复制到各 follower</text>
    <rect x="376" y="204" width="498" height="30" rx="7" fill="#ffffff" stroke="#cfe0f2"/>
    <text x="386" y="223">④ 多数派确认 → <tspan font-weight="600">commitment</tspan> 推进 commitIndex（commitment.go）</text>
    <rect x="376" y="240" width="498" height="30" rx="7" fill="#ffffff" stroke="#cfe0f2"/>
    <text x="386" y="259">⑤ processLogs 送 fsmMutateCh → <tspan font-weight="600">runFSM 调 FSM.Apply</tspan>（:1296）</text>
    <rect x="376" y="276" width="498" height="30" rx="7" fill="#f5faf6" stroke="#c9e6cf"/>
    <text x="386" y="295" fill="#1f5130">⑥ Future.respond(FSM 返回值) → 宿主 <tspan font-weight="600">future.Response()</tspan> 拿到结果</text>
  </g>
  <text x="376" y="330" font-size="10" fill="#5b7db1">非 Leader 上 Apply 返回 ErrNotLeader；宿主需重定向到当前 Leader</text>

  <path d="M330,200 L358,200" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>

  <!-- 下：其它 API -->
  <rect x="30" y="360" width="860" height="210" rx="13" fill="#f7f7f9" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="46" y="384" font-size="12.5" font-weight="600" fill="#1d1d1f">其它编程 API（宿主可调）</text>
  <g font-size="10.5">
    <rect x="46" y="396" width="264" height="52" rx="8" fill="#ffffff" stroke="#e2e2e7"/>
    <text x="58" y="416" fill="#1d1d1f"><tspan font-weight="600">Barrier</tspan>（api.go:907）</text>
    <text x="58" y="434" fill="#86868b">写一条 barrier 日志，等它 apply——确保之前的写都已落地</text>

    <rect x="326" y="396" width="264" height="52" rx="8" fill="#ffffff" stroke="#e2e2e7"/>
    <text x="338" y="416" fill="#1d1d1f"><tspan font-weight="600">VerifyLeader</tspan>（:931）</text>
    <text x="338" y="434" fill="#86868b">向多数派确认仍是 Leader——线性读前哨</text>

    <rect x="606" y="396" width="284" height="52" rx="8" fill="#ffffff" stroke="#e2e2e7"/>
    <text x="618" y="416" fill="#1d1d1f"><tspan font-weight="600">GetConfiguration</tspan>（:945）</text>
    <text x="618" y="434" fill="#86868b">读当前集群成员配置</text>

    <rect x="46" y="458" width="264" height="52" rx="8" fill="#faf4fb" stroke="#e7cff0"/>
    <text x="58" y="478" fill="#5a2b6b"><tspan font-weight="600">AddVoter / AddNonvoter</tspan>（:994/:1012）</text>
    <text x="58" y="496" fill="#9a5cb0">增加投票/非投票成员（单步变更）</text>

    <rect x="326" y="458" width="264" height="52" rx="8" fill="#faf4fb" stroke="#e7cff0"/>
    <text x="338" y="478" fill="#5a2b6b"><tspan font-weight="600">RemoveServer</tspan>（:1028）</text>
    <text x="338" y="496" fill="#9a5cb0">移除成员（单步变更）</text>

    <rect x="606" y="458" width="284" height="52" rx="8" fill="#fbf1f0" stroke="#f2cfca"/>
    <text x="618" y="478" fill="#8a2b1f"><tspan font-weight="600">Snapshot / LeadershipTransfer</tspan></text>
    <text x="618" y="496" fill="#c4675a">手动快照（:1078）/ 主动转移领导权（:1309）</text>
  </g>
  <text x="46" y="540" font-size="10.5" fill="#6e6e73">BootstrapCluster（api.go:247）：首次拉起集群时写入初始配置；之后成员靠 AddVoter/RemoveServer 演进。</text>
  <text x="46" y="558" font-size="10.5" fill="#6e6e73">所有变更 API 都返回 Future，调 .Error() 阻塞等待被提交、apply 后才知成败。</text>
</svg>
