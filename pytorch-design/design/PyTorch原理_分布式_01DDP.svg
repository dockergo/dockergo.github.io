<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="440" viewBox="0 0 1020 440"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">数据并行 DDP · 各卡跑同模型不同数据，反向时 all-reduce 同步梯度（nn/parallel/distributed.py）</text>

  <!-- 多卡 -->
  <rect x="30" y="56" width="470" height="230" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="80" font-size="12.5" font-weight="600" fill="#1d1d1f">DistributedDataParallel</text>
  <rect x="48" y="96" width="200" height="90" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="148" y="118" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">GPU 0 进程</text><text x="148" y="138" font-size="8.5" fill="#5b7db1" text-anchor="middle">模型副本 + 数据分片 A</text><text x="148" y="156" font-size="8.5" fill="#5b7db1" text-anchor="middle">前向 + 反向算本地梯度</text><text x="148" y="174" font-size="8" fill="#8fa9cf" text-anchor="middle">rank 0</text>
  <rect x="264" y="96" width="218" height="90" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="373" y="118" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">GPU 1 进程</text><text x="373" y="138" font-size="8.5" fill="#5b7db1" text-anchor="middle">同一模型 + 数据分片 B</text><text x="373" y="156" font-size="8.5" fill="#5b7db1" text-anchor="middle">前向 + 反向算本地梯度</text><text x="373" y="174" font-size="8" fill="#8fa9cf" text-anchor="middle">rank 1（… rank N）</text>
  <rect x="48" y="200" width="434" height="72" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="265" y="222" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">all-reduce：把各卡梯度求平均</text><text x="265" y="242" font-size="8.5" fill="#3f8f66" text-anchor="middle">同步后各卡梯度一致 → 各自 step → 参数保持一致</text><text x="265" y="260" font-size="8.5" fill="#3f8f66" text-anchor="middle">每进程独立跑，无中心参数服务器</text>

  <!-- overlap + bucket -->
  <rect x="520" y="56" width="470" height="230" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="538" y="80" font-size="12.5" font-weight="600" fill="#1b2a4a">关键优化：通信藏进反向</text>
  <rect x="538" y="96" width="434" height="56" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="755" y="118" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">梯度分桶（bucket）</text><text x="755" y="138" font-size="8.5" fill="#5b7db1" text-anchor="middle">参数分组，一桶梯度算完立即 all-reduce</text>
  <rect x="538" y="160" width="434" height="56" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="755" y="182" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">overlap 计算与通信</text><text x="755" y="202" font-size="8.5" fill="#5b7db1" text-anchor="middle">反向还在算后面层时，前面层梯度已在传</text>
  <rect x="538" y="224" width="434" height="48" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="755" y="246" font-size="9" fill="#0f5132" text-anchor="middle">用 autograd hook 在梯度就绪时触发通信</text><text x="755" y="262" font-size="8" fill="#3f8f66" text-anchor="middle">通信几乎"免费"藏在计算背后</text>

  <!-- 底座 -->
  <rect x="30" y="302" width="960" height="104" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="326" font-size="12.5" font-weight="600" fill="#1d1d1f">通信底座：ProcessGroup + collective（torch/distributed/）</text>
  <rect x="48" y="342" width="290" height="52" rx="9" fill="#f4eefb" stroke="#d9c9ef"/><text x="193" y="364" font-size="9.5" fill="#3c1361" text-anchor="middle">ProcessGroup（NCCL/Gloo 后端）</text><text x="193" y="382" font-size="8.5" fill="#7a5aa8" text-anchor="middle">进程间通信抽象</text>
  <rect x="354" y="342" width="290" height="52" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="499" y="364" font-size="9.5" fill="#0f5132" text-anchor="middle">collective 原语</text><text x="499" y="382" font-size="8.5" fill="#3f8f66" text-anchor="middle">all_reduce/all_gather/broadcast/reduce_scatter</text>
  <rect x="660" y="342" width="310" height="52" rx="9" fill="#fff7e6" stroke="#f0dcae"/><text x="815" y="364" font-size="9.5" fill="#7a4d00" text-anchor="middle">数据分片靠 DistributedSampler</text><text x="815" y="382" font-size="8.5" fill="#9a7328" text-anchor="middle">保证各 rank 拿不重叠子集</text>
</svg>
