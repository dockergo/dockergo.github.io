<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="440" viewBox="0 0 1020 440"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">张量与视图 · 元信息 + 共享存储（一块内存，多种"看法"）</text>

  <!-- 张量结构 -->
  <rect x="30" y="56" width="470" height="230" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="80" font-size="12.5" font-weight="600" fill="#1d1d1f">Tensor = 元信息 + 指向 Storage</text>
  <rect x="48" y="96" width="220" height="150" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="158" y="118" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">元信息（每个 Tensor 各一份）</text>
  <text x="64" y="140" font-size="9" fill="#5b7db1">shape：各维大小 (2,3)</text>
  <text x="64" y="160" font-size="9" fill="#5b7db1">stride：各维步长 (3,1)</text>
  <text x="64" y="180" font-size="9" fill="#5b7db1">dtype：float32 / int64 …</text>
  <text x="64" y="200" font-size="9" fill="#5b7db1">device：cpu / cuda:0</text>
  <text x="64" y="220" font-size="9" fill="#5b7db1">offset：起始偏移</text>
  <text x="64" y="238" font-size="8.5" fill="#8fa9cf">requires_grad（可微性，见自动微分）</text>
  <rect x="288" y="96" width="184" height="150" rx="10" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="380" y="118" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">Storage（底层内存）</text>
  <text x="380" y="142" font-size="9" fill="#9a7328" text-anchor="middle">一维连续字节数组</text>
  <text x="380" y="164" font-size="9" fill="#9a7328" text-anchor="middle">[a b c d e f …]</text>
  <text x="380" y="188" font-size="9" fill="#9a7328" text-anchor="middle">引用计数</text>
  <text x="380" y="212" font-size="9" fill="#9a7328" text-anchor="middle">可被多个 Tensor 共享</text>
  <line x1="268" y1="171" x2="288" y2="171" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="48" y="272" font-size="9" fill="#86868b">shape+stride+offset 决定"如何在一维内存里索引出多维视图"</text>

  <!-- 视图 -->
  <rect x="520" y="56" width="470" height="230" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="538" y="80" font-size="12.5" font-weight="600" fill="#0f5132">视图（view）：改元信息、不动数据</text>
  <rect x="538" y="96" width="434" height="44" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="554" y="116" font-size="9.5" fill="#0f5132">t.T / reshape / [:, 1] / transpose</text><text x="554" y="132" font-size="8.5" fill="#3f8f66">只改 shape/stride/offset，与原张量共享同一 Storage</text>
  <rect x="538" y="148" width="434" height="44" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="554" y="168" font-size="9.5" fill="#0f5132">零拷贝：改视图的值 = 改原张量</text><text x="554" y="184" font-size="8.5" fill="#3f8f66">省内存、快；但要小心别名（aliasing）副作用</text>
  <rect x="538" y="200" width="434" height="44" rx="9" fill="#fff7e6" stroke="#f0dcae"/><text x="554" y="220" font-size="9.5" fill="#7a4d00">contiguous：某些 op 要求连续内存</text><text x="554" y="236" font-size="8.5" fill="#9a7328">非连续（如转置后）→ .contiguous() 触发拷贝重排</text>
  <text x="538" y="268" font-size="9" fill="#5aa06f">transpose 只是交换 stride，不搬数据——所以极快</text>

  <!-- 广播 -->
  <rect x="30" y="302" width="960" height="122" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="326" font-size="12.5" font-weight="600" fill="#1d1d1f">广播（broadcasting）· dtype/device 提升</text>
  <text x="48" y="350" font-size="10.5" fill="#494950">• <tspan font-weight="600">广播</tspan>：形状不同的张量做逐元素运算时，从尾维对齐、大小为 1 的维自动扩展（不真复制）——如 (32,10)+(10,) → (32,10)。</text>
  <text x="48" y="372" font-size="10.5" fill="#494950">• <tspan font-weight="600">dtype 提升</tspan>：混合类型运算按规则提升（int + float → float），避免精度意外丢失。</text>
  <text x="48" y="394" font-size="10.5" fill="#494950">• <tspan font-weight="600">device</tspan>：算子要求所有输入同 device；`.to('cuda')` / `.cpu()` 显式搬运（跨设备算会报错）。</text>
  <text x="48" y="416" font-size="9.5" fill="#86868b">这些"自动"行为背后都由算子在 Dispatcher/ATen 里实现（见对应能力域）。</text>
</svg>
