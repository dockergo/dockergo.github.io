<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="450" viewBox="0 0 1020 450"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
    <marker id="arg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#c0392b"/>
    </marker>
  </defs>
  <rect width="1020" height="450" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">自动微分接口 · requires_grad → 前向建图 → backward → .grad</text>

  <!-- 前向建图 -->
  <rect x="30" y="56" width="620" height="240" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="80" font-size="12.5" font-weight="600" fill="#1d1d1f">前向：可微算子边算边连反向图</text>
  <rect x="60" y="100" width="120" height="40" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="120" y="120" font-size="9" fill="#0f5132" text-anchor="middle">W (requires_grad)</text><text x="120" y="134" font-size="8" fill="#3f8f66" text-anchor="middle">叶子/参数</text>
  <rect x="60" y="160" width="120" height="36" rx="9" fill="#f6f6f8" stroke="#e2e2e7"/><text x="120" y="182" font-size="9" fill="#494950" text-anchor="middle">x（输入）</text>
  <rect x="240" y="128" width="120" height="40" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="300" y="148" font-size="9" fill="#1b2a4a" text-anchor="middle">y = x @ W</text><text x="300" y="162" font-size="8" fill="#5b7db1" text-anchor="middle">grad_fn=MmBackward</text>
  <rect x="420" y="128" width="120" height="40" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="480" y="148" font-size="9" fill="#1b2a4a" text-anchor="middle">z = relu(y)</text><text x="480" y="162" font-size="8" fill="#5b7db1" text-anchor="middle">grad_fn=ReluBackward</text>
  <rect x="560" y="128" width="70" height="40" rx="9" fill="#fbeaea" stroke="#f0cccc"/><text x="595" y="148" font-size="9" fill="#7d1f1f" text-anchor="middle">loss</text><text x="595" y="162" font-size="8" fill="#b06a6a" text-anchor="middle">=z.sum()</text>
  <line x1="180" y1="120" x2="240" y2="140" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="180" y1="178" x2="240" y2="150" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="360" y1="148" x2="420" y2="148" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="540" y1="148" x2="560" y2="148" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="48" y="222" font-size="9.5" fill="#494950">每个输出张量带 grad_fn（谁生的它），grad_fn 记住输入——反向图自动连成（define-by-run）</text>
  <text x="48" y="244" font-size="9.5" fill="#494950">只有涉及 requires_grad 张量的算子才建节点；其余不建（省开销）</text>
  <text x="48" y="268" font-size="9" fill="#86868b">前向没有"额外一步"——建图是算子执行的副产物（见 Autograd 能力域）</text>

  <!-- backward -->
  <rect x="670" y="56" width="320" height="240" rx="14" fill="#fbeaea" stroke="#f0cccc" filter="url(#soft)"/>
  <text x="688" y="80" font-size="12.5" font-weight="600" fill="#7d1f1f">loss.backward()</text>
  <rect x="688" y="96" width="284" height="46" rx="9" fill="#ffffff" stroke="#f0cccc"/><text x="830" y="116" font-size="9" fill="#7d1f1f" text-anchor="middle">从 loss 沿反向图逆序遍历</text><text x="830" y="132" font-size="8" fill="#b06a6a" text-anchor="middle">每个 grad_fn 算局部梯度</text>
  <line x1="595" y1="168" x2="595" y2="200" stroke="#c0392b" stroke-width="1.4" marker-end="url(#arg)"/>
  <text x="608" y="190" font-size="8" fill="#c0392b">反向 ↓</text>
  <rect x="688" y="152" width="284" height="46" rx="9" fill="#ffffff" stroke="#f0cccc"/><text x="830" y="172" font-size="9" fill="#7d1f1f" text-anchor="middle">链式法则累积</text><text x="830" y="188" font-size="8" fill="#b06a6a" text-anchor="middle">∂loss/∂W 传到叶子</text>
  <rect x="688" y="208" width="284" height="46" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="830" y="228" font-size="9" fill="#0f5132" text-anchor="middle">写入 W.grad</text><text x="830" y="244" font-size="8" fill="#3f8f66" text-anchor="middle">optimizer 据此更新 W</text>
  <text x="688" y="278" font-size="8.5" fill="#c99">图默认用完释放（retain_graph 可留）</text>

  <!-- 梯度模式 -->
  <rect x="30" y="312" width="960" height="122" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="48" y="336" font-size="12.5" font-weight="600" fill="#1b2a4a">梯度上下文（控制建不建图）</text>
  <rect x="48" y="352" width="300" height="66" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="198" y="374" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">torch.no_grad()</text><text x="198" y="394" font-size="8.5" fill="#5b7db1" text-anchor="middle">推理/更新参数时不建图</text><text x="198" y="410" font-size="8.5" fill="#5b7db1" text-anchor="middle">省内存省时间</text>
  <rect x="364" y="352" width="300" height="66" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="514" y="374" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">detach()</text><text x="514" y="394" font-size="8.5" fill="#5b7db1" text-anchor="middle">把张量从图里"剪断"</text><text x="514" y="410" font-size="8.5" fill="#5b7db1" text-anchor="middle">停止梯度回传</text>
  <rect x="680" y="352" width="290" height="66" rx="9" fill="#fff7e6" stroke="#f0dcae"/><text x="825" y="374" font-size="9.5" font-weight="600" fill="#7a4d00" text-anchor="middle">grad 累加要清零</text><text x="825" y="394" font-size="8.5" fill="#9a7328" text-anchor="middle">.grad 默认累加</text><text x="825" y="410" font-size="8.5" fill="#9a7328" text-anchor="middle">每步先 opt.zero_grad()</text>
</svg>
