<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="360" viewBox="0 0 1020 360"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
  </defs>
  <rect width="1020" height="360" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">接口 × 能力域 依赖矩阵（■ 强　▨ 中　· 弱/无）</text>

  <text x="216" y="70" font-size="9" font-weight="600" fill="#7a4d00" text-anchor="middle">张量存储</text>
  <text x="298" y="70" font-size="9" font-weight="600" fill="#1b2a4a" text-anchor="middle">Dispatcher</text>
  <text x="380" y="70" font-size="9" font-weight="600" fill="#0f5132" text-anchor="middle">ATen算子</text>
  <text x="462" y="70" font-size="9" font-weight="600" fill="#3c1361" text-anchor="middle">autograd引擎</text>
  <text x="544" y="70" font-size="9" font-weight="600" fill="#7d1f1f" text-anchor="middle">设备内存</text>
  <text x="626" y="70" font-size="9" font-weight="600" fill="#1b2a4a" text-anchor="middle">编译栈</text>
  <text x="708" y="70" font-size="9" font-weight="600" fill="#0f5132" text-anchor="middle">分布式</text>
  <text x="790" y="70" font-size="9" font-weight="600" fill="#7a4d00" text-anchor="middle">数据加载</text>

  <text x="55" y="126" font-size="11" font-weight="600" fill="#3c1361">张量编程</text>
  <text x="55" y="196" font-size="11" font-weight="600" fill="#3c1361">自动微分</text>
  <text x="55" y="266" font-size="11" font-weight="600" fill="#3c1361">建模训练</text>

  <!-- cells x centers 216..790 step 82 w70; y tops 100,170,240 h54 -->
  <!-- 张量编程 -->
  <g>
    <rect x="181" y="100" width="70" height="54" rx="9" fill="#e8d49a" stroke="#f0dcae"/><text x="216" y="132" font-size="12" fill="#7a4d00" text-anchor="middle">■</text>
    <rect x="263" y="100" width="70" height="54" rx="9" fill="#dfe8f5" stroke="#bcd0ec"/><text x="298" y="132" font-size="12" fill="#1b2a4a" text-anchor="middle">■</text>
    <rect x="345" y="100" width="70" height="54" rx="9" fill="#cfe8da" stroke="#bce6cd"/><text x="380" y="132" font-size="12" fill="#0f5132" text-anchor="middle">■</text>
    <rect x="427" y="100" width="70" height="54" rx="9" fill="#f6f6f8" stroke="#e2e2e7"/><text x="462" y="132" font-size="12" fill="#c0c0c5" text-anchor="middle"></text>
    <rect x="509" y="100" width="70" height="54" rx="9" fill="#f3d4d4" stroke="#f0cccc"/><text x="544" y="132" font-size="12" fill="#7d1f1f" text-anchor="middle">■</text>
    <rect x="591" y="100" width="70" height="54" rx="9" fill="#f6f6f8" stroke="#e2e2e7"/><text x="626" y="132" font-size="12" fill="#c0c0c5" text-anchor="middle"></text>
    <rect x="673" y="100" width="70" height="54" rx="9" fill="#f6f6f8" stroke="#e2e2e7"/><text x="708" y="132" font-size="12" fill="#c0c0c5" text-anchor="middle"></text>
    <rect x="755" y="100" width="70" height="54" rx="9" fill="#f6f6f8" stroke="#e2e2e7"/><text x="790" y="132" font-size="12" fill="#c0c0c5" text-anchor="middle"></text>
  </g>
  <!-- 自动微分 -->
  <g>
    <rect x="181" y="170" width="70" height="54" rx="9" fill="#f2e7c6" stroke="#f0dcae"/><text x="216" y="202" font-size="12" fill="#7a4d00" text-anchor="middle">▨</text>
    <rect x="263" y="170" width="70" height="54" rx="9" fill="#dfe8f5" stroke="#bcd0ec"/><text x="298" y="202" font-size="12" fill="#1b2a4a" text-anchor="middle">■</text>
    <rect x="345" y="170" width="70" height="54" rx="9" fill="#dcefe4" stroke="#bce6cd"/><text x="380" y="202" font-size="12" fill="#0f5132" text-anchor="middle">▨</text>
    <rect x="427" y="170" width="70" height="54" rx="9" fill="#e3d5f3" stroke="#d9c9ef"/><text x="462" y="202" font-size="12" fill="#3c1361" text-anchor="middle">■</text>
    <rect x="509" y="170" width="70" height="54" rx="9" fill="#fbeaea" stroke="#f0cccc"/><text x="544" y="202" font-size="12" fill="#7d1f1f" text-anchor="middle">▨</text>
    <rect x="591" y="170" width="70" height="54" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="626" y="202" font-size="12" fill="#1b2a4a" text-anchor="middle">▨</text>
    <rect x="673" y="170" width="70" height="54" rx="9" fill="#f6f6f8" stroke="#e2e2e7"/><text x="708" y="202" font-size="12" fill="#c0c0c5" text-anchor="middle"></text>
    <rect x="755" y="170" width="70" height="54" rx="9" fill="#f6f6f8" stroke="#e2e2e7"/><text x="790" y="202" font-size="12" fill="#c0c0c5" text-anchor="middle"></text>
  </g>
  <!-- 建模训练 -->
  <g>
    <rect x="181" y="240" width="70" height="54" rx="9" fill="#f2e7c6" stroke="#f0dcae"/><text x="216" y="272" font-size="12" fill="#7a4d00" text-anchor="middle">▨</text>
    <rect x="263" y="240" width="70" height="54" rx="9" fill="#f6f6f8" stroke="#e2e2e7"/><text x="298" y="272" font-size="12" fill="#c0c0c5" text-anchor="middle"></text>
    <rect x="345" y="240" width="70" height="54" rx="9" fill="#dcefe4" stroke="#bce6cd"/><text x="380" y="272" font-size="12" fill="#0f5132" text-anchor="middle">▨</text>
    <rect x="427" y="240" width="70" height="54" rx="9" fill="#e3d5f3" stroke="#d9c9ef"/><text x="462" y="272" font-size="12" fill="#3c1361" text-anchor="middle">■</text>
    <rect x="509" y="240" width="70" height="54" rx="9" fill="#fbeaea" stroke="#f0cccc"/><text x="544" y="272" font-size="12" fill="#7d1f1f" text-anchor="middle">▨</text>
    <rect x="591" y="240" width="70" height="54" rx="9" fill="#dfe8f5" stroke="#bcd0ec"/><text x="626" y="272" font-size="12" fill="#1b2a4a" text-anchor="middle">■</text>
    <rect x="673" y="240" width="70" height="54" rx="9" fill="#cfe8da" stroke="#bce6cd"/><text x="708" y="272" font-size="12" fill="#0f5132" text-anchor="middle">■</text>
    <rect x="755" y="240" width="70" height="54" rx="9" fill="#e8d49a" stroke="#f0dcae"/><text x="790" y="272" font-size="12" fill="#7a4d00" text-anchor="middle">■</text>
  </g>

  <text x="30" y="326" font-size="10.5" fill="#86868b">张量编程 = 存储+Dispatcher+算子+设备；自动微分强依赖 autograd 引擎与 Dispatcher（Autograd key）；建模训练调用面最广，连 autograd/编译/分布式/数据加载。</text>
  <text x="30" y="346" font-size="10.5" fill="#494950">灵魂：<tspan font-weight="600" fill="#1b2a4a">Dispatcher 分发</tspan>（所有算子必经）与 <tspan font-weight="600" fill="#3c1361">autograd 引擎</tspan>（可微性根基）——两条几乎被所有接口依赖。</text>
</svg>
