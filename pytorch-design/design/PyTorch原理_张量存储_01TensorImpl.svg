<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="440" viewBox="0 0 1020 440"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">TensorImpl 解剖 · 张量的内核表示（c10/core/TensorImpl.h:510）</text>

  <!-- 三层 -->
  <rect x="30" y="56" width="300" height="330" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="48" y="80" font-size="12" font-weight="600" fill="#1b2a4a">Tensor（用户句柄）</text>
  <text x="48" y="102" font-size="9.5" fill="#5b7db1">薄壳：intrusive_ptr&lt;TensorImpl&gt;</text>
  <text x="48" y="120" font-size="9.5" fill="#5b7db1">拷贝 Tensor = 加引用计数</text>
  <rect x="48" y="136" width="264" height="230" rx="10" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="180" y="158" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">TensorImpl（intrusive_ptr_target）</text>
  <text x="64" y="182" font-size="9" fill="#5b7db1">· sizes_and_strides_（形状+步长）</text>
  <text x="64" y="204" font-size="9" fill="#5b7db1">· storage_offset_（起始偏移）</text>
  <text x="64" y="226" font-size="9" fill="#5b7db1">· data_type_（dtype）</text>
  <text x="64" y="248" font-size="9" fill="#5b7db1">· device / layout</text>
  <text x="64" y="270" font-size="9" fill="#5b7db1">· key_set_（DispatchKeySet！）</text>
  <text x="64" y="292" font-size="9" fill="#5b7db1">· autograd_meta_（可选，含 grad_fn/grad）</text>
  <text x="64" y="314" font-size="9" fill="#5b7db1">· storage_（指向 StorageImpl）</text>
  <text x="64" y="338" font-size="8.5" fill="#8fa9cf">引用计数嵌在对象内（intrusive）省一次分配</text>
  <text x="64" y="356" font-size="8.5" fill="#8fa9cf">元信息小、拷贝廉价</text>

  <!-- storage -->
  <rect x="360" y="56" width="300" height="330" rx="14" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="378" y="80" font-size="12" font-weight="600" fill="#7a4d00">StorageImpl（底层内存）</text>
  <rect x="378" y="96" width="264" height="50" rx="10" fill="#ffffff" stroke="#f0dcae"/><text x="510" y="118" font-size="9.5" fill="#7a4d00" text-anchor="middle">data_ptr_：指向真实字节</text><text x="510" y="134" font-size="8.5" fill="#9a7328" text-anchor="middle">DataPtr（含删除器/设备）</text>
  <rect x="378" y="154" width="264" height="50" rx="10" fill="#ffffff" stroke="#f0dcae"/><text x="510" y="176" font-size="9.5" fill="#7a4d00" text-anchor="middle">allocator_：谁分配的</text><text x="510" y="192" font-size="8.5" fill="#9a7328" text-anchor="middle">CPU 分配器 / CUDACachingAllocator</text>
  <rect x="378" y="212" width="264" height="50" rx="10" fill="#ffffff" stroke="#f0dcae"/><text x="510" y="234" font-size="9.5" fill="#7a4d00" text-anchor="middle">nbytes_：字节数 + 引用计数</text>
  <rect x="378" y="270" width="264" height="96" rx="10" fill="#fdfdf5" stroke="#f0dcae"/><text x="510" y="292" font-size="9.5" font-weight="600" fill="#7a4d00" text-anchor="middle">多个 TensorImpl 可共享一个 Storage</text><text x="510" y="314" font-size="8.5" fill="#9a7328" text-anchor="middle">view/transpose/切片 → 新 TensorImpl</text><text x="510" y="332" font-size="8.5" fill="#9a7328" text-anchor="middle">但共享同一 StorageImpl</text><text x="510" y="352" font-size="8.5" fill="#b8912e" text-anchor="middle">Storage 引用计数归零才真正释放内存</text>

  <!-- 意义 -->
  <rect x="690" y="56" width="300" height="330" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="708" y="80" font-size="12" font-weight="600" fill="#1d1d1f">两个关键设计</text>
  <rect x="708" y="96" width="264" height="130" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="840" y="118" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">① key_set 在张量上</text><text x="708" y="140" font-size="8.5" fill="#3f8f66">每个张量带 DispatchKeySet</text><text x="708" y="160" font-size="8.5" fill="#3f8f66">（记录它是 CPU/CUDA、</text><text x="708" y="180" font-size="8.5" fill="#3f8f66">是否需 autograd 等）</text><text x="708" y="202" font-size="8.5" fill="#3f8f66">→ 算子据此分发（下一域）</text>
  <rect x="708" y="240" width="264" height="126" rx="10" fill="#f4eefb" stroke="#d9c9ef"/><text x="840" y="262" font-size="10" font-weight="600" fill="#3c1361" text-anchor="middle">② 元信息与数据分离</text><text x="708" y="284" font-size="8.5" fill="#7a5aa8">TensorImpl（视图）轻、Storage（数据）重</text><text x="708" y="304" font-size="8.5" fill="#7a5aa8">→ view 零拷贝、拷贝张量廉价</text><text x="708" y="324" font-size="8.5" fill="#7a5aa8">→ 内存靠引用计数自动管理</text><text x="708" y="346" font-size="8.5" fill="#a58fc9">这是"视图共享存储"的底层根源</text>

  <line x1="330" y1="250" x2="360" y2="250" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="332" y="242" font-size="8" fill="#86868b">storage_</text>
</svg>
