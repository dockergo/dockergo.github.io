<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="660" viewBox="0 0 1320 660"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1320" height="660" fill="#fbfbfd"/>
  <rect x="0" y="0" width="1020" height="44" fill="transparent" data-tid="PyTorch原理_全景主线框架" data-lab="全景总览"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">PyTorch 总架构 · 一个算子调用穿过的分层栈（Python → 分发 → 后端）</text>

  <!-- 贯穿示例 -->
  <rect x="30" y="48" width="960" height="42" rx="11" fill="#f6f6f8" stroke="#e2e2e7" data-tid="PyTorch原理_接口_建模与训练" data-lab="贯穿示例·一步训练"/>
  <text x="46" y="65" font-size="10.5" font-weight="600" fill="#1d1d1f">贯穿示例</text>
  <text x="46" y="83" font-size="10" fill="#494950" font-family="monospace">y = model(x); loss = loss_fn(y, t); loss.backward; opt.step   # 一步训练：前向→算损失→反向求梯度→更新权重</text>

  <!-- Python 层 -->
  <rect x="30" y="104" width="960" height="72" rx="14" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="48" y="128" font-size="12" font-weight="600" fill="#3c1361">① Python 前端（用户代码 + torch/nn/optim）</text>
  <rect x="48" y="140" width="220" height="28" rx="7" fill="#ffffff" stroke="#d9c9ef" data-tid="PyTorch原理_接口_张量编程" data-lab="张量编程"/><text x="158" y="159" font-size="9" fill="#3c1361" text-anchor="middle">torch.* / nn.Module / Tensor</text>
  <rect x="280" y="140" width="220" height="28" rx="7" fill="#ffffff" stroke="#d9c9ef" data-tid="PyTorch原理_接口_自动微分" data-lab="自动微分"/><text x="390" y="159" font-size="9" fill="#3c1361" text-anchor="middle">autograd（requires_grad）</text>
  <rect x="512" y="140" width="220" height="28" rx="7" fill="#ffffff" stroke="#d9c9ef" data-tid="PyTorch原理_支撑_编译栈" data-lab="编译栈"/><text x="622" y="159" font-size="9" fill="#3c1361" text-anchor="middle">torch.compile（可选）</text>
  <rect x="744" y="140" width="226" height="28" rx="7" fill="#ffffff" stroke="#d9c9ef" data-tid="PyTorch原理_支撑_Dispatcher分发" data-lab="下到C++·入分发"/><text x="857" y="159" font-size="9" fill="#3c1361" text-anchor="middle">经 pybind 下到 C++</text>

  <!-- Dispatcher -->
  <rect x="30" y="192" width="960" height="120" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)" data-tid="PyTorch原理_支撑_Dispatcher分发" data-lab="Dispatcher分层分发"/>
  <text x="48" y="216" font-size="12.5" font-weight="600" fill="#1b2a4a">② Dispatcher · 一次算子调用的分层分发（Dispatcher.h:71）—— 灵魂</text>
  <rect x="48" y="230" width="200" height="66" rx="10" fill="#ffffff" stroke="#bcd0ec"/><text x="148" y="252" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Autograd key</text><text x="148" y="270" font-size="8.5" fill="#5b7db1" text-anchor="middle">记反向图节点</text><text x="148" y="285" font-size="8.5" fill="#5b7db1" text-anchor="middle">再 redispatch 下一层</text>
  <rect x="264" y="230" width="200" height="66" rx="10" fill="#ffffff" stroke="#bcd0ec"/><text x="364" y="252" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Autocast / 其它</text><text x="364" y="270" font-size="8.5" fill="#5b7db1" text-anchor="middle">混合精度等切面</text><text x="364" y="285" font-size="8.5" fill="#5b7db1" text-anchor="middle">按 DispatchKeySet 逐层</text>
  <rect x="480" y="230" width="200" height="66" rx="10" fill="#ffffff" stroke="#bcd0ec"/><text x="580" y="252" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Backend key</text><text x="580" y="270" font-size="8.5" fill="#5b7db1" text-anchor="middle">CPU / CUDA / …</text><text x="580" y="285" font-size="8.5" fill="#5b7db1" text-anchor="middle">选真正算的 kernel</text>
  <rect x="696" y="230" width="274" height="66" rx="10" fill="#f6f9fd" stroke="#cfe0f2"/><text x="833" y="252" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">一次调用穿多层 key</text><text x="833" y="270" font-size="8.5" fill="#5b7db1" text-anchor="middle">每个算子 = 一张按 key 索引</text><text x="833" y="285" font-size="8.5" fill="#5b7db1" text-anchor="middle">的 kernel 表</text>

  <!-- ATen -->
  <rect x="30" y="328" width="960" height="88" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)" data-tid="PyTorch原理_支撑_ATen算子库" data-lab="ATen算子库"/>
  <text x="48" y="352" font-size="12.5" font-weight="600" fill="#0f5132">③ ATen 算子库（~2000 算子，native_functions.yaml 声明 schema）</text>
  <rect x="48" y="366" width="300" height="38" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="198" y="390" font-size="9.5" fill="#0f5132" text-anchor="middle">算子 schema：名/参数/返回/别名规则</text>
  <rect x="364" y="366" width="300" height="38" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="514" y="390" font-size="9.5" fill="#0f5132" text-anchor="middle">structured kernel：形状推导 + 计算分离</text>
  <rect x="680" y="366" width="290" height="38" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="825" y="390" font-size="9.5" fill="#0f5132" text-anchor="middle">复合算子拆成更基础的算子</text>

  <!-- 后端 + 内存 -->
  <rect x="30" y="432" width="600" height="120" rx="14" fill="#fbeaea" stroke="#f0cccc" filter="url(#soft)" data-tid="PyTorch原理_支撑_设备后端与内存" data-lab="设备后端·数值计算"/>
  <text x="48" y="456" font-size="12.5" font-weight="600" fill="#7d1f1f">④ 设备后端 · 真正的数值计算</text>
  <rect x="48" y="470" width="270" height="66" rx="10" fill="#ffffff" stroke="#f0cccc"/><text x="183" y="492" font-size="9.5" font-weight="600" fill="#7d1f1f" text-anchor="middle">CPU kernel</text><text x="183" y="510" font-size="8.5" fill="#b06a6a" text-anchor="middle">向量化 / OpenMP 并行</text><text x="183" y="526" font-size="8.5" fill="#b06a6a" text-anchor="middle">调 MKL/oneDNN</text>
  <rect x="330" y="470" width="288" height="66" rx="10" fill="#ffffff" stroke="#f0cccc"/><text x="474" y="492" font-size="9.5" font-weight="600" fill="#7d1f1f" text-anchor="middle">CUDA kernel</text><text x="474" y="510" font-size="8.5" fill="#b06a6a" text-anchor="middle">GPU 并行 · 调 cuBLAS/cuDNN</text><text x="474" y="526" font-size="8.5" fill="#b06a6a" text-anchor="middle">异步 stream 提交</text>

  <rect x="650" y="432" width="340" height="120" rx="14" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="668" y="456" font-size="12.5" font-weight="600" fill="#7a4d00">⑤ 内存与设备管理</text>
  <rect x="668" y="470" width="304" height="30" rx="8" fill="#ffffff" stroke="#f0dcae" data-tid="PyTorch原理_支撑_设备后端与内存" data-lab="显存分配器"/><text x="820" y="490" font-size="9" fill="#7a4d00" text-anchor="middle">CUDACachingAllocator：显存池化复用</text>
  <rect x="668" y="504" width="304" height="30" rx="8" fill="#ffffff" stroke="#f0dcae" data-tid="PyTorch原理_支撑_张量与存储" data-lab="Storage共享"/><text x="820" y="524" font-size="9" fill="#7a4d00" text-anchor="middle">Storage 引用计数 · view 共享底层</text>

  <!-- backward 回环 -->
  <rect x="30" y="568" width="960" height="80" rx="14" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)" data-tid="PyTorch原理_支撑_自动微分引擎" data-lab="backward反向图"/>
  <text x="48" y="592" font-size="12" font-weight="600" fill="#3c1361">backward：沿前向时建好的反向图逆序遍历（autograd engine.cpp:1294），对每个 Node 调其反向算子——又走一遍 ②③④</text>
  <text x="48" y="616" font-size="10" fill="#7a5aa8">前向每个可微算子留下 grad_fn 节点连成图；backward 从 loss 出发反向拓扑执行、链式累积梯度到叶子（参数）的 .grad</text>
  <text x="48" y="636" font-size="9" fill="#a58fc9">opt.step 再用 .grad 更新参数——一步训练闭环</text>

  <line x1="510" y1="176" x2="510" y2="192" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="510" y1="312" x2="510" y2="328" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="330" y1="416" x2="330" y2="432" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- ===== 训练规模化支撑列（右侧新增） ===== -->
  <!-- 数据加载：训练输入侧，喂 batch 进贯穿示例 -->
  <rect x="1030" y="104" width="270" height="180" rx="14" fill="#e6f6f8" stroke="#b3dde3" stroke-width="1.4" filter="url(#soft)" data-tid="PyTorch原理_支撑_数据加载" data-lab="数据加载"/>
  <text x="1046" y="128" font-size="12.5" font-weight="700" fill="#0b5563">数据加载 · DataLoader 流水线</text>
  <text x="1046" y="150" font-size="8.7" fill="#3a7c84">Dataset __getitem__：出单样本（读盘/解码）</text>
  <text x="1046" y="169" font-size="8.7" fill="#3a7c84">Sampler：定取样顺序 / 分布式分片</text>
  <text x="1046" y="188" font-size="8.7" fill="#3a7c84">num_workers 子进程绕 GIL 并行预取</text>
  <text x="1046" y="207" font-size="8.7" fill="#3a7c84">collate_fn 拼 batch · pin_memory 加速</text>
  <text x="1046" y="226" font-size="8.7" fill="#3a7c84">目标：worker 备下一批，GPU 永不等数据</text>
  <text x="1046" y="252" font-size="8" fill="#93c2c8">src: torch/utils/data/</text>

  <!-- 分布式训练：多设备/通信侧，梯度同步到设备后端 -->
  <rect x="1030" y="432" width="270" height="216" rx="14" fill="#fbecf5" stroke="#edc6df" stroke-width="1.4" filter="url(#soft)" data-tid="PyTorch原理_支撑_分布式训练" data-lab="分布式训练"/>
  <text x="1046" y="456" font-size="12.5" font-weight="700" fill="#7a1f5f">分布式训练 · 多卡/多机</text>
  <text x="1046" y="480" font-size="8.7" fill="#9c4a80">DDP：每卡复制模型，all-reduce 同步梯度</text>
  <text x="1046" y="500" font-size="8.7" fill="#9c4a80">梯度分桶 + 计算/通信 overlap（近免费）</text>
  <text x="1046" y="520" font-size="8.7" fill="#9c4a80">FSDP：参数/梯度/优化器态分片省显存</text>
  <text x="1046" y="540" font-size="8.7" fill="#9c4a80">ProcessGroup(NCCL/Gloo) + collective</text>
  <text x="1046" y="560" font-size="8.7" fill="#9c4a80">DistributedSampler 各 rank 不重叠</text>
  <text x="1046" y="584" font-size="8" fill="#c58fb2">src: torch/distributed/,</text>
  <text x="1046" y="596" font-size="8" fill="#c58fb2">     torch/nn/parallel/distributed.py</text>

  <!-- 支撑连线：数据加载 → 贯穿示例（喂 batch）；分布式训练 → 设备后端（梯度同步） -->
  <polyline points="1150,104 1150,69 994,69" fill="none" stroke="#7fbcc4" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="1156" y="88" font-size="8.5" fill="#3a7c84">喂 batch</text>
  <text x="1011" y="486" font-size="7.5" fill="#9c4a80" text-anchor="middle">梯度同步</text>
  <line x1="1030" y1="494" x2="993" y2="494" stroke="#c58fb2" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#ar)"/>
</svg>
