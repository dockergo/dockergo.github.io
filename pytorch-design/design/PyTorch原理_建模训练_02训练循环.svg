<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="440" viewBox="0 0 1020 440"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">训练循环 · 五步闭环（贯穿示例的完整形态）</text>

  <rect x="30" y="52" width="960" height="46" rx="11" fill="#f6f6f8" stroke="#e2e2e7"/>
  <text x="46" y="80" font-size="10" fill="#494950" font-family="monospace">for x,t in loader:  y=model(x);  loss=loss_fn(y,t);  opt.zero_grad();  loss.backward();  opt.step()</text>

  <!-- 五步 -->
  <rect x="40" y="120" width="170" height="90" rx="11" fill="#fff7e6" stroke="#f0dcae"/><text x="125" y="146" font-size="10.5" font-weight="600" fill="#7a4d00" text-anchor="middle">① 取一批数据</text><text x="125" y="168" font-size="8.5" fill="#9a7328" text-anchor="middle">DataLoader 迭代</text><text x="125" y="184" font-size="8.5" fill="#9a7328" text-anchor="middle">(x, t) 搬到 GPU</text><text x="125" y="200" font-size="8" fill="#b8912e" text-anchor="middle">worker 后台预取</text>
  <rect x="230" y="120" width="170" height="90" rx="11" fill="#eef3fb" stroke="#bcd0ec"/><text x="315" y="146" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">② 前向</text><text x="315" y="168" font-size="8.5" fill="#5b7db1" text-anchor="middle">y = model(x)</text><text x="315" y="184" font-size="8.5" fill="#5b7db1" text-anchor="middle">建反向图</text><text x="315" y="200" font-size="8.5" fill="#5b7db1" text-anchor="middle">loss = loss_fn(y,t)</text>
  <rect x="420" y="120" width="170" height="90" rx="11" fill="#f4eefb" stroke="#d9c9ef"/><text x="505" y="146" font-size="10.5" font-weight="600" fill="#3c1361" text-anchor="middle">③ 清零梯度</text><text x="505" y="168" font-size="8.5" fill="#7a5aa8" text-anchor="middle">opt.zero_grad()</text><text x="505" y="184" font-size="8.5" fill="#7a5aa8" text-anchor="middle">.grad 默认累加</text><text x="505" y="200" font-size="8.5" fill="#7a5aa8" text-anchor="middle">不清会叠加上一步</text>
  <rect x="610" y="120" width="170" height="90" rx="11" fill="#fbeaea" stroke="#f0cccc"/><text x="695" y="146" font-size="10.5" font-weight="600" fill="#7d1f1f" text-anchor="middle">④ 反向</text><text x="695" y="168" font-size="8.5" fill="#b06a6a" text-anchor="middle">loss.backward()</text><text x="695" y="184" font-size="8.5" fill="#b06a6a" text-anchor="middle">autograd 引擎遍历图</text><text x="695" y="200" font-size="8.5" fill="#b06a6a" text-anchor="middle">填每个参数 .grad</text>
  <rect x="800" y="120" width="180" height="90" rx="11" fill="#eafaf1" stroke="#bce6cd"/><text x="890" y="146" font-size="10.5" font-weight="600" fill="#0f5132" text-anchor="middle">⑤ 更新</text><text x="890" y="168" font-size="8.5" fill="#3f8f66" text-anchor="middle">opt.step()</text><text x="890" y="184" font-size="8.5" fill="#3f8f66" text-anchor="middle">按 .grad 调参数</text><text x="890" y="200" font-size="8.5" fill="#3f8f66" text-anchor="middle">SGD/Adam 规则</text>
  <line x1="210" y1="165" x2="230" y2="165" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="400" y1="165" x2="420" y2="165" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="590" y1="165" x2="610" y2="165" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="780" y1="165" x2="800" y2="165" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <path d="M890,210 L890,240 L125,240 L125,210" fill="none" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="480" y="234" font-size="9" fill="#86868b">下一批，循环</text>

  <!-- 组件 -->
  <rect x="30" y="264" width="470" height="170" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="288" font-size="12" font-weight="600" fill="#1d1d1f">三大配角</text>
  <rect x="48" y="304" width="434" height="36" rx="8" fill="#fff7e6" stroke="#f0dcae"/><text x="64" y="326" font-size="9" fill="#7a4d00">DataLoader：批 + shuffle + 多 worker 预取（喂满 GPU）</text>
  <rect x="48" y="346" width="434" height="36" rx="8" fill="#fbeaea" stroke="#f0cccc"/><text x="64" y="368" font-size="9" fill="#7d1f1f">loss_fn：把预测与标签算成一个标量 loss（反向起点）</text>
  <rect x="48" y="388" width="434" height="36" rx="8" fill="#eafaf1" stroke="#bce6cd"/><text x="64" y="410" font-size="9" fill="#0f5132">optimizer：持有参数引用，用 .grad 按算法更新（含动量/学习率）</text>

  <!-- 关键点 -->
  <rect x="520" y="264" width="470" height="170" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="538" y="288" font-size="12" font-weight="600" fill="#1b2a4a">易错点</text>
  <text x="538" y="312" font-size="9.5" fill="#5b7db1">· 忘 zero_grad → 梯度累加、训练发散</text>
  <text x="538" y="332" font-size="9.5" fill="#5b7db1">· 推理忘 no_grad / eval() → 白建图、BN/dropout 错</text>
  <text x="538" y="352" font-size="9.5" fill="#5b7db1">· 在 loss 上 .item() 取标量再记录（否则拖着整张图不释放）</text>
  <text x="538" y="372" font-size="9.5" fill="#5b7db1">· step 前必须 backward，否则 .grad 为空</text>
  <text x="538" y="392" font-size="9.5" fill="#5b7db1">· CUDA 计时要 synchronize（异步执行）</text>
  <text x="538" y="416" font-size="9" fill="#8fa9cf">这五步是几乎所有 PyTorch 训练脚本的骨架</text>
</svg>
