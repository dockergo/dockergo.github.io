<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="410" viewBox="0 0 1020 410"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="410" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Guards 与重编译 · 编译产物在什么条件下能复用</text>

  <!-- guards -->
  <rect x="30" y="56" width="470" height="180" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="48" y="80" font-size="12.5" font-weight="600" fill="#1b2a4a">Guards（复用条件）</text>
  <text x="48" y="102" font-size="9.5" fill="#5b7db1">Dynamo 编译时记录一组"假设"：</text>
  <rect x="48" y="114" width="434" height="30" rx="8" fill="#ffffff" stroke="#bcd0ec"/><text x="265" y="134" font-size="8.5" fill="#1b2a4a" text-anchor="middle">输入张量的 dtype / device / 形状（或符号形状）</text>
  <rect x="48" y="150" width="434" height="30" rx="8" fill="#ffffff" stroke="#bcd0ec"/><text x="265" y="170" font-size="8.5" fill="#1b2a4a" text-anchor="middle">Python 变量的类型 / 常量值 / 分支走向</text>
  <text x="48" y="202" font-size="9.5" fill="#5b7db1">下次调用先查 guards：全满足 → 直接用缓存的编译产物</text>
  <text x="48" y="222" font-size="9.5" fill="#5b7db1">任一不满足 → 重新编译（新一份产物）</text>

  <!-- 重编译 -->
  <rect x="520" y="56" width="470" height="180" rx="14" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="538" y="80" font-size="12.5" font-weight="600" fill="#7a4d00">重编译（recompile）的触发与代价</text>
  <text x="538" y="102" font-size="9.5" fill="#9a7328">· 形状频繁变（如变长序列）→ 反复重编译很贵</text>
  <text x="538" y="122" font-size="9.5" fill="#9a7328">· dynamic=True / 动态形状：用符号形状少重编译</text>
  <text x="538" y="142" font-size="9.5" fill="#9a7328">· 按值分支多 → guards 多、命中率低</text>
  <rect x="538" y="156" width="434" height="30" rx="8" fill="#ffffff" stroke="#f0dcae"/><text x="755" y="176" font-size="8.5" fill="#7a4d00" text-anchor="middle">recompile 上限保护，超限告警/回退</text>
  <text x="538" y="210" font-size="9" fill="#b8912e">首次编译有开销，稳定形状下摊薄后净赚</text>

  <!-- 流程 -->
  <rect x="30" y="252" width="960" height="140" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="276" font-size="12.5" font-weight="600" fill="#1d1d1f">每次调用 compiled 函数</text>
  <rect x="48" y="292" width="220" height="80" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="158" y="316" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">查 guards</text><text x="158" y="336" font-size="8.5" fill="#5b7db1" text-anchor="middle">当前输入满足假设？</text><text x="158" y="354" font-size="8.5" fill="#5b7db1" text-anchor="middle">（快速检查）</text>
  <rect x="300" y="292" width="300" height="80" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="450" y="316" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">满足 → 跑缓存 kernel（快路径）</text><text x="450" y="336" font-size="8.5" fill="#3f8f66" text-anchor="middle">无需再走 Dynamo/编译</text><text x="450" y="354" font-size="8.5" fill="#3f8f66" text-anchor="middle">这是编译收益的来源</text>
  <rect x="632" y="292" width="338" height="80" rx="10" fill="#fbeaea" stroke="#f0cccc"/><text x="801" y="316" font-size="9.5" font-weight="600" fill="#7d1f1f" text-anchor="middle">不满足 → 重编译（慢路径）</text><text x="801" y="336" font-size="8.5" fill="#b06a6a" text-anchor="middle">再走 Dynamo→AOT→Inductor</text><text x="801" y="354" font-size="8.5" fill="#b06a6a" text-anchor="middle">形状抖动大时是性能杀手</text>
  <line x1="268" y1="332" x2="300" y2="332" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="600" y1="332" x2="632" y2="332" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
</svg>
