<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="450" viewBox="0 0 1020 450"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="450" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Dispatcher 分层分发 · 一次算子调用如何选对 kernel（Dispatcher.h:71）</text>

  <!-- 分发链 -->
  <rect x="30" y="52" width="960" height="180" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="76" font-size="12.5" font-weight="600" fill="#1d1d1f">torch.add(a, b) 的分发之旅</text>
  <rect x="48" y="92" width="150" height="56" rx="9" fill="#f4eefb" stroke="#d9c9ef"/><text x="123" y="114" font-size="9" fill="#3c1361" text-anchor="middle">算子 add</text><text x="123" y="132" font-size="8" fill="#7a5aa8" text-anchor="middle">查它的 kernel 表</text>
  <rect x="214" y="92" width="180" height="56" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="304" y="110" font-size="9" font-weight="600" fill="#1b2a4a" text-anchor="middle">算 DispatchKeySet</text><text x="304" y="128" font-size="8" fill="#5b7db1" text-anchor="middle">= 输入张量 key 的并集</text><text x="304" y="142" font-size="8" fill="#5b7db1" text-anchor="middle">取最高优先 key</text>
  <rect x="410" y="92" width="170" height="56" rx="9" fill="#fbeaea" stroke="#f0cccc"/><text x="495" y="110" font-size="9" font-weight="600" fill="#7d1f1f" text-anchor="middle">Autograd kernel</text><text x="495" y="128" font-size="8" fill="#b06a6a" text-anchor="middle">记反向节点</text><text x="495" y="142" font-size="8" fill="#b06a6a" text-anchor="middle">redispatch 去掉 Autograd key</text>
  <rect x="596" y="92" width="170" height="56" rx="9" fill="#fff7e6" stroke="#f0dcae"/><text x="681" y="110" font-size="9" font-weight="600" fill="#7a4d00" text-anchor="middle">Autocast 等切面</text><text x="681" y="128" font-size="8" fill="#9a7328" text-anchor="middle">按需转精度</text><text x="681" y="142" font-size="8" fill="#9a7328" text-anchor="middle">再 redispatch</text>
  <rect x="782" y="92" width="188" height="56" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="876" y="110" font-size="9" font-weight="600" fill="#0f5132" text-anchor="middle">Backend kernel</text><text x="876" y="128" font-size="8" fill="#3f8f66" text-anchor="middle">CUDA/CPU 真正算</text><text x="876" y="142" font-size="8" fill="#3f8f66" text-anchor="middle">返回结果</text>
  <line x1="198" y1="120" x2="214" y2="120" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="394" y1="120" x2="410" y2="120" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="580" y1="120" x2="596" y2="120" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="766" y1="120" x2="782" y2="120" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="48" y="176" font-size="9.5" fill="#494950">关键：一次调用<tspan font-weight="600"> 逐层穿过多个 key</tspan>，每层做一件横切事（autograd/autocast/…）再 redispatch 到下一层，最后落到后端算。</text>
  <text x="48" y="198" font-size="9.5" fill="#494950">"自动微分""混合精度""设备选择"都不是 if-else 硬编码在算子里，而是<tspan font-weight="600"> 独立的分发层</tspan>——可插拔、可组合。</text>
  <text x="48" y="220" font-size="9" fill="#86868b">redispatch：调用时"划掉"当前 key，从下一优先级 key 继续（Dispatcher.h:198）</text>

  <!-- 优先级 -->
  <rect x="30" y="252" width="470" height="180" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="48" y="276" font-size="12" font-weight="600" fill="#1b2a4a">DispatchKey 分优先级（DispatchKey.h）</text>
  <text x="48" y="300" font-size="9.5" fill="#5b7db1">功能键（高→低）：Autograd → Autocast → …</text>
  <text x="48" y="320" font-size="9.5" fill="#5b7db1">后端键：CPU / CUDA / MPS / XPU / Sparse…</text>
  <text x="48" y="340" font-size="9.5" fill="#5b7db1">别名键：Autograd 是 AutogradCPU/CUDA 的别名</text>
  <rect x="48" y="352" width="434" height="30" rx="8" fill="#ffffff" stroke="#bcd0ec"/><text x="265" y="372" font-size="8.5" fill="#1b2a4a" text-anchor="middle">优先级保证：先做 autograd 记账，再选后端算</text>
  <text x="48" y="404" font-size="9" fill="#8fa9cf">张量的 key_set 决定它触发哪些层（如无 requires_grad 就不走 Autograd）</text>

  <!-- 注册 -->
  <rect x="520" y="252" width="470" height="180" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="538" y="276" font-size="12" font-weight="600" fill="#0f5132">kernel 注册：算子 × key → 函数</text>
  <text x="538" y="300" font-size="9.5" fill="#3f8f66">每个算子有一张 (DispatchKey → kernel) 表</text>
  <rect x="538" y="312" width="200" height="30" rx="7" fill="#ffffff" stroke="#bce6cd"/><text x="638" y="332" font-size="8.5" fill="#0f5132" text-anchor="middle">add[CPU] → cpu kernel</text>
  <rect x="750" y="312" width="220" height="30" rx="7" fill="#ffffff" stroke="#bce6cd"/><text x="860" y="332" font-size="8.5" fill="#0f5132" text-anchor="middle">add[CUDA] → cuda kernel</text>
  <rect x="538" y="348" width="432" height="30" rx="7" fill="#ffffff" stroke="#bce6cd"/><text x="754" y="368" font-size="8.5" fill="#0f5132" text-anchor="middle">TORCH_LIBRARY / m.impl(...) 注册；扩展/新后端也这样挂进来</text>
  <text x="538" y="404" font-size="9" fill="#5aa06f">可 boxed（统一签名，慢通用）或 unboxed（直调，快）；扩展新设备只需注册对应 key 的 kernel</text>
</svg>
