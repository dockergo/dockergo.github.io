<svg xmlns="http://www.w3.org/2000/svg" width="920" height="560" viewBox="0 0 920 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="920" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">页分配器 + arena · 虚存组织与连续页查找</text>

  <!-- top: arena strip (amber storage) -->
  <rect x="40" y="60" width="840" height="150" rx="13" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <text x="56" y="84" font-size="12.5" font-weight="600" fill="#6b4e16">堆按 arena 组织 · 向 OS 申请虚存的单位</text>
  <text x="56" y="102" font-size="10.5" fill="#a9822f">64 位平台每个 arena 约 64MB，内部再切成 8KB 的页</text>

  <!-- arena blocks -->
  <g>
    <rect x="56" y="116" width="150" height="52" rx="8" fill="#ffffff" stroke="#e6cd94"/>
    <text x="131" y="138" font-size="10.5" font-weight="600" fill="#6b4e16" text-anchor="middle">arena 0</text>
    <text x="131" y="155" font-size="9" fill="#a9822f" text-anchor="middle">64MB / 8192 页</text>
    <rect x="214" y="116" width="150" height="52" rx="8" fill="#ffffff" stroke="#e6cd94"/>
    <text x="289" y="138" font-size="10.5" font-weight="600" fill="#6b4e16" text-anchor="middle">arena 1</text>
    <text x="289" y="155" font-size="9" fill="#a9822f" text-anchor="middle">64MB / 8192 页</text>
    <rect x="372" y="116" width="150" height="52" rx="8" fill="#ffffff" stroke="#e6cd94"/>
    <text x="447" y="138" font-size="10.5" font-weight="600" fill="#6b4e16" text-anchor="middle">arena 2</text>
    <text x="447" y="155" font-size="9" fill="#a9822f" text-anchor="middle">64MB / 8192 页</text>
    <rect x="530" y="116" width="90" height="52" rx="8" fill="#f6f6f7" stroke="#e2e2e7"/>
    <text x="575" y="146" font-size="14" fill="#a3a3a8" text-anchor="middle">···</text>
  </g>
  <!-- heapArena metadata -->
  <rect x="636" y="116" width="228" height="52" rx="8" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="750" y="136" font-size="10.5" font-weight="600" fill="#1d4a2b" text-anchor="middle">每 arena 一份 heapArena 元数据</text>
  <text x="750" y="153" font-size="9" fill="#4a8c60" text-anchor="middle">bitmap / spans[] / 供 GC 反查</text>
  <text x="56" y="192" font-size="9.5" fill="#c6a45f">mheap.go:268</text>

  <!-- left: arenas L1xL2 map (blue coordination) -->
  <rect x="40" y="232" width="400" height="240" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="56" y="256" font-size="12.5" font-weight="600" fill="#1b2a4a">地址 → heapArena：mheap.arenas 两级映射</text>
  <text x="56" y="275" font-size="10.5" fill="#5b7db1">任意堆地址拆成 (L1 索引, L2 索引)</text>

  <!-- address -->
  <rect x="56" y="288" width="368" height="30" rx="8" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="240" y="307" font-size="10.5" fill="#1b2a4a" text-anchor="middle" font-family="monospace">堆地址 ptr</text>
  <line x1="150" y1="318" x2="130" y2="342" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="330" y1="318" x2="350" y2="342" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- L1 -->
  <rect x="56" y="346" width="150" height="44" rx="8" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="131" y="365" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">arenas[L1]</text>
  <text x="131" y="381" font-size="9" fill="#5b7db1" text-anchor="middle">一级指针数组</text>
  <!-- L2 -->
  <rect x="274" y="346" width="150" height="44" rx="8" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="349" y="365" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">[L2]</text>
  <text x="349" y="381" font-size="9" fill="#5b7db1" text-anchor="middle">二级 heapArena 表</text>
  <line x1="206" y1="368" x2="270" y2="368" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- result -->
  <line x1="349" y1="390" x2="349" y2="414" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="240" y="418" width="184" height="40" rx="8" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="332" y="437" font-size="10.5" font-weight="600" fill="#1d4a2b" text-anchor="middle">*heapArena</text>
  <text x="332" y="452" font-size="9" fill="#4a8c60" text-anchor="middle">拿到该地址的 span / bitmap</text>
  <text x="56" y="437" font-size="10.5" fill="#5b7db1">大多平台 L1 只有 1 项，</text>
  <text x="56" y="454" font-size="10.5" fill="#5b7db1">实际近似一级大表。</text>

  <!-- right: page allocator radix summary (purple rule) -->
  <rect x="460" y="232" width="420" height="240" rx="13" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <text x="476" y="256" font-size="12.5" font-weight="600" fill="#3d2a5a">页分配器 pageAlloc · radix 摘要树找连续页</text>
  <text x="476" y="275" font-size="10.5" fill="#7d5bb1">mpagealloc.go:15 · 管理 arena 内的空闲页</text>

  <!-- radix tree -->
  <rect x="620" y="288" width="120" height="34" rx="7" fill="#ffffff" stroke="#ddcdf0"/>
  <text x="680" y="309" font-size="9.5" fill="#3d2a5a" text-anchor="middle">L0 · 每项 16GiB</text>
  <rect x="540" y="336" width="120" height="30" rx="7" fill="#ffffff" stroke="#ddcdf0"/>
  <text x="600" y="355" font-size="9.5" fill="#3d2a5a" text-anchor="middle">L1 摘要</text>
  <rect x="700" y="336" width="120" height="30" rx="7" fill="#ffffff" stroke="#ddcdf0"/>
  <text x="760" y="355" font-size="9.5" fill="#3d2a5a" text-anchor="middle">L1 摘要</text>
  <rect x="540" y="380" width="120" height="30" rx="7" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="600" y="399" font-size="9.5" fill="#1d4a2b" text-anchor="middle">页位图 chunk</text>
  <rect x="700" y="380" width="120" height="30" rx="7" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="760" y="399" font-size="9.5" fill="#1d4a2b" text-anchor="middle">页位图 chunk</text>
  <!-- tree links -->
  <line x1="668" y1="322" x2="600" y2="336" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="692" y1="322" x2="760" y2="336" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="600" y1="366" x2="600" y2="380" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="760" y1="366" x2="760" y2="380" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>

  <text x="476" y="432" font-size="10.5" fill="#7d5bb1">每项 pallocSum 记「起/中/末最大连续空闲页」，</text>
  <text x="476" y="450" font-size="10.5" fill="#7d5bb1">自顶向下剪枝定位连续 N 页，比线性扫位图快得多。</text>
  <text x="476" y="466" font-size="9.5" fill="#a58fce">pageAlloc.alloc mpagealloc.go:879 · find :654</text>

  <!-- bottom flow strip -->
  <rect x="40" y="490" width="840" height="52" rx="12" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="56" y="513" font-size="11" font-weight="600" fill="#1d1d1f">切 span 流程</text>
  <text x="56" y="532" font-size="10" fill="#6e6e73">mheap 需 span → 页分配器找连续空闲页 → 标记占用 → 关联到某 size class；空 span 归还时页标空闲、可被 scavenger 归还 OS</text>
</svg>
