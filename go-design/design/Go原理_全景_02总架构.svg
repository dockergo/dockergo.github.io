<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="980" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">总架构 · 从 .go 源到一个 goroutine 在跑</text>
  <text x="30" y="48" font-size="11" fill="#6e6e73">一条纵贯线：编译期工具链把源程序静态编译进单一二进制 → 运行期 runtime 引导并把 goroutine 调度到 M×P 上　源码基准 go1.26.4</text>

  <!-- ================= COMPILE ZONE ================= -->
  <rect x="24" y="62" width="932" height="200" rx="14" fill="#f4f7fc" stroke="#d5e0f0"/>
  <text x="40" y="82" font-size="12" font-weight="600" fill="#1b2a4a">编译期 · 工具链　离线 · 多进程并行 · 可缓存</text>

  <!-- C1 source -->
  <rect x="40" y="92" width="104" height="156" rx="11" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="52" y="118" font-size="12" font-weight="600" fill="#1d1d1f">源程序</text>
  <text x="52" y="134" font-size="9" fill="#6e6e73">.go 源文件</text>
  <text x="52" y="164" font-size="9.5" fill="#3a3a3c">包 / 导入</text>
  <text x="52" y="184" font-size="9.5" fill="#3a3a3c">函数 / 类型</text>
  <text x="52" y="204" font-size="9.5" fill="#3a3a3c">声明 / 语句</text>
  <line x1="146" y1="170" x2="160" y2="170" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- C2 frontend -->
  <rect x="162" y="92" width="192" height="156" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="174" y="118" font-size="12.5" font-weight="600" fill="#1b2a4a">gc 前端</text>
  <text x="174" y="134" font-size="9" fill="#5b7db1">cmd/compile · 前端</text>
  <rect x="172" y="144" width="172" height="28" rx="7" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="182" y="162" font-size="10" fill="#1b2a4a">syntax.Parse → AST</text>
  <rect x="172" y="176" width="172" height="28" rx="7" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="182" y="194" font-size="10" fill="#1b2a4a">types2 类型检查</text>
  <rect x="172" y="208" width="172" height="28" rx="7" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="182" y="226" font-size="10" fill="#1b2a4a">noder 建 Unified IR</text>
  <line x1="356" y1="170" x2="370" y2="170" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- C3 mid/backend -->
  <rect x="372" y="92" width="222" height="156" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="384" y="118" font-size="12.5" font-weight="600" fill="#1b2a4a">SSA 中后端</text>
  <text x="384" y="134" font-size="9" fill="#5b7db1">cmd/compile · 机器无关 → 机器相关</text>
  <rect x="382" y="144" width="202" height="24" rx="7" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="392" y="160" font-size="10" fill="#1b2a4a">逃逸分析 · 定栈 / 堆</text>
  <rect x="382" y="172" width="202" height="24" rx="7" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="392" y="188" font-size="10" fill="#1b2a4a">内联 inl · 跨函数展开</text>
  <rect x="382" y="200" width="202" height="24" rx="7" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="392" y="216" font-size="10" fill="#1b2a4a">buildssa → ~60 遍 SSA pass</text>
  <rect x="382" y="228" width="202" height="20" rx="6" fill="#fdf6ec" stroke="#f0dcaf"/>
  <text x="392" y="242" font-size="9.5" fill="#6b4e16">genssa → 机器码</text>
  <line x1="596" y1="170" x2="610" y2="170" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- C4 linker -->
  <rect x="612" y="92" width="170" height="156" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="624" y="118" font-size="12.5" font-weight="600" fill="#1b2a4a">链接器</text>
  <text x="624" y="134" font-size="9" fill="#5b7db1">cmd/link · ld.Main</text>
  <rect x="622" y="144" width="150" height="28" rx="7" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="632" y="162" font-size="10" fill="#1b2a4a">死代码 flood fill</text>
  <rect x="622" y="176" width="150" height="28" rx="7" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="632" y="194" font-size="10" fill="#1b2a4a">符号布局 / 重定位</text>
  <rect x="622" y="208" width="150" height="28" rx="7" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="632" y="226" font-size="10" fill="#1b2a4a">pclntab 生成</text>
  <line x1="784" y1="170" x2="798" y2="170" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- C5 binary (amber artifact) -->
  <rect x="800" y="92" width="140" height="156" rx="11" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <text x="812" y="118" font-size="11.5" font-weight="600" fill="#6b4e16">单一可执行文件</text>
  <text x="812" y="134" font-size="9" fill="#a9822f">自包含二进制</text>
  <text x="812" y="162" font-size="9.5" fill="#6b4e16">runtime · GC</text>
  <text x="812" y="180" font-size="9.5" fill="#6b4e16">调度器 全链接入</text>
  <text x="812" y="198" font-size="9.5" fill="#6b4e16">无 VM · 无解释器</text>
  <text x="812" y="216" font-size="9.5" fill="#6b4e16">无部署依赖</text>

  <!-- ================= handoff cable ================= -->
  <path d="M870,248 L870,274 L90,274 L90,316" fill="none" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/>
  <rect x="416" y="264" width="148" height="20" rx="10" fill="#ffffff" stroke="#d0d0d6"/>
  <text x="490" y="278" font-size="9.5" fill="#6e6e73" text-anchor="middle">交付 → OS exec 加载运行</text>

  <!-- ================= RUNTIME ZONE ================= -->
  <rect x="24" y="290" width="932" height="206" rx="14" fill="#f3faf5" stroke="#cfe6d6"/>
  <text x="40" y="310" font-size="12" font-weight="600" fill="#1d4a2b">运行期 · runtime　单进程内 · GC 托管 · GMP 用户态 M:N 调度</text>

  <!-- R1 OS load -->
  <rect x="40" y="318" width="100" height="160" rx="11" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="52" y="344" font-size="12" font-weight="600" fill="#1d1d1f">OS 加载</text>
  <text x="52" y="360" font-size="9" fill="#6e6e73">exec</text>
  <text x="52" y="388" font-size="9.5" fill="#3a3a3c">映射段 / 入口</text>
  <text x="52" y="408" font-size="9.5" fill="#3a3a3c">跳入 _rt0</text>
  <text x="52" y="428" font-size="9.5" fill="#3a3a3c">runtime 启动</text>
  <line x1="142" y1="398" x2="154" y2="398" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- R2 runtime boot (green) -->
  <rect x="156" y="318" width="176" height="160" rx="11" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="168" y="344" font-size="12.5" font-weight="600" fill="#1d4a2b">runtime 引导</text>
  <text x="168" y="360" font-size="9" fill="#4a8c60">rt0_go → schedinit</text>
  <rect x="166" y="368" width="156" height="24" rx="7" fill="#ffffff" stroke="#cbe6d3"/>
  <text x="176" y="384" font-size="10" fill="#1d4a2b">创建 g0 / m0</text>
  <rect x="166" y="396" width="156" height="24" rx="7" fill="#ffffff" stroke="#cbe6d3"/>
  <text x="176" y="412" font-size="10" fill="#1d4a2b">初始化 P × GOMAXPROCS</text>
  <rect x="166" y="424" width="156" height="24" rx="7" fill="#ffffff" stroke="#cbe6d3"/>
  <text x="176" y="440" font-size="10" fill="#1d4a2b">schedinit 调度器</text>
  <rect x="166" y="452" width="156" height="20" rx="6" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="176" y="466" font-size="9.5" fill="#1b2a4a">启动 sysmon（不占 P）</text>
  <line x1="334" y1="398" x2="346" y2="398" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- R3 main goroutine (green) -->
  <rect x="348" y="318" width="120" height="160" rx="11" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="360" y="344" font-size="11.5" font-weight="600" fill="#1d4a2b">main goroutine</text>
  <text x="360" y="360" font-size="9" fill="#4a8c60">runtime.main</text>
  <text x="360" y="388" font-size="9.5" fill="#1d4a2b">造首个 G 起跑</text>
  <text x="360" y="408" font-size="9.5" fill="#1d4a2b">被调度选中</text>
  <text x="360" y="428" font-size="9.5" fill="#1d4a2b">→ 用户 main.main</text>
  <line x1="470" y1="398" x2="482" y2="398" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- R4 go stmt (green) -->
  <rect x="484" y="318" width="142" height="160" rx="11" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="496" y="344" font-size="12.5" font-weight="600" fill="#1d4a2b">go 语句</text>
  <text x="496" y="360" font-size="9" fill="#4a8c60">newproc 造 G</text>
  <text x="496" y="388" font-size="9.5" fill="#1d4a2b">新建 G（2KB 栈）</text>
  <text x="496" y="408" font-size="9.5" fill="#1d4a2b">入 P 本地 runq</text>
  <text x="496" y="428" font-size="9.5" fill="#1d4a2b">满则甩半入全局</text>
  <line x1="628" y1="398" x2="640" y2="398" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- R5 GMP scheduler (blue) -->
  <rect x="642" y="318" width="150" height="160" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="654" y="344" font-size="12.5" font-weight="600" fill="#1b2a4a">GMP 调度器</text>
  <text x="654" y="360" font-size="8.5" fill="#5b7db1">schedule / findRunnable</text>
  <text x="654" y="388" font-size="9.5" fill="#1b2a4a">派 G → M×P 执行</text>
  <text x="654" y="408" font-size="9.5" fill="#1b2a4a">本地 → 全局 → 偷取</text>
  <text x="654" y="428" font-size="9.5" fill="#1b2a4a">阻塞则 park / handoff</text>
  <line x1="794" y1="398" x2="806" y2="398" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- R6 runtime services -->
  <rect x="808" y="318" width="132" height="160" rx="11" fill="#f6f6f7" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="820" y="344" font-size="11.5" font-weight="600" fill="#1d1d1f">运行时服务</text>
  <text x="820" y="360" font-size="9" fill="#6e6e73">goroutine 运行中</text>
  <rect x="818" y="366" width="112" height="32" rx="7" fill="#fdf6ec" stroke="#f0dcaf"/>
  <text x="828" y="380" font-size="10" font-weight="600" fill="#6b4e16">mallocgc</text>
  <text x="828" y="392" font-size="8.5" fill="#a9822f">堆对象分配</text>
  <rect x="818" y="402" width="112" height="32" rx="7" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="828" y="416" font-size="10" font-weight="600" fill="#1d4a2b">GC 并发回收</text>
  <text x="828" y="428" font-size="8.5" fill="#4a8c60">三色标记 · 写屏障</text>
  <rect x="818" y="438" width="112" height="32" rx="7" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="828" y="452" font-size="10" font-weight="600" fill="#1b2a4a">channel 同步</text>
  <text x="828" y="464" font-size="8.5" fill="#5b7db1">park / goready</text>
</svg>
