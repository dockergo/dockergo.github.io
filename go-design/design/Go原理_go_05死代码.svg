<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="arG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#4a8c60"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="920" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">死代码消除 · 从入口的可达性 flood fill</text>

  <!-- intro (blue) -->
  <rect x="30" y="50" width="860" height="46" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="70" font-size="12" font-weight="600" fill="#1b2a4a">deadcode (deadcode.go:443) · 剔除不可达符号，减小二进制体积</text>
  <text x="46" y="88" font-size="10" fill="#5b7db1">从入口出发，顺符号引用图洪泛标记（flood），未标记的不进最终二进制</text>

  <!-- flood fill graph (green container) -->
  <rect x="30" y="112" width="560" height="300" rx="13" fill="#f6f6f7" stroke="#e2e2e7"/>
  <text x="46" y="134" font-size="11" font-weight="600" fill="#1d1d1f">可达性 flood fill（顺引用图走 · deadcode.go:136）</text>

  <!-- entry nodes (green) -->
  <rect x="56" y="152" width="150" height="48" rx="10" fill="#eef7f0" stroke="#4a8c60" stroke-width="1.5"/>
  <text x="131" y="174" font-size="10.5" font-weight="600" fill="#1d4a2b" text-anchor="middle">main.main</text>
  <text x="131" y="190" font-size="9" fill="#4a8c60" text-anchor="middle">入口</text>

  <rect x="56" y="216" width="150" height="48" rx="10" fill="#eef7f0" stroke="#4a8c60" stroke-width="1.5"/>
  <text x="131" y="238" font-size="10.5" font-weight="600" fill="#1d4a2b" text-anchor="middle">runtime init</text>
  <text x="131" y="254" font-size="9" fill="#4a8c60" text-anchor="middle">入口</text>

  <!-- reachable nodes (green) -->
  <rect x="256" y="152" width="130" height="44" rx="10" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="321" y="178" font-size="10" fill="#1d4a2b" text-anchor="middle">helper A（可达）</text>

  <rect x="256" y="220" width="130" height="44" rx="10" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="321" y="246" font-size="10" fill="#1d4a2b" text-anchor="middle">helper B（可达）</text>

  <rect x="426" y="186" width="130" height="44" rx="10" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="491" y="212" font-size="10" fill="#1d4a2b" text-anchor="middle">used()（可达）</text>

  <!-- dead node (red) -->
  <rect x="256" y="316" width="130" height="44" rx="10" fill="#fbeeee" stroke="#f0c4c4" stroke-dasharray="4 3"/>
  <text x="321" y="336" font-size="10" fill="#7a1f1f" text-anchor="middle">unused()</text>
  <text x="321" y="351" font-size="8.5" fill="#b15b5b" text-anchor="middle">未标记 → 不进二进制</text>

  <rect x="426" y="316" width="130" height="44" rx="10" fill="#fbeeee" stroke="#f0c4c4" stroke-dasharray="4 3"/>
  <text x="491" y="336" font-size="10" fill="#7a1f1f" text-anchor="middle">deadDep()</text>
  <text x="491" y="351" font-size="8.5" fill="#b15b5b" text-anchor="middle">被剔除</text>

  <!-- flood edges (green) -->
  <line x1="206" y1="174" x2="254" y2="174" stroke="#4a8c60" stroke-width="1.5" marker-end="url(#arG)"/>
  <line x1="206" y1="240" x2="254" y2="240" stroke="#4a8c60" stroke-width="1.5" marker-end="url(#arG)"/>
  <line x1="386" y1="180" x2="424" y2="200" stroke="#4a8c60" stroke-width="1.5" marker-end="url(#arG)"/>
  <line x1="386" y1="238" x2="424" y2="216" stroke="#4a8c60" stroke-width="1.5" marker-end="url(#arG)"/>
  <!-- dead edge (gray dashed, unreachable) -->
  <line x1="321" y1="360" x2="321" y2="314" stroke="#d2d2d7" stroke-width="1.3" stroke-dasharray="3 3" marker-end="url(#ar)"/>
  <text x="406" y="392" font-size="9.5" fill="#b15b5b" text-anchor="middle">无入边可达 → 死代码</text>

  <!-- legend (lower-left, clear area) -->
  <rect x="56" y="312" width="14" height="14" rx="3" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="78" y="324" font-size="9.5" fill="#4a8c60">可达（保留）</text>
  <rect x="56" y="340" width="14" height="14" rx="3" fill="#fbeeee" stroke="#f0c4c4"/>
  <text x="78" y="352" font-size="9.5" fill="#b15b5b">不可达（剔除）</text>

  <!-- right: interface method handling (purple) -->
  <rect x="610" y="112" width="280" height="176" rx="13" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <text x="626" y="136" font-size="12" font-weight="600" fill="#3d2a5a">接口方法处理 · markMethod</text>
  <text x="626" y="154" font-size="10" fill="#7d5bb1">deadcode.go:395</text>
  <text x="626" y="178" font-size="10.5" fill="#7d5bb1">接口方法可能被动态调用，</text>
  <text x="626" y="196" font-size="10.5" fill="#7d5bb1">不能简单按静态引用判定。</text>
  <rect x="626" y="210" width="248" height="62" rx="9" fill="#ffffff" stroke="#ddcdf0"/>
  <text x="640" y="232" font-size="10" fill="#3d2a5a">只有"其接口被用到"的方法才保留</text>
  <text x="640" y="252" font-size="10" fill="#7d5bb1">避免把所有类型的所有方法</text>
  <text x="640" y="268" font-size="10" fill="#7d5bb1">都拖进二进制（防爆炸）</text>

  <!-- right: result (green) -->
  <rect x="610" y="300" width="280" height="112" rx="13" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="626" y="324" font-size="12" font-weight="600" fill="#1d4a2b">结果</text>
  <text x="626" y="346" font-size="10.5" fill="#4a8c60">只链接真正用到的代码</text>
  <text x="626" y="366" font-size="10.5" fill="#4a8c60">import 大包但只用一个函数：</text>
  <text x="626" y="384" font-size="10.5" fill="#4a8c60">理想情况只有那函数及其依赖</text>
  <text x="626" y="402" font-size="10" fill="#4a8c60">进二进制</text>

  <!-- anchor bar -->
  <rect x="30" y="426" width="860" height="76" rx="12" fill="#f6f6f7" stroke="#e2e2e7"/>
  <text x="46" y="450" font-size="11" font-weight="600" fill="#1d1d1f">机制小结</text>
  <text x="46" y="472" font-size="10.5" fill="#3a3a3c">从入口 flood fill 标记可达符号 → 未标记不进二进制；接口方法用 markMethod（仅接口被用到才保留）防爆炸。</text>
  <text x="46" y="492" font-size="10" fill="#6e6e73">锚点：deadcode deadcode.go:443 · flood deadcode.go:136 · markMethod deadcode.go:395 · 注释 deadcode.go:402</text>
</svg>
