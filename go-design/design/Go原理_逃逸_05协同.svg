<svg xmlns="http://www.w3.org/2000/svg" width="900" height="490" viewBox="0 0 900 490" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
    <marker id="arG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#4a8c60"/>
    </marker>
  </defs>
  <rect width="900" height="490" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">逃逸与内联协同 · 内联先于逃逸，相互增强</text>

  <!-- order in gc.Main (blue) -->
  <rect x="30" y="50" width="840" height="72" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="74" font-size="12" font-weight="600" fill="#1b2a4a">gc.Main 相位顺序：内联 先于 逃逸分析</text>
  <rect x="360" y="82" width="200" height="30" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="460" y="102" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">内联 (main.go:259)</text>
  <line x1="560" y1="97" x2="612" y2="97" stroke="#c7c7cc" stroke-width="1.6" marker-end="url(#ar)"/>
  <rect x="614" y="82" width="220" height="30" rx="8" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="724" y="102" font-size="10.5" font-weight="600" fill="#1d4a2b" text-anchor="middle">逃逸分析 (main.go:294)</text>
  <text x="180" y="102" font-size="10" fill="#5b7db1" text-anchor="middle">先展开跨函数视野</text>

  <!-- mechanism 1: inline opens escape (green) -->
  <rect x="30" y="140" width="410" height="200" rx="13" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="46" y="164" font-size="12" font-weight="600" fill="#1d4a2b">① 内联打开逃逸优化</text>

  <rect x="46" y="180" width="378" height="46" rx="9" fill="#ffffff" stroke="#bfe0c8"/>
  <text x="60" y="200" font-size="10.5" fill="#3a3a3c">p := getPtr(); use(*p)</text>
  <text x="60" y="217" font-size="9.5" fill="#8e8e93">不内联：跨函数边界只能保守假设 p 逃逸 → 上堆</text>

  <line x1="235" y1="230" x2="235" y2="250" stroke="#4a8c60" stroke-width="1.6" marker-end="url(#arG)"/>
  <text x="300" y="245" font-size="9.5" fill="#4a8c60" text-anchor="middle">内联 getPtr 后</text>

  <rect x="46" y="256" width="378" height="72" rx="9" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="60" y="278" font-size="10.5" font-weight="600" fill="#1d4a2b">编译器看到指针完整生命周期</text>
  <text x="60" y="298" font-size="10" fill="#4a8c60">判定 p 不逃逸 → 留栈，零 GC 成本</text>
  <text x="60" y="316" font-size="10" fill="#4a8c60">内联越多 → 越多对象可判不逃逸</text>

  <!-- mechanism 2: escape guides caller (amber) -->
  <rect x="460" y="140" width="410" height="200" rx="13" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <text x="476" y="164" font-size="12" font-weight="600" fill="#6b4e16">② 逃逸信息指导分配</text>

  <rect x="476" y="180" width="378" height="66" rx="9" fill="#ffffff" stroke="#f0dcaf"/>
  <text x="490" y="202" font-size="10.5" fill="#3a3a3c">逃逸分析产出参数标签（parameter tags）</text>
  <text x="490" y="222" font-size="10" fill="#a9822f">记录"传进去的实参会不会逃逸"</text>
  <text x="490" y="239" font-size="10" fill="#a9822f">供调用方复用，免重分析被调函数</text>

  <line x1="665" y1="250" x2="665" y2="270" stroke="#c7c7cc" stroke-width="1.6" marker-end="url(#ar)"/>

  <rect x="476" y="276" width="378" height="52" rx="9" fill="#fdf6ec" stroke="#f0dcaf"/>
  <text x="490" y="298" font-size="10.5" font-weight="600" fill="#6b4e16">调用方据标签决定实参栈 or 堆</text>
  <text x="490" y="316" font-size="10" fill="#a9822f">跨函数逃逸信息在调用点即可复用</text>

  <!-- result (purple) -->
  <rect x="30" y="358" width="840" height="110" rx="13" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <text x="46" y="382" font-size="12.5" font-weight="600" fill="#3d2a5a">协同结果</text>
  <text x="46" y="406" font-size="11" fill="#7d5bb1">大量小对象因"内联 + 判定不逃逸"而留在栈上 → 显著降低 GC 压力。</text>
  <text x="46" y="428" font-size="11" fill="#7d5bb1">这是 Go 性能的重要来源：编译期把内存管理做进代码，运行期几乎零逃逸判定开销。</text>
  <text x="46" y="452" font-size="10" fill="#7d5bb1">锚点：内联 main.go:259 · 逃逸分析 main.go:294（内联先于逃逸，故能相互增强）</text>
</svg>
