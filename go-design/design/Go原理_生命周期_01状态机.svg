<svg xmlns="http://www.w3.org/2000/svg" width="940" height="500" viewBox="0 0 940 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
    <marker id="arG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#7ab48f"/>
    </marker>
  </defs>
  <rect width="940" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">goroutine 状态机 · 从 newproc 到 goexit，所有转换走 casgstatus 原子完成</text>
  <text x="30" y="48" font-size="11" fill="#6e6e73">状态常量块 runtime2.go:35 · casgstatus proc.go:1290 · 括号内为常量值</text>

  <!-- ==== main trunk states ==== -->
  <!-- _Gidle -->
  <rect x="34" y="96" width="128" height="58" rx="12" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="98" y="121" font-size="12" font-weight="600" fill="#1d1d1f" text-anchor="middle">_Gidle (0)</text>
  <text x="98" y="139" font-size="9.5" fill="#6e6e73" text-anchor="middle">刚分配、未初始化</text>

  <!-- _Grunnable -->
  <rect x="222" y="96" width="150" height="58" rx="12" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="297" y="121" font-size="12" font-weight="600" fill="#1d4a2b" text-anchor="middle">_Grunnable (1)</text>
  <text x="297" y="139" font-size="9.5" fill="#4a8c60" text-anchor="middle">在运行队列，待调度</text>

  <!-- _Grunning -->
  <rect x="432" y="96" width="150" height="58" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="507" y="121" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">_Grunning (2)</text>
  <text x="507" y="139" font-size="9.5" fill="#5b7db1" text-anchor="middle">某 M 上执行（持 P）</text>

  <!-- _Gwaiting -->
  <rect x="642" y="96" width="150" height="58" rx="12" fill="#f6f6f7" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="717" y="121" font-size="12" font-weight="600" fill="#6e6e73" text-anchor="middle">_Gwaiting (4)</text>
  <text x="717" y="139" font-size="9.5" fill="#8e8e93" text-anchor="middle">阻塞中，不在队列</text>

  <!-- _Gdead -->
  <rect x="432" y="250" width="150" height="58" rx="12" fill="#fbeeee" stroke="#f0c4c4" filter="url(#soft)"/>
  <text x="507" y="275" font-size="12" font-weight="600" fill="#7a1f1f" text-anchor="middle">_Gdead (6)</text>
  <text x="507" y="293" font-size="9.5" fill="#b15b5b" text-anchor="middle">已退出 / 待复用</text>

  <!-- transitions trunk -->
  <!-- idle -> runnable -->
  <line x1="162" y1="125" x2="220" y2="125" stroke="#7ab48f" stroke-width="1.5" marker-end="url(#arG)"/>
  <text x="191" y="117" font-size="9" fill="#4a8c60" text-anchor="middle">newproc</text>
  <!-- runnable -> running -->
  <line x1="372" y1="125" x2="430" y2="125" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="401" y="117" font-size="9" fill="#6e6e73" text-anchor="middle">被调度 execute</text>
  <!-- running -> waiting (gopark) -->
  <line x1="582" y1="118" x2="640" y2="118" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="611" y="110" font-size="9" fill="#6e6e73" text-anchor="middle">gopark</text>
  <!-- waiting -> runnable (goready) curved back -->
  <path d="M 700 154 L 700 186 L 297 186 L 297 156" fill="none" stroke="#7ab48f" stroke-width="1.5" marker-end="url(#arG)"/>
  <text x="500" y="180" font-size="9" fill="#4a8c60" text-anchor="middle">goready → 回 _Grunnable（就绪）</text>
  <!-- running -> dead (goexit0) -->
  <line x1="507" y1="154" x2="507" y2="248" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="558" y="205" font-size="9" fill="#6e6e73" text-anchor="middle">goexit0</text>
  <!-- dead -> runnable (reuse) -->
  <path d="M 432 279 L 210 279 L 210 156" fill="none" stroke="#7ab48f" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arG)"/>
  <text x="300" y="272" font-size="9" fill="#4a8c60" text-anchor="middle">gFree 复用（gfget · 池空才新建）</text>

  <!-- waitReason note under waiting -->
  <text x="717" y="172" font-size="9" fill="#8e8e93" text-anchor="middle">带 waitReason</text>

  <!-- ==== side branch states ==== -->
  <rect x="30" y="330" width="880" height="90" rx="13" fill="#f6f6f7" stroke="#e2e2e7"/>
  <text x="46" y="353" font-size="12" font-weight="600" fill="#1d1d1f">旁支状态 · 从 _Grunning 临时进入，完成后回原状态</text>

  <rect x="46" y="366" width="200" height="42" rx="9" fill="#ffffff" stroke="#e2e2e7"/>
  <text x="146" y="384" font-size="10.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">_Gsyscall (3)</text>
  <text x="146" y="400" font-size="9" fill="#6e6e73" text-anchor="middle">陷入系统调用</text>

  <rect x="262" y="366" width="200" height="42" rx="9" fill="#fdf6ec" stroke="#f0dcaf"/>
  <text x="362" y="384" font-size="10.5" font-weight="600" fill="#6b4e16" text-anchor="middle">_Gcopystack (8)</text>
  <text x="362" y="400" font-size="9" fill="#a9822f" text-anchor="middle">正在搬移栈（见栈管理）</text>

  <rect x="478" y="366" width="200" height="42" rx="9" fill="#fbeeee" stroke="#f0c4c4"/>
  <text x="578" y="384" font-size="10.5" font-weight="600" fill="#7a1f1f" text-anchor="middle">_Gpreempted (9)</text>
  <text x="578" y="400" font-size="9" fill="#b15b5b" text-anchor="middle">被异步抢占，待恢复</text>

  <rect x="694" y="366" width="200" height="42" rx="9" fill="#f5f0fb" stroke="#ddcdf0"/>
  <text x="794" y="384" font-size="10.5" font-weight="600" fill="#3d2a5a" text-anchor="middle">_Gscan (位 0x1000)</text>
  <text x="794" y="400" font-size="9" fill="#7d5bb1" text-anchor="middle">叠加位 · GC 正扫其栈</text>

  <!-- legend / rule (bottom) -->
  <rect x="30" y="436" width="880" height="48" rx="12" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <text x="46" y="459" font-size="11" font-weight="600" fill="#3d2a5a">主干 · newproc → _Grunnable → _Grunning →（gopark ⇄ goready 在 _Gwaiting 间往返）→ goexit0 转 _Gdead → 入 gFree 复用</text>
  <text x="46" y="476" font-size="10" fill="#7d5bb1">所有状态转换统一由 casgstatus 原子完成；_Gscan 是叠加位，可与主状态并存（如 _Gscanrunning）</text>
</svg>
