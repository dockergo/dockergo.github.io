<svg xmlns="http://www.w3.org/2000/svg" width="920" height="480" viewBox="0 0 920 480" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
    <marker id="arG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#7ab48f"/>
    </marker>
  </defs>
  <rect width="920" height="480" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">park / ready 对称 · 阻塞与唤醒是一对镜像操作</text>
  <text x="30" y="48" font-size="11" fill="#6e6e73">阻塞不占 M：gopark 解绑后 M 回 schedule 跑别的 G —— 这是 Go 高并发的核心</text>

  <!-- center: two states -->
  <rect x="360" y="76" width="200" height="52" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="460" y="99" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">_Grunning</text>
  <text x="460" y="118" font-size="9.5" fill="#5b7db1" text-anchor="middle">正在 M 上执行</text>

  <rect x="360" y="352" width="200" height="52" rx="12" fill="#f6f6f7" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="460" y="375" font-size="12" font-weight="600" fill="#6e6e73" text-anchor="middle">_Gwaiting</text>
  <text x="460" y="394" font-size="9.5" fill="#8e8e93" text-anchor="middle">挂在等待处（带 waitReason）</text>

  <!-- down arrow: gopark -->
  <line x1="430" y1="128" x2="430" y2="350" stroke="#c7c7cc" stroke-width="1.6" marker-end="url(#ar)"/>
  <!-- up arrow: goready -->
  <line x1="490" y1="350" x2="490" y2="130" stroke="#7ab48f" stroke-width="1.6" marker-end="url(#arG)"/>

  <!-- LEFT: gopark path (neutral/red - 阻塞) -->
  <rect x="30" y="150" width="360" height="176" rx="13" fill="#f6f6f7" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="46" y="174" font-size="12.5" font-weight="600" fill="#1d1d1f">gopark · 主动阻塞 (proc.go:457)</text>
  <text x="46" y="191" font-size="9.5" fill="#8e8e93">_Grunning → _Gwaiting，由并发原语调用</text>

  <rect x="46" y="202" width="328" height="34" rx="8" fill="#ffffff" stroke="#e2e2e7"/>
  <text x="60" y="223" font-size="10.5" fill="#1d1d1f">① mcall(park_m) 切到 g0 栈 <tspan fill="#8e8e93">· proc.go:4268</tspan></text>

  <rect x="46" y="242" width="328" height="34" rx="8" fill="#ffffff" stroke="#e2e2e7"/>
  <text x="60" y="263" font-size="10.5" fill="#1d1d1f">② 解绑 M：dropg，把 G 挂到等待处</text>

  <rect x="46" y="282" width="328" height="34" rx="8" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="60" y="303" font-size="10.5" fill="#1d4a2b">③ M 回 schedule 跑别的 G（M 不空转）</text>

  <!-- RIGHT: goready path (green - 就绪) -->
  <rect x="530" y="150" width="360" height="176" rx="13" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="546" y="174" font-size="12.5" font-weight="600" fill="#1d4a2b">goready · 唤醒就绪 (proc.go:493)</text>
  <text x="546" y="191" font-size="9.5" fill="#4a8c60">_Gwaiting → _Grunnable，由事件方调用</text>

  <rect x="546" y="202" width="328" height="34" rx="8" fill="#ffffff" stroke="#bfe0c8"/>
  <text x="560" y="223" font-size="10.5" fill="#1d4a2b">① 等待条件满足（如 chan 有数据、锁释放）</text>

  <rect x="546" y="242" width="328" height="34" rx="8" fill="#ffffff" stroke="#bfe0c8"/>
  <text x="560" y="263" font-size="10.5" fill="#1d4a2b">② ready 置 _Grunnable，runqput 入队 <tspan fill="#4a8c60">· 1133</tspan></text>

  <rect x="546" y="282" width="328" height="34" rx="8" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="560" y="303" font-size="10.5" fill="#1b2a4a">③ wakep 唤醒 M（若需要）→ 待再次调度</text>

  <!-- labels on center arrows -->
  <rect x="300" y="228" width="118" height="24" rx="7" fill="#fbeeee" stroke="#f0c4c4"/>
  <text x="359" y="244" font-size="10" font-weight="600" fill="#7a1f1f" text-anchor="middle">gopark ↓ 阻塞</text>
  <rect x="500" y="228" width="118" height="24" rx="7" fill="#dcefe0" stroke="#a9d3b6"/>
  <text x="559" y="244" font-size="10" font-weight="600" fill="#1d4a2b" text-anchor="middle">goready ↑ 唤醒</text>

  <!-- waitReason legend (bottom) -->
  <rect x="30" y="420" width="860" height="48" rx="12" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <text x="46" y="443" font-size="11" font-weight="600" fill="#3d2a5a">waitReason · 记录阻塞原因，pprof/schedtrace 据此定位泄漏</text>
  <text x="46" y="461" font-size="10" fill="#7d5bb1">常见：chan send/receive · select · sync.Mutex · GC assist wait · sleep —— 大量 G 卡在同一 waitReason 通常是泄漏（未关 chan / 无超时等待）</text>
</svg>
