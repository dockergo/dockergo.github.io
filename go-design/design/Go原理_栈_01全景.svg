<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
    <marker id="arA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#c9a24a"/>
    </marker>
  </defs>
  <rect width="900" height="430" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">连续栈全景 · 每 G 一段连续内存，初始 2KB、从高向低生长、按需伸缩</text>
  <text x="30" y="48" font-size="11" fill="#6e6e73">早期分段栈因「热分裂」性能问题，1.3 起改连续栈：不够则分配更大新栈整体搬移</text>

  <!-- ==== stack memory column (amber / 存储) ==== -->
  <rect x="60" y="74" width="176" height="326" rx="12" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <text x="148" y="94" font-size="11.5" font-weight="600" fill="#6b4e16" text-anchor="middle">一个 goroutine 的栈</text>

  <!-- hi -->
  <line x1="72" y1="106" x2="224" y2="106" stroke="#e2c88f" stroke-width="1.2"/>
  <text x="148" y="120" font-size="10" fill="#a9822f" text-anchor="middle">stack.hi · 高地址（栈起点）</text>
  <!-- used region -->
  <rect x="72" y="126" width="152" height="86" rx="6" fill="#f6e6c8" stroke="#e2c88f"/>
  <text x="148" y="160" font-size="10.5" font-weight="600" fill="#6b4e16" text-anchor="middle">已用栈帧</text>
  <text x="148" y="177" font-size="9.5" fill="#a9822f" text-anchor="middle">调用越深占用越多</text>
  <text x="148" y="194" font-size="9.5" fill="#a9822f" text-anchor="middle">压栈 → SP 减小</text>
  <!-- SP boundary -->
  <line x1="72" y1="212" x2="224" y2="212" stroke="#c9a24a" stroke-width="1.6" stroke-dasharray="5 3"/>
  <text x="148" y="226" font-size="10" font-weight="600" fill="#6b4e16" text-anchor="middle">SP（当前栈指针）</text>
  <!-- free / growable -->
  <rect x="72" y="234" width="152" height="96" rx="6" fill="#fffaf0" stroke="#f0dcaf"/>
  <text x="148" y="266" font-size="10" fill="#a9822f" text-anchor="middle">可用空间</text>
  <text x="148" y="283" font-size="9.5" fill="#a9822f" text-anchor="middle">（按需增长的余量）</text>
  <!-- guard band -->
  <rect x="72" y="336" width="152" height="26" rx="6" fill="#fbeeee" stroke="#f0c4c4"/>
  <text x="148" y="353" font-size="9.5" font-weight="600" fill="#7a1f1f" text-anchor="middle">stackguard0 哨兵</text>
  <!-- lo -->
  <line x1="72" y1="374" x2="224" y2="374" stroke="#e2c88f" stroke-width="1.2"/>
  <text x="148" y="390" font-size="10" fill="#a9822f" text-anchor="middle">stack.lo · 低地址（栈边界）</text>

  <!-- growth direction arrow (down) -->
  <line x1="44" y1="118" x2="44" y2="356" stroke="#c9a24a" stroke-width="1.6" marker-end="url(#arA)"/>
  <text x="30" y="240" font-size="10" fill="#a9822f" transform="rotate(-90 30 240)" text-anchor="middle">生长方向：高 → 低</text>

  <!-- ==== annotation cards (right) ==== -->
  <!-- stack struct -->
  <rect x="272" y="74" width="612" height="60" rx="12" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <text x="288" y="97" font-size="12.5" font-weight="600" fill="#6b4e16">stack{lo, hi} · 界定栈范围，初始仅 2KB（StackMin）<tspan fill="#a9822f" font-weight="400"> · runtime2.go:460</tspan></text>
  <text x="288" y="120" font-size="10.5" fill="#a9822f">远小于 OS 线程默认 8MB 栈 —— 这是「goroutine 廉价、可百万并发」的物理基础</text>

  <!-- guard0 -->
  <rect x="272" y="146" width="612" height="60" rx="12" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <text x="288" y="169" font-size="12.5" font-weight="600" fill="#3d2a5a">g.stackguard0 · 哨兵地址 = stack.lo + stackGuard<tspan fill="#7d5bb1" font-weight="400"> · runtime2.go:480</tspan></text>
  <text x="288" y="192" font-size="10.5" fill="#7d5bb1">函数序言检查「SP &lt; stackguard0 ?」逼近它就该增长（或被改写为哨兵触发抢占，见抢占图）</text>

  <!-- grow -->
  <rect x="272" y="218" width="298" height="82" rx="12" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="288" y="241" font-size="12" font-weight="600" fill="#1d4a2b">增长 grow · 每次翻倍 2×</text>
  <text x="288" y="261" font-size="10.5" fill="#4a8c60">SP 逼近 guard → 分配 2× 新栈</text>
  <text x="288" y="278" font-size="10.5" fill="#4a8c60">整体搬移旧栈内容（copystack）</text>
  <text x="288" y="294" font-size="9.5" fill="#4a8c60">stack.go:900 · 上限 maxstacksize（64位默认 1GB）</text>

  <!-- shrink -->
  <rect x="586" y="218" width="298" height="82" rx="12" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="602" y="241" font-size="12" font-weight="600" fill="#1d1d1f">收缩 shrink · 用量 &lt; 1/4</text>
  <text x="602" y="261" font-size="10.5" fill="#6e6e73">GC 扫描时若栈用量不足 1/4</text>
  <text x="602" y="278" font-size="10.5" fill="#6e6e73">缩小栈，回收多余内存省占用</text>
  <text x="602" y="294" font-size="9.5" fill="#8e8e93">shrinkstack · stack.go:1257</text>

  <!-- rule -->
  <rect x="272" y="312" width="612" height="88" rx="12" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <text x="288" y="335" font-size="12" font-weight="600" fill="#3d2a5a">铁律 · 栈整体搬移，但指针对用户透明</text>
  <text x="288" y="357" font-size="10.5" fill="#7d5bb1">因为栈会整体搬移，「指向栈变量的指针」在搬移时被 runtime 依据栈映射自动改写。</text>
  <text x="288" y="376" font-size="10.5" fill="#7d5bb1">误区：栈固定 2KB —— 错，2KB 只是初始值，会增长到 GB 级、也会被 GC 收缩。</text>
  <text x="288" y="393" font-size="10.5" fill="#7d5bb1">误区：Go 用分段栈 —— 错，1.3 起已是连续栈，别再讲「热分裂」的分段栈。</text>
</svg>
