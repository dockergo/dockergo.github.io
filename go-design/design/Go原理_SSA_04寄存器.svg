<svg xmlns="http://www.w3.org/2000/svg" width="920" height="510" viewBox="0 0 920 510" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="920" height="510" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">寄存器分配 · 线性扫描（regalloc）：按程序序扫活跃区间，不够则 spill 溢出到栈</text>

  <!-- driver -->
  <rect x="30" y="50" width="860" height="26" rx="8" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="67" font-size="10.5" font-weight="600" fill="#1b2a4a">regalloc（regalloc.go:148）· 线性扫描分配器（regalloc.go:5 注释）· 把无限 SSA 值映射到有限物理寄存器</text>

  <!-- left: linear scan timeline (blue) -->
  <rect x="30" y="92" width="470" height="290" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="116" font-size="12.5" font-weight="600" fill="#1b2a4a">线性扫描 · 沿程序顺序推进</text>
  <text x="46" y="134" font-size="10" fill="#5b7db1">每个 Value 有一段活跃区间 [def, 最后一次使用]</text>

  <!-- program order axis -->
  <line x1="70" y1="156" x2="70" y2="352" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="52" y="256" transform="rotate(-90 52 256)" font-size="9.5" fill="#8e8e93" text-anchor="middle">程序顺序 →</text>

  <!-- live intervals as bars -->
  <text x="86" y="168" font-size="9" fill="#8e8e93">v1</text>
  <rect x="104" y="160" width="150" height="16" rx="4" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="112" y="172" font-size="9" fill="#1d4a2b">R0（活跃区间短，分到寄存器）</text>

  <text x="86" y="196" font-size="9" fill="#8e8e93">v2</text>
  <rect x="104" y="188" width="270" height="16" rx="4" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="112" y="200" font-size="9" fill="#1d4a2b">R1（跨多条指令仍活跃）</text>

  <text x="86" y="224" font-size="9" fill="#8e8e93">v3</text>
  <rect x="180" y="216" width="120" height="16" rx="4" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="188" y="228" font-size="9" fill="#1d4a2b">R2</text>

  <text x="86" y="252" font-size="9" fill="#8e8e93">v4</text>
  <rect x="180" y="244" width="200" height="16" rx="4" fill="#fbeeee" stroke="#f0c4c4"/>
  <text x="188" y="256" font-size="9" fill="#7a1f1f">寄存器耗尽 → spill 到栈槽</text>

  <text x="86" y="280" font-size="9" fill="#8e8e93">v5</text>
  <rect x="230" y="272" width="150" height="16" rx="4" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="238" y="284" font-size="9" fill="#1d4a2b">R0（v1 已死，寄存器复用）</text>

  <!-- scan pointer -->
  <line x1="300" y1="150" x2="300" y2="300" stroke="#7d5bb1" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="300" y="316" font-size="9.5" fill="#7d5bb1" text-anchor="middle">扫描指针（当前位置）</text>

  <rect x="46" y="330" width="438" height="40" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="56" y="349" font-size="9.5" fill="#3a3a3c">区间不重叠即可复用同一物理寄存器；重叠且寄存器满 →</text>
  <text x="56" y="364" font-size="9.5" fill="#b15b5b">选一个溢出（spill / restore 在用时插 load/store）</text>

  <!-- right column -->
  <!-- physical registers (neutral) -->
  <rect x="516" y="92" width="374" height="120" rx="13" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="532" y="116" font-size="12" font-weight="600" fill="#1d1d1f">有限的物理寄存器</text>
  <rect x="532" y="128" width="60" height="30" rx="7" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="562" y="148" font-size="10" fill="#1d4a2b" text-anchor="middle">R0</text>
  <rect x="600" y="128" width="60" height="30" rx="7" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="630" y="148" font-size="10" fill="#1d4a2b" text-anchor="middle">R1</text>
  <rect x="668" y="128" width="60" height="30" rx="7" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="698" y="148" font-size="10" fill="#1d4a2b" text-anchor="middle">R2</text>
  <rect x="736" y="128" width="60" height="30" rx="7" fill="#f6f6f7" stroke="#e2e2e7"/>
  <text x="766" y="148" font-size="10" fill="#6e6e73" text-anchor="middle">…</text>
  <rect x="804" y="128" width="72" height="30" rx="7" fill="#fbeeee" stroke="#f0c4c4"/>
  <text x="840" y="148" font-size="10" fill="#7a1f1f" text-anchor="middle">已满</text>
  <text x="532" y="182" font-size="9.5" fill="#6e6e73">数量固定（架构决定），远少于 SSA 值数量</text>
  <text x="532" y="200" font-size="9.5" fill="#a3a3a8">分配失败即溢出，故寄存器越多溢出越少</text>

  <!-- special handling (purple) -->
  <rect x="516" y="228" width="374" height="106" rx="13" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <text x="532" y="252" font-size="12" font-weight="600" fill="#3d2a5a">额外要处理</text>
  <text x="532" y="274" font-size="10" fill="#7d5bb1">· 期望寄存器：调用约定要求实参/返回值</text>
  <text x="542" y="290" font-size="10" fill="#7d5bb1">落在特定寄存器 → 尽量满足以省搬移</text>
  <text x="532" y="312" font-size="10" fill="#7d5bb1">· 跨块 phi 一致性：合并点的 phi 值需在各</text>
  <text x="542" y="328" font-size="10" fill="#7d5bb1">前驱块把值放到同一寄存器/栈位</text>

  <!-- spill target: stack (amber) -->
  <rect x="516" y="350" width="374" height="70" rx="13" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <text x="532" y="374" font-size="12" font-weight="600" fill="#6b4e16">溢出目标 · 函数栈帧</text>
  <text x="532" y="394" font-size="10" fill="#a9822f">spill 把值存到栈槽，用时再 load 回寄存器</text>
  <text x="532" y="411" font-size="9.5" fill="#c6a45f">多一次内存往返，故仅在寄存器不足时才做</text>

  <!-- bottom: why linear scan (green) -->
  <rect x="30" y="398" width="470" height="88" rx="13" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="46" y="422" font-size="12" font-weight="600" fill="#1d4a2b">为何用线性扫描而非图着色</text>
  <text x="46" y="444" font-size="10" fill="#4a8c60">· 编译速度是 Go 的核心目标：线性扫描接近 O(n)</text>
  <text x="46" y="462" font-size="10" fill="#4a8c60">· 图着色分配质量略高但慢得多</text>
  <text x="46" y="480" font-size="10" fill="#4a8c60">· 对 Go 的代码质量，线性扫描已足够，取速度权衡</text>

  <rect x="516" y="436" width="374" height="50" rx="13" fill="#f6f6f7" stroke="#e2e2e7"/>
  <text x="532" y="458" font-size="10.5" font-weight="600" fill="#1d1d1f">分配完成后</text>
  <text x="532" y="476" font-size="9.5" fill="#6e6e73">每个 SSA 值都落到具体寄存器或栈槽，才能发射机器指令</text>
</svg>
