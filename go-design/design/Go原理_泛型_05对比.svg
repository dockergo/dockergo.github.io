<svg xmlns="http://www.w3.org/2000/svg" width="920" height="470" viewBox="0 0 920 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
  </defs>
  <rect width="920" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">泛型方案对比 · Go / C++ / Java 的取舍</text>

  <!-- column headers -->
  <rect x="30" y="50" width="280" height="34" rx="8" fill="#f6f6f7" stroke="#e2e2e7"/>
  <text x="170" y="72" font-size="11.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">全单态化 monomorphization</text>
  <rect x="320" y="50" width="280" height="34" rx="8" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="460" y="72" font-size="11.5" font-weight="600" fill="#1d4a2b" text-anchor="middle">GC shape + 字典</text>
  <rect x="610" y="50" width="280" height="34" rx="8" fill="#f6f6f7" stroke="#e2e2e7"/>
  <text x="750" y="72" font-size="11.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">类型擦除 type erasure</text>

  <!-- three columns -->
  <!-- monomorph (amber = big/fast) -->
  <rect x="30" y="94" width="280" height="252" rx="13" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <text x="46" y="118" font-size="11.5" font-weight="600" fill="#6b4e16">代表：C++ 模板 · Rust</text>
  <rect x="46" y="132" width="248" height="52" rx="9" fill="#ffffff" stroke="#f0dcaf"/>
  <text x="60" y="153" font-size="10.5" fill="#6b4e16">每个类型实参生成一份专用代码</text>
  <text x="60" y="172" font-size="10" fill="#a9822f">int / string / *T … 各一份</text>
  <text x="46" y="208" font-size="10.5" fill="#3a3a3c">代码体积</text>
  <rect x="120" y="198" width="174" height="16" rx="5" fill="#f0dcaf"/>
  <text x="207" y="210" font-size="9.5" font-weight="600" fill="#6b4e16" text-anchor="middle">大（每类型一份）</text>
  <text x="46" y="240" font-size="10.5" fill="#3a3a3c">运行性能</text>
  <rect x="120" y="230" width="174" height="16" rx="5" fill="#bfe0c8"/>
  <text x="207" y="242" font-size="9.5" font-weight="600" fill="#1d4a2b" text-anchor="middle">最快（无间接）</text>
  <rect x="46" y="262" width="248" height="70" rx="9" fill="#ffffff" stroke="#f0dcaf"/>
  <text x="60" y="284" font-size="10" fill="#a9822f">编译慢、二进制膨胀</text>
  <text x="60" y="304" font-size="10" fill="#a9822f">泛型嵌套时代码量指数增长</text>
  <text x="60" y="322" font-size="10" fill="#a9822f">追求极致运行速度</text>

  <!-- Go (green = balanced, highlighted) -->
  <rect x="320" y="94" width="280" height="252" rx="13" fill="#eef7f0" stroke="#bfe0c8" stroke-width="2" filter="url(#soft)"/>
  <text x="336" y="118" font-size="11.5" font-weight="600" fill="#1d4a2b">代表：Go（本篇方案）</text>
  <rect x="336" y="132" width="248" height="52" rx="9" fill="#ffffff" stroke="#bfe0c8"/>
  <text x="350" y="153" font-size="10.5" fill="#1d4a2b">按 GC 形状分组 + 运行期字典</text>
  <text x="350" y="172" font-size="10" fill="#4a8c60">指针类型共享、值类型特化</text>
  <text x="336" y="208" font-size="10.5" fill="#3a3a3c">代码体积</text>
  <rect x="410" y="198" width="174" height="16" rx="5" fill="#bfe0c8"/>
  <text x="497" y="210" font-size="9.5" font-weight="600" fill="#1d4a2b" text-anchor="middle">中（按形状分组）</text>
  <text x="336" y="240" font-size="10.5" fill="#3a3a3c">运行性能</text>
  <rect x="410" y="230" width="174" height="16" rx="5" fill="#bfe0c8"/>
  <text x="497" y="242" font-size="9.5" font-weight="600" fill="#1d4a2b" text-anchor="middle">中（值特化好）</text>
  <rect x="336" y="262" width="248" height="70" rx="9" fill="#ffffff" stroke="#bfe0c8"/>
  <text x="350" y="284" font-size="10" fill="#4a8c60">值类型特化好、无装箱</text>
  <text x="350" y="304" font-size="10" fill="#4a8c60">指针类型经字典略有间接</text>
  <text x="350" y="322" font-size="10" font-weight="600" fill="#1d4a2b">编译速度 + 体积优先</text>

  <!-- Java (red-ish = small/slow) -->
  <rect x="610" y="94" width="280" height="252" rx="13" fill="#f6f6f7" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="626" y="118" font-size="11.5" font-weight="600" fill="#1d1d1f">代表：Java 泛型</text>
  <rect x="626" y="132" width="248" height="52" rx="9" fill="#ffffff" stroke="#e2e2e7"/>
  <text x="640" y="153" font-size="10.5" fill="#3a3a3c">一份代码处理所有类型，装箱</text>
  <text x="640" y="172" font-size="10" fill="#6e6e73">编译期擦掉类型信息</text>
  <text x="626" y="208" font-size="10.5" fill="#3a3a3c">代码体积</text>
  <rect x="700" y="198" width="174" height="16" rx="5" fill="#bfe0c8"/>
  <text x="787" y="210" font-size="9.5" font-weight="600" fill="#1d4a2b" text-anchor="middle">小（一份，装箱）</text>
  <text x="626" y="240" font-size="10.5" fill="#3a3a3c">运行性能</text>
  <rect x="700" y="230" width="174" height="16" rx="5" fill="#f0c4c4"/>
  <text x="787" y="242" font-size="9.5" font-weight="600" fill="#7a1f1f" text-anchor="middle">慢（装箱/派发）</text>
  <rect x="626" y="262" width="248" height="70" rx="9" fill="#ffffff" stroke="#e2e2e7"/>
  <text x="640" y="284" font-size="10" fill="#6e6e73">装箱 / 拆箱开销</text>
  <text x="640" y="304" font-size="10" fill="#6e6e73">动态派发，值类型不特化</text>
  <text x="640" y="322" font-size="10" fill="#6e6e73">代码最小</text>

  <!-- takeaway (purple) -->
  <rect x="30" y="362" width="860" height="86" rx="13" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <text x="46" y="386" font-size="12.5" font-weight="600" fill="#3d2a5a">Go 的取舍</text>
  <text x="46" y="410" font-size="11" fill="#7d5bb1">反映一贯偏好：编译速度与二进制体积优先，性能足够即可。</text>
  <text x="46" y="432" font-size="11" fill="#7d5bb1">指针类型共享代码是最大的体积节省点 —— Go 里指针极常见，收敛到形状数收益巨大。</text>
</svg>
