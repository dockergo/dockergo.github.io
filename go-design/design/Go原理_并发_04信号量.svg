<svg xmlns="http://www.w3.org/2000/svg" width="920" height="540" viewBox="0 0 920 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="920" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">信号量与 sudog · 阻塞的通用底座</text>

  <!-- left: sudog (red block, pseudo-g) -->
  <rect x="40" y="60" width="360" height="288" rx="13" fill="#fbeeee" stroke="#f0c4c4" filter="url(#soft)"/>
  <text x="56" y="84" font-size="12.5" font-weight="600" fill="#7a1f1f">sudog · 等待队列里的 pseudo-g</text>
  <text x="56" y="102" font-size="9.5" fill="#cf9a9a">runtime2.go:404</text>
  <text x="56" y="124" font-size="10.5" fill="#b15b5b">「一个正在某队列等待的 goroutine」的表示。</text>
  <text x="56" y="141" font-size="10.5" fill="#b15b5b">一个 G 可能同时在多个队列（select），</text>
  <text x="56" y="158" font-size="10.5" fill="#b15b5b">故不能直接用 g 入队，需 sudog 包装。</text>

  <rect x="56" y="172" width="164" height="42" rx="8" fill="#ffffff" stroke="#f0c4c4"/>
  <text x="66" y="190" font-size="10.5" font-weight="600" fill="#7a1f1f">g</text>
  <text x="66" y="206" font-size="9" fill="#b15b5b">指向被阻塞的 goroutine</text>
  <rect x="228" y="172" width="164" height="42" rx="8" fill="#ffffff" stroke="#f0c4c4"/>
  <text x="238" y="190" font-size="10.5" font-weight="600" fill="#7a1f1f">elem</text>
  <text x="238" y="206" font-size="9" fill="#b15b5b">收发的数据元素指针</text>
  <rect x="56" y="222" width="164" height="42" rx="8" fill="#ffffff" stroke="#f0c4c4"/>
  <text x="66" y="240" font-size="10.5" font-weight="600" fill="#7a1f1f">next / prev</text>
  <text x="66" y="256" font-size="9" fill="#b15b5b">队列链接指针</text>
  <rect x="228" y="222" width="164" height="42" rx="8" fill="#ffffff" stroke="#f0c4c4"/>
  <text x="238" y="240" font-size="10.5" font-weight="600" fill="#7a1f1f">success</text>
  <text x="238" y="256" font-size="9" fill="#b15b5b">唤醒时是否成功收发</text>

  <rect x="56" y="272" width="336" height="30" rx="8" fill="#ffffff" stroke="#f0c4c4"/>
  <text x="224" y="291" font-size="10" font-weight="600" fill="#7a1f1f" text-anchor="middle">池化复用（acquireSudog / releaseSudog）</text>
  <text x="56" y="326" font-size="9.5" fill="#cf9a9a">避免频繁分配，每 P 缓存一批</text>
  <text x="56" y="342" font-size="9.5" fill="#cf9a9a">channel 收发、select、sync 阻塞都用它</text>

  <!-- right: semaRoot treap (purple rule) -->
  <rect x="420" y="60" width="460" height="288" rx="13" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <text x="436" y="84" font-size="12.5" font-weight="600" fill="#3d2a5a">semaRoot · 按地址哈希的等待者 treap</text>
  <text x="436" y="102" font-size="9.5" fill="#a58fce">sema.go:40</text>
  <text x="436" y="123" font-size="10.5" fill="#7d5bb1">sync 包的锁最终建在 runtime 信号量上。</text>

  <!-- semTable buckets -->
  <text x="436" y="146" font-size="10" font-weight="600" fill="#3d2a5a">semTable[251] 分桶（降低竞争）</text>
  <g text-anchor="middle" font-size="9">
    <rect x="436" y="154" width="48" height="26" rx="6" fill="#ffffff" stroke="#ddcdf0"/><text x="460" y="171" fill="#3d2a5a">[0]</text>
    <rect x="490" y="154" width="48" height="26" rx="6" fill="#ffffff" stroke="#ddcdf0"/><text x="514" y="171" fill="#3d2a5a">[1]</text>
    <rect x="544" y="154" width="48" height="26" rx="6" fill="#f5f0fb" stroke="#c9b3e6"/><text x="568" y="171" fill="#3d2a5a">[k]</text>
    <rect x="598" y="154" width="48" height="26" rx="6" fill="#ffffff" stroke="#ddcdf0"/><text x="622" y="171" fill="#3d2a5a">...</text>
    <rect x="652" y="154" width="60" height="26" rx="6" fill="#ffffff" stroke="#ddcdf0"/><text x="682" y="171" fill="#3d2a5a">[250]</text>
  </g>
  <line x1="568" y1="180" x2="568" y2="200" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="600" y="196" font-size="9" fill="#a58fce">哈希 addr → 桶内 treap</text>

  <!-- treap tree -->
  <g text-anchor="middle" font-size="9">
    <rect x="520" y="204" width="96" height="30" rx="7" fill="#ffffff" stroke="#ddcdf0"/><text x="568" y="223" fill="#3d2a5a">addr 0x40 · sudog</text>
    <rect x="448" y="252" width="96" height="30" rx="7" fill="#ffffff" stroke="#ddcdf0"/><text x="496" y="271" fill="#3d2a5a">0x20</text>
    <rect x="592" y="252" width="96" height="30" rx="7" fill="#ffffff" stroke="#ddcdf0"/><text x="640" y="271" fill="#3d2a5a">0x80</text>
    <rect x="700" y="252" width="120" height="30" rx="7" fill="#eef7f0" stroke="#bfe0c8"/><text x="760" y="271" fill="#1d4a2b">同 addr → sudog 链</text>
  </g>
  <line x1="540" y1="234" x2="504" y2="252" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="596" y1="234" x2="632" y2="252" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="640" y1="282" x2="700" y2="270" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="436" y="308" font-size="10" fill="#7d5bb1">按信号量地址组织的平衡树，同地址等待者串成链。</text>
  <text x="436" y="326" font-size="10" fill="#7d5bb1">semacquire 阻塞、semrelease 唤醒；sync 侧经 linkname 调用。</text>

  <!-- bottom: convergence (blue coordinator) -->
  <rect x="40" y="368" width="840" height="152" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="56" y="392" font-size="12.5" font-weight="600" fill="#1b2a4a">所有阻塞原语都汇到 sudog + park / ready</text>

  <!-- three sources -->
  <rect x="56" y="406" width="180" height="44" rx="8" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="146" y="425" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">channel 收发</text>
  <text x="146" y="441" font-size="9" fill="#5b7db1" text-anchor="middle">sendq / recvq</text>
  <rect x="248" y="406" width="180" height="44" rx="8" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="338" y="425" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">sync.Mutex</text>
  <text x="338" y="441" font-size="9" fill="#5b7db1" text-anchor="middle">semaRoot 队列</text>
  <rect x="440" y="406" width="180" height="44" rx="8" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="530" y="425" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">WaitGroup</text>
  <text x="530" y="441" font-size="9" fill="#5b7db1" text-anchor="middle">semaRoot 队列</text>

  <!-- converge arrow -->
  <line x1="146" y1="450" x2="660" y2="474" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="338" y1="450" x2="660" y2="474" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="530" y1="450" x2="660" y2="474" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>

  <rect x="632" y="462" width="232" height="46" rx="9" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="748" y="482" font-size="11" font-weight="600" fill="#1d4a2b" text-anchor="middle">gopark 阻塞 / goready 唤醒</text>
  <text x="748" y="499" font-size="9" fill="#4a8c60" text-anchor="middle">阻塞 goroutine 而非 OS 线程（见 GMP 调度）</text>
</svg>
