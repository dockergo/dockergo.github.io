<svg xmlns="http://www.w3.org/2000/svg" width="920" height="540" viewBox="0 0 920 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="920" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">hchan 结构 · 环形缓冲 + 收发等待队列</text>

  <!-- left: hchan fields (blue coordinator) -->
  <rect x="40" y="60" width="380" height="330" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="56" y="84" font-size="12.5" font-weight="600" fill="#1b2a4a">hchan · channel 的运行时表示</text>
  <text x="56" y="102" font-size="9.5" fill="#8fabd4">chan.go:34</text>

  <rect x="56" y="114" width="170" height="42" rx="8" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="66" y="132" font-size="10.5" font-weight="600" fill="#1b2a4a">qcount</text>
  <text x="66" y="148" font-size="9" fill="#5b7db1">当前缓冲中的元素数</text>
  <rect x="234" y="114" width="170" height="42" rx="8" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="244" y="132" font-size="10.5" font-weight="600" fill="#1b2a4a">dataqsiz</text>
  <text x="244" y="148" font-size="9" fill="#5b7db1">缓冲容量（0 = 无缓冲）</text>

  <rect x="56" y="164" width="348" height="42" rx="8" fill="#fdf6ec" stroke="#f0dcaf"/>
  <text x="66" y="182" font-size="10.5" font-weight="600" fill="#6b4e16">buf</text>
  <text x="66" y="198" font-size="9" fill="#a9822f">指向环形缓冲区（dataqsiz 个槽）</text>

  <rect x="56" y="214" width="170" height="42" rx="8" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="66" y="232" font-size="10.5" font-weight="600" fill="#1b2a4a">sendx</text>
  <text x="66" y="248" font-size="9" fill="#5b7db1">环形写下标（队尾）</text>
  <rect x="234" y="214" width="170" height="42" rx="8" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="244" y="232" font-size="10.5" font-weight="600" fill="#1b2a4a">recvx</text>
  <text x="244" y="248" font-size="9" fill="#5b7db1">环形读下标（队头）</text>

  <rect x="56" y="264" width="170" height="42" rx="8" fill="#fbeeee" stroke="#f0c4c4"/>
  <text x="66" y="282" font-size="10.5" font-weight="600" fill="#7a1f1f">recvq</text>
  <text x="66" y="298" font-size="9" fill="#b15b5b">接收等待队列（sudog）</text>
  <rect x="234" y="264" width="170" height="42" rx="8" fill="#fbeeee" stroke="#f0c4c4"/>
  <text x="244" y="282" font-size="10.5" font-weight="600" fill="#7a1f1f">sendq</text>
  <text x="244" y="298" font-size="9" fill="#b15b5b">发送等待队列（sudog）</text>

  <rect x="56" y="314" width="170" height="42" rx="8" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="66" y="332" font-size="10.5" font-weight="600" fill="#1b2a4a">lock</text>
  <text x="66" y="348" font-size="9" fill="#5b7db1">互斥锁，保护整个 hchan</text>
  <rect x="234" y="314" width="170" height="42" rx="8" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="244" y="332" font-size="10.5" font-weight="600" fill="#1b2a4a">closed</text>
  <text x="244" y="348" font-size="9" fill="#5b7db1">关闭标志</text>
  <text x="56" y="378" font-size="9.5" fill="#8fabd4">收发全程持 lock，操作串行化</text>

  <!-- right top: buffered channel (amber) -->
  <rect x="440" y="60" width="440" height="180" rx="13" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <text x="456" y="84" font-size="12.5" font-weight="600" fill="#6b4e16">有缓冲 channel（dataqsiz &gt; 0）</text>
  <text x="456" y="103" font-size="10" fill="#a9822f">buf 是环形队列：发送写队尾 sendx，接收读队头 recvx</text>

  <!-- ring slots -->
  <g font-size="9.5" text-anchor="middle">
    <rect x="456" y="120" width="60" height="46" rx="7" fill="#ffffff" stroke="#e6cd94"/><text x="486" y="148" fill="#6b4e16">v0</text>
    <rect x="524" y="120" width="60" height="46" rx="7" fill="#ffffff" stroke="#e6cd94"/><text x="554" y="148" fill="#6b4e16">v1</text>
    <rect x="592" y="120" width="60" height="46" rx="7" fill="#ffffff" stroke="#e6cd94"/><text x="622" y="148" fill="#6b4e16">v2</text>
    <rect x="660" y="120" width="60" height="46" rx="7" fill="#f6f6f7" stroke="#e2e2e7"/><text x="690" y="148" fill="#a3a3a8">空</text>
    <rect x="728" y="120" width="60" height="46" rx="7" fill="#f6f6f7" stroke="#e2e2e7"/><text x="758" y="148" fill="#a3a3a8">空</text>
  </g>
  <text x="486" y="184" font-size="9" fill="#4a8c60" text-anchor="middle">↑ recvx</text>
  <text x="690" y="184" font-size="9" fill="#a9822f" text-anchor="middle">↑ sendx</text>
  <text x="456" y="212" font-size="10" fill="#a9822f">满则发送方阻塞、空则接收方阻塞</text>
  <text x="456" y="230" font-size="10" fill="#a9822f">解耦生产/消费速率</text>

  <!-- right bottom: unbuffered channel (green handoff) -->
  <rect x="440" y="256" width="440" height="180" rx="13" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="456" y="280" font-size="12.5" font-weight="600" fill="#1d4a2b">无缓冲 channel（dataqsiz == 0）</text>
  <text x="456" y="299" font-size="10" fill="#4a8c60">无 buf，发送必须等接收者到场，直接手递手（handoff）</text>

  <!-- sender -> receiver handoff -->
  <rect x="456" y="316" width="150" height="56" rx="9" fill="#ffffff" stroke="#bfe0c8"/>
  <text x="531" y="340" font-size="10.5" font-weight="600" fill="#1d4a2b" text-anchor="middle">发送方 G</text>
  <text x="531" y="358" font-size="9" fill="#4a8c60" text-anchor="middle">ch &lt;- v</text>
  <rect x="714" y="316" width="150" height="56" rx="9" fill="#ffffff" stroke="#bfe0c8"/>
  <text x="789" y="340" font-size="10.5" font-weight="600" fill="#1d4a2b" text-anchor="middle">接收方 G</text>
  <text x="789" y="358" font-size="9" fill="#4a8c60" text-anchor="middle">v := &lt;-ch</text>
  <line x1="606" y1="344" x2="712" y2="344" stroke="#4a8c60" stroke-width="1.8" marker-end="url(#ar)"/>
  <text x="659" y="336" font-size="9.5" fill="#1d4a2b" text-anchor="middle">值直接拷贝</text>
  <text x="456" y="400" font-size="10" fill="#4a8c60">同步 channel：收发双方相遇的一次 happens-before 同步点</text>
  <text x="456" y="420" font-size="10" fill="#4a8c60">任一方先到都阻塞等待对家</text>

  <!-- bottom note -->
  <rect x="40" y="452" width="840" height="70" rx="13" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <text x="56" y="476" font-size="11.5" font-weight="600" fill="#3d2a5a">一句话</text>
  <text x="56" y="497" font-size="10.5" fill="#7d5bb1">hchan = 环形缓冲（有缓冲）或纯握手点（无缓冲）+ 两条 sudog 等待队列 + 一把 lock；</text>
  <text x="56" y="515" font-size="10.5" fill="#7d5bb1">dataqsiz 是否为 0 决定「异步解耦」还是「同步握手」两种语义。</text>
</svg>
