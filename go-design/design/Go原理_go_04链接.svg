<svg xmlns="http://www.w3.org/2000/svg" width="940" height="540" viewBox="0 0 940 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="940" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">链接器 · ld.Main 的相位链</text>

  <!-- intro (blue) -->
  <rect x="30" y="50" width="880" height="46" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="70" font-size="12" font-weight="600" fill="#1b2a4a">ld.Main (main.go:164) · 把所有包的目标文件 + runtime 收成一个二进制</text>
  <text x="46" y="88" font-size="10" fill="#5b7db1">按 bench 标记的主要相位（自左向右顺序执行）</text>

  <!-- phase chain: 2 rows of cards with arrows -->
  <!-- row 1 -->
  <!-- loadlib (blue) -->
  <rect x="30" y="116" width="200" height="86" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="139" font-size="11.5" font-weight="600" fill="#1b2a4a">① loadlib</text>
  <text x="46" y="158" font-size="9.5" fill="#5b7db1">加载所有目标文件</text>
  <text x="46" y="174" font-size="9.5" fill="#5b7db1">+ runtime，读入符号表</text>
  <text x="46" y="192" font-size="9" fill="#5b7db1">main.go:367</text>

  <line x1="230" y1="159" x2="258" y2="159" stroke="#c7c7cc" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- deadcode (red) -->
  <rect x="260" y="116" width="200" height="86" rx="12" fill="#fbeeee" stroke="#f0c4c4" filter="url(#soft)"/>
  <text x="276" y="139" font-size="11.5" font-weight="600" fill="#7a1f1f">② deadcode</text>
  <text x="276" y="158" font-size="9.5" fill="#b15b5b">死代码消除</text>
  <text x="276" y="174" font-size="9.5" fill="#b15b5b">只保留可达符号（见下图）</text>
  <text x="276" y="192" font-size="9" fill="#b15b5b">main.go:373</text>

  <line x1="460" y1="159" x2="488" y2="159" stroke="#c7c7cc" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- textaddress (blue) -->
  <rect x="490" y="116" width="200" height="86" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="506" y="139" font-size="11.5" font-weight="600" fill="#1b2a4a">③ textaddress</text>
  <text x="506" y="158" font-size="9.5" fill="#5b7db1">给代码符号分配</text>
  <text x="506" y="174" font-size="9.5" fill="#5b7db1">最终地址（代码布局）</text>
  <text x="506" y="192" font-size="9" fill="#5b7db1">main.go:425</text>

  <line x1="690" y1="159" x2="718" y2="159" stroke="#c7c7cc" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- pclntab (amber) -->
  <rect x="720" y="116" width="190" height="86" rx="12" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <text x="736" y="139" font-size="11.5" font-weight="600" fill="#6b4e16">④ pclntab</text>
  <text x="736" y="158" font-size="9.5" fill="#a9822f">生成 PC-line 表</text>
  <text x="736" y="174" font-size="9.5" fill="#a9822f">地址→行号/栈图</text>
  <text x="736" y="192" font-size="9" fill="#a9822f">main.go:429</text>

  <!-- connector down (right to left snake) -->
  <path d="M815,202 V222 H470 V240" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- row 2 -->
  <!-- dodata/address (amber) -->
  <rect x="30" y="250" width="220" height="86" rx="12" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <text x="46" y="273" font-size="11.5" font-weight="600" fill="#6b4e16">⑤ symtab / dodata / address</text>
  <text x="46" y="292" font-size="9.5" fill="#a9822f">符号表 · 数据段布局</text>
  <text x="46" y="308" font-size="9.5" fill="#a9822f">最终地址分配</text>
  <text x="46" y="326" font-size="9" fill="#a9822f">main.go:436-440</text>

  <line x1="250" y1="293" x2="278" y2="293" stroke="#c7c7cc" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- Asmb (amber) -->
  <rect x="280" y="250" width="200" height="86" rx="12" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <text x="296" y="273" font-size="11.5" font-weight="600" fill="#6b4e16">⑥ Asmb / Asmb2</text>
  <text x="296" y="292" font-size="9.5" fill="#a9822f">编码成目标格式字节</text>
  <text x="296" y="308" font-size="9.5" fill="#a9822f">ELF / Mach-O / PE</text>
  <text x="296" y="326" font-size="9" fill="#a9822f">main.go:462/475</text>

  <line x1="480" y1="293" x2="508" y2="293" stroke="#c7c7cc" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- hostlink (blue) -->
  <rect x="510" y="250" width="200" height="86" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="526" y="273" font-size="11.5" font-weight="600" fill="#1b2a4a">⑦ hostlink</text>
  <text x="526" y="292" font-size="9.5" fill="#5b7db1">需要时调外部链接器</text>
  <text x="526" y="308" font-size="9.5" fill="#5b7db1">cgo / 外部链接模式</text>
  <text x="526" y="326" font-size="9" fill="#5b7db1">main.go:481</text>

  <line x1="710" y1="293" x2="738" y2="293" stroke="#c7c7cc" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- output (green) -->
  <rect x="740" y="250" width="170" height="86" rx="12" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="756" y="273" font-size="11.5" font-weight="600" fill="#1d4a2b">自包含二进制</text>
  <text x="756" y="292" font-size="9.5" fill="#4a8c60">runtime/GC/调度器</text>
  <text x="756" y="308" font-size="9.5" fill="#4a8c60">全静态链接进去</text>
  <text x="756" y="326" font-size="9" fill="#4a8c60">部署零依赖</text>

  <!-- pclntab detail (amber) -->
  <rect x="30" y="356" width="440" height="96" rx="13" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <text x="46" y="380" font-size="12" font-weight="600" fill="#6b4e16">pclntab 用途</text>
  <text x="46" y="402" font-size="10.5" fill="#a9822f">地址 → 函数名 / 源码行 / 栈映射</text>
  <text x="46" y="422" font-size="10.5" fill="#a9822f">支撑：运行期栈回溯 · panic 打印 · GC 栈扫描</text>
  <text x="46" y="442" font-size="9.5" fill="#a9822f">（是 Go 二进制"大"的一部分代价，但换来自省能力）</text>

  <!-- dwarf note (neutral) -->
  <rect x="490" y="356" width="420" height="96" rx="13" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="506" y="380" font-size="12" font-weight="600" fill="#1d1d1f">dwarfGenerateDebugInfo（相位间）</text>
  <text x="506" y="402" font-size="10.5" fill="#3a3a3c">生成 DWARF 调试信息</text>
  <text x="506" y="422" font-size="10.5" fill="#3a3a3c">-ldflags="-s -w" 可去符号表 + DWARF 减体积</text>
  <text x="506" y="442" font-size="9.5" fill="#6e6e73">内部链接（纯 Go）vs 外部链接（cgo，走 gcc/clang）</text>

  <!-- anchor bar -->
  <rect x="30" y="466" width="880" height="52" rx="12" fill="#f6f6f7" stroke="#e2e2e7"/>
  <text x="46" y="490" font-size="10.5" fill="#6e6e73">锚点：ld.Main main.go:164 · loadlib main.go:367 · deadcode main.go:373 · textaddress main.go:425 · pclntab main.go:429</text>
  <text x="46" y="510" font-size="10.5" fill="#6e6e73">产物：静态自包含可执行文件 —— runtime、GC、调度器、所有依赖全链入（cgo 除外）</text>
</svg>
