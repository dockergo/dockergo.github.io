<svg xmlns="http://www.w3.org/2000/svg" width="940" height="480" viewBox="0 0 940 480" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="940" height="480" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">go build 全景 · 加载→Action图→执行→链接</text>

  <!-- role note (blue) -->
  <rect x="30" y="50" width="880" height="46" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="70" font-size="12" font-weight="600" fill="#1b2a4a">go build 是构建编排器（orchestrator），不是编译器本身</text>
  <text x="46" y="88" font-size="10" fill="#5b7db1">调度 compile（真编译器）+ link，管依赖 / 版本 / 缓存 / 并行</text>

  <!-- 5 step pipeline -->
  <!-- step 1 load (blue) -->
  <rect x="30" y="118" width="168" height="120" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="142" font-size="12" font-weight="600" fill="#1b2a4a">① load 加载包</text>
  <text x="46" y="164" font-size="10" fill="#5b7db1">解析导入路径</text>
  <text x="46" y="182" font-size="10" fill="#5b7db1">找所有依赖包源码</text>
  <text x="46" y="200" font-size="10" fill="#5b7db1">本地 + 模块缓存</text>

  <line x1="198" y1="178" x2="228" y2="178" stroke="#c7c7cc" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- step 2 modload+mvs (blue) -->
  <rect x="230" y="118" width="168" height="120" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="246" y="142" font-size="12" font-weight="600" fill="#1b2a4a">② modload + mvs</text>
  <text x="246" y="164" font-size="10" fill="#5b7db1">确定每个依赖</text>
  <text x="246" y="182" font-size="10" fill="#5b7db1">用哪个版本</text>
  <text x="246" y="200" font-size="10" fill="#5b7db1">MVS 最小版本选择</text>

  <line x1="398" y1="178" x2="428" y2="178" stroke="#c7c7cc" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- step 3 work / action graph (blue) -->
  <rect x="430" y="118" width="168" height="120" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="446" y="142" font-size="12" font-weight="600" fill="#1b2a4a">③ work 建 Action 图</text>
  <text x="446" y="164" font-size="10" fill="#5b7db1">编译包 A / B / 链接</text>
  <text x="446" y="182" font-size="10" fill="#5b7db1">组织成有依赖关系的</text>
  <text x="446" y="200" font-size="10" fill="#5b7db1">有向无环图 DAG</text>

  <line x1="598" y1="178" x2="628" y2="178" stroke="#c7c7cc" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- step 4 Builder.Do (green) -->
  <rect x="630" y="118" width="168" height="120" rx="13" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="646" y="142" font-size="12" font-weight="600" fill="#1d4a2b">④ Builder.Do 执行</text>
  <text x="646" y="164" font-size="10" fill="#4a8c60">拓扑序并行执行</text>
  <text x="646" y="182" font-size="10" fill="#4a8c60">编译 Action→compile</text>
  <text x="646" y="200" font-size="10" fill="#4a8c60">链接 Action→link</text>
  <text x="646" y="222" font-size="9" fill="#4a8c60">exec.go:76</text>

  <!-- step 5 cache below (amber) -->
  <rect x="30" y="266" width="768" height="94" rx="13" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <text x="46" y="290" font-size="12" font-weight="600" fill="#6b4e16">⑤ build cache · 增量构建的核心</text>
  <text x="46" y="312" font-size="10.5" fill="#a9822f">每个 Action 的输入（源码 + 依赖 + 编译参数 + Go 版本）哈希成 build ID</text>
  <text x="46" y="332" font-size="10.5" fill="#a9822f">命中缓存则跳过重编 —— "改一个文件只重编受影响的包"</text>
  <text x="46" y="350" font-size="10" fill="#a9822f">缓存位置：$GOCACHE</text>

  <!-- feedback arrow from Builder.Do to cache -->
  <path d="M714,238 V252 H414 V262" fill="none" stroke="#c7c7cc" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="500" y="250" font-size="9" fill="#8e8e93" text-anchor="middle">每 Action 查/写缓存</text>

  <!-- output (green) -->
  <rect x="814" y="266" width="96" height="94" rx="13" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="862" y="300" font-size="11" font-weight="600" fill="#1d4a2b" text-anchor="middle">产物</text>
  <text x="862" y="322" font-size="9.5" fill="#4a8c60" text-anchor="middle">自包含</text>
  <text x="862" y="338" font-size="9.5" fill="#4a8c60" text-anchor="middle">可执行文件</text>

  <line x1="798" y1="313" x2="812" y2="313" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- summary bar -->
  <rect x="30" y="384" width="880" height="76" rx="12" fill="#f6f6f7" stroke="#e2e2e7"/>
  <text x="46" y="408" font-size="11" font-weight="600" fill="#1d1d1f">一句话</text>
  <text x="46" y="430" font-size="10.5" fill="#3a3a3c">load 加载包 → modload+MVS 定版本 → work 建 Action 图 → Builder.Do 拓扑序并行执行 → build cache 命中跳过重编。</text>
  <text x="46" y="450" font-size="10" fill="#6e6e73">锚点：Builder.Do exec.go:76（Action graph execution）</text>
</svg>
