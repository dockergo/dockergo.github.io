<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="900" height="600" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">gc.Main 相位脊柱 · 前端 fe → 后端 be 的有序阶段</text>

  <!-- fe / be zone bands -->
  <rect x="36" y="112" width="40" height="102" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text transform="translate(60,163) rotate(-90)" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">前端 fe</text>
  <rect x="36" y="228" width="40" height="334" rx="10" fill="#fdf6ec" stroke="#f0dcaf"/>
  <text transform="translate(60,395) rotate(-90)" font-size="11" font-weight="600" fill="#6b4e16" text-anchor="middle">后端 be</text>

  <!-- origin: gc.Main driver (blue) -->
  <rect x="96" y="60" width="456" height="40" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="116" y="85" font-size="12.5" font-weight="600" fill="#1b2a4a">gc.Main · 编译驱动，按固定顺序跑各相位 · main.go:61</text>
  <line x1="324" y1="100" x2="324" y2="110" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- phase 1 -->
  <rect x="96" y="112" width="456" height="44" rx="11" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <circle cx="122" cy="134" r="12" fill="#ffffff" stroke="#e2e2e7"/>
  <text x="122" y="138" font-size="12" font-weight="600" fill="#1d1d1f" text-anchor="middle">1</text>
  <text x="148" y="131" font-size="11.5" font-weight="600" fill="#1d1d1f">InitUniverse / InitRuntime</text>
  <text x="148" y="147" font-size="10" fill="#6e6e73">预声明标识符 + runtime 符号</text>

  <!-- phase 2 (purple = main subject) -->
  <line x1="324" y1="156" x2="324" y2="168" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="96" y="170" width="456" height="44" rx="11" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <circle cx="122" cy="192" r="12" fill="#ffffff" stroke="#ddcdf0"/>
  <text x="122" y="196" font-size="12" font-weight="600" fill="#3d2a5a" text-anchor="middle">2</text>
  <text x="148" y="189" font-size="11.5" font-weight="600" fill="#3d2a5a">noder.LoadPackage</text>
  <text x="148" y="205" font-size="10" fill="#7d5bb1">解析 + 类型检查 + 建 Unified IR · main.go:218</text>
  <rect x="458" y="181" width="80" height="22" rx="11" fill="#ffffff" stroke="#ddcdf0"/>
  <text x="498" y="196" font-size="10" font-weight="600" fill="#7d5bb1" text-anchor="middle">本篇主体</text>

  <!-- phase 3 -->
  <line x1="324" y1="214" x2="324" y2="226" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="96" y="228" width="456" height="44" rx="11" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <circle cx="122" cy="250" r="12" fill="#ffffff" stroke="#e2e2e7"/>
  <text x="122" y="254" font-size="12" font-weight="600" fill="#1d1d1f" text-anchor="middle">3</text>
  <text x="148" y="247" font-size="11.5" font-weight="600" fill="#1d1d1f">InitConfig</text>
  <text x="148" y="263" font-size="10" fill="#6e6e73">准备后端 SSA 配置</text>

  <!-- phase 4 -->
  <line x1="324" y1="272" x2="324" y2="284" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="96" y="286" width="456" height="44" rx="11" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <circle cx="122" cy="308" r="12" fill="#ffffff" stroke="#e2e2e7"/>
  <text x="122" y="312" font-size="12" font-weight="600" fill="#1d1d1f" text-anchor="middle">4</text>
  <text x="148" y="305" font-size="11.5" font-weight="600" fill="#1d1d1f">DevirtualizeAndInlinePackage</text>
  <text x="148" y="321" font-size="10" fill="#6e6e73">交织去虚拟化 + 内联 · main.go:259 · 见【逃逸内联】</text>

  <!-- phase 5 -->
  <line x1="324" y1="330" x2="324" y2="342" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="96" y="344" width="456" height="44" rx="11" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <circle cx="122" cy="366" r="12" fill="#ffffff" stroke="#e2e2e7"/>
  <text x="122" y="370" font-size="12" font-weight="600" fill="#1d1d1f" text-anchor="middle">5</text>
  <text x="148" y="363" font-size="11.5" font-weight="600" fill="#1d1d1f">escape.Funcs</text>
  <text x="148" y="379" font-size="10" fill="#6e6e73">逃逸分析 · main.go:294 · 见【逃逸内联】</text>

  <!-- phase 6 -->
  <line x1="324" y1="388" x2="324" y2="400" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="96" y="402" width="456" height="44" rx="11" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <circle cx="122" cy="424" r="12" fill="#ffffff" stroke="#e2e2e7"/>
  <text x="122" y="428" font-size="12" font-weight="600" fill="#1d1d1f" text-anchor="middle">6</text>
  <text x="148" y="421" font-size="11.5" font-weight="600" fill="#1d1d1f">WriteBasicTypes</text>
  <text x="148" y="437" font-size="10" fill="#6e6e73">发射运行时类型描述符（rtype / itab 素材）</text>

  <!-- phase 7 (amber = to backend / machine) -->
  <line x1="324" y1="446" x2="324" y2="458" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="96" y="460" width="456" height="44" rx="11" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <circle cx="122" cy="482" r="12" fill="#ffffff" stroke="#f0dcaf"/>
  <text x="122" y="486" font-size="12" font-weight="600" fill="#6b4e16" text-anchor="middle">7</text>
  <text x="148" y="479" font-size="11.5" font-weight="600" fill="#6b4e16">compileFunctions</text>
  <text x="148" y="495" font-size="10" fill="#a9822f">walk + SSA 后端 → 机器码 · main.go:343 · 见【SSA后端】</text>

  <!-- phase 8 (amber) -->
  <line x1="324" y1="504" x2="324" y2="516" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="96" y="518" width="456" height="44" rx="11" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <circle cx="122" cy="540" r="12" fill="#ffffff" stroke="#f0dcaf"/>
  <text x="122" y="544" font-size="12" font-weight="600" fill="#6b4e16" text-anchor="middle">8</text>
  <text x="148" y="537" font-size="11.5" font-weight="600" fill="#6b4e16">dumpobj</text>
  <text x="148" y="553" font-size="10" fill="#a9822f">写目标文件 .o（机器码 + 符号 + 重定位）</text>

  <!-- right panel A: spine (blue) -->
  <rect x="584" y="60" width="284" height="176" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="600" y="84" font-size="12" font-weight="600" fill="#1b2a4a">相位脊柱 · 有序执行</text>
  <text x="600" y="110" font-size="10.5" fill="#5b7db1">gc.Main 按固定顺序驱动各相位</text>
  <text x="600" y="130" font-size="10.5" fill="#5b7db1">计时器标签分：前端 fe / 后端 be</text>
  <text x="600" y="154" font-size="10.5" fill="#5b7db1">· fe：源文本 → 类型完备 IR</text>
  <text x="600" y="174" font-size="10.5" fill="#5b7db1">· be：IR → 优化 → 机器码 → .o</text>
  <text x="600" y="198" font-size="10.5" fill="#5b7db1">· 全程无字节码，直编机器码</text>

  <!-- right panel B: coverage (purple) -->
  <rect x="584" y="252" width="284" height="150" rx="13" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <text x="600" y="276" font-size="12" font-weight="600" fill="#3d2a5a">本篇覆盖：第 1~2 步</text>
  <text x="600" y="300" font-size="10.5" fill="#7d5bb1">① InitUniverse：预声明 + runtime 符号</text>
  <text x="600" y="322" font-size="10.5" fill="#7d5bb1">② LoadPackage：解析 + 类型检查 + UIR</text>
  <line x1="600" y1="336" x2="852" y2="336" stroke="#ddcdf0" stroke-width="1"/>
  <text x="600" y="358" font-size="10.5" fill="#7d5bb1">后续相位分属其他主线：</text>
  <text x="600" y="378" font-size="10.5" fill="#7d5bb1">内联 / 逃逸 →【逃逸内联】</text>
  <text x="600" y="396" font-size="10.5" fill="#7d5bb1">walk / SSA / 机器码 →【SSA后端】</text>

  <!-- right panel C: legend (neutral) -->
  <rect x="584" y="418" width="284" height="144" rx="13" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="600" y="442" font-size="12" font-weight="600" fill="#1d1d1f">分区图例</text>
  <rect x="600" y="454" width="40" height="20" rx="6" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="650" y="469" font-size="10" fill="#6e6e73">前端 fe · 编译器前段（本篇）</text>
  <rect x="600" y="482" width="40" height="20" rx="6" fill="#fdf6ec" stroke="#f0dcaf"/>
  <text x="650" y="497" font-size="10" fill="#6e6e73">后端 be · 优化 + 代码生成</text>
  <rect x="600" y="510" width="40" height="20" rx="6" fill="#f5f0fb" stroke="#ddcdf0"/>
  <text x="650" y="525" font-size="10" fill="#6e6e73">本篇主体 · noder.LoadPackage</text>
  <text x="600" y="550" font-size="9.5" fill="#a3a3a8">锚点取自 main.go 相位调用序列</text>
</svg>
