<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="900" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Action 图 · 构建步骤的有向无环图 DAG</text>

  <!-- intro (blue) -->
  <rect x="30" y="50" width="840" height="46" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="70" font-size="12" font-weight="600" fill="#1b2a4a">每个 Action = 一个构建步骤，带 Deps（依赖的其它 Action）</text>
  <text x="46" y="88" font-size="10" fill="#5b7db1">编译每个包是一个 Action；链接 Action 依赖所有编译 Action</text>

  <!-- DAG canvas (light gray container) -->
  <rect x="30" y="112" width="560" height="332" rx="13" fill="#f6f6f7" stroke="#e2e2e7"/>
  <text x="46" y="134" font-size="11" font-weight="600" fill="#1d1d1f">Action DAG（自底向上：编译包 → 链接）</text>

  <!-- leaf compile actions (green) -->
  <rect x="60" y="330" width="120" height="60" rx="11" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="120" y="356" font-size="11" font-weight="600" fill="#1d4a2b" text-anchor="middle">compile fmt</text>
  <text x="120" y="376" font-size="9" fill="#4a8c60" text-anchor="middle">build ID · 可缓存</text>

  <rect x="220" y="330" width="120" height="60" rx="11" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="280" y="356" font-size="11" font-weight="600" fill="#1d4a2b" text-anchor="middle">compile net</text>
  <text x="280" y="376" font-size="9" fill="#4a8c60" text-anchor="middle">build ID · 可缓存</text>

  <rect x="380" y="330" width="120" height="60" rx="11" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="440" y="356" font-size="11" font-weight="600" fill="#1d4a2b" text-anchor="middle">compile os</text>
  <text x="440" y="376" font-size="9" fill="#4a8c60" text-anchor="middle">build ID · 可缓存</text>

  <!-- mid compile action (green) -->
  <rect x="150" y="228" width="200" height="60" rx="11" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="250" y="254" font-size="11" font-weight="600" fill="#1d4a2b" text-anchor="middle">compile main（用户包）</text>
  <text x="250" y="274" font-size="9" fill="#4a8c60" text-anchor="middle">依赖 fmt / net / os</text>

  <!-- link action (blue) -->
  <rect x="180" y="150" width="240" height="60" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="300" y="176" font-size="11.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">link 链接 Action</text>
  <text x="300" y="196" font-size="9" fill="#5b7db1" text-anchor="middle">依赖所有编译 Action → 顶点</text>

  <!-- edges: leaves -> main -->
  <line x1="120" y1="330" x2="215" y2="288" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="280" y1="330" x2="262" y2="290" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="440" y1="330" x2="320" y2="288" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <!-- main -> link -->
  <line x1="250" y1="228" x2="285" y2="212" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <!-- leaves -> link (direct deps) -->
  <line x1="440" y1="330" x2="400" y2="212" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>

  <text x="150" y="416" font-size="9.5" fill="#6e6e73">Deps 边：箭头指向"依赖谁的产物"</text>

  <!-- right column: execution + build id -->
  <!-- Builder.Do (green) -->
  <rect x="610" y="112" width="260" height="150" rx="13" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="626" y="136" font-size="12" font-weight="600" fill="#1d4a2b">Builder.Do 拓扑序并行</text>
  <text x="626" y="158" font-size="10" fill="#4a8c60">exec.go:76 / exec.go:5</text>
  <rect x="626" y="172" width="228" height="34" rx="8" fill="#ffffff" stroke="#bfe0c8"/>
  <text x="740" y="193" font-size="10" fill="#1d4a2b" text-anchor="middle">依赖就绪才可执行</text>
  <text x="626" y="228" font-size="10" fill="#4a8c60">-p N 控制并行度</text>
  <text x="626" y="248" font-size="10" fill="#4a8c60">无依赖的 Action 并行跑</text>

  <!-- build id / cache (amber) -->
  <rect x="610" y="280" width="260" height="164" rx="13" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <text x="626" y="304" font-size="12" font-weight="600" fill="#6b4e16">build ID → 增量编译</text>
  <text x="626" y="326" font-size="10" fill="#a9822f">buildid.go</text>
  <rect x="626" y="338" width="228" height="44" rx="8" fill="#ffffff" stroke="#f0dcaf"/>
  <text x="740" y="359" font-size="10" fill="#6b4e16" text-anchor="middle">build ID = 输入内容哈希</text>
  <text x="740" y="375" font-size="9" fill="#a9822f" text-anchor="middle">源码+依赖+参数+版本</text>
  <text x="626" y="404" font-size="10" fill="#a9822f">命中 cache → 复用产物</text>
  <text x="626" y="424" font-size="10" fill="#a9822f">未命中 → 执行并写缓存</text>

  <!-- summary bar -->
  <rect x="30" y="464" width="840" height="40" rx="12" fill="#f6f6f7" stroke="#e2e2e7"/>
  <text x="46" y="489" font-size="10.5" fill="#6e6e73">锚点：Builder.Do exec.go:76 / exec.go:5 · build ID buildid.go（内容哈希决定缓存命中，实现增量编译）</text>
</svg>
