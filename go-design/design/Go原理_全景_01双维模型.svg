<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">双维模型 · 能力域家族 × 执行时机 —— 14 条主线的全库地图</text>
  <text x="30" y="48" font-size="11" fill="#6e6e73">纵轴 = 能力域家族（编译期·工具链 / 运行期·runtime）　横轴 = 执行时机（编译离线 → 运行前台 → 运行后台）　源码基准 go1.26.4</text>

  <!-- ===== corner: panorama identity (axis origin) ===== -->
  <rect x="24" y="60" width="104" height="40" rx="10" fill="#eceef5" stroke="#c9d2e6"/>
  <text x="76" y="78" font-size="11.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">全景框架</text>
  <text x="76" y="92" font-size="8.5" fill="#5b7db1" text-anchor="middle">全库地图 · 总纲</text>

  <!-- ===== column headers (执行时机 →) ===== -->
  <rect x="136" y="60" width="258" height="40" rx="10" fill="#f6f6f7" stroke="#e2e2e7"/>
  <text x="265" y="79" font-size="12.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">编译期 · 离线</text>
  <text x="265" y="93" font-size="9" fill="#6e6e73" text-anchor="middle">多进程并行 · 可缓存</text>
  <rect x="406" y="60" width="258" height="40" rx="10" fill="#f6f6f7" stroke="#e2e2e7"/>
  <text x="535" y="79" font-size="12.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">运行期 · 前台</text>
  <text x="535" y="93" font-size="9" fill="#6e6e73" text-anchor="middle">goroutine 执行时触发</text>
  <rect x="676" y="60" width="258" height="40" rx="10" fill="#f6f6f7" stroke="#e2e2e7"/>
  <text x="805" y="79" font-size="12.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">运行期 · 后台</text>
  <text x="805" y="93" font-size="9" fill="#6e6e73" text-anchor="middle">sysmon · GC · 清扫</text>
  <line x1="396" y1="80" x2="404" y2="80" stroke="#b8b8bf" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="666" y1="80" x2="674" y2="80" stroke="#b8b8bf" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ===== row label strips (能力域家族 ↓) ===== -->
  <rect x="24" y="108" width="104" height="192" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="76" y="204" font-size="12.5" font-weight="600" fill="#1b2a4a" text-anchor="middle" transform="rotate(-90,76,204)">编译期 · 工具链</text>
  <text x="94" y="204" font-size="8.5" fill="#5b7db1" text-anchor="middle" transform="rotate(-90,94,204)">离线 · 5 篇</text>
  <rect x="24" y="308" width="104" height="232" rx="10" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="76" y="424" font-size="12.5" font-weight="600" fill="#1d4a2b" text-anchor="middle" transform="rotate(-90,76,424)">运行期 · runtime</text>
  <text x="94" y="424" font-size="8.5" fill="#4a8c60" text-anchor="middle" transform="rotate(-90,94,424)">GC 托管 · 9 篇</text>
  <line x1="76" y1="301" x2="76" y2="307" stroke="#b8b8bf" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ===== cell frames ===== -->
  <rect x="136" y="108" width="258" height="192" rx="12" fill="#ffffff" stroke="#ececf0"/>
  <rect x="406" y="308" width="258" height="232" rx="12" fill="#ffffff" stroke="#ececf0"/>
  <rect x="676" y="308" width="258" height="232" rx="12" fill="#ffffff" stroke="#ececf0"/>
  <!-- empty cells -->
  <rect x="406" y="108" width="258" height="192" rx="12" fill="#f8f8f9" stroke="#e2e2e7" stroke-dasharray="4 4"/>
  <text x="535" y="198" font-size="10" fill="#a1a1a6" text-anchor="middle">编译器不在运行期</text>
  <text x="535" y="214" font-size="10" fill="#a1a1a6" text-anchor="middle">前台活动</text>
  <rect x="676" y="108" width="258" height="192" rx="12" fill="#f8f8f9" stroke="#e2e2e7" stroke-dasharray="4 4"/>
  <text x="805" y="198" font-size="10" fill="#a1a1a6" text-anchor="middle">工具链产物已固化</text>
  <text x="805" y="214" font-size="10" fill="#a1a1a6" text-anchor="middle">进单一二进制</text>
  <rect x="136" y="308" width="258" height="232" rx="12" fill="#f8f8f9" stroke="#e2e2e7" stroke-dasharray="4 4"/>
  <text x="265" y="418" font-size="10" fill="#a1a1a6" text-anchor="middle">runtime 在编译期尚不存在</text>
  <text x="265" y="434" font-size="10" fill="#a1a1a6" text-anchor="middle">（仅作为库被链接进二进制）</text>

  <!-- ===== Row1 Col1: 5 compile-time lines (blue) ===== -->
  <rect x="146" y="116" width="238" height="32" rx="8" fill="#eef3fb" stroke="#bcd0ec"/>
  <circle cx="161" cy="132" r="7.5" fill="#5b7db1"/><text x="161" y="135.5" font-size="9.5" font-weight="600" fill="#ffffff" text-anchor="middle">1</text>
  <text x="178" y="131" font-size="11.5" font-weight="600" fill="#1b2a4a">编译前端</text>
  <text x="178" y="144" font-size="9" fill="#5b7db1">syntax.Parse → types2 → Unified IR</text>
  <rect x="146" y="152" width="238" height="32" rx="8" fill="#eef3fb" stroke="#bcd0ec"/>
  <circle cx="161" cy="168" r="7.5" fill="#5b7db1"/><text x="161" y="171.5" font-size="9.5" font-weight="600" fill="#ffffff" text-anchor="middle">2</text>
  <text x="178" y="167" font-size="11.5" font-weight="600" fill="#1b2a4a">SSA 后端</text>
  <text x="178" y="180" font-size="9" fill="#5b7db1">~60 遍 pass · 寄存器分配 · 机器码</text>
  <rect x="146" y="188" width="238" height="32" rx="8" fill="#eef3fb" stroke="#bcd0ec"/>
  <circle cx="161" cy="204" r="7.5" fill="#5b7db1"/><text x="161" y="207.5" font-size="9.5" font-weight="600" fill="#ffffff" text-anchor="middle">3</text>
  <text x="178" y="203" font-size="11.5" font-weight="600" fill="#1b2a4a">逃逸 / 内联</text>
  <text x="178" y="216" font-size="9" fill="#5b7db1">逃逸分析定栈堆 · 函数内联</text>
  <rect x="146" y="224" width="238" height="32" rx="8" fill="#eef3fb" stroke="#bcd0ec"/>
  <circle cx="161" cy="240" r="7.5" fill="#5b7db1"/><text x="161" y="243.5" font-size="9.5" font-weight="600" fill="#ffffff" text-anchor="middle">4</text>
  <text x="178" y="239" font-size="11.5" font-weight="600" fill="#1b2a4a">泛型实现</text>
  <text x="178" y="252" font-size="9" fill="#5b7db1">GC shape stenciling + 运行期字典</text>
  <rect x="146" y="260" width="238" height="32" rx="8" fill="#eef3fb" stroke="#bcd0ec"/>
  <circle cx="161" cy="276" r="7.5" fill="#5b7db1"/><text x="161" y="279.5" font-size="9.5" font-weight="600" fill="#ffffff" text-anchor="middle">5</text>
  <text x="178" y="275" font-size="11.5" font-weight="600" fill="#1b2a4a">go 命令 / 链接</text>
  <text x="178" y="288" font-size="9" fill="#5b7db1">MVS · 死代码 flood fill · pclntab</text>

  <!-- ===== Row2 Col2: 6 runtime-foreground lines ===== -->
  <rect x="416" y="316" width="238" height="31" rx="8" fill="#eef3fb" stroke="#bcd0ec"/>
  <circle cx="431" cy="331.5" r="7.5" fill="#5b7db1"/><text x="431" y="335" font-size="9.5" font-weight="600" fill="#ffffff" text-anchor="middle">6</text>
  <text x="448" y="330" font-size="11.5" font-weight="600" fill="#1b2a4a">GMP 调度</text>
  <text x="448" y="343" font-size="9" fill="#5b7db1">schedule / findRunnable → M×P</text>
  <rect x="416" y="353" width="238" height="31" rx="8" fill="#eef7f0" stroke="#bfe0c8"/>
  <circle cx="431" cy="368.5" r="7.5" fill="#4a8c60"/><text x="431" y="372" font-size="9.5" font-weight="600" fill="#ffffff" text-anchor="middle">7</text>
  <text x="448" y="367" font-size="11.5" font-weight="600" fill="#1d4a2b">goroutine 生命周期</text>
  <text x="448" y="380" font-size="9" fill="#4a8c60">newproc 造 G · gdead 复用</text>
  <rect x="416" y="390" width="238" height="31" rx="8" fill="#fdf6ec" stroke="#f0dcaf"/>
  <circle cx="431" cy="405.5" r="7.5" fill="#a9822f"/><text x="431" y="409" font-size="9.5" font-weight="600" fill="#ffffff" text-anchor="middle">8</text>
  <text x="448" y="404" font-size="11.5" font-weight="600" fill="#6b4e16">栈管理</text>
  <text x="448" y="417" font-size="9" fill="#a9822f">2KB 起 · morestack · copystack</text>
  <rect x="416" y="427" width="238" height="31" rx="8" fill="#eef3fb" stroke="#bcd0ec"/>
  <circle cx="431" cy="442.5" r="7.5" fill="#5b7db1"/><text x="431" y="446" font-size="9.5" font-weight="600" fill="#ffffff" text-anchor="middle">9</text>
  <text x="448" y="441" font-size="11.5" font-weight="600" fill="#1b2a4a">并发原语</text>
  <text x="448" y="454" font-size="9" fill="#5b7db1">channel / mutex / select 同步</text>
  <rect x="416" y="464" width="238" height="31" rx="8" fill="#fbeeee" stroke="#f0c4c4"/>
  <circle cx="431" cy="479.5" r="7.5" fill="#b15b5b"/><text x="431" y="483" font-size="9.5" font-weight="600" fill="#ffffff" text-anchor="middle">10</text>
  <text x="448" y="478" font-size="11.5" font-weight="600" fill="#7a1f1f">defer / panic / recover</text>
  <text x="448" y="491" font-size="9" fill="#b15b5b">_defer 链 · 栈展开 · recover</text>
  <rect x="416" y="501" width="238" height="31" rx="8" fill="#f5f0fb" stroke="#ddcdf0"/>
  <circle cx="431" cy="516.5" r="7.5" fill="#7d5bb1"/><text x="431" y="520" font-size="9.5" font-weight="600" fill="#ffffff" text-anchor="middle">11</text>
  <text x="448" y="515" font-size="11.5" font-weight="600" fill="#3d2a5a">接口与反射</text>
  <text x="448" y="528" font-size="9" fill="#7d5bb1">itab / eface · reflect 运行期</text>

  <!-- ===== Row2 Col3: 3 runtime-background lines ===== -->
  <rect x="686" y="316" width="238" height="48" rx="8" fill="#fdf6ec" stroke="#f0dcaf"/>
  <circle cx="701" cy="340" r="7.5" fill="#a9822f"/><text x="701" y="343.5" font-size="9.5" font-weight="600" fill="#ffffff" text-anchor="middle">12</text>
  <text x="718" y="333" font-size="11.5" font-weight="600" fill="#6b4e16">内存分配器（部分）</text>
  <text x="718" y="347" font-size="9" fill="#a9822f">mcache → mcentral → mheap</text>
  <text x="718" y="359" font-size="9" fill="#a9822f">mallocgc · 大小分级 span</text>
  <rect x="686" y="400" width="238" height="48" rx="8" fill="#eef7f0" stroke="#bfe0c8"/>
  <circle cx="701" cy="424" r="7.5" fill="#4a8c60"/><text x="701" y="427.5" font-size="9.5" font-weight="600" fill="#ffffff" text-anchor="middle">13</text>
  <text x="718" y="417" font-size="11.5" font-weight="600" fill="#1d4a2b">GC 垃圾回收</text>
  <text x="718" y="431" font-size="9" fill="#4a8c60">并发三色标记清除 · 混合写屏障</text>
  <text x="718" y="443" font-size="9" fill="#4a8c60">Green Tea 扫描（1.26 默认）</text>
  <rect x="686" y="484" width="238" height="48" rx="8" fill="#eef3fb" stroke="#bcd0ec"/>
  <circle cx="701" cy="508" r="7.5" fill="#5b7db1"/><text x="701" y="511.5" font-size="9.5" font-weight="600" fill="#ffffff" text-anchor="middle">14</text>
  <text x="718" y="501" font-size="11.5" font-weight="600" fill="#1b2a4a">sysmon 监控</text>
  <text x="718" y="515" font-size="9" fill="#5b7db1">后台监控线程 · 不占 P</text>
  <text x="718" y="527" font-size="9" fill="#5b7db1">抢占 · netpoll · 强制 GC</text>
</svg>
