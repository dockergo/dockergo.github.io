<svg xmlns="http://www.w3.org/2000/svg" width="920" height="440" viewBox="0 0 920 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
    <marker id="arA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#c9a24a"/>
    </marker>
  </defs>
  <rect width="920" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">copystack · 连续栈的整体搬移四步（期间该 G 处于 _Gcopystack，GC 不并发扫描）</text>
  <text x="30" y="48" font-size="11" fill="#6e6e73">stack.go:900 · 靠编译器生成的栈映射（stack map）区分栈上「指针」与「整数」——精确 GC 的基础</text>

  <!-- ==== step chain (top row) ==== -->
  <!-- step 1 -->
  <rect x="30" y="72" width="196" height="96" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="95" font-size="12" font-weight="600" fill="#1b2a4a">① 分配新栈</text>
  <text x="46" y="115" font-size="10.5" fill="#5b7db1">通常 2× 旧大小</text>
  <text x="46" y="132" font-size="10" fill="#5b7db1">小栈取自每 P 的 stackcache</text>
  <text x="46" y="149" font-size="10" fill="#5b7db1">大栈走 stackpool / mheap</text>

  <line x1="226" y1="120" x2="256" y2="120" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- step 2 -->
  <rect x="258" y="72" width="196" height="96" rx="12" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <text x="274" y="95" font-size="12" font-weight="600" fill="#3d2a5a">② 调整指针</text>
  <text x="274" y="115" font-size="10.5" fill="#7d5bb1">adjustframe 遍历每帧</text>
  <text x="274" y="132" font-size="10" fill="#7d5bb1">指向旧栈的指针 += 偏移</text>
  <text x="274" y="149" font-size="10" fill="#7d5bb1">同调 _defer/_panic/gobuf.sp</text>

  <line x1="454" y1="120" x2="484" y2="120" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- step 3 -->
  <rect x="486" y="72" width="196" height="96" rx="12" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <text x="502" y="95" font-size="12" font-weight="600" fill="#6b4e16">③ 拷贝</text>
  <text x="502" y="115" font-size="10.5" fill="#a9822f">memmove 整体搬移</text>
  <text x="502" y="132" font-size="10" fill="#a9822f">旧栈字节 → 新栈</text>
  <text x="502" y="149" font-size="10" fill="#a9822f">一次性拷贝完成</text>

  <line x1="682" y1="120" x2="712" y2="120" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- step 4 -->
  <rect x="714" y="72" width="176" height="96" rx="12" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="730" y="95" font-size="12" font-weight="600" fill="#1d1d1f">④ 释放旧栈</text>
  <text x="730" y="115" font-size="10.5" fill="#6e6e73">回收旧栈内存</text>
  <text x="730" y="132" font-size="10" fill="#6e6e73">g.stack 指向新栈</text>
  <text x="730" y="149" font-size="10" fill="#6e6e73">回原函数重试序言</text>

  <!-- ==== pointer-adjust illustration (bottom) ==== -->
  <!-- old stack -->
  <rect x="60" y="204" width="200" height="196" rx="12" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <text x="160" y="226" font-size="11.5" font-weight="600" fill="#6b4e16" text-anchor="middle">旧栈 [lo, hi)</text>
  <rect x="78" y="240" width="164" height="40" rx="7" fill="#f6e6c8" stroke="#e2c88f"/>
  <text x="160" y="258" font-size="10" fill="#6b4e16" text-anchor="middle">帧A · 局部变量 x</text>
  <text x="160" y="273" font-size="9" fill="#a9822f" text-anchor="middle">ptr → &amp;y（指向本栈）</text>
  <rect x="78" y="288" width="164" height="40" rx="7" fill="#f6e6c8" stroke="#e2c88f"/>
  <text x="160" y="306" font-size="10" fill="#6b4e16" text-anchor="middle">帧B · 局部变量 y</text>
  <text x="160" y="321" font-size="9" fill="#a9822f" text-anchor="middle">被 ptr 指向</text>
  <rect x="78" y="336" width="164" height="30" rx="7" fill="#fbeeee" stroke="#f0c4c4"/>
  <text x="160" y="355" font-size="9.5" fill="#7a1f1f" text-anchor="middle">整数 n=42（非指针，不改）</text>
  <text x="160" y="386" font-size="9.5" fill="#a9822f" text-anchor="middle">搬移后即释放</text>

  <!-- migrate arrow -->
  <line x1="270" y1="300" x2="356" y2="300" stroke="#c9a24a" stroke-width="1.8" marker-end="url(#arA)"/>
  <text x="313" y="290" font-size="10" font-weight="600" fill="#a9822f" text-anchor="middle">memmove</text>
  <text x="313" y="316" font-size="9" fill="#a9822f" text-anchor="middle">+ 指针加偏移</text>

  <!-- new stack (2x) -->
  <rect x="366" y="188" width="224" height="228" rx="12" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="478" y="210" font-size="11.5" font-weight="600" fill="#1d4a2b" text-anchor="middle">新栈 2× [lo', hi')</text>
  <rect x="384" y="224" width="188" height="40" rx="7" fill="#dcefe0" stroke="#a9d3b6"/>
  <text x="478" y="242" font-size="10" fill="#1d4a2b" text-anchor="middle">帧A · 局部变量 x</text>
  <text x="478" y="257" font-size="9" fill="#4a8c60" text-anchor="middle">ptr → &amp;y'（已改写）</text>
  <rect x="384" y="272" width="188" height="40" rx="7" fill="#dcefe0" stroke="#a9d3b6"/>
  <text x="478" y="290" font-size="10" fill="#1d4a2b" text-anchor="middle">帧B · 局部变量 y'</text>
  <text x="478" y="305" font-size="9" fill="#4a8c60" text-anchor="middle">新地址 = 旧 + (lo'-lo)</text>
  <rect x="384" y="320" width="188" height="30" rx="7" fill="#dcefe0" stroke="#a9d3b6"/>
  <text x="478" y="339" font-size="9.5" fill="#1d4a2b" text-anchor="middle">整数 n=42（原样拷贝）</text>
  <text x="478" y="368" font-size="9.5" fill="#4a8c60" text-anchor="middle">余量翻倍，供后续增长</text>
  <text x="478" y="386" font-size="9" fill="#4a8c60" text-anchor="middle">对用户完全透明</text>

  <!-- rule box (right) -->
  <rect x="612" y="204" width="278" height="196" rx="12" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <text x="628" y="227" font-size="12" font-weight="600" fill="#3d2a5a">为什么指针不会失效</text>
  <text x="628" y="249" font-size="10.5" fill="#7d5bb1">编译器为每个安全点生成栈映射，</text>
  <text x="628" y="266" font-size="10.5" fill="#7d5bb1">标注每个栈槽是「指针」还是「整数」。</text>
  <text x="628" y="288" font-size="10.5" fill="#7d5bb1">搬移时只对指针槽加偏移改写，</text>
  <text x="628" y="305" font-size="10.5" fill="#7d5bb1">整数槽原样拷贝 —— 精确区分二者。</text>
  <line x1="628" y1="322" x2="874" y2="322" stroke="#ddcdf0" stroke-width="1"/>
  <text x="628" y="344" font-size="10.5" font-weight="600" fill="#3d2a5a">_Gcopystack 保护</text>
  <text x="628" y="365" font-size="10.5" fill="#7d5bb1">搬移期间置该状态，GC 不同时扫栈，</text>
  <text x="628" y="382" font-size="10.5" fill="#7d5bb1">避免读到「半搬移」的不一致栈。</text>
</svg>
