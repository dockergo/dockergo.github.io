<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 900 620" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="900" height="620" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">调度循环 · schedule/findRunnable 的找 G 顺序</text>

  <!-- schedule -->
  <rect x="40" y="50" width="340" height="52" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="56" y="74" font-size="13" font-weight="600" fill="#1b2a4a">schedule</text>
  <text x="56" y="92" font-size="10.5" fill="#5b7db1">每个 M 的主循环 · 永不返回</text>
  <text x="364" y="70" font-size="9.5" fill="#5b7db1" text-anchor="end">proc.go:4150</text>
  <line x1="210" y1="102" x2="210" y2="116" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- findRunnable -->
  <rect x="40" y="118" width="340" height="50" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="56" y="140" font-size="13" font-weight="600" fill="#1b2a4a">findRunnable</text>
  <text x="56" y="158" font-size="10.5" fill="#5b7db1">按固定优先级找可运行的 G</text>
  <text x="364" y="138" font-size="9.5" fill="#5b7db1" text-anchor="end">proc.go:3404</text>
  <line x1="210" y1="168" x2="210" y2="182" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- 1 local -->
  <rect x="40" y="184" width="340" height="54" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="56" y="206" font-size="11.5" font-weight="600" fill="#1b2a4a">① 本地队列 runqget</text>
  <text x="56" y="224" font-size="10" fill="#5b7db1">先 runnext 快槽，再环形 runq[256]</text>
  <text x="364" y="204" font-size="9" fill="#5b7db1" text-anchor="end">proc.go:7649</text>
  <line x1="210" y1="238" x2="210" y2="250" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="222" y="249" font-size="9" fill="#8e8e93">未命中</text>

  <!-- 2 global 61 -->
  <rect x="40" y="252" width="340" height="54" rx="11" fill="#fdf6ec" stroke="#f0dcaf"/>
  <text x="56" y="274" font-size="11" font-weight="600" fill="#6b4e16">② 每 61 次调度先查全局 runq</text>
  <text x="56" y="292" font-size="9.5" fill="#a9822f">schedtick%61==0 · 防全局 G 被本地热点饿死</text>
  <line x1="210" y1="306" x2="210" y2="318" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- 3 global -->
  <rect x="40" y="320" width="340" height="48" rx="11" fill="#ffffff" stroke="#e2e2e7"/>
  <text x="56" y="341" font-size="11" font-weight="600" fill="#1d1d1f">③ 全局队列 globrunqget</text>
  <text x="56" y="358" font-size="10" fill="#6e6e73">本地空了才查（sched.lock 有锁）</text>
  <line x1="210" y1="368" x2="210" y2="380" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- 4 netpoll -->
  <rect x="40" y="382" width="340" height="48" rx="11" fill="#ffffff" stroke="#e2e2e7"/>
  <text x="56" y="403" font-size="11" font-weight="600" fill="#1d1d1f">④ netpoll</text>
  <text x="56" y="420" font-size="10" fill="#6e6e73">取因 I/O 就绪的 G（非阻塞）</text>
  <line x1="210" y1="430" x2="210" y2="442" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- 5 steal -->
  <rect x="40" y="444" width="340" height="54" rx="11" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="56" y="466" font-size="11" font-weight="600" fill="#1d4a2b">⑤ work-stealing · stealWork</text>
  <text x="56" y="484" font-size="10" fill="#4a8c60">随机遍历其他 P，runqsteal 偷约一半 G</text>
  <text x="364" y="464" font-size="9" fill="#4a8c60" text-anchor="end">proc.go:3843</text>
  <line x1="210" y1="498" x2="210" y2="510" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="222" y="509" font-size="9" fill="#8e8e93">全空</text>

  <!-- 6 stopm -->
  <rect x="40" y="512" width="340" height="54" rx="11" fill="#fbeeee" stroke="#f0c4c4"/>
  <text x="56" y="534" font-size="11" font-weight="600" fill="#7a1f1f">⑥ 都没有 → stopm</text>
  <text x="56" y="552" font-size="10" fill="#b15b5b">解绑 P → _Pidle → M 休眠等待唤醒</text>

  <!-- hit rail to execute -->
  <line x1="410" y1="211" x2="410" y2="471" stroke="#c7c7cc" stroke-width="1.5"/>
  <line x1="380" y1="279" x2="410" y2="279" stroke="#c7c7cc" stroke-width="1.5"/>
  <line x1="380" y1="344" x2="410" y2="344" stroke="#c7c7cc" stroke-width="1.5"/>
  <line x1="380" y1="406" x2="410" y2="406" stroke="#c7c7cc" stroke-width="1.5"/>
  <line x1="380" y1="471" x2="410" y2="471" stroke="#c7c7cc" stroke-width="1.5"/>
  <line x1="380" y1="211" x2="466" y2="211" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="424" y="205" font-size="9.5" fill="#4a8c60">命中</text>

  <!-- execute -->
  <rect x="468" y="150" width="392" height="112" rx="13" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="488" y="180" font-size="13" font-weight="600" fill="#1d4a2b">execute(gp)</text>
  <text x="488" y="203" font-size="10.5" fill="#4a8c60">命中任一优先级 → 在当前 M 上运行选中的 G</text>
  <text x="488" y="223" font-size="10" fill="#4a8c60">① runqget ② global ③ netpoll ④ steal 命中即执行</text>
  <text x="488" y="245" font-size="10" fill="#4a8c60">G 让出 / 阻塞 / 结束 → 回到 schedule 再选</text>

  <!-- loop back -->
  <polyline points="860,205 878,205 878,76 380,76" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="628" y="70" font-size="10" fill="#6e6e73" text-anchor="middle">G 让出 → 回到 schedule</text>

  <!-- legend note -->
  <rect x="468" y="300" width="392" height="120" rx="12" fill="#f5f0fb" stroke="#ddcdf0"/>
  <text x="488" y="326" font-size="11.5" font-weight="600" fill="#3d2a5a">优先级要点</text>
  <text x="488" y="349" font-size="10.5" fill="#7d5bb1">· 绝大多数调度走无锁的本地 runq 路径</text>
  <text x="488" y="369" font-size="10.5" fill="#7d5bb1">· 每 61 次插查全局队列，防本地热点饿死全局 G</text>
  <text x="488" y="389" font-size="10.5" fill="#7d5bb1">· 本地/全局皆空才自旋偷取；再空才 stopm 休眠</text>
  <text x="488" y="409" font-size="10.5" fill="#7d5bb1">· 找 G 顺序固定，兼顾局部性、公平与负载均衡</text>
</svg>
