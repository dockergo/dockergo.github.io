<svg xmlns="http://www.w3.org/2000/svg" width="940" height="500" viewBox="0 0 940 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
    <marker id="arB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/>
    </marker>
  </defs>
  <rect width="940" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">GC 相位机 · _GCoff / _GCmark / _GCmarktermination</text>
  <text x="30" y="48" font-size="11" fill="#6e6e73">setGCPhase（mgc.go:257）翻转相位时，同步翻转写屏障与黑色分配两个全局开关</text>

  <!-- ==== triggers (left, blue) ==== -->
  <rect x="30" y="72" width="212" height="220" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="96" font-size="12.5" font-weight="600" fill="#1b2a4a">触发源 · gcTrigger.test</text>
  <text x="46" y="112" font-size="9.5" fill="#5b7db1">mgc.go:706 判定 → gcStart 733</text>

  <rect x="46" y="126" width="180" height="46" rx="9" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="56" y="144" font-size="11" font-weight="600" fill="#1b2a4a">堆达标 gcTriggerHeap</text>
  <text x="56" y="160" font-size="9.5" fill="#5b7db1">堆增长到 heapGoal（默认策略）</text>

  <rect x="46" y="180" width="180" height="46" rx="9" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="56" y="198" font-size="11" font-weight="600" fill="#1b2a4a">定时 2 分钟</text>
  <text x="56" y="214" font-size="9.5" fill="#5b7db1">sysmon 距上轮 &gt; 2min 强制</text>

  <rect x="46" y="234" width="180" height="46" rx="9" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="56" y="252" font-size="11" font-weight="600" fill="#1b2a4a">手动 runtime.GC</text>
  <text x="56" y="268" font-size="9.5" fill="#5b7db1">阻塞式触发一轮完整 GC</text>

  <line x1="242" y1="182" x2="292" y2="182" stroke="#5b7db1" stroke-width="1.5" marker-end="url(#arB)"/>
  <text x="267" y="174" font-size="9.5" fill="#5b7db1" text-anchor="middle">gcStart</text>

  <!-- ==== phase states (state machine) ==== -->
  <!-- _GCoff (amber) -->
  <rect x="300" y="96" width="240" height="112" rx="13" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <text x="318" y="122" font-size="13" font-weight="600" fill="#6b4e16">_GCoff</text>
  <text x="318" y="139" font-size="9.5" fill="#a9822f">写屏障关 · 后台并发清扫中</text>
  <rect x="318" y="150" width="100" height="20" rx="7" fill="#f6e6c8" stroke="#e2c88f"/>
  <text x="368" y="164" font-size="9.5" font-weight="600" fill="#6b4e16" text-anchor="middle">writeBarrier=off</text>
  <rect x="424" y="150" width="100" height="20" rx="7" fill="#f6e6c8" stroke="#e2c88f"/>
  <text x="474" y="164" font-size="9.5" font-weight="600" fill="#6b4e16" text-anchor="middle">blacken=off</text>
  <text x="318" y="188" font-size="9.5" fill="#6b4e16">指针写无额外开销 · 稳态相位</text>

  <!-- _GCmark (green) -->
  <rect x="620" y="96" width="290" height="112" rx="13" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="638" y="122" font-size="13" font-weight="600" fill="#1d4a2b">_GCmark</text>
  <text x="638" y="139" font-size="9.5" fill="#4a8c60">并发标记中 · 写屏障开 · 分配变黑</text>
  <rect x="638" y="150" width="118" height="20" rx="7" fill="#dcefe0" stroke="#a9d3b6"/>
  <text x="697" y="164" font-size="9.5" font-weight="600" fill="#1d4a2b" text-anchor="middle">writeBarrier=on</text>
  <rect x="762" y="150" width="130" height="20" rx="7" fill="#dcefe0" stroke="#a9d3b6"/>
  <text x="827" y="164" font-size="9.5" font-weight="600" fill="#1d4a2b" text-anchor="middle">gcBlackenEnabled=on</text>
  <text x="638" y="188" font-size="9.5" fill="#1d4a2b">worker + mark assist 灰变黑，直到无灰</text>

  <!-- _GCmarktermination (red) -->
  <rect x="620" y="248" width="290" height="104" rx="13" fill="#fbeeee" stroke="#f0c4c4" filter="url(#soft)"/>
  <text x="638" y="274" font-size="13" font-weight="600" fill="#7a1f1f">_GCmarktermination</text>
  <text x="638" y="291" font-size="9.5" fill="#b15b5b">短 STW · gcMarkDone（mgc.go:997）</text>
  <rect x="638" y="302" width="118" height="20" rx="7" fill="#f7dada" stroke="#e6a5a5"/>
  <text x="697" y="316" font-size="9.5" font-weight="600" fill="#7a1f1f" text-anchor="middle">writeBarrier=on</text>
  <rect x="762" y="302" width="70" height="20" rx="7" fill="#f7dada" stroke="#e6a5a5"/>
  <text x="797" y="316" font-size="9.5" font-weight="600" fill="#7a1f1f" text-anchor="middle">STW</text>
  <text x="638" y="340" font-size="9.5" fill="#7a1f1f">确认标记完成 · 关屏障 · 算下轮触发点</text>

  <!-- transitions -->
  <line x1="540" y1="140" x2="618" y2="140" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="579" y="132" font-size="9.5" fill="#6e6e73" text-anchor="middle">gcStart</text>
  <text x="579" y="156" font-size="9" fill="#8e8e93" text-anchor="middle">开屏障</text>

  <line x1="765" y1="208" x2="765" y2="246" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="820" y="230" font-size="9.5" fill="#6e6e73" text-anchor="middle">无灰对象</text>

  <path d="M 620 300 Q 500 300 460 258 L 460 210" fill="none" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="516" y="296" font-size="9.5" fill="#6e6e73" text-anchor="middle">终止完成 → 关屏障回 _GCoff</text>
  <text x="516" y="312" font-size="9" fill="#8e8e93" text-anchor="middle">进入并发清扫</text>

  <!-- ==== setGCPhase mechanism (bottom, purple) ==== -->
  <rect x="30" y="372" width="880" height="106" rx="13" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <text x="46" y="396" font-size="12.5" font-weight="600" fill="#3d2a5a">setGCPhase 机制 · 相位常量（mgc.go:250）与两个全局开关联动翻转</text>
  <rect x="46" y="410" width="270" height="52" rx="9" fill="#ffffff" stroke="#ddcdf0"/>
  <text x="56" y="430" font-size="10.5" font-weight="600" fill="#3d2a5a">writeBarrier.enabled</text>
  <text x="56" y="448" font-size="9.5" fill="#7d5bb1">写屏障全局开关 · 仅标记两相位为 on</text>
  <rect x="332" y="410" width="270" height="52" rx="9" fill="#ffffff" stroke="#ddcdf0"/>
  <text x="342" y="430" font-size="10.5" font-weight="600" fill="#3d2a5a">gcBlackenEnabled</text>
  <text x="342" y="448" font-size="9.5" fill="#7d5bb1">黑色分配开关 · 新对象是否直接标黑</text>
  <rect x="618" y="410" width="274" height="52" rx="9" fill="#f6f6f7" stroke="#e2e2e7"/>
  <text x="628" y="430" font-size="10.5" font-weight="600" fill="#1d1d1f">相位即真理</text>
  <text x="628" y="448" font-size="9.5" fill="#6e6e73">开关随相位原子翻转，各 P 依此决策</text>
</svg>
