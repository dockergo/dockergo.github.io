<svg xmlns="http://www.w3.org/2000/svg" width="900" height="540" viewBox="0 0 900 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="900" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">size class · 尺寸分级与定长槽</text>

  <!-- top: size class ladder (purple rule) -->
  <rect x="40" y="60" width="820" height="128" rx="13" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <text x="56" y="84" font-size="12.5" font-weight="600" fill="#3d2a5a">对象大小 → 向上取整到最近的 size class（约 68 档）</text>
  <text x="56" y="103" font-size="10.5" fill="#7d5bb1">档位递增：小对象步长细、大对象步长粗，控制内部碎片 ≤ 12.5%</text>

  <!-- class chips -->
  <g font-size="10.5" text-anchor="middle">
    <rect x="56" y="120" width="52" height="30" rx="7" fill="#ffffff" stroke="#ddcdf0"/><text x="82" y="139" fill="#3d2a5a">8</text>
    <rect x="116" y="120" width="52" height="30" rx="7" fill="#ffffff" stroke="#ddcdf0"/><text x="142" y="139" fill="#3d2a5a">16</text>
    <rect x="176" y="120" width="52" height="30" rx="7" fill="#ffffff" stroke="#ddcdf0"/><text x="202" y="139" fill="#3d2a5a">24</text>
    <rect x="236" y="120" width="52" height="30" rx="7" fill="#ffffff" stroke="#ddcdf0"/><text x="262" y="139" fill="#3d2a5a">32</text>
    <rect x="296" y="120" width="52" height="30" rx="7" fill="#ffffff" stroke="#ddcdf0"/><text x="322" y="139" fill="#3d2a5a">48</text>
    <rect x="356" y="120" width="52" height="30" rx="7" fill="#ffffff" stroke="#ddcdf0"/><text x="382" y="139" fill="#3d2a5a">64</text>
    <rect x="416" y="120" width="60" height="30" rx="7" fill="#ffffff" stroke="#ddcdf0"/><text x="446" y="139" fill="#3d2a5a">...</text>
    <rect x="484" y="120" width="64" height="30" rx="7" fill="#ffffff" stroke="#ddcdf0"/><text x="516" y="139" fill="#3d2a5a">8192</text>
    <rect x="556" y="120" width="64" height="30" rx="7" fill="#ffffff" stroke="#ddcdf0"/><text x="588" y="139" fill="#3d2a5a">...</text>
    <rect x="628" y="120" width="72" height="30" rx="7" fill="#fdf6ec" stroke="#f0dcaf"/><text x="664" y="139" fill="#6b4e16">32768</text>
  </g>
  <text x="716" y="139" font-size="10" fill="#7d5bb1">≤ 32KB 走 span 分级；</text>
  <text x="716" y="153" font-size="10" fill="#7d5bb1">&gt; 32KB 为大对象</text>
  <text x="56" y="178" font-size="9.5" fill="#a58fce">internal/runtime/gc/sizeclasses.go:98</text>

  <!-- left: a span of equal fixed slots (amber storage) -->
  <rect x="40" y="212" width="470" height="180" rx="13" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <text x="56" y="236" font-size="12.5" font-weight="600" fill="#6b4e16">同一 class 的 span：等大定长槽</text>
  <text x="56" y="255" font-size="10.5" fill="#a9822f">例：class 24B — 每个槽固定 24 字节，槽间无差异</text>
  <g>
    <rect x="56" y="272" width="66" height="44" rx="6" fill="#ffffff" stroke="#e6cd94"/>
    <rect x="128" y="272" width="66" height="44" rx="6" fill="#ffffff" stroke="#e6cd94"/>
    <rect x="200" y="272" width="66" height="44" rx="6" fill="#ffffff" stroke="#e6cd94"/>
    <rect x="272" y="272" width="66" height="44" rx="6" fill="#ffffff" stroke="#e6cd94"/>
    <rect x="344" y="272" width="66" height="44" rx="6" fill="#ffffff" stroke="#e6cd94"/>
    <rect x="416" y="272" width="66" height="44" rx="6" fill="#ffffff" stroke="#e6cd94"/>
  </g>
  <text x="89" y="298" font-size="10" fill="#6b4e16" text-anchor="middle">24B</text>
  <text x="161" y="298" font-size="10" fill="#6b4e16" text-anchor="middle">24B</text>
  <text x="233" y="298" font-size="10" fill="#6b4e16" text-anchor="middle">24B</text>
  <text x="305" y="298" font-size="10" fill="#6b4e16" text-anchor="middle">24B</text>
  <text x="377" y="298" font-size="10" fill="#6b4e16" text-anchor="middle">24B</text>
  <text x="449" y="298" font-size="10" fill="#6b4e16" text-anchor="middle">24B</text>
  <text x="56" y="342" font-size="10.5" fill="#a9822f">定长 → 分配只需从空槽位图取一个，无需堆式搜索</text>
  <!-- internal fragmentation callout -->
  <rect x="56" y="352" width="426" height="30" rx="8" fill="#fbeeee" stroke="#f0c4c4"/>
  <text x="66" y="371" font-size="10.5" fill="#7a1f1f">内部碎片：申请 17B → 落入 24B 档，浪费 7B（槽内尾部空闲）</text>

  <!-- right: span class = size class x2 (blue coordination) -->
  <rect x="530" y="212" width="330" height="180" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="546" y="236" font-size="12.5" font-weight="600" fill="#1b2a4a">span class = size class × 2</text>
  <text x="546" y="255" font-size="10.5" fill="#5b7db1">最低 1 位区分是否含指针，供 GC 扫描用</text>
  <rect x="546" y="270" width="298" height="44" rx="8" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="556" y="290" font-size="11" font-weight="600" fill="#1d4a2b">scan（含指针）</text>
  <text x="556" y="306" font-size="9.5" fill="#4a8c60">GC 需扫描槽内指针，标记可达对象</text>
  <rect x="546" y="322" width="298" height="44" rx="8" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="556" y="342" font-size="11" font-weight="600" fill="#1b2a4a">noscan（无指针）</text>
  <text x="556" y="358" font-size="9.5" fill="#5b7db1">GC 可跳过整片，纯数据不含引用</text>
  <text x="546" y="382" font-size="9.5" fill="#8fabd4">spanClass = sizeclass&lt;&lt;1 | noscanBit</text>

  <!-- bottom rule strip -->
  <rect x="40" y="412" width="820" height="104" rx="13" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="56" y="436" font-size="12" font-weight="600" fill="#1d1d1f">为何这样设计</text>
  <text x="56" y="459" font-size="10.5" fill="#6e6e73">· 定长槽让分配退化为「位图取空位」，无碎片整理、无搜索，极快</text>
  <text x="56" y="479" font-size="10.5" fill="#6e6e73">· 68 档折中：档越密内部碎片越小，但 span 种类越多、缓存压力越大</text>
  <text x="56" y="499" font-size="10.5" fill="#6e6e73">· scan/noscan 分离让 GC 对纯数据 span 整片跳过，扫描更快</text>
</svg>
