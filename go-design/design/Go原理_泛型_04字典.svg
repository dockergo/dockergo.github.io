<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
    <marker id="arP" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#9b7dc4"/>
    </marker>
  </defs>
  <rect width="920" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">泛型字典 · 编译期字典作合成首参补回类型信息</text>

  <!-- problem (amber) -->
  <rect x="30" y="50" width="860" height="52" rx="12" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <text x="46" y="72" font-size="12" font-weight="600" fill="#6b4e16">问题：形状共享代码丢失了 "具体是什么类型"</text>
  <text x="46" y="90" font-size="10" fill="#a9822f">*byte 不知原本是 *int 还是 *User —— 但函数体可能需要它（new(T)、方法调用、比较）</text>

  <!-- dictionary as first param (purple) -->
  <rect x="30" y="120" width="530" height="238" rx="13" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <text x="46" y="144" font-size="12" font-weight="600" fill="#3d2a5a">解法：readerDict 作合成首参 (reader.go:163)</text>

  <rect x="46" y="160" width="498" height="46" rx="9" fill="#ffffff" stroke="#ddcdf0"/>
  <text x="60" y="182" font-size="10.5" fill="#3a3a3c">每个泛型函数被加一个隐藏首参 (reader.go:1464)：</text>
  <text x="60" y="200" font-size="10.5" fill="#3d2a5a" font-family="'SF Mono','Menlo',monospace">Map(dict *dictionary, s, f)  ← dict 指向本实例字典</text>

  <!-- call injects dict -->
  <rect x="46" y="220" width="150" height="52" rx="9" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="121" y="242" font-size="10.5" fill="#1d4a2b" text-anchor="middle" font-family="'SF Mono','Menlo',monospace">Map[int,string]</text>
  <text x="121" y="260" font-size="9.5" fill="#4a8c60" text-anchor="middle">调用点</text>
  <line x1="196" y1="246" x2="238" y2="246" stroke="#9b7dc4" stroke-width="1.6" marker-end="url(#arP)"/>
  <text x="217" y="238" font-size="9" fill="#7d5bb1" text-anchor="middle">传入</text>
  <rect x="240" y="220" width="304" height="52" rx="9" fill="#f5f0fb" stroke="#9b7dc4" stroke-width="1.5"/>
  <text x="392" y="242" font-size="10.5" font-weight="600" fill="#3d2a5a" text-anchor="middle">该实例对应的字典</text>
  <text x="392" y="260" font-size="9.5" fill="#7d5bb1" text-anchor="middle">具体类型参数 · 派生类型 · itab / 方法</text>

  <rect x="46" y="286" width="498" height="58" rx="9" fill="#ffffff" stroke="#ddcdf0"/>
  <text x="60" y="308" font-size="10.5" font-weight="600" fill="#3d2a5a">函数体中凡需具体类型处，从字典取：</text>
  <text x="60" y="328" font-size="10" fill="#7d5bb1">new(T) 的类型 · T 的方法调用 · 类型比较 · itab</text>

  <!-- dict contents (purple) -->
  <rect x="580" y="120" width="310" height="238" rx="13" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <text x="596" y="144" font-size="12" font-weight="600" fill="#3d2a5a">字典分层 (reader.go:167)</text>

  <rect x="596" y="160" width="278" height="80" rx="10" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="612" y="182" font-size="11" font-weight="600" fill="#1d4a2b">shaped 形状字典</text>
  <text x="612" y="202" font-size="10" fill="#4a8c60">同形状实例共享的部分</text>
  <text x="612" y="222" font-size="10" fill="#4a8c60">（形状级信息，可复用）</text>

  <rect x="596" y="250" width="278" height="94" rx="10" fill="#fdf6ec" stroke="#f0dcaf"/>
  <text x="612" y="272" font-size="11" font-weight="600" fill="#6b4e16">non-shaped 非形状信息</text>
  <text x="612" y="292" font-size="10" fill="#a9822f">具体 itab 等，按真实例区分</text>
  <text x="612" y="312" font-size="10" fill="#a9822f">由 dictNameOf (reader.go:1509)</text>
  <text x="612" y="330" font-size="10" fill="#a9822f">为每个真实例生成</text>

  <!-- formula (green) -->
  <rect x="30" y="376" width="860" height="66" rx="13" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="46" y="400" font-size="12.5" font-weight="600" fill="#1d4a2b">核心等式</text>
  <text x="46" y="424" font-size="11.5" fill="#1d4a2b">代码（按形状共享）  +  字典（按实例区分）  =  既省代码体积，又保住类型特化能力</text>

  <!-- summary bar -->
  <rect x="30" y="458" width="860" height="44" rx="12" fill="#f6f6f7" stroke="#e2e2e7"/>
  <text x="46" y="485" font-size="10.5" fill="#6e6e73">锚点：readerDict reader.go:163 · shaped/non-shaped reader.go:167 · 合成首参 reader.go:1464 · dictNameOf reader.go:1509</text>
</svg>
