<svg xmlns="http://www.w3.org/2000/svg" width="920" height="500" viewBox="0 0 920 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="920" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">类型描述符 · abi.Type 的字段与 GCData 指针位图</text>
  <text x="30" y="49" font-size="10.5" fill="#6e6e73">_type（= abi.Type，abi/type.go:21）：每个类型的运行期元数据，接口 / 反射 / GC 都读它</text>

  <!-- Type struct (purple = interface/rule side) -->
  <rect x="30" y="66" width="470" height="390" rx="13" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <text x="46" y="92" font-size="13" font-weight="600" fill="#3d2a5a">abi.Type · 核心字段</text>
  <text x="46" y="110" font-size="10.5" fill="#7d5bb1">abi/type.go:21 · 每类型唯一一份</text>

  <rect x="46" y="120" width="438" height="34" rx="8" fill="#ffffff" stroke="#ddcdf0"/>
  <text x="60" y="141" font-size="10.5" fill="#3a3a3c"><tspan font-weight="600">Size_</tspan> · 类型大小（字节）</text>
  <rect x="46" y="160" width="438" height="34" rx="8" fill="#ffffff" stroke="#ddcdf0"/>
  <text x="60" y="181" font-size="10.5" fill="#3a3a3c"><tspan font-weight="600">PtrBytes</tspan> · 含指针的前缀字节数</text>
  <rect x="46" y="200" width="438" height="34" rx="8" fill="#ffffff" stroke="#ddcdf0"/>
  <text x="60" y="221" font-size="10.5" fill="#3a3a3c"><tspan font-weight="600">Hash</tspan> · 类型哈希（类型 switch / itab）</text>
  <rect x="46" y="240" width="438" height="34" rx="8" fill="#ffffff" stroke="#ddcdf0"/>
  <text x="60" y="261" font-size="10.5" fill="#3a3a3c"><tspan font-weight="600">Kind_</tspan> · 基础种类 Bool/Int/Ptr/Struct/Slice… · type.go:50</text>
  <rect x="46" y="280" width="438" height="34" rx="8" fill="#ffffff" stroke="#ddcdf0"/>
  <text x="60" y="301" font-size="10.5" fill="#3a3a3c"><tspan font-weight="600">Equal</tspan> · 相等函数（==、map 键）</text>
  <rect x="46" y="320" width="438" height="34" rx="8" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="60" y="341" font-size="10.5" fill="#1d4a2b"><tspan font-weight="600">GCData</tspan> · 指针位图（→ GC 精确扫描依据）</text>
  <rect x="46" y="360" width="438" height="34" rx="8" fill="#ffffff" stroke="#ddcdf0"/>
  <text x="60" y="381" font-size="10.5" fill="#3a3a3c"><tspan font-weight="600">Str</tspan> · 类型名偏移</text>

  <!-- derived types (blue) -->
  <text x="46" y="418" font-size="11" font-weight="600" fill="#3d2a5a">派生类型在 Type 头后附加字段（type.go:472）</text>
  <rect x="46" y="426" width="140" height="24" rx="7" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="116" y="443" font-size="9.5" fill="#1b2a4a" text-anchor="middle">StructType</text>
  <rect x="194" y="426" width="140" height="24" rx="7" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="264" y="443" font-size="9.5" fill="#1b2a4a" text-anchor="middle">SliceType</text>
  <rect x="342" y="426" width="142" height="24" rx="7" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="413" y="443" font-size="9.5" fill="#1b2a4a" text-anchor="middle">InterfaceType</text>

  <!-- GCData → GC (green = success/GC) -->
  <rect x="530" y="66" width="360" height="200" rx="13" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="546" y="92" font-size="13" font-weight="600" fill="#1d4a2b">GCData · 精确 GC 的类型侧依据</text>
  <text x="546" y="110" font-size="10.5" fill="#4a8c60">GC 扫描对象时用其类型 GCData 位图</text>
  <text x="546" y="128" font-size="10.5" fill="#4a8c60">精确知道哪些字是指针，只扫那些</text>

  <!-- bitmap illustration -->
  <text x="546" y="156" font-size="10" fill="#4a8c60">示例结构：struct{ a int; p *T; b int; q *T }</text>
  <g>
    <rect x="546" y="166" width="70" height="34" rx="6" fill="#ffffff" stroke="#bfe0c8"/>
    <text x="581" y="182" font-size="10" fill="#3a3a3c" text-anchor="middle">a int</text>
    <text x="581" y="195" font-size="9.5" fill="#8e8e93" text-anchor="middle">bit 0</text>
    <rect x="620" y="166" width="70" height="34" rx="6" fill="#e3f3e9" stroke="#4a8c60"/>
    <text x="655" y="182" font-size="10" fill="#1d4a2b" text-anchor="middle">p *T</text>
    <text x="655" y="195" font-size="9.5" fill="#4a8c60" text-anchor="middle">bit 1</text>
    <rect x="694" y="166" width="70" height="34" rx="6" fill="#ffffff" stroke="#bfe0c8"/>
    <text x="729" y="182" font-size="10" fill="#3a3a3c" text-anchor="middle">b int</text>
    <text x="729" y="195" font-size="9.5" fill="#8e8e93" text-anchor="middle">bit 0</text>
    <rect x="768" y="166" width="70" height="34" rx="6" fill="#e3f3e9" stroke="#4a8c60"/>
    <text x="803" y="182" font-size="10" fill="#1d4a2b" text-anchor="middle">q *T</text>
    <text x="803" y="195" font-size="9.5" fill="#4a8c60" text-anchor="middle">bit 1</text>
  </g>
  <text x="546" y="224" font-size="10" fill="#4a8c60">位图 = 0 1 0 1 → GC 只追 p、q 两个指针字</text>
  <rect x="546" y="234" width="328" height="22" rx="6" fill="#eff9f2" stroke="#bfe0c8"/>
  <text x="556" y="250" font-size="9.5" fill="#1d4a2b">bit=1 → 该字是指针，需扫描 / 标记</text>

  <!-- consumers (blue) -->
  <rect x="530" y="282" width="360" height="174" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="546" y="308" font-size="12.5" font-weight="600" fill="#1b2a4a">abi.Type 的三方消费者</text>
  <rect x="546" y="320" width="328" height="38" rx="8" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="556" y="338" font-size="10.5" font-weight="600" fill="#1b2a4a">接口</text>
  <text x="556" y="353" font-size="9.5" fill="#5b7db1">eface._type / itab.Type 指向它</text>
  <rect x="546" y="364" width="328" height="38" rx="8" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="556" y="382" font-size="10.5" font-weight="600" fill="#1b2a4a">反射</text>
  <text x="556" y="397" font-size="9.5" fill="#5b7db1">reflect.rtype 就是它的包装</text>
  <rect x="546" y="408" width="328" height="38" rx="8" fill="#eef7f0" stroke="#bfe0c8"/>
  <text x="556" y="426" font-size="10.5" font-weight="600" fill="#1d4a2b">GC</text>
  <text x="556" y="441" font-size="9.5" fill="#4a8c60">读 GCData 精确扫描指针字段</text>

  <!-- arrow GCData field -> GC panel -->
  <line x1="484" y1="337" x2="528" y2="150" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
</svg>
