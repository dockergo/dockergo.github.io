<svg xmlns="http://www.w3.org/2000/svg" width="920" height="500" viewBox="0 0 920 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
    <marker id="arG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#4a8c60"/>
    </marker>
  </defs>
  <rect width="920" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">MVS 最小版本选择 · 取满足所有要求的最高版本</text>

  <!-- contrast (blue) -->
  <rect x="30" y="50" width="860" height="46" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="70" font-size="12" font-weight="600" fill="#1b2a4a">MVS（Minimal Version Selection）· 与 npm/cargo 的"选最新兼容版"相反</text>
  <text x="46" y="88" font-size="10" fill="#5b7db1">每个 go.mod 声明直接依赖的最低版本要求；构建列表取所有要求中的最高者，但不主动升级</text>

  <!-- left: requirement graph (green) -->
  <rect x="30" y="112" width="500" height="256" rx="13" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="46" y="136" font-size="12" font-weight="600" fill="#1d4a2b">构建列表 · BuildList (mvs.go:90)</text>
  <text x="46" y="154" font-size="10" fill="#4a8c60">遍历依赖图，对每个模块取"被要求到的最高版本"</text>

  <!-- main module -->
  <rect x="60" y="170" width="120" height="44" rx="10" fill="#ffffff" stroke="#bfe0c8"/>
  <text x="120" y="192" font-size="10.5" font-weight="600" fill="#1d4a2b" text-anchor="middle">main module</text>
  <text x="120" y="207" font-size="9" fill="#4a8c60" text-anchor="middle">go.mod 根</text>

  <!-- deps require versions -->
  <rect x="60" y="252" width="120" height="44" rx="10" fill="#ffffff" stroke="#bfe0c8"/>
  <text x="120" y="274" font-size="10" fill="#1d4a2b" text-anchor="middle">require A v1.2</text>
  <text x="120" y="289" font-size="9" fill="#4a8c60" text-anchor="middle">直接依赖</text>

  <rect x="60" y="308" width="120" height="44" rx="10" fill="#ffffff" stroke="#bfe0c8"/>
  <text x="120" y="330" font-size="10" fill="#1d4a2b" text-anchor="middle">require B v1.0</text>
  <text x="120" y="345" font-size="9" fill="#4a8c60" text-anchor="middle">直接依赖</text>

  <!-- transitive requiring C -->
  <rect x="230" y="252" width="130" height="44" rx="10" fill="#f6f6f7" stroke="#e2e2e7"/>
  <text x="295" y="274" font-size="10" fill="#3a3a3c" text-anchor="middle">A → C v1.3</text>
  <text x="295" y="289" font-size="9" fill="#6e6e73" text-anchor="middle">间接要求</text>

  <rect x="230" y="308" width="130" height="44" rx="10" fill="#f6f6f7" stroke="#e2e2e7"/>
  <text x="295" y="330" font-size="10" fill="#3a3a3c" text-anchor="middle">B → C v1.1</text>
  <text x="295" y="345" font-size="9" fill="#6e6e73" text-anchor="middle">间接要求</text>

  <!-- selected C -->
  <rect x="400" y="280" width="110" height="44" rx="10" fill="#eef7f0" stroke="#4a8c60" stroke-width="1.5"/>
  <text x="455" y="300" font-size="10.5" font-weight="600" fill="#1d4a2b" text-anchor="middle">选 C v1.3</text>
  <text x="455" y="316" font-size="9" fill="#4a8c60" text-anchor="middle">max(1.3, 1.1)</text>

  <!-- edges -->
  <line x1="120" y1="214" x2="120" y2="250" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="120" y1="214" x2="120" y2="306" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="180" y1="274" x2="228" y2="274" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="180" y1="330" x2="228" y2="330" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="360" y1="274" x2="420" y2="292" stroke="#4a8c60" stroke-width="1.5" marker-end="url(#arG)"/>
  <line x1="360" y1="330" x2="420" y2="312" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- right: properties -->
  <!-- determinism (purple) -->
  <rect x="550" y="112" width="340" height="120" rx="13" fill="#f5f0fb" stroke="#ddcdf0" filter="url(#soft)"/>
  <text x="566" y="136" font-size="12" font-weight="600" fill="#3d2a5a">可重现 · 确定性</text>
  <text x="566" y="160" font-size="10.5" fill="#7d5bb1">同样的 go.mod 图 → 任何时间/机器</text>
  <text x="566" y="180" font-size="10.5" fill="#7d5bb1">解析出同一套版本</text>
  <text x="566" y="204" font-size="10.5" fill="#7d5bb1">无需 lock 文件锚定</text>
  <text x="566" y="222" font-size="10" fill="#7d5bb1">go.sum 只校验完整性，不管版本选择</text>

  <!-- upgrade/downgrade (amber) -->
  <rect x="550" y="248" width="340" height="120" rx="13" fill="#fdf6ec" stroke="#f0dcaf" filter="url(#soft)"/>
  <text x="566" y="272" font-size="12" font-weight="600" fill="#6b4e16">显式升降级 · 供 go get</text>
  <rect x="566" y="286" width="150" height="34" rx="8" fill="#ffffff" stroke="#f0dcaf"/>
  <text x="641" y="308" font-size="10" fill="#6b4e16" text-anchor="middle">Upgrade (mvs.go:288)</text>
  <rect x="724" y="286" width="150" height="34" rx="8" fill="#ffffff" stroke="#f0dcaf"/>
  <text x="799" y="308" font-size="10" fill="#6b4e16" text-anchor="middle">Downgrade</text>
  <text x="566" y="344" font-size="10" fill="#a9822f">主动升降级由 go get 触发，不在构建时自动发生</text>

  <!-- philosophy (green) -->
  <rect x="30" y="386" width="860" height="88" rx="13" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)"/>
  <text x="46" y="410" font-size="12.5" font-weight="600" fill="#1d4a2b">哲学：稳定优先</text>
  <text x="46" y="434" font-size="11" fill="#4a8c60">"最小"指"满足所有要求的最小版本集" —— 不主动引入未被要求的新版本，避免意外破坏。</text>
  <text x="46" y="456" font-size="10" fill="#4a8c60">锚点：BuildList mvs.go:90 · 注释 mvs.go:5 · Upgrade/Downgrade mvs.go:288/327</text>
</svg>
