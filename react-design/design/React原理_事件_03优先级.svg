<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">React 事件优先级 · 两相位传播 + 事件类型 → Lane 映射</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">事件按相位传播（捕获逆序 / 冒泡正序），并按类型定优先级；把交互紧急度接进【Lanes 与调度】—— 交互驱动优先级的入口</text>

  <!-- 两相位 blue -->
  <rect x="30" y="70" width="500" height="170" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="48" y="94" font-size="12" font-weight="600" fill="#1b2a4a">两相位传播 · processDispatchQueueItemsInOrder（:266）</text>
  <!-- 捕获相 -->
  <rect x="48" y="106" width="222" height="60" rx="10" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="159" y="128" font-size="10.5" font-weight="600" text-anchor="middle" fill="#274a78">捕获阶段 · 逆序（:273）</text>
  <text x="159" y="148" font-size="8.5" text-anchor="middle" fill="#5b7db1">从根向目标 · listener 逆序遍历</text>
  <text x="159" y="162" font-size="8.5" text-anchor="middle" fill="#5b7db1">onXxxCapture</text>
  <!-- 冒泡相 -->
  <rect x="288" y="106" width="222" height="60" rx="10" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="399" y="128" font-size="10.5" font-weight="600" text-anchor="middle" fill="#274a78">冒泡阶段 · 正序（:292）</text>
  <text x="399" y="148" font-size="8.5" text-anchor="middle" fill="#5b7db1">从目标向根 · listener 正序遍历</text>
  <text x="399" y="162" font-size="8.5" text-anchor="middle" fill="#5b7db1">默认 onXxx</text>
  <text x="48" y="190" font-size="9.5" fill="#5b7db1">inCapturePhase（:317）由 IS_CAPTURE_PHASE flag 判定相位</text>
  <text x="48" y="212" font-size="9" fill="#8aa4c8">stopPropagation 停的是 React 传播，与原生略有别</text>
  <text x="48" y="230" font-size="9" fill="#8aa4c8">需捕获阶段处理用 onXxxCapture；默认冒泡阶段</text>

  <!-- 优先级映射 green -->
  <rect x="550" y="70" width="500" height="170" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="568" y="94" font-size="12" font-weight="600" fill="#12402a">优先级映射 · 事件类型 → 优先级</text>
  <text x="568" y="118" font-size="9.5" fill="#2f6f4f">createEventListenerWrapperWithPriority</text>
  <text x="568" y="136" font-size="9" fill="#4a8a63">ReactDOMEventListener.js:94 —— 按事件类型定优先级</text>
  <text x="568" y="160" font-size="9.5" fill="#2f6f4f">getEventPriority(domEventName)（:312）</text>
  <text x="568" y="178" font-size="9" fill="#4a8a63">返回 Discrete / Continuous / Default</text>
  <text x="568" y="202" font-size="9.5" fill="#2f6f4f">dispatchDiscreteEvent（:131）</text>
  <text x="568" y="222" font-size="9" fill="#4a8a63">对离散事件（点击）设 DiscreteEventPriority = SyncLane</text>

  <!-- 映射三档 y=260 -->
  <text x="30" y="278" font-size="12" font-weight="700" fill="#1d1d1f">getEventPriority · 三档映射到 Lane</text>
  <!-- Discrete red -->
  <rect x="30" y="290" width="330" height="110" rx="12" fill="#fbeaea" stroke="#e6b8b8" filter="url(#soft)"/>
  <text x="195" y="314" font-size="11.5" font-weight="600" text-anchor="middle" fill="#7a2a2a">Discrete 离散</text>
  <text x="195" y="336" font-size="9.5" text-anchor="middle" fill="#a05a5a">点击 / 输入（click / input）</text>
  <text x="195" y="356" font-size="9.5" text-anchor="middle" fill="#a05a5a">DiscreteEventPriority = SyncLane</text>
  <text x="195" y="378" font-size="9" text-anchor="middle" fill="#c07a7a">最高优先级 · 用户要立即反馈 · 同步刷</text>
  <!-- Continuous amber -->
  <rect x="375" y="290" width="330" height="110" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="540" y="314" font-size="11.5" font-weight="600" text-anchor="middle" fill="#5a3410">Continuous 连续</text>
  <text x="540" y="336" font-size="9.5" text-anchor="middle" fill="#93762e">滚动 / 拖拽（scroll / drag）</text>
  <text x="540" y="356" font-size="9.5" text-anchor="middle" fill="#93762e">ContinuousEventPriority</text>
  <text x="540" y="378" font-size="9" text-anchor="middle" fill="#b1974e">次高 · 频繁触发可稍缓 · InputContinuousLane</text>
  <!-- Default blue -->
  <rect x="720" y="290" width="330" height="110" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="885" y="314" font-size="11.5" font-weight="600" text-anchor="middle" fill="#1b2a4a">Default 默认</text>
  <text x="885" y="336" font-size="9.5" text-anchor="middle" fill="#5b7db1">其余事件</text>
  <text x="885" y="356" font-size="9.5" text-anchor="middle" fill="#5b7db1">DefaultEventPriority</text>
  <text x="885" y="378" font-size="9" text-anchor="middle" fill="#8aa4c8">普通优先级 · DefaultLane</text>

  <!-- 为什么按类型定优先级 purple -->
  <rect x="30" y="416" width="1020" height="60" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="48" y="440" font-size="11.5" font-weight="600" fill="#4a2c6f">为什么按类型定优先级</text>
  <text x="48" y="462" font-size="9.5" fill="#7a5aa0">点击 / 输入（离散）要立即反馈 = 最高（SyncLane）；滚动 / 拖拽（连续）频繁触发 = 次高可稍缓；事件类型映射到 Lane，把交互紧急度接进优先级调度</text>

  <text x="30" y="502" font-size="9" fill="#a1a1a6">源码基准 React(git 7023f50 · v19.3) · ReactDOMEventListener.js getEventPriority:312 / dispatchDiscreteEvent:131 · DOMPluginEventSystem.js 相位:266/273/292/317</text>
</svg>
