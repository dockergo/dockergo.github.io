<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">React 接触面 × 能力域 依赖矩阵 —— 每种用法依赖哪些内部机制</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">✓ = 该场景依赖该能力域;渲染=Fiber+协调+render/commit,交互响应=Lanes+并发+事件</text>

  <!-- 列头 (能力域) -->
  <g font-size="9" font-weight="600" fill="#1d1d1f" text-anchor="middle">
    <text x="360" y="92">Fiber</text>
    <text x="450" y="92">协调Diff</text>
    <text x="548" y="92">render/commit</text>
    <text x="646" y="92">Hooks</text>
    <text x="736" y="92">Lanes</text>
    <text x="826" y="92">并发</text>
    <text x="916" y="92">事件</text>
  </g>
  <line x1="315" y1="100" x2="960" y2="100" stroke="#e4e4ea" stroke-width="1"/>

  <!-- 行 -->
  <g font-size="10">
    <!-- 首屏渲染 -->
    <rect x="30" y="110" width="275" height="40" rx="8" fill="#f4eefb" stroke="#d9c7ec"/>
    <text x="48" y="135" font-size="10" font-weight="600" fill="#4a2c6f">首屏渲染(mount)</text>
    <!-- 状态更新重渲染 -->
    <rect x="30" y="158" width="275" height="40" rx="8" fill="#eef3fb" stroke="#bcd0ec"/>
    <text x="48" y="183" font-size="10" font-weight="600" fill="#1b2a4a">状态更新 → 重渲染</text>
    <!-- 列表更新 -->
    <rect x="30" y="206" width="275" height="40" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
    <text x="48" y="231" font-size="10" font-weight="600" fill="#12402a">列表更新(key diff)</text>
    <!-- 交互响应 -->
    <rect x="30" y="254" width="275" height="40" rx="8" fill="#fff7e6" stroke="#e8cf9a"/>
    <text x="48" y="279" font-size="10" font-weight="600" fill="#5a3410">点击/输入交互响应</text>
    <!-- 大列表不卡 -->
    <rect x="30" y="302" width="275" height="40" rx="8" fill="#fbeaea" stroke="#e6b8b8"/>
    <text x="48" y="327" font-size="10" font-weight="600" fill="#7a2a2a">大列表渲染不卡顿</text>
    <!-- 异步数据 -->
    <rect x="30" y="350" width="275" height="40" rx="8" fill="#f4eefb" stroke="#d9c7ec"/>
    <text x="48" y="375" font-size="10" font-weight="600" fill="#4a2c6f">异步数据加载</text>
  </g>

  <!-- ✓ 标记: 列 x: Fiber360 协调450 rc548 Hooks646 Lanes736 并发826 事件916 -->
  <g font-size="13" font-weight="700" fill="#2f6f4f" text-anchor="middle">
    <!-- mount(130): Fiber协调rc Hooks 事件 -->
    <text x="360" y="135">✓</text><text x="450" y="135">✓</text><text x="548" y="135">✓</text><text x="646" y="135">✓</text><text x="916" y="135">✓</text>
    <!-- 重渲染(183): Fiber协调rc Hooks Lanes -->
    <text x="360" y="183">✓</text><text x="450" y="183">✓</text><text x="548" y="183">✓</text><text x="646" y="183">✓</text><text x="736" y="183">✓</text>
    <!-- 列表(231): Fiber协调rc -->
    <text x="360" y="231">✓</text><text x="450" y="231">✓</text><text x="548" y="231">✓</text>
    <!-- 交互(279): Lanes 事件 rc -->
    <text x="548" y="279">✓</text><text x="736" y="279">✓</text><text x="916" y="279">✓</text>
    <!-- 大列表不卡(327): Lanes 并发 -->
    <text x="736" y="327">✓</text><text x="826" y="327">✓</text>
    <!-- 异步(375): 并发(Suspense) rc -->
    <text x="548" y="375">✓</text><text x="826" y="375">✓</text>
  </g>

  <text x="30" y="418" font-size="9.5" fill="#6e6e73">读法:任何渲染都经 Fiber 树 + 协调 Diff + render/commit;交互响应靠 Lanes(优先级)+ 事件系统;大列表不卡靠并发(过渡/时间切片);异步靠 Suspense</text>
  <text x="30" y="440" font-size="9.5" fill="#6e6e73">关键:Lanes 与并发是"响应式"的保障——点击(SyncLane)打断大列表渲染(TransitionLane),5ms 切片让路,用户始终感到流畅</text>
  <text x="30" y="476" font-size="9" fill="#a1a1a6">源码基准 React(git 7023f50 · v19.3)· 声明式渲染 + 优先级调度的能力域协作矩阵</text>
</svg>
