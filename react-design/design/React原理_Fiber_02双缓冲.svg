<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">alternate 双缓冲 —— current 树 ↔ workInProgress 树，commit 时交换指针（类比双缓冲渲染）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">同时存两棵 Fiber 树：render 在 wip 上改（不碰屏上 current），可中断丢弃重来；commit 一次性切换，用户不见半成品 · ReactFiber.js:323</text>

  <!-- 左：current 树 (green，屏上) -->
  <rect x="30" y="82" width="440" height="250" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="50" y="108" font-size="12.5" font-weight="600" fill="#12402a">current 树 · 屏幕上显示的</text>
  <text x="50" y="128" font-size="9.5" fill="#4a8a63">root.current 指向它</text>
  <!-- current 小树 -->
  <rect x="200" y="146" width="100" height="34" rx="9" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="250" y="168" font-size="10" text-anchor="middle" fill="#1a5c3a">HostRoot</text>
  <rect x="120" y="220" width="100" height="34" rx="9" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="170" y="242" font-size="10" text-anchor="middle" fill="#1a5c3a">App</text>
  <rect x="280" y="220" width="100" height="34" rx="9" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="330" y="242" font-size="10" text-anchor="middle" fill="#1a5c3a">div</text>
  <rect x="280" y="286" width="100" height="34" rx="9" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="330" y="308" font-size="10" text-anchor="middle" fill="#1a5c3a">text</text>
  <path d="M240,180 L180,220" stroke="#c7c7cc" stroke-width="1.4" fill="none"/>
  <path d="M262,180 L322,220" stroke="#c7c7cc" stroke-width="1.4" fill="none"/>
  <path d="M330,254 L330,286" stroke="#c7c7cc" stroke-width="1.4" fill="none"/>

  <!-- 右：workInProgress 树 (blue，构建中) -->
  <rect x="610" y="82" width="440" height="250" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="630" y="108" font-size="12.5" font-weight="600" fill="#1b2a4a">workInProgress 树 · 正在构建的新</text>
  <text x="630" y="128" font-size="9.5" fill="#5b7db1">render 在这棵上做，可中断重来</text>
  <rect x="780" y="146" width="100" height="34" rx="9" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="830" y="168" font-size="10" text-anchor="middle" fill="#1b2a4a">HostRoot</text>
  <rect x="700" y="220" width="100" height="34" rx="9" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="750" y="242" font-size="10" text-anchor="middle" fill="#1b2a4a">App</text>
  <rect x="860" y="220" width="100" height="34" rx="9" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="910" y="242" font-size="10" text-anchor="middle" fill="#1b2a4a">div</text>
  <rect x="860" y="286" width="100" height="34" rx="9" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="910" y="308" font-size="10" text-anchor="middle" fill="#1b2a4a">text'</text>
  <path d="M820,180 L760,220" stroke="#c7c7cc" stroke-width="1.4" fill="none"/>
  <path d="M842,180 L902,220" stroke="#c7c7cc" stroke-width="1.4" fill="none"/>
  <path d="M910,254 L910,286" stroke="#c7c7cc" stroke-width="1.4" fill="none"/>

  <!-- alternate 互链（双向） -->
  <path d="M300,163 L780,163" stroke="#d9c7ec" stroke-width="1.6" fill="none" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <rect x="470" y="150" width="140" height="26" rx="8" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="540" y="167" font-size="9.5" text-anchor="middle" fill="#5a3a86">alternate 互链 :174</text>
  <path d="M220,237 L700,237" stroke="#d9c7ec" stroke-width="1.2" stroke-dasharray="4 3" fill="none"/>
  <text x="460" y="232" font-size="8.5" text-anchor="middle" fill="#9a7ac0">wip.alternate=current；current.alternate=wip :350</text>

  <!-- createWorkInProgress 说明 (purple) -->
  <rect x="30" y="346" width="640" height="90" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="50" y="371" font-size="11.5" font-weight="600" fill="#3d2a5a">createWorkInProgress(current, pendingProps) · ReactFiber.js:323</text>
  <text x="50" y="393" font-size="9.5" fill="#6a4a93">复用 current.alternate（存在则），否则懒建、双向配对 :350</text>
  <text x="50" y="411" font-size="9.5" fill="#6a4a93">复用时重置 flags/subtreeFlags/deletions :359；从 current 拷 child/memoizedProps/memoizedState/updateQueue :387</text>
  <text x="50" y="429" font-size="9.5" fill="#9a7ac0">dependencies 克隆非共享 :394 —— 不是 current 的深拷贝</text>

  <!-- 提交交换 (amber) -->
  <rect x="682" y="346" width="368" height="90" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="702" y="371" font-size="11.5" font-weight="600" fill="#5a3410">commit 后 root.current 指向 workInProgress</text>
  <text x="702" y="393" font-size="9.5" fill="#93762e">—— 一次性切换指针（原子）</text>
  <text x="702" y="411" font-size="9.5" fill="#93762e">原 current 变下次的 workInProgress，复用</text>
  <text x="702" y="429" font-size="9.5" fill="#b08a3a">两棵树复用（alternate），省分配</text>

  <!-- 底部一句话 -->
  <rect x="30" y="450" width="1020" height="72" rx="12" fill="#f2fbf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="50" y="475" font-size="11" font-weight="600" fill="#12402a">为什么双缓冲</text>
  <text x="50" y="497" font-size="9.5" fill="#2f6f4f">render 在 workInProgress 上改（不碰屏上的 current），构建中可中断、丢弃、重来都不影响显示；</text>
  <text x="50" y="515" font-size="9.5" fill="#2f6f4f">commit 一次性切换——用户不会看到半成品树。两棵树复用（alternate），省分配。</text>
</svg>
