<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">commit 三子阶段 —— before-mutation / mutation / layout,同步不可中断地应用到 DOM</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">commitRootImpl 三相有序同步执行:读旧 → 改真实 DOM → 读新+副作用,保证 DOM 一致</text>

  <!-- 三相 -->
  <!-- before-mutation (blue) -->
  <rect x="40" y="86" width="315" height="150" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="197" y="114" font-size="12.5" font-weight="600" text-anchor="middle" fill="#1b2a4a">① before-mutation</text>
  <text x="197" y="138" font-size="9.5" text-anchor="middle" fill="#5b7db1">commitBeforeMutationEffects (:3860)</text>
  <text x="197" y="160" font-size="9.5" text-anchor="middle" fill="#5b7db1">DOM 改前</text>
  <text x="197" y="180" font-size="9.5" text-anchor="middle" fill="#5b7db1">getSnapshotBeforeUpdate 等</text>
  <text x="197" y="210" font-size="9" text-anchor="middle" fill="#8aa4c8">读旧 DOM 的 snapshot</text>

  <!-- mutation (amber) -->
  <rect x="382" y="86" width="316" height="150" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="540" y="114" font-size="12.5" font-weight="600" text-anchor="middle" fill="#5a3410">② mutation</text>
  <text x="540" y="138" font-size="9.5" text-anchor="middle" fill="#93762e">commitMutationEffects (:4017)</text>
  <text x="540" y="160" font-size="9.5" text-anchor="middle" fill="#93762e">按 flags 增删改真实 DOM</text>
  <text x="540" y="180" font-size="9.5" text-anchor="middle" fill="#93762e">Placement 插 / Deletion 删 / Update 改</text>
  <text x="540" y="210" font-size="9" text-anchor="middle" fill="#93762e">此后 DOM 已是新的</text>

  <!-- layout (green) -->
  <rect x="725" y="86" width="315" height="150" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="882" y="114" font-size="12.5" font-weight="600" text-anchor="middle" fill="#12402a">③ layout</text>
  <text x="882" y="138" font-size="9.5" text-anchor="middle" fill="#2f6f4f">commitLayoutEffects (:4111)</text>
  <text x="882" y="160" font-size="9.5" text-anchor="middle" fill="#2f6f4f">DOM 改后同步</text>
  <text x="882" y="180" font-size="9.5" text-anchor="middle" fill="#2f6f4f">useLayoutEffect · didMount/Update · ref</text>
  <text x="882" y="210" font-size="9" text-anchor="middle" fill="#4a8a63">读新 DOM 的测量</text>

  <path d="M355,161 L382,161" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M698,161 L725,161" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- commit 后 (purple) -->
  <rect x="40" y="256" width="1000" height="76" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="60" y="282" font-size="12" font-weight="600" fill="#3d2a5a">commit 后 · 双缓冲切换 + 请求绘制</text>
  <text x="60" y="304" font-size="9.5" fill="#7a5aa0">root.current 切 workInProgress(双缓冲)· requestPaint(:4175)让浏览器绘制。</text>
  <text x="60" y="324" font-size="9.5" fill="#9a7ac0">passive effect(useEffect)在 paint 后异步跑——不阻塞本次提交与绘制。</text>
  <path d="M540,236 L540,256" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- why 底 (red) -->
  <rect x="40" y="352" width="1000" height="102" rx="12" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="60" y="378" font-size="12" font-weight="600" fill="#7a2a2a">为什么三相 + 为什么不可中断</text>
  <text x="60" y="400" font-size="9.5" fill="#7a2a2a">改 DOM(mutation)前要读旧 DOM(before-mutation 的 snapshot)、改后要读新 DOM(layout 的测量);</text>
  <text x="60" y="420" font-size="9.5" fill="#7a2a2a">三相顺序保证"读旧 → 改 → 读新+副作用",且全同步确保 DOM 一致。</text>
  <text x="60" y="440" font-size="9.5" fill="#a05a5a">若 commit 可中断,用户会看到半更新的 UI(撕裂)——故 commit 必须原子。</text>

  <text x="30" y="484" font-size="9" fill="#a1a1a6">源码基准 React(7023f50) · ReactFiberWorkLoop.js commitRootImpl · render 输出"要改什么",commit 执行"改"</text>
</svg>
