<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">React 组件 —— 组件是接受 props 返回 element 的映射，组合成树，在 Fiber 树里是一个 Fiber</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">组件 = props → UI 的映射；函数组件直白（输入 props 返 UI）配 Hooks 补状态，类组件老式；React 调用组件函数得 element 树，再协调成 Fiber</text>

  <!-- 左：函数组件 vs 类组件 两卡 -->
  <!-- 函数组件 (blue) -->
  <rect x="30" y="88" width="330" height="176" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="50" y="114" font-size="12.5" font-weight="600" fill="#1b2a4a">函数组件（最常用）</text>
  <text x="50" y="138" font-size="10" fill="#4a6da3">function App(props) {</text>
  <text x="50" y="156" font-size="10" fill="#4a6da3">&#160;&#160;return &lt;div /&gt;</text>
  <text x="50" y="174" font-size="10" fill="#4a6da3">}</text>
  <text x="50" y="200" font-size="9.5" fill="#5b7db1">props 入、返 JSX（element 树）</text>
  <text x="50" y="220" font-size="9.5" fill="#5b7db1">配 Hooks 有状态</text>
  <text x="50" y="246" font-size="9" fill="#8aa4c8">tag = FunctionComponent</text>

  <!-- 类组件 (white/neutral) -->
  <rect x="376" y="88" width="330" height="176" rx="13" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="396" y="114" font-size="12.5" font-weight="600" fill="#1d1d1f">类组件（老式）</text>
  <text x="396" y="138" font-size="10" fill="#6e6e73">class App extends</text>
  <text x="396" y="156" font-size="10" fill="#6e6e73">&#160;&#160;React.Component {</text>
  <text x="396" y="174" font-size="10" fill="#6e6e73">&#160;&#160;render() { return … } }</text>
  <text x="396" y="200" font-size="9.5" fill="#6e6e73">render() 返 JSX、this.state / setState</text>
  <text x="396" y="220" font-size="9.5" fill="#6e6e73">生命周期方法</text>
  <text x="396" y="246" font-size="9" fill="#86868b">tag = ClassComponent</text>

  <!-- props/children 说明 (purple) -->
  <rect x="722" y="88" width="328" height="176" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="742" y="114" font-size="12.5" font-weight="600" fill="#3d2a5a">props / children</text>
  <text x="742" y="140" font-size="9.5" fill="#6a4a93">props：父传子的数据</text>
  <text x="742" y="162" font-size="9.5" fill="#6a4a93">children 是特殊 prop</text>
  <text x="742" y="184" font-size="9.5" fill="#6a4a93">（嵌套 JSX）</text>
  <text x="742" y="214" font-size="9.5" fill="#9a7ac0">组件间靠 props 单向传数据</text>
  <text x="742" y="236" font-size="9.5" fill="#9a7ac0">组合成组件树</text>

  <!-- 箭头到 beginWork -->
  <path d="M195,264 L195,300 L540,300 L540,326" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M541,264 L541,300" stroke="#c7c7cc" stroke-width="1.5" fill="none"/>

  <!-- beginWork 协调带 (green) -->
  <rect x="30" y="326" width="1020" height="86" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="50" y="352" font-size="12" font-weight="600" fill="#12402a">beginWork 时"跑组件函数" → 得子 element → 协调成子 Fiber</text>
  <text x="50" y="376" font-size="10" fill="#2f6f4f">组件在 Fiber 树里就是一个 Fiber 节点（tag 标类型 FunctionComponent / ClassComponent）</text>
  <text x="50" y="398" font-size="9.5" fill="#4a8a63">React 调用组件函数得 element 树 → 再协调成 Fiber（协调细节见 Fiber 架构 / 协调与 Diff 篇）</text>

  <!-- 组合成树示意 (右下角小树，用连接线) -->
  <rect x="30" y="430" width="1020" height="70" rx="12" fill="#f2fbf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="50" y="455" font-size="11" font-weight="600" fill="#12402a">为什么组件=函数</text>
  <text x="50" y="477" font-size="9.5" fill="#2f6f4f">组件是"props→UI"的映射；函数组件直白（输入 props 返 UI），Hooks 补状态取代类的 state / 生命周期；</text>
  <text x="50" y="494" font-size="9.5" fill="#2f6f4f">组件层层组合成树，父组件的 JSX 里嵌子组件 element，React 递归协调整棵组件树。</text>
</svg>
