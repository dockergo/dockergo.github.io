<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">React 能力域依赖关系图 —— 实线=数据流,虚线=约束</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">贯穿层:Fiber 树(current↔workInProgress 双缓冲)是公共舞台,协调/render/commit/Hooks 都在它上面运作</text>

  <!-- 接触面 -->
  <rect x="400" y="74" width="280" height="46" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="540" y="94" font-size="11" font-weight="600" text-anchor="middle" fill="#4a2c6f">接触面:组件/JSX + Hooks API</text>
  <text x="540" y="111" font-size="8.5" text-anchor="middle" fill="#7a5aa0">setState / useState 触发更新</text>

  <!-- Lanes (优先级入口) -->
  <rect x="60" y="160" width="220" height="70" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="170" y="184" font-size="10.5" font-weight="600" text-anchor="middle" fill="#1b2a4a">Lanes 与调度</text>
  <text x="170" y="203" font-size="8.5" text-anchor="middle" fill="#5b7db1">更新打 lane 定优先级</text>
  <text x="170" y="219" font-size="8.5" text-anchor="middle" fill="#5b7db1">getNextLanes 选批</text>

  <!-- 事件系统 -->
  <rect x="800" y="160" width="220" height="70" rx="11" fill="#fbeaea" stroke="#e6b8b8" filter="url(#soft)"/>
  <text x="910" y="184" font-size="10.5" font-weight="600" text-anchor="middle" fill="#7a2a2a">事件系统</text>
  <text x="910" y="203" font-size="8.5" text-anchor="middle" fill="#a05a5a">委托 root + 优先级映射</text>
  <text x="910" y="219" font-size="8.5" text-anchor="middle" fill="#a05a5a">离散事件=SyncLane</text>

  <!-- render 阶段 (中央核心) -->
  <rect x="330" y="250" width="420" height="86" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="540" y="274" font-size="11.5" font-weight="600" text-anchor="middle" fill="#1b2a4a">render 阶段(可中断)· 协调 + Diff</text>
  <text x="540" y="296" font-size="9" text-anchor="middle" fill="#5b7db1">workLoop:beginWork→completeWork 构 workInProgress 树</text>
  <text x="540" y="314" font-size="9" text-anchor="middle" fill="#5b7db1">reconcileChildren 对比、key 复用、打 flags · shouldYield 让路</text>
  <text x="540" y="330" font-size="8.5" text-anchor="middle" fill="#8aa4c8">并发特性(时间切片/过渡/Suspense)在此让路/挂起</text>

  <!-- commit 阶段 -->
  <rect x="330" y="360" width="420" height="66" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="540" y="384" font-size="11.5" font-weight="600" text-anchor="middle" fill="#12402a">commit 阶段(同步)· 应用到 DOM</text>
  <text x="540" y="405" font-size="9" text-anchor="middle" fill="#2f6f4f">三子阶段改 DOM + 交换 current 指针 + 跑 effect</text>
  <text x="540" y="420" font-size="8.5" text-anchor="middle" fill="#4a8a63">commit 后事件 listener 生效(DOM 已挂载)</text>

  <!-- Fiber 贯穿层 -->
  <rect x="60" y="360" width="220" height="66" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="170" y="384" font-size="10" font-weight="600" text-anchor="middle" fill="#5a3410">Fiber 树(贯穿层)</text>
  <text x="170" y="403" font-size="8.5" text-anchor="middle" fill="#93762e">双缓冲 current↔wip</text>
  <text x="170" y="418" font-size="8.5" text-anchor="middle" fill="#93762e">Hooks 挂 memoizedState</text>

  <!-- 箭头: 接触面→Lanes / 事件→Lanes -->
  <path d="M440,110 L200,160" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <path d="M910,160 L910,150 L700,110" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <!-- Lanes→render -->
  <path d="M200,230 L400,250" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <!-- 事件→render(优先级) -->
  <path d="M880,230 L680,250" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <!-- render→commit -->
  <path d="M540,336 L540,360" stroke="#c7c7cc" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>
  <!-- Fiber 双向约束 (虚线) render/commit ↔ Fiber -->
  <path d="M330,300 L280,360" stroke="#e8cf9a" stroke-width="1.3" stroke-dasharray="4 3" fill="none"/>
  <path d="M330,393 L280,393" stroke="#e8cf9a" stroke-width="1.3" stroke-dasharray="4 3" fill="none" marker-end="url(#ar)"/>

  <text x="30" y="458" font-size="9.5" fill="#6e6e73">数据流:setState/事件 → Lanes 定优先级 → render 阶段(协调 diff 构 wip 树,可中断)→ commit 阶段(同步改 DOM,交换指针)</text>
  <text x="30" y="480" font-size="9.5" fill="#6e6e73">约束(虚线):所有阶段都在 Fiber 树上运作——render 遍历它、commit 交换它的 current 指针、Hooks 挂在它的 memoizedState</text>
  <text x="30" y="504" font-size="9" fill="#a1a1a6">灵魂:Fiber 双缓冲 + Lane 优先级 = 可中断并发渲染的两块基石 · 源码基准 React(git 7023f50 · v19.3)</text>
</svg>
