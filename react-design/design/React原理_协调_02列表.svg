<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">key diff —— 列表按 key 匹配复用,无 key 用 index(为何列表要稳定 key)</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">reconcileChildrenArray 两趟:第一趟按位置 updateSlot,第二趟剩余入 keyed map;placeChild 用 last-placed-index 判移动</text>

  <!-- 第一趟 (blue container) -->
  <rect x="40" y="80" width="1000" height="118" rx="13" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="60" y="106" font-size="12" font-weight="600" fill="#274a78">第一趟 · 按位置并行遍历 updateSlot (reconcileChildrenArray :1177)</text>
  <text x="60" y="126" font-size="9.5" fill="#5b7db1">并行遍历新旧列表:key 对得上就按位置匹配复用;key 不匹配则断出(:842),进入第二趟。</text>

  <!-- 旧列表 -->
  <text x="60" y="152" font-size="9.5" fill="#8aa4c8">旧</text>
  <rect x="88" y="140" width="66" height="42" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="121" y="166" font-size="11" text-anchor="middle" fill="#1b2a4a">a</text>
  <rect x="162" y="140" width="66" height="42" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="195" y="166" font-size="11" text-anchor="middle" fill="#1b2a4a">b</text>
  <rect x="236" y="140" width="66" height="42" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="269" y="166" font-size="11" text-anchor="middle" fill="#1b2a4a">c</text>
  <!-- 新列表 -->
  <text x="640" y="152" font-size="9.5" fill="#8aa4c8">新</text>
  <rect x="668" y="140" width="66" height="42" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="701" y="166" font-size="11" text-anchor="middle" fill="#12402a">a</text>
  <rect x="742" y="140" width="66" height="42" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="775" y="166" font-size="11" text-anchor="middle" fill="#12402a">b</text>
  <rect x="816" y="140" width="66" height="42" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="849" y="166" font-size="11" text-anchor="middle" fill="#12402a">d</text>
  <text x="400" y="166" font-size="9" fill="#a1a1a6">key 对齐 → 复用</text>
  <path d="M470,161 L640,161" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 第二趟 (green container) -->
  <rect x="40" y="212" width="1000" height="130" rx="13" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="60" y="238" font-size="12" font-weight="600" fill="#2c5a3a">第二趟 · 按 key map(mapRemainingChildren)</text>
  <text x="60" y="258" font-size="9.5" fill="#2f6f4f">剩余旧 children 放进 keyed map;新 children 从 map 里按 key 取(updateFromMap)——移动/复原就靠此。</text>
  <text x="60" y="278" font-size="9.5" fill="#2f6f4f">map 里剩下没被取走的旧 children → 删除(:1308)。</text>

  <rect x="60" y="292" width="300" height="40" rx="9" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="210" y="317" font-size="10" text-anchor="middle" fill="#12402a">map: { a→fiber, b→fiber, c→fiber }</text>
  <rect x="390" y="292" width="300" height="40" rx="9" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="540" y="317" font-size="10" text-anchor="middle" fill="#12402a">新按 key 取:a✓ b✓ d✗(建新)</text>
  <rect x="720" y="292" width="300" height="40" rx="9" fill="#fbeaea" stroke="#e7c3c3"/>
  <text x="870" y="317" font-size="10" text-anchor="middle" fill="#7a2a2a">剩 c → Deletion</text>
  <path d="M360,312 L390,312" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M690,312 L720,312" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 移动检测 (amber) -->
  <rect x="40" y="356" width="640" height="96" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="60" y="382" font-size="12" font-weight="600" fill="#5a3410">移动检测 · placeChild (:511)</text>
  <text x="60" y="404" font-size="9.5" fill="#93762e">比较 current.index 与 lastPlacedIndex(:524)</text>
  <text x="60" y="424" font-size="9.5" fill="#93762e">oldIndex &lt; lastPlacedIndex → 标 Placement(需前移)</text>
  <text x="60" y="444" font-size="9.5" fill="#93762e">否则原地,并推进 lastPlacedIndex</text>

  <!-- 为何稳定 key (red) -->
  <rect x="700" y="356" width="340" height="96" rx="12" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="720" y="382" font-size="12" font-weight="600" fill="#7a2a2a">为何列表要稳定 key</text>
  <text x="720" y="404" font-size="9.5" fill="#7a2a2a">无 key 退化为按 index 匹配</text>
  <text x="720" y="424" font-size="9.5" fill="#7a2a2a">增删/排序时 index 做 key 误复用</text>
  <text x="720" y="444" font-size="9" fill="#a05a5a">→ 状态串到别的项,用稳定业务 key</text>

  <text x="30" y="484" font-size="10.5" font-weight="600" fill="#1d1d1f">为什么用 last-placed-index</text>
  <text x="30" y="504" font-size="9.5" fill="#6e6e73">贪心判最少移动的启发式:从左到右,若某节点旧位置比已放置的最大位置小,说明需前移(标移动);否则原地。</text>
  <text x="30" y="524" font-size="9" fill="#a1a1a6">顺序不变的列表零移动,只有真移动才标——高效。源码基准 React(7023f50) · ReactChildFiber.js</text>
</svg>
