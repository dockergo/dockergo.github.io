<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">两阶段分工 —— render(可中断,构树/diff,无副作用)vs commit(同步,改 DOM/跑 effect)</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">分界:render 输出"要改什么"(flags on Fiber),commit 执行"改"——这是 React 并发的核心权衡</text>

  <!-- render 阶段 (blue) -->
  <rect x="40" y="82" width="470" height="300" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="275" y="110" font-size="13" font-weight="600" text-anchor="middle" fill="#1b2a4a">render 阶段 · 可中断</text>
  <text x="275" y="132" font-size="10" text-anchor="middle" fill="#5b7db1">构建 workInProgress 树 · 协调 diff · 标 flags</text>

  <rect x="64" y="150" width="422" height="58" rx="10" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="84" y="174" font-size="10.5" font-weight="600" fill="#274a78">在 workInProgress 上做</text>
  <text x="84" y="194" font-size="9.5" fill="#5b7db1">不碰屏上 current,被高优打断则丢弃重来</text>

  <rect x="64" y="218" width="422" height="58" rx="10" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="84" y="242" font-size="10.5" font-weight="600" fill="#274a78">时间片让出(5ms)</text>
  <text x="84" y="262" font-size="9.5" fill="#5b7db1">shouldYield 让浏览器 / 高优更新先跑</text>

  <rect x="64" y="286" width="422" height="58" rx="10" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="84" y="310" font-size="10.5" font-weight="600" fill="#274a78">无副作用(保纯)</text>
  <text x="84" y="330" font-size="9.5" fill="#5b7db1">可能中断/重跑,fetch/订阅/DOM 改放 effect</text>

  <text x="275" y="368" font-size="9.5" text-anchor="middle" fill="#8aa4c8">beginWork / completeWork 构建,输出 flags</text>

  <!-- 分界箭头 -->
  <path d="M510,232 L570,232" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="540" y="222" font-size="9" text-anchor="middle" fill="#a1a1a6">flags</text>

  <!-- commit 阶段 (amber) -->
  <rect x="570" y="82" width="470" height="300" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="805" y="110" font-size="13" font-weight="600" text-anchor="middle" fill="#5a3410">commit 阶段 · 同步不可中断</text>
  <text x="805" y="132" font-size="10" text-anchor="middle" fill="#93762e">三相有序地把变更应用到真实 DOM</text>

  <rect x="594" y="150" width="422" height="58" rx="10" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="614" y="174" font-size="10.5" font-weight="600" fill="#5a3410">一次性同步提交</text>
  <text x="614" y="194" font-size="9.5" fill="#93762e">before-mutation → mutation → layout</text>

  <rect x="594" y="218" width="422" height="58" rx="10" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="614" y="242" font-size="10.5" font-weight="600" fill="#5a3410">改真实 DOM + 跑 effect</text>
  <text x="614" y="262" font-size="9.5" fill="#93762e">按 flags 增删改 · useLayoutEffect 同步</text>

  <rect x="594" y="286" width="422" height="58" rx="10" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="614" y="310" font-size="10.5" font-weight="600" fill="#5a3410">必须原子(不可半途)</text>
  <text x="614" y="330" font-size="9.5" fill="#93762e">可中断则用户看到半更新 UI(撕裂)</text>

  <text x="805" y="368" font-size="9.5" text-anchor="middle" fill="#93762e">切 current(双缓冲)· useEffect paint 后异步</text>

  <!-- why 底 (white) -->
  <rect x="40" y="398" width="1000" height="64" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="60" y="422" font-size="11" font-weight="600" fill="#1d1d1f">为什么这么分</text>
  <text x="60" y="444" font-size="9.5" fill="#6e6e73">并发渲染要求 render 可打断(响应高优输入);但 DOM 提交必须原子(不能半途)——render 慢工出细活可中断、commit 快刀斩乱麻不可断。</text>

  <text x="30" y="484" font-size="9" fill="#a1a1a6">源码基准 React(7023f50) · ReactFiberWorkLoop.js · render 慢可断、commit 快原子,是并发核心权衡</text>
</svg>
