<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">useState 与 useEffect —— 队列驱动更新 vs effect 链表异步执行</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">useState 入队并触发重渲染(queue 空时 eager 提前算);useEffect 挂 effect 链表,commit(paint)后异步跑</text>

  <!-- useState column (green) -->
  <rect x="40" y="80" width="490" height="400" rx="13" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="60" y="108" font-size="13" font-weight="600" fill="#12402a">useState · 队列 + dispatch 触发更新</text>

  <rect x="60" y="126" width="450" height="94" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="80" y="150" font-size="11" font-weight="600" fill="#12402a">dispatchSetState (:3602)</text>
  <text x="80" y="172" font-size="9.5" fill="#2f6f4f">requestUpdateLane 取 lane · 建 update 对象入 queue</text>
  <text x="80" y="192" font-size="9.5" fill="#2f6f4f">按 lane 调度重渲染,重渲染时 replay 队列</text>
  <text x="80" y="210" font-size="9" fill="#4a8a63">setState 不立即更新,入队后重渲染才生效</text>

  <rect x="60" y="232" width="450" height="88" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="80" y="256" font-size="11" font-weight="600" fill="#12402a">eager 提前算 (bail-out, :3648)</text>
  <text x="80" y="278" font-size="9.5" fill="#2f6f4f">queue 空时用 lastRenderedReducer 先算新 state</text>
  <text x="80" y="298" font-size="9.5" fill="#2f6f4f">值没变 → 跳过重渲染(bail-out 省渲染)</text>
  <text x="80" y="314" font-size="9" fill="#4a8a63">相同值 setState 提前退出</text>

  <rect x="60" y="332" width="450" height="80" rx="11" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="80" y="356" font-size="11" font-weight="600" fill="#1d1d1f">mountState (:1924)</text>
  <text x="80" y="378" font-size="9.5" fill="#6e6e73">初始化 memoizedState · 建 queue</text>
  <text x="80" y="398" font-size="9.5" fill="#6e6e73">lastRenderedReducer = basicStateReducer</text>

  <path d="M285,220 L285,232" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <text x="60" y="444" font-size="9.5" fill="#4a8a63">同步:setState 立即入队并可触发调度</text>
  <text x="60" y="464" font-size="9.5" fill="#4a8a63">数据流:queue → replay → 新 state → 重渲染</text>

  <!-- useEffect column (blue) -->
  <rect x="550" y="80" width="490" height="400" rx="13" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="570" y="108" font-size="13" font-weight="600" fill="#274a78">useEffect · effect 链表,commit 后异步执行</text>

  <rect x="570" y="126" width="450" height="94" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="590" y="150" font-size="11" font-weight="600" fill="#1b2a4a">mountEffectImpl (:2616)</text>
  <text x="590" y="172" font-size="9.5" fill="#5b7db1">pushSimpleEffect(HookHasEffect | flags) 入 effect</text>
  <text x="590" y="192" font-size="9.5" fill="#5b7db1">OR 一个 fiber flag,标记本 fiber 有 effect</text>
  <text x="590" y="210" font-size="9" fill="#8aa4c8">effect 挂到 Hook 的 effect 链表</text>

  <rect x="570" y="232" width="450" height="88" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="590" y="256" font-size="11" font-weight="600" fill="#1b2a4a">updateEffectImpl (:2633)</text>
  <text x="590" y="278" font-size="9.5" fill="#5b7db1">areHookInputsEqual 比 deps</text>
  <text x="590" y="298" font-size="9.5" fill="#5b7db1">只在 deps 变时才重挂 HookHasEffect (:2651)</text>
  <text x="590" y="314" font-size="9" fill="#8aa4c8">依赖数组控制是否重跑</text>

  <rect x="570" y="332" width="450" height="80" rx="11" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="590" y="356" font-size="11" font-weight="600" fill="#1d1d1f">执行时机(见 render 与提交)</text>
  <text x="590" y="378" font-size="9.5" fill="#6e6e73">useEffect = passive:paint 后异步执行</text>
  <text x="590" y="398" font-size="9.5" fill="#6e6e73">useLayoutEffect = layout:paint 前同步执行</text>

  <path d="M795,220 L795,232" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <text x="570" y="444" font-size="9.5" fill="#8aa4c8">异步:effect 不阻塞渲染,commit 之后才跑</text>
  <text x="570" y="464" font-size="9.5" fill="#8aa4c8">deps:[] 只 mount 跑;省略则每渲染跑</text>

  <text x="30" y="504" font-size="9" fill="#a1a1a6">源码基准 React(7023f50) · ReactFiberHooks.js · eager 与 deps 比较都是性能优化:相同值 bail-out、依赖不变不重跑</text>
</svg>
