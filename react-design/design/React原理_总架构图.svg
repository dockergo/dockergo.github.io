<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="760" viewBox="0 0 1080 760" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="760" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">React 总架构图 —— 声明式 UI：状态更新 → render 阶段(可中断) → commit 阶段(同步改 DOM)</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">位置即语义：顶=组件声明触发更新，中=两阶段渲染主干，底=Fiber 基座 + 调度/并发/Hooks 支撑，右=事件回流 · 点击模块下钻</text>

  <!-- 接触面 -->
  <rect x="30" y="70" width="1020" height="58" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="50" y="94" font-size="12.5" font-weight="600" fill="#4a2c6f">接触面 · 组件与 JSX + Hooks API（声明"状态→UI 长啥样"）</text>
  <text x="50" y="114" font-size="9.5" fill="#7a5aa0">JSX→createElement→ReactElement · 函数组件 + useState/useEffect… setState 触发一次更新，交给下面主干</text>

  <!-- 双阶段主干：render → commit -->
  <rect x="30" y="146" width="620" height="150" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="50" y="170" font-size="12" font-weight="600" fill="#1b2a4a">render 阶段（可中断 · 无副作用）</text>
  <text x="50" y="192" font-size="9.5" fill="#5b7db1">workLoop：beginWork 向下 → completeWork 向上，构 workInProgress 树</text>
  <text x="50" y="211" font-size="9.5" fill="#5b7db1">协调 Diff：reconcileChildren 对比新旧、key 复用、打 flags</text>
  <text x="50" y="230" font-size="9.5" fill="#5b7db1">每处理一个 Fiber 查 shouldYield —— 高优先级更新可打断重来</text>
  <text x="50" y="252" font-size="9" fill="#8aa4c8">produces：带 flags 的 workInProgress 树（副作用清单）</text>
  <text x="50" y="278" font-size="8.5" fill="#8aa4c8">ReactFiberWorkLoop / ReactFiberBeginWork</text>

  <rect x="670" y="146" width="380" height="150" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="690" y="170" font-size="12" font-weight="600" fill="#12402a">commit 阶段（同步 · 不可中断）</text>
  <text x="690" y="192" font-size="9.5" fill="#2f6f4f">before mutation → mutation → layout 三子阶段</text>
  <text x="690" y="211" font-size="9.5" fill="#2f6f4f">按 flags 把变更应用到真实 DOM</text>
  <text x="690" y="230" font-size="9.5" fill="#2f6f4f">切换 current 指针（双缓冲）</text>
  <text x="690" y="249" font-size="9.5" fill="#2f6f4f">跑 layout effect + 异步 passive effect</text>
  <text x="690" y="278" font-size="8.5" fill="#4a8a63">ReactFiberCommitWork · 一口气完成不撕裂</text>
  <path d="M650,221 L670,221" stroke="#c7c7cc" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>

  <!-- Fiber 基座带 -->
  <rect x="30" y="312" width="1020" height="66" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="50" y="336" font-size="12" font-weight="600" fill="#5a3410">Fiber 架构 · 可中断渲染的数据基座</text>
  <text x="50" y="357" font-size="9.5" fill="#93762e">FiberNode(tag/type/stateNode/flags/lanes) + 树链接 child/sibling/return + alternate 双缓冲（current ↔ workInProgress）</text>
  <text x="50" y="373" font-size="9" fill="#b1974e">链表式树 → 遍历可暂停/恢复（存指针即可续）· Hooks 挂在 fiber.memoizedState · render/commit 都在它上操作</text>

  <!-- 支撑 3 域 -->
  <rect x="30" y="394" width="330" height="128" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="50" y="418" font-size="11.5" font-weight="600" fill="#1b2a4a">Lanes 与优先级调度</text>
  <text x="50" y="440" font-size="9" fill="#5b7db1">31 位车道位掩码表优先级</text>
  <text x="50" y="458" font-size="9" fill="#5b7db1">getNextLanes 选下批渲染车道</text>
  <text x="50" y="476" font-size="9" fill="#5b7db1">SyncLane（急）… IdleLane（闲）</text>
  <text x="50" y="494" font-size="9" fill="#5b7db1">高优先级打断低优先级渲染</text>
  <text x="50" y="514" font-size="8.5" fill="#8aa4c8">ReactFiberLane · 驱动 render workLoop</text>

  <rect x="375" y="394" width="330" height="128" rx="14" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="395" y="418" font-size="11.5" font-weight="600" fill="#4a2c6f">并发特性</text>
  <text x="395" y="440" font-size="9" fill="#7a5aa0">时间切片：5ms 一片 + shouldYield 让路</text>
  <text x="395" y="458" font-size="9" fill="#7a5aa0">startTransition：更新降到过渡车道</text>
  <text x="395" y="476" font-size="9" fill="#7a5aa0">Suspense：抛 promise 挂起显示 fallback</text>
  <text x="395" y="494" font-size="9" fill="#7a5aa0">单线程可中断，非多线程</text>
  <text x="395" y="514" font-size="8.5" fill="#9a7ac0">scheduler · 建在 Lanes 之上</text>

  <rect x="720" y="394" width="330" height="128" rx="14" fill="#ffffff" stroke="#e4e4ea" filter="url(#soft)"/>
  <text x="740" y="418" font-size="11.5" font-weight="600" fill="#1d1d1f">Hooks</text>
  <text x="740" y="440" font-size="9" fill="#6e6e73">存 fiber.memoizedState 单向链表</text>
  <text x="740" y="458" font-size="9" fill="#6e6e73">按调用序存取 → 不可条件调用</text>
  <text x="740" y="476" font-size="9" fill="#6e6e73">mount / update 两套 dispatcher</text>
  <text x="740" y="494" font-size="9" fill="#6e6e73">useState 队列 · useEffect 副作用链</text>
  <text x="740" y="514" font-size="8.5" fill="#86868b">ReactFiberHooks · 组件在 render 时调</text>

  <!-- 归属虚线：Lanes/并发 → render，Hooks → Fiber -->
  <path d="M195,394 L280,296" stroke="#c7c7cc" stroke-width="1.2" stroke-dasharray="4 3" fill="none" marker-end="url(#ar)"/>
  <path d="M540,394 L440,296" stroke="#c7c7cc" stroke-width="1.2" stroke-dasharray="4 3" fill="none" marker-end="url(#ar)"/>

  <!-- 事件系统带（交互回流触发下一轮更新） -->
  <rect x="30" y="538" width="1020" height="150" rx="14" fill="#fbeaea" stroke="#e6b8b8" filter="url(#soft)"/>
  <text x="50" y="562" font-size="12" font-weight="600" fill="#7a2a2a">事件系统 · 交互进入 React 的入口（回流触发下一轮更新）</text>
  <text x="50" y="586" font-size="9.5" fill="#a05a5a">listenToAllSupportedEvents：所有原生事件委托到 root 容器（一类事件一个 listener）</text>
  <text x="50" y="606" font-size="9.5" fill="#a05a5a">dispatchEventForPluginEventSystem：按 Fiber 树重建捕获/冒泡传播路径 → 收集 handlers</text>
  <text x="50" y="626" font-size="9.5" fill="#a05a5a">SyntheticEvent 归一跨浏览器差异（17+ 无事件池，可异步读）</text>
  <text x="50" y="646" font-size="9.5" fill="#a05a5a">getEventPriority：事件类型定优先级（离散 click = DiscreteEventPriority = SyncLane）→ 喂给 Lanes</text>
  <text x="50" y="672" font-size="8.5" fill="#c07a7a">react-dom-bindings/events · handler 里 setState → 回到接触面开启新一轮</text>
  <!-- 事件 → 接触面 回流虚线 -->
  <path d="M1050,560 L1064,560 L1064,99 L1050,99" stroke="#e6b8b8" stroke-width="1.3" stroke-dasharray="5 3" fill="none" marker-end="url(#ar)"/>

  <text x="30" y="720" font-size="9.5" fill="#a1a1a6">灵魂：render 阶段可中断/丢弃（无副作用）+ commit 阶段同步一口气（有副作用）+ Lane 优先级让点击打断大列表 = 又快又不卡</text>
  <text x="30" y="744" font-size="9" fill="#a1a1a6">源码基准 React(git 7023f50 · v19.3) · packages/react + react-reconciler + scheduler + react-dom-bindings · 位置即语义，点击模块下钻</text>
</svg>
