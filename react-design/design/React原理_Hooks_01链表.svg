<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">React Hook 链表 —— Hook 挂 fiber.memoizedState 单向链表,按调用顺序</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">mountWorkInProgressHook 建节点并用 next 链接;update 时按序锁步克隆遍历——故 Hook 必须顶层无条件调用</text>

  <!-- Fiber 节点 (blue) -->
  <rect x="40" y="86" width="170" height="104" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="125" y="114" font-size="12" font-weight="600" text-anchor="middle" fill="#1b2a4a">Fiber 节点</text>
  <text x="125" y="138" font-size="10" text-anchor="middle" fill="#5b7db1">memoizedState</text>
  <text x="125" y="158" font-size="9" text-anchor="middle" fill="#5b7db1">指向首个 Hook</text>
  <text x="125" y="176" font-size="9" text-anchor="middle" fill="#8aa4c8">一组件一条链</text>

  <!-- Hook#1 useState (green) -->
  <rect x="250" y="86" width="195" height="104" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="347" y="112" font-size="12" font-weight="600" text-anchor="middle" fill="#12402a">Hook#1 · useState</text>
  <text x="347" y="134" font-size="9.5" text-anchor="middle" fill="#2f6f4f">memoizedState / queue</text>
  <text x="347" y="152" font-size="9.5" text-anchor="middle" fill="#2f6f4f">baseState / baseQueue</text>
  <text x="347" y="176" font-size="9.5" text-anchor="middle" fill="#2f6f4f">next →</text>

  <!-- Hook#2 useState (green) -->
  <rect x="475" y="86" width="195" height="104" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="572" y="112" font-size="12" font-weight="600" text-anchor="middle" fill="#12402a">Hook#2 · useState</text>
  <text x="572" y="134" font-size="9.5" text-anchor="middle" fill="#2f6f4f">memoizedState / queue</text>
  <text x="572" y="152" font-size="9.5" text-anchor="middle" fill="#2f6f4f">baseState / baseQueue</text>
  <text x="572" y="176" font-size="9.5" text-anchor="middle" fill="#2f6f4f">next →</text>

  <!-- Hook#3 useEffect (green) -->
  <rect x="700" y="86" width="195" height="104" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="797" y="112" font-size="12" font-weight="600" text-anchor="middle" fill="#12402a">Hook#3 · useEffect</text>
  <text x="797" y="134" font-size="9.5" text-anchor="middle" fill="#2f6f4f">effect / deps</text>
  <text x="797" y="152" font-size="9.5" text-anchor="middle" fill="#2f6f4f">tag / next</text>
  <text x="797" y="176" font-size="9.5" text-anchor="middle" fill="#2f6f4f">next → null</text>

  <!-- chain arrows -->
  <path d="M210,138 L250,138" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M445,138 L475,138" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M670,138 L700,138" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="920" y="142" font-size="9" fill="#a1a1a6">按调用顺序挂 next</text>

  <!-- mount process (green tint container) -->
  <rect x="40" y="214" width="495" height="112" rx="12" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="60" y="240" font-size="12" font-weight="600" fill="#2c5a3a">mount · 建链表</text>
  <text x="60" y="264" font-size="10" fill="#2f6f4f">mountWorkInProgressHook (ReactFiberHooks.js:979)</text>
  <text x="60" y="284" font-size="10" fill="#2f6f4f">建 {memoizedState, baseState, baseQueue, queue, next}</text>
  <text x="60" y="304" font-size="10" fill="#2f6f4f">首个 Hook 成 fiber.memoizedState,后续经 next 链接 (:990)</text>

  <!-- update process (blue tint) -->
  <rect x="545" y="214" width="495" height="112" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="565" y="240" font-size="12" font-weight="600" fill="#274a78">update · 锁步遍历</text>
  <text x="565" y="264" font-size="10" fill="#5b7db1">updateWorkInProgressHook (:1000)</text>
  <text x="565" y="284" font-size="10" fill="#5b7db1">从 alternate fiber 的 Hook 链表 (:1006)</text>
  <text x="565" y="304" font-size="10" fill="#5b7db1">按 currentHook.next 锁步克隆——顺序须稳定</text>

  <!-- why / warning (red) -->
  <rect x="40" y="350" width="1000" height="104" rx="12" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="60" y="376" font-size="12" font-weight="600" fill="#7a2a2a">为什么不能条件调用 Hook</text>
  <text x="60" y="400" font-size="10" fill="#7a2a2a">React 靠调用顺序(第 1 个 useState、第 2 个 useEffect…)对应链表位置,不靠名字。</text>
  <text x="60" y="420" font-size="10" fill="#7a2a2a">放 if / 循环里条件调用会错位:某次渲染少调一个 Hook → 后面全部对错、状态错乱。</text>
  <text x="60" y="440" font-size="10" fill="#a05a5a">故 Hook 必须在函数组件顶层无条件调用(ESLint 强制)。</text>

  <text x="30" y="484" font-size="9" fill="#a1a1a6">源码基准 React(7023f50) · packages/react-reconciler/src/ReactFiberHooks.js · 一组件 3 个 Hook = memoizedState 上 3 节点定序链表</text>
</svg>
