<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">React element 模型 —— JSX 编译成 createElement / jsx 调用，产出不可变的 ReactElement 对象</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">声明式：element 是 UI 的声明快照，只描述 UI 长啥样；每次 render 产新 element 树，React diff 它 · 源码 packages/react/src/ReactJSXElement.js</text>

  <!-- 三段管线：JSX → 编译 → ReactElement -->
  <!-- A JSX 写法 (purple) -->
  <rect x="30" y="88" width="300" height="120" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="180" y="116" font-size="12.5" font-weight="600" text-anchor="middle" fill="#3d2a5a">JSX 写法（开发者）</text>
  <text x="180" y="142" font-size="10.5" text-anchor="middle" fill="#6a4a93">&lt;Btn className="ok"&gt;Hi&lt;/Btn&gt;</text>
  <text x="180" y="166" font-size="10" text-anchor="middle" fill="#6a4a93">声明式：描述 UI 长啥样</text>
  <text x="180" y="188" font-size="9.5" text-anchor="middle" fill="#9a7ac0">不是字符串模板，是语法糖</text>

  <!-- B 编译目标 (blue) -->
  <rect x="386" y="88" width="330" height="120" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="551" y="116" font-size="12.5" font-weight="600" text-anchor="middle" fill="#1b2a4a">编译目标 · Babel / tsc 转</text>
  <text x="551" y="141" font-size="10" text-anchor="middle" fill="#4a6da3">现代 jsx(type, config, maybeKey) :291</text>
  <text x="551" y="159" font-size="10" text-anchor="middle" fill="#4a6da3">旧 createElement(type, config, children) :610</text>
  <text x="551" y="181" font-size="9" text-anchor="middle" fill="#5b7db1">旧路径提 key、拷 config→props</text>
  <text x="551" y="196" font-size="9" text-anchor="middle" fill="#5b7db1">变长 children 折进 props.children</text>

  <!-- C 产出 ReactElement (green) -->
  <rect x="772" y="88" width="278" height="120" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="911" y="116" font-size="12.5" font-weight="600" text-anchor="middle" fill="#12402a">产出 ReactElement</text>
  <text x="911" y="141" font-size="10" text-anchor="middle" fill="#2f6f4f">ReactJSXElement.js :170</text>
  <text x="911" y="163" font-size="10" text-anchor="middle" fill="#2f6f4f">普通对象 · 不可变 UI 描述</text>
  <text x="911" y="187" font-size="9.5" text-anchor="middle" fill="#4a8a63">DEV: Object.freeze 元素+props :276</text>

  <path d="M330,148 L386,148" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M716,148 L772,148" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M911,208 L911,248" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 对象结构容器 (green tint) -->
  <rect x="30" y="248" width="1020" height="150" rx="13" fill="#f2fbf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="50" y="274" font-size="12" font-weight="600" fill="#12402a">ReactElement 对象结构 · 普通不可变对象（<tspan font-weight="600" fill="#2f6f4f">$$typeof / type / key / props</tspan>）</text>

  <rect x="48" y="290" width="230" height="92" rx="11" fill="#ffffff" stroke="#ececf1"/>
  <text x="163" y="316" font-size="11" font-weight="600" text-anchor="middle" fill="#1d1d1f">$$typeof</text>
  <text x="163" y="340" font-size="9" text-anchor="middle" fill="#6e6e73">REACT_ELEMENT_TYPE</text>
  <text x="163" y="360" font-size="9" text-anchor="middle" fill="#86868b">元素身份标记</text>

  <rect x="294" y="290" width="230" height="92" rx="11" fill="#ffffff" stroke="#ececf1"/>
  <text x="409" y="316" font-size="11" font-weight="600" text-anchor="middle" fill="#1d1d1f">type</text>
  <text x="409" y="340" font-size="9" text-anchor="middle" fill="#6e6e73">'div' 字符串 / 组件函数</text>
  <text x="409" y="360" font-size="9" text-anchor="middle" fill="#86868b">要渲染啥</text>

  <rect x="540" y="290" width="230" height="92" rx="11" fill="#ffffff" stroke="#ececf1"/>
  <text x="655" y="316" font-size="11" font-weight="600" text-anchor="middle" fill="#1d1d1f">key</text>
  <text x="655" y="340" font-size="9" text-anchor="middle" fill="#6e6e73">列表协调复用用</text>
  <text x="655" y="360" font-size="9" text-anchor="middle" fill="#86868b">jsx 从 maybeKey :291 取</text>

  <rect x="786" y="290" width="246" height="92" rx="11" fill="#ffffff" stroke="#ececf1"/>
  <text x="909" y="316" font-size="11" font-weight="600" text-anchor="middle" fill="#1d1d1f">props</text>
  <text x="909" y="340" font-size="9" text-anchor="middle" fill="#6e6e73">{ className, children, ref … }</text>
  <text x="909" y="360" font-size="9" text-anchor="middle" fill="#86868b">ref 从 props 读 RFC-107 :171</text>

  <!-- 底部两条说明 -->
  <rect x="30" y="418" width="620" height="76" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="50" y="443" font-size="11" font-weight="600" fill="#12402a">为什么 element 不可变</text>
  <text x="50" y="464" font-size="9.5" fill="#2f6f4f">element 是 UI 的声明快照；不可变让 React 能安全比较新旧</text>
  <text x="50" y="482" font-size="9.5" fill="#2f6f4f">（引用不同=可能变）、缓存、并发——每次 render 产新树再 diff</text>

  <rect x="668" y="418" width="382" height="76" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="688" y="443" font-size="11" font-weight="600" fill="#3d2a5a">两条路径差异</text>
  <text x="688" y="464" font-size="9.5" fill="#6a4a93">ref 不再是顶层字段，从 props 读（props.ref, :171）</text>
  <text x="688" y="482" font-size="9.5" fill="#6a4a93">defaultProps 只在旧 createElement 路径解析 :704</text>
</svg>
