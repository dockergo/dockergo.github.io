<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">React 合成事件 · 插件归一化 → SyntheticEvent 跨浏览器一致</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">各浏览器原生事件字段 / 行为有差异；插件归一化 + SyntheticEvent 统一接口，你写一套代码跨浏览器一致</text>

  <!-- 派发链 y=76 -->
  <!-- 原生事件 amber -->
  <rect x="30" y="82" width="200" height="96" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="130" y="112" font-size="11.5" font-weight="600" text-anchor="middle" fill="#5a3410">原生事件</text>
  <text x="130" y="134" font-size="9" text-anchor="middle" fill="#93762e">native DOM event</text>
  <text x="130" y="154" font-size="9" text-anchor="middle" fill="#93762e">在根容器被捕获</text>
  <!-- dispatchEventsForPlugins blue -->
  <rect x="250" y="82" width="240" height="96" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="370" y="112" font-size="11.5" font-weight="600" text-anchor="middle" fill="#1b2a4a">dispatchEventsForPlugins</text>
  <text x="370" y="134" font-size="9" text-anchor="middle" fill="#5b7db1">DOMPluginEventSystem.js:325</text>
  <text x="370" y="154" font-size="9" text-anchor="middle" fill="#5b7db1">派发给各插件</text>
  <!-- 插件归一化 purple -->
  <rect x="510" y="82" width="240" height="96" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="630" y="112" font-size="11.5" font-weight="600" text-anchor="middle" fill="#4a2c6f">插件归一化</text>
  <text x="630" y="134" font-size="9" text-anchor="middle" fill="#7a5aa0">每个插件把原生事件</text>
  <text x="630" y="154" font-size="9" text-anchor="middle" fill="#7a5aa0">转成对应合成事件</text>
  <!-- SyntheticEvent green -->
  <rect x="770" y="82" width="280" height="96" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="910" y="112" font-size="11.5" font-weight="600" text-anchor="middle" fill="#12402a">SyntheticEvent</text>
  <text x="910" y="134" font-size="9" text-anchor="middle" fill="#2f6f4f">createSyntheticEvent(Interface)</text>
  <text x="910" y="154" font-size="9" text-anchor="middle" fill="#2f6f4f">SyntheticEvent.js:31 · 跨浏览器一致</text>
  <!-- 链箭头 -->
  <path d="M230,130 L250,130" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M490,130 L510,130" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M750,130 L770,130" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 插件模型清单 purple -->
  <rect x="30" y="196" width="500" height="200" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="48" y="220" font-size="12" font-weight="600" fill="#4a2c6f">插件模型（plugins/）· 每个负责一类归一化</text>
  <text x="48" y="246" font-size="9.5" fill="#7a5aa0"><tspan font-weight="600">SimpleEventPlugin</tspan> —— 常规事件（click 等）</text>
  <text x="48" y="268" font-size="9.5" fill="#7a5aa0"><tspan font-weight="600">ChangeEventPlugin</tspan> —— onChange 归一化</text>
  <text x="48" y="290" font-size="9.5" fill="#7a5aa0"><tspan font-weight="600">EnterLeaveEventPlugin</tspan> —— 进入 / 离开</text>
  <text x="48" y="312" font-size="9.5" fill="#7a5aa0"><tspan font-weight="600">SelectEventPlugin</tspan> —— 选区</text>
  <text x="48" y="334" font-size="9.5" fill="#7a5aa0"><tspan font-weight="600">BeforeInputEventPlugin</tspan> —— 输入前</text>
  <text x="48" y="360" font-size="9" fill="#9a7ac0">为什么：onChange 在不同 input 触发时机不同，</text>
  <text x="48" y="378" font-size="9" fill="#9a7ac0">插件归一化让你写一套代码跨浏览器行为一致</text>

  <!-- 无池化 green -->
  <rect x="550" y="196" width="500" height="200" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="568" y="220" font-size="12" font-weight="600" fill="#12402a">无池化 · 17+ 移除事件池</text>
  <text x="568" y="246" font-size="9.5" fill="#2f6f4f">现代 React 移除了事件池（:132 注释）</text>
  <text x="568" y="268" font-size="9.5" fill="#2f6f4f">isPersistent 恒 true（:140）—— 恒 persistent</text>
  <text x="568" y="290" font-size="9.5" fill="#2f6f4f">事件对象可异步访问，不再复用</text>
  <text x="568" y="316" font-size="9" fill="#4a8a63">可在 setTimeout / promise 里读 event</text>
  <text x="568" y="336" font-size="9" fill="#4a8a63">老代码的 e.persist() 不再需要</text>
  <text x="568" y="362" font-size="9" fill="#4a8a63">原来复用对象省 GC 但要求同步读；</text>
  <text x="568" y="380" font-size="9" fill="#4a8a63">去掉事件池让心智更简单</text>

  <text x="30" y="428" font-size="9" fill="#a1a1a6">源码基准 React(git 7023f50 · v19.3) · DOMPluginEventSystem.js dispatchEventsForPlugins:325 · SyntheticEvent.js createSyntheticEvent:31 / 无池化:132 / isPersistent:140</text>
</svg>
