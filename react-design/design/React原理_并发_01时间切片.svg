<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">React 时间切片 · 5ms 一片，该让路就让路 —— 见缝插针不卡主线程</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">并发不是多线程，而是可中断渲染：把渲染切成小片，每片检查该不该让路（shouldYield），高优先级更新能打断进行中的低优先级渲染</text>

  <!-- 5 级优先级 blue -->
  <rect x="30" y="70" width="500" height="160" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="48" y="94" font-size="12" font-weight="600" fill="#1b2a4a">Scheduler 5 级优先级（SchedulerPriorities.js）</text>
  <text x="48" y="116" font-size="9.5" fill="#5b7db1">Immediate(1) · UserBlocking(2) · Normal(3) · Low(4) · Idle(5)</text>
  <text x="48" y="138" font-size="10" font-weight="600" fill="#1b2a4a">超时常量（SchedulerFeatureFlags.js）</text>
  <text x="48" y="160" font-size="9.5" fill="#5b7db1"><tspan font-weight="600">frameYieldMs = 5</tspan>（:11 每片 5ms） · UserBlocking 250ms</text>
  <text x="48" y="182" font-size="9.5" fill="#5b7db1">Normal 5000ms · Low 10000ms</text>
  <text x="48" y="206" font-size="9" fill="#8aa4c8">优先级越高超时越短，越早被执行；超时到则提升为紧急</text>

  <!-- MessageChannel 调度媒介 purple -->
  <rect x="550" y="70" width="500" height="160" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="568" y="94" font-size="12" font-weight="600" fill="#4a2c6f">调度媒介 · MessageChannel（Scheduler.js:546）</text>
  <text x="568" y="116" font-size="9.5" fill="#7a5aa0">port2.postMessage 触发 —— 比 setTimeout 更快</text>
  <text x="568" y="138" font-size="9.5" fill="#7a5aa0">把控制权还给浏览器（处理事件 / 绘制）再取回</text>
  <text x="568" y="162" font-size="10" font-weight="600" fill="#4a2c6f">shouldYieldToHost（Scheduler.js:459）</text>
  <text x="568" y="184" font-size="9.5" fill="#7a5aa0">已用时间 &lt; 5ms 则继续；超了就让出主线程</text>
  <text x="568" y="206" font-size="9" fill="#9a7ac0">按已用时间判，不是绑定帧率；超时才让路</text>

  <!-- 并发 workLoop green -->
  <rect x="30" y="248" width="1020" height="96" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="48" y="272" font-size="12" font-weight="600" fill="#12402a">并发 workLoop · workLoopConcurrentByScheduler（ReactFiberWorkLoop.js:3059）</text>
  <text x="48" y="296" font-size="10" fill="#2f6f4f">while (workInProgress !== null &amp;&amp; !shouldYield()) { performUnitOfWork(...) }</text>
  <text x="48" y="320" font-size="9.5" fill="#2f6f4f">每处理一个 Fiber 就检查该不该停 —— shouldYield 为真则中断，把控制权还浏览器，下一片再从 workInProgress 指针续</text>

  <!-- 时间轴示意 amber -->
  <rect x="30" y="362" width="1020" height="104" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="48" y="386" font-size="12" font-weight="600" fill="#5a3410">为什么 5ms 切片 —— 一帧 16.6ms（60fps）</text>
  <!-- 帧轴 -->
  <rect x="48" y="400" width="954" height="22" rx="4" fill="#fdf6ea" stroke="#efdcb4"/>
  <rect x="48" y="400" width="120" height="22" rx="4" fill="#eafaf1" stroke="#bfe0cd"/>
  <rect x="172" y="400" width="10" height="22" fill="#eef3fb" stroke="#bcd0ec"/>
  <rect x="186" y="400" width="120" height="22" rx="4" fill="#eafaf1" stroke="#bfe0cd"/>
  <rect x="310" y="400" width="10" height="22" fill="#eef3fb" stroke="#bcd0ec"/>
  <rect x="324" y="400" width="120" height="22" rx="4" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="108" y="415" font-size="8.5" text-anchor="middle" fill="#2f6f4f">渲染 5ms</text>
  <text x="248" y="415" font-size="8.5" text-anchor="middle" fill="#2f6f4f">渲染 5ms</text>
  <text x="384" y="415" font-size="8.5" text-anchor="middle" fill="#2f6f4f">渲染 5ms</text>
  <text x="177" y="437" font-size="8" text-anchor="middle" fill="#5b7db1">让路</text>
  <text x="315" y="437" font-size="8" text-anchor="middle" fill="#5b7db1">让路</text>
  <text x="700" y="415" font-size="9" fill="#93762e">片间让浏览器处理输入 / 动画 / 绘制</text>
  <text x="48" y="458" font-size="9" fill="#b1974e">一口气跑完长任务会阻塞输入 / 动画造成卡顿；切成 5ms 片、片间让路，渲染就见缝插针不卡主线程</text>

  <text x="30" y="494" font-size="9" fill="#a1a1a6">源码基准 React(git 7023f50 · v19.3) · packages/scheduler/src/ · ReactFiberWorkLoop.js · 并发 = 单线程可中断切片，JS 仍单线程</text>
</svg>
