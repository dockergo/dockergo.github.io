<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">副作用 flags —— Placement / Update / Deletion 打在 Fiber 上,commit 据此改 DOM</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">协调的产物是给 Fiber 标 flags:render 阶段只标"要做什么",commit 阶段才消费改真实 DOM</text>

  <!-- render 阶段容器 (blue) -->
  <rect x="40" y="82" width="490" height="300" rx="13" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="60" y="110" font-size="13" font-weight="600" fill="#274a78">render 阶段(可中断)· 协调标 flags</text>
  <text x="60" y="130" font-size="9.5" fill="#5b7db1">只在 Fiber 上标记,不碰真实 DOM;可打断重来</text>

  <!-- Placement (green) -->
  <rect x="60" y="148" width="450" height="66" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="80" y="172" font-size="11.5" font-weight="600" fill="#12402a">Placement</text>
  <text x="80" y="194" font-size="9.5" fill="#2f6f4f">新增或移动(需插入 DOM)</text>
  <text x="330" y="194" font-size="9" fill="#4a8a63">placeChild 判移动时标</text>

  <!-- Update (blue) -->
  <rect x="60" y="224" width="450" height="66" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="80" y="248" font-size="11.5" font-weight="600" fill="#1b2a4a">Update</text>
  <text x="80" y="270" font-size="9.5" fill="#5b7db1">props 变(需更新 DOM 属性)</text>
  <text x="330" y="270" font-size="9" fill="#8aa4c8">completeWork 时标</text>

  <!-- Deletion (red) -->
  <rect x="60" y="300" width="450" height="66" rx="11" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="80" y="324" font-size="11.5" font-weight="600" fill="#7a2a2a">Deletion</text>
  <text x="80" y="346" font-size="9.5" fill="#7a2a2a">删除:旧 children map 里剩的</text>
  <text x="330" y="346" font-size="9" fill="#a05a5a">加到父 Fiber deletions (:1361)</text>

  <!-- 传递箭头 -->
  <path d="M530,232 L575,232" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="536" y="222" font-size="9" fill="#a1a1a6">flags 随 Fiber 交给 commit</text>

  <!-- commit 阶段容器 (amber) -->
  <rect x="575" y="82" width="465" height="300" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="595" y="110" font-size="13" font-weight="600" fill="#5a3410">commit 阶段(不可中断)· 据 flags 改 DOM</text>
  <text x="595" y="130" font-size="9.5" fill="#93762e">mutation 相按 flags 增删改真实 DOM,一次性提交</text>

  <rect x="595" y="148" width="425" height="66" rx="11" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="615" y="172" font-size="11" font-weight="600" fill="#5a3410">Placement → 插入 / 移动 DOM 节点</text>
  <text x="615" y="196" font-size="9.5" fill="#93762e">insertBefore / appendChild 到目标位置</text>

  <rect x="595" y="224" width="425" height="66" rx="11" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="615" y="248" font-size="11" font-weight="600" fill="#5a3410">Update → 更新 DOM 属性</text>
  <text x="615" y="272" font-size="9.5" fill="#93762e">commitUpdate 应用变化的 props</text>

  <rect x="595" y="300" width="425" height="66" rx="11" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="615" y="324" font-size="11" font-weight="600" fill="#5a3410">Deletion → 移除 DOM 节点</text>
  <text x="615" y="348" font-size="9.5" fill="#93762e">从父节点删除,并清理其子树</text>

  <!-- why 底 (white) -->
  <rect x="40" y="398" width="1000" height="64" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="60" y="422" font-size="11" font-weight="600" fill="#1d1d1f">为什么标 flags 而非立即改 DOM</text>
  <text x="60" y="444" font-size="9.5" fill="#6e6e73">协调在 render 阶段(可中断),只在 Fiber 上标"要做什么";真正改 DOM 在 commit 阶段(不可中断)统一做——render 可打断重来不影响 DOM,commit 一次性提交。</text>

  <text x="30" y="484" font-size="9" fill="#a1a1a6">源码基准 React(7023f50) · ReactChildFiber.js · flags 在 commit 的 mutation 相被消费(见 render 与提交篇)</text>
</svg>
