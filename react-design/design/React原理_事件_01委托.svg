<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">React 事件委托 · 绑到根容器 —— 一个 listener 处理所有同类事件，再按 Fiber 树派发</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">你写 onClick，React 并没有在那个 DOM 节点真的绑 listener，而是把所有事件委托到根容器，按 Fiber 树重建传播路径</text>

  <!-- 绑定阶段 blue -->
  <rect x="30" y="70" width="500" height="160" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="48" y="94" font-size="12" font-weight="600" fill="#1b2a4a">绑定阶段 · 委托到 root 容器（不是每个节点）</text>
  <text x="48" y="118" font-size="9.5" fill="#5b7db1">listenToAllSupportedEvents(rootContainer)</text>
  <text x="48" y="136" font-size="9" fill="#8aa4c8">DOMPluginEventSystem.js:432 —— 遍历 allNativeEvents，</text>
  <text x="48" y="152" font-size="9" fill="#8aa4c8">在根容器上一次性绑所有支持的原生事件</text>
  <text x="48" y="176" font-size="9.5" fill="#5b7db1">addTrappedEventListener（:461）</text>
  <text x="48" y="194" font-size="9" fill="#8aa4c8">实际添加捕获 / 冒泡 listener</text>
  <text x="48" y="216" font-size="9" fill="#8aa4c8">发生在 commit 后（DOM 已挂载）</text>

  <!-- 派发阶段 green -->
  <rect x="550" y="70" width="500" height="160" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="568" y="94" font-size="12" font-weight="600" fill="#12402a">派发阶段 · 按 Fiber 树重建传播路径</text>
  <text x="568" y="118" font-size="9.5" fill="#2f6f4f">dispatchEventForPluginEventSystem（:585）</text>
  <text x="568" y="140" font-size="9" fill="#4a8a63">事件在根触发时，按 Fiber 树找到目标节点</text>
  <text x="568" y="158" font-size="9" fill="#4a8a63">+ 收集路径上所有 handler，重建传播链</text>
  <text x="568" y="182" font-size="9.5" fill="#2f6f4f">靠 Fiber 树而非真实 DOM listener</text>
  <text x="568" y="204" font-size="9" fill="#4a8a63">新增 / 删除节点无需增删 listener</text>

  <!-- 委托示意图 y=248 -->
  <!-- root 容器 purple -->
  <rect x="30" y="250" width="1020" height="150" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="48" y="274" font-size="11.5" font-weight="600" fill="#4a2c6f">root 容器（唯一真实 listener）</text>
  <text x="820" y="274" font-size="9" fill="#9a7ac0">一类事件 = 一个原生 listener 绑在根</text>
  <!-- 子节点(逻辑 onClick, 无真实 listener) -->
  <rect x="60" y="292" width="200" height="90" rx="10" fill="#ffffff" stroke="#e4e4ea"/>
  <text x="160" y="316" font-size="10" font-weight="600" text-anchor="middle" fill="#1d1d1f">&lt;button onClick&gt;</text>
  <text x="160" y="338" font-size="8.5" text-anchor="middle" fill="#6e6e73">无真实 DOM listener</text>
  <text x="160" y="356" font-size="8.5" text-anchor="middle" fill="#86868b">handler 记在 Fiber</text>
  <text x="160" y="373" font-size="8.5" text-anchor="middle" fill="#86868b">props.onClick</text>
  <rect x="290" y="292" width="200" height="90" rx="10" fill="#ffffff" stroke="#e4e4ea"/>
  <text x="390" y="316" font-size="10" font-weight="600" text-anchor="middle" fill="#1d1d1f">&lt;li onClick&gt;</text>
  <text x="390" y="338" font-size="8.5" text-anchor="middle" fill="#6e6e73">无真实 DOM listener</text>
  <text x="390" y="356" font-size="8.5" text-anchor="middle" fill="#86868b">上万个也只一处</text>
  <text x="390" y="373" font-size="8.5" text-anchor="middle" fill="#86868b">原生 listener</text>
  <rect x="520" y="292" width="200" height="90" rx="10" fill="#ffffff" stroke="#e4e4ea"/>
  <text x="620" y="316" font-size="10" font-weight="600" text-anchor="middle" fill="#1d1d1f">&lt;a onClick&gt;</text>
  <text x="620" y="338" font-size="8.5" text-anchor="middle" fill="#6e6e73">冒泡到根被捕获</text>
  <text x="620" y="356" font-size="8.5" text-anchor="middle" fill="#86868b">再按 Fiber 树</text>
  <text x="620" y="373" font-size="8.5" text-anchor="middle" fill="#86868b">回溯派发</text>
  <!-- 事件冒泡到根箭头 -->
  <path d="M160,292 L160,282 L960,282 L960,290" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M390,292 L390,286 L955,286" stroke="#c7c7cc" stroke-width="1.5" fill="none"/>
  <path d="M620,292 L620,284 L950,284" stroke="#c7c7cc" stroke-width="1.5" fill="none"/>
  <!-- 根 listener 标 -->
  <rect x="760" y="292" width="260" height="90" rx="10" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="890" y="318" font-size="10.5" font-weight="600" text-anchor="middle" fill="#4a2c6f">根容器的原生 listener</text>
  <text x="890" y="340" font-size="8.5" text-anchor="middle" fill="#7a5aa0">事件冒泡至此统一处理</text>
  <text x="890" y="358" font-size="8.5" text-anchor="middle" fill="#7a5aa0">按 Fiber 树重建传播路径</text>
  <text x="890" y="375" font-size="8.5" text-anchor="middle" fill="#9a7ac0">更省内存、更灵活</text>

  <text x="30" y="428" font-size="9" fill="#a1a1a6">源码基准 React(git 7023f50 · v19.3) · packages/react-dom-bindings/src/events/DOMPluginEventSystem.js listenToAllSupportedEvents:432 / dispatchEventForPluginEventSystem:585</text>
</svg>
