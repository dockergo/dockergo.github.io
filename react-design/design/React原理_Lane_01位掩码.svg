<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">React Lane · 31 位掩码表优先级 —— 每一位代表一种优先级</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">TotalLanes=31（塞进 JS 的 SMI 小整数）· 一个 lane = 一位 · 位越低优先级越高：SyncLane 最急、TransitionLanes 14 条可延后、IdleLane 最闲</text>

  <!-- 概念带 purple -->
  <rect x="30" y="68" width="1020" height="54" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="48" y="91" font-size="12" font-weight="600" fill="#4a2c6f">Lane · 位掩码（ReactFiberLane.js）—— 更新打上 lane，调度器挑最高优先级的先渲染，低优先级让路</text>
  <text x="48" y="111" font-size="9.5" fill="#7a5aa0">为什么用位掩码：优先级要能「合并多个」（一批含多种更新）、「快速取最高」、「快速判包含」；一个整数即可表达 31 种优先级的任意组合</text>

  <!-- 位方向标注 -->
  <text x="44" y="150" font-size="9" fill="#6e6e73">bit 0 · 低位 = 最高优先级</text>
  <text x="1034" y="150" font-size="9" text-anchor="end" fill="#6e6e73">bit 30 · 高位 = 最低优先级</text>

  <!-- 31 位掩码条 (示意分组) y=162 h=40 -->
  <!-- 高优先级端: Sync / InputContinuous / Default -->
  <rect x="44" y="162" width="30" height="40" rx="4" fill="#fbeaea" stroke="#e6b8b8"/>
  <rect x="76" y="162" width="30" height="40" rx="4" fill="#fff7e6" stroke="#e8cf9a"/>
  <rect x="108" y="162" width="30" height="40" rx="4" fill="#eef3fb" stroke="#bcd0ec"/>
  <!-- TransitionLanes ×14 (purple) -->
  <rect x="140" y="162" width="30" height="40" rx="4" fill="#f4eefb" stroke="#d9c7ec"/>
  <rect x="172" y="162" width="30" height="40" rx="4" fill="#f4eefb" stroke="#d9c7ec"/>
  <rect x="204" y="162" width="30" height="40" rx="4" fill="#f4eefb" stroke="#d9c7ec"/>
  <rect x="236" y="162" width="30" height="40" rx="4" fill="#f4eefb" stroke="#d9c7ec"/>
  <rect x="268" y="162" width="30" height="40" rx="4" fill="#f4eefb" stroke="#d9c7ec"/>
  <rect x="300" y="162" width="30" height="40" rx="4" fill="#f4eefb" stroke="#d9c7ec"/>
  <rect x="332" y="162" width="30" height="40" rx="4" fill="#f4eefb" stroke="#d9c7ec"/>
  <rect x="364" y="162" width="30" height="40" rx="4" fill="#f4eefb" stroke="#d9c7ec"/>
  <rect x="396" y="162" width="30" height="40" rx="4" fill="#f4eefb" stroke="#d9c7ec"/>
  <rect x="428" y="162" width="30" height="40" rx="4" fill="#f4eefb" stroke="#d9c7ec"/>
  <rect x="460" y="162" width="30" height="40" rx="4" fill="#f4eefb" stroke="#d9c7ec"/>
  <rect x="492" y="162" width="30" height="40" rx="4" fill="#f4eefb" stroke="#d9c7ec"/>
  <rect x="524" y="162" width="30" height="40" rx="4" fill="#f4eefb" stroke="#d9c7ec"/>
  <rect x="556" y="162" width="30" height="40" rx="4" fill="#f4eefb" stroke="#d9c7ec"/>
  <!-- RetryLanes ×4 (green) -->
  <rect x="588" y="162" width="30" height="40" rx="4" fill="#eafaf1" stroke="#bfe0cd"/>
  <rect x="620" y="162" width="30" height="40" rx="4" fill="#eafaf1" stroke="#bfe0cd"/>
  <rect x="652" y="162" width="30" height="40" rx="4" fill="#eafaf1" stroke="#bfe0cd"/>
  <rect x="684" y="162" width="30" height="40" rx="4" fill="#eafaf1" stroke="#bfe0cd"/>
  <!-- 其他车道 (neutral) -->
  <rect x="716" y="162" width="30" height="40" rx="4" fill="#f7f7fa" stroke="#ececf1"/>
  <rect x="748" y="162" width="30" height="40" rx="4" fill="#f7f7fa" stroke="#ececf1"/>
  <rect x="780" y="162" width="30" height="40" rx="4" fill="#f7f7fa" stroke="#ececf1"/>
  <rect x="812" y="162" width="30" height="40" rx="4" fill="#f7f7fa" stroke="#ececf1"/>
  <rect x="844" y="162" width="30" height="40" rx="4" fill="#f7f7fa" stroke="#ececf1"/>
  <rect x="876" y="162" width="30" height="40" rx="4" fill="#f7f7fa" stroke="#ececf1"/>
  <rect x="908" y="162" width="30" height="40" rx="4" fill="#f7f7fa" stroke="#ececf1"/>
  <rect x="940" y="162" width="30" height="40" rx="4" fill="#f7f7fa" stroke="#ececf1"/>
  <!-- Idle / Offscreen (最闲, 高位) -->
  <rect x="972" y="162" width="30" height="40" rx="4" fill="#eeeef2" stroke="#dcdce2"/>
  <rect x="1004" y="162" width="30" height="40" rx="4" fill="#eeeef2" stroke="#dcdce2"/>

  <!-- 分组下划条 y=208 -->
  <rect x="44" y="208" width="94" height="3" rx="1.5" fill="#b8b8bf"/>
  <rect x="140" y="208" width="446" height="3" rx="1.5" fill="#d9c7ec"/>
  <rect x="588" y="208" width="126" height="3" rx="1.5" fill="#bfe0cd"/>
  <rect x="716" y="208" width="254" height="3" rx="1.5" fill="#dcdce2"/>
  <rect x="972" y="208" width="62" height="3" rx="1.5" fill="#cfcfd6"/>
  <!-- 分组标签 y=224 -->
  <text x="91" y="224" font-size="9" text-anchor="middle" fill="#6e6e73">Sync·Input·Default</text>
  <text x="363" y="224" font-size="9" text-anchor="middle" fill="#6e6e73">TransitionLanes ×14</text>
  <text x="651" y="224" font-size="9" text-anchor="middle" fill="#6e6e73">RetryLanes ×4</text>
  <text x="843" y="224" font-size="9" text-anchor="middle" fill="#6e6e73">其他车道</text>
  <text x="1003" y="224" font-size="9" text-anchor="middle" fill="#6e6e73">Idle·Offscreen</text>

  <!-- 优先级阶梯带 blue -->
  <rect x="30" y="248" width="1020" height="74" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="48" y="270" font-size="12" font-weight="600" fill="#1b2a4a">优先级阶梯（从高到低）· 常量与源码行号</text>
  <text x="48" y="292" font-size="9.5" fill="#5b7db1">SyncLane:47 最急（离散事件） ｜ InputContinuousLane:51 连续（拖拽） ｜ DefaultLane:54 普通更新</text>
  <text x="48" y="310" font-size="9.5" fill="#5b7db1">TransitionLanes:62 14 条可延后 ｜ RetryLanes:94 4 条 ｜ IdleLane:107 最闲 ｜ OffscreenLane:109</text>

  <!-- 概念卡 y=336 h=104 -->
  <rect x="30" y="336" width="329" height="104" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="48" y="360" font-size="11" font-weight="600" fill="#4a2c6f">① Lane vs Lanes</text>
  <text x="48" y="382" font-size="9" fill="#7a5aa0">Lane = 单个位（一个更新的优先级）</text>
  <text x="48" y="400" font-size="9" fill="#7a5aa0">Lanes = 位掩码组（一批一起刷 :806）</text>
  <text x="48" y="418" font-size="9" fill="#7a5aa0">renderLanes = 一批 lane 同渲染</text>

  <rect x="375" y="336" width="329" height="104" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="393" y="360" font-size="11" font-weight="600" fill="#1b2a4a">② 位越低，优先级越高</text>
  <text x="393" y="382" font-size="9" fill="#5b7db1">SyncLane 在最低位 = 最急</text>
  <text x="393" y="400" font-size="9" fill="#5b7db1">lanes &amp; -lanes 取最低位</text>
  <text x="393" y="418" font-size="9" fill="#5b7db1">= 最高优先级（非数值大小比较）</text>

  <rect x="720" y="336" width="329" height="104" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="738" y="360" font-size="11" font-weight="600" fill="#12402a">③ 为什么用位掩码</text>
  <text x="738" y="382" font-size="9" fill="#2f6f4f">要合并多个（一批含多种更新）</text>
  <text x="738" y="400" font-size="9" fill="#2f6f4f">快速取最高 / 快速判包含</text>
  <text x="738" y="418" font-size="9" fill="#2f6f4f">一个整数表 31 种优先级组合</text>

  <text x="30" y="466" font-size="9" fill="#a1a1a6">源码基准 React(git 7023f50 · v19.3) · packages/react-reconciler/src/ReactFiberLane.js · Lane 位掩码是并发可中断调度的优先级基石</text>
</svg>
