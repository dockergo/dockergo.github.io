<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="510" viewBox="0 0 1080 510" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="510" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Hooks dispatcher —— 同名 useState,mount / update 走两套不同实现</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">renderWithHooks 按当前 fiber 有无 memoizedState 切换 ReactSharedInternals.H,render 后重置 ContextOnlyDispatcher</text>

  <!-- 入口 renderWithHooks (purple) -->
  <rect x="330" y="80" width="420" height="70" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="540" y="106" font-size="12" font-weight="600" text-anchor="middle" fill="#3d2a5a">renderWithHooks (ReactFiberHooks.js:560)</text>
  <text x="540" y="128" font-size="10" text-anchor="middle" fill="#7a5aa0">设 ReactSharedInternals.H = 当前 dispatcher</text>
  <text x="540" y="144" font-size="9" text-anchor="middle" fill="#9a7ac0">判据:current===null 或 current.memoizedState===null</text>

  <!-- branch arrows -->
  <path d="M420,150 L420,184 L250,184 L250,204" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M660,150 L660,184 L830,184 L830,204" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="300" y="178" font-size="9" fill="#a1a1a6">首渲染 / 无 state</text>
  <text x="720" y="178" font-size="9" fill="#a1a1a6">已有 state</text>

  <!-- mount dispatcher (green) -->
  <rect x="40" y="204" width="420" height="150" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="250" y="230" font-size="12" font-weight="600" text-anchor="middle" fill="#12402a">HooksDispatcherOnMount</text>
  <text x="250" y="256" font-size="10" text-anchor="middle" fill="#2f6f4f">useState → mountState (:1924)</text>
  <text x="250" y="278" font-size="10" text-anchor="middle" fill="#2f6f4f">初始化 memoizedState · 建 queue</text>
  <text x="250" y="298" font-size="10" text-anchor="middle" fill="#2f6f4f">lastRenderedReducer = basicStateReducer</text>
  <text x="250" y="320" font-size="10" text-anchor="middle" fill="#2f6f4f">dispatch = dispatchSetState.bind(...)</text>
  <text x="250" y="342" font-size="9" text-anchor="middle" fill="#4a8a63">useReducer → mountReducer (:1257)</text>

  <!-- update dispatcher (blue) -->
  <rect x="620" y="204" width="420" height="150" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="830" y="230" font-size="12" font-weight="600" text-anchor="middle" fill="#1b2a4a">HooksDispatcherOnUpdate</text>
  <text x="830" y="256" font-size="10" text-anchor="middle" fill="#5b7db1">useState → updateReducer(basicStateReducer) (:1938)</text>
  <text x="830" y="278" font-size="10" text-anchor="middle" fill="#5b7db1">replay 更新队列算新 state</text>
  <text x="830" y="298" font-size="10" text-anchor="middle" fill="#5b7db1">复用 alternate 上的 Hook 状态</text>
  <text x="830" y="320" font-size="10" text-anchor="middle" fill="#5b7db1">取 / 更新已有 memoizedState</text>
  <text x="830" y="342" font-size="9" text-anchor="middle" fill="#8aa4c8">useReducer → updateReducer (:1294)</text>

  <!-- reset (white) -->
  <rect x="330" y="378" width="420" height="52" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="540" y="404" font-size="11" font-weight="600" text-anchor="middle" fill="#1d1d1f">render 后重置 → ContextOnlyDispatcher (:656)</text>
  <text x="540" y="422" font-size="9" text-anchor="middle" fill="#6e6e73">render 外调 Hook 报错,只允许读 context</text>
  <path d="M250,354 L250,404 L330,404" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M830,354 L830,404 L750,404" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <text x="30" y="464" font-size="10.5" font-weight="600" fill="#1d1d1f">为什么两套 dispatcher</text>
  <text x="30" y="484" font-size="9.5" fill="#6e6e73">mount 首次建 Hook 状态、update 复用+重算——同一个 useState 调用首渲染走 mount 版建状态、后续走 update 版取/更新;dispatcher 按当前 fiber 有无 memoizedState 切换。</text>
  <text x="30" y="500" font-size="9" fill="#a1a1a6">源码基准 React(7023f50) · ReactFiberHooks.js</text>
</svg>
