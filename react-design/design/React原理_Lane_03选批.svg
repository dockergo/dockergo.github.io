<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">React getNextLanes · 选下一批渲染的车道 —— 每轮从 pendingLanes 挑最高优先级一批</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">更新触发 → 排进调度 → 选批 → 渲染；高优先级更新可打断进行中的低优先级渲染 —— 并发可中断调度的基础</text>

  <!-- 调度链主干 y=78 h=104 -->
  <!-- scheduleUpdateOnFiber blue -->
  <rect x="30" y="78" width="238" height="104" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="149" y="104" font-size="12" font-weight="600" text-anchor="middle" fill="#1b2a4a">scheduleUpdateOnFiber</text>
  <text x="149" y="126" font-size="9" text-anchor="middle" fill="#5b7db1">ReactFiberWorkLoop.js:973</text>
  <text x="149" y="146" font-size="9" text-anchor="middle" fill="#5b7db1">更新触发，标记 root</text>
  <text x="149" y="164" font-size="9" text-anchor="middle" fill="#8aa4c8">pendingLanes |= lane</text>
  <!-- ensureRootIsScheduled blue -->
  <rect x="288" y="78" width="238" height="104" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="407" y="104" font-size="12" font-weight="600" text-anchor="middle" fill="#1b2a4a">ensureRootIsScheduled</text>
  <text x="407" y="126" font-size="9" text-anchor="middle" fill="#5b7db1">ReactFiberRootScheduler.js:116</text>
  <text x="407" y="146" font-size="9" text-anchor="middle" fill="#5b7db1">确保 root 被排进调度</text>
  <text x="407" y="164" font-size="9" text-anchor="middle" fill="#8aa4c8">交给 Scheduler</text>
  <!-- getNextLanes green (核心) -->
  <rect x="546" y="78" width="238" height="104" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="665" y="104" font-size="12" font-weight="600" text-anchor="middle" fill="#12402a">getNextLanes</text>
  <text x="665" y="126" font-size="9" text-anchor="middle" fill="#2f6f4f">ReactFiberLane.js:249</text>
  <text x="665" y="146" font-size="9" text-anchor="middle" fill="#2f6f4f">从 pendingLanes 挑最高</text>
  <text x="665" y="164" font-size="9" text-anchor="middle" fill="#4a8a63">优先级一批 = renderLanes</text>
  <!-- performWorkOnRoot amber -->
  <rect x="804" y="78" width="246" height="104" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="927" y="104" font-size="12" font-weight="600" text-anchor="middle" fill="#5a3410">performWorkOnRoot</text>
  <text x="927" y="126" font-size="9" text-anchor="middle" fill="#93762e">ReactFiberWorkLoop.js:1123</text>
  <text x="927" y="146" font-size="9" text-anchor="middle" fill="#93762e">按选出的 lanes 渲染</text>
  <text x="927" y="164" font-size="9" text-anchor="middle" fill="#b1974e">workLoop 消费 renderLanes</text>
  <!-- 链箭头 -->
  <path d="M268,130 L288,130" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M526,130 L546,130" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M784,130 L804,130" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 选批示意 purple -->
  <rect x="30" y="200" width="500" height="150" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="48" y="224" font-size="12" font-weight="600" fill="#4a2c6f">pendingLanes → renderLanes（挑最高优先级一批）</text>
  <text x="48" y="248" font-size="9.5" fill="#7a5aa0">pendingLanes（待处理集，可能多种优先级并存）</text>
  <!-- pending 位条 -->
  <rect x="48" y="258" width="26" height="20" rx="3" fill="#fbeaea" stroke="#e6b8b8"/>
  <rect x="78" y="258" width="26" height="20" rx="3" fill="#f7f7fa" stroke="#ececf1"/>
  <rect x="108" y="258" width="26" height="20" rx="3" fill="#f4eefb" stroke="#d9c7ec"/>
  <rect x="138" y="258" width="26" height="20" rx="3" fill="#f4eefb" stroke="#d9c7ec"/>
  <rect x="168" y="258" width="26" height="20" rx="3" fill="#eeeef2" stroke="#dcdce2"/>
  <text x="210" y="272" font-size="9" fill="#9a7ac0">Sync + 过渡 + Idle 混在一起</text>
  <path d="M100,286 L100,306" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="120" y="302" font-size="9" fill="#a1a1a6">getNextLanes 取最高优先级批</text>
  <!-- renderLanes 结果 -->
  <rect x="48" y="312" width="26" height="20" rx="3" fill="#fbeaea" stroke="#e6b8b8"/>
  <text x="90" y="326" font-size="9" fill="#9a7ac0">renderLanes = 本轮只渲染 SyncLane（最急）</text>
  <text x="48" y="346" font-size="8.5" fill="#9a7ac0">低优先级（过渡）本轮让路，留待下一轮</text>

  <!-- Lane→事件优先级映射 blue -->
  <rect x="550" y="200" width="500" height="150" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="568" y="224" font-size="12" font-weight="600" fill="#1b2a4a">Lane → 事件优先级映射（ReactEventPriorities.js）</text>
  <text x="568" y="250" font-size="9.5" fill="#5b7db1">DiscreteEventPriority = SyncLane（:25）离散事件</text>
  <text x="568" y="272" font-size="9.5" fill="#5b7db1">ContinuousEventPriority = InputContinuousLane（:26）</text>
  <text x="568" y="294" font-size="9.5" fill="#5b7db1">DefaultEventPriority = DefaultLane（:27）</text>
  <text x="568" y="318" font-size="9" fill="#8aa4c8">lanesToEventPriority（:55）反查：由 lane 反推事件优先级</text>
  <text x="568" y="338" font-size="9" fill="#8aa4c8">Lane 是 reconciler 内部模型，经映射对接 Scheduler 5 级</text>

  <!-- 为什么每次只选一批 green -->
  <rect x="30" y="368" width="1020" height="88" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="48" y="392" font-size="12" font-weight="600" fill="#12402a">为什么每次只选一批</text>
  <text x="48" y="414" font-size="9.5" fill="#2f6f4f">低优先级更新（过渡）不该阻塞高优先级（点击）· getNextLanes 每轮挑最高优先级的车道先渲染</text>
  <text x="48" y="434" font-size="9.5" fill="#2f6f4f">高优先级更新可打断进行中的低优先级渲染 —— 同批一起渲染、跨批可被打断，这是并发可中断调度的基础</text>

  <text x="30" y="484" font-size="9" fill="#a1a1a6">源码基准 React(git 7023f50 · v19.3) · ReactFiberWorkLoop.js · ReactFiberRootScheduler.js · ReactFiberLane.js · ReactEventPriorities.js</text>
</svg>
