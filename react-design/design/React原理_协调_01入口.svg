<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">reconcileChildren —— beginWork 对比新 element 与旧 Fiber:复用 / 新建 / 删除</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">单节点复用当且仅当 child.key===key 且 child.elementType===elementType,否则删旧建新</text>

  <!-- 入口 factory (purple) -->
  <rect x="40" y="82" width="300" height="88" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="190" y="108" font-size="12" font-weight="600" text-anchor="middle" fill="#3d2a5a">createChildReconciler (:431)</text>
  <text x="190" y="130" font-size="9.5" text-anchor="middle" fill="#7a5aa0">工厂:mount 传 false · update 传 true</text>
  <text x="190" y="150" font-size="9.5" text-anchor="middle" fill="#9a7ac0">产出 reconcileChildFibers</text>

  <!-- 输入:新 element + 旧 Fiber -->
  <rect x="380" y="82" width="300" height="88" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="530" y="108" font-size="12" font-weight="600" text-anchor="middle" fill="#1b2a4a">新 element vs 旧 Fiber</text>
  <text x="530" y="130" font-size="9.5" text-anchor="middle" fill="#5b7db1">同位置:比对 key 与 elementType</text>
  <text x="530" y="150" font-size="9.5" text-anchor="middle" fill="#5b7db1">reconcileSingleElement (:1703)</text>

  <!-- 判定条件 (white) -->
  <rect x="720" y="82" width="320" height="88" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="880" y="108" font-size="12" font-weight="600" text-anchor="middle" fill="#1d1d1f">复用判定 (:1714, :1738)</text>
  <text x="880" y="130" font-size="9.5" text-anchor="middle" fill="#6e6e73">key === key 且</text>
  <text x="880" y="150" font-size="9.5" text-anchor="middle" fill="#6e6e73">elementType === elementType ?</text>

  <path d="M340,126 L380,126" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M680,126 L720,126" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 三分支箭头 -->
  <path d="M810,170 L810,206 L200,206 L200,242" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M880,170 L880,224 L540,224 L540,242" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M950,170 L950,206 L880,206 L880,242" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="250" y="200" font-size="9" fill="#a1a1a6">key+type 都同</text>
  <text x="560" y="218" font-size="9" fill="#a1a1a6">任一不同</text>
  <text x="900" y="200" font-size="9" fill="#a1a1a6">旧多出</text>

  <!-- 复用 (green) -->
  <rect x="40" y="242" width="310" height="118" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="195" y="268" font-size="12" font-weight="600" text-anchor="middle" fill="#12402a">复用 Fiber</text>
  <text x="195" y="292" font-size="9.5" text-anchor="middle" fill="#2f6f4f">同位置 · key 同 · 类型同</text>
  <text x="195" y="312" font-size="9.5" text-anchor="middle" fill="#2f6f4f">接着用旧 Fiber(保状态)</text>
  <text x="195" y="336" font-size="9" text-anchor="middle" fill="#4a8a63">仅更新 props,不重建</text>

  <!-- 新建 (amber) -->
  <rect x="385" y="242" width="310" height="118" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="540" y="268" font-size="12" font-weight="600" text-anchor="middle" fill="#5a3410">销毁重建</text>
  <text x="540" y="292" font-size="9.5" text-anchor="middle" fill="#93762e">key 或 elementType 不同</text>
  <text x="540" y="312" font-size="9.5" text-anchor="middle" fill="#93762e">删旧 Fiber + 建新 Fiber</text>
  <text x="540" y="336" font-size="9" text-anchor="middle" fill="#93762e">状态丢失(重挂)</text>

  <!-- 删除 (red) -->
  <rect x="730" y="242" width="310" height="118" rx="12" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="885" y="268" font-size="12" font-weight="600" text-anchor="middle" fill="#7a2a2a">删除</text>
  <text x="885" y="292" font-size="9.5" text-anchor="middle" fill="#7a2a2a">新树里不再存在的旧节点</text>
  <text x="885" y="312" font-size="9.5" text-anchor="middle" fill="#7a2a2a">加入父 Fiber 的 deletions</text>
  <text x="885" y="336" font-size="9" text-anchor="middle" fill="#a05a5a">commit 阶段移除 DOM</text>

  <!-- why 底 (white) -->
  <rect x="40" y="378" width="1000" height="86" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="60" y="404" font-size="11" font-weight="600" fill="#1d1d1f">为什么用 key + type 判复用</text>
  <text x="60" y="426" font-size="9.5" fill="#6e6e73">key 标识"是不是同一个逻辑节点",elementType 标识"是不是同种组件/元素";两者同才复用(接着用旧 Fiber 的状态)。</text>
  <text x="60" y="446" font-size="9.5" fill="#6e6e73">任一不同则重建——这就是"key 变导致组件重挂"的原因。React 声明式:diff 新旧树只改变化部分,不全重建。</text>

  <text x="30" y="486" font-size="9" fill="#a1a1a6">源码基准 React(7023f50) · packages/react-reconciler/src/ReactChildFiber.js · 被 render 阶段 beginWork 调用</text>
</svg>
