<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="510" viewBox="0 0 1080 510" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="510" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">workLoop —— beginWork(向下)→ completeWork(向上)深度优先构建 workInProgress 树</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">workLoopConcurrentByScheduler 循环 performUnitOfWork,可被时间片(shouldYield)打断;beginWork 下探、completeWork 上溯</text>

  <!-- workLoop 驱动 (purple) -->
  <rect x="40" y="80" width="1000" height="66" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="60" y="106" font-size="12" font-weight="600" fill="#3d2a5a">workLoopConcurrentByScheduler (ReactFiberWorkLoop.js:3059) · while (wip !== null &amp;&amp; !shouldYield())</text>
  <text x="60" y="128" font-size="9.5" fill="#7a5aa0">调 performUnitOfWork(:3067):读 wip.alternate → beginWork → 设 memoizedProps → 下探 child 或 completeUnitOfWork。同步版 workLoopSync(:2758)不让出。</text>

  <!-- 树遍历示意 -->
  <!-- beginWork 下行 (blue) 左侧 -->
  <rect x="40" y="166" width="490" height="248" rx="13" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="60" y="192" font-size="12" font-weight="600" fill="#274a78">beginWork · 自顶向下(向下)</text>
  <text x="60" y="212" font-size="9.5" fill="#5b7db1">ReactFiberBeginWork.js:4187 · 大 switch 按 tag</text>

  <rect x="210" y="224" width="150" height="40" rx="9" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="285" y="249" font-size="10" text-anchor="middle" fill="#1b2a4a">HostRoot</text>
  <rect x="120" y="288" width="150" height="40" rx="9" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="195" y="313" font-size="10" text-anchor="middle" fill="#1b2a4a">FunctionComp</text>
  <rect x="300" y="288" width="150" height="40" rx="9" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="375" y="313" font-size="10" text-anchor="middle" fill="#1b2a4a">HostComponent</text>
  <rect x="120" y="352" width="150" height="40" rx="9" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="195" y="377" font-size="10" text-anchor="middle" fill="#1b2a4a">叶子</text>
  <rect x="300" y="352" width="150" height="40" rx="9" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="375" y="377" font-size="10" text-anchor="middle" fill="#1b2a4a">叶子</text>

  <path d="M255,264 L200,288" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M315,264 L370,288" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M195,328 L195,352" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M375,328 L375,352" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="60" y="404" font-size="9" fill="#8aa4c8">协调子节点 + 跑组件 / Hooks,展开树</text>

  <!-- completeWork 上行 (green) 右侧 -->
  <rect x="550" y="166" width="490" height="248" rx="13" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="570" y="192" font-size="12" font-weight="600" fill="#2c5a3a">completeWork · 自底向上(向上)</text>
  <text x="570" y="212" font-size="9.5" fill="#2f6f4f">ReactFiberCompleteWork.js:1082</text>

  <rect x="720" y="224" width="150" height="40" rx="9" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="795" y="249" font-size="10" text-anchor="middle" fill="#12402a">HostRoot</text>
  <rect x="630" y="288" width="150" height="40" rx="9" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="705" y="313" font-size="10" text-anchor="middle" fill="#12402a">建 DOM 实例</text>
  <rect x="810" y="288" width="150" height="40" rx="9" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="885" y="313" font-size="10" text-anchor="middle" fill="#12402a">建 DOM 实例</text>
  <rect x="630" y="352" width="150" height="40" rx="9" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="705" y="377" font-size="10" text-anchor="middle" fill="#12402a">叶子完成</text>
  <rect x="810" y="352" width="150" height="40" rx="9" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="885" y="377" font-size="10" text-anchor="middle" fill="#12402a">叶子完成</text>

  <path d="M705,352 L705,328" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M885,352 L885,328" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M700,288 L780,264" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M890,288 L810,264" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="570" y="404" font-size="9" fill="#4a8a63">建/更新 DOM 实例,bubbleProperties 上冒 subtreeFlags</text>

  <text x="30" y="444" font-size="10.5" font-weight="600" fill="#1d1d1f">为什么 begin 下、complete 上</text>
  <text x="30" y="464" font-size="9.5" fill="#6e6e73">beginWork 下探展开树(diff 出子节点),到叶子后 completeWork 上溯建 DOM 实例 + 冒泡副作用标记——一下一上遍历完整棵树。</text>
  <text x="30" y="484" font-size="9.5" fill="#6e6e73">可在 workLoop 里按单元中断:被高优打断则在 wip 上丢弃重来,不影响屏上 current。5ms 时间片让出。</text>
  <text x="30" y="504" font-size="9" fill="#a1a1a6">源码基准 React(7023f50) · ReactFiberWorkLoop.js / ReactFiberBeginWork.js / ReactFiberCompleteWork.js</text>
</svg>
