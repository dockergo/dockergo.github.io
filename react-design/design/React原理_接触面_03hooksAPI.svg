<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">React Hooks API —— 声明式管状态 / 副作用 / 性能 / 并发，覆盖组件全部需求</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">函数组件靠 Hooks 取代类组件的 state 与生命周期；实现见 Hooks 篇（packages/react-reconciler/src/ReactFiberHooks.js）</text>

  <!-- 四类 Hooks 卡片 -->
  <!-- 状态 (blue) -->
  <rect x="30" y="88" width="246" height="200" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="153" y="114" font-size="12.5" font-weight="600" text-anchor="middle" fill="#1b2a4a">状态</text>
  <text x="153" y="146" font-size="11" font-weight="600" text-anchor="middle" fill="#274a78">useState</text>
  <text x="153" y="164" font-size="9" text-anchor="middle" fill="#5b7db1">简单状态</text>
  <text x="153" y="192" font-size="11" font-weight="600" text-anchor="middle" fill="#274a78">useReducer</text>
  <text x="153" y="210" font-size="9" text-anchor="middle" fill="#5b7db1">复杂状态机</text>
  <text x="153" y="238" font-size="11" font-weight="600" text-anchor="middle" fill="#274a78">useRef</text>
  <text x="153" y="256" font-size="9" text-anchor="middle" fill="#5b7db1">可变 ref 不触发渲染</text>
  <text x="153" y="278" font-size="8.5" text-anchor="middle" fill="#8aa4c8">改 state 触发重渲染</text>

  <!-- 副作用 (green) -->
  <rect x="292" y="88" width="246" height="200" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="415" y="114" font-size="12.5" font-weight="600" text-anchor="middle" fill="#12402a">副作用</text>
  <text x="415" y="146" font-size="11" font-weight="600" text-anchor="middle" fill="#1a5c3a">useEffect</text>
  <text x="415" y="164" font-size="9" text-anchor="middle" fill="#2f6f4f">paint 后异步 · 数据获取/订阅</text>
  <text x="415" y="192" font-size="11" font-weight="600" text-anchor="middle" fill="#1a5c3a">useLayoutEffect</text>
  <text x="415" y="210" font-size="9" text-anchor="middle" fill="#2f6f4f">paint 前同步 · DOM 测量</text>
  <text x="415" y="238" font-size="11" font-weight="600" text-anchor="middle" fill="#1a5c3a">useInsertionEffect</text>
  <text x="415" y="256" font-size="9" text-anchor="middle" fill="#2f6f4f">CSS-in-JS</text>
  <text x="415" y="278" font-size="8.5" text-anchor="middle" fill="#4a8a63">返回清理函数 处理卸载</text>

  <!-- 性能 (amber) -->
  <rect x="554" y="88" width="246" height="200" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="677" y="114" font-size="12.5" font-weight="600" text-anchor="middle" fill="#5a3410">性能</text>
  <text x="677" y="146" font-size="11" font-weight="600" text-anchor="middle" fill="#7a4e14">useMemo</text>
  <text x="677" y="164" font-size="9" text-anchor="middle" fill="#93762e">缓存计算</text>
  <text x="677" y="192" font-size="11" font-weight="600" text-anchor="middle" fill="#7a4e14">useCallback</text>
  <text x="677" y="210" font-size="9" text-anchor="middle" fill="#93762e">缓存函数引用</text>
  <text x="677" y="238" font-size="11" font-weight="600" text-anchor="middle" fill="#7a4e14">memo</text>
  <text x="677" y="256" font-size="9" text-anchor="middle" fill="#93762e">props 未变跳渲染</text>
  <text x="677" y="278" font-size="8.5" text-anchor="middle" fill="#b08a3a">按需用 · 滥用反增开销</text>

  <!-- 并发 (purple) -->
  <rect x="816" y="88" width="234" height="200" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="933" y="114" font-size="12.5" font-weight="600" text-anchor="middle" fill="#3d2a5a">并发</text>
  <text x="933" y="146" font-size="11" font-weight="600" text-anchor="middle" fill="#5a3a86">useTransition</text>
  <text x="933" y="164" font-size="9" text-anchor="middle" fill="#6a4a93">startTransition</text>
  <text x="933" y="182" font-size="9" text-anchor="middle" fill="#6a4a93">标低优先级更新</text>
  <text x="933" y="216" font-size="11" font-weight="600" text-anchor="middle" fill="#5a3a86">useDeferredValue</text>
  <text x="933" y="234" font-size="9" text-anchor="middle" fill="#6a4a93">值滞后</text>
  <text x="933" y="278" font-size="8.5" text-anchor="middle" fill="#9a7ac0">非紧急更新让输入优先</text>

  <!-- 规则 banner (red 强调) -->
  <rect x="30" y="312" width="1020" height="88" rx="13" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="50" y="338" font-size="12.5" font-weight="600" fill="#7a2a2a">规则 · 只能在函数组件顶层无条件调用 Hook</text>
  <text x="50" y="362" font-size="10" fill="#a05a5a">Hook 靠调用<tspan font-weight="600">顺序</tspan>对应内部 Hook 链表（memoizedState 上的单链表）——每次 render 顺序必须一致。</text>
  <text x="50" y="384" font-size="10" fill="#a05a5a">禁止放在 if / for / 嵌套函数里：错位会让链表指针对错 Hook，读到别的状态。</text>

  <!-- 底部：为什么这套 API (neutral) -->
  <rect x="30" y="414" width="1020" height="106" rx="13" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="50" y="440" font-size="12" font-weight="600" fill="#1d1d1f">为什么这套 API</text>
  <text x="50" y="464" font-size="10" fill="#6e6e73">声明式管状态（useState）、副作用（useEffect）、性能（useMemo）、并发（useTransition）——覆盖组件的全部需求。</text>
  <text x="50" y="486" font-size="10" fill="#6e6e73">调优要点：列表项给稳定 key（协调复用 Fiber 保状态）；重计算/大列表按需 useMemo/memo；</text>
  <text x="50" y="508" font-size="10" fill="#6e6e73">非紧急更新（搜索结果、大列表过滤）包 startTransition 让输入优先；useEffect 返回清理函数避免泄漏。</text>
</svg>
