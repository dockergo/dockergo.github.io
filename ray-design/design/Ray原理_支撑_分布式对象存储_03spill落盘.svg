<svg xmlns="http://www.w3.org/2000/svg" width="940" height="410" viewBox="0 0 940 410" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif"><defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker><marker id="arb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker></defs><rect width="940" height="410" fill="#fbfbfd"/><text x="30" y="40" font-size="15" font-weight="600" fill="#1d1d1f">内存压力 · spill 落盘与恢复</text><text x="30" y="59" font-size="11.5" fill="#86868b">软容错（换介质）vs 硬容错（lineage 重算）</text><rect x="40" y="100" width="200" height="58" rx="12" fill="#fcecec" stroke="#f0c9c9" filter="url(#soft)"/><rect x="40" y="100" width="4" height="58" rx="2" fill="#b06a6a"/><text x="53" y="121" font-size="12.5" font-weight="600" fill="#5a1d1d">Plasma 内存吃紧</text><text x="53" y="138" font-size="10.5" fill="#b06a6a">primary copy 被 pin</text><rect x="290" y="100" width="240" height="58" rx="12" fill="#fbf2e0" stroke="#ecd6a8" filter="url(#soft)"/><rect x="290" y="100" width="4" height="58" rx="2" fill="#a9822f"/><text x="303" y="121" font-size="12.5" font-weight="600" fill="#5a3d13">SpillObjectUptoMaxThroughput</text><text x="303" y="138" font-size="10.5" fill="#a9822f">local_object_manager.cc:145</text><text x="303" y="153" font-size="10.5" fill="#a9822f">SpillObjects:253 委托 IO worker</text><rect x="580" y="100" width="320" height="58" rx="12" fill="#f2f2f4" stroke="#dadade" filter="url(#soft)"/><rect x="580" y="100" width="4" height="58" rx="2" fill="#86868b"/><text x="593" y="121" font-size="12.5" font-weight="600" fill="#3a3a3c">磁盘 / 远端存储</text><text x="593" y="138" font-size="10.5" fill="#86868b">S3 等 · SpillObjectsRequest:305</text><line x1="240" y1="129.0" x2="290" y2="129.0" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/><line x1="530" y1="129.0" x2="580" y2="129.0" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/><rect x="542.0" y="118.0" width="26.0" height="18" rx="6" fill="#ffffff" stroke="#ececef"/><text x="555.0" y="131.5" font-size="10.5" fill="#86868b" text-anchor="middle">溢出</text><rect x="290" y="232" width="240" height="54" rx="12" fill="#eaf6ee" stroke="#bfe0c8" filter="url(#soft)"/><rect x="290" y="232" width="4" height="54" rx="2" fill="#4f8b63"/><text x="303" y="253" font-size="12.5" font-weight="600" fill="#14432a">restore 回 Plasma</text><text x="303" y="270" font-size="10.5" fill="#4f8b63">需要时从外部存储取回</text><line x1="740.0" y1="158" x2="530" y2="259.0" stroke="#b8b8bf" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><rect x="618.5" y="197.5" width="33.0" height="18" rx="6" fill="#ffffff" stroke="#ececef"/><text x="635.0" y="211.0" font-size="10.5" fill="#86868b" text-anchor="middle">软容错</text><rect x="580" y="232" width="320" height="54" rx="12" fill="#fcecec" stroke="#f0c9c9" filter="url(#soft)"/><rect x="580" y="232" width="4" height="54" rx="2" fill="#b06a6a"/><text x="593" y="253" font-size="12.5" font-weight="600" fill="#5a1d1d">副本全丢 → lineage 重算</text><text x="593" y="270" font-size="10.5" fill="#b06a6a">object_recovery_manager.cc · 重跑 task</text><rect x="40" y="314" width="860" height="27" rx="9" fill="#fbf2e0" stroke="#ecd6a8"/><text x="51" y="333" font-size="10.5" fill="#5a3d13" font-weight="600">spill 是软容错：值还在磁盘/远端可 restore；只有副本彻底丢失且不可 restore 才交引用计数与容错按 lineage 重算。</text></svg>