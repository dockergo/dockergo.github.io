<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif"><defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker><marker id="arb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker></defs><rect width="960" height="440" fill="#fbfbfd"/><text x="30" y="40" font-size="15" font-weight="600" fill="#1d1d1f">隐式依赖 DAG · ObjectRef 作参数即声明依赖</text><text x="30" y="59" font-size="11.5" fill="#86868b">g.remote(f.remote(x))：无需预先构图，运行时动态成形</text><rect x="40" y="110" width="140" height="50" rx="12" fill="#f2f2f4" stroke="#dadade" filter="url(#soft)"/><rect x="40" y="110" width="4" height="50" rx="2" fill="#86868b"/><text x="53" y="139.0" font-size="12.5" font-weight="600" fill="#3a3a3c">x（值/ref）</text><rect x="230" y="110" width="180" height="54" rx="12" fill="#eaf6ee" stroke="#bfe0c8" filter="url(#soft)"/><rect x="230" y="110" width="4" height="54" rx="2" fill="#4f8b63"/><text x="243" y="131" font-size="12.5" font-weight="600" fill="#14432a">f.remote(x)</text><text x="243" y="148" font-size="10.5" fill="#4f8b63">task f 提交</text><rect x="460" y="110" width="190" height="54" rx="12" fill="#f4ecfa" stroke="#dcc6ec" filter="url(#soft)"/><rect x="460" y="110" width="4" height="54" rx="2" fill="#8158a6"/><text x="473" y="131" font-size="12.5" font-weight="600" fill="#3d2357">ObjectRef(f)</text><text x="473" y="148" font-size="10.5" fill="#8158a6">f 的返回 future</text><rect x="700" y="110" width="220" height="54" rx="12" fill="#eaf6ee" stroke="#bfe0c8" filter="url(#soft)"/><rect x="700" y="110" width="4" height="54" rx="2" fill="#4f8b63"/><text x="713" y="131" font-size="12.5" font-weight="600" fill="#14432a">g.remote(ObjectRef(f))</text><text x="713" y="148" font-size="10.5" fill="#4f8b63">ref 作参数 = 依赖</text><line x1="180" y1="135.0" x2="230" y2="137.0" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/><line x1="410" y1="137.0" x2="460" y2="137.0" stroke="#5b7db1" stroke-width="1.6" marker-end="url(#arb)"/><line x1="650" y1="137.0" x2="700" y2="137.0" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/><rect x="658.5" y="126.0" width="33.0" height="18" rx="6" fill="#ffffff" stroke="#ececef"/><text x="675.0" y="139.5" font-size="10.5" fill="#86868b" text-anchor="middle">作参数</text><rect x="460" y="236" width="190" height="54" rx="12" fill="#fbf2e0" stroke="#ecd6a8" filter="url(#soft)"/><rect x="460" y="236" width="4" height="54" rx="2" fill="#a9822f"/><text x="473" y="257" font-size="12.5" font-weight="600" fill="#5a3d13">g 何时可跑</text><text x="473" y="274" font-size="10.5" fill="#a9822f">所有参数 ref 就绪后</text><line x1="555.0" y1="164" x2="555.0" y2="236" stroke="#b8b8bf" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><rect x="531.5" y="189.0" width="47.0" height="18" rx="6" fill="#ffffff" stroke="#ececef"/><text x="555.0" y="202.5" font-size="10.5" fill="#86868b" text-anchor="middle">就绪前挂起</text><rect x="700" y="236" width="220" height="54" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><rect x="700" y="236" width="4" height="54" rx="2" fill="#5b7db1"/><text x="713" y="257" font-size="12.5" font-weight="600" fill="#1b2a4a">动态派生</text><text x="713" y="274" font-size="10.5" fill="#5b7db1">task 内可再 .remote</text><text x="713" y="289" font-size="10.5" fill="#5b7db1">嵌套并行，无需预构图</text><line x1="810.0" y1="164" x2="810.0" y2="236" stroke="#b8b8bf" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><rect x="40" y="326" width="880" height="27" rx="9" fill="#fbf2e0" stroke="#ecd6a8"/><text x="51" y="345" font-size="10.5" fill="#5a3d13" font-weight="600">两处解析：owner 侧提交前把已知小对象内联进 spec；raylet 侧执行前确保参数对象已 Pull 到本地 Plasma（object_manager.cc:221）才放行。</text></svg>