<svg xmlns="http://www.w3.org/2000/svg" width="940" height="430" viewBox="0 0 940 430" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif"><defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker><marker id="arb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker></defs><rect width="940" height="430" fill="#fbfbfd"/><text x="30" y="40" font-size="15" font-weight="600" fill="#1d1d1f">两级存储 · memory store 与 Plasma</text><text x="30" y="59" font-size="11.5" fill="#86868b">阈值 100KiB（ray_config_def.h:245）；不可变 + 零拷贝</text><rect x="380" y="88" width="180" height="52" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><rect x="380" y="88" width="4" height="52" rx="2" fill="#5b7db1"/><text x="393" y="109" font-size="12.5" font-weight="600" fill="#1b2a4a">对象值</text><text x="393" y="126" font-size="10.5" fill="#5b7db1">按大小分流</text><rect x="90" y="190" width="300" height="66" rx="12" fill="#fbf2e0" stroke="#ecd6a8" filter="url(#soft)"/><rect x="90" y="190" width="4" height="66" rx="2" fill="#a9822f"/><text x="103" y="211" font-size="12.5" font-weight="600" fill="#5a3d13">in-process memory store</text><text x="103" y="228" font-size="10.5" fill="#a9822f">&lt; 100KiB · owner 进程堆内</text><text x="103" y="243" font-size="10.5" fill="#a9822f">memory_store.cc:159/174/247</text><text x="103" y="258" font-size="10.5" fill="#a9822f">免 IPC 与序列化拷贝</text><rect x="560" y="190" width="300" height="66" rx="12" fill="#fbf2e0" stroke="#ecd6a8" filter="url(#soft)"/><rect x="560" y="190" width="4" height="66" rx="2" fill="#a9822f"/><text x="573" y="211" font-size="12.5" font-weight="600" fill="#5a3d13">Plasma 共享内存</text><text x="573" y="228" font-size="10.5" fill="#a9822f">≥ 100KiB · plasma/store.cc:174</text><text x="573" y="243" font-size="10.5" fill="#a9822f">mmap 零拷贝 · ProcessCreateRequests:509</text><line x1="470.0" y1="140" x2="240.0" y2="190" stroke="#b8b8bf" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><rect x="345.5" y="154.0" width="19.0" height="18" rx="6" fill="#ffffff" stroke="#ececef"/><text x="355.0" y="167.5" font-size="10.5" fill="#86868b" text-anchor="middle">小</text><line x1="470.0" y1="140" x2="710.0" y2="190" stroke="#b8b8bf" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><rect x="580.5" y="154.0" width="19.0" height="18" rx="6" fill="#ffffff" stroke="#ececef"/><text x="590.0" y="167.5" font-size="10.5" fill="#86868b" text-anchor="middle">大</text><rect x="90" y="300" width="300" height="50" rx="12" fill="#f2f2f4" stroke="#dadade" filter="url(#soft)"/><rect x="90" y="300" width="4" height="50" rx="2" fill="#86868b"/><text x="103" y="321" font-size="12.5" font-weight="600" fill="#3a3a3c">OBJECT_IN_PLASMA 哨兵</text><text x="103" y="338" font-size="10.5" fill="#86868b">memory store 存哨兵桥接</text><rect x="560" y="300" width="300" height="50" rx="12" fill="#eaf6ee" stroke="#bfe0c8" filter="url(#soft)"/><rect x="560" y="300" width="4" height="50" rx="2" fill="#4f8b63"/><text x="573" y="321" font-size="12.5" font-weight="600" fill="#14432a">不可变 → 多 worker 并发共读</text><text x="573" y="338" font-size="10.5" fill="#4f8b63">同段物理内存，无需复制</text><line x1="710.0" y1="256" x2="390" y2="325.0" stroke="#b8b8bf" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/></svg>