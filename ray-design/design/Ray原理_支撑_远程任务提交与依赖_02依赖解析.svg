<svg xmlns="http://www.w3.org/2000/svg" width="940" height="410" viewBox="0 0 940 410" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif"><defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker><marker id="arb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker></defs><rect width="940" height="410" fill="#fbfbfd"/><text x="30" y="40" font-size="15" font-weight="600" fill="#1d1d1f">依赖解析 · task 何时可跑</text><text x="30" y="59" font-size="11.5" fill="#86868b">参数含未就绪 ObjectRef 时不能执行；两处解析</text><rect x="40" y="110" width="400" height="64" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><rect x="40" y="110" width="4" height="64" rx="2" fill="#5b7db1"/><text x="53" y="131" font-size="12.5" font-weight="600" fill="#1b2a4a">owner 侧（提交前）</text><text x="53" y="148" font-size="10.5" fill="#5b7db1">把本地已知的小对象值内联进 spec</text><text x="53" y="163" font-size="10.5" fill="#5b7db1">减少远程等待</text><rect x="500" y="110" width="400" height="64" rx="12" fill="#eaf6ee" stroke="#bfe0c8" filter="url(#soft)"/><rect x="500" y="110" width="4" height="64" rx="2" fill="#4f8b63"/><text x="513" y="131" font-size="12.5" font-weight="600" fill="#14432a">raylet 侧（执行前）</text><text x="513" y="148" font-size="10.5" fill="#4f8b63">lease_dependency_manager 确保参数</text><text x="513" y="163" font-size="10.5" fill="#4f8b63">已 Pull 到本地 Plasma 才放行</text><rect x="500" y="230" width="400" height="54" rx="12" fill="#fbf2e0" stroke="#ecd6a8" filter="url(#soft)"/><rect x="500" y="230" width="4" height="54" rx="2" fill="#a9822f"/><text x="513" y="251" font-size="12.5" font-weight="600" fill="#5a3d13">触发 Pull</text><text x="513" y="268" font-size="10.5" fill="#a9822f">ObjectManager::Pull object_manager.cc:221</text><text x="513" y="283" font-size="10.5" fill="#a9822f">把远程依赖拉到本地</text><line x1="700.0" y1="174" x2="700.0" y2="230" stroke="#b8b8bf" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><rect x="40" y="230" width="400" height="54" rx="12" fill="#f4ecfa" stroke="#dcc6ec" filter="url(#soft)"/><rect x="40" y="230" width="4" height="54" rx="2" fill="#8158a6"/><text x="53" y="251" font-size="12.5" font-weight="600" fill="#3d2357">放行执行</text><text x="53" y="268" font-size="10.5" fill="#8158a6">所有参数就绪 → 投给 worker</text><line x1="500" y1="257.0" x2="440" y2="257.0" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/><rect x="457.0" y="246.0" width="26.0" height="18" rx="6" fill="#ffffff" stroke="#ececef"/><text x="470.0" y="259.5" font-size="10.5" fill="#86868b" text-anchor="middle">就绪</text><rect x="40" y="314" width="860" height="27" rx="9" fill="#fbf2e0" stroke="#ecd6a8"/><text x="51" y="333" font-size="10.5" fill="#5a3d13" font-weight="600">ObjectRef 作参数构成隐式 DAG，无需预先声明；task 内动态派生的 task 也走同一 Pull-就绪-放行路径。</text></svg>