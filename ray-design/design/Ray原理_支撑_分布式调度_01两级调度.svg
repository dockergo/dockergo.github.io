<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="450" viewBox="0 0 1000 450" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif"><defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker><marker id="arb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker></defs><rect width="1000" height="450" fill="#fbfbfd"/><text x="30" y="40" font-size="15" font-weight="600" fill="#1d1d1f">Raylet 两级调度 · 集群选点 + 本地授租</text><text x="30" y="59" font-size="11.5" fill="#86868b">选完点后 task 由 CoreWorker 直投 worker，调度器退出数据流</text><rect x="40" y="110" width="180" height="58" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><rect x="40" y="110" width="4" height="58" rx="2" fill="#5b7db1"/><text x="53" y="131" font-size="11" font-weight="600" fill="#1b2a4a">HandleRequestWorkerLease</text><text x="53" y="148" font-size="10.5" fill="#5b7db1">node_manager.cc:1890</text><rect x="270" y="110" width="260" height="58" rx="12" fill="#f4ecfa" stroke="#dcc6ec" filter="url(#soft)"/><rect x="270" y="110" width="4" height="58" rx="2" fill="#8158a6"/><text x="283" y="131" font-size="12.5" font-weight="600" fill="#3d2357">ClusterLeaseManager</text><text x="283" y="148" font-size="10.5" fill="#8158a6">QueueAndScheduleLease:45</text><text x="283" y="163" font-size="10.5" fill="#8158a6">GetBestSchedulableNode:213</text><rect x="600" y="110" width="240" height="58" rx="12" fill="#eaf6ee" stroke="#bfe0c8" filter="url(#soft)"/><rect x="600" y="110" width="4" height="58" rx="2" fill="#4f8b63"/><text x="613" y="131" font-size="12.5" font-weight="600" fill="#14432a">本节点</text><text x="613" y="148" font-size="10.5" fill="#4f8b63">LocalLeaseManager</text><text x="613" y="163" font-size="10.5" fill="#4f8b63">ScheduleAndGrantLeases:126</text><rect x="600" y="206" width="240" height="50" rx="12" fill="#fbf2e0" stroke="#ecd6a8" filter="url(#soft)"/><rect x="600" y="206" width="4" height="50" rx="2" fill="#a9822f"/><text x="613" y="227" font-size="12.5" font-weight="600" fill="#5a3d13">别的节点 → spillback</text><text x="613" y="244" font-size="10.5" fill="#a9822f">回 retry_at_raylet_address</text><rect x="600" y="296" width="240" height="50" rx="12" fill="#fcecec" stroke="#f0c9c9" filter="url(#soft)"/><rect x="600" y="296" width="4" height="50" rx="2" fill="#b06a6a"/><text x="613" y="317" font-size="12.5" font-weight="600" fill="#5a1d1d">无可行节点 → infeasible</text><text x="613" y="334" font-size="10.5" fill="#b06a6a">等资源变化 / autoscaler 扩容</text><line x1="530" y1="139.0" x2="600" y2="139.0" stroke="#b8b8bf" stroke-width="1.6" marker-end="url(#ar)"/><rect x="548.5" y="128.0" width="33.0" height="18" rx="6" fill="#ffffff" stroke="#ececef"/><text x="565.0" y="141.5" font-size="10.5" fill="#86868b" text-anchor="middle">选本地</text><line x1="400.0" y1="168" x2="600" y2="231.0" stroke="#a9822f" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><line x1="400.0" y1="168" x2="600" y2="321.0" stroke="#b06a6a" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><rect x="600" y="20" width="240" height="44" rx="12" fill="#eaf6ee" stroke="#bfe0c8" filter="url(#soft)"/><text x="613" y="41" font-size="11" font-weight="600" fill="#14432a">授租给 CoreWorker → 直投</text><text x="613" y="58" font-size="10.5" fill="#4f8b63">等依赖 Pull 就绪后取 worker</text><line x1="720.0" y1="110" x2="720.0" y2="64" stroke="#5b7db1" stroke-width="1.6" marker-end="url(#arb)"/></svg>