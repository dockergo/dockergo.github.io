<svg xmlns="http://www.w3.org/2000/svg" width="940" height="400" viewBox="0 0 940 400" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif"><defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker><marker id="arb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker></defs><rect width="940" height="400" fill="#fbfbfd"/><text x="30" y="40" font-size="15" font-weight="600" fill="#1d1d1f">Namespace 与 Job · 命名与生命周期隔离</text><text x="30" y="59" font-size="11.5" fill="#86868b">多租户共享一个物理集群、逻辑上互不干扰</text><rect x="40" y="90" width="430" height="220" rx="16" fill="#f4ecfa" stroke="#dcc6ec"/><text x="56" y="111" font-size="12" font-weight="600" fill="#86868b">namespace（命名作用域）</text><rect x="70" y="140" width="170" height="54" rx="12" fill="#f4ecfa" stroke="#dcc6ec" filter="url(#soft)"/><rect x="70" y="140" width="4" height="54" rx="2" fill="#8158a6"/><text x="83" y="161" font-size="12.5" font-weight="600" fill="#3d2357">detached actor A</text><text x="83" y="178" font-size="10.5" fill="#8158a6">name = svc</text><rect x="270" y="140" width="170" height="54" rx="12" fill="#f4ecfa" stroke="#dcc6ec" filter="url(#soft)"/><rect x="270" y="140" width="4" height="54" rx="2" fill="#8158a6"/><text x="283" y="161" font-size="12.5" font-weight="600" fill="#3d2357">detached actor B</text><text x="283" y="178" font-size="10.5" fill="#8158a6">按 name 互相发现</text><line x1="240" y1="167.0" x2="270" y2="167.0" stroke="#b8b8bf" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/><rect x="224.5" y="156.0" width="61.0" height="18" rx="6" fill="#ffffff" stroke="#ececef"/><text x="255.0" y="169.5" font-size="10.5" fill="#86868b" text-anchor="middle">同 ns 可见</text><text x="70" y="270" font-size="11" fill="#86868b">跨 namespace 隔离，name 互不冲突</text><rect x="500" y="90" width="400" height="220" rx="16" fill="#eef3fb" stroke="#bcd0ec"/><text x="516" y="111" font-size="12" font-weight="600" fill="#86868b">job（一次 driver 会话）</text><rect x="530" y="140" width="340" height="54" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><rect x="530" y="140" width="4" height="54" rx="2" fill="#5b7db1"/><text x="543" y="161" font-size="12.5" font-weight="600" fill="#1b2a4a">JobID 生命周期</text><text x="543" y="178" font-size="10.5" fill="#5b7db1">gcs_job_manager.cc</text><text x="543" y="193" font-size="10.5" fill="#5b7db1">job 结束回收非 detached 资源</text><text x="530" y="270" font-size="11" fill="#86868b">detached actor 独立于 job 存活，供跨 job 共享</text></svg>