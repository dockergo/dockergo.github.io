<svg xmlns="http://www.w3.org/2000/svg" width="920" height="470" viewBox="0 0 920 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif"><defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker><marker id="arb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker></defs><rect width="920" height="470" fill="#fbfbfd"/><text x="30" y="40" font-size="15" font-weight="600" fill="#1d1d1f">Actor 与 task 的统一与差异</text><text x="30" y="59" font-size="11.5" fill="#86868b">统一点：都编译成 TaskSpec、共享对象存储与 ObjectRef、返回值都是 future</text><rect x="190" y="56" width="330" height="34" rx="8" fill="#eaf6ee" stroke="#bfe0c8"/><text x="355" y="78" font-size="12" fill="#14432a" font-weight="600" text-anchor="middle">无状态 task</text><rect x="530" y="56" width="360" height="34" rx="8" fill="#f4ecfa" stroke="#dcc6ec"/><text x="710" y="78" font-size="12" fill="#3d2357" font-weight="600" text-anchor="middle">有状态 actor</text><rect x="40" y="96" width="140" height="44" rx="8" fill="#f2f2f4" stroke="#dadade"/><text x="54" y="122.0" font-size="11.5" fill="#1d1d1f" font-weight="600">载体</text><rect x="190" y="96" width="330" height="44" rx="8" fill="#ffffff" stroke="#ececef"/><text x="202" y="122.0" font-size="10.5" fill="#14432a">TaskSpec</text><rect x="530" y="96" width="360" height="44" rx="8" fill="#ffffff" stroke="#ececef"/><text x="542" y="122.0" font-size="10.5" fill="#3d2357">creation task + actor task</text><rect x="40" y="148" width="140" height="44" rx="8" fill="#f2f2f4" stroke="#dadade"/><text x="54" y="174.0" font-size="11.5" fill="#1d1d1f" font-weight="600">调度</text><rect x="190" y="148" width="330" height="44" rx="8" fill="#ffffff" stroke="#ececef"/><text x="202" y="174.0" font-size="10.5" fill="#14432a">每次向 Raylet 租新 worker（去中心化）</text><rect x="530" y="148" width="360" height="44" rx="8" fill="#ffffff" stroke="#ececef"/><text x="542" y="174.0" font-size="10.5" fill="#3d2357">GCS 集中调度定居 worker</text><rect x="40" y="200" width="140" height="44" rx="8" fill="#f2f2f4" stroke="#dadade"/><text x="54" y="226.0" font-size="11.5" fill="#1d1d1f" font-weight="600">执行序</text><rect x="190" y="200" width="330" height="44" rx="8" fill="#ffffff" stroke="#ececef"/><text x="202" y="226.0" font-size="10.5" fill="#14432a">无序、可并行</text><rect x="530" y="200" width="360" height="44" rx="8" fill="#ffffff" stroke="#ececef"/><text x="542" y="226.0" font-size="10.5" fill="#3d2357">按提交序串行（默认单线程）</text><rect x="40" y="252" width="140" height="44" rx="8" fill="#f2f2f4" stroke="#dadade"/><text x="54" y="278.0" font-size="11.5" fill="#1d1d1f" font-weight="600">状态</text><rect x="190" y="252" width="330" height="44" rx="8" fill="#ffffff" stroke="#ececef"/><text x="202" y="278.0" font-size="10.5" fill="#14432a">无（纯函数）</text><rect x="530" y="252" width="360" height="44" rx="8" fill="#ffffff" stroke="#ececef"/><text x="542" y="278.0" font-size="10.5" fill="#3d2357">worker 进程内持有实例状态</text><rect x="40" y="304" width="140" height="44" rx="8" fill="#f2f2f4" stroke="#dadade"/><text x="54" y="330.0" font-size="11.5" fill="#1d1d1f" font-weight="600">容错</text><rect x="190" y="304" width="330" height="44" rx="8" fill="#ffffff" stroke="#ececef"/><text x="202" y="330.0" font-size="10.5" fill="#14432a">lineage 重算（幂等假设）</text><rect x="530" y="304" width="360" height="44" rx="8" fill="#ffffff" stroke="#ececef"/><text x="542" y="330.0" font-size="10.5" fill="#3d2357">max_restarts 重建（状态丢失）</text><rect x="40" y="356" width="140" height="44" rx="8" fill="#f2f2f4" stroke="#dadade"/><text x="54" y="382.0" font-size="11.5" fill="#1d1d1f" font-weight="600">生命周期</text><rect x="190" y="356" width="330" height="44" rx="8" fill="#ffffff" stroke="#ececef"/><text x="202" y="382.0" font-size="10.5" fill="#14432a">执行完即回收</text><rect x="530" y="356" width="360" height="44" rx="8" fill="#ffffff" stroke="#ececef"/><text x="542" y="382.0" font-size="10.5" fill="#3d2357">常驻至 handle 释放或 kill</text></svg>