<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="474" viewBox="0 0 1080 474" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="aH" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="aC" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
    <marker id="aS" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c99a3a"/></marker>
  </defs>
  <rect width="1080" height="474" fill="#fbfbfd"/>

  <!-- ===== 标题带（全景热区） ===== -->
  <rect x="24" y="8" width="1032" height="46" rx="10" fill="none" data-tid="Ray原理_全景主线框架" data-lab="全景主线框架"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">总架构 · 多视角透视：控制面 / 数据面 / 调度面 三路正交</text>
  <text x="30" y="47" font-size="10.5" fill="#6e6e73">改全局状态走 GCS(控制面) · 传对象值走 Plasma(数据面) · 派活走 worker lease(调度面)　源码基准 ray master</text>

  <!-- ===== 图例：四型语义路径 ===== -->
  <line x1="40" y1="70" x2="70" y2="70" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aH)"/>
  <text x="76" y="74" font-size="10.5" fill="#3a3a3c">对象数据 / lineage Hot</text>
  <line x1="240" y1="70" x2="270" y2="70" stroke="#5b7db1" stroke-width="1.8" marker-end="url(#aC)"/>
  <text x="276" y="74" font-size="10.5" fill="#3a3a3c">task 提交 / lease 调度 Control</text>
  <line x1="480" y1="70" x2="510" y2="70" stroke="#5b7db1" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aC)"/>
  <text x="516" y="74" font-size="10.5" fill="#3a3a3c">控制面 ↔ 节点 心跳/上报</text>
  <line x1="708" y1="70" x2="738" y2="70" stroke="#c99a3a" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aS)"/>
  <text x="744" y="74" font-size="10.5" fill="#3a3a3c">autoscaler 后台旁路</text>
  <text x="1056" y="74" font-size="10" fill="#a1a1a6" text-anchor="end">框=主线可下钻 · 去中心化：租到 worker 直推</text>

  <!-- ================= 接口层 ================= -->
  <rect x="24" y="84" width="1032" height="82" rx="14" fill="#f5f6f8" stroke="#e2e4e9"/>
  <text x="40" y="104" font-size="12" font-weight="600" fill="#1d1d1f">接口层 · 应用门户</text>
  <text x="148" y="104" font-size="10" fill="#86868b">driver / worker 内嵌 CoreWorker —— 应用 ↔ 系统的唯一门户，向下分三路</text>

  <rect x="40" y="112" width="320" height="48" rx="11" fill="#f6f6f7" stroke="#e2e2e7" filter="url(#soft)" data-tid="Ray原理_接口_远程任务与对象" data-lab="远程任务与对象"/>
  <text x="56" y="132" font-size="11.5" font-weight="600" fill="#1d1d1f">远程任务与对象</text>
  <text x="56" y="150" font-size="9.5" fill="#6e6e73">@ray.remote · ObjectRef future</text>

  <rect x="380" y="112" width="320" height="48" rx="11" fill="#f6f6f7" stroke="#e2e2e7" filter="url(#soft)" data-tid="Ray原理_接口_Actor编程模型" data-lab="Actor 编程模型"/>
  <text x="396" y="132" font-size="11.5" font-weight="600" fill="#1d1d1f">Actor 编程模型</text>
  <text x="396" y="150" font-size="9.5" fill="#6e6e73">有状态远程对象 · 方法串行</text>

  <rect x="720" y="112" width="320" height="48" rx="11" fill="#f6f6f7" stroke="#e2e2e7" filter="url(#soft)" data-tid="Ray原理_接口_集群与运行时" data-lab="集群与运行时"/>
  <text x="736" y="132" font-size="11.5" font-weight="600" fill="#1d1d1f">集群与运行时</text>
  <text x="736" y="150" font-size="9.5" fill="#6e6e73">ray.init · runtime env · namespace</text>

  <!-- 分三路（蓝 Control 下沉） -->
  <line x1="270" y1="160" x2="270" y2="186" stroke="#5b7db1" stroke-width="1.8" fill="none" marker-end="url(#aC)"/>
  <text x="278" y="177" font-size="8.5" fill="#5b7db1">建 actor · 放置组 → 控制面</text>
  <line x1="800" y1="160" x2="800" y2="186" stroke="#5b7db1" stroke-width="1.8" fill="none" marker-end="url(#aC)"/>
  <text x="808" y="177" font-size="8.5" fill="#5b7db1">提交 task · 租 worker → 数据面</text>

  <!-- ================= 控制面 zone ================= -->
  <rect x="24" y="190" width="506" height="188" rx="14" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="40" y="210" font-size="12" font-weight="600" fill="#1b2a4a">控制面 · head 节点（集群真源之书）</text>
  <text x="40" y="226" font-size="9.5" fill="#7b93b8">全局状态集中一处，细粒度对象级引用不进 GCS</text>

  <rect x="40" y="234" width="474" height="46" rx="11" fill="#ffffff" stroke="#bcd0ec" filter="url(#soft)" data-tid="Ray原理_支撑_全局控制存储GCS" data-lab="全局控制存储 GCS"/>
  <text x="54" y="256" font-size="11.5" font-weight="600" fill="#1b2a4a">全局控制存储 GCS</text>
  <text x="54" y="272" font-size="9" fill="#5b7db1">节点表 · actor 注册 · KV · pub/sub 广播</text>

  <rect x="40" y="290" width="228" height="76" rx="11" fill="#ffffff" stroke="#bcd0ec" filter="url(#soft)" data-tid="Ray原理_支撑_Actor生命周期与调度" data-lab="Actor 生命周期与调度"/>
  <text x="54" y="314" font-size="11" font-weight="600" fill="#1b2a4a">Actor 生命周期与调度</text>
  <text x="54" y="334" font-size="9" fill="#5b7db1">GCS 注册 / 创建 / 重启</text>
  <text x="54" y="349" font-size="9" fill="#5b7db1">方法路由到固定 worker</text>

  <rect x="286" y="290" width="228" height="76" rx="11" fill="#ffffff" stroke="#bcd0ec" filter="url(#soft)" data-tid="Ray原理_支撑_资源管理与放置组" data-lab="资源管理与放置组"/>
  <text x="300" y="314" font-size="11" font-weight="600" fill="#1b2a4a">资源管理与放置组</text>
  <text x="300" y="334" font-size="9" fill="#5b7db1">逻辑资源账本 · PG 编排</text>
  <text x="300" y="349" font-size="9" fill="#5b7db1">bundle PACK / SPREAD</text>

  <!-- ================= 数据面 + 调度面 zone ================= -->
  <rect x="554" y="190" width="502" height="188" rx="14" fill="#f3faf5" stroke="#cfe6d6"/>
  <text x="570" y="210" font-size="12" font-weight="600" fill="#1d4a2b">数据面 + 调度面 · 每工作节点一 Raylet</text>
  <text x="570" y="226" font-size="9.5" fill="#5fa07a">调度去中心化：租到 worker 直推 task，绕开中央调度器</text>

  <rect x="570" y="234" width="236" height="46" rx="11" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)" data-tid="Ray原理_支撑_分布式调度" data-lab="分布式调度"/>
  <text x="584" y="256" font-size="11.5" font-weight="600" fill="#1d4a2b">分布式调度</text>
  <text x="584" y="272" font-size="9" fill="#4a8c60">Raylet 本地 + 混合策略</text>

  <rect x="820" y="234" width="220" height="46" rx="11" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)" data-tid="Ray原理_支撑_远程任务提交与依赖" data-lab="远程任务提交与依赖"/>
  <text x="834" y="256" font-size="11.5" font-weight="600" fill="#1d4a2b">远程任务提交与依赖</text>
  <text x="834" y="272" font-size="9" fill="#4a8c60">worker lease → 直推 task</text>

  <rect x="570" y="290" width="236" height="76" rx="11" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)" data-tid="Ray原理_支撑_分布式对象存储" data-lab="分布式对象存储"/>
  <text x="584" y="314" font-size="11" font-weight="600" fill="#1d4a2b">分布式对象存储 Plasma</text>
  <text x="584" y="334" font-size="9" fill="#4a8c60">共享内存零拷贝 · Pull/Push</text>
  <text x="584" y="349" font-size="9" fill="#4a8c60">小对象走 in-process · 满则 spill</text>

  <rect x="820" y="290" width="220" height="76" rx="11" fill="#eef7f0" stroke="#bfe0c8" filter="url(#soft)" data-tid="Ray原理_支撑_引用计数与容错" data-lab="引用计数与容错"/>
  <text x="834" y="314" font-size="11" font-weight="600" fill="#1d4a2b">引用计数与容错</text>
  <text x="834" y="334" font-size="9" fill="#4a8c60">owner 记引用计数</text>
  <text x="834" y="349" font-size="9" fill="#4a8c60">对象丢失按 lineage 重算</text>

  <!-- 数据面内：调度 → 提交（蓝 Control） -->
  <line x1="806" y1="257" x2="818" y2="257" stroke="#5b7db1" stroke-width="1.8" fill="none" marker-end="url(#aC)"/>
  <!-- 数据面内：对象数据 ↔ lineage（绿 Hot） -->
  <line x1="806" y1="328" x2="818" y2="328" stroke="#2f9e6e" stroke-width="1.8" fill="none" marker-end="url(#aH)"/>
  <!-- 提交 → 值落 Plasma（绿 Hot） -->
  <line x1="895" y1="280" x2="720" y2="288" stroke="#2f9e6e" stroke-width="1.6" fill="none" marker-end="url(#aH)"/>

  <!-- 控制面 ↔ 数据面：心跳 / 资源上报（蓝虚线） -->
  <line x1="530" y1="257" x2="568" y2="257" stroke="#5b7db1" stroke-width="1.6" stroke-dasharray="5 3" fill="none" marker-end="url(#aC)"/>
  <text x="549" y="249" font-size="8.5" fill="#5b7db1" text-anchor="middle">心跳/上报</text>

  <!-- ================= autoscaler 后台带 ================= -->
  <rect x="24" y="390" width="1032" height="56" rx="12" fill="#fdf6ec" stroke="#f0dcaf" stroke-dasharray="6 4" filter="url(#soft)" data-tid="Ray原理_支撑_自动伸缩与运行时环境" data-lab="自动伸缩与运行时环境"/>
  <text x="40" y="414" font-size="11.5" font-weight="600" fill="#6b4e16">后台 · 弹性与环境准备（旁路守护）</text>
  <text x="40" y="434" font-size="9.5" fill="#a9822f">集群自动伸缩：autoscaler 按资源需求增删物理节点　·　runtime env agent：worker 启动前预备依赖并缓存复用</text>

  <!-- autoscaler 旁路虚线：控制面/数据面 → 后台带 -->
  <g stroke="#c99a3a" stroke-width="1.4" stroke-dasharray="5 3" fill="none">
    <line x1="400" y1="366" x2="400" y2="388" marker-end="url(#aS)"/>
    <line x1="688" y1="366" x2="688" y2="388" marker-end="url(#aS)"/>
  </g>
</svg>
