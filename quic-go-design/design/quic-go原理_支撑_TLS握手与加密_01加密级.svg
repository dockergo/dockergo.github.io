<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1000" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">quic-go TLS 握手与加密 · 传输与加密合一，复用 Go 标准库 crypto/tls 的 QUIC API</text>
  <text x="30" y="50" font-size="10" fill="#86868b">与 quiche（内嵌 BoringSSL）的分水岭：quic-go 用 Go 1.21+ 标准库的 tls.QUICConn，不引第三方 TLS 库</text>

  <!-- 加密级时间线 -->
  <rect x="30" y="70" width="940" height="150" rx="14" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="48" y="92" font-size="11.5" font-weight="600" fill="#2c5a3a">三个加密级（各自独立的包号空间 + 密钥）</text>
  <rect x="60" y="108" width="270" height="94" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="195" y="130" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">Initial</text><text x="195" y="150" font-size="8.5" fill="#5b7db1" text-anchor="middle">密钥由 DCID 经 HKDF 派生</text><text x="195" y="168" font-size="8.5" fill="#5b7db1" text-anchor="middle">initial_aead.go（固定盐）</text><text x="195" y="186" font-size="8.5" fill="#5b7db1" text-anchor="middle">任何人可解 → 只防篡改</text>
  <rect x="352" y="108" width="270" height="94" rx="10" fill="#f3f7fc" stroke="#cfe0f2"/><text x="487" y="130" font-size="10" font-weight="600" fill="#274a78" text-anchor="middle">Handshake</text><text x="487" y="150" font-size="8.5" fill="#5b7db1" text-anchor="middle">TLS 握手密钥保护</text><text x="487" y="168" font-size="8.5" fill="#5b7db1" text-anchor="middle">交换证书、Finished</text><text x="487" y="186" font-size="8.5" fill="#5b7db1" text-anchor="middle">真正建立信任</text>
  <rect x="644" y="108" width="308" height="94" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="798" y="130" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">1-RTT (Application)</text><text x="798" y="150" font-size="8.5" fill="#3f8f66" text-anchor="middle">握手完成后所有应用数据</text><text x="798" y="168" font-size="8.5" fill="#3f8f66" text-anchor="middle">updatable_aead.go 支持密钥轮换</text><text x="798" y="186" font-size="8.5" fill="#3f8f66" text-anchor="middle">0-RTT：会话票据早期数据</text>

  <!-- crypto_setup 桥接 -->
  <rect x="30" y="238" width="600" height="150" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="48" y="260" font-size="11.5" font-weight="600" fill="#1b2a4a">cryptoSetup 桥接 QUIC 与 crypto/tls（crypto_setup.go:28）</text>
  <rect x="48" y="272" width="270" height="46" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="183" y="291" font-size="9" font-weight="600" fill="#1b2a4a" text-anchor="middle">StartHandshake(:187)</text><text x="183" y="308" font-size="8" fill="#5b7db1" text-anchor="middle">启动 tls.QUICConn 状态机</text>
  <rect x="330" y="272" width="288" height="46" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="474" y="291" font-size="9" font-weight="600" fill="#1b2a4a" text-anchor="middle">HandleMessage(:220)</text><text x="474" y="308" font-size="8" fill="#5b7db1" text-anchor="middle">收到的 CRYPTO 帧喂给 conn.HandleData</text>
  <text x="48" y="340" font-size="8.5" fill="#5b7db1">TLS 层通过 QUICEvent 反向要求：写 CRYPTO 数据、设置读/写密钥（setReadKey:452 / setWriteKey:494）</text>
  <text x="48" y="358" font-size="8.5" fill="#5b7db1">握手消息不走 TCP、也不走独立流，而是封进 CRYPTO 帧（crypto_stream.go:97）在各加密级传输</text>
  <text x="48" y="376" font-size="8.5" fill="#5b7db1">ALPN、传输参数（transport parameters）随 TLS 扩展一起协商</text>

  <!-- AEAD -->
  <rect x="650" y="238" width="320" height="150" rx="14" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="668" y="260" font-size="11.5" font-weight="600" fill="#3c1361">AEAD 封装 + 头保护</text>
  <text x="668" y="280" font-size="8.5" fill="#7a52a8">aead.go：包体 AEAD 加密（机密+完整）</text>
  <text x="668" y="298" font-size="8.5" fill="#7a52a8">header_protector.go：加密包号字节</text>
  <rect x="668" y="308" width="284" height="30" rx="7" fill="#ffffff" stroke="#d9c9ef"/><text x="810" y="327" font-size="8.5" fill="#3c1361" text-anchor="middle">发：先 AEAD 封包体，再头保护包号</text>
  <rect x="668" y="344" width="284" height="30" rx="7" fill="#ffffff" stroke="#d9c9ef"/><text x="810" y="363" font-size="8.5" fill="#3c1361" text-anchor="middle">收：先去头保护取包号，再 AEAD 解</text>

  <!-- 密钥轮换 -->
  <rect x="30" y="406" width="940" height="94" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="48" y="428" font-size="11.5" font-weight="600" fill="#5a3410">1-RTT 密钥轮换（updatable_aead.go）</text>
  <text x="48" y="448" font-size="8.5" fill="#93762e">KeyPhase 位（短头首字节）标记当前密钥代；rollKeys(:95) 派生下一代密钥并翻转 KeyPhase</text>
  <text x="48" y="466" font-size="8.5" fill="#93762e">FirstKeyUpdateInterval：发/收若干包后主动发起首次轮换，限制单密钥暴露的数据量</text>
  <text x="48" y="484" font-size="8.5" fill="#93762e">收到对端 KeyPhase 翻转即知对端已轮换，本端跟进；旧密钥短暂保留以解迟到包</text>
</svg>
