<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="540" viewBox="0 0 1000 540"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1000" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">quic-go 对象树 · Transport → Listener/Conn → Stream（Go struct，非接口回调）</text>
  <text x="30" y="50" font-size="10" fill="#86868b">全是具体 struct（Conn/Stream 等由 interface 改为 struct 导出），Stream 实现 io.Reader/io.Writer，融入 Go 标准 IO 语义</text>

  <!-- Transport -->
  <rect x="360" y="70" width="280" height="72" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="500" y="94" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">Transport (transport.go:56)</text>
  <text x="500" y="113" font-size="8.5" fill="#5b7db1" text-anchor="middle">持有 net.PacketConn；一个 socket 一个 Transport</text>
  <text x="500" y="130" font-size="8.5" fill="#5b7db1" text-anchor="middle">Listen(:172) / Dial(:237) / DialEarly(:242)</text>

  <!-- Listener (server) -->
  <rect x="90" y="196" width="340" height="88" rx="13" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="260" y="220" font-size="11.5" font-weight="600" fill="#3c1361" text-anchor="middle">服务端：Listener (server.go)</text>
  <text x="260" y="238" font-size="8.5" fill="#7a52a8" text-anchor="middle">Accept(ctx)(:130) 取新连接 · Close(:138) · Addr(:143)</text>
  <text x="260" y="256" font-size="8.5" fill="#7a52a8" text-anchor="middle">baseServer 做入口防护（Retry/token/放大限制）</text>
  <text x="260" y="274" font-size="8.5" fill="#7a52a8" text-anchor="middle">ListenEarly(:183) 支持 0-RTT</text>

  <!-- Conn -->
  <rect x="570" y="196" width="340" height="88" rx="13" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="740" y="220" font-size="11.5" font-weight="600" fill="#0f5132" text-anchor="middle">Conn (connection.go:124)</text>
  <text x="740" y="238" font-size="8.5" fill="#3f8f66" text-anchor="middle">客户端 Dial 返回 / 服务端 Accept 返回</text>
  <text x="740" y="256" font-size="8.5" fill="#3f8f66" text-anchor="middle">Context(:764) · ConnectionState(:773)</text>
  <text x="740" y="274" font-size="8.5" fill="#3f8f66" text-anchor="middle">CloseWithError(:2176) · SendDatagram(:3025)</text>

  <!-- 流开关 API -->
  <rect x="90" y="330" width="820" height="72" rx="13" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="108" y="352" font-size="11" font-weight="600" fill="#2c5a3a">Conn 上的开流 / 取流 API（双向流 + 单向流）</text>
  <rect x="108" y="362" width="192" height="30" rx="7" fill="#ffffff" stroke="#cfe6d5"/><text x="204" y="381" font-size="8.5" fill="#2c5a3a" text-anchor="middle">OpenStream(:2900) / Sync(:2909)</text>
  <rect x="312" y="362" width="192" height="30" rx="7" fill="#ffffff" stroke="#cfe6d5"/><text x="408" y="381" font-size="8.5" fill="#2c5a3a" text-anchor="middle">AcceptStream(:2885)</text>
  <rect x="516" y="362" width="192" height="30" rx="7" fill="#ffffff" stroke="#cfe6d5"/><text x="612" y="381" font-size="8.5" fill="#2c5a3a" text-anchor="middle">OpenUniStream(:2919) / Sync(:2928)</text>
  <rect x="720" y="362" width="180" height="30" rx="7" fill="#ffffff" stroke="#cfe6d5"/><text x="810" y="381" font-size="8.5" fill="#2c5a3a" text-anchor="middle">AcceptUniStream(:2890)</text>

  <!-- Stream 三态 -->
  <rect x="90" y="440" width="256" height="76" rx="13" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="218" y="462" font-size="11" font-weight="600" fill="#1d1d1f" text-anchor="middle">Stream (stream.go:52)</text>
  <text x="218" y="480" font-size="8.5" fill="#494950" text-anchor="middle">双向流 = Send + Receive 合体</text>
  <text x="218" y="498" font-size="8.5" fill="#86868b" text-anchor="middle">io.Reader + io.Writer + Close</text>

  <rect x="372" y="440" width="256" height="76" rx="13" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="500" y="462" font-size="11" font-weight="600" fill="#1d1d1f" text-anchor="middle">SendStream (send_stream.go:16)</text>
  <text x="500" y="480" font-size="8.5" fill="#494950" text-anchor="middle">Write(:94) · Close · CancelWrite</text>
  <text x="500" y="498" font-size="8.5" fill="#86868b" text-anchor="middle">发缓冲 → popStreamFrame(:303)</text>

  <rect x="654" y="440" width="256" height="76" rx="13" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="782" y="462" font-size="11" font-weight="600" fill="#1d1d1f" text-anchor="middle">ReceiveStream (receive_stream.go:18)</text>
  <text x="782" y="480" font-size="8.5" fill="#494950" text-anchor="middle">Read(:112) · CancelRead(:399)</text>
  <text x="782" y="498" font-size="8.5" fill="#86868b" text-anchor="middle">frame_sorter 重排乱序 STREAM 帧</text>

  <!-- 连线 -->
  <path d="M420,142 L260,196" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M580,142 L740,196" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M260,284 L260,330" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M740,284 L720,330" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M300,402 L250,440" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M612,402 L560,440" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M810,402 L800,440" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
</svg>
