<svg xmlns="http://www.w3.org/2000/svg" width="1010" height="360" viewBox="0 0 1010 360"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
  </defs>
  <rect width="1010" height="360" fill="#fbfbfd"/>
  <text x="30" y="28" font-size="14" font-weight="600" fill="#1d1d1f">quic-go 依赖矩阵 · 接触面主线（行）对支撑能力域（列）的依赖强度</text>
  <text x="30" y="46" font-size="9.5" fill="#86868b">强 = 该接口必经此机制；中 = 常涉及；弱 = 少量关联。事件循环与 IO 几乎强依赖全部能力域 —— 它是发包/收包/计时的总调度</text>

  <!-- 列标题 -->
  <text x="325" y="78" font-size="8.5" font-weight="600" fill="#494950" text-anchor="middle">包与帧</text>
  <text x="423" y="78" font-size="8.5" font-weight="600" fill="#494950" text-anchor="middle">TLS 加密</text>
  <text x="521" y="78" font-size="8.5" font-weight="600" fill="#494950" text-anchor="middle">流与流控</text>
  <text x="619" y="78" font-size="8.5" font-weight="600" fill="#494950" text-anchor="middle">丢包恢复</text>
  <text x="717" y="78" font-size="8.5" font-weight="600" fill="#494950" text-anchor="middle">拥塞控制</text>
  <text x="815" y="78" font-size="8.5" font-weight="600" fill="#494950" text-anchor="middle">连接迁移</text>
  <text x="913" y="78" font-size="8.5" font-weight="600" fill="#494950" text-anchor="middle">HTTP3/QPACK</text>
  <text x="981" y="78" font-size="8.5" font-weight="600" fill="#494950" text-anchor="middle" transform="rotate(0 981 78)">抗攻击</text>

  <!-- 行 1 会话与连接 -->
  <text x="40" y="120" font-size="10" font-weight="600" fill="#3c1361">会话与连接</text>
  <rect x="278" y="98" width="94" height="40" rx="6" fill="#e8cf9a"/><text x="325" y="122" font-size="8.5" fill="#5a3410" text-anchor="middle">中</text>
  <rect x="376" y="98" width="94" height="40" rx="6" fill="#bce6cd"/><text x="423" y="122" font-size="8.5" fill="#12402a" text-anchor="middle">强</text>
  <rect x="474" y="98" width="94" height="40" rx="6" fill="#bce6cd"/><text x="521" y="122" font-size="8.5" fill="#12402a" text-anchor="middle">强</text>
  <rect x="572" y="98" width="94" height="40" rx="6" fill="#e8cf9a"/><text x="619" y="122" font-size="8.5" fill="#5a3410" text-anchor="middle">中</text>
  <rect x="670" y="98" width="94" height="40" rx="6" fill="#ececf1"/><text x="717" y="122" font-size="8.5" fill="#86868b" text-anchor="middle">弱</text>
  <rect x="768" y="98" width="94" height="40" rx="6" fill="#bce6cd"/><text x="815" y="122" font-size="8.5" fill="#12402a" text-anchor="middle">强</text>
  <rect x="866" y="98" width="94" height="40" rx="6" fill="#ececf1"/><text x="913" y="122" font-size="8.5" fill="#86868b" text-anchor="middle">弱</text>
  <rect x="964" y="98" width="34" height="40" rx="6" fill="#e8cf9a"/><text x="981" y="122" font-size="8.5" fill="#5a3410" text-anchor="middle">中</text>

  <!-- 行 2 事件循环与IO -->
  <text x="40" y="180" font-size="10" font-weight="600" fill="#1b2a4a">事件循环与 IO ★</text>
  <rect x="278" y="158" width="94" height="40" rx="6" fill="#bce6cd"/><text x="325" y="182" font-size="8.5" fill="#12402a" text-anchor="middle">强</text>
  <rect x="376" y="158" width="94" height="40" rx="6" fill="#bce6cd"/><text x="423" y="182" font-size="8.5" fill="#12402a" text-anchor="middle">强</text>
  <rect x="474" y="158" width="94" height="40" rx="6" fill="#bce6cd"/><text x="521" y="182" font-size="8.5" fill="#12402a" text-anchor="middle">强</text>
  <rect x="572" y="158" width="94" height="40" rx="6" fill="#bce6cd"/><text x="619" y="182" font-size="8.5" fill="#12402a" text-anchor="middle">强</text>
  <rect x="670" y="158" width="94" height="40" rx="6" fill="#bce6cd"/><text x="717" y="182" font-size="8.5" fill="#12402a" text-anchor="middle">强</text>
  <rect x="768" y="158" width="94" height="40" rx="6" fill="#bce6cd"/><text x="815" y="182" font-size="8.5" fill="#12402a" text-anchor="middle">强</text>
  <rect x="866" y="158" width="94" height="40" rx="6" fill="#ececf1"/><text x="913" y="182" font-size="8.5" fill="#86868b" text-anchor="middle">弱</text>
  <rect x="964" y="158" width="34" height="40" rx="6" fill="#bce6cd"/><text x="981" y="182" font-size="8.5" fill="#12402a" text-anchor="middle">强</text>

  <!-- 行 3 HTTP与流 -->
  <text x="40" y="240" font-size="10" font-weight="600" fill="#274a78">HTTP 与流</text>
  <rect x="278" y="218" width="94" height="40" rx="6" fill="#ececf1"/><text x="325" y="242" font-size="8.5" fill="#86868b" text-anchor="middle">弱</text>
  <rect x="376" y="218" width="94" height="40" rx="6" fill="#e8cf9a"/><text x="423" y="242" font-size="8.5" fill="#5a3410" text-anchor="middle">中</text>
  <rect x="474" y="218" width="94" height="40" rx="6" fill="#e8cf9a"/><text x="521" y="242" font-size="8.5" fill="#5a3410" text-anchor="middle">中</text>
  <rect x="572" y="218" width="94" height="40" rx="6" fill="#ececf1"/><text x="619" y="242" font-size="8.5" fill="#86868b" text-anchor="middle">弱</text>
  <rect x="670" y="218" width="94" height="40" rx="6" fill="#ececf1"/><text x="717" y="242" font-size="8.5" fill="#86868b" text-anchor="middle">弱</text>
  <rect x="768" y="218" width="94" height="40" rx="6" fill="#ececf1"/><text x="815" y="242" font-size="8.5" fill="#86868b" text-anchor="middle">弱</text>
  <rect x="866" y="218" width="94" height="40" rx="6" fill="#bce6cd"/><text x="913" y="242" font-size="8.5" fill="#12402a" text-anchor="middle">强</text>
  <rect x="964" y="218" width="34" height="40" rx="6" fill="#ececf1"/><text x="981" y="242" font-size="8.5" fill="#86868b" text-anchor="middle">弱</text>

  <!-- 图例 + 结论 -->
  <rect x="30" y="286" width="948" height="56" rx="10" fill="#f6f6f8" stroke="#e2e2e7"/>
  <rect x="46" y="300" width="18" height="14" rx="3" fill="#bce6cd"/><text x="70" y="311" font-size="8.5" fill="#494950">强依赖（必经）</text>
  <rect x="176" y="300" width="18" height="14" rx="3" fill="#e8cf9a"/><text x="200" y="311" font-size="8.5" fill="#494950">中依赖</text>
  <rect x="286" y="300" width="18" height="14" rx="3" fill="#ececf1"/><text x="310" y="311" font-size="8.5" fill="#494950">弱依赖</text>
  <text x="46" y="333" font-size="9" fill="#6e6e73">读法：竖看某能力域被哪些接口依赖，横看某接口用到哪些机制。<tspan font-weight="600" fill="#1b2a4a">事件循环与 IO 一行全强</tspan> —— 收/发/计时的总闸门，改它牵一发动全身。</text>
</svg>
