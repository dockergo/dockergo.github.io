<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
  </defs>
  <rect width="1000" height="600" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">quic-go 双维模型 · 接触面主线 × 支撑能力域 × 执行时机</text>
  <text x="30" y="50" font-size="10" fill="#86868b">元模式判型（家族 8 传输协议库）：外部怎么用（编程 API）× 内部管什么（协议机制）× 何时跑（前台/后台 goroutine）</text>

  <!-- 接触面主线 -->
  <rect x="30" y="66" width="940" height="96" rx="14" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="48" y="88" font-size="12" font-weight="600" fill="#3c1361">维度一 · 接触面主线（应用如何驱动它 —— Go 编程 API）</text>
  <rect x="48" y="100" width="298" height="50" rx="10" fill="#ffffff" stroke="#d9c9ef"/><text x="197" y="120" font-size="10" font-weight="600" fill="#3c1361" text-anchor="middle">会话与连接</text><text x="197" y="138" font-size="8.5" fill="#7a52a8" text-anchor="middle">Transport/Listener/Conn/Stream</text>
  <rect x="352" y="100" width="298" height="50" rx="10" fill="#ffffff" stroke="#d9c9ef"/><text x="501" y="120" font-size="10" font-weight="600" fill="#3c1361" text-anchor="middle">事件循环与 IO ★灵魂</text><text x="501" y="138" font-size="8.5" fill="#7a52a8" text-anchor="middle">run goroutine + channel + select</text>
  <rect x="656" y="100" width="298" height="50" rx="10" fill="#ffffff" stroke="#d9c9ef"/><text x="805" y="120" font-size="10" font-weight="600" fill="#3c1361" text-anchor="middle">HTTP 与流</text><text x="805" y="138" font-size="8.5" fill="#7a52a8" text-anchor="middle">http3.Server / Transport(RoundTripper)</text>

  <!-- 支撑能力域 -->
  <rect x="30" y="176" width="940" height="252" rx="14" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="48" y="198" font-size="12" font-weight="600" fill="#2c5a3a">维度二 · 支撑能力域（协议内部公共机制 —— 8 条）</text>
  <rect x="48" y="212" width="220" height="46" rx="9" fill="#ffffff" stroke="#cfe6d5"/><text x="158" y="231" font-size="9.5" font-weight="600" fill="#2c5a3a" text-anchor="middle">包与帧编解码</text><text x="158" y="248" font-size="8" fill="#5aa06f" text-anchor="middle">wire · quicvarint</text>
  <rect x="278" y="212" width="220" height="46" rx="9" fill="#ffffff" stroke="#cfe6d5"/><text x="388" y="231" font-size="9.5" font-weight="600" fill="#2c5a3a" text-anchor="middle">TLS 握手与加密 ★灵魂</text><text x="388" y="248" font-size="8" fill="#5aa06f" text-anchor="middle">crypto/tls QUIC API</text>
  <rect x="508" y="212" width="220" height="46" rx="9" fill="#ffffff" stroke="#cfe6d5"/><text x="618" y="231" font-size="9.5" font-weight="600" fill="#2c5a3a" text-anchor="middle">流与流量控制</text><text x="618" y="248" font-size="8" fill="#5aa06f" text-anchor="middle">两级窗 + auto-tuning</text>
  <rect x="738" y="212" width="216" height="46" rx="9" fill="#ffffff" stroke="#cfe6d5"/><text x="846" y="231" font-size="9.5" font-weight="600" fill="#2c5a3a" text-anchor="middle">丢包检测与恢复</text><text x="846" y="248" font-size="8" fill="#5aa06f" text-anchor="middle">sentPacketHandler · PTO</text>
  <rect x="48" y="272" width="220" height="46" rx="9" fill="#ffffff" stroke="#cfe6d5"/><text x="158" y="291" font-size="9.5" font-weight="600" fill="#2c5a3a" text-anchor="middle">拥塞控制</text><text x="158" y="308" font-size="8" fill="#5aa06f" text-anchor="middle">Cubic / Reno + pacer</text>
  <rect x="278" y="272" width="220" height="46" rx="9" fill="#ffffff" stroke="#cfe6d5"/><text x="388" y="291" font-size="9.5" font-weight="600" fill="#2c5a3a" text-anchor="middle">连接管理与迁移</text><text x="388" y="308" font-size="8" fill="#5aa06f" text-anchor="middle">connID + PATH_CHALLENGE</text>
  <rect x="508" y="272" width="220" height="46" rx="9" fill="#ffffff" stroke="#cfe6d5"/><text x="618" y="291" font-size="9.5" font-weight="600" fill="#2c5a3a" text-anchor="middle">HTTP/3 与 QPACK</text><text x="618" y="308" font-size="8" fill="#5aa06f" text-anchor="middle">frames + quic-go/qpack</text>
  <rect x="738" y="272" width="216" height="46" rx="9" fill="#ffffff" stroke="#cfe6d5"/><text x="846" y="291" font-size="9.5" font-weight="600" fill="#2c5a3a" text-anchor="middle">可靠性与抗攻击</text><text x="846" y="308" font-size="8" fill="#5aa06f" text-anchor="middle">Retry/token/放大/reset</text>
  <text x="48" y="344" font-size="10" font-weight="600" fill="#2c5a3a">贯穿层</text>
  <rect x="120" y="330" width="834" height="34" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="537" y="351" font-size="9" fill="#12402a" text-anchor="middle">Connection ID（标识非四元组）+ 单调递增包号 —— 横切迁移 / 丢包恢复 / 多流；且「一切 IO 与定时都自管在 goroutine 里」</text>
  <text x="48" y="392" font-size="8.5" fill="#5aa06f">正交性自检：任一源码核心概念（如 sentPacketHandler / cubicSender / connIDManager）都唯一归属到上面某一格</text>
  <text x="48" y="410" font-size="8.5" fill="#5aa06f">灵魂两条：事件循环与 IO（自管 goroutine，非 sans-IO）+ TLS 握手内嵌（传输与加密合一，1-RTT 建连）</text>

  <!-- 执行时机 -->
  <rect x="30" y="442" width="940" height="130" rx="14" fill="#f6f6f8" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="464" font-size="12" font-weight="600" fill="#1d1d1f">维度三 · 执行时机（何时跑 —— quic-go 用 goroutine 而非应用泵事件）</text>
  <rect x="48" y="478" width="450" height="80" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="273" y="500" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">前台 goroutine（请求/调用路径）</text><text x="273" y="520" font-size="8.5" fill="#5b7db1" text-anchor="middle">Transport.listen 读循环 · Conn.run 事件循环</text><text x="273" y="538" font-size="8.5" fill="#5b7db1" text-anchor="middle">Stream.Write/Read 由用户 goroutine 触发</text>
  <rect x="508" y="478" width="446" height="80" rx="10" fill="#fff7e6" stroke="#e8cf9a"/><text x="731" y="500" font-size="10" font-weight="600" fill="#5a3410" text-anchor="middle">后台 goroutine / 定时器</text><text x="731" y="520" font-size="8.5" fill="#93762e" text-anchor="middle">sendQueue.Run 异步写 socket · time.Timer 驱动</text><text x="731" y="538" font-size="8.5" fill="#93762e" text-anchor="middle">重传/PTO/idle/ACK/pacing 皆挂在 run 的 timer 上</text>
</svg>
