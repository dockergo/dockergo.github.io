<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1000" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">quic-go 连接管理与迁移 · Connection ID 标识连接（非四元组），换网不断</text>
  <text x="30" y="50" font-size="10" fill="#86868b">连接由 CID 而非「源IP:端口→目的IP:端口」标识，所以手机 WiFi 切 4G 后连接可继续</text>

  <!-- 两套 CID -->
  <rect x="30" y="70" width="460" height="170" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="48" y="92" font-size="11.5" font-weight="600" fill="#1b2a4a">本端签发的 CID：connIDGenerator（:46）</text>
  <text x="48" y="112" font-size="8.5" fill="#5b7db1">我发给对端一批 CID，让对端用它们作目的 CID 找到我</text>
  <rect x="48" y="122" width="404" height="30" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="250" y="141" font-size="8.5" fill="#1b2a4a" text-anchor="middle">SetMaxActiveConnIDs(:81) 按对端上限签发</text>
  <rect x="48" y="158" width="404" height="30" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="250" y="177" font-size="8.5" fill="#1b2a4a" text-anchor="middle">NEW_CONNECTION_ID 帧下发 · Retire(:99) 回收</text>
  <text x="48" y="210" font-size="8.5" fill="#5b7db1">应用可自定义 ConnectionIDGenerator（interface.go:87）</text>
  <text x="48" y="228" font-size="8.5" fill="#5b7db1">用于负载均衡：LB 按 CID 路由到同一后端</text>

  <rect x="510" y="70" width="460" height="170" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="528" y="92" font-size="11.5" font-weight="600" fill="#0f5132">对端的 CID：connIDManager（:19）</text>
  <text x="528" y="112" font-size="8.5" fill="#3f8f66">对端发来的一批 CID，我发包时挑一个作目的 CID</text>
  <rect x="528" y="122" width="424" height="30" rx="7" fill="#ffffff" stroke="#bce6cd"/><text x="740" y="141" font-size="8.5" fill="#0f5132" text-anchor="middle">Add(:64) 收 NEW_CONNECTION_ID 帧入池</text>
  <rect x="528" y="158" width="424" height="30" rx="7" fill="#ffffff" stroke="#bce6cd"/><text x="740" y="177" font-size="8.5" fill="#0f5132" text-anchor="middle">Get(:238) 取当前活跃 CID · SentPacket(:219) 计数</text>
  <text x="528" y="210" font-size="8.5" fill="#3f8f66">迁移或探测新路径时换用一个「未用过」的 CID</text>
  <text x="528" y="228" font-size="8.5" fill="#3f8f66">避免链路上的观察者靠固定 CID 关联用户</text>

  <!-- 路径验证 -->
  <rect x="30" y="256" width="940" height="150" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="48" y="278" font-size="11.5" font-weight="600" fill="#5a3410">路径验证：PATH_CHALLENGE / PATH_RESPONSE（path_manager.go:40）</text>
  <rect x="48" y="292" width="200" height="66" rx="10" fill="#ffffff" stroke="#e8cf9a"/><text x="148" y="314" font-size="9" font-weight="600" fill="#5a3410" text-anchor="middle">① 检测到新地址</text><text x="148" y="332" font-size="8" fill="#93762e" text-anchor="middle">收到来自新四元组的包</text><text x="148" y="348" font-size="8" fill="#93762e" text-anchor="middle">尚不能信任 → 需验证</text>
  <rect x="262" y="292" width="200" height="66" rx="10" fill="#ffffff" stroke="#e8cf9a"/><text x="362" y="314" font-size="9" font-weight="600" fill="#5a3410" text-anchor="middle">② 发 PATH_CHALLENGE</text><text x="362" y="332" font-size="8" fill="#93762e" text-anchor="middle">含随机数据（:136）</text><text x="362" y="348" font-size="8" fill="#93762e" text-anchor="middle">往新地址发</text>
  <rect x="476" y="292" width="200" height="66" rx="10" fill="#ffffff" stroke="#e8cf9a"/><text x="576" y="314" font-size="9" font-weight="600" fill="#5a3410" text-anchor="middle">③ 收 PATH_RESPONSE</text><text x="576" y="332" font-size="8" fill="#93762e" text-anchor="middle">原样回传随机数据</text><text x="576" y="348" font-size="8" fill="#93762e" text-anchor="middle">证明对端确在该地址</text>
  <rect x="690" y="292" width="262" height="66" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="821" y="314" font-size="9" font-weight="600" fill="#0f5132" text-anchor="middle">④ 迁移完成</text><text x="821" y="332" font-size="8" fill="#3f8f66" text-anchor="middle">切换到新路径继续收发</text><text x="821" y="348" font-size="8" fill="#3f8f66" text-anchor="middle">pathManagerOutgoing 主动迁移</text>
  <text x="48" y="384" font-size="8.5" fill="#93762e">验证前对新路径同样受 3× 放大限制约束，防被利用做反射放大攻击</text>
  <text x="48" y="400" font-size="8.5" fill="#93762e">Conn.AddPath(:3082) 支持应用主动在新 Transport 上加路径（多路径能力基础）</text>

  <!-- 底 -->
  <rect x="30" y="422" width="940" height="60" rx="12" fill="#f6f6f8" stroke="#e2e2e7"/>
  <text x="500" y="446" font-size="9.5" fill="#494950" text-anchor="middle"><tspan font-weight="600" fill="#1d1d1f">贯穿层：</tspan>Connection ID 是「连接身份」，四元组只是「当前路径」—— 身份与路径解耦是迁移的根本</text>
  <text x="500" y="466" font-size="8.5" fill="#86868b" text-anchor="middle">服务端 Transport 靠 packetHandlerMap 按 DCID 把包路由到正确 Conn（见可靠性与抗攻击篇）</text>

  <path d="M248,325 L262,325" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M462,325 L476,325" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M676,325 L690,325" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
</svg>
