<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1000" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">quic-go 线格式 · UDP 数据报 → 可合并的包 → 帧；一切长度用 varint</text>

  <!-- 层级 -->
  <rect x="30" y="56" width="940" height="54" rx="12" fill="#f5f5f7" stroke="#d2d2d7"/>
  <text x="50" y="78" font-size="10" font-weight="600" fill="#1d1d1f">一个 UDP 数据报可 coalesce 多个 QUIC 包（不同加密级）</text>
  <rect x="360" y="66" width="140" height="32" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="430" y="86" font-size="8.5" fill="#1b2a4a" text-anchor="middle">Initial 包</text>
  <rect x="508" y="66" width="140" height="32" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="578" y="86" font-size="8.5" fill="#274a78" text-anchor="middle">Handshake 包</text>
  <rect x="656" y="66" width="290" height="32" rx="7" fill="#eafaf1" stroke="#bce6cd"/><text x="801" y="86" font-size="8.5" fill="#0f5132" text-anchor="middle">1-RTT (Short Header) 包</text>

  <!-- 长短头 -->
  <rect x="30" y="128" width="460" height="150" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="48" y="150" font-size="11.5" font-weight="600" fill="#1b2a4a">长头包（握手期 · extended_header.go）</text>
  <text x="48" y="170" font-size="8.5" fill="#5b7db1">首字节 · 版本 · DCID/SCID · 包号长度 · 长度 · 包号</text>
  <rect x="48" y="182" width="424" height="30" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="260" y="201" font-size="8.5" fill="#1b2a4a" text-anchor="middle">带完整 Connection ID，用于建连与版本协商</text>
  <text x="48" y="234" font-size="8.5" fill="#5b7db1">类型：Initial / 0-RTT / Handshake / Retry</text>
  <text x="48" y="254" font-size="8.5" fill="#5b7db1">version.go：Version1=0x1，Version2=0x6b3343cf</text>
  <text x="48" y="272" font-size="8.5" fill="#5b7db1">header protection 保护包号字节</text>

  <rect x="510" y="128" width="460" height="150" rx="13" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="528" y="150" font-size="11.5" font-weight="600" fill="#0f5132">短头包（1-RTT · short_header.go）</text>
  <text x="528" y="170" font-size="8.5" fill="#3f8f66">首字节（含 KeyPhase 位）· DCID · 包号 —— 无版本无 SCID</text>
  <rect x="528" y="182" width="424" height="30" rx="7" fill="#ffffff" stroke="#bce6cd"/><text x="740" y="201" font-size="8.5" fill="#0f5132" text-anchor="middle">握手完成后所有数据用短头，开销最小</text>
  <text x="528" y="234" font-size="8.5" fill="#3f8f66">DCID 长度不在包里，收方按本地已知 CID 长度解析</text>
  <text x="528" y="254" font-size="8.5" fill="#3f8f66">KeyPhase 位标记密钥轮换（详见 TLS 篇）</text>
  <text x="528" y="272" font-size="8.5" fill="#3f8f66">包号连接内单调递增、按空间独立</text>

  <!-- 帧 + varint -->
  <rect x="30" y="296" width="600" height="180" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="48" y="318" font-size="11.5" font-weight="600" fill="#5a3410">包体 = 若干帧（frame_parser.go 逐帧解析）</text>
  <rect x="48" y="330" width="180" height="30" rx="7" fill="#ffffff" stroke="#e8cf9a"/><text x="138" y="349" font-size="8.5" fill="#5a3410" text-anchor="middle">STREAM（应用数据）</text>
  <rect x="238" y="330" width="180" height="30" rx="7" fill="#ffffff" stroke="#e8cf9a"/><text x="328" y="349" font-size="8.5" fill="#5a3410" text-anchor="middle">ACK（确认）</text>
  <rect x="428" y="330" width="180" height="30" rx="7" fill="#ffffff" stroke="#e8cf9a"/><text x="518" y="349" font-size="8.5" fill="#5a3410" text-anchor="middle">CRYPTO（握手）</text>
  <rect x="48" y="368" width="180" height="30" rx="7" fill="#ffffff" stroke="#e8cf9a"/><text x="138" y="387" font-size="8.5" fill="#5a3410" text-anchor="middle">MAX_DATA/MAX_STREAM_DATA</text>
  <rect x="238" y="368" width="180" height="30" rx="7" fill="#ffffff" stroke="#e8cf9a"/><text x="328" y="387" font-size="8.5" fill="#5a3410" text-anchor="middle">NEW_CONNECTION_ID</text>
  <rect x="428" y="368" width="180" height="30" rx="7" fill="#ffffff" stroke="#e8cf9a"/><text x="518" y="387" font-size="8.5" fill="#5a3410" text-anchor="middle">PATH_CHALLENGE/RESPONSE</text>
  <text x="48" y="420" font-size="8.5" fill="#93762e">wire/ 下每种帧一个文件（20+ 种）：reset_stream / stop_sending / connection_close / new_token …</text>
  <text x="48" y="440" font-size="8.5" fill="#93762e">STREAM 帧发送侧由 SendStream.popStreamFrame 按包内剩余空间切分（详见流控篇）</text>
  <text x="48" y="460" font-size="8.5" fill="#93762e">帧解析后依类型分发：STREAM→流、ACK→丢包检测、CRYPTO→握手、MAX_*→流控</text>

  <!-- varint 表 -->
  <rect x="650" y="296" width="320" height="180" rx="13" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="668" y="318" font-size="11.5" font-weight="600" fill="#3c1361">变长整数 varint（quicvarint/varint.go）</text>
  <text x="668" y="338" font-size="8.5" fill="#7a52a8">前 2 bit 定字节数，编码越小的数越省字节</text>
  <rect x="668" y="348" width="284" height="24" rx="6" fill="#ffffff" stroke="#d9c9ef"/><text x="810" y="364" font-size="8" fill="#3c1361" text-anchor="middle">1 字节：0 ~ 63 (maxVarInt1)</text>
  <rect x="668" y="376" width="284" height="24" rx="6" fill="#ffffff" stroke="#d9c9ef"/><text x="810" y="392" font-size="8" fill="#3c1361" text-anchor="middle">2 字节：≤ 16383 (maxVarInt2)</text>
  <rect x="668" y="404" width="284" height="24" rx="6" fill="#ffffff" stroke="#d9c9ef"/><text x="810" y="420" font-size="8" fill="#3c1361" text-anchor="middle">4 字节：≤ 1073741823</text>
  <rect x="668" y="432" width="284" height="24" rx="6" fill="#ffffff" stroke="#d9c9ef"/><text x="810" y="448" font-size="8" fill="#3c1361" text-anchor="middle">8 字节：≤ 4.6e18 (Max)</text>

  <path d="M260,110 L260,128" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M740,110 L740,128" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M330,278 L330,296" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
</svg>
