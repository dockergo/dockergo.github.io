<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1000" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">quic-go 收发路径 · 收包与发包都汇聚到 Conn.run 这一个 goroutine</text>
  <text x="30" y="50" font-size="10" fill="#86868b">跨 goroutine 只经 channel 传信号；协议状态机始终单线程执行，免锁</text>

  <!-- 收包路径 -->
  <rect x="30" y="70" width="460" height="400" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="48" y="94" font-size="12" font-weight="600" fill="#1b2a4a">收包路径（入站）</text>
  <rect x="60" y="108" width="400" height="40" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="260" y="126" font-size="9" font-weight="600" fill="#1b2a4a" text-anchor="middle">Transport.listen 读 goroutine (:527)</text><text x="260" y="141" font-size="8" fill="#5b7db1" text-anchor="middle">conn.ReadPacket 从 socket 收 UDP</text>
  <rect x="60" y="160" width="400" height="40" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="260" y="178" font-size="9" font-weight="600" fill="#1b2a4a" text-anchor="middle">packetHandlerMap.Get(:767) 按 CID demux</text><text x="260" y="193" font-size="8" fill="#5b7db1" text-anchor="middle">找到目标 Conn → handlePacket 入队</text>
  <rect x="60" y="212" width="400" height="40" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="260" y="230" font-size="9" font-weight="600" fill="#0f5132" text-anchor="middle">run 被 notifyReceivedPacket 唤醒</text><text x="260" y="245" font-size="8" fill="#3f8f66" text-anchor="middle">handlePackets(:1002) 取出队列包</text>
  <rect x="60" y="264" width="400" height="40" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="260" y="282" font-size="9" font-weight="600" fill="#1b2a4a" text-anchor="middle">packet_unpacker 去头部保护 + AEAD 解密</text><text x="260" y="297" font-size="8" fill="#5b7db1" text-anchor="middle">handleShortHeaderPacket(:1169) / Long(:1307)</text>
  <rect x="60" y="316" width="400" height="40" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="260" y="334" font-size="9" font-weight="600" fill="#1b2a4a" text-anchor="middle">frame_parser 逐帧解析 → 分发到子模块</text><text x="260" y="349" font-size="8" fill="#5b7db1" text-anchor="middle">STREAM→流、ACK→丢包、CRYPTO→握手…</text>
  <rect x="60" y="368" width="400" height="40" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="260" y="386" font-size="9" font-weight="600" fill="#1b2a4a" text-anchor="middle">ReceiveStream.handleStreamFrame(:431)</text><text x="260" y="401" font-size="8" fill="#5b7db1" text-anchor="middle">frame_sorter 重排 → 用户 Read 可取</text>
  <text x="60" y="436" font-size="8.5" fill="#5b7db1">处理完若需回 ACK/更新窗口 → 触发一次发送</text>

  <!-- 发包路径 -->
  <rect x="510" y="70" width="460" height="400" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="528" y="94" font-size="12" font-weight="600" fill="#5a3410">发包路径（出站）</text>
  <rect x="540" y="108" width="400" height="40" rx="9" fill="#f4eefb" stroke="#d9c9ef"/><text x="740" y="126" font-size="9" font-weight="600" fill="#3c1361" text-anchor="middle">用户 goroutine：Stream.Write(:94)</text><text x="740" y="141" font-size="8" fill="#7a52a8" text-anchor="middle">写入发缓冲 → scheduleSending 发信号</text>
  <rect x="540" y="160" width="400" height="40" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="740" y="178" font-size="9" font-weight="600" fill="#0f5132" text-anchor="middle">run 收到 sendingScheduled 信号</text><text x="740" y="193" font-size="8" fill="#3f8f66" text-anchor="middle">triggerSending(:2448) → sendPackets(:2488)</text>
  <rect x="540" y="212" width="400" height="40" rx="9" fill="#ffffff" stroke="#e8cf9a"/><text x="740" y="230" font-size="9" font-weight="600" fill="#5a3410" text-anchor="middle">拥塞/流控/放大 门禁：CanSend?</text><text x="740" y="245" font-size="8" fill="#93762e" text-anchor="middle">cubicSender.CanSend(:158) + pacer 节流</text>
  <rect x="540" y="264" width="400" height="40" rx="9" fill="#ffffff" stroke="#e8cf9a"/><text x="740" y="282" font-size="9" font-weight="600" fill="#5a3410" text-anchor="middle">framer 攒帧：控制帧 + STREAM 帧</text><text x="740" y="297" font-size="8" fill="#93762e" text-anchor="middle">popStreamFrame(:303) 按剩余空间切分</text>
  <rect x="540" y="316" width="400" height="40" rx="9" fill="#ffffff" stroke="#e8cf9a"/><text x="740" y="334" font-size="9" font-weight="600" fill="#5a3410" text-anchor="middle">packet_packer 组包 + AEAD 封 + 头保护</text><text x="740" y="349" font-size="8" fill="#93762e" text-anchor="middle">AppendPacket(:469) / PackCoalesced(:333)</text>
  <rect x="540" y="368" width="400" height="40" rx="9" fill="#ffffff" stroke="#e8cf9a"/><text x="740" y="386" font-size="9" font-weight="600" fill="#5a3410" text-anchor="middle">sentPacketHandler.SentPacket(:252) 记账</text><text x="740" y="401" font-size="8" fill="#93762e" text-anchor="middle">登记待确认 → 供丢包检测/重传</text>
  <rect x="540" y="420" width="400" height="34" rx="9" fill="#f5f5f7" stroke="#d2d2d7"/><text x="740" y="441" font-size="8.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">sendQueue goroutine 异步 WriteTo → socket</text>

  <path d="M260,148 L260,160" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M260,200 L260,212" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M260,252 L260,264" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M260,304 L260,316" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M260,356 L260,368" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M740,148 L740,160" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M740,200 L740,212" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M740,252 L740,264" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M740,304 L740,316" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M740,356 L740,368" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M740,408 L740,420" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
</svg>
