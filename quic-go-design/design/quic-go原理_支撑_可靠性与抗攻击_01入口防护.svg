<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="510" viewBox="0 0 1000 510"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1000" height="510" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">quic-go 可靠性与抗攻击 · 服务端入口是关卡：地址验证 + 放大限制 + 无状态重置</text>
  <text x="30" y="50" font-size="10" fill="#86868b">UDP 无连接、易被伪造源地址做反射放大攻击；QUIC 在建连前用多重手段先「验明正身」</text>

  <!-- 放大限制 -->
  <rect x="30" y="70" width="460" height="150" rx="14" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="48" y="92" font-size="11.5" font-weight="600" fill="#7a2a2a">3× 放大限制（sent_packet_handler.go:25）</text>
  <text x="48" y="112" font-size="8.5" fill="#a05555">地址验证前，服务端发出字节 ≤ 3 × 已收字节</text>
  <rect x="48" y="122" width="404" height="34" rx="8" fill="#ffffff" stroke="#e7c3c3"/><text x="250" y="143" font-size="8.5" fill="#7a2a2a" text-anchor="middle">amplificationFactor = 3 · isAmplificationLimited(:1034)</text>
  <text x="48" y="176" font-size="8.5" fill="#a05555">bytesSent ≥ 3 × bytesReceived 即停发（:1038），等对端再发包</text>
  <text x="48" y="194" font-size="8.5" fill="#a05555">防止攻击者伪造受害者 IP，让服务端向受害者猛发数据</text>
  <text x="48" y="212" font-size="8.5" fill="#a05555">地址一旦验证通过（收到握手包/token），限制解除</text>

  <!-- Retry / token -->
  <rect x="510" y="70" width="460" height="150" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="528" y="92" font-size="11.5" font-weight="600" fill="#1b2a4a">Retry + 地址验证 token（server.go）</text>
  <text x="528" y="112" font-size="8.5" fill="#5b7db1">服务端可先回 Retry 包携带 token，要求客户端带回</text>
  <rect x="528" y="122" width="424" height="30" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="740" y="141" font-size="8.5" fill="#1b2a4a" text-anchor="middle">sendRetry(:322) 下发 · validateToken(:663) 校验</text>
  <text x="528" y="172" font-size="8.5" fill="#5b7db1">token 由 tokenGenerator 加密签名，含客户端地址与时间戳</text>
  <text x="528" y="190" font-size="8.5" fill="#5b7db1">ValidateRemoteAddr 校验地址匹配；过期即拒（maxTokenAge / maxRetryTokenAge）</text>
  <text x="528" y="208" font-size="8.5" fill="#5b7db1">带回有效 token = 证明客户端能收到该地址的包 → 真实</text>

  <!-- Transport 入口 demux -->
  <rect x="30" y="236" width="940" height="130" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="48" y="258" font-size="11.5" font-weight="600" fill="#0f5132">Transport 入口分流与限流（transport.go）</text>
  <rect x="48" y="272" width="290" height="76" rx="10" fill="#ffffff" stroke="#bce6cd"/><text x="193" y="294" font-size="9" font-weight="600" fill="#0f5132" text-anchor="middle">按 CID 路由</text><text x="193" y="312" font-size="8" fill="#3f8f66" text-anchor="middle">packetHandlerMap.Get(:767)</text><text x="193" y="330" font-size="8" fill="#3f8f66" text-anchor="middle">已有连接 → 直投；新连接 → 建 Conn</text>
  <rect x="352" y="272" width="290" height="76" rx="10" fill="#ffffff" stroke="#bce6cd"/><text x="497" y="294" font-size="9" font-weight="600" fill="#0f5132" text-anchor="middle">半连接队列限流</text><text x="497" y="312" font-size="8" fill="#3f8f66" text-anchor="middle">baseServer 限制待握手连接数</text><text x="497" y="330" font-size="8" fill="#3f8f66" text-anchor="middle">超限丢弃，防握手洪泛耗尽资源</text>
  <rect x="656" y="272" width="296" height="76" rx="10" fill="#ffffff" stroke="#bce6cd"/><text x="804" y="294" font-size="9" font-weight="600" fill="#0f5132" text-anchor="middle">非 QUIC 包处理</text><text x="804" y="312" font-size="8" fill="#3f8f66" text-anchor="middle">handleNonQUICPacket(:689)</text><text x="804" y="330" font-size="8" fill="#3f8f66" text-anchor="middle">不认识的包交给可选回调或丢弃</text>

  <!-- stateless reset -->
  <rect x="30" y="382" width="940" height="110" rx="14" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="48" y="404" font-size="11.5" font-weight="600" fill="#3c1361">无状态重置 stateless reset（stateless_reset.go）</text>
  <text x="48" y="424" font-size="8.5" fill="#7a52a8">崩溃/重启后本端丢失了连接状态，但对端仍在发包 —— 无法正常回 CONNECTION_CLOSE</text>
  <text x="48" y="442" font-size="8.5" fill="#7a52a8">用 StatelessResetKey 对 CID 算出 reset token（无需连接状态），回一个「看似普通短头包」的重置包</text>
  <text x="48" y="460" font-size="8.5" fill="#7a52a8">对端识别 token（AddResetToken:774 登记过）即知连接已死，快速放弃而非傻等超时</text>
  <text x="48" y="478" font-size="8.5" fill="#7a52a8">未配置 StatelessResetKey 则关闭此功能（Transport 字段注释明确建议配置）</text>

  <path d="M338,310 L352,310" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
</svg>
