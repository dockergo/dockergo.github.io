<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1000" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">quic-go 流与流量控制 · 一连接多流无队头阻塞 + 流级/连接级两级窗口</text>
  <text x="30" y="50" font-size="10" fill="#86868b">背压靠 MAX_DATA / MAX_STREAM_DATA 帧告知对端可发多少；窗口随消费速度自动放大（auto-tuning）</text>

  <!-- 多流 -->
  <rect x="30" y="70" width="440" height="180" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="48" y="92" font-size="11.5" font-weight="600" fill="#0f5132">一连接内多条独立流（streams_map）</text>
  <rect x="48" y="104" width="404" height="30" rx="7" fill="#ffffff" stroke="#bce6cd"/><text x="250" y="123" font-size="8.5" fill="#0f5132" text-anchor="middle">流 A：正常收发</text>
  <rect x="48" y="140" width="404" height="30" rx="7" fill="#fbeaea" stroke="#e7c3c3"/><text x="250" y="159" font-size="8.5" fill="#7a2a2a" text-anchor="middle">流 B：某包丢失 → 只阻塞流 B，不影响 A/C</text>
  <rect x="48" y="176" width="404" height="30" rx="7" fill="#ffffff" stroke="#bce6cd"/><text x="250" y="195" font-size="8.5" fill="#0f5132" text-anchor="middle">流 C：正常收发</text>
  <text x="48" y="228" font-size="8.5" fill="#3f8f66">对比 TCP：单一字节流，任一段丢失阻塞全部 —— QUIC 流级独立是根本改进</text>

  <!-- 流数上限 -->
  <rect x="510" y="70" width="460" height="180" rx="14" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="528" y="92" font-size="11.5" font-weight="600" fill="#3c1361">流的分类与数量上限（streams_map_incoming/outgoing）</text>
  <rect x="528" y="106" width="210" height="56" rx="9" fill="#ffffff" stroke="#d9c9ef"/><text x="633" y="127" font-size="9" font-weight="600" fill="#3c1361" text-anchor="middle">双向流</text><text x="633" y="145" font-size="8" fill="#7a52a8" text-anchor="middle">默认上限 100（DefaultMaxIncomingStreams）</text>
  <rect x="748" y="106" width="204" height="56" rx="9" fill="#ffffff" stroke="#d9c9ef"/><text x="850" y="127" font-size="9" font-weight="600" fill="#3c1361" text-anchor="middle">单向流</text><text x="850" y="145" font-size="8" fill="#7a52a8" text-anchor="middle">默认上限 100（…UniStreams）</text>
  <text x="528" y="182" font-size="8.5" fill="#7a52a8">流 ID 低 2 bit 编码方向与发起方；用 MAX_STREAMS 帧提升上限</text>
  <text x="528" y="202" font-size="8.5" fill="#7a52a8">对端想开超上限的流 → STREAMS_BLOCKED，等收到 MAX_STREAMS 再开</text>
  <text x="528" y="222" font-size="8.5" fill="#7a52a8">OpenStreamSync 会阻塞直到有配额，OpenStream 无配额立即返回错误</text>

  <!-- 两级窗口 -->
  <rect x="30" y="266" width="940" height="216" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="48" y="288" font-size="11.5" font-weight="600" fill="#5a3410">两级流量控制窗口（flow_controller_*.go）</text>

  <rect x="48" y="302" width="440" height="86" rx="10" fill="#ffffff" stroke="#e8cf9a"/><text x="268" y="324" font-size="10" font-weight="600" fill="#5a3410" text-anchor="middle">流级窗口 streamFlowController (:12)</text><text x="268" y="344" font-size="8.5" fill="#93762e" text-anchor="middle">初始 512 KB（DefaultInitialMaxStreamData）</text><text x="268" y="362" font-size="8.5" fill="#93762e" text-anchor="middle">自动上调至上限 6 MB（DefaultMaxReceiveStreamFlowControlWindow）</text><text x="268" y="380" font-size="8.5" fill="#93762e" text-anchor="middle">MAX_STREAM_DATA 帧告知对端本流可发多少</text>

  <rect x="512" y="302" width="440" height="86" rx="10" fill="#ffffff" stroke="#e8cf9a"/><text x="732" y="324" font-size="10" font-weight="600" fill="#5a3410" text-anchor="middle">连接级窗口 connectionFlowController (:14)</text><text x="732" y="344" font-size="8.5" fill="#93762e" text-anchor="middle">初始 = multiplier × 512 KB（DefaultInitialMaxData）</text><text x="732" y="362" font-size="8.5" fill="#93762e" text-anchor="middle">自动上调至上限 15 MB（…ConnectionFlowControlWindow）</text><text x="732" y="380" font-size="8.5" fill="#93762e" text-anchor="middle">MAX_DATA 帧限制全连接总字节 —— 所有流共享</text>

  <text x="48" y="416" font-size="9" font-weight="600" fill="#5a3410">auto-tuning 自动窗口调整（maybeAdjustWindowSize）</text>
  <text x="48" y="436" font-size="8.5" fill="#93762e">若发现窗口更新发得太频繁（消费快、RTT 长），说明窗口偏小 → 成倍放大接收窗口，减少往返等待</text>
  <text x="48" y="456" font-size="8.5" fill="#93762e">发送侧：TryAddBytesSent 检查两级窗口都有余量才发；IsNewlyBlocked → 发 DATA_BLOCKED/STREAM_DATA_BLOCKED 帧</text>
  <text x="48" y="474" font-size="8.5" fill="#93762e">GetWindowUpdate(:117) 计算是否该发新的 MAX_DATA / MAX_STREAM_DATA，避免对端饿死</text>

  <path d="M480,160 L510,140" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
</svg>
