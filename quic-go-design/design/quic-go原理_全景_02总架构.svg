<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="710" viewBox="0 0 1040 710"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1040" height="710" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">quic-go 总架构 · Go 分层：应用/http3 → Transport(拥有 socket) → Conn(run goroutine 事件循环) → wire/crypto → sendQueue → UDP</text>

  <!-- powers 条 -->
  <rect x="30" y="46" width="980" height="42" rx="11" fill="#f6f6f8" stroke="#e2e2e7" data-tid="quic-go原理_全景主线框架" data-lab="全景"/>
  <text x="46" y="63" font-size="10.5" font-weight="600" fill="#1d1d1f">纯 Go 实现</text>
  <text x="112" y="63" font-size="10" fill="#494950">驱动 caddy · syncthing · Cloudflare 等 —— QUIC(RFC 9000) + HTTP/3(RFC 9114) 的 Go 实现</text>
  <text x="46" y="81" font-size="9" fill="#86868b">与 quiche 的分水岭：quic-go <tspan font-weight="600">自带 net.PacketConn 与 goroutine 事件循环（batteries-included）</tspan>，非 sans-IO / 非回调抽象</text>

  <!-- ① 应用 + http3 -->
  <rect x="30" y="100" width="980" height="74" rx="14" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <rect x="30" y="100" width="980" height="34" fill="none" stroke="none" data-tid="quic-go原理_支撑_HTTP3与QPACK" data-lab="HTTP/3·QPACK 层"/>
  <text x="48" y="118" font-size="11.5" font-weight="600" fill="#3c1361">① 应用层 + http3 包（HTTP/3 语义 · QPACK 头压缩 · 请求映射到 QUIC 流）</text>
  <rect x="48" y="140" width="300" height="26" rx="7" fill="#ffffff" stroke="#d9c9ef" data-tid="quic-go原理_接口_HTTP与流" data-lab="http3.Server"/><text x="198" y="157" font-size="8.5" fill="#3c1361" text-anchor="middle">http3.Server.ServeQUICConn (server.go:238)</text>
  <rect x="360" y="140" width="300" height="26" rx="7" fill="#ffffff" stroke="#d9c9ef" data-tid="quic-go原理_接口_HTTP与流" data-lab="http3.Transport"/><text x="510" y="157" font-size="8.5" fill="#3c1361" text-anchor="middle">http3.Transport.RoundTrip (transport.go:289)</text>
  <rect x="672" y="140" width="320" height="26" rx="7" fill="#ffffff" stroke="#d9c9ef" data-tid="quic-go原理_接口_会话与连接" data-lab="应用读写流"/><text x="832" y="157" font-size="8.5" fill="#3c1361" text-anchor="middle">应用：OpenStream / AcceptStream 读写 []byte</text>

  <!-- ② Transport -->
  <rect x="30" y="188" width="980" height="60" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="48" y="206" font-size="11.5" font-weight="600" fill="#1b2a4a">② Transport（transport.go:56）：拥有 UDP socket、跑 listen 读 goroutine、按 Connection ID 分流；服务端 Listener/baseServer 把入口关卡合在这层</text>
  <rect x="48" y="214" width="440" height="28" rx="7" fill="#ffffff" stroke="#bcd0ec" data-tid="quic-go原理_接口_事件循环与IO" data-lab="listen 读循环"/><text x="268" y="232" font-size="8.5" fill="#1b2a4a" text-anchor="middle">listen 读循环(:527) → packetHandlerMap.Get(:767) 按 CID demux</text>
  <rect x="520" y="214" width="470" height="28" rx="7" fill="#fbeaea" stroke="#e7c3c3" data-tid="quic-go原理_支撑_可靠性与抗攻击" data-lab="Retry/token"/><text x="755" y="232" font-size="8.5" fill="#7a2a2a" text-anchor="middle">服务端 baseServer：validateToken(:663) / sendRetry · 3× 放大限制</text>

  <!-- ③ Conn 左 -->
  <rect x="30" y="262" width="486" height="150" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="48" y="286" font-size="12" font-weight="600" fill="#0f5132">③ Conn（connection.go:124）：每连接一个 run goroutine 事件循环</text>
  <rect x="48" y="300" width="210" height="28" rx="7" fill="#ffffff" stroke="#bce6cd" data-tid="quic-go原理_接口_事件循环与IO" data-lab="run 循环"/><text x="153" y="318" font-size="8.5" fill="#0f5132" text-anchor="middle">run select 循环 (:563)</text>
  <rect x="288" y="300" width="210" height="28" rx="7" fill="#ffffff" stroke="#bce6cd" data-tid="quic-go原理_接口_会话与连接" data-lab="streams_map"/><text x="393" y="318" font-size="8.5" fill="#0f5132" text-anchor="middle">streams_map / OpenStream(:2900)</text>
  <rect x="48" y="338" width="210" height="28" rx="7" fill="#ffffff" stroke="#bce6cd" data-tid="quic-go原理_支撑_流与流量控制" data-lab="flow controller"/><text x="153" y="356" font-size="8.5" fill="#0f5132" text-anchor="middle">flow controller 两级窗口</text>
  <rect x="288" y="338" width="210" height="28" rx="7" fill="#ffffff" stroke="#bce6cd" data-tid="quic-go原理_支撑_连接管理与迁移" data-lab="connID/path"/><text x="393" y="356" font-size="8.5" fill="#0f5132" text-anchor="middle">connIDManager / path 迁移</text>
  <text x="48" y="392" font-size="9" fill="#3f8f66">AcceptStream(:2885) 阻塞取流 · handlePackets(:1002) 收包驱动状态机</text>

  <!-- ④ Conn 右 发送/接收 -->
  <rect x="528" y="262" width="482" height="150" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="546" y="286" font-size="12" font-weight="600" fill="#1d1d1f">④ 发送 / 接收路径（组包 · 丢包 · 拥塞 · 发送 goroutine）</text>
  <rect x="546" y="300" width="220" height="28" rx="7" fill="#fff7e6" stroke="#e8cf9a" data-tid="quic-go原理_支撑_包与帧编解码" data-lab="packet_packer"/><text x="656" y="318" font-size="8.5" fill="#5a3410" text-anchor="middle">packet_packer 组包(:333)</text>
  <rect x="778" y="300" width="214" height="28" rx="7" fill="#eef3fb" stroke="#bcd0ec" data-tid="quic-go原理_支撑_丢包检测与恢复" data-lab="sentPacketHandler"/><text x="885" y="318" font-size="8.5" fill="#1b2a4a" text-anchor="middle">sentPacketHandler 丢包(:252)</text>
  <rect x="546" y="338" width="220" height="28" rx="7" fill="#eafaf1" stroke="#bce6cd" data-tid="quic-go原理_支撑_拥塞控制" data-lab="cubicSender"/><text x="656" y="356" font-size="8.5" fill="#0f5132" text-anchor="middle">cubicSender 拥塞(:143)</text>
  <rect x="778" y="338" width="214" height="28" rx="7" fill="#ffffff" stroke="#e2e2e7" data-tid="quic-go原理_接口_事件循环与IO" data-lab="sendQueue"/><text x="885" y="356" font-size="8.5" fill="#1d1d1f" text-anchor="middle">sendQueue.Run goroutine(:77)</text>
  <text x="546" y="392" font-size="9" fill="#494950">triggerSending(:2448) 攒帧成包 → sendQueue 异步写 socket</text>

  <!-- ⑤ wire 左 + crypto 右 -->
  <rect x="30" y="426" width="486" height="120" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="48" y="450" font-size="12" font-weight="600" fill="#5a3410">⑤ wire 线格式（字节 ↔ 帧）</text>
  <rect x="48" y="462" width="210" height="68" rx="9" fill="#ffffff" stroke="#e8cf9a" data-tid="quic-go原理_支撑_包与帧编解码" data-lab="frame_parser"/><text x="153" y="490" font-size="9" font-weight="600" fill="#5a3410" text-anchor="middle">frame_parser 解析</text><text x="153" y="508" font-size="8" fill="#93762e" text-anchor="middle">packet_unpacker 解包</text>
  <rect x="270" y="462" width="228" height="68" rx="9" fill="#ffffff" stroke="#e8cf9a" data-tid="quic-go原理_支撑_包与帧编解码" data-lab="quicvarint"/><text x="384" y="490" font-size="9" font-weight="600" fill="#5a3410" text-anchor="middle">quicvarint 变长整数</text><text x="384" y="508" font-size="8" fill="#93762e" text-anchor="middle">STREAM/ACK/CRYPTO… 20+ 帧</text>

  <rect x="528" y="426" width="482" height="120" rx="14" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="546" y="450" font-size="12" font-weight="600" fill="#274a78">⑥ crypto 握手加密（TLS 1.3 内嵌 · Go 标准库 crypto/tls）</text>
  <rect x="546" y="462" width="220" height="68" rx="9" fill="#ffffff" stroke="#cfe0f2" data-tid="quic-go原理_支撑_TLS握手与加密" data-lab="crypto_setup"/><text x="656" y="490" font-size="9" font-weight="600" fill="#274a78" text-anchor="middle">crypto_setup (:28)</text><text x="656" y="508" font-size="8" fill="#5b7db1" text-anchor="middle">Initial/Handshake/1-RTT 三级</text>
  <rect x="778" y="462" width="214" height="68" rx="9" fill="#ffffff" stroke="#cfe0f2" data-tid="quic-go原理_支撑_TLS握手与加密" data-lab="updatable_aead"/><text x="885" y="490" font-size="9" font-weight="600" fill="#274a78" text-anchor="middle">updatable_aead</text><text x="885" y="508" font-size="8" fill="#5b7db1" text-anchor="middle">AEAD 封解 + 密钥轮换</text>

  <!-- ⑦ IO 底座 -->
  <rect x="30" y="560" width="980" height="44" rx="12" fill="#f5f5f7" stroke="#d2d2d7" filter="url(#soft)" data-tid="quic-go原理_接口_事件循环与IO" data-lab="IO 底座"/>
  <text x="520" y="580" font-size="11" font-weight="600" fill="#1d1d1f" text-anchor="middle">⑦ IO 底座：net.PacketConn（真实 UDP socket，由 Transport 拥有） · time.Timer 定时器</text>
  <text x="520" y="596" font-size="8.5" fill="#6e6e73" text-anchor="middle">quic-go 自管 socket 与 goroutine —— 与 sans-IO 库(Cloudflare quiche) / 回调抽象库(Google QUICHE) 的根本差异</text>

  <!-- 跨层主数据流：双箭头=收发双向；配动词短语 -->
  <!-- ①↔② 应用/http3 ↔ Transport -->
  <path d="M520,174 L520,188" stroke="#9a9aa2" stroke-width="1.6" fill="none" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <text x="530" y="185" font-size="8.5" fill="#86868b">① http3 请求 ↔ QUIC 流；Conn 建于 Transport 之上</text>
  <!-- ②↔③④ Transport ↔ Conn（CID 分流） -->
  <path d="M520,248 L520,262" stroke="#9a9aa2" stroke-width="1.6" fill="none" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <text x="530" y="259" font-size="8.5" fill="#86868b">② 按 Connection ID demux，把包路由到对应 Conn</text>
  <!-- ③↔⑤ Conn ↔ wire（字节↔帧） -->
  <path d="M273,412 L273,426" stroke="#9a9aa2" stroke-width="1.6" fill="none" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <text x="30" y="421" font-size="8.5" fill="#86868b">wire：packet_unpacker 解包 / packet_packer 组包（字节 ↔ 帧）</text>
  <!-- ④↔⑥ 发送接收 ↔ crypto（AEAD） -->
  <path d="M769,412 L769,426" stroke="#9a9aa2" stroke-width="1.6" fill="none" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <text x="560" y="421" font-size="8.5" fill="#86868b">crypto：AEAD 封装 / 解密 + 头保护</text>
  <!-- ⑤↔⑦ / ⑥↔⑦ 与 socket 的收发触点（方向性单箭头） -->
  <path d="M273,560 L273,546" stroke="#9a9aa2" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>
  <text x="30" y="556" font-size="8.5" fill="#86868b">↑ 入站：listen 从 socket 读入 UDP 净荷</text>
  <path d="M769,546 L769,560" stroke="#9a9aa2" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>
  <text x="560" y="556" font-size="8.5" fill="#86868b">↓ 出站：sendQueue 异步写 socket 发出</text>

  <!-- run ↔ streams_map：单 goroutine 调度收发流 -->
  <path d="M258,314 L288,314" stroke="#9a9aa2" stroke-width="1.6" fill="none" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <text x="273" y="309" font-size="7.5" fill="#86868b" text-anchor="middle">调度收发流</text>

  <!-- ACK 反馈闭环（虚线）：sentPacketHandler → cubicSender -->
  <path d="M778,314 L772,314 L772,352 L766,352" stroke="#b8b8bf" stroke-width="1.4" stroke-dasharray="5 4" fill="none" marker-end="url(#ar)"/>
  <text x="700" y="336" font-size="7.5" fill="#93762e" text-anchor="middle">ACK 反馈 → 更新 cwnd</text>

  <!-- 读法 / 数据流总结条 -->
  <rect x="30" y="616" width="980" height="84" rx="12" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="46" y="634" font-size="8.5" fill="#86868b">读法 · 实线双箭头 = 收发双向主数据流；虚线 = 反馈 / 异步信号。全部路径最终汇聚到每连接唯一的 run goroutine。</text>
  <text x="46" y="653" font-size="9" fill="#494950">出站：应用 Write → 流发缓冲 → run triggerSending → 拥塞/流控/放大门禁 → framer 攒帧 → packet_packer 组包 + AEAD 封装 → sentPacketHandler 记账 → sendQueue 异步写 socket</text>
  <text x="46" y="672" font-size="9" fill="#494950">入站：listen 读 UDP → packetHandlerMap 按 CID demux → run handlePackets → 去头保护 + AEAD 解密 → frame_parser 逐帧 → STREAM 帧交 ReceiveStream（frame_sorter 重排）→ 用户 Read</text>
  <text x="46" y="691" font-size="8.5" fill="#6e6e73">机制：连接状态只在 run 单 goroutine 内修改、跨 goroutine 仅经 channel（天然免锁）；丢包判定 包序阈值 3 / 时间阈值 9·8，重传另用新包号；拥塞仅内置 Cubic/Reno。</text>
</svg>
