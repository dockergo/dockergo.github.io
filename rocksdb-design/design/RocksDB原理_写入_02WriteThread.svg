<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">RocksDB WriteThread · leader-follower 组提交</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">并发写攒成一组由 leader 代表提交:N 个写只付一次 WAL fsync 固定开销</text>

  <!-- concurrent writers -->
  <rect x="30" y="70" width="240" height="330" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="92" font-size="11" font-weight="700" fill="#1d1d1f">并发写线程</text>
  <g font-size="8.8" text-anchor="middle">
    <rect x="46" y="104" width="208" height="40" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="150" y="122" font-weight="600" fill="#1b2a4a">Writer 1</text><text x="150" y="137" fill="#5b7db1">JoinBatchGroup → leader</text>
    <rect x="46" y="152" width="208" height="36" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="150" y="174" fill="#274a78">Writer 2 → follower</text>
    <rect x="46" y="196" width="208" height="36" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="150" y="218" fill="#274a78">Writer 3 → follower</text>
    <rect x="46" y="240" width="208" height="36" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="150" y="262" fill="#274a78">Writer 4 → follower</text>
  </g>
  <text x="150" y="298" text-anchor="middle" font-size="8.5" fill="#6e6e73">先到者成 leader(STATE_GROUP_LEADER)</text>
  <text x="150" y="314" text-anchor="middle" font-size="8.5" fill="#6e6e73">后到者挂链上等待(follower)</text>
  <rect x="46" y="326" width="208" height="60" rx="8" fill="#fff" stroke="#ececf1"/><text x="150" y="346" font-size="8" fill="#4b4b50">状态机(write_thread.h):</text><text x="150" y="362" font-size="7.5" fill="#6e6e73">INIT → GROUP_LEADER /</text><text x="150" y="376" font-size="7.5" fill="#6e6e73">MEMTABLE_WRITER / COMPLETED</text>

  <!-- leader work -->
  <rect x="290" y="70" width="470" height="330" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="306" y="92" font-size="11" font-weight="700" fill="#1b2a4a">Leader 代表整组做的事</text>
  <g font-size="8.8">
    <rect x="306" y="104" width="438" height="44" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="320" y="124" font-weight="600" fill="#274a78">① 合并写组:把 follower 的 WriteBatch 串起来</text><text x="320" y="140" fill="#5b7db1">EnterAsBatchGroupLeader 收集到 max_write_batch_group_size_bytes</text>
    <rect x="306" y="156" width="438" height="44" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="320" y="176" font-weight="600" fill="#274a78">② 分配连续 seq:整组一个基准</text><text x="320" y="192" fill="#5b7db1">每条记录 seq = base + offset</text>
    <rect x="306" y="208" width="438" height="44" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="320" y="228" font-weight="600" fill="#5a3410">③ 一次写 WAL:整组序列化成一条记录</text><text x="320" y="244" fill="#93762e">一次 fsync 覆盖全组(WriteOptions.sync)</text>
    <rect x="306" y="260" width="438" height="44" rx="8" fill="#f5faf6" stroke="#cfe6d5"/><text x="320" y="280" font-weight="600" fill="#2c5a3a">④ 写 MemTable:各 batch 插入(可并发)</text><text x="320" y="296" fill="#2f6f4f">followers 可并行插各自的(parallel memtable write)</text>
    <rect x="306" y="312" width="438" height="44" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="320" y="332" font-weight="600" fill="#12402a">⑤ 唤醒 followers,整组返回</text><text x="320" y="348" fill="#2f6f4f">ExitAsBatchGroupLeader</text>
  </g>
  <line x1="270" y1="124" x2="290" y2="124" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- why -->
  <rect x="780" y="70" width="270" height="330" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="796" y="92" font-size="11" font-weight="700" fill="#2c5a3a">为什么这样设计</text>
  <text x="796" y="114" font-size="8.8" fill="#2f6f4f">· fsync 是固定大开销(毫秒级)</text>
  <text x="796" y="132" font-size="8.8" fill="#2f6f4f">· 各写各 fsync → 吞吐被 fsync 卡死</text>
  <text x="796" y="150" font-size="8.8" fill="#2f6f4f">· 攒一组一次 fsync → 摊薄到每写</text>
  <text x="796" y="168" font-size="8.8" fill="#2f6f4f">· 组越大摊得越薄(有上限)</text>
  <rect x="796" y="184" width="238" height="90" rx="9" fill="#fff" stroke="#cfe6d5"/><text x="810" y="204" font-size="9" font-weight="600" fill="#2c5a3a">变体开关</text><text x="810" y="222" font-size="8" fill="#2f6f4f">enable_pipelined_write:</text><text x="810" y="238" font-size="8" fill="#2f6f4f">  WAL 写与 MemTable 写流水线</text><text x="810" y="256" font-size="8" fill="#2f6f4f">unordered_write:进一步放松序</text>
  <rect x="796" y="284" width="238" height="100" rx="9" fill="#fbfbfd" stroke="#ececf1"/><text x="810" y="304" font-size="9" font-weight="600" fill="#b1483a">类比</text><text x="810" y="322" font-size="8" fill="#4b4b50">像公交车:不是每人一辆车</text><text x="810" y="338" font-size="8" fill="#4b4b50">(各自 fsync),而是攒一车人</text><text x="810" y="354" font-size="8" fill="#4b4b50">(写组)司机(leader)一趟拉走</text><text x="810" y="372" font-size="8" fill="#4b4b50">(一次 fsync)</text>

  <!-- takeaway -->
  <rect x="30" y="416" width="1020" height="126" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="438" font-size="11" font-weight="700" fill="#1d1d1f">要点</text>
  <text x="46" y="460" font-size="9" fill="#6e6e73">· 组提交(group commit)是所有高性能 WAL 系统的共性(MySQL/PG 也有);RocksDB 的 WriteThread 是其精巧实现</text>
  <text x="46" y="478" font-size="9" fill="#6e6e73">· leader 承担协调开销,follower 几乎零成本搭车;写组大小受 max_write_batch_group_size_bytes 限,防单组过大拖尾延迟</text>
  <text x="46" y="496" font-size="9" fill="#6e6e73">· 并发 MemTable 写(parallel write):followers 各自并行插自己的 batch,再统一推进 seq 可见性,进一步提吞吐</text>
  <text x="46" y="516" font-size="9" fill="#b1483a">· 归属:WriteThread 是写入路径核心机制;WAL 记录格式在【WAL 与恢复】,MemTable 结构在本主线 MemTable 篇</text>
  <text x="46" y="534" font-size="8.5" fill="#a1a1a6">· 观测:DB 属性 rocksdb.write-thread.* / perf context 可看写组大小、等待时间</text>
</svg>
