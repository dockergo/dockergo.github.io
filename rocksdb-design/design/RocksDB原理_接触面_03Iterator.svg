<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="580" viewBox="0 0 1080 580" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="580" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">RocksDB Iterator · MergingIterator 多路归并出全局有序</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">把内存与多层 SST 各自的有序迭代器塞进最小堆,k 路归并;同键多版本按 seq 降序,只吐可见版本、跳墓碑</text>

  <!-- sources -->
  <rect x="30" y="70" width="360" height="330" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="92" font-size="11" font-weight="700" fill="#1d1d1f">各来源的有序子迭代器</text>
  <g font-size="8.5" text-anchor="middle">
    <rect x="46" y="104" width="328" height="40" rx="8" fill="#f5faf6" stroke="#cfe6d5"/><text x="210" y="122" font-weight="600" fill="#2c5a3a">活跃 MemTable 迭代器</text><text x="210" y="137" fill="#2f6f4f">跳表天然有序</text>
    <rect x="46" y="152" width="328" height="40" rx="8" fill="#f5faf6" stroke="#cfe6d5"/><text x="210" y="170" font-weight="600" fill="#2c5a3a">immutable MemTable 迭代器 × N</text><text x="210" y="185" fill="#2f6f4f">待 flush 的只读跳表</text>
    <rect x="46" y="200" width="328" height="40" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="210" y="218" font-weight="600" fill="#5a3410">L0 SST 迭代器 × M（可重叠）</text><text x="210" y="233" fill="#93762e">每个 L0 文件一个</text>
    <rect x="46" y="248" width="328" height="40" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="210" y="266" font-weight="600" fill="#5a3410">L1..Ln 每层一个迭代器</text><text x="210" y="281" fill="#93762e">层内非重叠 → 一层一个 LevelIterator</text>
    <rect x="46" y="300" width="328" height="88" rx="8" fill="#fff" stroke="#ececf1"/><text x="210" y="320" font-weight="600" fill="#4b4b50">每个子迭代器都产"内部键"序列</text><text x="210" y="340" fill="#6e6e73">内部键 = 用户键 + seq + 类型</text><text x="210" y="358" fill="#6e6e73">同用户键:seq 大的排前(新版本先出)</text><text x="210" y="376" fill="#6e6e73">类型含 Value/Delete/Merge/SingleDelete…</text>
  </g>

  <!-- min-heap -->
  <rect x="410" y="70" width="300" height="330" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="426" y="92" font-size="11" font-weight="700" fill="#1b2a4a">MergingIterator（最小堆）</text>
  <text x="426" y="112" font-size="8.5" fill="#5b7db1">堆顶 = 当前所有子迭代器里最小的内部键</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="490" y="130" width="140" height="30" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="560" y="149" fill="#274a78">堆顶(最小内部键)</text>
    <rect x="440" y="176" width="110" height="28" rx="6" fill="#eef3fb" stroke="#bcd0ec"/><text x="495" y="194" fill="#1b2a4a">子迭代器 a</text>
    <rect x="570" y="176" width="110" height="28" rx="6" fill="#eef3fb" stroke="#bcd0ec"/><text x="625" y="194" fill="#1b2a4a">子迭代器 b</text>
    <rect x="440" y="216" width="110" height="28" rx="6" fill="#eef3fb" stroke="#bcd0ec"/><text x="495" y="234" fill="#1b2a4a">c</text>
    <rect x="570" y="216" width="110" height="28" rx="6" fill="#eef3fb" stroke="#bcd0ec"/><text x="625" y="234" fill="#1b2a4a">d …</text>
  </g>
  <line x1="530" y1="160" x2="500" y2="176" stroke="#c7c7cc" stroke-width="1.2"/>
  <line x1="590" y1="160" x2="620" y2="176" stroke="#c7c7cc" stroke-width="1.2"/>
  <rect x="426" y="262" width="268" height="126" rx="9" fill="#fff" stroke="#bcd0ec"/>
  <text x="440" y="282" font-size="9" font-weight="600" fill="#1b2a4a">Next 一步</text>
  <text x="440" y="300" font-size="8.3" fill="#5b7db1">1. 弹堆顶(全局最小内部键)</text>
  <text x="440" y="316" font-size="8.3" fill="#5b7db1">2. 该子迭代器 advance,重新入堆</text>
  <text x="440" y="332" font-size="8.3" fill="#5b7db1">3. 若同用户键已输出过更新版本 → 跳过</text>
  <text x="440" y="348" font-size="8.3" fill="#5b7db1">4. 若是墓碑/超过快照 seq → 跳过</text>
  <text x="440" y="366" font-size="8.3" fill="#2f6f4f">→ 输出该用户键在快照下的最新可见值</text>
  <text x="440" y="382" font-size="7.8" fill="#a1a1a6">Seek(k):所有子迭代器各自 Seek 后重建堆</text>

  <!-- output + consistency -->
  <rect x="730" y="70" width="320" height="330" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="746" y="92" font-size="11" font-weight="700" fill="#12402a">输出:全局有序 KV 流</text>
  <g font-size="8.8" text-anchor="middle">
    <rect x="746" y="104" width="288" height="26" rx="6" fill="#fff" stroke="#cfe6d5"/><text x="890" y="121" fill="#2c5a3a">key01 → v (最新可见)</text>
    <rect x="746" y="136" width="288" height="26" rx="6" fill="#fff" stroke="#cfe6d5"/><text x="890" y="153" fill="#2c5a3a">key03 → v (key02 是墓碑,跳过)</text>
    <rect x="746" y="168" width="288" height="26" rx="6" fill="#fff" stroke="#cfe6d5"/><text x="890" y="185" fill="#2c5a3a">key05 → merge 归并值</text>
    <rect x="746" y="200" width="288" height="26" rx="6" fill="#fff" stroke="#cfe6d5"/><text x="890" y="217" fill="#2c5a3a">… Seek/Next/Prev 遍历</text>
  </g>
  <rect x="746" y="238" width="288" height="150" rx="9" fill="#faf4fb" stroke="#e2d2ee"/>
  <text x="760" y="258" font-size="9.5" font-weight="700" fill="#5a3d78">一致性:隐式持 SuperVersion</text>
  <text x="760" y="278" font-size="8.5" fill="#7a5a95">迭代器创建时抓一个 SuperVersion</text>
  <text x="760" y="294" font-size="8.5" fill="#7a5a95">(=当时的 mutable+immutable+Version)</text>
  <text x="760" y="310" font-size="8.5" fill="#7a5a95">遍历期间看到一致视图,不受后续</text>
  <text x="760" y="326" font-size="8.5" fill="#7a5a95">写入/Flush/Compaction 影响</text>
  <text x="760" y="346" font-size="8.5" fill="#7a5a95">ReadOptions.snapshot 指定 seq 上界</text>
  <text x="760" y="366" font-size="8" fill="#b1483a">迭代器要及时 delete,否则 pin 住旧文件</text>

  <line x1="694" y1="220" x2="730" y2="180" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- notes -->
  <rect x="30" y="416" width="1020" height="130" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="438" font-size="11" font-weight="700" fill="#1d1d1f">要点</text>
  <text x="46" y="460" font-size="9" fill="#6e6e73">· 为什么要归并:LSM 把同一 key 的多个版本散落在内存与不同层的 SST 里,迭代器必须跨所有来源合并成一个有序视图</text>
  <text x="46" y="478" font-size="9" fill="#6e6e73">· L1+ 每层只需一个 LevelIterator(层内非重叠、有序);只有 L0 因文件可重叠才每文件一个迭代器——这是 L0→L1 特殊处理的读侧体现</text>
  <text x="46" y="496" font-size="9" fill="#6e6e73">· prefix_seek / total_order_seek:前缀布隆可加速 Seek;total_order_seek 关闭前缀假设做全序扫描</text>
  <text x="46" y="514" font-size="9" fill="#b1483a">· 归属:Iterator 是接触面;底层 MergingIterator 与 SuperVersion 属【读取路径】,LevelIterator 依赖【版本】的层结构</text>
  <text x="46" y="532" font-size="8.5" fill="#a1a1a6">· 点查 Get 是"归并的退化":不需全序,找到目标 key 的最新可见版本即停(布隆先短路掉无关 SST)</text>
</svg>
