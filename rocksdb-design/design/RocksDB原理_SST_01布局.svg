<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">RocksDB SST 布局 · BlockBasedTable（.sst 不可变文件）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">从头到尾:data blocks → filter → index → metaindex → footer;读 key 走 footer→index→data block</text>

  <!-- file layout vertical -->
  <rect x="30" y="70" width="440" height="380" rx="13" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="46" y="92" font-size="11" font-weight="700" fill="#5a3410">物理布局（文件偏移 0 → 尾）</text>
  <g font-size="8.5" text-anchor="middle">
    <rect x="46" y="104" width="408" height="30" rx="6" fill="#fdf6ea" stroke="#efdcb4"/><text x="250" y="123" fill="#5a3410">data block 0（有序 KV,~4KB,压缩）</text>
    <rect x="46" y="138" width="408" height="30" rx="6" fill="#fdf6ea" stroke="#efdcb4"/><text x="250" y="157" fill="#5a3410">data block 1</text>
    <rect x="46" y="172" width="408" height="26" rx="6" fill="#fdf6ea" stroke="#efdcb4"/><text x="250" y="189" fill="#5a3410">… data block N（key 递增,块间也有序）</text>
    <rect x="46" y="204" width="408" height="34" rx="6" fill="#f5faf6" stroke="#cfe6d5"/><text x="250" y="224" fill="#2c5a3a">filter block（布隆过滤器 → Get 短路）</text>
    <rect x="46" y="244" width="408" height="34" rx="6" fill="#eef3fb" stroke="#bcd0ec"/><text x="250" y="264" fill="#1b2a4a">index block（每 data block 一条:最大 key→偏移）</text>
    <rect x="46" y="284" width="408" height="30" rx="6" fill="#f3f7fc" stroke="#cfe0f2"/><text x="250" y="303" fill="#274a78">metaindex block（指向 filter/属性等元块）</text>
    <rect x="46" y="320" width="408" height="40" rx="6" fill="#faf4fb" stroke="#e2d2ee"/><text x="250" y="338" font-weight="600" fill="#5a3d78">footer（固定尾部）</text><text x="250" y="353" font-size="8" fill="#7a5a95">→ metaindex 偏移 + index 偏移 + magic + checksum 类型</text>
  </g>
  <text x="46" y="384" font-size="8.3" fill="#93762e">属性块(table properties):行数、大小、seq 范围等</text>
  <text x="46" y="402" font-size="8.3" fill="#93762e">一旦写出即不可变(更新靠新文件 + Compaction 淘汰)</text>
  <rect x="46" y="414" width="408" height="30" rx="6" fill="#fff" stroke="#e8cf9a"/><text x="60" y="433" font-size="8.3" fill="#5a3410">读入口固定在文件末尾 footer(大小固定,先读它)</text>

  <!-- read navigation -->
  <rect x="490" y="70" width="560" height="220" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="506" y="92" font-size="11" font-weight="700" fill="#1b2a4a">读一个 key 的导航路径</text>
  <g font-size="8.8" text-anchor="middle">
    <rect x="506" y="104" width="250" height="40" rx="8" fill="#faf4fb" stroke="#e2d2ee"/><text x="631" y="122" font-weight="600" fill="#5a3d78">① 读 footer(固定尾部)</text><text x="631" y="138" fill="#7a5a95">拿到 index/metaindex 偏移</text>
    <rect x="786" y="104" width="250" height="40" rx="8" fill="#f5faf6" stroke="#cfe6d5"/><text x="911" y="122" font-weight="600" fill="#2c5a3a">② filter 短路</text><text x="911" y="138" fill="#2f6f4f">"一定不在"→跳过整文件</text>
    <rect x="506" y="156" width="250" height="40" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="631" y="174" font-weight="600" fill="#1b2a4a">③ index 二分</text><text x="631" y="190" fill="#5b7db1">按最大 key 定位到目标 data block</text>
    <rect x="786" y="156" width="250" height="40" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="911" y="174" font-weight="600" fill="#5a3410">④ 读该 data block</text><text x="911" y="190" fill="#93762e">解压 + block 内查(见 Block 篇)</text>
  </g>
  <line x1="631" y1="144" x2="631" y2="156" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="756" y1="124" x2="786" y2="124" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="756" y1="176" x2="786" y2="176" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <rect x="506" y="208" width="530" height="70" rx="8" fill="#fff" stroke="#bcd0ec"/>
  <text x="520" y="228" font-size="9" font-weight="600" fill="#1b2a4a">通常一两次磁盘 IO</text>
  <text x="520" y="246" font-size="8.5" fill="#5b7db1">· footer/index/filter 常驻或在 block cache → 多数只需读 1 个 data block</text>
  <text x="520" y="262" font-size="8.5" fill="#5b7db1">· cache_index_and_filter_blocks 控制 index/filter 是否进 cache(否则常驻内存)</text>

  <!-- who writes/reads -->
  <rect x="490" y="306" width="560" height="144" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="506" y="328" font-size="11" font-weight="700" fill="#12402a">谁写、谁读</text>
  <text x="506" y="350" font-size="9" fill="#2f6f4f">· 写:BlockBasedTableBuilder —— Flush(MemTable→L0)与 Compaction(层间归并)都用它产出 SST</text>
  <text x="506" y="368" font-size="9" fill="#2f6f4f">· 读:BlockBasedTableReader —— 读取路径经它导航;TableCache 缓存已打开的 reader</text>
  <text x="506" y="386" font-size="9" fill="#2f6f4f">· 块粒度:压缩、缓存、校验、IO 都以 block 为单位</text>
  <text x="506" y="408" font-size="8.5" fill="#93762e">· format_version 决定支持哪些新特性;checksum(CRC32C/xxHash)检测磁盘损坏</text>
  <text x="506" y="428" font-size="8.5" fill="#b1483a">· 归属:SST 由 Flush/Compaction 产出;读它在读取路径;缓存 block 在【缓存】;文件的 key 范围/层归属在【版本】</text>

  <!-- takeaway -->
  <rect x="30" y="462" width="440" height="76" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="484" font-size="10.5" font-weight="700" fill="#1d1d1f">要点</text>
  <text x="46" y="504" font-size="8.5" fill="#6e6e73">SST = LSM 落盘的最终形态,不可变。块结构让"有序大文件"</text>
  <text x="46" y="520" font-size="8.5" fill="#6e6e73">能被高效随机点查(index+filter)与顺序扫描(块内有序)。</text>

  <rect x="490" y="462" width="560" height="76" rx="12" fill="#faf4fb" stroke="#e2d2ee"/>
  <text x="506" y="484" font-size="10.5" font-weight="700" fill="#5a3d78">与 B-tree 页对比</text>
  <text x="506" y="504" font-size="8.5" fill="#7a5a95">· B-tree:原地更新的页(可改);SST:一次写定的不可变块</text>
  <text x="506" y="520" font-size="8.5" fill="#7a5a95">· LSM 用"不可变 + 多层 + 后台合并"换顺序写吞吐</text>
</svg>
