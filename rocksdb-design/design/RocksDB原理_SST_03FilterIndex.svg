<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">RocksDB Filter / Index 类型 · full/partitioned + 压缩</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">filter 让 Get 短路、index 定位 data block;超大文件用 partitioned 变体避免元块过大常驻</text>

  <!-- filter types -->
  <rect x="30" y="70" width="500" height="180" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="92" font-size="11" font-weight="700" fill="#12402a">Filter block 类型</text>
  <rect x="46" y="104" width="470" height="42" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="60" y="123" font-size="9" font-weight="600" fill="#12402a">full filter(默认)</text><text x="60" y="139" font-size="8.3" fill="#2f6f4f">整个 SST 一个布隆块;简单,小/中文件够用</text>
  <rect x="46" y="152" width="470" height="42" rx="8" fill="#f5faf6" stroke="#cfe6d5"/><text x="60" y="171" font-size="9" font-weight="600" fill="#2c5a3a">partitioned filter</text><text x="60" y="187" font-size="8.3" fill="#2f6f4f">过滤器分块 + 顶层索引;按需入 cache,超大文件省内存</text>
  <rect x="46" y="200" width="470" height="42" rx="8" fill="#fff" stroke="#cfe6d5"/><text x="60" y="219" font-size="9" font-weight="600" fill="#2c5a3a">算法:bloom / ribbon</text><text x="60" y="235" font-size="8.3" fill="#93762e">ribbon 更省空间(同假阳性下更小),略慢构建</text>

  <!-- index types -->
  <rect x="550" y="70" width="500" height="180" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="566" y="92" font-size="11" font-weight="700" fill="#1b2a4a">Index block 类型</text>
  <rect x="566" y="104" width="470" height="42" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="580" y="123" font-size="9" font-weight="600" fill="#1b2a4a">binary_search(默认)</text><text x="580" y="139" font-size="8.3" fill="#5b7db1">每 data block 一条(最大 key→偏移),二分定位</text>
  <rect x="566" y="152" width="470" height="42" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="580" y="171" font-size="9" font-weight="600" fill="#274a78">hash_search</text><text x="580" y="187" font-size="8.3" fill="#5b7db1">按 key 前缀哈希,点查前缀场景更快</text>
  <rect x="566" y="200" width="470" height="42" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="580" y="219" font-size="9" font-weight="600" fill="#274a78">two_level_index(partitioned)</text><text x="580" y="235" font-size="8.3" fill="#5b7db1">索引分块 + 顶层索引;超大文件避免索引常驻过大</text>

  <!-- compression -->
  <rect x="30" y="266" width="1020" height="130" rx="13" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="46" y="288" font-size="11" font-weight="700" fill="#5a3410">压缩(每 data block 独立)</text>
  <g font-size="8.8" text-anchor="middle">
    <rect x="46" y="300" width="200" height="40" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="146" y="318" font-weight="600" fill="#5a3410">Snappy / LZ4</text><text x="146" y="333" fill="#93762e">快,压缩率中(热层用)</text>
    <rect x="266" y="300" width="200" height="40" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="366" y="318" font-weight="600" fill="#5a3410">ZSTD</text><text x="366" y="333" fill="#93762e">压缩率高,略慢(冷层用)</text>
    <rect x="486" y="300" width="240" height="40" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="606" y="318" font-weight="600" fill="#5a3410">compression_per_level</text><text x="606" y="333" fill="#93762e">分层设:上层快压、底层重压省空间</text>
    <rect x="746" y="300" width="288" height="40" rx="8" fill="#fff" stroke="#e8cf9a"/><text x="890" y="318" font-weight="600" fill="#5a3410">block cache 缓存解压后的块</text><text x="890" y="333" fill="#93762e">读命中免磁盘 IO + 免解压</text>
  </g>
  <text x="46" y="366" font-size="8.5" fill="#93762e">· 底层数据最多、最冷、访问最少 → 用高压缩率(ZSTD)最划算;上层热数据用快压缩降 CPU</text>
  <text x="46" y="384" font-size="8.5" fill="#93762e">· 压缩是 block 粒度:读一个 block 解压一个,不必解压整个文件</text>

  <!-- notes -->
  <rect x="30" y="412" width="1020" height="90" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="434" font-size="11" font-weight="700" fill="#1d1d1f">要点</text>
  <text x="46" y="456" font-size="9" fill="#6e6e73">· partitioned filter/index 的价值:超大 SST 的 filter/index 本身可能几十 MB,全常驻内存浪费 → 分块按需入 cache</text>
  <text x="46" y="474" font-size="9" fill="#6e6e73">· cache_index_and_filter_blocks:控制 index/filter 进 block cache(可被淘汰)还是常驻(pin_l0_filter_and_index)</text>
  <text x="46" y="492" font-size="8.5" fill="#b1483a">· 归属:filter/index 是 SST 的元块;读时消费在【读取路径】的布隆短路与定位;缓存它们在【缓存】</text>
</svg>
