<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="1080" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">RocksDB 依赖矩阵 · 接触面操作 × 支撑能力域</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">三角一致性的仲裁表:每个 KV 操作实际触达哪些能力域。● 直接依赖   ○ 间接/条件依赖</text>

  <!-- matrix grid -->
  <!-- column headers -->
  <g font-size="8.5" text-anchor="middle" font-weight="600">
    <text x="240" y="92" fill="#12402a">写入</text>
    <text x="320" y="92" fill="#2c5a3a">Flush</text>
    <text x="400" y="92" fill="#1b2a4a">读取</text>
    <text x="480" y="92" fill="#5b7db1">SST</text>
    <text x="560" y="92" fill="#2f6f4f">缓存</text>
    <text x="640" y="92" fill="#7a2016">Compact</text>
    <text x="720" y="92" fill="#5a3d78">版本</text>
    <text x="800" y="92" fill="#3d2a5a">事务</text>
    <text x="880" y="92" fill="#5a3410">WAL</text>
    <text x="960" y="92" fill="#274a78">CF</text>
    <text x="1030" y="92" fill="#a1a1a6" font-weight="400" font-size="7.5">执行时机</text>
  </g>
  <line x1="30" y1="100" x2="1050" y2="100" stroke="#d2d2d7" stroke-width="1"/>

  <!-- helper: rows every 58px starting y=100 -->
  <!-- Put -->
  <g>
    <rect x="30" y="100" width="170" height="58" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
    <text x="44" y="126" font-size="10" font-weight="700" fill="#12402a">Put 写入</text><text x="44" y="145" font-size="7.5" fill="#2f6f4f">写一个键值</text>
    <text x="240" y="134" font-size="12" text-anchor="middle" fill="#12402a">●</text>
    <text x="320" y="134" font-size="12" text-anchor="middle" fill="#8ab89a">○</text>
    <text x="880" y="134" font-size="12" text-anchor="middle" fill="#5a3410">●</text>
    <text x="720" y="134" font-size="12" text-anchor="middle" fill="#b6a0cf">○</text>
    <text x="960" y="134" font-size="12" text-anchor="middle" fill="#274a78">●</text>
    <text x="1030" y="134" font-size="7" text-anchor="middle" fill="#a1a1a6">前台</text>
  </g>
  <!-- Get -->
  <g>
    <rect x="30" y="162" width="170" height="58" rx="8" fill="#eef3fb" stroke="#bcd0ec"/>
    <text x="44" y="188" font-size="10" font-weight="700" fill="#1b2a4a">Get 点查</text><text x="44" y="207" font-size="7.5" fill="#5b7db1">读一个键</text>
    <text x="400" y="196" font-size="12" text-anchor="middle" fill="#1b2a4a">●</text>
    <text x="480" y="196" font-size="12" text-anchor="middle" fill="#5b7db1">●</text>
    <text x="560" y="196" font-size="12" text-anchor="middle" fill="#2f6f4f">●</text>
    <text x="720" y="196" font-size="12" text-anchor="middle" fill="#5a3d78">●</text>
    <text x="800" y="196" font-size="12" text-anchor="middle" fill="#b6a0cf">○</text>
    <text x="960" y="196" font-size="12" text-anchor="middle" fill="#274a78">●</text>
    <text x="1030" y="196" font-size="7" text-anchor="middle" fill="#a1a1a6">前台</text>
  </g>
  <!-- Delete -->
  <g>
    <rect x="30" y="224" width="170" height="58" rx="8" fill="#fdf4f3" stroke="#ecc6c1"/>
    <text x="44" y="250" font-size="10" font-weight="700" fill="#7a2016">Delete 删除</text><text x="44" y="269" font-size="7.5" fill="#a5453a">写墓碑,惰性回收</text>
    <text x="240" y="258" font-size="12" text-anchor="middle" fill="#12402a">●</text>
    <text x="640" y="258" font-size="12" text-anchor="middle" fill="#7a2016">●</text>
    <text x="880" y="258" font-size="12" text-anchor="middle" fill="#5a3410">●</text>
    <text x="960" y="258" font-size="12" text-anchor="middle" fill="#274a78">●</text>
    <text x="1030" y="258" font-size="7" text-anchor="middle" fill="#a1a1a6">前台+后台</text>
  </g>
  <!-- Merge -->
  <g>
    <rect x="30" y="286" width="170" height="58" rx="8" fill="#faf4fb" stroke="#e2d2ee"/>
    <text x="44" y="312" font-size="10" font-weight="700" fill="#5a3d78">Merge</text><text x="44" y="331" font-size="7.5" fill="#7a5a95">读改写攒操作数</text>
    <text x="240" y="320" font-size="12" text-anchor="middle" fill="#12402a">●</text>
    <text x="400" y="320" font-size="12" text-anchor="middle" fill="#1b2a4a">●</text>
    <text x="640" y="320" font-size="12" text-anchor="middle" fill="#d1a89a">○</text>
    <text x="960" y="320" font-size="12" text-anchor="middle" fill="#274a78">●</text>
    <text x="1030" y="320" font-size="7" text-anchor="middle" fill="#a1a1a6">前台+读期合并</text>
  </g>
  <!-- Iterator -->
  <g>
    <rect x="30" y="348" width="170" height="58" rx="8" fill="#eef3fb" stroke="#bcd0ec"/>
    <text x="44" y="374" font-size="10" font-weight="700" fill="#1b2a4a">Iterator 扫描</text><text x="44" y="393" font-size="7.5" fill="#5b7db1">有序范围遍历</text>
    <text x="400" y="382" font-size="12" text-anchor="middle" fill="#1b2a4a">●</text>
    <text x="480" y="382" font-size="12" text-anchor="middle" fill="#5b7db1">●</text>
    <text x="560" y="382" font-size="12" text-anchor="middle" fill="#2f6f4f">●</text>
    <text x="720" y="382" font-size="12" text-anchor="middle" fill="#5a3d78">●</text>
    <text x="800" y="382" font-size="12" text-anchor="middle" fill="#b6a0cf">○</text>
    <text x="960" y="382" font-size="12" text-anchor="middle" fill="#274a78">●</text>
    <text x="1030" y="382" font-size="7" text-anchor="middle" fill="#a1a1a6">前台</text>
  </g>
  <!-- WriteBatch -->
  <g>
    <rect x="30" y="410" width="170" height="58" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
    <text x="44" y="436" font-size="10" font-weight="700" fill="#12402a">WriteBatch</text><text x="44" y="455" font-size="7.5" fill="#2f6f4f">一批写,原子提交</text>
    <text x="240" y="444" font-size="12" text-anchor="middle" fill="#12402a">●</text>
    <text x="800" y="444" font-size="12" text-anchor="middle" fill="#3d2a5a">●</text>
    <text x="880" y="444" font-size="12" text-anchor="middle" fill="#5a3410">●</text>
    <text x="960" y="444" font-size="12" text-anchor="middle" fill="#274a78">●</text>
    <text x="1030" y="444" font-size="7" text-anchor="middle" fill="#a1a1a6">前台</text>
  </g>
  <!-- Snapshot -->
  <g>
    <rect x="30" y="472" width="170" height="58" rx="8" fill="#faf4fb" stroke="#e2d2ee"/>
    <text x="44" y="498" font-size="10" font-weight="700" fill="#5a3d78">Snapshot</text><text x="44" y="517" font-size="7.5" fill="#7a5a95">钉 seq 做一致读</text>
    <text x="400" y="506" font-size="12" text-anchor="middle" fill="#1b2a4a">●</text>
    <text x="640" y="506" font-size="12" text-anchor="middle" fill="#d1a89a">○</text>
    <text x="720" y="506" font-size="12" text-anchor="middle" fill="#5a3d78">●</text>
    <text x="800" y="506" font-size="12" text-anchor="middle" fill="#3d2a5a">●</text>
    <text x="1030" y="506" font-size="7" text-anchor="middle" fill="#a1a1a6">前台+约束后台</text>
  </g>

  <!-- vertical separators (light) -->
  <g stroke="#ececf1" stroke-width="1">
    <line x1="280" y1="100" x2="280" y2="530"/>
    <line x1="360" y1="100" x2="360" y2="530"/>
    <line x1="440" y1="100" x2="440" y2="530"/>
    <line x1="520" y1="100" x2="520" y2="530"/>
    <line x1="600" y1="100" x2="600" y2="530"/>
    <line x1="680" y1="100" x2="680" y2="530"/>
    <line x1="760" y1="100" x2="760" y2="530"/>
    <line x1="840" y1="100" x2="840" y2="530"/>
    <line x1="920" y1="100" x2="920" y2="530"/>
    <line x1="1000" y1="100" x2="1000" y2="530"/>
  </g>

  <text x="30" y="550" font-size="8.5" fill="#b1483a">· 读用它:全部 SST 读经【缓存】命中判断、按【版本】SuperVersion 定位、按【事务】快照 seq 取版本;写用它:全部先过【WAL】再入【写入路径】,由【Flush】/【Compaction】后台整理 —— 每格都能在对应主线正文对上</text>
</svg>
