<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">RocksDB Snapshot · 钉住一个 SequenceNumber 做一致读</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">GetSnapshot() 钉住当前 seq;之后带该快照的读只见 ≤ 该 seq 的版本;并保护旧版本不被 Compaction 回收</text>

  <!-- timeline -->
  <rect x="30" y="70" width="1020" height="170" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="92" font-size="11" font-weight="700" fill="#1b2a4a">时间线:快照钉住一个时间点</text>
  <line x1="60" y1="150" x2="1020" y2="150" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <g font-size="8" text-anchor="middle">
    <circle cx="150" cy="150" r="5" fill="#5b7db1"/><text x="150" y="130" fill="#5b7db1">Put k=v1</text><text x="150" y="172" fill="#a1a1a6">seq=5</text>
    <circle cx="320" cy="150" r="5" fill="#5b7db1"/><text x="320" y="130" fill="#5b7db1">Put k=v2</text><text x="320" y="172" fill="#a1a1a6">seq=8</text>
    <circle cx="500" cy="150" r="7" fill="#0a84ff"/><text x="500" y="126" font-weight="700" fill="#0a84ff">GetSnapshot()</text><text x="500" y="172" fill="#0a84ff">钉住 seq=8</text>
    <circle cx="680" cy="150" r="5" fill="#5b7db1"/><text x="680" y="130" fill="#5b7db1">Put k=v3</text><text x="680" y="172" fill="#a1a1a6">seq=12</text>
    <circle cx="860" cy="150" r="5" fill="#5b7db1"/><text x="860" y="130" fill="#5b7db1">Delete k</text><text x="860" y="172" fill="#a1a1a6">seq=15</text>
  </g>
  <rect x="46" y="196" width="988" height="36" rx="8" fill="#fff" stroke="#bcd0ec"/><text x="60" y="218" font-size="8.8" fill="#1b2a4a">带该快照(seq=8)读 k:看不到 seq=12/15(它们在快照之后)→ 永远读到 <tspan font-weight="700">v2</tspan>,无论之后怎么改</text>

  <!-- two roles -->
  <rect x="30" y="256" width="500" height="160" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="278" font-size="11" font-weight="700" fill="#12402a">作用一:一致读</text>
  <text x="46" y="300" font-size="8.8" fill="#2f6f4f">· ReadOptions::snapshot = 该快照</text>
  <text x="46" y="318" font-size="8.8" fill="#2f6f4f">· 读只取 seq ≤ 快照 seq 的最新版本</text>
  <text x="46" y="336" font-size="8.8" fill="#2f6f4f">· 多次读同快照 → 稳定视图(可重复读)</text>
  <text x="46" y="354" font-size="8.8" fill="#2f6f4f">· 迭代器也可绑快照,遍历期间一致</text>
  <text x="46" y="376" font-size="8.5" fill="#2c5a3a">代价极小:只是记住一个 seq 数字</text>
  <text x="46" y="396" font-size="8.5" fill="#a1a1a6">db/snapshot_impl.h</text>

  <rect x="550" y="256" width="500" height="160" rx="13" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="566" y="278" font-size="11" font-weight="700" fill="#5a3410">作用二:保护旧版本不被回收</text>
  <text x="566" y="300" font-size="8.8" fill="#93762e">· Compaction 丢旧值/墓碑时,要检查</text>
  <text x="566" y="318" font-size="8.8" fill="#93762e">  "是否还有存活快照需要它"</text>
  <text x="566" y="336" font-size="8.8" fill="#93762e">· 最老快照之后的版本都得留(不能删)</text>
  <text x="566" y="354" font-size="8.8" fill="#b1483a">· 快照久留不放 → 旧版本堆积 → 空间涨</text>
  <text x="566" y="374" font-size="8.5" fill="#b1483a">· 用完必须 ReleaseSnapshot!</text>
  <text x="566" y="396" font-size="8.5" fill="#a1a1a6">长事务/长快照是空间放大的常见元凶</text>

  <!-- notes -->
  <rect x="30" y="432" width="1020" height="72" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="454" font-size="11" font-weight="700" fill="#1d1d1f">要点</text>
  <text x="46" y="476" font-size="9" fill="#6e6e73">· Snapshot 是"廉价的一致视图":钉一个 seq 数字,零数据拷贝;但它是 Compaction 回收旧版本的下界——最老快照卡住哪个 seq,该 seq 后的旧版本都删不掉</text>
  <text x="46" y="494" font-size="8.5" fill="#b1483a">· 归属:快照钉的 seq 来自【版本】VersionSet;一致读应用在【读取路径】;它对 Compaction 回收的约束见【Compaction】</text>
</svg>
