<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">RocksDB Merge · 追加操作数,读/Compaction 时归并</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">写时只追加一个 operand(不读旧值),合并推迟到读取或 Compaction 时由 MergeOperator 执行</text>

  <!-- write side -->
  <rect x="30" y="70" width="500" height="200" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="92" font-size="11.5" font-weight="700" fill="#1b2a4a">写侧:Merge 只追加(和 Put 一样快)</text>
  <text x="46" y="114" font-size="9" fill="#5b7db1">场景:计数器 counter += 1</text>
  <g font-size="8.8" text-anchor="middle">
    <rect x="46" y="124" width="150" height="34" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="121" y="145" fill="#274a78">Merge("cnt", "+1")</text>
    <rect x="206" y="124" width="150" height="34" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="281" y="145" fill="#274a78">Merge("cnt", "+1")</text>
    <rect x="366" y="124" width="150" height="34" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="441" y="145" fill="#274a78">Merge("cnt", "+5")</text>
  </g>
  <text x="280" y="180" text-anchor="middle" font-size="8.5" fill="#5b7db1">三次写 = 追加三个 operand,均 O(1) 纯追加、无读放大</text>
  <rect x="46" y="192" width="470" height="66" rx="9" fill="#fff" stroke="#bcd0ec"/>
  <text x="60" y="212" font-size="9" font-weight="600" fill="#1b2a4a">MemTable/SST 里的样子(同一 key 多条 Merge 记录,按 seq)</text>
  <text x="60" y="230" font-size="8.5" fill="#5b7db1">cnt:seq3 = MergeOp("+5")　cnt:seq2 = MergeOp("+1")　cnt:seq1 = MergeOp("+1")</text>
  <text x="60" y="248" font-size="8.5" fill="#93762e">(下面可能还有一个 Put("cnt","10") 作为 base,若曾 Put 过)</text>

  <!-- read/compaction side -->
  <rect x="550" y="70" width="500" height="200" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="566" y="92" font-size="11.5" font-weight="700" fill="#12402a">读/Compaction 侧:归并成最终值</text>
  <g font-size="8.8" text-anchor="middle">
    <rect x="566" y="108" width="220" height="50" rx="8" fill="#f5faf6" stroke="#cfe6d5"/><text x="676" y="127" font-weight="600" fill="#2c5a3a">读 Get("cnt")</text><text x="676" y="145" fill="#2f6f4f">收集该 key 所有 operand + base</text>
    <rect x="810" y="108" width="224" height="50" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="922" y="127" font-weight="600" fill="#5a3410">Compaction 时</text><text x="922" y="145" fill="#93762e">也归并,减少堆积的 operand</text>
  </g>
  <rect x="566" y="168" width="468" height="44" rx="9" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="580" y="188" font-size="9" font-weight="600" fill="#12402a">MergeOperator(用户注册)</text>
  <text x="580" y="204" font-size="8.5" fill="#2f6f4f">FullMergeV2:base + [operands] → 最终值　PartialMerge:合并相邻 operand</text>
  <rect x="566" y="220" width="468" height="40" rx="9" fill="#fff" stroke="#cfe6d5"/>
  <text x="580" y="240" font-size="9" fill="#2c5a3a">例:10(base) + 1 + 1 + 5 = <tspan font-weight="700" fill="#12402a">17</tspan></text>
  <text x="580" y="254" font-size="8" fill="#93762e">未注册 MergeOperator → 读到 Merge 记录报错</text>

  <line x1="530" y1="170" x2="550" y2="150" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="540" y="145" font-size="7.5" fill="#a1a1a6">归并</text>

  <!-- vs read-modify-write -->
  <rect x="30" y="286" width="1020" height="130" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="308" font-size="11" font-weight="700" fill="#1d1d1f">对比:Merge vs 读-改-写(Get→改→Put)</text>
  <g font-size="8.8">
    <rect x="46" y="320" width="490" height="84" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="60" y="340" font-weight="600" fill="#12402a">Merge(推荐做计数/追加)</text><text x="60" y="358" fill="#2f6f4f">· 写:O(1) 纯追加,不读旧值,无读放大</text><text x="60" y="374" fill="#2f6f4f">· 并发安全:多线程各自 Merge 不丢更新</text><text x="60" y="390" fill="#2f6f4f">· 代价:读时要归并一串 operand</text>
    <rect x="546" y="320" width="488" height="84" rx="9" fill="#ffecec" stroke="#e0a0a0"/><text x="560" y="340" font-weight="600" fill="#b1483a">读-改-写(反模式)</text><text x="560" y="358" fill="#b1483a">· 写:先 Get 再 Put,一次读放大 + 一次写</text><text x="560" y="374" fill="#b1483a">· 并发不安全:两线程同时 Get 会丢更新(需外部锁)</text><text x="560" y="390" fill="#b1483a">· 读快但写慢、易错</text>
  </g>

  <!-- takeaway -->
  <rect x="30" y="432" width="1020" height="100" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="454" font-size="11" font-weight="700" fill="#2c5a3a">要点</text>
  <text x="46" y="476" font-size="9" fill="#2f6f4f">· 本质:又一个"把读的活儿推给读、让写极致快"的 LSM 式取舍——和 Delete 写墓碑、Put 写新版本同源</text>
  <text x="46" y="494" font-size="9" fill="#2f6f4f">· operand 堆太多会拖慢读:Compaction 会周期性归并压缩它们;PartialMerge 可在中途合并</text>
  <text x="46" y="512" font-size="9" fill="#b1483a">· 归属:Merge 是接触面语义;归并的触发时机在【读取路径】与【Compaction】,MergeOperator 由用户在 CF Options 注册</text>
</svg>
