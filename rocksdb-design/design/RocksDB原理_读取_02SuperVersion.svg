<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">RocksDB SuperVersion · 一致读的快照三元组</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">读开始时原子引用当前 SuperVersion;期间的写/Flush/Compaction 换新版本不影响本次读——无锁一致</text>

  <!-- the triple -->
  <rect x="30" y="70" width="640" height="230" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="92" font-size="11.5" font-weight="700" fill="#12402a">SuperVersion = {三部分}（某 CF 的完整可读状态）</text>
  <g font-size="8.8" text-anchor="middle">
    <rect x="46" y="106" width="600" height="52" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="346" y="126" font-weight="600" fill="#12402a">① 活跃 MemTable(mutable)</text><text x="346" y="144" fill="#2f6f4f">当前可写、最新数据所在</text>
    <rect x="46" y="166" width="600" height="52" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="346" y="186" font-weight="600" fill="#1b2a4a">② immutable MemTable 列表</text><text x="346" y="204" fill="#5b7db1">已冻结、待 flush 的只读 MemTable(0~N-1 个)</text>
    <rect x="46" y="226" width="600" height="60" rx="9" fill="#fdf6ea" stroke="#efdcb4"/><text x="346" y="246" font-weight="600" fill="#5a3410">③ Version(活跃 SST 集合)</text><text x="346" y="264" fill="#93762e">当前每层有哪些 SST 文件(FileMetaData 列表)</text><text x="346" y="280" fill="#93762e">= 磁盘上 LSM 的当前形态(见【版本】主线)</text>
  </g>

  <!-- lifecycle -->
  <rect x="690" y="70" width="360" height="230" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="706" y="92" font-size="11" font-weight="700" fill="#1b2a4a">读的引用生命周期</text>
  <g font-size="8.5">
    <rect x="706" y="104" width="328" height="40" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="720" y="122" font-weight="600" fill="#274a78">读开始:Ref 当前 SuperVersion</text><text x="720" y="137" fill="#5b7db1">原子引用,拿到一致快照</text>
    <rect x="706" y="152" width="328" height="40" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="720" y="170" font-weight="600" fill="#274a78">读进行中:基于该快照查</text><text x="720" y="185" fill="#5b7db1">看到引用时刻的 MemTable+SST</text>
    <rect x="706" y="200" width="328" height="40" rx="8" fill="#fff7e6" stroke="#e8cf9a"/><text x="720" y="218" font-weight="600" fill="#5a3410">期间写/Flush/Compaction</text><text x="720" y="233" fill="#93762e">换出新 SuperVersion,本次读不受影响</text>
    <rect x="706" y="248" width="328" height="40" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="720" y="266" font-weight="600" fill="#12402a">读结束:Unref</text><text x="720" y="281" fill="#2f6f4f">引用归零 → 回收旧 MemTable/SST</text>
  </g>

  <!-- why -->
  <rect x="30" y="316" width="1020" height="100" rx="13" fill="#faf4fb" stroke="#e2d2ee"/>
  <text x="46" y="338" font-size="11" font-weight="700" fill="#5a3d78">为什么用 SuperVersion(而非加锁)</text>
  <text x="46" y="360" font-size="9" fill="#7a5a95">· 读无锁:只需原子 Ref 一个指针,不锁 MemTable/SST → 读不阻塞写、写不阻塞读,高并发</text>
  <text x="46" y="378" font-size="9" fill="#7a5a95">· 读一致:整个 Get/迭代基于同一快照,不会读到"查一半时 Compaction 删了某文件"的中间态</text>
  <text x="46" y="396" font-size="9" fill="#7a5a95">· 安全回收:旧 SuperVersion 引用的 MemTable/SST,要等所有读完(引用归零)才真正释放 → 读期间文件不会被删</text>

  <!-- notes -->
  <rect x="30" y="432" width="1020" height="90" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="454" font-size="11" font-weight="700" fill="#1d1d1f">要点</text>
  <text x="46" y="476" font-size="9" fill="#6e6e73">· 每个 Column Family 各有自己的 SuperVersion;写/flush/compaction 完成时用 InstallSuperVersion 原子换新的</text>
  <text x="46" y="494" font-size="9" fill="#6e6e73">· 迭代器隐式持 SuperVersion 引用 → 长时间不关的迭代器会 pin 住旧文件不让删(内存/磁盘涨),用完务必 delete</text>
  <text x="46" y="512" font-size="9" fill="#b1483a">· 归属:SuperVersion 是读取路径核心;其中 Version 的层结构与换版本在【版本】主线,MemTable 在【写入路径】</text>
</svg>
