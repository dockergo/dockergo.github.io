<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">GORM Migrator 自动迁移 · struct 声明收敛到数据库结构</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">据 schema 建表/补列/加索引/加约束,把 struct 声明自动收敛到数据库结构;依赖 schema 反射与 Dialector</text>
  <rect x="30" y="70" width="500" height="190" rx="13" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="46" y="92" font-size="11" font-weight="700" fill="#12402a">AutoMigrate(migrator/migrator.go:122)</text>
  <text x="46" y="112" font-size="8.8" fill="#2f6f4f">对每个 model,收敛到目标结构:</text>
  <rect x="46" y="122" width="468" height="24" rx="5" fill="#e6f7ee" stroke="#bfe0cd"/><text x="60" y="138" font-size="8.4" fill="#12402a">表不存在 → CreateTable(:216)</text>
  <rect x="46" y="152" width="468" height="24" rx="5" fill="#e6f7ee" stroke="#bfe0cd"/><text x="60" y="168" font-size="8.4" fill="#12402a">列缺失 → AddColumn(:374)</text>
  <rect x="46" y="182" width="468" height="24" rx="5" fill="#e6f7ee" stroke="#bfe0cd"/><text x="60" y="198" font-size="8.4" fill="#12402a">列类型变 → MigrateColumn(:470)</text>
  <rect x="46" y="212" width="468" height="24" rx="5" fill="#e6f7ee" stroke="#bfe0cd"/><text x="60" y="228" font-size="8.4" fill="#12402a">索引/约束缺失 → 补加</text>
  <text x="46" y="252" font-size="8" fill="#a1a1a6">HasTable(:334)/HasColumn 判存在性</text>
  <rect x="550" y="70" width="500" height="190" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="566" y="92" font-size="11" font-weight="700" fill="#1b2a4a">Migrator 接口(migrator.go:68)</text>
  <text x="566" y="112" font-size="8.6" fill="#274a78">· CreateTable/DropTable/HasTable</text>
  <text x="566" y="130" font-size="8.6" fill="#274a78">· AddColumn/DropColumn/MigrateColumn</text>
  <text x="566" y="148" font-size="8.6" fill="#274a78">· CreateIndex/CreateConstraint</text>
  <rect x="566" y="160" width="468" height="44" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="580" y="179" font-size="8.5" font-weight="600" fill="#274a78">FullDataTypeOf(:91):字段→列类型 DDL</text><text x="580" y="195" font-size="8" fill="#5b7db1">经 Dialector 翻方言(varchar/int/text…)</text>
  <text x="566" y="226" font-size="8.4" fill="#5b7db1">接口方法各库(mysql/pg/sqlite)有实现</text>
  <text x="566" y="246" font-size="8.4" fill="#5b7db1">DDL 差异下沉到 Dialector</text>
  <line x1="530" y1="150" x2="550" y2="150" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <rect x="30" y="274" width="1020" height="120" rx="13" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="46" y="296" font-size="11" font-weight="700" fill="#5a3410">收敛(非版本迁移)</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="46" y="310" width="280" height="66" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="186" y="334" fill="#5a3410">struct schema(目标态)</text><text x="186" y="352" fill="#93762e">字段/主键/索引/约束</text>
    <rect x="366" y="322" width="280" height="42" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="506" y="347" fill="#1b2a4a">对比当前 DB 结构 → 补差异</text>
    <rect x="686" y="310" width="348" height="66" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="860" y="334" fill="#12402a">DB 结构向 struct 收敛</text><text x="860" y="352" fill="#2f6f4f">只加不删(安全:不删列/表)</text>
  </g>
  <line x1="326" y1="343" x2="366" y2="343" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="646" y1="343" x2="686" y2="343" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="46" y="388" font-size="8.5" fill="#93762e">AutoMigrate 是"声明式收敛":声明目标 struct、Migrator 补齐差异——非手写版本化迁移脚本(生产复杂变更仍建议手写)</text>
  <rect x="30" y="410" width="1020" height="70" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="432" font-size="11" font-weight="700" fill="#1d1d1f">要点</text>
  <text x="46" y="453" font-size="9" fill="#6e6e73">· AutoMigrate 据 schema 把 DB 结构向 struct 声明收敛:建表/补列/改列类型/加索引约束(只加不删,安全);DDL 经 Dialector 翻方言</text>
  <text x="46" y="471" font-size="9" fill="#6e6e73">· 声明式收敛(非版本化迁移脚本):适合开发/简单场景;生产复杂变更(删列/改主键)仍建议手写迁移;依赖 schema 反射与 Dialector</text>
</svg>
