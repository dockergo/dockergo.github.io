<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">GORM 事务与会话 · 事务边界 + 会话隔离 + 预编译缓存</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">Transaction/Begin/Commit/SavePoint 事务边界;Session/WithContext 会话隔离;PrepareStmt 预编译缓存</text>
  <rect x="30" y="70" width="333" height="180" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="92" font-size="11" font-weight="700" fill="#1b2a4a">事务边界</text>
  <text x="46" y="114" font-size="8.6" fill="#274a78">· Transaction(finisher_api.go:637)</text>
  <text x="46" y="132" font-size="8.4" fill="#5b7db1">  闭包内自动 begin/commit/rollback</text>
  <text x="46" y="152" font-size="8.6" fill="#274a78">· Begin(:680) / Commit / Rollback</text>
  <text x="46" y="170" font-size="8.4" fill="#5b7db1">  手动事务控制</text>
  <text x="46" y="190" font-size="8.6" fill="#274a78">· SavePoint(:737) / RollbackTo</text>
  <text x="46" y="208" font-size="8.4" fill="#5b7db1">  嵌套事务保存点</text>
  <text x="46" y="234" font-size="8" fill="#a1a1a6">begin/commit_or_rollback 是 callbacks 链上回调</text>
  <rect x="373" y="70" width="333" height="180" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="389" y="92" font-size="11" font-weight="700" fill="#12402a">会话隔离</text>
  <text x="389" y="114" font-size="8.6" fill="#2f6f4f">· Session(gorm.go:261)</text>
  <text x="389" y="132" font-size="8.4" fill="#2f6f4f">  建新会话:独立配置(日志/预编译等)</text>
  <text x="389" y="152" font-size="8.6" fill="#2f6f4f">· WithContext(ctx)</text>
  <text x="389" y="170" font-size="8.4" fill="#2f6f4f">  绑 context(超时/取消/traceID)</text>
  <rect x="389" y="182" width="301" height="44" rx="7" fill="#e6f7ee" stroke="#bfe0cd"/><text x="403" y="200" font-size="8.4" font-weight="600" fill="#12402a">clone 语义:会话间不干扰</text><text x="403" y="216" font-size="8" fill="#2f6f4f">派生独立 *DB 配置</text>
  <rect x="716" y="70" width="334" height="180" rx="13" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="732" y="92" font-size="11" font-weight="700" fill="#5a3410">预编译缓存</text>
  <text x="732" y="114" font-size="8.6" fill="#93762e">· PrepareStmt(prepare_stmt.go:15)</text>
  <text x="732" y="132" font-size="8.4" fill="#93762e">  PreparedStmtDB 缓存已编译语句</text>
  <text x="732" y="152" font-size="8.6" fill="#93762e">· 同 SQL 复用 prepared statement</text>
  <text x="732" y="170" font-size="8.4" fill="#93762e">  省重复解析/编译开销</text>
  <rect x="732" y="182" width="302" height="44" rx="7" fill="#fdf6ea" stroke="#efdcb4"/><text x="746" y="200" font-size="8.4" font-weight="600" fill="#5a3410">按 SQL 文本缓存 *sql.Stmt</text><text x="746" y="216" font-size="8" fill="#93762e">高频同构查询提速</text>
  <rect x="30" y="264" width="1020" height="130" rx="13" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="46" y="286" font-size="11" font-weight="700" fill="#12402a">事务经 callbacks 落地</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="46" y="300" width="230" height="76" rx="8" fill="#e6f7ee" stroke="#bfe0cd"/><text x="161" y="326" fill="#12402a">Transaction 闭包</text><text x="161" y="344" fill="#2f6f4f">fn(tx *DB) error</text><text x="161" y="362" fill="#2f6f4f">返回 nil→commit,err→rollback</text>
    <rect x="316" y="300" width="230" height="76" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="431" y="326" fill="#12402a">create/update/delete 链</text><text x="431" y="344" fill="#2f6f4f">begin_transaction 回调</text><text x="431" y="362" fill="#2f6f4f">(Match enableTransaction)</text>
    <rect x="586" y="300" width="230" height="76" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="701" y="326" fill="#12402a">链末 commit_or_rollback</text><text x="701" y="344" fill="#2f6f4f">成功 commit</text><text x="701" y="362" fill="#2f6f4f">出错 rollback</text>
    <rect x="856" y="300" width="178" height="76" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="945" y="326" fill="#1b2a4a">SavePoint</text><text x="945" y="344" fill="#5b7db1">嵌套事务</text><text x="945" y="362" fill="#5b7db1">部分回滚</text>
  </g>
  <line x1="276" y1="338" x2="316" y2="338" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="546" y1="338" x2="586" y2="338" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <rect x="30" y="410" width="1020" height="70" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="432" font-size="11" font-weight="700" fill="#1d1d1f">要点</text>
  <text x="46" y="453" font-size="9" fill="#6e6e73">· 事务边界(Transaction 闭包自动提交回滚/Begin 手动/SavePoint 嵌套)经 callbacks 的 begin/commit_or_rollback 回调落地</text>
  <text x="46" y="471" font-size="9" fill="#6e6e73">· 会话隔离(Session/WithContext,clone 语义各自独立)+ 预编译缓存(PrepareStmt 按 SQL 缓存 *sql.Stmt 提速高频查询)</text>
</svg>
