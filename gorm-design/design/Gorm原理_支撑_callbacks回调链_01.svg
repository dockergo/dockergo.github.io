<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">GORM callbacks 回调链 · 灵魂:操作=有序可插拔回调链</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">六 processor(create/query/update/delete/row/raw),每种操作拆成有序回调链;主逻辑与 hook 平级都是链上回调,插件插回调扩展不改核心</text>

  <!-- six processors -->
  <rect x="30" y="70" width="1020" height="66" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="92" font-size="11" font-weight="700" fill="#1b2a4a">六 processor(callbacks.go:29 持 processors map,:33 processor,:51~ 六种)</text>
  <g text-anchor="middle" font-size="9">
    <rect x="46" y="102" width="155" height="26" rx="6" fill="#f3f7fc" stroke="#cfe0f2"/><text x="123" y="119" fill="#274a78">create</text>
    <rect x="211" y="102" width="155" height="26" rx="6" fill="#f3f7fc" stroke="#cfe0f2"/><text x="288" y="119" fill="#274a78">query</text>
    <rect x="376" y="102" width="155" height="26" rx="6" fill="#f3f7fc" stroke="#cfe0f2"/><text x="453" y="119" fill="#274a78">update</text>
    <rect x="541" y="102" width="155" height="26" rx="6" fill="#f3f7fc" stroke="#cfe0f2"/><text x="618" y="119" fill="#274a78">delete</text>
    <rect x="706" y="102" width="155" height="26" rx="6" fill="#f3f7fc" stroke="#cfe0f2"/><text x="783" y="119" fill="#274a78">row</text>
    <rect x="871" y="102" width="163" height="26" rx="6" fill="#f3f7fc" stroke="#cfe0f2"/><text x="952" y="119" fill="#274a78">raw</text>
  </g>

  <!-- create chain example -->
  <rect x="30" y="150" width="1020" height="120" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="172" font-size="11" font-weight="700" fill="#12402a">create 链示例(callbacks.go:42-48 RegisterDefaultCallbacks 按语义排链)</text>
  <g text-anchor="middle" font-size="7.6">
    <rect x="46" y="184" width="130" height="34" rx="6" fill="#eafaf1" stroke="#bfe0cd"/><text x="111" y="200" fill="#12402a">begin_transaction</text><text x="111" y="212" fill="#2f6f4f">Match(enableTx)</text>
    <rect x="192" y="184" width="118" height="34" rx="6" fill="#eafaf1" stroke="#bfe0cd"/><text x="251" y="205" fill="#12402a">before_create(hook)</text>
    <rect x="326" y="184" width="130" height="34" rx="6" fill="#eafaf1" stroke="#bfe0cd"/><text x="391" y="205" fill="#12402a">save_before_assoc</text>
    <rect x="472" y="184" width="120" height="34" rx="6" fill="#e6f7ee" stroke="#bfe0cd"/><text x="532" y="200" font-weight="700" fill="#12402a">gorm:create</text><text x="532" y="212" fill="#2f6f4f">主逻辑=回调</text>
    <rect x="608" y="184" width="130" height="34" rx="6" fill="#eafaf1" stroke="#bfe0cd"/><text x="673" y="205" fill="#12402a">save_after_assoc</text>
    <rect x="754" y="184" width="116" height="34" rx="6" fill="#eafaf1" stroke="#bfe0cd"/><text x="812" y="205" fill="#12402a">after_create(hook)</text>
    <rect x="886" y="184" width="148" height="34" rx="6" fill="#eafaf1" stroke="#bfe0cd"/><text x="960" y="205" fill="#12402a">commit_or_rollback</text>
  </g>
  <line x1="176" y1="201" x2="192" y2="201" stroke="#c7c7cc" stroke-width="1" marker-end="url(#ar)"/>
  <line x1="310" y1="201" x2="326" y2="201" stroke="#c7c7cc" stroke-width="1" marker-end="url(#ar)"/>
  <line x1="456" y1="201" x2="472" y2="201" stroke="#c7c7cc" stroke-width="1" marker-end="url(#ar)"/>
  <line x1="592" y1="201" x2="608" y2="201" stroke="#c7c7cc" stroke-width="1" marker-end="url(#ar)"/>
  <line x1="738" y1="201" x2="754" y2="201" stroke="#c7c7cc" stroke-width="1" marker-end="url(#ar)"/>
  <line x1="870" y1="201" x2="886" y2="201" stroke="#c7c7cc" stroke-width="1" marker-end="url(#ar)"/>
  <text x="46" y="240" font-size="8.5" fill="#2f6f4f">灵魂点:gorm:create/gorm:query 主逻辑本身就是链上一个回调,与 hook 平级——软删除/审计/多租户/乐观锁等插件只需 Register/Replace 一个回调即可织入</text>
  <text x="46" y="258" font-size="8.5" fill="#2f6f4f">每 processor 持 callbacks[]*callback + 编译后 fns[]func(*DB) + Clauses[](该操作默认 BuildClauses)</text>

  <!-- sort + execute -->
  <rect x="30" y="284" width="500" height="130" rx="13" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="46" y="306" font-size="11" font-weight="700" fill="#5a3410">排序(compile:194 → sortCallbacks:261)</text>
  <text x="46" y="328" font-size="8.8" fill="#93762e">· Register / Before(name) / After(name)(:170-182)声明偏序</text>
  <text x="46" y="348" font-size="8.8" fill="#93762e">· sortCallbacks 用 sort.SliceStable + 依赖遍历拓扑排序</text>
  <text x="46" y="368" font-size="8.8" fill="#93762e">· 编译成有序 fns[]func(*DB)</text>
  <text x="46" y="392" font-size="8.5" fill="#5a3410">偏序声明 → 拓扑排序 → 线性回调序列</text>

  <rect x="550" y="284" width="500" height="130" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="566" y="306" font-size="11" font-weight="700" fill="#1b2a4a">执行(processor.Execute:75)</text>
  <text x="566" y="328" font-size="8.8" fill="#274a78">· 跑 scopes → 解析 Model(stmt.Parse)→ 设 ReflectValue</text>
  <text x="566" y="348" font-size="8.8" fill="#274a78">· (首次)令 BuildClauses=p.Clauses</text>
  <text x="566" y="368" font-size="8.8" fill="#274a78">· for _, f := range p.fns { f(db) } 顺序跑(:135)</text>
  <text x="566" y="392" font-size="8.5" fill="#274a78">末尾 Logger.Trace 记 SQL、清 SQL/Vars</text>

  <rect x="30" y="430" width="1020" height="70" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="452" font-size="11" font-weight="700" fill="#1d1d1f">要点</text>
  <text x="46" y="473" font-size="9" fill="#6e6e73">· callbacks 是 GORM 的灵魂:六种操作各是一条有序可插拔回调链,主逻辑(gorm:create)与 hook(before_create)平级都是链上回调</text>
  <text x="46" y="491" font-size="9" fill="#6e6e73">· 插件模型:软删除/审计/多租户靠 Register/Replace 回调织入,不改核心——这是 GORM 可扩展性的根基</text>
</svg>
