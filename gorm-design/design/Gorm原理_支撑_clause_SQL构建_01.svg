<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">GORM clause · SQL AST 层(各子句 Build 出方言片段)</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">SELECT/FROM/WHERE/INSERT/VALUES/SET/ON CONFLICT/RETURNING 抽象成实现 clause.Interface 的结构,各自 Build(builder)写方言片段;被 Statement.Build 驱动</text>
  <rect x="30" y="70" width="500" height="180" rx="13" fill="#faf4fb" stroke="#e2d2ee"/>
  <text x="46" y="92" font-size="11" font-weight="700" fill="#5a3d78">clause.Interface(clause/clause.go:5)</text>
  <rect x="46" y="104" width="468" height="30" rx="7" fill="#f4eefb" stroke="#d9c7ec"/><text x="60" y="124" font-size="8.8" fill="#3d2a5a">Interface(:5):Name() + Build(Builder) + MergeClause()</text>
  <rect x="46" y="140" width="468" height="30" rx="7" fill="#f4eefb" stroke="#d9c7ec"/><text x="60" y="160" font-size="8.8" fill="#3d2a5a">Builder(:20):写 SQL 的接口(WriteString/WriteQuoted…)</text>
  <rect x="46" y="176" width="468" height="30" rx="7" fill="#f4eefb" stroke="#d9c7ec"/><text x="60" y="196" font-size="8.8" fill="#3d2a5a">Clause(:28):包一个 Interface + BeforeExpression 等</text>
  <text x="46" y="228" font-size="8.5" fill="#7a5a95">每种 SQL 子句 = 一个实现 Interface 的结构,自己会写自己那段</text>
  <rect x="550" y="70" width="500" height="180" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="566" y="92" font-size="11" font-weight="700" fill="#1b2a4a">主要 clause 结构</text>
  <g font-size="8.3" fill="#274a78">
    <rect x="566" y="104" width="228" height="24" rx="5" fill="#f3f7fc" stroke="#cfe0f2"/><text x="576" y="120">Where(clause/where.go:23)</text>
    <rect x="806" y="104" width="228" height="24" rx="5" fill="#f3f7fc" stroke="#cfe0f2"/><text x="816" y="120">Insert(clause/insert.go:14)</text>
    <rect x="566" y="132" width="228" height="24" rx="5" fill="#f3f7fc" stroke="#cfe0f2"/><text x="576" y="148">Select / From</text>
    <rect x="806" y="132" width="228" height="24" rx="5" fill="#f3f7fc" stroke="#cfe0f2"/><text x="816" y="148">Values / Set</text>
    <rect x="566" y="160" width="228" height="24" rx="5" fill="#f3f7fc" stroke="#cfe0f2"/><text x="576" y="176">OnConflict(on_conflict.go)</text>
    <rect x="806" y="160" width="228" height="24" rx="5" fill="#f3f7fc" stroke="#cfe0f2"/><text x="816" y="176">Returning / GroupBy / OrderBy</text>
  </g>
  <text x="566" y="206" font-size="8.5" fill="#5b7db1">Where 组合表达式(Eq/Gt/Like/AND/OR…),Build 时递归写条件</text>
  <text x="566" y="226" font-size="8.5" fill="#5b7db1">OnConflict 处理 UPSERT(方言差异由 Dialector 补)</text>
  <line x1="530" y1="160" x2="550" y2="160" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <rect x="30" y="264" width="1020" height="130" rx="13" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="46" y="286" font-size="11" font-weight="700" fill="#5a3410">Statement.Build 驱动 clause 拼 SQL</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="46" y="300" width="300" height="76" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="196" y="322" fill="#5a3410">Statement.Build 按顺序</text><text x="196" y="340" fill="#93762e">遍历选定 clause</text><text x="196" y="358" fill="#93762e">(SELECT→FROM→WHERE→…)</text>
    <rect x="386" y="300" width="300" height="76" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="536" y="322" fill="#5a3410">每 clause.Build(builder)</text><text x="536" y="340" fill="#93762e">写自己那段方言片段</text><text x="536" y="358" fill="#93762e">Where 写 "WHERE a=? AND b=?"</text>
    <rect x="726" y="300" width="308" height="76" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="880" y="322" fill="#12402a">拼成完整 SQL + Vars</text><text x="880" y="340" fill="#2f6f4f">方言差异(占位符/引号)</text><text x="880" y="358" fill="#2f6f4f">由 Dialector 补(见方言篇)</text>
  </g>
  <line x1="346" y1="338" x2="386" y2="338" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="686" y1="338" x2="726" y2="338" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <rect x="30" y="410" width="1020" height="70" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="432" font-size="11" font-weight="700" fill="#1d1d1f">要点</text>
  <text x="46" y="453" font-size="9" fill="#6e6e73">· clause 是 SQL AST 层:每种子句(Where/Insert/OnConflict…)实现 clause.Interface、自己 Build(builder)写方言片段;被 Statement.Build 按顺序驱动拼成完整 SQL</text>
  <text x="46" y="471" font-size="9" fill="#6e6e73">· 结构化 SQL(非字符串拼接):可组合、可复用、方言差异下沉到 Dialector——比手拼 SQL 安全</text>
</svg>
