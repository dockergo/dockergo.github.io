<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="820" viewBox="0 0 1080 820"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1080" height="820" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">GORM 总架构 · 应用（链式 API + 模型）→ DB/Statement → callbacks 回调链 → schema+clause → Dialector/ConnPool → 数据库</text>
  <text x="30" y="50" font-size="11.5" fill="#a1a1a6">位置即语义：自上而下是一条请求的数据流；clone 累积在上、回调链执行在中、方言与连接池落库在下，schema 反射贯穿</text>

  <!-- 顶栏：项目定位 -->
  <rect x="30" y="64" width="1020" height="46" rx="11" fill="#f6f6f8" stroke="#e2e2e7"/>
  <text x="46" y="84" font-size="10.5" font-weight="600" fill="#1d1d1f">GORM</text>
  <text x="96" y="84" font-size="9.5" fill="#494950">Go 的 ORM / 数据映射库（新家族）· 链接进应用作为一个包运行 · struct ↔ SQL 表双向映射 · 生成方言 SQL 交 database/sql 执行</text>
  <text x="46" y="101" font-size="9" fill="#86868b">核实基准：gorm.go · statement.go · callbacks.go · callbacks/callbacks.go —— 它不拥有网络与进程，也不执行 SQL</text>

  <!-- ① 应用层：两接触面 -->
  <rect x="30" y="122" width="1020" height="72" rx="14" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="48" y="146" font-size="12" font-weight="600" fill="#3d2a5a">① 应用层 · 接触面（Go 应用如何调用 GORM）</text>
  <rect x="48" y="158" width="484" height="28" rx="7" fill="#ffffff" stroke="#d9c7ec"/><text x="290" y="176" font-size="8.8" fill="#3d2a5a" text-anchor="middle">链式查询 API：Where/Select/Joins/Preload · Create/First/Find/Update/Delete</text>
  <rect x="548" y="158" width="502" height="28" rx="7" fill="#ffffff" stroke="#d9c7ec"/><text x="799" y="176" font-size="8.8" fill="#3d2a5a" text-anchor="middle">模型定义：Go struct + gorm:"..." tag · db.Model() / AutoMigrate()</text>

  <!-- ② DB / Statement 层 -->
  <rect x="30" y="206" width="1020" height="56" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="48" y="228" font-size="12" font-weight="600" fill="#1b2a4a">② DB / Statement（gorm.go · statement.go:22）：链式方法 getInstance 克隆 *DB，AddClause 累积条件进 Clauses</text>
  <text x="48" y="250" font-size="9" fill="#5b7db1">克隆语义（gorm.go:448）→ 并发安全派生；Statement 持 Clauses/Selects/Preloads/Vars/SQL，末尾 Build(statement.go:493) 拼 SQL</text>

  <!-- ③ callbacks 引擎（灵魂） -->
  <rect x="30" y="274" width="1020" height="98" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="48" y="298" font-size="12" font-weight="600" fill="#12402a">③ callbacks 生命周期回调链引擎（★灵魂 · callbacks.go:75 processor.Execute）</text>
  <rect x="48" y="310" width="158" height="24" rx="6" fill="#ffffff" stroke="#bfe0cd"/><text x="127" y="326" font-size="8.5" fill="#12402a" text-anchor="middle">create 链</text>
  <rect x="214" y="310" width="158" height="24" rx="6" fill="#ffffff" stroke="#bfe0cd"/><text x="293" y="326" font-size="8.5" fill="#12402a" text-anchor="middle">query 链</text>
  <rect x="380" y="310" width="158" height="24" rx="6" fill="#ffffff" stroke="#bfe0cd"/><text x="459" y="326" font-size="8.5" fill="#12402a" text-anchor="middle">update 链</text>
  <rect x="546" y="310" width="158" height="24" rx="6" fill="#ffffff" stroke="#bfe0cd"/><text x="625" y="326" font-size="8.5" fill="#12402a" text-anchor="middle">delete 链</text>
  <rect x="712" y="310" width="158" height="24" rx="6" fill="#ffffff" stroke="#bfe0cd"/><text x="791" y="326" font-size="8.5" fill="#12402a" text-anchor="middle">row 链</text>
  <rect x="878" y="310" width="156" height="24" rx="6" fill="#ffffff" stroke="#bfe0cd"/><text x="956" y="326" font-size="8.5" fill="#12402a" text-anchor="middle">raw 链</text>
  <text x="48" y="354" font-size="9" fill="#2f6f4f">create 链：begin_tx → before_create → save_before_assoc → gorm:create → save_after_assoc → after_create → commit/rollback（主逻辑与 hook 平级 · 插件靠 Register/Replace 织入）</text>

  <!-- ④a schema | ④b clause -->
  <rect x="30" y="386" width="502" height="84" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="48" y="410" font-size="11.5" font-weight="600" fill="#12402a">④a schema 反射（schema/schema.go:134 Parse）</text>
  <text x="48" y="431" font-size="9" fill="#2f6f4f">struct → *Schema：字段/主键/命名/关联/序列化器</text>
  <text x="48" y="449" font-size="9" fill="#2f6f4f">按 reflect.Type 缓存 sync.Map（getOrParse:393）· ParseField 读 tag</text>

  <rect x="548" y="386" width="502" height="84" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="566" y="410" font-size="11.5" font-weight="600" fill="#5a3410">④b clause SQL 构建（clause/clause.go:5 Interface）</text>
  <text x="566" y="431" font-size="9" fill="#93762e">Where/Select/Insert/Values/Set/OnConflict/Returning</text>
  <text x="566" y="449" font-size="9" fill="#93762e">方言无关 AST · 各 Build 写片段 · AddVar 占位防注入</text>

  <!-- ⑤ 关联 | ⑥ 事务 | ⑦ Migrator -->
  <rect x="30" y="486" width="326" height="84" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="48" y="510" font-size="11" font-weight="600" fill="#1d1d1f">⑤ 关联 &amp; Preload</text>
  <text x="48" y="530" font-size="8.8" fill="#494950">has one/many · belongs to · many2many</text>
  <text x="48" y="547" font-size="8.8" fill="#494950">Preload 发 IN 查询归位 · 消 N+1</text>
  <text x="48" y="564" font-size="8.5" fill="#86868b">association.go:14 / preload.go:185</text>

  <rect x="372" y="486" width="326" height="84" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="390" y="510" font-size="11" font-weight="600" fill="#1d1d1f">⑥ 事务 &amp; 会话</text>
  <text x="390" y="530" font-size="8.8" fill="#494950">默认单条事务包裹 · Transaction 闭包</text>
  <text x="390" y="547" font-size="8.8" fill="#494950">Session 派生 · PrepareStmt 缓存</text>
  <text x="390" y="564" font-size="8.5" fill="#86868b">finisher_api.go:637 / prepare_stmt.go:15</text>

  <rect x="714" y="486" width="336" height="84" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="732" y="510" font-size="11" font-weight="600" fill="#1d1d1f">⑦ Migrator 自动迁移</text>
  <text x="732" y="530" font-size="8.8" fill="#494950">AutoMigrate 建表/补列/加索引</text>
  <text x="732" y="547" font-size="8.8" fill="#494950">只增不减 · 幂等收敛</text>
  <text x="732" y="564" font-size="8.5" fill="#86868b">migrator/migrator.go:122</text>

  <!-- ⑧ Dialector / ConnPool / Logger -->
  <rect x="30" y="586" width="1020" height="72" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="48" y="610" font-size="12" font-weight="600" fill="#1b2a4a">⑧ Dialector 方言 + ConnPool + Logger（interfaces.go:12 / :34 · logger/logger.go:64）</text>
  <rect x="48" y="622" width="314" height="26" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="205" y="640" font-size="8.5" fill="#1b2a4a" text-anchor="middle">Dialector：占位符/引号/类型/Explain</text>
  <rect x="372" y="622" width="314" height="26" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="529" y="640" font-size="8.5" fill="#1b2a4a" text-anchor="middle">ConnPool：Exec/Query/Prepare(Context)</text>
  <rect x="696" y="622" width="338" height="26" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="865" y="640" font-size="8.5" fill="#1b2a4a" text-anchor="middle">Logger.Trace：SQL + 耗时 + 行数 · 标慢查询</text>

  <!-- 外部生态层 -->
  <rect x="30" y="674" width="1020" height="76" rx="14" fill="#f7f7f9" stroke="#c7c7cc" stroke-dasharray="5 4" filter="url(#soft)"/>
  <text x="48" y="696" font-size="11" font-weight="600" fill="#494950">外部生态 · 非 GORM 组件（GORM 生成 SQL 但不执行、不拥有存储）</text>
  <rect x="48" y="708" width="314" height="28" rx="7" fill="#ffffff" stroke="#d2d2d7"/><text x="205" y="726" font-size="8.8" fill="#494950" text-anchor="middle">Go 标准库 database/sql（连接池 *sql.DB）</text>
  <rect x="372" y="708" width="662" height="28" rx="7" fill="#ffffff" stroke="#d2d2d7"/><text x="703" y="726" font-size="8.8" fill="#494950" text-anchor="middle">数据库驱动 + 底层数据库：MySQL · PostgreSQL · SQLite · SQL Server（各家方言，Dialector 屏蔽差异）</text>

  <!-- 底部一句话总纲 -->
  <text x="30" y="778" font-size="10" font-weight="600" fill="#1d1d1f">一句话：链式 API 克隆累积 Statement，finisher 触发 callbacks 回调链（灵魂），链上用 clause+schema 拼方言 SQL，交 ConnPool 落 database/sql。</text>

  <!-- 纵向数据流箭头 -->
  <line x1="540" y1="194" x2="540" y2="206" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="540" y1="262" x2="540" y2="274" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="540" y1="372" x2="540" y2="386" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="281" y1="470" x2="281" y2="486" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="540" y1="570" x2="540" y2="586" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="540" y1="658" x2="540" y2="674" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
</svg>
