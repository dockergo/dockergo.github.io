<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">GORM 关联与 Preload · 四种关系 + 预加载</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">管 struct 间四种关系(has one/has many/belongs to/many2many),解析关联元数据、Preload 预加载、Association 增删;依赖 schema 反射与 callbacks</text>
  <rect x="30" y="70" width="1020" height="150" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="92" font-size="11" font-weight="700" fill="#1b2a4a">四种关系(schema/relationship.go:20 类型常量,:40 Relationship,:65 parseRelation)</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="46" y="104" width="235" height="100" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="163" y="126" font-weight="600" fill="#274a78">has one(一对一)</text><text x="163" y="146" fill="#5b7db1">User 有一个 Profile</text><text x="163" y="164" fill="#5b7db1">外键在对方(Profile.UserID)</text><text x="163" y="188" fill="#5b7db1">Preload 后填 User.Profile</text>
    <rect x="291" y="104" width="235" height="100" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="408" y="126" font-weight="600" fill="#274a78">has many(一对多)</text><text x="408" y="146" fill="#5b7db1">User 有多个 Order</text><text x="408" y="164" fill="#5b7db1">外键在对方(Order.UserID)</text><text x="408" y="188" fill="#5b7db1">填 User.Orders 切片</text>
    <rect x="536" y="104" width="235" height="100" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="653" y="126" font-weight="600" fill="#274a78">belongs to(属于)</text><text x="653" y="146" fill="#5b7db1">Order 属于 User</text><text x="653" y="164" fill="#5b7db1">外键在自己(Order.UserID)</text><text x="653" y="188" fill="#5b7db1">填 Order.User</text>
    <rect x="781" y="104" width="253" height="100" rx="8" fill="#faf4fb" stroke="#e2d2ee"/><text x="907" y="126" font-weight="600" fill="#5a3d78">many2many(多对多,:271)</text><text x="907" y="146" fill="#7a5a95">User↔Role 经中间表</text><text x="907" y="164" fill="#7a5a95">join table(user_roles)</text><text x="907" y="188" fill="#7a5a95">填两侧切片</text>
  </g>
  <rect x="30" y="234" width="500" height="160" rx="13" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="46" y="256" font-size="11" font-weight="700" fill="#12402a">Preload 预加载(callbacks/preload.go:185)</text>
  <text x="46" y="278" font-size="8.8" fill="#2f6f4f">· db.Preload("Orders").Find(&amp;users)</text>
  <text x="46" y="298" font-size="8.8" fill="#2f6f4f">· 先查主表,再按外键批量查关联表</text>
  <text x="46" y="318" font-size="8.8" fill="#2f6f4f">· 回填进 struct 的关联字段</text>
  <rect x="46" y="330" width="468" height="44" rx="8" fill="#e6f7ee" stroke="#bfe0cd"/><text x="60" y="349" font-size="8.5" font-weight="600" fill="#12402a">避免 N+1:一次查主表 + 一次批量查关联</text><text x="60" y="365" font-size="8" fill="#2f6f4f">(非每条主记录单独查关联)</text>
  <rect x="550" y="234" width="500" height="160" rx="13" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="566" y="256" font-size="11" font-weight="700" fill="#5a3410">Association API(association.go:14)</text>
  <text x="566" y="278" font-size="8.8" fill="#93762e">· db.Model(&amp;user).Association("Orders")</text>
  <text x="566" y="298" font-size="8.8" fill="#93762e">· .Append / .Delete / .Replace / .Clear</text>
  <text x="566" y="318" font-size="8.8" fill="#93762e">· 增删关联(维护外键/中间表)</text>
  <rect x="566" y="330" width="468" height="44" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="580" y="349" font-size="8.5" font-weight="600" fill="#5a3410">关联元数据从 schema 反射来</text><text x="580" y="365" font-size="8" fill="#93762e">Preload/Association 都走 callbacks 执行</text>
  <rect x="30" y="410" width="1020" height="70" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="432" font-size="11" font-weight="700" fill="#1d1d1f">要点</text>
  <text x="46" y="453" font-size="9" fill="#6e6e73">· 四种关系(has one/has many/belongs to/many2many)由 schema 解析关联元数据(relationship.go);外键位置区分 has(对方)vs belongs to(自己)</text>
  <text x="46" y="471" font-size="9" fill="#6e6e73">· Preload 批量预加载避免 N+1(一次主表+一次批量关联);Association API 增删关联;依赖 schema 反射与 callbacks</text>
</svg>
