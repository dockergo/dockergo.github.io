<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">GORM 双维模型 · 能力域 × 执行时机</text>
  <text x="30" y="50" font-size="11.5" fill="#a1a1a6">接触面（模型定义 + 链式查询 API）在两个时机被 8 个支撑能力域实现；schema 反射贯穿构建期与执行期</text>

  <!-- 接触面维 -->
  <rect x="30" y="64" width="1020" height="66" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="46" y="85" font-size="11.5" font-weight="600" fill="#3d2a5a">接触面 · 应用与 GORM 的两条交互入口（元模式第一维）</text>
  <rect x="46" y="94" width="490" height="28" rx="7" fill="#ffffff" stroke="#d9c7ec"/>
  <text x="291" y="112" font-size="9.5" fill="#3d2a5a" text-anchor="middle">模型定义（声明式）：Go struct + gorm:"..." tag · db.Model() / AutoMigrate()</text>
  <rect x="548" y="94" width="490" height="28" rx="7" fill="#ffffff" stroke="#d9c7ec"/>
  <text x="793" y="112" font-size="9.5" fill="#3d2a5a" text-anchor="middle">链式查询 API（命令式）：Where/Select/Joins · Create/First/Find/Update/Delete</text>

  <!-- 执行时机维 label -->
  <text x="30" y="156" font-size="11.5" font-weight="600" fill="#6e6e73">执行时机 · 两阶段（元模式第二维）→ 能力域按所属时机归位</text>

  <!-- 左：同步链式构建期 -->
  <rect x="30" y="166" width="322" height="242" rx="13" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="46" y="188" font-size="11.5" font-weight="600" fill="#274a78">① 同步 · 链式构建期（累积，不碰库）</text>
  <rect x="46" y="200" width="290" height="96" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="191" y="222" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">① Statement 链式构建</text>
  <text x="191" y="244" font-size="9" fill="#5b7db1" text-anchor="middle">getInstance 克隆 *DB（gorm.go:448）</text>
  <text x="191" y="262" font-size="9" fill="#5b7db1" text-anchor="middle">AddClause 累积条件进 Clauses map</text>
  <text x="191" y="280" font-size="9" fill="#5b7db1" text-anchor="middle">Selects/Preloads/Vars 逐步填充</text>
  <rect x="46" y="306" width="290" height="90" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="191" y="328" font-size="10.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">chainable 累积语义</text>
  <text x="191" y="350" font-size="9" fill="#494950" text-anchor="middle">Where/Select/Joins/Preload/Order</text>
  <text x="191" y="368" font-size="9" fill="#494950" text-anchor="middle">每次克隆返回新 tx · 不碰数据库</text>
  <text x="191" y="386" font-size="9" fill="#86868b" text-anchor="middle">并发安全派生（克隆隔离）</text>

  <!-- 右：回调链执行期 -->
  <rect x="366" y="166" width="684" height="242" rx="13" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="382" y="188" font-size="11.5" font-weight="600" fill="#2c5a3a">② 触发 · 回调链执行期（finisher 触发 → 生成 SQL 落库）</text>
  <rect x="382" y="200" width="652" height="50" rx="10" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="398" y="221" font-size="11" font-weight="600" fill="#12402a">② callbacks 回调链引擎（★灵魂 · callbacks.go:75 Execute）</text>
  <text x="398" y="240" font-size="9" fill="#2f6f4f">finisher 触发 → 顺序跑注册回调 fns → 链末 Statement.Build 拼方言 SQL → ConnPool 执行</text>

  <!-- 能力域小卡 row1 -->
  <rect x="382" y="260" width="210" height="60" rx="9" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="487" y="282" font-size="10" font-weight="600" fill="#5a3410" text-anchor="middle">③ clause SQL 构建</text>
  <text x="487" y="300" font-size="8.5" fill="#93762e" text-anchor="middle">方言无关 AST · 各 Build 写片段</text>
  <text x="487" y="314" font-size="8.5" fill="#93762e" text-anchor="middle">AddVar 占位防注入</text>

  <rect x="602" y="260" width="210" height="60" rx="9" fill="#ffffff" stroke="#ececf1"/>
  <text x="707" y="282" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">④ 关联 &amp; Preload</text>
  <text x="707" y="300" font-size="8.5" fill="#6e6e73" text-anchor="middle">四关系 · IN 查询归位</text>
  <text x="707" y="314" font-size="8.5" fill="#6e6e73" text-anchor="middle">消 N+1（preload.go:185）</text>

  <rect x="822" y="260" width="212" height="60" rx="9" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="928" y="282" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">⑤ 事务 &amp; 会话</text>
  <text x="928" y="300" font-size="8.5" fill="#5b7db1" text-anchor="middle">默认单条事务 · Transaction</text>
  <text x="928" y="314" font-size="8.5" fill="#5b7db1" text-anchor="middle">Session 派生 · PrepareStmt</text>

  <!-- 能力域小卡 row2 -->
  <rect x="382" y="330" width="210" height="66" rx="9" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="487" y="352" font-size="10" font-weight="600" fill="#5a3410" text-anchor="middle">⑥ Migrator 自动迁移</text>
  <text x="487" y="371" font-size="8.5" fill="#93762e" text-anchor="middle">AutoMigrate 建表/补列/加索引</text>
  <text x="487" y="386" font-size="8.5" fill="#93762e" text-anchor="middle">只增不减 · 幂等收敛</text>

  <rect x="602" y="330" width="432" height="66" rx="9" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="818" y="352" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">⑦ Dialector 方言 + ConnPool + Logger</text>
  <text x="818" y="371" font-size="8.5" fill="#5b7db1" text-anchor="middle">占位符/引号/类型翻译 · Exec/Query/Prepare 执行面</text>
  <text x="818" y="386" font-size="8.5" fill="#5b7db1" text-anchor="middle">Logger.Trace 记 SQL+耗时+行数 · 落到 database/sql</text>

  <!-- schema 底座 -->
  <rect x="30" y="424" width="1020" height="88" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="46" y="446" font-size="11.5" font-weight="600" fill="#12402a">⑧ schema 反射 · 两期公共底座（贯穿构建期与执行期）</text>
  <text x="46" y="467" font-size="9.5" fill="#2f6f4f">Parse(schema/schema.go:134)：struct → *Schema（字段/主键/命名/关联/序列化器）· getOrParse:393 按 reflect.Type 缓存 sync.Map</text>
  <text x="46" y="486" font-size="9.5" fill="#2f6f4f">构建期供 Model() 绑定元数据；执行期供 ReflectValue 扫描赋值 —— 是 struct↔表 映射的元数据源</text>
  <text x="46" y="504" font-size="9" fill="#86868b">归位铁律：一个知识点属哪条主线，看它的能力域（8 条）× 时机，而非它出现在哪个文件</text>

  <!-- 连线 -->
  <path d="M291,122 L291,144 L191,144 L191,166" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M793,122 L793,144 L708,144 L708,166" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M352,244 L366,244" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="359" y="238" font-size="8" fill="#a1a1a6" text-anchor="middle">finisher</text>
</svg>
