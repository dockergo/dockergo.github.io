<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">GORM schema 反射 · struct → *Schema 元数据(按类型缓存)</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">把 Go struct 一次性反射解析成 *Schema(字段/主键/命名/关联/序列化器),按类型缓存;是"struct↔表"映射的元数据源、所有能力域的公共底座</text>
  <rect x="30" y="70" width="500" height="190" rx="13" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="46" y="92" font-size="11" font-weight="700" fill="#12402a">Parse:一次反射解析(schema.go:134)</text>
  <text x="46" y="114" font-size="8.8" fill="#2f6f4f">Schema(schema.go:35)产物:</text>
  <rect x="46" y="124" width="468" height="26" rx="6" fill="#e6f7ee" stroke="#bfe0cd"/><text x="60" y="141" font-size="8.5" fill="#12402a">Fields:各字段(ParseField field.go:106 读 tag)</text>
  <rect x="46" y="156" width="468" height="26" rx="6" fill="#e6f7ee" stroke="#bfe0cd"/><text x="60" y="173" font-size="8.5" fill="#12402a">PrimaryFields:主键;命名(naming.go)</text>
  <rect x="46" y="188" width="468" height="26" rx="6" fill="#e6f7ee" stroke="#bfe0cd"/><text x="60" y="205" font-size="8.5" fill="#12402a">Relationships:关联;序列化器</text>
  <rect x="46" y="220" width="468" height="26" rx="6" fill="#e6f7ee" stroke="#bfe0cd"/><text x="60" y="237" font-size="8.5" fill="#12402a">FieldsByName / FieldsByDBName:名索引</text>
  <rect x="550" y="70" width="500" height="190" rx="13" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="566" y="92" font-size="11" font-weight="700" fill="#5a3410">缓存(getOrParse schema.go:393)</text>
  <text x="566" y="114" font-size="8.8" fill="#93762e">· 按 reflect.Type 缓存已解析的 *Schema</text>
  <text x="566" y="134" font-size="8.8" fill="#93762e">· 同类型第二次直接取缓存(反射只一次)</text>
  <rect x="566" y="146" width="468" height="44" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="580" y="165" font-size="8.8" font-weight="600" fill="#5a3410">反射昂贵 → 解析一次缓存</text><text x="580" y="181" font-size="8.3" fill="#93762e">sync.Map 存 Type→*Schema,并发安全</text>
  <text x="566" y="210" font-size="8.5" fill="#93762e">为何缓存:反射解析 struct 慢,每次查询都解析会拖垮性能</text>
  <text x="566" y="230" font-size="8.5" fill="#93762e">→ 首次解析、后续命中缓存,近零开销</text>
  <line x1="530" y1="150" x2="550" y2="150" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <rect x="30" y="274" width="1020" height="120" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="296" font-size="11" font-weight="700" fill="#1b2a4a">所有能力域的公共底座</text>
  <g text-anchor="middle" font-size="8.3">
    <rect x="46" y="310" width="180" height="30" rx="6" fill="#f3f7fc" stroke="#cfe0f2"/><text x="136" y="329" fill="#274a78">*Schema(元数据)</text>
    <rect x="266" y="306" width="180" height="18" rx="4" fill="#e7f0fb"/><text x="356" y="319" fill="#274a78">模型定义:tag 解析</text>
    <rect x="266" y="328" width="180" height="18" rx="4" fill="#e7f0fb"/><text x="356" y="341" fill="#274a78">clause/Statement:列名映射</text>
    <rect x="466" y="306" width="180" height="18" rx="4" fill="#e7f0fb"/><text x="556" y="319" fill="#274a78">关联/Preload:关系元数据</text>
    <rect x="466" y="328" width="180" height="18" rx="4" fill="#e7f0fb"/><text x="556" y="341" fill="#274a78">Migrator:建表据字段</text>
    <rect x="666" y="306" width="180" height="18" rx="4" fill="#e7f0fb"/><text x="756" y="319" fill="#274a78">callbacks:ReflectValue</text>
    <rect x="666" y="328" width="180" height="18" rx="4" fill="#e7f0fb"/><text x="756" y="341" fill="#274a78">序列化器:字段读写转换</text>
  </g>
  <line x1="226" y1="325" x2="266" y2="315" stroke="#c7c7cc" stroke-width="1" marker-end="url(#ar)"/>
  <line x1="226" y1="325" x2="266" y2="337" stroke="#c7c7cc" stroke-width="1" marker-end="url(#ar)"/>
  <text x="46" y="384" font-size="8.5" fill="#5b7db1">Schema 是 struct↔表 的元数据源——命名/字段/主键/关联全从这里取,一处解析处处用</text>
  <rect x="30" y="410" width="1020" height="70" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="432" font-size="11" font-weight="700" fill="#1d1d1f">要点</text>
  <text x="46" y="453" font-size="9" fill="#6e6e73">· schema 反射把 struct 一次性解析成 *Schema(字段/主键/命名/关联/序列化器),按 reflect.Type 缓存(getOrParse:393)——反射只一次、后续命中</text>
  <text x="46" y="471" font-size="9" fill="#6e6e73">· 是 struct↔表映射的元数据源、所有能力域(模型/clause/关联/Migrator/callbacks)的公共底座——一处解析处处用</text>
</svg>
