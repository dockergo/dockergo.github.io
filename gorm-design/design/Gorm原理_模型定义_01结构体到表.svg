<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">GORM 模型定义 · Go struct + tag → 表结构(约定优于配置)</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">一 struct 默认映一表、字段映一列;gorm tag 覆盖约定;ParseField 解析 tag 进 field.TagSettings</text>

  <!-- convention -->
  <rect x="30" y="70" width="500" height="200" rx="13" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="46" y="92" font-size="11" font-weight="700" fill="#12402a">约定优于配置(默认映射)</text>
  <rect x="46" y="104" width="468" height="30" rx="7" fill="#e6f7ee" stroke="#bfe0cd"/><text x="60" y="124" font-size="8.8" fill="#12402a">struct → 表(默认蛇形复数名,naming.go:44 Plural)</text>
  <rect x="46" y="140" width="468" height="30" rx="7" fill="#e6f7ee" stroke="#bfe0cd"/><text x="60" y="160" font-size="8.8" fill="#12402a">字段 → 列(默认蛇形,naming.go:62 ColumnName)</text>
  <rect x="46" y="176" width="468" height="30" rx="7" fill="#e6f7ee" stroke="#bfe0cd"/><text x="60" y="196" font-size="8.8" fill="#12402a">ID / gorm.Model.ID 默认主键</text>
  <rect x="46" y="212" width="468" height="44" rx="8" fill="#fff" stroke="#bfe0cd"/><text x="60" y="231" font-size="8.5" font-weight="600" fill="#12402a">内嵌 gorm.Model(model.go)</text><text x="60" y="247" font-size="8" fill="#2f6f4f">注入 ID/CreatedAt/UpdatedAt/DeletedAt(DeletedAt 触发软删除)</text>

  <!-- tag override -->
  <rect x="550" y="70" width="500" height="200" rx="13" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="566" y="92" font-size="11" font-weight="700" fill="#3d2a5a">gorm:"..." tag 覆盖约定</text>
  <text x="566" y="114" font-size="8.8" fill="#7a5a95">由 ParseField(schema/field.go:106)经 ParseTagSetting(:109)</text>
  <text x="566" y="130" font-size="8.8" fill="#7a5a95">解析进 field.TagSettings(:84)</text>
  <g font-size="8.3" fill="#7a5a95">
    <rect x="566" y="140" width="228" height="24" rx="5" fill="#faf4fb" stroke="#e2d2ee"/><text x="576" y="156">primaryKey / column:xxx</text>
    <rect x="806" y="140" width="228" height="24" rx="5" fill="#faf4fb" stroke="#e2d2ee"/><text x="816" y="156">type:varchar(100) / size</text>
    <rect x="566" y="168" width="228" height="24" rx="5" fill="#faf4fb" stroke="#e2d2ee"/><text x="576" y="184">not null / uniqueIndex</text>
    <rect x="806" y="168" width="228" height="24" rx="5" fill="#faf4fb" stroke="#e2d2ee"/><text x="816" y="184">default / autoIncrement</text>
    <rect x="566" y="196" width="228" height="24" rx="5" fill="#faf4fb" stroke="#e2d2ee"/><text x="576" y="212">-&gt;/&lt;-(读写权限)/ -(忽略)</text>
    <rect x="806" y="196" width="228" height="24" rx="5" fill="#faf4fb" stroke="#e2d2ee"/><text x="816" y="212">serializer:json</text>
  </g>
  <text x="566" y="244" font-size="8.5" fill="#7a5a95">tag 是"约定的例外声明"——不写走约定,写了覆盖</text>

  <!-- bind + migrate -->
  <rect x="30" y="284" width="1020" height="140" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="306" font-size="11" font-weight="700" fill="#1b2a4a">绑定与建表</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="46" y="320" width="300" height="80" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="196" y="342" font-weight="600" fill="#274a78">type User struct {</text><text x="196" y="360" fill="#5b7db1">gorm.Model</text><text x="196" y="376" fill="#5b7db1">Name string `gorm:"size:100"`</text><text x="196" y="392" fill="#5b7db1">}</text>
    <rect x="386" y="335" width="300" height="50" rx="8" fill="#e7f0fb" stroke="#b9d2ef"/><text x="536" y="356" font-weight="600" fill="#1b2a4a">db.Model(&amp;User{})</text><text x="536" y="372" fill="#5b7db1">绑 struct 给 Statement.Model 供 schema</text>
    <rect x="726" y="335" width="308" height="50" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="880" y="356" font-weight="600" fill="#12402a">db.AutoMigrate(&amp;User{})</text><text x="880" y="372" fill="#2f6f4f">据 schema 建表/补列/加索引(见 Migrator)</text>
  </g>
  <line x1="346" y1="360" x2="386" y2="360" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="686" y1="360" x2="726" y2="360" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="46" y="416" font-size="8.5" fill="#5b7db1">声明式一维(区别链式查询的命令式);依赖 schema 反射与 Migrator 能力域</text>

  <rect x="30" y="440" width="1020" height="70" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="462" font-size="11" font-weight="700" fill="#1d1d1f">要点</text>
  <text x="46" y="483" font-size="9" fill="#6e6e73">· 模型定义=Go struct + gorm tag:约定优于配置(struct→表蛇形复数、字段→列蛇形、ID 主键、gorm.Model 注入四标准字段)</text>
  <text x="46" y="501" font-size="9" fill="#6e6e73">· tag 覆盖约定(primaryKey/column/type/size/uniqueIndex…,ParseField 解析进 TagSettings);db.Model 绑定、AutoMigrate 据 schema 建表</text>
</svg>
