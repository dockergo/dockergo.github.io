<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter></defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">GORM 依赖矩阵 · 接触面操作 × 支撑能力域</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">每种操作实际触达哪些能力域。● 直接依赖  ○ 间接依赖</text>
  <g font-size="8" text-anchor="middle" font-weight="600" fill="#48484a">
    <text x="340" y="90">Statement</text><text x="430" y="90">callbacks</text><text x="520" y="90">clause</text><text x="606" y="90">schema</text><text x="694" y="90">关联</text><text x="778" y="90">事务</text><text x="866" y="90">方言池</text><text x="952" y="90">Migrator</text>
  </g>
  <line x1="30" y1="98" x2="1000" y2="98" stroke="#d2d2d7" stroke-width="1"/>
  <!-- rows -->
  <g>
    <rect x="30" y="102" width="270" height="52" rx="8" fill="#f4eefb" stroke="#d9c7ec"/><text x="44" y="126" font-size="10" font-weight="700" fill="#3d2a5a">模型定义</text><text x="44" y="144" font-size="7.5" fill="#7a5a95">struct+tag→表</text>
    <text x="606" y="132" font-size="12" text-anchor="middle" fill="#3d2a5a">●</text><text x="952" y="132" font-size="12" text-anchor="middle" fill="#3d2a5a">●</text><text x="694" y="132" font-size="12" text-anchor="middle" fill="#b6a0cf">○</text>
