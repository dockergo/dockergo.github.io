    <text x="340" y="190" font-size="12" text-anchor="middle" fill="#3d2a5a">●</text><text x="430" y="190" font-size="12" text-anchor="middle" fill="#3d2a5a">●</text><text x="520" y="190" font-size="12" text-anchor="middle" fill="#3d2a5a">●</text><text x="606" y="190" font-size="12" text-anchor="middle" fill="#3d2a5a">●</text><text x="694" y="190" font-size="12" text-anchor="middle" fill="#b6a0cf">○</text><text x="866" y="190" font-size="12" text-anchor="middle" fill="#3d2a5a">●</text>
