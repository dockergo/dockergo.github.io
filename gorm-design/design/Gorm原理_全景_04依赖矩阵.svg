  <g>
    <rect x="30" y="218" width="270" height="52" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="44" y="242" font-size="10" font-weight="700" fill="#12402a">Create/写入</text><text x="44" y="260" font-size="7.5" fill="#2f6f4f">Create/Save</text>
    <text x="340" y="248" font-size="12" text-anchor="middle" fill="#12402a">●</text><text x="430" y="248" font-size="12" text-anchor="middle" fill="#12402a">●</text><text x="520" y="248" font-size="12" text-anchor="middle" fill="#12402a">●</text><text x="606" y="248" font-size="12" text-anchor="middle" fill="#12402a">●</text><text x="694" y="248" font-size="12" text-anchor="middle" fill="#8ab89a">○</text><text x="778" y="248" font-size="12" text-anchor="middle" fill="#12402a">●</text><text x="866" y="248" font-size="12" text-anchor="middle" fill="#12402a">●</text>
  </g>
  <g>
    <rect x="30" y="276" width="270" height="52" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="44" y="300" font-size="10" font-weight="700" fill="#1b2a4a">Query/查询</text><text x="44" y="318" font-size="7.5" fill="#5b7db1">First/Find</text>
    <text x="340" y="306" font-size="12" text-anchor="middle" fill="#1b2a4a">●</text><text x="430" y="306" font-size="12" text-anchor="middle" fill="#1b2a4a">●</text><text x="520" y="306" font-size="12" text-anchor="middle" fill="#1b2a4a">●</text><text x="606" y="306" font-size="12" text-anchor="middle" fill="#1b2a4a">●</text><text x="694" y="306" font-size="12" text-anchor="middle" fill="#1b2a4a">●</text><text x="866" y="306" font-size="12" text-anchor="middle" fill="#1b2a4a">●</text>
  </g>
