    <rect x="30" y="334" width="270" height="52" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="44" y="358" font-size="10" font-weight="700" fill="#1b2a4a">Preload</text><text x="44" y="376" font-size="7.5" fill="#5b7db1">关联预加载</text>
    <text x="340" y="364" font-size="12" text-anchor="middle" fill="#1b2a4a">●</text><text x="430" y="364" font-size="12" text-anchor="middle" fill="#1b2a4a">●</text><text x="606" y="364" font-size="12" text-anchor="middle" fill="#1b2a4a">●</text><text x="694" y="364" font-size="12" text-anchor="middle" fill="#1b2a4a">●</text><text x="866" y="364" font-size="12" text-anchor="middle" fill="#1b2a4a">●</text>
  </g>
  <g>
    <rect x="30" y="392" width="270" height="52" rx="8" fill="#fff7e6" stroke="#e8cf9a"/><text x="44" y="416" font-size="10" font-weight="700" fill="#5a3410">AutoMigrate</text><text x="44" y="434" font-size="7.5" fill="#93762e">建表/迁移</text>
    <text x="606" y="422" font-size="12" text-anchor="middle" fill="#5a3410">●</text><text x="866" y="422" font-size="12" text-anchor="middle" fill="#5a3410">●</text><text x="952" y="422" font-size="12" text-anchor="middle" fill="#5a3410">●</text><text x="694" y="422" font-size="12" text-anchor="middle" fill="#d1b483">○</text>
  </g>
  <g stroke="#ececf1" stroke-width="1">
    <line x1="386" y1="98" x2="386" y2="444"/><line x1="476" y1="98" x2="476" y2="444"/><line x1="564" y1="98" x2="564" y2="444"/><line x1="650" y1="98" x2="650" y2="444"/><line x1="738" y1="98" x2="738" y2="444"/><line x1="822" y1="98" x2="822" y2="444"/><line x1="910" y1="98" x2="910" y2="444"/>
  </g>
  <rect x="30" y="456" width="1020" height="48" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="478" font-size="9" fill="#6e6e73">· 读写都经 Statement 累积→callbacks 执行→clause 拼 SQL→方言池落库,schema 反射是公共底座;写入额外走事务,Preload 走关联,AutoMigrate 走 Migrator</text>
  <text x="46" y="496" font-size="8.5" fill="#b1483a">· 每格都能在对应能力域正文对上——callbacks 是所有读写的执行中枢(灵魂),schema 是所有操作的元数据源</text>
</svg>
