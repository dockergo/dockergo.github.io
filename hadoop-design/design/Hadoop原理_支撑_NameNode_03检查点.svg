<svg xmlns="http://www.w3.org/2000/svg" width="960" height="470" viewBox="0 0 960 470"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">检查点合并:防 EditLog 无限膨胀 —— 旧 FsImage + 累积 EditLog → 新 FsImage</text>

  <!-- 输入 -->
  <rect x="40" y="70" width="220" height="80" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="150" y="98" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">旧 FsImage(fsimage_100)</text>
  <text x="150" y="120" font-size="8.5" fill="#5b7db1" text-anchor="middle">上次快照(到 txid=100)</text>
  <text x="150" y="138" font-size="8.5" fill="#5b7db1" text-anchor="middle">恢复起点</text>

  <rect x="40" y="180" width="220" height="90" rx="11" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="150" y="208" font-size="10.5" font-weight="600" fill="#7a4d00" text-anchor="middle">累积 EditLog</text>
  <text x="150" y="230" font-size="8.5" fill="#9a7328" text-anchor="middle">edits_101..350</text>
  <text x="150" y="248" font-size="8.5" fill="#9a7328" text-anchor="middle">达 100 万事务 或 1 小时触发</text>
  <text x="150" y="264" font-size="8.5" fill="#9a7328" text-anchor="middle">DFSConfigKeys.java:257 / :259</text>

  <!-- 合并器 -->
  <rect x="360" y="110" width="240" height="130" rx="13" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="480" y="138" font-size="11" font-weight="600" fill="#0f5132" text-anchor="middle">检查点合并</text>
  <text x="480" y="162" font-size="9" fill="#3f8f66" text-anchor="middle">1. 载旧 FsImage 入内存</text>
  <text x="480" y="182" font-size="9" fill="#3f8f66" text-anchor="middle">2. 重放 edits_101..350</text>
  <text x="480" y="202" font-size="9" fill="#3f8f66" text-anchor="middle">3. saveNamespace 序列化</text>
  <text x="480" y="222" font-size="8.5" fill="#3f8f66" text-anchor="middle">FSImage.java:1144</text>
  <path d="M260,110 L360,150" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M260,220 L360,195" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 输出 -->
  <rect x="700" y="110" width="220" height="80" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="810" y="138" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">新 FsImage(fsimage_350)</text>
  <text x="810" y="160" font-size="8.5" fill="#5b7db1" text-anchor="middle">到 txid=350 的新快照</text>
  <text x="810" y="178" font-size="8.5" fill="#5b7db1" text-anchor="middle">回传 Active NameNode</text>
  <path d="M600,160 L700,155" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="700" y="210" width="220" height="56" rx="11" fill="#f7f7f9" stroke="#e2e2e7"/>
  <text x="810" y="234" font-size="9.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">截断旧 EditLog</text>
  <text x="810" y="254" font-size="8.5" fill="#6e6e73" text-anchor="middle">重启只需载新 Image + 少量新 edits</text>
  <path d="M810,190 L810,210" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 谁来做 -->
  <rect x="40" y="308" width="880" height="130" rx="13" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="60" y="332" font-size="11.5" font-weight="600" fill="#3c1361">谁执行检查点?</text>
  <rect x="60" y="346" width="410" height="76" rx="10" fill="#faf4fb" stroke="#e4d3ee"/>
  <text x="265" y="370" font-size="10" font-weight="600" fill="#3c1361" text-anchor="middle">非 HA:Secondary NameNode</text>
  <text x="265" y="392" font-size="8.8" fill="#7c5aa6" text-anchor="middle">专职拉 Image+edits 合并回传</text>
  <text x="265" y="410" font-size="8.8" fill="#c4341c" text-anchor="middle">注意:不是热备、不能故障切换</text>
  <rect x="490" y="346" width="410" height="76" rx="10" fill="#faf4fb" stroke="#e4d3ee"/>
  <text x="695" y="370" font-size="10" font-weight="600" fill="#3c1361" text-anchor="middle">HA:Standby NameNode</text>
  <text x="695" y="392" font-size="8.8" fill="#7c5aa6" text-anchor="middle">StandbyCheckpointer(StandbyCheckpointer.java:63)</text>
  <text x="695" y="410" font-size="8.8" fill="#7c5aa6" text-anchor="middle">本就在追 edits、内存已最新 → 顺手做</text>
</svg>
