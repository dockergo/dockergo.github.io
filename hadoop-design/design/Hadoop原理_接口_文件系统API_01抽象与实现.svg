<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">文件系统 API 抽象:FileSystem 是可插拔门面,HDFS 只是其一种实现</text>

  <!-- 抽象基类 -->
  <rect x="300" y="56" width="360" height="56" rx="12" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="480" y="80" font-size="12" font-weight="600" fill="#3c1361" text-anchor="middle">FileSystem(抽象基类)</text>
  <text x="480" y="99" font-size="9" fill="#7c5aa6" text-anchor="middle">open / create / append / rename / delete / listStatus(统一 API)</text>

  <!-- 实现分支 -->
  <rect x="40" y="164" width="260" height="70" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="170" y="188" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">DistributedFileSystem</text>
  <text x="170" y="207" font-size="8.5" fill="#5b7db1" text-anchor="middle">HDFS 实现;委托内部 DFSClient</text>
  <text x="170" y="224" font-size="8.5" fill="#5b7db1" text-anchor="middle">scheme = hdfs://</text>

  <rect x="350" y="164" width="260" height="70" rx="11" fill="#f7f7f9" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="480" y="188" font-size="11" font-weight="600" fill="#1d1d1f" text-anchor="middle">LocalFileSystem</text>
  <text x="480" y="207" font-size="8.5" fill="#6e6e73" text-anchor="middle">本地磁盘 file://</text>
  <text x="480" y="224" font-size="8.5" fill="#6e6e73" text-anchor="middle">带校验和 ChecksumFileSystem</text>

  <rect x="660" y="164" width="260" height="70" rx="11" fill="#f7f7f9" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="790" y="188" font-size="11" font-weight="600" fill="#1d1d1f" text-anchor="middle">S3AFileSystem / 其它</text>
  <text x="790" y="207" font-size="8.5" fill="#6e6e73" text-anchor="middle">对象存储 s3a:// / abfs://</text>
  <text x="790" y="224" font-size="8.5" fill="#6e6e73" text-anchor="middle">同一 API、异构后端</text>

  <path d="M420,112 L200,164" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M480,112 L480,164" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M540,112 L760,164" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- HDFS 调用链 -->
  <rect x="40" y="272" width="880" height="176" rx="13" fill="#f4f9fb" stroke="#cfe0f2"/>
  <text x="60" y="296" font-size="11.5" font-weight="600" fill="#1b2a4a">HDFS 调用链(写路径示意)</text>

  <rect x="60" y="312" width="180" height="52" rx="9" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="150" y="333" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">DFSClient</text>
  <text x="150" y="351" font-size="8.5" fill="#5b7db1" text-anchor="middle">连接 NN、管流</text>
  <rect x="290" y="312" width="180" height="52" rx="9" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="380" y="333" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">ClientProtocol(RPC)</text>
  <text x="380" y="351" font-size="8.5" fill="#5b7db1" text-anchor="middle">create/addBlock/complete</text>
  <rect x="520" y="312" width="180" height="52" rx="9" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="610" y="333" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">NameNode</text>
  <text x="610" y="351" font-size="8.5" fill="#5b7db1" text-anchor="middle">改元数据(仅命名空间)</text>
  <rect x="750" y="312" width="150" height="52" rx="9" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="825" y="333" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">DataNode</text>
  <text x="825" y="351" font-size="8.5" fill="#9a7328" text-anchor="middle">收数据、pipeline</text>

  <path d="M240,338 L290,338" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M470,338 L520,338" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M150,364 L150,400 L825,400 L825,364" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="480" y="416" font-size="8.5" fill="#a1a1a6" text-anchor="middle">数据流:DFSClient(DFSOutputStream) 直接与 DataNode 通信,不经 NameNode</text>

  <!-- fs shell -->
  <rect x="60" y="426" width="840" height="0" fill="none"/>
  <rect x="60" y="428" width="380" height="12" fill="none"/>
  <text x="60" y="442" font-size="9" fill="#5b7db1">fs shell(hdfs dfs -put/-ls):FsShell → 解析命令 → 同样经 FileSystem API 落地,与编程接口共用一条路</text>
</svg>
