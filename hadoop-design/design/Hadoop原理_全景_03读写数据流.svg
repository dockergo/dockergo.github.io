<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="980" height="620" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">HDFS 读写数据流:元数据走 NameNode、数据不经 NameNode 直连 DataNode</text>

  <!-- 写路径 -->
  <rect x="26" y="52" width="460" height="540" rx="14" fill="#fdfaf3" stroke="#efdcb4"/>
  <text x="46" y="76" font-size="12" font-weight="600" fill="#7a4d00">写路径(create → write → close)</text>

  <rect x="46" y="90" width="180" height="40" rx="9" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="136" y="114" font-size="10" font-weight="600" fill="#3c1361" text-anchor="middle">Client(DFSOutputStream)</text>
  <rect x="286" y="90" width="180" height="40" rx="9" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="376" y="114" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">NameNode</text>

  <rect x="46" y="150" width="420" height="30" rx="7" fill="#ffffff" stroke="#efdcb4"/>
  <text x="60" y="169" font-size="9" fill="#7a4d00">① create():NN 建 INodeFile、写 EditLog、授租约(仅元数据)</text>
  <path d="M226,165 L286,165" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="46" y="188" width="420" height="30" rx="7" fill="#ffffff" stroke="#efdcb4"/>
  <text x="60" y="207" font-size="9" fill="#7a4d00">② addBlock():NN 按放置策略选 3 个 DataNode 返回</text>
  <path d="M376,183 L376,150 " stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- pipeline -->
  <rect x="46" y="230" width="130" height="34" rx="8" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="111" y="251" font-size="9.5" font-weight="600" fill="#7a4d00" text-anchor="middle">DN1</text>
  <rect x="192" y="230" width="130" height="34" rx="8" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="257" y="251" font-size="9.5" font-weight="600" fill="#7a4d00" text-anchor="middle">DN2</text>
  <rect x="338" y="230" width="128" height="34" rx="8" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="402" y="251" font-size="9.5" font-weight="600" fill="#7a4d00" text-anchor="middle">DN3</text>
  <text x="256" y="285" font-size="9" fill="#9a7328" text-anchor="middle">③ 建 pipeline:packet 沿 DN1→DN2→DN3 流水复制</text>
  <path d="M176,247 L192,247" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M322,247 L338,247" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="46" y="300" width="420" height="52" rx="8" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="256" y="320" font-size="9" fill="#0f5132" text-anchor="middle">④ ack 沿 DN3→DN2→DN1→client 反向确认</text>
  <text x="256" y="338" font-size="9" fill="#0f5132" text-anchor="middle">写满 128MB 换新块 → 回 ② 申请下一块</text>
  <path d="M338,326 L322,326" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M192,326 L176,326" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="46" y="366" width="420" height="30" rx="7" fill="#ffffff" stroke="#efdcb4"/>
  <text x="60" y="385" font-size="9" fill="#7a4d00">⑤ close():complete() 通知 NN 文件完成、释放租约</text>

  <rect x="46" y="414" width="420" height="80" rx="9" fill="#f7f7f9" stroke="#e2e2e7"/>
  <text x="60" y="435" font-size="9.5" font-weight="600" fill="#1d1d1f">关键点</text>
  <text x="60" y="454" font-size="8.8" fill="#494950">· 数据永不经过 NameNode,只走 client↔DataNode</text>
  <text x="60" y="471" font-size="8.8" fill="#494950">· DataNode 收到块后异步向 NN 汇报(增量块汇报)</text>
  <text x="60" y="488" font-size="8.8" fill="#494950">· pipeline 中途 DN 挂:重建 pipeline + 补副本</text>

  <!-- 读路径 -->
  <rect x="500" y="52" width="454" height="540" rx="14" fill="#f4f9fb" stroke="#cfe0f2"/>
  <text x="520" y="76" font-size="12" font-weight="600" fill="#1b2a4a">读路径(open → read → close)</text>

  <rect x="520" y="90" width="180" height="40" rx="9" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="610" y="114" font-size="10" font-weight="600" fill="#3c1361" text-anchor="middle">Client(DFSInputStream)</text>
  <rect x="760" y="90" width="176" height="40" rx="9" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="848" y="114" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">NameNode</text>

  <rect x="520" y="150" width="416" height="46" rx="7" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="534" y="169" font-size="9" fill="#1b2a4a">① open()/getBlockLocations():NN 返回块的副本位置</text>
  <text x="534" y="186" font-size="8.8" fill="#5b7db1">按到 client 的网络距离排序(本地→同机架→跨机架)</text>
  <path d="M700,170 L760,170" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="520" y="212" width="130" height="34" rx="8" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="585" y="233" font-size="9.5" font-weight="600" fill="#7a4d00" text-anchor="middle">最近 DN</text>
  <rect x="666" y="212" width="130" height="34" rx="8" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="731" y="233" font-size="9.5" fill="#9a7328" text-anchor="middle">副本 DN</text>
  <rect x="812" y="212" width="124" height="34" rx="8" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="874" y="233" font-size="9.5" fill="#9a7328" text-anchor="middle">副本 DN</text>
  <text x="700" y="270" font-size="9" fill="#5b7db1" text-anchor="middle">② client 直连最近 DataNode 逐块读取</text>
  <path d="M610,196 L585,212" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="520" y="286" width="416" height="46" rx="8" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="728" y="306" font-size="9" fill="#0f5132" text-anchor="middle">③ 读时校验 .meta 校验和;若损坏/DN 不可达</text>
  <text x="728" y="324" font-size="9" fill="#0f5132" text-anchor="middle">自动切到下一个副本 DN 重读并上报坏块</text>

  <rect x="520" y="350" width="416" height="30" rx="7" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="534" y="369" font-size="9" fill="#1b2a4a">④ 顺序读多块:边读边向 NN 取后续块位置(流式)</text>

  <rect x="520" y="398" width="416" height="96" rx="9" fill="#f7f7f9" stroke="#e2e2e7"/>
  <text x="534" y="419" font-size="9.5" font-weight="600" fill="#1d1d1f">关键点</text>
  <text x="534" y="438" font-size="8.8" fill="#494950">· 就近读:MapReduce 把计算调度到块所在节点(数据本地性)</text>
  <text x="534" y="455" font-size="8.8" fill="#494950">· 一次写入、多次读取:HDFS 不支持随机写(仅追加)</text>
  <text x="534" y="472" font-size="8.8" fill="#494950">· NameNode 只给位置,数据带宽由 DataNode 群提供</text>
</svg>
