<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="600" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">双维模型:接触面主线 × 支撑能力域 × 执行时机 —— 把每条主线归位</text>

  <!-- 接触面列 -->
  <rect x="30" y="60" width="270" height="500" rx="14" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="165" y="86" font-size="12" font-weight="600" fill="#3c1361" text-anchor="middle">接触面主线(外部怎么用)</text>
  <rect x="48" y="102" width="234" height="60" rx="9" fill="#ffffff" stroke="#d9c9ef"/>
  <text x="165" y="126" font-size="10.5" font-weight="600" fill="#3c1361" text-anchor="middle">① 文件系统 API 与 Shell</text>
  <text x="165" y="145" font-size="8.5" fill="#7c5aa6" text-anchor="middle">FileSystem / DistributedFileSystem · fs shell</text>
  <rect x="48" y="174" width="234" height="60" rx="9" fill="#ffffff" stroke="#d9c9ef"/>
  <text x="165" y="198" font-size="10.5" font-weight="600" fill="#3c1361" text-anchor="middle">② YARN 应用提交</text>
  <text x="165" y="217" font-size="8.5" fill="#7c5aa6" text-anchor="middle">YarnClient → RM → ApplicationMaster</text>
  <rect x="48" y="246" width="234" height="60" rx="9" fill="#ffffff" stroke="#d9c9ef"/>
  <text x="165" y="270" font-size="10.5" font-weight="600" fill="#3c1361" text-anchor="middle">③ MapReduce 作业</text>
  <text x="165" y="289" font-size="8.5" fill="#7c5aa6" text-anchor="middle">Job.submit → MRAppMaster 调 Map/Reduce</text>
  <text x="165" y="340" font-size="9" fill="#7c5aa6" text-anchor="middle">数据分块跨节点、主控管元数据</text>
  <text x="165" y="358" font-size="9" fill="#7c5aa6" text-anchor="middle">多副本容错 —— 判为家族 4</text>

  <!-- 能力域列 -->
  <rect x="330" y="60" width="330" height="500" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="495" y="86" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">支撑能力域(内部公共机制 · 8)</text>
  <rect x="348" y="100" width="294" height="26" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="495" y="118" font-size="9.5" fill="#1b2a4a" text-anchor="middle">① NameNode 命名空间与元数据(灵魂)</text>
  <rect x="348" y="132" width="294" height="26" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="495" y="150" font-size="9.5" fill="#1b2a4a" text-anchor="middle">② DataNode 块存储</text>
  <rect x="348" y="164" width="294" height="26" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="495" y="182" font-size="9.5" fill="#1b2a4a" text-anchor="middle">③ 块放置与复制策略</text>
  <rect x="348" y="196" width="294" height="26" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="495" y="214" font-size="9.5" fill="#1b2a4a" text-anchor="middle">④ Pipeline 写数据流</text>
  <rect x="348" y="228" width="294" height="26" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="495" y="246" font-size="9.5" fill="#1b2a4a" text-anchor="middle">⑤ 心跳与块汇报(对账 · 灵魂)</text>
  <rect x="348" y="260" width="294" height="26" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="495" y="278" font-size="9.5" fill="#1b2a4a" text-anchor="middle">⑥ HA 高可用(JournalNode + ZKFC)</text>
  <rect x="348" y="292" width="294" height="26" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="495" y="310" font-size="9.5" fill="#1b2a4a" text-anchor="middle">⑦ YARN 资源管理与调度</text>
  <rect x="348" y="324" width="294" height="26" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="495" y="342" font-size="9.5" fill="#1b2a4a" text-anchor="middle">⑧ MapReduce / Balancer / Federation</text>
  <text x="495" y="380" font-size="9" fill="#5b7db1" text-anchor="middle">每个源码核心概念都能唯一归属到某条能力域</text>
  <text x="495" y="398" font-size="9" fill="#5b7db1" text-anchor="middle">block↔DataNode 映射 = 内存重建、不持久化</text>

  <!-- 执行时机列 -->
  <rect x="690" y="60" width="240" height="500" rx="14" fill="#f5faf6" stroke="#e2ece5" filter="url(#soft)"/>
  <text x="810" y="86" font-size="12" font-weight="600" fill="#2c5a3a" text-anchor="middle">执行时机</text>
  <rect x="708" y="102" width="204" height="170" rx="10" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="810" y="124" font-size="10.5" font-weight="600" fill="#0f5132" text-anchor="middle">前台(请求路径)</text>
  <text x="810" y="148" font-size="9" fill="#3f8f66" text-anchor="middle">读/写文件</text>
  <text x="810" y="167" font-size="9" fill="#3f8f66" text-anchor="middle">addBlock 分配块</text>
  <text x="810" y="186" font-size="9" fill="#3f8f66" text-anchor="middle">pipeline 传 packet</text>
  <text x="810" y="205" font-size="9" fill="#3f8f66" text-anchor="middle">RPC 元数据操作</text>
  <text x="810" y="224" font-size="9" fill="#3f8f66" text-anchor="middle">Scheduler 分配 Container</text>
  <text x="810" y="243" font-size="9" fill="#3f8f66" text-anchor="middle">Map/Reduce Task 执行</text>
  <rect x="708" y="284" width="204" height="256" rx="10" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="810" y="306" font-size="10.5" font-weight="600" fill="#7a4d00" text-anchor="middle">后台(守护/循环)</text>
  <text x="810" y="330" font-size="9" fill="#9a7328" text-anchor="middle">RedundancyMonitor 复制</text>
  <text x="810" y="349" font-size="9" fill="#9a7328" text-anchor="middle">心跳 3s / 块汇报 6h</text>
  <text x="810" y="368" font-size="9" fill="#9a7328" text-anchor="middle">检查点合并 FsImage</text>
  <text x="810" y="387" font-size="9" fill="#9a7328" text-anchor="middle">EditLogTailer 追日志</text>
  <text x="810" y="406" font-size="9" fill="#9a7328" text-anchor="middle">块扫描校验和</text>
  <text x="810" y="425" font-size="9" fill="#9a7328" text-anchor="middle">Balancer 均衡</text>
  <text x="810" y="444" font-size="9" fill="#9a7328" text-anchor="middle">失效副本清理</text>

  <path d="M300,190 L330,180" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M660,300 L690,300" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
</svg>
