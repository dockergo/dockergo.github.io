<svg xmlns="http://www.w3.org/2000/svg" width="960" height="470" viewBox="0 0 960 470"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">调度器:层级队列 + 数据本地性 —— 在 NM 心跳时把空闲资源就近分给 AM</text>

  <!-- CapacityScheduler 队列树 -->
  <rect x="30" y="52" width="490" height="230" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="48" y="76" font-size="11.5" font-weight="600" fill="#1b2a4a">CapacityScheduler(默认) · CapacityScheduler.java:177</text>
  <rect x="200" y="90" width="150" height="34" rx="8" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="275" y="112" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">root(100%)</text>
  <rect x="60" y="150" width="180" height="50" rx="8" fill="#e7eefb" stroke="#bcd0ec"/>
  <text x="150" y="170" font-size="9" font-weight="600" fill="#1b2a4a" text-anchor="middle">队列 prod(60%)</text>
  <text x="150" y="188" font-size="8" fill="#5b7db1" text-anchor="middle">容量保证 + 抢占</text>
  <rect x="300" y="150" width="180" height="50" rx="8" fill="#e7eefb" stroke="#bcd0ec"/>
  <text x="390" y="170" font-size="9" font-weight="600" fill="#1b2a4a" text-anchor="middle">队列 dev(40%)</text>
  <text x="390" y="188" font-size="8" fill="#5b7db1" text-anchor="middle">空闲可弹性借用</text>
  <path d="M240,124 L150,150" stroke="#c7c7cc" stroke-width="1.3" fill="none" marker-end="url(#ar)"/>
  <path d="M310,124 L390,150" stroke="#c7c7cc" stroke-width="1.3" fill="none" marker-end="url(#ar)"/>
  <text x="275" y="232" font-size="8.8" fill="#5b7db1" text-anchor="middle">allocate(:1318) 响应请求</text>
  <text x="275" y="252" font-size="8.8" fill="#5b7db1" text-anchor="middle">allocateContainersToNode(:573) 在心跳分配</text>
  <text x="275" y="270" font-size="8.5" fill="#86868b" text-anchor="middle">容量是保证值,空闲可超借、繁忙才回收</text>

  <!-- FairScheduler -->
  <rect x="540" y="52" width="390" height="230" rx="13" fill="#f5faf6" stroke="#e2ece5"/>
  <text x="558" y="76" font-size="11.5" font-weight="600" fill="#2c5a3a">FairScheduler · FairScheduler.java:146</text>
  <rect x="558" y="94" width="354" height="60" rx="9" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="735" y="118" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">公平份额动态均分</text>
  <text x="735" y="138" font-size="8.5" fill="#3f8f66" text-anchor="middle">新应用逐步抢到平均份额</text>
  <rect x="558" y="162" width="354" height="52" rx="9" fill="#ffffff" stroke="#bce6cd"/>
  <text x="735" y="184" font-size="9" font-weight="600" fill="#0f5132" text-anchor="middle">continuousScheduling(:189)</text>
  <text x="735" y="202" font-size="8.3" fill="#3f8f66" text-anchor="middle">持续调度而非只在心跳时</text>
  <text x="735" y="240" font-size="8.8" fill="#3f8f66" text-anchor="middle">适合交互式 + 批处理混合、快速响应</text>
  <text x="735" y="260" font-size="8.5" fill="#86868b" text-anchor="middle">支持抢占回公平份额</text>

  <!-- 数据本地性 -->
  <rect x="30" y="298" width="900" height="150" rx="13" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="48" y="322" font-size="11.5" font-weight="600" fill="#7a4d00">数据本地性(Locality)—— 让计算贴着 HDFS 块跑</text>
  <rect x="60" y="336" width="260" height="90" rx="10" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="190" y="362" font-size="10.5" font-weight="700" fill="#0f5132" text-anchor="middle">node-local(最优)</text>
  <text x="190" y="384" font-size="8.5" fill="#3f8f66" text-anchor="middle">Container 分到数据所在节点</text>
  <text x="190" y="404" font-size="8.5" fill="#3f8f66" text-anchor="middle">Map Task 就近读本地块,零网络</text>
  <rect x="340" y="336" width="260" height="90" rx="10" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="470" y="362" font-size="10.5" font-weight="700" fill="#7a4d00" text-anchor="middle">rack-local(次优)</text>
  <text x="470" y="384" font-size="8.5" fill="#9a7328" text-anchor="middle">同机架另一节点</text>
  <text x="470" y="404" font-size="8.5" fill="#9a7328" text-anchor="middle">机架内网络,较快</text>
  <rect x="620" y="336" width="290" height="90" rx="10" fill="#f7f7f9" stroke="#e2e2e7"/>
  <text x="765" y="362" font-size="10.5" font-weight="700" fill="#6e6e73" text-anchor="middle">any(兜底)</text>
  <text x="765" y="384" font-size="8.5" fill="#86868b" text-anchor="middle">任意节点,跨机架传数据</text>
  <text x="765" y="404" font-size="8.5" fill="#86868b" text-anchor="middle">延迟调度:先等一会儿 node-local</text>
  <path d="M320,381 L340,381" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M600,381 L620,381" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
</svg>
