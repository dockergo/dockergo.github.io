<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">YARN 应用提交两阶段:RM 先给一个 AM 容器、AM 再自己申请干活的容器</text>

  <!-- 泳道头 -->
  <rect x="40" y="52" width="220" height="34" rx="9" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="150" y="74" font-size="10.5" font-weight="600" fill="#3c1361" text-anchor="middle">Client(YarnClient)</text>
  <rect x="290" y="52" width="300" height="34" rx="9" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="440" y="74" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">ResourceManager</text>
  <rect x="620" y="52" width="300" height="34" rx="9" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="770" y="74" font-size="10.5" font-weight="600" fill="#7a4d00" text-anchor="middle">NodeManager(s)</text>

  <!-- 阶段① -->
  <rect x="30" y="100" width="900" height="180" rx="13" fill="#fdfaf3" stroke="#efdcb4"/>
  <text x="48" y="122" font-size="11.5" font-weight="600" fill="#7a4d00">阶段 ① 提交应用 → RM 启动 AM 容器</text>

  <rect x="48" y="136" width="200" height="30" rx="7" fill="#ffffff" stroke="#d9c9ef"/>
  <text x="148" y="155" font-size="9" fill="#3c1361" text-anchor="middle">1. 申请 applicationId</text>
  <path d="M248,151 L300,151" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="48" y="176" width="280" height="42" rx="7" fill="#ffffff" stroke="#d9c9ef"/>
  <text x="188" y="194" font-size="9" fill="#3c1361" text-anchor="middle">2. 提交 ApplicationSubmissionContext</text>
  <text x="188" y="209" font-size="8.2" fill="#7c5aa6" text-anchor="middle">AM 启动命令 + 资源需求 + 本地资源</text>
  <path d="M328,197 L380,197" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="390" y="176" width="220" height="42" rx="7" fill="#e7eefb" stroke="#bcd0ec"/>
  <text x="500" y="194" font-size="9" font-weight="600" fill="#1b2a4a" text-anchor="middle">ApplicationMasterService</text>
  <text x="500" y="209" font-size="8.2" fill="#5b7db1" text-anchor="middle">受理 · ApplicationMasterService.java:84</text>

  <rect x="640" y="230" width="260" height="38" rx="8" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="770" y="253" font-size="9.5" font-weight="600" fill="#7a4d00" text-anchor="middle">3. 启动第 1 个 Container = AM</text>
  <path d="M610,197 L640,230" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 阶段② -->
  <rect x="30" y="296" width="900" height="240" rx="13" fill="#f5faf6" stroke="#e2ece5"/>
  <text x="48" y="318" font-size="11.5" font-weight="600" fill="#0f5132">阶段 ② AM 自调度 → 申请/领取 Container 跑任务</text>

  <rect x="640" y="332" width="260" height="40" rx="8" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="770" y="350" font-size="9.5" font-weight="600" fill="#7a4d00" text-anchor="middle">ApplicationMaster(如 MRAppMaster)</text>
  <text x="770" y="365" font-size="8.2" fill="#9a7328" text-anchor="middle">MRAppMaster.java:180</text>

  <rect x="390" y="386" width="220" height="40" rx="8" fill="#e7eefb" stroke="#bcd0ec"/>
  <text x="500" y="404" font-size="9" font-weight="600" fill="#1b2a4a" text-anchor="middle">4. registerApplicationMaster</text>
  <text x="500" y="419" font-size="8.2" fill="#5b7db1" text-anchor="middle">:243</text>
  <path d="M640,360 L610,390" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="390" y="438" width="220" height="40" rx="8" fill="#e7eefb" stroke="#bcd0ec"/>
  <text x="500" y="456" font-size="9" font-weight="600" fill="#1b2a4a" text-anchor="middle">5. allocate 循环申请 Container</text>
  <text x="500" y="471" font-size="8.2" fill="#5b7db1" text-anchor="middle">ApplicationMasterService.java:390</text>
  <path d="M640,372 L610,442" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M390,458 L200,458" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="48" y="438" width="300" height="40" rx="8" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="198" y="456" font-size="9" font-weight="600" fill="#7a4d00" text-anchor="middle">6. startContainers 就地拉起任务</text>
  <text x="198" y="471" font-size="8.2" fill="#9a7328" text-anchor="middle">ContainerManagerImpl.java:996</text>

  <rect x="48" y="496" width="560" height="30" rx="7" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="328" y="516" font-size="9" fill="#0f5132" text-anchor="middle">7. 应用结束 finishApplicationMaster(:300) — RM 只管资源、AM 管应用逻辑</text>
</svg>
