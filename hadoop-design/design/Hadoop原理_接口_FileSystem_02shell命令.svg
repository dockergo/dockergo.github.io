<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="900" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">fs shell 与编程 API 同路:命令解析后经 FileSystem API 落地,再分成元数据 RPC 与数据两股</text>

  <rect x="40" y="58" width="360" height="52" rx="11" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="220" y="80" font-size="11" font-weight="600" fill="#3c1361" text-anchor="middle">hdfs dfs -put / -get / -ls</text>
  <text x="220" y="98" font-size="8.5" fill="#7c5aa6" text-anchor="middle">命令行入口(与 Java API 等价)</text>

  <rect x="460" y="58" width="400" height="52" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="660" y="80" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">FsShell(Tool) · FsShell.java:45</text>
  <text x="660" y="98" font-size="8.5" fill="#5b7db1" text-anchor="middle">registerCommands(:111) → 解析成 Command 对象</text>
  <path d="M400,84 L460,84" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="250" y="150" width="400" height="52" rx="11" fill="#f7f7f9" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="450" y="172" font-size="11" font-weight="600" fill="#1d1d1f" text-anchor="middle">FileSystem API(统一门面) · FileSystem.java:172</text>
  <text x="450" y="190" font-size="8.5" fill="#6e6e73" text-anchor="middle">open / create / rename / delete / listStatus</text>
  <path d="M660,110 L660,130 L450,130 L450,150" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="270" y="128" font-size="8.5" fill="#a1a1a6">Java 程序也从这里进(同一条路)</text>

  <rect x="250" y="222" width="400" height="44" rx="10" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="450" y="248" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">DFSClient · DFSClient.java:215(委托自 DistributedFileSystem)</text>
  <path d="M450,202 L450,222" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 两股分流 -->
  <rect x="60" y="320" width="360" height="120" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="240" y="344" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">① 元数据 · ClientProtocol RPC</text>
  <rect x="80" y="356" width="320" height="30" rx="7" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="240" y="376" font-size="9" fill="#1b2a4a" text-anchor="middle">create / addBlock / complete / getBlockLocations</text>
  <rect x="80" y="392" width="320" height="34" rx="7" fill="#e7eefb" stroke="#bcd0ec"/>
  <text x="240" y="413" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">NameNode(只改命名空间元数据)</text>

  <rect x="480" y="320" width="360" height="120" rx="13" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="660" y="344" font-size="11" font-weight="600" fill="#7a4d00" text-anchor="middle">② 数据 · 直连 DataNode</text>
  <rect x="500" y="356" width="320" height="30" rx="7" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="660" y="376" font-size="9" fill="#7a4d00" text-anchor="middle">DFSOutputStream / DFSInputStream 走 pipeline</text>
  <rect x="500" y="392" width="320" height="34" rx="7" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="660" y="413" font-size="9.5" font-weight="600" fill="#7a4d00" text-anchor="middle">DataNode 群(数据字节永不经 NameNode)</text>

  <path d="M360,266 L240,320" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M540,266 L660,320" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="450" y="300" font-size="9" fill="#a1a1a6" text-anchor="middle">同一 DFSClient 分流</text>
</svg>
