  <rect x="410" y="122" width="140" height="126" rx="10" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="480" y="142" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">FsVolumeImpl /disk1</text>
  <rect x="422" y="152" width="116" height="26" rx="6" fill="#ffffff" stroke="#bce6cd"/><text x="480" y="169" font-size="8" fill="#0f5132" text-anchor="middle">finalized/blk_1</text>
  <rect x="422" y="184" width="116" height="26" rx="6" fill="#ffffff" stroke="#bce6cd"/><text x="480" y="201" font-size="8" fill="#0f5132" text-anchor="middle">finalized/blk_4</text>
  <rect x="422" y="216" width="116" height="24" rx="6" fill="#fff9ef" stroke="#efdcb4"/><text x="480" y="232" font-size="8" fill="#9a7328" text-anchor="middle">rbw/blk_7</text>

  <rect x="566" y="122" width="140" height="126" rx="10" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="636" y="142" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">FsVolumeImpl /disk2</text>
  <rect x="578" y="152" width="116" height="26" rx="6" fill="#ffffff" stroke="#bce6cd"/><text x="636" y="169" font-size="8" fill="#0f5132" text-anchor="middle">finalized/blk_2</text>
  <rect x="578" y="184" width="116" height="26" rx="6" fill="#ffffff" stroke="#bce6cd"/><text x="636" y="201" font-size="8" fill="#0f5132" text-anchor="middle">finalized/blk_5</text>

  <rect x="722" y="122" width="132" height="126" rx="10" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="788" y="142" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">FsVolumeImpl /disk3</text>
  <rect x="734" y="152" width="108" height="26" rx="6" fill="#ffffff" stroke="#bce6cd"/><text x="788" y="169" font-size="8" fill="#0f5132" text-anchor="middle">finalized/blk_3</text>
  <rect x="734" y="184" width="108" height="26" rx="6" fill="#ffffff" stroke="#bce6cd"/><text x="788" y="201" font-size="8" fill="#0f5132" text-anchor="middle">finalized/blk_6</text>

  <path d="M368,176 L392,176" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 写入生命周期 -->
  <rect x="30" y="300" width="860" height="132" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="48" y="324" font-size="11.5" font-weight="600" fill="#1b2a4a">块写入生命周期</text>
  <rect x="48" y="338" width="180" height="74" rx="9" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="138" y="362" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">createRbw</text>
  <text x="138" y="382" font-size="8.3" fill="#5b7db1" text-anchor="middle">选卷 → rbw 建临时副本</text>
  <text x="138" y="400" font-size="8.3" fill="#5b7db1" text-anchor="middle">pipeline 写字节</text>
  <rect x="290" y="338" width="180" height="74" rx="9" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="380" y="362" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">finalizeBlock</text>
