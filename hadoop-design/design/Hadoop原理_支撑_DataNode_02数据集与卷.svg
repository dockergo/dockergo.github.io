  <text x="380" y="400" font-size="8.3" fill="#3f8f66" text-anchor="middle">BlockReceiver.java:1038</text>
  <rect x="532" y="338" width="180" height="74" rx="9" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="622" y="362" font-size="9.5" font-weight="600" fill="#7a4d00" text-anchor="middle">加入 volumeMap</text>
  <text x="622" y="382" font-size="8.3" fill="#9a7328" text-anchor="middle">内存索引更新</text>
  <rect x="774" y="338" width="94" height="74" rx="9" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="821" y="366" font-size="9" font-weight="600" fill="#3c1361" text-anchor="middle">增量汇报</text>
  <text x="821" y="386" font-size="8" fill="#7c5aa6" text-anchor="middle">告知 NN</text>
  <path d="M228,375 L290,375" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M470,375 L532,375" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M712,375 L774,375" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
