  <rect x="66" y="196" width="284" height="52" rx="9" fill="#ffffff" stroke="#efdcb4"/>
  <text x="208" y="218" font-size="9" font-weight="600" fill="#7a4d00" text-anchor="middle">选卷策略(轮询 / 可用空间)</text>
  <text x="208" y="236" font-size="8.3" fill="#9a7328" text-anchor="middle">新块分散到多盘,榨取多轴 IO 带宽</text>

