  </defs>
  <rect width="920" height="450" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">FsDatasetImpl 管多盘块存储:内存 volumeMap 索引 + 多卷分散 IO</text>

  <!-- DataNode -->
  <rect x="30" y="52" width="860" height="230" rx="14" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="48" y="74" font-size="12" font-weight="600" fill="#7a4d00">DataNode(DataNode.java:312) · data = FsDatasetSpi(:399)</text>

  <!-- volumeMap -->
  <rect x="48" y="88" width="320" height="176" rx="12" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="208" y="112" font-size="11" font-weight="600" fill="#7a4d00" text-anchor="middle">FsDatasetImpl(FsDatasetImpl.java:140)</text>
  <rect x="66" y="124" width="284" height="60" rx="9" fill="#ffffff" stroke="#efdcb4"/>
  <text x="208" y="146" font-size="9.5" font-weight="600" fill="#7a4d00" text-anchor="middle">ReplicaMap volumeMap(:271)</text>
  <text x="208" y="166" font-size="8.5" fill="#9a7328" text-anchor="middle">blockId → (所在卷, 状态, 字节数)</text>
