<svg xmlns="http://www.w3.org/2000/svg" width="960" height="480" viewBox="0 0 960 480"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="480" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">YARN 三权分立:RM 仲裁资源、AM 调度应用、NM 执行节点</text>

  <!-- RM -->
  <rect x="330" y="56" width="300" height="150" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="480" y="80" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">ResourceManager(ResourceManager.java:170)</text>
  <rect x="348" y="94" width="264" height="46" rx="9" fill="#e7eefb" stroke="#bcd0ec"/>
  <text x="480" y="114" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Scheduler(:219,createScheduler:532)</text>
  <text x="480" y="130" font-size="8.3" fill="#5b7db1" text-anchor="middle">纯分配 Container,不监控应用</text>
  <rect x="348" y="148" width="264" height="46" rx="9" fill="#e7eefb" stroke="#bcd0ec"/>
  <text x="480" y="168" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">ApplicationMasterService(:222)</text>
  <text x="480" y="184" font-size="8.3" fill="#5b7db1" text-anchor="middle">受理 AM 的 allocate 请求(:390)</text>

  <!-- AM -->
  <rect x="40" y="270" width="380" height="170" rx="13" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="230" y="294" font-size="11.5" font-weight="600" fill="#7a4d00" text-anchor="middle">NodeManager(含 AM 容器)</text>
  <rect x="58" y="308" width="344" height="56" rx="10" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="230" y="330" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">ApplicationMaster(如 MRAppMaster:180)</text>
  <text x="230" y="348" font-size="8.3" fill="#9a7328" text-anchor="middle">切分任务 · 申请资源 · 失败重试(懂业务)</text>
  <rect x="58" y="372" width="344" height="56" rx="10" fill="#ffffff" stroke="#efdcb4"/>
  <text x="230" y="394" font-size="9.5" font-weight="600" fill="#7a4d00" text-anchor="middle">NodeManager(NodeManager.java:100)</text>
  <text x="230" y="412" font-size="8.3" fill="#9a7328" text-anchor="middle">NodeStatusUpdater(:141) 周期心跳报资源</text>

  <!-- NM 执行 -->
  <rect x="540" y="270" width="380" height="170" rx="13" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="730" y="294" font-size="11.5" font-weight="600" fill="#7a4d00" text-anchor="middle">NodeManager(执行任务)</text>
  <rect x="558" y="308" width="344" height="56" rx="10" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="730" y="330" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">ContainerManagerImpl(:195)</text>
  <text x="730" y="348" font-size="8.3" fill="#9a7328" text-anchor="middle">startContainers(:996) 就地拉起进程</text>
  <rect x="558" y="372" width="164" height="56" rx="9" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="640" y="404" font-size="9" font-weight="600" fill="#0f5132" text-anchor="middle">Container: Task</text>
  <rect x="738" y="372" width="164" height="56" rx="9" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="820" y="404" font-size="9" font-weight="600" fill="#0f5132" text-anchor="middle">Container: Task</text>

  <!-- 三方箭头 -->
  <path d="M420,340 L330,180" stroke="#c7c7cc" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>
  <text x="330" y="250" font-size="8.5" font-weight="600" fill="#1b2a4a">② AM allocate 申请</text>
  <path d="M480,206 L230,308" stroke="#c7c7cc" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>
  <text x="300" y="240" font-size="8.5" fill="#7a4d00">分配 Container →</text>
  <path d="M600,400 L630,206" stroke="#c7c7cc" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>
  <text x="612" y="250" font-size="8.5" fill="#7a4d00">① NM 心跳报资源</text>
  <path d="M420,394 L540,394" stroke="#c7c7cc" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>
  <text x="480" y="386" font-size="8.5" fill="#9a7328" text-anchor="middle">③ AM 请 NM 启任务</text>

  <rect x="30" y="216" width="900" height="38" rx="10" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="480" y="240" font-size="9.5" fill="#3c1361" text-anchor="middle">RM 不监控应用内部:AM 挂了 RM 重启 AM,但 Task 级失败由 AM 自己处理 —— 与老 MRv1 JobTracker 的根本区别</text>
</svg>
