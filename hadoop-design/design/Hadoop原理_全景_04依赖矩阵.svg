<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="440" viewBox="0 0 1000 440"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
  </defs>
  <rect width="1000" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">依赖矩阵:3 接触面主线 × 8 支撑能力域(● 强依赖 · ◐ 中 · ○ 弱)</text>

  <!-- 列头 -->
  <text x="240" y="72" font-size="8.8" font-weight="600" fill="#1b2a4a" text-anchor="middle">NameNode<tspan x="240" dy="12">元数据</tspan></text>
  <text x="344" y="72" font-size="8.8" font-weight="600" fill="#1b2a4a" text-anchor="middle">DataNode<tspan x="344" dy="12">块存储</tspan></text>
  <text x="448" y="72" font-size="8.8" font-weight="600" fill="#1b2a4a" text-anchor="middle">块放置<tspan x="448" dy="12">与复制</tspan></text>
  <text x="552" y="72" font-size="8.8" font-weight="600" fill="#1b2a4a" text-anchor="middle">Pipeline<tspan x="552" dy="12">写</tspan></text>
  <text x="656" y="72" font-size="8.8" font-weight="600" fill="#1b2a4a" text-anchor="middle">心跳与<tspan x="656" dy="12">块汇报</tspan></text>
  <text x="760" y="72" font-size="8.8" font-weight="600" fill="#1b2a4a" text-anchor="middle">HA<tspan x="760" dy="12">高可用</tspan></text>
  <text x="864" y="72" font-size="8.8" font-weight="600" fill="#1b2a4a" text-anchor="middle">YARN<tspan x="864" dy="12">调度</tspan></text>
  <text x="948" y="72" font-size="8.8" font-weight="600" fill="#1b2a4a" text-anchor="middle">MR/<tspan x="948" dy="12">运维</tspan></text>

  <!-- 行1 文件系统API -->
  <rect x="30" y="96" width="158" height="88" rx="9" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="109" y="136" font-size="10" font-weight="600" fill="#3c1361" text-anchor="middle">文件系统 API</text>
  <text x="109" y="153" font-size="8.5" fill="#7c5aa6" text-anchor="middle">与 fs shell</text>
  <g font-size="16" text-anchor="middle">
    <rect x="196" y="96" width="88" height="88" rx="8" fill="#dfeafb" stroke="#bcd0ec"/><text x="240" y="146" fill="#1b2a4a">●</text>
    <rect x="300" y="96" width="88" height="88" rx="8" fill="#dfeafb" stroke="#bcd0ec"/><text x="344" y="146" fill="#1b2a4a">●</text>
    <rect x="404" y="96" width="88" height="88" rx="8" fill="#dfeafb" stroke="#bcd0ec"/><text x="448" y="146" fill="#1b2a4a">●</text>
    <rect x="508" y="96" width="88" height="88" rx="8" fill="#dfeafb" stroke="#bcd0ec"/><text x="552" y="146" fill="#1b2a4a">●</text>
    <rect x="612" y="96" width="88" height="88" rx="8" fill="#eef3fb" stroke="#cfe0f2"/><text x="656" y="146" fill="#5b7db1">◐</text>
    <rect x="716" y="96" width="88" height="88" rx="8" fill="#eef3fb" stroke="#cfe0f2"/><text x="760" y="146" fill="#5b7db1">◐</text>
    <rect x="820" y="96" width="88" height="88" rx="8" fill="#f4f4f6" stroke="#e2e2e7"/><text x="864" y="146" fill="#c7c7cc">○</text>
    <rect x="912" y="96" width="76" height="88" rx="8" fill="#f4f4f6" stroke="#e2e2e7"/><text x="948" y="146" fill="#c7c7cc">○</text>
  </g>

  <!-- 行2 YARN应用提交 -->
  <rect x="30" y="192" width="158" height="88" rx="9" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="109" y="232" font-size="10" font-weight="600" fill="#3c1361" text-anchor="middle">YARN 应用提交</text>
  <text x="109" y="249" font-size="8.5" fill="#7c5aa6" text-anchor="middle">YarnClient</text>
  <g font-size="16" text-anchor="middle">
    <rect x="196" y="192" width="88" height="88" rx="8" fill="#eef3fb" stroke="#cfe0f2"/><text x="240" y="242" fill="#5b7db1">◐</text>
    <rect x="300" y="192" width="88" height="88" rx="8" fill="#f4f4f6" stroke="#e2e2e7"/><text x="344" y="242" fill="#c7c7cc">○</text>
    <rect x="404" y="192" width="88" height="88" rx="8" fill="#f4f4f6" stroke="#e2e2e7"/><text x="448" y="242" fill="#c7c7cc">○</text>
    <rect x="508" y="192" width="88" height="88" rx="8" fill="#f4f4f6" stroke="#e2e2e7"/><text x="552" y="242" fill="#c7c7cc">○</text>
    <rect x="612" y="192" width="88" height="88" rx="8" fill="#f4f4f6" stroke="#e2e2e7"/><text x="656" y="242" fill="#c7c7cc">○</text>
    <rect x="716" y="192" width="88" height="88" rx="8" fill="#f4f4f6" stroke="#e2e2e7"/><text x="760" y="242" fill="#c7c7cc">○</text>
    <rect x="820" y="192" width="88" height="88" rx="8" fill="#dfeafb" stroke="#bcd0ec"/><text x="864" y="242" fill="#1b2a4a">●</text>
    <rect x="912" y="192" width="76" height="88" rx="8" fill="#eef3fb" stroke="#cfe0f2"/><text x="948" y="242" fill="#5b7db1">◐</text>
  </g>

  <!-- 行3 MapReduce作业 -->
  <rect x="30" y="288" width="158" height="88" rx="9" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="109" y="328" font-size="10" font-weight="600" fill="#3c1361" text-anchor="middle">MapReduce 作业</text>
  <text x="109" y="345" font-size="8.5" fill="#7c5aa6" text-anchor="middle">Job.submit</text>
  <g font-size="16" text-anchor="middle">
    <rect x="196" y="288" width="88" height="88" rx="8" fill="#dfeafb" stroke="#bcd0ec"/><text x="240" y="338" fill="#1b2a4a">●</text>
    <rect x="300" y="288" width="88" height="88" rx="8" fill="#dfeafb" stroke="#bcd0ec"/><text x="344" y="338" fill="#1b2a4a">●</text>
    <rect x="404" y="288" width="88" height="88" rx="8" fill="#eef3fb" stroke="#cfe0f2"/><text x="448" y="338" fill="#5b7db1">◐</text>
    <rect x="508" y="288" width="88" height="88" rx="8" fill="#eef3fb" stroke="#cfe0f2"/><text x="552" y="338" fill="#5b7db1">◐</text>
    <rect x="612" y="288" width="88" height="88" rx="8" fill="#f4f4f6" stroke="#e2e2e7"/><text x="656" y="338" fill="#c7c7cc">○</text>
    <rect x="716" y="288" width="88" height="88" rx="8" fill="#f4f4f6" stroke="#e2e2e7"/><text x="760" y="338" fill="#c7c7cc">○</text>
    <rect x="820" y="288" width="88" height="88" rx="8" fill="#dfeafb" stroke="#bcd0ec"/><text x="864" y="338" fill="#1b2a4a">●</text>
    <rect x="912" y="288" width="76" height="88" rx="8" fill="#dfeafb" stroke="#bcd0ec"/><text x="948" y="338" fill="#1b2a4a">●</text>
  </g>

  <text x="30" y="404" font-size="9.5" fill="#6e6e73">读横行:该接触面依赖哪些能力域。文件系统 API 强依赖存储四件套(元数据/块存储/放置/pipeline);MapReduce 因数据本地性同时强依赖 HDFS 存储与 YARN 调度。</text>
  <text x="30" y="424" font-size="9.5" fill="#6e6e73">灵魂列:NameNode 元数据与心跳/块汇报被最多接触面依赖 —— 漏了它们,Hadoop 文档就是散的。</text>
</svg>
