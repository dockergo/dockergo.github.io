<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="780" viewBox="0 0 1040 780"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1040" height="780" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Apache Hadoop 总架构 · 存储平面(HDFS) + 计算平面(YARN/MapReduce) · 主控管元数据、数据分块多副本</text>

  <!-- 顶部说明条 -->
  <rect x="30" y="44" width="980" height="40" rx="11" fill="#f6f6f8" stroke="#e2e2e7"/>
  <text x="46" y="61" font-size="10.5" font-weight="600" fill="#1d1d1f">家族 4 · 分布式存储/文件系统</text>
  <text x="240" y="61" font-size="10" fill="#494950">灵魂 = NameNode 元数据(FsImage + EditLog) + DataNode 块存储 + 心跳/块汇报对账;YARN 在其上做资源调度、MapReduce 是计算范式</text>
  <text x="46" y="77" font-size="9" fill="#86868b">核实基准:apache/hadoop commit ca28186c · 块 128MB · 副本 3 · 心跳 3s · 全量块汇报 6h</text>

  <!-- 接触面 band -->
  <text x="30" y="106" font-size="10.5" font-weight="600" fill="#3c1361">接触面 · 外部如何与 Hadoop 交互</text>
  <rect x="40" y="114" width="232" height="42" rx="9" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="156" y="132" font-size="10.5" font-weight="600" fill="#3c1361" text-anchor="middle">FileSystem API</text>
  <text x="156" y="148" font-size="8.5" fill="#7c5aa6" text-anchor="middle">DistributedFileSystem / FSDataOutputStream</text>
  <rect x="284" y="114" width="232" height="42" rx="9" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="400" y="132" font-size="10.5" font-weight="600" fill="#3c1361" text-anchor="middle">fs shell</text>
  <text x="400" y="148" font-size="8.5" fill="#7c5aa6" text-anchor="middle">hdfs dfs -put / -get(FsShell)</text>
  <rect x="528" y="114" width="232" height="42" rx="9" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="644" y="132" font-size="10.5" font-weight="600" fill="#3c1361" text-anchor="middle">YARN Client</text>
  <text x="644" y="148" font-size="8.5" fill="#7c5aa6" text-anchor="middle">提交应用 → ResourceManager</text>
  <rect x="772" y="114" width="228" height="42" rx="9" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="886" y="132" font-size="10.5" font-weight="600" fill="#3c1361" text-anchor="middle">MapReduce Job</text>
  <text x="886" y="148" font-size="8.5" fill="#7c5aa6" text-anchor="middle">Job.submit → MRAppMaster</text>

  <!-- HDFS 平面容器 -->
  <rect x="30" y="172" width="980" height="292" rx="14" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="46" y="192" font-size="12" font-weight="600" fill="#1b2a4a">HDFS · 分布式文件系统(存储平面)</text>

  <!-- NameNode -->
  <rect x="44" y="202" width="452" height="176" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="62" y="224" font-size="12" font-weight="600" fill="#1b2a4a">NameNode(主控 · 单一命名空间权威)</text>
  <rect x="60" y="234" width="420" height="36" rx="8" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="270" y="250" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">命名空间树 · FSDirectory / INode(全内存)</text>
  <text x="270" y="264" font-size="8.5" fill="#5b7db1" text-anchor="middle">文件→块列表、目录、权限、租约 LeaseManager</text>
  <rect x="60" y="276" width="420" height="36" rx="8" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="270" y="292" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">元数据持久化 · FsImage + EditLog</text>
  <text x="270" y="306" font-size="8.5" fill="#5b7db1" text-anchor="middle">快照 + 预写日志;检查点合并(FSImageFormatProtobuf)</text>
  <rect x="60" y="318" width="420" height="48" rx="8" fill="#e7eefb" stroke="#bcd0ec"/>
  <text x="270" y="337" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">BlockManager · 块↔DataNode 映射(重建于内存)</text>
  <text x="270" y="353" font-size="8.5" fill="#5b7db1" text-anchor="middle">块放置策略 + 复制/纠删监控 RedundancyMonitor</text>

  <!-- HA -->
  <rect x="512" y="202" width="484" height="176" rx="13" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="530" y="224" font-size="12" font-weight="600" fill="#0f5132">HA 高可用(Active / Standby 双 NameNode)</text>
  <rect x="528" y="234" width="452" height="34" rx="8" fill="#ffffff" stroke="#bce6cd"/>
  <text x="754" y="255" font-size="9" fill="#0f5132" text-anchor="middle">Standby NameNode · EditLogTailer 追日志、StandbyCheckpointer 做检查点</text>
  <rect x="528" y="274" width="452" height="34" rx="8" fill="#ffffff" stroke="#bce6cd"/>
  <text x="754" y="295" font-size="9" fill="#0f5132" text-anchor="middle">JournalNode 仲裁(JN×3):EditLog 写多数派(QuorumJournalManager)</text>
  <rect x="528" y="314" width="452" height="52" rx="8" fill="#e6f6ee" stroke="#bce6cd"/>
  <text x="754" y="334" font-size="9" font-weight="600" fill="#0f5132" text-anchor="middle">ZKFC + ZooKeeper · 健康监控 + 自动故障切换</text>
  <text x="754" y="352" font-size="8.5" fill="#3f8f66" text-anchor="middle">抢锁选主、fencing 防脑裂;DataNode 同时向两 NN 汇报</text>

  <!-- 心跳/块汇报 对账 strip -->
  <rect x="44" y="388" width="952" height="24" rx="7" fill="#fff4e0" stroke="#f0dcae"/>
  <text x="520" y="404" font-size="9.5" font-weight="600" fill="#7a4d00" text-anchor="middle">DataNode ⇄ NameNode 心跳(3s,携命令) + 块汇报(全量 6h / 增量即时) → 对账内存块映射</text>

  <!-- DataNodes row -->
  <rect x="44" y="418" width="476" height="38" rx="9" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="282" y="435" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">DataNode ×N · 块存储 FsDatasetImpl</text>
  <text x="282" y="449" font-size="8.5" fill="#9a7328" text-anchor="middle">block 文件 + .meta 校验和;finalized / rbw 目录;块扫描</text>
  <rect x="528" y="418" width="468" height="38" rx="9" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="762" y="435" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">pipeline 写:client → DN1 → DN2 → DN3</text>
  <text x="762" y="449" font-size="8.5" fill="#9a7328" text-anchor="middle">packet 流水 + ack 反向回传;DataXceiver.writeBlock</text>

  <!-- 连线 DN->NN -->
  <path d="M270,418 L270,412" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M270,388 L270,368" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- YARN 平面容器 -->
  <rect x="30" y="478" width="980" height="286" rx="14" fill="#f5faf6" stroke="#e2ece5"/>
  <text x="46" y="498" font-size="12" font-weight="600" fill="#1b2a4a">YARN · 资源管理与调度(计算平面) + MapReduce 计算范式</text>

  <!-- ResourceManager -->
  <rect x="44" y="508" width="452" height="150" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="62" y="530" font-size="12" font-weight="600" fill="#1b2a4a">ResourceManager(集群资源仲裁)</text>
  <rect x="60" y="540" width="420" height="46" rx="8" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="270" y="559" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Scheduler · CapacityScheduler / FairScheduler</text>
  <text x="270" y="575" font-size="8.5" fill="#5b7db1" text-anchor="middle">按队列/容量分配 Container(纯分配、不监控应用)</text>
  <rect x="60" y="592" width="420" height="46" rx="8" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="270" y="611" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">ApplicationsManager · 管 AM 生命周期</text>
  <text x="270" y="627" font-size="8.5" fill="#5b7db1" text-anchor="middle">受理提交、启动首个 Container 跑 ApplicationMaster</text>

  <!-- MapReduce + 运维 -->
  <rect x="512" y="508" width="484" height="70" rx="13" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="530" y="530" font-size="12" font-weight="600" fill="#1d1d1f">MapReduce on YARN</text>
  <text x="530" y="550" font-size="9" fill="#494950">MRAppMaster 作为 AM 向 RM 申请 Container、调度 Map/Reduce Task</text>
  <text x="530" y="567" font-size="8.5" fill="#86868b">Map(本地读 HDFS 块)→ shuffle → Reduce;计算就近数据</text>

  <!-- 运维 strip -->
  <rect x="512" y="586" width="484" height="52" rx="13" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="530" y="608" font-size="11" font-weight="600" fill="#7a4d00">运维扩展:Balancer · Federation(Router-RBF)</text>
  <text x="530" y="626" font-size="8.5" fill="#9a7328">Balancer 均衡各 DN 利用率;Router 挂载多命名空间横向扩展</text>

  <!-- NodeManager row -->
  <rect x="44" y="676" width="308" height="72" rx="11" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="198" y="696" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">NodeManager #1</text>
  <rect x="60" y="704" width="276" height="34" rx="7" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="198" y="725" font-size="8.5" fill="#7a4d00" text-anchor="middle">Container: AM = MRAppMaster</text>
  <rect x="366" y="676" width="308" height="72" rx="11" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="520" y="696" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">NodeManager #2</text>
  <rect x="382" y="704" width="276" height="34" rx="7" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="520" y="725" font-size="8.5" fill="#7a4d00" text-anchor="middle">Container: Map / Reduce Task</text>
  <rect x="688" y="676" width="308" height="72" rx="11" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="842" y="696" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">NodeManager #3</text>
  <rect x="704" y="704" width="276" height="34" rx="7" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="842" y="725" font-size="8.5" fill="#7a4d00" text-anchor="middle">Container: Reduce Task</text>

  <!-- 连线 NM->RM -->
  <path d="M270,676 L270,662" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
</svg>
