<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="aHot" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="aState" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c99a3a"/></marker>
    <marker id="aCtl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
  </defs>
  <rect width="1080" height="720" fill="#fbfbfd"/>

  <!-- ===== 标题带 ===== -->
  <text x="30" y="28" font-size="14" font-weight="600" fill="#1d1d1f">Hadoop 总架构 · 多视角透视：主控管元数据，数据节点存块；HDFS 存储面 + YARN 计算面</text>
  <text x="30" y="45" font-size="10.5" fill="#6e6e73">两平面各一主控：NameNode / ResourceManager 只管元数据与调度；DataNode / NodeManager 干活。块 128MB · 副本 3 · 心跳 3s　源码基准 Apache Hadoop 3.x</text>

  <!-- ===== 图例：三型语义路径 ===== -->
  <line x1="40" y1="64" x2="70" y2="64" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aHot)"/>
  <text x="76" y="68" font-size="10.5" fill="#3a3a3c">数据流 Hot（客户端直连 DataNode）</text>
  <line x1="300" y1="64" x2="330" y2="64" stroke="#c99a3a" stroke-width="1.8" marker-end="url(#aState)"/>
  <text x="336" y="68" font-size="10.5" fill="#3a3a3c">副本 pipeline State（DN→DN 流水）</text>
  <line x1="560" y1="64" x2="590" y2="64" stroke="#5b7db1" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aCtl)"/>
  <text x="596" y="68" font-size="10.5" fill="#3a3a3c">心跳 / 块汇报 / 元数据 RPC Control（虚线）</text>
  <text x="1056" y="68" font-size="10" fill="#a1a1a6" text-anchor="end">框 = 主线可下钻</text>

  <!-- ===== 接触面 ===== -->
  <rect x="24" y="82" width="1032" height="52" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="40" y="102" font-size="11.5" font-weight="600" fill="#5a3d78">接触面 · 外部如何用 Hadoop</text>
  <text x="40" y="119" font-size="9" fill="#8a6db0">客户端一次访问分两路：找 NameNode 要元数据、直连 DataNode 搬字节</text>
  <g text-anchor="middle" font-size="9">
    <rect x="470" y="92" width="180" height="32" rx="8" fill="#fff" stroke="#e2d2ee" data-tid="Hadoop原理_接口_FileSystem与Shell" data-lab="FileSystem API / fs shell"/><text x="560" y="112" fill="#5a3d78">FileSystem API / fs shell</text>
    <rect x="660" y="92" width="180" height="32" rx="8" fill="#fff" stroke="#e2d2ee" data-tid="Hadoop原理_接口_YARN应用提交" data-lab="YARN Client"/><text x="750" y="112" fill="#5a3d78">YARN Client · 提交应用</text>
    <rect x="850" y="92" width="190" height="32" rx="8" fill="#fff" stroke="#e2d2ee" data-tid="Hadoop原理_支撑_MapReduce执行" data-lab="MapReduce Job"/><text x="945" y="112" fill="#5a3d78">MapReduce Job · Job.submit</text>
  </g>

  <!-- ===== HDFS 存储面 ===== -->
  <rect x="24" y="146" width="1032" height="268" rx="16" fill="#f3f7fc" stroke="#d3e2f2"/>
  <text x="40" y="166" font-size="11.5" font-weight="600" fill="#1b2a4a">HDFS 存储面</text>

  <!-- NameNode 控制 -->
  <rect x="60" y="176" width="450" height="146" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="74" y="196" font-size="11" font-weight="600" fill="#1b2a4a">控制面 · NameNode（元数据权威 · 不存数据）</text>
  <g text-anchor="middle" font-size="9">
    <rect x="74" y="204" width="422" height="34" rx="8" fill="#fff" stroke="#bcd0ec" data-tid="Hadoop原理_支撑_NameNode命名空间与元数据" data-lab="命名空间树"/><text x="285" y="219" font-weight="600" fill="#1b2a4a">命名空间树 · FSDirectory / INode（全内存）</text><text x="285" y="232" fill="#5b7db1" font-size="8">文件→块列表 · 目录 · 租约</text>
    <rect x="74" y="242" width="422" height="34" rx="8" fill="#fff" stroke="#bcd0ec" data-tid="Hadoop原理_支撑_NameNode命名空间与元数据" data-lab="FsImage+EditLog"/><text x="285" y="257" font-weight="600" fill="#1b2a4a">元数据持久化 · FsImage + EditLog</text><text x="285" y="270" fill="#5b7db1" font-size="8">快照 + 预写日志 · 先日志后内存</text>
    <rect x="74" y="280" width="422" height="34" rx="8" fill="#e7eefb" stroke="#bcd0ec" data-tid="Hadoop原理_支撑_块放置与复制策略" data-lab="BlockManager"/><text x="285" y="295" font-weight="600" fill="#1b2a4a">BlockManager · 块↔DataNode 映射</text><text x="285" y="308" fill="#5b7db1" font-size="8">块放置 · 一近两远 · 复制监控</text>
  </g>

  <!-- HA -->
  <rect x="524" y="176" width="510" height="146" rx="13" fill="#eafaf1" stroke="#b8e6cd" filter="url(#soft)"/>
  <text x="538" y="196" font-size="11" font-weight="600" fill="#1c6b45">HA · Active / Standby 双 NameNode</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="538" y="204" width="482" height="32" rx="8" fill="#fff" stroke="#b8e6cd" data-tid="Hadoop原理_支撑_HA高可用" data-lab="Standby NN"/><text x="779" y="224" fill="#1c6b45">Standby NN · 追 EditLog + 做检查点</text>
    <rect x="538" y="242" width="482" height="32" rx="8" fill="#fff" stroke="#b8e6cd" data-tid="Hadoop原理_支撑_HA高可用" data-lab="JournalNode"/><text x="779" y="262" fill="#1c6b45">JournalNode×3 · EditLog 写多数派</text>
    <rect x="538" y="280" width="482" height="34" rx="8" fill="#e6f7ee" stroke="#a8dfc0" data-tid="Hadoop原理_支撑_HA高可用" data-lab="ZKFC 切换"/><text x="779" y="295" font-weight="600" fill="#1c6b45">ZKFC + ZooKeeper · 选主切换</text><text x="779" y="308" fill="#3a9b6e" font-size="8">fencing 防脑裂 · DN 双报</text>
  </g>

  <!-- 心跳/块汇报 对账 strip -->
  <rect x="60" y="330" width="974" height="24" rx="7" fill="#fff4e0" stroke="#f0dcae" data-tid="Hadoop原理_支撑_心跳与块汇报对账" data-lab="心跳 + 块汇报对账"/>
  <text x="547" y="346" font-size="9" font-weight="600" fill="#7a4d00" text-anchor="middle">DataNode ⇄ NameNode 心跳(3s · 携命令) + 块汇报(全量 6h / 增量即时) → 对账内存块映射</text>

  <!-- DataNode 数据 -->
  <rect x="60" y="360" width="450" height="42" rx="10" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)" data-tid="Hadoop原理_支撑_DataNode块存储" data-lab="DataNode 块存储"/>
  <text x="285" y="378" font-size="10" font-weight="600" fill="#5a3410" text-anchor="middle">数据面 · DataNode ×N · 块存储</text>
  <text x="285" y="393" font-size="8.5" fill="#93762e" text-anchor="middle">block + .meta 校验和 · FsDatasetImpl 多卷</text>
  <rect x="524" y="360" width="510" height="42" rx="10" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)" data-tid="Hadoop原理_支撑_Pipeline写数据流" data-lab="Pipeline 写数据流"/>
  <text x="779" y="378" font-size="10" font-weight="600" fill="#5a3410" text-anchor="middle">Pipeline 写 · client → DN1 → DN2 → DN3</text>
  <text x="779" y="393" font-size="8.5" fill="#93762e" text-anchor="middle">packet 流水 + ack 反向回传 · 副本落地</text>

  <!-- ===== YARN 计算面 ===== -->
  <rect x="24" y="426" width="1032" height="246" rx="16" fill="#f5faf6" stroke="#dfeae2"/>
  <text x="40" y="446" font-size="11.5" font-weight="600" fill="#1b2a4a">YARN 计算面</text>

  <!-- ResourceManager 控制 -->
  <rect x="60" y="456" width="450" height="120" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="74" y="476" font-size="11" font-weight="600" fill="#1b2a4a">控制面 · ResourceManager（资源仲裁）</text>
  <g text-anchor="middle" font-size="9">
    <rect x="74" y="486" width="422" height="38" rx="8" fill="#fff" stroke="#bcd0ec" data-tid="Hadoop原理_支撑_YARN资源调度" data-lab="Scheduler"/><text x="285" y="504" font-weight="600" fill="#1b2a4a">Scheduler · Capacity / Fair</text><text x="285" y="518" fill="#5b7db1" font-size="8">按队列分配 Container · 纯分配不监控</text>
    <rect x="74" y="530" width="422" height="38" rx="8" fill="#fff" stroke="#bcd0ec" data-tid="Hadoop原理_支撑_YARN资源调度" data-lab="ApplicationsManager"/><text x="285" y="548" font-weight="600" fill="#1b2a4a">ApplicationsManager · 管 AM 生命周期</text><text x="285" y="562" fill="#5b7db1" font-size="8">受理提交 · 启动首个 Container 跑 AM</text>
  </g>

  <!-- MapReduce + 运维 -->
  <rect x="524" y="456" width="510" height="56" rx="13" fill="#fff" stroke="#e2e2e7" filter="url(#soft)" data-tid="Hadoop原理_支撑_MapReduce执行" data-lab="MapReduce on YARN"/>
  <text x="538" y="477" font-size="11" font-weight="600" fill="#1d1d1f">MapReduce on YARN · MRAppMaster 是一种 AM</text>
  <text x="538" y="497" font-size="8.5" fill="#86868b">Map（就近读 HDFS 块）→ shuffle → Reduce · 计算贴数据</text>
  <rect x="524" y="520" width="510" height="56" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)" data-tid="Hadoop原理_支撑_Balancer与Federation" data-lab="Balancer / Federation"/>
  <text x="538" y="541" font-size="11" font-weight="600" fill="#5a3410">运维扩展 · Balancer / Federation(RBF)</text>
  <text x="538" y="561" font-size="8.5" fill="#93762e">Balancer 均衡 DN 利用率 · Router 挂多命名空间横向扩展</text>

  <!-- NodeManager 数据 -->
  <rect x="60" y="586" width="300" height="56" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)" data-tid="Hadoop原理_支撑_YARN资源调度" data-lab="NodeManager"/>
  <text x="210" y="606" font-size="10" font-weight="600" fill="#5a3410" text-anchor="middle">数据面 · NodeManager #1</text>
  <text x="210" y="627" font-size="8.5" fill="#93762e" text-anchor="middle">Container：AM = MRAppMaster</text>
  <rect x="372" y="586" width="300" height="56" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)" data-tid="Hadoop原理_支撑_YARN资源调度" data-lab="NodeManager"/>
  <text x="522" y="606" font-size="10" font-weight="600" fill="#5a3410" text-anchor="middle">NodeManager #2</text>
  <text x="522" y="627" font-size="8.5" fill="#93762e" text-anchor="middle">Container：Map / Reduce Task</text>
  <rect x="684" y="586" width="350" height="56" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)" data-tid="Hadoop原理_支撑_YARN资源调度" data-lab="NodeManager"/>
  <text x="859" y="606" font-size="10" font-weight="600" fill="#5a3410" text-anchor="middle">NodeManager #3</text>
  <text x="859" y="627" font-size="8.5" fill="#93762e" text-anchor="middle">Container：Reduce Task</text>

  <!-- ===== 语义分型连线 ===== -->
  <!-- Control：元数据 RPC → NameNode -->
  <path d="M560,134 L560,158 L285,158 L285,176" stroke="#5b7db1" stroke-width="1.6" stroke-dasharray="5 3" fill="none" marker-end="url(#aCtl)"/>
  <text x="360" y="153" font-size="8" fill="#5b7db1">元数据 RPC：create / open / addBlock</text>
  <!-- Hot：数据字节直连 DataNode（绕开 NameNode） -->
  <path d="M470,134 L470,142 L42,142 L42,381 L60,381" stroke="#2f9e6e" stroke-width="1.6" fill="none" marker-end="url(#aHot)"/>
  <text x="66" y="153" font-size="8" fill="#2f9e6e">数据字节直连 DataNode（绕 NameNode）</text>
  <!-- Control：心跳↑ / 块汇报 → 对账 → BlockManager -->
  <line x1="270" y1="360" x2="270" y2="354" stroke="#5b7db1" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#aCtl)"/>
  <line x1="270" y1="330" x2="270" y2="316" stroke="#5b7db1" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#aCtl)"/>
  <text x="278" y="326" font-size="8" fill="#5b7db1">心跳 / 块汇报</text>
  <!-- State：DataNode → Pipeline 副本流水复制 -->
  <line x1="510" y1="381" x2="524" y2="381" stroke="#c99a3a" stroke-width="1.8" marker-end="url(#aState)"/>
  <!-- Control：提交应用 → ResourceManager -->
  <path d="M750,124 L750,132 L1044,132 L1044,436 L285,436 L285,456" stroke="#5b7db1" stroke-width="1.6" stroke-dasharray="5 3" fill="none" marker-end="url(#aCtl)"/>
  <text x="200" y="452" font-size="8" fill="#5b7db1">提交应用 submitApplication</text>
  <!-- Control：RM ↔ NodeManager 分配容器 / 心跳注册 -->
  <line x1="300" y1="576" x2="300" y2="586" stroke="#5b7db1" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aCtl)"/>
  <text x="308" y="583" font-size="8" fill="#5b7db1">分配 / 启动容器</text>
  <line x1="150" y1="586" x2="150" y2="576" stroke="#5b7db1" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#aCtl)"/>
  <text x="90" y="583" font-size="8" fill="#5b7db1">心跳注册</text>
  <!-- Hot：数据本地性 Map 就近读 HDFS 块（跨平面） -->
  <line x1="540" y1="426" x2="540" y2="402" stroke="#2f9e6e" stroke-width="1.6" marker-end="url(#aHot)"/>
  <text x="548" y="418" font-size="8" fill="#2f9e6e">数据本地性：Map 就近读 HDFS 块</text>

  <!-- ===== 读法 ===== -->
  <rect x="24" y="684" width="1032" height="28" rx="8" fill="#f7f7f9" stroke="#ececef" data-tid="Hadoop原理_全景主线框架" data-lab="全景读法"/>
  <text x="540" y="702" font-size="10" fill="#4a4a4f" text-anchor="middle">读法：写入先向 NameNode 要块位置（元数据 RPC）→ 客户端把字节直连 DataNode，DN1→DN2→DN3 流水复制三副本；DataNode 靠心跳 + 块汇报让 NameNode 对账。YARN 同构：RM 仲裁、NM 跑 Container。</text>
</svg>
