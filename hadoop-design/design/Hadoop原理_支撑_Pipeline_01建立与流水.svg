<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="960" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Pipeline 写:数据 packet 顺 DN1→DN2→DN3 流水复制,ack 反向逐级确认</text>

  <!-- client 侧队列 -->
  <rect x="30" y="56" width="270" height="180" rx="13" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="165" y="80" font-size="11" font-weight="600" fill="#3c1361" text-anchor="middle">Client · DFSOutputStream(:96)</text>
  <rect x="48" y="94" width="234" height="44" rx="9" fill="#faf4fb" stroke="#e4d3ee"/>
  <text x="165" y="114" font-size="9" font-weight="600" fill="#3c1361" text-anchor="middle">切成 packet(64KB) + chunk 校验和</text>
  <text x="165" y="130" font-size="8" fill="#7c5aa6" text-anchor="middle">HdfsClientConfigKeys.java:87</text>
  <rect x="48" y="146" width="112" height="36" rx="8" fill="#ffffff" stroke="#d9c9ef"/>
  <text x="104" y="169" font-size="8.5" font-weight="600" fill="#3c1361" text-anchor="middle">dataQueue</text>
  <rect x="170" y="146" width="112" height="36" rx="8" fill="#ffffff" stroke="#d9c9ef"/>
  <text x="226" y="169" font-size="8.5" font-weight="600" fill="#3c1361" text-anchor="middle">ackQueue</text>
  <text x="165" y="204" font-size="8.5" fill="#7c5aa6" text-anchor="middle">DataStreamer 线程发送(DataStreamer.java:696)</text>
  <text x="165" y="222" font-size="8.5" fill="#7c5aa6" text-anchor="middle">ResponseProcessor 收 ack(:1159)</text>

  <!-- addBlock -->
  <rect x="360" y="56" width="240" height="52" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="480" y="78" font-size="9.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">① addBlock 向 NameNode 申请</text>
  <text x="480" y="96" font-size="8.3" fill="#5b7db1" text-anchor="middle">新块 + 3 目标 DN(locateFollowingBlock:1831)</text>
  <path d="M300,90 L360,84" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <text x="660" y="86" font-size="9" fill="#86868b">② createBlockOutputStream(:1872) 建管</text>

  <!-- pipeline -->
  <rect x="360" y="150" width="180" height="70" rx="11" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="450" y="176" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">DN1</text>
  <text x="450" y="196" font-size="8" fill="#9a7328" text-anchor="middle">写本地 + 转发</text>
  <text x="450" y="211" font-size="7.5" fill="#9a7328" text-anchor="middle">DataXceiver.writeBlock:681</text>

  <rect x="600" y="150" width="160" height="70" rx="11" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="680" y="176" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">DN2</text>
  <text x="680" y="196" font-size="8" fill="#9a7328" text-anchor="middle">写本地 + 转发</text>
  <text x="680" y="211" font-size="7.5" fill="#9a7328" text-anchor="middle">receivePacket:552</text>

  <rect x="800" y="150" width="130" height="70" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="865" y="176" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">DN3</text>
  <text x="865" y="196" font-size="8" fill="#9a7328" text-anchor="middle">写本地(末端)</text>

  <path d="M300,160 L360,175" stroke="#3f8f66" stroke-width="2" fill="none" marker-end="url(#ar)"/>
  <path d="M540,175 L600,175" stroke="#3f8f66" stroke-width="2" fill="none" marker-end="url(#ar)"/>
  <path d="M760,175 L800,175" stroke="#3f8f66" stroke-width="2" fill="none" marker-end="url(#ar)"/>
  <text x="450" y="145" font-size="8.5" font-weight="600" fill="#0f5132">packet 数据流 →</text>

  <!-- ack 反向 -->
  <rect x="360" y="256" width="570" height="60" rx="11" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="645" y="280" font-size="10" font-weight="600" fill="#0f5132" text-anchor="middle">③ ack 反向:DN3→DN2→DN1→client(PacketResponder 逐级合并)</text>
  <text x="645" y="300" font-size="8.5" fill="#3f8f66" text-anchor="middle">BlockReceiver.PacketResponder(BlockReceiver.java:1252) · 全 ack = 3 副本都落地,packet 出 ackQueue</text>
  <path d="M800,240 L810,256" stroke="#c4341c" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>
  <path d="M680,240 L660,256" stroke="#c4341c" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>
  <path d="M450,240 L440,256" stroke="#c4341c" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>
  <path d="M360,286 L300,220" stroke="#c4341c" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>
  <text x="620" y="240" font-size="8.5" font-weight="600" fill="#c4341c">← ack 反向确认</text>

  <!-- 收尾 -->
  <rect x="30" y="340" width="900" height="140" rx="13" fill="#f7f7f9" stroke="#e2e2e7"/>
  <text x="48" y="364" font-size="11.5" font-weight="600" fill="#1d1d1f">要点</text>
  <text x="48" y="388" font-size="9.2" fill="#494950">· 串行流水而非并行:client 只出一份带宽,副本靠 DataNode 间转发完成(DN1 转 DN2、DN2 转 DN3)</text>
  <text x="48" y="410" font-size="9.2" fill="#494950">· 写满一个块或 close():finalizeBlock(BlockReceiver.java:1038) → client 回 NameNode complete 收尾</text>
  <text x="48" y="432" font-size="9.2" fill="#494950">· 未写满则回 ① 申请下一块,继续下一条 pipeline</text>
  <text x="48" y="454" font-size="9.2" fill="#c4341c">· write() 返回 ≠ 持久:需 hflush(到所有 DN 内存)/ hsync(强制刷盘)才保证</text>
</svg>
