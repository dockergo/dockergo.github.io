<svg xmlns="http://www.w3.org/2000/svg" width="900" height="330" viewBox="0 0 900 330" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="900" height="330" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">治理闭环：事前拦截 → 事中约束 → 事后审计</text>
  <rect x="370" y="46" width="160" height="38" rx="11" fill="#fbeaea" stroke="#e7c3c3" filter="url(#s)"/><text x="450" y="69" font-size="12.5" font-weight="600" fill="#4a1414" text-anchor="middle">Query / Load</text>

  <rect x="60" y="112" width="780" height="66" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#s)"/>
  <text x="80" y="134" font-size="12.5" font-weight="600" fill="#5a3410">① 事前拦截</text>
  <g text-anchor="middle" font-size="10.5" fill="#5a3410">
    <rect x="190" y="122" width="200" height="46" rx="9" fill="#fffdf7" stroke="#ecd9a8"/><text x="290" y="141">SQL Block Rule</text><text x="290" y="158" font-size="9" fill="#93762e">按扫描量/基数拦坏 SQL</text>
    <rect x="410" y="122" width="200" height="46" rx="9" fill="#fffdf7" stroke="#ecd9a8"/><text x="510" y="141">Admission 准入</text><text x="510" y="158" font-size="9" fill="#93762e">超限排队而非全涌入</text>
    <rect x="630" y="122" width="190" height="46" rx="9" fill="#fffdf7" stroke="#ecd9a8"/><text x="725" y="141">Timeout</text><text x="725" y="158" font-size="9" fill="#93762e">单查询超时保护</text>
  </g>

  <rect x="60" y="196" width="780" height="66" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#s)"/>
  <text x="80" y="218" font-size="12.5" font-weight="600" fill="#1b2a4a">② 事中约束</text>
  <g text-anchor="middle" font-size="10.5" fill="#1b2a4a">
    <rect x="190" y="206" width="200" height="46" rx="9" fill="#f7faff" stroke="#c9dbf1"/><text x="290" y="225">Workload Group</text><text x="290" y="242" font-size="9" fill="#5b7db1">CPU 软/硬限 · 内存配额</text>
    <rect x="410" y="206" width="200" height="46" rx="9" fill="#f7faff" stroke="#c9dbf1"/><text x="510" y="225">内存分级 + Spill</text><text x="510" y="242" font-size="9" fill="#5b7db1">背压→落盘→拒绝</text>
    <rect x="630" y="206" width="190" height="46" rx="9" fill="#f7faff" stroke="#c9dbf1"/><text x="725" y="225">并发 / 排队</text><text x="725" y="242" font-size="9" fill="#5b7db1">过载优雅降级</text>
  </g>

  <rect x="60" y="280" width="780" height="40" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#s)"/>
  <text x="80" y="305" font-size="12.5" font-weight="600" fill="#12402a">③ 事后审计</text>
  <text x="520" y="305" font-size="11" fill="#2f6f4f" text-anchor="middle">Audit Log（留痕）· Query Profile（算子画像）· Metrics（计量/告警）</text>

  <g stroke="#c7c7cc" stroke-width="1.5" fill="none"><line x1="450" y1="84" x2="450" y2="112" marker-end="url(#a)"/><line x1="450" y1="178" x2="450" y2="196" marker-end="url(#a)"/><line x1="450" y1="262" x2="450" y2="280" marker-end="url(#a)"/></g>
</svg>
