<svg xmlns="http://www.w3.org/2000/svg" width="760" height="470" viewBox="0 0 760 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="760" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">接口主线 × 能力域 依赖矩阵（●强依赖 · ○弱/间接 · 空 无关）</text>

  <!-- interface headers -->
  <g text-anchor="middle" font-size="12.5" font-weight="600" fill="#42246b">
    <rect x="210" y="56" width="126" height="40" rx="9" fill="#f4eefb" stroke="#e2d3f3"/><text x="273" y="81">DQL</text>
    <rect x="342" y="56" width="126" height="40" rx="9" fill="#f4eefb" stroke="#e2d3f3"/><text x="405" y="81">DML</text>
    <rect x="474" y="56" width="126" height="40" rx="9" fill="#f4eefb" stroke="#e2d3f3"/><text x="537" y="81">DDL</text>
    <rect x="606" y="56" width="126" height="40" rx="9" fill="#f4eefb" stroke="#e2d3f3"/><text x="669" y="81">DCL</text>
  </g>

  <!-- row labels (layer-colored) -->
  <g text-anchor="middle" font-size="12" font-weight="600">
    <rect x="30" y="104" width="174" height="44" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="117" y="131" fill="#12402a">元数据</text>
    <rect x="30" y="152" width="174" height="44" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="117" y="179" fill="#12402a">存储引擎</text>
    <rect x="30" y="200" width="174" height="44" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="117" y="227" fill="#1b2a4a">优化技术</text>
    <rect x="30" y="248" width="174" height="44" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="117" y="275" fill="#1b2a4a">执行引擎</text>
    <rect x="30" y="296" width="174" height="44" rx="9" fill="#fdf6ea" stroke="#efdcb4"/><text x="117" y="323" fill="#5a3410">事务一致性</text>
    <rect x="30" y="344" width="174" height="44" rx="9" fill="#fdf6ea" stroke="#efdcb4"/><text x="117" y="371" fill="#5a3410">资源与负载管理</text>
    <rect x="30" y="392" width="174" height="44" rx="9" fill="#fdf6ea" stroke="#efdcb4"/><text x="117" y="419" fill="#5a3410">集群自愈</text>
  </g>

  <!-- faint gridlines (no cell backgrounds) -->
  <g stroke="#ececf1" stroke-width="1">
    <line x1="210" y1="148" x2="732" y2="148"/><line x1="210" y1="196" x2="732" y2="196"/><line x1="210" y1="244" x2="732" y2="244"/><line x1="210" y1="292" x2="732" y2="292"/><line x1="210" y1="340" x2="732" y2="340"/><line x1="210" y1="388" x2="732" y2="388"/>
    <line x1="339" y1="104" x2="339" y2="436"/><line x1="471" y1="104" x2="471" y2="436"/><line x1="603" y1="104" x2="603" y2="436"/>
  </g>

  <!-- glyphs only (no backing rect): ●强#2f4a7c ○弱#8ba0c0 ·无#cfcfd6 -->
  <g text-anchor="middle" font-size="16">
    <!-- 元数据 ○ ○ ● ● -->
    <text x="273" y="132" fill="#8ba0c0">○</text><text x="405" y="132" fill="#8ba0c0">○</text><text x="537" y="132" fill="#2f4a7c">●</text><text x="669" y="132" fill="#2f4a7c">●</text>
    <!-- 存储引擎 ● ● ○ 空 -->
    <text x="273" y="180" fill="#2f4a7c">●</text><text x="405" y="180" fill="#2f4a7c">●</text><text x="537" y="180" fill="#8ba0c0">○</text><text x="669" y="180" font-size="13" fill="#cfcfd6">·</text>
    <!-- 优化技术 ● ○ 空 空 -->
    <text x="273" y="228" fill="#2f4a7c">●</text><text x="405" y="228" fill="#8ba0c0">○</text><text x="537" y="228" font-size="13" fill="#cfcfd6">·</text><text x="669" y="228" font-size="13" fill="#cfcfd6">·</text>
    <!-- 执行引擎 ● ● ○ 空 -->
    <text x="273" y="276" fill="#2f4a7c">●</text><text x="405" y="276" fill="#2f4a7c">●</text><text x="537" y="276" fill="#8ba0c0">○</text><text x="669" y="276" font-size="13" fill="#cfcfd6">·</text>
    <!-- 事务一致性 ○ ● ○ 空 -->
    <text x="273" y="324" fill="#8ba0c0">○</text><text x="405" y="324" fill="#2f4a7c">●</text><text x="537" y="324" fill="#8ba0c0">○</text><text x="669" y="324" font-size="13" fill="#cfcfd6">·</text>
    <!-- 资源与负载 ● ● ○ ● -->
    <text x="273" y="372" fill="#2f4a7c">●</text><text x="405" y="372" fill="#2f4a7c">●</text><text x="537" y="372" fill="#8ba0c0">○</text><text x="669" y="372" fill="#2f4a7c">●</text>
    <!-- 集群自愈 ○ ○ ○ 空 -->
    <text x="273" y="420" fill="#8ba0c0">○</text><text x="405" y="420" fill="#8ba0c0">○</text><text x="537" y="420" fill="#8ba0c0">○</text><text x="669" y="420" font-size="13" fill="#cfcfd6">·</text>
  </g>
  <g font-size="10.5" fill="#6e6e73"><text x="30" y="456">行色：底座(绿)/计算(蓝)/保障(琥珀)　列：接口主线　读法——DQL 强依赖 优化/执行/存储/资源，DCL 只强依赖 元数据/资源。</text></g>
</svg>
