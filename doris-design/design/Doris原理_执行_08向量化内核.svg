<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="380" viewBox="0 0 1000 380" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1000" height="380" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">向量化内核：为什么比逐行快 —— 列式 Block + 连续内存 + SIMD 批处理 + 列对象 COW</text>

  <!-- Block: columns as contiguous arrays -->
  <rect x="30" y="56" width="520" height="176" rx="13" fill="#f5faf6" stroke="#e2ece5" filter="url(#soft)"/>
  <text x="48" y="80" font-size="12" font-weight="600" fill="#2c5a3a">Block（一批行的列式表示 · 每列一个连续数组/列对象）</text>

  <!-- SIMD annotation on its own line, above the bracket -->
  <text x="237" y="104" font-size="9.5" fill="#a05411" text-anchor="middle">1 条 SIMD 指令并行处理 8 个值</text>
  <!-- SIMD bracket over 列A -->
  <path d="M110,122 L110,114 L364,114 L364,122" stroke="#c1962a" stroke-width="1.4" fill="none"/>

  <g font-size="10" text-anchor="middle" fill="#1b2a4a">
    <text x="70" y="140" text-anchor="start" fill="#5b7db1">列 A</text>
    <g>
      <rect x="110" y="126" width="30" height="22" fill="#eef3fb" stroke="#bcd0ec"/><rect x="142" y="126" width="30" height="22" fill="#eef3fb" stroke="#bcd0ec"/><rect x="174" y="126" width="30" height="22" fill="#eef3fb" stroke="#bcd0ec"/><rect x="206" y="126" width="30" height="22" fill="#eef3fb" stroke="#bcd0ec"/><rect x="238" y="126" width="30" height="22" fill="#eef3fb" stroke="#bcd0ec"/><rect x="270" y="126" width="30" height="22" fill="#eef3fb" stroke="#bcd0ec"/><rect x="302" y="126" width="30" height="22" fill="#eef3fb" stroke="#bcd0ec"/><rect x="334" y="126" width="30" height="22" fill="#eef3fb" stroke="#bcd0ec"/>
    </g>
    <text x="70" y="172" text-anchor="start" fill="#5b7db1">列 B</text>
    <g fill="#eafaf1"><rect x="110" y="158" width="254" height="22" fill="#eafaf1" stroke="#bfe0cd"/></g><text x="237" y="173" fill="#2f6f4f">连续内存（cache 友好）</text>
    <text x="70" y="204" text-anchor="start" fill="#5b7db1">列 C</text>
    <g><rect x="110" y="190" width="254" height="22" fill="#fdf6ea" stroke="#efdcb4"/></g><text x="237" y="205" fill="#5a3410">…</text>
  </g>

  <!-- SIMD explain -->
  <rect x="580" y="56" width="390" height="80" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/><text x="775" y="82" font-size="12" font-weight="600" fill="#5a3410" text-anchor="middle">SIMD 批处理</text><text x="775" y="104" font-size="10.5" fill="#93762e" text-anchor="middle">对连续列数组，一条向量指令算多值</text><text x="775" y="122" font-size="10.5" fill="#93762e" text-anchor="middle">filter / 比较 / 算术 批量执行</text>

  <!-- COW -->
  <rect x="580" y="152" width="390" height="80" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="775" y="178" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">列对象 COW（写时复制）</text><text x="775" y="200" font-size="10.5" fill="#5b7db1" text-anchor="middle">多算子共享同一不可变列引用</text><text x="775" y="218" font-size="10.5" fill="#5b7db1" text-anchor="middle">只有真正修改时才拷贝 → 省内存/拷贝</text>

  <!-- contrast bottom -->
  <rect x="30" y="256" width="470" height="100" rx="13" fill="#fbeaea" stroke="#e7c3c3"/>
  <text x="265" y="280" font-size="12" font-weight="600" fill="#4a1414" text-anchor="middle">逐行（火山/标量）</text>
  <g font-size="10.5" fill="#7a2a2a"><text x="52" y="304">· 一次处理一行一值</text><text x="52" y="326">· 每值一次虚函数调用，开销大</text><text x="52" y="348">· 内存跳跃、cache 不友好</text></g>
  <rect x="530" y="256" width="440" height="100" rx="13" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="750" y="280" font-size="12" font-weight="600" fill="#12402a" text-anchor="middle">逐列批量（向量化）</text>
  <g font-size="10.5" fill="#245038"><text x="552" y="304">· 一次处理一批（列）· 摊薄函数调用</text><text x="552" y="326">· 连续内存 + SIMD 并行 → 吞吐高</text><text x="552" y="348">· COW 共享不可变列 → 少拷贝</text></g>
</svg>
