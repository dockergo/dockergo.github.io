<svg xmlns="http://www.w3.org/2000/svg" width="740" height="560" viewBox="0 0 740 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="740" height="560" fill="#fbfbfd"/>
  <text x="40" y="28" font-size="11" fill="#a1a1a6">数据形态（方框）经动作（箭头标注）逐步推进；事务贯穿至提交</text>
  <g text-anchor="middle" font-size="13">
    <rect x="120" y="38" width="300" height="36" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="270" y="61" fill="#12402a">Load Data Stream</text>
    <rect x="120" y="100" width="300" height="36" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="270" y="123" fill="#12402a">Block（rows）</text>
    <rect x="120" y="162" width="300" height="36" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="270" y="185" fill="#12402a">Routed rows → Tablet</text>
    <rect x="120" y="224" width="300" height="36" rx="10" fill="#fff7e6" stroke="#e8cf9a"/><text x="270" y="247" fill="#5a3410">MemTable（sorted）</text>
    <rect x="120" y="286" width="300" height="36" rx="10" fill="#f3e9fb" stroke="#d8c9ee"/><text x="270" y="309" fill="#33194a">Rowset / Segment（+index）</text>
    <rect x="120" y="348" width="300" height="36" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="270" y="371" fill="#12402a">COMMITTED Rowset（不可见）</text>
    <rect x="120" y="410" width="300" height="36" rx="10" fill="#fff7e6" stroke="#e8cf9a"/><text x="270" y="433" fill="#5a3410">VISIBLE version</text>
    <rect x="120" y="472" width="300" height="36" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="270" y="495" fill="#12402a">Compacted Rowset</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4"><line x1="270" y1="74" x2="270" y2="98" marker-end="url(#a)"/><line x1="270" y1="136" x2="270" y2="160" marker-end="url(#a)"/><line x1="270" y1="198" x2="270" y2="222" marker-end="url(#a)"/><line x1="270" y1="260" x2="270" y2="284" marker-end="url(#a)"/><line x1="270" y1="322" x2="270" y2="346" marker-end="url(#a)"/><line x1="270" y1="384" x2="270" y2="408" marker-end="url(#a)"/><line x1="270" y1="446" x2="270" y2="470" marker-end="url(#a)"/></g>
  <g font-size="11" fill="#5b7db1"><text x="438" y="90">① Receive / Parse</text><text x="438" y="152">② Route（Partitioner）</text><text x="438" y="214">③ Write MemTable</text><text x="438" y="276">④ Flush → Rowset</text><text x="438" y="338">⑤ Commit</text><text x="438" y="400">⑥ Publish（+Delete Bitmap）</text><text x="438" y="462">⑦ Compaction</text></g>
  <rect x="560" y="316" width="160" height="46" rx="12" fill="#fbeaea" stroke="#e7c3c3"/><text x="640" y="337" font-size="11" fill="#4a1414" text-anchor="middle">Begin Transaction</text><text x="640" y="353" font-size="10" fill="#c25b5b" text-anchor="middle">txn id / Label · 贯穿</text>
  <line x1="558" y1="335" x2="512" y2="335" stroke="#c7c7cc" stroke-width="1.3" stroke-dasharray="4 4" marker-end="url(#a)"/>
</svg>
