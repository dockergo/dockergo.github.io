<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="960" height="430" fill="#fbfbfd"/>
  <text x="40" y="34" font-size="14" font-weight="600" fill="#1d1d1f">阻塞点（Breaker ★）把一个 Fragment 的算子链切成多个 Pipeline；★ 处上游收齐才驱动下游</text>

  <!-- Left: operator chain with breakers -->
  <rect x="34" y="56" width="330" height="344" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="199" y="80" font-size="12.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">Fragment 算子链</text>
  <g text-anchor="middle" font-size="11.5" fill="#1b2a4a">
    <rect x="99" y="96" width="160" height="34" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="179" y="118">OlapScan</text>
    <rect x="99" y="158" width="160" height="34" rx="9" fill="#fff7e6" stroke="#e8cf9a"/><text x="179" y="180" fill="#5a3410">HashJoin Build ★</text>
    <rect x="99" y="220" width="160" height="34" rx="9" fill="#fff7e6" stroke="#e8cf9a"/><text x="179" y="242" fill="#5a3410">Aggregate ★</text>
    <rect x="99" y="282" width="160" height="34" rx="9" fill="#fff7e6" stroke="#e8cf9a"/><text x="179" y="304" fill="#5a3410">Sort ★</text>
    <rect x="99" y="344" width="160" height="34" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="179" y="366">ResultSink</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.3" fill="none">
    <line x1="179" y1="130" x2="179" y2="158" marker-end="url(#ar)"/><line x1="179" y1="192" x2="179" y2="220" marker-end="url(#ar)"/>
    <line x1="179" y1="254" x2="179" y2="282" marker-end="url(#ar)"/><line x1="179" y1="316" x2="179" y2="344" marker-end="url(#ar)"/>
  </g>
  <text x="285" y="180" font-size="9" fill="#c08a2e" text-anchor="start">切</text><text x="285" y="242" font-size="9" fill="#c08a2e" text-anchor="start">切</text><text x="285" y="304" font-size="9" fill="#c08a2e" text-anchor="start">切</text>

  <line x1="364" y1="228" x2="410" y2="228" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/><text x="387" y="220" font-size="9.5" fill="#a1a1a6" text-anchor="middle">按 ★ 切</text>

  <!-- Right: resulting pipelines -->
  <rect x="418" y="56" width="508" height="344" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="672" y="80" font-size="12.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">切成的 Pipeline（依赖串联）</text>
  <g text-anchor="middle" font-size="11" fill="#274a78">
    <rect x="446" y="96" width="452" height="42" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="672" y="113" font-weight="600">Pipeline 1</text><text x="672" y="130" font-size="10" fill="#5b7db1">Scan ▸ Join Build（Sink=Breaker★）</text>
    <rect x="446" y="162" width="452" height="42" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="672" y="179" font-weight="600">Pipeline 2</text><text x="672" y="196" font-size="10" fill="#5b7db1">Join Probe ▸ Agg（Sink=Breaker★）</text>
    <rect x="446" y="228" width="452" height="42" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="672" y="245" font-weight="600">Pipeline 3</text><text x="672" y="262" font-size="10" fill="#5b7db1">Agg Source ▸ Sort（Sink=Breaker★）</text>
    <rect x="446" y="294" width="452" height="42" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="672" y="311" font-weight="600">Pipeline 4</text><text x="672" y="328" font-size="10" fill="#5b7db1">Sort Source ▸ ResultSink</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none" stroke-dasharray="4 3">
    <line x1="672" y1="138" x2="672" y2="162" marker-end="url(#ar)"/><line x1="672" y1="204" x2="672" y2="228" marker-end="url(#ar)"/><line x1="672" y1="270" x2="672" y2="294" marker-end="url(#ar)"/>
  </g>
  <g font-size="9" fill="#a1a1a6" text-anchor="start">
    <text x="686" y="154">依赖：哈希表收齐</text><text x="686" y="220">依赖：聚合收齐</text><text x="686" y="286">依赖：排序收齐</text>
  </g>
</svg>
