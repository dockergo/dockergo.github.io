<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="640" viewBox="0 0 1080 640" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect x="0" y="0" width="1080" height="640" fill="#fbfbfd"/>
  <text x="40" y="38" font-size="16" font-weight="600" fill="#1d1d1f">Profile 透视 · 数据格式结构 × 采集实现逻辑</text>
  <text x="40" y="58" font-size="11.5" fill="#86868b">左:Profile 五段格式(看什么);右:RuntimeProfile 计数器如何被采集/上报/聚合(怎么来的)</text>

  <!-- 左:五段格式结构 -->
  <rect x="30" y="78" width="470" height="540" rx="16" fill="#f6f8fc" stroke="#e6ecf4"/>
  <text x="50" y="102" font-size="13" font-weight="600" fill="#1d5fb8">Profile 五段格式(展示结构)</text>
  <g font-size="11" fill="#274a78">
    <rect x="50" y="114" width="430" height="40" rx="9" fill="#ffffff" stroke="#c4d5ee" filter="url(#soft)"/><text x="66" y="132" font-weight="600" fill="#1d1d1f">① Summary</text><text x="66" y="148" font-size="9.5" fill="#7d93b5">Profile ID · Task Type · Start/End · Total · State · User · Sql</text>
    <rect x="50" y="162" width="430" height="36" rx="9" fill="#ffffff" stroke="#c4d5ee" filter="url(#soft)"/><text x="66" y="180" font-weight="600" fill="#1d1d1f">② Execution Summary</text><text x="66" y="194" font-size="9.5" fill="#7d93b5">Planner 各阶段耗时</text>
    <rect x="50" y="206" width="430" height="30" rx="9" fill="#ffffff" stroke="#c4d5ee" filter="url(#soft)"/><text x="66" y="225" font-weight="600" fill="#1d1d1f">③ Changed Session Variables</text>
    <!-- ④ MergedProfile 展开 -->
    <rect x="50" y="244" width="430" height="230" rx="9" fill="#eef3fc" stroke="#c4d5ee"/><text x="66" y="264" font-weight="600" fill="#1d1d1f">④ MergedProfile(跨 BE 聚合 · min/avg/max)</text>
    <text x="66" y="280" font-size="9" fill="#7d93b5">InputRows ↔ RowsProduced 看倾斜</text>
    <g font-size="10">
      <rect x="66" y="288" width="398" height="26" rx="7" fill="#ffffff" stroke="#d6e0f0"/><text x="80" y="305">Fragment N</text>
      <rect x="82" y="320" width="382" height="26" rx="7" fill="#ffffff" stroke="#d6e0f0"/><text x="96" y="337">Pipeline N(instance_num=X)</text>
      <rect x="98" y="352" width="366" height="26" rx="7" fill="#f5faf6" stroke="#cfe6d5"/><text x="112" y="369" fill="#2c5a3a">HASH_JOIN / AGG_SINK / OLAP_SCAN / EXCHANGE …</text>
      <rect x="98" y="382" width="366" height="26" rx="7" fill="#f9f0fb" stroke="#e6d0ee"/><text x="112" y="399" fill="#7a3fb0">算子计数器:ExecTime · RowsProduced · WaitForDependency …</text>
      <rect x="98" y="412" width="366" height="26" rx="7" fill="#f9f0fb" stroke="#e6d0ee"/><text x="112" y="429" fill="#7a3fb0">Custom:ProbeRows · MemoryUsageHashTable · Spill</text>
      <rect x="98" y="442" width="366" height="24" rx="7" fill="#fdf6ea" stroke="#efdcb4"/><text x="112" y="458" fill="#8a5a12" font-size="9.5">child_counter_map:计数器挂父 → 缩进层级</text>
    </g>
    <rect x="50" y="482" width="430" height="34" rx="9" fill="#ffffff" stroke="#c4d5ee" filter="url(#soft)"/><text x="66" y="500" font-weight="600" fill="#1d1d1f">⑤ DetailProfile</text><text x="66" y="512" font-size="9.5" fill="#7d93b5">按 BE × instance 未聚合原始值</text>
    <rect x="50" y="524" width="430" height="80" rx="9" fill="#f7f7f9" stroke="#ececef"/><text x="66" y="544" font-size="10.5" font-weight="600" fill="#4a4e57">计数器单位 TUnit</text>
    <text x="66" y="562" font-size="9.5" fill="#86868b">TIME_NS/MS(SCOPED_TIMER)· UNIT(计数 K/M/B)</text>
    <text x="66" y="578" font-size="9.5" fill="#86868b">BYTES(内存/传输)· *_PER_SECOND(派生速率)· Info String(非数值)</text>
    <text x="66" y="596" font-size="9.5" fill="#86868b">profile_level 1/2/3:CommonCounters → +Custom → 全量</text>
  </g>

  <!-- 右:采集实现逻辑(纵向流水) -->
  <rect x="520" y="78" width="530" height="540" rx="16" fill="#fbf7ef" stroke="#efe4cf"/>
  <text x="540" y="102" font-size="13" font-weight="600" fill="#8a5a12">采集 → 上报 → 聚合 实现逻辑(数据怎么来的)</text>
  <g text-anchor="middle" font-size="11" fill="#8a5a12">
    <rect x="600" y="116" width="370" height="52" rx="11" fill="#ffffff" stroke="#efe0c4" filter="url(#soft)"/><text x="785" y="138" font-weight="600" fill="#1d1d1f">① 算子埋点(每 PipelineTask 一棵)</text><text x="785" y="156" font-size="9.5">RuntimeProfile::add_counter 建树 · SCOPED_TIMER 累加</text>
    <rect x="600" y="188" width="370" height="52" rx="11" fill="#ffffff" stroke="#efe0c4" filter="url(#soft)"/><text x="785" y="210" font-weight="600" fill="#1d1d1f">② profile_level 剪枝</text><text x="785" y="228" font-size="9.5">prune_the_tree 按 level 1-3 裁计数器</text>
    <rect x="600" y="260" width="370" height="52" rx="11" fill="#ffffff" stroke="#efe0c4" filter="url(#soft)"/><text x="785" y="282" font-weight="600" fill="#1d1d1f">③ BE 上报 FE</text><text x="785" y="300" font-size="9.5">report_exec_status 定期序列化上报 fragment profile</text>
    <rect x="600" y="332" width="370" height="52" rx="11" fill="#ffffff" stroke="#efe0c4" filter="url(#soft)"/><text x="785" y="354" font-weight="600" fill="#1d1d1f">④ FE 聚合 · RuntimeProfile::merge</text><text x="785" y="372" font-size="9.5">跨 BE 同名 counter 求 min/avg/max → MergedProfile</text>
    <rect x="600" y="404" width="370" height="52" rx="11" fill="#f6f8fc" stroke="#c4d5ee" filter="url(#soft)"/><text x="785" y="426" font-weight="600" fill="#1d5fb8">⑤ 展示</text><text x="785" y="444" font-size="9.5">SHOW QUERY PROFILE 五段树 · DetailProfile 原始值</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="785" y1="168" x2="785" y2="187" marker-end="url(#ar)"/>
    <line x1="785" y1="240" x2="785" y2="259" marker-end="url(#ar)"/>
    <line x1="785" y1="312" x2="785" y2="331" marker-end="url(#ar)"/>
    <line x1="785" y1="384" x2="785" y2="403" marker-end="url(#ar)"/>
  </g>
  <!-- 右→左 呼应:聚合产出即左边④ -->
  <line x1="600" y1="358" x2="482" y2="300" stroke="#c7a8d8" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="540" y="474" font-size="10.5" fill="#a98b52">开关:enable_profile=true;profile_level 控详细度;诊断按 ExecTime 排序找最慢算子,min/avg/max 差看倾斜。</text>
  <text x="540" y="496" font-size="10.5" fill="#a98b52">上报聚合产物即左侧 ④ MergedProfile;每算子一棵有序 Counter 树,序列化上报后 FE 合并。</text>
</svg>
