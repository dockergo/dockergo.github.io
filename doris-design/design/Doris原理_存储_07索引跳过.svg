<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="310" viewBox="0 0 1000 310" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1000" height="310" fill="#fbfbfd"/>
  <text x="40" y="28" font-size="14" font-weight="600" fill="#1d1d1f">跳过型索引原理：定位有序区间 · 跳不相关 Page · 判"一定不存在"</text>

  <!-- Short Key -->
  <rect x="20" y="46" width="306" height="248" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="173" y="72" font-size="12.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Short Key / 前缀索引</text>
  <g font-size="10" text-anchor="middle" fill="#33507e">
    <rect x="56" y="88" width="150" height="20" rx="4" fill="#eef3fb" stroke="#bcd0ec"/><text x="131" y="102">key a…</text>
    <rect x="56" y="110" width="150" height="20" rx="4" fill="#eef3fb" stroke="#bcd0ec"/><text x="131" y="124">key b…</text>
    <rect x="56" y="132" width="150" height="20" rx="4" fill="#eafaf1" stroke="#bfe0cd"/><text x="131" y="146">key c…</text>
    <rect x="56" y="154" width="150" height="20" rx="4" fill="#eafaf1" stroke="#bfe0cd"/><text x="131" y="168">key c…</text>
    <rect x="56" y="176" width="150" height="20" rx="4" fill="#eef3fb" stroke="#bcd0ec"/><text x="131" y="190">key d…</text>
  </g>
  <text x="224" y="130" font-size="9.5" fill="#a1a1a6">前缀有序</text>
  <path d="M262,150 L214,150" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <text x="262" y="170" font-size="9.5" fill="#a1a1a6" text-anchor="start">二分</text>
  <text x="173" y="230" font-size="10" fill="#6e6e73" text-anchor="middle">排序键前缀有序</text>
  <text x="173" y="248" font-size="10" fill="#6e6e73" text-anchor="middle">前缀二分 → 定位有序区间</text>
  <text x="173" y="266" font-size="9.5" fill="#86868b" text-anchor="middle">高频前缀过滤 · 稀疏索引</text>

  <!-- ZoneMap -->
  <rect x="346" y="46" width="306" height="248" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="499" y="72" font-size="12.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">ZoneMap</text>
  <text x="499" y="92" font-size="10" fill="#5a3410" text-anchor="middle">查询 WHERE x = 25</text>
  <g font-size="10" text-anchor="middle">
    <rect x="372" y="104" width="254" height="30" rx="6" fill="#f4f4f6" stroke="#e0e0e5"/><text x="490" y="123" fill="#a1a1a6">Page1 [min 1, max 10] ✗ 跳</text>
    <rect x="372" y="140" width="254" height="30" rx="6" fill="#eafaf1" stroke="#bfe0cd"/><text x="490" y="159" fill="#12402a">Page2 [min 20, max 30] ✓ 读</text>
    <rect x="372" y="176" width="254" height="30" rx="6" fill="#f4f4f6" stroke="#e0e0e5"/><text x="490" y="195" fill="#a1a1a6">Page3 [min 40, max 50] ✗ 跳</text>
  </g>
  <text x="499" y="234" font-size="10" fill="#6e6e73" text-anchor="middle">每 Page/Segment 存 min/max</text>
  <text x="499" y="252" font-size="10" fill="#6e6e73" text-anchor="middle">与查询范围不重叠 → 整段跳过</text>
  <text x="499" y="270" font-size="9.5" fill="#86868b" text-anchor="middle">范围查询最有效</text>

  <!-- BloomFilter -->
  <rect x="672" y="46" width="308" height="248" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="826" y="72" font-size="12.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">BloomFilter</text>
  <rect x="700" y="90" width="90" height="26" rx="6" fill="#eef3fb" stroke="#bcd0ec"/><text x="745" y="108" font-size="10" fill="#274a78" text-anchor="middle">值 k</text>
  <text x="812" y="107" font-size="9.5" fill="#a1a1a6" text-anchor="middle">hash→</text>
  <g font-size="10" text-anchor="middle">
    <rect x="852" y="90" width="26" height="26" fill="#eafaf1" stroke="#bfe0cd"/><text x="865" y="108" fill="#12402a">1</text>
    <rect x="880" y="90" width="26" height="26" fill="#fbeaea" stroke="#e7c3c3"/><text x="893" y="108" fill="#4a1414">0</text>
    <rect x="908" y="90" width="26" height="26" fill="#eafaf1" stroke="#bfe0cd"/><text x="921" y="108" fill="#12402a">1</text>
  </g>
  <text x="826" y="150" font-size="10.5" fill="#4a1414" text-anchor="middle">探测位含 0 → 一定不存在 → 跳 Page</text>
  <text x="826" y="172" font-size="10.5" fill="#2f6f4f" text-anchor="middle">全 1 → 可能存在 → 读（有假阳性）</text>
  <text x="826" y="234" font-size="10" fill="#6e6e73" text-anchor="middle">高基数等值过滤</text>
  <text x="826" y="252" font-size="10" fill="#6e6e73" text-anchor="middle">只跳不误留（假阳性只多读不漏）</text>
  <text x="826" y="270" font-size="9.5" fill="#86868b" text-anchor="middle">NGram BF 支持 LIKE</text>
</svg>
