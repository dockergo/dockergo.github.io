<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="360" viewBox="0 0 1000 360" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="360" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">两层元数据：FE 全局逻辑元数据 · BE 本地物理元数据（并非"元数据全在 FE"）</text>

  <!-- FE panel -->
  <rect x="28" y="60" width="446" height="212" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="251" y="84" font-size="12.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">FE 全局逻辑元数据（全内存 + EditLog + Image · BDBJE 复制）</text>
  <g font-size="10.5">
    <rect x="46" y="98" width="196" height="30" rx="7" fill="#fff" stroke="#bcd0ec"/><text x="144" y="118" fill="#274a78" text-anchor="middle">库 / 表 / 分区 定义</text>
    <rect x="260" y="98" width="196" height="30" rx="7" fill="#fff" stroke="#bcd0ec"/><text x="358" y="118" fill="#274a78" text-anchor="middle">Schema / 物化视图定义</text>
    <rect x="46" y="136" width="196" height="30" rx="7" fill="#fff" stroke="#bcd0ec"/><text x="144" y="156" fill="#274a78" text-anchor="middle">Tablet → BE 副本分布</text>
    <rect x="260" y="136" width="196" height="30" rx="7" fill="#fff" stroke="#bcd0ec"/><text x="358" y="156" fill="#274a78" text-anchor="middle">事务状态 / 权限 / WG</text>
  </g>
  <text x="251" y="192" font-size="10.5" fill="#5b7db1" text-anchor="middle">记"逻辑与分布"：有哪些对象、每个 Tablet 该在哪些 BE</text>
  <text x="251" y="214" font-size="10" fill="#5b7db1" text-anchor="middle">持久化：先写 EditLog(WAL) 再改内存，周期 Checkpoint 成 Image</text>
  <text x="251" y="236" font-size="10" fill="#5b7db1" text-anchor="middle">高可用：Master 写 → Follower/Observer replay 追平</text>
  <text x="251" y="258" font-size="10" fill="#8aa6cf" text-anchor="middle">（详见 元数据 三位一体 / 日志复制 / 选主）</text>

  <!-- BE panel -->
  <rect x="526" y="60" width="446" height="212" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="749" y="84" font-size="12.5" font-weight="600" fill="#5a3410" text-anchor="middle">BE 本地物理元数据（OlapMeta · 内嵌 RocksDB · 每数据盘一份）</text>
  <g font-size="10.5">
    <rect x="544" y="98" width="196" height="30" rx="7" fill="#fff" stroke="#e8cf9a"/><text x="642" y="118" fill="#5a3410" text-anchor="middle">Tablet Meta Header</text>
    <rect x="758" y="98" width="196" height="30" rx="7" fill="#fff" stroke="#e8cf9a"/><text x="856" y="118" fill="#5a3410" text-anchor="middle">Rowset Meta（版本 → 文件）</text>
    <rect x="544" y="136" width="196" height="30" rx="7" fill="#fff" stroke="#e8cf9a"/><text x="642" y="156" fill="#5a3410" text-anchor="middle">Delete Bitmap（MoW）</text>
    <rect x="758" y="136" width="196" height="30" rx="7" fill="#fff" stroke="#e8cf9a"/><text x="856" y="156" fill="#5a3410" text-anchor="middle">Pending Publish Info</text>
  </g>
  <text x="749" y="192" font-size="10.5" fill="#93762e" text-anchor="middle">记"物理与文件"：本机盘上到底有哪些版本、哪些文件</text>
  <text x="749" y="214" font-size="10" fill="#93762e" text-anchor="middle">就近落盘：与数据同盘持久化，BE 重启即可恢复本地状态</text>
  <text x="749" y="236" font-size="10" fill="#93762e" text-anchor="middle">Compaction/导入/Publish 改动即写入本地 RocksDB</text>

  <!-- relation -->
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none"><line x1="474" y1="150" x2="526" y2="150" marker-end="url(#ar)" marker-start="url(#ar)"/></g>
  <rect x="250" y="292" width="500" height="52" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="500" y="313" font-size="11" font-weight="600" fill="#1d1d1f" text-anchor="middle">对账：BE 定期 Tablet Report 上报本地物理实况</text>
  <text x="500" y="332" font-size="10" fill="#6e6e73" text-anchor="middle">FE 拿"逻辑应有"与 BE"物理实有"比对 → 缺副本补、多余删（见 集群自愈 · 对账）</text>
</svg>
