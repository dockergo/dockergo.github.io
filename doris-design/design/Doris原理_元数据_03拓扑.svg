<svg xmlns="http://www.w3.org/2000/svg" width="840" height="340" viewBox="0 0 840 340" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="840" height="340" fill="#fbfbfd"/>
  <text x="30" y="28" font-size="14" font-weight="600" fill="#1d1d1f">单写多读 + 状态机复制：Master 写、EditLog 复制多数派、Follower/Observer 回放</text>
  <rect x="340" y="44" width="160" height="36" rx="11" fill="#f4eefb" stroke="#e2d3f3" filter="url(#s)"/><text x="420" y="67" font-size="12" font-weight="600" fill="#42246b" text-anchor="middle">Client 写请求</text>
  <g text-anchor="middle">
    <rect x="60" y="110" width="160" height="66" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#s)"/><text x="140" y="138" font-size="13" font-weight="600" fill="#12402a">Follower 1</text><text x="140" y="158" font-size="9.5" fill="#4e7a5c">投票 · 多数派 · 只读</text>
    <rect x="340" y="110" width="160" height="66" rx="13" fill="#fbeaea" stroke="#e7c3c3" filter="url(#s)"/><text x="420" y="138" font-size="13" font-weight="600" fill="#4a1414">Master</text><text x="420" y="158" font-size="9.5" fill="#a05252">唯一可写 · 生成 EditLog</text>
    <rect x="620" y="110" width="160" height="66" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#s)"/><text x="700" y="138" font-size="13" font-weight="600" fill="#12402a">Follower 2</text><text x="700" y="158" font-size="9.5" fill="#4e7a5c">投票 · 多数派 · 只读</text>
    <rect x="340" y="212" width="160" height="60" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#s)"/><text x="420" y="238" font-size="13" font-weight="600" fill="#1b2a4a">Observer</text><text x="420" y="256" font-size="9.5" fill="#5b7db1">异步回放 · 只读扩展 · 不投票</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <line x1="420" y1="80" x2="420" y2="110" marker-end="url(#a)"/>
    <path d="M340,143 L220,143" marker-end="url(#a)"/>
    <path d="M500,143 L620,143" marker-end="url(#a)"/>
    <path d="M420,176 L420,212" stroke-dasharray="4 3" marker-end="url(#a)"/>
  </g>
  <g font-size="9.5" fill="#a1a1a6" text-anchor="middle">
    <text x="280" y="136">EditLog 复制</text><text x="560" y="136">→ 多数派提交</text><text x="470" y="198">异步回放</text>
  </g>
  <rect x="30" y="288" width="390" height="40" rx="10" fill="#fff9f0" stroke="#eddcbf"/><text x="225" y="305" font-size="10" fill="#7a5a1e" text-anchor="middle">Master 宕机 → Follower 依已提交位点选新主</text><text x="225" y="320" font-size="10" fill="#7a5a1e" text-anchor="middle">已提交变更不丢，对客户端透明</text>
  <rect x="440" y="288" width="370" height="40" rx="10" fill="#f5faf6" stroke="#dbe9e0"/><text x="625" y="305" font-size="10" fill="#2c5a3a" text-anchor="middle">强一致读走 Master；可容忍延迟读走</text><text x="625" y="320" font-size="10" fill="#2c5a3a" text-anchor="middle">Follower/Observer 扩展吞吐</text>
</svg>
