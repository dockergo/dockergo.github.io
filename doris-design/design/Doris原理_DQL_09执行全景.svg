<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="660" viewBox="0 0 1100 660" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1100" height="660" fill="#fbfbfd"/>

  <!-- Client -->
  <rect x="490" y="16" width="120" height="34" rx="11" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/><text x="550" y="38" font-size="13" font-weight="600" fill="#4a1414" text-anchor="middle">Client / BI</text>
  <line x1="550" y1="50" x2="550" y2="66" stroke="#c7c7cc" stroke-width="1.5" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <text x="620" y="62" font-size="10" fill="#a1a1a6">SQL ↓ / 结果 ↑</text>

  <!-- FE band -->
  <rect x="30" y="66" width="1040" height="188" rx="16" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="48" y="90" font-size="14" font-weight="600" fill="#1d1d1f">FE · 编译与规划（Java）</text>
  <text x="48" y="108" font-size="11" fill="#86868b">自左而右 = 编译流水；逻辑计划逐步降解为物理计划与可分发的 Fragment</text>
  <g text-anchor="middle">
    <rect x="56" y="120" width="188" height="46" rx="10" fill="#ecf2fb" stroke="#c4d5ee"/><text x="150" y="140" font-size="12" font-weight="600" fill="#274a78">SQL 文本</text><text x="150" y="156" font-size="9.5" fill="#7d93b5">客户端提交</text>
    <rect x="256" y="120" width="188" height="46" rx="10" fill="#ecf2fb" stroke="#c4d5ee"/><text x="350" y="140" font-size="12" font-weight="600" fill="#274a78">词法 · 语法解析</text><text x="350" y="156" font-size="9.5" fill="#7d93b5">→ AST（未绑定计划）</text>
    <rect x="456" y="120" width="188" height="46" rx="10" fill="#ecf2fb" stroke="#c4d5ee"/><text x="550" y="140" font-size="12" font-weight="600" fill="#274a78">分析 · 绑定</text><text x="550" y="156" font-size="9.5" fill="#7d93b5">→ 绑定元数据/类型</text>
    <rect x="656" y="120" width="188" height="46" rx="10" fill="#ecf2fb" stroke="#c4d5ee"/><text x="750" y="140" font-size="12" font-weight="600" fill="#274a78">RBO 规则改写</text><text x="750" y="156" font-size="9.5" fill="#7d93b5">下推 · 裁剪 · 折叠</text>
    <rect x="856" y="120" width="188" height="46" rx="10" fill="#ecf2fb" stroke="#c4d5ee"/><text x="950" y="140" font-size="12" font-weight="600" fill="#274a78">CBO · Memo/Cascades</text><text x="950" y="156" font-size="9.5" fill="#7d93b5">统计驱动 · 代价最优</text>
    <rect x="156" y="192" width="188" height="46" rx="10" fill="#ecf2fb" stroke="#c4d5ee"/><text x="250" y="212" font-size="12" font-weight="600" fill="#274a78">HBO 历史纠偏</text><text x="250" y="228" font-size="9.5" fill="#7d93b5">实测回灌</text>
    <rect x="356" y="192" width="188" height="46" rx="10" fill="#ecf2fb" stroke="#c4d5ee"/><text x="450" y="212" font-size="12" font-weight="600" fill="#274a78">Physical Plan</text><text x="450" y="228" font-size="9.5" fill="#7d93b5">物理算子树</text>
    <rect x="556" y="192" width="188" height="46" rx="10" fill="#ecf2fb" stroke="#c4d5ee"/><text x="650" y="212" font-size="12" font-weight="600" fill="#274a78">Fragment 切分</text><text x="650" y="228" font-size="9.5" fill="#7d93b5">在 Exchange 处切</text>
    <rect x="756" y="192" width="188" height="46" rx="10" fill="#e8eefb" stroke="#b6cdf0"/><text x="850" y="212" font-size="12" font-weight="600" fill="#274a78">Coordinator 调度</text><text x="850" y="228" font-size="9.5" fill="#7d93b5">Scan Range 分配</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <line x1="244" y1="143" x2="256" y2="143" marker-end="url(#ar)"/><line x1="444" y1="143" x2="456" y2="143" marker-end="url(#ar)"/>
    <line x1="644" y1="143" x2="656" y2="143" marker-end="url(#ar)"/><line x1="844" y1="143" x2="856" y2="143" marker-end="url(#ar)"/>
    <path d="M950,166 L950,180 L250,180 L250,192" marker-end="url(#ar)"/>
    <line x1="344" y1="215" x2="356" y2="215" marker-end="url(#ar)"/><line x1="544" y1="215" x2="556" y2="215" marker-end="url(#ar)"/><line x1="744" y1="215" x2="756" y2="215" marker-end="url(#ar)"/>
  </g>

  <!-- FE -> BE -->
  <line x1="850" y1="238" x2="850" y2="280" stroke="#c7c7cc" stroke-width="1.6" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <text x="862" y="260" font-size="10" fill="#a1a1a6">下发 Fragment ↓ · 汇聚 Gather ↑（BRPC）</text>
  <text x="862" y="274" font-size="10" fill="#a1a1a6">Scan Range 按 Tablet 分配 · 并行度 DOP</text>

  <!-- BE band -->
  <rect x="30" y="280" width="1040" height="360" rx="16" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="48" y="304" font-size="14" font-weight="600" fill="#1d1d1f">BE · 分布式执行（C++ · share-nothing · MPP）</text>
  <text x="48" y="322" font-size="11" fill="#86868b">每 BE 跑 Fragment 实例读本地 Tablet；Pipeline 在阻塞点（Breaker）切分、向量化 Block、依赖驱动调度</text>

  <!-- BE-1 -->
  <rect x="56" y="336" width="486" height="292" rx="14" fill="#f5faf6" stroke="#e2ece5"/>
  <text x="76" y="360" font-size="12.5" font-weight="600" fill="#2c5a3a">BE-1（Fragment 实例）</text>
  <text x="76" y="377" font-size="10" fill="#86868b">本地 Tablet · Pipeline · 向量化 · DOP 并行</text>
  <g text-anchor="middle">
    <rect x="96" y="390" width="200" height="38" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="196" y="414" font-size="12" fill="#1b2a4a">OlapScan（本地 Tablet）</text>
    <rect x="96" y="452" width="200" height="38" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="196" y="476" font-size="12" fill="#1b2a4a">HashJoin · Probe</text>
    <rect x="316" y="452" width="206" height="38" rx="10" fill="#fff7e6" stroke="#e8cf9a"/><text x="419" y="476" font-size="11.5" fill="#5a3410">HashJoin Build（阻塞点）</text>
    <rect x="96" y="514" width="200" height="38" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="196" y="538" font-size="12" fill="#1b2a4a">Aggregate（本地预聚合）</text>
    <rect x="96" y="576" width="200" height="38" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="196" y="600" font-size="12" fill="#1b2a4a">Exchange Sink</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <line x1="196" y1="428" x2="196" y2="452" marker-end="url(#ar)"/>
    <line x1="196" y1="490" x2="196" y2="514" marker-end="url(#ar)"/>
    <line x1="196" y1="552" x2="196" y2="576" marker-end="url(#ar)"/>
    <line x1="316" y1="471" x2="298" y2="471" marker-end="url(#ar)"/>
    <path d="M419,452 L419,411 L298,411" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  </g>
  <text x="452" y="424" font-size="9.5" fill="#a1a1a6" text-anchor="middle">Runtime Filter 下推</text>
  <text x="452" y="437" font-size="9" fill="#c0c0c5" text-anchor="middle">IN / Bloom / MinMax</text>
  <text x="214" y="446" font-size="9" fill="#9aa7bd" text-anchor="start">向量化 Block 流</text>
  <text x="214" y="508" font-size="9" fill="#9aa7bd" text-anchor="start">Local Exchange 打散</text>

  <!-- BE-2 -->
  <rect x="574" y="336" width="470" height="292" rx="14" fill="#f7f9fb" stroke="#e6e9ee"/>
  <text x="594" y="360" font-size="12.5" font-weight="600" fill="#5a6472">BE-2 … ×N</text>
  <text x="594" y="377" font-size="10" fill="#9a9aa0">并行 Fragment 实例（镜像同构）</text>
  <g text-anchor="middle" fill="#6e6e73">
    <rect x="614" y="390" width="200" height="38" rx="10" fill="#f0f3f7" stroke="#dfe4ea"/><text x="714" y="414" font-size="12">OlapScan</text>
    <rect x="614" y="452" width="200" height="38" rx="10" fill="#f0f3f7" stroke="#dfe4ea"/><text x="714" y="476" font-size="12">HashJoin · Probe</text>
    <rect x="614" y="514" width="200" height="38" rx="10" fill="#f0f3f7" stroke="#dfe4ea"/><text x="714" y="538" font-size="12">Aggregate</text>
    <rect x="614" y="576" width="200" height="38" rx="10" fill="#f0f3f7" stroke="#dfe4ea"/><text x="714" y="600" font-size="12">Exchange Sink</text>
  </g>
  <g stroke="#d3d3d8" stroke-width="1.3" fill="none">
    <line x1="714" y1="428" x2="714" y2="452" marker-end="url(#ar)"/><line x1="714" y1="490" x2="714" y2="514" marker-end="url(#ar)"/><line x1="714" y1="552" x2="714" y2="576" marker-end="url(#ar)"/>
  </g>

  <!-- Exchange between BEs -->
  <line x1="558" y1="470" x2="558" y2="595" stroke="#c7c7cc" stroke-width="1.5" stroke-dasharray="5 3" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <text x="558" y="456" font-size="10.5" font-weight="600" fill="#6e6e73" text-anchor="middle">Exchange</text>
  <text x="558" y="612" font-size="9.5" fill="#a1a1a6" text-anchor="middle">Hash · Broadcast · Gather</text>
</svg>
