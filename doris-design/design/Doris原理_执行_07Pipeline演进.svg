<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="320" viewBox="0 0 1000 320" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter></defs>
  <rect width="1000" height="320" fill="#fbfbfd"/>
  <text x="40" y="30" font-size="14" font-weight="600" fill="#1d1d1f">为什么是 Pipeline：从"一线程一算子"到细粒度 Task + 依赖驱动调度</text>
  <rect x="40" y="60" width="440" height="220" rx="14" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="260" y="86" font-size="13" font-weight="600" fill="#4a1414" text-anchor="middle">火山模型（旧）</text>
  <g font-size="11.5" fill="#7a2a2a"><text x="64" y="118">· 一执行实例占一线程，算子阻塞式拉取</text><text x="64" y="146">· 线程数随查询数 × 算子数膨胀</text><text x="64" y="174">· 等 Build/Exchange 时线程被阻塞占用</text><text x="64" y="202">· 上下文切换多、CPU 利用率低</text><text x="64" y="230">· 高并发下线程爆炸</text></g>
  <rect x="520" y="60" width="440" height="220" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="740" y="86" font-size="13" font-weight="600" fill="#12402a" text-anchor="middle">Pipeline 模型（Doris）</text>
  <g font-size="11.5" fill="#245038"><text x="544" y="118">· 执行拆成大量细粒度 PipelineTask</text><text x="544" y="146">· 固定线程池（≈ 核数）调度</text><text x="544" y="174">· 依赖未就绪则主动让出线程、转等待</text><text x="544" y="202">· 依赖满足被唤醒重新入就绪队列</text><text x="544" y="230">· 并行实例 ×DOP + Local Exchange 打散</text></g>
  <text x="500" y="308" font-size="11.5" fill="#6e6e73" text-anchor="middle">结果：少量线程支撑海量并发 Pipeline，CPU 利用率高、可扩展——这是打满多核的执行基石。</text>
</svg>
