<svg xmlns="http://www.w3.org/2000/svg" width="640" height="470" viewBox="0 0 640 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="640" height="470" fill="#fbfbfd"/>
  <g text-anchor="middle" font-size="13">
    <rect x="100" y="26" width="440" height="34" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="320" y="48" fill="#12402a">Block（下发的数据块）</text>
    <rect x="100" y="86" width="440" height="34" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="320" y="108" fill="#1b2a4a">Tablet Sink Partitioner（分区+分桶 → Tablet）</text>
    <rect x="100" y="146" width="440" height="34" rx="10" fill="#fff7e6" stroke="#e8cf9a"/><text x="320" y="168" fill="#5a3410">Delta Writer（每 Tablet 一个）</text>
    <rect x="100" y="206" width="440" height="34" rx="10" fill="#fff7e6" stroke="#e8cf9a"/><text x="320" y="228" fill="#5a3410">MemTable（按 key 排序 · 预聚合 · 去重）</text>
    <rect x="100" y="266" width="440" height="34" rx="10" fill="#fff7e6" stroke="#e8cf9a"/><text x="320" y="288" fill="#5a3410">Flush（写满 / 超时）</text>
    <rect x="100" y="326" width="440" height="34" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="320" y="348" fill="#1b2a4a">Rowset/Segment Writer · 编码压缩 · 建索引</text>
    <rect x="100" y="386" width="440" height="34" rx="10" fill="#f3e9fb" stroke="#d8c9ee"/><text x="320" y="408" fill="#33194a">Rowset（若干 Segment）</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4"><line x1="320" y1="60" x2="320" y2="84" marker-end="url(#a)"/><line x1="320" y1="120" x2="320" y2="144" marker-end="url(#a)"/><line x1="320" y1="180" x2="320" y2="204" marker-end="url(#a)"/><line x1="320" y1="240" x2="320" y2="264" marker-end="url(#a)"/><line x1="320" y1="300" x2="320" y2="324" marker-end="url(#a)"/><line x1="320" y1="360" x2="320" y2="384" marker-end="url(#a)"/></g>
</svg>
