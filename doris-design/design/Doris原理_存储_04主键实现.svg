<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="880" height="320" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">主键模型两种实现：写路径与读路径的代价转移</text>

  <!-- MoR -->
  <rect x="24" y="46" width="410" height="252" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="229" y="70" font-size="13" font-weight="600" fill="#1b2a4a" text-anchor="middle">Merge-on-Read · 写轻读重</text>
  <text x="52" y="98" font-size="11" font-weight="600" fill="#5b7db1">写路径</text>
  <g text-anchor="middle" font-size="11" fill="#274a78">
    <rect x="52" y="106" width="150" height="34" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="127" y="127">追加 Rowset</text>
  </g>
  <text x="220" y="127" font-size="10" fill="#2f6f4f" text-anchor="start">快（只写不算）</text>
  <text x="52" y="170" font-size="11" font-weight="600" fill="#5b7db1">读路径</text>
  <g text-anchor="middle" font-size="10.5" fill="#274a78">
    <rect x="52" y="178" width="110" height="34" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="107" y="199">读多 Rowset</text>
    <rect x="188" y="178" width="140" height="34" rx="9" fill="#fff7e6" stroke="#e8cf9a"/><text x="258" y="199" fill="#5a3410">现场归并去重</text>
    <rect x="352" y="178" width="66" height="34" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="385" y="199" fill="#12402a">结果</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.3" fill="none"><line x1="162" y1="195" x2="188" y2="195" marker-end="url(#ar)"/><line x1="328" y1="195" x2="352" y2="195" marker-end="url(#ar)"/></g>
  <text x="229" y="248" font-size="10.5" fill="#86868b" text-anchor="middle">读放大明显 · 适用写多读少</text>
  <text x="229" y="270" font-size="10.5" fill="#86868b" text-anchor="middle">每次查询都要归并同键多版本</text>

  <!-- MoW -->
  <rect x="446" y="46" width="410" height="252" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="651" y="70" font-size="13" font-weight="600" fill="#12402a" text-anchor="middle">Merge-on-Write · 写重读轻</text>
  <text x="474" y="98" font-size="11" font-weight="600" fill="#2f6f4f">写路径</text>
  <g text-anchor="middle" font-size="10.5">
    <rect x="474" y="106" width="104" height="34" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="526" y="127" fill="#274a78">追加 Rowset</text>
    <rect x="600" y="106" width="110" height="34" rx="9" fill="#fff7e6" stroke="#e8cf9a"/><text x="655" y="127" fill="#5a3410">Publish 定位旧行</text>
    <rect x="732" y="106" width="104" height="34" rx="9" fill="#fbeaea" stroke="#e7c3c3"/><text x="784" y="127" fill="#4a1414">写 Delete Bitmap</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.3" fill="none"><line x1="578" y1="123" x2="600" y2="123" marker-end="url(#ar)"/><line x1="710" y1="123" x2="732" y2="123" marker-end="url(#ar)"/></g>
  <text x="474" y="170" font-size="11" font-weight="600" fill="#2f6f4f">读路径</text>
  <g text-anchor="middle" font-size="10.5" fill="#274a78">
    <rect x="474" y="178" width="120" height="34" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="534" y="199">读 Rowset</text>
    <rect x="620" y="178" width="140" height="34" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="690" y="199" fill="#12402a">按 Bitmap 跳旧行</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.3" fill="none"><line x1="594" y1="195" x2="620" y2="195" marker-end="url(#ar)"/></g>
  <text x="651" y="248" font-size="10.5" fill="#86868b" text-anchor="middle">免归并 · 读性能接近明细表</text>
  <text x="651" y="270" font-size="10.5" fill="#86868b" text-anchor="middle">代价前置到写 · 适用高频更新+高频查询</text>
</svg>
