<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="384" viewBox="0 0 1000 384" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="384" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Pipeline 调度队列纪律：每核多级反馈队列（MLFQ）+ vruntime 公平 + 空闲 work-stealing</text>

  <!-- ready entry -->
  <rect x="28" y="150" width="140" height="72" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="98" y="180" font-size="11.5" font-weight="600" fill="#12402a" text-anchor="middle">就绪 Task</text>
  <text x="98" y="200" font-size="9.5" fill="#2f6f4f" text-anchor="middle">依赖满足被唤醒</text>
  <text x="98" y="214" font-size="9.5" fill="#2f6f4f" text-anchor="middle">→ 入某核队列</text>

  <!-- MultiCoreTaskQueue container -->
  <rect x="196" y="60" width="566" height="292" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="479" y="82" font-size="12" font-weight="600" fill="#2c5a3a" text-anchor="middle">MultiCoreTaskQueue（每核一条 PriorityTaskQueue = 一个多级反馈队列）</text>

  <!-- three core columns -->
  <!-- core 1 -->
  <rect x="214" y="96" width="164" height="180" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="296" y="115" font-size="10.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">Core 1 队列</text>
  <rect x="228" y="124" width="136" height="22" rx="5" fill="#eef3fb" stroke="#bcd0ec"/><text x="296" y="139" font-size="9" fill="#274a78" text-anchor="middle">L0（新任务，优先跑）</text>
  <rect x="228" y="150" width="136" height="22" rx="5" fill="#eef3fb" stroke="#bcd0ec"/><text x="296" y="165" font-size="9" fill="#274a78" text-anchor="middle">L1（跑久降级）</text>
  <rect x="228" y="176" width="136" height="22" rx="5" fill="#eef3fb" stroke="#bcd0ec"/><text x="296" y="191" font-size="9" fill="#274a78" text-anchor="middle">L2（更久再降）</text>
  <rect x="228" y="234" width="136" height="30" rx="7" fill="#fdf6ea" stroke="#efdcb4"/><text x="296" y="253" font-size="9.5" fill="#5a3410" text-anchor="middle">工作线程 1</text>

  <!-- core 2 -->
  <rect x="396" y="96" width="164" height="180" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="478" y="115" font-size="10.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">Core 2 队列</text>
  <rect x="410" y="124" width="136" height="22" rx="5" fill="#eef3fb" stroke="#bcd0ec"/><text x="478" y="139" font-size="9" fill="#274a78" text-anchor="middle">L0</text>
  <rect x="410" y="150" width="136" height="22" rx="5" fill="#eef3fb" stroke="#bcd0ec"/><text x="478" y="165" font-size="9" fill="#274a78" text-anchor="middle">L1</text>
  <rect x="410" y="176" width="136" height="22" rx="5" fill="#eef3fb" stroke="#bcd0ec"/><text x="478" y="191" font-size="9" fill="#274a78" text-anchor="middle">L2</text>
  <rect x="410" y="234" width="136" height="30" rx="7" fill="#fdf6ea" stroke="#efdcb4"/><text x="478" y="253" font-size="9.5" fill="#5a3410" text-anchor="middle">工作线程 2（空闲）</text>

  <!-- core 3 -->
  <rect x="578" y="96" width="164" height="180" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="660" y="115" font-size="10.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">Core 3 队列</text>
  <rect x="592" y="124" width="136" height="22" rx="5" fill="#eef3fb" stroke="#bcd0ec"/><text x="660" y="139" font-size="9" fill="#274a78" text-anchor="middle">L0</text>
  <rect x="592" y="150" width="136" height="22" rx="5" fill="#eef3fb" stroke="#bcd0ec"/><text x="660" y="165" font-size="9" fill="#274a78" text-anchor="middle">L1</text>
  <rect x="592" y="176" width="136" height="22" rx="5" fill="#eef3fb" stroke="#bcd0ec"/><text x="660" y="191" font-size="9" fill="#274a78" text-anchor="middle">L2</text>
  <rect x="592" y="234" width="136" height="30" rx="7" fill="#fdf6ea" stroke="#efdcb4"/><text x="660" y="253" font-size="9.5" fill="#5a3410" text-anchor="middle">工作线程 3</text>

  <!-- take arrows (queue -> thread) -->
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <line x1="296" y1="198" x2="296" y2="234" marker-end="url(#ar)"/>
    <line x1="660" y1="198" x2="660" y2="234" marker-end="url(#ar)"/>
  </g>
  <!-- steal arrow: idle thread2 steals from core3 -->
  <path d="M478,234 L478,210 L560,210" stroke="#c1962a" stroke-width="1.5" fill="none" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="520" y="204" font-size="8.5" fill="#a05411" text-anchor="middle">空闲 → 窃取邻核</text>

  <!-- entry arrow -->
  <path d="M168,186 L196,186" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- execution loop right -->
  <rect x="784" y="96" width="192" height="180" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="880" y="118" font-size="11" font-weight="600" fill="#1d1d1f" text-anchor="middle">线程取到后</text>
  <text x="800" y="144" font-size="10" fill="#6e6e73">· 运行一个时间片</text>
  <text x="800" y="168" font-size="10" fill="#6e6e73">· 依赖未就绪 → 让出</text>
  <text x="800" y="184" font-size="10" fill="#6e6e73">  转等待，唤醒后重入</text>
  <text x="800" y="208" font-size="10" fill="#6e6e73">· 片满未完 → 累加</text>
  <text x="800" y="224" font-size="10" fill="#6e6e73">  vruntime、降级重入队尾</text>
  <text x="800" y="252" font-size="9.5" fill="#93762e">vruntime 小者先跑 → 公平</text>
  <path d="M742,180 L784,180" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <text x="479" y="336" font-size="10" fill="#6e6e73" text-anchor="middle">要点：不靠线程阻塞表达等待；就绪 Task 按 vruntime 在 MLFQ 内择级，线程优先跑本核、空了才 work-steal，兼顾局部性与负载均衡。</text>
</svg>
