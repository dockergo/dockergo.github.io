<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="340" viewBox="0 0 1000 340" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1000" height="340" fill="#fbfbfd"/>
  <text x="40" y="30" font-size="14" font-weight="600" fill="#1d1d1f">结构对象全景：Base 表派生出加速/复用对象，查询按语义命中</text>
  <rect x="410" y="60" width="180" height="52" rx="13" fill="#ecf5ee" stroke="#c2ddc9" filter="url(#soft)"/><text x="500" y="84" font-size="13" font-weight="600" fill="#2c5a3a" text-anchor="middle">Base 表（明细）</text><text x="500" y="103" font-size="10" fill="#4e7a5c" text-anchor="middle">存全量数据</text>
  <g text-anchor="middle" font-size="11">
    <rect x="40" y="170" width="170" height="86" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="125" y="194" font-weight="600" fill="#1b2a4a">Rollup 上卷</text><text x="125" y="214" font-size="10" fill="#5b7db1">预聚合/裁列副本</text><text x="125" y="230" font-size="10" fill="#5b7db1">随基表 · 自动路由</text><text x="125" y="246" font-size="10" fill="#5b7db1">存数据</text>
    <rect x="228" y="170" width="170" height="86" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="313" y="194" font-weight="600" fill="#1b2a4a">同步 MV</text><text x="313" y="214" font-size="10" fill="#5b7db1">单表 · 实时</text><text x="313" y="230" font-size="10" fill="#5b7db1">透明改写</text><text x="313" y="246" font-size="10" fill="#5b7db1">存数据</text>
    <rect x="416" y="170" width="170" height="86" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="501" y="194" font-weight="600" fill="#1b2a4a">异步 MTMV</text><text x="501" y="214" font-size="10" fill="#5b7db1">多表 Join/聚合</text><text x="501" y="230" font-size="10" fill="#5b7db1">按策略刷新</text><text x="501" y="246" font-size="10" fill="#5b7db1">存数据</text>
    <rect x="604" y="170" width="170" height="86" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/><text x="689" y="194" font-weight="600" fill="#5a3410">逻辑视图 View</text><text x="689" y="214" font-size="10" fill="#93762e">只存 SQL</text><text x="689" y="230" font-size="10" fill="#93762e">查询时展开</text><text x="689" y="246" font-size="10" fill="#93762e">不存数据</text>
    <rect x="792" y="170" width="168" height="86" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/><text x="876" y="194" font-weight="600" fill="#5a3410">临时表</text><text x="876" y="214" font-size="10" fill="#93762e">会话级</text><text x="876" y="230" font-size="10" fill="#93762e">自动清理</text><text x="876" y="246" font-size="10" fill="#93762e">存数据</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <path d="M470,112 L125,168" marker-end="url(#ar)"/><path d="M485,112 L313,168" marker-end="url(#ar)"/><path d="M500,112 L501,168" marker-end="url(#ar)"/><path d="M515,112 L689,168" marker-end="url(#ar)"/><path d="M530,112 L876,168" marker-end="url(#ar)"/>
  </g>
  <text x="500" y="300" font-size="11" fill="#6e6e73" text-anchor="middle">选择：固定聚合用 Rollup / 同步 MV · 多表预计算用异步 MTMV · 只复用逻辑用 View · 中间结果用临时表</text>
</svg>
