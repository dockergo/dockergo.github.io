<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="430" viewBox="0 0 1000 430" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="430" fill="#fbfbfd"/>
  <text x="40" y="30" font-size="14" font-weight="600" fill="#1d1d1f">物化视图透明改写：命中即用预计算结果替代"读基表 + 现算"</text>

  <!-- decision path -->
  <rect x="40" y="52" width="180" height="48" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="130" y="81" font-size="13" font-weight="600" fill="#1b2a4a" text-anchor="middle">查询（Join/聚合）</text>
  <rect x="270" y="52" width="220" height="48" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/><text x="380" y="74" font-size="12.5" font-weight="600" fill="#5a3410" text-anchor="middle">优化器：语义等价/可覆盖？</text><text x="380" y="91" font-size="10" fill="#93762e" text-anchor="middle">Nereids MV 改写规则</text>
  <rect x="540" y="34" width="420" height="40" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="750" y="59" font-size="12" font-weight="600" fill="#12402a" text-anchor="middle">命中 → 改写读 MV（预计算·数据量小·快）</text>
  <rect x="540" y="82" width="420" height="40" rx="11" fill="#f4f6fa" stroke="#dfe4ea"/><text x="750" y="107" font-size="12" fill="#6e6e73" text-anchor="middle">未命中 → 读 Base + 现算 Join/聚合（大·慢）</text>
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="220" y1="76" x2="270" y2="76" marker-end="url(#ar)"/>
    <path d="M490,66 L515,66 L515,54 L540,54" marker-end="url(#ar)"/>
    <path d="M490,86 L515,86 L515,102 L540,102" marker-end="url(#ar)"/>
  </g>

  <!-- MV objects -->
  <rect x="40" y="150" width="440" height="80" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="60" y="176" font-size="13" font-weight="600" fill="#1b2a4a">同步 MV（Materialized Index）</text>
  <text x="60" y="198" font-size="11" fill="#5b7db1">单表 · 随基表实时更新 · 建在表上</text>
  <text x="60" y="217" font-size="11" fill="#5b7db1">透明改写：聚合上卷 / 裁列 命中即路由</text>
  <rect x="520" y="150" width="440" height="80" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="540" y="176" font-size="13" font-weight="600" fill="#1b2a4a">异步 MTMV</text>
  <text x="540" y="198" font-size="11" fill="#5b7db1">多表 Join / 聚合 · 按策略刷新</text>
  <text x="540" y="217" font-size="11" fill="#5b7db1">RefreshMethod：COMPLETE 全量 · AUTO 增量优先</text>

  <!-- base -> refresh -> MV -->
  <rect x="360" y="300" width="280" height="46" rx="12" fill="#ecf5ee" stroke="#c2ddc9" filter="url(#soft)"/><text x="500" y="328" font-size="13" font-weight="600" fill="#2c5a3a" text-anchor="middle">Base 表（明细）</text>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none" stroke-dasharray="5 3">
    <path d="M360,318 L200,318 L200,230" marker-end="url(#ar)"/>
    <path d="M640,318 L760,318 L760,230" marker-end="url(#ar)"/>
  </g>
  <text x="270" y="270" font-size="10" fill="#a1a1a6" text-anchor="middle">刷新（同步实时）</text>
  <text x="720" y="270" font-size="10" fill="#a1a1a6" text-anchor="middle">刷新（COMPLETE/AUTO）</text>

  <rect x="40" y="372" width="920" height="34" rx="10" fill="#fafafb" stroke="#ececf1"/>
  <text x="500" y="393" font-size="11" fill="#6e6e73" text-anchor="middle">透明改写命中条件：查询聚合粒度粗于/等于 MV · 查询 Join 是 MV 的子集或等价 · 查询列与过滤被 MV 覆盖 · MV 需新鲜</text>
</svg>
