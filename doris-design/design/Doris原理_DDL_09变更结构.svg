<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect x="0" y="0" width="1080" height="500" fill="#fbfbfd"/>
  <text x="40" y="38" font-size="16" font-weight="600" fill="#1d1d1f">Schema Change 变更结构</text>
  <text x="40" y="58" font-size="11.5" fill="#86868b">加影子索引 + 事务水位双写:老查询走原索引,新写双写影子,BE 转历史数据,完成后原子切换</text>

  <!-- 变更分类 -->
  <rect x="30" y="80" width="500" height="120" rx="14" fill="#f6f8fc" stroke="#e6ecf4"/>
  <text x="50" y="104" font-size="13" font-weight="600" fill="#1d5fb8">变更分类(SchemaChangeHandler)</text>
  <rect x="46" y="118" width="228" height="70" rx="10" fill="#ffffff" stroke="#c4d5ee" filter="url(#soft)"/><text x="62" y="140" font-size="11" font-weight="600" fill="#1d1d1f">light 变更</text><text x="62" y="160" font-size="9.5" fill="#7d93b5">加列/删列/改注释</text><text x="62" y="178" font-size="9.5" fill="#2c8a4a">秒级 · 无需 BE 转换</text>
  <rect x="286" y="118" width="228" height="70" rx="10" fill="#ffffff" stroke="#c4d5ee" filter="url(#soft)"/><text x="302" y="140" font-size="11" font-weight="600" fill="#1d1d1f">heavy 变更</text><text x="302" y="160" font-size="9.5" fill="#7d93b5">改类型/排序键/分桶</text><text x="302" y="178" font-size="9.5" fill="#a86a3a">走 SchemaChangeJobV2</text>

  <!-- 影子索引 -->
  <rect x="550" y="80" width="500" height="120" rx="14" fill="#faf4fb" stroke="#ecd9ef"/>
  <text x="570" y="104" font-size="13" font-weight="600" fill="#7a3fb0">影子索引(SHADOW)</text>
  <text x="570" y="122" font-size="9" fill="#a06fc0">MaterializedIndex · 对 load 可见、对 query 不可见</text>
  <rect x="566" y="132" width="468" height="56" rx="10" fill="#ffffff" stroke="#ecd9ef" filter="url(#soft)"/><text x="582" y="154" font-size="11" font-weight="600" fill="#1d1d1f">createJob 建影子</text><text x="582" y="174" font-size="9.5" fill="#a06fc0">分配 shadowIndexId + 影子 tablet/replica(addTabletIdMap)</text>

  <!-- 状态机 -->
  <rect x="30" y="216" width="1020" height="130" rx="14" fill="#fbf7ef" stroke="#efe4cf"/>
  <text x="50" y="240" font-size="13" font-weight="600" fill="#8a5a12">状态机 SchemaChangeJobV2</text>
  <g text-anchor="middle" font-size="11" fill="#8a5a12">
    <rect x="50" y="254" width="180" height="44" rx="10" fill="#ffffff" stroke="#efe0c4"/><text x="140" y="281">PENDING</text>
    <rect x="270" y="254" width="200" height="44" rx="10" fill="#ffffff" stroke="#efe0c4"/><text x="370" y="281">WAITING_TXN</text>
    <rect x="510" y="254" width="180" height="44" rx="10" fill="#ffffff" stroke="#efe0c4"/><text x="600" y="281">RUNNING</text>
    <rect x="730" y="254" width="180" height="44" rx="10" fill="#f5faf6" stroke="#cfe6d5"/><text x="820" y="281" fill="#2c5a3a">FINISHED</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="230" y1="276" x2="269" y2="276" marker-end="url(#ar)"/>
    <line x1="470" y1="276" x2="509" y2="276" marker-end="url(#ar)"/>
    <line x1="690" y1="276" x2="729" y2="276" marker-end="url(#ar)"/>
  </g>
  <text x="270" y="322" font-size="9.5" fill="#a98b52">watershedTxnId(双写水位):水位后新事务已双写,只转水位前历史 rowset · onFinished 原子切换</text>

  <!-- BE 转换器族 -->
  <rect x="30" y="362" width="1020" height="118" rx="14" fill="#f5faf6" stroke="#e2ece5"/>
  <text x="50" y="386" font-size="13" font-weight="600" fill="#2c5a3a">BE 转换器族(schema_change.cpp)</text>
  <g text-anchor="middle" font-size="11" fill="#2c5a3a">
    <rect x="50" y="398" width="320" height="66" rx="10" fill="#ffffff" stroke="#cfe6d5" filter="url(#soft)"/><text x="210" y="422" font-weight="600" fill="#1d1d1f">Linked</text><text x="210" y="442" font-size="9.5" fill="#4e7a5c">硬链接;仅加列等,无需重写数据</text>
    <rect x="380" y="398" width="320" height="66" rx="10" fill="#ffffff" stroke="#cfe6d5" filter="url(#soft)"/><text x="540" y="422" font-weight="600" fill="#1d1d1f">Directly(VSchemaChangeDirectly)</text><text x="540" y="442" font-size="9.5" fill="#4e7a5c">逐块直转;改类型等</text>
    <rect x="710" y="398" width="320" height="66" rx="10" fill="#ffffff" stroke="#cfe6d5" filter="url(#soft)"/><text x="870" y="422" font-weight="600" fill="#1d1d1f">WithSorting</text><text x="870" y="442" font-size="9.5" fill="#4e7a5c">改排序键需重排序后写</text>
  </g>
</svg>
