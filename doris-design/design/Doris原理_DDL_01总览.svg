<svg xmlns="http://www.w3.org/2000/svg" width="740" height="520" viewBox="0 0 740 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="740" height="520" fill="#fbfbfd"/>
  <text x="40" y="26" font-size="11" fill="#a1a1a6">元数据形态（方框）经动作（箭头标注）推进；多数派确认 = 提交点</text>
  <g text-anchor="middle" font-size="13">
    <rect x="120" y="34" width="300" height="36" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="270" y="57" fill="#12402a">DDL Request</text>
    <rect x="120" y="100" width="300" height="36" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="270" y="123" fill="#12402a">Op on Master</text>
    <rect x="120" y="166" width="300" height="36" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="270" y="189" fill="#12402a">EditLog Entry（op + data）</text>
    <rect x="120" y="232" width="300" height="36" rx="10" fill="#fff7e6" stroke="#e8cf9a"/><text x="270" y="255" fill="#5a3410">Committed Journal（全序·多数派）</text>
    <rect x="120" y="298" width="300" height="36" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="270" y="321" fill="#12402a">各 FE 一致内存 Metadata</text>
    <rect x="120" y="364" width="300" height="36" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="270" y="387" fill="#12402a">BE 生效：Tablet / schema</text>
    <rect x="120" y="430" width="300" height="36" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="270" y="453" fill="#12402a">Image（snapshot）</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4"><line x1="270" y1="70" x2="270" y2="98" marker-end="url(#a)"/><line x1="270" y1="136" x2="270" y2="164" marker-end="url(#a)"/><line x1="270" y1="202" x2="270" y2="230" marker-end="url(#a)"/><line x1="270" y1="268" x2="270" y2="296" marker-end="url(#a)"/><line x1="270" y1="334" x2="270" y2="362" marker-end="url(#a)"/><line x1="270" y1="400" x2="270" y2="428" marker-end="url(#a)"/></g>
  <g font-size="11" fill="#5b7db1"><text x="438" y="88">① Forward to Master</text><text x="438" y="154">② Execute（校验·加锁·改内存·生成日志）</text><text x="438" y="220">③ Write EditLog → 多数派（提交点）</text><text x="438" y="286">④ Follower/Observer Replay</text><text x="438" y="352">⑤ Dispatch BE tasks（涉及数据）</text><text x="438" y="418">⑥ Checkpoint → Image</text></g>
</svg>
