<svg xmlns="http://www.w3.org/2000/svg" width="820" height="290" viewBox="0 0 820 290" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="820" height="290" fill="#fbfbfd"/>
  <text x="30" y="28" font-size="14" font-weight="600" fill="#1d1d1f">DCL 侧资源隔离：把用户/角色绑定到 Workload Group，落地 CPU/内存/并发配额</text>
  <g text-anchor="middle" font-size="11.5">
    <rect x="40" y="70" width="150" height="44" rx="11" fill="#fbeaea" stroke="#e7c3c3" filter="url(#s)"/><text x="115" y="97" fill="#4a1414">User / Role</text>
    <rect x="250" y="70" width="180" height="44" rx="11" fill="#f4eefb" stroke="#e2d3f3" filter="url(#s)"/><text x="340" y="90" fill="#42246b">SET / 绑定</text><text x="340" y="106" font-size="9" fill="#7a5aa0">property = workload_group</text>
    <rect x="490" y="60" width="290" height="120" rx="13" fill="#ffffff" stroke="#ececf1" filter="url(#s)"/>
  </g>
  <text x="635" y="82" font-size="12.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">Workload Group</text>
  <g text-anchor="middle" font-size="10.5" fill="#4a4e57">
    <rect x="506" y="92" width="258" height="24" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="635" y="108" fill="#1b2a4a">CPU：软限权重 + 硬限（cgroup）</text>
    <rect x="506" y="120" width="258" height="24" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="635" y="136" fill="#1b2a4a">Memory：配额 + 可选超借</text>
    <rect x="506" y="148" width="258" height="24" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="635" y="164" fill="#1b2a4a">并发：max_concurrency + 排队</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <line x1="190" y1="92" x2="250" y2="92" marker-end="url(#a)"/>
    <line x1="430" y1="92" x2="490" y2="92" marker-end="url(#a)"/>
  </g>
  <rect x="40" y="212" width="740" height="50" rx="12" fill="#f5faf6" stroke="#dbe9e0"/>
  <text x="410" y="234" font-size="11" font-weight="600" fill="#2c5a3a" text-anchor="middle">隔离 ≠ 加速</text>
  <text x="410" y="252" font-size="10" fill="#4e7a5c" text-anchor="middle">Workload Group 保稳定与公平：重要业务被优先保障，大查询不拖垮全集群；不提升单查询速度</text>
</svg>
