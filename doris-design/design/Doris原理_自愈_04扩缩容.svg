<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="320" viewBox="0 0 1000 320" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1000" height="320" fill="#fbfbfd"/>
  <text x="40" y="30" font-size="14" font-weight="600" fill="#1d1d1f">扩缩容与再均衡：限速迁移、优雅下线、按组对齐；存算分离分钟级弹性</text>
  <g text-anchor="middle">
    <rect x="40" y="66" width="220" height="94" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="150" y="92" font-size="12.5" font-weight="600" fill="#12402a">扩容</text><text x="150" y="114" font-size="10.5" fill="#2f6f4f">新增 BE →</text><text x="150" y="132" font-size="10.5" fill="#2f6f4f">均衡逐步迁入 Tablet/副本</text><text x="150" y="150" font-size="10.5" fill="#2f6f4f">限速 · 不影响在线</text>
    <rect x="280" y="66" width="220" height="94" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/><text x="390" y="92" font-size="12.5" font-weight="600" fill="#5a3410">缩容（DECOMMISSION）</text><text x="390" y="114" font-size="10.5" fill="#93762e">先迁走副本 →</text><text x="390" y="132" font-size="10.5" fill="#93762e">确认冗余充足 →</text><text x="390" y="150" font-size="10.5" fill="#93762e">再摘除，不中断</text>
    <rect x="520" y="66" width="220" height="94" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="630" y="92" font-size="12.5" font-weight="600" fill="#1b2a4a">再均衡</text><text x="630" y="114" font-size="10.5" fill="#5b7db1">按磁盘率/分布均匀度</text><text x="630" y="132" font-size="10.5" fill="#5b7db1">触发迁移</text><text x="630" y="150" font-size="10.5" fill="#5b7db1">Colocate 组整体迁移对齐</text>
    <rect x="760" y="66" width="200" height="94" rx="13" fill="#f4eefb" stroke="#e2d3f3" filter="url(#soft)"/><text x="860" y="92" font-size="12.5" font-weight="600" fill="#42246b">存算分离</text><text x="860" y="114" font-size="10.5" fill="#7a5aa0">计算无状态</text><text x="860" y="132" font-size="10.5" fill="#7a5aa0">分钟级扩缩、不搬数据</text><text x="860" y="150" font-size="10.5" fill="#7a5aa0">仅缓存预热</text>
  </g>
  <rect x="40" y="196" width="920" height="96" rx="13" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="60" y="222" font-size="12.5" font-weight="600" fill="#1b2a4a">共同点：均由 Tablet Scheduler 驱动、限速执行</text>
  <text x="60" y="248" font-size="11" fill="#6e6e73">· 修复类（补副本/Clone）优先于均衡类；均衡不抢占在线读写</text>
  <text x="60" y="270" font-size="11" fill="#6e6e73">· 存算一体扩缩需搬数据；存算分离数据在共享存储，弹性最快</text>
</svg>
