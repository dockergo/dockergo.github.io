<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="330" viewBox="0 0 1000 330" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1000" height="330" fill="#fbfbfd"/>
  <text x="40" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Group Commit：高频小写先落 WAL、攒批合成大 Rowset，降版本数</text>
  <g text-anchor="middle">
    <rect x="40" y="80" width="150" height="120" rx="12" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/><text x="115" y="104" font-size="12" font-weight="600" fill="#4a1414">高频小写</text>
    <rect x="58" y="116" width="114" height="20" rx="5" fill="#fff" stroke="#e7c3c3"/><text x="115" y="131" font-size="9.5" fill="#a05252">insert 1</text>
    <rect x="58" y="142" width="114" height="20" rx="5" fill="#fff" stroke="#e7c3c3"/><text x="115" y="157" font-size="9.5" fill="#a05252">insert 2</text>
    <rect x="58" y="168" width="114" height="20" rx="5" fill="#fff" stroke="#e7c3c3"/><text x="115" y="183" font-size="9.5" fill="#a05252">insert N …</text>

    <rect x="250" y="104" width="180" height="72" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/><text x="340" y="132" font-size="12.5" font-weight="600" fill="#5a3410">WAL + 攒批队列</text><text x="340" y="152" font-size="10" fill="#93762e">先落 WAL（不丢）</text><text x="340" y="167" font-size="10" fill="#93762e">async / sync 模式</text>

    <rect x="490" y="104" width="180" height="72" rx="13" fill="#f4eefb" stroke="#e2d3f3" filter="url(#soft)"/><text x="580" y="132" font-size="12.5" font-weight="600" fill="#42246b">组提交合并</text><text x="580" y="152" font-size="10" fill="#7a5aa0">多次小写 → 一个批次</text><text x="580" y="167" font-size="10" fill="#7a5aa0">合成一个事务</text>

    <rect x="730" y="104" width="230" height="72" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="845" y="132" font-size="12.5" font-weight="600" fill="#12402a">一个大 Rowset</text><text x="845" y="152" font-size="10" fill="#2f6f4f">版本数骤降</text><text x="845" y="167" font-size="10" fill="#2f6f4f">避免 -235 版本过多</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none"><line x1="190" y1="140" x2="250" y2="140" marker-end="url(#ar)"/><line x1="430" y1="140" x2="490" y2="140" marker-end="url(#ar)"/><line x1="670" y1="140" x2="730" y2="140" marker-end="url(#ar)"/></g>
  <rect x="40" y="232" width="920" height="62" rx="12" fill="#fafafb" stroke="#ececf1"/>
  <text x="500" y="258" font-size="11.5" fill="#6e6e73" text-anchor="middle">对比：不攒批 → 每次小写各成一个小 Rowset → 版本爆炸、Compaction 追不上 → -235 写拒绝。</text>
  <text x="500" y="280" font-size="11.5" fill="#6e6e73" text-anchor="middle">WAL 保证攒批期不丢、重启可恢复；适合高并发小批量写入场景。</text>
</svg>
