<svg xmlns="http://www.w3.org/2000/svg" width="860" height="380" viewBox="0 0 860 380" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="860" height="380" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">多级内存治理：分级额度逐层收敛 + 超限处理链</text>

  <!-- nested levels -->
  <rect x="30" y="50" width="410" height="252" rx="14" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="44" y="70" font-size="11.5" font-weight="600" fill="#274a78">进程级 · BE 总内存上限</text>
  <rect x="54" y="82" width="362" height="204" rx="12" fill="#e9f1fb" stroke="#c4d8f0"/>
  <text x="68" y="101" font-size="11" font-weight="600" fill="#274a78">组级 · Workload Group memory_limit（可 overcommit）</text>
  <rect x="78" y="112" width="314" height="160" rx="11" fill="#e0ebfa" stroke="#bcd0ec"/>
  <text x="92" y="131" font-size="11" font-weight="600" fill="#274a78">查询级 · exec_mem_limit</text>
  <rect x="102" y="142" width="266" height="116" rx="10" fill="#d7e5f7" stroke="#b6cdf0"/>
  <text x="116" y="161" font-size="11" font-weight="600" fill="#274a78">算子级 · Agg/Sort/Join 内存跟踪</text>
  <text x="116" y="182" font-size="10" fill="#4a6b9a">到阈值触发 Spill</text>
  <rect x="116" y="196" width="238" height="48" rx="9" fill="#ffffff" stroke="#c4d5ee"/><text x="235" y="216" font-size="10.5" fill="#274a78" text-anchor="middle">缓存级 · Page/Data Cache</text><text x="235" y="233" font-size="9.5" fill="#5b7db1" text-anchor="middle">独立配额 · 与查询内存竞争</text>

  <!-- overflow chain -->
  <rect x="486" y="50" width="344" height="252" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#s)"/>
  <text x="658" y="74" font-size="12.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">超限处理链（逐层收敛）</text>
  <g text-anchor="middle">
    <rect x="546" y="92" width="224" height="44" rx="11" fill="#eafaf1" stroke="#bfe0cd"/><text x="658" y="112" font-size="12" font-weight="600" fill="#12402a">① Backpressure 背压</text><text x="658" y="128" font-size="9.5" fill="#4e7a5c">先减速上游，不立即杀</text>
    <rect x="546" y="156" width="224" height="44" rx="11" fill="#fff7e6" stroke="#e8cf9a"/><text x="658" y="176" font-size="12" font-weight="600" fill="#5a3410">② Spill 落盘</text><text x="658" y="192" font-size="9.5" fill="#93762e">Agg/Sort/Join 溢出到磁盘</text>
    <rect x="546" y="220" width="224" height="44" rx="11" fill="#fbeaea" stroke="#e7c3c3"/><text x="658" y="240" font-size="12" font-weight="600" fill="#4a1414">③ reject / cancel</text><text x="658" y="256" font-size="9.5" fill="#a05252">仍超限则拒绝或取消</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none"><line x1="658" y1="136" x2="658" y2="156" marker-end="url(#a)"/><line x1="658" y1="200" x2="658" y2="220" marker-end="url(#a)"/></g>

  <line x1="440" y1="180" x2="486" y2="180" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#a)"/><text x="463" y="172" font-size="9" fill="#a1a1a6" text-anchor="middle">超限</text>
  <text x="430" y="332" font-size="11" fill="#6e6e73">分级 + 实时跟踪 + 背压/落盘 → 目标"用满但不溢出"</text>
</svg>
