<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="960" height="440" fill="#fbfbfd"/>
  <rect x="30" y="24" width="900" height="176" rx="16" fill="#f6f8fc" stroke="#e6ecf4"/>
  <text x="50" y="48" font-size="12" font-weight="600" fill="#1d1d1f">Fragment-1（按 ★Breaker 拆 Pipeline）</text>
  <g font-size="12">
    <rect x="50" y="60" width="860" height="34" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="70" y="82" fill="#1b2a4a">Pipe1 · Build 侧：ExchangeSource ▸ HashJoin BuildSink ★（生成 Runtime Filter）</text>
    <rect x="50" y="102" width="860" height="34" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="70" y="124" fill="#1b2a4a">Pipe2 · Scan+Probe+局部聚合：ScanSource×Tablet ▸ LocalExchange ▸ HashJoin Probe×DOP ▸ Agg(Partial)Sink ★</text>
    <rect x="50" y="144" width="860" height="34" rx="10" fill="#f3e9fb" stroke="#d8c9ee"/><text x="70" y="166" fill="#33194a">Pipe3 · 发送：Agg(Partial)Source ▸ ExchangeSink（Shuffle）</text>
  </g>
  <line x1="330" y1="94" x2="330" y2="102" stroke="#c7c7cc" stroke-width="1.3" stroke-dasharray="4 4" marker-end="url(#a)"/><text x="420" y="100" font-size="9" fill="#a1a1a6">build 完成→Probe · Runtime Filter</text>
  <line x1="330" y1="136" x2="330" y2="144" stroke="#c7c7cc" stroke-width="1.3" stroke-dasharray="4 4" marker-end="url(#a)"/>

  <rect x="30" y="248" width="900" height="176" rx="16" fill="#f6f8fc" stroke="#e6ecf4"/>
  <text x="50" y="272" font-size="12" font-weight="600" fill="#1d1d1f">Fragment-0（Coordinator BE）</text>
  <g font-size="12">
    <rect x="50" y="284" width="860" height="34" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="70" y="306" fill="#1b2a4a">Pipe4 · 全局聚合：ExchangeSource ▸ LocalExchange ▸ Agg(Final)Sink ★</text>
    <rect x="50" y="326" width="860" height="34" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="70" y="348" fill="#1b2a4a">Pipe5 · TopN：Agg(Final)Source ▸ TopN Sink ★</text>
    <rect x="50" y="368" width="860" height="34" rx="10" fill="#fbeaea" stroke="#e7c3c3"/><text x="70" y="390" fill="#4a1414">Pipe6 · 返回：TopN Source ▸ ResultSink</text>
  </g>
  <line x1="330" y1="318" x2="330" y2="326" stroke="#c7c7cc" stroke-width="1.3" stroke-dasharray="4 4" marker-end="url(#a)"/>
  <line x1="330" y1="360" x2="330" y2="368" stroke="#c7c7cc" stroke-width="1.3" stroke-dasharray="4 4" marker-end="url(#a)"/>
  <line x1="480" y1="200" x2="480" y2="246" stroke="#c7c7cc" stroke-width="1.8" marker-end="url(#a)"/><text x="560" y="228" font-size="10" fill="#a1a1a6" text-anchor="middle">Exchange Shuffle（唯一跨节点）</text>
</svg>
