<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="400" viewBox="0 0 1000 400" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="400" fill="#fbfbfd"/>
  <text x="40" y="30" font-size="14" font-weight="600" fill="#1d1d1f">多级缓存：从粗到细逐层命中，命中即短路；数据版本变则相关缓存失效</text>

  <rect x="40" y="60" width="150" height="48" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="115" y="89" font-size="13" font-weight="600" fill="#1b2a4a" text-anchor="middle">查询</text>

  <!-- L1 SQL Cache -->
  <rect x="240" y="52" width="230" height="64" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/><text x="355" y="78" font-size="13" font-weight="600" fill="#5a3410" text-anchor="middle">① SQL Cache</text><text x="355" y="98" font-size="10.5" fill="#93762e" text-anchor="middle">整条 SQL 结果 · 数据未变即命中</text>
  <!-- L2 Partition Cache -->
  <rect x="240" y="150" width="230" height="76" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/><text x="355" y="176" font-size="13" font-weight="600" fill="#5a3410" text-anchor="middle">② Partition Cache</text><text x="355" y="196" font-size="10.5" fill="#93762e" text-anchor="middle">分区级结果 · 命中未变分区</text><text x="355" y="212" font-size="10.5" fill="#93762e" text-anchor="middle">只算变更分区 → 合并</text>
  <!-- L3 Query Cache -->
  <rect x="240" y="260" width="230" height="64" rx="13" fill="#fdf3df" stroke="#e8cf9a"/><text x="355" y="286" font-size="13" font-weight="600" fill="#5a3410" text-anchor="middle">③ Query Cache</text><text x="355" y="306" font-size="10.5" fill="#93762e" text-anchor="middle">算子级中间结果 · 子计划复用</text>

  <!-- returns -->
  <rect x="560" y="60" width="200" height="48" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="660" y="89" font-size="12.5" font-weight="600" fill="#12402a" text-anchor="middle">命中 → 直接返回（短路）</text>
  <rect x="560" y="164" width="200" height="48" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="660" y="185" font-size="12" font-weight="600" fill="#12402a" text-anchor="middle">部分命中 → 缓存 + 增量</text><text x="660" y="202" font-size="10" fill="#2f6f4f" text-anchor="middle">合并后返回</text>
  <rect x="560" y="276" width="200" height="48" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="660" y="305" font-size="12.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">未命中 → 正常执行</text>

  <!-- invalidation -->
  <rect x="800" y="150" width="170" height="80" rx="13" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/><text x="885" y="180" font-size="12.5" font-weight="600" fill="#4a1414" text-anchor="middle">失效</text><text x="885" y="202" font-size="10" fill="#a05252" text-anchor="middle">数据版本变 →</text><text x="885" y="218" font-size="10" fill="#a05252" text-anchor="middle">相关缓存失效</text>

  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <path d="M190,84 L240,84" marker-end="url(#ar)"/>
    <path d="M355,116 L355,150" marker-end="url(#ar)"/>
    <path d="M355,226 L355,260" marker-end="url(#ar)"/>
    <path d="M470,84 L560,84" marker-end="url(#ar)"/>
    <path d="M470,188 L560,188" marker-end="url(#ar)"/>
    <path d="M470,292 L560,300" marker-end="url(#ar)"/>
  </g>
  <g font-size="9.5" fill="#a1a1a6" text-anchor="middle"><text x="355" y="142">未命中↓</text><text x="355" y="252">未命中↓</text></g>
  <g stroke="#e7c3c3" stroke-width="1.3" fill="none" stroke-dasharray="4 3">
    <path d="M800,180 L470,180" marker-end="url(#ar)"/>
  </g>
  <text x="40" y="366" font-size="11" fill="#6e6e73">粒度：SQL（整条结果）› Partition（分区级）› Query（算子级）——越细复用面越广、失效面越小。</text>
</svg>
