<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="410" viewBox="0 0 1000 410" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1000" height="410" fill="#fbfbfd"/>
  <text x="40" y="30" font-size="14" font-weight="600" fill="#1d1d1f">统计信息生命周期：采集 → 喂 CBO 估基数/代价 → 选计划；失真则 HBO 实测纠偏</text>

  <!-- pipeline row -->
  <g text-anchor="middle">
    <rect x="36" y="58" width="150" height="70" rx="12" fill="#ecf5ee" stroke="#c2ddc9" filter="url(#soft)"/><text x="111" y="86" font-size="12" font-weight="600" fill="#2c5a3a">数据变化</text><text x="111" y="106" font-size="9.5" fill="#4e7a5c">updatedRows / health</text>
    <rect x="216" y="58" width="230" height="70" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/><text x="331" y="82" font-size="12" font-weight="600" fill="#5a3410">采集</text><text x="331" y="100" font-size="9.5" fill="#93762e">自动 auto_analyze / 手动 ANALYZE</text><text x="331" y="116" font-size="9.5" fill="#93762e">FULL/SAMPLE · FUNDAMENTALS/HISTOGRAM</text>
    <rect x="476" y="58" width="230" height="70" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="591" y="82" font-size="12" font-weight="600" fill="#1b2a4a">统计信息 ColumnStatistic</text><text x="591" y="100" font-size="9.5" fill="#5b7db1">rowCount · NDV · min/max</text><text x="591" y="116" font-size="9.5" fill="#5b7db1">numNulls · dataSize · histogram</text>
    <rect x="736" y="58" width="226" height="70" rx="12" fill="#f4eefb" stroke="#e2d3f3" filter="url(#soft)"/><text x="849" y="82" font-size="12" font-weight="600" fill="#42246b">CBO 代价模型</text><text x="849" y="100" font-size="9.5" fill="#7a5aa0">基数/代价估计 →</text><text x="849" y="116" font-size="9.5" fill="#7a5aa0">选 Join 顺序/分布/聚合</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none"><line x1="186" y1="93" x2="216" y2="93" marker-end="url(#ar)"/><line x1="446" y1="93" x2="476" y2="93" marker-end="url(#ar)"/><line x1="706" y1="93" x2="736" y2="93" marker-end="url(#ar)"/></g>

  <!-- distortion band -->
  <rect x="36" y="168" width="926" height="86" rx="13" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="56" y="192" font-size="12.5" font-weight="600" fill="#4a1414">失真（统计不准）→ 误估 → 选错计划</text>
  <g font-size="10.5" fill="#7a2a2a">
    <text x="56" y="216">· 陈旧：大导入后未采集</text>
    <text x="56" y="238">· 采样偏差 / 数据倾斜</text>
    <text x="470" y="216">· 低估行数 → 误把大表 Broadcast → OOM</text>
    <text x="470" y="238">· 高估 NDV → 错误 Join 顺序 / 分布方式</text>
  </g>
  <line x1="591" y1="128" x2="591" y2="168" stroke="#c7c7cc" stroke-width="1.4" fill="none" stroke-dasharray="4 3" marker-end="url(#ar)"/>

  <!-- HBO -->
  <rect x="260" y="292" width="480" height="60" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="500" y="317" font-size="12.5" font-weight="600" fill="#12402a" text-anchor="middle">HBO：用重复查询的实测行数/耗时回灌，纠正估算偏差</text>
  <text x="500" y="337" font-size="10" fill="#2f6f4f" text-anchor="middle">统计注定估不准时（缺失/倾斜），用运行时真实反馈兜底</text>
  <path d="M740,322 L860,322 L860,128" stroke="#c7c7cc" stroke-width="1.5" fill="none" stroke-dasharray="5 3" marker-end="url(#ar)"/>
  <text x="820" y="290" font-size="9.5" fill="#a1a1a6" text-anchor="middle">回灌纠偏</text>
  <text x="500" y="378" font-size="11" fill="#6e6e73" text-anchor="middle">工程铁律：大批导入后主动收集 · 倾斜列关注直方图 · 大表用采样降成本 · 必要时 Hint 固定计划</text>
</svg>
