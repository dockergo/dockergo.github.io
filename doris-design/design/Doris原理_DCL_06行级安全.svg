<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="320" viewBox="0 0 1000 320" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1000" height="320" fill="#fbfbfd"/>
  <text x="40" y="30" font-size="14" font-weight="600" fill="#1d1d1f">行级安全（Row Policy）：查询执行前自动注入行过滤谓词，不同用户看不同行</text>
  <g text-anchor="middle">
    <rect x="40" y="70" width="200" height="50" rx="12" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/><text x="140" y="94" font-size="12.5" font-weight="600" fill="#4a1414">用户查询</text><text x="140" y="112" font-size="10" fill="#a05252">SELECT * FROM t</text>
    <rect x="300" y="64" width="240" height="62" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/><text x="420" y="90" font-size="12.5" font-weight="600" fill="#5a3410">优化器注入 Row Policy</text><text x="420" y="110" font-size="10" fill="#93762e">按 用户/角色 匹配行过滤谓词</text>
    <rect x="600" y="64" width="360" height="62" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="780" y="90" font-size="12" font-weight="600" fill="#1b2a4a">改写为：SELECT * FROM t WHERE 〈policy〉</text><text x="780" y="110" font-size="10" fill="#5b7db1">谓词下推 Scan，只返回可见行</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none"><line x1="240" y1="95" x2="300" y2="95" marker-end="url(#ar)"/><line x1="540" y1="95" x2="600" y2="95" marker-end="url(#ar)"/></g>
  <g text-anchor="middle" font-size="10.5">
    <rect x="300" y="168" width="300" height="30" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="450" y="188" fill="#12402a">用户 A（region='CN'）→ 只见 CN 行</text>
    <rect x="620" y="168" width="300" height="30" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="770" y="188" fill="#12402a">用户 B（dept='sales'）→ 只见 sales 行</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.3" fill="none" stroke-dasharray="4 3"><path d="M600,126 L450,168" marker-end="url(#ar)"/><path d="M780,126 L770,168" marker-end="url(#ar)"/></g>
  <rect x="40" y="234" width="920" height="60" rx="12" fill="#fafafb" stroke="#ececf1"/>
  <text x="500" y="260" font-size="11.5" fill="#6e6e73" text-anchor="middle">配合列级脱敏/掩码：把"控制"从"能否访问对象"细化到"能看到哪些行、哪些列的明文"。</text>
  <text x="500" y="281" font-size="11.5" fill="#6e6e73" text-anchor="middle">对用户透明、无需改 SQL；策略经 EditLog 复制全 FE 一致生效。</text>
</svg>
