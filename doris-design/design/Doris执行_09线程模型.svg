<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="640" viewBox="0 0 1080 640" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1080" height="640" fill="#fbfbfd"/>
  <text x="40" y="40" font-size="16" font-weight="600" fill="#1d1d1f">BE 线程模型 · ≈840 线程 · 7 层 × 16 组线程池</text>
  <text x="40" y="60" font-size="11.5" fill="#86868b">一条 SQL 自上而下穿过 7 层线程池;每层用独立池隔离,避免慢任务阻塞快任务</text>

  <!-- 7 层线程池,自上而下 -->
  <g font-size="11">
    <!-- L1 接入 -->
    <rect x="40" y="80" width="1000" height="66" rx="14" fill="#f6f8fc" stroke="#e6ecf4"/>
    <text x="58" y="102" font-size="12.5" font-weight="600" fill="#1d5fb8">① 接入层 · brpc / bthread</text>
    <g text-anchor="middle" fill="#4a4e57">
      <rect x="300" y="110" width="220" height="28" rx="8" fill="#ffffff" stroke="#e6e7ea" filter="url(#soft)"/><text x="410" y="128">brpc worker(M:N bthread)</text>
      <rect x="540" y="110" width="220" height="28" rx="8" fill="#ffffff" stroke="#e6e7ea" filter="url(#soft)"/><text x="650" y="128">FragmentMgr 接收 exec_plan</text>
      <rect x="780" y="110" width="230" height="28" rx="8" fill="#ffffff" stroke="#e6e7ea" filter="url(#soft)"/><text x="895" y="128">心跳 / 汇报池</text>
    </g>
    <!-- L2 pipeline 调度 -->
    <rect x="40" y="154" width="1000" height="66" rx="14" fill="#fbf7ef" stroke="#efe4cf"/>
    <text x="58" y="176" font-size="12.5" font-weight="600" fill="#8a5a12">② Pipeline 调度层 · TaskScheduler</text>
    <g text-anchor="middle" fill="#8a5a12">
      <rect x="300" y="184" width="340" height="28" rx="8" fill="#ffffff" stroke="#efe0c4" filter="url(#soft)"/><text x="470" y="202">PipelineTask 执行池(work-stealing · 对齐核数)</text>
      <rect x="660" y="184" width="350" height="28" rx="8" fill="#ffffff" stroke="#efe0c4" filter="url(#soft)"/><text x="835" y="202">Dependency 唤醒 · 阻塞→就绪队列</text>
    </g>
    <!-- L3 scan -->
    <rect x="40" y="228" width="1000" height="66" rx="14" fill="#f5faf6" stroke="#e2ece5"/>
    <text x="58" y="250" font-size="12.5" font-weight="600" fill="#2c5a3a">③ 扫描层 · ScannerScheduler</text>
    <g text-anchor="middle" fill="#2c5a3a">
      <rect x="300" y="258" width="220" height="28" rx="8" fill="#ffffff" stroke="#cfe6d5" filter="url(#soft)"/><text x="410" y="276">local scan 池(本地磁盘)</text>
      <rect x="540" y="258" width="220" height="28" rx="8" fill="#ffffff" stroke="#cfe6d5" filter="url(#soft)"/><text x="650" y="276">remote scan 池(对象存储)</text>
      <rect x="780" y="258" width="230" height="28" rx="8" fill="#ffffff" stroke="#cfe6d5" filter="url(#soft)"/><text x="895" y="276">隐藏 · BlockFileCache 回源</text>
    </g>
    <!-- L4 写入/flush -->
    <rect x="40" y="302" width="1000" height="66" rx="14" fill="#f3f0fb" stroke="#ddd4f2"/>
    <text x="58" y="324" font-size="12.5" font-weight="600" fill="#5b3fd6">④ 写入层 · MemTable Flush</text>
    <g text-anchor="middle" fill="#5b3fd6">
      <rect x="300" y="332" width="220" height="28" rx="8" fill="#ffffff" stroke="#ddd4f2" filter="url(#soft)"/><text x="410" y="350">flush 池 · MemTable→Segment</text>
      <rect x="540" y="332" width="220" height="28" rx="8" fill="#ffffff" stroke="#ddd4f2" filter="url(#soft)"/><text x="650" y="350">load 通道池</text>
      <rect x="780" y="332" width="230" height="28" rx="8" fill="#ffffff" stroke="#ddd4f2" filter="url(#soft)"/><text x="895" y="350">group commit 合并池</text>
    </g>
    <!-- L5 后台 -->
    <rect x="40" y="376" width="1000" height="66" rx="14" fill="#faf4fb" stroke="#ecd9ef"/>
    <text x="58" y="398" font-size="12.5" font-weight="600" fill="#7a3fb0">⑤ 后台维护层</text>
    <g text-anchor="middle" fill="#7a3fb0">
      <rect x="300" y="406" width="170" height="28" rx="8" fill="#ffffff" stroke="#ecd9ef" filter="url(#soft)"/><text x="385" y="424">Compaction 池</text>
      <rect x="490" y="406" width="170" height="28" rx="8" fill="#ffffff" stroke="#ecd9ef" filter="url(#soft)"/><text x="575" y="424">Clone / 修复池</text>
      <rect x="680" y="406" width="150" height="28" rx="8" fill="#ffffff" stroke="#ecd9ef" filter="url(#soft)"/><text x="755" y="424">GC / 过期清理</text>
      <rect x="850" y="406" width="160" height="28" rx="8" fill="#ffffff" stroke="#ecd9ef" filter="url(#soft)"/><text x="930" y="424">cache 淘汰池</text>
    </g>
    <!-- L6 RPC 交换 -->
    <rect x="40" y="450" width="1000" height="60" rx="14" fill="#fdf6ea" stroke="#efdcb4"/>
    <text x="58" y="472" font-size="12.5" font-weight="600" fill="#8a5a12">⑥ 数据交换层 · Exchange</text>
    <g text-anchor="middle" fill="#a98b52">
      <rect x="300" y="480" width="340" height="24" rx="8" fill="#ffffff" stroke="#efdcb4"/><text x="470" y="496" font-size="10.5">Sink 发送池 · brpc 序列化传输</text>
      <rect x="660" y="480" width="350" height="24" rx="8" fill="#ffffff" stroke="#efdcb4"/><text x="835" y="496" font-size="10.5">Exchange 接收 · 攒批解压</text>
    </g>
    <!-- L7 通用 -->
    <rect x="40" y="518" width="1000" height="56" rx="14" fill="#f7f7f9" stroke="#ececef"/>
    <text x="58" y="540" font-size="12.5" font-weight="600" fill="#1d1d1f">⑦ 通用 / 定时层</text>
    <text x="58" y="562" font-size="10.5" fill="#86868b">元数据上报 · 定时任务 · 日志 · Metrics 采集 —— 全 16 组池各自 bounded,慢池不拖垮快池</text>
  </g>
  <!-- 贯穿箭头 -->
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="150" y1="146" x2="150" y2="154" marker-end="url(#ar)"/>
    <line x1="150" y1="220" x2="150" y2="228" marker-end="url(#ar)"/>
    <line x1="150" y1="294" x2="150" y2="302" marker-end="url(#ar)"/>
    <line x1="150" y1="368" x2="150" y2="376" marker-end="url(#ar)"/>
    <line x1="150" y1="442" x2="150" y2="450" marker-end="url(#ar)"/>
    <line x1="150" y1="510" x2="150" y2="518" marker-end="url(#ar)"/>
  </g>
  <text x="120" y="600" font-size="10.5" fill="#a1a1a6">≈840 线程 = 各层池线程数之和(随核数/配置伸缩);池间通过队列解耦,是 BE 高并发不崩的关键。</text>
</svg>
