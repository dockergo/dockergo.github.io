<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 900 620" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect x="0" y="0" width="900" height="620" fill="#fbfbfd"/>
  <text x="40" y="38" font-size="15" font-weight="600" fill="#1d1d1f">① PARSED PLAN · 解析未绑定</text>
  <text x="40" y="58" font-size="11" fill="#86868b">SQL → Parser(antlr4) → 未绑定 LogicalPlan;Join 类型未定,表未解析</text>
  <text x="40" y="82" font-size="10" fill="#a06fc0">SELECT region, sum(amount) … orders JOIN users … WHERE u.age&gt;30 GROUP BY region ORDER BY 2 DESC LIMIT 10</text>
  <g text-anchor="middle" font-size="12">
    <rect x="350" y="100" width="200" height="40" rx="10" fill="#f4eefb" stroke="#dcccf0" filter="url(#soft)"/><text x="450" y="125" fill="#4a2e78">Limit 10</text>
    <rect x="330" y="160" width="240" height="40" rx="10" fill="#f4eefb" stroke="#dcccf0" filter="url(#soft)"/><text x="450" y="185" fill="#4a2e78">Sort(ORDER BY 2 DESC)</text>
    <rect x="310" y="220" width="280" height="40" rx="10" fill="#f4eefb" stroke="#dcccf0" filter="url(#soft)"/><text x="450" y="245" fill="#4a2e78">Aggregate(GROUP BY region, sum)</text>
    <rect x="310" y="280" width="280" height="40" rx="10" fill="#f4eefb" stroke="#dcccf0" filter="url(#soft)"/><text x="450" y="305" fill="#4a2e78">Filter(u.age&gt;30 AND o.dt)</text>
    <rect x="330" y="340" width="240" height="44" rx="10" fill="#ecf2fb" stroke="#c4d5ee" filter="url(#soft)"/><text x="450" y="360" fill="#274a78" font-weight="600">LogicalJoin</text><text x="450" y="376" font-size="9.5" fill="#7d93b5">类型未定</text>
    <rect x="180" y="420" width="240" height="44" rx="10" fill="#ffffff" stroke="#e6e7ea" filter="url(#soft)"/><text x="300" y="440" fill="#1d1d1f" font-weight="600">UnboundRelation</text><text x="300" y="456" font-size="9.5" fill="#86868b">orders(未解析)</text>
    <rect x="480" y="420" width="240" height="44" rx="10" fill="#ffffff" stroke="#e6e7ea" filter="url(#soft)"/><text x="600" y="440" fill="#1d1d1f" font-weight="600">UnboundRelation</text><text x="600" y="456" font-size="9.5" fill="#86868b">users(未解析)</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="450" y1="140" x2="450" y2="159" marker-end="url(#ar)"/>
    <line x1="450" y1="200" x2="450" y2="219" marker-end="url(#ar)"/>
    <line x1="450" y1="260" x2="450" y2="279" marker-end="url(#ar)"/>
    <line x1="450" y1="320" x2="450" y2="339" marker-end="url(#ar)"/>
    <line x1="410" y1="384" x2="300" y2="419" marker-end="url(#ar)"/>
    <line x1="490" y1="384" x2="600" y2="419" marker-end="url(#ar)"/>
  </g>
  <text x="40" y="510" font-size="10.5" fill="#86868b">此阶段只是把 SQL 文法结构变成算子树,叶子是"未绑定关系",列/类型/Join 类型全未知。</text>
</svg>
