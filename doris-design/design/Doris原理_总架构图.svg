<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="850" viewBox="0 0 1080 850" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1080" height="850" fill="#fbfbfd"/>

  <!-- ===== 外部数据生态（非 Doris · 经协议接入） ===== -->
  <rect x="30" y="22" width="1020" height="60" rx="16" fill="#f7f7f9" stroke="#e6e6eb"/>
  <text x="50" y="42" font-size="12" font-weight="600" fill="#6e6e73">外部数据生态（非 Doris 组件 · 经协议接入）</text>
  <g font-size="12" text-anchor="middle" fill="#6e6e73">
    <text x="120" y="69" text-anchor="start" fill="#a1a1a6">读：</text>
    <rect x="152" y="54" width="96" height="22" rx="8" fill="#ffffff" stroke="#e2e3e8"/><text x="200" y="69">BI / 报表</text>
    <rect x="256" y="54" width="96" height="22" rx="8" fill="#ffffff" stroke="#e2e3e8"/><text x="304" y="69">应用 / 服务</text>
    <rect x="360" y="54" width="96" height="22" rx="8" fill="#ffffff" stroke="#e2e3e8"/><text x="408" y="69">交互查询</text>
    <text x="560" y="69" text-anchor="start" fill="#a1a1a6">写：</text>
    <rect x="592" y="54" width="96" height="22" rx="8" fill="#ffffff" stroke="#e2e3e8"/><text x="640" y="69">实时流</text>
    <rect x="696" y="54" width="96" height="22" rx="8" fill="#ffffff" stroke="#e2e3e8"/><text x="744" y="69">批量导入</text>
    <rect x="800" y="54" width="96" height="22" rx="8" fill="#ffffff" stroke="#e2e3e8"/><text x="848" y="69">日志 / CDC</text>
  </g>
  <line x1="540" y1="82" x2="540" y2="98" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <g transform="translate(0,70)">

  <!-- ===== 接入层 ===== -->
  <rect x="30" y="30" width="1020" height="64" rx="16" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="50" y="67" font-size="14" font-weight="600" fill="#1d1d1f">接入层</text>
  <rect x="100" y="55" width="24" height="15" rx="4" fill="#f4f4f6" stroke="#e0e0e5"/><text x="112" y="66" font-size="9" font-weight="600" fill="#6e6e73" text-anchor="middle">FE</text>
  <g font-size="12" fill="#4a4e57" text-anchor="middle">
    <rect x="150" y="46" width="140" height="32" rx="9" fill="#f4f5f7" stroke="#e2e3e8"/><text x="220" y="66">协议接入</text>
    <rect x="300" y="46" width="140" height="32" rx="9" fill="#f4f5f7" stroke="#e2e3e8"/><text x="370" y="66">认证鉴权</text>
    <rect x="450" y="46" width="140" height="32" rx="9" fill="#f4f5f7" stroke="#e2e3e8"/><text x="520" y="66">会话管理</text>
    <rect x="600" y="46" width="140" height="32" rx="9" fill="#f4f5f7" stroke="#e2e3e8"/><text x="670" y="66">缓存命中</text>
    <rect x="750" y="46" width="140" height="32" rx="9" fill="#f4f5f7" stroke="#e2e3e8"/><text x="820" y="66">SQL 拦截 / 准入</text>
    <rect x="900" y="46" width="140" height="32" rx="9" fill="#f4f5f7" stroke="#e2e3e8"/><text x="970" y="66">请求路由</text>
  </g>
  <line x1="540" y1="94" x2="540" y2="118" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ===== 保障能力域 ===== -->
  <rect x="30" y="120" width="250" height="300" rx="16" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="48" y="150" font-size="14" font-weight="600" fill="#1d1d1f">保障能力域</text>
  <text x="48" y="168" font-size="11" fill="#86868b">横切保障 · 正确 / 稳定 / 可用</text>
  <g text-anchor="middle">
    <rect x="46" y="188" width="218" height="56" rx="12" fill="#fdf6ea" stroke="#efdcb4"/>
    <text x="155" y="213" font-size="13" fill="#7a5a1e">事务一致性</text><text x="155" y="231" font-size="10" fill="#a98b52">正确性 · 请求级</text>
    <rect x="234" y="195" width="24" height="15" rx="7" fill="#dbe6fb" stroke="#b6cdf0"/><text x="246" y="206" font-size="10" font-weight="600" fill="#274a78">C</text>
    <rect x="46" y="256" width="218" height="56" rx="12" fill="#fdf6ea" stroke="#efdcb4"/>
    <text x="155" y="281" font-size="13" fill="#7a5a1e">资源与负载管理</text><text x="155" y="299" font-size="10" fill="#a98b52">稳定性 · 请求级</text>
    <rect x="46" y="324" width="218" height="56" rx="12" fill="#fdf6ea" stroke="#efdcb4"/>
    <text x="155" y="349" font-size="13" fill="#7a5a1e">集群管理与自愈</text><text x="155" y="367" font-size="10" fill="#a98b52">可用性 · 集群级 / 异步</text>
    <rect x="234" y="331" width="24" height="15" rx="7" fill="#dcefdf" stroke="#b6dabf"/><text x="246" y="342" font-size="10" font-weight="600" fill="#2c5a3a">A</text>
  </g>

  <!-- ===== 请求处理主链 ===== -->
  <rect x="300" y="120" width="480" height="300" rx="16" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="316" y="150" font-size="14" font-weight="600" fill="#1d1d1f">请求处理主链</text>
  <text x="316" y="168" font-size="11" fill="#86868b">自上而下 = 请求流深度</text>

  <text x="316" y="194" font-size="11" fill="#86868b">① 接口主线（DDL/DCL 旁路计算）</text>
  <g font-size="13" text-anchor="middle">
    <rect x="316" y="202" width="100" height="38" rx="10" fill="#f4eefb" stroke="#dcccf0"/><text x="366" y="226" fill="#4a2e78">DDL</text>
    <rect x="432" y="202" width="100" height="38" rx="10" fill="#f4eefb" stroke="#dcccf0"/><text x="482" y="226" fill="#4a2e78">DML</text>
    <rect x="548" y="202" width="100" height="38" rx="10" fill="#f4eefb" stroke="#dcccf0"/><text x="598" y="226" fill="#4a2e78">DQL</text>
    <rect x="664" y="202" width="100" height="38" rx="10" fill="#f4eefb" stroke="#dcccf0"/><text x="714" y="226" fill="#4a2e78">DCL</text>
  </g>
  <line x1="540" y1="244" x2="540" y2="258" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <text x="316" y="272" font-size="11" fill="#86868b">② 计算能力域 · 主要服务 DQL/DML</text>
  <g font-size="13" text-anchor="middle">
    <rect x="320" y="280" width="200" height="44" rx="11" fill="#ecf2fb" stroke="#c4d5ee"/><text x="420" y="307" fill="#274a78">优化技术</text>
    <rect x="326" y="284" width="22" height="14" rx="4" fill="#f4f4f6" stroke="#e0e0e5"/><text x="337" y="294" font-size="9" font-weight="600" fill="#6e6e73">FE</text>
    <rect x="540" y="280" width="224" height="44" rx="11" fill="#ecf2fb" stroke="#c4d5ee"/><text x="652" y="307" fill="#274a78">执行引擎</text>
    <rect x="546" y="284" width="22" height="14" rx="4" fill="#f4f4f6" stroke="#e0e0e5"/><text x="557" y="294" font-size="9" font-weight="600" fill="#6e6e73">BE</text>
  </g>
  <line x1="520" y1="302" x2="540" y2="302" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="512" y="274" font-size="9" fill="#a1a1a6" text-anchor="middle">产出计划</text>
  <line x1="540" y1="328" x2="540" y2="342" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <path d="M312,240 L307,250 L307,352 L406,360" stroke="#c7c7cc" stroke-width="1.3" stroke-dasharray="4 4" fill="none" marker-end="url(#ar)"/>
  <text x="316" y="356" font-size="11" fill="#86868b">③ 底座能力域</text>
  <g text-anchor="middle">
    <rect x="320" y="364" width="200" height="44" rx="11" fill="#ecf5ee" stroke="#c2ddc9"/><text x="420" y="391" font-size="13" fill="#2c5a3a">元数据</text>
    <rect x="326" y="368" width="22" height="14" rx="4" fill="#f4f4f6" stroke="#e0e0e5"/><text x="337" y="378" font-size="9" font-weight="600" fill="#6e6e73">FE</text>
    <rect x="490" y="370" width="24" height="15" rx="7" fill="#dbe6fb" stroke="#b6cdf0"/><text x="502" y="381" font-size="10" font-weight="600" fill="#274a78">C</text>
    <rect x="540" y="364" width="224" height="44" rx="11" fill="#ecf5ee" stroke="#c2ddc9"/><text x="652" y="391" font-size="13" fill="#2c5a3a">存储引擎</text>
    <rect x="546" y="368" width="22" height="14" rx="4" fill="#f4f4f6" stroke="#e0e0e5"/><text x="557" y="378" font-size="9" font-weight="600" fill="#6e6e73">BE</text>
  </g>

  <!-- ===== 后台任务 ===== -->
  <rect x="800" y="120" width="250" height="300" rx="16" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="818" y="150" font-size="14" font-weight="600" fill="#1d1d1f">后台任务</text>
  <text x="818" y="168" font-size="11" fill="#86868b">异步横切 · 承接各域异步部分</text>
  <g font-size="12" text-anchor="middle" fill="#4a4e57">
    <rect x="816" y="188" width="218" height="34" rx="9" fill="#f4f5f7" stroke="#e2e3e8"/><text x="925" y="209">Compaction（存储）</text>
    <rect x="816" y="230" width="218" height="34" rx="9" fill="#f4f5f7" stroke="#e2e3e8"/><text x="925" y="251">物化刷新 · 统计（优化）</text>
    <rect x="816" y="272" width="218" height="34" rx="9" fill="#f4f5f7" stroke="#e2e3e8"/><text x="925" y="293">检查点（元数据）</text>
    <rect x="816" y="314" width="218" height="34" rx="9" fill="#f4f5f7" stroke="#e2e3e8"/><text x="925" y="335">副本修复与均衡（自愈）</text>
    <rect x="816" y="356" width="218" height="34" rx="9" fill="#f4f5f7" stroke="#e2e3e8"/><text x="925" y="377">过期清理</text>
  </g>

  <!-- 横切连线 -->
  <line x1="280" y1="270" x2="298" y2="270" stroke="#c7c7cc" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#ar)"/>
  <text x="289" y="263" font-size="10" fill="#a1a1a6" text-anchor="middle">保障</text>
  <line x1="780" y1="270" x2="798" y2="270" stroke="#c7c7cc" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#ar)"/>
  <text x="789" y="263" font-size="10" fill="#a1a1a6" text-anchor="middle">异步卸载</text>
  <line x1="652" y1="410" x2="652" y2="446" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="662" y="432" font-size="10" fill="#a1a1a6">物理实现（内表自管）</text>

  <!-- ===== ④ 数据布局与数据源形态 ===== -->
  <rect x="30" y="448" width="1020" height="212" rx="16" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="50" y="474" font-size="13" font-weight="600" fill="#1d1d1f">④ 数据布局与数据源形态（上层计算 / 优化 / 执行逻辑不变）</text>
  <text x="50" y="496" font-size="11" fill="#4e7a5c">内表 · 存储引擎自管（物理形态；冷热 = 可叠加分层策略）</text>
  <rect x="50" y="504" width="220" height="112" rx="13" fill="#ecf5ee" stroke="#c2ddc9"/>
  <text x="160" y="532" font-size="15" font-weight="600" fill="#2c5a3a" text-anchor="middle">存算一体</text>
  <g font-size="11" fill="#4e7a5c" text-anchor="middle"><text x="160" y="562">数据：BE 本地盘</text><text x="160" y="586">组织：Doris 自管</text><text x="160" y="608">本地盘：数据主存</text></g>
  <rect x="290" y="504" width="220" height="112" rx="13" fill="#f2f8f3" stroke="#cfe6d5" stroke-dasharray="5 4"/>
  <text x="400" y="532" font-size="15" font-weight="600" fill="#2c5a3a" text-anchor="middle">冷热分离</text>
  <g font-size="11" fill="#4e7a5c" text-anchor="middle"><text x="400" y="562">分层策略 · 可叠加</text><text x="400" y="586">热=本地 · 冷=对象存储</text><text x="400" y="608">本地盘：热数据 + 缓存</text></g>
  <rect x="530" y="504" width="220" height="112" rx="13" fill="#ecf5ee" stroke="#c2ddc9"/>
  <text x="640" y="532" font-size="15" font-weight="600" fill="#2c5a3a" text-anchor="middle">存算分离</text>
  <g font-size="11" fill="#4e7a5c" text-anchor="middle"><text x="640" y="562">数据：对象存储（共享）</text><text x="640" y="586">组织：Doris 自管·远端</text><text x="640" y="608">本地盘：仅缓存</text></g>
  <line x1="775" y1="490" x2="775" y2="644" stroke="#e6e6eb" stroke-width="1.5"/>
  <text x="800" y="496" font-size="11" fill="#5a6a8c">外表 · 外部数据源接入（旁路存储引擎）</text>
  <rect x="800" y="504" width="230" height="112" rx="13" fill="#eef2fb" stroke="#c9d6ef"/>
  <text x="915" y="532" font-size="15" font-weight="600" fill="#2f4a7c" text-anchor="middle">湖仓查询（联邦）</text>
  <g font-size="11" fill="#5a6a8c" text-anchor="middle"><text x="915" y="562">数据：外部表格式</text><text x="915" y="586">经连接器 · 旁路存储引擎</text><text x="915" y="608">本地盘：可选缓存</text></g>
  <text x="50" y="638" font-size="10" fill="#a1a1a6">注：存算一体 ↔ 存算分离 = 部署形态；冷热分离 = 可叠加分层策略；湖仓查询 = 外部接入，数据不由 Doris 组织。</text>

  <!-- ===== CAP 责任区 ===== -->
  <rect x="30" y="676" width="1020" height="82" rx="16" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="50" y="700" font-size="13" font-weight="600" fill="#1d1d1f">CAP 责任区（分布式一致性取向）</text>
  <g font-size="11">
    <rect x="50" y="712" width="18" height="15" rx="5" fill="#dbe6fb" stroke="#b6cdf0"/><text x="59" y="723" font-size="10" font-weight="600" fill="#274a78" text-anchor="middle">C</text>
    <text x="76" y="723" fill="#4a4e57">一致性 = 事务(协议) · 元数据(多数派)　〔存储为被保证方〕</text>
    <rect x="50" y="732" width="18" height="15" rx="5" fill="#dcefdf" stroke="#b6dabf"/><text x="59" y="743" font-size="10" font-weight="600" fill="#2c5a3a" text-anchor="middle">A</text>
    <text x="76" y="743" fill="#4a4e57">可用性 = 集群自愈(副本/故障转移) · 只读扩展(Observer)</text>
    <rect x="560" y="712" width="18" height="15" rx="5" fill="#ececee" stroke="#d5d5da"/><text x="569" y="723" font-size="10" font-weight="600" fill="#6e6e73" text-anchor="middle">P</text>
    <text x="586" y="723" fill="#4a4e57">分区容忍 = 分布式前提（非模块能力，故不标卡片）</text>
    <text x="586" y="743" fill="#86868b">取向：分区时选 CP（保一致，少数派不可写）；读侧可 AP</text>
  </g>
  </g>
</svg>
