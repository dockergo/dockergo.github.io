<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="440" viewBox="0 0 1120 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1120" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">四种部署形态：内表数据放哪、本地盘什么角色、谁自管（上层计算/优化/执行逻辑不变）</text>
  <text x="30" y="52" font-size="11" fill="#86868b">绿=本地盘 · 蓝=对象存储(共享) · 紫=外部表(旁路)　| 一体↔分离=部署形态；冷热=可叠加分层；湖仓=外部接入</text>

  <!-- 4 columns -->
  <g text-anchor="middle">
    <!-- 存算一体 -->
    <rect x="24" y="70" width="256" height="336" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
    <text x="152" y="94" font-size="13" font-weight="700" fill="#1d1d1f">存算一体</text>
    <text x="152" y="112" font-size="9.5" fill="#12402a">Doris 自管 · 基准形态</text>
    <rect x="44" y="124" width="216" height="44" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="152" y="151" font-size="11" fill="#1b2a4a">BE 计算 + 本地存储</text>
    <rect x="44" y="188" width="216" height="70" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="152" y="216" font-size="11.5" font-weight="600" fill="#12402a">BE 本地盘（多副本）</text><text x="152" y="238" font-size="10" fill="#2f6f4f">= 数据主存</text>
    <text x="152" y="300" font-size="10" fill="#6e6e73">扩缩需搬数据</text>
    <text x="152" y="322" font-size="10" fill="#6e6e73">本地最快</text>
    <rect x="44" y="344" width="216" height="46" rx="9" fill="#fafafb" stroke="#ececf1"/><text x="152" y="364" font-size="9.5" fill="#6e6e73">受影响主线：—</text><text x="152" y="380" font-size="9" fill="#86868b">高性能内表·低延迟点查</text>

    <!-- 冷热分离 -->
    <rect x="296" y="70" width="256" height="336" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
    <text x="424" y="94" font-size="13" font-weight="700" fill="#1d1d1f">冷热分离</text>
    <text x="424" y="112" font-size="9.5" fill="#5a3410">自管(分层) · 可叠加</text>
    <rect x="316" y="124" width="216" height="44" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="424" y="151" font-size="11" fill="#1b2a4a">BE 计算 + 本地存储</text>
    <rect x="316" y="188" width="216" height="44" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="424" y="215" font-size="10.5" font-weight="600" fill="#12402a">本地盘 = 热数据 + 缓存</text>
    <rect x="316" y="240" width="216" height="44" rx="10" fill="#e3ebf6" stroke="#bcd0ec"/><text x="424" y="267" font-size="10.5" font-weight="600" fill="#2f4a7c">对象存储 = 冷数据</text>
    <text x="424" y="312" font-size="10" fill="#6e6e73">按 cooldown 下沉冷数据</text>
    <rect x="316" y="344" width="216" height="46" rx="9" fill="#fafafb" stroke="#ececf1"/><text x="424" y="364" font-size="9.5" fill="#6e6e73">受影响：存储(分层)·后台(搬迁)</text><text x="424" y="380" font-size="9" fill="#86868b">时序/历史数据降本</text>

    <!-- 存算分离 -->
    <rect x="568" y="70" width="256" height="336" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
    <text x="696" y="94" font-size="13" font-weight="700" fill="#1d1d1f">存算分离</text>
    <text x="696" y="112" font-size="9.5" fill="#5a3410">自管(远端) · 云原生</text>
    <rect x="588" y="124" width="216" height="44" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="696" y="145" font-size="11" fill="#1b2a4a">无状态 BE（计算）</text><text x="696" y="160" font-size="9" fill="#5b7db1">分钟级弹性</text>
    <rect x="588" y="188" width="216" height="44" rx="10" fill="#f4f4f6" stroke="#dcdce2"/><text x="696" y="215" font-size="10.5" font-weight="600" fill="#6e6e73">本地盘 = 仅缓存(File Cache)</text>
    <rect x="588" y="240" width="216" height="44" rx="10" fill="#e3ebf6" stroke="#bcd0ec"/><text x="696" y="267" font-size="10.5" font-weight="600" fill="#2f4a7c">对象存储 = 共享数据</text>
    <text x="696" y="312" font-size="10" fill="#6e6e73">扩缩不搬数据·缓存预热</text>
    <rect x="588" y="344" width="216" height="46" rx="9" fill="#fafafb" stroke="#ececf1"/><text x="696" y="362" font-size="9" fill="#6e6e73">受影响：存储(远端)·自愈(→缓存一致)</text><text x="696" y="378" font-size="9" fill="#86868b">·后台·弹性伸缩</text>

    <!-- 湖仓查询 -->
    <rect x="840" y="70" width="256" height="336" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
    <text x="968" y="94" font-size="13" font-weight="700" fill="#1d1d1f">湖仓查询</text>
    <text x="968" y="112" font-size="9.5" fill="#42246b">非自管(连接器) · 旁路</text>
    <rect x="860" y="124" width="216" height="44" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="968" y="145" font-size="11" fill="#1b2a4a">BE 计算 · FileScan</text><text x="968" y="160" font-size="9" fill="#5b7db1">连接器旁路存储引擎</text>
    <rect x="860" y="188" width="216" height="44" rx="10" fill="#f4f4f6" stroke="#dcdce2"/><text x="968" y="215" font-size="10.5" font-weight="600" fill="#6e6e73">本地盘 = 可选缓存</text>
    <rect x="860" y="240" width="216" height="44" rx="10" fill="#f4eefb" stroke="#e2d3f3"/><text x="968" y="261" font-size="10.5" font-weight="600" fill="#42246b">外部表格式</text><text x="968" y="277" font-size="9" fill="#7a5aa0">Hive/Iceberg/Hudi…</text>
    <text x="968" y="312" font-size="10" fill="#6e6e73">数据不由 Doris 组织</text>
    <rect x="860" y="344" width="216" height="46" rx="9" fill="#fafafb" stroke="#ececf1"/><text x="968" y="362" font-size="9" fill="#6e6e73">受影响：存储(只读接入)·元数据(外部Catalog)</text><text x="968" y="378" font-size="9" fill="#86868b">·优化(外表统计弱)</text>
  </g>
</svg>
