<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="320" viewBox="0 0 1000 320" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1000" height="320" fill="#fbfbfd"/>
  <text x="40" y="30" font-size="14" font-weight="600" fill="#1d1d1f">CPU 硬限 与 查询排队：cgroup 强隔离 + Query Queue 优雅降级</text>
  <rect x="40" y="64" width="440" height="150" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="260" y="90" font-size="13" font-weight="600" fill="#1b2a4a" text-anchor="middle">CPU 管控（cgroup）</text>
  <rect x="64" y="106" width="392" height="40" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="260" y="131" font-size="11.5" fill="#12402a" text-anchor="middle">软限：按权重分配空闲算力（空闲时可借用）</text>
  <rect x="64" y="156" width="392" height="40" rx="10" fill="#fff7e6" stroke="#e8cf9a"/><text x="260" y="181" font-size="11.5" fill="#5a3410" text-anchor="middle">硬限：设 CPU 上限，即使集群空闲也不超配（强隔离）</text>

  <rect x="520" y="64" width="440" height="150" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="740" y="90" font-size="13" font-weight="600" fill="#1b2a4a" text-anchor="middle">并发治理（Query Queue）</text>
  <g text-anchor="middle" font-size="11">
    <rect x="544" y="110" width="130" height="40" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="609" y="135" fill="#1b2a4a">未超阈值 → 执行</text>
    <rect x="700" y="110" width="130" height="40" rx="10" fill="#fff7e6" stroke="#e8cf9a"/><text x="765" y="135" fill="#5a3410">超并发 → 排队</text>
    <rect x="850" y="110" width="90" height="40" rx="10" fill="#fbeaea" stroke="#e7c3c3"/><text x="895" y="135" fill="#4a1414">超时→拒</text>
    <text x="740" y="180" font-size="10.5" fill="#86868b">max_concurrency / max_queue_size / queue_timeout</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none"><line x1="674" y1="130" x2="700" y2="130" marker-end="url(#ar)"/><line x1="830" y1="130" x2="850" y2="130" marker-end="url(#ar)"/></g>
  <rect x="40" y="234" width="920" height="60" rx="12" fill="#fafafb" stroke="#ececf1"/>
  <text x="500" y="260" font-size="11.5" fill="#6e6e73" text-anchor="middle">软限保利用率、硬限保隔离；排队让过载优雅降级而非雪崩——一个大查询不拖垮全集群，重要业务被优先保障。</text>
  <text x="500" y="281" font-size="11.5" fill="#6e6e73" text-anchor="middle">隔离 ≠ 加速：Workload Group 保稳定与公平，不提升单查询速度。</text>
</svg>
