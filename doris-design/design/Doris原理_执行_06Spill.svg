<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="330" viewBox="0 0 1000 330" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1000" height="330" fill="#fbfbfd"/>
  <text x="40" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Spill 落盘：算子内存超限时把状态写盘、分批处理，"慢但不崩"</text>
  <g text-anchor="middle">
    <rect x="40" y="70" width="230" height="70" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="155" y="98" font-size="12.5" font-weight="600" fill="#1b2a4a">Agg / Sort / HashJoin</text><text x="155" y="120" font-size="10.5" fill="#5b7db1">内存中累积状态（哈希表/排序区）</text>
    <rect x="400" y="72" width="200" height="66" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/><text x="500" y="100" font-size="12.5" font-weight="600" fill="#5a3410">超过内存阈值？</text><text x="500" y="120" font-size="10" fill="#93762e">exec_mem_limit / 组配额</text>
    <rect x="720" y="40" width="240" height="52" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="840" y="62" font-size="12" font-weight="600" fill="#12402a">否 → 全内存完成</text><text x="840" y="80" font-size="10" fill="#2f6f4f">最快</text>
    <rect x="720" y="110" width="240" height="70" rx="12" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/><text x="840" y="136" font-size="12" font-weight="600" fill="#4a1414">是 → Spill 落盘</text><text x="840" y="156" font-size="10" fill="#a05252">部分状态写磁盘、分批</text><text x="840" y="172" font-size="10" fill="#a05252">额外 IO，避免 OOM</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="270" y1="105" x2="400" y2="105" marker-end="url(#ar)"/>
    <path d="M600,95 L660,95 L660,66 L720,66" marker-end="url(#ar)"/>
    <path d="M600,115 L660,115 L660,145 L720,145" marker-end="url(#ar)"/>
  </g>
  <rect x="40" y="220" width="920" height="72" rx="12" fill="#fafafb" stroke="#ececf1"/>
  <text x="500" y="246" font-size="11.5" fill="#6e6e73" text-anchor="middle">分级兜底链：背压（减速上游）→ Spill（落盘分批）→ reject/cancel（仍超限则取消）。</text>
  <text x="500" y="268" font-size="11.5" fill="#6e6e73" text-anchor="middle">落盘后分批归并（外部排序/分区哈希），代价是额外 IO，但让大聚合/大 Join 不 OOM。</text>
</svg>
