<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="330" viewBox="0 0 1000 330" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1000" height="330" fill="#fbfbfd"/>
  <text x="40" y="30" font-size="14" font-weight="600" fill="#1d1d1f">EditLog 状态机复制：Master 单写 → 多数派提交 → Follower/Observer 全序回放</text>
  <g text-anchor="middle">
    <rect x="40" y="66" width="180" height="60" rx="12" fill="#f4eefb" stroke="#e2d3f3" filter="url(#soft)"/><text x="130" y="92" font-size="12.5" font-weight="600" fill="#42246b">元数据变更</text><text x="130" y="112" font-size="10" fill="#7a5aa0">DDL/DCL/事务</text>
    <rect x="270" y="60" width="200" height="72" rx="13" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/><text x="370" y="86" font-size="12.5" font-weight="600" fill="#4a1414">Master</text><text x="370" y="106" font-size="10" fill="#a05252">改内存 + 写 EditLog</text><text x="370" y="122" font-size="10" fill="#a05252">分配全序日志号</text>
    <rect x="540" y="60" width="200" height="72" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/><text x="640" y="86" font-size="12.5" font-weight="600" fill="#5a3410">复制到多数派</text><text x="640" y="106" font-size="10" fill="#93762e">达多数即"提交点"</text><text x="640" y="122" font-size="10" fill="#93762e">BDB JE HA（Paxos 家族）</text>
    <rect x="810" y="60" width="150" height="72" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="885" y="90" font-size="12" font-weight="600" fill="#12402a">生效</text><text x="885" y="110" font-size="10" fill="#2f6f4f">已提交不丢</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none"><line x1="220" y1="96" x2="270" y2="96" marker-end="url(#ar)"/><line x1="470" y1="96" x2="540" y2="96" marker-end="url(#ar)"/><line x1="740" y1="96" x2="810" y2="96" marker-end="url(#ar)"/></g>
  <!-- replay -->
  <g text-anchor="middle">
    <rect x="300" y="176" width="180" height="50" rx="12" fill="#eef3fb" stroke="#bcd0ec"/><text x="390" y="199" font-size="11.5" font-weight="600" fill="#1b2a4a">Follower 回放</text><text x="390" y="216" font-size="9.5" fill="#5b7db1">选主候选 · 同序 Replay</text>
    <rect x="540" y="176" width="180" height="50" rx="12" fill="#eef3fb" stroke="#bcd0ec"/><text x="630" y="199" font-size="11.5" font-weight="600" fill="#1b2a4a">Observer 回放</text><text x="630" y="216" font-size="9.5" fill="#5b7db1">只读扩展 · 不投票</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none" stroke-dasharray="4 3"><path d="M640,132 L390,176" marker-end="url(#ar)"/><path d="M640,132 L630,176" marker-end="url(#ar)"/></g>
  <rect x="40" y="256" width="920" height="56" rx="12" fill="#fafafb" stroke="#ececf1"/>
  <text x="500" y="280" font-size="11.5" fill="#6e6e73" text-anchor="middle">三性质缺一不可：全序（同号同序回放才收敛）· 提交点（多数派持久）· 幂等回放（与正向执行严格对称）。</text>
  <text x="500" y="300" font-size="11.5" fill="#6e6e73" text-anchor="middle">Master 宕机 → Follower 依已提交位点选新主，对客户端透明；只读节点用日志号落后量衡量延迟。</text>
</svg>
