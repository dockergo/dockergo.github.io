<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="310" viewBox="0 0 1000 310" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1000" height="310" fill="#fbfbfd"/>
  <text x="40" y="28" font-size="14" font-weight="600" fill="#1d1d1f">行号定位 · 主键点查 · 向量检索：其余索引原理</text>

  <!-- Ordinal -->
  <rect x="20" y="46" width="306" height="248" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="173" y="72" font-size="12.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Ordinal Index（每列必备）</text>
  <g font-size="10" text-anchor="middle">
    <rect x="48" y="92" width="110" height="26" rx="6" fill="#eef3fb" stroke="#bcd0ec"/><text x="103" y="110" fill="#274a78">行号 ordinal=k</text>
    <rect x="196" y="86" width="112" height="18" rx="4" fill="#f4f4f6" stroke="#e0e0e5"/><text x="252" y="99" fill="#a1a1a6">Page0 [0..999]</text>
    <rect x="196" y="108" width="112" height="18" rx="4" fill="#eafaf1" stroke="#bfe0cd"/><text x="252" y="121" fill="#12402a">Page1 [1000..1999]</text>
    <rect x="196" y="130" width="112" height="18" rx="4" fill="#f4f4f6" stroke="#e0e0e5"/><text x="252" y="143" fill="#a1a1a6">Page2 …</text>
  </g>
  <path d="M158,108 L196,115" stroke="#c7c7cc" stroke-width="1.3" fill="none" marker-end="url(#ar)"/>
  <text x="173" y="180" font-size="10.5" fill="#5a3410" text-anchor="middle">行号 → 定位 Page + 页内偏移</text>
  <text x="173" y="232" font-size="10" fill="#6e6e73" text-anchor="middle">每列必备的基础索引</text>
  <text x="173" y="250" font-size="10" fill="#6e6e73" text-anchor="middle">按行号快速定位数据页</text>
  <text x="173" y="268" font-size="9.5" fill="#86868b" text-anchor="middle">是其它索引"命中行→取值"的落点</text>

  <!-- Primary Key / MoW -->
  <rect x="346" y="46" width="306" height="248" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="499" y="72" font-size="12.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Primary Key Index（主键点查·MoW）</text>
  <g font-size="10" text-anchor="middle">
    <rect x="372" y="90" width="254" height="22" rx="4" fill="#eef3fb" stroke="#bcd0ec"/><text x="499" y="105" fill="#274a78">主键有序编码 pk1 &lt; pk2 &lt; pk3 …</text>
    <rect x="410" y="120" width="180" height="24" rx="6" fill="#fff7e6" stroke="#e8cf9a"/><text x="500" y="137" fill="#5a3410">WHERE pk = X → 二分定位 rowid</text>
    <rect x="372" y="152" width="254" height="24" rx="6" fill="#fbeaea" stroke="#e7c3c3"/><text x="499" y="169" fill="#4a1414">旧行入 Delete Bitmap（读时跳过）</text>
  </g>
  <text x="499" y="204" font-size="10.5" fill="#2f6f4f" text-anchor="middle">点查毫秒级；配行存直取整行</text>
  <text x="499" y="234" font-size="10" fill="#6e6e73" text-anchor="middle">Unique Key（MoW）表的主键索引</text>
  <text x="499" y="252" font-size="10" fill="#6e6e73" text-anchor="middle">保证键唯一 + 高频点查/更新</text>
  <text x="499" y="270" font-size="9.5" fill="#86868b" text-anchor="middle">Delete Bitmap 前置去重代价</text>

  <!-- ANN -->
  <rect x="672" y="46" width="308" height="248" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="826" y="72" font-size="12.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">ANN Index（向量近似检索）</text>
  <g font-size="10" text-anchor="middle">
    <rect x="700" y="90" width="120" height="30" rx="6" fill="#f4eefb" stroke="#e2d3f3"/><text x="760" y="109" fill="#42246b">查询向量 q</text>
    <rect x="852" y="90" width="112" height="30" rx="6" fill="#eef3fb" stroke="#bcd0ec"/><text x="908" y="109" fill="#274a78">近邻图/量化</text>
  </g>
  <path d="M820,105 L852,105" stroke="#c7c7cc" stroke-width="1.3" fill="none" marker-end="url(#ar)"/>
  <text x="826" y="150" font-size="10.5" fill="#5a3410" text-anchor="middle">近似最近邻 → topK 候选</text>
  <rect x="740" y="162" width="172" height="24" rx="6" fill="#eafaf1" stroke="#bfe0cd"/><text x="826" y="179" font-size="10" fill="#12402a" text-anchor="middle">topK → 精排返回</text>
  <text x="826" y="216" font-size="10" fill="#6e6e73" text-anchor="middle">高维向量列 · HNSW/IVF 类结构</text>
  <text x="826" y="234" font-size="10" fill="#6e6e73" text-anchor="middle">牺牲少量精度换大幅提速</text>
  <text x="826" y="252" font-size="10" fill="#6e6e73" text-anchor="middle">支撑向量 + 结构化 + 全文混合检索</text>
  <text x="826" y="270" font-size="9.5" fill="#86868b" text-anchor="middle">独立 .idx 文件</text>
</svg>
