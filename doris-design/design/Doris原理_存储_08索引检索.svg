<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="310" viewBox="0 0 1000 310" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1000" height="310" fill="#fbfbfd"/>
  <text x="40" y="28" font-size="14" font-weight="600" fill="#1d1d1f">检索/编码型索引原理：词→行、值→位图、字典 filter + 延迟物化</text>

  <!-- Inverted -->
  <rect x="20" y="46" width="306" height="248" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="173" y="72" font-size="12.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Inverted 倒排</text>
  <g font-size="10" text-anchor="start">
    <rect x="48" y="88" width="120" height="26" rx="6" fill="#eef3fb" stroke="#bcd0ec"/><text x="60" y="105" fill="#274a78">term "数据库"</text>
    <rect x="48" y="120" width="120" height="26" rx="6" fill="#eef3fb" stroke="#bcd0ec"/><text x="60" y="137" fill="#274a78">term "引擎"</text>
    <rect x="196" y="88" width="112" height="26" rx="6" fill="#eafaf1" stroke="#bfe0cd"/><text x="204" y="105" fill="#12402a">rowid [1,5,8]</text>
    <rect x="196" y="120" width="112" height="26" rx="6" fill="#eafaf1" stroke="#bfe0cd"/><text x="204" y="137" fill="#12402a">rowid [5,9]</text>
  </g>
  <path d="M168,101 L196,101" stroke="#c7c7cc" stroke-width="1.3" fill="none" marker-end="url(#ar)"/>
  <path d="M168,133 L196,133" stroke="#c7c7cc" stroke-width="1.3" fill="none" marker-end="url(#ar)"/>
  <text x="173" y="174" font-size="10.5" fill="#5a3410" text-anchor="middle">MATCH_ALL → 交集 rowid = [5]</text>
  <text x="173" y="230" font-size="10" fill="#6e6e73" text-anchor="middle">词/token → rowid 倒排链</text>
  <text x="173" y="248" font-size="10" fill="#6e6e73" text-anchor="middle">全文/等值/范围 · Roaring Bitmap</text>
  <text x="173" y="266" font-size="9.5" fill="#86868b" text-anchor="middle">独立 .idx 文件</text>

  <!-- Bitmap -->
  <rect x="346" y="46" width="306" height="248" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="499" y="72" font-size="12.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Bitmap</text>
  <g font-size="10" text-anchor="start" fill="#274a78">
    <text x="372" y="104">值 'CN'</text><rect x="440" y="90" width="180" height="20" rx="4" fill="#eef3fb" stroke="#bcd0ec"/><text x="450" y="105">1 0 1 1 0 0</text>
    <text x="372" y="136">值 'US'</text><rect x="440" y="122" width="180" height="20" rx="4" fill="#eef3fb" stroke="#bcd0ec"/><text x="450" y="137">0 1 0 0 1 0</text>
  </g>
  <text x="499" y="172" font-size="10.5" fill="#5a3410" text-anchor="middle">CN OR US → 1 1 1 1 1 0（位运算）</text>
  <rect x="440" y="180" width="180" height="20" rx="4" fill="#eafaf1" stroke="#bfe0cd"/><text x="530" y="195" font-size="10" fill="#12402a" text-anchor="middle">命中行</text>
  <text x="499" y="234" font-size="10" fill="#6e6e73" text-anchor="middle">低基数列 · 每值一位图</text>
  <text x="499" y="252" font-size="10" fill="#6e6e73" text-anchor="middle">AND/OR 位运算过滤</text>
  <text x="499" y="270" font-size="9.5" fill="#86868b" text-anchor="middle">枚举/标签列最有效</text>

  <!-- Page Index / Dict -->
  <rect x="672" y="46" width="308" height="248" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="826" y="72" font-size="12.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Page Index / 字典编码</text>
  <g font-size="10" text-anchor="middle">
    <rect x="700" y="90" width="120" height="46" rx="6" fill="#eef3fb" stroke="#bcd0ec"/><text x="760" y="108" fill="#274a78">字典</text><text x="760" y="126" fill="#5b7db1">A=0 B=1 C=2</text>
    <rect x="852" y="90" width="112" height="46" rx="6" fill="#eef3fb" stroke="#bcd0ec"/><text x="908" y="108" fill="#274a78">页内 code</text><text x="908" y="126" fill="#5b7db1">2 0 2 1 …</text>
  </g>
  <text x="826" y="162" font-size="10.5" fill="#5a3410" text-anchor="middle">谓词 = 'C' → 转 code 2 → 只比整数</text>
  <text x="826" y="184" font-size="10.5" fill="#2f6f4f" text-anchor="middle">延迟物化：仅解码命中行</text>
  <text x="826" y="234" font-size="10" fill="#6e6e73" text-anchor="middle">Ordinal 定位行号 + 字典 filter</text>
  <text x="826" y="252" font-size="10" fill="#6e6e73" text-anchor="middle">Late Materialization 减少解码</text>
  <text x="826" y="270" font-size="9.5" fill="#86868b" text-anchor="middle">低基数列压缩 + 加速</text>
</svg>
