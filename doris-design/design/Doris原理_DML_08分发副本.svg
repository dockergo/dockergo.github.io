<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="340" viewBox="0 0 1000 340" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1000" height="340" fill="#fbfbfd"/>
  <text x="40" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Sink 分发与副本一致性：同一行复制发往该 Tablet 所有副本，Publish 版本对齐</text>
  <rect x="40" y="70" width="170" height="52" rx="12" fill="#f4eefb" stroke="#e2d3f3" filter="url(#soft)"/><text x="125" y="94" font-size="12.5" font-weight="600" fill="#42246b" text-anchor="middle">Sink（列存 Block）</text><text x="125" y="112" font-size="10" fill="#7a5aa0" text-anchor="middle">按分区/分桶算归属</text>
  <rect x="270" y="72" width="150" height="48" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/><text x="345" y="100" font-size="12" font-weight="600" fill="#5a3410" text-anchor="middle">Tablet（bucket）</text>
  <g text-anchor="middle" font-size="11">
    <rect x="520" y="46" width="200" height="42" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="620" y="72" fill="#12402a">Replica@BE-A</text>
    <rect x="520" y="98" width="200" height="42" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="620" y="124" fill="#12402a">Replica@BE-B</text>
    <rect x="520" y="150" width="200" height="42" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="620" y="176" fill="#12402a">Replica@BE-C</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="210" y1="96" x2="270" y2="96" marker-end="url(#ar)"/>
    <path d="M420,90 L470,90 L470,67 L520,67" marker-end="url(#ar)"/>
    <path d="M420,96 L470,96 L470,119 L520,119" marker-end="url(#ar)"/>
    <path d="M420,102 L470,102 L470,171 L520,171" marker-end="url(#ar)"/>
  </g>
  <text x="455" y="40" font-size="9.5" fill="#a1a1a6" text-anchor="middle">同一行复制发往所有副本</text>
  <rect x="770" y="72" width="200" height="96" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="870" y="98" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">Commit + Publish</text><text x="870" y="120" font-size="10" fill="#5b7db1" text-anchor="middle">quorum 多数派成功</text><text x="870" y="138" font-size="10" fill="#5b7db1" text-anchor="middle">各副本对齐同一版本号</text><text x="870" y="156" font-size="10" fill="#5b7db1" text-anchor="middle">读任一健康副本一致</text>
  <path d="M720,119 L770,119" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <rect x="40" y="230" width="920" height="66" rx="12" fill="#fafafb" stroke="#ececf1"/>
  <text x="500" y="256" font-size="11.5" fill="#6e6e73" text-anchor="middle">各副本收相同顺序数据 → 独立排序去重得逐字节一致；写入期检查"不可容忍失败"（存活副本跌破多数即判失败）。</text>
  <text x="500" y="278" font-size="11.5" fill="#6e6e73" text-anchor="middle">高吞吐路径：MemTable 在 Sink 节点构建，把已排序 Segment 流式发往存储 BE，免各副本重复排序。</text>
</svg>
