<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="900" height="420" fill="#fbfbfd"/>
  <g text-anchor="middle" font-size="12" font-weight="600">
    <rect x="60" y="26" width="120" height="34" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#s)"/><text x="120" y="48" fill="#1b2a4a">Coordinator</text>
    <rect x="290" y="26" width="120" height="34" rx="10" fill="#eafaf1" stroke="#bfe0cd" filter="url(#s)"/><text x="350" y="48" fill="#12402a">BE (Delta Writer)</text>
    <rect x="520" y="26" width="120" height="34" rx="10" fill="#fff7e6" stroke="#e8cf9a" filter="url(#s)"/><text x="580" y="48" fill="#5a3410">Transaction Mgr</text>
    <rect x="750" y="26" width="120" height="34" rx="10" fill="#f3e9fb" stroke="#d8c9ee" filter="url(#s)"/><text x="810" y="48" fill="#33194a">Publish</text>
  </g>
  <g stroke="#e0e0e5" stroke-width="1.3" stroke-dasharray="3 4"><line x1="120" y1="60" x2="120" y2="408"/><line x1="350" y1="60" x2="350" y2="408"/><line x1="580" y1="60" x2="580" y2="408"/><line x1="810" y1="60" x2="810" y2="408"/></g>
  <g stroke="#c7c7cc" stroke-width="1.4" font-size="11" fill="#4a4e57">
    <line x1="120" y1="92" x2="348" y2="92" marker-end="url(#a)"/><text x="234" y="86" text-anchor="middle">关闭通道 · 逼出 MemTable</text>
    <line x1="350" y1="126" x2="122" y2="126" marker-end="url(#a)"/><text x="236" y="120" text-anchor="middle">各 Tablet Rowset 完成</text>
    <line x1="120" y1="160" x2="578" y2="160" marker-end="url(#a)"/><text x="349" y="154" text-anchor="middle">Commit（记录 Tablet→Rowset）</text>
    <line x1="580" y1="228" x2="808" y2="228" marker-end="url(#a)"/><text x="694" y="222" text-anchor="middle">触发 Publish</text>
    <line x1="810" y1="262" x2="352" y2="262" marker-end="url(#a)"/><text x="581" y="256" text-anchor="middle">Publish Version（新版本号）</text>
    <line x1="350" y1="330" x2="808" y2="330" marker-end="url(#a)"/><text x="579" y="324" text-anchor="middle">publish done</text>
  </g>
  <rect x="500" y="172" width="160" height="30" rx="7" fill="#fdf8ee" stroke="#ecdcb6"/><text x="580" y="191" font-size="10" fill="#7a5a1e" text-anchor="middle">PRECOMMITTED → COMMITTED（不可见）</text>
  <rect x="270" y="274" width="160" height="30" rx="7" fill="#eef5ef" stroke="#c9e0cf"/><text x="350" y="293" font-size="10" fill="#2c5a3a" text-anchor="middle">主键：计算 Delete Bitmap</text>
  <rect x="500" y="356" width="320" height="30" rx="7" fill="#eef5ef" stroke="#c9e0cf"/><text x="660" y="375" font-size="10" fill="#2c5a3a" text-anchor="middle">事务 → VISIBLE，查询可读</text>
</svg>
