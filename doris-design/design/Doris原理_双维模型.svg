<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="600" viewBox="0 0 1120 600" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1120" height="600" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">双维模型：能力域（管什么）× 执行时机（何时做）</text>

  <!-- 接口主线 top band -->
  <text x="30" y="60" font-size="11.5" font-weight="600" fill="#6e6e73">接口主线 · 面向用户（发起请求，穿过下方能力域）</text>
  <g text-anchor="middle" font-size="12" font-weight="600" fill="#42246b">
    <rect x="96" y="68" width="140" height="34" rx="9" fill="#f4eefb" stroke="#e2d3f3"/><text x="166" y="90">DDL 数据定义</text>
    <rect x="252" y="68" width="140" height="34" rx="9" fill="#f4eefb" stroke="#e2d3f3"/><text x="322" y="90">DML 数据操纵</text>
    <rect x="408" y="68" width="140" height="34" rx="9" fill="#f4eefb" stroke="#e2d3f3"/><text x="478" y="90">DQL 数据查询</text>
    <rect x="564" y="68" width="140" height="34" rx="9" fill="#f4eefb" stroke="#e2d3f3"/><text x="634" y="90">DCL 数据控制</text>
  </g>
  <line x1="400" y1="102" x2="400" y2="122" stroke="#c7c7cc" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>
  <text x="412" y="118" font-size="10" fill="#a1a1a6">依赖矩阵决定用到哪些能力域</text>

  <!-- header -->
  <g font-size="11.5" font-weight="600" fill="#6e6e73">
    <rect x="96" y="128" width="180" height="34" rx="8" fill="#f0f0f3" stroke="#e0e0e5"/><text x="186" y="150" text-anchor="middle">能力域（管什么）</text>
    <rect x="282" y="128" width="440" height="34" rx="8" fill="#f0f0f3" stroke="#e0e0e5"/><text x="502" y="150" text-anchor="middle">前台同步（请求路径）</text>
    <rect x="728" y="128" width="272" height="34" rx="8" fill="#f0f0f3" stroke="#e0e0e5"/><text x="864" y="150" text-anchor="middle">后台异步（守护线程）</text>
  </g>

  <!-- layer brackets -->
  <g font-size="11" font-weight="700" text-anchor="middle">
    <rect x="30" y="168" width="58" height="112" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="59" y="220" fill="#12402a">底座</text>
    <rect x="30" y="288" width="58" height="112" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="59" y="340" fill="#1b2a4a">计算</text>
    <rect x="30" y="408" width="58" height="172" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="59" y="490" fill="#5a3410">保障</text>
  </g>

  <!-- rows: domain | 前台 | 后台 -->
  <g font-size="11">
    <!-- 元数据 -->
    <rect x="96" y="168" width="180" height="52" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="186" y="198" font-weight="600" fill="#12402a" text-anchor="middle">元数据</text>
    <rect x="282" y="168" width="440" height="52" rx="9" fill="#ffffff" stroke="#e6e6eb"/><text x="502" y="198" fill="#4a4e57" text-anchor="middle">变更执行 · 日志复制 · 回放</text>
    <rect x="728" y="168" width="272" height="52" rx="9" fill="#fafafb" stroke="#ececf1"/><text x="864" y="198" fill="#6e6e73" text-anchor="middle">检查点生成镜像 · 日志截断</text>
    <!-- 存储 -->
    <rect x="96" y="228" width="180" height="52" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="186" y="258" font-weight="600" fill="#12402a" text-anchor="middle">存储引擎</text>
    <rect x="282" y="228" width="440" height="52" rx="9" fill="#ffffff" stroke="#e6e6eb"/><text x="502" y="258" fill="#4a4e57" text-anchor="middle">写入落盘 · 扫描读取</text>
    <rect x="728" y="228" width="272" height="52" rx="9" fill="#fafafb" stroke="#ececf1"/><text x="864" y="258" fill="#6e6e73" text-anchor="middle">Compaction · 过期清理</text>
    <!-- 优化 -->
    <rect x="96" y="288" width="180" height="52" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="186" y="318" font-weight="600" fill="#1b2a4a" text-anchor="middle">优化技术</text>
    <rect x="282" y="288" width="440" height="52" rx="9" fill="#ffffff" stroke="#e6e6eb"/><text x="502" y="318" fill="#4a4e57" text-anchor="middle">规则改写 · 代价优化 · 缓存命中</text>
    <rect x="728" y="288" width="272" height="52" rx="9" fill="#fafafb" stroke="#ececf1"/><text x="864" y="318" fill="#6e6e73" text-anchor="middle">统计信息收集 · 物化视图刷新</text>
    <!-- 执行 -->
    <rect x="96" y="348" width="180" height="52" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="186" y="378" font-weight="600" fill="#1b2a4a" text-anchor="middle">执行引擎</text>
    <rect x="282" y="348" width="440" height="52" rx="9" fill="#ffffff" stroke="#e6e6eb"/><text x="502" y="378" fill="#4a4e57" text-anchor="middle">计划并行执行 · 算子调度</text>
    <rect x="728" y="348" width="272" height="52" rx="9" fill="#f7f7f9" stroke="#ececf1"/><text x="864" y="378" fill="#a1a1a6" text-anchor="middle">—（基本无后台）</text>
    <!-- 事务 -->
    <rect x="96" y="408" width="180" height="52" rx="9" fill="#fdf6ea" stroke="#efdcb4"/><text x="186" y="438" font-weight="600" fill="#5a3410" text-anchor="middle">事务一致性</text>
    <rect x="282" y="408" width="440" height="52" rx="9" fill="#ffffff" stroke="#e6e6eb"/><text x="502" y="438" fill="#4a4e57" text-anchor="middle">提交 · 发布版本 · 可见性判定</text>
    <rect x="728" y="408" width="272" height="52" rx="9" fill="#fafafb" stroke="#ececf1"/><text x="864" y="438" fill="#6e6e73" text-anchor="middle">超时事务清理</text>
    <!-- 资源 -->
    <rect x="96" y="468" width="180" height="52" rx="9" fill="#fdf6ea" stroke="#efdcb4"/><text x="186" y="498" font-weight="600" fill="#5a3410" text-anchor="middle">资源与负载管理</text>
    <rect x="282" y="468" width="440" height="52" rx="9" fill="#ffffff" stroke="#e6e6eb"/><text x="502" y="498" fill="#4a4e57" text-anchor="middle">准入排队 · 资源约束 · 限流</text>
    <rect x="728" y="468" width="272" height="52" rx="9" fill="#fafafb" stroke="#ececf1"/><text x="864" y="498" fill="#6e6e73" text-anchor="middle">用量统计 · 配额巡检</text>
    <!-- 自愈 -->
    <rect x="96" y="528" width="180" height="52" rx="9" fill="#fdf6ea" stroke="#efdcb4"/><text x="186" y="558" font-weight="600" fill="#5a3410" text-anchor="middle">集群自愈</text>
    <rect x="282" y="528" width="440" height="52" rx="9" fill="#ffffff" stroke="#e6e6eb"/><text x="502" y="558" fill="#4a4e57" text-anchor="middle">健康检测 · 调度决策</text>
    <rect x="728" y="528" width="272" height="52" rx="9" fill="#fafafb" stroke="#ececf1"/><text x="864" y="558" fill="#6e6e73" text-anchor="middle">副本补齐 · 克隆修复 · 迁移均衡</text>
  </g>

  <!-- 后台任务 carrier -->
  <rect x="1012" y="168" width="96" height="412" rx="12" fill="#f4eefb" stroke="#e2d3f3" filter="url(#soft)"/>
  <text x="1060" y="360" font-size="12.5" font-weight="700" fill="#42246b" text-anchor="middle" transform="rotate(-90 1060 360)">后台任务 · 第 8 条（执行时机维度）</text>
  <text x="1060" y="380" font-size="9" fill="#7a5aa0" text-anchor="middle" transform="rotate(-90 1060 380)">各域异步部分的统一调度载体</text>
  <g stroke="#c7c7cc" stroke-width="1.3" fill="none" stroke-dasharray="4 3">
    <line x1="1000" y1="194" x2="1012" y2="240" marker-end="url(#ar)"/>
    <line x1="1000" y1="254" x2="1012" y2="290" marker-end="url(#ar)"/>
    <line x1="1000" y1="314" x2="1012" y2="330" marker-end="url(#ar)"/>
    <line x1="1000" y1="434" x2="1012" y2="410" marker-end="url(#ar)"/>
    <line x1="1000" y1="494" x2="1012" y2="470" marker-end="url(#ar)"/>
    <line x1="1000" y1="554" x2="1012" y2="520" marker-end="url(#ar)"/>
  </g>
</svg>
