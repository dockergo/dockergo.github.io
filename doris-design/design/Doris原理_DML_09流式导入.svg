<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="340" viewBox="0 0 1000 340" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1000" height="340" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Routine Load 精确一次：作业→子任务按 offset 区间消费，每批一事务、断点续传</text>

  <!-- kafka -->
  <rect x="30" y="60" width="180" height="120" rx="13" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="120" y="84" font-size="12.5" font-weight="600" fill="#4a1414" text-anchor="middle">Kafka Topic</text>
  <g font-size="10" text-anchor="middle" fill="#a05252">
    <rect x="46" y="96" width="148" height="22" rx="5" fill="#fff" stroke="#e7c3c3"/><text x="120" y="111">p0: …offset→</text>
    <rect x="46" y="122" width="148" height="22" rx="5" fill="#fff" stroke="#e7c3c3"/><text x="120" y="137">p1: …offset→</text>
    <rect x="46" y="148" width="148" height="22" rx="5" fill="#fff" stroke="#e7c3c3"/><text x="120" y="163">p2: …offset→</text>
  </g>

  <rect x="260" y="72" width="200" height="96" rx="13" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="360" y="98" font-size="12.5" font-weight="600" fill="#274a78" text-anchor="middle">RoutineLoadManager</text>
  <text x="360" y="120" font-size="10.5" fill="#5b7db1" text-anchor="middle">持续消费的作业(Job)</text>
  <text x="360" y="140" font-size="10.5" fill="#5b7db1" text-anchor="middle">周期拆分子任务</text>
  <text x="360" y="158" font-size="10.5" fill="#5b7db1" text-anchor="middle">按 分区 + offset 区间</text>

  <rect x="510" y="60" width="230" height="120" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="625" y="84" font-size="12.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">子任务 Task = 一个事务</text>
  <text x="625" y="106" font-size="10.5" fill="#5b7db1" text-anchor="middle">消费 [offset_start, offset_end)</text>
  <text x="625" y="126" font-size="10.5" fill="#5b7db1" text-anchor="middle">写入 → Commit → Publish</text>
  <text x="625" y="146" font-size="10.5" fill="#5b7db1" text-anchor="middle">提交时记录已消费 offset</text>
  <text x="625" y="166" font-size="10.5" fill="#5b7db1" text-anchor="middle">（与写入内核共用 2PC）</text>

  <rect x="790" y="72" width="180" height="96" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="880" y="98" font-size="12.5" font-weight="600" fill="#12402a" text-anchor="middle">精确一次</text>
  <text x="880" y="120" font-size="10.5" fill="#2f6f4f" text-anchor="middle">失败重试从已提交</text>
  <text x="880" y="138" font-size="10.5" fill="#2f6f4f" text-anchor="middle">offset 断点续传</text>
  <text x="880" y="158" font-size="10.5" fill="#2f6f4f" text-anchor="middle">不重不漏</text>

  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="210" y1="120" x2="260" y2="120" marker-end="url(#ar)"/>
    <line x1="460" y1="120" x2="510" y2="120" marker-end="url(#ar)"/>
    <line x1="740" y1="120" x2="790" y2="120" marker-end="url(#ar)"/>
    <path d="M880,168 L880,210 L360,210 L360,168" stroke-dasharray="5 3" marker-end="url(#ar)"/>
  </g>
  <text x="620" y="204" font-size="10" fill="#a1a1a6" text-anchor="middle">offset 回写作业，驱动下一批</text>
  <rect x="30" y="248" width="940" height="66" rx="12" fill="#fafafb" stroke="#ececf1"/>
  <text x="500" y="272" font-size="11.5" fill="#6e6e73" text-anchor="middle">作业级：管理消费进度与调度节奏；任务级：每批独立事务，Commit≠Visible 仍需 Publish。</text>
  <text x="500" y="294" font-size="11.5" fill="#6e6e73" text-anchor="middle">对比 Stream Load（同步单批·可选 2PC）与 Broker Load（远端文件·FE 异步调度）。</text>
</svg>
