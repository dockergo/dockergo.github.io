<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="760" viewBox="0 0 1080 760" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1080" height="760" fill="#fbfbfd"/>
  <text x="40" y="40" font-size="16" font-weight="600" fill="#1d1d1f">集成架构 · 数据源 → 接入 → 数仓分层 → 服务 → 治理</text>
  <text x="40" y="60" font-size="11.5" fill="#86868b">位置即语义:自左而右一条数据链路,横切治理与稳定性覆盖全域</text>

  <!-- 数据源 -->
  <rect x="30" y="78" width="1020" height="62" rx="16" fill="#f5faf6" stroke="#e2ece5"/>
  <text x="50" y="100" font-size="13" font-weight="600" fill="#146c4b">数据源 · DATA SOURCES</text>
  <g text-anchor="middle" font-size="11" fill="#2c5a3a">
    <rect x="230" y="106" width="185" height="26" rx="8" fill="#ffffff" stroke="#cfe6d5" filter="url(#soft)"/><text x="322" y="123">业务库 · MySQL/PG/Oracle</text>
    <rect x="425" y="106" width="185" height="26" rx="8" fill="#ffffff" stroke="#cfe6d5" filter="url(#soft)"/><text x="517" y="123">消息流 · Kafka/Pulsar</text>
    <rect x="620" y="106" width="185" height="26" rx="8" fill="#ffffff" stroke="#cfe6d5" filter="url(#soft)"/><text x="712" y="123">IoT / 埋点 · HTTP 直推</text>
    <rect x="815" y="106" width="205" height="26" rx="8" fill="#ffffff" stroke="#cfe6d5" filter="url(#soft)"/><text x="917" y="123">数据湖 · Hive/Iceberg/Paimon</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <line x1="322" y1="140" x2="322" y2="162" marker-end="url(#ar)"/>
    <line x1="517" y1="140" x2="517" y2="162" marker-end="url(#ar)"/>
    <line x1="712" y1="140" x2="712" y2="162" marker-end="url(#ar)"/>
    <line x1="917" y1="140" x2="917" y2="162" marker-end="url(#ar)"/>
  </g>

  <!-- Doris 引擎大框 -->
  <rect x="30" y="162" width="1020" height="440" rx="18" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="50" y="186" font-size="13.5" font-weight="700" fill="#1d1d1f">Apache Doris 引擎</text>

  <!-- ① 接入层 -->
  <rect x="48" y="198" width="600" height="78" rx="13" fill="#fbf7ef" stroke="#efe4cf"/>
  <text x="64" y="218" font-size="12" font-weight="600" fill="#8a5a12">① 接入层 · 写入</text>
  <g text-anchor="middle" font-size="10.5" fill="#8a5a12">
    <rect x="64" y="226" width="182" height="40" rx="9" fill="#ffffff" stroke="#efe0c4"/><text x="155" y="245" font-weight="600" fill="#1d1d1f">Flink CDC</text><text x="155" y="259" font-size="9">2PC Exactly-Once</text>
    <rect x="254" y="226" width="182" height="40" rx="9" fill="#ffffff" stroke="#efe0c4"/><text x="345" y="245" font-weight="600" fill="#1d1d1f">Routine Load</text><text x="345" y="259" font-size="9">Kafka At-Least-Once</text>
    <rect x="444" y="226" width="188" height="40" rx="9" fill="#ffffff" stroke="#efe0c4"/><text x="538" y="245" font-weight="600" fill="#1d1d1f">Stream Load + Group Commit</text><text x="538" y="259" font-size="9">高频小批必用</text>
  </g>
  <!-- External Catalog 旁路 -->
  <rect x="668" y="198" width="364" height="78" rx="13" fill="#faf4fb" stroke="#ecd9ef"/>
  <text x="684" y="218" font-size="12" font-weight="600" fill="#7a3fb0">External Catalog · 联邦直查</text>
  <rect x="684" y="228" width="332" height="38" rx="9" fill="#ffffff" stroke="#ecd9ef" filter="url(#soft)"/>
  <text x="850" y="246" font-size="10.5" font-weight="600" fill="#7a3fb0" text-anchor="middle">免搬运直查外部表格式</text>
  <text x="850" y="260" font-size="9" fill="#a06fc0" text-anchor="middle">Hive · Iceberg · Paimon · JDBC</text>
  <line x1="350" y1="276" x2="350" y2="298" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ② 数仓分层 -->
  <rect x="48" y="298" width="600" height="96" rx="13" fill="#f6f8fc" stroke="#e6ecf4"/>
  <text x="64" y="318" font-size="12" font-weight="600" fill="#1d5fb8">② 数仓分层</text>
  <g text-anchor="middle" font-size="10.5" fill="#1d5fb8">
    <rect x="64" y="328" width="132" height="54" rx="9" fill="#ffffff" stroke="#c4d5ee"/><text x="130" y="350" font-weight="600" fill="#1d1d1f">ODS 原始层</text><text x="130" y="366" font-size="9">Duplicate 贴源</text>
    <rect x="210" y="328" width="132" height="54" rx="9" fill="#ffffff" stroke="#c4d5ee"/><text x="276" y="350" font-weight="600" fill="#1d1d1f">DWD 明细层</text><text x="276" y="366" font-size="9">Unique/MoW 去重</text>
    <rect x="356" y="328" width="132" height="54" rx="9" fill="#ffffff" stroke="#c4d5ee"/><text x="422" y="350" font-weight="600" fill="#1d1d1f">DWS 汇总层</text><text x="422" y="366" font-size="9">Aggregate+同步MV</text>
    <rect x="502" y="328" width="132" height="54" rx="9" fill="#ffffff" stroke="#c4d5ee"/><text x="568" y="350" font-weight="600" fill="#1d1d1f">ADS 应用层</text><text x="568" y="366" font-size="9">异步MTMV·SPJG</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <line x1="196" y1="355" x2="209" y2="355" marker-end="url(#ar)"/>
    <line x1="342" y1="355" x2="355" y2="355" marker-end="url(#ar)"/>
    <line x1="488" y1="355" x2="501" y2="355" marker-end="url(#ar)"/>
  </g>
  <line x1="350" y1="394" x2="350" y2="416" stroke="#c7c7cc" stroke-width="1.4" stroke-dasharray="4 4" marker-end="url(#ar)"/>
  <text x="430" y="409" font-size="9.5" fill="#a1a1a6">运行于</text>

  <!-- ③ 执行与存储引擎 -->
  <rect x="48" y="416" width="984" height="88" rx="13" fill="#f3f0fb" stroke="#ddd4f2"/>
  <text x="64" y="436" font-size="12" font-weight="600" fill="#5b3fd6">③ 执行与存储引擎(数仓分层运行于此)</text>
  <g text-anchor="middle" font-size="10.5" fill="#5b3fd6">
    <rect x="64" y="446" width="308" height="48" rx="9" fill="#ffffff" stroke="#ddd4f2"/><text x="218" y="468" font-weight="600" fill="#1d1d1f">FE</text><text x="218" y="483" font-size="9">Nereids · Catalog · 元数据</text>
    <rect x="384" y="446" width="308" height="48" rx="9" fill="#ffffff" stroke="#ddd4f2"/><text x="538" y="468" font-weight="600" fill="#1d1d1f">BE</text><text x="538" y="483" font-size="9">Pipeline · 向量化 · 列存</text>
    <rect x="704" y="446" width="312" height="48" rx="9" fill="#ffffff" stroke="#ddd4f2"/><text x="860" y="468" font-weight="600" fill="#1d1d1f">存储</text><text x="860" y="483" font-size="9">Tablet / Rowset / Segment</text>
  </g>

  <!-- 治理横切 -->
  <rect x="48" y="516" width="984" height="70" rx="13" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="64" y="538" font-size="12" font-weight="600" fill="#8a5a12">治理 + 稳定性(横切全域)</text>
  <text x="64" y="560" font-size="10.5" fill="#a98b52">RBAC · 行列权限 · 审计 · TTL · Workload Group · 监控告警 · 备份恢复 · 冷热分层策略</text>
  <text x="64" y="578" font-size="10.5" fill="#a98b52">正确性(事务/元数据多数派)· 稳定性(资源隔离/查询排队)· 可用性(副本自愈/故障转移)</text>

  <!-- 连线:接入→ODS,ADS→服务,External→API -->
  <path d="M350,394 L350,394" fill="none"/>

  <!-- 服务消费 -->
  <line x1="700" y1="602" x2="700" y2="624" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="30" y="624" width="1020" height="112" rx="16" fill="#f5faf6" stroke="#e2ece5"/>
  <text x="50" y="646" font-size="13" font-weight="600" fill="#146c4b">服务消费 · CONSUMPTION</text>
  <g text-anchor="middle" font-size="10.5" fill="#2c5a3a">
    <rect x="50" y="656" width="238" height="66" rx="10" fill="#ffffff" stroke="#cfe6d5" filter="url(#soft)"/><text x="169" y="682" font-weight="600" fill="#1d1d1f">BI 报表</text><text x="169" y="700" font-size="9">JDBC 9030 · &lt;5s · 并发 100+</text>
    <rect x="298" y="656" width="238" height="66" rx="10" fill="#ffffff" stroke="#cfe6d5" filter="url(#soft)"/><text x="417" y="682" font-weight="600" fill="#1d1d1f">数据 API</text><text x="417" y="700" font-size="9">点查+倒排 · &lt;100ms · 并发 1000+</text>
    <rect x="546" y="656" width="238" height="66" rx="10" fill="#ffffff" stroke="#cfe6d5" filter="url(#soft)"/><text x="665" y="682" font-weight="600" fill="#1d1d1f">数据科学</text><text x="665" y="700" font-size="9">Arrow Flight SQL (ADBC)</text>
    <rect x="794" y="656" width="226" height="66" rx="10" fill="#ffffff" stroke="#cfe6d5" filter="url(#soft)"/><text x="907" y="682" font-weight="600" fill="#1d1d1f">导出交换</text><text x="907" y="700" font-size="9">OUTFILE → HDFS / S3</text>
  </g>
</svg>
