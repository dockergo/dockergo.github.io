<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="340" viewBox="0 0 1000 340" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1000" height="340" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">主键并发/乱序写：sequence 列裁决"谁是最新值"，而非"谁最后写"</text>

  <g text-anchor="middle">
    <rect x="40" y="60" width="230" height="44" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="155" y="80" font-size="11.5" font-weight="600" fill="#1b2a4a">写入 A：pk=1, seq=100, v="A"</text><text x="155" y="96" font-size="9.5" fill="#5b7db1">较早产生（seq 大）</text>
    <rect x="40" y="120" width="230" height="44" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="155" y="140" font-size="11.5" font-weight="600" fill="#1b2a4a">写入 B：pk=1, seq=99, v="B"</text><text x="155" y="156" font-size="9.5" fill="#5b7db1">乱序·较晚到达（seq 小）</text>
  </g>
  <rect x="330" y="82" width="220" height="64" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/><text x="440" y="110" font-size="12" font-weight="600" fill="#5a3410" text-anchor="middle">MoW Publish 期裁决</text><text x="440" y="130" font-size="10" fill="#93762e" text-anchor="middle">比较 __DORIS_SEQUENCE_COL__</text>
  <rect x="610" y="82" width="230" height="64" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="725" y="110" font-size="12" font-weight="600" fill="#12402a" text-anchor="middle">保留 seq 高者 → v="A"</text><text x="725" y="130" font-size="10" fill="#2f6f4f" text-anchor="middle">B(seq=99) 入 Delete Bitmap</text>
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <path d="M270,82 L300,82 L300,104 L330,104" marker-end="url(#ar)"/>
    <path d="M270,142 L300,142 L300,124 L330,124" marker-end="url(#ar)"/>
    <line x1="550" y1="114" x2="610" y2="114" marker-end="url(#ar)"/>
  </g>

  <rect x="30" y="184" width="940" height="70" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="48" y="206" font-size="11.5" font-weight="600" fill="#1d1d1f">裁决对比</text>
  <g font-size="10.5" fill="#6e6e73">
    <text x="48" y="228">· 未指定 sequence 列：最后 Publish 者胜 → 乱序写下"最后写入 ≠ 最新值"，可能覆盖错</text>
    <text x="48" y="248">· 指定 `function_column.sequence_col`：按 seq 值裁决 → 乱序也能正确定最终值（幂等重放安全）</text>
  </g>
  <text x="30" y="286" font-size="11" fill="#6e6e73">适用：CDC / 多源乱序写入同主键，用业务时间戳或版本号作 sequence，保证最终一致到"最新"。</text>
  <text x="30" y="308" font-size="10.5" fill="#86868b">仅 Unique Key（MoW）表支持；sequence 列不参与 key，只用于同键冲突裁决。</text>
</svg>
