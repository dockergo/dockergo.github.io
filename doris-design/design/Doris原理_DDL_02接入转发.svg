<svg xmlns="http://www.w3.org/2000/svg" width="840" height="310" viewBox="0 0 840 310" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="840" height="310" fill="#fbfbfd"/>
  <text x="30" y="28" font-size="14" font-weight="600" fill="#1d1d1f">DDL 接入与转发：任意 FE 收到 → 转发 Master 串行执行</text>
  <rect x="40" y="60" width="150" height="44" rx="11" fill="#f4eefb" stroke="#e2d3f3" filter="url(#s)"/><text x="115" y="87" font-size="12.5" font-weight="600" fill="#42246b" text-anchor="middle">Client DDL</text>
  <rect x="250" y="52" width="170" height="60" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#s)"/><text x="335" y="78" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">Follower / Observer</text><text x="335" y="97" font-size="9.5" fill="#5b7db1" text-anchor="middle">非 Master：仅转发</text>
  <rect x="500" y="52" width="300" height="60" rx="12" fill="#fbeaea" stroke="#e7c3c3" filter="url(#s)"/><text x="650" y="78" font-size="12.5" font-weight="600" fill="#4a1414" text-anchor="middle">Master（唯一写入点）</text><text x="650" y="97" font-size="9.5" fill="#a05252" text-anchor="middle">校验 → 加锁 → 改内存 → 写 EditLog</text>
  <g text-anchor="middle" font-size="11" fill="#12402a">
    <rect x="500" y="170" width="140" height="44" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#s)"/><text x="570" y="197">Follower Replay</text>
    <rect x="660" y="170" width="140" height="44" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#s)"/><text x="730" y="197">Observer Replay</text>
  </g>
  <rect x="500" y="238" width="300" height="40" rx="11" fill="#fff7e6" stroke="#e8cf9a"/><text x="650" y="263" font-size="10.5" fill="#5a3410" text-anchor="middle">涉及数据的 DDL → 下发 BE（建 Tablet / 转换）</text>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <line x1="190" y1="82" x2="250" y2="82" marker-end="url(#a)"/>
    <line x1="420" y1="82" x2="500" y2="82" marker-end="url(#a)"/>
    <path d="M600,112 L570,170" stroke-dasharray="4 3" marker-end="url(#a)"/>
    <path d="M700,112 L730,170" stroke-dasharray="4 3" marker-end="url(#a)"/>
    <line x1="650" y1="214" x2="650" y2="238" marker-end="url(#a)"/>
  </g>
  <g font-size="9.5" fill="#a1a1a6" text-anchor="middle"><text x="220" y="75">转发</text><text x="460" y="75">转发</text><text x="640" y="150">EditLog 复制多数派</text></g>
  <text x="40" y="200" font-size="10.5" fill="#6e6e73">单点写</text><text x="40" y="220" font-size="10.5" fill="#6e6e73">换强一致；</text><text x="40" y="240" font-size="10.5" fill="#6e6e73">高频 DDL</text><text x="40" y="260" font-size="10.5" fill="#6e6e73">是反模式</text>
</svg>
