<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="380" viewBox="0 0 1000 380" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="380" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">读取路径（取数）：选可见版本 → 段内索引裁剪 → 跨 Rowset 归并 → 按数据模型收口</text>

  <!-- top pipeline -->
  <rect x="28" y="62" width="216" height="58" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="136" y="86" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">① 选可见版本</text>
  <text x="136" y="105" font-size="10" fill="#5b7db1" text-anchor="middle">命中覆盖该版本的 Rowset 集合</text>

  <rect x="268" y="62" width="216" height="58" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="376" y="86" font-size="12" font-weight="600" fill="#5a3410" text-anchor="middle">② 段内索引裁剪</text>
  <text x="376" y="105" font-size="10" fill="#93762e" text-anchor="middle">ShortKey · ZoneMap · BloomFilter · 倒排</text>

  <rect x="508" y="62" width="216" height="58" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="616" y="86" font-size="12" font-weight="600" fill="#12402a" text-anchor="middle">③ 跨 Rowset/Segment 归并</text>
  <text x="616" y="105" font-size="10" fill="#2f6f4f" text-anchor="middle">按 key 有序堆归并（Merge Iterator）</text>

  <rect x="748" y="62" width="224" height="58" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="860" y="86" font-size="12" font-weight="600" fill="#3d2a5a" text-anchor="middle">④ 按数据模型收口 → 输出 Block</text>
  <text x="860" y="105" font-size="10" fill="#7a5aa0" text-anchor="middle">处理同 key 多版本，向量化输出</text>

  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="244" y1="91" x2="268" y2="91" marker-end="url(#ar)"/>
    <line x1="484" y1="91" x2="508" y2="91" marker-end="url(#ar)"/>
    <line x1="724" y1="91" x2="748" y2="91" marker-end="url(#ar)"/>
  </g>

  <!-- fan down to model cards -->
  <text x="500" y="152" font-size="11" font-weight="600" fill="#6e6e73" text-anchor="middle">④ 收口方式随数据模型而不同（这是 Doris 三种模型在读侧的真正区别）</text>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <path d="M860,120 L860,138 L142,138 L142,182" marker-end="url(#ar)"/>
    <path d="M384,138 L384,182" marker-end="url(#ar)"/>
    <path d="M626,138 L626,182" marker-end="url(#ar)"/>
    <path d="M860,138 L860,182" marker-end="url(#ar)"/>
  </g>

  <!-- model cards -->
  <rect x="28" y="184" width="228" height="150" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="142" y="208" font-size="12" font-weight="600" fill="#1d1d1f" text-anchor="middle">明细模型 DUP</text>
  <text x="46" y="234" font-size="10.5" fill="#6e6e73">· 不去重、不聚合</text>
  <text x="46" y="256" font-size="10.5" fill="#6e6e73">· 纯归并按序输出</text>
  <text x="46" y="278" font-size="10.5" fill="#6e6e73">· 读最轻量</text>

  <rect x="270" y="184" width="228" height="150" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="384" y="208" font-size="12" font-weight="600" fill="#12402a" text-anchor="middle">聚合模型 AGG</text>
  <text x="288" y="234" font-size="10.5" fill="#2f6f4f">· 同 key 读时聚合</text>
  <text x="288" y="256" font-size="10.5" fill="#2f6f4f">· SUM/MAX… 现场累加</text>
  <text x="288" y="278" font-size="10.5" fill="#2f6f4f">· 未 Compaction 则读时算</text>

  <rect x="512" y="184" width="228" height="150" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="626" y="208" font-size="12" font-weight="600" fill="#5a3410" text-anchor="middle">主键模型 · Merge-on-Read</text>
  <text x="530" y="234" font-size="10.5" fill="#93762e">· 同 key 保留最高版本</text>
  <text x="530" y="256" font-size="10.5" fill="#93762e">· 读时去重（现场归并）</text>
  <text x="530" y="278" font-size="10.5" fill="#93762e">· 写快读慢</text>

  <rect x="754" y="184" width="218" height="150" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="863" y="208" font-size="12" font-weight="600" fill="#274a78" text-anchor="middle">主键模型 · Merge-on-Write</text>
  <text x="772" y="234" font-size="10.5" fill="#5b7db1">· Delete Bitmap 预先</text>
  <text x="772" y="252" font-size="10.5" fill="#5b7db1">  屏蔽被覆盖的旧行</text>
  <text x="772" y="274" font-size="10.5" fill="#5b7db1">· 免读时去重 → 读快</text>
  <text x="772" y="296" font-size="10.5" fill="#5b7db1">· 写侧多一步维护</text>
</svg>
