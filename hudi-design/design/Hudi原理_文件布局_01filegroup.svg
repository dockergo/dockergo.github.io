<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="880" height="420" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">层次：表 → 分区 → FileGroup → FileSlice</text>
  <text x="30" y="49" font-size="10" fill="#a1a1a6">fileId 是 FileGroup 的稳定身份；FileSlice 按 base instant 分版本（TreeMap 新在前）</text>

  <!-- tree hierarchy -->
  <rect x="30" y="70" width="200" height="46" rx="10" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/><text x="130" y="98" font-size="10.5" text-anchor="middle" font-weight="700" fill="#3d2a5a">表（.hoodie + 分区）</text>

  <rect x="300" y="70" width="240" height="46" rx="10" fill="#f6f8fc" stroke="#cfe0f2"/><text x="420" y="90" font-size="9.5" text-anchor="middle" font-weight="600" fill="#274a78">分区 region=cn/dt=2026-07-17</text><text x="420" y="107" font-size="8" text-anchor="middle" fill="#5b7db1">含 .hoodie_partition_metadata</text>
  <line x1="230" y1="93" x2="300" y2="93" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- file groups under partition -->
  <rect x="300" y="140" width="550" height="130" rx="12" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="316" y="162" font-size="10" font-weight="600" fill="#12402a">FileGroup（HoodieFileGroupId = partitionPath + fileId）</text>
  <rect x="316" y="172" width="250" height="86" rx="9" fill="#e6f7ee" stroke="#bfe0cd"/><text x="330" y="192" font-size="9.3" font-weight="600" fill="#12402a">FileGroup（fileId=a1）</text><text x="330" y="210" font-size="8.4" fill="#2f6f4f">TreeMap&lt;String,FileSlice&gt; 按 base instant</text><text x="330" y="228" font-size="8.4" fill="#2f6f4f">slice(c2, 最新) / slice(c0, 旧)</text><text x="330" y="248" font-size="8.2" fill="#6e9a7c">索引把某批键绑定到此 fileId</text>
  <rect x="582" y="172" width="252" height="86" rx="9" fill="#e6f7ee" stroke="#bfe0cd"/><text x="596" y="192" font-size="9.3" font-weight="600" fill="#12402a">FileGroup（fileId=b7）</text><text x="596" y="210" font-size="8.4" fill="#2f6f4f">另一组稳定 fileId</text><text x="596" y="228" font-size="8.4" fill="#2f6f4f">更新只在同 fileId 内产新 slice/加 log</text><text x="596" y="248" font-size="8.2" fill="#6e9a7c">换 fileId = 新 FileGroup</text>
  <line x1="420" y1="116" x2="420" y2="140" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- file slice detail -->
  <rect x="30" y="290" width="820" height="112" rx="12" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="312" font-size="10.5" font-weight="700" fill="#12402a">FileSlice = 某 commit 的 base 文件 + log 文件列表</text>
  <g font-size="8.8" text-anchor="middle">
    <rect x="60" y="326" width="200" height="52" rx="9" fill="#fff" stroke="#bfe0cd"/><text x="160" y="348" font-weight="600" fill="#12402a">baseInstantTime</text><text x="160" y="366" fill="#2f6f4f">该 slice 的版本标识</text>
    <rect x="290" y="326" width="200" height="52" rx="9" fill="#fff" stroke="#bfe0cd"/><text x="390" y="348" font-weight="600" fill="#12402a">baseFile（可空）</text><text x="390" y="366" fill="#2f6f4f">列式基线（parquet…）</text>
    <rect x="520" y="326" width="290" height="52" rx="9" fill="#fdf6ea" stroke="#efdcb4"/><text x="665" y="348" font-weight="600" fill="#5a3410">TreeSet&lt;HoodieLogFile&gt; logFiles</text><text x="665" y="366" fill="#93762e">COW 恒空；MOR = base + log</text>
  </g>
</svg>
