<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="900" viewBox="0 0 1080 900" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="900" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Hudi 核心原理 · 总架构图（位置即语义）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">事务性数据湖表格式(upsert 导向)：时间线是真相，索引把记录键路由到文件组，COW/MOR 两种表类型，表服务后台维护</text>

  <!-- compute engines (external) -->
  <rect x="30" y="64" width="1020" height="44" rx="13" fill="#f4f2ee" stroke="#e3ddd2" stroke-dasharray="6 4"/>
  <text x="46" y="82" font-size="11" font-weight="700" fill="#6e6357">计算引擎（非 Hudi · 经 write client 读写）</text>
  <g text-anchor="middle" font-size="8.8">
    <rect x="360" y="70" width="330" height="16" rx="5" fill="#fbf6ef" stroke="#e6d8c4"/><text x="525" y="82" fill="#5a3410">Spark（DataSource + SparkRDDWriteClient）</text>
    <rect x="700" y="70" width="334" height="16" rx="5" fill="#fbf6ef" stroke="#e6d8c4"/><text x="867" y="82" fill="#5a3410">Flink（sink/source + FLINK_STATE 索引）</text>
  </g>

  <!-- API 接触面 -->
  <rect x="30" y="120" width="1020" height="44" rx="13" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="46" y="147" font-size="11" fill="#3d2a5a"><tspan font-weight="700">表读写 API 接触面</tspan>　写：upsert / insert / bulk_insert / delete　读：快照 / 读优化 / 增量查</text>

  <!-- 写入路径 (left) -->
  <rect x="30" y="178" width="326" height="252" rx="16" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="46" y="200" font-size="11.5" font-weight="700" fill="#5a3410">写入路径与 upsert</text>
  <g text-anchor="middle" font-size="8.2">
    <rect x="44" y="210" width="298" height="34" rx="8" fill="#fef2e0" stroke="#e8cf9a"/><text x="193" y="225" font-weight="600" fill="#5a3410">startCommit 开时间线 instant</text><text x="193" y="238" fill="#93762e">preWrite 预处理</text>
    <rect x="44" y="252" width="298" height="34" rx="8" fill="#fef2e0" stroke="#e8cf9a"/><text x="193" y="267" font-weight="600" fill="#5a3410">索引 tagLocation：键→文件组</text><text x="193" y="280" fill="#93762e">命中→更新 · 未命中→插入</text>
    <rect x="44" y="294" width="298" height="34" rx="8" fill="#fef2e0" stroke="#e8cf9a"/><text x="193" y="309" font-weight="600" fill="#5a3410">bucket 路由 UPDATE / INSERT</text><text x="193" y="322" fill="#93762e">SmallFile 塞入小文件</text>
    <rect x="44" y="336" width="298" height="36" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="193" y="352" font-weight="600" fill="#12402a">写 handle：COW 重写 / MOR 追加 log</text><text x="193" y="366" fill="#2f6f4f">marker 标记产物（失败回滚）</text>
    <rect x="44" y="380" width="298" height="32" rx="8" fill="#fff" stroke="#e8cf9a"/><text x="193" y="400" fill="#93762e">全部写完 → 提交，instant 转 COMPLETED</text>
  </g>

  <!-- 索引 (middle tall) -->
  <rect x="368" y="178" width="248" height="252" rx="16" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="384" y="200" font-size="11.5" font-weight="700" fill="#3d2a5a">索引</text>
  <g text-anchor="middle" font-size="8.2">
    <rect x="382" y="210" width="220" height="44" rx="8" fill="#faf4fb" stroke="#e2d2ee"/><text x="492" y="228" font-weight="600" fill="#3d2a5a">记录键 → 文件组位置</text><text x="492" y="242" fill="#7a5a95">高效 upsert 的地基（免全表扫）</text>
    <rect x="382" y="262" width="220" height="40" rx="8" fill="#faf4fb" stroke="#e2d2ee"/><text x="492" y="279" font-weight="600" fill="#3d2a5a">Bloom / Simple / Bucket</text><text x="492" y="293" fill="#7a5a95">RECORD_LEVEL（元数据表）</text>
    <rect x="382" y="310" width="220" height="40" rx="8" fill="#faf4fb" stroke="#e2d2ee"/><text x="492" y="327" font-weight="600" fill="#3d2a5a">分区内 vs 全局（isGlobal）</text><text x="492" y="341" fill="#7a5a95">一致性哈希桶可动态调</text>
    <rect x="382" y="358" width="220" height="54" rx="8" fill="#fff" stroke="#d9c7ec"/><text x="492" y="378" fill="#7a5a95">Hudi 相对 append 导向</text><text x="492" y="392" fill="#7a5a95">Iceberg 的本质差异</text>
  </g>

  <!-- 时间线 (right, core) -->
  <rect x="628" y="178" width="422" height="252" rx="16" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="644" y="200" font-size="11.5" font-weight="700" fill="#1b2a4a">时间线（核心 · 灵魂 · 表的真相）· .hoodie</text>
  <g text-anchor="middle" font-size="8.3">
    <rect x="644" y="210" width="390" height="52" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="839" y="230" font-weight="600" fill="#274a78">HoodieInstant：动作 × 状态</text><text x="839" y="245" fill="#5b7db1">commit/deltacommit/compaction/clean/rollback</text><text x="839" y="257" fill="#5b7db1">× REQUESTED → INFLIGHT → COMPLETED</text>
    <rect x="644" y="270" width="390" height="40" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="839" y="287" font-weight="600" fill="#274a78">instant time 单调定序（全序）</text><text x="839" y="301" fill="#5b7db1">文件片按 base instant 归位</text>
    <rect x="644" y="318" width="390" height="42" rx="8" fill="#e7f0fb" stroke="#b9d2ef"/><text x="839" y="336" font-weight="600" fill="#1b2a4a">决定可见性 / 增量起点 / 回滚点</text><text x="839" y="351" fill="#5b7db1">只有 COMPLETED 的文件片可见</text>
    <rect x="644" y="368" width="390" height="44" rx="8" fill="#fff" stroke="#bcd0ec"/><text x="839" y="386" fill="#5b7db1">不可变；过滤产新视图。</text><text x="839" y="400" fill="#5b7db1">被所有主线依赖</text>
  </g>

  <!-- 文件布局 + 表类型 -->
  <rect x="30" y="444" width="510" height="72" rx="14" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="466" font-size="11" font-weight="700" fill="#12402a">文件布局</text>
  <g text-anchor="middle" font-size="8.2">
    <rect x="46" y="474" width="230" height="34" rx="7" fill="#eafaf1" stroke="#bfe0cd"/><text x="161" y="490" fill="#12402a">FileGroup → FileSlice</text><text x="161" y="503" fill="#2f6f4f">partitionPath + fileId（身份）</text>
    <rect x="286" y="474" width="244" height="34" rx="7" fill="#e6f7ee" stroke="#bfe0cd"/><text x="408" y="490" fill="#12402a">base + log · 命名即元数据</text><text x="408" y="503" fill="#2f6f4f">分区目录 · bootstrap</text>
  </g>
  <rect x="552" y="444" width="498" height="72" rx="14" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="568" y="466" font-size="11" font-weight="700" fill="#5a3410">表类型（COW / MOR）</text>
  <g text-anchor="middle" font-size="8.2">
    <rect x="568" y="474" width="228" height="34" rx="7" fill="#fef2e0" stroke="#efdcb4"/><text x="682" y="490" fill="#5a3410">COW：重写文件（写慢读快）</text><text x="682" y="503" fill="#93762e">slice 只有 base</text>
    <rect x="806" y="474" width="228" height="34" rx="7" fill="#fdf3e2" stroke="#efdcb4"/><text x="920" y="490" fill="#5a3410">MOR：写 log（写快读时合并）</text><text x="920" y="503" fill="#93762e">slice = base + log，需 compaction</text>
  </g>

  <!-- MoR 读合并 + 表服务 -->
  <rect x="30" y="530" width="510" height="66" rx="14" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="552" font-size="11" font-weight="700" fill="#1b2a4a">MoR 读合并</text>
  <text x="46" y="571" font-size="8.6" fill="#5b7db1">HoodieMergedLogRecordReader 合并 base + log（同键按 instant 序）</text>
  <text x="46" y="587" font-size="8.6" fill="#5b7db1">三视图：快照（合并）/ 读优化（仅 base）/ 增量（instant 区间）</text>
  <rect x="552" y="530" width="498" height="66" rx="14" fill="#faf4fb" stroke="#e2d2ee"/>
  <text x="568" y="552" font-size="11" font-weight="700" fill="#5a3d78">表服务（后台）</text>
  <text x="568" y="571" font-size="8.6" fill="#7a5a95">compaction（合 log 进 base）· cleaning（清旧 slice）</text>
  <text x="568" y="587" font-size="8.6" fill="#7a5a95">clustering（replacecommit 重排布局）</text>

  <!-- 并发控制与元数据 -->
  <rect x="30" y="610" width="1020" height="58" rx="14" fill="#f7f2fb" stroke="#ddd0ec"/>
  <text x="46" y="632" font-size="11" font-weight="700" fill="#4a2f78">并发控制与元数据</text>
  <text x="46" y="652" font-size="8.7" fill="#6e4f95">OCC/NBCC + 锁 provider + marker（(partition,fileId) 交集检测冲突）· metadata table（files/col_stats/bloom/record_index）· catalog 同步（HiveSync→HMS/Glue）· .hoodie 表自描述</text>

  <!-- 存储 -->
  <rect x="30" y="682" width="1020" height="48" rx="14" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="46" y="703" font-size="11" font-weight="700" fill="#5a3410">数据文件（对象存储 / HDFS）· base file（parquet/hfile/orc）+ log file（avro/parquet block）</text>
  <text x="46" y="720" font-size="8.5" fill="#93762e">Hudi 不执行查询：由计算引擎读；MOR 读时合并 base + log</text>

  <!-- flow arrows -->
  <line x1="540" y1="108" x2="540" y2="120" stroke="#86868b" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="540" y1="164" x2="540" y2="178" stroke="#86868b" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="616" y1="300" x2="628" y2="300" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="356" y1="300" x2="368" y2="300" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="540" y1="430" x2="540" y2="444" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="540" y1="668" x2="540" y2="682" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- pervasive instant time -->
  <rect x="30" y="744" width="1020" height="40" rx="12" fill="#f0f0f4" stroke="#d2d2d7"/>
  <text x="540" y="769" font-size="10" font-weight="700" text-anchor="middle" fill="#48484a">贯穿层 · instant time（单调时间戳）—— 时间线 / 文件片 / MoR 合并都按 instant 序，横切写入 / 存储 / 读合并</text>

  <!-- 位置即语义 -->
  <rect x="30" y="798" width="1020" height="72" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="820" font-size="11" font-weight="700" fill="#1d1d1f">位置即语义</text>
  <text x="46" y="840" font-size="8.7" fill="#6e6e73">上＝引擎（外部）+ 表 API；中左＝写入路径；中＝索引；中右＝时间线（核心真相）；</text>
  <text x="46" y="856" font-size="8.7" fill="#6e6e73">中下＝文件布局 + 表类型 + MoR 读合并 + 表服务；下＝并发控制与元数据 + 数据文件。Hudi 只管元数据 + 写读逻辑。</text>
</svg>
