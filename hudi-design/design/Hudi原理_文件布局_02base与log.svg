<svg xmlns="http://www.w3.org/2000/svg" width="880" height="410" viewBox="0 0 880 410" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter></defs>
  <rect width="880" height="410" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">base 文件与 log 文件：命名即元数据</text>
  <text x="30" y="49" font-size="10" fill="#a1a1a6">Hudi 把 fileId/baseInstantTime/version 编码进文件名，读端不打开文件即可归组、定版、排序</text>

  <!-- base file -->
  <rect x="30" y="70" width="400" height="160" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="46" y="92" font-size="10.5" font-weight="700" fill="#12402a">base 文件（列式基线）</text>
  <text x="46" y="112" font-size="9" fill="#2f6f4f">格式 HoodieFileFormat：PARQUET（默认）/ HFILE / ORC</text>
  <rect x="46" y="124" width="368" height="42" rx="8" fill="#fff" stroke="#bfe0cd"/><text x="230" y="142" font-size="9" text-anchor="middle" font-weight="600" fill="#12402a">fileId_writeToken_baseInstantTime.parquet</text><text x="230" y="158" font-size="8" text-anchor="middle" fill="#2f6f4f">从名字读出：属哪个 file group + 哪个版本</text>
  <text x="46" y="188" font-size="8.8" fill="#2f6f4f">COW：每次更新重写产新 base（新 instant）</text>
  <text x="46" y="206" font-size="8.8" fill="#2f6f4f">MOR：compaction 才产新 base</text>
  <text x="46" y="224" font-size="8.4" fill="#6e9a7c">读优化查只读 base</text>

  <!-- log file -->
  <rect x="450" y="70" width="400" height="160" rx="12" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="466" y="92" font-size="10.5" font-weight="700" fill="#5a3410">log 文件（MOR 增量）</text>
  <text x="466" y="112" font-size="9" fill="#93762e">追加写；绑定到所修饰 base 的 fileId + baseInstantTime</text>
  <rect x="466" y="124" width="368" height="42" rx="8" fill="#fff" stroke="#efdcb4"/><text x="650" y="142" font-size="8.6" text-anchor="middle" font-weight="600" fill="#5a3410">.fileId_baseInstantTime.log.version_writeToken</text><text x="650" y="158" font-size="8" text-anchor="middle" fill="#93762e">version 递增，一个 slice 可多个 log</text>
  <text x="466" y="188" font-size="8.8" fill="#93762e">扩展名/排序让"删除排数据后"保证 commit 时间序</text>
  <text x="466" y="206" font-size="8.8" fill="#93762e">内部由 log block 组成（数据/删除/命令块）</text>
  <text x="466" y="224" font-size="8.4" fill="#a98b6a">读合并的最小单位见【MoR 读合并】</text>

  <!-- naming is metadata -->
  <rect x="30" y="250" width="820" height="146" rx="12" fill="#f6f8fc" stroke="#dbe6f4"/>
  <text x="46" y="272" font-size="10.5" font-weight="700" fill="#1b2a4a">命名即元数据 —— "位置即语义"在文件层的体现</text>
  <g font-size="9">
    <rect x="46" y="286" width="256" height="94" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="174" y="308" text-anchor="middle" font-weight="600" fill="#274a78">按 fileId 归组</text><text x="60" y="330" fill="#5b7db1">相同 fileId 的文件属同一</text><text x="60" y="348" fill="#5b7db1">FileGroup，不必读内容</text>
    <rect x="312" y="286" width="256" height="94" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="440" y="308" text-anchor="middle" font-weight="600" fill="#274a78">按 baseInstantTime 定版</text><text x="326" y="330" fill="#5b7db1">哪个 base、哪些 log 属</text><text x="326" y="348" fill="#5b7db1">同一 slice，一目了然</text>
    <rect x="578" y="286" width="256" height="94" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="706" y="308" text-anchor="middle" font-weight="600" fill="#274a78">按 version 排序</text><text x="592" y="330" fill="#5b7db1">log 合并顺序由名字</text><text x="592" y="348" fill="#5b7db1">+ instant 序确定</text>
  </g>
</svg>
