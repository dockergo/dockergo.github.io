<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
    <marker id="ard" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c9a6d8"/></marker>
  </defs>
  <rect width="900" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">能力域依赖关系图</text>
  <text x="30" y="49" font-size="10" fill="#a1a1a6">实线＝数据流 / 调用；紫虚线＝状态约束（时间线定序、OCC 冲突）。贯穿层：instant time</text>

  <!-- edges first (behind nodes) -->
  <!-- 接触面 -> 写入路径 / MoR -->
  <path d="M300,96 L200,140" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M470,96 L620,140" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <!-- 写入路径 -> 索引 / 表类型 / 文件布局 -->
  <path d="M200,196 L360,220" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M170,196 L150,300" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M200,196 L300,300" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <!-- 索引 -> 文件布局 -->
  <path d="M400,256 L330,300" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <!-- MoR -> 文件布局 / 表类型 -->
  <path d="M640,196 L340,315" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M660,196 L200,315" stroke="#c7c7cc" stroke-width="1.2" fill="none" marker-end="url(#ar)" opacity="0.5"/>
  <!-- 表服务 -> 文件布局 -->
  <path d="M660,400 L360,344" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <!-- 时间线 (core) dashed to all -->
  <path d="M560,430 L200,180" stroke="#c9a6d8" stroke-width="1.3" fill="none" stroke-dasharray="5 4" marker-end="url(#ard)"/>
  <path d="M580,430 L640,180" stroke="#c9a6d8" stroke-width="1.3" fill="none" stroke-dasharray="5 4" marker-end="url(#ard)"/>
  <path d="M540,430 L250,325" stroke="#c9a6d8" stroke-width="1.3" fill="none" stroke-dasharray="5 4" marker-end="url(#ard)"/>
  <path d="M620,428 L680,410" stroke="#c9a6d8" stroke-width="1.3" fill="none" stroke-dasharray="5 4" marker-end="url(#ard)"/>
  <!-- 并发元数据 dashed to 写入路径 -->
  <path d="M760,400 L215,180" stroke="#c9a6d8" stroke-width="1.2" fill="none" stroke-dasharray="5 4" marker-end="url(#ard)" opacity="0.75"/>

  <!-- nodes -->
  <g font-size="10.5" text-anchor="middle">
    <rect x="300" y="66" width="170" height="34" rx="9" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/><text x="385" y="88" font-weight="600" fill="#3d2a5a">接触面 · 表读写 API</text>
    <rect x="120" y="146" width="150" height="50" rx="10" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/><text x="195" y="168" font-weight="600" fill="#5a3410">写入路径</text><text x="195" y="184" font-size="8.6" fill="#93762e">tag→路由→handle</text>
    <rect x="360" y="200" width="130" height="52" rx="10" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/><text x="425" y="222" font-weight="600" fill="#3d2a5a">索引</text><text x="425" y="238" font-size="8.6" fill="#7a5a95">键→文件组</text>
    <rect x="600" y="146" width="150" height="50" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="675" y="168" font-weight="600" fill="#1b2a4a">MoR 读合并</text><text x="675" y="184" font-size="8.6" fill="#5b7db1">base+log 三视图</text>
    <rect x="120" y="300" width="130" height="48" rx="10" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/><text x="185" y="321" font-weight="600" fill="#5a3410">表类型 COW/MOR</text><text x="185" y="337" font-size="8.6" fill="#93762e">写读取舍</text>
    <rect x="270" y="300" width="130" height="48" rx="10" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/><text x="335" y="321" font-weight="600" fill="#12402a">文件布局</text><text x="335" y="337" font-size="8.6" fill="#2f6f4f">FileGroup/Slice</text>
    <rect x="490" y="418" width="180" height="50" rx="10" fill="#e7f0fb" stroke="#b9d2ef" filter="url(#soft)"/><text x="580" y="440" font-weight="700" fill="#1b2a4a">时间线（核心 · 灵魂）</text><text x="580" y="456" font-size="8.6" fill="#5b7db1">定序 / 可见性 / 回滚 · 被所有依赖</text>
    <rect x="620" y="386" width="140" height="30" rx="9" fill="#faf4fb" stroke="#e2d2ee" filter="url(#soft)"/><text x="690" y="406" font-weight="600" fill="#5a3d78">表服务（后台）</text>
    <rect x="700" y="330" width="170" height="46" rx="10" fill="#f7f2fb" stroke="#ddd0ec" filter="url(#soft)"/><text x="785" y="351" font-weight="600" fill="#4a2f78">并发控制与元数据</text><text x="785" y="367" font-size="8.6" fill="#6e4f95">OCC · MDT · catalog</text>
  </g>

  <!-- legend -->
  <line x1="600" y1="60" x2="628" y2="60" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/><text x="634" y="63" font-size="8.8" fill="#6e6e73">调用/数据</text>
  <line x1="710" y1="60" x2="738" y2="60" stroke="#c9a6d8" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#ard)"/><text x="744" y="63" font-size="8.8" fill="#6e6e73">状态约束</text>
</svg>
