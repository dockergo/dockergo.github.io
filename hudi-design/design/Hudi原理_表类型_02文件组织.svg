<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="880" height="420" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">文件组织：FileGroup → FileSlice（base + log）</text>
  <text x="30" y="49" font-size="10" fill="#a1a1a6">组织统一，表类型只影响 slice 里有无 log（详见【文件布局】）</text>

  <!-- partition -->
  <rect x="30" y="66" width="820" height="300" rx="14" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="88" font-size="10.5" font-weight="700" fill="#12402a">一个分区（partitionPath）· 含多个 FileGroup</text>

  <!-- FileGroup A -->
  <rect x="50" y="102" width="390" height="246" rx="12" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="66" y="124" font-size="10" font-weight="600" fill="#12402a">FileGroup A（fileId = a1）</text>
  <text x="66" y="140" font-size="8.4" fill="#2f6f4f">HoodieFileGroupId = partitionPath + fileId · upsert 路由单元</text>
  <!-- slices -->
  <rect x="66" y="150" width="358" height="86" rx="9" fill="#e6f7ee" stroke="#bfe0cd"/><text x="80" y="170" font-size="9.3" font-weight="600" fill="#12402a">FileSlice（baseInstant=c2，最新）</text>
  <rect x="80" y="178" width="150" height="24" rx="6" fill="#fff" stroke="#bfe0cd"/><text x="155" y="194" font-size="8.2" text-anchor="middle" fill="#12402a">base（c2）</text>
  <rect x="240" y="178" width="80" height="24" rx="6" fill="#fdf3e2" stroke="#efdcb4"/><text x="280" y="194" font-size="8" text-anchor="middle" fill="#93762e">log.1</text>
  <rect x="326" y="178" width="80" height="24" rx="6" fill="#fdf3e2" stroke="#efdcb4"/><text x="366" y="194" font-size="8" text-anchor="middle" fill="#93762e">log.2</text>
  <text x="80" y="220" font-size="8.4" fill="#2f6f4f">MOR：base + log；COW：仅 base（log 恒空）</text>

  <rect x="66" y="244" width="358" height="42" rx="9" fill="#f0f6f2" stroke="#d3e6d8"/><text x="80" y="264" font-size="9" font-weight="600" fill="#2f6f4f">FileSlice（baseInstant=c0，旧版本）</text><text x="80" y="278" font-size="8.2" fill="#6e9a7c">历史版本：供时间旅行/回滚，cleaning 回收</text>
  <text x="66" y="306" font-size="8.6" fill="#2f6f4f">TreeMap&lt;String, FileSlice&gt; 按 base instant 排序，新在前</text>
  <text x="66" y="326" font-size="8.6" fill="#2f6f4f">addBaseFile 建/更新 slice · addLogFile 附到对应 base instant</text>

  <!-- FileGroup B -->
  <rect x="456" y="102" width="380" height="246" rx="12" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="472" y="124" font-size="10" font-weight="600" fill="#12402a">FileGroup B（fileId = b7）</text>
  <text x="472" y="140" font-size="8.4" fill="#2f6f4f">索引把某批记录键绑定到 b7 → 后续更新都进此组</text>
  <rect x="472" y="150" width="348" height="60" rx="9" fill="#e6f7ee" stroke="#bfe0cd"/><text x="646" y="176" font-size="9" text-anchor="middle" font-weight="600" fill="#12402a">FileSlice（base + log …）</text><text x="646" y="194" font-size="8.2" text-anchor="middle" fill="#2f6f4f">每 commit 产一个 slice（版本）</text>
  <rect x="472" y="220" width="348" height="112" rx="9" fill="#fff" stroke="#cfe6d5"/>
  <text x="486" y="242" font-size="9.6" font-weight="600" fill="#12402a">为什么这样分层</text>
  <text x="486" y="262" font-size="8.8" fill="#2f6f4f">· fileId 稳定 → 同批键更新总落同组（索引落点）</text>
  <text x="486" y="281" font-size="8.8" fill="#2f6f4f">· slice 按 commit → 每次写产可回滚/可对比版本</text>
  <text x="486" y="300" font-size="8.8" fill="#2f6f4f">· base+log → COW/MOR 用同一套布局表达取舍</text>
  <text x="486" y="319" font-size="8.8" fill="#2f6f4f">· COW 每次产新 slice；MOR 在当前 slice 追加 log</text>

  <text x="30" y="392" font-size="9" fill="#6e6e73">索引把"记录键"映射到 FileGroup；写产生新 FileSlice；读按 slice 合并 base+log。命名/分区/bootstrap 深化见【文件布局】。</text>
</svg>
