<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="880" height="420" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">写 handle：CREATE / MERGE / APPEND + marker</text>
  <text x="30" y="49" font-size="10" fill="#a1a1a6">路由后按表类型 + bucket 选 handle；每 handle 写前建 marker 供失败回滚</text>

  <g font-size="10.5">
    <rect x="30" y="72" width="266" height="150" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
    <text x="46" y="94" font-weight="700" fill="#12402a">HoodieCreateHandle</text>
    <text x="46" y="112" font-size="9" fill="#2f6f4f">COW 新建 · IOType = CREATE</text>
    <rect x="44" y="124" width="238" height="82" rx="9" fill="#fff" stroke="#bfe0cd"/><text x="163" y="150" font-size="9.3" text-anchor="middle" fill="#12402a">新 file group 写全新 base</text><text x="163" y="172" font-size="8.6" text-anchor="middle" fill="#2f6f4f">INSERT bucket 到新文件</text><text x="163" y="192" font-size="8.6" text-anchor="middle" fill="#a1a1a6">无已有数据可合并</text>

    <rect x="306" y="72" width="268" height="150" rx="12" fill="#e6f7ee" stroke="#bfe0cd" filter="url(#soft)"/>
    <text x="322" y="94" font-weight="700" fill="#12402a">HoodieWriteMergeHandle</text>
    <text x="322" y="112" font-size="9" fill="#2f6f4f">COW 更新 · IOType = MERGE</text>
    <rect x="320" y="124" width="240" height="82" rx="9" fill="#fff" stroke="#bfe0cd"/><text x="440" y="148" font-size="9.3" text-anchor="middle" fill="#12402a">逐行合并到已有 base</text><text x="440" y="168" font-size="8.6" text-anchor="middle" fill="#2f6f4f">rec1_1 + rec1_2 → rec1_2</text><text x="440" y="190" font-size="8.6" text-anchor="middle" fill="#7a2a2a">重写整文件产新版本（写慢根源）</text>

    <rect x="584" y="72" width="266" height="150" rx="12" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
    <text x="600" y="94" font-weight="700" fill="#5a3410">HoodieAppendHandle</text>
    <text x="600" y="112" font-size="9" fill="#93762e">MOR · IOType = APPEND</text>
    <rect x="598" y="124" width="238" height="82" rx="9" fill="#fff" stroke="#efdcb4"/><text x="717" y="148" font-size="9.3" text-anchor="middle" fill="#5a3410">追加到 log 文件（block）</text><text x="717" y="168" font-size="8.6" text-anchor="middle" fill="#93762e">writeRecord 判更新/删除</text><text x="717" y="190" font-size="8.6" text-anchor="middle" fill="#93762e">writeInsertAndUpdate 攒进 log block</text>
  </g>

  <!-- marker -->
  <rect x="30" y="248" width="820" height="146" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="270" font-size="11" font-weight="700" fill="#1d1d1f">marker 文件（HoodieWriteHandle.getIOType）</text>
  <text x="46" y="292" font-size="9.3" fill="#6e6e73">每个 handle 写前创建 marker，记"本次写产生了哪些文件 + 什么 IOType（CREATE/MERGE/APPEND）"。</text>
  <g font-size="9.3">
    <rect x="46" y="306" width="390" height="72" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="60" y="328" font-weight="600" fill="#12402a">正常提交</text><text x="60" y="348" fill="#2f6f4f">写完 → 校验 → commit；marker 完成使命</text><text x="60" y="366" fill="#2f6f4f">数据随 instant 转 COMPLETED 可见</text>
    <rect x="450" y="306" width="400" height="72" rx="10" fill="#fbeaea" stroke="#e7c3c3"/><text x="464" y="328" font-weight="600" fill="#4a1414">中途崩溃</text><text x="464" y="348" fill="#7a2a2a">rollback 按 marker 精确删除部分写的孤儿文件</text><text x="464" y="366" fill="#7a2a2a">不留脏文件污染表（详见【并发控制与元数据】）</text>
  </g>
</svg>
