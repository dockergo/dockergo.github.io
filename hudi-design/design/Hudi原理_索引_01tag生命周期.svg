<svg xmlns="http://www.w3.org/2000/svg" width="880" height="410" viewBox="0 0 880 410" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="880" height="410" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">tagLocation：索引在 upsert 里的两次交互</text>
  <text x="30" y="49" font-size="10" fill="#a1a1a6">索引维护"记录键 → 文件组位置"映射，把"要不要 join 全表"变成"查一次索引"</text>

  <!-- index map (center) -->
  <rect x="330" y="72" width="220" height="150" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="440" y="94" font-size="10.5" text-anchor="middle" font-weight="700" fill="#3d2a5a">索引：键 → 位置</text>
  <g font-size="8.6" text-anchor="middle">
    <rect x="346" y="104" width="188" height="24" rx="6" fill="#faf4fb" stroke="#e2d2ee"/><text x="440" y="120" fill="#3d2a5a">k1 → (part=cn, fileId=a1)</text>
    <rect x="346" y="132" width="188" height="24" rx="6" fill="#faf4fb" stroke="#e2d2ee"/><text x="440" y="148" fill="#3d2a5a">k2 → (part=cn, fileId=b7)</text>
    <rect x="346" y="160" width="188" height="24" rx="6" fill="#faf4fb" stroke="#e2d2ee"/><text x="440" y="176" fill="#3d2a5a">k9 → 未命中（新键）</text>
  </g>
  <text x="440" y="208" font-size="8.4" text-anchor="middle" fill="#7a5a95">HoodieRecordLocation = fileId + instant</text>

  <!-- write-before tag -->
  <rect x="30" y="82" width="240" height="70" rx="11" fill="#fff7e6" stroke="#e8cf9a"/><text x="150" y="106" font-size="10" text-anchor="middle" font-weight="700" fill="#5a3410">① 写前 tagLocation</text><text x="150" y="126" font-size="8.6" text-anchor="middle" fill="#93762e">给每条 incoming 记录查位置</text><text x="150" y="142" font-size="8.6" text-anchor="middle" fill="#93762e">UPSERT/DELETE 必须先 tag</text>
  <line x1="270" y1="117" x2="330" y2="130" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- write-after update -->
  <rect x="610" y="82" width="240" height="70" rx="11" fill="#eef3fb" stroke="#bcd0ec"/><text x="730" y="106" font-size="10" text-anchor="middle" font-weight="700" fill="#1b2a4a">② 写后 updateLocation</text><text x="730" y="126" font-size="8.6" text-anchor="middle" fill="#274a78">把这批的最终位置回写索引</text><text x="730" y="142" font-size="8.6" text-anchor="middle" fill="#274a78">下次 upsert 能查到</text>
  <line x1="550" y1="130" x2="610" y2="117" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- routing outcome -->
  <rect x="30" y="248" width="820" height="146" rx="12" fill="#f6f8fc" stroke="#dbe6f4"/>
  <text x="46" y="270" font-size="10.5" font-weight="700" fill="#1b2a4a">tag 结果直接喂给 bucket 路由</text>
  <g font-size="9.3">
    <rect x="46" y="284" width="390" height="94" rx="10" fill="#e6f7ee" stroke="#bfe0cd"/><text x="60" y="306" font-weight="600" fill="#12402a">命中（带位置）→ UPDATE bucket</text><text x="60" y="328" fill="#2f6f4f">路由到 k1 所在的 file group（a1）</text><text x="60" y="346" fill="#2f6f4f">在其现有文件组内做更新</text><text x="60" y="366" fill="#6e9a7c">免全表扫 —— 高效 upsert 的地基</text>
    <rect x="450" y="284" width="400" height="94" rx="10" fill="#faf4fb" stroke="#e2d2ee"/><text x="464" y="306" font-weight="600" fill="#3d2a5a">未命中 → INSERT bucket</text><text x="464" y="328" fill="#7a5a95">k9 去新 / 未满小文件（SmallFile 塞入）</text><text x="464" y="346" fill="#7a5a95">写后 updateLocation 把 k9 的位置登记</text><text x="464" y="366" fill="#a98bbd">下次更新 k9 就能命中</text>
  </g>
</svg>
