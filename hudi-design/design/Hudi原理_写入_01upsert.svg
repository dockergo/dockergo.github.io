<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="880" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">upsert 生命周期：开 instant → tag → 路由 → 写 → 提交</text>
  <text x="30" y="49" font-size="10" fill="#a1a1a6">BaseHoodieWriteClient.upsert；两阶段 instant（inflight→completed）保证原子</text>

  <g font-size="10">
    <rect x="40" y="76" width="800" height="58" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
    <text x="56" y="100" font-weight="700" fill="#5a3410">① startCommit 开 instant（inflight）</text>
    <text x="56" y="120" font-size="9" fill="#93762e">在时间线分配 instant time；preWrite 预处理（去重/合并小文件准备）</text>

    <rect x="40" y="146" width="800" height="58" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
    <text x="56" y="170" font-weight="700" fill="#3d2a5a">② 索引 tagLocation：标出每条记录的已有位置</text>
    <text x="56" y="190" font-size="9" fill="#7a5a95">命中键→带上 HoodieRecordLocation（fileId+instant）；未命中→标为待插入（细节见【索引】）</text>

    <rect x="40" y="216" width="800" height="58" rx="11" fill="#f6f8fc" stroke="#cfe0f2" filter="url(#soft)"/>
    <text x="56" y="240" font-weight="700" fill="#274a78">③ bucket 路由：UPDATE / INSERT</text>
    <text x="56" y="260" font-size="9" fill="#5b7db1">已 tag→UPDATE bucket（到现有文件组）；未 tag→INSERT bucket，SmallFile 塞进未满小文件</text>

    <rect x="40" y="286" width="800" height="58" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
    <text x="56" y="310" font-weight="700" fill="#12402a">④ 写 handle：COW 重写 / MOR 追加 log</text>
    <text x="56" y="330" font-size="9" fill="#2f6f4f">CreateHandle（新建）/ MergeHandle（COW 重写）/ AppendHandle（MOR 追加）；写前建 marker</text>

    <rect x="40" y="356" width="800" height="58" rx="11" fill="#e7f0fb" stroke="#b9d2ef" filter="url(#soft)"/>
    <text x="56" y="380" font-weight="700" fill="#1b2a4a">⑤ 提交：updateLocation 回写索引 → instant 转 COMPLETED</text>
    <text x="56" y="400" font-size="9" fill="#5b7db1">此刻新数据才对读可见；中途崩溃无 completed，可回滚（按 marker 清孤儿）</text>
  </g>
  <line x1="440" y1="134" x2="440" y2="146" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="440" y1="204" x2="440" y2="216" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="440" y1="274" x2="440" y2="286" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="440" y1="344" x2="440" y2="356" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
</svg>
