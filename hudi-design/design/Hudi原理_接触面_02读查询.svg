<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="880" height="420" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">读：三种查询类型（HoodieTableQueryType）</text>
  <text x="30" y="49" font-size="10" fill="#a1a1a6">引擎的 Hudi relation 按查询类型选读法；"要最新还是要快"的取舍</text>

  <!-- source: base + log -->
  <rect x="30" y="72" width="200" height="316" rx="12" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="46" y="94" font-size="10.5" font-weight="600" fill="#5a3410">一个 MOR 文件片</text>
  <rect x="46" y="106" width="168" height="60" rx="9" fill="#fef2e0" stroke="#e8cf9a"/><text x="130" y="132" font-size="9.5" text-anchor="middle" font-weight="600" fill="#5a3410">base 文件</text><text x="130" y="150" font-size="8.6" text-anchor="middle" fill="#93762e">parquet（最近 compaction）</text>
  <rect x="46" y="176" width="168" height="30" rx="8" fill="#fdf3e2" stroke="#efdcb4"/><text x="130" y="196" font-size="8.6" text-anchor="middle" fill="#93762e">log 1（后续 upsert）</text>
  <rect x="46" y="212" width="168" height="30" rx="8" fill="#fdf3e2" stroke="#efdcb4"/><text x="130" y="232" font-size="8.6" text-anchor="middle" fill="#93762e">log 2（更近的 upsert）</text>
  <rect x="46" y="248" width="168" height="30" rx="8" fill="#fbeaea" stroke="#e7c3c3"/><text x="130" y="268" font-size="8.6" text-anchor="middle" fill="#7a2a2a">log 3（delete block）</text>
  <text x="130" y="300" font-size="8.6" text-anchor="middle" fill="#a1a1a6">越往下 instant 越新</text>

  <!-- three query types -->
  <g font-size="10.5">
    <rect x="262" y="72" width="588" height="94" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="278" y="94" font-weight="700" fill="#1b2a4a">快照查（SNAPSHOT）· 默认、最全</text><text x="278" y="116" font-size="9.3" fill="#274a78">读最新一致视图：COW 直接读 base；MOR 用 HoodieMergedLogRecordReader 合并 base + 所有 log。</text><text x="278" y="136" font-size="9.3" fill="#274a78">最新最全，读最慢（要合并）。</text><text x="278" y="156" font-size="8.8" fill="#5b7db1">→ 要看到刚写入的最新值时用</text>

    <rect x="262" y="178" width="588" height="94" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="278" y="200" font-weight="700" fill="#12402a">读优化查（READ_OPTIMIZED）· 快、略旧</text><text x="278" y="222" font-size="9.3" fill="#2f6f4f">仅读 base 文件，不合并 log；MOR slice 只暴露 baseFile。</text><text x="278" y="242" font-size="9.3" fill="#2f6f4f">快（无合并），但看不到最后一次 compaction 之后的 log 增量（略旧）。</text><text x="278" y="262" font-size="8.8" fill="#2f6f4f">→ 容忍略旧、要低延迟查询时用；compaction 越勤越新</text>

    <rect x="262" y="284" width="588" height="94" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/><text x="278" y="306" font-weight="700" fill="#3d2a5a">增量查（INCREMENTAL）· 只拿变更</text><text x="278" y="328" font-size="9.3" fill="#7a5a95">读两个 instant 之间提交的变更（InstantRange 穿进 log reader）。</text><text x="278" y="348" font-size="9.3" fill="#7a5a95">时间线驱动，只返回区间内改动的记录。</text><text x="278" y="368" font-size="8.8" fill="#7a5a95">→ 流式 / CDC 下游增量消费时用</text>
  </g>

  <line x1="230" y1="120" x2="262" y2="119" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="230" y1="150" x2="262" y2="225" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="230" y1="230" x2="262" y2="331" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
</svg>
