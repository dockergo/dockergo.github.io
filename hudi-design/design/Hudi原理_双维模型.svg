<svg xmlns="http://www.w3.org/2000/svg" width="900" height="440" viewBox="0 0 900 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="900" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">双维模型：能力域 × 执行时机</text>
  <text x="30" y="49" font-size="10" fill="#a1a1a6">每条主线在"属于哪个能力域 / 前台还是后台跑"两维上归位</text>

  <!-- axes -->
  <text x="30" y="90" font-size="11" font-weight="600" fill="#6e6e73" transform="rotate(-90 30 90)"></text>
  <line x1="150" y1="72" x2="150" y2="400" stroke="#d2d2d7" stroke-width="1.2"/>
  <line x1="150" y1="400" x2="860" y2="400" stroke="#d2d2d7" stroke-width="1.2"/>
  <text x="505" y="428" font-size="10.5" font-weight="600" text-anchor="middle" fill="#6e6e73">执行时机 →　前台（写 / 读，同步）　·　后台（异步维护）</text>
  <text x="90" y="240" font-size="10.5" font-weight="600" text-anchor="middle" fill="#6e6e73" transform="rotate(-90 90 240)">能力域 ↑</text>

  <!-- 前台列 -->
  <rect x="164" y="80" width="360" height="304" rx="12" fill="#f6f8fc" stroke="#e4ecf6"/>
  <text x="180" y="100" font-size="10.5" font-weight="600" fill="#274a78">前台（计算引擎同步调用）</text>
  <!-- 后台列 -->
  <rect x="536" y="80" width="316" height="304" rx="12" fill="#faf4fb" stroke="#eadff2"/>
  <text x="552" y="100" font-size="10.5" font-weight="600" fill="#5a3d78">后台（表服务异步）</text>

  <g font-size="9.5" text-anchor="middle">
    <!-- 接触面 -->
    <rect x="180" y="112" width="328" height="34" rx="8" fill="#f4eefb" stroke="#d9c7ec"/><text x="344" y="127" font-weight="600" fill="#3d2a5a">接触面 · 表读写 API</text><text x="344" y="140" fill="#7a5a95" font-size="8.5">upsert/insert/delete · 快照/读优化/增量查</text>
    <!-- 写侧 -->
    <rect x="180" y="152" width="106" height="52" rx="8" fill="#fff7e6" stroke="#e8cf9a"/><text x="233" y="172" font-weight="600" fill="#5a3410">写入路径</text><text x="233" y="186" fill="#93762e" font-size="8.3">与 upsert</text>
    <rect x="291" y="152" width="106" height="52" rx="8" fill="#f4eefb" stroke="#d9c7ec"/><text x="344" y="172" font-weight="600" fill="#3d2a5a">索引</text><text x="344" y="186" fill="#7a5a95" font-size="8.3">键→文件组</text>
    <rect x="402" y="152" width="106" height="52" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="455" y="172" font-weight="600" fill="#1b2a4a">MoR 读合并</text><text x="455" y="186" fill="#5b7db1" font-size="8.3">base+log</text>
    <!-- 存储层 -->
    <rect x="180" y="212" width="163" height="44" rx="8" fill="#f5faf6" stroke="#cfe6d5"/><text x="261" y="230" font-weight="600" fill="#12402a">文件布局</text><text x="261" y="243" fill="#2f6f4f" font-size="8.3">FileGroup/Slice</text>
    <rect x="345" y="212" width="163" height="44" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="426" y="230" font-weight="600" fill="#5a3410">表类型 COW/MOR</text><text x="426" y="243" fill="#93762e" font-size="8.3">写读代价取舍</text>
    <!-- 核心时间线 (跨前后台) -->
    <rect x="180" y="292" width="328" height="46" rx="8" fill="#e7f0fb" stroke="#b9d2ef"/><text x="344" y="312" font-weight="600" fill="#1b2a4a">时间线（核心 · 灵魂）</text><text x="344" y="326" fill="#5b7db1" font-size="8.3">所有动作定序 · 前后台共同真相</text>

    <!-- 后台 -->
    <rect x="552" y="152" width="284" height="52" rx="8" fill="#faf4fb" stroke="#e2d2ee"/><text x="694" y="172" font-weight="600" fill="#5a3d78">表服务</text><text x="694" y="186" fill="#7a5a95" font-size="8.3">compaction / cleaning / clustering</text>
    <rect x="552" y="212" width="284" height="52" rx="8" fill="#f7f2fb" stroke="#ddd0ec"/><text x="694" y="232" font-weight="600" fill="#4a2f78">并发控制与元数据</text><text x="694" y="246" fill="#6e4f95" font-size="8.3">OCC/锁 · metadata table · catalog</text>
    <rect x="552" y="292" width="284" height="46" rx="8" fill="#fff" stroke="#e2d2ee"/><text x="694" y="312" fill="#7a5a95" font-size="8.5">后台维护不阻塞前台写</text><text x="694" y="326" fill="#a1a1a6" font-size="8.3">服务动作也记在时间线</text>
  </g>
  <line x1="508" y1="315" x2="552" y2="315" stroke="#c7c7cc" stroke-width="1.2" stroke-dasharray="4 3"/>
</svg>
