<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="880" height="420" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">并发控制：OCC + 锁 + marker</text>
  <text x="30" y="49" font-size="10" fill="#a1a1a6">乐观并发：假设冲突少，提交前才检测"是否改了同一文件组"</text>

  <!-- two writers -->
  <rect x="30" y="70" width="240" height="60" rx="11" fill="#fff7e6" stroke="#e8cf9a"/><text x="150" y="94" font-size="10" text-anchor="middle" font-weight="600" fill="#5a3410">Writer A（Spark 批）</text><text x="150" y="114" font-size="8.4" text-anchor="middle" fill="#93762e">改 (cn, fileId=a1)</text>
  <rect x="610" y="70" width="240" height="60" rx="11" fill="#f4eefb" stroke="#d9c7ec"/><text x="730" y="94" font-size="10" text-anchor="middle" font-weight="600" fill="#3d2a5a">Writer B（Flink 流）</text><text x="730" y="114" font-size="8.4" text-anchor="middle" fill="#7a5a95">改 (cn, fileId=b7)</text>

  <!-- transaction manager -->
  <rect x="300" y="70" width="280" height="120" rx="12" fill="#f7f2fb" stroke="#ddd0ec" filter="url(#soft)"/>
  <text x="440" y="92" font-size="10.5" text-anchor="middle" font-weight="700" fill="#4a2f78">TransactionManager</text>
  <text x="440" y="112" font-size="8.6" text-anchor="middle" fill="#6e4f95">beginStateChange / endStateChange</text>
  <rect x="316" y="122" width="248" height="26" rx="7" fill="#f4eefb" stroke="#e2d2ee"/><text x="440" y="140" font-size="8.4" text-anchor="middle" fill="#4a2f78">经 LockManager 获取/释放锁（提交临界区）</text>
  <rect x="316" y="152" width="248" height="30" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="440" y="171" font-size="8.2" text-anchor="middle" fill="#274a78">锁 provider：InProcess / ZK / DynamoDB / HMS</text>
  <line x1="270" y1="100" x2="300" y2="110" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="610" y1="100" x2="580" y2="110" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- conflict detection -->
  <rect x="30" y="210" width="500" height="130" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="232" font-size="10.5" font-weight="700" fill="#1b2a4a">冲突检测：resolveWriteConflict</text>
  <text x="46" y="252" font-size="9" fill="#274a78">SimpleConcurrentFileWritesConflictResolutionStrategy</text>
  <text x="46" y="270" font-size="9" fill="#274a78">.hasConflict = 两次写改动的 (partition, fileId) 对交集</text>
  <rect x="46" y="282" width="228" height="44" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="160" y="302" font-size="8.6" text-anchor="middle" fill="#12402a">{a1} ∩ {b7} = ∅</text><text x="160" y="318" font-size="8.4" text-anchor="middle" fill="#2f6f4f">不冲突 → 都可提交</text>
  <rect x="286" y="282" width="228" height="44" rx="8" fill="#fbeaea" stroke="#e7c3c3"/><text x="400" y="302" font-size="8.6" text-anchor="middle" fill="#4a1414">交集非空（同改 a1）</text><text x="400" y="318" font-size="8.4" text-anchor="middle" fill="#7a2a2a">冲突 → 后者失败重试</text>

  <!-- modes + marker -->
  <rect x="550" y="210" width="300" height="130" rx="12" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="566" y="232" font-size="10.5" font-weight="700" fill="#12402a">并发模式 &amp; marker</text>
  <text x="566" y="252" font-size="8.6" fill="#2f6f4f">WriteConcurrencyMode：</text>
  <text x="566" y="270" font-size="8.4" fill="#2f6f4f">· SINGLE_WRITER（无锁开销）</text>
  <text x="566" y="286" font-size="8.4" fill="#2f6f4f">· OPTIMISTIC_CONCURRENCY_CONTROL</text>
  <text x="566" y="302" font-size="8.4" fill="#2f6f4f">· NON_BLOCKING（NBCC，仅 MOR，延到 compaction）</text>
  <text x="566" y="324" font-size="8.4" fill="#6e9a7c">marker（DIRECT / TIMELINE_SERVER_BASED）标写产物，失败回滚清孤儿</text>

  <rect x="30" y="356" width="820" height="46" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="384" font-size="8.9" fill="#6e6e73">为什么 OCC：多引擎写悲观锁跨引擎难协调、开销大；OCC 假设冲突罕见，只在提交时用 (partition,fileId) 交集轻量检测——真改同一文件组才失败。</text>
</svg>
