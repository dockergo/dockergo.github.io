<svg xmlns="http://www.w3.org/2000/svg" width="880" height="410" viewBox="0 0 880 410" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="880" height="410" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">索引接口在写路径中的位置（概览）</text>
  <text x="30" y="49" font-size="10" fill="#a1a1a6">写路径通过 HoodieIndex 两个接口与索引交互；类型/作用域机制见【索引】</text>

  <!-- write flow with index touch points -->
  <rect x="30" y="72" width="180" height="70" rx="11" fill="#fff7e6" stroke="#e8cf9a"/><text x="120" y="102" font-size="10" text-anchor="middle" font-weight="600" fill="#5a3410">incoming 记录</text><text x="120" y="122" font-size="8.6" text-anchor="middle" fill="#93762e">待 upsert 的一批</text>

  <rect x="270" y="72" width="340" height="70" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/><text x="440" y="98" font-size="10.5" text-anchor="middle" font-weight="700" fill="#3d2a5a">写前 tagLocation（UPSERT/DELETE 必须）</text><text x="440" y="120" font-size="8.8" text-anchor="middle" fill="#7a5a95">标"更新（带位置）还是插入"，决定后续 bucket 路由</text>

  <rect x="670" y="72" width="180" height="70" rx="11" fill="#f6f8fc" stroke="#cfe0f2"/><text x="760" y="102" font-size="10" text-anchor="middle" font-weight="600" fill="#274a78">bucket 路由 / 写</text><text x="760" y="122" font-size="8.6" text-anchor="middle" fill="#5b7db1">UPDATE / INSERT</text>

  <line x1="210" y1="107" x2="270" y2="107" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="610" y1="107" x2="670" y2="107" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- writeStatuses back -->
  <rect x="270" y="176" width="340" height="64" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="440" y="202" font-size="10.5" text-anchor="middle" font-weight="700" fill="#1b2a4a">写后 updateLocation</text><text x="440" y="224" font-size="8.8" text-anchor="middle" fill="#274a78">回写最终位置；Bloom 等隐式索引可 no-op，record_index 更新元数据表</text>
  <line x1="760" y1="142" x2="760" y2="208" stroke="#c7c7cc" stroke-width="1.2" fill="none"/>
  <line x1="760" y1="208" x2="610" y2="208" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- capability flags -->
  <rect x="30" y="272" width="820" height="112" rx="12" fill="#faf4fb" stroke="#e2d2ee"/>
  <text x="46" y="294" font-size="10.5" font-weight="700" fill="#3d2a5a">索引能力 flag 驱动路由决策（HoodieIndex）</text>
  <g font-size="9">
    <rect x="46" y="306" width="256" height="66" rx="9" fill="#f7f2fb" stroke="#ddd0ec"/><text x="174" y="326" text-anchor="middle" font-weight="600" fill="#4a2f78">isGlobal</text><text x="60" y="346" fill="#6e4f95">跨分区唯一 vs 分区内唯一</text><text x="60" y="362" fill="#6e4f95">决定查找范围</text>
    <rect x="312" y="306" width="256" height="66" rx="9" fill="#f7f2fb" stroke="#ddd0ec"/><text x="440" y="326" text-anchor="middle" font-weight="600" fill="#4a2f78">canIndexLogFiles</text><text x="326" y="346" fill="#6e4f95">MOR 下可否把插入直送 log</text><text x="326" y="362" fill="#6e4f95">提写吞吐</text>
    <rect x="578" y="306" width="256" height="66" rx="9" fill="#f7f2fb" stroke="#ddd0ec"/><text x="706" y="326" text-anchor="middle" font-weight="600" fill="#4a2f78">isImplicitWithStorage</text><text x="592" y="346" fill="#6e4f95">索引信息是否本就在数据文件里</text><text x="592" y="362" fill="#6e4f95">（如 Bloom）</text>
  </g>
</svg>
