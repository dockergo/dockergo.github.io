<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Flink 调度 · slot 与 slot sharing</text>
  <text x="30" y="50" font-size="11" fill="#a1a1a6">slot 是 TaskManager 的资源单位;slot sharing 让一条流水线的算子子任务共享一个 slot</text>

  <!-- TaskManager 容器 -->
  <rect x="40" y="76" width="640" height="418" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="62" y="103" font-size="13" font-weight="700" fill="#5a3410">TaskManager(一个 TM 有多个 slot)</text>
  <text x="62" y="124" font-size="10" fill="#93762e">taskmanager.numberOfTaskSlots 通常 = CPU 核数</text>

  <!-- slot 0 -->
  <rect x="62" y="138" width="290" height="336" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="80" y="163" font-size="12" font-weight="600" fill="#5a3410">slot 0(一条流水线挤一个 slot)</text>
  <rect x="82" y="176" width="250" height="76" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="207" y="202" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">source[0]</text>
  <text x="207" y="222" font-size="9.5" fill="#5b7db1" text-anchor="middle">读源</text>
  <path d="M 207,252 L 207,268" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <rect x="82" y="270" width="250" height="76" rx="10" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="207" y="296" font-size="11" font-weight="600" fill="#12402a" text-anchor="middle">map[0]</text>
  <text x="207" y="316" font-size="9.5" fill="#2f6f4f" text-anchor="middle">转换</text>
  <path d="M 207,346 L 207,362" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <rect x="82" y="364" width="250" height="76" rx="10" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="207" y="390" font-size="11" font-weight="600" fill="#3d2a5a" text-anchor="middle">sink[0]</text>
  <text x="207" y="410" font-size="9.5" fill="#7a5c9e" text-anchor="middle">写出</text>

  <!-- slot 1 -->
  <rect x="368" y="138" width="290" height="336" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="386" y="163" font-size="12" font-weight="600" fill="#5a3410">slot 1(同组另一并行实例)</text>
  <rect x="388" y="176" width="250" height="76" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="513" y="202" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">source[1]</text>
  <text x="513" y="222" font-size="9.5" fill="#5b7db1" text-anchor="middle">读源</text>
  <path d="M 513,252 L 513,268" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <rect x="388" y="270" width="250" height="76" rx="10" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="513" y="296" font-size="11" font-weight="600" fill="#12402a" text-anchor="middle">map[1]</text>
  <text x="513" y="316" font-size="9.5" fill="#2f6f4f" text-anchor="middle">转换</text>
  <path d="M 513,346 L 513,362" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <rect x="388" y="364" width="250" height="76" rx="10" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="513" y="390" font-size="11" font-weight="600" fill="#3d2a5a" text-anchor="middle">sink[1]</text>
  <text x="513" y="410" font-size="9.5" fill="#7a5c9e" text-anchor="middle">写出</text>

  <!-- 右侧说明 -->
  <rect x="700" y="76" width="340" height="196" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="722" y="104" font-size="13" font-weight="700" fill="#1b2a4a">SlotSharingGroup</text>
  <text x="722" y="128" font-size="10.5" fill="#5b7db1">默认所有算子在一个共享组</text>
  <text x="722" y="151" font-size="10.5" fill="#5b7db1">同组不同算子的子任务共享一个 slot</text>
  <text x="722" y="174" font-size="10.5" fill="#5b7db1">source→map→sink 各实例挤进同一 slot</text>
  <text x="722" y="197" font-size="10.5" fill="#5b7db1">既省资源,又让数据本地流转</text>
  <text x="722" y="224" font-size="10" fill="#5b7db1">需隔离时可拆组;自适应用</text>
  <text x="722" y="242" font-size="10" fill="#5b7db1">SlotSharingSlotAllocator</text>

  <rect x="700" y="288" width="340" height="206" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="722" y="316" font-size="13" font-weight="700" fill="#12402a">关键结论</text>
  <text x="722" y="342" font-size="11" font-weight="600" fill="#12402a">作业所需 slot 数</text>
  <text x="722" y="366" font-size="11" fill="#2f6f4f">≈ 最大算子并行度</text>
  <text x="722" y="390" font-size="11" fill="#2f6f4f">而非所有算子并行度之和</text>
  <rect x="722" y="404" width="296" height="72" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="738" y="428" font-size="10" fill="#2f6f4f">例：source/map/sink 并行度均 2</text>
  <text x="738" y="448" font-size="10" fill="#2f6f4f">→ 仅需 2 个 slot(非 2+2+2=6)</text>
  <text x="738" y="468" font-size="9.5" fill="#a1a1a6">重算子(大状态/CPU 密集)可拆组避争抢</text>
</svg>
