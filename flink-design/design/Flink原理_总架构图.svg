<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="600" viewBox="0 0 1080 600" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="aHot" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="aState" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c99a3a"/></marker>
    <marker id="aCtl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#5b7db1"/></marker>
  </defs>
  <rect width="1080" height="600" fill="#fbfbfd"/>

  <!-- ===== 标题带 ===== -->
  <text x="30" y="28" font-size="14" font-weight="600" fill="#1d1d1f">Flink 总架构 · 多视角透视：控制面 JobManager 只调度，数据面 TaskManager 跑算子</text>
  <text x="30" y="45" font-size="10.5" fill="#6e6e73">编译脊：StreamGraph → JobGraph → ExecutionGraph；运行时 mailbox 单线程算子 + credit 网络交换 + 分布式快照容错　源码基准 Flink 1.20</text>

  <!-- ===== 图例：三型语义路径 ===== -->
  <line x1="40" y1="64" x2="70" y2="64" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aHot)"/>
  <text x="76" y="68" font-size="10.5" fill="#3a3a3c">记录数据流 Hot</text>
  <line x1="196" y1="64" x2="226" y2="64" stroke="#c99a3a" stroke-width="1.8" marker-end="url(#aState)"/>
  <text x="232" y="68" font-size="10.5" fill="#3a3a3c">检查点快照 State（barrier→算子异步快照）</text>
  <line x1="536" y1="64" x2="566" y2="64" stroke="#5b7db1" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aCtl)"/>
  <text x="572" y="68" font-size="10.5" fill="#3a3a3c">调度 / 反压 Control（部署·slot·credit 背压）</text>
  <text x="1056" y="68" font-size="10" fill="#a1a1a6" text-anchor="end">框 = 主线可下钻</text>

  <!-- ===== 接触面 · 编程 API ===== -->
  <rect x="24" y="82" width="1032" height="54" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)" data-tid="api" data-lab="编程 API"/>
  <text x="40" y="103" font-size="11.5" font-weight="600" fill="#5a3d78">接触面 · 编程 API（多 API 汇入统一管线）</text>
  <text x="40" y="120" font-size="9" fill="#8a6db0">DataStream 命令式 · Table/SQL 声明式（Calcite）</text>
  <g text-anchor="middle" font-size="9.5">
    <rect x="560" y="94" width="234" height="32" rx="8" fill="#fff" stroke="#e2d2ee"/><text x="677" y="114" fill="#5a3d78">DataStream API · map/keyBy/window</text>
    <rect x="804" y="94" width="236" height="32" rx="8" fill="#fff" stroke="#e2d2ee"/><text x="922" y="114" fill="#5a3d78">Table / SQL · Calcite 声明式</text>
  </g>

  <!-- ===== 编译期 · 图变换 ===== -->
  <rect x="24" y="146" width="1032" height="70" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)" data-tid="graph" data-lab="图变换"/>
  <text x="40" y="166" font-size="11.5" font-weight="600" fill="#1b2a4a">编译期 · 图变换（两 API 汇入同一物理管线）</text>
  <g text-anchor="middle" font-size="9.5">
    <rect x="40" y="176" width="316" height="32" rx="8" fill="#fff" stroke="#cfe0f2"/><text x="198" y="196" fill="#274a78"><tspan font-weight="600">StreamGraph</tspan> · 逻辑 DAG</text>
    <rect x="384" y="176" width="316" height="32" rx="8" fill="#fff" stroke="#cfe0f2"/><text x="542" y="196" fill="#274a78"><tspan font-weight="600">JobGraph</tspan> · 算子链化</text>
    <rect x="728" y="176" width="312" height="32" rx="8" fill="#fff" stroke="#cfe0f2"/><text x="884" y="196" fill="#274a78"><tspan font-weight="600">ExecutionGraph</tspan> · 并行展开</text>
  </g>
  <line x1="356" y1="192" x2="384" y2="192" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aHot)"/>
  <line x1="700" y1="192" x2="728" y2="192" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aHot)"/>

  <!-- ===== 控制面 · JobManager ===== -->
  <rect x="24" y="226" width="1032" height="104" rx="14" fill="#eafaf1" stroke="#b8e6cd" filter="url(#soft)"/>
  <text x="40" y="246" font-size="11.5" font-weight="600" fill="#1c6b45">控制面 · JobManager（只调度协调 · 不碰数据）</text>
  <g text-anchor="middle" font-size="10">
    <rect x="40" y="258" width="316" height="60" rx="9" fill="#fff" stroke="#b8e6cd" data-tid="sched" data-lab="JobMaster"/><text x="198" y="285" fill="#1c6b45" font-weight="600">JobMaster</text><text x="198" y="303" fill="#3a9b6e" font-size="9">单作业领导 · 驱动调度部署</text>
    <rect x="384" y="258" width="316" height="60" rx="9" fill="#fff" stroke="#b8e6cd" data-tid="sched" data-lab="ResourceManager"/><text x="542" y="285" fill="#1c6b45" font-weight="600">ResourceManager + SlotManager</text><text x="542" y="303" fill="#3a9b6e" font-size="9">集群资源 · 分配 slot</text>
    <rect x="728" y="258" width="312" height="60" rx="9" fill="#e6f7ee" stroke="#a8dfc0" data-tid="ckpt" data-lab="CheckpointCoordinator"/><text x="884" y="285" fill="#1c6b45" font-weight="600">CheckpointCoordinator</text><text x="884" y="303" fill="#3a9b6e" font-size="9">定时触发分布式快照（容错灵魂）</text>
  </g>

  <!-- ===== 数据面 · TaskManager ===== -->
  <rect x="24" y="338" width="1032" height="162" rx="16" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="40" y="358" font-size="11.5" font-weight="600" fill="#5a3410">数据面 · TaskManager / TaskExecutor（跑算子 + shuffle · slot 为资源单位）</text>

  <rect x="40" y="368" width="480" height="84" rx="10" fill="#fef2e0" stroke="#e8cf9a" data-tid="task" data-lab="Slot · 算子链 + mailbox"/>
  <text x="54" y="387" font-size="9.5" font-weight="600" fill="#5a3410">Slot · 算子链 + mailbox 单线程（免加锁）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="54" y="396" width="140" height="26" rx="6" fill="#fff" stroke="#e8cf9a"/><text x="124" y="413" fill="#5a3410">source→map（链）</text>
    <rect x="202" y="396" width="130" height="26" rx="6" fill="#fff" stroke="#e8cf9a"/><text x="267" y="413" fill="#5a3410">keyBy 断链</text>
    <rect x="340" y="396" width="166" height="26" rx="6" fill="#fff" stroke="#e8cf9a"/><text x="423" y="413" fill="#5a3410">window→sink</text>
  </g>
  <text x="54" y="440" font-size="8.5" fill="#93762e">记录 / 检查点 / 定时器串行执行</text>

  <rect x="532" y="368" width="508" height="84" rx="10" fill="#fef2e0" stroke="#e8cf9a" data-tid="net" data-lab="网络与数据交换"/>
  <text x="546" y="387" font-size="9.5" font-weight="600" fill="#5a3410">网络与数据交换（链间 · 跨子任务 shuffle）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="546" y="396" width="240" height="26" rx="6" fill="#fff" stroke="#e8cf9a"/><text x="666" y="413" fill="#5a3410">ResultPartition → InputGate</text>
    <rect x="796" y="396" width="240" height="26" rx="6" fill="#fff" stroke="#e8cf9a"/><text x="916" y="413" fill="#5a3410">credit 流控 · 背压不阻 TCP</text>
  </g>
  <text x="546" y="440" font-size="8.5" fill="#93762e">检查点屏障随数据流注入并传播</text>

  <rect x="40" y="458" width="1000" height="34" rx="9" fill="#fff" stroke="#e8cf9a" data-tid="state" data-lab="状态后端"/>
  <text x="54" y="480" font-size="9.5" font-weight="600" fill="#5a3410">状态后端 State Backend · 按 key-group 分片（rescale 基础）<tspan fill="#93762e" font-weight="400" font-size="8.5">　HashMap 堆内（小状态低延迟） / RocksDB 盘（大状态 + 增量检查点）</tspan></text>

  <!-- ===== 外部系统 ===== -->
  <rect x="24" y="508" width="1032" height="48" rx="12" fill="#f4f2ee" stroke="#e3ddd2" stroke-dasharray="6 4"/>
  <text x="40" y="527" font-size="10.5" font-weight="600" fill="#6e6357">外部系统（非 Flink · 不管持久存储）</text>
  <g text-anchor="middle" font-size="8.8">
    <rect x="360" y="518" width="210" height="28" rx="7" fill="#fbf6ef" stroke="#e6d8c4"/><text x="465" y="536" fill="#5a3410">Source：Kafka / 文件 / CDC</text>
    <rect x="580" y="518" width="230" height="28" rx="7" fill="#fbf6ef" stroke="#e6d8c4"/><text x="695" y="536" fill="#5a3410">检查点存储：HDFS / S3</text>
    <rect x="820" y="518" width="220" height="28" rx="7" fill="#fbf6ef" stroke="#e6d8c4"/><text x="930" y="536" fill="#5a3410">Sink：Kafka / DB / 湖仓</text>
  </g>

  <!-- ===== 语义分型连线 ===== -->
  <!-- Hot：接触面 → 图变换 -->
  <line x1="200" y1="136" x2="200" y2="146" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aHot)"/>
  <!-- Control：图变换 → JobManager（提交 ExecutionGraph） -->
  <line x1="200" y1="216" x2="200" y2="226" stroke="#5b7db1" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aCtl)"/>
  <text x="208" y="223" font-size="8" fill="#5b7db1">提交 ExecutionGraph</text>
  <!-- Control：JobManager → 数据面（部署 task / 给 slot） -->
  <line x1="150" y1="330" x2="150" y2="338" stroke="#5b7db1" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aCtl)"/>
  <text x="158" y="337" font-size="8" fill="#5b7db1">部署 task</text>
  <line x1="500" y1="330" x2="500" y2="338" stroke="#5b7db1" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aCtl)"/>
  <text x="508" y="337" font-size="8" fill="#5b7db1">给 slot</text>
  <!-- State：CheckpointCoordinator → 数据面（触发屏障快照） -->
  <line x1="884" y1="330" x2="884" y2="338" stroke="#c99a3a" stroke-width="1.8" marker-end="url(#aState)"/>
  <text x="892" y="337" font-size="8" fill="#b0842f">触发屏障</text>
  <!-- Hot：Slot → 网络交换 -->
  <line x1="520" y1="410" x2="532" y2="410" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aHot)"/>
  <!-- State：Slot → 状态后端 -->
  <line x1="240" y1="452" x2="240" y2="458" stroke="#c99a3a" stroke-width="1.8" marker-end="url(#aState)"/>
  <!-- Hot：外部 Source → 数据面 / 数据面 → Sink -->
  <line x1="465" y1="508" x2="465" y2="500" stroke="#2f9e6e" stroke-width="1.6" marker-end="url(#aHot)"/>
  <line x1="930" y1="500" x2="930" y2="508" stroke="#2f9e6e" stroke-width="1.6" marker-end="url(#aHot)"/>

  <!-- ===== 读法 ===== -->
  <rect x="24" y="562" width="1032" height="30" rx="8" fill="#f7f7f9" stroke="#ececef"/>
  <text x="540" y="581" font-size="10" fill="#4a4a4f" text-anchor="middle">读法：API 编译成三层图 → JobManager 部署到 TaskManager 的 slot → 算子跑数据 + credit 网络交换；CheckpointBarrier 随流注入触发各算子异步快照（精确一次根基）</text>
</svg>
