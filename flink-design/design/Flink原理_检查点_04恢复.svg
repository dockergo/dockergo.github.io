<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Flink 原理 · 恢复与重分布（检查点 vs 保存点）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">StateAssignmentOperation 重分布:keyed 按 key-group 交集,operator 按 SPLIT/UNION/BROADCAST</text>

  <!-- StateAssignmentOperation -->
  <rect x="40" y="66" width="1000" height="44" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="60" y="88" font-size="10.5" font-weight="700" fill="#12402a">StateAssignmentOperation（恢复时重分布状态）</text>
  <text x="60" y="104" font-size="8.2" fill="#2f6f4f">reDistributeKeyedStates(keyed) + reDistributePartitionableStates(operator) · rescale 基础</text>

  <line x1="300" y1="110" x2="300" y2="130" stroke="#86868b" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="780" y1="110" x2="780" y2="130" stroke="#86868b" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- keyed redistribution -->
  <rect x="40" y="132" width="500" height="150" rx="13" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="56" y="154" font-size="10.5" font-weight="700" fill="#274a78">keyed 状态 · 按 key-group 交集</text>
  <text x="56" y="171" font-size="8.2" fill="#5b7db1">keyedStateHandle.getIntersection(range)</text>
  <text x="56" y="186" font-size="8" fill="#5b7db1">KeyGroupRange.getIntersection = [max(starts), min(ends)]</text>
  <!-- old ranges -->
  <g text-anchor="middle" font-size="7.8" fill="#274a78">
    <text x="150" y="204" font-weight="600">旧:2 子任务</text>
    <rect x="56" y="210" width="90" height="24" rx="5" fill="#eef3fb" stroke="#bcd0ec"/><text x="101" y="226">KG 0-63</text>
    <rect x="154" y="210" width="90" height="24" rx="5" fill="#eef3fb" stroke="#bcd0ec"/><text x="199" y="226">KG 64-127</text>
    <text x="400" y="204" font-weight="600">新:4 子任务(rescale)</text>
    <rect x="288" y="210" width="58" height="24" rx="5" fill="#eafaf1" stroke="#bfe0cd"/><text x="317" y="226">0-31</text>
    <rect x="352" y="210" width="58" height="24" rx="5" fill="#eafaf1" stroke="#bfe0cd"/><text x="381" y="226">32-63</text>
    <rect x="416" y="210" width="58" height="24" rx="5" fill="#eafaf1" stroke="#bfe0cd"/><text x="445" y="226">64-95</text>
    <rect x="480" y="210" width="52" height="24" rx="5" fill="#eafaf1" stroke="#bfe0cd"/><text x="506" y="226">96-127</text>
  </g>
  <line x1="244" y1="222" x2="284" y2="222" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="56" y="256" font-size="8" fill="#5b7db1">每个新子任务只取它负责的 key-group 子集(交集)</text>
  <text x="56" y="272" font-size="8" fill="#5b7db1">RocksDB 用 key-group 前缀字节在复合键里定位</text>

  <!-- operator redistribution -->
  <rect x="560" y="132" width="480" height="150" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="576" y="154" font-size="10.5" font-weight="700" fill="#5a3410">operator 状态 · OperatorStateHandle.Mode</text>
  <text x="576" y="171" font-size="8.2" fill="#93762e">圆整分配到新子任务</text>
  <g font-size="8.2" fill="#5a3410">
    <rect x="576" y="182" width="448" height="28" rx="7" fill="#fdf6ea" stroke="#efdcb4"/><text x="590" y="200"><tspan font-weight="600">SPLIT_DISTRIBUTE</tspan> · 均分:每个子任务分一部分</text>
    <rect x="576" y="216" width="448" height="28" rx="7" fill="#fdf6ea" stroke="#efdcb4"/><text x="590" y="234"><tspan font-weight="600">UNION</tspan> · 并集:每个子任务拿全量</text>
    <rect x="576" y="250" width="448" height="28" rx="7" fill="#fdf6ea" stroke="#efdcb4"/><text x="590" y="268"><tspan font-weight="600">BROADCAST</tspan> · 广播:所有子任务同一份</text>
  </g>

  <!-- checkpoint vs savepoint -->
  <text x="40" y="308" font-size="11" font-weight="700" fill="#1d1d1f">检查点 vs 保存点</text>
  <rect x="40" y="318" width="500" height="150" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="56" y="340" font-size="10.5" font-weight="700" fill="#1b2a4a">检查点（Checkpoint）</text>
  <text x="56" y="357" font-size="8.2" fill="#5b7db1">SharingFilesStrategy.FORWARD_BACKWARD</text>
  <g font-size="8.4" fill="#1b2a4a">
    <rect x="56" y="366" width="468" height="26" rx="6" fill="#f3f7fc" stroke="#cfe0f2"/><text x="70" y="383">增量共享文件(SST 跨检查点复用)</text>
    <rect x="56" y="398" width="468" height="26" rx="6" fill="#f3f7fc" stroke="#cfe0f2"/><text x="70" y="415">系统自动管理,周期触发</text>
    <rect x="56" y="430" width="468" height="26" rx="6" fill="#f3f7fc" stroke="#cfe0f2"/><text x="70" y="447">用途:故障恢复(回退到最近一致点)</text>
  </g>

  <rect x="560" y="318" width="480" height="150" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="576" y="340" font-size="10.5" font-weight="700" fill="#12402a">保存点（Savepoint）</text>
  <text x="576" y="357" font-size="8.2" fill="#2f6f4f">CheckpointProperties.forSavepoint</text>
  <g font-size="8.4" fill="#12402a">
    <rect x="576" y="366" width="448" height="26" rx="6" fill="#eafaf1" stroke="#bfe0cd"/><text x="590" y="383">自包含(不依赖其他文件复用)</text>
    <rect x="576" y="398" width="448" height="26" rx="6" fill="#eafaf1" stroke="#bfe0cd"/><text x="590" y="415">用户手动触发</text>
    <rect x="576" y="430" width="448" height="26" rx="6" fill="#eafaf1" stroke="#bfe0cd"/><text x="590" y="447">用途:版本升级 / 作业迁移</text>
  </g>

  <!-- bottom banner -->
  <rect x="40" y="482" width="1000" height="42" rx="12" fill="#f0f0f4" stroke="#d2d2d7"/>
  <text x="540" y="508" font-size="9.5" font-weight="700" text-anchor="middle" fill="#48484a">精确一次靠一致快照 + 恢复重放到快照点,不靠去重;两者区分在 CheckpointType / CheckpointProperties</text>
</svg>
