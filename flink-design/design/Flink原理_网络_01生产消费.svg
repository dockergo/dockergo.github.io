<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Flink 网络 · 生产端 ResultPartition → 消费端 InputGate</text>
  <text x="30" y="50" font-size="11" fill="#a1a1a6">数据从上游 ResultPartition 经网络(或本地)流到下游 InputGate 的 InputChannel,再喂给算子</text>

  <!-- 生产端 -->
  <rect x="40" y="82" width="300" height="330" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="62" y="110" font-size="13" font-weight="700" fill="#5a3410">生产端(上游子任务)</text>
  <text x="62" y="131" font-size="10" fill="#93762e">子任务把记录写这里</text>
  <rect x="62" y="146" width="256" height="120" rx="11" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="80" y="171" font-size="12" font-weight="600" fill="#5a3410">ResultPartition</text>
  <text x="80" y="191" font-size="9.5" fill="#93762e">implements ResultPartitionWriter</text>
  <text x="80" y="213" font-size="10" fill="#93762e">一个生产者一个</text>
  <text x="80" y="231" font-size="10" fill="#93762e">IntermediateResult / ResultPartition</text>
  <text x="80" y="253" font-size="9.5" fill="#a1a1a6">(并行展开见图变换篇)</text>
  <rect x="62" y="278" width="256" height="118" rx="11" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="80" y="303" font-size="11" font-weight="600" fill="#5a3410">子分区 subpartition</text>
  <text x="80" y="325" font-size="9.5" fill="#93762e">按下游通道拆分缓冲</text>
  <text x="80" y="347" font-size="9.5" fill="#93762e">写满即可被下游拉取</text>
  <text x="80" y="369" font-size="9.5" fill="#93762e">一个 subpartition 对一个</text>
  <text x="80" y="387" font-size="9.5" fill="#93762e">下游 InputChannel</text>

  <!-- 中转：网络 / 本地 -->
  <rect x="390" y="82" width="300" height="330" rx="14" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="412" y="110" font-size="13" font-weight="700" fill="#274a78">网络 / 本地传输</text>
  <rect x="412" y="132" width="256" height="120" rx="11" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="428" y="157" font-size="11.5" font-weight="600" fill="#274a78">远程:Netty TCP</text>
  <text x="428" y="179" font-size="9.5" fill="#5b7db1">跨机器传输</text>
  <text x="428" y="201" font-size="9.5" fill="#5b7db1">经 credit-based 流控收发</text>
  <text x="428" y="223" font-size="9.5" fill="#5b7db1">(见 credit 篇)</text>
  <rect x="412" y="264" width="256" height="120" rx="11" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="428" y="289" font-size="11.5" font-weight="600" fill="#274a78">本地:同 TM 内存交接</text>
  <text x="428" y="311" font-size="9.5" fill="#5b7db1">同 TaskManager 内直接传</text>
  <text x="428" y="333" font-size="9.5" fill="#5b7db1">免网络栈开销</text>
  <text x="428" y="355" font-size="9.5" fill="#5b7db1">(链内算子则连传输都免)</text>

  <!-- 消费端 -->
  <rect x="740" y="82" width="300" height="330" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="762" y="110" font-size="13" font-weight="700" fill="#1b2a4a">消费端(下游子任务)</text>
  <text x="762" y="131" font-size="10" fill="#5b7db1">聚合多个输入通道,喂算子</text>
  <rect x="762" y="146" width="256" height="88" rx="11" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="778" y="171" font-size="12" font-weight="600" fill="#1b2a4a">SingleInputGate</text>
  <text x="778" y="193" font-size="9.5" fill="#5b7db1">聚合多个 InputChannel</text>
  <text x="778" y="215" font-size="9.5" fill="#5b7db1">为算子提供统一输入</text>
  <rect x="762" y="246" width="123" height="80" rx="10" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="823" y="271" font-size="10.5" font-weight="600" fill="#274a78" text-anchor="middle">RemoteInput</text>
  <text x="823" y="288" font-size="10.5" font-weight="600" fill="#274a78" text-anchor="middle">Channel</text>
  <text x="823" y="310" font-size="9" fill="#5b7db1" text-anchor="middle">远程通道</text>
  <rect x="895" y="246" width="123" height="80" rx="10" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="956" y="271" font-size="10.5" font-weight="600" fill="#274a78" text-anchor="middle">LocalInput</text>
  <text x="956" y="288" font-size="10.5" font-weight="600" fill="#274a78" text-anchor="middle">Channel</text>
  <text x="956" y="310" font-size="9" fill="#5b7db1" text-anchor="middle">本地通道</text>
  <rect x="762" y="338" width="256" height="58" rx="11" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="778" y="363" font-size="11" font-weight="600" fill="#12402a">→ 喂给下游算子处理</text>
  <text x="778" y="384" font-size="9.5" fill="#2f6f4f">记录进入算子链的 processInput</text>

  <!-- 主流向连线 -->
  <path d="M 340,207 L 390,207" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="343" y="199" font-size="9.5" fill="#a1a1a6">写→拉</text>
  <path d="M 690,207 L 740,207" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="693" y="199" font-size="9.5" fill="#a1a1a6">流入</text>

  <!-- 底注 -->
  <text x="40" y="446" font-size="10.5" fill="#6e6e73">链内算子直接函数调用传记录(免网络);只有链间重分区(keyBy/rebalance)才走 ResultPartition → InputGate</text>
  <text x="40" y="470" font-size="10" fill="#a1a1a6">网络缓冲由 taskmanager.memory.network 决定:不足限吞吐,过多浪费</text>
</svg>
