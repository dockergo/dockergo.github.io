<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Flink 原理 · Table/SQL（Calcite planner 管线）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">PlannerBase.translate 四步:SQL→RelNode→optimize→ExecNodeGraph→Transformations;批流共享 PlannerBase</text>

  <!-- SQL entry -->
  <rect x="40" y="70" width="1000" height="44" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="60" y="92" font-size="10.5" font-weight="700" fill="#3d2a5a">SQL 文本 → TableEnvironmentImpl.executeSql → ParserImpl.parse(Calcite) → Operation 树</text>
  <text x="60" y="107" font-size="8.2" fill="#7a5aa8">声明式入口:用户只写"要什么",不写"怎么算"</text>

  <line x1="540" y1="114" x2="540" y2="134" stroke="#86868b" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- four steps -->
  <text x="40" y="152" font-size="10" font-weight="700" fill="#1b2a4a">PlannerBase.translate 四步（PlannerBase.scala）</text>
  <g text-anchor="middle">
    <rect x="40" y="162" width="230" height="86" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="155" y="186" font-size="10" font-weight="700" fill="#1b2a4a">① translateToRel</text><text x="155" y="206" font-size="8.2" fill="#5b7db1">SQL → Calcite</text><text x="155" y="222" font-size="8.2" fill="#5b7db1">RelNode(关系代数)</text><text x="155" y="240" font-size="7.6" fill="#5b7db1">逻辑关系表达</text>
    <rect x="296" y="162" width="230" height="86" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="411" y="186" font-size="10" font-weight="700" fill="#1b2a4a">② optimize</text><text x="411" y="206" font-size="8.2" fill="#5b7db1">优化 RelNode</text><text x="411" y="222" font-size="8.2" fill="#5b7db1">谓词下推/投影裁剪</text><text x="411" y="240" font-size="7.6" fill="#5b7db1">代价优化</text>
    <rect x="552" y="162" width="230" height="86" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="667" y="186" font-size="10" font-weight="700" fill="#1b2a4a">③ translateToExecNodeGraph</text><text x="667" y="206" font-size="8.2" fill="#5b7db1">成 ExecNodeGraph</text><text x="667" y="222" font-size="8.2" fill="#5b7db1">物理执行节点图</text><text x="667" y="240" font-size="7.6" fill="#5b7db1">贴近执行</text>
    <rect x="808" y="162" width="232" height="86" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="924" y="186" font-size="10" font-weight="700" fill="#12402a">④ translateToPlan</text><text x="924" y="206" font-size="8.2" fill="#2f6f4f">产 Transformations</text><text x="924" y="222" font-size="8.2" fill="#2f6f4f">喂进统一管线</text><text x="924" y="240" font-size="7.6" fill="#2f6f4f">与 DataStream 同路</text>
  </g>
  <line x1="270" y1="205" x2="296" y2="205" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="526" y1="205" x2="552" y2="205" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="782" y1="205" x2="808" y2="205" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- shared PlannerBase note -->
  <rect x="40" y="264" width="1000" height="50" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="60" y="286" font-size="10" font-weight="700" fill="#5a3410">批 / 流共享 PlannerBase</text>
  <text x="60" y="304" font-size="8.6" fill="#93762e">isStreamingMode 决定 StreamPlanner / BatchPlanner:是否允许无界 source、是否走 retract 流语义——同一四步骨架,只切语义。</text>

  <line x1="924" y1="248" x2="924" y2="330" stroke="#86868b" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- unified pipeline -->
  <rect x="40" y="334" width="1000" height="86" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="56" y="356" font-size="10.5" font-weight="700" fill="#1b2a4a">统一后端（与 DataStream 汇合 · 同一 StreamGraph→JobGraph 路径）</text>
  <g text-anchor="middle" font-size="8.8" fill="#274a78">
    <rect x="80" y="366" width="260" height="44" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/><text x="210" y="393">StreamGraph(逻辑 DAG)</text>
    <rect x="410" y="366" width="260" height="44" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/><text x="540" y="393">JobGraph(链化)</text>
    <rect x="740" y="366" width="260" height="44" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/><text x="870" y="393">ExecutionGraph(并行)</text>
  </g>
  <line x1="340" y1="388" x2="410" y2="388" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="670" y1="388" x2="740" y2="388" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- bottom banner -->
  <rect x="40" y="434" width="1000" height="42" rx="12" fill="#f0f0f4" stroke="#d2d2d7"/>
  <text x="540" y="460" font-size="9.5" font-weight="700" text-anchor="middle" fill="#48484a">关键:第四步产出的 Transformations 与 DataStream 完全同路——统一后端,一份引擎两种表达</text>
</svg>
