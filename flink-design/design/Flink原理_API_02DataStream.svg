<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="510" viewBox="0 0 1080 510" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="510" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Flink 原理 · DataStream（转换累积成图）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">转换只搭图,惰性构建;execute() 才 getStreamGraph() 提交——转换写完不等于在跑</text>

  <!-- user transforms row -->
  <text x="40" y="80" font-size="10" font-weight="700" fill="#3d2a5a">① 用户写转换（命令式,逐条登记）</text>
  <g text-anchor="middle" font-size="9">
    <rect x="40" y="90" width="220" height="56" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/><text x="150" y="114" font-weight="600" fill="#3d2a5a">map / filter</text><text x="150" y="131" font-size="7.8" fill="#7a5aa8">doTransform 登记环境</text>
    <rect x="300" y="90" width="220" height="56" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/><text x="410" y="114" font-weight="600" fill="#3d2a5a">keyBy</text><text x="410" y="131" font-size="7.8" fill="#7a5aa8">产 KeyedStream</text>
    <rect x="560" y="90" width="220" height="56" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/><text x="670" y="114" font-weight="600" fill="#3d2a5a">window / sink</text><text x="670" y="131" font-size="7.8" fill="#7a5aa8">继续 doTransform</text>
    <rect x="820" y="90" width="220" height="56" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="930" y="114" font-weight="600" fill="#12402a">execute()</text><text x="930" y="131" font-size="7.8" fill="#2f6f4f">惰性触发提交</text>
  </g>
  <line x1="260" y1="118" x2="300" y2="118" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="520" y1="118" x2="560" y2="118" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="780" y1="118" x2="820" y2="118" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- down into env -->
  <line x1="150" y1="146" x2="150" y2="176" stroke="#86868b" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="410" y1="146" x2="410" y2="176" stroke="#86868b" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="670" y1="146" x2="670" y2="176" stroke="#86868b" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- environment accumulates -->
  <text x="40" y="196" font-size="10" font-weight="700" fill="#3d2a5a">② 环境累积 List&lt;Transformation&gt;（StreamExecutionEnvironment）</text>
  <rect x="40" y="204" width="740" height="72" rx="12" fill="#faf4fb" stroke="#e2d2ee" filter="url(#soft)"/>
  <g text-anchor="middle" font-size="8.6" fill="#3d2a5a">
    <rect x="56" y="216" width="160" height="48" rx="8" fill="#ffffff" stroke="#e2d2ee"/><text x="136" y="236" font-weight="600">MapTransformation</text><text x="136" y="252" font-size="7.6" fill="#7a5aa8">登记进环境</text>
    <rect x="232" y="216" width="200" height="48" rx="8" fill="#ffffff" stroke="#e2d2ee"/><text x="332" y="236" font-weight="600">KeyedStream</text><text x="332" y="252" font-size="7.6" fill="#7a5aa8">KeyGroupStreamPartitioner</text>
    <rect x="448" y="216" width="160" height="48" rx="8" fill="#ffffff" stroke="#e2d2ee"/><text x="528" y="236" font-weight="600">WindowTransform</text><text x="528" y="252" font-size="7.6" fill="#7a5aa8">按 key-group 分</text>
    <rect x="624" y="216" width="140" height="48" rx="8" fill="#ffffff" stroke="#e2d2ee"/><text x="694" y="236" font-weight="600">SinkTransform</text><text x="694" y="252" font-size="7.6" fill="#7a5aa8">尾节点</text>
  </g>

  <!-- keyBy detail callout -->
  <rect x="800" y="204" width="240" height="72" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="816" y="224" font-size="9" font-weight="700" fill="#5a3410">keyBy 的分区来源</text>
  <text x="816" y="240" font-size="7.8" fill="#93762e">KeyGroupStreamPartitioner</text>
  <text x="816" y="255" font-size="7.8" fill="#93762e">按 key-group 重分区</text>
  <text x="816" y="270" font-size="7.8" fill="#93762e">= keyed state 分区的根</text>

  <!-- execute triggers generate -->
  <line x1="410" y1="276" x2="410" y2="306" stroke="#86868b" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="420" y="296" font-size="8.4" fill="#12402a">execute() → generate()</text>

  <!-- StreamGraph output -->
  <text x="40" y="326" font-size="10" font-weight="700" fill="#1b2a4a">③ 遍历 transformation 建图（StreamGraphGenerator.generate()）</text>
  <rect x="40" y="334" width="1000" height="96" rx="13" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="56" y="356" font-size="10" font-weight="700" fill="#1b2a4a">StreamGraph（逻辑 DAG · 一节点一算子）</text>
  <g text-anchor="middle" font-size="8.8" fill="#274a78">
    <rect x="80" y="368" width="150" height="46" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/><text x="155" y="395">source→map 节点</text>
    <rect x="320" y="368" width="150" height="46" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/><text x="395" y="395">keyed 节点</text>
    <rect x="560" y="368" width="150" height="46" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/><text x="635" y="395">window 节点</text>
    <rect x="800" y="368" width="150" height="46" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/><text x="875" y="395">sink 节点</text>
  </g>
  <line x1="230" y1="391" x2="320" y2="391" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="470" y1="391" x2="560" y2="391" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="710" y1="391" x2="800" y2="391" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- bottom banner -->
  <rect x="40" y="444" width="1000" height="42" rx="12" fill="#f0f0f4" stroke="#d2d2d7"/>
  <text x="540" y="470" font-size="9.5" font-weight="700" text-anchor="middle" fill="#48484a">惰性构图:转换只搭 StreamGraph,execute() 才提交;keyBy 决定 key-group 分区,绑定 keyed state</text>
</svg>
