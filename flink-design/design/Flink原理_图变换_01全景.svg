<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Flink 原理 · 图变换全景（三级降层）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">StreamGraph(逻辑 DAG) → JobGraph(链化) → ExecutionGraph(并行展开);每级降一层,越来越贴物理</text>

  <!-- input -->
  <rect x="40" y="70" width="1000" height="38" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="540" y="94" font-size="9.6" font-weight="700" text-anchor="middle" fill="#3d2a5a">输入:【接触面】的 Transformation 列表(DataStream / Table-SQL 汇入)</text>
  <line x1="540" y1="108" x2="540" y2="126" stroke="#86868b" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- Level 1 StreamGraph -->
  <rect x="40" y="128" width="1000" height="96" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="60" y="150" font-size="11" font-weight="700" fill="#1b2a4a">① StreamGraph · 逻辑 DAG（一节点一算子）</text>
  <text x="60" y="167" font-size="8.2" fill="#5b7db1">StreamGraphGenerator.generate 遍历 transformation 建图 · StreamGraph implements Pipeline, ExecutionPlan</text>
  <g text-anchor="middle" font-size="8.4" fill="#274a78">
    <rect x="60" y="176" width="150" height="38" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="135" y="199">source 算子</text>
    <rect x="230" y="176" width="150" height="38" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="305" y="199">map 算子</text>
    <rect x="400" y="176" width="150" height="38" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="475" y="199">filter 算子</text>
    <rect x="570" y="176" width="150" height="38" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="645" y="199">keyBy 算子</text>
    <rect x="740" y="176" width="130" height="38" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="805" y="199">window 算子</text>
    <rect x="890" y="176" width="130" height="38" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="955" y="199">sink 算子</text>
  </g>

  <line x1="540" y1="224" x2="540" y2="244" stroke="#86868b" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="556" y="238" font-size="8.4" fill="#5b7db1">getJobGraph → StreamingJobGraphGenerator.createJobGraph（算子链化,降一层）</text>

  <!-- Level 2 JobGraph -->
  <rect x="40" y="246" width="1000" height="90" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="60" y="268" font-size="11" font-weight="700" fill="#1b2a4a">② JobGraph · 链化后的作业图（可链算子合并成 JobVertex）</text>
  <text x="60" y="285" font-size="8.2" fill="#5b7db1">相邻可链算子塞进一个 JobVertex,减少线程/序列化开销;keyBy 等重分区断链</text>
  <g text-anchor="middle" font-size="8.4" fill="#274a78">
    <rect x="60" y="294" width="300" height="36" rx="8" fill="#e7eefb" stroke="#bcd0ec"/><text x="210" y="316">JobVertex A(source→map→filter 链)</text>
    <rect x="380" y="294" width="300" height="36" rx="8" fill="#e7eefb" stroke="#bcd0ec"/><text x="530" y="316">JobVertex B(keyBy→window 链)</text>
    <rect x="700" y="294" width="320" height="36" rx="8" fill="#e7eefb" stroke="#bcd0ec"/><text x="860" y="316">JobVertex C(sink)</text>
  </g>
  <line x1="360" y1="312" x2="380" y2="312" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="680" y1="312" x2="700" y2="312" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <line x1="540" y1="336" x2="540" y2="356" stroke="#86868b" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="556" y="350" font-size="8.4" fill="#5b7db1">DefaultExecutionGraphBuilder.buildGraph → attachJobGraph（按并行度展开,降一层）</text>

  <!-- Level 3 ExecutionGraph -->
  <rect x="40" y="358" width="1000" height="92" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="60" y="380" font-size="11" font-weight="700" fill="#5a3410">③ ExecutionGraph · 并行展开（JobVertex 按 parallelism 展开成 N 个 ExecutionVertex）</text>
  <text x="60" y="397" font-size="8.2" fill="#93762e">每个 ExecutionVertex 是一个可调度子任务,每次尝试是一个 Execution · JobManager 调度的对象</text>
  <g text-anchor="middle" font-size="8" fill="#5a3410">
    <rect x="60" y="406" width="140" height="38" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="130" y="429">A #0 / A #1</text>
    <rect x="216" y="406" width="140" height="38" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="286" y="429">A #2 / A #3</text>
    <rect x="372" y="406" width="150" height="38" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="447" y="429">B #0 / B #1</text>
    <rect x="538" y="406" width="150" height="38" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="613" y="429">B #2 / B #3</text>
    <rect x="704" y="406" width="150" height="38" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="779" y="429">C #0 / C #1</text>
    <rect x="870" y="406" width="150" height="38" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="945" y="429">→ IntermediateResult</text>
  </g>
</svg>
