<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Flink 原理 · 算子链化（为什么把算子合并）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">isChainable 四条件满足则相邻算子塞进同 JobVertex;链内函数调用传记录免网络,keyBy 断链</text>

  <!-- isChainable conditions -->
  <text x="40" y="76" font-size="10" font-weight="700" fill="#1b2a4a">isChainable(edge) 判定四条件（StreamingJobGraphGenerator）</text>
  <g text-anchor="middle" font-size="8.6">
    <rect x="40" y="86" width="242" height="52" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="161" y="108" font-weight="600" fill="#1b2a4a">① 单入边</text><text x="161" y="126" font-size="7.8" fill="#5b7db1">下游只有一个上游</text>
    <rect x="296" y="86" width="242" height="52" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="417" y="108" font-weight="600" fill="#1b2a4a">② 同 slot-sharing 组</text><text x="417" y="126" font-size="7.8" fill="#5b7db1">共享 slot</text>
    <rect x="552" y="86" width="242" height="52" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="673" y="108" font-weight="600" fill="#1b2a4a">③ 算子可链</text><text x="673" y="126" font-size="7.8" fill="#5b7db1">chaining 未禁用</text>
    <rect x="808" y="86" width="232" height="52" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="924" y="104" font-weight="600" fill="#1b2a4a">④ ForwardPartitioner</text><text x="924" y="120" font-size="7.8" fill="#5b7db1">/ 非 BATCH 交换</text><text x="924" y="133" font-size="7.4" fill="#5b7db1">arePartitionerAndExchangeModeChainable</text>
  </g>

  <!-- StreamGraph before chaining -->
  <text x="40" y="166" font-size="10" font-weight="700" fill="#274a78">链化前 · StreamGraph（每个算子独立节点）</text>
  <g text-anchor="middle" font-size="8.4" fill="#274a78">
    <rect x="40" y="176" width="120" height="40" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="100" y="200">source</text>
    <rect x="200" y="176" width="120" height="40" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="260" y="200">map</text>
    <rect x="360" y="176" width="120" height="40" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="420" y="200">filter</text>
    <rect x="520" y="176" width="130" height="40" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="585" y="200">keyBy</text>
    <rect x="690" y="176" width="130" height="40" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="755" y="200">window</text>
    <rect x="860" y="176" width="130" height="40" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="925" y="200">sink</text>
  </g>
  <!-- forward edges (chainable) -->
  <line x1="160" y1="196" x2="200" y2="196" stroke="#2f6f4f" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="320" y1="196" x2="360" y2="196" stroke="#2f6f4f" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="235" y="168" font-size="7.4" fill="#2f6f4f">forward 可链</text>
  <!-- keyBy edge (break) -->
  <line x1="480" y1="196" x2="520" y2="196" stroke="#7a2a2a" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <line x1="650" y1="196" x2="690" y2="196" stroke="#7a2a2a" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="600" y="168" font-size="7.4" fill="#7a2a2a">keyBy 重分区 · 断链</text>
  <line x1="820" y1="196" x2="860" y2="196" stroke="#2f6f4f" stroke-width="1.6" marker-end="url(#ar)"/>

  <line x1="540" y1="224" x2="540" y2="244" stroke="#86868b" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="556" y="238" font-size="8.4" fill="#5b7db1">createChain 递归 · 满足四条件的 forward 边合并</text>

  <!-- JobGraph after chaining -->
  <text x="40" y="266" font-size="10" font-weight="700" fill="#5a3410">链化后 · JobGraph（可链算子塞进同 JobVertex）</text>
  <g font-size="8.6">
    <rect x="40" y="276" width="380" height="70" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
    <text x="230" y="298" font-size="9.6" font-weight="700" text-anchor="middle" fill="#5a3410">JobVertex A</text>
    <g text-anchor="middle" font-size="8" fill="#5a3410">
      <rect x="56" y="308" width="108" height="28" rx="6" fill="#fff" stroke="#e8cf9a"/><text x="110" y="326">source</text>
      <rect x="176" y="308" width="108" height="28" rx="6" fill="#fff" stroke="#e8cf9a"/><text x="230" y="326">map</text>
      <rect x="296" y="308" width="108" height="28" rx="6" fill="#fff" stroke="#e8cf9a"/><text x="350" y="326">filter</text>
    </g>
    <rect x="450" y="276" width="300" height="70" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
    <text x="600" y="298" font-size="9.6" font-weight="700" text-anchor="middle" fill="#5a3410">JobVertex B</text>
    <g text-anchor="middle" font-size="8" fill="#5a3410">
      <rect x="466" y="308" width="130" height="28" rx="6" fill="#fff" stroke="#e8cf9a"/><text x="531" y="326">keyBy→window</text>
      <rect x="608" y="308" width="126" height="28" rx="6" fill="#fff" stroke="#e8cf9a"/><text x="671" y="326">(同链)</text>
    </g>
    <rect x="780" y="276" width="260" height="70" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
    <text x="910" y="298" font-size="9.6" font-weight="700" text-anchor="middle" fill="#5a3410">JobVertex C</text>
    <rect x="796" y="308" width="228" height="28" rx="6" fill="#fff" stroke="#e8cf9a"/><text x="910" y="326" font-size="8" text-anchor="middle" fill="#5a3410">sink</text>
  </g>
  <!-- cross-vertex edges = network -->
  <line x1="420" y1="311" x2="450" y2="311" stroke="#7a2a2a" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <line x1="750" y1="311" x2="780" y2="311" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="435" y="360" font-size="7.4" text-anchor="middle" fill="#7a2a2a">跨网络</text>

  <!-- payoff -->
  <rect x="40" y="360" width="490" height="66" rx="12" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="56" y="382" font-size="10" font-weight="700" fill="#12402a">链内:免网络、免序列化</text>
  <text x="56" y="400" font-size="8.4" fill="#2f6f4f">同一线程直接函数调用传递记录(mailbox)</text>
  <text x="56" y="416" font-size="8.4" fill="#2f6f4f">吞吐关键:source→map→filter 常链成一个 vertex</text>

  <rect x="550" y="360" width="490" height="66" rx="12" fill="#fbeaea" stroke="#e7c3c3"/>
  <text x="566" y="382" font-size="10" font-weight="700" fill="#4a1414">链间:必跨网络</text>
  <text x="566" y="400" font-size="8.4" fill="#7a2a2a">只有 forward(1:1)+ 非批交换能链</text>
  <text x="566" y="416" font-size="8.4" fill="#7a2a2a">keyBy / rebalance(重分区)断链,必跨网络</text>

  <!-- bottom banner -->
  <rect x="40" y="440" width="1000" height="40" rx="12" fill="#f0f0f4" stroke="#d2d2d7"/>
  <text x="540" y="465" font-size="9.5" font-weight="700" text-anchor="middle" fill="#48484a">误区破除:不是一个算子一个线程——链化后整条链在一个线程里跑,函数调用传记录</text>
</svg>
