<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Flink 网络 · 分区策略：keyed vs ForwardPartitioner vs RebalancePartitioner</text>
  <text x="30" y="50" font-size="11" fill="#a1a1a6">链间重分区由 partitioner 决定去向;只有 forward + 非批交换能链化,keyBy/rebalance 必断链跨网络</text>

  <!-- keyed 分区 -->
  <rect x="40" y="78" width="320" height="360" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="62" y="106" font-size="13" font-weight="700" fill="#1b2a4a">keyed(KeyGroupStreamPartitioner)</text>
  <text x="62" y="127" font-size="10" fill="#5b7db1">按 key 的 key-group 确定性映射</text>
  <!-- 上游2 -->
  <rect x="62" y="146" width="128" height="44" rx="9" fill="#ffffff" stroke="#ececf1"/>
  <text x="126" y="173" font-size="10.5" fill="#1b2a4a" text-anchor="middle">上游[0]</text>
  <rect x="210" y="146" width="128" height="44" rx="9" fill="#ffffff" stroke="#ececf1"/>
  <text x="274" y="173" font-size="10.5" fill="#1b2a4a" text-anchor="middle">上游[1]</text>
  <!-- 下游2 -->
  <rect x="62" y="300" width="128" height="44" rx="9" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="126" y="327" font-size="10.5" fill="#12402a" text-anchor="middle">下游[0]</text>
  <rect x="210" y="300" width="128" height="44" rx="9" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="274" y="327" font-size="10.5" fill="#12402a" text-anchor="middle">下游[1]</text>
  <!-- 交叉连线（按 key-group） -->
  <path d="M 126,190 L 126,300" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M 140,190 L 260,300" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M 260,190 L 140,300" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M 274,190 L 274,300" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="72" y="366" font-size="9.5" fill="#5b7db1">assignKeyToParallelOperator</text>
  <text x="72" y="386" font-size="9.5" fill="#5b7db1">同 key 永远到同一子任务</text>
  <text x="72" y="406" font-size="9.5" fill="#5b7db1">(keyed state 前提,支持 rescale)</text>
  <text x="72" y="426" font-size="9.5" fill="#7a2a2a">必断链、跨网络</text>

  <!-- Forward 分区 -->
  <rect x="380" y="78" width="320" height="360" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="402" y="106" font-size="13" font-weight="700" fill="#12402a">ForwardPartitioner(1:1)</text>
  <text x="402" y="127" font-size="10" fill="#2f6f4f">唯一能让算子链化的分区</text>
  <rect x="402" y="146" width="128" height="44" rx="9" fill="#ffffff" stroke="#ececf1"/>
  <text x="466" y="173" font-size="10.5" fill="#12402a" text-anchor="middle">上游[0]</text>
  <rect x="550" y="146" width="128" height="44" rx="9" fill="#ffffff" stroke="#ececf1"/>
  <text x="614" y="173" font-size="10.5" fill="#12402a" text-anchor="middle">上游[1]</text>
  <rect x="402" y="300" width="128" height="44" rx="9" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="466" y="327" font-size="10.5" fill="#12402a" text-anchor="middle">下游[0]</text>
  <rect x="550" y="300" width="128" height="44" rx="9" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="614" y="327" font-size="10.5" fill="#12402a" text-anchor="middle">下游[1]</text>
  <path d="M 466,190 L 466,300" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M 614,190 L 614,300" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="412" y="366" font-size="9.5" fill="#2f6f4f">一对一直连,不重分布</text>
  <text x="412" y="386" font-size="9.5" fill="#2f6f4f">forward + 非批 → 可链化</text>
  <text x="412" y="406" font-size="9.5" fill="#2f6f4f">链内免网络、免序列化</text>
  <text x="412" y="426" font-size="9.5" fill="#12402a">最省(可链)</text>

  <!-- Rebalance 分区 -->
  <rect x="720" y="78" width="320" height="360" rx="14" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="742" y="106" font-size="13" font-weight="700" fill="#3d2a5a">RebalancePartitioner(轮询)</text>
  <text x="742" y="127" font-size="10" fill="#7a5c9e">round-robin 均衡负载</text>
  <rect x="742" y="146" width="128" height="44" rx="9" fill="#ffffff" stroke="#ececf1"/>
  <text x="806" y="173" font-size="10.5" fill="#3d2a5a" text-anchor="middle">上游[0]</text>
  <rect x="890" y="146" width="128" height="44" rx="9" fill="#ffffff" stroke="#ececf1"/>
  <text x="954" y="173" font-size="10.5" fill="#3d2a5a" text-anchor="middle">上游[1]</text>
  <rect x="742" y="300" width="128" height="44" rx="9" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="806" y="327" font-size="10.5" fill="#12402a" text-anchor="middle">下游[0]</text>
  <rect x="890" y="300" width="128" height="44" rx="9" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="954" y="327" font-size="10.5" fill="#12402a" text-anchor="middle">下游[1]</text>
  <path d="M 806,190 L 806,300" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M 820,190 L 940,300" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M 940,190 L 820,300" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M 954,190 L 954,300" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="752" y="366" font-size="9.5" fill="#7a5c9e">逐条轮流分发到各下游</text>
  <text x="752" y="386" font-size="9.5" fill="#7a5c9e">均衡负载但打散 key</text>
  <text x="752" y="406" font-size="9.5" fill="#7a5c9e">不保证 key 亲和</text>
  <text x="752" y="426" font-size="9.5" fill="#7a2a2a">必断链、跨网络</text>

  <!-- 底注 -->
  <text x="40" y="470" font-size="10.5" fill="#6e6e73">分区选择：keyBy 保证 key 亲和但可能倾斜;rebalance 均衡但打散 key;forward 最省(可链)</text>
  <text x="40" y="494" font-size="10" fill="#a1a1a6">selectChannel 决定每条记录去哪个下游通道</text>
</svg>
