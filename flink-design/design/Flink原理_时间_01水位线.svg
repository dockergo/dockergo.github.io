<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Flink 时间 · 事件时间 vs 处理时间 · 水位线 Watermark</text>
  <text x="30" y="50" font-size="11" fill="#a1a1a6">水位线声明"事件时间已到 T,不再期待 &lt; T 的数据";算子取所有输入通道水位线的最小值</text>

  <!-- 事件时间 -->
  <rect x="40" y="78" width="495" height="150" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="62" y="106" font-size="13" font-weight="700" fill="#12402a">事件时间(流计算首选)</text>
  <text x="62" y="130" font-size="10.5" fill="#2f6f4f">数据自带的时间戳为准</text>
  <text x="62" y="153" font-size="10.5" fill="#2f6f4f">✓ 可重现(重跑结果一致)</text>
  <text x="62" y="176" font-size="10.5" fill="#2f6f4f">✓ 能正确处理乱序 / 延迟到达</text>
  <text x="62" y="205" font-size="9.5" fill="#a1a1a6">配 WatermarkStrategy 生成水位线推进事件时间</text>

  <!-- 处理时间 -->
  <rect x="545" y="78" width="495" height="150" rx="14" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="567" y="106" font-size="13" font-weight="700" fill="#4a1414">处理时间</text>
  <text x="567" y="130" font-size="10.5" fill="#7a2a2a">算子墙上时钟为准</text>
  <text x="567" y="153" font-size="10.5" fill="#7a2a2a">✓ 简单(无需水位线)</text>
  <text x="567" y="176" font-size="10.5" fill="#7a2a2a">✗ 不可重现(重跑结果随运行波动)</text>
  <text x="567" y="205" font-size="9.5" fill="#a1a1a6">要正确性用事件时间,不要图简单用处理时间</text>

  <!-- Watermark 生成与传播 -->
  <rect x="40" y="248" width="640" height="264" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="62" y="276" font-size="13" font-weight="700" fill="#1b2a4a">Watermark：事件时间进度标记(不携带业务数据)</text>
  <text x="62" y="298" font-size="10" fill="#5b7db1">WatermarkGenerator: onEvent + onPeriodicEmit 产生 · MAX_WATERMARK = Long.MAX_VALUE</text>

  <rect x="62" y="312" width="596" height="60" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="78" y="336" font-size="11" font-weight="600" fill="#1b2a4a">数据流(乱序):事件时间戳 …7, 5, 9, 6…</text>
  <text x="78" y="358" font-size="10" fill="#5b7db1">Watermark(T=6) 插入流中 → 声明"事件时间已到 6,不再期待 &lt; 6 的数据"</text>

  <!-- 取最小值 -->
  <rect x="62" y="386" width="596" height="110" rx="10" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="78" y="410" font-size="11" font-weight="600" fill="#2c5a3a">多输入通道 → 算子取水位线最小值</text>
  <rect x="82" y="422" width="150" height="34" rx="8" fill="#ffffff" stroke="#ececf1"/>
  <text x="157" y="444" font-size="10" fill="#2c5a3a" text-anchor="middle">通道A W=8</text>
  <rect x="240" y="422" width="150" height="34" rx="8" fill="#ffffff" stroke="#ececf1"/>
  <text x="315" y="444" font-size="10" fill="#2c5a3a" text-anchor="middle">通道B W=6</text>
  <path d="M 398,439 L 430,439" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <rect x="438" y="422" width="200" height="34" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="538" y="444" font-size="10" fill="#12402a" text-anchor="middle">算子事件时间 = min = 6</text>
  <text x="78" y="482" font-size="9.5" fill="#2f6f4f">取最小值保证不漏早到的数据(慢通道决定推进速度)</text>

  <!-- WatermarkStrategy 三策略 -->
  <rect x="700" y="248" width="340" height="264" rx="14" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="722" y="276" font-size="13" font-weight="700" fill="#3d2a5a">WatermarkStrategy</text>

  <rect x="722" y="292" width="296" height="62" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="738" y="316" font-size="11" font-weight="600" fill="#3d2a5a">forMonotonousTimestamps</text>
  <text x="738" y="338" font-size="9.5" fill="#7a5c9e">时间戳严格递增,无乱序</text>

  <rect x="722" y="364" width="296" height="72" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="738" y="388" font-size="11" font-weight="600" fill="#3d2a5a">forBoundedOutOfOrderness(Duration)</text>
  <text x="738" y="410" font-size="9.5" fill="#7a5c9e">容忍固定乱序;延迟设太小丢迟到</text>
  <text x="738" y="428" font-size="9.5" fill="#7a5c9e">数据,太大增延迟</text>

  <rect x="722" y="446" width="296" height="52" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="738" y="470" font-size="11" font-weight="600" fill="#3d2a5a">noWatermarks</text>
  <text x="738" y="490" font-size="9.5" fill="#7a5c9e">withIdleness 防空闲源卡住推进</text>
</svg>
