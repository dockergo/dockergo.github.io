<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Flink 原理 · 统一流批（有界是流的特例）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">一套 transformation 模型,RuntimeExecutionMode 只改语义;AUTOMATIC 下所有 source 有界即选 BATCH</text>

  <!-- 统一模型 top -->
  <rect x="30" y="66" width="1020" height="64" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="46" y="88" font-size="11" font-weight="700" fill="#3d2a5a">一套 transformation 模型（流批同引擎、同代码）</text>
  <text x="46" y="106" font-size="8.8" fill="#3d2a5a">DataStream / Table-SQL 写的转换 → 同一 StreamGraph→JobGraph→ExecutionGraph 管线</text>
  <text x="46" y="122" font-size="8.4" fill="#7a5aa8">批不是另一个引擎,而是"所有输入有界"的流:一份 transformation,mode 只改调度/shuffle/watermark 语义</text>

  <!-- mode selector -->
  <rect x="380" y="150" width="320" height="46" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="540" y="170" font-size="10" font-weight="700" text-anchor="middle" fill="#1b2a4a">RuntimeExecutionMode</text>
  <text x="540" y="187" font-size="8" text-anchor="middle" fill="#5b7db1">RuntimeExecutionMode.java · 决定语义</text>
  <line x1="290" y1="130" x2="440" y2="150" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="790" y1="130" x2="640" y2="150" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- three modes -->
  <line x1="470" y1="196" x2="180" y2="228" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="540" y1="196" x2="540" y2="228" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="610" y1="196" x2="900" y2="228" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- STREAMING -->
  <rect x="46" y="230" width="300" height="120" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="62" y="252" font-size="10.5" font-weight="700" fill="#274a78">STREAMING</text>
  <text x="62" y="270" font-size="8.4" fill="#5b7db1">无界流语义(默认)</text>
  <g font-size="8.2" fill="#274a78">
    <text x="62" y="292">· 增量处理,持续出结果</text>
    <text x="62" y="310">· watermark 驱动窗口触发</text>
    <text x="62" y="328">· 周期性检查点容错</text>
  </g>
  <text x="62" y="344" font-size="7.8" fill="#5b7db1">场景:实时数据流</text>

  <!-- AUTOMATIC -->
  <rect x="390" y="230" width="300" height="120" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="406" y="252" font-size="10.5" font-weight="700" fill="#12402a">AUTOMATIC</text>
  <text x="406" y="270" font-size="8.4" fill="#2f6f4f">按 source 有界性自动选</text>
  <g font-size="8.2" fill="#12402a">
    <text x="406" y="292">· 所有 source 有界 → BATCH</text>
    <text x="406" y="310">· 任一 source 无界 → STREAMING</text>
    <text x="406" y="328">shouldExecuteInBatchMode</text>
  </g>
  <text x="406" y="344" font-size="7.8" fill="#2f6f4f">StreamGraphGenerator:421</text>

  <!-- BATCH -->
  <rect x="734" y="230" width="300" height="120" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="750" y="252" font-size="10.5" font-weight="700" fill="#5a3410">BATCH</text>
  <text x="750" y="270" font-size="8.4" fill="#93762e">有界流语义(批优化)</text>
  <g font-size="8.2" fill="#5a3410">
    <text x="750" y="292">· 分阶段调度,排序 shuffle</text>
    <text x="750" y="310">· 无 watermark,处理完即出</text>
    <text x="750" y="328">· 失败重跑阶段,免检查点</text>
  </g>
  <text x="750" y="344" font-size="7.8" fill="#93762e">场景:所有输入有界</text>

  <!-- key insight -->
  <rect x="30" y="366" width="1020" height="52" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="388" font-size="10.5" font-weight="700" fill="#1d1d1f">有界 = 流的特例</text>
  <text x="46" y="407" font-size="8.8" fill="#6e6e73">同一 transformation 模型在两种 mode 下语义不同,但引擎/代码不变——批只是"输入全有界"时的流,这让流批同引擎、同一套代码复用。</text>

  <!-- bottom banner -->
  <rect x="30" y="430" width="1020" height="44" rx="12" fill="#f0f0f4" stroke="#d2d2d7"/>
  <text x="540" y="457" font-size="9.5" font-weight="700" text-anchor="middle" fill="#48484a">流优先,批是特例 —— mode 只改调度/shuffle/watermark 语义,不改引擎骨架</text>
</svg>
