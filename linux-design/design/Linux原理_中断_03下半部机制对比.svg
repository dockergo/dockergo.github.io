<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="430" viewBox="0 0 1000 430" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="1000" height="430" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">下半部四机制：分水岭是"能否睡眠"（原子上下文 vs 进程/内核线程上下文）</text>

  <!-- 原子上下文 zone -->
  <rect x="28" y="66" width="456" height="300" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="44" y="88" font-size="11.5" font-weight="600" fill="#274a78">原子上下文 · 不可睡眠</text>
  <text x="44" y="104" font-size="8.5" fill="#5b7db1">中断返回 / 软中断路径执行，不能持 mutex、不能等 IO</text>

  <!-- 进程上下文 zone -->
  <rect x="516" y="66" width="456" height="300" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="532" y="88" font-size="11.5" font-weight="600" fill="#2c5a3a">进程（内核线程）上下文 · 可睡眠</text>
  <text x="532" y="104" font-size="8.5" fill="#2f6f4f">跑在内核线程里，可持锁、等 IO、做可能阻塞的分配</text>

  <!-- 分水岭 -->
  <line x1="500" y1="66" x2="500" y2="366" stroke="#c1962a" stroke-width="1.4" stroke-dasharray="5 3"/>

  <!-- softirq -->
  <rect x="46" y="120" width="204" height="230" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="62" y="144" font-size="11.5" font-weight="600" fill="#1b2a4a">softirq</text>
  <text x="62" y="170" font-size="9.5" fill="#5b7db1">· 编译期静态 10 向量</text>
  <text x="62" y="192" font-size="9.5" fill="#5b7db1">· open_softirq 注册</text>
  <text x="62" y="214" font-size="9.5" fill="#5b7db1">· 同向量可多核并行</text>
  <text x="62" y="236" font-size="9.5" fill="#5b7db1">· 网络收发 / 定时器 / 块层</text>
  <text x="62" y="262" font-size="9" fill="#a1a1a6">并发：高</text>
  <text x="62" y="284" font-size="9" fill="#a1a1a6">粒度：内核内部固定机制</text>

  <!-- tasklet -->
  <rect x="264" y="120" width="204" height="230" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="280" y="144" font-size="11.5" font-weight="600" fill="#1b2a4a">tasklet</text>
  <text x="280" y="170" font-size="9.5" fill="#5b7db1">· 建于 TASKLET_SOFTIRQ 上</text>
  <text x="280" y="192" font-size="9.5" fill="#5b7db1">· __tasklet_schedule</text>
  <text x="280" y="208" font-size="8.5" fill="#5b7db1">  (softirq.c:822) 挂 tasklet_vec</text>
  <text x="280" y="230" font-size="9.5" fill="#5b7db1">· 同实例串行（不并行）</text>
  <text x="280" y="252" font-size="9.5" fill="#5b7db1">· 动态创建，简单驱动延后</text>
  <text x="280" y="278" font-size="9" fill="#a1a1a6">并发：同 tasklet 串行</text>

  <!-- workqueue -->
  <rect x="532" y="120" width="204" height="230" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="548" y="144" font-size="11.5" font-weight="600" fill="#12402a">workqueue（kworker）</text>
  <text x="548" y="170" font-size="9.5" fill="#2f6f4f">· 线程池 worker_pool</text>
  <text x="548" y="186" font-size="8.5" fill="#2f6f4f">  (workqueue.c:195)</text>
  <text x="548" y="208" font-size="9.5" fill="#2f6f4f">· queue_work → worker_thread</text>
  <text x="548" y="224" font-size="8.5" fill="#2f6f4f">  (workqueue.c:549) process_one_work</text>
  <text x="548" y="246" font-size="9.5" fill="#2f6f4f">· 可持锁 / 等 IO / 阻塞分配</text>
  <text x="548" y="268" font-size="9.5" fill="#2f6f4f">· 池内多 worker 并行</text>
  <text x="548" y="294" font-size="9" fill="#a1a1a6">最通用的可睡眠延后</text>

  <!-- threaded irq -->
  <rect x="750" y="120" width="204" height="230" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="766" y="144" font-size="11.5" font-weight="600" fill="#12402a">threaded irq</text>
  <text x="766" y="170" font-size="9.5" fill="#2f6f4f">· request_threaded_irq</text>
  <text x="766" y="186" font-size="8.5" fill="#2f6f4f">  (manage.c:2115)</text>
  <text x="766" y="208" font-size="9.5" fill="#2f6f4f">· handler 返回 IRQ_WAKE_THREAD</text>
  <text x="766" y="230" font-size="9.5" fill="#2f6f4f">· irq_thread 主体</text>
  <text x="766" y="246" font-size="8.5" fill="#2f6f4f">  (manage.c:1244)</text>
  <text x="766" y="268" font-size="9.5" fill="#2f6f4f">· 单线程串行，中断线程化</text>
  <text x="766" y="294" font-size="9" fill="#a1a1a6">利于实时性：缩短关中断</text>

  <!-- 底部选型 -->
  <rect x="28" y="378" width="944" height="40" rx="9" fill="#ffffff" stroke="#ececf1"/>
  <text x="44" y="396" font-size="10" fill="#6e6e73">选型：先问"要睡眠吗"。不需要 → softirq（内核固定路径）或 tasklet（驱动简单延后）；需要睡眠 → workqueue（通用、可并行）</text>
  <text x="44" y="412" font-size="10" fill="#6e6e73">或 threaded irq（把繁重中断处理放进专属内核线程，缩短硬中断关中断时长）。</text>
</svg>
