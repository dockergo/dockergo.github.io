<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="460" viewBox="0 0 1000 460" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="460" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">VFS 四大对象：file → dentry → inode → super_block，各挂一组 ops 由具体文件系统填实现</text>

  <!-- fd 表 -->
  <rect x="28" y="84" width="210" height="66" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="44" y="104" font-size="10.5" font-weight="600" fill="#1b2a4a">进程 fd 表（task-&gt;files）</text>
  <text x="44" y="123" font-size="9.5" fill="#5b7db1">fd: 0 stdin · 1 stdout · 2 stderr</text>
  <text x="44" y="140" font-size="9.5" fill="#5b7db1">3 → 指向一个 file 实例</text>

  <!-- file -->
  <rect x="28" y="182" width="210" height="118" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="133" y="204" font-size="11.5" font-weight="600" fill="#3d2a5a" text-anchor="middle">file（fs.h:1260）</text>
  <text x="44" y="228" font-size="9.5" fill="#6e6e73">一次"打开"的实例</text>
  <text x="44" y="250" font-size="10" fill="#3d2a5a">· f_op：file_operations</text>
  <text x="44" y="270" font-size="10" fill="#3d2a5a">· f_pos：读写偏移</text>
  <text x="44" y="290" font-size="10" fill="#3d2a5a">· f_mode：读/写权限</text>

  <!-- dentry -->
  <rect x="262" y="182" width="196" height="118" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="360" y="204" font-size="11.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">dentry（dcache.h:93）</text>
  <text x="278" y="228" font-size="9.5" fill="#6e6e73">连接 名字 ↔ inode</text>
  <text x="278" y="250" font-size="10" fill="#1d1d1f">· d_name：这段名字</text>
  <text x="278" y="270" font-size="10" fill="#1d1d1f">· d_parent：父目录</text>
  <text x="278" y="290" font-size="10" fill="#1d1d1f">· d_inode：所指 inode</text>

  <!-- inode -->
  <rect x="482" y="182" width="210" height="118" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="587" y="204" font-size="11.5" font-weight="600" fill="#5a3410" text-anchor="middle">inode（fs.h:767）</text>
  <text x="498" y="228" font-size="9.5" fill="#93762e">文件元数据（与名无关）</text>
  <text x="498" y="250" font-size="10" fill="#5a3410">· i_op：inode_operations</text>
  <text x="498" y="270" font-size="10" fill="#5a3410">· i_fop：默认 file_ops</text>
  <text x="498" y="290" font-size="10" fill="#5a3410">· i_mapping：页缓存</text>

  <!-- super_block -->
  <rect x="716" y="182" width="256" height="118" rx="12" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="844" y="204" font-size="11.5" font-weight="600" fill="#5a3410" text-anchor="middle">super_block（fs.h · i_sb:779）</text>
  <text x="732" y="228" font-size="9.5" fill="#93762e">一个已挂载的文件系统实例</text>
  <text x="732" y="250" font-size="10" fill="#5a3410">· s_op：super_operations</text>
  <text x="732" y="270" font-size="10" fill="#5a3410">· s_root：该 fs 根 dentry</text>
  <text x="732" y="290" font-size="10" fill="#5a3410">· s_type：file_system_type</text>

  <!-- address_space -->
  <rect x="482" y="332" width="210" height="94" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="587" y="354" font-size="11" font-weight="600" fill="#12402a" text-anchor="middle">address_space 页缓存</text>
  <text x="587" y="371" font-size="9" fill="#2f6f4f" text-anchor="middle">fs.h:473</text>
  <text x="498" y="392" font-size="9.5" fill="#12402a">· 该文件缓存的 folio 集合</text>
  <text x="498" y="410" font-size="9.5" fill="#12402a">· a_ops：read_folio/write_begin</text>

  <!-- file_system_type -->
  <rect x="716" y="332" width="256" height="94" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="844" y="354" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">file_system_type（fs.h:2272）</text>
  <text x="732" y="374" font-size="9.5" fill="#5b7db1">· 注册的 fs 类型：ext4 / tmpfs / xfs …</text>
  <text x="732" y="393" font-size="9.5" fill="#5b7db1">· 挂载时 -&gt;mount/get_tree 建 super_block</text>
  <text x="732" y="412" font-size="9.5" fill="#5b7db1">· fill_super 填 s_root</text>

  <g stroke="#c7c7cc" stroke-width="1.6" fill="none">
    <path d="M133,150 L133,182" marker-end="url(#ar)"/>
    <path d="M238,241 L262,241" marker-end="url(#ar)"/>
    <path d="M458,241 L482,241" marker-end="url(#ar)"/>
    <path d="M692,241 L716,241" marker-end="url(#ar)"/>
    <path d="M587,300 L587,332" marker-end="url(#ar)"/>
    <path d="M844,300 L844,332" marker-end="url(#ar)"/>
  </g>
  <text x="133" y="170" font-size="8.5" fill="#a1a1a6">fd → file</text>
  <text x="243" y="235" font-size="8.5" fill="#a1a1a6">f_path</text>
  <text x="461" y="235" font-size="8.5" fill="#a1a1a6">d_inode</text>
  <text x="697" y="235" font-size="8.5" fill="#a1a1a6">i_sb</text>
  <text x="592" y="318" font-size="8.5" fill="#a1a1a6">i_mapping</text>
  <text x="849" y="318" font-size="8.5" fill="#a1a1a6">s_type</text>

  <text x="30" y="444" font-size="9.5" fill="#6e6e73">每个对象挂一组 ops 函数指针表，具体文件系统(ext4/tmpfs…)填自己的实现 → VFS 只调接口，实现多态。</text>
</svg>
