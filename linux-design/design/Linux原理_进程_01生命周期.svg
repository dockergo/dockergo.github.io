<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="470" viewBox="0 0 1000 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">task_struct 生命周期：fork 复制 → (可选)exec 换映像 → 运行 → exit 变僵尸 → wait 回收</text>

  <!-- 主链 5 段 -->
  <!-- fork -->
  <rect x="28" y="72" width="176" height="96" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="116" y="96" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">① fork / clone</text>
  <text x="44" y="120" font-size="9.5" fill="#5b7db1">kernel_clone (fork.c:2669)</text>
  <text x="44" y="138" font-size="10" fill="#5b7db1">copy_process 复制 task_struct</text>
  <text x="44" y="156" font-size="10" fill="#5b7db1">wake_up_new_task 交调度器</text>

  <!-- exec -->
  <rect x="244" y="72" width="176" height="96" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="332" y="96" font-size="12" font-weight="600" fill="#3d2a5a" text-anchor="middle">② exec（可选）</text>
  <text x="260" y="120" font-size="9.5" fill="#7a5aa6">begin_new_exec (exec.c:1091)</text>
  <text x="260" y="138" font-size="10" fill="#7a5aa6">exec_mmap 换全新地址空间</text>
  <text x="260" y="156" font-size="10" fill="#7a5aa6">pid 不变、里面的人换了</text>

  <!-- run -->
  <rect x="460" y="72" width="176" height="96" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="548" y="96" font-size="12" font-weight="600" fill="#12402a" text-anchor="middle">③ 运行 / 睡眠</text>
  <text x="476" y="120" font-size="10" fill="#2f6f4f">被调度器反复选中执行</text>
  <text x="476" y="138" font-size="10" fill="#2f6f4f">RUNNING ⇄ 睡眠态</text>
  <text x="476" y="156" font-size="10" fill="#2f6f4f">（见 进程调度 主线）</text>

  <!-- exit -->
  <rect x="676" y="72" width="140" height="96" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="746" y="96" font-size="12" font-weight="600" fill="#5a3410" text-anchor="middle">④ exit</text>
  <text x="692" y="120" font-size="9.5" fill="#93762e">do_exit (exit.c:896)</text>
  <text x="692" y="138" font-size="10" fill="#93762e">释放 mm/files/fs</text>
  <text x="692" y="156" font-size="10" fill="#93762e">→ 置 EXIT_ZOMBIE</text>

  <!-- wait 回收 -->
  <rect x="840" y="72" width="132" height="96" rx="12" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="906" y="96" font-size="12" font-weight="600" fill="#4a1414" text-anchor="middle">⑤ wait 回收</text>
  <text x="856" y="120" font-size="10" fill="#7a2a2a">父取走退出码</text>
  <text x="856" y="138" font-size="10" fill="#7a2a2a">release_task</text>
  <text x="856" y="156" font-size="9.5" fill="#7a2a2a">(exit.c:244) 销毁</text>

  <g stroke="#c7c7cc" stroke-width="1.6" fill="none">
    <line x1="204" y1="120" x2="244" y2="120" marker-end="url(#ar)"/>
    <line x1="420" y1="120" x2="460" y2="120" marker-end="url(#ar)"/>
    <line x1="636" y1="120" x2="676" y2="120" marker-end="url(#ar)"/>
    <line x1="816" y1="120" x2="840" y2="120" marker-end="url(#ar)"/>
  </g>
  <text x="332" y="66" font-size="9" fill="#a1a1a6" text-anchor="middle">exec 可跳过</text>

  <!-- 状态机 -->
  <rect x="28" y="212" width="620" height="230" rx="13" fill="#fbfbfd" stroke="#ececf1"/>
  <text x="46" y="234" font-size="11.5" font-weight="600" fill="#1d1d1f">__state 状态机（include/linux/sched.h:107）</text>

  <rect x="60" y="256" width="176" height="52" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="148" y="280" font-size="11" font-weight="600" fill="#12402a" text-anchor="middle">TASK_RUNNING (0)</text><text x="148" y="297" font-size="9" fill="#2f6f4f" text-anchor="middle">就绪 / 正在 CPU 上跑</text>

  <rect x="336" y="234" width="256" height="44" rx="10" fill="#f3f7fc" stroke="#cfe0f2"/><text x="464" y="256" font-size="10.5" font-weight="600" fill="#274a78" text-anchor="middle">TASK_INTERRUPTIBLE (1)</text><text x="464" y="271" font-size="9" fill="#5b7db1" text-anchor="middle">可中断睡眠（可被信号唤醒）</text>

  <rect x="336" y="288" width="256" height="44" rx="10" fill="#f3f7fc" stroke="#cfe0f2"/><text x="464" y="310" font-size="10.5" font-weight="600" fill="#274a78" text-anchor="middle">TASK_UNINTERRUPTIBLE (2)</text><text x="464" y="325" font-size="9" fill="#5b7db1" text-anchor="middle">不可中断睡眠（等硬件，信号打不断）</text>

  <rect x="60" y="360" width="176" height="52" rx="10" fill="#fff7e6" stroke="#e8cf9a"/><text x="148" y="384" font-size="10.5" font-weight="600" fill="#5a3410" text-anchor="middle">EXIT_ZOMBIE (0x20)</text><text x="148" y="401" font-size="9" fill="#93762e" text-anchor="middle">已退出、留退出码等 wait</text>

  <rect x="336" y="360" width="256" height="52" rx="10" fill="#fbeaea" stroke="#e7c3c3"/><text x="464" y="384" font-size="10.5" font-weight="600" fill="#4a1414" text-anchor="middle">TASK_DEAD (0x80) / EXIT_DEAD</text><text x="464" y="401" font-size="9" fill="#7a2a2a" text-anchor="middle">do_task_dead 后被 release_task 销毁</text>

  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <path d="M236,272 L336,256" marker-end="url(#ar)"/>
    <path d="M236,290 L336,306" marker-end="url(#ar)"/>
    <path d="M336,266 L250,282" marker-end="url(#ar)"/>
    <path d="M148,308 L148,360" marker-end="url(#ar)"/>
    <path d="M236,386 L336,386" marker-end="url(#ar)"/>
  </g>
  <text x="288" y="248" font-size="9" fill="#a1a1a6" text-anchor="middle">阻塞→睡眠</text>
  <text x="270" y="352" font-size="9" fill="#a1a1a6" text-anchor="middle">唤醒 → RUNNING</text>
  <text x="158" y="340" font-size="9" fill="#a1a1a6">do_exit</text>

  <!-- 进程树 -->
  <rect x="668" y="212" width="304" height="230" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="820" y="234" font-size="11.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">身份与进程树（task_struct 字段）</text>
  <text x="684" y="262" font-size="10.5" fill="#3a3a3c">· pid / tgid：线程 id / 线程组 id (sched.h:1063)</text>
  <text x="684" y="284" font-size="10.5" fill="#3a3a3c">· group_leader：线程组组长 (sched.h:1087)</text>
  <text x="684" y="306" font-size="10.5" fill="#3a3a3c">· real_parent：真实父进程 (sched.h:1077)</text>
  <text x="684" y="328" font-size="10.5" fill="#3a3a3c">· children / sibling：子进程 / 兄弟链</text>
  <text x="684" y="350" font-size="10.5" fill="#3a3a3c">· mm：地址空间 (sched.h:962)</text>
  <line x1="684" y1="366" x2="956" y2="366" stroke="#ececf1"/>
  <text x="684" y="390" font-size="10" fill="#6e6e73">线程 = 同 tgid、共享 mm 的 task_struct</text>
  <text x="684" y="410" font-size="10" fill="#6e6e73">进程 = 独立 mm；父先死则孤儿被</text>
  <text x="684" y="428" font-size="10" fill="#6e6e73">reaper 认领 (find_child_reaper exit.c:598)</text>
</svg>
