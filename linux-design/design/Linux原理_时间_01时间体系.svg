<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="440" viewBox="0 0 1000 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">时间体系：两类硬件（尺 / 闹钟）+ timekeeper 维护单调与墙钟两套时间</text>

  <!-- timekeeper -->
  <rect x="120" y="64" width="300" height="104" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="270" y="88" font-size="11.5" font-weight="600" fill="#12402a" text-anchor="middle">timekeeper · 维护时间（timekeeping.c:50）</text>
  <text x="138" y="112" font-size="10" fill="#2f6f4f">· 单调 CLOCK_MONOTONIC（只增不退）</text>
  <text x="138" y="132" font-size="10" fill="#2f6f4f">· 墙钟 CLOCK_REALTIME（NTP 可调）</text>
  <text x="138" y="152" font-size="10" fill="#2f6f4f">· tk_fast：NMI 安全无锁读快照</text>

  <!-- consumers tick/timer -->
  <rect x="580" y="64" width="300" height="104" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="730" y="88" font-size="11.5" font-weight="600" fill="#274a78" text-anchor="middle">节拍 tick / 定时器到期</text>
  <text x="598" y="112" font-size="10" fill="#5b7db1">· 周期 tick / 无节拍下用 hrtimer</text>
  <text x="598" y="132" font-size="10" fill="#5b7db1">· 推进 jiffies、驱动调度节拍</text>
  <text x="598" y="152" font-size="10" fill="#5b7db1">· 低精度 timer wheel + 高精度 hrtimer</text>

  <!-- clocksource -->
  <rect x="120" y="204" width="300" height="104" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="270" y="228" font-size="11.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">clocksource · 时钟源（尺）</text>
  <text x="138" y="250" font-size="9.5" fill="#5b7db1">include/linux/clocksource.h:98</text>
  <text x="138" y="272" font-size="10" fill="#5b7db1">· read 读单调计数 →（mult/shift）ns</text>
  <text x="138" y="292" font-size="10" fill="#5b7db1">· rating 越高越优先被选中</text>

  <!-- clock_event -->
  <rect x="580" y="204" width="300" height="104" rx="12" fill="#f4eefb" stroke="#dcc9ef" filter="url(#soft)"/>
  <text x="730" y="228" font-size="11.5" font-weight="600" fill="#4a2c6b" text-anchor="middle">clock_event_device · 时钟事件（闹钟）</text>
  <text x="598" y="250" font-size="9.5" fill="#8a6db0">include/linux/clockchips.h:103</text>
  <text x="598" y="272" font-size="10" fill="#8a6db0">· set_next_event 设下一次中断时刻</text>
  <text x="598" y="292" font-size="10" fill="#8a6db0">· PERIODIC 周期 / ONESHOT 单次</text>

  <!-- hardware -->
  <rect x="250" y="352" width="500" height="60" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="500" y="378" font-size="11.5" font-weight="600" fill="#5a3410" text-anchor="middle">计时硬件（产生计数 / 触发中断的物理器件）</text>
  <text x="500" y="398" font-size="10" fill="#93762e" text-anchor="middle">TSC · HPET · LAPIC timer · arch generic timer</text>

  <!-- arrows -->
  <g stroke="#c7c7cc" stroke-width="1.6" fill="none">
    <path d="M400,352 L270,352 L270,308" marker-end="url(#ar)"/>
    <path d="M600,352 L730,352 L730,308" marker-end="url(#ar)"/>
    <line x1="270" y1="204" x2="270" y2="168" marker-end="url(#ar)"/>
    <line x1="730" y1="204" x2="730" y2="168" marker-end="url(#ar)"/>
  </g>
  <text x="286" y="192" font-size="9" fill="#a1a1a6">读时间</text>
  <text x="746" y="192" font-size="9" fill="#a1a1a6">等到点</text>
  <text x="500" y="432" font-size="10" fill="#a1a1a6" text-anchor="middle">读时间用 clocksource（尺），等到点用 clock_event（闹钟）——两者职责正交，常由不同硬件承担</text>
</svg>
