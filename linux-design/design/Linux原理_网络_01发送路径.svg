<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="470" viewBox="0 0 1000 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">发送路径：进程上下文同步下推 —— sendmsg 一路加头到驱动</text>

  <!-- 竖向协议栈 分层 -->
  <!-- L: socket -->
  <rect x="60" y="66" width="300" height="60" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="210" y="90" font-size="12" font-weight="600" fill="#3d2a5a" text-anchor="middle">① socket 系统调用</text>
  <text x="210" y="110" font-size="9.5" fill="#7a5aa6" text-anchor="middle">sendto/sendmsg → sock_sendmsg (socket.c:813)</text>

  <rect x="60" y="146" width="300" height="66" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="210" y="170" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">② TCP 层</text>
  <text x="210" y="189" font-size="9.5" fill="#5b7db1" text-anchor="middle">tcp_sendmsg_locked (tcp.c:1117)：拷数据、按 MSS 分段</text>
  <text x="210" y="205" font-size="9.5" fill="#5b7db1" text-anchor="middle">加 TCP 头 → tcp_push (tcp.c:741) → tcp_write_xmit</text>

  <rect x="60" y="232" width="300" height="60" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="210" y="256" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">③ IP 层</text>
  <text x="210" y="276" font-size="9.5" fill="#5b7db1" text-anchor="middle">路由查表、加 IP 头 → 交设备发送</text>

  <rect x="60" y="312" width="300" height="60" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="210" y="336" font-size="12" font-weight="600" fill="#5a3410" text-anchor="middle">④ __dev_queue_xmit (dev.c:4766)</text>
  <text x="210" y="356" font-size="9.5" fill="#93762e" text-anchor="middle">进入设备发送入口</text>

  <g stroke="#c7c7cc" stroke-width="1.6" fill="none">
    <line x1="210" y1="126" x2="210" y2="146" marker-end="url(#ar)"/>
    <line x1="210" y1="212" x2="210" y2="232" marker-end="url(#ar)"/>
    <line x1="210" y1="292" x2="210" y2="312" marker-end="url(#ar)"/>
  </g>

  <!-- 右：qdisc 排队 + 驱动 -->
  <rect x="470" y="146" width="470" height="150" rx="13" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="705" y="168" font-size="11.5" font-weight="600" fill="#5a3410" text-anchor="middle">排队规则 qdisc（流量整形 / 优先级 / 限速在此）</text>

  <rect x="494" y="186" width="190" height="88" rx="10" fill="#ffffff" stroke="#ececf1"/><text x="589" y="208" font-size="10.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">q->enqueue 入队</text><text x="589" y="228" font-size="9" fill="#6e6e73" text-anchor="middle">dev_qdisc_enqueue</text><text x="589" y="244" font-size="9" fill="#6e6e73" text-anchor="middle">(dev.c:4168)</text><text x="589" y="262" font-size="9" fill="#6e6e73" text-anchor="middle">有 qdisc 时排队</text>

  <rect x="712" y="186" width="204" height="88" rx="10" fill="#ffffff" stroke="#ececf1"/><text x="814" y="208" font-size="10.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">__qdisc_run 出队</text><text x="814" y="228" font-size="9" fill="#6e6e73" text-anchor="middle">(dev.c:4202) 择机取出</text><text x="814" y="248" font-size="9" fill="#6e6e73" text-anchor="middle">→ dev_hard_start_xmit</text><text x="814" y="264" font-size="9" fill="#6e6e73" text-anchor="middle">(dev.c:3894)</text>
  <path d="M684,230 L712,230" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M360,342 L420,342 L420,230 L470,230" stroke="#c7c7cc" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>

  <!-- 驱动 -->
  <rect x="470" y="316" width="470" height="60" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="705" y="340" font-size="12" font-weight="600" fill="#12402a" text-anchor="middle">⑤ 驱动 ndo_start_xmit → 网卡</text>
  <text x="705" y="360" font-size="9.5" fill="#2f6f4f" text-anchor="middle">DMA 发出；发送方主动驱动整链，到此交硬件</text>
  <path d="M705,296 L705,316" stroke="#c7c7cc" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>

  <!-- 底部注释 -->
  <rect x="60" y="402" width="880" height="48" rx="11" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="76" y="424" font-size="10" fill="#3a3a3c">同一个 sk_buff 自上而下逐层 skb_push 加头（TCP 头 → IP 头 → 以太头），不拷贝负载；</text>
  <text x="76" y="440" font-size="10" fill="#3a3a3c">全程运行在发送进程的上下文中（同步），直到驱动接手后返回用户态。</text>
</svg>
