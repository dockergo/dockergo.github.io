<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="460" viewBox="0 0 1000 460" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="460" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">退出与回收：do_exit 释放资源 → 变僵尸留退出信息 → 父进程 wait 后 release_task 销毁（孤儿归 reaper）</text>

  <!-- Band1: 退出流水线 -->
  <rect x="28" y="62" width="214" height="92" rx="12" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="135" y="86" font-size="11.5" font-weight="600" fill="#4a1414" text-anchor="middle">退出触发</text>
  <text x="44" y="110" font-size="10" fill="#7a2a2a">exit() / exit_group</text>
  <text x="44" y="132" font-size="10" fill="#7a2a2a">被 kill / 致命信号(SIGKILL)</text>

  <rect x="262" y="62" width="224" height="92" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="374" y="86" font-size="11.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">do_exit</text>
  <text x="278" y="106" font-size="9.5" fill="#5b7db1">exit.c:896</text>
  <text x="278" y="128" font-size="10" fill="#5b7db1">exit_mm(:964) 归还地址空间</text>
  <text x="278" y="148" font-size="10" fill="#5b7db1">exit_files/fs/sem 释放资源</text>

  <rect x="506" y="62" width="234" height="92" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="623" y="86" font-size="11.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">exit_notify</text>
  <text x="522" y="106" font-size="9.5" fill="#5b7db1">exit.c:988</text>
  <text x="522" y="128" font-size="10" fill="#5b7db1">置 EXIT_ZOMBIE (:750)</text>
  <text x="522" y="148" font-size="10" fill="#5b7db1">do_notify_parent → SIGCHLD</text>

  <rect x="760" y="62" width="212" height="92" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="866" y="86" font-size="11.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">do_task_dead</text>
  <text x="776" y="106" font-size="9.5" fill="#5b7db1">exit.c:1019</text>
  <text x="776" y="128" font-size="10" fill="#5b7db1">置 TASK_DEAD</text>
  <text x="776" y="148" font-size="10" fill="#5b7db1">__schedule 永不返回</text>

  <g stroke="#c7c7cc" stroke-width="1.6" fill="none">
    <line x1="242" y1="108" x2="262" y2="108" marker-end="url(#ar)"/>
    <line x1="486" y1="108" x2="506" y2="108" marker-end="url(#ar)"/>
    <line x1="740" y1="108" x2="760" y2="108" marker-end="url(#ar)"/>
  </g>

  <!-- 僵尸节点 -->
  <rect x="380" y="178" width="240" height="92" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="500" y="200" font-size="11.5" font-weight="600" fill="#5a3410" text-anchor="middle">EXIT_ZOMBIE · 僵尸态</text>
  <text x="396" y="224" font-size="10" fill="#93762e">· 资源大多已释放</text>
  <text x="396" y="244" font-size="10" fill="#93762e">· 仅留退出码 / 运行统计</text>
  <text x="396" y="264" font-size="10" fill="#93762e">· 占 task_struct + pid 槽</text>
  <path d="M623,154 L623,166 L500,166 L500,178" stroke="#c7c7cc" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>
  <text x="560" y="162" font-size="9" fill="#8a8a8e" text-anchor="middle">置僵尸</text>

  <!-- 分支箭头 -->
  <path d="M430,270 L430,290 L259,290 L259,300" stroke="#c7c7cc" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>
  <text x="345" y="286" font-size="9.5" fill="#2f6f4f" text-anchor="middle">父进程在：wait 回收</text>
  <path d="M570,270 L570,290 L743,290 L743,300" stroke="#c7c7cc" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>
  <text x="656" y="286" font-size="9.5" fill="#6b4b96" text-anchor="middle">父先死：reaper 认领</text>

  <!-- 左：wait 回收 -->
  <rect x="44" y="300" width="430" height="56" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="60" y="322" font-size="11" font-weight="600" fill="#1b2a4a">父进程 do_wait（exit.c:1711）</text>
  <text x="60" y="342" font-size="9.5" fill="#5b7db1">→ wait_task_zombie (:1174)：取走退出码与 rusage</text>

  <rect x="44" y="372" width="430" height="56" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="60" y="394" font-size="11" font-weight="600" fill="#12402a">release_task（exit.c:244）</text>
  <text x="60" y="414" font-size="9.5" fill="#2f6f4f">解链 pid、释放 task_struct → 僵尸彻底消失</text>

  <line x1="259" y1="356" x2="259" y2="372" stroke="#c7c7cc" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>

  <!-- 右：孤儿 reaper -->
  <rect x="528" y="300" width="430" height="56" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="544" y="322" font-size="11" font-weight="600" fill="#3f2a63">孤儿：find_child_reaper (:598) / find_new_reaper (:637)</text>
  <text x="544" y="342" font-size="9.5" fill="#6b4b96">父先死时为子进程重新指定收养者</text>

  <rect x="528" y="372" width="430" height="56" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="544" y="394" font-size="11" font-weight="600" fill="#1d1d1f">认领顺序</text>
  <text x="544" y="414" font-size="9.5" fill="#3a3a3c">① 同组存活线程 → ② child_subreaper(如 systemd) → ③ init(PID 1)</text>

  <line x1="743" y1="356" x2="743" y2="372" stroke="#c7c7cc" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>

  <text x="30" y="448" font-size="10.5" fill="#3a3a3c">要点：僵尸是设计而非泄漏——退出信息须留到父进程 wait 取走；kill 僵尸无效，问题在不 wait 的父进程。</text>
</svg>
