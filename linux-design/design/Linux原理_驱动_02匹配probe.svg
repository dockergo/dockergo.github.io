<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">probe 双向撮合：新设备遍历驱动 / 新驱动遍历设备，共汇 match → really_probe → 绑定</text>

  <!-- new device -->
  <rect x="40" y="60" width="300" height="80" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="190" y="82" font-size="11.5" font-weight="600" fill="#5a3410" text-anchor="middle">新设备到达（枚举 / 热插拔）</text>
  <text x="56" y="104" font-size="9.5" fill="#93762e">bus_add_device（bus.c:545）→ bus_probe_device（:612）</text>
  <text x="56" y="126" font-size="9.5" fill="#93762e">→ device_attach（dd.c:1142）：遍历本总线所有驱动</text>

  <!-- new driver -->
  <rect x="660" y="60" width="300" height="80" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="810" y="82" font-size="11.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">新驱动注册（模块加载）</text>
  <text x="676" y="104" font-size="9.5" fill="#5b7db1">driver_register（driver.c:225）→ bus_add_driver（:249）</text>
  <text x="676" y="126" font-size="9.5" fill="#5b7db1">→ driver_attach → bus_for_each_dev(dd.c:1313)：遍历设备</text>

  <!-- bus -->
  <rect x="330" y="170" width="340" height="96" rx="12" fill="#f4eefb" stroke="#dcc9ef" filter="url(#soft)"/>
  <text x="500" y="192" font-size="11.5" font-weight="600" fill="#4a2c6b" text-anchor="middle">总线 bus_type（bus.h:83）· 媒人</text>
  <rect x="346" y="206" width="150" height="44" rx="9" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="421" y="232" font-size="10" font-weight="600" fill="#5a3410" text-anchor="middle">devices 链表</text>
  <rect x="504" y="206" width="150" height="44" rx="9" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="579" y="232" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">drivers 链表</text>

  <!-- match -->
  <rect x="350" y="296" width="300" height="52" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="500" y="318" font-size="11" font-weight="600" fill="#12402a" text-anchor="middle">driver_match_device（base.h:188）</text>
  <text x="500" y="338" font-size="9.5" fill="#2f6f4f" text-anchor="middle">调 bus-&gt;match(dev, drv) 判定配对（无 match 则默认匹配）</text>

  <!-- really_probe -->
  <rect x="330" y="366" width="340" height="54" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="500" y="388" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">really_probe（dd.c:655）</text>
  <text x="500" y="408" font-size="9.5" fill="#5b7db1" text-anchor="middle">call_driver_probe：优先 bus-&gt;probe(dd.c:628)，否则 drv-&gt;probe(:631)</text>

  <!-- bound -->
  <rect x="350" y="438" width="300" height="50" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="500" y="459" font-size="11" font-weight="600" fill="#12402a" text-anchor="middle">绑定成功：device ↔ driver 互指</text>
  <text x="500" y="478" font-size="9" fill="#2f6f4f" text-anchor="middle">probe 内初始化硬件 / 注册中断 / 建设备节点</text>

  <!-- left note -->
  <rect x="40" y="300" width="250" height="96" rx="11" fill="#fbfbfd" stroke="#ececf1"/>
  <text x="56" y="322" font-size="10.5" font-weight="600" fill="#1d1d1f">为何双向？</text>
  <text x="56" y="344" font-size="9.5" fill="#6e6e73">· 设备与驱动解耦，谁先到不定</text>
  <text x="56" y="366" font-size="9.5" fill="#6e6e73">· 故两侧都遍历对方试配</text>
  <text x="56" y="388" font-size="9.5" fill="#6e6e73">· 任意到达次序都能绑定</text>

  <!-- right note -->
  <rect x="710" y="300" width="250" height="118" rx="11" fill="#fbfbfd" stroke="#ececf1"/>
  <text x="726" y="322" font-size="10.5" font-weight="600" fill="#1d1d1f">热插拔闭环</text>
  <text x="726" y="344" font-size="9.5" fill="#6e6e73">· 插拔/probe 经 kset 上报 uevent</text>
  <text x="726" y="366" font-size="9.5" fill="#6e6e73">· udev 建 /dev 节点、按需 modprobe</text>
  <text x="726" y="388" font-size="9.5" fill="#6e6e73">· 加载模块 → driver_register</text>
  <text x="726" y="410" font-size="9.5" fill="#6e6e73">  → 回到“新驱动”那条路</text>

  <!-- arrows -->
  <g stroke="#c7c7cc" stroke-width="1.6" fill="none">
    <path d="M190,140 L190,156 L421,156 L421,206" marker-end="url(#ar)"/>
    <path d="M810,140 L810,156 L579,156 L579,206" marker-end="url(#ar)"/>
    <line x1="500" y1="266" x2="500" y2="296" marker-end="url(#ar)"/>
    <line x1="500" y1="348" x2="500" y2="366" marker-end="url(#ar)"/>
    <line x1="500" y1="420" x2="500" y2="438" marker-end="url(#ar)"/>
  </g>
  <text x="196" y="150" font-size="9" fill="#a1a1a6">挂 devices，遍历 drivers 试配</text>
  <text x="804" y="150" font-size="9" fill="#a1a1a6" text-anchor="end">挂 drivers，遍历 devices 试配</text>
</svg>
