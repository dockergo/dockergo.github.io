<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="452" viewBox="0 0 1000 452" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="1000" height="452" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">接触面 × 能力域 依赖热力图：一个系统调用横跨多条能力域主线 —— 故按"能力域"而非目录理解</text>

  <!-- 列头(11 能力域) -->
  <g font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">
    <text x="234" y="80">调度</text><text x="302" y="80">进程</text><text x="370" y="80">内存</text><text x="438" y="80">文件</text><text x="506" y="80">块层</text><text x="574" y="80">驱动</text><text x="642" y="80">时间</text><text x="710" y="80">网络</text><text x="778" y="80">中断</text><text x="846" y="80">同步</text><text x="914" y="80">隔离</text>
  </g>

  <!-- 有色格子（深=核心经手 #bcd0ec，浅=间接 #eef3fb），格 68×40，网格 x0=200 y0=88 -->
  <g stroke="#ececf1">
    <!-- read 文件 (row0 y88): 调度1 内存2 文件2 块层1 驱动1 -->
    <rect x="200" y="88" width="68" height="40" fill="#eef3fb"/><rect x="336" y="88" width="68" height="40" fill="#bcd0ec"/><rect x="404" y="88" width="68" height="40" fill="#bcd0ec"/><rect x="472" y="88" width="68" height="40" fill="#eef3fb"/><rect x="540" y="88" width="68" height="40" fill="#eef3fb"/>
    <!-- mmap (row1 y128): 内存2 文件1 块层1 -->
    <rect x="336" y="128" width="68" height="40" fill="#bcd0ec"/><rect x="404" y="128" width="68" height="40" fill="#eef3fb"/><rect x="472" y="128" width="68" height="40" fill="#eef3fb"/>
    <!-- sendmsg (row2 y168): 内存1 驱动1 网络2 中断1 -->
    <rect x="336" y="168" width="68" height="40" fill="#eef3fb"/><rect x="540" y="168" width="68" height="40" fill="#eef3fb"/><rect x="676" y="168" width="68" height="40" fill="#bcd0ec"/><rect x="744" y="168" width="68" height="40" fill="#eef3fb"/>
    <!-- fork (row3 y208): 调度1 进程2 内存2 隔离1 -->
    <rect x="200" y="208" width="68" height="40" fill="#eef3fb"/><rect x="268" y="208" width="68" height="40" fill="#bcd0ec"/><rect x="336" y="208" width="68" height="40" fill="#bcd0ec"/><rect x="880" y="208" width="68" height="40" fill="#eef3fb"/>
    <!-- exec (row4 y248): 进程2 内存2 文件1 -->
    <rect x="268" y="248" width="68" height="40" fill="#bcd0ec"/><rect x="336" y="248" width="68" height="40" fill="#bcd0ec"/><rect x="404" y="248" width="68" height="40" fill="#eef3fb"/>
    <!-- nanosleep (row5 y288): 调度2 时间2 -->
    <rect x="200" y="288" width="68" height="40" fill="#bcd0ec"/><rect x="608" y="288" width="68" height="40" fill="#bcd0ec"/>
    <!-- ioctl 设备 (row6 y328): 文件1 驱动2 -->
    <rect x="404" y="328" width="68" height="40" fill="#eef3fb"/><rect x="540" y="328" width="68" height="40" fill="#bcd0ec"/>
    <!-- futex (row7 y368): 调度1 进程1 同步2 -->
    <rect x="200" y="368" width="68" height="40" fill="#eef3fb"/><rect x="268" y="368" width="68" height="40" fill="#eef3fb"/><rect x="812" y="368" width="68" height="40" fill="#bcd0ec"/>
  </g>

  <!-- 网格线 -->
  <g stroke="#e6e6ea" stroke-width="1">
    <line x1="200" y1="88" x2="948" y2="88"/><line x1="200" y1="128" x2="948" y2="128"/><line x1="200" y1="168" x2="948" y2="168"/><line x1="200" y1="208" x2="948" y2="208"/><line x1="200" y1="248" x2="948" y2="248"/><line x1="200" y1="288" x2="948" y2="288"/><line x1="200" y1="328" x2="948" y2="328"/><line x1="200" y1="368" x2="948" y2="368"/><line x1="200" y1="408" x2="948" y2="408"/>
    <line x1="200" y1="88" x2="200" y2="408"/><line x1="268" y1="88" x2="268" y2="408"/><line x1="336" y1="88" x2="336" y2="408"/><line x1="404" y1="88" x2="404" y2="408"/><line x1="472" y1="88" x2="472" y2="408"/><line x1="540" y1="88" x2="540" y2="408"/><line x1="608" y1="88" x2="608" y2="408"/><line x1="676" y1="88" x2="676" y2="408"/><line x1="744" y1="88" x2="744" y2="408"/><line x1="812" y1="88" x2="812" y2="408"/><line x1="880" y1="88" x2="880" y2="408"/><line x1="948" y1="88" x2="948" y2="408"/>
  </g>

  <!-- 行头 -->
  <g font-size="10.5" fill="#3a3a3c" text-anchor="start">
    <text x="34" y="112">read 文件</text><text x="34" y="152">mmap 映射</text><text x="34" y="192">sendmsg 收发</text><text x="34" y="232">fork 创建</text><text x="34" y="272">exec 换映像</text><text x="34" y="312">nanosleep 睡眠</text><text x="34" y="352">ioctl 设备</text><text x="34" y="392">futex 加锁</text>
  </g>

  <!-- 图例 -->
  <rect x="200" y="424" width="16" height="14" fill="#bcd0ec" stroke="#ececf1"/><text x="222" y="435" font-size="10" fill="#6e6e73">核心经手</text>
  <rect x="300" y="424" width="16" height="14" fill="#eef3fb" stroke="#ececf1"/><text x="322" y="435" font-size="10" fill="#6e6e73">间接经手</text>
  <rect x="400" y="424" width="16" height="14" fill="#fbfbfd" stroke="#ececf1"/><text x="422" y="435" font-size="10" fill="#6e6e73">不经手</text>
  <text x="520" y="435" font-size="10" fill="#a1a1a6">每行一个系统调用横向点亮多列 → 说明"按能力域归位、而非按 kernel/mm/fs 目录"</text>
</svg>
