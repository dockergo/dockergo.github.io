<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="540" viewBox="0 0 1060 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1060" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">mq-deadline 决策：每个 request 同挂「扇区红黑树 + 到期 FIFO」双结构，__dd_dispatch_request 按批处理/换向/超时抢占选下一个派发</text>

  <!-- 常量带 -->
  <rect x="28" y="52" width="186" height="30" rx="9" fill="#f4eefb" stroke="#d9c7ec"/><text x="121" y="71" font-size="9" fill="#3d2a5a" text-anchor="middle">read_expire = HZ/2（500ms，:30）</text>
  <rect x="228" y="52" width="186" height="30" rx="9" fill="#f4eefb" stroke="#d9c7ec"/><text x="321" y="71" font-size="9" fill="#3d2a5a" text-anchor="middle">write_expire = 5*HZ（5s，:31）</text>
  <rect x="428" y="52" width="186" height="30" rx="9" fill="#f4eefb" stroke="#d9c7ec"/><text x="521" y="71" font-size="9" fill="#3d2a5a" text-anchor="middle">writes_starved = 2（:37）</text>
  <rect x="628" y="52" width="186" height="30" rx="9" fill="#f4eefb" stroke="#d9c7ec"/><text x="721" y="71" font-size="9" fill="#3d2a5a" text-anchor="middle">fifo_batch = 16（:38）</text>
  <rect x="828" y="52" width="204" height="30" rx="9" fill="#f4eefb" stroke="#d9c7ec"/><text x="930" y="71" font-size="9" fill="#3d2a5a" text-anchor="middle">prio_aging_expire = 10*HZ（:36）</text>

  <!-- 左：双结构 -->
  <rect x="28" y="100" width="372" height="336" rx="13" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="44" y="122" font-size="11" font-weight="600" fill="#5a3410">dd_per_prio（mq-deadline.c:73）· 每优先级两套结构</text>
  <text x="44" y="139" font-size="9" fill="#93762e">同一个 request 同时挂在红黑树与 FIFO 里</text>

  <rect x="44" y="152" width="340" height="126" rx="11" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="60" y="173" font-size="10.5" font-weight="600" fill="#1d1d1f">sort_list[READ] / [WRITE] · 红黑树（:74）</text>
  <text x="60" y="189" font-size="9" fill="#6e6e73">按扇区 blk_rq_pos 排序</text>
  <rect x="182" y="198" width="70" height="24" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="217" y="214" font-size="8.5" fill="#1b2a4a" text-anchor="middle">sec 800</text>
  <rect x="112" y="234" width="66" height="22" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="145" y="249" font-size="8.5" fill="#1b2a4a" text-anchor="middle">sec 200</text>
  <rect x="258" y="234" width="70" height="22" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="293" y="249" font-size="8.5" fill="#1b2a4a" text-anchor="middle">sec 1500</text>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none"><path d="M205,222 L150,234"/><path d="M230,222 L288,234"/></g>
  <text x="60" y="272" font-size="8.5" fill="#a1a1a6">用途：相邻请求合并 + 顺序批处理（电梯），减寻道</text>

  <rect x="44" y="290" width="340" height="126" rx="11" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="60" y="311" font-size="10.5" font-weight="600" fill="#1d1d1f">fifo_list[READ] / [WRITE] · FIFO 链（:75）</text>
  <text x="60" y="327" font-size="9" fill="#6e6e73">按到达时间排序，队首 = 最早到达</text>
  <rect x="60" y="336" width="90" height="30" rx="7" fill="#fbeaea" stroke="#e7c3c3"/><text x="105" y="355" font-size="8.5" fill="#4a1414" text-anchor="middle">队首（最早）</text>
  <rect x="164" y="336" width="90" height="30" rx="7" fill="#fdf6ea" stroke="#efdcb4"/><text x="209" y="355" font-size="8.5" fill="#5a3410" text-anchor="middle">…</text>
  <rect x="268" y="336" width="100" height="30" rx="7" fill="#fdf6ea" stroke="#efdcb4"/><text x="318" y="355" font-size="8.5" fill="#5a3410" text-anchor="middle">队尾（最晚）</text>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none"><path d="M150,351 L164,351" marker-end="url(#ar)"/><path d="M254,351 L268,351" marker-end="url(#ar)"/></g>
  <text x="60" y="384" font-size="8.5" fill="#a1a1a6">deadline = 入队时刻 + read/write_expire</text>
  <text x="60" y="400" font-size="8.5" fill="#a1a1a6">用途：超时保护，防某请求被排序无限推迟</text>

  <!-- 右：决策流 -->
  <rect x="440" y="100" width="592" height="34" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="736" y="121" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">入口 dd_dispatch_request（:452）→ __dd_dispatch_request（:325）</text>

  <rect x="440" y="150" width="592" height="56" rx="11" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="456" y="171" font-size="10.5" font-weight="600" fill="#1d1d1f">① 批处理未满？batching &lt; fifo_batch(16) 且当前方向有下一顺序请求（:338）</text>
  <text x="456" y="192" font-size="9" fill="#6e6e73">→ deadline_next_request 沿红黑树按扇序连续取 → 直接派发（顺序 IO，省寻道）</text>

  <rect x="440" y="224" width="592" height="56" rx="11" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="456" y="245" font-size="10.5" font-weight="600" fill="#1d1d1f">② 批结束 / 换向：选方向 —— 优先 READ（同步、更敏感，:349）</text>
  <text x="456" y="266" font-size="9" fill="#6e6e73">→ 若 WRITE 已被饿 starved ≥ writes_starved(2)，则轮到 WRITE（dispatch_writes，:352）</text>

  <rect x="440" y="298" width="592" height="66" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="456" y="319" font-size="10.5" font-weight="600" fill="#5a3410">③ 选定方向内查 FIFO 队首：deadline_check_fifo（:260）</text>
  <text x="456" y="339" font-size="9" fill="#93762e">· 队首 deadline 已过 → 取这个最早超时请求（抢占排序，防无限推迟）</text>
  <text x="456" y="357" font-size="9" fill="#93762e">· 否则沿红黑树接着按扇序取下一个（继续顺序批处理）</text>

  <rect x="440" y="382" width="592" height="46" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="736" y="409" font-size="10.5" font-weight="600" fill="#12402a" text-anchor="middle">④ deadline_move_request → dd_start_request 派发（:412）；batching++</text>

  <rect x="440" y="444" width="592" height="58" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="456" y="465" font-size="10" font-weight="600" fill="#274a78">跨优先级防压制：dd_dispatch_prio_aged_requests（:420）</text>
  <text x="456" y="486" font-size="9" fill="#5b7db1">低优先级请求等待超 prio_aging_expire(10*HZ) 也强制派发，防高优先级永久压制低优先级。</text>

  <!-- 结构 → 决策 引用箭头 -->
  <g stroke="#c7c7cc" stroke-width="1.6" fill="none">
    <path d="M400,178 L440,178" marker-end="url(#ar)"/>
    <path d="M400,331 L420,331 L420,331 L440,331" marker-end="url(#ar)"/>
    <path d="M736,206 L736,224" marker-end="url(#ar)"/>
    <path d="M736,280 L736,298" marker-end="url(#ar)"/>
    <path d="M736,364 L736,382" marker-end="url(#ar)"/>
  </g>
  <text x="402" y="170" font-size="8" fill="#a1a1a6">扇序批处理</text>
  <text x="402" y="323" font-size="8" fill="#a1a1a6">超时抢占</text>
</svg>
