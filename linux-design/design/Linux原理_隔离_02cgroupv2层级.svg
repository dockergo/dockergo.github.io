<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="420" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">cgroup v2：统一单一层级（一棵树） + 控制器挂到各能力域</text>

  <!-- 左：统一层级树 -->
  <rect x="28" y="56" width="456" height="344" rx="13" fill="#fbfbfd" stroke="#ececf1"/>
  <text x="44" y="78" font-size="11.5" font-weight="600" fill="#1d1d1f">统一层级：全系统一棵树 cgrp_dfl_root</text>

  <rect x="130" y="92" width="252" height="52" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="256" y="112" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">/  （统一层级根）</text>
  <text x="256" y="130" font-size="8.5" fill="#5b7db1" text-anchor="middle">cgroup.subtree_control: +cpu +memory +io</text>

  <rect x="52" y="188" width="200" height="52" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="152" y="208" font-size="10.5" font-weight="600" fill="#12402a" text-anchor="middle">/service</text>
  <text x="152" y="226" font-size="8.5" fill="#2f6f4f" text-anchor="middle">memory.max = 4G</text>

  <rect x="286" y="188" width="180" height="52" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="376" y="208" font-size="10.5" font-weight="600" fill="#12402a" text-anchor="middle">/batch</text>
  <text x="376" y="226" font-size="8.5" fill="#2f6f4f" text-anchor="middle">cpu.weight = 50</text>

  <rect x="44" y="286" width="120" height="52" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="104" y="306" font-size="10" font-weight="600" fill="#1d1d1f" text-anchor="middle">/service/web</text>
  <text x="104" y="324" font-size="8.5" fill="#6e6e73" text-anchor="middle">继承父限额</text>

  <rect x="180" y="286" width="188" height="52" rx="10" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="274" y="306" font-size="10" font-weight="600" fill="#5a3410" text-anchor="middle">/service/db</text>
  <text x="274" y="324" font-size="8.5" fill="#93762e" text-anchor="middle">memory.max = 2G（≤ 父 4G）</text>

  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <path d="M256,144 L256,166 L152,166 L152,188" marker-end="url(#ar)"/>
    <path d="M256,144 L256,166 L376,166 L376,188" marker-end="url(#ar)"/>
    <path d="M152,240 L152,262 L104,262 L104,286" marker-end="url(#ar)"/>
    <path d="M152,240 L152,262 L274,262 L274,286" marker-end="url(#ar)"/>
  </g>
  <text x="300" y="162" font-size="8.5" fill="#a1a1a6">subtree_control 下发控制器给子组</text>
  <text x="60" y="368" font-size="9" fill="#6e6e73">进程写 cgroup.procs 入组 · 父组限额 = 子组天花板（自上而下配额）</text>

  <!-- 右：控制器 → 能力域 -->
  <rect x="512" y="56" width="460" height="344" rx="13" fill="#fbfbfd" stroke="#ececf1"/>
  <text x="528" y="78" font-size="11.5" font-weight="600" fill="#1d1d1f">控制器把"记账 + 限额"挂到对应能力域</text>

  <g>
    <rect x="528" y="96" width="150" height="48" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="603" y="118" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">cpu / cpuset</text><text x="603" y="134" font-size="8.5" fill="#5b7db1" text-anchor="middle">cpu.max / weight</text>
    <rect x="740" y="96" width="216" height="48" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="848" y="118" font-size="10.5" font-weight="600" fill="#12402a" text-anchor="middle">调度</text><text x="848" y="134" font-size="8.5" fill="#2f6f4f" text-anchor="middle">组调度 + EEVDF 带宽 throttle</text>

    <rect x="528" y="156" width="150" height="48" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="603" y="178" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">memory</text><text x="603" y="194" font-size="8.5" fill="#5b7db1" text-anchor="middle">memory.max/high</text>
    <rect x="740" y="156" width="216" height="48" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="848" y="178" font-size="10.5" font-weight="600" fill="#12402a" text-anchor="middle">虚拟内存</text><text x="848" y="194" font-size="8.5" fill="#2f6f4f" text-anchor="middle">memcg 记账与回收</text>

    <rect x="528" y="216" width="150" height="48" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="603" y="238" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">io</text><text x="603" y="254" font-size="8.5" fill="#5b7db1" text-anchor="middle">io.max</text>
    <rect x="740" y="216" width="216" height="48" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="848" y="238" font-size="10.5" font-weight="600" fill="#12402a" text-anchor="middle">块层</text><text x="848" y="254" font-size="8.5" fill="#2f6f4f" text-anchor="middle">blkio 限速</text>

    <rect x="528" y="276" width="150" height="48" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="603" y="298" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">pids</text><text x="603" y="314" font-size="8.5" fill="#5b7db1" text-anchor="middle">pids.max</text>
    <rect x="740" y="276" width="216" height="48" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="848" y="298" font-size="10.5" font-weight="600" fill="#12402a" text-anchor="middle">进程与任务管理</text><text x="848" y="314" font-size="8.5" fill="#2f6f4f" text-anchor="middle">限进程 / 线程数</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="678" y1="120" x2="740" y2="120" marker-end="url(#ar)"/>
    <line x1="678" y1="180" x2="740" y2="180" marker-end="url(#ar)"/>
    <line x1="678" y1="240" x2="740" y2="240" marker-end="url(#ar)"/>
    <line x1="678" y1="300" x2="740" y2="300" marker-end="url(#ar)"/>
  </g>
  <text x="528" y="352" font-size="9" fill="#6e6e73">控制器列表见 cgroup_subsys.h：还有 hugetlb / rdma / misc / freezer …</text>
</svg>
