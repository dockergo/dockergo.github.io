<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="430" viewBox="0 0 1000 430" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="430" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">一次调度切换：触发 → __schedule → pick_next_task → context_switch</text>

  <!-- 触发 -->
  <rect x="28" y="78" width="180" height="120" rx="12" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="118" y="100" font-size="11.5" font-weight="600" fill="#4a1414" text-anchor="middle">切换触发（三类）</text>
  <text x="44" y="126" font-size="10" fill="#7a2a2a">· 主动阻塞（等 IO/锁）</text>
  <text x="44" y="150" font-size="10" fill="#7a2a2a">· 时间片耗尽 / 被唤醒抢占</text>
  <text x="44" y="168" font-size="10" fill="#7a2a2a">  （need_resched 置位）</text>
  <text x="44" y="190" font-size="10" fill="#7a2a2a">· 显式让出</text>

  <!-- __schedule -->
  <rect x="248" y="78" width="200" height="120" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="348" y="100" font-size="11.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">__schedule</text>
  <text x="264" y="124" font-size="9.5" fill="#5b7db1">core.c:7023</text>
  <text x="264" y="146" font-size="10" fill="#5b7db1">· 持 rq 锁、关抢占</text>
  <text x="264" y="168" font-size="10" fill="#5b7db1">· 把 prev 按状态出/留队</text>
  <text x="264" y="190" font-size="10" fill="#5b7db1">· 到最近抢占点才进来</text>

  <!-- pick_next_task -->
  <rect x="488" y="78" width="200" height="120" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="588" y="100" font-size="11.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">pick_next_task</text>
  <text x="504" y="124" font-size="9.5" fill="#5b7db1">core.c:6561</text>
  <text x="504" y="146" font-size="10" fill="#5b7db1">沿调度类栈挑选</text>
  <text x="504" y="168" font-size="10" fill="#5b7db1">（见 调度类栈 图）</text>
  <text x="504" y="190" font-size="10" fill="#5b7db1">fair 类内走 EEVDF</text>

  <!-- context_switch -->
  <rect x="728" y="78" width="244" height="120" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="850" y="100" font-size="11.5" font-weight="600" fill="#5a3410" text-anchor="middle">context_switch</text>
  <text x="744" y="124" font-size="9.5" fill="#93762e">core.c:5335</text>
  <text x="744" y="146" font-size="10" fill="#93762e">· 切地址空间（mm）</text>
  <text x="744" y="168" font-size="10" fill="#93762e">· 切寄存器/内核栈</text>
  <text x="744" y="190" font-size="10" fill="#93762e">→ next 开始运行</text>

  <g stroke="#c7c7cc" stroke-width="1.6" fill="none">
    <line x1="208" y1="138" x2="248" y2="138" marker-end="url(#ar)"/>
    <line x1="448" y1="138" x2="488" y2="138" marker-end="url(#ar)"/>
    <line x1="688" y1="138" x2="728" y2="138" marker-end="url(#ar)"/>
  </g>

  <!-- 任务状态机 -->
  <rect x="28" y="238" width="944" height="150" rx="13" fill="#fbfbfd" stroke="#ececf1"/>
  <text x="46" y="260" font-size="11.5" font-weight="600" fill="#1d1d1f">任务状态机（include/linux/sched.h）</text>
  <rect x="70" y="286" width="150" height="46" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="145" y="308" font-size="11" font-weight="600" fill="#12402a" text-anchor="middle">TASK_RUNNING (0)</text><text x="145" y="324" font-size="9" fill="#2f6f4f" text-anchor="middle">就绪/运行</text>
  <rect x="330" y="262" width="200" height="42" rx="10" fill="#f3f7fc" stroke="#cfe0f2"/><text x="430" y="284" font-size="10.5" font-weight="600" fill="#274a78" text-anchor="middle">TASK_INTERRUPTIBLE (1)</text><text x="430" y="298" font-size="9" fill="#5b7db1" text-anchor="middle">可中断睡眠（可被信号唤醒）</text>
  <rect x="330" y="316" width="200" height="42" rx="10" fill="#f3f7fc" stroke="#cfe0f2"/><text x="430" y="338" font-size="10.5" font-weight="600" fill="#274a78" text-anchor="middle">TASK_UNINTERRUPTIBLE (2)</text><text x="430" y="352" font-size="9" fill="#5b7db1" text-anchor="middle">不可中断睡眠（等硬件）</text>
  <rect x="640" y="286" width="160" height="46" rx="10" fill="#fbeaea" stroke="#e7c3c3"/><text x="720" y="308" font-size="11" font-weight="600" fill="#4a1414" text-anchor="middle">TASK_DEAD</text><text x="720" y="324" font-size="9" fill="#7a2a2a" text-anchor="middle">退出（待回收）</text>

  <g stroke="#c7c7cc" stroke-width="1.4" fill="none" font-size="9">
    <path d="M220,300 L330,283" marker-end="url(#ar)"/><path d="M220,315 L330,337" marker-end="url(#ar)"/>
    <path d="M330,293 L245,306" marker-end="url(#ar)"/>
    <path d="M145,332 L145,372 L720,372 L720,334" marker-end="url(#ar)"/>
  </g>
  <text x="275" y="272" font-size="9" fill="#a1a1a6">阻塞→睡眠</text>
  <text x="285" y="360" font-size="9" fill="#a1a1a6">唤醒 try_to_wake_up → RUNNING</text>
  <text x="430" y="388" font-size="9" fill="#a1a1a6">运行态 do_exit → TASK_DEAD</text>
</svg>
