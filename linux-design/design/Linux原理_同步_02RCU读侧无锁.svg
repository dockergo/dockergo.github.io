<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="470" viewBox="0 0 1000 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">RCU：读侧无锁读旧版本 + 宽限期后延后回收（Read-Copy-Update）</text>

  <!-- 宽限期 band -->
  <rect x="440" y="120" width="230" height="230" rx="6" fill="#fff7e6" stroke="#e8cf9a" stroke-dasharray="4 3"/>
  <text x="555" y="138" font-size="10.5" font-weight="600" fill="#5a3410" text-anchor="middle">宽限期 grace period</text>
  <text x="555" y="154" font-size="8.5" fill="#93762e" text-anchor="middle">等所有"发布前已进入"的读者退出</text>

  <!-- publish / reclaim 竖线 -->
  <line x1="440" y1="60" x2="440" y2="360" stroke="#5aa06a" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="440" y="74" font-size="9.5" fill="#2f6f4f" text-anchor="middle">发布点 ②</text>
  <line x1="670" y1="60" x2="670" y2="360" stroke="#c26a6a" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="670" y="74" font-size="9.5" fill="#7a2a2a" text-anchor="middle">回收点 ④</text>

  <!-- 写者事件 -->
  <rect x="66" y="86" width="196" height="46" rx="10" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="82" y="106" font-size="10" font-weight="600" fill="#12402a">① 复制 v1 → v2</text>
  <text x="82" y="124" font-size="9" fill="#2f6f4f">改副本，不动旧版本</text>

  <text x="448" y="94" font-size="9.5" fill="#2f6f4f">② rcu_assign_pointer(v2)</text>
  <text x="448" y="108" font-size="8.5" fill="#93762e">　含 release 屏障，新读者看 v2</text>
  <text x="448" y="122" font-size="9.5" fill="#93762e">③ call_rcu 登记回收 v1</text>

  <rect x="686" y="86" width="212" height="46" rx="10" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="702" y="106" font-size="10" font-weight="600" fill="#4a1414">④ rcu_do_batch → free(v1)</text>
  <text x="702" y="124" font-size="9" fill="#7a2a2a">tree.c:2540（宽限期后）</text>

  <!-- 读者 bars -->
  <rect x="88" y="164" width="176" height="28" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="176" y="182" font-size="9.5" fill="#274a78" text-anchor="middle">R3：读 v1（发布前退出）</text>

  <rect x="180" y="206" width="360" height="28" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="360" y="224" font-size="9.5" fill="#274a78" text-anchor="middle">R1（发布前进入）读 v1 —— 宽限期须等它退出</text>

  <rect x="470" y="248" width="300" height="28" rx="8" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="620" y="266" font-size="9.5" fill="#1b2a4a" text-anchor="middle">R2（发布后进入）读 v2</text>

  <text x="80" y="158" font-size="8" fill="#a1a1a6">读侧：左=rcu_read_lock（=preempt_disable，rcupdate.h:103），右=rcu_read_unlock；全程不加锁、不阻塞</text>

  <!-- 版本存活 lane -->
  <rect x="60" y="298" width="610" height="24" rx="7" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="70" y="314" font-size="9" fill="#5a3410">v1（旧版本）存活到回收点 —— 老读者仍安全访问</text>
  <rect x="440" y="326" width="480" height="24" rx="7" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="450" y="342" font-size="9" fill="#12402a">v2（新版本）自发布点起 —— 新读者访问</text>

  <!-- 时间轴 -->
  <line x1="60" y1="372" x2="920" y2="372" stroke="#b8b8bf" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="920" y="390" font-size="9.5" fill="#8a8a8e" text-anchor="end">时间 →</text>

  <!-- 要点 -->
  <rect x="30" y="404" width="940" height="52" rx="9" fill="#ffffff" stroke="#ececf1"/>
  <text x="46" y="424" font-size="10" fill="#6e6e73">要害：读者永不等待、永不写共享状态；全部同步成本移到写侧的"延后回收"。宽限期结束的判据是"所有在发布前已进入读侧临界区的读者都已退出"（每 CPU 过一次静止态）。</text>
  <text x="46" y="442" font-size="10" fill="#6e6e73">代价：旧版本多存活一个宽限期、写侧改的是副本 —— 只适合读远多于写、能容忍读者短暂看到旧值的场景。写写之间仍需另加锁。</text>
</svg>
