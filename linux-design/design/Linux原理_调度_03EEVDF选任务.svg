<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="440" viewBox="0 0 1000 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">EEVDF 选任务：① 资格 eligible（公平） + ② 最早虚拟截止期 deadline（低延迟）</text>

  <!-- 轴容器 -->
  <rect x="28" y="62" width="608" height="258" rx="13" fill="#fbfbfd" stroke="#ececf1"/>
  <text x="332" y="86" font-size="10.5" fill="#6e6e73" text-anchor="middle">横轴 = vruntime（加权虚拟运行时间；越靠左 = 欠跑越多、越该跑）</text>

  <!-- 分界线 -->
  <line x1="392" y1="104" x2="392" y2="266" stroke="#c1962a" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="392" y="118" font-size="9.5" fill="#a05411" text-anchor="middle">加权平均 vruntime</text>
  <text x="215" y="284" font-size="10" fill="#2f6f4f" text-anchor="middle">← eligible（lag ≥ 0，有资格）</text>
  <text x="520" y="284" font-size="10" fill="#7a2a2a" text-anchor="middle">超前（lag &lt; 0，暂无资格）→</text>

  <!-- 轴线 -->
  <line x1="60" y1="228" x2="612" y2="228" stroke="#b8b8bf" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="612" y="246" font-size="9.5" fill="#8a8a8e" text-anchor="end">vruntime</text>

  <!-- 任务 A (选中, 绿) -->
  <circle cx="130" cy="228" r="9" fill="#eafaf1" stroke="#5aa06a" stroke-width="2.5"/><text x="130" y="252" font-size="10" font-weight="600" fill="#12402a" text-anchor="middle">A</text>
  <path d="M240,175 l9,9 l-9,9 l-9,-9 z" fill="#eafaf1" stroke="#5aa06a" stroke-width="1.6"/><text x="240" y="169" font-size="9.5" fill="#2f6f4f" text-anchor="middle">dA（最小）</text>
  <text x="130" y="266" font-size="8.5" fill="#5aa06a" text-anchor="middle">✓ 选中</text>

  <!-- 任务 B (蓝, eligible 但 dl 较大) -->
  <circle cx="330" cy="228" r="9" fill="#f3f7fc" stroke="#5b7db1" stroke-width="2"/><text x="330" y="252" font-size="10" font-weight="600" fill="#274a78" text-anchor="middle">B</text>
  <path d="M470,175 l9,9 l-9,9 l-9,-9 z" fill="#f3f7fc" stroke="#5b7db1" stroke-width="1.6"/><text x="470" y="169" font-size="9.5" fill="#5b7db1" text-anchor="middle">dB</text>

  <!-- 任务 C (灰, 不 eligible) -->
  <circle cx="500" cy="228" r="9" fill="#f2f2f4" stroke="#a1a1a6" stroke-width="2"/><text x="500" y="252" font-size="10" font-weight="600" fill="#6e6e73" text-anchor="middle">C</text>
  <text x="500" y="266" font-size="8.5" fill="#a1a1a6" text-anchor="middle">超前·跳过</text>

  <!-- 图例 -->
  <text x="332" y="308" font-size="9" fill="#a1a1a6" text-anchor="middle">○ 任务（在其 vruntime 处）　◆ 该任务的 deadline（= vruntime + 加权 slice）　同色对应</text>

  <!-- 两步条 -->
  <rect x="28" y="336" width="608" height="34" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="44" y="358" font-size="10.5" fill="#12402a">① entity_eligible(fair.c:939)：vruntime ≤ 加权平均（lag≥0）→ 公平；C 超前被跳过</text>
  <rect x="28" y="376" width="608" height="34" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/><text x="44" y="398" font-size="10.5" fill="#274a78">② pick_eevdf(fair.c:1136)：eligible(A/B) 中选 deadline 最小者 → 选 A → 低延迟</text>

  <!-- 右注释 -->
  <rect x="652" y="62" width="320" height="348" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="812" y="86" font-size="11.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">四个量与续期</text>
  <text x="668" y="114" font-size="10.5" fill="#3a3a3c">· vruntime：已消耗的加权虚拟时间</text>
  <text x="668" y="140" font-size="10.5" fill="#3a3a3c">· vlag：相对加权平均的滞后</text>
  <text x="668" y="156" font-size="10.5" fill="#6e6e73">　&gt;0 欠跑（该多跑）、&lt;0 超前</text>
  <text x="668" y="182" font-size="10.5" fill="#3a3a3c">· slice：请求时间片</text>
  <text x="668" y="198" font-size="10.5" fill="#6e6e73">　默认 base_slice=0.7ms (fair.c:79)</text>
  <text x="668" y="224" font-size="10.5" fill="#3a3a3c">· deadline = vruntime + 加权(slice)</text>
  <line x1="668" y1="242" x2="956" y2="242" stroke="#ececf1"/>
  <text x="668" y="266" font-size="10.5" fill="#3a3a3c">update_deadline (fair.c:1238)：</text>
  <text x="668" y="284" font-size="10.5" fill="#6e6e73">vruntime 追上 deadline → 续一个</text>
  <text x="668" y="300" font-size="10.5" fill="#6e6e73">slice、推进 deadline</text>
  <line x1="668" y1="318" x2="956" y2="318" stroke="#ececf1"/>
  <text x="668" y="342" font-size="10.5" fill="#12402a">要点：小 slice → deadline 更近</text>
  <text x="668" y="358" font-size="10.5" fill="#12402a">→ 更快被选 → 交互任务响应好</text>
  <text x="668" y="384" font-size="10" fill="#a1a1a6">公平(eligible)+延迟(deadline)</text>
  <text x="668" y="400" font-size="10" fill="#a1a1a6">两个旋钮，取代旧 CFS 单 vruntime</text>
</svg>
