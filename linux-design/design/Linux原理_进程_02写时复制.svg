<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">copy_process 分岔：CLONE_VM 共享 mm（线程） vs 不共享则 COW 复制地址空间（进程）</text>

  <!-- 顶部：copy_mm 决策 -->
  <rect x="360" y="58" width="280" height="62" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="500" y="82" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">copy_mm (fork.c:1559)</text>
  <text x="500" y="103" font-size="10" fill="#5b7db1" text-anchor="middle">按 clone_flags &amp; CLONE_VM 分岔</text>

  <g stroke="#c7c7cc" stroke-width="1.6" fill="none">
    <path d="M430,120 L430,150 L250,150 L250,178" marker-end="url(#ar)"/>
    <path d="M570,120 L570,150 L740,150 L740,178" marker-end="url(#ar)"/>
  </g>
  <text x="330" y="144" font-size="9.5" fill="#2f6f4f" text-anchor="middle">置 CLONE_VM</text>
  <text x="672" y="144" font-size="9.5" fill="#93762e" text-anchor="middle">不置 CLONE_VM</text>

  <!-- 左：线程 共享 mm -->
  <rect x="60" y="178" width="380" height="150" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="250" y="200" font-size="11.5" font-weight="600" fill="#2c5a3a" text-anchor="middle">线程：mmget(oldmm)，直接共享同一 mm (fork.c:1582)</text>

  <rect x="86" y="220" width="140" height="90" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="156" y="242" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">线程 A</text><text x="156" y="260" font-size="9" fill="#5b7db1" text-anchor="middle">pid=100</text><text x="156" y="276" font-size="9" fill="#5b7db1" text-anchor="middle">tgid=100</text>
  <rect x="274" y="220" width="140" height="90" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="344" y="242" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">线程 B</text><text x="344" y="260" font-size="9" fill="#5b7db1" text-anchor="middle">pid=101</text><text x="344" y="276" font-size="9" fill="#5b7db1" text-anchor="middle">tgid=100</text>

  <rect x="176" y="336" width="148" height="42" rx="10" fill="#fff7e6" stroke="#e8cf9a"/><text x="250" y="358" font-size="10.5" font-weight="600" fill="#5a3410" text-anchor="middle">同一 mm（共享）</text><text x="250" y="371" font-size="8.5" fill="#93762e" text-anchor="middle">同地址空间 / 同物理页</text>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <path d="M156,310 L156,357 L176,357" marker-end="url(#ar)"/>
    <path d="M344,310 L344,357 L324,357" marker-end="url(#ar)"/>
  </g>

  <!-- 右：进程 COW -->
  <rect x="560" y="178" width="400" height="150" rx="13" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="760" y="200" font-size="11.5" font-weight="600" fill="#5a3410" text-anchor="middle">进程：dup_mm 复制页表，物理页暂共享设只读 (fork.c:1586)</text>

  <rect x="586" y="220" width="150" height="90" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="661" y="242" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">父进程</text><text x="661" y="260" font-size="9" fill="#5b7db1" text-anchor="middle">mm 父</text><text x="661" y="278" font-size="9" fill="#5b7db1" text-anchor="middle">PTE → 只读</text>
  <rect x="784" y="220" width="150" height="90" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="859" y="242" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">子进程</text><text x="859" y="260" font-size="9" fill="#5b7db1" text-anchor="middle">mm 子（新）</text><text x="859" y="278" font-size="9" fill="#5b7db1" text-anchor="middle">PTE → 只读</text>

  <rect x="686" y="336" width="148" height="42" rx="10" fill="#fff7e6" stroke="#e8cf9a"/><text x="760" y="358" font-size="10.5" font-weight="600" fill="#5a3410" text-anchor="middle">同一物理页（只读）</text><text x="760" y="371" font-size="8.5" fill="#93762e" text-anchor="middle">wrprotect (memory.c:1104)</text>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <path d="M661,310 L661,357 L686,357" marker-end="url(#ar)"/>
    <path d="M859,310 L859,357 L834,357" marker-end="url(#ar)"/>
  </g>

  <!-- COW 触发 -->
  <rect x="560" y="404" width="400" height="76" rx="12" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="760" y="426" font-size="11.5" font-weight="600" fill="#4a1414" text-anchor="middle">写入触发 COW：只在写那一刻才真复制</text>
  <text x="576" y="448" font-size="10" fill="#7a2a2a">任一方写只读页 → 缺页 → do_wp_page (memory.c:4244)</text>
  <text x="576" y="466" font-size="10" fill="#7a2a2a">→ wp_page_copy (memory.c:3853) 复制该页并恢复可写</text>
  <path d="M760,378 L760,404" stroke="#c7c7cc" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>

  <!-- 左侧注释 -->
  <rect x="60" y="404" width="380" height="76" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="250" y="426" font-size="11.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">要点：一套调用，共享程度由标志决定</text>
  <text x="76" y="448" font-size="10" fill="#3a3a3c">· 线程/进程都走 kernel_clone → copy_process</text>
  <text x="76" y="466" font-size="10" fill="#3a3a3c">· COW 让 fork+exec 近乎零页复制</text>
</svg>
