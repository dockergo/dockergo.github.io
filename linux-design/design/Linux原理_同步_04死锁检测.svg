<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
    <marker id="arR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c98b8b"/></marker>
  </defs>
  <rect width="1000" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">死锁与 lockdep：AB-BA 锁序环让持锁者互等，lockdep 在依赖图里用 BFS 抢先发现「加这条边就闭环」</text>

  <!-- 左：问题 -->
  <rect x="28" y="56" width="444" height="410" rx="13" fill="#fbfbfd" stroke="#ececf1"/>
  <text x="44" y="80" font-size="11.5" font-weight="600" fill="#7a2a2a">问题 · AB-BA 锁序环死锁</text>

  <rect x="48" y="98" width="160" height="52" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="128" y="119" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">CPU0</text>
  <text x="128" y="136" font-size="9.5" fill="#5b7db1" text-anchor="middle">lock(A) 后 lock(B)</text>
  <rect x="292" y="98" width="160" height="52" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="372" y="119" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">CPU1</text>
  <text x="372" y="136" font-size="9.5" fill="#5b7db1" text-anchor="middle">lock(B) 后 lock(A)</text>

  <rect x="80" y="248" width="96" height="46" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="128" y="276" font-size="11" font-weight="600" fill="#5a3410" text-anchor="middle">锁 A</text>
  <rect x="324" y="248" width="96" height="46" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="372" y="276" font-size="11" font-weight="600" fill="#5a3410" text-anchor="middle">锁 B</text>

  <line x1="128" y1="150" x2="128" y2="246" stroke="#5aa06a" stroke-width="1.8" marker-end="url(#ar)"/>
  <text x="150" y="200" font-size="9.5" fill="#2f6f4f">持有 A</text>
  <line x1="372" y1="150" x2="372" y2="246" stroke="#5aa06a" stroke-width="1.8" marker-end="url(#ar)"/>
  <text x="330" y="200" font-size="9.5" fill="#2f6f4f" text-anchor="end">持有 B</text>

  <path d="M176,262 L322,262" stroke="#c98b8b" stroke-width="1.6" stroke-dasharray="5 3" fill="none" marker-end="url(#arR)"/>
  <text x="250" y="255" font-size="9.5" fill="#7a2a2a" text-anchor="middle">CPU0 求 B（等待）→</text>
  <path d="M322,282 L176,282" stroke="#c98b8b" stroke-width="1.6" stroke-dasharray="5 3" fill="none" marker-end="url(#arR)"/>
  <text x="250" y="300" font-size="9.5" fill="#7a2a2a" text-anchor="middle">← CPU1 求 A（等待）</text>

  <rect x="48" y="324" width="404" height="44" rx="11" fill="#fbeaea" stroke="#e7c3c3"/>
  <text x="250" y="351" font-size="10.5" font-weight="600" fill="#4a1414" text-anchor="middle">环形等待：两持锁者互等对方释放 → 谁都推进不了 = 死锁</text>
  <text x="48" y="392" font-size="10" fill="#3a3a3c">根因：两处代码以相反顺序获取同一对锁（全局锁序不一致）。</text>
  <text x="48" y="418" font-size="10" fill="#5b7db1">→ lockdep 的任务：在真正死锁前，从依赖图里发现这个环。</text>
  <text x="48" y="444" font-size="9.5" fill="#6e6e73">规矩：全内核统一锁序；spinlock 内不取 mutex；中断可抢的锁一律 irqsave。</text>

  <!-- 右：lockdep -->
  <rect x="492" y="56" width="480" height="410" rx="13" fill="#fbfbfd" stroke="#ececf1"/>
  <text x="508" y="80" font-size="11.5" font-weight="600" fill="#1d1d1f">lockdep 如何在环形成之前抓住它</text>
  <text x="508" y="97" font-size="9.5" fill="#6e6e73">CONFIG_PROVE_LOCKING · 运行时校验 · 以「锁类」为单位</text>

  <rect x="512" y="108" width="440" height="50" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="528" y="129" font-size="10.5" font-weight="600" fill="#1b2a4a">① 锁类 lock_classes[MAX_LOCKDEP_KEYS] :224</text>
  <text x="528" y="147" font-size="9.5" fill="#5b7db1">按锁的初始化位置归类；检测以「类」为单位而非实例</text>

  <rect x="512" y="174" width="440" height="54" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="528" y="196" font-size="10.5" font-weight="600" fill="#3d2a5a">② 持 prev 再取 next → check_prev_add</text>
  <text x="528" y="215" font-size="9.5" fill="#6e6e73">向依赖图 list_entries[] :208 登记有向边 prev → next</text>

  <rect x="512" y="244" width="440" height="54" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="528" y="266" font-size="10.5" font-weight="600" fill="#1b2a4a">③ 登记前先查 check_noncircular :2149</text>
  <text x="528" y="285" font-size="9.5" fill="#5b7db1">__bfs_forwards :1842：从 next 出发能否已到达 prev？</text>

  <rect x="512" y="314" width="440" height="54" rx="11" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="528" y="336" font-size="10.5" font-weight="600" fill="#4a1414">④ 能到达 → 加边即闭环 → BFS_RMATCH</text>
  <text x="528" y="355" font-size="9.5" fill="#7a2a2a">打印 possible circular locking dependency detected :1962</text>

  <rect x="512" y="384" width="440" height="48" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="528" y="413" font-size="10" fill="#5a3410">另路 check_deadlock :3057：持某类锁又取同类 → 递归死锁</text>

  <line x1="732" y1="158" x2="732" y2="172" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="732" y1="228" x2="732" y2="242" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="732" y1="298" x2="732" y2="312" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <text x="508" y="452" font-size="9.5" fill="#6e6e73">生产内核通常关闭（运行时开销）；报告含正/反两条持锁栈，便于定位相反锁序。</text>
</svg>
