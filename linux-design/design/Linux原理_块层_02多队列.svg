<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="470" viewBox="0 0 1000 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">blk-mq 两级队列：per-CPU 软队列免锁提交 → 按 CPU 与类型映射 → 对驱动的硬件队列</text>

  <!-- 软队列层 -->
  <text x="30" y="62" font-size="11" font-weight="600" fill="#1b2a4a">软队列层 · blk_mq_ctx（每 CPU 一个，本地提交无跨核锁竞争，blk-mq.h:107）</text>
  <rect x="48" y="72" width="200" height="78" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="148" y="94" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">CPU 0</text>
  <text x="148" y="115" font-size="9.5" fill="#5b7db1" text-anchor="middle">软队列 blk_mq_ctx</text>
  <text x="148" y="133" font-size="9" fill="#5b7db1" text-anchor="middle">本地入队、免锁</text>

  <rect x="278" y="72" width="200" height="78" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="378" y="94" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">CPU 1</text>
  <text x="378" y="115" font-size="9.5" fill="#5b7db1" text-anchor="middle">软队列 blk_mq_ctx</text>
  <text x="378" y="133" font-size="9" fill="#5b7db1" text-anchor="middle">本地入队、免锁</text>

  <rect x="522" y="72" width="200" height="78" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="622" y="94" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">CPU 2</text>
  <text x="622" y="115" font-size="9.5" fill="#5b7db1" text-anchor="middle">软队列 blk_mq_ctx</text>
  <text x="622" y="133" font-size="9" fill="#5b7db1" text-anchor="middle">本地入队、免锁</text>

  <rect x="752" y="72" width="200" height="78" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="852" y="94" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">CPU 3</text>
  <text x="852" y="115" font-size="9.5" fill="#5b7db1" text-anchor="middle">软队列 blk_mq_ctx</text>
  <text x="852" y="133" font-size="9" fill="#5b7db1" text-anchor="middle">本地入队、免锁</text>

  <!-- 映射带 -->
  <rect x="150" y="188" width="700" height="40" rx="10" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="500" y="213" font-size="10.5" font-weight="600" fill="#2c5a3a" text-anchor="middle">映射：软队列 → 硬件队列（按 CPU 亲和 + IO 类型 hctx_type）</text>

  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <path d="M148,150 L148,188" marker-end="url(#ar)"/>
    <path d="M378,150 L378,188" marker-end="url(#ar)"/>
    <path d="M622,150 L622,188" marker-end="url(#ar)"/>
    <path d="M852,150 L852,188" marker-end="url(#ar)"/>
  </g>

  <!-- 硬队列层 按类型 -->
  <text x="30" y="262" font-size="11" font-weight="600" fill="#5a3410">硬队列层 · blk_mq_hw_ctx（hctx，对应驱动一个硬件提交队列，blk-mq.h:322）</text>
  <rect x="90" y="274" width="240" height="88" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="210" y="296" font-size="10.5" font-weight="600" fill="#5a3410" text-anchor="middle">HCTX_TYPE_DEFAULT</text>
  <text x="210" y="317" font-size="9.5" fill="#93762e" text-anchor="middle">普通读写 IO</text>
  <text x="210" y="337" font-size="9" fill="#93762e" text-anchor="middle">enum hctx_type</text>
  <text x="210" y="352" font-size="9" fill="#93762e" text-anchor="middle">blk-mq.h:488</text>

  <rect x="380" y="274" width="240" height="88" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="500" y="296" font-size="10.5" font-weight="600" fill="#5a3410" text-anchor="middle">HCTX_TYPE_READ</text>
  <text x="500" y="317" font-size="9.5" fill="#93762e" text-anchor="middle">专用于 READ IO</text>
  <text x="500" y="340" font-size="9" fill="#93762e" text-anchor="middle">读写走独立队列，互不阻塞</text>

  <rect x="670" y="274" width="240" height="88" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="790" y="296" font-size="10.5" font-weight="600" fill="#3d2a5a" text-anchor="middle">HCTX_TYPE_POLL</text>
  <text x="790" y="317" font-size="9.5" fill="#6e6e73" text-anchor="middle">轮询 IO（不用中断）</text>
  <text x="790" y="340" font-size="9" fill="#6e6e73" text-anchor="middle">超低延迟场景主动 poll</text>

  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <path d="M300,228 L210,228 L210,274" marker-end="url(#ar)"/>
    <path d="M500,228 L500,274" marker-end="url(#ar)"/>
    <path d="M700,228 L790,228 L790,274" marker-end="url(#ar)"/>
  </g>

  <!-- 设备 -->
  <rect x="230" y="404" width="540" height="46" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="500" y="424" font-size="10.5" font-weight="600" fill="#12402a" text-anchor="middle">驱动硬件队列 → 设备（NVMe 多队列并发提交）</text>
  <text x="500" y="440" font-size="9" fill="#2f6f4f" text-anchor="middle">blk-mq 消除的是多核提交的单锁瓶颈，非替代慢设备的调度排序</text>

  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <path d="M210,362 L210,384 L400,384 L400,404" marker-end="url(#ar)"/>
    <path d="M500,362 L500,404" marker-end="url(#ar)"/>
    <path d="M790,362 L790,384 L600,384 L600,404" marker-end="url(#ar)"/>
  </g>
</svg>
