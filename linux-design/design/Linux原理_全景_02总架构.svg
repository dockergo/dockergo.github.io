<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">总架构：用户态 → 系统调用边界 → 内核子系统 → 驱动 → 硬件（中断异步回灌）</text>

  <!-- 用户态 -->
  <rect x="30" y="48" width="880" height="46" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="470" y="70" font-size="12" font-weight="600" fill="#3d2a5a" text-anchor="middle">用户态：进程 / 线程 · glibc 系统调用封装</text>
  <text x="470" y="87" font-size="10" fill="#7a5aa0" text-anchor="middle">read() / mmap() / sendmsg() / fork() …</text>

  <!-- 系统调用边界 -->
  <rect x="30" y="108" width="880" height="40" rx="10" fill="#e9def7" stroke="#d9c7ec"/>
  <text x="470" y="133" font-size="11.5" font-weight="600" fill="#3d2a5a" text-anchor="middle">系统调用边界 · arch/x86/entry → syscall_64.tbl 分派 sys_* ｜ 旁路接触面：/proc · /sys · ioctl</text>

  <!-- 内核区容器 -->
  <rect x="30" y="162" width="880" height="212" rx="13" fill="#fbfbfd" stroke="#ececf1"/>
  <text x="46" y="180" font-size="11" font-weight="600" fill="#6e6e73">内核态子系统（按能力域）</text>

  <!-- 计算/通信 -->
  <rect x="48" y="188" width="400" height="42" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="248" y="214" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">进程调度 EEVDF（CPU 时间分配）</text>
  <rect x="492" y="188" width="400" height="42" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="692" y="214" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">网络协议栈（通信）</text>

  <!-- 底座 -->
  <rect x="48" y="238" width="256" height="42" rx="9" fill="#fff7e6" stroke="#e8cf9a"/><text x="176" y="264" font-size="11" font-weight="600" fill="#5a3410" text-anchor="middle">虚拟内存（地址空间/页）</text>
  <rect x="318" y="238" width="256" height="42" rx="9" fill="#fff7e6" stroke="#e8cf9a"/><text x="446" y="264" font-size="11" font-weight="600" fill="#5a3410" text-anchor="middle">VFS 与文件系统</text>
  <rect x="588" y="238" width="304" height="42" rx="9" fill="#fff7e6" stroke="#e8cf9a"/><text x="740" y="264" font-size="11" font-weight="600" fill="#5a3410" text-anchor="middle">块层与 IO 调度（blk-mq）</text>

  <!-- 保障 -->
  <rect x="48" y="288" width="256" height="42" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="176" y="314" font-size="11" font-weight="600" fill="#12402a" text-anchor="middle">中断与软中断</text>
  <rect x="318" y="288" width="256" height="42" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="446" y="314" font-size="11" font-weight="600" fill="#12402a" text-anchor="middle">同步原语（自旋锁/RCU）</text>
  <rect x="588" y="288" width="304" height="42" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="740" y="314" font-size="11" font-weight="600" fill="#12402a" text-anchor="middle">cgroup 与 namespace（隔离）</text>

  <text x="470" y="356" font-size="10" fill="#6e6e73" text-anchor="middle">各子系统的"后台半"由内核线程/软中断承担：kswapd 回收 · 回写 · ksoftirqd · RCU 回调 · 负载均衡</text>

  <!-- 驱动 -->
  <rect x="30" y="388" width="880" height="38" rx="10" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="470" y="412" font-size="11.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">设备驱动（字符/块/网络驱动 · 中断处理程序注册）</text>

  <!-- 硬件 -->
  <rect x="30" y="440" width="880" height="42" rx="10" fill="#f2f2f4" stroke="#e2e2e6"/>
  <text x="470" y="466" font-size="11.5" font-weight="600" fill="#3a3a3c" text-anchor="middle">硬件：CPU · 内存 · 磁盘/SSD · 网卡 · 外设</text>

  <!-- 下行主箭头 -->
  <g stroke="#c7c7cc" stroke-width="1.8" fill="none">
    <line x1="470" y1="94" x2="470" y2="108" marker-end="url(#ar)"/>
    <line x1="470" y1="148" x2="470" y2="162" marker-end="url(#ar)"/>
    <line x1="470" y1="374" x2="470" y2="388" marker-end="url(#ar)"/>
    <line x1="470" y1="426" x2="470" y2="440" marker-end="url(#ar)"/>
  </g>

  <!-- 中断上行(右侧虚线) -->
  <path d="M935,461 L960,461 L960,183 L912,183" stroke="#c1962a" stroke-width="1.6" fill="none" stroke-dasharray="5 3" marker-end="url(#ar)"/>
  <text x="973" y="330" font-size="10" fill="#a05411" text-anchor="middle" transform="rotate(-90 973 330)">中断 / 异常 异步回灌</text>
</svg>
