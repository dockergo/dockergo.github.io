<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="548" viewBox="0 0 1000 548" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="548" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">softirq 处理循环与过载兜底：一轮跑完若仍有 pending，三道闸门全过才再跑一轮，否则甩给 ksoftirqd</text>

  <!-- 入口链 -->
  <rect x="64" y="58" width="150" height="44" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="139" y="85" font-size="10.5" fill="#1b2a4a" text-anchor="middle">硬中断退出 irq_exit</text>
  <rect x="232" y="58" width="140" height="44" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="302" y="85" font-size="10.5" fill="#1b2a4a" text-anchor="middle">invoke_softirq :338</text>
  <rect x="392" y="58" width="200" height="44" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="492" y="80" font-size="10.5" fill="#1b2a4a" text-anchor="middle">handle_softirqs :579</text>
  <text x="492" y="95" font-size="9" fill="#5b7db1" text-anchor="middle">（__do_softirq 实现体）</text>
  <line x1="214" y1="80" x2="230" y2="80" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="372" y1="80" x2="390" y2="80" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- 初始化 banner -->
  <rect x="64" y="112" width="528" height="30" rx="9" fill="#ffffff" stroke="#ececf1"/>
  <text x="328" y="131" font-size="10" fill="#3a3a3c" text-anchor="middle">初始化：end = jiffies + MAX_SOFTIRQ_TIME(2ms) :581　；　max_restart = MAX_SOFTIRQ_RESTART(10) :583</text>
  <line x1="328" y1="102" x2="328" y2="112" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- 一轮处理 loop container -->
  <rect x="64" y="156" width="528" height="146" rx="12" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="80" y="177" font-size="11" font-weight="600" fill="#2c5a3a">一轮处理 · restart:（softirq.c:602）</text>

  <rect x="80" y="186" width="156" height="58" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="158" y="207" font-size="10" fill="#1b2a4a" text-anchor="middle">set_softirq_pending(0)</text>
  <text x="158" y="223" font-size="9.5" fill="#5b7db1" text-anchor="middle">+ 开中断 local_irq_enable</text>
  <text x="158" y="238" font-size="9" fill="#5b7db1" text-anchor="middle">:604 / :606</text>

  <rect x="252" y="186" width="184" height="58" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="344" y="207" font-size="10" fill="#5a3410" text-anchor="middle">ffs 逐位扫 pending</text>
  <text x="344" y="223" font-size="9.5" fill="#93762e" text-anchor="middle">每个置位向量 h-&gt;action</text>
  <text x="344" y="238" font-size="9" fill="#93762e" text-anchor="middle">:610 / :622</text>

  <rect x="452" y="186" width="130" height="58" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="517" y="207" font-size="10" fill="#274a78" text-anchor="middle">关中断</text>
  <text x="517" y="223" font-size="9.5" fill="#5b7db1" text-anchor="middle">重读 pending</text>
  <text x="517" y="238" font-size="9" fill="#5b7db1" text-anchor="middle">:637 / :639</text>

  <line x1="236" y1="215" x2="250" y2="215" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="436" y1="215" x2="450" y2="215" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="328" y="286" font-size="9" fill="#6e6e73" text-anchor="middle">10 个向量按位序：HI · TIMER · NET_TX · NET_RX · BLOCK · IRQ_POLL · TASKLET · SCHED · HRTIMER · RCU</text>

  <!-- 判定 -->
  <line x1="328" y1="302" x2="328" y2="314" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="252" y="316" width="152" height="40" rx="10" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="328" y="333" font-size="10" fill="#1d1d1f" text-anchor="middle">本轮跑完</text>
  <text x="328" y="348" font-size="10" fill="#1d1d1f" text-anchor="middle">pending 仍非空？</text>

  <line x1="404" y1="336" x2="450" y2="336" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="427" y="330" font-size="9" fill="#a1a1a6" text-anchor="middle">否</text>
  <rect x="452" y="314" width="140" height="44" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="522" y="341" font-size="10.5" fill="#12402a" text-anchor="middle">清空 → 本轮结束</text>

  <line x1="328" y1="356" x2="328" y2="372" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="342" y="368" font-size="9" fill="#a1a1a6">是</text>

  <!-- 三闸门 -->
  <rect x="64" y="374" width="528" height="84" rx="12" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="80" y="393" font-size="11" font-weight="600" fill="#5a3410">过载兜底 · 三闸门须全部满足才 goto restart（AND，softirq.c:641-643）</text>
  <rect x="80" y="400" width="160" height="46" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="160" y="420" font-size="10" fill="#1d1d1f" text-anchor="middle">① jiffies &lt; end</text>
  <text x="160" y="436" font-size="9" fill="#6e6e73" text-anchor="middle">未超 2ms :641</text>
  <rect x="256" y="400" width="172" height="46" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="342" y="420" font-size="10" fill="#1d1d1f" text-anchor="middle">② !need_resched</text>
  <text x="342" y="436" font-size="9" fill="#6e6e73" text-anchor="middle">无更高优先级任务等待 :641</text>
  <rect x="444" y="400" width="138" height="46" rx="10" fill="#ffffff" stroke="#ececf1"/>
  <text x="513" y="420" font-size="10" fill="#1d1d1f" text-anchor="middle">③ --max_restart</text>
  <text x="513" y="436" font-size="9" fill="#6e6e73" text-anchor="middle">重启 &lt; 10 次 :642</text>
  <text x="247" y="427" font-size="11" fill="#93762e" text-anchor="middle">&amp;</text>
  <text x="435" y="427" font-size="11" fill="#93762e" text-anchor="middle">&amp;</text>

  <!-- 两个结局 -->
  <line x1="190" y1="458" x2="190" y2="480" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="204" y="473" font-size="9" fill="#a1a1a6">真</text>
  <line x1="476" y1="458" x2="476" y2="480" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="490" y="473" font-size="9" fill="#a1a1a6">假</text>

  <rect x="100" y="482" width="180" height="46" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="190" y="503" font-size="10.5" fill="#12402a" text-anchor="middle">全部满足 → goto restart</text>
  <text x="190" y="519" font-size="9.5" fill="#2f6f4f" text-anchor="middle">:643 回到本轮顶部再跑一轮</text>

  <rect x="360" y="482" width="232" height="46" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="476" y="503" font-size="10.5" fill="#1b2a4a" text-anchor="middle">任一不满足 → wakeup_softirqd :645</text>
  <text x="476" y="519" font-size="9.5" fill="#5b7db1" text-anchor="middle">唤醒 ksoftirqd 在进程上下文补跑</text>

  <!-- goto restart 回边 -->
  <path d="M100,505 L40,505 L40,215 L62,215" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="34" y="360" font-size="9" fill="#a1a1a6" transform="rotate(-90 34 360)" text-anchor="middle">goto restart :643</text>

  <!-- 右侧注释 -->
  <rect x="612" y="56" width="360" height="472" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="792" y="80" font-size="11.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">为何要这三道闸门</text>

  <text x="630" y="106" font-size="10.5" fill="#3a3a3c">softirq 跑在硬中断退出上下文，</text>
  <text x="630" y="123" font-size="10.5" fill="#3a3a3c">优先级高于所有普通进程。</text>
  <text x="630" y="146" font-size="10.5" fill="#7a2a2a">若不设限：高负载（如网卡狂收包）</text>
  <text x="630" y="163" font-size="10.5" fill="#7a2a2a">会一直跑软中断 → 用户态被饿死。</text>

  <line x1="630" y1="180" x2="954" y2="180" stroke="#ececf1"/>
  <text x="630" y="204" font-size="10.5" fill="#3a3a3c">· 2ms 时间上限：限单次总占用</text>
  <text x="630" y="227" font-size="10.5" fill="#3a3a3c">· need_resched：有任务该跑就让出</text>
  <text x="630" y="250" font-size="10.5" fill="#3a3a3c">· 10 次重启上限：防 pending 持续</text>
  <text x="630" y="267" font-size="10" fill="#6e6e73">　自增使 time 判据永假（:531-535 注）</text>

  <line x1="630" y1="284" x2="954" y2="284" stroke="#ececf1"/>
  <text x="630" y="308" font-size="10.5" fill="#3a3a3c">ksoftirqd：per-CPU 内核线程 :62</text>
  <text x="630" y="325" font-size="10" fill="#6e6e73">　nice 0，进程上下文，可被正常抢占</text>
  <text x="630" y="348" font-size="10.5" fill="#3a3a3c">→ 把过量软中断降级为可调度负载，</text>
  <text x="630" y="365" font-size="10.5" fill="#3a3a3c">　与用户态公平竞争 CPU。</text>

  <line x1="630" y1="382" x2="954" y2="382" stroke="#ececf1"/>
  <rect x="630" y="396" width="324" height="112" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="792" y="418" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">触发与执行分离</text>
  <text x="646" y="440" font-size="10.5" fill="#1b2a4a">raise_softirq :790 只置 pending 位、</text>
  <text x="646" y="457" font-size="10.5" fill="#1b2a4a">不立即执行。</text>
  <text x="646" y="480" font-size="10.5" fill="#1b2a4a">执行时机 = irq_exit 就地跑，</text>
  <text x="646" y="497" font-size="10.5" fill="#1b2a4a">或 ksoftirqd 稍后补跑（本图）。</text>
</svg>
