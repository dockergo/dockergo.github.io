<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="470" viewBox="0 0 1000 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">缺页处理：进程地址空间 → handle_mm_fault → handle_pte_fault 按 PTE 状态四路分发</text>

  <!-- 左：地址空间 -->
  <rect x="28" y="54" width="294" height="392" rx="13" fill="#f5faf6" stroke="#e2ece5"/>
  <text x="46" y="76" font-size="11.5" font-weight="600" fill="#2c5a3a">进程地址空间 · mm_struct</text>
  <rect x="44" y="88" width="262" height="52" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="60" y="108" font-size="10.5" font-weight="600" fill="#1b2a4a">mm_struct（mm_types.h:1172）</text>
  <text x="60" y="127" font-size="9.5" fill="#5b7db1">mm_mt = maple tree 挂全部 VMA（:1189）</text>

  <rect x="90" y="158" width="170" height="38" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="175" y="181" font-size="10" font-weight="600" fill="#12402a" text-anchor="middle">栈 stack ↓</text>
  <rect x="90" y="202" width="170" height="38" rx="9" fill="#f4eefb" stroke="#d9c7ec"/><text x="175" y="225" font-size="10" font-weight="600" fill="#3d2a5a" text-anchor="middle">共享库 / mmap 区</text>
  <rect x="90" y="246" width="170" height="38" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="175" y="269" font-size="10" font-weight="600" fill="#12402a" text-anchor="middle">堆 heap ↑</text>
  <rect x="90" y="290" width="170" height="38" rx="9" fill="#fff7e6" stroke="#e8cf9a"/><text x="175" y="313" font-size="10" font-weight="600" fill="#5a3410" text-anchor="middle">数据 data / bss</text>
  <rect x="90" y="334" width="170" height="38" rx="9" fill="#fdf6ea" stroke="#efdcb4"/><text x="175" y="357" font-size="10" font-weight="600" fill="#5a3410" text-anchor="middle">代码 text（只读）</text>
  <text x="175" y="398" font-size="9" fill="#6e6e73" text-anchor="middle">每段 = vm_area_struct</text>
  <text x="175" y="414" font-size="9" fill="#6e6e73" text-anchor="middle">[vm_start, vm_end)  mm_types.h:938</text>
  <text x="175" y="432" font-size="9" fill="#a1a1a6" text-anchor="middle">页表项首次访问才填 → 缺页</text>

  <!-- 触发箭头 -->
  <path d="M322,150 L360,150 L360,103 L398,103" stroke="#c7c7cc" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>
  <text x="330" y="140" font-size="9" fill="#a1a1a6">访问触发</text>

  <!-- handle_mm_fault -->
  <rect x="398" y="80" width="470" height="46" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="633" y="100" font-size="11.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">handle_mm_fault（memory.c:6699）</text>
  <text x="633" y="117" font-size="9.5" fill="#5b7db1" text-anchor="middle">→ __handle_mm_fault 逐级建页表 pgd/p4d/pud/pmd（:6465）</text>

  <!-- handle_pte_fault -->
  <rect x="468" y="146" width="330" height="46" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="633" y="166" font-size="11.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">handle_pte_fault（memory.c:6383）</text>
  <text x="633" y="183" font-size="9.5" fill="#5b7db1" text-anchor="middle">看 PTE 状态四路分发</text>
  <path d="M633,126 L633,146" stroke="#c7c7cc" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>

  <!-- 四个条件卡 -->
  <rect x="392" y="228" width="140" height="60" rx="10" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="462" y="248" font-size="10.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">PTE 空（missing）</text>
  <text x="462" y="266" font-size="9" fill="#6e6e73" text-anchor="middle">do_pte_missing</text>
  <text x="462" y="280" font-size="9" fill="#6e6e73" text-anchor="middle">memory.c:6427</text>

  <rect x="544" y="228" width="140" height="60" rx="10" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="614" y="248" font-size="10.5" font-weight="600" fill="#274a78" text-anchor="middle">换出 !present</text>
  <text x="614" y="266" font-size="9" fill="#5b7db1" text-anchor="middle">do_swap_page</text>
  <text x="614" y="280" font-size="9" fill="#5b7db1" text-anchor="middle">从 swap 读回（:6430）</text>

  <rect x="696" y="228" width="140" height="60" rx="10" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="766" y="248" font-size="10.5" font-weight="600" fill="#5a3410" text-anchor="middle">NUMA protnone</text>
  <text x="766" y="266" font-size="9" fill="#93762e" text-anchor="middle">do_numa_page</text>
  <text x="766" y="280" font-size="9" fill="#93762e" text-anchor="middle">迁移/统计（:6433）</text>

  <rect x="848" y="228" width="124" height="60" rx="10" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="910" y="248" font-size="10.5" font-weight="600" fill="#4a1414" text-anchor="middle">写只读 · COW</text>
  <text x="910" y="266" font-size="9" fill="#7a2a2a" text-anchor="middle">do_wp_page</text>
  <text x="910" y="280" font-size="9" fill="#7a2a2a" text-anchor="middle">复制私有副本（:4244）</text>

  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <path d="M633,192 L633,210 L462,210 L462,228" marker-end="url(#ar)"/>
    <path d="M633,210 L614,210 L614,228" marker-end="url(#ar)"/>
    <path d="M633,210 L766,210 L766,228" marker-end="url(#ar)"/>
    <path d="M633,210 L910,210 L910,228" marker-end="url(#ar)"/>
  </g>

  <!-- missing 两个子叶 -->
  <rect x="392" y="332" width="140" height="76" rx="10" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="462" y="352" font-size="10.5" font-weight="600" fill="#12402a" text-anchor="middle">匿名 do_anonymous_page</text>
  <text x="462" y="370" font-size="9" fill="#2f6f4f" text-anchor="middle">memory.c:5337</text>
  <text x="462" y="386" font-size="9" fill="#2f6f4f" text-anchor="middle">堆/栈首触 → 分配零页</text>
  <text x="462" y="400" font-size="9" fill="#2f6f4f" text-anchor="middle">建反向映射、填 PTE</text>

  <rect x="544" y="332" width="188" height="76" rx="10" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="638" y="352" font-size="10.5" font-weight="600" fill="#5a3410" text-anchor="middle">文件 do_fault（memory.c:6013）</text>
  <text x="638" y="370" font-size="9" fill="#93762e" text-anchor="middle">经 vm_ops-&gt;fault / 页缓存取页</text>
  <text x="638" y="386" font-size="9" fill="#93762e" text-anchor="middle">只读 read_fault · 私写 cow_fault</text>
  <text x="638" y="400" font-size="9" fill="#93762e" text-anchor="middle">共享写 shared_fault → 交汇 VFS</text>

  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <path d="M462,288 L462,332" marker-end="url(#ar)"/>
    <path d="M500,300 L638,300 L638,332" marker-end="url(#ar)"/>
  </g>
  <text x="748" y="360" font-size="9" fill="#a1a1a6">fork 后共享页写 → COW 惰性分裂</text>
  <text x="748" y="378" font-size="9" fill="#a1a1a6">malloc/mmap 只承诺虚拟地址，</text>
  <text x="748" y="392" font-size="9" fill="#a1a1a6">物理页在首次写缺页时才分配</text>
</svg>
