<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="432" viewBox="0 0 1000 432" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="432" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">容器 = namespace + cgroup + rootfs（一个 docker run 贯穿三块内核积木）</text>

  <!-- runc -->
  <rect x="380" y="52" width="240" height="42" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="500" y="72" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">容器运行时（docker / runc）</text>
  <text x="500" y="88" font-size="8.5" fill="#5b7db1" text-anchor="middle">"容器"非内核对象，是运行时拼出的假象</text>

  <!-- 容器框 -->
  <rect x="56" y="116" width="888" height="204" rx="13" fill="#fbfbfd" stroke="#c7c7cc" stroke-dasharray="6 4"/>
  <text x="72" y="136" font-size="10.5" font-weight="600" fill="#6e6e73">容器（一个进程 + 三块积木）</text>

  <!-- namespace -->
  <rect x="80" y="146" width="272" height="158" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="96" y="170" font-size="11" font-weight="600" fill="#3d2a5a">① namespace · 隔离视图</text>
  <text x="96" y="194" font-size="9.5" fill="#6e6e73">clone(CLONE_NEWPID | NEWNS |</text>
  <text x="96" y="212" font-size="9.5" fill="#6e6e73">NEWNET | NEWUTS | NEWIPC …)</text>
  <text x="96" y="236" font-size="9.5" fill="#3d2a5a">→ 独立进程号 / 挂载树 /</text>
  <text x="96" y="254" font-size="9.5" fill="#3d2a5a">　网络栈 / 主机名</text>
  <text x="96" y="282" font-size="9" fill="#a1a1a6">容器"以为"独占整机</text>

  <!-- cgroup -->
  <rect x="364" y="146" width="272" height="158" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="380" y="170" font-size="11" font-weight="600" fill="#1b2a4a">② cgroup · 限资源</text>
  <text x="380" y="194" font-size="9.5" fill="#6e6e73">写 cgroup.procs 把进程纳管</text>
  <text x="380" y="218" font-size="9.5" fill="#1b2a4a">cpu.max / memory.max / io.max</text>
  <text x="380" y="242" font-size="9.5" fill="#1b2a4a">→ 限住 CPU / 内存 / IO 用量</text>
  <text x="380" y="282" font-size="9" fill="#a1a1a6">防止吃垮宿主机</text>

  <!-- rootfs -->
  <rect x="648" y="146" width="272" height="158" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="664" y="170" font-size="11" font-weight="600" fill="#5a3410">③ rootfs · 根文件系统</text>
  <text x="664" y="194" font-size="9.5" fill="#93762e">overlayfs：只读镜像层</text>
  <text x="664" y="212" font-size="9.5" fill="#93762e">+ 可写层，叠成容器的 /</text>
  <text x="664" y="236" font-size="9.5" fill="#5a3410">pivot_root 切根</text>
  <text x="664" y="282" font-size="9" fill="#a1a1a6">→ 容器看到自己的 /</text>

  <!-- 宿主内核 -->
  <rect x="56" y="346" width="888" height="60" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="500" y="370" font-size="11.5" font-weight="600" fill="#12402a" text-anchor="middle">共享同一宿主内核（无独立内核、无硬件虚拟化）</text>
  <text x="500" y="392" font-size="9.5" fill="#2f6f4f" text-anchor="middle">要害：容器 ≠ 虚拟机 —— 隔离强度取决于 namespace / cgroup / capabilities 配置，而非硬件边界</text>

  <!-- 连线 -->
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="500" y1="94" x2="500" y2="116" marker-end="url(#ar)"/>
    <line x1="216" y1="304" x2="216" y2="346" marker-end="url(#ar)"/>
    <line x1="500" y1="304" x2="500" y2="346" marker-end="url(#ar)"/>
    <line x1="784" y1="304" x2="784" y2="346" marker-end="url(#ar)"/>
  </g>
</svg>
