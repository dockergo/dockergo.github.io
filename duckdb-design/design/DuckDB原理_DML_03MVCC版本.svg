<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="470" viewBox="0 0 1020 470"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">UPDATE / DELETE 的 MVCC 版本 · 就地列存 + 旁路版本信息，读走快照</text>

  <!-- 基础数据 -->
  <rect x="30" y="52" width="300" height="180" rx="14" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="48" y="76" font-size="12" font-weight="600" fill="#7a4d00">列存基础数据（RowGroup 内 ColumnSegment）</text>
  <rect x="48" y="92" width="120" height="124" rx="9" fill="#ffffff" stroke="#f0dcae"/>
  <text x="108" y="112" font-size="9.5" font-weight="600" fill="#7a4d00" text-anchor="middle">amount 列</text>
  <rect x="60" y="122" width="96" height="20" rx="4" fill="#faf3e0"/><text x="108" y="136" font-size="8.5" fill="#9a7328" text-anchor="middle">row0: 100</text>
  <rect x="60" y="146" width="96" height="20" rx="4" fill="#faf3e0"/><text x="108" y="160" font-size="8.5" fill="#9a7328" text-anchor="middle">row1: 200</text>
  <rect x="60" y="170" width="96" height="20" rx="4" fill="#faf3e0"/><text x="108" y="184" font-size="8.5" fill="#9a7328" text-anchor="middle">row2: 300</text>
  <rect x="60" y="194" width="96" height="16" rx="4" fill="#faf3e0"/><text x="108" y="206" font-size="8" fill="#9a7328" text-anchor="middle">…</text>
  <rect x="184" y="92" width="130" height="124" rx="9" fill="#ffffff" stroke="#f0dcae"/>
  <text x="249" y="112" font-size="9.5" font-weight="600" fill="#7a4d00" text-anchor="middle">最新就地值</text>
  <text x="249" y="150" font-size="9" fill="#9a7328" text-anchor="middle">UPDATE 直接改</text>
  <text x="249" y="168" font-size="9" fill="#9a7328" text-anchor="middle">段内当前值</text>

  <!-- UPDATE 版本 -->
  <rect x="360" y="52" width="300" height="180" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="378" y="76" font-size="12" font-weight="600" fill="#1b2a4a">UPDATE：UpdateSegment / UpdateInfo</text>
  <text x="378" y="98" font-size="9.5" fill="#5b7db1">update_segment.hpp · 按列挂旧值版本链</text>
  <rect x="378" y="110" width="264" height="42" rx="8" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="510" y="127" font-size="9.5" fill="#1b2a4a" text-anchor="middle">row1 旧值 200 → 存入 UpdateInfo</text>
  <text x="510" y="143" font-size="8.5" fill="#5b7db1" text-anchor="middle">带写入事务 id</text>
  <rect x="378" y="160" width="264" height="60" rx="8" fill="#f6f8fc" stroke="#cfe0f2"/>
  <text x="510" y="182" font-size="9.5" fill="#1b2a4a" text-anchor="middle">读时：若 undo 版本对我的快照可见</text>
  <text x="510" y="200" font-size="9.5" fill="#1b2a4a" text-anchor="middle">→ 用旧值覆盖就地值</text>
  <text x="510" y="214" font-size="8.5" fill="#5b7db1" text-anchor="middle">否则看到最新就地值</text>

  <!-- DELETE 版本 -->
  <rect x="690" y="52" width="300" height="180" rx="14" fill="#fbeaea" stroke="#f0cccc" filter="url(#soft)"/>
  <text x="708" y="76" font-size="12" font-weight="600" fill="#7d1f1f">DELETE：ChunkInfo 删除标记</text>
  <text x="708" y="98" font-size="9.5" fill="#b06a6a">chunk_info.hpp · RowVersionManager</text>
  <rect x="708" y="110" width="264" height="42" rx="8" fill="#ffffff" stroke="#f0cccc"/>
  <text x="840" y="127" font-size="9.5" fill="#7d1f1f" text-anchor="middle">row2 标记删除（不物理擦除）</text>
  <text x="840" y="143" font-size="8.5" fill="#b06a6a" text-anchor="middle">记删除事务 id</text>
  <rect x="708" y="160" width="264" height="60" rx="8" fill="#fdf2f2" stroke="#f0cccc"/>
  <text x="840" y="182" font-size="9.5" fill="#7d1f1f" text-anchor="middle">读时：删除对我的快照生效？</text>
  <text x="840" y="200" font-size="9.5" fill="#7d1f1f" text-anchor="middle">→ 该行从扫描结果剔除</text>
  <text x="840" y="214" font-size="8.5" fill="#b06a6a" text-anchor="middle">旧快照仍能看到它</text>

  <!-- 读者快照 -->
  <rect x="30" y="256" width="960" height="90" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="280" font-size="12.5" font-weight="600" fill="#1d1d1f">读者按 start_time 快照可见性判定（快照隔离）</text>
  <rect x="48" y="294" width="300" height="40" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="198" y="319" font-size="10" fill="#1b2a4a" text-anchor="middle">事务 A（start_time=T1）读旧版本</text>
  <rect x="360" y="294" width="300" height="40" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="510" y="319" font-size="10" fill="#0f5132" text-anchor="middle">事务 B（提交 commit_id=T2&gt;T1）改了行</text>
  <rect x="672" y="294" width="300" height="40" rx="9" fill="#f6f6f8" stroke="#e2e2e7"/><text x="822" y="319" font-size="10" fill="#6a6a70" text-anchor="middle">A 看不到 B 的改动，互不干扰</text>

  <!-- 清理 -->
  <rect x="30" y="360" width="960" height="90" rx="14" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="48" y="384" font-size="12" font-weight="600" fill="#7a4d00">旧版本回收（后台）</text>
  <text x="48" y="408" font-size="10.5" fill="#9a7328">当没有任何活跃事务的 start_time 早于某版本的 commit_id 时，UndoBuffer 里的旧值/删除标记可被清理——</text>
  <text x="48" y="430" font-size="10.5" fill="#9a7328">乐观并发下，写写冲突在提交时以失败告终（不阻塞等待），冲突事务回滚重试。</text>
</svg>
