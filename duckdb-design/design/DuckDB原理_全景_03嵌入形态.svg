<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="470" viewBox="0 0 1020 470"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">部署形态 · 客户端-服务器（ClickHouse/Postgres）  vs  进程内嵌入式（DuckDB）</text>

  <!-- 左：client-server -->
  <rect x="30" y="52" width="460" height="384" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="50" y="78" font-size="12.5" font-weight="600" fill="#86868b">对照系 · 客户端-服务器</text>

  <rect x="60" y="96" width="180" height="60" rx="11" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="150" y="122" font-size="11.5" font-weight="600" fill="#3c1361" text-anchor="middle">应用进程</text>
  <text x="150" y="142" font-size="10.5" fill="#7a5aa8" text-anchor="middle">SQL 客户端 / 驱动</text>

  <rect x="280" y="96" width="180" height="60" rx="11" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="370" y="122" font-size="11.5" font-weight="600" fill="#3c1361" text-anchor="middle">另一应用进程</text>
  <text x="370" y="142" font-size="10.5" fill="#7a5aa8" text-anchor="middle">SQL 客户端 / 驱动</text>

  <rect x="60" y="264" width="400" height="150" rx="12" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="260" y="290" font-size="12" font-weight="600" fill="#1b2a4a" text-anchor="middle">数据库服务器进程（独立守护）</text>
  <rect x="80" y="304" width="170" height="42" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="165" y="330" font-size="10.5" fill="#1b2a4a" text-anchor="middle">查询引擎</text>
  <rect x="270" y="304" width="170" height="42" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="355" y="330" font-size="10.5" fill="#1b2a4a" text-anchor="middle">存储引擎</text>
  <rect x="80" y="356" width="360" height="44" rx="9" fill="#fff7e6" stroke="#f0dcae"/><text x="260" y="383" font-size="10.5" fill="#7a4d00" text-anchor="middle">磁盘数据文件（服务器独占）</text>

  <line x1="150" y1="156" x2="150" y2="264" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="370" y1="156" x2="370" y2="264" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="196" y="206" font-size="10" fill="#c0392b">网络 · 序列化</text>
  <text x="196" y="222" font-size="10" fill="#c0392b">协议往返 · 连接池</text>
  <text x="392" y="206" font-size="10" fill="#c0392b">网络</text>

  <!-- 右：DuckDB embedded -->
  <rect x="520" y="52" width="470" height="384" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="540" y="78" font-size="12.5" font-weight="600" fill="#0f5132">DuckDB · 进程内嵌入式</text>

  <rect x="548" y="96" width="414" height="320" rx="12" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="755" y="120" font-size="12" font-weight="600" fill="#0f5132" text-anchor="middle">宿主应用进程（同一地址空间）</text>

  <rect x="572" y="134" width="366" height="46" rx="10" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="755" y="162" font-size="11" font-weight="600" fill="#3c1361" text-anchor="middle">应用代码（Python / Java / C++ …）</text>

  <rect x="572" y="196" width="366" height="150" rx="11" fill="#ffffff" stroke="#bce6cd"/>
  <text x="755" y="220" font-size="11.5" font-weight="600" fill="#0f5132" text-anchor="middle">DuckDB 库（链接进来，非独立进程）</text>
  <rect x="590" y="234" width="160" height="42" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="670" y="260" font-size="10.5" fill="#1b2a4a" text-anchor="middle">查询引擎</text>
  <rect x="762" y="234" width="160" height="42" rx="9" fill="#fff7e6" stroke="#f0dcae"/><text x="842" y="260" font-size="10.5" fill="#7a4d00" text-anchor="middle">存储引擎</text>
  <rect x="590" y="286" width="332" height="44" rx="9" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="756" y="313" font-size="10.5" fill="#0f5132" text-anchor="middle">零拷贝交换结果（Arrow / 原生向量）</text>

  <rect x="572" y="360" width="366" height="42" rx="10" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="755" y="386" font-size="10.5" fill="#7a4d00" text-anchor="middle">单文件 db（或 :memory: 全内存） · 也可 ATTACH 多库</text>

  <text x="540" y="416" font-size="9.5" fill="#3f8f66"></text>
  <line x1="670" y1="180" x2="670" y2="196" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="700" y="192" font-size="9.5" fill="#3f8f66">函数调用（无网络/无序列化）</text>
</svg>
