  <text x="30" y="392" font-size="10.5" fill="#86868b">读取路径（DQL）几乎调用全部计算/存储/内存能力；DDL 以 Catalog+事务为轴；DML 以存储+MVCC 为轴；DCL 最轻，主要落在 Catalog/扩展（SECRET）。</text>
