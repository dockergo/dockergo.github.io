      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
  </defs>
  <rect width="1020" height="410" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">接触面 × 能力域 依赖矩阵（■ 强　▨ 中　· 弱/无）</text>

  <!-- 列头 -->
  <text x="212" y="72" font-size="11" font-weight="600" fill="#7a4d00" text-anchor="middle">存储引擎</text>
