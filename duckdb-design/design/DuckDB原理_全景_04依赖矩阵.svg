  <text x="564" y="72" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">Catalog</text>
  <text x="652" y="72" font-size="11" font-weight="600" fill="#0f5132" text-anchor="middle">内存Buffer</text>
  <text x="740" y="72" font-size="11" font-weight="600" fill="#3c1361" text-anchor="middle">扩展机制</text>
  <text x="828" y="72" font-size="11" font-weight="600" fill="#7a4d00" text-anchor="middle">后台任务</text>

