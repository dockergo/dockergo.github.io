<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="440" viewBox="0 0 1020 440"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">DQL 生命周期总览 · 一条 SELECT 从文本到结果（ClientContext 内顺序编译 → 并行执行）</text>

  <!-- 贯穿示例 -->
  <rect x="30" y="48" width="960" height="46" rx="11" fill="#f6f6f8" stroke="#e2e2e7"/>
  <text x="46" y="68" font-size="11" font-weight="600" fill="#1d1d1f">贯穿示例</text>
  <text x="46" y="86" font-size="11" fill="#494950" font-family="monospace">SELECT region, SUM(amount) FROM sales JOIN customers USING(cust_id) WHERE year=2025 GROUP BY region ORDER BY 2 DESC LIMIT 10;</text>

  <!-- 编译阶段（前台顺序） -->
  <rect x="30" y="116" width="960" height="128" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="140" font-size="12.5" font-weight="600" fill="#1d1d1f">编译期 · 单线程顺序（main/client_context.cpp）</text>

  <rect x="48" y="156" width="150" height="72" rx="11" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="123" y="182" font-size="11.5" font-weight="600" fill="#3c1361" text-anchor="middle">Parser</text>
  <text x="123" y="202" font-size="9.5" fill="#7a5aa8" text-anchor="middle">Postgres 派生</text>
  <text x="123" y="216" font-size="9.5" fill="#7a5aa8" text-anchor="middle">SQL → AST</text>

  <rect x="216" y="156" width="150" height="72" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="291" y="182" font-size="11.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Binder</text>
  <text x="291" y="202" font-size="9.5" fill="#5b7db1" text-anchor="middle">名称/类型绑定</text>
  <text x="291" y="216" font-size="9.5" fill="#5b7db1" text-anchor="middle">→ 逻辑算子树</text>

  <rect x="384" y="156" width="176" height="72" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="472" y="182" font-size="11.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Optimizer  :526</text>
  <text x="472" y="202" font-size="9.5" fill="#5b7db1" text-anchor="middle">~30 pass 重写逻辑计划</text>
  <text x="472" y="216" font-size="9.5" fill="#5b7db1" text-anchor="middle">下推·Join定序·裁剪</text>

  <rect x="578" y="156" width="196" height="72" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="676" y="182" font-size="11.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">PhysicalPlanGenerator  :538</text>
  <text x="676" y="202" font-size="9.5" fill="#5b7db1" text-anchor="middle">逻辑算子 → 物理算子</text>
  <text x="676" y="216" font-size="9.5" fill="#5b7db1" text-anchor="middle">选 Join / 聚合算法</text>

  <rect x="792" y="156" width="182" height="72" rx="11" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="883" y="182" font-size="11.5" font-weight="600" fill="#0f5132" text-anchor="middle">Executor · 建 Pipeline</text>
  <text x="883" y="202" font-size="9.5" fill="#3f8f66" text-anchor="middle">MetaPipeline→Pipeline</text>
  <text x="883" y="216" font-size="9.5" fill="#3f8f66" text-anchor="middle">→ Event 调度</text>

  <line x1="198" y1="192" x2="216" y2="192" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="366" y1="192" x2="384" y2="192" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="560" y1="192" x2="578" y2="192" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="774" y1="192" x2="792" y2="192" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- 执行阶段（后台并行） -->
  <rect x="30" y="264" width="960" height="150" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="48" y="288" font-size="12.5" font-weight="600" fill="#0f5132">执行期 · TaskScheduler 线程池 · morsel 并行 · push-based 向量化</text>

  <rect x="48" y="302" width="170" height="96" rx="11" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="133" y="326" font-size="11" font-weight="600" fill="#7a4d00" text-anchor="middle">Source · 扫描</text>
  <text x="133" y="346" font-size="9.5" fill="#9a7328" text-anchor="middle">sales / customers</text>
  <text x="133" y="360" font-size="9.5" fill="#9a7328" text-anchor="middle">RowGroup 裁剪</text>
  <text x="133" y="374" font-size="9.5" fill="#9a7328" text-anchor="middle">切成 morsel</text>
  <text x="133" y="388" font-size="9.5" fill="#9a7328" text-anchor="middle">year=2025 下推</text>

  <rect x="236" y="302" width="170" height="96" rx="11" fill="#ffffff" stroke="#bce6cd"/>
  <text x="321" y="326" font-size="11" font-weight="600" fill="#0f5132" text-anchor="middle">Hash Join</text>
  <text x="321" y="346" font-size="9.5" fill="#3f8f66" text-anchor="middle">build customers</text>
  <text x="321" y="360" font-size="9.5" fill="#3f8f66" text-anchor="middle">probe sales</text>
  <text x="321" y="378" font-size="9.5" fill="#3f8f66" text-anchor="middle">on cust_id</text>

  <rect x="424" y="302" width="170" height="96" rx="11" fill="#ffffff" stroke="#bce6cd"/>
  <text x="509" y="326" font-size="11" font-weight="600" fill="#0f5132" text-anchor="middle">Hash 聚合</text>
  <text x="509" y="346" font-size="9.5" fill="#3f8f66" text-anchor="middle">GROUP BY region</text>
  <text x="509" y="360" font-size="9.5" fill="#3f8f66" text-anchor="middle">SUM(amount)</text>
  <text x="509" y="378" font-size="9.5" fill="#3f8f66" text-anchor="middle">radix 分区</text>

  <rect x="612" y="302" width="170" height="96" rx="11" fill="#ffffff" stroke="#bce6cd"/>
  <text x="697" y="326" font-size="11" font-weight="600" fill="#0f5132" text-anchor="middle">排序 + LIMIT</text>
  <text x="697" y="346" font-size="9.5" fill="#3f8f66" text-anchor="middle">ORDER BY 2 DESC</text>
  <text x="697" y="360" font-size="9.5" fill="#3f8f66" text-anchor="middle">Top-N（优化后）</text>
  <text x="697" y="378" font-size="9.5" fill="#3f8f66" text-anchor="middle">取前 10</text>

  <rect x="800" y="302" width="174" height="96" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="887" y="326" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">结果</text>
  <text x="887" y="348" font-size="9.5" fill="#5b7db1" text-anchor="middle">DataChunk 列批</text>
  <text x="887" y="362" font-size="9.5" fill="#5b7db1" text-anchor="middle">零拷贝交回宿主</text>
  <text x="887" y="380" font-size="9.5" fill="#5b7db1" text-anchor="middle">（流式 / 物化）</text>

  <line x1="218" y1="350" x2="236" y2="350" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="406" y1="350" x2="424" y2="350" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="594" y1="350" x2="612" y2="350" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="782" y1="350" x2="800" y2="350" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <line x1="510" y1="244" x2="510" y2="264" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="524" y="258" font-size="9.5" fill="#86868b">物理计划交执行器</text>
</svg>
