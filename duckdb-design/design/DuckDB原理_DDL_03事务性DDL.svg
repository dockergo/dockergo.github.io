<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="430" viewBox="0 0 1020 430"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="430" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">事务性 DDL · Catalog 条目也走 MVCC 版本链（catalog_set.cpp）</text>

  <!-- 版本链 -->
  <rect x="30" y="52" width="620" height="220" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="76" font-size="12.5" font-weight="600" fill="#1d1d1f">同名条目的版本链（GetEntry 沿 chain 找可见版本）</text>

  <rect x="48" y="92" width="180" height="80" rx="10" fill="#f6f6f8" stroke="#e2e2e7"/>
  <text x="138" y="116" font-size="10.5" font-weight="600" fill="#6a6a70" text-anchor="middle">v0（旧定义）</text>
  <text x="138" y="138" font-size="9" fill="#8a8a90" text-anchor="middle">timestamp = 已提交 t0</text>
  <text x="138" y="156" font-size="9" fill="#8a8a90" text-anchor="middle">老快照可见</text>

  <rect x="258" y="92" width="180" height="80" rx="10" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="348" y="116" font-size="10.5" font-weight="600" fill="#0f5132" text-anchor="middle">v1（ALTER 后）</text>
  <text x="348" y="138" font-size="9" fill="#3f8f66" text-anchor="middle">timestamp = commit t1</text>
  <text x="348" y="156" font-size="9" fill="#3f8f66" text-anchor="middle">新快照可见</text>

  <rect x="468" y="92" width="164" height="80" rx="10" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="550" y="116" font-size="10.5" font-weight="600" fill="#3c1361" text-anchor="middle">v2（未提交）</text>
  <text x="550" y="138" font-size="9" fill="#7a5aa8" text-anchor="middle">timestamp = transaction_id</text>
  <text x="550" y="156" font-size="9" fill="#7a5aa8" text-anchor="middle">仅本事务可见（:204）</text>

  <line x1="228" y1="132" x2="258" y2="132" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="438" y1="132" x2="468" y2="132" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <rect x="48" y="188" width="584" height="70" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="64" y="210" font-size="10.5" font-weight="600" fill="#1b2a4a">可见性规则（与数据 MVCC 同构）</text>
  <text x="64" y="230" font-size="9.5" fill="#5b7db1">未提交版本的 timestamp = 写它的 transaction_id（一个很大的标记值）；提交时改写为真正的</text>
  <text x="64" y="248" font-size="9.5" fill="#5b7db1">commit 时间戳。读者沿链找到"对自己快照可见的最新版本"。</text>

  <!-- 冲突检测 -->
  <rect x="670" y="52" width="320" height="220" rx="14" fill="#fbeaea" stroke="#f0cccc" filter="url(#soft)"/>
  <text x="688" y="76" font-size="12.5" font-weight="600" fill="#7d1f1f">写写冲突：HasConflict</text>
  <text x="688" y="98" font-size="9.5" fill="#b06a6a">catalog_set.cpp:116 / 230</text>
  <rect x="688" y="110" width="284" height="66" rx="10" fill="#ffffff" stroke="#f0cccc"/>
  <text x="830" y="132" font-size="9.5" fill="#7d1f1f" text-anchor="middle">两个事务同时改同名对象</text>
  <text x="830" y="152" font-size="9.5" fill="#7d1f1f" text-anchor="middle">→ 后提交者检测到冲突</text>
  <text x="830" y="168" font-size="9.5" fill="#7d1f1f" text-anchor="middle">→ 报错回滚（乐观并发）</text>
  <rect x="688" y="188" width="284" height="70" rx="10" fill="#fdf2f2" stroke="#f0cccc"/>
  <text x="830" y="210" font-size="9.5" fill="#7d1f1f" text-anchor="middle">回滚：撤销本事务在 Catalog 里</text>
  <text x="830" y="228" font-size="9.5" fill="#7d1f1f" text-anchor="middle">建立的未提交版本，</text>
  <text x="830" y="246" font-size="9.5" fill="#7d1f1f" text-anchor="middle">对象定义恢复如初</text>

  <!-- 意义 -->
  <rect x="30" y="292" width="960" height="118" rx="14" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="48" y="316" font-size="12.5" font-weight="600" fill="#7a4d00">事务性 DDL 的价值</text>
  <text x="48" y="340" font-size="10.5" fill="#9a7328">• DDL 与 DML 可放进<tspan font-weight="600"> 同一个事务</tspan>原子提交：如"建表 + 灌数据"要么全成要么全滚，中途报错不留半成品表。</text>
  <text x="48" y="364" font-size="10.5" fill="#9a7328">• 迁移脚本更安全：一串 ALTER/CREATE 包在事务里，失败自动回退，无需手工清理。</text>
  <text x="48" y="388" font-size="10.5" fill="#9a7328">• 对比：很多数据库的 DDL 是隐式提交、不可回滚——DuckDB 把目录也纳入 MVCC，DDL 与数据一视同仁。</text>
</svg>
