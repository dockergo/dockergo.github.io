<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="430" viewBox="0 0 1020 430"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="430" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">INSERT 路径 · 事务本地追加 → 乐观预写 → 提交并入全局表</text>

  <!-- 事务本地 -->
  <rect x="30" y="52" width="440" height="330" rx="14" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="48" y="76" font-size="12.5" font-weight="600" fill="#3c1361">事务内（未提交，仅本连接可见）</text>

  <rect x="48" y="92" width="404" height="52" rx="10" fill="#ffffff" stroke="#d9c9ef"/>
  <text x="250" y="114" font-size="11" font-weight="600" fill="#3c1361" text-anchor="middle">InitializeLocalAppend（data_table.cpp:982）</text>
  <text x="250" y="132" font-size="9.5" fill="#7a5aa8" text-anchor="middle">在 LocalTableStorage 里开一块本地 RowGroupCollection</text>

  <rect x="48" y="158" width="404" height="52" rx="10" fill="#ffffff" stroke="#d9c9ef"/>
  <text x="250" y="180" font-size="11" font-weight="600" fill="#3c1361" text-anchor="middle">LocalAppend（:1007）逐 DataChunk 追加</text>
  <text x="250" y="198" font-size="9.5" fill="#7a5aa8" text-anchor="middle">按列写入本地段，边写边校验约束（NOT NULL / CHECK）</text>

  <rect x="48" y="224" width="404" height="72" rx="10" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="250" y="246" font-size="11" font-weight="600" fill="#0f5132" text-anchor="middle">OptimisticDataWriter（本地满一个 RowGroup 时）</text>
  <text x="250" y="266" font-size="9.5" fill="#3f8f66" text-anchor="middle">大批量导入：把写满的本地 RowGroup 乐观预写进数据文件</text>
  <text x="250" y="284" font-size="9.5" fill="#3f8f66" text-anchor="middle">（不等提交），内存不会随导入量线性膨胀</text>

  <rect x="48" y="310" width="404" height="56" rx="10" fill="#ffffff" stroke="#d9c9ef"/>
  <text x="250" y="332" font-size="11" font-weight="600" fill="#3c1361" text-anchor="middle">FinalizeLocalAppend（:1039）</text>
  <text x="250" y="350" font-size="9.5" fill="#7a5aa8" text-anchor="middle">收尾本地写，准备好待提交的行集</text>

  <line x1="250" y1="144" x2="250" y2="158" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="250" y1="210" x2="250" y2="224" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="250" y1="296" x2="250" y2="310" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- 提交并入 -->
  <rect x="510" y="52" width="480" height="330" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="528" y="76" font-size="12.5" font-weight="600" fill="#1d1d1f">COMMIT：本地行并入全局 DataTable</text>

  <rect x="528" y="92" width="444" height="60" rx="10" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="750" y="114" font-size="11" font-weight="600" fill="#7a4d00" text-anchor="middle">① 写 WAL：WriteInsert（write_ahead_log.cpp:505）</text>
  <text x="750" y="134" font-size="9.5" fill="#9a7328" text-anchor="middle">变更先落日志保证持久 / 可恢复</text>

  <rect x="528" y="166" width="444" height="60" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="750" y="188" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">② 本地 RowGroup 挂接进全局 RowGroupCollection</text>
  <text x="750" y="208" font-size="9.5" fill="#5b7db1" text-anchor="middle">已乐观预写的块直接引用，无需重写</text>

  <rect x="528" y="240" width="444" height="60" rx="10" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="750" y="262" font-size="11" font-weight="600" fill="#0f5132" text-anchor="middle">③ 定 commit_id → 新行对后续快照可见</text>
  <text x="750" y="282" font-size="9.5" fill="#3f8f66" text-anchor="middle">此刻才"对外存在"，之前其他事务读不到</text>

  <rect x="528" y="314" width="444" height="52" rx="10" fill="#f6f6f8" stroke="#e2e2e7"/>
  <text x="750" y="336" font-size="11" font-weight="600" fill="#6a6a70" text-anchor="middle">④ 更新 ART 索引（主键/唯一约束）</text>
  <text x="750" y="354" font-size="9.5" fill="#8a8a90" text-anchor="middle">冲突则整个事务回滚</text>

  <line x1="750" y1="152" x2="750" y2="166" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="750" y1="226" x2="750" y2="240" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="750" y1="300" x2="750" y2="314" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>

  <line x1="470" y1="217" x2="510" y2="217" stroke="#c7c7cc" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="476" y="210" font-size="9" fill="#86868b">COMMIT</text>
</svg>
