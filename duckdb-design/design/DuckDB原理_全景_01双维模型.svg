<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="640" viewBox="0 0 1020 640"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="640" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">DuckDB 双维模型 · 能力域（底座 / 计算 / 保障）× 执行时机（前台同步 / 后台）</text>

  <!-- 接触面主线条 -->
  <rect x="30" y="52" width="960" height="46" rx="12" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="50" y="72" font-size="12.5" font-weight="600" fill="#3c1361">接触面主线（用户下发的 SQL 语句族）</text>
  <text x="50" y="90" font-size="11.5" fill="#7a5aa8">DDL 数据定义　·　DML 数据写入　·　DQL 数据查询　·　DCL 数据控制（配置 / SECRET）</text>
  <text x="740" y="80" font-size="11" fill="#7a5aa8">经 Connection → ClientContext 进入</text>

  <!-- 前台同步区标注 -->
  <text x="30" y="128" font-size="12" font-weight="600" fill="#86868b">前台 · 同步（随查询/事务在工作线程内完成）</text>
  <line x1="30" y1="136" x2="990" y2="136" stroke="#e2e2e7" stroke-width="1"/>

  <!-- 三大分类列 -->
  <!-- 底座 -->
  <rect x="30" y="150" width="300" height="300" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="50" y="176" font-size="13" font-weight="600" fill="#1d1d1f">底座 · 数据与状态</text>

  <rect x="50" y="192" width="260" height="66" rx="11" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="66" y="216" font-size="12" font-weight="600" fill="#7a4d00">① 存储引擎</text>
  <text x="66" y="236" font-size="10.5" fill="#9a7328">单文件 · Block(256KB) · RowGroup(122880)</text>
  <text x="66" y="250" font-size="10.5" fill="#9a7328">ColumnSegment · 压缩 · ART 索引</text>

  <rect x="50" y="268" width="260" height="58" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="66" y="290" font-size="12" font-weight="600" fill="#1b2a4a">② 元数据与 Catalog</text>
  <text x="66" y="310" font-size="10.5" fill="#5b7db1">DuckCatalog · CatalogSet · 依赖管理</text>

  <rect x="50" y="336" width="260" height="66" rx="11" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="66" y="360" font-size="12" font-weight="600" fill="#0f5132">③ 内存与 Buffer 管理</text>
  <text x="66" y="380" font-size="10.5" fill="#3f8f66">BufferPool · Block 换入换出</text>
  <text x="66" y="394" font-size="10.5" fill="#3f8f66">larger-than-memory · 临时文件溢写</text>

  <!-- 计算 -->
  <rect x="360" y="150" width="300" height="300" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="380" y="176" font-size="13" font-weight="600" fill="#1d1d1f">计算 · 把查询算出来</text>

  <rect x="380" y="192" width="260" height="90" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="396" y="214" font-size="12" font-weight="600" fill="#1b2a4a">④ 向量化执行引擎</text>
  <text x="396" y="234" font-size="10.5" fill="#5b7db1">push-based Sink/Source/Operator</text>
  <text x="396" y="250" font-size="10.5" fill="#5b7db1">morsel 并行 · Pipeline · Event 调度</text>
  <text x="396" y="266" font-size="10.5" fill="#5b7db1">DataChunk 列批（向量 2048）</text>

  <rect x="380" y="296" width="260" height="90" rx="11" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="396" y="318" font-size="12" font-weight="600" fill="#3c1361">⑤ 优化技术</text>
  <text x="396" y="338" font-size="10.5" fill="#7a5aa8">~30 个 RBO/CBO pass</text>
  <text x="396" y="354" font-size="10.5" fill="#7a5aa8">谓词下推 · Join 定序 · 统计传播</text>
  <text x="396" y="370" font-size="10.5" fill="#7a5aa8">RowGroup 裁剪 · 后期物化</text>

  <!-- 保障 -->
  <rect x="690" y="150" width="300" height="300" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="710" y="176" font-size="13" font-weight="600" fill="#1d1d1f">保障 · 正确与可扩展</text>

  <rect x="710" y="192" width="260" height="90" rx="11" fill="#fbeaea" stroke="#f0cccc"/>
  <text x="726" y="214" font-size="12" font-weight="600" fill="#7d1f1f">⑥ 事务与 MVCC</text>
  <text x="726" y="234" font-size="10.5" fill="#b06a6a">DuckTransaction · 乐观并发</text>
  <text x="726" y="250" font-size="10.5" fill="#b06a6a">UndoBuffer 版本链 · 快照隔离</text>
  <text x="726" y="266" font-size="10.5" fill="#b06a6a">start_time / transaction_id / commit_id</text>

  <rect x="710" y="296" width="260" height="90" rx="11" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="726" y="318" font-size="12" font-weight="600" fill="#3c1361">⑦ 扩展机制</text>
  <text x="726" y="338" font-size="10.5" fill="#7a5aa8">动态加载 · replacement scan</text>
  <text x="726" y="354" font-size="10.5" fill="#7a5aa8">catalog / 函数 / 存储扩展</text>
  <text x="726" y="370" font-size="10.5" fill="#7a5aa8">httpfs · parquet · 各语言绑定</text>

  <!-- 后台异步带 -->
  <text x="30" y="482" font-size="12" font-weight="600" fill="#86868b">后台 · 异步（不随单条语句返回；单进程内少量后台动作）</text>
  <line x1="30" y1="490" x2="990" y2="490" stroke="#e2e2e7" stroke-width="1"/>

  <rect x="30" y="504" width="960" height="106" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="50" y="528" font-size="13" font-weight="600" fill="#1d1d1f">⑧ 后台任务（分散在各域，非独立大域）</text>
  <rect x="50" y="540" width="290" height="56" rx="11" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="66" y="562" font-size="11.5" font-weight="600" fill="#7a4d00">Checkpoint（WAL 达阈值自动触发）</text>
  <text x="66" y="580" font-size="10.5" fill="#9a7328">WAL 回放 → 合并进单文件 → 截断日志</text>
  <rect x="356" y="540" width="290" height="56" rx="11" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="372" y="562" font-size="11.5" font-weight="600" fill="#0f5132">Buffer 驱逐 / 临时文件回收</text>
  <text x="372" y="580" font-size="10.5" fill="#3f8f66">内存压力下 LRU 换出 · spill 落盘/清理</text>
  <rect x="662" y="540" width="308" height="56" rx="11" fill="#fbeaea" stroke="#f0cccc"/>
  <text x="678" y="562" font-size="11.5" font-weight="600" fill="#7d1f1f">事务清理（旧版本回收）</text>
  <text x="678" y="580" font-size="10.5" fill="#b06a6a">提交后按最低活跃 start_time 回收 UndoBuffer</text>

  <line x1="510" y1="98" x2="510" y2="136" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
</svg>
