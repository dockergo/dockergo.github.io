<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="624" viewBox="0 0 1080 624" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="aHot" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#0a84ff"/></marker>
    <marker id="aState" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#1aa89a"/></marker>
    <marker id="aCtl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#8a5cae"/></marker>
    <marker id="aFail" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#e0742a"/></marker>
  </defs>
  <rect width="1080" height="624" fill="#fbfbfd"/>

  <!-- ===== 标题带 ===== -->
  <text x="24" y="30" font-size="14" font-weight="600" fill="#1d1d1f">DuckDB 总架构 · 多视角透视：进程内嵌入式分析库，向量化 push 执行榨干单机</text>
  <text x="24" y="47" font-size="10.5" fill="#6e6e73">分层脊：接入（in-process）→ 编译流水 → 向量化执行 + MVCC → 自管单文件存储　·　零网络 / 零序列化　源码基准 v1.x</text>

  <!-- ===== 图例：四型语义路径 ===== -->
  <line x1="34" y1="66" x2="64" y2="66" stroke="#0a84ff" stroke-width="1.8" marker-end="url(#aHot)"/>
  <text x="70" y="70" font-size="10.5" fill="#3a3a3c">查询热流 Hot（SQL→结果主轨）</text>
  <line x1="292" y1="66" x2="322" y2="66" stroke="#1aa89a" stroke-width="1.8" marker-end="url(#aState)"/>
  <text x="328" y="70" font-size="10.5" fill="#3a3a3c">事务 / 存储 State（MVCC · 单文件）</text>
  <line x1="590" y1="66" x2="620" y2="66" stroke="#8a5cae" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aCtl)"/>
  <text x="626" y="70" font-size="10.5" fill="#3a3a3c">扩展 / Catalog 旁路 Control</text>
  <line x1="838" y1="66" x2="868" y2="66" stroke="#e0742a" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#aFail)"/>
  <text x="874" y="70" font-size="10.5" fill="#3a3a3c">内存压力 / WAL 恢复</text>
  <text x="1056" y="70" font-size="10" fill="#a1a1a6" text-anchor="end">框 = 主线可下钻</text>

  <!-- ===== ⓪ 接入层（in-process） ===== -->
  <rect x="24" y="80" width="1032" height="42" rx="12" fill="#f2f4f8" stroke="#d4dae6" filter="url(#soft)"/>
  <text x="40" y="99" font-size="11.5" font-weight="600" fill="#2a3550">⓪ 接入层 · 作为库链接进宿主进程（无网络 · 无守护进程）</text>
  <text x="40" y="116" font-size="9.5" fill="#6e6e73">CLI · C/C++ API · Python/R/Node · JDBC/ODBC/WASM　→　Connection → ClientContext　·　数据在宿主内存 / 单文件</text>

  <!-- ===== ① 编译流水 Hot ===== -->
  <rect x="24" y="132" width="1032" height="78" rx="14" fill="#eef4fd" stroke="#bcd6f5" filter="url(#soft)"/>
  <text x="40" y="152" font-size="12" font-weight="600" fill="#1b5fb0">① 编译流水 · 一条 SQL 到可执行 Pipeline（Hot 主轨）</text>
  <g text-anchor="middle" font-size="9.5">
    <rect x="40" y="160" width="192" height="42" rx="8" fill="#fff" stroke="#bcd6f5" data-tid="DuckDB原理_DQL数据查询" data-lab="Parser"/><text x="136" y="180" fill="#0a3d78" font-weight="600">Parser</text><text x="136" y="195" fill="#5b7db1" font-size="8.5">SQL → AST（PG 派生）</text>
    <rect x="242" y="160" width="192" height="42" rx="8" fill="#fff" stroke="#bcd6f5" data-tid="DuckDB原理_支撑_元数据与Catalog" data-lab="Binder / Catalog"/><text x="338" y="180" fill="#0a3d78" font-weight="600">Binder</text><text x="338" y="195" fill="#5b7db1" font-size="8.5">绑名/类型 · 查 Catalog</text>
    <rect x="444" y="160" width="192" height="42" rx="8" fill="#fff" stroke="#bcd6f5" data-tid="DuckDB原理_支撑_优化技术" data-lab="Optimizer"/><text x="540" y="180" fill="#0a3d78" font-weight="600">Optimizer</text><text x="540" y="195" fill="#5b7db1" font-size="8.5">~30 pass · RBO+CBO</text>
    <rect x="646" y="160" width="192" height="42" rx="8" fill="#fff" stroke="#bcd6f5" data-tid="DuckDB原理_DQL数据查询" data-lab="PhysicalPlan"/><text x="742" y="180" fill="#0a3d78" font-weight="600">PhysicalPlan</text><text x="742" y="195" fill="#5b7db1" font-size="8.5">逻辑 → 物理算子</text>
    <rect x="848" y="160" width="192" height="42" rx="8" fill="#fff" stroke="#bcd6f5" data-tid="DuckDB原理_支撑_执行引擎" data-lab="Executor"/><text x="944" y="180" fill="#0a3d78" font-weight="600">Executor</text><text x="944" y="195" fill="#5b7db1" font-size="8.5">建 Pipeline · 交调度</text>
  </g>

  <!-- ===== ②向量化执行(Hot) + ③事务(State) ===== -->
  <rect x="24" y="220" width="700" height="98" rx="14" fill="#eef4fd" stroke="#bcd6f5" filter="url(#soft)" data-tid="DuckDB原理_支撑_执行引擎" data-lab="向量化执行层"/>
  <text x="40" y="240" font-size="11.5" font-weight="600" fill="#1b5fb0">② 向量化执行 · push-based</text>
  <g font-size="9" text-anchor="middle">
    <rect x="40" y="250" width="330" height="26" rx="7" fill="#fff" stroke="#bcd6f5"/><text x="205" y="267" fill="#1b2a4a">Operator：Sink / Source / Execute · DataChunk（列批 2048）</text>
    <rect x="382" y="250" width="330" height="26" rx="7" fill="#fff" stroke="#bcd6f5"/><text x="547" y="267" fill="#1b2a4a">morsel 并行 · TaskScheduler 线程池抢占</text>
    <rect x="40" y="282" width="672" height="26" rx="7" fill="#f5f9fe" stroke="#d6e6f9"/><text x="376" y="299" fill="#6e6e73">表达式向量化 · Hash 聚合/Join · 排序 · 窗口 —— 列批上批处理，缓存友好 / SIMD</text>
  </g>

  <rect x="736" y="220" width="320" height="98" rx="14" fill="#e6f6f3" stroke="#b3e2da" filter="url(#soft)" data-tid="DuckDB原理_支撑_事务与MVCC" data-lab="事务 · MVCC"/>
  <text x="752" y="240" font-size="11.5" font-weight="600" fill="#0f6b5e">③ 事务 · MVCC（State）</text>
  <g font-size="9" text-anchor="middle">
    <rect x="752" y="250" width="288" height="26" rx="7" fill="#fff" stroke="#b3e2da"/><text x="896" y="267" fill="#0f6b5e">DuckTransactionManager · 快照隔离</text>
    <rect x="752" y="282" width="288" height="26" rx="7" fill="#fff" stroke="#b3e2da"/><text x="896" y="299" fill="#0f6b5e">UndoBuffer 版本链 · 乐观并发</text>
  </g>

  <!-- ===== ④ 存储层 State ===== -->
  <rect x="24" y="328" width="1032" height="112" rx="14" fill="#e6f6f3" stroke="#b3e2da" filter="url(#soft)"/>
  <text x="40" y="348" font-size="12" font-weight="600" fill="#0f6b5e">④ 存储层 · 自管单文件（State · StorageManager / BlockManager）</text>
  <g font-size="9">
    <rect x="40" y="358" width="325" height="72" rx="10" fill="#fff" stroke="#b3e2da" data-tid="DuckDB原理_支撑_存储引擎" data-lab="逻辑数据组织"/>
    <text x="56" y="378" font-size="10.5" font-weight="600" fill="#0f6b5e">逻辑数据组织</text>
    <text x="56" y="397" fill="#6e6e73">DataTable → RowGroup(122880 行)</text>
    <text x="56" y="414" fill="#6e6e73">→ ColumnSegment · 列级压缩 · ART 索引</text>

    <rect x="377" y="358" width="325" height="72" rx="10" fill="#fff" stroke="#b3e2da" data-tid="DuckDB原理_支撑_内存与Buffer管理" data-lab="物理块与缓存"/>
    <text x="393" y="378" font-size="10.5" font-weight="600" fill="#0f6b5e">物理块与缓存</text>
    <text x="393" y="397" fill="#6e6e73">SingleFileBlockManager · Block 256KB</text>
    <text x="393" y="414" fill="#e0742a">BufferManager · 内存压力 → 驱逐/落盘</text>

    <rect x="714" y="358" width="326" height="72" rx="10" fill="#fff" stroke="#b3e2da" data-tid="DuckDB原理_支撑_后台任务" data-lab="持久化与恢复"/>
    <text x="730" y="378" font-size="10.5" font-weight="600" fill="#0f6b5e">持久化与恢复</text>
    <text x="730" y="397" fill="#6e6e73">WAL 先写 · Checkpoint 合并 · 单文件</text>
    <text x="730" y="414" fill="#e0742a">重启回放 WAL 恢复 · :memory: 全内存</text>
  </g>

  <!-- ===== ⑤ SQL 接口契约 ===== -->
  <rect x="24" y="448" width="1032" height="118" rx="14" fill="#f7f7f9" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="40" y="468" font-size="12" font-weight="600" fill="#1d1d1f">⑤ SQL 接口契约 · 四类语句按类型分派（DQL 即上方 ①②）+ 可插拔扩展</text>
  <g font-size="8.5">
    <rect x="40" y="478" width="241" height="80" rx="10" fill="#fff" stroke="#e2e2e7" data-tid="DuckDB原理_DDL数据定义" data-lab="DDL 数据定义"/>
    <text x="56" y="498" font-size="10" font-weight="600" fill="#1d1d1f">DDL 数据定义</text>
    <text x="56" y="516" fill="#6e6e73">= 增删改一个 CatalogEntry</text>
    <text x="56" y="532" fill="#6e6e73">走 MVCC · 事务性可回滚</text>
    <text x="56" y="548" fill="#6e6e73">依赖 CASCADE / RESTRICT</text>

    <rect x="293" y="478" width="241" height="80" rx="10" fill="#fff" stroke="#e2e2e7" data-tid="DuckDB原理_DML数据写入" data-lab="DML 数据写入"/>
    <text x="309" y="498" font-size="10" font-weight="600" fill="#1d1d1f">DML 数据写入</text>
    <text x="309" y="516" fill="#6e6e73">先入事务本地 → COMMIT 写 WAL</text>
    <text x="309" y="532" fill="#6e6e73">UPDATE 就地 · DELETE 打标记</text>
    <text x="309" y="548" fill="#6e6e73">WAL 超阈 / CHECKPOINT 合并</text>

    <rect x="546" y="478" width="241" height="80" rx="10" fill="#fff" stroke="#e2e2e7" data-tid="DuckDB原理_DCL数据控制" data-lab="DCL 数据控制"/>
    <text x="562" y="498" font-size="10" font-weight="600" fill="#1d1d1f">DCL 数据控制</text>
    <text x="562" y="516" fill="#6e6e73">嵌入式无 GRANT/REVOKE</text>
    <text x="562" y="532" fill="#6e6e73">READ_ONLY / WRITE + 路径白名单</text>
    <text x="562" y="548" fill="#6e6e73">SECRET 集中管外部凭证</text>

    <rect x="799" y="478" width="241" height="80" rx="10" fill="#f4eefb" stroke="#dcc6ee" stroke-dasharray="5 3" data-tid="DuckDB原理_支撑_扩展机制" data-lab="扩展机制"/>
    <text x="815" y="498" font-size="10" font-weight="600" fill="#5a2a82">扩展机制 · 旁路（Control）</text>
    <text x="815" y="516" fill="#6e6e73">INSTALL + LOAD 动态载入</text>
    <text x="815" y="532" fill="#6e6e73">注册 函数/类型/数据源 → Catalog</text>
    <text x="815" y="548" fill="#6e6e73">替换扫描：FROM 'x.parquet'</text>
  </g>

  <!-- ===== 语义分型连线 ===== -->
  <!-- Hot：接入 → 编译 -->
  <line x1="540" y1="122" x2="540" y2="132" stroke="#0a84ff" stroke-width="1.8" marker-end="url(#aHot)"/>
  <!-- Hot：管线内横向 -->
  <g stroke="#0a84ff" stroke-width="1.6">
    <line x1="232" y1="181" x2="241" y2="181" marker-end="url(#aHot)"/>
    <line x1="434" y1="181" x2="443" y2="181" marker-end="url(#aHot)"/>
    <line x1="636" y1="181" x2="645" y2="181" marker-end="url(#aHot)"/>
    <line x1="838" y1="181" x2="847" y2="181" marker-end="url(#aHot)"/>
  </g>
  <!-- Hot：编译 → 执行 -->
  <line x1="360" y1="210" x2="360" y2="220" stroke="#0a84ff" stroke-width="1.8" marker-end="url(#aHot)"/>
  <!-- State：执行 ↔ 存储 -->
  <line x1="200" y1="318" x2="200" y2="328" stroke="#1aa89a" stroke-width="1.6" marker-end="url(#aState)"/>
  <!-- State：事务 → 存储 -->
  <line x1="896" y1="318" x2="896" y2="328" stroke="#1aa89a" stroke-width="1.6" marker-end="url(#aState)"/>
  <!-- Control：扩展 → Catalog(Binder) 旁路 -->
  <path d="M919,478 C919,455 338,255 338,204" fill="none" stroke="#8a5cae" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#aCtl)"/>

  <!-- ===== 读法 ===== -->
  <rect x="24" y="576" width="1032" height="30" rx="8" fill="#f7f7f9" stroke="#ececef"/>
  <text x="540" y="595" font-size="10" fill="#4a4a4f" text-anchor="middle">读法：SQL 进程内编译成 Pipeline → 向量化 push 执行读列批 → MVCC 走快照，写落自管单文件；扩展从旁路注册进 Catalog，四类语句按类型分派</text>

  <!-- 标题带热区（全景可下钻） -->
  <rect x="0" y="0" width="1080" height="56" fill="none" stroke="none" data-tid="DuckDB原理_全景主线框架" data-lab="全景主线框架"/>
</svg>
