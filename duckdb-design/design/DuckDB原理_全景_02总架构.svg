<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="892" viewBox="0 0 1020 892"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="892" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">DuckDB 总架构 · 进程内嵌入式：从 SQL 到结果的单机全链路</text>
  <rect data-tid="DuckDB原理_全景主线框架" data-lab="全景总览" x="0" y="0" width="1020" height="44" fill="none" stroke="none"/>

  <!-- 接入层 -->
  <rect data-tid="DuckDB原理_全景主线框架" data-lab="接入层" x="30" y="50" width="960" height="82" rx="14" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="48" y="74" font-size="12.5" font-weight="600" fill="#3c1361">① 接入层 · 作为库链接进宿主进程</text>
  <rect x="48" y="86" width="150" height="34" rx="9" fill="#ffffff" stroke="#d9c9ef"/><text x="123" y="108" font-size="11" fill="#3c1361" text-anchor="middle">CLI / C·C++ API</text>
  <rect x="210" y="86" width="150" height="34" rx="9" fill="#ffffff" stroke="#d9c9ef"/><text x="285" y="108" font-size="11" fill="#3c1361" text-anchor="middle">Python / R / Node</text>
  <rect x="372" y="86" width="150" height="34" rx="9" fill="#ffffff" stroke="#d9c9ef"/><text x="447" y="108" font-size="11" fill="#3c1361" text-anchor="middle">JDBC / ODBC / WASM</text>
  <rect x="540" y="86" width="200" height="34" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="640" y="108" font-size="11" fill="#1b2a4a" text-anchor="middle">Connection → ClientContext</text>
  <text x="770" y="100" font-size="10.5" fill="#7a5aa8">无网络 · 无守护进程</text>
  <text x="770" y="116" font-size="10.5" fill="#7a5aa8">数据在宿主内存 / 单文件</text>

  <!-- 处理层 -->
  <rect x="30" y="148" width="960" height="150" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="172" font-size="12.5" font-weight="600" fill="#1d1d1f">② 处理层 · 编译一条 SQL（client_context.cpp）</text>

  <rect data-tid="DuckDB原理_DQL数据查询" data-lab="Parser" x="48" y="188" width="130" height="86" rx="11" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="113" y="222" font-size="11.5" font-weight="600" fill="#3c1361" text-anchor="middle">Parser</text>
  <text x="113" y="242" font-size="10" fill="#7a5aa8" text-anchor="middle">Postgres 派生</text>
  <text x="113" y="256" font-size="10" fill="#7a5aa8" text-anchor="middle">SQL → AST</text>

  <rect data-tid="DuckDB原理_支撑_元数据与Catalog" data-lab="Binder" x="196" y="188" width="130" height="86" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="261" y="222" font-size="11.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Binder</text>
  <text x="261" y="242" font-size="10" fill="#5b7db1" text-anchor="middle">名称/类型绑定</text>
  <text x="261" y="256" font-size="10" fill="#5b7db1" text-anchor="middle">AST → 逻辑算子</text>

  <rect data-tid="DuckDB原理_支撑_优化技术" data-lab="Optimizer" x="344" y="188" width="150" height="86" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="419" y="222" font-size="11.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Optimizer</text>
  <text x="419" y="242" font-size="10" fill="#5b7db1" text-anchor="middle">~30 pass RBO/CBO</text>
  <text x="419" y="256" font-size="10" fill="#5b7db1" text-anchor="middle">逻辑 → 逻辑</text>

  <rect data-tid="DuckDB原理_DQL数据查询" data-lab="PhysicalPlan" x="512" y="188" width="160" height="86" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="592" y="222" font-size="11.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">PhysicalPlanGenerator</text>
  <text x="592" y="242" font-size="10" fill="#5b7db1" text-anchor="middle">逻辑 → 物理算子</text>
  <text x="592" y="256" font-size="10" fill="#5b7db1" text-anchor="middle">选 Join/聚合算法</text>

  <rect data-tid="DuckDB原理_支撑_执行引擎" data-lab="Executor" x="690" y="188" width="284" height="86" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="832" y="216" font-size="11.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">Executor · 构建 Pipeline</text>
  <text x="832" y="238" font-size="10" fill="#5b7db1" text-anchor="middle">MetaPipeline → Pipeline → Event</text>
  <text x="832" y="254" font-size="10" fill="#5b7db1" text-anchor="middle">交 TaskScheduler 线程池并行</text>

  <line x1="178" y1="231" x2="196" y2="231" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="326" y1="231" x2="344" y2="231" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="494" y1="231" x2="512" y2="231" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="672" y1="231" x2="690" y2="231" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- 执行层 -->
  <rect data-tid="DuckDB原理_支撑_执行引擎" data-lab="向量化执行层" x="30" y="314" width="620" height="164" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="338" font-size="12.5" font-weight="600" fill="#1d1d1f">③ 向量化执行层 · push-based</text>
  <rect x="48" y="352" width="280" height="52" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="188" y="374" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">Operator：Sink / Source / Execute</text>
  <text x="188" y="392" font-size="10" fill="#5b7db1" text-anchor="middle">数据单位 = DataChunk（列向量批 2048）</text>
  <rect x="344" y="352" width="288" height="52" rx="11" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="488" y="374" font-size="11" font-weight="600" fill="#0f5132" text-anchor="middle">morsel 并行 · TaskScheduler 线程池</text>
  <text x="488" y="392" font-size="10" fill="#3f8f66" text-anchor="middle">源按 morsel 切分 → 多线程抢占推进</text>
  <rect x="48" y="414" width="584" height="50" rx="11" fill="#f6f6f8" stroke="#e2e2e7"/>
  <text x="340" y="443" font-size="10.5" fill="#6a6a70" text-anchor="middle">表达式向量化求值 · Hash 聚合/Join · 排序 · 窗口 —— 全部在列批上批量执行</text>

  <!-- 事务层 -->
  <rect data-tid="DuckDB原理_支撑_事务与MVCC" data-lab="事务层MVCC" x="668" y="314" width="322" height="164" rx="14" fill="#fbeaea" stroke="#f0cccc" filter="url(#soft)"/>
  <text x="686" y="338" font-size="12.5" font-weight="600" fill="#7d1f1f">④ 事务层 · MVCC</text>
  <rect x="686" y="352" width="286" height="44" rx="10" fill="#ffffff" stroke="#f0cccc"/>
  <text x="829" y="379" font-size="10.8" fill="#7d1f1f" text-anchor="middle">DuckTransactionManager · 快照隔离</text>
  <rect x="686" y="404" width="286" height="44" rx="10" fill="#ffffff" stroke="#f0cccc"/>
  <text x="829" y="431" font-size="10.8" fill="#7d1f1f" text-anchor="middle">UndoBuffer 版本链 · 乐观并发</text>
  <text x="829" y="466" font-size="10" fill="#b06a6a" text-anchor="middle">读走快照，写记 undo，提交定 commit_id</text>

  <!-- 存储层 -->
  <rect x="30" y="494" width="960" height="182" rx="14" fill="#fff7e6" stroke="#f0dcae" filter="url(#soft)"/>
  <text x="48" y="518" font-size="12.5" font-weight="600" fill="#7a4d00">⑤ 存储层 · 自管单文件（storage_manager / block_manager）</text>

  <rect data-tid="DuckDB原理_支撑_存储引擎" data-lab="逻辑数据组织" x="48" y="532" width="300" height="128" rx="11" fill="#ffffff" stroke="#f0dcae"/>
  <text x="198" y="554" font-size="11" font-weight="600" fill="#7a4d00" text-anchor="middle">逻辑数据组织</text>
  <text x="198" y="576" font-size="10.5" fill="#9a7328" text-anchor="middle">DataTable → RowGroupCollection</text>
  <text x="198" y="596" font-size="10.5" fill="#9a7328" text-anchor="middle">→ RowGroup(122880 行)</text>
  <text x="198" y="616" font-size="10.5" fill="#9a7328" text-anchor="middle">→ ColumnData → ColumnSegment</text>
  <text x="198" y="636" font-size="10.5" fill="#9a7328" text-anchor="middle">列级压缩 · ART 索引</text>

  <rect data-tid="DuckDB原理_支撑_内存与Buffer管理" data-lab="物理块与缓存" x="364" y="532" width="300" height="128" rx="11" fill="#ffffff" stroke="#f0dcae"/>
  <text x="514" y="554" font-size="11" font-weight="600" fill="#7a4d00" text-anchor="middle">物理块与缓存</text>
  <text x="514" y="576" font-size="10.5" fill="#9a7328" text-anchor="middle">SingleFileBlockManager</text>
  <text x="514" y="596" font-size="10.5" fill="#9a7328" text-anchor="middle">Block 分配 256KB（默认）</text>
  <text x="514" y="616" font-size="10.5" fill="#9a7328" text-anchor="middle">BufferManager / BufferPool</text>
  <text x="514" y="636" font-size="10.5" fill="#9a7328" text-anchor="middle">按需换入 · 内存压力驱逐</text>

  <rect data-tid="DuckDB原理_支撑_后台任务" data-lab="持久化与恢复" x="680" y="532" width="294" height="128" rx="11" fill="#ffffff" stroke="#f0dcae"/>
  <text x="827" y="554" font-size="11" font-weight="600" fill="#7a4d00" text-anchor="middle">持久化与恢复</text>
  <text x="827" y="576" font-size="10.5" fill="#9a7328" text-anchor="middle">WAL 先写 · Checkpoint 合并</text>
  <text x="827" y="596" font-size="10.5" fill="#9a7328" text-anchor="middle">Catalog + 数据 同一单文件</text>
  <text x="827" y="616" font-size="10.5" fill="#9a7328" text-anchor="middle">重启回放 WAL 恢复</text>
  <text x="827" y="636" font-size="10.5" fill="#9a7328" text-anchor="middle">:memory: 模式则全在内存</text>

  <line x1="510" y1="132" x2="510" y2="148" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="340" y1="298" x2="340" y2="314" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="340" y1="478" x2="340" y2="494" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="356" y="308" font-size="9.5" fill="#86868b">执行</text>
  <text x="356" y="490" font-size="9.5" fill="#86868b">读/写数据</text>

  <!-- 接口契约层（SQL 四类语句分派 + 可插拔扩展） -->
  <rect x="30" y="700" width="960" height="168" rx="14" fill="#f7f8fa" stroke="#e2e4e8" filter="url(#soft)"/>
  <text x="48" y="724" font-size="12.5" font-weight="600" fill="#55555c">⑥ SQL 接口契约 · 四类语句按类型分派 + 可插拔扩展（DQL 数据查询即上方②③处理/执行流水线）</text>

  <!-- DML 提交 → 落盘（一条支撑虚线，接回存储层） -->
  <line x1="373" y1="736" x2="373" y2="680" stroke="#b0b0b8" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="388" y="694" font-size="9.5" fill="#86868b">DDL/DML 提交 → 写 WAL · 落单文件（存储层）</text>

  <!-- DDL 数据定义 -->
  <rect data-tid="DuckDB原理_DDL数据定义" data-lab="DDL" x="48" y="736" width="205" height="120" rx="11" fill="#e4f4f1" stroke="#a9d6cb"/>
  <text x="62" y="758" font-size="11" font-weight="700" fill="#0e5c4f">▤ DDL 数据定义</text>
  <text x="60" y="778" font-size="8.5" fill="#2f7d6e">本质 = 增删改一个 CatalogEntry</text>
  <text x="60" y="794" font-size="8.5" fill="#2f7d6e">Binder 定位 → CatalogSet 建条目</text>
  <text x="60" y="810" font-size="8.5" fill="#2f7d6e">条目走 MVCC · 事务性可回滚</text>
  <text x="60" y="826" font-size="8.5" fill="#2f7d6e">DependencyManager CASCADE/RESTRICT</text>
  <text x="60" y="846" font-size="7" fill="#7bb3a7">catalog_set.cpp:199 · dependency_manager.hpp</text>

  <!-- DML 数据写入 -->
  <rect data-tid="DuckDB原理_DML数据写入" data-lab="DML" x="271" y="736" width="205" height="120" rx="11" fill="#fdeee6" stroke="#f2cdb6"/>
  <text x="285" y="758" font-size="11" font-weight="700" fill="#8a4a1e">✎ DML 数据写入</text>
  <text x="283" y="778" font-size="8.5" fill="#a5652f">INSERT/UPDATE/DELETE 先入事务本地</text>
  <text x="283" y="794" font-size="8.5" fill="#a5652f">COMMIT 定 commit_id → 写 WAL</text>
  <text x="283" y="810" font-size="8.5" fill="#a5652f">UPDATE 就地写 · DELETE 打删除标记</text>
  <text x="283" y="826" font-size="8.5" fill="#a5652f">WAL&gt;16MB / CHECKPOINT 后台合并</text>
  <text x="283" y="846" font-size="7" fill="#c99b78">data_table.cpp · write_ahead_log.cpp</text>

  <!-- DCL 数据控制 -->
  <rect data-tid="DuckDB原理_DCL数据控制" data-lab="DCL" x="494" y="736" width="205" height="120" rx="11" fill="#eceff7" stroke="#c3cbe6"/>
  <text x="508" y="758" font-size="11" font-weight="700" fill="#2f3a6b">⛨ DCL 数据控制</text>
  <text x="506" y="778" font-size="8.5" fill="#4a5687">嵌入式无 GRANT/REVOKE 授权</text>
  <text x="506" y="794" font-size="8.5" fill="#4a5687">访问模式 READ_ONLY / WRITE</text>
  <text x="506" y="810" font-size="8.5" fill="#4a5687">安全闸门 + 路径白名单 + 配置封印</text>
  <text x="506" y="826" font-size="8.5" fill="#4a5687">SECRET 集中管理外部数据源凭证</text>
  <text x="506" y="846" font-size="7" fill="#8b93b8">access_mode.hpp:15 · secret_manager.hpp</text>

  <!-- 扩展机制（旁路 · 虚框） -->
  <rect data-tid="DuckDB原理_支撑_扩展机制" data-lab="扩展机制" x="716" y="736" width="258" height="120" rx="11" fill="#f3ecf9" stroke="#d8c6ec" stroke-dasharray="5 3"/>
  <text x="730" y="758" font-size="11" font-weight="700" fill="#5a3a7a">⧉ 扩展机制 · 旁路</text>
  <text x="728" y="778" font-size="8.5" fill="#7a5aa8">INSTALL 下载 + LOAD 动态载入入口</text>
  <text x="728" y="794" font-size="8.5" fill="#7a5aa8">注册 函数/类型/数据源/SECRET → Catalog</text>
  <text x="728" y="810" font-size="8.5" fill="#7a5aa8">替换扫描：FROM 'x.parquet' 兜底改写</text>
  <text x="728" y="826" font-size="8.5" fill="#7a5aa8">已知扩展 autoload · 受信任策略约束</text>
  <text x="728" y="846" font-size="7" fill="#a98fc7">extension_manager.hpp:8 · replacement_scan.hpp</text>
</svg>
