<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="430" viewBox="0 0 1020 430"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="430" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">依赖管理 · DependencyManager 防止悬空引用（DROP CASCADE / RESTRICT）</text>

  <!-- 依赖图 -->
  <rect x="30" y="52" width="470" height="330" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="76" font-size="12.5" font-weight="600" fill="#1d1d1f">对象依赖图（AddObject 时登记，:128）</text>

  <rect x="180" y="96" width="160" height="46" rx="10" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="260" y="118" font-size="10.5" font-weight="600" fill="#7a4d00" text-anchor="middle">TABLE sales</text>
  <text x="260" y="134" font-size="8.5" fill="#9a7328" text-anchor="middle">被依赖的基础对象</text>

  <rect x="60" y="200" width="160" height="46" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="140" y="222" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">VIEW v_report</text>
  <text x="140" y="238" font-size="8.5" fill="#5b7db1" text-anchor="middle">SELECT … FROM sales</text>

  <rect x="300" y="200" width="160" height="46" rx="10" fill="#f4eefb" stroke="#d9c9ef"/>
  <text x="380" y="222" font-size="10.5" font-weight="600" fill="#3c1361" text-anchor="middle">INDEX idx_region</text>
  <text x="380" y="238" font-size="8.5" fill="#7a5aa8" text-anchor="middle">ON sales(region)</text>

  <rect x="60" y="300" width="160" height="46" rx="10" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="140" y="322" font-size="10.5" font-weight="600" fill="#0f5132" text-anchor="middle">VIEW v_top</text>
  <text x="140" y="338" font-size="8.5" fill="#3f8f66" text-anchor="middle">FROM v_report</text>

  <line x1="220" y1="142" x2="150" y2="200" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="300" y1="142" x2="370" y2="200" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="140" y1="246" x2="140" y2="300" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="235" y="180" font-size="8.5" fill="#86868b">依赖</text>

  <!-- DROP 决策 -->
  <rect x="520" y="52" width="470" height="330" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="538" y="76" font-size="12.5" font-weight="600" fill="#1d1d1f">DROP sales 时的判定（DropObject，:133）</text>

  <rect x="640" y="92" width="230" height="44" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="755" y="114" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">sales 有依赖者？</text>
  <text x="755" y="130" font-size="8.5" fill="#5b7db1" text-anchor="middle">v_report / idx_region</text>

  <rect x="538" y="176" width="200" height="90" rx="10" fill="#fbeaea" stroke="#f0cccc"/>
  <text x="638" y="200" font-size="10.5" font-weight="600" fill="#7d1f1f" text-anchor="middle">RESTRICT（默认）</text>
  <text x="638" y="222" font-size="9.5" fill="#b06a6a" text-anchor="middle">报错：存在依赖对象</text>
  <text x="638" y="240" font-size="9.5" fill="#b06a6a" text-anchor="middle">拒绝删除</text>
  <text x="638" y="258" font-size="8.5" fill="#c99" text-anchor="middle">保护：不产生悬空视图</text>

  <rect x="770" y="176" width="200" height="90" rx="10" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="870" y="200" font-size="10.5" font-weight="600" fill="#0f5132" text-anchor="middle">CASCADE</text>
  <text x="870" y="222" font-size="9.5" fill="#3f8f66" text-anchor="middle">递归删除依赖者</text>
  <text x="870" y="240" font-size="9.5" fill="#3f8f66" text-anchor="middle">sales → v_report</text>
  <text x="870" y="258" font-size="9.5" fill="#3f8f66" text-anchor="middle">→ v_top → idx 全删</text>

  <rect x="538" y="290" width="432" height="76" rx="10" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="554" y="312" font-size="10.5" font-weight="600" fill="#7a4d00">ALTER 也查依赖（AlterObject，:134）</text>
  <text x="554" y="332" font-size="9.5" fill="#9a7328">改列类型/删列时，依赖该列的视图/索引会被一并检查——</text>
  <text x="554" y="350" font-size="9.5" fill="#9a7328">列级依赖由 column_dependency_manager 精细追踪。</text>

  <line x1="755" y1="136" x2="638" y2="176" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="755" y1="136" x2="870" y2="176" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
</svg>
