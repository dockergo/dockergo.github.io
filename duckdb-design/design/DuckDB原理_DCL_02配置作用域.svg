<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="400" viewBox="0 0 1020 400"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="400" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">配置作用域 · SET / RESET 的 GLOBAL 与 SESSION（set_scope.hpp:15-19）</text>

  <!-- GLOBAL -->
  <rect x="30" y="52" width="460" height="150" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="48" y="76" font-size="12" font-weight="600" fill="#1b2a4a">SET GLOBAL … （库实例级）</text>
  <text x="48" y="100" font-size="10.5" fill="#5b7db1">作用于整个 DatabaseInstance，影响之后所有连接。</text>
  <rect x="48" y="112" width="200" height="36" rx="8" fill="#ffffff" stroke="#bcd0ec"/><text x="148" y="135" font-size="9.5" fill="#1b2a4a" text-anchor="middle">memory_limit / threads</text>
  <rect x="258" y="112" width="214" height="36" rx="8" fill="#ffffff" stroke="#bcd0ec"/><text x="365" y="135" font-size="9.5" fill="#1b2a4a" text-anchor="middle">access_mode / 外部访问闸门</text>
  <text x="48" y="174" font-size="9.5" fill="#5b7db1">典型：资源上限、引擎行为、安全策略——一处设置全局生效。</text>
  <text x="48" y="192" font-size="9.5" fill="#5b7db1">RESET GLOBAL 恢复默认。</text>

  <!-- SESSION -->
  <rect x="530" y="52" width="460" height="150" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="548" y="76" font-size="12" font-weight="600" fill="#0f5132">SET SESSION … （连接级）</text>
  <text x="548" y="100" font-size="10.5" fill="#3f8f66">仅作用于当前连接，不影响其他连接。</text>
  <rect x="548" y="112" width="200" height="36" rx="8" fill="#ffffff" stroke="#bce6cd"/><text x="648" y="135" font-size="9.5" fill="#0f5132" text-anchor="middle">search_path / TimeZone</text>
  <rect x="758" y="112" width="214" height="36" rx="8" fill="#ffffff" stroke="#bce6cd"/><text x="865" y="135" font-size="9.5" fill="#0f5132" text-anchor="middle">本连接的查询行为微调</text>
  <text x="548" y="174" font-size="9.5" fill="#3f8f66">默认 SET（不写 scope）多为 SESSION/自动语义。</text>
  <text x="548" y="192" font-size="9.5" fill="#3f8f66">LOCAL 作用域在源码中标记 unused。</text>

  <!-- lock_configuration -->
  <rect x="30" y="222" width="960" height="76" rx="14" fill="#fbeaea" stroke="#f0cccc" filter="url(#soft)"/>
  <text x="48" y="246" font-size="12" font-weight="600" fill="#7d1f1f">lock_configuration = true（settings.hpp:1443）：锁死配置</text>
  <text x="48" y="270" font-size="10.5" fill="#b06a6a">开启后，除白名单（"始终允许修改"的选项）外，所有配置项不可再改——防止运行时被 SQL 篡改安全设置。</text>
  <text x="48" y="290" font-size="10.5" fill="#b06a6a">常用于：把 DuckDB 嵌进受控环境，先锁好 enable_external_access / 扩展信任，再对外开放执行 SQL。</text>

  <!-- 流程 -->
  <rect x="30" y="318" width="960" height="66" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="340" font-size="11" font-weight="600" fill="#1d1d1f">SET 语句处理（SetStatement，set_statement.hpp）</text>
  <rect x="360" y="350" width="130" height="26" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="425" y="368" font-size="9" fill="#1b2a4a" text-anchor="middle">解析 name+scope</text>
  <rect x="500" y="350" width="130" height="26" rx="7" fill="#fbeaea" stroke="#f0cccc"/><text x="565" y="368" font-size="9" fill="#7d1f1f" text-anchor="middle">检查 lock 白名单</text>
  <rect x="640" y="350" width="150" height="26" rx="7" fill="#eafaf1" stroke="#bce6cd"/><text x="715" y="368" font-size="9" fill="#0f5132" text-anchor="middle">写入对应作用域</text>
  <line x1="490" y1="363" x2="500" y2="363" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="630" y1="363" x2="640" y2="363" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
</svg>
