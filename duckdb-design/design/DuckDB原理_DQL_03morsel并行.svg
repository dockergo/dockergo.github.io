<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="520" viewBox="0 0 1020 520"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">morsel 并行 与 Pipeline / Event 调度 · 单机多核吃满，无网络 exchange</text>

  <!-- 左：morsel 并行 -->
  <rect x="30" y="50" width="560" height="270" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="74" font-size="12.5" font-weight="600" fill="#1d1d1f">morsel 驱动：源切块，线程抢占推进同一条 Pipeline</text>

  <rect x="48" y="88" width="200" height="120" rx="11" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="148" y="110" font-size="11" font-weight="600" fill="#7a4d00" text-anchor="middle">Source（表 sales）</text>
  <rect x="64" y="122" width="168" height="18" rx="5" fill="#ffffff" stroke="#f0dcae"/><text x="148" y="135" font-size="8.5" fill="#9a7328" text-anchor="middle">morsel #1（若干 RowGroup/向量）</text>
  <rect x="64" y="144" width="168" height="18" rx="5" fill="#ffffff" stroke="#f0dcae"/><text x="148" y="157" font-size="8.5" fill="#9a7328" text-anchor="middle">morsel #2</text>
  <rect x="64" y="166" width="168" height="18" rx="5" fill="#ffffff" stroke="#f0dcae"/><text x="148" y="179" font-size="8.5" fill="#9a7328" text-anchor="middle">morsel #3</text>
  <rect x="64" y="188" width="168" height="14" rx="5" fill="#ffffff" stroke="#f0dcae"/><text x="148" y="199" font-size="8" fill="#9a7328" text-anchor="middle">… MaxThreads() 决定切分上限</text>

  <rect x="300" y="88" width="270" height="120" rx="11" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="435" y="110" font-size="11" font-weight="600" fill="#0f5132" text-anchor="middle">TaskScheduler 线程池</text>
  <rect x="316" y="122" width="74" height="70" rx="8" fill="#ffffff" stroke="#bce6cd"/><text x="353" y="152" font-size="9" fill="#0f5132" text-anchor="middle">线程1</text><text x="353" y="168" font-size="8" fill="#3f8f66" text-anchor="middle">取morsel</text>
  <rect x="398" y="122" width="74" height="70" rx="8" fill="#ffffff" stroke="#bce6cd"/><text x="435" y="152" font-size="9" fill="#0f5132" text-anchor="middle">线程2</text><text x="435" y="168" font-size="8" fill="#3f8f66" text-anchor="middle">取morsel</text>
  <rect x="480" y="122" width="74" height="70" rx="8" fill="#ffffff" stroke="#bce6cd"/><text x="517" y="152" font-size="9" fill="#0f5132" text-anchor="middle">线程N</text><text x="517" y="168" font-size="8" fill="#3f8f66" text-anchor="middle">取morsel</text>

  <line x1="248" y1="148" x2="300" y2="148" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="256" y="140" font-size="8.5" fill="#86868b">抢占领取</text>

  <rect x="48" y="222" width="522" height="82" rx="11" fill="#f6f6f8" stroke="#e2e2e7"/>
  <text x="64" y="244" font-size="10.5" font-weight="600" fill="#1d1d1f">每线程持有一份 LocalSinkState / LocalSourceState（无锁本地累积）</text>
  <text x="64" y="264" font-size="10" fill="#6a6a70">聚合/Join 的 Sink 用 radix 分区哈希表：本地分区 → Finalize 合并（Combine），把跨线程</text>
  <text x="64" y="282" font-size="10" fill="#6a6a70">重分区留在同一进程内做，取代分布式 shuffle。`threads` 设置调线程池规模（默认=CPU 核数）。</text>

  <!-- 右：Pipeline / Event 调度 -->
  <rect x="608" y="50" width="382" height="270" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="626" y="74" font-size="12.5" font-weight="600" fill="#1d1d1f">Pipeline 断点与 Event 依赖</text>
  <text x="626" y="94" font-size="9.5" fill="#86868b">每个 Sink（聚合/Join build/排序）切开新管道</text>

  <rect x="640" y="108" width="150" height="40" rx="9" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="715" y="132" font-size="9.5" fill="#7a4d00" text-anchor="middle">P1: 扫 customers → build</text>
  <rect x="808" y="108" width="150" height="40" rx="9" fill="#fff7e6" stroke="#f0dcae"/>
  <text x="883" y="132" font-size="9.5" fill="#7a4d00" text-anchor="middle">P2: 扫 sales → probe</text>

  <rect x="640" y="176" width="150" height="40" rx="9" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="715" y="200" font-size="9.5" fill="#1b2a4a" text-anchor="middle">P3: Join 输出 → 聚合</text>
  <rect x="808" y="176" width="150" height="40" rx="9" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="883" y="200" font-size="9.5" fill="#1b2a4a" text-anchor="middle">（聚合 Sink 断点）</text>

  <rect x="640" y="244" width="318" height="40" rx="9" fill="#eafaf1" stroke="#bce6cd"/>
  <text x="799" y="268" font-size="9.5" fill="#0f5132" text-anchor="middle">P4: 聚合读出 → 排序 → LIMIT → 结果</text>

  <line x1="715" y1="148" x2="715" y2="176" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="883" y1="148" x2="750" y2="176" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="715" y1="216" x2="715" y2="244" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="626" y="304" font-size="9" fill="#86868b">Executor 把 MetaPipeline 拆成 Pipeline，用 Event 栈</text>
  <text x="626" y="316" font-size="9" fill="#86868b">（init/finish/complete）表达"build 完才能 probe"的依赖</text>

  <!-- 底部说明 -->
  <rect x="30" y="336" width="960" height="164" rx="14" fill="#f6f6f8" stroke="#e2e2e7"/>
  <text x="48" y="360" font-size="12" font-weight="600" fill="#1d1d1f">调度要点</text>
  <text x="48" y="384" font-size="10.5" fill="#494950">• <tspan font-weight="600">morsel = 细粒度工作单元</tspan>：线程做完一块就抢下一块，天然负载均衡（快线程多干），避免静态切分的长尾。</text>
  <text x="48" y="408" font-size="10.5" fill="#494950">• <tspan font-weight="600">Pipeline 断点在 Sink</tspan>：Sink 必须吸收全部输入才能产出（如 Join 要先建完整张 Hash 表），故其上游是一条独立管道。</text>
  <text x="48" y="432" font-size="10.5" fill="#494950">• <tspan font-weight="600">Event 表达依赖</tspan>：Executor 用 Event（PipelineEventStack：initialize / finish / complete）把管道间"先后"关系连成 DAG 调度。</text>
  <text x="48" y="456" font-size="10.5" fill="#494950">• <tspan font-weight="600">同进程重分区</tspan>：需要按 key 重分布时（聚合/Join），用 radix 分区哈希表在内存里完成，不产生网络传输。</text>
  <text x="48" y="480" font-size="10.5" fill="#494950">• <tspan font-weight="600">阻塞可让出</tspan>：算子返回 BLOCKED（如等 I/O / 溢写）时线程转去跑其他任务，不空转。</text>
</svg>
