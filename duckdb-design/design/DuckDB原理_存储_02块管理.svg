<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="450" viewBox="0 0 1020 450"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1020" height="450" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">单文件与块管理 · SingleFileBlockManager + free list 复用（single_file_block_manager.cpp）</text>

  <!-- 文件布局 -->
  <rect x="30" y="52" width="600" height="230" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="76" font-size="12.5" font-weight="600" fill="#1d1d1f">.duckdb 文件布局</text>
  <rect x="48" y="90" width="270" height="46" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="183" y="112" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">Header 1 / Header 2（双写）</text><text x="183" y="128" font-size="8.5" fill="#5b7db1" text-anchor="middle">交替写，崩溃时保一份完整</text>
  <rect x="330" y="90" width="284" height="46" rx="8" fill="#f6f6f8" stroke="#e2e2e7"/><text x="472" y="112" font-size="9.5" fill="#494950" text-anchor="middle">头含：块数 · block_alloc_size</text><text x="472" y="128" font-size="8.5" fill="#6a6a70" text-anchor="middle">meta_block 指针 · free_list 指针</text>
  <rect x="48" y="146" width="566" height="54" rx="8" fill="#fff7e6" stroke="#f0dcae"/><text x="331" y="168" font-size="10" font-weight="600" fill="#7a4d00" text-anchor="middle">Block 区（每块 256KB，编号 block_id）</text><text x="331" y="188" font-size="9" fill="#9a7328" text-anchor="middle">列存 Segment 数据 / overflow 大值 / 索引页 都住在这里</text>
  <rect x="48" y="210" width="566" height="54" rx="8" fill="#f4eefb" stroke="#d9c9ef"/><text x="331" y="232" font-size="10" font-weight="600" fill="#3c1361" text-anchor="middle">Metadata 块（Catalog + 表指针序列化）</text><text x="331" y="252" font-size="9" fill="#7a5aa8" text-anchor="middle">元数据与数据同文件，无外部元数据服务</text>

  <!-- free list -->
  <rect x="660" y="52" width="330" height="230" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="678" y="76" font-size="12.5" font-weight="600" fill="#0f5132">free list · 块复用</text>
  <rect x="678" y="90" width="294" height="52" rx="9" fill="#ffffff" stroke="#bce6cd"/>
  <text x="825" y="112" font-size="9.5" fill="#0f5132" text-anchor="middle">GetFreeBlockId（block_manager.hpp:49）</text>
  <text x="825" y="130" font-size="8.5" fill="#3f8f66" text-anchor="middle">分配块：优先复用空闲块</text>
  <rect x="678" y="152" width="294" height="52" rx="9" fill="#ffffff" stroke="#bce6cd"/>
  <text x="825" y="174" font-size="9.5" fill="#0f5132" text-anchor="middle">checkpoint 后释放旧块进 free_list</text>
  <text x="825" y="192" font-size="8.5" fill="#3f8f66" text-anchor="middle">（single_file_block_manager.cpp:273）</text>
  <rect x="678" y="214" width="294" height="54" rx="9" fill="#fdfdf5" stroke="#bce6cd"/>
  <text x="825" y="236" font-size="9.5" fill="#0f5132" text-anchor="middle">效果：文件不会无限膨胀</text>
  <text x="825" y="254" font-size="8.5" fill="#3f8f66" text-anchor="middle">改删产生的空洞被后续写复用</text>

  <line x1="630" y1="167" x2="660" y2="167" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- 持久化时机 -->
  <rect x="30" y="300" width="960" height="130" rx="14" fill="#ffffff" stroke="#e2e2e7" filter="url(#soft)"/>
  <text x="48" y="324" font-size="12.5" font-weight="600" fill="#1d1d1f">写盘时机与一致性</text>
  <text x="48" y="348" font-size="10.5" fill="#494950">• 运行时改动先入 WAL（旁路 .wal 文件）；checkpoint 才把变更整理进 Block 区并更新 Header。</text>
  <text x="48" y="372" font-size="10.5" fill="#494950">• Header 双写 + 版本号：写新 Header 前旧 Header 完好，崩溃时按较新且完整的那份恢复。</text>
  <text x="48" y="396" font-size="10.5" fill="#494950">• :memory: 模式无 BlockManager 落盘，全部块驻内存（受 memory_limit 与溢写约束）。</text>
  <text x="48" y="418" font-size="10.5" fill="#494950">• Block 经 BufferManager 按需换入/驱逐——文件可远大于内存（见"内存与 Buffer 管理"）。</text>
</svg>
