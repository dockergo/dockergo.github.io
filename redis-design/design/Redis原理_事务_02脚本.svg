<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="440" viewBox="0 0 1000 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Lua 脚本：原子执行 + 效果复制（传执行结果而非脚本，eval.c/script.c）</text>
  <text x="30" y="49" font-size="10.5" fill="#a1a1a6">EVAL/EVALSHA 按 SHA1 缓存；Functions（7.0+）常驻函数库</text>

  <!-- eval flow -->
  <g text-anchor="middle" font-size="9.5">
    <rect x="40" y="80" width="150" height="50" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="115" y="101" fill="#1b2a4a">EVAL script</text><text x="115" y="117" fill="#5b7db1" font-size="8.5">numkeys KEYS ARGV</text>
    <rect x="230" y="80" width="150" height="50" rx="8" fill="#f6f0fb" stroke="#dcc6ee"/><text x="305" y="101" fill="#5a2a82">SHA1 缓存</text><text x="305" y="117" fill="#8a5cae" font-size="8.5">lua_scripts dict</text>
    <rect x="420" y="80" width="160" height="50" rx="8" fill="#eafaf1" stroke="#b8e6cd"/><text x="500" y="101" fill="#1c6b45">单线程原子执行</text><text x="500" y="117" fill="#3a9b6e" font-size="8.5">DENY_BLOCKING 不阻塞</text>
    <rect x="620" y="80" width="160" height="50" rx="8" fill="#fdf3e5" stroke="#f0d9b5"/><text x="700" y="101" fill="#7a5a1e">redis.call 改数据</text><text x="700" y="117" fill="#b08535" font-size="8.5">在服务端就地操作</text>
  </g>
  <line x1="190" y1="105" x2="228" y2="105" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="380" y1="105" x2="418" y2="105" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="580" y1="105" x2="618" y2="105" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="880" y="100" font-size="9" fill="#a1a1a6">EVALSHA sha1</text>
  <text x="880" y="114" font-size="9" fill="#a1a1a6">复用免重传脚本</text>

  <!-- effects replication -->
  <rect x="40" y="156" width="920" height="130" rx="10" fill="#eafaf1" stroke="#b8e6cd"/>
  <text x="60" y="180" font-size="11" font-weight="600" fill="#1c6b45">效果复制（effects replication）：传播的是执行产生的写命令，不是脚本本身</text>
  <g text-anchor="middle" font-size="9">
    <rect x="70" y="196" width="200" height="46" rx="7" fill="#fff" stroke="#b8e6cd"/><text x="170" y="215" fill="#1c6b45">脚本含 SET k math.random()</text><text x="170" y="231" fill="#3a9b6e" font-size="8">若传脚本文本…</text>
    <rect x="310" y="196" width="230" height="46" rx="7" fill="#fdeef2" stroke="#f6c9d6"/><text x="425" y="215" fill="#c02a56">从库重跑 random → 不同值</text><text x="425" y="231" fill="#88304a" font-size="8">主从分歧！</text>
    <rect x="590" y="196" width="330" height="46" rx="7" fill="#eafaf1" stroke="#b8e6cd"/><text x="755" y="211" fill="#1c6b45">Redis 传实际执行的 SET k 0.37</text><text x="755" y="227" fill="#3a9b6e" font-size="8">从库照抄结果 → 一致（script.c:681）</text>
  </g>
  <line x1="270" y1="219" x2="308" y2="219" stroke="#c7c7cc" stroke-width="1.2"/>
  <line x1="540" y1="219" x2="588" y2="219" stroke="#2dd4a7" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="500" y="266" font-size="9" fill="#3a9b6e" text-anchor="middle">多条效果自动包在 MULTI/EXEC 里传播 → 从库/AOF 回放确定性</text>

  <!-- Functions + slow script -->
  <rect x="40" y="302" width="450" height="120" rx="10" fill="#f6f0fb" stroke="#dcc6ee"/>
  <text x="60" y="326" font-size="11" font-weight="600" fill="#5a2a82">Functions（7.0+，functions.c）</text>
  <text x="60" y="348" font-size="9.5" fill="#8a5cae">FUNCTION LOAD 加载函数库常驻服务端</text>
  <text x="60" y="368" font-size="9.5" fill="#8a5cae">FCALL 调用 —— 比 EVAL 更适合管理复用逻辑</text>
  <text x="60" y="388" font-size="9.5" fill="#8a5cae">redis.register_function 注册命名函数</text>
  <text x="60" y="408" font-size="9" fill="#a884c8">与 EVAL 共用 scriptPrepareForRun 执行路径</text>

  <rect x="510" y="302" width="450" height="120" rx="10" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="530" y="326" font-size="11" font-weight="600" fill="#7a5a1e">慢脚本处理（单线程下的风险）</text>
  <text x="530" y="348" font-size="9.5" fill="#b08535">脚本长时间运行会阻塞所有其他客户端</text>
  <text x="530" y="368" font-size="9.5" fill="#b08535">超 busy-reply-threshold → 进入超时模式</text>
  <text x="530" y="388" font-size="9.5" fill="#b08535">processEventsWhileBlocked 让别的客户端收 BUSY</text>
  <text x="530" y="408" font-size="9" fill="#c79a4e">SCRIPT KILL 可杀（未产生写时）；已写则须等或重启</text>
</svg>
