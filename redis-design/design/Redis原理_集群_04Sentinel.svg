<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="460" viewBox="0 0 1000 460" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="460" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Sentinel：不分片场景的高可用（SDOWN → ODOWN → 故障转移，sentinel.c:4654）</text>
  <text x="30" y="49" font-size="10.5" fill="#a1a1a6">多个 Sentinel 监控单主多从；quorum 把主观下线升级为客观下线</text>

  <!-- topology -->
  <g text-anchor="middle" font-size="9">
    <rect x="400" y="76" width="200" height="46" rx="8" fill="#fdeef2" stroke="#f6c9d6" filter="url(#soft)"/><text x="500" y="95" fill="#c02a56" font-weight="600">主库 Master（宕机）</text><text x="500" y="111" fill="#88304a" font-size="8">被监控对象</text>
    <rect x="300" y="150" width="130" height="40" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="365" y="174" fill="#1b2a4a">从库 R1</text>
    <rect x="570" y="150" width="130" height="40" rx="7" fill="#eef3fb" stroke="#bcd0ec"/><text x="635" y="174" fill="#1b2a4a">从库 R2</text>

    <rect x="60" y="230" width="150" height="46" rx="8" fill="#f6f0fb" stroke="#dcc6ee"/><text x="135" y="249" fill="#5a2a82" font-weight="600">Sentinel 1</text><text x="135" y="265" fill="#8a5cae" font-size="8">监控 + 投票</text>
    <rect x="425" y="230" width="150" height="46" rx="8" fill="#f6f0fb" stroke="#dcc6ee"/><text x="500" y="249" fill="#5a2a82" font-weight="600">Sentinel 2</text><text x="500" y="265" fill="#8a5cae" font-size="8">监控 + 投票</text>
    <rect x="790" y="230" width="150" height="46" rx="8" fill="#f6f0fb" stroke="#dcc6ee"/><text x="865" y="249" fill="#5a2a82" font-weight="600">Sentinel 3</text><text x="865" y="265" fill="#8a5cae" font-size="8">监控 + 投票</text>
  </g>
  <line x1="450" y1="122" x2="400" y2="148" stroke="#c7c7cc" stroke-width="1.2"/>
  <line x1="550" y1="122" x2="600" y2="148" stroke="#c7c7cc" stroke-width="1.2"/>
  <line x1="135" y1="230" x2="420" y2="110" stroke="#dcc6ee" stroke-width="1.1" stroke-dasharray="3 3"/>
  <line x1="500" y1="230" x2="500" y2="124" stroke="#dcc6ee" stroke-width="1.1" stroke-dasharray="3 3"/>
  <line x1="865" y1="230" x2="580" y2="110" stroke="#dcc6ee" stroke-width="1.1" stroke-dasharray="3 3"/>
  <text x="720" y="205" font-size="8.5" fill="#a1a1a6">各 Sentinel 独立 PING 主库</text>

  <!-- SDOWN -> ODOWN -->
  <rect x="40" y="300" width="440" height="90" rx="10" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="60" y="324" font-size="11" font-weight="600" fill="#7a5a1e">SDOWN（主观下线，SRI_S_DOWN）</text>
  <text x="60" y="346" font-size="9.5" fill="#b08535">单个 Sentinel 在 down-after-milliseconds 内</text>
  <text x="60" y="364" font-size="9.5" fill="#b08535">收不到主库有效回复 → 自己认为它下线</text>
  <text x="60" y="382" font-size="8.5" fill="#c79a4e">仅一家之言，不足以触发故障转移</text>

  <rect x="510" y="300" width="450" height="90" rx="10" fill="#fdeef2" stroke="#f6c9d6"/>
  <text x="530" y="324" font-size="11" font-weight="600" fill="#c02a56">ODOWN（客观下线，SRI_O_DOWN）</text>
  <text x="530" y="346" font-size="9.5" fill="#88304a">≥ quorum 个 Sentinel 都报告 SDOWN</text>
  <text x="530" y="364" font-size="9.5" fill="#88304a">→ 确认下线（sentinelCheckObjectivelyDown）</text>
  <text x="530" y="382" font-size="8.5" fill="#c8607f">达成 → 选 leader Sentinel 执行故障转移</text>

  <line x1="480" y1="345" x2="508" y2="345" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="494" y="338" font-size="8" fill="#a1a1a6" text-anchor="middle">升级</text>

  <rect x="40" y="404" width="920" height="46" rx="8" fill="#eafaf1" stroke="#b8e6cd"/>
  <text x="60" y="426" font-size="10" fill="#1c6b45">故障转移：Sentinel 间选 leader → leader 选一个数据最新的从库晋升新主 → 重配其他从库指向新主 → 通知客户端</text>
  <text x="60" y="444" font-size="9" fill="#5cb88a">Cluster 用于分片+HA;Sentinel 用于"数据单机可容纳、只要主库自动切换"的场景，客户端连 Sentinel 问当前主库地址</text>
</svg>
