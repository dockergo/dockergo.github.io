<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="470" viewBox="0 0 1000 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Cluster：16384 哈希槽分片（keyHashSlot，cluster.c:33-61）</text>
  <text x="30" y="49" font-size="10.5" fill="#a1a1a6">slot = CRC16(key) &amp; 16383；哈希标签 {…} 让相关键同槽</text>

  <!-- hash slot computation -->
  <text x="40" y="86" font-size="11" font-weight="700" fill="#5a2a82">槽计算</text>
  <g text-anchor="middle" font-size="9.5">
    <rect x="60" y="98" width="130" height="44" rx="8" fill="#f6f0fb" stroke="#dcc6ee"/><text x="125" y="119" fill="#5a2a82">key = "user:100"</text><text x="125" y="134" fill="#8a5cae" font-size="8.5">或 {user1}:cart</text>
    <rect x="230" y="98" width="130" height="44" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="295" y="119" fill="#1b2a4a">CRC16(key)</text><text x="295" y="134" fill="#5b7db1" font-size="8.5">循环冗余校验</text>
    <rect x="400" y="98" width="130" height="44" rx="8" fill="#eafaf1" stroke="#b8e6cd"/><text x="465" y="119" fill="#1c6b45">&amp; 16383</text><text x="465" y="134" fill="#3a9b6e" font-size="8.5">= % 16384</text>
    <rect x="570" y="98" width="130" height="44" rx="8" fill="#fdf3e5" stroke="#f0d9b5"/><text x="635" y="119" fill="#7a5a1e">slot ∈ [0,16383]</text><text x="635" y="134" fill="#b08535" font-size="8.5">确定的槽号</text>
  </g>
  <line x1="190" y1="120" x2="228" y2="120" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="360" y1="120" x2="398" y2="120" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="530" y1="120" x2="568" y2="120" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="740" y="115" font-size="9" fill="#a1a1a6">哈希标签 {user1}:</text>
  <text x="740" y="129" font-size="9" fill="#a1a1a6">只对 user1 算槽</text>

  <!-- slot distribution across nodes -->
  <text x="40" y="180" font-size="11" font-weight="700" fill="#1d1d1f">16384 槽分配给多个主节点（每主带从库）</text>
  <g text-anchor="middle">
    <rect x="60" y="196" width="270" height="120" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="195" y="218" font-size="11" font-weight="600" fill="#1b2a4a">节点 A（主）</text>
    <text x="195" y="238" font-size="10" fill="#5b7db1">持槽 0 – 5460</text>
    <rect x="90" y="252" width="100" height="46" rx="7" fill="#fff" stroke="#cfe0f2"/><text x="140" y="272" font-size="9" fill="#1b2a4a">从库 A1</text><text x="140" y="286" font-size="7.5" fill="#8ba7cc">复制 A</text>
    <rect x="200" y="252" width="100" height="46" rx="7" fill="#fff" stroke="#cfe0f2"/><text x="250" y="272" font-size="9" fill="#1b2a4a">从库 A2</text><text x="250" y="286" font-size="7.5" fill="#8ba7cc">复制 A</text>

    <rect x="365" y="196" width="270" height="120" rx="10" fill="#eafaf1" stroke="#b8e6cd" filter="url(#soft)"/>
    <text x="500" y="218" font-size="11" font-weight="600" fill="#1c6b45">节点 B（主）</text>
    <text x="500" y="238" font-size="10" fill="#3a9b6e">持槽 5461 – 10922</text>
    <rect x="395" y="252" width="100" height="46" rx="7" fill="#fff" stroke="#b8e6cd"/><text x="445" y="272" font-size="9" fill="#1c6b45">从库 B1</text><text x="445" y="286" font-size="7.5" fill="#5cb88a">复制 B</text>
    <rect x="505" y="252" width="100" height="46" rx="7" fill="#fff" stroke="#b8e6cd"/><text x="555" y="272" font-size="9" fill="#1c6b45">从库 B2</text><text x="555" y="286" font-size="7.5" fill="#5cb88a">复制 B</text>

    <rect x="670" y="196" width="270" height="120" rx="10" fill="#fdf3e5" stroke="#f0d9b5" filter="url(#soft)"/>
    <text x="805" y="218" font-size="11" font-weight="600" fill="#7a5a1e">节点 C（主）</text>
    <text x="805" y="238" font-size="10" fill="#b08535">持槽 10923 – 16383</text>
    <rect x="700" y="252" width="100" height="46" rx="7" fill="#fff" stroke="#f0d9b5"/><text x="750" y="272" font-size="9" fill="#7a5a1e">从库 C1</text><text x="750" y="286" font-size="7.5" fill="#c79a4e">复制 C</text>
    <rect x="810" y="252" width="100" height="46" rx="7" fill="#fff" stroke="#f0d9b5"/><text x="860" y="272" font-size="9" fill="#7a5a1e">从库 C2</text><text x="860" y="286" font-size="7.5" fill="#c79a4e">复制 C</text>
  </g>

  <rect x="40" y="336" width="920" height="120" rx="10" fill="#f7f7f9" stroke="#ececef"/>
  <text x="60" y="360" font-size="11" font-weight="600" fill="#1d1d1f">为何是 16384 而非更多</text>
  <text x="60" y="382" font-size="10" fill="#4a4a4f">· Gossip 心跳需携带槽位图（bitmap）：16384 位 = 2KB，节点数通常 &lt;1000，2KB 心跳开销可接受</text>
  <text x="60" y="402" font-size="10" fill="#4a4a4f">· 槽数 &gt;&gt; 节点数 → 每节点持多个槽，扩缩容时按槽粒度迁移，均衡且渐进</text>
  <text x="60" y="422" font-size="10" fill="#1c6b45">· 哈希标签 {tag}：把 {user1}:profile 与 {user1}:cart 固定到同槽 → 支持它们之间的多键操作/事务</text>
  <text x="60" y="442" font-size="9" fill="#86868b">跨槽的多键命令（MGET 不同槽 / 跨槽事务）会报错 —— 这是分片的固有约束</text>
</svg>
