<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="470" viewBox="0 0 1000 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">fork + Copy-On-Write：子进程持一致快照，父进程不停服</text>
  <text x="30" y="49" font-size="10.5" fill="#a1a1a6">写时才复制内存页；BGSAVE / AOF 重写都依赖它（server.c:7437,7479）</text>

  <!-- before fork -->
  <text x="120" y="86" font-size="11" font-weight="700" fill="#1d1d1f" text-anchor="middle">① fork 瞬间：共享全部页</text>
  <rect x="40" y="98" width="70" height="150" rx="8" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="75" y="118" font-size="9" fill="#1b2a4a" text-anchor="middle">父进程</text>
  <rect x="130" y="98" width="70" height="150" rx="8" fill="#eafaf1" stroke="#b8e6cd" filter="url(#soft)"/>
  <text x="165" y="118" font-size="9" fill="#1c6b45" text-anchor="middle">子进程</text>
  <!-- shared pages -->
  <g font-size="8" text-anchor="middle">
    <rect x="215" y="128" width="70" height="26" rx="5" fill="#fdf3e5" stroke="#f0d9b5"/><text x="250" y="145" fill="#7a5a1e">页 A</text>
    <rect x="215" y="160" width="70" height="26" rx="5" fill="#fdf3e5" stroke="#f0d9b5"/><text x="250" y="177" fill="#7a5a1e">页 B</text>
    <rect x="215" y="192" width="70" height="26" rx="5" fill="#fdf3e5" stroke="#f0d9b5"/><text x="250" y="209" fill="#7a5a1e">页 C</text>
  </g>
  <line x1="110" y1="150" x2="213" y2="141" stroke="#4f9dff" stroke-width="1.2"/>
  <line x1="110" y1="175" x2="213" y2="173" stroke="#4f9dff" stroke-width="1.2"/>
  <line x1="110" y1="200" x2="213" y2="205" stroke="#4f9dff" stroke-width="1.2"/>
  <line x1="200" y1="150" x2="213" y2="141" stroke="#2dd4a7" stroke-width="1.2"/>
  <line x1="200" y1="175" x2="213" y2="173" stroke="#2dd4a7" stroke-width="1.2"/>
  <line x1="200" y1="200" x2="213" y2="205" stroke="#2dd4a7" stroke-width="1.2"/>
  <text x="165" y="270" font-size="8.5" fill="#a1a1a6" text-anchor="middle">物理内存只有一份</text>

  <!-- after write -->
  <text x="560" y="86" font-size="11" font-weight="700" fill="#1d1d1f" text-anchor="middle">② 父进程写页 B：内核复制该页（COW）</text>
  <rect x="420" y="98" width="70" height="150" rx="8" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="455" y="118" font-size="9" fill="#1b2a4a" text-anchor="middle">父进程</text>
  <rect x="510" y="98" width="70" height="150" rx="8" fill="#eafaf1" stroke="#b8e6cd" filter="url(#soft)"/>
  <text x="545" y="118" font-size="9" fill="#1c6b45" text-anchor="middle">子进程</text>
  <g font-size="8" text-anchor="middle">
    <rect x="620" y="120" width="70" height="24" rx="5" fill="#fdf3e5" stroke="#f0d9b5"/><text x="655" y="136" fill="#7a5a1e">页 A（共享）</text>
    <rect x="620" y="150" width="70" height="24" rx="5" fill="#fdeef2" stroke="#f6c9d6"/><text x="655" y="166" fill="#c02a56">页 B'（父新副本）</text>
    <rect x="700" y="150" width="70" height="24" rx="5" fill="#fdf3e5" stroke="#f0d9b5"/><text x="735" y="166" fill="#7a5a1e">页 B（子旧值）</text>
    <rect x="620" y="180" width="70" height="24" rx="5" fill="#fdf3e5" stroke="#f0d9b5"/><text x="655" y="196" fill="#7a5a1e">页 C（共享）</text>
  </g>
  <line x1="490" y1="132" x2="618" y2="132" stroke="#4f9dff" stroke-width="1.2"/>
  <line x1="490" y1="162" x2="618" y2="162" stroke="#f43f7e" stroke-width="1.2"/>
  <line x1="580" y1="162" x2="698" y2="162" stroke="#2dd4a7" stroke-width="1.2"/>
  <line x1="490" y1="192" x2="618" y2="192" stroke="#4f9dff" stroke-width="1.2"/>
  <line x1="580" y1="132" x2="618" y2="132" stroke="#2dd4a7" stroke-width="1.2"/>
  <line x1="580" y1="192" x2="618" y2="192" stroke="#2dd4a7" stroke-width="1.2"/>
  <text x="595" y="270" font-size="8.5" fill="#c02a56" text-anchor="middle">子进程仍看到页 B 的旧值 = 快照一致</text>

  <!-- cost -->
  <rect x="30" y="296" width="465" height="160" rx="10" fill="#eafaf1" stroke="#b8e6cd"/>
  <text x="50" y="320" font-size="11" font-weight="600" fill="#1c6b45">收益</text>
  <text x="50" y="342" font-size="9.5" fill="#2f7a56">· 子进程看到 fork 那一刻的一致内存视图</text>
  <text x="50" y="362" font-size="9.5" fill="#2f7a56">· 无需加锁、无需暂停父进程</text>
  <text x="50" y="382" font-size="9.5" fill="#2f7a56">· 父进程继续处理读写命令</text>
  <text x="50" y="404" font-size="9.5" fill="#1c6b45">→ "写时才复制"：只读页永远共享，一分钱不花</text>
  <text x="50" y="428" font-size="9" fill="#5cb88a">BGSAVE 与 AOF 重写共用这套机制</text>

  <rect x="515" y="296" width="455" height="160" rx="10" fill="#fdeef2" stroke="#f6c9d6"/>
  <text x="535" y="320" font-size="11" font-weight="600" fill="#c02a56">代价</text>
  <text x="535" y="342" font-size="9.5" fill="#88304a">· fork 本身耗时随数据集增大（复制页表）</text>
  <text x="535" y="362" font-size="9.5" fill="#88304a">  → 大内存实例几十~几百 ms 延迟尖刺</text>
  <text x="535" y="382" font-size="9.5" fill="#88304a">· 期间父进程写越多，COW 复制的页越多</text>
  <text x="535" y="404" font-size="9.5" fill="#c02a56">→ 写密集时内存最坏可接近 2×，需预留</text>
  <text x="535" y="428" font-size="9" fill="#c8607f">缓解：dismissMemory 提示回收、rehash 避让（server.c:1325）</text>
</svg>
