<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="480" viewBox="0 0 1000 480" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="480" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">RDB 快照：SAVE 阻塞 vs BGSAVE fork 子进程（rdb.c:2070）</text>
  <text x="30" y="49" font-size="10.5" fill="#a1a1a6">生产用 BGSAVE；先写 temp 再 rename+fsync，保证不留半个损坏文件</text>

  <!-- SAVE path -->
  <rect x="30" y="76" width="440" height="150" rx="12" fill="#fdeef2" stroke="#f6c9d6" filter="url(#soft)"/>
  <text x="50" y="100" font-size="12" font-weight="700" fill="#c02a56">SAVE（阻塞，生产禁用）</text>
  <g text-anchor="middle" font-size="9.5">
    <rect x="50" y="116" width="180" height="44" rx="8" fill="#fff" stroke="#f6c9d6"/><text x="140" y="135" fill="#c02a56">主线程直接 rdbSave</text><text x="140" y="150" fill="#88304a" font-size="8.5">rdb.c:4825</text>
    <rect x="270" y="116" width="180" height="44" rx="8" fill="#fdeef2" stroke="#f6c9d6"/><text x="360" y="135" fill="#c02a56">全程阻塞所有命令</text><text x="360" y="150" fill="#88304a" font-size="8.5">大实例可卡数秒</text>
  </g>
  <line x1="230" y1="138" x2="268" y2="138" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="250" y="192" font-size="9.5" fill="#88304a" text-anchor="middle">数据集越大，阻塞越久 → 仅用于调试/关机前</text>

  <!-- BGSAVE path -->
  <rect x="490" y="76" width="480" height="150" rx="12" fill="#eafaf1" stroke="#b8e6cd" filter="url(#soft)"/>
  <text x="510" y="100" font-size="12" font-weight="700" fill="#1c6b45">BGSAVE（fork 子进程，常规路径）</text>
  <g text-anchor="middle" font-size="9.5">
    <rect x="510" y="116" width="130" height="44" rx="8" fill="#fff" stroke="#b8e6cd"/><text x="575" y="135" fill="#1c6b45">fork()</text><text x="575" y="150" fill="#3a9b6e" font-size="8.5">redisFork</text>
    <rect x="660" y="116" width="140" height="44" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="730" y="130" fill="#1b2a4a">父：继续服务</text><text x="730" y="145" fill="#5b7db1" font-size="8.5">命令不阻塞</text>
    <rect x="810" y="116" width="140" height="44" rx="8" fill="#eafaf1" stroke="#b8e6cd"/><text x="880" y="130" fill="#1c6b45">子：写 RDB</text><text x="880" y="145" fill="#3a9b6e" font-size="8.5">写完 exit</text>
  </g>
  <line x1="640" y1="130" x2="658" y2="130" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="640" y1="148" x2="808" y2="148" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="730" y="192" font-size="9.5" fill="#3a9b6e" text-anchor="middle">子进程持有 fork 时刻的一致快照（COW，见下图）</text>
  <text x="730" y="210" font-size="9" fill="#5cb88a" text-anchor="middle">父进程照常处理读写，仅 fork 瞬间有微小停顿</text>

  <!-- atomic write -->
  <text x="40" y="262" font-size="11" font-weight="700" fill="#7a5a1e">原子写盘（rdb.c:2032-2055）</text>
  <g text-anchor="middle" font-size="9.5">
    <rect x="60" y="276" width="180" height="46" rx="8" fill="#fdf3e5" stroke="#f0d9b5" filter="url(#soft)"/><text x="150" y="298" fill="#7a5a1e">写 temp-&lt;pid&gt;.rdb</text><text x="150" y="313" fill="#b08535" font-size="8.5">临时文件</text>
    <rect x="290" y="276" width="180" height="46" rx="8" fill="#fdf3e5" stroke="#f0d9b5" filter="url(#soft)"/><text x="380" y="298" fill="#7a5a1e">rename → dump.rdb</text><text x="380" y="313" fill="#b08535" font-size="8.5">原子替换</text>
    <rect x="520" y="276" width="180" height="46" rx="8" fill="#fdf3e5" stroke="#f0d9b5" filter="url(#soft)"/><text x="610" y="298" fill="#7a5a1e">fsync 目录</text><text x="610" y="313" fill="#b08535" font-size="8.5">确保元数据落盘</text>
    <rect x="750" y="276" width="200" height="46" rx="8" fill="#eafaf1" stroke="#b8e6cd" filter="url(#soft)"/><text x="850" y="298" fill="#1c6b45">dirty=0 lastsave=now</text><text x="850" y="313" fill="#3a9b6e" font-size="8.5">rdb.c:2063</text>
  </g>
  <line x1="240" y1="299" x2="288" y2="299" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="470" y1="299" x2="518" y2="299" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="700" y1="299" x2="748" y2="299" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- triggers -->
  <rect x="30" y="344" width="940" height="120" rx="10" fill="#f7f7f9" stroke="#ececef"/>
  <text x="50" y="368" font-size="11" font-weight="600" fill="#1d1d1f">触发时机</text>
  <text x="50" y="390" font-size="10" fill="#4a4a4f">· save 配置点（默认 3600s/1改、300s/100改、60s/10000改）—— serverCron 每轮检查 dirty 与距上次保存时间</text>
  <text x="50" y="410" font-size="10" fill="#4a4a4f">· 手动 BGSAVE ｜ 复制全量同步（主库为新从库生成 RDB）｜ SHUTDOWN 关机前</text>
  <text x="50" y="432" font-size="10" fill="#4a4a4f">· 条件：dirty ≥ 改动阈值 且 距上次保存 &gt; 秒数阈值 且 上次 BGSAVE 成功（server.c:1699）</text>
  <text x="50" y="452" font-size="9" fill="#86868b">stop-writes-on-bgsave-error=yes：BGSAVE 失败时拒绝写入，防止数据无保护地继续堆积</text>
</svg>
