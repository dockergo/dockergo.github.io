<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="450" viewBox="0 0 1000 450" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="450" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">ZSet 双结构：skiplist（按序）+ dict（按名查分）（server.h:1796, t_zset.c）</text>
  <text x="30" y="49" font-size="10.5" fill="#a1a1a6">同一份 member/score 数据，两个索引各覆盖一类访问模式</text>

  <!-- dict side -->
  <rect x="30" y="72" width="420" height="180" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="50" y="96" font-size="11.5" font-weight="700" fill="#1b2a4a">dict：member → score</text>
  <text x="50" y="116" font-size="9" fill="#5b7db1">按成员名 O(1) 查分数</text>
  <g font-size="9" text-anchor="middle">
    <rect x="50" y="128" width="180" height="26" rx="5" fill="#fff" stroke="#bcd0ec"/><text x="140" y="145" fill="#1b2a4a">"alice" → 92</text>
    <rect x="50" y="158" width="180" height="26" rx="5" fill="#fff" stroke="#bcd0ec"/><text x="140" y="175" fill="#1b2a4a">"bob" → 78</text>
    <rect x="50" y="188" width="180" height="26" rx="5" fill="#fff" stroke="#bcd0ec"/><text x="140" y="205" fill="#1b2a4a">"carol" → 85</text>
  </g>
  <text x="335" y="150" font-size="9.5" fill="#5b7db1" text-anchor="middle">ZSCORE alice</text>
  <text x="335" y="168" font-size="9.5" fill="#5b7db1" text-anchor="middle">→ 92（O(1)）</text>
  <text x="335" y="200" font-size="8.5" fill="#8ba7cc" text-anchor="middle">哈希直达，无需遍历</text>

  <!-- skiplist side -->
  <rect x="470" y="72" width="500" height="180" rx="12" fill="#eafaf1" stroke="#b8e6cd" filter="url(#soft)"/>
  <text x="490" y="96" font-size="11.5" font-weight="700" fill="#1c6b45">skiplist：按 score 有序</text>
  <text x="490" y="116" font-size="9" fill="#3a9b6e">按序/按范围/按 rank，O(log n)</text>
  <!-- ordered nodes by score -->
  <g text-anchor="middle" font-size="8.5">
    <rect x="490" y="150" width="90" height="40" rx="6" fill="#fff" stroke="#b8e6cd"/><text x="535" y="168" fill="#1c6b45">bob</text><text x="535" y="182" fill="#3a9b6e">78</text>
    <rect x="600" y="150" width="90" height="40" rx="6" fill="#fff" stroke="#b8e6cd"/><text x="645" y="168" fill="#1c6b45">carol</text><text x="645" y="182" fill="#3a9b6e">85</text>
    <rect x="710" y="150" width="90" height="40" rx="6" fill="#fff" stroke="#b8e6cd"/><text x="755" y="168" fill="#1c6b45">alice</text><text x="755" y="182" fill="#3a9b6e">92</text>
    <rect x="820" y="150" width="90" height="40" rx="6" fill="#fff" stroke="#b8e6cd"/><text x="865" y="168" fill="#1c6b45">dave</text><text x="865" y="182" fill="#3a9b6e">96</text>
  </g>
  <line x1="580" y1="170" x2="598" y2="170" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="690" y1="170" x2="708" y2="170" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="800" y1="170" x2="818" y2="170" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="700" y="214" font-size="9" fill="#3a9b6e" text-anchor="middle">按分数升序链接 · 多层索引跳跃 · span 累加算 rank</text>
  <text x="700" y="232" font-size="8.5" fill="#5cb88a" text-anchor="middle">ZRANGE / ZRANGEBYSCORE / ZRANK 都走这里</text>

  <!-- shared data note -->
  <rect x="30" y="268" width="940" height="60" rx="10" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="50" y="292" font-size="10.5" font-weight="600" fill="#7a5a1e">同一份数据，两个索引</text>
  <text x="50" y="314" font-size="9.5" fill="#b08535">member/score 逻辑上是一份；dict 和 skiplist 各存一个索引视图 —— 空间换"两类访问都快"。小 ZSet 用 listpack（member/score 交替）省内存，超阈值才升级为此双结构。</text>

  <!-- why -->
  <rect x="30" y="344" width="460" height="90" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="50" y="368" font-size="10.5" font-weight="600" fill="#1b2a4a">dict 覆盖：按名访问</text>
  <text x="50" y="390" font-size="9.5" fill="#5b7db1">ZSCORE member → O(1)；ZADD 判断 member 是否已存在</text>
  <text x="50" y="410" font-size="9.5" fill="#5b7db1">若只有 skiplist，按名查分要 O(n) 扫 → dict 补齐这一维</text>

  <rect x="510" y="344" width="460" height="90" rx="10" fill="#eafaf1" stroke="#b8e6cd"/>
  <text x="530" y="368" font-size="10.5" font-weight="600" fill="#1c6b45">skiplist 覆盖：按序访问</text>
  <text x="530" y="390" font-size="9.5" fill="#2f7a56">ZRANGE 0 9（Top10）、ZRANGEBYSCORE、ZRANK → O(log n)</text>
  <text x="530" y="410" font-size="9.5" fill="#2f7a56">若只有 dict，范围/排名要全排序 → skiplist 补齐这一维</text>
</svg>
