<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="640" viewBox="0 0 1080 640" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="640" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Redis 总架构：一个单线程事件循环守着一张内存大 dict</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">接入层（单线程 Reactor）→ 数据层（键空间 dict + 对象编码）→ 保障层（过期淘汰 / 持久化 / 复制 / 集群）</text>

  <!-- 外部生态层 (top, dashed) -->
  <rect x="30" y="70" width="1020" height="60" rx="12" fill="#f7f7f9" stroke="#c7c7cc" stroke-dasharray="5 4"/>
  <text x="46" y="90" font-size="10.5" font-weight="600" fill="#4a4a4f">客户端生态（非 Redis 组件 · 经 RESP 协议接入）</text>
  <g text-anchor="middle" font-size="9">
    <rect x="46" y="98" width="150" height="26" rx="6" fill="#fff" stroke="#e0e0e4"/><text x="121" y="115" fill="#4a4a4f">应用（各语言客户端库）</text>
    <rect x="206" y="98" width="130" height="26" rx="6" fill="#fff" stroke="#e0e0e4"/><text x="271" y="115" fill="#4a4a4f">redis-cli</text>
    <rect x="346" y="98" width="150" height="26" rx="6" fill="#fff" stroke="#e0e0e4"/><text x="421" y="115" fill="#4a4a4f">Sentinel / 集群客户端</text>
    <rect x="506" y="98" width="180" height="26" rx="6" fill="#fff" stroke="#e0e0e4"/><text x="596" y="115" fill="#4a4a4f">监控（INFO / MONITOR）</text>
  </g>

  <!-- 接入层 -->
  <rect x="30" y="146" width="1020" height="90" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="167" font-size="11.5" font-weight="700" fill="#1b2a4a">接入层 · 单线程事件循环（Reactor）</text>
  <g text-anchor="middle" font-size="9">
    <rect x="46" y="178" width="200" height="46" rx="8" fill="#fff" stroke="#cfe0f2"/><text x="146" y="198" fill="#1b2a4a" font-weight="600">ae 事件循环</text><text x="146" y="214" fill="#5b7db1" font-size="8">epoll/kqueue 多路复用</text>
    <rect x="256" y="178" width="200" height="46" rx="8" fill="#fff" stroke="#cfe0f2"/><text x="356" y="198" fill="#1b2a4a" font-weight="600">RESP 协议编解码</text><text x="356" y="214" fill="#5b7db1" font-size="8">multibulk / inline · RESP2/3</text>
    <rect x="466" y="178" width="200" height="46" rx="8" fill="#fff" stroke="#cfe0f2"/><text x="566" y="198" fill="#1b2a4a" font-weight="600">命令表分派</text><text x="566" y="214" fill="#5b7db1" font-size="8">lookupCommand → proc</text>
    <rect x="676" y="178" width="160" height="46" rx="8" fill="#eafaf1" stroke="#b8e6cd"/><text x="756" y="198" fill="#1c6b45" font-weight="600">call() 中枢</text><text x="756" y="214" fill="#3a9b6e" font-size="8">执行+统计+传播</text>
    <rect x="846" y="178" width="190" height="46" rx="8" fill="#f6f0fb" stroke="#dcc6ee"/><text x="941" y="198" fill="#5a2a82" font-weight="600">IO 线程（可选）</text><text x="941" y="214" fill="#8a5cae" font-size="8">并行读写/解析,不执行命令</text>
  </g>

  <!-- 数据层 -->
  <rect x="30" y="252" width="1020" height="120" rx="12" fill="#fdf3e5" stroke="#f0d9b5" filter="url(#soft)"/>
  <text x="46" y="273" font-size="11.5" font-weight="700" fill="#7a5a1e">数据层 · 键空间 dict + redisObject（内存核心）</text>
  <g text-anchor="middle" font-size="9">
    <rect x="46" y="284" width="300" height="76" rx="8" fill="#fff" stroke="#f0d9b5"/>
    <text x="196" y="304" fill="#7a5a1e" font-weight="600">键空间 dict：key → redisObject</text>
    <text x="196" y="322" fill="#b08535" font-size="8">db-&gt;keys（渐进式 rehash）</text>
    <text x="196" y="340" fill="#b08535" font-size="8">db-&gt;expires（带 TTL 的键，独立）</text>

    <rect x="360" y="284" width="676" height="76" rx="8" fill="#fdf9f0" stroke="#efe3cd"/>
    <text x="698" y="302" fill="#7a5a1e" font-weight="600" font-size="9.5">value = 数据类型对象 · 按规模自动选底层编码</text>
    <g font-size="8" text-anchor="middle">
      <rect x="374" y="312" width="100" height="38" rx="6" fill="#fff" stroke="#f0d9b5"/><text x="424" y="329" fill="#7a5a1e">String</text><text x="424" y="342" fill="#b08535">int/embstr/raw</text>
      <rect x="484" y="312" width="100" height="38" rx="6" fill="#fff" stroke="#f0d9b5"/><text x="534" y="329" fill="#7a5a1e">Hash/Set</text><text x="534" y="342" fill="#b08535">listpack/ht</text>
      <rect x="594" y="312" width="100" height="38" rx="6" fill="#fff" stroke="#f0d9b5"/><text x="644" y="329" fill="#7a5a1e">List</text><text x="644" y="342" fill="#b08535">quicklist</text>
      <rect x="704" y="312" width="110" height="38" rx="6" fill="#fff" stroke="#f0d9b5"/><text x="759" y="329" fill="#7a5a1e">ZSet</text><text x="759" y="342" fill="#b08535">listpack/skiplist</text>
      <rect x="824" y="312" width="100" height="38" rx="6" fill="#fff" stroke="#f0d9b5"/><text x="874" y="329" fill="#7a5a1e">Set(int)</text><text x="874" y="342" fill="#b08535">intset</text>
      <rect x="934" y="312" width="90" height="38" rx="6" fill="#fff" stroke="#f0d9b5"/><text x="979" y="329" fill="#7a5a1e">Stream</text><text x="979" y="342" fill="#b08535">rax</text>
    </g>
  </g>

  <!-- 保障层 -->
  <rect x="30" y="388" width="1020" height="200" rx="12" fill="#eafaf1" stroke="#b8e6cd" filter="url(#soft)"/>
  <text x="46" y="409" font-size="11.5" font-weight="700" fill="#1c6b45">保障层 · 内存 / 持久化 / 复制 / 集群（多在后台线程或子进程）</text>
  <g text-anchor="middle" font-size="9">
    <!-- 内存 -->
    <rect x="46" y="420" width="230" height="70" rx="8" fill="#fff" stroke="#b8e6cd"/><text x="161" y="440" fill="#1c6b45" font-weight="600">内存管理</text><text x="161" y="458" fill="#3a9b6e" font-size="8">惰性+定期过期</text><text x="161" y="474" fill="#3a9b6e" font-size="8">maxmemory · LRU/LFU 淘汰</text>
    <!-- 持久化 -->
    <rect x="286" y="420" width="230" height="70" rx="8" fill="#fdf3e5" stroke="#f0d9b5"/><text x="401" y="440" fill="#7a5a1e" font-weight="600">持久化</text><text x="401" y="458" fill="#b08535" font-size="8">RDB 快照（fork+COW）</text><text x="401" y="474" fill="#b08535" font-size="8">AOF 日志（bio fsync · 重写）</text>
    <!-- 复制 -->
    <rect x="526" y="420" width="230" height="70" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="641" y="440" fill="#1b2a4a" font-weight="600">复制</text><text x="641" y="458" fill="#5b7db1" font-size="8">PSYNC 全量/部分</text><text x="641" y="474" fill="#5b7db1" font-size="8">复制积压缓冲 · 命令流异步下发</text>
    <!-- 集群 -->
    <rect x="766" y="420" width="270" height="70" rx="8" fill="#f6f0fb" stroke="#dcc6ee"/><text x="901" y="440" fill="#5a2a82" font-weight="600">集群与高可用</text><text x="901" y="458" fill="#8a5cae" font-size="8">16384 槽 · Gossip 总线</text><text x="901" y="474" fill="#8a5cae" font-size="8">故障转移 · Sentinel</text>
  </g>
  <!-- 后台执行体 -->
  <rect x="46" y="500" width="990" height="76" rx="8" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="60" y="520" font-size="10" font-weight="600" fill="#7a5a1e">后台执行体（不阻塞主线程命令执行）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="60" y="530" width="220" height="36" rx="6" fill="#fff" stroke="#efe3cd"/><text x="170" y="547" fill="#7a5a1e">bio 线程</text><text x="170" y="559" fill="#b08535">AOF fsync · 关文件 · lazyfree</text>
    <rect x="290" y="530" width="240" height="36" rx="6" fill="#fff" stroke="#efe3cd"/><text x="410" y="547" fill="#7a5a1e">fork 子进程</text><text x="410" y="559" fill="#b08535">BGSAVE · AOF 重写（COW 快照）</text>
    <rect x="540" y="530" width="240" height="36" rx="6" fill="#fff" stroke="#efe3cd"/><text x="660" y="547" fill="#7a5a1e">serverCron（hz=10）</text><text x="660" y="559" fill="#b08535">定期过期 · rehash · 触发持久化</text>
    <rect x="790" y="530" width="246" height="36" rx="6" fill="#fff" stroke="#efe3cd"/><text x="913" y="547" fill="#7a5a1e">命令传播 propagate</text><text x="913" y="559" fill="#b08535">写效果 → AOF 缓冲 + 复制流</text>
  </g>

  <!-- flow arrows between layers -->
  <line x1="540" y1="130" x2="540" y2="144" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="540" y1="236" x2="540" y2="250" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="540" y1="372" x2="540" y2="386" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>

  <rect x="30" y="600" width="1020" height="30" rx="8" fill="#f7f7f9" stroke="#ececef"/>
  <text x="540" y="619" font-size="10" fill="#4a4a4f" text-anchor="middle">读法：命令从接入层进入 → 主线程 call() 改数据层的内存 dict → 写效果由 propagate 分发到保障层的 AOF/复制,fork 子进程做 RDB,内存不足时后台淘汰</text>
</svg>
