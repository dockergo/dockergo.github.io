<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="440" viewBox="0 0 1000 440" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="440" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">everysec：把 fsync 从命令关键路径挪到 bio 后台线程（aof.c:983,1347）</text>
  <text x="30" y="49" font-size="10.5" fill="#a1a1a6">主线程不等 fsync 完成 → 命令不被磁盘 IO 拖慢，代价是最多丢 1 秒</text>

  <!-- main thread lane -->
  <rect x="40" y="80" width="600" height="90" rx="10" fill="#eafaf1" stroke="#b8e6cd"/>
  <text x="60" y="102" font-size="11" font-weight="700" fill="#1c6b45">主线程（beforeSleep 里检查）</text>
  <g text-anchor="middle" font-size="9">
    <rect x="60" y="112" width="120" height="44" rx="7" fill="#fff" stroke="#b8e6cd"/><text x="120" y="130" fill="#1c6b45">write aof_buf</text><text x="120" y="145" fill="#3a9b6e" font-size="8">进页缓存</text>
    <rect x="200" y="112" width="180" height="44" rx="7" fill="#fff" stroke="#b8e6cd"/><text x="290" y="130" fill="#1c6b45">距上次 fsync ≥1000ms?</text><text x="290" y="145" fill="#3a9b6e" font-size="8">且无进行中的 fsync</text>
    <rect x="400" y="112" width="220" height="44" rx="7" fill="#f6f0fb" stroke="#dcc6ee"/><text x="510" y="130" fill="#5a2a82">提交 BIO_AOF_FSYNC 任务</text><text x="510" y="145" fill="#8a5cae" font-size="8">aof_background_fsync → 不等待，继续处理命令</text>
  </g>
  <line x1="180" y1="134" x2="198" y2="134" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="380" y1="134" x2="398" y2="134" stroke="#c7c7cc" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- handoff -->
  <line x1="510" y1="170" x2="510" y2="210" stroke="#8b6cff" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="600" y="194" font-size="9" fill="#8a5cae">异步交接，主线程不阻塞</text>

  <!-- bio thread lane -->
  <rect x="360" y="212" width="300" height="70" rx="10" fill="#f6f0fb" stroke="#dcc6ee" filter="url(#soft)"/>
  <text x="510" y="236" font-size="11" font-weight="700" fill="#5a2a82" text-anchor="middle">bio 后台线程</text>
  <text x="510" y="258" font-size="9.5" fill="#8a5cae" text-anchor="middle">执行 fsync()：页缓存 → 物理磁盘</text>
  <text x="510" y="274" font-size="8.5" fill="#a884c8" text-anchor="middle">慢磁盘 IO 不影响主线程处理命令</text>

  <!-- backpressure -->
  <rect x="40" y="304" width="920" height="120" rx="10" fill="#fdeef2" stroke="#f6c9d6"/>
  <text x="60" y="328" font-size="11" font-weight="600" fill="#c02a56">背压：磁盘慢时会发生什么（aof.c:1186-1204）</text>
  <text x="60" y="350" font-size="10" fill="#88304a">· 若上一个后台 fsync 还没做完，主线程本次 flush 最多推迟 <tspan font-weight="600">2000ms</tspan> 等它</text>
  <text x="60" y="372" font-size="10" fill="#88304a">· 超过 2000ms 仍未完成 → 主线程强行 write（不 fsync），累加 aof_delayed_fsync 计数并告警</text>
  <text x="60" y="394" font-size="10" fill="#c02a56">→ 磁盘持续慢时，实际丢失窗口可能扩大到 1~2 秒（而非理想的 1 秒）</text>
  <text x="60" y="414" font-size="9" fill="#c8607f">监控 aof_delayed_fsync：持续增长说明磁盘 IO 跟不上写入速率</text>
</svg>
