<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="470" viewBox="0 0 1000 470" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">一条命令的生命周期：读 → 解析 → 查表 → call() 执行 → 传播 → 回复</text>
  <text x="30" y="49" font-size="10.5" fill="#a1a1a6">全程主线程串行（server.c:3958 call）；贯穿示例：SET user:1 alice</text>

  <!-- pipeline stages -->
  <g text-anchor="middle">
    <rect x="30" y="80" width="130" height="56" rx="9" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="95" y="102" font-size="10.5" font-weight="600" fill="#1b2a4a">① 读 socket</text>
    <text x="95" y="119" font-size="8.5" fill="#5b7db1">readQueryFromClient</text>
    <text x="95" y="131" font-size="8" fill="#8ba7cc">querybuf ≤16KB</text>

    <rect x="188" y="80" width="130" height="56" rx="9" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="253" y="102" font-size="10.5" font-weight="600" fill="#1b2a4a">② 解析 RESP</text>
    <text x="253" y="119" font-size="8.5" fill="#5b7db1">processInputBuffer</text>
    <text x="253" y="131" font-size="8" fill="#8ba7cc">→ argc/argv</text>

    <rect x="346" y="80" width="130" height="56" rx="9" fill="#f6f0fb" stroke="#dcc6ee" filter="url(#soft)"/>
    <text x="411" y="102" font-size="10.5" font-weight="600" fill="#5a2a82">③ 查命令表</text>
    <text x="411" y="119" font-size="8.5" fill="#8a5cae">lookupCommand</text>
    <text x="411" y="131" font-size="8" fill="#a884c8">SET → setCommand</text>

    <rect x="504" y="80" width="150" height="56" rx="9" fill="#fdf3e5" stroke="#f0d9b5" filter="url(#soft)"/>
    <text x="579" y="102" font-size="10.5" font-weight="600" fill="#7a5a1e">④ processCommand</text>
    <text x="579" y="119" font-size="8.5" fill="#b08535">前置检查</text>
    <text x="579" y="131" font-size="8" fill="#c79a4e">内存/权限/集群重定向</text>

    <rect x="682" y="80" width="130" height="56" rx="9" fill="#eafaf1" stroke="#b8e6cd" filter="url(#soft)"/>
    <text x="747" y="102" font-size="10.5" font-weight="600" fill="#1c6b45">⑤ call()</text>
    <text x="747" y="119" font-size="8.5" fill="#3a9b6e">c-&gt;cmd-&gt;proc(c)</text>
    <text x="747" y="131" font-size="8" fill="#5cb88a">写入键空间</text>

    <rect x="840" y="80" width="130" height="56" rx="9" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="905" y="102" font-size="10.5" font-weight="600" fill="#1b2a4a">⑥ 回复</text>
    <text x="905" y="119" font-size="8.5" fill="#5b7db1">addReply → buf</text>
    <text x="905" y="131" font-size="8" fill="#8ba7cc">+OK</text>
  </g>
  <line x1="160" y1="108" x2="186" y2="108" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="318" y1="108" x2="344" y2="108" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="476" y1="108" x2="502" y2="108" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="654" y1="108" x2="680" y2="108" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="812" y1="108" x2="838" y2="108" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- call() responsibilities -->
  <rect x="30" y="180" width="940" height="180" rx="12" fill="#eafaf1" stroke="#b8e6cd"/>
  <text x="50" y="206" font-size="12" font-weight="700" fill="#1c6b45">call() 不只调用命令处理函数 —— 它是命令中枢（server.c:3958-4145）</text>
  <g font-size="10">
    <rect x="50" y="222" width="215" height="56" rx="8" fill="#fff" stroke="#b8e6cd"/>
    <text x="62" y="242" font-weight="600" fill="#1c6b45">dirty 追踪</text>
    <text x="62" y="260" fill="#3a9b6e" font-size="9">执行前后 server.dirty 增量</text>
    <text x="62" y="272" fill="#5cb88a" font-size="8.5">&gt;0 → 需持久化&amp;传播</text>

    <rect x="278" y="222" width="215" height="56" rx="8" fill="#fff" stroke="#b8e6cd"/>
    <text x="290" y="242" font-weight="600" fill="#1c6b45">传播 propagate</text>
    <text x="290" y="260" fill="#3a9b6e" font-size="9">dirty → PROPAGATE_AOF | REPL</text>
    <text x="290" y="272" fill="#5cb88a" font-size="8.5">同一副作用发给 AOF + 副本</text>

    <rect x="506" y="222" width="215" height="56" rx="8" fill="#fff" stroke="#b8e6cd"/>
    <text x="518" y="242" font-weight="600" fill="#1c6b45">统计</text>
    <text x="518" y="260" fill="#3a9b6e" font-size="9">calls / 微秒 / 延迟直方图</text>
    <text x="518" y="272" fill="#5cb88a" font-size="8.5">slowlog（超阈值记录）</text>

    <rect x="734" y="222" width="216" height="56" rx="8" fill="#fff" stroke="#b8e6cd"/>
    <text x="746" y="242" font-weight="600" fill="#1c6b45">monitors</text>
    <text x="746" y="260" fill="#3a9b6e" font-size="9">replicationFeedMonitors</text>
    <text x="746" y="272" fill="#5cb88a" font-size="8.5">MONITOR 命令的数据源</text>

    <rect x="50" y="290" width="900" height="52" rx="8" fill="#fdf9f0" stroke="#efe3cd"/>
    <text x="62" y="312" font-weight="600" fill="#7a5a1e" font-size="10.5">关键：传播的是"命令的效果"（dirty），持久化与复制共享这一套 propagation 机制</text>
    <text x="62" y="330" fill="#b08535" font-size="9.5">→ RDB 是时点快照、AOF 是操作日志、复制是把日志实时发给从库，三者不各写各的（见持久化/复制主线）</text>
  </g>

  <rect x="30" y="404" width="940" height="30" rx="8" fill="#f7f7f9" stroke="#ececef"/>
  <text x="500" y="423" font-size="10" fill="#4a4a4f" text-anchor="middle">一句话：命令处理函数只管改内存里的数据结构;"要不要落盘/同步、算不算慢、进不进统计"全由 call() 统一裁决</text>
</svg>
