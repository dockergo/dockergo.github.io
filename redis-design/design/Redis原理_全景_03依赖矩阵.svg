<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">依赖矩阵：接触面命令族（行）× 支撑能力域（列）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">● 强依赖　○ 弱依赖　空 = 基本无关；看一条命令族执行时会穿过哪些能力域</text>

  <!-- column headers -->
  <g font-size="9" fill="#4a4a4f" text-anchor="middle">
    <text x="330" y="88" font-weight="600">对象编码</text>
    <text x="420" y="88" font-weight="600">网络执行</text>
    <text x="510" y="88" font-weight="600">内存淘汰</text>
    <text x="600" y="88" font-weight="600">RDB</text>
    <text x="690" y="88" font-weight="600">AOF</text>
    <text x="780" y="88" font-weight="600">复制</text>
    <text x="870" y="88" font-weight="600">集群HA</text>
    <text x="975" y="88" font-weight="600">事务脚本</text>
  </g>
  <line x1="290" y1="96" x2="1030" y2="96" stroke="#e0e0e4"/>

  <!-- rows -->
  <g font-size="10">
    <!-- String -->
    <rect x="30" y="104" width="250" height="44" rx="8" fill="#f6f0fb" stroke="#dcc6ee"/><text x="46" y="122" font-weight="600" fill="#5a2a82">String 字符串</text><text x="46" y="138" font-size="8" fill="#8a5cae">int/embstr/raw · 计数 · 位图</text>
    <text x="330" y="131" font-size="13" fill="#7a5a1e" text-anchor="middle">●</text>
    <text x="420" y="131" font-size="13" fill="#1b2a4a" text-anchor="middle">●</text>
    <text x="510" y="131" font-size="13" fill="#1c6b45" text-anchor="middle">●</text>
    <text x="600" y="131" font-size="13" fill="#7a5a1e" text-anchor="middle">○</text>
    <text x="690" y="131" font-size="13" fill="#7a5a1e" text-anchor="middle">●</text>
    <text x="780" y="131" font-size="13" fill="#1b2a4a" text-anchor="middle">●</text>
    <text x="870" y="131" font-size="13" fill="#5a2a82" text-anchor="middle">○</text>
    <text x="975" y="131" font-size="13" fill="#5a2a82" text-anchor="middle">○</text>

    <!-- Hash -->
    <rect x="30" y="154" width="250" height="44" rx="8" fill="#f6f0fb" stroke="#dcc6ee"/><text x="46" y="172" font-weight="600" fill="#5a2a82">Hash 哈希</text><text x="46" y="188" font-size="8" fill="#8a5cae">listpack/ht · 字段级 TTL</text>
    <text x="330" y="181" font-size="13" fill="#7a5a1e" text-anchor="middle">●</text>
    <text x="420" y="181" font-size="13" fill="#1b2a4a" text-anchor="middle">●</text>
    <text x="510" y="181" font-size="13" fill="#1c6b45" text-anchor="middle">●</text>
    <text x="600" y="181" font-size="13" fill="#7a5a1e" text-anchor="middle">○</text>
    <text x="690" y="181" font-size="13" fill="#7a5a1e" text-anchor="middle">●</text>
    <text x="780" y="181" font-size="13" fill="#1b2a4a" text-anchor="middle">●</text>
    <text x="870" y="181" font-size="13" fill="#5a2a82" text-anchor="middle">○</text>
    <text x="975" y="181" font-size="13" fill="#5a2a82" text-anchor="middle">○</text>

    <!-- List -->
    <rect x="30" y="204" width="250" height="44" rx="8" fill="#f6f0fb" stroke="#dcc6ee"/><text x="46" y="222" font-weight="600" fill="#5a2a82">List 列表</text><text x="46" y="238" font-size="8" fill="#8a5cae">quicklist · 阻塞 BLPOP</text>
    <text x="330" y="231" font-size="13" fill="#7a5a1e" text-anchor="middle">●</text>
    <text x="420" y="231" font-size="13" fill="#1b2a4a" text-anchor="middle">●</text>
    <text x="510" y="231" font-size="13" fill="#1c6b45" text-anchor="middle">●</text>
    <text x="600" y="231" font-size="13" fill="#7a5a1e" text-anchor="middle">○</text>
    <text x="690" y="231" font-size="13" fill="#7a5a1e" text-anchor="middle">●</text>
    <text x="780" y="231" font-size="13" fill="#1b2a4a" text-anchor="middle">●</text>
    <text x="870" y="231" font-size="13" fill="#5a2a82" text-anchor="middle">○</text>
    <text x="975" y="231" font-size="13" fill="#5a2a82" text-anchor="middle">●</text>

    <!-- Set/ZSet -->
    <rect x="30" y="254" width="250" height="44" rx="8" fill="#f6f0fb" stroke="#dcc6ee"/><text x="46" y="272" font-weight="600" fill="#5a2a82">Set / ZSet 集合</text><text x="46" y="288" font-size="8" fill="#8a5cae">intset/listpack/ht · skiplist</text>
    <text x="330" y="281" font-size="13" fill="#7a5a1e" text-anchor="middle">●</text>
    <text x="420" y="281" font-size="13" fill="#1b2a4a" text-anchor="middle">●</text>
    <text x="510" y="281" font-size="13" fill="#1c6b45" text-anchor="middle">●</text>
    <text x="600" y="281" font-size="13" fill="#7a5a1e" text-anchor="middle">○</text>
    <text x="690" y="281" font-size="13" fill="#7a5a1e" text-anchor="middle">●</text>
    <text x="780" y="281" font-size="13" fill="#1b2a4a" text-anchor="middle">●</text>
    <text x="870" y="281" font-size="13" fill="#5a2a82" text-anchor="middle">○</text>
    <text x="975" y="281" font-size="13" fill="#5a2a82" text-anchor="middle">●</text>

    <!-- Stream -->
    <rect x="30" y="304" width="250" height="44" rx="8" fill="#f6f0fb" stroke="#dcc6ee"/><text x="46" y="322" font-weight="600" fill="#5a2a82">Stream 流</text><text x="46" y="338" font-size="8" fill="#8a5cae">rax · 消费组 · PEL</text>
    <text x="330" y="331" font-size="13" fill="#7a5a1e" text-anchor="middle">●</text>
    <text x="420" y="331" font-size="13" fill="#1b2a4a" text-anchor="middle">●</text>
    <text x="510" y="331" font-size="13" fill="#1c6b45" text-anchor="middle">○</text>
    <text x="600" y="331" font-size="13" fill="#7a5a1e" text-anchor="middle">○</text>
    <text x="690" y="331" font-size="13" fill="#7a5a1e" text-anchor="middle">●</text>
    <text x="780" y="331" font-size="13" fill="#1b2a4a" text-anchor="middle">●</text>
    <text x="870" y="331" font-size="13" fill="#5a2a82" text-anchor="middle">○</text>
    <text x="975" y="331" font-size="13" fill="#5a2a82" text-anchor="middle">●</text>
  </g>

  <!-- vertical separators -->
  <g stroke="#f0f0f2">
    <line x1="290" y1="104" x2="290" y2="348"/>
    <line x1="375" y1="104" x2="375" y2="348"/>
    <line x1="465" y1="104" x2="465" y2="348"/>
    <line x1="555" y1="104" x2="555" y2="348"/>
    <line x1="645" y1="104" x2="645" y2="348"/>
    <line x1="735" y1="104" x2="735" y2="348"/>
    <line x1="825" y1="104" x2="825" y2="348"/>
    <line x1="925" y1="104" x2="925" y2="348"/>
  </g>

  <!-- reading notes -->
  <rect x="30" y="366" width="1020" height="140" rx="10" fill="#f7f7f9" stroke="#ececef"/>
  <text x="50" y="390" font-size="11" font-weight="600" fill="#1d1d1f">读法与共性</text>
  <text x="50" y="412" font-size="10" fill="#4a4a4f">· <tspan font-weight="600">对象编码 / 网络执行</tspan> 对所有命令族都是 ● 强依赖 —— 任何命令都要经单线程 call() 执行、value 都是带编码的 redisObject</text>
  <text x="50" y="432" font-size="10" fill="#4a4a4f">· <tspan font-weight="600">AOF / 复制</tspan> 对所有写命令 ● 强依赖 —— 写效果统一经 propagate 分发到 AOF 缓冲与复制流（三条贯穿声明之三）</text>
  <text x="50" y="452" font-size="10" fill="#4a4a4f">· <tspan font-weight="600">内存淘汰</tspan> 对内存占用大的类型（String/Hash/List/集合）● 强，Stream ○（通常有 MAXLEN 上限约束增长）</text>
  <text x="50" y="472" font-size="10" fill="#4a4a4f">· <tspan font-weight="600">事务脚本</tspan> 对 List/集合/Stream ● 强（阻塞命令、原子组合常用），对 String/Hash ○ 弱</text>
  <text x="50" y="494" font-size="9" fill="#86868b">RDB 对各类型均 ○：只在快照那一刻序列化，不参与日常命令路径；集群HA ○：分片/故障转移作用于 key 而非某类型</text>
</svg>
