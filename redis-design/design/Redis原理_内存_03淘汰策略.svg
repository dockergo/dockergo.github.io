<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">maxmemory 淘汰策略决策树（performEvictions，server.h:692-708）</text>
  <text x="30" y="49" font-size="10.5" fill="#a1a1a6">写命令（DENYOOM）执行前触发；默认 noeviction（config.c:3273）</text>

  <!-- trigger -->
  <rect x="380" y="72" width="240" height="46" rx="9" fill="#fdeef2" stroke="#f6c9d6" filter="url(#soft)"/>
  <text x="500" y="91" font-size="10.5" font-weight="600" fill="#c02a56" text-anchor="middle">mem_used &gt; maxmemory ?</text>
  <text x="500" y="108" font-size="8.5" fill="#c02a56" text-anchor="middle">getMaxmemoryState（不计副本缓冲/AOF buf）</text>

  <!-- decision: which policy -->
  <line x1="500" y1="118" x2="500" y2="140" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <rect x="400" y="140" width="200" height="40" rx="9" fill="#f7f7f9" stroke="#ececef" filter="url(#soft)"/>
  <text x="500" y="164" font-size="10.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">maxmemory-policy?</text>

  <!-- noeviction branch -->
  <line x1="400" y1="160" x2="230" y2="200" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <rect x="60" y="200" width="300" height="60" rx="9" fill="#fdeef2" stroke="#f6c9d6" filter="url(#soft)"/>
  <text x="210" y="224" font-size="11" font-weight="600" fill="#c02a56" text-anchor="middle">noeviction（默认）</text>
  <text x="210" y="244" font-size="9" fill="#88304a" text-anchor="middle">不淘汰，写命令返回 OOM 错误，读仍可用</text>

  <!-- eviction branch -->
  <line x1="580" y1="180" x2="640" y2="200" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <rect x="440" y="200" width="500" height="60" rx="9" fill="#f7f7f9" stroke="#ececef"/>
  <text x="460" y="222" font-size="10.5" font-weight="600" fill="#1d1d1f">选淘汰范围 × 淘汰依据</text>
  <text x="460" y="244" font-size="9.5" fill="#4a4a4f">范围：allkeys-*（所有键）｜ volatile-*（仅带 TTL 键）</text>

  <!-- 8 policies grid -->
  <text x="40" y="298" font-size="11" font-weight="700" fill="#1d1d1f">八种策略（范围 × 依据）</text>
  <g font-size="9.5" text-anchor="middle">
    <!-- header row -->
    <text x="120" y="326" font-size="9" font-weight="700" fill="#86868b">依据 ↓ / 范围 →</text>
    <text x="400" y="326" font-size="10" font-weight="700" fill="#1b2a4a">allkeys-*（所有键）</text>
    <text x="720" y="326" font-size="10" font-weight="700" fill="#7a5a1e">volatile-*（仅 TTL 键）</text>

    <rect x="40" y="336" width="160" height="34" rx="6" fill="#f7f7f9" stroke="#ececef"/><text x="120" y="357" fill="#4a4a4f">LRU 最久未用</text>
    <rect x="280" y="336" width="240" height="34" rx="6" fill="#eef3fb" stroke="#bcd0ec"/><text x="400" y="357" fill="#1b2a4a">allkeys-lru</text>
    <rect x="600" y="336" width="240" height="34" rx="6" fill="#fdf3e5" stroke="#f0d9b5"/><text x="720" y="357" fill="#7a5a1e">volatile-lru</text>

    <rect x="40" y="374" width="160" height="34" rx="6" fill="#f7f7f9" stroke="#ececef"/><text x="120" y="395" fill="#4a4a4f">LFU 最少频率</text>
    <rect x="280" y="374" width="240" height="34" rx="6" fill="#eef3fb" stroke="#bcd0ec"/><text x="400" y="395" fill="#1b2a4a">allkeys-lfu</text>
    <rect x="600" y="374" width="240" height="34" rx="6" fill="#fdf3e5" stroke="#f0d9b5"/><text x="720" y="395" fill="#7a5a1e">volatile-lfu</text>

    <rect x="40" y="412" width="160" height="34" rx="6" fill="#f7f7f9" stroke="#ececef"/><text x="120" y="433" fill="#4a4a4f">random 随机</text>
    <rect x="280" y="412" width="240" height="34" rx="6" fill="#eef3fb" stroke="#bcd0ec"/><text x="400" y="433" fill="#1b2a4a">allkeys-random</text>
    <rect x="600" y="412" width="240" height="34" rx="6" fill="#fdf3e5" stroke="#f0d9b5"/><text x="720" y="433" fill="#7a5a1e">volatile-random</text>

    <rect x="40" y="450" width="160" height="34" rx="6" fill="#f7f7f9" stroke="#ececef"/><text x="120" y="471" fill="#4a4a4f">ttl 最近到期</text>
    <rect x="280" y="450" width="240" height="34" rx="6" fill="#e8e8ea" stroke="#d8d8dc"/><text x="400" y="471" fill="#a1a1a6">（无 allkeys-ttl）</text>
    <rect x="600" y="450" width="240" height="34" rx="6" fill="#fdf3e5" stroke="#f0d9b5"/><text x="720" y="471" fill="#7a5a1e">volatile-ttl</text>
  </g>
  <text x="880" y="357" font-size="8.5" fill="#a1a1a6" text-anchor="middle">volatile-*</text>
  <text x="880" y="369" font-size="8.5" fill="#a1a1a6" text-anchor="middle">无可删键时</text>
  <text x="880" y="381" font-size="8.5" fill="#a1a1a6" text-anchor="middle">也回退 OOM</text>
</svg>
