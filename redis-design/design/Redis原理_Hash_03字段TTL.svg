<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="390" viewBox="0 0 1000 390" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="390" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">字段级 TTL（HEXPIRE）：给 Hash 的单个字段设过期（较新特性）</text>
  <text x="30" y="49" font-size="10.5" fill="#a1a1a6">传统过期是 key 级（整个 Hash 一起过期）；字段级只删到期字段</text>

  <!-- key-level vs field-level -->
  <rect x="30" y="72" width="450" height="180" rx="12" fill="#fdeef2" stroke="#f6c9d6" filter="url(#soft)"/>
  <text x="50" y="96" font-size="11" font-weight="700" fill="#c02a56">传统：key 级过期</text>
  <text x="50" y="116" font-size="9.5" fill="#88304a">EXPIRE user:1 3600</text>
  <g font-size="9" text-anchor="middle">
    <rect x="50" y="128" width="400" height="30" rx="6" fill="#fff" stroke="#f6c9d6"/><text x="250" y="147" fill="#c02a56">user:1 = {name, age, session, temp}</text>
    <rect x="50" y="166" width="400" height="30" rx="6" fill="#fdeef2" stroke="#f6c9d6"/><text x="250" y="185" fill="#c02a56">到点 → 整个 Hash 一起消失</text>
  </g>
  <text x="50" y="222" font-size="9.5" fill="#88304a">问题：不同字段有效期不同时，只能整体过期</text>
  <text x="50" y="240" font-size="8.5" fill="#c8607f">如 session 应 30 分钟过期，但 name 应长存 → 做不到</text>

  <!-- field-level -->
  <rect x="520" y="72" width="450" height="180" rx="12" fill="#eafaf1" stroke="#b8e6cd" filter="url(#soft)"/>
  <text x="540" y="96" font-size="11" font-weight="700" fill="#1c6b45">新特性：字段级 TTL</text>
  <text x="540" y="116" font-size="9.5" fill="#2f7a56">HEXPIRE user:1 1800 FIELDS 1 session</text>
  <g font-size="9" text-anchor="middle">
    <rect x="540" y="128" width="130" height="30" rx="6" fill="#fff" stroke="#b8e6cd"/><text x="605" y="147" fill="#1c6b45">name（长存）</text>
    <rect x="676" y="128" width="130" height="30" rx="6" fill="#fff" stroke="#b8e6cd"/><text x="741" y="147" fill="#1c6b45">age（长存）</text>
    <rect x="812" y="128" width="140" height="30" rx="6" fill="#fdeef2" stroke="#f6c9d6"/><text x="882" y="143" fill="#c02a56">session（1800s）</text><text x="882" y="153" fill="#c02a56" font-size="7">到点删此字段</text>
  </g>
  <text x="540" y="192" font-size="9.5" fill="#2f7a56">到点只删 session 字段，其余字段不受影响</text>
  <text x="540" y="212" font-size="9.5" fill="#2f7a56">底层：listpackex 编码 或 hashtable + 字段过期元数据</text>
  <text x="540" y="234" font-size="8.5" fill="#5cb88a">HTTL / HPERSIST 查看/移除字段过期</text>

  <!-- use cases -->
  <rect x="30" y="268" width="940" height="106" rx="10" fill="#f7f7f9" stroke="#ececef"/>
  <text x="50" y="292" font-size="11" font-weight="600" fill="#1d1d1f">典型用途</text>
  <text x="50" y="314" font-size="10" fill="#4a4a4f">· 会话对象：session token 短过期，用户基本信息长存 —— 同一个 Hash 内不同字段不同有效期</text>
  <text x="50" y="334" font-size="10" fill="#4a4a4f">· 缓存对象部分刷新：某些字段（如实时价格）短 TTL 自动失效，其余字段保留</text>
  <text x="50" y="354" font-size="10" fill="#1c6b45">价值：避免"为不同有效期的数据拆成多个 key"，保持对象聚合的同时获得字段粒度的过期控制</text>
</svg>
