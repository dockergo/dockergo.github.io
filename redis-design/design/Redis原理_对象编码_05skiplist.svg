<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1000" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">skiplist：ZSet 的按序结构，span 累加即得 rank</text>
  <text x="30" y="49" font-size="10.5" fill="#a1a1a6">大 ZSet = skiplist（按 score 有序）+ dict（member→score，O(1) 查分）；MAXLEVEL=32, P=0.25（server.h:645-646）</text>

  <!-- skiplist levels -->
  <!-- header -->
  <text x="55" y="120" font-size="9.5" fill="#86868b" text-anchor="middle">head</text>
  <rect x="40" y="128" width="34" height="150" rx="6" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="57" y="150" font-size="8" fill="#5b7db1" text-anchor="middle">L4</text>
  <text x="57" y="185" font-size="8" fill="#5b7db1" text-anchor="middle">L3</text>
  <text x="57" y="220" font-size="8" fill="#5b7db1" text-anchor="middle">L2</text>
  <text x="57" y="255" font-size="8" fill="#5b7db1" text-anchor="middle">L1</text>

  <!-- nodes: A(score1) B(3) C(5) D(8) E(9) -->
  <g font-size="9.5" text-anchor="middle">
    <!-- node A: level 1 -->
    <rect x="180" y="238" width="70" height="40" rx="7" fill="#eafaf1" stroke="#b8e6cd" filter="url(#soft)"/><text x="215" y="256" fill="#1c6b45" font-weight="600">A</text><text x="215" y="270" fill="#3a9b6e" font-size="8">score 1</text>
    <!-- node B: level 3 -->
    <rect x="330" y="168" width="70" height="110" rx="7" fill="#eafaf1" stroke="#b8e6cd" filter="url(#soft)"/><text x="365" y="186" fill="#1c6b45" font-weight="600">B</text><text x="365" y="200" fill="#3a9b6e" font-size="8">score 3</text>
    <!-- node C: level 1 -->
    <rect x="480" y="238" width="70" height="40" rx="7" fill="#eafaf1" stroke="#b8e6cd" filter="url(#soft)"/><text x="515" y="256" fill="#1c6b45" font-weight="600">C</text><text x="515" y="270" fill="#3a9b6e" font-size="8">score 5</text>
    <!-- node D: level 4 -->
    <rect x="630" y="133" width="70" height="145" rx="7" fill="#eafaf1" stroke="#b8e6cd" filter="url(#soft)"/><text x="665" y="151" fill="#1c6b45" font-weight="600">D</text><text x="665" y="165" fill="#3a9b6e" font-size="8">score 8</text>
    <!-- node E: level 2 -->
    <rect x="780" y="203" width="70" height="75" rx="7" fill="#eafaf1" stroke="#b8e6cd" filter="url(#soft)"/><text x="815" y="221" fill="#1c6b45" font-weight="600">E</text><text x="815" y="235" fill="#3a9b6e" font-size="8">score 9</text>
  </g>

  <!-- forward pointers per level -->
  <!-- L1 (y=258): head->A->B->C->D->E -->
  <line x1="74" y1="258" x2="178" y2="258" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="250" y1="258" x2="328" y2="258" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="400" y1="258" x2="478" y2="258" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="550" y1="258" x2="628" y2="258" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="700" y1="258" x2="778" y2="258" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <!-- L2 (y=223): head->B->D->E -->
  <line x1="74" y1="223" x2="328" y2="223" stroke="#4f9dff" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="400" y1="223" x2="628" y2="223" stroke="#4f9dff" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="700" y1="223" x2="778" y2="223" stroke="#4f9dff" stroke-width="1.3" marker-end="url(#ar)"/>
  <!-- L3 (y=188): head->B->D -->
  <line x1="74" y1="188" x2="328" y2="188" stroke="#8b6cff" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="400" y1="188" x2="628" y2="188" stroke="#8b6cff" stroke-width="1.3" marker-end="url(#ar)"/>
  <!-- L4 (y=150): head->D -->
  <line x1="74" y1="150" x2="628" y2="150" stroke="#f59e0b" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- span annotation for rank -->
  <text x="365" y="300" font-size="8.5" fill="#8b6cff" text-anchor="middle">span=1</text>
  <text x="515" y="300" font-size="8.5" fill="#4f9dff" text-anchor="middle">span=2 (B→D 跨 C)</text>
  <text x="500" y="150" font-size="8.5" fill="#f59e0b">L4: head→D span=4（跨 A,B,C）</text>

  <!-- rank explanation -->
  <rect x="40" y="330" width="440" height="150" rx="10" fill="#f6f0fb" stroke="#dcc6ee"/>
  <text x="60" y="354" font-size="11" font-weight="600" fill="#5a2a82">span 如何算 rank（ZRANK / ZRANGE 的基础）</text>
  <text x="60" y="378" font-size="9.5" fill="#5a2a82">查找路径上累加经过的 span，即为目标成员的排名。</text>
  <text x="60" y="398" font-size="9.5" fill="#8a5cae">例：找 D 的 rank —— 走 L4 从 head 一跳到 D，span=4</text>
  <text x="60" y="416" font-size="9.5" fill="#8a5cae">→ 前面有 A,B,C 共 3 个，D 排名 = 3（0-based）</text>
  <text x="60" y="440" font-size="9.5" fill="#5a2a82">若无 span，需从头逐个数 → O(n)；有 span → O(log n)</text>
  <text x="60" y="464" font-size="9" fill="#a1a1a6">span = 该层这条 forward 指针跨越了多少个底层节点</text>

  <!-- random level -->
  <rect x="500" y="330" width="460" height="150" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="520" y="354" font-size="11" font-weight="600" fill="#1b2a4a">随机层高（zslRandomLevel，t_zset.c:254-260）</text>
  <text x="520" y="378" font-size="9.5" fill="#1b2a4a">level = 1；while (random() &lt; 0.25 × RAND_MAX) level++</text>
  <text x="520" y="398" font-size="9.5" fill="#5b7db1">每升一层概率 1/4（ZSKIPLIST_P=0.25），上限 32 层</text>
  <text x="520" y="420" font-size="9.5" fill="#5b7db1">期望层高 O(log n)，无需像平衡树那样旋转维护</text>
  <text x="520" y="444" font-size="9.5" fill="#1b2a4a">查询 / 插入 / 删除 均摊 <tspan font-weight="600">O(log n)</tspan></text>
  <text x="520" y="466" font-size="9" fill="#a1a1a6">配套 dict 存 member→score：ZSCORE 查分 O(1)</text>
</svg>
