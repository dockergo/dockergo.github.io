<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">为什么读也要过 Raft：防读到落后节点的旧数据</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">线性一致 = 读到的必须至少和最近一次成功写一样新 · 但各节点 apply 进度不同步</text>
  <!-- bad case -->
  <rect x="40" y="76" width="1000" height="170" rx="12" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="60" y="100" font-size="11" font-weight="700" fill="#7a2230">❌ 若直接读本地（不经确认）会读到旧数据</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="70" y="112" width="200" height="70" rx="9" fill="#fff" stroke="#f0cdd4"/><text x="170" y="134" font-weight="600" fill="#7a2230">t1: client 写 x=5</text><text x="170" y="154" fill="#a44">leader+多数派 commit</text><text x="170" y="170" fill="#7a2230">写成功返回</text>
    <rect x="310" y="112" width="220" height="70" rx="9" fill="#fff" stroke="#f0cdd4"/><text x="420" y="134" font-weight="600" fill="#7a2230">t2: client 立即读 x</text><text x="420" y="154" fill="#a44">读落到 follower B</text><text x="420" y="170" fill="#7a2230">B 还没 apply x=5</text>
    <rect x="570" y="112" width="220" height="70" rx="9" fill="#fdeef0" stroke="#f0cdd4"/><text x="680" y="134" font-weight="600" fill="#a44">B 返回旧值 x=3</text><text x="680" y="154" fill="#7a2230">← 违反线性一致！</text><text x="680" y="170" fill="#a44">"读不到刚写成功的值"</text>
    <rect x="830" y="112" width="190" height="70" rx="9" fill="#fdeef0" stroke="#f0cdd4"/><text x="925" y="134" font-weight="600" fill="#a44">根因</text><text x="925" y="154" fill="#7a2230">各节点 apply</text><text x="925" y="170" fill="#7a2230">进度不同步</text>
  </g>
  <g stroke="#f0a0b0" stroke-width="1.3" fill="none"><line x1="270" y1="147" x2="310" y2="147" marker-end="url(#ar)"/><line x1="530" y1="147" x2="570" y2="147" marker-end="url(#ar)"/></g>
  <text x="60" y="212" font-size="9" fill="#a44">· follower B 的本地状态落后于集群已提交状态 → 直接读它就读到旧数据</text>
  <text x="60" y="230" font-size="9" fill="#7a2230">· 旧 leader（网络分区下）同样可能落后，直接用它的数据也不安全</text>
  <!-- solution -->
  <rect x="40" y="266" width="1000" height="110" rx="12" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="60" y="290" font-size="11" font-weight="700" fill="#12402a">✓ 解法：ReadIndex（不复制日志，只确认+等待）</text>
  <text x="60" y="312" font-size="9.5" fill="#2f6f4f">· 读之前先拿到"集群当前 commit index"，并确认自己本地已 apply 到 ≥ 这个 index</text>
  <text x="60" y="332" font-size="9.5" fill="#2f6f4f">· 保证：本地状态 ≥ 读发起时集群的已提交状态 → 绝不漏掉任何已成功的写</text>
  <text x="60" y="352" font-size="9" fill="#4c8567">· 比"读也走一遍日志复制"便宜得多——只需一轮心跳确认 + 等本地追上（下一张详解）</text>
  <text x="60" y="370" font-size="8.5" fill="#4c8567">这是"强一致读"与"读性能"的折衷点</text>
  <rect x="40" y="392" width="1000" height="56" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="416" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="438" font-size="10" fill="#4b4b50">读必须防"落到落后节点读到旧数据"——线性一致要求读到最近成功写；etcd 用 ReadIndex（确认 commit index + 等本地 apply 追上）而非复制日志来达成。</text>
</svg>
