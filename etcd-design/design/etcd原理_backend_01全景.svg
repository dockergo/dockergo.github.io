<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">backend 全景：bbolt 之上的事务封装（读写分离）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">backend.go:92 · batchTx（读写）/readTx（只读）· bucket: key（数据）+ Meta（元信息 schema/bucket.go:43）</text>
  <rect x="40" y="76" width="180" height="70" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="130" y="102" font-size="10" font-weight="700" fill="#5a3410" text-anchor="middle">MVCC 层</text>
  <text x="130" y="122" font-size="8" fill="#93762e" text-anchor="middle">写 revision→KeyValue</text>
  <text x="130" y="136" font-size="8" fill="#b08843" text-anchor="middle">调 backend 事务</text>
  <rect x="280" y="76" width="760" height="180" rx="13" fill="#ffffff" stroke="#d0d0d6" filter="url(#soft)"/>
  <text x="300" y="100" font-size="11" font-weight="700" fill="#1d1d1f">backend（封装 bbolt）</text>
  <g text-anchor="middle">
    <rect x="300" y="112" width="340" height="60" rx="9" fill="#fdf6ea" stroke="#efdcb4"/><text x="470" y="134" font-size="10" font-weight="700" fill="#5a3410">batchTx（读写事务）</text><text x="470" y="152" font-size="8" fill="#93762e">UnsafePut/UnsafeSeqPut/UnsafeDelete</text><text x="470" y="165" font-size="7.5" fill="#b08843">攒批，非立即落盘</text>
    <rect x="660" y="112" width="360" height="60" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="840" y="134" font-size="10" font-weight="700" fill="#1b2a4a">readTx（只读事务）</text><text x="840" y="152" font-size="8" fill="#5b7db1">UnsafeRange · concurrentReadTx</text><text x="840" y="165" font-size="7.5" fill="#8aa6cf">先查缓冲，不阻塞写</text>
    <rect x="300" y="182" width="720" height="60" rx="9" fill="#f5f5f7" stroke="#e0e0e4"/><text x="660" y="204" font-size="10" font-weight="700" fill="#48484c">bbolt（单文件 B+树 · ACID · mmap 读 · 写事务 fsync）</text><text x="660" y="224" font-size="8" fill="#86868b">buckets: "key"（全部 MVCC 数据） · "Meta"（consistentIndex 等）</text><text x="660" y="236" font-size="7.5" fill="#a1a1a6">data dir/member/snap/db 单文件</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none"><line x1="220" y1="111" x2="280" y2="130" marker-end="url(#ar)"/></g>
  <rect x="40" y="280" width="1000" height="90" rx="12" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="60" y="304" font-size="11" font-weight="700" fill="#7a2230">为什么要批量：bbolt 每次 commit 都 fsync（贵）</text>
  <text x="60" y="326" font-size="9.5" fill="#a44">· bbolt 单个写事务 commit = 一次 fsync（毫秒级，慢盘更甚）——来一条写就 commit 一次，吞吐极低</text>
  <text x="60" y="346" font-size="9.5" fill="#a44">· etcd 用 batchTx 把多个写攒进一个 bbolt 事务，一次 fsync 落多条 → 摊薄成本（下一张详解）</text>
  <text x="60" y="364" font-size="9" fill="#7a2230">· 未 commit 的批 crash 会丢，但 Raft WAL 已先落盘 → 可回放补回（分工兜底）</text>
  <rect x="40" y="384" width="1000" height="56" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="408" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="430" font-size="10" fill="#4b4b50">backend 封装 bbolt（单文件 B+树 ACID），暴露 batchTx（读写攒批）/readTx（只读走缓冲）；数据全在 key bucket，靠批量提交摊薄 bbolt 昂贵的 fsync。</text>
</svg>
