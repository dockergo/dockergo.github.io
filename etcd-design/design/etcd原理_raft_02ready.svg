<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="580" viewBox="0 0 1080 580" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="580" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">raftNode Ready 循环：先持久化后应用（顺序不可颠倒）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">raft.go: start(:174) · case rd := &lt;-r.Ready(:185) · Advance(:331) · 每轮处理一个 Ready 批次</text>
  <!-- Ready box -->
  <rect x="40" y="72" width="220" height="180" rx="13" fill="#e9f1fb" stroke="#c4d8f0" filter="url(#soft)"/>
  <text x="150" y="96" font-size="11" font-weight="700" fill="#1b2a4a" text-anchor="middle">Ready 批次（Raft 库吐出）</text>
  <text x="60" y="120" font-size="9" fill="#5b7db1">· HardState（term/vote/commit）</text>
  <text x="60" y="140" font-size="9" fill="#5b7db1">· Entries（待持久化日志）</text>
  <text x="60" y="160" font-size="9" fill="#5b7db1">· Messages（待发 peer）</text>
  <text x="60" y="180" font-size="9" fill="#5b7db1">· CommittedEntries（可 apply）</text>
  <text x="60" y="200" font-size="9" fill="#5b7db1">· Snapshot（可选）</text>
  <text x="60" y="224" font-size="8" fill="#8aa6cf">每轮打包"这一步要做的事"</text>
  <!-- ordered steps -->
  <g text-anchor="middle">
    <rect x="300" y="72" width="740" height="40" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="670" y="97" font-size="9.5" fill="#12402a">① committed entries → apply 通道（:232 r.applyc &lt;- ap）—— 交给 applyAll 异步应用</text>
    <rect x="300" y="120" width="740" height="40" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="670" y="145" font-size="9.5" fill="#1b2a4a">② leader 发送 Messages 给 peer（:242）—— follower 收 MsgApp</text>
    <rect x="300" y="168" width="740" height="40" rx="9" fill="#fdf9f0" stroke="#efe3cd"/><text x="670" y="193" font-size="9.5" fill="#7a5a1e">③ 保存快照 SaveSnap（:249，若有）</text>
    <rect x="300" y="216" width="740" height="44" rx="9" fill="#fdf6ea" stroke="#efdcb4"/><text x="670" y="234" font-size="9.5" font-weight="700" fill="#5a3410">④ 写 WAL 落盘 r.storage.Save(HardState, Entries)（:256）★关键</text><text x="670" y="251" font-size="7.5" fill="#b08843">fsync 后才算持久化——crash 可回放</text>
    <rect x="300" y="268" width="740" height="40" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/><text x="670" y="293" font-size="9.5" fill="#274a78">⑤ 追加到 raft 内存存储 raftStorage.Append（:287）</text>
    <rect x="300" y="316" width="740" height="40" rx="9" fill="#f6f2fb" stroke="#d9c9ec"/><text x="670" y="341" font-size="9.5" fill="#3d2a5a">⑥ r.Advance（:331）—— 告诉 Raft 库这轮处理完，可发下一个 Ready</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.2" fill="none">
    <line x1="260" y1="160" x2="300" y2="92" marker-end="url(#ar)"/>
    <line x1="670" y1="112" x2="670" y2="120" marker-end="url(#ar)"/>
    <line x1="670" y1="160" x2="670" y2="168" marker-end="url(#ar)"/>
    <line x1="670" y1="208" x2="670" y2="216" marker-end="url(#ar)"/>
    <line x1="670" y1="260" x2="670" y2="268" marker-end="url(#ar)"/>
    <line x1="670" y1="308" x2="670" y2="316" marker-end="url(#ar)"/>
  </g>
  <rect x="40" y="372" width="1000" height="92" rx="12" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="60" y="396" font-size="11" font-weight="700" fill="#7a2230">铁序：④写 WAL 必须在"真正生效"之前</text>
  <text x="60" y="418" font-size="9.5" fill="#a44">· apply（①的异步结果）真正改状态机前，条目已在 WAL 落盘——若此刻 crash，重启从 WAL 回放即恢复</text>
  <text x="60" y="438" font-size="9.5" fill="#a44">· 若颠倒（先 apply 后 WAL）：apply 后 crash 而 WAL 没记 → 重启丢这条写，破坏"committed 即不丢"</text>
  <text x="60" y="456" font-size="9" fill="#7a2230">· 这也是 etcd_disk_wal_fsync_duration 是写性能头号指标的原因——每轮 Ready 都要等 WAL fsync</text>
  <rect x="40" y="478" width="1000" height="72" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="502" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="524" font-size="10" fill="#4b4b50">一个 goroutine 循环消费 Raft 的 Ready 批次，按"交 apply → 发消息 → 存快照 → 写 WAL 落盘 → 追加内存 → Advance"处理；</text>
  <text x="60" y="542" font-size="10" fill="#4b4b50">"先 WAL 后生效"是不可颠倒的铁序，保证 committed 条目 crash 后可回放不丢。</text>
</svg>
