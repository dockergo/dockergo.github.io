<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">读一个 key：Range(key, rev) 的两层链路</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">treeIndex 定位版本 → boltdb 取内容 · 范围读在 treeIndex 区间遍历后批量取 boltdb</text>
  <g text-anchor="middle">
    <rect x="40" y="80" width="180" height="70" rx="11" fill="#f6f2fb" stroke="#d9c9ec" filter="url(#soft)"/><text x="130" y="106" font-size="10" font-weight="700" fill="#3d2a5a">Range(key, rev)</text><text x="130" y="126" font-size="8" fill="#7a5da5">rev=0 → 读最新</text><text x="130" y="140" font-size="8" fill="#9a7cc4">rev&gt;0 → 历史读</text>
    <rect x="270" y="80" width="220" height="70" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="380" y="104" font-size="10" font-weight="700" fill="#1b2a4a">① treeIndex 定位</text><text x="380" y="124" font-size="8" fill="#5b7db1">Range→keyIndex.get(atRev)</text><text x="380" y="138" font-size="8" fill="#8aa6cf">返回 ≤atRev 最新 revision</text>
    <rect x="540" y="80" width="220" height="70" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/><text x="650" y="104" font-size="10" font-weight="700" fill="#5a3410">② boltdb 取值</text><text x="650" y="124" font-size="8" fill="#93762e">revision 作 key 查</text><text x="650" y="138" font-size="8" fill="#b08843">得 mvccpb.KeyValue</text>
    <rect x="810" y="80" width="220" height="70" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="920" y="104" font-size="10" font-weight="700" fill="#12402a">③ 返回 value</text><text x="920" y="124" font-size="8" fill="#2f6f4f">+ create/mod/version</text><text x="920" y="138" font-size="8" fill="#4c8567">tombstone → not found</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <line x1="220" y1="115" x2="270" y2="115" marker-end="url(#ar)"/>
    <line x1="490" y1="115" x2="540" y2="115" marker-end="url(#ar)"/>
    <line x1="760" y1="115" x2="810" y2="115" marker-end="url(#ar)"/>
  </g>
  <rect x="40" y="180" width="480" height="150" rx="12" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="204" font-size="11" font-weight="700" fill="#274a78">点读（单 key）</text>
  <text x="60" y="228" font-size="9.5" fill="#5b7db1">· treeIndex 里找到该 key 的 keyIndex</text>
  <text x="60" y="248" font-size="9.5" fill="#5b7db1">· get(atRev)：walk generations，跳过晚于 atRev 的版本</text>
  <text x="60" y="268" font-size="9.5" fill="#5b7db1">· 遇 tombstone（在 atRev 前被删）→ 报 not found</text>
  <text x="60" y="290" font-size="9" fill="#8aa6cf">· 拿到 revision 后一次 boltdb 查取值</text>
  <text x="60" y="310" font-size="9" fill="#8aa6cf">· 内存定位 O(log n)，磁盘一次点查</text>
  <rect x="540" y="180" width="490" height="150" rx="12" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="560" y="204" font-size="11" font-weight="700" fill="#7a5a1e">范围读 [key, rangeEnd)</text>
  <text x="560" y="228" font-size="9.5" fill="#93762e">· treeIndex.Range 区间遍历，逐 key 解析目标 revision</text>
  <text x="560" y="248" font-size="9.5" fill="#93762e">· 收集一批 revision → 批量去 boltdb 取值</text>
  <text x="560" y="268" font-size="9.5" fill="#93762e">· 支持 limit / count-only / keys-only</text>
  <text x="560" y="290" font-size="9" fill="#b08843">· 大范围扫描 = treeIndex 遍历成本 + N 次 boltdb 读</text>
  <text x="560" y="310" font-size="9" fill="#b08843">· 前缀查询用 rangeEnd = key 的下一个前缀</text>
  <rect x="40" y="344" width="990" height="70" rx="12" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="60" y="368" font-size="11" font-weight="700" fill="#7a2230">读一致性（与线性读主线的衔接）</text>
  <text x="60" y="390" font-size="9.5" fill="#a44">· 上面是"读本地 MVCC"的机制——但读哪个节点、是否跟上多数派，由上层决定：</text>
  <text x="60" y="408" font-size="9" fill="#7a2230">· 线性读先经 ReadIndex 等 apply 追上再走此链路；串行读直接走此链路（可能读到略旧数据）。见线性一致读主线。</text>
  <rect x="40" y="428" width="990" height="56" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="452" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="474" font-size="10" fill="#4b4b50">读 = treeIndex 内存定位目标 revision（点读 get / 范围读 Range）→ 用 revision 作 key 从 boltdb 取 protobuf value；一致性级别由上层线性/串行读决定。</text>
</svg>
