<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="480" viewBox="0 0 1080 480" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="480" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">权限校验：在 gRPC 拦截器链统一检查（执行前）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">v3rpc/interceptor.go 拦截器链 · auth 数据存 MVCC、变更走 Raft（全节点一致）</text>
  <g text-anchor="middle">
    <rect x="40" y="80" width="180" height="70" rx="11" fill="#f6f2fb" stroke="#d9c9ec" filter="url(#soft)"/><text x="130" y="106" font-size="10" font-weight="700" fill="#3d2a5a">请求进入</text><text x="130" y="126" font-size="8" fill="#7a5da5">带 token</text><text x="130" y="140" font-size="8" fill="#9a7cc4">Put /registry/x</text>
    <rect x="270" y="80" width="200" height="70" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="370" y="102" font-size="10" font-weight="700" fill="#1b2a4a">① 解析 token→user</text><text x="370" y="122" font-size="8" fill="#5b7db1">拦截器取 metadata</text><text x="370" y="138" font-size="8" fill="#8aa6cf">simple 查表 / JWT 验签</text>
    <rect x="520" y="80" width="220" height="70" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/><text x="630" y="102" font-size="10" font-weight="700" fill="#5a3410">② isOpPermitted</text><text x="630" y="122" font-size="8" fill="#93762e">user 的 role 有权限?</text><text x="630" y="138" font-size="8" fill="#b08843">key range + 类型匹配</text>
    <rect x="790" y="80" width="120" height="70" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="850" y="106" font-size="10" font-weight="700" fill="#12402a">③ 通过</text><text x="850" y="126" font-size="8" fill="#2f6f4f">执行操作</text>
    <rect x="930" y="80" width="110" height="70" rx="11" fill="#fbeef0" stroke="#f0cdd4" filter="url(#soft)"/><text x="985" y="106" font-size="10" font-weight="700" fill="#7a2230">拒绝</text><text x="985" y="126" font-size="8" fill="#a44">权限错误</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <line x1="220" y1="115" x2="270" y2="115" marker-end="url(#ar)"/>
    <line x1="470" y1="115" x2="520" y2="115" marker-end="url(#ar)"/>
    <line x1="740" y1="105" x2="790" y2="105" marker-end="url(#ar)"/>
    <line x1="740" y1="128" x2="930" y2="128" marker-end="url(#ar)"/>
  </g>
  <rect x="40" y="180" width="490" height="160" rx="12" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="204" font-size="11" font-weight="700" fill="#274a78">为什么在拦截器（而非每个 handler）</text>
  <text x="60" y="228" font-size="9.5" fill="#5b7db1">· 统一入口：所有 RPC（KV/Watch/Lease/…）都经拦截器链</text>
  <text x="60" y="248" font-size="9.5" fill="#5b7db1">· 不必每个 handler 重复写认证授权代码</text>
  <text x="60" y="268" font-size="9.5" fill="#5b7db1">· 与 quota、日志、metrics 拦截器排在同一条链</text>
  <text x="60" y="288" font-size="9" fill="#8aa6cf">· 执行前检查——不通过则请求根本不进 handler</text>
  <text x="60" y="308" font-size="9" fill="#8aa6cf">· capability/learner/leader 检查也在此链</text>
  <text x="60" y="328" font-size="8.5" fill="#8aa6cf">见 gRPC API 族主线的拦截器链</text>
  <rect x="550" y="180" width="490" height="160" rx="12" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="570" y="204" font-size="11" font-weight="700" fill="#7a5a1e">auth 数据本身也走 Raft</text>
  <text x="570" y="228" font-size="9.5" fill="#93762e">· user/role/permission 是特殊 key，存在 MVCC 里</text>
  <text x="570" y="248" font-size="9.5" fill="#93762e">· 变更（UserAdd/RoleGrantPermission）改数据 → 走 Raft</text>
  <text x="570" y="268" font-size="9.5" fill="#93762e">· → 权限变更在所有节点一致生效</text>
  <text x="570" y="290" font-size="9" fill="#a44">· 注意：校验是"当前快照"——撤销的权限</text>
  <text x="585" y="308" font-size="9" fill="#7a2230">对已建立的 watch 流不追溯撤销（需重连）</text>
  <text x="570" y="328" font-size="8.5" fill="#b08843">这与"改数据走 Raft"的通则一致</text>
  <rect x="40" y="360" width="1000" height="56" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="384" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="406" font-size="10" fill="#4b4b50">每请求在 gRPC 拦截器链解析 token→user、经 isOpPermitted 校验 key range 权限（执行前，统一入口）；auth 数据存 MVCC、变更走 Raft 保全节点一致。</text>
</svg>
