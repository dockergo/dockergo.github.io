<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="480" viewBox="0 0 1080 480" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="480" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">RBAC 全景：user → role → permission（对 key range）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">store.go authStore(:244) isOpPermitted(:859) · IsPutPermitted(:901,WRITE)/IsRangePermitted(:905,READ) · rootPerm(:44)</text>
  <g text-anchor="middle">
    <rect x="60" y="90" width="220" height="120" rx="12" fill="#f6f2fb" stroke="#d9c9ec" filter="url(#soft)"/><text x="170" y="116" font-size="11" font-weight="700" fill="#3d2a5a">user（用户）</text><text x="170" y="140" font-size="8.5" fill="#7a5da5">apiserver</text><text x="170" y="158" font-size="8.5" fill="#7a5da5">backup-job</text><text x="170" y="176" font-size="8.5" fill="#7a5da5">root（超管）</text><text x="170" y="198" font-size="8" fill="#9a7cc4">password（bcrypt）</text>
    <rect x="430" y="90" width="220" height="120" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="540" y="116" font-size="11" font-weight="700" fill="#1b2a4a">role（角色）</text><text x="540" y="140" font-size="8.5" fill="#5b7db1">k8s-rw</text><text x="540" y="158" font-size="8.5" fill="#5b7db1">readonly</text><text x="540" y="176" font-size="8.5" fill="#5b7db1">root（全局 rw）</text><text x="540" y="198" font-size="8" fill="#8aa6cf">一 user 可绑多 role</text>
    <rect x="800" y="90" width="220" height="120" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="910" y="116" font-size="11" font-weight="700" fill="#12402a">permission</text><text x="910" y="138" font-size="8.5" fill="#2f6f4f">/registry/ 前缀: rw</text><text x="910" y="156" font-size="8.5" fill="#2f6f4f">/config/ 前缀: read</text><text x="910" y="176" font-size="8.5" fill="#2f6f4f">类型: read/write/readwrite</text><text x="910" y="196" font-size="8" fill="#4c8567">按 key range 授权</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <line x1="280" y1="150" x2="430" y2="150" marker-end="url(#ar)"/>
    <line x1="650" y1="150" x2="800" y2="150" marker-end="url(#ar)"/>
  </g>
  <text x="355" y="142" font-size="8" fill="#a1a1a6">绑定</text>
  <text x="725" y="142" font-size="8" fill="#a1a1a6">授予</text>
  <rect x="40" y="234" width="490" height="130" rx="12" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="258" font-size="11" font-weight="700" fill="#274a78">校验：isOpPermitted</text>
  <text x="60" y="282" font-size="9.5" fill="#5b7db1">· 一次操作 (user, key range, 类型)</text>
  <text x="60" y="302" font-size="9.5" fill="#5b7db1">· 遍历该 user 的所有 role</text>
  <text x="60" y="322" font-size="9.5" fill="#5b7db1">· 有 permission 覆盖此 range + 类型匹配 → 允许</text>
  <text x="60" y="342" font-size="9" fill="#8aa6cf">· root role 直接放行（全局 readwrite）</text>
  <rect x="550" y="234" width="490" height="130" rx="12" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="570" y="258" font-size="11" font-weight="700" fill="#7a5a1e">按范围授权（非单 key）</text>
  <text x="570" y="282" font-size="9.5" fill="#93762e">· 权限是对 [key, rangeEnd) 的，如整个前缀</text>
  <text x="570" y="302" font-size="9.5" fill="#93762e">· k8s：apiserver user 授 /registry/ 前缀 readwrite</text>
  <text x="570" y="322" font-size="9.5" fill="#93762e">· 默认 auth 关闭（无检查，任何客户端可读写全部）</text>
  <text x="570" y="342" font-size="9" fill="#b08843">· 启用后所有请求需身份 → 生产必开</text>
  <rect x="40" y="384" width="1000" height="56" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="408" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="430" font-size="10" fill="#4b4b50">RBAC：user 绑 role、role 授予对 key range 的 read/write/readwrite 权限，root 是超管；每次操作经 isOpPermitted 遍历 user 的 role 校验——默认关，生产必开。</text>
</svg>
