<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">过期检测：最小堆找到期 + 仅 leader 经 Raft 撤销</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">lease_queue.go LeaseQueue(:31)/Notifier(:63) · lessor.go runLoop 500ms(:620) findExpired(:728) revokeExpired(:640,isPrimary:647)</text>
  <!-- min heap -->
  <rect x="40" y="80" width="320" height="170" rx="12" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="200" y="104" font-size="11" font-weight="700" fill="#5a3410" text-anchor="middle">最小堆（按到期时间）</text>
  <g text-anchor="middle" font-size="8">
    <rect x="150" y="118" width="100" height="30" rx="6" fill="#fbeef0" stroke="#f0cdd4"/><text x="200" y="137" fill="#a44">lease#7 到期 t+2s（堆顶）</text>
    <rect x="90" y="158" width="100" height="30" rx="6" fill="#fff" stroke="#efdcb4"/><text x="140" y="177" fill="#5a3410">#3 t+15s</text>
    <rect x="210" y="158" width="100" height="30" rx="6" fill="#fff" stroke="#efdcb4"/><text x="260" y="177" fill="#5a3410">#9 t+30s</text>
  </g>
  <text x="200" y="212" font-size="9" fill="#93762e">堆顶 = 最快到期的 lease</text>
  <text x="200" y="230" font-size="8.5" fill="#b08843">O(log n) 取最快到期，不必遍历全部</text>
  <!-- runLoop -->
  <rect x="400" y="80" width="300" height="170" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="550" y="104" font-size="11" font-weight="700" fill="#1b2a4a" text-anchor="middle">runLoop（每 500ms）</text>
  <text x="420" y="128" font-size="9" fill="#5b7db1">· findExpiredLeases 从堆顶取已过期</text>
  <text x="420" y="148" font-size="9" fill="#5b7db1">· 逐个 revokeExpiredLeases</text>
  <text x="420" y="168" font-size="9" fill="#5b7db1">· 仅 leader 执行（isPrimary 检查）</text>
  <text x="420" y="190" font-size="8.5" fill="#8aa6cf">· follower 不撤销（避免各自删不一致）</text>
  <text x="420" y="210" font-size="8.5" fill="#8aa6cf">· 撤销失败 3s 后重试</text>
  <text x="420" y="230" font-size="8" fill="#8aa6cf">expiredLeaseRetryInterval=3s</text>
  <!-- revoke via raft -->
  <rect x="740" y="80" width="300" height="170" rx="12" fill="#fbeef0" stroke="#f0cdd4" filter="url(#soft)"/>
  <text x="890" y="104" font-size="11" font-weight="700" fill="#7a2230" text-anchor="middle">Revoke 经 Raft</text>
  <text x="760" y="128" font-size="9" fill="#a44">· leader 发起 LeaseRevoke 请求</text>
  <text x="760" y="148" font-size="9" fill="#a44">· 走 Raft 复制到多数派</text>
  <text x="760" y="168" font-size="9" fill="#a44">· 各节点一致删除 lease + 名下 key</text>
  <text x="760" y="190" font-size="8.5" fill="#7a2230">为什么经 Raft：撤销=删数据</text>
  <text x="760" y="210" font-size="8.5" fill="#7a2230">删数据必须所有副本一致发生</text>
  <text x="760" y="230" font-size="8" fill="#a44">否则 follower 上残留 key、不一致</text>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <line x1="360" y1="150" x2="400" y2="150" marker-end="url(#ar)"/>
    <line x1="700" y1="150" x2="740" y2="150" marker-end="url(#ar)"/>
  </g>
  <rect x="40" y="270" width="1000" height="96" rx="12" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="294" font-size="11" font-weight="700" fill="#274a78">对比 Renew（续租）：为什么撤销走 Raft、续租不走</text>
  <text x="60" y="316" font-size="9.5" fill="#5b7db1">· Renew 续租：只是"推后到期时间"，不改任何持久数据 → leader 内存改即可，不必一致</text>
  <text x="60" y="336" font-size="9.5" fill="#5b7db1">· Revoke 撤销：真的删 lease 和其名下所有 key → 是数据变更 → 必须经 Raft 让所有副本一致删</text>
  <text x="60" y="354" font-size="9" fill="#8aa6cf">· 一条判据："改不改持久数据"——改则走 Raft，不改则本地内存。这贯穿 etcd 所有操作</text>
  <rect x="40" y="380" width="1000" height="60" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="404" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="426" font-size="10" fill="#4b4b50">最小堆按到期时间排序、runLoop 每 500ms 从堆顶取过期租约，仅 leader 发起 Revoke 经 Raft 一致删除 lease 及名下 key（失败 3s 重试）——删数据必须多数派一致。</text>
</svg>
