<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="480" viewBox="0 0 1080 480" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="480" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">拦截器链：请求的统一管道（执行前集中检查）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">interceptor.go: unary 链(grpc.go:53)/stream 链(:62) · newUnaryInterceptor(:47) · quota 单独(quota.go:60)</text>
  <!-- pipeline -->
  <rect x="40" y="76" width="120" height="60" rx="10" fill="#f6f2fb" stroke="#d9c9ec" filter="url(#soft)"/><text x="100" y="102" font-size="9.5" font-weight="700" fill="#3d2a5a" text-anchor="middle">请求进入</text><text x="100" y="120" font-size="8" fill="#9a7cc4" text-anchor="middle">带 token</text>
  <g text-anchor="middle" font-size="8">
    <rect x="180" y="76" width="130" height="60" rx="9" fill="#fbeef0" stroke="#f0cdd4"/><text x="245" y="98" font-weight="600" fill="#7a2230">认证/授权</text><text x="245" y="114" fill="#a44">token→user</text><text x="245" y="127" fill="#7a2230">isOpPermitted</text>
    <rect x="330" y="76" width="130" height="60" rx="9" fill="#fdf6ea" stroke="#efdcb4"/><text x="395" y="98" font-weight="600" fill="#5a3410">配额 quota</text><text x="395" y="114" fill="#93762e">db 超配额?</text><text x="395" y="127" fill="#b08843">超则拒写</text>
    <rect x="480" y="76" width="130" height="60" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="545" y="98" font-weight="600" fill="#1b2a4a">capability</text><text x="545" y="114" fill="#5b7db1">该 API 当前</text><text x="545" y="127" fill="#8aa6cf">cluster ver 可用?</text>
    <rect x="630" y="76" width="130" height="60" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="695" y="98" font-weight="600" fill="#1b2a4a">learner/leader</text><text x="695" y="114" fill="#5b7db1">learner 只读部分</text><text x="695" y="127" fill="#8aa6cf">需 leader?</text>
    <rect x="780" y="76" width="130" height="60" rx="9" fill="#f2f2f4" stroke="#dcdce0"/><text x="845" y="98" font-weight="600" fill="#48484c">日志/metrics</text><text x="845" y="114" fill="#86868b">慢请求记录</text><text x="845" y="127" fill="#a1a1a6">可观测</text>
    <rect x="930" y="76" width="110" height="60" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="985" y="98" font-weight="600" fill="#12402a">handler</text><text x="985" y="114" fill="#2f6f4f">业务逻辑</text><text x="985" y="127" fill="#4c8567">分派能力域</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.3" fill="none">
    <line x1="160" y1="106" x2="180" y2="106" marker-end="url(#ar)"/>
    <line x1="310" y1="106" x2="330" y2="106" marker-end="url(#ar)"/>
    <line x1="460" y1="106" x2="480" y2="106" marker-end="url(#ar)"/>
    <line x1="610" y1="106" x2="630" y2="106" marker-end="url(#ar)"/>
    <line x1="760" y1="106" x2="780" y2="106" marker-end="url(#ar)"/>
    <line x1="910" y1="106" x2="930" y2="106" marker-end="url(#ar)"/>
  </g>
  <rect x="40" y="160" width="490" height="150" rx="12" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="184" font-size="11" font-weight="700" fill="#274a78">为什么用统一管道</text>
  <text x="60" y="208" font-size="9.5" fill="#5b7db1">· 所有 RPC（KV/Watch/Lease/…）都经同一条链</text>
  <text x="60" y="228" font-size="9.5" fill="#5b7db1">· 认证/授权/配额/集群状态检查集中处理，不散落各 handler</text>
  <text x="60" y="248" font-size="9.5" fill="#5b7db1">· handler 只管业务逻辑，横切关注点交给拦截器</text>
  <text x="60" y="270" font-size="9" fill="#8aa6cf">· 执行前检查：不通过则请求根本不进 handler</text>
  <text x="60" y="290" font-size="9" fill="#8aa6cf">· unary（一元）与 stream（Watch/Lease）各一套链</text>
  <rect x="550" y="160" width="490" height="150" rx="12" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="570" y="184" font-size="11" font-weight="700" fill="#7a5a1e">几个关键检查</text>
  <text x="570" y="208" font-size="9.5" fill="#93762e">· leader 检查：需 leader 的请求（写/线性读）</text>
  <text x="585" y="226" font-size="8.5" fill="#b08843">本节点非 leader → 拒绝，client 重试其他 endpoint</text>
  <text x="570" y="246" font-size="9.5" fill="#93762e">· learner 检查：learner 只服务部分只读请求</text>
  <text x="570" y="266" font-size="9.5" fill="#93762e">· capability：新 API 在旧 cluster version 下不可用</text>
  <text x="570" y="286" font-size="9" fill="#b08843">· quota：db 超配额时拒绝写（NOSPACE，见 backend）</text>
  <rect x="40" y="326" width="1000" height="56" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="350" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="372" font-size="10" fill="#4b4b50">每个 RPC 先过统一拦截器链——认证/授权 → 配额 → capability/learner/leader 检查 → 日志/metrics → 才进 handler；横切关注点集中、handler 只管业务，不通过则请求不落地。</text>
</svg>
