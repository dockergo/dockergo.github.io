<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">一次写落两次盘：WAL 顺序 fsync（快确认）+ backend 批量 B+树（可查）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">分工：WAL 保"不丢+快确认"（关键路径），backend 保"可查+最终持久"（非关键路径，丢了 WAL 回放补）</text>
  <!-- write flows to two disks -->
  <rect x="440" y="76" width="200" height="50" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="540" y="98" font-size="10" font-weight="700" fill="#1b2a4a" text-anchor="middle">一条写（committed 条目）</text>
  <text x="540" y="114" font-size="8" fill="#5b7db1" text-anchor="middle">Raft Ready 循环处理</text>
  <!-- WAL path -->
  <rect x="80" y="170" width="400" height="180" rx="13" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="280" y="194" font-size="11" font-weight="700" fill="#5a3410" text-anchor="middle">① WAL 落盘（关键路径 · 快）</text>
  <text x="100" y="218" font-size="9.5" fill="#93762e">· Ready 循环里立即 Save + fsync</text>
  <text x="100" y="238" font-size="9.5" fill="#93762e">· 纯顺序 append（磁盘友好，fsync 快）</text>
  <text x="100" y="258" font-size="9.5" fill="#93762e">· client 要等这次 fsync 才算 committed</text>
  <text x="100" y="278" font-size="9.5" font-weight="600" fill="#5a3410">· → WAL fsync 延迟 = 写延迟决定因素</text>
  <text x="100" y="300" font-size="8.5" fill="#b08843">etcd_disk_wal_fsync_duration（头号信号）</text>
  <text x="100" y="320" font-size="8.5" fill="#b08843">保证："不丢" + "快确认"</text>
  <text x="100" y="338" font-size="8" fill="#a98a4a">必须 SSD；可用 --wal-dir 单独放高速盘</text>
  <!-- backend path -->
  <rect x="600" y="170" width="400" height="180" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="800" y="194" font-size="11" font-weight="700" fill="#1b2a4a" text-anchor="middle">② backend 落盘（非关键 · 可批量慢）</text>
  <text x="620" y="218" font-size="9.5" fill="#5b7db1">· apply 后写 boltdb（B+树）</text>
  <text x="620" y="238" font-size="9.5" fill="#5b7db1">· 批量提交（攒 10000 或 100ms）</text>
  <text x="620" y="258" font-size="9.5" fill="#5b7db1">· 可稍后、丢了从 WAL 回放补回</text>
  <text x="620" y="278" font-size="9.5" font-weight="600" fill="#1b2a4a">· → 提供点查/范围查（MVCC 读）</text>
  <text x="620" y="300" font-size="8.5" fill="#8aa6cf">etcd_disk_backend_commit_duration（次要信号）</text>
  <text x="620" y="320" font-size="8.5" fill="#8aa6cf">保证："可查" + "最终持久"</text>
  <text x="620" y="338" font-size="8" fill="#8aa6cf">随机写 B+树，慢，故不放关键路径</text>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <line x1="500" y1="120" x2="280" y2="170" marker-end="url(#ar)"/>
    <line x1="580" y1="120" x2="800" y2="170" marker-end="url(#ar)"/>
  </g>
  <rect x="80" y="366" width="920" height="90" rx="12" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="100" y="390" font-size="11" font-weight="700" fill="#274a78">为什么要两次（而非一次）</text>
  <text x="100" y="412" font-size="9.5" fill="#5b7db1">· 只有 backend：B+树随机写 + fsync 太慢，做不到"快确认"——写延迟高</text>
  <text x="100" y="432" font-size="9.5" fill="#5b7db1">· 只有 WAL：顺序日志无法高效点查/范围查——读不了</text>
  <text x="100" y="450" font-size="9" fill="#8aa6cf">· 两者分工：WAL 顺序 fsync 保快确认+不丢，backend B+树保可查+持久，WAL 回放兜底 backend 的丢批</text>
  <rect x="80" y="470" width="920" height="40" rx="10" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="100" y="495" font-size="10" fill="#4b4b50"><tspan font-weight="700" fill="#1d1d1f">一句话：</tspan>写落两次盘——WAL 顺序 fsync（关键路径，决定写延迟，保不丢+快确认）+ backend 批量 B+树（非关键，保可查+持久）；诊断写慢先看 WAL fsync。</text>
</svg>
