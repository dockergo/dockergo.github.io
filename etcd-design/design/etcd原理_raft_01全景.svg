<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Raft 全景：propose → 复制到多数派 → commit → apply → 唤醒</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">v3_server.go: raftRequest(:1012) → processInternalRaftRequestOnce(:1058) · Register(:1106)/Propose(:1113)/阻塞(:1122)</text>
  <g text-anchor="middle">
    <rect x="40" y="76" width="150" height="66" rx="11" fill="#f6f2fb" stroke="#d9c9ec" filter="url(#soft)"/><text x="115" y="102" font-size="10" font-weight="700" fill="#3d2a5a">client 写请求</text><text x="115" y="122" font-size="8" fill="#7a5da5">Put/Txn/…</text><text x="115" y="135" font-size="7.5" fill="#9a7cc4">经 gRPC</text>
    <rect x="220" y="76" width="180" height="66" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="310" y="100" font-size="9.5" font-weight="700" fill="#1b2a4a">编码 InternalRaftRequest</text><text x="310" y="120" font-size="8" fill="#5b7db1">Register(id) 等待通道</text><text x="310" y="134" font-size="7.5" fill="#8aa6cf">阻塞直到 apply</text>
    <rect x="430" y="76" width="180" height="66" rx="11" fill="#e9f1fb" stroke="#c4d8f0" filter="url(#soft)"/><text x="520" y="100" font-size="9.5" font-weight="700" fill="#1b2a4a">Propose 给 Raft</text><text x="520" y="120" font-size="8" fill="#5b7db1">leader 追加到日志</text><text x="520" y="134" font-size="7.5" fill="#8aa6cf">s.r.Propose(:1113)</text>
    <rect x="640" y="76" width="180" height="66" rx="11" fill="#e9f1fb" stroke="#c4d8f0" filter="url(#soft)"/><text x="730" y="100" font-size="9.5" font-weight="700" fill="#1b2a4a">复制到 follower</text><text x="730" y="120" font-size="8" fill="#5b7db1">MsgApp 广播</text><text x="730" y="134" font-size="7.5" fill="#8aa6cf">等多数派 ack</text>
    <rect x="850" y="76" width="190" height="66" rx="11" fill="#dce9fa" stroke="#c4d8f0" filter="url(#soft)"/><text x="945" y="100" font-size="9.5" font-weight="700" fill="#1b2a4a">committed</text><text x="945" y="120" font-size="8" fill="#5b7db1">quorum = N/2+1</text><text x="945" y="134" font-size="7.5" fill="#8aa6cf">该条目已确认不丢</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <line x1="190" y1="109" x2="220" y2="109" marker-end="url(#ar)"/>
    <line x1="400" y1="109" x2="430" y2="109" marker-end="url(#ar)"/>
    <line x1="610" y1="109" x2="640" y2="109" marker-end="url(#ar)"/>
    <line x1="820" y1="109" x2="850" y2="109" marker-end="url(#ar)"/>
  </g>
  <!-- second row: down to apply -->
  <g text-anchor="middle">
    <rect x="850" y="200" width="190" height="76" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/><text x="945" y="224" font-size="9.5" font-weight="700" fill="#5a3410">Ready 吐回 etcd</text><text x="945" y="244" font-size="8" fill="#93762e">committed entries</text><text x="945" y="258" font-size="8" fill="#93762e">+ 待持久化状态</text><text x="945" y="270" font-size="7.5" fill="#b08843">先写 WAL 见下张</text>
    <rect x="640" y="200" width="180" height="76" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="730" y="224" font-size="9.5" font-weight="700" fill="#1b2a4a">applier 按类型 apply</text><text x="730" y="244" font-size="8" fill="#5b7db1">Put→写 MVCC</text><text x="730" y="258" font-size="8" fill="#5b7db1">apply/uber_applier.go</text><text x="730" y="270" font-size="7.5" fill="#8aa6cf">consistentIndex 幂等</text>
    <rect x="430" y="200" width="180" height="76" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="520" y="224" font-size="9.5" font-weight="700" fill="#12402a">Trigger(id) 唤醒</text><text x="520" y="244" font-size="8" fill="#2f6f4f">s.w.Trigger(:1971)</text><text x="520" y="258" font-size="8" fill="#2f6f4f">解除②的阻塞</text><text x="520" y="270" font-size="7.5" fill="#4c8567">返回 revision</text>
    <rect x="220" y="200" width="180" height="76" rx="11" fill="#f6f2fb" stroke="#d9c9ec" filter="url(#soft)"/><text x="310" y="230" font-size="9.5" font-weight="700" fill="#3d2a5a">client 收到响应</text><text x="310" y="250" font-size="8" fill="#7a5da5">写成功 + revision</text><text x="310" y="266" font-size="7.5" fill="#9a7cc4">全链路强一致</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <line x1="945" y1="142" x2="945" y2="200" marker-end="url(#ar)"/>
    <line x1="850" y1="238" x2="820" y2="238" marker-end="url(#ar)"/>
    <line x1="640" y1="238" x2="610" y2="238" marker-end="url(#ar)"/>
    <line x1="430" y1="238" x2="400" y2="238" marker-end="url(#ar)"/>
  </g>
  <rect x="40" y="316" width="1000" height="86" rx="12" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="60" y="340" font-size="11" font-weight="700" fill="#7a2230">为什么"写必过多数派"是 etcd 的根</text>
  <text x="60" y="362" font-size="9.5" fill="#a44">· 只有被多数派持久化的条目才算 committed——即使随后任意少数节点（含旧 leader）宕机，新 leader 必含所有已 commit 条目</text>
  <text x="60" y="382" font-size="9.5" fill="#a44">· 代价：写延迟 = 第 quorum 快的节点的落盘延迟；换来的是"确认即不丢、任意时刻线性一致"</text>
  <rect x="40" y="416" width="1000" height="86" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="440" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="462" font-size="10" fill="#4b4b50">写请求编码成日志条目 Propose 给 leader，复制到多数派后 commit，经 Ready 循环 apply 到状态机再唤醒阻塞的 client。</text>
  <text x="60" y="480" font-size="10" fill="#4b4b50">client 全程阻塞等 apply 完成——写是同步强一致的，这是所有写路径的必经底座。</text>
</svg>
