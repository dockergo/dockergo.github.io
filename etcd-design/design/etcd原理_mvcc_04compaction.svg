<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">compaction：回收旧版本（≠ defrag 回收磁盘）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">kvstore_compaction.go: scheduleCompaction(:28) UnsafeRange(:53)/UnsafeDelete(:57)/ForceCommit(:89) · auto-compaction 默认 periodic/"0"关</text>
  <!-- before/after -->
  <text x="60" y="82" font-size="10" font-weight="700" fill="#7a2230">compact(rev=10) 前：foo 有 rev 3/7/12</text>
  <g font-size="8" text-anchor="middle">
    <rect x="60" y="90" width="70" height="40" rx="6" fill="#fdeef0" stroke="#f0cdd4"/><text x="95" y="108" fill="#a44">rev3</text><text x="95" y="122" fill="#7a2230">旧</text>
    <rect x="140" y="90" width="70" height="40" rx="6" fill="#fdeef0" stroke="#f0cdd4"/><text x="175" y="108" fill="#a44">rev7</text><text x="175" y="122" fill="#7a2230">旧</text>
    <rect x="220" y="90" width="70" height="40" rx="6" fill="#eafaf1" stroke="#bfe0cd"/><text x="255" y="108" fill="#12402a">rev12</text><text x="255" y="122" fill="#2f6f4f">保留(最新)</text>
  </g>
  <text x="340" y="114" font-size="9" fill="#a1a1a6">compact rev=10：删 ≤10 的非最新版本</text>
  <text x="60" y="162" font-size="10" font-weight="700" fill="#12402a">compact 后：只留 rev12（最新一定保留）</text>
  <g font-size="8" text-anchor="middle">
    <rect x="60" y="170" width="70" height="40" rx="6" fill="#f2f2f4" stroke="#e0e0e4" stroke-dasharray="3 2"/><text x="95" y="188" fill="#a1a1a6">rev3</text><text x="95" y="202" fill="#c7c7cc">已删</text>
    <rect x="140" y="170" width="70" height="40" rx="6" fill="#f2f2f4" stroke="#e0e0e4" stroke-dasharray="3 2"/><text x="175" y="188" fill="#a1a1a6">rev7</text><text x="175" y="202" fill="#c7c7cc">已删</text>
    <rect x="220" y="170" width="70" height="40" rx="6" fill="#eafaf1" stroke="#bfe0cd"/><text x="255" y="188" fill="#12402a">rev12</text><text x="255" y="202" fill="#2f6f4f">保留</text>
  </g>
  <text x="340" y="194" font-size="9" fill="#a44">此后读 rev≤10 → ErrCompacted</text>
  <rect x="60" y="234" width="470" height="120" rx="12" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="80" y="258" font-size="11" font-weight="700" fill="#274a78">机制</text>
  <text x="80" y="280" font-size="9.5" fill="#5b7db1">· scheduleCompaction 遍历 boltdb key bucket</text>
  <text x="80" y="300" font-size="9.5" fill="#5b7db1">· UnsafeRange 找 ≤compactRev 的待删 revision → UnsafeDelete</text>
  <text x="80" y="320" font-size="9.5" fill="#5b7db1">· 每批 ForceCommit，分批不阻塞太久</text>
  <text x="80" y="340" font-size="9" fill="#8aa6cf">· treeIndex 对应旧 revision 同步 compact 掉</text>
  <rect x="550" y="234" width="480" height="120" rx="12" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="570" y="258" font-size="11" font-weight="700" fill="#7a5a1e">触发方式</text>
  <text x="570" y="280" font-size="9.5" fill="#93762e">· 手动：Compact RPC（指定 revision）</text>
  <text x="570" y="300" font-size="9.5" fill="#93762e">· 自动：--auto-compaction-mode（默认 periodic）</text>
  <text x="570" y="320" font-size="9.5" fill="#93762e">  + --auto-compaction-retention（默认 "0" = 关！）</text>
  <text x="570" y="342" font-size="9" fill="#b08843">· 生产必开自动压缩（如 retention=1h），否则版本无限涨</text>
  <rect x="60" y="368" width="970" height="86" rx="12" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="80" y="392" font-size="11" font-weight="700" fill="#7a2230">compaction ≠ defrag（关键区分）</text>
  <text x="80" y="414" font-size="9.5" fill="#a44">· compaction：删"逻辑旧版本"，但 boltdb 文件不缩小——腾出的页标记为可复用（db 大小不降）</text>
  <text x="80" y="434" font-size="9.5" fill="#a44">· defrag（Maintenance.Defragment）：真正把空闲页还给 OS、缩小文件——会短暂阻塞，需逐节点滚动做</text>
  <text x="80" y="452" font-size="8.5" fill="#7a2230">运维常态：先 compact 清版本，再 defrag 回收空间；只 compact 不 defrag，磁盘不会降。</text>
  <rect x="60" y="466" width="970" height="46" rx="10" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="80" y="494" font-size="10" fill="#4b4b50"><tspan font-weight="700" fill="#1d1d1f">一句话：</tspan>compaction 删旧版本（最新必留、读旧 rev 报 ErrCompacted），自动压缩默认关须开启；它只清逻辑版本不缩文件，回收磁盘要另做 defrag。</text>
</svg>
