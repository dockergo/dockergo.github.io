<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">revision 编码 + treeIndex：内存索引 vs 磁盘存储</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">index.go B-tree deg32(:44) · key_index.go keyIndex(:73)/get(:149) · revision.go revBytesLen=17(:26) · kvstore_txn.go put(:223)</text>
  <!-- treeIndex -->
  <rect x="40" y="76" width="480" height="220" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="280" y="100" font-size="11" font-weight="700" fill="#1b2a4a" text-anchor="middle">treeIndex（内存 B-tree，degree 32）</text>
  <text x="60" y="122" font-size="9" fill="#5b7db1">key → keyIndex（记该 key 全部历史 revision）</text>
  <g font-size="8" text-anchor="middle">
    <rect x="60" y="134" width="200" height="140" rx="8" fill="#fff" stroke="#bcd0ec"/>
    <text x="160" y="154" font-weight="700" fill="#1b2a4a">keyIndex "foo"</text>
    <text x="160" y="174" fill="#5b7db1">generation 0：</text>
    <text x="160" y="190" fill="#8aa6cf">rev{3,0} rev{7,0} rev{12,0}</text>
    <text x="160" y="210" fill="#5b7db1">generation 1：（tombstone 后新代）</text>
    <text x="160" y="226" fill="#8aa6cf">rev{15,0}=删除</text>
    <text x="160" y="250" fill="#4c8567">get(atRev) 走 generation</text>
    <text x="160" y="264" fill="#4c8567">返回 ≤atRev 的最新 revision</text>
    <rect x="280" y="134" width="220" height="140" rx="8" fill="#f7fbff" stroke="#c4d8f0"/>
    <text x="390" y="156" font-weight="700" fill="#1b2a4a">范围查询</text>
    <text x="390" y="176" fill="#5b7db1">treeIndex.Range(:162)</text>
    <text x="390" y="194" fill="#5b7db1">[key, rangeEnd) 区间遍历</text>
    <text x="390" y="214" fill="#8aa6cf">逐个 key 解析出目标 revision</text>
    <text x="390" y="234" fill="#8aa6cf">→ 收集一批 revision</text>
    <text x="390" y="256" fill="#4c8567">再批量去 boltdb 取值</text>
  </g>
  <!-- boltdb -->
  <rect x="560" y="76" width="480" height="220" rx="13" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="800" y="100" font-size="11" font-weight="700" fill="#5a3410" text-anchor="middle">boltdb（磁盘，"key" bucket）</text>
  <text x="580" y="122" font-size="9" fill="#93762e">key = revision 字节, value = protobuf KeyValue</text>
  <g font-size="8">
    <rect x="580" y="134" width="440" height="26" rx="5" fill="#fff" stroke="#efdcb4"/><text x="590" y="151" fill="#5a3410" font-family="monospace">[8B main=3][_][8B sub=0]  → {key:foo, val:a, create:3, mod:3}</text>
    <rect x="580" y="164" width="440" height="26" rx="5" fill="#fff" stroke="#efdcb4"/><text x="590" y="181" fill="#5a3410" font-family="monospace">[8B main=7][_][8B sub=0]  → {key:foo, val:b, mod:7}</text>
    <rect x="580" y="194" width="440" height="26" rx="5" fill="#fff" stroke="#efdcb4"/><text x="590" y="211" fill="#5a3410" font-family="monospace">[8B main=12][_][8B sub=0] → {key:foo, val:c, mod:12}</text>
    <rect x="580" y="224" width="440" height="26" rx="5" fill="#fdeef0" stroke="#f0cdd4"/><text x="590" y="241" fill="#7a2230" font-family="monospace">[8B main=15][_][8B sub=0][t] → tombstone（18B key）</text>
  </g>
  <text x="580" y="268" font-size="8.5" fill="#b08843">revBytesLen=17（8+1+8）；tombstone +1='t'=18；big-endian 保证字节序=数值序 → 顺序写</text>
  <text x="580" y="284" font-size="8.5" fill="#b08843">UnsafeSeqPut(schema.Key, revBytes, marshaled)（kvstore_txn.go:259）</text>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none"><line x1="520" y1="200" x2="560" y2="200" marker-end="url(#ar)"/></g>
  <text x="540" y="192" font-size="7.5" fill="#a1a1a6" text-anchor="middle">rev</text>
  <rect x="40" y="312" width="1000" height="110" rx="12" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="336" font-size="11" font-weight="700" fill="#274a78">为什么分两层</text>
  <text x="60" y="358" font-size="9.5" fill="#5b7db1">· treeIndex 在内存：范围扫描、"某 key 在某 revision 是哪版本"极快，但只存"key→revision 映射"不存 value</text>
  <text x="60" y="378" font-size="9.5" fill="#5b7db1">· boltdb 在磁盘：存实际 value，key 用 revision 字节 → 按写入顺序单调递增 → boltdb 顺序追加写（B+树右侧插入，高效）</text>
  <text x="60" y="398" font-size="9" fill="#8aa6cf">· 分层让"版本定位"（内存）与"内容持久"（磁盘）解耦；treeIndex 崩溃可从 boltdb 重建</text>
  <text x="60" y="416" font-size="9" fill="#8aa6cf">· 注意 treeIndex 全内存——key 规模由元数据量决定，不该塞海量业务 KV</text>
  <rect x="40" y="434" width="1000" height="56" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="458" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="480" font-size="10" fill="#4b4b50">treeIndex（内存 B-tree）记 key→历史 revisions 管版本定位，boltdb（磁盘）以 17 字节 revision 为 key 存 protobuf value 管内容持久——读先内存定位版本、再磁盘取值。</text>
</svg>
