<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter></defs>
  <rect width="1080" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">接触面 × 能力域 依赖矩阵（●强依赖 ◐部分 ○弱/无）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">行=gRPC API 操作 · 列=8 支撑能力域 · 每格=该操作对该能力域的依赖强度</text>
  <!-- column headers -->
  <g font-size="8.5" font-weight="700" fill="#48484c" text-anchor="middle">
    <text x="360" y="82" transform="rotate(-32 360 82)">Raft共识</text>
    <text x="440" y="82" transform="rotate(-32 440 82)">MVCC</text>
    <text x="520" y="82" transform="rotate(-32 520 82)">backend</text>
    <text x="600" y="82" transform="rotate(-32 600 82)">Watch</text>
    <text x="680" y="82" transform="rotate(-32 680 82)">Lease</text>
    <text x="760" y="82" transform="rotate(-32 760 82)">线性读</text>
    <text x="840" y="82" transform="rotate(-32 840 82)">WAL/快照</text>
    <text x="920" y="82" transform="rotate(-32 920 82)">成员</text>
    <text x="1000" y="82" transform="rotate(-32 1000 82)">认证</text>
  </g>
  <!-- rows -->
  <g font-size="9">
    <!-- row bg zebra + labels -->
    <g fill="#3d2a5a" font-weight="600">
      <text x="40" y="118">Put / DeleteRange</text>
      <text x="40" y="152">Txn（读写事务）</text>
      <text x="40" y="186">Range（线性读）</text>
      <text x="40" y="220">Range（串行读）</text>
      <text x="40" y="254">Watch</text>
      <text x="40" y="288">Lease Grant/KeepAlive</text>
      <text x="40" y="322">Compact</text>
      <text x="40" y="356">MemberAdd/Remove</text>
      <text x="40" y="390">Auth（user/role）</text>
      <text x="40" y="424">Maintenance（快照/defrag）</text>
    </g>
    <g text-anchor="middle" font-size="12">
      <!-- Put -->
      <text x="360" y="118" fill="#1b8f3f">●</text><text x="440" y="118" fill="#1b8f3f">●</text><text x="520" y="118" fill="#1b8f3f">●</text><text x="600" y="118" fill="#b25e00">◐</text><text x="680" y="118" fill="#a1a1a6">○</text><text x="760" y="118" fill="#a1a1a6">○</text><text x="840" y="118" fill="#1b8f3f">●</text><text x="920" y="118" fill="#a1a1a6">○</text><text x="1000" y="118" fill="#b25e00">◐</text>
      <!-- Txn -->
      <text x="360" y="152" fill="#1b8f3f">●</text><text x="440" y="152" fill="#1b8f3f">●</text><text x="520" y="152" fill="#1b8f3f">●</text><text x="600" y="152" fill="#b25e00">◐</text><text x="680" y="152" fill="#a1a1a6">○</text><text x="760" y="152" fill="#b25e00">◐</text><text x="840" y="152" fill="#1b8f3f">●</text><text x="920" y="152" fill="#a1a1a6">○</text><text x="1000" y="152" fill="#b25e00">◐</text>
      <!-- Range linear -->
      <text x="360" y="186" fill="#b25e00">◐</text><text x="440" y="186" fill="#1b8f3f">●</text><text x="520" y="186" fill="#1b8f3f">●</text><text x="600" y="186" fill="#a1a1a6">○</text><text x="680" y="186" fill="#a1a1a6">○</text><text x="760" y="186" fill="#1b8f3f">●</text><text x="840" y="186" fill="#a1a1a6">○</text><text x="920" y="186" fill="#a1a1a6">○</text><text x="1000" y="186" fill="#b25e00">◐</text>
      <!-- Range serial -->
      <text x="360" y="220" fill="#a1a1a6">○</text><text x="440" y="220" fill="#1b8f3f">●</text><text x="520" y="220" fill="#1b8f3f">●</text><text x="600" y="220" fill="#a1a1a6">○</text><text x="680" y="220" fill="#a1a1a6">○</text><text x="760" y="220" fill="#a1a1a6">○</text><text x="840" y="220" fill="#a1a1a6">○</text><text x="920" y="220" fill="#a1a1a6">○</text><text x="1000" y="220" fill="#b25e00">◐</text>
      <!-- Watch -->
      <text x="360" y="254" fill="#a1a1a6">○</text><text x="440" y="254" fill="#1b8f3f">●</text><text x="520" y="254" fill="#b25e00">◐</text><text x="600" y="254" fill="#1b8f3f">●</text><text x="680" y="254" fill="#a1a1a6">○</text><text x="760" y="254" fill="#a1a1a6">○</text><text x="840" y="254" fill="#a1a1a6">○</text><text x="920" y="254" fill="#a1a1a6">○</text><text x="1000" y="254" fill="#b25e00">◐</text>
      <!-- Lease -->
      <text x="360" y="288" fill="#1b8f3f">●</text><text x="440" y="288" fill="#b25e00">◐</text><text x="520" y="288" fill="#b25e00">◐</text><text x="600" y="288" fill="#a1a1a6">○</text><text x="680" y="288" fill="#1b8f3f">●</text><text x="760" y="288" fill="#a1a1a6">○</text><text x="840" y="288" fill="#b25e00">◐</text><text x="920" y="288" fill="#a1a1a6">○</text><text x="1000" y="288" fill="#b25e00">◐</text>
      <!-- Compact -->
      <text x="360" y="322" fill="#1b8f3f">●</text><text x="440" y="322" fill="#1b8f3f">●</text><text x="520" y="322" fill="#1b8f3f">●</text><text x="600" y="322" fill="#a1a1a6">○</text><text x="680" y="322" fill="#a1a1a6">○</text><text x="760" y="322" fill="#a1a1a6">○</text><text x="840" y="322" fill="#a1a1a6">○</text><text x="920" y="322" fill="#a1a1a6">○</text><text x="1000" y="322" fill="#a1a1a6">○</text>
      <!-- Member -->
      <text x="360" y="356" fill="#1b8f3f">●</text><text x="440" y="356" fill="#a1a1a6">○</text><text x="520" y="356" fill="#b25e00">◐</text><text x="600" y="356" fill="#a1a1a6">○</text><text x="680" y="356" fill="#a1a1a6">○</text><text x="760" y="356" fill="#a1a1a6">○</text><text x="840" y="356" fill="#b25e00">◐</text><text x="920" y="356" fill="#1b8f3f">●</text><text x="1000" y="356" fill="#b25e00">◐</text>
      <!-- Auth -->
      <text x="360" y="390" fill="#1b8f3f">●</text><text x="440" y="390" fill="#b25e00">◐</text><text x="520" y="390" fill="#1b8f3f">●</text><text x="600" y="390" fill="#a1a1a6">○</text><text x="680" y="390" fill="#a1a1a6">○</text><text x="760" y="390" fill="#a1a1a6">○</text><text x="840" y="390" fill="#a1a1a6">○</text><text x="920" y="390" fill="#a1a1a6">○</text><text x="1000" y="390" fill="#1b8f3f">●</text>
      <!-- Maintenance -->
      <text x="360" y="424" fill="#b25e00">◐</text><text x="440" y="424" fill="#b25e00">◐</text><text x="520" y="424" fill="#1b8f3f">●</text><text x="600" y="424" fill="#a1a1a6">○</text><text x="680" y="424" fill="#a1a1a6">○</text><text x="760" y="424" fill="#a1a1a6">○</text><text x="840" y="424" fill="#1b8f3f">●</text><text x="920" y="424" fill="#b25e00">◐</text><text x="1000" y="424" fill="#b25e00">◐</text>
    </g>
  </g>
  <line x1="30" y1="128" x2="1050" y2="128" stroke="#eee"/>
  <rect x="30" y="446" width="1020" height="96" rx="11" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="48" y="470" font-size="10" font-weight="700" fill="#1d1d1f">读法与三角一致性锚点</text>
  <text x="48" y="490" font-size="9" fill="#48484c">· 所有写（Put/Txn/Lease/Compact/Member/Auth）都强依赖 Raft——这是"写必过多数派"的矩阵证据；串行读是唯一不依赖 Raft 的读。</text>
  <text x="48" y="508" font-size="9" fill="#48484c">· 线性读 Range 依赖"线性读能力域"（ReadIndex），间接依赖 Raft commit index；Watch 依赖 MVCC 的 revision 事件流，不经 Raft。</text>
  <text x="48" y="526" font-size="9" fill="#48484c">· 每个 ● 都应在对应主线正文有落点；此矩阵与各篇"定位"的依赖声明必须一致（改一处查三角）。</text>
</svg>
