<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">崩溃恢复：装最近快照 + 回放其后 WAL（+ consistentIndex 幂等）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">bootstrap.go: recoverSnapshot(:252) bootstrapWALFromSnapshot(:576) openWALFromSnapshot(:625) ReadAll(:642) · repair 截断损坏尾部</text>
  <g text-anchor="middle">
    <rect x="40" y="80" width="230" height="86" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="155" y="104" font-size="10" font-weight="700" fill="#12402a">① 装最近快照</text><text x="155" y="124" font-size="8.5" fill="#2f6f4f">LoadNewestAvailable</text><text x="155" y="140" font-size="8.5" fill="#2f6f4f">recoverSnapshot 恢复 backend</text><text x="155" y="156" font-size="7.5" fill="#4c8567">→ 跳到快照 revision</text>
    <rect x="300" y="80" width="230" height="86" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/><text x="415" y="104" font-size="10" font-weight="700" fill="#5a3410">② 打开快照后的 WAL</text><text x="415" y="124" font-size="8.5" fill="#93762e">openWALFromSnapshot</text><text x="415" y="140" font-size="8.5" fill="#b08843">ReadAll 读出增量记录</text><text x="415" y="156" font-size="7.5" fill="#b08843">尾部损坏 → repair 截断</text>
    <rect x="560" y="80" width="230" height="86" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="675" y="104" font-size="10" font-weight="700" fill="#1b2a4a">③ 重放条目 apply</text><text x="675" y="124" font-size="8.5" fill="#5b7db1">逐条 apply 到状态机</text><text x="675" y="140" font-size="8.5" fill="#8aa6cf">consistentIndex 跳过已应用</text><text x="675" y="156" font-size="7.5" fill="#8aa6cf">幂等，不重复</text>
    <rect x="820" y="80" width="220" height="86" rx="11" fill="#f6f2fb" stroke="#d9c9ec" filter="url(#soft)"/><text x="930" y="104" font-size="10" font-weight="700" fill="#3d2a5a">④ 恢复到最新</text><text x="930" y="124" font-size="8.5" fill="#7a5da5">= 快照 + 全部增量</text><text x="930" y="140" font-size="8.5" fill="#9a7cc4">= crash 前状态</text><text x="930" y="156" font-size="7.5" fill="#9a7cc4">加入 Raft 继续服务</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <line x1="270" y1="123" x2="300" y2="123" marker-end="url(#ar)"/>
    <line x1="530" y1="123" x2="560" y2="123" marker-end="url(#ar)"/>
    <line x1="790" y1="123" x2="820" y2="123" marker-end="url(#ar)"/>
  </g>
  <rect x="40" y="190" width="1000" height="110" rx="12" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="214" font-size="11" font-weight="700" fill="#274a78">为什么"先写 WAL 后 apply"让恢复正确</text>
  <text x="60" y="236" font-size="9.5" fill="#5b7db1">· crash 时刻：已 committed 的每条写都已在 WAL（因为 apply 前必先 WAL fsync）</text>
  <text x="60" y="256" font-size="9.5" fill="#5b7db1">· 快照给"到某 revision 的全量"，WAL 给"快照后的每条增量"→ 两者合起来 = 完整历史</text>
  <text x="60" y="276" font-size="9.5" fill="#5b7db1">· consistentIndex 让重放幂等：backend 已有的（≤ consistentIndex）跳过，只补未落 backend 的</text>
  <text x="60" y="294" font-size="9" fill="#8aa6cf">· 结果：无论何时 crash，重启都精确恢复到"crash 前最后一次 committed"，不重不丢</text>
  <rect x="40" y="316" width="1000" height="66" rx="12" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="60" y="340" font-size="11" font-weight="700" fill="#7a5a1e">WAL 损坏处理</text>
  <text x="60" y="362" font-size="9.5" fill="#93762e">· 正常 crash：WAL 尾部可能半条记录（写一半断电）→ repair 截断到最后一条完整（CRC 校验通过）记录</text>
  <text x="60" y="378" font-size="9" fill="#b08843">· 盘故障致中间损坏：无法本地修复，需从其他成员的快照/数据恢复（etcdutl snapshot restore）</text>
  <rect x="40" y="396" width="1000" height="44" rx="10" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="424" font-size="10" fill="#4b4b50"><tspan font-weight="700" fill="#1d1d1f">一句话：</tspan>重启 = 装最近快照跳到某 revision + 回放其后 WAL 增量补齐到最新（consistentIndex 保幂等、repair 修尾部损坏）——精确恢复到 crash 前，不重不丢。</text>
</svg>
