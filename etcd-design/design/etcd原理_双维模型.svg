<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="620" viewBox="0 0 1080 620" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter></defs>
  <rect width="1080" height="620" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">双维模型：能力域 × 执行时机 —— 9 条主线归位</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">横轴=能力域（接口/共识/存储/协调/保障）· 纵轴=执行时机（前台请求路径 vs 后台守护循环）</text>
  <!-- axis labels -->
  <text x="40" y="86" font-size="11" font-weight="700" fill="#48484c">前台 · 请求路径（同步）</text>
  <text x="40" y="366" font-size="11" font-weight="700" fill="#48484c">后台 · 守护循环（异步）</text>
  <!-- column headers -->
  <g font-size="10" font-weight="700" text-anchor="middle">
    <text x="150" y="108" fill="#3d2a5a">接口面</text>
    <text x="355" y="108" fill="#1b2a4a">共识底座</text>
    <text x="560" y="108" fill="#5a3410">存储引擎</text>
    <text x="765" y="108" fill="#12402a">协调能力</text>
    <text x="965" y="108" fill="#7a2230">保障</text>
  </g>
  <!-- front row cards -->
  <g text-anchor="middle">
    <rect x="55" y="120" width="190" height="220" rx="12" fill="#f6f2fb" stroke="#d9c9ec" filter="url(#soft)"/>
    <text x="150" y="146" font-size="11" font-weight="700" fill="#3d2a5a">gRPC API 族</text>
    <text x="150" y="168" font-size="8.5" fill="#7a5da5">KV/Range/Put/Txn</text>
    <text x="150" y="184" font-size="8.5" fill="#7a5da5">Watch · Lease</text>
    <text x="150" y="200" font-size="8.5" fill="#7a5da5">Cluster · Auth</text>
    <text x="150" y="216" font-size="8.5" fill="#7a5da5">Maintenance</text>
    <text x="150" y="238" font-size="8" fill="#9a7cc4">拦截器链</text>
    <text x="150" y="254" font-size="8" fill="#9a7cc4">认证/配额/校验</text>

    <rect x="260" y="120" width="190" height="220" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="355" y="146" font-size="11" font-weight="700" fill="#1b2a4a">Raft 共识 ★灵魂</text>
    <text x="355" y="168" font-size="8.5" fill="#5b7db1">propose → 复制</text>
    <text x="355" y="184" font-size="8.5" fill="#5b7db1">→ commit → apply</text>
    <text x="355" y="204" font-size="8" fill="#8aa6cf">前台：写请求提 propose</text>

    <rect x="465" y="120" width="190" height="220" rx="12" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
    <text x="560" y="146" font-size="11" font-weight="700" fill="#5a3410">MVCC 存储</text>
    <text x="560" y="168" font-size="8.5" fill="#93762e">revision 多版本</text>
    <text x="560" y="184" font-size="8.5" fill="#93762e">treeIndex 内存索引</text>
    <text x="560" y="204" font-size="8" fill="#b08843">backend(boltdb) 落盘</text>
    <text x="560" y="220" font-size="8" fill="#b08843">前台：Range 本地读</text>

    <rect x="670" y="120" width="190" height="220" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
    <text x="765" y="146" font-size="11" font-weight="700" fill="#12402a">Watch / Lease</text>
    <text x="765" y="168" font-size="8.5" fill="#2f6f4f">Watch 建流/收发</text>
    <text x="765" y="184" font-size="8.5" fill="#2f6f4f">Lease Grant/KeepAlive</text>
    <text x="765" y="204" font-size="8" fill="#4c8567">前台：建立监听/续租</text>

    <rect x="875" y="120" width="180" height="220" rx="12" fill="#fbeef0" stroke="#f0cdd4" filter="url(#soft)"/>
    <text x="965" y="146" font-size="11" font-weight="700" fill="#7a2230">线性一致读</text>
    <text x="965" y="168" font-size="8.5" fill="#a44">ReadIndex</text>
    <text x="965" y="184" font-size="8.5" fill="#a44">等 apply 追上</text>
    <text x="965" y="204" font-size="8" fill="#7a2230">前台：读也过多数派</text>
    <text x="965" y="224" font-size="8" fill="#7a2230">认证鉴权(RBAC)</text>
  </g>
  <!-- divider -->
  <line x1="40" y1="356" x2="1055" y2="356" stroke="#e0e0e4" stroke-dasharray="4 3"/>
  <!-- back row cards -->
  <g text-anchor="middle">
    <rect x="260" y="378" width="190" height="200" rx="12" fill="#eef3fb" stroke="#bcd0ec"/>
    <text x="355" y="404" font-size="10.5" font-weight="700" fill="#1b2a4a">Raft 后台</text>
    <text x="355" y="426" font-size="8.5" fill="#5b7db1">tick 选举/心跳</text>
    <text x="355" y="442" font-size="8.5" fill="#5b7db1">Ready 循环</text>
    <text x="355" y="458" font-size="8" fill="#8aa6cf">日志复制/leader 维持</text>

    <rect x="465" y="378" width="190" height="200" rx="12" fill="#fdf6ea" stroke="#efdcb4"/>
    <text x="560" y="404" font-size="10.5" font-weight="700" fill="#5a3410">存储后台</text>
    <text x="560" y="426" font-size="8.5" fill="#93762e">compaction 清旧版本</text>
    <text x="560" y="442" font-size="8.5" fill="#93762e">defrag 碎片整理</text>
    <text x="560" y="458" font-size="8" fill="#b08843">batch commit 刷盘</text>

    <rect x="670" y="378" width="190" height="200" rx="12" fill="#eafaf1" stroke="#bfe0cd"/>
    <text x="765" y="404" font-size="10.5" font-weight="700" fill="#12402a">协调后台</text>
    <text x="765" y="426" font-size="8.5" fill="#2f6f4f">Watch 同步循环(100ms)</text>
    <text x="765" y="442" font-size="8.5" fill="#2f6f4f">Lease 过期扫描</text>
    <text x="765" y="458" font-size="8" fill="#4c8567">leader 撤销过期租约</text>

    <rect x="875" y="378" width="180" height="200" rx="12" fill="#fdf9f0" stroke="#efe3cd"/>
    <text x="965" y="404" font-size="10.5" font-weight="700" fill="#7a5a1e">保障后台</text>
    <text x="965" y="426" font-size="8.5" fill="#93762e">WAL 落盘 + 快照</text>
    <text x="965" y="442" font-size="8.5" fill="#93762e">崩溃恢复回放</text>
    <text x="965" y="458" font-size="8" fill="#b08843">成员 ConfChange</text>
    <text x="965" y="474" font-size="8" fill="#b08843">corrupt 检测</text>
  </g>
  <text x="150" y="470" font-size="9" fill="#a1a1a6" text-anchor="middle">（接口面无独立后台）</text>
  <rect x="40" y="592" width="1015" height="20" fill="none"/>
  <text x="40" y="606" font-size="9.5" fill="#86868b">灵魂主线 = Raft 共识：它把"单机 KV"变成"线性一致的分布式 KV"，前台提议 + 后台复制，贯穿所有写路径。</text>
</svg>
