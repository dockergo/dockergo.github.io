<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">快照：状态全量 + 压缩 WAL（与 Raft 快照同源）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">server.go: snapshotIfNeeded…(:1204) shouldSnapshotToDisk(:1215,snapshot-count=10000@:78) snapshot(:2072) · snapshotter.go SaveSnap(:70)</text>
  <g text-anchor="middle">
    <rect x="40" y="80" width="230" height="80" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="155" y="104" font-size="10" font-weight="700" fill="#1b2a4a">触发条件</text><text x="155" y="124" font-size="8.5" fill="#5b7db1">已 apply 条目数超</text><text x="155" y="140" font-size="8.5" fill="#5b7db1">snapshot-count=10000</text><text x="155" y="154" font-size="7.5" fill="#8aa6cf">shouldSnapshotToDisk</text>
    <rect x="300" y="80" width="230" height="80" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/><text x="415" y="102" font-size="10" font-weight="700" fill="#5a3410">① boltdb 一致提交</text><text x="415" y="122" font-size="8.5" fill="#93762e">s.KV().Commit()</text><text x="415" y="138" font-size="8.5" fill="#b08843">db = 某 revision 完整状态</text><text x="415" y="152" font-size="7.5" fill="#b08843">server.go:2094</text>
    <rect x="560" y="80" width="230" height="80" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="675" y="102" font-size="10" font-weight="700" fill="#12402a">② 记 Raft 快照元</text><text x="675" y="122" font-size="8.5" fill="#2f6f4f">CreateSnapshot(:2098)</text><text x="675" y="138" font-size="8.5" fill="#4c8567">记 index/term/confState</text>
    <rect x="820" y="80" width="220" height="80" rx="11" fill="#f6f2fb" stroke="#d9c9ec" filter="url(#soft)"/><text x="930" y="102" font-size="10" font-weight="700" fill="#3d2a5a">③ 存快照文件</text><text x="930" y="122" font-size="8.5" fill="#7a5da5">SaveSnap(:2114)</text><text x="930" y="138" font-size="8.5" fill="#9a7cc4">%016x-%016x.snap + CRC</text><text x="930" y="152" font-size="7.5" fill="#9a7cc4">api/snap:70</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <line x1="270" y1="120" x2="300" y2="120" marker-end="url(#ar)"/>
    <line x1="530" y1="120" x2="560" y2="120" marker-end="url(#ar)"/>
    <line x1="790" y1="120" x2="820" y2="120" marker-end="url(#ar)"/>
  </g>
  <!-- compact after -->
  <rect x="300" y="176" width="490" height="50" rx="10" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="545" y="196" font-size="10" font-weight="700" fill="#5a3410" text-anchor="middle">④ compactRaftLog（:1213）：压缩快照点之前的 Raft 日志</text>
  <text x="545" y="214" font-size="8" fill="#b08843" text-anchor="middle">日志占用回落，落后 follower 改收快照追平</text>
  <line x1="675" y1="160" x2="620" y2="176" stroke="#c7c7cc" stroke-width="1.3" fill="none" marker-end="url(#ar)"/>
  <rect x="40" y="244" width="1000" height="110" rx="12" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="268" font-size="11" font-weight="700" fill="#274a78">快照与 WAL 的互补（时间轴视角）</text>
  <line x1="80" y1="308" x2="1000" y2="308" stroke="#c7c7cc" stroke-width="1.3"/>
  <g font-size="8" text-anchor="middle">
    <rect x="120" y="292" width="140" height="32" rx="5" fill="#eafaf1" stroke="#bfe0cd"/><text x="190" y="312" fill="#12402a">快照@rev10000（全量）</text>
    <rect x="300" y="292" width="380" height="32" rx="5" fill="#fdf6ea" stroke="#efdcb4"/><text x="490" y="312" fill="#5a3410">WAL：rev10001..15000（增量操作）</text>
    <rect x="720" y="292" width="180" height="32" rx="5" fill="#eafaf1" stroke="#bfe0cd"/><text x="810" y="312" fill="#12402a">下一快照@rev20000</text>
  </g>
  <text x="60" y="344" font-size="9" fill="#8aa6cf">快照 = 状态全量的一致副本；WAL = 两次快照之间的增量操作。缺 WAL 会丢最近写——快照替代不了 WAL。</text>
  <rect x="40" y="370" width="1000" height="56" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="394" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="416" font-size="10" fill="#4b4b50">每积累 10000 条已应用条目做快照：boltdb 一致提交（状态全量）+ 记 Raft 快照元 + 存 .snap 文件，随后压缩快照点前的日志——快照(全量)与 WAL(增量)互补，共撑恢复。</text>
</svg>
