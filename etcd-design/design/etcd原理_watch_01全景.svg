<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Watch 全景：KV 变更 → 按 revision 有序的可订阅事件流</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">watchableStore(:56) 包住 store，写后 notify 分发；可从历史 revision watch（未 compact 则不丢）· k8s list-watch 基石</text>
  <g text-anchor="middle">
    <rect x="40" y="80" width="200" height="70" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/><text x="140" y="106" font-size="10" font-weight="700" fill="#5a3410">写发生（Put/Delete）</text><text x="140" y="126" font-size="8" fill="#93762e">MVCC bump revision</text><text x="140" y="140" font-size="8" fill="#b08843">产生变更事件</text>
    <rect x="290" y="80" width="220" height="70" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="400" y="104" font-size="10" font-weight="700" fill="#12402a">watchableStore.notify</text><text x="400" y="124" font-size="8" fill="#2f6f4f">找匹配的 watcher</text><text x="400" y="138" font-size="8" fill="#4c8567">按 key 范围 + minRev 过滤</text>
    <rect x="560" y="80" width="220" height="70" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="670" y="104" font-size="10" font-weight="700" fill="#1b2a4a">事件进 watcher channel</text><text x="670" y="124" font-size="8" fill="#5b7db1">PUT / DELETE 事件</text><text x="670" y="138" font-size="8" fill="#8aa6cf">带 revision，有序</text>
    <rect x="830" y="80" width="210" height="70" rx="11" fill="#f6f2fb" stroke="#d9c9ec" filter="url(#soft)"/><text x="935" y="104" font-size="10" font-weight="700" fill="#3d2a5a">gRPC 流推给 client</text><text x="935" y="124" font-size="8" fill="#7a5da5">一条流多路复用</text><text x="935" y="138" font-size="8" fill="#9a7cc4">watchId 区分</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <line x1="240" y1="115" x2="290" y2="115" marker-end="url(#ar)"/>
    <line x1="510" y1="115" x2="560" y2="115" marker-end="url(#ar)"/>
    <line x1="780" y1="115" x2="830" y2="115" marker-end="url(#ar)"/>
  </g>
  <rect x="40" y="180" width="490" height="150" rx="12" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="204" font-size="11" font-weight="700" fill="#274a78">核心能力：不丢事件（可从历史 revision 起）</text>
  <text x="60" y="228" font-size="9.5" fill="#5b7db1">· watch(key, startRev)：从指定 revision 开始推</text>
  <text x="60" y="248" font-size="9.5" fill="#5b7db1">· 断连重连：从"上次收到的 revision+1"续订 → 补齐断连期间变更</text>
  <text x="60" y="268" font-size="9.5" fill="#5b7db1">· 前提：startRev 未被 compact（否则 ErrCompacted）</text>
  <text x="60" y="290" font-size="9" fill="#8aa6cf">· 靠 MVCC 多版本历史 + revision 有序实现"精确重放"</text>
  <text x="60" y="310" font-size="9" fill="#8aa6cf">· 这正是 MVCC 篇说的"Watch 精确重放"能力落地</text>
  <rect x="550" y="180" width="490" height="150" rx="12" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="570" y="204" font-size="11" font-weight="700" fill="#7a5a1e">k8s list-watch 为例</text>
  <text x="570" y="228" font-size="9.5" fill="#93762e">· ① List：拿当前全量 + 当时的 revision R</text>
  <text x="570" y="248" font-size="9.5" fill="#93762e">· ② Watch(from=R+1)：只收 R 之后的增量变更</text>
  <text x="570" y="268" font-size="9.5" fill="#93762e">· controller 据此维护本地 cache、驱动 reconcile</text>
  <text x="570" y="290" font-size="9" fill="#b08843">· etcd 的 Watch 是整个 k8s 事件驱动模型的地基</text>
  <text x="570" y="310" font-size="9" fill="#b08843">· watch 健康 = 控制面灵敏；watch 卡 = 控制面失灵</text>
  <rect x="40" y="344" width="1000" height="70" rx="12" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="368" font-size="11" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="60" y="390" font-size="10" fill="#4b4b50">Watch 让客户端订阅 key/范围的变更，服务端写后 notify、按 key 范围+minRev 过滤后经 gRPC 流按 revision 有序推送；</text>
  <text x="60" y="408" font-size="10" fill="#4b4b50">可从历史 revision 起、断连能补齐（未 compact 则不丢）——是 k8s list-watch 与一切事件驱动协调的基石。</text>
</svg>
