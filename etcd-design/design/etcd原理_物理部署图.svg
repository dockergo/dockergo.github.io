<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">物理部署图：3 节点集群（每成员全量副本，Raft 互联）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">quorum = N/2+1 = 2 · 容忍 1 节点故障 · 不分片，每节点存全量数据</text>
  <!-- clients -->
  <rect x="440" y="72" width="200" height="44" rx="10" fill="#f6f2fb" stroke="#d9c9ec" filter="url(#soft)"/>
  <text x="540" y="98" font-size="10" font-weight="700" fill="#3d2a5a" text-anchor="middle">clients（k8s apiserver / etcdctl）</text>
  <!-- 3 nodes -->
  <g>
    <rect x="80" y="180" width="280" height="300" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="220" y="204" font-size="11.5" font-weight="700" fill="#1b2a4a" text-anchor="middle">节点 A （Leader）</text>
    <rect x="100" y="216" width="240" height="30" rx="7" fill="#e9f1fb" stroke="#c4d8f0"/><text x="220" y="236" font-size="9" fill="#1b2a4a" text-anchor="middle">gRPC 服务 + 拦截器</text>
    <rect x="100" y="252" width="240" height="30" rx="7" fill="#dce9fa" stroke="#c4d8f0"/><text x="220" y="272" font-size="9" font-weight="600" fill="#1b2a4a" text-anchor="middle">Raft（leader：定序/复制）</text>
    <rect x="100" y="288" width="240" height="30" rx="7" fill="#fdf6ea" stroke="#efdcb4"/><text x="220" y="308" font-size="9" fill="#5a3410" text-anchor="middle">WAL（预写日志，本地盘）</text>
    <rect x="100" y="324" width="240" height="40" rx="7" fill="#fdf6ea" stroke="#efdcb4"/><text x="220" y="342" font-size="9" fill="#5a3410" text-anchor="middle">MVCC + boltdb</text><text x="220" y="356" font-size="7.5" fill="#b08843" text-anchor="middle">全量数据（≤ 2GB 配额）</text>
    <rect x="100" y="370" width="240" height="28" rx="7" fill="#eafaf1" stroke="#bfe0cd"/><text x="220" y="389" font-size="8.5" fill="#12402a" text-anchor="middle">快照 snapshot（周期）</text>
  </g>
  <g>
    <rect x="400" y="200" width="280" height="280" rx="14" fill="#f7f7f9" stroke="#e0e0e4" filter="url(#soft)"/>
    <text x="540" y="224" font-size="11.5" font-weight="700" fill="#48484c" text-anchor="middle">节点 B （Follower）</text>
    <rect x="420" y="236" width="240" height="30" rx="7" fill="#f2f2f4" stroke="#e0e0e4"/><text x="540" y="256" font-size="9" fill="#48484c" text-anchor="middle">gRPC（可转发/服务本地读）</text>
    <rect x="420" y="272" width="240" height="30" rx="7" fill="#eeeef0" stroke="#e0e0e4"/><text x="540" y="292" font-size="9" font-weight="600" fill="#48484c" text-anchor="middle">Raft（follower：收 MsgApp）</text>
    <rect x="420" y="308" width="240" height="30" rx="7" fill="#faf6ee" stroke="#eadfc8"/><text x="540" y="328" font-size="9" fill="#7a5a1e" text-anchor="middle">WAL</text>
    <rect x="420" y="344" width="240" height="40" rx="7" fill="#faf6ee" stroke="#eadfc8"/><text x="540" y="362" font-size="9" fill="#7a5a1e" text-anchor="middle">MVCC + boltdb</text><text x="540" y="376" font-size="7.5" fill="#a98a4a" text-anchor="middle">全量副本（与 A 一致）</text>
  </g>
  <g>
    <rect x="720" y="200" width="280" height="280" rx="14" fill="#f7f7f9" stroke="#e0e0e4" filter="url(#soft)"/>
    <text x="860" y="224" font-size="11.5" font-weight="700" fill="#48484c" text-anchor="middle">节点 C （Follower）</text>
    <rect x="740" y="236" width="240" height="30" rx="7" fill="#f2f2f4" stroke="#e0e0e4"/><text x="860" y="256" font-size="9" fill="#48484c" text-anchor="middle">gRPC</text>
    <rect x="740" y="272" width="240" height="30" rx="7" fill="#eeeef0" stroke="#e0e0e4"/><text x="860" y="292" font-size="9" font-weight="600" fill="#48484c" text-anchor="middle">Raft（follower）</text>
    <rect x="740" y="308" width="240" height="30" rx="7" fill="#faf6ee" stroke="#eadfc8"/><text x="860" y="328" font-size="9" fill="#7a5a1e" text-anchor="middle">WAL</text>
    <rect x="740" y="344" width="240" height="40" rx="7" fill="#faf6ee" stroke="#eadfc8"/><text x="860" y="362" font-size="9" fill="#7a5a1e" text-anchor="middle">MVCC + boltdb</text><text x="860" y="376" font-size="7.5" fill="#a98a4a" text-anchor="middle">全量副本</text>
  </g>
  <!-- client to leader -->
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none"><line x1="500" y1="116" x2="260" y2="180" marker-end="url(#ar)"/></g>
  <text x="350" y="150" font-size="8" fill="#a1a1a6">写全定向 leader</text>
  <!-- raft links -->
  <g stroke="#5b7db1" stroke-width="1.5" fill="none" stroke-dasharray="5 3">
    <line x1="360" y1="300" x2="400" y2="300" marker-end="url(#ar)"/>
    <path d="M360,320 Q540,150 720,300" marker-end="url(#ar)"/>
  </g>
  <text x="365" y="292" font-size="8" fill="#5b7db1">MsgApp/ack</text>
  <text x="540" y="185" font-size="8" fill="#5b7db1" text-anchor="middle">Raft peer 互联（复制日志 + 心跳）</text>
  <rect x="80" y="500" width="920" height="46" rx="10" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="100" y="520" font-size="9.5" fill="#48484c">· 写：leader 定序 → 复制到多数派（含自己共 2/3）→ commit → 三节点各自 apply。leader 挂 → Raft 选新 leader，已 commit 数据不丢。</text>
  <text x="100" y="537" font-size="9.5" fill="#48484c">· 读：线性读经 leader 的 ReadIndex；串行读可由任意 follower 本地服务（可能读到略旧数据）。奇数节点：4 节点 quorum=3 仍只容忍 1，无收益。</text>
</svg>
