<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">lease checkpoint：leader 切换不重置剩余 TTL</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">lessor.go: checkpointInterval 默认 5min(:52) · Checkpoint(:367)/scheduleCheckpointIfNeeded(:753) · Promote(:480)/Demote(:534)</text>
  <!-- problem -->
  <rect x="40" y="76" width="490" height="150" rx="12" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="60" y="100" font-size="11" font-weight="700" fill="#7a2230">问题：无 checkpoint 时 leader 切换</text>
  <text x="60" y="124" font-size="9.5" fill="#a44">· lease TTL=100s，已续租到剩 10s</text>
  <text x="60" y="144" font-size="9.5" fill="#a44">· leader 挂 → 选出新 leader</text>
  <text x="60" y="164" font-size="9.5" fill="#a44">· 新 leader 内存没有"剩余 10s"信息</text>
  <text x="60" y="184" font-size="9.5" fill="#a44">· → 从头计时，当作剩 100s</text>
  <text x="60" y="206" font-size="9" fill="#7a2230">后果：该 10s 后过期的 lease 又续命 100s，迟迟不删</text>
  <!-- solution -->
  <rect x="550" y="76" width="490" height="150" rx="12" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="570" y="100" font-size="11" font-weight="700" fill="#12402a">解法：周期 checkpoint 剩余 TTL</text>
  <text x="570" y="124" font-size="9.5" fill="#2f6f4f">· leader 每 5min 把各 lease 剩余 TTL</text>
  <text x="570" y="144" font-size="9.5" fill="#2f6f4f">  通过 Raft 持久化（Checkpoint 走日志）</text>
  <text x="570" y="164" font-size="9.5" fill="#2f6f4f">· 复制到所有节点 → 新 leader 能读到</text>
  <text x="570" y="184" font-size="9.5" fill="#2f6f4f">· 切换后从 checkpoint 恢复剩余 TTL</text>
  <text x="570" y="206" font-size="9" fill="#4c8567">→ 不从头计时，短 lease 该过期就过期</text>
  <!-- role transition -->
  <rect x="40" y="248" width="1000" height="110" rx="12" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="272" font-size="11" font-weight="700" fill="#274a78">主从角色转换（Promote / Demote）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="70" y="288" width="280" height="50" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="210" y="308" font-weight="600" fill="#1b2a4a">Promote（:480）成为 leader 时</text><text x="210" y="325" fill="#5b7db1">接管 lease 到期管理、开始撤销过期租约</text>
    <rect x="380" y="288" width="280" height="50" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="520" y="308" font-weight="600" fill="#5a3410">Demote（:534）退位时</text><text x="520" y="325" fill="#93762e">停止撤销（不再是 primary），交给新 leader</text>
    <rect x="690" y="288" width="330" height="50" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="855" y="308" font-weight="600" fill="#12402a">只有 primary(leader) 撤销过期</text><text x="855" y="325" fill="#2f6f4f">保证同一时刻只有一个节点在删 → 不冲突</text>
  </g>
  <rect x="40" y="372" width="1000" height="70" rx="12" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="60" y="396" font-size="11" font-weight="700" fill="#7a5a1e">工程要点</text>
  <text x="60" y="418" font-size="9.5" fill="#93762e">· 频繁 leader 切换 + 短 TTL lease + 无 checkpoint = lease 反复续命、内存/key 堆积不释放</text>
  <text x="60" y="436" font-size="9" fill="#b08843">· 生产建议开 checkpoint；切换频繁可调小 checkpoint interval（默认 5min）</text>
  <rect x="40" y="456" width="1000" height="38" rx="10" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="480" font-size="10" fill="#4b4b50"><tspan font-weight="700" fill="#1d1d1f">一句话：</tspan>leader 每 5min 经 Raft 持久化各 lease 剩余 TTL，切换后新 leader 从 checkpoint 恢复而非从头计时；仅 primary 撤销过期，Promote/Demote 管角色转换。</text>
</svg>
