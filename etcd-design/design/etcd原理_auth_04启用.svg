<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="490" viewBox="0 0 1080 490" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="490" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">auth 启用顺序 + 最小权限 + TLS 正交</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">必须先建 root 再 AuthEnable（防死锁）· auth 管授权、TLS 管传输，两者互补</text>
  <g text-anchor="middle">
    <rect x="60" y="80" width="280" height="80" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="200" y="104" font-size="10" font-weight="700" fill="#12402a">① 先建 root user + role</text><text x="200" y="126" font-size="8.5" fill="#2f6f4f">UserAdd root → 授 root role</text><text x="200" y="144" font-size="8" fill="#4c8567">必须先有管理员</text>
    <rect x="400" y="80" width="280" height="80" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="540" y="104" font-size="10" font-weight="700" fill="#1b2a4a">② AuthEnable 开启</text><text x="540" y="126" font-size="8.5" fill="#5b7db1">检查 root 存在才允许</text><text x="540" y="144" font-size="8" fill="#8aa6cf">否则报错（防死锁）</text>
    <rect x="740" y="80" width="280" height="80" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/><text x="880" y="104" font-size="10" font-weight="700" fill="#5a3410">③ 此后需认证</text><text x="880" y="126" font-size="8.5" fill="#93762e">所有请求带 token</text><text x="880" y="144" font-size="8" fill="#b08843">管理操作需 root</text>
  </g>
  <g stroke="#c7c7cc" stroke-width="1.4" fill="none">
    <line x1="340" y1="120" x2="400" y2="120" marker-end="url(#ar)"/>
    <line x1="680" y1="120" x2="740" y2="120" marker-end="url(#ar)"/>
  </g>
  <rect x="40" y="188" width="490" height="140" rx="12" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="60" y="212" font-size="11" font-weight="700" fill="#7a2230">为什么必须先建 root（防死锁）</text>
  <text x="60" y="236" font-size="9.5" fill="#a44">· AuthEnable 会检查 root 是否存在</text>
  <text x="60" y="256" font-size="9.5" fill="#a44">· 若没 root 就开认证 → 所有请求需认证</text>
  <text x="60" y="276" font-size="9.5" fill="#a44">· 但没有管理员能管理 user/role → 死锁</text>
  <text x="60" y="298" font-size="9" fill="#7a2230">· etcd 拒绝"无 root 时 AuthEnable"，从源头防止</text>
  <text x="60" y="318" font-size="8.5" fill="#a44">· 顺序反了（先 enable）会被直接拒绝</text>
  <rect x="550" y="188" width="490" height="140" rx="12" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="570" y="212" font-size="11" font-weight="700" fill="#274a78">最小权限 + TLS 正交</text>
  <text x="570" y="236" font-size="9.5" fill="#5b7db1">· 每应用建专用 user+role，只授需要的 key range</text>
  <text x="585" y="254" font-size="8.5" fill="#8aa6cf">如 apiserver user 只授 /registry/ 前缀 rw</text>
  <text x="570" y="274" font-size="9.5" fill="#5b7db1">· 别都用 root——一个 key 泄漏=全库沦陷</text>
  <text x="570" y="294" font-size="9.5" fill="#5b7db1">· TLS 与 auth 互补（正交，都要）：</text>
  <text x="585" y="312" font-size="8.5" fill="#8aa6cf">TLS=传输加密+证书认证；auth=RBAC 授权</text>
  <rect x="40" y="348" width="1000" height="80" rx="12" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="60" y="372" font-size="11" font-weight="700" fill="#7a5a1e">生产安全基线</text>
  <text x="60" y="394" font-size="9.5" fill="#93762e">· 启用 auth（RBAC 授权）+ TLS（--cert-file/--key-file/--client-cert-auth/--trusted-ca-file，传输加密+双向证书）</text>
  <text x="60" y="412" font-size="9" fill="#b08843">· auth 关闭 = 任何能连的客户端可读写全部数据；仅 TLS 无 auth = 能加密但不控"谁能读写哪些 key"。两者缺一不可。</text>
  <rect x="40" y="440" width="1000" height="40" rx="10" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="465" font-size="10" fill="#4b4b50"><tspan font-weight="700" fill="#1d1d1f">一句话：</tspan>启用 auth 须先建 root 再 AuthEnable（防"无管理员"死锁）；按应用分 user+role+范围行最小权限；生产必须 auth（授权）+ TLS（传输）并存。</text>
</svg>
