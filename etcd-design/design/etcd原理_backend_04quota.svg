<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">quota 与 db 空间：超限转只读，膨胀多因未清理</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">quota.go: DefaultQuotaBytes=2GB(:30) · MaxQuotaBytes=8GB(:33) · NOSPACE alarm(server.go:1970) → 集群只读</text>
  <!-- db composition -->
  <rect x="40" y="80" width="500" height="180" rx="12" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="290" y="104" font-size="11" font-weight="700" fill="#5a3410" text-anchor="middle">db 文件大小 = 有效数据 + 三类"虚胖"</text>
  <g font-size="9">
    <rect x="60" y="118" width="460" height="26" rx="5" fill="#eafaf1" stroke="#bfe0cd"/><text x="70" y="135" fill="#12402a">✓ 有效数据：每个 key 的最新版本</text>
    <rect x="60" y="148" width="460" height="26" rx="5" fill="#fdeef0" stroke="#f0cdd4"/><text x="70" y="165" fill="#a44">✗ 未 compact 的历史版本（旧 revision）</text>
    <rect x="60" y="178" width="460" height="26" rx="5" fill="#fdeef0" stroke="#f0cdd4"/><text x="70" y="195" fill="#a44">✗ 已 compact 但未 defrag 的空闲页（不还 OS）</text>
    <rect x="60" y="208" width="460" height="26" rx="5" fill="#fdeef0" stroke="#f0cdd4"/><text x="70" y="225" fill="#a44">✗ bbolt B+树内部碎片</text>
  </g>
  <text x="290" y="252" font-size="8" fill="#b08843" text-anchor="middle">db 涨到配额，多半是这三类而非真有那么多数据</text>
  <!-- alarm flow -->
  <rect x="560" y="80" width="480" height="180" rx="12" fill="#fbeef0" stroke="#f0cdd4" filter="url(#soft)"/>
  <text x="800" y="104" font-size="11" font-weight="700" fill="#7a2230" text-anchor="middle">超配额 → NOSPACE → 只读保护</text>
  <text x="580" y="128" font-size="9" fill="#a44">· db &gt; quota-backend-bytes（默认 2GB）</text>
  <text x="580" y="148" font-size="9" fill="#a44">· 触发 AlarmType_NOSPACE（server.go:1970）</text>
  <text x="580" y="168" font-size="9" fill="#a44">· 集群拒绝所有写、转入只读</text>
  <text x="580" y="190" font-size="8.5" fill="#7a2230">· 保护意图：避免磁盘真写满导致彻底不可用</text>
  <text x="580" y="212" font-size="8.5" fill="#7a2230">· k8s 场景：apiserver 写 etcd 全失败，影响面大</text>
  <text x="580" y="234" font-size="8" fill="#a44">恢复：compact → defrag → alarm disarm</text>
  <rect x="40" y="280" width="1000" height="110" rx="12" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="304" font-size="11" font-weight="700" fill="#274a78">恢复 NOSPACE 的标准三步</text>
  <text x="60" y="326" font-size="9.5" fill="#5b7db1">① compact 到当前 revision（清历史版本）→ ② defrag 逐节点（缩文件、还页给 OS）→ ③ alarm disarm（解除只读）</text>
  <text x="60" y="346" font-size="9.5" fill="#5b7db1">· 常见误区：直接调大 quota——治标，大 db 让快照/启动/读写全变慢，且更难 defrag</text>
  <text x="60" y="366" font-size="9" fill="#8aa6cf">· 根治：开 --auto-compaction（默认关！）+ 周期性滚动 defrag，让 db 常态维持在小尺寸</text>
  <rect x="40" y="404" width="1000" height="70" rx="12" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="60" y="428" font-size="11" font-weight="700" fill="#7a5a1e">配额怎么设</text>
  <text x="60" y="450" font-size="9.5" fill="#93762e">· 默认 2GB 对多数场景够用；最大 8GB。db 越大一切越慢——etcd 存关键元数据，控制在 GB 级才健康</text>
  <text x="60" y="468" font-size="9" fill="#b08843">· 监控 etcd_mvcc_db_total_size_in_bytes（物理）与 ..._in_use_bytes（逻辑），差距大 = 该 defrag 了</text>
</svg>
