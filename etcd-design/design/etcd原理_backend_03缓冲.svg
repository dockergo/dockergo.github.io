<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">读写缓冲：读不必等磁盘、读写互不阻塞</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">read_tx.go: UnsafeRange 先查 buffer(:78/:91) · tx_buffer.go: writeback(:96)/unsafeCopy(:140)</text>
  <!-- write buffer -->
  <rect x="40" y="80" width="300" height="150" rx="12" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="190" y="104" font-size="10.5" font-weight="700" fill="#5a3410" text-anchor="middle">写缓冲（txWriteBuffer）</text>
  <text x="60" y="128" font-size="9" fill="#93762e">· batchTx 的写先进内存 buffer</text>
  <text x="60" y="148" font-size="9" fill="#93762e">· 不立即进 bbolt</text>
  <text x="60" y="168" font-size="9" fill="#93762e">· commit 时 writeback：</text>
  <text x="75" y="186" font-size="8.5" fill="#b08843">合并进读缓冲 + bump bufVersion</text>
  <text x="60" y="208" font-size="8.5" fill="#b08843">让刚写的数据立即对读可见</text>
  <!-- read buffer -->
  <rect x="380" y="80" width="300" height="150" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="530" y="104" font-size="10.5" font-weight="700" fill="#1b2a4a" text-anchor="middle">读缓冲（readTx buffer）</text>
  <text x="400" y="128" font-size="9" fill="#5b7db1">· UnsafeRange 先查 buffer</text>
  <text x="400" y="148" font-size="9" fill="#5b7db1">· 命中 → 直接返回（不触盘）</text>
  <text x="400" y="168" font-size="9" fill="#5b7db1">· 缺的部分才落 bbolt 读</text>
  <text x="400" y="190" font-size="8.5" fill="#8aa6cf">热数据读命中内存</text>
  <text x="400" y="208" font-size="8.5" fill="#8aa6cf">大幅减少磁盘 IO</text>
  <!-- concurrent read -->
  <rect x="720" y="80" width="320" height="150" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="880" y="104" font-size="10.5" font-weight="700" fill="#12402a" text-anchor="middle">并发读快照（concurrentReadTx）</text>
  <text x="740" y="128" font-size="9" fill="#2f6f4f">· unsafeCopy 拿 buffer 快照</text>
  <text x="740" y="148" font-size="9" fill="#2f6f4f">· 多个读并发、互不阻塞</text>
  <text x="740" y="168" font-size="9" fill="#2f6f4f">· 也不被写事务阻塞</text>
  <text x="740" y="190" font-size="8.5" fill="#4c8567">写批量落盘时，读用旧快照照常服务</text>
  <text x="740" y="208" font-size="8.5" fill="#4c8567">读写彻底解耦</text>
  <g stroke="#c7c7cc" stroke-width="1.3" fill="none">
    <line x1="340" y1="155" x2="380" y2="155" marker-end="url(#ar)"/>
  </g>
  <text x="360" y="147" font-size="7.5" fill="#a1a1a6" text-anchor="middle">writeback</text>
  <rect x="40" y="256" width="1000" height="110" rx="12" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="280" font-size="11" font-weight="700" fill="#274a78">为什么要双缓冲</text>
  <text x="60" y="302" font-size="9.5" fill="#5b7db1">· bbolt 读写事务会互斥——若读直接开 bbolt 读事务，会与写 commit 争锁、互相阻塞</text>
  <text x="60" y="322" font-size="9.5" fill="#5b7db1">· etcd 让读走内存 buffer 快照：写批量 commit 期间，读拿的是上一版本快照，不等锁、不触盘</text>
  <text x="60" y="342" font-size="9" fill="#8aa6cf">· 结果：读延迟稳定（不受写批量落盘抖动影响），热读几乎零磁盘 IO——这是 etcd 读快的关键</text>
  <rect x="40" y="380" width="1000" height="90" rx="12" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="60" y="404" font-size="11" font-weight="700" fill="#7a2230">仍会慢的情况</text>
  <text x="60" y="426" font-size="9.5" fill="#a44">· 大范围冷扫描：buffer 未命中，落到 bbolt B+树遍历 + 慢盘 → 慢</text>
  <text x="60" y="444" font-size="9.5" fill="#a44">· db 巨大：B+树深、mmap 页多，即使命中也慢；根治靠 compact+defrag 控 db 大小</text>
  <text x="60" y="462" font-size="9" fill="#7a2230">一句话：读先查内存双缓冲、命中不触盘且不被写阻塞，读写解耦——这是 etcd 读延迟稳定的关键。</text>
</svg>
