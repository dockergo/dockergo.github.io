<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker></defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">consistentIndex：apply 幂等，防重启重复应用</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">cindex/cindex.go:55 · UnsafeSave(:117) → Meta bucket consistent_index(schema/cindex.go:89) · 与数据同事务</text>
  <!-- problem -->
  <rect x="40" y="76" width="480" height="120" rx="12" fill="#fbeef0" stroke="#f0cdd4"/>
  <text x="60" y="100" font-size="11" font-weight="700" fill="#7a2230">问题：apply 后 crash 会重复吗？</text>
  <text x="60" y="122" font-size="9.5" fill="#a44">· Raft 条目 apply（改 MVCC）后、还没记"apply 到哪"就 crash</text>
  <text x="60" y="142" font-size="9.5" fill="#a44">· 重启回放 WAL/快照后的日志 → 同一条目又 apply 一次</text>
  <text x="60" y="162" font-size="9.5" fill="#a44">· 若不防护：Put 执行两次、计数器加两次 → 状态错乱</text>
  <text x="60" y="182" font-size="9" fill="#7a2230">apply 必须幂等：重复应用同一条目结果不变</text>
  <!-- solution -->
  <rect x="560" y="76" width="480" height="120" rx="12" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="580" y="100" font-size="11" font-weight="700" fill="#12402a">解法：consistentIndex 与数据同事务</text>
  <text x="580" y="122" font-size="9.5" fill="#2f6f4f">· 每次 apply 把"已到 Raft index"写进 boltdb Meta bucket</text>
  <text x="580" y="142" font-size="9.5" fill="#2f6f4f">· 关键：和数据变更在**同一个 boltdb 事务**里提交</text>
  <text x="580" y="162" font-size="9.5" fill="#2f6f4f">· 要么一起成功、要么一起回滚——原子</text>
  <text x="580" y="182" font-size="9" fill="#4c8567">UnsafeSave 与 UnsafeSeqPut 同 tx</text>
  <!-- replay check -->
  <rect x="40" y="216" width="1000" height="130" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="60" y="240" font-size="11" font-weight="700" fill="#274a78">重启回放时的幂等检查</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="70" y="256" width="200" height="60" rx="8" fill="#fff" stroke="#cfe0f2"/><text x="170" y="278" font-weight="600" fill="#274a78">读已存 consistentIndex</text><text x="170" y="296" fill="#5b7db1">= 上次 apply 到的 index</text><text x="170" y="309" fill="#8aa6cf">从 Meta bucket 读</text>
    <text x="290" y="290" font-size="16" fill="#c7c7cc">→</text>
    <rect x="320" y="256" width="260" height="60" rx="8" fill="#fff" stroke="#cfe0f2"/><text x="450" y="278" font-weight="600" fill="#274a78">回放每条日志前比对</text><text x="450" y="296" fill="#5b7db1">entry.Index ≤ consistentIndex ?</text><text x="450" y="309" fill="#8aa6cf">是 → 已应用过</text>
    <text x="600" y="290" font-size="16" fill="#c7c7cc">→</text>
    <rect x="630" y="256" width="180" height="60" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="720" y="278" font-weight="600" fill="#12402a">跳过（不重复 apply）</text><text x="720" y="296" fill="#2f6f4f">保证幂等</text>
    <rect x="830" y="256" width="180" height="60" rx="8" fill="#fdf6ea" stroke="#efdcb4"/><text x="920" y="278" font-weight="600" fill="#5a3410">否 → 正常 apply</text><text x="920" y="296" fill="#93762e">推进 consistentIndex</text>
  </g>
  <rect x="40" y="360" width="1000" height="80" rx="12" fill="#fdf9f0" stroke="#efe3cd"/>
  <text x="60" y="384" font-size="11" font-weight="700" fill="#7a5a1e">为什么"同事务"是关键</text>
  <text x="60" y="406" font-size="9.5" fill="#93762e">· 若分两次写（先数据后 index）：写完数据 crash → index 没更新 → 重启重复 apply 数据</text>
  <text x="60" y="424" font-size="9" fill="#b08843">· 同事务原子提交，让"数据"和"我 apply 到哪"永远一致——这是"先 WAL 后 apply + 快照回放"能正确的配套保证</text>
  <rect x="40" y="452" width="1000" height="42" rx="10" fill="#f7f7f9" stroke="#e6e6ea"/>
  <text x="60" y="480" font-size="10" fill="#4b4b50"><tspan font-weight="700" fill="#1d1d1f">一句话：</tspan>consistentIndex 记"已 apply 到哪个 Raft index"并与数据同 boltdb 事务原子提交，重启回放时跳过 index ≤ 它的条目——让 apply 幂等，配套"先 WAL 后 apply"保证不重不丢。</text>
</svg>
