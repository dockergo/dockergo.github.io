<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">FFmpeg AVBufferRef —— 引用计数零拷贝</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">libavutil/buffer.h:82 · 底层 AVBuffer 持数据 + 原子引用计数；AVBufferRef 是指向它的引用，复制即增引用</text>

  <!-- 多引用 -->
  <rect x="30" y="76" width="150" height="52" rx="10" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="105" y="98" font-size="10.5" font-weight="600" text-anchor="middle" fill="#3d2a5a">AVPacket.buf</text>
  <text x="105" y="116" font-size="8.5" text-anchor="middle" fill="#7a5aa0">AVBufferRef 引用</text>

  <rect x="30" y="148" width="150" height="52" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="105" y="170" font-size="10.5" font-weight="600" text-anchor="middle" fill="#1b2a4a">AVFrame.buf[]</text>
  <text x="105" y="188" font-size="8.5" text-anchor="middle" fill="#5b7db1">AVBufferRef 引用</text>

  <rect x="30" y="220" width="150" height="52" rx="10" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="105" y="242" font-size="10.5" font-weight="600" text-anchor="middle" fill="#12402a">复制的引用</text>
  <text x="105" y="260" font-size="8.5" text-anchor="middle" fill="#2f6f4f">av_buffer_ref 得</text>

  <!-- 底层 buffer -->
  <rect x="420" y="120" width="290" height="108" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="565" y="150" font-size="12.5" font-weight="600" text-anchor="middle" fill="#5a3410">AVBuffer（底层）</text>
  <text x="565" y="174" font-size="9.5" text-anchor="middle" fill="#93762e">持实际数据（一帧 ≈ 3MB）</text>
  <text x="565" y="194" font-size="9.5" text-anchor="middle" fill="#93762e">+ 原子引用计数</text>
  <rect x="470" y="204" width="190" height="0" fill="none"/>
  <text x="565" y="216" font-size="10.5" font-weight="600" text-anchor="middle" fill="#5a3410">refcount = 3</text>

  <path d="M180,102 L300,102 L300,158 L420,158" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M180,174 L420,174" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M180,246 L300,246 L300,190 L420,190" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="250" y="132" font-size="9" fill="#a1a1a6">三个引用指向同一份数据</text>

  <!-- 无需复制说明 -->
  <rect x="760" y="120" width="290" height="108" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="905" y="150" font-size="11.5" font-weight="600" text-anchor="middle" fill="#12402a">零拷贝共享</text>
  <text x="905" y="174" font-size="9.5" text-anchor="middle" fill="#2f6f4f">管线各段共享同一 buffer</text>
  <text x="905" y="194" font-size="9.5" text-anchor="middle" fill="#2f6f4f">不深拷贝数据</text>
  <text x="905" y="214" font-size="9" text-anchor="middle" fill="#4a8a63">解码→滤镜→编码 都零拷贝</text>
  <path d="M710,174 L760,174" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 两个 API -->
  <text x="30" y="318" font-size="12" font-weight="700" fill="#1d1d1f">两个核心 API</text>
  <rect x="30" y="330" width="510" height="120" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="50" y="356" font-size="12" font-weight="600" fill="#1b2a4a">av_buffer_ref · 增引用</text>
  <text x="50" y="380" font-size="9.5" fill="#5b7db1">引用计数 +1，不复制数据</text>
  <text x="50" y="400" font-size="9.5" fill="#5b7db1">返回新 AVBufferRef 指同一 buffer</text>
  <text x="50" y="424" font-size="10.5" font-weight="600" fill="#1b2a4a">refcount：2 → 3</text>
  <text x="50" y="442" font-size="9" fill="#8aa4c8">packet/frame 复制 = 增引用</text>

  <rect x="560" y="330" width="490" height="120" rx="12" fill="#fbeaea" stroke="#e6b8b8" filter="url(#soft)"/>
  <text x="580" y="356" font-size="12" font-weight="600" fill="#7a2a2a">av_buffer_unref · 减引用</text>
  <text x="580" y="380" font-size="9.5" fill="#a05a5a">引用计数 -1</text>
  <text x="580" y="400" font-size="9.5" fill="#a05a5a">归零才真正释放数据</text>
  <text x="580" y="424" font-size="10.5" font-weight="600" fill="#7a2a2a">refcount：3 → 2 → … → 0 释放</text>
  <text x="580" y="442" font-size="9" fill="#c07a7a">仅最后一个引用释放时回收内存</text>

  <text x="30" y="486" font-size="9.5" fill="#86868b">为什么引用计数：一帧数据 MB 级，各段/多处引用若都深拷贝会爆内存耗时；共享零拷贝、归零才释放 · 源码基准 FFmpeg(1588bce) · libavutil/buffer.h:82</text>
</svg>
