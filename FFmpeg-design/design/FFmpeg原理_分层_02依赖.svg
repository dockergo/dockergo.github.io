<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="510" viewBox="0 0 1080 510" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="510" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">单向分层依赖 —— 下层不依赖上层,util 在底、无循环依赖</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">util 是公共地基(数据结构/内存)必须最底 · format 依赖 codec 因容器要知道流的编码参数 · 单向依赖可分层编译 · 箭头 A→B 表示 A 依赖 B</text>

  <!-- 顶层:应用/CLI (紫=接口/组合) -->
  <rect x="330" y="80" width="420" height="60" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="540" y="106" font-size="12.5" font-weight="600" text-anchor="middle" fill="#3d2a5a">应用 / CLI（ffmpeg 命令行 · libav* 集成程序）</text>
  <text x="540" y="127" font-size="9" text-anchor="middle" fill="#7a5aa0">顶层组合各库,按任务挑最小库集</text>

  <!-- 中层左:format (琥珀) -->
  <rect x="60" y="196" width="290" height="86" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="82" y="224" font-size="12.5" font-weight="600" fill="#5a3410">libavformat</text>
  <text x="82" y="246" font-size="9.5" fill="#93762e">容器封装/解封装</text>
  <text x="82" y="266" font-size="9" fill="#93762e">依赖 codec + util</text>

  <!-- 中层中:codec (绿) -->
  <rect x="395" y="196" width="290" height="86" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="417" y="224" font-size="12.5" font-weight="600" fill="#12402a">libavcodec</text>
  <text x="417" y="246" font-size="9.5" fill="#2f6f4f">编解码</text>
  <text x="417" y="266" font-size="9" fill="#2f6f4f">依赖 util</text>

  <!-- 中层右:filter (蓝) -->
  <rect x="730" y="196" width="290" height="86" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="752" y="224" font-size="12.5" font-weight="600" fill="#1b2a4a">libavfilter</text>
  <text x="752" y="246" font-size="9.5" fill="#5b7db1">滤镜图</text>
  <text x="752" y="266" font-size="9" fill="#5b7db1">依赖 util(+ swscale/swresample)</text>

  <!-- 转换库层:swscale / swresample (淡蓝) 置于 filter 下方 -->
  <rect x="730" y="330" width="290" height="70" rx="13" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="875" y="358" font-size="11.5" font-weight="600" text-anchor="middle" fill="#274a78">libswscale · libswresample</text>
  <text x="875" y="380" font-size="9" text-anchor="middle" fill="#5b7db1">像素/音频信号转换 · 依赖 util</text>

  <!-- 底层:util (白,被所有依赖) -->
  <rect x="60" y="430" width="960" height="60" rx="13" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="82" y="456" font-size="12.5" font-weight="700" fill="#1d1d1f">libavutil（最底层 · 被所有库依赖,自己不依赖别的 libav* 库）</text>
  <text x="82" y="478" font-size="9" fill="#6e6e73">AVFrame · AVBufferRef 引用计数 · AVDictionary —— 公共数据结构与内存地基</text>

  <!-- 依赖箭头(A 依赖 B: 从 A 指向 B) -->
  <!-- 应用 → 三库 -->
  <path d="M430,140 L230,194" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M540,140 L540,194" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M660,140 L860,194" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- format → codec (相邻,无遮挡) -->
  <path d="M350,239 L393,239" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- filter → swscale/swresample -->
  <path d="M875,282 L875,328" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- format → util, codec → util, swscale → util -->
  <path d="M150,282 L110,428" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M500,282 L470,428" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M875,400 L875,428" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 说明:为什么 format 依赖 codec(置于左下开阔区,避开箭头) -->
  <rect x="230" y="316" width="404" height="86" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="252" y="342" font-size="11" font-weight="600" fill="#5a3410">为什么 format 依赖 codec</text>
  <text x="252" y="365" font-size="9.5" fill="#93762e">容器里存的是编码流,muxer/demuxer 需知道流的</text>
  <text x="252" y="384" font-size="9.5" fill="#93762e">编码参数(codecpar)——故 format 依赖 codec。</text>

  <text x="30" y="503" font-size="9" fill="#a1a1a6">源码基准 FFmpeg(1588bce) · 依赖单向向下:应用→format/codec/filter→(swscale/swresample)→util · util 在底、无循环</text>
</svg>
