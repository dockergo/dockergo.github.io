<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">FFmpeg AVPixelFormat —— 视频像素怎么存</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">libavutil/pixfmt.h · 决定 AVFrame 的 format：YUV vs RGB、色度采样、planar vs packed、位深</text>

  <!-- YUV vs RGB -->
  <rect x="30" y="72" width="510" height="120" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="50" y="98" font-size="12" font-weight="600" fill="#1b2a4a">YUV vs RGB</text>
  <text x="50" y="122" font-size="10" fill="#5b7db1"><tspan font-weight="600">YUV</tspan> = 亮度 Y + 色度 UV</text>
  <text x="50" y="142" font-size="9.5" fill="#5b7db1">人眼对亮度敏感、对色度不敏感</text>
  <text x="50" y="162" font-size="9.5" fill="#5b7db1">→ 可压缩色度，编码常用</text>
  <text x="50" y="182" font-size="9.5" fill="#5b7db1">RGB（红绿蓝）：显示 / 处理常用</text>

  <rect x="560" y="72" width="490" height="120" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="580" y="98" font-size="12" font-weight="600" fill="#5a3410">位深（bit depth）</text>
  <rect x="580" y="116" width="130" height="54" rx="9" fill="#ffffff" stroke="#e8cf9a"/><text x="645" y="140" font-size="12" font-weight="600" text-anchor="middle" fill="#5a3410">8 bit</text><text x="645" y="159" font-size="8.5" text-anchor="middle" fill="#93762e">主流</text>
  <rect x="726" y="116" width="130" height="54" rx="9" fill="#ffffff" stroke="#e8cf9a"/><text x="791" y="140" font-size="12" font-weight="600" text-anchor="middle" fill="#5a3410">10 bit</text><text x="791" y="159" font-size="8.5" text-anchor="middle" fill="#93762e">HDR</text>
  <rect x="872" y="116" width="130" height="54" rx="9" fill="#ffffff" stroke="#e8cf9a"/><text x="937" y="140" font-size="12" font-weight="600" text-anchor="middle" fill="#5a3410">12 bit</text><text x="937" y="159" font-size="8.5" text-anchor="middle" fill="#93762e">高端</text>

  <!-- 色度采样 -->
  <text x="30" y="222" font-size="12" font-weight="700" fill="#1d1d1f">色度采样（色度分辨率）</text>
  <rect x="30" y="234" width="336" height="96" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="198" y="260" font-size="12" font-weight="600" text-anchor="middle" fill="#12402a">YUV420</text>
  <text x="198" y="284" font-size="9.5" text-anchor="middle" fill="#2f6f4f">色度 1/4，最省</text>
  <text x="198" y="304" font-size="9.5" text-anchor="middle" fill="#2f6f4f">省一半数据、肉眼几乎无损</text>
  <text x="198" y="322" font-size="9" text-anchor="middle" fill="#4a8a63">编码主流</text>

  <rect x="378" y="234" width="336" height="96" rx="12" fill="#ffffff" stroke="#e4e4ea" filter="url(#soft)"/>
  <text x="546" y="260" font-size="12" font-weight="600" text-anchor="middle" fill="#1d1d1f">YUV422</text>
  <text x="546" y="284" font-size="9.5" text-anchor="middle" fill="#6e6e73">色度 1/2</text>
  <text x="546" y="304" font-size="9.5" text-anchor="middle" fill="#6e6e73">质量与体积折中</text>

  <rect x="726" y="234" width="324" height="96" rx="12" fill="#ffffff" stroke="#e4e4ea" filter="url(#soft)"/>
  <text x="888" y="260" font-size="12" font-weight="600" text-anchor="middle" fill="#1d1d1f">YUV444</text>
  <text x="888" y="284" font-size="9.5" text-anchor="middle" fill="#6e6e73">不压缩色度（全采样）</text>
  <text x="888" y="304" font-size="9.5" text-anchor="middle" fill="#6e6e73">最大、最精确</text>

  <!-- planar vs packed -->
  <text x="30" y="362" font-size="12" font-weight="700" fill="#1d1d1f">平面（planar）vs 打包（packed）</text>
  <rect x="30" y="374" width="510" height="120" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="50" y="400" font-size="11.5" font-weight="600" fill="#1b2a4a">planar · YUV420P</text>
  <text x="50" y="420" font-size="9.5" fill="#5b7db1">Y / U / V 各存一平面</text>
  <rect x="50" y="432" width="150" height="30" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="125" y="452" font-size="10" font-weight="600" text-anchor="middle" fill="#1b2a4a">Y → data[0]</text>
  <rect x="212" y="432" width="150" height="30" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="287" y="452" font-size="10" font-weight="600" text-anchor="middle" fill="#1b2a4a">U → data[1]</text>
  <rect x="374" y="432" width="150" height="30" rx="7" fill="#ffffff" stroke="#bcd0ec"/><text x="449" y="452" font-size="10" font-weight="600" text-anchor="middle" fill="#1b2a4a">V → data[2]</text>
  <text x="50" y="482" font-size="9" fill="#8aa4c8">各分量分平面存储</text>

  <rect x="560" y="374" width="490" height="120" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="580" y="400" font-size="11.5" font-weight="600" fill="#5a3410">packed · RGB24</text>
  <text x="580" y="420" font-size="9.5" fill="#93762e">像素交织存一平面</text>
  <rect x="580" y="432" width="450" height="30" rx="7" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="805" y="452" font-size="10.5" font-weight="600" text-anchor="middle" fill="#5a3410">R G B  R G B  R G B  …  → data[0]</text>
  <text x="580" y="482" font-size="9" fill="#a88a4e">一平面内像素连续交织</text>

  <text x="30" y="522" font-size="9.5" fill="#86868b">为什么 YUV420P 主流：人眼对色度不敏感，色度只存 1/4 省一半数据而肉眼几乎无损 · 源码基准 FFmpeg(1588bce) · libavutil/pixfmt.h</text>
</svg>
