<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">上下文关系 · AVFormatContext → AVStream → AVCodecContext</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">上下文承载长期配置/状态(整流一份) · 与流动的 packet/frame(每帧一个)分离清晰 —— 数据轻量流动、上下文承载"怎么解/怎么封"</text>

  <!-- ① AVFormatContext (蓝=逻辑/协调) -->
  <rect x="30" y="80" width="320" height="270" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="52" y="108" font-size="13" font-weight="700" fill="#1b2a4a">AVFormatContext</text>
  <text x="52" y="126" font-size="9" fill="#5b7db1">avformat.h:1316 · 代表一个媒体文件(封装上下文)</text>
  <rect x="52" y="138" width="276" height="34" rx="8" fill="#ffffff" stroke="#ececf1"/>
  <text x="66" y="159" font-size="10" fill="#1d1d1f">nb_streams / streams[]</text>
  <text x="316" y="159" font-size="8.5" text-anchor="end" fill="#5b7db1">:1217</text>
  <rect x="52" y="178" width="276" height="34" rx="8" fill="#ffffff" stroke="#ececf1"/>
  <text x="66" y="199" font-size="10" fill="#1d1d1f">iformat / oformat</text>
  <text x="316" y="199" font-size="8.5" text-anchor="end" fill="#5b7db1">容器格式</text>
  <rect x="52" y="218" width="276" height="34" rx="8" fill="#ffffff" stroke="#ececf1"/>
  <text x="66" y="239" font-size="10" fill="#1d1d1f">pb</text>
  <text x="316" y="239" font-size="8.5" text-anchor="end" fill="#5b7db1">IO 上下文</text>
  <text x="52" y="278" font-size="9.5" fill="#5b7db1">持 N 个 AVStream(视频/音频/字幕)</text>
  <text x="52" y="300" font-size="9" fill="#8aa4c8">一个文件多条流,streams[] 逐条排列</text>
  <text x="52" y="330" font-size="9" fill="#8aa4c8">iformat=解封装器 · oformat=封装器</text>

  <!-- ② AVStream (淡蓝=中转) -->
  <rect x="392" y="80" width="300" height="270" rx="13" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="414" y="108" font-size="13" font-weight="700" fill="#274a78">AVStream</text>
  <text x="414" y="126" font-size="9" fill="#5b7db1">avformat.h:749 · 单条流(视频 / 音频 / 字幕)</text>
  <rect x="414" y="138" width="256" height="34" rx="8" fill="#ffffff" stroke="#ececf1"/>
  <text x="428" y="159" font-size="10" fill="#1d1d1f">index</text>
  <text x="658" y="159" font-size="8.5" text-anchor="end" fill="#5b7db1">流序号</text>
  <rect x="414" y="178" width="256" height="34" rx="8" fill="#ffffff" stroke="#ececf1"/>
  <text x="428" y="199" font-size="10" fill="#1d1d1f">codecpar</text>
  <text x="658" y="199" font-size="8.5" text-anchor="end" fill="#5b7db1">:772</text>
  <rect x="414" y="218" width="256" height="34" rx="8" fill="#ffffff" stroke="#ececf1"/>
  <text x="428" y="239" font-size="10" fill="#1d1d1f">time_base</text>
  <text x="658" y="239" font-size="8.5" text-anchor="end" fill="#5b7db1">时间基</text>
  <text x="414" y="278" font-size="9.5" fill="#5b7db1">codecpar 存编解码参数(而非状态)</text>
  <text x="414" y="300" font-size="9" fill="#8aa4c8">时间戳按每流的 time_base 换算</text>
  <text x="414" y="330" font-size="9" fill="#8aa4c8">新代码用 codecpar 传参</text>

  <!-- ③ AVCodecContext (绿=编解码状态) -->
  <rect x="734" y="80" width="316" height="270" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="756" y="108" font-size="13" font-weight="700" fill="#12402a">AVCodecContext</text>
  <text x="756" y="126" font-size="9" fill="#2f6f4f">avcodec.h:443 · 编解码上下文(状态)</text>
  <rect x="756" y="138" width="272" height="34" rx="8" fill="#ffffff" stroke="#ececf1"/>
  <text x="770" y="159" font-size="10" fill="#1d1d1f">codec_type / codec / codec_id</text>
  <rect x="756" y="178" width="272" height="34" rx="8" fill="#ffffff" stroke="#ececf1"/>
  <text x="770" y="199" font-size="10" fill="#1d1d1f">width / height</text>
  <text x="1016" y="199" font-size="8.5" text-anchor="end" fill="#2f6f4f">视频尺寸</text>
  <rect x="756" y="218" width="272" height="34" rx="8" fill="#ffffff" stroke="#ececf1"/>
  <text x="770" y="239" font-size="10" fill="#1d1d1f">pix_fmt</text>
  <text x="1016" y="239" font-size="8.5" text-anchor="end" fill="#2f6f4f">像素格式</text>
  <text x="756" y="278" font-size="9.5" fill="#2f6f4f">由每流的 codecpar 初始化而来</text>
  <text x="756" y="300" font-size="9" fill="#4a8a63">送 send/receive 时的编解码状态</text>
  <text x="756" y="330" font-size="9" fill="#4a8a63">codecpar=参数、CodecContext=状态</text>

  <!-- 持有/初始化关系 -->
  <path d="M350,180 L392,180" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="371" y="172" font-size="8.5" text-anchor="middle" fill="#6e6e73">持 N 个</text>
  <path d="M692,195 L734,195" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="713" y="187" font-size="8.5" text-anchor="middle" fill="#6e6e73">codecpar</text>
  <text x="713" y="212" font-size="8.5" text-anchor="middle" fill="#6e6e73">初始化</text>

  <!-- 底部:packet 的 stream_index 索引到 stream -->
  <rect x="30" y="376" width="1020" height="96" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="52" y="404" font-size="12" font-weight="600" fill="#5a3410">流动数据 ↔ 上下文的连接:AVPacket.stream_index 索引到 AVStream</text>
  <rect x="52" y="418" width="150" height="40" rx="9" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="127" y="435" font-size="10" text-anchor="middle" fill="#5a3410">AVPacket</text>
  <text x="127" y="450" font-size="8.5" text-anchor="middle" fill="#93762e">stream_index=1</text>
  <path d="M202,438 L250,438" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="226" y="430" font-size="8.5" text-anchor="middle" fill="#6e6e73">索引</text>
  <rect x="250" y="418" width="150" height="40" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="325" y="435" font-size="10" text-anchor="middle" fill="#274a78">streams[1]</text>
  <text x="325" y="450" font-size="8.5" text-anchor="middle" fill="#5b7db1">AVStream</text>
  <text x="430" y="432" font-size="9.5" fill="#93762e">→ 由该流的 codecpar 初始化对应 AVCodecContext,即可 decode/encode。</text>
  <text x="430" y="452" font-size="9" fill="#93762e">分离原因:数据每帧一个(轻量流动) vs 上下文整流一份(长期配置/状态)。</text>

  <text x="30" y="502" font-size="9" fill="#a1a1a6">源码基准 FFmpeg(1588bce) · FormatContext 持 N 个 Stream;packet.stream_index 索引到 Stream;Stream.codecpar 初始化 CodecContext</text>
</svg>
