<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">FFmpeg 命令行结构 —— 位置即作用域</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">ffmpeg [全局选项] {[输入选项] -i 输入}... {[输出选项] 输出}... ｜ 选项作用于其后的 -i / 输出</text>

  <!-- 命令行模板条 -->
  <rect x="30" y="80" width="1020" height="56" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="50" y="105" font-size="11" font-weight="600" fill="#4a2c6f">命令模板</text>
  <text x="50" y="126" font-size="11" fill="#7a5aa0" font-family="'SF Mono',Menlo,monospace">ffmpeg <tspan fill="#4a2c6f" font-weight="600">[全局选项]</tspan>  {<tspan fill="#4a2c6f" font-weight="600">[输入选项]</tspan> -i 输入}...  {<tspan fill="#4a2c6f" font-weight="600">[输出选项]</tspan> 输出}...</text>

  <!-- 三段结构卡 y=160 h=118 -->
  <rect x="30" y="160" width="230" height="118" rx="12" fill="#ffffff" stroke="#e4e4ea" filter="url(#soft)"/>
  <text x="145" y="188" font-size="12" font-weight="600" text-anchor="middle" fill="#1d1d1f">全局选项</text>
  <text x="145" y="212" font-size="9" text-anchor="middle" fill="#6e6e73">作用于整个进程</text>
  <text x="145" y="232" font-size="9" text-anchor="middle" fill="#6e6e73">-y 覆盖 / -loglevel</text>
  <text x="145" y="256" font-size="8.5" text-anchor="middle" fill="#86868b">放在最前</text>

  <rect x="286" y="160" width="300" height="118" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="436" y="188" font-size="12" font-weight="600" text-anchor="middle" fill="#1b2a4a">{[输入选项] -i 输入}</text>
  <text x="436" y="212" font-size="9" text-anchor="middle" fill="#5b7db1">可多个输入 · 一文件可多流</text>
  <text x="436" y="232" font-size="9" text-anchor="middle" fill="#5b7db1">-i in.mp4 (视频/音频/字幕)</text>
  <text x="436" y="256" font-size="8.5" text-anchor="middle" fill="#8aa4c8">输入选项放 -i 前</text>

  <rect x="612" y="160" width="438" height="118" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="831" y="188" font-size="12" font-weight="600" text-anchor="middle" fill="#12402a">{[输出选项] 输出}</text>
  <text x="831" y="212" font-size="9" text-anchor="middle" fill="#2f6f4f">格式由扩展名 / -f 定;编码器/码率/滤镜放输出前</text>
  <text x="831" y="232" font-size="9" text-anchor="middle" fill="#2f6f4f">-c:v libvpx  -b:v 1M  -vf scale=  out.webm</text>
  <text x="831" y="256" font-size="8.5" text-anchor="middle" fill="#4a8a63">输出选项放输出前</text>

  <path d="M260,219 L286,219" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M586,219 L612,219" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 常用选项 y=298 -->
  <text x="30" y="316" font-size="12" font-weight="700" fill="#1d1d1f">常用选项</text>
  <rect x="30" y="326" width="244" height="56" rx="11" fill="#ffffff" stroke="#e4e4ea" filter="url(#soft)"/>
  <text x="152" y="350" font-size="11" font-weight="600" text-anchor="middle" fill="#1d1d1f">-i / -map</text>
  <text x="152" y="370" font-size="8.5" text-anchor="middle" fill="#6e6e73">指定输入 / 选流进输出</text>
  <rect x="286" y="326" width="244" height="56" rx="11" fill="#ffffff" stroke="#e4e4ea" filter="url(#soft)"/>
  <text x="408" y="350" font-size="11" font-weight="600" text-anchor="middle" fill="#1d1d1f">-vf scale</text>
  <text x="408" y="370" font-size="8.5" text-anchor="middle" fill="#6e6e73">视频滤镜(编译成滤镜图)</text>
  <rect x="542" y="326" width="244" height="56" rx="11" fill="#ffffff" stroke="#e4e4ea" filter="url(#soft)"/>
  <text x="664" y="350" font-size="11" font-weight="600" text-anchor="middle" fill="#1d1d1f">-c:v / -b:v</text>
  <text x="664" y="370" font-size="8.5" text-anchor="middle" fill="#6e6e73">选编码器 / 设码率</text>
  <rect x="798" y="326" width="252" height="56" rx="11" fill="#ffffff" stroke="#e4e4ea" filter="url(#soft)"/>
  <text x="924" y="350" font-size="11" font-weight="600" text-anchor="middle" fill="#1d1d1f">-c copy</text>
  <text x="924" y="370" font-size="8.5" text-anchor="middle" fill="#6e6e73">remux 只转封装不重编码</text>

  <!-- 位置定作用域重点 -->
  <rect x="30" y="398" width="1020" height="60" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="50" y="422" font-size="11" font-weight="600" fill="#5a3410">位置即作用域 · -ss 起始时间的两种放法</text>
  <text x="50" y="443" font-size="9.5" fill="#93762e"><tspan font-weight="600">-ss 放在 -i 前</tspan> = 输入定位(快速 seek 到起点再解码) ｜ <tspan font-weight="600">-ss 放在输出前</tspan> = 输出裁剪(解码后按帧裁) —— 同一选项、位置不同、语义不同</text>

  <text x="30" y="482" font-size="9" fill="#a1a1a6">源码基准 FFmpeg(git 1588bce) · CLI 把参数编译成内部输入/输出上下文 + 滤镜图,驱动 demux→decode→filter→encode→mux 管线循环</text>
</svg>
