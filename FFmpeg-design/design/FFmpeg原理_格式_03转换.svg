<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">FFmpeg 格式转换 —— swscale / swresample 桥接</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">解码输出、滤镜要求、编码器接受、显示器格式常各不同；两个库做桥接，让不同环节能对接</text>

  <!-- libswscale video -->
  <rect x="30" y="76" width="1020" height="150" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="50" y="104" font-size="12.5" font-weight="600" fill="#1b2a4a">libswscale · 视频（sws_scale）</text>

  <rect x="50" y="122" width="300" height="88" rx="11" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="200" y="150" font-size="11" font-weight="600" text-anchor="middle" fill="#1b2a4a">像素格式转换</text>
  <text x="200" y="172" font-size="9.5" text-anchor="middle" fill="#5b7db1">YUV ↔ RGB</text>
  <text x="200" y="192" font-size="9" text-anchor="middle" fill="#8aa4c8">解码输出 ↔ 显示 / 处理格式</text>

  <rect x="370" y="122" width="300" height="88" rx="11" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="520" y="150" font-size="11" font-weight="600" text-anchor="middle" fill="#1b2a4a">分辨率缩放</text>
  <text x="520" y="172" font-size="9.5" text-anchor="middle" fill="#5b7db1">1080p → 720p</text>
  <text x="520" y="192" font-size="9" text-anchor="middle" fill="#8aa4c8">bilinear / bicubic / lanczos</text>

  <rect x="690" y="122" width="340" height="88" rx="11" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="860" y="150" font-size="11" font-weight="600" text-anchor="middle" fill="#1b2a4a">色域转换</text>
  <text x="860" y="172" font-size="9.5" text-anchor="middle" fill="#5b7db1">色彩空间映射</text>
  <text x="860" y="192" font-size="9" text-anchor="middle" fill="#8aa4c8">不同色域间桥接</text>

  <!-- libswresample audio -->
  <rect x="30" y="242" width="1020" height="150" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="50" y="270" font-size="12.5" font-weight="600" fill="#12402a">libswresample · 音频（swr_convert）</text>

  <rect x="50" y="288" width="300" height="88" rx="11" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="200" y="316" font-size="11" font-weight="600" text-anchor="middle" fill="#12402a">采样格式转换</text>
  <text x="200" y="338" font-size="9.5" text-anchor="middle" fill="#2f6f4f">S16 ↔ FLTP</text>
  <text x="200" y="358" font-size="9" text-anchor="middle" fill="#4a8a63">整数 ↔ 浮点、交织 ↔ 平面</text>

  <rect x="370" y="288" width="300" height="88" rx="11" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="520" y="316" font-size="11" font-weight="600" text-anchor="middle" fill="#12402a">重采样</text>
  <text x="520" y="338" font-size="9.5" text-anchor="middle" fill="#2f6f4f">48000 → 44100 Hz</text>
  <text x="520" y="358" font-size="9" text-anchor="middle" fill="#4a8a63">改变采样率（有精度损失）</text>

  <rect x="690" y="288" width="340" height="88" rx="11" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="860" y="316" font-size="11" font-weight="600" text-anchor="middle" fill="#12402a">声道重映射</text>
  <text x="860" y="338" font-size="9.5" text-anchor="middle" fill="#2f6f4f">5.1 → 立体声</text>
  <text x="860" y="358" font-size="9" text-anchor="middle" fill="#4a8a63">声道布局转换</text>

  <!-- auto insert -->
  <rect x="30" y="408" width="1020" height="52" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="50" y="432" font-size="11.5" font-weight="600" fill="#3d2a5a">滤镜图自动插入（auto scale）</text>
  <text x="50" y="451" font-size="9.5" fill="#7a5aa0">若上下游格式不匹配，滤镜图会自动插入必要的格式转换 —— 无需手动处理格式衔接</text>

  <text x="30" y="486" font-size="9.5" fill="#86868b">为什么要转换：各环节格式常不同，swscale/swresample 有 CPU 开销，格式统一可避免 · 源码基准 FFmpeg(1588bce) · libswscale / libswresample</text>
</svg>
