<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">帧在图中流动 —— 喂入 buffersrc、逐滤镜处理、从 buffersink 取出</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">源/汇是图与管线其余部分(解码/编码)的接口边界 · 滤镜可 1:N / N:1(split 一帧变多、overlay 多帧合一)</text>

  <!-- 主流程带 y=96 h=132 -->
  <!-- 解码来的 AVFrame (绿) -->
  <rect x="30" y="96" width="132" height="132" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="96" y="146" font-size="10.5" font-weight="600" text-anchor="middle" fill="#12402a">decode</text>
  <text x="96" y="166" font-size="9" text-anchor="middle" fill="#2f6f4f">出 AVFrame</text>
  <text x="96" y="186" font-size="8.5" text-anchor="middle" fill="#2f6f4f">(原始帧)</text>

  <!-- buffersrc 喂入 (绿) -->
  <rect x="196" y="96" width="150" height="132" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="271" y="140" font-size="11" font-weight="600" text-anchor="middle" fill="#12402a">buffersrc</text>
  <text x="271" y="162" font-size="9" text-anchor="middle" fill="#2f6f4f">喂帧入图(源)</text>
  <text x="271" y="188" font-size="8.5" text-anchor="middle" fill="#2f6f4f">av_buffersrc_</text>
  <text x="271" y="203" font-size="8.5" text-anchor="middle" fill="#2f6f4f">add_frame</text>

  <!-- 中间滤镜链 (蓝) -->
  <rect x="380" y="96" width="320" height="132" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="540" y="122" font-size="11" font-weight="600" text-anchor="middle" fill="#1b2a4a">沿链接逐滤镜处理</text>
  <rect x="398" y="140" width="86" height="42" rx="9" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="441" y="166" font-size="10" text-anchor="middle" fill="#1b2a4a">scale</text>
  <rect x="497" y="140" width="86" height="42" rx="9" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="540" y="166" font-size="10" text-anchor="middle" fill="#1b2a4a">crop</text>
  <rect x="596" y="140" width="86" height="42" rx="9" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="639" y="166" font-size="10" text-anchor="middle" fill="#1b2a4a">overlay</text>
  <path d="M484,161 L495,161" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <path d="M583,161 L594,161" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <text x="540" y="208" font-size="8.5" text-anchor="middle" fill="#5b7db1">每个滤镜处理后传给下游</text>

  <!-- buffersink 取出 (绿) -->
  <rect x="734" y="96" width="150" height="132" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="809" y="140" font-size="11" font-weight="600" text-anchor="middle" fill="#12402a">buffersink</text>
  <text x="809" y="162" font-size="9" text-anchor="middle" fill="#2f6f4f">取处理完的帧(汇)</text>
  <text x="809" y="188" font-size="8.5" text-anchor="middle" fill="#2f6f4f">av_buffersink_</text>
  <text x="809" y="203" font-size="8.5" text-anchor="middle" fill="#2f6f4f">get_frame</text>

  <!-- 送编码 (绿) -->
  <rect x="918" y="96" width="132" height="132" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="984" y="146" font-size="10.5" font-weight="600" text-anchor="middle" fill="#12402a">encode</text>
  <text x="984" y="166" font-size="9" text-anchor="middle" fill="#2f6f4f">收 AVFrame</text>
  <text x="984" y="186" font-size="8.5" text-anchor="middle" fill="#2f6f4f">去压缩</text>

  <!-- 主流程箭头 -->
  <path d="M162,162 L194,162" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M346,162 L378,162" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M700,162 L732,162" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M884,162 L916,162" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 三步说明 -->
  <rect x="30" y="256" width="332" height="128" rx="12" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="52" y="282" font-size="11" font-weight="600" fill="#2c5a3a">① 喂入</text>
  <text x="52" y="306" font-size="9.5" fill="#2c5a3a">av_buffersrc_add_frame 把解码得到的</text>
  <text x="52" y="324" font-size="9.5" fill="#2c5a3a">AVFrame 送入 buffersrc</text>
  <text x="52" y="352" font-size="9" fill="#4a8a63">buffersrc 是图的入口,接收外部原始帧</text>
  <text x="52" y="372" font-size="9" fill="#4a8a63">帧进图后即开始沿链接传播</text>

  <rect x="374" y="256" width="332" height="128" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="396" y="282" font-size="11" font-weight="600" fill="#1b2a4a">② 传播</text>
  <text x="396" y="306" font-size="9.5" fill="#5b7db1">帧沿链接从一个滤镜流到下一个</text>
  <text x="396" y="324" font-size="9.5" fill="#5b7db1">每滤镜处理(缩放/裁剪/叠加)后传下游</text>
  <text x="396" y="352" font-size="9" fill="#8aa4c8">滤镜可 1:N(split 一帧变多)</text>
  <text x="396" y="372" font-size="9" fill="#8aa4c8">也可 N:1(overlay 多帧合一)</text>

  <rect x="718" y="256" width="332" height="128" rx="12" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="740" y="282" font-size="11" font-weight="600" fill="#2c5a3a">③ 取出</text>
  <text x="740" y="306" font-size="9.5" fill="#2c5a3a">av_buffersink_get_frame 从 buffersink</text>
  <text x="740" y="324" font-size="9.5" fill="#2c5a3a">取处理完的帧,送去编码</text>
  <text x="740" y="352" font-size="9" fill="#4a8a63">buffersink 是图的出口,给外部取结果</text>
  <text x="740" y="372" font-size="9" fill="#4a8a63">源/汇是图与解码/编码的接口边界</text>

  <!-- 底部一句话 -->
  <rect x="30" y="404" width="1020" height="52" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="52" y="428" font-size="10.5" font-weight="600" fill="#3d2a5a">全链:add_frame(入 buffersrc)→ scale/crop/overlay 逐滤镜 → get_frame(出 buffersink)→ 编码</text>
  <text x="52" y="447" font-size="9" fill="#7a5aa0">流过的都是 AVFrame(原始帧);滤镜可 1:N / N:1,图能表达分支与合并</text>

  <text x="30" y="484" font-size="9" fill="#a1a1a6">源码基准 FFmpeg(1588bce) · buffersrc 喂帧 → 逐滤镜处理 → buffersink 取帧 · 源/汇=图与解码/编码的接口边界</text>
</svg>
