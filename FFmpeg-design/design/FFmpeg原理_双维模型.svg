<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="480" viewBox="0 0 1080 480" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="480" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">FFmpeg 双维模型 —— 能力域 × 执行时机</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">能力域:接触面(CLI/API 面向用户/开发者) + 支撑侧 8 域 ｜ 执行时机:全前台同步转码流,无后台守护</text>

  <!-- Y 轴标题 -->
  <text x="42" y="262" font-size="12" font-weight="600" fill="#1d1d1f" text-anchor="middle" transform="rotate(-90 42 262)">执行时机 ↑</text>
  <!-- X 轴标题 -->
  <text x="604" y="92" font-size="12" font-weight="600" fill="#1d1d1f" text-anchor="middle">能力域 →</text>

  <!-- 顶部分组表头 -->
  <rect x="160" y="102" width="226" height="32" rx="9" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="273" y="122" font-size="11" font-weight="600" text-anchor="middle" fill="#4a2c6f">接触面 · 面向用户/开发者</text>
  <rect x="402" y="102" width="646" height="32" rx="9" fill="#ffffff" stroke="#e4e4ea" filter="url(#soft)"/>
  <text x="725" y="122" font-size="11" font-weight="600" text-anchor="middle" fill="#1d1d1f">支撑侧 · 8 能力域</text>

  <!-- 全前台 行标签 -->
  <rect x="64" y="150" width="88" height="200" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="108" y="238" font-size="11.5" font-weight="600" text-anchor="middle" fill="#12402a">全前台</text>
  <text x="108" y="258" font-size="8.5" text-anchor="middle" fill="#2f6f4f">同步转码流</text>

  <!-- 接触面 · 全前台内容 -->
  <rect x="162" y="154" width="222" height="94" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="273" y="186" font-size="11" font-weight="600" text-anchor="middle" fill="#4a2c6f">命令行 ffmpeg</text>
  <text x="273" y="208" font-size="8.5" text-anchor="middle" fill="#7a5aa0">用户转码 / 脚本批处理</text>
  <text x="273" y="226" font-size="8.5" text-anchor="middle" fill="#7a5aa0">ffmpeg -i in.mp4 out.webm</text>
  <rect x="162" y="256" width="222" height="94" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="273" y="288" font-size="11" font-weight="600" text-anchor="middle" fill="#4a2c6f">libav* C API</text>
  <text x="273" y="310" font-size="8.5" text-anchor="middle" fill="#7a5aa0">开发者集成到应用</text>
  <text x="273" y="328" font-size="8.5" text-anchor="middle" fill="#7a5aa0">avformat / avcodec / avfilter</text>

  <!-- 支撑侧 8 域 4x2 -->
  <rect x="402" y="154" width="154" height="94" rx="12" fill="#ffffff" stroke="#e4e4ea" filter="url(#soft)"/>
  <text x="479" y="196" font-size="10.5" font-weight="600" text-anchor="middle" fill="#1d1d1f">库分层</text>
  <text x="479" y="218" font-size="8.5" text-anchor="middle" fill="#6e6e73">六库 libav*</text>
  <rect x="566" y="154" width="154" height="94" rx="12" fill="#ffffff" stroke="#e4e4ea" filter="url(#soft)"/>
  <text x="643" y="196" font-size="10.5" font-weight="600" text-anchor="middle" fill="#1d1d1f">核心数据结构</text>
  <text x="643" y="218" font-size="8.5" text-anchor="middle" fill="#6e6e73">AVPacket / AVFrame</text>
  <rect x="730" y="154" width="154" height="94" rx="12" fill="#ffffff" stroke="#e4e4ea" filter="url(#soft)"/>
  <text x="807" y="196" font-size="10.5" font-weight="600" text-anchor="middle" fill="#1d1d1f">编解码管线</text>
  <text x="807" y="218" font-size="8.5" text-anchor="middle" fill="#6e6e73">demux→…→mux</text>
  <rect x="894" y="154" width="154" height="94" rx="12" fill="#ffffff" stroke="#e4e4ea" filter="url(#soft)"/>
  <text x="971" y="196" font-size="10.5" font-weight="600" text-anchor="middle" fill="#1d1d1f">滤镜图</text>
  <text x="971" y="218" font-size="8.5" text-anchor="middle" fill="#6e6e73">AVFilterGraph</text>
  <rect x="402" y="256" width="154" height="94" rx="12" fill="#ffffff" stroke="#e4e4ea" filter="url(#soft)"/>
  <text x="479" y="298" font-size="10.5" font-weight="600" text-anchor="middle" fill="#1d1d1f">容器格式</text>
  <text x="479" y="320" font-size="8.5" text-anchor="middle" fill="#6e6e73">muxer / demuxer</text>
  <rect x="566" y="256" width="154" height="94" rx="12" fill="#ffffff" stroke="#e4e4ea" filter="url(#soft)"/>
  <text x="643" y="298" font-size="10.5" font-weight="600" text-anchor="middle" fill="#1d1d1f">像素采样格式</text>
  <text x="643" y="320" font-size="8.5" text-anchor="middle" fill="#6e6e73">AVPixelFormat</text>
  <rect x="730" y="256" width="154" height="94" rx="12" fill="#ffffff" stroke="#e4e4ea" filter="url(#soft)"/>
  <text x="807" y="298" font-size="10.5" font-weight="600" text-anchor="middle" fill="#1d1d1f">引用计数内存</text>
  <text x="807" y="320" font-size="8.5" text-anchor="middle" fill="#6e6e73">AVBufferRef 零拷贝</text>
  <rect x="894" y="256" width="154" height="94" rx="12" fill="#ffffff" stroke="#e4e4ea" filter="url(#soft)"/>
  <text x="971" y="298" font-size="10.5" font-weight="600" text-anchor="middle" fill="#1d1d1f">硬件加速</text>
  <text x="971" y="320" font-size="8.5" text-anchor="middle" fill="#6e6e73">hwaccel GPU</text>

  <!-- 后台守护 行(空) -->
  <rect x="64" y="366" width="88" height="58" rx="11" fill="#ffffff" stroke="#e4e4ea" stroke-dasharray="4 4"/>
  <text x="108" y="392" font-size="10.5" font-weight="600" text-anchor="middle" fill="#86868b">后台守护</text>
  <text x="108" y="410" font-size="8.5" text-anchor="middle" fill="#86868b">常驻</text>
  <rect x="162" y="366" width="886" height="58" rx="12" fill="#fbeaea" stroke="#e6b8b8" stroke-dasharray="5 4" filter="url(#soft)"/>
  <text x="605" y="392" font-size="10.5" font-weight="600" text-anchor="middle" fill="#7a2a2a">无后台守护进程</text>
  <text x="605" y="411" font-size="9" text-anchor="middle" fill="#a05a5a">FFmpeg 是库 / 工具:进程内同步处理流(读包→解码→滤镜→编码→写包的循环),转码完即退出——无常驻服务</text>

  <text x="30" y="462" font-size="9" fill="#a1a1a6">源码基准 FFmpeg(git 1588bce) · 与常驻式引擎不同:FFmpeg 单进程全前台同步,能力全在接触面(CLI/API) + 8 支撑域,无后台调度/守护维度</text>
</svg>
