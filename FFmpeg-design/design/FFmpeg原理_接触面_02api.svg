<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">libav API 集成骨架 —— 开发者链接库调用</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">四阶段:打开容器 → 建解码器 → 收发循环 → 收尾释放 ｜ 分层对应库:avformat 打开读写、avcodec 编解码、avutil 数据</text>

  <!-- 阶段①打开 -->
  <rect x="30" y="80" width="240" height="140" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="150" y="106" font-size="11.5" font-weight="600" text-anchor="middle" fill="#4a2c6f">① 打开输入</text>
  <text x="150" y="132" font-size="9" text-anchor="middle" fill="#7a5aa0">avformat_open_input</text>
  <text x="150" y="152" font-size="9" text-anchor="middle" fill="#7a5aa0">avformat_find_stream_info</text>
  <text x="150" y="178" font-size="8.5" text-anchor="middle" fill="#9a7ac0">→ AVFormatContext</text>
  <text x="150" y="196" font-size="8.5" text-anchor="middle" fill="#9a7ac0">+ streams</text>

  <!-- 阶段②解码器 -->
  <rect x="298" y="80" width="240" height="140" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="418" y="106" font-size="11.5" font-weight="600" text-anchor="middle" fill="#12402a">② 建解码器</text>
  <text x="418" y="132" font-size="9" text-anchor="middle" fill="#2f6f4f">avcodec_find_decoder</text>
  <text x="418" y="152" font-size="9" text-anchor="middle" fill="#2f6f4f">avcodec_alloc_context3</text>
  <text x="418" y="172" font-size="9" text-anchor="middle" fill="#2f6f4f">avcodec_open2</text>
  <text x="418" y="196" font-size="8.5" text-anchor="middle" fill="#4a8a63">→ AVCodecContext</text>

  <!-- 阶段④收尾(右上) -->
  <rect x="810" y="80" width="240" height="140" rx="12" fill="#fbeaea" stroke="#e6b8b8" filter="url(#soft)"/>
  <text x="930" y="106" font-size="11.5" font-weight="600" text-anchor="middle" fill="#7a2a2a">④ 收尾释放</text>
  <text x="930" y="132" font-size="9" text-anchor="middle" fill="#a05a5a">冲刷 draining (send NULL)</text>
  <text x="930" y="152" font-size="9" text-anchor="middle" fill="#a05a5a">取尽缓冲延迟帧/包</text>
  <text x="930" y="176" font-size="9" text-anchor="middle" fill="#a05a5a">avformat_close_input</text>
  <text x="930" y="196" font-size="9" text-anchor="middle" fill="#a05a5a">avcodec_free_context</text>

  <path d="M270,150 L298,150" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M418,220 L418,244" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 阶段③循环容器 y=256 -->
  <rect x="30" y="256" width="1020" height="182" rx="14" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="50" y="282" font-size="12" font-weight="600" fill="#274a78">③ 处理循环 · 每个输入 packet 走一遍收发</text>

  <rect x="46" y="298" width="176" height="118" rx="11" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="134" y="324" font-size="10.5" font-weight="600" text-anchor="middle" fill="#5a3410">读包</text>
  <text x="134" y="348" font-size="9" text-anchor="middle" fill="#93762e">av_read_frame</text>
  <text x="134" y="372" font-size="8.5" text-anchor="middle" fill="#93762e">从容器读出</text>
  <text x="134" y="390" font-size="8.5" text-anchor="middle" fill="#93762e">压缩 AVPacket</text>

  <rect x="248" y="298" width="176" height="118" rx="11" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="336" y="324" font-size="10.5" font-weight="600" text-anchor="middle" fill="#12402a">解码</text>
  <text x="336" y="348" font-size="9" text-anchor="middle" fill="#2f6f4f">send_packet</text>
  <text x="336" y="368" font-size="9" text-anchor="middle" fill="#2f6f4f">receive_frame</text>
  <text x="336" y="392" font-size="8.5" text-anchor="middle" fill="#4a8a63">→ AVFrame</text>

  <rect x="450" y="298" width="176" height="118" rx="11" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="538" y="324" font-size="10.5" font-weight="600" text-anchor="middle" fill="#1b2a4a">处理</text>
  <text x="538" y="348" font-size="9" text-anchor="middle" fill="#5b7db1">(可选)滤镜图</text>
  <text x="538" y="368" font-size="9" text-anchor="middle" fill="#5b7db1">avfilter 处理帧</text>
  <text x="538" y="392" font-size="8.5" text-anchor="middle" fill="#8aa4c8">AVFrame → AVFrame</text>

  <rect x="652" y="298" width="176" height="118" rx="11" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="740" y="324" font-size="10.5" font-weight="600" text-anchor="middle" fill="#12402a">编码</text>
  <text x="740" y="348" font-size="9" text-anchor="middle" fill="#2f6f4f">send_frame</text>
  <text x="740" y="368" font-size="9" text-anchor="middle" fill="#2f6f4f">receive_packet</text>
  <text x="740" y="392" font-size="8.5" text-anchor="middle" fill="#4a8a63">→ AVPacket</text>

  <rect x="854" y="298" width="180" height="118" rx="11" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="944" y="324" font-size="10.5" font-weight="600" text-anchor="middle" fill="#5a3410">写包</text>
  <text x="944" y="348" font-size="9" text-anchor="middle" fill="#93762e">av_interleaved</text>
  <text x="944" y="368" font-size="9" text-anchor="middle" fill="#93762e">_write_frame</text>
  <text x="944" y="392" font-size="8.5" text-anchor="middle" fill="#93762e">封进容器</text>

  <path d="M222,357 L248,357" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M424,357 L450,357" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M626,357 L652,357" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M828,357 L854,357" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 阶段③到④ -->
  <path d="M944,438 L944,460 L930,460 L930,438" stroke="#c7c7cc" stroke-width="1.3" fill="none"/>

  <!-- 分层引入说明 -->
  <text x="30" y="470" font-size="9.5" fill="#6e6e73"><tspan font-weight="600" fill="#1d1d1f">按需分层引入:</tspan> 只转封装用 avformat;要转码加 avcodec;要滤镜再加 avfilter —— CLI(fftools/ffmpeg.c)就是这套 API 的封装</text>
  <text x="30" y="502" font-size="9" fill="#a1a1a6">源码基准 FFmpeg(git 1588bce) · 分层对应库:avformat 打开/读写、avcodec 编解码、avutil 数据;开发者按需组合调用</text>
</svg>
