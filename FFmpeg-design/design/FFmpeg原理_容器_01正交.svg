<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">FFmpeg 容器 vs 编码 —— 正交的两层</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">容器（format）管怎么组织多条流，编码（codec）管每条流怎么压缩 —— 两层职责不同、独立演进，可自由组合</text>

  <!-- Band 1 容器层 amber -->
  <rect x="30" y="88" width="1020" height="98" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="50" y="122" font-size="12.5" font-weight="600" fill="#5a3410">容器 · format</text>
  <text x="50" y="144" font-size="9.5" fill="#93762e">组织多条流 · 元数据</text>
  <text x="50" y="162" font-size="9.5" fill="#93762e">交织 · 时间戳</text>
  <rect x="250" y="115" width="125" height="44" rx="9" fill="#ffffff" stroke="#e8cf9a"/><text x="312" y="142" font-size="11.5" font-weight="600" text-anchor="middle" fill="#5a3410">mp4</text>
  <rect x="415" y="115" width="125" height="44" rx="9" fill="#ffffff" stroke="#e8cf9a"/><text x="477" y="142" font-size="11.5" font-weight="600" text-anchor="middle" fill="#5a3410">mkv</text>
  <rect x="580" y="115" width="125" height="44" rx="9" fill="#ffffff" stroke="#e8cf9a"/><text x="642" y="142" font-size="11.5" font-weight="600" text-anchor="middle" fill="#5a3410">webm</text>
  <rect x="745" y="115" width="125" height="44" rx="9" fill="#ffffff" stroke="#e8cf9a"/><text x="807" y="142" font-size="11.5" font-weight="600" text-anchor="middle" fill="#5a3410">ts</text>
  <rect x="910" y="115" width="125" height="44" rx="9" fill="#ffffff" stroke="#e8cf9a"/><text x="972" y="142" font-size="11.5" font-weight="600" text-anchor="middle" fill="#5a3410">flv</text>

  <!-- Band 2 编码层 green -->
  <rect x="30" y="202" width="1020" height="98" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="50" y="236" font-size="12.5" font-weight="600" fill="#12402a">编码 · codec</text>
  <text x="50" y="258" font-size="9.5" fill="#2f6f4f">每条流的压缩算法</text>
  <text x="50" y="276" font-size="9.5" fill="#2f6f4f">单流 · 决定画质</text>
  <rect x="250" y="229" width="125" height="44" rx="9" fill="#ffffff" stroke="#bfe0cd"/><text x="312" y="256" font-size="11.5" font-weight="600" text-anchor="middle" fill="#12402a">H.264</text>
  <rect x="415" y="229" width="125" height="44" rx="9" fill="#ffffff" stroke="#bfe0cd"/><text x="477" y="256" font-size="11.5" font-weight="600" text-anchor="middle" fill="#12402a">H.265</text>
  <rect x="580" y="229" width="125" height="44" rx="9" fill="#ffffff" stroke="#bfe0cd"/><text x="642" y="256" font-size="11.5" font-weight="600" text-anchor="middle" fill="#12402a">VP9</text>
  <rect x="745" y="229" width="125" height="44" rx="9" fill="#ffffff" stroke="#bfe0cd"/><text x="807" y="256" font-size="11.5" font-weight="600" text-anchor="middle" fill="#12402a">AAC</text>
  <rect x="910" y="229" width="125" height="44" rx="9" fill="#ffffff" stroke="#bfe0cd"/><text x="972" y="256" font-size="11.5" font-weight="600" text-anchor="middle" fill="#12402a">Opus</text>

  <!-- Band 3 正交示例 -->
  <text x="30" y="332" font-size="12" font-weight="700" fill="#1d1d1f">正交：容器与编码自由组合</text>

  <rect x="30" y="344" width="500" height="120" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="50" y="370" font-size="11.5" font-weight="600" fill="#1b2a4a">① 同一编码，可封进不同容器</text>
  <rect x="50" y="392" width="94" height="46" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="97" y="420" font-size="11.5" font-weight="600" text-anchor="middle" fill="#12402a">H.264</text>
  <rect x="300" y="384" width="92" height="30" rx="8" fill="#fff7e6" stroke="#e8cf9a"/><text x="346" y="404" font-size="10.5" font-weight="600" text-anchor="middle" fill="#5a3410">mp4</text>
  <rect x="300" y="418" width="92" height="30" rx="8" fill="#fff7e6" stroke="#e8cf9a"/><text x="346" y="438" font-size="10.5" font-weight="600" text-anchor="middle" fill="#5a3410">mkv</text>
  <path d="M144,415 L222,415 L222,399 L300,399" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M144,415 L222,415 L222,433 L300,433" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="410" y="419" font-size="9" fill="#5b7db1">封装层可换</text>

  <rect x="550" y="344" width="500" height="120" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="570" y="370" font-size="11.5" font-weight="600" fill="#1b2a4a">② 同一容器，可装不同编码</text>
  <rect x="570" y="392" width="94" height="46" rx="9" fill="#fff7e6" stroke="#e8cf9a"/><text x="617" y="420" font-size="11.5" font-weight="600" text-anchor="middle" fill="#5a3410">mp4</text>
  <rect x="820" y="384" width="94" height="30" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="867" y="404" font-size="10.5" font-weight="600" text-anchor="middle" fill="#12402a">H.264</text>
  <rect x="820" y="418" width="94" height="30" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="867" y="438" font-size="10.5" font-weight="600" text-anchor="middle" fill="#12402a">H.265</text>
  <path d="M664,415 L742,415 L742,399 L820,399" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M664,415 L742,415 L742,433 L820,433" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="932" y="419" font-size="9" fill="#5b7db1">编码流可换</text>

  <text x="30" y="500" font-size="9.5" fill="#86868b">容器不关心流内部怎么编码（只存字节 + 参数）；职责分离才能 remux 换容器不换编码 · 源码基准 FFmpeg(1588bce) · libavformat/</text>
</svg>
