<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">AVFilterGraph · 滤镜链接成图 —— 滤镜的容器 + 链接关系</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">libavfilter/avfilter.h:561 · 用图不用链:支持分支/合并任意拓扑(overlay 两输入、split 一入多出) · -vf 或 -filter_complex 描述这张图</text>

  <!-- 左:AVFilterGraph 结构说明卡(蓝=处理) -->
  <rect x="30" y="80" width="288" height="388" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="52" y="108" font-size="13" font-weight="700" fill="#1b2a4a">AVFilterGraph</text>
  <text x="52" y="126" font-size="9" fill="#5b7db1">avfilter.h:561 · 有向图容器</text>

  <rect x="52" y="140" width="244" height="52" rx="9" fill="#ffffff" stroke="#ececf1"/>
  <text x="66" y="162" font-size="10.5" font-weight="600" fill="#1d1d1f">filters / nb_filters</text>
  <text x="282" y="162" font-size="8.5" text-anchor="end" fill="#5b7db1">:565</text>
  <text x="66" y="181" font-size="9" fill="#6e6e73">图中所有滤镜实例</text>

  <rect x="52" y="202" width="244" height="66" rx="9" fill="#ffffff" stroke="#ececf1"/>
  <text x="66" y="224" font-size="10.5" font-weight="600" fill="#1d1d1f">AVFilterContext</text>
  <text x="66" y="243" font-size="9" fill="#6e6e73">一个滤镜实例(如 scale)</text>
  <text x="66" y="260" font-size="9" fill="#6e6e73">有输入/输出端口(pads)</text>

  <rect x="52" y="278" width="244" height="66" rx="9" fill="#ffffff" stroke="#ececf1"/>
  <text x="66" y="300" font-size="10.5" font-weight="600" fill="#1d1d1f">AVFilterLink</text>
  <text x="66" y="319" font-size="9" fill="#6e6e73">连输出端口 → 输入端口</text>
  <text x="66" y="336" font-size="9" fill="#6e6e73">链接成有向图</text>

  <text x="52" y="372" font-size="9.5" fill="#5b7db1">特殊滤镜:图与外部的接口边界</text>
  <text x="66" y="394" font-size="9" fill="#5b7db1">· buffersrc —— 源,喂帧入图</text>
  <text x="66" y="414" font-size="9" fill="#5b7db1">· buffersink —— 汇,取处理后的帧</text>
  <text x="52" y="446" font-size="9" fill="#8aa4c8">-vf 线性链 / -filter_complex 多路图</text>

  <!-- 右:图拓扑示例(线性 + overlay 合并 + split 分支) -->
  <rect x="342" y="80" width="708" height="388" rx="13" fill="#ffffff" stroke="#e4e4ea" filter="url(#soft)"/>
  <text x="364" y="108" font-size="12" font-weight="600" fill="#1d1d1f">图拓扑示例 · 节点=AVFilterContext,边=AVFilterLink</text>

  <!-- buffersrc 源 (绿) -->
  <rect x="364" y="130" width="112" height="52" rx="10" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="420" y="152" font-size="10.5" font-weight="600" text-anchor="middle" fill="#12402a">buffersrc</text>
  <text x="420" y="169" font-size="8.5" text-anchor="middle" fill="#2f6f4f">源:喂帧入图</text>

  <!-- scale (蓝) -->
  <rect x="510" y="130" width="100" height="52" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="560" y="152" font-size="10.5" font-weight="600" text-anchor="middle" fill="#1b2a4a">scale</text>
  <text x="560" y="169" font-size="8.5" text-anchor="middle" fill="#5b7db1">缩放</text>

  <!-- split 一入多出 (蓝) -->
  <rect x="644" y="130" width="100" height="52" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="694" y="152" font-size="10.5" font-weight="600" text-anchor="middle" fill="#1b2a4a">split</text>
  <text x="694" y="169" font-size="8.5" text-anchor="middle" fill="#5b7db1">1 入 2 出</text>

  <!-- 分支上:crop (蓝) -->
  <rect x="792" y="112" width="100" height="44" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="842" y="139" font-size="10" font-weight="600" text-anchor="middle" fill="#1b2a4a">crop</text>

  <!-- 分支下:水印源 buffersrc2 (绿) -->
  <rect x="792" y="220" width="100" height="52" rx="10" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="842" y="242" font-size="9.5" font-weight="600" text-anchor="middle" fill="#12402a">buffersrc</text>
  <text x="842" y="259" font-size="8" text-anchor="middle" fill="#2f6f4f">水印输入</text>

  <!-- overlay 两输入合并 (蓝) -->
  <rect x="924" y="150" width="104" height="66" rx="10" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="976" y="176" font-size="10.5" font-weight="600" text-anchor="middle" fill="#1b2a4a">overlay</text>
  <text x="976" y="194" font-size="8.5" text-anchor="middle" fill="#5b7db1">2 入合 1</text>

  <!-- buffersink 汇 (绿) -->
  <rect x="924" y="320" width="104" height="52" rx="10" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="976" y="342" font-size="10.5" font-weight="600" text-anchor="middle" fill="#12402a">buffersink</text>
  <text x="976" y="359" font-size="8.5" text-anchor="middle" fill="#2f6f4f">汇:取帧出图</text>

  <!-- 链接边 -->
  <path d="M476,156 L508,156" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M610,156 L642,156" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <!-- split → crop (上分支) -->
  <path d="M744,146 L768,134 L790,134" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <!-- crop → overlay (主输入) -->
  <path d="M892,134 L910,134 L910,170 L922,170" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <!-- buffersrc2 水印 → overlay (第二输入) -->
  <path d="M892,240 L910,240 L910,198 L922,198" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <!-- overlay → buffersink -->
  <path d="M976,216 L976,318" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <!-- split 下分支闲置端(示意到水印合流前的说明) -->
  <text x="694" y="205" font-size="8" text-anchor="middle" fill="#86868b">split 第二路</text>
  <text x="694" y="219" font-size="8" text-anchor="middle" fill="#86868b">可另作他用</text>
  <path d="M694,182 L694,190" stroke="#c7c7cc" stroke-width="1.2" fill="none" marker-end="url(#ar)"/>

  <text x="364" y="308" font-size="10" font-weight="600" fill="#1d1d1f">线性链是常态,图能表达任意拓扑</text>
  <text x="364" y="330" font-size="9" fill="#6e6e73">· overlay 需两输入(主画面 + 水印)——合并</text>
  <text x="364" y="350" font-size="9" fill="#6e6e73">· split 一输入多输出——分支</text>
  <text x="364" y="370" font-size="9" fill="#6e6e73">· 链只能线性,图能表达分支/合并</text>
  <text x="364" y="398" font-size="9" fill="#86868b">buffersrc/buffersink 不是普通滤镜,是图的入口/出口接口</text>
  <text x="364" y="424" font-size="9" fill="#86868b">-vf "scale=1280:720,crop=640:480" 描述这张图的一条线性链</text>
  <text x="364" y="448" font-size="9" fill="#86868b">-filter_complex 描述含分支/合并的复杂图</text>

  <text x="30" y="504" font-size="9" fill="#a1a1a6">源码基准 FFmpeg(1588bce) · Graph 持 filters(AVFilterContext) · Link 连端口成有向图 · buffersrc 源/buffersink 汇 · 支持分支合并</text>
</svg>
