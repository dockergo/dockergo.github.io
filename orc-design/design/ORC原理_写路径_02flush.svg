<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1000" height="600" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">ORC 写路径 · addRowBatch 主循环 与 flushStripe 触发 (两条件 OR)</text>

  <!-- input label -->
  <text x="96" y="134" font-size="9.5" fill="#5b7db1" text-anchor="middle">引擎喂列式批</text>
  <text x="96" y="147" font-size="9" fill="#a1a1a6" text-anchor="middle">(默认 1024 行)</text>
  <path d="M60,158 L203,158" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- ===== main loop container ===== -->
  <rect x="185" y="92" width="660" height="96" rx="12" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="200" y="110" font-size="11" font-weight="600" fill="#2f6f4f">addRowBatch 主循环 (WriterImpl.java:733)</text>

  <rect x="203" y="135" width="185" height="46" rx="9" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="295" y="155" font-size="10.5" font-weight="600" fill="#12402a" text-anchor="middle">根 TreeWriter 编码</text>
  <text x="295" y="171" font-size="9" fill="#2f6f4f" text-anchor="middle">各列 → 各 stream</text>

  <rect x="406" y="135" width="195" height="46" rx="9" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="503" y="155" font-size="10.5" font-weight="600" fill="#12402a" text-anchor="middle">rowsInStripe += size</text>
  <text x="503" y="171" font-size="9" fill="#2f6f4f" text-anchor="middle">累加行数 (:784)</text>

  <rect x="619" y="135" width="208" height="46" rx="9" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="723" y="155" font-size="10.5" font-weight="600" fill="#12402a" text-anchor="middle">超 stride 建 row index</text>
  <text x="723" y="171" font-size="9" fill="#2f6f4f" text-anchor="middle">createRowIndexEntry (:761)</text>

  <path d="M388,158 L406,158" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M601,158 L619,158" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- loop → checkMemory -->
  <path d="M497,188 L497,232" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="507" y="212" font-size="9.5" fill="#a1a1a6">每批末</text>

  <!-- checkMemory (blue = MemoryManager coordination) -->
  <rect x="330" y="232" width="335" height="50" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="497" y="253" font-size="11.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">memoryManager.checkMemory (:787)</text>
  <text x="497" y="270" font-size="9" fill="#5b7db1" text-anchor="middle">MemoryManager(:112) 全局管所有 writer 内存配额</text>

  <path d="M497,282 L497,318" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- ===== decision: flushStripe trigger (red) ===== -->
  <rect x="225" y="318" width="545" height="96" rx="12" fill="#f9ecec" stroke="#e8c9c9"/>
  <text x="497" y="338" font-size="11" font-weight="600" fill="#7a2230" text-anchor="middle">flushStripe 触发判定 (WriterImpl.java:349) — 任一满足即 flush</text>

  <rect x="245" y="352" width="235" height="46" rx="9" fill="#ffffff" stroke="#e8c9c9" filter="url(#soft)"/>
  <text x="362" y="372" font-size="10.5" font-weight="600" fill="#7a2230" text-anchor="middle">size &gt; memoryLimit</text>
  <text x="362" y="388" font-size="9" fill="#a85560" text-anchor="middle">内存超限</text>

  <text x="492" y="379" font-size="12" font-weight="600" fill="#7a2230" text-anchor="middle">OR</text>

  <rect x="505" y="352" width="245" height="46" rx="9" fill="#ffffff" stroke="#e8c9c9" filter="url(#soft)"/>
  <text x="627" y="372" font-size="10.5" font-weight="600" fill="#7a2230" text-anchor="middle">rowsInStripe &gt;= stripeRowCount</text>
  <text x="627" y="388" font-size="9" fill="#a85560" text-anchor="middle">行数超限</text>

  <!-- YES → flushStripe -->
  <path d="M770,366 L830,366" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="800" y="358" font-size="9.5" fill="#a1a1a6" text-anchor="middle">满足</text>

  <rect x="830" y="336" width="150" height="60" rx="11" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="905" y="360" font-size="11.5" font-weight="600" fill="#5a3410" text-anchor="middle">flushStripe (:559)</text>
  <text x="905" y="378" font-size="9" fill="#93762e" text-anchor="middle">落一个 stripe</text>

  <!-- loop-back from flushStripe to top of loop -->
  <path d="M905,336 L905,70 L497,70 L497,92" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="701" y="62" font-size="9.5" fill="#a1a1a6" text-anchor="middle">补末 createRowIndexEntry(:561) → 落盘 → rowsInStripe=0(:602) 重新累加下一 stripe</text>

  <!-- NO → continue loop -->
  <path d="M225,366 L110,366 L110,168 L185,168" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="110" y="358" font-size="9.5" fill="#a1a1a6" text-anchor="middle">均未超</text>
  <text x="110" y="382" font-size="9" fill="#a1a1a6" text-anchor="middle">继续累加,取下一批</text>

  <!-- ===== bottom notes ===== -->
  <rect x="40" y="452" width="920" height="126" rx="12" fill="#f7f7f9" stroke="#e3e3e8"/>
  <text x="60" y="476" font-size="11" font-weight="600" fill="#1d1d1f">机制要点</text>
  <text x="60" y="502" font-size="10.5" fill="#1d1d1f"><tspan font-weight="600">主循环</tspan>:根 TreeWriter 编码进各 stream → rowsInStripe += batch.size(:784) → 超 row index stride 切段建 createRowIndexEntry(:761) → 每批末 checkMemory(:787)。</text>
  <text x="60" y="528" font-size="10.5" fill="#1d1d1f"><tspan font-weight="600">触发</tspan>:size &gt; memoryLimit(内存超限) <tspan font-weight="600" fill="#7a2230">或</tspan> rowsInStripe &gt;= stripeRowCount(行数超限) 任一满足 → flushStripe(:559);落盘后 rowsInStripe=0(:602) 重来。</text>
  <text x="60" y="554" font-size="10.5" fill="#1d1d1f"><tspan font-weight="600">为什么两阈值</tspan>:stripe 默认 <tspan font-weight="600" fill="#5a3410">64MB(OrcConf.java:32 STRIPE_SIZE)</tspan>控字节体量;行数上限防超宽表单 stripe 行太少;MemoryManager 让多 writer 共享内存不 OOM。</text>
</svg>
