<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="980" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">类型转换与 PPD 安全：转换保序/保等值才下推，不安全的列退回引擎精过滤</text>

  <!-- 列类型演进 -->
  <rect x="60" y="58" width="390" height="118" rx="12" fill="#f7f7f9" stroke="#e3e3e8" filter="url(#soft)"/>
  <text x="80" y="82" font-size="12" font-weight="600" fill="#1d1d1f">列类型演进（file 类型 → reader 类型）</text>
  <text x="80" y="106" font-size="10.5" fill="#6e6e73">安全提升：int → long、数值/字符串放宽</text>
  <text x="80" y="126" font-size="10.5" fill="#6e6e73">不保序：如 string → date（边界变化）</text>
  <text x="80" y="150" font-size="10" fill="#6e6e73">演进允许列类型变化，但要判是否影响下推正确性</text>

  <!-- populatePpdSafeConversion -->
  <rect x="530" y="58" width="390" height="118" rx="12" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="550" y="82" font-size="12" font-weight="600" fill="#5a3410">预算每列的 PPD 安全标记</text>
  <text x="550" y="106" font-size="10.5" fill="#93762e">populatePpdSafeConversion（SchemaEvolution.java:131）</text>
  <text x="550" y="126" font-size="10.5" fill="#93762e">→ ppdSafeConversion[]（:61）逐列缓存</text>
  <text x="550" y="150" font-size="10" fill="#93762e">按转换是否保序/保等值置位</text>

  <path d="M255,176 L255,204 L470,204 L470,224" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M725,176 L725,204 L510,204 L510,224" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 判定 -->
  <rect x="320" y="224" width="340" height="72" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="490" y="250" font-size="12" font-weight="600" fill="#3d2a5a" text-anchor="middle">isPPDSafeConversion(fileColId)（:303）</text>
  <text x="490" y="272" font-size="10.5" fill="#8a6db3" text-anchor="middle">该列转换保序 且 保等值？</text>
  <text x="490" y="290" font-size="9.5" fill="#8a6db3" text-anchor="middle">读端检查点 RecordReaderImpl.java:1217（pickRowGroups 前）</text>

  <!-- branches -->
  <path d="M320,260 L200,260 L200,332" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="238" y="253" font-size="10" fill="#2f6f4f">是（安全）</text>
  <path d="M660,260 L780,260 L780,332" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="700" y="253" font-size="10" fill="#a85560">否（不安全）</text>

  <!-- 安全分支 -->
  <rect x="60" y="332" width="390" height="150" rx="12" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="80" y="356" font-size="12" font-weight="600" fill="#12402a">安全 → 对该列下推谓词</text>
  <text x="80" y="380" font-size="10.5" fill="#2f6f4f">如 int → long：值等价，保序保等值</text>
  <text x="80" y="402" font-size="10.5" fill="#2f6f4f">旧类型统计仍可正确剪枝</text>
  <text x="80" y="424" font-size="10.5" fill="#12402a"><tspan font-weight="600">→ 参与 stripe / row-group 剪枝</tspan></text>
  <text x="80" y="448" font-size="10" fill="#2f6f4f">用 min/max + 布隆跳整块，减 IO</text>
  <text x="80" y="470" font-size="10" fill="#2f6f4f">下推率高，扫得快</text>

  <!-- 不安全分支 -->
  <rect x="530" y="332" width="390" height="150" rx="12" fill="#f9ecec" stroke="#e8c9c9" filter="url(#soft)"/>
  <text x="550" y="356" font-size="12" font-weight="600" fill="#7a2230">不安全 → 该列不下推</text>
  <text x="550" y="380" font-size="10.5" fill="#a85560">如 string → date：边界变化，不保序</text>
  <text x="550" y="402" font-size="10.5" fill="#a85560">拿旧类型统计剪新谓词会漏行</text>
  <text x="550" y="424" font-size="10.5" fill="#7a2230"><tspan font-weight="600">→ 退回引擎逐行精确过滤</tspan></text>
  <text x="550" y="448" font-size="10" fill="#a85560">不剪该列，宁慢勿错</text>
  <text x="550" y="470" font-size="10" fill="#a85560">防误剪掉真正命中的行</text>

  <text x="60" y="512" font-size="10.5" fill="#6e6e73">为什么判 PPD 安全：列统计（min/max）是按<tspan font-weight="600" fill="#1d1d1f">文件旧类型</tspan>算的；若转换不保序，用旧统计剪新谓词</text>
  <text x="60" y="532" font-size="10.5" fill="#6e6e73">会漏掉命中行——宁可对该列不下推、也不能读错。安全的列照常下推，正确性与性能两全。</text>
</svg>
