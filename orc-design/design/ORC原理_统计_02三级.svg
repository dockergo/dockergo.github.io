<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">ORC 列统计 · 三粒度 (由粗到细逐层剪)</text>
  <text x="30" y="50" font-size="12" fill="#a1a1a6">文件级 (读不读整文件) → stripe 级 (跳 64MB) → row-group 级 (跳 10000 行);粗排整文件,细排 10000 行</text>

  <!-- read side: three levels, top-down coarse to fine -->
  <text x="80" y="86" font-size="12" font-weight="600" fill="#1d1d1f">读侧 · 逐级剪 (每层代价小收益大)</text>

  <!-- file level -->
  <rect x="60" y="98" width="600" height="80" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="85" y="124" font-size="12" font-weight="600" fill="#1d1d1f">文件级 &#183; Footer.statistics</text>
  <text x="85" y="146" font-size="9.5" fill="#6e6e73">WriterImpl.writeFileStatistics (WriterImpl.java:709)</text>
  <text x="85" y="165" font-size="9.5" fill="#6e6e73">最粗 &#8212; 决定读不读整个文件</text>
  <rect x="560" y="118" width="80" height="42" rx="9" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="600" y="144" font-size="10" font-weight="600" fill="#1b2a4a" text-anchor="middle">整文件</text>

  <path d="M360,178 L360,204" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="380" y="196" font-size="9" fill="#a1a1a6">存活文件</text>

  <!-- stripe level -->
  <rect x="60" y="206" width="600" height="80" rx="12" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="85" y="232" font-size="12" font-weight="600" fill="#5a3410">stripe 级 &#183; StripeStatistics</text>
  <text x="85" y="254" font-size="9.5" fill="#93762e">PhysicalFsWriter 的 stripeStats[] (PhysicalFsWriter.java:164)</text>
  <text x="85" y="273" font-size="9.5" fill="#93762e">中 &#8212; 跳整个 stripe</text>
  <rect x="560" y="226" width="80" height="42" rx="9" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="600" y="252" font-size="10" font-weight="600" fill="#5a3410" text-anchor="middle">64MB</text>

  <path d="M360,286 L360,312" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="382" y="304" font-size="9" fill="#a1a1a6">存活 stripe</text>

  <!-- row-group level -->
  <rect x="60" y="314" width="600" height="80" rx="12" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="85" y="340" font-size="12" font-weight="600" fill="#4a1414">row-group 级 &#183; RowIndexEntry.statistics</text>
  <text x="85" y="362" font-size="9.5" fill="#7a2a2a">每 10000 行一条</text>
  <text x="85" y="381" font-size="9.5" fill="#7a2a2a">最细 &#8212; 跳 row group</text>
  <rect x="560" y="334" width="80" height="42" rx="9" fill="#fbeaea" stroke="#e7c3c3"/>
  <text x="600" y="360" font-size="10" font-weight="600" fill="#4a1414" text-anchor="middle">10000 行</text>

  <!-- write side -->
  <rect x="700" y="98" width="320" height="296" rx="14" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="720" y="124" font-size="12" font-weight="600" fill="#2c5a3a">写侧 &#183; 边写边攒 (TreeWriterBase)</text>
  <text x="720" y="147" font-size="9.5" fill="#2f6f4f">TreeWriterBase.java:58 每列同时建</text>

  <rect x="720" y="162" width="280" height="88" rx="11" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="860" y="188" font-size="11" font-weight="600" fill="#1d1d1f" text-anchor="middle">indexStatistics</text>
  <text x="860" y="209" font-size="9.5" fill="#6e6e73" text-anchor="middle">per row group (每 10000 行)</text>
  <text x="860" y="230" font-size="9.5" fill="#6e6e73" text-anchor="middle">→ 写入 RowIndexEntry</text>

  <rect x="720" y="262" width="280" height="88" rx="11" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="860" y="288" font-size="11" font-weight="600" fill="#1d1d1f" text-anchor="middle">fileStatistics</text>
  <text x="860" y="309" font-size="9.5" fill="#6e6e73" text-anchor="middle">整列累计</text>
  <text x="860" y="330" font-size="9.5" fill="#6e6e73" text-anchor="middle">→ 写入 Footer 文件级统计</text>

  <text x="540" y="440" font-size="9.5" fill="#a1a1a6" text-anchor="middle">三粒度自动建无需配:粗粒度先排除整文件、中排除 64MB、细排除 10000 行 &#8212; 由粗到细逐层剪,每层代价小收益大</text>
  <text x="540" y="462" font-size="9.5" fill="#a1a1a6" text-anchor="middle">范围查询用各级 min/max;等值查询 (col=5) 靠 row-group 布隆过滤器补位 (见布隆篇)</text>
</svg>
