<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="960" height="600" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="700" fill="#1d1d1f">ORC 原理 · 压缩 · OutStream.spill 压一块流水（isOriginal 回退）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">OutStream（OutStream.java:42，同时处理压缩与加密）攒满一块就 codec.compress，压得动写压缩块、压不动存原文——保证块绝不膨胀</text>

  <!-- start: buffer full -->
  <rect x="360" y="76" width="240" height="60" rx="12" fill="#f7f7f9" stroke="#e3e3e8" filter="url(#soft)"/>
  <text x="480" y="102" font-size="10.5" font-weight="700" text-anchor="middle" fill="#1d1d1f">缓冲区攒满一块（256KB）</text>
  <text x="480" y="120" font-size="8.6" text-anchor="middle" fill="#6e6e73">spill()（OutStream.java:375）触发</text>

  <path d="M480,136 L480,168" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>

  <!-- compress step -->
  <rect x="350" y="170" width="260" height="60" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="480" y="196" font-size="10.5" font-weight="700" text-anchor="middle" fill="#1b2a4a">codec.compress(current, …)</text>
  <text x="480" y="214" font-size="8.6" text-anchor="middle" fill="#5b7db1">尝试压缩当前缓冲区字节</text>

  <path d="M480,230 L480,262" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>

  <!-- decision diamond -->
  <path d="M480,258 L588,318 L480,378 L372,318 Z" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="480" y="308" font-size="10" font-weight="700" text-anchor="middle" fill="#5a3410">压得动？</text>
  <text x="480" y="326" font-size="8.4" text-anchor="middle" fill="#93762e">压后 &lt; 原文</text>
  <text x="480" y="342" font-size="8.4" text-anchor="middle" fill="#93762e">→ 返回 true</text>

  <!-- YES branch (left) -->
  <path d="M372,318 L230,318" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <text x="300" y="308" font-size="9" font-weight="700" text-anchor="middle" fill="#2f6f4f">是（可压缩）</text>
  <rect x="30" y="284" width="200" height="120" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="130" y="308" font-size="10.5" font-weight="700" text-anchor="middle" fill="#12402a">commitCompress()</text>
  <text x="130" y="324" font-size="8.4" text-anchor="middle" fill="#2f6f4f">OutStream.java:318</text>
  <rect x="46" y="334" width="168" height="30" rx="7" fill="#fff" stroke="#cfe6d5"/>
  <text x="130" y="353" font-size="9" font-weight="700" text-anchor="middle" fill="#12402a">写头 isOriginal = 0</text>
  <text x="130" y="382" font-size="8.4" text-anchor="middle" fill="#2f6f4f">&#43; 写入压缩后的字节</text>
  <text x="130" y="396" font-size="8.4" text-anchor="middle" fill="#2f6f4f">（更小，节省空间）</text>

  <!-- NO branch (right) -->
  <path d="M588,318 L730,318" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <text x="659" y="308" font-size="9" font-weight="700" text-anchor="middle" fill="#a85560">否（压后 ≥ 原文）</text>
  <rect x="730" y="284" width="200" height="120" rx="13" fill="#f9ecec" stroke="#e8c9c9" filter="url(#soft)"/>
  <text x="830" y="308" font-size="10.5" font-weight="700" text-anchor="middle" fill="#7a2230">abortCompress()</text>
  <text x="830" y="324" font-size="8.4" text-anchor="middle" fill="#a85560">&#43; writeHeader(…, true)</text>
  <text x="830" y="337" font-size="8.4" text-anchor="middle" fill="#a85560">OutStream.java:410</text>
  <rect x="746" y="344" width="168" height="30" rx="7" fill="#fff" stroke="#e8c9c9"/>
  <text x="830" y="363" font-size="9" font-weight="700" text-anchor="middle" fill="#7a2230">写头 isOriginal = 1</text>
  <text x="830" y="392" font-size="8.4" text-anchor="middle" fill="#a85560">&#43; 写入未压缩原文字节</text>

  <!-- converge to output block -->
  <path d="M130,404 L130,452 L480,452" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <path d="M830,404 L830,452 L480,452" stroke="#c7c7cc" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <rect x="360" y="440" width="240" height="56" rx="12" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="480" y="464" font-size="10.5" font-weight="700" text-anchor="middle" fill="#12402a">输出"块头 &#43; 块"到 stream</text>
  <text x="480" y="482" font-size="8.4" text-anchor="middle" fill="#2f6f4f">块头长度记本块字节数，供 reader seek</text>

  <!-- guarantee note -->
  <rect x="30" y="520" width="900" height="64" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="48" y="544" font-size="11" font-weight="700" fill="#3d2a5a">为什么要回退</text>
  <text x="48" y="565" font-size="9" fill="#8a6db3">通用 codec 对高熵数据（已压图片、随机 id）会越压越大；isOriginal 位让 ORC 在<tspan font-weight="700" fill="#3d2a5a">块粒度上择优</tspan>——每块独立判断压/不压，</text>
  <text x="48" y="580" font-size="9" fill="#8a6db3">保证"压缩绝不让块变大"，不会因个别高熵块拖累整体；读时看 isOriginal 位决定是否解压。</text>
</svg>
