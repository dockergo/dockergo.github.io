<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">ORC 接触面 · TypeDescription 类型树 + 列 ID</text>
  <text x="30" y="50" font-size="12" fill="#a1a1a6">Category 18 种 (BOOLEAN..TIMESTAMP_INSTANT 含 LIST/MAP/STRUCT/UNION/DECIMAL);列 ID = 前序深度优先编号 root=0</text>

  <!-- type tree (left) -->
  <text x="70" y="88" font-size="12" font-weight="600" fill="#1d1d1f">类型树 (createList/Map/Union/Struct 连父子, :685)</text>

  <!-- root struct id=0 -->
  <rect x="60" y="100" width="180" height="52" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="150" y="123" font-size="11" font-weight="600" fill="#3d2a5a" text-anchor="middle">STRUCT (root)</text>
  <text x="150" y="142" font-size="9.5" fill="#8a72b0" text-anchor="middle">id=0 &#183; maxId=7</text>

  <!-- children level -->
  <path d="M150,152 L150,176 L340,176 L340,198" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M150,152 L150,176 L490,176 L490,198" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M150,152 L150,176 L110,176 L110,198" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="40" y="200" width="140" height="50" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="110" y="222" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">id: INT</text>
  <text x="110" y="240" font-size="9" fill="#5b7db1" text-anchor="middle">列 ID=1</text>

  <rect x="270" y="200" width="140" height="50" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="340" y="222" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">name: VARCHAR</text>
  <text x="340" y="240" font-size="9" fill="#5b7db1" text-anchor="middle">列 ID=2 &#183; maximumLength</text>

  <rect x="420" y="200" width="150" height="50" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="495" y="222" font-size="10.5" font-weight="600" fill="#3d2a5a" text-anchor="middle">addr: STRUCT</text>
  <text x="495" y="240" font-size="9" fill="#8a72b0" text-anchor="middle">id=3 &#183; maxId=5</text>

  <!-- addr children -->
  <path d="M495,250 L495,268 L455,268 L455,286" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M495,250 L495,268 L560,268 L560,286" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="385" y="288" width="140" height="50" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="455" y="310" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">city: STRING</text>
  <text x="455" y="328" font-size="9" fill="#5b7db1" text-anchor="middle">列 ID=4</text>

  <rect x="530" y="288" width="140" height="50" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="600" y="310" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">zip: INT</text>
  <text x="600" y="328" font-size="9" fill="#5b7db1" text-anchor="middle">列 ID=5</text>

  <!-- tags list under root -->
  <path d="M150,152 L150,364 L110,364 L110,382" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <rect x="40" y="384" width="150" height="50" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="115" y="406" font-size="10.5" font-weight="600" fill="#3d2a5a" text-anchor="middle">tags: LIST</text>
  <text x="115" y="424" font-size="9" fill="#8a72b0" text-anchor="middle">id=6 &#183; maxId=7</text>

  <path d="M190,409 L246,409" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <rect x="250" y="384" width="160" height="50" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="330" y="406" font-size="10.5" font-weight="600" fill="#1b2a4a" text-anchor="middle">element: STRING</text>
  <text x="330" y="424" font-size="9" fill="#5b7db1" text-anchor="middle">列 ID=7</text>

  <!-- right: numbering rule + facts -->
  <rect x="700" y="100" width="320" height="150" rx="12" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="860" y="126" font-size="12" font-weight="600" fill="#2c5a3a" text-anchor="middle">assignIds() 前序编号 (:670)</text>
  <text x="860" y="152" font-size="10" fill="#2f6f4f" text-anchor="middle">先给自己 id, 再递归子</text>
  <text x="860" y="174" font-size="10" fill="#2f6f4f" text-anchor="middle">存 maxId 记子树范围 [id, maxId]</text>
  <text x="860" y="200" font-size="9.5" fill="#2f6f4f" text-anchor="middle">前序序列: 0 → 1 → 2 → 3 → 4 → 5 → 6 → 7</text>
  <text x="860" y="224" font-size="9.5" fill="#2f6f4f" text-anchor="middle">稳定编号,与列名/位置解耦</text>

  <rect x="700" y="266" width="320" height="130" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="860" y="292" font-size="12" font-weight="600" fill="#1d1d1f" text-anchor="middle">带参类型 &amp; 列 ID 用途</text>
  <text x="860" y="318" font-size="10" fill="#6e6e73" text-anchor="middle">char / varchar 带 maximumLength</text>
  <text x="860" y="340" font-size="10" fill="#6e6e73" text-anchor="middle">decimal 带 precision / scale</text>
  <text x="860" y="366" font-size="10" fill="#6e6e73" text-anchor="middle">列 ID 贯穿 stream / 统计 / 索引定位</text>
  <text x="860" y="386" font-size="9" fill="#a1a1a6" text-anchor="middle">子树 [id, maxId] 支持整子树操作</text>

  <text x="540" y="480" font-size="9.5" fill="#a1a1a6" text-anchor="middle">TypeDescription.java:118 &#183; Category 18 种含 struct/list/map/union/decimal;整个格式靠列 ID 定位 (stream/统计/索引都按列 ID)</text>
</svg>
