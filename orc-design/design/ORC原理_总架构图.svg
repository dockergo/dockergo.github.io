<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="990" viewBox="0 0 1080 990" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.08"/></filter>
    <marker id="aHot" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#0a84ff"/></marker>
    <marker id="aCtl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#7c5fe6"/></marker>
    <marker id="aState" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#0f9e8e"/></marker>
    <marker id="aFail" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#e8730f"/></marker>
  </defs>

  <rect width="1080" height="990" fill="#fbfbfd"/>

  <!-- ===== 标题条 ===== -->
  <rect x="0" y="0" width="1080" height="48" fill="#f4f5f7" stroke="#e6e6eb"/>
  <text x="24" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Apache ORC 总架构 · 自描述列式文件格式（单文件剖面）</text>
  <text x="470" y="30" font-size="11.5" fill="#8a8a90">列 ID（前序,根=0）串起 类型/流/统计/索引/SARG · 尾部自定位,读文件只需文件自身</text>

  <!-- ===== ① 顶部 读写 API + 类型系统（接触面） ===== -->
  <rect x="24" y="60" width="1032" height="70" rx="12" fill="#eef0f3" stroke="#d2d6dd" filter="url(#soft)" data-tid="ORC原理_接触面_读写API与类型系统"/>
  <rect x="24" y="60" width="4" height="70" rx="2" fill="#8a8a90"/>
  <text x="44" y="82" font-size="12" font-weight="700" fill="#1d1d1f">库接触面 · 读写 API + 类型系统（ORC 不是引擎，只把 batch 编解码进/出一个文件）</text>
  <rect x="44" y="92" width="230" height="30" rx="7" fill="#fff" stroke="#d2d6dd" data-tid="ORC原理_接触面_读写API与类型系统"/>
  <text x="58" y="111" font-size="9.5" fill="#33373e">createWriter / add(ColumnVectorBatch)</text>
  <rect x="286" y="92" width="230" height="30" rx="7" fill="#fff" stroke="#d2d6dd" data-tid="ORC原理_接触面_读写API与类型系统"/>
  <text x="300" y="111" font-size="9.5" fill="#33373e">createReader / next(batch) 1024/批</text>
  <rect x="528" y="92" width="300" height="30" rx="7" fill="#eaf6f2" stroke="#b9dfd8" data-tid="ORC原理_接触面_读写API与类型系统"/>
  <text x="542" y="111" font-size="9.5" fill="#0f6b5e">TypeDescription 树 · assignIds 前序 root=0（TypeImpl.cc:94）</text>
  <text x="1036" y="82" font-size="9.5" fill="#8a8a90" text-anchor="end">Reader.cc:1631 · Writer.cc:363</text>

  <!-- ===== 文件物理剖面 大框 ===== -->
  <text x="24" y="158" font-size="11" font-weight="600" fill="#8a8a90">单个 .orc 文件物理布局（左→右按字节偏移） · 规范 ORCv1.md</text>

  <!-- Header -->
  <rect x="24" y="168" width="70" height="470" rx="10" fill="#eef0f3" stroke="#d2d6dd" filter="url(#soft)" data-tid="ORC原理_支撑_文件布局"/>
  <rect x="24" y="168" width="4" height="470" rx="2" fill="#8a8a90"/>
  <text x="59" y="396" font-size="12" font-weight="700" fill="#1d1d1f" transform="rotate(-90 59 396)">Header · "ORC" 3 字节</text>

  <!-- Body = N × Stripe -->
  <rect x="106" y="168" width="600" height="470" rx="12" fill="#ffffff" stroke="#d0d0d6" filter="url(#soft)"/>
  <text x="126" y="190" font-size="12" font-weight="700" fill="#1d1d1f">Body · N × Stripe（默认 stripeSize 64M，stripe 只含整行、行不跨界）</text>

  <!-- Stripe 1 竖切三层 -->
  <rect x="126" y="204" width="264" height="410" rx="11" fill="#fafbfc" stroke="#d8dce2" data-tid="ORC原理_支撑_文件布局"/>
  <text x="140" y="224" font-size="10.5" font-weight="700" fill="#33373e">Stripe（放大剖面）</text>

  <!-- ① Index streams（State：置最前） -->
  <rect x="140" y="234" width="236" height="104" rx="9" fill="#e6f4f1" stroke="#b9dfd8" filter="url(#soft)" data-tid="ORC原理_支撑_行组与索引"/>
  <rect x="140" y="234" width="4" height="104" rx="2" fill="#0f9e8e"/>
  <text x="156" y="253" font-size="10" font-weight="700" fill="#0f6b5e">① Index streams（置最前）</text>
  <text x="154" y="271" font-size="8.5" fill="#2f6f5f">ROW_INDEX + BLOOM_FILTER_UTF8</text>
  <text x="154" y="286" font-size="8.5" fill="#2f6f5f">RowIndexEntry = positions[] + 统计</text>
  <text x="154" y="301" font-size="8.5" fill="#2f6f5f">row-group = 10000 行（seek 粒度）</text>
  <text x="154" y="316" font-size="8" fill="#4c8567">ColumnWriter.cc:174 createRowIndexEntry</text>
  <text x="154" y="330" font-size="8" fill="#7fae9f" data-tid="ORC原理_支撑_列统计与布隆">流式读不读它，仅 PPD/seek 时加载</text>

  <!-- ② Data streams（Hot 主体） -->
  <rect x="140" y="346" width="236" height="150" rx="9" fill="#e9f2ff" stroke="#a9ccf5" filter="url(#soft)" data-tid="ORC原理_支撑_列编码"/>
  <rect x="140" y="346" width="4" height="150" rx="2" fill="#0a84ff"/>
  <text x="156" y="365" font-size="10" font-weight="700" fill="#0a3d78">② Data streams（按列分工）</text>
  <text x="154" y="383" font-size="8.5" fill="#2a5a92">PRESENT（非空可省）/ DATA</text>
  <text x="154" y="398" font-size="8.5" fill="#2a5a92">LENGTH / DICTIONARY_DATA / SECONDARY</text>
  <text x="154" y="416" font-size="8.5" fill="#2a5a92">整数 RLE v1 / v2（4 子编码：</text>
  <text x="164" y="430" font-size="8" fill="#4a7ab0" data-tid="ORC原理_支撑_列编码">SHORT_REPEAT/DIRECT/PATCHED_BASE/DELTA）</text>
  <text x="154" y="448" font-size="8.5" fill="#2a5a92">字符串 字典 vs 直接（按基数比自适应）</text>
  <text x="154" y="464" font-size="8" fill="#4a7ab0">每流分块压缩 · ZSTD 默认 · 块 64K</text>
  <text x="154" y="480" font-size="8" fill="#8a8a90">3 字节块头 length&lt;&lt;1|isOriginal（Compression.cc:75）</text>

  <!-- ③ Stripe Footer（State：唯一真相） -->
  <rect x="140" y="504" width="236" height="98" rx="9" fill="#e6f4f1" stroke="#b9dfd8" data-tid="ORC原理_支撑_文件布局"/>
  <rect x="140" y="504" width="4" height="98" rx="2" fill="#0f9e8e"/>
  <text x="156" y="523" font-size="10" font-weight="700" fill="#0f6b5e">③ Stripe Footer</text>
  <text x="154" y="541" font-size="8.5" fill="#2f6f5f">streams[]（kind+column+length）</text>
  <text x="154" y="556" font-size="8.5" fill="#2f6f5f">column encodings</text>
  <text x="154" y="571" font-size="8.5" fill="#2f6f5f">= 流定位唯一真相</text>
  <text x="154" y="588" font-size="8" fill="#4c8567">getStripeFooter · Reader.cc:604</text>

  <!-- Stripe 2/3 省略堆叠 -->
  <rect x="402" y="204" width="140" height="410" rx="11" fill="#fafbfc" stroke="#e0e3e8" data-tid="ORC原理_支撑_行组与索引"/>
  <text x="472" y="404" font-size="10" fill="#8a8a90" text-anchor="middle" transform="rotate(-90 472 404)">Stripe 2 · index→data→footer</text>
  <rect x="552" y="204" width="142" height="410" rx="11" fill="#fafbfc" stroke="#e6e8ec" data-tid="ORC原理_支撑_行组与索引"/>
  <text x="623" y="404" font-size="10" fill="#a1a1a6" text-anchor="middle" transform="rotate(-90 623 404)">Stripe N …</text>

  <!-- Tail（反向自定位，State） -->
  <rect x="718" y="168" width="338" height="470" rx="12" fill="#e6f4f1" stroke="#b9dfd8" filter="url(#soft)" data-tid="ORC原理_支撑_文件布局"/>
  <rect x="718" y="168" width="4" height="470" rx="2" fill="#0f9e8e"/>
  <text x="738" y="190" font-size="12" font-weight="700" fill="#0f6b5e">Tail · 反向自定位（读文件从这里开始）</text>

  <rect x="738" y="204" width="300" height="86" rx="9" fill="#eaf6f2" stroke="#b9dfd8" data-tid="ORC原理_支撑_列统计与布隆"/>
  <text x="752" y="223" font-size="10" font-weight="700" fill="#0f6b5e">Metadata · stripe 级统计</text>
  <text x="750" y="241" font-size="8.5" fill="#2f6f5f">每 stripe 的列统计（min/max/count/sum/hasNull）</text>
  <text x="750" y="257" font-size="8.5" fill="#2f6f5f">三级统计之中层 · 喂 stripe 级剪枝</text>
  <text x="750" y="275" font-size="8" fill="#4c8567">Writer.cc:547 add_stripe_stats · Statistics.cc:438</text>

  <rect x="738" y="298" width="300" height="104" rx="9" fill="#eaf6f2" stroke="#b9dfd8" data-tid="ORC原理_支撑_文件布局"/>
  <text x="752" y="317" font-size="10" font-weight="700" fill="#0f6b5e">File Footer</text>
  <text x="750" y="335" font-size="8.5" fill="#2f6f5f">Type 树（列 ID 前序线性化）</text>
  <text x="750" y="351" font-size="8.5" fill="#2f6f5f">stripe 目录（offset/index/data/footer 长度）</text>
  <text x="750" y="367" font-size="8.5" fill="#2f6f5f">file 级统计 + rowIndexStride + content_length</text>
  <text x="750" y="385" font-size="8" fill="#4c8567">Writer.cc:596 writeFileFooter · Reader.cc:1612 readFooter</text>

  <rect x="738" y="410" width="300" height="66" rx="9" fill="#eef0f3" stroke="#d2d6dd" data-tid="ORC原理_支撑_文件布局"/>
  <text x="752" y="429" font-size="10" font-weight="700" fill="#33373e">PostScript（永不压缩）</text>
  <text x="750" y="447" font-size="8.5" fill="#5b6470">压缩类型 + footer 长度 · 结束于倒数第 2 字节</text>
  <text x="750" y="463" font-size="8" fill="#8a8a90">Reader.cc:1545 readPostscript</text>

  <rect x="738" y="484" width="300" height="42" rx="9" fill="#fdf2ea" stroke="#f0cdaa" data-tid="ORC原理_支撑_文件布局"/>
  <rect x="738" y="484" width="4" height="42" rx="2" fill="#e8730f"/>
  <text x="752" y="503" font-size="10" font-weight="700" fill="#8a4a12">最后 1 字节 = psLen</text>
  <text x="750" y="518" font-size="8" fill="#a8641e">读入口：先读尾 16KB → buf[-1] 得 psLen（Reader.cc:1664）</text>

  <!-- 读侧 SchemaEvolution（兼容边界，右下） -->
  <rect x="738" y="536" width="300" height="90" rx="10" fill="#fdf2ea" stroke="#f0cdaa" filter="url(#soft)" data-tid="ORC原理_支撑_schema演进与ACID"/>
  <rect x="738" y="536" width="4" height="90" rx="2" fill="#e8730f"/>
  <text x="752" y="555" font-size="10" font-weight="700" fill="#8a4a12">兼容边界 · SchemaEvolution（读侧类型适配）</text>
  <text x="750" y="573" font-size="8.5" fill="#a8641e">读 schema ≠ 文件 schema：按列 ID 映射转换</text>
  <text x="750" y="589" font-size="8.5" fill="#a8641e">不安全转换 → 该列禁 PPD（退化 YES_NO_NULL）</text>
  <text x="750" y="607" font-size="8" fill="#b5793a">跨文件表 / 分区 / ACID 交 Hive·Iceberg·Delta，不在 ORC 内</text>

  <!-- ===== 写轴（下→上聚合，Hot） ===== -->
  <rect x="24" y="662" width="500" height="150" rx="12" fill="#e9f2ff" stroke="#a9ccf5" filter="url(#soft)" data-tid="ORC原理_支撑_写路径"/>
  <rect x="24" y="662" width="4" height="150" rx="2" fill="#0a84ff"/>
  <text x="44" y="684" font-size="11.5" font-weight="700" fill="#0a3d78">写轴 · Hot（缓冲整个 stripe，先建元数据才 flush）</text>
  <text x="42" y="705" font-size="9" fill="#2a5a92">add(batch) → 按列 ColumnWriter 树编码（每列一 writer，树映射 schema）</text>
  <text x="42" y="722" font-size="9" fill="#2a5a92">满 rowIndexStride 行 → createRowIndexEntry（记 positions + row-group 统计）</text>
  <text x="42" y="739" font-size="9" fill="#2a5a92">满 stripeSize → writeStripe：字典 → index → data → StripeFooter</text>
  <text x="42" y="756" font-size="9" fill="#2a5a92">close → writeMetadata → writeFileFooter → writePostscript（psLen）</text>
  <text x="42" y="776" font-size="8.5" fill="#c0392b" font-weight="600">张力：整 stripe 必须驻内存，先算 index+stats+字典 才能落盘</text>
  <text x="42" y="793" font-size="8" fill="#8a8a90">Writer.cc:402 add · :512 writeStripe · :433 close</text>
  <text x="516" y="684" font-size="9.5" fill="#0a84ff" text-anchor="end" font-weight="600">Hot 写</text>

  <!-- ===== 读轴（上→下下推，Hot + Control 三级剪枝） ===== -->
  <rect x="556" y="662" width="500" height="150" rx="12" fill="#eef0f3" stroke="#d2d6dd" filter="url(#soft)" data-tid="ORC原理_支撑_读路径"/>
  <rect x="556" y="662" width="4" height="150" rx="2" fill="#0a84ff"/>
  <text x="576" y="684" font-size="11.5" font-weight="700" fill="#0a3d78">读轴 · Hot + Control（下推剪枝，只读该读的）</text>
  <text x="574" y="705" font-size="9" fill="#2a5a92">createReader：读尾 16KB → postscript → footer（拿 Type 树 + stripe 目录）</text>
  <text x="574" y="722" font-size="9" fill="#7c5fe6">SARG 三级剪枝：① file stats → ② stripe stats →〔字典〕→ ④ pickRowGroups</text>
  <text x="574" y="739" font-size="9" fill="#7c5fe6">TruthValue 7 值格 + isNeeded：min/max 命中再查 bloom → 跳/读</text>
  <text x="574" y="756" font-size="9" fill="#2a5a92">列投影 selectedColumns → 只为选中列建 ColumnReader 树 → 解码</text>
  <text x="574" y="776" font-size="9" fill="#2a5a92">RowReaderImpl::next → ColumnVectorBatch（列式批）</text>
  <text x="574" y="793" font-size="8" fill="#8a8a90">Reader.cc:1389 next · :1233 startNextStripe · SargsApplier.cc:82 pickRowGroups</text>
  <text x="1048" y="684" font-size="9.5" fill="#7c5fe6" text-anchor="end" font-weight="600">Control 剪枝</text>

  <!-- 谓词下推 独立锚（Control tid 覆盖） -->
  <rect x="556" y="824" width="500" height="40" rx="10" fill="#f3f0fb" stroke="#d6cdf0" data-tid="ORC原理_支撑_谓词下推"/>
  <rect x="556" y="824" width="4" height="40" rx="2" fill="#7c5fe6"/>
  <text x="576" y="843" font-size="9.5" font-weight="700" fill="#5b3ea6">谓词下推 SARG · PredicateLeaf.evaluate（min/max + bloom）</text>
  <text x="574" y="857" font-size="8" fill="#7c5fe6">sargs/PredicateLeaf.cc:693 · TruthValue.cc:110 isNeeded（NO/IS_NULL/NO_NULL → 可跳）</text>

  <!-- 列编码 独立锚（第二 tid 已在 data；补压缩 tid） -->
  <rect x="24" y="824" width="500" height="40" rx="10" fill="#f3f4f6" stroke="#dcdfe4" data-tid="ORC原理_支撑_压缩与流分块"/>
  <text x="44" y="843" font-size="9.5" font-weight="700" fill="#33373e">压缩与流分块 · per-stream codec</text>
  <text x="42" y="857" font-size="8" fill="#8a8a90">NONE/ZLIB/ZSTD/LZ4/SNAPPY（Compression.cc:1259）· 压不动则存原文 isOriginal=1</text>

  <!-- ===================== 连线 五路径 ===================== -->
  <!-- 写轴 → 文件（Hot 上行聚合） -->
  <path d="M270,662 L270,616" stroke="#0a84ff" stroke-width="2.2" fill="none" marker-end="url(#aHot)"/>
  <text x="278" y="650" font-size="8" fill="#0a84ff">聚合落盘</text>

  <!-- 读轴 → Tail（Hot 从尾入） -->
  <path d="M806,662 L806,640" stroke="#0a84ff" stroke-width="2.2" fill="none" marker-end="url(#aHot)"/>

  <!-- Tail → Stripe（Control 剪枝下推） -->
  <g stroke="#7c5fe6" stroke-width="1.6" stroke-dasharray="6 4" fill="none">
    <path d="M736,270 L544,270" marker-end="url(#aCtl)"/>
    <path d="M736,350 L378,400" marker-end="url(#aCtl)"/>
  </g>
  <text x="560" y="262" font-size="8" fill="#7c5fe6">stripe 剪枝</text>
  <text x="560" y="352" font-size="8" fill="#7c5fe6">选中 row-group</text>

  <!-- API → Header（Hot 入） -->
  <path d="M60,130 L60,166" stroke="#0a84ff" stroke-width="2.2" fill="none" marker-end="url(#aHot)"/>

  <!-- 类型系统 → 贯穿（State：列 ID 串起） -->
  <path d="M690,122 L690,166" stroke="#0f9e8e" stroke-width="1.6" fill="none" marker-end="url(#aState)"/>
  <text x="696" y="150" font-size="8" fill="#0f9e8e">列 ID 贯穿</text>

  <!-- Failure：magic/越界校验 -->
  <path d="M886,526 L886,536" stroke="#e8730f" stroke-width="1.6" stroke-dasharray="3 3" fill="none" marker-end="url(#aFail)"/>

  <!-- ===== 底部 铭牌：设计张力 + 五路径图例 ===== -->
  <rect x="24" y="884" width="1032" height="90" rx="12" fill="#f4f5f7" stroke="#e6e6eb"/>
  <text x="44" y="908" font-size="11" font-weight="700" fill="#1d1d1f">核心设计张力 · 列式压缩率 / 扫描剪枝（列投影 + 三级统计 + SARG，只读选中列的选中 row-group）vs 写复杂度（缓冲整 stripe，先建 index/stats/字典）</text>
  <text x="44" y="928" font-size="9.5" fill="#5b6470">并存：自描述单文件（footer+postscript 自定位，无需外部 catalog 即可读）vs 多文件表 / 跨文件 schema 演进 / ACID 交给引擎；index-then-data 布局 vs seek 粒度（row-group=10000 行）。</text>

  <g font-size="9.5" fill="#5b6470">
    <line x1="44" y1="948" x2="70" y2="948" stroke="#0a84ff" stroke-width="2.2"/><text x="76" y="951">Hot 读/写主轴</text>
    <line x1="200" y1="948" x2="226" y2="948" stroke="#0f9e8e" stroke-width="1.6"/><text x="232" y="951">State 类型/统计/索引/多流</text>
    <line x1="430" y1="948" x2="456" y2="948" stroke="#7c5fe6" stroke-width="1.6" stroke-dasharray="6 4"/><text x="462" y="951">Control SARG 三级剪枝/列投影</text>
    <line x1="680" y1="948" x2="706" y2="948" stroke="#e8730f" stroke-width="1.6" stroke-dasharray="3 3"/><text x="712" y="951">Failure magic/越界/禁PPD</text>
    <text x="890" y="951" font-size="8.5" fill="#a1a1a6">Opt：RLE v1/v2 · 字典自适应 · bloom · ZSTD</text>
  </g>
</svg>
