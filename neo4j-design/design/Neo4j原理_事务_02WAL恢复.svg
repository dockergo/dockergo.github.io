<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Neo4j WAL 预写日志与崩溃恢复</text>
  <text x="30" y="52" font-size="11.5" fill="#a1a1a6">先写日志再改 store(顺序追加,提交即持久);检查点 detached 写单独文件;崩溃从最后检查点后重放,未完成事务 ROLLBACK</text>

  <!-- 上:先写日志再改 store -->
  <rect x="40" y="86" width="230" height="88" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="56" y="114" font-size="12" font-weight="600" fill="#1b2a4a">1 · 写 WAL 日志</text>
  <text x="56" y="137" font-size="10" fill="#274a78">顺序追加,快且完整</text>
  <text x="56" y="158" font-size="10" fill="#274a78">写完即"提交即持久"</text>

  <rect x="330" y="86" width="230" height="88" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="346" y="114" font-size="12" font-weight="600" fill="#5a3410">2 · 应用到 store</text>
  <text x="346" y="137" font-size="10" fill="#93762e">改 store 是随机写,慢</text>
  <text x="346" y="158" font-size="10" fill="#93762e">可稍后异步应用</text>

  <path d="M270,130 L330,130" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="300" y="123" font-size="8.5" fill="#a1a1a6" text-anchor="middle">先后</text>

  <rect x="612" y="86" width="428" height="88" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="628" y="114" font-size="11.5" font-weight="600" fill="#3d2a5a">为什么 WAL</text>
  <text x="628" y="138" font-size="10" fill="#6b5590">改 store 随机写、慢且难保原子;WAL 顺序追加、快而完整</text>
  <text x="628" y="159" font-size="10" fill="#6b5590">先落日志就保证持久,store 异步补齐 · TransactionLogFile 管追加/轮转</text>

  <!-- 中:WAL 日志条目类型 -->
  <text x="40" y="208" font-size="12" font-weight="600" fill="#1d1d1f">WAL 日志条目类型 · LogEntryTypeCodes.java:28</text>

  <rect x="40" y="222" width="152" height="66" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="116" y="250" font-size="11" font-weight="600" fill="#12402a" text-anchor="middle">TX_START</text>
  <text x="116" y="271" font-size="10" fill="#2f6f4f" text-anchor="middle">= 1 · 事务开始</text>

  <rect x="212" y="222" width="152" height="66" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="288" y="250" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">COMMAND</text>
  <text x="288" y="271" font-size="10" fill="#5b7db1" text-anchor="middle">= 3 · 记录级变更</text>

  <rect x="384" y="222" width="152" height="66" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="460" y="250" font-size="11" font-weight="600" fill="#12402a" text-anchor="middle">TX_COMMIT</text>
  <text x="460" y="271" font-size="10" fill="#2f6f4f" text-anchor="middle">= 5 · 提交标记</text>

  <rect x="556" y="222" width="204" height="66" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="658" y="250" font-size="11" font-weight="600" fill="#5a3410" text-anchor="middle">DETACHED_CHECK_POINT</text>
  <text x="658" y="271" font-size="10" fill="#93762e" text-anchor="middle">= 8 / 9 · 检查点(单独文件)</text>

  <rect x="780" y="222" width="260" height="66" rx="12" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="910" y="250" font-size="11" font-weight="600" fill="#4a1414" text-anchor="middle">TX_ROLLBACK = 12</text>
  <text x="910" y="271" font-size="10" fill="#7a2a2a" text-anchor="middle">CHUNK_START / END 分块</text>

  <!-- 下:崩溃恢复流程 -->
  <text x="40" y="322" font-size="12" font-weight="600" fill="#1d1d1f">崩溃恢复 · Recovery.java:164</text>

  <rect x="40" y="336" width="196" height="88" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="138" y="366" font-size="11" font-weight="600" fill="#5a3410" text-anchor="middle">定位最后检查点</text>
  <text x="138" y="388" font-size="9.5" fill="#93762e" text-anchor="middle">读日志尾 LogTailExtractor</text>
  <text x="138" y="408" font-size="9.5" fill="#93762e" text-anchor="middle">其后有事务则需恢复</text>

  <rect x="276" y="336" width="196" height="88" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="374" y="366" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">重放 WAL 变更</text>
  <text x="374" y="388" font-size="9.5" fill="#5b7db1" text-anchor="middle">重做记录的所有变更</text>
  <text x="374" y="408" font-size="9.5" fill="#5b7db1" text-anchor="middle">可并行 ParallelRecoveryVisitor</text>

  <rect x="512" y="336" width="196" height="88" rx="12" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="610" y="366" font-size="11" font-weight="600" fill="#4a1414" text-anchor="middle">未完成事务回滚</text>
  <text x="610" y="388" font-size="9.5" fill="#7a2a2a" text-anchor="middle">无 TX_COMMIT 者</text>
  <text x="610" y="408" font-size="9.5" fill="#7a2a2a" text-anchor="middle">IncompleteTransactionAction</text>

  <rect x="748" y="336" width="196" height="88" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="846" y="366" font-size="11" font-weight="600" fill="#12402a" text-anchor="middle">末尾写检查点</text>
  <text x="846" y="388" font-size="9.5" fill="#2f6f4f" text-anchor="middle">CheckPointerImpl 驱动</text>
  <text x="846" y="408" font-size="9.5" fill="#2f6f4f" text-anchor="middle">阈值:周期 / 日志块数</text>

  <path d="M236,380 L276,380" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M472,380 L512,380" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M708,380 L748,380" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <text x="40" y="452" font-size="9.5" fill="#a1a1a6">检查点是 detached(单独文件),不在事务日志里;恢复从最后检查点后重放,保证崩溃后一致且原子。</text>
</svg>
