<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="512" viewBox="0 0 1080 512"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1080" height="512" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Neo4j Label 扫描与遍历落地</text>
  <text x="30" y="52" font-size="11.5" fill="#a1a1a6">label 扫描 = LOOKUP token 索引找该 label 全部节点(起点);遍历落到免索引邻接顺关系链走,不查关系索引 — 索引找起点、免索引邻接做遍历</text>

  <!-- 上半:label 扫描 = LOOKUP token 索引 -->
  <text x="40" y="88" font-size="12" font-weight="600" fill="#1d1d1f">① Label 扫描 = LOOKUP token 索引(找起点)</text>

  <rect x="40" y="102" width="228" height="104" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="56" y="130" font-size="11" font-weight="600" fill="#1b2a4a">NodeByLabelScanPipe</text>
  <text x="56" y="153" font-size="10" fill="#274a78">运行时算子 · :33</text>
  <text x="56" y="174" font-size="10" fill="#274a78">解析 label token id</text>
  <text x="56" y="194" font-size="10" fill="#274a78">getNodesByLabel</text>

  <rect x="308" y="102" width="228" height="104" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="324" y="130" font-size="11" font-weight="600" fill="#3d2a5a">Read.nodeLabelScan</text>
  <text x="324" y="153" font-size="10" fill="#6b5590">reads.nodeLabelScan(...) :1222</text>
  <text x="324" y="174" font-size="10" fill="#6b5590">返 NodeLabelIndexCursor</text>
  <text x="324" y="194" font-size="10" fill="#6b5590">拿该 label 所有节点</text>

  <rect x="576" y="102" width="228" height="104" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="592" y="130" font-size="11" font-weight="600" fill="#5a3410">token 索引 · 底层 GBP-tree</text>
  <text x="592" y="153" font-size="10" fill="#93762e">TokenScanLayout</text>
  <text x="592" y="174" font-size="10" fill="#93762e">TokenScanKey</text>
  <text x="592" y="194" font-size="10" fill="#93762e">LOOKUP 类型索引存于此</text>

  <rect x="844" y="102" width="196" height="104" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="942" y="130" font-size="11" font-weight="600" fill="#12402a" text-anchor="middle">得到起点节点</text>
  <text x="942" y="156" font-size="9.5" fill="#2f6f4f" text-anchor="middle">该 label 的全部节点</text>
  <text x="942" y="178" font-size="9.5" fill="#2f6f4f" text-anchor="middle">作为遍历起点</text>

  <path d="M268,154 L308,154" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M536,154 L576,154" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="556" y="147" font-size="8.5" fill="#a1a1a6" text-anchor="middle">查</text>
  <path d="M804,154 L844,154" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 下半:遍历落到免索引邻接 -->
  <text x="40" y="248" font-size="12" font-weight="600" fill="#1d1d1f">② 遍历落到免索引邻接(跟指针,不查关系索引)</text>

  <rect x="40" y="262" width="300" height="104" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="56" y="290" font-size="11" font-weight="600" fill="#1b2a4a">NodeCursor.relationships</text>
  <text x="56" y="313" font-size="10" fill="#274a78">relationships(cursor, selection)</text>
  <text x="56" y="334" font-size="10" fill="#274a78">从起点节点发起遍历</text>
  <text x="56" y="355" font-size="10" fill="#274a78">按方向 / 类型选择关系</text>

  <rect x="380" y="262" width="300" height="104" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="396" y="290" font-size="11" font-weight="600" fill="#5a3410">StorageRelationship-</text>
  <text x="396" y="308" font-size="11" font-weight="600" fill="#5a3410">TraversalCursor</text>
  <text x="396" y="330" font-size="10" fill="#93762e">存储级遍历契约</text>
  <text x="396" y="351" font-size="10" fill="#93762e">neighbourNodeReference</text>

  <rect x="720" y="262" width="320" height="104" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="736" y="290" font-size="11" font-weight="600" fill="#12402a">RecordRelationshipTraversalCursor</text>
  <text x="736" y="313" font-size="10" fill="#2f6f4f">顺着关系链一路走</text>
  <text x="736" y="334" font-size="10" fill="#2f6f4f">跟指针到下一关系</text>
  <text x="736" y="355" font-size="10" fill="#2f6f4f"><tspan font-weight="600">不查关系索引</tspan></text>

  <path d="M340,314 L380,314" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M680,314 L720,314" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 底:分工 -->
  <rect x="40" y="392" width="490" height="72" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="56" y="420" font-size="11.5" font-weight="600" fill="#3d2a5a">索引:找起点</text>
  <text x="56" y="445" font-size="10" fill="#6b5590">按 label / property / 全文 / 向量定位起点节点</text>

  <rect x="550" y="392" width="490" height="72" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="566" y="420" font-size="11.5" font-weight="600" fill="#5a3410">免索引邻接:做遍历</text>
  <text x="566" y="445" font-size="10" fill="#93762e">MATCH (p:Person)-[:KNOWS]-&#62;(f):seek 找起点 + expand 遍历关系链</text>

  <path d="M530,428 L550,428" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <text x="40" y="490" font-size="9.5" fill="#a1a1a6">起点定位是图查询性能第一道关;无起点索引则全 label 扫 / 全扫,大图上极慢。</text>
</svg>
