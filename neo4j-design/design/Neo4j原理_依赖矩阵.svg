<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="470" viewBox="0 0 1080 470"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1080" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Neo4j 接触面 × 能力域 依赖矩阵</text>
  <text x="30" y="50" font-size="11.5" fill="#a1a1a6">两类 Cypher 操作各依赖哪些支撑能力域 —— 读走遍历/索引/页缓存,写走事务/锁</text>

  <!-- corner -->
  <rect x="40" y="78" width="168" height="34" rx="8" fill="#ffffff" stroke="#ececf1"/>
  <text x="124" y="99" font-size="10.5" font-weight="600" fill="#6e6e73" text-anchor="middle">操作 \ 支撑能力域</text>

  <!-- column headers -->
  <rect x="214" y="78" width="128" height="34" rx="8" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="278" y="99" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">查询规划执行</text>
  <rect x="352" y="78" width="128" height="34" rx="8" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="416" y="99" font-size="11" font-weight="600" fill="#5a3410" text-anchor="middle">记录存储</text>
  <rect x="490" y="78" width="128" height="34" rx="8" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="554" y="99" font-size="11" font-weight="600" fill="#5a3410" text-anchor="middle">索引(找起点)</text>
  <rect x="628" y="78" width="128" height="34" rx="8" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="692" y="99" font-size="11" font-weight="600" fill="#12402a" text-anchor="middle">页缓存</text>
  <rect x="766" y="78" width="128" height="34" rx="8" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="830" y="99" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">事务与恢复</text>
  <rect x="904" y="78" width="128" height="34" rx="8" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="968" y="99" font-size="11" font-weight="600" fill="#1b2a4a" text-anchor="middle">锁与并发</text>

  <!-- ===== MATCH row ===== -->
  <rect x="40" y="120" width="168" height="130" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="124" y="176" font-size="14" font-weight="700" fill="#1b2a4a" text-anchor="middle">MATCH</text>
  <text x="124" y="196" font-size="10" fill="#5b7db1" text-anchor="middle">读 / 图模式匹配</text>

  <!-- MATCH c1 查询规划 check -->
  <rect x="214" y="120" width="128" height="130" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <path d="M270,166 L276,174 L288,158" stroke="#2f6f4f" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="278" y="204" font-size="9.5" fill="#12402a" text-anchor="middle">选索引 / join 序</text>
  <text x="278" y="220" font-size="9.5" fill="#2f6f4f" text-anchor="middle">出物理计划</text>
  <!-- MATCH c2 记录存储 check -->
  <rect x="352" y="120" width="128" height="130" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <path d="M408,166 L414,174 L426,158" stroke="#2f6f4f" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="416" y="204" font-size="9.5" fill="#12402a" text-anchor="middle">游标遍历</text>
  <text x="416" y="220" font-size="9.5" fill="#2f6f4f" text-anchor="middle">免索引邻接顺链走</text>
  <!-- MATCH c3 索引 check -->
  <rect x="490" y="120" width="128" height="130" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <path d="M546,166 L552,174 L564,158" stroke="#2f6f4f" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="554" y="204" font-size="9.5" fill="#12402a" text-anchor="middle">按 label+property</text>
  <text x="554" y="220" font-size="9.5" fill="#2f6f4f" text-anchor="middle">定位起点节点</text>
  <!-- MATCH c4 页缓存 check -->
  <rect x="628" y="120" width="128" height="130" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <path d="M684,166 L690,174 L702,158" stroke="#2f6f4f" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="692" y="204" font-size="9.5" fill="#12402a" text-anchor="middle">分页读记录</text>
  <text x="692" y="220" font-size="9.5" fill="#2f6f4f" text-anchor="middle">store → 内存</text>
  <!-- MATCH c5 事务 — -->
  <rect x="766" y="120" width="128" height="130" rx="11" fill="#ffffff" stroke="#ececf1"/>
  <text x="830" y="192" font-size="20" fill="#c7c7cc" text-anchor="middle">&#8212;</text>
  <!-- MATCH c6 锁 — -->
  <rect x="904" y="120" width="128" height="130" rx="11" fill="#ffffff" stroke="#ececf1"/>
  <text x="968" y="192" font-size="20" fill="#c7c7cc" text-anchor="middle">&#8212;</text>

  <!-- ===== CREATE row ===== -->
  <rect x="40" y="262" width="168" height="130" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="124" y="318" font-size="14" font-weight="700" fill="#5a3410" text-anchor="middle">CREATE</text>
  <text x="124" y="338" font-size="10" fill="#93762e" text-anchor="middle">写 / 建节点关系</text>

  <!-- CREATE c1 查询规划 — -->
  <rect x="214" y="262" width="128" height="130" rx="11" fill="#ffffff" stroke="#ececf1"/>
  <text x="278" y="334" font-size="20" fill="#c7c7cc" text-anchor="middle">&#8212;</text>
  <!-- CREATE c2 记录存储 check -->
  <rect x="352" y="262" width="128" height="130" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <path d="M408,308 L414,316 L426,300" stroke="#2f6f4f" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="416" y="346" font-size="9.5" fill="#12402a" text-anchor="middle">写记录</text>
  <text x="416" y="362" font-size="9.5" fill="#2f6f4f" text-anchor="middle">定长记录落盘</text>
  <!-- CREATE c3 索引 — -->
  <rect x="490" y="262" width="128" height="130" rx="11" fill="#ffffff" stroke="#ececf1"/>
  <text x="554" y="334" font-size="20" fill="#c7c7cc" text-anchor="middle">&#8212;</text>
  <!-- CREATE c4 页缓存 — -->
  <rect x="628" y="262" width="128" height="130" rx="11" fill="#ffffff" stroke="#ececf1"/>
  <text x="692" y="334" font-size="20" fill="#c7c7cc" text-anchor="middle">&#8212;</text>
  <!-- CREATE c5 事务 check -->
  <rect x="766" y="262" width="128" height="130" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <path d="M822,308 L828,316 L840,300" stroke="#2f6f4f" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="830" y="346" font-size="9.5" fill="#12402a" text-anchor="middle">TxState → Command</text>
  <text x="830" y="362" font-size="9.5" fill="#2f6f4f" text-anchor="middle">→ 写 WAL</text>
  <!-- CREATE c6 锁 check -->
  <rect x="904" y="262" width="128" height="130" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <path d="M960,308 L966,316 L978,300" stroke="#2f6f4f" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="968" y="346" font-size="9.5" fill="#12402a" text-anchor="middle">节点 / 关系锁</text>
  <text x="968" y="362" font-size="9.5" fill="#2f6f4f" text-anchor="middle">Forseti 串行化</text>

  <!-- legend -->
  <rect x="40" y="420" width="20" height="14" rx="4" fill="#eafaf1" stroke="#bfe0cd"/>
  <path d="M46,427 L49,431 L55,423" stroke="#2f6f4f" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="68" y="431" font-size="10" fill="#6e6e73">依赖</text>
  <rect x="130" y="420" width="20" height="14" rx="4" fill="#ffffff" stroke="#ececf1"/>
  <text x="158" y="431" font-size="10" fill="#6e6e73">不依赖(&#8212;)</text>
  <text x="270" y="431" font-size="10" fill="#a1a1a6">读靠遍历定位;写靠事务锁保证一致 —— 记录存储是读写共用的核心</text>
</svg>
