<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="628" viewBox="0 0 1080 628" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="aHot" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#2f9e6e"/></marker>
    <marker id="aState" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c99a3a"/></marker>
    <marker id="aCtl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c25b4e"/></marker>
  </defs>
  <rect width="1080" height="628" fill="#fbfbfd"/>

  <!-- ===== 标题带 ===== -->
  <rect x="24" y="8" width="1032" height="46" rx="10" fill="none" data-tid="overallarch" data-lab="全景框架"/>
  <text x="24" y="30" font-size="14" font-weight="600" fill="#1d1d1f">Neo4j 总架构 · 多视角透视：原生图库，遍历就是顺着记录指针走（免索引邻接）</text>
  <text x="24" y="47" font-size="10.5" fill="#6e6e73">分层脊：Cypher → 成本规划 + 游标运行时 → 索引定起点 + 锁并发 → 定长记录 → 页缓存（内存底座）+ WAL（持久）　源码基准 5.x community</text>

  <!-- ===== 图例：三型语义路径 ===== -->
  <line x1="34" y1="66" x2="64" y2="66" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aHot)"/>
  <text x="70" y="70" font-size="10.5" fill="#3a3a3c">遍历 / 查询热流 Hot（免索引邻接）</text>
  <line x1="330" y1="66" x2="360" y2="66" stroke="#c99a3a" stroke-width="1.8" marker-end="url(#aState)"/>
  <text x="366" y="70" font-size="10.5" fill="#3a3a3c">记录存储 / 页缓存 / WAL State</text>
  <line x1="620" y1="66" x2="650" y2="66" stroke="#c25b4e" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#aCtl)"/>
  <text x="656" y="70" font-size="10.5" fill="#3a3a3c">写锁串行 Control（Forseti · 写路径）</text>
  <text x="1056" y="70" font-size="10" fill="#a1a1a6" text-anchor="end">框 = 主线可下钻</text>

  <!-- ===== Cypher 接触面 ===== -->
  <rect x="24" y="80" width="1032" height="42" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)" data-tid="cypher" data-lab="Cypher 查询语言"/>
  <text x="40" y="100" font-size="11.5" font-weight="600" fill="#3d2a5a">Cypher 查询语言接触面 · 声明式图模式匹配（ASCII-art）</text>
  <text x="40" y="116" font-size="9.5" fill="#7a5a95">MATCH / CREATE / MERGE　—— 只描述“要什么图形”，不写遍历过程</text>

  <!-- ===== 查询规划与执行 (Hot) ===== -->
  <rect x="24" y="130" width="1032" height="104" rx="14" fill="#eafaf1" stroke="#b8e6cd" filter="url(#soft)"/>
  <text x="40" y="150" font-size="12" font-weight="600" fill="#12402a">查询规划与执行 · Cypher 编译器 + 游标运行时（Hot 主轨）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="40" y="158" width="242" height="68" rx="9" fill="#fff" stroke="#cfe6d5"/><text x="161" y="180" font-size="9.5" font-weight="600" fill="#12402a">解析 + 语义分析</text><text x="161" y="198" fill="#3f8f66">ANTLR → AST</text><text x="161" y="214" fill="#3f8f66">改写 / 语义多趟</text>
    <rect x="292" y="158" width="242" height="68" rx="9" fill="#fff" stroke="#cfe6d5" data-tid="cypher" data-lab="成本规划器"/><text x="413" y="180" font-size="9.5" font-weight="600" fill="#12402a">成本规划器</text><text x="413" y="198" fill="#3f8f66">IDP join 排序 + 成本模型</text><text x="413" y="214" fill="#3f8f66">索引 leaf planner 选起点</text>
    <rect x="544" y="158" width="242" height="68" rx="9" fill="#fff" stroke="#cfe6d5" data-tid="cypher" data-lab="运行时(slotted)"/><text x="665" y="180" font-size="9.5" font-weight="600" fill="#12402a">运行时（slotted 默认）</text><text x="665" y="198" fill="#3f8f66">Expand 算子模式匹配</text><text x="665" y="214" fill="#3f8f66">pipelined 是企业版</text>
    <rect x="796" y="158" width="244" height="68" rx="9" fill="#e7f6ee" stroke="#a5ddca" data-tid="idx" data-lab="Kernel API 游标"/><text x="918" y="180" font-size="9.5" font-weight="700" fill="#12402a">Kernel API 游标</text><text x="918" y="198" fill="#3f8f66">node / rel / prop Cursor</text><text x="918" y="214" fill="#3f8f66">流式读图统一接口</text>
  </g>

  <!-- ===== 索引与遍历 + 锁与并发 ===== -->
  <rect x="24" y="242" width="512" height="86" rx="14" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)" data-tid="idx" data-lab="索引与遍历"/>
  <text x="40" y="262" font-size="11.5" font-weight="600" fill="#12402a">索引与遍历 · 只用来“定起点”</text>
  <text x="40" y="282" font-size="8.8" fill="#2f6f4f">schema 索引（RANGE / TEXT / POINT / FULLTEXT / VECTOR）找遍历起点</text>
  <text x="40" y="300" font-size="8.8" fill="#2f6f4f">LOOKUP token 索引：按 label 找节点（GBP-tree）</text>
  <text x="40" y="318" font-size="8.8" fill="#2f6f4f">找到起点后 → 免索引邻接遍历（不查关系索引）</text>

  <rect x="548" y="242" width="508" height="86" rx="14" fill="#fdf4f3" stroke="#ecc6c1" filter="url(#soft)" data-tid="lock" data-lab="锁与并发(Forseti)"/>
  <rect x="548" y="242" width="4" height="86" rx="2" fill="#c25b4e"/>
  <text x="566" y="262" font-size="11.5" font-weight="600" fill="#7a2016">锁与并发 · Forseti（锁基，非 MVCC）</text>
  <text x="566" y="282" font-size="8.8" fill="#a5453a">Forseti 锁管理 + dreadlocks 死锁检测（O(1)）</text>
  <text x="566" y="300" font-size="8.8" fill="#a5453a">ResourceType 分粒度（NODE/REL/LABEL…）+ 锁序防死锁</text>
  <text x="566" y="318" font-size="8.8" fill="#a5453a">写加写锁串行化，读不加读锁（community 无 MVCC）</text>

  <!-- ===== 记录存储 (State · 核心) ===== -->
  <rect x="24" y="336" width="1032" height="134" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)" data-tid="store" data-lab="记录存储"/>
  <text x="40" y="356" font-size="12" font-weight="600" fill="#5a3410">记录存储 · 定长记录，id = 文件偏移（核心 · 免索引邻接的物理基础）</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="40" y="364" width="325" height="98" rx="9" fill="#fef2e0" stroke="#e8cf9a"/><text x="202" y="388" font-size="9.5" font-weight="600" fill="#5a3410">NodeRecord（15B）</text><text x="202" y="408" fill="#93762e">nextRel → 第一条关系 id</text><text x="202" y="426" fill="#93762e">nextProp → 第一个属性</text><text x="202" y="446" fill="#93762e">labels + dense flag</text>
    <rect x="377" y="364" width="325" height="98" rx="9" fill="#fef2e0" stroke="#e8cf9a"/><text x="539" y="388" font-size="9.5" font-weight="600" fill="#5a3410">RelationshipRecord（34B）</text><text x="539" y="408" fill="#93762e">两端节点 + 关系类型</text><text x="539" y="426" fill="#93762e">四链指针（两条双向链表）</text><text x="539" y="446" fill="#93762e">遍历跟指针 · 免索引邻接</text>
    <rect x="714" y="364" width="326" height="98" rx="9" fill="#fef2e0" stroke="#e8cf9a"/><text x="877" y="388" font-size="9.5" font-weight="600" fill="#5a3410">PropertyRecord（41B）</text><text x="877" y="408" fill="#93762e">属性链 · 32B payload</text><text x="877" y="426" fill="#93762e">小值内联 / 长值溢出 dynamic</text><text x="877" y="446" fill="#93762e">record id = 文件偏移（O(1)）</text>
  </g>

  <!-- ===== 页缓存 (State · 内存底座) ===== -->
  <rect x="24" y="478" width="1032" height="46" rx="12" fill="#eafaf1" stroke="#b8e6cd" filter="url(#soft)" data-tid="pc" data-lab="页缓存 MuninnPageCache"/>
  <text x="40" y="497" font-size="11" font-weight="600" fill="#12402a">页缓存 MuninnPageCache · 堆外分页（所有记录访问的内存底座）</text>
  <text x="40" y="515" font-size="8.8" fill="#2f6f4f">store 文件映射成 PagedFile，PageCursor 定位页内偏移；页错误从盘加载，后台 eviction 淘汰冷页（脏页先刷），避 JVM 堆 GC</text>

  <!-- ===== WAL (State · 持久) ===== -->
  <rect x="24" y="532" width="1032" height="46" rx="12" fill="#faf4fb" stroke="#e2d2ee" filter="url(#soft)" data-tid="txn" data-lab="事务与恢复(WAL)"/>
  <text x="40" y="551" font-size="11" font-weight="600" fill="#5a3d78">事务与恢复 · WAL 预写日志</text>
  <text x="40" y="569" font-size="8.8" fill="#7a5a95">变更攒 TxState → 提交转 Command 写 WAL（顺序追加，提交即持久）→ 应用到 store；检查点截断日志，崩溃从最后检查点后重放恢复</text>

  <!-- ===== 语义分型连线 ===== -->
  <!-- Hot：Cypher → 查询 -->
  <line x1="540" y1="122" x2="540" y2="130" stroke="#2f9e6e" stroke-width="1.8" marker-end="url(#aHot)"/>
  <!-- Hot：查询band 内横向 -->
  <g stroke="#2f9e6e" stroke-width="1.5">
    <line x1="282" y1="192" x2="291" y2="192" marker-end="url(#aHot)"/>
    <line x1="534" y1="192" x2="543" y2="192" marker-end="url(#aHot)"/>
    <line x1="786" y1="192" x2="795" y2="192" marker-end="url(#aHot)"/>
  </g>
  <!-- Hot：查询 → 索引(定起点) -->
  <line x1="280" y1="234" x2="280" y2="242" stroke="#2f9e6e" stroke-width="1.6" marker-end="url(#aHot)"/>
  <text x="292" y="240" font-size="8" fill="#2f6f4f">游标读图 · 索引先定起点</text>
  <!-- Hot：索引 → 记录存储(遍历) -->
  <line x1="280" y1="328" x2="280" y2="336" stroke="#2f9e6e" stroke-width="1.6" marker-end="url(#aHot)"/>
  <text x="292" y="334" font-size="8" fill="#2f6f4f">顺记录指针遍历（免索引邻接）</text>
  <!-- Control：锁 → 记录存储写路径 -->
  <line x1="820" y1="328" x2="820" y2="336" stroke="#c25b4e" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#aCtl)"/>
  <text x="700" y="334" font-size="8" fill="#a5453a" text-anchor="end">写锁串行化（写路径）</text>
  <!-- State：记录存储 → 页缓存 -->
  <line x1="360" y1="470" x2="360" y2="478" stroke="#c99a3a" stroke-width="1.6" marker-end="url(#aState)"/>
  <text x="372" y="476" font-size="8" fill="#93762e">记录经页缓存分页进堆外</text>
  <!-- State：记录存储 → WAL(提交) -->
  <path d="M820,462 C820,505 720,500 720,532" fill="none" stroke="#c99a3a" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#aState)"/>
  <text x="836" y="500" font-size="8" fill="#93762e">提交转 Command 写 WAL</text>

  <!-- ===== 贯穿层 record id ===== -->
  <rect x="24" y="586" width="1032" height="30" rx="8" fill="#f0f0f4" stroke="#d8d8de"/>
  <text x="540" y="605" font-size="9.5" font-weight="600" text-anchor="middle" fill="#48484a">贯穿层 · record id = 文件偏移的寻址键：节点 / 关系 / 属性靠 id 相互指向，遍历 = 顺着 id 指针走，横切 存储 / 遍历 / 索引</text>
</svg>
