<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="556" viewBox="0 0 1080 556"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1080" height="556" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Neo4j 属性存储:属性链 + 内联 / 动态</text>
  <text x="30" y="50" font-size="11.5" fill="#a1a1a6">PropertyRecord 双向链表;32B payload 装 PropertyBlock,小值内联、长值溢出 dynamic store</text>

  <!-- property chain -->
  <text x="40" y="80" font-size="12" font-weight="600" fill="#6e6e73">① 属性链:prevProp / nextProp 双向链表</text>

  <rect x="40" y="92" width="180" height="96" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="130" y="114" font-size="11.5" font-weight="700" fill="#5a3410" text-anchor="middle">PropertyRecord A</text>
  <rect x="54" y="124" width="46" height="30" rx="6" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="77" y="143" font-size="8.5" fill="#5a3410" text-anchor="middle">prevProp</text>
  <rect x="104" y="124" width="46" height="30" rx="6" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="127" y="143" font-size="8.5" fill="#5a3410" text-anchor="middle">nextProp</text>
  <rect x="154" y="124" width="54" height="30" rx="6" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="181" y="139" font-size="8" fill="#12402a" text-anchor="middle">32B</text>
  <text x="181" y="150" font-size="7.5" fill="#2f6f4f" text-anchor="middle">payload</text>
  <text x="130" y="176" font-size="8.5" fill="#93762e" text-anchor="middle">4 个 long 装 PropertyBlock</text>

  <rect x="300" y="92" width="180" height="96" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="390" y="114" font-size="11.5" font-weight="700" fill="#5a3410" text-anchor="middle">PropertyRecord B</text>
  <rect x="314" y="124" width="46" height="30" rx="6" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="337" y="143" font-size="8.5" fill="#5a3410" text-anchor="middle">prevProp</text>
  <rect x="364" y="124" width="46" height="30" rx="6" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="387" y="143" font-size="8.5" fill="#5a3410" text-anchor="middle">nextProp</text>
  <rect x="414" y="124" width="54" height="30" rx="6" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="441" y="139" font-size="8" fill="#12402a" text-anchor="middle">32B</text>
  <text x="441" y="150" font-size="7.5" fill="#2f6f4f" text-anchor="middle">payload</text>
  <text x="390" y="176" font-size="8.5" fill="#93762e" text-anchor="middle">类型编码在块的位里</text>

  <rect x="560" y="92" width="120" height="96" rx="12" fill="#ffffff" stroke="#e8cf9a" stroke-dasharray="4 3"/>
  <text x="620" y="140" font-size="11" fill="#93762e" text-anchor="middle">… → NULL</text>

  <!-- chain connectors bidirectional -->
  <path d="M220,132 L300,132" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M300,150 L220,150" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M480,140 L560,140" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)" stroke-dasharray="4 3"/>

  <text x="700" y="128" font-size="9.5" fill="#a1a1a6">属性类型编码</text>
  <text x="700" y="146" font-size="9" fill="#a1a1a6">(propBlock &amp; 0x0F000000) &gt;&gt; 24</text>
  <text x="700" y="163" font-size="8.5" fill="#a1a1a6">PropertyType.java:256</text>

  <!-- inline vs dynamic -->
  <rect x="40" y="212" width="490" height="150" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="60" y="238" font-size="12.5" font-weight="700" fill="#12402a">② 内联(inline):小值直接存块里</text>
  <text x="60" y="260" font-size="10" fill="#2f6f4f">BOOL / BYTE / INT / LONG / FLOAT / DOUBLE</text>
  <text x="60" y="279" font-size="10" fill="#2f6f4f">SHORT_STRING / SHORT_ARRAY …</text>
  <rect x="60" y="292" width="450" height="30" rx="8" fill="#ffffff" stroke="#bfe0cd"/>
  <text x="70" y="311" font-size="9.5" font-weight="600" fill="#12402a">值直接躺在 PropertyBlock 里 —— 无额外寻址,读最快</text>
  <text x="60" y="342" font-size="8.5" fill="#2f6f4f">PropertyType.java:36 · 高频遍历过滤属性宜小(内联)</text>

  <rect x="550" y="212" width="490" height="150" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="570" y="238" font-size="12.5" font-weight="700" fill="#5a3410">③ 动态(dynamic):长值溢出,块里只存指针</text>
  <text x="570" y="260" font-size="10" fill="#93762e">长字符串 &#8594; neostore.propertystore.db.strings</text>
  <text x="570" y="279" font-size="10" fill="#93762e">数组 &#8594; neostore.propertystore.db.arrays</text>
  <rect x="570" y="292" width="210" height="46" rx="8" fill="#ffffff" stroke="#e8cf9a"/>
  <text x="675" y="311" font-size="9.5" font-weight="600" fill="#5a3410" text-anchor="middle">块内存指针</text>
  <text x="675" y="327" font-size="8.5" fill="#93762e" text-anchor="middle">指向 dynamic store</text>
  <rect x="800" y="292" width="220" height="46" rx="8" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="910" y="311" font-size="9.5" font-weight="600" fill="#5a3410" text-anchor="middle">dynamic store</text>
  <text x="910" y="327" font-size="8.5" fill="#93762e" text-anchor="middle">getTextValueFor(...) 解引用</text>
  <path d="M780,315 L800,315" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="820" y="352" font-size="8.5" fill="#93762e">PropertyType.java:113 · 读有额外寻址</text>

  <!-- token store -->
  <rect x="40" y="382" width="1000" height="112" rx="14" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="60" y="408" font-size="12.5" font-weight="700" fill="#3d2a5a">④ token store:label / 关系类型 / 属性键都是 token(小整数)</text>
  <text x="60" y="430" font-size="10.5" fill="#8b7aa8">记录里存的是 token id 而非字符串 —— 省空间;token 记录 = 小定长记录 + 指向 dynamic string store 的名字指针</text>
  <rect x="60" y="444" width="290" height="38" rx="9" fill="#ffffff" stroke="#d9c7ec"/>
  <text x="205" y="461" font-size="10" font-weight="600" fill="#3d2a5a" text-anchor="middle">neostore.labeltokenstore.db 等</text>
  <text x="205" y="475" font-size="8.5" fill="#8b7aa8" text-anchor="middle">label / 类型 / 键 token</text>
  <rect x="370" y="444" width="220" height="38" rx="9" fill="#ffffff" stroke="#d9c7ec"/>
  <text x="480" y="461" font-size="10" font-weight="600" fill="#3d2a5a" text-anchor="middle">token id(小整数)</text>
  <text x="480" y="475" font-size="8.5" fill="#8b7aa8" text-anchor="middle">记录中引用</text>
  <rect x="610" y="444" width="240" height="38" rx="9" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="730" y="461" font-size="10" font-weight="600" fill="#5a3410" text-anchor="middle">名字指针 &#8594; dynamic string</text>
  <text x="730" y="475" font-size="8.5" fill="#93762e" text-anchor="middle">token 名字存动态串</text>
  <path d="M350,463 L370,463" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M590,463 L610,463" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="1024" y="430" font-size="8.5" fill="#8b7aa8" text-anchor="end">TokenStore.java:55 · PropertyRecord.java:39</text>
</svg>
