<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Neo4j MuninnPageCache:堆外分页</text>
  <text x="30" y="52" font-size="11.5" fill="#a1a1a6">store 文件映射成 PagedFile,PageCursor 定位到 pageIdForRecord 页的 offsetForId 偏移读写;页内存分配在堆外,避 JVM 堆 GC</text>

  <!-- 主链路: store -> PagedFile -> PageCursor -->
  <rect x="40" y="92" width="240" height="150" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="56" y="120" font-size="12" font-weight="600" fill="#5a3410">store 文件(磁盘)</text>
  <text x="56" y="144" font-size="10.5" fill="#93762e">定长记录,按 id O(1) 定位</text>
  <text x="56" y="165" font-size="10.5" fill="#93762e">节点 / 关系 / 属性 store</text>
  <text x="56" y="206" font-size="10.5" fill="#93762e">要读进内存才能用</text>

  <rect x="340" y="92" width="240" height="150" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="356" y="120" font-size="12" font-weight="600" fill="#1b2a4a">PagedFile</text>
  <text x="356" y="144" font-size="10.5" fill="#274a78">store 文件映射成分页视图</text>
  <text x="356" y="165" font-size="10.5" fill="#274a78">页大小是 2 的幂</text>
  <text x="356" y="186" font-size="10.5" fill="#274a78">(isPowerOfTwo 校验,:25)</text>
  <text x="356" y="212" font-size="9.5" fill="#5b7db1">便于位运算定位</text>

  <rect x="640" y="92" width="240" height="150" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="656" y="120" font-size="12" font-weight="600" fill="#3d2a5a">PageCursor</text>
  <text x="656" y="144" font-size="10.5" fill="#6b5590">pageIdForRecord(id) 定位页</text>
  <text x="656" y="165" font-size="10.5" fill="#6b5590">offsetForId(id) 定位页内偏移</text>
  <text x="656" y="186" font-size="10.5" fill="#6b5590">在页里读写记录</text>
  <text x="656" y="212" font-size="9.5" fill="#8b7aa8">记录存储发起定位</text>

  <path d="M280,167 L340,167" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="310" y="160" font-size="8.5" fill="#a1a1a6" text-anchor="middle">映射</text>
  <path d="M580,167 L640,167" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="610" y="160" font-size="8.5" fill="#a1a1a6" text-anchor="middle">定位</text>

  <rect x="920" y="92" width="120" height="150" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="980" y="120" font-size="11" font-weight="600" fill="#12402a" text-anchor="middle">读写记录</text>
  <text x="980" y="150" font-size="9.5" fill="#2f6f4f" text-anchor="middle">命中则内存</text>
  <text x="980" y="167" font-size="9.5" fill="#2f6f4f" text-anchor="middle">速度</text>
  <text x="980" y="197" font-size="9.5" fill="#2f6f4f" text-anchor="middle">是存储访问的</text>
  <text x="980" y="214" font-size="9.5" fill="#2f6f4f" text-anchor="middle">内存底座</text>
  <path d="M880,167 L920,167" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 下左:堆外分配 -->
  <rect x="40" y="264" width="500" height="150" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="56" y="292" font-size="12" font-weight="600" fill="#12402a">堆外分配 · 避 JVM 堆 GC</text>
  <text x="56" y="318" font-size="10.5" fill="#2f6f4f">页内存经 MemoryAllocator / UnsafeUtil 分配在堆外</text>
  <text x="56" y="342" font-size="10.5" fill="#2f6f4f">不占 JVM 堆 · 不触发 GC 停顿</text>
  <text x="56" y="366" font-size="10.5" fill="#2f6f4f">海量图数据可常驻内存而不拖累 GC</text>
  <text x="56" y="392" font-size="9.5" fill="#6e6e73">页缓存大小与堆大小分开配(server.memory.pagecache.size)</text>

  <!-- 下右:换页 -->
  <rect x="560" y="264" width="480" height="150" rx="13" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="576" y="292" font-size="12" font-weight="600" fill="#1d1d1f">换页 · PageSwapperFactory</text>
  <text x="576" y="318" font-size="10.5" fill="#3f3f43">SingleFilePageSwapperFactory 负责页与磁盘交换</text>
  <text x="576" y="342" font-size="10.5" fill="#3f3f43">IOController 做 IO 节流,防刷盘打满磁盘</text>
  <text x="576" y="366" font-size="10.5" fill="#3f3f43">名字来自奥丁的乌鸦 Munin</text>
  <text x="576" y="392" font-size="9.5" fill="#6e6e73">io/.../pagecache/impl/muninn/MuninnPageCache.java:82</text>

  <text x="40" y="446" font-size="9.5" fill="#a1a1a6">所有记录访问都经页缓存;记录的 id&#8594;页定位在记录存储,MuninnPageCache 是生产页缓存实现。</text>
</svg>
