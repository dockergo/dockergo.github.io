<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1000" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">计算图与 Grappler · GraphDef 静态图的整体重写</text>

  <!-- 图表示 -->
  <rect x="30" y="52" width="455" height="150" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="52" y="76" font-size="12" font-weight="600" fill="#1b2a4a">图的表示：Node + Edge → GraphDef</text>
  <rect x="52" y="90" width="411" height="98" rx="9" fill="#ffffff" stroke="#bcd0ec"/>
  <text x="66" y="112" font-size="9.5" fill="#1b2a4a">· 内存态：Graph（Node 算子 + Edge 数据流）</text>
  <text x="66" y="134" font-size="9.5" fill="#1b2a4a">  core/graph/graph.h</text>
  <text x="66" y="156" font-size="9.5" fill="#1b2a4a">· 序列化：GraphDef（protobuf，可存可传）</text>
  <text x="66" y="178" font-size="9" fill="#5b7db1">tf.function 追踪出的 FuncGraph 即此结构</text>

  <!-- MetaOptimizer -->
  <rect x="515" y="52" width="455" height="150" rx="14" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="537" y="76" font-size="12" font-weight="600" fill="#274a78">Grappler MetaOptimizer 串联 pass</text>
  <rect x="537" y="90" width="411" height="98" rx="9" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="551" y="112" font-size="9.5" fill="#274a78">· 对整张图反复迭代运行多个优化 pass</text>
  <text x="551" y="134" font-size="9.5" fill="#274a78">  MakeNewOptimizer 按名构造（meta_optimizer.cc:232）</text>
  <text x="551" y="156" font-size="9.5" fill="#274a78">· 只在图模式生效；eager 不经 Grappler</text>
  <text x="551" y="178" font-size="9" fill="#5b7db1">OptimizeGraph 主循环（:782 / :928）</text>

  <!-- pass 流水 -->
  <rect x="30" y="222" width="940" height="196" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="52" y="246" font-size="12.5" font-weight="600" fill="#0f5132">主要优化 pass（各自可开关；顺序迭代）</text>
  <rect x="52" y="262" width="210" height="52" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="157" y="284" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">constfold 常量折叠</text><text x="157" y="302" font-size="8.5" fill="#2f6f4f" text-anchor="middle">编译期算掉常量子图</text>
  <rect x="278" y="262" width="210" height="52" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="383" y="284" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">arithmetic 代数化简</text><text x="383" y="302" font-size="8.5" fill="#2f6f4f" text-anchor="middle">x+0、x*1 等消除</text>
  <rect x="504" y="262" width="210" height="52" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="609" y="284" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">remap 算子融合</text><text x="609" y="302" font-size="8.5" fill="#2f6f4f" text-anchor="middle">Conv+BN+Relu 合一</text>
  <rect x="730" y="262" width="218" height="52" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="839" y="284" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">layout 布局转换</text><text x="839" y="302" font-size="8.5" fill="#2f6f4f" text-anchor="middle">NHWC↔NCHW 择优</text>
  <rect x="52" y="326" width="210" height="52" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="157" y="348" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">memory 内存优化</text><text x="157" y="366" font-size="8.5" fill="#2f6f4f" text-anchor="middle">重算/换出省显存</text>
  <rect x="278" y="326" width="210" height="52" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="383" y="348" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">common_subgraph</text><text x="383" y="366" font-size="8.5" fill="#2f6f4f" text-anchor="middle">公共子表达式消除</text>
  <rect x="504" y="326" width="210" height="52" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="609" y="348" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">dependency 依赖</text><text x="609" y="366" font-size="8.5" fill="#2f6f4f" text-anchor="middle">裁冗余控制依赖</text>
  <rect x="730" y="326" width="218" height="52" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="839" y="348" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">function / pruning</text><text x="839" y="366" font-size="8.5" fill="#2f6f4f" text-anchor="middle">函数内联/剪死节点</text>
  <text x="52" y="402" font-size="9" fill="#5b9e78">还有 auto_mixed_precision（自动混合精度）、scoped_allocator、pin_to_host 等；全部在 meta_optimizer.cc 的 MK_OPT 处按名注册。</text>

  <!-- 收尾 -->
  <rect x="30" y="438" width="940" height="46" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="52" y="466" font-size="10.5" fill="#494950">灵魂：<tspan font-weight="600" fill="#274a78">Grappler 把整张 GraphDef 当优化对象反复重写</tspan>——这是 TF 静态图倾向带来的红利，eager 因无图而享受不到。</text>
</svg>
