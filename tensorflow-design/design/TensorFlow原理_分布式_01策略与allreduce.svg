<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="490" viewBox="0 0 1000 490"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1000" height="490" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">分布式训练 · Strategy 镜像变量，run 并行副本，all-reduce 聚合梯度</text>

  <!-- Strategy 模型 -->
  <rect x="30" y="52" width="940" height="120" rx="14" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="52" y="76" font-size="12.5" font-weight="600" fill="#3c1361">tf.distribute.Strategy —— 在 strategy.scope() 内建模型，变量自动镜像到各副本（distribute_lib.py:2026）</text>
  <rect x="52" y="92" width="290" height="62" rx="10" fill="#ffffff" stroke="#d9c9ef"/><text x="197" y="116" font-size="9.5" font-weight="600" fill="#3c1361" text-anchor="middle">scope()：建镜像变量</text><text x="197" y="136" font-size="8.5" fill="#7a4fb0" text-anchor="middle">每副本一份，值保持同步</text>
  <rect x="356" y="92" width="290" height="62" rx="10" fill="#ffffff" stroke="#d9c9ef"/><text x="501" y="116" font-size="9.5" font-weight="600" fill="#3c1361" text-anchor="middle">run(fn)：每副本跑一遍 fn</text><text x="501" y="136" font-size="8.5" fill="#7a4fb0" text-anchor="middle">各喂一片数据（distribute_lib.py:1557）</text>
  <rect x="660" y="92" width="288" height="62" rx="10" fill="#ffffff" stroke="#d9c9ef"/><text x="804" y="116" font-size="9.5" font-weight="600" fill="#3c1361" text-anchor="middle">reduce / all-reduce 聚合</text><text x="804" y="136" font-size="8.5" fill="#7a4fb0" text-anchor="middle">梯度求和/平均后同步更新</text>

  <!-- all-reduce 数据并行 -->
  <rect x="30" y="192" width="940" height="180" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="52" y="216" font-size="12.5" font-weight="600" fill="#0f5132">数据并行一步：各卡算各自梯度 → all-reduce 求和 → 每卡拿到相同的全局梯度 → 各自更新镜像变量</text>
  <rect x="70" y="234" width="160" height="52" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="150" y="256" font-size="9" font-weight="600" fill="#0f5132" text-anchor="middle">GPU0：批0→grad0</text><text x="150" y="274" font-size="8" fill="#2f6f4f" text-anchor="middle">同一模型副本</text>
  <rect x="250" y="234" width="160" height="52" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="330" y="256" font-size="9" font-weight="600" fill="#0f5132" text-anchor="middle">GPU1：批1→grad1</text>
  <rect x="430" y="234" width="160" height="52" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="510" y="256" font-size="9" font-weight="600" fill="#0f5132" text-anchor="middle">GPU2：批2→grad2</text>
  <rect x="610" y="234" width="160" height="52" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="690" y="256" font-size="9" font-weight="600" fill="#0f5132" text-anchor="middle">GPU3：批3→grad3</text>
  <rect x="790" y="234" width="158" height="52" rx="9" fill="#fdf6ea" stroke="#efdcb4"/><text x="869" y="256" font-size="9" font-weight="600" fill="#5a3410" text-anchor="middle">数据并行</text><text x="869" y="274" font-size="8" fill="#93762e" text-anchor="middle">同模型 · 不同数据</text>
  <rect x="150" y="308" width="640" height="40" rx="9" fill="#e3f4ea" stroke="#bce6cd"/><text x="470" y="332" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">collective all-reduce（NCCL / ring）：跨卡把 grad0..3 求和，每卡得到相同 Σgrad</text>
  <line x1="150" y1="286" x2="300" y2="308" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="330" y1="286" x2="410" y2="308" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="510" y1="286" x2="530" y2="308" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="690" y1="286" x2="640" y2="308" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- 两种 strategy -->
  <rect x="30" y="392" width="455" height="82" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="52" y="416" font-size="11.5" font-weight="600" fill="#1b2a4a">MirroredStrategy · 单机多卡</text>
  <text x="52" y="438" font-size="9.5" fill="#5b7db1">一台机器多 GPU；卡间 NCCL all-reduce</text>
  <text x="52" y="458" font-size="9" fill="#86868b">mirrored_strategy.py</text>

  <rect x="515" y="392" width="455" height="82" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="537" y="416" font-size="11.5" font-weight="600" fill="#1b2a4a">MultiWorkerMirroredStrategy · 多机</text>
  <text x="537" y="438" font-size="9.5" fill="#5b7db1">多机多卡；靠 cluster_resolver + collective 通信</text>
  <text x="537" y="458" font-size="9" fill="#86868b">collective_all_reduce_strategy.py:57</text>
</svg>
