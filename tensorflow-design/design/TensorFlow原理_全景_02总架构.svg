<svg xmlns="http://www.w3.org/2000/svg" width="1185" height="772" viewBox="0 0 1185 772"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1185" height="772" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">TensorFlow 总架构 · 一次计算从 Python 到设备的分层栈（eager 默认，tf.function 追踪成图 → Grappler → XLA → 运行时）</text>

  <!-- 贯穿示例 -->
  <rect x="30" y="44" width="980" height="46" rx="11" fill="#f6f6f8" stroke="#e2e2e7" data-tid="TensorFlow原理_全景主线框架" data-lab="全景 · 贯穿示例"/>
  <text x="46" y="62" font-size="10.5" font-weight="600" fill="#1d1d1f">贯穿示例</text>
  <text x="46" y="80" font-size="10" fill="#494950" font-family="monospace">@tf.function def step(x): with tf.GradientTape as t: y=model(x); loss=fn(y); g=t.gradient(loss,w); opt.apply_gradients(...)  # 追踪→图→优化→执行→反向</text>

  <!-- ① Python 前端接口层 -->
  <rect x="30" y="102" width="980" height="78" rx="14" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="48" y="124" font-size="12" font-weight="600" fill="#3c1361">① Python 前端接口层（用户代码 + tf / keras / tf.data）</text>
  <rect x="48" y="138" width="304" height="32" rx="8" fill="#ffffff" stroke="#d9c9ef" data-tid="TensorFlow原理_接口_张量与变量编程" data-lab="张量与变量编程"/><text x="200" y="158" font-size="9.5" fill="#3c1361" text-anchor="middle">张量与变量 · tf.Tensor / tf.Variable</text>
  <rect x="368" y="138" width="304" height="32" rx="8" fill="#ffffff" stroke="#d9c9ef" data-tid="TensorFlow原理_接口_图与tf_function" data-lab="图与 tf.function"/><text x="520" y="158" font-size="9.5" fill="#3c1361" text-anchor="middle">图与 tf.function · AutoGraph 追踪</text>
  <rect x="688" y="138" width="304" height="32" rx="8" fill="#ffffff" stroke="#d9c9ef" data-tid="TensorFlow原理_接口_建模与训练" data-lab="建模与训练"/><text x="840" y="158" font-size="9.5" fill="#3c1361" text-anchor="middle">建模与训练 · Keras / GradientTape / tf.data</text>

  <!-- ② 图追踪与构建 -->
  <rect x="30" y="192" width="980" height="74" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)" data-tid="TensorFlow原理_接口_图与tf_function" data-lab="② 图追踪与构建"/>
  <text x="48" y="214" font-size="12.5" font-weight="600" fill="#1b2a4a">② 图追踪与构建 —— tf.function 把 Python 追踪成 FuncGraph（GraphDef），eager 则旁路直发（分水岭）</text>
  <rect x="48" y="228" width="300" height="30" rx="8" fill="#ffffff" stroke="#bcd0ec"/><text x="198" y="247" font-size="9" fill="#1b2a4a" text-anchor="middle">追踪 → FuncGraph（func_graph_from_py_func）</text>
  <rect x="364" y="228" width="288" height="30" rx="8" fill="#ffffff" stroke="#bcd0ec"/><text x="508" y="247" font-size="9" fill="#1b2a4a" text-anchor="middle">AutoGraph 改写 Python 控制流为图算子</text>
  <rect x="668" y="228" width="324" height="30" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="830" y="247" font-size="9" fill="#274a78" text-anchor="middle">按输入签名缓存 ConcreteFunction · 变签名重追踪</text>

  <!-- ③ Grappler -->
  <rect x="30" y="278" width="980" height="58" rx="14" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)" data-tid="TensorFlow原理_支撑_计算图与Grappler" data-lab="③ Grappler 图优化"/>
  <text x="48" y="300" font-size="12" font-weight="600" fill="#274a78">③ Grappler 图级优化（仅对图；eager 不经此）—— constfold / arithmetic / layout / remapper / memory …</text>
  <text x="48" y="322" font-size="9" fill="#5b7db1">MetaOptimizer 串联十余个 pass，整图重写：常量折叠、算子融合(remap)、布局转换(NHWC↔NCHW)、公共子表达式消除、内存优化</text>

  <!-- ④ XLA -->
  <rect x="30" y="346" width="980" height="58" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)" data-tid="TensorFlow原理_支撑_XLA编译与融合" data-lab="④ XLA 编译"/>
  <text x="48" y="368" font-size="12" font-weight="600" fill="#0f5132">④ XLA 编译（可选：jit_compile / 自动聚类）—— 把可编译子图聚成 cluster，降解为 _XlaCompile / _XlaRun</text>
  <text x="48" y="390" font-size="9" fill="#2f6f4f">MarkForCompilationPass 聚类 → XlaCompiler 生成 HLO → 算子融合成少量大 kernel，减少 kernel 启动与中间张量</text>

  <!-- ⑤ 设备放置 -->
  <rect x="30" y="416" width="980" height="54" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)" data-tid="TensorFlow原理_支撑_设备与后端" data-lab="⑤ 设备放置 Placer"/>
  <text x="48" y="438" font-size="12" font-weight="600" fill="#5a3410">⑤ 设备放置 Placer —— 按 colocation 组 + soft placement 给每个节点定 CPU / GPU / TPU</text>
  <text x="48" y="458" font-size="9" fill="#93762e">ColocationGraph 归并必须同设备的节点；allow_soft_placement 时无对应 kernel 自动回退 CPU</text>

  <!-- ⑥ 运行时执行 -->
  <rect x="30" y="482" width="980" height="66" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)" data-tid="TensorFlow原理_支撑_执行引擎" data-lab="⑥ 运行时执行"/>
  <text x="48" y="504" font-size="12.5" font-weight="600" fill="#1b2a4a">⑥ 运行时执行 —— 图模式：Executor 数据流调度；eager 模式：逐算子直接下发</text>
  <rect x="48" y="516" width="466" height="26" rx="8" fill="#ffffff" stroke="#bcd0ec"/><text x="281" y="533" font-size="9" fill="#1b2a4a" text-anchor="middle">Executor：节点入度归零即 ready → 执行 → PropagateOutputs</text>
  <rect x="530" y="516" width="462" height="26" rx="8" fill="#ffffff" stroke="#bcd0ec"/><text x="761" y="533" font-size="9" fill="#1b2a4a" text-anchor="middle">EagerLocalExecute：查 KernelAndDevice 逐 op 同步/异步执行</text>

  <!-- ⑦ 算子分发 OpKernel -->
  <rect x="30" y="560" width="980" height="58" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)" data-tid="TensorFlow原理_支撑_算子与kernel" data-lab="⑦ 算子分发 OpKernel"/>
  <text x="48" y="582" font-size="12" font-weight="600" fill="#0f5132">⑦ 算子分发 —— 按「op 名 + 设备」查全局 kernel 注册表，调 OpKernel::Compute</text>
  <text x="48" y="604" font-size="9" fill="#2f6f4f">REGISTER_OP 注册 OpDef（schema）· REGISTER_KERNEL_BUILDER 注册各设备 kernel 到 GlobalKernelRegistry</text>

  <!-- ⑧ 张量与内存 -->
  <rect x="30" y="630" width="980" height="58" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)" data-tid="TensorFlow原理_支撑_张量与内存" data-lab="⑧ 张量与内存"/>
  <text x="48" y="652" font-size="12" font-weight="600" fill="#5a3410">⑧ 张量与内存 —— Tensor = 形状/类型 + 共享的引用计数 TensorBuffer；Allocator 分设备分配</text>
  <text x="48" y="674" font-size="9" fill="#93762e">TensorBuffer : RefCounted，多个 Tensor 可共享底层缓冲；CPU/GPU 各有 Allocator，BFC 分配器管显存</text>

  <!-- ⑨ 横切：autodiff / 分布式 -->
  <rect x="30" y="700" width="475" height="50" rx="12" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)" data-tid="TensorFlow原理_支撑_自动微分引擎" data-lab="⑨ 自动微分 GradientTape"/>
  <text x="46" y="720" font-size="11" font-weight="600" fill="#0f5132">⑨ 自动微分 · GradientTape</text>
  <text x="46" y="738" font-size="8.5" fill="#2f6f4f">with 上下文录 op 到 tape，gradient 沿录制逆序求梯度</text>

  <rect x="535" y="700" width="475" height="50" rx="12" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)" data-tid="TensorFlow原理_支撑_分布式训练" data-lab="⑩ 分布式 tf.distribute"/>
  <text x="551" y="720" font-size="11" font-weight="600" fill="#3c1361">⑩ 分布式 · tf.distribute</text>
  <text x="551" y="738" font-size="8.5" fill="#7a4fb0">Strategy.scope 镜像变量，run 并行副本，collective all-reduce 聚合梯度</text>

  <!-- 竖向主数据流（中心 · 实线）+ 每步动词短语标注 -->
  <path d="M520,180 L520,192" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="528" y="189" font-size="7.5" fill="#6e6e73">追踪成 FuncGraph</text>
  <path d="M520,266 L520,278" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="528" y="275" font-size="7.5" fill="#6e6e73">整图交 Grappler 重写</text>
  <path d="M520,336 L520,346" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="528" y="344" font-size="7.5" fill="#6e6e73">可编译子图聚类降解</text>
  <path d="M520,404 L520,416" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="528" y="413" font-size="7.5" fill="#6e6e73">逐节点定设备</text>
  <path d="M520,470 L520,482" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="528" y="479" font-size="7.5" fill="#6e6e73">入度归零即就绪</text>
  <path d="M520,548 L520,560" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="528" y="557" font-size="7.5" fill="#6e6e73">按 op+设备查 kernel</text>
  <path d="M520,618 L520,630" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="528" y="627" font-size="7.5" fill="#6e6e73">Compute 读写 TensorBuffer</text>

  <!-- 旁路：eager 分水岭（右栏 · 虚线）—— 跳过 ②-⑤ 直发运行时 -->
  <path d="M1010,150 H1095 V529 H996" stroke="#b98a2e" stroke-width="1.5" fill="none"
        stroke-dasharray="5,4" marker-end="url(#ar)"/>
  <text transform="translate(1110,176) rotate(90)" font-size="9" font-weight="600" fill="#8a641d">eager 旁路 · 逐算子直发</text>
  <text transform="translate(1123,176) rotate(90)" font-size="7.5" fill="#a67e33">跳过 ②追踪 / ③④优化 / ⑤放置，EagerLocalExecute 立即执行</text>

  <!-- 横切①：自动微分 GradientTape（左栏 · 虚线）——录前向 / 逆序求梯度 -->
  <path d="M30,725 H15 V141" stroke="#3f8f60" stroke-width="1.4" fill="none" stroke-dasharray="4,3"/>
  <path d="M15,141 H28" stroke="#3f8f60" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <path d="M15,515 H28" stroke="#3f8f60" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <text transform="translate(9,700) rotate(-90)" font-size="8" font-weight="600" fill="#2f6f4f">autodiff 横切 · with 录前向 → gradient 逆序求梯度</text>

  <!-- 横切②：分布式 tf.distribute（右栏外沿 · 虚线）——镜像变量 / 并行副本 / all-reduce -->
  <path d="M1010,725 H1155 V141" stroke="#8a6bc0" stroke-width="1.4" fill="none" stroke-dasharray="4,3"/>
  <path d="M1155,141 H1012" stroke="#8a6bc0" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <path d="M1155,515 H1012" stroke="#8a6bc0" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <path d="M1155,589 H1012" stroke="#8a6bc0" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <text transform="translate(1170,135) rotate(90)" font-size="8" font-weight="600" fill="#5a3d97">分布式横切 · scope 镜像变量 / run 并行副本 / all-reduce 聚合梯度</text>
</svg>
