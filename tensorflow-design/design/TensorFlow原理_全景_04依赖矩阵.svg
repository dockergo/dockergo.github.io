  <text x="30" y="332" font-size="10.5" fill="#86868b">张量与变量 = 张量内存 + 算子核 + 执行 + 设备；图与 tf.function 依赖面最广（追踪出的图要经计算图/执行/XLA/设备）；建模训练强依赖自动微分与分布式。</text>
  <text x="30" y="356" font-size="10.5" fill="#494950">灵魂：<tspan font-weight="600" fill="#1b2a4a">计算图与 Grappler</tspan>（静态图倾向的根）与 <tspan font-weight="600" fill="#3c1361">自动微分引擎</tspan>（可微性根基）——被多数接口强依赖。</text>
