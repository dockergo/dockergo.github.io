<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="470" viewBox="0 0 1000 470"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1000" height="470" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">设备与后端 · Placer 给每个节点定设备</text>

  <!-- 放置流程 -->
  <rect x="30" y="52" width="940" height="170" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="52" y="76" font-size="12.5" font-weight="600" fill="#5a3410">Placer.Run：结合 colocation 约束与 soft placement 给每个节点分设备（placer.cc:223）</text>
  <rect x="52" y="92" width="200" height="70" rx="10" fill="#ffffff" stroke="#e8cf9a"/><text x="152" y="118" font-size="9.5" font-weight="600" fill="#5a3410" text-anchor="middle">收集约束</text><text x="152" y="136" font-size="8.5" fill="#93762e" text-anchor="middle">显式 with tf.device</text><text x="152" y="150" font-size="8.5" fill="#93762e" text-anchor="middle">+ kernel 支持的设备</text>
  <rect x="288" y="92" width="200" height="70" rx="10" fill="#ffffff" stroke="#e8cf9a"/><text x="388" y="118" font-size="9.5" font-weight="600" fill="#5a3410" text-anchor="middle">ColocationGraph</text><text x="388" y="136" font-size="8.5" fill="#93762e" text-anchor="middle">归并"必须同设备"</text><text x="388" y="150" font-size="8.5" fill="#93762e" text-anchor="middle">的节点成组</text>
  <rect x="524" y="92" width="200" height="70" rx="10" fill="#ffffff" stroke="#e8cf9a"/><text x="624" y="118" font-size="9.5" font-weight="600" fill="#5a3410" text-anchor="middle">按组选设备</text><text x="624" y="136" font-size="8.5" fill="#93762e" text-anchor="middle">优先 GPU（若有 kernel）</text>
  <rect x="760" y="92" width="200" height="70" rx="10" fill="#eafaf1" stroke="#bce6cd"/><text x="860" y="118" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">soft placement</text><text x="860" y="136" font-size="8.5" fill="#2f6f4f" text-anchor="middle">无对应 kernel</text><text x="860" y="150" font-size="8.5" fill="#2f6f4f" text-anchor="middle">自动回退 CPU</text>
  <line x1="252" y1="127" x2="288" y2="127" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="488" y1="127" x2="524" y2="127" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="724" y1="127" x2="760" y2="127" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="52" y="196" font-size="9.5" fill="#93762e">colocation_graph.cc 用并查集合并组；同组节点（如 Variable 与其更新 op）保证落同一设备，避免无谓跨设备拷贝</text>
  <text x="52" y="214" font-size="9" fill="#a1791f">allow_soft_placement=True 时，指定了不存在 kernel 的设备不会报错而是回退</text>

  <!-- 跨设备 -->
  <rect x="30" y="242" width="600" height="130" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="52" y="266" font-size="12" font-weight="600" fill="#1b2a4a">跨设备：自动插 Send/Recv</text>
  <rect x="60" y="282" width="150" height="44" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="135" y="309" font-size="9" fill="#1b2a4a" text-anchor="middle">节点 A @CPU</text>
  <rect x="420" y="282" width="150" height="44" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="495" y="309" font-size="9" fill="#1b2a4a" text-anchor="middle">节点 B @GPU</text>
  <rect x="240" y="282" width="150" height="44" rx="9" fill="#fff7e6" stroke="#e8cf9a"/><text x="315" y="304" font-size="8.5" fill="#5a3410" text-anchor="middle">Send→Recv</text><text x="315" y="318" font-size="8" fill="#93762e" text-anchor="middle">跨设备拷贝张量</text>
  <line x1="210" y1="304" x2="240" y2="304" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="390" y1="304" x2="420" y2="304" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="52" y="352" font-size="9" fill="#5b7db1">图切分时在跨设备边插入 Send/Recv 对，运行时负责 H2D/D2H 拷贝</text>

  <!-- 后端 -->
  <rect x="650" y="242" width="320" height="130" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="672" y="266" font-size="12" font-weight="600" fill="#0f5132">设备后端</text>
  <text x="672" y="290" font-size="9.5" fill="#2f6f4f">· CPU：Eigen / oneDNN 向量化</text>
  <text x="672" y="312" font-size="9.5" fill="#2f6f4f">· GPU：CUDA kernel + cuBLAS/cuDNN</text>
  <text x="672" y="334" font-size="9.5" fill="#2f6f4f">· TPU：经 XLA 编译到 TPU</text>
  <text x="672" y="356" font-size="9" fill="#5b9e78">同一 op 各设备各注册 kernel（见「算子与 kernel」）</text>

  <!-- 收尾 -->
  <rect x="30" y="392" width="940" height="58" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="52" y="416" font-size="10.5" fill="#494950">口诀：<tspan font-weight="600" fill="#5a3410">Placer 定设备 → 图按设备切分 → 跨设备插 Send/Recv → 各设备 Executor 各跑各的</tspan>。</text>
  <text x="52" y="436" font-size="10" fill="#7a2a2a">colocation 组保证强关联节点同设备；soft placement 让"没 GPU kernel"的 op 优雅回退 CPU。</text>
</svg>
