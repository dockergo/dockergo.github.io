<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1000" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">自动微分引擎 · GradientTape 录制，逆序回放求梯度</text>

  <!-- 前向录制 -->
  <rect x="30" y="52" width="940" height="150" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="52" y="76" font-size="12.5" font-weight="600" fill="#0f5132">前向：在 with GradientTape 上下文内，每执行一个 op 就把它录到磁带</text>
  <rect x="52" y="92" width="180" height="52" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="142" y="116" font-size="9.5" fill="#0f5132" text-anchor="middle">y = x @ w</text><text x="142" y="132" font-size="8" fill="#2f6f4f" text-anchor="middle">MatMul</text>
  <rect x="258" y="92" width="180" height="52" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="348" y="116" font-size="9.5" fill="#0f5132" text-anchor="middle">z = y + b</text><text x="348" y="132" font-size="8" fill="#2f6f4f" text-anchor="middle">Add</text>
  <rect x="464" y="92" width="180" height="52" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="554" y="116" font-size="9.5" fill="#0f5132" text-anchor="middle">a = relu(z)</text><text x="554" y="132" font-size="8" fill="#2f6f4f" text-anchor="middle">Relu</text>
  <rect x="670" y="92" width="180" height="52" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="760" y="116" font-size="9.5" fill="#0f5132" text-anchor="middle">loss = f(a)</text><text x="760" y="132" font-size="8" fill="#2f6f4f" text-anchor="middle">标量</text>
  <line x1="232" y1="118" x2="258" y2="118" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="438" y1="118" x2="464" y2="118" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="644" y1="118" x2="670" y2="118" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="52" y="172" font-size="9.5" fill="#2f6f4f">tape 存一串 OpTapeEntry（op 类型 + 输入/输出 id + 反向函数），tape.h:50 / RecordOperation :167</text>
  <text x="52" y="190" font-size="9" fill="#5b9e78">默认自动录被读到的 trainable tf.Variable；常量张量需 tape.watch</text>

  <!-- 反向回放 -->
  <rect x="30" y="222" width="940" height="150" rx="14" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="52" y="246" font-size="12.5" font-weight="600" fill="#3c1361">反向：tape.gradient(loss, [w,b]) —— 逆序遍历录制，逐 op 调反向函数、链式累积</text>
  <rect x="670" y="262" width="180" height="52" rx="9" fill="#ffffff" stroke="#d9c9ef"/><text x="760" y="286" font-size="9.5" fill="#3c1361" text-anchor="middle">∂loss/∂a</text><text x="760" y="302" font-size="8" fill="#7a4fb0" text-anchor="middle">f 的反向</text>
  <rect x="464" y="262" width="180" height="52" rx="9" fill="#ffffff" stroke="#d9c9ef"/><text x="554" y="286" font-size="9.5" fill="#3c1361" text-anchor="middle">∂/∂z（Relu'）</text>
  <rect x="258" y="262" width="180" height="52" rx="9" fill="#ffffff" stroke="#d9c9ef"/><text x="348" y="286" font-size="9.5" fill="#3c1361" text-anchor="middle">∂/∂y,∂/∂b（Add）</text>
  <rect x="52" y="262" width="180" height="52" rx="9" fill="#e3d5f3" stroke="#d9c9ef"/><text x="142" y="286" font-size="9.5" fill="#3c1361" text-anchor="middle">∂/∂w,∂/∂x（MatMul）</text>
  <line x1="670" y1="288" x2="644" y2="288" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="464" y1="288" x2="438" y2="288" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="258" y1="288" x2="232" y2="288" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="52" y="338" font-size="9.5" fill="#7a4fb0">ComputeGradient 从初始梯度（∂loss/∂loss=1）出发逆序回放：tape.h:183 · VSpace（:93）抽象加法/零/一梯度</text>
  <text x="52" y="356" font-size="9" fill="#a58fc9">得到每个 Variable 的梯度 → optimizer.apply_gradients 更新</text>

  <!-- 双模式 -->
  <rect x="30" y="392" width="455" height="90" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="52" y="416" font-size="11.5" font-weight="600" fill="#1b2a4a">反向模式（reverse / VJP）· 默认</text>
  <text x="52" y="440" font-size="9.5" fill="#5b7db1">一次反向求全部参数梯度，适合"多输入→标量 loss"</text>
  <text x="52" y="460" font-size="9.5" fill="#5b7db1">GradientTape 就是它；训练用这个</text>

  <rect x="515" y="392" width="455" height="90" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="537" y="416" font-size="11.5" font-weight="600" fill="#5a3410">前向模式（forward / JVP）</text>
  <text x="537" y="440" font-size="9.5" fill="#93762e">ForwardAccumulator（tape.h:226）随前向同时算方向导数</text>
  <text x="537" y="460" font-size="9.5" fill="#93762e">适合"少输入→多输出"，如 Jacobian-vector product</text>
</svg>
