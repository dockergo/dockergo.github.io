<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1000" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">双维模型 · 把 12 条主线归位（接触面 × 能力域 × 执行时机）</text>
  <text x="30" y="50" font-size="10.5" fill="#86868b">判型：家族 7 机器学习框架 —— 接触面是 Python 编程 API，核心资源是张量（可微），"图"是 tf.function 追踪的产物而非预声明。</text>

  <!-- 接触面轴 -->
  <rect x="30" y="70" width="455" height="240" rx="14" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="52" y="94" font-size="12.5" font-weight="600" fill="#3c1361">接触面（用户如何用）· 3 条接口主线</text>
  <rect x="52" y="106" width="411" height="56" rx="9" fill="#ffffff" stroke="#d9c9ef"/><text x="66" y="128" font-size="10.5" font-weight="600" fill="#3c1361">① 张量与变量编程</text><text x="66" y="146" font-size="9" fill="#7a4fb0">tf.Tensor 不可变值 · tf.Variable 有状态句柄 · eager 默认逐算子</text>
  <rect x="52" y="170" width="411" height="56" rx="9" fill="#ffffff" stroke="#d9c9ef"/><text x="66" y="192" font-size="10.5" font-weight="600" fill="#3c1361">② 图与 tf.function（分水岭）</text><text x="66" y="210" font-size="9" fill="#7a4fb0">把 Python 追踪成 FuncGraph · AutoGraph 改写控制流 · 重追踪</text>
  <rect x="52" y="234" width="411" height="56" rx="9" fill="#ffffff" stroke="#d9c9ef"/><text x="66" y="256" font-size="10.5" font-weight="600" fill="#3c1361">③ 建模与训练</text><text x="66" y="274" font-size="9" fill="#7a4fb0">Keras Model/layer · GradientTape · optimizer · tf.data 输入管线</text>

  <!-- 能力域轴 -->
  <rect x="515" y="70" width="455" height="360" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="537" y="94" font-size="12.5" font-weight="600" fill="#1b2a4a">支撑能力域（框架内部机制）· 8 条支撑主线</text>
  <rect x="537" y="106" width="200" height="40" rx="8" fill="#fff7e6" stroke="#e8cf9a"/><text x="637" y="130" font-size="9.5" fill="#5a3410" text-anchor="middle">① 张量与内存</text>
  <rect x="749" y="106" width="200" height="40" rx="8" fill="#eafaf1" stroke="#bce6cd"/><text x="849" y="130" font-size="9.5" fill="#0f5132" text-anchor="middle">② 算子与 kernel 注册</text>
  <rect x="537" y="154" width="200" height="40" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="637" y="178" font-size="9.5" fill="#1b2a4a" text-anchor="middle">③ 计算图与 Grappler ★</text>
  <rect x="749" y="154" width="200" height="40" rx="8" fill="#f4eefb" stroke="#d9c9ef"/><text x="849" y="178" font-size="9.5" fill="#3c1361" text-anchor="middle">④ 自动微分引擎 ★</text>
  <rect x="537" y="202" width="200" height="40" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="637" y="226" font-size="9.5" fill="#1b2a4a" text-anchor="middle">⑤ 执行引擎</text>
  <rect x="749" y="202" width="200" height="40" rx="8" fill="#fff7e6" stroke="#e8cf9a"/><text x="849" y="226" font-size="9.5" fill="#5a3410" text-anchor="middle">⑥ 设备与后端</text>
  <rect x="537" y="250" width="200" height="40" rx="8" fill="#eafaf1" stroke="#bce6cd"/><text x="637" y="274" font-size="9.5" fill="#0f5132" text-anchor="middle">⑦ XLA 编译与融合</text>
  <rect x="749" y="250" width="200" height="40" rx="8" fill="#f4eefb" stroke="#d9c9ef"/><text x="849" y="274" font-size="9.5" fill="#3c1361" text-anchor="middle">⑧ 分布式训练</text>
  <text x="537" y="316" font-size="9" fill="#5b7db1">★ = 灵魂能力域：计算图/Grappler（静态图倾向的根）与自动微分引擎（可微性根基）。</text>
  <text x="537" y="334" font-size="9" fill="#5b7db1">能力域是"公共机制"，被多条接口主线共享；接口主线是"用户入口"。</text>

  <!-- 执行时机轴 -->
  <rect x="30" y="330" width="455" height="100" rx="14" fill="#eafaf1" stroke="#bce6cd" filter="url(#soft)"/>
  <text x="52" y="354" font-size="12" font-weight="600" fill="#0f5132">执行时机（第三维）</text>
  <rect x="52" y="366" width="196" height="52" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="150" y="388" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">前台调用路径</text><text x="150" y="406" font-size="8.5" fill="#2f6f4f" text-anchor="middle">eager 逐 op / 图执行 / 反向</text>
  <rect x="256" y="366" width="207" height="52" rx="9" fill="#ffffff" stroke="#bce6cd"/><text x="359" y="388" font-size="9.5" font-weight="600" fill="#0f5132" text-anchor="middle">后台异步</text><text x="359" y="406" font-size="8.5" fill="#2f6f4f" text-anchor="middle">tf.data 预取 / 通信-计算 overlap</text>

  <!-- 合成声明 -->
  <rect x="30" y="450" width="940" height="90" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="52" y="476" font-size="11.5" font-weight="600" fill="#1d1d1f">合成：3 接口主线 × 8 能力域，既无遗漏也无越界</text>
  <text x="52" y="500" font-size="10" fill="#494950">每个源码核心概念都能唯一归属：tf.Variable→张量变量编程；ConcreteFunction→图与 tf.function；GradientTape→自动微分；</text>
  <text x="52" y="520" font-size="10" fill="#494950">OpKernel→算子 kernel；Grappler pass→计算图；Placer→设备后端；_XlaCompile→XLA；all-reduce→分布式。</text>
  <line x1="485" y1="190" x2="515" y2="190" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
</svg>
