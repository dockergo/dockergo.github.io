<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="540" viewBox="0 0 1000 540"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/>
    </marker>
  </defs>
  <rect width="1000" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="14" font-weight="600" fill="#1d1d1f">分水岭 · eager 即时执行 vs tf.function 追踪成图（TF 的静态图倾向）</text>

  <!-- Eager 左 -->
  <rect x="30" y="52" width="455" height="330" rx="14" fill="#f4eefb" stroke="#d9c9ef" filter="url(#soft)"/>
  <text x="52" y="76" font-size="12.5" font-weight="600" fill="#3c1361">eager 即时执行（TF2 默认，类 PyTorch 动态图）</text>
  <rect x="52" y="90" width="411" height="40" rx="9" fill="#ffffff" stroke="#d9c9ef"/><text x="257" y="114" font-size="9.5" fill="#3c1361" text-anchor="middle">Python 调用 tf.matmul(a,b)</text>
  <line x1="257" y1="130" x2="257" y2="146" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <rect x="52" y="146" width="411" height="40" rx="9" fill="#ffffff" stroke="#d9c9ef"/><text x="257" y="170" font-size="9.5" fill="#3c1361" text-anchor="middle">EagerLocalExecute：立即查 kernel 执行</text>
  <line x1="257" y1="186" x2="257" y2="202" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <rect x="52" y="202" width="411" height="40" rx="9" fill="#ffffff" stroke="#d9c9ef"/><text x="257" y="226" font-size="9.5" fill="#3c1361" text-anchor="middle">立即返回具体张量（有 .numpy() 值）</text>
  <text x="52" y="272" font-size="10" font-weight="600" fill="#3c1361">特点</text>
  <text x="52" y="292" font-size="9.5" fill="#7a4fb0">· 每行 Python 立刻算，可 print、可 pdb 调试</text>
  <text x="52" y="310" font-size="9.5" fill="#7a4fb0">· 无图、无跨 op 优化，Python 解释开销逐次付</text>
  <text x="52" y="328" font-size="9.5" fill="#7a4fb0">· 控制流就是 Python 的 if/for</text>
  <text x="52" y="346" font-size="9.5" fill="#7a4fb0">· 灵活直观，适合研究/调试</text>
  <text x="52" y="366" font-size="9" fill="#a58fc9">≈ PyTorch 的 define-by-run，但 TF 无 Dispatcher 分层</text>

  <!-- tf.function 右 -->
  <rect x="515" y="52" width="455" height="330" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="537" y="76" font-size="12.5" font-weight="600" fill="#1b2a4a">tf.function 图模式（追踪 → 冻结 → 复用）</text>
  <rect x="537" y="90" width="411" height="40" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="742" y="114" font-size="9.5" fill="#1b2a4a" text-anchor="middle">首次调用：追踪 Python（录 op，不算数）</text>
  <line x1="742" y1="130" x2="742" y2="146" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <rect x="537" y="146" width="411" height="40" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="742" y="170" font-size="9.5" fill="#1b2a4a" text-anchor="middle">生成 FuncGraph（GraphDef 静态图）</text>
  <line x1="742" y1="186" x2="742" y2="202" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <rect x="537" y="202" width="411" height="40" rx="9" fill="#ffffff" stroke="#bcd0ec"/><text x="742" y="226" font-size="9.5" fill="#1b2a4a" text-anchor="middle">Grappler 优化 + 缓存 ConcreteFunction</text>
  <line x1="742" y1="242" x2="742" y2="258" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <rect x="537" y="258" width="411" height="40" rx="9" fill="#eafaf1" stroke="#bce6cd"/><text x="742" y="282" font-size="9.5" fill="#0f5132" text-anchor="middle">后续同签名调用：直接跑图，不再走 Python</text>
  <text x="537" y="322" font-size="9.5" fill="#5b7db1">· 图可跨 op 优化、可 XLA 编译、可 SavedModel 部署</text>
  <text x="537" y="340" font-size="9.5" fill="#5b7db1">· 输入签名（dtype/shape）变则重追踪（retrace）</text>
  <text x="537" y="358" font-size="9.5" fill="#5b7db1">· AutoGraph 把 Python if/for/while 改写成图算子</text>

  <!-- 分水岭对比 -->
  <rect x="30" y="398" width="940" height="122" rx="14" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="52" y="422" font-size="11.5" font-weight="600" fill="#1d1d1f">分水岭：TF 与 PyTorch 的图哲学</text>
  <text x="52" y="446" font-size="10" fill="#494950"><tspan font-weight="600" fill="#1b2a4a">TensorFlow</tspan>：图是"追踪冻结、可复用/可部署的静态产物"——eager 只是开发态，tf.function 才是生产态；图交给 Grappler/XLA 整体优化。</text>
  <text x="52" y="470" font-size="10" fill="#494950"><tspan font-weight="600" fill="#3c1361">PyTorch</tspan>：图是"每次前向随手建、backward 后即弃的副产物"（define-by-run），从不冻结；torch.compile 才另抓图。</text>
  <text x="52" y="498" font-size="10" fill="#7a2a2a">一句话：TF 天生偏"先成图再执行"，把动态 eager 当补充；PyTorch 天生偏"边跑边建"，把编译当补充——同族、反向侧重。</text>
</svg>
