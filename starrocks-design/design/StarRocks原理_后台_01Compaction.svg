<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks Compaction · 增量(Cumulative) vs 基线(Base)</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">LSM"写时只追加"的债由后台 Compaction 偿还:把众多小 Rowset 合成更少更大的有序文件</text>

  <!-- abstract base -->
  <rect x="30" y="72" width="1020" height="58" rx="12" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="50" y="96" font-size="10.5" font-weight="700" fill="#1b2a4a">抽象基类 Compaction(compaction.h:42,纯虚 compact() / pick_rowsets_to_compact())</text>
  <text x="50" y="116" font-size="8.7" fill="#5b7db1">do_compaction_impl() 分派 → 水平合并 _merge_rowsets_horizontally(列少) · 垂直合并 _merge_rowsets_vertically(列多,:240)</text>

  <!-- Cumulative card -->
  <rect x="30" y="150" width="500" height="210" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="50" y="176" font-size="12" font-weight="700" fill="#12402a">CumulativeCompaction · 增量(高频轻量)</text>
  <text x="50" y="193" font-size="8" fill="#2f6f4f">cumulative_compaction.cpp:31</text>
  <text x="50" y="209" font-size="9" fill="#12402a">合并 cumulative point 之上的新增小 Rowset</text>
  <text x="50" y="225" font-size="8.5" fill="#2f6f4f">calculate_cumulative_point() (:47) 推进分界点</text>
  <!-- illustration: point + small rowsets merge -->
  <line x1="230" y1="248" x2="230" y2="344" stroke="#e6b8b8" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="230" y="262" font-size="7.5" text-anchor="middle" fill="#a5453a">cumulative point</text>
  <g font-size="7.5" text-anchor="middle">
    <rect x="60" y="272" width="70" height="40" rx="6" fill="#d3ecdd" stroke="#bfe0cd"/><text x="95" y="296" fill="#12402a">基线[0-5]</text>
    <rect x="248" y="272" width="42" height="40" rx="6" fill="#fef2e0" stroke="#e8cf9a"/><text x="269" y="296" fill="#5a3410">[6]</text>
    <rect x="298" y="272" width="42" height="40" rx="6" fill="#fef2e0" stroke="#e8cf9a"/><text x="319" y="296" fill="#5a3410">[7]</text>
    <rect x="348" y="272" width="42" height="40" rx="6" fill="#fef2e0" stroke="#e8cf9a"/><text x="369" y="296" fill="#5a3410">[8]</text>
  </g>
  <line x1="390" y1="292" x2="440" y2="292" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <rect x="446" y="272" width="72" height="40" rx="6" fill="#d3ecdd" stroke="#bfe0cd"/>
  <text x="482" y="296" font-size="7.5" text-anchor="middle" fill="#12402a">合成[6-8]</text>
  <text x="50" y="336" font-size="8.5" fill="#2f6f4f">point 之上小文件合成更大增量,point 前移;不动基线</text>
  <text x="50" y="352" font-size="8.5" fill="#2f6f4f">高频运行,轻量,控制小文件数量</text>

  <!-- Base card -->
  <rect x="550" y="150" width="500" height="210" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="570" y="176" font-size="12" font-weight="700" fill="#5a3410">BaseCompaction · 基线(低频重量)</text>
  <text x="570" y="193" font-size="8" fill="#93762e">base_compaction.cpp:32</text>
  <text x="570" y="209" font-size="9" fill="#5a3410">把增量结果并入基线大文件</text>
  <text x="570" y="225" font-size="8.5" fill="#93762e">base_cumulative_delta_ratio 控触发(:129)</text>
  <g font-size="7.5" text-anchor="middle">
    <rect x="580" y="272" width="86" height="40" rx="6" fill="#fef2e0" stroke="#e8cf9a"/><text x="623" y="296" fill="#5a3410">基线[0-5]</text>
    <rect x="674" y="272" width="70" height="40" rx="6" fill="#d3ecdd" stroke="#bfe0cd"/><text x="709" y="296" fill="#12402a">增量[6-8]</text>
  </g>
  <line x1="748" y1="292" x2="798" y2="292" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <rect x="804" y="268" width="112" height="48" rx="7" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="860" y="296" font-size="8" text-anchor="middle" fill="#5a3410">新基线[0-8]</text>
  <text x="570" y="336" font-size="8.5" fill="#93762e">增量并入基线,产出单一大有序文件</text>
  <text x="570" y="352" font-size="8.5" fill="#93762e">低频运行,重量;减少读放大与索引膨胀</text>

  <line x1="330" y1="360" x2="330" y2="384" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="750" y1="360" x2="750" y2="384" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- policy chooser -->
  <rect x="30" y="390" width="1020" height="72" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="50" y="414" font-size="11" font-weight="700" fill="#5a3d78">选谁:DefaultCumulativeBaseCompactionPolicy(default_compaction_policy.cpp:27)</text>
  <text x="50" y="434" font-size="9" fill="#8d6bb0">对增量与基线分别打分,取评分较高者(平手偏增量);另有 SizeTieredCompactionPolicy 按大小分层。</text>
  <text x="50" y="452" font-size="8.5" fill="#8d6bb0">水平 vs 垂直合并按列数选:列少走水平(整行归并),列多走垂直(逐列归并,省内存)。</text>

  <!-- bottom note -->
  <rect x="30" y="474" width="1020" height="48" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="497" font-size="9.5" font-weight="700" fill="#1d1d1f">一句话</text>
  <text x="46" y="514" font-size="8.7" fill="#6e6e73">增量高频合小 Rowset(不动基线),基线低频把增量并入大文件;策略按评分择优。Compaction 是 LSM 的必需还债,非可选优化。</text>
</svg>
