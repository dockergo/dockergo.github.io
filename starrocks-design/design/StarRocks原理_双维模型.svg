<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter></defs>
  <rect width="1080" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks 双维模型 · 能力域 × 执行时机</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">4 接口主线(用户可见) + 8 支撑主线(引擎内部);后台任务是横切的"执行时机"维度,非又一能力域</text>

  <!-- axis labels -->
  <text x="60" y="86" font-size="10" font-weight="700" fill="#48484a">能力域(管什么) ↓</text>
  <text x="820" y="86" font-size="10" font-weight="700" fill="#48484a">执行时机(何时做) →</text>

  <!-- interface line -->
  <rect x="30" y="96" width="1020" height="70" rx="13" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="46" y="118" font-size="11" font-weight="700" fill="#5a3d78">接触面主线 · 用户可见</text>
  <g text-anchor="middle" font-size="9">
    <rect x="46" y="128" width="240" height="30" rx="7" fill="#faf4fb" stroke="#e2d2ee"/><text x="166" y="147" fill="#5a3d78">DDL 数据定义</text>
    <rect x="296" y="128" width="240" height="30" rx="7" fill="#faf4fb" stroke="#e2d2ee"/><text x="416" y="147" fill="#5a3d78">DML 数据操纵</text>
    <rect x="546" y="128" width="240" height="30" rx="7" fill="#faf4fb" stroke="#e2d2ee"/><text x="666" y="147" fill="#5a3d78">DQL 数据查询</text>
    <rect x="796" y="128" width="238" height="30" rx="7" fill="#faf4fb" stroke="#e2d2ee"/><text x="915" y="147" fill="#5a3d78">DCL 数据控制</text>
  </g>

  <!-- support: 3 layers x front/back -->
  <text x="46" y="196" font-size="11" font-weight="700" fill="#1d1d1f">支撑主线 · 引擎内部（按层归位）</text>

  <!-- 底座 -->
  <rect x="30" y="208" width="700" height="70" rx="12" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="228" font-size="9.5" font-weight="700" fill="#1b2a4a">底座</text>
  <g text-anchor="middle" font-size="9">
    <rect x="120" y="236" width="280" height="34" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="260" y="257" fill="#274a78">元数据(FE+BDB-JE+EditLog+StarManager)</text>
    <rect x="416" y="236" width="298" height="34" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="565" y="257" fill="#274a78">存储引擎(Tablet/Rowset/Segment+主键索引)</text>
  </g>

  <!-- 计算 -->
  <rect x="30" y="286" width="700" height="70" rx="12" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="306" font-size="9.5" font-weight="700" fill="#12402a">计算</text>
  <g text-anchor="middle" font-size="9">
    <rect x="120" y="314" width="280" height="34" rx="7" fill="#eafaf1" stroke="#bfe0cd"/><text x="260" y="335" fill="#12402a">优化技术(Cascades CBO/统计/RF/MV)</text>
    <rect x="416" y="314" width="298" height="34" rx="7" fill="#eafaf1" stroke="#bfe0cd"/><text x="565" y="335" fill="#12402a">执行引擎(Pipeline/morsel/向量化)</text>
  </g>

  <!-- 保障 -->
  <rect x="30" y="364" width="700" height="88" rx="12" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="46" y="384" font-size="9.5" font-weight="700" fill="#5a3410">保障</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="120" y="392" width="190" height="50" rx="7" fill="#fef2e0" stroke="#e8cf9a"/><text x="215" y="412" fill="#5a3410">事务一致性</text><text x="215" y="428" fill="#93762e">导入 2PC + publish 版本</text>
    <rect x="322" y="392" width="190" height="50" rx="7" fill="#fef2e0" stroke="#e8cf9a"/><text x="417" y="412" fill="#5a3410">资源与负载管理</text><text x="417" y="428" fill="#93762e">WorkGroup 资源组</text>
    <rect x="524" y="392" width="190" height="50" rx="7" fill="#fef2e0" stroke="#e8cf9a"/><text x="619" y="412" fill="#5a3410">集群管理与自愈</text><text x="619" y="428" fill="#93762e">TabletChecker/Scheduler</text>
  </g>

  <!-- 后台(执行时机 · 竖切) -->
  <rect x="746" y="208" width="288" height="244" rx="13" fill="#fdf4f3" stroke="#ecc6c1"/>
  <text x="890" y="230" font-size="10.5" font-weight="700" text-anchor="middle" fill="#7a2016">后台任务</text>
  <text x="890" y="248" font-size="8.3" text-anchor="middle" fill="#a5453a">(执行时机维度 · 横切各能力域)</text>
  <g text-anchor="middle" font-size="8.5" fill="#7a2016">
    <rect x="762" y="262" width="256" height="34" rx="7" fill="#fdeeeb" stroke="#ecc6c1"/><text x="890" y="283" >Compaction(存储异步)</text>
    <rect x="762" y="304" width="256" height="34" rx="7" fill="#fdeeeb" stroke="#ecc6c1"/><text x="890" y="325">MV 刷新(优化异步)</text>
    <rect x="762" y="346" width="256" height="34" rx="7" fill="#fdeeeb" stroke="#ecc6c1"/><text x="890" y="367">动态分区(元数据异步)</text>
    <rect x="762" y="388" width="256" height="34" rx="7" fill="#fdeeeb" stroke="#ecc6c1"/><text x="890" y="409">克隆修复(自愈异步)</text>
  </g>

  <rect x="30" y="466" width="1020" height="80" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="488" font-size="11" font-weight="700" fill="#1d1d1f">读法</text>
  <text x="46" y="510" font-size="9" fill="#6e6e73">· 横看能力域(管什么):接口 4 条面向用户,支撑 7 条按 底座→计算→保障 分层归位</text>
  <text x="46" y="528" font-size="9" fill="#6e6e73">· 竖看执行时机(何时做):前台同步(请求路径) vs 后台异步——后台任务是承接各域异步部分的第 8 条支撑主线,不是新能力域</text>
</svg>
