<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks 镜像与检查点 · saveImage 截断日志 / 恢复回放</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">日志不能无限涨:定期把内存态 dump 成镜像并记录 replayedJournalId,之后镜像点前的日志即可删除。由 CheckpointController 驱动</text>

  <!-- ===== checkpoint (top) ===== -->
  <text x="46" y="82" font-size="11.5" font-weight="700" fill="#1d1d1f">① 做检查点 · doCheckpoint</text>

  <!-- growing log -->
  <rect x="30" y="94" width="300" height="96" rx="12" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="180" y="116" font-size="10" font-weight="700" text-anchor="middle" fill="#5a3410">不断增长的 EditLog</text>
  <g text-anchor="middle" font-size="7.6" fill="#93762e">
    <rect x="44" y="128" width="40" height="48" rx="5" fill="#fff" stroke="#e8cf9a"/><text x="64" y="156">J1</text>
    <rect x="90" y="128" width="40" height="48" rx="5" fill="#fff" stroke="#e8cf9a"/><text x="110" y="156">J2</text>
    <rect x="136" y="128" width="40" height="48" rx="5" fill="#fff" stroke="#e8cf9a"/><text x="156" y="156">J3</text>
    <rect x="182" y="128" width="40" height="48" rx="5" fill="#fff" stroke="#e8cf9a"/><text x="202" y="156">…</text>
    <rect x="228" y="128" width="40" height="48" rx="5" fill="#fff" stroke="#e8cf9a"/><text x="248" y="156">Jn</text>
    <rect x="274" y="128" width="44" height="48" rx="5" fill="#fdf6ea" stroke="#efdcb4"/><text x="296" y="156">Jn+1</text>
  </g>

  <!-- checkpoint worker -->
  <rect x="390" y="94" width="290" height="96" rx="12" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="535" y="116" font-size="10.5" font-weight="700" text-anchor="middle" fill="#1b2a4a">GlobalStateCheckpointWorker</text>
  <text x="535" y="134" font-size="8.3" text-anchor="middle" fill="#5b7db1">doCheckpoint(epoch, journalId, …) · :30</text>
  <text x="535" y="152" font-size="8.6" text-anchor="middle" fill="#5b7db1">调 globalStateMgr.saveImage()</text>
  <text x="535" y="170" font-size="8.6" text-anchor="middle" fill="#5b7db1">dump 当前内存态整体</text>
  <text x="535" y="184" font-size="8" text-anchor="middle" fill="#a1a1a6">CheckpointController 驱动 · leader/CheckpointController.java</text>

  <!-- image file -->
  <rect x="740" y="94" width="310" height="96" rx="12" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="895" y="116" font-size="10.5" font-weight="700" text-anchor="middle" fill="#12402a">镜像文件 image + replayedJournalId</text>
  <text x="895" y="138" font-size="8.6" text-anchor="middle" fill="#2f6f4f">记录镜像截止的 journalId</text>
  <text x="895" y="156" font-size="8.6" text-anchor="middle" fill="#2f6f4f">镜像点前的日志 → 可 deleteJournals</text>
  <text x="895" y="176" font-size="8.6" text-anchor="middle" fill="#2f6f4f">镜像 = 恢复加速点,非备份</text>

  <line x1="330" y1="142" x2="390" y2="142" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="360" y="134" font-size="8" text-anchor="middle" fill="#6e6e73">读内存</text>
  <line x1="680" y1="142" x2="740" y2="142" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="710" y="134" font-size="8" text-anchor="middle" fill="#6e6e73">saveImage</text>

  <!-- truncate arrow -->
  <path d="M895,190 L895,212 L180,212 L180,190" fill="none" stroke="#bfe0cd" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="540" y="207" font-size="8.6" text-anchor="middle" fill="#2f6f4f">截断:删除 replayedJournalId 之前的日志段</text>

  <!-- ===== recovery (bottom) ===== -->
  <text x="46" y="256" font-size="11.5" font-weight="700" fill="#1d1d1f">② 恢复 · 重启 / 切主时</text>

  <rect x="30" y="268" width="280" height="86" rx="12" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="170" y="292" font-size="10.5" font-weight="700" text-anchor="middle" fill="#12402a">加载最新镜像</text>
  <text x="170" y="314" font-size="8.6" text-anchor="middle" fill="#2f6f4f">恢复到 replayedJournalId 的一致态</text>
  <text x="170" y="332" font-size="8.6" text-anchor="middle" fill="#2f6f4f">内存态整体重建</text>

  <rect x="400" y="268" width="300" height="86" rx="12" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="550" y="292" font-size="10.5" font-weight="700" text-anchor="middle" fill="#5a3410">回放剩余日志</text>
  <text x="550" y="314" font-size="8.6" text-anchor="middle" fill="#93762e">从 replayedJournalId + 1 开始</text>
  <text x="550" y="332" font-size="8.6" text-anchor="middle" fill="#93762e">逐条 apply 到最新</text>

  <rect x="790" y="268" width="260" height="86" rx="12" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="920" y="292" font-size="10.5" font-weight="700" text-anchor="middle" fill="#274a78">收敛到最新状态</text>
  <text x="920" y="314" font-size="8.6" text-anchor="middle" fill="#5b7db1">元数据 = 镜像 + 后续日志</text>
  <text x="920" y="332" font-size="8.6" text-anchor="middle" fill="#5b7db1">与 leader 完全一致</text>

  <line x1="310" y1="311" x2="400" y2="311" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="700" y1="311" x2="790" y2="311" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- StarManager separate checkpoint -->
  <rect x="30" y="374" width="1020" height="52" rx="12" fill="#faf4fb" stroke="#e2d2ee"/>
  <text x="46" y="396" font-size="10" font-weight="700" fill="#5a3d78">存算分离 · StarManager 元数据单独做检查点</text>
  <text x="46" y="416" font-size="8.8" fill="#7a5a95">StarMgrCheckpointWorker(journal/StarMgrCheckpointWorker.java)与 FE 主镜像分离,但同源同一套 BDBJE</text>

  <!-- footer -->
  <rect x="30" y="440" width="1020" height="66" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="464" font-size="10.5" font-weight="700" fill="#1d1d1f">工程要点</text>
  <text x="46" y="486" font-size="9" fill="#6e6e73">· 检查点频率权衡:太稀 → 日志堆积、恢复慢;太频 → 镜像 IO 开销</text>
  <text x="46" y="502" font-size="9" fill="#6e6e73">· 误区:镜像是备份。镜像是恢复加速点(截断日志),真相仍是"镜像 + 后续日志";丢镜像可从更早镜像 + 全量日志重建</text>
</svg>
