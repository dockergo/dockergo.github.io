<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks FE 高可用 · leader / follower / observer + epoch fencing</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">只有 leader 写 EditLog;底层 BDB ReplicatedEnvironment 复制;BDBHA 用 epoch fencing 防脑裂。角色枚举 FrontendNodeType</text>

  <!-- LEADER -->
  <rect x="30" y="80" width="330" height="200" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="195" y="106" font-size="13" font-weight="700" text-anchor="middle" fill="#1b2a4a">FE leader</text>
  <text x="195" y="126" font-size="8.6" text-anchor="middle" fill="#5b7db1">可读写 · 唯一写日志者</text>
  <rect x="46" y="138" width="298" height="56" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="195" y="158" font-size="9" text-anchor="middle" font-weight="600" fill="#274a78">转 LEADER 前先追平</text>
  <text x="195" y="176" font-size="8.4" text-anchor="middle" fill="#5b7db1">replayJournal(maxJournalId)</text>
  <text x="195" y="189" font-size="8" text-anchor="middle" fill="#a1a1a6">GlobalStateMgr.java:1384</text>
  <rect x="46" y="202" width="298" height="62" rx="8" fill="#fff" stroke="#cfe0f2"/>
  <text x="195" y="222" font-size="9" text-anchor="middle" font-weight="600" fill="#274a78">写 EditLog → BDB Master</text>
  <text x="195" y="240" font-size="8.4" text-anchor="middle" fill="#5b7db1">持久性 master_sync_policy +</text>
  <text x="195" y="256" font-size="8.4" text-anchor="middle" fill="#5b7db1">ReplicaAckPolicy 决定 · :236</text>

  <!-- FOLLOWER -->
  <rect x="390" y="80" width="330" height="200" rx="14" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="555" y="106" font-size="13" font-weight="700" text-anchor="middle" fill="#12402a">FE follower</text>
  <text x="555" y="126" font-size="8.6" text-anchor="middle" fill="#2f6f4f">参与选举 · 回放日志 · 可被选为新 leader</text>
  <rect x="406" y="138" width="298" height="126" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="555" y="160" font-size="9.4" text-anchor="middle" font-weight="600" fill="#12402a">回放循环 · GlobalStateMgr.java:2208</text>
  <text x="555" y="182" font-size="8.6" text-anchor="middle" fill="#2f6f4f">从 replayedJournalId + 1 读日志</text>
  <text x="555" y="202" font-size="8.6" text-anchor="middle" fill="#2f6f4f">replayJournalInner 应用</text>
  <text x="555" y="222" font-size="8.6" text-anchor="middle" fill="#2f6f4f">推进 replayedJournalId</text>
  <text x="555" y="248" font-size="8.4" text-anchor="middle" fill="#2f6f4f">BDB Replica 节点(可选举)</text>

  <!-- OBSERVER -->
  <rect x="750" y="80" width="300" height="200" rx="14" fill="#faf4fb" stroke="#e2d2ee" filter="url(#soft)"/>
  <text x="900" y="106" font-size="13" font-weight="700" text-anchor="middle" fill="#5a3d78">FE observer</text>
  <text x="900" y="126" font-size="8.6" text-anchor="middle" fill="#7a5a95">只回放不选举 · 纯读扩展</text>
  <rect x="766" y="138" width="268" height="126" rx="8" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="900" y="160" font-size="9.4" text-anchor="middle" font-weight="600" fill="#5a3d78">SECONDARY 节点类型</text>
  <text x="900" y="180" font-size="8.4" text-anchor="middle" fill="#7a5a95">BDBEnvironment.java:216</text>
  <text x="900" y="202" font-size="8.6" text-anchor="middle" fill="#7a5a95">同样回放日志追平</text>
  <text x="900" y="222" font-size="8.6" text-anchor="middle" fill="#7a5a95">但不参与多数派投票</text>
  <text x="900" y="248" font-size="8.4" text-anchor="middle" fill="#7a5a95">可无限加 → 扩读吞吐</text>

  <!-- replication arrows -->
  <line x1="360" y1="168" x2="390" y2="168" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="375" y="160" font-size="7.6" text-anchor="middle" fill="#6e6e73">复制</text>
  <line x1="720" y1="168" x2="750" y2="168" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="735" y="160" font-size="7.6" text-anchor="middle" fill="#6e6e73">复制</text>

  <!-- BDBHA fencing -->
  <rect x="30" y="300" width="500" height="130" rx="13" fill="#fbeaea" stroke="#e3b7b7"/>
  <text x="46" y="324" font-size="11" font-weight="700" fill="#7a2016">BDBHA · 选主 + fencing 防脑裂 · ha/BDBHA.java</text>
  <rect x="46" y="336" width="468" height="34" rx="8" fill="#fff" stroke="#e3b7b7"/>
  <text x="280" y="358" font-size="9.6" text-anchor="middle" font-weight="600" fill="#7a2016">fencing():递增 epoch(:87)· epochDB 做栅栏(:103)</text>
  <text x="46" y="388" font-size="8.6" fill="#a5453a">· 每次选主 epoch 单增,旧 leader 的写被新 epoch 隔离——防止双主同时写</text>
  <text x="46" y="406" font-size="8.6" fill="#a5453a">· getElectableNodes / getObserverNodes 列节点</text>
  <text x="46" y="424" font-size="8.6" fill="#a5453a">· 底层 ReplicatedEnvironment · fe/.../journal/bdbje/BDBEnvironment.java</text>

  <!-- replicated env -->
  <rect x="550" y="300" width="500" height="130" rx="13" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="566" y="324" font-size="11" font-weight="700" fill="#274a78">ReplicatedEnvironment · BDB 复制环境</text>
  <text x="566" y="346" font-size="8.6" fill="#5b7db1">· leader = Master,follower = Replica,observer = SECONDARY</text>
  <text x="566" y="366" font-size="8.6" fill="#5b7db1">· 持久性:master_sync_policy / replica_sync_policy(SYNC / NO_SYNC / WRITE_NO_SYNC)</text>
  <text x="566" y="386" font-size="8.6" fill="#5b7db1">· 提交确认:ReplicaAckPolicy(多数派 ack 才算 durable)· :236</text>
  <text x="566" y="406" font-size="8.6" fill="#5b7db1">· meta_delay_toleration_second:follower 落后阈值,超出视为不可用</text>

  <!-- footer -->
  <rect x="30" y="450" width="1020" height="66" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="474" font-size="10.5" font-weight="700" fill="#1d1d1f">配比与误区</text>
  <text x="46" y="496" font-size="9" fill="#6e6e73">· 1 leader + 偶数 follower 便于多数派选举;observer 无限加只读。误区:follower 也能写元数据——不,只有 leader 写日志</text>
  <text x="46" y="512" font-size="9" fill="#6e6e73">· 误区:epoch 只是版本号——它是 fencing 栅栏,旧 leader 网络分区恢复后凭旧 epoch 无法再写,从根上杜绝脑裂双写</text>
</svg>
