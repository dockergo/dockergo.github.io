<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks 动态分区 · 分区的自动滚动</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">时序表免手动加分区:DDL 声明 + 后台守护执行(误区:动态分区是运行时特性——定义在 DDL,增删在后台)</text>

  <!-- DDL declare -->
  <rect x="30" y="74" width="480" height="120" rx="14" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="46" y="96" font-size="11" font-weight="700" fill="#5a3d78">DDL 声明期 · 建表登记</text>
  <g text-anchor="middle">
    <rect x="46" y="108" width="448" height="72" rx="11" fill="#faf4fb" stroke="#e2d2ee" filter="url(#soft)"/><text x="270" y="132" font-size="10.5" font-weight="700" fill="#5a3d78">registerDynamicPartitionTable</text><text x="270" y="152" font-size="8.8" fill="#8a6db3">建表时登记到调度器(:130)</text><text x="270" y="169" font-size="8.5" fill="#a1a1a6">PROPERTIES("dynamic_partition.enable"="true", …)</text>
  </g>

  <!-- DynamicPartitionProperty -->
  <rect x="540" y="74" width="510" height="120" rx="14" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="556" y="96" font-size="11" font-weight="700" fill="#1b2a4a">DynamicPartitionProperty · 滚动规则</text>
  <g text-anchor="middle" font-size="8.8">
    <rect x="556" y="108" width="234" height="34" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="673" y="129" fill="#274a78">保留天数(过期删) · time_unit</text>
    <rect x="800" y="108" width="234" height="34" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="917" y="129" fill="#274a78">预建天数 end(未来加)</text>
    <rect x="556" y="148" width="234" height="34" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="673" y="169" fill="#274a78">分桶数 buckets</text>
    <rect x="800" y="148" width="234" height="34" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="917" y="169" fill="#274a78">时间单位 DAY/WEEK/MONTH</text>
  </g>
  <line x1="510" y1="134" x2="540" y2="134" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Scheduler (background) -->
  <rect x="30" y="222" width="480" height="120" rx="14" fill="#fdf4f3" stroke="#ecc6c1"/>
  <text x="46" y="244" font-size="11" font-weight="700" fill="#7a2016">后台任务期 · DynamicPartitionScheduler</text>
  <text x="494" y="244" font-size="8" text-anchor="end" fill="#a5453a">clone/DynamicPartitionScheduler.java:101</text>
  <g text-anchor="middle">
    <rect x="46" y="256" width="448" height="72" rx="11" fill="#fdeeeb" stroke="#ecc6c1" filter="url(#soft)"/><text x="270" y="280" font-size="10.5" font-weight="700" fill="#7a2016">executeDynamicPartitionForTable</text><text x="270" y="300" font-size="8.8" fill="#a5453a">周期执行,按 Property 计算增删(:356)</text><text x="270" y="317" font-size="8.5" fill="#a1a1a6">守护线程后台运行,非请求路径</text>
  </g>
  <path d="M270,180 L270,206 L270,222" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="286" y="210" font-size="8.5" fill="#a1a1a6">登记后交后台守护</text>

  <!-- actions -->
  <rect x="540" y="222" width="510" height="120" rx="14" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="556" y="244" font-size="11" font-weight="700" fill="#12402a">自动滚动动作(每周期)</text>
  <g text-anchor="middle">
    <rect x="556" y="256" width="234" height="72" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="673" y="284" font-size="10" font-weight="700" fill="#12402a">加未来分区</text><text x="673" y="304" font-size="8.5" fill="#2f6f4f">按预建天数 end 预建</text><text x="673" y="320" font-size="8" fill="#a1a1a6">新数据有区可落</text>
    <rect x="800" y="256" width="234" height="72" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/><text x="917" y="284" font-size="10" font-weight="700" fill="#5a3410">删过期分区</text><text x="917" y="304" font-size="8.5" fill="#93762e">超保留天数的老分区</text><text x="917" y="320" font-size="8" fill="#a1a1a6">回收空间/元数据</text>
  </g>
  <line x1="494" y1="292" x2="540" y2="292" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- timeline strip -->
  <rect x="30" y="368" width="1020" height="106" rx="14" fill="#ffffff" stroke="#ececf1"/>
  <text x="46" y="390" font-size="11" font-weight="700" fill="#1d1d1f">分区时间轴(以 DAY 为例:保留 3 天 + 预建 2 天)</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="46" y="402" width="176" height="52" rx="9" fill="#f7f7f9" stroke="#ececf1"/><text x="134" y="424" font-weight="600" fill="#a1a1a6">p(D-4) 已过期</text><text x="134" y="442" fill="#a5453a">被删除 ✕</text>
    <rect x="230" y="402" width="176" height="52" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/><text x="318" y="424" font-weight="600" fill="#274a78">p(D-2) 保留</text><text x="318" y="442" fill="#5b7db1">历史数据</text>
    <rect x="414" y="402" width="176" height="52" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="502" y="424" font-weight="700" fill="#1b2a4a">p(D) 今天</text><text x="502" y="442" fill="#5b7db1">当前写入</text>
    <rect x="598" y="402" width="176" height="52" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="686" y="424" font-weight="600" fill="#12402a">p(D+1) 预建</text><text x="686" y="442" fill="#2f6f4f">未来备好</text>
    <rect x="782" y="402" width="252" height="52" rx="9" fill="#eafaf1" stroke="#bfe0cd"/><text x="908" y="424" font-weight="600" fill="#12402a">p(D+2) 预建</text><text x="908" y="442" fill="#2f6f4f">窗口随时间整体右移</text>
  </g>
</svg>
