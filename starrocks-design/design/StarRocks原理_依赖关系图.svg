<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="580" viewBox="0 0 1080 580" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
    <marker id="arp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#c9b6de"/></marker>
  </defs>
  <rect width="1080" height="580" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks 能力域依赖关系 · 谁调用谁、谁约束谁</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">实线=调用/数据流　虚线=状态约束(版本/统计)。贯穿层 version/EditVersion 横切事务/存储/元数据</text>

  <!-- edges -->
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <path d="M300,120 L200,168" marker-end="url(#ar)"/>
    <path d="M540,124 L540,168" marker-end="url(#ar)"/>
    <path d="M700,120 L840,300" marker-end="url(#ar)"/>
    <path d="M150,228 L150,300" marker-end="url(#ar)"/>
    <path d="M210,196 L300,200" marker-end="url(#ar)"/>
    <path d="M470,240 L520,300" marker-end="url(#ar)"/>
    <path d="M600,240 L620,300" marker-end="url(#ar)"/>
    <path d="M760,240 L720,300" marker-end="url(#ar)"/>
  </g>
  <g stroke="#c9b6de" stroke-width="1.4" fill="none" stroke-dasharray="5 4">
    <path d="M900,300 L610,200" marker-end="url(#arp)"/>
    <path d="M880,360 L660,360" marker-end="url(#arp)"/>
    <path d="M300,340 L200,240" marker-end="url(#arp)"/>
  </g>

  <!-- top: interface -->
  <rect x="300" y="74" width="480" height="46" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="540" y="102" font-size="11" font-weight="700" text-anchor="middle" fill="#5a3d78">接口主线 · DDL / DML / DQL / DCL(用户可见)</text>

  <!-- compute row -->
  <rect x="80" y="170" width="140" height="60" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="150" y="196" font-size="11" font-weight="700" text-anchor="middle" fill="#1b2a4a">元数据</text><text x="150" y="216" font-size="7.5" text-anchor="middle" fill="#5b7db1">BDB-JE+EditLog</text>
  <rect x="300" y="170" width="140" height="60" rx="11" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="370" y="196" font-size="11" font-weight="700" text-anchor="middle" fill="#12402a">优化技术</text><text x="370" y="216" font-size="7.5" text-anchor="middle" fill="#2f6f4f">Cascades CBO</text>
  <rect x="470" y="170" width="140" height="60" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="540" y="196" font-size="11" font-weight="700" text-anchor="middle" fill="#5a3410">执行引擎</text><text x="540" y="216" font-size="7.5" text-anchor="middle" fill="#93762e">Pipeline/morsel</text>
  <rect x="640" y="170" width="140" height="60" rx="11" fill="#fdf4f3" stroke="#ecc6c1" filter="url(#soft)"/>
  <text x="710" y="196" font-size="11" font-weight="700" text-anchor="middle" fill="#7a2016">资源负载</text><text x="710" y="216" font-size="7.5" text-anchor="middle" fill="#a5453a">WorkGroup</text>

  <!-- storage/state row -->
  <rect x="80" y="302" width="150" height="58" rx="11" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="155" y="326" font-size="11" font-weight="700" text-anchor="middle" fill="#5a3410">存储引擎</text><text x="155" y="345" font-size="7.5" text-anchor="middle" fill="#93762e">Tablet/Rowset/Segment</text>
  <rect x="470" y="302" width="150" height="58" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="545" y="326" font-size="11" font-weight="700" text-anchor="middle" fill="#1b2a4a">事务一致性</text><text x="545" y="345" font-size="7.5" text-anchor="middle" fill="#5b7db1">2PC + publish 版本</text>
  <rect x="830" y="302" width="150" height="58" rx="11" fill="#faf4fb" stroke="#e2d2ee" filter="url(#soft)"/>
  <text x="905" y="326" font-size="11" font-weight="700" text-anchor="middle" fill="#5a3d78">集群自愈</text><text x="905" y="345" font-size="7.5" text-anchor="middle" fill="#7a5a95">Checker/Scheduler</text>

  <!-- background row -->
  <rect x="300" y="392" width="480" height="52" rx="11" fill="#fdeeeb" stroke="#ecc6c1" filter="url(#soft)"/>
  <text x="540" y="414" font-size="11" font-weight="700" text-anchor="middle" fill="#7a2016">后台任务(横切各域异步部分)</text><text x="540" y="432" font-size="8" text-anchor="middle" fill="#a5453a">Compaction · MV 刷新 · 动态分区 · 克隆修复</text>
  <g stroke="#ecc6c1" stroke-width="1.3" fill="none" stroke-dasharray="4 3">
    <path d="M300,418 L230,360" marker-end="url(#ar)"/>
    <path d="M660,392 L900,360" marker-end="url(#ar)"/>
  </g>

  <!-- pervasive -->
  <rect x="30" y="462" width="1020" height="44" rx="12" fill="#f0f0f4" stroke="#d2d2d7"/>
  <text x="540" y="489" font-size="10.5" font-weight="700" text-anchor="middle" fill="#48484a">贯穿层 · version / EditVersion —— commit 预留版本、publish 推进可见、主键模型用 EditVersion 跟踪,横切事务/存储/元数据</text>

  <!-- legend -->
  <rect x="30" y="518" width="1020" height="50" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <line x1="46" y1="536" x2="86" y2="536" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/><text x="94" y="539" font-size="8.5" fill="#6e6e73">实线:调用/数据流(接口→优化→执行→存储;写入→事务→存储)</text>
  <line x1="530" y1="536" x2="570" y2="536" stroke="#c9b6de" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arp)"/><text x="578" y="539" font-size="8.5" fill="#6e6e73">虚线:状态约束(元数据供 schema/统计给优化;事务版本约束存储回收)</text>
  <text x="46" y="558" font-size="8.3" fill="#b1483a">· 三态张力:写入→事务预留版本→存储落 Rowset;后台 Compaction 还债、克隆修复补副本;元数据是所有状态的最终落点</text>
</svg>
