<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks 主键模型事务路径 · apply 时维护主键索引 + 删除向量</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">apply 按表形态路由;主键把去重从读期挪到写期——被覆盖行记进删除向量(本地表缓存、云原生表落 meta 文件)</text>

  <!-- router -->
  <rect x="380" y="70" width="320" height="66" rx="12" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="540" y="94" font-size="11.5" font-weight="700" text-anchor="middle" fill="#1b2a4a">TransactionLogApplierFactory.create</text>
  <text x="540" y="114" font-size="8.6" text-anchor="middle" fill="#5b7db1">按表形态路由 apply 器 · TransactionLogApplierFactory.java:22</text>
  <text x="540" y="128" font-size="8.3" text-anchor="middle" fill="#5b7db1">主键版本用 EditVersion(major,minor)单独跟踪 · tablet_updates.cpp:140</text>

  <!-- branch labels -->
  <path d="M470,136 L470,164 L280,164 L280,190" fill="none" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <path d="M610,136 L610,164 L800,164 L800,190" fill="none" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="300" y="158" font-size="8.6" text-anchor="middle" fill="#6e6e73">否 → 本地表</text>
  <text x="790" y="158" font-size="8.6" text-anchor="middle" fill="#6e6e73">云原生 → Lake</text>

  <!-- LEFT: local table -->
  <rect x="30" y="190" width="500" height="252" rx="14" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="213" font-size="11.5" font-weight="700" fill="#12402a">本地表 · OlapTableTxnLogApplier</text>
  <text x="46" y="230" font-size="8.4" fill="#2f6f4f">PK Tablet 写入路径(BE) · shared-nothing</text>

  <rect x="46" y="240" width="468" height="34" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="280" y="261" font-size="9.4" text-anchor="middle" font-weight="600" fill="#12402a">Tablet::rowset_commit · txn_manager.cpp:386</text>
  <line x1="280" y1="274" x2="280" y2="286" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>

  <rect x="46" y="286" width="468" height="34" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="280" y="307" font-size="9.4" text-anchor="middle" font-weight="600" fill="#12402a">TabletUpdates::_apply_rowset_commit · tablet_updates.cpp:1305</text>
  <line x1="280" y1="320" x2="280" y2="332" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>

  <rect x="46" y="332" width="228" height="100" rx="9" fill="#fff" stroke="#cfe6d5"/>
  <text x="160" y="352" font-size="9" text-anchor="middle" font-weight="600" fill="#12402a">载入主键索引 + update state</text>
  <text x="160" y="372" font-size="8.3" text-anchor="middle" fill="#2f6f4f">_do_update(upserts, index)</text>
  <text x="160" y="388" font-size="8.3" text-anchor="middle" fill="#2f6f4f">tablet_updates.cpp:1490</text>
  <text x="160" y="408" font-size="8.3" text-anchor="middle" fill="#2f6f4f">index.erase(delete_pks, &amp;new_deletes)</text>
  <text x="160" y="424" font-size="8.3" text-anchor="middle" fill="#2f6f4f">:1501</text>

  <rect x="286" y="332" width="228" height="100" rx="9" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="400" y="352" font-size="9" text-anchor="middle" font-weight="600" fill="#5a3410">产出删除向量(del vec)</text>
  <text x="400" y="372" font-size="8.3" text-anchor="middle" fill="#93762e">state.finalize(.., new_del_vecs, index)</text>
  <text x="400" y="392" font-size="8.3" text-anchor="middle" fill="#93762e">set_cached_del_vec · :1200</text>
  <text x="400" y="412" font-size="8.3" text-anchor="middle" fill="#93762e">被覆盖旧行在位图打标</text>
  <text x="400" y="426" font-size="8.3" text-anchor="middle" fill="#93762e">缓存于内存(本地表)</text>
  <line x1="274" y1="382" x2="286" y2="382" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- RIGHT: lake table -->
  <rect x="550" y="190" width="500" height="252" rx="14" fill="#faf4fb" stroke="#e2d2ee"/>
  <text x="566" y="213" font-size="11.5" font-weight="700" fill="#5a3d78">云原生表 · LakeTableTxnLogApplier</text>
  <text x="566" y="230" font-size="8.4" fill="#7a5a95">删除向量按 Tablet 版本化写进 meta 文件 · shared-data</text>

  <rect x="566" y="240" width="468" height="80" rx="9" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="800" y="262" font-size="9.4" text-anchor="middle" font-weight="600" fill="#5a3d78">UpdateManager 统一处理 · lake/update_manager.h:90</text>
  <text x="800" y="282" font-size="8.3" text-anchor="middle" fill="#7a5a95">"publish primary key tablet, update primary index</text>
  <text x="800" y="298" font-size="8.3" text-anchor="middle" fill="#7a5a95">and delvec, then update meta file"</text>
  <text x="800" y="314" font-size="8.3" text-anchor="middle" fill="#7a5a95">更新主键索引 → 更新 delvec → 更新 meta</text>
  <line x1="800" y1="320" x2="800" y2="332" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>

  <rect x="566" y="332" width="468" height="100" rx="9" fill="#fff" stroke="#e2d2ee"/>
  <text x="800" y="354" font-size="9" text-anchor="middle" font-weight="600" fill="#5a3d78">MetaFileBuilder::_finalize_delvec(version, txn_id)</text>
  <text x="800" y="374" font-size="8.3" text-anchor="middle" fill="#7a5a95">be/src/storage/lake/meta_file.h:145</text>
  <text x="800" y="396" font-size="8.3" text-anchor="middle" fill="#7a5a95">删除向量随版本持久化到 meta 文件</text>
  <text x="800" y="416" font-size="8.3" text-anchor="middle" fill="#7a5a95">单一真源:无需 per-replica 跟踪</text>

  <!-- footer contrast -->
  <rect x="30" y="454" width="1020" height="70" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="478" font-size="10.5" font-weight="700" fill="#1d1d1f">非主键 Tablet 的对比</text>
  <text x="46" y="500" font-size="9" fill="#6e6e73">· 明细 / 聚合 / 更新模型 Tablet 不维护主键索引,apply 只是把已提交的 Rowset 加入——不产删除向量</text>
  <text x="46" y="518" font-size="9" fill="#6e6e73">· 误区:主键删除立刻从磁盘消失。只在删除向量位图打标,旧行由 Compaction 惰性回收</text>
</svg>
