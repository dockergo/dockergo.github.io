<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks 动态分区 · DynamicPartitionScheduler 后台自维护</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">时序表按天/小时分区:老分区要删、新分区要提前建——元数据能力域的异步部分,前台不感知</text>

  <!-- scheduler card -->
  <rect x="30" y="72" width="320" height="240" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="50" y="98" font-size="11.5" font-weight="700" fill="#1b2a4a">DynamicPartitionScheduler</text>
  <text x="50" y="114" font-size="8" fill="#5b7db1">extends LeaderDaemon</text>
  <text x="50" y="128" font-size="8" fill="#5b7db1">clone/DynamicPartitionScheduler.java:101</text>
  <rect x="50" y="142" width="280" height="52" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="190" y="163" font-size="9" text-anchor="middle" font-weight="600" fill="#274a78">后台周期触发</text>
  <text x="190" y="180" font-size="8" text-anchor="middle" fill="#5b7db1">executeDynamicPartitionForTable (:356)</text>
  <rect x="50" y="204" width="280" height="94" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="190" y="225" font-size="9" text-anchor="middle" font-weight="600" fill="#274a78">读 DynamicPartitionProperty</text>
  <text x="66" y="245" font-size="8" fill="#5b7db1">· 保留几天(过期删)</text>
  <text x="66" y="262" font-size="8" fill="#5b7db1">· 预建几天(提前建未来分区)</text>
  <text x="66" y="279" font-size="8" fill="#5b7db1">· 分桶数 / 时间粒度(天/小时)</text>
  <text x="66" y="294" font-size="7.5" fill="#86868b">遍历每张开启动态分区的表</text>

  <!-- timeline illustration -->
  <rect x="380" y="72" width="670" height="240" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="396" y="96" font-size="10.5" font-weight="700" fill="#1d1d1f">分区滚动示意 · 时间轴(今天 = 分界)</text>

  <!-- axis -->
  <line x1="410" y1="200" x2="1020" y2="200" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="715" y1="120" x2="715" y2="280" stroke="#5b7db1" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="715" y="298" font-size="8.5" text-anchor="middle" font-weight="600" fill="#274a78">今天 today</text>

  <!-- expired partitions -->
  <g text-anchor="middle" font-size="7.5">
    <rect x="418" y="150" width="80" height="40" rx="7" fill="#fbeaea" stroke="#e6b8b8"/><text x="458" y="167" fill="#8a2a2a">p20240101</text><text x="458" y="182" fill="#a5453a">过期→删</text>
    <rect x="506" y="150" width="80" height="40" rx="7" fill="#fbeaea" stroke="#e6b8b8"/><text x="546" y="167" fill="#8a2a2a">p20240102</text><text x="546" y="182" fill="#a5453a">过期→删</text>
    <rect x="594" y="150" width="80" height="40" rx="7" fill="#eafaf1" stroke="#bfe0cd"/><text x="634" y="167" fill="#12402a">p…昨天</text><text x="634" y="182" fill="#2f6f4f">保留</text>
  </g>
  <!-- current -->
  <rect x="690" y="150" width="50" height="40" rx="7" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="715" y="167" font-size="7.5" text-anchor="middle" fill="#12402a">今天</text>
  <text x="715" y="182" font-size="7.5" text-anchor="middle" fill="#2f6f4f">活跃</text>
  <!-- future pre-created -->
  <g text-anchor="middle" font-size="7.5">
    <rect x="756" y="150" width="80" height="40" rx="7" fill="#f4eefb" stroke="#d9c7ec"/><text x="796" y="167" fill="#5a3d78">p明天</text><text x="796" y="182" fill="#8d6bb0">预建</text>
    <rect x="844" y="150" width="80" height="40" rx="7" fill="#f4eefb" stroke="#d9c7ec"/><text x="884" y="167" fill="#5a3d78">p后天</text><text x="884" y="182" fill="#8d6bb0">预建</text>
    <rect x="932" y="150" width="80" height="40" rx="7" fill="#faf4fb" stroke="#e2d2ee"/><text x="972" y="167" fill="#5a3d78">p未来N</text><text x="972" y="182" fill="#8d6bb0">预建</text>
  </g>

  <text x="546" y="128" font-size="8.5" text-anchor="middle" fill="#a5453a">← 删过期(超保留期)</text>
  <text x="884" y="128" font-size="8.5" text-anchor="middle" fill="#8d6bb0">加未来分区(预建期) →</text>

  <text x="396" y="248" font-size="8.5" fill="#6e6e73">· 每轮周期:删掉超出保留期的老分区,补齐未来预建期内缺的新分区。</text>
  <text x="396" y="266" font-size="8.5" fill="#6e6e73">· 导入落到"今天/未来"分区时不会因分区不存在而失败——分区已被提前建好。</text>

  <line x1="350" y1="220" x2="408" y2="200" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- bottom: attribution -->
  <rect x="30" y="330" width="1020" height="152" rx="13" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="46" y="354" font-size="11" font-weight="700" fill="#5a3d78">归属 · 元数据能力域的后台异步部分</text>
  <text x="46" y="378" font-size="9" fill="#8d6bb0">动态分区改的是【元数据】(分区的增删),它落在【后台任务】只因执行时机是"后台异步"。</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="46" y="392" width="320" height="72" rx="10" fill="#faf4fb" stroke="#e2d2ee"/><text x="206" y="418" font-size="9.5" font-weight="600" fill="#5a3d78">前台不感知</text><text x="206" y="438" fill="#8d6bb0">用户只管写入/查询,</text><text x="206" y="453" fill="#8d6bb0">不必手动 ADD/DROP PARTITION</text>
    <rect x="380" y="392" width="320" height="72" rx="10" fill="#eafaf1" stroke="#bfe0cd"/><text x="540" y="418" font-size="9.5" font-weight="600" fill="#12402a">自动滚动</text><text x="540" y="438" fill="#2f6f4f">后台守护按 property 加/删,</text><text x="540" y="453" fill="#2f6f4f">时序分区自动向前推进</text>
    <rect x="714" y="392" width="320" height="72" rx="10" fill="#fff7e6" stroke="#e8cf9a"/><text x="874" y="418" font-size="9.5" font-weight="600" fill="#5a3410">与其他后台任务同源</text><text x="874" y="438" fill="#93762e">"后台守护 + 周期/property 驱动"</text><text x="874" y="453" fill="#93762e">把重活挪出前台请求路径</text>
  </g>
</svg>
