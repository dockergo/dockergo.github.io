<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks 物化视图 · 异步 MTMV vs 同步 Rollup(+ CBO 透明改写)</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">两条完全不同的路:异步 MV 是独立表后台刷新;同步 MV(Rollup)随基表写入同步维护</text>

  <!-- 异步 MTMV -->
  <rect x="30" y="70" width="510" height="300" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="50" y="96" font-size="12" font-weight="700" fill="#1b2a4a">异步物化视图 MTMV · 后台调度刷新</text>
  <text x="50" y="112" font-size="8" fill="#5b7db1">独立的表,灵活支持多表 Join,但有时效延迟</text>

  <rect x="50" y="124" width="470" height="46" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="285" y="145" font-size="9.5" text-anchor="middle" font-weight="600" fill="#274a78">TaskRun.executeTaskRun() (scheduler/TaskRun.java:430)</text>
  <text x="285" y="161" font-size="8" text-anchor="middle" fill="#5b7db1">任务框架驱动,后台按调度触发</text>

  <text x="50" y="190" font-size="9" font-weight="700" fill="#1b2a4a">MVRefreshProcessorFactory 选处理器:</text>
  <g text-anchor="middle" font-size="8">
    <rect x="50" y="200" width="150" height="58" rx="9" fill="#eef3fb" stroke="#bcd0ec"/><text x="125" y="222" font-size="8.7" font-weight="600" fill="#1b2a4a">MVPCTRefresh</text><text x="125" y="238" fill="#5b7db1">分区变化跟踪 PCT</text><text x="125" y="252" fill="#5b7db1">insert-overwrite</text>
    <rect x="210" y="200" width="150" height="58" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/><text x="285" y="222" font-size="8.7" font-weight="600" fill="#274a78">MVIVMRefresh</text><text x="285" y="238" fill="#5b7db1">增量 IVM</text><text x="285" y="252" fill="#5b7db1">只算变化部分</text>
    <rect x="370" y="200" width="150" height="58" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/><text x="445" y="222" font-size="8.7" font-weight="600" fill="#274a78">MVHybridRefresh</text><text x="445" y="238" fill="#5b7db1">混合</text><text x="445" y="252" fill="#5b7db1">PCT + IVM</text>
  </g>
  <rect x="50" y="270" width="245" height="44" rx="9" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="172" y="290" font-size="8.5" text-anchor="middle" fill="#12402a">MVRefreshExecutor.executePlan</text>
  <text x="172" y="305" font-size="7.5" text-anchor="middle" fill="#2f6f4f">scheduler/mv/MVRefreshExecutor.java:29</text>
  <rect x="305" y="270" width="215" height="44" rx="9" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="412" y="290" font-size="8.5" text-anchor="middle" fill="#5a3410">MVTimelinessArbiter</text>
  <text x="412" y="305" font-size="7.5" text-anchor="middle" fill="#93762e">判定哪些分区过期需刷</text>
  <text x="50" y="336" font-size="8.5" fill="#5b7db1">PCT 刷新用 insert-overwrite 计划替换过期分区;</text>
  <text x="50" y="352" font-size="8.5" fill="#5b7db1">时效由 partition_refresh_number 等 property 换资源。</text>

  <!-- 同步 Rollup -->
  <rect x="560" y="70" width="490" height="300" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="580" y="96" font-size="12" font-weight="700" fill="#5a3410">同步 MV / Rollup · 随写同步维护</text>
  <text x="580" y="112" font-size="8" fill="#93762e">本质是 schema-change,强一致但受限</text>

  <rect x="580" y="124" width="450" height="46" rx="9" fill="#fef2e0" stroke="#e8cf9a"/>
  <text x="805" y="145" font-size="9.5" text-anchor="middle" font-weight="600" fill="#5a3410">MaterializedViewHandler (alter/MaterializedViewHandler.java:111)</text>
  <text x="805" y="161" font-size="8" text-anchor="middle" fill="#93762e">createMaterializedViewJob 建任务</text>

  <line x1="805" y1="170" x2="805" y2="192" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <rect x="620" y="196" width="370" height="52" rx="9" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="805" y="218" font-size="9.5" text-anchor="middle" font-weight="600" fill="#5a3410">RollupJobV2</text>
  <text x="805" y="235" font-size="8" text-anchor="middle" fill="#93762e">后台构建 rollup 数据</text>

  <line x1="805" y1="248" x2="805" y2="270" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <rect x="620" y="274" width="370" height="52" rx="9" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="805" y="296" font-size="9" text-anchor="middle" font-weight="600" fill="#12402a">构建完成后随基表写入同步维护</text>
  <text x="805" y="313" font-size="8" text-anchor="middle" fill="#2f6f4f">强一致,无时效延迟;不支持多表 Join</text>
  <text x="580" y="348" font-size="8.5" fill="#93762e">对比:异步 MTMV 后台刷新、灵活但有延迟;同步 Rollup 随写维护、即时但受限。</text>

  <!-- CBO transparent rewrite -->
  <rect x="30" y="386" width="1020" height="136" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="50" y="410" font-size="11.5" font-weight="700" fill="#5a3d78">查询侧 · CBO 透明改写(把命中 MV 的查询自动重写到 MV)</text>
  <g text-anchor="middle">
    <rect x="50" y="424" width="290" height="80" rx="10" fill="#faf4fb" stroke="#e2d2ee"/><text x="195" y="450" font-size="9.5" font-weight="600" fill="#5a3d78">BaseMaterializedViewRewriteRule</text><text x="195" y="470" font-size="8" fill="#8d6bb0">sql/optimizer/rule/transformation/</text><text x="195" y="484" font-size="8" fill="#8d6bb0">materialization/</text>
    <rect x="370" y="424" width="290" height="80" rx="10" fill="#faf4fb" stroke="#e2d2ee"/><text x="515" y="450" font-size="9.5" font-weight="600" fill="#5a3d78">MvRewriteStrategy</text><text x="515" y="470" font-size="8" fill="#8d6bb0">单表 / 多表 / CBO /</text><text x="515" y="484" font-size="8" fill="#8d6bb0">视图改写开关</text>
    <rect x="690" y="424" width="340" height="80" rx="10" fill="#fff" stroke="#d9c7ec"/><text x="860" y="450" font-size="9.5" font-weight="600" fill="#5a3d78">效果</text><text x="860" y="470" font-size="8" fill="#8d6bb0">用户查基表,优化器自动改写到 MV</text><text x="860" y="484" font-size="8" fill="#8d6bb0">无需改 SQL,即享预计算加速</text>
  </g>
  <line x1="340" y1="464" x2="368" y2="464" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="660" y1="464" x2="688" y2="464" stroke="#c7c7cc" stroke-width="1.4" marker-end="url(#ar)"/>
</svg>
