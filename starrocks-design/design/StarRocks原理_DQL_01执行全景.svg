<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks 查询执行全景 · 一条 SELECT 的一生</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">FE 规划与协调,BE 执行(MPP);鉴权在规划阶段 StatementPlanner.plan 完成,不过关不生成计划</text>

  <!-- entry row -->
  <g text-anchor="middle">
    <rect x="30" y="74" width="300" height="64" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="180" y="98" font-size="11" font-weight="700" fill="#1b2a4a">ConnectProcessor</text><text x="180" y="116" font-size="8.5" fill="#5b7db1">MySQL 命令路由 · dispatch()/handleQuery()</text><text x="180" y="130" font-size="8" fill="#a1a1a6">qe/ConnectProcessor.java:965</text>
    <rect x="360" y="74" width="300" height="64" rx="12" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/><text x="510" y="98" font-size="11" font-weight="700" fill="#274a78">SqlParser.parse</text><text x="510" y="116" font-size="8.5" fill="#5b7db1">ANTLR 建 AST(方言分支 trino/starrocks)</text><text x="510" y="130" font-size="8" fill="#a1a1a6">sql/parser/SqlParser.java:80</text>
    <rect x="690" y="74" width="360" height="64" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="870" y="98" font-size="11" font-weight="700" fill="#1b2a4a">StmtExecutor.execute → generateExecPlan()</text><text x="870" y="116" font-size="8.5" fill="#5b7db1">语句执行总控 · 调 StatementPlanner.plan(:829)</text><text x="870" y="130" font-size="8" fill="#a1a1a6">qe/StmtExecutor.java:922</text>
  </g>
  <line x1="330" y1="106" x2="360" y2="106" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="660" y1="106" x2="690" y2="106" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="870" y1="138" x2="870" y2="160" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- StatementPlanner container -->
  <rect x="30" y="162" width="1020" height="248" rx="14" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="46" y="184" font-size="11" font-weight="700" fill="#274a78">StatementPlanner.plan() · (a) 分析 → (b) 鉴权 → (c) 规划编排</text>
  <text x="1034" y="184" font-size="8" text-anchor="end" fill="#a1a1a6">sql/StatementPlanner.java:114</text>

  <g text-anchor="middle">
    <rect x="46" y="196" width="480" height="62" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="286" y="218" font-size="10.5" font-weight="700" fill="#1b2a4a">(a) analyzeStatement → Analyzer 语义分析</text><text x="286" y="236" font-size="8.5" fill="#5b7db1">解析库表列 / 类型检查 / 展开 * / 绑定函数</text><text x="286" y="250" font-size="8" fill="#a1a1a6">StatementPlanner:135 · Analyzer.java:199</text>
    <rect x="542" y="196" width="492" height="62" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/><text x="788" y="218" font-size="10.5" font-weight="700" fill="#5a3d78">(b) Authorizer.check(stmt, session) · 鉴权</text><text x="788" y="236" font-size="8.5" fill="#8a6db3">不过关不生成计划(误区:非执行时才鉴权)</text><text x="788" y="250" font-size="8" fill="#a1a1a6">StatementPlanner:139 · 见 DCL 篇</text>
  </g>

  <!-- createQueryPlan sub-container -->
  <rect x="46" y="272" width="988" height="130" rx="12" fill="#ffffff" stroke="#cfe0f2"/>
  <text x="62" y="292" font-size="10" font-weight="700" fill="#274a78">(c) createQueryPlan · 逻辑计划 → 物理计划 → Fragment</text>
  <text x="1018" y="292" font-size="8" text-anchor="end" fill="#a1a1a6">StatementPlanner.java:153</text>
  <g text-anchor="middle">
    <rect x="62" y="302" width="300" height="88" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="212" y="326" font-size="10" font-weight="700" fill="#1b2a4a">RelationTransformer</text><text x="212" y="346" font-size="8.5" fill="#5b7db1">transformWithSelectLimit</text><text x="212" y="362" font-size="8.5" fill="#5b7db1">→ LogicalPlan(逻辑计划)</text><text x="212" y="378" font-size="8" fill="#a1a1a6">:333</text>
    <rect x="378" y="302" width="300" height="88" rx="10" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="528" y="326" font-size="10" font-weight="700" fill="#12402a">Optimizer.optimize · CBO</text><text x="528" y="346" font-size="8.5" fill="#2f6f4f">Cascades 出物理 OptExpression</text><text x="528" y="362" font-size="8.5" fill="#2f6f4f">(见优化技术篇)</text><text x="528" y="378" font-size="8" fill="#a1a1a6">:347</text>
    <rect x="694" y="302" width="324" height="88" rx="10" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="856" y="326" font-size="10" font-weight="700" fill="#1b2a4a">PlanFragmentBuilder</text><text x="856" y="346" font-size="8.5" fill="#5b7db1">createPhysicalPlan → 切 PlanFragment</text><text x="856" y="362" font-size="8.5" fill="#5b7db1">ExchangeNode 做分布式重分布</text><text x="856" y="378" font-size="8" fill="#a1a1a6">PlanFragmentBuilder.java:279</text>
  </g>
  <line x1="362" y1="346" x2="378" y2="346" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="678" y1="346" x2="694" y2="346" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- fragment -> coordinator connector -->
  <path d="M856,390 L856,418 L180,418 L180,428" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="520" y="414" font-size="8.5" fill="#a1a1a6">PlanFragment 交协调器分发到各 BE</text>

  <!-- execution row -->
  <g text-anchor="middle">
    <rect x="30" y="428" width="300" height="64" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/><text x="180" y="452" font-size="11" font-weight="700" fill="#1b2a4a">DefaultCoordinator</text><text x="180" y="470" font-size="8.5" fill="#5b7db1">startScheduling → 分发 Fragment 实例</text><text x="180" y="484" font-size="8" fill="#a1a1a6">qe/DefaultCoordinator.java:135</text>
    <rect x="360" y="428" width="360" height="64" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/><text x="540" y="452" font-size="11" font-weight="700" fill="#5a3410">BE · MPP 并行执行</text><text x="540" y="470" font-size="8.5" fill="#93762e">各 Fragment 多实例并行 · pipeline(执行引擎篇)</text><text x="540" y="484" font-size="8" fill="#a1a1a6">be/src/service/internal_service.cpp:301</text>
    <rect x="750" y="428" width="300" height="64" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="900" y="452" font-size="11" font-weight="700" fill="#12402a">汇聚返回结果</text><text x="900" y="470" font-size="8.5" fill="#2f6f4f">经 Exchange 汇聚 → 客户端</text><text x="900" y="484" font-size="8" fill="#a1a1a6">FE 只协调 · 计算全在 BE</text>
  </g>
  <line x1="330" y1="460" x2="360" y2="460" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="720" y1="460" x2="750" y2="460" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <text x="30" y="524" font-size="9" fill="#6e6e73">一句话:ConnectProcessor 收命令 → SqlParser 建 AST → StatementPlanner 内先鉴权再规划(CBO + 切 Fragment) → Coordinator 异步分发 → BE 的 MPP 并行执行汇聚返回。</text>
</svg>
