<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="560" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks 协作式调度与 Driver 状态机</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">Driver 跑满时间片主动让出、阻塞时归还线程 → 少量 worker 线程可跑多 Driver,避免上下文切换风暴</text>

  <!-- GlobalDriverExecutor container -->
  <rect x="30" y="64" width="1020" height="172" rx="13" fill="#f6f8fc" stroke="#e6ecf4"/>
  <text x="46" y="86" font-size="11.5" font-weight="700" fill="#1d1d1f">GlobalDriverExecutor 线程池执行器 · exec/pipeline/pipeline_driver_executor.h:42</text>

  <rect x="50" y="98" width="300" height="98" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="200" y="122" font-size="11" font-weight="700" text-anchor="middle" fill="#12402a">DriverQueue 就绪队列</text>
  <text x="200" y="143" font-size="9" text-anchor="middle" fill="#2f6f4f">持就绪 Driver,按多级反馈排序</text>
  <text x="200" y="160" font-size="9" text-anchor="middle" fill="#2f6f4f">worker 从队列取 Driver 执行</text>

  <rect x="390" y="98" width="300" height="98" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="540" y="122" font-size="11" font-weight="700" text-anchor="middle" fill="#5a3410">ThreadPool worker 线程</text>
  <text x="540" y="143" font-size="9" text-anchor="middle" fill="#93762e">调 driver-&gt;process(state, worker_id)</text>
  <text x="540" y="160" font-size="9" text-anchor="middle" fill="#93762e">跑满/阻塞则归还线程给池</text>

  <rect x="730" y="98" width="300" height="98" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="880" y="122" font-size="11" font-weight="700" text-anchor="middle" fill="#3d2a5a">PipelineDriverPoller</text>
  <text x="880" y="143" font-size="9" text-anchor="middle" fill="#5a3d78">挂起被阻塞 Driver</text>
  <text x="880" y="160" font-size="9" text-anchor="middle" fill="#5a3d78">轮询,条件满足→唤醒重入队</text>

  <!-- executor forward arrows -->
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="350" y1="130" x2="390" y2="130" marker-end="url(#ar)"/>
    <line x1="690" y1="130" x2="730" y2="130" marker-end="url(#ar)"/>
  </g>
  <text x="370" y="122" font-size="8.5" fill="#a1a1a6" text-anchor="middle">取出</text>
  <text x="710" y="122" font-size="8.5" fill="#a1a1a6" text-anchor="middle">阻塞</text>
  <text x="765" y="182" font-size="8.5" fill="#5a3d78">add_blocked_driver</text>
  <!-- return: yield (ThreadPool -> DriverQueue) -->
  <path d="M470,196 L470,210 L215,210 L215,196" stroke="#c7c7cc" stroke-width="1.4" fill="none" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="345" y="207" font-size="8.5" fill="#a1a1a6" text-anchor="middle">让出 put_back_from_executor</text>
  <!-- return: wake (Poller -> DriverQueue) -->
  <path d="M880,196 L880,224 L155,224 L155,196" stroke="#c7c7cc" stroke-width="1.4" fill="none" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="540" y="221" font-size="8.5" fill="#a1a1a6" text-anchor="middle">条件满足 → 重新入 DriverQueue</text>

  <!-- DriverState machine band -->
  <rect x="30" y="250" width="1020" height="216" rx="13" fill="#ffffff" stroke="#ececf1"/>
  <text x="46" y="272" font-size="11" font-weight="700" fill="#1d1d1f">process 返回后 Driver 落入某 DriverState · exec_primitive/pipeline/primitives/driver_state.h:26</text>

  <!-- states -->
  <rect x="60" y="330" width="152" height="62" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="136" y="358" font-size="11.5" font-weight="700" text-anchor="middle" fill="#12402a">READY</text>
  <text x="136" y="377" font-size="8.5" text-anchor="middle" fill="#2f6f4f">就绪,等 worker 取</text>

  <rect x="300" y="330" width="172" height="62" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="386" y="358" font-size="11.5" font-weight="700" text-anchor="middle" fill="#1b2a4a">RUNNING</text>
  <text x="386" y="377" font-size="8.5" text-anchor="middle" fill="#5b7db1">worker 正跑 process</text>

  <rect x="620" y="300" width="230" height="36" rx="9" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="735" y="323" font-size="10" font-weight="600" text-anchor="middle" fill="#5a3410">INPUT_EMPTY · 无上游输入</text>
  <rect x="620" y="342" width="230" height="36" rx="9" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="735" y="365" font-size="10" font-weight="600" text-anchor="middle" fill="#5a3410">OUTPUT_FULL · 下游满</text>
  <rect x="620" y="384" width="230" height="36" rx="9" fill="#fbeaea" stroke="#e7c3c3"/>
  <text x="735" y="407" font-size="10" font-weight="600" text-anchor="middle" fill="#7a2a2a">PRECONDITION_BLOCK · 前置未满足</text>

  <rect x="300" y="410" width="172" height="40" rx="10" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="386" y="435" font-size="11" font-weight="700" text-anchor="middle" fill="#12402a">FINISH · 执行完毕</text>

  <!-- state transitions -->
  <g stroke="#c7c7cc" stroke-width="1.5" fill="none">
    <line x1="212" y1="361" x2="300" y2="361" marker-end="url(#ar)"/>
    <line x1="472" y1="348" x2="620" y2="318" marker-end="url(#ar)"/>
    <line x1="472" y1="361" x2="620" y2="360" marker-end="url(#ar)"/>
    <line x1="472" y1="374" x2="620" y2="402" marker-end="url(#ar)"/>
    <line x1="386" y1="392" x2="386" y2="410" marker-end="url(#ar)"/>
  </g>
  <text x="256" y="353" font-size="8.5" fill="#a1a1a6" text-anchor="middle">取出执行</text>
  <text x="556" y="330" font-size="8.5" fill="#a1a1a6" text-anchor="middle">阻塞 → 交 poller</text>
  <text x="420" y="405" font-size="8.5" fill="#a1a1a6">完成</text>
  <!-- yield return: RUNNING -> READY (arc above) -->
  <path d="M360,330 L360,312 L136,312 L136,330" stroke="#c7c7cc" stroke-width="1.4" fill="none" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="248" y="308" font-size="8.5" fill="#a1a1a6" text-anchor="middle">跑满 100ms 让出 → 重新入队</text>
  <!-- wake return: blocked -> READY (route bottom) -->
  <path d="M620,402 L560,402 L560,458 L136,458 L136,392" stroke="#c7c7cc" stroke-width="1.4" fill="none" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="330" y="453" font-size="8.5" fill="#a1a1a6" text-anchor="middle">poller 检测条件满足 → 唤醒回 READY</text>

  <!-- bottom row -->
  <rect x="30" y="480" width="512" height="72" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="502" font-size="10.5" font-weight="700" fill="#1b2a4a">协作让出阈值 · pipeline_driver.h:418</text>
  <text x="46" y="521" font-size="9.3" fill="#5b7db1">YIELD_MAX_TIME_SPENT_NS = 100ms — 跑满时间片即主动让出</text>
  <text x="46" y="539" font-size="9.3" fill="#5b7db1">YIELD_PREEMPT_MAX_TIME_SPENT_NS = 5ms — 抢占检查间隔</text>

  <rect x="558" y="480" width="492" height="72" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="574" y="502" font-size="10.5" font-weight="700" fill="#3d2a5a">DriverAcct 多级反馈调度</text>
  <text x="574" y="521" font-size="9.3" fill="#5a3d78">get_level = Log2Floor64(schedule_times + 1)</text>
  <text x="574" y="539" font-size="9.3" fill="#5a3d78">调度次数越多层级越低 → 防长任务饿死短任务</text>
</svg>
