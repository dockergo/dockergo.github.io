<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">StarRocks Compaction 调度 · 两套框架 + 云原生 RPC 驱动</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">本地表 BE 自发调度(传统每盘线程 vs 事件驱动评分);云原生表调度权在 FE,经 RPC 驱动 BE</text>

  <!-- switch -->
  <rect x="30" y="70" width="1020" height="34" rx="10" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="540" y="92" font-size="9.5" text-anchor="middle" fill="#5a3d78">本地表由 enable_event_based_compaction_framework(olap_server.cpp:128)切换两套框架</text>

  <!-- 传统框架 -->
  <rect x="30" y="118" width="500" height="200" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="50" y="144" font-size="11.5" font-weight="700" fill="#1b2a4a">传统框架 · 每盘固定线程</text>
  <text x="50" y="160" font-size="8" fill="#5b7db1">olap_server.cpp:160(cumulative), :180(base)</text>
  <g text-anchor="middle" font-size="8">
    <rect x="50" y="174" width="220" height="54" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/><text x="160" y="196" font-size="9" font-weight="600" fill="#274a78">盘 0 线程</text><text x="160" y="214" fill="#5b7db1">base + cumulative 各一</text>
    <rect x="282" y="174" width="220" height="54" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/><text x="392" y="196" font-size="9" font-weight="600" fill="#274a78">盘 1 线程</text><text x="392" y="214" fill="#5b7db1">base + cumulative 各一</text>
  </g>
  <rect x="50" y="240" width="452" height="60" rx="9" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="276" y="262" font-size="9" text-anchor="middle" fill="#1b2a4a">find_best_tablet_to_compaction</text>
  <text x="276" y="280" font-size="8" text-anchor="middle" fill="#5b7db1">每个线程在本盘挑"最该压"的 Tablet 执行</text>
  <text x="276" y="294" font-size="7.5" text-anchor="middle" fill="#86868b">线程数由 *_compaction_num_threads_per_disk 控</text>

  <!-- 事件驱动 -->
  <rect x="550" y="118" width="500" height="200" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="570" y="144" font-size="11.5" font-weight="700" fill="#12402a">事件驱动 · CompactionManager</text>
  <text x="570" y="160" font-size="8" fill="#2f6f4f">compaction_manager.h:36 · _schedule() cpp:89</text>
  <rect x="570" y="172" width="460" height="42" rx="9" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="800" y="190" font-size="8.7" text-anchor="middle" fill="#12402a">update_tablet() 读 tablet-&gt;compaction_score() 喂入候选</text>
  <text x="800" y="205" font-size="8" text-anchor="middle" fill="#2f6f4f">哪个 Tablet 最脏(score 高),就先压哪个</text>
  <rect x="570" y="222" width="460" height="78" rx="9" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="800" y="242" font-size="8.7" text-anchor="middle" fill="#12402a">CompactionCandidateComparator 按 compaction score 降序</text>
  <text x="800" y="257" font-size="8" text-anchor="middle" fill="#2f6f4f">compaction_candidate.h:65</text>
  <g text-anchor="middle" font-size="7.5">
    <rect x="586" y="266" width="120" height="26" rx="5" fill="#eafaf1" stroke="#bfe0cd"/><text x="646" y="283" fill="#12402a">score 92 ↑先</text>
    <rect x="716" y="266" width="120" height="26" rx="5" fill="#eafaf1" stroke="#bfe0cd"/><text x="776" y="283" fill="#12402a">score 60</text>
    <rect x="846" y="266" width="168" height="26" rx="5" fill="#fff" stroke="#bfe0cd"/><text x="930" y="283" fill="#2f6f4f">score 30 …(大集群更均衡)</text>
  </g>

  <!-- 云原生 RPC -->
  <rect x="30" y="336" width="1020" height="128" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="50" y="360" font-size="11.5" font-weight="700" fill="#5a3410">云原生表 · RPC 驱动(调度权在 FE)</text>
  <g text-anchor="middle">
    <rect x="50" y="374" width="180" height="70" rx="10" fill="#eef3fb" stroke="#bcd0ec"/><text x="140" y="402" font-size="10" font-weight="700" fill="#1b2a4a">FE</text><text x="140" y="422" font-size="8" fill="#5b7db1">发起 Compaction</text><text x="140" y="436" font-size="8" fill="#5b7db1">调度决策方</text>
    <rect x="330" y="374" width="330" height="70" rx="10" fill="#fef2e0" stroke="#e8cf9a"/><text x="495" y="398" font-size="9.5" font-weight="600" fill="#5a3410">lake::CompactionScheduler::compact()</text><text x="495" y="416" font-size="8" fill="#93762e">compaction_scheduler.cpp:272 · BRPC handler</text><text x="495" y="432" font-size="8" fill="#93762e">worker: thread_task → do_compaction → tablet_mgr-&gt;compact() :530</text>
    <rect x="760" y="374" width="290" height="70" rx="10" fill="#fdf6ea" stroke="#efdcb4"/><text x="905" y="398" font-size="9.5" font-weight="600" fill="#5a3410">lake::CompactionPolicy::create</text><text x="905" y="416" font-size="8" fill="#93762e">Primary / SizeTiered /</text><text x="905" y="432" font-size="8" fill="#93762e">BaseAndCumulative(policy.cpp:614)</text>
  </g>
  <line x1="230" y1="409" x2="328" y2="409" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="279" y="402" font-size="7.5" text-anchor="middle" fill="#86868b">RPC</text>
  <line x1="660" y1="409" x2="758" y2="409" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="709" y="402" font-size="7.5" text-anchor="middle" fill="#86868b">选策略</text>

  <rect x="30" y="474" width="1020" height="48" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="497" font-size="9.5" font-weight="700" fill="#1d1d1f">对比</text>
  <text x="46" y="514" font-size="8.7" fill="#6e6e73">本地表:BE 自发调度(传统每盘线程 / 事件驱动按 score 降序);云原生表:FE 经 RPC 驱动 BE 执行,调度权与决策在 FE。</text>
</svg>
