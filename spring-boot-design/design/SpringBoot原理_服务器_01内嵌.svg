<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Spring Boot 内嵌服务器 · jar 内自带（4.x 模块布局）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">上下文 + 工厂在 module/spring-boot-web-server；WebServerFactory SPI；各服务器各自模块；自动配置按 classpath 选</text>

  <!-- Layer 1: contexts -->
  <rect x="30" y="70" width="1020" height="112" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="48" y="94" font-size="11.5" font-weight="700" fill="#1b2a4a">① 上下文 + 工厂（module/spring-boot-web-server）</text>
  <rect x="48" y="106" width="492" height="64" rx="11" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="294" y="130" font-size="10.5" font-weight="700" text-anchor="middle" fill="#274a78">ServletWebServerApplicationContext</text>
  <text x="294" y="150" font-size="9.4" text-anchor="middle" fill="#5b7db1">servlet 上下文</text>
  <text x="294" y="166" font-size="8.8" text-anchor="middle" fill="#a1a1a6">.../servlet/context/</text>
  <rect x="548" y="106" width="492" height="64" rx="11" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="794" y="130" font-size="10.5" font-weight="700" text-anchor="middle" fill="#274a78">ReactiveWebServerApplicationContext</text>
  <text x="794" y="150" font-size="9.4" text-anchor="middle" fill="#5b7db1">reactive 上下文</text>
  <text x="794" y="166" font-size="8.8" text-anchor="middle" fill="#a1a1a6">module/spring-boot-web-server</text>

  <!-- Layer 2: SPI -->
  <rect x="30" y="196" width="1020" height="96" rx="14" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="48" y="220" font-size="11.5" font-weight="700" fill="#3d2a5a">② 服务器工厂 SPI · WebServerFactory（.../WebServerFactory.java）</text>
  <rect x="48" y="232" width="492" height="50" rx="10" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="294" y="254" font-size="10.5" font-weight="700" text-anchor="middle" fill="#3d2a5a">ServletWebServerFactory</text>
  <text x="294" y="272" font-size="9" text-anchor="middle" fill="#8a6db3">servlet 侧工厂</text>
  <rect x="548" y="232" width="492" height="50" rx="10" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="794" y="254" font-size="10.5" font-weight="700" text-anchor="middle" fill="#3d2a5a">ReactiveWebServerFactory</text>
  <text x="794" y="272" font-size="9" text-anchor="middle" fill="#8a6db3">reactive 侧工厂</text>

  <!-- arrows down to impls -->
  <path d="M190,292 L190,326" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M540,292 L540,326" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M890,292 L890,326" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- Layer 3: implementations -->
  <text x="30" y="318" font-size="11.5" font-weight="700" fill="#5a3410">③ 实现：各服务器各自模块</text>
  <rect x="30" y="328" width="330" height="80" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="195" y="356" font-size="11" font-weight="700" text-anchor="middle" fill="#5a3410">Tomcat</text>
  <text x="195" y="378" font-size="9.4" text-anchor="middle" fill="#93762e">TomcatWebServer.java</text>
  <text x="195" y="396" font-size="8.6" text-anchor="middle" fill="#a1a1a6">module/spring-boot-tomcat</text>

  <rect x="375" y="328" width="330" height="80" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="540" y="356" font-size="11" font-weight="700" text-anchor="middle" fill="#5a3410">Jetty</text>
  <text x="540" y="378" font-size="9.4" text-anchor="middle" fill="#93762e">servlet 实现</text>
  <text x="540" y="396" font-size="8.6" text-anchor="middle" fill="#a1a1a6">module/spring-boot-jetty</text>

  <rect x="720" y="328" width="330" height="80" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="885" y="356" font-size="11" font-weight="700" text-anchor="middle" fill="#5a3410">Netty</text>
  <text x="885" y="378" font-size="9.4" text-anchor="middle" fill="#93762e">NettyWebServer.java（reactive）</text>
  <text x="885" y="396" font-size="8.6" text-anchor="middle" fill="#a1a1a6">module/spring-boot-reactor-netty</text>

  <!-- Bottom: autoconfig selects by classpath -->
  <rect x="30" y="424" width="1020" height="72" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="540" y="452" font-size="11" font-weight="700" text-anchor="middle" fill="#12402a">自动配置按 classpath 上哪个服务器类选工厂</text>
  <text x="540" y="476" font-size="9.6" text-anchor="middle" fill="#2f6f4f">有 Tomcat 类 → 配 TomcatServletWebServerFactory；换服务器 = 换 starter 依赖，无需改代码</text>
</svg>
