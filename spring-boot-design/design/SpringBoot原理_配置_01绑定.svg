<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Spring Boot 配置属性绑定 · @ConfigurationProperties 前缀绑定</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">把某前缀的配置项批量绑到强类型 POJO：比逐个 @Value 更清晰、类型安全</text>

  <!-- Annotation card -->
  <rect x="30" y="70" width="1020" height="96" rx="14" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="48" y="94" font-size="12" font-weight="700" fill="#3d2a5a">@ConfigurationProperties（context/properties/ConfigurationProperties.java:48）</text>
  <rect x="48" y="106" width="320" height="48" rx="10" fill="#ffffff" stroke="#e6daf3"/>
  <text x="208" y="128" font-size="9.8" font-weight="700" text-anchor="middle" fill="#3d2a5a">前缀绑定 · value/prefix 别名</text>
  <text x="208" y="146" font-size="8.8" text-anchor="middle" fill="#8a6db3">@ConfigurationProperties("app.mail")</text>
  <rect x="380" y="106" width="320" height="48" rx="10" fill="#ffffff" stroke="#e6daf3"/>
  <text x="540" y="128" font-size="9.8" font-weight="700" text-anchor="middle" fill="#3d2a5a">@Target TYPE / METHOD</text>
  <text x="540" y="146" font-size="8.8" text-anchor="middle" fill="#8a6db3">可标类，也可标 @Bean 方法</text>
  <rect x="712" y="106" width="320" height="48" rx="10" fill="#ffffff" stroke="#e6daf3"/>
  <text x="872" y="128" font-size="9.8" font-weight="700" text-anchor="middle" fill="#3d2a5a">ignoreUnknownFields 默认 true</text>
  <text x="872" y="146" font-size="8.8" text-anchor="middle" fill="#8a6db3">忽略未知配置项</text>

  <!-- PostProcessor flow -->
  <rect x="30" y="182" width="1020" height="140" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="48" y="206" font-size="12" font-weight="700" fill="#1b2a4a">绑定驱动：ConfigurationPropertiesBindingPostProcessor（:46，implements BeanPostProcessor）</text>

  <rect x="48" y="222" width="300" height="84" rx="11" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="198" y="252" font-size="10" font-weight="700" text-anchor="middle" fill="#274a78">postProcessBeforeInitialization</text>
  <text x="198" y="276" font-size="9.4" text-anchor="middle" fill="#5b7db1">bean 初始化前介入</text>
  <text x="198" y="296" font-size="8.8" text-anchor="middle" fill="#a1a1a6">BeanPostProcessor 回调</text>

  <path d="M348,264 L392,264" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="394" y="222" width="300" height="84" rx="11" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="544" y="252" font-size="10" font-weight="700" text-anchor="middle" fill="#274a78">bind(ConfigurationPropertiesBean.get(...))</text>
  <text x="544" y="276" font-size="9.4" text-anchor="middle" fill="#5b7db1">取该 bean 的前缀与元信息</text>
  <text x="544" y="296" font-size="8.8" text-anchor="middle" fill="#a1a1a6">解析绑定目标</text>

  <path d="M694,264 L738,264" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="740" y="222" width="292" height="84" rx="11" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="886" y="252" font-size="10.5" font-weight="700" text-anchor="middle" fill="#274a78">binder.bind(bean)</text>
  <text x="886" y="276" font-size="9.4" text-anchor="middle" fill="#5b7db1">把配置值写入 POJO 字段</text>
  <text x="886" y="296" font-size="8.8" text-anchor="middle" fill="#a1a1a6">app.mail.host → host</text>

  <!-- Binder core -->
  <rect x="30" y="338" width="1020" height="158" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="48" y="362" font-size="12" font-weight="700" fill="#12402a">核心 binder · context/properties/bind/Binder.java（按目标类型选绑定策略）</text>

  <rect x="48" y="378" width="320" height="102" rx="11" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="208" y="406" font-size="10.5" font-weight="700" text-anchor="middle" fill="#12402a">JavaBeanBinder</text>
  <text x="208" y="430" font-size="9.4" text-anchor="middle" fill="#2f6f4f">setter 绑定</text>
  <text x="208" y="452" font-size="9" text-anchor="middle" fill="#a1a1a6">有默认构造 + setter 的 POJO</text>
  <text x="208" y="470" font-size="9" text-anchor="middle" fill="#a1a1a6">调 setHost(...) 注入</text>

  <rect x="380" y="378" width="320" height="102" rx="11" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="540" y="406" font-size="10.5" font-weight="700" text-anchor="middle" fill="#12402a">ValueObjectBinder</text>
  <text x="540" y="430" font-size="9.4" text-anchor="middle" fill="#2f6f4f">构造器绑定</text>
  <text x="540" y="452" font-size="9" text-anchor="middle" fill="#a1a1a6">不可变对象（构造参数）</text>
  <text x="540" y="470" font-size="9" text-anchor="middle" fill="#a1a1a6">经构造函数注入</text>

  <rect x="712" y="378" width="320" height="102" rx="11" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="872" y="406" font-size="10.5" font-weight="700" text-anchor="middle" fill="#12402a">IndexedElementsBinder</text>
  <text x="872" y="430" font-size="9.4" text-anchor="middle" fill="#2f6f4f">集合绑定</text>
  <text x="872" y="452" font-size="9" text-anchor="middle" fill="#a1a1a6">List / 数组等索引元素</text>
  <text x="872" y="470" font-size="9" text-anchor="middle" fill="#a1a1a6">app.list[0]、[1]…</text>
</svg>
