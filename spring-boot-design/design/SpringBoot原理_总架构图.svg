<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="820" viewBox="0 0 1080 820" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="820" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Spring Boot 核心原理 · 总架构图（位置即语义）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">约定优于配置的应用框架:建在 Spring Framework 的 IoC 容器上,加自动配置+starter+内嵌服务器,一行 run 启动</text>

  <!-- iface -->
  <rect x="30" y="64" width="1020" height="46" rx="13" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="46" y="87" font-size="11" fill="#3d2a5a"><tspan font-weight="700">① 接触面 · 注解与 SpringApplication 启动</tspan>　@SpringBootApplication(三合一)· run() 一行 · SpringApplicationRunListener 7 阶段</text>
  <text x="46" y="103" font-size="8.6" fill="#8a6db3">面向应用开发者:一注解 + 一行 run,约定优于配置的入口</text>

  <!-- run flow band -->
  <rect x="30" y="124" width="1020" height="44" rx="12" fill="#e7f0fb" stroke="#b9d2ef"/>
  <text x="540" y="144" font-size="10" font-weight="700" text-anchor="middle" fill="#1b2a4a">② run() 流程:prepareEnvironment(环境) → createApplicationContext(按 web 类型) → prepareContext → refreshContext → callRunners</text>
  <text x="540" y="160" font-size="8.4" text-anchor="middle" fill="#5b7db1">SpringApplication.run() 一行走完 · SpringFactoriesLoader 加载可插拔扩展点</text>

  <!-- IoC container (framework, dashed) -->
  <rect x="30" y="182" width="1020" height="120" rx="16" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="204" font-size="12" font-weight="700" fill="#1b2a4a">③ IoC 容器（核心 · 委托 Spring Framework 7.0.8,非本仓库）</text>
  <rect x="46" y="214" width="988" height="34" rx="8" fill="#f0eee9" stroke="#d8d2c6" stroke-dasharray="5 3"/><text x="540" y="235" font-size="8.6" text-anchor="middle" fill="#6e6357">ApplicationContext.refresh() 12 步(prepareBeanFactory→invokeBeanFactoryPostProcessors→...→finishRefresh)在 framework · Boot 只 applicationContext.refresh() 委托</text>
  <g text-anchor="middle" font-size="8.4">
    <rect x="46" y="254" width="490" height="40" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="291" y="271" fill="#274a78">bean 定义 = 用户 bean(@ComponentScan)</text><text x="291" y="286" fill="#5b7db1">+ 自动配置 bean(@EnableAutoConfiguration)</text>
    <rect x="546" y="254" width="488" height="40" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="790" y="271" fill="#274a78">Boot 在 refresh 前预配 bean factory</text><text x="790" y="286" fill="#5b7db1">ApplicationContextFactory 按 web 类型选上下文</text>
  </g>

  <!-- capability band: 2 rows x 3 -->
  <rect x="30" y="316" width="330" height="80" rx="13" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="337" font-size="10.5" font-weight="700" fill="#12402a">④ 自动配置(灵魂)</text>
  <text x="46" y="355" font-size="8.4" fill="#2f6f4f">.imports 候选 + @ConditionalOnClass/OnMissingBean</text>
  <text x="46" y="370" font-size="8.4" fill="#2f6f4f">classpath 有什么配什么,读字节码不加载类</text>
  <text x="46" y="386" font-size="8" fill="#a1a1a6">AutoConfigurationImportSelector</text>

  <rect x="375" y="316" width="330" height="80" rx="13" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="391" y="337" font-size="10.5" font-weight="700" fill="#5a3410">⑤ starter 机制</text>
  <text x="391" y="355" font-size="8.4" fill="#93762e">纯依赖 POM,一个拉全一套</text>
  <text x="391" y="370" font-size="8.4" fill="#93762e">带技术 jar + .imports 触发自动配置</text>
  <text x="391" y="386" font-size="8" fill="#a1a1a6">spring-boot-starter-*</text>

  <rect x="720" y="316" width="330" height="80" rx="13" fill="#e7f0fb" stroke="#b9d2ef"/>
  <text x="736" y="337" font-size="10.5" font-weight="700" fill="#1b2a4a">⑥ 内嵌服务器</text>
  <text x="736" y="355" font-size="8.4" fill="#5b7db1">jar 内 Tomcat/Jetty/Netty</text>
  <text x="736" y="370" font-size="8.4" fill="#5b7db1">创建(onRefresh)/启动(SmartLifecycle)分离</text>
  <text x="736" y="386" font-size="8" fill="#a1a1a6">WebServerFactory / TomcatWebServer</text>

  <rect x="30" y="408" width="330" height="80" rx="13" fill="#f4eefb" stroke="#d9c7ec"/>
  <text x="46" y="429" font-size="10.5" font-weight="700" fill="#3d2a5a">⑦ 配置属性绑定</text>
  <text x="46" y="447" font-size="8.4" fill="#8a6db3">@ConfigurationProperties 前缀绑定</text>
  <text x="46" y="462" font-size="8.4" fill="#8a6db3">松散绑定 + Environment 多源优先级</text>
  <text x="46" y="478" font-size="8" fill="#a1a1a6">Binder / ConfigurationPropertyName</text>

  <rect x="375" y="408" width="330" height="80" rx="13" fill="#f7f7f9" stroke="#e3e3e8"/>
  <text x="391" y="429" font-size="10.5" font-weight="700" fill="#1d1d1f">⑧ Actuator</text>
  <text x="391" y="447" font-size="8.4" fill="#6e6e73">@Endpoint 端点 /health /metrics /env</text>
  <text x="391" y="462" font-size="8.4" fill="#6e6e73">配 k8s 探针 / Prometheus 抓取</text>
  <text x="391" y="478" font-size="8" fill="#a1a1a6">EndpointDiscoverer / HealthEndpoint</text>

  <rect x="720" y="408" width="330" height="80" rx="13" fill="#f9ecec" stroke="#e8c9c9"/>
  <text x="736" y="429" font-size="10.5" font-weight="700" fill="#7a2230">⑨ AOT 原生</text>
  <text x="736" y="447" font-size="8.4" fill="#a85560">构建期提前处理生成初始化代码</text>
  <text x="736" y="462" font-size="8.4" fill="#a85560">GraalVM 原生镜像:毫秒启动小内存</text>
  <text x="736" y="478" font-size="8" fill="#a1a1a6">SpringApplicationAotProcessor</text>

  <!-- runtime -->
  <rect x="30" y="502" width="1020" height="46" rx="14" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="46" y="524" font-size="11" font-weight="700" fill="#5a3410">运行:java -jar app.jar · 内嵌服务器接请求 · Actuator 暴露运维端点</text>
  <text x="46" y="540" font-size="8.6" fill="#93762e">自包含可执行 jar(服务器内嵌),无需外部容器;或 AOT+GraalVM 编译成原生可执行文件</text>

  <!-- flow arrows -->
  <line x1="540" y1="110" x2="540" y2="124" stroke="#86868b" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="540" y1="168" x2="540" y2="182" stroke="#86868b" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="540" y1="302" x2="540" y2="316" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="540" y1="488" x2="540" y2="502" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- semantics -->
  <rect x="30" y="562" width="1020" height="48" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="583" font-size="11" font-weight="700" fill="#1d1d1f">位置即语义</text>
  <text x="46" y="601" font-size="8.6" fill="#6e6e73">上=接触面(注解+run);②run 流程;③IoC 容器(核心,委托 framework 虚线);④~⑨六能力域;底=运行(内嵌服务器/原生)。Boot 加装配层,framework 供 IoC。</text>

  <!-- pervasive -->
  <rect x="30" y="624" width="1020" height="44" rx="12" fill="#f0f0f4" stroke="#d2d2d7"/>
  <text x="540" y="651" font-size="10" font-weight="700" text-anchor="middle" fill="#48484a">贯穿层 · 条件装配(@Conditional)—— 自动配置/starter/内嵌服务器都靠条件(有某类/无某 bean/某属性才生效),classpath 状态决定装配</text>

  <!-- declarations -->
  <rect x="30" y="682" width="1020" height="66" rx="13" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="46" y="702" font-size="10" font-weight="700" fill="#12402a">三条贯穿声明</text>
  <text x="46" y="720" font-size="8.5" fill="#2f6f4f">① 约定优于配置+自动装配(classpath 有什么配什么,条件化,零样板)　② 建在 Spring Framework 的 IoC 容器上不重造(分清 framework 与 Boot)</text>
  <text x="46" y="736" font-size="8.5" fill="#2f6f4f">③ 一个可执行 jar 自带服务器(内嵌 Tomcat/Jetty/Netty,SmartLifecycle 启动,java -jar 直接跑,云原生友好)</text>

  <text x="30" y="778" font-size="9" fill="#a1a1a6">源码基准 Spring Boot 4.1.1-SNAPSHOT · 4.x 模块布局扁平化(core//module//starter/)· 依赖 spring-framework 7.0.8</text>
</svg>
