<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="510" viewBox="0 0 1080 510" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="510" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Spring Boot 核心原理 · IoC ① 边界:framework 的 IoC vs Boot 的封装</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">核心 IoC 不在 Spring Boot 仓库 · Boot 只 applicationContext.refresh() 委托 + refresh 前预配 · 读源码务必分清归属</text>

  <!-- LEFT: framework (external, dashed) -->
  <rect x="30" y="76" width="500" height="404" rx="16" fill="#f0eee9" stroke="#d8d2c6" stroke-dasharray="6 4"/>
  <text x="50" y="102" font-size="12" font-weight="700" fill="#6e6357">Spring Framework 7.0.8（外部依赖 · 非本仓库）</text>
  <text x="50" y="120" font-size="8.6" fill="#a1a1a6">gradle.properties:25 springFrameworkVersion=7.0.8 · 本仓库 find 不到</text>

  <rect x="50" y="134" width="460" height="70" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="280" y="157" font-size="10.5" font-weight="700" text-anchor="middle" fill="#1b2a4a">BeanFactory / DefaultListableBeanFactory</text>
  <text x="280" y="178" font-size="8.8" text-anchor="middle" fill="#5b7db1">bean 定义 · 依赖注入核心</text>
  <text x="280" y="194" font-size="8" text-anchor="middle" fill="#a1a1a6">容器的实际实现</text>

  <rect x="50" y="216" width="460" height="70" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="280" y="239" font-size="10.5" font-weight="700" text-anchor="middle" fill="#1b2a4a">AbstractApplicationContext.refresh()</text>
  <text x="280" y="260" font-size="8.8" text-anchor="middle" fill="#5b7db1">12 步生命周期(prepareRefresh…finishRefresh)</text>
  <text x="280" y="276" font-size="8" text-anchor="middle" fill="#a1a1a6">bean 实例化/注入/BeanPostProcessor 都在此</text>

  <rect x="50" y="298" width="460" height="60" rx="11" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="280" y="320" font-size="9.6" font-weight="700" text-anchor="middle" fill="#274a78">refresh 里的 bean 实例化/注入是 framework 的</text>
  <text x="280" y="340" font-size="8.6" text-anchor="middle" fill="#5b7db1">Boot 不重造这些,只触发它们运行</text>

  <text x="50" y="384" font-size="9" fill="#93762e">读 Boot 源码要记:哪些是 framework 的、哪些是 Boot 加的。</text>
  <text x="50" y="404" font-size="9" fill="#6e6357">Boot 管的是「给容器喂什么 bean 定义」(自动配置 + 用户 bean),</text>
  <text x="50" y="422" font-size="9" fill="#6e6357">不管 bean 具体怎么被实例化/注入——那是 framework 的活。</text>
  <text x="50" y="452" font-size="8.4" fill="#a1a1a6">误区:IoC 容器是 Spring Boot 写的——错,核心 IoC 在 framework。</text>

  <!-- boundary arrow -->
  <path d="M530,278 L580,278" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="555" y="270" font-size="8" text-anchor="middle" fill="#a1a1a6">委托</text>

  <!-- RIGHT: Boot side -->
  <rect x="580" y="76" width="470" height="404" rx="16" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="600" y="102" font-size="12" font-weight="700" fill="#12402a">Spring Boot 4.1.1（本仓库 core/spring-boot/）</text>
  <text x="600" y="120" font-size="8.6" fill="#a1a1a6">只委托 + 预配,不含 refresh 实现</text>

  <rect x="600" y="134" width="430" height="70" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="815" y="157" font-size="10.5" font-weight="700" text-anchor="middle" fill="#12402a">SpringApplication.refresh(...) 委托</text>
  <text x="815" y="178" font-size="8.8" text-anchor="middle" fill="#2f6f4f">调 applicationContext.refresh()(:755)</text>
  <text x="815" y="194" font-size="8" text-anchor="middle" fill="#a1a1a6">真正 12 步在 framework 里跑</text>

  <rect x="600" y="216" width="430" height="142" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="815" y="239" font-size="10.5" font-weight="700" text-anchor="middle" fill="#12402a">prepareContext 预配（refresh 前 · :386）</text>
  <text x="616" y="262" font-size="8.8" fill="#2f6f4f">· cast 成 framework 的 DefaultListableBeanFactory</text>
  <text x="616" y="282" font-size="8.8" fill="#2f6f4f">　设循环引用 / bean 覆盖标志</text>
  <text x="616" y="302" font-size="8.8" fill="#2f6f4f">· 注册单例 springApplicationArguments / springBootBanner(:401)</text>
  <text x="616" y="322" font-size="8.8" fill="#2f6f4f">· 加 PropertySourceOrderingBeanFactoryPostProcessor(:411)</text>
  <text x="616" y="344" font-size="8" fill="#a1a1a6">在 framework refresh 之前把自己的东西塞进去</text>

  <rect x="600" y="370" width="430" height="94" rx="11" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="616" y="392" font-size="10" font-weight="700" fill="#1d1d1f">归属提醒</text>
  <text x="616" y="412" font-size="8.8" fill="#6e6e73">refresh 委托在【IoC 容器】· 装配的自动配置 bean 逻辑在【自动配置】</text>
  <text x="616" y="430" font-size="8.8" fill="#6e6e73">refresh 中创建内嵌服务器在【内嵌服务器】· run() 全流程在【启动流程】</text>
  <text x="616" y="450" font-size="8.4" fill="#a1a1a6">调优:spring.main.allow-bean-definition-overriding 控同名 bean 是否可覆盖(默认关)</text>
</svg>
