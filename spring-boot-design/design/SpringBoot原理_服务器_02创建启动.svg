<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Spring Boot 内嵌服务器 · 创建 vs 启动 分离</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">对象在 onRefresh 建好但不 start，finishRefresh 才由 SmartLifecycle 真正 start()——等所有 bean 就绪才接流量</text>

  <!-- Phase A: create (onRefresh) -->
  <rect x="30" y="72" width="1020" height="176" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="48" y="96" font-size="12" font-weight="700" fill="#1b2a4a">① 创建（refresh 的 onRefresh 阶段）· 对象建好但没 start</text>

  <rect x="48" y="110" width="300" height="120" rx="11" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="198" y="136" font-size="10.5" font-weight="700" text-anchor="middle" fill="#274a78">ServletWebServerApplicationContext</text>
  <text x="198" y="156" font-size="10" text-anchor="middle" fill="#274a78">.onRefresh()</text>
  <text x="198" y="186" font-size="9.4" text-anchor="middle" fill="#5b7db1">调 createWebServer()</text>
  <text x="198" y="216" font-size="8.8" text-anchor="middle" fill="#a1a1a6">ServletWebServerApplicationContext.java:161</text>

  <path d="M348,170 L392,170" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="394" y="110" width="300" height="120" rx="11" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="544" y="136" font-size="10.5" font-weight="700" text-anchor="middle" fill="#274a78">createWebServer()</text>
  <text x="544" y="160" font-size="9.4" text-anchor="middle" fill="#5b7db1">取 ServletWebServerFactory bean</text>
  <text x="544" y="184" font-size="9.4" text-anchor="middle" fill="#5b7db1">factory.getWebServer(</text>
  <text x="544" y="200" font-size="9.4" text-anchor="middle" fill="#5b7db1">getSelfInitializer())</text>
  <text x="544" y="220" font-size="8.8" text-anchor="middle" fill="#a1a1a6">:183</text>

  <path d="M694,170 L738,170" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="740" y="110" width="292" height="120" rx="11" fill="#ffffff" stroke="#ececf1"/>
  <text x="886" y="140" font-size="10.5" font-weight="700" text-anchor="middle" fill="#1d1d1f">webServer 对象建好</text>
  <text x="886" y="164" font-size="9.6" text-anchor="middle" fill="#6e6e73">但没 start</text>
  <text x="886" y="192" font-size="9" text-anchor="middle" fill="#a1a1a6">注册 webServerGracefulShutdown</text>
  <text x="886" y="210" font-size="9" text-anchor="middle" fill="#a1a1a6">+ webServerStartStop 生命周期（:193）</text>

  <!-- connector between phases -->
  <path d="M540,248 L540,278" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="640" y="268" font-size="9" text-anchor="middle" fill="#a1a1a6">等 bean 就绪 → 进入启动阶段</text>

  <!-- Phase B: start (finishRefresh) -->
  <rect x="30" y="282" width="1020" height="176" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="48" y="306" font-size="12" font-weight="700" fill="#12402a">② 启动（refresh 的 finishRefresh 阶段）· 真正 start()</text>

  <rect x="48" y="320" width="300" height="120" rx="11" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="198" y="346" font-size="10.5" font-weight="700" text-anchor="middle" fill="#12402a">WebServerStartStopLifecycle</text>
  <text x="198" y="366" font-size="10" text-anchor="middle" fill="#12402a">.start()</text>
  <text x="198" y="394" font-size="9.4" text-anchor="middle" fill="#2f6f4f">SmartLifecycle 触发</text>
  <text x="198" y="426" font-size="8.8" text-anchor="middle" fill="#a1a1a6">WebServerStartStopLifecycle.java:43</text>

  <path d="M348,380 L392,380" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="394" y="320" width="300" height="120" rx="11" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="544" y="346" font-size="10.5" font-weight="700" text-anchor="middle" fill="#12402a">webServer.start()</text>
  <text x="544" y="372" font-size="9.4" text-anchor="middle" fill="#2f6f4f">发 ServletWebServer</text>
  <text x="544" y="388" font-size="9.4" text-anchor="middle" fill="#2f6f4f">InitializedEvent</text>
  <text x="544" y="418" font-size="9" text-anchor="middle" fill="#a1a1a6">initialized 事件</text>

  <path d="M694,380 L738,380" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="740" y="320" width="292" height="120" rx="11" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="886" y="346" font-size="10.5" font-weight="700" text-anchor="middle" fill="#5a3410">Tomcat 实现 initialize()</text>
  <text x="886" y="372" font-size="9.6" text-anchor="middle" fill="#93762e">调 tomcat.start()</text>
  <text x="886" y="396" font-size="9.4" text-anchor="middle" fill="#93762e">开始监听端口、接流量</text>
  <text x="886" y="422" font-size="8.8" text-anchor="middle" fill="#a1a1a6">TomcatWebServer.java:113</text>

  <!-- Why separate -->
  <rect x="30" y="472" width="1020" height="52" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="540" y="503" font-size="10.5" font-weight="700" text-anchor="middle" fill="#1d1d1f">为何分离：先建对象、等所有 bean 就绪，finishRefresh 才 start() 接流量——避免半初始化状态对外服务</text>
</svg>
