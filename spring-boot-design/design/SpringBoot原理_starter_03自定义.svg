<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Spring Boot 自定义 starter · 惯例两模块（职责分离）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">autoconfigure 放「配什么」（代码 + 条件），starter 放「拉什么」（纯 POM）——用户只依赖 starter</text>

  <!-- Module 1: autoconfigure -->
  <rect x="30" y="72" width="480" height="238" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="48" y="96" font-size="12" font-weight="700" fill="#12402a">模块一 · xxx-spring-boot-autoconfigure</text>
  <text x="48" y="114" font-size="9.4" fill="#2f6f4f">放「配什么」：代码 + 条件（module/*）</text>

  <rect x="48" y="128" width="444" height="76" rx="11" fill="#ffffff" stroke="#d3ecdd"/>
  <text x="270" y="152" font-size="10.5" font-weight="700" text-anchor="middle" fill="#12402a">自动配置类</text>
  <text x="270" y="174" font-size="9.6" text-anchor="middle" fill="#2f6f4f">@AutoConfiguration + @Conditional</text>
  <text x="270" y="194" font-size="9" text-anchor="middle" fill="#a1a1a6">条件成立才装配对应 bean</text>

  <rect x="48" y="214" width="444" height="78" rx="11" fill="#ffffff" stroke="#d3ecdd"/>
  <text x="270" y="238" font-size="10.5" font-weight="700" text-anchor="middle" fill="#12402a">META-INF/spring/....AutoConfiguration.imports</text>
  <text x="270" y="260" font-size="9.6" text-anchor="middle" fill="#2f6f4f">列出上面的自动配置类</text>
  <text x="270" y="280" font-size="9" text-anchor="middle" fill="#a1a1a6">供 AutoConfigurationImportSelector 读取</text>

  <!-- depends arrow between modules -->
  <path d="M570,275 L510,275" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="540" y="266" font-size="9" text-anchor="middle" fill="#a1a1a6">依赖</text>

  <!-- Module 2: starter -->
  <rect x="570" y="72" width="480" height="238" rx="14" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="588" y="96" font-size="12" font-weight="700" fill="#5a3410">模块二 · xxx-spring-boot-starter</text>
  <text x="588" y="114" font-size="9.4" fill="#93762e">放「拉什么」：纯依赖 POM（无 Java 代码）</text>

  <rect x="588" y="128" width="444" height="76" rx="11" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="810" y="152" font-size="10.5" font-weight="700" text-anchor="middle" fill="#5a3410">依赖 autoconfigure 模块</text>
  <text x="810" y="174" font-size="9.6" text-anchor="middle" fill="#93762e">把上面的 .imports 带上 classpath</text>
  <text x="810" y="194" font-size="9" text-anchor="middle" fill="#a1a1a6">纯 POM，不含代码</text>

  <rect x="588" y="214" width="444" height="78" rx="11" fill="#fdf6ea" stroke="#efdcb4"/>
  <text x="810" y="238" font-size="10.5" font-weight="700" text-anchor="middle" fill="#5a3410">依赖该技术的库</text>
  <text x="810" y="260" font-size="9.6" text-anchor="middle" fill="#93762e">带触发条件的技术 jar</text>
  <text x="810" y="280" font-size="9" text-anchor="middle" fill="#a1a1a6">让 @Conditional 满足</text>

  <!-- User flow -->
  <rect x="30" y="330" width="1020" height="66" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="128" y="358" font-size="10.5" font-weight="700" text-anchor="middle" fill="#1b2a4a">用户引入</text>
  <text x="128" y="378" font-size="9.4" text-anchor="middle" fill="#5b7db1">xxx-spring-boot-starter</text>
  <path d="M228,363 L300,363" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="470" y="358" font-size="10.5" font-weight="700" text-anchor="middle" fill="#1b2a4a">autoconfigure 模块的 .imports 上 classpath</text>
  <text x="470" y="378" font-size="9.4" text-anchor="middle" fill="#5b7db1">经 starter 的传递依赖带入</text>
  <path d="M700,363 L772,363" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="912" y="358" font-size="10.5" font-weight="700" text-anchor="middle" fill="#1b2a4a">条件满足自动装配</text>
  <text x="912" y="378" font-size="9.4" text-anchor="middle" fill="#5b7db1">用户只依赖 starter 即可</text>

  <!-- Naming convention -->
  <rect x="30" y="410" width="500" height="72" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="48" y="434" font-size="10.5" font-weight="700" fill="#1d1d1f">命名惯例</text>
  <text x="48" y="454" font-size="9.6" fill="#6e6e73">官方：spring-boot-starter-*（占用官方前缀）</text>
  <text x="48" y="472" font-size="9.6" fill="#6e6e73">第三方：xxx-spring-boot-starter（技术名在前）</text>

  <rect x="550" y="410" width="500" height="72" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="568" y="434" font-size="10.5" font-weight="700" fill="#3d2a5a">为什么分两模块</text>
  <text x="568" y="454" font-size="9.6" fill="#8a6db3">autoconfigure 放「配什么」（代码 + 条件）</text>
  <text x="568" y="472" font-size="9.6" fill="#8a6db3">starter 放「拉什么依赖」（纯 POM）——职责分离</text>
</svg>
