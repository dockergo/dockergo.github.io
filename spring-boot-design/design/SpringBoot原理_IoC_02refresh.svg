<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Spring Boot 核心原理 · IoC ② refresh 12 步生命周期（framework 概念,Boot 委托触发）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">AbstractApplicationContext.refresh() · 自动配置/内嵌服务器创建·启动都嵌在特定阶段 · 高亮=Boot 关键锚点</text>

  <!-- Row 1 -->
  <g>
    <rect x="30" y="76" width="246" height="70" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="46" y="98" font-size="10" font-weight="700" fill="#1b2a4a">1 · prepareRefresh</text>
    <text x="46" y="118" font-size="8.4" fill="#5b7db1">刷新前准备,置激活标志</text>
    <text x="46" y="134" font-size="8.4" fill="#5b7db1">校验必需属性</text>

    <rect x="288" y="76" width="246" height="70" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="304" y="98" font-size="10" font-weight="700" fill="#1b2a4a">2 · obtainBeanFactory</text>
    <text x="304" y="118" font-size="8.4" fill="#5b7db1">取/建 BeanFactory</text>
    <text x="304" y="134" font-size="8.4" fill="#5b7db1">加载 bean 定义</text>

    <rect x="546" y="76" width="246" height="70" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="562" y="98" font-size="10" font-weight="700" fill="#1b2a4a">3 · prepareBeanFactory</text>
    <text x="562" y="118" font-size="8.4" fill="#5b7db1">配 BeanFactory</text>
    <text x="562" y="134" font-size="8.4" fill="#5b7db1">类加载器/后置处理器等</text>

    <rect x="804" y="76" width="246" height="70" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="820" y="98" font-size="10" font-weight="700" fill="#1b2a4a">4 · postProcessBeanFactory</text>
    <text x="820" y="118" font-size="8.4" fill="#5b7db1">子类扩展点</text>
    <text x="820" y="134" font-size="8.4" fill="#5b7db1">上下文类型可定制</text>
  </g>

  <!-- Row 2 -->
  <g>
    <rect x="30" y="168" width="246" height="76" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
    <text x="46" y="188" font-size="9.6" font-weight="700" fill="#12402a">5 · invokeBeanFactoryPostProcessors</text>
    <text x="46" y="207" font-size="8.4" fill="#2f6f4f" font-weight="600">★ 自动配置在此装配 bean 定义</text>
    <text x="46" y="223" font-size="8.2" fill="#2f6f4f">ConfigurationClassPostProcessor</text>
    <text x="46" y="238" font-size="8.2" fill="#2f6f4f">处理 @Import,读 .imports</text>

    <rect x="288" y="168" width="246" height="76" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="304" y="188" font-size="9.6" font-weight="700" fill="#1b2a4a">6 · registerBeanPostProcessors</text>
    <text x="304" y="208" font-size="8.4" fill="#5b7db1">注册 BeanPostProcessor</text>
    <text x="304" y="224" font-size="8.4" fill="#5b7db1">供后续实例化时拦截</text>
    <text x="304" y="240" font-size="8" fill="#a1a1a6">如 AOP 代理注入</text>

    <rect x="546" y="168" width="246" height="76" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="562" y="188" font-size="10" font-weight="700" fill="#1b2a4a">7 · initMessageSource</text>
    <text x="562" y="208" font-size="8.4" fill="#5b7db1">初始化消息源</text>
    <text x="562" y="224" font-size="8.4" fill="#5b7db1">国际化 i18n 支持</text>

    <rect x="804" y="168" width="246" height="76" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="820" y="188" font-size="9.4" font-weight="700" fill="#1b2a4a">8 · initApplicationEventMulticaster</text>
    <text x="820" y="208" font-size="8.4" fill="#5b7db1">初始化事件广播器</text>
    <text x="820" y="224" font-size="8.4" fill="#5b7db1">发布应用事件用</text>
  </g>

  <!-- Row 3 -->
  <g>
    <rect x="30" y="266" width="246" height="76" rx="11" fill="#e7f0fb" stroke="#b9d2ef" filter="url(#soft)"/>
    <text x="46" y="286" font-size="10" font-weight="700" fill="#1b2a4a">9 · onRefresh</text>
    <text x="46" y="306" font-size="8.4" fill="#1b2a4a" font-weight="600">★ 内嵌服务器在此创建</text>
    <text x="46" y="322" font-size="8.2" fill="#5b7db1">子类模板方法</text>
    <text x="46" y="338" font-size="8" fill="#a1a1a6">createWebServer(未 start)</text>

    <rect x="288" y="266" width="246" height="76" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="304" y="286" font-size="10" font-weight="700" fill="#1b2a4a">10 · registerListeners</text>
    <text x="304" y="306" font-size="8.4" fill="#5b7db1">注册监听器</text>
    <text x="304" y="322" font-size="8.4" fill="#5b7db1">挂到事件广播器</text>

    <rect x="546" y="266" width="246" height="76" rx="11" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
    <text x="562" y="286" font-size="9.2" font-weight="700" fill="#12402a">11 · finishBeanFactoryInitialization</text>
    <text x="562" y="306" font-size="8.4" fill="#2f6f4f" font-weight="600">★ 实例化所有单例 bean</text>
    <text x="562" y="322" font-size="8.2" fill="#2f6f4f">+ 依赖注入</text>
    <text x="562" y="338" font-size="8" fill="#a1a1a6">非 lazy 的都在此创建</text>

    <rect x="804" y="266" width="246" height="76" rx="11" fill="#e7f0fb" stroke="#b9d2ef" filter="url(#soft)"/>
    <text x="820" y="286" font-size="10" font-weight="700" fill="#1b2a4a">12 · finishRefresh</text>
    <text x="820" y="306" font-size="8.4" fill="#1b2a4a" font-weight="600">★ SmartLifecycle 启动</text>
    <text x="820" y="322" font-size="8.2" fill="#5b7db1">内嵌服务器真正 start</text>
    <text x="820" y="338" font-size="8" fill="#a1a1a6">发 ContextRefreshedEvent</text>
  </g>

  <!-- flow connectors between rows -->
  <path d="M276,111 L288,111" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M534,111 L546,111" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M792,111 L804,111" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M927,146 L927,157 L153,157 L153,168" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M276,206 L288,206" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M534,206 L546,206" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M792,206 L804,206" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M927,244 L927,255 L153,255 L153,266" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M276,304 L288,304" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M534,304 L546,304" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M792,304 L804,304" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- bottom note -->
  <rect x="30" y="364" width="1020" height="76" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="386" font-size="10.5" font-weight="700" fill="#1d1d1f">Boot 的 refreshContext（SpringApplication.java:441）</text>
  <text x="46" y="406" font-size="9" fill="#6e6e73">先注册 shutdown hook,再调 framework refresh。以上 12 步是 framework 的概念(本仓库不含实现)。</text>
  <text x="46" y="424" font-size="9" fill="#6e6e73">内嵌服务器「创建(第 9 步 onRefresh)」与「启动(第 12 步 finishRefresh · SmartLifecycle)」分离——先建后起。</text>

  <!-- legend -->
  <g font-size="8.6">
    <rect x="30" y="456" width="16" height="12" rx="3" fill="#eafaf1" stroke="#bfe0cd"/><text x="52" y="466" fill="#6e6e73">自动配置/单例装配阶段</text>
    <rect x="256" y="456" width="16" height="12" rx="3" fill="#e7f0fb" stroke="#b9d2ef"/><text x="278" y="466" fill="#6e6e73">内嵌服务器创建/启动阶段</text>
    <rect x="486" y="456" width="16" height="12" rx="3" fill="#eef3fb" stroke="#bcd0ec"/><text x="508" y="466" fill="#6e6e73">其余 framework 生命周期步骤</text>
    <text x="742" y="466" fill="#a1a1a6">★ = Spring Boot 关注的关键锚点</text>
  </g>
</svg>
