<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Spring Boot GraalVM 原生镜像 · 用构建期换运行时</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">AOT 是前提(闭世界假设);编译成独立原生可执行文件,毫秒启动、低内存,适合 serverless/短命容器</text>

  <!-- AOT prerequisite -->
  <rect x="30" y="70" width="1020" height="70" rx="13" fill="#f9ecec" stroke="#e8c9c9"/>
  <text x="46" y="92" font-size="11" font-weight="700" fill="#7a2230">AOT 是原生镜像的前提</text>
  <text x="46" y="113" font-size="9" fill="#a85560">GraalVM 要求闭世界假设(编译期知所有类/反射);Spring 的动态装配(条件判断/反射/代理)靠 AOT 提前生成初始化代码 + reachability metadata 满足</text>
  <text x="46" y="130" font-size="8.5" fill="#a85560">NativeDetector.inNativeImage() 检测原生环境、强制约束(NativeImageRequirementsException)· graalVersion=25</text>

  <!-- two paths compare -->
  <rect x="30" y="158" width="500" height="200" rx="14" fill="#eef3fb" stroke="#bcd0ec"/>
  <text x="46" y="180" font-size="11" font-weight="700" fill="#1b2a4a">传统 JVM 应用</text>
  <rect x="46" y="192" width="468" height="30" rx="7" fill="#f3f7fc" stroke="#cfe0f2"/><text x="60" y="212" font-size="8.8" fill="#274a78">java -jar:类加载 + JIT 预热 + 运行时装配</text>
  <text x="46" y="242" font-size="9" fill="#5b7db1">· 启动慢(秒级:类加载 + JIT 预热)</text>
  <text x="46" y="262" font-size="9" fill="#5b7db1">· 内存大(JIT 编译 + 元数据)</text>
  <text x="46" y="282" font-size="9" fill="#5b7db1">· 运行时反射/动态代理/条件判断</text>
  <text x="46" y="308" font-size="9" fill="#12402a">✓ 峰值吞吐高(JIT 优化热路径)</text>
  <text x="46" y="330" font-size="8.5" fill="#a1a1a6">适合长跑高吞吐服务</text>

  <rect x="550" y="158" width="500" height="200" rx="14" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="566" y="180" font-size="11" font-weight="700" fill="#12402a">GraalVM 原生镜像</text>
  <rect x="566" y="192" width="468" height="30" rx="7" fill="#e6f7ee" stroke="#bfe0cd"/><text x="580" y="212" font-size="8.8" fill="#12402a">./app:AOT 编译好的独立可执行文件(无 JVM)</text>
  <text x="566" y="242" font-size="9" fill="#2f6f4f">· 毫秒启动(无 JVM 预热 + 无运行时装配)</text>
  <text x="566" y="262" font-size="9" fill="#2f6f4f">· 低内存(无 JIT/元数据)</text>
  <text x="566" y="282" font-size="9" fill="#2f6f4f">· 装配在构建期算好、生成代码</text>
  <text x="566" y="308" font-size="9" fill="#b1483a">✗ 构建慢 · 动态特性受限 · 无 JIT 峰值</text>
  <text x="566" y="330" font-size="8.5" fill="#a1a1a6">适合 serverless/短命容器/快速扩缩</text>

  <!-- build flow -->
  <rect x="30" y="374" width="1020" height="70" rx="13" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="46" y="396" font-size="11" font-weight="700" fill="#5a3410">构建流程</text>
  <g text-anchor="middle" font-size="8.5">
    <rect x="46" y="406" width="230" height="30" rx="7" fill="#fdf6ea" stroke="#efdcb4"/><text x="161" y="425" fill="#5a3410">process-aot(生成初始化代码)</text>
    <rect x="316" y="406" width="230" height="30" rx="7" fill="#fdf6ea" stroke="#efdcb4"/><text x="431" y="425" fill="#5a3410">GraalVM native-image 编译</text>
    <rect x="586" y="406" width="230" height="30" rx="7" fill="#fdf6ea" stroke="#efdcb4"/><text x="701" y="425" fill="#5a3410">reachability metadata(反射配置)</text>
    <rect x="856" y="406" width="178" height="30" rx="7" fill="#e6f7ee" stroke="#bfe0cd"/><text x="945" y="425" fill="#12402a">独立原生可执行文件</text>
  </g>
  <line x1="276" y1="421" x2="316" y2="421" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="546" y1="421" x2="586" y2="421" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="816" y1="421" x2="856" y2="421" stroke="#c7c7cc" stroke-width="1.3" marker-end="url(#ar)"/>

  <rect x="30" y="460" width="1020" height="60" rx="13" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="482" font-size="11" font-weight="700" fill="#1d1d1f">要点</text>
  <text x="46" y="503" font-size="9" fill="#6e6e73">· 原生镜像用构建期换运行时:把 JVM 的类加载/JIT 预热/动态装配全挪到构建期算好 → 运行时毫秒起、小内存;代价是构建慢 + 动态特性(反射/代理)需显式配 reachability metadata</text>
</svg>
