<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Spring Boot 核心原理 · 接触面 ② SpringApplication.run() 启动流程</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">有序步骤 · run() 不只是 refresh:含环境准备/上下文创建/prepareContext/refresh/afterRefresh/callRunners · SpringApplication.java:304</text>

  <!-- row 1: steps 1-4 -->
  <g>
    <rect x="30" y="78" width="238" height="86" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="46" y="100" font-size="10.5" font-weight="700" fill="#1b2a4a">1 · BootstrapContext + starting</text>
    <text x="46" y="120" font-size="8.6" fill="#5b7db1">建 DefaultBootstrapContext</text>
    <text x="46" y="136" font-size="8.6" fill="#5b7db1">应用 BootstrapRegistryInitializer</text>
    <text x="46" y="154" font-size="8.6" fill="#5b7db1">RunListener 发 starting  (:309,312)</text>

    <rect x="294" y="78" width="238" height="86" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="310" y="100" font-size="10.5" font-weight="700" fill="#1b2a4a">2 · prepareEnvironment</text>
    <text x="310" y="120" font-size="8.6" fill="#5b7db1">建/配 Environment,加载配置</text>
    <text x="310" y="136" font-size="8.6" fill="#5b7db1">attach 属性源 · 发 environmentPrepared</text>
    <text x="310" y="154" font-size="8.6" fill="#5b7db1">bindToSpringApplication  (:316,350)</text>

    <rect x="558" y="78" width="238" height="86" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="574" y="100" font-size="10.5" font-weight="700" fill="#1b2a4a">3 · printBanner + 建上下文</text>
    <text x="574" y="120" font-size="8.6" fill="#5b7db1">printBanner</text>
    <text x="574" y="136" font-size="8.6" fill="#5b7db1">createApplicationContext(按 web 类型)</text>
    <text x="574" y="154" font-size="8.6" fill="#5b7db1">(:318)</text>

    <rect x="822" y="78" width="228" height="86" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
    <text x="838" y="100" font-size="10.5" font-weight="700" fill="#3d2a5a">4 · prepareContext</text>
    <text x="838" y="120" font-size="8.6" fill="#8a6db3">注册 bean 源(主类)</text>
    <text x="838" y="136" font-size="8.6" fill="#8a6db3">发 contextPrepared</text>
    <text x="838" y="154" font-size="8.6" fill="#8a6db3">发 contextLoaded  (:320)</text>
  </g>

  <!-- connectors row1 -->
  <path d="M268,121 L294,121" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M532,121 L558,121" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M796,121 L822,121" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <!-- wrap from step4 down to step5 -->
  <path d="M936,164 L936,192 L144,192 L144,220" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- row 2: steps 5-7 -->
  <g>
    <rect x="30" y="222" width="238" height="86" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="46" y="244" font-size="10.5" font-weight="700" fill="#1b2a4a">5 · refreshContext</text>
    <text x="46" y="264" font-size="8.6" fill="#5b7db1">注册 shutdown hook</text>
    <text x="46" y="280" font-size="8.6" fill="#5b7db1">调 framework refresh(12 步)</text>
    <text x="46" y="298" font-size="8.6" fill="#5b7db1">自动配置在此装配  (:321)</text>

    <rect x="294" y="222" width="238" height="86" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="310" y="244" font-size="10.5" font-weight="700" fill="#1b2a4a">6 · afterRefresh</text>
    <text x="310" y="264" font-size="8.6" fill="#5b7db1">refresh 后钩子</text>
    <text x="310" y="280" font-size="8.6" fill="#5b7db1">上下文已就绪</text>
    <text x="310" y="298" font-size="8.6" fill="#a1a1a6">内嵌服务器已在 refresh 中启动</text>

    <rect x="558" y="222" width="238" height="86" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
    <text x="574" y="244" font-size="10.5" font-weight="700" fill="#12402a">7 · started + callRunners</text>
    <text x="574" y="264" font-size="8.6" fill="#2f6f4f">发 started</text>
    <text x="574" y="280" font-size="8.6" fill="#2f6f4f">跑 ApplicationRunner</text>
    <text x="574" y="298" font-size="8.6" fill="#2f6f4f">/ CommandLineRunner  (:327)</text>

    <rect x="822" y="222" width="228" height="86" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
    <text x="838" y="244" font-size="10.5" font-weight="700" fill="#12402a">8 · ready</text>
    <text x="838" y="264" font-size="8.6" fill="#2f6f4f">发 ready</text>
    <text x="838" y="280" font-size="8.6" fill="#2f6f4f">应用启动完成</text>
    <text x="838" y="298" font-size="8.6" fill="#2f6f4f">对外提供服务</text>
  </g>

  <!-- connectors row2 -->
  <path d="M268,265 L294,265" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M532,265 L558,265" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M796,265 L822,265" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- failure path -->
  <rect x="558" y="336" width="492" height="46" rx="11" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="574" y="359" font-size="10" font-weight="700" fill="#4a1414">失败任意步 → handleRunFailure</text>
  <text x="574" y="374" font-size="8.6" fill="#7a2a2a">发 failed 事件 · 记录异常 · 关闭已建上下文</text>
  <path d="M936,308 L936,336" stroke="#e7c3c3" stroke-width="1.4" fill="none" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="944" y="326" font-size="8" fill="#c98" >异常</text>

  <!-- RunListener phases band -->
  <rect x="30" y="404" width="1020" height="112" rx="13" fill="#f5f2fb" stroke="#e3d3f0"/>
  <text x="46" y="426" font-size="10.5" font-weight="700" fill="#3d2a5a">SpringApplicationRunListener 7 阶段（SPI · SpringApplicationRunListener.java:49）</text>
  <g text-anchor="middle" font-size="8.8" font-weight="600">
    <rect x="46" y="440" width="128" height="34" rx="8" fill="#f4eefb" stroke="#d9c7ec"/><text x="110" y="461" fill="#3d2a5a">starting</text>
    <rect x="186" y="440" width="150" height="34" rx="8" fill="#f4eefb" stroke="#d9c7ec"/><text x="261" y="461" fill="#3d2a5a">environmentPrepared</text>
    <rect x="348" y="440" width="136" height="34" rx="8" fill="#f4eefb" stroke="#d9c7ec"/><text x="416" y="461" fill="#3d2a5a">contextPrepared</text>
    <rect x="496" y="440" width="130" height="34" rx="8" fill="#f4eefb" stroke="#d9c7ec"/><text x="561" y="461" fill="#3d2a5a">contextLoaded</text>
    <rect x="638" y="440" width="112" height="34" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="694" y="461" fill="#12402a">started</text>
    <rect x="762" y="440" width="112" height="34" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="818" y="461" fill="#12402a">ready</text>
    <rect x="886" y="440" width="112" height="34" rx="8" fill="#fbeaea" stroke="#e7c3c3"/><text x="942" y="461" fill="#4a1414">failed</text>
  </g>
  <text x="46" y="500" font-size="9" fill="#8a6db3">各扩展点可挂钩子 · starting → environmentPrepared → contextPrepared → contextLoaded → started → ready → failed(异常时)</text>
</svg>
