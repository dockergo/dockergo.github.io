<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Spring Boot starter · 纯依赖 POM（无 Java 代码）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">一个 spring-boot-starter-web 拉全 web 一套依赖 + 自动配置模块；Boot BOM 统一版本，starter 内不填版本号</text>

  <!-- Panel A: starter-web -->
  <rect x="30" y="66" width="1020" height="212" rx="13" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="48" y="88" font-size="11" font-weight="700" fill="#5a3410">① spring-boot-starter-web 拉全 web 一套（starter/spring-boot-starter-web/build.gradle:23）</text>

  <rect x="50" y="106" width="220" height="146" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="160" y="150" font-size="12" font-weight="700" text-anchor="middle" fill="#5a3410">spring-boot-starter-web</text>
  <text x="160" y="172" font-size="10.5" text-anchor="middle" fill="#93762e">纯依赖 POM</text>
  <text x="160" y="190" font-size="10.5" text-anchor="middle" fill="#93762e">无 Java 代码</text>
  <text x="160" y="228" font-size="9" text-anchor="middle" fill="#a1a1a6">build.gradle:23</text>

  <path d="M270,179 L320,179" stroke="#c7c7cc" stroke-width="1.5" fill="none"/>
  <path d="M320,127 L320,251" stroke="#c7c7cc" stroke-width="1.5" fill="none"/>
  <path d="M320,127 L360,127" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M320,169 L360,169" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M320,211 L360,211" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M320,251 L360,251" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="360" y="112" width="650" height="30" rx="8" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="376" y="131" font-size="10.5" font-weight="700" fill="#5a3410">starter-jackson</text>
  <text x="994" y="131" font-size="9.5" text-anchor="end" fill="#93762e">JSON 序列化 / 反序列化</text>

  <rect x="360" y="154" width="650" height="30" rx="8" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="376" y="173" font-size="10.5" font-weight="700" fill="#5a3410">starter-tomcat</text>
  <text x="994" y="173" font-size="9.5" text-anchor="end" fill="#93762e">内嵌 web 服务器依赖</text>

  <rect x="360" y="196" width="650" height="30" rx="8" fill="#ffffff" stroke="#ececf1"/>
  <text x="376" y="215" font-size="10.5" font-weight="700" fill="#1d1d1f">module:spring-boot-http-converter</text>
  <text x="994" y="215" font-size="9.5" text-anchor="end" fill="#6e6e73">HTTP 消息转换</text>

  <rect x="360" y="236" width="650" height="30" rx="8" fill="#ffffff" stroke="#ececf1"/>
  <text x="376" y="255" font-size="10.5" font-weight="700" fill="#1d1d1f">module:spring-boot-webmvc</text>
  <text x="994" y="255" font-size="9.5" text-anchor="end" fill="#6e6e73">Spring MVC 自动配置模块</text>

  <!-- Panel B: base starter -->
  <rect x="30" y="292" width="1020" height="122" rx="13" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="48" y="314" font-size="11" font-weight="700" fill="#5a3410">② 基础 spring-boot-starter 拉 logging + 自动配置引擎（starter/spring-boot-starter/build.gradle:23）</text>

  <rect x="50" y="330" width="220" height="72" rx="12" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="160" y="362" font-size="11.5" font-weight="700" text-anchor="middle" fill="#5a3410">spring-boot-starter</text>
  <text x="160" y="382" font-size="9.5" text-anchor="middle" fill="#93762e">基础 starter</text>

  <path d="M270,366 L320,366" stroke="#c7c7cc" stroke-width="1.5" fill="none"/>
  <path d="M320,349 L320,383" stroke="#c7c7cc" stroke-width="1.5" fill="none"/>
  <path d="M320,349 L360,349" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M320,383 L360,383" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="360" y="334" width="650" height="30" rx="8" fill="#ffffff" stroke="#ececf1"/>
  <text x="376" y="353" font-size="10.5" font-weight="700" fill="#1d1d1f">starter-logging</text>
  <text x="994" y="353" font-size="9.5" text-anchor="end" fill="#6e6e73">日志依赖</text>

  <rect x="360" y="368" width="650" height="30" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="376" y="387" font-size="10.5" font-weight="700" fill="#12402a">core:spring-boot-autoconfigure</text>
  <text x="994" y="387" font-size="9.5" text-anchor="end" fill="#2f6f4f">带自动配置引擎 + core .imports</text>

  <!-- Bottom notes -->
  <rect x="30" y="428" width="500" height="56" rx="12" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
  <text x="48" y="452" font-size="10.5" font-weight="700" fill="#4a1414">4.x 注：starter-web 已弃用</text>
  <text x="48" y="470" font-size="9.5" fill="#7a2a2a">→ 推荐 starter-webmvc（build.gradle:21）</text>

  <rect x="550" y="428" width="500" height="56" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="568" y="452" font-size="10.5" font-weight="700" fill="#1d1d1f">Boot BOM（platform/）统一管版本</text>
  <text x="568" y="470" font-size="9.5" fill="#6e6e73">→ starter 内依赖不填版本号，避免冲突</text>
</svg>
