<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Spring Boot Actuator · 生产就绪端点（module/spring-boot-actuator）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">@Endpoint 标端点、各 Discoverer 发现暴露为 HTTP/JMX；配 k8s 探针、Prometheus 抓取</text>

  <!-- Annotation card -->
  <rect x="30" y="70" width="500" height="150" rx="14" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="48" y="94" font-size="12" font-weight="700" fill="#3d2a5a">① @Endpoint 注解定义端点</text>
  <rect x="48" y="106" width="464" height="44" rx="10" fill="#ffffff" stroke="#e6daf3"/>
  <text x="280" y="128" font-size="10" font-weight="700" text-anchor="middle" fill="#3d2a5a">@Endpoint（id + defaultAccess）</text>
  <text x="280" y="144" font-size="8.6" text-anchor="middle" fill="#a1a1a6">endpoint/annotation/Endpoint.java:53</text>
  <rect x="48" y="158" width="464" height="52" rx="10" fill="#f9f5fd" stroke="#e6daf3"/>
  <text x="280" y="180" font-size="10" font-weight="700" text-anchor="middle" fill="#3d2a5a">方法标操作注解</text>
  <text x="280" y="198" font-size="9" text-anchor="middle" fill="#8a6db3">@ReadOperation / @WriteOperation / @DeleteOperation</text>

  <!-- Discoverer card -->
  <rect x="550" y="70" width="500" height="150" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="568" y="94" font-size="12" font-weight="700" fill="#1b2a4a">② 发现 · EndpointDiscoverer（base）</text>
  <text x="568" y="112" font-size="9" fill="#5b7db1">扫 @Endpoint bean 暴露为 HTTP / JMX</text>
  <rect x="568" y="122" width="222" height="42" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="679" y="147" font-size="9.6" font-weight="700" text-anchor="middle" fill="#274a78">Web Discoverer</text>
  <rect x="808" y="122" width="222" height="42" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="919" y="147" font-size="9.6" font-weight="700" text-anchor="middle" fill="#274a78">Jmx Discoverer</text>
  <rect x="568" y="170" width="222" height="42" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="679" y="195" font-size="9.6" font-weight="700" text-anchor="middle" fill="#274a78">Servlet Discoverer</text>
  <rect x="808" y="170" width="222" height="42" rx="9" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="919" y="195" font-size="9.6" font-weight="700" text-anchor="middle" fill="#274a78">Controller Discoverer</text>

  <!-- Health independent module -->
  <rect x="30" y="236" width="1020" height="88" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="48" y="260" font-size="12" font-weight="700" fill="#12402a">③ 健康独立成模块 · HealthEndpoint（module/spring-boot-health）</text>
  <rect x="48" y="272" width="480" height="44" rx="10" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="288" y="294" font-size="10" font-weight="700" text-anchor="middle" fill="#12402a">@Endpoint(id="health") + @ReadOperation</text>
  <text x="288" y="310" font-size="8.6" text-anchor="middle" fill="#a1a1a6">HealthEndpoint.java:46 · extends HealthEndpointSupport</text>
  <rect x="540" y="272" width="492" height="44" rx="10" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="786" y="294" font-size="10" font-weight="700" text-anchor="middle" fill="#12402a">自带 .imports（独立模块自动配置）</text>
  <text x="786" y="310" font-size="8.6" text-anchor="middle" fill="#a1a1a6">与核心 actuator 模块解耦</text>

  <!-- Common endpoints -->
  <rect x="30" y="340" width="1020" height="112" rx="14" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="48" y="364" font-size="12" font-weight="700" fill="#5a3410">④ 常见端点</text>
  <rect x="48" y="376" width="188" height="62" rx="10" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="142" y="400" font-size="10.5" font-weight="700" text-anchor="middle" fill="#5a3410">/health</text>
  <text x="142" y="420" font-size="8.8" text-anchor="middle" fill="#93762e">健康状态</text>
  <rect x="248" y="376" width="188" height="62" rx="10" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="342" y="400" font-size="10.5" font-weight="700" text-anchor="middle" fill="#5a3410">/metrics</text>
  <text x="342" y="420" font-size="8.8" text-anchor="middle" fill="#93762e">指标（桥 Micrometer）</text>
  <rect x="448" y="376" width="188" height="62" rx="10" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="542" y="400" font-size="10.5" font-weight="700" text-anchor="middle" fill="#5a3410">/env</text>
  <text x="542" y="420" font-size="8.8" text-anchor="middle" fill="#93762e">环境配置</text>
  <rect x="648" y="376" width="188" height="62" rx="10" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="742" y="400" font-size="10.5" font-weight="700" text-anchor="middle" fill="#5a3410">/beans</text>
  <text x="742" y="420" font-size="8.8" text-anchor="middle" fill="#93762e">容器 bean</text>
  <rect x="848" y="376" width="184" height="62" rx="10" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="940" y="400" font-size="10.5" font-weight="700" text-anchor="middle" fill="#5a3410">/mappings</text>
  <text x="940" y="420" font-size="8.8" text-anchor="middle" fill="#93762e">路由映射</text>

  <!-- Why band -->
  <rect x="30" y="468" width="1020" height="56" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="540" y="492" font-size="10.5" font-weight="700" text-anchor="middle" fill="#1d1d1f">为什么 Actuator：生产要“应用活着吗、指标多少、配置什么”</text>
  <text x="540" y="512" font-size="9.6" text-anchor="middle" fill="#6e6e73">标准化这些端点，配合 k8s liveness/readiness probe、Prometheus 抓取</text>
</svg>
