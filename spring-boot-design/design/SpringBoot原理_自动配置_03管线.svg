<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Spring Boot 核心原理 · 自动配置 ③ 选择管线与排序</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">getAutoConfigurationEntry 管线:候选 → 去重 → 排除 → 条件过滤 → 事件 · AutoConfigurationImportSelector.java:142</text>

  <!-- pipeline 5 stages -->
  <g>
    <rect x="30" y="86" width="182" height="96" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
    <text x="121" y="109" font-size="10.5" font-weight="700" text-anchor="middle" fill="#12402a">1 · 取候选</text>
    <text x="121" y="131" font-size="8.8" text-anchor="middle" fill="#2f6f4f">从 .imports 读</text>
    <text x="121" y="149" font-size="8.8" text-anchor="middle" fill="#2f6f4f">各模块候选清单</text>
    <text x="121" y="170" font-size="8" text-anchor="middle" fill="#a1a1a6">可能几百个</text>

    <rect x="240" y="86" width="182" height="96" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
    <text x="331" y="109" font-size="10.5" font-weight="700" text-anchor="middle" fill="#12402a">2 · removeDuplicates</text>
    <text x="331" y="131" font-size="8.8" text-anchor="middle" fill="#2f6f4f">去重</text>
    <text x="331" y="149" font-size="8.8" text-anchor="middle" fill="#2f6f4f">合并重复候选</text>
    <text x="331" y="170" font-size="8" text-anchor="middle" fill="#a1a1a6">同类只留一份</text>

    <rect x="450" y="86" width="182" height="96" rx="12" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/>
    <text x="541" y="109" font-size="10.5" font-weight="700" text-anchor="middle" fill="#4a1414">3 · getExclusions</text>
    <text x="541" y="131" font-size="8.8" text-anchor="middle" fill="#7a2a2a">算排除并移除</text>
    <text x="541" y="149" font-size="8.8" text-anchor="middle" fill="#7a2a2a">用户 exclude 的</text>
    <text x="541" y="170" font-size="8" text-anchor="middle" fill="#a1a1a6">spring.autoconfigure.exclude</text>

    <rect x="660" y="86" width="182" height="96" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
    <text x="751" y="109" font-size="9.6" font-weight="700" text-anchor="middle" fill="#1b2a4a">4 · 条件过滤</text>
    <text x="751" y="129" font-size="8.6" text-anchor="middle" fill="#274a78">ConfigurationClassFilter</text>
    <text x="751" y="146" font-size="8.4" text-anchor="middle" fill="#5b7db1">应用 @ConditionalOnClass 等</text>
    <text x="751" y="164" font-size="8.2" text-anchor="middle" fill="#1b2a4a" font-weight="600">读字节码,不加载类</text>

    <rect x="870" y="86" width="180" height="96" rx="12" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
    <text x="960" y="109" font-size="10" font-weight="700" text-anchor="middle" fill="#3d2a5a">5 · fireEvents</text>
    <text x="960" y="131" font-size="8.8" text-anchor="middle" fill="#8a6db3">fireAutoConfiguration</text>
    <text x="960" y="146" font-size="8.8" text-anchor="middle" fill="#8a6db3">ImportEvents</text>
    <text x="960" y="167" font-size="8" text-anchor="middle" fill="#a1a1a6">通知监听器</text>
  </g>

  <!-- connectors -->
  <path d="M212,134 L240,134" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M422,134 L450,134" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M632,134 L660,134" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M842,134 L870,134" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- deferred group -->
  <rect x="30" y="206" width="1020" height="58" rx="12" fill="#f5faf6" stroke="#cfe6d5" stroke-dasharray="6 4"/>
  <text x="46" y="228" font-size="10.5" font-weight="700" fill="#1a5a38">作为 deferred AutoConfigurationGroup 导入组运行（AutoConfigurationImportSelector.java:157）</text>
  <text x="46" y="248" font-size="9" fill="#2f6f4f">延迟到普通 @Configuration 处理完后再运行——保证用户配置先于自动配置,自动配置只补缺省。</text>

  <!-- sorter -->
  <rect x="30" y="286" width="1020" height="96" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="46" y="309" font-size="11" font-weight="700" fill="#1b2a4a">排序 · AutoConfigurationSorter（AutoConfigurationSorter.java:42）</text>
  <g text-anchor="middle" font-size="9">
    <rect x="46" y="322" width="316" height="46" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="204" y="342" fill="#274a78" font-weight="600">① 按名字</text><text x="204" y="358" fill="#5b7db1" font-size="8.4">字母序,稳定基线</text>
    <rect x="378" y="322" width="316" height="46" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="536" y="342" fill="#274a78" font-weight="600">② @AutoConfigureOrder</text><text x="536" y="358" fill="#5b7db1" font-size="8.4">显式优先级覆盖名字序</text>
    <rect x="710" y="322" width="324" height="46" rx="8" fill="#f3f7fc" stroke="#cfe0f2"/><text x="872" y="342" fill="#274a78" font-weight="600">③ @AutoConfigureBefore/After</text><text x="872" y="358" fill="#5b7db1" font-size="8.4">相对依赖顺序(数据源先于用它的 bean)</text>
  </g>

  <!-- why note -->
  <rect x="30" y="404" width="1020" height="94" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="46" y="426" font-size="10.5" font-weight="700" fill="#1d1d1f">为什么不加载类判断</text>
  <text x="46" y="448" font-size="9" fill="#6e6e73">classpath 可能有几百个候选,逐个加载类慢;读字节码元数据(注解/类名)判条件,只加载真正生效的——启动快。</text>
  <text x="46" y="468" font-size="9" fill="#6e6e73">过滤(第 4 步)与排序都从字节码元数据读,不加载类。误区:自动配置是运行时反射扫描全 classpath——其实是读 .imports + 元数据判条件。</text>
  <text x="46" y="488" font-size="9" fill="#a1a1a6">调优:debug=true 打印自动配置报告(哪些生效/未生效及原因),排查装配问题。</text>
</svg>
