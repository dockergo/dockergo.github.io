<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Spring Boot 核心原理 · 能力域依赖关系图</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">实线=调用/装配 · 虚线=条件约束 · 贯穿层「条件装配 @Conditional」横切自动配置/starter/内嵌服务器</text>

  <!-- 接触面 top -->
  <rect x="380" y="72" width="320" height="52" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="540" y="94" font-size="11" font-weight="700" text-anchor="middle" fill="#3d2a5a">接触面 · 注解与 SpringApplication 启动</text>
  <text x="540" y="112" font-size="8.6" text-anchor="middle" fill="#8a6db3">@SpringBootApplication · run() 一行触发全流程</text>

  <!-- IoC 底座 -->
  <rect x="380" y="164" width="320" height="56" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="540" y="187" font-size="11" font-weight="700" text-anchor="middle" fill="#1b2a4a">IoC 容器（底座 · 委托 framework）</text>
  <text x="540" y="205" font-size="8.6" text-anchor="middle" fill="#5b7db1">refresh 12 步 · bean 定义/依赖注入/生命周期</text>

  <!-- 自动配置 灵魂 -->
  <rect x="380" y="260" width="320" height="56" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="540" y="283" font-size="11" font-weight="700" text-anchor="middle" fill="#12402a">自动配置（灵魂）</text>
  <text x="540" y="301" font-size="8.6" text-anchor="middle" fill="#2f6f4f">AutoConfigurationImportSelector 读 .imports 装配 bean</text>

  <!-- starter left -->
  <rect x="60" y="260" width="270" height="56" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="195" y="283" font-size="11" font-weight="700" text-anchor="middle" fill="#5a3410">starter 机制</text>
  <text x="195" y="301" font-size="8.6" text-anchor="middle" fill="#93762e">依赖入口:上 classpath 驱动自动配置</text>

  <!-- 内嵌服务器 right -->
  <rect x="750" y="260" width="270" height="56" rx="13" fill="#e7f0fb" stroke="#b9d2ef" filter="url(#soft)"/>
  <text x="885" y="283" font-size="11" font-weight="700" text-anchor="middle" fill="#1b2a4a">内嵌服务器</text>
  <text x="885" y="301" font-size="8.6" text-anchor="middle" fill="#5b7db1">jar 内 Tomcat/Jetty · SmartLifecycle 启动</text>

  <!-- 配置属性 bottom -->
  <rect x="380" y="356" width="320" height="52" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="540" y="378" font-size="11" font-weight="700" text-anchor="middle" fill="#3d2a5a">配置属性绑定</text>
  <text x="540" y="396" font-size="8.6" text-anchor="middle" fill="#8a6db3">@ConfigurationProperties 松散绑定 Environment</text>

  <!-- solid edges -->
  <path d="M540,124 L540,164" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="552" y="148" font-size="8" fill="#a1a1a6">refresh 委托</text>
  <path d="M540,220 L540,260" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="552" y="244" font-size="8" fill="#a1a1a6">装配 bean 定义</text>
  <path d="M330,288 L380,288" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="336" y="280" font-size="8" fill="#a1a1a6">驱动</text>
  <path d="M700,288 L750,288" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="704" y="280" font-size="8" fill="#a1a1a6">配 web 服务器工厂</text>
  <path d="M540,316 L540,356" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="552" y="340" font-size="8" fill="#a1a1a6">属性驱动条件</text>

  <!-- 贯穿层: conditional assembly, crosscutting -->
  <rect x="60" y="430" width="960" height="66" rx="13" fill="#f5faf6" stroke="#cfe6d5" stroke-dasharray="6 4"/>
  <text x="80" y="453" font-size="10.5" font-weight="700" fill="#12402a">贯穿层 · 条件装配 @Conditional（横切）</text>
  <text x="80" y="472" font-size="9" fill="#2f6f4f">每个自动配置 bean 都带条件:有某类(@ConditionalOnClass)/ 无某 bean(@ConditionalOnMissingBean)/ 某属性(@ConditionalOnProperty)才生效。</text>
  <text x="80" y="489" font-size="9" fill="#2f6f4f">classpath 状态决定装配什么——横切 自动配置 / starter / 内嵌服务器,是「约定优于配置」的实现机制。</text>
  <!-- dashed condition links to the three domains -->
  <path d="M195,316 L195,430" stroke="#bfe0cd" stroke-width="1.4" fill="none" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <path d="M540,408 L540,430" stroke="#bfe0cd" stroke-width="1.4" fill="none" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <path d="M885,316 L885,430" stroke="#bfe0cd" stroke-width="1.4" fill="none" stroke-dasharray="4 3" marker-end="url(#ar)"/>
</svg>
