<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Spring Boot 配置属性绑定 · 松散绑定（relaxed binding）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">同一属性多种写法都映射到同一字段——靠 ConfigurationPropertyName 规范化，屏蔽多来源命名差异</text>

  <!-- Four source forms (left) -->
  <text x="48" y="88" font-size="11" font-weight="700" fill="#3d2a5a">① 四种来源写法（各命名惯例）</text>
  <rect x="48" y="98" width="340" height="46" rx="10" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="66" y="120" font-size="10.5" font-weight="700" fill="#3d2a5a">myProperty</text>
  <text x="372" y="120" font-size="9" text-anchor="end" fill="#8a6db3">驼峰 · Java 字段</text>
  <text x="66" y="136" font-size="8.6" fill="#a1a1a6">camelCase</text>

  <rect x="48" y="152" width="340" height="46" rx="10" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="66" y="174" font-size="10.5" font-weight="700" fill="#3d2a5a">my-property</text>
  <text x="372" y="174" font-size="9" text-anchor="end" fill="#8a6db3">kebab · yml 惯例</text>
  <text x="66" y="190" font-size="8.6" fill="#a1a1a6">短横线</text>

  <rect x="48" y="206" width="340" height="46" rx="10" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="66" y="228" font-size="10.5" font-weight="700" fill="#3d2a5a">my_property</text>
  <text x="372" y="228" font-size="9" text-anchor="end" fill="#8a6db3">下划线</text>
  <text x="66" y="244" font-size="8.6" fill="#a1a1a6">underscore</text>

  <rect x="48" y="260" width="340" height="46" rx="10" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="66" y="282" font-size="10.5" font-weight="700" fill="#3d2a5a">MY_PROPERTY</text>
  <text x="372" y="282" font-size="9" text-anchor="end" fill="#8a6db3">大写 · 环境变量</text>
  <text x="66" y="298" font-size="8.6" fill="#a1a1a6">UPPER_UNDERSCORE</text>

  <!-- Normalizer (middle) -->
  <path d="M388,121 L440,121 L440,201 L474,201" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M388,175 L456,175 L456,201 L474,201" stroke="#c7c7cc" stroke-width="1.5" fill="none"/>
  <path d="M388,229 L456,229 L456,201" stroke="#c7c7cc" stroke-width="1.5" fill="none"/>
  <path d="M388,283 L440,283 L440,201 L474,201" stroke="#c7c7cc" stroke-width="1.5" fill="none"/>

  <rect x="476" y="150" width="220" height="104" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="586" y="184" font-size="10.5" font-weight="700" text-anchor="middle" fill="#1b2a4a">ConfigurationPropertyName</text>
  <text x="586" y="208" font-size="9.6" text-anchor="middle" fill="#5b7db1">规范化 → 统一 kebab</text>
  <text x="586" y="230" font-size="8.8" text-anchor="middle" fill="#a1a1a6">source/ConfigurationPropertyName.java</text>

  <path d="M696,202 L740,202" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- Canonical target (right) -->
  <rect x="742" y="152" width="290" height="100" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="887" y="188" font-size="11" font-weight="700" text-anchor="middle" fill="#12402a">my.property</text>
  <text x="887" y="212" font-size="9.6" text-anchor="middle" fill="#2f6f4f">唯一逻辑属性名</text>
  <text x="887" y="232" font-size="9" text-anchor="middle" fill="#a1a1a6">四种写法都映到此字段</text>

  <!-- Env var special case -->
  <rect x="30" y="330" width="1020" height="82" rx="13" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="48" y="356" font-size="11" font-weight="700" fill="#5a3410">② 特别有用：环境变量映射</text>
  <rect x="360" y="342" width="260" height="52" rx="10" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="490" y="366" font-size="10.5" font-weight="700" text-anchor="middle" fill="#5a3410">MY_APP_HOST</text>
  <text x="490" y="384" font-size="8.8" text-anchor="middle" fill="#93762e">大写下划线（环境变量只能这样写）</text>
  <path d="M620,368 L688,368" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="654" y="359" font-size="9" text-anchor="middle" fill="#a1a1a6">松散绑定</text>
  <rect x="690" y="342" width="260" height="52" rx="10" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="820" y="366" font-size="10.5" font-weight="700" text-anchor="middle" fill="#12402a">my.app.host</text>
  <text x="820" y="384" font-size="8.8" text-anchor="middle" fill="#2f6f4f">容器 / 云环境注入配置无缝</text>

  <!-- Why band -->
  <rect x="30" y="428" width="1020" height="56" rx="12" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="540" y="452" font-size="10.5" font-weight="700" text-anchor="middle" fill="#1d1d1f">为什么松散：不同来源有不同命名惯例（yml 用 kebab、环境变量用大写下划线、Java 字段用驼峰）</text>
  <text x="540" y="472" font-size="9.6" text-anchor="middle" fill="#6e6e73">松散绑定屏蔽差异——一个逻辑属性名对应所有来源写法</text>
</svg>
