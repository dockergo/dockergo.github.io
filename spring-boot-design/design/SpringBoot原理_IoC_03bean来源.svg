<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="510" viewBox="0 0 1080 510" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="510" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Spring Boot 核心原理 · IoC ③ bean 定义两来源:自动配置 + 用户</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">两来源进同一容器,用户优先(@ConditionalOnMissingBean) · 上下文类型由 ApplicationContextFactory 按 web 类型选</text>

  <!-- source A: user beans -->
  <rect x="30" y="76" width="500" height="150" rx="14" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="50" y="100" font-size="11.5" font-weight="700" fill="#3d2a5a">来源 A · 用户 bean（显式意图）</text>
  <text x="50" y="122" font-size="9" fill="#5a4080">@Component / @Bean / @Service 等</text>
  <rect x="50" y="134" width="460" height="42" rx="9" fill="#faf5fe" stroke="#e3d3f0"/>
  <text x="280" y="152" font-size="9" text-anchor="middle" fill="#5a4080">经 @ComponentScan(在 @SpringBootApplication)扫描本包及子包</text>
  <text x="280" y="168" font-size="8.4" text-anchor="middle" fill="#8a6db3">扫到的类注册为 bean 定义</text>
  <rect x="50" y="182" width="460" height="34" rx="9" fill="#faf5fe" stroke="#e3d3f0"/>
  <text x="280" y="203" font-size="8.8" text-anchor="middle" fill="#5a4080">Boot 经 BeanDefinitionLoader 加载主类源(SpringApplication.java:412)</text>

  <!-- source B: auto-config beans -->
  <rect x="550" y="76" width="500" height="150" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="570" y="100" font-size="11.5" font-weight="700" fill="#12402a">来源 B · 自动配置 bean（默认补缺）</text>
  <text x="570" y="122" font-size="9" fill="#1a5a38">@EnableAutoConfiguration 导入</text>
  <rect x="570" y="134" width="460" height="42" rx="9" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="800" y="152" font-size="9" text-anchor="middle" fill="#1a5a38">经 AutoConfigurationImportSelector 导入(见自动配置篇)</text>
  <text x="800" y="168" font-size="8.4" text-anchor="middle" fill="#2f6f4f">候选来自各模块 .imports</text>
  <rect x="570" y="182" width="460" height="34" rx="9" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="800" y="203" font-size="8.8" text-anchor="middle" fill="#1a5a38">在 refresh 的 invokeBeanFactoryPostProcessors 阶段装配</text>

  <!-- arrows into container -->
  <path d="M280,226 L280,256 L520,256 L520,284" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M800,226 L800,256 L560,256 L560,284" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- container -->
  <rect x="30" y="288" width="1020" height="82" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="540" y="312" font-size="11.5" font-weight="700" text-anchor="middle" fill="#1b2a4a">同一 IoC 容器（ApplicationContext）· 两来源合流</text>
  <text x="540" y="334" font-size="9" text-anchor="middle" fill="#5b7db1">用户 bean 是显式意图,自动配置 bean 是默认——@ConditionalOnMissingBean 让用户 bean 覆盖</text>
  <text x="540" y="354" font-size="8.8" text-anchor="middle" fill="#274a78" font-weight="600">用户优先:有同类型用户 bean 时,自动配置只在缺省时补,不冲突</text>

  <!-- context type selection -->
  <path d="M540,370 L540,398" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <rect x="30" y="402" width="1020" height="98" rx="14" fill="#f5faf6" stroke="#cfe6d5"/>
  <text x="46" y="424" font-size="10.5" font-weight="700" fill="#1a5a38">上下文类型由 ApplicationContextFactory（SPI）按 web 类型选,非硬编码</text>
  <text x="46" y="442" font-size="8.6" fill="#2f6f4f">createApplicationContext → applicationContextFactory.create(webApplicationType)(SpringApplication.java:579)</text>
  <g text-anchor="middle" font-size="8.8">
    <rect x="46" y="452" width="322" height="40" rx="8" fill="#e7f0fb" stroke="#b9d2ef"/><text x="207" y="470" fill="#1b2a4a" font-weight="600">servlet</text><text x="207" y="485" fill="#5b7db1">ServletWebServerApplicationContext</text>
    <rect x="380" y="452" width="322" height="40" rx="8" fill="#e7f0fb" stroke="#b9d2ef"/><text x="541" y="470" fill="#1b2a4a" font-weight="600">reactive</text><text x="541" y="485" fill="#5b7db1">Reactive 版上下文</text>
    <rect x="714" y="452" width="320" height="40" rx="8" fill="#f7f7f9" stroke="#e3e3e8"/><text x="874" y="470" fill="#1d1d1f" font-weight="600">none</text><text x="874" y="485" fill="#6e6e73">普通(非 web,如批处理)</text>
  </g>
</svg>
