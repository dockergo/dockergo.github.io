<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Spring Boot starter · 触发链：引入即用</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">starter 既带自动配置类（.imports）又带触发其条件的技术 jar（Tomcat），条件自然满足自动装配</text>

  <!-- Step 1 -->
  <rect x="30" y="72" width="196" height="118" rx="13" fill="#fff7e6" stroke="#e8cf9a" filter="url(#soft)"/>
  <text x="128" y="98" font-size="11" font-weight="700" text-anchor="middle" fill="#5a3410">① 引入 starter</text>
  <text x="128" y="122" font-size="10" text-anchor="middle" fill="#93762e">应用引入依赖</text>
  <text x="128" y="142" font-size="9.5" text-anchor="middle" fill="#93762e">spring-boot-</text>
  <text x="128" y="158" font-size="9.5" text-anchor="middle" fill="#93762e">starter-web</text>
  <text x="128" y="180" font-size="9" text-anchor="middle" fill="#a1a1a6">一行依赖起一套</text>

  <path d="M226,131 L262,131" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- Step 2: two jars on classpath -->
  <rect x="264" y="72" width="252" height="118" rx="13" fill="#fdf6ea" stroke="#efdcb4" filter="url(#soft)"/>
  <text x="390" y="94" font-size="11" font-weight="700" text-anchor="middle" fill="#5a3410">② 两类 jar 上 classpath</text>
  <rect x="278" y="104" width="224" height="36" rx="8" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="390" y="120" font-size="9.5" font-weight="700" text-anchor="middle" fill="#12402a">module jar</text>
  <text x="390" y="134" font-size="8.6" text-anchor="middle" fill="#2f6f4f">带 .imports + @ConditionalOnClass 自动配置类</text>
  <rect x="278" y="146" width="224" height="36" rx="8" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="390" y="162" font-size="9.5" font-weight="700" text-anchor="middle" fill="#5a3410">技术 jar（Tomcat）</text>
  <text x="390" y="176" font-size="8.6" text-anchor="middle" fill="#93762e">Tomcat 类在 classpath 上</text>

  <path d="M516,131 L552,131" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- Step 3: selector reads imports -->
  <rect x="554" y="72" width="230" height="118" rx="13" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="669" y="98" font-size="11" font-weight="700" text-anchor="middle" fill="#1b2a4a">③ 读 .imports</text>
  <text x="669" y="122" font-size="9.4" text-anchor="middle" fill="#5b7db1">AutoConfiguration</text>
  <text x="669" y="138" font-size="9.4" text-anchor="middle" fill="#5b7db1">ImportSelector</text>
  <text x="669" y="162" font-size="9" text-anchor="middle" fill="#5b7db1">读 .imports 拿候选</text>
  <text x="669" y="180" font-size="9" text-anchor="middle" fill="#5b7db1">自动配置类</text>

  <path d="M784,131 L820,131" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- Step 4: condition satisfied -->
  <rect x="822" y="72" width="228" height="118" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="936" y="98" font-size="11" font-weight="700" text-anchor="middle" fill="#12402a">④ 条件满足装配</text>
  <text x="936" y="122" font-size="9.4" text-anchor="middle" fill="#2f6f4f">@ConditionalOnClass</text>
  <text x="936" y="138" font-size="9.4" text-anchor="middle" fill="#2f6f4f">（Tomcat）满足</text>
  <text x="936" y="162" font-size="9" text-anchor="middle" fill="#2f6f4f">装配默认 web</text>
  <text x="936" y="180" font-size="9" text-anchor="middle" fill="#2f6f4f">服务器 bean</text>

  <!-- Closed loop explanation -->
  <rect x="30" y="216" width="1020" height="150" rx="14" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="48" y="240" font-size="11.5" font-weight="700" fill="#2c5a3a">关键闭环：starter 同时带「自动配置类」和「触发其条件的技术 jar」——缺一不可</text>

  <rect x="60" y="256" width="450" height="94" rx="12" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="285" y="280" font-size="10.5" font-weight="700" text-anchor="middle" fill="#12402a">带来：自动配置类</text>
  <text x="285" y="304" font-size="9.5" text-anchor="middle" fill="#2f6f4f">每个 module jar 带自己的</text>
  <text x="285" y="322" font-size="9.5" text-anchor="middle" fill="#2f6f4f">META-INF/spring/....AutoConfiguration.imports</text>
  <text x="285" y="340" font-size="9" text-anchor="middle" fill="#a1a1a6">+ @ConditionalOnClass 的自动配置类</text>

  <text x="530" y="308" font-size="22" text-anchor="middle" fill="#a1a1a6">＋</text>

  <rect x="550" y="256" width="450" height="94" rx="12" fill="#fff7e6" stroke="#e8cf9a"/>
  <text x="775" y="280" font-size="10.5" font-weight="700" text-anchor="middle" fill="#5a3410">带来：触发条件的技术 jar</text>
  <text x="775" y="304" font-size="9.5" text-anchor="middle" fill="#93762e">starter 同时把 Tomcat 技术 jar</text>
  <text x="775" y="322" font-size="9.5" text-anchor="middle" fill="#93762e">放上 classpath，Tomcat 类可见</text>
  <text x="775" y="340" font-size="9" text-anchor="middle" fill="#a1a1a6">→ @ConditionalOnClass 才成立</text>

  <!-- Conclusion band -->
  <rect x="30" y="392" width="1020" height="102" rx="13" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="540" y="424" font-size="11" font-weight="700" text-anchor="middle" fill="#1d1d1f">引入 starter 后条件自然满足、自动装配生效</text>
  <text x="540" y="450" font-size="9.6" text-anchor="middle" fill="#6e6e73">若手动排除技术 jar，@ConditionalOnClass 不成立则不装配——starter 之所以“引入即用”，正因两者同时到位</text>
  <text x="540" y="474" font-size="9.6" text-anchor="middle" fill="#6e6e73">缺自动配置类：无候选可装；缺技术 jar：条件不满足——两者缺一，装配都不会发生</text>
</svg>
