<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="500" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Spring Boot 核心原理 · 接触面 ① @SpringBootApplication 三合一</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">一个注解 = 配置类 + 自动配置 + 组件扫描,「约定优于配置」的入口 · SpringBootApplication.java:54</text>

  <!-- source annotation -->
  <rect x="360" y="80" width="360" height="64" rx="14" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="540" y="108" font-size="13" font-weight="700" text-anchor="middle" fill="#3d2a5a">@SpringBootApplication</text>
  <text x="540" y="128" font-size="9" text-anchor="middle" fill="#8a6db3">标注 main 主类 · 拆开看才懂 Boot</text>

  <!-- three edges -->
  <path d="M420,144 L200,196" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M540,144 L540,196" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M660,144 L880,196" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- 1 @SpringBootConfiguration -->
  <rect x="40" y="200" width="316" height="150" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="198" y="228" font-size="11" font-weight="700" text-anchor="middle" fill="#3d2a5a">@SpringBootConfiguration</text>
  <line x1="60" y1="240" x2="336" y2="240" stroke="#e3d3f0" stroke-width="1"/>
  <text x="60" y="262" font-size="9.5" fill="#5a4080">标本类为配置类</text>
  <text x="60" y="282" font-size="9" fill="#8a6db3">@Configuration 的变体</text>
  <text x="60" y="304" font-size="9" fill="#8a6db3">让主类可声明 @Bean 方法</text>
  <text x="60" y="330" font-size="8.6" fill="#a1a1a6">每个 Boot 应用只应有一个</text>

  <!-- 2 @EnableAutoConfiguration -->
  <rect x="382" y="200" width="316" height="150" rx="13" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="540" y="228" font-size="11" font-weight="700" text-anchor="middle" fill="#12402a">@EnableAutoConfiguration</text>
  <line x1="402" y1="240" x2="678" y2="240" stroke="#cfe6d5" stroke-width="1"/>
  <text x="402" y="262" font-size="9.5" fill="#1a5a38">开自动配置(灵魂)</text>
  <text x="402" y="282" font-size="9" fill="#2f6f4f">classpath 有什么配什么</text>
  <text x="402" y="304" font-size="9" fill="#2f6f4f">条件化 bean,合理默认可覆盖</text>
  <text x="402" y="330" font-size="8.6" fill="#a1a1a6">详见「自动配置」篇</text>

  <!-- 3 @ComponentScan -->
  <rect x="724" y="200" width="316" height="150" rx="13" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="882" y="228" font-size="11" font-weight="700" text-anchor="middle" fill="#3d2a5a">@ComponentScan</text>
  <line x1="744" y1="240" x2="1020" y2="240" stroke="#e3d3f0" stroke-width="1"/>
  <text x="744" y="262" font-size="9.5" fill="#5a4080">扫描本包及子包</text>
  <text x="744" y="282" font-size="9" fill="#8a6db3">@Component/@Service/@Bean</text>
  <text x="744" y="304" font-size="9" fill="#8a6db3">带 excludeFilters:</text>
  <text x="744" y="324" font-size="8.6" fill="#8a6db3">TypeExcludeFilter</text>
  <text x="744" y="340" font-size="8.6" fill="#8a6db3">AutoConfigurationExcludeFilter</text>

  <!-- bottom summary -->
  <rect x="40" y="374" width="1000" height="98" rx="12" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="56" y="396" font-size="10.5" font-weight="700" fill="#1d1d1f">合起来 = 三件事</text>
  <text x="56" y="418" font-size="9.5" fill="#6e6e73">主类被声明为「配置类」→ 开启「自动配置」看 classpath 装配默认 bean → 「组件扫描」拉进用户自己的 @Component。</text>
  <text x="56" y="440" font-size="9.5" fill="#6e6e73">不用逐个开这些开关——这是「约定优于配置」的入口注解。误区:以为它是单一注解,其实是三合一。</text>
  <text x="56" y="460" font-size="9" fill="#a1a1a6">excludeFilters 保证自动配置类不被 @ComponentScan 重复当成普通组件扫入,避免双重加载。</text>
</svg>
