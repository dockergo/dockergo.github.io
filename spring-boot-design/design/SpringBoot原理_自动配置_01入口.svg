<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="520" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Spring Boot 核心原理 · 自动配置 ① 入口 @EnableAutoConfiguration 与 .imports</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">灵魂:classpath 有什么就配什么 · 候选来自各模块 .imports 文件(4.x 替代 spring.factories) · EnableAutoConfiguration.java:76</text>

  <!-- entry annotation -->
  <rect x="360" y="76" width="360" height="58" rx="14" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="540" y="100" font-size="12" font-weight="700" text-anchor="middle" fill="#12402a">@EnableAutoConfiguration</text>
  <text x="540" y="120" font-size="8.8" text-anchor="middle" fill="#2f6f4f">@SpringBootApplication 含此 · = 下面两块</text>

  <!-- decompose two -->
  <path d="M440,134 L280,172" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M640,134 L800,172" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <rect x="60" y="176" width="440" height="66" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="280" y="200" font-size="10.5" font-weight="700" text-anchor="middle" fill="#12402a">@AutoConfigurationPackage</text>
  <text x="280" y="222" font-size="8.8" text-anchor="middle" fill="#2f6f4f">登记主类所在包为自动配置基准包</text>
  <text x="280" y="236" font-size="8" text-anchor="middle" fill="#a1a1a6">供实体扫描等定位</text>

  <rect x="580" y="176" width="440" height="66" rx="12" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/>
  <text x="800" y="200" font-size="10.5" font-weight="700" text-anchor="middle" fill="#12402a">@Import(AutoConfigurationImportSelector)</text>
  <text x="800" y="222" font-size="8.8" text-anchor="middle" fill="#2f6f4f">导入选择器,负责挑出生效的自动配置类</text>
  <text x="800" y="236" font-size="8" text-anchor="middle" fill="#a1a1a6">核心引擎(见管线篇)</text>

  <!-- imports loading -->
  <path d="M800,242 L800,268" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <rect x="580" y="272" width="440" height="80" rx="12" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="800" y="295" font-size="10" font-weight="700" text-anchor="middle" fill="#1a5a38">ImportCandidates.load 读候选</text>
  <text x="800" y="316" font-size="8.8" text-anchor="middle" fill="#2f6f4f">从 META-INF/spring/&lt;注解全名&gt;.imports 读</text>
  <text x="800" y="333" font-size="8.6" text-anchor="middle" fill="#2f6f4f">4.x 替代旧 spring.factories · AutoConfigurationImportSelector.java:200</text>
  <text x="800" y="348" font-size="8" text-anchor="middle" fill="#a1a1a6">每注解一文件,更清晰</text>

  <!-- distributed imports -->
  <rect x="60" y="272" width="440" height="80" rx="12" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="280" y="295" font-size="10" font-weight="700" text-anchor="middle" fill="#1a5a38">候选分布式:core 只 12 条,其余散各 module</text>
  <text x="80" y="317" font-size="8.8" fill="#2f6f4f">core 的 AutoConfiguration.imports 只 12 条(AopAutoConfiguration 等)</text>
  <text x="80" y="334" font-size="8.8" fill="#2f6f4f">其余散在各 module/*,每模块带自己的 .imports</text>
  <text x="80" y="348" font-size="8" fill="#a1a1a6">如 module/spring-boot-health · 引哪个 starter 带哪份</text>

  <!-- @AutoConfiguration definition -->
  <rect x="60" y="374" width="960" height="66" rx="12" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="80" y="397" font-size="10.5" font-weight="700" fill="#1b2a4a">自动配置类本身用 @AutoConfiguration 标注（AutoConfiguration.java:58）</text>
  <text x="80" y="418" font-size="9" fill="#5b7db1">@AutoConfiguration = @Configuration(proxyBeanMethods=false) + @AutoConfigureBefore/After</text>
  <text x="80" y="434" font-size="8.4" fill="#a1a1a6">proxyBeanMethods=false 免 CGLIB 代理更快 · Before/After 定装配顺序</text>

  <!-- why note -->
  <rect x="60" y="458" width="960" height="46" rx="11" fill="#f7f7f9" stroke="#ececf1"/>
  <text x="80" y="480" font-size="10" font-weight="700" fill="#1d1d1f">为什么 .imports</text>
  <text x="80" y="496" font-size="9" fill="#6e6e73">每个技术模块(tomcat/redis…)自带一份清单;应用引入哪个 starter,对应模块 .imports 就上 classpath——按需装配。</text>
</svg>
