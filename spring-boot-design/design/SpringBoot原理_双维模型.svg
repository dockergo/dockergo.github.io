<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="528" viewBox="0 0 1080 528" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="528" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Spring Boot 核心原理 · 双维模型（能力域 × 执行时机）</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">纵轴=能力域(接触面 + 7 支撑) · 横轴=执行时机:启动期(run 一次性) / 运行期(请求·端点·刷新) / 构建期(AOT)</text>

  <!-- header row -->
  <g text-anchor="middle" font-size="10" font-weight="700">
    <rect x="36" y="84" width="196" height="40" rx="9" fill="#f0f0f4" stroke="#d2d2d7" filter="url(#soft)"/><text x="134" y="109" fill="#48484a" font-size="9.5">能力域 ＼ 执行时机</text>
    <rect x="240" y="84" width="268" height="40" rx="9" fill="#e7f0fb" stroke="#b9d2ef" filter="url(#soft)"/><text x="374" y="109" fill="#1b2a4a">启动期 · run() 一次性</text>
    <rect x="516" y="84" width="268" height="40" rx="9" fill="#eafaf1" stroke="#bfe0cd" filter="url(#soft)"/><text x="650" y="109" fill="#12402a">运行期 · 请求/端点/刷新</text>
    <rect x="792" y="84" width="252" height="40" rx="9" fill="#fbeaea" stroke="#e7c3c3" filter="url(#soft)"/><text x="918" y="109" fill="#4a1414">构建期 · AOT</text>
  </g>

  <!-- row1 接触面 -->
  <g text-anchor="middle" font-size="8.6">
    <rect x="36" y="130" width="196" height="36" rx="8" fill="#f4eefb" stroke="#d9c7ec"/><text x="134" y="153" fill="#3d2a5a" font-size="9.5" font-weight="700">接触面 · 注解+启动</text>
    <rect x="240" y="130" width="268" height="36" rx="8" fill="#f4eefb" stroke="#d9c7ec"/><text x="374" y="153" fill="#3d2a5a">@SpringBootApplication · run()</text>
    <rect x="516" y="130" width="268" height="36" rx="8" fill="#f7f7f9" stroke="#ececf1"/><text x="650" y="153" fill="#c7c7cc">—</text>
    <rect x="792" y="130" width="252" height="36" rx="8" fill="#f7f7f9" stroke="#ececf1"/><text x="918" y="153" fill="#c7c7cc">—</text>
  </g>
  <!-- row2 IoC -->
  <g text-anchor="middle" font-size="8.6">
    <rect x="36" y="172" width="196" height="36" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="134" y="195" fill="#1b2a4a" font-size="9.5" font-weight="700">IoC 容器</text>
    <rect x="240" y="172" width="268" height="36" rx="8" fill="#eef3fb" stroke="#bcd0ec"/><text x="374" y="195" fill="#1b2a4a">refresh 12 步(委托 framework)</text>
    <rect x="516" y="172" width="268" height="36" rx="8" fill="#f7f7f9" stroke="#ececf1"/><text x="650" y="195" fill="#c7c7cc">—</text>
    <rect x="792" y="172" width="252" height="36" rx="8" fill="#f7f7f9" stroke="#ececf1"/><text x="918" y="195" fill="#c7c7cc">—</text>
  </g>
  <!-- row3 自动配置 -->
  <g text-anchor="middle" font-size="8.6">
    <rect x="36" y="214" width="196" height="36" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="134" y="237" fill="#12402a" font-size="9.5" font-weight="700">自动配置(灵魂)</text>
    <rect x="240" y="214" width="268" height="36" rx="8" fill="#eafaf1" stroke="#bfe0cd"/><text x="374" y="237" fill="#12402a">.imports + @Conditional 装配 bean</text>
    <rect x="516" y="214" width="268" height="36" rx="8" fill="#f7f7f9" stroke="#ececf1"/><text x="650" y="237" fill="#c7c7cc">—</text>
    <rect x="792" y="214" width="252" height="36" rx="8" fill="#f7f7f9" stroke="#ececf1"/><text x="918" y="237" fill="#c7c7cc">—</text>
  </g>
  <!-- row4 starter -->
  <g text-anchor="middle" font-size="8.6">
    <rect x="36" y="256" width="196" height="36" rx="8" fill="#fff7e6" stroke="#e8cf9a"/><text x="134" y="279" fill="#5a3410" font-size="9.5" font-weight="700">starter 机制</text>
    <rect x="240" y="256" width="268" height="36" rx="8" fill="#fff7e6" stroke="#e8cf9a"/><text x="374" y="279" fill="#5a3410">依赖驱动上 classpath</text>
    <rect x="516" y="256" width="268" height="36" rx="8" fill="#f7f7f9" stroke="#ececf1"/><text x="650" y="279" fill="#c7c7cc">—</text>
    <rect x="792" y="256" width="252" height="36" rx="8" fill="#f7f7f9" stroke="#ececf1"/><text x="918" y="279" fill="#c7c7cc">—</text>
  </g>
  <!-- row5 内嵌服务器 -->
  <g text-anchor="middle" font-size="8.6">
    <rect x="36" y="298" width="196" height="36" rx="8" fill="#e7f0fb" stroke="#b9d2ef"/><text x="134" y="321" fill="#1b2a4a" font-size="9.5" font-weight="700">内嵌服务器</text>
    <rect x="240" y="298" width="268" height="36" rx="8" fill="#e7f0fb" stroke="#b9d2ef"/><text x="374" y="321" fill="#1b2a4a">SmartLifecycle 启动</text>
    <rect x="516" y="298" width="268" height="36" rx="8" fill="#e7f0fb" stroke="#b9d2ef"/><text x="650" y="321" fill="#1b2a4a">接收 HTTP 请求</text>
    <rect x="792" y="298" width="252" height="36" rx="8" fill="#f7f7f9" stroke="#ececf1"/><text x="918" y="321" fill="#c7c7cc">—</text>
  </g>
  <!-- row6 配置属性 -->
  <g text-anchor="middle" font-size="8.6">
    <rect x="36" y="340" width="196" height="36" rx="8" fill="#f4eefb" stroke="#d9c7ec"/><text x="134" y="363" fill="#3d2a5a" font-size="9.5" font-weight="700">配置属性绑定</text>
    <rect x="240" y="340" width="268" height="36" rx="8" fill="#f4eefb" stroke="#d9c7ec"/><text x="374" y="363" fill="#3d2a5a">绑定 Environment</text>
    <rect x="516" y="340" width="268" height="36" rx="8" fill="#f4eefb" stroke="#d9c7ec"/><text x="650" y="363" fill="#3d2a5a">配置刷新</text>
    <rect x="792" y="340" width="252" height="36" rx="8" fill="#f7f7f9" stroke="#ececf1"/><text x="918" y="363" fill="#c7c7cc">—</text>
  </g>
  <!-- row7 Actuator -->
  <g text-anchor="middle" font-size="8.6">
    <rect x="36" y="382" width="196" height="36" rx="8" fill="#f7f7f9" stroke="#e3e3e8"/><text x="134" y="405" fill="#1d1d1f" font-size="9.5" font-weight="700">Actuator</text>
    <rect x="240" y="382" width="268" height="36" rx="8" fill="#f7f7f9" stroke="#ececf1"/><text x="374" y="405" fill="#c7c7cc">—</text>
    <rect x="516" y="382" width="268" height="36" rx="8" fill="#f7f7f9" stroke="#e3e3e8"/><text x="650" y="405" fill="#6e6e73">/health /metrics 端点</text>
    <rect x="792" y="382" width="252" height="36" rx="8" fill="#f7f7f9" stroke="#ececf1"/><text x="918" y="405" fill="#c7c7cc">—</text>
  </g>
  <!-- row8 AOT -->
  <g text-anchor="middle" font-size="8.6">
    <rect x="36" y="424" width="196" height="36" rx="8" fill="#fbeaea" stroke="#e7c3c3"/><text x="134" y="447" fill="#4a1414" font-size="9.5" font-weight="700">AOT 原生</text>
    <rect x="240" y="424" width="268" height="36" rx="8" fill="#f7f7f9" stroke="#ececf1"/><text x="374" y="447" fill="#c7c7cc">—</text>
    <rect x="516" y="424" width="268" height="36" rx="8" fill="#f7f7f9" stroke="#ececf1"/><text x="650" y="447" fill="#c7c7cc">—</text>
    <rect x="792" y="424" width="252" height="36" rx="8" fill="#fbeaea" stroke="#e7c3c3"/><text x="918" y="447" fill="#4a1414">提前处理生成初始化代码</text>
  </g>

  <text x="36" y="486" font-size="9" fill="#6e6e73">读法:一个能力域可跨多个时机(内嵌服务器=启动起+运行接请求;配置属性=启动绑定+运行刷新);启动期是 run() 一次性主战场</text>
  <text x="36" y="508" font-size="9" fill="#a1a1a6">源码基准 Spring Boot 4.1.1 · 启动期 run() 走完即止 · 运行期由内嵌服务器/Actuator/配置刷新驱动 · 构建期 AOT 生成初始化代码</text>
</svg>
