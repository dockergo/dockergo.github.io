<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#1d1d1f" flood-opacity="0.07"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L9,5 L0,10 z" fill="#b8b8bf"/></marker>
  </defs>
  <rect width="1080" height="540" fill="#fbfbfd"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#1d1d1f">Spring Boot 配置属性绑定 · Environment 与 PropertySource 优先级</text>
  <text x="30" y="50" font-size="10.5" fill="#a1a1a6">Environment 统一多个有序 PropertySource；高优先级覆盖低——同名属性以高优先级源为准</text>

  <!-- Priority ladder (left) -->
  <text x="48" y="88" font-size="11" font-weight="700" fill="#3d2a5a">① 优先级阶梯（从高到低，高覆盖低）</text>
  <text x="628" y="112" font-size="9" fill="#a1a1a6">高优先级</text>
  <path d="M636,120 L636,412" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="628" y="428" font-size="9" fill="#a1a1a6">低优先级</text>

  <rect x="48" y="98" width="570" height="52" rx="11" fill="#f4eefb" stroke="#d9c7ec" filter="url(#soft)"/>
  <text x="66" y="122" font-size="10.5" font-weight="700" fill="#3d2a5a">命令行参数</text>
  <text x="600" y="122" font-size="9" text-anchor="end" fill="#8a6db3">最高，如 --server.port=9090</text>
  <text x="66" y="140" font-size="8.6" fill="#a1a1a6">command line args</text>

  <rect x="48" y="160" width="570" height="52" rx="11" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="66" y="184" font-size="10.5" font-weight="700" fill="#1b2a4a">环境变量 / 系统属性</text>
  <text x="600" y="184" font-size="9" text-anchor="end" fill="#5b7db1">OS env / JVM -D</text>
  <text x="66" y="202" font-size="8.6" fill="#a1a1a6">environment variables / system properties</text>

  <rect x="48" y="222" width="570" height="52" rx="11" fill="#f3f7fc" stroke="#cfe0f2" filter="url(#soft)"/>
  <text x="66" y="246" font-size="10.5" font-weight="700" fill="#274a78">application-{profile}.yml</text>
  <text x="600" y="246" font-size="9" text-anchor="end" fill="#5b7db1">环境特定（dev / prod）</text>
  <text x="66" y="264" font-size="8.6" fill="#a1a1a6">profile 特定配置</text>

  <rect x="48" y="284" width="570" height="52" rx="11" fill="#f5faf6" stroke="#cfe6d5" filter="url(#soft)"/>
  <text x="66" y="308" font-size="10.5" font-weight="700" fill="#12402a">application.yml</text>
  <text x="600" y="308" font-size="9" text-anchor="end" fill="#2f6f4f">公共配置</text>
  <text x="66" y="326" font-size="8.6" fill="#a1a1a6">默认应用配置文件</text>

  <rect x="48" y="346" width="570" height="52" rx="11" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="66" y="370" font-size="10.5" font-weight="700" fill="#1d1d1f">默认值</text>
  <text x="600" y="370" font-size="9" text-anchor="end" fill="#6e6e73">最低，兜底</text>
  <text x="66" y="388" font-size="8.6" fill="#a1a1a6">default properties</text>

  <!-- Environment aggregator (right) -->
  <path d="M660,248 L708,248" stroke="#c7c7cc" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="684" y="240" font-size="9" text-anchor="middle" fill="#a1a1a6">统一</text>

  <rect x="710" y="98" width="322" height="300" rx="14" fill="#eef3fb" stroke="#bcd0ec" filter="url(#soft)"/>
  <text x="871" y="128" font-size="12" font-weight="700" text-anchor="middle" fill="#1b2a4a">Environment</text>
  <text x="871" y="150" font-size="9.4" text-anchor="middle" fill="#5b7db1">统一多个有序 PropertySource</text>

  <rect x="730" y="166" width="282" height="66" rx="10" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="871" y="190" font-size="9.8" font-weight="700" text-anchor="middle" fill="#274a78">ConfigurationPropertySources.attach</text>
  <text x="871" y="210" font-size="8.8" text-anchor="middle" fill="#5b7db1">把配置源包装进 Environment，供松散绑定用</text>
  <text x="871" y="226" font-size="8.4" text-anchor="middle" fill="#a1a1a6">SpringApplication.java:355</text>

  <rect x="730" y="242" width="282" height="82" rx="10" fill="#f3f7fc" stroke="#cfe0f2"/>
  <text x="871" y="266" font-size="9.8" font-weight="700" text-anchor="middle" fill="#274a78">prepareEnvironment</text>
  <text x="871" y="286" font-size="8.8" text-anchor="middle" fill="#5b7db1">发 environmentPrepared 事件</text>
  <text x="871" y="304" font-size="8.8" text-anchor="middle" fill="#5b7db1">ConfigDataEnvironmentPostProcessor</text>
  <text x="871" y="318" font-size="8.4" text-anchor="middle" fill="#a1a1a6">加载 yml / profile · SpringApplication.java:350</text>

  <rect x="730" y="334" width="282" height="50" rx="10" fill="#eafaf1" stroke="#bfe0cd"/>
  <text x="871" y="358" font-size="9.8" font-weight="700" text-anchor="middle" fill="#12402a">高优先级源覆盖低</text>
  <text x="871" y="376" font-size="8.6" text-anchor="middle" fill="#2f6f4f">同名属性以高优先级为准</text>

  <!-- Why band -->
  <rect x="30" y="414" width="1020" height="112" rx="13" fill="#ffffff" stroke="#ececf1" filter="url(#soft)"/>
  <text x="48" y="440" font-size="11" font-weight="700" fill="#1d1d1f">为什么要优先级</text>
  <text x="48" y="466" font-size="9.8" fill="#6e6e73">同一属性多处定义时，高优先级源覆盖低——命令行 --server.port=9090 覆盖 yml 里的值</text>
  <text x="48" y="490" font-size="9.8" fill="#6e6e73">方便部署时不改代码覆盖配置：外部注入（命令行 / 环境变量）随时压过打包进 jar 的默认 yml</text>
  <text x="48" y="512" font-size="9.4" fill="#a1a1a6">application.yml（公共）+ application-{profile}.yml（环境特定）按优先级叠加，profile 的覆盖公共的</text>
</svg>
